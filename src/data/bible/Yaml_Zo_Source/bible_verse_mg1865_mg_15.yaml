  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no niakatra avy tany Tela-mela sy Tela-harsa sy Keroba sy Adana ary Imera (fa tsy nahalaza ny fianakaviany sy ny firazanany izy, na avy tamin''ny Isiraely, na tsia):'
mg1865::mg_15::2::60:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny taranak''i Delaia, ny taranak''i Tobia, ny taranak''i Nekoda, dia roa amby dimam-polo amby enin-jato.'
mg1865::mg_15::2::61:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avy tamin''ny taranaky ny mpisorona dia izao: Ny taranak''i Habaia, ny taranak''i Hakoza, ny taranak''i Barzilay; nampaka-bady avy tamin''ny zanakavavin''i Barzilay Gileadita io, ka dia notononina araka ny anarany.'
mg1865::mg_15::2::62:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no nitady ny soratra filazana ny razany, fa tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin''ny fisoronana.'
mg1865::mg_15::2::63:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny governora nilaza taminy fa tsy mahazo mihinana ny zavatra masina indrindra izy mandra-pitsangan''izay mpisorona anankiray mitondra ny Orima sy Tomima.'
mg1865::mg_15::2::64:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''ny olona rehetra dia enim-polo amby telon-jato amby roa arivo sy efatra alina,'
mg1865::mg_15::2::65:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy ny ankizilahiny sy ny ankizivaviny fito amby telo-polo amby telon-jato sy fito arivo; ary nisy mpihiralahy sy mpihiravavy roan-jato teo aminy;'
mg1865::mg_15::2::66:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny soavaliny dia enina amby telo-polo amby fiton-jato; ny ampondrany dia dimy amby efa-polo amby roan-jato;'
mg1865::mg_15::2::67:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny ramevany dia dimy amby telo -polo amby efa-jato; ny borikiny dia roa-polo amby fiton-jato sy enina arivo.'
mg1865::mg_15::2::68:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ny lohan''ny fianakaviana, rehefa tonga tao an-tranon''i Jehovah tany Jerosalema, dia nanatitra tamin''ny sitrapo hananganana ny tranon''Andriamanitra eo amin''ilay efa niorenany.'
mg1865::mg_15::2::69:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanome araka izay nananany avy izy hanampy ny vola voavory hanaovana ny asa, dia darika* volamena arivo sy enina alina ary mane volafotsy dimy arivo ary akanjo-mpisorona zato. [*Izahao I Tantara 29:7]'
mg1865::mg_15::2::70:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy tafapetraka teny an-tanànany avy ny mpisorona sy ny Levita sy ny sasany tamin''ny vahoaka sy ny mpihira sy ny mpiandry varavarana ary ny Netinima, dia ny Isiraely rehetra samy tao an-tanànany avy.'
mg1865::mg_15::3::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanombohana ny raharaham-pivavahana indray, sy ny nanorenana ny tempoly'
  verse_text: 'Ary nony tonga ny volana fahafito, rehefa tafapetraka teny amin''ny tanànany avy ny Zanak''Isiraely, dia nivory tany Jerosalema toy ny olona iray izy.'
mg1865::mg_15::3::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Jesoa, zanak''i Jozadaka, sy ny mpisorona rahalahiny ary Zerobabela, zanak''i Sealtiela, sy ny rahalahiny ka nanorina ny alitaran''Andriamanitry ny Isiraely hanaterana fanatitra dorana eo amboniny, araka izay voasoratra ao amin''ny lalàn''i Mosesy, lehilahin''Andriamanitra.'
mg1865::mg_15::3::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naoriny teo amin''ilay efa niorenany ihany ny alitara, satria natahotra ny tompon-tany izy, ary nanatitra fanatitra dorana teo amboniny ho an''i Jehovah izy, dia ny fanatitra dorana marain-tsy hariva.'
mg1865::mg_15::3::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitandrina ny andro firavoravoana fitoerana ao amin''ny trano rantsan-kazo koa izy, araka ny voasoratra, sy ny amin''ny fanatitra dorana isan''andro araka ny isany avy, tahaka ny fanao, araka izay voatendry hatao isan''andro avy.'
mg1865::mg_15::3::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nanatitra ny fanatitra dorana mandrakariva izy sy ilay fanao amin''ny voaloham-bolana sy amin''ny fotoam-pivavahana nohamasinina rehetra izay voatendrin''i Jehovah ary ny avy amin''izay rehetra nanatitra fanati-tsitrapo ho an''i Jehovah.'
mg1865::mg_15::3::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro voalohany tamin''ny volana fahafito no niantomboka nanatitra fanatitra dorana ho an''i Jehovah izy. Nefa tsy mbola natao ny fanorenan''ny tempolin''i Jehovah.'
mg1865::mg_15::3::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeny vola ny mpipai-bato sy ny mpandrafitra, ary ny any Tyro sy ny any Sidona dia nomeny zavatra hohanina sy hosotroina sy diloilo mba hitondrany hazo sedera avy any Libanona hatramin''ny ranomasina any Jopa, araka ny teny efa azony tamin''i Kyrosy, mpanjakan''i Persia.'
mg1865::mg_15::3::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny volana faharoa tamin''ny taona faharoa taorian''ny nahatongavany tany amin''ny tranon''Andriamanitra tany Jerosalema dia niatomboka Zerobabela, zanak''i Seltiela, sy Jesoa, zanak''i Jozadaka, mbamin''ny rahalahy sisa, dia ny mpisorona sy ny Levita ary izay rehetra tonga tany Jerosalema avy tany amin''ny fahababoana, ka nanendry ny Levita izay hatramin''ny roa-polo taona no ho miakatra izy ho tonian''ny asa amin''ny tranon''i Jehovah.'
mg1865::mg_15::3::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niara-nitsangana Jesoa sy ny zanany ary ny rahalahiny, ary Kadmiela sy ny zanany, zanak''i Joda, ho tonian''ny mpiasa tamin''ny tranon''Andriamanitra, ary ny zanak''i Henadada koa mbamin''ny zanany sy ny Levita rahalahiny.'
mg1865::mg_15::3::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa naorin''ny mpiasa ny tempolin''i Jehovah, dia nasainy hidera an''i Jehovah ny mpisorona, sady niakanjo ny akanjony sy nitondra trompetra, ary ny Levita, zanak''i Asafa, kosa nitondra kipantsona, araka ny nandidian''i Davida, mpanjakan''ny Isiraely.'
mg1865::mg_15::3::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao hira nifamalivaly nidera sy nisaotra an''i Jehovah izy, fa tsara Izy, fa mandrakizay ny famindram-pony amin''ny Isiraely. Dia nihoby mafy ny olona rehetra, raha nidera an''i Jehovah, satria vita ny fanorenan''ny tranon''i Jehovah.'
mg1865::mg_15::3::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa maro ny mpisorona sy ny Levita ary ny lohan''ny fianakaviana, dia ny antitra izay efa nahita ny trano voalohany, no nitomany mafy dia mafy, nony naorina teo imasony izany trano izany; nefa maro kosa no nanandratra ny feony nihoby sy nifaly;'
mg1865::mg_15::3::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia tsy fantatry ny olona izay fifaliana na izay fitomaniana noho izany horakoraka be izany, fa nihoby mafy ny olona, ka re lavitra ny horakoraka.'
mg1865::mg_15::4::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nataon''ny Samaritana hisakanana ny Jiosy tsy hanao ny tempoly sy ny nandraran''ny mpanjakan''i Persia azy tsy hanao intsony'
  verse_text: 'Ary nony ren''ny fahavalon''ny Joda sy ny Benjamina fa ireo efa nody avy tamin''ny fahababoana dia efa manao tempoly ho an''i Jehovah, Andriamanitry ny Isiraely,'
mg1865::mg_15::4::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanatona an''i Zerobabela sy ny lohan''ny fianakaviana izy ka nanao taminy hoe: Aoka mba hiara-manao aminareo izahay, fa mitady an''Andriamanitrareo tahaka anareo ihany koa izahay, ary ho Azy no namonoanay zavatra hatao fanatitra hatramin''ny andron''i Esara-hadona, mpanjakan''i Asyria, izay efa nampakatra anay ho aty.'
mg1865::mg_15::4::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zerobabela sy Jesoa mbamin''ny namany lohan''ny fianakaviana tamin''ny Isiraely namaly azy hoe: Tsy misy raharaha hikambananareo aminay amin''ny hanaovana trano ho an''Andriamanitray; fa izahay ihany no hanao trano ho an''i Jehovah, Andriamanitry ny Isiraely, araka izay efa nandidian''itompokolahy Kyrosy, mpanjakan''i Persia, anay.'
mg1865::mg_15::4::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tompon-tany nanao izay hampiraviravy tanana ny Jiosy sy nandevilevy azy mba tsy hanao ny trano'
mg1865::mg_15::4::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanamby olona hanome hevitra hanohitra azy hahafoana ny heviny hatramin''ny andro nanjakan''i Kyrosy tany Persia ka hatramin''ny nanjakan''i Dariosy, mpanjakan''i Persia.'
mg1865::mg_15::4::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nanjaka Ahasoerosy, dia nanoratra ho any aminy ireo hanendrikendrika ny mponina tany Joda sy Jerosalema.'
mg1865::mg_15::4::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andron''i Artaksersesy no nanoratan''i Bislama sy Mitredata sy Tabela mbamin''ny namany sisa ho any amin''i Artaksersesy, mpanjakan''i Persia; ary ny soratra tamin''ny taratasy dia nataony tarehin-tsoratra Syriana* sady nataony teny Syriana* koa. [*Hebreo: Aramiana]'
mg1865::mg_15::4::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra dia nanoratra taratasy ho any amin''i Artaksersesy mpanjaka hanendrikendrika an''i Jerosalema toy izao:'
mg1865::mg_15::4::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra ary ny namany sisa, dia ny Dinaita, ny Afarsatkita, ny Tarpelita, ny Afarsaita, ny Arkevita, ny Babyloniana, ny Sosanita, ny Dehavita sy ny Elamita,'
mg1865::mg_15::4::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mbamin''ny firenena sisa izay nentin''i Asnapara lehibe sady malaza ho babo, ka namponeniny tany an-tanàna Samaria sy tany amin''ny tany sasany ety an-dafin''ny ony ety...'
mg1865::mg_15::4::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no teny amin''ny taratasy nampitondrainy ho any amin''i Artaksersesy mpanjaka: Ny lehilahy mpanomponao ety an-dafin''ny ony ety .....'
mg1865::mg_15::4::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fantatry ny mpanjaka fa ny Jiosy, izay niakatra avy tany aminao hankaty aminay, dia efa tonga any Jerosalema ka manamboatra ilay tanàna fikomiana sady ratsy, dia mahavita ny mandany izy izao ary manamboatra ny fanorenany koa.'
mg1865::mg_15::4::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatry ny mpanjaka fa raha hatao io tanàna io, ka hatsangana indray ny mandany, dia tsy hety handoa hetra, na haba, na sara, izy; ka dia hahatonga fatiantoka ho an''ny fanjakana izany any aoriana.'
mg1865::mg_15::4::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa satria mahazo ny fivelomanay* avy amin''ny lapan''ny mpanjaka izahay, dia tsy mety raha odianay tsy hita ny fatiantoky ny fanjakana, ka dia efa naniraka hampahafantatra ny mpanjaka izany izahay, [*Hebreo: mihinana ny sira]'
mg1865::mg_15::4::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hizahana ny boky tantaran''ny razanao; dia ho hitanao eo amin''ny boky tantara, ka ho fantatrao fa tanàna fikomiana io tanàna io ka naha-fatiantoka ny mpanjaka sy ny tany maro, sady efa nisy fikomiana niseho tao hatrizay ela izay; koa izany no nandravana io tanàna io.'
mg1865::mg_15::4::16:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mampahafantatra ny mpanjaka izahay fa raha hamboarina io tanàna io, ka vita ny mandany, dia tsy hanana fanjakana amin''ny ety an-dafin''ny ony ety intsony ianao.'
mg1865::mg_15::4::17:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampitondrain''ny mpanjaka ny valiny ho any amin-dRehoma mpanolo-tsaina sy Simsay mpanoratra mbamin''ny namany sisa izay nonina tany Samaria sy tany amin''ny tanàna sasany an-dafin''ny ony, nanao hoe: Fiadanana .....'
mg1865::mg_15::4::18:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taratasy izay nampitondrainareo ho aty aminay dia efa voavaky tsara teo anatrehako;'
mg1865::mg_15::4::19:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izaho nandidy, ka nasaiko nizahana, dia hita fa nanandra-tena nikomy tamin''ny mpanjaka maro hatrizay ela izay tokoa io tanàna io, ka nisy fikomiana sy fihodinana niseho teo.'
mg1865::mg_15::4::20:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nisy mpanjaka mahery izay nanjaka tany Jerosalema nanapaka ny tany rehetra any an-dafin''ny ony ka nandoavana hetra sy haba ary sara.'
mg1865::mg_15::4::21:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia manaova didy hampitsahatra ireo olona ireo, mba tsy hamboarina io tanàna io, raha tsy mahazo teny avy aty amiko.'
mg1865::mg_15::4::22:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo tsara, fandrao misy tsy vitanareo izany; fa nahoana no havela handroso ny ratsy ka hahatonga fatiantoka ho an''ny fanjakana?'
mg1865::mg_15::4::23:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voavaky teo anatrehan-dRehoma mpanolo-tsaina sy Simsay mpanoratra mbamin''ny namany ny taratasin''i Artaksersesy mpanjaka, dia niakatra faingana ho any Jerosalema ho any amin''ny Jiosy izy ka nampitsahatra azy an-keriny*. [*Hebreo: amin-tsandry aman-kery]'
mg1865::mg_15::4::24:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natsahatra tsy natao ny tranon''Andriamanitra, izay tany Jerosalema; ary mbola nitsahatra ihany izany hatramin''ny taona faharoa nanjakan''i Dariosy, mpanjakan''i Persia.'
mg1865::mg_15::5::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namporisihan''i Hagay sy Zakaria ny Jiosy handroso hanao na tempoly indray, sy ny naneken''i Dariosy, mpanjakan''i Persia, ny hanaovany azy'
  verse_text: 'Ary ny mpaminany, dia Hagay mpaminany sy Zakaria, zanak''Ido, naminany tamin''ny Jiosy tany Joda sy Jerosalema tamin''ny anaran''Andriamanitry ny Isiraely izay tao aminy.'
mg1865::mg_15::5::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Zerobabela, zanak''i Sealtiela, sy Jesoa, zanak''i Jozadaka, ka nanomboka nanao ny tranon''Andriamanitra any Jerosalema indray; ary ireo mpaminanin''Andriamanitra ireo dia teo aminy ka nanampy azy.'
mg1865::mg_15::5::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany ihany koa dia nankany amin''ireo Tatenay, governoran''ny ety an-dafin''ny ony ety, sy Setara-bozenay mbamin''ny namany; ka izao no nataony taminy: Iza no nandidy anareo hanao io trano io sy hahavita io manda io?'
mg1865::mg_15::5::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao koa no nataonay* taminy Iza avy no anaran''izay lehilahy manao io trano io? [*Na: (nataony)]'
mg1865::mg_15::5::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny mason''Andriamaniny nitsinjo ny loholon''ny Joda, ka tsy nahasakana azy ireo, mandra-pahatongan''ny teny ho any amin''i Dariosy sy ny nahazoany ny valiny ny amin''izany raharaha izany.'
mg1865::mg_15::5::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''ny taratasy izay nampitondrain''i Tatenay, governoran''ny ety an-dafin''ny ony ety, sy Setara-bozenay ary ny Afarsekita namany, izay amin''ny ety an-dafin''ny ony ety; ho any amin''i Dariosy mpanjaka;'
mg1865::mg_15::5::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, nampitondrainy ho any aminy ny taratasy izay nisy teny toy izao: Ho an''i Dariosy mpanjaka anie ny fiadanana be.'
mg1865::mg_15::5::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fantatry ny mpanjaka fa nankany amin''ny tany Joda izahay ho any an-tranon''Andriamanitra lehibe, izay atao amin''ny vato vaventy, sady misy hazo alatsaka amin''ny rindrin-trano, ary mandroso tsara izany asa izany sady ambinina eo an-tanany.'
mg1865::mg_15::5::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany ireo loholona ireo izahay nanao hoe: Iza no nandidy anareo hanao io trano io sy hanangana io manda io?'
mg1865::mg_15::5::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanontany ny anarany avy koa izahay mba hampahafantarinay anao sy hosoratanay ny anaran''ny olona izay lohany;'
mg1865::mg_15::5::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka izao no teny navaliny anay: Izahay dia mpanompon''Andriamanitry ny lanitra sy ny tany ka manamboatra ny trano izay efa vita ela, fa ny mpanjaka lehibe anankiray tamin''ny Isiraely no nanao sy nahavita azy.'
mg1865::mg_15::5::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho ny nampahatezeran''ny razanay an''Andriamanitry ny lanitra, dia natolony izy ho eo an-tanan''i Nebokadnezara Kaldeana, mpanjakan''i Babylona, izay efa nandrava io trano io ka nitondra ny olona ho babo tany Babylona.'
mg1865::mg_15::5::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny taona voalohany nanjakan''i Kyrosy, mpanjakan''i Babylona, kosa dia nanao didy Kyrosy mpanjaka, mba hatao indray io tranon''Andriamanitra io.'
mg1865::mg_15::5::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaka volamena sy volafotsy momba ny tranon''Andriamanitra, izay efa nalain''i Nebokadnezara tao amin''ny tempoly tany Jerosalema ka nentiny ho any amin''ny tempoly any Babylona, dia nalain''i Kyrosy mpanjaka tao amin''ny tempoly any Babylona ka natolotra tamin''ny anankiray atao hoe Sesbazara, izay efa notendreny ho governora;'
mg1865::mg_15::5::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy izy taminy: Raiso ireo fanaka ireo, ka andeha, apetraho ao amin''ny tempoly izay any Jerosalema; ary aoka ny tranon''Andriamanitra hatsangana eo amin''ilay efa niorenany ihany.'
mg1865::mg_15::5::16:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy Sesbazara ka nanao ny fanorenan''ny tranon''Andriamanitra any Jerosalema; ary hatramin''izany andro izany ka mandraka ankehitriny dia efa natao ihany izy, saingy tsy mbola vita.'
mg1865::mg_15::5::17:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha sitraky ny mpanjaka, aoka hizahana ny trano firaketan''ny mpanjaka, izay any Babylona, na misy didy nataon''i Kyrosy mpanjaka hanaovana io tranon''Andriamanitra any Jerosalema io, na tsia; ary aoka ny sitrapon''ny mpanjaka hambarany aminay ny amin''izany zavatra izany.'
mg1865::mg_15::6::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany Dariosy mpanjaka dia nandidy, ka nizahana ny trano fitehirizan-taratasy, izay nitehirizana ny rakitra tany Babylona.'
mg1865::mg_15::6::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tao Akmeta, tao an-dapa izay any amin''ny tanin''ny Mediana, no nahitana horonan-taratasy anankiray, ka voasoratra teo izao tantara izao:'
mg1865::mg_15::6::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona voalohany nanjakan''i Kyrosy dia nandidy izy nanao hoe: Ny amin''ny tranon''Andriamanitra any Jerosalema, dia aoka hatao mihitsy izany ho fanateran''ny olona fanatitra, ary aoka hatao mafy ny fanorenany, ka enim-polo hakiho ny hahavony, ary enim-polo hakiho koa ny sakany,'
mg1865::mg_15::6::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia vato vaventy telo andalana sy hazo vaovao iray andalana; ary aoka haloa avy amin''ny tranon''ny mpanjaka izay lany;'
mg1865::mg_15::6::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanaky ny tranon''Andriamanitra, na ny volamena na ny volafotsy, izay nalain''i Nebokadnezara tao amin''ny tempoly tany Jerosalema ka nentiny ho any Babylona, dia aoka haverina ho any amin''ny tempoly any Jerosalema indray ireo, samy ho amin''ny fitoerany avy, ka aoka hapetraka ao an-tranon''Andriamanitra avokoa.'
mg1865::mg_15::6::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, ry Tatenay, governora any an-dafin''ny ony, sy ry Setara-bozenay mbamin''ny Afarsakita namanareo, izay any an-dafin''ny ony, mihataha ianareo.'
mg1865::mg_15::6::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza misakana ny fanaovana io tranon''Andriamanitra io; aoka ny mpanapaka ny Jiosy sy ny loholon''ny Jiosy hanao io tranon''Andriamanitra io eo amin''ilay efa niorenany ihany.'
mg1865::mg_15::6::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho manao didy ny amin''ny hataonareo amin''ny loholon''ireo Jiosy ireo hanaovany izany tranon''Andriamanitra izany: aoka ny haren''ny mpanjaka, dia ny hetra avy amin''ny any an-dafin''ny ony, no handoavana marina izay lany ho an''ireo lehilahy ireo, mba tsy ho azon-tsampona izy.'
mg1865::mg_15::6::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay zavatra ilainy, na zanak''omby, na ondrilahy, na zanak''ondry, ho fanatitra dorana ho an''Andriamanitry ny lanitra, na vary tritika na sira, na divay sy diloilo, araka izay andidian''ny mpisorona any Jerosalema, dia aoka homena azy isan''andro isan''andro tsy tapaka izany,'
mg1865::mg_15::6::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanaterany fanatitra ho hanitra ankasitrahana ho an''Andriamanitry ny lanitra sy hivavahany mba ho ela velona ny mpanjaka mbamin''ny zanany.'
mg1865::mg_15::6::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho manao didy fa na iza na iza no mandika izao teny izao, dia aoka hangalana hazo avy amin''ny tranony, ary haorina, dia hahantona eo ny tenany; ary aoka hatao firinga ny tranony noho izany.'
mg1865::mg_15::6::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra, Izay efa nampitoetra ny anarany teo, anie handringana ny mpanjaka sy ny vahoaka rehetra, izay maninjitra ny tanany handika ny didiko ka handrava izany tranon''Andriamanitra any Jerosalema izany. Izaho Dariosy no nanao ny didy; aoka hotovina marina tokoa izany.'
mg1865::mg_15::6::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nahavitana ny tempoly, sy ny nitokanana azy'
  verse_text: 'Ary tamin''izany Tatenay, governora amin''ny ety an-dafin''ny ony ety, sy Setarabozenay mbamin''ny namany dia nankatò marina izany teny efa nampitondrain''i Dariosy ho any aminy izany.'
mg1865::mg_15::6::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao ny trano ny loholon''ny Jiosy ka nambinina noho ny faminanian''i Hagay mpaminany sy Zakaria, zanak''Ido. Ary nanao ny trano izy ka nahavita azy, araka ny didin''Andriamanitry ny Isiraely sy araka ny didin''i Kyrosy sy Dariosy ary Artaksersesy, mpanjakan''i Persia.'
mg1865::mg_15::6::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vita io trano io tamin''ny andro fahatelo tamin''ny volana Adara tamin''ny taona fahenina nanjakan''i Dariosy mpanjaka.'
mg1865::mg_15::6::16:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely, na ny mpisorona, na ny Levita, na ny olona sisa izay nody avy tamin''ny fahababoana, dia nitokana io tranon''Andriamanitra io tamin''ny fifaliana;'
mg1865::mg_15::6::17:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: '2022-06-13T08:15:38+0000'
  verse_title: null
  verse_text: 'ary ny nateriny hitokanana io tranon''Andriamanitra io dia omby zato sy ondrilahy roan-jato sy zanak''ondry efa-jato; ary ny ho fanatitra noho ny ota kosa ho an''ny Isiraely rehetra dia osilahy roa ambin''ny folo, araka ny isan''ny firenen''Isiraely.'
mg1865::mg_15::6::18:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanendry ny mpisorona ho amin''ny firazanany avy sy ny Levita ho amin''ny antokony avy izy, hanao ny fanompoana an''Andriamanitra izay any Jerosalema, araka izay voasoratra ao amin''ny bokin''i Mosesy.'
mg1865::mg_15::6::19:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay efa nody avy tamin''ny fahababoana dia nitandrina ny Paska tamin''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany;'
mg1865::mg_15::6::20:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny mpisorona sy ny Levita samy efa nanadio ny tenany rahateo, dia nadio izy rehetra ka namono ny Paska ho an''izay rehetra efa nody avy tamin''ny fahababoana sy ho an''ny mpisorona rahalahiny ary ho an''ny tenany,'
mg1865::mg_15::6::21:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihinana izany ny Zanak''Isiraely izay efa nody avy tamin''ny fahababoana mbamin''izay rehetra niavaka ho namany ka niala tamin''ny fahalotoan''ny firenena tompon-tany hitady an''i Jehovah, Andriamanitry ny Isiraely,'
mg1865::mg_15::6::22:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nitandrina ny andro firavoravoana fihinanana ny mofo tsy misy masirasira hafitoana tamin''ny fifaliana izy; fa Jehovah efa nampifaly azy ary efa nampiova ny fon''ny mpanjakan''i Asyria hamindra fo aminy ka hampahery ny tanany tamin''ny nanaovany ny tranon''Andriamanitra, dia Andriamanitry ny Isiraely.'
mg1865::mg_15::7::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandehanan''ny Jiosy maro koa izay nentin''i Ezra avy tany Babylona'
  verse_text: 'Ary rehefa afaka izany, tamin''ny nanjakan''i Artaksersesy, mpanjakan''i Persia, dia niakatra Ezra, zanak''i Seraia, zanak''i Azaria, zanak''i Hilklay'
mg1865::mg_15::7::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Saloma, zanak''i Zadoka, zanak''i Ahitoba,'
mg1865::mg_15::7::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Amaria, zanak''i Azaria, zanak''i Meraiota,'
mg1865::mg_15::7::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Zerahia, zanak''i Ozy, zanak''i Boky,'
mg1865::mg_15::7::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Abisoa, zanak''i Finehasa, zanak''i Eleazara, zanak''i Arona mpisoronabe;'
mg1865::mg_15::7::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'io Ezra io dia niakatra avy tany Babylona (mpanora-dalàna izy sady nahay ny lalàn''i Mosesy, izay efa nomen''i Jehovah, Andriamanitry ny Isiraely) ary nomen''ny mpanjaka azy izay rehetra nangatahiny, araka ny nomban''ny tanan''i Jehovah Andriamaniny azy.'
mg1865::mg_15::7::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra koa ny sasany amin''ny Zanak''Isiraely sy ny sasany amin''ny mpisorona mbamin''ny Levita sy ny mpihira sy ny mpiandry varavarana ary ny Netinima mba hankany Jerosalema tamin''ny taona fahafito nanjakan''i Artaksersesy mpanjaka.'
mg1865::mg_15::7::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany Jerosalema Ezra tamin''ny volana fahadimy tamin''ny taona fahafito nanjakan''ny mpanjaka.'
mg1865::mg_15::7::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny andro voalohany tamin''ny volana voalohany no niaingany niakatra avy tany Babylona; ary tamin''ny andro voalohany tamin''ny volana fahadimy no nahatongavany tany Jerosalema araka ny soa nataon''ny tanan''Andriamaniny taminy.'
mg1865::mg_15::7::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ezra nampiomana ny fony hitady ny lalàn''i Jehovah ka hankatò izany ary hampianatra ny Isiraely didy sy fitsipika.'
mg1865::mg_15::7::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no tenin''ny taratasy izay nomen''i Artaksersesy mpanjaka an''i Ezra mpisorona, ilay mpanora-dalàna mahay ny tenin''ny lalàn''i Jehovah sy ny didiny tamin''ny Isiraely:'
mg1865::mg_15::7::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Artaksersesy, mpanjakan''ny mpanjaka, ho an''i Ezra mpisorona, mpanora-dalàna mahay tsara ny lalàn''Andriamanitry ny lanitra.'
mg1865::mg_15::7::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho manao didy fa na iza na iza eto amin''ny fanjakako amin''ny olona Isiraely sy ny mpisorony ary ny Levita no te-hiaraka aminao hankany Jerosalema, dia mahazo mandeha izy.'
mg1865::mg_15::7::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao efa nirahin''ny mpanjaka sy izy fito lahy mpanolo-tsainy handinika ny toetran''i Joda sy Jerosalema araka ny lalàn''Andriamanitrao izay eny an-tananao;'
mg1865::mg_15::7::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hitondra ny volafotsy sy ny volamena izay efa naterin''ny mpanjaka sy ireo mpanolo-tsaina tamin''ny sitrapo ho an''Andriamanitry ny Isiraely, Izay monina any Jerosalema;'
mg1865::mg_15::7::16:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny volafotsy sy ny volamena rehetra izay ho azonao eran''ny tany Babylona sy ny fanati-tsitrapo aterin''ny olona sy ny mpisorona, dia izay ateriny amin''ny sitrapo hanaovany ny tranon''Andriamaniny, izay any Jerosalema.'
mg1865::mg_15::7::17:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany dia ividiano omby sy ondrilahy sy zanak''ondry mbamin''ny fanatitra hohanina sy ny fanatitra aidina momba azy amin''io vola io araka izay marina, ka atero eo ambonin''ny alitara ao an-tranon''Andriamanitrareo izay any Jerosalema ireny.'
mg1865::mg_15::7::18:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra sitrakao sy ny rahalahinao hatao amin''ny volafotsy sy ny volamena sisa, dia ataovy izany araka ny sitrapon''Andriamanitrareo.'
mg1865::mg_15::7::19:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaka izay nomena anao hanaovana ny fanompoana ao an-tranon''Andriamanitrao dia atolory eo anatrehan''Andriamanitra any Jerosalema.'
mg1865::mg_15::7::20:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra mbola hilainao koa ka tsy maintsy haloanao ho an''ny tranon''Andriamanitrao dia alao ao amin''ny trano firaketan''ny mpanjaka.'
mg1865::mg_15::7::21:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho, Artaksersesy mpanjaka, dia manao didy koa ho amin''ny mpitahiry ny haren''ny fanjakana rehetra izay any an-dafin''ny ony, fa na inona na inona no ilain''i Ezra mpisorona, mpanora-dalàna mahay ny lalàn''Andriamanitry ny lanitra, aminareo, dia tovy marina izany,'
mg1865::mg_15::7::22:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'na hatramin''ny talenta volafotsy zato sy ny vary tritika zato kora sy ny divay zato bata sy ny diloilo zato bata ary ny sira tsy misy fatrany aza.'
mg1865::mg_15::7::23:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na inona na inona andidian''Andriamanitry ny lanitra dia aoka hataonao tanteraka avokoa ho an''ny tranon''Andriamanitry ny lanitra; fa nahoana no havela hisy fahatezerana hihatra amin''ny fanjakan''ny mpanjaka sy ny zanany?'
mg1865::mg_15::7::24:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mampahafantatra anareo koa izahay fa ny mpisorona rehetra sy ny Levita sy ny mpihira sy ny mpiandry varavarana sy ny Netinima ary ny mpanompo amin''io tranon''Andriamanitra io dia tsy mba hampandoavina hetra, na haba, na sara.'
mg1865::mg_15::7::25:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Ezra, araka ny fahendren''Andriamanitrao izay eo an-tananao, dia manendre mpanapaka sy mpitsara, izay hitsara ny olona rehetra any an-dafin''ny ony, dia izay rehetra mahalala ny lalàn''Andriamanitrao; fa izay tsy mbola mahalala izany dia aoka hampianarinareo.'
mg1865::mg_15::7::26:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza tsy mety mankatò ny lalan''Andriamanitrao sy ny lalàn''ny mpanjaka, dia aoka hotsaraina marina izy na hovonoina, na horoahina, na hosazina, na hafatotra.'
mg1865::mg_15::7::27:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah, Andriamanitry ny razantsika, Izay efa nanisy izany tao am-pon''ny mpanjaka hahatsara tarehy ny tranon''i Jehovah any Jerosalema.'
mg1865::mg_15::7::28:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa nampahazo ahy famindram-po teo anatrehan''ny mpanjaka sy ireo mpanolo-tsainy ary ny mpanapaka lehibe rehetra ao amin''ny mpanjaka. Ary dia nampaherezina aho araka ny nomban''ny tanan''i Jehovah Andriamanitro ahy ka nahangona loholona tamin''ny Isiraely mba hiara-miakatra amiko.'
mg1865::mg_15::8::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny olona niaraka tamin''i Ezra, sy ny nankanesany ho any Jerosalema'
  verse_text: 'Ary izao no lohan''ny fianakaviana sy filazana ny firazanan''ny olona izay niara-niakatra tamiko avy tany Babylona tamin''ny nanjakan''i Artaksersesy mpanjaka:'
mg1865::mg_15::8::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Gersoma, avy tamin''ny taranak''i Finehasa; Daniela, avy tamin''ny taranak''Itamara; Hatosy, avy tamin''ny taranak''i Davida;'
mg1865::mg_15::8::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zakaria, avy tamin''ny taranak''i Sekania (avy tamin''ny zanak''i Parosy), mbamin''ny namany dimam-Polo amby zato lahy voasoratra araka ny firazanany;'
mg1865::mg_15::8::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Elihoenay, zanak''i Zerahia, avy tamin''ny taranak''i Pahata-moaba, mbamin''ny namany roan-jato lahy;'
mg1865::mg_15::8::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny zanak''i Jahaziela, avy tamin''ny taranak''i Sekania, mbamin''ny namany telon-jato lahy;'
mg1865::mg_15::8::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ebeda, zanak''i Jonatana, avy tamin''ny taranak''i Adina, mbamin''ny namany dimam-polo lahy;'
mg1865::mg_15::8::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesaia, zanak''i Atalia, avy tamin''ny taranak''i Elama, mbamin''ny namany fito-polo lahy;'
mg1865::mg_15::8::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zebadia, zanak''i Mikaela, avy tamin''ny taranak''i Sefatia, mbamin''ny namany valo-polo lahy;'
mg1865::mg_15::8::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Obadia, zanak''i Jehiela, avy tamin''ny taranak''i Joaba, mbamin''ny namany valo ambin''ny folo amby roan-jato lahy;'
mg1865::mg_15::8::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny zanak''i Josifia, avy tamin''ny taranak''i Selomita, mbamin''ny namany enim-polo amby zato lahy;'
mg1865::mg_15::8::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zakaria, zanak''i Bebay, avy tamin''ny taranak''i Bebay, mbamin''ny namany valo amby roa-polo lahy,'
mg1865::mg_15::8::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Johanana, zanak''i Hakatana, avy tamin''ny taranak''i Azgada, mbamin''ny namany folo amby zato lahy;'
mg1865::mg_15::8::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Adonikama, zandriny taoriana ireo, ary izao no anarany: Elifeleta sy Jeiela sy Semaia mbamin''ny namany enim-polo lahy,'
mg1865::mg_15::8::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Otahy sy Zaboda, avy tamin''ny taranak''i Bigvay, mbamin''ny namany fito-polo lahy.'
mg1865::mg_15::8::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novoriko teo amoron''ny ony mankany Ahava izy, ka nilasy teo hateloana izahay; ary nony nandinika ny olona sy ny mpisorona aho, dia nahita fa tsy nisy taranak''i Levy teo na dia iray akory aza.'
mg1865::mg_15::8::16:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nirahiko Eliezera sy Ariela sy Semaia sy Elnatana sy Jariba sy Elnatana sy Natana sy Zakaria sy Mesolama (samy loholona ireo) ary Joariba sy Elnatana (samy mpampianatra ireo).'
mg1865::mg_15::8::17:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampitondraiko teny ho any amin''Ido, loholona any Kasifia, ireo, ka nambarako azy izay teny holazainy amin''Ido sy ny Netinima rahalahiny any Kasifia, mba ho entiny any aminay izay ho mpanao fanompoam-pivavahana ao an-tranon''Andriamanitray.'
mg1865::mg_15::8::18:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka ny soa nataon''ny tanan''Andriamanitray taminay no nitondrany olon-kendry anankiray* ho any aminay avy tamin''ny taranak''i Maly, zanak''i Levy, zanak''Isiraely, ary Serebia, sy ny zanany mbamin''ny rahalahiny, valo ambin''ny folo lahy, [*Na: an''Isi-sekela]'
mg1865::mg_15::8::19:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hasabia sy Jesaia, avy tamin''ny taranak''i Merary, mbamin''ny rahalahiny ary ny zanany roa-polo lahy;'
mg1865::mg_15::8::20:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary avy tamin''ny Netinima, izay notendren''i Davida sy ny mpanapaka hanompo ny Levita, dia roa-polo amby roan-jato lahy; notononina anarana avokoa ireo.'
mg1865::mg_15::8::21:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso andro fifadian-kanina aho teo amoron''ny ony Ahava hampahorianay tena eo anatrehan''Andriamanitray, mba hangataka Azy hahalavorary ny dianay sy ny an''ny vady aman-janakay ary ny biby fiompinay rehetra.'
mg1865::mg_15::8::22:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: '2022-06-13T08:16:38+0000'
  verse_title: null
  verse_text: 'Fa nahamenatra ahy ny hangataka miaramila sy mpitaingin-tsoavaly amin''ny mpanjaka hiaro anay amin''ny fahavalonay eny an-dàlana, satria efa niteny tamin''ny mpanjaka izahay ka nanao hoe: Ny tanan''Andriamanitray mahasoa izay rehetra mitady Azy; fa ny heriny sy ny fahatezerany kosa mamely izay rehetra mahafoy Azy.'
mg1865::mg_15::8::23:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifady hanina izahay ka nangataka izany tamin''Andriamanitray, dia nihaino anay Izy.'
mg1865::mg_15::8::24:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanokana roa ambin''ny folo lahy tamin''ny lohan''ny mpisorona aho, dia Serebia sy Hasabia ary rahalahiny folo lahy ho namany,'
mg1865::mg_15::8::25:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nolanjaiko ny volafotsy sy ny volamena horaisiny mbamin''ny fanaka, dia ny fanatitra ho ao an-tranon''Andriamanitray, izay efa naterin''ny mpanjaka sy ireo mpanolotsainy sy ireo mpanapaka ary ny Isiraely rehetra izay vory teo;'
mg1865::mg_15::8::26:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, nolanjaiko hatolotra azy ny talenta volafotsy dimam-polo amby enin-jato sy fanaka volafotsy, lanjan''ny talenta zato, ary talenta volamena zato'
mg1865::mg_15::8::27:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy kapoaka volamena misarona roa-polo, lanjan''ny darika* arivo, ary fanaka varahina roa manganohano, tsara toy ny volamena. [*Izahao I Tantara 29:7]'
mg1865::mg_15::8::28:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho taminy: Ianareo dia masina ho an''i Jehovah, sady masina koa ny fanaka; ary ny volafotsy sy ny volamena dia fanati-tsitrapo ho an''i Jehovah, Andriamanitry ny razanareo.'
mg1865::mg_15::8::29:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miambena ianareo, ka tandremo ireny mandra-pandanianareo azy indray eo anatrehan''ny lohan''ny mpisorona sy ny Levita ary ny lohan''ny fianakaviana amin''ny Isiraely any Jerosalema, dia amin''ny efi-trano ao an-tranon''i Jehovah.'
mg1865::mg_15::8::30:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''ny mpisorona sy ny Levita izany volafotsy sy volamena ary fanaka voalanja izany mba ho entiny ho any Jerosalema ho ao an-tranon''Andriamanitray.'
mg1865::mg_15::8::31:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala teo amin''ny ony Ahava izahay tamin''ny andro faharoa ambin''ny folo tamin''ny volana voalohany mba hankany Jerosalema; ary ny tanan''Andriamanitray nomba anay, ka Izy no namonjy anay tamin''ny tanan''ny fahavalo sy ny mpanotrika teny an-dàlana.'
mg1865::mg_15::8::32:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany Jerosalema izahay, dia nijanona hateloana aloha.'
mg1865::mg_15::8::33:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahefatra no nandanjana ny volafotsy sy ny volamena ary ny fanaka ho eo an-tanan''i Meremota, zanak''i Oria mpisorona, tao an-tranon''Andriamanitray; ary teo aminy koa Eleazara, zanak''i Finehasa; ary teo amin''izy roa lahy koa Jozabada, zanak''i Jesoa, sy Noadia, zanak''i Binoy; Levita izy roa lahy ireo;'
mg1865::mg_15::8::34:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'an-isany sy an-danjany izany rehetra izany; ary voasoratra tamin''izany andro izany ny lanjany rehetra.'
mg1865::mg_15::8::35:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay niverina avy tamin''ny fahababoana dia nanatitra fanatitra dorana ho an''Andriamanitry ny Isiraely, dia vantotr''ombilahy roa ambin''ny folo ho an''ny Isiraely rehetra sy ondrilahy enina amby sivifolo sy zanak''ondry fito amby fito-polo ary osilahy roa ambin''ny folo ho fanatitra noho ny ota: fanatitra dorana ho an''i Jehovah ireo rehetra ireo.'
mg1865::mg_15::8::36:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny didin''ny mpanjaka dia natolony tamin''ny solo-mpanjaka sy ny mpanapaka tamin''ny ety an-dafin''ny ony ety; ary izy ireo nampandroso ny olona sy ny tranon''Andriamanitra.'
mg1865::mg_15::9::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny alahelon''i Ezra, raha nahare fa ny Jiosy efa nifanambady tamin''ny firenena hafa, ary ny nibebahan''ny olona tamin''izany'
  verse_text: 'Ary rehefa vita izany rehetra izany, dia nanatona ahy ny mpanapaka ka nanao hoe: Ny Isiraely sy ny mpisorona ary ny Levita dia tsy mbola miavaka amin''ny olona tompon-tany, fa manao araka ny fahavetavetan''ny Kananita sy ny Hetita sy ny Perizita sy ny Jebosita sy ny Amonita sy ny Moabita sy ny Egyptiana ary ny Amorita ihany izy.'
mg1865::mg_15::9::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa naka tamin''ny zanakavavin''ireo ho vadiny sy ho vadin''ny zananilahy izy, ka efa miharoharo amin''ny olona tompon-tany ny taranaka masina; eny, ny lehibe sy ny mpanapaka aza no nitari-dalana tamin''izany fahadisoana izany.'
mg1865::mg_15::9::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany zavatra izany aho, dia nandriatra ny lambako sy ny akanjoko sady nandrompotra ny volon-dohako sy ny somotro, dia nipetraka tahaka ilay torana iny aho.'
mg1865::mg_15::9::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivory teo amiko izay rehetra nangovitra noho ny tenin''Andriamanitry ny Isiraely ny amin''ny fahadisoan''ny olona izay efa niverina avy tamin''ny fahababoana; ary izaho mbola nipetraka tahaka ilay torana iny ihany hatramin''ny fotoan''ny fanatitra hariva.'
mg1865::mg_15::9::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny fotoan''ny fanatitra hariva dia nody ny aiko, ka nitsangana aho, sady nandriatra ny lambako sy ny akanjoko indray, dia nandohalika nanandratra ny tanako ho amin''i Jehovah Andriamanitro aho'
mg1865::mg_15::9::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Andriamanitro o, menatra sy mangaihay aho, raha miandrandra aminao, ry Andriamanitro o; fa efa nihamaro mihoatra ny lohanay ny helokay, ary ny fahotanay dia lehibe manakatra ny lanitra;'
mg1865::mg_15::9::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hatramin''ny andron''ny razanay ka mandrak androany dia lehibe ny helokay; ary ny helokay no nanolorana anay sy ny mpanjakanay ary ny mpisoronay ho eo an-tànan''ny mpanjakan''ny tany hafa, hovonoin-tsabatra sy ho babo sy ho voaroba ary hangaihay tahaka ny amin''izao anio izao.'
mg1865::mg_15::9::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny vao niseho vetivety ny fahasoavana avy tamin''i Jehovah Andriamanitray tamin''ny namelany anay ho nisy sisa afaka sy tamin''ny nanomezany anay fihantonana* eo amin''ny fitoerany masina, mba hohazavain''Andriamanitray ny masonay ka homena famelombelomana kely amin''ny fahandevozanay izahay. [*Izahao Isaia 22:23]'
mg1865::mg_15::9::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa andevo izahay, nefa tsy nafoin''Andriamanitray, na dia tamin''ny fahandevozanay aza, fa nataony nahazo famindram-po eto imason''ireo mpanjakan''i Persia ihany hanomezany anay famelombelomana, hanangananay ny tranon''Andriamanitray sy hanamboaranay ny rava eo, ary hanomezany anay manda any Joda sy Jerosalema.'
mg1865::mg_15::9::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, ry Andriamanitray o, ahoana no holazainay amin''izany? Fa efa nahafoy ny didinao izahay,'
mg1865::mg_15::9::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ilay nampilazainao ny mpaminany mpanomponao hoe: Ny tany izay efa hidiranareo holovana dia tany maloto noho ny fahalotoan''ny tompon-tany sy ny fahavetavetany, izay efa nataony manenika azy noho ny fahalotoany;'
mg1865::mg_15::9::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa aza manome ny zanakareo-vavy ho vadin''ny zananilahy, na maka ny zananivavy ho vadin''ny zanakareo-lahy; aza mitady izay hiadanany na izay hahasoa azy mandrakizay, mba hahery ianareo ka hihinana ny soa avy amin''ny tany, dia hamela izany ho lovan''ny taranakareo mandrakizay.'
mg1865::mg_15::9::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia efa nanjo anay aza izany rehetra izany noho ny asa ratsinay sy ny fahadisoanay betsaka, dia tsy nampijaly anay araka ny helokay Ianao Andriamanitray, fa efa namela anay ho nisy sisa afaka toy izao ihany,'
mg1865::mg_15::9::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha handika ny didinao indray izahay ka hifanambady amin''ireny olom-betaveta ireny, moa tsy ho tezitra aminay mandra-pahalany ritranay va Ianao, ka tsy hisy sisa afaka akory?'
mg1865::mg_15::9::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Andriamanitry ny Isiraely o, marina Ianao, fa izahay no hany sisa afaka tahaka ny amin''izao anio izao; indreto izahay eto anatrehanao amin''ny fahadisoanay, fa noho izany dia tsy mahajanona eto anatrehanao izahay.'
mg1865::mg_15::10::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nivavaka sy nitsotra Ezra sady nitomany sy niankohoka teo anoloan''ny tranon''Andriamanitra, dia nivory teo aminy ny olona maro be avy tamin''ny Isiraely, na lehilahy, na vehivavy mbamin''ny ankizy madinika; fa nitomany mafy dia mafy koa ny olona.'
mg1865::mg_15::10::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Sekania, zanak''i Jehiela, isan''ny taranak''i Elama, ka nanao tamin''i Ezra hoe: Izahay efa nanao izay mahadiso amin''Andriamanitsika, fa efa naka vehivavy hafa firenena avy tamin''ny tompon-tany ho vadinay; nefa mbola misy fanantenana ihany ho an''ny Isiraely ny amin''izany zavatra izany.'
mg1865::mg_15::10::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka izahay hanao fanekena amin''Andriamanitsika hisaotra ny vady rehetra sy hanary izay naterany araka ny anatra nataonao, tompokolahy, sy izay mangovitra noho ny didin''Andriamanitsika; ary aoka hatao araka ny lalàna izany.'
mg1865::mg_15::10::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, fa adidinao izany; ary indreto koa izahay eto aminao; dia matokia tsara, ka ataovy izany.'
mg1865::mg_15::10::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Ezra ka nampianiana ny lohan''ny mpisorona sy ny Levita ary ny Isiraely rehetra hanao araka izany teny izany; dia nianiana ireo.'
mg1865::mg_15::10::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana niala teo anoloan''ny tranon''Andriamanitra Ezra ka nankany amin''ny efi-trano nitoeran''i Johanana, zanak''i Eliasiba; ary nony tafiditra tao izy, dia tsy mba nihinan-kanina na nisotro rano, fa nalahelo izy noho ny fahadisoan''ny olona izay efa niverina avy tamin''ny fahababoana.'
mg1865::mg_15::10::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandefa teny eran''i Joda sy Jerosalema ireo ho any amin''ny olona rehetra izay efa niverina avy tamin''ny fahababoana mba hivory any Jerosalema;'
mg1865::mg_15::10::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary na iza na iza no tsy tonga amin''ny hateloana araka ny tenin''ny mpanapaka sy ny loholona, dia horobaina* ny fananany rehetra, ary hesorina amin''ny fiangonan''ny olona izay efa niverina avy tamin''ny fahababoana izy. [*Hebreo: hatao herema]'
mg1865::mg_15::10::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny andro fahatelo dia vory tany Jerosalema ny lehilahy rehetra tamin''ny Joda sy ny Benjamina, dia tamin''ny andro faharoa-polo tamin''ny volana fahasivy; ary nipetraka teo an-kalalahana akaikin''ny tranon''Andriamanitra ny olona rehetra ka nangovitra noho izany zavatra izany sy noho ny ranonorana be.'
mg1865::mg_15::10::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Ezra mpisorona ka nanao taminy hoe: Ianareo efa nanao izay mahadiso, satria naka vehivavy hafa firenena ho vadinareo ka nampitombo ny fahadisoan''ny Isiraely.'
mg1865::mg_15::10::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitsora amin''i Jehovah, Andriamanitry ny razanareo, ka ataovy ny sitrapony; ary misaraha amin''ny olona tompon-tany sy ny vehivavy hafa firenena.'
mg1865::mg_15::10::12:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ny fiangonana rehetra ka niredona mafy hoe: Izay lazainao dia tsy maintsy hataonay;'
mg1865::mg_15::10::13:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa maro ny olona, ary fahavaratra ny andro, ka tsy mahatoetra ety ala-trano izahay, sady raharaha tsy vita indray andro na indroa andro aza izao, fa maro izahay no efa nanota tamin''izany zavatra izany;'
mg1865::mg_15::10::14:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa aoka ny mpanapaka anay no hitoetra eto ho solon''ny fiangonana rehetra, ary ny olona rehetra any amin''ny tanànantsika avy izay efa naka vehivavy hafa firenena ho vadiny no aoka hankaty amin''izay fotoan''andro hatao, ary hiaraka aminy koa ny loholony isan-tanàna sy ny mpitsara ao, mandra-pahavitan''izany raharaha izany sy ny hialan''ny firehetan''ny fahatezeran''Andriamanitsika amintsika.'
mg1865::mg_15::10::15:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jonatana, zanak''i Asahela, sy Jahaza, zanak''i Tikva, ihany no nanohitra izany; ary Mesolama sy Sabetahy Levita niandany taminy koa.'
mg1865::mg_15::10::16:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay efa niverina avy tamin''ny fahababoana kosa dia nanaraka izany; ary voatokana Ezra mpisorona sy ny sasany amin''ny lohan''ny fianakaviana, araka ny fianakaviany avy, sady samy efa notononina anarana, dia nipetraka handinika Izany raharaha izany tamin''ny andro voalohany tamin''ny volana fahafolo.'
mg1865::mg_15::10::17:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny andro voalohany tamin''ny volana voalohany dia vitany ny raharaha ny amin''ny lehilahy rehetra Izay efa naka vehivavy hafa firenena ho vadiny.'
mg1865::mg_15::10::18:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hita teo amin''ny taranaky ny mpisorona izay efa naka vehivavy hafa firenena ho vadiny dia izao: Ny teo amin''ny taranak''i Jesoa, zanak''i Jozadaka, sy ny rahalahiny dia Mahaseia sy Eliezera sy Jariba ary Gedalia;'
mg1865::mg_15::10::19:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanola-tanana nanaiky hisaotra ny vadiny izy ireo sy handoa ondriny iray avy ho fanati-panonerany.'
mg1865::mg_15::10::20:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avy tamin''ny taranak''Imera dia Hanany sy Zebedia;'
mg1865::mg_15::10::21:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Harima dia Mahaseia sy Elia sy Semaia sy Jehiela ary Ozia;'
mg1865::mg_15::10::22:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Pasora dia Elioenay sy Mahaseia sy Isimaela sy Netanela sy Jozabada ary Elasa.'
mg1865::mg_15::10::23:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avy tamin''ny Levita dia Jozabada sy Simey sy Kelaia (Kelita izany) sy Petahia sy Joda ary Eliezera:'
mg1865::mg_15::10::24:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny mpihira dia Eliasiba; ary ny avy tamin''ny mpiandry varavarana dia Saloma sy Talema ary Ory.'
mg1865::mg_15::10::25:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avy tamin''ny Isiraely koa: ny avy tamin''ny taranak''i Parosy dia Ramia sy Jizia sy Malkia sy Miamina sy Eleazara sy Malkia ary Benaia;'
mg1865::mg_15::10::26:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Elema dia Matania sy Zakaria sy Jehiela sy Abdia sy Jeremota ary Elia;'
mg1865::mg_15::10::27:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Zato dia Elioenay sy Eliasiba sy Matania sy Jeremota sy Zabada ary Aziza;'
mg1865::mg_15::10::28:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Bebay dia Johanana sy Hanania sy Zabay sy Atlay;'
mg1865::mg_15::10::29:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Bany dia Mesolama sy Maloka sy Adaia sy Jasoba sy Seala ary Ramota;'
mg1865::mg_15::10::30:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Pahata-moaba dia Adna sy Kelala sy Benaia sy Mahaseia sy Matania sy Bezalila sy Binoy ary Manase;'
mg1865::mg_15::10::31:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny taranak''i Harima dia Eliezera sy Jisia sy Malkia sy Semaia sy Simeona'
mg1865::mg_15::10::32:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Benjamina sy Maloka ary Semaria;'
mg1865::mg_15::10::33:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy tamin''ny taranak''i Hasoma dia Matenay sy Matata sy Zabada sy Elifeleta sy Jeremay sy Manase ary Simey;'
mg1865::mg_15::10::34:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy tamin''ny taranak''i Bany dia Maday sy Amrama sy Oela'
mg1865::mg_15::10::35:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Benaia sy Bedeia sy Keloho'
mg1865::mg_15::10::36:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Vania sy Meremota sy Eliasiba'
mg1865::mg_15::10::37:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Matania sy Matenay sy Jasao'
mg1865::mg_15::10::38:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Bany sy Binoy sy Simey'
mg1865::mg_15::10::39:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Selemia sy Natana sy Adaia'
mg1865::mg_15::10::40:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Maknadebay sy Sasay sy Saray'
mg1865::mg_15::10::41:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Azarela sy Selemia sy Semaria'
mg1865::mg_15::10::42:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Saloma sy Amaria ary Josefa;'
mg1865::mg_15::10::43:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy tamin''ny taranak''i Nebo dia Jeiela sy Matitia sy Zabada sy Zebina sy Jadao sy Joela ary Benaia.'
mg1865::mg_15::10::44:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 10
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireny rehetra ireny no samy efa naka vehivavy hafa firenena ho vadiny avokoa, sady efa niteraka ny vehivavy sasany tamin''ireny'
