mg1865::mg_15::1::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny nataon''i Kyrosy nandefasana ny Jiosy hody, sy ny nanomezany azy ny fanaka avy tao amin''ny tempoly'
  verse_text: 'Ary tamin''ny taona voalohany nanjakan''i Kyrosy, mpanjakan''i Persia, dia notairin''i Jehovah ny fanahin''i Kyrosy, mpanjakan''i Persia, mba hanatanteraka ny tenin''i Jehovah izay nampilazainy an''i Jeremia, ka dia nandefa teny eran''ny fanjakany rehetra izy, sady nataony an-tsoratra koa izany hoe:'
mg1865::mg_15::1::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Kyrosy, mpanjakan''i Persia: Ny fanjakana rehetra ambonin''ny tany dia efa nomen''i Jehovah, Andriamanitry ny lanitra, ahy; ary Izy efa nandidy ahy hanao trano ho Azy any Jerosalema izay any Joda.'
mg1865::mg_15::1::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa iza avy moa aminareo rehetra no olony? Andriamaniny anie homba azy, fa aoka hiakatra any Jerosalema izay any Joda izy ka hanao ny tranon''i Jehovah, Andriamanitry ny Isiraely, Izy no Andriamanitra Izay any Jerosalema.'
mg1865::mg_15::1::4:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza sisa tratra, dia aoka ny tompon-tany ao amin''izay ivahiniany hanome azy volafotsy sy volamena sy fanaka ary biby fiompy mbamin''ny fanati-tsitrapo ho an''ny tranon''Andriamanitra, izay any Jerosalema.'
mg1865::mg_15::1::5:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ny lohan''ny firenen''i Joda sy Benjamina sy ny mpisorona sy ny Levita, dia izay rehetra efa namporisihin''Andriamanitra hiakatra hanao ny tranon''i Jehovah any Jerosalema.'
mg1865::mg_15::1::6:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra manodidina dia nampahery ny tanan''ireo tamin''ny fanaka volafotsy sy volamena sy fanaka hafa sy biby fiompy ary zava-tsoa mbamin''izay rehetra nateriny tamin''ny sitrapo.'
mg1865::mg_15::1::7:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia navoak''i Kyrosy mpanjaka ny fanaky ny tranon''i Jehovah, izay efa nalain''i Nebokadnezara tany Jerosalema ka efa nataony tao an-tranon''ireo andriamaniny.'
mg1865::mg_15::1::8:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mitredata, mpitahiry ny haren''ny fanjakana, dia nasain''i Kyrosy, mpanjakan''i Persia; namoaka ireny, ka nisainy sady natolony an''i Sesbazara, lehiben''ny firenen''i Joda.'
mg1865::mg_15::1::9:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no isany: Lovia volamena telo-polo, lovia volafotsy arivo, antsy sivy amby roa-polo,'
mg1865::mg_15::1::10:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'kapoaka volamena misarona telo-polo, lovia volafotsy manarakaraka folo amby efa-jato, ary lovia hafa koa arivo;'
mg1865::mg_15::1::11:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'efa-jato amby dimy arivo no isan''ny fanaka volamena sy volafotsy rehetra. Ireo rehetra ireo dia nentin''i Sesbazara niaraka nankany Jerosalema tamin''ny babo izay niverina avy tany Babylona.'
mg1865::mg_15::2::1:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny anaran''ny Jiosy nentin''i Zerobabela nody'
  verse_text: 'Ary izao no olona amin''izany tany izany izay niakatra avy amin''ny fahababoana, izay nobaboin''i Nebokadnezara, mpanjakan''i Babylona, ka nentiny ho any Babylona, ary niverina ho any Jerosalema sy Joda, samy ho any an-tanànany avy,'
mg1865::mg_15::2::2:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny olona izay niaraka tamin''i Zerobabela sy Jesoa sy Nehemia sy Seraia sy Relaia sy Mordekay sy Bilsana sy Mispara sy Bigvay sy Rehoma ary Bana. Ary ny isan''ny lehilahy tamin''ny Isiraely dia izao:'
mg1865::mg_15::2::3:
  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Parosy dia roa amby fito-polo amby zato sy roa arivo;'
