  verse_version: mg1865
  verse_book: mg_15
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny taranak''i Sefatia dia roa amby fito-polo amby telon-jato;'
