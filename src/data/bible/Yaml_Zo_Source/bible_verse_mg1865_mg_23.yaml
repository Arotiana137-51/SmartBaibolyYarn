mg1865::mg_23::1::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahitan''Isaia, zanak''i Amoza, izay hitany ny amin''ny Joda sy Jerosalema tamin''ny andron''i Ozia sy Jotama sy Ahaza ary Hezekia, izay samy mpanjakan''ny Joda.'
mg1865::mg_23::1::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny alahelon''i Jehovah noho ny niodinan''ny Isiraely, ary ny nananarany azy sy ny nokasainy hatao aminy'
  verse_text: 'Mandrenesa, ry lanitra, ary mihainoa, ry tany, Fa Jehovah no miteny hoe: Efa nitaiza sy nahalehibe zaza Aho, Kanjo niodina tamiko ireo.'
mg1865::mg_23::1::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny omby mahalala ny tompony, Ary ny boriky ny fihinanam-bilon''ny tompony; Fa ny Isiraely tsy mahalala, Ny oloko tsy misaina.'
mg1865::mg_23::1::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! firenena mpanota, olona mavesa-keloka, Taranaka mpanao ratsy, zanaka mpanao meloka! Efa nahafoy an''i Jehovah izy, Efa nanamavo ny Iray Masin''ny Isiraely. Efa nihodina izy.'
mg1865::mg_23::1::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mbola ta-hasiana ihany ianareo noho izao fiodinanareo lalandava izao? Henika aretina avokoa ny loha rehetra, Ary marary ny fo rehetra.'
mg1865::mg_23::1::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny faladia ka hatramin''ny loha dia tsy misy izay tsy marary, Fa ratra sy dian-kapoka ary fery vao; Tsy mbola voaporitra, na voafehy, na voalemin''ny diloilo izy.'
mg1865::mg_23::1::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taninareo dia efa lao; Ny tanànanareo dia voadotra tamin''ny afo; Ny tany volenareo dia lanin''ny fahavalo* eo imasonareo, ary lao izy toy ny efa noravan''ny fahavalo*. [*Hebreo: hafa firenena]'
mg1865::mg_23::1::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ziona zanakavavy dia nilaozana tahaka ny trano rantsan-kazo ao anaty tanim-boaloboka, Sy tahaka ny fandriana mihantona an''ny mpiandry voly ao anaty tanimbolim-boantango*, Dia tahaka ny tanàna atao fahirano. [*voantangom-bazaha]'
mg1865::mg_23::1::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: '2022-07-05T10:03:48+0000'
  verse_title: null
  verse_text: 'Raha tsy nosisan''i Jehovah Tompon''ny maro, olona vitsivitsy isika, dia efa tonga tahaka an''i Sodoma ary nitovy tamin''i Gomora.'
mg1865::mg_23::1::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandrenesa ny tenin''i Jehovah, ry mpitsaran''i Sodoma; Mihainoa ny lalàn''Andriamanitsika, ry vahoakan''i Gomora.'
mg1865::mg_23::1::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? hoy Jehovah; Efa tofoka ny ondrilahy atao fanatitra dorana sy ny saboran''ny zanak''omby mifahy Aho, Ary tsy sitrako ny ran''ny vantotr''ombilahy sy ny an''ny zanak''ondry ary ny an''ny osilahy.'
mg1865::mg_23::1::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha avy miseho eo anatrehako ianareo, Iza moa no nitady anareo hanitsakitsaka ny kianjako?'
mg1865::mg_23::1::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitondra fanati-poana intsony; Fofona fahavetavetana amiko izany! Ny voaloham-bolana sy ny Sabata ary ny fiantsoam-piangonana— Tsy zakako ny fivoriana masina haroharoam-paharatsiana!'
mg1865::mg_23::1::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voaloham-bolanareo sy ny fotoam-pivavahanareo dia halan''ny fanahiko, Mavesatra amiko izany, Ka sasatra mitondra azy Aho.'
mg1865::mg_23::1::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mananty tanana ianareo, Dia hitampi-maso tsy hijery anareo Aho; Eny, na dia manao vavaka be aza ianareo, dia tsy hihaino Aho; Feno ran''olona* ny tananareo. [*Hebreo: rà nalatsaka]'
mg1865::mg_23::1::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misasà ianareo, diovy ny tenanareo, Esory tsy ho eo anoloan''ny masoko ny ratsy fanaonareo; Mitsahara, fa aza manao ratsy;'
mg1865::mg_23::1::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mianara hanao ny tsara, Diniho izay rariny, anaro ny mpampahory, Omeo rariny ny kamboty, tsarao ny adin''ny mpitondratena.'
mg1865::mg_23::1::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia ary hifandahatra isika, hoy Jehovah: Na dia tahaka ny jaky aza ny fahotanareo, Dia ho fotsy tahaka ny oram-panala, Na dia mangatrakatraka tahaka ny sily aza, Dia ho tahaka ny volon''ondry fotsy.'
mg1865::mg_23::1::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manaiky sy mankatò ianareo, dia hihinana ny voka-tsoa amin''ny tany;'
mg1865::mg_23::1::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola mandà sy miodina ihany ianareo, Dia ho lanin''ny sabatra: Fa ny vavan''i Jehovah no efa niteny.'
mg1865::mg_23::1::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! tonga janga ity tanàna mahatoky Izay feno ny rariny taloha Sady nitoeran''ny fahamarinana, Fa ankehitriny kosa mpamono olona no ao.'
mg1865::mg_23::1::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volafotsinao efa tonga tain-drendrika; Ny divainao efa voatsatso rano;'
mg1865::mg_23::1::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: '2022-07-05T10:03:26+0000'
  verse_title: null
  verse_text: 'Ny lehibenao dia mpiodina sady naman''ny mpangalatra; Samy tia kolikoly sy fatra-nitady tambitamby avokoa izy rehetra; Ny kamboty tsy mba omeny rariny, Ary ny adin''ny mpitondratena tsy avelany ho entina eo anatrehany.'
mg1865::mg_23::1::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy Jehovah, Tompon''ny maro, Ilay Maherin''ny Isiraely: E! hiala fo amin''ny mandrafy Ahy Aho Ary hamaly ny fahavaloko.'
mg1865::mg_23::1::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hamerina ny tanako ho aminao Aho, Ka hodioviko amin''ny lavenona* ianao hahafahan''ny tain-drendrikao, ary hesoriko ny firaka rehetra aminao. [*Hebreo: sirahazo]'
mg1865::mg_23::1::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampodiko ho toy ny teo aloha ny mpitsaranao, Ary ny mpanolo-tsainao ho toy ny tamin''ny voalohany; Ary rehefa afaka izany, ianao dia hantsoina hoe: Tanànan''ny fahamarinana, Tanàna mahatoky.'
mg1865::mg_23::1::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ziona havotana amin''ny fitsarana, ary izay efa mibebaka* ao dia havotana amin''ny fahamarinana; [*Hebreo: miverina]'
mg1865::mg_23::1::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy haringana avokoa ny mpiodina sy ny mpanota, Eny, ho lany ritra izay mahafoy an''i Jehovah.'
mg1865::mg_23::1::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hahazo henatra ianareo* noho ny amin''ny hazo terebinta izay nifalianareo, ary hangaihay ianareo noho ny amin''ny saha izay natokanareo. [*Hebreo: izy]'
mg1865::mg_23::1::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho tahaka ny hazo terebinta malazo ravina ianareo, Sy ho tahaka ny saha tsy misy rano.'
mg1865::mg_23::1::31:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mahery ho tahaka ny vohavoha, Ary ny asany ho tahaka ny kilalaon''afo, Dia hiaraka hodorana izy roa tonta, Ka tsy hisy hamono ny afo.'
mg1865::mg_23::2::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny voninahitra marina voatendry ho an''ny Isiraely, sy ny hanafoanana ny voninahiny tsy izy'
  verse_text: 'Ny teny izay hitan''Isaia, zanak''i Amoza, ny amin''ny Joda sy Jerosalema.'
mg1865::mg_23::2::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho tonga any am-parany: Ny tendrombohitra misy ny tranon''i Jehovah dia haorina eo an-tampon''ny tendrombohitra Ary hasandratra ho avo noho ny havoana; Ary ny jentilisa rehetra hitanjozotra hankany.'
mg1865::mg_23::2::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, maro ny firenena no hiainga ka hanao hoe: Andeha isika hiakatra any an-tendrombohitr''i Jehovah, Ho any an-tranon''Andriamanitr''i Jakoba, Mba hampianarany antsika ny amin''ny lalany, Ka handehanantsika amin''ny atorony; Fa avy any Ziona no hivoahan''ny lalàna, Ary avy any Jerosalema ny tenin''i Jehovah.'
mg1865::mg_23::2::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitsara ny adin''ny jentilisa Izy Ka hampiaiky firenena maro; Dia hanefy ny sabany ho fangady ireny, Ary ny lefony ho fanetezam-boaloboka; Ny firenena tsy hanainga sabatra hifamely Na hianatra ady intsony'
mg1865::mg_23::2::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry taranak''i Jakoba, Avia, ary aoka isika handeha amin''ny fahazavan''i Jehovah.'
mg1865::mg_23::2::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nanary ny taranak''i Jakoba olonao Ianao, Satria feno ny fanao avy any atsinanana izy Ary efa mpanandro tahaka ny Filistina Sady efa be* zana-bahiny. [*Na: sady efa nanao fanekena tamin''ny]'
mg1865::mg_23::2::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taniny dia feno volafotsy sy volamena. Sady tsy hita lany ny hareny; Ary ny taniny dia feno soavaly, Sady tsy hita isa ny kalesiny;'
mg1865::mg_23::2::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taniny dia feno andriamani-tsy izy koa; Eo anatrehan''ny asan''ny tanany no iankohofany, Dia izay nataon''ny rantsan-tanany;'
mg1865::mg_23::2::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny zanak''olombelona hatao mitanondrika, Ary ny olona haetry, Ary aza mamela ny helony Ianao!'
mg1865::mg_23::2::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midira ao amin''ny vatolampy, Ary miere ao amin''ny vovoka Noho ny tahotra avy amin''i Jehovah Sy ny voninahitry ny fahalehibiazany.'
mg1865::mg_23::2::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiandranandran''ny mason''ny zanak''olombelona dia haetry, Ary ny fiavonavonan''ny olona hatao mitanondrika; Fa Jehovah ihany no hisandratra amin''izany andro izany.'
mg1865::mg_23::2::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy andron''i Jehovah, Tompon''ny maro, Hitsarana izay avo sy ambony toetra rehetra Ary izay misandratra rehetra, Ka dia haetry ireny,'
mg1865::mg_23::2::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny sedera rehetra any Libanona, izay avo sady andrandraina, Sy ny hazo oka rehetra any Basana'
mg1865::mg_23::2::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy ny tendrombohitra avo rehetra Sy ny havoana andrandraina'
mg1865::mg_23::2::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy ny tilikambo miringiringy rehetra Sy ny manda mafy rehetra'
mg1865::mg_23::2::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy ny sambon''i Tarsisy rehetra Sy ny tao-zavatra tsara tarehy rehetra;'
mg1865::mg_23::2::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fireharehan''ny zanak''olombelona hatao mitanondrika, Ary ny fiavonavonan''ny olona haetry; Fa Jehovah ihany no hisandratra amin''izany andro izany.'
mg1865::mg_23::2::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andriamani-tsy izy dia ho foana avokoa.'
mg1865::mg_23::2::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiditra ao amin''ny zohy sy ny lava-bato ny olona Noho ny tahotra avy amin''i Jehovah sy ny voninahitry ny fahalehibiazany, Rehefa mitsangana hampihorohoro ny tany Izy.'
mg1865::mg_23::2::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia harian''ny olona Ho an''ny voalavo sy ny manavy Ny andriamani-bolafotsiny sy ny andriamani-bolamenany Izay nataony hiankohofany eo anatrehany'
mg1865::mg_23::2::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hidirany eo amin''ny fitriatry ny vatolampy sy eo an-tsefatsefaky ny harambato Noho ny tahotra avy amin''i Jehovah Sy ny voninahitry ny fahalehibiazany, Rehefa mitsangana hampihorohoro ny tany Izy.'
mg1865::mg_23::2::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsahara, fa aza mitoky amin''ny olona; Fa fofonaina foana no eo am-bavorony, Ka hatao zinona izy?'
mg1865::mg_23::3::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Jehovah, Tompon''ny maro, Manaisotra amin''i Jerosalema sy Joda izay andry sy tohana rehetra: Dia ny mofo sy ny rano rehetra, izay tohan''aina,'
mg1865::mg_23::3::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehilahy mahery sy ny mpiady, Ny mpitsara sy ny mpaminany, Ny mpanao fankatovana sy ny loholona,'
mg1865::mg_23::3::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpifehy ny dimam-polo sy ny manan-kaja, Ny mpanolo-tsaina sy ny mahay zavatra Ary ny mahay ny fiboeriboeriky ny mpanao ody.'
mg1865::mg_23::3::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanendry ankizilahy madinika ho lehibeny Aho, Ary ny haitraitran-jaza no hanapaka azy.'
mg1865::mg_23::3::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hifanipaka izy samy iray firenena, Dia samy ny namany avy sy ny akaiky azy avy; Ny tovolahy hirehareha amin''ny anti-panahy, Ary ny tsy manan-daza amin''ny manan-daza.'
mg1865::mg_23::3::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona angatahin*''ny rahalahiny ao an-tranon-drainy ka ataony hoe: Ianao no manana lamba, koa aoka ho mpanapaka anay, Ary aoka ity faharavana ity ho raharahanao, [*Hebreo: hazon'']'
mg1865::mg_23::3::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly izy amin''izany andro izany hoe: Tsy mety ho dokotera aho, Fa ao an-tranoko tsy misy hanina na lamba; Koa tsy azonareo hatao mpanapaka ny olona aho.'
mg1865::mg_23::3::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tafintohina Jerosalema, Ary potraka Joda, satria ny lelany sy ny asany dia samy manohitra an''i Jehovah Mba hihaika ny mason''ny voninahiny.'
mg1865::mg_23::3::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisehon''ny tarehiny miampanga azy; Ary mampiharihary ny fahotany tahaka an''i Sodoma izy ka tsy manafina azy. Lozan''ny fanahiny! Fa mampidi-doza amin''ny tenany izy.'
mg1865::mg_23::3::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaonareo ny amin''ny marina fa hahita soa izy, Fa ny vokatry ny asany no hohaniny.'
mg1865::mg_23::3::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ny ratsy fanahy! hiharan''ny ratsy izy, Satria ny valin''ny nataon''ny tanany ihany no hanody azy.'
mg1865::mg_23::3::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny oloko, dia zaza no mampahory azy, Ary ireo vehivavy no manapaka azy. Ry oloko o, ny mpitarika anao no mampivily anao Sady mandrava ny lalana alehanao.'
mg1865::mg_23::3::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mitsangana handahatra Ka miatrika hitsara ny firenena.'
mg1865::mg_23::3::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah miampanga ny loholona sy ny lehiben''ny olony amin''ny fitsarana hoe: Ianareo no efa nandevona ny tanim-boaloboka; Ary ao an-tranonareo ny fananan''ny malahelo izay efa nalaina an-keriny.'
mg1865::mg_23::3::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no hevitrareo no dia hosihosenareo ny oloko, Ary torotoroinareo ny tavan''ny malahelo ? Hoy Jehovah, Tompon''ny maro.'
mg1865::mg_23::3::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jehovah: Satria miavona ireo zanakavavin''i Ziona ka mandeha mianjonanjona sy manao maso meloka Sady kasikasy fandeha Ary mampikorintsandrintsana ny fehin-tongony,'
mg1865::mg_23::3::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho izany dia hataon''ny Tompo feno tako-pery ny tampon-dohan''ny zanakavavin''i Ziona, Ary Jehovah hampiseho ny fitanjahany.'
mg1865::mg_23::3::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hesorin''i Jehovah ny firavaka rehetra, na ny fehin-tongotra, Na ny fehi-loha*, na ny sarim-bolan-tsinana, [*Na: voavola]'
mg1865::mg_23::3::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny kavina voavola, na ny rojo*, na ny fisalobonana makarakara, [*Na: haba]'
mg1865::mg_23::3::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny satroka*, na ny rojo parapaingo, na ny fehin-kibo misy haingony, Na ny fitoeran-dranomanitra, na ny ody fanaony ravaka, [*Hebreo: diadema]'
mg1865::mg_23::3::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny peratra, na ny kavin''orona,'
mg1865::mg_23::3::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny akanjo fihaingoana, na ny kapoty, Na ny saly, na ny poketra,'
mg1865::mg_23::3::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny fitaratra fizahana, na ny akanjo somizy anatiny, Na ny satroka fihaingoana*, na ny lamba fisaronana; [*He. hamama]'
mg1865::mg_23::3::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny manitra hosoloana ny maimbo; Ary ny fehin-kibo tsara hosoloana ny mahazaka; Ary ny volo voavoatra tsara hosoloana ny boriana; Ary ny akanjo miebanebana hosoloana ny lamba fisaonana*; Ary ny hatsaran-tarehy hosoloana ny tomboka amin''ny vy mahamay. [*Hebreo: lamba malailay]'
mg1865::mg_23::3::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehilahy ao aminao ho lavon-tsabatra, Ary ny mahery ao aminao ho faty an''ady;'
mg1865::mg_23::3::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hitomany sy hisaona ny vavahadiny; Ary ho lao ny tanàna ka hanjokaiky,'
mg1865::mg_23::4::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hisy vehivavy fito hihazona lehilahy iray ka hanao hoe: Ny haninay ihany no hohaninay, ary ny lambanay ihany no hotafinay; Fa izao ihany no angatahinay: Aoka hotononina amin''ny anaranao izahay, Ka afaho tondromaso'
mg1865::mg_23::4::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany ny rantsan*''i Jehovah dia ho tonga fahatsaran-tarehy sy voninahitra, Ary ny vokatry ny tany dia ho rehareha sy firavaka ho an''ny Isiraely sisa afaka; [*Na: solofon'']'
mg1865::mg_23::4::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay sisa any Ziona sy izay mbola mitoetra any Jerosalema dia hatao hoe masina. Dia izay rehetra voasoratra ho isan''ny velona any Jerosalema.'
mg1865::mg_23::4::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa voasasan''ny Tompo ho afaka amin''ny fahalotoany ireo zanakavavin''i Ziona, Ary rehefa voadion''ny fanahy fitsarana, sy ny fanahy fandringanana Jerosalema, Ho afaka amin''ny ran''olona nalatsany.'
mg1865::mg_23::4::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hamorona rahona sy setroka raha antoandro Sy fahazavan''ny afo midedadeda nony alina Ho eny ambonin''ny fitoerana rehetra any an-tendrombohitra Ziona Sy ho eny ambonin''ny fivoriany rehetra; Ary eny ambonin''ny voninahitra rehetra dia hisy eloelo'
mg1865::mg_23::4::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hisy trano-lay ho fialokalofana amin''ny hainandro raha antoandro Ary ho fialofana sy fierena amin''ny tafio-drivotra sy ny ranonorana.'
mg1865::mg_23::5::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Isiraely. tanim-boalobok''i Jehovah, sy ny hanjo azy'
  verse_text: 'Aoka aho hihira ny amin*''ny Malalako, dia hiran''ny Malalako ny amin''ny tanim-boalobony. Ny Malalako nanana tanim-boaloboka tao an-kavoana lonaka; [*Na: ho an'']'
mg1865::mg_23::5::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasainy io, ka nesoriny ny vato, Ary novoleny karazam-boaloboka tsara, Sady nanao tilikambo teo afovoany Izy Ary nandavaka famiazam-boaloboka teo; Dia nanantena azy hamoa voaloboka tsara Izy, Kanjo namoa voalobo-dratsy.'
mg1865::mg_23::5::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany, ry mponina any Jerosalema sy ry lehilahy amin''ny Joda, Masïna ianareo, tsarao Aho sy ny tanim-boaloboko.'
mg1865::mg_23::5::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona moa no mbola azo natao tamin''ny tanim-boaloboko, Ka tsy efa nataoko taminy? Koa raha nanantena azy hamoa voaloboka tsara Aho, Nahoana no namoa voalobo-dratsy izy?'
mg1865::mg_23::5::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia aoka hambarako anareo izay hataoko amin''ny tanim-boaloboko: Hesoriko ny fefy tsilony, ka dia holevonina izy; Ary harodako ny fefy vatony, ka dia ho voahitsakitsaka izy;'
mg1865::mg_23::5::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko simba dia simba izy; Tsy hohetezana ny sakeli-boalobony, ary tsy hohevoina izy, Fa ho rakotry ny hery sy ny tsilo; Ary hodidiako ny rahona* tsy hampilatsaka ranonorana aminy. [*Hebreo: rahona matevina]'
mg1865::mg_23::5::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny taranak''i Isiraely no tanim-boalobok''i Jehovah, Tompon''ny maro, Ary ny lehilahy amin''ny Joda no voly tiany; Dia nanantena fitsarana marina Izy, kanjo fandatsahan-drà*; Niandry fahamarinana Izy, kanjo, indro, fitarainana. [*Na: fampahoriana]'
mg1865::mg_23::5::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo izay mangorona trano lalandava Sady mampiharo vala ny saha amin''ny saha, Ambara-paha-tsy hisy hitoeran''ny sasany intsony, Mba ho tonga mponina manirery eo amin''ny tany ianareo!'
mg1865::mg_23::5::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ren''ny sofiko avy amin''i Jehovah, Tompon''ny maro: Marina tokoa fa ho foana ny trano maro, Eny, na dia izay lehibe sady tsara aza dia tsy hisy mpitoetra.'
mg1865::mg_23::5::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary bata iray monja no ho vokatry ny tanim-boaloboka folo Zemeda*, Ary rehefa iray monja no ho vokatry ny voan-javatra eran''ny homera. [*Zemeda dia anaram-pandrefesana, tokony ho antsasaky ny akera]'
mg1865::mg_23::5::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay mifoha maraina koa ka mitady toaka! Izay miboboka mandra-paharivan''ny andro ka ampirehetin''ny divay!'
mg1865::mg_23::5::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lokanga sy ny valiha, ny ampongatapaka sy ny sodina ary ny divay no foto-panasany; Fa ny asan''i Jehovah tsy mba jereny, Ary ny ataon''ny tanany tsy mba hitany.'
mg1865::mg_23::5::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ho lasan-ko babo ny oloko noho ny tsy fahalalany, Ary ny olona ambony ho mosarena, Ary ny valalabemandry ho main''ny hetaheta.'
mg1865::mg_23::5::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no mampitanatana vava ny fiainan-tsy hita* Hanao teli-moka an''i Jerosalema**; Ary any no hivarinan''ny voninahiny sy ny fihahohahony ary ny tabatabany mbamin''izay mifalifaly ao aminy; [*He. Sheola] [**Hebreo: azy]'
mg1865::mg_23::5::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''olombelona dia hatao mitanondrika, Ary ny olona haetry, Ary ny mason''ny miandranandrana dia haidina.'
mg1865::mg_23::5::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah, Tompon''ny maro, no hisandratra amin''ny fitsarana, Ary Andriamanitra masina dia hiseho ho masina amin''ny fahamarinana.'
mg1865::mg_23::5::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''ondry hikania toy ny eny amin''ny tany fiandrasana azy ihany; Ary ny tany foana izay nipetrahan''ny matavy, dia mpirenireny no hiandry ondry ao.'
mg1865::mg_23::5::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay mitari-keloka amin''ny kofehin''ny faharatsiana Ary mitarika ota toy ny amin''ny mahazakan-tsariety,'
mg1865::mg_23::5::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay manao hoe: Aoka hohafainganiny sy hododonany ny asany, mba ho hitantsika, Ary aoka izay kasain''ny Iray Masin''ny Isiraely ho mby akaiky ka ho tanteraka, mba ho fantatsika!'
mg1865::mg_23::5::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay milaza ny ratsy ho tsara ary na tsara ho ratsy! Izay manao ny maizina ho mavaza ary ny mazava ho maizina! Izay manao ny mangidy ho mamy ary ny mamy ho mangidy!'
mg1865::mg_23::5::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay manao azy ho hendry sy manao azy ho mazava saina!'
mg1865::mg_23::5::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay fatratra nefa amin''ny fisotroan-divay ihany, sy izay kanto* nefa amin''ny fampiharoharoana toaka ihany! [*Hebreo: mahery]'
mg1865::mg_23::5::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay manamarina ny meloka noho ny kolikoly sy manala ny rariny amin''ny marina!'
mg1865::mg_23::5::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa toy ny fandevonan''ny lelafo ny mololo, ary toy ny fifitsaky ny bozaka midedadeda, dia toy izany no hahalovan''ny fakany sy hijofoan''ny voniny hanjary vovoka, satria efa nandà ny lalàn''i Jehovah, Tompon''ny maro izy Sy nanamavo ny tenin''ny Iray Masin''ny Isiraely.'
mg1865::mg_23::5::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no irehetan''ny fahatezeran''i Jehovah amin''ny olony sy aninjirany ny tanany aminy ka amelezany azy; Dia mihorohoro ny tendrombohitra, ary ny fatin''ny olona dia tonga tahaka ny diky eny an-dalambe. Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany, fa mbola mihinjitra ihany ny tanany.'
mg1865::mg_23::5::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanangana faneva ho amin''ny firenena lavitra Izy sady hisiaka hiantso ny iray avy any am-paran''ny tany; Ary, indro, ho avy faingana dia faingana ireo*; [*Hebreo: mahery]'
mg1865::mg_23::5::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisy reraka na tafintohina ao aminy; Tsy ho rendrehana na hatory izy: Tsy hiboraka ny fehin-kibony, ary tsy ho tapaka ny fehin-kapany,'
mg1865::mg_23::5::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maranitra ny zana-tsipïkany, Ary voahenjana avokoa ny tsipïkany; Ny kitron-tsoavaliny atao ho tahaka ny afovato; Ary ny kodiany ho tahaka ny tadio;'
mg1865::mg_23::5::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fierony dia tahaka ny fieron''ny liom-bavy, Ary mierona tahaka ny liona tanora izy; Eny, manerona izy ka mandrapaka ny toha, Dia lasany, ka tsy azo alaina intsony.'
mg1865::mg_23::5::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hirohondrohona aminy amin''izany andro izany izy Tahaka ny firohondrohon''ny ranomasina; Ary raha mijery ny tany ny olona, dia indro aizina sy fahoriana; Ary ny fahazavana hohamaizinin''ny rahona.'
mg1865::mg_23::6::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanendrena an''Isaia ho mpaminany'
  verse_text: 'Tamin''ny taona nahafatesan''i Ozia mpanjaka no nahitako ny Tompo nipetraka teo ambonin''ny seza fiandrianana avo sady manerinerina, ary ny ebaneban''akanjony nahafeno ny tempoly.'
mg1865::mg_23::6::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy serafima nitsangana teo amboniny, samy nanana elatra enina avy; ny roa nanaronany ny tavany, ny roa nanaronany ny tongony, ary ny roa nanidinany.'
mg1865::mg_23::6::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanandratra ny feony izy ka nifamaly hoe: Masina, masina, masina Jehovah, Tompon''ny maro; Henika ny voninahiny ny tany rehetra*. [*Na: Voninahiny avokoa ny eran''ny tany]'
mg1865::mg_23::6::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihorohoro ny fanambanin''ny tokonana noho ny feon''ireo nanandratra ny feony; ary feno setroka ny trano.'
mg1865::mg_23::6::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Lozako! maty aho! fa lehilahy maloto molotra, sady ato amin''ny firenena maloto molotra no itoerako, fa ny mpanjaka, dia Jehovah, Tompon''ny maro, no efa hitan''ny masoko.'
mg1865::mg_23::6::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanidina nanatona ahy ny serafima anankiray nitondra vain''afo* teny an-tanany, izay nalainy tamin''ny ny tandra avy teo amin''ny alitara. [*Na: vato mahamay]'
mg1865::mg_23::6::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary natehiny ny vavako izany, ka hoy izy: Indro, efa nitehika tamin''ny molotrao io; ka dia afaka ny helokao, ary voavela ny fahotanao.'
mg1865::mg_23::6::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandre ny feon''ny Tompo aho nanao hoe: Iza no hirahiko, ary iza no handeha ho irakay? Dia hoy izaho: Inty aho, iraho aho.'
mg1865::mg_23::6::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Mandehana, ka lazao amin''ity firenena ity hoe: Mandrenesa mandrakariva ihany ianareo, nefa aza mahalala; Ary mijere mandrakariva ihany ianareo, nefa aza mahafantatra.'
mg1865::mg_23::6::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy adala ny fon''ity firenena ity, Ary ataovy lalodalovana ny sofiny, Ary ataovy mikimpy ny masony, Fandrao hahita ny masony, Sy handre ny sofiny, Ary hahalala ny fony, Dia hibebaka izy ka ho sitrana.'
mg1865::mg_23::6::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho: Tompo o, mandra-pahoviana anefa? Dia hoy Izy: Mandra-pahafoanan''ny tanàna, ka tsy hisy mponina, Ary ny trano tsy hisy olona, Ary ny tany ho lao tokoa;'
mg1865::mg_23::6::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hampandeha lavitra ny olona, Ka ho be ny lao ao amin''ny tany;'
mg1865::mg_23::6::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia misy ampahafolony aza sisa, Dia mbola hosimbana ihany koa izany Kanefa kosa tahaka ny hazo terebinta sy ny oka, Izay mbola misy fotony ihany na dia voakapa aza, Dia toy izany no mbola hisiana taranaka masina ho fotony.'
mg1865::mg_23::7::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hahaterahan''Imanoela, sy ny amin''ny handravana ny fanjakan''i Siria sy Efraima'
  verse_text: 'Ary tamin''ny andron''i Ahaza, zanak''i Jotama, zanak''i Ozia, mpanjakan''ny Joda, no niakaran-dRezina, mpanjakan''i Syria, sy Pelza, zanak''i Remalia, mpanjakan''ny Isiraely, hanafika an''i Jerosalema, nefa tsy nahafaka azy izy.'
mg1865::mg_23::7::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambara tamin''ny taranak''i Davida hoe: Injao ny Syriana efa mitoby any amin''ny Efraima. Ary nirondrona ny fony sy ny fon''ny vahoakany toy ny firondronan''ny hazo any an''ala, raha asian''ny rivotra.'
mg1865::mg_23::7::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''Isaia: Mivoaha ianao sy Seara-jasoba* zanakao hitsena an''i Ahaza eo amin''ny faran''ny lakan-drano amin''ny kamory ambony, eo amin''ny lalambe mankamin''ny sahan''ny mpamotsy lamba, [*Seara-jasoba = Hisy sisa hiverina]'
mg1865::mg_23::7::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka lazao aminy hoe: Mitandrema, ka aza taitaitra foana; Aza matahotra, ary aoka tsy ho ketraka ny fonao Noho ireto tapa-porohana roa midonaka ireto, Dia ny firehetan''ny fahatezeran-dRezina sy Syria ary ny zanak''i Remalia.'
mg1865::mg_23::7::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa nanao saina hampidi-doza aminao Syria sy Efraima ary ny zanak''i Remalia ka nanao hoe:'
mg1865::mg_23::7::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha isika hananika an''i Joda ka hampaharaiki-tahotra azy Ary hanafaka azy ho antsika ka hanangana ny zanak''i Tabeala ho mpanjaka ao afovoany,'
mg1865::mg_23::7::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Tsy ho tanteraka izany, Ary tsy hisy izany;'
mg1865::mg_23::7::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lohan''i Syria dia Damaskosy, Ary ny lohan''i Damaskosy dia Rezina (Ary ao anatin''ny dimy amby enim-polo taona dia ho rava ny Efraima ka tsy ho vanon-ko firenena intsony),'
mg1865::mg_23::7::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''i Efraima dia Samaria, Ary ny lohan''i Samaria dia ny zanak''i Remalia. Raha tsy mety mino ianareo, Dia tsy ho tafatoetra.'
mg1865::mg_23::7::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah mbola niteny tamin''i Ahaza ihany ka nanao hoe:'
mg1865::mg_23::7::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataha famantarana amin''i Jehovah Andriamanitrao; eny, mangataha na ho avy amin''ny lalina ambany, na ho avy amin''ny avo ambony.'
mg1865::mg_23::7::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Ahaza: Tsy hangataka aho, fa tsy haka fanahy an''i Jehovah'
mg1865::mg_23::7::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Isaia: Mihainoa ary, ny taranak''i Davida: Ataonareo ho zavatra kely foana moa ny hanasatra ny olona, No dia hanasatra an''Andriamanitro koa ianareo ?'
mg1865::mg_23::7::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ny Tompo no hanome famantarana ho anareo: Indro, hanan''anaka ny virijina* ka hiteraka zazalahy, ary ny anarany hataony hoe Imanoela**. [*Na: zazavavy] [**Na: Imanoela = Amintsika Andriamanitra]'
mg1865::mg_23::7::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa mahalala handà ny ratsy sy hifidy ny tsara izy, Dia rononomandry sy tantely no ho fihinany.'
mg1865::mg_23::7::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mbola mahalala handà ny ratsy sy hifidy ny tsara izany zaza izany, Dia ho lao ny tanin''ireo mpanjaka roa maharaiki-tahotra anao ireo.'
mg1865::mg_23::7::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hahatonga aminao sy ny olonao ary ny mpianakavin-drainao Izay andro tsy mbola nisy toa azy Hatramin''ny andro nialan''i Efraima tamin''ny Joda (Dia ny mpanjakan''i Asyria)'
mg1865::mg_23::7::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany Jehovah hisiaka hiantso ny lalitra, izay any amin''ny faran''ny onin''i Egypta, sy ny renitantely, izay any amin''ny tany Asyria;'
mg1865::mg_23::7::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho avy ireo, ka samy hipetraka amin''ny lohasaha lao, sy eny an-tsefatsefaky ny harambato, sy eny amin''ny fefy tsilo rehetra, ary eny amin''ny saha fiandrasana rehetra.'
mg1865::mg_23::7::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany koa ny Tompo hanaratra ny loha sy ny volon-tongotra Amin''ny hareza nohofana any amoron''ny Ony* (Dia ny mpanjakan''i Asyria) Ary ny volom-bava hokakasana amin''iny koa. [*Eofrata]'
mg1865::mg_23::7::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany Dia samy hiompy ombivavy kely sy ondry roa ny olona;'
mg1865::mg_23::7::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny haben''ny ronono azo avy amin''ireo dia hihinana rononomandry izy; Fa rononomandry sy tantely no ho fihinan''ny olona sisa rehetra ao amin''ny tany.'
mg1865::mg_23::7::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''Izany andro izany dia ho rakotry ny hery sy ny tsilo Ny tany rehetra izay nisy voaloboka arivo nahazo sekely arivo.'
mg1865::mg_23::7::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zana-tsipïka sy tsipïka no ho entin''izay miditra ao, satria rakotry ny hery sy ny tsilo ny tany rehetra.'
mg1865::mg_23::7::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanety rehetra izay nohevoina tamin''ny angady dia tsy ho azonao diavina noho* ny fahatahorana ny hery sy ny tsilo; Fa ho falehan''ny omby sy ho voahitsakitsaky ny ondry aman''osy izany. [*Na: Dia tsy halehan'']'
mg1865::mg_23::8::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hahaterahan''ny zanaky ny mpaminanivavy, sy ny handresen''i Asyria ny Joda, ary ny toky ho azon''ny tena Isiraely noho ny nahaterahan''ny Zaza Mahagaga'
  verse_text: 'Ary hoy Jehovah tamiko: Mangalà fafana lehibe, ka soraty aminy araka ny fanoratry ny olona hoe: "Ho an*''i Mahera-salala-hasi-baza**." [*Na: amin''] [**Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana]'
mg1865::mg_23::8::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haka vavolombelona mahatoky Aho, dia Oria mpisorona sy Zakaria, zanakalahin''i Jeberekia.'
mg1865::mg_23::8::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankany amin''ny mpaminanivavy, aho; dia nanan''anaka izy ka niteraka zazalahy. Ary hoy Jehovah tamiko: Aoka ny anarany hataonao hoe Mahera-salala-hasi-baza. [*Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana]'
mg1865::mg_23::8::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mbola mahatonona hoe Idada na Ineny io zazalahy io, dia hobaboina eo anatrehan''ny mpanjakan''i Asyria ny haren''i Damaskosy sy ny fananan''i Samaria.'
mg1865::mg_23::8::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia mbola niteny tamiko indray hoe:'
mg1865::mg_23::8::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria ity firenena ity mandà ny rano Siloa izay misononoka Ary mifaly amin-dRezina sy ny zanak''i Remalia,'
mg1865::mg_23::8::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, hampiakarin''ny Tompo hanafotra azy ny rano be sady manonja amin''ny Ony* (Dia ny mpanjakan''i Asyria sy ny voninahiny rehetra) Ary ny masondranony rehetra ho tondraka, Ary ny morony rehetra hihoarany; [*Eofrata]'
mg1865::mg_23::8::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia himaona fatratra izy ka hihatra amin''ny Joda Ary hanafotra sady mbola hisondrotra ihany Mandra-pahatongany havozona; Ary ny fipasany eny an-daniny roa* dia hanenika ny taninao, ry Imanoela o. [*Hebreo: fampivelatra ny elany]'
mg1865::mg_23::8::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misafoaha ihany ianareo, ry firenena o, nefa mbola ho ringana mihitsy ianareo; Ary mihainoa ihany, ry tany lavitra rehetra, misikìna ihany ianareo, nefa mbola ho ringana mihitsy; Eny, misikìna ihany ianareo, nefa mbola ho ringana mihitsy.'
mg1865::mg_23::8::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Makà saina ihany ianareo, nefa mbola hofoanana izany; Milazà ihany ny teny, nefa tsy ho tanteraka izany tsy akory; Fa aminay Andriamanitra*. [*Hebreo: Imanoela; izahao Isaia 8:8]'
mg1865::mg_23::8::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no nolazain''i Jehovah tamiko, raha nanindry ahy mafy ny tanany, Ka nanariny tsy handeha amin''ny falehan''ity firenena ity aho:'
mg1865::mg_23::8::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mba lazainareo ho tetika fikomiana izay lazain''ity firenena ity ho tetika fikomiana; Ary aza matahotra izay atahorany na mangovitra ianareo.'
mg1865::mg_23::8::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro, no hasino; Ary aoka Izy ihany no hatahoranareo, Ary Izy ihany no hangovitanareo.'
mg1865::mg_23::8::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fitoerana masina ho anareo Izy, Fa ho vato mahatafintohina sy vatolampy mahasolafaka kosa Amin''ny firenena roa amin''ny Isiraely, sady ho fandrika sy tonta Amin''ny mponina any Jerosalema.'
mg1865::mg_23::8::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro ao aminy no ho tafintohina sady ho lavo sy ho ringana Ary ho voafandrika sy ho voasambotra.'
mg1865::mg_23::8::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fehezo ny teni-vavolombelona, Ary asio tombo-kase ny lalàna eo amin''ny mpianatro.'
mg1865::mg_23::8::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiandry an''i Jehovah aho Izay manafina ny tavany amin''ny taranak''i Jakoba, Ka hanantena Azy ihany aho.'
mg1865::mg_23::8::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreto, izaho sy ireo zaza nomen''i Jehovah ahy dia famantarana sy fahagagana ao amin''ny Isiraely Avy amin''i Jehovah, Tompon''ny maro, Izay monina ao an-tendrombohitra Ziona.'
mg1865::mg_23::8::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha lazainy aminareo hoe: Milà saina amin''ny manao azy ho tsindrian-javatra sy ny mpanao sikidy, izay mitsiatsiaka sy miboeriboerika, Moa tsy Andriamaniny va no tokony hilan''ny olona saina? Fa hila saina amin''ny maty ho an''ny velona va izy?'
mg1865::mg_23::8::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny lalàna sy ny teni-vavolombelona ihany! Raha tsy miteny araka izany teny izany izy, Dia olona izay tsy hiposahan''ny fahazavan''ny maraina*. [*Na: Eny, izany no holazain''ny olona izay tsy iposahan''ny fahazavan''ny maraina]'
mg1865::mg_23::8::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy hivezivezy amin''ny tany izy rehetra sady mahantra no mosarena; Ary rehefa mosarena izy, dia ho sosotra ka hanozona* ny mpanjakany sy Andriamaniny**, ary dia hiandrandra; [*Na: hanozona amin''ny anaran''] [**Na: ny andriamaniny]'
mg1865::mg_23::8::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hijery ny tany izy, ka indro fahoriana sy fahamaizinana ary manjombona mahafadiranovana, Ary horoahina ho any amin''ny aizim-pito izy.'
mg1865::mg_23::8::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hanjombona mandrakariva ilay efa nozoim-pahoriana. Tamin''ny taloha dia nataony tsinontsinona ny tany Zebolona sy ny tany Naftaly; Fa amin''ny aoriana kosa dia homeny voninahitra ny lalana eo amoron-dranomasina, any an-dafin''i Jordana, Dia Galilia, tanin''ny jentilisa.'
mg1865::mg_23::9::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona izay mandeha amin''ny maizina dia mahita mazava lehibe; Izay mitoetra amin''ny tany aloky ny fahafatesana no iposahan''ny mazava.'
mg1865::mg_23::9::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamaroinao ity firenena ity, Ary ampitomboinao ny hafaliany; Mifaly eo anatrehanao izy tahaka ny hafaliana amin''ny fararano, ary tahaka ny fifalin''ny olona, raha mizara babo.'
mg1865::mg_23::9::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: '2022-09-26T05:30:21+0000'
  verse_title: null
  verse_text: 'Fa ny bao fitondran'' entany sy ny tsorakazo nikapohana ny lamosiny; Izay tsorakazon''ny mpampiasa azy, Dia tapahinao tahaka ny tamin''ny andro namelezana ny Midiana.'
mg1865::mg_23::9::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny kiraron''izay mitrevatreva fandeha eo amin''ny fihorakorahan''ny ady sy ny fitafiana mihosindra dia samy hodoroana, eny, ho kitay hatohoka amin''ny afo izany.'
mg1865::mg_23::9::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zaza no teraka ho antsika, Zazalahy no omena antsika; Ary ny fanapahana dia eo an-tsorony, ary ny anarany atao hoe Mahagaga, Mpanolo-tsaina*, Andriamanitra Mahery, Rain''ny mandrakizay Andrian''ny fiadanana. [*Na: mpanolo-tsaina mahagaga]'
mg1865::mg_23::9::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny handrosoan''ny fanapahana sy ny fiadanana dia tsy hanam-pahataperana Eo amin''ny seza fiandrianan''i Davida sy ny fanjakany, mba hampiorenana sy hampitoerana azy amin''ny rariny sy ny hitsiny hatramin''izao ka ho mandrakizay; ny fahasaro-piaron''i Jehovah, Tompon''ny maro, no hahatanteraka izany.'
mg1865::mg_23::9::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny amin''ny aninjiran''i Jehovah ny tanany hampijaly ny olona noho ny ratsy nataony'
  verse_text: 'Ny Tompo mandefa teny ho an''i Jakoba, ka mihatra amin''ny Isiraely izany.'
mg1865::mg_23::9::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantatr''izy iray firenena izany, dia Efraima sy ny mponina any Samaria, izay miteny amin''ny fiavonavonany sy ny fireharehan''ny fony manao hoe:'
mg1865::mg_23::9::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Biriky no efa nirodana, fa vato voapaika kosa no harafitsika; Aviavy no voakapa, fa sedera kosa no hasolontsika azy.'
mg1865::mg_23::9::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah manandratra ny rafilahin-dRezina hihoatra azy Ary mamporisika ny fahavalony,'
mg1865::mg_23::9::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny Syriana avy any atsinanana sy ny Filistina avy any andrefana; Ary misanasana vava mandrapaka ny Isiraely ireo. Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany, Fa mbola mihinjitra ihany ny tanany.'
mg1865::mg_23::9::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona tsy miverina amin''Izay mamely azy, Eny, Jehovah, Tompon''ny maro, tsy mba tadiaviny.'
mg1865::mg_23::9::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nofongoran''i Jehovah amin''ny Isiraely indray andro monja Ny loha sy ny rambo, ny sampan-drofia* sy ny zozoro [*palma]'
mg1865::mg_23::9::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: '(Ny loholona sy ny manan-kaja no loha, ary ny mpaminany izay mampianatra lainga no rambo)'
mg1865::mg_23::9::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpitarika ity firenena ity no tonga mpampivily azy, Ary izay tarihiny dia voatelina.'
mg1865::mg_23::9::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia tsy mahafaly an''i Jehovah ny zatovony, ary ny kamboty sy ny mpitondratena ao aminy dia tsy iantrany; Fa samy mpihatsaravelatsihy* sy mpanao ratsy izy, ary ny vava rehetra mamoaka teny fahadalana. Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany, Fa mbola mihinjitra ihany ny tanany. [*Na: ratsy fanahy]'
mg1865::mg_23::9::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny faharatsiana mandoro tahaka ny afo, Mandevona ny tsilo sy ny hery ary mampirehitra ny ala mikirindro ka mitambolimbolina tahaka ny setroka misavoana.'
mg1865::mg_23::9::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fahatezeran''i Jehovah, Tompon''ny maro, dia efa maintin''ny afo ny tany, ary ny olona dia tahaka ny kitay atohoka amin''ny afo; Tsy misy olona miantra ny rahalahiny'
mg1865::mg_23::9::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandripaka eny an-kavanana izy nefa noana ihany; Ary mandany eny an-kavia izy, nefa tsy voky ihany; Samy mihinana ny nofon-tsandriny avy izy rehetra,'
mg1865::mg_23::9::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Manase mihinana an''i Efraima, ary Efraima kosa mihinana an''i Manase, Ary izy roa tonta dia miara-mamely an''i Joda. Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany, Fa mbola mihinjitra ihany ny tanany.'
mg1865::mg_23::10::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay mamorona fikasana tsy marina sy izay mpanoratra manoratra fampahoriana,'
mg1865::mg_23::10::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampialany ny mahantra amin''ny fitsarana sy hanalany ny rariny amin''izay ory eo amin''ny oloko, Handrobany ny mpitondratena sy hamaboany ny kamboty!'
mg1865::mg_23::10::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ahoana no hataonareo amin''ny andro famaliana sy amin''ny fandravana izay avy amin''ny lavitra? Ho any amin''iza no handosiranareo hamonjy anareo? Ary aiza no hametrahanareo ny harenareo*? [*Hebreo: voninahitrareo]'
mg1865::mg_23::10::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy azony atao afa-tsy ny mihohoka voatsindrin''ny mpifatotra sy ny lavo voatsindrin''ny voavono*. Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany, Fa mbola mihinjitra ihany ny tanany. [*Na: Izay tsy mihohoka voatsindrin''ny babo dia ho lavo voatsindrin''ny voavono; na: Raha misaraka amiko, dia hihohoka, etc]'
mg1865::mg_23::10::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny amin''ny fanjakan''i Asyria sy ny mbola handravana azy'
  verse_text: 'Endrey! ry Asyria, tsorakazon''ny fahatezerako o, Eny, tehina eny an-tanany ny fahavinirako!'
mg1865::mg_23::10::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamely firenena mihatsaravelatsihy* no anirahako azy, ary hamely ny firenena izay iharan''ny fahatezerako no andidiako azy, hamabo sy handroba ary hanao azy ho fanitsakitsaka tahaka ny fotaka eny an-dalambe. [*Na: ratsy fanahy]'
mg1865::mg_23::10::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo tsy izany no kasainy, ary tsy izany no heverin''ny fony; Fa ny handringana sy ny hamongotra firenena tsy vitsy no ao am-pony.'
mg1865::mg_23::10::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Tsy mpanjaka avokoa va ireny governorako ireny?'
mg1865::mg_23::10::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tahaka an''i Karkemisy va Kalno? Tsy tahaka an''i Arpada va Hamata? Ary tsy tahaka an''i Damaskosy va Samaria ?'
mg1865::mg_23::10::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny nahatraran''ny tanako ny fanjakan''ny andriamani-tsy izy, na dia nihoatra noho ny an''i Jerosalema sy ny an''i Samaria aza ny sampin*''ireo, [*Hebreo: sarin-javatra voasokitra]'
mg1865::mg_23::10::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy tahaka ny nataoko tamin''i Samaria sy ny andriamaniny-tsy izy va no hataoko amin''i Jerosalema sy ny sampiny* koa ? [*Hebreo: sarin-javatra voasokitra]'
mg1865::mg_23::10::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa rehefa vitan''ny Tompo ny asany rehetra ao an-tendrombohitra Ziona sy Jerosalema, dia hovaliany kosa ny vokatry ny fiavonavonan''ny fon''ny mpanjakan''i Asyria sy ny reharehan''ny fiandranandran''ny masony; [*Hebreo: hovaliako]'
mg1865::mg_23::10::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy manao hoe: Tamin''ny herin''ny tanako no nanaovako izany, sy tamin''ny fahendreko, fa mahira-tsaina aho; Ary nanaisotra ny faritanin''ny firenena aho sady namabo ny hareny, ary tahaka ny famotraky ny ombilahy no namotrahako mpanapaka*; [*Na: Ary tahaka ny fanaon''ny lehilahy mahery no nanonganako mpanapaka]'
mg1865::mg_23::10::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny fakàna ny ao amin''ny akanim-borona no nakan''ny tanako ny haren''ny firenena; Ary tahaka ny famory atody nilaozan-dreniny no namoriako ny any amin''ny tany rehetra, Ka tsy nisy nikopaka elatra, na nisoka-bava, na nikiakiaka.'
mg1865::mg_23::10::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famaky va hirehareha amin''izay mikapa aminy? Ny tsofa va hiavonavona amin''izay manatsofa aminy? Toy ny tsorakazo, raha manetsika izay manainga azy! Ary toy ny tehina, raha manandratra ny tompony*! [*Hebreo: manandratra izay tsy hazo]'
mg1865::mg_23::10::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no anateran''ny Tompo, dia ny Tompon''ny maro, fahahiazana amin''ny tremalahiny; Ary ao ambanin''ny voninahiny dia hisy mirehitra toy ny firehitry ny afo.'
mg1865::mg_23::10::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahazavan''ny Isiraely ho tonga afo, ary ny Iray Masiny ho tonga lelafo, ka hodorany ho levona indray andro monja ny tsilony sy ny heriny;'
mg1865::mg_23::10::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahitry ny alany sy ny sahany mahavokatra dia holevoniny, na ny fanahiny, na ny nofony, ka ho tahaka ny fifezak''izay marary mafy* izany. [*Na: ho tahaka ny fahatoranan''ny mpitondra faneva]'
mg1865::mg_23::10::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho vitsy ny hazo sisa any an''alany, ka na dia izay mbola zaza aza hahasoratra azy.'
mg1865::mg_23::10::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny Isiraely sisa, izay tsy ringana amin''ny taranak''i Jakoba, dia tsy hiankina amin''izay namely azy intsony; Fa Jehovah, Iray Masin''ny Isiraely, ihany no hiankinany marina tokoa.'
mg1865::mg_23::10::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay sisa amin''i Jakoba dia hiverina ho amin''Andriamanitra Mahery.'
mg1865::mg_23::10::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia tahaka ny fasika any amin''ny ranomasina aza ny isan''ny Isiraely olonao, dia izay sisa aminy ihany no hiverina; Voatendry ny fandringanana izay hanafotra ho famaliana marina;'
mg1865::mg_23::10::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahafonganana voatendry no hataon''i Jehovah, Tompon''ny maro, Ao amin''ny tany.'
mg1865::mg_23::10::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Ry oloko, izay monina any Ziona, Aza matahotra ny Asyriana, raha mamely anao amin''ny tsorakazo izy ary manainga ny tehina aminao, tahaka ny fanao tany Egypta;'
mg1865::mg_23::10::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa afaka vetivety, dia hitsahatra ny fahavinirana, ary ny fahatezerako dia handringana azy kosa.'
mg1865::mg_23::10::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Jehovah, Tompon''ny maro, hamely azy amin''ny kotopia, tahaka ny namelezana ny Midiana teo am-batolampy Oreba; ary ny tsorakazony haingainy eny ambonin''ny ranomasina ka hatsangany tahaka ny fanao tany Egypta.'
mg1865::mg_23::10::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia ho afaka eo an-tsorokao ny entany ary ny bao fitondrany ho afaka amin''ny vozonao, ary ho tapaka* ny bao fitondrana noho ny fihatavezany. [*Hebreo: simba]'
mg1865::mg_23::10::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injao! tonga any Aiata izy, mamaky an''i Migrona izy ary mametraka ny entany ao Mikmasy,'
mg1865::mg_23::10::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihoatra ao an-kadilanana izy Ao Geba isika no handry, hoy izy; Mangovitra Rama, mandositra Gibean''i Saoly;'
mg1865::mg_23::10::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikiakiaha mafy, ry zanakavavin''i Galima, Mampandria sofina, ry Laisy. Indrisy, ry Anatota mahantra!'
mg1865::mg_23::10::31:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa mandositra Madmena, ny mponina any Gebima mitondra ny entany mandositra.'
mg1865::mg_23::10::32:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anio izy mbola mitoetra any Noba, Maninjitra ny tanany manambana ny tendrombohitr''i Ziona zanakavavy, dia ny havoan''i Jerosalema.'
mg1865::mg_23::10::33:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Jehovah, Tompon''ny maro, manapaka ny rantsany madinika amin''ny heriny mahatahotra; Ary izay mijoaka lava no voakapa, ary izay avo no aetry;'
mg1865::mg_23::10::34:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary kapaina vy ny ala mikirindro, ary Libanona dia alamaky ny iray Mahery.'
mg1865::mg_23::11::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny famonjena hataon''Ilay Solofon''i Davida, sy ny hira fiderana hatao amin''izany'
  verse_text: 'Ary hisy Solofo mitsimoka eo amin''ny fototr''i Jese, ary hisy mitrebona avy eo amin''ny fakany;'
mg1865::mg_23::11::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanahin''i Jehovah hitoetra ao aminy, dia ny Fanahin''ny fahendrena sy ny fahazavan-tsaina; Ny Fanahin''ny fanoloran-tsaina sy ny faherezana; Ny Fanahin''ny fahalalana sy ny fahatahorana an''i Jehovah;'
mg1865::mg_23::11::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho hanitra ankasitrahana aminy ny fahatahorana an''i Jehovah, ka tsy hitsara araka ny hitan''ny masony izy, na hampiaiky araka ny ren''ny sofiny;'
mg1865::mg_23::11::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hotsarainy amin''ny fahamarinana ny malahelo; Ary homeny rariny ny mpandefitra amin''ny tany; hamely ny tany amin''ny tsorakazon''ny vavany Izy, ary ny fofonain''ny molony no hamonoany ny ratsy fanahy.'
mg1865::mg_23::11::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahamarinana no ho fisikinany, ary fanahy mahatoky no ho fehin-kibony'
mg1865::mg_23::11::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amboadia* hiara-mitoetra amin''ny zanak''ondry; Ny leoparda hiara-mandry amin''ny zanak''osy; Ary ny zanak''omby sy ny liona tanora sy ny ombikely mifahy hiray toerana, Ary ny zazakely no hiroaka azy. [*lopa]'
mg1865::mg_23::11::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ombivavy sy ny bera hiara-komana; Ny zanany hiara-mandry; Ary ny liona hihina-mololo tahaka ny omby;'
mg1865::mg_23::11::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zaza minono hilalao amin''ny lavaky ny vipera, ary ny zaza mitsaha-nono haninjitra ny tanany ao amin''ny lavaky* ny menarana. [*Na: voamason'']'
mg1865::mg_23::11::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy handratra na hanimba eran''ny tendrombohitro masina izy; Fa ny tany ho henika ny fahalalana an''i Jehovah, tahaka ny anaronan''ny rano ny fanambanin''ny ranomasina.'
mg1865::mg_23::11::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny solofon''i Jese, Izay hitsangana ho fanevan''ny firenena, dia Izy no hotadiavin''ny jentilisa; Ary ny fitoerany dia ho voninahitra.'
mg1865::mg_23::11::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny Tompo dia mbola haninjitra ny tanany fanindroany hanavotra ny olony, izay mbola sisa, avy any Syria sy Egypta sy Patrosa sy Etiopia sy Elama sy Sinara sy Hamata Ary ny avy any amin''ny moron-dranomasina.'
mg1865::mg_23::11::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanangana faneva ho an''ny jentilisa Izy ka hamory ny Isiraely izay voaroaka sy hanangona ny Joda izay voaely Avy any amin''ny vazan-tany efatra.'
mg1865::mg_23::11::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitsahatra ny fialonan''i Efraima, ary hofongorana ny fandrafiana* an**''i Joda: Efraima tsy hialona an''i Joda, Ary Joda tsy handrafy an''i Efraima. [*Na: mpandrafy] [**Na: ao amin''ny]'
mg1865::mg_23::11::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hipaoka ny tanin''ny Filistina any andrefana ireo sy hiara-mamabo ny zanaky ny atsinanana; amin''i Edoma sy Moaba no haninjirany ny tanany, ary ny taranak''i Amona hanoa azy.'
mg1865::mg_23::11::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah handritra* ny sakeli-dranomasina Egyptiana ary haninjitra ny tanany amin''ny ony** ka hamely azy amin''ny rivony mahamay Ka hampisaraka azy hisampana fito Ary hahatafita ny olona tsy miala kapa. [*Na: hanao azy ho herema] [**Eofrata]'
mg1865::mg_23::11::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy lalana voavoatra halehan''ny olony sisa, izay sisa avy any Asyria, dia toy ny ho an''ny Isiraely tamin''ny andro niakarany avy tany amin''ny tany Egypta.'
mg1865::mg_23::12::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiteny ianao amin''izany andro izany hoe: Hidera Anao aho, Jehovah o; Fa na dia tezitra tamiko aza Ianao, dia* afaka ny fahatezeranao, ka mampionona ahy Ianao. [*Na: Fa tezitra tamiko Ianao, nefa]'
mg1865::mg_23::12::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Andriamanitra no famonjena ahy; dia hatoky aho, fa tsy mba hatahotra; Fa Jehovah Tompo no heriko sy fiderako, fa efa famonjena ahy Izy.'
mg1865::mg_23::12::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''ny fifaliana no hantsakanareo rano amin''ny loharanom-pamonjena.'
mg1865::mg_23::12::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiteny ianao amin''izany andro izany ka hanao hoe: Miderà an''i Jehovah, miantsoa ny anarany, ampahafantaro any amin''ny firenena ny asany. Ampahatsiarovy fa efa misandratra ny anarany.'
mg1865::mg_23::12::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah, fa asa lehibe no nataony; Ary aoka ho fantatra any amin''ny tany rehetra izany.'
mg1865::mg_23::12::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantsoa mafy sy mihobia, ry mponina any Ziona; Fa lehibe ao afovoanao ny Iray Masin''ny Isiraely.'
mg1865::mg_23::13::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny loza hanjo an''i Babylona'
  verse_text: 'Faminaniana hitan''Isaia, zanak''i Amoza, ny amin''ny loza hanjo an''i Babylona.'
mg1865::mg_23::13::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: '2022-04-19T06:41:59+0000'
  verse_title: null
  verse_text: 'Manangàna faneva eo an-tampon''izay tendrombohitra mangadihady ianareo, manandrata feo hiantso azy, hofay tanana izy hiditra amin''ny vavahadin''ireo mpanapaka.'
mg1865::mg_23::13::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho efa nandidy ny nohamasiniko, eny, efa niantso ny lehilahy maheriko aho, dia ireo mibitaka amim-pireharehana, hahatanteraka ny fahatezerako.'
mg1865::mg_23::13::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! ny horakoraka any an-tendrombohitra, tahaka ny an''ny vahoaka be*! Dia ny fitabataban''ny fanjakan''ny firenena efa tafatambatra! Jehovah, Tompon''ny maro, no manomana miaramila hiady, [*Na: firenena lehibe]'
mg1865::mg_23::13::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay avy any amin''ny tany lavitra, any amin''ny faravodilanitra, dia Jehovah sy ireo fitaovan''ny fahatezerany, ho enti-mandrava ny tany rehetra.'
mg1865::mg_23::13::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà ianareo, fa efa antomotra ny andron''i Jehovah, ka tahaka ny loza tsy toha avy amin''ny Tsitoha no fihaviny.'
mg1865::mg_23::13::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia hiraviravy ny tanana rehetra, ary ho kivy ny fon''ny zanak''olombelona rehetra;'
mg1865::mg_23::13::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho toran-kovitra izy; Fanaintainana sy fahoriana no hahazo azy, ka hijalijaly tahaka ny vehivavy mihetsi-jaza izy; samy ho talanjona izy ka hifampijery; Mitarehin-delafo ny tarehiny.'
mg1865::mg_23::13::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andron''i Jehovah, dia loza sy fahavinirana ary firehetan''ny fahatezerana hanafoanana ny tany sy handringanana ny mpanota tsy ho ao.'
mg1865::mg_23::13::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny kintan''ny lanitra, na dia ireo Telonohorefy aza, dia tsy hampamirapiratra ny fahazavany; ny masoandro ho maizina amin''ny iposahany; Ary ny volana tsy hangarangarana.'
mg1865::mg_23::13::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsingeriko amin''izao tany rehetra izao ny faharatsiany, sy amin''ny ratsy fanahy ny helony; Ary hatsahatro ny fireharehan''ny mpiavonavona, Ary haetriko ny fiavonavonan''ny mpampahory.'
mg1865::mg_23::13::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hataoko ho saro-tadiavina mihoatra noho ny volamena tsara ny olombelona, eny, noho ny tena volamena avy any Ofira aza.'
mg1865::mg_23::13::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia hampihorohoroiko ny lanitra, ary ny tany hientanentana hiala amin''ny fitoerany noho ny fahatezeran''i Jehovah, Tompon''ny maro, sy noho ny andro firehetan''ny fahatezerany.'
mg1865::mg_23::13::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tahaka ny gazela hazaina ny olona, sy ho tahaka ny ondry aman''osy tsy misy mpamory, ka dia samy ho lasa any amin''ny fireneny avy izy, eny, samy handositra ho any amin''ny taniny avy izy.'
mg1865::mg_23::13::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra azo dia holefonina, ary izay rehetra tratra dia ho lavon''ny sabatra.'
mg1865::mg_23::13::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanany madinika hotorotoroina eo imasony; Ny tranony hobaboina, ary ny vadiny hosavihina.'
mg1865::mg_23::13::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hamporisihiko hamely azy ny Mediana, izay manao ny volafotsy tsy ho zavatra ary tsy mankamamy ny volamena.'
mg1865::mg_23::13::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsipïkany handripaka ny zatovo, ary izay ateraky ny kibo tsy hamindrany fo, eny, na dia ny zaza aza tsy hiantran''ny masony.'
mg1865::mg_23::13::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Babylona, ravaky ny fanjakana maro Tabiha sy reharehan''ny Kaldeana, Dia ho rava tahaka ny nandravan''Andriamanitra an''i Sodoma sy Gomora;'
mg1865::mg_23::13::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy honenana mandrakizay izy ary tsy hitoerana intsony hatramin''ny taranaka fara mandimby, Tsy hisy Arabo hanorin-day any, na mpiandry ondry hampandry ny ondriny any;'
mg1865::mg_23::13::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny bibi-dia any an''efitra no hitoetra any, ho feno vorondolo* ny tranony, ny ostritsa no hitoetra any, ary ny osilahy* no hitsambikimbikina any, [*Na: hyena] [**Hebreo: seirima; izahao Levitikosy 17:7]'
mg1865::mg_23::13::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kary* no hifampierena ao an-tranobeny**, ary ny amboadia*** ao amin''ny lapa nanaranam-po; efa antomotra ny fotoany, ary ny androny tsy hatao ela. [*Hebreo: jakala] [**Hebreo: mpitondratenany] [***Na: jakala]'
mg1865::mg_23::14::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah hamindra fo amin''i Jakoba, ary mbola hifidy ny Isiraely indray ka hamponina azy ao amin''ny taniny; ary ny vahiny hikambana aminy, ary ny taranak''i Jakoba ho namany'
mg1865::mg_23::14::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haka azy ny firenena ka hanatitra azy hody; ary ny taranak''Isiraely hanana azy ho ankizilahiny sy ankizivaviny ao amin''ny tanin''i Jehovah; dia ho tonga mpamabo izay namabo azy izy; ary hampanompo izay nampahory azy.'
mg1865::mg_23::14::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: 'Hira fifaliana hataon''ny Isiraely noho ny nanetrena ny mpanjakan''i Babylona'
  verse_text: 'Ary amin''ny andro hanomezan''i Jehovah fitsaharana anao ho afaka amin''ny fahorianao sy ny fitebitebin''ny fonao ary ny fanompoana mafy izay nampanompoana anao,'
mg1865::mg_23::14::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hataonao izao oha-teny ny amin''ny mpanjakan''i Babylona izao: Hià! mitsahatra ilay mpampahory! Eny. tsy ao intsony ilay tanàna volamena! [*Na: mampandoa hetra]'
mg1865::mg_23::14::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nanapatapaka ny tehin''ny ratsy fanahy. Dia ny tehina fanapahan''ny mpanapaka,'
mg1865::mg_23::14::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namely firenena tamin''ny fahatezerana, tamin''ny famelezana tsy nanam-pitsaharana, sady nampanompo firenena tamin''ny fahatezerana, tamin''ny fanenjehana tsy misy antra.'
mg1865::mg_23::14::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miadana ka mandry fahizay ny tany rehetra; Velominy ao ny hoby,'
mg1865::mg_23::14::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny hazo kypreso sy ny sedera any Libanona hifaly anao hoe: Hatrizay niambohoanao izay dia tsy nisy mpikapa niakatra taty aminay.'
mg1865::mg_23::14::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Taitra ny fiainan-tsy hita* any ambany noho ny aminao mba hitsena anao amin''ny fihavianao; Mamoha ny matoatoa hitsena anao izy, dia ireny bibilahy** rehetra tambonin''ny tany; Aingainy hiala amin''ny seza fiandrianana ny mpanjakan''ny firenena rehetra. [*Hebreo: Sheola] [**Hebreo: osilahy]'
mg1865::mg_23::14::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy rehetra samy hiteny aminao hoe: Hay! ianao koa mba efa osa tahaka anay! Efa tonga tahaka anay ianao!'
mg1865::mg_23::14::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa navarina ho ety amin''ny fiainan-tsy hita* ny tabihanao mbamin''ny feon''ny valihanao; Kankana no ilafihanao, ary olitra no mandrakotra anao. [*Hebreo: Sheola]'
mg1865::mg_23::14::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! latsaka avy tany an-danitra ianao, ry ilay fitarik''andro, zanaky ny maraina; Voakapa hianjera amin''ny tany ianao, ry ilay mpandripaka firenena.'
mg1865::mg_23::14::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao efa nanao anakampo hoe: Any an-danitra no hiakarako, ary ambonin''ny kintan''Andriamanitra no hanandratako ny seza fiandrianako; Dia hipetraka eo an-tendrombohitra; fivoriana any am-parany avaratra aho;'
mg1865::mg_23::14::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiakatra ho any ambonin''ny havoan''ny rahona aho ka ho tahaka ny Avo Indrindra;'
mg1865::mg_23::14::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo hampidinina hatrany amin''ny fiainan-tsy hita* ho any ampara-vodilavaka ianao. [*Hebreo: Sheola]'
mg1865::mg_23::14::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahita anao hibanjina anao sy hihevitra anao hoe: Moa io va ilay lehilahy nampihorohoro ny tany sy nampihozongozona ny fanjakana'
mg1865::mg_23::14::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izao tontolo izao ho efitra sy nandrava ny tanànany Ary tsy nandefa ny mpifatotra hody?'
mg1865::mg_23::14::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjaka rehetra amin''ny firenena samy mandry amin''ny voninahitra avokoa, ary samy ao am-pasany* avy; [*Hebreo: tranony]'
mg1865::mg_23::14::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa dia nariana niala lavitra ny fasanao, tahaka ny solofon-kazo ratsy izay ariana, sady voatsindrin''ny fatin''ny voavono ianao, dia ireo voatrabaky ny sabatra, ka midina ho ao amin''ny vato ao an-davaka, tahaka ny faty hitsakitsahin''ny tongotra.'
mg1865::mg_23::14::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy halevina tahaka ireny ianao, satria efa nanimba ny taninao sady efa namono ny olonao; tsy hotononina mandrakizay ny taranaky ny mpanao ratsy!'
mg1865::mg_23::14::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manamboara famonoana hamelezana ny zanany noho ny heloky ny razany; tsy hitsangana hanana ny tany izy, Na hanorina tanana eran''izao tontolo izao.'
mg1865::mg_23::14::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hitsangana hamely azy aho, hoy Jehovah, Tompon''ny maro, ary hofoanako ny anaran''i Babylona sy izay sisa ao mbamin''ny zanany sy ny taranany, hoy Jehovah.'
mg1865::mg_23::14::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko fonenan''ny sokina sy fihandronan''ny rano izy, ary hofafako kifafa fandringanana izy, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_23::14::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro, efa nianiana hoe: Araka izay noheveriko no hatao aminy ary araka izay nokasaiko no hotovina aminy,'
mg1865::mg_23::14::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny hanorotoro ny Asyriana ao amin''ny taniko, ary ny hanitsakitsaka azy eny an-tendrombohitro; ny zioga fitondrany dia hiala amin''ireo, ary ny entany ho afaka amin''ny sorony'
mg1865::mg_23::14::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no fikasana ny amin''ny tany rehetra, ary izany no tanana ahinjitra amin''ny firenena rehetra.'
mg1865::mg_23::14::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah, Tompon''ny maro, no efa nikasa, ka iza indray no hahafoana izany? Ary ny tanany dia voahinjitra, ka iza no hampihemotra izany?'
mg1865::mg_23::14::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Faminaniana ny loza hanjo an''i Filistia'
  verse_text: 'Tamin''ny taona nahafatesan''i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao:'
mg1865::mg_23::14::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mifaly, ry Filistia rehetra, saingy tapaka ny tsorakazo namely anao; fa avy ao an-kibon*''ny bibilava no hihavian''ny menarana, ary ny aterany ho tonga menaran''afo** manidina. [*Hebreo: fakan''] [**Hebreo: sarafa]'
mg1865::mg_23::14::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny faraidina indrindra* hihinana, ary ny mahantra handry fahizay; Fa hataoko maty mosary kosa izay tsy ringana aminao**, eny, izay sisa aminao ho matiny. [*Hebreo: matoan''ny mahantra] [**Hebreo: ny fakanao]'
mg1865::mg_23::14::31:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà, ry vavahady, ary mitaraina, ry tanàna; Aoka ho ketraka avokoa ianao, ry Filistia! Fa misy setroka mitranga avy any avaratra, ary tsy misy miala amin''ny laharany akory ny miaramilany.'
mg1865::mg_23::14::32:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary inona moa no valiny ho entin''ny iraky ny jentilisa? Izao: Jehovah efa nanorina an''i Ziona, ary ao no hialofan''izay olony ory.'
mg1865::mg_23::15::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Moaba'
  verse_text: 'Faminaniana ny amin''ny loza hanjo an''i Moaba. Fa tamin''ny indray alina no nandravana an''i Ara-moaba, ka fongotra izy; Fa tamin''ny indray alina no nandravana an''i Kira-moaba, ka fongotra izy;'
mg1865::mg_23::15::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakatra ho ao amin''ny tempoly* sy ho ao Dibona ny olona, dia ao amin''ny fitoerana avo, mba hitomany; any Nebo sy Medeba no idradradradran''i Moaba; Mibory ny loha rehetra; Voaharatra ny somotra rehetra. [*Na: ho ao Baita]'
mg1865::mg_23::15::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-dalambe dia misikina lamba fisaonana izy; eny an-tampon-tranony sy eny an-kalalahana dia midradradradra avokoa izy, eny, mijohy ny ranomasony.'
mg1865::mg_23::15::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitaraina Hesbona sy Elale, ka re hatrany Jahaza ny feony, ary noho izany dia miantso mafy ny miaramilan*''i Moaba, Mangovitra ny fanahiny ao anatiny. [*Hebreo: voaomany]'
mg1865::mg_23::15::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny foko mitaraina noho ny amin''i Moaba; Ny mandositra avy ao dia tonga hatrany Zoara* sy Egleta-selisia*; fa miakatra mitomany ao amin''ny fiakarana Lohita izy sy midradradradra amin''ny famoizam-po eny an-dàlana mankany Horonaima. [*Na: ny hidiny (na: ny fiarovana azy) dia hatrany Zoara] [**Na: Dia ilay ombivavy kely telo taona]'
mg1865::mg_23::15::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Nimrima tsara rano dia tonga karankaina; maina ny ahitra, malazo ny zava-maniry, ka tsy misy zava-maitso intsony.'
mg1865::mg_23::15::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany ny harena be izay nohariny ny entany izay mbola voatahiriny dia entiny ho any am-pitan''ny lohasahan-driaky ny hazomalahelo.'
mg1865::mg_23::15::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fitarainany manodidina ny sisin''i Moaba, re hatrany Eglaima ny fidradradradrany Eny, re hatrany Ber-elima ny fidradradradrany.'
mg1865::mg_23::15::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ranon''i Dimona dia feno rà; fa mbola hampiako ny loza manjo an''i Dimona, dia liona handrapaka izay efa mandositra avy any Moaba, sy handany izay sisa amin''ny tany.'
mg1865::mg_23::16::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atero ny zanak''ondrin''ny mpanapaka ny tany, dia miala an''i Sela ka mamaky ny efitra hatramin''ny tendrombohitr''i Ziona zanakavavy.'
mg1865::mg_23::16::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny vorona notairina niala tamin''ny akaniny ka mirenireny foana, dia ho toy izany ny zanakavavin''i Moaba ao amin''ny fitàna any Arnona.'
mg1865::mg_23::16::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manolora saina, manomeza rariny ataovy tahaka ny alina ny alokao, na dia amin''ilay andro mitataovovonana iny aza; Afeno izay voaroaka, Ary aza aseho izay mandositra!'
mg1865::mg_23::16::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hitoetra ao aminao izay oloko voaroaka; Ary aoka ho fieren''i Moaba ianao*, mba tsy ho azon''ny mpandringana izy; Fa tsy misy intsony ny mpampahory, tapitra ny loza, tsy misy amin''ny tany intsony ny mpanosihosy. [*Na: Aoka ho fereny ianao ry Moaba]'
mg1865::mg_23::16::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy seza fiandrianana hampitoerina amin''ny famindram-po, ka hisy hipetraka eo aminy amin''ny fahamarinana ao an-dain''i Davida, ary hitsara sy handinika izay marina izy, sady ho faingam-pamoaka ny rariny.'
mg1865::mg_23::16::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renay ny fiavonavonan''i Moaba fatra-piavonavona loatra izy dia ny fireharehany sy ny fiavonavonany sy ny fihoa-bavany ary ny fibedibediny foana.'
mg1865::mg_23::16::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ho indray midradradradra Moaba, eny, samy hidradradradra avokoa izy rehetra; Fa hitomany ny ampempam-boalobok*''i Kira-haresa ianareo ka ho ory indrindra. [*Na: faharavany]'
mg1865::mg_23::16::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa malazo avokoa ny sahan''i Hesbona sy ny voalobok''i Sibma, norantsanan''ny andrian''ny firenena ny sakeliny*, tonga hatrany Jazera sy nisandrahaka tany an''efitra izy, ny sampany nandadilady ka tafita ny ranomasina. [*Na: Dia ireo izay nankaleo ny andrianan''ny firenena ny sakeliny]'
mg1865::mg_23::16::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no hitomaniako ny voalobok''i Sibma, toy ny fitomanian*''i Jazera, handena anao amin''ny ranomasoko aho, ry Hesbona sy Elale; fa mihatra amin''ny vokatrao lohataona sy ny fararanonao ny fanakorana. [*Na: fitomaniana an''i]'
mg1865::mg_23::16::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hafaliana sy ny haravoravoana efa nesorina tamin''ny saha mahavokatra, ka tsy hisy hoby na horakoraka ao amin''ny tanim-boaloboka; Ny mpanosihosy tsy hanosihosy divay intsony ao amin''ny famiazana; Efa natsahatro ny fihobiana amin''ny fararano.'
mg1865::mg_23::16::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny tsinaiko dia mitaraina manao feon-dokanga noho ny amin''i Moaba, ary ny ato anatiko noho ny amin''i Kira-haresa.'
mg1865::mg_23::16::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa miseho Moaba ka sasatra ao amin''ny fitoerana avo. Ary mankao amin''ny fitoerany masina mba hivavaka, dia tsy hahazo na inona na inona izy.'
mg1865::mg_23::16::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no tenin''i Jehovah nataony fahiny ny amin''i Moaba.'
mg1865::mg_23::16::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny koa Jehovah miteny hoe: Amin''ny telo taona, tahaka ny taonan''ny mpikarama, dia ho tsinontsinona ny voninahitr''i Moaba, na dia betsaka aza ny vahoakany*; ary izay sisa dia ho vitsy, eny, ho vitsy foana, fa tsy ho maro. [*Na: ny hareny]'
mg1865::mg_23::17::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Damaskosy'
  verse_text: 'Indro, Damaskosy, dia rava tsy ho tanàna intsony, eny, tonga korontam-bato izy.'
mg1865::mg_23::17::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa lao ny tanànan''i Aroera ka ho an''ny andian''ny ondry aman''osy, handry ao ireo, ka tsy hisy hanaitaitra azy,'
mg1865::mg_23::17::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hisy tanàna mimanda intsony any Efraima, na fanjakana ao Damaskosy; Ary izay sisa amin''i Syria dia hitovy voninahitra amin''ny Zanak''Isiraely; Hoy Jehovah, Tompon''ny maro.'
mg1865::mg_23::17::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hihena ny voninahitr''i Jakoba, ary hihena ny hataviny.'
mg1865::mg_23::17::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tahaka ny fanangon''ny olona ny vary an-tahony amin''ny fararano izany, ka tangosan''ny sandriny ny salohim-bary; Eny, ho tahaka ny fanangon''ny olona salohim-bary eny amin''ny lohosahan''ny Refaita;'
mg1865::mg_23::17::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa hisy sisa hotsimponina ihany izy tahaka ny amin''ny fikapohana ny hazo oliva: Hisy voany roa na telo ao an-tendrony ambony indrindra, efatra na dimy ao amin''ny rantsan''ny hazo mahavokatra, hoy Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_23::17::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hanandrandra ny Mpanao azy ny olona, ary ny masony hijery ny Iray Masin''ny Isiraely,'
mg1865::mg_23::17::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hanandrandra ny alitara, asan''ny tanany, intsony izy. Ary ny nataon''ny rantsan-tanany tsy hahoany, na ny Aseraha*, na ny tsangankazo* ho an''ny masoandro. [*Anaran''andriamani-tsy izy, na ny sariny] [**Na: tsangam-bato]'
mg1865::mg_23::17::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany ny tanànany mafy, dia ho tahaka ny tany lao any an''ala na any an-tampon-tendrombohitra Izay nilaozan''ny olona teo anoloan''ny Zanak''Isiraely, ka dia ho foana ny tany.'
mg1865::mg_23::17::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanadino an''Andriamanitry ny famonjena anao ianao ary tsy nahatsiaro ny vatolampy fiarovana mafy ho anao, ka dia nanao voly mahafinaritra ianao ary zana-boaloboka avy amin''ny firenena hafa no nambolenao teo;'
mg1865::mg_23::17::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro nambolenao azy dia nofefenao izy, ary nony maraina dia nampitsimohinao ilay nambolenao; nefa ho vokatra miavosa izany ho amin''ny andro fangirifiriana* sy fanaintainana tsy azo sitranina. [*Na: Nefa ho levona ny vokatra amin''ny andro hahazoana azy]'
mg1865::mg_23::17::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny handringanana ny Asyriana'
  verse_text: 'Indrisy ny fihahohahon''ny firenena maro! Izay mihahohaho tahaka ny feon''ny ranomasina! Indrisy ny firohondrohon''ny olona maro be! Tahaka ny firohondrohon''ny rano manonja ny firohondrohony!'
mg1865::mg_23::17::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, mirohondrohona tahaka ny firohondrohon''ny rano be ny firenena; kanefa hotezerana mafy izy, ka dia handositra lavitra ary ho lasa tahaka ny akofa eny an-tendrombohitra, raha paohin''ny rivotra, sy tahaka ny fakom-bary mitambolimbolina entin''ny tadio.'
mg1865::mg_23::17::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hariva ny andro, dia, injao, fampahatahorana; ary raha tsy mbola maraina akory aza, dia tsy ao intsony ireny. Izany no anjaran''izay mamabo antsika sy tambin''izay mandroba antsika.'
mg1865::mg_23::18::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny haneken''ny Etiopiana an''i Jehovah noho ny handrenesany ny nandringanana ny Asyriana'
  verse_text: 'Indrisy ny tany be fibiziziokan''elatra! Izay any an-dafin''ny onin''i Etiopia,'
mg1865::mg_23::18::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampandeha iraka eny ambon''ny ranomasina, Ao anaty lakan-jozoro ambonin''ny rano, ka manafatra azy hoe : Mandehana, ry iraka faingam-pandeha, ho any amin''ny firenena lava tsanganana* sady mandimandina, any amin''ny olona mahatahotra hatreto ka hatrany hatrany**, dia firenena mpanao teny tsy valiana*** sady maherisetra****, izay vakin''ny ony maro ny taniny. [*Na: ela fiainana] [**Na: hatramin''ny niandohany ka mandraka ankehitriny] [***Na: matanjaka indindra; na: mahery mamaritra tany ho azy] [****Hebreo: manitsakitsaka]'
mg1865::mg_23::18::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mponina rehetra amin''izao tontolo izao sy mpitoetra ety ambonin''ny tany! Raha misy faneva atsangana eo an-tampon-tendrombohitra, dia mijere ianareo, ary raha misy anjomara tsofina, dia mihainoa.'
mg1865::mg_23::18::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no nolazain''i Jehovah tamiko hangina Aho aloha ka hijery eto amin''ny fitoerako, raha mbola mipoaka tsara ny hainandro, ary misy* zavona** amin''ny hainandro fararano. [**Na: Toy ny hainandro mipoaka tsara sy ny] [**Heb; rahon''ando]'
mg1865::mg_23::18::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany, ka efa mby am-boany ny voniny, dia horantsanany amin''ny fanetezam-boaloboka ny rantsany, ary hotapahiny sy hesoriny ny sakeliny.'
mg1865::mg_23::18::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hafoy avokoa izy ho an''ny vorona mpihaza eny an-tendrombohitra sy ho an''ny biby eny ambonin''ny tany; ary ny vorona mpihaza handany fahavaratra any; Ary ny biby rehetra ambonin''ny tany handany ririnina any.'
mg1865::mg_23::18::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy fanomezana ho entina ho an''i Jehovah, Tompon''ny maro, dia firenena lava tsanganana* sady mandimandina, ary avy amin''ny firenena mahatahotra hatreto ka hatrany** hatrany dia firenena mpanao teny tsy valiana*** sady maherisetra***, Izay vakin''ny ony maro ny taniny ho ao amin''ny fitoeran''ny anaran''i Jehovah, Tompon''ny maro, dia ny tendrombohitra Ziona. [*Na: ela fiainana] [**Na: hatramin''ny niandohany ka mandraka ankehitriny] [***Na: matanjaka indrindra; na: mahary mamaritra tany ho azy] [****Hebreo: manitsakitsaka]'
mg1865::mg_23::19::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Egypta'
  verse_text: 'Indro, Jehovah mitaingina rahona miriotra mafy ka mankany Egypta; Ary ny andriamani-tsy izy any Egypta dia mangorohoro eo anatrehany*, ary ny fon''i Egypta dia ketraka ao anatiny. [*Na: mandositra azy]'
mg1865::mg_23::19::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamporisihiko hiady izy samy Egyptiana, ka samy hiady amin''ny rahalahiny avy sy amin''ny namany avy izy; Ny tanàna hiady amin''ny tanàna, ary ny fanjakana amin''ny fanjakana.'
mg1865::mg_23::19::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho very hevitra ny Egyptiana; Eny, hofoanako ny saina ataony; Ary hila saina amin''ny andriamani-tsy izy sy amin''ny mpibitsibitsika amin''ny odiny izy sy amin''ny manao azy ho tsindrian-javatra ary amin''ny mpanao sikidy.'
mg1865::mg_23::19::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Egypta dia hatolotro hogiazana amin''izay fitondrana mafy, ary mpanjaka masiaka no hanjaka aminy, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_23::19::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rano amin''ny ranomasina ho tankina, ary ny ony ho ritra ka ho maina;'
mg1865::mg_23::19::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho maimbo ny sampantsampan''ny ony; Ary ny lahin-dranon''i Egypta* hihena ka ho maina; Ny volotara sy ny zozoro halazo; [*Hebreo: Mazora]'
mg1865::mg_23::19::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany eny amoron''i Neily sy ny tanimbary rehetra eny amoron''i Neily samy ho maina sy hanjary vovoka ka tsy ho eo intsony.'
mg1865::mg_23::19::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitomany ny mpaka hazan-drano, ary hisaona ny mpamintana rehetra ao Neily, Ary ho reraka ny mpandatsaka* harato amin''ny rano. [*Hebreo: mpamelatra]'
mg1865::mg_23::19::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho very fanantenana izay mandraotra rongony amin''ny fihogo sy izay manenona hariry.'
mg1865::mg_23::19::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny andrin*''ny tany ho torotoro, ary ny mpikarama rehetra halahelo. [*Na: fanorenan'']'
mg1865::mg_23::19::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa adala mihitsy ny mpanapaka any Zoana; Hevi-poana no avoak''izay hendry indrindra amin''ny mpanolotsain''i Farao; Ahoana no ilazanareo amin''i Farao hoe: Zanak''olon-kendry aho sady taranak''ireo mpanjaka fahagola?'
mg1865::mg_23::19::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ary ireo olon-kendrinao ireo? Aoka hanambara aminao izy, ary aoka ho fantany izay nokasain''i Jehovah, Tompon''ny maro, hatao amin''i Egypta.'
mg1865::mg_23::19::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa adala ny mpanapaka any Zoana, efa voafitaka ny mpanapaka any Memfisa*; Ary efa nampivembena an''i Egypta ireo fehizoron''ny fireneny. [*Hebreo: Nofa]'
mg1865::mg_23::19::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nampidina* fanahy mampandraingiraingy teo Egypta; ka efa nampivembena azy tamin''ny asany rehetra ireo, dia tahaka ny olona mamo miraingiraingy sady mandoa. [*Hebreo: nangaroharo]'
mg1865::mg_23::19::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy tsy hahatontosa ny asany ny Egyptiana, na ny loha na ny rambo, na ny sampan-drofia* na ny zozoro. [*palma]'
mg1865::mg_23::19::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia ho tahaka ny vehivavy Egypta ka ho toran-kovitra sy ho raiki-tahotra noho ny faninjitr''i Jehovah, Tompon''ny maro, ny tanany, izay ahinjiny hamelezany azy.'
mg1865::mg_23::19::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanin''ny Joda dia ho fahatahoran''i Egypta, ka na oviana na oviana no misy miresaka izany aminy dia ho raiki-tahotra izy noho ny fikasan''i Jehovah, Tompon''ny maro, izay kasainy ny amin''ny hamelezana azy.'
mg1865::mg_23::19::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy tanana dimy amin''ny tany Egypta samy hiteny ny fitenin''i Kanana sy hianiana ho an''i Jehovah, Tompon''ny maro; Ny anankiray hatao hoe Ira-haresa*. [*Ira-haresa = Tanàna haringana, na Tanànan''ny masoandro]'
mg1865::mg_23::19::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy alitara ho an''i Jehovah eo amin''ny tany Egypta sy tsangam-bato eo an-tsisiny ho an''i Jehovah.'
mg1865::mg_23::19::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho famantarana sy vavolombelona ho an''i Jehovah, Tompon''ny maro, ao amin''ny tany Egypta izany; Fa hitaraina* amin''i Jehovah noho ny mpampahory izy, ary haniraka mpamonjy sy mpiaro ho ao aminy Izy ka hamonjy azy. [*Na: ary izao no ho famantarana sy vavolombelona, etc.: Raha mitaraina]'
mg1865::mg_23::19::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hanao izay hahafantaran''ny Egyptiana Azy, ary ny Egyptiana kosa hahalala an''i Jehovah amin''izany andro izany; Dia hanompo Azy amin''ny fanatitra alatsa-drà sy amin''ny fanatitra hohanina izy ka hivoady amin''i Jehovah sady hanefa ny voadiny.'
mg1865::mg_23::19::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hamely ny Egyptiana, eny, fa sady hamely Izy no hanasitrana; Dia hiverina ho any amin''i Jehovah ireo, ka hekeny ny fangatahany, ary hositraniny izy.'
mg1865::mg_23::19::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy lalambe avy any Egypta mankany Asyria, koa ny Asyriana dia hankany Egypta, ary ny Egyptiana kosa hankany Asyria, ary ny Egyptiana sy ny Asyriana hiara-mivavaka*. [*Hebreo: hiara-manompo]'
mg1865::mg_23::19::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany ny Isiraely no ho fahatelony amin''i Egypta sy Asyria ho fitahiana eo amin''ny tany;'
mg1865::mg_23::19::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hotahin''i Jehovah, Tompon''ny maro, ireo ka hataony hoe: Hotahina anie Egypta oloko, sy Asyria, asan''ny tanako, ary Isiraely lovako.'
mg1865::mg_23::20::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana ny amin''ny handravana an''i Etiopia sy Egypta'
  verse_text: 'Tamin''ny taona nankanesan''i Tartana tany Asdoda, raha nirahin''i Sargona, mpanjakan''i Asyria, izy ka namely an''i Asdoda ary nahafaka azy,'
mg1865::mg_23::20::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''izany andro izany no nampitondran''i Jehovah teny an''Isaia, zanak''i Amoza, hoe: Andeha, borahy ny lamba fisaonana ho afaka amin''ny valahanao, ary esory ny kiraronao hiala amin''ny tongotrao. Dia nanao izany izy ka nandeha tsy nitafy sady tsy nikiraro.'
mg1865::mg_23::20::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: Tahaka ny nandehanan''Isaia mpanompoko telo taona sady tsy nitafy no tsy nikiraro mba ho famantarana sy ho fahagagana ny amin''i Egypta sy Etiopia,'
mg1865::mg_23::20::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho toy izany no hitondran''ny mpanjakan''i Asyria ny Egyptiana ho babo sy ny Etiopiana ho sambotra, na tanora na antitra, samy tsy hitafy sady tsy hikiraro no tsy hisarom-pe, ho henatr''i Egypta.'
mg1865::mg_23::20::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho raiki-tahotra sy ho menatra ny Isiraely* noho ny amin''i Etiopia fanantenany sy Egypta reharehany. [*Hebreo: izy]'
mg1865::mg_23::20::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny mponina ety amoron-dranomasina dia hanao hoe: He! ity manjo ilay nantenaintsika sady nandosirantsika ho famonjena antsika ho afaka amin''ny mpanjakan''i Asyria! Aiza intsony re no handosirantsika?'
mg1865::mg_23::21::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Babylona'
  verse_text: 'Faminaniana ny amin''ny loza hanjo ny Efitra Ranobe*. Tahaka ny firimorimon''ny tadio any atsimo no fihaviny avy any an''efitra, dia avy any amin''ny tany mahatahotra. [*Hebreo: Ranomasina]'
mg1865::mg_23::21::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy fahitana mampahory naseho tamiko: Ny mpamitaka mamitaka, ary ny mpandringana mandringana. Iakaro, ry Elama o! ekeo, ry Media o! Hatsahatro ny fisentoana rehetra.'
mg1865::mg_23::21::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita izany aho, dia feno fanaintainana ny valahako; Fijalijaliana no nahazo ahy tahaka ny fijalijalian''ny vehivavy raha miteraka; Niolanolana fatratra aho ka tsy nandre izany; Toran-kovitra aho ka tsy nahita izany.'
mg1865::mg_23::21::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niemponempona ny foko, nampahatahotra ahy ny horohoro; Ny hariva fahafinaretako nampodiny ho fangovitako.'
mg1865::mg_23::21::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: '2022-04-19T06:42:15+0000'
  verse_title: null
  verse_text: 'Velarina ny latabatra, miambina* ny mpiambina, mihinana sy misotro ny olona. Mitsangàna, ianareo lehibe, ka hosory ny ampinga! [*Na: velarina ny tsihy]'
mg1865::mg_23::21::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no nolazain''i Jehovah tamiko: Mandehana, manendre tily; Ka izay hitany no aoka holazainy.'
mg1865::mg_23::21::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahita izy ka indreo mpitaingina manao andiany mandeha tsiroaroa sy boriky andiany ary rameva andiany. Ary nihaino izy, eny, nihaino dia nihaino;'
mg1865::mg_23::21::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso nanao feon-diona izy ka nanao hoe: Tompo o! izaho mijanona mandrakariva eto ambonin''ny fitazanako nony antoandro, Ary mitoetra eto amin''ny fiambenako aho mandritra ny alina;'
mg1865::mg_23::21::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indreo, avy ny olona an-diany, mpitaingina mandeha tsiroaroa; Ary nanandratra ny feony izy ka nanao hoe: Rava, rava Babylona! Ary ny sarin*''ny andriamaniny rehetra dia voatorotoro miraraka amin''ny tany. [*Hebreo: sarin-javatra voasokitra]'
mg1865::mg_23::21::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry ahy voavely toy ny vary teo am-pamoloako o*! Izay efa reko tamin''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, no nambarako taminareo. [*Hebreo: zanaky ny famoloako]'
mg1865::mg_23::21::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Edoma'
  verse_text: 'Faminaniana ny amin''ny loza hanjo an''i Edoma*. Misy miantso ahy any Seira manao hoe: Ry mpiambina o, toy inona alina moa izao ? Ry mpiambina o, toy inona alina moa izao? [*Hebreo: Doma]'
mg1865::mg_23::21::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpiambina: Avy ny maraina, avy koa ny alina; Raha mbola ta-hanontany ianareo, dia manontania ihany; ka avia, miverena*. [*Na: avia indray]'
mg1865::mg_23::21::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Arabia'
  verse_text: 'Faminaniana ny amin''ny loza hanjo an''i Arabia. Any an''ala any Arabia no andrianareo, ry andian''ny Dedanita.'
mg1865::mg_23::21::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Itondrana rano ny mangetaheta; Ny mponina amin''ny tany Tema mitsena hanina ny mandositra;'
mg1865::mg_23::21::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandositra ny sabatra ireo, dia ny sabatra voatsoaka sy ny tsipïka voahenjana ary ny havesatry ny ady.'
mg1865::mg_23::21::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no nolazain''i Jehovah tamiko: Ato anatin''ny herintaona, tahaka ny taonan''ny mpikarama, dia ho levona avokoa ny voninahitr''i Kedara;'
mg1865::mg_23::21::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tsipïka sisa izay; an''ny lehilahy mahery, taranak''i Kedara, dia ho vitsy foana, fa Jehovah Andriamanitry ny Isiraely, ao efa niteny.'
mg1865::mg_23::22::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Jerosalema'
  verse_text: 'Faminaniana ny amin''ny lohasahan''ny Fahitana. Inona re izato manjo anareo*, no dia miakatra eny an-tampon-trano avokoa ianareo**, [*Hebreo: anao] [**Hebreo: ianao]'
mg1865::mg_23::22::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry ilay be horakoraka, tanàna be tabataba, vohitra miravoravo? Ny faty eo aminao dia tsy mba novonoin-tsabatra, na maty an''ady.'
mg1865::mg_23::22::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niara-nandositra ny lehibenao, nafatotra tsy amin-tsipïka izy; Izay rehetra hita tao aminao dia niara-nafatotra, na dia nitady handositra lavitra aza. [*Na: Nafatotry ny mpandefa zana-tsipïka]'
mg1865::mg_23::22::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no anaovako hoe: Mihodina tsy hijery ahy, fa hitomany mafy dia mafy aho; Aza dia fatra-pampionona ahy noho ny fandringanana ny oloko zanakavavy'
mg1865::mg_23::22::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao amin''ny lohasahan''ny fahitana dia misy andron''i Jehovah, Tompon''ny maro, andro fitabatabana sy fanosihosena sy fahaverezan-kevitra, ary fandravana ny manda sy fidradradradrana manako hatrany an-tendrombohitra'
mg1865::mg_23::22::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elama mitondra ny tranon-jana-tsipïka mbamin''ny kalesy misy olona sy ny mpitaingin-tsoavaly; Ary Kira manaisotra ny fonon''ampinga'
mg1865::mg_23::22::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsara indrindra amin''ny lohasahanao dia feno kalesy, ary ny mpitaingin-tsoavaly milahatra eo am-bavahady'
mg1865::mg_23::22::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia alana ny fisalobonan''i Joda, ary mijery ny fiadiana ao an-Tranoala ianao amin''izany andro izany.'
mg1865::mg_23::22::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: '2022-09-26T05:29:41+0000'
  verse_title: null
  verse_text: 'Ary hitanareo fa banga be ihany ny tanànan''i Davida; Ary mamory ny rano avy amin''ny kamory ambany ianareo.'
mg1865::mg_23::22::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isainareo ny trano any Jerosalema, ka dia ravanareo ny trano ho enti-manamafy ny manda.'
mg1865::mg_23::22::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: '2022-04-19T06:42:50+0000'
  verse_title: null
  verse_text: 'Mihady lavaka famorian-drano eo anelanelan''ny manda roa ianareo handehan''ny rano avy amin''ny kamory ela; Kanefa tsy mijery Izay efa nanomana izao zavatra izao ianareo, na mahita Izay nikasa azy hatry ny fony ela.'
mg1865::mg_23::22::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany Jehovah, Tompon''ny maro, Hiantso fitomaniana sy fioriana sy fiharatana ary fisikinana lamba fisaonana.'
mg1865::mg_23::22::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: '2022-04-19T06:42:30+0000'
  verse_title: null
  verse_text: 'Kanjo he izato hafaliana sy haravoravoana! Sy famonoana omby sy ondry aman''osy ary fihinanan-kena sy fisotroan-divay! Aoka isika hihinana sy hisotro, fa rahampitso dia ho faty.'
mg1865::mg_23::22::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambaran''i Jehovah, Tompon''ny maro, teo an-tsofiko izao: Tsy havela mihitsy ambara-pahafatinareo izao helokareo izao, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_23::22::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny amin''ny nanonganana an''i Sebna sy ny nanendrena an''i Eliakima ho solony'
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Andeha mankao amin''ilay mpanolo-tsaina io, dia ao amin''i Sebna, lehiben''ny ao an-dapa, ka ataovy hoe:'
mg1865::mg_23::22::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao inona ety ianao, ary inonao moa no ety, No manao fasana ety ianao, dia manao fasana ho anao* ety amin''ny hantsana sy mandoaka fonenana ho anao* ety amin''ny harambato? [*Hebreo: ho azy]'
mg1865::mg_23::22::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Jehovah hanipy mafy* anao, eny, hofiazany mafy ianao, [*Na: hosaronany]'
mg1865::mg_23::22::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: '2022-04-19T06:42:22+0000'
  verse_title: null
  verse_text: 'Dia hovolavolainy toy ny kodiarana ka hakodiadiany ho any amin''ny tany malalaka; Dia any no hahafaty anao, ary ho any koa ny kalesin''ny voninahitrao ry ilay henatry ny mpianakavin''ny tomponao.'
mg1865::mg_23::22::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary horoahiko hiala amin''ny fitoeranao ianao sy haongako* hiala amin''ny raharahanao [*Hebreo: haongany]'
mg1865::mg_23::22::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hantsoiko kosa Eliakima mpanompoko, zanak''i Hilkia;'
mg1865::mg_23::22::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampiakanjoiko azy ny akanjonao, sady hosikinako amin''ny fehin-kibonao izy; Ka dia hatolotro eo an-tanany ny fanapahanao, ary dia ho tonga rain''ny mponina eto Jerosalema sy ny taranak''i Joda izy.'
mg1865::mg_23::22::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hapetrako eo an-tsorony ny fanala hidin''ny tranon''i Davida; Dia hamoha izy, ka tsy hisy handrindrina; Ary handrindrina izy, ka tsy hisy hamoha.'
mg1865::mg_23::22::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsatoko toy ny fihantonan-javatra eo amin''ny fitoerana mafy izy ka ho sezam-boninahitra ho an''ny mpianakavin-drainy.'
mg1865::mg_23::22::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: '2022-09-26T05:29:47+0000'
  verse_title: null
  verse_text: 'Ary hahantona eo aminy ny havesatry ny voninahitry ny mpianakavin-drainy rehetra, izay zanaka sy tera-drainy rehetra, dia ny fanaka madinika rehetra hatramin''ny lovia ka hatramin''ny siny samy hafa rehetra.'
mg1865::mg_23::22::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany, hoy Jehovah, Tompon''ny maro, Dia hiala ilay fihantonan-javatra voatsatoka teo amin''ny fitoerana mafy; Eny, hokapaina izy ka hianjera, dia ho simba ny entana izay nihantona teo aminy; Fa Jehovah no efa niteny.'
mg1865::mg_23::23::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny loza hanjo an''i Tyro'
  verse_text: 'Faminaniana ny amin''ny loza hanjo an''i Tyro. Midradradradrà ianareo, ry sambon''i Tarsisy o! Fa rava Tyro, ka tsy misy trano sady tsy azo idirana intsony ao; Avy tany amin''ny tany Kitima no nanambarana izany taminy.'
mg1865::mg_23::23::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangina, ianareo mponina amoron-tsiraka! Ny mpandranto avy any Sidona, Izay mandeha eny ambonin''ny ranomasina, no efa nampanan-karena* anao. [*Hebreo: nameno]'
mg1865::mg_23::23::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teny amin''ny rano be ny varin''i Sihora, dia ny vokatr''i Neily, ka nampiditra harena ho azy; Ary tonga tsenan''ny firenena izy.'
mg1865::mg_23::23::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra ianao, ry Sidona; Fa ny ranomasina, dia ny fiarovana mafy ao an-dranomasina, efa niteny hoe: Tsy mbola nihetsi-jaza aho, na niteraka, tsy mbola nitaiza zatovo aho, na namelona virijina.'
mg1865::mg_23::23::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa re tany Egypta izany, Dia toran-kovitra izy noho ny nanjo an''i Tyro.'
mg1865::mg_23::23::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mità ho any Tarsisy ianareo; Midradradradrà, ry mponina amoron-tsiraka.'
mg1865::mg_23::23::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao va no manjo anao, ry ilay niravoravo*, izay efa naorina hatry ny fony fahagola sady nentin''ny tongony hivahiny any lavitra any? [*Izao va no tanànanao miravoravo?]'
mg1865::mg_23::23::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nikasa izany hamelezana an''i Tyro, mpanome satro-boninahitra, izany? Mpanapaka ny mpandrantony, Olo-malaza amin''ny tany ny mpivarony.'
mg1865::mg_23::23::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro, no nikasa izany, mba hampietreny ny fiavonavonan''ny voninahitra rehetra, sy hanalany ny voninahitry ny olo-malaza rehetra amin''ny tany.'
mg1865::mg_23::23::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Tarsisy zanakavavy, aoka ianao hanafotra ny taninao tahaka an''i Neily; Fa tsy misy fifehezana* intsony. [*Hebreo: fehin-kibo]'
mg1865::mg_23::23::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanan''i Jehovah nahifiny tambonin''ny ranomasina; Nampihorohoroiny ny fanjakana; Jehovah efa nandidy ny amin''i Kanana, mba horavana ny fiarovany mafy.'
mg1865::mg_23::23::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Tsy hiravoravo intsony ianao, ry virijina afa-baraka, Sidona zanakavavy; Miaingà, mità ho any Kitima; Kanefa na dia any aza tsy hahita fitsaharana tsy akory ianao.'
mg1865::mg_23::23::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny tanin''ny Kaldeana! Tsy firenena intsony izy, fa nataon''ny Asyriana fonenan''ny bibi-dia any an''efitra*; Manao tilikambo fitiliana izy ka mandrava ny lapan''ny mpanjaka ao ary mampody azy ho korontam-bato. [*Na: Indro ny tanin''ny Kaldeana, Izay tsy mbola firenena fahiny, Fa ny Asyriana no nanorina azy ho an''ny mponina any an''efitra]'
mg1865::mg_23::23::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà ianareo, ry sambon''i Tarsisy o! Fa rava ny fiarovanareo mafy.'
mg1865::mg_23::23::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hohadinoina fito-polo taona Tyro, toy ny andron''ny mpanjaka iray; Ary rehefa afaka fito-polo taona, Tyro dia hiharan''ilay tonon-kalon''ny janga manao hoe:'
mg1865::mg_23::23::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: '"Makà lokanga, ka miveziveze eran''ny tanàna ianao, ry kala janga hadino; Mitendre tsara, ka mahereza mivazovazo, mba hahatsiarovana anao."'
mg1865::mg_23::23::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka fito-polo taona, Jehovah hamangy an''i Tyro, ka dia hiverina amin''ny filan-tangy izy sy hijangajanga amin''ny fanjakana rehetra manerana izao tontolo izao.'
mg1865::mg_23::23::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varony sy ny tangy azony dia hohamasinina ho an''i Jehovah; Tsy hotehirizina na horaketina izany; Fa ny varony dia ho an''izay mitoetra eo anatrehan''i Jehovah, ho hanina mahavoky sy ho fitafiana mendrika*. [*Na: mateza]'
mg1865::mg_23::24::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hitsarana ny tany, sy ny hanjakan''i Jehovah ao Ziona'
  verse_text: 'Indro, Jehovah mahafoana ny tany ka mahalao azy ary mampihohoka azy ka manely izay mponina ao aminy.'
mg1865::mg_23::24::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ho sahala ihany ny hanjo ny mpisorona sy ny vahoaka, ny tompolahy sy ny mpanompolahiny, ny tompovavy sy ny mpanompovaviny, ny mpivarotra sy ny mpividy, ny mpampisambotra sy ny mpisambotra, ny mpampanàna vola sy ny mpanana vola.'
mg1865::mg_23::24::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatao foana dia foana ny tany, ary hobaboina dia hobaboina tokoa izy, fa Jehovah no efa niteny.'
mg1865::mg_23::24::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaona sy malazo ny tany; Milofika sy malazo izao tontolo izao; Milofika ny lehibe indrindra amin''ny olona ety an-tany.'
mg1865::mg_23::24::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany dia efa voavetavetan''ny mponina ao aminy, satria nandika ny lalàna sy nanota ny didy izy ary nivadika ny fanekena mandrakizay.'
mg1865::mg_23::24::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ozona no mandevona ny tany, ary ny mponina ao dia valiana noho ny helony, sady voadotra ny mponina amin''ny tany ka dia olona vitsy foana no sisa ao.'
mg1865::mg_23::24::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaona ny ranom-boaloboka, milofika ny taro-boaloboka, misento avokoa ilay nifaly am-po;'
mg1865::mg_23::24::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsahatra ny firavoravoana amin''ny ampongatapaka, tapitra ny fitabataban''ny niravoravo; Mitsahatra ny fifaliana amin-dokanga;'
mg1865::mg_23::24::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mihira eo am-pisotroan-divay intsony izy, mangidy amin''izay misotro azy ny toaka;'
mg1865::mg_23::24::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rava ny tanana be fikorontanana, mirindrina ny trano rehetra ka tsy azo idiran''olona;'
mg1865::mg_23::24::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy fitarainana divay eny an-tsaha, tafalentika toy ny masoandro ny fifaliana rehetra; Voaroaka ny faharavoravoan''ny tany.'
mg1865::mg_23::24::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahafoanana ihany no sisa ao an-tanàna, satria rava sady montsamontsana ny vavahady,'
mg1865::mg_23::24::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao amin''ny tany, ao amin''ny olona, dia hisy toy ny amin''ny fikapohana hazo oliva sy ny fitsimpontsimponam-boaloboka, rehefa tapitra ny andro fiotazana azy.'
mg1865::mg_23::24::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia hanandratra ny feony ka hihoby; Noho ny fahalehibiazan''i Jehovah dia hiantso mafy eny amin''ny ranomasina izy hoe:'
mg1865::mg_23::24::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah any amin''ny tany atsinanana, dia ny anaran''i Jehovah, Andriamanitry ny Isiraely, any amin''ny amoron-dranomasina.'
mg1865::mg_23::24::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatrany am-paran''ny tany no nandrenesanay hira hoe: Voninahitra ho an''ny marina. Fa hoy izaho: Indrisy izato halevonako! Indrisy ity halevonako! Ny mpamitaka dia mamitaka; Eny, ny mpamitaka dia mamitaka fatratra.'
mg1865::mg_23::24::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahotra sy longoa ary fandrika no mahazo anao, ry mponina amin''ny tany.'
mg1865::mg_23::24::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mandositra noho ny fandrenesana ny tahotra dia ho latsaka any an-davaka; Ary izay miakatra avy ao anatin''ny lavaka dia ho voan''ny fandrika; Fa misy varavarana mivoha any amin''ny avo, ary mihorohoro ny fanorenan''ny tany.'
mg1865::mg_23::24::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rava dia rava ny tany; Mitresaka dia mitresaka ny tany; Mihorohoro dia mihorohoro ny tany;'
mg1865::mg_23::24::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: '2022-04-19T06:42:06+0000'
  verse_title: null
  verse_text: 'Mivembena dia mivembena tahaka ny mamo ny tany ka mitsingevaheva toy ny fandriana mihantona; ary mitambesatra aminy ny fahadisoany, dia potraka izy ka tsy ho tafarina intsony.'
mg1865::mg_23::24::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia any an-danitra no hamalian''i Jehovah ny antokon''ny lanitra, ary ety an-tany kosa ny mpanjakan''ny tany.'
mg1865::mg_23::24::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hangonina ao an-davaka tahaka ny mpifatotra ireny ka hohidiana ao an-trano-maizina, ary rehefa afaka andro maro, dia hovangiana* ihany izy. [*Na: hovaliana]'
mg1865::mg_23::24::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hivoara-mena ny volana, ary hivaloarika ny masoandro, fa Jehovah, Tompon''ny maro, no Mpanjaka ao an-tendrombohitra Ziona sy any Jerosalema, ary eo anatrehan''ny loholony dia misy voninahitra.'
mg1865::mg_23::25::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Hira fisaorana an''Andriamanitra noho ny soa nataony ho an''ny olony sy ny nampijaliany ny fahavalony kosa'
  verse_text: 'Jehovah o, Andriamanitro Ianao; Hanandratra Anao sy hidera ny anaranao aho, fa efa nanao zava-mahagaga Ianao, dia zavatra efa voakasa hatramin''ny ela sady mahatoky no marina indrindra.'
mg1865::mg_23::25::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nataonao tonga korontam-bato ny tanàna; Ny tanàna mimanda dia rava tokoa; Ny lapan''ny fahavalo* dia nataonao tsy vanon-ko tanàna; Tsy hatsangana intsony mandrakizay iny; [*Hebreo: hafa firenena]'
mg1865::mg_23::25::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hankalaza Anao ny firenena masiaka, Hatahotra Anao ny tanànan''ny firenena lozabe.'
mg1865::mg_23::25::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fiarovana mafy ho an''ny reraka Ianao, eny, fiarovana mafy ho an''ny malahelo amin''ny fahoriany, fierena amin''ny ranonoram-baratra, fialokalofana amin''ny hainandro, fa ny rivotry ny mahery dia tahaka ny ranonorana mifafy mamely ny ampiantany.'
mg1865::mg_23::25::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fandresinao ny hainandro izay mamely ny tany karankaina no andresenao ny fitabataban''ny firenena hafa; Eny, tahaka ny amin''ny hainandro resin''ny aloky ny rahona matevina no andresena ny fanakoran''ny olon-dozabe.'
mg1865::mg_23::25::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah, Tompon''ny maro, dia hanao fanasana ho an''ny firenena rehetra eto amin''ity tendrombohitra ity, dia fanasana amin''ny zavatra matavy, fanasana amin''ny divay efa niotrika ela, zavatra matavy be tsoka, divay efa niotrika ela sady voadio tsara.'
mg1865::mg_23::25::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofoanany eto amin''ity tendrombohitra ity, ny sarona izay manarona ny olona rehetra sy ny rakotra izay arakotra ny firenena rehetra.'
mg1865::mg_23::25::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hofoanany tsy hisy mandrakizay ny fahafatesana; Ary Jehovah Tompo hamafa ny ranomaso amin''ny tava rehetra sady hanafa-tondromaso ny olony eny amin''ny tany rehetra, fa Jehovah no efa niteny.'
mg1865::mg_23::25::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary holazaina amin''izany andro izany hoe: Indro Andriamanitsika, izay nandrasantsika hamonjy antsika; Indro Jehovah, Izay nandrasan-tsika, koa dia aoka ho faly sy ho ravoravo amin''ny famonjeny isika.'
mg1865::mg_23::25::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hipetraka amin''ity tendrombohitra ity ny tanan''i Jehovah, ary Moaba hohosihosena ao amin''izay itoerany, dia tahaka ny fanosihosena ny mololo miavosa amin''ny rano ao am-pahitra;'
mg1865::mg_23::25::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia hamelatra ny tanany eo ampovoan''izany, tahaka ny famelatry ny mpilomano ny tanany raha milomano; Fa Jehovah* kosa hampietry ny fiavonavonany, na dia kanto aza ny fahamailamailaky ny tanany. [*Hebreo: Izy]'
mg1865::mg_23::25::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mandanao mafy sy avo dia harodany ka haetriny sy hofongorany hatramin''ny tany, dia hatramin''ny vovoka.'
mg1865::mg_23::26::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hohiraina eto amin''ny tanin''ny Joda izao fihirana izao: Manana tanàna mafy isika; Famonjena no hotendren''i Jehovah ho manda sy fiarovana.'
mg1865::mg_23::26::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vohay ny vavahady, mba hidiran''ny firenena marina, izay mitana ny fahamarinana.'
mg1865::mg_23::26::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny saina tsy miovaova dia harovanao ao amin''ny fiadanana tanteraka, satria matoky Anao izy.'
mg1865::mg_23::26::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matokia an''i Jehovah mandrakizay, fa Jehovah Tompo no Vatolampy mandrakizay.'
mg1865::mg_23::26::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: '2022-04-13T11:25:58+0000'
  verse_title: null
  verse_text: 'Fa naetriny ny mponina avo toerana; Ny tanàna avo dia arodany, eny, arodany ho amin''ny tany ka azerany ho amin''ny vovoka.'
mg1865::mg_23::26::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsahin''ny tongotra izy, dia ny tongotry ny ory sy ny faladian''ny mahantra.'
mg1865::mg_23::26::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaravona ny lalan''ny marina: Eny, aravonao ho marina indrindra* ny alehan''ny marina. [*Na: Ianao, Izay mahitsy, no manamarina]'
mg1865::mg_23::26::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''ny lalan''ny fitsaranao, Jehovah o, no iandrasanay Anao, ny anaranao sy ny fahatsiarovana Anao no irin''ny fanahinay.'
mg1865::mg_23::26::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fanahiko no aniriako Anao nony alina; Eny, ny saiko ato anatiko no itadiavako Anao fatratra; Fa raha mamely ny tany ny fitsaranao, dia mianatra fahamarinana ny mponina amin''izao tontolo izao.'
mg1865::mg_23::26::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia asiana soa aza ny ratsy fanahy, tsy mety mianatra fahamarinana izy; Eny, na dia ao amin''ny tanin''ny fahamarinana aza izy, mbola manao meloka ihany ka tsy mety mijery ny fahalehibiazan''i Jehovah.'
mg1865::mg_23::26::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, avo ny tananao, nefa tsy jeren''ireo; Tsy maintsy hojereny ihany anefa ny fahasaro-piaronao amin''ny olonao*, ka ho menatra izy; Eny, afo no handevona ny fahavalonao. [*Na: Hijery ihany anefa izy ka ho menatra noho ny fialonany ny olonao]'
mg1865::mg_23::26::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, manorina fiadanana ho anay Ianao: Fa ny asanay rehetra dia tanterahinao ho anay.'
mg1865::mg_23::26::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitray o, tsy Ianao ihany no efa nampanompo anay, fa tompo hafa koa; Nefa Ianao irery ihany no ahazoanay mankalaza ny anaranao.'
mg1865::mg_23::26::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maty tsy ho velona intsony, ny matoatoa tsy mba hitsangana; Fa novalianao izy ka naringanao, sady nolevoninao avokoa ny fahatsiarovana azy.'
mg1865::mg_23::26::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampitombo ny firenena Ianao, Jehovah o, Eny, nampitombo ny firenena Ianao ka nahazo voninahitra ho Anao; Nitarinao halalaka avokoa ny faritry ny tany.'
mg1865::mg_23::26::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, nony azom-pahoriana izy, dia nitady Anao; Nony niharan''ny famaizanao izy, dia nanao vavaka anakampo.'
mg1865::mg_23::26::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka izay bevohoka efa madiva hiteraka ka miolanolana sy mitaraina noho ny faharariany, dia tahaka izany izahay teo imasonao, Jehovah o,'
mg1865::mg_23::26::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa bevohoka izahay, efa nihetsi-jaza izahay, Efa tahaka ny nitera-drivotra izahay; Tsy nahavita famonjena ho an''ny tany izahay, ka tsy niteraka ny mponina amin''izao tontolo izao.'
mg1865::mg_23::26::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho velona indray ny olonao izay efa maty, ny fatin''ny oloko hitsangana; Koa mifohaza sy mihobia, ianareo izay mandry ao amin''ny vovoka; Fa ny andonao dia tahaka ny andon''ny fahazavana*, ary ny tany hiteraka ny maty**. [*Na: ando amin''ny anana] [**Hebreo: ny matoatoa]'
mg1865::mg_23::26::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ry oloko, midira ao amin''ny efi-tranonao, ary mirindrina varavarana ianao, ka miere kely indray mipi-maso monja Mandra-pahalasan''ny fahatezerana.'
mg1865::mg_23::26::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Jehovah mivoaka avy amin''ny fitoerany hamaly ny mponina amin''ny tany noho ny helony; Ary ny tany hampiseho ny rà izay nofohiny ka tsy hanafina intsony izay novonoina teo aminy.'
mg1865::mg_23::27::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany ny sabatr''i Jehovah, izay mafy sady lehibe no mahery, no ho entiny mamaly ny leviatana, dia ilay menarana mandositra, sy ny leviatana, dia ilay menarana miforoporotra, Ary hovonoiny ilay dragona ao an-dranomasina.'
mg1865::mg_23::27::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany no hihiranareo ny amin''ny tanim-boaloboka ahazoana divay mahery hoe:'
mg1865::mg_23::27::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Jehovah no mpiaro io; Isaky ny indray mipi-maso no andemako azy, Fandrao misy manimba azy; Na andro na alina dia miaro azy aho.'
mg1865::mg_23::27::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fahatezerana ato amiko; Enga anie ka hisy hery sy tsilo eto anatrehako hiadiako. Dia hiroatako ireo ka hodorako avokoa!'
mg1865::mg_23::27::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy izany, dia aoka hifikitra amin''ny heriko kosa izy ka hihavana amiko; Eny, aoka hihavana amiko izy.'
mg1865::mg_23::27::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro ho avy dia hamaka tsara Jakoba; Ary Isiraely hamony sy hitsimoka ka hameno izao tontolo izao amin''ny fahavokarany.'
mg1865::mg_23::27::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny namaizan''i Jehovah ny Isiraely sy ny mbola hamindrany fo aminy'
  verse_text: 'Moa tahaka ny namelezana izay namely azy va no moa namelezany azy koa? Ary tahaka ny namonoana izay novonoiny va no mba namonoana azy koa?'
mg1865::mg_23::27::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny nandroahany azy dia voafetra no niadiany taminy; Nokororohiny tamin''ny rivony mahery izy tamin''ny andron''ny rivotra avy any atsinanana.'
mg1865::mg_23::27::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka izao no hamelana ny helok''i Jakoba, Ary izao ihany no vokatry ny nanesorana ny fahotany, dia amin''ny anaovany ny vato rehetra amin''ny alitara ho tahaka ny vato sokay voatorotoro, ary ny Aseraha* sy ny tsangan-kazo** ho an''ny masoandro dia tsy hitsangana intsony. [*Anaran''andriamani-tsy izy, na sariny] [**Na: tsangam-bato]'
mg1865::mg_23::27::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho foana ny tanàna mimanda, ka dia ho fonenana afoy sy ilaozana tahaka ny efitra: Ao no hihinanan''ny zanak''omby, ary ao no handriany sy handaniany ny rantsan-kazony.'
mg1865::mg_23::27::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha malazo ny rantsany, dia hotapatapahina, ka ho avy ny vehivavy hitaina azy, satria firenena tsy manam-pahalalana izy, dia tsy hiantra azy ny Mpanao azy, ary tsy hamindra fo aminy ny Mpamorona azy.'
mg1865::mg_23::27::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hisy fampihintsanana* ataon''i Jehovah hatramin''ny ony mandriaka ka hatramin''ny lohasahan-driak''i Egypta; Ary ianareo samy hotsimponina tsirairay, ry Zanak''Isiraely. [*Na: fivelezam-bary]'
mg1865::mg_23::27::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany koa no hitsofana anjomara lehibe, dia ho avy izay very tany amin''ny tany Asyria sy izay efa voaroaka tany amin''ny tany Egypta, ka hiankohoka eo anatrehan''i Jehovah ao amin''ny tendrombohitra masina any Jerosalema.'
mg1865::mg_23::28::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hitsarana an''i Samaria sy Jerosalema, sy fanoharana mahamarina ny fitondran''Andriamanitra'
  verse_text: 'Lozan''ny satro-boninahitra, izay reharehan''ny mpimamo any Efraima, sy ny voninkazo mihamalazo amin''ny firàvany tsara tarehy, izay eo an-dohan''ny lohasaha lonaky* ny fileon-divay. [*Hebreo: matavy]'
mg1865::mg_23::28::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny Tompo manana izay mahery sady matanjaka, tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza; Koa tahaka ny fandriaky ny rano be manafotra no hanjerany azy mafy ho amin''ny tany.'
mg1865::mg_23::28::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hohitsahin''ny tongotra ny satro-boninahitra, Izay reharehan''ny mpimamo any Efraima.'
mg1865::mg_23::28::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninkazo mihamalazo amin''ny firàvany tsara tarehy, izay eo an-dohan''ny lohasaha lonaka*, dia ho tahaka ny voan''aviavy mialin-taona, raha tsy mbola tonga ny fahavaratra, koa izay mahita azy dia mijery, ary raha vao raisiny, dia arapany. [*Hebreo: matavy]'
mg1865::mg_23::28::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany Jehovah, Tompon''ny maro, dia ho satro-boninahitra tsara tarehy sy ho fehiloha firavaka ho an''ny olony sisa,'
mg1865::mg_23::28::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fanahy fitsarana ho an''izay mipetraka eo amin''ny fitsarana, sy ho hery ho an''izay mampiverina ny ady hatreo am-bavahady.'
mg1865::mg_23::28::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ireo koa dia miraingiraingy azon''ny divay ary mivembena azon''ny toaka; Ny mpisorona sy ny mpaminany miraingiraingy azon''ny toaka; Resin''ny divay ireo; Mivembena azon''ny toaka izy; Miraingiraingy amin''ny fahitana izy ary midoladola eo amin''ny fitsarana.'
mg1865::mg_23::28::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa feno loa sy loto ny latabatra rehetra, ka efa tsy misy madio hitoerana.'
mg1865::mg_23::28::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hampianariny fahalalana? Ary iza no hampahafantariny fianarana? Zaza vao notazana va? Ny vao nitsaha-nono va?'
mg1865::mg_23::28::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa didy anampy didy, didy anampy didy; Fitsipika anampy fitsipika, fitsipika anampy fitsipika; Kely ety, ary kely ery;'
mg1865::mg_23::28::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, amin''ny molotra miambakambaka sy amin''ny fiteny baiko no hitenenany amin''ity firenena ity,'
mg1865::mg_23::28::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nilazany* hoe: Ity no fitsaharana, ampitsaharo ny reraka, ary ity no famelombelomana; Nefa tsy nety nihaino ireo. [*Na: Dia Izy Izay nilaza taminy]'
mg1865::mg_23::28::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah dia ho tonga didy anampy didy aminy tokoa, eny, didy anampy didy, fitsipika anampy fitsipika, fitsipika anampy fitsipika; Kely ety, ary kely ery, mba hanaovany dia mianotra, ka ho torotoro izy sy hofandrihana ary hosamborina.'
mg1865::mg_23::28::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ny tenin''i Jehovah ianareo, ry mpaniratsira, izay manapaka ity firenena eto Jerosalema ity.'
mg1865::mg_23::28::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria ianareo manao hoe: Efa nanao fanekena tamin''ny fahafatesana izahay ary efa nanao fifanarahana tamin''ny fiainan-tsy hita* ka na dia ho avy aza ny loza** manafotra, dia tsy hihatra aminy izany, fa ny lainga no nataonay ho fiarovana, ary ny fitaka ho fierena, [*Hebreo: Sheola] [**Hebreo: kotopia]'
mg1865::mg_23::28::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Indro, Izaho no efa nametraka vato ao Ziona, dia vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy, ka tsy mba ho taitra izay mino.'
mg1865::mg_23::28::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitsarana no hataoko ho fitsipika, ary ny fahamarinana ho pilao; Hopaohin''ny havandra ny lainga fiarovana, ary hindaosin''ny rano ny fierena.'
mg1865::mg_23::28::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hofoanana ny fanekenareo amin''ny fahafatesana, ary tsy haharitra ny fifanarahanareo amin''ny fiainan-tsy hita* raha ho avy ny loza** manafotra, dia ho tonga fanitsakitsany ianareo. [*Hebreo: Sheola] [**Hebreo: kotopia]'
mg1865::mg_23::28::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na oviana na oviana no ihaviany, dia hahatratra anareo izany; Fa isa-maraina isa-maraina no hihaviany, na andro na alina; Ary ny vokatry ny fahafantarana izany fianarana izany dia fangovitana ihany.'
mg1865::mg_23::28::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fohy loatra ny farafara ka tsy azon''ny olona ilamparana; Ary kely ny firakotra ka tsy maharakotra, raha misy te-hirakotra azy.'
mg1865::mg_23::28::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah hitsangana tahaka ny teo amin''ny tendrombohitra Perazima, ho tezitra tahaka ny teo amin''ny lohasahan''i Gibeona Izy, mba hanaovany ny asany tsy ilay fanaony mandrakariva anefa, ary hahavitany ny ataony tsy ilay vitainy mandrakariva anefa.'
mg1865::mg_23::28::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia aza maniratsira intsony ianareo, fandrao atao mafy ny famatorana anareo; Fa fahafonganana voatendry no efa reko tamin''i Jehovah, Tompon''ny maro, Hamelezana ny tany rehetra.'
mg1865::mg_23::28::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ianareo, ka mandrenesa ny feoko; Mitandrema, ka mandrenesa ny teniko.'
mg1865::mg_23::28::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ny mpiasa tany va miasa mba hamafy, na mitombo-doha sy mandravona ny taniny mandrakariva?'
mg1865::mg_23::28::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa voaravony tsara ny tany, moa tsy afafiny amin''izay va ny voan''ny nigela, ary tsy apariakany va ny komina, ary tsy alahany mitandahatra tsara va ny vary tritika sy ny vary hordea amin''ny tany voafaritra ho azy Ary ny ampemby* kosa eny an-tsisiny? [*Na: spelta]'
mg1865::mg_23::28::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamaniny no manoro azy izay mety hataony, Eny, Izy no mampianatra azy. [*Na: Samy ataony araka izay tandrifiny ho azy avy; Fa Andriamaniny no mampianatra azy]'
mg1865::mg_23::28::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny kodia vy no ivelezana ny nigela, ary tsy ny kodian''ny sariety no akodiadia amin''ny komina; Fa ny nigela dia velezina amin''ny fantàka, ary ny komina amin''ny tehina.'
mg1865::mg_23::28::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mongomongoiny va ny vary hatao mofo? Tsia, fa tsy veleziny na hampandehanany ny kodian''ny sarietiny sy ny soavaliny lalandava izy; Tsy mongomongoiny tsy akory izy.'
mg1865::mg_23::28::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 28
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany koa dia avy amin''i Jehovah, Tompon''ny maro; Fa mahagaga amin''ny fisainana Izy Ary mahatalanjona amin''ny fahendrena.'
mg1865::mg_23::29::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny loza hanjo an''i Jerosalema, sy ny mbola hamonjena azy'
  verse_text: 'Lozan''i Ariela*, lozan''i Ariela, Tanàna nitoeran*''i Davida! Ampio taona ny taona, aoka ho tafatsingeringerina ny andro firavoravoana; [*Ariela = Fatan''Andriamanitra, na: Lionan''Andriamanitra] [**Hebreo: nitobian'']'
mg1865::mg_23::29::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampahory an''i Ariela Aho, ka hisy fisentoana sy fitarainana ao aminy; Ary ho tonga Ariela tokoa amiko izy.'
mg1865::mg_23::29::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanao fahiranao anao Aho, ka hasiako miaramila hanemitra anao, ary hananganako manda hamelezana anao.'
mg1865::mg_23::29::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haetry ianao ka hiteny ao amin''ny tany, ary ao amin''ny vovoka no hibitsibitsihanao, eny, ny feonao hivoaka avy amin''ny tany tahaka ny an''ny manao azy ho tsindrian-javatra, ary avy ao amin''ny vovoka no ikiakiahan''ny teninao.'
mg1865::mg_23::29::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny fahavalonao betsaka ho tonga tahaka ny vovoka madinika, ary ny olon-dozabe maro ho tahaka ny akofa indaosina; Eny, ho avy tampoka dia tampoka izany.'
mg1865::mg_23::29::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy amin''i Jehovah, Tompon''ny maro, no hihavian''ny famaliana, dia kotrokorana sy horohoron-tany ary rohondrohona mafy, tadio sy tafio-drivotra ary lelafo mandevona.'
mg1865::mg_23::29::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tahaka ny fahitana eo amin''ny nofy amin''ny alina Ireo firenena betsaka rehetra ireo, izay mivory hamely an''i Ariela, dia izay rehetra mivory hamely azy sy ny mandany ka hampahatahotra azy.'
mg1865::mg_23::29::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tahaka ny olona noana manonofy, fa, indro, mihinana izy; kanjo nony mahatsiaro, dia noana ihany izy; Na ho tahaka ny olona mangetaheta manonofy, fa, indro, misotro izy; kanjo nony mahatsiaro, indro, ana ihany izy, ary ny fanahiny mbola maniry ihany: Dia ho tahaka izany ireo firenena betsaka rehetra ireo Izay mivory hamely ny tendrombohitra Ziona.'
mg1865::mg_23::29::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mijanona ianareo, ka mitalanjona, Tampeno ny masonareo, koa aoka ho jamba ianareo! Mamo ireo, nefa tsy tamin''ny divay; Mivembena izy, nefa tsy tamin''ny toaka.'
mg1865::mg_23::29::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nampidina fanahy mahasondrian-tory ao aminareo, ary efa nakimpiny ny masonareo (dia ny mpaminany izany), ary efa nosaronany ny lohanareo (dia ny mpahita izany).'
mg1865::mg_23::29::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahitana ny amin''izany rehetra izany raha aminareo dia tahaka ny teny amin''ny taratasy voaisy tombo-kase, izay atolotra olona mahavaky teny ka atao hoe: Masïna ianao, vakio ity; Fa hoy izy: Tsy azoko vakina, fa efa voaisy tombo-kase izy;'
mg1865::mg_23::29::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha atolotra izay tsy mahavaky teny kosa izany ka atao hoe: Masïna ianao, vakio ity, dia hoy izy: Tsy mahavaky teny aho.'
mg1865::mg_23::29::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Tompo: Satria manatona Ahy amin''ny vavany ity firenena ity ary mankalaza Ahy amin''ny molony, nefa ampanalaviriny Ahy kosa ny fony, ka ny fahatahorany Ahy dia didin''olombelona ampianarina azy ihany,'
mg1865::mg_23::29::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro koa, mbola hanao zava-mahagaga amin''ity firenena ity Aho, dia zava-mahagaga sy mahatalanjona; Ka ho foana ny fahendren''ny olon-kendriny, ary tsy ho hita ny fahalalan''ny mazava sainany.'
mg1865::mg_23::29::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay manafina lalina ny saina ataony mba tsy ho hitan''i Jehovah, sady ao amin''ny maizina ny asany, ka dia hoy izy: Iza no mahita antsika, ary iza no mahalala antsika?'
mg1865::mg_23::29::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey izato fahadalanareo! Moa ny mpanefy tanimanga va no hoheverina ho tahaka ny tanimanga, ka ny natao va hilaza izay nanao azy hoe: Tsy nanao ahy izy? Na ny zavatra voaforona va hilaza izay namorona azy hoe: Tsy manam-pahalalana izy?'
mg1865::mg_23::29::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy vetivety foana va dia hovana ho saha mahavokatra Libanona, Ary ny saha mahavokatra hoheverina ho ala?'
mg1865::mg_23::29::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia ho ren''ny marenina ny tenin''ny taratasy, ary na dia ao amin''ny aizina sy ny aizim-pito aza dia hahita ihany ny mason''ny jamba.'
mg1865::mg_23::29::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpandefitra hitombo hafaliana amin''i Jehovah; Ary ny malahelo ao amin''ny olona hifaly amin''ny Iray Masin''ny Isiraely,'
mg1865::mg_23::29::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lasa ny olon-dozabe, tsy ao intsony ny mpaniratsira; Ary fongotra izay rehetra miari-torin-tsaina amin''ny ratsy,'
mg1865::mg_23::29::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ireo manameloka olona amin''ny teny ary mamandrika izay mananatra eo am-bavahady sy mamadika ny marina amin''ny lainga foana.'
mg1865::mg_23::29::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny amin''ny taranak''i Jakoba dia izao no lazain''i Jehovah, Izay nanavotra an''i Abrahama: Tsy ho menatra intsony Jakoba, ary tsy hivaloarika intsony ny tavany.'
mg1865::mg_23::29::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny zanany mahita ny asan''ny tanako ao aminy, Dia hanamasina ny anarako izy, eny, hanamasina ny Iray Masin''i Jakoba izy ary hangovitra eo anatrehan''Andriamanitry ny Isiraely.'
mg1865::mg_23::29::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mivily fanahy dia mbola hahazo fahalalana; Ary izay mimonomonona dia mbola hianatra fahendrena.'
mg1865::mg_23::30::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hanjo ny Isiraely noho ny nanaovany fihavanana tamin''i Egypta, sy ny mbola hamindrana fo aminy'
  verse_text: 'Lozan''ny zaza maditra, izay maka saina, nefa tsy avy amiko, hoy Jehovah, ary manao fanekena*, nefa tsy avy amin''ny Fanahiko, mba hanampy ota amin''ny ota, [*Hebreo:mandrary harato] [**Hebreo: fialokalofanareo]'
mg1865::mg_23::30::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay mandeha hidina any Egypta, nefa tsy nanadina tamin''ny vavako, handositra ho any amin''ny fiarovana mafin''i Farao sy hialokaloka ao amin''ny alokalok''i Egypta.'
mg1865::mg_23::30::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo ho tonga henatra ho azy* ny fiarovana mafin''i Farao, ary ho fanalam-baraka azy* ny fialokalofany** ao amin''ny alokalok''i Egypta. [*Hebreo: anareo]'
mg1865::mg_23::30::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga any Zoana ireo lehibeny, ary tonga any Hanesa ny irany.'
mg1865::mg_23::30::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy rehetra dia samy hahazo henatra noho ny amin''ny firenena tsy mahasoa azy, dia izay tsy mahavonjy na mahasoa, fa tonga henatra sy latsa kosa.'
mg1865::mg_23::30::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faminaniana ny amin''ny behemota* any amin''ny tany atsimo. Any amin''ny tany mampahory sy mahaporiporitra, izay ihavian''ny liom-bavy sy ny lion-dahy ary ny menarana sy ny menaran''afo manidina, no nitondrany ny hareny teny an-damosin''ny boriky tanora ary ny fananany teo amin''ny trafon''ny rameva ho any amin''ny firenena tsy mahasoa azy. [*hipopotamosy]'
mg1865::mg_23::30::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa zava-poana sy tsinontsinona ny famonjen''ny Egyptiana; Koa izany no nanaovako azy hoe: Ilay be rehaka tsy mety manao na inona na inona*! [*Na: Rehareha foana ireny, ka aoka izay!]'
mg1865::mg_23::30::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana ankehitriny soraty amin''ny fàfana eo anatrehany izany, ary soraty amin''ny taratasy mba haharitra amin''ny andro any aoriana mandrakizay doria izany.'
mg1865::mg_23::30::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa firenena maditra izy, zaza mandainga, dia zaza izay tsy mety mihaino ny lalàn''i Jehovah,'
mg1865::mg_23::30::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao amin''ny mpahita hoe: Aza mahita, ary amin''ny mpaminany: Aza maminany zavatra marina aminay: Manaova vava malefaka aminay, maminania fitaka,'
mg1865::mg_23::30::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà amin''ny lalana, mivilia amin''ny aleha; Atsaharo ny Iray Masin''ny Isiraely tsy ho eo anoloanay intsony.'
mg1865::mg_23::30::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''ny Iray Masin''ny Isiraely: Satria mandà izany teny izany ianareo ary matoky ny fanaovana an-keriny sy ny fiolakolahana ka miankina amin''izany,'
mg1865::mg_23::30::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho aminareo ity heloka ity, tahaka izay mivava efa mila hianjera sy izay mibohitra amin''ny manda avo, ka ho tampoka dia tampoka no haharavany.'
mg1865::mg_23::30::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovakivakiana izy tahaka ny fahavakivakin''ny vilanin''ny mpanefy tanimanga, Raha montsamontsaniny ka tsy itondrany roa; Koa rehefa montsamontsana izy, dia tsy hisy vàkiny ho azo atao fangalana afo ao am-patana, na ho azo atao fangalan-drano ao an-davaka famorian-drano aza.'
mg1865::mg_23::30::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''ny Tompo, dia Jehovah, ny Iray Masin''ny Isiraely: Amin''ny fiverenana sy ny fitsaharana no hamonjena anareo, amin''ny fanginana sy ny fahatokiana no hisian''ny herinareo; Nefa tsy nety ianareo;'
mg1865::mg_23::30::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa ianareo: Tsia, fa handositra mitaingin-tsoavaly izahay; Koa noho izany dia handositra tokoa ianareo; Ary hoy ianareo: Hitaingina ny faingan-tongotra izahay; Ka dia ho faingan-tongotra koa ny manenjika anareo.'
mg1865::mg_23::30::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny arivo handositra, raha rahonan''ny anankiray, eny, handositra ianareo, raha rahonan''ny dimy, Mandra-pahatongan''ny sisa aminareo ho tahaka ny to-kazo avo any an-tampon''ny tendrombohitra sy tahaka ny faneva any amin''ny havoana.'
mg1865::mg_23::30::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa Jehovah dia mbola hiandry mandra-pamindrany fo aminareo, ary mbola hitoetra any amin''ny avo Izy mandra-piantrany anareo, fa Andriamanitry ny fahamarinana Jehovah; Sambatra izay rehetra miandry Azy.'
mg1865::mg_23::30::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao, ry firenena mitoetra ao Ziona any Jerosalema, dia tsy hitomany intsony; Fa hamindra fo aminao tokoa Izy, raha reny ny fitarainanao; Eny, raha vao reny izany, dia hamaly anao Izy.'
mg1865::mg_23::30::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homen''ny Tompo mofo fahoriana sy ny rano fahalahelovana ianao; Ary tsy hiery intsony ny mpampianatra anao; Ny masonao hahita ny mpampianatra anao;'
mg1865::mg_23::30::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na mivily ho amin''ny an-kavanana ianao, na mivily ho amin''ny ankavia, ny sofinao dia handre teny ao ivohonao manao hoe: Ity no lalana, ka andehano.'
mg1865::mg_23::30::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary holotoinao* ny takela-bolafotsy voapetaka amin''ny sampinao voasokitra sy ny takela-bolamena voapetaka amin''ny sampinao an-idina, ka harianao tahaka ny lamba maloto izany; Mialà amiko! no teny hataonao aminy. [*Hebreo:holotoinareo]'
mg1865::mg_23::30::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hanome ranonorana ho an''ny voa nafafinao any an-tsaha Izy, sy mofo vokatry ny tany sady tsara no vokatra; Ary amin''izany andro izany ny ombinao dia hihinana eny amin''ny tany malalaka;'
mg1865::mg_23::30::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny omby sy ny boriky tanora, izay miasa ny tany, dia hihinana vilona voaisy sira, izay voatsikerakera amin''ny sahiratsy sy ny fikororohana.'
mg1865::mg_23::30::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary any amin''ny tendrombohitra avo rehetra sy ny havoana andrandraina rehetra dia hisy ony sy ranovelona amin''ny andro lehibe famonoana, dia amin''ny andro hianjeran''ny tilikambo.'
mg1865::mg_23::30::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahazavan''ny volana dia ho tahaka ny fahazavan''ny masoandro, ary ny fahazavan''ny masoandro dia ho avy fito heny, ka ho tahaka ny fahazavan''ny hafitoana, Amin''ny andro hamehezan''i Jehovah ny fahatorotoroan''ny olony sy hanasitranany ny fery tamin''ny namelezana azy.'
mg1865::mg_23::30::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy any lavitra any ny anaran''i Jehovah, mirehitra amin''ny fahatezerany Izy Sady midonaka amin''ny setroka be; Ny molony dia feno fahatezerana, ary ny lelany dia tahaka ny afo mandevona;'
mg1865::mg_23::30::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fofonainy tahaka ny riaka manafotra havozona, hanasivana ny firenena amin''ny sivana fandevonana, ary hisy lamboridy mampivily eo amin''ny valanoranon''ny olona.'
mg1865::mg_23::30::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hira hataonao dia ho tahaka ny amin''ny alina fitandremana* ny andro firavoravoana, ary ny hafalian''ny fo dia ho tahaka ny olona mandeha omban''ny feon-tsodina ho any an-tendrombohitr''i Jehovah, dia any amin''ny Vatolampin''ny Isiraely; [*Hebreo: fanamasinana]'
mg1865::mg_23::30::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hanandratra ny feon''ny fiandrianany sy hampiseho ny fiantefan''ny sandriny amin''ny firehetan''ny fahatezerana sy ny lelafo mandevona sy ny ranonoram-baratra sy ny orana mifafy ary ny havandra vaventy.'
mg1865::mg_23::30::31:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny feon''i Jehovah dia haharaiki-tahotra ny Asyriana; Hasiany amin''ny tsorakazo ireo.'
mg1865::mg_23::30::32:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na aiza na aiza no amelezan''ny tsorakazo voatendry, izay amelin''i Jehovah azy, dia harahina ampongatapaka sy lokanga izany; Ary amin''ny ady hamelezany mafy no hiadiany aminy.'
mg1865::mg_23::30::33:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 30
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa voavoatra fahataloha Tofeta; Eny, efa nataony vonona ho an''ny mpanjaka izany; Efa nataony ]alina sady malalaka izy; Ny antontany dia misy afo sy kitay betsaka; Ary ny fofonain''i Jehovah, izay tahaka ny renirano solifara, no mampirehitra azy.'
mg1865::mg_23::31::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampijaliana ny Isiraely noho ny niankinany tamin''i Egypta sy ny hiarovan''Andriamanitra izay mibebaka, ary ny hanendreny mpanjaka izay hitondra azy amin''ny fahamarinana'
  verse_text: 'Lozan''izay midina any Egypta hitady famonjena sy miantehitra amin''ny soavaly ary matoky ny kalesy, satria maro ireny, sy ny mpitaingin-tsoavaly, satria mahery dia mahery ireny, fa tsy manandrandra ny Iray Masin''ny Isiraely, na mitady an''i Jehovah.'
mg1865::mg_23::31::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izy koa dia hendry ka mahatonga loza, ary tsy tsoahany ny teniny; Fa mitsangana Izy hamely ny mpianakavin''ny mpanao ratsy sy izay manampy ny mpanao meloka.'
mg1865::mg_23::31::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa olona ihany ny Egyptiana fa tsy Andriamanitra; Ary nofo ihany ny soavaliny, fa tsy fanahy. Koa raha ahinjitr''i Jehovah ny tanany, dia ho tafintohina izay manampy, ary ho potraka izay ampiana, ka samy ho levona avokoa izy roa tonta.'
mg1865::mg_23::31::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no nolazain''i Jehovah tamiko: Tahaka ny fieron''ny liona sy ny liona tanora eo amin''ny rembiny, ka na dia voangona aza ny mpiandry ondry betsaka hamely azy, Tsy matahotra ny feon''ireo izy, na mandatsa-dremby noho ny fihorakorahany, dia tahaka izany no hidinan''i Jehovah, Tompon''ny maro, Hiady ao an-tendrombohitra* Ziona sy ny havoany. [*Na: hamely ny tendrombohitra]'
mg1865::mg_23::31::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny vorona manomba no hiarovan''i Jehovah, tompon''ny maro, an''i Jerosalema, fa sady hiaro no hamonjy Izy, eny, sady hiantra* no hanafaka. [*Hebreo: handalo; izahao Eksodosy 12:13]'
mg1865::mg_23::31::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miverena ho amin''izay efa niodinanareo fatratra, ry zanak''Isiraely o.'
mg1865::mg_23::31::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany andro izany dia harian''ny olona rehetra ny andriamani-bolafotsiny* sy ny andriamani-bolamenany*, izay fahotana nataon''ny tananareo. [*Hebreo: andriamani-tsy izy]'
mg1865::mg_23::31::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Asyriana ho lavon''ny sabatra izay tsy mba an''olombelona, eny, sabatra izay tsy mba an''olombelona no handringanana azy; Dia handositra ny sabatra izy, ary ny zatovony hampanaovina fanompoana,'
mg1865::mg_23::31::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakany* ho lasa noho ny fahatahorana, Ary mpanapaka azy hivadi-po noho ny faneva, hoy Jehovah, Izay manana ny afony ao Ziona sy ny fatany fandoroana ao Jerosalema. [*Na: harambatony]'
mg1865::mg_23::32::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fa araka ny fahamarinana no hanjakan''ny mpanjaka, ary ny lehibe hanaraka araka ny rariny.'
mg1865::mg_23::32::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy lehilahy* ho fierena amin''ny rivotra sy ho fialofana amin''ny ranonoram-baratra; Ho ranovelona ao amin''ny tany karankaina izy, ho alo-batolampy lehibe amin''ny tany mahana. [*Na: Ary samy]'
mg1865::mg_23::32::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hikimpy ny mason''izay mahita, ary ny sofin''izay mandre dia hihaino.'
mg1865::mg_23::32::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''izay maimaika hahazo fahalalana, ary ny lelan''izay mikodedidedy hahay miteny mahitsy.'
mg1865::mg_23::32::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny adala tsy holazaina intsony hoe mitoetr''andriana, ary ny mpifetsy tsy holazaina hoe mahafoy be*. [*Hebreo: mpanankarena]'
mg1865::mg_23::32::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny adala mbola miteny fahadalana ihany, ary ny fony mamoron-keloka, mba hanaovany fihatsaram-belatsihy* sy hitenenany hevi-diso ny amin''i Jehovah ary hanaovany izay tsy hahazoan''ny noana hanina sy izay tsy hahazoan''ny mangetaheta rano hosotroina. [*Na: ratsy]'
mg1865::mg_23::32::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ratsy ny hafetsen*''ny mpifetsy; Mamoron-tsain-dratsy izy hanimbany ny ory amin''ny teny lainga, na dia miteny manan-drariny aza ny malahelo; [*Hebreo: fiasan'']'
mg1865::mg_23::32::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mitoetr''andriana kosa dia mamoron-tsaina araka izay mahamendrika andriana, ary izay mahamendrika andriana no ifikirany.'
mg1865::mg_23::32::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Anatra mafy tamin''ny vehivavy tao Jerosalema'
  verse_text: 'Mitsangàna, ry vehivavy miadana, ka mandrenesa ny feoko; Ry zazavavy matokitoky foana, mihainoa ny teniko.'
mg1865::mg_23::32::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha afaka herintaona mahery dia ho raiki-tahotra ianareo, ry vehivavy matokitoky foana; Fa hanjahitra ny taom-piotazam-boaloboka, ary tsy hisy ny fanangonam-boankazo'
mg1865::mg_23::32::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangovita, ry vehivavy miadana, mangorohoroa, ry vehivavy matokitoky foana; Endaho ny akanjonao, ka mitanjaha, ary misikìna lamba fisaonana.'
mg1865::mg_23::32::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miteha-tratra izy, fa malahelo ny saha nahafinaritra sy ny voaloboka vokatra.'
mg1865::mg_23::32::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho rakotry ny tsilo sy ny hery ny tanin''ny oloko, eny, na dia ny ao amin''ny trano mahafaly rehetra ao an-tanàna ravoravo aza;'
mg1865::mg_23::32::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho foana ny lapan''ny mpanjaka; Hitsahatra ny fihorikoriky ny tanàna; Ofela* sy ny tilikambo fitazanana ho tonga naman''ny zohy ho mandrakizay, dia fikarenjen''ny boriki-dia sy fiandrasana ny andian''ny ondry aman''osy, [*Na: Ny havoana]'
mg1865::mg_23::32::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pandatsaka ny fanahy avy amin''ny avo ho amintsika, ka ny efitra ho tonga saha mahavokatra, ary ny saha mahavokatra hoheverina ho ala.'
mg1865::mg_23::32::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitoetra any an''efitra ny rariny, Ary ny fahamarinana honina ao amin''ny saha mahavokatra.'
mg1865::mg_23::32::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny asan''ny fahamarinana ho fiadanana; Ary ny vokatry ny fahamarinana dia ho fiadanana sy fahatokiana mandrakizay;'
mg1865::mg_23::32::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny oloko hitoetra ao amin''ny fonenana mandry fahizay sy ao amin''ny fitoerana mahatoky ary ao amin''ny fialan-tsasatra feno fiadanam-po;'
mg1865::mg_23::32::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hilatsaka ny havandra, rehefa aripaka ny ala, ary halamaka dia halamaka ny tanàna.'
mg1865::mg_23::32::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay mamafy eny amoron''ny rano rehetra sady mampiriaria ny omby sy ny boriky.'
mg1865::mg_23::33::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampijaliana an''i Asyria, sy ny soa ho hitan''i Ziona kosa'
  verse_text: 'Lozanao, ry ilay mandroba, nefa tsy norobaina ianao! Ary mamitaka, nefa tsy nofitahina ianao! Rehefa mitsahatra ny mandrava ianao, dia vao horavana kosa; Ary rehefa mitsahatra ny mamitaka ianao, dia vao hofitahina kosa.'
mg1865::mg_23::33::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, mamindrà fo aminay; Ianao no antenainay*; Aoka ho sandrinay isa-maraina ianao sy ho famonjena anay amin''ny andro fahoriana. [*heb. sandriny]'
mg1865::mg_23::33::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''ny fitabatabana no mampandositra ny firenena; Raha misandratra Ianao, dia mipariaka ny jentilisa.'
mg1865::mg_23::33::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireny handevona ny babonareo tahaka ny fandevon''ny valala, tahaka ny fifanaretsaky ny kalalao no fifanaretsany eo aminy.'
mg1865::mg_23::33::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manerinarina Jehovah, fa mitoetra any amin''ny avo Izy; Nofenoiny rariny sy fahamarinana Ziona.'
mg1865::mg_23::33::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy andro tsy manam-piovana ho anao, eny, haren''ny famonjena sy ny fahendrena ary ny fahalalana; Ny fahatahorana an''i Jehovah no rakitrao*. [*Hebreo: rakiny]'
mg1865::mg_23::33::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, ny lehilahy maheriny mitaraina eny ivelany; Ny iraka nitady fihavanana dia mitomany mafy.'
mg1865::mg_23::33::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maty ny lalambe; Tsy misy ny mpandeha; Nofoanany ny fanekena; Nalany baraka ny tanàna; Tsy nanaja olona izy.'
mg1865::mg_23::33::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaona ny tany ka milofika; Menatra Libanona ka malazo; Efa tonga tahaka ny tani-hay Saràna, Ary manintsana Basana sy Karmela.'
mg1865::mg_23::33::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia hitsangana Aho, hoy Jehovah; Ankehitriny dia ho any amin''ny avo Aho; Ankehitriny dia hisandratra Aho.'
mg1865::mg_23::33::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torontoronina bozaka ianareo ka miteraka vodivary; Ny fofonainareo dia tahaka ny afo handevona anareo.'
mg1865::mg_23::33::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenena ho tahaka ny fandoroan-tsokay, eny, ho tahaka ny tsilo notombohina izay mirehitra amin''ny afo izy.'
mg1865::mg_23::33::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny amin''izay efa nataoko, ianareo izay lavitra, ary aoka hahafantatra ny heriko ianareo izay akaiky.'
mg1865::mg_23::33::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raiki-tahotra ny mpanota ao Ziona; Horohoro no nahazo ny mpihatsaravela-tsihy*. Iza amintsika no hahatoetra amin''ny afo mandevona? Iza amintsika moa no hahatoetra amin''ny lelafo mandrakizay? [*Na: ratsy fanahy]'
mg1865::mg_23::33::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandeha amin''ny fahamarinana sady miteny zava-mahitsy, izay tsy mety mandray harena amin''ny fanaovana an-keriny fa manifikifika ny tanany mba tsy handray kolikoly, izay manentsin-tadiny mba tsy handrenesany ny amin''ny fandatsahan-drà sady manakimpy ny masony mba tsy hahita ny ratsy;'
mg1865::mg_23::33::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no honina ao amin''ny avo; Ny fitoerana avony dia ny fiarovana any amin''ny harambato; Izay hohaniny dia homena azy, ary ny rano hosotroiny tsy ho diso.'
mg1865::mg_23::33::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masonao hahita ny mpanjaka amin''ny hatsaran-tarehiny sady hahatsinjo tany malalaka dia malalaka.'
mg1865::mg_23::33::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotsaroan''ny fonao ilay nahatahotra: Aiza ny mpanoratra ? Aiza ny mpandanja? Aiza ny mpanisa ny tilikambo?'
mg1865::mg_23::33::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenena misetaseta dia tsy ho hitanao intsony, dia ilay olona miboediboedi-piteny ka tsy fantatra, na ny lela mikodedidedy ka tsy azo.'
mg1865::mg_23::33::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsinjovy Ziona, dia ilay tanàna fihaonantsika tamin''ny fotoam-pivavahana; Ny masonao hahita an''i Jerosalema ho fonenana mandry fahizay, dia lay izay tsy hafindra, ny tsimatra aminy tsy hongotana mandrakizay, ary tsy hisy hotapahina ny kofehiny.'
mg1865::mg_23::33::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah dia mahery ho antsika any, tany be ony sy lahin-drano lehibe any, nefa sy halehan''ny sambo voizina, na hovakin''ny sambo lehibe.'
mg1865::mg_23::33::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah no Mpitsara antsika; Jehovah no mpanome lalàna antsika; Jehovah no mpanjakantsika; Izy no hamonjy antsika.'
mg1865::mg_23::33::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivaha ny mahazakan-tsambonao; Tsy mahahazona mafy ny fiorenan''andry izy, na mahavelatra ny lay; Fa amin''izay kosa dia hozaraina ny zavatra be voababo; Na dia ny mandringa aza dia mba hahazo babo ihany.'
mg1865::mg_23::33::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisy amin''ny mponina ao hilaza hoe: Marary aho; Ny olona izay mitoetra ao dia voavela heloka.'
mg1865::mg_23::34::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampijaliana ny fahavalon''ny Isiraely, indrindra fa Edoma, sy ny fahasambaran''ny navotan''i Jehovah'
  verse_text: 'Manatona, ianareo jentilisa, mba handre; Ary mihainoa, ianareo firenena; Aoka handre ny tany sy ny ao aminy rehetra, Izao tontolo izao sy ny vokatra rehetra avy aminy.'
mg1865::mg_23::34::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah dia tezitra amin''ny jentilisa rehetra, ary mirehitra amin''ny miaramilany rehetra ny fahatezerany; Efa nodidiany haringana* ireo ary natolony hovonoina. [*Hebreo: hatao herema]'
mg1865::mg_23::34::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay voavono amin''ireo dia hariana, ka hamofona ny hamaimbon''ny fatiny, ary ny tendrombohitra hiempo azon''ny ràny.'
mg1865::mg_23::34::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra eny amin''ny lanitra dia ho levona, Ary ny lanitra hahorona tahaka ny fangorona taratasy; Ary ny eny aminy rehetra dia halazo tahaka ny fahalazon''ny ravina mihintsana avy amin''ny voaloboka, ary tahaka ny ravina malazo mihintsana avy amin''ny aviavy.'
mg1865::mg_23::34::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sabatro dia mamon-drà any amin''ny lanitra; Indro, hidina hihatra amin''i Edoma iny sy amin''ny firenena voatendriko haringana*, mba ho fitsarana azy. [*Hebreo: hatao herema]'
mg1865::mg_23::34::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sabatr''i Jehovah feno rà, eny, mihosi-menaka amin''ny matavy sy amin''ny ran''ny zanak''ondry sy ny osilahy ary amin''ny fonomboan''ny ondrilahy; Fa Jehovah mamono zavatra hatao fanatitra ao Bozra Ary mahafaty be ao amin''ny tany Edoma.'
mg1865::mg_23::34::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ombimanga miaraka aripaka aminy mbamin''ny vantotr''omby sy ny ombilahy, ka dia vonton-drà ny taniny, ary mihosi-menaka ny vovo-taniny.'
mg1865::mg_23::34::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah manana andro famaliana, dia taona famaliana hiadiana ho an''i Ziona.'
mg1865::mg_23::34::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovana ho tonga dity ny renirano any Edoma, ary ho solifara ny vovo-taniny, ary ny taniny ho dity mirehitra.'
mg1865::mg_23::34::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na alina na andro dia tsy hovonoina izany, ary ny setrony hisavoana mandrakizay; Hatramin''ny taranaka fara mandimby dia ho tany karankaina izy, tsy hisy handeha hamaky azy intsony mandrakizay mandrakizay.'
mg1865::mg_23::34::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho zara-tanin''ny sama sy ny sokina izy, ny vorondolo lehibe sy ny goaika dia hitoetra ao; Ary hohenjaniny eo aminy ny famolaina fikorontanana sy ny pilao fahafoanana.'
mg1865::mg_23::34::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehibe dia tsy hisy ao intsony hifidy izay hanjaka*, fa ho fongana ny mpanapaka rehetra ao aminy. [*Hebreo: hiantso ny fanjakana]'
mg1865::mg_23::34::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho rakotry ny tsilo ny ao anatin''ny lapan''ny mpanjakany, amiana sy voaroy no ho ao amin''ny trano fiarovany; Ary ho fonenan''ny amboadia* sy fitoeran''ny ostritsa izy. [*Hebreo:jakala]'
mg1865::mg_23::34::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny bibi-dia any an''efitra hihaona amin''ny kary*; ary ny osilahy** hiantso ny namany; Ary ilay mandehandeha amin''ny alina*** hitoetra any ka hahita fitoerana ho azy. [*Na: jakala] [**Hebreo: seirima; izahao Levitikosy 17:7] [***Hebreo: lilita]'
mg1865::mg_23::34::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny bibilava miantoratoraka hanao ny lavany any ka hanatody sy hifana ary hikotrika ao amin''ny alokaloka any; Any koa no hiangonan''ny papango, samy eo amin''ny namany avy.'
mg1865::mg_23::34::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahao ao amin''ny bokin''i Jehovah, ka vakio; Tsy misy tsy ao ireo na dia iray akory aza. Tsy misy na dia iray akory aza hitady ny namany; Fa ny vavan''i Jehovah* no nandidy izany, ary ny fanahiny ihany no nanangona azy. [*Hebreo: vavako]'
mg1865::mg_23::34::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no efa tinendry anjara ho an''ireo ary ny tanany no efa nizara izany ho an''ireo tamin''ny famolaina; Handova izany mandrakizay ireo ary hitoetra ao hatramin''ny taranaka fara-mandimby.'
mg1865::mg_23::35::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ravoravo ny efitra sy ny tany karankaina, ary ny tani-hay mifaly sy mamony tahaka ny lilia.'
mg1865::mg_23::35::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamony be dia be izy, eny, mifaly mihoby izy, ny voninahitr''i Libanona dia homena azy mbamin''ny hatsaran-tarehin''i Karmela sy Saràna, dia hahita ny voninahitr''i Jehovah izy sy ny famirapiratan''Andriamanitsika.'
mg1865::mg_23::35::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampaherezonareo ny tanana miraviravy, ary hatanjaho ny lohalika malemy.'
mg1865::mg_23::35::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''izay reraka* am-po: Mahereza, aza matahotra, indro, Andriamanitrareo ho avy mitondra famaliana, dia ny famalian''Andriamanitra, eny, Izy tokoa no ho avy ka hamonjy anareo. [*Hebreo: maimaika]'
mg1865::mg_23::35::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampahiratina ny mason''ny jamba, ary hampahaladina ny sofin''ny marenina.'
mg1865::mg_23::35::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitsambikina tahaka ny diera ny mandringa, ary hihoby ny lelan''ny moana; Fa hiboiboika any an''efitra ny rano, ary hisy renirano any amin''ny tany karankaina.'
mg1865::mg_23::35::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alonalona mitarehin-drano* dia ho tonga farihy tokoa, ary ny tany mangentana ho loharano miboiboika; Ny fonenana izay amitsahan''ny amboadia** dia haniry volotara sy zozoro. [*ny miraja] [**Na: jakala]'
mg1865::mg_23::35::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy lalambe any dia lalana voavoatra, izay hatao hoe Làlan''ny fahamasinana; Tsy mba handia izany ny tsy madio, fa Jehovah homba azy* ka izay mandeha amin''ny lalana dia tsy ho diso any, na dia ny adala aza. [*Na: Fa ho an''ireo izy]'
mg1865::mg_23::35::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any tsy hisy liona sady tsy hiakaran''ny biby masiaka, tsy ho hita ao ireny; Fa ny navotana no handia azy.'
mg1865::mg_23::35::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny navotan''i Jehovah hiverina Ka hankany Ziona amin''ny fihobiana, Ary  ny fifaliana mandrakizay no ho eny an-dohany; Hahazo fifaliana sy faharavoravoana izy, Ka dia handositra ny alahelo sy ny fisentoana.'
mg1865::mg_23::36::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanafihan''i Sankeriba an''i Joda, sy ny teny nampitondrainy ho any amin''i Hezekia, ary ny fitarainan''i Hezekia sy ny teny nasain''Andriamanitra nolazain''Isaia taminy'
  verse_text: 'Ary tamin''ny taona fahefatra ambin''ny folo nanjakan''i Hezekia mpanjaka dia niakatra Sankeriba, mpanjakan''i Asyria, hamely ny tanàna mimanda rehetra any Joda ka nahafaka azy.'
mg1865::mg_23::36::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Asyria naniraka an-dRabsake mbamin''ny miaramila betsaka avy teo Lakisy hankany Jerosalema ho any amin''i Hezekia mpanjaka. Dia nitsangana teo anilan''ny lakan-drano amin''ny kamory ambony izy, teo an-dalambe mankamin''ny sahan''ny mpamotsy lamba.'
mg1865::mg_23::36::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliakima, zanak''i Hilkia, izay lehiben''ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak''i Asafa, mpitadidy ny raharaham-panjakana, dia nivoaka ho ao aminy.'
mg1865::mg_23::36::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Rabsake tamin''ireo: Andeha, lazao amin''i Hezekia hoe: Izao no lazain''ny mpanjaka lehibe, dia ny mpanjakan''i Asyria: Inona moa izato itokianao?'
mg1865::mg_23::36::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Teny foana ny hoe: Manana saina sy hery hiady aho. Fa iza no itokianao, no miodina amiko ianao?'
mg1865::mg_23::36::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ianao matoky io tehina volotara torotoro io, dia Egypta, nefa raha itehenan''olona io, dia manindrona ny tanany miboroaka; eny, tahaka izany Farao, mpanjakan''i Egypta, amin''izay rehetra matoky azy.'
mg1865::mg_23::36::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hoy ianao amiko: Jehovah Andriamanitray no itokianay, moa tsy Azy va ny fitoerana avo aman''alitara izay noravan''i Hezekia, izay nilaza tamin''ny Joda sy Jerosalema hoe: Eto anoloan''ity alitara ity no hiankohofanareo?'
mg1865::mg_23::36::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka hifaninana ianao sy ny tompoko, mpanjakan''i Asyria, fa homeko soavaly roa arivo ianao, raha tàhiny manana olona hitaingina azy.'
mg1865::mg_23::36::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataonao ahoana no fampiamboho ny komandy iray amin''ny mpanompon''ny tompoko, na dia izay kely indrindra aminy aza, nefa matoky an''i Egypta ianao hahazoanao kalesy sy mpitaingin-tsoavaly?'
mg1865::mg_23::36::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa moa haitraitro va izao niakarako izao? Tsia, fa Jehovah no naniraka ahy handrava ity tany ity ka nanao hoe: Miakara ho amin''izany tany izany, ka ravao izy.'
mg1865::mg_23::36::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Eliakima sy Sebna ary Joa tamin-dRabsake: Masïna ianao, teny Syriana* no ataovy amin''ny mpanomponao, fa fantatray ihany izany; fa aza manao teny Jiosy ho ren''ny olona eny ambonin''ny manda. [*Hebreo: Aramiana]'
mg1865::mg_23::36::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Rabsake: Moa ho amin''ny tomponao sy ianao va no nanirahan''ny tompoko hilaza izany teny izany, fa tsy ho amin''ny olona izay mipetraka eny ambonin''ny manda, hihinanany izay tsy fihinany* sy hisotroany izay tsy fisotrony** miaraka aminareo? [*Hebreo: ny tainy] [**Hebreo: ny amaniny]'
mg1865::mg_23::36::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijoro teo Rabsake ka niantso tamin''ny feo mahery tamin''ny teny Jiosy hoe: Henoy ny tenin''ny mpanjaka lehibe, dia ny mpanjakan''i Asyria.'
mg1865::mg_23::36::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''ny mpanjaka: Aza mety hofitahin''i Hezekia ianareo; fa tsy hahavonjy anareo izy tsy akory.'
mg1865::mg_23::36::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mety hampahatokin''i Hezekia an''i Jehovah ianareo amin''ny anaovany hoe: Jehovah no hamonjy antsika tokoa; ary tsy hatolotra eo an-tanan''ny mpanjakan''i Asyria tsy akory ity tanàna ity.'
mg1865::mg_23::36::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihaino an''i Hezekia ianareo; fa izao no lazain''ny mpanjakan''i Asyria: Manaova fanekena amiko hiadananareo, ka mankanesa aty amiko, ary samia homana ny voalobony sy ny aviaviny, ary samia misotro ny rano avy amin''ny lavaka famorian-dranony avy ianareo,'
mg1865::mg_23::36::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandra-pihaviko hitondra anareo ho any amin''izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka.'
mg1865::mg_23::36::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety homen''i Hezekia vohony ianareo amin''ny anaovany hoe: Jehovah no hamonjy antsika. Moa nisy nahavonjy ny taniny tamin''ny tanan''ny mpanjakan''i Asyria va ireo andriamanitry ny firenena ireo?'
mg1865::mg_23::36::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza moa ny andriamanitr''i Hamata sy Arpada? Ary aiza koa ny andriamanitr''i Sefarvaima? Nahavonjy an''i Samaria tamin''ny tanako va ireo andriamaniny?'
mg1865::mg_23::36::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa amin''ny andriamanitra rehetra amin''ireo tany ireo no efa nahavonjy ny taniny tamin''ny tanako, koa aiza no hahavonjen''i Jehovah an''i Jerosalema amin''ny tanako?'
mg1865::mg_23::36::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nangina ny olona, ka tsy nisy namaly azy na dia teny indraim-bava akory aza, satria ny mpanjaka efa nandidy hoe: Aza misy mamaly azy.'
mg1865::mg_23::36::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 36
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliakima, zanak''i Hilkia, izay lehiben''ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak''i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin''i Hezekia, sady voatriatra ny fitafiany, ary nilaza taminy ny tenin-dRabsake izy.'
mg1865::mg_23::37::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny nampitondrain''i Sankeriba fanindroany, sy ny vavaka nataon''i Hezekia ary ny teny nampitondrain''Isaia hanome toky azy'
  verse_text: 'Ary raha nandre izany Hezekia mpanjaka, dia nandriatra ny fitafiany izy sady nitafy lamba fisaonana ka lasa niditra tao an-tranon''i Jehovah,'
mg1865::mg_23::37::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy naniraka an''i Eliakima, lehiben''ny tao an-dapa, sy Sebna mpanoratra ary ny lohan''ny mpisorona, samy nitafy lamba fisaonana avokoa, hankany amin''Isaia mpaminany, zanak''i Amoza,'
mg1865::mg_23::37::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao taminy hoe: Izao no lazain''i Hezekia: Andro fahoriana sy famaizana ary fanalam-baraka ity andro ity; fa mby ao am-piterahana ny zaza, nefa tsy misy hery hiterahana azy.'
mg1865::mg_23::37::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angamba ho ren''i Jehovah Andriamanitrao ny tenin-dRabsake, izay nirahin''ny mpanjakan''i Asyria tompony hihaika an''Andriamanitra velona, ka mba hovaliany izy noho ny teny izay efa ren''i Jehovah Andriamanitrao; koa aingao ny fivavakao hamonjy izay mbola sisa.'
mg1865::mg_23::37::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''Isaia ny mpanompon''i Hezekia mpanjaka.'
mg1865::mg_23::37::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Isaia taminy: Ambarao amin''ny tomponareo hoe: Izao no lazain''i Jehovah: Aza matahotra ny teny efa renao, dia izay nanompan''iretsy ankizilahin''ny mpanjakan''i Asyria iretsy Ahy.'
mg1865::mg_23::37::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Izaho efa hanisy fanahy ao anatiny, ary hahare siosio izy, ka hiverina ho any amin''ny taniny; dia hataoko lavon-tsabatra any an-taniny izy.'
mg1865::mg_23::37::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina Rabsake ka nankany Libna, izay nataon''ny mpanjakan''i Asyria fahirano tamin''izay; satria efa reny fa efa niala tany Lakisy ny mpanjaka.'
mg1865::mg_23::37::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''i Sankeriba ny amin''i Tiraka, mpanjakan''i Etiopia, nanao hoe: Avy hiady aminao izy; ary nony nandre izany izy, dia naniraka olona ho any amin''i Hezekia nanao hoe:'
mg1865::mg_23::37::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no holazainareo amin''i Hezekia, mpanjakan''ny Joda: Aza mety hofitahin''ny Andriamanitrao Izay itokianao ianao hoe: Jerosalema tsy hatolotra eo an-tanan''ny mpanjakan''i Asyria.'
mg1865::mg_23::37::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ianao efa nandre izay nataon''ireo mpanjakan''i Asyria tamin''ny tany rehetra, dia ny nandravany* azy; ka ianao kosa va no ho voavonjy? [*Hebreo: nanaovany herema]'
mg1865::mg_23::37::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan''ny razako, dia Gozana sy Harana sy Razefa ary ny taranak''i Edena izay tao Telasara ?'
mg1865::mg_23::37::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ny mpanjakan''i Hamata sy ny mpanjakan''i Arpada sy ny mpanjakan''ny tanàna Sefarvaima sy Hena ary Iva?'
mg1865::mg_23::37::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Hezekia tamin''ny tanan''ny iraka ny taratasy ka novakiny, dia niakatra nankao an-tranon''i Jehovah izy ka namelatra iny teo anatrehan''i Jehovah.'
mg1865::mg_23::37::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nivavaka tamin''i Jehovah nanao hoe:'
mg1865::mg_23::37::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jehovah, Tompon''ny maro o, Andriamanitry ny Isiraely, Izay mipetraka amin''ny kerobima, Ianao dia Ianao ihany no Andriamanitry ny fanjakana rehetra ambonin''ny tany; Ianao no nanao ny lanitra sy ny tany.'
mg1865::mg_23::37::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atongilano ny sofinao, Jehovah o, ka mihainoa; ahirato ny masonao, Jehovah o, ka mijere; ary mihainoa ny teny rehetra izay nampitondrain''i Sankeriba hihaika an''Andriamanitra velona.'
mg1865::mg_23::37::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, marina ihany tokoa fa ireo mpanjakan''i Asyria dia efa nandrava ny firenena* rehetra sy ny taniny [*Hebreo: tany]'
mg1865::mg_23::37::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa nanary ny andriamaniny tao anaty afo, satria tsy Andriamanitra ireny, fa asan''ny tanan''olona ihany, dia hazo sy vato, ka dia azony nosimbana.'
mg1865::mg_23::37::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, Jehovah Andriamanitray o, vonjeo amin''ny tanany izahay, mba hahafantaran''ny fanjakana rehetra ambonin''ny tany fa Ianao ry ihany no Jehovah.'
mg1865::mg_23::37::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isaia, zanak''i Amoza, dia naniraka hankany amin''i Hezekia nanao hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ny amin''ilay fitarainana nataonao tamiko ny amin''i Sankeriba, mpanjakan''i Asyria,'
mg1865::mg_23::37::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao no teny nolazain''i Jehovah ny amin''i Sankeriba: Manao tsinontsinona sy mandatsalatsa anao Ziona, zanakavavy virijina; Mihifikifi-doha mahita anao mandositra Jerosalema zanakavavy.'
mg1865::mg_23::37::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no nohaikainao sy nompanao? Ary hanohitra an''iza no nanandratanao ny feonao sy nampiandrandranao ny masonao any ambony? Hanohitra ny Iray Masin''ny Isiraely.'
mg1865::mg_23::37::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanomponao no nihaikanao ny Tompo hoe: Tamin''ny kalesiko maro no niakarako tany an-tampon''ny tendrombohitra, tao afovoan''i Libanona; Ary hokapaiko ny sedera avo sy ny kypreso voafantina, dia hiditra any amin''ny faran''ny azo iakarana ao aho sy any amin''ny alany midokadoka,'
mg1865::mg_23::37::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no nihady ka nisotro rano, Ary ny faladiako no handritako ny lahin-drano rehetra any Egypta*. [*Hebreo: Mazora]'
mg1865::mg_23::37::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola renao va, hoy Jehovah, fa hatry ny fony ela no nanomanako izany, ary hatramin''ny andro taloha no nikasako izany? Ankehitriny dia efa nahatanteraka izany Aho ka dia nandrava tanàna mimanda ho tonga korontam-bato.'
mg1865::mg_23::37::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa tsy nahatohitra ny mponina any, sady raiki-tahotra no nangaihay. Efa tahaka ny ahitra any an-tsaha izy, ary tahaka ny ahi-maitso sy ny ahitra eo amin''ny tampon-trano. Ary tahaka ny vary maty raha vao mitsiry.'
mg1865::mg_23::37::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy fantatro avokoa ny ipetrahanao sy ny ivoahanao sy ny idiranao ary ny fahatezeranao amiko.'
mg1865::mg_23::37::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa tezitra amiko ianao, ary efa tonga ato an-tsofiko ny fireharehanao, dia hasiako ny masom-biko ny oronao ary hasiako ny lamboridiko ny vavanao, ary hampivereniko amin''ny lalana izay nihavianao ianao.'
mg1865::mg_23::37::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho famantarana ho anao kosa: Hihinana ny maniry ho azy amin''ity taona ity ianareo; ary amin''ny taona manaraka dia ny kolokolon''izany, fa amin''ny taona fahatelo kosa dia mamafaza ianareo, ka mijinjà, ary manaova tanim-boaloboka, ka mihinàna izay vokatra eo.'
mg1865::mg_23::37::31:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay sisa amin''ny taranak''i Joda dia mbola hamaka lalindalina kokoa sady hisondrotra hamoa.'
mg1865::mg_23::37::32:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy sisa hiseho avy any Jerosalema sy sisa afaka avy any an-tendrombohitra Ziona ny fahasaro-piaron''i Jehovah, Tompon''ny maro, no hanao izany.'
mg1865::mg_23::37::33:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah ny amin''ny mpanjakan''i Asyria: Tsy ho tafiditra amin''ity tanàna ity izy, na handefa zana-tsipïka ho ato, na hitondra ampinga eo anoloany, na hanandratra tovon-tany hamelezany azy.'
mg1865::mg_23::37::34:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalana izay nihaviany ihany no hiverenany, fa tsy ho tafiditra amin''ity tanàna ity izy, hoy Jehovah.'
mg1865::mg_23::37::35:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hiaro ity tanàna ity Aho ka hamonjy azy noho ny amin''ny tenako sy Davida mpanompoko.'
mg1865::mg_23::37::36:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy Ilay Anjelin''i Jehovah ka namely olona dimy arivo amby valo alina sy iray hetsy tao an-tobin''ny Asyriana; ary nony maraina koa vao nifoha olona, dia hita fa, indreo, efa maty avokoa ireo.'
mg1865::mg_23::37::37:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Sankeriba, mpanjakan''i Asyria, ka lasa nody ary nitoetra tany Ninive.'
mg1865::mg_23::37::38:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 37
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niankohoka tao an-tranon''i Nisroka andriamaniny izy, dia nokapain''i Adrameleka sy Sarezera zananilahy ny sabatra izy; ary dia afaka nandositra ho any amin''ny tany Ararata izy mirahalahy; ary Esara-hadona zananilahy no nanjaka nandimby azy.'
mg1865::mg_23::38::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahararian''i Hezekia, sy ny nanalavan''Andriamanitra ny androny, ary ny fiderana nataony amin''izany'
  verse_text: 'Ary tamin''izany andro izany dia narary saiky maty Hezekia; ary Isaia mpaminany zanak''i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain''i Jehovah: Hafaro ny ankohonanao, fa ho faty ianao, fa tsy ho velona.'
mg1865::mg_23::38::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitodika nankany amin''ny rindrina Hezekia ka nivavaka tamin''i Jehovah'
mg1865::mg_23::38::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'hoe: Jehovah o, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin''ny fahamarinana sy tamin''ny foko rehetra ary ny nanaovako izay tsara eo imasonao Dia nitomany mafy dia mafy izy.'
mg1865::mg_23::38::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''Isaia ny tenin''i Jehovah nanao hoe:'
mg1865::mg_23::38::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka lazao amin''i Hezekia hoe: Izao no lazain''i Jehovah, Andriamanitr''i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hampiako dimy ambin''ny folo taona ny andronao,'
mg1865::mg_23::38::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady hamonjy anao sy ity tanàna ity amin''ny tanan''ny mpanjakan''i Asyria Aho; ary hiaro ity tanàna ity Aho.'
mg1865::mg_23::38::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho famantarana ho anao avy amin''i Jehovah, hahalalanao fa Jehovah hanao izay zavatra nolazainy:'
mg1865::mg_23::38::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hampiverina ny aloka hàdiny* folo Aho araka ny nampidinan''ny masoandro azy teo amin''ny dialin*'' i Ahaza. Ka dia niverina hàdiny* folo ny masoandro, dia ilay efa nidinany. [*Hebreo: ambaratonga]'
mg1865::mg_23::38::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny nosoratan''i Hezekia, mpanjakan''ny Joda, raha narary izy ka sitrana tamin''ny aretiny:'
mg1865::mg_23::38::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Amin''izao andro mbola iadanako izao no tsy maintsy idirako amin''ny vavahadin''ny fiainan-tsy hita*; nesorina tamiko ny androko sisa. [*Hebreo: Sheola]'
mg1865::mg_23::38::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Tsy mba hahita an''i Jehovah intsony aho. Eny, tsy mba hahita an''i Jehovah ao amin''ny velona intsony aho; Tsy mba hahita olona intsony aho, fa ho isan''ny mponina any amin''ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_23::38::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fonenako nesorina ka nafindra tsy ho amiko, tahaka ny lain''ny mpiandry ondry; Ahoroko tahaka ny tenona ny androko, fa efa hotapahiny ho afaka amin''ny haraka izy; Indray andro monja no anaperanao ny aiko.'
mg1865::mg_23::38::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampionona ny foko aho mandra-pahamarain''ny andro; Tahaka ny fanapatapaky ny liona no anapatapahany ny taolako rehetra; Indray andro monja no anaperanao ny aiko.'
mg1865::mg_23::38::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia mikoraraika tahaka ny sidintsidina sy ny vano aho. Ary mitolokoloko tahaka ny voromailala. Pahina ny masoko noho ny faniriako ho any amin''ny avo; Jehovah o, ory loatra aho, aoka hiantoka ahy Ianao.'
mg1865::mg_23::38::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no holazaiko? Sady nilaza tamiko Izy no nahatanteraka koa; Handeha mijoretra aho amin''ny taonako sisa rehetra noho* ny fangidian''ny aiko. [*Na: rehefa afaka]'
mg1865::mg_23::38::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, izany no iveloman''ny olona, ary amin''izany tokoa no iainan''ny fanahiko, ka dia mahasitrana sy mahavelona ahy Ianao.'
mg1865::mg_23::38::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tonga fiadanana ilay fahoriana mangidy dia mangidy nanjo ahy, ary ny fitiavanao no namonjenao ny fanahiko tsy hankany amin''ny lavaka fahalevonana; Fa narianao teo ivohonao ny fahotako rehetra.'
mg1865::mg_23::38::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fiainan-tsy hita* tsy mba mahasaotra Anao, ny fahafatesana tsy mahadera Anao; Fa izay midina any an-davaka dia tsy mahazo manantena ny fahamarinanao. [*Hebreo: Sheola]'
mg1865::mg_23::38::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny velona dia ny velona ihany no hidera Anao, tahaka izao izaho anio izao; Ny ray hampahalala ny zanany ny fahamarinanao.'
mg1865::mg_23::38::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa vonona hamonjy Ahy, Ka dia hitendry ny lokangako ao an-tranon''i Jehovah izahay Amin''ny andro rehetra iainanay.'
mg1865::mg_23::38::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Isaia: Makà ampempan''aviavy, ary apetaho amin''ny vay izany, mba ho sitrana izy.'
mg1865::mg_23::38::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 38
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hezekia: Inona no famantarana fa hiakatra ao an-tranon''i Jehovah aho?'
mg1865::mg_23::39::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandraisan''i Hezekia ny iraky ny mpanjakan''i Babylona, sy ny teny nolazain''Isaia noho izany'
  verse_text: 'Tamin''izany andro izany no nampitondran''i Merodaka-baladana, zanak''i Baladana, mpanjakan''i Babylona, taratasy sy fanomezana ho an''i Hezekia; fa efa reny fa narary izy ka sitrana.'
mg1865::mg_23::39::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia faly Hezekia noho izany ka nampiseho azy ny trano fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin''izay rehetra tao amin''ny firaketany; tsy nisy zavatra tsy nasehon''i Hezekia azy, na ny tao an-tranony, na ny tao amin''ny fanjakany rehetra.'
mg1865::mg_23::39::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''i Hezekia mpanjaka mpaminany ka nanao taminy hoe: Ahoana no nolazain''ireo olona ireo, ary avy taiza nihaviany hankaty aminao? Ary hoy Hezekia: Nankaty amiko avy tany an-tany lavitra izy, dia avy tany Babylona.'
mg1865::mg_23::39::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Ka inona avy anefa no hitany tato ananonao? Ary hoy Hezekia: Izay rehetra an-tranoko dia efa hitany avokoa; tsy nisy zavatra tsy nasehoko azy ny ao amin''ny firaketako rehetra.'
mg1865::mg_23::39::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Isaia tamin''i Hezekia: Henoy ny tenin''i Jehovah, Tompon''ny maro:'
mg1865::mg_23::39::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharin''ny razanao ka voatahiry mandraka androany; eny, tsy hisy sisa hijanona inona na inona, hoy Jehovah.'
mg1865::mg_23::39::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia terakao aza dia hisy ho entiny koa, ka ho tandonaka* any amin''ny lapan''ny mpanjakan''i Babylona ireo. [*Hebreo: ionoka]'
mg1865::mg_23::39::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 39
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Hezekia tamin''Isaia : Tsara ny tenin''i Jehovah izay nolazainao. Ary hoy koa izy : Eny, hisy fiadanana amin''ny androko ka handry fahizay.'
mg1865::mg_23::40::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Teny mahafaly, fampiononana ny Isiraely'
  verse_text: 'Ampionony, ampionony ny oloko, Hoy Andriamanitrareo;'
mg1865::mg_23::40::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitoria teny soa mahafaly amin''i Jerosalema, ka lazao aminy fa vita ny adiny*, sady voavela ny helony, ary efa nandray indroa heny tamin''ny tanan''i Jehovah izy ho valin''ny fahotana rehetra nataony. [*Na: tapitra ny fe-taom-panompoany]'
mg1865::mg_23::40::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy feon''ny miantso hoe: Manamboara lalana any an''efitra ho an''i Jehovah, manaova lalambe any an-tany foana ho an''Andriamanitsika.'
mg1865::mg_23::40::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hasandratra ny lohasaha rehetra, Aoka haetry ny tendrombohitra sy ny havoana rehetra; Aoka ny be havoana ho tonga lembalemba, ary ny tany saro-dalana ho tonga lemaka;'
mg1865::mg_23::40::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiseho ny voninahitr''i Jehovah, ary ny nofo rehetra hiara-mahita izany; Fa ny vavan''i Jehovah no efa niteny.'
mg1865::mg_23::40::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy miteny hoe: Miantsoa. Ary hoy izy: Ahoana anefa no antso hataoko? Ahitra ny nofo rehetra, ary ny hatsaran-tarehiny rehetra dia tahaka ny vonin-javatra any an-tsaha;'
mg1865::mg_23::40::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maina ny ahitra, malazo ny voniny, satria tsofin''ny fofonain''i Jehovah ireny; Eny, ahitra tokoa ny olona.'
mg1865::mg_23::40::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maina ny ahitra, malazo ny voniny; Fa ny tenin''Andriamanitsika dia haharitra mandrakizay.'
mg1865::mg_23::40::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Ziona, izay mitondra teny soa mahafaly o*, miakara any an-tendrombohitra avo; Ry Jerosalema izay mitondra teny soa mahafaly o*, Asandrato mafy ny feonao, asandrato, fa aza matahotra; Lazao amin''ny tanànan''ny Joda hoe. Indro Andriamanitrareo! [*Na: Ry ilay mitondra teny soa mahafaly ho an''i Ziona] [**Na: Ry ilay mitondra teny soa mahafaly ho an''i Jerosalema]'
mg1865::mg_23::40::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Jehovah Tompo ho avy amin''ny heriny, ka ny sandriny ihany no hanapaka; indro, ny valim-pitia hatolony dia eny aminy, ary ny valin''asa homeny dia eo anoloany.'
mg1865::mg_23::40::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiandry ny ondriny tahaka ny mpiandry ondry Izy; Ny sandriny no hanangonany ny zanak''ondry, ka hotrotroiny eo an-tratrany ireny, ary horoahiny miadana ny ampianahany.'
mg1865::mg_23::40::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no namatra ny rano teo am-pelatanany, ary nanjehy ny lanitra tamin''ny zehiny, sy namory ny vovo-tany tamin''ny vata*, ary nandanja ny tendrombohitra tamin''ny fandanjana sy ny havoana tamin''ny mizana? [*Hebreo: ampahatelon''ny efaha]'
mg1865::mg_23::40::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nanome hevitra ny Fanahin''i Jehovah, ary iza no mpanolo-tsaina nampianatra Azy?'
mg1865::mg_23::40::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nidinihany ka nanome saina Azy sy nanoro Azy ny lalan''ny fitsarana ary nampianatra fahalalana Azy sy nampahafantatra Azy ny lalan''ny fahendrena ?'
mg1865::mg_23::40::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny firenena dia tahaka ny rano indray mitete avy amin''ny siny ary atao ho tahaka ny vovoka madiniKa amin''ny mizana; Indro, ny nosy dia tsintsininy tahaka ny zavatra bitika indrindra*. [*Na: tahaka ny vovoka madinika paohin''ny rivotra]'
mg1865::mg_23::40::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Libanona aza tsy ampy hataina, ary ny biby ao tsy ampy ho fanatitra dorana.'
mg1865::mg_23::40::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenena rehetra dia tahaka ny tsinontsinona eo anatrehany, ka ataony ho naman''ny tsinontsinona sy ny zava-poana izy.'
mg1865::mg_23::40::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ampitovinareo amin''iza moa Andriamanitra ? Ary endrik''inona no ampanahafinareo Azy ?'
mg1865::mg_23::40::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiasa manao sarin-javatra an-idina, ary ny mpanefy volamena mametaka takela-bolamena aminy sy manao tongalika volafotsy an-idina.'
mg1865::mg_23::40::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 20
  verse_date_revised: '2022-07-24T03:56:35+0000'
  verse_title: null
  verse_text: 'Izay malahelo ka tsy manan-katerina dia mifidy hazo tsy mety ho lo ary mitady mpiasa mahay zavatra mba hamorona sarin-javatra voasokitra izay tsy hihozongozona.'
mg1865::mg_23::40::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrareo va? Tsy efa renareo va? Tsy efa nambara taminareo fony taloha va? Tsy efa azonareo an-tsaina va ny amin''ny fanorenan''ny tany?'
mg1865::mg_23::40::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no mipetraka amin''ny habakabaka ambonin''ny tany, ary ny mponina ety dia tahaka ny valala; Izy no mamelatra ny lanitra tahaka ny lamba manify kararavina ary manenjana azy tahaka ny lay hitoerana;'
mg1865::mg_23::40::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no mahatsinontsinona ny mpanapaka sy mahatonga ny mpitsara amin''ny tany ho tahaka ny zava-poana.'
mg1865::mg_23::40::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vao nambolena vetivety ireo, vao nafafy ireo, vao namaka tao amin''ny tany ny fotony, dia notsofin''Andriamanitra ireo, ka dia nalazo, ary nindaosin''ny tafio-drivotra tahaka ny vodivary izy.'
mg1865::mg_23::40::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ampitovinareo amin''iza moa Aho, hitahako aminy? Hoy ny Iray Masina.'
mg1865::mg_23::40::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandrato ny masonareo, ka mijere; Iza no nahary ireny? Izy no mamoaka ny antokony araka ny isany sy miantso azy rehetra amin''ny anarany avy noho ny haben''ny fahatanjahany sy ny heriny tsy toha, ka tsy misy diso ireny na dia iray akory aza.'
mg1865::mg_23::40::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no miteny ianao, ry Jakoba o, ary milaza ianao, ry Isiraely o, hoe: Miafina tsy hitan''i Jehovah ny lalako, ary mihelina tsy hitan''Andriamanitro ny rariny tokony ho ahy?'
mg1865::mg_23::40::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrao va? Tsy efa renao va fa Andriamanitra mandrakizay Jehovah, izay namorona ny faran''ny tany? Tsy mba mety ho reraka na sasatra Izy; Tsy takatry ny saina ny fahalalany.'
mg1865::mg_23::40::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampahatanjaka ny reraka Izy, ary izay kely hery dia omeny hery be.'
mg1865::mg_23::40::30:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny tanora fanahy aza dia ho reraka sy ho sasatra, ary na dia ny zatovo aza dia mety ho tafintohina mafy;'
mg1865::mg_23::40::31:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 40
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay miandry an''i Jehovah dia mandroso hery kosa; Elatra no hiakarany tahaka ny voromahery; Hihazakazaka izy, nefa tsy ho sasatra; Handeha izy, nefa tsy ho reraka.'
mg1865::mg_23::41::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahalehibiazan''i Jehovah, izay miseho amin''ny fitondrany ny firenena sy ny fiarovany ny Isiraely, ary ny fanambarany rahateo ny zavatra mbola ho avy'
  verse_text: 'Mangina hihaino ahy ianareo, ry nosy, ary aoka handroso hery ny firenena; Aoka hanatona izy, ka dia hiteny; Andeha isika hifanatona eo amin''ny fitsarana.'
mg1865::mg_23::41::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nanaitra avy any atsinanana ilay nomban''ny fahamarinana tamin''ny diany rehetra*, ary nanolotra ny firenena ho eo anatrehany, ka nampanapahiny ireo mpanjaka izy? Iza no nanao ny sabany ho tahaka ny vovoka, ary ny tsipïkany ho tahaka ny vodivary voapaoka? [*Na: nantsoin''ny fahamarinana hanaraka azy]'
mg1865::mg_23::41::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipaoka ireo izy ka mandroso soa aman-tsara any amin''izay lalana tsy mbola nodiavin''ny tongony.'
mg1865::mg_23::41::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no nanao sy nahavita izany, sady miantso ny taranaka maro hatramin''ny taloha? Izaho Jehovah no voalohany, ary hatramin''ny farany dia mbola Izaho ihany no Izy.'
mg1865::mg_23::41::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nosy nahita ka raiki-tahotra; Toran-kovitra ny vazan-tany dia nanatona izy ka tonga.'
mg1865::mg_23::41::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy nanampy ny namany avy izy rehetra, ary samy nilaza tamin''ny rahalahiny avy hoe: Matokia.'
mg1865::mg_23::41::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny mpandrafitra dia nampahery ny mpanefy volamena, ary izay nandama tamin''ny tantanana nampahery izay nively teo amin''ny riandriana, ka hoy izy, miantso ny solohoto: Tsara ity, dia nohomboany mafy tamin''ny hombo izy mba tsy hihozongozona.'
mg1865::mg_23::41::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa, ry Isiraely mpanompoko, sy Jakoba, izay nofidiko, Taranak''i Abrahama sakaizako,'
mg1865::mg_23::41::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao izay efa notantanako avy tany amin''ny faran''ny tany ary nantsoiko avy tany an-tsisiny ka nilazako hoe: Mpanompoko ianao, Efa nofidiko ka tsy mba nariako:'
mg1865::mg_23::41::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra ianao, fa momba anao Aho; Ary aza miherikerika foana, fa Izaho no Andriamanitrao; Mampahery anao Aho sady mamonjy anao; Eny, mitantana anao amin''ny tanana ankavanan''ny fahamarinako Aho.'
mg1865::mg_23::41::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ho menatra sy hangaihay izay rehetra tezitra aminao, ho tsinontsinona izy; Eny, ho levona izay miady aminao.'
mg1865::mg_23::41::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotadiavinao izay mifanditra aminao, fa tsy ho hitanao, ary ho tahaka ny tsinontsinona sy ny zava-poana izay miady aminao.'
mg1865::mg_23::41::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho Jehovah Andriamanitrao no mitantana ny tananao ankavanana, dia ilay manao aminao hoe: Aza matahotra, Izaho no hamonjy anao.'
mg1865::mg_23::41::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra ianao, ry Jakoba kankana, dia ianareo, ry Isiraely olom-bitsy, Izaho no hamonjy anao, hoy Jehovah, Ary ny Iray Masin''ny Isiraely no Mpanavotra anao.'
mg1865::mg_23::41::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ataoko kodia vy vaovao misy nify maranitra ianao; Hively ny tendrombohitra ianao ka hanorotoro azy ho vovoka ary hanao ny havoana ho tahaka ny akofa.'
mg1865::mg_23::41::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hikororoka azy ianao, ka hopaohin''ny rivotra izy, ary ny tafio-drivotra hanely azy; Fa ianao kosa dia hiravoravo amin''i Jehovah, ary ny Iray Masin''ny Isiraely no ho reharehanao.'
mg1865::mg_23::41::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ory sy ny malahelo mitady rano, fa tsy mahita, ary ny lelany mainan''ny hetaheta; Izaho Jehovah no hihaino azy, Izaho, Andriamanitry ny Isiraely, tsy hahafoy azy;'
mg1865::mg_23::41::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampiboika renirano ao amin''ny tendrombohitra mangadihady Aho ary loharano ao amin''ny lohasaha; Hanao ny efitra ho farihy Aho ary ny tany karankaina no loharano miboiboika.'
mg1865::mg_23::41::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampaniry hazo sedera sy akasia sy rotra* ary oliva** any an''efitra Aho ary kypreso sy pina sy bokso eny an-tani-hay, [*myrta] [**Hebreo: oliva maniry ho azy]'
mg1865::mg_23::41::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba ho hitany sy ho fantany sy hoheveriny ary ho azony an-tsaina fa ny tanan''i Jehovah no nanao izany, ary ny Iray Masin''ny Isiraely no nahary izany.'
mg1865::mg_23::41::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alaharo eto ny teninareo, hoy Jehovah; Asehoy izay mahamarina ny anareo*, hoy ny Mpanjakan''i Jakoba. [*Hebreo: fiarovana mafy]'
mg1865::mg_23::41::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hampanatoniny ka hasehony amintsika izay zavatra mbola ho avy; Ambarao izay zavatra taloha*, mba hoheverinay ka ho fantatray izay hiafarany, na ilazao izay zavatra ho avy izahay. [*Hebreo: zavatra voalohany]'
mg1865::mg_23::41::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambarao anay izay zavatra ho avy rahatrizay, mba ho fantatray fa andriamanitra ianareo; Eny, manaova soa, na manaova ratsy, mba hitaha isika, ka samy hahita.'
mg1865::mg_23::41::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ianareo dia naman''ny tsinontsinona, ary ny asanareo dia naman''ny zava-poana; vetaveta izay mifidy anareo.'
mg1865::mg_23::41::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanaitra ny anankiray avy tany avaratra Aho, ka tonga izy. Dia ny anankiray avy any amin''ny fiposahan''ny masoandro, izay hiantso ny anarako, ary hanosihosy ny mpanapaka tahaka ny fanosihosy feta izy, ary tahaka ny mpanefy vilany mihosy tanimanga.'
mg1865::mg_23::41::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nitory izany hatramin''ny voalohany, mba ho fantatray? Ary hatry ny fony taloha, mba hataonay hoe: Marina? Tsy nisy nanambara, eny, tsy nisy nitory; Ary tsy nisy nandre ny teninareo.'
mg1865::mg_23::41::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no voalohany Izay milaza amin''i Ziona hoe: Indreo, indreo izy, sady manome mpitondra teny soa mahafaly ho an''i Jerosalema.'
mg1865::mg_23::41::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijery Aho, kanjo tsy nisy olona, eny, nojereko ireny kanjo tsy nisy mpanolo-tsaina hamaly Ahy, raha manontany azy Aho.'
mg1865::mg_23::41::29:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 41
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, zava-poana avokoa izy rehetra; Tsinontsinona ny asany; Rivotra sy zava-poana ny sampiny anidina.'
mg1865::mg_23::42::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Mpanompon''i Jehovah, mpitondra famonjena ho an''ny Isiraely sy ny firenena rehetra'
  verse_text: 'Indro ny Mpanompoko, Izay tantanako, dia Ilay voafidiko sady sitraky ny foko Napetrako tao aminy ny Fanahiko; Hamoaka fitsipika ho an''ny jentilisa Izy.'
mg1865::mg_23::42::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hiantsoantso Izy, na hanandratra ny feony, na hanao izay handrenesana ny feony eny an-dàlana.'
mg1865::mg_23::42::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hotapahiny ny volotara torotoro, ary tsy hovonoiny ny lahin-jiro manetona; Hamoaka izay tena rariny tokoa Izy.'
mg1865::mg_23::42::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho reraka na ho kivy Izy, Mandra-panoriny ny rariny amin''ny tany, ary ny nosy hiandry ny lalàny.'
mg1865::mg_23::42::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Andriamanitra, Izay nahary ny lanitra sy nanenjana azy, Izay namelatra ny tany sy ny vokatra avy aminy, Izay manome fofonaina ny olona eo aminy sy fanahy ho an''izay mandeha eo aminy:'
mg1865::mg_23::42::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Jehovah efa niantso Anao tamin''ny fahamarinana sy nitantana ny tananao, Ary hiaro Anao Aho ka hanome Anao ho fanekena ho an''ny olona, Ho fanazavana ny jentilisa,'
mg1865::mg_23::42::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampahiratra ny mason''ny jamba, hamoaka ny mpifatotra hiala ao an-trano-maizina ary izay mipetraka ao amin''ny maizina hiala ao an-trano famatorana.'
mg1865::mg_23::42::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah, izany no anarako, ka ny voninahitro tsy homeko ny hafa, na ny fiderana Ahy ho an''ny sarin-javatra voasokitra.'
mg1865::mg_23::42::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny zavatra taloha, dia indreo, efa miseho; Ary zava-baovao kosa no toriko izao; Na dia tsy mbola miposaka aza ireny, dia ambarako aminareo.'
mg1865::mg_23::42::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay midina any amin''ny ranomasina sy ny ao aminy rehetra, dia ianareo nosy sy ny mponina ao aminy, samia mihira fihiram-baovao ho an''i Jehovah, dia ny fiderana Azy hatramin''ny faran''ny tany.'
mg1865::mg_23::42::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny efitra sy ireo tanàna eny aminy hanandratra ny feony, dia ny vohitra izay onenan''i Kedara; Aoka hihoby ny mponina any Sela*; Ary aoka hanao feo avo any an-tampon''ny tendrombohitra izy. [*Na: any amin''ny harambato]'
mg1865::mg_23::42::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanome voninahitra an''i Jehovah izy Ary hitory ny fiderana Azy any amin''ny nosy.'
mg1865::mg_23::42::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mivoaka tahaka ny lehilahy mahery, tahaka ny fanaon''ny mpiady no amohazany ny fahatezerany*; Miantsoantso Izy, eny, mihiaka mafy; Mampiseho hery haharesy ny fahavalony Izy. [*Na: fahasaro-piarony]'
mg1865::mg_23::42::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tsy niteny Aho hatrizay hatrizay, nangina ihany Aho ka nanindry fo; Fa izao Aho dia mitaraina tahaka ny vehivavy raha miteraka, eny, miehakehaka tsy avy miaina.'
mg1865::mg_23::42::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko mariry ny tendrombohitra sy ny havoana, hataoko maina ny ahitra rehetra ao aminy, ary ny ony ho tonga nosy, Ary hataoko tankina ny farihy.'
mg1865::mg_23::42::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitarika ny jamba amin''izay lalana tsy fantany Aho; ary amin''ny lalana tsy fantany no hitondrako azy; Ny maizina dia hataoko mazava eo anoloany, ary ny mikitoantoana halamako tsara; Izany zavatra izany no hataoko aminy ka tsy hamelako.'
mg1865::mg_23::42::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihemotra sady ho menatra tokoa izay matoky ny sarin-javatra voasokitra, dia izay manao amin''ny sarin-javatra an-idina hoe: Ianareo no andriamanitray.'
mg1865::mg_23::42::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ianareo, ry marenina; Ary mijere, ry jamba, mba hahita.'
mg1865::mg_23::42::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no jamba, afa-tsy ny mpanompoko? Ary iza no marenina tahaka ny iraka izay irahiko? Iza no jamba tahaka ny sakaizan''i Jehovah, ary jamba tahaka ny mpanompony?'
mg1865::mg_23::42::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita zavatra maro ianao, nefa tsy mitandrina; Manongilana ny sofiny izy, nefa tsy mihaino.'
mg1865::mg_23::42::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sitrak''i Jehovah noho ny fahamarinany ny hahalehibe ny lalàna sy ny hahabe voninahitra azy.'
mg1865::mg_23::42::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ity dia firenena nobaboina sy norobaina; Voafandrika ao an-davaka avokoa izy rehetra ary voàfina ao an-trano-maizina; Voababo izy, ka tsy misy mamonjy; Voasambotra izy, ka tsy misy manao hoe: Ampodio.'
mg1865::mg_23::42::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza aminareo no hihaino izany? Iza no handre, dia hitandrina izany amin''ny andro ho avy?'
mg1865::mg_23::42::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nanolotra an''i Jakoba hosamborina, ary Isiraely ho an''ny mpamabo? Tsy Jehovah, Izay efa nanotantsika va? Satria tsy nety nandeha tamin''ny lalany ireo, sady tsy nety nihaino ny lalàny;'
mg1865::mg_23::42::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 42
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nalatsany taminy ny firehitry ny fahatezerany sy ny halozan''ny ady; Dia nampirehitra azy manodidina izany nefa tsy fantany; Ary nandoro azy, nefa tsy noheverin''ny fony'
mg1865::mg_23::43::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, ry Jakoba o, izao no lazain''i Jehovah, Izay nahary anao sady namorona anao, ry Isiraely o: Aza matahotra ianao, fa efa nanavotra anao Aho; Efa niantso ny anaranao Aho, Ahy ianao.'
mg1865::mg_23::43::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mita ny rano ianao, dia homba anao Aho; Ary raha mita ny ony ianao, dia tsy hanafotra anao izy; Raha mandeha mamaky ny afo ianao, dia tsy ho may, Ary tsy hirehitra aminao ny lelafo;'
mg1865::mg_23::43::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho Jehovah no Andriamanitrao, Dia ny Iray Masin''ny Isiraely, Mpamonjy anao; Omeko ho avotrao Egypta, ary Etiopia sy Seba ho solonao.'
mg1865::mg_23::43::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria malala eo imasoko ianao, eny, be voninahitra ianao sady tiako, dia olona no omeko ho solonao, ary firenena ho solon''ny ainao.'
mg1865::mg_23::43::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mahatahotra, fa momba anao Aho; Hitondra ny taranakao avy any atsinanana Aho, ary avy any andrefana no hanangonako anao;'
mg1865::mg_23::43::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny avaratra hilazako hoe: Avoahy, ary ny atsimo hoe: Aza hazonina; Alao ny zanako-lahy avy lavitra sy ny zanako-vavy avy any amin''ny faran''ny tany,'
mg1865::mg_23::43::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay rehetra antsoina amin''ny anarako sady nohariko ho voninahitro, dia izay noforoniko sy nataoko.'
mg1865::mg_23::43::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ento mivoaka* ny olona jamba mana-maso sy ny marenina manan-tsofina. [*Na: Entiko mivoaka]'
mg1865::mg_23::43::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiangona* ny firenena rehetra, Ary aoka hivory** ny olombelona; Iza aminareo no mahalaza izany? Aoka hambarany amintsika ny fahiny taloha; Aoka ho entiny ny vavolombelony hahamarina azy; Ary aoka hihaino ireo ka hiaiky hoe: Marina izany. [*Na: Miangona] [**Na: mivory]'
mg1865::mg_23::43::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no vavolombeloko, hoy Jehovah, sady mpanompoko izay efa nofidiko, Mba hahafantaranareo sy hinoanareo Ahy ka ho azonareo tsara fa Izaho no Izy; Talohako dia tsy nisy andriamanitra voaforona, sady tsy hisy handimby Ahy.'
mg1865::mg_23::43::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia Izaho ihany no Jehovah Ary tsy misy Mpamonjy afa-tsy Izaho.'
mg1865::mg_23::43::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho efa nilaza sy namonjy ary nanambara, ary tsy nisy hafa tao aminareo; Dia ianareo no vavolombeloko, hoy Jehovah, ary Izaho no Andriamanitra.'
mg1865::mg_23::43::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hatramin''izany andro izany* Izaho no Izy, Ary tsy misy maharombaka amin''ny tanako; Miasa Aho, ka iza moa no mahasakana izany? [*Na: Hatrizay nisian''ny andro]'
mg1865::mg_23::43::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny hamindran''i Jehovah fo amin''ny Isiraely, sy ny hampodiany azy avy amin''ny fahababoana, ary ny hampidinany ny Fanahiny'
  verse_text: 'Izao no lazain''i Jehovah, Mpanavotra anareo, dia ny Iray Masin''ny Isiraely: Noho ny aminareo no nanirahako tany Babylona, ary hampidiniko izy rehetra mbamin*''ny Kaldeana ho mpandositra ho any amin''ny sambo izay efa nifaliany. [*Na: dia]'
mg1865::mg_23::43::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah, Iray Masinareo, Mpamorona ny Isiraely sady Mpanjakanareo.'
mg1865::mg_23::43::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Izay manao lalana eny amin''ny ranomasina sy lalan-kaleha eny amin''ny rano manonja,'
mg1865::mg_23::43::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 17
  verse_date_revised: '2022-10-13T07:24:04+0000'
  verse_title: null
  verse_text: 'Izay mamoaka ny kalesy sy ny soavaly, ny miaramila sy ny lehilahy mahery miara-mandry avokoa izy ka tsy hiarina intsony, mitsilopilopy izy, ka dia maty toy ny jiro:'
mg1865::mg_23::43::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mahatsiaro ny lasa, na misaina ny taloha.'
mg1865::mg_23::43::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho efa hanao zava-baovao, koa ankehitriny dia efa miposaka izany; Tsy hahalala izany va ianareo? Eny, any an''efitra no hanaovako làlana ary any amin''ny tany lao no hasiako ony;'
mg1865::mg_23::43::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanome voninahitra Ahy ny bibi-dia sy ny amboadia* ary ny ostritsa, satria manisy rano any an''efitra sy ony any amin''ny tany lao Aho, Hampisotroana ny oloko, dia ilay voafidiko. [*Na: jakala]'
mg1865::mg_23::43::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao olona noforoniko ho Ahy izao no hanambara ny fiderana Ahy.'
mg1865::mg_23::43::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izaho tsy mba nantsoinao, ry Jakoba; Fa sasatra amiko ianao*, ry Isiraely. [*Na: Na nisasaranao akory]'
mg1865::mg_23::43::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nitondranao ny zanak''ondry fanatitra doranao Aho, na nomenao voninahitra tamin''ny fanatitrao. Tsy nampahavesatra* anao tamin''ny fanatitra Aho, na nanasatra anao tamin''ny ditin-kazo mani-pofona. [*Hebreo: nampanompo]'
mg1865::mg_23::43::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nandoa vola namidy veromanitra ho Ahy ianao, na nahavoky Ahy tamin''ny saboran''ny fanatitrao; Fa nampahavesatra* Ahy tamin''ny fahotanao kosa ianao sy nanasatra Ahy tamin''ny helokao. [*Hebreo: nampanompo]'
mg1865::mg_23::43::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia Izaho no mamono ny fahadisoanao noho ny amin''ny tenako, ary tsy hotsarovako ny fahotanao.'
mg1865::mg_23::43::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahatsiarovy Aho, ka avia isika hifandahatra; Alaharo ary ny teninao, mba hahitana izay mahamarina anao.'
mg1865::mg_23::43::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny razambenao* voalohany indrindra dia efa nanota, ary ireny mpanalalana aminao efa niodina tamiko, [*Hebreo: rainao]'
mg1865::mg_23::43::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 43
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nanaovako ny mpanapaka masina ho tsy masina, sy nanolorako an''i Jakoba ho fandringana* ary Isiraely ho latsa. [*Hebreo: herema]'
mg1865::mg_23::44::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny dia mihainoa, ry Jakoba, mpanompoko, sy ry Isiraely, izay nofidiko;'
mg1865::mg_23::44::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Izay nahary anao sy namorona anao hatrany am-bohoka sady mamonjy anao: Aza matahotra, ry Jakoba mpanompoko, Ary ianao, ry Jesorona*, izay nofidiko; [*Jesorona dia anaran''ny Isiraely]'
mg1865::mg_23::44::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa handatsaka rano amin''izay mangetaheta Aho, ary riaka ho amin''izay tany karankaina; Eny, handatsaka ny Fanahiko amin''ny taranakao Aho, ary ny fitahiako ho amin''ny terakao;'
mg1865::mg_23::44::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haniry eny amin''ny ahitra tahaka ny hazomalahelo eny anilan''ny rano mandeha ireny.'
mg1865::mg_23::44::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anankiray hilaza hoe: An''i Jehovah aho: Ary ny anankiray koa hankalaza ny anarana hoe Jakoba; Ary ny anankiray koa indray hanoratra amin*''ny tanany hoe: An''i Jehovah, Ary ny anarana hoe Isiraely dia hotononiny amim-panajana. [*Na: eo amin'']'
mg1865::mg_23::44::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny amin''i Jehovah, Mpanjakan''ny Isiraely, sy ny amin''ny sampin''ny jentilisa'
  verse_text: 'Izao no lazain''i Jehovah, Mpanjakan''ny Isiraely, dia Jehovah, Tompon''ny maro, Mpanavotra azy: Izaho no voalohany, ary Izaho no farany: Ka tsy misy Andriamanitra afa-tsy Izaho.'
mg1865::mg_23::44::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza moa no mba mahantso tahaka Ahy (Aoka hanambara sy handahatra izany amiko izy) hatrizay nampitoerako ny firenena fony fahagola? Ary ny zavatra ho avy sy ny mbola ho tonga, dia aoka hambarany koa izany.'
mg1865::mg_23::44::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra na mangovitra ianareo; Tsy efa nampandre anareo hatramin''ny fahiny va Aho ka nanambara taminareo? Eny, ianareo no vavolombeloko; Misy Andriamanitra afa-tsy Izaho va? Tsia, tsy misy Vatolampy, tsy hitako izany.'
mg1865::mg_23::44::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa; Ary ny zavatra tiany indrindra dia tsy mahasoa; Ny vavolombelon''ireny dia tsy mahita na mahalala, mba hahamenatra azy.'
mg1865::mg_23::44::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no namorona andriamanitra, na nanao sarin-javatra an-idina izay tsy mahasoa akory?'
mg1865::mg_23::44::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ho menatra ny namany rehetra; Fa ny mpiasa dia olona ihany; Aoka hivory izy rehetra ka handroso; Aoka ho raiki-tahotra sy ho menatra avokoa izy.'
mg1865::mg_23::44::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanefy manamboatra* fiasana; Miasa amin''ny arina izy ary manamboatra azy amin''ny tantanana sy miasa azy amin''ny sandriny matanjaka; Eny, noana izy, ka ketraka ny heriny; Tsy misotro rano izy ka reraka. [*Na: manasa]'
mg1865::mg_23::44::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpandrafitra manenjana ny kofehy sy manamarika azy amin''ny fitsipihana; Manamboatra azy amin''ny vankona izy, dia manamarika azy amin''ny kompà ary mahavita azy ho tahaka ny endrik''olona, dia tahaka ny hatsaran-tarehin''ny olona, Mba hampitoerina ao an-trano.'
mg1865::mg_23::44::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy maintsy mijinja ny sedera izy ary maka ny hazo ileksa sy oka Ary mifidy hazo any an''ala; Mamboly ny hazo orno izy, ka ampanirin''ny ranonorana izany;'
mg1865::mg_23::44::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia anaovan''ny olona kitay izany ka analany hamindroany; Eny, ampirehetiny izany mba hanendasany mofo; Anaovany andriamanitra izany, ka dia ivavahany; Eny, anaovany sarin-javatra voasokitra koa izany, ka dia iankohofany.'
mg1865::mg_23::44::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sasany dorany amin''ny afo, eny, ny sasany ahandroany* hena; Manatsatsika hena izy, ka dia voky; Eny, mamindro izy ka manao hoe: Aha! mafana aho izany! nahita afo aho lahy! [*Hebreo: ihinanany]'
mg1865::mg_23::44::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sisan''izany dia amboariny ho andriamanitra, ho sarin-javatra voasokitra, Ary miondrika sy miankohoka eo anatrehany izy ka mivavaka aminy hoe: Vonjeo aho, fa andriamanitro ianao.'
mg1865::mg_23::44::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahalala na mahafantatra ireny; Fa voatampina ny masony ka tsy mahita, Ary ny fony, ka tsy mahalala.'
mg1865::mg_23::44::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mieritreritra ao am-pony, Na mba manana fahalalana na saina akory hanao hoe : Ny sasany mantsy nodorako tamin''ny afo; Eny, efa nanendy mofo tamin''ny vainafony aho; Efa nanatsatsika hena aho ka nihinana; Koa ny sisa va hataoko fahavetavetana, Hiankohofako eo anatrehan''izay vatan-kazo*? [*Na: vokatry ny hazo]'
mg1865::mg_23::44::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Homan-davenona izy; Voafitaka ny fony ka nampivily azy, ka dia tsy mahavonjy ny fanahiny izy na mahalaza hoe: Moa tsy lainga va no eto an-tanako ankavanana?'
mg1865::mg_23::44::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy izany, ry Jakoba, dia ianao, ry Isiraely, fa mpanompoko ianao; Noforoniko ianao ka mpanompoko; Tsy hohadinoiko ianao, ry Isiraely o,'
mg1865::mg_23::44::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona, ary ny fahotanao tahaka ny rahona; Koa miverena amiko, fa efa nanavotra anao Aho.'
mg1865::mg_23::44::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihobia, ry lanitra; Fa Jehovah no nanao izany; Manaova feo fifaliana ianareo, ry fitoerana lalina any ambanin''ny tany; Velomy ny hoby, ry tendrombohitra, ary ianao, ry ala mbamin''izay hazo rehetra ao; Fa Jehovah efa nanavotra an''i Jakoba sy mampiseho ny voninahiny eo amin''Isiraely.'
mg1865::mg_23::44::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny amin''i Kyrosy, izay voahosotr''i Jehovah ho mpanafaka ny Isiraely'
  verse_text: 'Izao no lazain''i Jehovah, izay nanavotra anao sady namorona anao hatrany am-bohoka: Izaho no Jehovah Izay manao ny zavatra rehetra, Izaho irery no manenjana ny lanitra; Ny tenako ihany no mamelatra ny tany;'
mg1865::mg_23::44::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho mahafoana ny famantarana lazain''ny mpibedibedy sy mampahavery saina ny mpanao fankatovana ary mampihemotra ny olon-kendry ka mampody ny fahalalany ho fahadalana,'
mg1865::mg_23::44::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mahatò ny tenin''ny mpanompoko* sy mahatanteraka ny saina atolotry ny irako**, ary manao amin''i Jerosalema hoe: Honenana ianao, sy amin''ny tanànan''ny Joda hoe: Hatsangana ianareo, ka hamboariko izay rava eo, [*Hebreo: mpanompony] [**Hebreo: irany]'
mg1865::mg_23::44::27:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary milaza amin''ny rano lalina hoe: Tankina, Fa hataoko tankina ny oninao,'
mg1865::mg_23::44::28:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 44
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary milaza an''i Kyrosy hoe: Izy no mpiandry ondriko, ka izay sitrako rehetra dia hotanterahiny; Ary izy hanao amin''i Jerosalema hoe: Hatsangana ianao, ary amin''ny tempoly hoe: Haorina indray ny fanorenanao.'
mg1865::mg_23::45::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah amin''ny voahosony, dia Kyrosy, izay notantanako tamin''ny tanany ankavanana, mba handreseko firenena eo anoloany sy hamahako ny fehin-kibon''ny mpanjaka, mba hamohako varavarana eo anoloany, ka tsy hirindrina intsony ny vavahady:'
mg1865::mg_23::45::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handroso eo alohanao Aho ary handravona ny mikitoantoana sy hanorotoro ny varavarana varahina ary hanapatapaka ny hidy vy;'
mg1865::mg_23::45::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia homeko anao ny rakitra ao amin''ny maizina sy ny harena nafenina ao amin''ny mangingina, mba hahafantaranao fa Izaho no Jehovah Izay miantso anao amin''ny anaranao, dia Andriamanitry ny Isiraely.'
mg1865::mg_23::45::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny amin''i Jakoba mpanompoko sy Isiraely voafidiko no niantsoako anao tamin''ny anaranao sy nanomezako anarana malaza ho anao, na dia tsy nahafantatra Ahy aza ianao.'
mg1865::mg_23::45::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah, fa tsy misy hafa: Tsy misy Andriamanitra afa-tsy Izaho; Izaho efa nampisikina anao, kanefa tsy nahafantatra Ahy ianao,'
mg1865::mg_23::45::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hahafantarana hatrany amin''ny fiposahan''ny masoandro ka hatrany amin''ny filentehany fa tsy misy afa-tsy Izaho: Izaho no Jehovah, fa tsy misy hafa,'
mg1865::mg_23::45::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Izaho Izay mamorona ny mazava sy mahary ny maizina, manao ny fiadanana sy mahary ny loza; Izaho Jehovah no manao izany rehetra izany.'
mg1865::mg_23::45::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 8
  verse_date_revised: '2022-03-26T07:25:42+0000'
  verse_title: null
  verse_text: 'Manateteva avy any ambony, ry lanitra, ary aoka ny habakabaka hampilatsaka fahamarinana; Aoka ny tany hisokatra, Ary aoka ho vokatra avy amin''ireo ny famonjena; Ary aoka hitsimoka miaraka amin''izay ny fahamarinana. Izaho Jehovah no efa nahatonga izany.'
mg1865::mg_23::45::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay miady amin''ny namorona azy! Tavim-bilany isan''ny tavim-bilany amin''ny tany ihany ireny! Ny tanimanga va hilaza amin''ny mpanefy azy hoe: Inona no ataonao? Na ny asanao va hanao hoe: Tsy manan-tanana izy?'
mg1865::mg_23::45::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay miteny amin-drainy hoe: Inona no aterakao? Na amin-dreniny* hoe: Inona no aloaky ny kibonao? [*Hebreo: ny vehivavy]'
mg1865::mg_23::45::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 11
  verse_date_revised: '2022-03-26T07:25:31+0000'
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah ny Iray Masin''ny Isiraely, dia ny namorona azy: Ny amin''ny zavatra ho avy no anontanio Ahy; ary ny zanako sy ny asan''ny tanako dia aoka ho adidiko ihany.'
mg1865::mg_23::45::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no nanao ny tany sy nahary ny olona eo amboniny; ny tanako ihany no namelatra ny lanitra sy nandahatra* ny eny aminy rehetra. [*Hebreo: nandidy]'
mg1865::mg_23::45::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no nanaitra azy io tamin''ny fahamarinana, ary ny lalany rehetra dia haravoko avokoa; izy no hanao ny tanànako, ary ny oloko voababo dia halefany, nefa tsy amim-bola amin-karena, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_23::45::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah; Ny vokatry ny fisasaran''i Egypta sy ny tombom-barotr''i Etiopia sy ny Sabeana, olona lava tsanganana, hafindra ao aminao, ka ho anao izany; ary hanaraka anao ireo; avy aman-gadra izy ary hiankohoka handady eo anatrehanao, dia hifona aminao hoe: Ato aminao tokoa Andriamanitra; ary tsy misy Andriamanitra afa-tsy Izy ihany.'
mg1865::mg_23::45::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina tokoa fa Ianao dia Andriamanitra miafina, ry Andriamanitry ny Isiraely sady Mpamonjy o.'
mg1865::mg_23::45::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho menatra sy hangaihay izy rehetra; eny, handeha aman-kenatra avokoa ny mpamorona sarin-javatra,'
mg1865::mg_23::45::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Isiraely kosa ho voavonjin''i Jehovah Amin''ny famonjena mandrakizay; tsy ho menatra na hangaihay mandrakizay mandrakizay ianareo.'
mg1865::mg_23::45::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Izay nahary ny lanitra (Izy no Andriamanitra) sady namorona ny tany sy nahavita azy (Izy no nandamina azy; tsy ho tany tsy misy endrika tsy akory no namoronany azy, fa nataony honenana): Izaho no Jehovah, ary tsy misy hafa.'
mg1865::mg_23::45::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tao amin''ny mangingina, dia tao amin''ny fitoera-maizina amin''ny tany no nitenenako; Izaho tsy niantso ny taranak''i Jakoba hitady Ahy foana; Izaho Jehovah no miteny ny marina sy manambara ny mahitsy.'
mg1865::mg_23::45::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoria, ka avia, ary miaraha manatona, ianareo jentilisa sisa afaka. Tsy manam-pahalalana izay mitondra ny hazo nataony sarin-javatra voasokitra ka mivavaka amin''izay andriamanitra tsy mahavonjy.'
mg1865::mg_23::45::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alaharo, ka asehoy mazava; Eny, aoka hiara-misaina izy: Iza no efa nanambara izany hatrizay hatrizay? Iza no efa nilaza izany hatramin''ny fahiny? Tsy Izaho Jehovah va? Fa tsy misy Andriamanitra afa-tsy Izaho, dia Andriamanitra marina sady Mpamonjy; Eny, tsy misy afa-tsy Izaho.'
mg1865::mg_23::45::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mijere Ahy, dia ho voavonjy ianareo, ry vazan-tany rehetra! Fa Izaho no Andriamanitra, ka tsy misy hafa.'
mg1865::mg_23::45::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenako no nianianako, nisy teny efa naloaky ny vavako tamin''ny fahamarinana* ka tsy hitsoaka: Izaho no handohalehan''ny lohalika rehetra, sy hianianan''ny lela rehetra hoe*: [*Na: Nisy teny naloaky ny vavan''ny fahamarinana]'
mg1865::mg_23::45::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''i Jehovah ihany no misy fahamarinana be sy hery, ka izy ihany no hohatonin''ny olona, ary ho menatra izay rehetra tezitra aminy.'
mg1865::mg_23::45::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 45
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''i Jehovah no hanamarinana ny taranak''Isiraely rehetra sy hananany rehareha.'
mg1865::mg_23::46::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatsinontsinon''ny sampin''i Babylona, sy fanomezan-toky ny Isiraely hifikitra amin''i Jehovah, ary ny hery sy ny fahalalan''i Jehovah'
  verse_text: 'Mangozohozo Bela, efa miraika Nebo, ny sampiny dia nampitondraina ny biby folahina sy ny biby fiompy; Ny zavatra fitondranareo dia asampy ka tonga enta-mavesatra entin''ireo biby reraka.'
mg1865::mg_23::46::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miraika sy mangozohozo avokoa izy, ka tsy mahavonjy ny entana akory; Fa na dia ny tenany aza dia lasan-ko babo koa.'
mg1865::mg_23::46::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa Ahy, ry taranak''i Jakoba sy izay sisa rehetra amin''ny taranak''Isiraely, izay nobabena hatrany an-kibo sy nentina hatrany am-bohoka:'
mg1865::mg_23::46::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mandra-pahantitrareo aza, dia tsy miova Aho, ary mandra-pahafotsy volonareo, dia Izaho ihany no hisahirana mitondra anareo. Izaho no nanao, ka Izaho ihany no hitrotro, eny, izaho no hitondra sy hanafaka.'
mg1865::mg_23::46::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampitovinareo amin''iza moa Aho, sy amin''iza no hanoharanareo Ahy ary iza no hataonareo ho tahaka Ahy mba hitahany amiko?'
mg1865::mg_23::46::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandraraka volamena avy ao an-kitapo sy mandanja volafotsy amin''ny mizana dia manakarama mpanefy volamena mba hanao izany ho andriamanitra, hiankohofany sy hivavahany.'
mg1865::mg_23::46::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia betainy ho eny an-tsorony iny ka entiny ary apetrany eo amin''ny fitoerany iny, ka dia mitoetra eo; Tsy mahay miala eo amin''ny fitoerany iny; ary na dia misy mitaraina aminy aza, dia tsy mahay mamaly izy, na mahavonjy azy amin''ny fahoriany.'
mg1865::mg_23::46::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy izany ka mahereza* ianareo eritrereto tsara izany, ry mpiodina. [*Na: misehoa ho lehilahy]'
mg1865::mg_23::46::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny zavatra taloha izay efa lasa ela; Fa Izaho no Andriamanitra, ka tsy misy hafa; Izaho no Andriamanitra, ka tsy misy tahaka Ahy,'
mg1865::mg_23::46::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manambara ny farany hatramin''ny voalohany, ary nanambara hatramin''ny ela izay tsy mbola natao akory, dia ilay manao hoe: Ho to ny fikasako, ary hefaiko ny sitrapoko rehetra,'
mg1865::mg_23::46::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miantso vorona mpihaza avy any atsinanana, dia lehilahy avy any an-tany lavitra hahefa ny fikasako; sady efa niteny izany Aho no hahatanteraka azy koa, sady nikasa Aho no hahefa azy.'
mg1865::mg_23::46::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa Ahy ianareo madi-po izay lavitra ny fahamarinana:'
mg1865::mg_23::46::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 46
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampanatoniko ny fahamarinako, ka tsy ho lavitra intsony; ary ny famonjeko tsy hitaredretra; fa hametraka famonjena ao Ziona Aho sy ny voninahitro ho an''ny Isiraely.'
mg1865::mg_23::47::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handravana an''i Babylona'
  verse_text: 'Mialà, ka mipetraha amin''ny vovoka, ry Babylona, zanakavavy virijina! Mipetraha eo amin''ny tany, fa tsy amin''ny seza fiandrianana, ry Kaldea zanakavavy! Fa tsy hatao hoe vehivavy malemilemy sy mihantahanta intsony ianao.'
mg1865::mg_23::47::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny vato fikosoham-bary, ka kosohy ny koba; esory ny fisalobonanao, akaro ny moron-tongotr''akanjonao; aoka hiseho ny fenao, ka miroboha mita ny ony.'
mg1865::mg_23::47::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiseho ny fitanjahanao, eny, ho hita ny fahamenaranao; hitondra famaliana Aho ka tsy hiantra olona*. [*Na: tsy hiera amin''olona; na: tsy hihaona amin''olona]'
mg1865::mg_23::47::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anaran''ny Mpanavotra anay dia Jehovah, Tompon''ny maro, Iray Masin''ny Isiraely.'
mg1865::mg_23::47::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipetraha mangingina, ka midira ao amin''ny maizina, ry Kaldea zanakavavy! Fa tsy hatao hoe Tompovavin''ny fanjakana intsony ianao.'
mg1865::mg_23::47::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tezitra tamin''ny oloko Aho; navelako holotoina ny lovako, ka natolotro ho eo an-tananao izy, tsy mba namindranao fo izy, fa na dia ny antitra aza dia nasianao zioga mavesatra dia mavesatra.'
mg1865::mg_23::47::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ianao: Ho tompovavy mandrakizay Aho; ka dia tsy nandatsaka am-po izany zavatra izany ianao, na nitsapa izay hiafarany.'
mg1865::mg_23::47::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa, ianao izay mihantahanta sady mipetraka tsy manana ahiahy ka manao anakampo hoe: Izaho no izy, ary tsy misy hafa; tsy hipetraka ho mpitondratena aho, na hahita fahafoanan''anaka.'
mg1865::mg_23::47::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo hanjo anao tampoka amin''ny indray andro monja ireto zavatra roa ireto, dia ny fahafoanan''anaka sy ny fananoan-tena; Hotanterahina aminao avokoa izany, na dia maro aza ny fankatovanao, ary na dia be dia be aza ny odinao.'
mg1865::mg_23::47::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nitoky tamin''ny faharatsianao* ianao ka nanao hoe: Tsy misy mahita ahy. Ny fahendrenao sy ny fahalalanao dia nampivily anao, ka dia nanao anakampo ianao hoe: Izaho no izy, fa tsy misy afa-tsy izaho. [*Na: hafetsenao]'
mg1865::mg_23::47::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo hanjo anao ny fahoriana, nefa tsy ho fantatrao izay fanafany*; Ary hahazo anao ny loza, nefa tsy ho hainao ny fanàlany; eny, hanjo anao tampoka ny fandringanana izay tsy ampoizinao. [*Na: iposahany]'
mg1865::mg_23::47::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arosoy ary ny odinao sy ny hamaroan''ny fankatovanao, izay efa nisasaranao hatry ny fony ianao mbola kely; Angamba hahavita izay mahasoa ianao; angamba ho tonga mahatahotra ianao.'
mg1865::mg_23::47::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sasatra noho ny hamaroan''ny fisainanao ianao; aoka hitsangana ankehitriny ireo mpamantatra* ny lanitra sy mpandinika ny kintana ireo hamonjy anao, dia ireo mpanambara isaky ny tsinam-bolana izay zavatra ho tonga aminao**. [*Hebreo: mpizarazara] [*Na: Aoka hitsangana ankehitriny ireo mpamantatra ny lanitra sy mpandinika ny kintana ireo hamonjy anao amin''izay hanjo anao]'
mg1865::mg_23::47::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fa ho tahaka ny vodivary ireo; ho main''ny afo izy ka tsy hahavonjy ny tenany amin''ny herin''ny lelafo akory; tsy misy vainafo hamindroana, na afo hitaninana aza.'
mg1865::mg_23::47::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 47
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho toy izany aminao ireo efa nisasaranao ireo, dia ireo nifampivarotra taminao hatry ny fony ianao mbola kely; samy hipariaka mandositra ho any amin''ny fonenany avy izy, ka tsy hisy hahavonjy anao.'
mg1865::mg_23::48::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampahatsiarovana ny lasa, sy filazana ny ho avy, indrindra fa ny hanafahana ny Isiraely avy any Babylona'
  verse_text: 'Mihainoa, ry taranak''i Jakoba, dia ianareo izay antsoina amin''ny anaran''Isiraely sy avy amin''ny loharanon''i Joda, ianareo izay mianiana amin''ny anaran''i Jehovah ary mankalaza ny anaran''Andriamanitry ny Isiraely, kanefa tsy araka ny marina, na araka ny hitsiny;'
mg1865::mg_23::48::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa milaza ny tenany ho avy amin''ny tanana masina izy ka miankina amin''Andriamanitry ny Isiraely; Jehovah, Tompon''ny maro, no anarany.'
mg1865::mg_23::48::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra taloha dia efa voalazako hatramin''ny fahiny, ary naloaky ny vavako izany sady nambarako; Tampoka no nanaovako izany, ary tonga izany.'
mg1865::mg_23::48::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria fantatro fa maditra ianao, ka ozaby ny hatokao, ary varahina ny handrinao,'
mg1865::mg_23::48::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambarako taminao hatramin''ny fahiny izany, eny, fony tsy mbola tonga aza izany, dia efa nambarako taminao rahateo, fandrao hataonao hoe: Ny sampiko no nanao izany, ary ny sarin-javatra voasokitra sy ny sarin-javatra anidina no nandidy izany.'
mg1865::mg_23::48::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renao, ka dia jereo izany rehetra izany, moa ianareo tsy hanambara izany va? Mampandre anao zava-baovao kosa Aho hatramin''izao, dia zavatra miafina izay tsy fantatrao.'
mg1865::mg_23::48::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vao izao no namoronana azy, fa tsy hatramin''ny fahiny, ary tsy mbola nandre azy ianao talohan''ny andro anio, fandrao ianao hanao hoe: Indro, ny efa fantatro ihany izany.'
mg1865::mg_23::48::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nandre na nahalala ianao; Eny, hatramin''ny fahiny aza no tsy mbola nisokatra ny sofinao; fa fantatro fa tena mpivadika ianao sady natao hoe mpiodina hatrany an-kibo.'
mg1865::mg_23::48::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny anarako dia ononiko ny fahatezerako, ary mba hiderana ahy dia manindry fo aminao Aho, mba tsy hamongorana anao.'
mg1865::mg_23::48::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, nodioviko ianao, nefa tsy toy ny volafotsy; Efa nizaha toetra anao tao amin''ny memy fahoriana Aho.'
mg1865::mg_23::48::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny tenako, eny, noho ny tenako ihany no anaovako izany; indrisy, lotoina ny anarako! Ary ny voninahitro tsy homeko ny hafa.'
mg1865::mg_23::48::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 12
  verse_date_revised: '2022-04-13T11:23:20+0000'
  verse_title: null
  verse_text: 'Mihainoa Ahy, ry Jakoba, sy ry Isiraely izay nantsoiko: Tsy miova Aho; Izaho no voalohany, ary Izaho koa no farany.'
mg1865::mg_23::48::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny tanako no nanorina ny fanambanin''ny tany, ary ny tanako ankavanana no namelatra ny lanitra; Raha antsoiko ireo, dia indray miseho avokoa.'
mg1865::mg_23::48::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoria ianareo rehetra, ka mihainoa: Iza moa amin''ireny no mba efa nanambara izany; ilay tian''i Jehovah no hahefa ny sitrapony amin''i Babylona ary ny sandriny ho amin''ny Kaldeana.'
mg1865::mg_23::48::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia Izaho ihany no miteny sady miantso azy, nitondra azy Aho, ka hambinina ny lalany.'
mg1865::mg_23::48::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manatona Ahy ianareo, ka mihainoa; hatramin''ny taloha no efa tsy nitenenako tamin''ny mangingina, hatry ny fony vao nisian''ireo dia teo Aho, ary ankehitriny Jehovah Tompo no naniraka Ahy sy ny Fanahiny.'
mg1865::mg_23::48::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Mpanavotra anao, dia ny Iray Masin''ny Isiraely: Izaho, Jehovah Andriamanitrao, no nampianatra anao hahita soa sady mitarika anao amin''ny lalana tokony halehanao.'
mg1865::mg_23::48::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izay anie ianao mba nihaino ny didiko*! Dia ho tonga tahaka ny ony ny fiadananao, ary ho tahaka ny onjan-dranomasina ny fahamarinanao, [*Na: Enga anie ka hihaino ny didiko ianao]'
mg1865::mg_23::48::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tahaka ny fasika ny taranakao, ary ny aloaky ny kibonao ho tahaka ny sombim-pasika; Ny anarany tsy ho tapaka na ho foana eo anatrehako.'
mg1865::mg_23::48::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoaha hiala any Babylona; miezaha avy any amin''ny Kaldeana; torio amin''ny feo mahafaly, ary ambarao, ka aelezo hatrany amin''ny faran''ny tany, lazao hoe: Jehovah efa nanavotra an''i Jakoba mpanompony.'
mg1865::mg_23::48::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nangetaheta ireo tamin''ny nitondrany azy tany an''efitra; Nampiboiboika rano ho azy avy tamin''ny vatolampy Izy, Eny, nampitresaka ny vatolampy Izy, ka dia nigororoana ny rano.'
mg1865::mg_23::48::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 48
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fiadanana ho an''ny ratsy fanahy, hoy Jehovah.'
mg1865::mg_23::49::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Mpanompon''i Jehovah, Izay voatendry hamory sy hamonjy ny Isiraely sy ny firenena rehetra'
  verse_text: 'Mihainoa Ahy, ry nosy, ary atongilano ny sofinareo, ry firenena lavitra; Jehovah efa niantso Ahy hatrany am-bohoka; Hatry ny fony Aho mbola tao an-kibon''ineny no efa nankalazainy ny anarako.'
mg1865::mg_23::49::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony tahaka ny sabatra maranitra ny vavako; tao amin''ny aloky ny tanany no nanafenany Ahy. Ary nataony zana-tsipïka voalambolambo tsara Aho; teo amin''ny tranon-jana-tsipïkany no nanafenany Ahy.'
mg1865::mg_23::49::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Mpanompoko Ianao, ry Isiraely o. Izay entiko mampiseho ny voninahitro.'
mg1865::mg_23::49::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Aho: Foana ny nisasarako, zava-poana sy tsinontsinona no nandaniako ny heriko; kanefa ao amin''i Jehovah ny rariny tokony ho Ahy, Ary ny valin''ny asako dia ao amin''Andriamanitro.'
mg1865::mg_23::49::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, hoy Jehovah, Izay namorona Ahy hatrany am-bohoka ho Mpanompony, hampodiana ny Jakoba ho ao aminy indray sy hamoriana ny Isiraely ho ao aminy, (Fa mahazo voninahitra eo imason''i Jehovah Aho, Ary Andriamanitro no heriko),'
mg1865::mg_23::49::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hoy Izy: Mbola zavatra kely foana, raha tonga Mpanompoko hanandratra ny firenen''i Jakoba Ianao sy hampody ny Isiraely sisa voaro; Fa homeko ho fanazavana ny jentilisa koa Ianao, mba ho famonjeko hatrany amin''ny faran''ny tany.'
mg1865::mg_23::49::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Mpanavotra ny Isiraely, dia ny Iray Masiny, Amin''Ilay hamavoin''ny olona sy halan''ny firenena ka tonga mpanompon''ny mpanapaka: Ny mpanjaka hahita ka hitsangana, ary ny mpanapaka koa, ka dia hiankohoka noho ny amin''i Jehovah, Izay mahatoky dia ny Iray Masin''ny Isiraely, izay efa nifidy Anao.'
mg1865::mg_23::49::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Tamin''ny taona fankasitrahana no nihainoako Anao. Ary tamin''ny andro famonjena no namonjeko Anao; Dia hiaro Anao Aho ka hanome Anao ho fanekena ho an''ny olona, mba hanangana ny tany indray sy hampandova ny lova izay efa rava'
mg1865::mg_23::49::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hanao amin''ny mpifatotra hoe: Mivoaha, Ary amin''izay ao amin''ny maizina hoe: Misehoa; hihinana eny an-dàlana izy, ary na dia any an-tendrombohitra mangadihady aza dia hisy ahitra ho azy ihany; .'
mg1865::mg_23::49::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho noana na hangetaheta izy, ary tsy hamely azy ny hainandro migaingaina na ny masoandro; fa Izay mamindra fo aminy no hitarika azy, ary any amin''ny loharano miboiboika no hitondrany azy.'
mg1865::mg_23::49::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko lalana ny tendrombohitro rehetra, ary hasandratra ny lalambeko.'
mg1865::mg_23::49::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, tonga avy lavitra ireto; ary, indreo, avy any avaratra sy andrefana ireto, ary avy any amin''ny tany Sinima ireto.'
mg1865::mg_23::49::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihobia, ry lanitra! Ary mifalia, ry tany! Ka velomy ny hoby, ry tendrombohitra! Fa Jehovah efa nampionona ny olony sy mamindra fo amin''ny olony mahantra.'
mg1865::mg_23::49::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Ziona''Jehovah efa nahafoy ahy, ary ny Tompoko efa nanadino ahy.'
mg1865::mg_23::49::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mety manadino ny zanany minono va ny vehivavy ka tsy hamindra fo amin''ny zanaka naloaky ny kibony? Eny, mety manadino ihany izy, Fa Izaho kosa tsy mba manadino anao.'
mg1865::mg_23::49::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa vitako tombo-kavatsa eo am-pelatanako ianao, ary ny mandanao dia eo anatrehako mandrakariva.'
mg1865::mg_23::49::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamy faingana ny zanakao; Ary izay nanimba sy nandrava anao dia miala aminao.'
mg1865::mg_23::49::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atopazy manodidina ny masonao, ka mijere; ireo rehetra ireo dia mivory ka mankeo aminao; raha velona koa Aho, hoy Jehovah, Ireo rehetra ireo dia hihaingoanao tokoa tahaka ny firavaka sy hiravahanao tahaka ny fanaon''ny ampakarina.'
mg1865::mg_23::49::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny taninao rava sy ny fonenanao lao ary ny taninao simba dia tsy ho omby amin''izany noho ny habetsahan''ny mponina, ary ho lasa lavitra ireo nihinana anao.'
mg1865::mg_23::49::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakao izay efa lasa teo dia mbola hilaza eo an-tsofinao hoe: Tsy omby ahy loatra ity tany ity, Mikisaha kely mba hitoerako.'
mg1865::mg_23::49::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanao anakampo ianao hoe: Iza no niteraka ireto ho ahy? Fa efa maty ny zanako, ary nitsaha-jaza aho. Babo aho sady noroahina, koa iza no namelona ireto? Indro, nilaozana ho irery aho, fa taiza kosa moa ireto?'
mg1865::mg_23::49::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo; Indro, hanandratra ny tanako amin''ny jentilisa Aho ary hanangana ny fanevako amin''ny firenena; dia hitrotro ny zanakao eo an-tratrany ireo, ary ny zanakaovavy ho entiny eny an-tsorony.'
mg1865::mg_23::49::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpanjaka no ho rainao mpitaiza anao, Ary zanakavavin''andriana no ho reninao mpampinono anao; Hiankohoka amin''ny tany eo anatrehanao izy Ka hilelaka ny vovoka amin''ny tongotrao; Dia ho fantatrao fa Izaho no Jehovah, ka tsy ho menatra izay miandry Ahy.'
mg1865::mg_23::49::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azo alaina eny amin''ny mahery va ny sambotra? Na ho afaka va ny babo marina?'
mg1865::mg_23::49::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izao no lazain''i Jehovah: Na dia ny sambotry ny mahery aza dia halaina ihany, ary ho afaka ny babon''ny mpandrombaka; fa Izaho no hiady amin''izay miady aminao, ary Izaho no hamonjy ny zanakao.'
mg1865::mg_23::49::26:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 49
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady hampihinaniko ny nofon''ny tenany ihany izay mampahory anao, ary ho leon''ny ran''ny tenany ihany ireny, toy ny amin''ny ranom-boaloboka; dia ho fantatry ny nofo rehetra fa Izaho Jehovah no Mpamonjy anao, ary Ilay Maherin''i Jakoba no Mpanavotra anao.'
mg1865::mg_23::50::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nisaorana ny Isiraely, sy ny amin''ny Mpanompon''i Jehovah'
  verse_text: 'Izao no lazain''i Jehovah: Aiza izay taratasy fisaoram-bady nisaorako an-dreninareo? Ary iza amin''izay manan-trosa amiko no nivarotako anareo? Tsia, fa noho ny helokareo ihany no nivarotana anareo, ary noho ny fahadisoanareo ihany no nisaorana an-dreninareo.'
mg1865::mg_23::50::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no tsy nisy olona, fony tonga Aho, ary tsy nisy namaly, fony niantso Aho? Moa fohy tokoa va ny tanako ka tsy mahavonjy, ary moa tsy manan-kery ho enti-manafaka va Aho? Indro, amin''ny teny mafy ataoko no andritako ny ranomasina sy anaovako ny ony ho efitra; ary maimbo ny hazandranony noho ny tsy fisian''ny rano sady matin-ketaheta.'
mg1865::mg_23::50::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tafiako fahamaintisana ny lanitra, ary lamba fisaonana no ataoko fisaronany.'
mg1865::mg_23::50::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tompo nanome Ahy ny lelan''ny efa mahay*, mba hahaizako manao teny hampahatanjaka izay reraka; ampandrenesiny isa-maraina isa-maraina, eny, ampandrenesiny ny sofiko hihaino tahaka ny efa mahay* [*Hebreo:efa nampianarina]'
mg1865::mg_23::50::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tompo nanokatra ny sofiko, ary Izaho tsy naditra na nihemotra.'
mg1865::mg_23::50::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lamosiko natolotro ho amin''ny mpikapoka, ary ny takolako ho amin''izay manongobaoka; ny tavako tsy nafeniko tamin''ny henatra sy ny rora.'
mg1865::mg_23::50::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Tompo no hamonjy Ahy, ka dia tsy resin-kenatra Aho; Ary efa nohamafisiko ho tahaka ny afovato ny tavako, ka fantatro fa tsy ho menatra Aho.'
mg1865::mg_23::50::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa akaiky Izay manamarina Ahy: Iza no hiady amiko? Andeha hiara-mitsangana isika; iza no manana ady amiko? Aoka izy ho avy amiko.'
mg1865::mg_23::50::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Jehovah Tompo no hamonjy ahy; koa iza no hanameloka ahy? Indro, izy rehetra ho tonga tahaka ny lamba mangarahara, ho lanin''ny kalalao izy.'
mg1865::mg_23::50::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza aminareo no matahotra an''i Jehovah ka mihaino ny feon''ny Mpanompony? Na iza na iza mandeha amin''ny maizina ka tsy manana fahazavana*, aoka izy hatoky ny anaran''i Jehovah sy hiankina amin''Andriamaniny. [*Na: Na dia mandeha amin''ny maizina aza izy ka tsy misy famirapiratana]'
mg1865::mg_23::50::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 50
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! ianareo rehetra izay mampirehitra afo sy mifehy kilalaon''afo manodidina anareo, mandehana amin''ny lelafonareo sy amin''ny zana-tsipïka misy afo, izay narehitrareo. Izao no hanjo anareo avy amin''ny tanako: Handry amin''ny fahoriana ianareo.'
mg1865::mg_23::51::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fiposahan''ny famonjena, sy ny fanesorana ny kapoaky ny fahatezeran''i Jehovah'
  verse_text: 'Mihainoa Ahy, ianareo izay miezaka mitady fahamarinana, dia izay mitady an''i Jehovah: Tsarovy* ny vatolampy izay nakana anareo sy ny ati-lavaka izay nihadiana anareo. [*Hebreo: Jereo]'
mg1865::mg_23::51::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tsarovy* Abrahama rainareo sy Saraha, izay niteraka anareo; fa fony mbola tokana izy, dia nantsoiko sy notahiko ary nohamaroiko. [*Hebreo: Jereo]'
mg1865::mg_23::51::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah mampionona an''i Ziona; Eny, mampionona izay rava rehetra ao Izy Ka manao ny efitra ao ho tahaka an''i Edena. Ary ny tany foana ao ho tahaka ny sahan''i Jehovah; Hafaliana sy haravoana no hita ao mbamin''ny fisaorana sy ny feo fiderana.'
mg1865::mg_23::51::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa Ahy, ry vahoakako, ary atongilano amiko ny sofinareo, ry oloko; fa hisy lalàna hivoaka avy amiko, ary ny fitsipiko dia hampitoeriko ho fanazavana ny firenena.'
mg1865::mg_23::51::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akaiky ny fahamarinako, efa nivoaka ny famonjeko, ary ny sandriko no hitsara ny firenena; izaho no hantenain''ny nosy, ary ny sandriko no andrasany.'
mg1865::mg_23::51::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andrandrao ho amin''ny lanitra ny masonareo, ary jereo ny tany ambany; fa ny lanitra ho levona tahaka ny setroka, ary tany ho tahaky ny lamba mangarahara, ary ny mponina ao dia ho faty tampoka*; fa ny famonjena kosa haharitra mandrakizay, ary ny fahamarinako tsy mba ho rava. [*Na: tahaka ny fahafatin''ny moka]'
mg1865::mg_23::51::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ahy, ianareo izay mahalala ny fahamarinana, dia ianao, ry firenena izay manana ny lalàko ao am-ponao; aza matahotra ny latsa ataon''ny zanak''olombelona, na manahy noho ny faharatsiany.'
mg1865::mg_23::51::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 8
  verse_date_revised: '2022-03-26T04:16:51+0000'
  verse_title: null
  verse_text: 'Fa ny kalalao hihinana azy tahaka ny fihinan-damba, ary ny lolo fotsy hihinana azy tahaka ny fihinam-bolon''ondry; fa ny fahamarinako haharitra mandrakizay, ary ny famonjeko hihatra amin''ny taranaka fara-mandimby.'
mg1865::mg_23::51::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, mifohaza, ry sandrin''i Jehovah, mitafia hery! Mifohaza tahaka ny tamin''ny andro fahiny! dia tamin''ny taranaka lasa ela. Tsy Ianao va Ilay nitetitetika an-dRahaba sy nitomboka ny dragona*? [*Na: mamba; izahao Ezekiela 29:3]'
mg1865::mg_23::51::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Ianao va Ilay nahamaina ny ranomasina, dia ny rano ao amin''ny lalina indrindra, ka nanao ny ranomasina lalina ho lalana halehan''ny navotana?'
mg1865::mg_23::51::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny navotan''i Jehovah hiverina ka hankany Ziona amin''ny fihobiana, ary ny fifaliana mandrakizay no ho eny an-dohany; hahazo fifaliana sy faharavoravoana izy, ka dia handositra ny alahelo sy ny fisentoana.'
mg1865::mg_23::51::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia Izaho no mpampionona anareo, koa nahoana ianao no dia matahotra ny zanak''olombelona mety maty sy ny zanak''olona hatao tahaka ny ahitra'
mg1865::mg_23::51::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manadino an''i Jehovah, Mpanao anao, izay namelatra ny lanitra sy nanorina ny tany, sady matahotra lalandava mandritra ny andro ianao noho ny fahatezeran''ny mpampahory, raha mikendry hamono izy? Fa aiza intsony izay fahatezeran''ny mpampahory?'
mg1865::mg_23::51::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitanondrika dia ho afaka faingana; Tsy ho faty havarina ao an-davaka izy ary tsy ho diso hanina.'
mg1865::mg_23::51::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho Jehovah no Andriamanitrao, Izay mampanonja ny ranomasina, ka dia mirohondrohona ny onjany*; Jehovah, Tompon''ny maro, no anarako**. [*Na: Izay mampitsahatra ny rano, raha mirohondrohona ny onjany] [**Hebreo: anarany]'
mg1865::mg_23::51::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataoko eo am-bavanao ny teniko, ary ao amin''ny aloky ny tanako no nanaronako anao, hanao* ny lanitra sy hanorina ny tany Aho ary hanao an''i Ziona hoe: Oloko ianao. [*Hebreo: Hamboly]'
mg1865::mg_23::51::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, mifohaza, mitsangana, ry Jerosalema o, izay efa nisotro ny kapoaky ny fahatezerana avy tamin''ny tanan''i Jehovah; eny, ny kapoaka gobilia mampiraikiraiky dia efa nisotroanao, ka notrohinao mbamin''ny faikany.'
mg1865::mg_23::51::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mitondra azy ny zananilahy rehetra izay naterany; ary tsy misy mitantana azy ny zananilahy rehetra izay notezainy.'
mg1865::mg_23::51::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao zavatra roa Izao no hanjo anao (Iza no hanony ny alahelonao?): Fandravana sy fandringanana ary mosary sy sabatra, koa hataoko ahoana no fampionona anao?'
mg1865::mg_23::51::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakao-lahy efa reraka, ka miapokapoka eny an-joron-dalambe rehetra eny izy, tahaka ny diera ao anatin''ny fandrika harato eny, tahaka ny olona rakotry ny fahatezeran''i Jehovah sy ny teny mafy ataon''Andriamanitrao.'
mg1865::mg_23::51::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa izao, ianao ry ilay ory sady mamo tsy amin-divay:'
mg1865::mg_23::51::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tomponao, dia Andriamanitrao, Izay mandaha-teny ho an''ny olony: Indro, esoriko eny an-tananao ny kapoaka mampiraikiraiky, dia ny kapoaka gobilian''ny fahatezerako; Tsy hisotroanao intsony iny,'
mg1865::mg_23::51::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 51
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hataoko eo an-tanan''izay mampahory anao kosa, dia izay efa nilaza taminao hoe: Miankohofa mba hohitsahinay, ka dia nataonao ho tahaka ny tany ny tenanao sy ho tahaka ny lalambe ho an''izay mandeha eo.'
mg1865::mg_23::52::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hanafahana an''i Jerosalema amin''ny fahandevozana sy ny fatorana'
  verse_text: 'Mifohaza, mifohaza, tafio ny herinao, ry Ziona o; tafio ny fitafianao tsara tarehy, ry Jerosalema o, tanàna masina; fa tsy hiditra any aminao intsony ny tsy voafora sy ny maloto.'
mg1865::mg_23::52::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahintsano ny vovoka hiala amin''ny tenanao, ka mitsangàna, ary mipetraha, ry Jerosalema o; vahao ny fatorana amin''ny tendanao, ry Ziona, zanakavavy babo.'
mg1865::mg_23::52::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Tsy vola tsy harena no nivarotana anareo, ka dia tsy vola tsy harena koa no hanavotana anareo.'
mg1865::mg_23::52::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Tany Egypta no nidinan''ny oloko tamin''ny voalohany mba hivahiny tany; Ary ny Asyriana koa nampahory azy tsy ahoan-tsy ahoana.'
mg1865::mg_23::52::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny inona no hataoko eto? hoy Jehovah, fa nobaboina tsy ahoan-tsy ahoana ny oloko; ny mpanapaka azy dia manakora, hoy Jehovah; ary mandrakariva dia hamavoina mandritra ny andro ny anarako.'
mg1865::mg_23::52::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny oloko dia hahalala ny anarako; Eny, amin''izany andro izany* dia ho fantany fa Izaho no miteny hoe: Inty Aho. [*Na: Eny, ho fantany amin''izany andro izany Aho]'
mg1865::mg_23::52::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akory ny hatsaran''ny tongotr''iry mitondra teny soa mahafaly ery an-tendrombohitra sady mitory fiadanana! Dia izay mitondra teny soa mahafaly sady mitory famonjena, eny, izay manao amin''i Ziona hoe: Mpanjaka Andriamanitrao!'
mg1865::mg_23::52::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany ny feon''ny mpitilinao! Manandratra ny feony izy ka miara-mihoby; fa ho faly izy mahita mifanatri-maso ny hodian''i Jehovah ho any Ziona.'
mg1865::mg_23::52::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Velomy ny hoby, ry fitoeran-drava any Jerosalema; Fa Jehovah efa nampionona ny olony sady efa nanavotra an''i Jerosalema.'
mg1865::mg_23::52::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nampiseho* ny sandriny masina teo imason''ny firenena rehetra; ary ny faran''ny tany rehetra hahita ny famonjen''Andriamanitsika. [*Hebreo: nampitanjaka]'
mg1865::mg_23::52::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà, mialà ianareo, mivoaha, aza mikasika izay maloto, mivoaha avy eo aminy; madiova, ianareo izay mitondra ny fanak''i Jehovah.'
mg1865::mg_23::52::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy tampoka no hivoahanareo, ary tsy lositra no handehananareo; fa Jehovah no hitarika anareo eo aloha, ary Andriamanitry ny Isiraely no ho vodi-lalanareo.'
mg1865::mg_23::52::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny amin''ny Mpanompon''i Jehovah, dia ny zava-mahagaga nataony, sy ny nandavan''ny maro Azy, sy ny fahoriana nentiny, sy ny avotra vitany, ary ny voninahitra homena Azy'
  verse_text: 'Indro, ny Mpanompoko ho hita ho hendry*, hisandratra sy ho ambony Izy ka ho avo indrindra. [*Hebreo: hambinina]'
mg1865::mg_23::52::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ny nigagan''ny maro Anao (Ny tarehiny dia simba ka hoatra ny tsy tarehin''olombelona akory, ary ny endriny hoatra ny tsy endriky ny zanak''olombelona),'
mg1865::mg_23::52::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 52
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany no hampihendratrendratany* ny firenena maro; ny mpanjaka hitampim-bava aminy; fa izay tsy mbola nolazaina tamin''ireny no ho hitany, ary izay tsy mbola reny akory no hosaintsaininy. [*Hebreo: hanafànany]'
mg1865::mg_23::53::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nino ny teny nampitondraina anay ? Ary iza no nampisehoana ny sandrin''i Jehovah?'
mg1865::mg_23::53::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy sy tahaka ny solofon-kazo amin''ny tany karankaina; tsy nanana endrika na fahatsaran-tarehy Izy; Ary raha nijery Azy isika, dia tsy nisy hatsaran-tarehy haniriantsika Azy.'
mg1865::mg_23::53::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Natao tsinontsinona sy nolavin''ny olona Izy; lehilahy ory sady zatra ny fahoriana*, Ary tahaka izay tsy tian''ny olon-kojerena akory Izy; natao tsinontsinona Izy ka tsy mba nahoantsika. [*Hebreo: lehilahy be fanaintainana sady fantatry ny faharariana]'
mg1865::mg_23::53::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitondra ny aretintsika tokoa Izy sady nivesatra ny fahoriantsika*; kanjo isika kosa nanao azy ho nokapohina sy nasian''Andriamanitra ary nampahorina. [*Hebreo: fanaintainantsika]'
mg1865::mg_23::53::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izy dia voalefona noho ny fahadisoantsika sy notorotoroina noho ny helotsika, ny fampijaliana* nahazoantsika fihavanana no namelezana Azy; ary ny dian-kapoka taminy no nahasitranana antsika. [*Hebreo: famaizana]'
mg1865::mg_23::53::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isika rehetra dia samy efa nania tahaka ny ondry, samy efa nivily ho amin''ny lalantsika avy isika rehetra; ary nataon''i Jehovah nihatra taminy avokoa ny helotsika rehetra.'
mg1865::mg_23::53::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampahorina Izy, nefa nanetry tena ka tsy niloa-bava, dia tahaka ny zanak''ondry entina hovonoina, sy tahaka ny ondrivavy izay moana eo anatrehan''ny mpanety azy, eny, tsy niloa-bava Izy.'
mg1865::mg_23::53::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy*; ary iza tamin''ny niara-belona taminy no nihevitra** fa nofongorana niala tamin''ny tanin''ny velona Izy, ka ny fahadisoan''ny oloko no nikapohana Azy? [*Na: Nalaina niala tamin''ny fampahoriana sy ny fitsarana Izy] [**Na: Ary iza no nihevitra izay ho taranany?]'
mg1865::mg_23::53::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nokasaina hatao tao amin''ny olo-meloka ny fasany (Nefa teo amin''ny mpanankarena Izy, rehefa novonoina)*, na dia tsy nanao ratsy aza Izy, sady tsy nisy fitaka teo am-bavany. [*Na: Sy ho eo amin''ny mpanankarena, rehefa novonoina Izy]'
mg1865::mg_23::53::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa sitrak''i Jehovah ny hanorotoro sy hampangirifiry Azy; Rehefa manolotra fanati-panonerana Izy, dia hahita taranaka* sady ho maro andro, ary ny sitrapon''i Jehovah dia hambinina eo an-tanany. [*Na: Rehefa ataonao fanati-panonerana ny ainy, dia hahita taranaka Izy]'
mg1865::mg_23::53::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fisasaran''ny fanahiny dia hahita izany Izy ka ho afa-po; Ny fahalalana Azy* no hanamarinan''ny Mpanompoko marina ny olona maro, ary Izy no hivesatra ny helok''ireo. [*Hebreo:fahalalany]'
mg1865::mg_23::53::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 53
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia hanome Azy anjara amin''ny lehibe Aho, ary hizara babo amin''ny mahery Izy*; Satria naidiny ho amin''ny fahafatesana ny ainy, Ary natao ho isan''ny mpanota Izy; Eny, Izy no nitondra ny fahotan''ny maro sady manao** fifonana ho an''ny mpanota. [*Na: dia homeko Azy ny lehibe ho anjarany sy ny mahery ho anjara-babony] [**Na: nanao]'
mg1865::mg_23::54::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hanitarana ny Fiangonana, sy ny voninahitra ho azony'
  verse_text: 'Mihobia, ry momba, ianao izay tsy niteraka, eny, velomy ny hoby, ka manandrata feo, ianao izay tsy mba nihetsi-jaza; fa ny zanaky ny mpitondra tena dia maro noho ny zanaky ny manambady, hoy Jehovah.'
mg1865::mg_23::54::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halalaho ny itoeran''ny lainao, ary aoka hohenjanina ny ambain-dainao, ka aza avela hisy hiketrona; halavao ny kofehinao, ary aoreno mafy ny tsima-dainao;'
mg1865::mg_23::54::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hitatra any amin''ny ankavanana sy any amin''ny ankavia ianao, ary ny taranakao hahazo ny jentilisa, ka dia hasiany mponina ny tanàna lao.'
mg1865::mg_23::54::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra, fa tsy ho menatra ianao; ary aza mangaihay, fa tsy havela ho afa-baraka ianao; fa ho hadinonao ny henatry ny fahatanoranao, ary tsy ho tsaroanao intsony ny tondromasonao fony mpitondratena.'
mg1865::mg_23::54::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Mpanao anao no Vadinao, Jehovah, Tompon''ny maro, no anarany; Ary ny Iray Masin''ny Isiraely no Mpanavotra anao, Andriamanitry ny tany rehetra no anarany.'
mg1865::mg_23::54::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nampody* anao, izay tahaka ny vady efa nafoy ka ory am-panahy, ary tahaka ny vady efa novadina hatry ny fony mbola tanora, fa efa napetraka, hoy Andriamanitrao. [*Hebreo:niantso]'
mg1865::mg_23::54::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indray mipi-maso monja no nahafoizako anao; fa amin''ny indrafo lehibe kosa no ampodiako anao.'
mg1865::mg_23::54::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny firehetan''ny fahatezerako no nanafenako ny tavako taminao indray mipi-maso monja, fa amin''ny famindram-po mandrakizay kosa no amindrako fo aminao, hoy Jehovah, Mpanavotra anao.'
mg1865::mg_23::54::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amiko izany dia tahaka ilay ranon''i Noa, ka toy ny nianianako fa tsy hanafotra ny tany intsony ilay ranon''i Noa. Dia toy izany no ianianako fa tsy ho tezitra aminao na hiteny mafy anao intsony Aho.'
mg1865::mg_23::54::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia hifindra aza ny tendrombohitra ary na dia hihetsika aza ny havoana, tsy mba hiala aminao ny famindram-poko, ary tsy hitsoaka ny faneken''ny fihavanako, hoy Jehovah, Mpamindra fo aminao.'
mg1865::mg_23::54::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, ry ory izay afotofoton''ny tafiodrivotra sady tsy manana fampiononana, indro, Izaho handatsaka ny vatonao amin''ny antimony sy hanorina ny fanambaninao amin''ny safira,'
mg1865::mg_23::54::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko robina ny tilikambo madinikao, sy karbonkolo ny vavahadinao, ary vato soa ny faritaninao manodidina.'
mg1865::mg_23::54::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakao rehetra dia ho samy efa nampianarin''i Jehovah, ka dia ho be ny fiadanan''ny zanakao.'
mg1865::mg_23::54::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahamarinana no hampiorenana anao; aza manahy* ny fampahoriana, fa tsy hatahotra ianao, na ny fampahatahorana, fa tsy hanakaiky anao izany. [*Hebreo: Manalavira]'
mg1865::mg_23::54::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia misy miara-mioko aza, dia tsy avy amiko izany; ary na iza na iza miara-mioko hamely anao dia ho tonga hiandany aminao* kosa. [*Na: ho lavo noho ny aminao]'
mg1865::mg_23::54::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho no nahary ny mpanefy izay mifofotra ny afo amin''ny arina ka mahavita fiasana hanaovany ny asany*; Ary Izaho koa no nahary ny mpandringana mba handringana. [*Na: fiadiana araka ny asany]'
mg1865::mg_23::54::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 54
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiadiana rehetra izay voaforona hamelezana anao dia tsy hisy hambinina, ary ny lela rehetra izay miady aminao dia horesenao lahatra. Izany no lovan''ny mpanompon''i Jehovah sy fahamarinany avy amiko, hoy Jehovah.'
mg1865::mg_23::55::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana ny olona rehetra handray ny fahasoavan''Andriamanitra'
  verse_text: 'He! ianareo rehetra izay mangetaheta, mankanesa amin''ny rano! Ary ianareo izay tsy manam-bola, avia, mividia, ka homàna! Eny, avia, mividia divay sy ronono, nefa tsy amim-bola, na amin-karena.'
mg1865::mg_23::55::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianareo no mandany* vola amin''izay tsy hanina, ary ny vokatry ny fisasaranareo amin''izay tsy mahavoky? Mihainoa dia mihainoa Ahy, ka hano izay tsara, dia aoka hiravoravo amin''ny matavy ny fanahinareo. [*Na: mandanja]'
mg1865::mg_23::55::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atongilano ny sofinareo, ka mankanesa aty amiko, mihainoa, dia ho velombelona ny fanahinareo; ary hanao fanekena mandrakizay aminareo Aho, dia ny famindram-po mahatoky nampanantenaina an''i Davida.'
mg1865::mg_23::55::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, nataoko vavolombelona ho an''ny firenena Izy, ho mpanapaka sy komandy amin''ny firenena.'
mg1865::mg_23::55::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, firenena izay tsy fantatrao no hantsoinao, ary firenena izay tsy nahalala Anao no hihazakazaka ho aminao noho ny amin''i Jehovah Andriamanitrao, sy ny Iray Masin''ny Isiraely, fa nomeny voninahitra Ianao.'
mg1865::mg_23::55::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitadiava an''i Jehovah, dieny mbola hita Izy, Miantsoa Azy, dieny mbola akaiky Izy.'
mg1865::mg_23::55::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny ratsy fanahy hahafoy ny lalany, ary ny tsy marina hahafoy ny heviny; ary aoka hiverina ho amin''i Jehovah ireny, fa hamindra fo aminy Izy, Eny, ho amin''Andriamanitsika, fa hamela heloka dia hamela heloka tokoa Izy.'
mg1865::mg_23::55::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fihevitro tsy fihevitrareo ary ny lalanareo kosa tsy mba lalako, hoy Jehovah.'
mg1865::mg_23::55::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny hahavon''ny lanitra noho ny tany no hahavon''ny lalako noho ny lalanareo sy ny fihevitro noho ny fihevitrareo.'
mg1865::mg_23::55::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ny ranonorana sy ny oram-panala milatsaka avy any an-danitra ka tsy miverina any raha tsy efa nahavonto ny tany ka nampaniry* sy nampahavokatra azy, mba hahatonga voa ho an''ny mpamafy sy hanina ho an''ny mpihinana, [*Hebreo: nampiteraka]'
mg1865::mg_23::55::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tahaka izany ny teniko izay aloaky ny vavako: Tsy hiverina amiko foana izy, raha tsy efa mahatanteraka izay sitrako ary ambinina amin''izay ampandehanako azy.'
mg1865::mg_23::55::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny fifaliana no hivoahanareo, ary amin''ny fiadanana no hitondrana anareo; ny tendrombohitra sy ny havoana hahavelona hoby eo alohanareo, ary ny hazo rehetra any an-tsaha hitehatanana.'
mg1865::mg_23::55::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 55
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hazo kypreso haniry ho solon''ny tsilo, ary ny rotra* ho solon''ny sampivato; ary ho anarana ho an''i Jehovah izany, dia ho famantarana mandrakizay izay tsy hesorina. [*myrta]'
mg1865::mg_23::56::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra ny amin''ny fitanana ny marina sy fitandremana ny Sabata, ary toky ho an''ny proselyta sy ny ionoka'
  verse_text: 'Izao no lazain''i Jehovah: Tandremo ny rariny, ary manaova ny marina, fa efa madiva ho tonga ny famonjeko, ary efa hiseho ny fahamarinako.'
mg1865::mg_23::56::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny zanak''olombelona izay manao izany, ary ny zanak''olona izay mitana izany, dia izay mitandrina ny Sabata ka tsy manao azy ho tsy masina sady miaro ny tanany tsy hanao izay ratsy akory.'
mg1865::mg_23::56::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny hafa firenena izay efa manaiky ho an''i Jehovah tsy hanao hoe: Hesorin''i Jehovah tsy ho isan''ny olony tokoa aho; Ary aoka ny ionoka tsy hanao hoe: Indro, hazo maina aho.'
mg1865::mg_23::56::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Ny amin''ny ionoka izay mitandrina ny Sabatako sy mifidy izay sitrako ary mitana ny fanekeko,'
mg1865::mg_23::56::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanaovako fahatsiarovana sy anarana ao an-tranoko sy ao anatin''ny mandako izy, izay tsara lavitra noho ny an''ny zanakalahy sy ny zanakavavy; dia anarana mandrakizay izay tsy hesorina no homeko azy.'
mg1865::mg_23::56::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hafa firenena izay efa manaiky ho an''i Jehovah mba hanompo Azy sy ho tia ny anaran''i Jehovah mba ho mpanompony dia izay rehetra mitandrina ny Sabata ka tsy manao azy ho tsy masina sady mitana ny fanekeko'
mg1865::mg_23::56::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho entiko ho any an-tendrombohitro masina, ka hampifaliko ao an-tranoko fivavahana; ny fanatitra dorany sy ny fanatitra hafa alatsa-drà dia hankasitrahana eo ambonin''ny alitarako, fa ny tranoko hatao hoe trano fivavahana ho an''ny firenena rehetra.'
mg1865::mg_23::56::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo, Izay mamory ny Isiraely voaroaka: Mbola hamory ny sasany koa ho eo aminy Aho, hanampy izay efa voavory eo aminy.'
mg1865::mg_23::56::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny nahadiso ny lehiben''ny Isiraely, sy ny nataon''ny olona koa'
  verse_text: 'He, ianareo bibi-dia rehetra! Avia hihinana, ianareo biby rehetra any an''ala*. [*Na: He, ianareo bibi-dia rehetra, Avia hihinana ny biby rehetra any an''ala]'
mg1865::mg_23::56::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jamba ny mpitiliny, samy tsy mahalala izy rehetra, amboa moana avokoa, izy rehetra, ka tsy mahavovo, manonofy izy, eny, mandry ka torimaso.'
mg1865::mg_23::56::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lian-kanina ireny amboa ireny; ka tsy mahalala voky, sady mpiandry tsy mahafantatra ireny; samy efa nivily ho amin''ny lalany avy izy rehetra, samy mankamin''ny filàny harena avokoa izy rehetra.'
mg1865::mg_23::56::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 56
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, ianareo, hoy ireny fa haka divay aho, ary aoka hiboboka toaka isika; ary rahampitso dia ho tahaka ny anio ihany, eny, hanoatra lavitra aza'
mg1865::mg_23::57::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maty ny marina, nefa tsy misy misaina izany, ary alaina ny olona tsara fanahy, nefa tsy misy mihevitra fa ny marina dia alaina tsy ho azon''ny loza hanjo*. [*Na: noho ny ratsy]'
mg1865::mg_23::57::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miditra amin''ny fiadanana izy, mandry amin''ny fandriany avy izy, dia izay rehetra mizotra amin''ny hitsiny.'
mg1865::mg_23::57::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa dia mankanesa ety, ry zanaky ny mpanandro, ianareo taranaky ny mpaka vadin''olona sy ny mpijangajanga.'
mg1865::mg_23::57::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no ihomehezanareo? Iza no isanasananareo vava sy itrangatranganareo lela? Tsy taranaky ny fiodinana va ianareo sady taranaky ny lainga*? [*Na: zanaky ny fijangajangana]'
mg1865::mg_23::57::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ianareo izay mahamaimay ny fonareo amin''ny hazo terebinta* eny ambanin''ny hazo maitso rehetra, ka mamono zaza eny an-dohasahan-driaka eny ambanin''ny tsefatsefaky ny harambato. [*Na: amin''ny sampy]'
mg1865::mg_23::57::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''ny vato kilonjy any an-dohasahan-driaka no anjaranao, eny, ireny ihany no anjaranao; ireny koa no nanidinanao fanatitra aidina sy nanateranao fanatitra hohanina. Hahatsindry fo amin''izany va Aho?'
mg1865::mg_23::57::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo an-tampon''ny tendrombohitra avo sy manerinerina no nametrahanao ny fandrianao, ka tany no niakaranao hamono zavatra natao fanatitra.'
mg1865::mg_23::57::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo ivohon''ny varavarana sy ny tolam-baravarana no nametrahanao ny fampahatsiarovana anao; fa lavitra Ahy no nitanjahanao sy niakaranao, eny, nataonao malalaka ny fandrianao, ary nanao fanekena ny amin''izay hataon''ireny ianao; tia ny fandriana aminy ianao ka nizaha toerana ho anao*. [*Na: Ary nojerenao ny famantarana (Hebreo: tanana)]'
mg1865::mg_23::57::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivezivezy nankany amin''ny mpanjaka ianao nitondra* diloilo, ary nataonao betsaka ny zava-manitrao, sady nampandehanina hatrany lavitra any ny irakao, ka nidina** hatrany amin''ny fiainan-tsy hita*** ianao. [*Na: nihosotra] [**Na: nietry] [***Hebreo: Sheola]'
mg1865::mg_23::57::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny halavitry ny nalehanao dia sasatra ianao, nefa ianao tsy niteny hoe: kivy aho izany! Nahazo aina ny tananao, ka dia tsy nahatsiaro reraka ianao.'
mg1865::mg_23::57::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no nahinao sy natahoranao, no dia nandainga ianao ka tsy nahatsiaro ahy na nandatsaka am-po? Moa tsy efa nangina va Aho hatrizay hatrizay? Ka dia tsy natahotra Ahy ianao.'
mg1865::mg_23::57::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no hanambara ny fahamarinanao ary ny asanao dia tsy hahasoa anao.'
mg1865::mg_23::57::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitaraina ianao, dia aoka ireo maronao no hamonjy anao, nefa hongahan''ny rivotra avokoa ireo sy ho lasan''ny tso-drivotra malemilemy aza; Fa izay mialoka amiko kosa no hanana ny tany sy handova ny tendrombohitro masina.'
mg1865::mg_23::57::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy hilaza hoe: Manandrata, eny, manandrata ka manamboara lalana, esory izay mahatafintohina eny amin''ny alehan''ny oloko.'
mg1865::mg_23::57::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''ny Iray avo sy manerinerina, izay monina mandrakizay, masina no anarany: Ao amin''ny fitoerana avo sy masina no onenako, ary ao amin''ny torotoro fo sy ny manetry tena, hamelombelona ny fanahin''ny manetry tena sy hamelombelona ny fon''ny torotoro fo;'
mg1865::mg_23::57::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hifandahatra mandrakariva Aho ary tsy ho tezitra mandrakizay; Fandrao ho reraka eo anatrehako ny fanahy, dia ny aina* izay nataoko. [*Hebreo: fofonaina]'
mg1865::mg_23::57::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny helony noho ny fieremany no nahatezitra Ahy ka namelezako azy; fa niery Aho, satria tezitra, nefa niodina izy ka mbola nandroso tamin''ny lalana tian''ny fony ihany.'
mg1865::mg_23::57::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahita ny lalany Aho, nefa hahasitrana azy ihany, dia hitari-dalana azy Aho ka hampody ny fiononana ho aminy sy ho amin''ny malahelo ao aminy,'
mg1865::mg_23::57::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Izaho Izay mahary ny vokatry ny molotra: Fiadanana, fiadanana ho an''izay lavitra sy ho an''izay akaiky! hoy Jehovah, ka dia hahasitrana azy Aho.'
mg1865::mg_23::57::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ratsy fanahy dia tahaka ny ranomasina misamboaravoara, eny, tsy mety tafatoetra izy, ka ny ranony dia mamoaka loto sy fotaka.'
mg1865::mg_23::57::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 57
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fiadanana ho an''ny ratsy fanahy, hoy Andriamanitro.'
mg1865::mg_23::58::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fivavahana marina, sy ny fivavahana tsy izy'
  verse_text: 'Ezaho ny fiantsonao, fa aza atao malemy, Asandrato ny feonao ho tahaka ny an''ny anjomara, ka ambarao amin''ny oloko ny fahadisoany Ary amin''ny taranak''i Jakoba ny fahotany;'
mg1865::mg_23::58::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izaho mbola tadiaviny ihany isan''andro isan''andro, ary ny hahalala ny lalako no sitrany. Tahaka ny firenena efa nanao ny marina ka tsy nahafoy ny fitsipik''Andriamaniny no fanontaniany amiko ny fitsipiky ny fahamarinana, sy aniriany ny hihavian*''Andriamanitra. [*Na: Sy fifaliany hanakaiky an'']'
mg1865::mg_23::58::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana izahay no mifady, hoy izy, nefa tsy hitanao ? Ary nahoana izahay no mampahory ny tenanay, nefa tsy ahoanao? Indro fa amin''ny andro fifadianareo aza dia mbola ny tianareo* ihany no ataonareo, ary ny mpiasa rehetra ao aminareo dia ampahorinareo*. [*Hebreo: hitanareo] [**Na: Ary mbola arosonareo fatratra ihany sy asanareo]'
mg1865::mg_23::58::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny hiady sy ny hifanditra no anton''ny ifadianareo ary ny hamely amin''ny totohondrin''ny faharatsiana; Izao fifadianareo izao dia tsy andrenesana ny feonareo any amin''ny avo.'
mg1865::mg_23::58::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa fifadiana toy izany va no ankasitrahako? Dia andro hampahorian''ny olona tena? Ny hampiondrika ny lohany tahaka ny zozoro sy ny hamelatra lamba fisaonana rarahan-davenona ho fandriany, moa izany va no ataonao hoe fifadiana sy andro ankasitrahan''i Jehovah?'
mg1865::mg_23::58::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izao va no fifadiana izay ankasitrahako: Dia ny hamaha ny famatoran''ny faharatsiana, sy hanaboraka ny fehin''ny zioga, sy handefa ny ampahorina ho afaka, ary hanapatapaka ny zioga rehetra?'
mg1865::mg_23::58::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy ny hizara ny mofonao ho an''ny noana va, sy ny hampiantrano ny ory manjenjena, ary mba hanafianao izay hitanao mitanjaka, ka tsy hihirim-belona amin''ny namanao* ianao? [*Hebreo: hiery ny nofonao]'
mg1865::mg_23::58::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izany, dia hiposaka tahaka ny fahazavan''ny maraina ny fahazavanao, ary ho tonga faingana ny fahasitrananao; ny fahamarinanao ho loha-lalanao, ary ny voninahitr''i Jehovah ho vodi-lalanao'
mg1865::mg_23::58::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia hiantso ianao, ary Jehovah hamaly; Eny, hanandratra ny feonao ianao, ary Izy hanao hoe: Inty Aho. Raha esorinao tsy ho eo aminao ny zioga sy ny fanondroan''ny fanondro sy ny fitenenan-dratsy,'
mg1865::mg_23::58::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary afoinao ho an''ny noana izay hanina tianao, ka mahavoky ny ory ianao, dia hiposaka ao amin''ny maizina ny fahazavanao, ary ny aizim-pitonao ho tahaka ny mitataovovonana;'
mg1865::mg_23::58::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hitari-dalana anao mandrakariva sady hahavoky ny fanahinao ao amin''ny tany karankaina aza sy hampahatanjaka ny taolanao; dia ho tahaka ny saha vonton-drano ianao sy ho tahaka ny loharanao miboiboika izay tsy mety ritra.'
mg1865::mg_23::58::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay taranakao no hanangana ny efa rava ela, ary ny naorina hatry ny fony fahagola no hamboarinao; ary ianao dia hatao hoe mpamboatra ny rava, mpamelon-dalana honenana amin''ny tany.'
mg1865::mg_23::58::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miaro ny tongotrao amin''ny Sabata ianao ka tsy manao izay tianao amin''ny androko masina, ary manao ny Sabata hoe Fahafinaretana, ary ny nohamasinin''i Jehovah hoe mendrika hohajaina, ka manome voninahitra azy* ary tsy mandeha amin''ny lalanao, na manao izay tianao, na miteniteny foana, [*Na: Azy]'
mg1865::mg_23::58::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 58
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiravoravo amin''i Jehovah ianao, ary hasandratro ao amin''ny havoana amin''ny tany ianao, sy hofahanako amin''ny lovan''i Jakoba rainao; Fa ny vavan''i Jehovah no efa niteny.'
mg1865::mg_23::59::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny ota, izay efitra fisarahana, sy ny fandravana azy'
  verse_text: 'Indro, ny tanan''i Jehovah tsy fohy, fa mahavonjy, ary ny sofiny tsy lalodalovana, fa mahare;'
mg1865::mg_23::59::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny helokareo no efitra mampisaraka anareo amin''Andriamanitrareo, ary ny fahotanareo no mampiafina ny tavany aminareo, ka dia tsy mihaino Izy.'
mg1865::mg_23::59::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tananareo dia voaloto amin''ny rà, ary ny rantsan-tananareo amin''ny heloka; ny molotrareo miteny lainga, ny lelanareo mibedibedy faharatsiana.'
mg1865::mg_23::59::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mitory olona araka ny fahamarinana, na mandahatra ny rariny araka izay mahatoky; matoky ny tsy izy sy miteny zava-poana izy; Torontoronina fampahoriana izy ka miteraka fandozana.'
mg1865::mg_23::59::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikotrika ny atodin''ny menarana izy ary manenona ny tranon-kala; Izay homana ny atodin''ireny dia ho faty, fa raha poritra iny, dia menarana no miporitsaka avy ao.'
mg1865::mg_23::59::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tranon-kalany tsy azo atao fitafiana, ary ny asany tsy mahatafy azy; ny asany dia asa fampahoriana, ary asan-doza no eo an-tanany.'
mg1865::mg_23::59::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongony miriotra ho amin''ny ratsy sy mimaona handatsaka rà marina; ny fisainany dia fisainana fampahoriana, fandravana sy fandringanana no eo amin''ny alehany.'
mg1865::mg_23::59::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''ny fiadanana tsy fantany; ary tsy misy rariny ao amin''ny alehany; lalana miolakolaka ny lalany, ka na iza na iza mandia izany dia tsy mahita fiadanana.'
mg1865::mg_23::59::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia lavitra antsika ny rariny, ary ny fahamarinana tsy mahatratra antsika; miandry ny mazava isika, nefa indro ny maizina, ary fahazavana, fa mbola ao amin''ny aizim-pito ihany no andehanantsika.'
mg1865::mg_23::59::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsapatsapa manara-drindrina tahaka ny jamba isika eny, mitsapatsapa tahaka ny tsy mana-maso; tafintohina amin''ny mitataovovonana tahaka ny amin''ny maizimaizina isika, ary eo amin''ny matanjaka* dia tahaka ny maty isika. [*Na: any an''efitra]'
mg1865::mg_23::59::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isika rehetra mampierona tahaka ny bera ary mitoloko tokoa tahaka ny voromailala; miandry ny rariny isika, nefa tsy misy, ary ny famonjena, nefa lavitra antsika izany.'
mg1865::mg_23::59::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa betsaka eo anatrehanao ny fiodinanay, ary ny fahotanay miampanga anay; eny, tsaroanay ny fahadisoanay, ary ny helokay dia fantatray,'
mg1865::mg_23::59::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny miodina sy ny mandà an''i Jehovah, ary ny miala amin''ny fanarahana an''Andriamanitray, ny miteny fampahoriana sy fikomiana, ary ny mamorona* sy mamoaka teny lainga avy ao am-po. [*Hebreo: torontoronina]'
mg1865::mg_23::59::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahemotra ny rariny, ary mijanon-davitra ny hitsiny; fa tafintohina eny an-kalalahana ny fahamarinana, ary ny hitsim-po tsy mahazo miditra.'
mg1865::mg_23::59::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tsy eo ny fahamarinana; ary izay mifady ny ratsy dia hoatra ny manolo-tena hobabon''ny sasany. Ary hitan''i Jehovah ny tsy fisian''ny rariny, ka nataony fa ratsy izany;'
mg1865::mg_23::59::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hitany fa tsy nisy olona, sady talanjona Izy, satria tsy nisy mpanalalana, ka dia ny sandriny ihany no nanao famonjena ho Azy, ary ny fahamarinany no nanohana Azy.'
mg1865::mg_23::59::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niakanjo fahamarinana tahaka ny akanjo fiarovan-tratra Izy, ary fiarovan-doha famonjena no teo amin''ny lohany; ary niakanjo ny akanjo famaliana Izy eny, nandray ny fahasaro-piaro ho akanjo ivelany Izy.'
mg1865::mg_23::59::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny asa natao no hamaliany, dia fahatezerana mirehitra ho an''ny fahavalony, famaliana ho an''ny rafiny; ary ny nosy dia hovaliany tokoa.'
mg1865::mg_23::59::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatrany andrefana dia hatahotra ny anaran''i Jehovah ny olona ary ny voninahiny hatramin''ny fiposahan''ny masoandro; ary ny fihaviny dia ho toy ny rano maria, Ampandehanin''ny Fanahin''i Jehovah*. [*Na: Fa raha avy toy ny ony ny fahavalo. Ny Fanahin''i Jehovah hanangana faneva hisakana azy]'
mg1865::mg_23::59::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hisy Mpanavotra ho tonga any Ziona, Ho amin''ny Jakoba izay miala amin''ny fahadisoana, hoy Jehovah.'
mg1865::mg_23::59::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 59
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha Izaho, dia izao no fanekeko aminy, hoy Jehovah: Ny Fanahiko Izay ao aminao sy ny teniko izay nataoko teo am-bavanao dia tsy hiala amin''ny vavanao, na amin''ny vavan''ny taranakao, na amin''ny vavan''ny taranaky ny taranakao, hatramin''izao ka ho mandrakizay, hoy Jehovah.'
mg1865::mg_23::60::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny ho voninahitr''i Jerosalema amin''ny andro ho avy'
  verse_text: 'Mitsangàna, mihazavà, fa tonga ny fahazavanao, ary ny voninahitr''i Jehovah efa miposaka aminao.'
mg1865::mg_23::60::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ny aizina manarona ny tany, ary ny aizim-pito manarona ny firenena; fa aminao kosa no iposahan''i Jehovah, ary aminao no isehoan''ny voninahiny.'
mg1865::mg_23::60::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenena manatona ny fahazavanao, ary ny mpanjaka mankeo amin''ny famirapiratan''ny fiposahanao.'
mg1865::mg_23::60::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atopazy manodidina ny masonao ka jereo! Izy rehetra dia mivory ka mankaty aminao; Ny zanakao-lahy dia avy lavitra, ny zanakao-vavy dia sakelehina.'
mg1865::mg_23::60::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hahita izany ianao ka ho miramirana, dia hiemponempona sady hohalehibiazina ny fonao; fa ho entina ho anao ny haren''ny ranomasina, ary hafindra ho anao ny fananan''ny firenena.'
mg1865::mg_23::60::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho feno ny rameva betsaka ao aminao, dia ny rameva tanora avy any Midiana sy Efaha, samy avy any Sheba izy rehetra; volamena sy ditin-kazo mani-pofona no ho entiny, ary ny fiderana an''i Jehovah no teny mahafaly hambarany.'
mg1865::mg_23::60::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ondry aman''osy rehetra any kedara dia hangonina ho ao aminao, ary ny ondrilahin''i Nebaiota hanompo anao; hiakatra amin''ny fankasitrahana ho eo ambonin''ny alitarako ireo, ary hataoko be voninahitra ny tranon''ny voninahitro.'
mg1865::mg_23::60::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa ireto manidina tahaka ny rahona ary tahaka ny voromailala ho amin''ny varavarankeliny?'
mg1865::mg_23::60::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho no andrasan''ny nosy, ary ny sambon''i Tarsisy ho loha-lalana, Hitondra ny zanakao avy lavitra mbamin''ny volafotsiny sy ny volamenany, ho an''ny anaran''i Jehovah Andriamanitrao sy ho an''ny Iray Masin''ny Isiraely, Satria efa nanome voninahitra anao Izy.'
mg1865::mg_23::60::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hafa firenena no hanangana ny mandanao, ary ny mpanjakany hanompo anao; fa tamin''ny fahatezerako no namelezako anao. Ary amin''ny fitiavako kosa no amindrako fo aminao,'
mg1865::mg_23::60::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hidanadana mandrakariva ny vavahadinao, tsy hirindrina izy na andro na alina, hampidirana ny haren''ny firenena sy ny mpanjakany izay efa voababo ho ao aminao.'
mg1865::mg_23::60::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho levona izay firenena sy fanjakana tsy hanompo anao; eny, ireny firenena ireny hofongorana tokoa.'
mg1865::mg_23::60::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voninahitr''i Libanona ho tonga aminao, ny hazo kypreso sy ny pina ary ny bokso koa handravahana ny fitoerako masina, ary hasiako voninahitra ny fitoeran-tongotro.'
mg1865::mg_23::60::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanak''izay nampahory anao dia handeha hiondrika eo anatrehanao, ary hiankohoka amin''ny faladianao izay rehetra nanamavo anao; ary izy hanao anao hoe Tanànan''i Jehovah, Zionan''ny Iray Masin''ny Isiraely.'
mg1865::mg_23::60::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho solon''ny nahafoizana anao sy ny nankahalana anao ary ny tsy nandehanan''olona namaky anao, dia hasandratro ho rehareha mandrakizay ianao, eny, ho fifaliana hatramin''ny taranaka fara mandimby.'
mg1865::mg_23::60::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hinono amin''ny jentilisa ianao sady hinono amin''ny mpanjaka; ka dia ho fantatrao fa Izaho Jehovah no Mpamonjy anao, ary Ilay Maherin''i Jakoba no Mpanavotra anao.'
mg1865::mg_23::60::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatonga volamena Aho ho solom-barahina, ary hahatonga volafotsy ho solom-by, ary varahina ho solon-kazo, ary vy ho solom-bato; ny fiadanana no hataoko fanapahana anao, ary ny fahamarinana no ho mpampiasa anao*. [*Na: Hataoko fiadanana ny fanapahana anao ary fahamarinana ny mpampiasa anao]'
mg1865::mg_23::60::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fampahoriana tsy ho re eo amin''ny taninao intsony, na ny fandravana sy ny fandringanana ao anatin''ny faritaninao; ny mandanao dia hataonao hoe Famonjena, ary ny vavahadinao hataonao hoe Fiderana.'
mg1865::mg_23::60::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny masoandro intsony no ho fanazavana anao nony andro; ary tsy ny fangarangaran''ny volana no hanazava anao; fa Jehovah no ho fanazavana anao mandrakizay, ary Andriamanitrao no ho voninahitrao.'
mg1865::mg_23::60::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hilentika intsony ny masoandronao, ary ny volanao tsy hisoka; fa Jehovah no ho fanazavana anao mandrakizay, ary ho tapitra ny andro fahalahelovanao.'
mg1865::mg_23::60::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olonao rehetra ho marina avokoa; hanana ny tany ho mandrakizay izy, eny, ho voly maitso eo amin''ny sahako. Asan''ny tanako ho fampisehoam-boninahitra.'
mg1865::mg_23::60::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 60
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kely ho tonga arivo, ary ny malemy ho tonga firenena mahery; Izaho Jehovah no hanafaingana izany amin''ny fotoany.'
mg1865::mg_23::61::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Voahosotr''i Jehovah, Izay hanavotra ny Isiraely sy hampody ny voninahiny.'
  verse_text: 'Ny Fanahin''i Jehovah Tompo no ato amiko, Satria Jehovah efa nanosotra ahy hitory teny soa mahafaly amin''ny mpandefitra, efa naniraka Ahy hahasitrana* ny torotoro fo Izy, ary hitory fanafahana amin''ny babo sy hamoaka ny ao an-trano-maizina ho amin''ny mazava, [*Hebreo: hamehy]'
mg1865::mg_23::61::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitory taona ankasitrahan''i Jehovah sy andro famalian''Andriamanitsika, hampionona ny malahelo rehetra,'
mg1865::mg_23::61::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanolotra ho an''ny malahelo ao Ziona, eny, hanome azy hamama ho solon''ny lavenona, sy diloilo fifaliana ho solon''ny fahalahelovana, ary fitafiana fiderana ho solon''ny fanahy reradreraka, mba hanaovana azy hoe Hazon''ny fahamarinana, nambolen''i Jehovah ho fampisehoam-boninahitra.'
mg1865::mg_23::61::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hatsangana ny efa rava hatry ny fony fahagola, ary hamboarina ny efa lao hatramin''ny fahiny, dia hohavaozina indray ny tanàna rava, Izay efa lao hatramin''ny taranaka lasa ela.'
mg1865::mg_23::61::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahiny honina ao ka hiandry ny ondry aman''osinareo, ary ny hafa firenena ho mpiasa tany sy ho mpamboatra tanim-boaloboka ho anareo,'
mg1865::mg_23::61::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa no hatao hoe mpisoron''i Jehovah, Mpanao fanompoam-pivavahana ho an''Andriamanitsika no hilazana anareo ; ho lasanareo* ny haren''ny firenena, ary handimby voninahitra azy ianareo**. [*Hebreo: Hohaninareo] [**Na: Ary ho reharehanareo sy voninahiny]'
mg1865::mg_23::61::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny henatrareo hosoloana avy roa heny, ary ny tondromaso hosoloana hoby amin''ny anjara-lovany; ary noho izany dia hahazo indroa heny ao amin''ny taniny izy, fifaliana mandrakizay no ho azy.'
mg1865::mg_23::61::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho Jehovah dia tia rariny; halako ny fandrombahana amin''ny faharatsiana; homeko ny valin''asany amin''ny fahamarinana izy, ary fanekena mandrakizay no hataoko aminy. [*Na: Halako ny halatra atao fanatitra odorana]'
mg1865::mg_23::61::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranany ho fantatra any amin''ny jentilisa ary ny terany any amin''ny firenena; Izay rehetra mahita azy dia hahafantatra azy ho taranaka notahin''i Jehovah.'
mg1865::mg_23::61::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifaly dia hifaly amin''i Jehovah aho, ny fanahiko ho ravoravo amin''Andriamanitro; fa notafiany fitafiana famonjena aho, ary nakanjoiny akanjo fahamarinana, toy ny mpampakatra misatroka hamama tahaka ny mpisorona, ary toy ny ampakarina miravaka ny firàvany.'
mg1865::mg_23::61::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 61
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny tany mampitsimoka izay ao aminy, ary tahaka ny tanimboly mampaniry izay nafafy tao aminy, dia toy izany no hampisehoan''i Jehovah Tompo fahamarinana sy fiderana eo anatrehan''ny firenena rehetra.'
mg1865::mg_23::62::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handrosoan''ny voninahitr''i Jerosalema'
  verse_text: 'Tsy hangina Aho noho ny amin''i Ziona, Ary tsy hitsaha-miteny Aho noho ny amin''i Jerosalema, mandra-piposaky ny fahamarinany tahaka ny famirapiratry ny mazava, ary ny famonjena azy tahaka ny fanilo mirehitra.'
mg1865::mg_23::62::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenena hahita ny fahamarinanao, ary ny mpanjaka rehetra hahita ny voninahitrao; dia homena anaram-baovao ianao, Izay hotononin*''ny vavan''i Jehovah; [*Hebreo: hotendren'']'
mg1865::mg_23::62::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho tonga satro-boninahitra eo an-tanany ianao sy satrok''andriana eo am-pelatanan''Andriamanitrao.'
mg1865::mg_23::62::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao tsy hatao intsony hoe nafoy, ary ny taninao tsy hatao intsony hoe Lao fa ianao hatao hoe Ilay sitrako, ary ny taninao hatao hoe Vady ampakarina; Fa sitrak''i Jehovah ianao, ary ny taninao hampanambadina.'
mg1865::mg_23::62::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny zatovo mampakatra virijina ho vadiny no hampakaran''ny mponina aminao* anao; ary tahaka ny fifalian''ny mpampakatra amin''ny ampakariny no hifalian''Andriamanitrao aminao. [*Hebreo: zanakao-lahy]'
mg1865::mg_23::62::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanendry mpiambina ho eny ambonin''ny mandanao Aho, ry Jerosalema o, koa mandrakariva na andro na alina dia tsy mahazo mangina ireny; eny, ianareo izay mpampahatsiaro an''i Jehovah, aza mitsahatra;'
mg1865::mg_23::62::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mamela Azy hitsahatra mandra-panaony an''i Jerosalema ho mafy orina sy hoderaina amin''ny tany.'
mg1865::mg_23::62::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nianiana tamin''ny tanany ankavanana, dia tamin''ny sandriny mahery, hoe: Tsy homeko hohanin''ny fahavalonao intsony ny varinao, ary ny hafa firenena tsy hisotro ny ranom-boalobokao izay efa nisasaranao;'
mg1865::mg_23::62::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay nijinja azy no hihinana azy ka hidera an''i Jehovah; ary izay nioty azy no hisotro azy ao amin''ny kianjako masina.'
mg1865::mg_23::62::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoaha, mivoaha amin''ny vavahady, amboary ny lalana halehan''ny olona; Asandrato ho avo ny lalambe; Esory ny vato eny aminy; Manangàna faneva ho tazan''ny firenena.'
mg1865::mg_23::62::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Jehovah efa nanambara hatrany amin''ny faran''izao tontolo izao nanao hoe: Lazao amin''i Ziona zanakavavy: Indro, avy ny famonjena anao; Indro; ny valim-pitia hatolony dia ao aminy, ary ny valin''asa homeny dia eo anoloany.'
mg1865::mg_23::62::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 62
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ireny hotononina hoe Firenena masina, dia olona navotan''i Jehovah; ary ianao dia hatao hoe Ilay notadiavina, Tanàna tsy foy.'
mg1865::mg_23::63::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hamaliana an''i Edoma sy ny jentilisa sasany koa'
  verse_text: 'Iza moa Ity avy any Edoma, dia avy any Bozra, ka mena mangatrakatraka ny fitafiany, dia Ity Izay mareva-pitafiana sy miandranandrana amin''ny haben ny heriny? Izaho Izay mitory fahamarinana sady manan-kery hamonjy.'
mg1865::mg_23::63::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mena ny fitafianao, ary ny akanjonao no tahaka ny an''izay manosihosy ny famiazam-boaloboka?'
mg1865::mg_23::63::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanosihosy ny famiazam-boaloboka irery Aho; fa tsy mba nisy niaraka tamiko ny avy tamin''ny firenena na dia iray akory aza; nanitsaka ireny tamin''ny fahatezerako Aho sy nanosihosy azy tamin''ny fahavinirako, dia nipitipitihan''ny ràny ny fitafiako, ka voalotoko ny akanjoko rehetra.'
mg1865::mg_23::63::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa ato am-poko ny andro hamaliako, ary tonga ny taonan''ny voavotro.'
mg1865::mg_23::63::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitsinjo Aho, nefa tsy nisy hamonjy, ary talanjona Aho, satria tsy nisy hanohana, ka dia ny sandriko ihany no nanao famonjena ho Ahy, ary ny fahavinirako no nanohana Ahy.'
mg1865::mg_23::63::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanitsaka firenena tamin''ny fahatezerako Aho sady nampahaleony azy tamin''ny fahavinirako ary nandatsaka ny ràny tamin''ny tany.'
mg1865::mg_23::63::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Fivavahana sy fiaiken-keloka ary fiderana noho ny famonjen''Andriamanitra hatramin''ny taloha'
  verse_text: 'Ny famindram-pon''i Jehovah no hambarako, dia ny fiderana an''i Jehovah araka izay rehetra nataony tamintsika sy ny haben''ny fahasoavana tamin''ny taranak''Isiraely. Izay nomeny azy araka ny fiantrany sy araka ny haben''ny famindram-pony.'
mg1865::mg_23::63::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy: Oloko tokoa ireo, dia zanaka tsy mba handainga; ka dia tonga Mpamonjy azy Izy.'
mg1865::mg_23::63::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny fahoriany rehetra dia niory koa Izy, ary Ilay Anjelin''ny tavany no namonjy ireo; ny fitiavany sy ny famindram-pony no nanavotany azy sy nivimbinany azy ary nitondrany azy tamin''ny andro taloha ela rehetra.'
mg1865::mg_23::63::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo kosa dia niodina ka nanome alahelo ny Fanahy Masiny; dia tonga fahavalony Izy ka niady taminy.'
mg1865::mg_23::63::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olony dia nahatsiaro ny andro taloha ela, dia ny tamin''i Mosesy. Aiza Ilay nitondra azy mbamin''ny mpiandry ondriny niakatra avy tamin''ny ranomasina? Aiza Ilay nametraka ny Fanahy Masiny tao aminy,'
mg1865::mg_23::63::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay nampandeha ny sandriny be voninahitra teo ankavanan''i Mosesy ka nampisaraka ny ranomasina teo anoloany, mba hanaovany anarana mandrakizay ho Azy,'
mg1865::mg_23::63::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay nitondra azy nita ny rano lalina, tahaka ny fandehan''ny soavaly eny an-tany lemaka, ka tsy tafintohina izy?'
mg1865::mg_23::63::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fidinan''ny biby fiompy ho any an-dohasaha no nanomezan''ny Fanahin''i Jehovah fitsaharana ho azy: Tahaka izany no nitondranao ny olonao, Mba hanaovana anarana be voninahitra ho Anao.'
mg1865::mg_23::63::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsinjova eny an-danitra, ary mijere eny amin''ny fonenan''ny fahamasinanao sy ny voninahitrao; aiza ny fahasaro-piaronao sy ny asanao lehibe? Ny fandevilevin''ny kibonao sy ny famindram-ponao dia voasakana tsy ho amiko.'
mg1865::mg_23::63::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Ianao no Rainay, fa Abrahama tsy mahalala anay, Ary Isiraely tsy mahafantatra anay, Jehovah o, Ianao no Rainay, ary Mpanavotra anay no anaranao hatrizay hatrizay.'
mg1865::mg_23::63::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, nahoana no nampiala anay tamin''ny lalanao Ianao ka nampaniasia anay sady nanamafy ny fonay tsy hatahotra Anao? Miverena noho ny amin''ny mpanomponao, dia ny firenena lovanao.'
mg1865::mg_23::63::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vetivety foana no nananan''ny olonao masina ny tany; ny fahavalonay efa nanitsaka ny fitoeranao masina.'
mg1865::mg_23::63::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 63
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tonga hoatra izay tsy notapahinao hatrizay hatrizay izahay sady tsy mba nantsoina tamin''ny anaranao akory. Enga anie ka hotriarinao ny lanitra mba hidinanao, ka hihorohoro* eo anoloanao ny tendrombohitra, [*Na: hiempo]'
mg1865::mg_23::64::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka ny fandevon''ny afony tapa-kazo maina sy ny fampangotraky ny afo ny rano mba hampahafantatra ny fahavalonao ny anaranao ka hangovitra eo anoloanao ny jentilisa.'
mg1865::mg_23::64::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanao zava-mahatahotra izay tsy nantenainay Ianao, dia nidina, ka nihorohoro* teo anoloanao ny tendrombohitra.'
mg1865::mg_23::64::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatrizay hatrizay dia tsy mbola ren''ny olona, na nohenoiny, Na hitan''ny masony, Izay Andriamanitra miasa ho an''ny miandry Azy afa-tsy Ianao. [*Na: niempo]'
mg1865::mg_23::64::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsena* izay mifaly hanao ny marina Ianao, dia izay mahatsiaro Anao amin''ny lalanao; indro, Ianao dia tezitra, ary hita fa meloka** izahay; Hatramin''ny ela dia izany no toetray, ka dia hovonjena va? [*Na: Miantra] [**Na: ary efa nanota]'
mg1865::mg_23::64::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy efa tahaka ny olo-maloto izahay rehetra, ary tahaka ny lamba mihosin-drà ny fahamarinanay rehetra; Malazo tahaka ny ravina izahay rehetra, ary ny helokay mipaoka anay tahaka ny rivotra,'
mg1865::mg_23::64::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy miantso ny anaranao, na mifoha hifikitra aminao; fa efa nanafina ny tavanao taminay Ianao ka nandevona anay noho ny helokay.'
mg1865::mg_23::64::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, Jehovah o, rainay Ianao; izahay dia tanimanga, ary Ianao no mpanefy anay, ary asan''ny tananao izahay rehetra.'
mg1865::mg_23::64::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza dia tezitra mafy loatra, Jehovah o. Ary aza dia mahatsiaro heloka mandrakizay; masina Ianao, tsinjovy, fa olonao izahay rehetra.'
mg1865::mg_23::64::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga efitra ireo tanànanao masina, Eny, tany lavavolo Ziona, ary efa lao Jerosalema.'
mg1865::mg_23::64::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tranonay masina sady mendrika, Izay nideran''ny razanay Anao, dia voadotry ny afo, ary rava ny zavatray mahafinaritra rehetra.'
mg1865::mg_23::64::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 64
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola mahatsindry fo amin''izany zavatra izany ihany va Ianao, Jehovah o? Hangina va Ianao ka hampahory anay mafy loatra?'
mg1865::mg_23::65::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 1
  verse_date_revised: '2022-10-24T04:41:32+0000'
  verse_title: 'Ny fandavan''i Jehovah ny maro noho ny fanao tsy marina narahiny, sy ny fitahiana kasainy ho amin''ny mibebaka'
  verse_text: 'Notadiavin''izay tsy naniry Aho sy hitan''izay tsy nitady; hoy Izaho tamin''ny firenena izay tsy nantsoina tamin''ny anarako: Inty Aho! Inty Aho!'
mg1865::mg_23::65::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namelatra ny tanako mandritra ny andro Aho tamin''ny firenena miodina, izay mandeha amin''ny lalana tsy tsara araka ny fisainany ihany,'
mg1865::mg_23::65::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia firenena izay nahatezitra ahy mandrakariva na dia eo imasoko aza, izay mamono zavatra hatao fanatitra eo amin''ny tanimboly Ary mandoro ditin-kazo manitra eny ambonin''ny tanimanga,'
mg1865::mg_23::65::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay mipetraka any amin''ny fasana ary mitoetra mandritra ny alina ao am-pierena, sady mihinana henan-kisoa, ary ny ron''ny hena fahavetavetana no ao amin''ny loviany,'
mg1865::mg_23::65::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao hoe: Mihataha, fa aza manakaiky ahy, fa izaho no masina, fa tsy ianao, ireny dia setroka ao am-bavoroko, eny, afo mirehitra mandritra ny andro.'
mg1865::mg_23::65::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izao no voasoratra eo anatrehako: Tsy hangina Aho mandra-pamaliko anareo* eny, mandra-pamaliko ho ao an-tratranareo** [*Hebreo: azy] [**Hebreo: tratrany]'
mg1865::mg_23::65::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny helokareo sy ny heloky ny razanareo koa, hoy Jehovah, dia izay olona nandoro ditin-kazo manitra teny an-tendrombohitra ary nihaika Ahy teny amin''ny havoana; eny, hamatra ny valin''ny asany ho ao an-tratrany Aho aloha.'
mg1865::mg_23::65::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Tahaka ny ranom-boaloboka hita ao antsampahony ka ataon''ny olona hoe: Aza simbana, fa misy fitahiana ao anatiny dia toy izany no hataoko noho ny amin''ny mpanompoko, ka tsy hanimba azy rehetra Aho.'
mg1865::mg_23::65::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatonga taranaka avy amin''i Jakoba Aho sy mpandova ny tendrombohitro avy amin''i Joda; Ary ireo voafidiko no handova azy, eny, ny mpanompoko no honina ao.'
mg1865::mg_23::65::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sarona ho tonga fiandrasana ondry ary ny lohasaha akora ho fandrian''omby, ho an''ny oloko izay nitady Ahy.'
mg1865::mg_23::65::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny aminareo izay mahafoy an''i Jehovah sy manadino ny tendrombohitro masina, sady mamelatra latabatra ho an''i Gada* sy mampidina** divay noharoharoan-javatra ho an''i Meny, [*Gada = Zara, ary Meny = Vintana; samy anaran''andriamani-tsy izy ireo] [**Hebreo: mameno]'
mg1865::mg_23::65::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotendreko ho voan''ny sabatra ianareo ka hankohofina hovonoina avokoa, satria niantso Aho, fa tsy namaly ianareo, niteny Aho, fa tsy nihaino ianareo, fa nanao izay ratsy eo imasoko, ary izay tsy sitrako no nofidinareo.'
mg1865::mg_23::65::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Indro, ny mpanompoko hihinana, fa ianareo kosa ho mosarena; Indro, ny mpanompoko hisotro, fa ianareo kosa ho main-tenda; indro, ny mpanompoko hifaly, fa ianareo kosa ho menatra;'
mg1865::mg_23::65::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny mpanompoko hihoby noho ny faharavoam-po, fa ianareo kosa hitoloko noho ny alahelom-po* sy hidradradradra noho ny fahoriam-panahy**. [*Hebreo: fanaintanam-po] [**Hebreo: fahatorotoroam-panahy]'
mg1865::mg_23::65::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamela ny anaranareo ho fiozonana amin''ireo voafidiko ianareo, ary hahafaty anao Jehovah Tompo; fa ny mpanompony kosa dia homeny anaram-baovao;'
mg1865::mg_23::65::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka izay miarahaba tena ety ambonin''ny tany dia hanao izany amin''ny anaran''Andriamanitry ny Amena*; ary izay mianiana ety ambonin''ny tany dia hianiana amin''Andriamanitry ny Amena*, satria efa hadino ny fahoriana taloha, sady voafina izany ka tsy hitan''ny masoko. [*Amena = fahamarinana]'
mg1865::mg_23::65::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Izaho mahary lanitra vaovao sy tany vaovao, ka dia tsy hotsarovana intsony ny taloha, na ho mby ao an-tsaina akory aza.'
mg1865::mg_23::65::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mifalia kosa sy miravoravoa mandrakizay, satria mahary izany Aho; fa, indro, mahary an''i Jerosalema ho fifaliana Aho ary ny olony ho firavoravoana.'
mg1865::mg_23::65::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho faly amin''i Jerosalema Aho sy ho ravoravo amin''ny oloko; ary ny feo mitomany tsy ho re any intsony, na ny feo mitaraina.'
mg1865::mg_23::65::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ny zaza minono any aza dia tsy ho fohy andro, ary tsy hisy anti-panahy izay tsy nahatapitra ny androny; fa mbola zatovo ihany izay maty na dia efa zato taona aza, ary ny mpanota aza, dia hahatratra zato taona vao hozonina*. [*Na: Ary ny mpanota izay mahatratra zato taona ihany dia hatao ho voaozona]'
mg1865::mg_23::65::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao trano ny olona ka hitoetra ao; Ary hanao tanim-boaloboka ny olona ka hihinana ny vokatra aminy.'
mg1865::mg_23::65::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hanao trano hitoeran''olon-kafa izy, Na hamboly zavatra hohanin''olon-kafa; Fa ho tahaka ny andron''ny hazo ny andron''ny oloko, Ary ireo voafidiko dia hanaram-po amin''ny asan''ny tanany.'
mg1865::mg_23::65::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisasatra foana izy, na hitera-jaza ho tratry ny loza tampoka; Fa taranak''izay notahin''i Jehovah ireo, Ary ny terany ho ao aminy*. [*Na: Mbamin''ny terany koa]'
mg1865::mg_23::65::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy mbola miantso aza izy dia hamaly Aho; Ary raha mbola miteny izy, dia hihaino Aho.'
mg1865::mg_23::65::25:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 65
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amboadia* sy ny zanak''ondry hiara-komana, Ary ny liona hihina-mololo tahaka ny omby, Ary ny menarana, dia vovoka no ho fihinany; Ary tsy handratra na hanimba eran''ny tendrombohitro masina izy, hoy Jehovah. [*lopa]'
mg1865::mg_23::66::1:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny toe-panahin''ny tena Isiraely sy ny fandavana ny tsy izy, ary ny fandrosoan''ny Fiangonana sy ny hamoriana ny firenena rehetra hankany Jerosalema, ary ny handringanana ny ratsy fanahy'
  verse_text: 'Izao no lazain''i Jehovah: Ny lanitra no seza fiandrianako, Ary ny tany no fitoeran-tongotro; Trano manao ahoana no hataonareo ho Ahy? Ary fitoerana manao ahoana no ho fitsaharako ?'
mg1865::mg_23::66::2:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao zavatra izao no nataon''ny tanako. Ka dia ary izao rehetra izao, hoy Jehovah; Nefa izao no olona hotsinjoviko, Dia izay malahelo sy torotoro fanahy Sady mangovitra noho ny teniko.'
mg1865::mg_23::66::3:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamono omby dia hoatra ny mamono olona; Izay mamono ondry hatao fanatitra dia hoatra ny mamolaka ny vozon''alika; Izay manatitra fanatitra hohanina dia hoatra ny manatitra ran-kisoa; Izay mandoro ditin-kazo mani-pofona ho fanati-pahatsiarovana dia hoatra ny misaotra ny sampy. Eny, tahaka ny nifidianan''ireny ny halehany, Sy ny nifalian''ny fanahiny tamin''ny fahavetavetany,'
mg1865::mg_23::66::4:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany kosa no hifidianako ny fampahoriana azy, Sy handatsahako ny fahatahorany ho aminy, Satria niantso Aho, fa tsy nisy namaly, Niteny Aho, fa tsy nihaino izy; Fa nanao izay ratsy eo imasoko, Ary izay tsy sitrako no nofidiny.'
mg1865::mg_23::66::5:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny tenin''i Jehovah, Ianareo izay mangovitra noho ny teniny! Hoy ny rahalahinareo izay mankahala anareo, Ka mandroaka anareo noho ny amin''ny anarako: Hampiseho ny voninahiny anie Jehovah, Mba ho faly mahita ny fifalianareo izahay! Kanefa ireny ho menatra kosa.'
mg1865::mg_23::66::6:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! horakoraka any an-tanàna, Ary feo ao amin''ny tempoly, Dia feon''i Jehovah izay mamaly ny ataon''ny fahavalony.'
mg1865::mg_23::66::7:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola tsy nihetsi-jaza aza izy, dia niteraka; Fony mbola tsy nanaintaina aza izy, dia velon-jazalahy.'
mg1865::mg_23::66::8:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza akory no efa nandre zavatra toy izany? Iza no efa nahita zavatra toy izany? Hisy tany hateraka indray andro va, Na firenena azo atao indray miteraka? Fa raha vao narary hiteraka Ziona, dia velon-jaza izy.'
mg1865::mg_23::66::9:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho moa hahatonga ho eo amin''ny fiterahana ka tsy hampiteraka va? hoy Jehovah; Izaho hampiteraka, nefa hampikombona indray va? hoy Andriamanitrao.'
mg1865::mg_23::66::10:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaraha mifaly amin''i Jerosalema, Ary miravoravoa aminy ianareo rehetra izay tia azy; Aoka hiara-mifaly aminy tokoa Ianareo rehetra izay malahelo noho ny aminy,'
mg1865::mg_23::66::11:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hinonoanareo sy hivokisanareo amin''ny nonony mahafaly, Eny, mba higoka ianareo, Ka hiravoravo amin''ny haben''ny voninahiny.'
mg1865::mg_23::66::12:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Indro, hitarihako fiadanana tahaka ny ony izy, Ary ny voninahitry ny firenena tahaka ny renirano tondraka, Ka hinono ianareo; Ary hosakalehina ianareo sady hohindrahindraina eo ambony lohalika.'
mg1865::mg_23::66::13:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny olona ampiononin-dreniny No hampiononako anareo; Eny, ao Jerosalema no hampiononana anareo.'
mg1865::mg_23::66::14:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hahita izany ianareo, ka ho faly ny fonareo, Ary ny taolanareo ho tsara fitombo tahaka ny ahi-maitso; Ary ny tanan''i Jehovah dia ataony fantatry ny mpanompony, Fa ho tezitra amin''ny fahavalony kosa Izy.'
mg1865::mg_23::66::15:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Jehovah ho avy amin''ny afo, Ary tahaka ny tadio ny kalesiny, Mba hanao famaliana amin''ny fahatezerany mirehitra, Sy ny fitenenany mafy amin''ny lelafo.'
mg1865::mg_23::66::16:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny afo sy ny sabany no ho entin''i Jehovah hifandahatra amin''ny nofo rehetra; Ary ho maro ny voaringan''i Jehovah.'
mg1865::mg_23::66::17:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manamasina sy manadio ny tenany ho ao an-tanimboly, Ka manaraka ny iray ao afovoany, Ary mihinana ny henan-kisoa sy ny zava-betaveta ary ny totozy; Dia hiaraka ho levona avokoa, hoy Jehovah.'
mg1865::mg_23::66::18:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho dia hamaly* ny asany sy ny heviny, Ho avy ny hamoriana ny jentilisa rehetra sy ny samy hafa fiteny; Dia ho avy ireo ka hahita ny voninahitro. [*Na: mahalala]'
mg1865::mg_23::66::19:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hasiako famantarana eo aminy, Ary izay afaka mandositra dia hirahiko ho any amin''ny jentilisa, Dia ho any Tarsisy sy Pola ary Lydia*, izay manenjana tsipïka, Ary ho any Tobala sy Javana, Dia ho any amin''ireo nosy lavitra izay tsy mbola nandre ny lazako; Na nahita ny voninahitro, Ary hitory ny voninahitro any amin''ny jentilisa izy. [*Hebreo: Loda]'
mg1865::mg_23::66::20:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitondra ny rahalahinareo rehetra izy, Avy any amin''ny jentilisa rehetra ho fanatitra ho an''i Jehovah, Mitaingin-tsoavaly sy ao anaty kalesy sy filanjana, Ary mitaingina ampondra sy rameva haingam-pandeha ho any Jerosalema tendrombohitro masina, hoy Jehovah, Dia tahaka ny fitondran''ny Zanak''Isiraely ny fanatitra hohanina ao anatin''ny vilia madio ho any an-tranon''i Jehovah;'
mg1865::mg_23::66::21:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy amin''ireo aza no hakako ho mpisorona sy Levita, hoy Jehovah.'
mg1865::mg_23::66::22:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny lanitra vaovao sy ny tany vaovao, izay hataoko, no haharitra eo anatrehako, hoy Jehovah, Dia toy izany ny haharetan''ny taranakareo sy ny anaranareo.'
mg1865::mg_23::66::23:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaky ny voaloham-bolana sy isan-tsabata; Dia ho avy ny nofo rehetra hiankohoka eo anatrehako, hoy Jehovah.'
mg1865::mg_23::66::24:
  verse_version: mg1865
  verse_book: mg_23
  verse_chapter: 66
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hivoaka izy ireny ka hijery ny fatin''ny olona izay efa niodina tamiko; Fa ny kankany tsy ho faty, ary ny afony tsy hovonoina, Ary hataon''ny nofo rehetra ho fahavetavetana izy.'
