mg1865::mg_59::1::1:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fakam-panahy, sy ny fandraisana ny tenin''Andriamanitra'
  verse_text: 'Jakoba, mpanompon''Andriamanitra sy Jesoa Kristy Tompo, mamangy ny firenena roa ambin''ny folo monina any am-pielezana.'
mg1865::mg_59::1::2:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahiko, ataovy ho fifaliana avokoa, raha iharan''ny fakam-panahy* samy hafa ianareo, [*Na: fizahan-toetra]'
mg1865::mg_59::1::3:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria fantatrareo fa ny fizahan-toetra ny finoanareo dia mahatonga faharetana.'
mg1865::mg_59::1::4:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny faharetana hisy asa tanteraka, mba ho tanteraka sy tonga ohatra ianareo, ka tsy hisy tsy ampy na inona na inona.'
mg1865::mg_59::1::5:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy ianareo tsy manam-pahendrena*, aoka izy hangataka amin''Andriamanitra, Izay manome malalaka ho an''ny olona rehetra sady tsy mandatsa; ary dia homena azy izany. [*Na: kely fahendrena]'
mg1865::mg_59::1::6:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa aoka hangataka amin''ny finoana izy ka tsy hiahanahana akory; fa izay miahanahana dia toy ny alon-dranomasina entin''ny rivotra ka atopatopany.'
mg1865::mg_59::1::7:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aoka tsy hanampo handray zavatra amin''ny Tompo izany olona izany:'
mg1865::mg_59::1::8:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'olona miroa saina izy, miovaova amin''ny alehany rehetra.'
mg1865::mg_59::1::9:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny rahalahy izay ambany hanao ny fisandratany ho reharehany;'
mg1865::mg_59::1::10:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny manan-karena kosa ny fietreny, satria ho levona tahaka ny vonin''ny ahitra izy.'
mg1865::mg_59::1::11:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miposaka ny masoandro mbamin''ny hainandro mahamay, dia mampahalazo ny ahitra, ka mihintsana ny voniny, ary levona ny hatsaran-tarehiny; dia toy izany koa no fahalazon''ny manan-karena amin''ny alehany.'
mg1865::mg_59::1::12:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona maharitra fakam-panahy; fa rehefa voazaha toetra izy, dia handray ny satro-boninahitra fiainana, izay nolazain''ny Tompo homena izay tia Azy.'
mg1865::mg_59::1::13:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy alaim-panahy, aoka izy tsy hanao hoe: Andriamanitra no maka fanahy ahy; fa Andriamanitra tsy azon''ny ratsy alaim-panahy, sady tsy mba maka fanahy olona Izy;'
mg1865::mg_59::1::14:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa samy alaim-panahy ny olona, raha tarihin''ny filany sy fitahiny izy.'
mg1865::mg_59::1::15:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny filàna, rehefa torontoronina, dia miteraka ota; ary ny ota, rehefa tanteraka, dia miteraka fahafatesana.'
mg1865::mg_59::1::16:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: '2022-10-24T04:40:37+0000'
  verse_title: null
  verse_text: 'Aza mety hofitahina ianareo, ry rahalahy malalako.'
mg1865::mg_59::1::17:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanomezan-tsoa rehetra sy ny fanomezana tanteraka rehetra dia avy any ambony ka midina avy amin''ny Rain''ny fanazavana, Izay tsy misy fiovaovana na aloka avy amin''ny fihodinana.'
mg1865::mg_59::1::18:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny sitrapony no niterahany antsika tamin''ny teny fahamarinana, mba ho santatry ny zavatra noforoniny isika.'
mg1865::mg_59::1::19:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrareo izany, ry rahalahy malalako. Kanefa aoka ny olona rehetra halady hihaino ho malai-miteny, ho malain-ko tezitra;'
mg1865::mg_59::1::20:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny fahatezeran''ny olona tsy ahefana izay marina eo imason''Andriamanitra.'
mg1865::mg_59::1::21:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ario ny fahalotoana sy ny lolompo rehetra, ary ekeo amin''ny fahalemem-panahy ny teny nambolena, izay mahavonjy ny fanahinareo.'
mg1865::mg_59::1::22:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aoka ho mpankatò ny teny ianareo, fa aza mpihaino fotsiny ihany ka mamitaka ny tenanareo.'
mg1865::mg_59::1::23:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy mpihaino ny teny, nefa tsy mpankato, dia toy ny olona mizaha ny tarehiny eo amin''ny fitaratra izy;'
mg1865::mg_59::1::24:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mijery ny tenany izy, dia lasa, ary miaraka amin''izay dia hadinony ny tarehiny.'
mg1865::mg_59::1::25:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mandinika ny lalàna tanteraka, dia ny lalàn''ny fahafahana, ka maharitra amin''izany, raha tsy mpihaino manadino, fa mpanao ny asa, dia ho sambatra amin''ny asany izany olona izany.'
mg1865::mg_59::1::26:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manao azy ho mpivavaka, nefa tsy mamehy ny vavany, fa mamitaka ny fony, dia zava-poana ny fivavahan''izany olona izany.'
mg1865::mg_59::1::27:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no fivavahana madio sady tsy misy loto eo anatrehan''Andriamanitra Ray: ny mamangy ny kamboty sy ny mpitondratena amin''ny fahoriany, sy ny miaro ny tena tsy hisy pentimpentina avy amin''izao tontolo izao.'
mg1865::mg_59::2::1:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy mahamety ny fizahan-tavan''olona'
  verse_text: 'Ry rahalahiko, aoka tsy hasiana fizahan-tavan''olona ny finoanareo ny Tompontsika, dia Jesoa Kristy, Tompon''ny voninahitra.'
mg1865::mg_59::2::2:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy olona miditra eo amin''ny synagoganareo misy peratra volamena amin''ny rantsan-tanany sady miakanjo tsara, ary mba miditra kosa izay olona malahelo miakanjo ratsy,'
mg1865::mg_59::2::3:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa mijery ilay miakanjo tsara ianareo ka manao hoe: Mipetraha eto amin''ny fitoerana aloha ianao; ary manao amin''ilay malahelo kosa hoe: Mitoera eroa ianao, na: Mipetraha etsy amin''ny fitoeran-tongotro,-'
mg1865::mg_59::2::4:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'moa tsy miangatra* va ianareo amin''izany ka efa mpitsara manan-kevi-dratsy? [*Na: miahanahana]'
mg1865::mg_59::2::5:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, ry rahalahy malalako: Tsy efa nofidin''Andriamanitra va ny malahelo amin''izao fiainana izao ho mpanankarena amin''ny finoana sy ho mpandova ny fanjakana nolazainy homena izay tia Azy?'
mg1865::mg_59::2::6:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo efa nanala-baraka ny malahelo. Moa tsy ny mpanankarena va no mampahory anareo? Ary tsy izy va no mitarika anareo ho eo amin''ny fitsarana?'
mg1865::mg_59::2::7:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izy koa va no miteny ratsy* ny anarana tsara izay niantsoana anareo? [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_59::2::8:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha mankatò ilay didy ambony indrindra* ianareo, araka ny Soratra Masina hoe: "Tiava ny namanao tahaka ny tenanao" (Levitikosy 19:18), dia manao tsara ianareo. [*Grika: andriana]'
mg1865::mg_59::2::9:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mizaha tavan''olona kosa ianareo, dia manota ka helohin''ny lalàna ho mpanota.'
mg1865::mg_59::2::10:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza mitandrina ny lalàna rehetra, nefa diso amin''ny iray loha dia meloka amin''izy rehetra.'
mg1865::mg_59::2::11:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ilay nanao hoe: "Aza mijangajanga" no nanao hoe koa: "Aza mamono olona" (Eksodosy 20:13-14). Fa raha tahiny tsy mijangajanga ianao, kanefa mamono olona ihany, dia mpandika ny lalàna ianao.'
mg1865::mg_59::2::12:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ianareo hiteny sy hanao araka izay mahamendrika anareo, izay olona hotsarain''ny lalàn''ny fahafahana.'
mg1865::mg_59::2::13:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fitsarana tsy misy famindram-po no ho anjaran''izay tsy mamindra fo; ary ny famindram-po kosa dia faly, fa tsy mba matahotra ny fitsarana.'
mg1865::mg_59::2::14:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny fahafoanan''ny finoana tsy misy asa'
  verse_text: 'Inona moa no soa azo, ry rahalahiko, raha misy milaza fa manam-pinoana izy, nefa tsy manana asa? Ny finoana va mahavonjy azy?'
mg1865::mg_59::2::15:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy rahalahy na anabavy tsy manan-kitafy sady tsy manan-kohanina isan''andro,'
mg1865::mg_59::2::16:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka misy aminareo manao aminy hoe: Mandehana amin''ny fiadanana, mamindroa, mivokisa, kanefa tsy omenareo azy tsinona izay tandrifiny ho an''ny tenany, inona moa no soa azo amin''izany?'
mg1865::mg_59::2::17:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mba toy izany koa ny finoana, raha tsy misy asa, dia maty mihitsy.'
mg1865::mg_59::2::18:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa angamba hisy hanao hoe: Ianao manam-pinoana, ary izaho manana asa; asehoy amiko tsy amin''ny asa ny finoanao, ary izaho kosa haneho aminao ny finoako amin''ny asako.'
mg1865::mg_59::2::19:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: '2022-09-02T07:44:12+0000'
  verse_title: null
  verse_text: 'Ianao mino fa iray ihany no Andriamanitra; koa tsara izany ataonao izany,- ny demonia koa mba mino izany ka dia mangovitra.'
mg1865::mg_59::2::20:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy fantatrao va, ry olom-poana, fa tsy vanona ny finoana tsy misy asa?'
mg1865::mg_59::2::21:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nohamarinina tamin''ny asa va Abrahama razantsika tamin''ny nanaterany an''isaka zanany teo ambonin''ny alitara?'
mg1865::mg_59::2::22:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitanao fa niara-niasa tamin''ny finoana ny asany, ary ny finoana dia notanterahina tamin''ny asa;'
mg1865::mg_59::2::23:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tanteraka ny Soratra Masina manao hoe: "Ary Abrahama nino an''Andriamanitra, ka nisaina ho fahamarinany izany" (Genesisy 25:6), ary natao hoe "Sakaizan''Andriamanitra" izy (Isaia 41:8).'
mg1865::mg_59::2::24:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia hitanareo fa hamarinina amin''ny asa ny olona, fa tsy amin''ny finoana ihany.'
mg1865::mg_59::2::25:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa Rahaba janga, tsy nohamarinina tamin''ny asa va izy tamin''ny nandraisany ireny iraka ireny sy ny nampandehanany azy tamin''ny lalan-kafa?'
mg1865::mg_59::2::26:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maty ny tena, raha tsy misy fanahy, ary maty toy izany koa ny finoana, raha tsy misy asa.'
mg1865::mg_59::3::1:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra ny amin''izay mety hataon''ny mpampianatra, indrindra fa ny tsy hanotany amin''ny lelany, ary ny toetry ny fahendrena avy any ambony'
  verse_text: 'Ry rahalahiko, aza dia samy ho mpampianatra be ihany ianareo, satria fantatrareo fa ho mafimafy kokoa no hitsarana anay mpampianatra.'
mg1865::mg_59::3::2:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tafintohina amin''ny zavatra maro isika rehetra. Raha misy olona tsy mba tafintohina amin''ny teny, dia izy no lehilahy tanteraka ka mahafehy ny tenany rehetra koa.'
mg1865::mg_59::3::3:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha asiantsika lamboridy amin''ny vavan''ny soavaly mba hanarahany antsika, dia mitondra ny tenany rehetra isika.'
mg1865::mg_59::3::4:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo koa ny sambo, na dia lehibe aza ireny ka entin''ny rivotra mahery, dia ahodin''ny familiana kely foana izy ho any amin''izay tian''ny mpitondra.'
mg1865::mg_59::3::5:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany koa ny lela, rantsana kely izy, kanefa mirehareha fatratra. Indro, ny fiavovon''ny antontan-kazo* arehitry ny afo kely! [*Na: ala]'
mg1865::mg_59::3::6:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary afo ny lela, dia faharatsiana tsy hita lany; eo amin''ny momba ny tenantsika dia ny lela no mampipentimpentina ny tena rehetra ka mampirehitra izao zavatra ary rehetra izao, sady arehitry ny helo* izy; [*Grika: Gehena]'
mg1865::mg_59::3::7:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa folaka avokoa ny karazan*''ny bibi-dia rehetra sy ny vorona sy ny biby mandady sy mikisaka mbamin''ny any an-dranomasina, eny, voafolaky ny olombelona ireny; [*Grika: fomban'']'
mg1865::mg_59::3::8:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy misy olona mahafolaka ny lela; zava-dratsy tsy manam-pijanonana izy sady feno ody mahafaty.'
mg1865::mg_59::3::9:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no isaorantsika ny Tompo, dia ny Ray; ary izy ihany koa no anozonantsika ny olona, izay natao araka ny endrik''Andriamanitra.'
mg1865::mg_59::3::10:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vava iray ihany no ivoahan''ny fisaorana sy ny fanozonana. Ry rahalahiko, tsy mety raha misy izany.'
mg1865::mg_59::3::11:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ny loharano va mamoaka rano mamy sy mangidy eo amin''ny vavany iray ihany?'
mg1865::mg_59::3::12:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahiko, ny aviavy va mety mamoa voan''oliva, na ny voaloboka mamoa voan''aviavy? Toy izany ny rano masirasira tsy mba ivoahan''ny mamy.'
mg1865::mg_59::3::13:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza eo aminareo no hendry sy manam-pahalalana? Aoka hasehony amin''ny fitondran-tena tsara ny asany amin''ny fahalemem-panahin''ny fahendrena.'
mg1865::mg_59::3::14:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy fialonana mirehitra* sy fifampiandaniana ao am-ponareo, aza mirehareha na mandainga manohitra ny marina. [*Grika: mangidy]'
mg1865::mg_59::3::15:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany fahendrena izany dia tsy ny avy any ambony, fa araka ny ety an-tany ihany, araka ny nofo, araka ny an''ny demonia.'
mg1865::mg_59::3::16:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay misy fialonana sy fifampiandaniana dia misy fikorontanana mbamin''izay asa ratsy rehetra.'
mg1865::mg_59::3::17:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahendrena izay avy any ambony dia madio aloha, ary tia fihavanana, mandefitra, mora alahatra, be famindram-po sy be voka-tsoa, tsy miahanahana* na mihatsaravelatsihy. [*Na: miangatra]'
mg1865::mg_59::3::18:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vokatry ny fahamarinana dia afafy amin''ny fihavanana ho an''izay mampandroso ny fihavanana*. [*Na: Izay mampandroso ny fihavanana no mamafy ny vokatry ny fahamarinana amin''ny fihavanana]'
mg1865::mg_59::4::1:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny tia ady sy ny mpisintaka sy ny manendrikendrika ary ny tsy manaiky ny fitondran''Andriamanitra'
  verse_text: 'Avy aiza ny ady, ary avy aiza ny fifandirana eo aminareo? Tsy izao va no ihaviany, dia ny filanareo izay miady ao anatin''ny momba ny tenanareo?'
mg1865::mg_59::4::2:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mila ianareo, nefa tsy manana ihany; mamono sy mitsiriritra* ianareo, nefa tsy mahazo ihany; mifanditra sy miady ianareo; tsy manana ianareo, satria tsy mangataka. [*Na: mialona]'
mg1865::mg_59::4::3:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataka ianareo, nefa tsy mahazo ihany, satria diso fangataka, mba holaninareo amin''ny filanareo.'
mg1865::mg_59::4::4:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mpisintaka mijangajanga, tsy fantatrareo va fa fandrafiana an''Andriamanitra ny fisakaizana amin''izao tontolo izao? Koa na iza na iza te-ho sakaizan''izao tontolo izao, dia fahavalon''Andriamanitra izy.'
mg1865::mg_59::4::5:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataonareo va fa miteny foana ny Soratra Masina*? Ny fanahy, izay nampitoeriny ato anatintsika** dia iriny amin''ny fahasaro-piaro***. [*Na: ny Soratra Masina hoe] [** Na: izay mitoetra ato anatintsika] [*** Na: Ny Fanahy, Izay nampitoeriny ato anatintsika, dia maniry amin''ny fahasaro-piaro; na: Ny fanahy, izay nampitoeriny ato anatintsika, dia maniry amin''ny fialonana]'
mg1865::mg_59::4::6:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa manome fahasoavana bebe kokoa Izy. Koa hoy izy: "Andriamanitra manohitra ny mpiavonavona, fa manome fahasoavana ho an''ny manetry tena" (Ohabolana 3:34].'
mg1865::mg_59::4::7:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: '2022-05-19T16:40:00+0000'
  verse_title: null
  verse_text: 'Ka dia maneke an''Andriamanitra ianareo; ary manohera ny devoly, dia handositra anareo izy.'
mg1865::mg_59::4::8:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: '2022-04-07T07:29:40+0000'
  verse_title: null
  verse_text: 'Manatòna an''Andriamanitra, dia hanatona anareo Izy. Diovy ny tananareo, ry mpanota; ary ataovy madio ny fonareo, ry mpiroa saina.'
mg1865::mg_59::4::9:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Oria, sy mitomania, ary midradradradrà; aoka hody fitomaniana ny fihomehezanareo, ary hody fanjoretana ny fifalianareo.'
mg1865::mg_59::4::10:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manetre tena eo anatrehan''ny Tompo, dia hanandratra anareo Izy.'
mg1865::mg_59::4::11:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mifanaratsy, ry rahalahy. Izay manaratsy rahalahy na mitsara ny rahalahiny dia manaratsy ny lalàna sy mitsara ny lalàna; fa raha mitsara ny lalàna ianao, dia tsy mpankatò ny lalàna, fa mpitsara.'
mg1865::mg_59::4::12:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iray ihany no Mpanome lalàna sy Mpitsara, dia Ilay mahavonjy sy mahavery; fa iza moa ianao, no mitsara ny namanao?'
mg1865::mg_59::4::13:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! ianareo izay manao hoe: Anio na ampitso dia hankany Ananona izahay ary hitoetra any herintaona ka hividy sy hivarotra ary hahazo tombom-barotra,'
mg1865::mg_59::4::14:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa tsy mahalala ny ho ampitso ianareo. Inona moa ny ainareo? Fa zavona ihany ianareo, izay miseho vetivety, dia levona.'
mg1865::mg_59::4::15:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aleo manao izao: Raha sitrapon''ny Tompo, ka velona izahay, dia hataonay izao na izany.'
mg1865::mg_59::4::16:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao dia mirehareha amin''ny fahasahianareo ianareo; ratsy ny fireharehana rehetra toy izany.'
mg1865::mg_59::4::17:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay mahalala hanao soa, nefa tsy manao, dia heloka ho azy izany.'
mg1865::mg_59::5::1:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanamelohana ny mpanankarena ratsy fanahy'
  verse_text: 'He! ianareo manan-karena, mitomania sy midradradradrà noho ny fahoriana izay efa manjo anareo.'
mg1865::mg_59::5::2:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harenareo efa simba, ary ny fitafianareo efa lanin''ny kalalao.'
mg1865::mg_59::5::3:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volamena sy ny volafotsinareo dia efa harafesina; ary ny harafesiny dia ho vavolombelona hiampanga anareo sady handany ny nofonareo tahaka ny afo. Efa namory harena amin''ny andro farany ianareo.'
mg1865::mg_59::5::4:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny karaman''ny mpiasa nijinja ny taninareo, izay hazoninareo, dia mitaraina; ary ny fitarainan''ny mpijinja dia efa tafiditra amin''ny sofin''ny Tompon''ny maro.'
mg1865::mg_59::5::5:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa velona tamin''ny fy tety ambonin''ny tany ianareo sady nanaram-po tamin''ny fahafinaretana; efa namahy ny fonareo tamin''ny andro hamonoana ianareo.'
mg1865::mg_59::5::6:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanameloka namono ny marina* ianareo; fa tsy manohitra anareo izy. [*Na. Ilay marina . . . Izy]'
mg1865::mg_59::5::7:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Toky ho an''ny Kristiana azom-pahoriana, sy anatra samy hafa'
  verse_text: 'Ary amin''izany dia mahareta tsara, ry rahalahy, mandra-pihavin''ny Tompo. Indro, ny mpiasa tany miandry ny voka-tsoa amin''ny tany ka maharitra amin''izany mandra-pahazony ny ranonorana aloha sy aoriana.'
mg1865::mg_59::5::8:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahareta koa ianareo, mampahereza ny fonareo, fa efa mby akaiky ny fihavian''ny Tompo.'
mg1865::mg_59::5::9:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mifampimonomonona, ry rahalahy, fandrao hohelohina ianareo; Indro, ny Mpitsara efa mitsangana eo anoloan''ny varavarana.'
mg1865::mg_59::5::10:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahiko, aoka ny mpaminany izay niteny tamin''ny anaran''ny Tompo no halainareo ho fianarana ny fandeferam-pahoriana sy ny faharetana.'
mg1865::mg_59::5::11:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ataontsika fa sambatra izay efa naharitra. Efa renareo ny faharetan''i Joba ary efa hitanareo ny faran''ny nataon''ny Tompo taminy, fa miantra indrindra ny Tompo sady be famindram-po.'
mg1865::mg_59::5::12:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mihoatra noho ny zavatra rehetra, ry rahalahiko, aza mianiana, na amin''ny lanitra, na amin''ny tany, na amin''izay fianianana hafa akory aza; fa aoka ny fanaikinareo ho "Eny", ary ny fandànareo ho "Tsia", fandrao hiharan''ny fitsarana ianareo.'
mg1865::mg_59::5::13:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy azom-pahoriana va eo aminareo? Aoka izy hivavaka. Misy faly va? Aoka izy hihira fiderana.'
mg1865::mg_59::5::14:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy marary va eo aminareo? Aoka izy hampaka ny loholon*''ny fiangonana**; ary aoka hanosotra diloilo azy amin''ny anaran''ny Tompo ireo sady hivavaka eo aminy; [*Grika: presbytera] [** Grika: eklesia]'
mg1865::mg_59::5::15:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fivavaky ny finoana dia hamonjy ilay marary, fa ny Tompo hanangana azy; ary raha nanota izy, dia havela ny helony.'
mg1865::mg_59::5::16:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mifaneke heloka ianareo, ary mifampivavaha, mba ho sitrana ianareo. Ny fiàsan''ny fivavaky ny marina dia mahery indrindra.'
mg1865::mg_59::5::17:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Elia dia olona tahaka antsika ihany, ary izy nahery nivavaka mba tsy hilatsahan''ny ranonorana; dia tsy nilatsaka tamin''ny tany ny ranonorana telo taona sy enim-bolana.'
mg1865::mg_59::5::18:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivavaka indray izy, dia nandatsaka ranonorana ny lanitra, ka nahavokatra ny tany.'
mg1865::mg_59::5::19:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahiko, raha misy eo aminareo miala amin''ny fahamarinana, ary misy anankiray mampibebaka azy,'
mg1865::mg_59::5::20:
  verse_version: mg1865
  verse_book: mg_59
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'aoka ho fantany fa izay mampibebaka ny mpanota hiala amin''ny lalan''ny fahadisoany dia hamonjy fanahy tsy ho faty sady hanarona heloka be.'
