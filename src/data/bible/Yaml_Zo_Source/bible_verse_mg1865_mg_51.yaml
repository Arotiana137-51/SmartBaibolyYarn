mg1865::mg_51::1::1:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana ny Kolosiana, sy fisaorana an''Andriamanitra noho ny toetr''ireo'
  verse_text: 'Paoly, Apostolin''i Kristy Jesoa noho ny sitrapon''Andriamanitra, ary Timoty rahalahy,'
mg1865::mg_51::1::2:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mamangy ny olona masina any Kolosia, dia ny rahalahy mahatoky ao amin''i Kristy: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika.'
mg1865::mg_51::1::3:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''Andriamanitra, Rain''i Jesoa Kristy Tompontsika, izahay amin''ny fangatahanay mandrakariva ho anareo,'
mg1865::mg_51::1::4:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa renay ny finoanareo an''i Kristy Jesoa sy ny fitiavanareo ny olona masina rehetra,'
mg1865::mg_51::1::5:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny fanantenana izay tehirizina any an-danitra ho anareo, dia ilay efa renareo fahiny tamin''ny tenin''ny fahamarinan''ny filazantsara,'
mg1865::mg_51::1::6:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay efa mby eo aminareo, tahaka ny eny amin''izao tontolo izao koa, sady vokatra sy mitombo tahaka ny eo aminareo koa hatramin''ny andro nandraisanareo sy nahalalanareo tsara ny fahasoavan''Andriamanitra araka ny marina;'
mg1865::mg_51::1::7:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny efa renareo tamin''i Epafra, mpanompo namanay sady malala, izay mpanompon''i Kristy mahatoky ho anay*, [*Na: (anareo)]'
mg1865::mg_51::1::8:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa nanambara taminay koa ny fitiavanareo ao amin''ny Fanahy.'
mg1865::mg_51::1::9:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Fivavahan''i Paoly ho an''ny Kolosiana, sy filazana ny fahalehibiazan''ny voninahitr''i Kristy'
  verse_text: 'Ary noho izany izahay koa hatramin''ny andro nandrenesanay dia tsy mitsahatra mivavaka sy mangataka ho anareo, mba hofenoina fahalalana tsara ny sitrapony ianareo amin''ny fahendrena sy ny fahazavan-tsaina rehetra avy amin''ny Fanahy,'
mg1865::mg_51::1::10:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba handehananareo miendrika ny Tompo, hanaovana ny sitrapony amin''ny zavatra rehetra, dia mahavokatra amin''ny asa tsara rehetra sady mitombo amin''ny fahalalana tsara an''Andriamanitra,'
mg1865::mg_51::1::11:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ampahatanjahina amin''ny hery rehetra araka ny herin''ny voninahiny ho amin''ny faharetana rehetra sy ny fandeferana amin''ny hafaliana,'
mg1865::mg_51::1::12:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka misaotra ny Ray, Izay nampahamendrika antsika hanana anjara amin''ny lovan''ny olona masina eo amin''ny mazava,'
mg1865::mg_51::1::13:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nahafaka antsika tamin''ny fahefan''ny maizina ka namindra antsika ho amin''ny fanjakan''ny Zanany malalany,'
mg1865::mg_51::1::14:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay ananantsika fanavotana, dia ny famelana ny helotsika.'
mg1865::mg_51::1::15:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no endrik''Andriamanitra tsy hita, ny Lahimatoa talohan''izao zavatra ary rehetra izao;'
mg1865::mg_51::1::16:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tao aminy no nahariana ny zavatra rehetra any an-danitra sy ety ambonin''ny tany, dia ny hita sy ny tsy hita, na fiandrianana*, na fanjakana, na fanapahana, na fahefana, Izy no nahariana ny zavatra rehetra, sady ho Azy izany; [*Grika: seza fiandrianana]'
mg1865::mg_51::1::17:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Izy no talohan''ny zavatra rehetra, sady ao aminy no aharetan''ny zavatra rehetra.'
mg1865::mg_51::1::18:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no Lohan''ny tena, dia ny fiangonana*; Izy no voalohany, dia ny Lahimatoa tamin''ny maty, mba ho Lohany amin''ny zavatra rehetra Izy. [*Grika: eklesia]'
mg1865::mg_51::1::19:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sitraky ny Ray ho ao aminy no hitoeran''ny fahafenoana rehetra,'
mg1865::mg_51::1::20:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady Izy no hampihavanany ny zavatra rehetra aminy, ka dia ny ràny teo amin''ny hazo fijaliana no nanaovany fampihavanana — eny, Izy, hoy izaho, no fampihavanana izany, na ny ety ambonin''ny tany, na ny any an-danitra.'
mg1865::mg_51::1::21:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo, izay olon-ko azy fahiny sy fahavalo tamin''ny sainareo noho ny fanaovan-dratsy, no efa nampihavaniny ankehitriny'
mg1865::mg_51::1::22:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'tao amin''ny tenan''ny nofony, tamin''ny fahafatesana, mba hatolony ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany,'
mg1865::mg_51::1::23:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha maharitra amin''ny finoana ianareo ka mafy orina sady tafatoetra ary tsy mety hafindra hiala amin''ny fanantenana avy amin''ny filazantsara, izay efa renareo sady notorina eny ambanin''ny lanitra rehetra eny; ary izany no nanaovana ahy Paoly ho mpanompo.'
mg1865::mg_51::1::24:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia mifaly amin''ny fiaretako ho anareo aho, ary mahatanteraka ao amin''ny nofoko izay tsy vita tamin''ny fahorian''i Kristy ho an''ny tenany, dia ny fiangonana*, [*Grika: eklesia]'
mg1865::mg_51::1::25:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nanaovana ahy ho mpanompo araka ny fitondran''Andriamanitra nomena ahy ho anareo, hahatanteraka ny fitoriana ny tenin''Andriamanitra,'
mg1865::mg_51::1::26:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny zava-miafina, ilay voàfina hatramin''ny fahagola sy ny taranaka maro, fa voaseho ankehitriny amin''ny olony masina,'
mg1865::mg_51::1::27:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay efa tian''Andriamanitra ho nampahafantarina ny haren''ny voninahitr''ity zava-niafina ity any amin''ny jentilisa, dia Kristy ao anatinareo, Izay fanantenana ny voninahitra;'
mg1865::mg_51::1::28:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no torinay, ka samy anarinay sy ampianarinay amin''ny fahendrena rehetra ny olona rehetra, mba samy hatolotray ho tanteraka ao amin''i Kristy izy rehetra.'
mg1865::mg_51::1::29:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hahatanteraka izany no ikelezako aina koa sy iezahako fatratra araka ny fiàsan''ny herin''ilay miasa mahery ato anatiko.'
mg1865::mg_51::2::1:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananaran''i Paoly ny Kolosiana mba haharitra tsara tsy ho voafitaky ny mpampianatra sandoka'
  verse_text: 'Fa tiako ho fantatrareo ny hamafin''ny fiezahako ho anareo sy izay any Laodikia mbamin''izay rehetra tsy mbola nahita ny tavako amin''ny nofo,'
mg1865::mg_51::2::2:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampifalina ny fony amin''ny ampiraisana azy amin''ny fitiavana sy ho amin''ny haren''ny fahatokiana be avy amin''ny fahazavan-tsaina, ho amin''ny fahalalana tsara ny zava-miafina izay an''Andriamanitra, dia Kristy,'
mg1865::mg_51::2::3:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay iafenan''ny rakitry ny fahendrena sy ny fahalalana rehetra.'
mg1865::mg_51::2::4:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no lazaiko, fandrao hisy hampahadiso hevitra anareo amin''ny teny toa marina.'
mg1865::mg_51::2::5:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia tsy manatrika anareo amin''ny nofo aza aho, dia manatrika anareo ihany amin''ny fanahy ka mifaly sy mijery ny filaminanareo sy ny tsy fiovan''ny finoanareo an''i Kristy.'
mg1865::mg_51::2::6:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tahaka ny nandraisanareo an''i Kristy Jesoa Tompo, dia mandehana ao aminy araka izany koa,'
mg1865::mg_51::2::7:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka mamaka tsara sy miorina mafy ao aminy ary tafatoetra amin''ny finoana, toy ny efa nampianarana anareo, ka mazoto* amin''ny fisaorana. [*Na: (mitombo amin''izany)]'
mg1865::mg_51::2::8:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo fandrao misy mahalasa anareo ho babony amin''ny filosofia sy ny famitahana foana, araka ny fampianarana voatolotry ny razana, araka ny abidim-pianaran''izao tontolo izao, fa tsy araka an''i Kristy.'
mg1865::mg_51::2::9:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao amin''ny tenany no itoeran''ny fahafenoan''ny fomban''Andriamanitra rehetra;'
mg1865::mg_51::2::10:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ianareo dia tanteraka ao aminy, sady Izy no Lohan''ny fanapahana sy ny fahefana rehetra,'
mg1865::mg_51::2::11:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tao aminy koa no namorana anareo tamin''ny famorana tsy nataon-tanana, tamin''ny fanesorana ny tenan''ny nofo, dia tamin''ny famoran''i Kristy;'
mg1865::mg_51::2::12:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa niara-nilevina taminy ianareo tamin''ny batisa, izay niarahanareo natsangana taminy koa noho ny finoana ny asan''Andriamanitra, izay nanangana Azy tamin''ny maty.'
mg1865::mg_51::2::13:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo, izay efa matin''ny fahadisoana sy ny tsy fiforan''ny nofonareo, dia novelominy niaraka tamin''i Kristy, rehefa navelany ny fahadisoantsika rehetra;'
mg1865::mg_51::2::14:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary novonoiny ny sora-tanan''ny didy izay niampanga antsika; dia nesoriny tsy ho eo mihitsy izany ka nohomboany tamin''ny hazo fijaliana,'
mg1865::mg_51::2::15:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nesoriny tsy ho eo amin''ny tenany* ny fanapahana sy ny fahefana, ary noho ny hazo fijaliana dia nasehony miharihary ny fitondrany ireo toy ny fanaon''izay avy nandresy. [*Na: noreseny ka nobaboiny]'
mg1865::mg_51::2::16:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza avela hisy hitsara anareo ny amin''ny fihinana, na ny fisotro, na ny andro firavoravoana, na ny voaloham-bolana, na ny Sabata;'
mg1865::mg_51::2::17:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'aloky ny zavatra ho avy ireny, fa ny tenany dia an''i Kristy.'
mg1865::mg_51::2::18:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety hofitahina tsy hahazoanareo ny loka noho ny fanetren-tena haitraitra sy ny fivavahana amin''ny anjely, ka mitompo amin''ny zavatra efa* hitany sady feno fiavonavonana noho ny fisainan''ny nofony [*Na: (tsy)]'
mg1865::mg_51::2::19:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy mihazona ny Loha; Izy no itomboan''ny tena rehetra, izay velomina sy ampiraisina tsara amin''ny famavany sy ny hozatra, araka ny fampitomboan''Andriamanitra.'
mg1865::mg_51::2::20:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niara-maty tamin''i Kristy ianareo ka efa afaka tamin''ny abidim-pianaran''izao tontolo izao, nahoana no toa mbola velona amin''izao tontolo izao ihany ianareo ka mety hodidiana hoe:'
mg1865::mg_51::2::21:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mandray, aza manandrana, aza manendry -'
mg1865::mg_51::2::22:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'levona amin''ny fanaovana ihany izany rehetra izany — araka ny didy sy ny fampianaran''olona?'
mg1865::mg_51::2::23:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany dia ankalazaina ho fahendrena amin''ny fivavahana haitraitra sy ny fanetren-tena ary ny fampahoriana ny tena, nefa tsy manan-kery akory hahasakana ny fampanaranana ny nofo.'
mg1865::mg_51::3::1:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tokony hanariana ny asan''ny nofo sy ny hitondran-tena miendrika ny filazantsara'
  verse_text: 'Koa raha niara-natsangana tamin''i Kristy ianareo, dia katsaho ny zavatra any ambony, any amin''ny itoeran''i Kristy, Izay mipetraka eo an-tanana ankavanan''Andriamanitra.'
mg1865::mg_51::3::2:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saino ny zavatra any ambony, fa tsy ny zavatra ety an-tany.'
mg1865::mg_51::3::3:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa maty ianareo, ary ny fiainanareo miara-miafina amin''i Kristy ao amin''Andriamanitra.'
mg1865::mg_51::3::4:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hiseho Kristy fiainantsika, dia hiara-miseho aminy koa amin''ny voninahitra ianareo.'
mg1865::mg_51::3::5:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa vonoy ny momba ny tenanareo izay ety an-tany, dia fijangajangana, fahalotoana, firehetam-po, fanirian-dratsy ary fieremana, dia fanompoan-tsampy izany;'
mg1865::mg_51::3::6:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izany zavatra izany no mahatonga ny fahatezeran''Andriamanitra amin''ny zanaky ny tsy fanarahana;'
mg1865::mg_51::3::7:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'izany koa no nalehanareo fahiny, fony mbola velona taminy ianareo.'
mg1865::mg_51::3::8:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, esory koa izao rehetra izao, dia fahatezerana, fiafonafonana, lolompo, fitenenan-dratsy, teny mahamenatra avy amin''ny vavanareo.'
mg1865::mg_51::3::9:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mifandainga ianareo, fa efa narianareo ny toetra* taloha mbamin''ny asany; [*Grika: olona]'
mg1865::mg_51::3::10:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa notafinareo ny toetra* vaovao, izay havaozina ho amin''ny fahalalana tsara araka ny endrik''izay nahary azy. [*Grika: olona]'
mg1865::mg_51::3::11:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany dia tsy misy jentilisa* sy Jiosy, na voafora sy tsy voafora, na barbariana sy Skytiana, na andevo sy tsy andevo, fa Kristy no zavatra rehetra sady amin''ny rehetra. [*Grika: Grika]'
mg1865::mg_51::3::12:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitafia famindram-po sy fiantrana, fahamoram-panahy, fanetren-tena, fahalemem-panahy, fandeferana, araka ny olom-boafidin''Andriamanitra sady masina no malala.'
mg1865::mg_51::3::13:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifandefera, ka mifamelà heloka ianareo, raha misy manana alahelo amin''ny sasany; tahaka ny namelan''ny Tompo* ny helokareo no aoka mba hamelanareo heloka kosa. [*Na: (Kristy)]'
mg1865::mg_51::3::14:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho ambonin''izany rehetra izany ny fitiavana, fa fehin''ny fahatanterahana izany.'
mg1865::mg_51::3::15:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hanapaka ao am-ponareo ny fiadanan''i Kristy, fa ho amin''izany no niantsoana anareo ho tena iray; ary aoka ho feno fisaorana ianareo.'
mg1865::mg_51::3::16:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny tenin''i Kristy hitoetra betsaka ao aminareo amin''ny fahendrena rehetra, dia mifampianara ka mifananara amin''ny salamo sy ny fihirana ary ny tonon-kiram-panahy, mihira amin''ny fahasoavana ao am-ponareo ho an''Andriamanitra.'
mg1865::mg_51::3::17:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: '2022-06-06T05:45:56+0000'
  verse_title: null
  verse_text: 'Ary na inona na inona no ataonareo, na amin''ny teny, na amin''ny asa, dia ataovy amin''ny anaran''i Jesoa Tompo izany rehetra izany, ka misaora an''Andriamanitra Ray amin''ny alalany.'
mg1865::mg_51::3::18:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo vehivavy, maneke ny vadinareo araka izay mety hatao ao amin''ny Tompo.'
mg1865::mg_51::3::19:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo lehilahy, tiava ny vadinareo. ary aza sosotra* aminy. [*Grika: mangidy]'
mg1865::mg_51::3::20:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo zanaka, maneke ny ray aman-dreninareo amin''ny zavatra rehetra; fa ankasitrahana ao amin''ny Tompo izany.'
mg1865::mg_51::3::21:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo ray, aza mampahasosotra ny zanakareo, fandrao mamoy fo izy.'
mg1865::mg_51::3::22:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mpanompo, maneke ny tomponareo araka ny nofo amin''ny zavatra rehetra, tsy amin''ny fanompoana eo imaso, tahaka ny mpila sitraka amin''olona, fa amin''ny fahatsoram-po, matahotra ny Tompo;'
mg1865::mg_51::3::23:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: '2022-12-30T06:27:45+0000'
  verse_title: null
  verse_text: 'Ary na inona na inona no ataonareo, dia ataovy amin''ny fo, tahaka ny ho an''ny Tompo, fa tsy ho an''olona,'
mg1865::mg_51::3::24:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria fantatrareo fa ny Tompo no handraisanareo ny lova ho valiny; fa manompo an''i Kristy Tompo ianareo.'
mg1865::mg_51::3::25:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manao ny tsy marina dia handray araka ny tsy marina nataony; fa tsy misy fizahan-tavan''olona,'
mg1865::mg_51::4::1:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo tompo, ataovy amin''ny mpanomponareo izay marina sy izay mety, satria fantatrareo fa ianareo koa mba manana Tompo any an-danitra.'
mg1865::mg_51::4::2:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny amin''ny naman''i Paoly, sy fanaovam-beloma ny sakaizany tao Kolosia'
  verse_text: 'Mahareta amin''ny fivavahana, ka miambena amin''izany amin''ny fisaorana,'
mg1865::mg_51::4::3:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mangataha koa ho anay, mba hamohan''Andriamanitra varavarana ho an''ny teny hilazanay ny zava-niafina izay an''i Kristy, sady izany no namatorana ahy,'
mg1865::mg_51::4::4:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba haharihariko tsara izany tahaka izay tokony hitenenako.'
mg1865::mg_51::4::5:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana amin''ny fahendrena amin''izay ao ivelany, hararaoty ny andro azo anaovan-tsoa.'
mg1865::mg_51::4::6:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny fiteninareo ho amin''ny fahasoavana mandrakariva, ho mamy sira, mba ho fantatrareo izay tokony havalinareo ny olona rehetra.'
mg1865::mg_51::4::7:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny toetro rehetra dia holazain''i Tykiko aminareo, dia ilay rahalahy malala sy mpanompo mahatoky ary namako manompo ao amin''ny Tompo;'
mg1865::mg_51::4::8:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny anton''ny nanirahako azy ho aty aminareo indrindra dia ny hahafantaranareo ny toetray, sy ny mba hamporisihany ny fonareo;'
mg1865::mg_51::4::9:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Onesimosy, rahalahy mahatoky sy malala izay avy aminareo, dia nirahiko koa. Izy roa lahy hampahafantatra anareo ny zavatra rehetra aty .'
mg1865::mg_51::4::10:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao-veloma anareo Aristarko, mpiara-mifatotra amiko, sy Marka, havan''i Barnabasy (ny aminy dia efa nandidiana anareo, ka raha tonga aty aminareo izy, dia raiso),'
mg1865::mg_51::4::11:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jesoa, izay atao hoe Josto, avy amin''ny voafora ireo. Ireo ihany no mpiara-miasa amiko hampandroso ny fanjakan''Andriamanitra sady tonga fampiononana ahy.'
mg1865::mg_51::4::12:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao veloma anareo Epafra, ilay anankiray avy aminareo sady mpanompon''i Kristy Jesoa ary mikely aina mandrakariva amin''ny fangatahana ho anareo, mba hitoeranareo marina, ka hatoky tsara* amin''izay rehetra mety ho sitrapon''Andriamanitra. [*Na: ho tanteraka]'
mg1865::mg_51::4::13:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vavolombelony aho fa mikely aina fatratra ho anareo sy ho an''ny any Laodikia ary ho an''ny any Hierapolia izy.'
mg1865::mg_51::4::14:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao veloma anareo Lioka malala, mpanao fanafody, sy Demasy.'
mg1865::mg_51::4::15:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova veloma ny rahalahy any Laodikia ary Nymfa sy ny fiangonana ao an-tranony.'
mg1865::mg_51::4::16:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voavaky aty aminareo ity epistily ity, dia asaovy hovakina ao amin''ny fiangonan*''ny Laodikiana koa; ary vakionareo kosa ilay avy amin''ny Laodikiana. [*Grika: eklesia]'
mg1865::mg_51::4::17:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''i Arkipo hoe: Tandremo ny fanompoana izay noraisinao tao amin''ny Tompo mba hahatanterahanao izany.'
mg1865::mg_51::4::18:
  verse_version: mg1865
  verse_book: mg_51
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no veloma ataon''ny tanako, izaho Paoly. Tsarovy ny fifatorako. Ho aminareo anie ny fahasoavana.'
