mg1865::mg_64::1::1:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana an''i Gaio noho ny nandraisany vahiny, sy filazana ny amin''i Diotrefa sy Demetrio'
  verse_text: 'Izaho loholona* mamangy an''i Gaio, ilay malala, izay tiako amin''ny fahamarinana. [*Grika: Ny presbytera]'
mg1865::mg_64::1::2:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, mangataka aho mba hambinina sy ho salama amin''ny zavatra rehetra anie ianao, tahaka izay anambinana ny fanahinao ihany.'
mg1865::mg_64::1::3:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa faly indrindra aho, fony nisy rahalahy tonga ka nanambara ny fahamarinanao, dia toy ny andehananao araka ny fahamarinana.'
mg1865::mg_64::1::4:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manana fifaliana mihoatra noho izao aho, dia ny andrenesako fa mandeha araka ny fahamarinana ny zanako.'
mg1865::mg_64::1::5:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, manao asa mahatoky ianao na amin''inona na amin''inona ataonao amin''ireo rahalahy ireo, na dia vahiny aza izy,'
mg1865::mg_64::1::6:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nanambara ny fitiavanao teo anatrehan''ny fiangonana*; dia ho soa no ataonao, raha mamoaka azy koa araka izay miendrika hatao noho ny amin''Andriamanitra ianao; [*Grika: eklesia]'
mg1865::mg_64::1::7:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa noho ny Anarana no niaingany, ka tsy naka na inona na inona tamin''ny jentilisa izy.'
mg1865::mg_64::1::8:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa isika dia tokony handray tsara izay toy izany, mba ho mpiara-miasa aminy amin''ny fahamarinana.'
mg1865::mg_64::1::9:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanoratra tamin''ny fiangonana* Ihany aho; nefa Diotrefa, izay te-ho lohany, dia tsy mba mandray anay. [*Grika: eklesia]'
mg1865::mg_64::1::10:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, raha tonga aho, dia hotsarovako izay asa ataony, fa mibedibedy foana manaratsy anay izy; ary tsy afa-po amin''izany ihany, fa ny tenany dia tsy mandray ireo rahalahy ireo, ary izay ta-handray azy dia raràny sy roahiny hiala amin''ny fiangonana*. [*Grika: eklesia]'
mg1865::mg_64::1::11:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, aza ny ratsy no alain-tahaka, fa ny tsara. Izay manao ny tsara no avy amin''Andriamanitra; fa izay manao ny ratsy tsy mba nahita an''Andriamanitra.'
mg1865::mg_64::1::12:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Demetrio dia tsara laza amin''ny olona rehetra sy amin''ny fahamarinana koa; ary izahay koa manambara izany, ary fantatrao fa marina ny fanambaranay.'
mg1865::mg_64::1::13:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanana zavatra maro hosoratana aho, nefa tsy tiako hosoratana aminao amin''ny ranomainty sy ny penina*; [*Grika: volotara]'
mg1865::mg_64::1::14:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa manantena hahita anao faingana ihany aho, dia hiteny mifanatrika isika.'
mg1865::mg_64::1::15:
  verse_version: mg1865
  verse_book: mg_64
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho aminao anie ny fiadanana. Ny sakaiza aty manao veloma anao. Veloma amin''ny sakaiza tsirairay araka ny anarany avy.'
