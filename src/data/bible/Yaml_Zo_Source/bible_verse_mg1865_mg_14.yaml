mg1865::mg_14::1::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanatitra nataon''i Solomona, ary nisehoan''Andriamanitra taminy tao Gibeona'
  verse_text: 'Ary Solomona, zanak''i Davida, dia nitombo hery tamin''ny fanjakany, ary Jehovah Andriamaniny nomba azy ka nanandratra azy indrindra.'
mg1865::mg_14::1::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nandidy ny Isiraely rehetra, dia mpifehy arivo sy mpifehy zato sy mpitsara ary loham-pirenena rehetra tamin''ny Isiraely, dia lohan''ny fianakaviana,'
mg1865::mg_14::1::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: '2022-10-07T05:28:24+0000'
  verse_title: null
  verse_text: 'ka dia niara-niakatra ho any amin''ny fitoerana avo tao Gibeona Solomona sy ny fiangonana rehetra; fa tao ilay trano-lay fihaonana izay an''Andriamanitra, ilay nataon''i Mosesy, mpanompon''i Jehovah, tany an''efitra.'
mg1865::mg_14::1::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: '2022-10-07T05:34:51+0000'
  verse_title: null
  verse_text: 'Fa ny fiaran''Andriamanitra efa nampakarin''i Davida avy tany Kiriata-jearima ho ao amin''izay efa namboariny ho azy; fa efa nanorina lay ho azy tany Jerosalema izy.'
mg1865::mg_14::1::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: '2022-10-07T05:34:37+0000'
  verse_title: null
  verse_text: 'Ary ny alitara varahina izay nataon''i Bezalila, zanak''i Ory zanak''i Hora, dia teo anoloan''ny tabernakelin''i Jehovah; ary Solomona sy ny fiangonana nitady Azy* tao. [*Na: azy]'
mg1865::mg_14::1::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanatitra fanatitra teo amin''ny alitara varahina teo anatrehan''i Jehovah, izay momba ny trano-lay fihaonana; fanatitra dorana arivo no nateriny teo.'
mg1865::mg_14::1::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny alin''iny no nisehoan''Andriamanitra tamin''i Solomona, ka hoy Izy taminy: Angataho izay tianao homeko anao.'
mg1865::mg_14::1::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Solomona tamin''Andriamanitra: Ianao efa naneho fahasoavana lehibe tamin''i Davida raiko ary nampanjaka ahy handimby azy.'
mg1865::mg_14::1::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, ry Jehovah Andriamanitra o. aoka ho tanteraka teninao tamin''i Davida raiko; fa Ianao efa nampanjaka ahy tamin''ny vahoaka maro be tahaka ny vovo-tany.'
mg1865::mg_14::1::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa omeo fahendrena sy fahalalana aho hitarihako ireto vahoaka ireto mivoaka sy miditra; fa iza no hahay mitsara izao olonao betsaka izao?'
mg1865::mg_14::1::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Andriamanitra tamin''i Solomona: Satria tao am-ponao izany ka tsy nangataka vola aman-karena ianao, na voninahitra, na ain''ny fahavalonao, ary tsy nangataka ho ela velona aza, fa nangataka fahendrena sy fahalalana hitsaranao ny oloko izay nampanjakako anao,'
mg1865::mg_14::1::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia omena anao ny fahendrena sy fahalalana; ary homeko vola aman-karena sy voninahitra koa ianao, mihoatra noho izay nananan''ny mpanjaka rehetra na iza na iza tany alohanao, ary tsy hisy hanana tahaka izany ny any aorianao.'
mg1865::mg_14::1::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany Jerosalema Solomona avy teo amin''ny fitoerana avo tao Gibeona, dia teo anoloan''ny trano-lay fihaonana; ary nanjaka tamin''ny Isiraely izy.'
mg1865::mg_14::1::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny amin''ny nanangonan''i Solomona soavaly aman-kalesy mbamin''ny harena be'
  verse_text: 'Ary Solomona nanangona kalesy sy mpitaingin-tsoavaly ka nanana kalesy efa-jato amby arivo sy mpitaingin-tsoavaly roa arivo sy iray alina, izay nataony tany amin''ireny tanàna fitoeran''ny kalesy ary tao amin''ny mpanjaka tany Jerosalema.'
mg1865::mg_14::1::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''ny mpanjaka ho tahaka ny vato ny habetsaky ny volafotsy sy ny volamena tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy eny amin''ny tany lemaka amoron-tsiraka*. [*Hebreo: Sefela]'
mg1865::mg_14::1::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tany Egypta no nahazoan''i Solomona soavaly; ary ny iray toko tamin''ny mpandranton''ny mpanjaka dia naka andiany iray araka izay vidiny voatendry.'
mg1865::mg_14::1::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vidin''ny kalesy iray nentiny niakatra avy tany Egypta dia sekely volafotsy enin-jato, ary ny soavaly dia dimam-polo amby zato avy; ary toy izany koa no nitondrany ho an''ny mpanjakan''ny Hetita sy ny mpanjakan''ny Syriana.'
mg1865::mg_14::1::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny niomanan''i Solomona hanao ny tempoly'
  verse_text: 'Ary Solomona nilaza fa hanao trano ho an''ny anaran''i Jehovah sy lapa ho an''ny tenany.'
mg1865::mg_14::2::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanisa olona fito alina ho mpitondra entana Solomona ary valo alina ho mpikapa hazo eny an-tendrombohitra ary enin-jato amby telo arivo ho mpifehy azy.'
mg1865::mg_14::2::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona naniraka hankany amin''i Hirama, mpanjakan''i Tyro, hanao hoe: Tahaka ny nataonao tamin''i Davida raiko, raha nampanatitra hazo sedera ho azy hanaovany trano hitoerany ianao,'
mg1865::mg_14::2::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: '2022-06-07T05:11:17+0000'
  verse_title: null
  verse_text: 'indro, izaho efa hanao trano ho an''ny anaran''i Jehovah Andriamanitro izay hohamasinina ho Azy ka handoroana ditin-kazo mani-pofona eo anatrehany sy hasiana ny mofo aseho mandrakariva ary handoroana ny fanatitra isa-maraina sy isan-kariva ary amin''ny Sabata sy ny voaloham-bolana ary amin''ny fotoam-pivavahana voatendrin''i Jehovah Andriamanitray; ho adidin''ny Isiraely mandrakizay izany.'
mg1865::mg_14::2::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano efa hataoko dia lehibe, satria lehibe noho ny andriamanitra rehetra ny Andriamanitray.'
mg1865::mg_14::2::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa iza no mahay manao trano ho Azy? Fa ny lanitra ary ny lanitry ny lanitra aza tsy omby Azy. Ka iza moa aho, no hanao trano ho Azy, afa-tsy ny handoroana ditin-kazo manitra eo anatrehany ihany?'
mg1865::mg_14::2::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aniraho olon-kendry aho hiasa volamena sy volafotsy sy varahina sy vy sy volomparasy sy jaky ary manga, ary izay mahay misokitra manao sarin-javatra mba hiara-manao amin''ny olo-mahay zavatra izay aty amiko aty Joda sy Jerosalema, izay efa nomanin''i Davida raiko.'
mg1865::mg_14::2::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary anatero hazo sedera sy kypreso ary almoga avy any Libanona koa aho; fa fantatro fa mahay mikapa hazo any Libanona ny vahoakanao; ary, indro, ny vahoakako hiaraka amin''ny vahoakanao'
mg1865::mg_14::2::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanamboatra hazo betsaka ho ahy; fa ny trano izay efa hataoko dia ho lehibe higagana.'
mg1865::mg_14::2::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, homeko vary tritika voafotsy sy vary hordea roa alina kora avy ary divay sy diloilo roa alina bata avy ny vahoakanao mpikapa hazo.'
mg1865::mg_14::2::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hirama, mpanjakan''i Tyro, tamin''ny taratasy izay nampanateriny ho any amin''i Solomona: Noho ny fitiavan''i Jehovah ny olony no nanendreny anao ho mpanjakany.'
mg1865::mg_14::2::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Hirama: Isaorana anie Jehovah, Andriamanitry ny Isiraely, Izay nanao ny lanitra sy ny tany, noho ny nanomezany an''i Davida zanaka hendry, izay manana fahendrena sy fahalalana, ka hanao trano ho an''i Jehovah sy lapa ho an''ny tenany izy.'
mg1865::mg_14::2::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, indro, maniraka olona mahay zavatra sady manana fahalalana aho, dia Hiram-aby*, [*Na: Ikaky Hirama]'
mg1865::mg_14::2::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanaky ny vehivavy Danita sy ny lehilahy Tyriana. Ary izy dia mahay miasa volamena sy volafotsy sy varahina sy vy sy vato sy hazo sy volomparasy sy manga sy rongony fotsy madinika ary jaky; ary mahay misokitra manao sarin-javatra samy hafa sy mahay manao marika amin''izay asa rehetra asaina ataony, ka dia hiara-manao amin''ny olon-kendrinao sy ny olon-kendrin''itompokolahy Davida rainao Izy.'
mg1865::mg_14::2::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vary tritika sy ny vary hordea ary ny diloilo sy ny divay, izay nolazainao, tompokolahy dia aoka hampanaterina ho aty aminay mpanomponao;'
mg1865::mg_14::2::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay dia hikapa hazo any Libanona araka izay rehetra tadiavinao; ary hofehezinay ka hampandehaninay mitsinkafona amin''ny ranomasina ho any Jopa; ary ianao kosa no hitondra azy miakatra hankany Jerosalema.'
mg1865::mg_14::2::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: '2022-10-07T05:28:01+0000'
  verse_title: null
  verse_text: 'Ary Solomona nanisa ny lehilahy hafa firenena rehetra izay nonina tamin''ny tanin''ny Isiraely araka ny nanisan''i Davida rainy azy, ary ny isany dia enin-jato amby telo arivo amby dimy alina sy iray hetsy.'
mg1865::mg_14::2::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fito alina tamin''ireo dia nataony mpitondra entana, ary ny valo alina nataony mpikapa hazo eny an-tendrombohitra, ary ny enin-jato amby telo arivo nataony mpifehy hampiasa ny olona.'
mg1865::mg_14::3::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanaovana ny tempoly sy ny fanaka momba azy'
  verse_text: 'Ary Solomona nanomboka nanao ny tranon''i Jehovah tany Jerosalema, tao an-tendrombohitra Moria, ilay nisehoan''i Jehovah tamin''i Davida rainy, dia ilay namboarina teo amin''ny fitoerana nofidin''i Davida teo amin''ny famoloan''i Araona Jebosita.'
mg1865::mg_14::3::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanomboka nanao ny trano izy tamin''ny andro faharoa tamin''ny volana faharoa tamin''ny taona fahefatra nanjakany.'
mg1865::mg_14::3::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izao no nanorenan''i Solomona ny tranon''Andriamanitra: Ny lavany, raha araka ny hakiho taloha, dia enim-polo hakiho, ary ny sakany roa-polo hakiho.'
mg1865::mg_14::3::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny lavarangana fidirana izay teo anoloany, ny lavany dia roa-polo hakiho, dia araka ny sakan''ny trano ihany, ary ny hahavony dia roa-polo amby zato hakiho; ary nopetahany takela-bolamena tsara ny ao anatiny.'
mg1865::mg_14::3::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ati-trano lehibe nopetahany hazo kypreso, dia vao nopetahany takela-bolamena tsara ireo ary noravahany hazo rofia* sy tongalika. [*palma]'
mg1865::mg_14::3::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noravahany vato soa koa ny trano; ary ny volamena dia volamena avy any Parvaima.'
mg1865::mg_14::3::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopetahany takela-bolamena ny trano, dia ny rairainy sy ny tokonany sy ny rindriny ary ny lela-varavarany; ary nosoratany nasiany sarin''ny kerobima ny rindrina.'
mg1865::mg_14::3::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny efi-trano masina indrindra izy: ny lavany dia roa-polo hakiho mifanerana amin''ny sakan''ny trano, ary roa-polo hakiho koa ny sakany; ary nopetahany takela-bolamena tsara talenta enin-jato izy'
mg1865::mg_14::3::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lanjan''ny hombo volamena dia sekely dimam-polo. Ary ny efi-trano ambony nopetahany volamena koa.'
mg1865::mg_14::3::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao amin''ny efi-trano masina indrindra dia nasiany sarin''ny kerobima roa, ary nosokiriny no nanaovany azy, dia nopetahany takela-bolamena.'
mg1865::mg_14::3::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny halavan''ny elatry ny kerobima dia roa-polo hakiho: ny elatry ny anankiray dia dimy hakiho, mipaka amin''ny rindrina; ary ny elany iray koa dimy hakiho sady mifanendry amin''ny elatry ny kerobima anankiray;'
mg1865::mg_14::3::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny elatry ny kerobima anankiray koa dia dimy hakiho, mipaka amin''ny rindrina; ary ny elany iray koa dimy hakiho sady mifanendry amin''ny elatry ny kerobima anankiray.'
mg1865::mg_14::3::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nivelatra ny elatr''ireo kerobima Ireo. ka roa-polo hakiho ny halavany; nijoro tamin''ny tongony, tarehiny nanatrika ny trano.'
mg1865::mg_14::3::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanao ny efitra lamba tamin''ny manga sy volomparasy sy jaky sy rongony fotsy madinika; ary nataony sarin''ny kerobima ny sorany.'
mg1865::mg_14::3::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: '2022-10-07T05:27:18+0000'
  verse_title: null
  verse_text: 'Ary nanao andry roa teo anoloan''ny trano izy; dimy amby telo-polo hakiho ny hahavony, ary ny kapitaly teo an-tampony dia dimy hakiho avy.'
mg1865::mg_14::3::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tongalika tao amin''ny efitra anatiny izy, ka nataony teo an-tampon''ny andry ireo; ary nanao sarin''apongaben-danitra zato izy, ka nataony teo amin''ny tongalika ireo.'
mg1865::mg_14::3::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: '2022-10-07T05:26:23+0000'
  verse_title: null
  verse_text: 'Ary ny andry natsangany teo anoloan''ny tempoly, ny iray tamin''ny ankavanana, ary ny iray tamin''ny ankavia; ary ny anaran''ny teo amin''ny ankavanana nataony hoe Jakina*, ary ny anaran''ny teo amin''ny ankavia kosa nataony hoe Boaza**. [*Jakina = Hampiorina izy] [**Boaza = Ao aminy no misy hery (?)]'
mg1865::mg_14::4::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao alitara varahina izy: roa-polo hakiho ny lavany, roa-polo hakiho koa ny sakany, ary folo hakiho ny hahavony.'
mg1865::mg_14::4::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny tavin-drano* an-idina boribory lehibe izy: folo hakiho no halehiben''ny vavany, dimy hakiho ny hahavony, ary telo-polo hakiho ny manodidina azy. [*Hebreo: ranomasina]'
mg1865::mg_14::4::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ambanin''ny tavin-drano lehibe* nisy sarin''omby manodidina azy, dia folo amin''ny iray hakiho manodidina. Roa andalana ny sarin''omby sady niara-natao an-idina tamin''ny tavin-drano. . [*Hebreo: ranomasina]'
mg1865::mg_14::4::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tavin-drano dia nipetraka tambonin''ny sarin''omby roa ambin''ny folo: ny telo nanatrika ny avaratra ny telo nanatrika ny andrefana, ny telo nanatrika ny atsimo, ary ny telo nanatrika ny atsinanana; ny tavin-drano lehibe* dia teo amboniny, ary niady vody izy rehetra. [*Hebreo: ranomasina]'
mg1865::mg_14::4::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hateviny dia vodivoam-pelatanana, ary ny molony nataony tahaka ny molotry ny kapoaka, dia tahaka ny vonin''ny lilia; ary mahalany telo arivo bata izy.'
mg1865::mg_14::4::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tavin-drano folo koa izy hanasana, ny dimy nataony tamin''ny ankavanana, ary ny dimy tamin''ny ankavia; ary ny zavatra hatao fanatitra dorana dia nakobaka teo; fa ny tavin-drano lehibe* kosa dia fisasan''ny mpisorona. [*Hebreo: ranomasina]'
mg1865::mg_14::4::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny fanaovan-jiro volamena folo araka ny marika izy, dia napetrany tao amin''ny tempoly, dimy teo amin''ny ankavanana, ary dimy teo amin''ny ankavia.'
mg1865::mg_14::4::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao latabatra folo koa izy, dia napetrany tao amin''ny tempoly, dimy teo amin''ny ankavanana, ary dimy teo amin''ny ankavia. Ary nanao lovia volamena zato famafazana izy.'
mg1865::mg_14::4::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: '2022-10-07T05:26:37+0000'
  verse_title: null
  verse_text: 'Ary nanao ny kianjan''ny mpisorona sy ny kianja lehibe sy ny lela-vavahadin''ny kianja izy, ary nopetahany takela-barahina ny lela-vavahady.'
mg1865::mg_14::4::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: '2022-10-07T05:26:53+0000'
  verse_title: null
  verse_text: 'Ary ny tavin-drano lehibe* nataony tamin''ny ankavanana, dia teo amin''ny atsimo-atsinanana. [*Hebreo: ranomasina]'
mg1865::mg_14::4::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama nanao ny vilany fandraofan-davenona sy ny sotron''afo ary ny lovia famafazana. Dia vitan''i Hirama ny asa izay nataony ho an''i Solomona mpanjaka ho amin''ny tranon''Andriamanitra:'
mg1865::mg_14::4::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny andry roa sy ny boriboriny sy ny kapitaliny izay teny an-tampon''ny andry roa sy ny harato roa hafono ny boriboriny roa momba ny kapitaly izay teo an-tampon''ny andry avy,'
mg1865::mg_14::4::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sarin''ampongaben-danitra efa-jato ho amin''ny harato roa, sarin''ampongabendanitra roa andalana ho amin''ny harato iray hafono ny boribory roa momba ny kapitaly izay teo an-tampon''ny andry avy;'
mg1865::mg_14::4::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao ireo fitoeran-tavin-drano izy, ary ny tavin-drano nataony teo amin''ny fitoerany;'
mg1865::mg_14::4::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tavin-drano lehibe* iray sy ny sarin''omby roa ambin''ny folo; ambaniny. [*Hebreo: ranomasina]'
mg1865::mg_14::4::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vilany fandraofan-davenona sy ny sotron''afo sy ny fitrebika ary ny fanaka rehetra momba azy dia nataon''i Hiram-aby* ho an''i Solomona mpanjaka ho amin''ny tranon''i Jehovah tamin''ny varahina manganohano. [*Na: Ikaky Hirama]'
mg1865::mg_14::4::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny tany amoron''i Jordana no nanaovan''ny mpanjaka an-idina azy tamin''ny tanimanga teo anelanelan''i Sokota sy Zaretana.'
mg1865::mg_14::4::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nanaovan''i Solomona ireo fanaka rehetra rehetra ireo; fa tsy nozahana Izay lanjan''ny varahina.'
mg1865::mg_14::4::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanao ny fanaka rehetra izay tao amin''ny tranon''Andriamanitra: ny alitara volamena sy ny latabatra fitoeran''ny mofo aseho,'
mg1865::mg_14::4::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: '2022-10-07T05:26:05+0000'
  verse_title: null
  verse_text: 'ary ny fanaovan-jiro sy ny lela fanaovan-jirony mba hampirehetina eo anoloan''ny efitra anatiny araka ny fanao dia samy volamena tsara;'
mg1865::mg_14::4::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny voniny sy ny lela fanaovan-jiro ary ny hetin-jiro dia samy volamena tsara indrindra avokoa;'
mg1865::mg_14::4::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny antsy sy ny lovia famafazana sy ny lovia kely sy ny fitoeran-davenon-jiro dia samy volamena tsara; ary ny lela-varavarana teo anatin''ny trano, dia ny mankao amin''ny fitoerana masina indrindra, sy ny lela-varavarana ho amin''ny ati-trano lehibe dia samy volamena avokoa.'
mg1865::mg_14::5::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nahavitana ny asa rehetra nataon''i Solomona ho amin''ny tranon''i Jehovah; ary nampidirin''i Solomona ny zavatra rehetra izay efa nohamasinin''i Davida rainy dia ny volafotsy sy ny volamena; ary ny fanaka rehetra dia nataony tao amin''ny rakitry ny tranon''Andriamanitra.'
mg1865::mg_14::5::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny nitokanana ny tempoly'
  verse_text: 'Ary tamin''izany dia novorin''i Solomona ny loholon''ny Isiraely sy ny lehiben''ny firenena rehetra, dia ny lohan''ny fianakavian''ny Zanak''isiraely ho any Jerosalema hampakatra ny fiaran''ny faneken''i Jehovah avy any Ziona, Tanànan''i Davida.'
mg1865::mg_14::5::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivory ho any amin''ny mpanjaka ny lehilahy rehetra amin''ny Isiraely tamin''ny andro firavoravoana tamin''ny volana fahafito.'
mg1865::mg_14::5::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga koa ny loholon''ny Isiraely rehetra, ka ny Levita no nitondra ny fiara,'
mg1865::mg_14::5::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nampakariny ny fiara sy ny trano-lay fihaonana ary ny fanaka masina rehetra izay tao amin''ny lay. Nampakarin''ny Levita mpisorona ireo zavatra ireo.'
mg1865::mg_14::5::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka sy ny fiangonana, dia ny Isiraely rehetra, izay nivory teo aminy teo anoloan''ny fiara, dia samy namono zavatra hatao fanatitra, dia ondry aman''osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany.'
mg1865::mg_14::5::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiaran''ny faneken''i Jehovah dia nampidirin''ny mpisorona ho ao amin''ny fitoerany tao anatin''ny efi-trano anatiny, dia ny fitoerana masina indrindra, teo ambanin''ny elatry ny kerobima;'
mg1865::mg_14::5::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nivelatra tambonin''ny fitoeran''ny fiara ny elatry ny kerobima ka nanaloka ny fiara sy ny baony.'
mg1865::mg_14::5::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: '2022-10-07T05:25:48+0000'
  verse_title: null
  verse_text: 'Ary lava ny bao, ka hita ny lohany, raha eo amin''ny fiara eo anoloan''ny efitra anatiny nefa tsy hita eny ivelany, ary mbola ao mandraka androany izy.'
mg1865::mg_14::5::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy na inona na inona tao anatin''ny fiara afa-tsy ny vato fisaka roa ihany izay nataon''i Mosesy tao anatiny fony tany Horeba, tamin''i Jehovah nanao fanekena tamin''ny Zanak''isiraely, tamin''ny nivoahany avy tany Egypta.'
mg1865::mg_14::5::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nivoaka avy tao amin''ny fitoerana masina ny mpisorona (fa ny mpisorona rehetra izay teo dia samy efa nanamasina ny tenany, fa tsy mba nifandimby isan-toko taminy izay),'
mg1865::mg_14::5::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: '2022-10-07T05:25:57+0000'
  verse_title: null
  verse_text: 'ary ny Levita mpihira rehetra, dia Asafa sy Hemana sy Jedotona mbamin''ny zanany sy ny rahalahiny, izay nitafy rongony fotsy madinika sady nitondra kipantsona sy valiha ary lokanga, dia nitsangana teo atsinanan''ny alitara, ary teo aminy koa nisy pisorona roa-polo amby zato nitsoka trompetra;'
mg1865::mg_14::5::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa toy ny feo iray no fandrenesana ny mpitsoka trompetra sy ny mpihira, raha nidera sy nisaotra an''i Jehovah izy; ka nony nanandratra ny feony izy sady nampaneno ny trompetra sy ny kipantsona sy ny zava-maneno isan-karazany ka nidera an''i Jehovah fa tsara Izy, fa mandrakizay ny famindram-pony, dia feno rahona ny tranon''i Jehovah;'
mg1865::mg_14::5::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona; fa feno ny voninahitr''i Jehovah ny tranon''Andriamanitra.'
mg1865::mg_14::6::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Solomona: Jehovah efa nilaza fa hitoetra ao amin''ny aizim-pito Izy.'
mg1865::mg_14::6::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izaho efa nanao trano hitoeranao tokoa, dia fitoerana hitoeranao mandrakizay.'
mg1865::mg_14::6::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nitodika ka nitso-drano ny fiangonana, dia ny Isiraely rehetra (nitsangana avokoa ny fiangonana, dia ny Isiraely rehetra),'
mg1865::mg_14::6::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely, fa ny vavany efa niteny tamin''i Davida raiko, ary ny tanany no nahatanteraka izany taminy, dia ilay hoe:'
mg1865::mg_14::6::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny andro nitondrako ny oloko nivoaka avy tany Egypta dia tsy mbola nisy tanàna nofidiko tamin''ny firenen''isiraely rehetra hanaovana trano mba hitoeran''ny anarako; ary tsy nisy olona nofidiko ho mpanapaka ny Isiraely oloko;'
mg1865::mg_14::6::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nifidy an''i Jerosalema Aho hitoeran''ny anarako, ary nifidy an''i Davida Aho hanapaka ny Isiraely oloko.'
mg1865::mg_14::6::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa mby tao am-pon''i Davida raiko ny hanao trano ho an''ny anaran''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_14::6::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy Jehovah tamin''i Davida raiko: Satria tao am-ponao ny fikasana hanao trano ho an''ny anarako, dia tsara izany fikasanao izany.'
mg1865::mg_14::6::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy ianao no hanao ny trano, fa ny zanakao izay haterakao, izy no hanao ny trano ho an''ny anarako.'
mg1865::mg_14::6::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah efa nahatanteraka ny teniny izay nolazainy, koa nitsangana handimby an''i Davida raiko aho ary mipetraka amin''ny seza fiandrianan''ny Isiraely tahaka ny efa nolazain''i Jehovah, sady efa nanao ny trano ho an''ny anaran''i Jehovah, Andriamanitry ny Isiraely, aho.'
mg1865::mg_14::6::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary napetrako tao ny fiara izay itoeran''ny faneken''i Jehovah, ilay nataony tamin''ny Zanak''isiraely.'
mg1865::mg_14::6::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nitsangana teo anoloan''ny alitaran''i Jehovah teo anatrehan''ny fiangonana, dia ny Isiraely rehetra, ka namelatra ny tanany'
mg1865::mg_14::6::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nanao fitaingenana varahina izy, ary napetrany teo afovoan''ny kianja io (dimy hakiho ny lavany, ary dimy hakiho ny sakany, ary telo hakiho ny hahavony) dia nitsangana teo amin''io izy ka nandohalika teo anatrehan''ny fiangonana, dia ny Isiraely rehetra, ary namelatra ny tanany manandrify ny lanitra'
mg1865::mg_14::6::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Ry Jehovah, Andriamanitry ny Isiraely o, tsy misy Andriamanitra tahaka Anao, na any an-danitra na ety an-tany, Izay mitandrina ny fanekenao sy ny famindram-ponao ho an''ny mpanomponao izay mandeha eo anatrehanao amin''ny fony rehetra,'
mg1865::mg_14::6::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa nahatanteraka tamin''i Davida raiko mpanomponao ilay nolazainao taminy; fa nolazain''ny vavanao izany, dia notanterahin''ny tananao tahaka ny amin''izao anio izao.'
mg1865::mg_14::6::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tanteraho amin''i Davida raiko mpanomponao, Jehovah, Andriamanitry ny Isiraely o, ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako ianao hipetraka amin''ny seza fiandrianan''ny Isiraely, raha ny zanakao mitandrina ny alehany ka mankatò ny lalàko tahaka ny nandehananao teo anatrehako.'
mg1865::mg_14::6::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: '2022-10-13T07:24:56+0000'
  verse_title: null
  verse_text: 'Koa ankehitriny, ry Jehovah, Andriamanitry ny Isiraely o, mifona aminao aho, aoka ho to anie ny teninao, izay nolazainao tamin''i Davida mpanomponao.'
mg1865::mg_14::6::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra va dia honina amin''ny olona ety an-tany tokoa? He! ny lanitra, ary ny lanitry ny lanitra aza, tsy omby Anao, koa mainka fa ity trano nataoko ity!'
mg1865::mg_14::6::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa atreho ny fivavaka sy ny fifonan''ny mpanomponao, Jehovah Andriamanitro o, mba hohenoinao ny fitarainana sy ny fivavaka izay ataon''ny mpanomponao eto anatrehanao,'
mg1865::mg_14::6::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hihiratan''ny masonao andro aman''alina amin''ity trano ity, dia amin''ny fitoerana nolazainao hoe: Ao no hasiako ny anarako, hihainoanao ny vavaka izay ataon''ny mpanomponao manatrika ity fitoerana ity.'
mg1865::mg_14::6::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary henoy ny fifonan''ny mpanomponao sy ny Isiraely olonao, raha mivavaka manatrika ity fitoerana ity izy; dia mihainoa any an-danitra fonenanao Ianao; eny, mihainoa, ka mamelà heloka.'
mg1865::mg_14::6::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona manota amin''ny namany, ary ampianianiny, ka tonga hianiana eo anoloan''ny alitaranao amin''ity trano ity izy,'
mg1865::mg_14::6::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra Ianao, ka manaova, ary mitsarà ny mpanomponao, hamaly ny ratsy fanahy ka hampitsingerina ny nataony ho amin''ny lohany, ary hanamarina ny marina kosa ka hanome azy araka ny fahamarinany.'
mg1865::mg_14::6::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha resy eo anoloan''ny fahavalo ny Isiraely olonao noho ny nanotany taminao, ary miverina sy manaiky ny anaranao indray ka mivavaka sy mifona eto anatrehanao amin''ity trano ity izy,'
mg1865::mg_14::6::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra, Ianao, ka mamelà ny fahotan''ny Isiraely olonao, ary ampodio amin''ny tany nomenao azy sy ny razany izy.'
mg1865::mg_14::6::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mihantona ny andro, ka tsy misy ranonorana noho ny nanotan''ny olona taminao, ary mivavaka manatrika ity fitoerana ity izy ka manaiky ny anaranao sady miala amin''ny fahotany, satria ampahorinao,'
mg1865::mg_14::6::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra Ianao, ka mamelà ny fahotan''ny mpanomponao, dia ny Isiraely olonao, satria atoronao azy ny lalana tsara izay tokony halehany, ary mandatsaha ranonorana amin''ny taninao, izay nomenao ho lovan''ny olonao.'
mg1865::mg_14::6::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mosary amin''ny tany, na areti-mandringana, na mainan''ny rivotra ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin''ny taniny, dia ao amin''ny tanànany, na inona fahoriana, na inona aretina,'
mg1865::mg_14::6::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay vavaka rehetra sy fifonana rehetra ataon''olona, na ny Isiraely olonao rehetra, izay samy mahalala ny fahoriany sy ny alahelony avy, ka mamelatra ny tanany manatrika ity trano ity izy,'
mg1865::mg_14::6::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra fonenanao Ianao, ka mamelà heloka, ka omeo ny olona araka ny alehany rehetra, fa fantatrao ny fony (fa Ianao dia Ianao irery ihany no mahalala ny fon''ny zanak''olombelona,)'
mg1865::mg_14::6::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hatahorany Anao sy handehanany amin''ny lalanao amin''izay andro rehetra hiainany ety amin''ny tany nomenao ny razanay.'
mg1865::mg_14::6::32:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary henoy koa ny vahiny izay tsy isan''ny Isiraely olonao, fa tonga avy any amin''ny tany lavitra noho ny amin''ny anaranao lehibe sy ny tananao mahery ary ny sandrinao ahinjitra, koa raha avy izy ka mivavaka manatrika ity trano ity,'
mg1865::mg_14::6::33:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra fonenanao Ianao, ka manaova araka izay rehetra iantsoan''ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin''ny tany ny anaranao, hatahorany Anao tahaka ny ataon''ny Isiraely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina tamin''ity trano nataoko ity.'
mg1865::mg_14::6::34:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoaka hiady amin''ny fahavalony ny olonao, na ho aiza na ho aiza no hanirahanao azy, ka mivavaka aminao manandrify ity tanana izay nofidinao ity sy ny trano izay nataoko ho an''ny anaranao izy,'
mg1865::mg_14::6::35:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia henoy any an-danitra ny fivavany sy ny fifonany, ka omeo rariny izy.'
mg1865::mg_14::6::36:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manota aminao izy (fa tsy misy olombelona tsy manota), ka tezitra aminy Ianao ary manolotra azy eo anoloan''ny fahavalony, ka dia entin''ny mpamabo ho babo any amin''ny tany na ho lavitra na ho akaiky izy,'
mg1865::mg_14::6::37:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mahatsiaro any amin''ny tany nitondrana azy ho babo izy ka mibebaka sy mifona aminao any amin''ny tany izay nitondrana azy ho babo ary manao hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao ratsy,'
mg1865::mg_14::6::38:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia miverina aminao amin''ny fony rehetra sy ny fanahiny rehetra izy ao amin''ny tany nitondrana azy ho babo ary mivavaka manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay nataoko ho an''ny anaranao,'
mg1865::mg_14::6::39:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 39
  verse_date_revised: '2022-10-13T07:24:30+0000'
  verse_title: null
  verse_text: 'dia henoy any an-danitra fonenanao ny fivavany sy ny fifonany ka omeo rariny izy; ary mamelà ny olonao izay efa nanota taminao.'
mg1865::mg_14::6::40:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 40
  verse_date_revised: '2022-10-13T07:24:50+0000'
  verse_title: null
  verse_text: 'Ankehitriny, ry Andriamanitro o, mifona aminao aho, aoka hihiratra ny masonao, ary aoka ny sofinao hihaino ny vavaka atao amin''ity fitoerana ity.'
mg1865::mg_14::6::41:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny mitsangàna, ry Jehovah Andriamanitra o, ho amin''ny fitsaharanao, dia Ianao sy ny fiaran''ny herinao; aoka ny mpisoronao hitafy famonjena, Jehovah Andriamanitra o. ary aoka ny olonao masina hifaly amin''ny soa.'
mg1865::mg_14::6::42:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 6
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jehovah Andriamanitra o, aza lavinao ny voahosotrao; tsarovy ny famindram-po nampanantenaina an''i Davida mpanomponao.'
mg1865::mg_14::7::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita izany vavak''i Solomona izany, dia nisy afo latsaka avy tany an-danitra ka nandevona ny fanatitra dorana sy ny fanatitra hafa alatsa-drà, ka feno ny voninahitr''i Jehovah ny trano.'
mg1865::mg_14::7::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona tsy nahazo niditra tao an-tranon''i Jehovah, satria feno ny voninahitr''i Jehovah ny tranony.'
mg1865::mg_14::7::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny Zanak''Isiraely rehetra ny nilatsahan''ny afo sy ny voninahitr''i Jehovah teo ambonin''ny trano, dia niankohoka tamin''ny lampivato izy ka nivavaka sy nidera an''i Jehovah, fa tsara Izy, fa mandrakizay ny famindram-pony.'
mg1865::mg_14::7::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka sy ny vahoaka rehetra dia namono zavatra hatao fanatitra teo anatrehan''i Jehovah.'
mg1865::mg_14::7::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka namono zavatra hatao fanatitra, dia omby roa arivo amby roa alina sy ondry aman''osy roa alina amby iray hetsy. Toy izany no nitokanan''ny mpanjaka sy ny vahoaka rehetra ny tranon''Andriamanitra.'
mg1865::mg_14::7::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona samy nitsangana hanao ny anjara-raharahany avy; ny Levita koa nanana ny zava-manenon''i Jehovah, izay nataon''i Davida mpanjaka hiderana an''i Jehovah, fa mandrakizay ny famindram-pony, raha nasain''i Davida nidera an''Andriamanitra izy; ary ny mpisorona nitsoka ny trompetra teo anoloany, ary ny Isiraely rehetra nitsangana teo.'
mg1865::mg_14::7::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanamasina ny afovoan''ny kianja izay teo anoloan''ny tranon''i Jehovah; fa tao no nanaterany ny fanatitra dorana sy ny saboran''ny fanati-pihavavana; fa ny alitara varahina izay nataon''i Solomona dia tsy omby ny fanatitra dorana sy ny fanatitra hohanina ary ny sabora.'
mg1865::mg_14::7::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany Solomona sy ny Isiraely rehetra izay teo aminy, dia ny fiangonana lehibe hatrany akaikin''i Hamata ka hatramin''ny lohasahan-driak''i Egypta, dia nitandrina ny andro firavoravoana hafitoana.'
mg1865::mg_14::7::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahavalo dia nanao fara-fivoriana Izy; fa hafitoana no nitandremany ny fitokanana ny alitara, ary hafitoana koa ny andro firavoravoana.'
mg1865::mg_14::7::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny andro fahatelo amby roa-polo tamin''ny volana fahafito dia nampodiny ho any an-dainy avy ny olona, ary faly sy ravoravo izy noho ny soa nataon''i Jehovah tamin''i Davida sy Solomona ary ny Isiraely olony.'
mg1865::mg_14::7::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny valin''ny vavaka nataon''i Solomona'
  verse_text: 'Toy izany no nahavitan''i Solomona ny tranon''i Jehovah sy ny lapan''andriana, ary samy nataon''i Solomona lavorary avokoa izay rehetra efa voaheviny hatao tao an-tranon''i Jehovah sy tao an-dapany.'
mg1865::mg_14::7::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niseho tamin''i Solomona nony alina ka nanao taminy hoe: Efa reko ny vavakao, ary efa nofidiko ho Ahy ity fitoerana ity ho trano fanateram-panatitra.'
mg1865::mg_14::7::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, raha mampihantona ny andro Aho, ka tsy misy ranonorana latsaka, na asaiko mandany ny tany ny valala, na anaterako areti-mandringana ny oloko,'
mg1865::mg_14::7::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha ny oloko izay nantsoina amin''ny anarako ho avy hanetry tena ka hivavaka sy hitady ny tavako ary hiala amin''ny ratsy fanaony, dia hihaino any an-danitra Aho ka hamela ny helony ary hahasitrana ny taniny.'
mg1865::mg_14::7::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao dia hihiratra ny masoko, ary ny sofiko hihaino ny vavaka Izay atao amin''ity fitoerana ity;'
mg1865::mg_14::7::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nofidiko sy nohamasiniko ity trano ity mba hitoeran''ny anarako mandrakizay, ary ny masoko sy ny foko ho ao mandrakariva.'
mg1865::mg_14::7::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny aminao, raha handeha eo anatrehako tahaka ny nandehanan''i Davida rainao ianao ka hanao araka izay andidiako anao sy hitandrina ny didiko sy ny fitsipiko,'
mg1865::mg_14::7::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hampitoeriko ny seza fiandrianan''ny fanjakanao, araka ny fanekeko tamin''i Davida rainao hoe: Tsy ho diso zanakalahy ho mpanapaka amin''ny Isiraely ianao.'
mg1865::mg_14::7::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mivily kosa ianareo ka mahafoy ny didiko sy ny lalako, izay nataoko teo anoloanareo, ka mandeha manompo andriamanikafa sy miankohoka eo anatrehany'
mg1865::mg_14::7::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hongotako amin''ny tany izay nomeko anareo*; ary hofongorako tsy ho eo imasoko ity trano nohamasiniko ho an''ny anarako ity sady hataoko ho ohabolana sy ho ambentinteny any amin''ny firenena rehetra. [*Hebreo: azy]'
mg1865::mg_14::7::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia avo aza ity trano ity, dia ho fitalanjonan''izay rehetra mandalo azy ka hatao hoe: Naninona re no dia nataon''i Jehovah toy izao ity tany sy ity trano ity?'
mg1865::mg_14::7::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy hamaly hoe: Satria nahafoy an''i Jehovah, Andriamanitry ny razany, Izay nitondra azy nivoaka avy tany amin''ny tany Egypta izy ka nikikitra tamin''andriamani-kafa sady niankohoka teo anatrehany sy nanompo azy, koa izany no nampidirany izao loza rehetra izao taminy.'
mg1865::mg_14::8::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: '2022-10-24T04:41:24+0000'
  verse_title: 'Ny amin''ny trano nataon''i Solomona sy ny nandaminay ny amin''ny fanatitra hatao ao amin''ny tempoly'
  verse_text: 'Ary nony afaka ny roa-polo taona nanaovan''i Solomona ny tranon''i Jehovah sy ny lapan''ny tenany,'
mg1865::mg_14::8::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia namboariny ny tanàna izay nomen''i Hirama azy ka namponenany ny Zanak''isiraely.'
mg1865::mg_14::8::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nankany Hamata-zoba ka naharesy azy.'
mg1865::mg_14::8::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanorina an''i Tadmora tany an''efitra sy ny tanàna fitehirizana rehetra izay nataony tany Hamata izy.'
mg1865::mg_14::8::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namboariny koa Beti-horona ambony sy Beti-horona ambany, tanàna mafy misy manda sy vavahady mihidy,'
mg1865::mg_14::8::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Baleta sy ny tanàna fitehirizana rehetra izay an''i Solomona sy ny tanàna rehetra fitoeran-kalesy sy ny tanàna fitoeran''ny mpitaingin-tsoavaly ary izay rehetra tian''i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin''ny tany nanjakany rehetra.'
mg1865::mg_14::8::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny olona sisa rehetra tamin''ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan''ny Isiraely'
mg1865::mg_14::8::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny taranany izay sisa nandimby azy teo amin''ny taniny, fa tsy naringan''ny Isiraely, no nampanaovin''i Solomona fanompoana mandraka androany.'
mg1865::mg_14::8::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''isiraely dia tsy mba nampanaovin''i Solomona izany, fa ireo kosa no miaramila sy komandin''ny mpanafika malaza ary komandin''ny kalesiny sy ny mpitaingin-tsoavaliny'
mg1865::mg_14::8::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no mpifehy ny olona voatendrin''i Solomona mpanjaka, dia dimam-polo amby roan-jato izay nanapaka ny olona.'
mg1865::mg_14::8::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nitondra ny zanakavavin''i Farao niakatra avy tany an-Tanànan''i Davida ho ao amin''ny trano izay nataony ho azy, fa hoy izy: Ny vadiko tsy mahazo mitoetra ao an-tranon''i Davida, mpanjakan''ny Isiraely, fa masina izay efa nidiran''ny fiaran''i Jehovah.'
mg1865::mg_14::8::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany Solomona nanatitra fanatitra dorana ho an''i Jehovah teo ambonin''ny alitaran''i Jehovah, izay naoriny teo anoloan''ny lavarangana fidirana;'
mg1865::mg_14::8::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, nanatitra izay fanao isanandro izy araka ny didin''i Mosesy dia tamin''ny Sabata sy ny voaloham-bolana ary ny fotoam-pivavahana intelo isan-taona, dia tamin''ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro ary ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo.'
mg1865::mg_14::8::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary notendreny koa ny antokon''ny mpisorona araka ny nandaharan''i Davida rainy azy ho amin''ny fanompoany avy ary ny Levita ho amin''ny anjara-raharahany koa, dia ny hidera sy hanao fanompoam-pivavahana eo anoloan''ny mpisorona araka ny raharaha fanao isan''andro, ary ny mpiandry varavarana araka ny antokony amin''ny isam-bavahady; fa izany no nandidian''i Davida lehilahin''Andriamanitra, azy.'
mg1865::mg_14::8::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nialan''ireo ny didin''ny mpanjaka tamin''ny mpisorona sy ny Levita na amin''inona na amin''inona, indrindra fa ny amin''ny rakitra.'
mg1865::mg_14::8::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nanamboaran''i Solomona ny asa rehetra nataony hatramin''ny andro nanorenany ny tranon''i Jehovah ka ambara-pahavitany; ka dia vita tsara ny tranon''i Jehovah.'
mg1865::mg_14::8::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay Solomona dia nankany Ezion-gebera sy Elota eo amoron''ny ranomasina any amin''ny tany Edoma,'
mg1865::mg_14::8::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpanompon''i Hirama dia nampandehaniny hitondra sambo sy mpanompo izay mahay ranomasina; ary niara-nandeha tamin''ny mpanompon''i Solomona ho any Ofira ireo ka nahazo talenta volamena dimam-polo amby efa-jato tany izy, dia nentiny tany amin''i Solomona mpanjaka izany.'
mg1865::mg_14::9::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: '2022-10-24T04:41:08+0000'
  verse_title: 'Ny namangian''ny mpanjakavavin''i Sheba an''i Solomona.'
  verse_text: 'Ary ny mpanjakavavin''i Sheba, rehefa nahare ny lazan''i Solomona, dia tonga tany Jerosalema hizaha toetra azy tamin''ny fanontaniana sarotra, ary maro be ny mpanaraka azy, sady be koa ny rameva izay nitondra zava-manitra sy volamena sesehena ary vato soa; ary rehefa tonga tao amin''i Solomona izy, dia niresaka taminy ny amin''izay rehetra tao am-pony.'
mg1865::mg_14::9::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voavalin''i Solomona izy tamin''izay rehetra nanontaniany azy; tsy nisy zavatra niafina tamin''i Solomona, fa nambarany azy avokoa.'
mg1865::mg_14::9::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ilay mpanjakavavin''i Sheba ny fahendren''i Solomona sy ny trano izay nataony'
mg1865::mg_14::9::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny hanim-pihinany teo amin''ny latabany, sy ny fipetrahan''ny tandapany sy ny fitoeran''ny mpanompony mbamin''ny fitafian''ireo sy ny mpitondra kapoakany sy ny fitafian''ireo, ary ny ambaratonga izay niakarany ho ao an-tranon''i Jehovah, dia talanjona tery izy.'
mg1865::mg_14::9::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny mpanjaka: Marina ny teny efa reko tany amin''ny taniko ny amin''ny teninao sy ny fahendrenao.'
mg1865::mg_14::9::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy nino ny filazana aho, raha tsy tonga aty, ka ny masoko no mahita; kanjo hay! na dia ny antsasaky ny fahendrenao aza tsy voalaza tamiko akory; fa, indro, mihoatra noho ny laza efa reko ianao.'
mg1865::mg_14::9::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra lahy ny olonao, ary sambatra ireto tandapanao ireto, izay mijanona eto anatrehanao mandrakariva ka mandre ny fahendrenao!'
mg1865::mg_14::9::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah Andriamanitrao Izay tia anao ka nametraka anao amin''ny seza fiandrianany ho mpanjaka ho an''i Jehovah Andriamanitrao; fa noho ny fitiavan''Andriamanitrao ny Isiraely hampitoetra azy mandrakizay no nanaovany anao ho mpanjakany mba hanao fitsarana sy fahamarinana.'
mg1865::mg_14::9::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanome talenta volamena roa-polo amby zato sy zava-manitra sesehena ary vato soa ho an''ny mpanjaka; tsy nisy intsony zava-manitra tahaka ilay nomen''ny mpanjakavavin''i Sheba an''i Solomona mpanjaka.'
mg1865::mg_14::9::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''i Hirama koa sy ny mpanompon''i Solomona, izay naka volamena avy tany Ofira, dia nitondra hazo almoga sy vato soa.'
mg1865::mg_14::9::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hazo almoga dia nataon''ny mpanjaka ambaratonga mankamin''ny tranon''i Jehovah sy ny lapan''andriana ary nataony lokanga sy valiha ho an''ny mpihira koa; ary tsy mbola nisy hita toy izany teo aloha tamin''ny tanin''ny Joda.'
mg1865::mg_14::9::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka dia nanome ny mpanjakavavin''i Sheba kosa izay rehetra niriny, na inona na inona nangatahiny, afa-tsy izay valin''ny nentiny ho an''ny mpanjaka; ka dia niverina izy, ary lasa nody tany amin''ny taniny izy mbamin''ny mpanompony.'
mg1865::mg_14::9::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny varotra nataon''i Solomona mbamin''ny hareny sy ny voninahiny'
  verse_text: 'Ary ny lanjan''ny volamena izay tonga tao amin''i Solomona isan-taona dia talenta volamena enina amby enim-polo amby enin-jato,'
mg1865::mg_14::9::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy izay nentin''ny mpivarotra sy ny mpandranto. Ary ny mpanjakan''i Arabia rehetra sy ny mpanapaka ny tany dia samy nitondra volamena sy volafotsy ho an''i Solomona.'
mg1865::mg_14::9::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka nanao ampinga volamena lehibe roan-jato tamin''ny volamena voafisaka, ka takela-bolamena sekely enin-jato no napetaka tamin''ny ampinga lehibe iray.'
mg1865::mg_14::9::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ampinga volamena telonjato koa izy tamin''ny volamena voafisaka, ka takela-bolamena sekely telon-jato no napetaka tamin''ny ampinga iray. Dia napetraky ny mpanjaka tao amin''ny trano Alan''i Libanona lreo.'
mg1865::mg_14::9::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nanao seza fiandrianana ivory lehibe, ka nopetahany takela-bolamena tsara.'
mg1865::mg_14::9::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy ambaratonga enina amin''ny seza fiandrianana sy fitoeran-tongotra volamena, izay naraikitra tamin''ny seza fiandrianana, ary nisy fitehenana teo an-daniny roa tamin''ny fipetrahana ary nisy sarin-diona roa teo an-danin''ny fitehenan-tanana;'
mg1865::mg_14::9::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisy sarin-diona roa ambin''ny folo teo an-daniny roa teo amin''ny ambaratonga enina. Tsy nisy natao tahaka izany tany amin''ny fanjakana rehetra.'
mg1865::mg_14::9::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fisotroan''i Solomona mpanjaka dia volamena avokoa, ary ny fanaka rehetra tao amin''ny trano Alan''i Libanona koa dia volamena tsara avokoa; tsy nisy volafotsy ireo, fa natao toy ny tsinontsinona izany tamin''ny andron''i Solomona.'
mg1865::mg_14::9::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka nanana sambo mpankany Tarsisy niaraka tamin''ny mpanompon''i Hirama; ary indray mandeha isan-telo taona no nihavian''ny sambon''i Tarsisy nitondra volamena sy volafotsy sy ivory sy rajako ary vorombola*. [*pavo]'
mg1865::mg_14::9::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka dia nanan-karena sady hendry indrindra noho ny mpanjaka rehetra ambonin''ny tany.'
mg1865::mg_14::9::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka rehetra ambonin''ny tany nitady hahita ny tavan''i Solomona mba hihaino ny fahendrena, izay nataon''Andriamanitra tao am-pony.'
mg1865::mg_14::9::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy rehetra dia samy nahatonga ny anjarany avy isan-taona, dia fanaka volafotsy sy fanaka volamena sy fitafiana sy fiadiana sy zava-manitra sy soavaly ary ampondra.'
mg1865::mg_14::9::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanana efi-trano efatra arivo fitoeran''ny soavaly mpitarika kalesy ary soavaly fitaingina roa arivo sy iray alina, izay nataony tao amin''ireo tanàna fitoeran-kalesy sy tao amin''ny mpanjaka tany Jerosalema.'
mg1865::mg_14::9::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanjaka tamin''ny mpanjaka rehetra hatramin''ny Ony* ka hatramin''ny tanin''ny Filistina ary hatramin''ny sisin''i Egypta izy. [*Eofrata]'
mg1865::mg_14::9::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''ny mpanjaka tahaka ny vato ny habetsaky ny volafotsy tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy eny amin''ny tany lemaka amoron-tsiraka*. [*Hebreo: Sefela]'
mg1865::mg_14::9::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangalana soavaly avy tany Egypta sy tany amin''ny tany rehetra koa Solomona.'
mg1865::mg_14::9::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Solomona sisa, na ny voalohany na ny farany. tsy efa voasoratra va izany ao amin''ny bokin''i Natana mpaminany sy amin''ny faminanian''i Ahia Silonita sy amin''ny fahitan''Ido mpahita ny amin''i Jeroboama, zanak''i Nebata?'
mg1865::mg_14::9::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanjaka efa-polo taona tamin''ny Isiraely rehetra tany Jerosalema.'
mg1865::mg_14::9::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona lasa nodimandry any amin''ny razany, dia nalevina tao an-Tanànan''i Davida rainy izy; ary Rehoboama zanany no nanjaka nandimby azy.'
mg1865::mg_14::10::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niodinan''ny firenena folo tsy hanaiky an-dRehoboama'
  verse_text: 'Ary Rehoboama nankany Sekema, fa tany no efa nalehan''ny Isiraely rehetra hampanjaka azy.'
mg1865::mg_14::10::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha nandre izany Jeroboama, zanak''i Nebata, izay efa nandositra nankany Egypta niala teo anatrehan''i Solomona mpanjaka, dia niverina avy tany Egypta izy.'
mg1865::mg_14::10::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naniraka naka azy ny olona. Dia tonga Jeroboama sy ny Isiraely rehetra ka niteny tamin-dRehoboama hoe:'
mg1865::mg_14::10::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rainao dia nampitondra zioga mavesatra anay; fa inty kosa mby aminao ka mba hamaivano ny fanompoana mafy tamin-drainao sy ny zioga mavesatra izay nataony taminay, dia hanompo anao izahay.'
mg1865::mg_14::10::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy taminy: Rehefa afaka hateloana, dia mankanesa aty amiko indray. Dia lasa ny olona.'
mg1865::mg_14::10::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama mpanjaka naka saina tamin''ny zoki-olona izay nitoetra teo anatrehan''i Solomona rainy fony fahavelony ka nanao hoe: Ahoana no hevitra omenareo havaly ny vahoaka?'
mg1865::mg_14::10::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Raha ho mora amin''ny vahoaka ianao ka hankasitraka azy sy hanao teny mora aminy, dia ho mpanomponao mandrakizay izy.'
mg1865::mg_14::10::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nolavin-dRehoboama ny saina nomen''ireo zoki-olona azy, dia naka hevitra tamin''ny tovolahy izay indray nihira taminy sady efa nitoetra teo anatrehany izy ka nanao taminy hoe:'
mg1865::mg_14::10::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay niteny tamiko hoe: Hamaivano ny zioga izay nataon-drainao taminay ?'
mg1865::mg_14::10::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo tovolahy indray nihira taminy nanao taminy hoe: Izao no lazao amin''ny vahoaka izay niteny taminao hoe: Rainao nampitondra zioga mavesatra anay; fa inty kosa mby aminao, ka mba hamaivano aminay izany, izao no lazao aminy. Ny ankihikeliko dia lehibe noho ny valahan''ny raiko;'
mg1865::mg_14::10::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa dia mainka hanampy ny zioga ho entinareo; kotopia no namaizan''ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo.'
mg1865::mg_14::10::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeroboama sy ny vahoaka rehetra dia nankany amin-dRehoboama tamin''ny andro fahatelo, araka ilay nolazain''ny mpanjaka hoe: Mankanesa aty amiko indray amin''ny andro fahatelo.'
mg1865::mg_14::10::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama mpanjaka nanao teny mafy tamin''ny olona, fa nandà ny hevitra nomen''ireo zoki-olona azy'
mg1865::mg_14::10::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny taminy araka ny hevitra nomen''ireo tovolahy hoe: Nampitondra zioga mavesatra anareo ny raiko, fa izaho kosa mainka hanampy izany; kotopia no namaizan''ny raiko anareo, fa maingoka fikapohana kosa hamaizako anareo.'
mg1865::mg_14::10::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsy nihaino ny olona ny mpanjaka, fa avy tamin''Andriamanitra izany zavatra izany hahatanteraka ny teniny izay nampilazainy an''i Ahia Silonita tamin''i Jeroboama, zanak''i Nebata.'
mg1865::mg_14::10::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny Isiraely rehetra fa tsy nihaino azy ny mpanjaka, dia namaly ny mpanjaka ny vahoaka ka nanao hoe: Inona moa no anjaranay amin''i Davida ? Tsy manana lova amin''ny zanak''i Jese izahay. Samia mody any an-dainy avy, ry Isiraely e! ankehitriny tandremo ny taranakao, ry Davida o. Dia samy nody ho any an-dainy avy ny Isiraely rehetra.'
mg1865::mg_14::10::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''isiraely izay nonina tany an-tanànan''ny Joda ihany no nanjakan-dRehoboama.'
mg1865::mg_14::10::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia naniraka an''i Adorama, komandin''ny mpanao fanompoana, Rehoboama mpanjaka, nefa ny Zanak''isiraely nitora-bato azy, ka maty izy. Dia niezaka faingana nankeo amin''ny kalesiny Rehoboama mpanjaka handositra ho any Jerosalema.'
mg1865::mg_14::10::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niodina tamin''ny taranak''i Davida ny Isiraely mandraka androany.'
mg1865::mg_14::11::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan-dRehoboama'
  verse_text: 'Ary nony tonga tany Jerosalema Rehoboama, dia novoriny ny taranak''i Joda sy Benjamina, dia miaramila valo alina amby iray hetsy voafantina, hiady amin''ny Isiraely hampody ny fanjakana ho an-dRehoboama.'
mg1865::mg_14::11::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo kosa ny tenin''i Jehovah tonga tamin''i Semaia, lehilahin''Andriamanitra, ka nanao hoe:'
mg1865::mg_14::11::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin-dRehoboama, zanak''i Solomona, mpanjakan''ny Joda, sy amin''ny Isiraely rehetra amin''ny Joda sy ny Benjamina hoe:'
mg1865::mg_14::11::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Aza mandeha hiady amin''ny rahalahinareo, fa samia mody any an-tranony avy ianareo, fa avy amiko izao zavatra izao. Ary nihaino ny tenin''i Jehovah ny olona, ka dia samy lasa nody, fa tsy nandeha hamely an''i Jeroboama.'
mg1865::mg_14::11::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama nitoetra tany Jerosalema ka nanamboatra tanàna mimanda tany Joda.'
mg1865::mg_14::11::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny namboariny dia izao: Betlehema sy Etama sy Tekoa'
mg1865::mg_14::11::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Beti-zora sy Soko sy Adolama'
mg1865::mg_14::11::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Gata sy Maresa sy Zifa'
mg1865::mg_14::11::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Adoraima sy Lakisy sy Azeka'
mg1865::mg_14::11::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Zora sy Aialona ary Hebrona, izay tanàna mimanda ao amin''ny Joda sy ny Benjamina.'
mg1865::mg_14::11::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanamafy ny tanàna mimanda izy sady nametraka mpanapaka tao aminy ary nanisy hanina sy diloilo ary divay betsaka.'
mg1865::mg_14::11::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny isam-bohitra dia nasiany ampinga lehibe sy lefona avokoa, sady nohamafiny dia nohamafiny ny vohitra; ary ny Joda sy ny Benjamina no nomba azy.'
mg1865::mg_14::11::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona sy ny Levita izay teo amin''ny Isiraely rehetra dia nanatona azy avy tany amin''ny faritaniny avy.'
mg1865::mg_14::11::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Levita nandao ny tanànany sy ny tany manodidina azy ka nankany Joda sy Jerosalema (fa Jeroboama sy ny zanany efa nanaisotra azy tsy ho mpisorona ho an''i Jehovah,'
mg1865::mg_14::11::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nanendry mpisorona ho amin''ny fitoerana avo sy ho an''ny Seàrima* ary ho an''ny ombilahy kely izay nataony). [*Hebreo: osilahy; anaran''andriamani-tsy izy]'
mg1865::mg_14::11::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza tamin''ny firenen''Isiraely rehetra no nanolotra ny fony hitady an''i Jehovah, Andriamanitry ny Isiraely, dia nanaraka ireo nankany Jerosalema hamono zavatra hatao fanatitra ho an''i Jehovah, Andriamanitry ny razany.'
mg1865::mg_14::11::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nampahery ny fanjakan''ny Joda izy sady nampahavitrika an-dRehoboama, zanak''i Solomona, telo taona; fa nandeha tamin''ny lalan''i Davida sy Solomona telo taona izy.'
mg1865::mg_14::11::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama naka an''i Mahalota, zanakavavin''i Jerimota, zanak''i Davida, sy Abihaila, zanakavavin''i Eliaba, zanak''i Jese, ho vadiny,'
mg1865::mg_14::11::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nahazoany zaza, dia Jeosy sy Semaria ary Zahama.'
mg1865::mg_14::11::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanarakaraka azy, dia nalainy koa Imaka, zanakavavin''i Absaloma, izay niteraka an''i Abia sy Atahy sy Ziza ary Selomita taminy.'
mg1865::mg_14::11::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama tia an''Imaka, zanakavavin''i Absaloma, mihoatra noho ny vadiny sy ny vaditsindranony rehetra (fa naka vady valo ambin''ny folo sy vaditsindrano enim-polo izy ka niteraka lahy valo amby roa-polo sy vavy enim-polo).'
mg1865::mg_14::11::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abia, zanakalahin''Imaka, no nataon-dRehoboama lohany ho mpanapaka ny rahalahiny; fa izy no efa nokasainy hampanjakaina.'
mg1865::mg_14::11::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hendry izy ka nampiely ny zanany eran''ny tanin''ny Joda sy ny Benjamina rehetra, dia tany amin''ny tanàna mimanda rehetra, ka nomeny hanina betsaka sady nitadiavany vady maro.'
mg1865::mg_14::12::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama, rehefa nampandry ny ny fanjakany sady efa nahery, dia nahafoy ny lalan''i Jehovah izy sy ny Isiraely rehetra.'
mg1865::mg_14::12::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahadimy nanjakan-dRehoboama mpanjaka dia niakatra Sisaka, mpanjakan''i Egypta, hamely an''i Jerosalema, fa nivadika tamin''i Jehovah ny mponina tany,'
mg1865::mg_14::12::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nitondra kalesy roan-jato amby arivo sy mpitaingin-tsoavaly enina alina izy, ary tsy hita isa ny olona izay nanaraka azy avy tany Egypta, dia ny Lobita sy ny Sokita ary ny Etiopiana.'
mg1865::mg_14::12::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahafaka ny tanàna mimanda izay any Joda izy ka tonga tany Jerosalema.'
mg1865::mg_14::12::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Semaia mpaminany tonga tao amin-dRehoboama sy ireo mpanapaka ny Joda, izay tafangona tany Jerosalema noho ny amin''i Sisaka, ka nanao taminy hoe: Izao no lazain''i Jehovah: Ianareo efa nahafoy Ahy, koa Izaho kosa dia mba nahafoy anareo ho eo an-tanan''i Sisaka.'
mg1865::mg_14::12::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niaiky ireo mpanapaka ny Isiraely sy ny mpanjaka ka nanao hoe: Marina Jehovah.'
mg1865::mg_14::12::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Jehovah fa niaiky izy, dia tonga tao amin''i Semaia indray ny tenin''i Jehovah nanao hoe: Efa niaiky izy, ka dia tsy handringana azy Aho, fa tsy ho ela dia hamonjy azy*; ary tsy haidiko amin''i Jerosalema avy amin''ny tanan''i Sisaka ny fahatezerako. [*Na: fa hamonjeko ihany]'
mg1865::mg_14::12::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ho mpanompony ihany izy, mba hahafantarany ny fanompoana Ahy sy ny fanompoana any amin''ny fanjakana hafa.'
mg1865::mg_14::12::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra Sisaka, mpanjakan''i Egypta, hamely an''i Jerosalema ka namabo ny rakitry ny tranon''i Jehovah sy ny rakitry ny tranon''ny mpanjaka: samy nobaboiny avokoa izy rehetra; ary nobaboiny koa ny ampinga volamena izay nataon''i Solomona.'
mg1865::mg_14::12::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama mpanjaka nanao ampinga varahina ho solon''ireny ka nanolotra azy ho eo an-tanan''ny lehiben''ny mpiambina, izay niambina ny varavaran''ny tranon''ny mpanjaka.'
mg1865::mg_14::12::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na oviana na oviana no nidiran''ny mpanjaka tao an-tranon''i Jehovah, dia avy ny mpiambina naka ireo ka namerina azy ho ao an-tranon''ny mpiambina indray.'
mg1865::mg_14::12::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanetry tena izy, dia niala taminy ny fahatezeran''i Jehovah ka tsy nahalany ringana azy; sady nisy fahatsaram-panahy koa tamin''ny Joda.'
mg1865::mg_14::12::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama mpanjaka dia nitombo hery tany Jerosalema, ka dia nanjaka; iraika amby efa-polo taona izy, fony vao nanjaka, ary fito ambin''ny folo taona no nanjakany tany Jerosalema, ilay tanana nofidin''i Jehovah tamin''ny firenen''Isiraely rehetra hampitoerany ny anarany. Ary ny anaran-dreniny dia Nama Amonita.'
mg1865::mg_14::12::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ratsy izy, satria tsy nampiomana ny fony hitady an''i Jehovah.'
mg1865::mg_14::12::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran-dRehoboama, na ny voalohany na ny farany, tsy efa voasoratra ao amin''ny bokin''i Semaia mpaminany sy Ido mpahita ny amin''ny firazanana va izany? Ary niady mandrakariva Rehoboama sy Jeroboama.'
mg1865::mg_14::12::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama lasa nodimandry any amin''ny razany, dia nalevina tao an-Tanànan''i Davida izy; ary Abia zanany no nanjaka nandimby azy.'
mg1865::mg_14::13::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Abia'
  verse_text: 'Ary tamin''ny taona fahavalo ambin''ny folo nanjakan''i Jeroboama mpanjaka no vao nanjakan''i Abia tamin''ny Joda.'
mg1865::mg_14::13::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Telo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Mikaia, zanakavavin''i Oriela, avy any Gibea. Ary niady Abia sy Jeroboama.'
mg1865::mg_14::13::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abia niantomboka niady ka nitondra miaramila mahery, dia lehilahy efatra hetsy voafantina; ary Jeroboama kosa nandahatra ny azy hiady aminy, dia lehilahy valo hetsy voafantina, samy mahery avokoa.'
mg1865::mg_14::13::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abia nijoro teo an-tendrombohitra Zemaraima, izay any amin''ny tany havoan''i Efraima, ka nanao hoe: Mihainoa ahy, ry Jeroboama sy ry Isiraely rehetra:'
mg1865::mg_14::13::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy tokony ho fantatrareo va fa nomen''i Jehovah, Andriamanitry ny Isiraely, ho an''i Davida mandrakizay ny fanjakan''ny Isiraely? dia ho azy sy ny taranany amin''ny fanekena nasiantsira.'
mg1865::mg_14::13::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa kosa Jeroboama, zanak''i Nebata, mpanompon''i Solomona, zanak''i Davida, nitsangana ka niodina tamin''ny tompony.'
mg1865::mg_14::13::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: '2022-06-25T06:40:08+0000'
  verse_title: null
  verse_text: 'Ary koa, nisy olom-poana, tena ratsy fanahy, niangona tao aminy ka nampahery ny tenany hanohitra an-dRehoboama, zanak''i Solomona, raha mbola zaza sy tanora fanahy izy ka tsy nahatohitra azy.'
mg1865::mg_14::13::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny ianareo mikasa hanohitra ny fanjakan''i Jehovah, izay eo an-tanan''ny taranak''i Davida; ary ianareo dia maro be, sady misy ombilahy kely volamena ao aminareo, izay nataon''i Jeroboama ho andriamanitrareo.'
mg1865::mg_14::13::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy efa noroahinareo va ny mpisoron''i Jehovah, dia ny taranak''i Arona, sy ny levita, ka nanendry mpisorona ho anareo tahaka ny fanaon''ny firenena amin''ny tany hafa ianareo? ka na zovy na zovy mitondra vantotr''ombilahy sy ondrilahy fito hanokanana ny tenany, dia izy no tonga mpisorona amin''ireo tsi-Andriamanitra.'
mg1865::mg_14::13::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny aminay kosa, dia Jehovah no Andriamanitray ka tsy mba nahafoy Azy izahay; ary ny mpisorona izay manao fanompoam-pivavahana ho an''i Jehovah, dia ny taranak''i Arona; ary ny Levita koa manao ny raharahany;'
mg1865::mg_14::13::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mandoro fanatitra dorana sy ditin-kazo manitra ho an''i Jehovah isa-maraina sy isan-kariva izy, ary ny mofo aseho koa alahany eo amin''ny latabatra tsara, ary ny jiro koa ampirehetiny Isan-kariva ao amin''ny fanaovan-jiro volamena sy ny lela fanaovan-jirony; fa izahay mitandrina izay nasain''i Jehovah Andriamanitray hotandremana; fa ianareo kosa nahafoy Azy.'
mg1865::mg_14::13::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ato aminay Andriamanitra ho mpitarika anay, ary ny mpisorony sy ny trompetra avo faneno hotsofina mafy hamelezana anareo Ry Zanak''isiraely o, aza miady amin''i Jehovah, Andriamanitry ny razanareo; fa tsy hambinina ianareo.'
mg1865::mg_14::13::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nasain''i Jeroboama nanompirana no fandehan''ny otrika mba ho tonga ao aoriany, ka dia izy teo anoloan''ny Joda, ary ny otrika teo ivohony.'
mg1865::mg_14::13::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nitodika ny Joda, ka, indreo, teo alohany sy teo aoriany ny fahavalo, dia nitaraina tamin''i Jehovah izy, ary ny mpisorona nitsoka ny trompetra.'
mg1865::mg_14::13::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihoby ny lehilahy amin''ny Joda; ary raha nihoby izy, Andriamanitra dia namely an''i Jeroboama sy ny Isiraely rehetra teo anoloan''i Abia sy ny Joda.'
mg1865::mg_14::13::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''isiraely nandositra niala teo anoloan''ny Joda; ary Andriamanitra nanolotra azy ho eo an-tanany,'
mg1865::mg_14::13::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nahafatesan''i Abia sy ny vahoakany be dia be izy; ary niampatrampatra ny fatin''ny Isiraely, dia lehilahy dimy hetsy voafantina.'
mg1865::mg_14::13::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nampietrena ny Zanak''isiraely fahizay; ary ny taranak''i Joda no nahery, satria niankina tamin''i Jehovah, Andriamanitry ny razany, izy.'
mg1865::mg_14::13::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abia nanenjika an''i Jeroboama ka nahazo ny tanànany, dia Betela mbamin''ny zana-bohiny sy Jesana mbamin''ny zana-bohiny ary Efrona* mbamin''ny zana-bohiny. [*Na: Efraima]'
mg1865::mg_14::13::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeroboama tsy naharina intsony tamin''ny andron''i Abia; ary Jehovah namely azy, ka dia maty izy.'
mg1865::mg_14::13::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abia nitombo hery, ary nanam-bady efatra ambin''ny folo izy ka niteraka lahy roa amby roa-polo sy vavy enina ambin''ny folo.'
mg1865::mg_14::13::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Abia sisa mbamin''ny nataony sy ny teniny dia efa voasoratra ao amin''ny bokin''Ido mpaminany.'
mg1865::mg_14::13::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny nanjakan''i Asa, sy ny nandravany ny fombam-pivavahana tsy marina, ary ny nandreseny ny Etiopiana'
  verse_text: 'Ary Abia lasa nodi-mandry any amin''ny razany, dia nalevina tao an-tanànan''i Davida izy; ary Asa zanany no nanjaka nandimby azy. Ary tamin''ny andron''i Asa dia nandry folo taona ny tany.'
mg1865::mg_14::14::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa nanao izay tsara sy mahitsy eo imason''i Jehovah Andriamanitra;'
mg1865::mg_14::14::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nandrava ny alitaran''ny firenena hafa sy ny fitoerana avo izy sady nanorotoro ny tsangam-baton-tsampy ary nikapa ny Aseraha.'
mg1865::mg_14::14::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandidy ny Joda hitady an''i Jehovah, Andriamanitry ny razany, izy ary hankatò ny lalàna sy ny didy.'
mg1865::mg_14::14::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrava ny fitoerana avo sy ny tsangan-kazo* ho an''ny masoandro teny amin''ny tanànan''ny Joda rehetra izy; dia nandry fahizay ny fanjakana teo anatrehany. [*Na: tsangam-bato]'
mg1865::mg_14::14::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tanàna mimanda tany Joda izy; ka dia nandry fahizay ny tany, fa tsy nisy ady tamin''izany andro izany; fa Jehovah no nanome azy fiadanana.'
mg1865::mg_14::14::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny Joda: Andeha hamboarintsika ireto tanana ireto ka hasiantsika manda manodidina sy tilikambo ary vavahady mihidy, raha mbola azontsika zakaina ny tany; fa efa nitady an''i Jehovah Andriamanitsika isika; eny, nitady Azy isika, ka nanome antsika fiadanana amin''ny manodidina Izy. Ary dia namboariny avokoa izany ka tontosa tsara.'
mg1865::mg_14::14::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa nanana miaramila, dia telo hetsy mpitana ampinga lehibe sy lefona avy tamin''ny Joda, ary valo alina amby roa hetsy mpitana ampinga sy tsipïka avy amin''ny Benjamina; ireo rehetra ireo dia lehilahy mahery avokoa.'
mg1865::mg_14::14::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zera Etiopiana nivoaka hiady tamin''ireo ka nitondra miaramila iray tapitrisa sy kalesy telon-jato, ka dia tonga tao Maresa.'
mg1865::mg_14::14::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa nivoaka hiady taminy, dia samy nilahatra hiady teo andohasaha Zefata akaikin''i Maresa izy.'
mg1865::mg_14::14::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa nitaraina tamin''i Jehovah Andriamaniny ka nanao hoe: Jehovah o, tsy misy afa-tsy Ianao no mahavonjy ny tsy manan-kery, raha iadian''ny maro izy*, ka vonjeo izahay, Jehovah Andriamanitray o, fa Ianao no iankinanay, ary ny anaranao no andehananay hiady amin''ireto olona ireto. Jehovah o. Ianao no Andriamanitray; aza avela hisy olona haharesy Anao. [*Na: Jehovah o, mora foana aminao ny hamonjy na ny mahery na izay tsy manan-kery]'
mg1865::mg_14::14::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namely ny Etiopiana teo anoloan''i Asa sy ny Joda, ka dia nandositra ireny.'
mg1865::mg_14::14::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa sy ny vahoaka teo aminy nanenjika azy hatrany Gerara, ka dia nahafatesana be ny Etiopiana ka tsy naharina intsony; fa voaringana teo anoloan''i Jehovah sy ny miaramilany izy, ka nahazoan''ny Joda babo betsaka.'
mg1865::mg_14::14::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namely ny tanàna rehetra manodidina an''i Gerara izy; fa ny fahatahorana an''i Jehovah nahazo ireo, ka nobaboiny ny tanana rehetra, fa be ny babo tao.'
mg1865::mg_14::14::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namely ny vala izy ka nahazo babo betsaka, dia ondry aman''osy sy rameva, ary dia niverina ho any Jerosalema izy.'
mg1865::mg_14::15::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nananaran''i Azaria mpaminany an''i Asa, ary ny fahazotoan''i Asa handrava ny fivavahana tsy marina sy hanangana indray ny fivavahana amin''i Jehovah'
  verse_text: 'Ary ny Fanahin''Andriamanitra tonga tamin''i Azaria, zanak''i Odeda;'
mg1865::mg_14::15::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia nivoaka hitsena an''i Asa izy ka nanao taminy hoe: Mihainoa ahy, ry Asa mbamin''ny Joda sy ny Benjamina rehetra: Jehovah momba anareo, raha ianareo momba Azy; ary raha mitady Azy kosa ianareo, dia hahita Azy; fa raha mahafoy Azy ianareo, dia hahafoy anareo Izy.'
mg1865::mg_14::15::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa ela ny Isiraely no tsy nanana an''Andriamanitra marina, na mpisorona mampianatra, na lalàna.'
mg1865::mg_14::15::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha niverina tamin''Jehovah, Andriamanitry ny Isiraely, izy nony azom-pahoriana, ka nitady Azy, dia nahita Azy.'
mg1865::mg_14::15::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia tsy nisy fiadanana ho an''izay nivoaka na izay niditra; fa horohoro be no nahazo ny mponina rehetra tamin''ny tany.'
mg1865::mg_14::15::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifandringana ny firenena sy ny tanàna, fa Andriamanitra nampangorohoro azy tamin''ny fahoriana rehetra.'
mg1865::mg_14::15::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mahereza ianareo, fa aza miraviravy tanana; fa hisy valim-pitia tokoa ny ataonareo.'
mg1865::mg_14::15::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ren''i Asa izany teny izany sy ny faminanian''i Odeda mpaminany, dia niezaka izy ka nanaisotra ny sampy fahavetavetana tamin''ny tanin''ny Joda sy ny Benjamina rehetra ary tamin''ny tanàna izay azony tany amin''ny tany havoan''i Efraima, sady nanavao ny alitaran''i Jehovah izay teo anoloan''ny lavarangana fidirana amin''ny tranon''i Jehovah.'
mg1865::mg_14::15::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novoriny ny Joda sy ny Benjamina rehetra sy ny vahiny teo aminy izay avy tany amin''ny Efraima sy ny Manase ary ny Simeona; fa betsaka no nanatona azy avy tamin''ny Isiraely, raha hitany fa Jehovah Andriamaniny no teo aminy.'
mg1865::mg_14::15::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivory tany Jerosalema ireo tamin''ny volana fahatelo tamin''ny taona fahadimy ambin''ny folo nanjakan''i Asa.'
mg1865::mg_14::15::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary androtrizay no nanaterany fanatitra ho an''i Jehovah tamin''ny babo izay nentiny, dia omby fitonjato sy ondry aman''osy fito arivo.'
mg1865::mg_14::15::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fanekena hitady an''i Jehovah, Andriamanitry ny razany, tamin''ny fony rehetra sy ny fanahiny rehetra izy,'
mg1865::mg_14::15::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka na iza na iza tsy mety mitady an''i Jehovah Andriamanitry ny Isiraely, dia hatao maty, na kely na lehibe, na lahy na vavy.'
mg1865::mg_14::15::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nianiana ho an''i Jehovah tamin''ny feo mahery sy ny fihobiana ary tamin''ny trompetra sy ny anjomara izy.'
mg1865::mg_14::15::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda rehetra nifaly noho ny fianianana, fa efa nianiana tamin''ny fony rehetra izy sady nazoto nitady an''i Jehovah indrindra, ka dia nahita Azy; ary Jehovah dia nanome azy fiadanana tamin''ny manodidina fahizay.'
mg1865::mg_14::15::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia Imaka, renin''i Asa mpanjaka, aza dia naetriny tsy ho andriambavy, satria efa nanao sampy ho an''ny Aseraha izy; ary Asa nikapa ny sampiny, dia nanorotoro ka nandoro azy tao amin''ny lohasahan-driaka Kidrona.'
mg1865::mg_14::15::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fitoerana avo tsy mba noravana tamin''ny Isiraely; nefa nahitsy ny fon''i Asa tamin''ny androny rehetra.'
mg1865::mg_14::15::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampidiriny ho ao an-tranon''i Jehovah ny zavatra izay nohamasinin-drainy mbamin''izay nohamasinin''ny tenany, dia volafotsy sy volamena ary fanaka.'
mg1865::mg_14::15::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy ady intsony hatramin''ny taona fahadimy amby telo-polo nanjakan''i Asa.'
mg1865::mg_14::16::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanambazan''i Asa an''i Beni-hadada, mpanjakan''i Syria, hanampy azy hiady amin''i Basa, mpanjakan''ny Isiraely, sy ny nananaran''i Sanany mpaminany azy noho izany, ary ny nahafatesan''i Asa'
  verse_text: 'Tamin''ny taona fahenina amby telo-polo nanjakan''i Asa dia niakatra Basa, mpanjakan''ny Isiraely, hamely ny Joda, ka nanamboatra an''i Rama izy mba tsy hisy hahazo hivoaka na hiditra ho an''i Asa, mpanjakan''ny Joda.'
mg1865::mg_14::16::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa namoaka volafotsy sy volamena avy tamin''ny rakitry ny tranon''i Jehovah sy ny tranon''ny mpanjaka, dia nampitondra azy tany amin''i Beni-hadada, mpanjakan''i Syria, izay nitoetra tany Damaskosy, ka nanao hoe:'
mg1865::mg_14::16::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy* fanekena amiko sy aminao, dia ilay tamin''ny raiko sy ny rainao; koa, indro, mampanatitra volafotsy sy volamena ho anao aho, ka andeha, tsoahy ny fanekenao amin''i Basa, mpanjakan''ny Isiraely, mba hialany amiko. [*Na: Aoka hisy]'
mg1865::mg_14::16::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Beni-hadada nanaiky ny tenin''i Asa mpanjaka ka naniraka ireo komandin''ny miaramilany hamely ny tanànan''ny Isiraely; dia nandrava an''Iona sy Dana sy Abela-maima ary ny trano fitehirizana rehetra izay teny amin''ny tanànan''ny Naftaly izy.'
mg1865::mg_14::16::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Basa izany, dia nitsahatra tsy nanamboatra an''i Rama intsony izy, fa natsahany ny asany.'
mg1865::mg_14::16::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa mpanjaka namory ny Joda rehetra; ary dia nesorin''ny olona ny vato sy ny hazo tao Rama, izay naorin''i Basa, ka nentiny nanamboatra an''i Geba sy Mizpa.'
mg1865::mg_14::16::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany dia nankeo amin''i Asa, mpanjakan''ny Joda, Hanany mpahita ka nanao taminy hoe: Noho ny niankinanao tamin''ny mpanjakan''i Syria fa tsy niankina tamin''i Jehovah Andriamanitrao ianao, dia afa-nandositra ny tananao ny miaramilan''ny mpanjakan''i Syria.'
mg1865::mg_14::16::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy maro be va ny Etiopiana sy ny Lobita, ary tsy maro be koa va ny kalesiny sy ny mpitaingin-tsoavaliny? Nefa noho ny niankinanao tamin''i Jehovah, dia natolony teo an-tananao ireo.'
mg1865::mg_14::16::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mason''i Jehovah mijery eny tontolo eny eran''ny tany rehetra, mba hisehoany aman-kery hamonjy izay manana fo mahitsy aminy. Adala ianao tamin''izany, ka dia hisy ady hahazo anao hatramin''izao.'
mg1865::mg_14::16::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra tamin''ilay mpahita Asa ka nanao azy tao an-trano-maizina; fa nisafoaka aminy indrindra izy noho izany. Ary ny olona sasany koa dia nampahorin''i Asa tamin''izay.'
mg1865::mg_14::16::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ny tantaran''i Asa, na ny voalohany na ny farany, dia efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Joda sy ny Isiraely.'
mg1865::mg_14::16::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahasivy amby telo-polo nanjakan''i Asa dia narary tamin''ny tongony izy, ka nihamafy indrindra ny aretiny; nefa na dia narary aza izy, dia tsy nitady an''i Jehovah, fa ny mpanao fanafody ihany.'
mg1865::mg_14::16::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa lasa nodi-mandry any amin''ny razany; maty izy tamin''ny taona fahiraika amby efa-polo nanjakany.'
mg1865::mg_14::16::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalevina tao amin''ny fasany ihany izy, izay nolavahany tao an-Tanànan''i Davida, ka nampandrina teo amin''ny fandriana efa nofenoina zava-manitra samy hafa voaharoharo araka ny fanaon''ny mpangaroharo zava-manitra, ary nandoroany zavatra betsaka ho fisaonana azy.'
mg1865::mg_14::17::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny nanjakan''i Josafata, sy ny fahazotoany hampandroso ny fivavahana tamin''i Jehovah, ary ny nanambinana azy'
  verse_text: 'Ary Josafata, zanak''i Asa, no nanjaka nandimby azy, ary nitombo hery hiaro tena tamin''ny Isiraely izy.'
mg1865::mg_14::17::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namponina miaramila tamin''ny tanàna mimanda rehetra eran''i Joda izy sady nametraka miaramila tany amin''ny tany Joda sy tany amin''izay tanànan''ny Efraima efa azon''i Asa rainy.'
mg1865::mg_14::17::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nomba an''i Josafata, satria nandeha tamin''ny nalehan''i Davida rainy izy, dia ilay tamin''ny voalohany, fa tsy mba nitady ireo Bala;'
mg1865::mg_14::17::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Jehovah, Andriamanitry ny rainy, kosa no notadiaviny, ary araka ny didiny no nalehany, fa tsy mba araka ny fanaon''ny Isiraely.'
mg1865::mg_14::17::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nampitoerin''i Jehovah teo an-tanany ny fanjakana; ary ny Joda rehetra nitondra fanomezana ho an''i Josafata, ka dia nanana harena sy voninahitra be izy.'
mg1865::mg_14::17::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fony nihanatoky tamin''ny lalan''i Jehovah. dia noravany tsy ho eo amin''ny Joda ny fitoerana avo sy ny Aseraha.'
mg1865::mg_14::17::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahatelo nanjakany dia naniraka ny mpanapaka izy, dia Benaila sy Obadia sy Zakaria sy Netanela ary Mikaia, hampianatra tany amin''ny tanànan''ny Joda,'
mg1865::mg_14::17::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Levita koa niaraka tamin''ireo, dia Semaia sy Netania sy Zebadia sy Asahela sy Semiramota sy Jonatana sy Adonia sy Tobia ary Tob-adonia, Levita, mbamin''i Elisama sy Jorama, mpisorona.'
mg1865::mg_14::17::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampianatra tany Joda izy ireo, ka nentiny ny bokin''ny lalàn''i Jehovah, dia nitety ny tanànan''ny Joda rehetra izy ka nampianatra teny amin''ny olona.'
mg1865::mg_14::17::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tahotra an''i Jehovah nahazo ny fanjakana rehetra tamin''ny tany manodidina an''i Joda, ka dia tsy nisy niady tamin''i Josafata ireo.'
mg1865::mg_14::17::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina sasany nitondra fanomezana sy vola hetra ho an''i Josafata; ary ny Arabo koa nitondra ondry aman''osy, dia ondrilahy fiton-jato amby fito arivo sy osilahy fiton-jato amby fito arivo.'
mg1865::mg_14::17::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josafata nihanahery indrindra ka nanao trano fiarovana sy tanàna fitehirizana tany Joda.'
mg1865::mg_14::17::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanana fananana betsaka tao amin''ny tanànan''ny Joda koa sy miaramila, lehilahy mahery, tany Jerosalema izy.'
mg1865::mg_14::17::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no nandaminana azy araka ny fianakaviany avy: Ny mpifehy arivo tamin''ny Joda dia Adna komandy, ary ny fehiny dia lehilahy mahery telo hetsy;'
mg1865::mg_14::17::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanarakaraka azy dia Johanana komandy, ary ny fehiny dia valo alina amby roa hetsy;'
mg1865::mg_14::17::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanarakaraka azy indray dia Amasia, zanak''i Zikry, ilay nanolotena ho an''i Jehovah, ary ny fehiny dia lehilahy mahery roa hetsy.'
mg1865::mg_14::17::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Benjamina dia Eliada, lehilahy mahery, ary ny fehiny dia lehilahy roa hetsy mitondra tsipïka sy ampinga;'
mg1865::mg_14::17::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanarakaraka azy dia Jozabada, ary ny fehiny dia valo alina amby iray hetsy efa voaomana hiady.'
mg1865::mg_14::17::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no mpitoetra tamin''ny mpanjaka, afa-tsy izay nampitoerin''ny mpanjaka tany amin''ny tanàna mimanda eran''i Joda rehetra.'
mg1865::mg_14::18::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikambanan''i Josafata sy Ahaba hiady tamin''ny Syriana sy ny nakany hevitra tamin''ny mpaminany, ary ny nahafatesan''i Ahaba, sy ny niverenan''i Josafata nankany Jerosalema'
  verse_text: 'Ary Josafata nanana harena sy voninahitra be; ary ny zananilahy dia nampanambadiny ny zanakavavin''i Ahaba.'
mg1865::mg_14::18::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony ela dia nidina nankany amin''i Ahaba tany Samaria izy. Ary Ahaba namono ondry aman''osy sy omby betsaka ho azy sy ho an''ny olona nanaraka azy, dia nitaona azy hiakatra ho any Ramota-gileada.'
mg1865::mg_14::18::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ahaba, mpanjakan''ny Isiraely, tamin''i Josafata, mpanjakan''ny Joda: Mba hiaraka amiko ho any Ramota-gileada va ianao? Dia hoy izy taminy: Eny fa tahaka ny tenanao ihany aho, ka ny oloko dia olonao; koa hiaraka aminao ho any an-tafika izahay.'
mg1865::mg_14::18::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Josafata tamin''ny mpanjakan''ny Isiraely; Masïna ianao, anontanio aloha ny tenin''i Jehovah.'
mg1865::mg_14::18::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely dia nanangona ny mpaminany efajato lahy ka nanao taminy hoe: Handeha hanafika an''i Ramota-gileada va isika, sa hijanona ihany aho ? Dia hoy ireo: Mandehana, fa hatolotr''Andriamanitra eo an-tananao izy, ry mpanjaka.'
mg1865::mg_14::18::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa Josafata: Moa tsy misy mpaminanin''i Jehovah koa va eto mba hanontaniantsika?'
mg1865::mg_14::18::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely tamin''i Josafata: Mbola misy lehilahy iray ihany ahazoantsika manontany amin''i Jehovah, saingy halako izy, satria tsy mbola naminany soa ho ahy izy, fa loza ihany mandrakariva; Mikaia, zanak''i Jimla, no anarany. Dia hoy Josafata: Aza dia manao izany, ry mpanjaka.'
mg1865::mg_14::18::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely niantso ny tandapa* anankiray ka nanao taminy hoe: Alao faingana Mikaia, zanak''i Jimla. [*Hebreo: ionoka]'
mg1865::mg_14::18::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely sy Josafata, mpanjakan''ny Joda, samy nipetraka teo amin''ny seza fiandrianany avy teo amin''ny famoloana eo anoloan''ny vavahadin''i Samaria, sady samy efa niakanjo ny akanjony avy; ary ny mpaminany rehetra naminany teo anatrehany.'
mg1865::mg_14::18::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia, zanak''i Kenana, dia nanao tandroby ka nanao hoe: Izao no lazain''i Jehovah: Ireto no hanotoanao ny Syriana mandra-paharingany.'
mg1865::mg_14::18::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpaminany rehetra naminany toy izao koa hoe: Mandehana ho any Ramota-gileada, dia hambinina ianao; fa hotolotr''i Jehovah eo an-tananao izy, ry mpanjaka.'
mg1865::mg_14::18::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay iraka izay nandeha naka an''i Mikaia niteny taminy hoe: Indro. fa efa iray teny avokoa izao ny mpaminany, ka samy milaza soa ho an''ny mpanjaka: masïna ianao, aoka re ny teninao mba ho tahaka ny an''ny anankiray amin''ireo, ka mba mitenena soa koa.'
mg1865::mg_14::18::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mikaia: Raha velona koa Jehovah, izay lazain''Andriamanitro ihany no hambarako.'
mg1865::mg_14::18::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''ny mpanjaka izy. Ary hoy ny mpanjaka taminy: Ry Mikaia, handeha hanafika an''i Ramota-gileada va isika, sa hijanona ihany aho? Ary izy namaly azy hoe: Mandehana, dia hambinina ianareo, fa hatolotra eo an-tananareo izy.'
mg1865::mg_14::18::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Impiry no hampianianako anao mba tsy hilaza na inona na inona amiko amin''ny anaran''i Jehovah afa-tsy izay marina ihany?'
mg1865::mg_14::18::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mikaia: Hitako fa indreny ny Isiraely rehetra niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry, ary hoy Jehovah: Ireto efa tsy manan-tompo, ka aoka izy samy hody soa aman-tsara any an-tranony avy.'
mg1865::mg_14::18::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely tamin''ny Josafata: Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy, fa loza ihany?'
mg1865::mg_14::18::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mikaia: Henoy ary ny tenin''i Jehovah: Nahita an''i Jehovah nipetraka teo amin''ny seza fiandrianany aho, ary ireo maro be rehetra any an-danitra nitsangana teo amin''ny ankavanany sy teo amin''ny ankaviany.'
mg1865::mg_14::18::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: Iza no hitaona an''i Ahaba, mpanjakan''ny Isiraely, handeha ho any Ramota-gileada ka ho lavo any? Ary ny anankiray niteny toy izao, ary ny anankiray kosa niteny toy izao.'
mg1865::mg_14::18::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandroso ny fanahy ka nitsangana teo anatrehan''i Jehovah ary nanao hoe: Izaho no hitaona azy. Ary hoy Jehovah taminy: Amin''inona anefa?'
mg1865::mg_14::18::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Hivoaka aho ka ho tonga fanahy mandainga ao am-bavan''ny mpaminaniny rehetra. Dia hoy indray Jehovah: Ho voataonanao ihany izy, ka hahatanteraka ianao; mivoaha ary, ka ataovy izany.'
mg1865::mg_14::18::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, Jehovah efa nanisy fanahy mandainga ao am-bavan''ireto mpaminaninao ireto, ary Izy koa efa nilaza ny loza hanjo anao.'
mg1865::mg_14::18::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zedekia, zanak''i Kenana, nanatona, dia namely ny takolak''i Mikaia sady nanao hoe: Taiza no lalana nialan''ny Fanahin''i Jehovah tamiko hiteny aminao?'
mg1865::mg_14::18::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mikaia: Indro, ho hitanao izany amin''ny andro hidiranao ao amin''ny efi-trano anatiny* hierenao. [*Na: hitsofotsofohanao amin''ny efi-trano]'
mg1865::mg_14::18::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely: Raiso Mikaia, ka ento miverina izy ho any amin''i Amona, komandin''ny tanàna, sy ho any amin''i Joasy, zanaky ny mpanjaka,'
mg1865::mg_14::18::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka lazao hoe: Izao no lazain''ny mpanjaka: Ataovy ao an-trano-maizina ilehity, ka fahano mofom-pahoriana sy ranom-pahoriana izy mandra-pahatongako soa aman-tsara.'
mg1865::mg_14::18::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mikaia: Raha tahiny ho tafaverina soa aman-tsara ianao, dia tsy nampitenenin''i Jehovah aho tsy akory. Ary hoy koa izy: Samia mihaino izany, ry firenena rehetra.'
mg1865::mg_14::18::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra nankany Ramota-gileada ny mpanjakan''ny Isiraely sy Josafata, mpanjakan''ny Joda.'
mg1865::mg_14::18::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjakan''ny Isiraely tamin''i Josafata: Hody olon-kafa aho ka hitsarapaka any anatin''ny ady, fa ianao kosa dia miakanjoa ny akanjonao ihany. Dia nody olon-kafa ny mpanjakan''ny Isiraely ka nitsarapaka tany anatin''ny ady.'
mg1865::mg_14::18::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjakan''i Syria efa nandidy Ireo komandin''ny kalesiny nanao hoe: Aza miady na amin''ny kely na amin''ny lehibe, afa-tsy amin''ny mpanjakan''ny Isiraely ihany.'
mg1865::mg_14::18::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita an''i Josafata ireo komandin''ny kalesy, dia hoy izy: Iny mihitsy no mpanjakan''ny Isiraely. Dia nohodidininy hasiany izy, ka dia niantsoantso Josafata, ary Jehovah namonjy azy; eny, Andriamanitra nampiala ireo teo aminy;'
mg1865::mg_14::18::32:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa hitan''ireo komandin''ny kalesy fa tsy ny mpanjakan''ny Isiraely izy, dia niverina niala taminy ireo.'
mg1865::mg_14::18::33:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray nandefa zana-tsipïka kitoatoa ka nahavoa ny mpanjakan''ny Isiraely teo anelenalen''ny fiarovan-tratrany sy ny eo ambaniny, ka dia hoy izy tamin''ny mpampandeha ny kalesiny: Ahodino, ka ento miala eto amin''ny mpiady aho, fa voa.'
mg1865::mg_14::18::34:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihamafy ny ady tamin''izany andro izany; ary ny mpanjakan''ny Isiraely nihafy nitsangana teo amin''ny kalesiny tandrifin''ny Syriana mandra-paharivan''ny andro; fa nony efa hilentika ny masoandro, dia maty izy.'
mg1865::mg_14::19::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josafata, mpanjakan''ny Joda, niverina soa aman-tsara ho any an-tranony tany Jerosalema.'
mg1865::mg_14::19::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka hitsena azy Jeho, zanak''i Hanany mpahita, ka nanao tamin''i Josafata mpanjaka hoe: Moa ny ratsy fanahy va no tokony hampiana, ary izay mankahala an''i Jehovah va no tokony ho tianao? Koa noho izany dia tezitra aminao Jehovah.'
mg1865::mg_14::19::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mba misy fahatsaram-panahy hita ihany aminao, fa noravanao tsy ho eo amin''ny tany ny Aseraha, sady nampiomana ny fonao hitady an''Andriamanitra ianao.'
mg1865::mg_14::19::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny nataon''i Josafata hahatsara ny fitondram-panjakana'
  verse_text: 'Ary Josafata nitoetra tany Jerosalema; ary nandeha hitety ny olona indray izy hatrany Beri-sheba ka hatrany amin''ny tany havoan''i Efraima ary nampiverina ny olona ho amin''i Jehovah, Andriamanitry ny razany.'
mg1865::mg_14::19::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanendry mpitsara tamin''ny tany izy, dia tamin''ny isan-tanàna mimanda eran''i Joda,'
mg1865::mg_14::19::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Tandremo izay hataonareo; fa tsy ho an''olona no hitsaranareo, fa ho an''i Jehovah, sady momba anareo ao amin''ny fitsarana Izy.'
mg1865::mg_14::19::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho ao aminareo ny tahotra an''i Jehovah; tandremo ka ataovy izany, fa tsy mba misy heloka amin''i Jehovah Andriamanitsika, na fizahan-tavan''olona, na fandraisana kolikoly.'
mg1865::mg_14::19::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany Jerosalema koa no nanendren''i Josafata ny sasany tamin''ny Levita sy ny mpisorona ary ny lohan''ny fianakaviana tamin''ny Isiraely ho amin''ny fitsaran''i Jehovah sy ny adin''olona (fa efa tafaverina tany Jerosalema izy tamin''izay)'
mg1865::mg_14::19::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nandidy azy hoe: Izao no hataonareo amin''ny fahatahorana an''i Jehovah sy amin''ny fahamarinana ary amin''ny fo mahitsy:'
mg1865::mg_14::19::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na inona na inona no ady avy amin''ny rahalahinareo izay monina amin''ny tanànany, na ny amin''ny mahafaty aina, na ny amin''ny hevitry ny lalàna sy ny didy ary ny fitsipika samy hafa, dia anaro izy mba tsy ho meloka amin''i Jehovah, fandrao iharan''ny fahatezerana ianareo sy ny rahalahinareo; izany no ataovy, dia tsy ho meloka ianareo.'
mg1865::mg_14::19::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Amaria mpisoronabe no ho lehibenareo amin''ny raharahan''i Jehovah rehetra; ary Zebadia, zanak''Isimaela, mpanapaka ny taranak''i Joda, ho lehibenareo amin''ny raharahan''ny mpanjaka rehetra kosa; ary ny Levita ho mpifehy hanampy anareo. Mahereza, ka mahefà; ary Jehovah anie homba izay tsara.'
mg1865::mg_14::20::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandehanan''ny Moabita sy ny namany hiady tamin''ny Joda, ary ny vavaka nataon''i Josafata, sy ny namonjen''Andriamanitra azy'
  verse_text: 'Ary nony afaka izany, dia avy hiady tamin''i Josafata ny taranak''i Moaba sy ny taranak''i Amona mbamin''ny any ankoatry ny Amonita*. [*Na: mbamin''ny Meonita; izahao II Tantara 36:7]'
mg1865::mg_14::20::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tonga ka nanambara tamin''i Josafata hoe: Indreo, misy olona betsaka avy any an-dafin''ny ranomasina, dia avy any Syria, ho avy hiady aminao; ary indreo izy ao Hazezon-tamara (Enjedy izany).'
mg1865::mg_14::20::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natahotra Josafata ka nanatrika tsara hitady an''i Jehovah sady niantso andro fifadian-kanina ho an''ny tanin''ny Joda rehetra.'
mg1865::mg_14::20::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niangona ny Joda hangataka famonjena amin''i Jehovah; eny, avy tamin''ny tanànan''ny Joda rehetra hitady an''i Jehovah izy.'
mg1865::mg_14::20::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josafata nitsangana teo amin''ny fiangonan''ny Joda sy Jerosalema, Tao amin''ny tranon''i Jehovah, teo anoloan''ny kianja vaovao,'
mg1865::mg_14::20::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Ry Jehovah o, Andriamanitry ny razanay, tsy Ianao va no Andriamanitra any an-danitra? Eny, Ianao no manapaka amin''ny fanjakan''ny jentilisa rehetra, ary eo an-tananao ny hery sy ny fahefana, ka tsy misy mahasakana Anao.'
mg1865::mg_14::20::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Andriamanitray o, tsy Ianao va no nandroaka ny mponina tamin''ity tany ity hiala teo anoloan''ny Isiraely olonao ka nanome azy mandrakizay ho an''ny taranak''i Abrahama sakaizanao?'
mg1865::mg_14::20::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nonina taty izy ka nanao fitoerana masina teto ho an''ny anaranao sady nanao hoe:'
mg1865::mg_14::20::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manjo anay ny loza, na sabatra, na famaliana, na areti-mandringana, na mosary, ary hitsangana manatrika ity trano ity sy eto anatrehanao izahay (fa ny anaranao no amin''ity trano ity) ka hitaraina aminao amin''ny fahorianay, dia hihaino Ianao ka hamonjy.'
mg1865::mg_14::20::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa indreo ny taranak''i Amona sy Moaba ary ny avy any an-tendrombohitra, Seïra, dia ilay tsy navelanao hotafihin''ny Isiraely, fony izy nivoaka avy tany amin''ny tany Egypta, ka nivily fa tsy nandringana azy;'
mg1865::mg_14::20::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa indreo izy mamaly ratsy anay ka avy handroaka anay amin''ny lova nomenao anay.'
mg1865::mg_14::20::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Andriamanitray o, tsy hitsara azy va Ianao? Fa izahay dia tsy manan-kery hanohitra ireo olona betsaka ireo, izay avy hamely anay, koa tsy hitanay izay hataonay; fa Ianao no andrandrain''ny masonay.'
mg1865::mg_14::20::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda rehetra mbamin''ny vadiny aman-janany koa dia samy nitsangana teo anatrehan''i Jehovah.'
mg1865::mg_14::20::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jahaziela, zanak''i Zakaria, zanak''i Benaia, zanak''i Jeiela, zanak''i Matania, Levita amin''ny taranak''i Asafa, dia voatsindrin''ny Fanahin''i Jehovah teo amin''ny fiangonana'
mg1865::mg_14::20::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Mihainoa ianareo, ry Joda rehetra sy ry mponina any Jerosalema, ary ianao, ry Josafata mpanjaka: Izao no lazain''i Jehovah aminareo: Aza matahotra na mivadi-po ny amin''ireo olona betsaka ireo, fa tsy anareo ny ady, fa an''Andriamanitra.'
mg1865::mg_14::20::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rahampitso dia midìna hiady aminy ianareo; fa, indreo, hiakatra amin''ny fiakarana Ziza izy; ary ianareo hahita azy eo amin''ny faran''ny lohasahan-driaka tandrifin''ny efitr''i Jeroela.'
mg1865::mg_14::20::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ianareo anefa no hiady amin''ity; mijanona tsara, fa ho hitanareo ny hamonjen''i Jehovah anareo, ry Joda sy Jerosalema. Aza matahotra na mivadi-po, fa rahampitso dia mivoaha hiady aminy; fa Jehovah no momba anareo.'
mg1865::mg_14::20::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka tamin''ny tany Josafata; ary ny Joda sy ny mponina rehetra tany Jerosalema niankohoka teo anatrehan''i Jehovah koa ka nivavaka.'
mg1865::mg_14::20::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny Levita, taranaky ny Kehatita sy taranaky ny Koraita, mba hidera an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny feo mahery indrindra.'
mg1865::mg_14::20::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifoha maraina koa izy, dia niainga nankany an''efitr''i Tekoa, ary nony nivoaka izy, dia nitsangana teo Josafata ka nanao hoe : Mihainoa ahy, ry Josa, sy ianareo, ry mponina eto Jerosalema: Minoa an''i Jehovah Andriamanitrareo, dia ho tafatoetra ianareo; minoa ny mpaminaniny, dia hambinina ianareo.'
mg1865::mg_14::20::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niara-nihevitra tamin''ny olona izy, dia nanendry mpihira ho an''i Jehovah hidera amin''ny fihaingoana masina, raha mivoaka eo anoloan''ny olona efa voaomana hiady, ka hanao hoe: Miderà an''i Jehovah, fa mandrakizay ny famindram-pony.'
mg1865::mg_14::20::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nanomboka nihoby sy nidera ireo, dia nasian''i Jehovah otrika hamely ny taranak''i Amona sy Moaba sy ny avy any an-tendrombohitra Seïra, izay avy hamely ny Joda, ka dia resy ireo.'
mg1865::mg_14::20::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny taranak''i Amona sy Moaba namely ny avy any an-tendrombohitra Seïra ka namono sy nandringana azy; ary nony voaringany ny mponina tany Seïra, dia nifandringana kosa izy samy izy ihany.'
mg1865::mg_14::20::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''ilay fitazanana any an''efitra ny Joda, dia nijery ireo olona betsaka ireo izy, koa, indreo, nisy faty niampatrampatra tamin''ny tany, fa tsy nisy afa-nandositra.'
mg1865::mg_14::20::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy hamabo azy Josafata sy ny vahoakany, dia nahita harena betsaka sy faty* ary fanaka sarobidy teo izy, ka dia namabo mihoatra noho izay zakany ho entina; ary hateloana no nanangonany ny babo, fa be dia be ireny. [*Na: fitafiana]'
mg1865::mg_14::20::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahefatra dia nivory tao amin''ny lohasaha Beraka* izy, fa tany no nisaorany an''i Jehovah; koa izany no nanaovany izany tany izany hoe Lohasaha Beraka mandraka androany. [*Beraka = Fisaorana]'
mg1865::mg_14::20::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia niverina ny lehilahy rehetra amin''ny Joda sy Jerosalema, ary Josafata nitarika azy hankany Jerosalema indray tamin''ny fifaliana, fa Jehovah nampifaly azy ny amin''ny fahavalony.'
mg1865::mg_14::20::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany Jerosalema izy nitondra valiha sy lokanga ary trompetra ka nankao an-tranon''i Jehovah.'
mg1865::mg_14::20::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahatahorana an''Andriamanitra nahazo ny fanjakana rehetra manodidina, nony efa reny fa Jehovah no niady tamin''ny fahavalon''ny Isiraely.'
mg1865::mg_14::20::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandry fahizay ny fanjakan''i Josafata; fa nomen''Andriamaniny fiadanana tamin''ny manodidina izy.'
mg1865::mg_14::20::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Filazana fohifohy ny amin''ny nanjakan''i Josafata'
  verse_text: 'Ary Josafata nanjaka tamin''ny Joda; dimy amby telo-polo taona izy, fony vao nanjaka, ary dimy amby roa-polo taona no nanjakany tany Jerosalema, Ary ny anaran-dreniny dia Azoba, zanakavavin''i Sily.'
mg1865::mg_14::20::32:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha tamin''ny lalana nalehan''i Asa rainy izy ka tsy niala tamin''izany, fa nanao izay mahitsy eo imason''i Jehovah.'
mg1865::mg_14::20::33:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny fitoerana avo tsy mba noravana; fa ny olona tsy mbola nampiomana ny fony hitady an''Andriamanitry ny razany.'
mg1865::mg_14::20::34:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Josafata sisa, na ny voalohany na ny farany, indro, efa voasoratra ao amin''ny tenin''i Jeho, zanak''i Hanany, izay nakambana ao amin''ny bokin''ny mpanjakan''ny Isiraely, izany.'
mg1865::mg_14::20::35:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nony afaka izany, Josafata, mpanjakan''ny Joda, nikambana tamin''i Ahazia, mpanjakan''ny Isiraely, izay nanao ratsy;'
mg1865::mg_14::20::36:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nikambana taminy hanao sambo hankany Tarsisy izy, ka tao Ezion-gebera no nanaovany azy.'
mg1865::mg_14::20::37:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 20
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliezera, zanak''i Dodavaho, avy any Maresa, naminany ny amin''i Josafata hoe: Noho ny nikambananao tamin''i Ahazia dia horavan''i Jehovah ny asanao. Ary nahavakiana ny sambo ka tsy nahazo nankany Tarsisy.'
mg1865::mg_14::21::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahafatesan''i Josafata sy ny nanjakan''i Jehorama zanany'
  verse_text: 'Ary Josafata lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-Tanànan''i Davida izy; ary Jehorama zanany no nanjaka nandimby azy.'
mg1865::mg_14::21::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanan-drahalahy, zanak''i Josafata, koa izy, dia Azaria sy Jehiela sy Zakaria sy Azaria sy Mikaela ary Sefatia; ireo rehetra ireo no zanak''i Josafata, mpanjakan''ny Isiraely.'
mg1865::mg_14::21::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomen-drainy harena betsaka ireo, dia volafotsy sy volamena ary zava-tsoa mbamin''ny tanàna sasany mimanda tany Joda; fa ny fanjakana kosa dia nomeny an''i Jehorama, satria izy no lahimatoa.'
mg1865::mg_14::21::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nanjaka tamin''ny fanjakan''ny rainy Jehorama, dia nitombo hery izy ka namono ny rahalahiny rehetra mbamin''ny mpanapaka sasany tamin''ny Isiraely koa tamin''ny sabatra.'
mg1865::mg_14::21::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby telo-polo taona Jehorama, fony izy vao nanjaka, ary valo taona no nanjakany tany Jerosalema.'
mg1865::mg_14::21::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha tamin''ny lalan''ny mpanjakan''ny Isiraely izy, dia tahaka ny nataon''ny taranak''i Ahaba fa zanakavavin''i Ahaba no vadiny, eny, nanao izay ratsy eo imason''i Jehovah izy.'
mg1865::mg_14::21::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jehovah tsy nety nandringana ny taranak''i Davida noho ny fanekena nataony tamin''i Davida sy ny nilazany fa homeny jiro mandrakizay izy mbamin''ny taranany.'
mg1865::mg_14::21::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andron''i Jehorama no niodinan''ny Edomita ka tsy nanoa ny Joda, fa nanangana mpanjaka ho azy izy.'
mg1865::mg_14::21::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nivoaka Jehorama sy ireo mpanjaka nitondra ny kalesiny rehetra; ary nanaovany latsak''alina ny Edomita izay nanodidina azy sy ny komandin''ny kalesy.'
mg1865::mg_14::21::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny Edomita mbola niodina ka tsy nanoa ny Joda ihany ambaraka androany. Ary tamin''izany andro izany Libna koa niodina tsy nety nanoa an''i Jehorama, satria efa nahafoy an''i Jehovah, Andriamanitra ny razany, izy.'
mg1865::mg_14::21::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fitoerana avo teny an-tendrombohitr''i Joda koa izy sady nampijangajanga ny mponina tany Jerosalema ary nitaona ny Joda mangingina hanao izany.'
mg1865::mg_14::21::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy taratasy avy tamin''i Elia mpaminany tonga tao aminy nanao hoe: Izao no lazain''i Jehovah, Andriamanitr''i Davida rainao: Noho ny tsy nandehananao tamin''ny lalan''i Josafata rainao, na ny lalan''i Asa, mpanjakan''ny Joda,'
mg1865::mg_14::21::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nandeha tamin''ny lalan''ny mpanjakan''ny Isiraely kosa ianao ka nampijangajanga ny Joda sy ny mponina any Jerosalema toy ny fijangajangan''ny taranak''i Ahaba, sady novonoinao koa ny rahalahinao nateraky ny rainao, izay tsara noho ianao,'
mg1865::mg_14::21::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia, indro, hasian''i Jehovah areti-mandringana ny vahoakanao sy ny zanakao sy ireo vadinao mbamin''ny biby fiompinao rehetra;'
mg1865::mg_14::21::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ianao koa ho azon''ny aretina mafy, dia aretina amin''ny tsinainao, mandra-pialàlan''ny tsinainao isan''andro isan''andro noho ny aretina.'
mg1865::mg_14::21::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namporisika ny Filistina sy ny Arabo izay ao akaikin''ny Etiopiana hamely an''i Jehorama;'
mg1865::mg_14::21::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niakatra tany Joda ireo ka nisesika tao, dia nobaboiny ny fananana rehetra izay an''ny ankohonan''ny mpanjaka mbamin''ny zanany sy ny vadiny koa, ka tsy nisy zanany intsony, afa-tsy Joahaza faralahiny ihany.'
mg1865::mg_14::21::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka izany rehetra izany, dia nasian''i Jehovah aretina tsy azo sitranina tamin''ny tsinainy izy.'
mg1865::mg_14::21::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ela, nony afaka roa taona, dia nialàla ny tsinainy azon''ny aretiny; ka dia maty tamin''ny fangirifiriana mafy izy. Ary ny vahoakany tsy mba nandoro zavatra ho fisaonana azy toy ny nataony tamin''ny razany.'
mg1865::mg_14::21::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby telo-polo taona izy, fony vao nanjaka, ary valo taona no nanjakany tany Jerosalema; koa lasa tsy nisy nalahelo azy izy. Ary nalevina tao an-Tanànan''i Davida ihany izy, nefa tsy mba tao amin''ny fasan''ny mpanjaka.'
mg1865::mg_14::22::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Ahazia'
  verse_text: 'Ary ny mponina tany Jerosalema nampanjaka an''i Ahazia, faralahin''i Jehorama, handimby azy; fa ny zokiny rehetra efa matin''ny mpitoha ady izay nanaraka ny Arabo hatrany an-toby avokoa. Koa Ahazia, zanak''i Jehorama, mpanjakan''ny Joda, no nanjaka.'
mg1865::mg_14::22::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby efa-polo* taona Ahazia, fony izy vao nanjaka, ary herintaona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Atalia, zanak''i Omry. [*Na: Roa amby roa-polo; izahao II Mpanjaka 8:26]'
mg1865::mg_14::22::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandeha tamin''ny lalan''ny taranak''i Ahaba koa izy; fa ny reniny no nanome saina azy hanao ratsy.'
mg1865::mg_14::22::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nanao izay ratsy eo imason''i Jehovah toy ny taranak''i Ahaba izy; fa ireny no nanome saina azy taorian''ny nahafatesan''ny rainy ka nampidi-doza taminy.'
mg1865::mg_14::22::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny saina nomen''ireo azy no narahiny, ka niara-nandeha tamin''i Jorama, zanak''i Ahaba, mpanjakan''ny Isiraely, izy hiady tamin''i Hazaela, mpanjakan''i Syria, teo Ramota-gileada; ary ny Syriana nahavoa an''i Jorama.'
mg1865::mg_14::22::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina mba hotsaboina tao Jezirela izy amin''ny feriny tamin''ny nahavoazana azy tao Rama, fony izy niady tamin''i Hazaela, mpanjakan''i Syria. Ary Azaria*, zanak''i Jehorama, mpanjakan''ny Joda, nidina mba hamangy an''i Jorama, zanak''i Ahaba, tao Jezirela, satria marary izy. [*Na: Ahazia; izahao II Tantara 22:1]'
mg1865::mg_14::22::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy tamin''Andriamanitra ny loza nanjo an''i Ahazia tamin''ny nankanesany tany amin''i Jorama, fa nony tonga izy, dia niara-nivoaka tamin''i Jorama mba hitsena an''i Jeho, zanak''i Nimsy, izay nohosoran''i Jehovah handringana ny taranak''i Ahaba.'
mg1865::mg_14::22::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny namalian''i Jeho ny taranak''i Ahaba dia hitany ireo mpanapaka ny Joda sy ny zana-drahalahin''i Ahazia, izay nanompo an''i Ahazia, ka novonoiny.'
mg1865::mg_14::22::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitady an''i Ahazia koa izy; koa nisy nahita azy, raha mbola niery tany Samaria izy, dia nitondra azy ho any amin''i Jeho, ary namono azy ny olona ka nandevina azy; fa hoy ireo: Zanak''i Josafata, ilay nitady an''i Jehovah tamin''ny fony rehetra, ity. [*Ny nanjakan''i Atalia, sy ny namonoana azy, ary ny nampanjakana an''i Joasy handimby azy] Ka dia tsy nahatana ny fanjakana ny terak''i Ahazia.'
mg1865::mg_14::22::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Atalia, renin''i Ahazia, fa maty ny zanany, dia nitsangana izy ka nandringana ny zanak''andriana rehetra tamin''ny taranak''i Joda.'
mg1865::mg_14::22::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joseba, zanakavavin''ny mpanjaka, dia naka an''i Joasy, zanak''i Ahazia, ka namonjy azy avy teo amin''ny zanaky ny mpanjaka izay novonoina, dia nampiditra azy sy ny mpitaiza azy ho ao an-trano fitehirizam-pandriana. Ary nafenin''i Joseba, zanakavavin''i Jehorama mpanjaka, vadin''i Joiada mpisorona, izy (fa anabavin''i Ahazia ravehivavy) mba tsy ho hitan''i Atalia, ka dia tsy mba voavonony izy.'
mg1865::mg_14::22::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niery enin-taona tao aminy tao an-tranon''Andriamanitra izy. Ary Atalia no nanjaka tamin''ny tany'
mg1865::mg_14::23::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahafito Joiada nitombo hery ka nanao fanekena tamin''ny mpifehy zato, dia Azaria, zanak''i Jerohama, sy Isimaela, zanak''i Johanana, sy Azaria, zanak''i Obeda, sy Mahaseia, zanak''i Adaia, ary Elisafata, zanak''1 Zikry.'
mg1865::mg_14::23::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitety an''i Joda Ireo ka namory ny Levita avy tany amin''ny tanànan''ny Joda rehetra sy ny lohan''ny fianakaviana tamin''ny Isiraely, dia tonga tany Jerosalema ireo.'
mg1865::mg_14::23::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra vory tao dia nanao fanekena tamin''ny mpanjaka tao an-tranon''Andriamanitra. Ary hoy Joiada taminy: Indro, ny zanaky ny mpanjaka no hanjaka araka ny efa nolazain''i Jehovah ny amin''ny taranak''i Davida.'
mg1865::mg_14::23::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no hataonareo: ny ampahatelonareo izay milatsaka amin''ny Sabata, dia ny mpisorona sy ny Levita, ho mpiandry varavarana;'
mg1865::mg_14::23::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny ampahatelonareo ho ao an-tranon''ny mpanjaka; ary ny ampahatelonareo ho eo amin''ny vavahadin''ny fanorenana; ary ny vahoaka rehetra kosa dia ho eo amin''ny kianjan''ny tranon''i Jehovah.'
mg1865::mg_14::23::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aza avela hisy hiditra ao an-tranon''i Jehovah afa-tsy ny mpisorona sy ny Levita izay manao fanompoam-pivavahana ihany; ireo ihany no hiditra, satria masina ireo; fa ny vahoaka rehetra kosa dia hitandrina izay nasain''i Jehovah hotandremana.'
mg1865::mg_14::23::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita hanemitra manodidina ny mpanjaka, samy mitana ny fiadiany avy; ka na iza na iza miditra ao an-trano dia Vonoy, ary arahonareo ny mpanjaka, na miditra na mivoaka izy.'
mg1865::mg_14::23::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita sy ny Joda rehetra dia nanao araka izay rehetra nandidian''i Joiada mpisorona azy, ka samy nitondra ny olom-peheziny izay nilatsaka tamin''ny Sabata sy izay niala tamin''ny Sabata izy; fa Joiada mpisorona tsy nandrava ny antokony.'
mg1865::mg_14::23::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomen''i Joiada mpisorona ho an''ny mpifehy zato ny lefona sy ny ampinga kely sy ny ampinga lehibe, izay an''i Davida mpanjaka ka tao an-tranon''Andriamanitra.'
mg1865::mg_14::23::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra dia nalahany, samy nitana ny fiadiany avy hanodidina ny mpanjaka hatramin''ny lafiny ankavavan''ny trano ka hatramin''ny lafiny ankavia, hatramin''ny alitara ka hatramin''ny trano.'
mg1865::mg_14::23::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny nivoaka ny zanakalahin''ny mpanjaka ka nampisatrohiny ny satro-boninahitra, sady notolorany ny teni-vavolombelona*, ka dia nampanjakainy. Ary Joiada sy ny zanany nanosotra azy ka niantso hoe: Ho ela velona anie ny mpanjaka! [*Dia ny Didy Folo]'
mg1865::mg_14::23::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Atalia ny tabataban''ny vahoaka nifamoivoy sy niarahaba ny mpanjaka, dia mba nankao amin''ny vahoaka tao an-tranon''i Jehovah koa izy.'
mg1865::mg_14::23::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitany fa, indro, ny mpanjaka nitsangana teo amin''ny fitoeran''andriana teo amin''ny fidirana, ary ny mpanapaka sy ny mpitsoka ny trompetra dia teo anilan''ny mpanjaka; ary ny vahoaka rehetra dia nifaly sady nitsoka ny trompetra ary ny mpihira amin''ny zava-maneno isan-karazany no nitarika ny hira fiderana. Dia nandriatra ny fitafiany Atalia ka niantso hoe: Fikomiana! fikomiana!'
mg1865::mg_14::23::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nasain''i Joiada navoaky ny kapiteny! mpifehy ny miaramila, izy, ka hoy izy tamin''ireo: Avoahy eny ivelan''ny filaharana izy, ary izay manaraka azy dia vonoy amin''ny sabatra. Fa ny mpisorona efa nandrara hoe: Aza vonoina eto an-tranon''i Jehovah izy.'
mg1865::mg_14::23::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona nisava teo an-daniny roa, dia nankamin''ny fidirana amin''ny vavahadin-tsoavaly ravehivavy ka niditra tao an-tranon''ny mpanjaka; dia novonoiny teo izy.'
mg1865::mg_14::23::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joiada nampanao fanekena ny vahoaka rehetra sy ny mpanjaka mbamin''ny tenany mba ho olon''i Jehovah.'
mg1865::mg_14::23::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka vehetra niditra tao an-tranon''i Bala ka nandrava azy; ny alitara sy ny endri-javatra dia notorotoroiny avokoa, ary Matana, mpisoron''i Bala, novonoiny teo anoloan''ny alitara.'
mg1865::mg_14::23::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joiada nanendry olona hitandrina ny tranon''i Jehovah hofehezin''ny Levita mpisorona izay nozarazarain''i Davida ho ao an-tranon''i Jehovah, hanatitra ny fanatitra dorana ho an''i Jehovah, araka ny voasoratra ao amin''ny lalàn''i Mosesy, amin''ny fifaliana sy ny fihirana, dia araka ny nasain''i Davida natao.'
mg1865::mg_14::23::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalatsany teo am-bavahadin''ny tranon''i Jehovah ny mpiandry varavarana mba tsy hisy zavatra maloto na inona na inona ho tafiditra ao.'
mg1865::mg_14::23::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalainy ny mpifehy zato sy ny olona manan-kaja sy ny mpanapaka ny olona ary ny vahoaka rehetra; ary dia nentiny nidina avy tao an-tranon''i Jehovah ny mpanjaka, ka ny vavahady ambony no nalehany hankao an-tranon''ny mpanjaka; ary nametraka ny mpanjaka teo amin''ny seza fiandrianan''ny fanjakana izy.'
mg1865::mg_14::23::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifaly ny vahoaka rehetra; ary nandry fahizay ny tanana, fa Atalia efa novonoiny tamin''ny sabatra.'
mg1865::mg_14::24::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Joasy, sy ny nanamboarana ny rafitry ny tempoly'
  verse_text: 'Fito taona no niainan''i Joasy, fony izy vao nanjaka, efa efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Zibia, avy any Beri-sheba.'
mg1865::mg_14::24::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joasy nanao izay mahitsy eo imason''i Jehovah tamin''ny andro rehetra niainan''i Joiada mpisorona.'
mg1865::mg_14::24::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangalan''i Joiada vady roa Joasy, dia niteraka zazalahy sy zazavavy izy.'
mg1865::mg_14::24::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka izany, dia mby ao am-pon i Joasy ny hanamboatra ny tranon''i Jehovah.'
mg1865::mg_14::24::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namory ny mpisorona sy ny Levita izy ka nanao taminy hoe: Mandehana ho any amin''ny tanànan''ny Joda, ka mamoria vola isan-taona amin''ny Isiraely rehetra hanamboarana ny tranon''Andriamanitrareo; ary hafainganonareo ny raharaha. Nefa ny Levita tsy nanafaingana izany.'
mg1865::mg_14::24::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka dia nampaka an''i Joiada, lohany tamin''ireo, ka nanao taminy hoe: Nahoana no tsy nasainao nitondra ny hetra avy tany Joda sy Jerosalema ny Levita, araka ny didin''i Mosesy, mpanompon''i Jehovah sy ny fiangonan''ny Isiraely ho ao amin''ny tabernakelin''ny vavolombelona?'
mg1865::mg_14::24::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zanak''i Atalia, ilay vehivavy ratsy fanahy, efa nandrava ny tranon''Andriamanitra; ary ny zavatra masina rehetra tao an-tranon''i Jehovah koa dia efa nateriny ho an''ireo Bala.'
mg1865::mg_14::24::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasain''ny mpanjaka nanao vata anankiray izy, dia napetrany teo ivelan''ny vavahadin''ny tranon''i Jehovah izany.'
mg1865::mg_14::24::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandefa teny eran''i Joda sy Jerosalema izy mba haterina ho an''i Jehovah ny hetra izay nasain''i Mosesy, mpanompon''Andriamanitra, haloan''ny Isiraely, fony izy tany an''efitra.'
mg1865::mg_14::24::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia faly ny mpanapaka rehetra sy ny vahoaka rehetra, ka dia nitondra izany ary nandatsaka azy tao amin''ny vata ambara-pahatapiny.'
mg1865::mg_14::24::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay andro nitondran''ny Levita ny vata ho any amin''ny toniany voatendrin''ny mpanjaka, raha hitany fa be ny vola, dia avy ny mpanoratry ny mpanjaka sy ny toniany voatendrin''ny mpisoronabe ka nanaisotra izay rehetra tao amin''ny vata, dia nitondra ny vata niverina ho eo amin''ny fitoerany indray. Toy izany no nataony mandrakariva, ka nahavory vola betsaka izy.'
mg1865::mg_14::24::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomen''ny mpanjaka sy Joiada ho an''izay nanao ny raharahan''ny tranon''i Jehovah ny vola, ka nanakaraman''ireo mpipai-bato sy mpandrafitra ary mpanefy vy sy varahina mba hanamboatra ny tranon''i Jehovah.'
mg1865::mg_14::24::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao ny mpiasa, ka vita tsara ny asa; ary namboariny ho toy ny teo aloha ny tranon''Andriamanitra ka nataony mafy.'
mg1865::mg_14::24::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony vitany izany, dia nentiny teo anatrehan''ny mpanjaka sy Joiada ny vola sisa ka nanaovany fanaka ho an''ny tranon''i Jehovah, dia fanaka ho enti-manao fanompoam-pivavahana sy manatitra fanatitra ary lovia kely sy fanaka volamena sy volafotsy. Ary nanatitra fanatitra dorana tao an-tranon''i Jehovah mandrakariva izy tamin''ny andron''i Joiada rehetra.'
mg1865::mg_14::24::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tratrantitra sy ela niainana* Joiada vao maty: telo-polo amby zato taona izy vao maty. [*Hebreo: voky andro, na afa-pon''ny miaina]'
mg1865::mg_14::24::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalevina tao an-Tanànan''i Davida tao amin''ny mpanjaka izy, satria nanao soa teo amin''ny Isiraely ary tamin''Andriamanitra sy ny tranony koa.'
mg1865::mg_14::24::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa maty Joiada, dia avy Ireo mpanapaka ny Joda ka niankohoka teo anatrehan''ny mpanjaka. Dia nihaino azy ny mpanjaka.'
mg1865::mg_14::24::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandao ny tranon''i Jehovah, Andriamanitry ny razany, ireo ka nanompo ny Aseraha sy ny sampy dia nisy fahatezerana nihatra tamin''ny Joda sy Jerosalema noho ny fahadisoany.'
mg1865::mg_14::24::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naniraka mpaminany tany aminy Izy hampiverina azy amin''i Jehovah; dia nananatra azy mafy ireo, nefa tsy nety nihaino izy.'
mg1865::mg_14::24::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zakaria, zanak''i Joiada mpisorona, notsindrian''ny Fanahin''Andriamanitra, dia nitsangana teo amin''ny avoavo teo anatrehan''ny vahoaka izy ka nanao taminy hoe: Izao no lazain''Andriamanitra: Nahoana ianareo no mandika ny didin''i Jehovah ka tsy mahita fanambinana? Satria efa nahafoy an''i Jehovah ianareo, dia nahafoy anareo kosa Izy.'
mg1865::mg_14::24::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao teti-dratsy ireo ka nitora-bato azy teo amin''ny kianjan''ny tranon''i Jehovah araka ny tenin''ny mpanjaka.'
mg1865::mg_14::24::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no tsy nahatsiarovan''i Joasy mpanjaka ny soa nataon''i Joiada rainy taminy, fa namono ny zanany izy. Ary nony efa ho faty Zakaria, dia niteny hoe: Jehovah anie hijery sy hamaly izao.'
mg1865::mg_14::24::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa niherina ny taona, dia avy ny miaramilan''i Syria hiady taminy; ary tonga tany Joda sy Jerosalema izy, ka matiny avokoa ny mpanapaka rehetra tao amin''ny olona, ary nampitondrainy ho any amin''ny mpanjakan''i Damaskosy ny babo rehetra.'
mg1865::mg_14::24::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vitsy ny miaramilan''ny Syriana izay tonga teo, nefa Jehovah nanolotra miaramila maro ho eo an-tanany noho ny nahafoizany an''i Jehovah, Andriamanitry ny razany. Toy izany no nahatanterahan''ireo ny famaliana an''i Joasy.'
mg1865::mg_14::24::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nilaozany tamin''ny faharariany mafy izy, ny mpanompony dia niodina taminy noho ny ran''ny zanak''i Joiada mpisorona, ka namono azy teo am-pandriany, dia maty izy; ary naleviny tany an-Tanànan''i Davida ihany izy, nefa tsy tao amin''ny fasan''ny mpanjaka.'
mg1865::mg_14::24::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no niodina taminy: Zabada, zanak''i Simata Amonita, sy Jozabada, zanak''i Simrita Moabita.'
mg1865::mg_14::24::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny zanany sy ny hamafin''ny faminaniana nilaza ny loza hanjo azy ary ny nanamboarany ny tranon''Andriamanitra, indro, efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjaka izany. Ary Amazia zanany no nanjaka nandimby azy.'
mg1865::mg_14::25::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Amazia'
  verse_text: 'Dimy amby roa-polo taona Amazia, fony izy vao nanjaka, ary sivy amby roa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Joadana, avy any Jerosalema.'
mg1865::mg_14::25::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy, nefa tsy dia tamin''ny fony rehetra.'
mg1865::mg_14::25::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafapetraka tsara tamin''ny fanjakany izy, dia novonoiny ireo mpanompony izay namono ny mpanjaka rainy.'
mg1865::mg_14::25::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny zanak''ireo namono dia tsy mba novonoiny, fa nataony araka izay voasoratra ao amin''ny bokin''ny lalàna. dia ao amin''ny bokin''i Mosesy, izay nandidian''i Jehovah hoe: Ny ray tsy hatao maty amin''ny ataon''ny zanany, ary ny zanaka tsy hatao maty amin''ny ataon''ny rainy, fa samy ho faty amin''ny fahotany avy ny olona.'
mg1865::mg_14::25::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novorin''i Amazia ny Joda, ka nalahany araka ny fianakaviany avy, dia araka ny mpifehy arivo sy ny mpifehy zato avy amin''ny Joda sy ny Benjamina rehetra: dia nisainy ny hatramin''ny roa-polo taona no ho miakatra, ka olona telo hetsy voafantina no hitany, izay azo nalefa hanafika sady nahatan-defona sy ampinga lehibe.'
mg1865::mg_14::25::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy mahery iray hetsy tamin''ny Isiraely nokaramainy talenta volafotsy zato.'
mg1865::mg_14::25::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nisy lehilahin''Andriamanitra tonga tao aminy ka nanao hoe: Ry mpanjaka, aza avela hanaraka anao ny miaramilan''ny Isiraely; fa tsy omban''i Jehovah ny Isiraely, dia ny taranak''i Efraima rehetra.'
mg1865::mg_14::25::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandehana ihany ianao, ka manaova, ary mahereza amin''ny ady; fa hataon''Andriamanitra lavo eo anoloan''ny fahavalo ianao; fa Andriamanitra no mahay mamonjy sy mampahalavo.'
mg1865::mg_14::25::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Amazia tamin''ilay lehilahin''Andriamanitra: Ka hataontsika ahoana ny amin''ny talenta zato nomeko ny miaramilan''ny Isiraely? Ary hoy ilay lehilahin''Andriamanitra taminy: Jehovah mahay manome anao mihoatra lavitra noho izany.'
mg1865::mg_14::25::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia navahan''i Amazia ireo miaramila tonga tao aminy avy tamin''ny Efraima ireo mba hody indray; ary nirehitra mafy ny fahatezeran''ireo tamin''ny Joda, dia lasa nody izy sady tezitra indrindra.'
mg1865::mg_14::25::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amazia nitombo hery, dia nitarika ny vahoakany ka nankany amin''ny Lohasahan-tsira, ary nahafaty iray alina tamin''ny taranak''i Seïra izy.'
mg1865::mg_14::25::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny iray alina sisa nataon''ny taranak''i Joda sambo-belona, dia nentiny teo an-tampon''ny hantsam-bato ary navariny teo, ka montsamontsana izy rehetra.'
mg1865::mg_14::25::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo miaramila izay nampodin''i Amazia tsy hiara-manafika aminy dia nihahakahaka teny an-tanànan''ny Joda hatrany Samaria ka hatrany Beti-horona ka nahafaty olona telo arivo tany sady nahazo babo betsaka.'
mg1865::mg_14::25::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amazia, nony niverina avy nanafika ny Edomita, dia nitondra ny andriamanitry ny taranak''i Seïra ka nanangana azy ho andriamaniny; ary niankohoka teo anatrehany izy sady nandoro ditin-kazo manitra ho azy.'
mg1865::mg_14::25::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''Amazia ny fahatezeran''i Jehovah, ka naniraka mpaminany anankiray ho any aminy Izy hanontany azy, hoe: Nahoana ianao no mitady ny andriamanitry ny firenena, izay tsy naharo ny olony tamin''ny tananao aza?'
mg1865::mg_14::25::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niteny taminy izy, dia novaliany hoe: Moa voatendrinay ho mpanolo-tsaina ny mpanjaka va Ianao? Aoka itsy ange, fandrao asian''ny olona ianao. Dia nitsahatra ilay mpaminany ka nanao hoe: Fantatro fa Andriamanitra mikasa hahafaty anao satria nanao izany ianao ka tsy nihaino ny anatro.'
mg1865::mg_14::25::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amazia. mpanjakan''ny Joda, naka hevitra, dia naniraka tany amin''i Joasy, zanak''i Joahaza, zanak''i Jeho, mpanjakan''ny Isiraely, izy hanao hoe: Avia, aoka isika hihaona.'
mg1865::mg_14::25::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joasy, mpanjakan''ny Isiraely, naniraka tany amin''i Amazia, mpanjakan''ny Joda, nanao hoe: Ny tsilo izay tany Libanona naniraka tamin''ny hazo sedera izay tany Libanona nanao hoe: Omeo ny zanakolahy ny zanakaovavy ho vadiny; dia namaky teo ny bibi-dia tany Libanona ka nanosihosy ny tsilo.'
mg1865::mg_14::25::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazainao fa namely an''i Edoma ianao, ka dia nanesika anao hirehareha ny fonao; mitoera ihany ange ao an-tranonao, fa nahoana no hihaika ny loza hahalavo ny tenanao mbamin''ny Joda koa ianao?'
mg1865::mg_14::25::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nanaiky Amazia, satria avy tamin''Andriamanitra izany, mba hanolorany azy ho eo an-tanan''ny fahavalony noho ny nitadiavany ny andriamanitry ny Edomita.'
mg1865::mg_14::25::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niakatra Joasy, mpanjakan''ny Isiraely; ary izy sy Amazia, mpanjakan''ny Joda, nihaona tany Beti-semesy izay an''i Joda.'
mg1865::mg_14::25::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia resy teo anoloan''ny Isiraely ny Joda, ka samy nandositra ho any amin''ny lainy avy izy.'
mg1865::mg_14::25::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amazia, mpanjakan''i Joda, zanak''i Joasy, zanak''i Joahaza, dia nosamborin''i Joasy, mpanjakan''ny Isiraely, tany Beti-semesy ka nentiny nakany Jerosalema; ary nandravan''i Joasy efa-jato hakiho ny mandan''i Jerosalema hatramin''ny vavahadin''i Efraima ka hatramin''ny vavahady anjorony.'
mg1865::mg_14::25::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainy avokoa ny volamena sy ny volafotsy rehetra ary ny fanaka rehetra izay hita tao an-tranon''Andriamanitra tao amin''i Obed-edoma sy tamin''ny rakitry ny tranon''ny mpanjaka mbamin''ny olona natao antoka koa, ka dia niverina ho any Samaria izy.'
mg1865::mg_14::25::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro niainan''i Amazia zanak''i Joasy, mpanjakan''ny Joda, taorian''ny nahafatesan''i Joasy, zanak''i Joahaza, mpanjakan''ny Isiraely, dia dimy ambin''ny folo taona.'
mg1865::mg_14::25::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Amazia sisa, na ny voalohany na ny farany, indro, tsy efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Joda sy ny Isiraely va izany?'
mg1865::mg_14::25::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''ny andro nihemoran''i Amazia tsy nanaraka an''i Jehovah dia niodina taminy tany Jerosalema ny olona, ka dia nandositra nankany Lakisy izy; fa naniraka nanaraka azy tany ny olona ka namono azy tany.'
mg1865::mg_14::25::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasampiny tamin''ny soavaly ny fatiny, dia naleviny tao amin''ny razany tao an-tanànan''ny Joda.'
mg1865::mg_14::26::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Ozia'
  verse_text: 'Ary ny vahoaka rehetra tamin''ny Joda naka an''i Ozia, izay enina ambin''ny folo taona, ka nampanjaka azy handimby an''i Amazia rainy.'
mg1865::mg_14::26::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nanamboatra an''i Elota ka nampody azy ho an''ny Joda indray, rehefa lasa nodimandry any amin''ny razany ny mpanjaka.'
mg1865::mg_14::26::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enina ambin''ny folo taona Ozia, fony izy vao nanjaka, ary roa amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jekolia, avy any Jerosalema.'
mg1865::mg_14::26::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy, tahaka izay rehetra nataon''i Amazia rainy.'
mg1865::mg_14::26::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitady an''Andriamanitra izy tamin''ny andron''i Zakaria, izay nahafantatra ny fahitana an''Andriamanitra; ary tamin''ny andro nitadiavany an''i Jehovah dia nambinin''Andriamanitra izy.'
mg1865::mg_14::26::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka izy ka niady tamin''ny Filistina, dia nandrava ny mandan''i Gata sy ny an''i Jabne sy ny an''i Asdoda ary nanao tanàna tany Asdoda sy tany amin''ny Filistina.'
mg1865::mg_14::26::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra nanampy azy hamely ny Filistina sy ny Arabo izay nonina tao Gorabala ary ny Meonita.'
mg1865::mg_14::26::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Amonita nandoa hetra ho an''i Ozia; dia niely ny lazany hatrany akaikin''i Egypta, fa tonga mahery indrindra izy.'
mg1865::mg_14::26::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ozia nanao tilikambo tany Jerosalema, teo amin''ny vavahady an-jorony sy teo amin''ny vavahady mankao amin''ny tany lemaka sy teo an-jorony ka nanamafy azy.'
mg1865::mg_14::26::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tilikambo tany an''efitra koa izy sady nihady lavaka maro ho famorian-drano; fa izy nanana omby aman''ondry betsaka teny an-tany lemaka sy teny an-tanety ary mpiasa koa sy mpamboatra tanim-boaloboka teny an-tendrombohitra sy teny Karmela koa; fa tia asa tany izy.'
mg1865::mg_14::26::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ozia nanana miaramila maro, izay nanao antokony handeha hanafika, dia araka ny isany izay nandaminan''i Jeiela mpanoratra sy Mahaseia mpifehy azy, ka nofehezin''i Hanania, anankiray tamin''ny komandy voatendrin''ny mpanjaka.'
mg1865::mg_14::26::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enin-jato amby roa rivo no isan''ny lohan''ny fianakaviana rehetra, dia lehilahy mahery avokoa.'
mg1865::mg_14::26::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramila fehezin''ireo dia diman-jato amby fito arivo sy telo hetsy, izay nahery niady indrindra, homba ny mpanjaka hiady amin''ny fahavalony.'
mg1865::mg_14::26::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ozia namboatra ampinga sy lefona sy fiarovan-doha sy akanjo fiarovan-tratra sy tsipïka ary vaton''antsamotady ho an''ireo miaramila rehetra ireo.'
mg1865::mg_14::26::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fiadiana lehibe tany Jerosalema izy, natao araka ny marika vitan''ny mahay zavatra, hapetraka eo amin''ny tilikambo sy eo an-tampon''ny manda mba handefasana zana-tsipïka sy vato lehibe. Ary niely lavitra ny lazan''i Ozia; fa mahagaga ny nanampiana azy, ka tonga mahery tokoa izy.'
mg1865::mg_14::26::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: '2022-12-11T07:14:20+0000'
  verse_title: null
  verse_text: 'Ary nony nahery izy, dia niavonavona ny fony, ka nanao izay ratsy izy, fa nivadika tamin''i Jehovah Andriamaniny ka niditra tao amin''ny tempolin''i Jehovah handoro ditin-kazo manitra teo amin''ny alitara fandoroana ditin-kazo manitra.'
mg1865::mg_14::26::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niditra nanaraka azy kosa Azaria mpisorona mbamin''ny valo-polo lahy amin''ny mpisoron''i Jehovah, lehilahy samy mahery avokoa.'
mg1865::mg_14::26::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanohitra an''i Ozia mpanjaka ireo ka nanao taminy hoe: Tsy raharahanao, ry Ozia, ny handoro ditin-kazo manitra ho an''i Jehovah, fa an''ny mpisorona ihany, dia ny taranak''i Arona, izay nohamasinina handoro ditin-kazo manitra. Mialà amin''ny fitoerana masina, fa nanao izay mahadiso ianao; ary tsy ho voninahitra ho anao eo anatrehan''i Jehovah Andriamanitra izany.'
mg1865::mg_14::26::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisafoaka Ozia, ary nisy lovia teny an-tanany handoroany ditin-kazo manitra; koa raha mbola nisafoaka tamin''ny mpisorona izy, dia nisy habokana nipoitra tamin''ny handriny teo anatrehan''ny mpisorona tao an-tranon''i Jehovah, tanilan''ny alitara fandoroana ditin-kazo manitra.'
mg1865::mg_14::26::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Azaria mpisoronabe sy ny mpisorona rehetra dia nanatrika nijery azy, ka, indro, boka ny handriny; dia noroahiny hiala teo izy; nefa ny tenany dia mba nivoaka faingana ihany koa, satria Jehovah efa namely azy.'
mg1865::mg_14::26::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ozia mpanjaka dia boka ambara-pahafatiny ka nitoetra tao an-trano mitokana, satria tsy nahazo niditra tao an-tranon''i Jehovah intsony izy. Ka dia Jotama zanany no nanapaka tao an-dapa sady nitsara ny vahoaka.'
mg1865::mg_14::26::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Ozia sisa, na ny voalohany na ny farany, dia efa nosoratan''Isaia mpaminany, zanak''i Amoza;'
mg1865::mg_14::26::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ozia lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-tsaha fandevenana izay an''ny mpanjaka, satria hoy ny olona: Boka izy. Ary Jotama zanany no nanjaka nandimby azy.'
mg1865::mg_14::27::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: '2022-12-11T07:14:36+0000'
  verse_title: 'Ny nanjakan''i Jotama'
  verse_text: 'Dimy amby roa-polo taona Jotama, fony izy vao nanjaka, ary enina ambin''ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jerosa, zanakavavin''i Zadoka.'
mg1865::mg_14::27::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy, tahaka izay nataon''i Ozia rainy; nefa kosa tsy mba niditra tao amin''ny tempolin''i Jehovah izy. Ary ny vahoaka rehetra mbola nanao ratsy ihany.'
mg1865::mg_14::27::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nanamboatra ny vavahady ambony amin''ny tranon''i Jehovah sady nandrafitra be tamin''ny mandan''i Ofela koa.'
mg1865::mg_14::27::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tanàna teny amin''ny tany havoan''i Joda sy trano fiarovana ary tilikambo tany an''ala koa izy.'
mg1865::mg_14::27::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady tamin''ny mpanjakan''ny taranak''i Amona koa izy ka naharesy azy. Ary tamin''izany taona izany ny taranak''i Amona nanome azy talenta volafotsy zato ary vary tritika sy vary hordea iray alina kora avy; izany no naloan''ny taranak''i Amona ho azy tamin''ny-taona faharoa sy fahatelo koa.'
mg1865::mg_14::27::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nitombo hery Jotama, satria nizotra tsara teo anatrehan''i Jehovah Andriamaniny izy.'
mg1865::mg_14::27::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Jotama sisa mbamin''ny adiny rehetra sy ny fanaony, indro, efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Isiraely sy ny Joda izany.'
mg1865::mg_14::27::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary enina ambin''ny folo taona no nanjakany tany Jerosalema.'
mg1865::mg_14::27::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jotama lasa nodi-mandry any amin''ny razany, dia nalevina tany an-Tanànan''i Davida izy; ary Ahaza zanany no nanjaka nandimby azy.'
mg1865::mg_14::28::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Ahaza'
  verse_text: 'Roa-polo taona Ahaza, fony izy vao nanjaka, ary enina ambin''ny folo taona no nanjakany tany Jerosalema; ary tsy mba nanao izay mahitsy eo imason''i Jehovah tahaka an''i Davida rainy izy,'
mg1865::mg_14::28::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nandeha tamin''ny lalan''ny mpanjakan''ny Isiraely izy sady nanao sarin-javatra an-idina ho an''ireo Bala koa.'
mg1865::mg_14::28::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandoro ditin-kazo manitra tao amin''ny lohasahan''ny taranak''i Hinoma koa izy, ary ny zanany dia nodorany tamin''ny afo, araka ny fahavetavetan''ny jentilisa izay noroahin''i Jehovah tsy ho eo anoloan''ny Zanak''isiraely.'
mg1865::mg_14::28::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namono zavatra hatao fanatitra izy sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo koa sy teny an-tampon''ny havoana ary teny ambanin''ny hazo maitso rehetra.'
mg1865::mg_14::28::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia natolotr''i Jehovah Andriamaniny ho eo an-tanan''ny mpanjakan''i Syria izy; dia namely azy ireo, ka betsaka no lasany ho babo ka nentiny tany Damaskosy. Ary natolony ho eo an-tanan''ny mpanjakan''ny Isiraely koa izy, dia namely mafy ka naharesy azy koa ireo.'
mg1865::mg_14::28::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Peka, zanak''i Remalia, nahafaty olona roa alina sy iray hetsy indray andro tamin''ny Joda, dia lehilahy mahery avokoa, noho ny nahafoizan''ireny an''i Jehovah, Andriamanitry ny razany.'
mg1865::mg_14::28::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zikry, lehilahy mahery tamin''ny Efraima, namono an''i Mahaseia, zanaky ny mpanjaka, sy Azrikama, mpanapaka ny trano, ary Elkana, izay nanarakaraka ny mpanjaka.'
mg1865::mg_14::28::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''isiraely nahazo sambo-belona roa hetsy tamin''ireo havany, dia vehivavy sy zazalahy sy zazavavy, ary nahazo babo betsaka taminy koa izy, dia nentiny tany Samaria ireny.'
mg1865::mg_14::28::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpaminanin''i Jehovah tao, Odeda no anarany, izay nivoaka hitsena ny miaramila, raha nankany Samaria, izy ka nanao taminy hoe: He! ny nahatezeran''i Jehovah, Andriamanitry ny razanareo, tamin''ny Joda no nanolorany azy ho eo an-tananareo, dia novonoinareo ireny tamin''ny fahatezerana manakatra ny lanitra.'
mg1865::mg_14::28::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: '2022-12-17T08:41:20+0000'
  verse_title: null
  verse_text: 'Ary ankehitriny ny taranak''i Joda sy Jerosalema dia kasainareo handevozina ho andevolahinareo sy ho andevovavinareo; ka moa ianareo ireo va tsy mba manan-keloka amin''i Jehovah Andriamanitrareo koa?'
mg1865::mg_14::28::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny mihainoa ahy, koa alefaso ny babo izay efa nentinareo avy tamin''ny rahalahinareo; fa mirehitra aminareo ny fahatezeran''i Jehovah.'
mg1865::mg_14::28::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny loholona sasany avy amin''ny taranak''i Efraima, dia Azaria, zanak''i Johanana, sy Berekia, zanak''i Mesilemota, sy Jehizkia, zanak''i Saloma, ary Amasa, zanak''i Hadlay, ka nanohitra izay vao avy tany an-tafika'
mg1865::mg_14::28::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao taminy hoe: Tsy mahazo mampiditra ny babo eto ianareo; fa mikasa hanampy ny fahotantsika sy ny fahadisoantsika ianareo mba hahameloka antsika amin''i Jehovah; fa efa be ny fahadisoantsika, ka iharan''ny fahatezerana mirehitra ny Isiraely.'
mg1865::mg_14::28::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalefan''ny miaramila teo anatrehan''ny mpanapaka sy ny fiangonana rehetra izay sambo-belona sy babo azony,'
mg1865::mg_14::28::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ireo olona voalaza anarana ireo dia nitsangana ka naka ny sambo-belona, ary izay rehetra tsy nitafy no nampiakanjoiny tamin''ny zavatra nentiny; eny, nampiakanjoiny sy nokiraroiny izy ary nampihinaniny sy nampisotroiny ary nohosorany, sady nampitaingeniny boriky izay rehetra osaosa, ka nentiny tany Jeriko, tanàna be rofia*, ho any amin''ny rahalahiny; dia niverina tany Samaria izy. [*palma]'
mg1865::mg_14::28::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''izany andro izany Ahaza mpanjaka naniraka tany amin''ny mpanjakan''i Asyria nangataka ny any hanampy azy.'
mg1865::mg_14::28::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Edomita dia tonga indray ka namely ny Joda ary namabo azy.'
mg1865::mg_14::28::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina koa nanafika ny tanàna eny amin''ny tany lemaka amoron-tsiraka* sy eny amin''ny tany atsimo momba an''i Joda, dia nahafaka an''i Beti-semesy sy Aialona sy Gederota sy Soko mbamin''ny zana-bohiny ary Timna sy ny zana-bohiny ary Gimzo koa sy ny zana-bohiny; ary nonina tao izy. [*Hebreo: sefela]'
mg1865::mg_14::28::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah nampietry ny Joda noho Ahaza, mpanjakan''ny Isiraely, satria Ahaza efa nanaram-po nanao ratsy teo amin''ny Joda ka nivadika tamin''i Jehovah.'
mg1865::mg_14::28::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Tiglato-pilesera, mpanjakan''i Asyria, tonga tao aminy, nefa nampahory azy fa tsy nampahery azy.'
mg1865::mg_14::28::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nalain''i Ahaza ny zavatra tao an-tranon''i Jehovah sy tao an-tranon''ny mpanjaka sy ny an''ny mpanapaka, ary efa nomeny ny mpanjakan''i Asyria, nefa tsy nahasoa azy akory izany.'
mg1865::mg_14::28::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro nampahoriana azy dia mbola nanao izay nahadiso amin''i Jehovah ihany io Ahaza mpanjaka io.'
mg1865::mg_14::28::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namono zavatra hatao fanatitra ho an''ireo andriamanitr''i Damaskosy, izay namely azy, izy ka nanao hoe: Ireo andriamanitry ny mpanjakan''i Asyria, izay nanampy azy, no hamonoako zavatra hatao fanatitra mba hanampiany ahy. Kanjo tonga fandravana azy sy ny Isiraely rehetra ireo.'
mg1865::mg_14::28::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza nanangona ny fanaky ny tranon''Andriamanitra ka namakivaky azy ary nandrindrina ny varavaran''ny tranon''i Jehovah sady nanao alitara teny amin''ny zoron-dalana rehetra tany Jerosalema.'
mg1865::mg_14::28::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teny amin''ny tanànan''ny Joda rehetra dia nanaovany fitoerana avo handoroana ditin-kazo manitra ho an''ny andriamani-kafa, ka dia nahatezitra an''i Jehovah, Andriamanitry ny razany, izy.'
mg1865::mg_14::28::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantarany sisa sy ny fanaony rehetra, na ny voalohany na ny farany, indreo, efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Joda sy ny Isiraely izany.'
mg1865::mg_14::28::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza lasa nodi-mandry any amin''ny razany, dia nalevina tao an-tanàna Jerosalema izy, fa tsy mba natao tao amin''ny fasan''ny mpanjakan''ny Isiraely. Ary Hezekia zanany no nanjaka nandimby azy.'
mg1865::mg_14::29::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny nanjakan''i Hezekia, sy ny nanadiovany ny tempoly, ary ny nitokanany azy indray'
  verse_text: 'Dimy amby roa-polo taona Hezekia, fony izy vao nanjaka, ary sivy amby roa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Abia, zanakavavin''i Zakaria.'
mg1865::mg_14::29::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy, tahaka izay rehetra nataon''i Davida rainy.'
mg1865::mg_14::29::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny volana voalohany tamin''ny taona voalohany nanjakany dia namoha ny varavaran''ny tranon''i Jehovah izy ka namboatra azy.'
mg1865::mg_14::29::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nampidiriny tao ny mpisorona sy ny Levita ka nangoniny teo ankalalahana atsinanana.'
mg1865::mg_14::29::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Mihainoa ahy, ianareo Levita, ka hamasino ny tenanareo izao, ary hamasino koa ny tranon''i Jehovah, Andriamanitry ny razanareo, ary esory amin''ny fitoerana masina ny loto.'
mg1865::mg_14::29::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny razantsika nandiso sy nanao izay ratsy eo imason''i Jehovah Andriamanitsika ary nahafoy Azy sy nihodina ka niamboho ny fonenan''i Jehovah.'
mg1865::mg_14::29::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary narindriny ny varavarana amin''ny lavarangana fidirana, dia novonoiny ny jiro. sady tsy nodorany ny ditin-kazo manitra, ary ny fanatitra dorana tsy nateriny tao amin''ny fitoerana masina ho an''Andriamanitry ny Isiraely.'
mg1865::mg_14::29::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nihatra tamin''ny Joda sy Jerosalema ny fahatezeran''i Jehovah, ka nanolotra azy ho mpanjenjena* izy sy ho figagana ary ho zavatra mampisitrisitra toy izao hitan''ny masonareo izao. [*Na: fampangovitana]'
mg1865::mg_14::29::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa he! lavon''ny sabatra ny razantsika, ary ny zanakalahintsika sy ny zanakavavintsika sy ny vadintsika dia efa babo noho izany.'
mg1865::mg_14::29::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia efa mby ato am-poko ny hanao fanekena amin''i Jehovah, Andriamanitry ny Isiraely, mba hiala amintsika ny fahatezerany mirehitra.'
mg1865::mg_14::29::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanako, aza malaina ianareo; fa ianareo no nofidin''i Jehovah hijanona eo anatrehany hanompo Azy ka ho tonga mpanao fanompoam-pivavahana sy mpandoro ditin-kazo manitra ho Azy.'
mg1865::mg_14::29::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny Levita, dia Mahata, zanak''i Amasay, sy Joela, zanak''i Azaria, tamin''ny taranaky ny Kehatita; ary tamin''ny taranak''i Merary dia Kisy, zanak''i Abdia, sy Azaria, zanak''i Jehalalila; ary tamin''ny Gersonita dia Joa, zanak''i Zima, sy Edena, zanak''i Joa;'
mg1865::mg_14::29::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tamin''ny taranak''i Elizafana dia Simry sy Jeiela; ary tamin''ny taranak''i Asafa dia Zakaria sy Matania;'
mg1865::mg_14::29::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tamin''ny taranak''i Hemana dia Jehiela sy Simey; ary tamin''ny taranak''i Jedotona dia Semaia sy Oziela.'
mg1865::mg_14::29::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namory ny rahalahiny izy, ka dia samy nanamasina ny tenany avy, dia tonga araka ny didin''ny mpanjaka noho ny tenin''i Jehovah mba hanadio ny tranon''i Jehovah.'
mg1865::mg_14::29::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona niditra tao amin''ny efitra anatiny amin''ny tranon''i Jehovah mba hanadio azy, ka navoakany ny loto rehetra izay hitany tao an-tempolin''i Jehovah ho eo an-kianjan''ny tranon''i Jehovah. Ary ny Levita kosa nandray ireny havoakany ho any amin''ny lohasahan-driaka Kidrona.'
mg1865::mg_14::29::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro voalohany tamin''ny volana voalohany no nanomboka ny fanamasinana izy, ary tamin''ny andro fahavalo tamin''io volana io dia niditra teo amin''ny lavarangana fidirana an''i Jehovah izy; ka dia nanamasina ny tranon''i Jehovah tamin''ny havaloana izy; ary tamin''ny andro fahenina ambin''ny folo tamin''ny volana voalohany no nahavitany azy.'
mg1865::mg_14::29::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra tao amin''i Hezekia mpanjaka izy ka nanao hoe: Efa voadionay avokoa ny tranon''i Jehovah sy ny alitara fandoroana ny fanatitra dorana mbamin''ny fanaka rehetra momba azy ary ny latabatry ny mofo aseho mbamin''ny fanaka rehetra momba azy koa.'
mg1865::mg_14::29::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaka rehetra izay novetavetain''i Ahaza mpanjaka tamin''ny nanotany, fony izy mbola nanjaka, dia efa namboarinay sy nohamasininay, koa indreo izy eo anoloan''ny alitaran''i Jehovah.'
mg1865::mg_14::29::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa Hezekia mpanjaka ka namory ny mpanapaka ny tanàna, dia niakatra ho ao an-tranon''i Jehovah.'
mg1865::mg_14::29::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra vantotr''ombilahy fito sy ondrilahy fito sy zanak''ondry fito izy ary osilahy fito ho fanatitra noho ny ota ho an''ny fanjakana sy ho an''ny fitoerana masina ary ho an''ny Joda. Ary ny mpisorona, taranak''i Arona, dia nasainy nanatitra ireo teo ambonin''ny alitaran''i Jehovah.'
mg1865::mg_14::29::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novonoiny ny vantotr''ombilahy, ary noraisin''ny mpisorona ny rà ka natopiny tamin''ny alitara; ary novonoiny koa ny ondrilahy, dia natopiny tamin''ny alitara ny ràny; ary novonoiny koa ny zanak''ondry, dia natopiny tamin''ny alitara ny ràny.'
mg1865::mg_14::29::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny osilahy ho fanatitra noho ny ota dia nentiny teo anatrehan''ny mpanjaka sy ny fiangonana ka nametrahany tanana;'
mg1865::mg_14::29::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia novonoin''ny mpisorona ireo, ka ny ràny nataony teo amin''ny alitara araka ny fanao ho fanatitra noho ny ota hanaovana fanavotana ho an''ny Isiraely; fa ho an''ny Isiraely rehetra no nasain''ny mpanjaka nanaovana ny fanatitra dorana sy ny fanatitra noho ny ota.'
mg1865::mg_14::29::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nametraka ny Levita tao an-tranon''i Jehovah hitondra kipantsona sy valiha ary lokanga, araka ny didin''i Davida mpanjaka sy Gada, mpahitan''ny mpanjaka, sy Natana mpaminany; fa izany no didin''i Jehovah nampitondrainy ny mpaminaniny.'
mg1865::mg_14::29::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita nitsangana teo nitondra ny zava-manenon''i Davida, ary ny mpisorona koa nitondra ny trompetra.'
mg1865::mg_14::29::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasain''i Hezekia naterina teo ambonin''ny alitara ny fanatitra dorana; ary raha vao natomboka ny nanaterana ny fanatitra dorana, dia natomboka koa ny fihirana ho an''i Jehovah sy ny fitsofana ny trompetra ka notarihin''ny zava-manenon''i Davida, mpanjakan''ny Isiraely.'
mg1865::mg_14::29::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiangonana rehetra niankohoka, ary ny mpihira nihira, ary ny mpitsoka trompetra nitsoka mandra-pahavitan''ny fanatitra dorana.'
mg1865::mg_14::29::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nitsahatra ny nanaterana izany, dia nandohalika sy niankohoka ny mpanjaka mbamin''izay rehetra teo aminy.'
mg1865::mg_14::29::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia mpanjaka sy ny mpanapaka nampihira ny Levita hidera an''i Jehovah tamin''ny teny namboarin''i Davida sy Asafa mpahita. Ary nihira fiderana tamin''ny hafaliana izy, dia niondrika sy niankohoka.'
mg1865::mg_14::29::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia niteny hoe: Efa nanokana ny tenanareo* ho an''i Jehovah ianareo izao, ka dia manatona, ary mitondrà fanati-pisaorana sy fanatitra hafa koa ho ao an-tranon''i Jehovah. Dia nitondra fanati-pisaorana sy fanatitra hafa ny fiangonana, ary izay rehetra nazoto dia nitondra fanatitra dorana. [*Hebreo: namanareo ny tananareo]'
mg1865::mg_14::29::32:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isan''ny fanatitra dorana izay nentin''ny fiangonana dia omby fito-polo sy ondrilahy zato ary zanak''ondry roan-jato; natao fanatitra dorana ho an''i Jehovah ireo rehetra ireo.'
mg1865::mg_14::29::33:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zavatra nohamasinina dia omby enin-jato sy ondry aman''osy telo arivo.'
mg1865::mg_14::29::34:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vitsy loatra ny mpisorona ka tsy nahendaka ny fanatitra dorana rehetra, ka dia nanampy azy ny Levita rahalahiny mandra-pahavitan''ny raharaha sy ny nanamasinan''ny mpisorona sasany ny tenany koa; fa ny Levita nahitsy fo kokoa hanamasina ny tenany noho ny mpisorona.'
mg1865::mg_14::29::35:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary be koa ny fanatitra dorana sy ny saboran''ny fanati-pihavanana sy ny fanatitra aidina momba ny fanatitra dorana. Izany no nanavaozany ny fanompoana tao an-tranon''i Jehovah.'
mg1865::mg_14::29::36:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 29
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary faly Hezekia sy ny vahoaka rehetra noho izay namboarin''Andriamanitra ho an''ny olona, satria tampoka izany raharaha izany.'
mg1865::mg_14::30::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitandreman''i Hezekia sy ny vahoaka ny Paska'
  verse_text: 'Ary Hezekia naniraka tany amin''ny Isiraely sy ny Joda rehetra ka nanoratra taratasy ho amin''ny Efraima sy ny Manase koa mba hankanesany any an-tranon''i Jehovah any Jerosalema hitandrina ny Paska ho an''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_14::30::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka sy ny mpanapaka mbamin''ny fiangonana rehetra tany Jerosalema dia niara-nihevitra ny amin''ny hitandremana ny Paska amin''ny volana faharoa.'
mg1865::mg_14::30::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nahatandrina azy tamin''izany andro izany izy, satria ny mpisorona tsy mbola nanamasina ny tenany loatra, ary ny olona koa tsy mbola vory tany Jerosalema.'
mg1865::mg_14::30::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitraky ny mpanjaka sy ny fiangonana rehetra izany.'
mg1865::mg_14::30::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy handefa teny eran''ny Isiraely rehetra hatrany Beri-sheba ka hatrany Dana izy mba hankanesan''ny olona hitandrina ny Paska ho an''i Jehovah, Andriamanitry ny Isiraely, any Jerosalema; fa ny be sy ny maro tsy mba nitandrina azy araka ny voasoratra.'
mg1865::mg_14::30::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ny tsimandoa nitondra ny taratasy avy tamin''ny mpanjaka sy ny mpanapaka hitety ny Isiraely sy ny Joda rehetra ka nilaza araka ny didin''ny mpanjaka hoe: Ry zanak''isiraely o, miverena amin''i Jehovah, Andriamanitr''i Abrahama sy Isaka ary Isiraely, mba hiverenany ho amin''izay sisa aminareo izay tsy azon''ny tanan''ireo mpanjakan''i Asyria.'
mg1865::mg_14::30::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manahaka ny rainareo sy ny rahalahinareo izay nivadika tamin''i Jehovah, Andriamanitry ny razany, ka dia natolony ho figagana araka izao hitanareo izao izy.'
mg1865::mg_14::30::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza manamafy ny hatokareo toy ny nataon''ny razanareo, fa atolory an''i Jehovah ny tananareo, ka midira ao amin''ny fitoerany masina, izay nohamasininy ho mandrakizay; ary manompoa an''i Jehovah Andriamanitrareo, mba hiala aminareo ny fahatezerany mirehitra.'
mg1865::mg_14::30::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miverina amin''i Jehovah ianareo, dia hahazo famindram-po eo anatrehan''izay nitondra azy ho babo ny rahalahinareo sy ny zanakareo, ka dia ho tafaverina amin''ity tany ity izy; fa miantra sy mamindra fo Jehovah Andriamanitrareo, ary tsy mba hiamboho anareo Izy, raha miverina aminy ianareo.'
mg1865::mg_14::30::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tsimandoa nitety ny tanàna hatrany amin''ny tanin''ny Efraima sy ny Manase ka hatrany amin''ny Zebolona; fa nihomehezan''ny olona sy novazivaziny foana izy.'
mg1865::mg_14::30::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa ny tamin''ny Asera sy ny Manase ary ny Zebolona dia nisy ihany nanetry tena ka tonga tany Jerosalema.'
mg1865::mg_14::30::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanan''Andriamanitra dia napetrany tamin''ny Joda koa mba hanome azy fo iray hankatò ny didin''ny mpanjaka sy ny mpanapaka noho ny tenin''i Jehovah.'
mg1865::mg_14::30::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny volana faharoa dia nisy olona maro nivory tany Jerosalema hitandrina ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia fivoriana lehibe tokoa.'
mg1865::mg_14::30::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana izy, dia nandrava ireo alitara tany Jerosalema; ary ny alitara fandoroana ditin-kazo manitra rehetra dia noravany koa ka nariany tany amin''ny lohasahan-driaka Kidrona.'
mg1865::mg_14::30::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namono ny Paska izy tamin''ny andro fahefatra ambin''ny folo tamin''ny volana faharoa; ary menatra, ny mpisorona sy ny Levita, dia nanamasina ny tenany ka nampiditra ny fanatitra dorana ho ao an-tranon''i Jehovah.'
mg1865::mg_14::30::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana teo amin''ny fitoerany tahaka ny fanao izy, araka ny lalàn''i Mosesy, lehilahin''Andriamanitra; ary ny mpisorona nanopy ny rà izay teny an-tanan''ny Levita.'
mg1865::mg_14::30::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy maro tao amin''ny fiangonana izay tsy mba nanamasina ny tenany, ka dia ny Levita no nampamonoina ny Paska hisolo izay rehetra tsy madio mba hanamasina azy ho an''i Jehovah.'
mg1865::mg_14::30::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy olona betsaka, dia maro avy tamin''ny Efraima sy ny Manase sy ny Isakara ary ny Zebolona, no tsy mba nanadio ny tenany, kanefa nihinana ny Paska ihany izy, fa tsy araka izay voasoratra. Ary Hezekia nivavaka ho an''ireny ka nanao hoe: Jehovah tsara o, mamelà'
mg1865::mg_14::30::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay rehetra efa nampiomana ny fony hitady an''Andriamanitra, dia Jehovah, Andriamanitry ny razany, na dia tsy madio araka ny fahadiovan''ny fitoerana masina aza izy.'
mg1865::mg_14::30::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nihaino an''i Hezekia ka nahasitrana ny olona.'
mg1865::mg_14::30::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''isiraely izay tany Jerosalema dia nitandrina hafitoana ny andro firavoravoana fihinanana ny mofo tsy misy masirasira tamin''ny fifaliana lehibe; ary ny Levita sy ny mpisorona nidera an''i Jehovah isan''andro sady nampaneno zavatra mafy faneno* ho an''i Jehovah. [*Na: fiderana]'
mg1865::mg_14::30::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia dia nankasitraka ny Levita rehetra, izay nanana fahaizana ho an''i Jehovah; ary nihinana ny Paska hafitoana izy sady nanatitra fanati-pihavanana koa sy nisaotra an''i Jehovah, Andriamanitry ny razany.'
mg1865::mg_14::30::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiangonana rehetra niara-nihevitra ny amin''ny hitandremana hafitoana indray; ka dia mbola nitandrina hafitoana koa tamin''ny hafaliana izy.'
mg1865::mg_14::30::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Hezekia, mpanjakan''ny Joda, nanome vantotr''ombilahy arivo sy ondry aman''osy fito arivo ho an''ny fiangonana; ary ny mpanapaka koa nanome vantotr''ombilahy arivo sy ondry aman''osy iray alina ho an''ny fiangonana; ary maro ny mpisorona no nanamasina ny tenany.'
mg1865::mg_14::30::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary faly ny fiangonana, dia ny Joda rehetra sy ny mpisorona sy ny Levita sy izay rehetra tafangona avy tamin''ny Isiraely mbamin''ny vahiny izay avy tany amin''ny tany Isiraely ary izay nonina tany Joda.'
mg1865::mg_14::30::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nisy fifaliana be tany Jerosalema; fa hatramin''ny andron''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely, dia tsy mbola nisy tahaka izany tany Jerosalema.'
mg1865::mg_14::30::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 30
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny Levita sy ny mpisorona ka nitso-drano ny olona; ary nohenoin''Andriamanitra ny feony, ka niakatra ho any an-danitra, fonenany masina, ny fivavany.'
mg1865::mg_14::31::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandravan''ny olona ny zavatra momba ny sampy, sy ny nandaminan''i Hezekia ny fanompoam-pivavahana'
  verse_text: 'Ary nony vita izany rehetra izany, dia niainga nankany an-tanànan''ny Joda ny Isiraely rehetra izay tao ka nanorotoro ny tsangam-baton-tsampy sy nikapa ny Aseraha ary nandrava ny fitoerana avo sy ny alitara eran''i Joda sy Benjamina rehetra ary tany Efraima sy Manase koa ambara-paharavany azy rehetra. Dia samy nody ho any amin''ny taniny sy ny tanànany avy ny Zanak''isiraely rehetra.'
mg1865::mg_14::31::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nanendry ny antokon''ny mpisorona sy ny Levita araka ny antokony avy, samy araka ny fanompoany avy, dia ny mpisorona sy ny Levita ho amin''ny fanatitra dorana sy ny fanati-pihavavana sy hanao fanompoam-pivavahana sy hisaotra ary hidera eny amin''ny vavahadin''ny tobin''i Jehovah.'
mg1865::mg_14::31::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hatao fanatitra dorana rehetra dia nomen''ny mpanjaka avy tamin''ny fananany, dia ny fanatitra dorana maraina sy hariva sy ny fanatitra dorana atao amin''ny Sabata sy amin''ny voaloham-bolana sy amin''ny fotoam-pivavahana, araka ny voasoratra ao amin''ny lalan''i Jehovah.'
mg1865::mg_14::31::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay nonina tany Jerosalema nasainy nandoa ny anjaran''ny mpisorona sy ny Levita hipetrahany tsara amin''ny lalàn''i Jehovah.'
mg1865::mg_14::31::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niely izany teny izany, dia nitondra voaloham-bokatra betsaka ny Zanak''isiraely, dia vary sy ranom-boaloboka sy diloilo sy tantely ary vokatry ny tany isan-karazany; ary ny fahafolon-karena tamin''ny zavatra rehetra, dia betsaka koa no nentiny.'
mg1865::mg_14::31::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely sy ny Joda, izay nonina tany an-tanànan''ny Joda, nitondra ny fahafolon-karena koa, dia omby sy ondry aman''osy, ary ny fahafolon''ny zavatra masina izay nohamasinina ho an''i Jehovah Andriamaniny, ary navosainy nitokotoko maro ireny.'
mg1865::mg_14::31::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny volana fahatelo no vao nanomboka nanokotoko azy izy, ary tamin''ny volana fahafito no nahavitany azy.'
mg1865::mg_14::31::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony avy Hezekia sy ny mpanapaka ka nahita ireo niavosa ireo, dia nisaotra an''i Jehovah sy ny Isiraely olony izy.'
mg1865::mg_14::31::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nanontany ny mpisorona sy ny Levita ny amin''ireo niavosa ireo.'
mg1865::mg_14::31::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Azaria mpisoronabe, taranak''i Zadoka, namaly azy hoe: Hatramin''ny niandohan''ny nitondran''ny olona ny fanatitra ho ao an-tranon''i Jehovah dia nihinana izahay ka voky, sady be koa ny sisa; fa Jehovah nitahy ny olony, ary ny sisa dia ireo betsaka ireo.'
mg1865::mg_14::31::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasain''i Hezekia namboatra efi-trano fitehirizana tao amin''ny tranon''i Jehovah izy; dia namboariny izany.'
mg1865::mg_14::31::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: '2022-06-08T06:09:41+0000'
  verse_title: null
  verse_text: 'Ary tamin''ny fahamarinany no nampidirany ny fanatitra sy ny fahafolon-karena sy ny zavatra nohamasininy; ary Konania Levita no mpitahiry ireny, ary Simey rahalahiny no manarakaraka.'
mg1865::mg_14::31::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehiela sy Azazia sy Nahata sy Asahela sy Jerimota sy Jozabada sy Eliala sy Jismakia sy Mahata ary Benaia, fehin''i Konania sy Simey rahalahiny, no tonian''ireny, araka ny didin''i Hezekia mpanjaka sy Azaria, mpanapaka ny tranon''Andriamanitra.'
mg1865::mg_14::31::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kore Levita, zanak''i Jimna, mpiandry varavarana tao atsinanana, no tonian''ny fanati-tsitrapo ho an''Andriamanitra, hizara ny fanatitra asandratra ho an''i Jehovah sy ny zava-masina indrindra.'
mg1865::mg_14::31::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fehin''i Kore dia Edena sy Miniamina sy Jesoa sy Semaia sy Amaria ary Sekania tao amin''ny tanànan''ny mpisorona; ary adidin''ireo ny hizara ho an''ny rahalahiny araka ny antokony avy, na ny lehibe na ny kely,'
mg1865::mg_14::31::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy ny lehilahy voasoratra hatramin''ny telo taona no ho miakatra, dia izay miditra ao an-tranon''i Jehovah handray ny anjarany isanandro noho ny fanompoany amin''ny anjara-raharahany araka ny antokony avy.'
mg1865::mg_14::31::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny fanoratana ny mpisorona koa, dia nosoratana araka ny fianakaviany avy, ary ny Levita koa hatramin''ny roa-polo taona no ho miakatra, araka ny anjara-raharahany sy ny antokony avy.'
mg1865::mg_14::31::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomena koa ny ankohonany rehetra izay voasoratra, dia ny vadiny mbamin''ny zananilahy sy ny zananivavy rehetra; fa tamin''ny fahamarinany no nanamasinany ny tenany ny amin''ny zavatra masina.'
mg1865::mg_14::31::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''ny mpisorona, taranak''i Arona, koa, izay tany amin''ny tany manodidina ny tanànany, dia nisy olona voatonona anarana tamin''ny isan-tanàna hanome anjara ny lehilahy rehetra amin''ny mpisorona sy ny Levita rehetra voasoratra.'
mg1865::mg_14::31::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany no nataon''i Hezekia eran''i Joda rehetra; fa nanao izay tsara sy mety ary marina eo anatrehan''i Jehovah Andriamaniny izy.'
mg1865::mg_14::31::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny raharaha rehetra izay natombony ny amin''ny fanompoana ao an-tranon''Andriamanitra sy ny lalàna ary ny didy hitadiavana an''Andriamaniny dia nataony tamin''ny fony rehetra, fa nambinina izy'
mg1865::mg_14::32::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: '2022-04-13T11:22:19+0000'
  verse_title: 'Ny nanafihan''ny Asyriana an''i Joda tamin''ny andro nanjakan''i Hezekia sy ny niarovan''Andriamanitra azy'
  verse_text: 'Ary rehefa afaka izany raharaha marina izany, dia avy Sankeriba, mpanjakan''i Asyria, niditra tany Joda ary nanao fahirano ny tanàna mimanda ka nikasa hanafaka azy.'
mg1865::mg_14::32::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Hezekia fa tonga Sankeriba ka nikasa hamely an''i Jerosalema,'
mg1865::mg_14::32::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niara-nihevitra tamin''ny mpanapaka sy ny lehilahy mahery izy mba hanampina ny rano tamin''ny loharano eny ivelan''ny tanàna; ary nanampy azy ireo.'
mg1865::mg_14::32::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivory ny olona maro ka nanampina ny loharano rehetra sy ilay renirano mamaky eo afovoan''ny tany, fa hoy izy: Nahoana no avela hahita rano be ny mpanjakan''i Asyria, raha avy?'
mg1865::mg_14::32::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nohereziny namboariny avokoa izay rava tamin''ny manda sady nasiany tilikambo teny amboniny sy manda hafa koa teo ivelany, dia namboatra an''i Milo* tao an-tanànan''i Davida sady nanao lefona aman''ampinga betsaka izy. [*Hebreo: fiarovana]'
mg1865::mg_14::32::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanendry mpifehy miaramila hifehy ny olona izy ka nampiangona azy hankeo aminy teo an-kalalahana akaikin''ny vavahadin''ny tanàna, dia nanao teny famporisihana taminy hoe:'
mg1865::mg_14::32::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahereza ka matanjaha; aza matahotra na mivadi-po noho ny mpanjakan''i Asyria sy ny hamaroan''ny olona rehetra izay entiny; fa ny momba antsika dia be noho ny momba azy.'
mg1865::mg_14::32::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sandry nofo no momba azy, fa Jehovah Andriamanitsika kosa no momba antsika hamonjy antsika ka hiady ny adintsika. Ary dia niankina tamin''ny tenin''i Hezekia, mpanjakan''ny Joda, ny olona.'
mg1865::mg_14::32::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia nirahin''i Sankeriba, mpanjakan''i Asyria, ny mpanompony hankany Jerosalema (fa izy sy ny miaramilany rehetra kosa nanao fahirano an''i Lakisy tamin''izay) ho any amin''i Hezekia, mpanjakan''ny Joda, sy ho any amin''ny Joda rehetra izay tany Jerosalema ka nanao hoe:'
mg1865::mg_14::32::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao nolazain''i Sankeriba, mpanjakan''i Asyria: Inona izato itokianareo, no dia miaritra fahoriana ato Jerosalema ianareo ?'
mg1865::mg_14::32::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: '2022-06-09T11:37:03+0000'
  verse_title: null
  verse_text: 'Tsy Hezekia ihany va no manambosy anareo hanolo-tena ho faty mosary sy hetaheta ka manao hoe: Jehovah Andriamanitsika hamonjy antsika amin''ny tanan''ny mpanjakan''i Syria?'
mg1865::mg_14::32::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy io Hezekia io ihany koa va no nandrava ny fitoerana avony sy ny alitarany ary nandidy ny Joda sy Jerosalema ka nanao hoe: Eo anoloan''ny alitara iray no iankohofanareo sy handoroanareo ditin-kazo manitra ?'
mg1865::mg_14::32::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: '2022-12-30T06:27:39+0000'
  verse_title: null
  verse_text: 'Tsy fantatrareo va izay nataoko, dia izaho sy ny razako, tamin''ny firenena rehetra tany amin''ny tany hafa ? Moa ireny andriamanitry ny firenena tany amin''ny tany hafa ireny va nisy nahavonjy ny taniny akory tamin''ny tanako?'
mg1865::mg_14::32::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza amin''ny andriamanitr''ireo firenena efa naringan*''ny razako ireo no nahavonjy ny olony tamin''ny tanako, ka dia hahavonjy anareo amin''ny tanako va ny Andriamanitrareo? [*Hebreo: natao herema]'
mg1865::mg_14::32::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, aza avela hamitaka anareo Hezekia, na hitaona anareo tahaka izao; aza mino azy ianareo; fa tsy nisy andriamanitra tany amin''ny firenena sy ny fanjakana rehetra izay nahavonjy ny olony tamin''ny tanako sy ny tanan''ny razako; koa aiza ny Andriamanitrareo no hahavonjy anareo amin''ny tanako?'
mg1865::mg_14::32::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''i Sankeriba mbola niteny ratsy an''i Jehovah Andriamanitra sy Hezekia mpanompony,'
mg1865::mg_14::32::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: '2022-12-17T08:37:34+0000'
  verse_title: null
  verse_text: 'sady nanoratra taratasy hihaika an''i Jehovah, Andriamanitry ny Isiraely, sy hiteny ratsy Azy ka nanao hoe: Tahaka ny tsy nahavonjen''ireny andriamanitry ny firenena tany amin''ny tany hafa ny olony tamin''ny tanako no tsy hahavonjen''ny Andriamanitr''i Hezekia ny olony koa amin''ny tanako.'
mg1865::mg_14::32::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso tamin''ny feo mahery izy ka nanao teny Jiosy teo anatrehan''ny mponina tany Jerosalema izay teny ambonin''ny manda hampitahorany sy hampangorohoroany azy mba hahafahany ny tanàna.'
mg1865::mg_14::32::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: '2022-06-09T11:36:13+0000'
  verse_title: null
  verse_text: 'Ary Andriamanitr''i Jerosalema koa dia mba nolazainy toy ny filazàny ireny andriamanitry ny firenena tany amin''ny tany hafa ireny, izay asan-tanan''olona ihany.'
mg1865::mg_14::32::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia nivavaka Hezekia mpanjaka sy Isaia mpaminany, zanak''i Amoza, ka nitaraina tamin''ny lanitra.'
mg1865::mg_14::32::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah naniraka anjely izay nandringana ny lehilahy mahery rehetra sy ny mpanapaka ary ny komandy teo an-tobin''ny mpanjakan''i Asyria, ka dia lasa nody amin-kenatra Sankeriba. Ary nony niditra tao an-tranon''ny andriamaniny izy, dia namono azy tao tamin''ny sabatra ny zanany naterany.'
mg1865::mg_14::32::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no namonjen''i Jehovah an''i Hezekia sy ny mponina tany Jerosalema tamin''ny tanan''i Sankeriba, mpanjakan''i Asyria, sy tamin''ny tanan''ny fahavalony rehetra; eny, niaro azy tamin''ny manodidina rehetra Izy.'
mg1865::mg_14::32::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny maro nitondra fanatitra ho an''i Jehovah tany Jerosalema sy zava-tsoa ho an''i Hezekia, mpanjakan''ny Joda; dia nalaza teo imason''ny firenena rehetra izy hatramin''izany.'
mg1865::mg_14::32::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nahararian''i Hezekia sy ny nanaretany, ary ny hareny amam-boninahiny, sy ny nampietrena azy, ary ny nahafatesany.'
  verse_text: 'Tamin''izany andro izany dia narary saika maty Hezekia, koa dia nivavaka tamin''i Jehovah izy, ary Jehovah niteny taminy ka nanome azy famantarana.'
mg1865::mg_14::32::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Hezekia tsy mba namaly araka izay soa efa natao taminy; fa niavonavona ny fony, dia niharan''ny fahatezerana izy mbamin''ny Joda sy Jerosalema.'
mg1865::mg_14::32::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Hezekia nanetry tena noho ilay efa niavonavonan''ny fony, dia izy sy ny mponina tany Jerosalema, ka dia tsy niharan''ny fahatezeran''i Jehovah ireo fahavelon''i Hezekia.'
mg1865::mg_14::32::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nanana harena sy voninahitra be indrindra; dia nanao trano firaketana izy hitehirizany ny volafotsy sy ny volamena sy ny vato soa sy ny zava-manitra sy ny ampinga mbamin''izay fanaka tsara rehetra,'
mg1865::mg_14::32::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tanàna fitehirizana ny vokatra koa, dia ny vary sy ny ranom-boaloboka ary ny diloilo, sy trano miefitrefitra hitoeran''ny biby fiompy samy hafa karazana ary vala hitoeran''ny ondry aman''osy.'
mg1865::mg_14::32::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tanàna maro ho azy koa izy sady nanana ondry aman''osy ary omby betsaka, fa nomen''Andriamanitra fananana be indrindra izy.'
mg1865::mg_14::32::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary notampenan''io Hezekia io ny fivoahan''ny rano ambony any Gihona ka nampandehaniny tany ambanin''ny tany hidina mahitsy ho any andrefan''ny Tanànan''i Davida izany. Ary nambinina tamin''ny asany rehetra Hezekia.'
mg1865::mg_14::32::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa noho ny amin''ny irak''ireo mpanapaka tany Babylona, izay naniraka tany aminy mba hanontany ny amin''ny zava-mahagaga natao teo amin''ny tany, dia nilaozan''Andriamanitra izy, mba hizahany toetra azy hahalalany izay rehetra ao am-pony.'
mg1865::mg_14::32::32:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Hezekia sisa mbamin''ny soa nataony, indro, efa voasoratra ao amin''ny fahitan''Isaia mpaminany, zanak''i Amoza, sy ao amin''ny bokin''ny mpanjakan''ny Joda sy ny Isiraely izany.'
mg1865::mg_14::32::33:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 32
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny fiakarana ho any amin''ny fasan''ny zanak''i Davida izy; ary ny Joda rehetra sy ny mponina rehetra tany Jerosalema nanome voninahitra azy tamin''ny nahafatesany. Ary Manase zanany no nanjaka nandimby azy.'
mg1865::mg_14::33::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Manase sy Amona'
  verse_text: 'Roa ambin''ny folo taona Manase, fony izy vao nanjaka, ary dimy amby dimam-polo taona no nanjakany tany Jerosalema .'
mg1865::mg_14::33::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: '2022-12-18T04:34:21+0000'
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka ny fahavetavetan''ny firenena izay noroahin''i Jehovah tsy ho eo anoloan''ny Zanak''isiraely.'
mg1865::mg_14::33::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: '2022-12-18T04:33:56+0000'
  verse_title: null
  verse_text: 'Fa namboariny indray ny fitoerana avo, izay efa noravan''i Hezekia rainy, ka nanangana alitara ho an''ireo Bala izy sady nanao Aseraha sy niankohoka teo anatrehan''izay rehetra eny amin''ny lanitra ka nanompo azy'
mg1865::mg_14::33::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanorina alitara tao an-tranon''i Jehovah, dia tao amin''ilay nolazain''i Jehovah hoe: Any Jerosalema no hitoeran''ny anarako mandrakizay.'
mg1865::mg_14::33::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanao alitara teo anatin''ny kianja roa amin''ny tranon''i Jehovah izy ho an''izay rehetra eny amin''ny lanitra.'
mg1865::mg_14::33::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanany nampamakiny ny afo teo an-dohasahan''ny taranak''i Hinoma, sady nanandro sy nanao sikidy izy sy nanana ody ary naka ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana, dia nahery nanao izay ratsy eo imason''i Jehovah izy ka nampahatezitra Azy.'
mg1865::mg_14::33::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: '2022-12-18T04:33:44+0000'
  verse_title: null
  verse_text: 'Ary izay sarin-javatra vosokitra momba ny sampy nataony dia napetrany tao an-tranon''Andriamanitra, izay nolazain''Andriamanitra tamin''i Davida sy Solomona zanany hoe : Eto amin''ity trano ity sy eto Jerosalema, izay nofidiko tamin''ny firenen''isiraely rehetra, no hasiako ny anarako mandrakizay;'
mg1865::mg_14::33::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: '2022-04-13T11:22:34+0000'
  verse_title: null
  verse_text: 'ary tsy hampandeha ny tongotry ny Isiraely intsony hiala amin''ny tany izay efa notendreko ho an''ny razanareo Aho, raha mba hitandrina koa izy hanao araka izay rehetra nandidiako azy, dia araka ny lalàna rehetra sy ny didy ary ny fitsipika izay nampilazaina an''i Mosesy.'
mg1865::mg_14::33::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nampivily ny Joda sy ny mponina tany Jerosalema Manase mba hanao ratsy mihoatra noho ny firenena izay naringan''i Jehovah tsy ho eo anoloan''ny Zanak''isiraely.'
mg1865::mg_14::33::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Manase sy ny vahoakany, nefa tsy nety nihaino izy.'
mg1865::mg_14::33::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentin''i Jehovah hamely azy ny komandin''ny miaramilan''ny mpanjakan''i Asyria, dia nosamborin''ireo Manase ka nasiany masom-by sady nogadrany gadra varahina ary nentiny ho any Babylona.'
mg1865::mg_14::33::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony azom-pahoriana mafy izy, vao nifona tamin''i Jehovah Andriamaniny sady nanetry tena indrindra teo anatrehan''Andriamanitry ny razany'
mg1865::mg_14::33::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nivavaka taminy; ary Jehovah nanaiky ka nihaino ny fifonany, dia nampody azy ho any Jerosalema ho any amin''ny fanjakany. Ka dia fantatr''i Manase fa Jehovah no Andriamanitra.'
mg1865::mg_14::33::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nanao manda teo ivelan''ny Tanànan''i Davida izy, dia teo andrefana hatrany Gihona, eo amin''ny lohasahan-driaka, ka hatramin''ny fidirana amin''ny vavahadin-kazandrano, ary nataony manodidina an''i Ofela sady nataony avo dia avo; ary nanendry izay ho komandin''ny miaramila ho any amin''ny tanàna mimanda rehetra any Joda izy.'
mg1865::mg_14::33::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesoriny ireny andriamanikafa sy ny sampy tao an-tranon''i Jehovah mbamin''ny alitara rehetra izay efa naoriny teo an-tendrombohitry ny tranon''i Jehovah sy tany Jerosalema ka nariany teny ivelan''ny tanàna.'
mg1865::mg_14::33::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanorina indray ny alitaran''i Jehovah izy ka namono zavatra hatao fanati-pihavanana sy fanati-pisaorana teo amboniny, dia nandidy ny Joda hanompo an''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_14::33::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona mbola namono zavatra hatao fanatitra teny amin''ny fitoerana avo ihany, kanefa kosa ho an''i Jehovah Andriamaniny ihany.'
mg1865::mg_14::33::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Manase sisa mbamin''ny vavaka nataony tamin''Andriamaniny sy ny tenin''ireo mpahita izay niteny taminy tamin''ny anaran''i Jehovah, Andriamanitry ny Isiraely indro, ao amin''ny tantaran''ny mpanjakan''ny Isiraely izany.'
mg1865::mg_14::33::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny vavaka nataony sy ny naneken''Andriamanitra izany ary ny fahotany sy ny fahadisoany rehetra mbamin''ny fitoerana izay nanorenany fitoerana avo sy nananganany Aseraha sy sarin-javatra voasokitra, fony izy tsy mbola nanetry tena, indro, efa voasoratra ao amin''ny tenin''i Hozay izany.'
mg1865::mg_14::33::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: '2022-12-30T06:27:13+0000'
  verse_title: null
  verse_text: 'Ary Manase lasa nodimandry any amin''ny razany, dia nalevina tao an-tranony; ary Amona zanany no nanjaka nandimby azy.'
mg1865::mg_14::33::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby roa-polo taona Amona, fony izy vao nanjaka, ary roa taona no nanjakany tany Jerosalema.'
mg1865::mg_14::33::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah tahaka ny nataon''i Manase rainy ihany izy; fa ny sarin-javatra voasokitra rehetra nataon''i Manase rainy dia namonoan''i Amona zavatra hatao fanatitra ka notompoiny;'
mg1865::mg_14::33::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nanetry tena teo anatrehan''i Jehovah tahaka ny nataon''i Manase rainy izy, fa mainka nanota bebe kokoa aza.'
mg1865::mg_14::33::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nikomy taminy ny mpanompony ka namono azy tao an-tranony.'
mg1865::mg_14::33::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 33
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vahoaka kosa namono izay rehetra efa nikomy tamin''i Amona mpanjaka, dia nampanjaka an''i Josia zanany hisolo azy.'
mg1865::mg_14::34::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny nanjakan''i Josia, sy ny nanamboarany ny tempoly, ary ny amin''ny nahitana ny bokin''ny lalana'
  verse_text: 'Valo taona Josia, fony izy vao nanjaka, ary iraika amby telo-polo taona no nanjakany tany Jerosalema.'
mg1865::mg_14::34::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy ka nandeha tamin''ny lalan''i Davida rainy, fa tsy mba nivily na ho amin''ny ankavanana na ho amin''ny ankavia.'
mg1865::mg_14::34::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny taona fahavalo nanjakany, raha mbola zatovolahy izy, dia niantomboka nitady an''Andriamanitr''i Davida rainy; ary tamin''ny taona faharoa ambin''ny folo kosa dia niantomboka nanadio an''i Joda sy Jerosalema izy mba tsy hisy fitoerana avo, na Aseraha, na sarin-javatra voasokitra, na sarin-javatra anidina intsony.'
mg1865::mg_14::34::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: '2022-12-30T06:27:08+0000'
  verse_title: null
  verse_text: 'Ary noravan''ny olona teo anatrehan''i Josia ny alitaran''ireo Bala; ary ny tsangan-kazo* ho an''ny masoandro izay teo amboniny dia nokapainy; ary ny Aseraha sy ny sarin-javatra voasokitra mbamin''ny sarin-javatra anidina dia novakivakiny sy notorotoroiny ho vovoka ka nafafiny teny amin''ny fasan''ireo efa namono zavatra hatao fanatitra ho azy. [*Na: tsangam-bato]'
mg1865::mg_14::34::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandoro ny taolan''ny mpisorona teo ambonin''ny alitarany izy, ka dia nanadio an''i Joda sy Jerosalema.'
mg1865::mg_14::34::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany amin''ny tanànan''ny Manase sy ny Efraima ary ny Simeona hatrany amin''ny Naftaly, dia tao an-tanànany izay rava,'
mg1865::mg_14::34::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia noravany koa ny alitara sy ny Aseraha; ary ny sarin-javatra voasokitra nomongomongoiny ho vovoka; ary ny tsangan-kazo* ho an''ny masoandro eran''ny tanin''ny Isiraely rehetra dia nokapainy; ary dia niverina ho any Jerosalema izy. [*Na: tsangam-bato]'
mg1865::mg_14::34::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahavalo ambin''ny folo nanjakany, rehefa voadiony ny tany sy ny trano, dia naniraka an''i Safana, zanak''i Azalia, sy Mahaseia, komandin''ny tanàna, ary Joa, zanak''i Joahaza, mpitadidy ny raharaham-panjakana, izy mba hamboatra ny tranon''i Jehovah Andriamaniny.'
mg1865::mg_14::34::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo amin''i Hilkia mpisoronabe izy, dia natolony ny vola izay nampidirina tao an-tranon''Andriamanitra, izay efa nangonin''ny Levita, mpiandry varavarana, tamin''ny Manase sy ny Efraima sy ny sisa rehetra tamin''ny Isiraely, ary tamin''ny Joda sy ny Benjamina rehetra sy ny mponina tany Jerosalema.'
mg1865::mg_14::34::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary natolony ho eo an-tanan''ny lehiben''ny mpiasa izay voatendry hitandrina ny amin''ny tranon''i Jehovah izany, ary natolotr''ireo kosa ho an''ny mpiasa izay niasa tao an-tranon''i Jehovah hanamboarana sy hanamafiana ny trano;'
mg1865::mg_14::34::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: '2022-12-30T06:26:52+0000'
  verse_title: null
  verse_text: 'dia nomeny ho an''ny mpandrafitra sy ny mpandatsa-bato hamidy vato voapaika sy hazo hatao sakamandimby sy lampihazo ho amin''ny trano izay nosimban''ny mpanjakan''ny Joda.'
mg1865::mg_14::34::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona dia nanao ny asa araka izay mety hatao; ary ny voatendry hifehy azy dia lahata sy Obadia Levita, avy tamin''ny taranak''i Merary, ary Zakaria sy Mesolama, avy tamin''ny taranaky ny Kehatita, ary ny Levita rehetra izay nahay ny zava-maneno isan-karazany,'
mg1865::mg_14::34::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ireo no tonian''ny mpitondra entana sady nifehy izay rehetra nanao raharaha tamin''ny tao-zavatra samy hafa rehetra; ary avy tamin''ny Levita koa nisy mpanoratra sy mpifehy ary mpiandry varavarana.'
mg1865::mg_14::34::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha namoaka ny vola izay nampidirina tao an-tranon''i Jehovah izy, Hilkia mpisorona dia nahita ny bokin''ny lalàn''i Jehovah, ilay nampilazaina an''i Mosesy.'
mg1865::mg_14::34::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny Hilkia ka nanao tamin''i Safana mpanoratra hoe: Ny bokin''ny lalàna dia hitako tao an-tranon''i Jehovah. Dia natolotr''i Hilkia an''i Safana ny boky.'
mg1865::mg_14::34::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Safana nitondra ny boky ho any amin''ny mpanjaka sady nilaza taminy hoe: Izay rehetra nasaina nataon''ny mpanomponao dia nataony avokoa.'
mg1865::mg_14::34::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary narotsany ny vola izay azo tao an-tranon''i Jehovah ka natolony teo an-tanan''ny olona voatendry sy teo an-tanan''ny mpiasa.'
mg1865::mg_14::34::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Safana mpanoratra nilaza koa tamin''ny mpanjaka hoe: Misy boky nomen''i Hilkia mpisorona ahy. Dia novakin''i Safana teo anatrehan''ny mpanjaka ny boky.'
mg1865::mg_14::34::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny mpanjaka ny tenin''ny lalàna, dia nandriatra ny fitafiany izy'
mg1865::mg_14::34::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nandidy an''i Hilkia sy Ahikama, zanak''i Safana, sy Abdona, zanak''i Mika, sy Safana mpanoratra ary Asaia, mpanompon''andriana, ka nanao hoe:'
mg1865::mg_14::34::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha manontany amin''i Jehovah ho ahy sy izay sisa amin''ny Isiraely sy ny Joda ny amin''ny tenin''io boky vao hita; fa mafy ny fahatezeran''i Jehovah naidiny amintsika noho ny tsy nitandreman''ny razantsika ny tenin''i Jehovah hanao araka izay rehetra voasoratra amin''io boky io.'
mg1865::mg_14::34::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hilkia sy izay notendren''ny mpanjaka dia nankany amin''i Holda mpaminanivavy, vadin''i Saloma, zanak''i Tokehata, zanak''i Hasra, mpitahiry ny fitafiana (fa nitoetra tany Jerosalema tao amin''ny tanàna ambany ravehivavy) ary niresaka izany taminy izy ireo.'
mg1865::mg_14::34::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ravehivavy taminy: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Lazao amin''izay lehilahy naniraka anareo taty amiko hoe:'
mg1865::mg_14::34::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, Izaho hahatonga loza amin''ity tanàna ity sy amin''ny mponina eto, dia ny ozona rehetra izay voasoratra ao amin''ilay boky efa novakina teo anatrehan''ny mpanjakan''ny Joda.'
mg1865::mg_14::34::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nahafoy Ahy izy ka nandoro ditin-kazo manitra ho an''ireny andriamani-kafa sady nampahatezitra Ahy amin''izay rehetra nataon''ny tanany, dia haidina amin''ity tanana ity ny fahatezerako ka tsy hosakanana.'
mg1865::mg_14::34::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny mpanjakan''ny Joda kosa izay naniraka anareo hanontany amin''i Jehovah, dia ambarao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ny amin''ny teny izay efa novakinao,'
mg1865::mg_14::34::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria nino anatra ianao ka nanetry tena teo anatrehan''Andriamanitra, raha nandre ny teniny ny amin''ity tanàna ity sy ny mponina eto, eny, satria nanetry tena teo anatrehako ianao ka nandriatra ny fitafianao sady nitomany teo anatrehako, dia Izaho efa nihaino, hoy Jehovah.'
mg1865::mg_14::34::28:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, hangoniko any amin''ny razanao ianao ary hangonina any amin''ny fasanao amin''ny fiadanana, ka ny masonao dia tsy mba hahita izay loza rehetra ho entiko mamely ity tanàna ity sy ny mponina eto. Dia nitondra valiny ho any amin''ny mpanjaka izy ireo.'
mg1865::mg_14::34::29:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 29
  verse_date_revised: null
  verse_title: 'Ny fahazotoan''i Josia hanangana indray ny fivavahana amin''i Jehovah sy hampitandrina ny olona ny Paska, ary ny niadiany tamin''ny Egyptiana sy ny nahafatesany'
  verse_text: 'Ary ny mpanjaka naniraka olona ka nampivory ny loholon''ny Joda sy Jerosalema rehetra.'
mg1865::mg_14::34::30:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra ho ao an-tranon''i Jehovah ny mpanjaka sy ny lehilahy rehetra tamin''ny Joda sy ny mponina tany Jerosalema mbamin''ny mpisorona sy ny Levita ary ny vahoaka rehetra, na lehibe na kely; dia novakiny teo anatrehany ny teny rehetra teo amin''ny bokin''ny fanekena, izay hita tao an-tranon''i Jehovah.'
mg1865::mg_14::34::31:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nitsangana teo amin''ny fitoeran''andriana, dia nanao fanekena teo anatrehan''i Jehovah hanaraka Azy sy hitandrina ny lalàny sy ny teni-vavolombelony ary ny didiny amin''ny fony rehetra sy ny fanahiny rehetra, hankatò ny tenin''ny fanekena izay voasoratra ao amin''izany boky izany,'
mg1865::mg_14::34::32:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nampifikiriny tsara koa ny olona rehetra tany Jerosalema sy ny Benjamina. Ary ny mponina tany Jerosalema dia nanao araka ny faneken''Andriamanitra, dia Andriamanitry ny razany'
mg1865::mg_14::34::33:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 34
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josia nanaisotra ny fahavetavetana rehetra tamin''ny tany rehetra izay an''ny Zanak''isiraely sady nandidy izay rehetra teo amin''ny Isiraely hanompo an''i Jehovah Andriamaniny. Tamin''ny andro rehetra niainan''i Josia dia tsy mba niala tamin''ny fanarahana an''i Jehovah, Andriamanitry ny razany, ny olona.'
mg1865::mg_14::35::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josia nitandrina ny Paska tany Jerosalema ho an''i Jehovah; dia namono ny Paska ny olona tamin''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany.'
mg1865::mg_14::35::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josia nanendry ny mpisorona ho amin''ny anjara-raharahany avy ka namporisika azy hanao ny fanompoana ao an-tranon''i Jehovah.'
mg1865::mg_14::35::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny Levita izay mpampianatra ny Isiraely rehetra sady efa masina ho an''i Jehovah: Apetraho ao an-trano nataon''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely, ny fiara masina; fa izao dia efa tsy milanja azy intsony ianareo; koa manompoa an''i Jehovah Andriamanitrareo sy ny Isiraely olony;'
mg1865::mg_14::35::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary samia miomana araka ny fianakavianareo avy ianareo, dia araka ny antokonareo, araka ny voasoratr''i Davida, mpanjakan''ny Isiraely, sy araka ny voasoratr''i Solomona zanany koa.'
mg1865::mg_14::35::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitsangàna eo amin''ny fitoerana masina araka ny fizaran''ny fianakavian''ny rahalahinareo amin''ny vahoaka sy araka ny fizaran''ny fianakavian''ny Levita.'
mg1865::mg_14::35::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vonoy ny Paska, sady hamasino ny tenanareo, ka manamboara ho an''ny rahalahinareo, hanaovana araka ny tenin''i Jehovah izay nampilazainy an''i Mosesy.'
mg1865::mg_14::35::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: '2022-12-21T14:32:44+0000'
  verse_title: null
  verse_text: 'Ary ny vahoaka izay vory teo dia nomen''i Josia zanak''ondry sy zanak''osy, telo alina no isany hatao Paska avokoa ireo sy omby telo arivo; avy tamin''ny fananan''ny mpanjaka ireo.'
mg1865::mg_14::35::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanapaka nanome an-tsitrapo ho an''ny olona sy ho an''ny mpisorona sy ny Levita. Ary Hilkia sy Zakaria sy Jehiela, mpanapaka ny tranon''Andriamanitra, nanome ondry aman''osy enin-jato amby roa arivo ho an''ny mpisorona hatao Paska ary omby telon-jato.'
mg1865::mg_14::35::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Konania sy Semaia sy Netanela rahalahiny ary Hasabia sy Jeiela sy Jozabada, lehiben''ny Levita, nanome ondry aman''osy dimy arivo ho an''ny Levita hatao Paska ary omby dimam-jato.'
mg1865::mg_14::35::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia vonona ny zavatra; ary ny mpisorona nitsangana teo amin''ny fitoerany avy, ary ny Levita araka ny antokony avy, araka ny didin''ny mpanjaka.'
mg1865::mg_14::35::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novonoin''ny olona ny Paska, ary natopin''ny mpisorona ny rà teny an-tanany, dia vao nohodiran''ny Levita kosa.'
mg1865::mg_14::35::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natokany ny fanatitra dorana homen''ny olona araka ny fizaran''ny fianakaviany, mba hateriny ho an''i Jehovah araka izay voasoratra ao amin''ny bokin''i Mosesy. Ary toy izany koa tamin''ny omby.'
mg1865::mg_14::35::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Paska natsatsika tamin''ny afo araka ny fanao; fa ny zava-masina kosa nandrahoiny tao anaty vilany sy vilanibe ary kasiteronina, dia nozarainy faingana tamin''ny olona rehetra izany.'
mg1865::mg_14::35::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nanamboatra io an''ny tenany sy ny mpisorona izy; fa ny mpisorona, taranak''i Arona, nanatitra ny fanatitra dorana sy ny saborany mandra-pahalin''ny andro; fa ny Levita kosa nanamboatra ny Paska ho an''ny tenany sy ny mpisorona, taranak''i Arona.'
mg1865::mg_14::35::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpihira, taranak''i Asafa, nitoetra teo amin''ny fitoerany, araka ny didin''i Davida sy Asafa sy Hemana ary Jedotona, mpahitan''ny mpanjaka, ary ny mpiandry varavarana teo amin''ny isam-bavahady; fa tsy afaka niala tamin''ny fanompoany ireo, ka ny Levita rahalahiny no nanamboatra ho azy.'
mg1865::mg_14::35::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia vonona androtrizay avokoa ny hatao fanompoana an''i Jehovah amin''ny hitandremana ny Paska sy ny hanaterana ny fanatitra dorana eo ambonin''ny alitaran''i Jehovah araka ny tenin''i Josia mpanjaka.'
mg1865::mg_14::35::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 17
  verse_date_revised: '2022-06-10T06:34:19+0000'
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely izay vory teo dia nitandrina ny paska fahizay sy ny andro firavoravoana hafitoana fihinanana ny mofo tsy misy masirasira.'
mg1865::mg_14::35::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy Paska notandremana toy izany teo amin''ny Isiraely na dia hatramin''ny andron''i Samoela mpaminany aza; ary ny mpanjakan''ny Isiraely rehetra tsy nisy nitandrina ny Paska tahaka izay nataon''i Josia sy ny mpisorona sy ny Levita ary ny Joda rehetra sy ny Isiraely izay vory teo ary ny mponina tany Jerosalema.'
mg1865::mg_14::35::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahavalo ambin''ny folo nanjakan''i Josia no nitandremana izany Paska izany.'
mg1865::mg_14::35::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany rehetra izany, nony efa namboarin''i Josia ny tempoly, dia niakatra Neko, mpanjakan''i Egypta, hiady tany Karkemisy eo amoron''i Eofrata; ary Josia nivoaka hiady aminy.'
mg1865::mg_14::35::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Neko naniraka olona ho any aminy hanao hoe: Moa mifaninona akory izaho sy ianao, ry mpanjakan''ny Joda? Tsy ady aminao izao anio izao, fa amin''ny fahavaloko, sady nasain''Andriamanitra handeha faingana aho; koa aza manohitra an''Andriamanitra Izay momba ahy, fandrao matiny ianao.'
mg1865::mg_14::35::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Josia tsy nety nihodina niala taminy, fa nody olon-kafa mba hiady taminy ka tsy nety nihaino ny tenin''i Neko, izay nampilazain''Andriamanitra azy, fa nandeha hiady taminy ihany teo amin''ny lohasahan''i Megido.'
mg1865::mg_14::35::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpandefa tsipïka nahavoa an''i Josia mpanjaka; dia hoy ny mpanjaka tamin''ny mpanompony: Ento miala eto aho; fa voa mafy aho.'
mg1865::mg_14::35::24:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesorin''ny mpanompony tamin''izany kalesy izany izy, ka napetrany teo amin''ny kalesiny faharoa ary nentiny ho any Jerosalema; dia maty izy ka nalevina tao am-pasan-drazany. Ary ny Joda sy Jerosalema rehetra dia nisaona an''i Josia.'
mg1865::mg_14::35::25:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia dia nanao hira fisaonana an''i Josia, ary ny mpihiralahy sy ny mpihiravavy rehetra dia mahatsiahy an''i Josia mandraka androany, raha manao hira fisaonana, ka nataony fanao teo amin''ny Isiraely izany; ary, indro, efa voasoratra ao amin''ny fihirana fisaonana izany.'
mg1865::mg_14::35::26:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Josia sisa mbamin''ny soa nataony, araka izay efa voasoratra ao amin''ny lalàn''i Jehovah,'
mg1865::mg_14::35::27:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 35
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny asany voalohany sy farany, indro, efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Isiraely sy ny Joda izany.'
mg1865::mg_14::36::1:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Joahaza sy Joiakima sy Joiakina ary Zedekia, sy ny nandravana an''i Jerosalema, ary ny nitondrana ny olona ho babo tany Babylona'
  verse_text: 'Ary ny vahoaka naka an''i Joahaza, zanak''i Josia, ka nampanjaka azy tany Jerosalema handimby an-drainy.'
mg1865::mg_14::36::2:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Telo amby roa-polo taona Joahaza, fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema.'
mg1865::mg_14::36::3:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nesorin''ny mpanjakan''i Egypta tany Jerosalema izy, sady nampandoaviny sazy talenta volafotsy zato sy talenta volamena iray ny fanjakana.'
mg1865::mg_14::36::4:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Egypta nampanjaka an''i Eliakima, rahalahin''i Joahaza, tamin''ny Joda sy Jerosalema, ary ny anarany dia novany hoe Joiakima; ary Joahaza rahalahiny kosa dia nalainy ka nentiny ho any Egypta.'
mg1865::mg_14::36::5:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby roa-polo taona Joiakima, fony izy vao nanjaka, ary iraika ambin''ny folo taona no nanjakany tany Jerosalema. Ary nanao izay ratsy eo imason''i Jehovah Andriamaniny izy.'
mg1865::mg_14::36::6:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nebokadnezara, mpanjakan''i Babylona, dia niakatra namely azy ka namatotra azy tamin''ny gadra varahina mba hitondra azy ho any Babylona.'
mg1865::mg_14::36::7:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaka sasany tao an-tranon''i Jehovah dia nentin''i Nebokadnezara ho any Babylona koa ka nataony tao amin''ny tempoliny tany Babylona.'
mg1865::mg_14::36::8:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Joiakima sisa sy ny fahavetavetana nataony mbamin''izay toetoeny rehetra, dia, indro, efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Isiraely sy ny Joda izany; ary Joiakina zanany no nanjaka nandimby azy.'
mg1865::mg_14::36::9:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valo* taona Joiakina, fony izy vao nanjaka, ary telo volana sy hafoloana no nanjakany tany Jerosalema; ary nanao izay ratsy eo imason''i Jehovah izy. [*Na: Valo ambin''ny folo, izahao II Mpanjaka 24:8]'
mg1865::mg_14::36::10:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niherina ny taona, dia naniraka Nebokadnezara mpanjaka ka nitondra azy mbamin''ny fanaka tsara tao an-tranon''i Jehovah ho any Babylona, dia nampanjaka an''i Zedekia rahalahin-drainy* tamin''ny Joda sy Jerosalema izy. [*Hebreo: rahalahiny]'
mg1865::mg_14::36::11:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iraika amby roa-polo taona Zedekia, fony izy vao nanjaka, ary iraika ambin''ny folo taona no nanjakany tany Jerosalema.'
mg1865::mg_14::36::12:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah Andriamaniny izy, fa tsy nanetry tena teo anatrehan''i Jeremia mpaminany, izay nilaza ny tenin''Andriamanitra.'
mg1865::mg_14::36::13:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nikomy tamin''i Nebokadnezara mpanjaka izay efa nampianiana azy tamin''Andriamanitra koa izy; ary nanamafy ny hatony sy nanasarotra ny fony izy mba tsy hiverina ho amin''Andriamanitry ny Isiraely.'
mg1865::mg_14::36::14:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehibe rehetra tamin''ny mpisorona sy ny vahoaka koa nanao izay mahadiso indrindra araka ny fahavetavetana rehetra fanaon''ny jentilisa ka nandoto ny tranon''i Jehovah tany Jerosalema izay nohamasininy.'
mg1865::mg_14::36::15:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Jehovah, Andriamanitry ny razany, nampitondra teny ny iraka izay nirahiny ho any aminy; eny, nifoha maraina koa Izy ka naniraka, fa namindra fo tamin''ny olony sy ny fonenany.'
mg1865::mg_14::36::16:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo ny olona nihomehy ireny irak''Andriamanitra ireny sady nanazimba ny teniny sy namazivazy ny mpaminaniny mandra-pihatry ny fahatezeran''i Jehovah taminy, ka tsy nisy nahavonjy azy.'
mg1865::mg_14::36::17:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nentiny namely azy ny mpanjakan''ny Kaldeana, izay namono ny zatovony tamin''ny sabatra tao an-trano fitoerana masina, ary tsy nisy namindrany fo, na zatovo na virijina, na ny antitra sy ny fotsy volo; fa izy rehetra dia natolony ho eo an-tanany avokoa.'
mg1865::mg_14::36::18:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaka rehetra tao an-tranon''Andriamanitra, na ny vaventy na ny madinika, mbamin''ny rakitry ny tranon''i Jehovah ary ny rakitry ny mpanjaka sy ny mpanapaka, ireny rehetra ireny dia nentiny ho any Babylona avokoa.'
mg1865::mg_14::36::19:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nodorany koa ny tranon''Andriamanitra, ary noravany ny mandan''i Jerosalema; ny lapan''andriana rehetra tao koa dia nodorany tamin''ny afo, ary ny fanaka tsara rehetra tao nosimbany.'
mg1865::mg_14::36::20:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa tsy matin-tsabatra dia nentiny ho babo tany Babylona, ka tonga mpanompo azy sy ny zanany ireny mandra-panjakan''ny mpanjakan''i Persia,'
mg1865::mg_14::36::21:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'hanatanterahana ny tenin''i Jehovah nampilaza.na an''i Jeremia, mandra-panonitry ny tany ny Sabatany; fa tamin''ny andro rehetra izay nahafoanany dia natsahatra ny tany mba hanonitra* ny Sabatany mandra-pahatapitry ny fito-polo taona. [*Izaho Levitikosy 26:34]'
mg1865::mg_14::36::22:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny teny nataon''i Kyrosy nandefasana ny Jiosy hody ho any an-tanindrazana'
  verse_text: 'Ary tamin''ny taona voalohany nanjakan''i Kyrosy, mpanjakan''i Persia, dia notairin''i Jehovah ny fanahin''i Kyrosy mpanjakan''i Persia. mba hanatanteraka ny tenin''i Jehovah izay nampilazainy an''i Jeremia, ka dia nandefa teny eran''ny fanjakany rehetra izy, sady nataony an-tsoratra koa izany hoe:'
mg1865::mg_14::36::23:
  verse_version: mg1865
  verse_book: mg_14
  verse_chapter: 36
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Kyrosy, mpanjakan''i Persia: Ny fanjakana rehetra ambonin''ny tany dia efa nomen''i Jehovah, Andriamanitry ny lanitra, ahy; ary Izy efa nandidy ahy hanao trano ho Azy any Jerosalema, izay any Joda. Koa iza avy moa aminareo rehetra no olony? Jehovah Andriamaniny anie nomba azy, fa aoka hiakatra izy.'
