mg1865::mg_63::1::1:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra ny amin''ny faharetana amin''ny marina, sy ny tsy handraisana ny mpampianatra sandoka'
  verse_text: 'Izaho loholona* mamangy an''itompokovavy** voafidy sy ny zanany, izay tiako amin''ny fahamarinana (ary tsy izaho ihany, fa izay rehetra mahalala ny marina koa) [*Grika: Ny presbytera] [** Na: an''i Kyria]'
mg1865::mg_63::1::2:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny fahamarinana izay mitoetra ato anatintsika sady ho ato amintsika mandrakizay:'
mg1865::mg_63::1::3:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho amintsika ny fahasoavana sy ny famindram-po ary ny fiadanana avy amin''Andriamanitra Ray sy Jesoa Kristy, Zanaky ny Ray, amin''ny fahamarinana sy ny fitiavana.'
mg1865::mg_63::1::4:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faly indrindra aho, satria misy hitako ny zanakao sasany mandeha amin''ny fahamarinana araka ny nandraisantsika didy tamin''ny Ray.'
mg1865::mg_63::1::5:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mangataka aminao aho ankehitriny, tompokovavy*, tsy toy ny manoratra didy vaovao aminao, fa ilay nananantsika hatramin''ny voalohany ihany, dia aoka hifankatia isika. [*Na: ry Kyria]'
mg1865::mg_63::1::6:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fitiavana, dia ny handehanantsika araka ny didiny. Izany no didy, tahaka ny efa renareo hatramin''ny taloha ihany, dia ny handehananareo aminy.'
mg1865::mg_63::1::7:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro ny mpamitaka efa lasa any amin''izao tontolo izao, dia ireny tsy manaiky fa efa tonga tamin''ny nofo Jesoa Kristy. Izy no mpamitaka sy antikristy.'
mg1865::mg_63::1::8:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema ianareo, fandrao mahavery izay namonoanay tena, fa mba handraisanareo valim-pitia tanteraka.'
mg1865::mg_63::1::9:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mitarika nefa tsy mitoetra ao amin''ny fampianaran''i Kristy, dia tsy manana an Andriamanitra. Izay mitoetra ao amin''ny fampianarana, dia izy no manana ny Ray sy ny Zanaka.'
mg1865::mg_63::1::10:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona mankeo aminareo ka tsy mitondra izao fampianarana izao, aza mampiantrano azy na miarahaba azy akory;'
mg1865::mg_63::1::11:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay miarahaba azy dia miombona amin''ny ratsy ataony.'
mg1865::mg_63::1::12:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manana zavatra maro hosoratana aminareo aho, nefa tsy tiako hatao amin''ny taratasy sy ny ranomainty izany; fa manantena ho tonga aty aminareo aho ka hiteny mifanatrika, mba ho tanteraka ny fifalianareo.'
mg1865::mg_63::1::13:
  verse_version: mg1865
  verse_book: mg_63
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaky ny rahavavinao voafidy manao veloma anao.'
