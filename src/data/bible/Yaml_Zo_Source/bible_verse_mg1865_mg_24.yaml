mg1865::mg_24::1::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niantsoana an''i Jeremia ho mpaminany, sy ny nanambarana taminy izay ho raharahany'
  verse_text: 'Ny tenin''i Jeremia, zanak''i Hilkia, isan''ny mpisorona tao Anatota, tamin''ny tanin''ny Benjamina,'
mg1865::mg_24::1::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nanambarana ny tenin''i Jehovah tamin''ny andron''i Josia, zanak''i Amona, mpanjakan''ny Joda, tamin''ny taona fahatelo ambin''ny folo nanjakany,'
mg1865::mg_24::1::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy tamin''ny andron''i Joiakima, zanak''i Josia, mpanjakan''ny Joda koa, ka hatramin''ny faran''ny taona fahiraika ambin''ny folo nanjakan''i Zedekia, zanak''i Josia, mpanjakan''ny Joda, dia hatramin''ny namaboana an''i Jerosalema tamin''ny volana fahadimy.'
mg1865::mg_24::1::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_24::1::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatry ny fony ianao tsy mbola noforoniko tany an-kibo no efa fantatro, ary hatry ny fony ianao tsy mbola teraka no efa nohamasiniko sy notendreko ho mpaminany ho an''ny firenena.'
mg1865::mg_24::1::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa aho: Indrisy, Jehovah Tompo o! indro, tsy mahay mandaha-teny aho, fa mbola zaza.'
mg1865::mg_24::1::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jehovah tamiko: Aza manao hoe: Mbola zaza aho; fa handeha amin''izay rehetra hanirahako anao ianao, ary izay rehetra handidiako anao no hambaranao.'
mg1865::mg_24::1::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra azy ianao; fa momba anao hamonjy anao Aho, hoy Jehovah.'
mg1865::mg_24::1::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naninjitra ny tanany Jehovah ka nanendry ny vavako, ary hoy Jehovah tamiko: Indro, efa nataoko ao am-bavanao ny teniko,'
mg1865::mg_24::1::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary indro Aho manendry anao izao andro anio izao hanam-pahefana amin''ny firenena sy ny fanjakana hanongotra sy hanjera sy handrava sy handrodana ary hanorina sy hamboly.'
mg1865::mg_24::1::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko indray ny tenin''i Jehovah nanao hoe: Ry Jeremia, inona izao hitanao izao? Ary hoy izaho: Rantsan-kazo mahatsiaro* no hitako. [*Ny amygdala no ataon''ny Hebreo hoe "hazo mahatsiaro", satria mamony alohan''ny hazo sasany]'
mg1865::mg_24::1::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Marina ny ahitanao azy; fa mahatsiaro Aho mba hahatanteraka ny teniko.'
mg1865::mg_24::1::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko fanindroany indray ny tenin''i Jehovah nanao hoe: Inona izao hitanao izao; Ary hoy izaho: Vilany mangotraka no hitako, ary mitongilana mianatsimo ny vavany.'
mg1865::mg_24::1::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Hiroatra avy any avaratra ny loza hanjo ny mponina rehetra amin''ny tany.'
mg1865::mg_24::1::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, hantsoiko firenena rehetra amin''ny fanjakana any avaratra, hoy Jehovah; dia ho tonga izy, ka samy hametraka ny seza fiandrianany eo anoloan''ny vavahadin''i Jerosalema avokoa hamelezany ny mandany rehetra manodidina sy ny tanàna rehetra any Joda.'
mg1865::mg_24::1::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hifandahatra aminy Aho noho ny haratsiany rehetra, dia ny nahafoizany Ahy sy ny nandoroany ditin-kazo manitra ho an''ny andriamani-kafa ary ny niankohofany teo anatrehan''ny asan''ny tanany.'
mg1865::mg_24::1::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa dia misikîna, ary miomàna, ka lazao aminy izao rehetra andidiako anao izao; aza matahotra ireo, fandrao dia hataoko raiki-tahotra eo anatrehany ianao.'
mg1865::mg_24::1::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho hanao anao ho tanàna mimanda sy andry vy ary manda varahina mba tsy ho leon''ny tany rehetra, na ny mpanjakan''ny Joda, na ny lehibeny, na ny mpisorony, na ny vahoaka.'
mg1865::mg_24::1::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hiady aminao ireny, nefa tsy hahaleo anao, satria momba anao hamonjy anao Aho, hoy Jehovah.'
mg1865::mg_24::2::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fivadihan''ny Isiraely ampitahaina amin''ny tsy fiovan''ny fitiavan''Andriamanitra'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah hoe:'
mg1865::mg_24::2::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka miantsoa eo anatrehan''i Jerosalema hoe: Izao no lazain''i Jehovah: Tsaroako ny niraiketan''ny fonao tamiko, fony ianao mbola tanora, sy ny fitiavanao, fony ianao vao nampakarina, dia ilay nanarahanao Ahy tany an''efitra, teny amin''ny tany tsy mbola nifafy zavatra;'
mg1865::mg_24::2::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masina ho an''i Jehovah ny Isiraely sady santatra amin''ny vokany; Izay rehetra nihinana azy dia nohelohina, ny loza no nanjo ireny, hoy Jehovah.'
mg1865::mg_24::2::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny tenin''i Jehovah, ry taranak''i Jakoba, sy ianareo, ry fokony rehetra amin''ny taranak''Isiraely!'
mg1865::mg_24::2::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Inona moa no tsy marina hitan''ny razanareo tamiko, no dia nanalavitra Ahy izy sady nanaraka ny zava-poana, ka dia tonga zava-poana koa izy?'
mg1865::mg_24::2::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy tsy nanao hoe: Aiza Jehovah Izay nitondra antsika niakatra avy tany amin''ny tany Egypta sady nitarika antsika tany an''efitra, dia ilay tany foana sady be lavaka, tany karankaina sady aloky ny fahafatesana, tany izay tsy mba nalehan''olona akory na nonenan''olona?'
mg1865::mg_24::2::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra anareo niditra ho any amin''ny tany mahavokatra Aho, mba hihinananareo ny vokatra sy ny zavatra tsara eo aminy; Kanjo nony tafiditra ianareo, dia nolotoinareo ny taniko, sady novetavetainareo ny lovako.'
mg1865::mg_24::2::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpisorona tsy nanao hoe: Aiza Jehovah? Ary ny mpiadidy ny lalàna tsy nahalala Ahy; Ny mpitondra* koa nanota tamiko, ary ny mpaminany naminany tamin''ny anaran''i Bala ka nanaraka ireny tsy mahasoa. [*Hebreo: mpiandry ondry]'
mg1865::mg_24::2::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mbola hifandahatra aminareo Aho, hoy Jehovah, sy hiady amin''ny zafinareo koa.'
mg1865::mg_24::2::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mità ho any amin''ny moron-dranomasin''i Kitima, ka izahao, ary maniraha ho any Kedara, ka diniho tsara, dia aoka ho hitanareo na mba efa nisy toy izao, na tsia:'
mg1865::mg_24::2::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa nisy firenena efa nanova ny andriamaniny va? Nefa ireny dia tsy Andriamanitra akory. Fa ny oloko kosa efa nanakalo ny voninahiny tamin''ireny tsy mahasoa ireny.'
mg1865::mg_24::2::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Talanjona amin''izany ry lanitra! Ary matahora, ka mangorohoroa indrindra, ianareo! hoy Jehovah;'
mg1865::mg_24::2::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa zava-dratsy roa loha no nataon''ny oloko: Efa nahafoy Ahy, loharanon''aina, izy ka nihady lavaka famorian-drano ho an''ny tenany, nefa lavaka mitriatriatra tsy mahatan-drano.'
mg1865::mg_24::2::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mpanompo va Isiraely? Ompikely va izy? Koa nahoana no voababo izy?'
mg1865::mg_24::2::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamely azy no ampieronan''ny liona tanora sy amoahany feo ka mahatonga ny taniny ho lao nodorana ny tanànany, ka tsy nisy mponina.'
mg1865::mg_24::2::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mponina tao Memfisa* sy Tapanesa aza efa nampangadihady ny tampon-dohanao. [*Hebreo: Nofa]'
mg1865::mg_24::2::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy ny nahafoizanao an''i Jehovah Andriamanitrao tamin''ny andro nitondrany anao teny an-dàlana va no nahatonga izany taminao?'
mg1865::mg_24::2::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa inona no anton''ny ankanesanao amin''ny lalana mankany Egypta Hisotro ny ranon''i Sihora*? Ary inona no anton''ny ankanesanao amin''ny lalana mankany Asyria hisotro ny rano amin''ny Ony**? [*Neily] [**Eofrata]'
mg1865::mg_24::2::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny haratsianao no anafaizana anao, ary ny fihodinanao no ananarana anao; Koa fantaro sy hevero fa ratsy sady mangidy ny nahafoizanao an''i Jehovah Andriamanitrao sy ny tsy nisian''ny tahotrao Ahy, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_24::2::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatramin''ny ela no efa nanapahanao ny zioga taminao sy efa nanitosanao ny fatoranao, ka hoy ianao: Tsy hety hanompo aho; Nefa teny amin''ny havoana andrandraina sy teny ambanin''ny hazo maitso rehetra no nandrianao nijangajanganao.'
mg1865::mg_24::2::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho namboly anao ho karazam-boaloboka tsara indrindra, dia rantsana tsara avokoa; Ka ahoana no nanjary sampany ratsy ianao ho voaloboka hafa?'
mg1865::mg_24::2::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia misasa sirahazo aza ianao ka maka lavenona betsaka hanadiovana anao, ny helokao dia mbola voasoratra* eo anatrehako ihany, hoy Jehovah Tompo. [*Na: maloto]'
mg1865::mg_24::2::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no anaovanao hoe: Tsy nanao izay nahaloto ahy aho, tsy nanaraka ireo Bala aho? Hevero ny nalehanao tany amin''ilay lohasaha, fantaro izay nataonao, ry ramevavavy haingam-pandeha mivezivezy amin''ny alehany,'
mg1865::mg_24::2::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy ry borikivavi-dia tamàna any an''efitra, izay manimbolo ny rivotra noho ny faniriany; Ary ny fahamaimaizany iza no mahasakana azy? Izay rehetra mitady azy dia tsy ho sasa-poana; Fa amin''ny volany no hahitany azy.'
mg1865::mg_24::2::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza esorina ny kapa amin''ny tongotrao; Ary aoka tsy ho maina ny tendanao; Nefa hoy ianao: Tsy misy fanantenana; Tsia! fa ny hafa no tiako, ka dia hanaraka azy aho.'
mg1865::mg_24::2::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny fangaihain''ny mpangalatra, raha azo, dia toy izany ny fangaihain''ny taranak''Isiraely, eny, izy sy ny mpanjakany sy ny lehibeny sy ny mpisorony ary ny mpaminaniny,'
mg1865::mg_24::2::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay manao amin''ny tapa-kazo hoe: Raiko ianao, ary amin''ny vato hoe: Ianao no niteraka ahy; Fa efa niamboho Ahy izy ka tsy nanatrika Ahy; Nefa amin''ny andro fahoriany kosa dia vao hanao hoe izy: Mitsangàna, ka vonjeo izahay.'
mg1865::mg_24::2::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aiza ireny andriamanitrao izay nataonao ho anao? Aoka hitsangana ireny, raha mahavonjy anao amin''ny andro fahorianao fa araka ny isan''ny tanànanao, ry Joda, no isan''ny andriamanitrao.'
mg1865::mg_24::2::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mifandahatra amiko ianareo? Fa samy efa niodina tamiko ianareo rehetra, hoy Jehovah.'
mg1865::mg_24::2::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Foana ny namelezako ny zanakareo, fa tsy zaka nanarina izy; Ny sabatrareo nandringana* ny mpaminaninareo, toy ny liona mamiravira. [*Hebreo: nihinana]'
mg1865::mg_24::2::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry taranaka, dinihonareo ny tenin''i Jehovah! Moa efa nanjary tany efitra ho an''ny Isiraely va Aho, na tany maizim-pito*? Nahoana ny oloko no manao hoe: Afaka mikarenjy izahay ka tsy hankany aminao intsony? [*Na: tany misy aizim-pito avy amin''i Jehovah]'
mg1865::mg_24::2::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanadino ny firàvany va ny virijina, na hanadino ny fehin-kibony misy haingony va ny ampakarina? Nefa tsy hita isa ny andro nanadinoan''ny oloko Ahy.'
mg1865::mg_24::2::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanto izany fandehanao hitady fitia izany, ka zarinao ho amin''ny ratsy ny dianao*! [*Na: Ka na dia ny vehivavy ratsy fanahy aza dia ampianarinao ny fombanao]'
mg1865::mg_24::2::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa eo an-tsisin-dambanao no ahitana ny ran''ny olona malahelo izay tsy manan-tsiny, tsy tamin''ny tami-trano no nahazoanao azy, fa tamin''izany rehetra izany.'
mg1865::mg_24::2::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy ianao: Tsy manan-tsiny aho, efa afaka amiko tokoa ny fahatezerany. Indro, hifandahatra aminao Aho noho ny anaovanao hoe: Tsy nanota aho.'
mg1865::mg_24::2::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianao no maika hanova ny alehanao? Fa ho menatra noho ny amin''i Egypta koa ianao, toy ny nahamenaranao noho ny amin''i Asyria.'
mg1865::mg_24::2::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany koa dia hialanao, ka hiloloha tanana ianao; Fa nolavin''i Jehovah ny tokinao, ka tsy hambinina amin''ireo ianao.'
mg1865::mg_24::3::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy*: Raha misy lehilahy misao-bady, ary efa miala ravehivavy ka vadin''olon-kafa, moa mahazo miverina aminy indray va ralehilahy? Tsy haloto tokoa va izany tany izany? Fa ianao dia efa nijangajanga tamin-tsakaiza maro, ka moa hahazo miverina amiko va ianao? hoy Jehovah. [*Na: hoy ny olona]'
mg1865::mg_24::3::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andrandrao amin''ny tendrombohitra mangadihady ny masonao, ka jereo. Taiza no tsy nandrian''olona taminao? Teny an-dalambe no niandrasanao azy toy ny Arabo any an''efitra; Ary ny fijangajanganao sy ny faharatsianao no nandotoanao ny tany,'
mg1865::mg_24::3::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia voasakana ny orana mivatravatra, sady tsy tonga ny fara-orana; Ary ny handrinao dia handrin''ny vehivavy janga ka tsy manan-kenatra.'
mg1865::mg_24::3::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy hitaraina amiko va ianao amin''izao sisa izao hoe: Ry Raiko o, Ianao no nahazatra ahy, hatry ny fony aho mbola tanora?'
mg1865::mg_24::3::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tezitra mandrakizay va Izy? Hitahiry fahatezerana hatamin''ny farany va Izy? Indro, efa niteny toy izany ianao, nefa nanao izany ratsy izany ihany ka nahatanteraka izany.'
mg1865::mg_24::3::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny amin''ny nanariana ny Isiraely, sy ny mbola handraisana azy indray'
  verse_text: 'Ary hoy Jehovah tamiko tamin''ny andro nanjakan''i Josia mpanjaka: Moa efa hitanao va izay nataon''Isiraely mpiodina? Niakatra ho eny amin''ny tendrombohitra avo rehetra sy ho eny ambanin''ny hazo maitso rehetra izy ka nijangajanga teny.'
mg1865::mg_24::3::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataoko fa rehefa nanao izany rehetra izany izy, dia hiverina amiko. Kanjo tsy niverina izy. Ary Joda mpivadika rahavaviny dia nahita izany.'
mg1865::mg_24::3::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa na dia efa nisaorako aza Isiraely mpiodina ka nomeko taratasy fisaorana noho ny fijangajangana, dia tsy nety natahotra Joda mpivadika rahavaviny na dia izany aza, fa nandeha nijangajanga koa izy.'
mg1865::mg_24::3::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fihorakorahan''ny fijangajangany* no nandotoany ny tany, ary nijangajanga tamin''ny vato sy ny hazo izy. [*Na: Noho ny fijejojejoany sy ny fijangajangany]'
mg1865::mg_24::3::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia izany rehetra izany aza dia tsy nety niverina tamiko tamin''ny fony rehetra Joda mpivadika rahavaviny, fa tamin''ny fihatsaram-belatsihy ihany, hoy Jehovah.'
mg1865::mg_24::3::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Isiraely mpiodina dia hita fa marimarina kokoa noho Joda mpivadika.'
mg1865::mg_24::3::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka torio manatrika ny avaratra izao teny izao hoe: Miverena ianao, ry Isiraely mpiodina, hoy Jehovah; Tsy hampanjombona ny tavako aminareo Aho; Fa mamindra fo Aho, hoy Jehovah, ka tsy hitahiry fahatezerana mandrakizay.'
mg1865::mg_24::3::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa ekeo ny helokao, fa tamin''i Jehovah Andriamanitrao no niodinanao, ary nivezivezy nankany amin''ny hafa ianao. Teny ambanin''ny hazo maitso rehetra, fa tsy mba nihaino ny feoko ianareo, hoy Jehovah.'
mg1865::mg_24::3::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena, ry zaza mpiodina, hoy Jehovah, fa Izaho ihany no vadinareo; Ary hangalako iray isan-tanàna ianareo Sy roa isam-pokony, ka ho entiko ho any Ziona ianareo;'
mg1865::mg_24::3::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia homeko mpitondra* araka ny sitrapoko ianareo. Izay hitondra** anareo amin''ny fahalalana sy ny fahendrena. [*Hebreo: mpiandry ondry] [**Hebreo: hiandry]'
mg1865::mg_24::3::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa rehefa mitombo sy mihamaro amin''ny tany ianareo, dia amin''izany andro izany, hoy Jehovah, no tsy hanaovany intsony hoe: Ny fiaran''ny faneken''i Jehovah; Ary tsy hosaintsaininy akory izany, sady tsy hahatsiaro na ho manina izany izy, na hanao fiara intsony.'
mg1865::mg_24::3::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany no hanononana an''i Jerosalema hoe Seza fiandrianan''i Jehovah; Ary hivory any ny jentilisa rehetra noho ny anaran''i Jehovah any Jerosalema, ary izy tsy handeha intsony araka ny ditry ny fo ratsiny.'
mg1865::mg_24::3::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany ny taranak''i Joda sy ny taranak''Isiraely dia hiara-mandeha, ka hiara-tonga avy any amin''ny tany avaratra izy ho any amin''ny tany nomeko ny razanareo ho lovany.'
mg1865::mg_24::3::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho efa nanao hoe: He! fa hataoko isan-janako ianao ka homeko tany mahafinaritra, dia lova izay tena endriky ny firenena. Eny, hoy Izaho: Ianao hanao Ahy hoe Raiko, ka tsy hiala amin''ny fanarahana Ahy.'
mg1865::mg_24::3::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa toy ny vehivavy misintaka miala amin''ny lahy*, dia toy izany tokoa no nisintahanareo niala tamiko, ry taranak''Isiraely, hoy Jehovah. [*Hebreo: sakaizany]'
mg1865::mg_24::3::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injay! feo re any an-tendrombohitra mangadihady, dia fitomaniana amam-pitarainan''ny Zanak''Isiraely; Fa nivilivily tamin''ny nalehany izy ary nanadino an''i Jehovah Andriamaniny.'
mg1865::mg_24::3::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena ianao, ry zaza mpiodina, fa hositraniko ny fiodinanareo. Indreto, manatona Anao izahay, fa Ianao Jehovah no Andriamanitray.'
mg1865::mg_24::3::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Foana tokoa ny horakoraka any amin''ny tendrombohitra sy ny havoana*; Marina fa ao amin''i Jehovah Andriamanitray ny famonjena ny Isiraely. [*Na: Foana tokoa ny fihorakorahana any amin''ny havoana]'
mg1865::mg_24::3::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lanin''ilay mampahamenatra hatramin''ny fahazazanay ny zavatra efa nisasaran''ny razanay, dia ny ondry aman''osiny sy ny ombiny, ny zananilahy sy ny zananivavy.'
mg1865::mg_24::3::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka handry ao amin''ny henatray izahay. Ary aoka hanarona anay ny fahafaham-boninahitray, satria tamin''i Jehovah Andriamanitray no efa nanotanay dia izahay sy ny razanay, hatramin''ny fahazazanay ka ambaraka androany sady tsy nihaino ny feon''i Jehovah Andriamanitray izahay.'
mg1865::mg_24::4::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hiverina ianao, ry Isiraely, hoy Jehovah, dia ho amiko no hiverenanao, ary raha hanaisotra ny fahavetavetanao tsy ho eo imasoko ianao, dia tsy hivezivezy foana,'
mg1865::mg_24::4::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hianiana amin''ny hitsiny sy ny rariny ary ny fahamarinana hoe: Raha velona koa Jehovah, dia Izy no holazain''ny firenena ho fahasambarany, ary Izy no ho reharehany.'
mg1865::mg_24::4::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: 'Ny hanjo ny Joda sy Jerosalema, raha tsy mibebaka izy'
  verse_text: 'Fa izao no lazain''i Jehovah amin''ny Joda sy Jerosalema: Hevoy ny tombamborakareo*, fa aza mamafy amin''ny tsilo. [*Na: Miasà tany vaovao ho anareo]'
mg1865::mg_24::4::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miforà ho an''i Jehovah ianareo, eny, forao ny fonareo, ry Joda sy ry mponina any Jerosalema! Fandrao hiseho toy ny afo ny fahatezerako noho ny faharatsian''ny ataonareo ka hirehitra, sady tsy hisy hamono azy.'
mg1865::mg_24::4::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambaraonareo ao amin''ny Joda, ary torio ao Jerosalema, ka ataovy hoe: Tsofy ao amin''ny tany ny anjomara; Miantsoantsoa mafy, ka ataovy hoe: Mivoria ianareo, ka andeha isika hiditra amin''ny tanàna mimanda.'
mg1865::mg_24::4::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manangona faneva manandrify an''i Ziona; Mandosira faingana, aza mijanona; Fa Izaho hahatonga loza sy fandringanana be avy any avaratra.'
mg1865::mg_24::4::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy liona miakatra avy any anaty kirihitrala, ary ilay mpanimba ny firenena dia efa miainga, efa mivoaka avy amin''ny fitoerany hahafoana ny taninao, ary hahalao ny tanànanao, ka tsy hisy mponina.'
mg1865::mg_24::4::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia misikìna lamba fisaonana* ianareo, ka mitomania sy midradradradrà; Fa ny firehetan''ny fahatezeran''i Jehovah tsy afaka amintsika. [*Hebreo: lamba malailay]'
mg1865::mg_24::4::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany, hoy Jehovah, dia ho very hevitra ny mpanjaka sy ny lehibe, ary ho kepoka ny mpisorona, sy ho gaga ny mpaminany.'
mg1865::mg_24::4::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Indrisy, Jehovah Tompo o! Efa nofitahinao tokoa ity firenena ity sy Jerosalema tamin''ny nanaovanao hoe: Hisy fiadanana ho anareo; Kanjo mihatra amin''ny aina ny sabatra.'
mg1865::mg_24::4::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia holazaina amin''ity firenena ity sy Jerosalema hoe: Hisy rivo-mahamay avy any an-tendrombohitra mangadihady any an''efitra hankamin''ny oloko zanakavavy*, kanefa tsy hikororohana na hanadiovana. [*Na: Ny lalàn''ny oloko zanakavavy dia rivotra mahamay, etc]'
mg1865::mg_24::4::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tonga avy amiko izay rivotra mahery noho ireny*; Ary ankehitriny Izaho kosa hifandahatra aminy. [*Na: Dia ho tonga ety amiko ny rivotra mahery izay avy amin''ireny]'
mg1865::mg_24::4::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy toy ny rahona izy, Ary tahaka ny tadio ny kalesiny, faingana noho ny voromahery ny soavaliny; Lozantsika! fa lany ringana isika.'
mg1865::mg_24::4::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jerosalema, sasao ny fonao ho afaka amin''ny ratsy, mba hovonjena ianao! Mandra-pahoviana no hitoeran''ny hevi-dratsinao ao am-ponao?'
mg1865::mg_24::4::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa injany! misy feo manambara avy any Dana sy filazam-pahoriana avy amin''ny tany havoan''i Efraima,'
mg1865::mg_24::4::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaonareo amin''ny firenena, torio amin''i Jerosalema hoe: Misy mpanao fahirano avy any an-tany lavitra ka manakora hamely ny tanànan''ny Joda.'
mg1865::mg_24::4::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manodidina azy ireo toy ny fanaon''ny mpiandry saha, fa efa niodina tamiko izy, hoy Jehovah.'
mg1865::mg_24::4::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alehanao sy ny asanao no nahatonga izany taminao; Izany no faharatsianao, eny, mangidy izany sady mihatra amin''ny ainao.'
mg1865::mg_24::4::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny kiboko! Endrey izany kiboko! Manaintaina aho; Endrey! mila ho triatra izany ny foko*! Mitoloko ny foko, ka tsy mahay mangina aho; Fa ny feon''anjomara sy ny akoran''ady dia renao, ry fanahiko. [*Hebreo: Endrey ny rindrin''ny foko!]'
mg1865::mg_24::4::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandravana mifanontona no ambara, rava ny tany rehetra; Rava tampoka ny laiko, eny, rava indray mipi-maso monja ny ambain-daiko.'
mg1865::mg_24::4::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana re no mbola hijereko ny faneva sy handrenesako ny feon''anjomara?'
mg1865::mg_24::4::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa adala ny oloko, Izaho tsy mba fantany; Zaza tsy misy saina izy sady tsy manam-pahalalana; Raha ny hanao ratsy, dia hendry izy; Fa ny hanao soa kosa tsy fantany.'
mg1865::mg_24::4::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nojereko ny tany, ka, indro, tsy nisy endrika izy sady foana, ary ny lanitra koa, ka, indro, tsy nanam-pahazavana izy;'
mg1865::mg_24::4::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nojereko ny tendrombohitra, ka, indro, nihorohoro izy, ary ny havoana rehetra nihozongozona;'
mg1865::mg_24::4::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nojereko, ka, indro, tsy nisy olona, ary ny voro-manidina rehetra efa nandositra;'
mg1865::mg_24::4::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nojereko, ka, indro, ny saha mahavokatra* aza efa tonga efitra, ary ny tanànany rehetra dia rava teo anatrehan''i Jehovah, dia teo anoloan''ny firehetan''ny fahatezerany. [*Na: karmela]'
mg1865::mg_24::4::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Ho lao ny tany rehetra, nefa tsy dia holevoniko avokoa izy.'
mg1865::mg_24::4::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho izany dia hisaona ny tany, ary ho tonga mainty ny lanitra ambony, satria efa niteny izany Aho, sady efa nikasa izany ka tsy hanenina na hanatsoaka izany.'
mg1865::mg_24::4::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fihorakoraky ny mpitaingin-tsoavaly sy ny mpandefa tsipïka dia efa mandositra avokoa ny tanàna rehetra; Mitsofoka any anatin''ny kirihitrala* sy mananika ny vatolampy izy; Lao avokoa ny tanàna rehetra, ka tsy misy mponina intsony ao. [*Hebreo: rahona]'
mg1865::mg_24::4::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanao ahoana ianao, ry ilay rava? Na dia miakanjo jaky aza ianao, na dia miravaka volamena aza ianao, na dia hosoranao loko mainty aza ny masonao, foana ny itadiavanao hahatsara tarehy anao; Hanifika anao ireo lehilahy tia anao, ka ny ainao aza no hotadiaviny.'
mg1865::mg_24::4::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nandre feo Aho tahaka ny vehivavy raha miteraka sy fidridridridriana tahaka ny vehivavy izay vao miteraka ny matoany, dia ny feon''i Ziona zanakavavy, izay misefosefo sady mamelatra ny tanany ka manao hoe: Lozako! Fa reraka ny aiko azon''ireo mpamono olona.'
mg1865::mg_24::5::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny faharatsian''ny olona, izay nahatonga ny loza namely azy'
  verse_text: 'Miveziveze eny an-dalamben''i Jerosalema ianareo, ka izahao sy fantaro ary tadiavo ao ankalalahana, fa raha mba misy olona hitanareo, izay manao ny marina sy mitady ny hitsiny, dia havelako ny helok''i Jerosalema.'
mg1865::mg_24::5::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia misy aza manao hoe: Raha velona koa Jehovah, dia entiny mianian-tsy to izany.'
mg1865::mg_24::5::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tsy mijery ny toe-panahy mahatoky va ny masonao? Namely azy Ianao, nefa tsy nahatsiaro naharary izy; Nandany azy Ianao, nefa tsy nety nino anatra izy; Nohamafisiny mihoatra noho ny harambato ny tarehiny, tsy nety niverina izy.'
mg1865::mg_24::5::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy izaho: Olona ambany ireto; Adala izy fa tsy mahalala ny lalan''i Jehovah, na ny fitsipik''Andriamaniny;'
mg1865::mg_24::5::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handeha ho any amin''ny lehibe aho lahy ka hiteny aminy, fa ireny dia mahalala ny lalan''i Jehovah sy ny fitsipik''Andriamaniny; Kanjo ireny koa aza dia samy efa nanapaka zioga sy nanito fatorana.'
mg1865::mg_24::5::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia mamely azy ny liona avy any an''ala, ary mandringana azy ny amboadia* avy any an''efitra, ny leoparda miandry hamely ny tanànany, ka izay rehetra mivoaka avy ao dia viraviraina; Fa efa maro ny fahadisoany, ary fatratra ny fiodinany. [*lopa]'
mg1865::mg_24::5::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahoana Aho no hamela ny helokao? Efa nahafoy Ahy ny zanakao ka efa nianiana tamin''izay tsy Andriamanitra; Efa nampianianiko* izy, nefa nijangajanga ihany ka nirohitra niditra tao an-tranon''ny vehivavy janga. [*Na: efa novokisako]'
mg1865::mg_24::5::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny soavaly tsara fahana izy ka nikarenjy tamin''izay tiany, samy naneno tamin''ny vadin''ny namany avy.'
mg1865::mg_24::5::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hovaliako va izy amin''izany? hoy Jehovah; Ary tsy hialako fo va ny firenena toy izany?'
mg1865::mg_24::5::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara eo amin''ny mandany ianareo, ka mameleza, nefa aza dia levonina avokoa izy; Esory ny sakeliny, satria tsy an''i Jehovah izy.'
mg1865::mg_24::5::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nivadika tamiko mihitsy ny taranak''Isiraely sy ny taranak''i Joda, hoy Jehovah.'
mg1865::mg_24::5::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahafoy an''i Jehovah izy ka nanao hoe: Tsy Izy no izy; Tsy hisy loza hanjo antsika, ary tsy hahita sabatra na mosary isika;'
mg1865::mg_24::5::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaminany dia hanjary rivotra, ary tsy ao am-pony Ilay miteny*; Eny, izany no hanjo azy. [*Na: ny teny]'
mg1865::mg_24::5::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Andriamanitry ny maro. Noho ny nanaovanareo izany teny izany, indro, hataoko afo ny teniko izay eo am-bavanao, ary ity firenena ity ho kitay hazo ka holevoniny.'
mg1865::mg_24::5::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa hitondra firenena avy lavitra Aho hamely anareo, ry taranak''Isiraely, hoy Jehovah, dia firenena mateza hery, Firenena hatry ny ela, Firenena izay tsy fantatrao ny fiteniny, ka tsy ho azonao izay lazainy.'
mg1865::mg_24::5::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tranon-jana-tsipïkany dia tahaka ny fasana misokatra; Izy rehetra dia samy lehilahy mahery avokoa.'
mg1865::mg_24::5::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hohaniny ny vokatrao sy ny haninao, hohaniny ny zanakao-lahy sy ny zanakao-vavy, hohaniny ny ondry aman''osinao sy ny ombinao, hohaniny ny voalobokao sy ny aviavinao, sady horavany amin''ny sabatra ny tanàna mimanda izay itokianao.'
mg1865::mg_24::5::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na dia amin''izany andro izany aza, hoy Jehovah, tsy dia holevoniko avokoa ianareo.'
mg1865::mg_24::5::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hoy izy*: Nahoana Jehovah Andriamanitsika no dia nanao izany rehetra izany tamintsika? Dia hovalianao hoe: Toy ny nahafoizanareo Ahy sy ny nanompoanareo andriamani-kafa teo amin''ny taninareo no hanompoanareo ny firenen-kafa any amin''ny tany izay tsy anareo. [*Hebreo: ianareo]'
mg1865::mg_24::5::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambarao ao amin''ny taranak''i Jakoba, ary torio ao amin''ny Joda hoe:'
mg1865::mg_24::5::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy izao, ry firenena adala sady tsy manan-tsaina, izay mana-maso, fa tsy mahita, ary manan-tsofina, fa tsy mandre:'
mg1865::mg_24::5::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho va tsy atahoranao? hoy Jehovah; Tsy mangovitra va ianareo eo anatrehako, Izay nanao ny fasika ho fefin''ny ranomasina, Dia fetra mandrakizay tsy azony hihoarana? Ka na dia mitopatopa aza ny onjany, dia tsy mahavaky azy, ary na dia mirohondrohona aza, dia tsy mahahoatra azy.'
mg1865::mg_24::5::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ity firenena ity dia manana fo maditra sy miodina; Mihodina izy ka lasa,'
mg1865::mg_24::5::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy manao anakampo akory hoe: Aoka isika hatahotra an''i Jehovah Andriamanitsika, izay mandatsaka ranonorana, dia ny loha-orana sy ny fara-orana amin''ny fotoany avy; Ary ireo herinandro voatendry ho amin''ny fararano dia tandremany ho antsika.'
mg1865::mg_24::5::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny helokareo no nampiala izany, ary ny fahotanareo no misakana ny soa tsy ho azonareo.'
mg1865::mg_24::5::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy hita fa ratsy fanahy ny oloko; Mamitsaka sy mijoko toy ny mpamandri-borona izy, mamela-pandrika izy, ka olona no azony.'
mg1865::mg_24::5::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tranom-borona feno vorona no mahafeno fitaka ny tranony; Ary noho izany dia tonga lehibe sy mpanankarena izy.'
mg1865::mg_24::5::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa mihatavy izy ka mandimandina, dia mihoa-pampana amin''ny fanaovan-dratsy; Tsy mety mitsara ady mba hahazoan''ny kamboty ny rariny izy, ary ny adin''ny malahelo tsy mba tsarainy.'
mg1865::mg_24::5::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hovaliako amin''izany va izy? hoy Jehovah; Tsy hialako fo va ny firenena toy izany?'
mg1865::mg_24::5::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-mahagaga sy mahatsiravina no atao eo amin''ny tany;'
mg1865::mg_24::5::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaminany maminany lainga, ny mpisorona : manapaka araka izay atoron''ireny, ary ny oloko mankasitraka izany; Koa hanao ahoana re ianareo any amparany?'
mg1865::mg_24::6::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahantomotry ny loza voalaza'
  verse_text: 'Ianareo, zanak''i Benjamina, mandosira faingana hiala an''i Jerosalema, ary tsofy ao Tekoa ny anjomara, ka manaova tsangan''afo* ao Beti-hakerema; Fa misy loza sy fandringanana be miposaka avy any avaratra. [*Na: manangona famantarana]'
mg1865::mg_24::6::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ziona zanakavavy dia ampitoviko amin''ny fiandrasan-ondry misy ahitra milenodenoka*. [*Na: Aringako ilay tsara tarehy sy mihantahanta, dia Ziona zanakavavy]'
mg1865::mg_24::6::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao aminy no alehan''ny mpiandry sy ny ondry; Haoriny manodidina azy ny lainy, ka samy handany ny ao akaikiny avy izy.'
mg1865::mg_24::6::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitaova ianareo hanao ady masina hamelezana azy; Mitsangàna, ka andeha isika hiakatra antoandro. Lozantsika! fa lasan-davitra ny andro, ka efa mandroso ny aloky ny hariva.'
mg1865::mg_24::6::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, ka andeha isika hanao latsak''alina, ary aoka horavantsika ny trano-beny.'
mg1865::mg_24::6::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro; Kapao ny hazo, ary manandrata tovon-tany hamelezana an''i Jerosalema; Io ilay tanàna hovaliana, feno fampahoriana ny ao anatiny.'
mg1865::mg_24::6::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny loharano mampiboiboika ny ranony no ampiboiboihany ny faharatsiany; An-keriny sy fandravana no re ao aminy; Eo anatrehako mandrakariva ny faharariana sy ny faharatrana.'
mg1865::mg_24::6::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Minoa anatra ianao, ry Jerosalema, fandrao miombotra miala aminao ny fanahiko, ary fandrao hataoko tany lao ianao, dia tany tsy honenana.'
mg1865::mg_24::6::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Hotsimponina fatratra toy ny fitsimpona voaloboka izay sisa amin''ny Isiraely; Avereno ho amin''ny sakeliny* ny tananao toy ny mpioty voaloboka. [*Na: harona]'
mg1865::mg_24::6::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hilazako sy hanariko mba handrenesany? Indro, ny sofiny dia tsy voafora, ka tsy mahahaino izy; He! tsatsoiny ny tenin''i Jehovah ka tsy ankamaminy.'
mg1865::mg_24::6::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahatezeran''i Jehovah mahafeno ahy ka tsy zakako tsindriana intsony! Aidino amin''ny ankizy madinika eny an-dalambe sy amin''ny fiokoan''ny zatovo izany; Fa na lehilahy na vehivavy dia hosamborina avokoa, ary ny anti-panahy mbamin''ny ela niainana koa;'
mg1865::mg_24::6::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho lasan''ny sasany ny tranony mbamin''ny sahany sy ny vehivavy koa; Fa hahinjitro amin''ny mponina amin''ny tany ny tanako, hoy Jehovah,'
mg1865::mg_24::6::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria izy rehetra, na ny kely na ny lehibe, dia samy fatra-pila harena avokoa; Na ny mpaminany na ny mpisorona dia samy mamitaka avokoa.'
mg1865::mg_24::6::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nataotaony foana ny fanasitranany ny faharatran''ny oloko zanakavavy tamin''ny nanaovany hoe: Fiadanana, fiadanana; Kanjo tsy misy fiadanana tsinona!'
mg1865::mg_24::6::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nomenarina izy noho ny nanaovany fahavetavetana, nefa tsy mba menatra akory izy ary tsy mba valahara; Koa ho lavo ao amin''izay lavo izy, amin''ny andro hamaliako azy dia ho tafintohina izy, hoy Jehovah.'
mg1865::mg_24::6::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Mijanona eo an-dàlana ianareo, ka izahao, ary anontanio izay lalana masaka hatry ny ela. Dia izay lalana mankany amin''ny tsara, ka iny no izory, dia hahita fitsaharana ho an''ny fanahinareo ianareo; Nefa hoy izy: Tsy hizotra izahay.'
mg1865::mg_24::6::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiako mpitily ianareo hanao hoe: Henoy ny feon''ny anjomara! Nefa hoy ianareo*: Tsy hihaino izahay. [*Hebreo: izy]'
mg1865::mg_24::6::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa henoinareo, ry jentilisa, ary aoka ho fantatrareo, ry fiangonana, ny hanjo azy.'
mg1865::mg_24::6::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy, ry tany! Indro, Izaho hahatonga loza amin''ity firenena ity, dia ny vokatry ny heviny ihany; Fa tsy nihaino ny teniko izy, ary nolaviny ny lalàko.'
mg1865::mg_24::6::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no itondrana ditin-kazo mani-pofona avy any Sheba Aho sy veromanitra avy any amin''ny tany lavitra? Tsy sitrako ny fanatitra doranareo, ary tsy mamiko ny zavatra vonoinareo hatao fanatitra.'
mg1865::mg_24::6::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Indro hasiako fahatafintohinana eo amin''ity firenena ity, ka dia samy ho tafintohina amin''izany ny ray mbamin''ny zanany; Ho faty ny olona mbamin''ny namany.'
mg1865::mg_24::6::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, misy firenena avy any amin''ny tany avaratra, dia firenena lehibe mitsangana avy any amin''ny faran''ny tany;'
mg1865::mg_24::6::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsipika sy lefona no entiny, lozabe sady tsy mamindra fo izy; Ny feony dia mirohondrohona toy ny ranomasina, sady mitaingin-tsoavaly izy ary voaomana tahaka ny lehilahy ho amin''ny ady, hamelezana anao, ry Ziona zanakavavy.'
mg1865::mg_24::6::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renay ny lazany, ka miraviravy tanana izahay; Fahoriana no mahazo anay, eny, fanaintainana tahaka ny vehivavy raha miteraka.'
mg1865::mg_24::6::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mivoaka ho any an-tsaha, ary aza mandeha amin''ny lalambe; Fa manan-tsabatra ny fahavalo, misy fampangorohoroana manodidina.'
mg1865::mg_24::6::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry oloko zanakavavy, misikìna lamba fisaonana ianao, ary mihosena lavenona, ka manaova fisaonana toy ny fisaonana zanakalahy tokana, dia fitomaniana fatratra; Fa ho avy tampoka amintsika ny mpandringana.'
mg1865::mg_24::6::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho mpizaha toetra ao amin''ny oloko no nanendreko anao, dia ho fiarovana mafy, mba ho fantatrao sy hizahanao toetra ny alehany.'
mg1865::mg_24::6::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tena maditra avokoa izy rehetra ka mandehandeha manaratsy, varahina sy vy izy; Samy mpanao ratsy avokoa izy rehetra.'
mg1865::mg_24::6::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'May ny tafoforana, levon''ny afo ny firaka, foana ny nandrendrehan''ny mpandrendrika, fa tsy voaisotra ny ratsy.'
mg1865::mg_24::6::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataon''ny olona hoe, volafotsy tsy lany izy, satria tsy lanin''i Jehovah.'
mg1865::mg_24::7::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny olona izay niankina foana tamin''ny tempoly sy ny fombam-pivavahana'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah:'
mg1865::mg_24::7::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangana eo am-bavahadin''ny tranon''i Jehovah, ary torio eo izao teny izao, ka ataovy hoe: Mihainoa ny tenin''i Jehovah ianareo, ry Joda rehetra, izay miditra amin''ireto vavahady ireto mba hiankohoka eo anatrehan''i Jehovah.'
mg1865::mg_24::7::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ataovy tsara ny lalanareo sy ny ataonareo, dia hamponeniko amin''ity tany ity ianareo.'
mg1865::mg_24::7::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matoky ny teny lainga hoe: Tempolin''i Jehovah, tempolin''i Jehovah, Tempolin''i Jehovah ity.'
mg1865::mg_24::7::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ataonareo tsara mihitsy ny lalanareo sy ny ataonareo, ka mitsara marina ny adin''olona amin''ny namany ianareo,'
mg1865::mg_24::7::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mampahory ny vahiny sy ny kamboty sy ny mpitondratena, na mandatsaka rà marina amin''ity tany ity, sady tsy manaraka andriamani-kafa hahatonga loza aminareo,'
mg1865::mg_24::7::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hamponeniko amin''ity tany ity ihany ianareo, dia eto amin''ny tany nomeko ny razanareo, hatramin''ny ela ka ho mandrakizay.'
mg1865::mg_24::7::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! ianareo matoky ny teny lainga, nefa tsy mahasoa tsinona izany.'
mg1865::mg_24::7::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hay! hangalatra sy hamono olona sy hijangajanga va ianareo ary hianian-tsy to sy handoro ditin-kazo manitra ho an''i Bala sady hanaraka andriamani-kafa izay tsy fantatrareo?'
mg1865::mg_24::7::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mbola avy miseho ao anatrehako amin''ity trano izay efa niantsoana ny anarako ity ihany ianareo ka manao hoe: Efa voavonjy izahay mba hanaovana ireto fahavetavetana rehetra ireto!'
mg1865::mg_24::7::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ataonareo ho zohy fieren''ny jiolahy va ity trano izay efa niantsoana ny anarako ity? Indro, ny tenako aza dia mahita izany, hoy Jehovah.'
mg1865::mg_24::7::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandehana ianareo any amin''ny fitoerako izay ao Silo, dia ilay nasiako ny anarako any am-boalohany, ka jereo izay nataoko taminy noho ny haratsian''ny Isiraely oloko.'
mg1865::mg_24::7::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, hoy Jehovah, satria nanao izany zavatra rehetra izany ianareo, ary niteny taminareo Aho, eny, nifoha maraina koa ka niteny taminareo, nefa tsy nohenoinareo, ary niantso anareo Aho, nefa tsy novalianareo,'
mg1865::mg_24::7::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia ho toy ny nataoko tamin''i Silo no hataoko amin''ny trano izay efa niantsoana ny anarako sady itokianareo, sy amin''ny fitoerana izay nomeko anareo sy ny razanareo;'
mg1865::mg_24::7::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hesoriko hiala eto anatrehako ianareo toy ny nanesorako ny rahalahinareo rehetra, dia ny taranak''i Efraima rehetra.'
mg1865::mg_24::7::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza mivavaka ho an''ity firenena ity ianao, ary aza manandratra fitarainana sy fivavahana ho azy na mifona amiko; Fa tsy hihaino anao Aho.'
mg1865::mg_24::7::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hitanao va ny ataon''ireo any an-tanànan''ny Joda sy any an-dalamben''i Jerosalema?'
mg1865::mg_24::7::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zaza manangon-kitay, ny ray mandrehitra afo, ary ny vehivavy mametafeta ny koba hatao mofo ho an''ny mpanjakavavin''ny lanitra sy hanidinana fanatitra aidina ho an''ny andriamani-kafa mba hampahasosotra Ahy.'
mg1865::mg_24::7::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa Izaho va no ampahasosorin''ireo, hoy Jehovah, fa tsy ny tenany ihany mba ho fangaihainy?'
mg1865::mg_24::7::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Indro, ny fahatezerako sy ny fahavinirako haidina amin''ity tany ity, dia amin''ny olona sy ny biby fiompy sy ny hazo any an-tsaha ary ny vokatry ny tany; Dia hirehitra izany ka tsy hovonoina.'
mg1865::mg_24::7::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Aoka ny fanatitra dorana ho naman''ny fanatitrareo hafa alatsa-drà, ka mihinàna hena.'
mg1865::mg_24::7::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny amin''ny fanatitra dorana sy ny fanatitra hafa no nitenenako tamin''ny razanareo na nandidiako azy tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta;'
mg1865::mg_24::7::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao kosa no nandidiako azy: Henoy ny feoko. Dia ho Andriamanitrareo Aho, ary ianareo ho oloko ka handeha amin''ny lalana rehetra nandidiako anareo, mba hahitanareo soa.'
mg1865::mg_24::7::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo tsy nihaino izy na nanongilana ny sofiny, fa nandeha tamin''ny fisainany sy ny ditry ny fo ratsiny ihany izy dia niamboho, fa tsy mba nanatrika.'
mg1865::mg_24::7::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny andro nivoahan''ny razanareo avy tany amin''ny tany Egypta ka ambaraka androany dia nirahiko ho any aminareo ihany ny mpaminany mpanompoko rehetra, eny, nifoha maraina koa isan''andro Aho ka naniraka azy mandrakariva.'
mg1865::mg_24::7::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nihaino Ahy izy ireo sady tsy nanongilana ny sofiny, fa nanamafy ny hatony ka nanao ratsy mihoatra noho ny razany aza.'
mg1865::mg_24::7::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia holazainao aminy aza ireo teny rehetra ireo, dia tsy hihaino anao izy; Ary na dia antsoinao aza izy, dia tsy hamaly anao.'
mg1865::mg_24::7::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminy hoe: Ity no firenena tsy mihaino feon''i Jehovah Andriamaniny sady tsy mino anatra; Very ny fahamarinana, fa afaka tamin''ny vavany.'
mg1865::mg_24::7::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hetezo ny volonao, ry Jerosalema, ka ario, ary manaova hira fahalahelovana any an-tendrombohitra mangadihady, satria lavin''i Jehovah sy afoiny ny taranaka mahatezitra Azy.'
mg1865::mg_24::7::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manao izay ratsy eo imasoko ny taranak''i Joda, hoy Jehovah, mametraka ny fahavetavetany ao amin''ny trano izay efa niantsoana ny anarako izy mba handoto azy.'
mg1865::mg_24::7::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanorina ireo fitoerana avo any Tofeta, izay ao amin''ny lohasahan''ny taranak''i Hinema, handoroany ny zananilahy sy ny zananivavy amin''ny afo; Nefa zavatra tsy mba nandidiako na tao an-tsaiko akory aza izany.'
mg1865::mg_24::7::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy ny andro, hoy Jehovah, izay tsy hanaovana azy intsony hoe Tofeta, na Lohasahan''ny taranak''i Hinoma, fa Lohasaha Famonoana kosa. Ary any Tofeta aza no handevenana noho ny hateren''ny tany.'
mg1865::mg_24::7::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatin''ity firenena ity dia ho fihinan''ny voro-manidina sy ny bibidia, ka tsy hisy hanaitaitra azy.'
mg1865::mg_24::7::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatsahatro any an-tanànan''ny Joda sy eny an-dalamben''i Jerosalema ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina; Fa ho lao ny tany.'
mg1865::mg_24::8::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany, hoy Jehovah, dia hofongarina avy ao am-pasana ny taolan''ny mpanjakan''ny Joda sy ny taolan''ny lehibeny sy ny taolan''ny mpisorona sy ny taolan''ny mpaminany ary ny taolan''ny mponina any Jerosalema,'
mg1865::mg_24::8::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka haeliny eo anatrehan''ny masoandro sy ny volana ary ny kintana rehetra eny amin''ny lanitra, izay efa tiany sy notompoiny sy efa narahiny sy efa notadiaviny ary efa niankohofany teo anatrehany: tsy hangonina na halevina intsony ireny, fa hatao zezika eny ambonin''ny tany.'
mg1865::mg_24::8::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sisa rehetra amin''ity taranaka ratsy ity, izay mbola sisa any amin''ny tany rehetra nandroahako azy, dia haniry ny ho faty noho ny ho velona, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_24::8::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny nikirizan''ny olona tamin''ny fanaovan-dratsy, sy ny hamafin''ny loza hanjo azy'
  verse_text: 'Ary koa, lazao aminy hoe: Izao no lazain''i Jehovah: Ho lavo va ny olona ka tsy hiarina? Hihodina hivily va ny olona ka tsy hitodika hiverina?'
mg1865::mg_24::8::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ity firenena eto Jerosalema ity* no miodina amin''ny fiodinana tsy mety mitsahatra? Mikikitra mafy amin''ny fitaka izy ka tsy mety miverina. [*Hebreo: ity firenena Jerosalema ity]'
mg1865::mg_24::8::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihaino Aho, ka nandre, fa manao teny tsy marina izy: Ary tsy misy manenina ny amin''ny haratsiany hoe: Endrey izany nataoko izany! Izy rehetra dia samy mivily mankamin''ny alehany avy* tahaka ny soavaly miriotra ho amin''ny ady. [*Na: samy mivily eny am-pandehanany]'
mg1865::mg_24::8::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny vano eny amin''ny lanitra aza dia mahalala ny fotoan''androny, ary ny domohina sy ny sidintsidina ary ny vanobe koa samy mitandrina ny fotoana fihaviany; Fa ny oloko kosa tsy mba mahalala ny fitsipik''i Jehovah.'
mg1865::mg_24::8::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no anaovanareo hoe: Hendry izahay, ary ato aminay ny lalàn''i Jehovah? Nefa ny fanoratan-daingan''ny mpanoratra mahatonga azy ho lainga.'
mg1865::mg_24::8::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahazo henatra ny hendry, raiki-tahotra sy voasambotra izy; Indro, ny tenin''i Jehovah dia nolaviny, ka inona intsony no fahendrena ananany?'
mg1865::mg_24::8::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia homeko ho an''ny sasany ny vadiny, ary ny sahany ho an''izay maka azy, satria izy rehetra, na ny kely na ny lehibe, dia samy fatra-pila harena, na mpaminany na mpisorona dia samy mamitaka avokoa.'
mg1865::mg_24::8::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nataotaony foana ny fanasitranany ny faharatran''ny oloko zanakavavy tamin''ny nanaovany hoe: Fiadanana, fiadanana; Kanjo tsy misy fiadanana tsinona!'
mg1865::mg_24::8::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nomenarina izy noho ny nanaovany fahavetavetana, nefa tsy mba menatra akory izy, ary tsy mba valahara; Koa ho lavo ao amin''izay lavo izy, amin''ny andro hamaliana azy dia ho tafintohina izy, ho Jehovah.'
mg1865::mg_24::8::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hakifako tokoa izy, hoy Jehovah; Tsy mamoa ny voaloboka, ary tsy misy voany ny aviavy, malazo ny raviny; Ary nanendry izay hanafika azy Aho.'
mg1865::mg_24::8::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana isika no mbola mipetra-poana? Mivoria ianareo, ka andeha isika hiditra any an-tanàna mimanda, ka dia ho faty ao; fa Jehovah Andriamanitra efa nanendry antsika ho faty ka nanome rano mangidy hosotrointsika Noho ny nanotantsika tamin''i Jehovah.'
mg1865::mg_24::8::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanantena fiadanana isika, kanjo tsy nahita soa; Ary andro fanasitranana*, fa indro fampitahorana. [* Na: fahafinaretana]'
mg1865::mg_24::8::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiefonefon''ny soavaly dia re hatrany Dana: Mihorohoro ny tany rehetra noho ny fanenon''ny soavaly matanjaka; Fa avy izy ka mandany ny tany mbamin''ny izay rehetra ao aminy, dia ny tanàna sy izay monina ao.'
mg1865::mg_24::8::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa indro Aho handefa bibilava hamely anareo, dia menarana izay tsy azon''ody, ka hanaikitra anareo ireny, hoy Jehovah.'
mg1865::mg_24::8::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! enga anie ka hisy fahamiramiranana ho ahy eto amin''ny alaheloko, fa reraka ny foko ato anatiko.'
mg1865::mg_24::8::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy feo fitarainan''ny oloko zanakavavy hatrany amin''ny tany lavitra hoe: Moa Jehovah tsy ao Ziona va? Ary tsy ao aminy va ny Mpanjakany? Nahoana no nahatezitra Ahy ireny tamin''ny sarin-javatra voasokitra ao aminy sy tamin''ny zava-poana avy amin''ny firenena hafa?'
mg1865::mg_24::8::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa ny fararano, tapitra ny taom-piotazana, nefa tsy voavonjy isika.'
mg1865::mg_24::8::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torotoro aho noho ny fahatorotoroan''ny oloko zanakavavy; Misaona aho, ary horohoro no mahazo ahy.'
mg1865::mg_24::8::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy misy balsama va any Gileada? Moa tsy misy dokotera va any? Koa nahoana no tsy tanteraka ny fanasitranana ny oloko zanakavavy?'
mg1865::mg_24::8::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho rano ny lohako, ary ho loharanon-dranomaso ny masoko, mba hitomaniako andro aman''alina noho ny voavono amin''ny oloko zanakavavy!'
mg1865::mg_24::9::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny alahelon''i Jeremia noho ny faharatsian''ny olona'
  verse_text: 'Enga anie ka hahita fitoerana any an''efitra aho tahaka ny fitoeran''ny mpandeha! Dia hahafoy ny fireneko aho ka hiala aminy, satria mpijangajanga avokoa izy rehetra, eny, mpivadika miray tetika izy.'
mg1865::mg_24::9::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manenjana ny lelany toy ny fanenjana tsipïka izy mba handefa lainga. Ary tsy araka ny marina no mahahery azy ety ambonin''ny tany; Fa mandroso amin''ny ratsy ka hatramin''ny ratsy izy, ary Izaho tsy mba fantany, hoy Jehovah.'
mg1865::mg_24::9::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samia miaro tena amin''ny namany avy ianareo. Ary aza misy matoky olona na dia ny rahalahy aza; Fa ny rahalahy rehetra dia mamingana tokoa, ary ny namana rehetra mandehandeha manaratsy.'
mg1865::mg_24::9::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy rehetra samy mamitaka ny namany avy, ka tsy misy miteny marina; Mampianatra ny lelany handainga izy ary manasa-tena amin''ny fanaovan-dratsy.'
mg1865::mg_24::9::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fonenanao dia ao anatin''ny fitaka; Fitaka no nandavany tsy hahalalana Ahy, hoy Jehovah.'
mg1865::mg_24::9::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Indro, handrendrika sy hizaha toetra azy Aho; Fa ahoana no hataoko noho ny amin''ny oloko zanakavavy?'
mg1865::mg_24::9::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zana-tsipïka mahafaty ny lelany ka miteny fitaka; Raha amin''ny vavany, dia miteny fihavanana amin''ny namany izy, kanjo ao anatiny kosa dia manao otri-po.'
mg1865::mg_24::9::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hovaliako va izy amin''izany zavatra izany? hoy Jehovah, tsy hialako fo va ny firenena toy izany?'
mg1865::mg_24::9::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny amin''ny tendrombohitra no hitomaniako sy hidradradrako, ary noho ny amin''ny kijana any an''efitra no hanaovako hira fa halahelovana, satria may izy, ka tsy misy mandeha mamaky eo aminy, ary tsy misy fimàmàn''omby re intsony, ary na ny voro-manidina na ny bibi-dia samy efa nandositra ka lasa avokoa.'
mg1865::mg_24::9::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jerosalema dia hataoko korontam-bato sy fonenan''ny amboadia*; ary ny tanànan''ny Joda hataoko lao tsy hisy mponina. [*Na: jakala]'
mg1865::mg_24::9::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no olon-kendry mba hahafantatra izao, sady efa nitenenan''ny vavan''i Jehovah mba hanambara izao? Fa nahoana no noravana ny tany sady may ho toy ny efitra, ka tsy misy mandeha mamaky eo aminy?'
mg1865::mg_24::9::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: satria nahafoy ny lalàko izay nataoko teo anoloany izy ka tsy nankatò izany ary tsy nihaino ny feoko,'
mg1865::mg_24::9::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nandeha araka ny ditry ny fony sy nanaraka ireo Bala araka izay nampianarin''ny razany azy,'
mg1865::mg_24::9::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hofahanako zava-mahafaty ity firenena ity sy hampisotroiko rano mangidy;'
mg1865::mg_24::9::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haeliko any amin''izay jentilisa tsy fantany na fantatry ny razany izy; Ary hampanenjehiko azy ny sabatra ambara-pandaniko azy.'
mg1865::mg_24::9::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah. Tompon''ny maro: Mihevera tsara, ka antsoy ireny vehivavy mpanao hira fahalahelovana mba ho avy; Eny, ampanalao ireny vehivavy mahay mba ho tonga;'
mg1865::mg_24::9::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asaovy haingana ireny hanandratra fidradradradrana ho antsika, mba hampijojy ny ranomasontsika sy hampivarina ny ranomaso avy amin''ny hodimasontsika.'
mg1865::mg_24::9::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy feo midradradradra re any Ziona hoe: Indrisy! rava isika; Afa-baraka indrindra isika, satria tsy maintsy mamoy ny tany, fa efa narodana ny trano nitoerantsika.'
mg1865::mg_24::9::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mihainoa ny tenin''i Jehovah, ianareo vehivavy, ary aoka hohenoin''ny sofinareo ny tenin''ny vavany, ka ampianaro fidradradradrana ny zanakavavinareo, ary samia mampianatra hira fahalahelovana ny namany avy.'
mg1865::mg_24::9::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahafatesana efa nananika ny varavarankelintsika ka niditra tao an-dapantsika, mba handringana ny ankizy madinika tsy ho eny an-dalambe sy ny zatovo tsy ho eny an-kalalahana.'
mg1865::mg_24::9::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy hoe: Izao no lazain''i Jehovah: Hiampatrampatra ny fatin''ny olona ka ho tonga tahaka ny zezika eny an-tsaha sy tahaka ny amboara nilaozan*''ny mpijinja, Izay tsy misy manangona azy. [*Hebreo: any aorian'']'
mg1865::mg_24::9::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny amin''ny tsy fahatokian-tena, sy ny fahatokiana an''Andriamanitra, Izay mitsara marina'
  verse_text: 'Izao no lazain''i Jehovah: Aoka ny hendry tsy hirehareha amin''ny fahendreny, ary aoka ny mahery tsy hirehareha amin''ny heriny, ary aoka ny manan-karena tsy hirehareha amin''ny hareny;'
mg1865::mg_24::9::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay te-hirehareha dia aoka hirehareha amin''izao: Dia ny fahendreny sy ny fahalalany Ahy ho Jehovah, Izay manao famindram-po sy fitsarana marina ary fahamarinana ety ambonin''ny tany; fa izany no sitrako, hoy Jehovah.'
mg1865::mg_24::9::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, izay hamaliako ny voafora rehetra mbamin''ny tsy voafora koa*, [*Na: izay toy ny tsy voafora]'
mg1865::mg_24::9::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Egypta sy Joda sy Edoma sy ny taranak''i Amona ary Moaba mbamin''izay rehetra voahety sisim-bolo, izay monina any an''efitra; Fa ny jentilisa rehetra dia tsy voafora, ary ny taranak''Isiraely rehetra kosa dia tsy voafora fo.'
mg1865::mg_24::10::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny mahatsinontsinona ny sampy, ary ny fampisehoana ny voninahitr''i Jehovah sy ny fahatezerany'
  verse_text: 'Henoy ny teny izay lazain''i Jehovah aminareo, ry taranak''Isiraely!'
mg1865::mg_24::10::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Aza mianatra ny fanaon*''ny jentilisa; Ary aza matahotra ireo famantarana eny amin''ny lanitra; Fa ny jentilisa no matahotra izany. [*Hebreo: didin'']'
mg1865::mg_24::10::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanaon''ny firenena dia zava-poana; Fa hazo nokapaina tany an''ala ireny, dia asan-tanan''ny mpiasa amin''ny famaky;'
mg1865::mg_24::10::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volafotsy sy volamena no an-dravahany azy, ary hombo sy tantanana no entiny manamafy azy, mba tsy hihetsiketehany.'
mg1865::mg_24::10::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny hazo voasana ho sari-drofia* izy, fa tsy mahateny; Ary entina ihany izy, fa tsy mba afa-mandeha; Aza matahotra azy, fa tsy mahatonga loza izy sady tsy mahay manisy soa. [*palma]'
mg1865::mg_24::10::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy tokoa izay tahaka Anao, Jehovah o; Lehibe Ianao, ary lehibe amin''ny hery ny anaranao.'
mg1865::mg_24::10::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no tsy hatahotra Anao, ry Mpanjakan''ny firenena! Fa Ianao no iendrehan''izany, eny, amin''ny hendry rehetra amin''ny firenena sy amin''ny fanjakany rehetra dia tsy misy tahaka Anao.'
mg1865::mg_24::10::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ketrina sy adala avokoa izy rehetra; He! fananaram-poana! fa tapa-kazo ihany.'
mg1865::mg_24::10::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volafotsy voafisaka nalaina avy tany Tarsisy sy volamena avy tany Ofaza Izany, asan-tanan''ny mpiasa sy ny mpanefy volamena; Lamba manga sy volomparasy ny fitafiany; Asan''ny mahay zavatra izy rehetra.'
mg1865::mg_24::10::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah no Andriamanitra tokoa, eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay. Izay mampihorohoro ny tany amin''ny fahatezerany, ka tsy tantin''ny firenena ny fahavinirany'
mg1865::mg_24::10::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: '(Izao no holazainareo amin''ireny; Ny amin''ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany, dia ho levona tsy ho amin''ny tany na ho aty ambanin''ny lanitra ireny)'
mg1865::mg_24::10::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay nanao ny tany tamin''ny heriny sy nampiorina izao tontolo izao tamin''ny fahendreny ary namelatra ny lanitra tamin''ny fisainany.'
mg1865::mg_24::10::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mampirohondrohona ny rano any an-danitra Izy, dia mampiakatra fofona avy any amin''ny faran''ny tany; Manao ny helatra ho amin''ny ranonorana Izy sady mamoaka ny rivotra avy amin''ny firaketany.'
mg1865::mg_24::10::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana; Menarina noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra; Fa fitaka ny sarin-javatra an-idina, sady tsy misy fofon''aina ao aminy.'
mg1865::mg_24::10::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-poana ireny, dia asa mahatsikaiky foana; Amin''ny andro hamaliana azy dia ho levona izy.'
mg1865::mg_24::10::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba tahaka ireo ny Anjaran''i Jakoba; Fa Mpamorona ny zavatra rehetra Izy; Ary ny Isiraely no firenena lovany; Jehovah, Tompon''ny maro, no anarany.'
mg1865::mg_24::10::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angony ny korontan''entanao, ka ento hiala amin''ny tany, ry ilay mipetraka ao amin''ny haterena!'
mg1865::mg_24::10::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Indro, hatorako ho indray misidina toy ny vaton''antsamotady ny mponina amin''ny tany, ary hataoko tery izy mba hahitany.'
mg1865::mg_24::10::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita loza aho, fa torotoro! Tsy azo sitranina ny feriko; Nefa hoy Izaho: Anjara-fahoriako izao, ka dia hozakaiko ihany.'
mg1865::mg_24::10::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rava ny laiko, ary tapaka avokoa ny kofehin-daiko; Lasa ny zanako, ka tsy misy intsony, eny, tsy misy hamelatra ny laiko intsony na hanantona ny ambain-daiko.'
mg1865::mg_24::10::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa ketrina ny mpiandry ondry ka tsy mitady an''i Jehovah; Izany no tsy mahahendry azy, ka dia miely ny ondry andrasany rehetra.'
mg1865::mg_24::10::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy siosion-teny hoe: Indro, tamy izy amin''ny fihorakorahana be avy any amin''ny tany avaratra mba hahatonga ny tanànan''ny Joda ho lao sy ho fonenan''ny amboadia.'
mg1865::mg_24::10::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, fantatro fa tsy an''ny olombelona ny lalan-kalehany, na an''ny mpandeha ny hahalavorary ny diany'
mg1865::mg_24::10::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, anaro aho, nefa araka ny antonony ihany, fa tsy amin''ny fahatezeranao, fandrao hataonao tonga tsinontsinona aho.'
mg1865::mg_24::10::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aidino amin''ny jentilisa izay tsy mahalala Anao ny fahatezeranao, dia amin''ny taranaka Izay tsy miantso ny anaranao. Fa efa nihinana an''i Jakoba ireo, eny, nihinana sy nahalevona azy ary nahalao ny fonenany.'
mg1865::mg_24::11::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nivadihan''ny Isiraely tamin''ny fanekena nataon''i Jehovah taminy, sy ny nanao azy noho izany'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah:'
mg1865::mg_24::11::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny tenin''izao fanekena izao ianareo, ary mitenena amin''ny Joda sy amin''ny mponina any Jerosalema,'
mg1865::mg_24::11::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: ho voaozona izay olona tsy mankatò ny tenin''izao fanekena izao,'
mg1865::mg_24::11::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nandidiako ny razanareo tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta, dia avy tao amin''ny memy fandrendreham-by, ka nanaovako hoe: Mihainoa ny feoko, ary mankatoava ireny araka izay rehetra andidiako anareo, dia ho oloko ianareo, ary Izaho kosa ho Andriamanitrareo,'
mg1865::mg_24::11::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hotoviko ny fianianana izay nianianako tamin''ny razanareo, dia ny hanomezana azy tany tondra-dronono sy tantely tahaka ny amin''izao anio izao. Dia namaly aho ka nanao hoe: Ho izany tokoa anie*, Jehovah o! [*Hebreo: Amena]'
mg1865::mg_24::11::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Torio any an-tanànan''ny Joda sy any an-dalamben''i Jerosalema Izany teny rehetra izany, ka lazao hoe: Henoy ny tenin''izao fanekena izao, ka ankatoavy izy.'
mg1865::mg_24::11::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nananatra mafy ny razanareo Aho tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta ka ambaraka androany; Eny, nifoha maraina koa Aho ka nananatra hoe: Mihainoa ny feoko.'
mg1865::mg_24::11::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nihaino izy na nanongilana ny sofiny, fa samy nandeha tamin''ny ditry ny fo ratsiny ihany izy; Ka dia nataoko mihatra aminy ny teny rehetra amin''izao fanekena izao, ilay nasaiko nataony, nefa tsy nataony.'
mg1865::mg_24::11::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jehovah tamiko: Misy tetika fikomiana hita ao amin''ny Joda sy amin''ny mponina any Jerosalema.'
mg1865::mg_24::11::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy niverina nankamin''ny heloky ny razany, izay tsy nety nihaino ny teniko, ary lasa nanaraka andriamani-kafa izy ka nanompo azy; Ny taranak''Isiraely sy ny taranak''i Joda efa nivadika ny fanekeko, izay nataoko tamin''ny razany.'
mg1865::mg_24::11::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Indro, Izaho hahatonga loza aminy, izay tsy azony handosirana; Ary na dia hitaraina amiko aza izy, dia tsy hihaino azy Aho.'
mg1865::mg_24::11::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handeha ny tanànan''ny Joda sy ny mponina any Jerosalema ka hitaraina amin''ireny andriamaniny, izay efa nandoroany ditin-kazo manitra; Nefa ireny tsy hahavonjy azy akory amin''ny andro fahoriany.'
mg1865::mg_24::11::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa araka ny isan''ny tanànanao, ry Joda, no isan''ny andriamanitrao, Ary araka ny isan''ny lalamben''i Jerosalema no isan''ny alitara naorinareo ho an''ilay mampahamenatra. Dia alitara handoroana ditin-kazo manitra ho an''i Bala.'
mg1865::mg_24::11::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza mivavaka ho an''ity firenena ity ianao, ary aza manandratra fitarainana na fifonana ho azy; Fa amin''ny andro izay hitarainany amiko noho ny fahoriany dia tsy hihaino azy Aho.'
mg1865::mg_24::11::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao inona ao an-tranoko ny malalako fa efa namoron-tsain-dratsy niaraka tamin''ny maro izy, ary ny hena masina dia esorina aminao*; Raha azon-doza ianao, mifalia ary! [*Na: Nahoana ny malalako no manao fahavetavetana eto an-tranoko? Moa ny voady sy ny hena masina va no hampiala ny faharatsianao, na hahafahanao handositra?]'
mg1865::mg_24::11::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hazo oliva maitso sady misy voany maha-te-hizaha no nataon''i Jehovah anaranao; Tamin''ny fihorakorahana be no nandrehetany afo taminy, ary notapahina ny rantsany.'
mg1865::mg_24::11::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah, Tompon''ny maro, Izay namboly anao, no nanambara ny loza hanjo anao, noho ny ratsy nataon''ny taranak''Isiraely sy ny taranak''i Joda, Izay nahavoa ny tenany ka nahatezitra Ahy. Dia tamin''ny nandoroany ditin-kazo manitra ho an''i Bala.'
mg1865::mg_24::11::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny teny nasain''i Jehovah nolazaina ny amin''ny mponina tao Anatota, izay nitady hamono an''i Jeremia'
  verse_text: 'Ary nampahafantarin''i Jehovah aho, ka dia nahalala; Tamin''izany dia nasehonao ahy ny fanaony.'
mg1865::mg_24::11::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho dia tahaka ny zanak''ondry bonaika, izay entina hovonoina; Ary tsy fantatro fa izao no tetika nataony namelezany ahy: Aoka hosimbantsika ny hazo mbamin''ny voany, ary aoka hofongorantsika hiala amin''ny tanin''ny velona izy, mba tsy hotsarovana intsony ny anarany.'
mg1865::mg_24::11::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa, ry Jehovah, Tompon''ny maro o, Izay mitsara marina ka mamantatra ny voa sy ny fo aoka ho hitako ny famalianao azy; Fa aminao no efa nanankinako ny adiko.'
mg1865::mg_24::11::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah ny amin''ny mponina ao Anatota, izay mitady ny ainao ka manao hoe: Aza maminany amin''ny anaran''i Jehovah, fandrao matin''ny tananay ianao,'
mg1865::mg_24::11::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'izao no lazain''i Jehovah, Tompon''ny maro: Indro, hovaliako Izy, ka ny zatovo ho fatin-tsabatra, ary ny zananilahy sy ny zananivavy ho fati-mosary;'
mg1865::mg_24::11::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka tsy hisy hiangana izy; Fa hahatonga loza amin''ny mponina ao Anatota Aho amin''ny taona hamaliana azy.'
mg1865::mg_24::12::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fitarainana nataon''i Jeremia noho ny nanambinana ny ratsy fanahy, sy ny navalin''i Jehovah azy'
  verse_text: 'Raha mifandahatra aminao aho, Jehovah o dia Ianao no marina; Nefa kosa aoka ihany mba handahatra aminao aho: Nahoana ary no ambinina ny lalan''ny ratsy fanahy? Nahoana no miadana ny mpiodina rehetra?'
mg1865::mg_24::12::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nambolenao izy, ka dia miorim-paka; Mitombo izy, ka dia mamoa; Manakaiky Anao amin''ny vavany izy, nefa manalavitra Anao amin''ny fony*. [*Hebreo: voany]'
mg1865::mg_24::12::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah o, mahalala ahy; Mahita ahy Ianao sady mizaha toetra ny foko ny aminao; Sariho toy ny ondry hovonoina ireny, ary atokàny* ho amin''ny andro hamonoana. [*Hebreo: hamasino]'
mg1865::mg_24::12::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hisaonan''ny tany sy hahalazoan''ny ahitra any amin''ny saha rehetra? Noho ny faharatsian''ny mponina any dia lany ringana ny biby sy ny vorona; Fa hoy ireo: Tsy mba hahita izay hiafarantsika izy.'
mg1865::mg_24::12::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha niara-nihazakazaka tamin''ny mandeha an-tongotra ianao ka voany, dia hataonao ahoana no fihaika ny soavaly? Ary raha eny amin''ny tany miadana no anananao toky, hanao ahoana kosa ianao, raha mby any amin''ny kirihitrala eny amoron*''i Jordana? [*Hebreo: ny reharehany]'
mg1865::mg_24::12::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ny rahalahinao sy ny mpianakavin''ny rainao aza dia samy namitaka anao; Eny, niantso mafy teo aorianao ireo; Aza mino azy, na dia tsara fiteny aminao aza izy.'
mg1865::mg_24::12::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nilaozako ny tranoko, nafoiko ny lovako; Ny sombin''aiko dia natolotro ho eo an-tanan''ny fahavalony.'
mg1865::mg_24::12::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha amiko, ny lovako dia efa toy ny liona any an''ala; Mierona amiko izy, ka dia halako.'
mg1865::mg_24::12::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tahaka ny vorona mpihaza hafahafa volo amiko va ny lovako, no mivory manodidina azy ny vorona mpihaza? Avia, ka angony ny bibi-dia rehetra, ampanatony ireny hihinana.'
mg1865::mg_24::12::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpitondra maro no nanimba ny tanim-boaloboko, nohitsakitsahiny ny anjarako; Nataony tany efitra lao ny anjarako mahafinaritra;'
mg1865::mg_24::12::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataony lao izany, eny, lao izy ka mitomany amiko; Nataony lao avokoa ny tany rehetra, satria tsy nisy nandatsaka am-po.'
mg1865::mg_24::12::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpandrava dia tonga any amin''ny tendrombohitra mangadihady rehetra any an''efitra; Fa misy sabatr''i Jehovah mandringana amin''ny faran''ny tany ka hatramin''ny farany koa, ka dia tsy misy fiadanana ho an''ny nofo rehetra.'
mg1865::mg_24::12::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vary no nafafiny, fa tsilo no nojinjany; Nanasatra ny tenany izy, kanjo herim-po very foana izany; Dia hangaihay ny amin''ny zavatra azonareo ianareo noho ny firehetan''ny fahatezeran''i Jehovah.'
mg1865::mg_24::12::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah ny amin''ireo ratsy fanahy rehetra mifanakaiky fonenena amiko ireo, dia izay mikasikasika ny tany nomeko ho lovan''ny Isiraely oloko: Indro, hongotako tsy ho amin''ny taniny ireo, ary ny taranak''i Joda koa dia hongotako tsy ho eo aminy.'
mg1865::mg_24::12::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nony efa voaongotra izy, dia hamindra fo aminy indray Aho, ka samy ho entiko mody any amin''ny lovany sy ny taniny avy indray izy.'
mg1865::mg_24::12::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha mba hianatra ny fanaon''ny oloko tokoa ireo ka hianiana amin''ny anarako hoe: Raha velona koa Jehovah, tahaka ny nampianaran''ireo ny oloko hianiana amin''i Bala, dia haorina ao amin''ny oloko izy;'
mg1865::mg_24::12::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy hankatò kosa izy, dia hongotako izany firenena izany, eny, hongotako sy haringako izy, hoy Jehovah.'
mg1865::mg_24::13::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampietrena ny avonavon''ny Joda'
  verse_text: 'Izao no nolazain''i Jehovah tamiko: Andeha mividy fehin-kibo rongony ho anao, ka ifehezo ny kibonao, fa aza atao anaty rano.'
mg1865::mg_24::13::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nividy fehin-kibo aho araka ny tenin''i Jehovah ka nifehezako ny kiboko.'
mg1865::mg_24::13::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko fanindroany ny tenin''i Jehovah hoe:'
mg1865::mg_24::13::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ento ny fehin-kibo izay novidinao, dia ilay ifehezanao ny kibonao, ka mitsangana, mankanesa any Eofrata, ary afeno ao an-tsefatsefaky ny harambato izy.'
mg1865::mg_24::13::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nandeha aho, ary nafeniko tao amoron''i Eofrata izy, araka ny nandidian''i Jehovah ahy.'
mg1865::mg_24::13::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka andro maro, dia hoy Jehovah tamiko: Mitsangana, ka mankanesa any Eofrata, ary alao any ny fehin-kibo, dia ilay nasaiko nafeninao tany.'
mg1865::mg_24::13::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany Eofrata aho ka nihady, ary nalaiko tao amin''ny fitoerana nanafenako azy ilay fehin-kibo; kanjo, indro, simba ny fehin-kibo ka tsy azo natao na inona na inona intsony.'
mg1865::mg_24::13::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah hoe:'
mg1865::mg_24::13::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Tahaka izany no hanimbako ny avonavon''ny Joda sy ny haben''ny avonavon''i Jerosalema.'
mg1865::mg_24::13::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity firenena ratsy ity, izay tsy mety mihaino ny teniko, fa mandeha amin''ny ditry ny fony ka manaraka andriamani-kafa mba hotompoiny sy hiankohofany, dia ho tahaka ity fehin-kibo ity, izay tsy azo atao na inona na inona intsony.'
mg1865::mg_24::13::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ny firaikitry ny fehin-kibo amin''ny valahan''ny olona no nampiraiketako ny taranak''Isiraely sy ny taranak''i Joda rehetra tamiko, hoy Jehovah, mba ho olona sy anarana sy fiderana ary voninahitra ho Ahy ireny Kanjo tsy nety nihaino izy.'
mg1865::mg_24::13::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao teny izao dia lazao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ny tavoara rehetra dia feno divay; ary izy hanao aminao hoe: Moa tsy efa fantatray ihany va fa feno divay ny tavoara rehetra?'
mg1865::mg_24::13::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia holazainao aminy hoe: Izao no lazain''i Jehovah: Indro, hataoko leony* ny mponina rehetra amin''ity tany ity, dia ny mpanjaka, izay mipetraka amin''ny seza fiandrianan''i Davida, sy ny mpisorona sy ny mpaminany ary ny mponina rehetra any Jerosalema. [*Hebreo: feno]'
mg1865::mg_24::13::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampifamohiko izy, dia ny ray mbamin''ny zanany, hoy Jehovah; Tsy hiantra Aho, na hitsitsy, na hamindra fo tsy handringana azy.'
mg1865::mg_24::13::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandrenesa ka mihainoa, aza miavonavona; Fa Jehovah no miteny.'
mg1865::mg_24::13::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manomeza voninahitra an''i Jehovah Andriamanitrareo, dieny tsy mbola mahatonga ny maizina Izy, ary dieny tsy mbola tafintohina amin''ny tendrombohitra maizimaizina ny tongotrareo, ka raha miandry ny mazava ianareo, dia hataony tonga ho aloky ny fahafatesana, ka hampodiny ho aizim-pito.'
mg1865::mg_24::13::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy hihaino izany ianareo. Dia hitomany any amin''ny mangingina ny fanahiko, satria misy fiavonavonana; Eny, ny masoko hamarin-dranomaso hijononoka be, satria voababo ny ondrin''i Jehovah.'
mg1865::mg_24::13::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny andriamanjaka sy ny reniny hoe: Mitombena amin''ny tany; Fa ho afaka ny firavaka eo an-dohanareo, dia ny satro-boninahitrareo tsara tarehy.'
mg1865::mg_24::13::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voarindrina ny tanàna any amin''ny tany atsimo, ka tsy misy mamoha; Lasan-ko babo Joda, eny, lasan-ko babo avokoa izy rehetra.'
mg1865::mg_24::13::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atopazy ny masonareo, ka tazano izay avy any avaratra; Aiza ny ondry andiany izay nomena anao, dia ny ondrinao tsara tarehy?'
mg1865::mg_24::13::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana re no holazainao, raha tendreny hanapaka anao ireny sakaizanao ireny, fa ianao ihany no nampianatra azy handrafy anao? Tsy hahazo anao va ny fanaintainana toy ny vehivavy raha miteraka?'
mg1865::mg_24::13::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manao anakampo ianao hoe: ahoana no nahatonga izao tamiko? Noho ny haben''ny helokao no nampiaingana ny moron-tongotr''akanjonao sy nandratrana ny ombelahin-tongotrao.'
mg1865::mg_24::13::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mahova ny hodiny va ny Etiopiana, ary ny leoparda* va mahova ny sorany? Raha izany, dia mahazo manao tsara koa ianareo izay efa zatra nanao ratsy. [*Anaram-biby masiaka sady misoratsoratra]'
mg1865::mg_24::13::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia haeliko izy toy ny vodivary indaosin''ny rivotra avy any an''efitra.'
mg1865::mg_24::13::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no lokanao, dia anjara voarefy ho anao, hoy Jehovah, Satria nanadino Ahy ianao ka nitoky tamin''ny lainga.'
mg1865::mg_24::13::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho kosa dia hampiainga ny moron-tongotr''akanjonao ho eny amin''ny tavanao, mba hisehoan''ny henatrao.'
mg1865::mg_24::13::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fijangajanganao sy ny fanenonao*, ny fahavetavetan''ny fijejojejoanao any amin''ny havoana any an-tsaha, eny, samy efa hitako avokoa ireo fahavetavetanao ireo. Lozanao, ry Jerosalema! Mandra-pahoviana no mbola tsy hetezanao hanadio ny tenanao? [*Izahao Jeremia 5:8]'
mg1865::mg_24::14::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy hahafahan''ny olona amin''ny loza, na dia efa nifonan''i Jeremia tamin''Andriamanitra aza izy'
  verse_text: 'Ny tenin''i Jehovah izay tonga tamin''i Jeremia ny amin''ny mosary.'
mg1865::mg_24::14::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaona ny Joda, ary mitanondrika ny vavahadiny; Mitafy lamba fioriana izy ka mipetraka amin''ny tany; Ary miakatra ny fitarainan''i Jerosalema.'
mg1865::mg_24::14::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehibeny maniraka ny madinika hantsaka rano; Dia tonga any amin''ny lavaka famorian-drano ireny, nefa tsy mahita rano ka miverina mitondra loha mody; Menatra sy mangaihay izy ka misaron-doha.'
mg1865::mg_24::14::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fangentan*''ny tany, noho ny tsy nilatsahan''ny ranonorana taminy, dia menatra ny mpiasa ka misaron-doha. [*Na: satria tora-kovitra]'
mg1865::mg_24::14::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ny dieravavy any an-tsaha aza, raha miteraka, dia mahafoy noho ny tsy fisian''ny ahi-maitso.'
mg1865::mg_24::14::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny borikidia mijanona eny an-tendrombohitra mangadihady, mihanahana maniry ny rivotra toy ny amboadia* izy; Manjambena ny masony noho ny tsy fisian''ny ahitra. [*Na: jakala]'
mg1865::mg_24::14::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jehovah o, na dia miampanga anay aza ny helokay, miasà ihany Ianao noho ny anaranao; Fa be ny fiodinanay, taminao no nanotanay.'
mg1865::mg_24::14::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Fanantenan''ny Isiraely o, Mpamonjy azy amin''ny andro fahoriana! Nahoana Ianao no dia toy ny vahiny amin''ny tany ary toy ny mpandeha izay manorin-day handry indray alina monja?'
mg1865::mg_24::14::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana Ianao no dia toy ny olona ankona ary toy ny lehilahy mahery tsy mahavonjy? Nefa mbola ato aminay ihany Ianao, Jehovah o, ary ny anaranao dia efa nantsoina taminay; Aza dia mandao anay.'
mg1865::mg_24::14::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah amin''ity firenena ity: Te-hirenireny toy izao izy, ka tsy mahajanona ny tongony; Tsy sitrak''i Jehovah izy, Ankehitriny dia tsaroany ny helony, ary valiany ny fahotany.'
mg1865::mg_24::14::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Aza mivavaka ho an''ity firenena ity hahasoa azy.'
mg1865::mg_24::14::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia mifady hanina aza izy, dia tsy hihaino ny fitarainany Aho; Ary na dia manatitra fanatitra dorana sy fanatitra hohanina aza izy, dia tsy hankasitraka azy Aho, fa haripako amin''ny sabatra sy ny mosary ary ny areti-mandringana izy.'
mg1865::mg_24::14::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Indrisy, Jehovah Tompo o! Indreo ny mpaminany manao aminy hoe: Tsy hiharan''ny sabatra ianareo, ary tsy ho mosarena; Fa homeko fiadanana maharitra eto amin''ity tany ity ianareo.'
mg1865::mg_24::14::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Ireo mpaminany ireo dia maminany lainga amin''ny anarako; Tsy naniraka azy Aho, na nandidy azy, na niteny taminy; Fa fahitana mandainga sy faminaniana tsy marina ary tsinotsinona sy fitaky ny fony no aminaniany aminareo.'
mg1865::mg_24::14::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah ny amin''ireo mpaminany izay maminany amin''ny Anarako ireo nefa tsy nirahiko tsinona ka milaza fa tsy hisy sabatra sy mosary eto amin''ity tany ity: Ny sabatra sy ny mosary indrindra no handringanana ireo mpaminany ireo.'
mg1865::mg_24::14::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenena izay aminanian''ireo koa dia hiely faty eny an-dalamben''i Jerosalema noho ny mosary sy ny sabatra, ka tsy hisy mpandevina ireny, na ny tenany, na ny vadiny, na ny zananilahy, na ny zananivavy, fa haidiko ao aminy ny faharatsiany.'
mg1865::mg_24::14::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminy izao teny izao: Ny ranomasoko hijononoka andro aman''alina ka tsy hitsahatra; Fa ny oloko, zanakavavy virijina, naratra mafy dia mafy tamin''ny kapoka maharary indrindra.'
mg1865::mg_24::14::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoaka any an-tsaha aho, dia indreny ny matin-tsabatra! Ary raha miditra ao an-tanàna kosa aho, dia indreo ny anan''ny mosary! Eny, ny mpaminany sy ny mpisorona dia mirenireny mankamin''ny tany tsy fantany*. [*Na: ka tsy mahalala]'
mg1865::mg_24::14::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa narianao tokoa va Joda? Efa naharikoriko ny fanahinao va Ziona? Nahoana no dia mamely anay Ianao, ka efa tsy mety sitrana izahay? Nanantena fiadanana izahay, kanjo tsy nahita asa, ary andro fanasitranana*, fa indro fampitahorana. [*Na: fahafinaretana]'
mg1865::mg_24::14::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tsaroanay ny faharatsianay sy ny heloky ny razanay; Fa efa nanota taminao izahay.'
mg1865::mg_24::14::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny amin''ny anaranao dia aza arianao izahay; Aza atao ho tsinontsinona ny seza fiandrianan''ny voninahitrao; Tsarovy, ka aza tsoahanao ny fanekenao taminay.'
mg1865::mg_24::14::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba misy mahalatsaka ranonorana va ireny sampin*''ny jentilisa ireny? Na mahay mandatsaka ranonorana mivatravatra va ny lanitra? Fa tsy Ianao ihany va no Izy, ry Jehovah Andriamanitray o? Koa manantena Anao izahay, satria Ianao no nanao ireo zavatra rehetra ireo. [*Hebreo: zava-poanan'']'
mg1865::mg_24::15::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Na dia Mosesy sy Samoela aza no mitsangana eto anatrehako, dia tsy hankasitraka ity firenena ity ny fanahiko; roahy tsy ho eo anatrehako izy, eny, aoka hiala izy.'
mg1865::mg_24::15::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tàhiny izy manao aminao hoe: Hiala hankaiza izahay? dia ataovy aminy hoe: Izao no lazain''i Jehovah: Izay ho amin''ny areti-mandringana* dia ho amin''ny areti-mandringana, ary izay ho amin''ny sabatra dia ho amin''ny sabatra, ary izay ho amin''ny mosary dia ho amin''ny mosary, ary izay ho amin''ny fahababoana dia ho amin''ny fahababoana. [*Hebreo: fahafatesana]'
mg1865::mg_24::15::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manendry zavatra efatra karazana Aho hamelezana azy, hoy Jehovah: Dia ny sabatra hamono sy ny amboa hamiravira ary ny voro-manidina sy ny bibi-dia hihinana sy handany;'
mg1865::mg_24::15::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manolotra azy ho mpanjenjena any amin''ny fanjakana rehetra* amin''ny tany Aho noho ny amin''i Manase, zanak''i Hezekia, mpanjakan''ny Joda, dia noho izay nataony tany Jerosalema. [*Na: ho fampangovitana ny fanjakana rehetra]'
mg1865::mg_24::15::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no hangoraka anao, ry Jerosalema? Ary iza no hitsapa alahelo anao? Ary iza no hivily hanantsafa anao?'
mg1865::mg_24::15::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao efa nahafoy Ahy sady efa nihemotra, hoy Jehovah, ka dia ahinjitro kosa ny tanako hamely anao, ka efa mandringana anao Aho, fa efa sasatra ny mandefitra*. [*Hebreo: manenina]'
mg1865::mg_24::15::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary kororohiko amin''ny fikororohana izy ho any amin''ny vava-tany; Ary foanako anaka ny oloko, eny, aringako izy tsy mety miala amin''ny fanaony mba hiverina izy.'
mg1865::mg_24::15::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpitondratenany mihamaro eo imasoko mihoatra noho ny fasika any an-dranomasina; Mitondra mpandringana ho ao aminy Aho handripaka ny renin''ny zatovo, na dia mitataovovonana aza ny andro; Ataoko tonga tampoka aminy ny fanaintainana sy ny tahotra.'
mg1865::mg_24::15::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay niteraka fito dia mihaosa, miala aina izy, milentika mbola antoandro ny masoandrony, menarina sy mangaihay izy; Ary izay sisa aminy dia hatolotro ho voan''ny sabatra eo anoloan''ny fahavalony, hoy Jehovah.'
mg1865::mg_24::15::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Fitarainan''i Jeremia tamin''Andriamanitra, sy ny teny fampiononana navaliny azy'
  verse_text: 'Lozako, ry neny, ny niterahanao ahy, Izay lehilahy ilana ady sy fifandirana eny amin''ny tany rehetra! Tsy nampanàna vola aho, ary tsy nisy nanàna vola tamiko, nefa ozonin''ny olona rehetra ihany aho.'
mg1865::mg_24::15::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah: Nahafaka anao Aho hahasoa anao*; Hataoko tonga mifona aminao tokoa ny fahavalo amin''ny andro ahitan-doza sy amin''izay andro mahory. [*Na: ny hahasoa anao ihany no nisehoako ho fahavalonao]'
mg1865::mg_24::15::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mety tapaka va ny vy, dia ny vy avy any avaratra, na ny varahina?'
mg1865::mg_24::15::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanananao sy ny rakitrao ao anatin''ny faritaninao rehetra dia hatolotro ho babo maimaimpoana noho ny fahotana rehetra izay nataonao;'
mg1865::mg_24::15::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampitondraiko ny fahavalonao ho any amin''ny tany tsy fantatrao izany; Fa arehitra ny afon''ny fahatezerako*, ka handoro anareo no irehetany. [*Hebreo: Fa misy afo arehitra amin''ny fahatezerako]'
mg1865::mg_24::15::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no mahalala, Jehovah o; Tsarovy aho, ka vangio, ary valio izay manenjika ahy; Aza dia mandefitra aminy Ianao, fandrao ho afaka ny aiko; Aoka ho fantatrao fa noho ny aminao no nitondrako latsa.'
mg1865::mg_24::15::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitako ny teninao ka nohaniko, ary ny teninao no fifaliako sy firavoravoan''ny foko; Fa nantsoina tamin''ny anaranao aho, Jehovah, Andriamanitry ny maro o.'
mg1865::mg_24::15::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho tsy nipetraka na nifaly teo amin''ny fivorian''ny mpikorana, nitoetra irery aho noho ny fihazonan''ny tananao ahy, fa nofenoinao fahatezerana aho.'
mg1865::mg_24::15::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana re no dia tsy mety mitsahatra ny faharariako, ary fatratra ny feriko ka tsy mety sitrana? Ho tonga amiko tahaka ny rano-trambo va Ianao, dia rano tsy azo itokiana?'
mg1865::mg_24::15::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Raha hiverina ianao, dia horaisiko indray*, ka dia hitsangana eo anatrehako ianao; Ary raha manavaka ny zava-tsoa hiala amin''ny zava-poana ianao, dia ho solom-bavako; Hanatona anao indray ireny; Fa tsy ianao no hanatona azy, [*Hebreo: hampivereniko]'
mg1865::mg_24::15::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko manda varahina mirova ho amin''ity firenena ity ianao: Hiady aminao izy, nefa tsy hahaleo anao; Fa momba anao hamonjy sy hanafaka anao Aho, hoy Jehovah;'
mg1865::mg_24::15::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanafaka anao amin''ny tanan''ny ity ratsy fanahy Aho sy hanavotra anao amin''ny tanan''ny mpampahory.'
mg1865::mg_24::16::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nasain''Andriamanitra nataon''i Jeremia ny amin''ny loza hampijaliana ny Joda'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah hoe:'
mg1865::mg_24::16::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manam-bady ianao, ary aoka tsy hanan-janakalahy na zanakavavy amin''ity tany ity.'
mg1865::mg_24::16::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah ny amin''ny zanakalahy sy ny zanakavavy izay teraka amin''ity tany ity sy ny amin''ny reniny izay niteraka azy ary ny amin''ny rainy izay niteraka azy amin''ity tany ity koa:'
mg1865::mg_24::16::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho fatin''ny loza samy hafa izy, nefa tsy hisaonana na halevina, fa ho zezika eny ambonin''ny tany; ary ho lanin-tsabatra sy mosary izy, ka ho fihinan''ny voro-manidina sy ny bibi-dia ny fatiny.'
mg1865::mg_24::16::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Aza miditra amin''ny trano misy fisaonana, ary aza misaona na mitsapa alahelo azy; Fa efa hesoriko tsy ho amin''ity firenena ity ny fiadanako, hoy Jehovah, dia ny famindram-po sy ny fiantrana.'
mg1865::mg_24::16::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho faty na ny lehibe na ny kely amin''ity tany ity; Samy tsy halevina na hisaonana izy, na hitetehan''ny sasany tena, na hiboriany;'
mg1865::mg_24::16::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hisy hamahan-kanina azy amin''ny fisaonany, mba hampionona azy ny amin''ny maty; Ary tsy hisy hampisotro azy amin''ny kapoaka fampiononana, raha maty ny rainy na ny reniny;'
mg1865::mg_24::16::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza miditra ao amin''ny trano misy fanasana koa ianao, hiara-mitoetra aminy hihinana sy hisotro.'
mg1865::mg_24::16::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hatsahatro amin''ity tany ity eo imasonareo sy amin''ny andronareo ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina.'
mg1865::mg_24::16::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ambaranao amin''ity firenena ity izany teny rehetra izany, ka hoy izy aminao: Nahoana Jehovah no nilaza izany loza mafy rehetra izany hamelezana anay? Fa inona no helokay, ary inona no fahotanay, izay nanotanay tamin''i Jehovah Andriamanitray?'
mg1865::mg_24::16::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia lazao aminy hoe: Noho ny nahafoizan''ny razanareo Ahy, hoy Jehovah, sy ny nanarahany andriamani-kafa sy ny nanompoany azy sy ny niankohofany teo anatrehany ary ny nahafoizany Ahy sy ny tsy nitandremany ny lalàko.'
mg1865::mg_24::16::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenanareo koa nanao ratsy mihoatra noho ny razanareo; Fa he! ianareo samy mandeha araka ny ditry ny fo ratsinareo avokoa ka tsy mihaino Ahy;'
mg1865::mg_24::16::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia horoahiko hiala amin''ity tany ity ianareo ho any amin''ny tany tsy fantatrareo na ny razanareo; Any no hanompoanareo andriamani-kafa andro aman''alina, satria tsy hamindra fo aminareo Aho.'
mg1865::mg_24::16::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy any andro, hoy Jehovah, izay tsy hanaovana intsony hoe: Raha velona koa Jehovah, Izay nitondra ny Zanak''Isiraely niakatra avy tany amin''ny tany Egypta;'
mg1865::mg_24::16::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao kosa: Raha velona koa Jehovah, Izay nitondra ny Zanak''Isiraely niakatra avy tany amin''ny tany avaratra sy avy tany amin''ny tany rehetra izay nandroahany azy; Fa hampodiko ho amin''ny tany izay nomeko ny razany izy.'
mg1865::mg_24::16::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho haniraka mpamono maro, hoy Jehovah, Izay hamono azy; Ary rehefa afaka izany, dia haniraka mpihaza maro Aho, Izay hihaza azy any amin''ny tendrombohitra sy ny havoana rehetra ary any an-tsefatsefaky ny harambato.'
mg1865::mg_24::16::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny masoko dia mijery ny alehany rehetra, ka tsy miafina amin''ny tavako izany, ary tsy takona amin''ny masoko ny helony.'
mg1865::mg_24::16::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alohan''izany anefa dia hovaliako avy sasaka ny helony sy ny fahotany noho ny nandotoany ny taniko, dia ny namenoany ny lovako tamin''ireo fatin''ny sampiny* sy fahavetavetany ireo. [*Hebreo: fahavetavetany]'
mg1865::mg_24::16::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, ry heriko sy fiarovana mafy ho ahy ary fandosirako amin''ny andro fahoriana o! Ho tonga aminao ny jentilisa avy any amin''ny faran''ny tany dia hanao hoe: Eny, tokoa lainga no nolovan''ny razanay, dia zava-poana sady tsy misy mahasoa.'
mg1865::mg_24::16::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mahay manao andriamanitra ho azy va ny olona? Tsy Andriamanitra ireny.'
mg1865::mg_24::16::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, hampahafantariko azy amin''izao indray mandeha izao, eny, hampahafantariko azy ny tanako sy ny heriko, ka dia ho fantany fa Jehovah no anarako.'
mg1865::mg_24::17::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahotan''ny Joda dia voasoratra tamin''ny vy fanoratana sy tamin''ny diamondra fanoratana; voasoratra ao am-pony tahaka ny amin''ny vato fisaka sy eo amin''ny tandroky ny alitarany* izany, [*Hebreo: alitaranareo]'
mg1865::mg_24::17::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia amin''izay hahatsiarovan''ny zanany ny alitarany sy ny Aserahany*, akaikin''ny hazo maitso, ambonin''ny havoana andrandraina. [*Anaran''andriamani-tsy izy, na ny sariny]'
mg1865::mg_24::17::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry tendrombohitro any an-tsaha, ny fanananao sy ny rakitrao rehetra dia hatolotro ho babo, eny, na dia ny fitoerana avonao koa aza noho ny fahotana tao anatin''ny faritaninao rehetra.'
mg1865::mg_24::17::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy amin''ny tenanao ihany no mahatonga ny hamoizanao ny lovanao izay nomeko anao; Ary hampanompoiko ny fahavalonao any amin''ny tany izay tsy fantatrao ianao; Fa narehitrareo ny afon''ny fahatezerako*, izay hirehitra mandrakizay. [*Hebreo: fa misy afo narehitrareo tamin''ny fahatezerako]'
mg1865::mg_24::17::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny amin''ny fahatokiana olona sy ny fahatokiana an''Andriamanitra, ary ny vavaka nataon''i Jeremia nangatahany famonjena'
  verse_text: 'Izao no lazain''i Jehovah: ho voaozona izay olona matoky olona sy manao ny nofo ho sandriny, ka miala amin''i Jehovah ny fony.'
mg1865::mg_24::17::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho tahaka ny olona mahantra any* an-tani-hay izy ka tsy mba hahita, na dia avy aza ny soa; Fa honina any amin''ny tany karankaina any an''efitra, dia any amin''ny tany sira izay tsy onenana. [*Na: ny anjavidy]'
mg1865::mg_24::17::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina izay olona matoky an''i Jehovah, dia izay manana an''i Jehovah ho tokiny.'
mg1865::mg_24::17::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho toy ny hazo ambolena eo amoron-drano izy, izay mamaka eo anilan''ny rano mandeha, ka tsy hatahotra, na dia avy aza ny hainandro, sady ho maitso ny raviny, ka tsy hanahy izy, na dia mihantona aza ny andro, fa tsy hitsahatra ny famoany.'
mg1865::mg_24::17::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fo dia mamitaka mihoatra noho ny zavatra rehetra sady manana aretina tsy azo sitranina; Iza moa no mahafantatra ny aminy?'
mg1865::mg_24::17::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Jehovah no Mpandinika ny fo sy Mpamantatra ny voa, mba hanome ny olona rehetra araka ny alehany avy, dia araka ny vokatry ny asany'
mg1865::mg_24::17::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tsipoy mikotrika izay tsy atodiny, dia toy izany izay mahazo harena tsy amin''ny rariny: Handao azy amin''ny an-tenatenan''androny izany*, ka ho adala no farany. [*Na: Hilaozan''izany eo an-tenatenan''androny izy]'
mg1865::mg_24::17::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Seza fiandrianana be voninahitra sady avo hatramin''ny voalohany ny fitoera-masintsika.'
mg1865::mg_24::17::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jehovah, Fanantenan''ny Isiraely o! Ho menatra izay rehetra mahafoy Anao, ary hosoratana amin''ny vovoka izay miala aminao*, satria izy efa nahafoy an''i Jehovah, loharano velona. [*Hebreo: amiko]'
mg1865::mg_24::17::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, sitrano aho, dia ho sitrana; Vonjeo aho, dia ho voavonjy; Fa Ianao no fiderako.'
mg1865::mg_24::17::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ireo dia manao amiko hoe: Aiza ny tenin''i Jehovah? Aoka ho tanteraka izany.'
mg1865::mg_24::17::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho tsy nihifikifika niala tsy ho mpiandry manaraka Anao; Ary ny andro hihavian''ny loza dia tsy nohaikaiko, eny, fantatrao izany; Izay efa nivoaka tamin''ny molotro dia miharihary eo anatrehanao.'
mg1865::mg_24::17::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka tsy ho fampitahorana ahy Ianao! Aroko amin''ny andro fahoriana Ianao!'
mg1865::mg_24::17::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra izay manenjika ahy, fa izaho kosa aoka tsy mba ho menatra; Aoka hivadi-po ireo, fa izaho kosa aoka tsy mba hivadi-po; Ataovy tonga aminy ny andro fahoriana, ary ny fahatorotoroana roa heny no anorotoroy azy.'
mg1865::mg_24::17::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny amin''ny hanamasinana ny Sabata'
  verse_text: 'Izao no nolazain''i Jehovah tamiko: Mandehana ka mitsangàna eo amin''ny vavahadim-bahoaka, dia ilay fandehanan''ny mpanjakan''ny Joda miditra sy mivoaka, ary eo amin''ny vavahady rehetra eto Jerosalema'
mg1865::mg_24::17::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka lazao amin''ny olona hoe: Henoinareo ny tenin''i Jehovah ry mpanjakan''ny Joda sy ry Joda rehetra ary ianareo mponina rehetra eto Jerosalema, izay miditra amin''ireto vavahady ireto.'
mg1865::mg_24::17::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Tandremo ny fanahinareo, ka aza mitondrantana amin''ny andro Sabata, ary aza mampiditra entana: amin''ny vavahadin''i Jerosalema;'
mg1865::mg_24::17::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza mitondra entana mivoaka avy amin''ny tranonareo amin''ny andro Sabata, na manao raharaha akory; fa hamasino ny andro Sabata araka izay efa nandidiako ny razanareo.'
mg1865::mg_24::17::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nihevitra izy, na nanongilana ny sofiny, fa nanamafy ny hatony mba tsy hihaino na hino anatra.'
mg1865::mg_24::17::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mihaino Ahy tokoa ianareo hoy Jehovah, ka tsy mampiditra entana amin''ny vavahadin''ity tanàna ity amin''ny andro Sabata, ka tsy manao raharaha amin''izany,'
mg1865::mg_24::17::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay mpanjaka sy mpanapaka mipetraka eo amin''ny seza fiandrianan''i Davida dia hiditra amin''ny vavahadin''ity tanàna ity mitaingina kalesy sy soavaly, dia izy sy ny mpanapaka sy ny Joda ary ny mponina eto Jerosalema, ka honenana mandrakizay ity tanàna ity.'
mg1865::mg_24::17::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho avy ny olona avy amin''ny tanànan''ny Joda sy ny manodidina an''i Jerosalema sy ny tanin''ny Benjamina sy ny tany lemaka amoron-tsiraka* sy ny tany havoana ary ny tany atsimo ka hitondra fanatitra dorana sy fanatitra hafa alatsa-drà ary fanatitra hohanina sy ditin-kazo mani-pofona ary hitondra fanati-pisaorana ho ao an-tranon''i Jehovah. [*Hebreo: Sefela]'
mg1865::mg_24::17::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mihaino Ahy kosa ianareo ka tsy manamasina ny andro Sabata, fa mitondra entana miditra amin''ny vavahadin''i Jerosalema ihany amin''ny andro Sabata, dia handrehitra afo tsy mety maty eo am-bavahadiny Aho handevonana ny tranobe eto Jerosalema.'
mg1865::mg_24::18::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana ny amin''ny tanimanga sy ny mpanefy, ary ny anatra manaraka izany'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah:'
mg1865::mg_24::18::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, ka midina ho any amin''ny tranon''ny mpanefy tanimanga, ary any no hampandrenesako anao ny teniko.'
mg1865::mg_24::18::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina tany amin''ny tranon''ny mpanefy tanimanga aho, ary, indro, nanao ny asany teo amin''ny ankodina fanaovana izy.'
mg1865::mg_24::18::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha simba ny vilany ataony araka izay mazàna miseho amin''ny tanimanga eny an-tanan''ny mpanefy dia ataony vilany hafa indray, araka izay tian''ny mpanefy tanimanga hanaovana azy.'
mg1865::mg_24::18::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah hoe :'
mg1865::mg_24::18::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy mahazo manao aminareo toy ny ataon''ity mpanefy tanimanga ity va Aho, ry taranak''i Isiraely? hoy Jehovah. Indro, toy ny tanimanga eo an-tanan''ny mpanefy azy, dia toy izany ianareo eo an-tanako, ry taranak''Isiraely.'
mg1865::mg_24::18::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vetivety* Aho dia milaza firenena sy fanjakana hongotako sy hazerako ary horavako; [*Hebreo: indray mipi-maso]'
mg1865::mg_24::18::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha miala amin''ny ratsy izany firenena noteneniko izany, dia hanenenako kosa ny loza izay nokasaiko hamelezako azy.'
mg1865::mg_24::18::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vetivety kosa Aho dia milaza firenena sy fanjakana haoriko sy hamboleko;'
mg1865::mg_24::18::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko, dia hanenenako kosa ny soa izay nolazaiko hanasoavako azy.'
mg1865::mg_24::18::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, lazao amin''ny Joda sy amin''ny mponina eto Jerosalema hoe: Izao no lazain''i Jehovah: Indro, Izaho mamorona loza hihatra aminareo ary mihevitra izay hamelezako anareo; Koa samia miala amin''ny lalany ratsy avy ianareo, ary ataovy tsara ny lalanareo sy ny ataonareo.'
mg1865::mg_24::18::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy ireo: Kivy izahay izany! Fa mbola hanaraka ny hevitray ihany izahay, eny, samy hanao araka ny ditry ny fo ratsinay avy izahay rehetra.'
mg1865::mg_24::18::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: anontanio any amin''ny jentilisa hoe: Iza no nandre zavatra toy izany? Zavatra mahatsiravina indrindra no nataon''Isiraely virijina.'
mg1865::mg_24::18::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsahatra tsy ho eo amin''ny vatolampy any an-tsaha va ny oram-panalan''i Libanona, ary mety ho ritra va ny rano maria sady mangatsiaka avy amin''ny tany hafa?'
mg1865::mg_24::18::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nanadino Ahy ny oloko, ka ho an''ny sampy* no nandoroany ditin-kazo manitra; Ary nanafintohina azy teo amin''ny lalany ireny; dia ny lalana fahagola, handehanany amin''ny sakeli-dalana madinika, dia amin''ny lalana tsy voavoatra, [*Hebreo: zava-poana]'
mg1865::mg_24::18::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hahatonga ny taniny ho figagana sy ho zavatra mampisitrisitra mandrakizay; Izay rehetra mandalo azy dia ho gaga sy hihifikifi-doha.'
mg1865::mg_24::18::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny fampielin''ny rivotra avy any atsinanana no hampielezako azy eo anoloan''ny fahavalony; Hiamboho azy Aho, fa tsy hanatrika azy, amin''ny andro hahitany loza.'
mg1865::mg_24::18::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nitadiavan''ny olona hamely an''i Jeremia, sy ny vavaka nataon''i Jeremia tamin''izany'
  verse_text: 'Dia hoy ny olona: Andeha isika hihevitra izay hamelezana an''i Jeremia; fa tsy ho tapaka tsy akory ny lalàna avy amin''ny mpisorona, na ny saina avy amin''ny hendry, na ny teny avy amin''ny mpaminany. Aoka ny vavantsika* ho enti-mamely azy, ary aoka tsy hohenointsika akory izay teniny. [*Hebreo: lelantsika]'
mg1865::mg_24::18::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ahy, Jehovah o; Ary mihainoa ny tenin''izay miady amiko'
mg1865::mg_24::18::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ratsy va no havaly ny soa? Fa efa nihady lavaka hamandrihana ahy ireo. Tsarovy ny nitsanganako teo anatrehanao nitaraina ho azy hampiala ny fahatezeranao aminy.'
mg1865::mg_24::18::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho mosarena ny zanany, ary atolory ho amin''ny herin''ny sabatra izy, ka ho foana anaka ny vadiny sady ho tonga mpitondratena; Ary aoka ny lehilahy lehibe aminy haripaky ny aretina, ary ny zatovony ho fatin-tsabatra amin''ny ady.'
mg1865::mg_24::18::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisy fidradradradrana ho re ao an-tranony, raha mitondra miaramila iray toko any aminy tampoka Ianao; Fa efa nihady lavaka hamandrihana ahy izy sady nanafim-pandrika haningorana ny tongotro.'
mg1865::mg_24::18::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah o, no mahalala ny fisainana rehetra ataony hamelezany ahy ho faty; Aza avela ny helony; Ary aza vonoina tsy ho eo imasonao ny fahotany, fa aoka ho solafaka eo anatrehanao izy; Mameleza azy amin''ny andro fahatezeranao.'
mg1865::mg_24::19::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana ny amin''ny tavoara vaky'
  verse_text: 'Izao no lazain''i Jehovah: Andeha mividy tavoara tanimanga, ary makà anti-panahy amin''ny vahoaka sy anti-panahy amin''ny mpisorona,'
mg1865::mg_24::19::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mivoaha ho any amin''ny Lohasahan''ny taranak''i Hinoma, izay eo anoloan''ny vavahady Harsota*, ary torio eo ny teny izay holazaiko aminao, [*Harsota = tavim-bilany(?)]'
mg1865::mg_24::19::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Mihainoa ny tenin''i Jehovah, ry mpanjakan''ny Joda sy ry mponina ato Jerosalema! Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hahatonga loza amin''ity tanàna ity Aho izay mandre izany, dia hangintsingintsina ny sofiny'
mg1865::mg_24::19::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria efa nahafoy Ahy izy ka nahatonga ity tanàna ity ho hafahafa, fa nandoro ditin-kazo manitra tato ho an''andriamani-kafa, izay tsy fantany, na fantatry ny razany, na ny mpanjakan''ny Joda, sady efa nameno ran''ny marina ity tanàna ity'
mg1865::mg_24::19::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanorina ny fitoerana avo ho an''i Bala handoroany ny zanany ho fanatitra dorana ho an''i Bala, izay tsy nandidiako, na nolazaiko, na tao an-tsaiko akory aza.'
mg1865::mg_24::19::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy ny andro, hoy Jehovah, izay tsy hanaovana ity fitoerana ity intsony hoe Tofeta, na Lohasahan''ny taranak''i Hinoma, fa Lohasaha Famonoana kosa.'
mg1865::mg_24::19::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofoanako* amin''ity tanàna ity ny fisainan''ny Joda sy Jerosalema, ka hataoko lavon-tsabatra eo anoloan''ny fahavalony sy amin''ny tanan''izay mitady ny ainy izy; ary ny fatiny dia homeko ho fihinan''ny voro-manidina sy ny bibi-dia. [*Hebreo: hararako]'
mg1865::mg_24::19::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ity tanàna ity dia hataoko ho figagana sy ho zavatra mampisitrisitra, ka izay rehetra mandalo azy dia ho gaga sady hisitrisitra noho ny loza rehetra efa namelezana azy.'
mg1865::mg_24::19::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampihinaniko ny nofon''ny zananilahy sy ny nofon''ny zananivavy izy, ary samy hihinana ny nofon''ny namany avy izy eo amin''ny fahirano sy ny fahaterena, izay haneren''ny fahavalony sy izay mitady ny ainy azy.'
mg1865::mg_24::19::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia torotoroy eo imason''ny olona izay miaraka aminao ilay tavoara,'
mg1865::mg_24::19::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Toy izao no hanorotoroako ity firenena sy ity tanàna ity, dia toy ny famakin''ny mpanefy tanimanga ny vilany tany, ka tsy azo atambatra intsony; ary any Tofeta aza no handevenany noho ny tsy fisian-tany hafa handevenana.'
mg1865::mg_24::19::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany no hataoko amin''ity tanàna ity sy amin''izay mponina ato, ka dia hatao tahaka an''i Tofeta ity tanàna ity, hoy Jehovah.'
mg1865::mg_24::19::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tranon''i Jerosalema sy ny tranon''ny mpanjakan''ny Joda dia ho tonga maloto tahaka an''i Tofeta, dia ny trano rehetra izay nandoroany ditin-kazo manitra teo an-tampony ho an''izay rehetra eny amin''ny lanitra sy nanidinany fanatitra aidina ho an''izay andriamani-kafa.'
mg1865::mg_24::19::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny faminanian''i Jeremia ny loza, sy ny nanoheran''i Pasora azy'
  verse_text: 'Ary Jeremia dia tonga avy tany Tofeta, izay nanirahan''i Jehovah azy haminany, ka nitsangana teo amin''ny kianjan''ny tranon''i Jehovah izy, dia nanao tamin''ny vahoaka rehetra hoe:'
mg1865::mg_24::19::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hataoko mihatra amin''ity tanàna ity sy amin''ny zana-bohiny rehetra ny loza rehetra izay nolazaiko hatao aminy noho ny nanamafiany ny hatony tsy hihainoany ny teniko.'
mg1865::mg_24::20::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pasora, zanak''i Imera, mpisorona sady mpiandraikitra ny tranon''i Jehovah, raha nandre an''i Jeremia naminany izany zavatra izany,'
mg1865::mg_24::20::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia namely an''i Jeremia mpaminany sady namatotra azy tamin''ny boloky hazo izay teo am-bavahadin''i Benjamina, dia ilay eo ambony, eo anilan''ny tranon''i Jehovah.'
mg1865::mg_24::20::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso, dia nesorin''i Pasora tamin''ny boloky hazo Jeremia. Dia hoy Jeremia taminy: Tsy nataon''i Jehovah hoe Pasora* ny anaranao, fa Magora-misabiba**. [*Pasora = fiadanana manodidina(?)] [**Magora-misabiba = Fampangorohoroana manodidina]'
mg1865::mg_24::20::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Indro, hataoko fampangorohoroana ho an''ny tenanao sy ny sakaizanao rehetra ianao, ary ho lavon''ny sabatry ny fahavalony ireo, dia ho hitan''ny masonao izany; ary ny Joda rehetra hatolotro eo an-tanan''ny mpanjakan''i Babylona, dia ho entiny ho babo any Babylona izy ka hovonoiny amin''ny sabatra.'
mg1865::mg_24::20::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny harena rehetra amin''ity tanàna ity sy ny vokatry ny fisasarany rehetra sy ny zava-tsoany rehetra ary ny rakitry ny mpanjakan''ny Joda rehetra dia samy hatolotro eo an-tanan''ny fahavalony, ka dia hamabo sy haka azy ireny ary hitondra azy ho any Babylona.'
mg1865::mg_24::20::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao dia ho lasan-ko babo; ary ho tonga any Babylona ianao, ka any no hahafatesanao, ary any koa no handevenana anao mbamin''ny sakaizanao rehetra izay efa naminanianao lainga.'
mg1865::mg_24::20::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny fitarainana nataon''i Jeremia'
  verse_text: 'Jehovah o, notaominao aho ka voataona; Nosamborinao aho ka resinao; Tonga fihomehezana mandritra ny andro aho; Izy rehetra dia maneso ahy.'
mg1865::mg_24::20::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na oviana na oviana no itenenako, dia tsy maintsy mitaraina aho, eny, miantso aho hoe: Loza sy fandravana! Fa ny tenin''i Jehovah dia atao fanakorana sy fihomehezana ahy isan''andro.'
mg1865::mg_24::20::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Tsy hanonona Azy aho na hiteny intsony amin''ny anarany. Nefa izany dia tonga toy ny afo mirehitra ato am-poko, voahidy ato amin''ny taolako; Ary sasatra ny niaritra aho ka tsy mahazaka.'
mg1865::mg_24::20::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa reko ny endrikendriky ny maro, misy fampangorohoroana manodidina. Torio, eny, hotorintsika koa izy; Izay rehetra tsara fihavanana amiko dia miandry izay hahalavoako ka manao hoe: Angamba ho voataona Izy, dia horesentsika sy hovaliantsika.'
mg1865::mg_24::20::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Jehovah momba ahy toy ny lehilahy mahery mahatahotra, ary noho izany dia ho tafintohina ny mpanenjika ahy ka tsy haharesy; Ho menatra indrindra izy, satria tsy hendry*. Fahamenarana mandrakizay izay tsy hohadinoina izany! [*Na: tsy ambinina]'
mg1865::mg_24::20::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah, Tompon''ny maro o, Izay mamantatra ny marina ka mizaha toetra ny voa sy ny fo ho hitako ny famalianao azy, fa aminao no efa nanankinako ny adiko.'
mg1865::mg_24::20::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihirà ho an''i Jehovah, miderà an''i Jehovah; Fa Izy namonjy ny fanahin''ny malahelo tamin''ny tanan''ny mpanao ratsy.'
mg1865::mg_24::20::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho voaozona anie ny andro izay nahaterahako! Aoka tsy hotahina anie ny andro izay niterahan''ineny ahy!'
mg1865::mg_24::20::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin''ikaky nanao hoe: Tera-dahy ianao! Ka nahafaly azy indrindra.'
mg1865::mg_24::20::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka Izany lehilahy izany ho toy ny tanàna izay noravan''i Jehovah ka tsy nanenenany; Ary aoka izy handre fitarainana nony maraina sy akoralava nony mitataovovonana,'
mg1865::mg_24::20::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy nahafaty ahy tany an-kibo izy, hahatonga an''Ineny ho fasako, ka hivesatra ahy mandrakariva ny kibony.'
mg1865::mg_24::20::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana re aho no nivoaka avy tany an-kibo mba hahita fahoriana sy alahelo, ka ho lany aman-kenatra ny androko!'
mg1865::mg_24::21::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hahafahan''ny Kaldeana an''i Jerosalema'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah, fony Zedekia mpanjaka naniraka an''i Pasora, zanak''i Malkia, sy Zefania, zanak''i Mahasela mpisorona, hankany aminy hanao hoe:'
mg1865::mg_24::21::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, manontania amin''i Jehovah ho anay; miady aminay Nebokadnezara, mpanjakan''i Babylona, angamba Jehovah hanao aminay araka ny asany mahagaga rehetra, mba hialan''ireo aminay.'
mg1865::mg_24::21::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jeremia taminy: Lazaonareo amin''i Zedekia hoe:'
mg1865::mg_24::21::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Indro, haveriko ny fiadiana eny an-tananareo, izay entinareo miady eny ivelan''ny manda amin''ny mpanjakan''i Babylona sy amin''ny Kaldeana, izay manao fahirano anareo, ka hangoniko eto afovoan''ity tanàna ity ireo.'
mg1865::mg_24::21::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho no hiady aminareo amin''ny tanana ahinjitra sy amin''ny sandry mahery ary amin''ny fahavinirana sy ny fisafoahana ary ny fahatezerana mirehitra.'
mg1865::mg_24::21::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamely ny mponina amin''ity tanàna ity Aho, na olona, na biby: ho fatin''ny aretim-be mandringana izy.'
mg1865::mg_24::21::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, hoy Jehovah, Zedekia, mpanjakan''ny Joda, sy ny mpanompony sy ny vahoaka ary izay sisa tsy matin''ny areti-mandringana sy ny sabatra sy ny mosary amin''ity tanàna ity dia hatolotro eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, sy eo an-tanan''ny fahavalony sy eo an-tanan''izay mitady ny ainy; dia hamely azy amin''ny lelan-tsabatra ireo, fa tsy hitsitsy na hiantra azy, na hamindra fo aminy.'
mg1865::mg_24::21::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ity firenena ity dia hilazanao hoe: Izao no lazain''i Jehovah: Indro, ataoko eo anoloanareo ny lalan''ny fiainana sy ny lalan''ny fahafatesana:'
mg1865::mg_24::21::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mbola mitoetra eto amin''ity tanàna ity ihany dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana izay manao fahirano anareo kosa dia ho velona, ka ny ainy no ho babony.'
mg1865::mg_24::21::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa manandrina ity tanàna ity Aho hahatonga loza aminy, fa tsy soa, hoy Jehovah; hatolotro eo an-tanan''ny mpanjakan''i Babylona ity ka hodoroany amin''ny afo.'
mg1865::mg_24::21::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary henoy ny tenin''i Jehovah ny amin''ny taranaky ny mpanjakan''ny Joda sy ny mpianakaviny.'
mg1865::mg_24::21::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry taranak''i Davida, izao no lazain''i Jehovah: Mitsarà isa-maraina, afaho amin''ny tanan''ny mpampahory ny alona norobaina, fandrao mivoaka toy ny afo ny fahatezerako ary mirehitra ka tsy hisy hamono noho ny faharatsian''ny ataonareo.'
mg1865::mg_24::21::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hohatoniko ianao, ry mponina an-dohasaha, dia eo amin''ny vatolampy amin''ny tany lemaka, hoy Jehovah, dia ianareo izay manao hoe: Iza moa no sahy hidina hamely anay? Ary iza no sahy hiditra ato amin''ny fonenanay?'
mg1865::mg_24::21::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hamaly anareo araka ny vokatry ny asanareo Aho, hoy Jehovah, ary handrehitra afo ao amin''ny alany, ka handevona ny manodidina azy rehetra izany.'
mg1865::mg_24::22::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra mafy noho ny faharatsian''ny mpanjakan''ny Joda'
  verse_text: 'Izao no lazain''i Jehovah: Midina any amin''ny tranon''ny mpanjakan''ny Joda, ka lazao any izao teny izao hoe:'
mg1865::mg_24::22::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy ny tenin''i Jehovah, ry mpanjakan''ny Joda, izay mipetraka amin''ny seza fiandrianan''i Davida, dia ianao sy ny mpanomponao ary ny vahoakanao izay miditra amin''ireto vavahady ireto:'
mg1865::mg_24::22::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Manaova fitsarana sy fahamarinana ianareo, ka afaho amin''ny tanan''ny mpampahory ny olona voaroba; ary aza mampahory na mampidi-doza amin''ny vahiny sy ny kamboty ary ny mpitondratena, ary aza mandatsaka rà marina amin''ity fitoerana ity.'
mg1865::mg_24::22::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mankatò izany teny izany tokoa ianareo, dia hisy mpanjaka mipetraka eo amin''ny seza fiandrianan''i Davida hiditra amin''ity vavahady ity mitaingin-kalesy sy soavaly, dia izy sy ny mpanompony ary ny vahoakany.'
mg1865::mg_24::22::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy hihaino izany teny izany kosa ianareo, dia ny tenako no ianianako, hoy Jehovah, fa ho lao tokoa ity trano ity.'
mg1865::mg_24::22::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah ny amin''ny mpanjakan''ny Joda sy ny mpianakaviny: Tahaka an''i Gileada sy ny tampon''i Libanona amiko ianao, nefa hataoko tonga efitra sy tanàna tsy onenana.'
mg1865::mg_24::22::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanendry* mpandrava hamely anao Aho, Izay samy hitondra ny fiadiany avy; Dia hokapain''ireo ny sederanao voafantina ka hariany ao anaty afo. [*heb. hanamasina]'
mg1865::mg_24::22::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary firenena maro no handalo ity tanàna ity, ka samy hanao amin''ny namany avy hoe: Nahoana Jehovah no dia nanao izao tamin''ity tanàna lehibe ity?'
mg1865::mg_24::22::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hovaliana hoe: Noho ny nahafoizany ny faneken''i Jehovah Andriamaniny sy ny nivavahany tamin''andriamani-kafa sy ny nanompoany ireny.'
mg1865::mg_24::22::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitomany ny maty ianareo, na misaona azy; Mitomania dia mitomania noho ilay efa lasan-ko babo; Fa tsy hiverina intsony izy, na hahita ny tany nahaterahany.'
mg1865::mg_24::22::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah ny amin''i Saloma, zanak''i Josia, mpanjakan''ny Joda, dia ilay nanjaka nandimby an''i Josia rainy, saingy efa niala tamin''ity tany ity: Tsy hiverina aty intsony izy,'
mg1865::mg_24::22::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho faty any amin''ny tany izay nitondrana azy ho babo ka tsy hahita ity tany ity intsony.'
mg1865::mg_24::22::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay manorina ny tranony amin''ny tsy rariny sy ny ati-tranony ambony amin''ny fitaka ka mampiasa maina ny namany, fa tsy mandoa ny karamany,'
mg1865::mg_24::22::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady manao hoe: Hanao trano lehibe ho ahy aho sy ati-trano ambony malalaka, ary holoahany hisy varavarankely sady hasiany valin-drihana sedera sy hohosorana loko mena.'
mg1865::mg_24::22::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa dia ho mpanjaka ianao, saingy ataonao be sedera noho ny an''ny sasany ny tranonao? Tsy efa nihinana sy nisotro va rainao sady nanao fitsarana sy fahamarinana? Tamin''izany dia nambinina izy.'
mg1865::mg_24::22::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitsara ny tenin''ny ory sy ny malahelo izy; Tamin''izany dia nambinina izy. Tsy izany va no fahalalana Ahy? hoy Jehovah.'
mg1865::mg_24::22::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy misy alehan''ny masonao sy ny eritreritrao afa-tsy ny filan-karena ihany sy ny fandatsahana rà marina ary ny fampahoriana sy ny fanaovana an-keriny.'
mg1865::mg_24::22::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia izao no lazain''i Jehovah ny amin''i Joiakima, zanak''i Josia, mpanjakan''ny Joda: Ny olona tsy hisaona azy hoe: Indrisy, tompokolahy! na: Indrisy, tompokovavy! Ny olona tsy hitomany azy hoe: Indrisy, tompoko! na: Indrisy ny voninahiny!'
mg1865::mg_24::22::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halevina toy ny fandevina boriky izy, ka hotaritarihina sy hariana any ivelan''ny vavahadin''i Jerosalema.'
mg1865::mg_24::22::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara any Libanona, ka mitaraina; Dia asandrato any Basana ny feonao, ary mitaraina any Abarima; Fa ringana avokoa ireo tia anao.'
mg1865::mg_24::22::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa niteny taminao Aho, fony ianao mbola nipetraka tsy nanana ahiahy; Nefa hoy ianao: Izaho tsy hihaino. Fanaonao hatry ny fony ianao mbola tanora ny tsy mihaino ny teniko.'
mg1865::mg_24::22::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpitondra* anao rehetra ho paohin''ny rivotra, ary ireo tia anao ho lasan-ko babo, eny, ho menatra sy hangaihay tokoa ianao noho ny haratsianao rehetra. [*Hebreo: mpiandry ondry]'
mg1865::mg_24::22::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry ilay mponina any Libanona, izay manao ny akaninao eny amin''ny sedera, indrisy ny fisentoanao*, raha iharan''ny faharariana ianao, toy ny fanaintainan''ny vehivavy raha miteraka! [*Na: fahantranao]'
mg1865::mg_24::22::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy Jehovah, na dia ho peratra fanombohan-kase amin''ny tanako ankavanana aza ianao, ry Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, dia hotsoahako hiala eo ianao,'
mg1865::mg_24::22::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hatolotro eo an-tanan''izay mitady ny ainao sy eo an-tanan''izay atahoranao, dia eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, sy eo amin''ny tanan''ny Kaldeana.'
mg1865::mg_24::22::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao sy ny reninao niteraka anao dia hariako any an-tany hafa izay tsy nahaterahanareo, ka any no hahafatesanareo.'
mg1865::mg_24::22::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany iriny hiverenana dia tsy hiverenany.'
mg1865::mg_24::22::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ity lehilahy Jekonia ity dia vilany vingavingaina sy efa hotorotoroina ary fanaka tsy mahafinaritra va? Koa nahoana no nariana izy sy ny taranany ka natsipy any amin''ny tany tsy fantany?'
mg1865::mg_24::22::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry tany! ry tany! ry tany! Henoy ny tenin''i Jehovah.'
mg1865::mg_24::22::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Soratanareo ho tsy manam-para ity lehilahy ity, dia lehilahy tsy hambinina amin''ny androny; Fa tsy hisy amin''ny taranany izay hambinina Hipetraka eo amin''ny seza fiandrianan''i Davida, na hanapaka ao amin''ny Joda intsony'
mg1865::mg_24::23::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny mpiandry tsara, indrindra fa ny Rantsan''i Davida'
  verse_text: 'Lozan''ireo mpiandry izay manimba sy mampihahaka ny ondry fiandriko, hoy Jehovah'
mg1865::mg_24::23::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: '2022-03-26T07:25:21+0000'
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Andriamanitry ny Isiraely, ny amin''ireo mpiandry izay miandry ny oloko: Ianareo efa nampihahaka ny ondriko sy nandronjindronjina azy, fa tsy nanolokolo azy; Koa, indro, hovaliako ianareo noho ny faharatsian''ny ataonareo, hoy Jehovah'
mg1865::mg_24::23::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho hanangona ny ondriko sisa avy any amin''ny tany rehetra izay nandroahako azy ka hampodiko ho any amin''ny saha niandrasana azy, dia hitombo sy hihamaro izy'
mg1865::mg_24::23::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanendry mpiandry ho azy Aho, ka dia hiandry azy ireo; Ka tsy hatahotra na hivadi-po intsony izy, sady tsy hisy tsy ho voavory, hoy Jehovah.'
mg1865::mg_24::23::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, izay hananganako Rantsana* marina ho an''i Davida, ka hanjaka Izy sady ho hendry ary hanao fitsarana sy fahamarinana amin''ny tany. [*Na: Solofo]'
mg1865::mg_24::23::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny androny no hamonjena ny Joda, sy handrian''ny Isiraely fahizay, ary izao no anarany izay hanononana Azy: Jehovah Fahamarinantsika.'
mg1865::mg_24::23::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy ny andro, hoy Jehovah, Izay tsy hanaovana intsony hoe: Raha velona koa Jehovah, Izay nitondra ny Zanak''Isiraely niakatra avy tany amin''ny tany Egypta;'
mg1865::mg_24::23::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao kosa: Raha velona koa Jehovah, Izay nitondra ny taranak''Isiraely niakatra sady nitarika azy avy tany amin''ny tany avaratra sy avy tany amin''ny tany rehetra izay nandroahako azy; Dia honina ao amin''ny taniny izy.'
mg1865::mg_24::23::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny mpaminany sandoka'
  verse_text: 'Ny amin''ireo mpaminany. Montsamotsana ato anatiko ny foko, mangozohozo ny taolako rehetra, toy ny olona mamo aho, ary toy ny lehilahy leon-divay, noho ny amin''i Jehovah sy noho ny teniny masina.'
mg1865::mg_24::23::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa feno mpijangajanga ny tany; Ary noho ny ozona no isaonan''ny tany, efa maina ny kijana any an''efitra; Ary efa ratsy ny fanaon*''ny olona, sady ny tsy fahamarinana no heriny. [*Hebreo: lalan'']'
mg1865::mg_24::23::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na mpaminany na mpisorona dia samy mpihatsaravelatsihy* avokoa; Na dia tao an-tranoko aza dia mbola hitako ihany ny haratsiany, hoy Jehovah. [*Na: ratsy fanahy]'
mg1865::mg_24::23::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia ho toy ny lala-malama amin''ny aizim-pito ny lalany; Haronjina izy, ka dia ho potraka ao; Fa hahatonga loza aminy Aho amin''ny taona hamaliana azy, hoy Jehovah.'
mg1865::mg_24::23::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny mpaminanin''i Samaria no nahitako zavatra mahaloiloy: Naminany tamin''i Bala izy ka nampivily ny Isiraely oloko,'
mg1865::mg_24::23::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny mpaminanin''i Jerosalema koa no nahitako zavatra mahatsiravina; Mijangajanga sy mandeha araka ny lainga izy sady mampahery ny tanan''ny mpanao ratsy, ka samy tsy miala amin''ny faharatsiany; Eny, izy rehetra dia tonga tahaka an''i Sodoma raha amiko, ary ny mponina ao dia tonga tahaka an''i Gomora.'
mg1865::mg_24::23::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro, ny amin''ireo mpaminany ireo: Indro, hofahanako zava-mahafaty izy sy hampisotroiko rano mangidy, satria avy tamin''ny mpaminanin''i Jerosalema no nivoahan''ny faharatsiana ho any amin''ny tany rehetra.'
mg1865::mg_24::23::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Aza mihaino ny tenin''ny mpaminany izay maminany aminareo, fa manadala anareo ireo; Ny fahitana avy ao am-pony ihany no lazainy, fa tsy izay aloaky ny vavan''i Jehovah.'
mg1865::mg_24::23::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milaza mandrakariva amin''izay manamavo Ahy izy hoe: Jehovah nanao hoe: Hahita fiadanana ianareo, ary amin''izay rehetra mandeha araka ny ditry ny fony hoe: Tsy hisy loza hanjo anareo.'
mg1865::mg_24::23::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa no efa isan''ny mpihevitra teo amin''i Jehovah ka nahita sy nandre ny teniny? Iza no nanongilana ny sofiny taminy ka nihaino ny teniny?'
mg1865::mg_24::23::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! ny tadion''i Jehovah! Mivoaka ny fahatezerana sy ny tadio mitambolimbolina ka miantonta amin''ny lohan''ny ratsy fanahy.'
mg1865::mg_24::23::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeran''i Jehovah tsy ho afaka ambara-panefany sy ambara-panatanterany ny hevitry ny fony; Mbola ho fantatrareo marimarina izany any am-parany.'
mg1865::mg_24::23::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy naniraka ireo mpaminany ireo Aho, kanefa nidodododo ihany izy, tsy niteny taminy Aho, kanefa naminany ihany izy.'
mg1865::mg_24::23::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha isan''ny mpihevitra teo amiko izy, dia ho nitory ny teniko tamin''ny oloko izy ka namerina azy hiala tamin''ny lalany ratsy sy tamin''ny faharatsian''ny nataony.'
mg1865::mg_24::23::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa Andriamanitra ety akaiky ihany va Aho? hoy Jehovah. Fa tsy Andriamanitra any lavitra any koa?'
mg1865::mg_24::23::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa misy olona mahafin-tena ao amin''ny fierena va ka tsy ho hitako? hoy Jehovah. Tsy manerana ny lanitra sy ny tany va Aho? hoy Jehovah.'
mg1865::mg_24::23::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa reko ny nolazain''ny mpaminany, Izay naminany lainga tamin''ny anarako hoe: Nanonofy aho, nanonofy aho.'
mg1865::mg_24::23::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana? Moa ao am-pon''ireo mpaminany izay maminany lainga sy maminany araka ny fitaky ny fony va?'
mg1865::mg_24::23::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hampanadino ny oloko ny anarako amin''ny nofiny izay lazainy amin''ny namany avy, toy ny nanadinoan''ny razany ny anarako noho ny amin''i Bala?'
mg1865::mg_24::23::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaminany izay manonofy dia aoka hilaza nofy, ary izay manana ny teniko dia aoka hanambara marina ny teniko. Fa moa inona izay mololo, raha oharina amin''ny vary? hoy Jehovah.'
mg1865::mg_24::23::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tahaka ny afo va ny teniko? hoy Jehovah, ary tsy tahaka ny kanonta manorotoro ny vatolampy va?'
mg1865::mg_24::23::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, fa hasiako ny mpaminany, hoy Jehovah, izay samy mangalatra ny teniko amin''ny namany avy.'
mg1865::mg_24::23::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hoy Jehovah, hasiako ny mpaminany, izay mampiteny ny lelany hoe: Hoy Izy.'
mg1865::mg_24::23::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hasiako izay maminany nofy lainga, hoy Jehovah, ary milaza izany ka mampivily ny oloko amin''ny laingany sy ny fandokafany tena; Nefa Izaho tsy naniraka azy na nandidy azy tsinona, ka dia tsy mahasoa ity firenena ity akory izy, hoy Jehovah.'
mg1865::mg_24::23::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: '2022-03-26T07:25:12+0000'
  verse_title: null
  verse_text: 'Ary raha manontany anao ity firenena ity, na ny mpaminany, na ny mpisorona, ka manao hoe: Inona no entan*''i Jehovah? Dia ataovy aminy hoe: Ny amin''ny entana hariako dia ianareo, hoy Jehovah. [*Na: faminaniana ny loza]'
mg1865::mg_24::23::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpaminany sy ny mpisorona mbamin''ny vahoaka, izay manao hoe: Ny entan''i Jehovah. Dia hovaliako izany olona izany mbamin''ny ankohonany.'
mg1865::mg_24::23::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samia manontany amin''ny namany sy ny rahalahiny avy ianareo hoe: Ahoana no navalin''i Jehovah? Ary ahoana no nolazain''i Jehovah?'
mg1865::mg_24::23::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny hoe: Ny entan''i Jehovah dia tsy hotononinareo intsony; Fa ny tenin''ny olona avy ihany no ho entan''ny tenany, satria efa navadikareo ny tenin''Andriamanitra velona, dia Jehovah, Tompon''ny maro, Andriamanitsika.'
mg1865::mg_24::23::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no hanontanianareo* amin''ny mpaminany; Ahoana no navalin''i Jehovah anao? Ary ahoana no nolazain''i Jehovah? [*Hebreo: hanontanianao]'
mg1865::mg_24::23::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hoy ianareo: Entan''i Jehovah, Dia izao no lazain''i Jehovah: Noho ny nilazanareo ny teny hoe: Ny entan''i Jehovah, nefa efa nanirahako ihany ianareo nataoko hoe: Aza manao hoe: Ny entan''i Jehovah,'
mg1865::mg_24::23::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, hanadino anareo tokoa Aho sady hanary anareo mbamin''ny tanàna izay nomeko anareo sy ny razanareo tsy ho eo anatrehako;'
mg1865::mg_24::23::40:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 23
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko mihatra aminareo ny fahafaham-baraka mandrakizay sy ny fahamenarana mandrakizay izay tsy hohadinoina.'
mg1865::mg_24::24::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny aviavy roa sobiky.'
  verse_text: 'Jehovah naneho tamiko, ka, indreo, misy aviavy roa sobiky voapetraka teo anoloan''ny tempolin''i Jehovah, taorian''ny nitondran''i Nebokadnezara, mpanjakan''i Babylona, an''i Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, sy mpanapaka ny Joda mbamin''ny mahay tao-zavatra sy ny mpanefy vy izay tany Jerosalema, ho babo ho any Babylona.'
mg1865::mg_24::24::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sobiky iray dia nisy aviavy tsara dia tsara, dia toy ny aviavy mialin-taona; ary ny sobiky anankiray kosa dia nisy aviavy ratsy dia ratsy, izay tsy azo hanina noho ny haratsiny.'
mg1865::mg_24::24::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Inona no hitanao, ry Jeremia? Ary hoy izaho: Aviavy; koa ny tsara moa dia tsara tokoa, ary ny ratsy kosa dia ratsy tokoa ka tsy azo hanina noho ny haratsiny.'
mg1865::mg_24::24::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko indray ny tenin''i Jehovah nanao hoe:'
mg1865::mg_24::24::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Tahaka ireto aviavy tsara ireto no fijeriko ny Joda voababo mba hanasoavako azy, dia ireo noroahiko niala tamin''ity tany ity ho any amin''ny tanin''ny Kaldeana.'
mg1865::mg_24::24::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hojeren''ny masoko izy mba hanasoavako azy ka hampodiko ho amin''ity tany ity; ary haoriko izy, ka tsy horavako; ary hamboleko izy, fa tsy hongotako.'
mg1865::mg_24::24::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homeko fo hahalalany Ahy ho Jehovah izy; dia ho oloko izy, ary Izaho kosa ho Andriamaniny; fa hiverina amiko amin''ny fony rehetra izy.'
mg1865::mg_24::24::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny aviavy ratsy izay tsy azo hanina kosa noho ny haratsiny, dia izao no lazain''i Jehovah: Toy izany no hanolorako an''i Zedekia, mpanjakan''ny Joda, sy ny mpanapaka ary izay sisa any Jerosalema, dia izay mbola sisa amin''ity tany ity sy izay mitoetra any amin''ny tany Egypta,'
mg1865::mg_24::24::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, hatolotro ho mpanjenjena* sy fiharan-doza any amin''ny fanjakana rehetra ambonin''ny tany izy, ho fandatsa sy ohabolana sy ambentinteny ary fanozonana any amin''ny tany rehetra izay handroahako azy. [*Na: ho fampangovitana]'
mg1865::mg_24::24::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana ambara-pahalany ritrany tsy ho amin''ny tany izay nomeko azy sy ny razany.'
mg1865::mg_24::25::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handravan''i Babylona ny Joda sy ny firenena manodidina, ary ny loza hanelezana an''i Babylona sy ny firenena hafa rehetra'
  verse_text: 'Izao no teny tonga tamin''i Jeremia ny amin''ny Joda rehetra tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda dia ny taona voalohany nanjakan''i Nebokadnezara, mpanjakan''i Babylona'
mg1865::mg_24::25::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay nolazain''i Jeremia mpaminany tamin''ny Joda rehetra sy tamin''ny mponina rehetra tany Jerosalema hoe:'
mg1865::mg_24::25::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny taona fahatelo ambin''ny folo nanjakan''i Josia, zanak''i Amona, mpanjakan''ny Joda, ka mandraka androany, dia mandritra ny telo amby roa-polo taona izao, no nahatongavan''ny tenin''i Jehovah tamiko, ary nolazaiko taminareo, eny, nifoha maraina koa aho ka nilaza; nefa tsy nihaino ianareo.'
mg1865::mg_24::25::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah naniraka ny mpaminany mpanompony rehetra ho any aminareo, eny, nifoha maraina koa Izy ka naniraka nefa tsy nihaino ianareo, na nanongilan-tsofina hihaino hoe:'
mg1865::mg_24::25::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samia miala amin''ny lalan-dratsinareo avy ianareo sy amin''ny ratsy fanaonareo, ka dia honina any amin''ny tany izay nomen''i Jehovah anareo sy ny razanareo hatrizay ka ho mandrakizay.'
mg1865::mg_24::25::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza manaraka andriamani-kafa hanompo azy sy hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin''ny asan''ny tananareo, fandrao hahatonga loza aminareo Aho.'
mg1865::mg_24::25::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nihaino Ahy ianareo, hoy Jehovah, mba hampahatezeranareo Ahy tamin''ny asan''ny tananareo hahitanareo loza.'
mg1865::mg_24::25::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Noho ny tsy nihainoanareo ny teniko,'
mg1865::mg_24::25::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia, indro, hampanalaiko ny firenena rehetra any avaratra sy Nebokadnezara, mpanjakan''i Babylona, mpanompoko, hoy Jehovah, ary ho entiko hamely ity lany ity sy ny mponina eto mbamin''ireto firenena manodidina rehetra ireto izy, ary haringako tokoa* ireo ka hataoko ho figagana sy zavatra mampisitrisitra sady ho rava mandrakizay. [*Hebreo: hataoko herema]'
mg1865::mg_24::25::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsahatro eo aminy ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina, ny feon''ny vato fikosoham-bary ary ny fahazavan''ny jiro.'
mg1865::mg_24::25::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ity tany rehetra ity dia ho foana sy lao, ary ireto firenena rehetra ireto hanompo ny mpanjakan''i Babylona fito-polo taona.'
mg1865::mg_24::25::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny fito-polo taona, hoy Jehovah, dia hovaliako kosa ny mpanjakan''i Babylona sy izany firenena izany noho ny helony, ary ny tanin''ny Kaldeana koa dia hataoko rava mandrakizay.'
mg1865::mg_24::25::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hotoviko amin''izany tany izany ny teniko rehetra, izay efa nambarako hamelezana azy, dia izay rehetra voasoratra ato amin''ity boky ity, izay novinanin''i Jeremia hamely ny firenena rehetra.'
mg1865::mg_24::25::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo kosa indray dia hampanompoin''ny firenena maro sy ny mpanjaka lehibe, ary hovaliako araka ny ataony sy araka ny asan''ny tanany avy izy.'
mg1865::mg_24::25::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no nolazain''i Jehovah, Andriamanitry ny Isiraely, tamiko: Raiso ety an-tanako ity kapoaky ny divay fahatezerana mirehitra ity, ka ampisotroy ny firenena rehetra izay anirahako anao.'
mg1865::mg_24::25::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisotro izy ka hirepirepy sy ho very saina noho ny sabatra izay hampameleziko azy.'
mg1865::mg_24::25::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisiko ny kapoaka teny an-tanan''i Jehovah, ka nampisotroako ny firenena rehetra izay nanirahan''i Jehovah ahy,'
mg1865::mg_24::25::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Jerosalema sy ny tanànan''ny Joda sy ny mpanjakany ary ny mpanapaka, mba hanao azy ho tany lao sy ho figagana sy zavatra mampisitrisitra ary fanozonana tahaka ny amin''izao anio izao;'
mg1865::mg_24::25::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Farao, mpanjakan''i Egypta, sy ny mpanompony sy ny mpanapaka mbamin''ny vahoakany rehetra,'
mg1865::mg_24::25::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny olona samy hafa firenena rehetra sy ny mpanjaka rehetra amin''ny tany Oza sy ny mpanjaka rehetra amin''ny tanin''ny Filistina sy Askelona sy Gaza sy Ekrona ary ny sisa any Asdoda;'
mg1865::mg_24::25::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Edoma sy Moaba sy ny taranak''i Amona,'
mg1865::mg_24::25::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpanjaka rehetra any Tyro sy ny mpanjaka rehetra any Sidona ary ny mpanjakan''ny nosy* any an-dafin''ny ranomasina; [*Na: amoron-tsiraka]'
mg1865::mg_24::25::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Dedana sy Tema sy Boza ary izay rehetra voahety sisim-bolo,'
mg1865::mg_24::25::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpanjaka rehetra any Arabia sy ny mpanjaka rehetra amin''ny firenena maro samy hafa izay monina any an''efitra;'
mg1865::mg_24::25::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpanjaka rehetra any Zimry sy ny mpanjaka rehetra any Elama ary ny mpanjaka rehetra any Media,'
mg1865::mg_24::25::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky, na iza na iza, ary ny fanjakana rehetra amin''izao tontolo izao, izay ety ambonin''ny tany; ary ny mpanjakan''i Sesaka* koa dia hisotro manaraka ireo. [*Sesaka = Babela]'
mg1865::mg_24::25::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro. Andriamanitry ny Isiraely: Misotroa ianareo, ka mimamoa, sy mandoava, ary mianjerà, ka aza miarina intsony noho ny sabatra izay hampameleziko anareo.'
mg1865::mg_24::25::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mety mandray ny kapoaka eny an-tananao hosotroiny izy, dia ataovy aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Tsy maintsy misotro ianareo.'
mg1865::mg_24::25::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ao amin''ny tanàna izay efa niantsoana ny anarako aza no nanombohako ny fahatongavana loza, ka ho afaka va ianareo? Tsy ho afaka mihitsy ianareo, fa hiantso sabatra Aho hamelezana ny mponina rehetra amin''ny tany, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_24::25::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maminania aminy ianao araka izao teny rehetra izao, ka ataovy hoe: Jehovah hierona any ambony ary hanandratra ny feony any amin''ny fitoerany masina, eny, hierona mafy amin''ny sahany fiandrasan-ondry Izy ka hanakora toy ny mpanosihosy voaloboka, hamelezana ny mponina rehetra amin''ny tany.'
mg1865::mg_24::25::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihatra amin''ny faran''ny tany ny fihorakorahana; Fa Jehovah manana ady amin''ny firenena; Mifandahatra amin''ny nofo rehetra Izy, ka ny ratsy fanahy dia atolony ho an''ny sabatra, hoy Jehovah.'
mg1865::mg_24::25::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Indro, hisy loza hivoaka hitety ny firenena samy hafa, ary hisy tafio-drivotra mahery hiposaka any amin''ny faran''ny tany;'
mg1865::mg_24::25::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany Ny voavonon''i Jehovah, dia hiampatrampatra hatramin''ny faran''ny tany anankiray ka hatramin''ny farany koa; Tsy hisaonana, na hangonina, na halevina ireny, fa ho zezika eny ambonin''ny tany.'
mg1865::mg_24::25::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà, ianareo mpiandry ondry, ary mitaraina; Eny, mihosinkosena, ianareo zokiny amin''ny ondry! Fa tonga ny andro hamonoana anareo, ary hampieleziko ianareo ka hianjera toy ny fanaka tsara.'
mg1865::mg_24::25::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiandry ondry tsy hanam-pandosirana, ary ny zokiny amin''ny ondry tsy hanam-pahafahana.'
mg1865::mg_24::25::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy feo fitarainan''ny mpiandry ondry sy fidradradradran''ny zokiny aminy! Satria efa nosimban''i Jehovah ny saha fiandrasana azy,'
mg1865::mg_24::25::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa tonga lao ny kijana niadanana noho ny firehetan''ny fahatezeran''i Jehovah.'
mg1865::mg_24::25::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 25
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandao ny fiereny toy ny liona tanora izy; Fa efa lao ny taniny noho ny fahasiahan''ny mpampahory sy noho ny firehetan''ny fahatezerany.'
mg1865::mg_24::26::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niampangana an''i Jeremia, sy ny nahafahany tamin''izany'
  verse_text: 'Tamin''ny niandohan''ny nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda, no nahatongavan''izao teny izao avy tamin''i Jehovah nanao hoe:'
mg1865::mg_24::26::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Mitsangàna eo an-kianjan''ny tranon''i Jehovah, ka lazao amin''ny tanànan''ny Joda rehetra, izay avy hiankohoka ao an-tranon''i Jehovah, ny teny rehetra izay efa nasaiko hambaranao aminy, ary aza amelana na dia teny iray akory aza.'
mg1865::mg_24::26::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa angamba hihaino ihany izy, ka samy hiala amin''ny lalany ratsy, dia hanenenako ny loza izay kasaiko hamelezana azy noho ny faharatsian''ny ataony.'
mg1865::mg_24::26::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao aminy hoe: Izao no lazain''i Jehovah: Raha tsy mihaino Ahy ianareo ka tsy mandeha araka ny lalàko izay napetrako teo anoloanareo,'
mg1865::mg_24::26::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy mihaino ny tenin''ny mpaminany mpanompoko, izay irahiko aminareo, eny, nifoha maraina koa Aho ka naniraka, nefa tsy mba nihaino ianareo'
mg1865::mg_24::26::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hataoko tahaka an''i Silo ity trano ity, ary hataoko fanozonana ho an''ny firenena rehetra ambonin''ny tany ity tanàna ity.'
mg1865::mg_24::26::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona sy ny mpaminany mbamin''ny vahoaka rehetra dia nandre an''i Jeremia nanambara ireo teny rehetra ireo tao an-tranon''i Jehovah.'
mg1865::mg_24::26::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony efa tapitra voalazan''i Jeremia izay rehetra nasain''i Jehovah nolazaina tamin''ny vahoaka rehetra, dia nosamborin''ny mpisorona sy ny mpaminany mbamin''ny vahoaka rehetra izy ka nataony hoe: Ho faty tokoa ianao.'
mg1865::mg_24::26::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianao no naminany tamin''ny anaran''i Jehovah hoe: Ho tahaka an''i Silo ity tanàna ity, ary ho lao ity tanàna ity, ka tsy hisy mponina? Ary ny vahoaka rehetra dia nitangorona tamin''i Jeremia tao an-tranon''i Jehovah.'
mg1865::mg_24::26::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony ren''ny mpanapaka ny Joda izany zavatra izany, dia niakatra avy tany amin''ny tranon''ny mpanjaka nankany amin''ny tranon''i Jehovah izy ka nipetraka teo anoloan''ny vavahady vaovaon''i Jehovah.'
mg1865::mg_24::26::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona sy ny mpaminany nilaza tamin''ny mpanapaka sy ny vahoaka rehetra hoe: Misy heloka tokony hahafaty ity lehilahy ity; fa efa naminany loza ho amin''ity tanàna ity izy araka izay efa ren''ny sofinareo.'
mg1865::mg_24::26::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilaza tamin''ny mpanapaka rehetra sy ny vahoaka rehetra Jeremia hoe: Jehovah no naniraka ahy haminany izay rehetra efa renareo ny amin''ity trano sy ity tanàna ity.'
mg1865::mg_24::26::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny ataovy tsara ny lalanareo sy ny ataonareo, ary mihainoa ny feon''i Jehovah Andriamanitrareo; fa hanenenan''i Jehovah ny loza izay efa nolazainy hamelezana anareo.'
mg1865::mg_24::26::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amiko, dia, indro, efa eto an-tananareo aho; koa ataovy amiko izay ataonareo ho mety sy marina.'
mg1865::mg_24::26::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa mihevera tsara, fa raha mamono ahy anie ianareo, dia hahatonga rà marina aminareo sy amin''ity tanàna ity ary amin''ny mponina eto, satria Jehovah tokoa no naniraka ahy taminareo hilaza ireo teny rehetra ireo eto anatrehanareo.'
mg1865::mg_24::26::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanapaka sy ny vahoaka rehetra tamin''ny mpisorona sy ny mpaminany: Tsy misy heloka tokony hahafaty ity lehilahy ity, satria tamin''ny anaran''i Jehovah Andriamanitsika no nitenenany tamintsika.'
mg1865::mg_24::26::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy nitsangana ny loholona ka nanao tamin''ny vahoaka rehetra vory teo hoe:'
mg1865::mg_24::26::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mika Morastita dia naminany tamin''ny andron''i Hezekia, mpanjakan''ny Joda, ka nanao tamin''ny Joda rehetra hoe: Izao no lazain''i Jehovah, Tompon''ny maro: "Ziona dia hasaina toy ny tanimboly, ary Jerosalema ho tonga korontam-bato, ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana mifono ala." (Mika 3:12).'
mg1865::mg_24::26::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa namono azy va Hezekia, mpanjakan''ny Joda, sy ny Joda rehetra? Tsy natahotra an''i Jehovah va izy ka nifona tamin''i Jehovah, ka dia nanenenan''i Jehovah ny loza izay efa nolazainy hamelezany azy? Fa isika kosa izao dia mila hampidi-doza lehibe amin''ny tenantsika.'
mg1865::mg_24::26::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray koa izay naminany tamin''ny anaran''i Jehovah, dia Oria, zanak''i Semaia, avy any Kiriata-jearima, izay naminany loza ho amin''ity tanàna sy ity tany ity araka izany teny rehetra nataon''i Jeremia izany koa.'
mg1865::mg_24::26::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Joiakima mpanjaka sy ny lehilahy maheriny rehetra ny teniny, dia nitady hahafaty azy ny mpanjaka; ary nony nandre izany Oria, dia natahotra izy ka nandositra, ary tonga tany Egypta;'
mg1865::mg_24::26::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Joiakima mpanjaka naniraka olona nankany Egypta, dia Elnatana, zanak''i Akbora, mbamin''ny olona sasany nanaraka ny hankany Egypta.'
mg1865::mg_24::26::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Oria dia nalain''ireo niala avy tany Egypta ka nentiny teo amin''i Joiakima mpanjaka; ary izy namono azy tamin''ny sabatra, dia nanary ny fatiny teny amin''ny fasam-bahoaka.'
mg1865::mg_24::26::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny tanan''i Ahikama, zanak''i Safana, dia nomba an''i Jeremia mba tsy hanolorana azy ho eo an-tanan''ny vahoaka hovonoiny.'
mg1865::mg_24::27::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny zioga hataon''ny mpanjakan''i Babylona amin''ny vozon''ny firenena izay resiny, sy ny namporisihan''i Jeremia azy hitondra izany'
  verse_text: 'Tamin''ny niandohan''ny nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda, no nahatongavan''izao teny izao tamin''i Jeremia avy tamin''i Jehovah hoe:'
mg1865::mg_24::27::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nolazain''i Jehovah tamiko: Manaova famatorana* sy zioga ianao, ka ataovy eo am-bozonao, [*Na: kofehy]'
mg1865::mg_24::27::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ampanatero any amin''ny mpanjakan''i Edoma sy any amin''ny mpanjakan''i Moaba sy any amin''ny mpanjakan''ny taranak''i Amona sy any amin''ny mpanjakan''i Tyro ary any amin''ny mpanjakan''i Sidona izany ho entin''ny iraka izay mankaty Jerosalema ho aty amin''i Zedekia, mpanjakan''ny Joda;'
mg1865::mg_24::27::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary asaovy lazainy amin''ny tompony avy hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Izao no holazainareo amin''ny tomponareo:'
mg1865::mg_24::27::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no nanao ny tany sy ny olona ary ny biby izay eo aminy tamin''ny heriko lehibe sy tamin''ny sandriko nahinjitra; ary efa nomeko ho an''izay sitraky ny foko ny tany.'
mg1865::mg_24::27::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny Izaho dia efa nanolotra ireto tany rehetra ireto ho eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, mpanompoko; eny, na dia ny bibi-dia aza dia efa nomeko hanompo azy koa.'
mg1865::mg_24::27::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenena rehetra dia hanompo azy sy ny zanany ary ny zafiny ambara-pahatongan''ny fotoana hamaliana ny tanin''izy io kosa, ka hampanompoin''ny firenena maro sy ny mpanjaka lehibe izy.'
mg1865::mg_24::27::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay firenena na fanjakana tsy mety manompo an''i Nebokadnezara, mpanjakan''i Babylona, ary tsy mety mampiditra ny vozony eo amin''ny ziogan''ny mpanjakan''i Babylona, dia hovaliako amin''ny sabatra sy ny mosary ary ny areti-mandringana izany firenena izany, hoy Jehovah, ambara-pandringako azy amin''ny tanany.'
mg1865::mg_24::27::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mihaino ny mpaminaninareo ianareo, na ny mpanao fankatovanareo, na ny nofinareo, na ny mpanandronareo, na ny mpanana odinareo, izay manao aminareo hoe: Tsy hanompo ny mpanjakan''i Babylona ianareo.'
mg1865::mg_24::27::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lainga no vinanin''ireo aminareo, mba hamindrana anareo ho lavitra ny taninareo, dia horoahiko ianareo ka ho ringana.'
mg1865::mg_24::27::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay firenena mampiditra ny vozony eo amin''ny ziogan''ny mpanjakan''i Babylona kosa ka manompo azy dia havelako hitoetra amin''ny taniny ihany, hoy Jehovah, ka hiasa azy sady honina ao izy.'
mg1865::mg_24::27::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia, mpanjakan''ny Joda. koa dia efa nilazako araka izany teny rehetra izany hoe: Ampidiro eo amin''ny ziogan''ny mpanjakan''i Babylona ny vozonareo, ka manompoa azy sy ny vahoakany, dia ho velona ianareo.'
mg1865::mg_24::27::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no ho fatin''ny sabatra sy ny mosary ary ny areti-mandringana ianareo, dia ianao mbamin''ny vahoakanao, araka ny nolazain''i Jehovah ny amin''ny firenena izay tsy mety manompo ny mpanjakan''i Babylona?'
mg1865::mg_24::27::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza mihaino ny tenin''ny mpaminany izay manao aminareo hoe: Tsy hanompo ny mpanjakan''i Babylona ianareo; fa lainga no vinanin''ireo aminareo.'
mg1865::mg_24::27::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy naniraka azy Aho, hoy Jehovah, nefa manandoka ho mpaminany amin''ny anarako ihany izy, mba handroahako anareo, ka ho lany ringana ianareo, dia ianareo sy ny mpaminany izay maminany aminareo.'
mg1865::mg_24::27::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona sy ity firenena rehetra ity dia efa nilazako hoe: Izao no lazain''i Jehovah: Aza mihaino ny tenin''ny mpaminaninareo. izay maminany aminareo hoe: Indro, ny fanaky ny tranon''i Jehovah hampodina faingana avy any Babylona; fa lainga no vinaniny aminareo.'
mg1865::mg_24::27::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihaino azy, fa manompoa ny mpanjakan''i Babylona, dia ho velona ianareo; fa nahoana no ho rava ity tanàna ity?'
mg1865::mg_24::27::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mpaminany tokoa ireo, ary raha ao aminy tokoa ny tenin''i Jehovah, dia aoka hifona amin''i Jehovah, Tompon''ny maro, izy, mba tsy ho lasa ho any Babylona koa ny fanaka sisa ao an-tranon''i Jehovah sy ao an-tranon''ny mpanjakan''ny Joda sy ato Jerosalema'
mg1865::mg_24::27::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao ny lazain''i Jehovah, Tompon''ny maro, ny amin''ny andry sy ny tavin-drano lehibe* sy ny fitoeran-tavin-drano ary ny amin''ny fanaka hafa izay mbola sisa amin''ity tanàna ity, [*Hebreo: ranomasina]'
mg1865::mg_24::27::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay tsy nalain''i Nebokadnezara mpanjakan''i Babylona, fony izy nitondra an''i Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, ho babo avy tany Jerosalema ho any Babylona, mbamin''ny manan-kaja rehetra amin''ny Joda sy Jerosalema,'
mg1865::mg_24::27::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, ny amin''ny fanaka izay sisa ao an-tranon''i Jehovah sy ao an-tranon''ny mpanjakan''ny Joda sy ato Jerosalema:'
mg1865::mg_24::27::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho any Babylona no hitondrana ireo, sady hitoetra any izy ambara-pahatongan''ny andro hamangiako azy, hoy Jehovah, dia vao ho entiko miakatra izy ka hampodiko amin''ity tanàna ity.'
mg1865::mg_24::28::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny faminanian''i Hanania mpaminany sandoka, sy ny navalin''i Jeremia azy'
  verse_text: 'Ary tamin''izany taona izany ihany, dia tamin''ny niandohan''ny nanjakan''i Zedekia, mpanjakan''ny Joda, tamin''ny volana fahadimy tamin''ny taona fahefatra, no nitenenan''i Hanania, zanak''i Azora, mpaminany avy tany Gibeona, tamiko tao an-tranon''i Jehovah, teo anatrehan''ny mpisorona sy ny vahoaka rehetra, nanao hoe:'
mg1865::mg_24::28::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Efa notapahiko ny ziogan''ny mpanjakan''i Babylona,'
mg1865::mg_24::28::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ao anatin''ny roa taona no hampodiako ho amin''ity tanàna ity ny fanaka rehetra tao an-tranon''i Jehovah izay nalain''i Nebokadnezara, mpanjakan''i Babylona, avy tamin''ity tanàna ity ka nentiny ho any Babylona:'
mg1865::mg_24::28::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, mbamin''ny Joda voababo rehetra, izay lasa tany Babylona, dia hampodiko ho amin''ity tanàna ity, hoy Jehovah; fa hotapahiko ny ziogan''ny mpanjakan''i Babylona.'
mg1865::mg_24::28::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jeremia mpaminany tamin''i Hanania mpaminany teo anatrehan''ny mpisorona sy ny vahoaka rehetra izay tao an-tranon''i Jehovah,'
mg1865::mg_24::28::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, amena! hoy Jeremia mpaminany; hataon''i Jehovah anie izany! hotanterahin''i Jehovah anie ny teninao, izay novinaninao ny amin''ny hampodiana ny fanaky ny tranon''i Jehovah mbamin''ny babo rehetra hiala any Babylona ka hiverina ho amin''ity tanàna ity indray.'
mg1865::mg_24::28::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa mba henoinao izao teny izao, izay holazaiko eto anatrehanao sy ny vahoaka rehetra:'
mg1865::mg_24::28::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaminany izay tany alohako sy tany alohanao hatramin''ny ela dia naminany ady sy loza ary areti-mandringana ho amin''ny tany maro sy ny fanjakana lehibe.'
mg1865::mg_24::28::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny mpaminany izay maminany fiadanana raha tanteraka ny teniny, dia ho fantatra ho mpaminany nirahin''i Jehovah tokoa izy.'
mg1865::mg_24::28::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesorin''i Hanania mpaminany ny zioga tamin''ny vozon''i Jeremia mpaminany ka notapahiny.'
mg1865::mg_24::28::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hanania niteny teo anatrehan''ny vahoaka rehetra hoe: Izao no lazain''i Jehovah: tahaka izao no hanapahako ny ziogan''i Nebokadnezara, mpanjakan''ny Babylona, ho afaka amin''ny vozon''ny firenena rehetra ao anatin''ny roa taona. Ary dia lasa niala Jeremia mpaminany.'
mg1865::mg_24::28::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah, nony efa notapahin''i Hanania mpaminany ho afaka tamin''ny vozon''i Jeremia mpaminany ny zioga, nanao hoe:'
mg1865::mg_24::28::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka lazao amin''i Hanania hoe: Izao no lazain''i Jehovah: Zioga hazo no notapahinao, fa zioga vy kosa no hataonao solony.'
mg1865::mg_24::28::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Zioga vy no nataoko tamin''ny vozon''ireto firenena rehetra ireto mba hanompoany an''i Nebokadnezara, mpanjakan''i Babylona, ka dia hanompo azy izy; eny, na dia ny bibi-dia aza dia nomeko azy koa.'
mg1865::mg_24::28::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jeremia mpaminany tamin''i Hanania mpaminany: Mba henoy, ry Hanania: Tsy naniraka anao Jehovah; fa ianao dia mampitoky ity firenena ity amin''ny lainga.'
mg1865::mg_24::28::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Indro, hesoriko tsy ho amin''ny tany ianao; amin''ity taona ity ihany no hahafatesanao, satria fiodinana tamin''i Jehovah no notorinao'
mg1865::mg_24::28::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia maty tamin''ny volana fahafito tamin''iny taona iny ihany Hanania mpaminany.'
mg1865::mg_24::29::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Taratasy nampitondrain''i Jeremia ho any amin''ny babo tany Babylona'
  verse_text: 'Ary izao no fitenin''ny taratasy izay nampitondrain''i Jeremia mpaminany avy tany Jerosalema ho any amin''ny sisa amin''ny loholona voababo sy ho amin''ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, izay nobaboin''i Nebokadnezara ka nentiny avy tany Jerosalema ho any Babylona'
mg1865::mg_24::29::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: '(rehefa lasa niala tany Jerosalema Jekonia mpanjaka sy ny reniny sy ny tandapa sy ny mpanapaka ny Joda sy Jerosalema mbamin''ny mahay tao-zavatra sy ny mpanefy vy),'
mg1865::mg_24::29::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ilay teny nampitondrainy an''i Elasa, zanak''i Safana, sy Gemaria, zanak''i Hilkia, izay nirahin''i Zedekia, mpanjakan''ny Joda, ho any Babylona, ho any amin''i Nebokadnezara, mpanjakan''i Babylona, nanao hoe:'
mg1865::mg_24::29::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, amin''ny babo rehetra izay natolotro ho babo avy tany Jerosalema ho any Babylona:'
mg1865::mg_24::29::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova trano ianareo, ka mitoera aminy; ary manaova tanimboly, ka hano ny vokatra avy aminy.'
mg1865::mg_24::29::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manambadia, ka miteraha zazalahy sy zazavavy; analao vady ny zanakalahinareo, ary ampanambadio ny zanakavavinareo, mba hiterahany zazalahy sy zazavavy, ka hihamaro anie ianareo, fa tsy hihavitsy.'
mg1865::mg_24::29::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary katsaho izay hiadanan''ny tanàna izay nampandehanako anareo ho babo, ary mivavaha amin''i Jehovah ho azy; fa raha miadana izy, dia mba hiadana koa ianareo.'
mg1865::mg_24::29::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Aza mety hofitahin''ny mpaminaninareo sy ny mpanao fankatovanareo, izay ao aminareo, ary aza mino ny nofinareo izay nofisinareo*. [*Na: izay nampanonofisinareo]'
mg1865::mg_24::29::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lainga no vinaniny aminareo amin''ny anarako; tsy naniraka azy Aho, hoy Jehovah.'
mg1865::mg_24::29::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Rehefa tapitra ny fito-polo taona ny amin''i Babylona, dia hamangy anareo Aho, fa hotanterahiko aminareo ny teniko tsara, ka hampodiko ho amin''ity tany ity ianareo.'
mg1865::mg_24::29::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho mahalala ny hevitra iheverako anareo, hoy Jehovah, dia hevitra hahatonga fiadanana, fa tsy loza, mba hanome anareo fanantenana ny amin''ny farany*. [*Hebreo: farany sy fanantenana]'
mg1865::mg_24::29::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiantso Ahy ianareo ka handeha sy hivavaka amiko, dia hihaino anareo Aho.'
mg1865::mg_24::29::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitady Ahy ianareo, dia ho hitanareo Aho, raha katsahinareo amin''ny fonareo rehetra.'
mg1865::mg_24::29::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho hitanareo Aho, hoy Jehovah; ary hampodiko avy amin''ny fahababoana ianareo, ka hangoniko avy any amin''ny firenena rehetra sy avy any amin''ny tany rehetra izay nandroahako anareo, hoy Jehovah, ka hampodiko ho any amin''ilay tany efa nanolorako anareo hobaboina.'
mg1865::mg_24::29::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ianareo: Jehovah nanangana mpaminany ho anay eto Babylona.'
mg1865::mg_24::29::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah ny amin''ny mpanjaka izay mipetraka eo amin''ny seza fiandrianan''i Davida sy ny amin''ny vahoaka rehetra izay monina amin''ity tanàna ity, dia ny rahalahinareo izay tsy mba lasan-ko babo niaraka taminareo.'
mg1865::mg_24::29::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'izao no lazain''i Jehovah, Tompon''ny maro: Indro, hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana, ka hataoko toy ny aviavy ratsy dia ratsy izay tsy azo hanina noho ny haratsiny izy.'
mg1865::mg_24::29::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary henjehiko amin''ny sabatra sy ny mosary ary ny areti-mandringana izy ka hatolotro ho mpanjenjena* any amin''ny fanjakana rehetra ambonin''ny tany, ho fanozonana sy figagana sy zavatra mampisitrisitra sy fandatsa ho an''ny firenena izay nandroahako, azy [*Na: ho fampangovitana]'
mg1865::mg_24::29::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny tsy nihainoany ny teniko, hoy Jehovah, izay nampitondraiko ny mpaminany mpanompoko ho any aminy, teny, nifoha maraina koa Aho ka naniraka azy, nefa tsy nihaino ianareo, hoy Jehovah.'
mg1865::mg_24::29::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ny tenin''i Jehovah, ianareo babo rehetra izay nesoriko tany Jerosalema ho aty Babylona.'
mg1865::mg_24::29::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, ny amin''i Ahaba, zanak''i Kolaia, sy ny amin''i Zedekia, zanak''i Mahaseia, izay maminany lainga aminareo amin''ny anarako: Indro, hatolotro eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, izy, ka dia hovonoiny eo imasonareo.'
mg1865::mg_24::29::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy roa lahy dia hataon''ny babo rehetra amin''ny Joda izay any Babylona ho fanozonana hoe: Hataon''i Jehovah tahaka an''i Zedekia sy Ahaba, izay nodoran''ny mpanjakan''i Babylona tamin''ny afo, anie ianao,'
mg1865::mg_24::29::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny nanaovany izay fady indrindra* tao amin''ny Isiraely sy ny nijangajangany tamin''ny vadin''ny namany ary ny nitenenany lainga tamin''ny anarako, izay tsy nandidiako azy; Izaho no mahalala, ka ho vavolombelona Aho, hoy Jehovah. [*Hebreo: fahadalana]'
mg1865::mg_24::29::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Semaia Nehelamita dia hilazanao hoe:'
mg1865::mg_24::29::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Noho ny nampitondranao taratasy tamin''ny anaranao ho amin''ny vahoaka rehetra izay any Jerosalema sy amin''i Zefania mpisorona, zanak''i Mahaseia, ary amin''ny mpisorona rehetra hafa koa nanao hoe:'
mg1865::mg_24::29::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nanao anao ho mpisorona ho solon''i Joiada mpisorona, mba hanendry izay ho mpiandraikitra ny tranon''i Jehovah, hisakana izay rehetra very saina sy manao azy ho mpaminany, ka dia hasianao boloky hazo ny vozony sy ny tongony;'
mg1865::mg_24::29::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nahoana ianao no tsy nananatra mafy an''i Jeremia avy any Anatota, izay manao azy ho mpaminany aminareo?'
mg1865::mg_24::29::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa naniraka ho aminay any Babylona izy nanao hoe: Mbola haharitra ela izao, koa manaova trano ianareo, dia mitoera aminy, ary manaova tanimboly, ka hano ny vokatra aminy.'
mg1865::mg_24::29::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zefania mpisorona namaky izany taratasy izany teo anatrehan''i Jeremia mpaminany.'
mg1865::mg_24::29::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe:'
mg1865::mg_24::29::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maniraha ho any amin''ny babo rehetra, ka lazao aminy hoe: Izao no lazain''i Jehovah ny amin''i Semaia Nehelamita: Noho ny naminanian''i Semaia taminareo, kanefa tsy nirahiko izy tsinona, fa nampitoky anareo tamin''ny lainga'
mg1865::mg_24::29::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 29
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao no lazain''i Jehovah: Indro, efa hamaly an''i Semaia Nehelamita sy ny taranany Aho: tsy hanana zanakalahy honina amin''ity firenena ity izy sady tsy hanam-pifaliana amin''ny hahitana ny soa izay hataoko amin''ny oloko, hoy Jehovah, satria fiodinana tamin''i Jehovah no notoriny.'
mg1865::mg_24::30::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampodiana ny voninahitry ny Isiraely, sy ny hampijaliana izay nampahory azy'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah:'
mg1865::mg_24::30::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Soratinao amin''ny boky ny teny rehetra izay efa nolazaiko taminao.'
mg1865::mg_24::30::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, avy ny andro, hoy Jehovah, izay hampodiako ny oloko, dia ny Isiraely sy ny Joda, avy amin''ny fahababoany, hoy Jehovah; eny, hampody azy ho amin''ny tany izay efa nomeko ny razany Aho, dia ho azy izany.'
mg1865::mg_24::30::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no teny izay nolazain''i Jehovah ny amin''ny Isiraely sy ny Joda,'
mg1865::mg_24::30::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, izao no lazain''i Jehovah: Feo mampangovitra no renay; Misy tahotra, fa tsy fiadanana.'
mg1865::mg_24::30::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anontanionareo ka izahao, raha mba misy lehilahy mihetsi-jaza; Koa nahoana no samy hitako manery ny valahany amin''ny tanany avy ny lehilahy rehetra hoatra ilay efa mihetsi-jaza iny, ary ny tarehy rehetra dia efa tonga hatsatra avokoa?'
mg1865::mg_24::30::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! fa lehibe izany andro izany, ka tsy misy tahaka azy; Andro fahoriana ho an''i Jakoba izany, nefa ho voavonjy ho afaka amin''izany ihany izy.'
mg1865::mg_24::30::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany andro izany, hoy Jehovah, Tompon''ny maro, dia hotapahiko ny ziogany ho afaka amin''ny vozonao sy hotosako ny fatoranao. Ary ny firenena hafa tsy hampanompo anao* intsony; [*Hebreo: azy]'
mg1865::mg_24::30::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao hanompo an''i Jehovah Andriamanitrao* sy Davida Mpanjakanao*, Izay hatsangako ho anao. [*Hebreo: Mpanjakany]'
mg1865::mg_24::30::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza matahotra ianao, ry Jakoba mpanompoko, hoy Jehovah; Ary aza mivadi-po, ry Isiraely; Fa, indro, hovonjeko avy any lavitra ianao ary ny taranakao avy any amin''ny tany izay nahababo azy; Dia hiverina Jakoba ka hiadana sy handry fahizay, ka tsy hisy hanaitaitra azy.'
mg1865::mg_24::30::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa momba anao hamonjy anao Aho, hoy Jehovah; Koa na dia levoniko aza ny firenena rehetra izay nampielezako anao, Ianao tsy mba holevoniko; Nefa kosa mba hanariko araka ny antonony ihany ianao, fa tsy dia havelako fotsiny.'
mg1865::mg_24::30::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Maharary ny faharatranao, ary tsy azo sitranina ny ferinao.'
mg1865::mg_24::30::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy handahatra ny teninao; Tsy manana plasitera fanasitranana hapetaka amin''ny ferinao ianao*. [*Na: Tsy misy mikarakara ny raharahanao hamoritana ny ferinao, Ary tsy, manana plasitera fanasitranana ianao]'
mg1865::mg_24::30::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo tia anao dia efa nanadino anao avokoa, tsy mba notadiaviny ianao; Fa famelin''ny fahavalo no namelezako anao, dia ny famaizan''ny lozabe, noho ny habetsahan''ny helokao sy ny hamaroan''ny fahotanao.'
mg1865::mg_24::30::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianao no mitaraina noho ny faharatranao sy noho ny fanaintainanao izay tsy azo atsahatra? Fa noho ny habetsahan''ny helokao sy ny hamaroan''ny fahotanao no nanaovako izany taminao.'
mg1865::mg_24::30::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay rehetra mihinana anao dia mba hohanina, ary izay rehetra mampahory anao dia ho lasan-ko babo, izay mamabo anao dia hobaboina, ary Izay rehetra mandroba anao dia hatolotro horobaina.'
mg1865::mg_24::30::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hotanterahiko ny fanasitranana anao, eny, hositraniko ny faharatranao, hoy Jehovah, noho ny nanaovany anao hoe: Ilay noroahina, sy hoe: Ziona tsy misy mpitady ity.'
mg1865::mg_24::30::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, hampodiko avy amin''ny fahababoana ny lain''i Jakoba, ary ny fonenany dia hamindrako fo; ka ny tanàna dia haorina ao amin''ny havoany, ary ny lapan''andriana hitoetra ao amin''izay mahamety azy.'
mg1865::mg_24::30::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy fisaorana sy feon''ny mifaly avy ao; Dia hahamaro azy Aho, ka tsy ho vitsy izy, sady hanome voninahitra azy Aho, ka tsy ho ambany izy.'
mg1865::mg_24::30::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanany koa ho tahaka ny tany aloha, ary ny fiangonany hampitoerina eo anatrehako, dia hovaliako izay rehetra mampahory azy.'
mg1865::mg_24::30::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay malazany dia ho avy ao aminy ihany, ary ny mpanapaka azy dia ho avy ao aminy ihany koa; Ary hampanakaiky azy Aho, ka dia hanatona Ahy izy, fa iza no sahy hanao ny ainy* ho antoka ka hanatona Ahy? hoy Jehovah. [*Hebreo: fony]'
mg1865::mg_24::30::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo ho oloko, ary Izaho ho Andriamanitrareo.'
mg1865::mg_24::30::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! ny tadion''i Jehovah! Mivoaka ny fahatezerana sy ny tadio mitambolimbolina ka miantonta amin''ny lohan''ny ratsy fanahy.'
mg1865::mg_24::30::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firehetan''ny fahatezeran''i Jehovah tsy ho afaka ambara-panefany sy ambara-panatanterany ny hevitry ny fony; Mbola ho fantatrareo marimarina izany any am-parany.'
mg1865::mg_24::31::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny famindram-po ho an''ny firenen''Isiraely, sy ny fanekena hatao aminy'
  verse_text: 'Amin''izany andro izany, hoy Jehovah, dia ho Andriamanitry ny isam-pianakavian''ny Isiraely Aho, ary izy ho oloko.'
mg1865::mg_24::31::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Hahita* fitia any an''efitra ny olona izay sisa tsy matin''ny sabatra; Handeha Aho ka hanome* fitsaharana ho an''ny Isiraely. [*Na: Nahita, Na: Nandeha Aho ka nanome]'
mg1865::mg_24::31::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany lavitra any* no nisehoan''i Jehovah tamiko ka nanao hoe: Fitiavana mandrakizay no nitiavako anao, koa izany no nampaharetako famindram-po ho anao. [*Na: Tamin''ny fahiny]'
mg1865::mg_24::31::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hanorina anao indray Aho, ka dia hiorina ianao, ry Isiraely virijina! Ary mbola hiravaka mitondra ny ampongatapakao ianao ka hivoaka amin''ny dihin''ny mifaly.'
mg1865::mg_24::31::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hanao tanim-boaloboka ao amin''ny tendrombohitr''i Samaria ianao; Ny mpamboly dia hamboly sady hihinana ny vokatra.'
mg1865::mg_24::31::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mbola hisy andro hiantsoan''ny mpitazana any amin''ny tany havoan''i Efraima hoe: Mitsangana ianareo, ka andeha isika hiakatra any Ziona, Ho any amin''i Jehovah Andriamanitsika.'
mg1865::mg_24::31::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Mihobia amin''ny fifaliana noho ny amin''i Jakoba, ary mifalia noho ny amin''ny lohan''ny firenena, torionareo, deraonareo, ka ataovy hoe: Jehovah o, vonjeo ny olonao, dia ny sisa amin''ny Isiraely.'
mg1865::mg_24::31::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hitondra azy avy any amin''ny tany avaratra Aho sy hanangona azy avy any amin''ny faran''ny tany, ka dia samy ho eny aminy avokoa na ny jamba na ny mandringa, na izay manan''anaka na izay mihetsi-jaza; Irai-dia marenina no hiverina aty.'
mg1865::mg_24::31::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fitomaniana no hihaviany, ary amin''ny fifonany no hitondrako azy; Ary ho entiko ho eny amoron''ny renirano izy, amin''ny lalana mahitsy izay tsy hahatafintohina azy; Fa Rain''Isiraely Aho, ary Efraima no lahimatoako.'
mg1865::mg_24::31::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny tenin''i Jehovah, ianareo jentilisa, ary torio any amin''ny tany amoron-tsiraka any lavitra any izany, ka atao hoe: Izay nampiely ny Isiraely no hanangona azy indray sady hitandrina azy toy ny fitandrin''ny mpiandry ondry ny ondriny.'
mg1865::mg_24::31::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nanavotra an''i Jakoba sy efa nanafaka azy tamin''ny tanan''ny mahery noho izy.'
mg1865::mg_24::31::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho avy ireny ka hihoby ao amin''ny havoan''i Ziona, dia hitanjozotra ho any amin''ny zava-tsoan''i Jehovah, dia ny vary sy ny ranom-boaloboka sy ny diloilo sy ny zanak''ondry ary ny zanak''omby; Ary ny fanahiny ho toy ny tanimboly vonton-drano, ka tsy hihamalazo intsony.'
mg1865::mg_24::31::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia ho faly amin''ny fandihizana ny virijina mbamin''ny zatovo sy ny antitra koa; Fa hampodiko ho fifaliana ny fitomaniany, ka hampiononiko sy hampifaliko izy ho afaka alahelo.'
mg1865::mg_24::31::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hovokisako zava-matavy ny fanahin''ny mpisorona, ary ny oloko ho voky ny zava-tsoako, hoy Jehovah.'
mg1865::mg_24::31::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Nisy feo re tao Rama, dia fidradradradrana sy fitomaniana fatratra; Rahely nitomany ny zanany, ary tsy azo nampiononina izy noho ny amin''ny zanany, satria lany ritra ireny.'
mg1865::mg_24::31::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Atsaharo ny fitomanianao sy ny fandatsahanao ranomaso; Fa hisy valiny tokoa ny ataonao, hoy Jehovah, ary hody avy any amin''ny tanin''ny fahavalo ireny.'
mg1865::mg_24::31::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary misy fanantenana ho anao any amparany, hoy Jehovah; Fa ny zaza dia hiverina ho any amin''ny taniny indray.'
mg1865::mg_24::31::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa reko tokoa Efraima nitomany ny tenany hoe: Nofaizanao aho, eny, nofaizana toy ny ombilahy kely tsy voafolaka; Avereno aho, dia ho tafaverina, fa Ianao no Jehovah Andriamanitro.'
mg1865::mg_24::31::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony efa niverina tokoa aho, dia vao nahalala fanenenana; Ary rehefa nampahafantarina ny toe-tenako aho, dia niteha-tratra*; Menatra sady mangaihay aho, fa latsain''ny tsinin''ny fahatanorako. [*Hebreo: niteha-pe]'
mg1865::mg_24::31::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zanako mahafinaritra va Efraima, zaza malalako va izy, no dia fatra-pahatsiaro azy isaky ny mitezitra azy Aho? Noho izany dia onena azy ny foko*; Hamindra fo aminy tokoa Aho, hoy Jehovah. [*Hebreo: maneno ny tsinaiko]'
mg1865::mg_24::31::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: '2022-10-24T04:42:58+0000'
  verse_title: null
  verse_text: 'Manangàna famantaran-dàlana ho anao ianao, manorena tsangam-bato; Saino tsara ny lalana efa voavoatra, dia ilay lalana efa nalehanao; Miverena indray, ry Isiraely virijina, miverena indray ho amin''ireto tanànanao ireto.'
mg1865::mg_24::31::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hirioriovanao, ry zanakavavy mpiodina? Fa Jehovah efa namorona zava-baovao amin''ny tany: Vehivavy no hanodidina lehilahy.'
mg1865::mg_24::31::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 23
  verse_date_revised: '2022-08-10T06:23:21+0000'
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Mbola holazaina indray ao amin''ny tanin''ny Joda sy ao amin''ny tanànany izao teny izao, raha hampodiko avy amin''ny fahababoany izy: Hotahin''i Jehovah anie ianao, ry fonenan''ny fahamarinana, sy ry tendrombohitry ny fahamasinana!'
mg1865::mg_24::31::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda sy ny tanànany rehetra dia hiara-monina ao aminy ho mpiasa tany sy ho mpilasy mitondra ny andian''ny ondry aman''osiny.'
mg1865::mg_24::31::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanahy ana dia hampisotroiko, ary ny fanahy mihaosa rehetra dia hovokisako.'
mg1865::mg_24::31::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia nahatsiaro aho ka nahita; Ary mamiko ny torimasoko.'
mg1865::mg_24::31::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, ka hafafiko eo amin''ny taranak''Isiraely sy ny taranak''i Joda Ny taranak''olombelona sy ny taranaky ny biby fiompy.'
mg1865::mg_24::31::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny niambenako azy hongotana sy hazera sy harodana sy horavana ary hampahorina, dia ho toy izany no hiambenako azy Haorina sy hambolena kosa, hoy Jehovah.'
mg1865::mg_24::31::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany izy dia tsy hanao intsony hoe: ny ray no nihinana voaloboka maharikivy, ka ny nifin''ny zanany no madilo.'
mg1865::mg_24::31::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona rehetra samy ho fatin''ny helony avy; Izay rehetra homana ny voaloboka maharikivy. Dia izy ihany no hadilo nify.'
mg1865::mg_24::31::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, Izay hanaovako fanekena vaovao amin''ny taranak''Isiraely sy ny taranak''i Joda,'
mg1865::mg_24::31::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy araka ny fanekena nataoko tamin''ny razany tamin''ny andro nitantanako azy nitondra azy nivoaka avy tany amin''ny tany Egypta; Fa izy ireny dia nivadika ny fanekeko, Nefa Izaho no vadiny*, hoy Jehovah. [*Na: tompony]'
mg1865::mg_24::31::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no fanekena hataoko amin''ny taranak''Isiraely. Rehefa afaka izany andro izany, hoy Jehovah: Dia hataoko ao an-tsainy ny lalàko sady hosoratako ao am-pony; Ary Izaho ho Andriamaniny, ary izy ho oloko.'
mg1865::mg_24::31::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy intsony izy hoe: Mahalalà an''i Jehovah; Fa samy hahalala Ahy avokoa izy rehetra. Hatramin''ny kely indrindra ka hatramin''ny lehibe indrindra, hoy Jehovah; Fa havelako ny helony, ary tsy hotsarovako intsony ny fahotany.'
mg1865::mg_24::31::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Izay manome ny masoandro ho fahazavana amin''ny antoandro ary ny filahatry ny volana sy ny kintana ho fahazavana amin''ny alina, Izay mampanonja ny ranomasina, ka dia mirohondrohona ny onjany, Jehovah, Tompon''ny maro, no anarany:'
mg1865::mg_24::31::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miova eo anoloako izany filahatra izany, hoy Jehovah, dia hitsahatra tsy ho firenena eo anatrehako mandrakizay kosa ny taranak''Isiraely.'
mg1865::mg_24::31::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Raha misy maharefy ny lanitra ambony, na mahafantatra ny fanorenan''ny tany ambany, dia Izaho kosa hanary ny taranak''Isiraely rehetra noho izay rehetra nataony, hoy Jehovah.'
mg1865::mg_24::31::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, Izay hanorenana ity tanàna ity indray ho an''i Jehovah hatramin''ny tilikambon''i Hananela ka hatramin''ny vavahady an-jorony.'
mg1865::mg_24::31::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny famolaina dia mbola hohenjaniko mahitsy hatreo an-tampon''ny tendrombohitra Gareba, dia hasangodina ho any Goa;'
mg1865::mg_24::31::40:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 31
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohasaham-paty sy lavenona rehetra sy ny saha rehetra hatramin''ny Lohasahan-driaka Kidrona ka hatramin''ny zoron''ny vavahadin-tsoavaly atsinanana dia ho masina ho an''i Jehovah; Tsy hongotana na horavana intsony izy mandrakizay.'
mg1865::mg_24::32::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nividianan''i Jeremia tany ho vavolombelon''ny finoany fa mbola hampodina ny Isiraely'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah tamin''ny taona fahafolo nanjakan''i Zedekia, mpanjakan''ny Joda, dia ny taona fahavalo ambin''ny folo nanjakan''i Nebokadnezara.'
mg1865::mg_24::32::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''izany no nanaovan''ny miaramilan''ny mpanjakan''i Babylona fahirano an''i Jerosalema; ary Jeremia mpaminany nambenana teo an-kianjan''ny trano fiambenana, izay teo amin''ny tranon''ny mpanjakan''ny Joda.'
mg1865::mg_24::32::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zedekia, mpanjakan''ny Joda, nampiambina azy ka nanao hoe: Nahoana ianao no maminany hoe: Izao no lazain''i Jehovah: Indro, hatolotro eo an-tanan''ny mpanjakan''i Babylona ity tanàna ity, ka ho afany;'
mg1865::mg_24::32::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Zedekia, mpanjakan''ny Joda, dia tsy ho afa-mandositra ny tanan''ny Kaldeana, fa hatolotra eo an-tanan''ny mpanjakan''i Babylona tokoa izy, ary hiteny aminy mifanatrika izy sady hifankahita maso aminy;'
mg1865::mg_24::32::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho any Babylona no hitondrana an''i Zedekia, ka ho any izy ambara-pamangiko azy, hoy Jehovah; na dia miady amin''ny Kaldeana aza ianareo, dia tsy hambinina.'
mg1865::mg_24::32::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeremia: Tonga tamiko ny tenin''i Jehovah hoe:'
mg1865::mg_24::32::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro Hanamela, zanak''i Saloma, rahalahin-drainao, ho avy eto aminao hanao hoe: Vidionao ny sahako izay ao Anatota, fa ianao no havana akaiky tokony hanavotra azy.'
mg1865::mg_24::32::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hanamela, zana-drahalahin''ikaky, dia tonga tamiko teo an-kianjan''ny trano fiambenana araka ny tenin''i Jehovah, ka hoy izy tamiko: Masïna ianao, vidio ny sahako izay ao Anatota, dia ilay ao amin''ny tanin''ny Benjamina, fa ianao no havana akaiky tokony handova sy hanavotra azy, vidio re ho anao. Ka dia fantatro fa tenin''i Jehovah izany.'
mg1865::mg_24::32::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novidiko tamin''i Hanamela, zana-drahalahin''ikaky, ny saha izay tao Anatota, ary nolanjaiko ny vola, dia sekely volafotsy fito ambin''ny folo.'
mg1865::mg_24::32::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nosoratako tamin''ny taratasy izany ka nasiako tombo-kase sady nasiako vavolombelona, ary nolanjaiko tamin''ny mizana ny vola.'
mg1865::mg_24::32::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia noraisiko ny taratasy nisy ny fanekena tamin''ny vidin-tany, dia ilay voaisy tombo-kase araka ny lalàna sy ny fanao, mbamin''ny taratasy mivelatra koa;'
mg1865::mg_24::32::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia natolotro an''i Baroka, zanak''i Neria, zanak''i Mahaseia, ilay taratasy nisy ny fanekena tamin''ny vidin-tany, teo imason''i Hanamela, zana-drahalahin''ikaky, sy teo anatrehan''ny vavolombelona izay nanao sonia tamin''ny taratasy nisy ny fanekena tamin''ny vidin-tany, dia teo anatrehan''ny Jiosy rehetra izay nipetraka teo an-kianjan''ny trano fiambenana.'
mg1865::mg_24::32::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandidy an''i Baroka teo anatrehan''ireo aho nanao hoe:'
mg1865::mg_24::32::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jenovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ento ireto taratasy ireto, dia ireto taratasy misy ny fanekena amin''ny vidin-tany, dia ilay misy tombo-kase, mbamin''ny taratasy mivelatra, ary ataovy ao anaty vilany tany izy mba haharitra ela.'
mg1865::mg_24::32::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Mbola hisy trano sy saha ary tanim-boaloboka hovidina indray eto amin''ity tany ity.'
mg1865::mg_24::32::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voatolotra an''i Baroka, zanak''i Neria, ilay taratasy nisy ny fanekena tamin''ny vidin-tany, dia nivavaka tamin''i Jehovah aho hoe:'
mg1865::mg_24::32::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy, Jehovah Tompo o! Indro, Ianao no nanao ny lanitra sy ny tany tamin''ny herinao lehibe sy ny sandrinao ahinjitra, ary tsy misy zava-mahagaga izay tsy hainao.'
mg1865::mg_24::32::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindra fo amin''ny arivo arivo Ianao ary mamaly ny heloky ny ray ho ao an-tratran''ny zanany mandimby azy dia Andriamanitra lehibe sy mahery, Jehovah, Tompon''ny maro, no anarany,'
mg1865::mg_24::32::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'lehibe amin''ny fisainana sy mahery amin''ny atao; fa ny masonao mibanjina ny alehan''ny zanak''olombelona rehetra mba hanome azy rehetra araka ny lalany avy sy araka ny vokatry ny asany,'
mg1865::mg_24::32::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Ilay nanisy famantarana sy fahagagana tany amin''ny tany Egypta ka mandraka androany koa, na ao amin''ny Isiraely, na ao amin''ny olona hafa koa, ka dia nanao anarana ho Anao tahaka ny amin''izao anio izao.'
mg1865::mg_24::32::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra ny Isiraely olonao nivoaka avy tany amin''ny tany Egypta Ianao tamin''ny famantarana sy ny fahagagana ary ny tanana mahery sy ny sandry nahinjitra ary ny fampahatahorana lehibe,'
mg1865::mg_24::32::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nanome azy ity tany ity, izay efa nianiananao nolazainao tamin''ny razany homena azy, dia tany tondra-dronono sy tantely.'
mg1865::mg_24::32::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga teto izy, dia nandova azy, nefa tsy nihaino ny feonao izy sady tsy nandeha araka ny lalànao; ary tsy nanao na inona na inona tamin''izay rehetra nasainao nataony izy, ka dia nataonao mihatra aminy izao loza rehetra izao.'
mg1865::mg_24::32::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny tovon-tany efa miorina akaikin''ny tanàna hanafahana azy, ary ny tanàna dia atolotra eo an-tanan''ny Kaldeana izay mamely azy noho ny sabatra sy ny mosary sy ny areti-mandringana; ary izay nolazainao dia tonga, ka indro, hitan''ny masonao izany.'
mg1865::mg_24::32::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ianao, Jehovah Tompo o, dia niteny tamiko ka nanao hoe: Vidionao vola ny saha, ary makà vavolombelona, na dia efa voatolotra eo an-tanan''ny Kaldeana aza ny tanàna.'
mg1865::mg_24::32::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe:'
mg1865::mg_24::32::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho no Jehovah, Andriamanitry ny nofo rehetra; moa misy zava-mahagaga izay tsy haiko va?'
mg1865::mg_24::32::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Indro, efa hatolotro eo an-tanan''ny Kaldeana ity tanàna ity sy eo an-tanan''i Nebokadnezara mpanjakan''i Babylona, ka ho afany.'
mg1865::mg_24::32::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Kaldeana, izay efa mamely ity tanàna ity dia hiditra ary handrehitra afo eto ka handoro azy mbamin''ny trano izay efa nandoroana ditin-kazo manitra teo an-tampony ho an''i Bala, sady nanidinana fanatitra aidina ho an''andriamani-kafa mba hampahatezitra Ahy.'
mg1865::mg_24::32::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay ratsy eo imasoko ihany no nataon''ny Zanak''Isiraely sy ny taranak''i Joda hatry ny fony ireo mbola kely; fa ny Zanak''Isiraely efa nampahatezitra Ahy tamin''ny asan''ny tanany, hoy Jehovah.'
mg1865::mg_24::32::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ity tanàna ity dia efa nampahatezitra sy nampahavinitra Ahy hatramin''ny andro nanorenana azy ka mandraka androany, mba hanesorako azy tsy ho eo anatrehako,'
mg1865::mg_24::32::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny ratsy rehetra nataon''ny Zanak''Isiraely sy ny taranak''i Joda, dia izy sy ny mpanjakany sy ny mpanapaka azy sy ny mpisorony sy ny mpaminaniny sy ny lehilahy amin''ny Joda ary ny mponina any Jerosalema, mba hampahatezitra Ahy.'
mg1865::mg_24::32::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa niamboho Ahy izy, fa tsy nanatrika Ahy, ary na dia nampianariko aza izy — eny, nifoha maraina koa Aho ka nampianatra azy, dia tsy nihaino mba hahazoany anatra izy.'
mg1865::mg_24::32::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nametraka ny fahavetavetany tato amin''ny trano izay efa niantsoana ny anarako izy handotoany azy;'
mg1865::mg_24::32::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanorina ny fitoerana avon''i Bala, izay ao amin''ny Lohasahan''ny taranak''i Hinoma, izy mba hampandeha ny zananilahy sy ny zananivavy hamaky ny afo ho an''i Moloka, izay tsy nandidiako azy, na tao an-tsaiko akory aza, ka dia nanao izany fahavetavetana izany izy mba hampanota ny Joda.'
mg1865::mg_24::32::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia izao no lazain''i Jehovah, Andriamanitry ny Isiraely, ny amin''ity tanàna ity, izay ataonareo hoe: Hatolotra eo an-tanan''ny mpanjakan''i Babylona amin''ny sabatra sy ny mosary ary ny areti-mandringana izy:'
mg1865::mg_24::32::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro izy hangoniko avy any amin''ny tany rehetra izay nandroahako azy tamin''ny fahatezerako sy ny fisafoahako ary ny fahavinirana be; ary ho entiko amin''ity tany ity indray izy ka hataoko mandry fahizay;'
mg1865::mg_24::32::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy ho oloko, ary Izaho ho Andriamaniny.'
mg1865::mg_24::32::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia homeko fo iray sy lalana iray izy, mba hatahorany Ahy lalandava hahasoa azy sy ny zanany mandimby azy;'
mg1865::mg_24::32::40:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanao fanekena mandrakizay aminy Aho, dia ny tsy hitsaharako amin''ny fanasoavako azy; ary ny fahatahorana Ahy dia hataoko ao am-pony kosa, mba tsy hialany amiko.'
mg1865::mg_24::32::41:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho faly aminy Aho ka hahasoa azy, dia hamboly azy amin''ity tany ity tokoa amin''ny foko rehetra sy ny fanahiko rehetra.'
mg1865::mg_24::32::42:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Araka ny nampahatongavako izao loza lehibe rehetra izao tamin''ity firenena ity, dia araka izany asa no hampahatongavako ny soa rehetra izay nokasaiko* ho azy. [*Hebreo: nolazaiko]'
mg1865::mg_24::32::43:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola hisy fividianana saha eto amin''ity tany ity, izay ataonareo hoe Tany lao tsy misy olona na biby fiompy sady efa voatolotra eo an-tanan''ny Kaldeana.'
mg1865::mg_24::32::44:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 32
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, saha no hovidin''ny olona vola, ka hosoratany amin''ny taratasy sy hasiany tombo-kase ary hasiany vavolombelona ao amin''ny tanin''ny Benjamina sy amin''ny manodidina an''i Jerosalema sy amin''ny tanànan''ny Joda sy amin''ny tanàna any amin''ny tany havoana sy amin''ny tanàna ny amin''ny tany lemaka amoron-tsiraka* ary amin''ny tanàna any amin''ny tany atsimo; fa hampodiko avy amin''ny fahababoany izy, hoy Jehovah. [*Hebreo: Sefela]'
mg1865::mg_24::33::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Teny anankiray koa ny amin''ny mbola hampodiana ny Isiraely sy ny voninahitra mbola ho azony'
  verse_text: 'Ary tonga fanindroany tamin''i Jeremia ny tenin''i Jehovah, raha mbola voahazona teo an-kianjan''ny trano fiambenana ihany izy, nanao hoe:'
mg1865::mg_24::33::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Mpanao izany, dia Jehovah Izay namorona izany mba hampitoetra azy; Jehovah no anarany;'
mg1865::mg_24::33::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Antsoy Aho, dia hovaliako ianao ka hampisehoako zavatra lehibe sy saro-pantarina izay tsy fantatrao.'
mg1865::mg_24::33::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Andriamanitry ny Isiraely; Ny amin''ny trano amin''ity tanàna ity sy ny amin''ny lapan''ny mpanjakan''ny Joda, izay noravana noho ny tovon-tany sy ny sabatra,'
mg1865::mg_24::33::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandroso hiady amin''ny Kaldeana izy ka mameno ny trano amin''ny fatin''olona, izay novonoiko tamin''ny fahatezerako sy ny fahavinirako, sady nanafenako ny tavako tamin''ity tanàna ity noho ny faharatsiany rehetra:'
mg1865::mg_24::33::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, hotanterahiko tokoa ny fanasitranana azy, eny, hositraniko izy, ary hasehoko aminy ny haren''ny fiadanana sy ny fahamarinana.'
mg1865::mg_24::33::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda sy ny Isiraely dia hampodiko avy amin''ny fahababoany, ka haoriko ho toy ny taloha izy.'
mg1865::mg_24::33::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hodioviko ho afaka amin''ny helony rehetra izy, izay nanotany tamiko; Ka havelako ny helony rehetra, izay nanotany sy niodinany tamiko.'
mg1865::mg_24::33::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho anarana mahafaly Ahy izany sady ho dera sy voninahitra ho an''ny firenena rehetra ambonin''ny tany, izay handre ny soa rehetra ataoko aminy; Dia hatahotra sy hangovitra izy noho ny soa rehetra sy noho ny fiadanana rehetra izay hataoko aminy.'
mg1865::mg_24::33::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Mbola ho re indray eto amin''ity tany ity, izay ataonareo hoe Rava, ka tsy misy olona na biby fiompy intsony dia eto amin''ny tanànan''ny Joda sy ao amin''ny lalamben''i Jerosalema izay efa lao, ka tsy misy olona na mponina na biby fiompy'
mg1865::mg_24::33::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina ary ny feon''izay manao hoe: Miderà an''i Jehovah, Tompon''ny maro, fa tsara Izy, fa mandrakizay ny famindram-pony, dia izay mitondra fanati-pisaorana ho ao an-tranon''i Jehovah; Fa hataoko tonga tahaka ny tany aloha ny fahatsarany*, hoy Jehovah. [*Hebreo: hampodiko avy amin''ny fahababoana]'
mg1865::mg_24::33::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Eto amin''ity tany efa lao tsy misy olona na biby fiompy ity sy amin''ny tanànany rehetra dia mbola hisy fonenan''ny mpiandry ondry hampandriany ny ondry aman''osiny,'
mg1865::mg_24::33::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia amin''ny tanàna any amin''ny tany havoana sy amin''ny tanàna any amin''ny tany lemaka amoron-tsiraka, ary amin''ny tanana any amin''ny tany atsimo sy amin''ny tanin''ny Benjamina sy amin''ny manodidina an''i Jerosalema ary amin''ny tanànan''ny Joda, ary ny ondry aman''osy mbola handroso araka ny fitondran''ny mpanisa azy, hoy Jehovah.'
mg1865::mg_24::33::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: '2022-12-11T07:13:53+0000'
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, Izay hanatanterahako ny teny soa, izay nolazaiko ny amin''ny taranak''Isiraely sy ny taranak''i Joda.'
mg1865::mg_24::33::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany sy amin''izany fotoana izany dia hampaniry Rantsana* marina ho an''i Davida Aho; Ary hanao fitsarana sy fahamarinana amin''ny tany Izy. [*Na: Solofo]'
mg1865::mg_24::33::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hovonjena ny Joda, ary Jerosalema handry fahizay; Ary izao no hanononana azy: Jehovah Fahamarinantsika.'
mg1865::mg_24::33::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Davida tsy ho diso zanakalahy Hipetraka eo amin''ny seza fiandrianan''ny taranak''Isiraely;'
mg1865::mg_24::33::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita mpisorona tsy ho diso zanakalahy ho eo anatrehako, Mba hanaterany mandrakariva fanatitra dorana sy fanatitra hohanina* ary fanatitra hafa alatsa-drà. [*Na: sy handoroany fanatitra hohanina]'
mg1865::mg_24::33::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah nanao hoe:'
mg1865::mg_24::33::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Raha mahafoana ny fanekeko ny amin''ny andro sy ny fanekeko ny amin''ny alina ianareo, mba tsy hisy andro sy alina amin''ny fotoany,'
mg1865::mg_24::33::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho azo foanana koa ny fanekeko tamin''i Davida mpanompoko, tsy hananany zanakalahy hanjaka eo amin''ny seza fiandrianany, sy ny amin''ny Levita mpisorona, mpanompoko.'
mg1865::mg_24::33::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny hamaroan''ny kintana eny amin''ny lanitra, izay tsy azo isaina, ary toy ny fasika any amin''ny ranomasina, izay tsy azo afàtra, dia toy izany no hanamaroako ny taranak''i Davida mpanompoko sy ny Levita, izay manao fanompoam-pivavahana ho Ahy.'
mg1865::mg_24::33::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah nanao hoe:'
mg1865::mg_24::33::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hitanao va izay nolazain''ity firenena ity hoe: Ny fianakaviana roa izay nofidin''i Jehovah dia efa nariany; Toy izany no anamavoany ny oloko, ka dia tsy vanon-ko firenena eo imasony intsony izy.'
mg1865::mg_24::33::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Raha tsy amin''ny andro sy ny alina ny fanekeko, ary raha tsy notendreko ny lalàna fitondrana ny lanitra sy ny tany,'
mg1865::mg_24::33::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 33
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hariako ny taranak''i Jakoba sy Davida mpanompoko, ka ny taranany tsy mba hanalako ho mpanapaka ny taranak''i Abrahama sy Isaka ary Jakoba; Fa hampodiko avy amin''ny fahababoana izy ka hamindrako fo.'
mg1865::mg_24::34::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny hanjo an''i Zedekia, sy fananarana ny olona noho izy nanandevo indray izay efa novotsorany'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah, fony Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra ary ny fanjakana rehetra amin''ny tany izay nanjakany mbamin''ny firenena rehetra izay namely an''i Jerosalema sy ny tanànany rehetra, nanao hoe:'
mg1865::mg_24::34::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Mandehana, lazao amin''i Zedekia, mpanjakan''ny Joda, ka ambarao aminy hoe: Izao no lazain''i Jehovah: Indro, hatolotro eo an-tanan''ny mpanjakan''i Babylona ity tanàna ity, ka hodorany amin''ny afo izy;'
mg1865::mg_24::34::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ianao tsy ho afa-mandositra ny tanany, fa ho voasambotra tokoa ka hatolotra eo an-tanany; ary ny masonao hahita ny mason''ny mpanjakan''i Babylona, dia hiteny mifanatrika aminao izy, sady ho tonga any Babylona ianao.'
mg1865::mg_24::34::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa henoy ny tenin''i Jehovah, ry Zedekia, mpanjakan''ny Joda. Izao no lazain''i Jehovah ny aminao: Tsy ho fatin-tsabatra ianao.'
mg1865::mg_24::34::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny fiadanana no hahafatesanao, ary handoro zavatra ho fisaonana anao ny olona, tahaka ny nandoroany ho fisaonana ny razanao, dia ireny mpanjaka fahiny tany alohanao, ary hitomany anao ny olona hoe: Indrisy ry tompoko; fa Izaho no efa nilaza izany, hoy Jehovah.'
mg1865::mg_24::34::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazain''i Jeremia mpaminany tamin''i Zedekia, mpanjakan''ny Joda. tany Jerosalema izany teny rehetra izany.'
mg1865::mg_24::34::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fony ny miaramilan''ny mpanjakan''i Babylona mbola namely an''i Jerosalema sy ny tanànan''ny Joda sisa rehetra, dia Lakisy sy Azeka: fa ireo ihany no tanàna mimanda sisa tamin''ny tanànan''ny Joda.'
mg1865::mg_24::34::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah, rehefa nanao fanekena tamin''ny vahoaka rehetra izay tany Jerosalema Zedekia mpanjaka hitory fanafahana aminy,'
mg1865::mg_24::34::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba samy handefa ny ankizilahiny sy ny ankizivaviny, dia izay Hebreolahy sy Hebreovavy, ho afaka, mba tsy hisy hampanompo ny Jiosy rahalahiny intsony.'
mg1865::mg_24::34::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nanaiky ny mpanapaka rehetra sy ny vahoaka rehetra izay nanao ny fanekena, samy handefa ny ankizilahiny sy ny ankizivaviny ho afaka mba tsy hampanompoany azy intsony; eny, nanaiky izy, ka samy nandefa azy ho afaka.'
mg1865::mg_24::34::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo taorian''izany dia nanenina izy, ka naveriny indray ireo ankizilahy sy ankizivavy izay efa nalefany ho afaka ireo, dia nandevoziny ho ankizilahiny sy ho ankizivaviny indray.'
mg1865::mg_24::34::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah hoe:'
mg1865::mg_24::34::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Izaho efa nanao fanekena tamin''ny razanareo tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta hiala tamin''ny trano nahandevozana nanao hoe:'
mg1865::mg_24::34::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isam-pito taona samia mandefa ny Hebreo rahalahiny, izay namidy taminao; ka rehefa nanompo anao enin-taona izy, dia alefaso ho afaka; nefa ny razanareo tsy nihaino Ahy ka nanongilana ny sofiny.'
mg1865::mg_24::34::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nibebaka ianareo androany ka nanao izay mahitsy eo imasoko tamin''ny niantsoanareo fanafahana, samy handefa ny rahalahiny avy; ary nanao fanekena teo anatrehako ianareo, dia tao amin''ny trano izay efa niantsoana ny anarako;'
mg1865::mg_24::34::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanjo nivadika indray ianareo ka tsy nanamasina ny anarako, fa samy namerina ny ankizilahiny sy ny ankizivaviny, izay efa nalefanareo handeha araka izay tiany, dia nanandevo azy ho ankizilahiny sy ho ankizivaviny indray.'
mg1865::mg_24::34::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Ianareo tsy nihaino Ahy ka tsy nety nitory fanafahana ho an''ny rahalahinareo sy ny namanareo avy; dia, indro, miantso fanafahana ho anareo kosa Aho, hoy Jehovah, nefa ho an''ny sabatra sy ny areti-mandringana ary ny mosary; ary hatolotro ho mpanjenjena any amin*''ny fanjakana rehetra amin''ny tany ianareo. [*Na: ho fampangovitana]'
mg1865::mg_24::34::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatolotro ny olona izay nivadika ny fanekeko ka tsy nahatana ny tenin''ny fanekena, izay nataony teo anatrehako fony nosasahiny ny ombilahy kely, ka nandeha teo anelanelan''ny tapany izy,'
mg1865::mg_24::34::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, hatolotro ny mpanapaka ny Joda sy ny mpanapaka any Jerosalema sy ny tandapa sy ny mpisorona ary ny vahoaka rehetra, izay nandeha teo anelanelan''ny tapaky ny ombilahy kely,'
mg1865::mg_24::34::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hatolotro eo an-tanan''ny fahavalony sy eo an-tanan''izay mitady ny ainy, ary ho fihinan''ny voro-manidina sy ny bibi-dia ny fatiny.'
mg1865::mg_24::34::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia, mpanjakan''ny Joda, sy ny mpanapaka dia hatolotro eo an-tanan''ny fahavalony sy eo an-tanan''izay mitady ny ainy ary eo an-tanan''ny miaramilan''ny mpanjakan''i Babylona, izay efa lasa niala taminareo.'
mg1865::mg_24::34::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, handidy Aho, hoy Jehovah, ary hampivereniko ho amin''ity tanàna ity ireo; ary hasiany ity ka ho afany, dia hodorany amin''ny afo; ary ny tanànan''ny Joda dia hofoanako tsy hisy mponina.'
mg1865::mg_24::35::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Rekabita'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah tamin''ny andron''i Joiakima, zanak''i Josia. mpanjakan''ny Joda, nanao hoe:'
mg1865::mg_24::35::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa any amin''ny taranak''i Rekaba, ary mitenena aminy, dia ampidiro ao an-tranon''i Jehovah, ao amin''ny efi-trano anankiray, izy, ka omeo divay hosotroiny.'
mg1865::mg_24::35::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalaiko Jazania, zanak''i Jeremia, zanak''i Habazinia, sy ny rahalahiny sy ny zanany rehetra mbamin''ny taranak''i Rekaba rehetra,'
mg1865::mg_24::35::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nampidiriko ho ao amin''ny tranon''i Jehovah izy, dia tao amin''ny efi-tranon''ny taranak''i Hanana zanak''i Jigdalia, lehilahin''Andriamanitra, izay ao anilan''ny efi-tranon''ny mpanapaka, ao ambonin''ny efi-tranon''i Mahaseia, zanak''i Saloma, mpiandry varavarana.'
mg1865::mg_24::35::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary norosoako kapoaka sy siny feno divay teo anoloan''ny taranak''i Rekaba ka nolazaiko taminy hoe: Misotroa divay ianareo.'
mg1865::mg_24::35::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: '2022-08-22T07:34:21+0000'
  verse_title: null
  verse_text: 'Fa hoy kosa ireo: Tsy hisotro divay izahay; fa Jonadaba, zanak''i Rekaba, razanay efa nanafatra anay hoe: Aza mba misotro divay ianareo na ny taranakareo mandrakizay;'
mg1865::mg_24::35::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza manao trano ianareo, na mamafy voan-javatra, na manao tanim-boaloboka, na mety hanana izany akory, fa lay no itoeronareo amin''ny andronareo rehetra, mba ho ela velona ianareo amin''ny tany izay ivahinianareo.'
mg1865::mg_24::35::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankatoavinay izany tenin''i Jonadaba, zanak''i Rekaba, razanay izany tamin''izay rehetra nanafarany anay, mba tsy hisotro divay amin''ny andronay rehetra, na izahay na ny vadinay, na ny zanakai-lahy, na ny zanakai-vavy;'
mg1865::mg_24::35::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy hanao trano hitoeranay, na hanana tanimboly, na saha, na voan-javatra izahay;'
mg1865::mg_24::35::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nitoetra an-day izahay araka izay rehetra nanafaran''i Jonadaba razanay anay.'
mg1865::mg_24::35::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nananika ny tany Nebokadnezara, mpanjakan''i Babylona. Dia hoy izahay: Andeha isika hankany Jerosalema handositra ny miaramilan''ny Kaldeana sy ny miaramilan''ny Syriana, ka dia izany no itoerany eto Jerosalema.'
mg1865::mg_24::35::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe:'
mg1865::mg_24::35::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Andeha, lazao amin''ny Joda sy amin''ny mponina any Jerosalema hoe: Tsy hino anatra hitandrina ny teniko va ianareo? hoy Jehovah.'
mg1865::mg_24::35::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'To ny tenin''i Jonadaba, zanak''i Rekaba, izay nanafarany ny zanany tsy hisotro divay, fa tsy misotro tokoa izy mandraka androany, fa mahatana ny hafa-drazany, ary Izaho efa niteny taminareo, eny, nifoha maraina koa Aho ka niteny, nefa tsy nihaino ianareo.'
mg1865::mg_24::35::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nirahiko taminareo koa ny mpaminany mpanompoko rehetra, eny, nifoha maraina koa Aho ka naniraka azy hanao hoe: Samia miala amin''ny lalanareo ratsy ianareo ankehitriny, ary ataovy tsara ny ataonareo. ary aza manaraka andriamani-kafa hanompo azy, dia honina amin''ny tany izay nomeko anareo sy ny razanareo ianareo nefa tsy nanongilana ny sofinareo na nihaino Ahy ianareo.'
mg1865::mg_24::35::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nankatoavin''ny zanak''i Jonadaba, zanak''i Rekaba, ny hafa-drazany, izay nanafarany azy; fa ity firenena ity kosa tsy mba nihaino Ahy.'
mg1865::mg_24::35::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Andriamanitry ny maro, Andriamanitry ny Isiraely Indro, hataoko mihatra amin''ny Joda sy ny mponina rehetra any Jerosalema ny loza rehetra izay nolazaiko hatao aminy, satria efa niteny taminy Aho, fa tsy nihaino izy, ary niantso azy Aho, fa tsy namaly izy.'
mg1865::mg_24::35::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Rekaba dia nilazan''i Jeremia hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Noho ny nahatananareo ny hafatr''i Jonadaba razanareo sy ny nitandremanareo ny hafany rehetra ary ny nanaovanareo araka izay rehetra nanafarany anareo,'
mg1865::mg_24::35::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 35
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Jonadaba, zanak''i Rekaba, tsy ho diso zanakalahy hitsangana eo anatrehako mandrakizay.'
mg1865::mg_24::36::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanoratana ny tenin''i Jeremia, sy ny namakiana azy teo an-kianjan''ny tempoly'
  verse_text: 'Ary tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda, dia tonga tamin''i Jeremia avy tamin''i Jehovah izao teny izao hoe:'
mg1865::mg_24::36::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Makà horonan-taratasy ianao, ka soraty amin''izany ny teny rehetra izay nolazaiko taminao ny amin''ny Isiraely sy ny Joda ary ny firenena rehetra hatramin''ny andro nilazako taminao dia hatramin''ny andron''i Josia ka mandraka androany.'
mg1865::mg_24::36::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angamba hoheverin*''ny taranak''i Joda ny loza rehetra izay kasaiko hatao aminy, dia samy hiala amin''ny lalany ratsy avy izy, ka havelako ny helony sy ny fahotany. [*Hebreo: hohenoin'']'
mg1865::mg_24::36::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia niantso an''i Baroka, zanak''i Neria, ary dia nosoratan''i Baroka tamin''ny horonan-taratasy ny tenin''i Jehovah rehetra avy tamin''ny vavan''i Jeremia, dia izay efa nolazainy taminy.'
mg1865::mg_24::36::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia nandidy an''i Baroka hoe: Izaho izao dia voahazona ka tsy afaka mankany an-tranon''i Jehovah;'
mg1865::mg_24::36::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mandehana ianao, ka vakio eo anatrehan''ny vahoaka ao an-tranon''i Jehovah amin''ny andro fifadiankanina ny tenin''i Jehovah, izay efa nosoratanao avy tamin''ny vavako, ary vakio eo anatrehan''ny Joda rehetra izay tonga avy any amin''ny tanànany koa.'
mg1865::mg_24::36::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa angamba ny fifonany hoborahina* eo anatrehan''i Jehovah, ka dia samy hiala amin''ny lalany ratsy avy izy; fa loza ny fahatezerana sy ny fahavinirana izay nolazain''i Jehovah ny amin''ity firenena ity. [*Hebreo: hiankohoka]'
mg1865::mg_24::36::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Baroka, zanak''i Neria, dia nanao araka izay rehetra nandidian''i Jeremia mpaminany azy ka namaky ny tenin''i Jehovah tamin''ny taratasy teo an-tranon''i Jehovah.'
mg1865::mg_24::36::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny volana fahasivy tamin''ny taona fahadimy nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda, dia niantso fifadian-kanina teo anatrehan''i Jehovah izy tamin''ny vahoaka rehetra tany Jerosalema sy tamin''ny olona rehetra izay efa tonga tany Jerosalema avy eny amin''ny tanànan''ny Joda.'
mg1865::mg_24::36::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novakin''i Baroka teo anatrehan''ny vahoaka rehetra tao an-tranon''i Jehovah ny tenin''i Jeremia tamin''ny taratasy, dia tao amin''ny efi-tranon''i Gemaria, zanak''i Safana mpanoratra, teo amin''ny kianja ambony, teo anoloan''ny vavahady vaovao amin''ny tranon''i Jehovah.'
mg1865::mg_24::36::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Mikaia, zanak''i Gemaria, zanak''i Safana, ny tenin''i Jehovah rehetra tamin''ny boky,'
mg1865::mg_24::36::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nidina nankany amin''ny tranon''ny mpanjaka izy ka nankao amin''ny efi-tranon''ny mpanoratra; ary indreo ny mpanapaka rehetra nipetraka teo, dia Elisama mpanoratra sy Delaia, zanak''i Semaia, sy Elnatana zanak''i Akbora, sy Gemaria, zanak''i Safana, sy Zedekia, zanak''i Hanania, mbamin''ny mpanapaka rehetra.'
mg1865::mg_24::36::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambaran''i Mikaia azy ny teny rehetra izay efa reny tamin''ny namakian''i Baroka ny taratasy teo anatrehan''ny vahoaka.'
mg1865::mg_24::36::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirahin''ny mpanapaka rehetra Jehody, zanak''i Netania, zanak''i Selemia, zanak''i Kosy, ho any amin''i Baroka hanao hoe: Ento eny an-tananao ny horonan-taratasy, ilay novakinao teo anatrehan''ny vahoaka, ka mankanesa aty. Dia nentin''i Baroka, zanak''i Neria, teny an-tanany ny horonan-taratasy, ka dia nankany aminy izy.'
mg1865::mg_24::36::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy Ireo taminy: Mipetraha ary, ka vakio eto anatrehanay. Dia novakin''i Baroka teo anatrehany.'
mg1865::mg_24::36::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa reny ny teny rehetra, dia nifampijerijery tamin-tahotra izy, ka hoy izy tamin''i Baroka: Tsy maintsy holazainay amin''ny mpanjaka izany teny rehetra izany.'
mg1865::mg_24::36::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Baroka dia nadininy hoe: Lazao aminay ny nanoratanao izao teny rehetra izao avy tamin''ny vavany.'
mg1865::mg_24::36::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Baroka taminy: Ny vavany no nanonona izany teny rehetra izany tamiko, ka dia nosoratako an-taratasy tamin''ny ranomainty.'
mg1865::mg_24::36::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanapaka tamin''i Baroka: Mandehana, ka miere ianao sy Jeremia, ary aoka tsy hisy olona hahita izay itoeranareo.'
mg1865::mg_24::36::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra tao amin''ny mpanjaka tao amin''ny kianja izy ireo (nefa ny horonan-taratasy efa napetrany tao amin''ny efi-tranon''i Elisama mpanoratra), ary nambarany teo anatrehan''ny mpanjaka ny teny rehetra.'
mg1865::mg_24::36::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nirahin''ny mpanjaka Jehody haka ilay horonan-taratasy, dia nalainy tao amin''ny efi-tranon''i Elisama mpanoratra iny. Ary dia novakin''i Jehody teo anatrehan''ny mpanjaka sy ny mpanapaka rehetra izay nitsangana teo anatrehan''ny mpanjaka izany.'
mg1865::mg_24::36::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nipetraka tao an-trano ririnina tamin''ny volana fahasivy, sady nisy afo nirehitra teo am-patana teo anoloany.'
mg1865::mg_24::36::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa namaky toko telo na efatra Jehody, dia notapatapahin''ny mpanjaka tamin''ny antsipika ny horonan-taratasy ka natsipitsipiny teo anaty afo teo am-patana, mandra-pahalevon''ny afo azy rehetra teo am-patana.'
mg1865::mg_24::36::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 24
  verse_date_revised: '2022-09-26T05:32:47+0000'
  verse_title: null
  verse_text: 'Nefa tsy natahotra akory ireo na nandriatra ny fitafiany, na ny mpanjaka, na ny mpanompony rehetra, izay efa nandre izany teny rehetra izany.'
mg1865::mg_24::36::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia efa nifona tamin''ny mpanjaka aza Elnatana sy Delaia ary Gemaria, mba tsy handoro ny horonan-taratasy, dia tsy nety nihaino azy izy.'
mg1865::mg_24::36::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Jeremela, zanak''andriana, sy Seraia, zanak''i Azriela, ary Selemia, zanak''i Abdela, hisambotra an''i Baroka mpanoratra sy Jeremia mpaminany; fa nafenin''i Jehovah izy roa lahy.'
mg1865::mg_24::36::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah, taorian''ny nandoroan''ny mpanjaka ny horonan-taratasy sy ny teny izay nosoratan''i Baroka avy tamin''ny vavan''i Jeremia, nanao hoe:'
mg1865::mg_24::36::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Makà horonan-taratasy hafa koa indray ianao, ka soraty aminy ilay teny rehetra tamin''ny horonan-taratasy teo, dia ilay nodoran''i Joiakima, mpanjakan''ny Joda.'
mg1865::mg_24::36::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i Joiakima, mpanjakan''ny Joda, dia holazainao hoe: Izao no lazain''i Jehovah: Ianao efa nandoro iny horonan-taratasy iny ka nanao hoe: Ahoana no nanoratanao tamin''iny hoe: Ho avy tokoa ny mpanjakan''i Babylona ka handrava ity tany ity sy hahalany ritra ny olona mbamin''ny biby eto?'
mg1865::mg_24::36::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah ny amin''i Joiakima, mpanjakan''ny Joda: Tsy hanana fara handimby eo amin''ny seza fiandrianan''i Davida izy; ary ny fatiny dia hariana ka hasian''ny hainandro amin''ny antoandro ary ny fanala amin''ny alina.'
mg1865::mg_24::36::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampijaliko izy mbamin''ny taranany sy ny mpanompony noho ny helony; ary havoko mihatra aminy sy amin''ny mponina any Jerosalema ary amin''ny lehilahy amin''ny Joda ny loza rehetra izay nolazaiko hatao aminy, fa tsy nohenoiny.'
mg1865::mg_24::36::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 36
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia dia naka horonan-taratasy hafa koa, ka natolony an''i Baroka mpanoratra, zanak''i Neria, ary izy nanoratra tao avy tamin''ny vavan''i Jeremia ny teny rehetra izay tao amin''ilay horonan-taratasy nodoran''i Joiakima, mpanjakan''ny Joda, tamin''ny afo; sady nampiany teny maro tahaka ireny koa aza.'
mg1865::mg_24::37::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nangatahan''i Zedekia an''i Jeremia hivavaka ho azy, sy ny teny navalin''i Jeremia azy, ary ny nanaovana an''i Jeremia tao an-tranomaizina'
  verse_text: 'Ary Zedekia mpanjaka, zanak''i Josia, dia nanjaka nandimby an''i Jekonia, zanak''i Joiakima, fa nampanjakain''i Nebokadnezara, mpanjakan''i Babylona, tao amin''ny tanin''ny Joda izy;'
mg1865::mg_24::37::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa na izy, na ny mpanompony, na ny vahoaka, dia samy tsy nihaino ny tenin''i Jehovah, izay nampilazainy an''i Jeremia mpaminany.'
mg1865::mg_24::37::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia mpanjaka naniraka an''i Jehokala, zanak''i Selemia, sy Zefania, zanak''i Mahaseia, mpisorona, ho any amin''i Jeremia mpaminany hanao hoe: Mba ivavaho amin''i Jehovah Andriamanitsika re izahay.'
mg1865::mg_24::37::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia mbola niditra sy nivoaka teo amin''ny olona ihany; fa tsy mbola nataony tao an-trano-maizina izy.'
mg1865::mg_24::37::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa niainga avy tany Egypta ny miaramilan''i Farao, ka raha nahare izany ny Kaldeana izay nanao fahirano an''i Jerosalema, dia niala tany Jerosalema izy.'
mg1865::mg_24::37::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia mpaminany ny tenin''i Jehovah hoe:'
mg1865::mg_24::37::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Izao no lazaonareo amin''ny mpanjakan''ny Joda, izay naniraka anareo hankaty amiko hanontany amiko: Indro, ny miaramilan''i Farao, izay efa niainga hamonjy anareo, dia hiverina ho any Egypta taniny;'
mg1865::mg_24::37::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ho avy indray ny Kaldeana ka hamely ity tanana ity sady hanafaka azy sy handoro azy amin''ny afo.'
mg1865::mg_24::37::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Aza mamita-tena foana ianareo ka manao hoe: Hiala amintsika tokoa ny Kaldeana; fa tsy hiala izy tsy akory.'
mg1865::mg_24::37::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia mamely ny miaramilan''ny Kaldeana rehetra izay miady aminareo aza ianareo, ka izay voalefona no ho sisa velona, ireo aza dia samy hitsangana avy ao anaty lainy ka handoro ity tanàna ity amin''ny afo.'
mg1865::mg_24::37::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niala tany Jerosalema ny miaramilan''ny Kaldeana noho ny amin''ny miaramilan''i Farao,'
mg1865::mg_24::37::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nivoaka Jeremia avy tao Jerosalema hankany amin''ny tanin''ny Benjamina mba handray izay anjarany eo amin''ny vahoaka.'
mg1865::mg_24::37::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga teo am-bavahadin''i Benjamina izy, dia, indro, ny kapitenin''ny mpiambina, atao hoe Jiria, zanak''i Selemia, zanak''i Hanania, no teo; dia nisambotra an''i Jeremia mpaminany izy ka nanao hoe: Miray tetika amin''ny Kaldeana ianao.'
mg1865::mg_24::37::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jeremia: Lainga izany. Tsy miray tetika amin''ny Kaldeana aho. Nefa tsy nino azy ireo, ka dia nosamborin''i Jiria ihany Jeremia ary nentiny ho ao amin''ny mpanapaka.'
mg1865::mg_24::37::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tezitra tamin''i Jeremia ny mpanapaka ka nikapoka azy, dia nandatsaka azy tao an-trano-maizina tao amin''ny tranon''i Jonatana mpanoratra; fa izany no nataony trano-maizina.'
mg1865::mg_24::37::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafiditra tao an-trano-maizina, tao amin''ilay niefitrefitra, Jeremia, ka efa nitoetra tao andro maro,'
mg1865::mg_24::37::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia naniraka haka azy Zedekia mpanjaka; ary ny mpanjaka nanontany azy mangingina tao an-tranony nanao hoe: Moa misy teny avy tamin''i Jehovah tokoa va? Dia hoy Jeremia: Eny, misy; ary hoy koa izy: Hatolotra eo an-tanan''ny mpanjakan''i Babylona ianao.'
mg1865::mg_24::37::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jeremia tamin''i Zedekia mpanjaka: Inona no ratsy nataoko taminao, na tamin''ny mpanomponao, na tamin''ity firenena ity, no dia nataonareo tao an-trano-maizina aho?'
mg1865::mg_24::37::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza moa ireo mpaminaninareo, izay naminany taminareo hoe: Tsy ho avy hiady aminareo na hamely ity tany ity ny mpanjakan''i Babylona?'
mg1865::mg_24::37::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa trarantitra ianao, ry tompokolahy mpanjaka, henoy kely ange! aoka hoborahina eto anatrehanao ny fifonako, ka aza averina ho ao amin''ny tranon''i Jonatana mpanoratra aho, fandrao dia maty ao.'
mg1865::mg_24::37::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 37
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasain''i Zedekia mpanjaka nataony teo amin''ny kianjan''ny trano fiambenana Jeremia, ka nasainy nomena mofo iray isan''andro isan''andro avy any amin''ny fitoeran''ny mpanao mofo izy, ambara-pahalanin''ny mofo rehetra tao an-tanàna. Toy izany no nitoeran''i Jeremia teo amin''ny kianjan''ny trano fiambenana.'
mg1865::mg_24::38::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitoeran''i Jeremia tao an-davaka sy ny fara fihaonany tamin''i Zedekia'
  verse_text: 'Ary Safatia, zanak''i Matana, sy Gedalia, zanak''i Pasora, sy Jokala, zanak''i Semelia, ary Pasora, zanak''i Malkia, dia nandre ny teny izay efa nolazain''i Jeremia tamin''ny vahoaka rehetra nanao hoe:'
mg1865::mg_24::38::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Izay mitoetra amin''ity tanàna ity dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana kosa no ho velona; fa ny ainy no ho babony, ka ho velona izy.'
mg1865::mg_24::38::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Ity tanàna ity dia hatolotra eo an-tanan''ny miaramilan''ny mpanjakan''i Babylona tokoa ka ho afany.'
mg1865::mg_24::38::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanapaka tamin''ny mpanjaka: Trarantitra ianao, aoka hovonoina ity lehilahy ity; fa mampiraviravy tanana ny miaramila izay sisa amin''ity tanàna ity mbamin''ny olona rehetra izy noho ny nitenenany taminy araka izany teny izany; fa ity lehilahy ity tsy mba mitady izay hiadanan''ity firenena ity, fa izay hahatonga loza aminy kosa.'
mg1865::mg_24::38::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Zedekia mpanjaka: Indro, eo an-tananareo izy; fa ny mpanjaka tsy mahefa na inona na inona hisakana anareo.'
mg1865::mg_24::38::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naka an''i Jeremia izy ka nandatsaka azy tao amin''ny lavaka famorian-dranon''i Malkia, zanak''andriana, izay tao amin''ny kianjan''ny trano fiambenana; ary nampidininy tamin''ny mahazaka Jeremia. Ary tsy nisy rano tao amin''ny lavaka, fa fotaka fotsiny ihany, ka dia nilentika tamin''ny fotaka Jeremia.'
mg1865::mg_24::38::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ebeda-meleka Etiopiana, tandapa anankiray tao amin''ny tranon''ny mpanjaka, raha nandre ny nandatsahany an''i Jeremia tao amin''ny lavaka (nipetraka teo amin''ny vavahadin''ny Benjamina ny mpanjaka androtr''iny),'
mg1865::mg_24::38::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nivoaka avy tao an-tranon''ny mpanjaka izy ka nanao tamin''ny mpanjaka hoe:'
mg1865::mg_24::38::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry tompokolahy mpanjaka, ratsy avokoa izay rehetra nataon''ity firenena ity tamin''i Jeremia mpaminany, fa nataony tao an-davaka izy ka ho faty mosary ao amin''izay itoerany, satria tsy misy mofo intsony ato an-tanàna.'
mg1865::mg_24::38::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Ebeda-meleta Etiopiana hoe: Mitondrà telo-polo lahy hiaraka aminao hampakatra an''i Jeremia mpaminany hiala ao anaty lavaka, dieny tsy mbola maty izy.'
mg1865::mg_24::38::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ebeda-meleka nitondra ny olona niaraka taminy, ka dia lasa nankany amin''ny tranon''ny mpanjaka eo ambanin''ny trano firaketana, ary naka lamba rovitra sy vorodamba tao izy, ka nampidininy tamin''ny mahazaka ho ao amin''ny lavaka izany ho ao amin''i Jeremia.'
mg1865::mg_24::38::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Ebeda-meleka Etiopiana tamin''i Jeremia: Ataovy eo ambanin''ny helikao ireto lamba rovitra sy vorodamba ireto ho efitry ny mahazaka, dia nataon''i Jeremia izany;'
mg1865::mg_24::38::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nosintoniny tamin''ny mahazaka Jeremia ka nakariny avy tao anaty lavaka, ary dia nitoetra teo amin''ny kianjan''ny trano fiambenana izy.'
mg1865::mg_24::38::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia mpanjaka naniraka naka an''i Jeremia mpaminany hankao aminy tao amin''ny fidirana fahatelo, izay ao an-tranon''i Jehovah. Dia hoy ny mpanjaka tamin''i Jeremia: Hanontany zavatra kely aminao aho, ka aza anafenana.'
mg1865::mg_24::38::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeremia tamin''i Zedekia: Raha ambarako anao, dia tsy hovonoinao tokoa va re aho? Fa na dia omeko saina aza ianao, dia tsy hihaino ahy tsinona.'
mg1865::mg_24::38::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia mpanjaka nianiana mangingina tamin''i Jeremia nanao hoe: Raha velona koa Jehovah, Izay nanao izao fanahintsika izao, dia tsy hamono anao tokoa aho, na hanolotra anao eo an-tanan''ireto olona mitady ny ainao ireto.'
mg1865::mg_24::38::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jeremia tamin''i Zedekia: Izao ary no lazain''i Jehovah, Andriamanitry ny maro, Andriamanitry ny Isiraely: Raha mivoaka hanatona ny mpanapaky ny mpanjakan''i Babylona tokoa ianao, dia ho velona ny ainao, sady tsy hodorana amin''ny afo ity tanàna ity, fa ho velona ianao sy ny mpianakavinao;'
mg1865::mg_24::38::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tsy mivoaka hanatona ny mpanapaky ny mpanjakan''i Babylona kosa ianao, dia hatolotra eo an-tanan''ny Kaldeana ity tanàna ity, sady hodorany amin''ny afo izy, ary tsy ho afa-mandositra ny tanany ianao.'
mg1865::mg_24::38::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Zedekia mpanjaka tamin''i Jeremia: Matahotra ny Jiosy izay efa nanatona ny Kaldeana aho, fandrao hatolony eo an-tanany aho ka hataony fihomehezana.'
mg1865::mg_24::38::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jeremia: Tsy hanolotra anao izy tsy akory. Trarantitra ianao, ankatoavy ny tenin''i Jehovah, izay lazaiko aminao, mba hahita soa ianao, ka ho velona ny ainao.'
mg1865::mg_24::38::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mety mivoaka kosa ianao, dia izao no teny efa nasehon''i Jehovah ahy:'
mg1865::mg_24::38::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, ny vehivavy rehetra izay sisa ao an-tranon''ny mpanjakan''ny Joda dia ho entina mivoaka ho any amin''ny mpanapaky ny mpanjakan''i Babylona, ary ireo vehivavy ireo dia hanao hoe: Ireo sakaizanao no nitaona anao sady naharesy anao; Ary latsaka tao amin''ny honahona ny tongotrao, dia nilaozany nihemotra ianao.'
mg1865::mg_24::38::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vadinao rehetra sy ny zanakao dia ho entina mivoaka ho any amin''ny Kaldeana; ary ianao tsy ho afa-mandositra ny tanany, fa ho azon''ny tanan''ny mpanjakan''i Babylona; ary noho ianao no handoroana ity tanàna ity amin''ny afo.'
mg1865::mg_24::38::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Zedekia tamin''i Jeremia: Aoka tsy ho ren''olona ary izany teny izany, mba tsy ho faty ianao.'
mg1865::mg_24::38::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ren''ny mpanapaka fa niresaka taminao aho, ary tonga aminao izy ka manao aminao hoe: Ambarao aminay ankehitriny izay nolazainao tamin''ny mpanjaka, aza afenina anay, fa tsy hamono anao izahay; ary ambarao koa izay nolazain''ny mpanjaka taminao;'
mg1865::mg_24::38::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ataovy aminy hoe: Noborahina teo anatrehan''ny mpanjaka ny fifonako, mba tsy hamerenany ahy ho faty any amin''ny tranon''i Jonatana.'
mg1865::mg_24::38::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankany amin''i Jeremia ny mpanapaka rehetra ka nanontany azy; dia nolazainy taminy araka izay teny rehetra nandidian''ny mpanjaka azy. Ary tsy niresaka taminy intsony ireo, ka dia tsy re ny raharaha.'
mg1865::mg_24::38::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 38
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia nitoetra teo amin''ny kianjan''ny trano fiambenana mandra-pahatongan''ny andro nanafahana an''i Jerosalema.'
mg1865::mg_24::39::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanafahana an''i Jerosalema, sy ny nanjo an''i Zedekia, ary ny nanesorana an''i Jeremia tao an-davaka, sy ny teny nasain''Andriamanitra nolazainy tamin''i Ebeda-meleka'
  verse_text: 'Ary rehefa afaka Jerosalema (tamin''ny volana fahafolo tamin''ny taona fahasivy nanjakan''i Zedekia, mpanjakan''ny Joda, no nahatongavan''i Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra hamely an''i Jerosalema ka nanao fahirano azy;'
mg1865::mg_24::39::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony tamin''ny andro fahasivy tamin''ny volana fahefatra tamin''ny taona fahiraika ambin''ny folo nanjakan''i Zedekia, dia nisy voabanga ny tanàna),'
mg1865::mg_24::39::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niditra ny mpanapaky ny mpanjakan''i Babylona rehetra ka nipetraka teo amin''ny vavahady ampovoany, dia Nergala-sarezera sy Samgarnebo sy Sarsekima. Raba-sarisa, sy Nergala-sarezera Raba-magy, mbamin''ny sisa rehetra amin''ny mpanapaky ny mpanjakan''i Babylona.'
mg1865::mg_24::39::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahita ireo Zedekia, mpanjakan''ny Joda, sy ny miaramila rehetra, dia nandositra izy ka lasa nandeha alina niala tao an-tanàna, nahazo ny lalana mankamin''ny sahan''ny mpanjaka, tamin''ny vavahady eo anelanelan''ny manda roa; ary lasa nivoaka nankany amin''ny lalana mankeny amin''ny tani-hay izy.'
mg1865::mg_24::39::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny miaramilan''ny Kaldeana nanenjika azy ka nahatratra an''i Zedekia teny amin''ny tani-hay any Jeriko; ary nony azony izy, dia nentiny niakatra ho any amin''i Nebokadnezara, mpanjakan''i Babylona, tao Ribla tao amin''ny tany Hamata; ka dia notsarainy tao izy.'
mg1865::mg_24::39::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Zedekia dia novonoin''ny mpanjakan''i Babylona tao Ribla teo imason-drainy; ary ny manan-kaja rehetra tamin''ny Joda koa dia novonoin''ny mpanjakan''i Babylona.'
mg1865::mg_24::39::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopotsiriny ny mason''i Zedekia, dia nafatony tamin''ny gadra varahina izy ho entiny any Babylona.'
mg1865::mg_24::39::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nodoran''ny Kaldeana tamin''ny afo ny tranon''ny mpanjaka sy ny tranon''ny vahoaka, ary ny mandan''i Jerosalema noravany.'
mg1865::mg_24::39::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa tao an-tanàna sy izay efa nanatona azy ary ny vahoaka sisa koa dia nentin''i Nebozaradana, lehiben''ny mpiambina, ho babo tany Babylona.'
mg1865::mg_24::39::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny olona malahelo izay tsy nanana na inona na inona kosa dia nisy ihany navelan''i Nebozaradana, lehiben''ny mpiambina, tao amin''ny tanin''ny Joda sady nomeny tanim-boaloboka sy tanimboly tamin''izany andro izany.'
mg1865::mg_24::39::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nebokadnezara, mpanjakan''i Babylona, nanome teny an''i Nebozaradana, lehiben''ny mpiambina, ny amin''i Jeremia nanao hoe:'
mg1865::mg_24::39::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ento izy, ka tandremo tsara, fa aza asian-dratsy fa araka izay lazainy aminao no ataovy aminy.'
mg1865::mg_24::39::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nebozaradana, lehiben''ny mpiambina, sy Nebosazbana, Raba-sarisa, sy Nergala-sarezera, Raba-magy, ary ny mpanapaky ny mpanjakan''i Babylona rehetra'
mg1865::mg_24::39::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia naniraka haka an''i Jeremia teo amin''ny kianjan''ny trano fiambenana, ka natolony an''i Gedalia, zanak''i Ahikama, zanak''i Safana, mba ho entiny any an-trano izy, ka dia nitoetra tao amin''ny olona.'
mg1865::mg_24::39::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah, fony izy mbola voahazona tao amin''ny kianjan''ny trano fiambenana ihany, nanao hoe:'
mg1865::mg_24::39::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka lazao amin''i Ebeda-meleka Etiopiana hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hotoviko amin''ity tanàna ity ny teniko hahatonga loza, fa tsy soa; ary ho tanteraka eo imasonao izany amin''izany andro izany.'
mg1865::mg_24::39::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hovonjeko ianao amin''izany andro izany, hoy Jehovah, fa tsy mba hatolotra eo an-tanan''ny olona izay atahoranao.'
mg1865::mg_24::39::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 39
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hovonjeko tokoa ianao ka tsy holavon-tsabatra; eny, ny ainao no ho babonao, satria efa natoky Ahy, hoy Jehovah.'
mg1865::mg_24::40::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanafahana an''i Jeremia, sy ny niverenan''ny olona maro hipetraka ao amin''ny tany hotapahin''i Gedalia, ary ny namonoana an''i Gedalia'
  verse_text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah, taorian''ny nandefasan''i Nebozaradana, lehiben''ny mpiambina, azy niala tany Rama, tamin''ilay nampanalany azy fony izy mbola nigadra tao amin''ny babo rehetra avy tany Jerosalema sy Joda, izay nentina ho babo tany Babylona.'
mg1865::mg_24::40::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 2
  verse_date_revised: '2022-03-26T07:24:54+0000'
  verse_title: null
  verse_text: 'Ny lehiben''ny mpiambina dia naka an''i Jeremia ka nanao taminy hoe: Jehovah Andriamanitrao nanambara izao loza izao, izay nanjo ity tanàna ity.'
mg1865::mg_24::40::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nahatonga izany ka nanao araka izay nolazainy, noho ny nanotanareo tamin''i Jehovah sy ny tsy nihainoanareo ny feony, dia izany no nahatonga izao zavatra izao taminareo.'
mg1865::mg_24::40::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ankehitriny vahako izao ny gadra amin''ny tananao. Koa raha tsy sitraky ny fonao ny hiaraka amiko ho any Babylona, dia mijanona ihany; indro, ny tany rehetra dia eo anoloanao, koa izay tany tianao sy sitrakao no andehano.'
mg1865::mg_24::40::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mbola nety nandeha izy, dia hoy Nebozaradana: Miverena indray any amin''i Gedalia, zanak''i Ahikama, zanak''i Safana, izay voatendrin''ny mpanjakan''i Babylona ho mpanapaka ny tanànan''ny Joda ka tomoera aminy ao amin''ny olona, na mandehana any amin''izay tianao haleha na aiza na aiza. Dia nomen''ny lehiben''ny mpiambina vatsy sy fanomezana izy ka nalefany handeha.'
mg1865::mg_24::40::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeremia nankany amin''i Gedalia, zanak''i Ahikama, tany Mizpa ka niara-nonina taminy tao amin''ny vahoaka izay sisa velona tamin''ny tany.'
mg1865::mg_24::40::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ren''ny mpifehy ny miaramila rehetra izay tany an-tsaha sy ny olom-peheziny fa ny mpanjakan''i Babylona efa nanendry an''i Gedalia, zanak''i Ahikama, ho mpanapaka ny tany sy ho mpitandrina ny lehilahy mbamin''ny zaza amim-behivavy ary ny malahelo sasany teo amin''ny tany izay tsy mbola lasan-ko babo tany Babylona,'
mg1865::mg_24::40::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tonga tany amin''i Gedalia tany Mizpa izy, dia Isimaela, zanak''i Netania, sy Johanana sy Jonatana, zanak''i Karea, sy Seraia, zanak''i Tanometa, sy ny zanak''i Efay Netofatita ary Jazania, zanak''ilay Makatita, dia izy ireny sy ny olom-peheziny avy.'
mg1865::mg_24::40::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 9
  verse_date_revised: '2022-03-26T07:25:03+0000'
  verse_title: null
  verse_text: 'Ary Gedalia, zanak''i Ahikama, zanak''i Safana, dia nianiana taminy sy tamin''ny olom-peheziny nanao hoe: Aza matahotra hanompo ny Kaldeana; monena amin''ny tany, ka manompoa ny mpanjakan''i Babylona, dia hahita soa ianareo.'
mg1865::mg_24::40::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amiko, dia, indro, honina any Mizpa aho hanompo ny Kaldeana izay ho avy ety amintsika; fa ianareo dia manangona divay sy voankazo masaka fahavaratra ary diloilo, ka ataovy ao amin''ny fitehirizanareo, dia monena amin''izay tanàna nidiranareo.'
mg1865::mg_24::40::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny Jiosy rehetra izay tany Moaba sy tany amin''ny taranak''i Amona sy tany Edoma ary izay tany amin''ny tany rehetra dia nahare fa ny mpanjakan i Babylona efa namela ny Joda hisy sisa sady efa nanendry an''i Gedalia, zanak''i Ahikama, zanak''i Safana, ho mpanapaka azy,'
mg1865::mg_24::40::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niverina ny Jiosy rehetra avy tany amin''ny tany rehetra izay efa nandroahana azy ka tonga tany amin''ny tanin''ny Joda ho any amin''i Gedalia tao Mizpa, ka nanangona divay sy voankazo sesehena masaka fahavaratra izy.'
mg1865::mg_24::40::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tany an-tsaha dia tonga tany amin''i Gedalia tany Mizpa'
mg1865::mg_24::40::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Moa fantatrao tokoa va fa Balisa, mpanjakan''ny taranak''i Amona, dia naniraka an''Isimaela, zanak''i Netania, hamono anao? Nefa tsy nino azy Gedalia, zanak i Ahikama.'
mg1865::mg_24::40::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Johanana, zanak''i Karea, nilaza mangingina tamin''i Gedalia tao Mizpa nanao hoe: masïna ianao, aoka aho handeha hamono an''Isimaela, zanak''i Netania, fa tsy hisy olona hahalala izany tsy akory; fa nahoana no havela hamono anao izy ka hampiely ny Jiosy rehetra izay tafangona eto aminao ary hahalany ringana ny sisa amin''ny Joda?'
mg1865::mg_24::40::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 40
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Gedalia, zanak''i Ahikama, tamin''i Johanana, zanak''i Karea: Aza manao izany ianao, fa miampanga lainga foana an''Isimaela ianao.'
mg1865::mg_24::41::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny volana fahafito dia tonga tany amin''i Gedalia, zanak''i Ahikama, tao Mizpa Isimaela, zanak''i Netania, zanak''i Elisama, taranaky ny mpanjaka, sy ny mpanapaky ny mpanjaka; ary nisy folo lahy niaraka taminy; ary niara-nihinan-kanina tao Mizpa izy.'
mg1865::mg_24::41::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Isimaela, zanak''i Netania, sy ireo olona folo lahy niaraka taminy ka namely sabatra an''i Gedalia, zanak''i Ahikama, zanak''i Safana, dia nahafaty ilay efa nataon''ny mpanjakan''i Babylona ho mpanapaka ny tany.'
mg1865::mg_24::41::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy rehetra izay tao aminy, dia izay tao amin''i Gedalia tao Mizpa, sy ny Kaldeana izay hita tao ary ny miaramila dia novonoin''Isimaela avokoa.'
mg1865::mg_24::41::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''ny andro namonoana an''i Gedalia, raha tsy mbola nisy olona nahalala izany,'
mg1865::mg_24::41::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nisy valo-polo lahy avy tany Sekema sy Silo ary Samaria, izay samy mihara-bolom-bava, sady voatriatra ny fitafiany, ary voatetika ny tenany, nitondra fanatitra sy ditin-kazo mani-pofona teny an-tanany ho entina ao an-tranon''i Jehovah.'
mg1865::mg_24::41::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isimaela, zanak''i Netania, dia nivoaka avy tao Mizpa hitsena azy sady nitomany teny ampandehanana, ary nony efa nihaona taminy izy, dia niteny taminy hoe: Mankanesa any amin''i Gedalia, zanak''i Ahikama.'
mg1865::mg_24::41::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tao afovoan''ny tanàna izy ireo, dia novonoin''Isimaela, zanak''i Netania, mbamin''ny olona nanaraka azy izy ka nariany tao anaty lavaka famorian-drano.'
mg1865::mg_24::41::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy folo lahy tamin''ireo nanao tamin''Isimaela hoe: Aza vonoina izahay; fa manan-tahiry any an-tsaha izahay, dia vary tritika sy vary hordea sy diloilo ary tantely. Ka dia nijanona izy, fa tsy namono ireo tahaka ny efa nataony tamin''ny namany.'
mg1865::mg_24::41::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay lavaka nanarian''Isimaela ny fatin''ny olona rehetra, izay novonoiny ho eo anilan''i Gedalia, dia ilay efa nataon''i Asa mpanjaka mba hiereny an''i Basa, mpanjakan''ny Isiraely, dia nofenoin''Isimaela, zanak''i Netania, faty.'
mg1865::mg_24::41::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentin''Isimaela ho babo ny olona rehetra izay sisa tao Mizpa, na ny vehivavy zanak''andriana, na ny olona rehetra izay sisa tao Mizpa, izay napetrak''i Nebozaradana, lehiben''ny mpiambina, tao amin''i Gedalia, zanak''i Ahikama; eny, Isimaela, zanak''i Netania, nitondra azy ireny ho babo, ka dia lasa niala nankany amin''ny taranak''i Amona izy.'
mg1865::mg_24::41::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony ren''i Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy ny ratsy rehetra nataon''Isimaela, zanak''i Netania,'
mg1865::mg_24::41::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia novoriny ny olona rehetra ka nentiny niady tamin''Isimaela, zanak''i Netania ary hitany teo amoron''ny kamory* ao Gibeona izy. [*Hebreo: ny rano be]'
mg1865::mg_24::41::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra izay tao amin''Isimaela, nony nahita an''i Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy, dia faly.'
mg1865::mg_24::41::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra izay nentin''Isimaela ho babo avy tany Mizpa dia nitodika ka niverina nanatona an''i Johanana, zanak''i Karea.'
mg1865::mg_24::41::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Isimaela, zanak''i Netania, sy ny olona valo lahy kosa dia afaka nandositra an''i Johanana ka lasa nankany amin''ny taranak''i Amona.'
mg1865::mg_24::41::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy dia nitondra ny olona rehetra izay voavonjiny ho afaka tamin''Isimaela, zanak''i Netania, avy tany Mizpa, taorian''ny namonoany an''i Gedalia, zanak''i Ahikama, dia ny lehilahy mpiady sy ny zaza amim-behivavy ary ny tandapa, izay nentiny niverina avy tany Gibeona;'
mg1865::mg_24::41::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia lasa izy ireo ka nitoetra tao Gerota-kimama*, izay ao akaikin''i Betlehema, mba handehanany hankany Egypta. [*Na: an-tranom-bahinin''i Kimama]'
mg1865::mg_24::41::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 41
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy ho tratry ny Kaldeana; fa natahotra azy izy, satria Isimaela, zanak''i Netania, efa namono an''i Gedalia, zanak''i Ahikama, izay notendren''ny mpanjakan''i Babylona ho mpanapaka ny tany.'
mg1865::mg_24::42::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nangatahan''ny Jiosy an''i Jeremia haka hevitra amin''i Jehovah, ary ny anatra nataon''i Jeremia tamin''ny Jiosy kosa noho ny tsy nanekeny ny saina avy tamin''i Jehovah.'
  verse_text: 'Ary ny mpifehy ny miaramila rehetra sy Johanana, zanak''i Karea, sy Jazania, zanak''i Hosaia, mbamin''ny vahoaka rehetra, na kely na lehibe, dia nanatona'
mg1865::mg_24::42::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny tamin''i Jeremia mpaminany hoe: Masïna ianao, aoka hoborahina eto anatrehanao ny fifonanay, ary mba ivavaho amin''i Jehovah Andriamanitrao re izahay, dia ireto sisa rehetra ireto (fa vitsy izahay no sisa, na dia maro aza fahiny, dia araka izao hitan''ny masonao izao),'
mg1865::mg_24::42::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hambaran''i Jehovah Andriamanitrao anay izay lalana mety halehanay sy izay zavatra tokony hataonay.'
mg1865::mg_24::42::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jeremia mpaminany taminy: Efa reko izany; koa, indro, hivavaka amin''i Jehovah Andriamanitrareo ary aho araka ny teninareo; ary ny teny rehetra Izay havalin''i Jehovah anareo dia hambarako anareo, fa tsy hisy hafeniko.'
mg1865::mg_24::42::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''i Jeremia: Jehovah no aoka ho vavolombelona marina sy mahatoky amintsika, raha tsy manao araka ny teny rehetra izay anirahan''i Jehovah Andriamanitrao anao aminay izahay.'
mg1865::mg_24::42::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ho soa, na ho ratsy, dia hohenoinay ny feon''i Jehovah Andriamanitray, izay nanirahanay anao, mba hahasoa anay, raha mihaino ny feon''i Jehovah Andriamanitray izahay.'
mg1865::mg_24::42::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka hafoloana, dia tonga tamin''i Jeremia ny tenin''i Jehovah.'
mg1865::mg_24::42::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niantso an''i Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay teo aminy mbamin''ny olona rehetra, na kely na lehibe,'
mg1865::mg_24::42::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely, Izay efa nanirahanareo ahy mba hoborahiko* eo anatrehany ny fifonanareo: [*Hebreo: hampiankohoka]'
mg1865::mg_24::42::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola honina amin''ity tany ity ihany ianareo, dia haoriko ianareo, fa tsy horavako, ary hamboleko ianareo, fa tsy hongotako, fa manenina Aho ny amin''ny loza namelezako anareo.'
mg1865::mg_24::42::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra ny mpanjakan''i Babylona izay atahoranareo; eny, aza matahotra azy, hoy Jehovah, fa momba anareo Aho hamonjy sy hanafaka anareo amin''ny tanany.'
mg1865::mg_24::42::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko mahita famindram-po ianareo, dia hamindra fo aminareo izy ka hampody anareo ho any amin''ny taninareo.'
mg1865::mg_24::42::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hoy kosa ianareo: Tsy honina amin''ity tany ity izahay, ka tsy hihaino ny feon''i Jehovah Andriamanitrareo ianareo,'
mg1865::mg_24::42::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa manao hoe: Tsia; fa hankany amin''ny tany Egypta izahay, fa any no tsy hahitanay ady, na handrenesanay ny feon''ny anjomara na hahitanay mosary, ka dia any no honenanay,'
mg1865::mg_24::42::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa ny tenin''i Jehovah ankehitriny ianareo izay sisa amin''ny Joda: Izao no lazain''i Jehovah. Tompon''ny maro, Andriamanitry ny Isiraely: Raha dia mikiry hankany Egypta ihany ianareo ka mandeha hivahiny any,'
mg1865::mg_24::42::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hahatratra anareo any amin''ny tany Egypta ny sabatra izay atahoranareo, ary ny mosary izay ahinareo no hanjohy anareo any amin''ny tany Egypta, ary any no hahafaty anareo.'
mg1865::mg_24::42::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra izay mikiry hankany Egypta hivahiny any dia ho fatin''ny sabatra sy ny mosary ary ny areti-mandringana any; ary tsy hisy sisa ho afa-mandositra ny loza izay hataoko mihatra aminy.'
mg1865::mg_24::42::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Toy ny nanidinana ny fahatezerako sy ny fahavinirako tamin''ny mponina any Jerosalema, dia toy izany no hanidinana ny fahatezerako aminareo, raha mankany Egypta ianareo; ary ho fianianana sy ho figagana sy ho fanozonana ary ho fandatsa ianareo, sady tsy hahita ity tany ity intsony.'
mg1865::mg_24::42::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nilaza ny aminareo, ry sisa amin''ny Joda, hoe: Aza mankany Egypta ianareo; aoka ho fantatrareo tokoa fa efa nanariko androany ianareo.'
mg1865::mg_24::42::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo efa nivily ianareo ka nahavoa ny ainareo tamin''ny nanirahanareo ahy ho amin''i Jehovah Andriamanitrareo hanao hoe: Mba ivavaho amin''i Jehovah Andriamanitsika re izahay, ary izay rehetra holazain''i Jehovah Andriamanitsika dia ambarao aminay, fa hataonay.'
mg1865::mg_24::42::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nambarako taminareo androany; nefa tsy nihaino ny feon''i Jehovah Andriamanitrareo ianareo ny amin''izay zavatra nanirahany ahy ho aminareo.'
mg1865::mg_24::42::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 42
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrareo marimarina fa ho fatin-tsabatra sy mosary ary areti-mandringana ianareo any amin''ny tany izay tianareo hivahiniana.'
mg1865::mg_24::43::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandosiran''ny olona nankany Egypta, sy ny teny nampilazain''Andriamanitra ny amin''ny handresen''ny Kaldeana an''i Egypta'
  verse_text: 'Ary rehefa tapitra voalazan''i Jeremia tamin''ny vahoaka rehetra izany teny rehetra avy tamin''i Jehovah Andriamaniny izany, izay nanirahan''i Jehovah Andriamanitra azy holazaina aminy,'
mg1865::mg_24::43::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niteny Azaria, zanak''i Hosaia, sy Johanana, zanak''i Karea, mbamin''ny olona mpirehareha rehetra ka niteny tamin''i Jeremia hoe: Mandainga ianao; fa tsy naniraka anao Jehovah Andriamanitsika hilaza hoe: Aza mandeha hivahiny any Egypta;'
mg1865::mg_24::43::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Baroka, zanak''i Neria, no nanome fo anao hamely anay mba hanolotra anay ho eo an-tanan''ny Kaldeana hahafaty anay sy hahalasa anay ho babo any Babylona.'
mg1865::mg_24::43::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra ary ny vahoaka rehetra dia tsy nihaino ny feon''i Jehovah ny amin''ny honenany ao amin''ny tanin''ny Joda.'
mg1865::mg_24::43::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra dia nitondra ny sisa rehetra tamin''ny Joda, izay niverina avy tany amin''ny firenena rehetra nandroahana azy honina ao amin''ny tanin''ny Joda,'
mg1865::mg_24::43::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny lehilahy sy ny zaza amim-behivavy sy ny vehivavy zanak''andriana ary ny olona rehetra izay navelan''i Nebozaradana, lehiben''ny mpiambina, tao amin''i Gedalia, zanak''i Ahikama, zanak''i Safana, sy tao amin''i Jeremia mpaminany sy Baroka, zanak''i Neria'
mg1865::mg_24::43::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nankany amin''ny tany Egypta izy ireny, fa tsy nihaino ny feon''i Jehovah, ary dia tonga hatrany Tapanesa.'
mg1865::mg_24::43::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamin''i Jeremia tao Tapanesa ny tenin''i Jehovah hoe:'
mg1865::mg_24::43::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitondrà vato lehibe eny an-tananao, ka afeno ao amin''ny feta ao amin''ny gorodona taila, izay eo akaikin''ny vavahady amin''ny tranon''i Farao ao Tapanesa, eo imason''ny lehilahy amin''ny Joda,'
mg1865::mg_24::43::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro Aho haniraka haka an''i Nebokadnezara, mpanjakan''i Babylona, mpanompoko, ka haoriko amin''ireto vato nafeniko ireto ny seza fiandrianany; ary hamelatra ny lambany tsara tarehy hatao alokaloka eo amboniny izy.'
mg1865::mg_24::43::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho avy izy hamely ny tany Egypta, ka izay ho amin''ny areti-mandringana dia ho amin''ny areti-mandringana, ary izay ho amin''ny fahababoana dia ho amin''ny fahababoana, ary izay ho amin''ny sabatra dia ho amin''ny sabatra.'
mg1865::mg_24::43::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary handrehitra afo ao amin''ny tranon''ny andriamanitr''i Egypta Aho, ka dia hodorany sy hobaboiny ireo, ary hitafy ny tany Egypta izy toy ny fitafin''ny mpiandry ondry ny lambany; ary hiala any amin''ny fiadanana izy.'
mg1865::mg_24::43::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 43
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hotorotoroiny ny tsangam-baton-tsampy ao Beti-semesy, izay any amin''ny tany Egypta; ary hodorany amin''ny afo ny tranon''ny andriamanitr''i Egypta.'
mg1865::mg_24::44::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny Jiosy any Egypta mba tsy hanompo sampy'
  verse_text: 'Ny teny izay tonga tamin''i Jeremia ho amin''ny Jiosy rehetra izay nonina tany amin''ny tany Egypta, dia izay nonina tao Migdola sy Tapanesa sy Memfisa*, ary tany amin''ny tany Patrosa, nanao hoe: [*Hebreo: Nofa]'
mg1865::mg_24::44::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ianareo efa nahita ny loza rehetra izay nataoko nihatra tamin''i Jerosalema sy ny tanànan''ny Joda rehetra; ary, indro, efa tany lao ireo ankehitriny, ka tsy misy olona monina intsony ao aminy,'
mg1865::mg_24::44::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny ratsy nataony hampahatezitra Ahy tamin''ny nandehanany handoro ditin-kazo manitra sy hanompo andriamani-kafa izay tsy fantany, na iza, na ianareo, na ny razanareo.'
mg1865::mg_24::44::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naniraka ny mpaminany mpanompoko rehetra taminareo Aho, eny, nifoha maraina koa Aho ka naniraka azy hanao hoe: Masïna ianareo, aza manao izany fahavetavetana halako izany.'
mg1865::mg_24::44::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nihaino izy na nanongilana ny sofiny hialany amin''ny haratsiany tsy handoro ditin-kazo manitra ho an''andriamani-kafa.'
mg1865::mg_24::44::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia naidina ny fahavinirako sy ny fahatezerako, eny, nandoro ny tanànan''ny Joda, sy ny teny amin''ny lalamben''i Jerosalema izany, ka dia rava sy lao ireny tahaka ny amin''izao anio izao.'
mg1865::mg_24::44::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Andriamanitry ny maro, dia Andriamanitry ny Isiraely: Ahoana no anaovanareo izao ratsy lehibe singotry ny ainareo izao, haharingana ny lehilahy sy ny vehivavy, ny ankizy madinika sy ny zaza minono ao amin''ny Joda tsy hahamisy miangana anareo,'
mg1865::mg_24::44::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny ampahatezeranareo Ahy amin''ny asan''ny tananareo sy amin''ny andoroana ditin-kazo manitra ho an''andriamani-kafa any amin''ny tany Egypta izay alehanareo hivahiniana, mba haharingana anareo ka hahatonga anareo ho fanozonana sy ho fandatsa any amin''ny firenena rehetra ambonin''ny tany?'
mg1865::mg_24::44::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa hadinonareo va ny ratsy nataon''ny razanareo sy ny mpanjakan''ny Joda sy ny vadiny ary ny tenanareo sy ny vadinareo, dia izay nataony tany amin''ny tanin''ny Joda sy teny amin''ny lalamben''i Jerosalema?'
mg1865::mg_24::44::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola torotoro fo izy na dia mandraka androany aza sady tsy natahotra na nandeha araka ny lalàko sy ny didiko, izay napetrako teo anoloanareo sy teo anoloan''ny razanareo.'
mg1865::mg_24::44::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hanandrina anareo Aho hahatonga loza haharingana ny Joda rehetra.'
mg1865::mg_24::44::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary halaiko ny sisa amin''ny Joda, izay nikiry hankany amin''ny tany Egypta hivahiny any, ka ho lany ritra izy rehetra; any amin''ny tany Egypta no hahalavoany, samy ho ringan''ny sabatra sy ny mosary, eny, na ny kely na ny lehibe dia samy ho fatin-tsabatra sy mosary izy rehetra ka ho tonga fianianana sy figagana sy fanozonana ary fandatsa.'
mg1865::mg_24::44::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hovaliako izay monina any amin''ny tany Egypta, toy ny namaliako an''i Jerosalema, dia amin''ny sabatra sy ny mosary ary ny areti-mandringana.'
mg1865::mg_24::44::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na sisa amin''ny Joda izay lasa nivahiny tany Egypta dia tsy hisy ho afa-mandositra ho tafaverina any amin''ny tanin''ny Joda, izay niriny hiverenana mba honenany, afa-tsy izay vitsy sendra afa-mandositra ihany.'
mg1865::mg_24::44::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy rehetra, izay nahalala fa ny vadiny efa nandoro ditin-kazo manitra ho an''andriamani-kafa, sy ny vehivavy rehetra izay nitsangana teo, dia vahoaka be dia be, ary ny olona rehetra izay nonina tany amin''ny tany Egypta, tao Patrosa, dia namaly an''i Jeremia hoe:'
mg1865::mg_24::44::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amin''ilay teny voalazanao taminay tamin''ny anaran''i Jehovah, dia tsy hihaino anao izahay.'
mg1865::mg_24::44::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hataonay tokoa ny teny rehetra izay naloaky ny vavanay, dia ny handoro ditin-kazo manitra ho an''ny mpanjakavavin''ny lanitra sy hanidina fanatitra aidina ho azy, toy ny efa nataonay sy ny razanay sy ny mpanjakanay ary ny mpanapaka anay tany amin''ny tananan''ny Joda sy teny amin''ny lalamben''i Jerosalema; fa fahizany dia voky hanina izahay sady nambinina ary tsy nahita loza.'
mg1865::mg_24::44::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatrizay nitsaharanay tsy nandoro ditin-kazo manitra ho an''ny mpanjakavavin''ny lanitra na nanidina fanatitra aidina ho azy izay, dia saiky tsy nanana na inona na inona akory izahay sady ringan''ny sabatra sy ny mosary.'
mg1865::mg_24::44::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandoro ditin-kazo manitra ho an''ny mpanjakavavin''ny lanitra izahay sy nanidina fanatitra aidina ho azy, moa tsy fantatry ny vadinay va ny nanaovanay mofo hasiana ny sariny* sy ny nanidinanay fanatitra aidina ho azy? [*Na: ho enti-mivavaka aminy]'
mg1865::mg_24::44::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeremia tamin''ny olona rehetra, na ny lehilahy na ny vehivavy, dia ny olona rehetra izay efa namaly azy:'
mg1865::mg_24::44::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nandoroanareo ditin-kazo manitra tany an-tanànan''ny Joda sy tany an-dalamben''i Jerosalema, dia ianareo sy ny razanareo sy ny mpanjakanareo sy ny mpanapaka anareo mbamin''ny vahoaka, moa tsy hotsarovan''i Jehovah va izany, ary tsy tao an-tsainy va?'
mg1865::mg_24::44::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsy nahalefitra intsony Jehovah noho ny faharatsian''ny nataonareo sy noho ny fahavetavetana izay nataonareo; koa izany no nanaovana ny taninareo ho lao sy ho figagana ary ho fanozonana, ka tsy misy mponina, tahaka ny amin''izao anio izao.'
mg1865::mg_24::44::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny nandoroanareo ditin-kazo manitra sy ny nanotanareo tamin''i Jehovah, fa tsy nihaino ny feon''i Jehovah, na nandeha araka ny lalàny sy ny didiny ary ny teny vavolombelony ianareo, dia izany no nahatonga izao loza izao taminareo tahaka ny amin''izao anio izao,'
mg1865::mg_24::44::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jeremia tamin''ny olona rehetra sy tamin''ny vehivavy rehetra: Mihainoa ny tenin''i Jehovah, ry Joda rehetra, izay aty amin''ny tany Egypta:'
mg1865::mg_24::44::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ianareo sy ny vadinareo samy niteny tamin''ny vavanareo sady nanatanteraka tamin''ny tananareo ka nanao hoe: Hanefa tokoa izay efa nivoadianay izahay ka handoro ditin-kazo manitra ho an''ny mpanjakavavin''ny lanitra sy hanidina fanatitra aidina ho azy; eny, hefainareo tokoa ny voadinareo sady hataonareo tanteraka.'
mg1865::mg_24::44::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa henoinareo ny tenin''i Jehovah, ry Joda rehetra, izay monina aty amin''ny tany Egypta: Indro Aho efa nianiana tamin''ny anarako lehibe, hoy Jehovah, fa tsy hotononin''ny vavan''ny lehilahy amin''ny Joda eran''ny tany Egypta intsony ny anarako hanao hoe: Raha velona koa Jehovah Tompo.'
mg1865::mg_24::44::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, miambina anareo Aho hahatonga loza, fa tsy soa; ary ny lehilahy rehetra amin''ny Joda, izay aty amin''ny tany Egypta, dia ho ringan''ny sabatra sy ny mosary mandra-pahalany ritrany.'
mg1865::mg_24::44::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay afa-mandositra ny sabatra dia ho tafaverina avy aty amin''ny tany Egypta ho any amin''ny tanin''ny Joda, ho vitsy foana anefa ireny; ary ny sisa amin''ny Joda rehetra izay mankany amin''ny tany Egypta hivahiny any dia hahafantatra izay ho to teny, na ho Izaho, na ho izy.'
mg1865::mg_24::44::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no famantarana ho anareo, hoy Jehovah, fa hovaliako eto amin''ity tany ity ianareo, mba hahafantaranareo fa to tokoa ny teniko hahatonga loza aminareo:'
mg1865::mg_24::44::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 44
  verse_number: 30
  verse_date_revised: '2022-03-31T02:34:34+0000'
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, Farao-hofra, mpanjakan''i Egypta, hatolotro eo an-tanan''ny fahavalony sy eo an-tanan''izay mitady ny ainy, toy ny efa nanolorako an''i Zedekia, mpanjakan''ny Joda, ho eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, izay fahavalony nitady ny ainy.'
mg1865::mg_24::45::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 45
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Teny nasain''Andriamanitra nolazain''i Jeremia tamin''i Baroka'
  verse_text: 'Ny teny izay nataon''i Jeremia mpaminany tamin''i Baroka, zanak''i Neria, fony izy nanoratra ireto teny ireto tamin''ny taratasy avy tamin''ny vavan''i Jeremia tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda, hoe:'
mg1865::mg_24::45::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 45
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely, ny aminao, ry Baroka:'
mg1865::mg_24::45::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 45
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ianao: Idiran-doza aho ity! fa nampian''i Jehovah alahelo ny fanaintainako; efa sasatra ny misento aho ka tsy mahita fitsaharana.'
mg1865::mg_24::45::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 45
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao aminy hoe: Izao no lazain''i Jehovah: Indro, horavako izay efa naoriko, ary hongotako izay efa namboleko, dia izao tany rehetra izao.'
mg1865::mg_24::45::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 45
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitady zavatra lehibe ho anao va ianao? Aza mitady izany! fa, indro, hahatonga loza ho amin''ny nofo rehetra Aho, hoy Jehovah; fa raha ny ainao dia homeko anao ho babonao ihany any amin''izay rehetra halehanao.'
mg1865::mg_24::46::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah Izay tonga tamin''i Jeremia mpaminany ny amin''ny jentilisa.'
mg1865::mg_24::46::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Egypta'
  verse_text: 'Ny amin''i Egypta. Ny amin''ny miaramilan''i Farao-neko, mpanjakan''i Egypta, izay teny amoron''ny ony Eofrata, tany Karkemisy, dia ilay resin''i Nebokadnezara, mpanjakan''i Babylona, tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda:'
mg1865::mg_24::46::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitaova amin''ny ampinga kely sy ny ampinga lehibe, ka mandrosoa hiady;'
mg1865::mg_24::46::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fehezo amin''ny kalesy ny soavaly, ary itaingeno ny soavaly fitaingina; Mijoroa tsara ianareo, ka samia misatroka fiarovan-doha; Fotsio ny lefona, miakanjoa ny akanjo fiarovan-tena.'
mg1865::mg_24::46::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy ny ahitako azy! raiki-tahotra sy miamboho izy, ary ny maheriny aza dia efa ripaka, sady miezaka mandositra izy ka tsy miherika akory; Fa misy fampangorohoroana manodidina, hoy Jehovah.'
mg1865::mg_24::46::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho afa-mandositra ny haingan-tongotra, na ho afaka ny mahery; Any avaratra eo amoron''ny ony Eofrata no hahatafintohina sy hahalavo azy.'
mg1865::mg_24::46::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa izato mizotra tahaka an''i Neily, ary ny onjany misamboaravoara toy ny renirano'
mg1865::mg_24::46::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Egypta mizotra tahaka an''i Neily, ary ny onjany misamboaravoara toy ny renirano, ary hoy izy: Hizotra aho ka hanafotra ny tany; Haringako ny tanàna sy ny mponina ao aminy.'
mg1865::mg_24::46::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara, ianareo soavaly, ary miriota toy ny adala, ianareo kalesy; Ary aoka hivoaka ny lehilahy mahery, dia ny Etiopiana sy ny Libyana*, izay mitana ampinga, ary ny Lydiana**, izay mitana sy manenjana tsipïka. [*Hebreo: Pota] [**Hebreo: Loda]'
mg1865::mg_24::46::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao andro izao dia an''i Jehovah, Tompon''ny maro, ho andro famaliana hamaliany ny fahavalony; Ary ny sabatra hihinana ka ho voky sy ho mamon''ny ran''ireo; Fa ny Tompo, dia Jehovah, Tompon''ny maro, no mamono zavatra hatao fanatitra any amin''ny tany avaratra ao amoron''ny ony Eofrata.'
mg1865::mg_24::46::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara any Gileada, ka makà balsama, ry Egypta zanakavavy virijina; Foana ny nanaovanao fanafody maro, fa tsy manana plasitera hapetaka amin''ny ferinao ianao,'
mg1865::mg_24::46::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ren''ny firenena ny henatrao, ary ny fiantsoantsoanao nanenika ny tany; fa mifandona ny samy mahery, ka miara-davo izy roa tonta.'
mg1865::mg_24::46::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny izay nolazain''i Jehovah tamin''i Jeremia mpaminany ny amin''ny hihavian''i Nebokadnezara, mpanjakan''i Babylona, hamely ny tany Egypta.'
mg1865::mg_24::46::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambaraonareo any Egypta, ary torio any Migdola, eny, torio any Memfisa sy Tapanesa, ka ataovy hoe: Mijoroa tsara ianao, ka miomàna; Fa mandringana manodidina anao ny sabatra.'
mg1865::mg_24::46::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no voapaoka ny maherinao? Tsy nahafahatra izy, satria Jehovah no nandroaka azy.'
mg1865::mg_24::46::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahatafintohina ny maro Izy, ka lavo mifanindry ireo; Dia hoy ireo: Mitsangàna, ka andeha isika hiverina ho any amin''ny firenentsika sy ho any amin''ny tany nahaterahantsika ho afaka amin''ny sabatra mandoza,'
mg1865::mg_24::46::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitaraina tany izy hoe: Tabataba foana Farao, mpanjakan''i Egypta, efa nandiso ny fotoana izy.'
mg1865::mg_24::46::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany: Tahaka an''i Tabara amin''ny tendrombohitra, sy tahaka an''i Karmela ao amoron-dranomasina, dia ho tahaka izany no hihaviany.'
mg1865::mg_24::46::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Egypta zanakavavy mponina, Mifeheza entana ho entinao any amin''ny fahababoana; Fa ho tonga tany lao Memfisa, eny, hodorana izy, ka tsy hisy mponina.'
mg1865::mg_24::46::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Egypta dia tahaka ny ombivavy kely tsara tarehy dia tsara tarehy; Fa injay! tamy, eny, tamy ny fihitra avy any avaratra!'
mg1865::mg_24::46::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny olona karamaina ao aminy aza, izay tahaka ny ombilahy kely mifahy, ireny koa dia mihodina ka samy mandositra avokoa; Tsy mahajanona izy, fa efa tonga aminy ny andro hahitany loza, dia ny andro hamaliana azy.'
mg1865::mg_24::46::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feony dia toy ny fikasaotsaoky ny menarana mandeha; Fa mandeha hitondra miaramila izy ka avy hamely azy amin''ny famaky toy ny mpikapa hazo.'
mg1865::mg_24::46::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kapainy ny alany, hoy Jehovah, satria efa nikirindro loatra; Fa maro noho ny valala izy ka tsy tambo isaina.'
mg1865::mg_24::46::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho afa-baraka Egypta zanakavavy, Hatolotra eo an-tanan''ny olona any avaratra izy.'
mg1865::mg_24::46::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely; Indro, hovaliako Amona avy any Nà Ary Farao sy Egypta mbamin''ny andriamaniny sy ny mpanjakany, dia Farao sy izay rehetra matoky azy;'
mg1865::mg_24::46::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatolotro eo an-tanan''izay mitady ny ainy izy, dia eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, sy eo an-tanan''ny mpanompony; Ary aorian''izany, dia handry fahizay* toy ny tamin''ny andro fahiny ihany izy, hoy Jehovah. [*Na: honenana indray]'
mg1865::mg_24::46::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aza matahotra ianao, ry Jakoba mpanompoko, ary aza mivadi-po, ry Isiraely; Fa, indro, hovonjeko avy any amin''ny lavitra ianao, ary ny taranakao avy any amin''ny tany nahababo azy; Dia hiverina Jakoba ka hiadana, eny, handry fahizay izy, ka tsy hisy hanaitaitra azy.'
mg1865::mg_24::46::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 46
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra ianao, ry Jakoba mpanompoko, hoy Jehovah, fa momba anao Aho; Fa na dia levoniko aza ny firenena rehetra izay nandroahako anao, ianao tsy mba holevoniko, nefa kosa mba hanariko araka ny antonony ihany ianao, fa tsy dia havelako fotsiny.'
mg1865::mg_24::47::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny Filistina'
  verse_text: 'Ny tenin''i Jehovah izay tonga tamin''i Jeremia mpaminany ny amin''ny Filistina, fony Farao tsy mbola namely an''i Gaza.'
mg1865::mg_24::47::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, misy rano mizotra avy any avaratra ka ho tonga ony maria manafotra ny tany mbamin''izay rehetra ao aminy, dia ny tanàna mbamin''izay monina ao aminy; Ka dia hitaraina ny olona, ary hidradradradra ny mponina rehetra amin''ny tany.'
mg1865::mg_24::47::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fikatrokatroky ny kitron''ny soavaliny matanjaka sy ny fikorodondrodon''ny kalesiny ary ny fikotrototroky ny kodiany ny ray dia tsy miherika ny zanany, fa efa miraviravy tanana,'
mg1865::mg_24::47::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny hihavian''ny andro handravana ny Filistina rehetra sy handringanana izay sisa rehetra amin''ny mpamonjy an''i Tyro sy Sidona; Fa horavan''i Jehovah ny Filistina, dia ny sisa avy any amin''ny nosy Kaftora.'
mg1865::mg_24::47::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaharatra Gaza, ringana* Askelona mbamin''ny sisa amin''ny lohasahany; Mandra-pahoviana no mbola hitetika ny tenanao ianao? [*Na: Mangina]'
mg1865::mg_24::47::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy ry sabatr''i Jehovah! Mandra-pahoviana no tsy hitsaharanao? Midira ao amin''ny tranonao ihany; Mitsahara, ka mijanona.'
mg1865::mg_24::47::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 47
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataony* ahoana no fitsahatra. Fa Jehovah no nandidy azy, eny, hamely an''i Askelona mbamin''ny eny amoron-dranomasina no efa nanendreny azy. [*Hebreo: Hataonao]'
mg1865::mg_24::48::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Moaba'
  verse_text: 'Ny amin''i Moaba. Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Nidiran-doza Nebo, fa rava! Mangaihay Kiriataima, fa afaka; Mangaihay Misgaba* sady raiki-tahotra. [*Na: ny fiarovana avo]'
mg1865::mg_24::48::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy ho reharehan''i Moaba intsony; Tao Hesbona no niheverany hampididoza aminy hoe: Andeha horavantsika tsy ho firenena izy. Ho ringana koa ianao, ry Madmena, Hanenjika anao ny sabatra.'
mg1865::mg_24::48::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injay! misy feo fitarainana ao Horonaima hoe: Fandravana sy fandringanana be!'
mg1865::mg_24::48::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rava Moaba, ny madinika ao dia mamoaka fitarainana.'
mg1865::mg_24::48::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miakatra mitomany lalandava eny amin''ny fiakarana Lohita izy; Ary amin''ny fidinana mankany Horonaima no andrenesana fitarainana mafy noho ny fandringanana.'
mg1865::mg_24::48::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandosira, vonjeo ny ainareo. Ary aoka ho tahaka ny olona mahantra* any an''efitra ianareo. [*Na: ny anjavidy]'
mg1865::mg_24::48::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho ny nitokianao tamin''ny asanao sy ny rakitrao dia ho voasambotra koa ianao; Ary Kemosy ho lasan-ko babo, dia ny mpisorony sy ny mpanapaka rehetra.'
mg1865::mg_24::48::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpandringana ho tonga ao amin''ny tanàna rehetra, ka tsy hisy tanàna tsy ho afaka; Ny lohasaha koa ho simba, ary ny tany lemaka ho rava, araka izay nolazain''i Jehovah.'
mg1865::mg_24::48::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo elatra Moaba, fa hanidina izy ka ho lasa; Ary ho lao ny tanànanay, ka tsy hisy mponina.'
mg1865::mg_24::48::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho voaozona anie Izay manao tsirambina foana ny asa asain''i Jehovah atao! Eny, ho voaozona anie izay mihazona ny sabany tsy handatsa-drà!'
mg1865::mg_24::48::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moaba nandry fahizay hatry ny fony izy mbola kely ka niotrika tao amin''ny faikany, fa tsy naidina nafindrafindra siny, ary tsy mbola lasan-ko babo izy; koa izany no aharetan''ny tsirony ao aminy sy tsy iovan''ny fofony.'
mg1865::mg_24::48::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy ny andro hanirahako mpanohoka ho any aminy, hoy Jehovah, Izay hanohoka azy ka hahafoana ny fitoeran-divainy sady hanorotoro ny sininy.'
mg1865::mg_24::48::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Moaba ho menatra noho ny amin''i Kemosy toy ny nahamenaran''ny taranak''Isiraely noho ny amin''i Betela tokiny.'
mg1865::mg_24::48::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no anaovanareo hoe: Lehilahy matanjaka sady mahery an''ady izahay?'
mg1865::mg_24::48::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rava Moaba, fa ny tanànany dia efa nanihina*. Ary ny zatovony voafantina efa nidina ho any amin''ny famonoana. Hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany. [*Na: efa levon-ko setroka]'
mg1865::mg_24::48::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa antomotra ny loza hanjo an''i Moaba, ary mimaona ny fahoriany.'
mg1865::mg_24::48::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitomania azy, ianareo rehetra izay manodidina azy sy ianareo rehetra izay mahalala ny anarany! Eny, manaova hoe: Indrisy! tapaka ny tehina mafy sy ny tsorakazo tsara tarehy!'
mg1865::mg_24::48::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Dibona, zanakavavy mponina, midina miala amin''ny voninahitrao, ka mitoera ao amin''ny tany mangentana, fa ilay mandringana an''i Moaba dia miakatra mamely anao sady mandrava ny fiarovanao.'
mg1865::mg_24::48::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mponina any Aroera, mijanona eny an-dalambe, ka mitazàna, ary izay mandositra, na lehilahy na vehivavy, dia anontanio hoe: Nozoin''inona ianareo?'
mg1865::mg_24::48::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afa-baraka Moaba, eny, raiki-tahotra izy; Midradradradra sy mitaraina, ka ambaraonareo ao Arnona fa rava Moaba.'
mg1865::mg_24::48::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fitsarana dia miakatra ao amin''ny tany lemaka, dia ao Holona sy Jahaza sy Mefata'
mg1865::mg_24::48::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy Dibona sy Nebo sy Beti-diblataima'
mg1865::mg_24::48::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy Kiriataima sy Beti-gamola sy Beti-meona'
mg1865::mg_24::48::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy Keriota ary Bozra, eny, ny tanànan''i Moaba rehetra, na ny lavitra na ny akaiky.'
mg1865::mg_24::48::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voakapa ny tandrok''i Moaba, ary tapaka koa ny sandriny, hoy Jehovah.'
mg1865::mg_24::48::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy leony izy, fa niavonavona tamin''i Jehovah; Moaba hihosinkosina amin''ny loany sady mba ho tonga fihomehezana kosa.'
mg1865::mg_24::48::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy efa nataonao ho fihomehezana va ny Isiraely? Moa hita fa naman''ny mpangalatra va izy, no dia mihifikifika ianao isaky ny milaza azy?'
mg1865::mg_24::48::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mponina any Moaba! ilaozy ny tanàna, ka mitoera ao amin''ny harambato, ary aoka ho tahaka ny voromailala izay manao ny akaniny ery am-pitan''ny hantsana ianao.'
mg1865::mg_24::48::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ffa renay ny fiavonavonan''i Moaba fatra-piavonavona loatra izy dia ny fireharehany sy ny fiavonavonany sy ny fiaingitrainginy ary ny avonavon''ny fony.'
mg1865::mg_24::48::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho mahalala ny fihoa-bavany sy ny fibedibediny foana, hoy Jehovah; Tsinontsinona ny ataony.'
mg1865::mg_24::48::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hidradradradra noho ny amin''i Moaba aho; Eny, hitomany noho ny amin''i Moaba rehetra aho, ary hitsetra noho ny amin''ny mponina ao Kira-haresa ny olona.'
mg1865::mg_24::48::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihoatra noho ny fitomanian*''i Jazera no hitomaniako anao, ry voalobok''i Sibma, tafita ny ranomasina ny rantsanao ary tonga hatrany amin''ny ranomasin''i Jazera; Ny mpandripaka dia tonga handripaka ny voankazonao masaka fahavaratra sy ny voalobokao. [*Na: fitomaniana an'']'
mg1865::mg_24::48::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hafaliana sy ny faharavoravoana nesorina tamin''ny saha nahavokatra sy tamin''ny tany Moaba, ary nataoko tankina ny divay tamin''ny vata fanantazana ranom-boaloboka, tsy hisy hihoby amin''ny fanitsakitsahana; Ny fihobiana dia tsy fihobiana akory.'
mg1865::mg_24::48::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitarainan''i Hesbona dia re hatrany Elale sy Jahaza. Hatrany Zoara ka hatrany Horonaima sy Eglata-selisia*; Fa na dia ny ranon''i Nimrima aza dia ho ritra koa. [*Na: ilay ombivavy kely telo taona]'
mg1865::mg_24::48::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsahatro ao Moaba koa Izay miakatra hanatitra amin''ny fitoerana avo sy izay mandoro ditin-kazo manitra ho an''ny andriamaniny, hoy Jehovah.'
mg1865::mg_24::48::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny foko dia mitomany manao feon-tsodina noho ny amin''i Moaba, ary ny foko mitomany manao feon-tsodina noho ny amin''ny mponina ao Kira-haresa. Eny, noho izany dia levona ny harena be izay nohariny.'
mg1865::mg_24::48::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mibory ny loha rehetra. Ary voaharatra ny somotra rehetra, misy tetika amin''ny tanana rehetra sy lamba fisaonana amin''ny valahana.'
mg1865::mg_24::48::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, amin''ny tampon-trano rehetra any Moaba sy eny an-kalalahana dia misy fisaonana avokoa; Satria torotoroiko toy ny fanaka tsy mahafinaritra intsony Moaba, hoy Jehovah.'
mg1865::mg_24::48::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! raiki-tahotra izy! Midradradradrà! Indrisy! efa miamboho Moaba, mangaihay Izy, ka dia tonga fihomehezana sy fampitahorana ho an''izay rehetra manodidina azy.'
mg1865::mg_24::48::40:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Indro, hanidina toy ny voromahery izy ka hamelatra ny elany hipaoka an''i Moaba.'
mg1865::mg_24::48::41:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afaka ny tanàna*, ka azo ny batery fiarovana, ary amin''izany andro izany ny fon''ny lehilahy maherin''i Moaba dia ho tahaka ny fon''ny vehivavy mihetsi-jaza. [*Na: keriota]'
mg1865::mg_24::48::42:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary horavana tsy ho firenena intsony Moaba. Satria niavonavona tamin''i Jehovah izy.'
mg1865::mg_24::48::43:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahotra sy lavaka ary fandrika no mahazo anao, ry mponina any Moaba, hoy Jehovah.'
mg1865::mg_24::48::44:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandositra ny tahotra dia ho latsaka any an-davaka; Ary izay miakatra avy any an-davaka dia ho voan''ny fandrika; Fa hataoko tonga amin''i Moaba ny taona hamaliana azy, hoy Jehovah.'
mg1865::mg_24::48::45:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''ny alokalok''i Hesbona no ijanonan''ny mpandositra, satria lany hery ireny; Kanjo misy afo mivoaka avy any Hesbona, ary lelafo avy any Sihona, ka mandevona ny sisin*''i Moaba sy ny tampon-dohan''ny mpitabataba.'
mg1865::mg_24::48::46:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Idiran-doza ianao, ry Moaba! Ringana ny olon''i Kemosy! Fa ho babo ny zanakao-lahy, ary ho sambotra ny zanakao-vavy.'
mg1865::mg_24::48::47:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 48
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mbola hampodiko avy amin''ny fahababoana ihany Moaba any amparany, hoy Jehovah. Hatreto ny amin''ny fitsarana an''i Moaba.'
mg1865::mg_24::49::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Amona'
  verse_text: 'Ny amin''ny taranak''i Amona, Izao no lazain''i Jehovah: Moa tsy manan-janakalahy va Isiraely? Ary tsy manan-kandova va izy? Koa nahoana Gada no lasan''ny mpanjakany*, ary ny vahoakany monina ao amin''ny tanànany? [*Na: Malkana]'
mg1865::mg_24::49::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy ny andro, hoy Jehovah, izay hampandrenesako akoran''ady amin''ny famelezana an''i Raban''ny taranak''i Amona, ary ho tanàna haolo rava izy, ary ny zana-bohiny hodorana amin''ny afo; Ary ny Isiraely hahalasa ny an''izay nahalaza azy, hoy Jehovah.'
mg1865::mg_24::49::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà, ry Hesbona, fa rava Ay! Mitaraina, ianareo zanakavavin''i Raba! Misikina lamba fisaonana ianareo; Manaova fisaonana, ary mivoivoiza eo anaty fefy; Fa lasan-ko babo ny mpanjakany, dia ny mpisorony sy ireo mpanapaka azy.'
mg1865::mg_24::49::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no ny lohasaha no ataonao ho reharehanao, dia ny lohasahanao mahavokatra be. Ry zanakavavy mpiodina, izay mitoky amin''ny rakiny ka manao hoe: Iza moa no ho afa-miakatra aty amiko?'
mg1865::mg_24::49::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro Aho hahatonga tahotra aminao avy amin''izay rehetra manodidina anao, hoy Jehovah, Tompon''ny maro; Ary horoahina samy hizotra amin''izay hitsiny avy ianareo rehetra, sady tsy hisy hamory izay mandositra.'
mg1865::mg_24::49::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia hampodiko ihany avy amin''ny fahababoana ny taranak''i Amona, hoy Jehovah.'
mg1865::mg_24::49::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Edoma'
  verse_text: 'Ny amin''i Edoma. Izao no lazain''i Jehovah, Tompon''ny maro: Tsy misy fahendrena intsony va ao Temana? Very saina va ny olon-kendry? Lany va ny fahendreny?'
mg1865::mg_24::49::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandosira, miambohoa ianareo, mamitsaha ao amin''ny lalina, ry mponina any Dedana, fa ny loza ho an''i Esao dia nataoko nihatra taminy, dia ny andro hamaliako azy.'
mg1865::mg_24::49::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tonga ao aminao ny mpioty voaloboka, dia tsy hamela voaloboka sisa hotsimponina akory izy; Raha avy alina ny mpangalatra, dia handrava mandra-pahafa-pony izy.'
mg1865::mg_24::49::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia nampitanjaka an''i Esao, ary naharihariko ny fiereny, ka tsy mahazo miery izy; Ringana ny zanany sy ny rahalahiny ary ny namany, ka tsy ao intsony ireny.'
mg1865::mg_24::49::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilaozy ny zanakao ho kamboty, fa Izaho no hamelona azy, ary aoka Izaho no hitokian''ny vadinao mpitondratena.'
mg1865::mg_24::49::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah: Indro, fa na dia izay tsy tokony hisotro amin''ny kapoaka aza dia hisotro tokoa, ka moa ho afa-potsiny va ianao? Tsy ho afa-potsiny ianao, fa tsy maintsy hisotro tokoa.'
mg1865::mg_24::49::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenako no nianianako, hoy Jehovah, fa ho tonga figagana Bozra sy ho fandatsa sy ho rava ary ho fanozonana, ary ny tanànany rehetra ho lao mandrakizay.'
mg1865::mg_24::49::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nahare filazana avy tamin''i Jehovah aho, ary nisy iraka nalefa ho any amin''ny jentilisa hanao hoe: Mivoria ianareo, ka mankanesa hamely azy, ary mitsangàna hanafika.'
mg1865::mg_24::49::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, hataoko tsinontsinona eo amin''ny firenena ianao sy fanazimbazimba eo amin''ny olona,'
mg1865::mg_24::49::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry ilay monina ao an-tsefatsefaky ny harambato, Izay mifikitra amin''ny tampon''ny havoana, ny fahatahorana anao sy ny avonavon''ny fonao no namitaka anao; Fa na dia ataonao eny amin''ny avo tahaka ny an''ny voromahery aza ny akaninao, dia havariko avy eny ianao, hoy Jehovah.'
mg1865::mg_24::49::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho figagana Edoma: Izay rehetra mandalo azy dia ho gaga ka hisitrisitra noho ny loza rehetra efa namelezana azy.'
mg1865::mg_24::49::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny nandravana an''i Sodoma sy Gomora mbamin''ny tanàna teny akaikiny, hoy Jehovah, no tsy hisian''olona honina any, na zanak''olombelona hivahiny any.'
mg1865::mg_24::49::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, toy ny fiakatry ny liona avy any amin''ny kirihitrala eny amoron*''i Jordana no hiakarany ho any amin''ny misy ahitra mateza*; Fa hampandosiriko tampoka Edoma hiala ao, ary izay olona iray voafidy no hotendreko hanapaka azy. Fa iza no tahaka Ahy, ary iza no hifandahatra amiko, ary iza moa no mpiandry ondry mahajanona eo anatrehako? [*Hebreo: ny reharehany, Na: fonenany mafy]'
mg1865::mg_24::49::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa henoy ny saina avy amin''i Jehovah, Izay nosaininy hamelezana an''i Edoma, sy ny heviny izay noheveriny hamelezana ny mponina ao Temana: Hoviraviraina tokoa ireny, dia ny kely indrindra amin''ny ondry; Ho gaga azy tokoa ny saha fiandrasana azy.'
mg1865::mg_24::49::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny fiezinezin''ny fianjerany dia nihorohoro ny tany; Ny feon''ny fitarainany dia re hatrany amin''ny Ranomasina Mena.'
mg1865::mg_24::49::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hanidina hiakatra toy ny voromahery izy ka hamelatra ny elany eny ambonin''i Bozra; Ary amin''izany andro izany ny fon''ny lehilahy maherin''i Edoma dia ho tahaka ny fon''ny vehivavy mihetsi-jaza.'
mg1865::mg_24::49::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Damaskosy'
  verse_text: 'Ny amin''i Damaskosy. Very hevitra Hamata sy Arpada, fa nandre filazan-doza izy ka kivy; Misamboaravoara ny ranomasina ka tsy mety tafatoetra*. [*Na: Misy fanahiana hatrany an-dranomasina aza; tsy mahita fiononana ny olona]'
mg1865::mg_24::49::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ketraka Damaskosy ka mihodina handositra, fa, toran-kovitra izy; Ary azon''ny faharariana sy ny fanaintainana, toy ny vehivavy raha miteraka.'
mg1865::mg_24::49::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana re no tsy nilaozana ny tanàna malaza*, tanana fifaliako! [*Na: Indrisy! efa lao ny tanàna malaza]'
mg1865::mg_24::49::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hiampatrampatra eny an-kalalahana ny zatovony. Ary ny miaramila rehetra ho ringana avokoa amin''izany andro izany, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_24::49::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy afo hampirehetiko ao anatin''ny mandan''i Damaskosy, handevona ny lapan''i Beni-hadada.'
mg1865::mg_24::49::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Kedara sy Hazora'
  verse_text: 'Ny amin''i Kedara sy ny fanjakan''i Hazora, izay resin''i Nebokadnezara, mpanjakan''i Babylona. Izao no lazain''i Jehovah: Mitsangàna ianareo, ka miakara hamely an''i Kedara, ary aringano ny zanaky ny atsinanana.'
mg1865::mg_24::49::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halainy ny lainy sy ny ondry aman''osiny, ho entin''ny ambain-dainy mbamin''ny fanaka rehetra sy ny ramevany, sady hiantsoantso hilaza aminy hoe izy: Misy fampangorohoroana manodidina!'
mg1865::mg_24::49::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandosira, ka mandehana lavitra! Mamitsaha ao amin''ny lalina, ry mponina any Hazora! hoy Jehovah; Fa Nebokadnezara, mpanjakan''i Babylona, nanao saina hamelezany anareo sy namoron-kevitra hamelezany anareo*. [*Hebreo: azy]'
mg1865::mg_24::49::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, iakaro ny firenena miadana izay tsy manana ahiahy, hoy Jehovah. Dia izay tsy misy vavahady mirindrina na mihidy sady mitoka-monina.'
mg1865::mg_24::49::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho babo ny ramevany, ary horobaina ny omby aman''ondriny betsaka, haeliko ho any amin''ny rivotra rehetra ireo voahety sisim-bolo; Ary ho entiko avy amin''ny manodidina rehetra ny loza hanjo azy, hoy Jehovah,'
mg1865::mg_24::49::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hazora dia ho fonenan''ny amboadia* sy ho tany lao mandrakizay; Tsy hisy olona honina any, Na zanak''olombelona hivahiny any. [*Na: jakala]'
mg1865::mg_24::49::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 34
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Elama'
  verse_text: 'Ny tenin''i Jehovah izay tonga tamin''i Jeremia mpaminany ny amin''i Elama tamin''ny niandohan''ny nanjakan''i Zedekia, mpanjakan''ny Joda, hoe:'
mg1865::mg_24::49::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Indro, hotapatapahiko ny tsipïkan''i Elama, Izay fototry ny heriny.'
mg1865::mg_24::49::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitondra Avotra efatra avy amin''ny lafiny efatry ny lanitra Aho hamelezana an''i Elama, ary haeliko ho amin''izany rivotra rehetra izany izy, ka tsy hisy firenena izay tsy halehan''ny voaroaka avy any Elama.'
mg1865::mg_24::49::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hampivadi-po an''i Elama eo anoloan''ny fahavalony sy eo anoloan''izay mitady ny ainy Aho ka hahatonga loza aminy, dia ny firehetan''ny fahatezerako, hoy Jehovah; Ary hampanenjehiko azy ny sabatra Mandra-pandaniko azy;'
mg1865::mg_24::49::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hapetrako ao Elasma ny seza fiandrianako. Ary hofongorako tsy hisy intsony any na ny mpanjaka na ny mpanapaka, hoy Jehovah.'
mg1865::mg_24::49::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 49
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa any am-parany dia mbola hampodiko avy amin''ny fahababoany ihany Elama, hoy Jehovah.'
mg1865::mg_24::50::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Babylona'
  verse_text: 'Izao no teny nampilazain''i Jehovah an''i Jeremia mpaminany ny amin''i Babylona dia ny tanin''ny Kaldeana.'
mg1865::mg_24::50::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambaraonareo, eny, torio any amin''ny firenena, ary manangona faneva, torio, fa aza afenina, ataovy hoe: Afaka Babylona! Mangaihay Bela, raiki-tahotra Merodaka! Eny, mangaihay ny sampiny, Raiki-tahotra ny sarin-javatra!'
mg1865::mg_24::50::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy firenena avy any avaratra miakatra hamely azy ka hahatonga ny taniny ho lao tsy hisy mponina intsony; Fa na ny olona na ny biby dia samy handositra ka ho lasa avokoa.'
mg1865::mg_24::50::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany sy amin''izany fotoana izany, hoy Jehovah, dia ho avy ny Zanak''Isiraely, dia izy mbamin''ny taranak''i Joda, eny, handeha izy sady hitomany eny am-pandehanana ka hitady an''i Jehovah Andriamaniny.'
mg1865::mg_24::50::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanontany ny lalana mankany Ziona izy sady hanatrika hankany ka hanao hoe: Avia, ka maneke ho an''i Jehovah amin''ny fanekena mandrakizay izay tsy hohadinoina.'
mg1865::mg_24::50::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ondry very ny oloko, fa ny mpiandry azy nampirenireny azy, eny, nampirenireny azy teny an-tendrombohitra izy; Nirenireny teny an-tendrombohitra sy teny an-kavoana ireny. Ka hadinony ny tany fandriany.'
mg1865::mg_24::50::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra nahita azy dia nandringana azy, ary ny fahavalony nanao hoe: Tsy manan-keloka izahay, satria izy efa nanota tamin''i Jehovah, fonenan''ny fahamarinana, dia Jehovah, fanantenan''ny razany.'
mg1865::mg_24::50::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandosira hila an''i Babylona, eny, mialà amin''ny tanin''ny Kaldeana, ary aoka ianareo ho tahaka ny anankiray izay tari-dalan''ny ondry aman''osy andiany.'
mg1865::mg_24::50::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Izaho hamporisika sy hampiakatra firenena lehibe manao andiany avy any avaratra hamely an''i Babylona; Ary hilahatra hamely azy ireo, ka avy ao no hanafahany azy; Ny zana-tsipïkany ho tahaka ny lehilahy mahery sady mahay, izay tsy miverina foana.'
mg1865::mg_24::50::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kaldea ho voababo; Izay rehetra mamabo azy dia ho afa-po, hoy Jehovah.'
mg1865::mg_24::50::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria, mifaly sy miravoravo ianareo, ry mpamabo ny lovako, eny, mifalihavanja toy ny ombivavy kely mively vary* ianareo sady maneno toy ny soavaly matanjaka; [*Na: ombivavy kely eny amin''ny ahitra]'
mg1865::mg_24::50::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho menatra indrindra ny reninareo, hangaihay ilay niteraka anareo; Indro, ny faran''ny firenena, efitra sy tany karankaina ary tani-hay!'
mg1865::mg_24::50::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fahatezeran''i Jehovah dia tsy honenana Babylona. Fa ho tonga tany lao avokoa; Izay rehetra mandalo azy dia ho gaga ka hisitrisitra noho ny loza rehetra namelezana azy.'
mg1865::mg_24::50::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milahara manodidina hamely an''i Babylona, ianareo rehetra izay manenjana tsipïka; Asio izy, fa aza tsitsina ny zana-tsipïka, fa tamin''i Jehovah no nanotany.'
mg1865::mg_24::50::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akoray manodidina izy! Fa efa nikoy; Nirodana ny bateriny, rava ny mandany; Fa famalian''i Jehovah izany. Valio izy, eny, toy ny efa nataony no mba ataovinareo aminy kosa.'
mg1865::mg_24::50::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aringano tsy ho any Babylona ny mpamafy sy izay mitana fijinjana amin''ny fararano; Fa noho ny sabatra mandoza dia samy hihodina ho any amin''ny fireneny avy izy, ary samy handositra ho any amin''ny taniny avy.'
mg1865::mg_24::50::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ondry iray voavily ny Isiraely, Liona no nanenjika azy; Voalohany dia ny mpanjakan''i Asyria no nandany azy. Ary farany dia ity Nebokadnezara, mpanjakan''i Babylona, ity no nanapatapaka* ny taolany. [*Na: nikiky]'
mg1865::mg_24::50::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hovaliko ny mpanjakan''i Babylona sy ny taniny toy ny efa namaliako ny mpanjakan''i Asyria.'
mg1865::mg_24::50::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampodiko ho any amin''ny saha fiandrasana azy indray ny Isiraely, ka hihinana ao Karmela sy Basana izy; Ary any an-tany havoan''i Daima sy Gileada no hahavoky azy.'
mg1865::mg_24::50::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany sy amin''izany fotoana izany, hoy Jehovah, dia hotadiavina izay heloky ny Isiraely, fa tsy hisy; Ary izay fahotan''ny Joda, fa tsy ho hita; Satria havelako ny helok''izay sisa narovako.'
mg1865::mg_24::50::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iakaro Ibefikomiana* sy ny mponina ao Arapamaliana*; Ravao sy aringano** manarakaraka azy, hoy Jehovah, ary manaova araka izay rehetra nandidiako anao. [*Anaran''i Babylona io] [**Hebreo: ataovy herema]'
mg1865::mg_24::50::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy tabataban''ady amin''ny tany sy fandringanana be.'
mg1865::mg_24::50::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! tapaka sy torotoro ilay fampohazan''ny tany rehetra; Indrisy! Babylona efa tonga figagana any amin''ny firenena.'
mg1865::mg_24::50::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nofandrihako ianao, ry Babylona, ka voa, nefa tsy fantatrao akory; Hita ka voasambotra koa ianao, Satria nila ady tamin''i Jehovah.'
mg1865::mg_24::50::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Novohan''i Jehovah ny firaketany. Ka navoakany ny fitaovan''ny fahatezerany; Fa misy hataon''i Jehovah, Tompon''ny maro, any amin''ny tanin''ny Kaldeana.'
mg1865::mg_24::50::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia avokoa ianareo rehetra hamely azy; Vohay ny trano fitoeran-kanina, atobitobio toy ny antontan-bary, ka levony* avokoa izay ao; Fa aza avela hisy sisa ho azy. [*Hebreo: ataovy herema]'
mg1865::mg_24::50::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonoy ireo ombilahy rehetra, ary aoka hidina ho any amin''ny famonoana izy. Mahita loza izy, fa tonga ny androny, dia ny fotoana hamaliana azy.'
mg1865::mg_24::50::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy feon''izay mandositra sy izay afaka avy any amin''ny tany Babylona, hanambara ny famalian''i Jehovah Andriamanitsika ao Ziona, dia ny famaliana noho ny tempoliny.'
mg1865::mg_24::50::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Antsoy ny mpandefa zana-tsipïka* hamely an''i Babylona. Dia ny mpanenjana tsipïka rehetra; Mitobia manodidina hamely azy; Aoka tsy hisy ho afaka izy; Valio araka ny asany izy, eny, araka ny asa rehetra nataony, no mba ataovy aminy kosa; Fa niavonavona tamin''i Jehovah izy, dia tamin''ny Iray Masin''ny Isiraely. [*Na: ny mahery]'
mg1865::mg_24::50::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hiampatrampatra eny ankalalahana ny zatovony, ary ho ringana ny miaramilany rehetra amin''izany andro izany, hoy Jehovah.'
mg1865::mg_24::50::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hiatrika aminao Aho, ry Ifiavonavonana, hoy Jehovah, Tompon''ny maro; Fa tonga ny andronao, dia ny fotoana hamaliako anao.'
mg1865::mg_24::50::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tafintohina Ifiavonavonana, dia ho lavo, ka tsy hisy hanarina azy; Ary handrehitra afo ao an-tanànany Aho, ka handevona ny manodidina azy rehetra izany.'
mg1865::mg_24::50::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Niara-nampahorina ny Zanak''Isiraely sy ny taranak''i Joda; Ary izay rehetra namabo azy dia mihazona azy mafy ka tsy mety mandefa azy.'
mg1865::mg_24::50::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahery ny Mpanavotra azy, Jehovah, Tompon''ny maro, no anarany; Handahatra ny adiny tokoa Izy, mba hampiadana ny tany sy hampangovitra ny mponina any Babylona kosa.'
mg1865::mg_24::50::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro! hisy sabatra hamely ny Kaldeana mbamin''ny mponina any Babylona sy ny mpanapaka azy sy ny olon-kendriny, hoe Jehovah.'
mg1865::mg_24::50::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro! hisy sabatra hamely ny mpibedibedy, ka ho very saina izy; Indro! hisy sabatra hamely ny lehilahy maheriny, ka hivadi-po izy.'
mg1865::mg_24::50::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro! hisy sabatra hamely ny soavaliny sy ny kalesiny mbamin''ny olona samy hafa firenena rehetra ao aminy, ka ho tonga toy ny vehivavy ireny! Indro! Hisy sabatra hamely ny firaketany, ka horobaina izany.'
mg1865::mg_24::50::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fihantonan''ny andro no mahatankina ny ranony; Fa tany be sarin-javatra voasokitra izy, ary ny sampiny mahatahotra mahadala azy.'
mg1865::mg_24::50::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny bibi-dia any an''efitra sy ny kary* sy ny ostritsa no honina ao; Tsy honenana intsony mandrakizay izy ary tsy hitoerana hatramin''ny taranaka fara-mandimby. [*Hebreo: jakala]'
mg1865::mg_24::50::40:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nandravan''Andriamanitra an''i Sodoma sy Gomora mbamin''ny tanàna eny akaikiny, hoy Jehovah, no tsy hisian''olona honina any na zanak''olombelona hivahiny any.'
mg1865::mg_24::50::41:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, misy firenena avy any avaratra, dia firenena lehibe sy mpanjaka maro no mitsangana avy any amin''ny faran''ny tany.'
mg1865::mg_24::50::42:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsipika sy lefona no entiny; Lozabe sy tsy mamindra fo izy, ny feony dia mirohondrohona toy ny ranomasina, sady mitaingin-tsoavaly izy ary voaomana tahaka ny lehilahy ho amin''ny ady, hamely anao, ry Babylona zanakavavy.'
mg1865::mg_24::50::43:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ren''ny mpanjakan''i Babylona ny lazany, ka miraviravy tanany izy; Fahoriana no mahazo azy, eny, fanaintainana tahaka ny vehivavy raha miteraka.'
mg1865::mg_24::50::44:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, toy ny fiakatry ny liona avy ao amin''ny kirihitrala eny amoron*''i Jordana no hiakarany ho any amin''ny misy ahitra mateza**; Nefa hampandosiriko tampoka hiala ao aminy izy, ary izay olona anankiray voafidy no hotendreko hanapaka azy; Fa iza no tahaka Ahy, ary iza no hifandahatra amiko? Ary iza moa no mpiandry ondry mahajanona eo anatrehako? [*Hebreo: ny reharehany] [**Na: fonenany mafy]'
mg1865::mg_24::50::45:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa henoy ny saina avy amin''i Jehovah, izay nosaininy hamelezana an''i Babylona, sy ny heviny izay noheveriny hamelezana ny tanin''ny Kaldeana: Hoviraviraina tokoa ireny, dia ny kely indrindra amin''ny ondry; Ho gaga azy tokoa ny saha fiandrasana azy.'
mg1865::mg_24::50::46:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 50
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny antsoantso hoe: "Efa afaka Babylona", dia mihorohoro ny tany, ary ny fitarainana dia re any amin''ny firenena.'
mg1865::mg_24::51::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, hamporisihiko ny fanahin''ny mpandringana hamely an''i Babylona sy izay monina ao Leba-kamay*. [*Leba-kamay = Kaldea]'
mg1865::mg_24::51::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haniraka olona hafa firenena ho any Babylona Aho, izay hikororoka azy ka hahafoana ny taniny; Fa hamely azy manodidina amin''ny andro fahoriana ireo.'
mg1865::mg_24::51::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manenjana tsipïka mbamin''izay miandranandrana amin''ny akanjo fiarovan-tenany, dia aoka samy hasian''izay manenjana tsipïka; Aza tsitsinareo ny zatovony, aringano* avokoa ny miaramilany rehetra, [*Hebreo: Ataovy herema]'
mg1865::mg_24::51::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hiampatrampatra any amin''ny tanin''ny Kaldeana ny faty, ary izay voatrobaka dia hiampatrampatra any an-dalambeny.'
mg1865::mg_24::51::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely sy ny Joda, dia tsy hahafoy azy ho mpitondratena, na dia henika ny fahotany amin''ny Iray Masin''ny Isiraely aza ny taniny.'
mg1865::mg_24::51::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandosira hiala an''i Babylona ianareo, ary samia mamonjy ny ainareo avy; Aoka tsy ho voaringana noho ny fahotany ianareo; Fa izao no andro famalian''i Jehovah, Izy no hamaly azy.'
mg1865::mg_24::51::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Babylona dia kapoaka volamena teny an-tanan''i Jehovah, Izay nahamamo ny tany rehetra; Ny divainy efa nisotroan''ny firenena, koa izany no nahavery saina ireny.'
mg1865::mg_24::51::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tampoka no naharavan''i Babylona sy nahatorotoroany; Idradradradrao izy; Makà balsama hatao amin''ny feriny maharary azy, fa angamba ho sitrana ihany izy.'
mg1865::mg_24::51::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitady hanasitrana an''i Babylona izahay, nefa tsy nety sitrana izy; Afoizo izy, ka andeha isika samy handeha ho any amin''ny tanintsika avy; Fa mahatakatra ny lanitra ny helony ary mitehika amin''ny rahona.'
mg1865::mg_24::51::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nasehon''i Jehovah ny fahamarinantsika; Andeha, ka aoka hotorintsika ao Ziona ny asan''i Jehovah Andriamanitsika.'
mg1865::mg_24::51::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lambolamboy ny zana-tsipïka, tano ny ampinga; Jehovah efa namporisika ny fanahin''ny mpanjakan''ny Mediana; Fa ny hamely an''i Babylona no nosaininy, mba handringanana azy; Fa famalian''i Jehovah izany, eny, famaliana noho ny tempoliny.'
mg1865::mg_24::51::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manangona faneva eo akaikin''ny mandan''i Babylona; Ataovy mafy ny fiambenana; Alatsaho ny mpiambina, alamino ny Otrika; Fa Jehovah sady efa nisaina no nahatanteraka izay nolazainy ny amin''ny mponina any Babylona.'
mg1865::mg_24::51::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao izay monina eny amoron''ny rano be sady be rakitra, tonga ny fiafaranao, ka tsy hisy intsony ny filanao harena.'
mg1865::mg_24::51::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro, nianiana tamin''ny tenany hoe: Hofenoiko olona maro toy ny valala tokoa ianao, ary ireny dia* hanakora hamely anao, [*Na: na dia hofenoiko olona maro toy ny valala aza ianao, dia ireny no]'
mg1865::mg_24::51::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay nanao ny tany tamin''ny heriny sy nampiorina izao tontolo izao tamin''ny fahendreny ary namelatra ny lanitra tamin''ny fisainany.'
mg1865::mg_24::51::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nampirohondrohona ny rano any an-danitra Izy, dia nampiakatra zavona avy tany amin''ny faran''ny tany; Manao ny helatra ho an''ny ranonorana Izy sady mamoaka ny rivotra avy amin''ny firaketany.'
mg1865::mg_24::51::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana; Menarina ny mpanefy volamena rehetra noho ny amin''ny sarin-javatra voasokitra; Fa fitaka ny sarin-javatra an-idina, satria tsy misy aina ao aminy.'
mg1865::mg_24::51::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-poana ireny, dia asa mahatsikaiky foana; Amin''ny andro hamaliana azy dia ho levona izy.'
mg1865::mg_24::51::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba tahaka ireo ny Anjaran''i Jakoba, fa Mpamorona ny zavatra rehetra Izy; Ary ny Isiraely no firenena lovany; Jehovah, Tompon''ny maro, no anarany.'
mg1865::mg_24::51::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Langilangiko sy fiadiako ianao; Fa ianao no ho entiko manorotoro firenena, ary ianao no ho entiko mandringana fanjakana,'
mg1865::mg_24::51::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao no ho entiko manorotoro soavaly sy ny mpitaingina azy, ary ianao no ho entiko manorotoro ny kalesy sy ny mpitaingina azy;'
mg1865::mg_24::51::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao koa no ho entiko manorotoro ny lehilahy sy ny vehivavy, ary ianao no ho entiko manorotoro ny antitra sy ny tanora, ary ianao no ho entiko manorotoro ny zatovo sy ny virijina;'
mg1865::mg_24::51::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao koa no ho entiko manorotoro ny mpiandry ondry sy ny ondry andiany, ary ianao no ho entiko manorotoro ny mpiasa tany sy ny ombiny roa mizioga, ary ianao no ho entiko manorotoro ny governora sy ny lefiny.'
mg1865::mg_24::51::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampanodiaviko an''i Babylona sy ny mponina rehetra any Kaldea ny ratsy rehetra izay efa nataony tao Ziona teo imasonareo, hoy Jehovah.'
mg1865::mg_24::51::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro mamely anao Aho, ry tendrombohitra ahitan-doza. Izay mandringana ny tany rehetra, hoy Jehovah; Ary hahinjitro ny tanako hamelezana anao, dia hakodiako hianjera amin''ny harambato ianao ka hataoko tendrombohitra mirehitra.'
mg1865::mg_24::51::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mba hakana vato hatao fehizoro ianao, na hatao vato fanorenana; Fa ho lao mandrakizay ianao, hoy Jehovah.'
mg1865::mg_24::51::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manangana faneva eny amin''ny tany; Mitsofa anjomara any amin''ny firenena; Manendre* firenena hamely azy; Antsoy ny fanjakan''i Ararata sy Miny ary Askenaza hamely azy; Asio mpifehy hamely azy; Mampiakara soavaly toy ny valala volovoloina**. [*Hebreo: Manamasina] [**Na: mahatsiravina]'
mg1865::mg_24::51::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manendre firenena sy ireo mpanjakan''ny Mediana hamely azy, ny governora sy ny lefiny rehetra ary ny tany rehetra anjakany.'
mg1865::mg_24::51::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihorohoro sy mangovitra ny tany; Fa tanterahina amin''i Babylona ny fikasan''i Jehovah rehetra, mba hahatonga ny tany Babylona ho lao tsy misy mponina.'
mg1865::mg_24::51::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitsahatra tamin''ny ady ny lehilahy maherin''i Babylona, nitoetra tao amin''ny batery fiarovana izy, lany ny heriny; Tonga toy ny vehivavy izy; Nodorana ny fonenany, tapaka ny hidiny.'
mg1865::mg_24::51::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifamoivoy be ihany ny iraka mpihazakazaka, ary mifamoivoy be ihany ny mpitondra teny, mba hanambara amin''ny mpanjakan''i Babylona Fa afaka ny tanànany manontolo.'
mg1865::mg_24::51::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa azo ny fitàna, ary nodorany tamin''ny afo ny heniheny, sady toran-kovitra ny miaramila.'
mg1865::mg_24::51::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Babylona zanakavavy dia tahaka ny famoloana amin''ny andro anosena azy; Ary raha mbola tsy toy inona dia ho avy ny andro hijinjana azy.'
mg1865::mg_24::51::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa lanin''i Nebokadnezara, mpanjakan''i Babylona, izahay; Naringany izahay; Napetrany toy ny vata tsy misy entana izahay; Nateliny toy ny fitelin''ny mamba izahay; Nivokisan''ny kibony ny zava-piko, ka dia nandroaka ahy izy.'
mg1865::mg_24::51::35:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny mponina ao Ziona hanao hoe: Hanody an''i Babylona anie ny loza nanjo ahy sy ny nofoko! Ary aoka Jerosalema hanao hoe: Hanody ny mponina any Kaldea anie ny rako!'
mg1865::mg_24::51::36:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Indro, hisolo vava anao amin''ny adinao Aho sady hanao famaliana ho anao, ary horitiko ny ranomasiny, sy hataoko tankina ny loharanony.'
mg1865::mg_24::51::37:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Babylona ho tonga korontam-bato, ho fonenan''ny amboadia, ho figagana sy ho zavatra mampisitrisitra, ka tsy hisy mponina.'
mg1865::mg_24::51::38:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiara-mierona toy ny liona tanora izy; Hikaonkaona toy ny zana-diona izy.'
mg1865::mg_24::51::39:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola liana izy, dia hanaovako fanasana ho azy, ka hataoko mamo izy mba hiravoravo, dia hatory amin''ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy Jehovah.'
mg1865::mg_24::51::40:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampidiniko ho any amin''ny famonoana toy ny zanak''ondry izy, sy toy ny ondrilahy mbamin''ny osilahy.'
mg1865::mg_24::51::41:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! afaka Sesaka*! Ary azo ilay fidàran''ny tany rehetra, Endrey! tonga figagana any amin''ny firenena Babylona. [*Sesaka = Babela]'
mg1865::mg_24::51::42:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ranomasina nanafotra an''i Babylona; Voasaron''ny habetsahan''ny onjany izy.'
mg1865::mg_24::51::43:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanànany dia lao sy karankaina ary tani-hay, dia tany tsy onenan''olona sady tsy misy zanak''olombelona mamaky eo.'
mg1865::mg_24::51::44:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Bela dia hampijaliko any Babylona, ka hasaiko haloany izay nateliny; Ary ny firenena tsy hitanjozotra hankany aminy intsony; Ny mandan''i Babylona dia hirodana.'
mg1865::mg_24::51::45:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoaha avy ao afovoany ianareo, ry oloko, ary samia mamonjy ny ainareo avy ianareo, mba tsy ho azon''ny firehetan''ny fahatezeran''i Jehovah.'
mg1865::mg_24::51::46:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fandrao ketraka ny fonareo, ka matahotra ianareo noho ny tsaho miely amin''ny tany; Fa amin''ny iray taona dia hisy tsaho, ary amin''ny taona manaraka indray dia mbola hisy tsaho ihany koa sy loza amin''ny tany, dia mpanapaka mamely mpanapaka.'
mg1865::mg_24::51::47:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa, indro, avy ny andro hamaliako ny sarin-javatr''i Babylona; Ho menatra ny taniny rehetra; Ary ny fatiny rehetra dia hiampatrampatra eo aminy.'
mg1865::mg_24::51::48:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra sy ny tany sy izay rehetra ao aminy dia hihoby noho ny amin''i Babylona, satria tonga ao aminy avy any avaratra ireo mpandringana, hoy Jehovah.'
mg1865::mg_24::51::49:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nampiampatramparan''i Babylona ny faty tamin''ny Isiraely, dia ho toy izany no hiampatramparan''ny faty amin''ny tany rehetra noho ny amin''i Babylona.'
mg1865::mg_24::51::50:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay tsy voan''ny sabatra, mialà, fa aza mijanona; Tsarovy Jehovah, raha mbola lavitra ianareo. Ary aoka ho mby an-tsainareo Jerosalema.'
mg1865::mg_24::51::51:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Menatra izahay, fa efa nandre latsa; Manarona ny atrehinay ny henatra; Fa ny hafa firenena no niditra teo amin''ny fitoerana masina amin''ny tranon''i Jehovah.'
mg1865::mg_24::51::52:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, avy ny andro, hoy Jehovah, izay hamaliako ny sarin-javatra voasokitra ao koa; Ary hitoloko eran''ny taniny rehetra ny voatrobaka.'
mg1865::mg_24::51::53:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia miakatra any an-danitra aza Babylona, ary na dia ataony mafy aza ny fitoerana avo izay heriny, dia avy amiko no hihavian''ny mpandringana azy, hoy Jehovah;'
mg1865::mg_24::51::54:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy feo mitaraina avy any Babylona sy fandringanana be avy any amin''ny tanin''ny Kaldeana!'
mg1865::mg_24::51::55:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah no mandrava an''i Babylona sy mampitsahatra ny fihorakorahana eo aminy, ary hirohondrohona toy ny rano be ny onjany, eny, re tokoa ny feon''ny firohondrohony.'
mg1865::mg_24::51::56:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga ao aminy, dia ao Babylona, ny mpandringana, ary voasambotra ny lehilahy maheriny; Tapatapaka avokoa ny tsipïkany Satria Jehovah dia Andriamanitry ny famaliana ka hamaly tokoa.'
mg1865::mg_24::51::57:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko mamo ny mpanapaka azy sy ny olon-kendriny, ny governorany sy ny lefiny ary ny olo-maheriny; Ary hatory amin''ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany.'
mg1865::mg_24::51::58:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Ny manda malalaka any Babylona dia horavana tokoa hatramin''ny fanorenany, ary ny vavahadiny avo hodorana amin''ny afo. Ka dia ho nisasatra foana ny firenena, ary ny olona ho nisasatra ho an''ny afo ka ho reraka.'
mg1865::mg_24::51::59:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny izay nandidian''i Jeremia mpaminany an''i Seraia, zanak''i Neria, zanak''i Mahaseia, fony izy nandeha niaraka tamin''i Zedekia, mpanjakan''ny Joda, ho any Babylona tamin''ny taona fahefatra nanjakany. Fa Seraia no lehiben''ny mpanorin-dasy.'
mg1865::mg_24::51::60:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nosoratan''i Jeremia teo amin''ny boky iray ny loza rehetra izay hanjo an''i Babylona, dia ireo teny rehetra ireo, izay voasoratra ny amin''i Babylona.'
mg1865::mg_24::51::61:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeremia tamin''i Seraia: Rehefa tonga any Babylona ianao, dia tandremo tsara mba hovakinao ireo teny rehetra ireo,'
mg1865::mg_24::51::62:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manaova hoe: Jehovah o, Ianao no niteny hamely ity tany ity handringana azy, ka tsy hisy hitoetra eto, na olona na biby, fa ho tany lao mandrakizay izy.'
mg1865::mg_24::51::63:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny famakianao ity boky ity, dia asio vato afehy aminy, ary atsipazo ao Eofrata izy.'
mg1865::mg_24::51::64:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 51
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe : Toy izao no hilentehan''i Babylona ka tsy hifongarany intsony noho ny loza hataoko mihatra aminy, ka dia ho reraka izy.'
mg1865::mg_24::52::1:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Tantaran''ny nahafahana an''i Jerosalema sy ny zavatra nanjo tamin''izany'
  verse_text: 'Iraika amby roa-polo taona Zedekia, fony izy vao nanjaka, ary iraika ambin''ny folo taona no nanjakany tany Jerosalema; ary ny anaran-dreniny dia Hamotala, zanakavavin''i Jeremia avy any Libna.'
mg1865::mg_24::52::2:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, araka izay rehetra nataon''i Joiakima.'
mg1865::mg_24::52::3:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahatezeran''i Jehovah no nahatongavan''izany tamin''i Jerosalema sy ny Joda ambara-pandroakany azy tsy ho eo anatrehany. Ary Zedekia niodina tamin''ny mpanjakan''i Babylona.'
mg1865::mg_24::52::4:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahafolo tamin''ny taona fahasivy nanjakan''i Zedekia, dia tonga Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra, hamely an''i Jerosalema, ka nitoby tandrifiny sady nanao tilikambo manodidina azy izy.'
mg1865::mg_24::52::5:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanàna dia nataony fahirano hatramin''ny fahiraika ambin''ny folo taona nanjakan''i Zedekia mpanjaka.'
mg1865::mg_24::52::6:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahasivy tamin''ny volana fahefatra dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an''ny olona tompon-tany.'
mg1865::mg_24::52::7:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy voabanga ny tanàna, dia nandositra alina ny miaramila rehetra ka niala tao an-tanàna tamin''ny lalana mankamin''ny vavahady tanelanelan''ny manda roa, izay eo anilan''ny sahan''ny mpanjaka (fa ny Kaldeana nanodidina ny tanàna), ka nandeha tamin''ny lalana mankeny amin''ny tani-hay*. [*Hebreo: Arabà]'
mg1865::mg_24::52::8:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramilan''ny Kaldeana nanenjika ny mpanjaka ka nahatratra an''i Zedekia teny amin''ny tani-hay any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra.'
mg1865::mg_24::52::9:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voasambotra ny mpanjaka ka nentiny niakatra ho any amin''ny mpanjakan''i Babylona tao Ribla any amin''ny tany Hamata, ka dia notsaraina tao izy.'
mg1865::mg_24::52::10:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Babylona namono ny zanakalahin''i Zedekia teo imason-drainy; ary ny mpanapaka ny Joda rehetra koa dia novonoiny tao Ribla.'
mg1865::mg_24::52::11:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopotsiriny ny mason''i Zedekia, dia nafatotry ny mpanjakan''i Babylona tamin''ny gadra varahina izy ka nentiny nankany Babylona ary nataony tao an-trano-maizina mandra-pahafatiny.'
mg1865::mg_24::52::12:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahadimy tamin''ny taona fahasivy ambin''ny folo nanjakan''i Nebokadnezara, mpanjakan''i Babylona, dia tonga tany Jerosalema Nebozaradana, lehiben''ny mpiambina, mpanompon*''ny mpanjakan''i Babylona, [*Hebreo: izay nitsangana teo anatrehan'']'
mg1865::mg_24::52::13:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nandoro ny tranon''i Jehovah sy ny tranon''ny mpanjaka mbamin''ny trano rehetra tany Jerosalema: ny trano lehibe rehetra dia nodorany tamin''ny afo avokoa.'
mg1865::mg_24::52::14:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny manda rehetra manodidina an''i Jerosalema dia noravan''ny miaramilan''ny Kaldeana rehetra, izay nanaraka ny lehiben''ny mpiambina.'
mg1865::mg_24::52::15:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ny olona malahelo mbamin''ny olona sisa tao an-tanàna sy izay efa nandositra nanatona ny mpanjakan''i Babylona mbamin''ny vahoaka maro be sisa dia nentin''i Nebozaradana, lehiben''ny mpiambina, ho babo avokoa.'
mg1865::mg_24::52::16:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny olona malahelo dia namelan''i Nebozaradana, lehiben''ny mpiambina, ihany mba ho mpamboatra tanim-boaloboka sy ho mpiasa tany.'
mg1865::mg_24::52::17:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo andry varahina teo amin''ny tranon''i Jehovah sy ny fitoeran-tavin-drano sy ny tavin-drano varahina lehibe*, izay teo amin''ny tranon''i Jehovah, dia novakivakin''ny Kaldeana, ka nentiny ho any Babylona ny varahina rehetra. [*Hebreo: ranomasina]'
mg1865::mg_24::52::18:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny koa ny vilany fandraofan-davenona sy ny sotron''afo sy ny antsy sy ny lovia famafazana sy ny lovia kely mbamin''ny fanaka varahina rehetra izay nenti-nanao fanompoam-pivavahana.'
mg1865::mg_24::52::19:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentin''ny lehiben''ny mpiambina koa ny lovia sy ny fitoeran-davenon-jiro sy ny lovia famafazana sy ny fandraofan-davenona sy ny fanaovan-jiro sy ny lovia kely sy ny kapoaka na ny volamena na ny volafotsy dia samy nentin''ny lehiben''ny mpanapaka avokoa,'
mg1865::mg_24::52::20:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andry roa sy ny tavin-drano lehibe iray aty ny omby varahina roa ambin''ny folo, Izay teo ambanin''ny fitoeran-tavin-drano, izay nataon''i Solomona mpanjaka ho an''ny tranon''i Jehovah; ny varahina tamin''izany fanaka rehetra izany dia tsy hita lanja.'
mg1865::mg_24::52::21:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny andry, dia valo ambin''ny folo hakiho no hahavony, ary roa ambin''ny folo hakiho ny manodidina azy; ary ny hateviny dia voantondro efatra, fa poakaty izy.'
mg1865::mg_24::52::22:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy kapitaly varahina teo aminy; dimy hakiho no hahavon''ny kapitaly anankiray, ka nisy harato sy ampongabendanitra manodidina ny kapitaly, samy varahina avokoa izy. Ny andry faharoa koa sy ny ampongabendanitra dia mba tahaka izany ihany koa.'
mg1865::mg_24::52::23:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ampongabendanitra enina amby sivi-folo teo ivelany; ary ny ampongabendanitra rehetra manodidina ny harato dia zato.'
mg1865::mg_24::52::24:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehiben''ny mpiambina nisambotra an''i Seraia mpisoronabe sy Zefania mpisorona manarakaraka ary mpiandry varavarana telo lahy;'
mg1865::mg_24::52::25:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tao an-tanàna no nisamborany ny tandapa anankiray, mpifehy ny miaramila, ary fito lahy tamin''izay mpitoetra eo anatrehan''ny mpanjaka, izay hita tao an-tanàna, ary ny mpanoratry ny komandin''ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enim-polo lahy izay hita teo an-tanàna,'
mg1865::mg_24::52::26:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nosamborin''i Nebozaradana, lehiben''ny mpiambina, ireo ka nentiny ho any amin''ny mpanjakan''i Babylona tao Ribla.'
mg1865::mg_24::52::27:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novonoin''ny mpanjakan''i Babylona tao Ribla any amin''ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin''ny taniny.'
mg1865::mg_24::52::28:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no olona izay nentin''i Nebokadnezara ho babo tamin''ny taona fahafito, Jiosy telo amby roa-polo sy telo arivo;'
mg1865::mg_24::52::29:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taona fahavalo ambin''ny folo nanjakan''i Nebokadnezara dia roa amby telo-polo amby valon-jato no olona nentiny ho babo avy tany Jerosalema;'
mg1865::mg_24::52::30:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taona fahatelo amby roa-polo nanjakan''i Nebokadnezara dia Jiosy dimy amby efa-polo amby fiton-jato no nentin''i Nebozaradana, lehiben''ny mpiambina, ho babo. Ny tontalin''izy rehetra dia enin-jato amby efatra arivo.'
mg1865::mg_24::52::31:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahadimy amby roa-polo tamin''ny volana faharoa ambin''ny folo tamin''ny taona fahafito amby telo-polo taorian''ny namaboana an''i Joiakina, mpanjakan''ny Joda, tamin''ny taona vao nanjakan''i Evila-merodaka, mpanjakan''i Babylona, dia nasandrany* hiala tao an-trano-maizina Joiakina, mpanjakan''ny Joda. [*Hebreo: nasandrany ny lohany]'
mg1865::mg_24::52::32:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitenenany soa izy, ka ny seza fiandrianany dia nataony ambony noho ny seza fiandrianan''ireo mpanjaka namany tao Babylona.'
mg1865::mg_24::52::33:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia novan''i Joiakina ny fitafiany fony izy mbola tao an-trano-maizina; ary nihinan-kanina teo anatrehany mandrakariva izy tamin''ny andro niainany rehetra.'
mg1865::mg_24::52::34:
  verse_version: mg1865
  verse_book: mg_24
  verse_chapter: 52
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hanina nohaniny dia hanina homena avy amin''ny mpanjakan''i Babylona, araka ny tokony ho anjarany isan''andro isan''andro tamin''ny andro rehetra niainany mandra-pahafatiny. [*Na: ny sisim-bolombavany]'
