mg1865::mg_38::1::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fitarihan-teny
  verse_text: 'Tamin''ny volana fahavalo tamin''ny taona faharoa nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah tamin''i Zakaria mpaminany, zanak''i Berekia, zanak''Ido, nanao hoe:'
mg1865::mg_38::1::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tezitra indrindra tamin''ny razanareo Jehovah.'
mg1865::mg_38::1::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: '2022-07-17T20:41:46+0000'
  verse_title: null
  verse_text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Miverena Amiko ianareo, hoy Jehovah, Tompon''ny maro, dia mba hiverina ho aminareo kosa Aho, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_38::1::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mba toy ny razanareo, izay nantsoin''ny mpaminany fahiny hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Mialà amin''ny lalanareo ratsy ianareo sy amin''ny ratsy fanaonareo; nefa tsy nitandrina izy, na nihaino Ahy, hoy Jehovah.'
mg1865::mg_38::1::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny razanareo — aiza moa ireny izao ? Ary ny mpaminany — moa velona mandrakizay va ireny?'
mg1865::mg_38::1::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny teniko sy ny didiko, izay nandidiako ny mpaminany mpanompoko, tsy nahatratra ny razanareo va izany? Ary izy nitodika ka nanao hoe : Araka izay nosainin''i Jehovah, Tompon''ny maro, hatao amintsika, araka ny alehantsika sy ny ataontsika, dia araka izany no nataony tamintsika.'
mg1865::mg_38::1::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Fahitana voalohany: ny amin''ny mpitaingin-tsoavaly eny amin''ny rotra'
  verse_text: 'Tamin''ny andro fahefatra amby roa-polo tamin''ny volana fahiraika ambin''ny folo (volana Sebata izany) tamin''ny taona faharoa nanjakan''i Dariosa dia tonga tamin''i Zakaria mpaminany, zanak''i Berekia, zanak''Ido, ny tenin''i Jehovah nanao, hoe:'
mg1865::mg_38::1::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahita tamin''ny alina aho fa, indro, nisy lehilahy nitaingina soavaly mena ka nijanona teny amin''ny rotra* teny an-dohasaha*, ary teo aoriany nisy soavaly mena sy mavo ary fotsy. [*myrta] [**Na: amin''ny alokaloka]'
mg1865::mg_38::1::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Tompoko o, inona moa ireo? Ary ilay anjely niresaka tamiko dia nanao tamiko hoe: Izaho haneho anao ny amin''ireo.'
mg1865::mg_38::1::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ralehilahy izay nijanona teny amin''ny rotra* dia namaly hoe: Ireo dia nirahin''Jehovah hivoivoy eny amin''ny tany. [*myrta]'
mg1865::mg_38::1::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly Ilay Anjelin''i Jehovah nijanona teny amin''ny rotra* ireo ka nanao hoe: Efa nivoivoy teny amin''ny tany izahay, ary, indro, ny tany rehetra dia miadana sy mandry fahizay. [*myrta]'
mg1865::mg_38::1::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ilay Anjelin''i Jehovah namaly hoe: He, Jehovah, Tompon''ny maro o! mandra-pahoviana no tsy hamindranao fo amin''i Jerosalema sy amin''ny tanànan''ny Joda, izay efa nahatezitra Anao fito-polo taona izay.'
mg1865::mg_38::1::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novalian''i Jehovah teny tsara sy mampionona ilay anjely niresaka tamiko.'
mg1865::mg_38::1::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay anjely niresaka tamiko dia nanao tamiko hoe: Miantsoa hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Saro-piaro dia saro-piaro an''i Jerosalema sy Ziona Aho.'
mg1865::mg_38::1::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tezitra indrindra Aho amin''ireo firenena miadana; satria Izaho dia tezitra kely ihany, fa ireo kosa dia nampitombo ny fahoriana.'
mg1865::mg_38::1::16:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Efa tafaverina eto Jerosalema amin''ny indrafo Aho; ny tranoko haorina eto, hoy Jehovah, Tompon''ny maro, ary ny famolaina hohenjanina eto Jerosalema.'
mg1865::mg_38::1::17:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantsoa indray hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Hihoa-pampana ny fanambinana ny tanànako; ary Jehovah hampionona an''i Ziona ary mbola hifidy an''i Jerosalema indray.'
mg1865::mg_38::2::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana faharoa: ny amin''ny tandroka efatra sy ny mpiasa efatra'
  verse_text: 'Ary natopiko ny masoko, ka hitako fa, indreo, nisy tandroka efatra.'
mg1865::mg_38::2::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho tamin''ilay anjely niresaka tamiko: Inona moa ireo? Dia hoy izy tamiko: Ireo no tandroka izay nampihahaka ny Joda sy ny Isiraely ary Jerosalema.'
mg1865::mg_38::2::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanehoan''i Jehovah mpiasa efatra aho.'
mg1865::mg_38::2::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Avy hanao inona moa ireto? Ary Izy nanao hoe: Ireo no tandroka nampihahaka ny Joda, ka tsy nisy olona nanandrandra loha; fa ireto kosa dia avy hampahatahotra azy mba hampiongana ny tandroky ny firenena, dia izay nanandratra ny tandrony tamin''ny tanin''ny Joda hanely azy.'
mg1865::mg_38::2::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Fahitana fahatelo: ny amin-dralehilahy nitondra famolaina'
  verse_text: 'Dia natopiko ny masoko, ka hitako fa, indro, nisy lehilahy manana kofehy famolaina eny an-tanany.'
mg1865::mg_38::2::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Ho aiza moa ianao? Ary hoy izy tamiko: Handrefy an''i Jerosalema hizaha ny sakany sy ny lavany aho.'
mg1865::mg_38::2::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nivoaka ilay anjely niresaka tamiko, ary nisy anjely anankiray koa nivoaka hitsena azy'
mg1865::mg_38::2::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Mihazakazaha, ka milazà amin''io zatovo io hoe: Honenana toy ny tanana tsy mimanda Jerosalema noho ny hamaroan''ny olona sy ny biby fiompy ao aminy.'
mg1865::mg_38::2::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho, hoy Jehovah, ho manda afo manodidina azy ary ho voninahitra ao afovoany.'
mg1865::mg_38::2::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! he! mandosira avy any amin''ny tany avaratra, hoy Jehovah; fa aeliko ho toy ny rivotra efatry ny lanitra ianareo, hoy Jehovah.'
mg1865::mg_38::2::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! vonjeo ny tenanao, ry Ziona, izay monina ao Babylona zanakavavy.'
mg1865::mg_38::2::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro: Hampiseho* voninahitra no nanirahany ahy tany amin''ny firenena izay namabo anareo; fa izay mikasika anareo dia mikasika ny anakandriamasony. [*Hebreo: aorian''ny]'
mg1865::mg_38::2::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, hahinjitro eo amboniny ny tanako, ka hobaboin''ireo nanompo azy izy; dia ho fantatrareo fa Jehovah, Tompon''ny maro, no naniraka ahy.'
mg1865::mg_38::2::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihobia sy mifalia, ry Ziona zanakavavy, fa, indro, avy honina ao afovoanao Aho, hoy Jehovah.'
mg1865::mg_38::2::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary firenena maro no hanaiky ho an''i Jehovah amin''izany andro izany ka ho oloko; ary hitoetra ao afovoanao aho, ka dia ho fantatrao fa Jehovah, Tompon''ny maro, no naniraka ahy ho aminao.'
mg1865::mg_38::2::16:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hanana an''i Joda ho anjarany ao amin''ny tany masina ary mbola hifidy an''i Jerosalema indray.'
mg1865::mg_38::2::17:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangina eo anatrehan''i Jehovah, ry nofo rehetra! fa nifoha avy ao amin''ny fitoerany masina Izy.'
mg1865::mg_38::3::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana fahefatra: Josoa mpisoronabe nitsangana teo anatrehan''Ilay Anjelin''i Jehovah'
  verse_text: 'Ary dia nasehony ahy fa, indro, Josoa mpisoronabe nitsangana teo anatrehan''Ilay Anjelin''i Jehovah, ary Satana nitsangana teo an-kavanany hiampanga azy.'
mg1865::mg_38::3::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Satana: Hananatra anao anie Jehovah, ry Satana; eny, Jehovah Izay nifidy an''i Jerosalema anie hananatra anao; tsy forohana nosarihana tamin''ny afo va ity?'
mg1865::mg_38::3::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josoa nitafy fitafiana maloto ary nitsangana teo anoloan''Ilay Anjely.'
mg1865::mg_38::3::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Jehovah ka nilaza tamin''izay nitsangana teo anoloany hoe: Esory aminy ny fitafiana maloto. Ary hoy koa Izy taminy: Indro, efa nesoriko ny helokao, ary hampiakanjoiko akanjo fihaingoana ianao.'
mg1865::mg_38::3::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Aoka hasiany hamama madio eo an-dohany. Ka dia nasiany hamama madio teo an-dohany, sady nampitafiny izy; ary Ilay Anjelin''i Jehovah dia nitsangana teo.'
mg1865::mg_38::3::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ilay Anjelin''i Jehovah nilaza marimarina tamin''i Josoa hoe:'
mg1865::mg_38::3::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Raha mizotra amin''ny lalako ianao sy mitandrina ny didiko, dia ianao no hitsara ny amin''ny tranoko sy hitandrina ny kianjako, sady homeko lalana ho amin''ireo mitsangana ireo ianao.'
mg1865::mg_38::3::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa, ry Josoa mpisoronabe, dia ianao sy ny namanao izay mipetraka eo anoloanao; fa olona atao fahagagana ireo; fa, indro, ho entiko Rantsana* Mpanompoko. [*Na: solofo]'
mg1865::mg_38::3::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ny vato izay napetrako teo anoloan''i Josoa, ny vato iray dia banjinin''ny maso fito*; indro, hosoratako ny sorany, hoy Jehovah Tompon''ny maro, ary hesoriko indray andro monja ny helok''ity tany ity. [*Hebreo: amin''ny vato iray misy maso fito]'
mg1865::mg_38::3::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany, hoy Jehovah, Tompon''ny maro, dia samy hiantso ny namanareo avy ho eo ambanin''ny voaloboka sy ho eo ambanin''ny aviavy ianareo.'
mg1865::mg_38::4::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana fahadimy: ny amin''ny fanaovan-jiro, sy ny hazo oliva roa'
  verse_text: 'Ary niverina ilay anjely niresaka tamiko ka namoha ahy toy ny olona fohazina amin-tory.'
mg1865::mg_38::4::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Inona no hitanao? Ary hoy izaho: Hitako fa, indro, misy fanaovan-jiro tena volamena, ary ny fitoeran-diloilony dia eo an-tampony, ary ny lela fanaovan-jirony fito kosa dia eo aminy, ary misy fantsona fito avy amin''ny isan''ny lela fanaovan-jiro izay eo an-tampony;'
mg1865::mg_38::4::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary misy hazo oliva roa eo anilany, ny anankiray eo an-kavanan''ny fitoeran-diloilo, ary ny anankiray eo an-kaviany.'
mg1865::mg_38::4::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''ilay anjely niresaka tamiko aho nanao hoe: Inona moa ireo, tompoko?'
mg1865::mg_38::4::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay anjely niresaka tamiko dia namaly ka nanao tamiko hoe: Tsy fantatrao va ireo? Fa hoy izaho: Tsia, tompoko.'
mg1865::mg_38::4::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly izy ka nanao tamiko hoe: Izao no tenin''i Jehovah amin''i Zerobabela: Tsy amin-kery na amim-pahatanjahana, fa amin''ny Fanahiko, hoy Jehovah, Tompon''ny maro .'
mg1865::mg_38::4::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa ianao, ry tendrombohitra lehibe ? Ho tonga tany lemaka eo anoloan''i Zerobabela ianao*; ary ho entiny mivoaka ny vato hatao tendrony sady hisy fiantsoana hoe: Fahasoavana, fahasoavana anie ho aminy! [*Na: ry tendrombohitra lehibe eo anoloan''i Zerobabela? Ho tany lemaka ianao]'
mg1865::mg_38::4::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko indray ny tenin''i Jehovah nanao hoe:'
mg1865::mg_38::4::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanan''i Zerobabela no nanao ny fanorenan''ity trano ity, ary ny tanany koa no hamita azy; ka dia ho fantatrao fa Jehovah, Tompon''ny maro, no naniraka ahy ho aminao.'
mg1865::mg_38::4::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no nanamavo ny andron''ny zava-madinika? Ho faly mahita ny pilao eny an-tanan''i Zerobabela ireo fito ireo, dia ny mason''i Jehovah, izay mijery eny tontolo eny eran''ny tany rehetra'
mg1865::mg_38::4::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly aho ka nanao taminy hoe: Inona moa ireo hazo oliva roa eo an-kavanan''ny fanaovan-jiro sy eo an-kaviany ireo?'
mg1865::mg_38::4::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly koa aho ka nanao taminy hoe: Inona moa ireo sampahon''oliva roa eo amin''ny fantsona volamena izay mampijononoka ny diloilo volamena avy ao aminy ireo?'
mg1865::mg_38::4::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly izy hoe: Tsy fantatrao va ireo? Ary hoy izaho: Tsia, tompoko.'
mg1865::mg_38::4::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Ireo no zana-diloilo roa, izay mitsangana eo anoloan''ny Tompon''ny tany rehetra.'
mg1865::mg_38::5::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana fahenina: ny amin''ilay horonan-taratasy manidina, sy ravehivavy ao anatin''ny vata famarana'
  verse_text: 'Dia natopiko indray ny masoko, ka hitako fa, indro, nisy horonan-taratasy manidina.'
mg1865::mg_38::5::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Inona moa no hitanao? Dia hoy izaho: Mahita horonan-taratasy manidina aho; roa-polo hakiho ny lavany, ary folo hakiho ny sakany.'
mg1865::mg_38::5::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Izany no ozona mivoaka ho eny amin''ny tany rehetra; fa izay rehetra mangalatra dia hosorohina araka izany, ary izay rehetra mianiana dia hosorohina araka izany koa.'
mg1865::mg_38::5::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho entiko mivoaka izany, hoy Jehovah, Tompon''ny maro, ka hiditra ao an-tranon''ny mpangalatra sy ao an-tranon''izay mianian-tsy to amin''ny anarako ary hitoetra ao amin''ny tranony ka handevona azy mbamin''ny hazony sy ny vatony.'
mg1865::mg_38::5::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ilay anjely niresaka tamiko ka nanao tamiko hoe: Atopazy ny masonao, ka jereo io mivoaka io.'
mg1865::mg_38::5::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Inona moa io ? Ary hoy izy: Io ilay vata famarana* ''mivoaka. Hoy koa izy: Izao no tarehiny any amin''ny tany rehetra [*Hebreo: efaha]'
mg1865::mg_38::5::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: '(ary, indro, nisy vongam-piraka boribory naingaina) ary io no vehivavy iray mipetraka ao anatin''ny vata famarana*. [*Hebreo: efaha]'
mg1865::mg_38::5::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Faharatsiana io. Ka dia natontany tao anatin''ny vata famarana* io; ary natontany teo am-bavan''io ny vato firaka. [*Hebreo: efaha]'
mg1865::mg_38::5::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natopiko ny masoko, ka hitako fa, indreo, nisy vehivavy roa nivoaka, ary nahazo rivotra ny elany, fa nanana elatra toy ny elatry ny vano izy; ary naingainy ho eo anelanelan''ny tany sy ny lanitra ny vata famarana.7'
mg1865::mg_38::5::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho tamin''ilay anjely niresaka tamiko: Ho aiza no itondran''ireto ny vata famarana*. [*Hebreo: efaha]'
mg1865::mg_38::5::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Hanaovana trano ho azy any amin''ny tany Sinara, ary rehefa vita izany, dia hapetraka ao amin''ny fipetrahany izy.'
mg1865::mg_38::6::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana fahafito: ny amin''ny kalesy efatra'
  verse_text: 'Ary natopiko indray ny masoko ka hitako fa, indreo, nisy kalesy efatra nivoaka avy teo anelanelan''ny tendrombohitra roa; ary tendrombohitra varahina ireo tendrombohitra ireo.'
mg1865::mg_38::6::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny kalesy voalohany dia nisy soavaly mena; tamin''ny kalesy faharoa dia soavaly mainty;'
mg1865::mg_38::6::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny kalesy fahatelo dia soavaly fotsy; ary tamin''ny kalesy fahefatra dia soavaly sadamena*. [*Na: sada sady matanjaka]'
mg1865::mg_38::6::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany tamin''ilay anjely niresaka tamiko aho ka nanao hoe: Inona moa ireo, tompoko?'
mg1865::mg_38::6::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay anjely namaly ka nilaza tamiko hoe: Ireo no rivotra efatry ny lanitra, izay mivoaka avy nitsangana teo anatrehan''ny Tompon''ny tany. rehetra.'
mg1865::mg_38::6::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Io misy ny soavaly mainty dia mivoaka mankamin''ny tany avaratra; ary ny fotsy nivoaka nanaraka azy; ary ny sada nivoaka nankamin''ny tany atsimo.'
mg1865::mg_38::6::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mena* dia nivoaka ka nitady handeha hivoivoy eny amin''ny tany; dia hoy izy: Mandehana ianareo, mivoivoiza eny amin''ny tany. Ka dia nandeha nivoivoy teny amin''ny tany izy. [*Na: matanjaka]'
mg1865::mg_38::6::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina mafy tamiko izy ka niteny tamiko hoe: Indro, ireo izay mivoaka mankamin''ny tany avaratra dia nampionona ny fanahiko tany amin''ny tany avaratra.'
mg1865::mg_38::6::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny satro-boninahitra teo an-dohan''i Josoa'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_38::6::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandraisa avy amin''ny babo, dia amin''i Helday sy Tobia ary Jedaia, eny, mandehana amin''izany andro izany ihany ianao, ka midira ao an-tranon''i Josia, zanak''i Zefania, izay novantaniny nony vao tonga avy tany Babylona izy,'
mg1865::mg_38::6::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, mandraisa volafotsy sy volamena, ka ataovy satro-boninahitra, dia apetraho eo an-dohan''i Josoa, zanak''i Jozadaka, mpisoronabe;'
mg1865::mg_38::6::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Indro Lehilahy atao hoe Rantsana*; ary hitsimoka eo am-pitoerany ihany Izy** sady hanao ny tempolin''i Jehovah. [*na: solofo] [**na: ary hisy hitsimoka eo ambaniny]'
mg1865::mg_38::6::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Izy no hanao ny tempolin''i Jehovah, ary Izy no hitondra voninahitra ka hipetraka sy hanapaka eo amin''ny seza fiandrianany; ary ho mpisorona eo amin''ny seza fiandrianany Izy*; ary hisy fisainam-pihavanana amin''izy roroa. [*Na: ary hisy mpisorona eo amin''ny seza fiandrianany]'
mg1865::mg_38::6::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny satro-boninahitra dia ho an''i Helema sy Tobia sy Jedaia ary Hena, zanak''i Zefania, ho fampahatsiarovana ao amin''ny tempolin''i Jehovah.'
mg1865::mg_38::6::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay lavitra dia ho avy ka hanao ao amin''ny tempolin''i Jehovah, ka dia ho fantatrareo fa Jehovah, Tompon''ny maro, no naniraka ahy ho aminareo. Dia ho tonga izany, raha hazoto hihaino ny feon''i Jehovah Andriamanitrareo ianareo.'
mg1865::mg_38::7::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Valin''ny fanontanian''ny avy any Betela ny amin''ny andro fifadiana, ary filazana ny loza hamelezan''i Jehovah ny olony, sy ny mbola hitahiany azy'
  verse_text: 'Ary tamin''ny taona fahefatra nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah tamin''i Zakaria, tamin''ny andro fahefatra tamin''ny volana fahasivy (Kisleva izany)'
mg1865::mg_38::7::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Betela efa naniraka an''i Serezera sy Regema-meleka sy ny olony* hifona amin''i Jehovah [*Na: ary ny any Betela, dia Serezera... efa naniraka]'
mg1865::mg_38::7::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hiteny amin''ny mpisoron''ny tranon''i Jehovah, Tompon''ny maro, sy amin''ny mpaminany hoe: Hitomany amin''ny volana fahadimy va aho ka hifady toy ny fanaoko tamin''ny taon-dasa ela?'
mg1865::mg_38::7::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah, Tompon''ny maro, nanao hoe:'
mg1865::mg_38::7::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny vahoaka rehetra amin''ny tany sy amin''ny mpisorona hoe: Raha nifady hanina sy nitomany tamin''ny volana fahadimy sy ny fahafito tamin''izao fito-polo taona izao, ianareo moa nifady ho Ahy va ianareo?'
mg1865::mg_38::7::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mihinana sy misotro ianareo. moa tsy mihinana sy misotro ho an''ny tenanareo ihany va ianareo*? [*Na: moa tsy ianareo ihany va no mihinana sy misotro]'
mg1865::mg_38::7::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy tokony ho nihaino ny teny izay nasain''i Jehovah nantsoin''ny mpaminany fahiny va ianareo, fony mbola nonenana sy nandry fahizay Jerosalema sy ny zana-bohiny manodidina azy, sady nonenana koa ny tany atsimo sy ny tany lemaka amoron-tsiraka*? [*Na: sefela]'
mg1865::mg_38::7::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Zakaria ny tenin''i Jehovah nanao hoe:'
mg1865::mg_38::7::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Manaova fitsarana marina, ary samia mifampiantra sy mifamindra fo amin''ny rahalahiny avy;'
mg1865::mg_38::7::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza mampahory ny mpitondratena na ny kamboty, na ny vahiny, na ny mahantra; ary aza misy mihevitra ao am-ponareo hanisy ratsy ny rahalahinareo ianareo.'
mg1865::mg_38::7::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nety nihaino ireny, fa nampihemotra ny sorony, ary nataony lalodalovana ny sofiny; mba tsy handre.'
mg1865::mg_38::7::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nanao ny fony ho mafy, toy ny diamondra Izy, mba tsy hihaino ny lalàna sy ny teny izay nampitondrain''ny Fanahin''i Jehovah, Tompon''ny maro, holazain''ny mpaminany fahiny, ka dia tonga izay fahatezerana mafy avy tamin''i Jehovah, Tompon''ny maro,'
mg1865::mg_38::7::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa toy ny niantsoan''ireny, fa tsy nohenoiny, dia ho toy izany no hiantsoany kosa, fa tsy hohenoiko, hoy Jehovah, Tompon''ny maro;'
mg1865::mg_38::7::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa haeliko amin''ny tafio-drivotra ho any amin''ny firenena rehetra izay tsy fantany izy. Toy izany no nahalao ny tany tao aoriany, ka tsy nisy olona nandroso na niverina; fa nahatonga ny tany mahafinaritra ho tany lao izy.'
mg1865::mg_38::8::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga ny tenin''i Jehovah, Tompon''ny maro, nanao hoe:'
mg1865::mg_38::8::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Saro-piaro dia saro-piaro an''i Ziona Aho, eny, saro-piaro azy amin''ny fahatezerana mafy Aho.'
mg1865::mg_38::8::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Efa tafaverina ho eto Ziona Aho ka honina eto afovoan''i Jerosalema; ary Jerosalema dia hatao hoe Tanànan''ny fahamarinana, ary ny tendrombohitr''i Jehovah, Tompon''ny maro, dia hatao hoe Tendrombohitra masina.'
mg1865::mg_38::8::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Mbola hisy lahy antitra sy vavy antitra hipetraka eny an-dalamben''i Jerosalema, samy hitehina amin''ny tehina eny an-tanany isan-olona noho ny fahanterany;'
mg1865::mg_38::8::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary eny an-dalambe any an-tanàna dia ho feno ankizilahy madinika sy ankizivavy madinika milalao eny an-dalambe.'
mg1865::mg_38::8::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Raha mahagaga izany eo imason''ny sisa amin''ity firenena ity amin''izany andro izany, moa hahagaga eo imasoko koa va? hoy Jehovah, Tompon''ny maro.'
mg1865::mg_38::8::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Indro, hamonjy ny oloko avy any amin''ny tany atsinanana sy amin''ny tany andrefana Aho;'
mg1865::mg_38::8::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hitondra azy Aho, ka honina any Jerosalema izy; dia ho oloko izy, ary Izaho kosa ho Andriamaniny amin''ny fahamarinana sy ny fahitsiana.'
mg1865::mg_38::8::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Aoka hatanjaka ny tananareo izay mandre izany teny izany amin''izao andro izao avy amin''ny vavan''ny mpaminany, izay teo tamin''ny andro nanaovana ny fanorenan''ny tranon''i Jehovah, Tompon''ny maro, dia ny nanaovana ny tempoly.'
mg1865::mg_38::8::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa talohan''izany andro izany dia tsy nisy valim-pahasasarana ho an''ny olona, na valim-pahasasarana ho an''ny biby fiompy; ary tsy nisy fiadanana ho an''izay nivoaka sy izay niditra noho ny fahavalo, fa nalefako samy hifamely amin''ny namany avy ny olona rehetra.'
mg1865::mg_38::8::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izay kosa dia tsy ho toy ny tamin''ny fahiny intsony amin''ny sisa amin''ity firenena ity Aho, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_38::8::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy vokatry ny fiadanana, ny voaloboka hamoa*, ary ny tany hahavokatra, ary ny lanitra hampilatsaka ny andony, ary ny sisa amin''ity firenena ity no hampandovaiko izany rehetra izany. [*Na: fa hamoa ny voankazo izay vanona amin''ny fiadanana, dia ny voaloboka]'
mg1865::mg_38::8::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny nahatongavanareo ho fanozonana tany amin''ny firenena, ry taranak''i Joda sy ry taranak''Isiraely, dia ho toy izany no hamonjeko anareo, ka dia ho tonga fitsofan-drano kosa ianareo; aza matahotra, fa aoka hatanjaka ny tananareo.'
mg1865::mg_38::8::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro: Toy ny nisainako hahatonga loza aminareo tamin''ny nampahatezeran''ny razanareo Ahy, hoy Jehovah, Tompon''ny maro, ka tsy nanenina Aho,'
mg1865::mg_38::8::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho toy izany kosa no hisainako hanisy soa an''i Jerosalema sy ny taranak''i Joda amin''izao andro izao: aza matahotra ianareo.'
mg1865::mg_38::8::16:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no zavatra hataonareo: Samia miteny marina amin''ny namany avy ianareo; mitsarà marina, eny, mitsarà hahatonga fiadanana ao am-bavahadinareo;'
mg1865::mg_38::8::17:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza misy mieritreritra ao am-ponareo hanisy ratsy ny namanareo ianareo, ary aza tia fianianan-tsy to; fa izany rehetra izany dia halako, hoy Jehovah.'
mg1865::mg_38::8::18:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah, Tompon''ny maro, dia tonga tamiko nanao hoe:'
mg1865::mg_38::8::19:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Ny fifadian-kanina amin''ny volana fahefatra sy ny fifadian-kanina amin''ny fahadimy sy ny fifadian-kanina amin''ny fahafito ary ny fifadian-kanina amin''ny fahafolo dia samy ho tonga fifaliana sy firavoravoana ary fotoana mahafinaritra avokoa ho an''ny taranak''i Joda; koa tiava ny fahamarinana sy ny fiadanana.'
mg1865::mg_38::8::20:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Mbola hisy firenena sy mponina avy amin''ny tanàna maro ho avy;'
mg1865::mg_38::8::21:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mponina ao amin''ny anankiray hankany amin''ny anankiray kosa ka hanao hoe: Aoka handeha tokoa isika hifona amin''i Jehovah sy hitady an''i Jehovah, Tompon''ny maro; izaho koa mba handeha.'
mg1865::mg_38::8::22:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho avy ny olona maro sy ny firenena mahery mba hitady an''i Jehovah, Tompon''ny maro, any Jerosalema sy hifona amin''i Jehovah.'
mg1865::mg_38::8::23:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Amin''izany andro izany dia hisy folo lahy avy amin''ny firenena samy hafa fiteny rehetra hihazona ny sisin-damban''ny Jiosy anankiray ka hanao hoe: Mba handeha hiaraka aminareo izahay; fa efa renay fa momba anareo Andriamanitra.'
mg1865::mg_38::9::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handravana ny firenena maro, sy ny voninahitra ho azon''i Ziona kosa'
  verse_text: 'Teny faminaniana avy tamin''i Jehovah ny amin''ny loza hanjo ny tany Hadraka, Ary Damaskosy no hiharany — Fa ny mason''i Jehovah mandinika ny olombelona* Mbamin''ny firenena rehetra amin''ny Isiraely - [*Na: fa mijery an''i Jehovah ny mason''ny olombelona]'
mg1865::mg_38::9::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy Hamata koa, izay mifanolotra aminy, Ary Tyro sy Sidona koa, satria hendry izy.'
mg1865::mg_38::9::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Tyro nanao manda mafy ho azy Ka nanangona volafotsy hoatra ny vovoka Sy volamena tsara hoatra ny fotaka eny an-dalambe.'
mg1865::mg_38::9::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hofoanan''ny Tompo ny fananany, Sady hasiany koa ny heriny ao amin''ny ranomasina; Ary ny tenany ho levon''ny afo.'
mg1865::mg_38::9::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Askelona hahita izany ka ho raiki-tahotra, Gaza koa, ka ho toran-kovitra indrindra, Ary Ekrona, fa ho tonga henatra ny fanantenany; Tsy hisy mpanjaka intsony ao Gaza, Ary Askelona tsy honenana.'
mg1865::mg_38::9::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zazasary no ho mpanjaka ao Asdoda, Ary hofoanako ny reharehan''ny Filistina.'
mg1865::mg_38::9::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hesoriko eny am-bavany ny ràny, Sy ny fahavetavetany tsy ho eny anelanelan''ny nifiny; Ary izy koa ho sisa ho an''Andriamanitsika Sy ho toy ny lohany amin''ny firenen''i Joda, Ary Ekrona ho toy ny Jebosita.'
mg1865::mg_38::9::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitoby Aho hiaro ny tranoko noho ny miaramila betsaka, Dia noho izay mandroso sy miverina; Ary* tsy hisy mpampahory handeha hamaky eo aminy intsony, Fa ankehitriny dia efa hitan''ny masoko. [*Na: mba tsy hisy mandroso na miverina, ka]'
mg1865::mg_38::9::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia indrindra, ry Ziona zanakavavy; Manaova feo fifaliana, ry Jerosalema zanakavavy; Indro, ny Mpanjakanao avy ho anao*; Marina Izy sady manam-pamonjena**, Malemy fanahy sady mitaingina boriky Dia zana-boriky tanora. [*na: ho aty aminao] [**heb. voavonjy]'
mg1865::mg_38::9::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofoanako tsy hisy kalesy intsony Efraima, Na soavaly any Jerosalema, hofoanana koa ny tsipika fiadiana, Ary hiteny fiadanana amin''ny jentilisa Izy; ny fanapahany dia hatramin''ny ranomasina ka hatramin''ny ranomasina Ary hatramin''ny Ony* ka hatramin''ny faran''ny tany. [*Eofrata]'
mg1865::mg_38::9::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny aminao koa, noho ny ran''ny fanekena taminao No efa namoahako ny mpifatotrao avy tao an-davaka tsy misy rano.'
mg1865::mg_38::9::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena ho amin''ny fiarovana mafy, ianareo mpifatotra manana ny fanantenana! Anio no hanambarako hoe: Hanonitra roa heny ho anao Aho.'
mg1865::mg_38::9::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nohenjaniko ho Ahy Joda, Efraima nataoko zana-tsipïka; Ary hotairiko ny zanakao, ry Ziona, hiady amin''ny zanakao, ry Grisia, Ary hataoko toy ny sabatry ny lehilahy mahery ianao,'
mg1865::mg_38::9::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hiseho ao aminy, Ka handeha toy ny helatra ny zana-tsipïkany, Jehovah Tompo hitsoka anjomara Ka handeha amin''ny tafio-drivotra any atsimo.'
mg1865::mg_38::9::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah, Tompon''ny maro, no hiaro ireny; Dia hihinana ireny ka hanitsakitsaka vaton''antsamotady; Ary hisotro ireny ka hihorakoraka tahaka ny azon''ny divay, Ary ho feno toy ny lovia famafazana ireny, dia toy ny zoron''ny alitara.'
mg1865::mg_38::9::16:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovonjen''i Jehovah Andriamaniny ireny amin''izany andro izany Toy ny olona izay ondriny; Fa ho toy ny vaton-tsatro-boninahitra Mamirapiratra eny amin''ny taniny ireny.'
mg1865::mg_38::9::17:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa akory ny hasoany! ary akory ny hatsaran-tarehiny! Vary no hampaharoroka* ny zatovo, Ary ranom-boaloboka kosa ny zazavavy. [*heb. hampitsimoka]'
mg1865::mg_38::10::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataha ranonorana amin''i Jehovah ianareo amin''ny andro fara-orana, Dia amin''i Jehovah, Izay manao ny helatra; Ranonorana mivatravatra no homeny azy, Eny, samy homeny ny zava-maitso any an-tsaha ireny.'
mg1865::mg_38::10::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sampy* niteny zava-poana, Ary ny mpanao fankatovana nahita lainga Ka nilaza nofy lainga, Foana ny nampiononany; Koa izany no naniavany toy ny ondry Ory izy, satria tsy misy mpiandry. [*heb. terafima]'
mg1865::mg_38::10::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny mpiandry ondry no irehetan''ny fahatezerako, Ary ireo osilahy no hovaliako; Fa Jehovah, Tompon''ny maro, efa namangy ny taranak''i Joda ondriny Ka manao azy toy ny soavaliny miravaka eo amin''ny ady.'
mg1865::mg_38::10::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy ao aminy no hihavian''ny fehizoro, Avy ao aminy no hihavian''ny fihantonan-javatra, Avy ao aminy no hihavian''ny tsipïka fiadiana, Avy ao aminy no hihavian''ny mpampahory rehetra.'
mg1865::mg_38::10::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho toy ny lehilahy mahery ireo, Izay manitsaka ny fotaka eny an-dàlana amin''ny ady, Hiady izy, satria Jehovah no momba azy; Ary homenarina ny mpitaingin-tsoavaly.'
mg1865::mg_38::10::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampahery ny taranak''i Joda Aho, Ary ny taranak''i Josefa hovonjeko ka hampodiko*, Satria mamindra fo aminy Aho, Ka ho toy izay tsy nariako izy; Fa Izaho no Jehovah Andriamaniny ka hihaino azy. [*Na: hamponeniko]'
mg1865::mg_38::10::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho toy ny lehilahy mahery Efraima, Ary hifaly toy ny azon''ny divay ny fony; Ny zanany hahita ka ho faly; Hifaly amin''i Jehovah ny fony.'
mg1865::mg_38::10::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisiaka hiantso azy Aho ka hanangona azy, Fa efa nanavotra azy Aho; Ka dia mbola hihamaro toy ny efa nihamaroany ihany izy.'
mg1865::mg_38::10::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hafafiko any amin''ny firenena izy, Ka any amin''ny tany lavitra no hahatsiarovany Ahy*; Ary samy ho velona izy mbamin''ny zanany ka hiverina [*Na: ary na dia hafafiko any amin''ny firenena aza izy , dia hahatsiaro Ahy any amin''ny tany lavitra]'
mg1865::mg_38::10::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampody azy avy any amin''ny tany Egypta Aho sy hanangona azy avy any Asyria; Ary ho any amin''ny tany Gileada sy Libanona no hitondrako azy, Ka tsy ho omby azy izany'
mg1865::mg_38::10::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hamaky ny ranomasim-pahoriana izy ka hamely ny onjan-dranomasina, Ho ritra ny rano lalin''i Neily rehetra, Haetry ny avonavon''i Asyria, Ary hiala ny tehina fanapahan''i Egypta.'
mg1865::mg_38::10::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampahereziko ao amin''i Jehovah izy, Ka ny anarany no handehanany, hoy Jehovah.'
mg1865::mg_38::11::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hihavian''ny loza, ary ny hahafoizana ny ondrin''i Jehovah noho ny fandavany Azy, sy ny hanolorana ireny ho amin''ny mpiandry adala,'
  verse_text: 'Vohay ny varavaranao, ry Libanona o! Handevonan''ny afo ny sederanao'
mg1865::mg_38::11::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradra, ry hazo kypreso! Fa efa nianjera ny sedera, Eny, fongotra ireo avo be; Midradradradrà, ianareo oka any Basana! Fa ripaka ny ala mikirindro'
mg1865::mg_38::11::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injay! fidradradradran''ny mpiandry ondry! Fa rava ny voninahiny; Injay! fieron''ny liona tanora! Fa rava ny kirihitrala eny amoron*''i Jordana [*heb. reharehany]'
mg1865::mg_38::11::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Andriamanitra: Andraso ny ondry izay hovonoina,'
mg1865::mg_38::11::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ireo vonoin''ny tompony* nefa tsy ananany heloka**; ary ny mivarotra azy manao hoe: Isaorana anie Jehovah, fa manan-karena aho; ary ny mpiandry azy koa dia tsy miantra azy [*na: izay nividy azy] [**na: nefa tsy atao ho meloka ireny]'
mg1865::mg_38::11::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hiantra ny mponina amin''ny tany intsony Aho, hoy Jehovah; fa, indro, Izaho dia hanolotra ny olona samy ho eo an-tanan''ny namany sy samy ho eo an-tanan''ny mpanjakany avy; ary hamely ny tany ireo, nefa tsy mba hanafaka amin''ny tanany Aho.'
mg1865::mg_38::11::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niandry ny ondry izay hovonoina Aho, dia izay ondry mahantra. Ary naka tehina roa ho Ahy Aho, ny iray nataoko hoe Fahasoavana, ary ny iray kosa nataoko hoe Fikambanana; ary nandrasako ny ondry.'
mg1865::mg_38::11::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandringana ny mpiandry ondry telo* Aho tamin''ny iray volana, fa tsy nahatsindry fo taminy intsony, sady tofoka Ahy ny fanahiny. [*Na: telo amin''ireo mpiandry ireo]'
mg1865::mg_38::11::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izaho: Tsy hiandry anareo Aho: izay ho faty dia aoka ho faty, ary izay ho ringana dia aoka ho ringana, ary ny sisa dia aoka samy hihinana ny nofon''ny namany avy.'
mg1865::mg_38::11::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noraisiko ny tehiko Fahasoavana ka notapahiko, mba hanafoanako ny fanekena izay efa nataoko tamin''ny firenena rehetra.'
mg1865::mg_38::11::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tapaka tamin''izany andro izany iny, ka dia fantatry ny ondry mahantra, izay nitandrina ny teniko, fa tenin''i Jehovah izany.'
mg1865::mg_38::11::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho taminy: Raha tsara eo imasonareo, dia omeo ahy ny karamako; fa raha tsy izany, dia aoka ihany. Ary dia nolanjainy ny karamako, ka sekely volafotsy telo-polo.'
mg1865::mg_38::11::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Atsipazo amin''ny mpanefy tanimanga izany vola be nanombanany Ahy izany! Dia noraisiko ny sekely volafotsy telo-polo ka natsipiko tamin''ny mpanefy tanimanga tao an-tranon''i Jehovah.'
mg1865::mg_38::11::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia notapahiko koa ilay tehiko anankiray Fikambanana, hanafoanako ny firahalahian''i Joda sy Isiraely.'
mg1865::mg_38::11::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Alao ho anao koa ny tehin''ny mpiandry ondry adala.'
mg1865::mg_38::11::16:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Izaho hanangana mpiandry amin''ny tany, izay tsy hamangy ny naringana, na hitady ny niely, na hanasitrana ny naratra, na hiandry izay mbola matanjaka*; fa hohaniny ny nofon''ny matavy sady helakelahiny ny kitrony. [*heb. mijoro tsara]'
mg1865::mg_38::11::17:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ny mpiandry ondry tsy mahomby izay mandao ny ondry! Ny sabatra no hanely ny sandriny sy ny masony ankavanana; halazo tokoa ny sandriny, ary ho jamba tokoa ny masony ankavanana.'
mg1865::mg_38::12::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampaherezana ny Isiraely sy ny hanamasinana azy'
  verse_text: 'Teny faminaniana avy tamin''i Jehovah ny amin''ny Isiraely. Hoy Jehovah, Izay mamelatra ny lanitra sy manao ny fanorenan''ny tany ary mamorona ny fanahin''ny olona ao anatiny:'
mg1865::mg_38::12::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho hanao an''i Jerosalema ho kapoaka mampiraikiraiky ho an''ny firenena rehetra manodidina; ary ny Joda koa hiharan''izany ny hanaovana fahirano an''i Jerosalema.'
mg1865::mg_38::12::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany Jerosalema dia hataoko vato mavesatra ho an''ny ny firenena rehetra, ka haràtra dia haràtra izay rehetra mivesatra azy; ary ho tafangona hamely azy ny firenena rehetra amin''ny tany.'
mg1865::mg_38::12::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany, hoy Jehovah, dia hamely ny soavaly amin''ny fahaverezan-kevitra Aho, ary ny mpitaingina azy amin''ny fahadalana, hampihiratra ny masoko amin''ny taranak''i Joda Aho ary hamely ny soavaly rehetra izay an''ny firenena amin''ny fahajambana.'
mg1865::mg_38::12::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo lohany amin''ny firenen''i Joda dia hanao anakampo hoe: Ny mponina any Jerosalema dia heriko ao amin''i Jehovah, Tompon''ny maro, Andriamaniny.'
mg1865::mg_38::12::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany ireo lohany amin''ny firenen''i Joda dia hataoko tahaka ny fatana mirehitra eny amin''ny hazo sy tahaka ny fanilo mirehitra eny amin''ny amboara, ka handevona ny firenena rehetra manodidina amin''ny ankavanana sy ny ankavia izy; ary Jerosalema dia mbola hiorina amin''ny fitoerany ihany, dia any Jerosalema.'
mg1865::mg_38::12::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovonjen''i Jehovah aloha ny lain''ny Joda, mba tsy hisandratra ambonin''ny Joda intsony ny voninahitry ny taranak''i Davida sy ny voninahitry ny mponina any Jerosalema.'
mg1865::mg_38::12::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia harovan''i Jehovah ny mponina any Jerosalema; ary izay mila ho reraka ao aminy aza amin''izany andro izany dia ho tahaka an''i Davida; ary ny taranak''i Davida ho tahaka an''Andriamanitra, dia tahaka Ilay Anjelin''i Jehovah eo anoloany.'
mg1865::mg_38::12::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hitady handringana ny jentilisa rehetra izay avy hamely an''i Jerosalema Aho.'
mg1865::mg_38::12::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haidiko amin''ny taranak''i Davida sy amin''ny mponina any Jerosalema ny fanahin''ny fahasoavana sy ny fifonana, ka hijery Ahy Izay* nolefoniny izy, ary hisaona Azy toy ny fisaonana zanakalahy tokana izy sady halahelo Azy toy ny fahalahelovan''ny olona ny lahimatoany. [*Na: ka hijery ilay]'
mg1865::mg_38::12::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy fisaonana lehibe any Jerosalema toy ny fisaonana tao Hadadrimona eo amin''ny lohasaha Megido.'
mg1865::mg_38::12::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisaona mitsitokantokana ny tany, samy isam-pianakaviana avy: ny fianakavian''i Davida mitokana, ary ny vadin''ireo mitokana; ny fianakavian''i Natana mitokana, ary ny vadin''ireo mitokana;'
mg1865::mg_38::12::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fianakavian''ny taranak''i Levy mitokana, ary ny vadin''ireo mitokana; ny fianakavian''i Simey mitokana, ary ny vadin''ireo mitokana;'
mg1865::mg_38::12::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fianakaviana sisa rehetra mitokana isam-pianakaviana, ary ny vadin''ireo mitokana.'
mg1865::mg_38::13::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy loharano voasokatra ho an''ny taranak''i Davida sy ho an''ny mponina any Jerosalema hanafaka fahotana sy fahalotoana.'
mg1865::mg_38::13::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany, hoy Jehovah, Tompon''ny maro, dia hofoanako ny anaran-tsampy amin''ny tany, ka tsy hotsarovana intsony ireny; ary hesoriko amin''ny tany ny mpaminany sy ny fanahim-pahalotoana.'
mg1865::mg_38::13::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola hisy haminany, ny ray aman-dreniny izay niteraka azy dia hanao aminy hoe: Tsy ho velona ianao, satria miteny lainga amin''ny anaran''i Jehovah; ary ny ray aman-dreniny izay niteraka azy dia handefona azy, raha maminany izy.'
mg1865::mg_38::13::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny mpaminany dia samy hahazo henatra noho ny fahitany avy, raha maminany; ary tsy hikapoty volom-biby hamitahana izy,'
mg1865::mg_38::13::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hanao hoe: Tsy mpaminany aho, fa mpiasa tany, satria nisy nanandevo* ahy, fony aho mbola kely. [*Na: nividy]'
mg1865::mg_38::13::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hisy hanao aminy hoe: Ka inona itony ratra amin*''ny tananao itony? Dia hovaliany hoe: Naratra tao an-tranon''ny sakaizako ireny. [*heb. anelanelan'']'
mg1865::mg_38::13::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny hanadiovana ny Isiraely, sy ny ho voninahiny any am-parany'
  verse_text: 'Mifohaza, ry sabatra, hamely ny mpiandriko sy ny lehilahy namako, hoy Jehovah, Tompon''ny maro. Asio ny mpiandry, dia hihahaka ny ondry, ary hamerina ny tanako ho amin''ny madinika Aho.'
mg1865::mg_38::13::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny tany rehetra, hoy Jehovah, ny androatokony dia haringana ho faty ao; fa ny ampahatelony sisa no havela ao kosa.'
mg1865::mg_38::13::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho entiko miditra amin''ny afo ny ampahatelony, ary harendrika toy ny fandrendrika volafotsy izy, ary hizahako toetra toy ny fizaha toetra ny volamena izy; hiantso ny anarako izy, ary Izaho hamaly azy; Izaho hanao hoe: Oloko izy ary izy hanao hoe: Jehovah no Andriamanitro.'
mg1865::mg_38::14::1:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hisy andron''i Jehovah ho avy, ka ny babo aminao hozaraina ao am-povoanao.'
mg1865::mg_38::14::2:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hangoniko ny jentilisa rehetra hamely an''i Jerosalema, dia ho afaka ny tanàna, ka horobaina ny trano, ary hosavihina ny vehivavy; ary ny an-tsasaky ny tanàna dia ho lasan-ko babo, fa ny vahoaka sisa tsy dia hofongorana avokoa amin''ny tanàna.'
mg1865::mg_38::14::3:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hivoaka Jehovah ka hiady amin''ireny jentilisa ireny, tahaka ny fameliny amin''ny andro fiadiana.'
mg1865::mg_38::14::4:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny tongony hijoro eo an-Tendrombohitra Oliva. izay eo atsinanana tandrifin''i Jerosalema, ary ny Tendrombohitra Oliva hitresaka eo afovoany hiatsinanana sy hiankandrefana, ka hisy lohasaha lehibe; ary ny antsasaky ny tendrombohitra hifindra hianavaratra, fa ny an-tsasany kosa hianatsimo.'
mg1865::mg_38::14::5:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handositra ho any amin*''ny lohasahan''ny tendrombohitro ianareo, fa hipaka hatrany Azela ny lohasahan''ny tendrombohitra; eny, handositra ianareo tahaka ny nandosiranareo ny horohorontany tamin''ny andron''i Ozia, mpanjakan''ny Joda; ary ho avy Jehovah Andriamanitro mbamin''ny masina rehetra momba Azy**. [*Na: hamaky] [**Hebreo: Anao]'
mg1865::mg_38::14::6:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia tsy hisy mazava, ary ireo mamirapiratra tsy hiseho intsony;'
mg1865::mg_38::14::7:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hisy andro iray, izay fantatr''i Jehovah, tsy andro na alina; nefa, raha hariva ny andro, dia hisy mazava.'
mg1865::mg_38::14::8:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hisy rano velona hivoaka avy any Jerosalema, ka ny antsasany hankany amin''ny ranomasina atsinanana, ary ny antsasany hankany amin''ny ranomasina andrefana, na amin''ny fahavaratra na amin''ny ririnina dia samy hisian''izany.'
mg1865::mg_38::14::9:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah ho Mpanjakan''ny tany rehetra; amin''izany andro izany dia iray no Jehovah, sady iray no anarany.'
mg1865::mg_38::14::10:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tonga tahaka ny tani-hay* ny tany rehetra hatrany Geba ka hatrany Rimona ao atsimon''i Jerosalema; ary hasandratra sy honenana ao amin''ny fitoerany izy hatramin''ny vavahadin''i Benjamina ka hatreo amin''ny vavahady voalohany, hatramin''ny vavahady an-jorony, ary hatramin''ny tilikambo Hananela ka hatramin''ireo famiazam-boaloboky ny mpanjaka. [*heb. Arabà]'
mg1865::mg_38::14::11:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hisy mponina any, ary tsy hisy ozona* intsony, fa Jerosalema handry fahizay. [*heb. herema]'
mg1865::mg_38::14::12:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no areti-mandringana hamelezan''i Jehovah ny firenena rehetra izay efa nanafika an''i Jerosalema: Hataony mihalevona am-pitsanganana ny nofony, ary hihalevona eo amin''ny itoerany ny masony, ary ny lelany koa hihalevona ao am-bavany.'
mg1865::mg_38::14::13:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hisy fifanaritahana lehibe avy amin''i Jehovah ao aminy, ary hifampihazon-tanana izy, sady samy hanainga tanana hifamely.'
mg1865::mg_38::14::14:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda koa hamely an''i* Jerosalema, ary hovorina ny haren''ny firenena manodidina rehetra, dia volamena sy volafotsy ary fitafiana betsaka. [*Na: hiady any]'
mg1865::mg_38::14::15:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho toy izany koa ny areti-mandringana hamely ny soavaly sy ny ampondra sy ny rameva sy ny boriky mbamin''ny biby fiompy rehetra izay ao amin''ireny toby ireny, eny, ho tahaka izany areti-mandringana izany ihany.'
mg1865::mg_38::14::16:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sisa rehetra amin''ny jentilisa rehetra, izay niakatra namely an''i Jerosalema, dia hiakatra isan-taona isan-taona hiankohoka eo anatrehan''ny Mpanjaka, dia Jehovah, Tompon''ny maro, sy hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo.'
mg1865::mg_38::14::17:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza amin''ny firenena samy hafa amin''ny tany no tsy hiakatra ho any Jerosalema hiankohoka eo anatrehan''ny Mpanjaka, dia Jehovah, Tompon''ny maro, dia tsy mba hisy ranonorana mivatravatra any aminy.'
mg1865::mg_38::14::18:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny firenen''i Egypta tsy mba miakatra ka tsy tonga, dia tsy hisy koa any aminy, sady ho tonga ny areti-mandringana izay hamelezan''i Jehovah ny firenena tsy miakatra hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo.'
mg1865::mg_38::14::19:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no fampijaliana an*''i Egypta sy fampijaliana* ny firenena rehetra izay tsy miakatra hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo. [*Na: fahotana]'
mg1865::mg_38::14::20:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy ao amin''ny famohamandrin-tsoavaly manao hoe: HAMASININA HO AN''I JEHOVAH; ary ny vilany ao an-tranon''i Jehovah ho tahaka ny lovia famafazana eo anoloan''ny alitara.'
mg1865::mg_38::14::21:
  verse_version: mg1865
  verse_book: mg_38
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny vilany rehetra any Jerosalema sy Joda dia hohamasinina ho an''i Jehovah, Tompon''ny maro; ary izay rehetra mamono zavatra hatao fanatitra dia ho avy haka amin''ireny ka hahandro aminy. Ary amin''izany andro izany dia tsy hisy Kananita* intsony ao an-tranon''i Jehovah, Tompon''ny maro. [*Na: mpandranto]'
