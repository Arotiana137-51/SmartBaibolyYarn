mg1865::mg_35::1::1:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fandozana nataon''ny Kaldeana, ary ny fitarainan''ny mpaminany noho izany'
  verse_text: 'Faminaniana ny loza hanjo, izay hitan''i Habakoka mpaminany.'
mg1865::mg_35::1::2:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, indrisy ny hahelan''ny efa nitarainako, Nefa tsy nohenoinao! Mitaraina aho hoe: Loza! Nefa tsy vonjenao ihany.'
mg1865::mg_35::1::3:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no ataonao mahita faharatsiana aho. Ary mijery fahoriana Ianao? Fa fandravana sy loza no eo anatrehako, Ary misy ady, sady miseho ny fifandirana.'
mg1865::mg_35::1::4:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia ngoly ny lalàna, Ary tsy mivoaka ny rariny; Fa irohonan''ny ratsy fanahy ny marina, Ka izany no ivoahan''ny fitsarana miangatra* . [*Hebreo: miolana]'
mg1865::mg_35::1::5:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo any amin''ny jentilisa, ka diniho, ary gagà dia gagà; Fa manao zavatra amin''ny andronareo Aho, Izay tsy hinoanareo, na dia holazaina aminareo aza.'
mg1865::mg_35::1::6:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, atsangako ny Kaldeana, Dia ilay firenena masiaka* sady mirehidrehitra, Izay mamaky eran''ny tany Hahazoany fonenana izay tsy azy. [*Hebreo: mangidy]'
mg1865::mg_35::1::7:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiravina sy mahatahotra izy; Avy amin''ny tenany ihany ny fitsarany sy ny fahalehibiazany.'
mg1865::mg_35::1::8:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faingana noho ny leoparda ny soavaliny Sady masiaka noho ny amboadia* hariva; Ny mpitaingin-tsoavaliny mampiriotra, eny, ny mpitaingin-tsoavaliny dia avy lavitra; Miezaka toy ny voromahery maika hihinana izy. [*lopa]'
mg1865::mg_35::1::9:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampidi-doza no ihavian''izy rehetra; Ny handroso ihany no atrehiny fatratra*, Ka manangona sambotra toy ny fasika izy. [*Na: atrehan''izy rehetra]'
mg1865::mg_35::1::10:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: '2022-09-26T05:30:39+0000'
  verse_title: null
  verse_text: 'Izy manakora ny mpanjaka, Ary ihomehezany ny mpanapaka; Ny tanàna mimanda rehetra dia ihomehezany, Ka dia manandratra tovon-tany* izy ka mahafaka azy. [*Hebreo: vovoka]'
mg1865::mg_35::1::11:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mihelina toy ny rivotra izy Ary mandroso ka mahazo heloka. Izany heriny izany no andriamaniny!'
mg1865::mg_35::1::12:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hatrizay hatrizay va Ianao, Jehovah Andriamanitro, Iray Masiko? Tsy ho faty izahay; Ry Jehovah o, ho famaizana no nanendrenao ireny, Ry Vatolampy o, fananarana no nanangananao azy'
mg1865::mg_35::1::13:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, Izay madio maso ka tsy te-hitsinjo ny ratsy Ary tsy mahajery fahoriana, Nahoana Ianao no mijery izay mamitaka Ary mangina, raha ny ratsy fanahy mandrapaka ny marina noho izy,'
mg1865::mg_35::1::14:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manao ny olona ho toy ny hazandrano any an-dranomasina, Sy ho toy ny biby mandady sy mikisaka, izay tsy mana-mpanapaka?'
mg1865::mg_35::1::15:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aingainy amin''ny fintana izy rehetra, Samboriny amin''ny haratony Ary sarihany amin''ny harato tarihiny; Ka dia faly sy ravoravo izy.'
mg1865::mg_35::1::16:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no amonoany zavatra hatao fanatitra ho an''ny haratony sy andoroany ditin-kazo manitra ho an''ny harato tarihiny; Fa ireo no ahazoany hanina matsiro sy anjara matavy.'
mg1865::mg_35::1::17:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia hanaisotra ny ao amin''ny tandrohony va izy Ary hamono firenena mandrakariva ka tsy hiantra?'
mg1865::mg_35::2::1:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jehovah tamin''ny mpaminany ny amin''ny handringanana ny Kaldeana'
  verse_text: 'Hitsangana eo ambonin''ny fitazanako aho Ary hijoro eo ambonin''ny manda, Hiandry hahitako izay holazainy amiko Sy izay havaliko amin''ny fitarainako.'
mg1865::mg_35::2::2:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ahy Jehovah ka nanao hoe: Soraty ny fahitana, ka ataovy velona tsara ny soratra eo amin''ny fàfana, Mba ho azon''ny mihazakazaka hovakina aza*. [*Na: mba hihazakazahan''izy mamaky azy]'
mg1865::mg_35::2::3:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahitana dia mbola ho amin''ny fotoan''andro, Ary mikendry ny farany izy ka tsy ho diso; Eny, na dia mitaredretra aza izy, andraso ihany, Fa ho avy tokoa izy ka tsy hijanona.'
mg1865::mg_35::2::4:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, feno avonavona ny fanahin''ireny, fa tsy mahitsy ao anatiny, Fa ny marina ho velon''ny finoany*. [*Na: fa ny marina amin''ny finoana no ho velona]'
mg1865::mg_35::2::5:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, mamitaka ny divay; Ny olona miavonavona tsy mba mahatoetra, Dia ilay mitanatana vava tahaka ny fiainan-tsy hita*, Eny, toy ny fahafatesana, ka tsy mety voky, Fa manangona ny firenena rehetra ho ao aminy Sy mamory ny olona rehetra ho ao aminy.. [*Hebreo: Shoela]'
mg1865::mg_35::2::6:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hanao oha-teny hamelezana azy va ireto rehetra ireto ? Tsy hanao eson-teny sy fitenenana* hanoherana azy va izy ka hanao hoe: Lozan''izay mahery mandroaka ny tsy azy! Mandra-pahoviana! dia ilay mivesatra ny zavatra nalaina ho tsatòka [*Hebreo: fampanonona]'
mg1865::mg_35::2::7:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hitsangana tampoka va izay hanaikitra anao, Ary tsy hifoha va izay hanaitaitra anao, Ka ho babony ianao?'
mg1865::mg_35::2::8:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa namabo firenena maro ianao, Ka dia mba hobaboin''ny sisa rehetra amin''ny firenena kosa, Noho ny ran''ny olona sy ny fandozana natao tamin''ny tany, Dia tamin''ny tanàna sy ny mponina rehetra ao aminy.'
mg1865::mg_35::2::9:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay fatra-pila harena amin''ny tsy marina ho an''ny taranany, Hanaovany ny akaniny any amin''ny avo, Mba tsy ho tratry ny tanan''ny loza'
mg1865::mg_35::2::10:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa namoron-tsaina izay hahatonga henatra ho an''ny taranakao ianao, Dia ny handringanana firenena maro; Ary nankahà-doza hihatra amin''ny ainao ianao.'
mg1865::mg_35::2::11:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hitaraina ny vato ao amin''ny rindrina, Ary ny sakamandimby ao amin''ny trano* no hamaly azy. [*Hebreo: hazo]'
mg1865::mg_35::2::12:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay manao vohitra amin''ny fandatsahan-drà Sy manorina tanàna amin''ny heloka!'
mg1865::mg_35::2::13:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsy avy amin''i Jehovah, Tompon''ny maro, va no hiasan''ny olona ho an''ny afo, Sy hisasaran''ny firenena noho ny zava-poana?'
mg1865::mg_35::2::14:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany ho feno ny fahalalana ny voninahitr''i Jehovah, Toy ny fanaron''ny rano ny fanambanin''ny ranomasina.'
mg1865::mg_35::2::15:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay mampisotro divay ny namany Dia ianao izay manampy fahatezerana ka mampahamano azy, Mba hijery ny fitanjahany;'
mg1865::mg_35::2::16:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa feno henatra ianao, fa tsy voninahitra; Mba sotroy koa, ka mitanjaha*; Hatolotra anao ny kapoaka eny an-tanana ankavanan''i Jehovah, Ary fahamenarana no ho amin''ny voninahitrao. [*Na: aoka ho hita fa tsy voafora ianao]'
mg1865::mg_35::2::17:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hanody anao ny loza natao tamin''i Libanona Sy ny fandringanana mahatahotra namelezana ny biby, Noho ny ran''ny olona sy ny loza natao tamin''ny tany, Dia tamin''ny tanàna sy ny mponina rehetra ao aminy.'
mg1865::mg_35::2::18:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahasoa inona ny sarin-javatra voasokitra, No misokitra azy ny mpanao azy? Na ny sarin-javatra an-idina sy ny mpampianatra lainga, No matoky azy izay namorona azy Tamin''ny nanaovany sampy moana?'
mg1865::mg_35::2::19:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay manao amin''ny hazo hoe: Mifohaza! Ary amin''ny vato moana hoe: Mitsangàna! Hampianatra va ireo ? He! voapetaka takela-bolamena sy volafotsy ihany izy, Nefa tsy misy fanahy akory ao anatiny.'
mg1865::mg_35::2::20:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah dia ao amin''ny tempoliny masina; Mangina eo anatrehany, ry tany rehetra!'
mg1865::mg_35::3::1:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka nangatahan''ny mpaminany famindram-po'
  verse_text: 'Ny fivavak''i Habakoka mpaminany. Araka ny Sigionota.'
mg1865::mg_35::3::2:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, efa reko ny filazana Anao, ka raiki-tahotra aho; Jehovah o, velomy ny asanao ao an-tenatenan''ny taona, Ataovy fantatra ao an-tenatenan''ny taona izany; Na dia tezitra aza Ianao, tsarovy ny indrafo.'
mg1865::mg_35::3::3:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamy avy any Temana Andriamanitra, Dia ny iray Masina avy any an-tendrombohitra Parana*. Manarona ny lanitra ny voninahiny, Ary manenika ny tany ny fiderana Azy. [*Sela]'
mg1865::mg_35::3::4:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy famirapiratana toy ny mazava, Ary misy tàna-masoandro avy eo amin''ny tanany;12 Ary ao no fieren''ny heriny. [*Na: avy eo anilany]'
mg1865::mg_35::3::5:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo alohany no andehanan''ny areti-mandringana, Ary areti-mandripaka* no mivoaka avy eo aoriany. [*Na: zava-mahamay]'
mg1865::mg_35::3::6:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mijanona Izy ka manozongozona ny tany; Mijery Izy ka mampangovitra ny firenena, Ary torotoro ny tendrombohitra mandrakizay, Mietry ny havoana fahagola, Fanaony hatry ny fahagola ny Azy.'
mg1865::mg_35::3::7:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita ny lain''i Kosana azom-pahoriana aho, Sady mipararetra ny ambain-dain''ny tany Midiana.'
mg1865::mg_35::3::8:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa amin''ny ony va no irehetan''ny fahatezeran''i Jehovah ? Amin''ny ony va no ahatezeranao, Na amin''ny ranomasina va no ahasosoranao, No dia mitaingina ny soavalinao sy ny kalesim-pamonjenao Ianao ?'
mg1865::mg_35::3::9:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nalan-tsarona ny tsipïkanao; Efa nianianana ny fikapohan''ny teny*. [*Sela] Namakivaky ny tany Ianao mba hisy ony. [*Na: ny fiainana tamin''ny firenena dia teny]'
mg1865::mg_35::3::10:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahita Anao ny tendrombohitra ka toran-kovitra; Mirotsaka* ny ranonorana mivatravatra, Mamoa-peo ny lalina Sady manangan-tanana ho amin''ny avo. [*Hebreo: Mandalo]'
mg1865::mg_35::3::11:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoandro sy ny volana niditra teo amin''ny fitoerany, Noho ny fahazavan''ny zana-tsipïkanao mitsoriaka Sy ny fanelatselatry ny lefonao mamirapiratra.'
mg1865::mg_35::3::12:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahatezeranao no anitsahanao ny tany; Amin''ny fahaviniranao no anosihosenao ny firenena.'
mg1865::mg_35::3::13:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoaka hamonjy ny olonao Ianao, dia hamonjy ny voahosotrao; Torotoroinao ny tapenaky ny tranon*''ny ratsy fanahy, Ka ahariharinao hatreo an-tenatenany** ny fanorenany. [*sela, *Hebreo: lohan''] [**an-katony]'
mg1865::mg_35::3::14:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lefony ihany no anaboroahanao ny lohan''ireo miaramilany betsaka, Izay avy toy ny tadio hanely ahy, Sady mifaly handany mangingina ny ory izy.'
mg1865::mg_35::3::15:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitety ny ranomasina amin''ny soavalinao Ianao, Dia eny amin''ny rano be miavovona.'
mg1865::mg_35::3::16:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony mandre aho, dia mandevilevy ny kiboko; Ny molotro mipararetra noho ny feo; Azon''ny fahalovana ny taolako, ary mangovitra aho; Fa tsy maintsy miandry ny andro fahoriana aho, Dia izay hiakaran''ny mpanao an-diany hamely ny olonao.'
mg1865::mg_35::3::17:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia tsy mamontsina aza ny aviavy, Ary tsy misy voany ny voaloboka, Na dia mahadiso fanantenana aza ny oliva, Ary tsy mahavokatra hohanina ny saha, Na dia vonoina aza ny ondry ao amin''ny vala, Ary tsy misy omby ao am-pahitra,'
mg1865::mg_35::3::18:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izaho dia mbola hifaly amin''i Jehovah ihany Sy hiravoravo amin''Andriamanitry ny famonjena ahy.'
mg1865::mg_35::3::19:
  verse_version: mg1865
  verse_book: mg_35
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tompo no tanjako, Ary manao ny tongotro ho toy ny an''ny dieravavy Izy Ka mampandeha ahy any amin''ny havoanako. Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha.'
