mg1865::mg_2::1::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitomboan''ny Zanak''Isiraely, sy ny fahoriana nanjo azy tany Egypta'
  verse_text: 'Ary izao no anaran''ny zanak''Isiraely izay niaraka tamin''i Jakoba nankany Egypta; samy nandeha mbamin''ny ankohonany avy izy rehetra:'
mg1865::mg_2::1::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Robena sy Simeona sy Levy ary Joda;'
mg1865::mg_2::1::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isakara sy Zebolona ary Benjamina;'
mg1865::mg_2::1::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dana sy Naftaly, ary Gada sy Asera.'
mg1865::mg_2::1::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isan''ny olona rehetra naterak''i Jakoba dia fito-polo; fa Josefa efa tany Egypta rahateo.'
mg1865::mg_2::1::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Josefa sy ny rahalahiny rehetra mbamin''izany taranaka rehetra izany.'
mg1865::mg_2::1::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely niteraka ka nitombo betsaka sy nihamaro ary nihahery dia nihahery indrindra, ka dia henika azy ny tany.'
mg1865::mg_2::1::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpanjaka vaovao nanjaka tany Egypta, izay tsy nahalala an''i Josefa.'
mg1865::mg_2::1::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niteny tamin''ny vahoakany hoe: Indro, ny firenen''ny Zanak''Isiraely efa maro sy mahery noho isika;'
mg1865::mg_2::1::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'andeha hanaovantsika hevitra ireo, fandrao hihamaro izy, ka raha tahiny hisy ady, dia homba ny fahavalontsika koa izy ka hiady amintsika, ary dia hiakatra hiala amin''ny tany.'
mg1865::mg_2::1::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nanendreny mpifehy izy, mba hampahory azy amin''ny fanompoany mafy. Ary nanao tanàna fitehirizana ho an''i Farao izy, dia Pitoma sy Ramesesa.'
mg1865::mg_2::1::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa araka ny nampahoriany azy no vao mainka nihamaroany sy nitomboany kosa; ka dia natahotra ny Zanak''Isiraely indrindra ny Egyptiana.'
mg1865::mg_2::1::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanompoin''ny Egyptiana fatratra ny Zanak''Isiraely,'
mg1865::mg_2::1::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nataony mangidy ny fiainany tamin''ny fanompoana mafy, dia tamin''ny feta sy ny biriky mbamin''ny fanompoana rehetra any an-tsaha, dia ny fanompoana rehetra izay nampanompoany azy fatratra.'
mg1865::mg_2::1::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Egypta niteny tamin''ny mpampivelona Hebreo (Sifra no anaran''ny anankiray, ary Poa no anaran''ny anankiray)'
mg1865::mg_2::1::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Raha mampivelona ny vehivavy Hebreo ianareo, ka hitanareo eo amin''ny fipetrahany fa zazalahy, dia vonoy, fa raha zazavavy kosa, dia velomy.'
mg1865::mg_2::1::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa natahotra an''Andriamanitra ny mpampivelona ka tsy nanao araka izay nolazain''ny mpanjakan''i Egypta taminy, fa novelominy ihany ny zazalahy.'
mg1865::mg_2::1::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampaka ny mpampivelona ny mpanjakan''i Egypta ka nanao taminy hoe: Nahoana no nanao izany zavatra izany ianareo, ka novelominareo ihany ny zazalahy?'
mg1865::mg_2::1::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpampivelona tamin''i Farao: Tsy mba tahaka ny vehivavy Egyptiana ny vehivavy Hebreo; fa matanjaka izy, ka raha tsy mbola tonga any aminy akory ny mpampivelona, dia velona izy.'
mg1865::mg_2::1::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasian''Andriamanitra soa ny mpampivelona; ary nihamaro sy nihahery indrindra ny olona.'
mg1865::mg_2::1::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany, satria natahotra an''Andriamanitra ny mpampivelona dia nomen''Andriamanitra zanaka izy.'
mg1865::mg_2::1::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy ny vahoakany rehetra Farao ka nanao hoe: Ny zazalahy rehetra izay teraka dia ario an''i Neily, fa ny zazavavy rehetra kosa no velomy.'
mg1865::mg_2::2::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namonjena an''i Mosesy, sy ny nandraisan''ny zanakavavin''i Farao azy ho zanany'
  verse_text: 'Ary nisy lehilahy anankiray avy amin''ny mpianakavin''i Levy lasa naka vady tamin''ny zanakavavin''i Levy.'
mg1865::mg_2::2::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanan''anaka ravehivavy ka niteraka zazalahy; ary rehefa hitany fa zaza tsara izy, dia nafeniny telo volana.'
mg1865::mg_2::2::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tsy azony nafenina intsony izy, dia nangalany fiara zozoro, ka nopetahany asfalta sy dity ny fiara, dia napetrany tao ny zaza; ary napetrany tao anaty zozoro teo amoron''i Neily ny fiara.'
mg1865::mg_2::2::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anabaviny nijanona teny lavidavitra eny, mba hahita izay hatao aminy.'
mg1865::mg_2::2::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nidina ny zanakavavin''i Farao mba handro tao Neily; ary ny ankizivaviny nitsangatsangana teny amoron''i Neily; ary raha nahita ny fiara teo anaty zozoro ny zanakavavin''i Farao, dia naniraka ny mpanompovaviny iray izy ka nampaka azy.'
mg1865::mg_2::2::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nosokafany, dia hitany ny zazakely; ary indro fa zazalahy mitomany. Dia namindra fo taminy izy ka nanao hoe: Isan''ny zanaky ny Hebreo ity.'
mg1865::mg_2::2::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy kosa ny anabaviny tamin''ny zanakavavin''i Farao: Handeha haka mpitaiza amin''ny vehivavy Hebreo va aho hankaty aminao mba hitaiza ny zaza ho anao?'
mg1865::mg_2::2::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny zanakavavin''i Farao taminy: Andeha ary. Dia lasa razazavavy ka naka ny renin''ny zaza.'
mg1865::mg_2::2::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny zanakavavin''i Farao taminy: Ento ity zaza ity, ka tezao ho ahy, fa izaho handoa ny karamanao. Dia nentin-dravehivavy ny zaza ka notezainy.'
mg1865::mg_2::2::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lehibe ny zaza, dia nentiny tao amin''ny zanakavavin''i Farao izy, ka dia tonga zanany. Ary ny anarany nataony hoe Mosesy; fa hoy izy: Satria tamin''ny rano no nangalako azy.'
mg1865::mg_2::2::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny nataon''i Mosesy hamonjeny ny namany, sy ny nandosirany nankany Midiana'
  verse_text: 'Ary tamin''izany andro izany, rehefa lehibe Mosesy, dia nivoaka nankany amin''ny rahalahiny izy ka nijery ny fanompoany mafy, ary nahita lehilahy Egyptiana nanavokavoka ny anankiray tamin''ny Hebreo rahalahiny.'
mg1865::mg_2::2::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niherikerika izy, ka nony hitany fa tsy nisy olona, dia novonoiny ilay Egyptiana, ary nasitriny tao amin''ny fasika ny faty.'
mg1865::mg_2::2::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''iny, dia nivoaka indray izy, ary, indreo, nisy Hebreo roa lahy niady; dia hoy izy tamin''ilay diso: Nahoana no mamono ny namanao ianao?'
mg1865::mg_2::2::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Iza no nanendry an''ialahy ho mpanapaka sy mpitsara anay? Moa mikasa hamono ahy koa va ialahy, tahaka ny namonoan''ialahy ilay Egyptiana? Dia raiki-tahotra Mosesy ka nanao hoe: Hay! fantatr''olona izany!'
mg1865::mg_2::2::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Farao izany zavatra izany, dia nitady hamono an''i Mosesy izy. Fa Mosesy nandositra ny tavan''i Farao ka nonina tany amin''ny tany Midiana; ary nipetraka teo anilan''ny lavaka fantsakana izy.'
mg1865::mg_2::2::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona tao Midiana nanana zanaka fito mirahavavy; ary avy izy ireo, dia nanovo rano ka nameno ny tavin-drano hampisotroany ny ondry aman''osin-drainy.'
mg1865::mg_2::2::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy kosa ny lehilahy mpiandry ondry ka nandroaka azy; fa Mosesy nitsangana ka namonjy azy, dia nampisotro rano ny ondry aman''osiny.'
mg1865::mg_2::2::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo amin-dRegoela rainy izy, dia hoy izy: Nahoana no dia nalaky tonga toy izany ianareo androany?'
mg1865::mg_2::2::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy ireo: Nisy lehilahy Egyptiana anankiray namonjy anay tamin''ny tanan''ny mpiandry ondry sady nanovo rano ho anay, dia nampisotro ny ondry aman''osy.'
mg1865::mg_2::2::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny zananivavy: Ka aiza izy? Nahoana no nilaozanareo izany lehilahy izany? Alao izy mba hihinan-kanina.'
mg1865::mg_2::2::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitrak''i Mosesy ny hitoetra tao amin-dralehilahy. Ary Zipora zananivavy dia nomeny ho vadin''i Mosesy.'
mg1865::mg_2::2::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteraka zazalahy izy, ary ny anarany nataon-drainy hoe Gersoma; fa hoy izy: Efa vahiny aty amin''ny tanin''ny firenena hafa aho.'
mg1865::mg_2::2::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nisehoan''Andriamanitra tamin''i Mosesy, sy ny nanirahany azy hanafaka ny olony'
  verse_text: 'Ary tao anatin''izany andro maro izany dia maty ny mpanjakan''i Egypta; ary ny Zanak''Isiraely nisento noho ny fanompoany ka nitaraina; ary niakatra tany amin''Andriamanitra ny fitarainany noho ny fanompoany.'
mg1865::mg_2::2::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra nandre ny fitarainany, dia nahatsiaro ny fanekeny tamin''i Abrahama sy Isaka ary Jakoba.'
mg1865::mg_2::2::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra dia nijery ny Zanak''Isiraely ka nahafantatra azy.'
mg1865::mg_2::3::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niandry ny ondry aman''osin''i Jetro rafozany, mpisorona tao Midiana, dia nitondra ny ondry aman''osy tany ankoatry ny efitra ka nankany Horeba, tendrombohitr''Andriamanitra.'
mg1865::mg_2::3::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ilay Anjelin''i Jehovah niseho taminy teo anaty lelafo teo amin''ny roimemy anankiray; dia nijery izy, ka, indro, nirehitra afo ny roimemy, kanefa tsy nahalevonana.'
mg1865::mg_2::3::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Hivily kely aho ka hizaha io fahitana lehibe io, hahafantarako izay tsy ahalevonan''ny roimemy.'
mg1865::mg_2::3::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Jehovah fa nivily hizaha izy, dia niantso azy tao afovoan''ny roimemy Andriamanitra ka nanao hoe: Ry Mosesy, ry Mosesy! Dia hoy izy: Inty aho.'
mg1865::mg_2::3::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Aza manakaiky ety; esory ny kapanao amin''ny tongotrao, fa tany masina io ijanonanao io.'
mg1865::mg_2::3::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy koa Izy: Izaho no Andriamanitry ny razanao, dia Andriamanitr''i Abrahama sy Andriamanitr''Isaka ary Andriamanitr''i Jakoba. Dia nisaron-tava Mosesy, fa natahotra hijery an''Andriamanitra izy.'
mg1865::mg_2::3::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: Efa hitako tokoa ny fahorian''ny oloko izay any Egypta, ary efa reko ny fitarainany noho ny ataon''ny mpampiasa azy; eny, fantatro ny alahelony;'
mg1865::mg_2::3::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia efa nidina Aho izao hamonjy azy amin''ny tanan''ny Egyptiana ka hitondra azy hiakatra hiala amin''izany tany izany ho any amin''izay tany soa sy malalaka, dia any amin''izay tany tondra-dronono sy tantely, any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita.'
mg1865::mg_2::3::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, indro, ny fitarainan''ny Zanak''Isiraely dia efa mby aty amiko, sady efa hitako koa ny fahoriana izay ampahorian''ny Egyptiana azy.'
mg1865::mg_2::3::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa avia ankehitriny ianao hirahiko ho any amin''i Farao hitondra ny Zanak''Isiraely oloko hivoaka avy any Egypta.'
mg1865::mg_2::3::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mosesy tamin''Andriamanitra: Iza moa aho no hankany amin''i Farao sy hitondra ny Zanak''Isiraely hivoaka avy any Egypta?'
mg1865::mg_2::3::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Homba anao tokoa Aho; ary izao no famantarana ho anao fa Izaho no efa naniraka anao; rehefa entinao mivoaka avy any Egypta ny olona, dia hanompo an''Andriamanitra eto amin''ity tendrombohitra ity ianareo.'
mg1865::mg_2::3::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''Andriamanitra: Indro, rehefa tonga any amin''ny Zanak''Isiraely aho ka manao aminy hoe: Andriamanitry ny razanareo no efa naniraka ahy ho aty aminareo, ary hanao amiko hoe kosa izy: Iza moa no anarany? dia ahoana no havaliko azy?'
mg1865::mg_2::3::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Andriamanitra tamin''i Mosesy: IZAHO, IZAY IZY HATRIZAY HATRIZAY KA HO MANDRAKIZAY. Ary hoy koa Izy: Izao no holazainao amin''ny Zanak''Isiraely: IZAHO IZAY Izy no efa naniraka ahy ho aty aminareo.'
mg1865::mg_2::3::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Andriamanitra tamin''i Mosesy: Izao no holazainao amin''ny Zanak''Isiraely: Jehovah, Andriamanitry ny razanareo, dia Andriamanitr''i Abrahama sy Andriamanitr''i Isaka ary Andriamanitr''i Jakoba, no efa naniraka ahy ho aty aminareo; izany no anarako mandrakizay, ary izany no hahatsiarovana Ahy hatramin''ny taranaka fara mandimby.'
mg1865::mg_2::3::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, dia angony ny loholon''ny Isiraely, ka lazao aminy hoe: Efa niseho tamiko Jehovah, Andriamanitry ny razanareo, dia Andriamanitr''i Abrahama sy Isaka ary Jakoba, ka nanao hoe: Efa namangy anareo tokoa Aho ka nahita ny anaovana anareo aty Egypta;'
mg1865::mg_2::3::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy Izaho: Hitondra anareo hiakatra Aho ho afaka amin''ny fahoriana aty Egypta ho any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, ho any amin''izay tany tondra-dronono sy tantely.'
mg1865::mg_2::3::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hihaino ny feonao izy; ary hankao amin''ny mpanjakan''i Egypta ianao sy ny loholon''ny Isiraely ka hilaza aminy hoe: Jehovah, Andriamanitry ny Hebreo, efa nihaona taminay; ary ankehitriny, trarantitra ianao, aoka handeha lalan-kateloana any an''efitra izahay mba hamono zavatra hatao fanatitra ho an''i Jehovah Andriamanitray.'
mg1865::mg_2::3::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Izaho mahalala fa tsy havelan''ny mpanjakan''i Egypta handeha ianareo, tsia, na dia amin''ny tanana mahery aza.'
mg1865::mg_2::3::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haninjitra ny tanako Aho ka hamely an''i Egypta amin''ny fahagagana rehetra izay hataoko eo aminy; ary rehefa afaka izany, dia vao handefa anareo izy.'
mg1865::mg_2::3::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko mahita fitia eo imason''ny Egyptiana ity firenena ity, ka raha handeha ianareo, dia tsy mba handeha maina;'
mg1865::mg_2::3::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny vehivavy samy hangataka firavaka volafotsy sy volamena ary fitafiana amin''ny miray monina aminy sy amin''izay mivahiny ao an-tranony; dia hataonareo amin''ny zanakareo-lahy sy ny zanakareo-vavy izany, ka dia hofoananareo ny Egyptiana.'
mg1865::mg_2::4::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly Mosesy ka nanao hoe: Indro, tsy hino ahy na hihaino ny feoko izy, fa hanao hoe: Tsy niseho taminao Jehovah.'
mg1865::mg_2::4::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Inona moa iny an-tananao? Dia novaliany hoe: Tehina ity.'
mg1865::mg_2::4::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Atsipazo amin''ny tany iny. Dia natsipiny tamin''ny tany ka tonga menarana, dia nandositra azy Mosesy.'
mg1865::mg_2::4::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro ny tananao, ka raiso amin''ny rambony iny, dia naninjitra ny tanany izy ka nandray azy; dia tonga tehina teo an-tanany indray izy'
mg1865::mg_2::4::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hinoan''ireo fa efa niseho taminao Jehovah, Andriamanitry ny razany, dia Andriamanitr''i Abrahama sy Andriamanitr''Isaka ary Andriamanitr''i Jakoba.'
mg1865::mg_2::4::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jehovah taminy: Atsofohy ao an-tratranao ny tananao. Dia natsofony tao an-tratrany ny tanany; ary nony notsoahany, dia, indro, efa boka ny tanany ka fotsy tahaka ny oram-panala.'
mg1865::mg_2::4::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy: Atsofohy ao an-tratranao indray ny tananao (dia natsofony tao an-tratrany indray ny tanany; ary nony notsoahany tamin''ny tratrany, dia, indro, efa tonga tahaka ny hodiny indray izy).'
mg1865::mg_2::4::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy hino anao izy ka tsy hihaino ny feon''ny famantarana voalohany, dia hino ny feon''ny famantarana aoriana izy.'
mg1865::mg_2::4::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy hino izany famantarana roa izany aza izy, na hihaino ny feonao, dia haka rano avy ao Neily ianao, ka haidinao amin''ny tany maina; ary izay rano alainao avy ao Neily dia ho tonga rà eo amin''ny tany maina.'
mg1865::mg_2::4::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Jehovah: Tompo o, mifona aminao aho, olona tsy mahay mandaha-teny aho, na hatrany aloha, na hatramin''izao itenenanao amin''ny mpanomponao izao aza; fa votsa vava sy miadam-piteny aho.'
mg1865::mg_2::4::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy; Iza moa no nanao ny vavan''ny olona? ary iza no mampahamoana, na mampaharenina, na mampahiratra, na mampahajamba? tsy Izaho Jehovah va'
mg1865::mg_2::4::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, dia mandehana, fa Izaho no homba ny vavanao ka hanoro anao izay holazainao.'
mg1865::mg_2::4::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Tompo o! mifona aminao aho, iraho izay tianao hirahina.'
mg1865::mg_2::4::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''i Mosesy ny fahatezeran''i Jehovah, ka hoy Izy: Tsy ao ihany va Arona Levita rahalahinao? fantatro fa mahay mandaha-teny izy. Ary indro koa, avy hitsena anao izy; koa rehefa mahita anao izy, dia ho faly ny fony.'
mg1865::mg_2::4::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny aminy ianao ka hanolo-teny azy; ary Izaho homba ny vavanao sy ny vavany ka hanoro anareo izay hataonareo.'
mg1865::mg_2::4::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy hiteny amin''ny olona hisolo anao; ka dia izy no ho solovavanao, ary ianao kosa ho solon''Andriamanitra aminy.'
mg1865::mg_2::4::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho entinao eny an-tananao io tehina io, izay hanaovanao ireo famantarana ireo.'
mg1865::mg_2::4::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nandeha Mosesy ka niverina ho any amin''i Jetro rafozany ka nanao taminy hoe: Masïna ianao, aoka aho handeha hiverina ho any amin''ny rahalahiko, izay any Egypta, ka hizaha na mbola velona ihany izy, na tsia. Ary hoy Jetro tamin''i Mosesy: Mandehana soa aman-tsara.'
mg1865::mg_2::4::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy tany Midiana: Mandehana miverina any Egypta, fa maty ny olona rehetra izay nitady ny ainao.'
mg1865::mg_2::4::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''i Mosesy ny vadiny sy ny zananilahy ka nampitaingeniny boriky, dia niverina ho any amin''ny tany Egypta izy; ary nentin''i Mosesy teny an-tanany ilay tehin''Andriamanitra.'
mg1865::mg_2::4::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Raha mandeha miverina ho any Egypta ianao, indreo ireo fahagagana rehetra ireo, izay nataoko eo an-tananao, dia ataovy eo anatrehan''i Farao; ary Izaho hanamafy ny fony, ka tsy handefa ny olona izy.'
mg1865::mg_2::4::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''i Farao hoe: Izao no lazain''i Jehovah: Zanako lahimatoa Isiraely;'
mg1865::mg_2::4::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa efa nolazaiko taminao hoe: Alefaso ny zanako mba hanompo Ahy; fa efa nandà tsy handefa azy ianao, koa, indro, Izaho hamono ny zanakao lahimatoa.'
mg1865::mg_2::4::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tany an-dàlana tao amin''ny fandriam-bahiny izy, dia nitsena azy Jehovah ka nitady hamono azy.'
mg1865::mg_2::4::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka fiharatra vato Zipora ka namora ny zanany, ary izay nesoriny dia natsipiny teo anilan''ny tongony, ka hoy izy: Efa vady azoko amin''ny fandatsahan-drà ianao.'
mg1865::mg_2::4::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala taminy Izy; ary hoy ravehivavy: Vady azo amin''ny fandatsahan-drà ianao, noho ny fora.'
mg1865::mg_2::4::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Arona: Mandehana hitsena an''i Mosesy any an''efitra. Dia lasa nandeha izy ka nifanena taminy tao amin''ny tendrombohitr''Andriamanitra, dia nanoroka azy.'
mg1865::mg_2::4::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambaran''i Mosesy tamin''i Arona izay teny rehetra efa nanirahan''i Jehovah azy sy izay famantarana rehetra efa nandidiany azy.'
mg1865::mg_2::4::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nandeha Mosesy sy Arona ka nanangona ny loholon''ny Zanak''Isiraely rehetra.'
mg1865::mg_2::4::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazain''i Arona ny teny rehetra izay efa nolazain''i Jehovah tamin''i Mosesy, sady nataony teo imason''ny olona ny famantarana.'
mg1865::mg_2::4::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nino ny olona; ary rehefa reny fa Jehovah efa namangy ny Zanak''Isiraely ka efa nitsinjo ny fahoriany, dia niondrika izy ka niankohoka.'
mg1865::mg_2::5::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nihaonan''i Mosesy sy Arona tamin''i Farao, sy ny nampitomboan''i Farao, ny fanompoan''ny Zanak''Isiraely'
  verse_text: 'Ary rehefa afaka izany, Mosesy sy Arona dia nankao amin''i Farao ka niteny taminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Alefaso ny oloko mba hanao andro firavoravoana ho Ahy any an''efitra.'
mg1865::mg_2::5::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Farao: Iza moa Jehovah, no hekeko teny handefasako ny Isiraely? tsy fantatro izay Jehovah, ka tsy halefako ny Isiraely.'
mg1865::mg_2::5::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy roa lahy: Andriamanitry ny Hebreo efa nihaona taminay; koa trarantitra ianao, aoka handeha lalan-kateloana any an''efitra izahay hamono zavatra hatao fanatitra ho an''i Jehovah Andriamanitray; fandrao Izy hamely anay amin''ny areti-mandringana, na amin''ny sabatra.'
mg1865::mg_2::5::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjakan''i Egypta taminy: Nahoana ianareo, ry Mosesy sy Arona, no manaketraka ny olona amin''ny asany? mandehana any amin''ny fanompoanareo mafy.'
mg1865::mg_2::5::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Farao: Indro, efa maro ankehitriny ny olona eto amin''ny tany, ka ianareo mampitsahatra azy amin''ny fanompoany mafy.'
mg1865::mg_2::5::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany Farao nandidy ny mpampiasa ny olona mbamin''ny mpifehy azy ka nanao hoe:'
mg1865::mg_2::5::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza omenareo mololo hanaovana biriky tahaka ny teo aloha intsony ny olona; fa izy ihany no aoka handeha hanangona mololo ho azy.'
mg1865::mg_2::5::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny isan''ny biriky izay fanaony teo aloha dia mbola hampanaovinareo azy ihany, fa aza ahenanareo; fa malaina izy, koa izany no itarainany hoe: Aoka izahay handeha hamono zavatra hatao fanatitra ho an''Andriamanitray.'
mg1865::mg_2::5::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamafio ny fanompoan''ny olona mba hifotorany amin''izany, fa aza avela hihaino izay lainga foana izy.'
mg1865::mg_2::5::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny mpampiasa ny olona mbamin''ny mpifehy azy ka niteny tamin''ny olona nanao hoe: Izao no lazain''i Farao: Izaho tsy mba hanome mololo anareo intsony;'
mg1865::mg_2::5::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mandehana ianareo ka manangona mololo any amin''izay hahitanareo, satria tsy hahena ny fanompoanareo na dia kely akory aza.'
mg1865::mg_2::5::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niely eran''ny tany Egypta rehetra ny olona mba hifako vodivary ho solon''ny mololo.'
mg1865::mg_2::5::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpampiasa nandodona azy ka nanao hoe: Vitao ny asanareo, izay anjara-fanompoana isan''andro, tahaka ny fony mbola nisy mololo ihany.'
mg1865::mg_2::5::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy ny Zanak''Isiraely, izay notendren''ny mpampiasa avy amin''i Farao mba hifehy azy, dia nokapohina ka nanontaniana hoe: Ahoana no tsy nahavitanareo ny anjaranareo tamin''ny fanaovana ny biriky omaly sy androany, tahaka ny teo aloha ?'
mg1865::mg_2::5::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankao amin''i Farao ny mpifehy ny Zanak''Isiraely ka nitaraina taminy hoe: Nahoana no manao toy izany amin''ny mpanomponao ianao?'
mg1865::mg_2::5::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy omena mololo tsinona izahay mpanomponao, nefa mbola asaina manao biriky ihany; ary, indreto, izahay mpanomponao no kapohina, ka manota ny vahoakanao.'
mg1865::mg_2::5::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Farao: Malaina dia malaina ianareo, ka izany no anaovanareo hoe: Aoka handeha izahay hamono zavatra hatao fanatitra ho an''i Jehovah.'
mg1865::mg_2::5::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, mandehana, ataovy izay fanompoanareo, fa tsy hisy mololo homena anareo; nefa ny anjara-birikinareo dia mbola hatolotrareo ihany.'
mg1865::mg_2::5::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitan''ny mpifehy ny Zanak''Isiraely fa efa azon-doza izy noho ny nanaovana hoe: Tsy hahenanareo ny isan''ny birikinareo amin''ny anjara-fanompoana isan''andro.'
mg1865::mg_2::5::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo dia nihaona tamin''i Mosesy sy Arona, izay nijanona niandry azy, raha avy tany amin''i Farao izy;'
mg1865::mg_2::5::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy izy tamin''izy roa lahy: Jehovah anie hijery sy hitsara anareo, satria efa nataonareo mangidy hoditra eo anatrehan''i Farao sy eo anatrehan''ny mpanompony izahay, ka nasianareo sabatra eo an-tanany hamonoany anay.'
mg1865::mg_2::5::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niverina ho any amin''i Jehovah ka nanao hoe: Tompo o, nahoana no nahatonga loza tamin''ity firenena ity Ianao? nahoana re no naniraka ahy Ianao?'
mg1865::mg_2::5::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatrizay nankanesako tao amin''i Farao mba hiteny amin''ny anaranao izay, dia nahatonga loza tamin''ity firenena ity izy; nefa tsy namonjy ny olonao akory Ianao.'
mg1865::mg_2::6::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Ankehitriny ho hitanao izay hataoko amin''i Farao; fa ny tanako mahery no handefasany azy, ary ny tanako mahery no handroahany azy amin''ny taniny.'
mg1865::mg_2::6::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny namerenan''Andriamanitra ny teniny tamin''i Mosesy'
  verse_text: 'Ary Andriamanitra niteny tamin''i Mosesy ka nanao hoe: Izaho no Jehovah;'
mg1865::mg_2::6::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tamin''ny anarako hoe ANDRIAMANITRA TSITOHA no nisehoako tamin''i Abrahama sy Isaka ary Jakoba, fa ny anarako hoe JEHOVAH tsy mbola nahafantarany Ahy,'
mg1865::mg_2::6::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naoriko taminy koa ny fanekeko hanomezako azy ny tany Kanana, dia ny tany fivahiniany izay efa nivahiniany.'
mg1865::mg_2::6::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, Izaho efa nandre ny fitarainan''ny Zanak''Isiraely, izay ampanompoin''ny Egyptiana, ka dia tsaroako ny fanekeko.'
mg1865::mg_2::6::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao amin''ny Zanak''Isiraely hoe: Izaho no Jehovah, ary hitondra anareo hivoaka ho afaka amin''ny fanompoana mafy ampanaovin''ny Egyptiana anareo Aho ka hanafaka anareo amin''ny fanompoana azy; ary sandry ahinjitra sy fitsarana lehibe no hamonjeko anareo.'
mg1865::mg_2::6::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia halaiko ho Ahy ianareo ho oloko, ary ho Andriamanitrareo Aho; dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo, Izay mitondra anareo mivoaka ho afaka amin''ny fanompoana mafy ampanaovin''ny Egyptiana anareo.'
mg1865::mg_2::6::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho hampiditra anareo any amin''ny tany izay nananganako tanàna homena an''i Abrahama sy Isaka ary Jakoba; dia homeko ho lovanareo izany: Izaho no Jehovah.'
mg1865::mg_2::6::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nilaza izany tamin''ny Zanak''Isiraely; nefa izy tsy nihaino an''i Mosesy noho ny fahoriam-panahy sy ny fanompoana mafy.'
mg1865::mg_2::6::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::6::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa ao amin''i Farao, mpanjakan''i Egypta, ka mitenena aminy mba handefasany ny Zanak''Isiraely hiala amin''ny taniny.'
mg1865::mg_2::6::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niteny teo anatrehan''i Jehovah ka nanao hoe: Indro, ny Zanak''Isiraely aza tsy nihaino ahy, ka ahoana no hihainoan''i Farao ahy, fa izaho tsy voafora molotra?'
mg1865::mg_2::6::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanome teny azy ho entiny ho any amin''ny Zanak''Isiraely sy ho amin''i Farao, mpanjakan''i Egypta, mba hitondra ny Zanak''Isiraely hivoaka avy amin''ny tany Egypta.'
mg1865::mg_2::6::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny firazanan''i Mosesy sy Arona'
  verse_text: 'Izao no lohan''ny fianakaviany: Ny zanakalahin-dRobena, lahimatoan''Isiraely, dia Hanoka sy Palo sy Hezrona sy Karmy; ireo no fokom-pirenen-dRobena.'
mg1865::mg_2::6::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Simeona dia Jemoela sy Jaminasy Ohada sy Jakinasy Zohara ary Saoly, zanakalahin''ny vehivavy Kananita; ireo no fokom-pirenen''i Simeona.'
mg1865::mg_2::6::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny zanakalahin''i Levy, araka ny taranany, dia Gersona sy Kehata ary Merary; ary ny andro niainan''i Levy dia fito amby telo-polo amby zato taona.'
mg1865::mg_2::6::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Hersona dia Libny sy Simey, araka ny fokom-pireneny.'
mg1865::mg_2::6::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela; ary ny andro niainan''i Kehata dia telo amby telo-polo amby zato taona.'
mg1865::mg_2::6::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Merary dia Maly sy Mosy. Ireo no fokom-pirenen''ny Levita, araka ny taranany.'
mg1865::mg_2::6::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amrama naka an''i Jokebeda anabavin-drainy ho vadiny, dia niteraka an''i Arona sy Mosesy taminy izy; ary ny andro niainan''i Amrama dia fito amby telo-polo amby zato taona.'
mg1865::mg_2::6::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jizara dia Kora sy Nafega ary Zikry.'
mg1865::mg_2::6::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Oziela dia Misaela sy Elzafana ary Sitry.'
mg1865::mg_2::6::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona naka an''i Eliseba, zanakavavin''i Aminadaba sady anabavin''i Nasona, ho vadiny; dia niteraka an''i Nadaba sy Abiho sy Eleazara ary Itamara taminy izy.'
mg1865::mg_2::6::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kora dia Asira sy Elkana ary Abiasafa; ireo no fokom-pirenen''ny Korana.'
mg1865::mg_2::6::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eleazara, zanakalahin''i Arona, naka vady avy tamin''ny zanakavavin''i Potiela, dia niteraka an''i Finehasa taminy izy. Ireo no lohan''ny fianakavian''ny Levita, araka ny fokom-pireneny.'
mg1865::mg_2::6::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no Arona sy Mosesy, izay nilazan''i Jehovah hoe: Ento ny Zanak''Isiraely hivoaka avy any amin''ny tany Egypta araka ny antokony.'
mg1865::mg_2::6::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no niteny tamin''i Farao, mpanjakan''i Egypta, mba hitondra ny Zanak''Isiraely hivoaka avy any Egypta; ireo no Mosesy sy Arona.'
mg1865::mg_2::6::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Ny nanirahan''Andriamanitra an''i Mosesy sy Arona hihaona amin''i Farao indray, sy ny famantarana nataon''izy roa lahy teo anatrehany'
  verse_text: 'Ary tamin''ny andro izay nitenenan''i Jehovah tamin''i Mosesy teo amin''ny tany Egypta,'
mg1865::mg_2::6::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Jehovah tamin''i Mosesy: Izaho no Jehovah; koa lazao amin''i Farao, mpanjakan''i Egypta, izay rehetra lazaiko aminao.'
mg1865::mg_2::6::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niteny teo anatrehan''i Jehovah ka nanao hoe: Indro, tsy voafora molotra aho, ka aiza no hihainoan''i Farao ahy!'
mg1865::mg_2::7::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Indro, efa nataoko andriamanitra ho an''i Farao ianao; ary Arona rahalahinao kosa ho mpaminaninao.'
mg1865::mg_2::7::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao hilaza izay rehetra nandidiako anao, ary Arona rahalahinao kosa hilaza amin''i Farao, mba handefasany ny Zanak''Isiraely hiala amin''ny taniny,'
mg1865::mg_2::7::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho hanamafy ny fon''i Farao sy hanamaro ny famantarana sy ny fahagagana izay hataoko eto amin''ny tany Egypta.'
mg1865::mg_2::7::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hihaino anareo Farao, ka dia hamely an''i Egypta ny tanako, ary fitsarana lehibe no hitondrako ny antokon''ny Zanak''Isiraely oloko hiala amin''ny tany Egypta.'
mg1865::mg_2::7::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantatry ny Egyptiana fa Izaho no Jehovah, rehefa maninjitra ny tanako amin''i Egypta Aho ka mitondra ny Zanak''Isiraely hivoaka avy any.'
mg1865::mg_2::7::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Mosesy sy Arona izany: araka izay nandidian''i Jehovah azy no nataony.'
mg1865::mg_2::7::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa valo-polo taona Mosesy, ary efa telo amby valo-polo taona kosa Arona, raha niteny tamin''i Farao izy mirahalahy.'
mg1865::mg_2::7::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy sy Arona:'
mg1865::mg_2::7::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miteny aminareo Farao ka manao hoe: Manaova fahagagana hanambara anareo, dia lazao amin''i Arona hoe: Raiso ny tehinao, ka atsipazo eo anatrehan''i Farao, dia ho tonga menarana iny.'
mg1865::mg_2::7::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona nankao amin''i Farao ka nanao araka izay efa nandidian''i Jehovah; dia natsipin''i Arona teo anatrehan''i Farao sy teo anatrehan''ny mpanompony ny tehiny, ka tonga menarana iny.'
mg1865::mg_2::7::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanalain''i Farao ny olon-kendry sy ny mpanana ody; ary ireo ombiasy teo Egypta ireo dia nanao toy izany tamin''ny fankatovany.'
mg1865::mg_2::7::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy nanipy ny tehiny avy izy ireo, ka tonga menarana ireny; nefa ny tehin''i Arona nitelina ny tehin''ireo.'
mg1865::mg_2::7::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihamafy ny fon''i Farao, ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain''i Jehovah.'
mg1865::mg_2::7::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny loza folo loha namelezan''Andriamanitra ny tany Egypta. Voalohany: ny rano tonga rà'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Efa mafy ny fon''i Farao, ka mandà tsy handefa ny olona izy.'
mg1865::mg_2::7::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa ao aminy ianao rahampitso; indro, hivoaka ho any amin''ny rano izy; dia mijanona eo amoron''i Neily ianao ambara-pihaviny (ary ny tehina, ilay novàna ho menarana, ho entinao eny an-tananao),'
mg1865::mg_2::7::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia lazao aminy hoe: Jehovah, Andriamanitry ny Hebreo, no naniraka ahy nankaty aminao hanao hoe: Alefaso ny oloko mba hanompoany Ahy any an''efitra; fa, indro, tsy nihaino ianao mandraka ankehitriny.'
mg1865::mg_2::7::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Izao no hahafantaranao fa Izaho no Jehovah: indro, ny tehiko ety an-tanako no hikapohako ny rano ao Neily, ka ho tonga rà izy.'
mg1865::mg_2::7::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho faty ny hazandrano ao Neily, ka ho maimbo Neily, ary tsy ho tian''ny Egyptiana intsony ny hisotro ny rano ao.'
mg1865::mg_2::7::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Lazao amin''i Arona hoe: Raiso ny tehinao, ka ahinjiro ambonin''ny ranon''i Egypta ny tananao, dia ambonin''ny sampan-dranony sy ambonin''ny lahin-dranony, sy ambonin''ny heniheniny, ary ambonin''ny kamoriny rehetra, mba ho tonga rà ireny; ary hisy rà eran''ny tany Egypta rehetra, na amin''ny fitoeran-drano hazo na amin''ny fitoeran-drano vato.'
mg1865::mg_2::7::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''i Mosesy sy Arona izany, araka izay nandidian''i Jehovah; dia nanainga ny tehina izy ka namely ny rano tao Neily teo imason''i Farao sy teo imason''ny mpanompony, dia tonga rà ny rano rehetra tao Neily;'
mg1865::mg_2::7::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa maty ny hazandrano izay tao Neily, dia maimbo Neily, ka tsy azon''ny Egyptiana nosotroina ny rano avy ao; ary ny rà dia nanerana ny tany Egypta rehetra.'
mg1865::mg_2::7::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ombiasy teo Egypta, dia mba nanao toy izany koa tamin''ny fankatovany; ka dia nihamafy ny fon''i Farao, ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain''i Jehovah.'
mg1865::mg_2::7::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina Farao ka nankao an-tranony, kanefa tsy mba nahoany akory, na dia izany aza.'
mg1865::mg_2::7::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihady rano hosotroiny teo amoron''i Neily ny Egyptiana rehetra; fa tsy azony nisotroana ny rano tao Neily.'
mg1865::mg_2::7::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy hafitoana taorian''ny namelezan''i Jehovah an''i Neily.'
mg1865::mg_2::7::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: 'Faharoa: ny sahona'
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Mankanesa ao amin''i Farao, ka lazao aminy hoe: Izao no lazain''i Jehovah: Alefaso ny oloko hanompo Ahy.'
mg1865::mg_2::7::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mandà ka tsy mandefa azy ianao, indro, Izaho hamely ny taninao rehetra amin''ny sahona;'
mg1865::mg_2::7::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hisy sahona betsaka any Neily, ary hiakatra ireny ka hankao amin''ny tranonao sy ny trano fandrianao sy eny ambonin''ny farafaranao sy any amin''ny tranon''ny mpanomponao sy amin''ny vahoakanao ary eny amin''ny fanendasa-mofonao sy eny amin''ny vilia fanaova-mofonao.'
mg1865::mg_2::7::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho aminao sy ny vahoakanao ary ny mpanomponao rehetra no hiakaran''ny sahona.'
mg1865::mg_2::8::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Lazao amin''i Arona hoe: Ahinjiro ny tananao mitana ny tehinao eny ambonin''ny sampan-drano ary eny ambonin ny lahin-drano sy ny heniheny, ka mampiakara ny sahona ho eny amin''ny tany Egypta.'
mg1865::mg_2::8::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahinjitr''i Arona tambonin''ny rano tany Egypta ny tanany; dia niakatra ny sahona ka nandrakotra ny tany Egypta.'
mg1865::mg_2::8::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ombiasy mba nanao toy izany koa tamin''ny fankatovany ka nampiakatra ny sahona ho eny amin''ny tany Egypta.'
mg1865::mg_2::8::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Farao dia nampaka an''i Mosesy sy Arona ka nanao hoe: Mangataha amin''i Jehovah hampialany ny sahona amiko sy amin''ny vahoakako; dia halefako ny olona mba hamonoany zavatra hatao fanatitra ho an''i Jehovah.'
mg1865::mg_2::8::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Farao: Aoka hiseho ny voninahitrao noho izay hataoko; rahoviana no hangatahako ho anao sy ny mpanomponao ary ny vahoakanao, hanesorana ny sahona aminao sy amin''ny tranonao, ka ho ao Neily ihany no hisy azy?'
mg1865::mg_2::8::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Rahampitso. Ary hoy kosa izy: Aoka ary dia ho araka ny teninao, mba hahafantaranao fa tsy misy tahaka an''i Jehovah Andriamanitray.'
mg1865::mg_2::8::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sahona dia hiala aminao sy amin''ny tranonao sy ny mpanomponao ary ny vahoakanao, ka ho ao Neily ihany no hisy azy.'
mg1865::mg_2::8::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona niala teo amin''i Farao; ary Mosesy nitaraina tamin''i Jehovah ny amin''ny sahona izay efa nataony tamin''i Farao.'
mg1865::mg_2::8::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Jehovah araka ny tenin''i Mosesy, ka maty ny sahona teny amin''ny trano sy teny amin''ny tokotany ary tany an-tsaha.'
mg1865::mg_2::8::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nangonina hivangongo teny rehetra eny ireny, ka efa maimbo ny tany.'
mg1865::mg_2::8::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony hitan''i Farao fa nisy hiainana, dia nanamafy ny fony izy ka tsy mba nihaino azy mirahalahy, dia araka izay efa nolazain''i Jehovah.'
mg1865::mg_2::8::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Fahatelo: ny moka'
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Lazao amin''i Arona hoe; Ahinjiro ny tehinao, ka kapohy ny vovo-tany, dia ho tonga moka eran''ny tany Egypta rehetra izany.'
mg1865::mg_2::8::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao toy izany izy, ka nahinjitr''i Arona ny tanany mitana ny tehiny, ary nokapohiny ny vovo-tany, dia nisy moka teny amin''ny olona sy teny amin''ny biby fiompy: fa tonga moka avokoa ny vovo-tany rehetra eran''ny tany Egypta rehetra.'
mg1865::mg_2::8::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mba nanao toy izany koa ny ombiasy tamin''ny fankatovany mba hahatonga moka, kanjo tsy nahay izy; ary ny moka dia teny amin''ny olona sy teny amin''ny biby fiompy.'
mg1865::mg_2::8::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny ombiasy tamin''i Farao: Rantsan-tanan''Andriamanitra ity; nefa nihamafy ny fon''i Farao, ka tsy nihaino azy mirahalahy izy, dia araka izay efa nolazain''i Jehovah.'
mg1865::mg_2::8::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Fahefatra: ny lalitra'
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Mifohaza maraina koa, ka mitsangàna eo anatrehan''i Farao (fa, indro, hivoaka ho any amin''ny rano izy), ka lazao aminy hoe: Izao no lazain''i Jehovah: Alefaso ny oloko hanompo Ahy.'
mg1865::mg_2::8::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mandefa ny oloko ianao, indro Aho handefa lalitra betsaka hamely anao sy ny mpanomponao sy ny vahoakanao ary ny tranonao; dia ho feno lalitra ny tranon''ny Egyptiana sy ny tany izay itoerany koa.'
mg1865::mg_2::8::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa havahako amin''izany andro izany ny tany Gosena, izay itoeran''ny oloko, ka tsy mba hisy lalitra ao, mba hahafantaranao fa Izaho no Jehovah afovoan''ny tany.'
mg1865::mg_2::8::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hasiako fiavahana amin''ny oloko sy ny olonao; rahampitso no hisian''izany famantarana izany.'
mg1865::mg_2::8::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''i Jehovah izany; ka dia nisy lalitra be dia be tao amin''ny tranon''i Farao sy tao amin''ny tranon''ny mpanompony ary teny amin''ny tany Egypta rehetra; koa dia simba ny tany noho ny lalitra.'
mg1865::mg_2::8::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Farao nampaka an''i Mosesy sy Arona ka nanao hoe: Mandehana ianareo hamono zavatra hatao fanatitra ho an''Andriamanitrareo eto amin''ity tany ity.'
mg1865::mg_2::8::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mosesy: Tsy azo atao izany; fa izay fadin''ny Egyptiana no hovonoinay hatao fanatitra ho an''i Jehovah Andriamanitray; koa, indro, raha izay fadin''ny Egyptiana no vonoinay eo imasony hatao fanatitra, moa tsy hotorahany vato va izahay?'
mg1865::mg_2::8::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handeha lalan-kateloana any an''efitra izahay, dia hamono zavatra hatao fanatitra ho an''i Jehovah Andriamanitray, araka izay holazainy aminay.'
mg1865::mg_2::8::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Farao: Izaho dia handefa anareo ihany mba hamono zavatra hatao fanatitra ho an''i Jehovah Andriamanitrareo any an''efitra; fa hany ataoko: aza mandeha lavitra loatra ianareo; dia mangataha ho ahy.'
mg1865::mg_2::8::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Indro, izaho hiala eto aminao ka hangataka amin''i Jehovah mba hialan''ny lalitra amin''i Farao sy ny mpanompony ary ny vahoakany rahampitso; fa aoka kosa tsy hamitaka intsony Farao ka tsy handefa ny olona hamono zavatra hatao fanatitra ho an i''Jehovah.'
mg1865::mg_2::8::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niala teo amin''i Farao ka nangataka tamin''i Jehovah'
mg1865::mg_2::8::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia nanao araka ny tenin''i Mosesy ka nampiala ny lalitra betsaka tamin''i Farao sy ny mpanompony ary ny vahoakany, ka tsy nisy niangana ireny na dia iray akory aza.'
mg1865::mg_2::8::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo Farao nanamafy ny fony indray tamin''izany ka tsy nandefa ny olona.'
mg1865::mg_2::9::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahadimy: ny aretina tamin''ny biby'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mankanesa ao amin''i Farao ianao, ka lazao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Hebreo: Alefaso ny oloko hanompo Ahy.'
mg1865::mg_2::9::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mandà ka tsy mandefa azy ianao, fa mbola mihazona azy ihany,'
mg1865::mg_2::9::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia, indro, ny tanan''i Jehovah ho amin''ny bibinao izay any an-tsaha, dia amin''ny soavaly sy amin''ny boriky sy amin''ny rameva sy amin''ny omby ary amin''ny ondry aman''osy, ka hisy areti-mandringana mafy indrindra.'
mg1865::mg_2::9::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia hanavaka ny bibin''ny Isiraely amin''ny bibin''ny Egyptiana, ka tsy hisy maty izay rehetra an''ny Zanak''Isiraely na dia iray aza.'
mg1865::mg_2::9::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanendry fotoan''andro Jehovah ka nanao hoe: Rahampitso no hanaovan''i Jehovah izany zavatra izany eto amin''ny tany.'
mg1865::mg_2::9::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia nataon''i Jehovah izany zavatra izany; ka maty avokoa ny bibin''ny Egyptiana rehetra; fa ny bibin''ny Zanak''Isiraely kosa tsy mba nisy maty na dia iray akory aza.'
mg1865::mg_2::9::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka Farao, ka, indro, tsy mba nisy maty ny bibin''ny Zanak''Isiraely na dia iray akory aza, nefa nihamafy ny fon''i Farao, ka tsy nandefa ny olona izy.'
mg1865::mg_2::9::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Fahenina: ny vay'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy sy Arona: Mangalà lavenona amin''ny tananao ao amin''ny lafaoro lehibe, ary aoka hatopin''i Mosesy miakatra manandrify ny lanitra eo imason''i Farao izany.'
mg1865::mg_2::9::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitora-jofo eran''ny tany Egypta rehetra izany ka ho tonga vay mipoipoitra amin''ny olona sy amin''ny biby fiompy eran''ny tany Egypta rehetra.'
mg1865::mg_2::9::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka lavenona tamin''ny lafaoro lehibe izy roa lahy ka nitsangana teo anatrehan''i Farao; dia natopin''i Mosesy niakatra nanandrify ny lanitra izany, ka dia tonga vay nipoipoitra tamin''ny olona sy tamin''ny biby fiompy.'
mg1865::mg_2::9::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ombiasy tsy nahajanona teo anatrehan''i Mosesy noho ny vay; fa ny vay dia nahazo ny ombiasy mbamin''ny Egyptiana rehetra.'
mg1865::mg_2::9::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jehovah dia nanamafy ny fon''i Farao, ka tsy nihaino azy mirahalahy izy, dia araka izay efa nolazain''i Jehovah tamin''i Mosesy.'
mg1865::mg_2::9::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Fahafito: ny havandra'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mifohaza maraina koa ianao dia mitsangana eo anatrehan''i Farao, ka lazao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Hebreo: Alefaso ny oloko hanompo Ahy'
mg1865::mg_2::9::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny izao dia halefako ny areti-mandringana rehetra avy aty amiko hamely ny fonao sy ny mpanomponao ary ny vahoakanao, mba hahafantaranao fa tsy misy tahaka Ahy amin''ny tany rehetra.'
mg1865::mg_2::9::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, raha izay Aho no naninjitra ny tanako hamely anao sy ny vahoakanao amin''ny areti-mandringana, dia efa fongotra tamin''ny tany ianao.'
mg1865::mg_2::9::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa izao indrindra no nampaharetako anao, dia ny hampahita anao ny heriko mba hambara any amin''ny tany rehetra ny anarako.'
mg1865::mg_2::9::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola mirehareha amin''ny oloko ihany va ianao ka tsy handefa azy?'
mg1865::mg_2::9::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, rahampitso toy izao dia hampilatsaka havandra be dia be Aho, izay tsy mbola nisy toy izany teto Egypta hatramin''ny andro nisiany mponina ka mandraka ankehitriny.'
mg1865::mg_2::9::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, maniraha mba hanangona faingana ny bibinao sy izay rehetra anananao any an-tsaha; fa ny olona rehetra sy ny biby fiompy izay ho hita any an-tsaha ka tsy ho enti-mody dia hilatsahan''ny havandra ka ho faty avokoa.'
mg1865::mg_2::9::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay natahotra ny tenin''i Jehovah teo amin''ny mpanompon''i Farao dia nampody ny mpanompony sy ny bibiny ho any an-trano;'
mg1865::mg_2::9::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay tsy nandatsaka am-po ny tenin''i Jehovah kosa dia namela ny mpanompony sy ny bibiny tany an-tsaha ihany.'
mg1865::mg_2::9::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro manandrify ny lanitra ny tananao, dia hisy havandra hilatsaka amin''ny tany Egypta rehetra, dia amin''ny olona sy amin''ny biby fiompy ary amin''ny anana rehetra any an-tsaha eran''ny tany Egypta.'
mg1865::mg_2::9::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahinjitr''i Mosesy manandrify ny lanitra ny tehiny; ary Jehovah nanisy kotrokorana sy havandra, ary nisy afo nifanaretsadretsaka teny ambonin''ny tany; ary Jehovah nandatsaka havandra tamin''ny tany Egypta.'
mg1865::mg_2::9::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy havandra sy afo nifandrambondrambona tanelanelan''ny havandra; dia mafy indrindra izany, ka tsy mbola nisy toy izany tany amin''ny tany Egypta rehetra hatrizay naha-firenena azy.'
mg1865::mg_2::9::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny havandra namely izay rehetra tany an-tsaha, na olona na biby fiompy, eran''ny tany Egypta rehetra; ny anana rehetra tany an-tsaha dia nasian''ny havandra koa, ary ny hazo rehetra tany an-tsaha notapatapahiny.'
mg1865::mg_2::9::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tao amin''ny tany Gosena izay nitoeran''ny Zanak''Isiraely ihany no tsy mba nisy havandra.'
mg1865::mg_2::9::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka Farao nampaka an''i Mosesy sy Arona ka nanao taminy hoe: Efa nanota aho tamin''izao, ka Jehovah no marina, fa izaho sy ny vahoakako no meloka.'
mg1865::mg_2::9::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataha amin''i Jehovah, fa aoka izay ny kotrokorana sy ny havandra, dia halefako tsy hitoetra eto intsony ianareo.'
mg1865::mg_2::9::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy taminy: Raha vao mivoaka amin''ny tanàna aho, dia hamelatra ny tanako amin''i Jehovah; koa dia hitsahatra ny kotrokorana, ary ny havandra dia tsy hisy intsony, mba hahafantaranao fa an''i Jehovah ny tany.'
mg1865::mg_2::9::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa fantatro fa ianao sy ny mpanomponao dia tsy mbola hatahotra an''i Jehovah Andriamanitra ihany.'
mg1865::mg_2::9::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa naripaka ny rongony sy ny vary hordea; fa efa niteraka ny vary hordea, ary efa namony ny rongony.'
mg1865::mg_2::9::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vary tritika sy ny ampemby no tsy mba naripaka, satria mbola fohy ireny.'
mg1865::mg_2::9::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niala teo amin''i Farao ka nankeo ivelan''ny tanàna, dia namelatra ny tanany tamin''i Jehovah, ka dia nitsahatra ny kotrokorana sy ny havandra, ary tsy nisy ranonorana nilatsaka tamin''ny tany intsony.'
mg1865::mg_2::9::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Farao fa nitsahatra ny ranonorana sy ny havandra ary ny kotrokorana, dia mbola nanota ihany indray izy; ary samy nanamafy ny fony izy sy ny mpanompony.'
mg1865::mg_2::9::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihamafy ny fon''i Farao ka tsy mba nandefa ny Zanak''Isiraely izy, araka izay efa nampilazain''i Jehovah an''i Mosesy.'
mg1865::mg_2::10::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahavalo: ny valala'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mankanesa ao amin''i Farao; fa Izaho efa nanamafy ny fony sy ny fon''ny mpanompony, mba hanehoako izao famantarako izao eo aminy;'
mg1865::mg_2::10::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba holazainao ho ren''ny zanakao sy ny zafinao izay zavatra nataoko teto Egypta sy izay famantarana nataoko teo aminy, mba ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_2::10::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona dia nankao amin''i Farao ka nanao taminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Hebreo: Mandrapahoviana no handavanao tsy hanetry tena eo anatrehako? alefaso ny oloko mba hanompo Ahy.'
mg1865::mg_2::10::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mandà ka tsy mandefa ny oloko ianao, indro, hahatonga valala amin''ny taninao rehetra Aho rahampitso;'
mg1865::mg_2::10::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia handrakotra ny tany rehetra ireny, ka tsy ho hita ny tany; dia hohaniny ny sisan''ny havandra, izay navela ho anareo, ka hohaniny avokoa ny hazo rehetra izay maniry ho anareo any an-tsaha;'
mg1865::mg_2::10::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hameno ny tranonao sy ny tranon''ny mpanomponao rehetra ary ny tranon''ny Egyptiana rehetra ireny; ary tsy mbola hitan''ny rainao na ny raibenao izay toy izay hatr''izay andro niainany tety ambonin''ny tany ka mandraka androany. Dia nihodina izy ka niala teo amin''i Farao.'
mg1865::mg_2::10::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompon''i Farao taminy: Mandra-pahoviana no ho fandrika amintsika iny lehilahy iny? alefaso ireo olona ireo hanompo an''i Jehovah Andriamaniny; tsy mbola fantatrao va fa efa simba Egypta?'
mg1865::mg_2::10::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy nampiverina an''i Mosesy sy Arona hankao amin''i Farao indray: ary hoy izy taminy: Mandehana, manompo an''i Jehovah Andriamanitrareo; nefa iza avy moa no handeha?'
mg1865::mg_2::10::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Ny tanora sy ny antitra aminay ho entinay handeha, ary ny zanakai-lahy sy ny zanakai-vavy sy ny ondry aman''osinay ary ny ombinay ho entinay handeha; fa hisy andro firavoravoanay ho an''i Jehovah.'
mg1865::mg_2::10::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Farao taminy: Aoka homba anareo ihany anie Jehovah, raha handefa anareo mbamin''ny zanakareo madinika aho; mitandrema, fa misy ratsy eo anoloanareo.'
mg1865::mg_2::10::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izany, fa mandehana ianareo lehilahy lehibe ka manompoa an''i Jehovah, fa izany no tadiavinareo. Ary izy roa lahy dia noroahina hiala teo anatrehan''i Farao.'
mg1865::mg_2::10::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro ambonin''ny tany Egypta ny tananao hihavian''ny valala, dia hiakatra ho eto amin''ny tany Egypta ireny, ary dia hihinana ny zava-maniry amin''ny tany, dia izay rehetra sisan''ny havandra.'
mg1865::mg_2::10::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahinjitr''i Mosesy tambonin''ny tany Egypta ny tehiny, ary Jehovah nitondra rivotra avy any atsinanana hankany amin''ny tany mandritra iny andro sy iny alina iny; ary nony maraina dia nitondra ny valala ny rivotra avy any atsinanana.'
mg1865::mg_2::10::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny valala niakatra ho amin''ny tany Egypta rehetra, dia nipetraka nanerana ny tany Egypta rehetra; ary nampahory indrindra ireny, ka tsy nisy valala toy izany tany aloha, ary ato aoriany koa tsy hisy toy izany.'
mg1865::mg_2::10::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nandrakotra ny tany rehetra ireny, ka efa maizina ny tany; ary nohaniny ny anana rehetra teo amin''ny tany sy ny voankazo rehetra, izay sisan''ny havandra; ka dia tsy nisy sisa ny zava-maitso eran''ny tany Egypta rehetra, na tamin''ny hazo, na tamin''ny anana tany an-tsaha.'
mg1865::mg_2::10::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Farao dia nampaka an''i Mosesy sy Arona faingana ka nanao hoe: Efa nanota tamin''i Jehovah Andriamanitrareo sy taminareo aho.'
mg1865::mg_2::10::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, masïna ianao mamela ny fahotako izao indray mandeha izao ihany, ka mangataha amin''i Jehovah Andriamanitrareo hampialany amiko izao mahafaty iray loha izao monja.'
mg1865::mg_2::10::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala teo amin''i Farao izy ka nangataka tamin''i Jehovah.'
mg1865::mg_2::10::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nahatonga rivotra mahery indrindra avy andrefana kosa, izay nitondra ny valala ka namarina azy tao amin''ny Ranomasina Mena; dia tsy nisy sisa intsony ny valala eran''ny tany Egypta rehetra, na dia iray akory aza.'
mg1865::mg_2::10::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jehovah nanamafy ny fon''i Farao, ka tsy nandefa ny Zanak''Isiraely izy.'
mg1865::mg_2::10::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Fahasivy: ny aizim-pito'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro manandrify ny lanitra ny tananao, mba hisy aizina amin''ny tany Egypta, dia aizina azo tsapaina.'
mg1865::mg_2::10::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahinjitr''i Mosesy nanandrify ny lanitra ny tanany; dia nisy aizim-pito eran''ny tany Egypta rehetra hateloana,'
mg1865::mg_2::10::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa tsy mba nifankahita ny olona, na niala tamin''izay nitoerany, hateloana; fa ny Zanak''Isiraely rehetra kosa nisy mazava teo amin''ny fonenany.'
mg1865::mg_2::10::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Farao dia nampaka an''i Mosesy ka nanao hoe: Mandehana ianareo, manompoa an''i Jehovah; fa ny ondry aman''osinareo sy ny ombinareo ihany no aoka havelanareo; ary ny zanakareo madinika dia aoka hiaraka aminareo koa.'
mg1865::mg_2::10::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Ianao no hanolotra eto an-tananay izay fanatitra dorana sy fanatitra hafa alatsa-drà haterinay ho an''i Jehovah Andriamanitray;'
mg1865::mg_2::10::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny omby aman''ondrinay dia ho entinay hiaraka aminay koa; fa tsy hisy havela na dia ny kitrony iray aza, satria ireny no hangalanay hanompoana an''i Jehovah Andriamanitray; ary tsy mbola fantatray izay ho entinay manompo an''i Jehovah mandra-pahatonganay any.'
mg1865::mg_2::10::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia nanamafy ny fon''i Farao, ka tsy nety nandefa azy izy.'
mg1865::mg_2::10::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Farao taminy: Mialà amiko; koa mitandrema, fa aoka tsy hahita ny tavako intsony ianao; fa amin''izay andro hahitanao ny tavako dia ho faty ianao.'
mg1865::mg_2::10::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Marina izay nolazainao; fa tsy hahita ny tavanao intsony aho.'
mg1865::mg_2::11::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Filazana ny hihavian''ny loza fahafolo'
  verse_text: 'Fa Jehovah nilaza tamin''i Mosesy, hoe: Mbola hahatonga loza iray koa amin''i Farao sy Egypta Aho; ary rehefa afaka izany, dia handefa anareo hiala aty izy; ary rehefa handefa anareo rehetra izy, dia handroaka anareo fatratra hiala aty.'
mg1865::mg_2::11::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitenena amin''ny olona, ary aoka ny lehilahy samy hangataka firavaka volafotsy sy firavaka volamena amin''ny namany avy, ary ny vehivavy amin''ny namany avy koa.'
mg1865::mg_2::11::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Jehovah nahita fitia teo imason''ny Egyptiana ny olona. Ary Mosesy dia lehilahy malaza indrindra teo amin''ny tany Egypta, dia teo imason''ny mpanompon''i Farao sy teo imason''ny vahoaka.'
mg1865::mg_2::11::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Izao no lazain''i Jehovah: Rehefa tokony ho mamatonalina Izaho hivoaka hankeo afovoan''i Egypta,'
mg1865::mg_2::11::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho faty ny lahimatoa rehetra eto amin''ny tany Egypta, hatramin''ny matoan''i Farao izay mipetraka eo ambonin''ny seza fiandrianany ka hatramin''ny matoan''ny ankizivaviny izay eo anilan''ny fikosoham-bary, ary ny voalohan-teraky ny biby fiompy rehetra.'
mg1865::mg_2::11::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy fidradradradrana mafy eran''ny tany Egypta rehetra, izay tsy mbola nisy tahaka izany, sady tsy hisy tahaka izany intsony.'
mg1865::mg_2::11::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy hisy na dia alika aza hanetsika ny lela ny amin''ny Zanak''Isiraely rehetra, na amin''ny olona, na amin''ny biby, mba ho fantatrareo ny tsy fampitovian''i Jehovah ny Egyptiana sy ny Isiraely.'
mg1865::mg_2::11::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hidina ho ao amiko ireo mpanomponao rehetra ireo dia hiankohoka eo anatrehako ka hanao hoe: Mandehana ianao sy ny olona rehetra izay manaraka anao; ary rehefa afaka izany, dia vao handeha aho. Dia niala teo amin''i Farao tamin''ny fahatezerana mirehitra Mosesy.'
mg1865::mg_2::11::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Tsy hihaino anareo Farao, mba hitomboan''ny fahagagana izay hataoko eto amin''ny tany Egypta.'
mg1865::mg_2::11::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona nanao ireo fahagagana rehetra ireo teo amin''i Farao; nefa Jehovah nanamafy ny fon''i Farao, ka tsy nandefa ny Zanak''Isiraely hiala tamin''ny taniny izy.'
mg1865::mg_2::12::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny Paska, sy ny loza fahafolo, izay nahafaty ny lahimatoa rehetra teo Egypta'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona teo amin''ny tany Egypta ka nanao hoe:'
mg1865::mg_2::12::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity volana ity ho voaloham-bolana ho anareo; dia ho voaloham-bolana amin''ny taona ho anareo izy.'
mg1865::mg_2::12::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena ianareo amin''ny fiangonana, dia ny Isiraely rehetra, ka manaova hoe: Amin''ny andro fahafolo amin''ity volana ity dia aoka samy haka zanak''ondry iray avy izy rehetra, araka ny fianakaviany, dia zanak''ondry iray avy no ho an''ny isan-trano;'
mg1865::mg_2::12::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha vitsy loatra ny iray trano ka tsy mahalany zanak''ondry iray, dia aoka izy sy izay namany mifanakaiky trano aminy haka araka izay isan''ny olona; ny olona rehetra samy araka izay tokony ho laniny avy no hanisanareo ny zanak''ondry.'
mg1865::mg_2::12::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zanak''ondry tsy misy kilema, dia lahy izay iray taona, no halainareo; halainareo amin''ny ondry na amin''ny osy izy;'
mg1865::mg_2::12::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hotehirizinareo izy hatramin''ny andro fahefatra ambin''ny folo amin''ity volana ity; dia hamono azy amin''ny hariva ny fiangonana, dia ny Isiraely rehetra.'
mg1865::mg_2::12::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanalany ny rà, ka hatentiny amin''ny tolam-baravarana roa sy amin''ny tataom-baravaran''ny trano izay hihinanany azy.'
mg1865::mg_2::12::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hohaniny amin''izany alina izany ny hena; voatsatsika tamin''ny afo no hihinanany azy mbamin''ny mofo tsy misy masirasira sady hampiarahina amin''ny anana mangidy.'
mg1865::mg_2::12::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza hanina manta na voahandro amin''ny rano izy, fa atsatsiho amin''ny afo mbamin''ny lohany sy ny tongony ary ny fadiny.'
mg1865::mg_2::12::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza asianareo sisa ho tra-maraina; fa raha tahiny misy sisa tsy lany ka tra-maraina, dia hodoranareo amin''ny afo.'
mg1865::mg_2::12::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izao no hataonareo, raha mihinana azy: ny valahanareo ho voasikina, ny kapanareo ho eo amin''ny tongotrareo, ary ny tehinareo ho eny an-tananareo; dia hohaninareo faingana izy, fa Paskan''i Jehovah.'
mg1865::mg_2::12::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa handeha hamaky ny tany Egypta amin''izany alina izany Aho ka hamono ny matoa rehetra amin''ny tany Egypta hatramin''ny olona ka hatramin''ny biby fiompy; ary ny andriamanitry ny Egyptiana dia hotsaraiko avokoa: Izaho no Jehovah.'
mg1865::mg_2::12::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rà dia ho famantarana ho anareo eo amin''ny trano izay itoeranareo; ary raha mahita ny rà Aho, dia handalo anareo, ka tsy hisy loza handringana anareo, raha mamely ny tany Egypta Aho.'
mg1865::mg_2::12::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany andro izany dia ho fahatsiarovana ho anareo ka hotandremanareo ho andro firavoravoana ho an''i Jehovah; hatramin''ny taranakareo fara mandimby no hitandremanareo izany ho andro firavoravoana, ho lalàna mandrakizay.'
mg1865::mg_2::12::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no hihinananareo mofo tsy misy masirasira: amin''ny voalohan''andro no hanesoranareo ny masirasira amin''ny tranonareo; fa na iza na iza homana mofo misy masirasira hatramin''ny andro voalohany ka hatramin''ny fahafito dia hofongorana tsy ho amin''ny Isiraely.'
mg1865::mg_2::12::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro voalohany dia hisy fivoriana masina ho anareo ary amin''ny andro fahafito koa hisy fivoriana masina; tsy hanao raharaha akory ianareo amin''izany andro izany, afa-tsy izay hohanin''ny isan-olona, dia izany ihany no hamboarinareo.'
mg1865::mg_2::12::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitandrina ny andron''ny mofo tsy misy masirasira ianareo, fa izany andro izany indrindra no nitondrako ny antokonareo nivoaka avy tany amin''ny tany Egypta; dia hotandremanareo izany hatramin''ny taranakareo fara mandimby ho lalàna mandrakizay.'
mg1865::mg_2::12::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro fahefatra ambin''ny folo amin''ny volana voalohany, nony hariva, no hihinananareo mofo tsy misy masirasira ambara-paharivan''ny andro fahiraika amby roa-polo amin''ny volana.'
mg1865::mg_2::12::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no tsy hisiana masirasira ao an-tranonareo; fa na iza na iza homana izay misy masirasira dia hofongorana tsy ho amin''ny fiangonan''ny Isiraely, na vahiny na tompon-tany.'
mg1865::mg_2::12::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hihinana na inona na inona izay misy masirasira ianareo; fa samy hihinana mofo tsy misy masirasira ao amin''izay itoeranareo rehetra avy ianareo.'
mg1865::mg_2::12::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanalain''i Mosesy ny loholon''ny Isiraely rehetra, ka hoy izy taminy: Mandehana ianareo ka makà ondry ho anareo araka ny fokom-pirenenareo avy, ka vonoy ny Paska.'
mg1865::mg_2::12::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia makà hysopa iray fihina, ka atsobohy amin''ny rà izay ao anatin''ny bakoly ary ny rà izay ao anatin''ny bakoly dia anenteno amin''ny tataom-baravarana sy ny tolana roa; ary aza misy mivoaka eo am-baravaran''ny tranonareo avy ianareo ambara-pahamarain''ny andro.'
mg1865::mg_2::12::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah handeha hamely ny Egyptiana; ary raha mahita ny rà eo amin''ny tataom-baravarana sy ny tolana roa Jehovah, dia handalo ny varavarana, ka tsy havelany hiditra ao an-tranonareo hamely anareo ny mpandringana.'
mg1865::mg_2::12::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitandrina izany zavatra izany, ianareo ho lalàna ho anareo sy ho an''ny taranakareo mandrakizay.'
mg1865::mg_2::12::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga any amin''ny tany izay homen''i Jehovah anareo araka izay nolazainy ianareo, dia tandremo izany fanompoana izany.'
mg1865::mg_2::12::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hanontany anareo ny zanakareo hoe: Inona no anton''izao fanompoana ataonareo izao?'
mg1865::mg_2::12::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia holazainareo hoe: Izao dia famonoana ny Paskan''i Jehovah, Izay nandalo ny tranon''ny Zanak''Isiraely tany Egypta, raha namely ny Egyptiana Izy, fa namonjy ny tao an-tranontsika. Dia niondrika ny olona ka nivavaka.'
mg1865::mg_2::12::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nandeha ny Zanak''Isiraely ka nanao izany; araka izay nandidian''i Jehovah an''i Mosesy sy Arona no nataony.'
mg1865::mg_2::12::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony namatonalina Jehovah namono ny lahimatoa rehetra tany amin''ny tany Egypta, hatramin''ny lahimatoan''i Farao izay nipetraka teo ambonin''ny seza fiandrianany ka hatramin''ny lahimatoan''ny babo izay tao amin''ny trano-maizina, mbamin''izay voalohan-teraky ny biby fiompy rehetra.'
mg1865::mg_2::12::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifoha raha mbola alina Farao, dia izy sy ny mpanompony rehetra ary ny Egyptiana rehetra, fa nisy fidradradradrana mafy tany Egypta, satria tsy nisy trano izay tsy nahafatesana.'
mg1865::mg_2::12::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampaka an''i Mosesy sy Arona izy, raha mbola alina, ka nanao hoe: Mitsangàna, mialà eto amin''ny vahoakako ianareo sy ny Zanak''Isiraely, ary mandehana ka manompoa an''i Jehovah araka ny nolazainareo.'
mg1865::mg_2::12::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ondry aman''osinareo sy ny ombinareo dia ento koa araka izay efa nolazainareo, ka mandehana; fa mba tsofy rano aho.'
mg1865::mg_2::12::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandodona ny olona ny Egyptiana ka nampandeha azy faingana hiala tamin''ny tany, satria hoy izy: Maty avokoa izahay rehetra.'
mg1865::mg_2::12::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentin''ny olona ny kobany voalena, raha tsy mbola voaisy masirasira, sy ny viliany fanaova-mofo voafehy ao amin''ny lambany teny an-tsorony.'
mg1865::mg_2::12::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nanao araka ny tenin''i Mosesy ka nangataka firavaka volafotsy sy firavaka volamena ary fitafiana tamin''ny Egyptiana.'
mg1865::mg_2::12::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''i Jehovah nahita fitia teo imason''ny Egyptiana ny olona, ka nomen''ireo azy izay nangatahiny, ka dia nofoanany ny Egyptiana.'
mg1865::mg_2::12::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga tao Ramesesa ny Zanak''Isiraely ka nankany Sokota, dia lehilahy mahalia lalana tokony ho enina hetsy, afa-tsy ny zaza amim-behivavy.'
mg1865::mg_2::12::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olona maro samy hafa firenena koa niara-niakatra taminy, ary ondry aman''osy sy omby, dia fananana be indrindra.'
mg1865::mg_2::12::39:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanendy mofo tsy nisy masirasira tamin''ny koba voalena izay nentiny avy tany Egypta izy: fa tsy mbola voaisy masirasira izany, satria noroahina tany Egypta izy ka tsy nahazo nijanona sady tsy nahafehy vatsy ho azy.'
mg1865::mg_2::12::40:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nitoeran''ny Zanak''Isiraely tany Egypta dia telo-polo amby efa-jato taona.'
mg1865::mg_2::12::41:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny telo-polo amby efa-jato taona, dia tamin''izany andro izany indrindra no nivoahan''ny antokony rehetra izay an''i Jehovah tamin''ny tany Egypta.'
mg1865::mg_2::12::42:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alina notandreman''i Jehovah izany, hitondrany azy hivoaka avy tamin''ny tany Egypta; eny, izany alina izany dia an''i Jehovah ka hotandreman''ny Zanak''Isiraely rehetra hatramin''ny taranany fara mandimby.'
mg1865::mg_2::12::43:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy sy Arona: Izao no lalàn''ny Paska: Tsy hisy olona hafa firenena hihinana azy.'
mg1865::mg_2::12::44:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andevolahin''ny olona rehetra izay novidim-bola dia hoforana aloha vao mba hihinana.'
mg1865::mg_2::12::45:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahiny sy ny mpikarama tsy mba hihinana azy.'
mg1865::mg_2::12::46:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao an-trano iray no hihinanana azy; tsy hamoahanao eny ala-trano akory ny hena, ary tsy hisy hotapahinareo ny taolany na dia iray aza.'
mg1865::mg_2::12::47:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiangonana, dia ny Isiraely rehetra, hitandrina izany.'
mg1865::mg_2::12::48:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mivahiny eo aminao ka mba te-hitandrina ny Paskan''i Jehovah, dia aoka hoforana ny lehilahy rehetra eo aminy vao manatona hitandrina izany, ka ho tahaka ny tompon-tany ihany izy; fa ny tsy voafora rehetra kosa dia tsy mahazo mihinana izany.'
mg1865::mg_2::12::49:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lalàna iray no ho amin''ny tompon-tany sy ny vahiny izay mitoetra eo aminareo.'
mg1865::mg_2::12::50:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''ny Zanak''Isiraely rehetra izany: araka izay nandidian''i Jehovah an''i Mosesy sy Arona no nataony.'
mg1865::mg_2::12::51:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 12
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany indrindra no nitondran''i Jehovah ny Zanak''Isiraely nivoaka avy tany amin''ny tany Egypta araka ny antokony.'
mg1865::mg_2::13::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanokanana ny lahimatoa ho an''i Jehovah'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::13::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamasino ho Ahy ny lahimatoa rehetra, dia izay voalohan-teraka rehetra eo amin''ny Zanak''Isiraely, na olona na biby fiompy: Ahy ireny.'
mg1865::mg_2::13::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''ny olona: Tsarovy izao andro izao, izay nivoahanareo avy tany Egypta, tamin''ny trano nahandevozana, fa tamin''ny tanana mahery no nitondran''i Jehovah anareo nivoaka avy tany; koa aza misy mihinana izay misy masirasira.'
mg1865::mg_2::13::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao andro amin''ny volana Abiba izao no ivoahanareo'
mg1865::mg_2::13::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitondra anao Jehovah ho any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Hivita ary ny Jebosita, izay nianianany tamin''ny razanao homena anao, dia tany tondra-dronono sy tantely, dia hanao izany fanompoana izany ianao amin''izao volana izao.'
mg1865::mg_2::13::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no hihinananao mofo tsy misy masirasira, ary amin''ny andro fahafito dia hisy andro firavoravoana ho an''i Jehovah.'
mg1865::mg_2::13::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mofo tsy misy masirasira hohanina mandritra ny hafitoana; ary tsy hisy eo aminao izay mofo misy masirasira, ary tsy hisy izay masirasira akory ao aminao eny amin''ny taninao rehetra.'
mg1865::mg_2::13::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hambaranao amin''ny zanakao amin''izany andro izany hoe: Noho ny nataon''i Jehovah tamiko tamin''ny nivoahako avy tany Egypta no anaovako izao.'
mg1865::mg_2::13::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho famantarana ho anao eo amin''ny tananao ary ho fampahatsiarovana eo ambonin''ny handrinao izany, mba ho ao am-bavanao ny lalàn''i Jehovah: fa tanana mahery no nitondran''i Jehovah anao nivoaka avy tany Egypta.'
mg1865::mg_2::13::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tandremo amin''ny fotoany isan-taona izao lalàna izao.'
mg1865::mg_2::13::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitondra anao Jehovah ho any amin''ny tanin''ny Kananita araka izay nianianany taminao sy ny razanao, ka homeny anao izany,'
mg1865::mg_2::13::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hatokanao ho an''i Jehovah izay voalohan-teraka rehetra: ny voalohan-teraky ny biby fiompy rehetra izay anananao, dia ho an''i Jehovah ny lahy rehetra;'
mg1865::mg_2::13::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny voalohan-teraky ny boriky dia hosoloanao zanak''ondry; fa raha tsy hanolo azy ianao, dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin''ny olona eo amin''ny zanakao dia havotanao.'
mg1865::mg_2::13::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hanontany anao ny zanakao amin''ny andro ho avy ka hanao hoe: Inona no anton''izao? dia holazainao aminy hoe: Tanana mahery no nitondran''i Jehovah antsika nivoaka avy tany Egypta, tamin''ny trano nahandevozana;'
mg1865::mg_2::13::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nanamafy ny fony ka tsy nandefa antsika Farao, dia novonoin''i Jehovah ny lahimatoa rehetra tany amin''ny tany Egypta, hatramin''ny lahimatoan''ny olona ka hatramin''ny voalohan-teraky ny biby; koa izany no anaterako ho an''i Jehovah ny lahy voalohan-teraka rehetra, fa ny lahimatoa rehetra amin''ny zanako dia soloako.'
mg1865::mg_2::13::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho famantarana eo amin''ny tananao sy ho fehy eo ambonin''ny handrinao izany; fa tanana mahery no nitondran''i Jehovah antsika nivoaka avy tany Egypta.'
mg1865::mg_2::13::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny lalana nitondran''Andriamanitra ny Zanak''Isiraely, sy ny namakiany ny Ranomasina Mena'
  verse_text: 'Ary rehefa nalefan''i Farao ny olona, dia tsy mba nentin''Andriamanitra tamin''ny lalana nankany amin''ny tanin''ny Filistina izy, na dia akaiky aza izany; fa hoy Andriamanitra: Andrao hanenina ny olona, raha mahita ady, ka hiverina any Egypta.'
mg1865::mg_2::13::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nentin''Andriamanitra nivily ho amin''ny lalana mahazo any an''efitra amoron''ny Ranomasina Mena ny olona; ary voaomana hiady ny fiakatry ny Zanak''Isiraely avy tany amin''ny tany Egypta.'
mg1865::mg_2::13::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentin''i Mosesy niaraka taminy ny taolan''i Josefa, satria Josefa efa nampianiana dia nampianiana ny Zanak''Isiraely ka nanao hoe: Hamangy anareo tokoa Andriamanitra, dia hitondra ny taolako hiala aty miaraka aminareo ianareo.'
mg1865::mg_2::13::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifindra niala tao Sokota izy ka nitoby tao Etama teo an-tsisin''ny efitra.'
mg1865::mg_2::13::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandeha teo alohany tamin''ny andri-rahona raha antoandro hitari-dalana azy, ary tamin''ny andri-afo nony alina ho fahazavana ho azy, handehanany andro aman''alina.'
mg1865::mg_2::13::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny andri-rahona tsy niala teo alohan''ny olona raha antoandro, na ny andri-afo nony alina.'
mg1865::mg_2::14::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::14::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny Zanak''Isiraely mba hivily izy ka hitoby eo akaikin''i Pi-hahirota, eo anelanelan''i Migdola sy ny ranomasina; eo akaikin''i Bala-zefona, dia tandrifiny, no hitobianareo, eo amoron''ny ranomasina.'
mg1865::mg_2::14::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Farao hilaza ny Zanak''Isiraely hoe: Azon''ny tamberintany izy ka voahidin''ny efitra.'
mg1865::mg_2::14::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanamafy ny fon''i Farao Aho, ka hanenjika anareo izy; dia hankalazaina Aho noho ny hataoko amin''i Farao sy amin''ny miaramilany rehetra, ka ho fantatry ny Egyptiana fa Izaho no Jehovah. Dia nataon''ny Zanak''Isiraely izany.'
mg1865::mg_2::14::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanambara tamin''ny mpanjakan''i Egypta fa efa nandositra ny olona, dia niova ny fon''i Farao sy ny mpanompony ny amin''ny olona, ka hoy izy: Inona izao nataontsika izao, no nandefa ny Isiraely hiala tamin''ny fanompoany antsika isika?'
mg1865::mg_2::14::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasainy nofehezina tamin''ny kalesy ny soavaly, sady nitondra ny vahoakany hanaraka azy izy.'
mg1865::mg_2::14::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra kalesy enin-jato voafantina sy ny kalesin''ny Egyptiana rehetra izy, izay samy nisy mpiady avy izy rehetra.'
mg1865::mg_2::14::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanamafy ny fon''i Farao, mpanjakan''i Egypta, dia nanenjika ny Zanak''Isiraely izy, na dia tamin''ny tanana avo aza no nivoahany.'
mg1865::mg_2::14::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nanenjika azy ny Egyptiana, dia ny soavaly rehetra mitarika ny kalesin''i Farao sy ny soavaliny fitaingina ary ny miaramilany, ka nahatratra azy nitoby teo amoron''ny ranomasina, teo anilan''i Pi-hahirota, tandrifin''i Balazefona.'
mg1865::mg_2::14::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mby akaiky Farao, dia natopin''ny Zanak''Isiraely ny masony, ka, indreo, ny Egyptiana tamy manenjika azy; dia raiki-tahotra indrindra ny Zanak''Isiraely ka nitaraina tamin''i Jehovah.'
mg1865::mg_2::14::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy tamin''i Mosesy: Moa tsy nisy fasana va tany Egypta, no nentinao ho faty aty an''efitra izahay? Nahoana no nanao izany taminay ianao ka nitondra anay nivoaka avy tany Egypta?'
mg1865::mg_2::14::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izao va no teny nolazainay taminao fony tany Egypta hoe: Aoka izay fa avelao ihany izahay hanompo ny Egyptiana? Fa aleonay manompo ny Egyptiana toy izay ho faty any an''efitra.'
mg1865::mg_2::14::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''ny olona: Aza matahotra ianareo, mijanona, fa ho hitanareo ny famonjen''i Jehovah, izay hataony ho anareo anio; fa ny Egyptiana, izay hitanareo anio, dia tsy ho hitanareo intsony mandrakizay.'
mg1865::mg_2::14::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hiady ho anareo, fa ianareo kosa hangina.'
mg1865::mg_2::14::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Nahoana no mitaraina amiko ianao? lazao amin''ny Zanak''Isiraely mba handroso.'
mg1865::mg_2::14::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aingao ny tehinao, dia ahinjiro ambonin''ny ranomasina ny tananao, ka saraho ny rano, dia handeha hamaky eo afovoan''ny ranomasina mandia ny tany maina ny Zanak''Isiraely.'
mg1865::mg_2::14::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Izaho hanamafy ny fon''ny Egyptiana, ka hiditra hanenjika azy izy; dia hankalazaina Aho noho ny hataoko amin''i Farao sy amin''ny miaramilany rehetra mbamin''ny kalesiny sy ny mpitaingin-tsoavaliny,'
mg1865::mg_2::14::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho fantatry ny Egyptiana fa Izaho no Jehovah, rehefa ankalazaina Aho noho ny ataoko amin''i Farao sy ny kalesiny sy ny mpitaingin-tsoavaliny.'
mg1865::mg_2::14::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ilay Anjelin''Andriamanitra, Izay nandeha teo alohan''ny tobin''ny Isiraely, dia nifindra ka nankeo aoriany; ary ny andri-rahona nifindra niala teo alohany dia nijanona teo aoriany'
mg1865::mg_2::14::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tonga teo anelanelan''ny tobin''ny Egyptiana sy ny tobin''ny Isiraely: dia teo ihany ny rahona sy ny fahamaizinana, nefa nampahazava ny alina kosa, ka dia tsy nifanatona izy roa tonta mandritra ny alina.'
mg1865::mg_2::14::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahinjitr''i Mosesy teo ambonin''ny ranomasina ny tanany; ary rivotra mahery avy atsinanana no nampisavan''i Jehovah ny ranomasina mandritra iny alina iny, ka nataony tany maina ny ranomasina, ary dia voasaraka ny rano.'
mg1865::mg_2::14::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha teo afovoan''ny ranomasina nandia ny tany maina ny Zanak''Isiraely; ary ny rano dia tonga fefy ho azy teo amin''ny ankavanany sy teo amin''ny ankaviany.'
mg1865::mg_2::14::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanenjika azy ny Egyptiana ka niditra nanaraka azy teo afovoan''ny ranomasina, dia ny soavalin''i Farao rehetra sy ny kalesiny ary ny mpitaingin-tsoavaliny.'
mg1865::mg_2::14::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fiambenana maraina dia nijery ny tobin''ny Egyptiana tao amin''ny andri-afo sy ny rahona Jehovah ka nampifanaritaka ny tobin''ny Egyptiana.'
mg1865::mg_2::14::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanala ny kodian''ny kalesiny Izy ka nampahasarotra ny nandehanany, dia hoy ny Egyptiana: Aoka handositra ny tavan''ny Isiraely isika, fa Jehovah no miady amin''ny Egyptiana ho an''ireo.'
mg1865::mg_2::14::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: '2022-06-01T06:35:45+0000'
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro eo ambonin''ny ranomasina ny tananao, mba hikatonan''ny rano amin''ny Egyptiana mbamin''ny kalesiny sy ny mpitaingin-tsoavaliny.'
mg1865::mg_2::14::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahinjitr''i Mosesy teo ambonin''ny ranomasina ny tanany, ka nikatona ho tahaka ny teo ny ranomasina, rehefa nadiva ho maraina ny andro; ary ny Egyptiana nandositra, kanjo nitsena ny rano ihany izy, dia narian''i Jehovah teo afovoan''ny ranomasina ny Egyptiana.'
mg1865::mg_2::14::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nikatona ny rano ka nanarona ny kalesy sy ny mpitaingin-tsoavaly, dia ny miaramilan''i Farao rehetra izay niditra teo amin''ny ranomasina nanenjika ny Zanak''Isiraely; koa tsy nisy niangana na dia iray akory aza.'
mg1865::mg_2::14::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''Isiraely kosa nandeha tamin''ny tany maina teo afovoan''ny ranomasina; ary ny rano dia tonga fefy ho azy teo amin''ny ankavanany sy teo amin''ny ankaviany.'
mg1865::mg_2::14::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no namonjen''i Jehovah ny Isiraely tamin''izany andro izany mba tsy ho azon''ny Egyptiana; ary hitan''ny Isiraely teny amoron''ny ranomasina ny fatin''ny Egyptiana.'
mg1865::mg_2::14::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny Isiraely ny asa lehibe izay nataon''ny tanan''i Jehovah tamin''ny Egyptiana, dia natahotra an''i Jehovah ny olona ka nino an''i Jehovah sy Mosesy mpanompony.'
mg1865::mg_2::15::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fihirana nataon''i Mosesy sy ny Zanak''Isiraely, rehefa tafita ny Ranomasina Mena izy'
  verse_text: 'Ary Mosesy sy ny Zanak''Isiraely dia nihira izao fihirana izao ho an''i Jehovah ka nanao hoe: Hihira ho an''i Jehovah aho, fa avo indrindra Izy; ny soavaly sy ny mpitaingina azy efa nariany ao amin''ny ranomasina.'
mg1865::mg_2::15::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no heriko sy fiderako, fa efa famonjena ahy Izy; izao no Andriamanitro, ka hankalaza Azy aho, dia Andriamanitry ny razako, ka hanandratra Azy aho.'
mg1865::mg_2::15::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah dia mpiady mahery, Jehovah no anarany.'
mg1865::mg_2::15::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kalesin''i Farao sy ny miaramilany natsipiny ao amin''ny ranomasina; ary ny kapiteny voafantina nasitrika ao amin''ny Ranomasina Mena.'
mg1865::mg_2::15::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalina nanarona azy: Nilentika tany ambany indrindra tahaka ny vato izy.'
mg1865::mg_2::15::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tananao ankavanana, Jehovah o, efa malaza amin''ny hery; ny tananao ankavanana, Jehovah o, manorotoro ny fahavalo.'
mg1865::mg_2::15::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny halehiben''ny voninahitrao no andringananao izay nitsangana hanohitra Anao; alefanao ny fahatezeranao mirehitra, izay mandevona azy toy ny mololo.'
mg1865::mg_2::15::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fofonain''ny vavoronao no nanangonanao ny rano; nivongovongo toy ny antontan-javatra ny rano maria; nandry teo afovoan''ny ranomasina ny lalina.'
mg1865::mg_2::15::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny fahavalo: Hanenjika aho, hahatratra aho, hizara babo aho ka hanao izay sitraky ny foko aminy, hotsoahako ny sabatra, ka hamongotra azy ny tanako.'
mg1865::mg_2::15::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fofonainao no nitsofanao, dia nanarona azy ny ranomasina: nilentika tahaka ny firaka ao amin''ny rano mahery izy.'
mg1865::mg_2::15::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, iza moa no tahaka Anao amin''izay andriamanitra? Iza moa no tahaka Anao, Izay ankalazaina amin''ny fahamasinana, deraina amin''ny fahatahorana, Mpanao fahagagana?'
mg1865::mg_2::15::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahinjitrao ny tananao ankavanana, dia nitelina ireo ny tany.'
mg1865::mg_2::15::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tarihinao amin''ny famindram-ponao ny firenena izay navotanao, ka entinao amin''ny herinao ho any amin''ny fonenanao masina izy.'
mg1865::mg_2::15::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandre ny firenena ka raiki-tahotra; Hovitra no mahazo ny mponina any Filistia;'
mg1865::mg_2::15::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toran-kovitra ny loham-pirenen''i Edoma; azon-korohoro ny lehilahy maherin''i Moaba; reraka ny fon''izay rehetra monina any Kanana.'
mg1865::mg_2::15::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahazo azy ny tahotra sy ny hovitra; Noho ny halehiben''ny sandrinao dia mangina tahaka ny vato izy. mandra-pandalon''ny olonao, Jehovah o, mandra-pandalon''ny olona izay navotanao.'
mg1865::mg_2::15::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampiditra azy Ianao ka hamponina azy ao amin''ny tendrombohitra lovanao, ao amin''ny fitoerana nataonao hitoeranao, Jehovah o, dia ao amin''ny fitoerana masina naorin''ny tananao, Tompo o.'
mg1865::mg_2::15::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hanjaka mandrakizay doria.'
mg1865::mg_2::15::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niditra teo amin''ny ranomasina ny soavalin''i Farao sy ny kalesiny ary ny mpitaingin-tsoavaliny, ary Jehovah nampikatona ny ranomasina taminy; fa ny Zanak''Isiraely kosa nandeha tamin''ny tany maina teo afovoan''ny ranomasina.'
mg1865::mg_2::15::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Miriama mpaminanivavy, anabavin''i Arona, dia nitondra ny ampongatapaka teny an-tanany; ary nivoaka nanaraka azy ny vehivavy rehetra nitondra ampongatapaka sady nandihy.'
mg1865::mg_2::15::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Miriama namaly ireo lehilahy ireo ka nihira hoe: Mihirà ho an''i Jehovah, fa avo indrindra Izy; ny soavaly sy ny mpitaingina azy nariany ao amin''ny ranomasina.'
mg1865::mg_2::15::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nandehanan''ny Zanak''Isiraely tany amin''ny efitra Sara, sy ny nitobiany tao Mara'
  verse_text: 'Ary Mosesy nitondra ny Isiraely nifindra avy teo amoron''ny Ranomasina Mena, dia nandroso ho any amin''ny efitra Sora izy; ary nandeha hateloana tany an''efitra izy fa tsy nahita rano.'
mg1865::mg_2::15::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tao Mara izy, fa tsy nahasotro ny rano tao Mara, satria nangidy izany; koa izany no nanaovany ny anarany hoe Mara'
mg1865::mg_2::15::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nimonomonona tamin''i Mosesy ny olona ka nanao hoe: Inona no hosotroinay?'
mg1865::mg_2::15::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: '2022-06-02T08:30:15+0000'
  verse_title: null
  verse_text: 'Ary dia nitaraina tamin''i Jehovah izy, ka dia nanehoan''i Jehovah hazo anankiray, ary rehefa natsipiny tao anatin''ny rano izany, dia tonga mamy ny rano. Tao no nanomezan''i Jehovah lalàna sy fitsipika ho azy, ary tao no nizahany toetra azy,'
mg1865::mg_2::15::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy Izy: Raha hazoto hihaino ny feon''i Jehovah Andriamanitrao ianao ka hanao izay mahitsy eo imasony sy hihaino ny lalàny ary hitandrina ny didiny rehetra, dia tsy hisy hataoko aminao ireny aretina rehetra ireny, izay nataoko tamin''ny Egyptiana; fa Izaho no Jehovah Izay mahasitrana anao.'
mg1865::mg_2::15::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny nahatongavan''ny Zanak''Isiraely tao Elima, sy ny nimonomononany tany an''efitr''i Sinay noho ny tsy fisian-kanina, ary ny nanomezan''Andriamanitra azy mana sy papelika hohaniny.'
  verse_text: 'Ary tonga tao Elima izy; ary tao nisy loharano roa ambin''ny folo sy hazo rofia fito-polo, dia nitoby teo anilan''ny rano izy.'
mg1865::mg_2::16::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahadimy ambin''ny folo tamin''ny volana faharoa taorian''ny nialany tany amin''ny tany Egypta dia nifindra niala tao Elima ny fiangonana, dia ny Zanak''Isiraely rehetra, ka nankany amin''ny efitra Sina, izay eo anelanelan''i Elima sy Sinay.'
mg1865::mg_2::16::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nimonomonona tamin''i Mosesy sy Arona tany an''efitra ny fiangonana, dia ny Zanak''Isiraely rehetra,'
mg1865::mg_2::16::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Inay anie izahay mba matin''ny tanan''i Jehovah tany amin''ny tany Egypta, raha nipetraka teo anilan''ny fahandroan-kena ka nihinan-kanina ho voky; fa nitondra anay nivoaka ho aty an''efitra ianareo hahafaty mosary izao fiangonana rehetra izao.'
mg1865::mg_2::16::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Indro, Izaho handatsaka mofo avy any an-danitra ho anareo; dia hivoaka ny olona ka hanangona izay sahaza hohaniny isan''andro, hizahako toetra azy, na handeha manaraka ny lalako izy, na tsia.'
mg1865::mg_2::16::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mby amin''ny andro fahenina dia hamboariny izay azony; ary hisy indroa toraka izay angoniny isan''andro.'
mg1865::mg_2::16::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy sy Arona tamin''ny Zanak''Isiraely rehetra: Anio hariva dia ho fantatrareo fa Jehovah no nitondra anareo nivoaka avy tany amin''ny tany Egypta;'
mg1865::mg_2::16::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rahampitso maraina dia ho hitanareo ny voninahitr''i Jehovah, fa efa reny ny fimonomononanareo tamin''i Jehovah; fa izahay moa no inona, no imonomononanareo?'
mg1865::mg_2::16::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Mosesy; Ho hitanareo izany, raha homen''i Jehovah hena hohanina ianareo anio hariva, ary mofo hahavoky rahampitso maraina; fa efa ren''i Jehovah ny fimonomononanareo, izay nimonomononanareo taminy; fa izahay moa no inona? Tsy izahay no imonomononanareo, fa Jehovah.'
mg1865::mg_2::16::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Arona: Lazao amin''ny fiangonana, dia ny Zanak''Isiraely rehetra, hoe: Manatona eo anatrehan''i Jehovah; fa efa reny ny fimonomononanareo.'
mg1865::mg_2::16::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Arona mbola niteny tamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, dia nijery nanatrika ny efitra izy ireo, ka, indro, ny voninahitr''i Jehovah niseho teo amin''ny rahona.'
mg1865::mg_2::16::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::16::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa reko ny fimonomononan''ny Zanak''Isiraely, koa mitenena aminy hoe: Anio hariva dia hihinan-kena ianareo, ary rahampitso maraina kosa dia ho voky mofo ianareo, ka dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.'
mg1865::mg_2::16::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hariva dia niakatra ny papelika, ka rakotra azy ny toby; ary nony maraina dia nisy ando manodidina ny toby;'
mg1865::mg_2::16::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony niala ny ando, dia, indro, nisy zava-madinika boribory teny amin''ny efitra, madinika toy ny fanala amin''ny tany.'
mg1865::mg_2::16::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny Zanak''Isiraely izany, dia nifanontany hoe izy: Inona itony? satria tsy fantany ireny. Dia hoy Mosesy taminy: Itony no mofo izay nomen''i Jehovah ho fihinanareo.'
mg1865::mg_2::16::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no teny izay nandidian''i Jehovah: Samia manangona azy ianareo araka izay tokony ho laninareo avy, dia eran''ny vata omera avy ho amin''ny isan-olona, araka ny isanareo; samia mitondra ianareo rehetra ho an''izay ao an-dainy avy.'
mg1865::mg_2::16::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao izany ny Zanak''Isiraely, ka samy nanangona: ny sasany nanangona be, ary ny sasany kosa kely.'
mg1865::mg_2::16::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nafatrany tamin''ny vata omera izany, dia tsy nanana amby ny nanangona be, ary ny nanangona kely tsy nanana ny tsy ampy; samy nanangona araka izay fihinany avy izy.'
mg1865::mg_2::16::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy taminy: Aza misy mamela sisa ho tra-maraina.'
mg1865::mg_2::16::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy mba nanaraka ny tenin''i Mosesy izy, fa namela sisa ho tra-maraina ihany ny olona sasany, dia niteraka olitra izany ka maimbo; ary dia tezitra tamin''ny olona Mosesy.'
mg1865::mg_2::16::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanangona ny mana isa-maraina ny olona, dia samy araka izay fihinany avy; ary nony nafana ny andro, dia levona ireny.'
mg1865::mg_2::16::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny andro fahenina dia nanangona avy sasaka noho ny isan''andro ny olona, dia indroan''ny vata omera ho an''ny isan-olona avy; dia avy ny lohan''ny fiangonana ka nanambara tamin''i Mosesy.'
mg1865::mg_2::16::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy taminy: Izao no lazain''i Jehovah: Rahampitso dia tena andro fitsaharana masina ho an''i Jehovah; koa manendasa izay hendasinareo, ary mahandroa izay handrahoinareo, ary izay sisa rehetra dia avelao ho anareo, hotehirizina ho tra-maraina.'
mg1865::mg_2::16::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namela izany ho tra-maraina izy, araka izay nandidian''i Mosesy; ary tsy mba maimbo na niteraka olitra izany.'
mg1865::mg_2::16::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Hano ireny anio, fa Sabata ho an''i Jehovah anio, ka anio no tsy hahitanareo azy any an-tsaha.'
mg1865::mg_2::16::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hanangonanareo azy; fa Sabata ny andro fahafito, ka dia tsy hisy amin''izany.'
mg1865::mg_2::16::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny andro fahafito dia nisy olona nivoaka hanangona, fa tsy nahita na dia kely akory aza.'
mg1865::mg_2::16::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mandra-pahoviana no handavanareo tsy hitandrina ny didiko sy ny lalàko?'
mg1865::mg_2::16::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saino fa Jehovah no nanome anareo ny Sabata, koa izany no anomezany anareo mofo ampy ho indroa andro amin''ny andro fahenina; samia mitoetra eo amin''ny fitoerany avy ianareo, ka aoka tsy hisy hiala amin''ny fitoerany amin''ny andro fahafito.'
mg1865::mg_2::16::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsahatra ny olona tamin''ny andro fahafito.'
mg1865::mg_2::16::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anarany dia nataon''ny taranak''Isiraely hoe Mana; ary tahaka ny voan-drafy izy sady fotsy; ary ny fanandramana azy dia tahaka ny mofo misy tantely.'
mg1865::mg_2::16::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Izao no teny izay nandidian''i Jehovah: Analao eran''ny vata omera izy hotehirizina hatramin''ny taranakareo fara mandimby, mba ho hitany ny mofo izay nampihinaniko anareo tany an''efitra, raha nitondra anareo nivoaka avy tany amin''ny tany Egypta Aho.'
mg1865::mg_2::16::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Arona: Makà vilany, ka asio mana eran''ny vata omera eo anatiny, dia apetraho eo anatrehan''i Jehovah mba hotehirizina hatramin''ny taranakareo fara mandimby.'
mg1865::mg_2::16::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izay nandidian''i Jehovah an''i Mosesy no nametrahan''i Arona izany teo anatrehan''ny Vavolombelona mba hotehirizina.'
mg1865::mg_2::16::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nihinana mana mandritra ny efa-polo taona mandra-pahatongany tany amin''izay tany misy monina: eny, mana no nohaniny mandra-pahatongany tany amin''ny sisin''ny tany Kanana.'
mg1865::mg_2::16::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 16
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny omera dia ampahalofon''ny vata efaha.'
mg1865::mg_2::17::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nimonomononan''ny Zanak''Isiraely noho ny tsy fisian-drano, sy ny nanomezan''Andriamanitra azy rano avy tamin''ny vatolampy'
  verse_text: 'Ary nifindra ny fiangonana, dia ny Zanak''Isiraely rehetra, ka niala tao an''efitra Sina, araka izay natoron''i Jehovah hitobiany, dia nitoby tao Refidima; ary tsy nisy rano hosotroin''ny olona.'
mg1865::mg_2::17::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nila ady tamin''i Mosesy ny olona ka nanao hoe: Omeo rano izahay mba hosotroinay. Fa hoy Mosesy taminy: Nahoana no mila ady amiko ianareo? Nahoana no maka fanahy an''i Jehovah ianareo?'
mg1865::mg_2::17::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangetaheta teo ny olona, dia nimonomonona tamin''i Mosesy izy ka nanao hoe: Nahoana ianao no nitondra anay niakatra niala tany Egypta hahafatin-ketaheta anay sy ny zanakay ary ny bibinay?'
mg1865::mg_2::17::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nitaraina tamin''i Jehovah ka nanao hoe: Ahoana no hataoko amin''ireto olona ireto? fa mila hitora-bato ahy izy.'
mg1865::mg_2::17::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mandrosoa eo alohan''ny olona, ary itondray hiaraka aminao ny loholon''ny Isiraely; ary ny tehinao, ilay nikapohanao an''i Neily, dia ento eny an-tananao, ka mandehana.'
mg1865::mg_2::17::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, hijanona eo anatrehanao eo ambonin''ny harambato any Horeba Aho, dia hikapoka ny harambato ianao, ka hisy rano hivoaka avy aminy hosotroin''ny olona. Dia nanao izany Mosesy teo imason''ny loholon''ny Isiraely.'
mg1865::mg_2::17::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''izany tany izany dia nataony hoe Masa sy Meriba, noho ny ady nataon''ny Zanak''Isiraely, sy noho ny nakany fanahy an''i Jehovah hoe: Eto aminay va Jehovah, sa tsia?'
mg1865::mg_2::17::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga ny Amalekita ka niady tamin''ny Isiraely tao Refidima.'
mg1865::mg_2::17::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''i Josoa: Mifidiana lehilahy ho antsika, dia mandehana ka miadia amin''ny Amalekita; rahampitso dia hijoro eo an-tampon''ny havoana aho ka hitana ny tehin''Andriamanitra ety an-tanako.'
mg1865::mg_2::17::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josoa dia nanao araka izay efa nolazain''i Mosesy taminy, ka niady tamin''ny Amalekita izy; ary Mosesy sy Arona sy Hora kosa niakatra ho ao an-tampon''ny havoana.'
mg1865::mg_2::17::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nasandratr''i Mosesy ny tanany, dia nahery ny Isiraely; fa raha nampidininy ny tanany, dia nahery kosa ny Amalekita.'
mg1865::mg_2::17::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa vizana ny tanan''i Mosesy; ka dia naka vato izy roa lahy, ka nataony teo ambanin''i Mosesy hipetrahany; ary Arona sy Hora dia nanohana ny tanany, ka ny iray tamin''ny anila, ary ny iray kosa tamin''ny anila; dia naharitra tsy nidina intsony ny tanany mandra-pahafatin''ny masoandro.'
mg1865::mg_2::17::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josoa dia nandresy ny Amalekita sy ny olony tamin''ny lelan-tsabatra.'
mg1865::mg_2::17::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Soraty eo amin''ny boky izany ho fahatsiarovana, ka ambarao amin''i Josoa; fa hofoanako tokoa ny fahatsiarovana ny Amalekita tsy ho eny ambanin''ny lanitra.'
mg1865::mg_2::17::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanorina alitara Mosesy ka nanao ny anarany hoe: Jehovah Nisi.'
mg1865::mg_2::17::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Jehovah nianiana hoe: Ny adin''i Jehovah amin''ny Amalekita dia tsy hitsahatra hatramin''izay taranany fara mandimby.'
mg1865::mg_2::18::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namangian''i Jetro an''i Mosesy, sy ny hevitra natorony azy'
  verse_text: 'Ary efa ren''i Jetro, mpisorona tao Midiana, rafozan''i Mosesy, izay rehetra nataon''Andriamanitra ho an''i Mosesy sy ny Isiraely olony, dia ny nitondran''i Jehovah ny Isiraely nivoaka avy tany Egypta.'
mg1865::mg_2::18::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentin''i Jetro, rafozan''i Mosesy, Zipora, vadin''i Mosesy, rehefa nampivereniny izy,'
mg1865::mg_2::18::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zanany mirahalahy: Gersoma no anaran''ny anankiray, fa hoy izy: Efa vahiny aty amin''ny tanin''ny firenena hafa aho;'
mg1865::mg_2::18::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Eliezera kosa no anaran''ny anankiray, fa hoy izy: Andriamanitry ny razako no namonjy ahy ka nahafaka ahy tsy ho voan''ny sabatr''i Farao.'
mg1865::mg_2::18::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga Jetro, rafozan''i Mosesy, nitondra ny vady aman-janak''i Mosesy hankany aminy tany an''efitra, izay nitobiany teo anilan''ny tendrombohitr''Andriamanitra:'
mg1865::mg_2::18::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nampilaza tamin''i Mosesy izy ka nanao hoe: Izaho Jetro rafozanao avy hamangy anao, ary ny vadinao mbamin''ny zanany roa lahy koa.'
mg1865::mg_2::18::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nivoaka hitsena ny rafozany, dia niankohoka sady nanoroka azy; ary nifampiarahaba izy mianaka, dia niditra tao an-day.'
mg1865::mg_2::18::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambaran''i Mosesy tamin''ny rafozany izay rehetra efa nataon''i Jehovah tamin''i Farao sy tamin''ny Egyptiana noho ny amin''ny Isiraely, mbamin''ny fahoriana rehetra nanjo azy teny an-dàlana, sy ny namonjen''i Jehovah azy.'
mg1865::mg_2::18::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia faly Jetro noho ny soa rehetra izay efa nataon''i Jehovah tamin''ny Isiraely, izay novonjeny ho afaka tamin''ny tanan''ny Egyptiana.'
mg1865::mg_2::18::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jetro: Isaorana anie Jehovah, Izay namonjy anareo ho afaka tamin''ny tanan''ny Egyptiana sy tamin''ny tanan''i Farao, dia Izay namonjy ny olona tsy hotapahin''ny Egyptiana.'
mg1865::mg_2::18::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia fantatro fa lehibe Jehovah mihoatra noho ny andriamanitra rehetra, dia tamin''izay zavatra nentin''ny Egyptiana nirehareha tamin''ireny.'
mg1865::mg_2::18::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jetro, rafozan''i Mosesy, nitondra fanatitra dorana sy fanatitra hafa alatsa-drà ho an''Andriamanitra; dia nankao Arona sy ny loholon''ny Isiraely rehetra hiara-mihinan-kanina amin''ny rafozan''i Mosesy teo anatrehan''Andriamanitra.'
mg1865::mg_2::18::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina dia nipetraka hitsara ny olona Mosesy; ka dia nijanona teo anatrehan''i Mosesy ny olona hatramin''ny maraina ka hatramin''ny hariva.'
mg1865::mg_2::18::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny rafozan''i Mosesy izay rehetra nataony tamin''ny olona, dia hoy izy: Inona izao zavatra ataonao amin''ny olona izao? Nahoana no ianao irery ihany no mipetraka, fa ny olona rehetra kosa mitsangana eo anatrehanao hatramin''ny maraina ka hatramin''ny hariva?'
mg1865::mg_2::18::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''ny rafozany: Satria mankaty amiko ny olona hanontany amin''Andriamanitra.'
mg1865::mg_2::18::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manana ady izy, dia mankaty amiko, ka mitsara azy roa tonta aho, dia mampahalala azy ny didin''Andriamanitra sy ny lalàny.'
mg1865::mg_2::18::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny rafozan''i Mosesy taminy; Tsy tsara izao zavatra ataonao izao.'
mg1865::mg_2::18::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy ho reraka mihitsy, na ianao na izao olona miaraka aminao izao; fa mavesatra aminao loatra izao zavatra izao, ka tsy ho zakanao irery ny hanao izao.'
mg1865::mg_2::18::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, dia maneke ny teniko, fa hanoro hevitra anao aho, ka Andriamanitra anie homba anao: Aoka ianao ho alalan''ny olona amin''Andriamanitra mba hitondranao ny teniny amin''Andriamanitra;'
mg1865::mg_2::18::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hampianatra azy ny didy sy ny lalàna izay mety halehany sy ny asa izay mety hataony.'
mg1865::mg_2::18::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mizaha eo amin''ny olona rehetra izay lehilahy mahay sy matahotra an''Andriamanitra, dia lehilahy marina izay tsy tia kolikoly; ka manendre mpifehy arivo sy mpifehy zato sy mpifehy dimam-polo ary mpifehy folo hifehy azy.'
mg1865::mg_2::18::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ireo no hitsara ny olona mandrakariva, ka ny ady lehibe rehetra no aoka ho entiny aminao, fa ny ady madinidinika rehetra kosa dia aoka hotsarainy ihany; dia ho maivamaivana kokoa aminao izany, ka dia hiara-mitondra aminao ireo.'
mg1865::mg_2::18::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hanao araka izany zavatra izany ianao, ka hilaza izay didy aminao Andriamanitra, dia haharitra ianao, ary izao olona rehetra izao koa dia ho tonga soa aman-tsara any amin''ny taniny.'
mg1865::mg_2::18::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia neken''i Mosesy ny tenin''ny rafozany, ka nataony avokoa izay rehetra efa nolazainy.'
mg1865::mg_2::18::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nofidin''i Mosesy izay lehilahy mahay tamin''ny Isiraely rehetra ka nataony lohan''ny olona hanapaka azy, dia ho mpifehy arivo sy ho mpifehy zato sy ho mpifehy dimam-polo ary ho mpifehy folo.'
mg1865::mg_2::18::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsara ny olona mandrakariva ireo; koa ny ady sarotra ihany no nentiny tao amin''i Mosesy, fa ny ady madinika rehetra kosa dia notsarainy ihany.'
mg1865::mg_2::18::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy namoaka ny rafozany; ka dia lasa nody any amin''ny taniny izy.'
mg1865::mg_2::19::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitobian''ny Zanak''Isiraely teo an''efitr''i Sinay, sy ny fanekena nataon''Andriamanitra taminy'
  verse_text: 'TAMIN''ny volana fahatelo taorian''ny nialan''ny Zanak''Isiraely tamin''ny tany Egypta, dia tamin''izany andro izany no nahatongavany tany an''efitr''i Sinay.'
mg1865::mg_2::19::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nifindra niala teo Refidima izy ka tonga tany amin''ny efitr''i Sinay, dia nitoby teo amin''ny efitra; dia tandrifin''ny tendrombohitra no nitobian''ny Isiraely teo.'
mg1865::mg_2::19::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niakatra ho ao amin''Andriamanitra, dia niantso azy Jehovah tao an-tendrombohitra ka nanao hoe: Izao no holazainao amin''ny taranak''i Jakoba sy hambaranao amin''ny Zanak''Isiraely:'
mg1865::mg_2::19::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo efa nahita izay nataoko tamin''ny Egyptiana sy izay nitondrako anareo tamin''ny elatry ny voromahery ary ny nampankanesako anareo ho aty amiko.'
mg1865::mg_2::19::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, raha hihaino ny feoko tokoa ianareo ka hitandrina ny fanekeko, dia ho rakitra soa ho Ahy mihoatra noho ny firenena rehetra ianareo; fa Ahy ny tany rehetra.'
mg1865::mg_2::19::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fanjaka-mpisorona sy ho firenena masina ho Ahy ianareo. Ireo teny ireo no holazainao amin''ny Zanak''Isiraely.'
mg1865::mg_2::19::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Mosesy ka nampaka ny loholon''ny vahoaka, dia nalahany teo anatrehany ireo teny rehetra ireo, izay nandidian''i Jehovah azy.'
mg1865::mg_2::19::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly indray miredona ny olona rehetra ka nanao hoe: Izay teny rehetra nolazain''i Jehovah dia hataonay. Ary dia nentin''i Mosesy tao amin''i Jehovah kosa ny tenin''ny olona.'
mg1865::mg_2::19::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny fiomanan''ny Zanak''Isiraely alohan''ny nanomezan''Andriamanitra azy ny Lalàna'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Indro Aho mankeo aminao ao anatin''ny rahona maizina, mba ho ren''ny olona raha miteny aminao Aho, ka dia hino anao mandrakariva izy. Dia nambaran''i Mosesy tamin''i Jehovah ny tenin''ny olona.'
mg1865::mg_2::19::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mandehana ho eny amin''ny olona, ka manamasina azy anio sy ampitso, ary ampanasao ny fitafiany izy:'
mg1865::mg_2::19::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka samy hiomana ho amin''ny andro fahatelo izy; fa amin''ny andro fahatelo no hidinan''i Jehovah ho eo imason''ny olona rehetra eo an-tampon''ny tendrombohitra Sinay.'
mg1865::mg_2::19::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanisy fefy manodidina ho an''ny olona ianao ka hanao hoe: Mitandrema ianareo mba tsy hiakatra ao amin''ny tendrombohitra, na hikasika ny sisiny akory aza; fa na iza na iza mikasika ny tendrombohitra dia hatao maty tokoa;'
mg1865::mg_2::19::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy hisy tanana hikasika azy, fa hotoraham-bato tokoa izy, na hotifirina tokoa, na biby na olona, tsy mba hovelomina izy; fa raha manao feo lavareny ny anjomara, dia vao hiakatra ho ao amin''ny tendrombohitra izy.'
mg1865::mg_2::19::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina avy tao amin''ny tendrombohitra Mosesy ka nankeny amin''ny olona; dia nanamasina ny olona izy, ka samy nanasa ny fitafiany.'
mg1865::mg_2::19::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny olona: Miomàna ianareo ho amin''ny andro fahatelo; aza manakaiky vehivavy akory.'
mg1865::mg_2::19::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny marain''ny andro fahatelo dia nisy kotrokorana sy helatra ary rahona matevina teo amin''ny tendrombohitra, ary nisy feon''anjomara mafy indrindra, dia toran-kovitra ny olona rehetra izay teo an-toby.'
mg1865::mg_2::19::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nitondra ny olona nivoaka avy teo an-toby mba hihaona amin''Andriamanitra; dia nijanona teo am-bodin''ny tendrombohitra izy.'
mg1865::mg_2::19::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tendrombohitra Sinay nivoa-tsetroka avokoa, satria Jehovah nidina teo amboniny tao anaty afo; dia niakatra ny setroka tahaka ny setroky ny lafaoro lehibe, ary nihorohoro mafy ny tendrombohitra Sinay rehetra.'
mg1865::mg_2::19::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa notsofina ny anjomara ka nidradradradra, dia niteny Mosesy, ary Andriamanitra namaly feo azy.'
mg1865::mg_2::19::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nidina nankeo an-tendrombohitra Sinay, dia teo an-tampon''ny tendrombohitra; ary Jehovah niantso an''i Mosesy hankeo an-tampon''ny tendrombohitra; dia niakatra Mosesy.'
mg1865::mg_2::19::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Midìna, ka pepero ny olona, fandrao hisisika hankao amin''i Jehovah izy mba hijery ka hahafatesana maro.'
mg1865::mg_2::19::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny mpisorona koa, izay manakaiky an''i Jehovah, hanamasina ny tenany, fandrao himaona hamely azy Jehovah.'
mg1865::mg_2::19::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Jehovah: Tsy mahazo miakatra ho eto amin''ny tendrombohitra Sinay ny olona; fa Ianao nandidy anay ka nanao hoe: Fefeo ny tendrombohitra, ka hamasino izy.'
mg1865::mg_2::19::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Mandehana midina, nefa miakara ianao, ka ento hiaraka aminao Arona; fa ny mpisorona sy ny olona dia aza avela hisisika hiakatra ho ao amin''i Jehovah, fandrao haringana izy.'
mg1865::mg_2::19::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia nidina nankeny amin''ny olona ka niteny taminy.'
mg1865::mg_2::20::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanomezan''Andriamanitra ny Didy Folo'
  verse_text: 'Dia nilaza izao teny rehetra izao Andriamanitra ka nanao hoe:'
mg1865::mg_2::20::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana.'
mg1865::mg_2::20::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manana andriamani-kafa, fa Izaho ihany.'
mg1865::mg_2::20::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao sarin-javatra voasokitra ho anao, na ny mety ho endriky ny zavatra izay eny amin''ny lanitra ambony, na izay ety amin''ny tany ambany, na izay any amin''ny rano ambanin''ny tany.'
mg1865::mg_2::20::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miankohoka eo anatrehany, ary aza manompo azy; fa Izaho, Jehovah Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin''ny zanaka hatramin''ny zafiafy sy ny zafindohalika, dia amin''izay mankahala Ahy;'
mg1865::mg_2::20::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa kosa mamindra fo amin''ny olona arivo mandimby izay tia Ahy ka mitandrina ny didiko.'
mg1865::mg_2::20::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manonona foana ny anaran''i Jehovah Andriamanitrao; fa tsy hataon''i Jehovah ho tsy manan-tsiny izay manonona foana ny anarany.'
mg1865::mg_2::20::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiarova ny andro Sabata hanamasina azy.'
mg1865::mg_2::20::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra.'
mg1865::mg_2::20::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Sabatan''i Jehovah Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin''izany, na ny zanakao-lahy, na ny zanakao-vavy, na ny ankizilahinao, na ny ankizivavinao na ny biby fiompinao, na ny vahininao izay tafiditra eo am-bavahadinao.'
mg1865::mg_2::20::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa henemana no nanaovan''i Jehovah ny lanitra sy ny tany sy ny ranomasina mbamin''izay rehetra ao aminy, dia nitsahatra Izy tamin''ny andro fahafito; izany no nitahian''i Jehovah ny andro Sabata sy nanamasinany azy.'
mg1865::mg_2::20::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manajà ny rainao sy ny reninao mba ho maro andro ianao ao amin''ny tany izay omen''i Jehovah Andriamanitrao ho anao.'
mg1865::mg_2::20::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamono olona.'
mg1865::mg_2::20::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mijangajanga.'
mg1865::mg_2::20::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mangalatra.'
mg1865::mg_2::20::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety ho vavolombelona mandainga hanameloka ny namanao.'
mg1865::mg_2::20::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitsiriritra ny tranon''ny namanao; aza mitsiriritra ny vadin''ny namanao, na ny ankizilahiny, na ny ankizivaviny, na ny ombiny, na ny borikiny, na izay mety ho an''ny namanao akory aza.'
mg1865::mg_2::20::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra nandre ny kotrokorana sy ny feon''ny anjomara ary nahita ny helatra sy ny tendrombohitra nivoa-tsetroka, ary nony nahita izany ny olona, dia toran-kovitra izy ka nijanona teny lavitra eny.'
mg1865::mg_2::20::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''i Mosesy: Aoka ihany ianao no hiteny aminay, dia hihaino izahay; fa aza Andriamanitra no miteny aminay, fandrao maty izahay.'
mg1865::mg_2::20::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''ny olona: Aza matahotra; fa tonga Andriamanitra mba hizaha toetra anareo, ary mba ho eo anatrehan''ny tavanareo ny fahatahorana Azy, mba tsy hanotanareo.'
mg1865::mg_2::20::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijanona teny lavitra eny ny olona, fa Mosesy kosa nanakaiky ny aizim-pito, izay nitoeran''Andriamanitra.'
mg1865::mg_2::20::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Izao no lazaonao amin''ny Zanak''Isiraely: Ianareo efa nahita fa tany an-danitra no nitenenako taminareo.'
mg1865::mg_2::20::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza manao andriamanitra volafotsy na andriamanitra volamena ho anareo ho fanampiko.'
mg1865::mg_2::20::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alitara tany no hataonao ho Ahy, ka haterinao eo amboniny ny fanatitra doranao sy ny fanati-pihavananao, dia ny ondry aman''osinao sy ny ombinao; eo amin''ny fitoerana rehetra izay ampahatsiarovako ny anarako no hanatonako anao sy hitahiako anao.'
mg1865::mg_2::20::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha alitara vato no hataonao ho Ahy, dia aza ny vato voapaika no hanaovanao azy; fa raha manainga ny fandrakao ho aminy ianao, dia handoto azy.'
mg1865::mg_2::20::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza asiana ambaratonga hiakaranao ho eo amin''ny alitarako, mba tsy ho hita eo ny fitanjahanao.'
mg1865::mg_2::21::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Lalàna nasain''Andriamanitra hotandreman''ny Zanak''Isiraely'
  verse_text: 'Ary izao no lalàna izay hataonao eo anatrehany:'
mg1865::mg_2::21::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mividy andevo Hebreo ianao, dia enin-taona no hanompoany, ary amin''ny taona fahafito dia hiala ho afaka fotsiny izy.'
mg1865::mg_2::21::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha izy irery ihany no miditra, dia izy irery hany no hiala; fa raha manam-bady izy, dia hiala hiaraka aminy koa ny vadiny.'
mg1865::mg_2::21::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manome vady azy ny tompony, ka miteraka zazalahy na zazavavy aminy izy, dia ho an''ny tompony ihany ny vadiny sy ny zanany, fa izy irery ihany no hiala.'
mg1865::mg_2::21::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha milaza marimarina ilay andevo ka manao hoe: Tsy foiko ny tompoko sy ny vadiko ary ny zanako, ka tsy te-ho afaka aho,'
mg1865::mg_2::21::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho entin''ny tompony ho eo anatrehan''Andriamanitra izy, ary dia ho entiny ho eo amin''ny varavarana, na ho eo amin''ny tolam-baravarana, ka hotevehin''ny tompony amin''ny haolo ny sofiny; dia hanompo azy mandrakizay izy.'
mg1865::mg_2::21::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mivaro-janakavavy ho vaditsindranon''olona, dia tsy mba ho tahaka ny fialan''ny andevolahy ho afaka no fialany.'
mg1865::mg_2::21::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy ankasitrahan''ny tompony, izay nikasa hanambady azy, ravehivavy, dia havelany havotana ihany izy; tsy hahazo mivarotra azy ho any amin''ny firenena hafa izy, satria efa namitaka azy.'
mg1865::mg_2::21::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mamofo azy ho vadin''ny zananilahy izy, dia araka ny fitondra zanakavavy no hataony aminy.'
mg1865::mg_2::21::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha maka vehivavy hafa ho vadiny izy, dia tsy hahenany ny fihinany sy ny fitafiany ary ny fombam-panambadiany.'
mg1865::mg_2::21::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy hataony aminy izany zavatra telo loha izany, dia hiala ho afaka fotsiny ravehivavy, fa tsy handoa vola.'
mg1865::mg_2::21::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamely olona ka mahafaty azy dia hatao maty tokoa;'
mg1865::mg_2::21::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay tsy manotrika, fa Andriamanitra no manolotra azy eo an-tanany, dia hanendry ho anareo fitoerana izay handosirany Aho.'
mg1865::mg_2::21::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona avy sahisahy amin''ny namany hamono azy amin''ny fahafetsena, dia halainao izy, na dia eo amin''ny alitarako aza, mba hovonoina ho faty.'
mg1865::mg_2::21::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mamely ny rainy na ny reniny dia hatao maty tokoa.'
mg1865::mg_2::21::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mangalatra olona, na efa namidiny, na mbola hita eo an-tanany ihany ilay nangalariny, dia hatao maty tokoa.'
mg1865::mg_2::21::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay manozona ny rainy na ny reniny dia hatao maty tokoa.'
mg1865::mg_2::21::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona mifanditra, ka ny anankiray mamely ny namany amin''ny vato, na amin''ny totohondry, koa tsy maty izy, fa marary ambany tsihy,'
mg1865::mg_2::21::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha afa-mitsangana indray ka mandehandeha mitehina eny ala-trano izy, dia ho afa-tsiny ilay namely azy; kanefa handoa ny hevitr''andro tsy nanaovany zavatra izy sady hitsabo azy mandra-pahasitrany.'
mg1865::mg_2::21::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona mikapoka ny andevolahiny na ny andevovaviny amin''ny tsorakazo ka mahafaty azy eo am-pikapohana, dia hovaliana tokoa izy.'
mg1865::mg_2::21::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha mbola velona maharitra indray andro na indroa andro izy, dia tsy hovaliana ilay tompony; fa hareny ihany izy.'
mg1865::mg_2::21::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona mifanditra ka mandratra vehivavy manan''anaka, ka teraka tsy tonga volana ny zanany, kanefa tsy misy maninona, dia hosazina tokoa ilay olona araka izay hanaovan''ny vadin-dravehivavy azy; ary handoa araka izay handidian''ny mpitsara izy.'
mg1865::mg_2::21::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy maninona kosa, dia hanome aina solon''ny aina ianao,'
mg1865::mg_2::21::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'maso solon''ny maso, nify solon''ny nify, tanana solon''ny tanana, tongotra solon''ny tongotra,'
mg1865::mg_2::21::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'may solon''ny may, ratra solon''ny ratra, mivatra solon''ny mivatra.'
mg1865::mg_2::21::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona mamely ny mason''ny andevolahiny na ny mason''ny andevovaviny ka mahasimba azy, dia halefany ho afaka izy noho ny masony.'
mg1865::mg_2::21::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny nifin''ny andevolahy na ny andevovavy no afany, dia halefany ho afaka koa izy noho ny nifiny.'
mg1865::mg_2::21::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy omby manoto lehilahy na vehivavy ka mahafaty azy, dia hotoraham-bato tokoa ny omby, ary tsy hohanina ny henany; ary ny tompon''ilay omby dia ho afa-tsiny.'
mg1865::mg_2::21::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha omby efa zatra nanoto hatramin''ny teo aloha iny, sady efa nambara tamin''ny tompony izany, nefa izy no tsy niaro azy, koa nahafaty lehilahy na vehivavy ny omby, dia hotoraham-bato ny omby, ary ny tompony koa hovonoina.'
mg1865::mg_2::21::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha sazina izy, dia handoa vidin''aina araka izay sazy atao aminy.'
mg1865::mg_2::21::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manoto zazalahy na zazavavy ny omby, dia araka izany lalàna izany koa no hanaovana azy.'
mg1865::mg_2::21::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manoto andevolahy na andevovavy izy, dia homena sekely volafotsy telo-polo ny tompon''andevo, ary ny omby hotoraham-bato.'
mg1865::mg_2::21::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona manokatra lavaka, na raha misy olona mihady lavaka, ka tsy rakofany, ary misy omby na boriky latsaka ao,'
mg1865::mg_2::21::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanonitra azy ny tompon-davaka, ka vola no haloany ho an''ny tompony; ary ny maty dia ho azy.'
mg1865::mg_2::21::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy ombin''olona mandratra ny ombin''ny namany ka mahafaty azy, dia hamidiny ny omby velona, ka hozarainy ny vola vidiny; ary ny maty koa hozarainy.'
mg1865::mg_2::21::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha fantatra fa omby zatra nanoto hatramin''ny teo aloha iny, koa tsy niaro azy ny tompony, dia hanonitra omby ho solon''ny omby tokoa izy; ary ny maty dia ho azy.'
mg1865::mg_2::21::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 21
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona mangalatra omby, na ondry, na osy, ka mamono azy, na mivarotra azy, dia hanonitra omby dimy ho solon''ny omby iray izy ary ondry na osy efatra ho solon''ny ondry na osy iray.'
mg1865::mg_2::22::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha azo manamitrano ny mpangalatra ka asiana ho faty, dia tsy hisy valin-drà amin''izany;'
mg1865::mg_2::22::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tratry ny masoandro miposaka kosa izy, dia hisy valin-drà ihany amin''izany; hanonitra tokoa izy; ary raha tsy manana na inona na inona, dia hamidy izy noho ny halatra nataony.'
mg1865::mg_2::22::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hita marina velona eo aminy ny halatra na omby, na boriky, na ondry, na osy, dia hanonitra roa heny izy.'
mg1865::mg_2::22::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona mampitondraka amin''ny voly na tanim-boaloboka, fa alefany handeha ny bibiny, ka homana ny volin''olona izany biby izany, dia amin''ny tsara indrindra ao amin''ny sahany, ary amin''ny tsara indrindra ao amin''ny tanim-boalobony, no hanonerany.'
mg1865::mg_2::22::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy afo mirehitra ka mahazo ny tsilo, ka may ny antontam-bary, na ny vary maniry, na ny saha, dia hanonitra tokoa izay nampirehitra ny afo.'
mg1865::mg_2::22::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona mampitahiry vola na fanaka ny namany, ka angalarin''ny sasany ao amin''ny tranon''ilay olona izany, raha hita ny mpangalatra, dia hanonitra roa heny izy.'
mg1865::mg_2::22::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy hita kosa ny mpangalatra, dia ho entina eo anatrehan''Andriamanitra ny tompon''ny trano mba hizahana na naninjitra ny tanany ka naka ny fananan''ny namany izy, na tsia.'
mg1865::mg_2::22::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny zavatra ifandirana rehetra, na omby, na boriky, na ondry, na osy, na fitafiana, na zavatra very, izay ataon''olona ho azy, dia ho entina eo anatrehan''Andriamanitra ny tenin''izy roa tonta, koa izay helohih''Andriamanitra dia hanonitra roa heny ho an''ny namany.'
mg1865::mg_2::22::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona mampitahiry ny namany boriky, na omby, na ondry, na osy, na biby fiompy hafa, ka maty izany, na maratra, na roahina ka tsy misy mahita,'
mg1865::mg_2::22::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia fianianana amin''i Jehovah no hitsarana azy roa tonta, hahafantarana na efa naninjitra ny tanany ka naka ny fananan''ny namany ilay anankiray, na tsia; ary heken''ny tompony izany, dia tsy hisy onitra.'
mg1865::mg_2::22::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nangalarina tany aminy tokoa izany, dia hanonitra ho an''ny tompon-javatra izy.'
mg1865::mg_2::22::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha voaviraviram-biby izany, dia hitondra azy ho vavolombelona izy; tsy hanonitra izay voaviravira izy.'
mg1865::mg_2::22::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona mindran-javatra amin''ny namany, ka simba na maty izany, nefa tsy mba teo aminy ny tompon-javatra, dia hanonitra tokoa izy.'
mg1865::mg_2::22::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha teo aminy ihany ny tompon-javatra, dia tsy hanonitra izy; ary raha zavatra ahofa kosa, dia vitan''ny hofany izany.'
mg1865::mg_2::22::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona mitaona zazavavy, izay tsy voafofo, ka mandry aminy, dia hanome harena azy izy mba ho vadiny.'
mg1865::mg_2::22::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mandà tokoa ny rainy ka tsy manome azy ho vadiny, dia handoa vola ralehilahy araka ny harena fanome zazavavy hampakarina.'
mg1865::mg_2::22::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza velomina ny vehivavy manana ody.'
mg1865::mg_2::22::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mandry amin''ny biby dia hatao maty tokoa.'
mg1865::mg_2::22::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamono zavatra hatao fanatitra amin''ny andriamanitra hafa, afa-tsy amin''i Jehovah ihany, dia ho voaozona.'
mg1865::mg_2::22::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza manao izay sarotra amin''ny vahiny, na mampahory azy; fa ela mba vahiny tany amin''ny tany Egypta ihany ianareo.'
mg1865::mg_2::22::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mampahory ny mpitondratena sy ny kamboty akory ianareo.'
mg1865::mg_2::22::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mampahory azy na amin''inona na amin''inona ianao, ka mitaraina amiko izy, dia hihaino ny fitarainany tokoa Aho,'
mg1865::mg_2::22::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hirehitra ny fahatezerako, ary hamono anareo amin''ny sabatra Aho; dia mba ho mpitondratena ny vadinareo, ary ho kamboty kosa ny zanakareo.'
mg1865::mg_2::22::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mampisambo-bola ny oloko izay malahelo eo aminao ianao, dia tsy ho toy ny mpampanana vola aminy; fa tsy hampandoa zana-bola azy ianao.'
mg1865::mg_2::22::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha maka ny lamban''ny namanao ho tsatòka ianao, dia hampodinao aminy izany, raha mbola tsy milentika ny masoandro.'
mg1865::mg_2::22::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany ihany no firakofany sady fitafiany amin''ny hodiny, ka inona no ho entiny mandry? ary raha mitaraina amiko izy, dia hohenoiko, fa mamindra fo Aho.'
mg1865::mg_2::22::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miteny ratsy an''Andriamanitra ianao, na manozona ny mpanapaka ny firenenao.'
mg1865::mg_2::22::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza atao ela vao manatitra ny santatry ny vokatrao sy ny fisotronao; ny matoa amin''ny zanakao-lahy dia omeo Ahy.'
mg1865::mg_2::22::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no hataonao amin''ny ombinao sy ny ondry aman''osinao; hafitoana no hitoerany ao amin''ny reniny; ary amin''ny andro fahavalo no hanateranao azy ho Ahy.'
mg1865::mg_2::22::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho olona masina ho Ahy ianareo, koa izay hena voaviraviram-biby any an-tsaha dia tsy hohaninareo; fa harianareo ho an''ny amboa izany.'
mg1865::mg_2::23::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manangan-tsaho foana. Aza mifandray tanana amin''ny ratsy fanahy ho vavolombelona mampidi-doza.'
mg1865::mg_2::23::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manaraka ny maro hanao ratsy; ary aza mamaly ny amin''ny adin''olona hivily hanaraka ny maro hamadika ny rariny.'
mg1865::mg_2::23::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mandravaka ny tenin''ny malahelo eo amin''ny fandaharan-teniny ianao.'
mg1865::mg_2::23::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hitanao mania ny ombin''ny fahavalonao, na ny borikiny, dia avereno any aminy mihitsy izany.'
mg1865::mg_2::23::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hitanao ny borikin''izay mankahala anao mihonaka ao ambanin''ny entany, dia aza malaina hamonjy azy ianao, fa manampia ny namanao hamaha azy tokoa.'
mg1865::mg_2::23::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamily ny rariny izay ananan''ny malahelo ao aminao, raha manana ady izy.'
mg1865::mg_2::23::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manalavira izay teny lainga, ary aza mamono izay tsy manan-tsiny sy izay marina ianao; fa tsy hanamarina ny meloka Aho.'
mg1865::mg_2::23::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mandray kolikoly, fa ny kolikoly mahajamba ny mason''ny mahiratra sy mamadika ny tenin''ny marina.'
mg1865::mg_2::23::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mampahory vahiny, fa ianareo mahalala ny fon''ny vahiny, satria efa mba vahiny tany amin''ny tany Egypta ihany ianareo.'
mg1865::mg_2::23::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary enin-taona no hamafazanao amin''ny taninao sy hanangonanao ny vokatra;'
mg1865::mg_2::23::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny taona fahafito kosa dia hatsahatrao tsy hovolena izy, mba hisy hohanin''ny malahelo amin''ny firenenao; ary izay sisan''ireo dia mba hohanin''ny biby any an-tsaha kosa. Toy izany koa no hataonao amin''ny tanim-boalobokao sy amin''ny tanin''olivanao.'
mg1865::mg_2::23::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hanaovanao ny raharahanao; fa amin''ny andro fahafito dia hitsahatra ianao, mba hialan''ny ombinao sy ny borikinao sasatra, ary mba hakan''ny zanaky ny ankizivavinao sy ny vahiny aina.'
mg1865::mg_2::23::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo izay rehetra nolazaiko taminareo, ka aza manonona ny anaran''andriamani-kafa akory ianareo; aza avela ho re avy amin''ny vavanao izany.'
mg1865::mg_2::23::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Intelo isan-kerintaona no hanaovanao andro firavoravoana ho Ahy.'
mg1865::mg_2::23::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny andro firavoravoana fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin''ny fotoan''andro amin''ny volana Abiba, fa tamin''izany no nivoahanao avy tany Egypta; ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako.'
mg1865::mg_2::23::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo koa ny andro firavoravoana amin''ny fijinjana ny voaloham-bokatry ny asanao, izay nafafinao tany an-tsaha, sy ny andro firavoravoana amin''ny fanangonana amin''ny faran''ny taona, raha manangona ny vokatry ny asanao avy any an-tsaha ianao.'
mg1865::mg_2::23::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia intelo isan-kerintaona no hisehoan''ny lehilahy rehetra aminareo eo anatrehan''i Jehovah Tompo.'
mg1865::mg_2::23::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manatitra ny ran''ny zavatra vonoina hatao fanatitra ho Ahy ianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny saboran''ny zavatra vonoina amin''ny andro firavoravoana ho Ahy.'
mg1865::mg_2::23::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny santatry ny voaloham-bokatry ny taninao dia ho entinao ao an-tranon''i Jehovah Andriamanitrao. Aza mahandro zanak''osy amin''ny rononon-dreniny.'
mg1865::mg_2::23::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny niantohan''Andriamanitra hiaro ny Zanak''Isiraely sy hamponina azy soa aman-tsara ao amin''ny tany Kanana'
  verse_text: 'Indro, Izaho maniraka Anjely eo alohanao hiaro anao any an-dàlana sy hitondra anao ho any amin''ny fitoerana izay namboariko.'
mg1865::mg_2::23::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema eo anatrehany, ka mihainoa ny feony, ary aza mampahatezitra Azy; fa tsy hamela ny fahotanareo Izy; fa ny anarako no ao aminy.'
mg1865::mg_2::23::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hihaino ny feony tokoa ianao ka hanao izay rehetra lazaiko, dia ho fahavalon''ny fahavalonao sy ho rafin''ny rafinao Aho.'
mg1865::mg_2::23::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa handeha eo alohanao ny Anjeliko ka hitondra anao any amin''ny Amorita sy ny Hetita sy ny Perizita sy ny Kananita sy ny Hivita ary ny Jebosita; ary dia hofongorako ireny,'
mg1865::mg_2::23::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miankohoka eo anatrehan''ny andriamanitr''ireny ianao, na manompo azy, na manao araka ny ataony; fa aringano tokoa izy, ary torotoroy tokoa ny tsangam-baton-tsampiny.'
mg1865::mg_2::23::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manompoa an''i Jehovah Andriamanitrareo, dia hitahy ny haninao sy ny ranonao Izy; ary hesoriko aminao ny aretina.'
mg1865::mg_2::23::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisy ho afa-jaza na ho momba ao amin''ny taninao; hotanterahiko ny isan''ny andronao.'
mg1865::mg_2::23::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampandeha ny fahatahorana Ahy eo alohanao Aho ka hampifanaritaka ny firenena rehetra izay alehanao, ary hampiamboho ny fahavalonao rehetra anao Aho.'
mg1865::mg_2::23::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampandeha fanenitra eo alohanao Aho, ka handroaka ny Hivita sy ny Kananita ary ny Hetita eo alohanao ireny.'
mg1865::mg_2::23::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy handroaka azy eo alohanao amin''ny taona iray Aho, fandrao ho lao ny tany, ka hihamaro hamely anao ny bibi-dia.'
mg1865::mg_2::23::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsikelikely no handroahako azy eo alohanao mandra-pahamaronao ka handova ny tany.'
mg1865::mg_2::23::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''ny Ranomasina Mena ka hatramin''ny ranomasin''ny Filistina no hataoko faritaninao, ary hatramin''ny efitra ka hatramin''ny Ony; fa hanolotra ny mponina amin''ny tany ho eo an-tananareo Aho; ary handroaka azy eo alohanao ianao.'
mg1865::mg_2::23::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao fanekena aminy na amin''ny andriamaniny ianao.'
mg1865::mg_2::23::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy honina eo amin''ny taninao ireny, fandrao hampanota anao amiko; fa raha manompo ny andriamaniny ianao, dia ho fandrika aminao tokoa izany,'
mg1865::mg_2::24::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namonoana fanatitra hanamafiana ny fanekena, sy ny nahitan''i Mosesy mbamin''ny loholon''ny Isiraely an''Andriamanitra'
  verse_text: 'Ary hoy Izy tamin''i Mosesy: Miakara ao amin''i Jehovah ianao sy Arona sy Nadaba sy Abiho ary fito-polo lahy amin''ny loholon''ny Isiraely; ka miankohofa eny lavitra eny ianareo;'
mg1865::mg_2::24::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa Mosesy ihany no hanakaiky an''i Jehovah, fa ireo tsy mba hanakaiky; ary ny olona tsy hiakatra homba azy.'
mg1865::mg_2::24::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga Mosesy ka nanambara tamin''ny olona ny teny rehetra izay nataon''i Jehovah sy ny fitsipika rehetra. Ary namaly indray miredona ny olona rehetra ka nanao hoe: Ny teny rehetra izay nolazain''i Jehovah dia hataonay.'
mg1865::mg_2::24::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nanoratra ny teny rehetra nataon''i Jehovah, dia nifoha maraina koa ka nanorina alitara teo am-bodin''ny tendrombohitra sy tsangam-bato roa ambin''ny folo, araka ny firenen''Isiraely roa ambin''ny folo.'
mg1865::mg_2::24::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zatovo amin''ny Zanak''Isiraely nirahiny, dia nitondra fanatitra dorana ireo ka namono vantotr''ombilahy hatao fanati-pihavanana ho an''i Jehovah.'
mg1865::mg_2::24::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Mosesy ny antsasaky ny rà ka nataony teo anaty lovia, ary ny antsasaky ny rà kosa natopiny teo amin''ny alitara.'
mg1865::mg_2::24::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka ny bokin''ny fanekena izy ka namaky teny teo anatrehan''ny olona. Ary hoy ny olona: Izay rehetra nolazain''i Jehovah dia hataonay sy hekenay.'
mg1865::mg_2::24::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Mosesy ny rà ka natopiny tamin''ny olona, dia hoy izy: Indro ny ran''ny fanekena izay nataon''i Jehovah taminareo ny amin''izany teny rehetra izany.'
mg1865::mg_2::24::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra Mosesy sy Arona sy Nadaba sy Abiho ary fito-polo lahy tamin''ny loholon''ny Isiraely.'
mg1865::mg_2::24::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahita an''Andriamanitry ny Isiraely izy; koa ny teo ambanin''ny tongony dia toy ny fanganohanon''ny vato safira voavoatra, ary toy ny tenan''ny lanitra ny famirapirany.'
mg1865::mg_2::24::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy naninjitra ny tanany tamin''ireo lehiben''ny Zanak''Isiraely Izy; dia nahita an''Andriamanitra izy ireo, ary nihinana sy nisotro.'
mg1865::mg_2::24::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Miakara eto amiko eto an-tendrombohitra ka mitoera eto, dia homeko anao ny vato fisaka izay misy ny lalàna sy ny didy, izay nosoratako hampianarina azy.'
mg1865::mg_2::24::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Mosesy sy Josoa mpanompony; ary Mosesy dia niakatra tao an-tendrombohitr''Andriamanitra.'
mg1865::mg_2::24::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny loholona: Miandrasa anay eto mandra-piverinay eto aminareo; ary, indro, Arona sy Hora dia eto aminareo, koa raha misy olona manana ady, aoka hankeo amin''izy roa lahy izy.'
mg1865::mg_2::24::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra tao amin''ny tendrombohitra Mosesy, ary ny rahona nanarona ny tendrombohitra.'
mg1865::mg_2::24::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahitr''i Jehovah nitoetra teo ambonin''ny tendrombohitra Sinay, ary ny rahona nanarona azy henemana; dia niantso an''i Mosesy tamin''ny andro fahafito teo afovoan''ny rahona Izy.'
mg1865::mg_2::24::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fijery ny voninahitr''i Jehovah teo an-tampon''ny tendrombohitra dia tahaka ny afo mandevona teo imason''ny Zanak ''Isiraely.'
mg1865::mg_2::24::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra tao afovoan''ny rahona Mosesy ka niakatra tao amin''ny tendrombohitra; ary nitoetra tao amin''ny tendrombohitra efa-polo andro sy efa-polo alina Mosesy.'
mg1865::mg_2::25::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandidian''Andriamanitra an''i Mosesy ny amin''ny hanaovana ny Tabernakely sy ny fanaka momba azy'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::25::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely mba hitondra fanatitra ho Ahy izy; dia avy amin''ny olona rehetra izay amporisihin''ny fony no handraisanareo ny fanatitra ho Ahy.'
mg1865::mg_2::25::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fanatitra izay horaisinareo aminy: volamena sy volafotsy sy varahina,'
mg1865::mg_2::25::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy manga sy volomparasy sy mena sy rongony fotsy madinika sy volon''osy,'''
mg1865::mg_2::25::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy hoditr''ondrilahy efa nomen''aina sy hodi-takasy sy hazo akasia,'
mg1865::mg_2::25::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy diloilo hatao fanazavana sy zava-manitra ho amin''ny diloilo fanosorana sy ho ditin-kazo mani-pofona,'
mg1865::mg_2::25::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy vato beryla sy vato halatsaka an-tranontranony amin''ny efoda sy amin''ny saron-tratra.'
mg1865::mg_2::25::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asaovy manao fitoerana masina ho Ahy izy, dia honina eo aminy Aho.'
mg1865::mg_2::25::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay rehetra asehoko aminao, dia ny endriky ny tabernakely sy ny endriky ny fanaka rehetra momba azy, dia araka izany no hanaovanao azy.'
mg1865::mg_2::25::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asaovy manao fiara hazo akasia izy: roa hakiho sy sasany ny lavany; ary iray hakiho sy sasany ny sakany, ary iray hakiho sy sasany ny hahavony.'
mg1865::mg_2::25::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary petaho takela-bolamena tsara izy: ny atiny sy ny ivelany dia samy hopetahanao takela-bolamena avokoa; ary asio koronosy volamena manodidina eo amboniny.'
mg1865::mg_2::25::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandrendreha vava volamena efatra hatao aminy, ka ataovy eo amin''ny tongony efatra; dia vava volamena roa eo amin''ny lafiny iray, ary vava volamena roa eo amin''ny lafiny iray koa.'
mg1865::mg_2::25::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova bao hazo akasia, ka petaho takela-bolamena.'
mg1865::mg_2::25::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ampidiro ny bao ho eo amin''ny vava volamena, izay eo amin''ny lafin''ny fiara, hilanjana azy.'
mg1865::mg_2::25::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo amin''ny vava volan''ny fiara no hitoeran''ny bao, ka tsy hesorina eo izy.'
mg1865::mg_2::25::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy ao anatin''ny fiara ny Vavolombelona izay homeko anao.'
mg1865::mg_2::25::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova rakotra fanaovam-panavotana amin''ny volamena tsara: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany.'
mg1865::mg_2::25::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova kerobima volamena roa; voasana no hanaovanao azy roa ho eo amin''ny sakany roa amin''ny rakotra fanaovam-panavotana'
mg1865::mg_2::25::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kerobima iray ataovy indray mivofy amin''ny sakany anankiray, ary ny kerobima iray kosa amin''ny sakany anankiray: indray mivofy amin''ny rakotra fanaovam-panavotana no hanaovanareo ny kerobima roa, dia amin''ny sakany roa.'
mg1865::mg_2::25::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hivelatra eo ambony ny elatry ny kerobima, mba hanalofan''ny elany ny rakotra fanaovam-panavotana; ary ny tavany hifanatrika, sady hanatrika ny rakotra fanaovam-panavotana koa izy.'
mg1865::mg_2::25::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary apetraho eo ambonin''ny fiara ny rakotra fanaovam-panavotana; ary ao anatin''ny fiara no asio ny Vavolombelona izay homeko anao.'
mg1865::mg_2::25::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ao no hihaona aminao Aho, ka ao ambonin''ny rakotra fanaovam-panavotana no hitenenako aminao, dia ao anelanelan''ny kerobima roa, izay eo ambonin''ny fiaran''ny Vavolombelona, ka holazaiko izay rehetra handidiako anao holazainao amin''ny Zanak''Isiraely.'
mg1865::mg_2::25::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova latabatra hazo akasia: roa hakiho ny lavany, ary iray hakiho ny sakany, ary iray hakiho sy sasany ny hahavony.'
mg1865::mg_2::25::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary petaho takela-bolamena tsara izy, sady asio koronosy volamena manodidina azy.'
mg1865::mg_2::25::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio sisiny vodivoam-pelatanana manodidina azy, ary asio koronosy volamena ny sisiny manodidina.'
mg1865::mg_2::25::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova vava volamena efatra hatao aminy, ka ataovy eo amin''ny zorony efatra izay eo amin''ny tongony efatra ireo:'
mg1865::mg_2::25::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'eo akaikin''ny sisiny no hasiana ny vava volamena ho fitoeran''ny bao hilanjana ny latabatra.'
mg1865::mg_2::25::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hazo akasia no anaovy ny bao, ka petaho takela-bolamena; ary amin''ireo no hilanjana ny latabatra.'
mg1865::mg_2::25::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny loviany sy ny lovia keliny ary ny fitoeran-divainy sy ny kapoakany ho fanidinam-panatitra; volamena tsara no hanaovanao ireo.'
mg1865::mg_2::25::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio mofo aseho eo ambonin''ny latabatra ho eo anatrehako mandrakariva.'
mg1865::mg_2::25::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny fanaovan-jiro volamena tsara; voasana no hanaovanao ny fanaovan-jiro, hatao indray mivofy ihany ny faladiany sy ny tahony sy ny vodi-voniny sy ny kiboriny ary ny voniny.'
mg1865::mg_2::25::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy sampany enina amin''ny ankilany roa: dia sampany telo amin''ny fanaovan-jiro eo amin''ny ankilany iray, ary sampany telo amin''ny fanaovan-jiro eo amin''ny ankilany iray koa,'
mg1865::mg_2::25::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia vodi-voniny telo atao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny, eo amin''ny sampany anankiray; ary vodi-voniny telo koa atao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny, eo amin''ny sampany anankiray koa; dia toy izany avokoa amin''ny sampany enina izay amin''ny fanaovan-jiro.'
mg1865::mg_2::25::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eo amin''ny fanaovan-jiro dia hisy vodi-voniny efatra atao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny,'
mg1865::mg_2::25::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia kiboriny iray eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray koa eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray koa eo ambanin''ny sampany roa sady miray aminy; dia amin''ny sampany enina izay miray amin''ny fanaovan-jiro.'
mg1865::mg_2::25::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kiboriny sy ny sampany dia hiray avokoa; hatao indray mivofy aminy amin''ny volamena tsara izy rehetra.'
mg1865::mg_2::25::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova lela fanaovan-jirony fito, ka ampireheto eo aminy ireo mba hanazava ny anoloany.'
mg1865::mg_2::25::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hetin-jirony Sy ny fitoeran-davenon-jirony dia ataovy volamena tsara.'
mg1865::mg_2::25::39:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volamena tsara talenta iray no hanaovana azy mbamin''ireny fanaka rehetra ireny.'
mg1865::mg_2::25::40:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 25
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo mba hataonao araka ny endriny izay naseho taminao tao an-tendrombohitra izy.'
mg1865::mg_2::26::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tabernakely dia hataonao ambainy folo amin''ny rongony fotsy madinika voahasina sy manga sy volomparasy ary mena; kerobima, asan''ny mpanenona mahay, no hataonao sorany.'
mg1865::mg_2::26::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny halavan''ny ambainy iray dia valo amby roa-polo hakiho; ary ny lambanan''ny ambainy iray dia efatra hakiho; hitovy ohatra ny ambainy rehetra.'
mg1865::mg_2::26::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambainy dimy no havitrana ho iray; ary ambainy dimy koa no havitrana ho iray.'
mg1865::mg_2::26::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova tadivavarana manga ho eo an-tsisin''ny ambainy iray, dia eo an-tsisin''ny anankiray efa voavitrana; ary manaova toy izany koa amin''ny ambainy farany, dia eo an-tsisin''ny anankiray efa voavitrana koa.'
mg1865::mg_2::26::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tadivavarana dimam-polo no hataonao eo amin''ny ambainy iray, ary tadivavarana dimam-polo koa no hataonao eo amin''ny sisin''ny ambainy izay amin''ny anankiray efa voavitrana koa; ary hifandray ny tadivavarana.'
mg1865::mg_2::26::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova farango volamena dimam-polo, ka akambano amin''ny farango ny ambainy, ka dia ho voakambana ho iray ny tabernakely.'
mg1865::mg_2::26::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ambainy koa amin''ny volon''osy ho lay handrakofana ny tabernakely; dia iraika ambin''ny folo ambainy no hanaovanao azy.'
mg1865::mg_2::26::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny halavan''ny ambainy iray dia telo-polo hakiho, ary ny lambanan''ny ambainy iray dia efatra hakiho; hitovy ohatra ny ambainy iraika ambin''ny folo.'
mg1865::mg_2::26::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avitrano ny ambainy dimy hikambana, ary ny ambainy enina kosa hikambana. Ary aforeto ny ambainy fahenina amin''ny sakan''ny lay anatrehana.'
mg1865::mg_2::26::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova tadivavarana dimam-polo eo an-tsisin''ny ambainy iray izay farany amin''ny efa voavitrana; ary tadivavarana dimam-polo koa ho eo an-tsisin''ny ambainy iray amin''ny anankiray koa efa voavitrana.'
mg1865::mg_2::26::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova farango; varahina dimam-polo, ka ampidiro ho eo amin''ny tadivavarana ary akambano ny lay, ka dia ho iray ihany izy.'
mg1865::mg_2::26::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mihoatra amin''ny ambain''ny lay, dia ny antsasaky ny ambainy izay mihoatra, dia avelao hiraviravy eo ivohon''ny tabernakely.'
mg1865::mg_2::26::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny iray hakiho avy eo amin''ny lohany roa amin''ny lamba, izay mihoatra amin''ny halavan''ny ambain''ny lay, dia avelao hiraviravy eo amin''ny lafibeny roa amin''ny tabernakely handrakotra azy.'
mg1865::mg_2::26::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova koa rakotry ny lay amin''ny hoditr''ondrilahy efa nomenaina, ary manaova sarony hodi-takasy ho eo amboniny.'
mg1865::mg_2::26::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova zana-kazo akasia ho amin''ny tabernakely.'
mg1865::mg_2::26::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Folo hakiho ny hahavon''ny zana-kazo iray, ary iray hakiho sy sasany ny indraben''ny zana-kazo iray.'
mg1865::mg_2::26::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lahiny roa no ho amin''ny zana-kazo iray, ka hasiana izay hikambanany; izany no hanaovanao ny zana-kazo rehetra amin''ny tabernakely.'
mg1865::mg_2::26::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny zana-kazo ho amin''ny tabernakely, dia zana-kazo roa-polo ho eo amin''ny lafiny atsimo.'
mg1865::mg_2::26::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova faladia volafotsy efa-polo, dia faladia roa avy ho ambanin''ny isan-janakazo iray hiorenan''ny lahiny roa.'
mg1865::mg_2::26::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova zana-kazo roa-polo ho eo amin''ny lafiny faharoa amin''ny tabernakely, dia ny lafiny avaratra.'
mg1865::mg_2::26::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova faladiany volafotsy efa-polo, dia faladia roa avy ho ambanin''ny isan-janakazo iray.'
mg1865::mg_2::26::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lafiny andrefana amin''ny tabernakely, izay ao ivohony, dia hanaovanao zana-kazo enina.'
mg1865::mg_2::26::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary zana-kazo roa no hataonao ho eo amin''ny zoron''ny tabernakely amin''ny lafiny ivoho.'
mg1865::mg_2::26::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hakambana ho iray izy hatramin''ny ambany ka hatramin''ny ambony, ka hasianao vava vola iray ihany: ho toy izany avokoa izy roa; eo amin''ny zorony roa no hisy izany.'
mg1865::mg_2::26::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hisy zana-kazo valo sy ny faladiany volafotsy, dia faladia enina ambin''ny folo: faladia roa avy ho ambanin''ny isan-janakazo iray.'
mg1865::mg_2::26::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova barany hazo akasia: dia dimy ho amin''ny zana-kazo amin''ny lafiny iray amin''ny tabernakely,'
mg1865::mg_2::26::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy barany dimy ho amin''ny zana-kazo amin''ny lafiny iray koa amin''ny tabernakely, ary barany dimy ho amin''ny zana-kazo amin''ny lafiny andrefana izay ao ivohony.'
mg1865::mg_2::26::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny barany afovoany, izay afovoan''ny zana-kazo, dia hahatratra ny farany roa.'
mg1865::mg_2::26::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zana-kazo hopetahanao takela-bolamena, ary hataonao volamena koa ny vava vola aminy, izay hitoeran''ny barany; ary petaho takela-bolamena koa ny barany.'
mg1865::mg_2::26::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manangana ny tabernakely araka ny endriny, dia ilay naseho taminao tao an-tendrombohitra.'
mg1865::mg_2::26::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova efitra lamba manga sy volomparasy sy mena ary rongony fotsy madinika voahasina; kerobima, asan''ny mpanenona mahay, no hataonao sorany.'
mg1865::mg_2::26::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ahantòny amin''ny andry hazo akasia efatra izay voapateka takela-bolamena izy; ho volamena koa ny fihantonany; ary eo amin''ny faladia volafotsy efatra no hiorenany.'
mg1865::mg_2::26::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny efitra lamba dia ataovy eo ambanin''ny farango; ary ampidiro ao anatin''ny efitra lamba ny fiaran''ny Vavolombelona; ary ny efitra lamba no hampisaraka ny fitoerana masina sy ny fitoerana masina indrindra ho anareo.'
mg1865::mg_2::26::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rakotra fanaovam-panavotana dia ataovy eo ambonin''ny fiaran''ny Vavolombelona eo amin''ny fitoerana masina indrindra.'
mg1865::mg_2::26::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary apetraho eo ivelan''ny efitra ny latabatra, ary ny fanaovan-jiro tandrifin''ny latabatra amin''ny lafiny atsimo amin''ny tabernakely; ary ny latabatra ataovy eo amin''ny lafiny avaratra.'
mg1865::mg_2::26::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova varavarana lamba ho eo amin''ny lay, dia amin''ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan''ny mahay tenona samy hafa soratra.'
mg1865::mg_2::26::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 26
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova andry hazo akasia dimy ho amin''ny varavarana lamba, ka petaho takela-bolamena; ary ho volamena koa ny fihantonany; ary mandrendreha faladia varahina dimy hiorenany.'
mg1865::mg_2::27::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny alitara amin''ny hazo akasia: dimy hakiho avy ny lafiny efatra, dia ho efa-joro tsy mivadi-mandry izy; ary telo hakiho ny hahavony.'
mg1865::mg_2::27::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny tandrony eo amin''ny zorony efatra, ka ataovy miray aminy; ary petaho takela-barahina.'
mg1865::mg_2::27::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny vilaniny fandraofan-davenona handraofana ny lavenony ary ny sotron''afony sy ny loviany famafazana ary ny fitrebiny sy ny fitondran''afony; varahina no hanaovanao ny fanaka rehetra momba azy.'
mg1865::mg_2::27::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova makarakara varahina tahaka ny harato ho eo aminy; ary manaova vava-varahina efatra hatao ambonin''ny harato eo amin''ny zorony efatra,'
mg1865::mg_2::27::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy eo ambanin''ny sikin''ny alitara hatreo ambodiny izany; ary aoka ny makarakara hanasaka ny alitara.'
mg1865::mg_2::27::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova bao ho amin''ny alitara, dia bao hazo akasia, ka petaho takela-barahina,'
mg1865::mg_2::27::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ampidiro eo amin''ny vava varahina ny bao; ary aoka ho eo amin''ny lafiny roa amin''ny alitara ny bao, raha lanjaina izy,'
mg1865::mg_2::27::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hazo fisaka no arafeto ho alitara, ka ataovy hobokaty; araka izay naseho taminao tao an-tendrombohitra no hanaovana azy.'
mg1865::mg_2::27::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova ny kianjan''ny tabernakely: amin''ny lafiny atsimo hisy fefy lamba rongony fotsy madinika voahasina ho amin''ny kianja, zato hakiho ny halavany amin''ny lafiny iray;'
mg1865::mg_2::27::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho roa-polo ny tsangantsangany, ary ho roa-polo ny faladiany varahina; ho volafotsy ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany,'
mg1865::mg_2::27::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tahaka izany amin''ny lafiny avaratra, amin''ny lavany dia hisy fefy lamba, zato hakiho ny halavany, ary ho roa-polo ny tsangantsangany, ary ho roa-polo ny faladiany varahina; ho volafotsy ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany,'
mg1865::mg_2::27::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy fefy lamba dimam-polo hakiho amin''ny sakan''ny kianja amin''ny lafiny andrefana; ho folo ny tsangantsangany, ary ho folo ny faladiany,'
mg1865::mg_2::27::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sakan''ny kianja amin''ny lafiny atsinanana ho dimam-polo hakiho.'
mg1865::mg_2::27::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy fefy lamba dimy ambin''ny folo hakiho amin''ny sakany iray; ho telo ny tsangantsangany, ary ho telo ny faladiany.'
mg1865::mg_2::27::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy fefy lamba dimy ambin''ny folo hakiho amin''ny sakany iray koa; ho telo ny tsangantsangany ary ho telo ny faladiany.'
mg1865::mg_2::27::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eo amin''ny vavahadin''ny kianja dia hisy vavahady sy lamba roa-polo hakiho, dia manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan''ny mahay tenona samy hafa soratra; ho efatra ny tsangantsangany, ary ho efatra ny faladiany.'
mg1865::mg_2::27::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsangantsangany rehetra amin''ny kianja manodidina dia samy hisy anjaka volafotsy hitohizany; ho volafotsy ny fihantonany, ary ho varahina ny faladiany,'
mg1865::mg_2::27::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lavan''ny kianja ho zato hakiho, ary ny sakany ho dimam-polo hakiho, ary ny hahavony ho dimy hakiho, ka hatao rongony fotsy madinika voahasina izany, ary ho varahina ny faladiany.'
mg1865::mg_2::27::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho varahina avokoa ny fiasana rehetra momba ny tabernakely; ary ny tsimatra rehetra momba azy sy ny tsimatry ny kianja ho varahina koa.'
mg1865::mg_2::27::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandidia ny Zanak''Isiraely hitondra aminao diloilon''oliva tsara voavely hatao fanazavana, mba hampirehetana jiro mandrakariva.'
mg1865::mg_2::27::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao anatin''ny trano lay fihaonana, dia eo ivelan''ny efitra lamba izay manakona ny Vavolombelona, no handaharan''i Arona sy ny zanany azy ho eo anatrehan''i Jehovah hatramin''ny hariva ka hatramin''ny maraina; ho lalàna mandrakizay amin''ny Zanak''Isiraely izany hatramin''ny taranany fara mandimby,'
mg1865::mg_2::28::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hanendrena ny mpisorona, sy izay ho fomban''ny fitafiany.'
  verse_text: 'Ary asaovy manatona anao Arona rahalahinao mbamin''ny zanany, avy amin''ny Zanak''Isiraely, mba ho mpisorona ho Ahy izy, dia Arona mbamin''i Nadaba sy Abiho sy Eleazara ary Itamara, zanak''i Arona.'
mg1865::mg_2::28::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova fitafiana masina ho an''i Arona rahalahinao ho voninahitra sy ho fahatsaran-tarehy.'
mg1865::mg_2::28::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitenena amin''izay hendry fo, izay nofenoiko fanahim-pahendrena, mba hanao ny fitafian''i Arona hanamasinana azy ho mpisorona ho Ahy.'
mg1865::mg_2::28::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fitafiana izay hataony: saron-tratra sy efoda sy akanjo ivelany sy akanjo lava tenom-boaroy sy hamama ary fehin-kibo; dia hanao fitafiana masina ho an''i Arona rahalahinao izy, sy ho an''ny zanany, mba ho mpisorona ho Ahy izy.'
mg1865::mg_2::28::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka haka ny volamena sy ny manga sy ny volomparasy sy ny mena ary ny rongony fotsy madinika izy.'
mg1865::mg_2::28::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka izy hanao ny efoda amin''ny volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan''ny mpanenona mahay.'
mg1865::mg_2::28::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisy soroka roa avy amin''ny sisiny roa hampikambana azy.'
mg1865::mg_2::28::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fehin-kibo momba ny efoda, izay eo amboniny ka hiray aminy sady hitovy tarehy aminy, dia hatao volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina.'
mg1865::mg_2::28::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary makà vato beryla roa, ka soraty eo aminy ny anaran''ny Zanak''Isiraely:'
mg1865::mg_2::28::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny anarany enina amin''ny vato iray, ary ny anarany enina kosa amin''ny vato iray, araka ny fizokiany;'
mg1865::mg_2::28::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny asan''ny mpanora-bato, tahaka ny fanoratana fanombohan-kase, no hanoratanao ny vato roa, araka ny anaran''ny Zanak''Isiraely; ary asio randram-bolamena manodidina izy,'
mg1865::mg_2::28::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy eo amin''ny soroky ny efoda ny vato roa, ho vato fahatsiarovana ho an''ny Zanak''Isiraely; ary Arona hitondra ireo anarany ireo eo anatrehan''i Jehovah amin''ny sorony roa ho fahatsiarovana.'
mg1865::mg_2::28::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova randram-bolamena'
mg1865::mg_2::28::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy olam-bolamena tsara roa; mifanolana toy ny tady no hanaovanao ireo, ary hataonao eo amin''ny randram-bolamena ireo alom-bolamena toy ny tady ireo.'
mg1865::mg_2::28::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova saron-tratra fitsarana, ka asan''ny mpanenona mahay, toy ny nanaovana ny efoda, no hanaovanao azy; volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina no hanaovanao azy.'
mg1865::mg_2::28::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho efa-joro miforitra roa izy, ary ho irain-jehy avy ny lafiny efatra.'
mg1865::mg_2::28::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio vato alatsaka an-tranontranony izy, dia vato efatra an-dàlana: ny andalana voalohany dia karnelia sy topaza ary emeralda;'
mg1865::mg_2::28::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andalana faharoa dia robina sy safira ary onyksa;'
mg1865::mg_2::28::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andalana fahatelo dia opala sy agata ary ametysta;'
mg1865::mg_2::28::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andalana fahefatra dia krysolita sy beryla ary jaspy; ary asio randram-bolamena ny fitoerany avy.'
mg1865::mg_2::28::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vato dia alaharo araka ny anaran''ny Zanak''Isiraely, dia roa ambin''ny folo araka ny anarany; ary hisy soratra toy ny amin''ny fanombohan-kase, ho amin''ny firenena roa ambin''ny folo araka ny anarany avy.'
mg1865::mg_2::28::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eo amin''ny saron-tratra asio olam-bolamena tsara mifanolana toy ny tady.'
mg1865::mg_2::28::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova vava volamena roa ho eo amin''ny saron-tratra; ary ny vava vola roa dia ataovy eo amin''ny zorony roa ambony amin''ny saron-tratra.'
mg1865::mg_2::28::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tady volamena roa dia ataovy eo amin''ny vava vola roa, izay amin''ny zorony roa ambony amin''ny saron-tratra.'
mg1865::mg_2::28::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lanin''ny tady roa dia ataovy eo amin''ny soroky ny efoda anoloana.'
mg1865::mg_2::28::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova vava volamena roa, ka ataovy amin''ny zorony roa ambany amin''ny saron-tratra, dia amin''ny sisiny anatiny, izay manolotra ny efoda.'
mg1865::mg_2::28::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova vava volamena roa koa, ka ataovy eo amin''ny soroko roa amin''ny efoda, dia ao ambaniny, eo anoloany, akaikin''ny fikambanany, eo ambonin''ny fehin-kibo momba ny efoda.'
mg1865::mg_2::28::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary kofehy manga no hamehezana ny vava volan''ny saron-tratra amin''ny vava volan''ny efoda, mba ho eo ambonin''ny fehin-kibo momba ny efoda ny saron-tratra, ka tsy ho afaka eo.'
mg1865::mg_2::28::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona hitondra ny anaran''ny Zanak''Isiraely eo amin''ny saron-tratra fitsarana manolotra ny fony, raha miditra amin''ny fitoerana masina izy, mba ho fahatsiarovana mandrakariva eo anatrehan''i Jehovah.'
mg1865::mg_2::28::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy eo amin''ny saron-tratra fitsarana ny Orima sy Tomima; ary hanolotra ny fon''i Arona izany, raha miditra eo anatrehan''i Jehovah izy; ka dia ho entin''i Arona manolotra ny fony mandrakariva eo anatrehan''i Jehovah ny fitsarana ny Zanak''Isiraely.'
mg1865::mg_2::28::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny akanjo ivelany misy ny efoda dia ataovy manga avokoa.'
mg1865::mg_2::28::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio vozony eo afovoany, ary aoka hisy sisiny voatenona manodidina ny vozony, tahaka ny vozon''ny akanjo fiarovan-tratra, mba tsy hahatriatra azy.'
mg1865::mg_2::28::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio sarin''ampongaben-danitra manga sy volomparasy sy mena manodidina eny amin''ny moron-tongony, ary famohamandry volamena kosa eo anelanelany manodidina:'
mg1865::mg_2::28::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia famohamandry sy sarin''ampongaben-danitra mifanelanelana manodidina eny amin''ny moron-tongotry ny akanjo ivelany.'
mg1865::mg_2::28::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiakanjoan''i Arona izany, raha manao ny fanompoam-pivavahany izy, mba ho re ny fanenony, raha miditra amin''ny fitoerana masina eo anatrehan''i Jehovah sy raha mivoaka izy, mba tsy hahafaty azy.'
mg1865::mg_2::28::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova takela-bolamena tsara, ka asio soratra eo aminy, araka ny fanoratana fanombohan-kase, hoe: HAMASININA HO AN''I JEHOVAH.'
mg1865::mg_2::28::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio kofehy manga izy, ka ataovy eo amin''ny hamama: dia eo anoloan''ny hamama no hasiana azy.'
mg1865::mg_2::28::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho eo ambonin''ny handrin''i Arona izy, mba ho entin''i Arona ny heloky ny zava-masina, izay hohamasinin''ny Zanak''Isiraely amin''ny fanomezany masina rehetra; ary ho eo amin''ny handriny mandrakariva izany, mba hankasitrahana eo anatrehan''i Jehovah ny olona.'
mg1865::mg_2::28::39:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny akanjo lava dia ataovy hariry madinika tenom-boaroy; ary manaova hamama rongony fotsy madinika sy fehin-kibo, asan''ny mahay tenona samy hafa soratra.'
mg1865::mg_2::28::40:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova akanjo lava ho an''ny zanak''i Arona, ary manaova fehin-kibo ho azy; ary manaova satroka boribory ho azy ho voninahitra sy ho fahatsaran-tarehy.'
mg1865::mg_2::28::41:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy amin''i Arona rahalahinao sy ny zanany koa ireo; dia manosora azy sy manokana azy ary manamasina azy, mba ho mpisorona ho Ahy izy.'
mg1865::mg_2::28::42:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova kalisaona fohy rongony fotsy ho azy hanarona ny fitanjahany; hatramin''ny valahany ka hatramin''ny feny no hisy azy.'
mg1865::mg_2::28::43:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 28
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiakanjoan''i Arona sy ny zanany ireo, raha miditra amin''ny trano-lay fihaonana izy, na manakaiky ny alitara hanao fanompoam-pivavahana ao amin''ny fitoerana masina, mba tsy hahazoany heloka hahafaty azy; ho lalàna mandrakizay aminy sy amin''ny taranany mandimby azy izany.'
mg1865::mg_2::29::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fanokanana ny mpisorona'
  verse_text: 'Ary izao no zavatra hataonao aminy hanamasinana azy ho mpisorona ho Ahy: makà vantotr''ombilahy iray sy ondrilahy roa tsy misy kilema,'
mg1865::mg_2::29::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mofo tsy misy masirasira sy mofo tsy misy masirasira voaharo diloilo ary mofo manify tsy misy masirasira sady voahoso-diloilo; koba tsara toto no hanaovanao azy.'
mg1865::mg_2::29::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy eo anaty harona iray izy, ka ento amin''ny harona; ary ny vantotr''ombilahy sy ny ondrilahy roa dia ento koa.'
mg1865::mg_2::29::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona Sy ny zanany dia ento hankeo amin''ny varavaran''ny trano-lay fihaonana, ka ampandroy amin''ny rano izy'
mg1865::mg_2::29::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny fitafiana ka ampiakanjoy an''i Arona ny akanjo lava sy ny akanjo ivelany misy ny efoda ary ny efoda sy ny saron-tratra ary fehezo amin''ny fehin-kibo mamba ny efoda izy;'
mg1865::mg_2::29::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hamama dia ataovy eo amin''ny lohany, ary ny diadema masina dia ataovy eo amin''ny hamama.'
mg1865::mg_2::29::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny diloilo fanosorana, ka aidino amin''ny lohany, dia manosora azy.'
mg1865::mg_2::29::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanany dia ento koa, ka ampiakanjoy akanjo lava.'
mg1865::mg_2::29::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fehezo amin''ny fehin-kibo izy, dia Arona sy ny zanany, ary fehezo aminy ny satroka boribory; ary ho azy ny fisoronana ho lalàna mandrakizay. Dia toy izany no hanokananao an''i Arona sy ny zanany.'
mg1865::mg_2::29::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asaovy entina ho eo anoloan''ny trano-lay fihaonana ny vantotr''ombilahy; ary aoka Arona sy ny zanany hametraka ny tanany amin''ny lohan''ny vantotr''ombilahy;'
mg1865::mg_2::29::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia vonoy eo anatrehan''i Jehovah ny vantotr''ombilahy, eo anoloan''ny varavaran''ny trano-lay fihaonana;'
mg1865::mg_2::29::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary analao ny ran''ny vantotr''ombilahy, dia atenteno eo amin''ny tandroky ny alitara amin''ny fanondronao, ary ny rà sisa rehetra dia aidino eo am-bodin''ny alitara;'
mg1865::mg_2::29::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary alao ny safo-drorohany rehetra sy ny ila-atiny lehibe ary ny voany roa mbamin''ny fonom-boany, ka dory ho fofona eo ambonin''ny alitara;'
mg1865::mg_2::29::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny henan''ny vantotr''ombilahy sy ny hodiny ary ny tain-drorohany dia dory amin''ny afo eny ivelan''ny toby; fanatitra noho ny ota izany.'
mg1865::mg_2::29::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny ondrilahy iray; ary aoka Arona sy ny zanany hametraka ny tanany amin''ny lohan''ny ondrilahy;'
mg1865::mg_2::29::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia vonoy ny ondrilahy, ka tantazo ny ràny, dia atopazy manodidina amin''ny lafin''ny alitara;'
mg1865::mg_2::29::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rasao tsara ny ondrilahy, dia sasao ny taovany sy ny tongony, ka ataovy eo ambonin''ny voarasa sy ny lohany;'
mg1865::mg_2::29::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dory ho fofona eo ambonin''ny alitara ny tenan''ny ondrilahy; ho fanatitra dorana ho an''i Jehovah izany, dia hanitra ankasitrahana, fanatitra atao amin''ny afo ho an''i Jehovah.'
mg1865::mg_2::29::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny ondrilahy iray koa; ary aoka Arona sy ny zanany hametraka ny tanany amin''ny lohan''ny ondrilahy;'
mg1865::mg_2::29::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia vonoy ny ondrilahy ka analao ny ràny, dia atenteno amin''ny tendron''ny ravin-tsofina ankavanan''i Arona sy amin''ny tendron''ny ravin-tsofina ankavanan''ny zanany, ary amin''ny ankihiben-tanany ankavanana sy amin''ny ankihiben-tongony ankavanana; ary ny rà sisa dia atopazy manodidina amin''ny lafin''ny alitara'
mg1865::mg_2::29::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary analao ny rà, izay eo ambonin''ny alitara, sy ny diloilo fanosorana, ka afafazo amin''i Arona sy amin''ny fitafiany, ary amin''ny zanany sy amin''ny fitafian''ny zanany koa; dia ho masina izy sy ny fitafiany ary ny zanany sy ny fitafian''ny zanany koa.'
mg1865::mg_2::29::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny saboran''ny ondrilahy sy ny hofany sy ny safo-drorohany sy ny ila-atiny lehibe sy ny voany roa mbamin''ny fonom-boany ary ny soroka ankavanana; fa ondrilahy fanakanana izy;'
mg1865::mg_2::29::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manala iray amin''ny mofo sy iray amin''ny mofo voaisy diloilo ary iray amin''ny mofo manify izay eo amin''ny harona misy ny mofo tsy misy masirasira, izay eo anatrehan''i Jehovah;'
mg1865::mg_2::29::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ataovy eo an-tanan''i Arona sy eo an-tanan''ny zanany izy rehetra, ka ahevahevao izy hofanatitra ahevaheva eo anatrehan''i Jehovah.'
mg1865::mg_2::29::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiso amin''ny tanany izany, ka dory ho fofona eo ambonin''ny alitara, miaraka amin''ny fanatitra dorana ho hanitra ankasitrahana eo anatrehan''i Jehovah, dia fanatitra atao amin''ny afo, ho an''i Jehovah.'
mg1865::mg_2::29::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny tratran''ny ondrilahy fanokanana an''i Arona, ka ahevahevao ho fanatitra ahevaheva eo anatrehan''i Jehovah; dia ho anjaranao izany.'
mg1865::mg_2::29::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamasino ny tratran''ny fanatitra ahevaheva sy ny soroky ny fanatitra asandratra, izay ahevaheva sy izay asandratra avy amin''ny ondrilahy fanokanana, dia izay ho an''i Arona sy izay ho an''ny zanany.'
mg1865::mg_2::29::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho anjara mandrakizay ho an''i Arona sy ho an''ny taranany avy amin''ny Zanak''Isiraely izany, fa fanatitra asandratra izany; ary hisy fanatitra asandratra haterin''ny Zanak''Isiraely avy amin''ny fanati-pihavanany rehetra ho fanatitra asandratra ho an''i Jehovah.'
mg1865::mg_2::29::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fitafiana masina izay an''i Arona dia ho an''ny zanany mandimby azy koa hanosorana azy sy hanokanana azy.'
mg1865::mg_2::29::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiakanjo azy hafitoana izay anankiray amin''ny zanany ho mpisarona handimby azy, dia izay miditra amin''ny trano-lay fihaonana hanao fanompoam-pivavahana ao amin''ny fitoerana masina.'
mg1865::mg_2::29::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny ondrilahy fanokanana ka andrahoy eo amin''izay fitoerana masina ny henany'
mg1865::mg_2::29::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hohanin''i Arona sy ny zanany eo anoloan''ny varavaran''ny trano-lay fihaonana ny henan''ny ondrilahy sy ny mofo izay eo anatin''ny harona.'
mg1865::mg_2::29::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 33
  verse_date_revised: '2022-08-08T08:07:00+0000'
  verse_title: null
  verse_text: 'Ary izy no hihinana izany zavatra izany, izay nanaovana fanavotana ho azy, mba hanokanana sy hanamasinana azy; fa ny vahiny tsy mba hihinana, satria masina izany.'
mg1865::mg_2::29::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy sisa tsy lany amin''ny henan''ny fanatitra fanokanana, na amin''ny mofo, ka tra-maraina, dia hodoranao amin''ny afo ny sisa tsy lany: tsy hohanina izany, satria masina.'
mg1865::mg_2::29::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia manaova izany amin''i Arona sy ny zanany, araka izay rehetra nandidiako anao; hafitoana no hanokananao azy.'
mg1865::mg_2::29::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vantotr''ombilahy iray no haterinao isan''andro ho fanatitra noho ny ota, hanaovana fanavotana; ary diovy ny alitara, raha manao fanavotana azy ianao; ary hosory izy hanamasina azy.'
mg1865::mg_2::29::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no hanaovanao fanavotana ho an''ny alitara sy hanamasinanao azy; dia ho masina indrindra ny alitara, ary ho masina izay rehetra manendry azy.'
mg1865::mg_2::29::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny fanatitra isa-maraina sy isan-kariva'
  verse_text: 'Ary izao no haterinao eo ambonin''ny alitara: zanak''ondry roa izay iray taona isan''andro isan''andro'
mg1865::mg_2::29::39:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: '(ny zanak''ondry iray haterinao nony maraina, ary ny zanak''ondry iray koa haterinao nony hariva),'
mg1865::mg_2::29::40:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto ampahafolon''ny efaha voaharoharo diloilo voavely ampahefatry ny hina sy divay ampahefatry ny hina, ho fanatitra aidina amin''ny isan-janak''ondry iray.'
mg1865::mg_2::29::41:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''ondry iray koa haterinao nony hariva; ary fanatitra hohanina sy fanatitra aidina tahaka ny natao tamin''ny fanatitra maraina no hampombainao azy, ho hanitra ankasitrahana, dia fanatitra atao amin''ny afo ho an''i Jehovah.'
mg1865::mg_2::29::42:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho fanatitra dorana mandrakariva izany hatramin''ny taranakareo fara mandimby, eo anoloan''ny varavaran''ny trano-lay fihaonana eo anatrehan''i Jehovah, dia ao amin''izay hihaonako aminareo hiteny aminao'
mg1865::mg_2::29::43:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hihaona amin''ny Zanak''Isiraely ao Aho, ka hohamasinin''ny voninahitro izy.'
mg1865::mg_2::29::44:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hohamasiniko ny trano-lay fihaonana sy ny alitara; ary hohamasiniko koa Arona sy ny zanany mba ho mpisorona ho Ahy.'
mg1865::mg_2::29::45:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary honina eo amin''ny Zanak''Isiraely Aho ka ho Andriamaniny.'
mg1865::mg_2::29::46:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 29
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantany fa Izaho no Jehovah Andriamaniny, Izay nitondra azy nivoaka avy tany amin''ny tany Egypta, mba honina eo aminy Aho; Izaho no Jehovah Andriamaniny.'
mg1865::mg_2::30::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny alitara fandoroana ditin-kazo manitra'
  verse_text: 'Ary manaova alitara handoroana ditin-kazo manitra; hazo akasia no hanaovanao azy.'
mg1865::mg_2::30::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho iray hakiho avy ny lafiny efatra, dia ho efa-joro izy, ary ho roa hakiho ny hahavony; koa ataovy miray aminy ny tandrony.'
mg1865::mg_2::30::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary petaho takela-bolamena tsara izy, dia ny tampony sy ny lafiny manodidina ary ny tandrony; ary asio koronosy volamena manodidina.'
mg1865::mg_2::30::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio vava volamena roa izy eo ambanin''ny koronosiny, ka ataovy eo amin''ny zorony efatra ireo; ary ho fitoeran''ny bao ireo hilanjana azy.'
mg1865::mg_2::30::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hazo akasia no anaovy ny bao, ka petaho takela-bolamena.'
mg1865::mg_2::30::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary apetraho eo anoloan''ny efitra izay manakona ny fiaran''ny Vavolombelona izy, dia manandrify ny rakotra fanaovam-panavotana eo ambonin''ny Vavolombelona, izay hihaonako aminao.'
mg1865::mg_2::30::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona handoro ditin-kazo mani-pofona eo; isa-maraina, raha mamboatra ny lela fanaovan-jiro, no handoroany izany;'
mg1865::mg_2::30::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha mampirehitra ny lela fanaovan-jiro Arona nony hariva no handoroany izany koa; ditin-kazo mani-pofona eo anatrehan''i Jehovah mandrakariva hatramin''ny taranakareo fara mandimby izany.'
mg1865::mg_2::30::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manatitra ditin-kazo manitra tsy izy eo ianareo, na fanatitra dorana, na fanatitra hohanina; ary aza manidina fanatitra aidina eo.'
mg1865::mg_2::30::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka Arona hanao fanavotana eo amin''ny tandrony indray mandeha isan-kerintaona; amin''ny ran''ny fanatitra noho ny ota, izay atao fanavotana, indray mandeha isan-kerintaona, no hanaovany fanavotana eo, hatramin''ny taranakareo fara mandimby; ho masina indrindra ho an''i Jehovah izany.'
mg1865::mg_2::30::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny handoavana ny vola avotra'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe;'
mg1865::mg_2::30::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha maka ny isan''ny Zanak''Isiraely araka ny fandaminana azy ianao, dia samy handoa avotry ny ainy avy ho an''i Jehovah ny isan-olona, raha alamina izy, mba tsy hisy areti-mandringana hanjo azy, raha alamina izy.'
mg1865::mg_2::30::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no haloan''izay rehetra voalamina, dia antsasaky ny sekely avy araka ny sekely masina (gera roa-polo ny sekely iray), eny, antsasaky ny sekely ho fanatitra ho an''i Jehovah.'
mg1865::mg_2::30::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra voalamina hatramin''ny roa-polo taona no ho miakatra no handoa ny fanatitra ho an''i Jehovah.'
mg1865::mg_2::30::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny manan-karena tsy handoa mihoatra noho ny antsasaky ny sekely, ary ny malahelo tsy handoa latsaka, raha mandoa ny fanatitra ho an''i Jehovah izy, hanavotra ny ainareo.'
mg1865::mg_2::30::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary handray ny vola avotra amin''ny Zanak''Isiraely ianao, ka hataonao amin''ny fanompoana ao amin''ny trano-lay fihaonana; ary ho fahatsiarovana ho an''ny Zanak''Isiraely eo anatrehan''i Jehovah izany, ho avotry ny ainareo.'
mg1865::mg_2::30::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny tavy, sy ny diloilo fanosorana, ary ny ditin-kazo manitra'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::30::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova tavy varahina hanasana, ary aoka ho varahina koa ny faladiany; ary apetraho eo anelanelan''ny trano-lay fihaonana sy ny alitara izy, ka asio rano eo anatiny.'
mg1865::mg_2::30::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eo no hanasan''i Arona sy ny zanany ny tongony aman-tanany.'
mg1865::mg_2::30::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miditra amin''ny trano-lay fihaonana izy, dia hisasa amin''ny rano, mba tsy hahafaty azy. Ary raha manakaiky ny alitara hanao fanompoam-pivavahana izy, mba handoro ny fanatitra atao amin''ny afo ho an''i Jehovah,'
mg1865::mg_2::30::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanasa ny tongony aman-tanany izy, mba tsy hahafaty azy; ary ho lalàna mandrakizay aminy sy ny zanany izany hatramin''ny taranany fara mandimby.'
mg1865::mg_2::30::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::30::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Makà zava-manitra tsara ho anao, dia miora mitete dimam-jato sekely sy havozomanitra antsasak''izany, dia dimam-polo amby roan-jato, sy veromanitra dimam-polo amby roan-jato'
mg1865::mg_2::30::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy kasia dimam-jato; araka ny sekely masina, ary diloilon''oliva eran''ny hina;'
mg1865::mg_2::30::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia amboary ho diloilo fanosorana masina izany, ho zavatra aharoharo, asan''ny mpangaroharo zava-manitra; ho diloilo fanosorana masina izany.'
mg1865::mg_2::30::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosory amin''izany ny trano-lay fihaonana sy ny fiaran''ny Vavolombelona,'
mg1865::mg_2::30::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny latabatra mbamin''ny fanaka rehetra momba azy sy ny fanaovan-jiro mbamin''ny fanaka momba azy sy ny alitara fandoroana ditin-kazo manitra,'
mg1865::mg_2::30::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny alitara fandoroana ny fanatitra dorana mbamin''ny fanaka rehetra momba azy ary ny tavy sy ny faladiany.'
mg1865::mg_2::30::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamasino ireo mba ho masina indrindra; ary ho masina izay rehetra manendry azy.'
mg1865::mg_2::30::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosory Arona sy ny zanany, ka hamasino izy mba ho mpisorona ho Ahy.'
mg1865::mg_2::30::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitenena amin''ny Zanak''Isiraely hoe: Ity ho diloilo fanosorana masina ho Ahy hatramin''ny taranakareo fara mandimby.'
mg1865::mg_2::30::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hihosoran''ny olon-kafa izany, na hisy haka tahaka azy, araka ny fanaovana azy; fa masina izy ka ho masina aminareo.'
mg1865::mg_2::30::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na zovy na zovy mangaroharo izay tahaka azy, ary na zovy na zovy manosotra azy amin''ny vahiny dia hofongorana tsy ho amin''ny fireneny.'
mg1865::mg_2::30::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Makà zava-manitra ho anao, dia natafa sy sekeleta sy helbena ary lebona madio; samy hamboarina manokana ireo.'
mg1865::mg_2::30::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy ditin-kazo manitra izy, dia zavatra aharoharo araka ny fanaon''ny mpangaroharo zava-manitra, dia asio sira izy, ary aoka ho madio sy masina.'
mg1865::mg_2::30::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary torotoroy ny sasany ho madinika indrindra, dia ataovy eo anoloan''ny Vavolombelona ao amin''ny trano-lay fihaonana, izay hihaonako aminao; ho masina indrindra ho anareo izany.'
mg1865::mg_2::30::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny ditin-kazo manitra izay hataonao, dia aza mba misy atao tahaka azy ny ho anareo; ho masina aminao ho an''i Jehovah izany.'
mg1865::mg_2::30::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 30
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na zovy na zovy manao izay tahaka azy ho fanorohana dia hofongorana tsy ho amin''ny fireneny.'
mg1865::mg_2::31::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanendrena an''i Bezalila sy Oholiaba ho lohan''ny mpiasa'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::31::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa notononiko anarana Bezalila, zanak''i Ory, zanak''i Hora, avy amin''ny firenen''i Joda;'
mg1865::mg_2::31::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa nofenoiko fanahin''Andriamanitra izy, dia fahendrena sy fahiratan-tsaina sy fahalalana ny amin''ny tao-zavatra samy hafa:'
mg1865::mg_2::31::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny hihevitra hanao asa kanto, ny hiasa volamena sy volafotsy ary varahina'
mg1865::mg_2::31::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny hamboatra vato halatsaka an-tranontranony ary ny handrafitra hazo, mba hanaovany ny tao-zavatra samy hafa.'
mg1865::mg_2::31::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Izaho efa nanome an''i Oholiaba, zanak''i Ahisamaka, avy amin''ny firenen''i Dana, ho namany; ary ny fon''izay hendry rehetra dia efa nasiako fahendrena, mba hanaovany izay rehetra efa nandidiako anao:'
mg1865::mg_2::31::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny trano-lay fihaonana sy ny fiara hasiana ny Vavolombelona sy ny rakotra fanaovam-panavotana, izay eo amboniny, sy ny fanaka rehetra momba ny trano-lay.'
mg1865::mg_2::31::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny latabatra mbamin''ny fanaka momba azy, sy ny fanaovan-jiro tsara mbamin''ny fanaka rehetra momba azy, sy ny alitara fandoroana ditin-kazo manitra'
mg1865::mg_2::31::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny alitara fandoroana ny fanatitra odorana mbamin''ny fanaka rehetra momba azy, ary ny tavy, sy ny faladiany.'
mg1865::mg_2::31::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fitafiana makarakara sy ny fitafiana masina ho an''i Arona mpisorona sy ny fitafian''ny zanany ho entiny misorona,'
mg1865::mg_2::31::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny diloilo fanosorana sy ny ditin-kazo manitra ho ao amin''ny fitoerana masina: araka izay rehetra nandidiako anao no aoka hataon''ireo.'
mg1865::mg_2::31::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny amin''ny fitandremana ny Sabata'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::31::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia milaza amin''ny Zanak''Isiraely ianao hoe: Ny Sabatako no tandremo; fa famantarana ho amiko, sy ho aminareo hatramin''ny taranakareo fara mandimby izany, mba ho fantatrareo fa Izaho no Jehovah Izay manamasina anareo.'
mg1865::mg_2::31::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo ny Sabata, fa masina aminareo izany; izay tsy manamasina azy dia hatao maty tokoa, fa izay rehetra manao raharaha amin''izany dia hofongorana tsy ho amin''ny fireneny.'
mg1865::mg_2::31::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hanaovana raharaha; fa ny andro fahafito dia tena fitsaharana ka masina ho an''i Jehovah: izay rehetra manao raharaha amin''ny andro Sabata dia hatao maty tokoa.'
mg1865::mg_2::31::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotandreman''ny Zanak''Isiraely ny Sabata hankatoavany azy hatramin''ny taranany fara mandimby, dia fanekena mandrakizay izany.'
mg1865::mg_2::31::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho famantarana amiko sy amin''ny Zanak''Isiraely mandrakizay izany; fa tamin''ny henemana no nanaovan''i Jehovah ny lanitra sy ny tany, ary tamin''ny andro fahafito dia nitsahatra Izy ka niala sasatra.'
mg1865::mg_2::31::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nanomezan''Andriamanitra ny vato fisaka izay nisy ny Lalàna'
  verse_text: 'Ary rehefa vita ny teny nataony tamin''i Mosesy tao an-tendrombohitra Sinay, dia nomeny azy ny vato fisaka roa, izay nisy ny Vavolombelona, dia vato fisaka voasoratry ny rantsan-tanan''Andriamanitra.'
mg1865::mg_2::32::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanaovan''ny Zanak''Isiraely ombilahy kely volamena hiankohofany, sy ny fahatezeran''Andriamanitra noho izany'
  verse_text: 'Ary rehefa hitan''ny olona fa efa ela ka tsy mbola nidina avy tao an-tendrombohitra ihany Mosesy, dia niangona ho eo amin''i Arona izy ka nanao taminy hoe: Mitsangana, ka anaovy andriamanitra izahay, hitarika antsika eo aloha; fa ilay Mosesy iny, izay lehilahy nitondra antsika niakatra avy tany amin''ny tany Egypta, dia tsy fantatray izay nanjo azy,'
mg1865::mg_2::32::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Arona taminy: Romboty ary ny kavim-bolamena, izay eny amin''ny sofin''ny vadinareo sy ny zanakareo-lahy ary ny zanakareo-vavy, ka ento ety amiko.'
mg1865::mg_2::32::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra dia nandrombotra ny kavim-bolamena izay teny amin''ny sofiny ka nitondra azy ho eo amin''i Arona.'
mg1865::mg_2::32::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nandray azy tamin''ny tanan''ny olona, dia namboatra azy tamin''ny fandraka ka nanao azy ho ombilahy kely anidina; dia niteny ny olona ka nanao hoe: Io no andriamanitrao, ry Isiraely, izay nitondra anao niakatra avy tany amin''ny tany Egypta.'
mg1865::mg_2::32::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''i Arona izany, dia nanao alitara teo anoloany izy; ary dia niantso Arona ka nanao hoe: Andro firavoravoana ho an''i Jehovah rahampitso.'
mg1865::mg_2::32::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa ny olona ka nanatitra fanatitra dorana sy nitondra fanati-pihavanana; ary nipetraka hihinana sy hisotro ny olona, dia nitsangana hilalao.'
mg1865::mg_2::32::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Mandehana midina ianao; fa efa nanao ratsy ny olonao izay nentinao niakatra avy tany amin''ny tany Egypta.'
mg1865::mg_2::32::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nalaky nivily niala tamin''ny lalàna izay nasaiko nalehany izy ka efa nanao ombilahy kely anidina ho azy; ary efa niankohoka teo anatrehany sy namono zavatra hatao fanatitra taminy izy ka nanao hoe: Io no andriamanitrao, ry Isiraely, izay nitondra anao niakatra avy tany amin''ny tany Egypta.'
mg1865::mg_2::32::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Efa hitako io firenena io, fa, indro, firenena mafy hatoka izy.'
mg1865::mg_2::32::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny avelao hirehitra aminy ny fahatezerako, ka haringako izy; fa hahatonga anao ho firenena lehibe Aho.'
mg1865::mg_2::32::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mosesy nifona tamin''i Jehovah Andriamaniny ka nanao hoe: Jehovah o, nahoana ny fahatezeranao no mirehitra amin''ny olonao, izay nentinao nivoaka avy tany amin''ny tany Egypta tamin''ny hery lehibe sy ny tanana mahery?'
mg1865::mg_2::32::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ny Egyptiana no avela hilaza hoe: Mba hahita loza no nitondrany ireny nivoaka, hamonoany azy eny an-tendrombohitra sy handringanany azy tsy ho ambonin''ny tany? Mialà amin''ny fahatezeranao mirehitra, ka manenena ny amin''ny loza izay hanjo ny olonao.'
mg1865::mg_2::32::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy Abrahama sy Isaka ary Isiraely mpanomponao, izay nianiananao tamin''ny tenanao sy nilazanao hoe: Hahamaro ny taranakareo Aho ho tahaka ny kintana eny amin''ny lanitra; ary izany tany rehetra nolazaiko izany dia homeko ny taranakareo, ary izy handova izany mandrakizay.'
mg1865::mg_2::32::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia nanenina ny amin''ny loza izay nokasainy hamelezana ny olony.'
mg1865::mg_2::32::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nihodina ka nidina avy tao an-tendrombohitra, nitondra ny vato fisaka roa nisy ny Vavolombelona teny an-tanany; ny vato fisaka nosoratana teo amin''ny lafiny roa: dia teo anatrehany sy teo ambadika no nisy ny soratra.'
mg1865::mg_2::32::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vato fisaka dia asan''Andriamanitra, ary ny soratra dia soratr''Andriamanitra, voasoratra teo amin''ny vato fisaka.'
mg1865::mg_2::32::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Josoa ny fitabataban''ny olona izay nihorakoraka, dia hoy izy tamin''i Mosesy: Misy tabataban''ady atsy an-toby.'
mg1865::mg_2::32::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy: Tsy feo fihobian''ny mahery na feo fitomanian''ny resy no reko, fa feon''ny mihira.'
mg1865::mg_2::32::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanakaiky ny toby izy, dia nahita ny ombilahy kely sy ny dihy; ary nirehitra ny fahatezeran''i Mosesy, dia natontany ny vato fisaka teny an-tanany ka novakivakiny teo am-bodin''ny tendrombohitra.'
mg1865::mg_2::32::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalainy ilay ombilahy kely izay efa nataon''ny olona ka nodorany tamin''ny afo, ary notorotoroiny ho vovoka, dia nafafiny tambonin''ny rano ka nampisotroiny ny Zanak''Isiraely.'
mg1865::mg_2::32::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Arona: Inona no nataon''ity firenena ity taminao, no nitondranao heloka lehibe taminy?'
mg1865::mg_2::32::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Arona: Aoka tsy hirehitra ny fahatezeranao, tompoko, fa ianao mahalala ny toetry ny olona, fa mpanao ratsy izy;'
mg1865::mg_2::32::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy izy tamiko: Manaova andriamanitra ho antsika, hitarika antsika eo aloha; fa ilay Mosesy iny, izay lehilahy nitondra antsika niakatra avy tany amin''ny tany Egypta, dia tsy fantatray izay nanjo azy.'
mg1865::mg_2::32::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho taminy: Na zovy na zovy manam-bolamena, aoka handrombotra izany izy, ka dia nomeny ahy; ary natsipiko tao anaty afo izany, ka io ombilahy kely io no nivoaka.'
mg1865::mg_2::32::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Mosesy fa natondraka hanaram-po amin''izay tsy mety ny olona, satria efa natondrak''i Arona ho fanakorana eo amin''ny fahavalony izy,'
mg1865::mg_2::32::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nijanona teo amin''ny vavahadin''ny toby Mosesy ka nanao hoe: Izay rehetra an''i Jehovah mankanesa ety amiko. Ary ny taranak''i Levy rehetra niangona teo aminy.'
mg1865::mg_2::32::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Samia manao ny sabany eo am-balahany avy ianareo, dia mandrosoa sy miverimberena amin''isam-bavahadin''ny toby, ary samia mamono ny rahalahiny avy sy ny sakaizany avy ary ny namany avy ianareo.'
mg1865::mg_2::32::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao araka ny tenin''i Mosesy ny taranak''i Levy; ary nahafatesana tokony ho telo arivo lahy ny olona tamin''izany andro izany.'
mg1865::mg_2::32::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mosesy efa nilaza hoe: Manokàna ny tenanareo ho an''i Jehovah ianareo anio; eny, samia mamono ny zanany sy ny rahalahiny avy, mba hahazoanareo fitahiana anio.'
mg1865::mg_2::32::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 30
  verse_date_revised: null
  verse_title: 'Ny nifonan''i Mosesy, sy ny navalin''Andriamanitra azy'
  verse_text: 'Ary nony maraina dia hoy Mosesy tamin''ny olona: Efa nanao fahotana lehibe ianareo; ary ankehitriny, dia hiakatra ho amin''i Jehovah aho, fa angamba hahazo manao fanavotana ny amin''ny fahotanareo.'
mg1865::mg_2::32::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia niverina ho ao amin''i Jehovah ka nanao hoe: Indrisy! efa nanao fahotana lehibe ity firenena ity ka efa nanao andriamani-bolamena ho azy.'
mg1865::mg_2::32::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, enga anie ka hamela ny fahotany Ianao! fa raha tsy izany, mifona aminao aho, vonoy eo amin''ny bokinao izay nosoratanao ny anarako.'
mg1865::mg_2::32::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jehovah tamin''i Mosesy: Na iza na iza nanota tamiko, dia hovonoiko ny anarany eo amin''ny bokiko.'
mg1865::mg_2::32::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana ankehitriny, ka ento ny olona ho any amin''izay efa nolazaiko taminao; indro, ny Anjeliko no hitarika anao eo aloha; ary amin''izay andro hamaliako dia hamaly azy noho ny fahotany Aho.'
mg1865::mg_2::32::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 32
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namely ny olona, satria nanao ny ombilahy kely izy, dia ilay nataon''i Arona.'
mg1865::mg_2::33::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitenenan''Andriamanitra ny Zanak''Isiraely, sy ny nanetren''ireo tena'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy hoe: Mandehana miakatra hiala aty ianao sy ny firenena izay nentinao niakatra avy tany amin''ny tany Egypta, ho amin''ny tany izay nianianako tamin''i Abrahama sy Isaka ary Jakoba hoe: Ny taranakao no homeko azy.'
mg1865::mg_2::33::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haniraka Anjely Aho hitarika anao eo aloha (ka horoahiko ny Kananita sy ny Amorita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita),'
mg1865::mg_2::33::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho amin''izay tany tondra-dronono sy tantely; nefa tsy hiara-miakatra aminao Aho (satria olona mafy hatoka ianao), fandrao handringana anao eny an-dàlana Aho.'
mg1865::mg_2::33::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny olona izany teny mampahory izany, dia nanjoretra izy, ka tsy nisy olona niravaka intsony.'
mg1865::mg_2::33::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Lazao amin''ny Zanak''Isiraely hoe: Ianareo dia olona mafy hatoka; koa raha hiara-miakatra aminao Aho, na dia indray mipi-maso aza, dia handringana anao Aho; koa ankehitriny, esory ny firavakao hiala aminao, mba ho fantatro izay hataoko aminao.'
mg1865::mg_2::33::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely dia nanala ny firavany hatreo an-tendrombohitra Horeba.'
mg1865::mg_2::33::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny nihaonan''i Mosesy tamin''Andriamanitra, sy ny naneken''Andriamanitra ny fangatahany'
  verse_text: 'Ary fanaon''i Mosesy ny maka ny lay ka manorina azy eo ivelan''ny toby lavidavitra, ary ny anarany dia nataony hoe Ny trano-lay fihaonana. Ary izay rehetra nitady an''i Jehovah dia nivoaka ho eny amin''ny trano-lay fihaonana izay teo ivelan''ny toby.'
mg1865::mg_2::33::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nivoaka ho eo amin''ny lay Mosesy, dia nitsangana ny olona rehetra, ka samy nijanona teo anoloan''ny varavaran''ny lainy avy, dia nitazana an''i Mosesy mandra-pahatongany ao amin''ny lay.'
mg1865::mg_2::33::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niditra tao amin''ny lay Mosesy, dia nidina ny andri-rahona ka nijanona teo anoloan''ny varavaran''ny lay, ary Jehovah dia niresaka tamin''i Mosesy.'
mg1865::mg_2::33::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitan''ny olona rehetra ny andri-rahona nijanona teo anoloan''ny varavaran''ny lay; dia nitsangana ny olona rehetra, ka samy niankohoka teo anoloan''ny varavaran''ny lainy avy.'
mg1865::mg_2::33::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny nifanatrika tamin''i Mosesy, tahaka ny olona miresaka amin''ny sakaizany. Ary niverina nankeo amin''ny toby izy; fa ny mpanompony, dia Josoa zatovo, zanak''i Nona, tsy niala tamin''ny lay.'
mg1865::mg_2::33::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Jehovah: Indro fa Ianao milaza amiko hoe: Ento miakatra ity firenena ity, ary Ianao tsy mbola nampahafantatra ahy izay hirahinao hiaraka amiko; kanefa Ianao efa nilaza hoe: Mahalala anao tokoa Aho, ary efa nahita fitia eo imasoko koa ianao.'
mg1865::mg_2::33::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, raha nahita fitia eo imasonao aho, dia ampahafantaro ny lalanao hahalalako Anao, mba hahitako fitia eo imasonao; ary hevero fa olonao ity firenena ity.'
mg1865::mg_2::33::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Ny Tavako no handeha, dia hanome anao fitsaharana Aho.'
mg1865::mg_2::33::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mosesy taminy: Raha tsy handeha ny Tavanao, dia aza mitondra anay hiakatra hiala aty.'
mg1865::mg_2::33::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona anefa no hahafantarana fa nahita fitia eo imasonao izaho sy ny olonao? moa tsy amin''ny handehananao miaraka aminay va? dia ho voavaka amin''ny firenena rehetra ambonin''ny tany izahay, dia izaho sy ny olonao.'
mg1865::mg_2::33::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Izao zavatra nolazainao izao dia hataoko koa; fa nahita fitia eo imasoko ianao, ary mahalala anao tokoa Aho.'
mg1865::mg_2::33::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy: Mba ampahitao ny voninahitrao aho.'
mg1865::mg_2::33::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Jehovah: Izaho hampandalo ny fahatsarako rehetra eo anatrehanao ka hanonona ny anaran''i Jehovah eo anatrehanao; fa hiantra izay hiantrako Aho, ary hamindra fo amin''izay hamindrako fo.'
mg1865::mg_2::33::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy: Tsy mahazo mahita ny tavako ianao; fa tsy misy olona mahita Ahy ka ho velona.'
mg1865::mg_2::33::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah: Indro, misy fitoerana eto anilako; dia hijanona eo ambonin''ny harambato ianao;'
mg1865::mg_2::33::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha mandalo ny voninahitro, dia hataoko eo an-tsefaky ny harambato ianao, ka hosaronako ny tanako ianao mandra-pandaloko.'
mg1865::mg_2::33::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanaisotra ny tanako Aho, ka hahita ny vohoko ianao; fa ny tavako tsy ho hita.'
mg1865::mg_2::34::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanavaozan''Andriamanitra ny fanekena'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Manamboara ho anao vato fisaka roa tahaka ilay teo, dia hosoratako amin''ireo vato fisaka ireo ny teny izay tamin''ilay vato fisaka teo, izay novakivakinao;'
mg1865::mg_2::34::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka hivonona ianao mandra-pahamaraina; dia miakara raha maraina ho ao amin''ny tendrombohitra Sinay, ka mitsangana eo anatrehako ao an-tampon''ny tendrombohitra.'
mg1865::mg_2::34::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka tsy hisy olona hiakatra afa-tsy ianao, ary aoka tsy hisy olona ho hita eny amin''ny tendrombohitra Sinay rehetra; ary ny ondry aman''osy koa sy ny omby dia aoka tsy hisy handrasana eny akaikin''izany tendrombohitra izany'
mg1865::mg_2::34::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanamboatra vato fisaka roa tahaka ilay teo Mosesy, ary nifoha maraina koa izy ka niakatra tao amin''ny tendrombohitra Sinay, araka izay nandidian''i Jehovah azy; ary nentiny teny an-tanany ny vato fisaka roa.'
mg1865::mg_2::34::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nidina tao anatin''ny rahona ka nijanona teo aminy, dia nanonona ny anaran''i Jehovah.'
mg1865::mg_2::34::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandalo teo anatrehany ka niantso hoe: Jehovah, Jehovah, Andriamanitra mamindra fo sy miantra, mahari-po sady be famindram-po sy fahamarinana,'
mg1865::mg_2::34::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitahiry famindram-po ho an''ny olona arivo mandimby, mamela heloka sy fahadisoana ary fahotana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin''ny zanaka sy ny zafy hatramin''ny zafiafy sy ny zafindohalika.'
mg1865::mg_2::34::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia niondrika faingana tamin''ny tany ka niankohoka;'
mg1865::mg_2::34::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy izy: Tompo o, raha mba mahita fitia eo imasonao aho, aoka Ianao, Tompo o, handeha ao afovoanay (fa firenena mafy hatoka izy), ka mamelà ny helokay sy ny fahotanay ary raiso ho lovanao izahay.'
mg1865::mg_2::34::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Indro, manao fanekena Aho, ka eo anatrehan''ny olonao rehetra no hanaovako zava-mahagaga, izay tsy mbola nisy natao tany amin''ny tany rehetra sy tany amin''ny firenena rehetra; ary ny olona rehetra izay itoeranao dia hahita ny asan''i Jehovah, fa mahatahotra izay zavatra efa hataoko amin''ny fiombako anao.'
mg1865::mg_2::34::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo izay andidiako anao anio; indro, efa horoahiko hiala eo anatrehanao ny Amorita sy ny Kananita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita.'
mg1865::mg_2::34::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitandrema, fandrao hanao fanekena amin''ny mponina eo amin''ny tany izay halehanao ianao, ka ho fandrika eo afovoanao izany.'
mg1865::mg_2::34::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ravao ny alitarany, ary torotoroy ny tsangam-baton-tsampiny, ary jinjao ny Aserahany.'
mg1865::mg_2::34::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hiankohoka eo anatrehan''izay andriamani-kafa ianao; fa Jehovah, dia saro-piaro no anarany, satria Andriamanitra saro-piaro Izy,'
mg1865::mg_2::34::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao ianao hanao fanekena amin''ny mponina eo amin''ny tany, ka hijangajanga hanaraka ny andriamaniny sy hamono zavatra hatao fanatitra ho an''ny andriamaniny izy, ary hasainy ianao ka hihinana amin''ny fanatiny;'
mg1865::mg_2::34::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary andrao koa haka amin''ny zananivavy ho vadin''ny zanakao-lahy ianao, ary hijangajanga hanaraka ny andriamaniny ny zananivavy ka hampandeha ny zanakao-lahy hijangajanga hanaraka ny andriamaniny.'
mg1865::mg_2::34::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao andriamanitra anidina ho anao.'
mg1865::mg_2::34::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny andro firavoravoana, dia ny andro fihinanana ny mofo tsy misy masirasira. Hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin''ny fotoan''andro amin''ny volana Abiba, fa tamin''ny volana Abiba no nivoahanao avy tany Egypta.'
mg1865::mg_2::34::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay voalohan-teraka rehetra no Ahy, dia ny lahy amin''ny voalohan-teraky ny bibinao, na omby na ondry aman''osy;'
mg1865::mg_2::34::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny voalohan-teraky ny boriky kosa dia hosoloanao zanak''ondry; ary raha tsy hanolo azy ianao, dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin''ny zanakao dia havotanao. Ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako.'
mg1865::mg_2::34::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hiasanao, fa amin''ny andro fahafito dia hitsahatra ianao: na dia amin''ny taom-pamafazana sy amin''ny taom-pijinjana aza dia hitsahatra ihany ianao.'
mg1865::mg_2::34::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo ny andro firavoravoana manarakaraka ireo herinandro amin''ny fanaterana ny voaloham-bokatra, raha mijinja ny vary tritika, sy ny andro firavoravoana amin''ny fanangonana amin''ny fitsingerenan''ny taona.'
mg1865::mg_2::34::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Intelo isan-kerintaona ny lehilahy rehetra aminao no hiseho eo anatrehan''i Jehovah Tompo, Andriamanitry ny Isiraely.'
mg1865::mg_2::34::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa handroaka firenena eo alohanao Aho ka hanitatra ny faritaninao; ary tsy hisy olona haniry ny taninao, raha miakatra hiseho eo anatrehan''i Jehovah Andriamanitrao intelo isan-kerintaona ianao.'
mg1865::mg_2::34::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manatitra ny ran''ny zavatra vonoina hatao fanatitra ho Ahy ianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny zavatra vonoina hatao fanatitra ho Ahy amin''ny andro firavoravoana amin''ny Paska.'
mg1865::mg_2::34::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny santatra amin''ny voaloham-bokatry ny taninao dia haterinao ho ao an-tranon''i Jehovah Andriamanitrao. Aza mahandro zanak''osy amin''ny rononon-dreniny.'
mg1865::mg_2::34::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Soraty ireo teny ireo, fa araka ireo teny ireo no nanaovako fanekena aminao sy amin''ny Isiraely.'
mg1865::mg_2::34::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia teo amin''i Jehovah efa-polo andro sy efa-polo alina izy sady, tsy nihinan-kanina na nisotro rano. Ary nosoratan''i Jehovah tamin''ny vato fisaka ny tenin''ny fanekena, dia ny Didy Folo.'
mg1865::mg_2::34::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nidina avy tao an-tendrombohitra Sinay, ary teny an-tanany ny vato roa izay nisy ny Vavolombelona tamin''izy nidina avy teo an-tendrombohitra, ary tsy fantany ho namirapiratra ny hoditry ny tavany noho ny nitenenany taminy.'
mg1865::mg_2::34::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Arona sy ny Zanak''Isiraely rehetra Mosesy, ka, indro, namirapiratra ny hoditry ny tavany, dia natahotra azy izy.'
mg1865::mg_2::34::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niantso azy, dia niverina Arona sy ny lohan''ny fiangonana rehetra ho eo aminy; ary Mosesy niteny taminy.'
mg1865::mg_2::34::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nanakaiky koa ny Zanak''Isiraely rehetra; ary Mosesy nandidy azy araka izay rehetra nolazain''i Jehovah taminy tao amin''ny tendrombohitra Sinay.'
mg1865::mg_2::34::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita ny teny nataon''i Mosesy taminy, dia nasiany fisalobonana ny tavany.'
mg1865::mg_2::34::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niditra teo anatrehan''i Jehovah Mosesy hiteny aminy, dia nanaisotra ny fisalobonana izy mandra-pivoakany. Dia nivoaka izy ka nilaza tamin''ny Zanak''Isiraely izay efa nandidiana azy.'
mg1865::mg_2::34::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 34
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitan''ny Zanak''Isiraely ny tavan''i Mosesy, fa, indro, namirapiratra ny hoditry ny tavany; dia nasaron''i Mosesy ny tavany indray ny fisalobonana mandra-pidiny hiteny aminy indray.'
mg1865::mg_2::35::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Mosesy ny didin''i Jehovah ny amin''ny hitandremana ny Sabata sy ny hanaovana ny tabernakely, ary ny zavatra naterin''ny olona hanaovana azy'
  verse_text: 'Ary Mosesy dia namory ny fiangonana, dia ny Zanak''Isiraely rehetra, ka nanao taminy hoe: Izao no teny nandidian''i Jehovah hatao:'
mg1865::mg_2::35::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hanaovanao raharaha, fa ny andro fahafito ho masina aminareo, dia tena andro fitsaharana ho an''i Jehovah; izay rehetra manao raharaha amin''izany dia hatao maty.'
mg1865::mg_2::35::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mampirehitra afo amin''ny andro Sabata any amin''izay rehetra itoeranareo.'
mg1865::mg_2::35::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niteny tamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, ka nanao hoe: Izao no teny izay nandidian''i Jehovah:'
mg1865::mg_2::35::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manalà ao aminareo fanatitra ho an''i Jehovah: izay rehetra amporisihin''ny fony dia aoka hitondra fanatitra ho an''i Jehovah: dia volamena sy volafotsy sy varahina,'
mg1865::mg_2::35::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manga sy volomparasy sy mena sy rongony fotsy madinika, ary volon''osy'
mg1865::mg_2::35::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy hoditr''ondrilahy efa nomenaina sy hodi-takasy ary hazo akasia,'
mg1865::mg_2::35::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy diloilo hatao fanazavana sy zava-manitra ho amin''ny diloilo fanosorana sy ho ditin-kazo mani-pofona,'
mg1865::mg_2::35::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary vato beryla sy vato halatsaka an-tranontranony ho amin''ny efoda sy ho amin''ny saron-tratra.'
mg1865::mg_2::35::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny hendry rehetra eo aminareo ho avy ka hanao izay rehetra nandidian''i Jehovah:'
mg1865::mg_2::35::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny tabernakely sy ny lainy sy ny firakony sy ny farangony, sy ny zana-kazony sy ny barany sy ny andriny sy ny faladiany,'
mg1865::mg_2::35::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fiara sy ny baony sy ny rakotra fanaovam-panavotana sy ny efitra lamba fanakonana,'
mg1865::mg_2::35::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny latabatra sy ny baony mbamin''ny fanaka rehetra momba azy, ary ny mofo aseho,'
mg1865::mg_2::35::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanaovan-jiro ho fanazavana mbamin''ny fanaka momba azy ary ny lela fanaovan-jirony sy ny diloilo hatao fanazavana,'
mg1865::mg_2::35::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny alitara fandoroana ditin-kazo manitra sy ny baony, ary ny diloilo fanosorana sy ny ditin-kazo mani-pofona, ary ny varavarana lamba ho eo amin''ny varavaran''ny tabernakely,'
mg1865::mg_2::35::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny alitara fandoroana ny fanatitra dorana sy ny harato varahina ho eo aminy sy ny baony ary ny fanaka rehetra momba azy, ary ny tavy sy ny faladiany,'
mg1865::mg_2::35::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fefy lamba ho amin''ny kianja sy ny tsangantsangany sy ny faladiany sy ny vavahady lamba ho eo amin''ny vavahadin''ny kianja,'
mg1865::mg_2::35::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tsimatry ny tabernakely sy ny tsimatry ny kianja sy ny kofehiny,'
mg1865::mg_2::35::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fitafiana makarakara ho entiny manao fanompoam-pivavahana ao amin''ny fitoerana masina sy ny fitafiana masina ho an''i Arona mpisorona ary ny fitafian''ny zanany ho entiny misorona.'
mg1865::mg_2::35::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala teo anatrehan''i Mosesy ny fiangonana, dia ny Zanak''Isiraely rehetra.'
mg1865::mg_2::35::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nanatona izy, dia izay rehetra nampahazotoin''ny fony, ary izay rehetra namporisihin''ny fanahiny, ka nitondra ny fanatitra ho an''i Jehovah hanaovana ny trano-lay fihaonana sy ny fanompoana rehetra momba azy ary ny fitafiana masina.'
mg1865::mg_2::35::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona ny lehilahy mbamin''ny vehivavy rehetra izay namporisihin''ny fony, ka nitondra fisisika sy kavina sy peratra sy voa volamena, dia izay firavaka volamena samy hafa rehetra, dia ny olona rehetra izay efa nanatitra volamena ho fanatitra ho an''i Jehovah.'
mg1865::mg_2::35::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra izay nanana manga sy volomparasy sy mena sy rongony fotsy madinika sy volon''osy sy hoditr''ondrilahy efa nomenaina ary hodi-takasy dia nitondra azy.'
mg1865::mg_2::35::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra nanatitra fanatitra volafotsy sy varahina dia nitondra ny fanatitra ho an''i Jehovah; ary izay rehetra nanana hazo akasia hanaovana zavatra ho amin''ny fanompoana dia nitondra azy.'
mg1865::mg_2::35::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vehivavy rehetra izay hendry dia namoly tamin''ny tanany ka nitondra izay nofolesiny, dia ny manga sy volomparasy sy mena ary ny rongony fotsy madinika.'
mg1865::mg_2::35::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vehivavy rehetra izay nampahazotoin''ny fony tamin''ny fahendrena dia namoly ny volon''osy.'
mg1865::mg_2::35::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loholona nitondra ny vato beryla sy ny vato halatsaka an-tranontranony ho amin''ny efoda sy ho amin''ny saron-tratra,'
mg1865::mg_2::35::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zava-manitra sy ny diloilo hatao fanazavana sy ho amin''ny diloilo fanosorana ary ho amin''ny ditin-kazo mani-pofona.'
mg1865::mg_2::35::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nitondra fanatitra sitra-po ho an''i Jehovah: dia ny lehilahy sy ny vehivavy rehetra izay namporisihin''ny fony hitondra izay hanaovana ny zavatra rehetra nandidian''i Jehovah an''i Mosesy hatao.'
mg1865::mg_2::35::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''ny Zanak''Isiraely: Indro, efa notononin''i Jehovah anarana Bezalila, zanak''i Ory, zanak''i Hora, avy amin''ny firenen''i Joda,'
mg1865::mg_2::35::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka efa nofenoiny fanahin''Andriamanitra, dia fahendrena sy fahiratan-tsaina sy fahalalana ny amin''ny tao-zavatra samy hafa,'
mg1865::mg_2::35::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny hamoron-tsaina hanao asa kanto, sy ny hiasa volamena sy volafotsy ary varahina,'
mg1865::mg_2::35::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hamboatra vato halatsaka an-tranontranony sy ny handrafitra hazo, hanaovana izay asa kanto samy hafa rehetra.'
mg1865::mg_2::35::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahaizana hampianatra koa dia efa nataon''Andriamanitra tao am-pony, dia izy sy Oholiaba, zanak''i Ahisamaka avy amin''ny firenen''i Dana.'
mg1865::mg_2::35::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 35
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nofenoiny fahendrena izy roa lahy, hanaovany ny tao-zavatra samy hafa -- dia ny an''ny mpiasa tefy sy rafitra ary ny an''ny mpanenona mahay tenona samy hafa soratra, dia amin''ny manga sy volomparasy sy mena ary amin''ny rongony fotsy madinika ary ny an''ny mpanenona, -- dia ny ho mpanao ny asa samy hafa sy ho mpamorona asa kanto.'
mg1865::mg_2::36::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiasa Bezalila sy Oholiaba ary ny olona hendry rehetra, izay nomen''i Jehovah fahendrena sy fahiratan-tsaina, hahaizany hanao ny asa rehetra ho amin''ny fanompoana ao amin''ny fitoerana masina, araka izay rehetra nandidian''i Jehovah.'
mg1865::mg_2::36::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia nampaka an''i Bezalila sy Oholiaba ary ny olona hendry rehetra, izay nasian''i Jehovah fahendrena tao am-pony, dia izay rehetra nampahazotoin''ny fony hankeo amin''ny asa hanao azy.'
mg1865::mg_2::36::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo dia nandray tamin''i Mosesy ny fanatitra rehetra izay efa nentin''ny Zanak''Isiraely hanaovana ny asa amin''ny fanompoana ao amin''ny fitoerana masina. Ary ny olona mbola nitondra fanatitra sitra-po isa-maraina ihany ho eo amin''i Mosesy.'
mg1865::mg_2::36::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona ny olon-kendry rehetra, izay nanao ny asa rehetra amin''ny fitoerana masina, samy niala tamin''ny asany izay nataony avy,'
mg1865::mg_2::36::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny tamin''i Mosesy hoe: Ny olona mitondra mihoatra lavitra noho izay hahavita ny fanompoana amin''ny asa nandidian''i Jehovah hatao.'
mg1865::mg_2::36::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy Mosesy ka nandefa teny eran''ny toby rehetra nanao hoe: Aza misy manao zavatra intsony hatao fanatitra ho amin''ny fitoerana masina ianareo, na lahy na vavy. Dia izany no nampitsaharana ny olona tsy hanatitra intsony;'
mg1865::mg_2::36::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny zavatra efa nateriny dia ampy anaovana ny asa rehetra ka nanana amby aza.'
mg1865::mg_2::36::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny nanaovana ny tabernakely sy izay rehetra momba azy'
  verse_text: 'Ary ny hendry rehetra teo amin''izay nanao ny raharaha dia nanao ny tabernakely: dia ambainy folo amin''ny rongony fotsy madinika voahasina sy manga sy volomparasy ary mena; kerobima, asan''ny mpanenona mahay, no nataony sorany.'
mg1865::mg_2::36::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny halavan''ny ambainy iray dia valo amby roa-polo hakiho; ary ny lambanan''ny ambainy iray dia efatra hakiho: nitovy ohatra ny ambainy rehetra.'
mg1865::mg_2::36::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambainy dimy navitrany ho iray; ary ambainy dimy koa navitrany ho iray.'
mg1865::mg_2::36::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tadivavarana manga teo an-tsisin''ny ambainy iray izy, dia teo an-tsisin''ny anankiray efa voavitrana; ary nanao toy izany koa tamin''ny ambainy farany izy, dia teo an-tsisin''ny anankiray efa voavitrana koa.'
mg1865::mg_2::36::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tadivavarana dimam-polo no nataony teo amin''ny ambainy iray, ary tadivavarana dimam-polo koa no nataony teo amin''ny sisin''ny ambainy izay amin''ny anankiray efa voavitrana koa; ary nifandray ny tadivavarana.'
mg1865::mg_2::36::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao farango volamena dimam-polo izy, ka nakambany tamin''ny farango ny ambainy, dia voakambana ho iray ny tabernakely.'
mg1865::mg_2::36::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ambainy koa tamin''ny volon''osy izy ho lay handrakofana ny tabernakely; dia iraika ambin''ny folo ambainy no nanaovany azy.'
mg1865::mg_2::36::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny halavan''ny ambainy iray dia telo-polo hakiho, ary ny lambanan''ny ambainy iray dia efatra hakiho; nitovy ohatra ny ambainy iraika ambin''ny folo.'
mg1865::mg_2::36::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navitrany ny ambainy dimy hikambana, ary ny ambainy enina kosa hikambana.'
mg1865::mg_2::36::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tadivavarana dimam-polo ho eo antsisin''ny ambainy iray izay farany amin''ny efa voa vitrana izy; ary tadivavarana dimam-polo koa ho eo an-tsisin''ny ambainy iray amin''ny anankiray koa efa voavitrana.'
mg1865::mg_2::36::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao farango varahina dimam-polo izy hampikambana ny lay ho iray.'
mg1865::mg_2::36::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao rakotry ny lay tamin''ny hoditr''ondrilahy efa nomenaina izy sy sarona hodi-takasy ho eo amboniny.'
mg1865::mg_2::36::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny zana-kazo akasia ho amin''ny tabernakely izy.'
mg1865::mg_2::36::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Folo hakiho ny hahavon''ny zana-kazo iray, ary iray hakiho sy sasany ny indraben''ny zana-kazo iray.'
mg1865::mg_2::36::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lahiny roa no amin''ny zana-kazo iray, ka nasiany izay hikambanany; izany no nanaovany ny zana-kazo rehetra tamin''ny tabernakely.'
mg1865::mg_2::36::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny zana-kazo ho amin''ny tabernakely izy, dia zana-kazo roa-polo ho eo amin''ny lafiny atsimo.'
mg1865::mg_2::36::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao faladia volafotsy efa-polo izy ho ambanin''ny zana-kazo roa-polo, dia faladia roa avy ho ambanin''ny isan-janakazo hiorenan''ny lahiny roa.'
mg1865::mg_2::36::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao zana-kazo roa-polo ho eo amin''ny lafiny faharoa amin''ny tabernakely izy, dia ny lafiny avaratra.'
mg1865::mg_2::36::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao faladiany volafotsy efa-polo, izy dia faladia roa avy ho ambanin''ny isan-janakazo.'
mg1865::mg_2::36::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao zana-kazo enina ho eo amin''ny lafin''ny tabernakely andrefana izy, izay eo ivohony.'
mg1865::mg_2::36::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao zana-kazo roa ho eo amin''ny zoron''ny tabernakely tamin''ny lafiny ivoho izy.'
mg1865::mg_2::36::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nakambana ho iray izy hatramin''ny ambany ka hatramin''ny ambony, ka nasiana vava vola iray ihany; nataony toy izany avokoa izy roa ho eo amin''ny zorony roa.'
mg1865::mg_2::36::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy zana-kazo valo sy ny faladiany volafotsy; dia faladia enina ambin''ny folo: faladia roa avy ho ambanin''ny isan-janakazo iray.'
mg1865::mg_2::36::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hazo akasia no nataony barany: dia dimy ho amin''ny zana-kazo amin''ny lafiny iray amin''ny tabernakely,'
mg1865::mg_2::36::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy barany dimy ho amin''ny zana-kazo amin''ny lafiny iray koa amin''ny tabernakely, ary barany dimy ho amin''ny zana-kazo amin''ny lafiny andrefana izay ao ivohony.'
mg1865::mg_2::36::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny barany afovoany izy, ho afovoan''ny zana-kazo ka hahatratra ny farany roa.'
mg1865::mg_2::36::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zana-kazo nopetahany takela-bolamena, ary nataony volamena koa ny vava vola aminy, izay hitoeran''ny barany: ary nopetahany takela-bolamena koa ny barany.'
mg1865::mg_2::36::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny efitra lamba dia nataony manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, ary kerobima, asan''ny mpanenona mahay, no nataony sorany.'
mg1865::mg_2::36::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao andry efatra tamin''ny hazo akasia izy hihantonan''izany, ary nopetahany takela-bolamena ireo, sady nataony volamena koa ny fihantonany; ary nandrendrika faladia volafotsy efatra izy''hiorenany.'
mg1865::mg_2::36::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao varavarana lamba ho eo amin''ny varavaran''ny lay izy, dia tamin''ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan''ny mahay tenona samy hafa soratra.'
mg1865::mg_2::36::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 36
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andriny dimy sy ny fihantonany dia nataony koa, ary nopetahany takela-bolamena ny lohany sy ny anjaka hitohizany; ary ny faladiany dimy dia nataony varahina.'
mg1865::mg_2::37::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Bezalila nanao ny fiara tamin''ny hazo akasia: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany, ary iray hakiho sy sasany ny hahavony;'
mg1865::mg_2::37::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nopetahany takela-bolamena tsara tao anatiny sy teo ivelany; ary nasiany koronosy volamena manodidina.'
mg1865::mg_2::37::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrendrika vava volamena efatra hatao aminy izy, ka nataony teo amin''ny tongony efatra: dia vava vola roa teo amin''ny lafiny iray, ary vava vola roa teo amin''ny lafiny iray koa.'
mg1865::mg_2::37::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao bao tamin''ny hazo akasia izy, ka nopetahany takela-bolamena.'
mg1865::mg_2::37::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampidiriny ny bao ho eo amin''ny vava vola, izay eo amin''ny lafin''ny fiara, hilanjana azy.'
mg1865::mg_2::37::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao rakotra fanaovam-panavotana tamin''ny volamena tsara izy: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany.'
mg1865::mg_2::37::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao kerobima volamena roa izy; voasana no nanaovany azy roa miray amin''ny lohany roa amin''ny rakotra fanaovam-panavotana:'
mg1865::mg_2::37::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny kerobima iray nataony teo amin''ny sakany anankiray, ary ny kerobima iray kosa teo amin''ny sakany anankiray: indray mivofy tamin''ny rakotra fanaovam-panavotana no nanaovany ny kerobima roa, dia teo amin''ny sakany roa.'
mg1865::mg_2::37::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny elatry ny kerobima nivelatra teo ambony, ka nalofan''ny elany ny rakotra fanaovam-panavotana; ary ny tavany nifanatrika, sady nanatrika ny rakotra fanaovam-panavotana koa izy.'
mg1865::mg_2::37::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny latabatra tamin''ny hazo akasia izy: roa hakiho ny lavany, ary iray hakiho ny sakany, ary iray hakiho sy sasany ny hahavony.'
mg1865::mg_2::37::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopetahany takela-bolamena tsara izy, sady nasiany koronosy volamena manodidina azy.'
mg1865::mg_2::37::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiany sisiny vodivoam-pelatanana manodidina azy, ary nasiany koronosy volamena ny sisiny manodidina.'
mg1865::mg_2::37::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrendrika vava volamena efatra hatao aminy izy, ka nataony teo amin''ny zorony efatra, izay eo amin''ny tongony efatra, ireo:'
mg1865::mg_2::37::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'eo akaikin''ny sisiny no nisian''ny vava vola ho fitoeran''ny bao hilanjana ny latabatra.'
mg1865::mg_2::37::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny bao tamin''ny hazo akasia izy, hilanjana ny latabatra, ka nopetahany takela-bolamena.'
mg1865::mg_2::37::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny fanaka izay eo ambonin''ny latabatra izy, dia ny lovia ny sy ny lovia keliny ary ny kapoakany sy ny fitoeran-divainy ho fanidinam-panatitra; volamena tsara no nanaovany ireo.'
mg1865::mg_2::37::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny fanaovan-jiro tamin''ny volamena tsara izy; voasana no nanaovany ny fanaovan-jiro; nataony indray mivofy taminy avokoa ny faladiany sy ny tahony sy ny vodi-voniny sy ny kiboriny ary ny voniny.'
mg1865::mg_2::37::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy sampany enina tamin''ny ankilany roa, dia sampany telo tamin''ny fanaovan-jiro amin''ny ankilany iray, ary sampany telo tamin''ny fanaovan-jiro amin''ny ankilany iray koa;'
mg1865::mg_2::37::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'teo amin''ny sampany anankiray nisy vodi-voniny telo natao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny; ary teo amin''ny sampany anankiray koa nisy vodi-voniny telo natao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny; dia toy izany avokoa tamin''ny sampany enina tamin''ny fanaovan-jiro.'
mg1865::mg_2::37::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo amin''ny fanaovan-jiro dia nisy vodi-voniny efatra natao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny,'
mg1865::mg_2::37::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia kiboriny iray eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray eo ambanin''ny sampany roa koa sady miray aminy; dia amin''ny sampany enina izay miray amin''ny fanaovan-jiro.'
mg1865::mg_2::37::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kiboriny sy ny sampany dia niray taminy avokoa; natao indray mivofy tamin''ny volamena tsara izy rehetra.'
mg1865::mg_2::37::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny lela fanaovan-jirony fito sy ny hetin-jirony sy ny fitoeran-davenon-jirony tamin''ny volamena tsara izy.'
mg1865::mg_2::37::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volamena tsara talenta iray no nanaovany azy mbamin''ny fanaka rehetra momba azy.'
mg1865::mg_2::37::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny alitara fandoroana ditin-kazo manitra tamin''ny hazo akasia izy: iray hakiho avy ny lafiny efatra, dia efa-joro tsy mivadi-mandry izy; ary roa hakiho ny hahavony; ary nataony miray aminy ny tandrony.'
mg1865::mg_2::37::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopetahany takela-bolamena tsara izy, dia ny tampony sy ny lafiny manodidina ary ny tandrony; ary nasiany koronosy volamena manodidina.'
mg1865::mg_2::37::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiany vava volamena roa izy teo ambanin''ny koronosiny, ka nataony teo amin''ny zorony efatra ireo ho fitoeran''ny bao hilanjana azy.'
mg1865::mg_2::37::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hazo akasia no nanaovany ny bao, ka nopetahany takela-bolamena.'
mg1865::mg_2::37::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 37
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny diloilo fanosorana masina izy, sy ny zava-manitra manetona madio, asan''ny mpangaroharo zava-manitra.'
mg1865::mg_2::38::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny alitara fandoroana ny fanatitra dorana tamin''ny hazo akasia izy: dimy hakiho avy ny lafiny efatra, dia efa-joro tsy mivadi-mandry izy; ary telo hakiho ny hahavony.'
mg1865::mg_2::38::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny tandrony teo amin''ny zorony efatra izy, ka nataony miray aminy, ary nopetahany takela-barahina ireo.'
mg1865::mg_2::38::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny fanaka rehetra momba ny alitara izy, dia ny vilaniny fandraofan-davenona sy ny sotron''afony sy ny loviany famafazana sy ny fitrebiny ary ny fitondran''afony; nataony varahina avokoa ny fanaka rehetra momba azy.'
mg1865::mg_2::38::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao makarakara varahina tahaka ny harato ho eo amin''ny alitara izy, dia eo ambanin''ny sikiny, hatreo ambodin''ny alitara ka hatreo amin''ny fisasahany.'
mg1865::mg_2::38::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrendrika vava vola efatra hatao eo an-jorony efatra amin''ny makarakara varahina izy ho fitoeran''ny bao.'
mg1865::mg_2::38::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny bao tamin''ny hazo akasia izy, ka nopetahany takela-barahina.'
mg1865::mg_2::38::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampiditra ny bao teo amin''ny vava vola teo amin''ny lafiny roa amin''ny alitara izy hilanjana azy. Ary hazo fisaka no narafiny ho alitara, ka nataony hobokaty.'
mg1865::mg_2::38::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tavy varahina sy ny faladiany varahina dia nataony tamin''ny fitaratra varahin''ny vehivavy izay nanompo teo anoloan''ny varavaran''ny trano-lay fihaonana.'
mg1865::mg_2::38::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny kianja izy: tamin''ny lafiny atsimo nisy fefy lamba zato hakiho ho amin''ny kianja natao tamin''ny rongony fotsy madinika voahasina;'
mg1865::mg_2::38::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary roa-polo ny tsangantsangany, ary roa-polo ny faladiany varahina; ary volafotsy ny fihantonany amin''ny tsangantsangany sy ny anjaka hitohizany.'
mg1865::mg_2::38::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny lafiny avaratra koa nisy zato hakiho sy ny tsangantsangany roa-polo ary ny faladiany varahina roa-polo; volafotsy ny fihantonany amin''ny tsangantsangany sy ny anjaka hitohizany.'
mg1865::mg_2::38::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny lafiny andrefana nisy fefy lamba dimam-polo hakiho; folo ny tsangantsangany ary folo ny faladiany; ary volafotsy ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany.'
mg1865::mg_2::38::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lafiny atsinanana nataony dimam-polo hakiho.'
mg1865::mg_2::38::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fefy lamba dimy ambin''ny folo hakiho tamin''ny ilany iray; telo ny tsangantsangany, ary telo ny faladiany.'
mg1865::mg_2::38::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fefy lamba dimy ambin''ny folo hakiho tamin''ny ilany iray koa; telo ny tsangantsangany, ary telo ny faladiany;'
mg1865::mg_2::38::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony rongony fotsy madinika voahasina avokoa ny fefy lamban''ny kianja manodidina.'
mg1865::mg_2::38::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faladian''ny tsangantsangany dia nataony varahina; ary ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany nataony volafotsy; ary ny lohany dia nopetahany takela-bolafotsy; ary ny tsangantsangany rehetra tamin''ny kianja dia samy nisy anjaka volafotsy hitohizany avokoa.'
mg1865::mg_2::38::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vavahady lamba eo am-bavahadin''ny kianja dia asan''ny mahay tenona samy hafa soratra tamin''ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina; roa-polo hakiho ny halavany; ary ny hahavony nitovy tamin''ny lambanan-damba, dia dimy hakiho, araka ny hahavon''ny fefy lamban''ny kianja.'
mg1865::mg_2::38::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efatra ny tsangantsangany, ary efatra ny faladiany varahina; ary ny fihantonany dia volafotsy; ary ny takela-bola tamin''ny lohany sy ny anjaka hitohizany dia volafotsy koa.'
mg1865::mg_2::38::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tsimatra amin''ny tabernakely sy amin''ny kianja manodidina dia nataony varahina avokoa.'
mg1865::mg_2::38::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Tontalin''ny volamena sy volafotsy ary varahina izay lany'
  verse_text: 'Ary izao no isan''ny zavatra nomba ny tabernakely, dia ny tabernakelin''ny Vavolombelona, izay nisaina araka ny didin''i Mosesy; natao fanompoan''ny Levita, fehin''Itamara, zanak''i Arona mpisorona, ny nanisa azy.'
mg1865::mg_2::38::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Bezalila, zanak''i Ory, zanak''i Hora, avy amin''ny firenen''i Joda, nanao izay rehetra nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::38::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny namany dia Oholiaba, zanak''i Ahisamaka, avy amin''ny firenen''i Dana, mpiasa tefy sy rafitra ary mpanenona mahay sady nahay tenona samy hafa soratra tamin''ny manga sy volomparasy sy mena ary rongony fotsy madinika.'
mg1865::mg_2::38::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Talenta sivy amby roa-polo, ary sekely telo-polo amby fiton-jato, araka ny sekely masina, ny volamena rehetra izay lany tamin''ny asa rehetra tamin''ny fitoerana masina, dia ny volamena izay natao fanatitra ahevaheva.'
mg1865::mg_2::38::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny volafotsy avy tamin''ny olona izay voaisa tamin''ny fiangonana dia talenta zato sy sekely dimy amby fito-polo amby fiton-jato amby arivo, araka ny sekely masina:'
mg1865::mg_2::38::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'beka iray isan-olona, dia antsasaky ny sekely araka ny sekely masina, no naloan''izay rehetra voalamina, hatramin''ny roa-polo taona no ho miakatra, dia olona dimam-polo amby diman-jato amby telo arivo sy enina hetsy.'
mg1865::mg_2::38::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny volafotsy talenta zato dia narendrika nanaovana ny faladian''ny fitoerana masina sy ny faladian''ny efitra lamba: dia faladia zato tamin''ny talenta volafotsy zato, talenta iray ny faladiany iray.'
mg1865::mg_2::38::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny sekely dimy amby fito-polo amby fiton-jato sy arivo no nanaovany ny fihantonana tamin''ny andry, sy nametahana takela-bola tamin''ny lohany, ary nanaovany ny anjaka hitohizany.'
mg1865::mg_2::38::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varahina izay natao fanatitra ahevaheva dia talenta fito-polo sy sekely efa-jato amby roa arivo.'
mg1865::mg_2::38::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no nanaovany ny faladiany ho amin''ny varavaran''ny trano-lay fihaonana, sy ny alitara varahina sy ny makarakara varahina izay teo aminy ary ny fanaka rehetra momba ny alitara,'
mg1865::mg_2::38::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 38
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny faladia tamin''ny kianja manodidina sy ny faladia tamin''ny vavahadin''ny kianja, sy ny tsimatra rehetra tamin''ny tabernakely ary ny tsimatra rehetra tamin''ny kianja manodidina.'
mg1865::mg_2::39::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanaovana ny fitafian''ny mpisorona'
  verse_text: 'Ary tamin''ny manga sy ny volomparasy ary ny mena no nanaovany ny fitafiana makarakara*, hanaovana fanompoam-pivavahana ao amin''ny fitoerana masina, ary nanao ny fitafiana masina ho an''i Arona izy, dia araka izay efa nandidian''i Jehovah an''i Mosesy. [*Na: fitondra manompo]'
mg1865::mg_2::39::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny efoda tamin''ny volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina izy.'
mg1865::mg_2::39::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namisaka ny volamena ho takelaka manify izy, dia nandidididy azy ho kofehy volamena, hahasiny amin''ny manga sy ny volomparasy sy ny mena ary ny rongony fotsy madinika, dia asan''ny mpanenona mahay.'
mg1865::mg_2::39::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony nisy soroka roa avy amin''ny sisiny roa hampikambanana azy.'
mg1865::mg_2::39::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fehin-kibo momba ny efoda, izay teo amboniny, dia niray taminy sady nitovy tarehy taminy, ka nataony volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vato beryla nasiany randram-bolamena manodidina, ary dia nosoratany, tahaka ny fanoratana fanombohan-kase, araka ny anaran''ny firenen''ny Zanak''Isiraely.'
mg1865::mg_2::39::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony teo amin''ny soroky ny efoda ny vato, ho vato fahatsiarovana ho an''ny Zanak''Isiraely, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny saron-tratra tamin''ny asan''ny mpanenona mahay izy, tahaka ny nanaovana ny efoda, dia volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina.'
mg1865::mg_2::39::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa-joro miforitra roa no nanaovany ny saron-tratra, ary irain-jehy avy ny lafiny efatra, sady niforitra roa izy.'
mg1865::mg_2::39::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiany vato nalatsaka an-tranontranony izy, dia vato efatra andalana: ny andalana voalohany dia karnelia sy topaza ary emeralda;'
mg1865::mg_2::39::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andalana faharoa dia robina sy safira ary onyksa;'
mg1865::mg_2::39::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andalana fahatelo dia opala sy agata ary ametysta;'
mg1865::mg_2::39::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andalana fahefatra dia krysolita sy beryla ary jaspy; ary nasiany randram-bolamena manodidina ny fitoerany avy.'
mg1865::mg_2::39::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vato dia nalahatra araka ny anaran''ny firenen''ny Zanak''Isiraely, dia roa ambin''ny folo araka ny anarany; ary nisy soratra toy ny amin''ny fanombohan-kase ho an''ny firenena roa ambin''ny folo araka ny anarany avy.'
mg1865::mg_2::39::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao olam-bolamena tsara mifanolana toy ny tady ho eo amin''ny saron-tratra izy.'
mg1865::mg_2::39::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao randram-bolamena roa sy vava volamena roa izy; ary ny vava vola dia nataony teo amin''ny zorony roa ambony amin''ny saron-tratra.'
mg1865::mg_2::39::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tady volamena roa dia nataony teo amin''ny vava vola roa izay amin''ny zorony roa ambany amin''ny saron-tratra.'
mg1865::mg_2::39::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lanin''ny tady roa dia nataony teo amin''ny randram-bolamena roa, dia nataony teo amin''ny soroky ny efoda anoloana.'
mg1865::mg_2::39::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao vava volamena roa izy ka nataony teo amin''ny zorony roa ambany amin''ny saron-tratra, dia amin''ny sisiny anatiny izay manolotra ny efoda.'
mg1865::mg_2::39::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao vava volamena roa koa izy ka nataony teo amin''ny soroka roa amin''ny efoda, dia ao ambaniny, eo anoloany, akaikin''ny fikambanany, eo ambonin''ny fehin-kibo momba ny efoda.'
mg1865::mg_2::39::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary kofehy manga no namehezany ny vava volan''ny saron-tratra tamin''ny vava volan''ny efoda, mba ho eo ambonin''ny fehin-kibo momba ny efoda ny saron-tratra ka tsy ho afaka eo, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny akanjo ivelany misy ny efoda, asan''ny mpanenona, izy, ka nataony manga avokoa.'
mg1865::mg_2::39::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vozon''ny akanjo ivelany dia teo afovoany tahaka ny vozon''ny akanjo fiarovan-tratra, ary nisy sisiny manodidina ny vozony mba tsy hahatriatra azy.'
mg1865::mg_2::39::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo amin''ny moron-tongotry ny akanjo ivelany dia nasiany sarin''ampongaben-danitra manga sy volomparasy sy mena voahasina;'
mg1865::mg_2::39::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao famohamandry volamena tsara izy, ary ny famohamandry dia nataony teo anelanelan''ny ampongaben-danitra tamin''ny moron-tongotry ny akanjo ivelany manodidina (dia teo anelanelan''ny ampongaben-danitra):'
mg1865::mg_2::39::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia famohamandry sy sarin''ampongaben-danitra mifanelanelana manodidina eo amin''ny moron-tongotry ny akanjo ivelany, ho entiny manao ny fanompoam-pivavahana, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny akanjo lava nataony rongony fotsy madinika, asan''ny mpanenona, ho an''i Arona sy ny zanany.'
mg1865::mg_2::39::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hamama dia nataony rongony fotsy madinika, ary ny satroka tsara tarehy nataony rongony fotsy madinika; ary ny kalisaona fohy dia nataony rongony fotsy madinika voahasina.'
mg1865::mg_2::39::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fehin-kibo nataony rongony fotsy madinika voahasina sy manga sy volomparasy ary mena, asan''ny mahay tenona samy hafa soratra, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny takelaka ho eo amin''ny diadema masina dia nataony volamena tsara, ary nasiany soratra, araka ny fanoratana amin''ny fanombohan-kase, hoe: HAMASININA HO AN''I JEHOVAH.'
mg1865::mg_2::39::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiany kofehy manga hamehezany azy amin''ny hamama eo ambony, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vita ny asa rehetra tamin''ny tabernakelin''ny trano-lay fihaonana; fa ny Zanak''Isiraely efa nanao araka izay rehetra nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::39::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny teo amin''i Mosesy ny tabernakely; dia ny lay sy ny fanaka rehetra nomba azy, ary ny farangony sy ny zana-kazony ary ny barany sy ny andriny ary ny faladiany,'
mg1865::mg_2::39::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny firakotra hoditr''ondrilahy efa nomenaina sy ny sarona hodi-takasy, ary ny efitra lamba fanakonana,'
mg1865::mg_2::39::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fiaran''ny Vavolombelona sy ny baony ary ny rakotra fanaovam-panavotana,'
mg1865::mg_2::39::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny latabatra sy ny fanaka rehetra momba azy ary ny mofo aseho,'
mg1865::mg_2::39::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanaovan-jiro tsara sy ny lela fanaovan-jirony, dia ny lela fanaovan-jiro halahatra, sy ny fanaka rehetra momba azy ary ny diloilo hatao fanazavana,'
mg1865::mg_2::39::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny alitara volamena sy ny diloilo fanosorana sy ny ditin-kazo mani-pofona ary ny varavarana lamba ho eo amin''ny varavaran''ny trano-lay,'
mg1865::mg_2::39::39:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny alitara varahina sy ny makarakara varahina ho eo aminy ary ny baony sy ny fanaka rehetra momba azy, ary ny tavy sy ny faladiany,'
mg1865::mg_2::39::40:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fefy lamban''ny kianja sy ny tsangantsangany sy ny faladiany ary ny vavahady lamba eo amin''ny vavahadin''ny kianja ary ny kofehiny sy ny tsimatra, ary ny fiasana rehetra momba ny tabernakelin''ny trano-lay fihaonana,'
mg1865::mg_2::39::41:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fitafiana makarakara ho enti-manao fanompoam-pivavahana ao amin''ny fitoerana masina ho an''i Arona mpisorona sy ny fitafian''ny zanany ho entiny manao fisoronana.'
mg1865::mg_2::39::42:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay rehetra efa nandidian''i Jehovah an''i Mosesy, dia toy izany no nanaovan''ny Zanak''Isiraely ny asa rehetra.'
mg1865::mg_2::39::43:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 39
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nizaha ny asa rehetra Mosesy, ka, indro, efa nataony araka izay nandidian''i Jehovah; dia nisaotra azy Mosesy.'
mg1865::mg_2::40::1:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nananganana ny tabernakely'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_2::40::2:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro voalohany amin''ny volana voalohany dia atsangano ny tabernakelin''ny trano-lay fihaonana.'
mg1865::mg_2::40::3:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy ao ny fiaran''ny Vavolombelona; dia ahantòny ny efitra lamba hanakona ny fiara.'
mg1865::mg_2::40::4:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ampidiro ny latabatra, ka alaharo izay halahatra eo amboniny; ary ampidiro ny fanaovan-jiro, ka ampireheto ny jiro.'
mg1865::mg_2::40::5:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny alitara volamena fandoroana ditin-kazo manitra dia ataovy eo anoloan''ny fiaran''ny Vavolombelona, ary ny varavarana lamba dia ataovy eo amin''ny varavaran''ny tabernakely.'
mg1865::mg_2::40::6:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny alitara fandoroana ny fanatitra dorana dia apetraho eo anoloan''ny tabernakelin''ny trano-lay fihaonana.'
mg1865::mg_2::40::7:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tavy dia apetraho eo anelanelan''ny trano-lay fihaonana sy ny alitara, ka asio rano eo anatiny.'
mg1865::mg_2::40::8:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amboary ny kianja manodidina, ka ahantòny ny vavahady lamba eo amin''ny vavahadin''ny kianja.'
mg1865::mg_2::40::9:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny diloilo fanosorana, ka hosory ny tabernakely sy izay rehetra ao, dia hamasino izy mbamin''ny fanaka rehetra momba azy, ka dia ho masina izy.'
mg1865::mg_2::40::10:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosory ny alitara fandoroana ny fanatitra dorana sy ny fanaka rehetra momba azy; ary hamasino ny alitara, dia ho masina indrindra izy.'
mg1865::mg_2::40::11:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosory ny tavy sy ny faladiany, ka hamasino izy.'
mg1865::mg_2::40::12:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ento Arona sy ny zanany hankeo anoloan''ny varavaran''ny trano-lay fihaonana, ka ampandroy amin''ny rano izy.'
mg1865::mg_2::40::13:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ampiakanjoy an''i Arona ny fitafiana masina, dia hosory sy hamasino izy, mba ho mpisorona ho Ahy.'
mg1865::mg_2::40::14:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ento ny zanany, ka ampiakanjoy azy ny akanjo lava.'
mg1865::mg_2::40::15:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosory izy, tahaka ny nanosoranao ny rainy, mba ho mpisorona ho Ahy; ary ny fanosorana azy dia ho fisoronana mandrakizay ho azy hatramin''ny taranany fara mandimby.'
mg1865::mg_2::40::16:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Mosesy izany: araka izay rehetra efa nandidian''i Jehovah azy no nataony.'
mg1865::mg_2::40::17:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro voalohany tamin''ny volana voalohany tamin''ny taona faharoa no nananganana ny tabernakely.'
mg1865::mg_2::40::18:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nanangana ny tabernakely, dia nametraka ny faladiany sy nanangana ny zana-kazony, ary nampiditra ny barany sy nanangana ny andriny.'
mg1865::mg_2::40::19:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namelatra ny lay teo ambonin''ny tabernakely izy, ary ny firakotry ny lay nataony teo amboniny, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::20:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalainy ny Vavolombelona ka napetrany tao anatin''ny fiara, ary ny bao dia nataony teo amin''ny fiara, ary ny rakotra fanaovam-panavotana dia napetrany teo ambonin''ny fiara.'
mg1865::mg_2::40::21:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiara dia nampidiriny tao amin''ny tabernakely, ka nahantony ny efitra lamba fanakonana hanakona ny fiaran''ny Vavolombelona, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::22:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny latabatra dia napetrany teo amin''ny trano-lay fihaonana, dia teo amin''ny lafin''ny tabernakely avaratra, teo ivelan''ny efitra lamba.'
mg1865::mg_2::40::23:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandahatra mofo teo amboniny teo anatrehan''i Jehovah izy, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::24:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaovan-jiro dia napetrany teo amin''ny trano-lay fihaonana, tandrifin''ny latabatra, teo amin''ny lafin''ny tabernakely atsimo.'
mg1865::mg_2::40::25:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampirehitra ny jiro teo anatrehan''i Jehovah izy, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::26:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny alitara volamena dia nataony teo amin''ny trano-lay fihaonana, teo anoloan''ny efitra lamba;'
mg1865::mg_2::40::27:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nandoro ditin-kazo mani-pofona teo izy, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::28:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varavarana lamba dia nataony teo amin''ny varavaran''ny tabernakely;'
mg1865::mg_2::40::29:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny alitara fandoroana ny fanatitra dorana dia napetrany teo anoloan''ny varavaran''ny tabernakelin''ny trano-lay fihaonana; ary nateriny teo amboniny ny fanatitra dorana sy ny fanatitra hohanina, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::30:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tavy dia nataony teo anelanelan''ny trano-lay fihaonana sy ny alitara, ka nasiany rano teo anatiny hanasana.'
mg1865::mg_2::40::31:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo no nanasan''i Mosesy sy Arona ary ny zanany ny tongony aman-tanany.'
mg1865::mg_2::40::32:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha niditra tao amin''ny trano-lay fihaonana izy, ary raha nanakaiky ny alitara, dia nisasa izy, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_2::40::33:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary natsangany koa ny kianja manodidina ny tabernakely sy ny alitara; ary ny vavahady lamba dia nataony teo amin''ny vavahadin''ny kianja. Dia vitan''i Mosesy ny asa rehetra.'
mg1865::mg_2::40::34:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahona nanarona ny trano-lay fihaonana, ary ny voninahitr''i Jehovah nameno ny tabernakely.'
mg1865::mg_2::40::35:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy tsy nahazo niditra tao amin''ny trano-lay fihaonana, satria ny rahona nitoetra teo amboniny, ary ny voninahitr''i Jehovah nameno ny tabernakely.'
mg1865::mg_2::40::36:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niakatra niala tamin''ny tabernakely ny rahona, dia nifindra ny Zanak''Isiraely tamin''ny nandehanany rehetra;'
mg1865::mg_2::40::37:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tsy niakatra ny rahona, dia tsy nifindra izy, mandra-pihavin''izay andro hiakarany.'
mg1865::mg_2::40::38:
  verse_version: mg1865
  verse_book: mg_2
  verse_chapter: 40
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny rahon''i Jehovah dia teo ambonin''ny tabernakely nony andro, ary nisy afo teo aminy nony alina, teo imason''ny taranak''Isiraely rehetra, tamin''ny nandehanany rehetra.'
