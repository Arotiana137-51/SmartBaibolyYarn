mg1865::mg_30::1::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Amosa, izay isan''ny mpiandry ondry tao Tekoa, dia izay hitany ny amin''ny Isiraely tamin''ny andro nanjakan''i Ozia, mpanjakan''ny Joda, sy tamin''ny andro nanjakan''i Jeroboama, zanak''i Joasy, mpanjakan''ny Isiraely, roa taona talohan''ny horohorontany.'
mg1865::mg_30::1::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny loza hanjo ny firenena enina amin''ny jentilisa sy ny Joda, ary indrindra fa ny Isiraely'
  verse_text: 'Ary hoy izy: Jehovah mierona ao Ziona ary mampikotroka any Jerosalema; Ny saha fiandrasana ondry dia mitomany ary maina ny tampon''i Karmela.'
mg1865::mg_30::1::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Damaskosy, eny, efatra aza, dia tsy havelako* izy, satria kodia vy no nivelezany an''i Gileada; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::1::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa haterako afo ny tranon''i Hazaela, ka handevona ny tranoben''i Beni-hadada izany.'
mg1865::mg_30::1::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotorotoroiko koa ny hidin''i Damaskosy, ary hofoanako tsy hisy mponina* ny lohasahan''i Avena, ary Bet-edena tsy hisy hitana tehina fanapahana; Ary ny vahoakan''i Syria dia ho lasan-ko babo any Kira, hoy Jehovah. [*Na: mpanapaka]'
mg1865::mg_30::1::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Gaza, eny, efatra aza, dia tsy havelako* izy, satria lasany ho babo avokoa ny olona hatolony ho any Edoma; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::1::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa haterako afo ny mandan''i Gaza, ka handevona ny tranobeny izany;'
mg1865::mg_30::1::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofoanako Asdoda tsy hisy mponina, ary Askelona tsy hisy hitana tehina fanapahana; Dia haveriko ny tanako hamely an''i Ekrona, ka ho faty izay sisa amin''ny Filistina, hoy Jehovah Tompo'
mg1865::mg_30::1::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: noho ny fahotana telon''i Tyro, eny efatra aza, dia tsy havelako* izy, satria natolony ho any Edoma ny babo rehetra, ary tsy notsarovany ny fanekem-pirahalahiana; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::1::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa haterako afo ny mandan''i Tyro, ka handevona ny tranobeny izany'
mg1865::mg_30::1::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: noho ny fahotana telon''i Edoma, eny, efatra aza, dia tsy havelako* izy, satria nanenjika ny rahalahiny tamin''ny sabatra izy, ka nofoanany ny fiantrany, ny fahatezerany dia namiravira mandrakariva, ary ny fahavinirany notehiriziny lalandava; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::1::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa haterako afo ao Temana, ka handevona ny tranoben''i Bozra izany'
mg1865::mg_30::1::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: noho ny fahotana telon''ny taranak''i Amona, eny, efatra aza, dia tsy havelako* izy, satria notatahany izay bevohoka tao Gileada, hanitarany ny faritaniny; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::1::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hampirehitra afo ao amin''ny mandan''i Raba Aho, ka handevona ny tranobeny izany, sady hisy akora amin''ny andro iadiana sy rivo-mahery amin''ny andron''ny tadio;'
mg1865::mg_30::1::15:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho lasan-ko babo ny mpanjakany mbamin''ireo mpanapaka rehetra ao aminy, hoy Jehovah.'
mg1865::mg_30::2::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Moaba, eny, efatra aza, dia tsy havelako* izy, satria nodorany ho sokay ny taolan''ny mpanjakan''i Edoma; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::2::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hataoko afo ao Moaba, ka handevona ny tranoben''i Kiriota izany; Ary Moaba ho faty amin''ny tabataba sy amin''ny akora ary ny fanenon''ny anjomara;'
mg1865::mg_30::2::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofoanako tsy hisy mpitsara ao aminy, ary hiaraka hovonoiko izy sy ireo mpanapaka rehetra ao aminy, hoy Jehovah.'
mg1865::mg_30::2::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Joda, eny, efatra aza, dia tsy havelako* izy, satria nataony tsinontsinona ny lalàn''i Jehovah, ary ny didiny tsy notandremany, ary nampahadiso azy ny laingany, izay fanaon''ny razany; [*Hebreo: tsy hahemotro]'
mg1865::mg_30::2::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa haterako afo ao Joda, ka handevona ny tranoben''i Jerosalema izany.'
mg1865::mg_30::2::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''Isiraely, eny, efatra aza, dia tsy havelako* izy, satria namidiny volafotsy ny olona marina sy kapa iray lomisy ny malahelo, [*Hebreo: tsy hahemotro]'
mg1865::mg_30::2::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mihanahana mitsiriritra ny vovo-tany eo* an-dohan''ny malahelo izy sady mamily ny alehan''ny mpandefitra, ary olona mianaka dia samy mandry amin''ny zazavavy iray ihany mba handoto ny anarako masina; [*Na: ho eo]'
mg1865::mg_30::2::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny lamba azony tamin''ny tsatòka izy no mitsilailay eny anilan''ny alitara rehetra, ary misotro divay novidina tamin''ny sazy* ao an-tranon''ireo andriamaniny izy. [*Hebreo: divain''ny voasazy]'
mg1865::mg_30::2::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izaho no nandringana ny Amorita teo anoloany, dia olona izay lava tsanganana toy ny hazo sedera sy natanjaka toy ny oka; Eny, nosimbako ny voany teny ambony sy ny fatany tao ambany.'
mg1865::mg_30::2::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho no nitondra anareo niakatra avy tany amin''ny tany Egypta sady nitari-dalana anareo efa-polo taona tany an''efitra, mba handovanareo ny tanin''ny Amorita,'
mg1865::mg_30::2::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahinareo nisy natsangako ho mpaminany, ary ny zatovonareo ho Nazirita. Tsy izany va no izy, ry Zanak''Isiraely? hoy Jehovah.'
mg1865::mg_30::2::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nampisotroinareo divay ny Nazirita, ary ny mpaminany noraranareo hoe: Aza maminany.'
mg1865::mg_30::2::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho no hitambesatra aminareo* toy ny fitambesatry ny sariety feno amboara. [*Na: Izaho dia itambesaranareo]'
mg1865::mg_30::2::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsy ho afa-mandositra ny faingam-pandeha, ny mahery tsy hampiseho hery, ary ny lehilahy mahery tsy hahavonjy ny ainy;'
mg1865::mg_30::2::15:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitana tsipïka tsy hahajanona, ary ny faingan-tongotra tsy hahavonjy tena, izay mitaingin-tsoavaly tsy hahavonjy ny ainy;'
mg1865::mg_30::2::16:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia izay sahy ao amin''ny mahery aza dia handositra mitanjaka amin''izany andro izany, hoy Jehovah.'
mg1865::mg_30::3::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hamaliana ny Isiraely noho ny fahotany'
  verse_text: 'Henoy izao teny izao, izay lazain''i Jehovah ny aminareo, ry Zanak''Isiraely, dia ny amin''io taranaka rehetra nentiko niakatra avy tany amin''ny tany Egypta io:'
mg1865::mg_30::3::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo ihany no fantatro tamin''ny firenena rehetra ambonin''ny tany, koa noho izany dia hovaliako ianareo noho ny helokareo rehetra.'
mg1865::mg_30::3::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tafara-dalana va ny roa, raha tsy efa nifanaiky?'
mg1865::mg_30::3::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mierona any an''ala va ny liona, raha tsy mahita toha? Manerona ao an-davany va ny liona tanora, raha tsy mahazo zavatra?'
mg1865::mg_30::3::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voan''ny fandrika ety an-tany va ny vorona, raha tsy nisy tadivavarana? Mikatona va ny fandrika, raha tsy mahavoa zavatra?'
mg1865::mg_30::3::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsofina va ao an-tanàna ny anjomara, ka tsy hatahotra ny vahoaka? Misy loza ao an-tanàna va, raha tsy Jehovah no nahatonga izany?'
mg1865::mg_30::3::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manao na inona na inona tokoa Jehovah Tompo, raha tsy milaza ny heviny amin''ny mpaminany mpanompony.'
mg1865::mg_30::3::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny liona no mierona, ka iza no tsy hatahotra? Jehovah Tompo no miteny, ka iza no tsy haminany?'
mg1865::mg_30::3::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambarao ao an-tranoben''i Asdoda sy ao an-tranobe any amin''ny tany Egypta, ka ataovy hoe: Miangona any an-tendrombohitr''i Samaria ianareo, ary jereo ny tabataba be ao aminy sy ny fampahoriana* ao anatiny. [*Na: ny ampahorina]'
mg1865::mg_30::3::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mahalala hanao ny marina izy ireo, hoy Jehovah, dia ireo izay mitahiry fandozana sy roba ao an-tranobeny.'
mg1865::mg_30::3::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: He, misy fahavalo manodidina ny tany! Hazerany ho afaka aminao ny herinao, ary hobaboina ny tranobenao.'
mg1865::mg_30::3::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Toy ny famonjin''ny mpiandry ondry ny tongotr''ondry roa na ny sombin-tsofina eny am-bavan''ny liona, dia toy izany no ho famonjy ny Zanak''Isiraely, izay mipetraka ao Samaria, eo an-jorom-parafara sy eo amin''ny lamba fandriandriana avy any Damaskosy.'
mg1865::mg_30::3::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoinareo, ka ambarao hamelezana ny taranak''i Jakoba, hoy ny Tompo, Jehovah, Andriamanitry ny maro:'
mg1865::mg_30::3::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro hamaliako ny Isiraely noho ny fahotana ao aminy no hamaliako ny alitara ao Betela dia hokapaina ny tandroky ny alitara ka hianjera amin''ny tany.'
mg1865::mg_30::3::15:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamely ny trano ririnina sy ny trano fahavaratra Aho; Ary ho rava ny trano ivory, sady ho fongana ny trano maro, hoy Jehovah.'
mg1865::mg_30::4::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hanjo ny Isiraely noho ny tsy fetezany hibebaka'
  verse_text: 'Mihainoa izao teny izao, ianareo vantotr''ombivavin''i Basana, izay eny an-tendrombohitr''i Samaria, dia ianareo izay mampahory ny mahantra sy manorotoro ny malahelo ary manao amin''ny vadinareo* hoe: Mitondrà hosotrointsika. [*Na: ny tomponareo: Hebreo: tompony, na vadiny]'
mg1865::mg_30::4::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tompo efa nianiana tamin''ny fahamasinany hoe: Indro, ho avy aminareo ny andro hitarihany anareo amin''ny farango sy izay sisa aminareo amin''ny fintana.'
mg1865::mg_30::4::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy eo amin''ny banga no hivoahanareo, samy amin''izay hitsiny avy; Ary horoahina ho any Harmona* ianareo**, hoy Jehovah. [*Na: an-tranobe, Na: ary harianareo ny fahefana (?)]'
mg1865::mg_30::4::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa any Betela, ka manotà, ary any Gilgala, ka manotà fatratra; Ento isa-maraina ny fanatitrareo alatsa-drà ary isan-kateloana ny fahafolon-karenareo;'
mg1865::mg_30::4::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandoroa zavatra misy masirasira ho fanati-pisaorana, ary miantsoa fanati-tsitrapo, eny, ambarao izany! Satria ny toy izany no sitrakareo, ry Zanak''Isiraely, hoy Jehovah Tompo.'
mg1865::mg_30::4::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho dia efa nanome anareo ny mahamavovava tao an-tanànanareo rehetra, sy ny tsy fahampian-kanina tamin''ny fonenanareo rehetra; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah.'
mg1865::mg_30::4::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho koa efa nampihantona ny orana tsy ho aminareo, raha mbola telo volana sisa tsy ho fararano, ka tamin''ny tanàna iray no nampilatsahako orana, ary tamin''ny tanàna iray kosa tsy mba nampilatsahako azy; Ny saha iray nilatsahan''ny orana. Ary ny saha iray kosa tsy mba nilatsahany ka maina.'
mg1865::mg_30::4::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivembena ny tanàna roa aman-telo nitady rano tany amin''ny tanàna iray, kanjo tsy afa-ketaheta izy; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah.'
mg1865::mg_30::4::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nasiako tamin''ny vary main''ny rivotra sy maty fotsy ianareo; Ny habetsahan''ny tanimbolinareo sy ny tanim-boalobokareo sy ny aviavinareo sy ny hazo olivanareo dia nohanin''ny valala*; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. [*Hebreo: mpikiky]'
mg1865::mg_30::4::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa naterako areti-mandringana tahaka ny any Egypta ianareo; Novonoiko sabatra ny zatovonareo sady nobaboina koa ny soavalinareo; Ary nampakariko ho eo am-bavoronareo ny hamaimboan''ny tobinareo; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah.'
mg1865::mg_30::4::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nisy noravako teo aminareo tahaka ny nandravan''Andriamanitra an''i Sodoma sy Gomora, ka efa tahaka ny forohana nosarihana tamin''ny afo ianareo; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah.'
mg1865::mg_30::4::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: '2022-12-11T07:11:09+0000'
  verse_title: null
  verse_text: 'Koa izao no hataoko aminao, ry Isiraely, satria hanao izany aminao Aho, dia miomàna hihaona amin''Andriamanitrao, ry Isiraely o.'
mg1865::mg_30::4::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: '2022-12-11T07:11:22+0000'
  verse_title: null
  verse_text: 'Fa indro Ilay mamorona ny tendrombohitra sy manao ny rivotra ary mampahafantatra ny olombelona izay heviny, dia Ilay mahatonga ny maraina ho aizina ary mandia ny fitoerana avo amin''ny tany: Jehovah, Andriamanitry ny maro, no anarany.'
mg1865::mg_30::5::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handravana ny fanjakan''Isiraely'
  verse_text: 'Henoinareo izao teny izao, izay entiko milaza anareo, dia hira fahalahelovana, ry taranak''Isiraely;'
mg1865::mg_30::5::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: '2022-08-04T05:29:52+0000'
  verse_title: null
  verse_text: 'Lavo Isiraely virijina ka tsy hahatsangana intsony; Nazera tamin''ny taniny izy, ka tsy misy manangana azy.'
mg1865::mg_30::5::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Izay tanàna namoaka arivo, dia, indreo, zato monja no sisa: ary izay namoaka zato, dia, indreo, folo monja no sisa ho an''ny taranak''Isiraely.'
mg1865::mg_30::5::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah amin''ny taranak''Isiraely; Tadiavo Aho, dia ho velona ianareo;'
mg1865::mg_30::5::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aza mitady an''i Betela, na mankany Gilgala, ary aza mandroso ho any Beri-sheba; Fa ho babo tokoa Gilgala, ary Betela dia ho tonga tsinontsinona.'
mg1865::mg_30::5::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitadiava an''i Jehovah, dia ho velona ianareo; Fandrao hilatsaka toy ny afo mandevona amin''ny taranak''i Josefa Izy, ary Betela tsy hanana izay hahafaty ny afo,'
mg1865::mg_30::5::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ianareo izay mamadika ny rariny ho zava-mahafaty ary mampiongana ny fahamarinana ho eo amin''ny tany.'
mg1865::mg_30::5::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay nanao an''Ikotokelimiadilaona sy ny Telonohorefy, ary mampody ny aloky ny fahafatesana ho maraina sy manamaizina ny andro ho alina, dia ilay miantso ny rano ao an-dranomasina ka mandatsaka azy amin''ny tany: Jehovah no anarany,'
mg1865::mg_30::5::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay mampitselatra fandravana hamely ny mahery, ka dia mihatra amin''ny tanàna mimanda ny fandravana.'
mg1865::mg_30::5::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: '2022-08-04T05:29:35+0000'
  verse_title: null
  verse_text: 'Halàny eo am-bavahady izay mananatra, ary ataony ho fahavetavetana izay miteny ny marina. [*Na: Halany izay mananatra eo am-bavahady]'
mg1865::mg_30::5::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho ny fanitsakitsahanareo ny mahantra sy ny nampandoavanareo vary azy, dia mba nanao trano vato voapaika ihany ianareo, nefa tsy hitoetra ao aminy; Namboly tanim-boaloboka mahafinaritra ihany ianareo, nefa tsy hisotro ny divay avy aminy.'
mg1865::mg_30::5::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro fa be ny helokareo, ary fatratra ny fahotanareo: Mampahory ny marina sy mandray kolikoly* ianareo ary mamadika ny malahelo eo am-bavahady. [*Hebreo: avotra]'
mg1865::mg_30::5::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay manan-tsaina dia hangina amin''izao andro izao, fa andro mampahory izao.'
mg1865::mg_30::5::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsara no tadiavo, fa aza ny ratsy, mba ho velona ianareo; Ka dia homba anareo Jehovah, Andriamanitry ny maro, araka izay efa nolazainareo.'
mg1865::mg_30::5::15:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankahalao ny ratsy, ka tiavo ny tsara, ary aoreno eo am-pitsarana* ny rariny; Angamba Jehovah, Andriamanitry ny maro, hamindra fo amin''izay sisa amin''i Josefa. [*Hebreo: am-bavahady]'
mg1865::mg_30::5::16:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo, Andriamanitry ny maro: Eny an-kalalahana rehetra dia hisy fisaonana, ary eny an-dalambe rehetra dia hisy hanao hoe: Indrisy! Indrisy! Ary hiantso ny mpiasa tany hitomany izy, ary izay mahay hira fisaonana dia hantsoiny hanao.'
mg1865::mg_30::5::17:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary any amin''ny tanim-boaloboka rehetra dia hisy fisaonana; Fa handeha hamaky eo aminao Aho, hoy Jehovah.'
mg1865::mg_30::5::18:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izay maniry ny andron''i Jehovah! Hataonareo inona moa ny andron''i Jehovah? Dia aizina, fa tsy fahazavana,'
mg1865::mg_30::5::19:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny olona mandositra ny liona ka sendra ny bera, ary rehefa tafiditra ao an-trano ka mitehin-tanana amin''ny rindrina, dia kekerin''ny menarana.'
mg1865::mg_30::5::20:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy aizina va ny andron''i Jehovah, fa tsy fahazavana? Tsy aizim-pito tsy misy mangirana akory va izany?'
mg1865::mg_30::5::21:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halako, eny, laviko ny andro firavoravoanareo, ary tsy ho hanitra ankasitrahana amiko ny fivorianareo masina.'
mg1865::mg_30::5::22:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ateranareo fanatitra dorana sy fanatitra hohanina aza Aho, dia tsy sitrako izany; Ny zanak''omby mifahy aterinareo ho fanati-pihavanana dia tsy hojereko akory.'
mg1865::mg_30::5::23:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atsaharo ny finaonaonan''ny hiranareo*, fa maharenina Ahy; Fa tsy hihaino ny fanenon''ny lokanganareo* Aho. [*Hebreo: Hiranao, lokanganao]'
mg1865::mg_30::5::24:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny fitsarana hanalonalona toy ny rano, ary ny fahamarinana toy ny renirano tsy mety ritra.'
mg1865::mg_30::5::25:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa nanatitra fanatitra hohanina sy fanatitra alatsa-drà ho Ahy tany an''efitra efa-polo taona va ianareo, ry taranak''i Isiraely?'
mg1865::mg_30::5::26:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, fa ny nitondra* ny tabernakelin''ny mpanjakanareo sy ny fipetrahan''ny sampinareo ihany no nataonareo**, dia ny kintan''ny andriamanitrareo, izay nataonareo ho anareo [*Na: Dia ho entinareo] [**Na: Tsia fa ny mitondra an''i Sikota, mpanjakanareo, sy Kiona, sampinareo, no nataonareo]'
mg1865::mg_30::5::27:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho entiko ho babo any ankoatr''i Damaskosy ianareo, hoy Jehovah, Andriamanitry ny maro no anarany.'
mg1865::mg_30::6::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ireo miadana ao Ziona sy ireo matokitoky foana ao an-tendrombohitr''i Samaria, dia ireo malaza eo amin''ny firenena malaza indrindra sady hatonin''ny taranak''Isiraely.'
mg1865::mg_30::6::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa any Kalne ianareo, ka mijere, dia mandrosoa ihany ho any Hamata lehibe; Ary midina ho any Gatan''ny Filistina; Tsara noho ireo fanjakana ireo va izy? Sa lehibe noho ny tanin''ireo va ny taninareo?'
mg1865::mg_30::6::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay mihevitra ny andro mampahory ho mbola lavitra sy mampanakaiky ny seza fandozana,'
mg1865::mg_30::6::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ireo izay mandrimandry ao amin''ny farafara ivoriny sy mitsilailay eo amin''ny fandriandriany ary homana ny zanak''ondry avy amin''ny andian''ny ondry sy ny zanak''omby avy ao am-pahitra,'
mg1865::mg_30::6::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ireo izay mivovo foana manaraka ny feon-dokanga ary mamorona zava-maneno toy ny nataon''i Davida,'
mg1865::mg_30::6::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ireo izay misotro divay amin''ny lovia famafazana sady mihosotra diloilo tsara Indrindra, nefa tsy onena ny fahasimban''i Josefa.'
mg1865::mg_30::6::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izao dia ho voalohany amin''izay hobaboina ireo, ary hatsahatro ny hobin''izay mitsilailay foana.'
mg1865::mg_30::6::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tompo dia efa nianiana tamin''ny tenany, hoy Jehovah, Andriamanitry ny maro: Fahavetavetana eo anatrehako ny reharehan''i Jakoba, ary halako ny tranobeny; Koa dia hatolotro ny tanàna mbamin''izay rehetra ao anatiny.'
mg1865::mg_30::6::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hisy folo lahy sisa ao an-trano iray, dia samy ho faty ireo.'
mg1865::mg_30::6::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: '2022-10-24T04:42:03+0000'
  verse_title: null
  verse_text: 'Ary ny havan''izay maty, na izay handevina* azy, dia hambeta azy ka hitondra ny faty hiala ao an-trano, dia hiteny amin''izay ao anaty trano hoe: Mbola misy ihany va ato aminao? Ary raha hoy izy: Tapitra! Dia hovaliana hoe: Mangina re! fa tsy tokony hotononina ny anaran''i Jehovah. [*Hebreo: handoro]'
mg1865::mg_30::6::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Jehovah no mandidy, ka horavana ny trano lehibe, ary hotresatresahina ny trano madinika.'
mg1865::mg_30::6::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihazakazaka eny amin''ny sola-bato va ny soavaly. Misy olona mampihosy omby va eny, no efa navadikareo ho zava-mangidy ny rariny, ary ny vokatry ny fahamarinana ho zava-mahafaty?'
mg1865::mg_30::6::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ianareo izay mifaly amin''ny zava-poana ka manao hoe: Moa tsy ny herinay va no ahazoanay tandroka ho anay?'
mg1865::mg_30::6::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, hanangana firenena hamely anareo Aho, ry taranak''Isiraely, hoy Jehovah, Andriamanitry ny maro, dia hampahory anareo hatrany akaikin''i Hamata izy ka hatramin''ny lohasahan-driaka any amin''ny tani-hay.'
mg1865::mg_30::7::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahitana ny amin''ny valala, sy ny afo, ary ny Pilao'
  verse_text: 'Izao no nasehon''i Jehovah Tompo tamiko: Indro, nanao ny valala tamin''ny voalohan''ny nitsimohan''ny kolokolon''ahitra Izy; ary, indro, kolokolon''izay nojinjana ho an''ny mpanjaka izany.'
mg1865::mg_30::7::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa laniny avokoa ny zava-maniry amin''ny tany, dia hoy izaho: Jehovah Tompo, mifona aminao aho mamelà heloka! Hataon''i Jakoba ahoana no fahajanona? Fa kely izy.'
mg1865::mg_30::7::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanenenan''i Jehovah izany; Tsy hisy izany, hoy Jehovah.'
mg1865::mg_30::7::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nasehon''i Jehovah Tompo tamiko: Indro, Jehovah Tompo miantso hifandahatra hamely amin''ny afo, ka nandevona ny lalina lehibe sy nila handany ny zara-lova izany.'
mg1865::mg_30::7::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Jehovah Tompo, Mifona aminao aho, mitsahara! Hataon''i Jakoba ahoana no fahajanona? Fa kely izy.'
mg1865::mg_30::7::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanenenan''i Jehovah izany; Tsy hisy izany, hoy Jehovah Tompo.'
mg1865::mg_30::7::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nasehony ahy: Indro, ny Tompo nitsangana teo ambonin''ny manda natao amin''ny pilao, sady nisy pilao teny an-tanany.'
mg1865::mg_30::7::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Inona no hitanao, ry Amosa? Ary hoy izaho: Pilao. Dia hoy ny Tompo: Indro, hanisy pilao eo amin''ny Isiraely oloko Aho, fa tsy handefitra aminy* intsony; [*Hebreo: handalo azy]'
mg1865::mg_30::7::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho foana ny fitoerana avon''Isaka, ary ho rava ny fitoera-masin''Isiraely; Ary hitsangana Aho ka hamely sabatra ny taranak''i Jeroboama.'
mg1865::mg_30::7::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny natao tamin''i Amosa tao Betela, sy ny teny nataony tamin''izany'
  verse_text: 'Dia naniraka tany amin''i Jeroboama, mpanjakan''ny Isiraely, Amazia, ilay mpisorona tao Betela, nanao hoe: Amosa efa nanao tetika hikomy aminao teo amin''ny taranak''Isiraely, ary tsy zakan''ny tany ny teniny rehetra,'
mg1865::mg_30::7::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria hoy Amosa: Ho fatin-tsabatra Jeroboama, ary hobaboina hiala amin''ny taniny tokoa ny Isiraely.'
mg1865::mg_30::7::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Amazia tamin''i Amosa: Ry mpahita! andeha mandositra mankany amin''ny tanin''ny Joda ianao, ka mihinàna hanina any, ary maminania any;'
mg1865::mg_30::7::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa aza maminany eto Betela intsony; fa fitoera-masin''ny mpanjaka sy tranom-panjakana ity.'
mg1865::mg_30::7::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Amosa ka nanao tamin''i Amazia hoe: Tsy mba mpaminany aho, na zanaka ny mpaminany; fa mpiandry ondry sy mpioty* aviavy** ihany aho, [*Na: mpandraotra] [**sykomora]'
mg1865::mg_30::7::15:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'saingy nalain''i Jehovah tany ampiandrasana ondry ka nataony hoe: Mandehana, ka maminania amin''ny Isiraely oloko.'
mg1865::mg_30::7::16:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka mba henoy ny tenin''i Jehovah: Ianao manao hoe: Aza maminany ny hamelezana ny Isiraely, ary aza milaza ny hamelezana ny taranak''Isaka;'
mg1865::mg_30::7::17:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Ny vadinao hijangajanga ao an-tanàna, ary ny zanakao-lahy sy ny zanakao-vavy ho lavon-tsabatra, Ary ny taninao hozaraina amin''ny famolaina; Ary ny tenanao ho faty any amin''ny tany maloto; Ary ny Isiraely hobaboina hiala amin''ny taniny tokoa.'
mg1865::mg_30::8::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahitana nentin''Andriamanitra nilaza tamin''i Amosa ny fahantomotry ny loza hanjo ny Isiraely'
  verse_text: 'Izao no nasehon''i Jehovah Tompo tamiko; Indro, nisy harona feno voankazo masaka fahavaratra.'
mg1865::mg_30::8::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Inona no hitanao, ry Amosa? Dia hoy izaho: Harona feno voankazo masaka fahavaratra. Dia hoy Jehovah tamiko: Tonga amin''ny Isiraely oloko ny farany; Tsy handefitra aminy* intsony Aho. [*Hebreo: handalo azy]'
mg1865::mg_30::8::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tonga naonaona ny hira ao an-dapa* amin''izany andro izany, hoy Jehovah Tompo; Ho be ny faty, Hatraiza hatraiza no hanariany azy. Mangina re! [*Na: tempoly]'
mg1865::mg_30::8::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihanoa izao, ianareo izay mihanahana te-hitelina ny malahelo sy hahafongana ny mpandefitra amin''ny tany'
mg1865::mg_30::8::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka manao hoe: Rahoviana no ho tapitra ny voaloham-bolana, hivarotantsika vary, sy ny Sabata, hanokafantsika ny lava-bary, ka hanakelezana ny efaha sy hanalehibiazana ny sekely, ary hanaovana mizana mandainga'
mg1865::mg_30::8::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hovidintsika volafotsy ny mahantra sy kiraro iray lomisy ny malahelo, ary hivarotantsika ny loha-kororoky ny vary?'
mg1865::mg_30::8::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: '2022-10-24T04:42:08+0000'
  verse_title: null
  verse_text: 'Jehovah nianiana tamin''ny Reharehan''i Jakoba ka nanao hoe: Tsy hisy hohadinoiko mandrakizay ny asany na dia iray akory aza!'
mg1865::mg_30::8::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hihorohoro noho izany va ny tany, sy hitomany ny mponina rehetra ao aminy? Eny, ny tany rehetra hihatondraka tahaka an''i Neily sy hihena indray toy ny Neilin''i Egypta.'
mg1865::mg_30::8::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany, hoy Jehovah Tompo, dia halentiko mitataovovonana ny masoandro, ary hohamaiziniko antoandrobenanahary ny tany;'
mg1865::mg_30::8::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampodiko ho fitomaniana ny andro firavoravoanareo, ary ho hira fahalahelovana ny hiranareo rehetra, hofeheziko lamba fisaonana* ny valahana rehetra, sady hokakasako ny loha rehetra; Ary hataoko ho toy ny fisaonana zanakalahy tokana izany, Ka ny farany dia ho tahaka ny andro mangidy. [*Hebreo: lamba malailay]'
mg1865::mg_30::8::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah Tompo, izay hanaterako mosary amin''ny tany, tsy fanirian-kanina anefa, na hetahetan-drano, fa faniriana* handre ny tenin''i Jehovah; [*Hebreo: mosary]'
mg1865::mg_30::8::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hivembena hatrany amin''ny ranomasina ka hatrany amin''ny ranomasina ny olona ary hatrany amin''ny avaratra ka hatrany amin''ny atsinanana, eny, hivezivezy hitady ny tenin''i Jehovah izy, nefa tsy hahita.'
mg1865::mg_30::8::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia ho jemby noho ny hetaheta ny virijina tsara tarehy sy ny zatovolahy,'
mg1865::mg_30::8::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ireo izay mianiana amin''ny fahotan''i Samaria, ka manao hoe: velona koa ny andriamanitrao, ry Dana, ary raha velona koa ny fanaon''i Beri-sheba; eny, ho lavo izy ka tsy hiarina intsony.'
mg1865::mg_30::9::1:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahitana ny amin''ny handravana ny fanjakana be ota, sy ny hananganana indray ny tabernakelin''i Davida'
  verse_text: 'Nahita ny Tompo nitsangana teo anilan''ny alitara aho, ka hoy Izy: Asio ny kapitaly hihetsiketsehan''ny tokonana, ary torotoroy hianjera amin''ny lohan''izy rehetra, ka izay sisa aminy dia hovonoiko amin''ny sabatra; Ary tsy hisy afa-mandositra izy, sady tsy hisy izay sisa ho afaka akory.'
mg1865::mg_30::9::2:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mibosesika ho any amin''ny fiainan-tsy hita aza izy, dia any no hanalan''ny tanako azy; Ary na dia miakatra ho any an-danitra aza izy, dia avy any no hampidinako azy.'
mg1865::mg_30::9::3:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia miery any an-tampon''i Karmela aza izy, dia any no hitadiavako sy hangalako azy; Ary na dia manafin-tena any ambanin''ny ranomasina aza izy, mba tsy ho hitan''ny masoko, dia any no handidiako ny menarana, ka hanaikitra azy.'
mg1865::mg_30::9::4:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia lasan-ko babo eo anoloan''ny fahavalony aza izy, dia any no handidiako ny sabatra, ka hamono azy; Ary hampanandriniko azy ny masoko hahatonga ny loza aminy, fa tsy ny soa.'
mg1865::mg_30::9::5:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah, Tompon''ny maro, no manendry ny tany, ka dia miempo izany, ka misaona ny mponina rehetra ao aminy; Ary dia hihatondraka tahaka an''i Neily avokoa Izany, ary hihena indray izy toy ny Neilin''i Egypta,'
mg1865::mg_30::9::6:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manao ny tranony ambony any an-danitra Izy, sady manorina ny andohalambony eny ambonin''ny tany; Ary miantso ny rano eny an-dranomasina ka mampilatsaka azy eny amin''ny tany, Jehovah no anarany.'
mg1865::mg_30::9::7:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy toy ny taranaky ny Etiopiana va ianareo raha amiko, ry Zanak''Isiraely? hoy Jehovah. Tsy ny Isiraely va no nentiko nivoaka avy tany amin''ny tany Egypta. Ary ny Filistina avy tany Kaftora, Ary ny Syriana avy tany Kira?'
mg1865::mg_30::9::8:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny mason''i Jehovah Tompo no manandrina ity fanjakana feno ota ity, ka dia hofongorako tsy ho eo ambonin''ny tany izy; Kanefa tsy dia hofongorako avokoa ny taranak''i Jakoba, hoy Jehovah.'
mg1865::mg_30::9::9:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Izaho no handidy, ka hosivaniko any amin''ny firenena rehetra ny taranak''Isiraely, tahaka ny fanasivana vary amin''ny sivana; Nefa tsy hisy voam-bary ho latsaka amin''ny tany na dia iray akory aza.'
mg1865::mg_30::9::10:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sabatra no hamonoana ny mpanota rehetra amin''ny oloko, dia ireo izay manao hoe: Ny loza tsy hanakaiky na hahatratra anay.'
mg1865::mg_30::9::11:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hatsangako indray ny trano-bongon''i Davida izay efa nianjera, ary hotampenako ny efa banga ao; Ary hamboariko izay efa rava aminy, ka hataoko tahaka ny taloha izy,'
mg1865::mg_30::9::12:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hananany izay sisa amin''i Edoma sy amin''ny jentilisa rehetra, izay hantsoina amin''ny anarako, hoy Jehovah, Izay manao izany.'
mg1865::mg_30::9::13:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, hoy Jehovah, Izay hahatraran''ny mpiasa tany ny mpijinja, ary ny mpanosihosy voaloboka hahatratra ny mpamafy; Ny tendrombohitra hipoipoitra ranom-boaloboka, ary ny havoana rehetra hiempo.'
mg1865::mg_30::9::14:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampodiko ny Isiraely avy amin''ny fahababoana, dia hanangana ny tanàna efa rava izy ka honina ao, ary hanao tanim-boaloboka izy ka hisotro ny divay avy aminy; Hanao saha koa izy ka hihinana ny vokatra.'
mg1865::mg_30::9::15:
  verse_version: mg1865
  verse_book: mg_30
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hamboleko ao amin''ny taniny izy, ka tsy hongotana amin''ny taniny izay nomeko azy intsony izy, Hoy Jehovah Andriamanitrao.'
