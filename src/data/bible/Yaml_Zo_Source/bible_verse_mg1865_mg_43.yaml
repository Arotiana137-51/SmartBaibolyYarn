mg1865::mg_43::1::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fitarihan-teny
  verse_text: 'Tamin''ny voalohany ny Teny, ary ny Teny tao amin''Andriamanitra, ary ny Teny dia Andriamanitra.'
mg1865::mg_43::1::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy dia tao amin''Andriamanitra tamin''ny voalohany.'
mg1865::mg_43::1::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nahariana ny zavatra rehetra; ary raha tsy Izy dia tsy nisy nahariana izao zavatra ary izao, na dia iray aza.'
mg1865::mg_43::1::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nisiam-piainana; ary ny fiainana no fanazavana ny olona.'
mg1865::mg_43::1::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mazava dia mamirapiratra ao amin''ny maizina; fa ny maizina tsy nandray azy*. [*Na: Tsy mahasakana azy]'
mg1865::mg_43::1::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy lehilahy nirahin''Andriamanitra, Jaona no anarany.'
mg1865::mg_43::1::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy tonga ho vavolombelona hanambara ny Mazava, mba hinoan''ny olona rehetra noho ny teniny.'
mg1865::mg_43::1::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izy anefa no Ilay Mazava, fa tonga ho vavolombelona hanambara ny Mazava ihany izy.'
mg1865::mg_43::1::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tao ny tena Mazava* Izay mahazava ny olona rehetra tonga amin''izao tontolo izao**. [*Na: Izy no tena Mazava] [**Na: Ny Mazava marina, Izay mahazava ny olona rehetra, dia tonga amin''izao tontolo izao]'
mg1865::mg_43::1::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''izao tontolo izao Izy, ary Izy no nanaovana izao tontolo izao, nefa izao tontolo izao tsy nahalala Azy.'
mg1865::mg_43::1::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga tany amin''ny Azy Izy, fa ny Azy tsy nandray Azy.'
mg1865::mg_43::1::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra nandray Azy dia nomeny hery* ho tonga zanak''Andriamanitra, dia izay mino ny anarany, [*Na: anarana, na fahefana]'
mg1865::mg_43::1::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ireo izay tsy nateraky ny rà, na ny sitrapon''ny nofo, na ny sitrapon''ny olona, fa naterak''Andriamanitra.'
mg1865::mg_43::1::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Teny dia tonga nofo ka nonina* tamintsika; ary hitanay ny voninahiny, dia voninahitra miendrika ho an''ny Lahitokana avy tamin''ny Ray, sady feno fahasoavana sy fahamarinana. [*Grika: nitoetra an-day]'
mg1865::mg_43::1::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jaona nanambara Azy ka niantso hoe: Izy Ilay nolazaiko hoe: Izay avy ao aoriako dia efa tonga eo alohako, satria talohako Izy.'
mg1865::mg_43::1::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny fahafenoany no nandraisantsika rehetra, dia fahasoavana anampy fahasoavana.'
mg1865::mg_43::1::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lalàna dia nomena tamin''ny alalan''i Mosesy; [*fa] ny fahasoavana sy ny fahamarinana kosa dia tonga tamin''ny alalan''i Jesoa Kristy.'
mg1865::mg_43::1::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nisy nahita an''Andriamanitra na oviana na oviana ; fa ny Zanakalahy Tokana, Izay ao an-tratran''ny Ray, Izy no nanambara [*Azy].'
mg1865::mg_43::1::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny nanambaran''i Jaona Mpanao-batisa an''i Jesoa'
  verse_text: 'Ary izao no nambaran''i Jaona, raha ny Jiosy naniraka mpisorona sy Levita avy tany Jerosalema hankany aminy mba hanontany azy hoe: Iza moa ianao?'
mg1865::mg_43::1::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nilaza marina izy ka tsy nandà, fa hoy ny filàzany: Tsy izaho no Kristy.'
mg1865::mg_43::1::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nanontany azy hoe: Ahoana ary? Elia va ianao? Fa hoy izy: Tsy izy aho. Ilay Mpaminany va ianao? Fa izy namaly hoe: Tsia.'
mg1865::mg_43::1::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Iza ary ianao? mba hitondranay valiny ho any amin''izay naniraka anay. Lazainao ho iza moa ny tenanao?'
mg1865::mg_43::1::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Izaho dia feon''ny miantso mafy any an''efitra hoe: Ataovy mahitsy ny lalan''i Jehovah (Isaia 40:3), araka izay nolazain''Isaia mpaminany.'
mg1865::mg_43::1::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iraka avy tamin''ny Fariseo ireo.'
mg1865::mg_43::1::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany azy ireo ka nanao taminy hoe: Nahoana ary ianao no manao batisa raha tsy ianao no Kristy, na Elia, na Ilay Mpaminany?'
mg1865::mg_43::1::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jaona namaly azy ka nanao hoe: Izaho manao batisa amin''ny rano; fa eto aminareo misy Anankiray Izay tsy fantatrareo,'
mg1865::mg_43::1::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Ilay avy ao aoriako, ary tsy miendrika hamaha ny fehin-kapany aza aho.'
mg1865::mg_43::1::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany dia natao tany Betania* any an-dafin''i Jordana, izay nanaovan''i Jaona batisa. [*Na: Betabara]'
mg1865::mg_43::1::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony ampitso dia nahita an''i Jesoa avy manatona azy Jaona, ka dia hoy izy: Indro ny Zanak''ondrin''Andriamanitra, Izay manaisotra* ny fahotan''izao tontolo izao! [*Na: mitondra]'
mg1865::mg_43::1::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy Ilay nolazaiko hoe: Misy Lehilahy avy ao aoriako Izay efa tonga eo alohako, satria talohako Izy.'
mg1865::mg_43::1::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho tsy nahalala Azy; fa mba haseho amin''ny Isiraely Izy, izany no nihaviako manao batisa amin''ny rano.'
mg1865::mg_43::1::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaona nanambara ka nanao hoe: Izaho nahita ny Fanahy midina avy any an-danitra tahaka ny voro-mailala ka nitoetra teo amboniny.'
mg1865::mg_43::1::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho tsy nahalala Azy; fa Izay naniraka ahy hanao batisa amin''ny rano no nilaza tamiko hoe: Izay ho hitanao idinan''ny Fanahy sy itoerany, dia Izy no Mpanao batisa amin''ny Fanahy Masina.'
mg1865::mg_43::1::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita aho, ka dia nanambara fa Izy no Zanak''Andriamanitra.'
mg1865::mg_43::1::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny nahazoan''i Jesoa ny mpianany voalohany'
  verse_text: 'Nony ampitson''iny indray dia nijanona Jaona sy ny mpianany roa lahy;'
mg1865::mg_43::1::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nijery an''i Jesoa nitsangantsangana izy ka nanao hoe: Indro ny Zanak''ondrin''Andriamanitra!'
mg1865::mg_43::1::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo mpianatra roa lahy ireo, rehefa nandre azy niteny, dia nanaraka an''i Jesoa.'
mg1865::mg_43::1::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nitodika ka nahita azy manaraka, dia nanao taminy hoe: Inona no tadiavinareo? Ary hoy izy roa lahy taminy: Raby (izay atao hoe, raha adika, Mpampianatra o), aiza Ianao no mitoetra?'
mg1865::mg_43::1::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Izy taminy: Avia, fa ho hitanareo. Koa dia nandeha izy ka nahita izay nitoerany ary nitoetra teo aminy tamin''izany andro izany; ary efa tokony ho ora fahafolo tamin''izay.'
mg1865::mg_43::1::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andrea, rahalahin''i Simona Petera, no anankiray tamin''izy roa lahy, izay nandre ny tenin''i Jaona ka nanaraka an''i Jesoa.'
mg1865::mg_43::1::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nahita an''i Simona rahalahiny aloha, dia hoy izy taminy: Efa nahita ny Mesia izahay (izay atsoina hoe, raha adika, ny Kristy).'
mg1865::mg_43::1::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra azy ho any amin''i Jesoa izy. Ary nony nijery azy Jesoa, dia hoy Izy: Ianao no Simona, zanak''i Jaona; ianao hatao hoe Kefasy (izay atao hoe, raha adika, Petera*) [*Petera = vato]'
mg1865::mg_43::1::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony ampitso dia te-hiala ho any Galilia Jesoa, ary nahita an''i Filipo Izy ka nanao taminy hoe: Manaraha Ahy.'
mg1865::mg_43::1::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Filipo dia avy any Betsaida, tanànan''i Andrea sy Petera.'
mg1865::mg_43::1::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Filipo kosa nahita an''i Natanaela ka nanao taminy hoe: Efa hitanay Ilay nosoratan''i Mosesy tao amin''ny lalàna, sy nosoratan''ny mpaminany, dia Jesoa, zanak''i Josefa, avy any Nazareta.'
mg1865::mg_43::1::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Natanaela taminy: Moa mba misy zava-tsoa va avy any Nazareta? Dia hoy Filipo taminy: Andeha hizaha.'
mg1865::mg_43::1::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa nahita an''i Natanaela avy manatona Azy, dia nilaza azy hoe: Indro ny tena Isiraelita tsy misy fitaka.'
mg1865::mg_43::1::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Natanaela taminy: Ahoana no ahafantaranao ahy? Dia namaly Jesoa ka nanao taminy hoe: Fony tsy mbola niantso anao Filipo, dia hitako teo ambanin''ny aviavy* ianao. [*aviavimbazaha]'
mg1865::mg_43::1::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Natanaela ka nanao hoe: Raby o, Ianao no Zanak''Andriamanitra; Ianao no Mpanjakan''ny Isiraely.'
mg1865::mg_43::1::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Moa ny nilazako taminao va fa hitako teo ambanin''ny aviavy ianao no inoanao? Hahita zavatra lehibe noho izany ianao.'
mg1865::mg_43::1::51:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 1
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina dia marina tokoa: Ho hitanareo ny lanitra misokatra sy ny anjelin''Andriamanitra miakatra sy midina eo ambonin''ny Zanak''olona.'
mg1865::mg_43::2::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampodian''i Jesoa ny rano ho divay tao Kana, sy ny nankanesany tao Kapernaomy'
  verse_text: 'Ary tamin''ny andro fahatelo dia nisy fampakaram-bady tao Kana any Galilia; ary tao ny renin''i Jesoa.'
mg1865::mg_43::2::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa sy ny mpianany koa dia nalainy ho ao amin''ny fampakaram-bady.'
mg1865::mg_43::2::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lany ny divay, dia hoy ny renin''i Jesoa taminy: Tsy manana divay izy.'
mg1865::mg_43::2::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Ravehivavy, moa mifaninona akory Izaho sy ianao? tsy mbola tonga ny fotoako.'
mg1865::mg_43::2::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny reniny tamin''ny mpanompo: Ataovy izay asainy ataonareo.'
mg1865::mg_43::2::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy siny vato enina mahalany rano indroa na intelon''ny vata* avy nipetraka teo ho fanadiovana araka ny fanaon''ny Jiosy. [*Grika:metatra]'
mg1865::mg_43::2::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Fenoy rano ny siny. Dia nofenoiny hatramin''ny molony.'
mg1865::mg_43::2::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Tovozy amin''izao, ka ento ho eo amin''ny mpandahatra ny fanasana. Dia nentiny.'
mg1865::mg_43::2::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanandrana ny rano tonga divay ny mpandahatra ny fanasana, nefa tsy nahalala izay nihaviany (fa ny mpanompo izay nanovo ny rano no nahalala), dia niantso ny mpampakatra izy'
mg1865::mg_43::2::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Araka ny fanaon''ny olona dia ny divay tsara no arosony aloha; ary rehefa nisotro be* ny olona, dia vao izay ratsiratsy kokoa; fa ianao kosa dia efa nitahiry ny divay tsara ambaraka ankehitriny. [*Grika:mamo]'
mg1865::mg_43::2::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nataon''i Jesoa tao Kana any Galilia ho voaloham-pamantarana, ka nasehony ny voninahiny; ary nino Azy ny mpianany.'
mg1865::mg_43::2::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia nidina nankany Kapernaomy Jesoa mbamin''ny reniny sy ny rahalahiny ary ny mpianany; nefa tsy nitoetra ela teo Izy.'
mg1865::mg_43::2::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa akaiky ny Pasky ny Jiosy, ka dia niakatra tany Jerosalema Jesoa.'
mg1865::mg_43::2::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitany teo an-kianjan''ny tempoly ny nivarotra omby sy ondry sy voromailala ary ny mpanakalo vola izay nipetraka teo;'
mg1865::mg_43::2::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao kotopia kofehy Izy ka nandroaka azy rehetra hiala teo an-kianjan''ny tempoly, na ny ondry na ny omby, ary nararany ny volan''ny mpanakalo vola, sady nazerany ny latabatra;'
mg1865::mg_43::2::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Izy tamin''ny nivarotra ny voromailala: Ento mivoaka ireto zavatra ireto; aza atao trano fivarotana ny tranon''ny Raiko.'
mg1865::mg_43::2::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianany nahatsiaro fa voasoratra hoe: Ny firehetako ny amin''ny tranonao no haharitra aina ahy (Salamo 69:9).'
mg1865::mg_43::2::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly ny Jiosy ka nanao taminy hoe: Inona no famantarana asehonao aminay, no manao izao zavatra izao Ianao?'
mg1865::mg_43::2::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Ravao ity tempoly ity, ary amin''ny hateloana dia hatsangako indray izy.'
mg1865::mg_43::2::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Jiosy: Enina amby efa-polo taona izay no efa nanaovana ity tempoly ity, ka Ianao va hahatsangana azy amin''ny hateloana?'
mg1865::mg_43::2::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenany no tempoly nolazainy.'
mg1865::mg_43::2::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, rehefa nitsangana tamin''ny maty Izy, dia tsaroan''ny mpianany fa efa nilaza izany Izy; ary dia nino ny Soratra Masina sy ny teny izay nolazain''i Jesoa izy.'
mg1865::mg_43::2::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tao Jerosalema Jesoa tamin''ny Paska, dia tamin''ny andro firavoravoana, maro no nino ny anarany, raha nahita ny famantarana izay nataony.'
mg1865::mg_43::2::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa tsy natoky azy, satria Izy nahalala ny olona rehetra;'
mg1865::mg_43::2::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nitady olona hanambara olona Izy; fa ny tenany nahalala izay tao am-pon''ny olona.'
mg1865::mg_43::3::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny resak''i Jesoa tamin''i Nikodemosy'
  verse_text: 'Ary nisy Fariseo anankiray atao hoe Nikodemosy, mpanapaka tamin''ny Jiosy.'
mg1865::mg_43::3::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy nankao amin''i Jesoa nony alina ka nanao taminy hoe: Raby o, fantatray fa mpampianatra avy amin''Andriamanitra Ianao; fa tsy misy olona mahay manao izao famantarana ataonao izao, raha tsy Andriamanitra no momba azy.'
mg1865::mg_43::3::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Lazaiko aminao marina dia marina tokoa: Raha tsy ateraka indray* ny olona, dia tsy mahazo mahita ny fanjakan''Andriamanitra. [*Na: ateraka avy ambony]'
mg1865::mg_43::3::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Nikodemosy taminy: Hataon''ny olona ahoana no hateraka rehefa lehibe; moa mahazo miditra any an-kibon-dreniny indray va izy ka hateraka?'
mg1865::mg_43::3::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Lazaiko aminao marina dia marina tokoa: Raha misy olona tsy ateraky ny rano sy ny Fanahy, dia tsy mahazo miditra amin''ny fanjakan''Andriamanitra izy.'
mg1865::mg_43::3::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay ateraky ny nofo dia nofo; ary izay ateraky ny Fanahy dia fanahy.'
mg1865::mg_43::3::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'aza gaga noho ny nilazako taminao hoe: Tsy maintsy hateraka indray* ianareo. [*Na: hateraka avy any ambony]'
mg1865::mg_43::3::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rivotra mitsoka amin''izay tiany, ary renao ny feony, nefa tsy fantatrao izay ihaviany na izay alehany, dia tahaka izany izay rehetra ateraky ny Fanahy.'
mg1865::mg_43::3::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nikodemosy namaly ka nanao taminy hoe: Hatao ahoana no hahatonga izany zavatra izany?'
mg1865::mg_43::3::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Ianao va no mpampianatra ny Isiraely ka tsy mahalala izany zavatra izany?'
mg1865::mg_43::3::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminao marina dia marina tokoa: Izay fantatray no lazainay, ary izay hitanay no ambaranay; nefa ny fanambaranay tsy raisinareo.'
mg1865::mg_43::3::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny zavatra ety an-tany aza no nolazaiko taminareo ka tsy inoanareo, ahoana no hinoanareo, raha milaza aminareo ny zavatra any an-danitra Aho?'
mg1865::mg_43::3::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy niakatra ho any an-danitra, afa-tsy Ilay nidina avy tany an-danitra, dia ny Zanak''olona, Izay any an-danitra.'
mg1865::mg_43::3::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny nanandratan''i Mosesy ny menarana tany an''efitra no tsy maintsy hanandratana ny Zanak''olona,'
mg1865::mg_43::3::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanana fiainana mandrakizay izay rehetra mino Azy.'
mg1865::mg_43::3::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy izao no nitiavan''Andriamanitra izao tontolo izao: nomeny ny Zanani-lahy Tokana, mba tsy ho very izay rehetra mino Azy, fa hanana fiainana mandrakizay.'
mg1865::mg_43::3::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra tsy naniraka ny Zanaka ho amin''izao tontolo izao hanameloka* izao tontolo izao, fa mba hamonjeny izao tontolo izao. [*Grika: hitsara]'
mg1865::mg_43::3::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mino Azy dia tsy helohina*; fa izay tsy mino kosa dia efa voaheloka** rahateo, satria tsy nino ny anaran''ny Zanaka-lahy Tokan''Andriamanitra izy. [*Grika: tsaraina] [**Grika: voatsara]'
mg1865::mg_43::3::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fanamelohana*, fa tonga amin''izao tontolo izao ny mazava, nefa aleon''ny olona ny maizina toy izay ny mazava, satria ratsy ny asany. [*Grika: voatsara]'
mg1865::mg_43::3::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra manao ratsy dia mankahala ny mazava sady tsy manatona ny mazava, fandrao hita miharihary ny asany.'
mg1865::mg_43::3::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manao ny marina kosa dia manatona ny mazava, mba haseho ny asany, fa atao amin''Andriamanitra izany.'
mg1865::mg_43::3::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa tany Jodia, sy ny nanambaran''i Jaona Mpanao-batisa Azy indray.'
  verse_text: 'Rehefa afaka izany, dia tonga tany amin''ny tany Jodia Jesoa sy ny mpianany; ary niara-nitoetra taminy tao Izy sady nanao batisa.'
mg1865::mg_43::3::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaona koa nanao batisa tao Ainona, akaikin''i Saleima, satria nisy loharano maro tao; dia nankany ny olona ka nataony batisa.'
mg1865::mg_43::3::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mbola natao tao an-tranomaizina Jaona.'
mg1865::mg_43::3::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nifandiran''ny mpianatr''i Jaona tamin''ny Jiosy anankiray ny amin''ny fanadiovana;'
mg1865::mg_43::3::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tonga tany amin''i Jaona ny mpianany ka nanao taminy hoe: Raby o, Ilay tany aminao, tany an-dafin''i Jordana, Izay nambaranao, indro, manao batisa Izy, ary ny olona rehetra manatona Azy.'
mg1865::mg_43::3::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jaona namaly ka nanao hoe: Tsy misy olona mahay mandray na inona na inona, raha tsy nomena azy avy any an-danitra izany.'
mg1865::mg_43::3::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no vavolombeloko fa hoy izaho: Tsy izaho no Kristy, fa nirahiny hialoha Azy aho.'
mg1865::mg_43::3::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manana ny ampakarina no mpampakatra; fa ny sakaizan''ny mpampakatra, izay mitsangana sy mihaino azy, dia mifaly indrindra noho ny feon''ny mpampakatra; ary efa tanteraka izany fifaliako izany.'
mg1865::mg_43::3::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy tsy maintsy mitombo, fa izaho kosa tsy maintsy mihena.'
mg1865::mg_43::3::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay avy any ambony dia ambonin''izy rehetra; ary izay avy amin''ny tany dia avy amin''ny tany, ka ny momba ny ety an-tany ihany no lazainy; Izay avy any an-danitra dia ambonin''izy rehetra;'
mg1865::mg_43::3::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa izay hitany sy reny no ambarany; ary tsy misy mandray ny fanambarany.'
mg1865::mg_43::3::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandray ny fanambarany dia nanisy tombo-kase fa marina Andriamanitra.'
mg1865::mg_43::3::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izay nirahin''Andriamanitra dia milaza ny teniny; fa tsy misy fetra ny fanomezan''Andriamanitra ny Fanahy.'
mg1865::mg_43::3::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Ray tia ny Zanaka ka efa nanolotra ny zavatra rehetra ho eo an-tànany.'
mg1865::mg_43::3::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 3
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mino ny Zanaka manana fiainana mandrakizay; fa izay tsy mino ny Zanaka dia tsy hahita fiainana, fa ny fahatezeran''Andriamanitra no mitoetra eo aminy.'
mg1865::mg_43::4::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tany Galilia indray, sy ny resaka nataony tamin''ilay vehivavy Samaritana.'
  verse_text: 'Koa amin''izany, rehefa fantatry ny Tompo fa ny Fariseo efa nahare fa Jesoa mahazo mpianatra maro sy manao batisa be noho Jaona'
mg1865::mg_43::4::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: '(kanefa tsy Jesoa no nanao batisa, fa ny mpianany),'
mg1865::mg_43::4::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niala tany Jodia Izy ka nankany Galilia indray.'
mg1865::mg_43::4::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy maintsy mamaky an''i Samaria Izy.'
mg1865::mg_43::4::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tao an-tanàna anankiray any Samaria Izy, izay atao hoe Sykara, akaikin''ny tany izay nomen''i Jakoba ho an''i Josefa zanany.'
mg1865::mg_43::4::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ilay fantsakan*''i Jakoba. Ary satria sasatra Jesoa tamin''ny nalehany dia nipetraka teo am-pantsakana* Izy, rehefa tokony ho tamin''ny ora fahenina. [*Grika: loharano; sahala amin''ny teny ao amin''ny and. 14]'
mg1865::mg_43::4::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy Samaritana anankiray avy hantsaka rano dia hoy Jesoa taminy: Omeo Aho hosotroiko.'
mg1865::mg_43::4::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa ny mpianany efa lasa nankany an-tanàna hividy hanina)'
mg1865::mg_43::4::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ravehivavy Samaritana taminy: Nahoana Ianao no Jiosy ka mangataka amiko hosotroina, nefa aho vehivavy Samaritana? (Fa ny Jiosy tsy manan-draharaha amin''ny Samaritana.)'
mg1865::mg_43::4::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Raha fantatrao ny fanomezan''Andriamanitra sy Izay miteny aminao hoe: Omeo Aho hosotroiko, dia ianao no ho nangataka taminy, ka nomeny rano velona.'
mg1865::mg_43::4::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ravehivavy taminy: Tompoko, tsy manana fanovozana Ianao, sady lalina ny fantsakana; koa avy aiza no ahazoanao izany rano velona izany?'
mg1865::mg_43::4::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao va lehibe noho Jakoba razantsika izay nanome anay ity fantsakana ity, sady izy sy ny zanany mbamin''ny bibiny no nisotro teto?'
mg1865::mg_43::4::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Izay rehetra misotro ity rano ity dia mbola hangetaheta indray;'
mg1865::mg_43::4::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa na iza na iza no misotro ny rano izay homeko azy dia tsy hangetaheta mandrakizay; fa ny rano izay homeko azy dia ho loharano miboiboika ao anatiny ho fiainana mandrakizay.'
mg1865::mg_43::4::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ravehivavy taminy: Tompoko, omeo izany rano izany aho, mba tsy hangetaheta na hanketo hantsaka intsony.'
mg1865::mg_43::4::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Andeha ary, antsoy ivadinao, ka mankanesa aty .'
mg1865::mg_43::4::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ravehivavy namaly ka nanao taminy hoe: Tsy manam-bady aho. Hoy Jesoa taminy: Marina ihany izay nolazainao hoe: Tsy manam-bady aho;'
mg1865::mg_43::4::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nanam-bady indimy ianao, sady tsy vadinao ilay itoeranao ankehitriny; marina izany voalazanao izany.'
mg1865::mg_43::4::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ravehivavy taminy: Tompoko, hitako fa mpaminany Ianao.'
mg1865::mg_43::4::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny razantsika nivavaka teto amin''ity tendrombohitra ity; fa ianareo kosa milaza fa any Jerosalema no tokony hivavahana.'
mg1865::mg_43::4::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Ravehivavy, minoa Ahy, fa avy ny andro ka tsy amin''ity tendrombohitra ity, na any Jerosalema aza, no hivavahanareo amin''ny Ray.'
mg1865::mg_43::4::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mivavaka amin''izay tsy fantatrareo; izahay kosa mivavaka amin''izay fantatray, satria avy amin''ny Jiosy ny famonjena.'
mg1865::mg_43::4::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa avy ny andro*, sady tonga ankehitriny, raha ny tena mpivavaka hivavaka amin''ny Ray amin''ny fanahy sy ny fahamarinana; fa ny Ray koa mitady ny mpivavaka aminy ho tahaka izany. [*Grika: ora]'
mg1865::mg_43::4::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra dia Fanahy; ary izay mivavaka aminy tsy maintsy mivavaka amin''ny fanahy sy ny fahamarinana.'
mg1865::mg_43::4::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ravehivavy taminy: Fantatro fa avy ny Mesia (Ilay atao hoe Kristy) ka rehefa tonga Izy, dia hambarany amintsika ny zavatra rehetra.'
mg1865::mg_43::4::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Izaho Izay miresaka aminao no Izy.'
mg1865::mg_43::4::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia tonga ny mpianany ka gaga, satria vehivavy no niresahany; nefa tsy nisy nanao hoe: Inona no tadiavinao? na: Nahoana no miresaka aminy Ianao?'
mg1865::mg_43::4::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao ny sininy ravehivavy ary nankany an-tanàna ka nanao tamin''ny olona hoe:'
mg1865::mg_43::4::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha hizaha izaroa Lehilahy izaroana, Izay nilaza tamiko ny nataoko rehetra; Izao angaha no Kristy?'
mg1865::mg_43::4::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka avy tao an-tanàna ny olona ka nankeo amin''i Jesoa.'
mg1865::mg_43::4::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mbola tonga izy ireny, ny mpianany dia nangataka taminy ka nanao hoe: Hano, Raby o.'
mg1865::mg_43::4::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Izaho manan-kanin-kohanina izay tsy fantatrareo.'
mg1865::mg_43::4::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niresaka ny mpianatra ka nanao hoe: Nisy olona nitondra zavatra hohaniny va re?'
mg1865::mg_43::4::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Ny haniko dia ny manao ny sitrapon''izay naniraka Ahy sy ny mahavita ny asany.'
mg1865::mg_43::4::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ianareo tsy manao hoe va: Efa-bolana no sisa, dia tonga ny fararano? Indro, lazaiko aminareo: Atopazy ny masonareo, ka jereo ny eny an-tsaha, fa efa masaka sahady hojinjana izy.'
mg1865::mg_43::4::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mijinja dia mandray karama ka mamory vokatra ho amin''ny fiainana mandrakizay, mba hiara-mifaly ny mpamafy sy ny mpijinja.'
mg1865::mg_43::4::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia marina ilay teny hoe: Ny iray mamafy, ary ny iray kosa mijinja,'
mg1865::mg_43::4::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho naniraka anareo hijinja izay tsy nisasaranareo; olon-kafa no nisasatra, fa ianareo kosa no niditra teo amin''izay nisasarany.'
mg1865::mg_43::4::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro ny Samaritana avy tao amin''izany tanàna izany no nino an''i Jesoa noho ny filazan-dravehivavy, izay nanambara hoe: Nolazainy tamiko avokoa izay rehetra nataoko.'
mg1865::mg_43::4::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanatona Azy ny Samaritana, dia nangataka Azy hitoetra tao aminy; ka dia nitoetra tao indroa andro Izy.'
mg1865::mg_43::4::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro koa no nino noho ny teniny'
mg1865::mg_43::4::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao tamin-dravehivavy hoe: Tsy noho ny filazanao ihany no inoanay, fa ny tenanay no mandre, ka fantatray fa Izy tokoa no Mpamonjy izao tontolo izao.'
mg1865::mg_43::4::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka ny indroa andro, dia niala tao Jesoa ka nankany Galilia.'
mg1865::mg_43::4::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenan''i Jesoa no efa nanambara fa tsy misy mpaminany manan-daza eo amin''ny taniny.'
mg1865::mg_43::4::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa rehefa tonga tany Galilia Izy, dia nandray Azy ny Galiliana, satria efa hitany izay rehetra nataony tany Jerosalema tamin''ny andro firavoravoana; fa izy ireo koa mba niakatra tamin''ny andro firavoravoana.'
mg1865::mg_43::4::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 46
  verse_date_revised: null
  verse_title: 'Ny niverenan''i Jesoa tany Kana, sy ny nahasitranany ny zanakalahin''ny tandapa anankiray'
  verse_text: 'Ary tonga tany Kana any Galilia indray Jesoa, dia tany amin''ilay nampodiany ny rano ho divay. Ary nisy tandapa anankiray izay nanana zanakalahy narary tany Kapernaomy.'
mg1865::mg_43::4::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa reny fa Jesoa efa tonga tany Galilia avy tany Jodia, dia nankany aminy izy ka nangataka Azy mba hidina sy hahasitrana ny zanany, satria efa ho faty izy.'
mg1865::mg_43::4::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Raha tsy mahita famantarana sy fahagagana ianareo, dia tsy mba hety hino mihitsy.'
mg1865::mg_43::4::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ilay tandapa taminy: Tompoko, midina re, dieny tsy mbola maty ny zanako.'
mg1865::mg_43::4::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Andeha mody; velona ny zanakao. Ary ralehilahy nino ny teny izay nolazain''i Jesoa taminy, ka dia lasa nody.'
mg1865::mg_43::4::51:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nidina izy, dia nitsena azy ny mpanompony ka nilaza fa velona ny zanany.'
mg1865::mg_43::4::52:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanontany azy ny ora izay nanaretany. Dia hoy ireo taminy: Omaly tamin''ny ora fahafito no nialan''ny tazo taminy.'
mg1865::mg_43::4::53:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa fantatry ny rainy fa tamin''izay indrindra no ora nanaovan''i Jesoa taminy hoe: Velona ny zanakao. Dia nino izy mbamin''ny ankohonany rehetra.'
mg1865::mg_43::4::54:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 4
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no famantarana faharoa nataon''i Jesoa, fony Izy tonga tany Galilia avy tany Jodia.'
mg1865::mg_43::5::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niakaran''i Jesoa tany Jerosalema, sy ny nahasitranany ilay narary teo anilan''ny farihy Betesda, ary ny teny navaliny ny Jiosy izay nanome tsiny Azy.'
  verse_text: 'Rehefa afaka izany, dia nisy andro firavoravoan''ny Jiosy, ary Jesoa niakatra tany Jerosalema.'
mg1865::mg_43::5::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary misy farihy any Jerosalema, eo akaikin''ny vavahadin''ondry, izay atao amin''ny teny Hebreo hoe Betesda, misy fialofana dimy.'
mg1865::mg_43::5::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tao no nandrian''ny marary maro, ny jamba, ny mandringa, ny mati-ila*. [*Grika: efa maina, na malazo. Ampio hoe: [*miandry ny fihetsehan''ny rano]'
mg1865::mg_43::5::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa nisy anjely nidina tany amin''ny farihy indraindray ka nampihetsika ny rano; koa izay iray niroboka aloha, rehefa nihetsika ny rano, dia sitrana na inona na inona no aretina nanjo azy)'
mg1865::mg_43::5::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray teo, izay efa narary valo amby telo-polo taona.'
mg1865::mg_43::5::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nahita azy mandry Jesoa ka nahalala fa efa toy izany ela izy, dia hoy Izy taminy: Te-ho sitrana va ianao?'
mg1865::mg_43::5::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay marary namaly Azy hoe: Tompoko, raha hetsehina ny rano, dia tsy mba misy olona handroboka ahy eto amin''ny farihy; nefa raha mandeha aho, dia misy olon-kafa misosoka eo alohako.'
mg1865::mg_43::5::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Mitsangana, ento ny fandrianao, ka mandehana.'
mg1865::mg_43::5::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia sitrana ralehilahy ka nitondra ny fandriany, dia lasa nandeha. Ary Sabata izay andro izay.'
mg1865::mg_43::5::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Jiosy tamin''ilay efa sitrana: Sabata ny andro, ka tsy mety raha mitondra ny fandrianao ianao.'
mg1865::mg_43::5::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ralehilahy namaly azy hoe: Ilay nahasitrana ahy no nanao tamiko hoe: Ento ny fandrianao, ka mandehana.'
mg1865::mg_43::5::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo nanontany azy hoe: Iza moa izany Lehilahy izany Izay nanao taminao hoe: Ento ny fandrianao, ka mandehana?'
mg1865::mg_43::5::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay sitrana tsy nahalala Azy; fa niala teo Jesoa, satria nisy vahoaka betsaka teo.'
mg1865::mg_43::5::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia hitan''i Jesoa teo an-kianjan''ny tempoly ralehilahy, ka hoy Izy taminy: Indro, efa sitrana ianao; aza manota intsony, fandrao hanjo anao izay ratsy noho ny teo.'
mg1865::mg_43::5::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ralehilahy ka nanambara tamin''ny Jiosy fa Jesoa no nahasitrana azy.'
mg1865::mg_43::5::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny Jiosy dia nanenjika an''i Jesoa, satria nanao izany zavatra izany tamin''ny Sabata Izy.'
mg1865::mg_43::5::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly azy hoe: Ny Raiko miasa mandraka ankehitriny, ary Izaho koa miasa.'
mg1865::mg_43::5::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa vao mainka nitady hamono Azy ny Jiosy, tsy noho ny namahany ny amin''ny Sabata ihany, fa noho ny nilazany koa fa Andriamanitra no Rainy, ka nanao ny tenany ho mitovy amin''Andriamanitra Izy.'
mg1865::mg_43::5::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Lazaiko aminareo marina dia marina tokoa: Ny Zanaka tsy mahazo manao na inona na inona ho Azy, afa-tsy izay hitany ataon''ny Ray; fa na inona na inona no ataon''ny Ray dia toy izany koa no ataon''ny Zanaka.'
mg1865::mg_43::5::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Ray tia ny Zanaka ka maneho Azy ny zavatra rehetra izay ataon''ny tenany; ary asa lehibe noho ireny no hasehony Azy, mba ho gaga ianareo.'
mg1865::mg_43::5::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ny Ray manangana sy mamelona ny maty, dia tahaka izany koa no ameloman''ny Zanaka izay tiany.'
mg1865::mg_43::5::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Ray aza tsy mitsara olona, fa ny fitsarana rehetra dia nomeny ny Zanaka,'
mg1865::mg_43::5::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanajan''ny olona rehetra ny Zanaka, tahaka ny fanajany ny Ray. Izay tsy manaja ny Zanaka dia tsy manaja ny Ray, Izay naniraka Azy.'
mg1865::mg_43::5::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Izay mandre ny teniko ka mino Izay naniraka Ahy no manana fiainana mandrakizay, ka tsy hohelohina*; fa tafafindra niala tamin''ny fahafatesana ho amin''ny fiainana izy. [*Grika: hotsaraina]'
mg1865::mg_43::5::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Avy ny andro* ary tonga ankehitriny, izay handrenesan''ny maty ny feon''ny Zanak''Andriamanitra; ary izay mandre dia ho velona. [*Grika: ora]'
mg1865::mg_43::5::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny Ray manana fiainana ho Azy, dia tahaka izany koa ny Zanaka nomeny hanana fiainana ho Azy;'
mg1865::mg_43::5::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nomeny fahefana hitsara Izy, satria Zanak''olona.'
mg1865::mg_43::5::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza gaga amin''izany; fa avy ny andro* izay handrenesan''ny olona rehetra any am-pasana ny feony; [*Grika: ora]'
mg1865::mg_43::5::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hivoaka izy: izay nanao tsara dia ho any amin''ny fitsanganana ho fiainana fa izay nanao ratsy kosa dia ho any amin''ny fitsanganana ho fahamelohana*. [*Grika: ho fitsarana]'
mg1865::mg_43::5::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha Izaho ihany, dia tsy mahay manao na inona na inona; araka izay reko no itsarako; ary marina ny fitsarako; fa tsy mitady ny sitrapoko Aho, fa ny sitrapon''izay naniraka Ahy.'
mg1865::mg_43::5::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha Izaho no manambara ny tenako, dia tsy marina ny fanambarako.'
mg1865::mg_43::5::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy Anankiray Izay manambara Ahy. ary fantatro fa marina ny fanambarana izay anambarany Ahy.'
mg1865::mg_43::5::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo naniraka tany amin''i Jaona, ary nanambara ny marina izy.'
mg1865::mg_43::5::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho tsy mandray ny fanambarana avy amin''olona; fa milaza izany zavatra izany Aho mba ho voavonjy ianareo.'
mg1865::mg_43::5::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy dia jiro nirehitra ka nazava; ary nahafinaritra anareo ny nifalianareo vetivety tamin''ny fahazavany.'
mg1865::mg_43::5::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa manana fanambarana lehibe noho Jaona; fa ny asa nomen''ny Ray Ahy hovitaiko, dia izany asa ataoko izany no manambara Ahy fa nirahin''ny Ray.'
mg1865::mg_43::5::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Ray Izay naniraka Ahy, Izy no nanambara Ahy. Tsy mba renareo ny feony, na hitanareo akory aza ny endriny,'
mg1865::mg_43::5::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny teniny tsy mba mitoetra ao anatinareo, satria tsy mino Izay nirahiny ianareo.'
mg1865::mg_43::5::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dinihinareo* ny Soratra Masina, satria ataonareo fa ao aminy no anananareo fiainana mandrakizay, ary ireny no manambara Ahy. [*Na: Diniho]'
mg1865::mg_43::5::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy mety manatona Ahy ianareo hanananareo fiainana.'
mg1865::mg_43::5::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mandray laza avy amin''olona'
mg1865::mg_43::5::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro ianareo, fa tsy misy fitiavana an''Andriamanitra ao am-ponareo.'
mg1865::mg_43::5::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia avy amin''ny anaran''ny Raiko, nefa tsy raisinareo; raha misy hafa avy amin''ny anaran''ny tenany, dia horaisinareo ihany izy.'
mg1865::mg_43::5::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataonareo izay mifampitady laza ahoana no fino, nefa ny laza avy amin''ny Andriamanitra Tokana kosa dia tsy tadiavinareo?'
mg1865::mg_43::5::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ataonareo fa Izaho no hiampanga anareo amin''ny Ray; misy ny mpiampanga anareo, dia Mosesy izay itokianareo.'
mg1865::mg_43::5::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mba nino an''i Mosesy ianareo, dia hino Ahy, satria nanoratra nilaza Ahy izy.'
mg1865::mg_43::5::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 5
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mino izay nosoratany ianareo, hataonareo ahoana no fino ny teniko?'
mg1865::mg_43::6::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitan''i Jesoa ny Ranomasin''i Galilia, sy ny nampihinanany ny lehilahy dimy arivo'
  verse_text: 'Rehefa afaka izany, dia niala Jesoa ka lasa nita ny Ranomasin''i Galilia, dia ny Ranomasin''i Tiberiasy izany.'
mg1865::mg_43::6::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vahoaka betsaka nanaraka Azy noho ny nahitany ny famantarana izay efa nataony tamin''ny marary.'
mg1865::mg_43::6::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niakatra tao an-tendrombohitra, dia nipetraka tao mbamin''ny mpianany.'
mg1865::mg_43::6::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa akaiky ny Paska, ilay andro firavoravoan''ny Jiosy.'
mg1865::mg_43::6::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanopy ny masony ka nahita fa nisy vahoaka betsaka nanatona Azy, dia hoy Izy tamin''i Filipo: Aiza no hividianantsika mofo hohanin''ireo?'
mg1865::mg_43::6::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nataony mba hizahany toetra azy; fa izy nahalala ihany izay efa hataony.'
mg1865::mg_43::6::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Filipo namaly Azy hoe: Na dia mofo vidina denaria roan-jato aza tsy ampy azy rehetra hananany kely avy.'
mg1865::mg_43::6::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpianany anankiray, dia Andrea, rahalahin''i Simona Petera, nilaza taminy hoe:'
mg1865::mg_43::6::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy zazalahy manana mofo vary hordea dimy sy hazandrano madinika roa, fa ho ampy inona moa izany amin''izao olona betsaka izao?'
mg1865::mg_43::6::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa: Asaovy mipetraka ny olona. Ary nisy ahitra be teo. Ka dia nipetraka ny lehilahy, tokony ho dimy arivo no isany.'
mg1865::mg_43::6::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandray ny mofo Jesoa; ary rehefa nisaotra, dia nizara izany tamin''izay nipetraka hihinana Izy; ary ny hazandrano koa araka izay nilainy.'
mg1865::mg_43::6::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voky ny olona, dia hoy Jesoa tamin''ny mpianany: Angony ny sisa tsy lany, mba tsy hisy ho very.'
mg1865::mg_43::6::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nangoniny, ka nahafeno harona roa ambin''ny folo ny sombintsombin''ny mofo vary hordea dimy, izay ambiny tsy lanin''ny nihinana.'
mg1865::mg_43::6::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireny olona ireny, rehefa nahita ny famantarana izay nataon''i Jesoa: Ity tokoa no Ilay Mpaminany Izay ho tonga amin''izao tontolo izao.'
mg1865::mg_43::6::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa fantatr''i Jesoa fa efa ho avy ny olona haka Azy an-keriny hataony mpanjaka, dia niala ka lasa indray Izy irery nankany an-tendrombohitra..'
mg1865::mg_43::6::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hariva ny andro, dia nidina ho any amin''ny ranomasina ny mpianany.'
mg1865::mg_43::6::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niondrana an-tsambokely izy, dia nita ny ranomasina nankany Kapernaomy. Ary efa maizina ny andro tamin''izay, nefa Jesoa tsy mbola tonga tany aminy.'
mg1865::mg_43::6::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ranomasina nanonja, fa mafy ny fifofofofon''ny rivotra.'
mg1865::mg_43::6::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nivoy tokony ho dimy amby roa-polo na telo-polo stadio* izy, dia nahita an''i Jesoa nitsangantsangana eny ambonin''ny ranomasina ka nanakaiky ny sambokely; dia natahotra izy. [*Na: dimy na enina kilometatra]'
mg1865::mg_43::6::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Izaho ihany; aza matahotra.'
mg1865::mg_43::6::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ta-handray Azy ho eo an-tsambokely izy; ary niaraka tamin''izay ny sambokely dia tonga tamin''ny tany izay nalehany.'
mg1865::mg_43::6::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony ampitson''iny ny vahoaka izay nijanona teny am-pitan''ny ranomasina dia nahita fa tsy nisy sambokely hafa teo afa-tsy iray ihany, ary Jesoa tsy mba niara-niondrana an-tsambokely tamin''ny mpianany, fa ny mpianany ihany no nandeha,'
mg1865::mg_43::6::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa nisy sambokely hafa avy tany Tiberiasy tonga teo akaikin''ilay tany nihinanany ny mofo, rehefa nisaotra ny Tompo,-'
mg1865::mg_43::6::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nony hitan''ny vahoaka fa tsy teo Jesoa, na ny mpianany, dia niondrana an-tsambokely izy ka nankany Kapernaomy hitady an''i Jesoa.'
mg1865::mg_43::6::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahita Azy teny am-pitan''ny ranomasina izy, dia hoy izy taminy: Raby o, oviana no tonga teto Ianao?'
mg1865::mg_43::6::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Lazaiko aminareo marina dia marina tokoa: Mitady Ahy ianareo, nefa tsy noho ny nahitanareo famantarana, fa noho ny nihinananareo ny mofo ka voky.'
mg1865::mg_43::6::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miasa hahazo ny hanina mety ho levona, fa ny hanina izay maharitra ho fiainana mandrakizay, izay homen''ny Zanak''olona anareo; fa Izy no nasian''Andriamanitra Ray tombo-kase.'
mg1865::mg_43::6::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Inona no hataonay mba hiasanay ny asan''Andriamanitra?'
mg1865::mg_43::6::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Izao no asan''Andriamanitra, dia ny hinoanareo Izay nirahiny.'
mg1865::mg_43::6::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Inona ary no famantarana ataonao, mba ho hitanay ka hinoanay Anao? Inona moa no asa ataonao?'
mg1865::mg_43::6::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny razantsika nihinana ny mana tany an''efitra, araka ny voasoratra hoe: Mofo avy tany an-danitra no nomeny azy hohaniny (Salamo 78:24).'
mg1865::mg_43::6::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Lazaiko aminareo marina dia marina tokoa: Tsy Mosesy no nanome anareo ny mofo avy tany an-danitra; fa ny Raiko no manome anareo ny tena mofo avy any an-danitra.'
mg1865::mg_43::6::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mofon''Andriamanitra dia Ilay midina avy any an-danitra ka manome fiainana ho an''izao tontolo izao.'
mg1865::mg_43::6::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo taminy: Tompo o, omeo anay mandrakariva izany mofo izany.'
mg1865::mg_43::6::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Izaho no mofon''aina; izay manatona Ahy tsy mba ho noana, ary izay mino Ahy tsy mba hangetaheta intsony.'
mg1865::mg_43::6::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nolazaiko taminareo fa nahita Ahy ihany ianareo, nefa tsy mino.'
mg1865::mg_43::6::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra omen''ny Raiko Ahy no hanatona Ahy; ary izay manatona Ahy dia tsy mba holaviko mihitsy.'
mg1865::mg_43::6::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nidina avy tany an-danitra Aho mba hanao ny sitrapoko, fa ny sitrapon''izay naniraka Ahy.'
mg1865::mg_43::6::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no sitrapon''izay naniraka Ahy, dia ny tsy hamelako hisy very izay rehetra nomeny Ahy, fa hatsangako indray amin''ny andro farany izy.'
mg1865::mg_43::6::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no sitrapon''ny Raiko, dia ny hahazoan''izay rehetra mijery ny Zanaka ka mino Azy fiainana mandrakizay; ary Izaho hanangana azy amin''ny andro farany.'
mg1865::mg_43::6::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nimonomonona tamin''i Jesoa ny Jiosy, satria Izy nanao hoe: Izaho no mofo izay nidina avy tany an-danitra.'
mg1865::mg_43::6::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo: Tsy Ilehio va no Jesoa, Zanak''i Josefa, Izay fantatsika ny rainy aman-dreniny? Ahoana no dia anaovany ankehitriny hoe: ho nidina avy tany an-danitra?'
mg1865::mg_43::6::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Aza mimonomonona ianareo.'
mg1865::mg_43::6::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy olona mahay manatona Ahy, raha tsy taomin''ny Ray Izay naniraka Ahy; ary Izaho hanangana azy amin''ny andro farany.'
mg1865::mg_43::6::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voasoratra ao amin''ny mpaminany hoe: Ary izy rehetra dia hampianarin''Andriamanitra (Isaia 54:13). Izay rehetra mandre ka mianatra amin''ny Ray no manatona Ahy.'
mg1865::mg_43::6::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nisy nahita ny Ray, afa-tsy Izay avy amin''Andriamanitra: Izy no nahita ny Ray.'
mg1865::mg_43::6::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Izay mino no manana fiainana mandrakizay.'
mg1865::mg_43::6::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no mofon''aina.'
mg1865::mg_43::6::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny razanareo nihinana ny mana tany an''efitra, nefa maty ihany.'
mg1865::mg_43::6::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no mofo izay midina avy any an-danitra, mba tsy ho faty izay mihinana azy.'
mg1865::mg_43::6::51:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no mofo velona izay nidina avy tany an-danitra; raha misy mihinana ity mofo ity, dia ho velona mandrakizay izy; ary ny mofo izay homeko dia ny nofoko ho fiainan''izao tontolo izao.'
mg1865::mg_43::6::52:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifanditra ny Jiosy ka nanao hoe: Hataon''ilehio ahoana re no fanome ny nofony hohanintsika?'
mg1865::mg_43::6::53:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Lazaiko aminareo marina dia marina tokoa: Raha tsy mihinana ny nofon''ny Zanak''olona sy misotro ny ràny ianareo, dia tsy manana fiainana ao aminareo.'
mg1865::mg_43::6::54:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihinana ny nofoko sy misotro ny rako no manana fiainana mandrakizay; ary Izaho hanangana azy amin''ny andro farany.'
mg1865::mg_43::6::55:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny nofoko no tena fihinana, ary ny rako no tena fisotro.'
mg1865::mg_43::6::56:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihinana ny nofoko sy misotro ny rako no mitoetra ao amiko, ary Izaho kosa ao aminy.'
mg1865::mg_43::6::57:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny nanirahan''ny Ray velona Ahy, ary Izaho koa velona amin''ny Ray, dia tahaka izany koa izay mihinana Ahy no ho velona amiko.'
mg1865::mg_43::6::58:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no mofo izay nidina avy tany an-danitra; tsy tahaka ny razana izay nihinana, nefa maty ihany; fa izay mihinana ity mofo ity dia ho velona mandrakizay.'
mg1865::mg_43::6::59:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany teny izany no nolazainy tao amin''ny synagoga, raha nampianatra tao Kapernaomy Izy.'
mg1865::mg_43::6::60:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maro tamin''ny mpianany, nony nandre, dia nanao hoe: Sarotra izany teny izany, iza no mahahaino izany?'
mg1865::mg_43::6::61:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatr''i Jesoa tao am-pony fa nimonomonona tamin''izany ny mpianany, ka dia hoy Izy taminy: Mahatafintohina anareo va izay?'
mg1865::mg_43::6::62:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mainka raha mahita ny Zanak''olona miakatra ho any amin''izay nitoerany taloha ianareo.'
mg1865::mg_43::6::63:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahy no mahavelona; ny nofo tsy mahasoa na inona na inona; ny teny izay nolazaiko taminareo dia fanahy sy fiainana.'
mg1865::mg_43::6::64:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy ny sasany aminareo izay tsy mino. Fa fantatr''i Jesoa hatramin''ny voalohany izay tsy nino sy izay hamadika Azy.'
mg1865::mg_43::6::65:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Izany no nilazako taminareo fa tsy misy olona mahay manatona Ahy, raha tsy nomen''ny Ray azy izany.'
mg1865::mg_43::6::66:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''izany* dia maro tamin''ny mpianany no nihemotra ka tsy niara-nandeha taminy intsony. [*Na: Noho izany]'
mg1865::mg_43::6::67:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa tamin''ny roa ambin''ny folo lahy: Ianareo koa va mba te-hiala?'
mg1865::mg_43::6::68:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Simona Petera namaly Azy hoe: Tompo o, hankany amin''iza moa izahay? Ianao no manana ny tenin''ny fiainana mandrakizay.'
mg1865::mg_43::6::69:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay mino ka mahalala fa Ianao no Ilay Masin''Andriamanitra.'
mg1865::mg_43::6::70:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Tsy Izaho va no nifidy anareo roa ambin''ny folo lahy, nefa ny anankiray aminareo aza dia devoly?'
mg1865::mg_43::6::71:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 6
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nilaza an''i Jodasy, zanak''i Simona Iskariota; fa izy no ilay efa hamadika Azy, nefa isan''ny roa ambin''ny folo lahy.'
mg1865::mg_43::7::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nandeha tany Galilia Jesoa; fa nalain-kandeha tany Jodia Izy, satria nitady hahafaty Azy ny Jiosy.'
mg1865::mg_43::7::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa akaiky ny andro firavoravoan''ny Jiosy, dia ny amin''ny Tabernakely,'
mg1865::mg_43::7::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy ny rahalahiny taminy: Mialà eto, ka mandehana ho any Jodia, mba ho hitan''ny mpianatrao koa ny asa izay ataonao;'
mg1865::mg_43::7::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy misy olona manao zavatra amin''ny takona, nefa ny tenany mitady ho hita miharihary*; raha manao izany zavatra izany Ianao, dia misehoa amin''izao tontolo izao. [*Na: mitady ho hita fa matoky]'
mg1865::mg_43::7::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ny rahalahiny aza tsy nino Azy.'
mg1865::mg_43::7::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Tsy mbola tonga ny fotoako; fa ny fotoanareo dia vonona lalandava.'
mg1865::mg_43::7::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahazo mankahala anareo izao tontolo izao; fa Izaho no halany, satria milaza fa ratsy ny asany.'
mg1865::mg_43::7::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara ho amin''ny andro firavoravoana ianareo; fa Izaho tsy mbola miakatra ho amin''ity andro firavoravoana ity; satria tsy mbola tonga ny fotoako.'
mg1865::mg_43::7::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany teny izany taminy Izy, dia mbola nitoetra tany Galilia ihany.'
mg1865::mg_43::7::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa lasa niakatra ho amin''ny andro firavoravoana ny rahalahiny, dia niakatra koa Izy, nefa tsy mba nisehoseho, fa toa niafinafina.'
mg1865::mg_43::7::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy dia nitady Azy tamin''ny andro firavoravoana ka nanao hoe: Aiza Izy?'
mg1865::mg_43::7::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitakoritsika Azy be ihany ny vahoaka. Hoy ny sasany: Tsara fanahy Izy; fa hoy kosa ny sasany; Tsia; fa mamitaka ny vahoaka Izy.'
mg1865::mg_43::7::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nisy sahy niresaka Azy miharihary noho ny fahatahorany ny Jiosy.'
mg1865::mg_43::7::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nisasaka ny andro firavoravoana, dia niakatra teo an-kianjan''ny tempoly Jesoa ka nampianatra.'
mg1865::mg_43::7::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia gaga ny Jiosy ka nanao hoe: Ahoana no nahaizan''ilehity soratra, nefa tsy mba nianatra Izy?'
mg1865::mg_43::7::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly azy Jesoa ka nanao hoe: Tsy Ahy ny fampianarako, fa an''izay naniraka Ahy.'
mg1865::mg_43::7::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona ta-hanao ny sitrapony, dia hahalala ny amin''ny fampianarana izy, na avy amin''Andriamanitra izany, na miteny ho Ahy Aho.'
mg1865::mg_43::7::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miteny ho azy dia mitady ny voninahitry ny tenany; fa izay mitady ny voninahitr''izay naniraka azy no marina, ary tsy misy tsy fahamarinana ao aminy.'
mg1865::mg_43::7::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Mosesy va no nanome anareo ny lalàna? nefa tsy misy eo aminareo mankatò ny lalàna. Nahoana ianareo no mitady hamono Ahy?'
mg1865::mg_43::7::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahoaka namaly hoe: Manana demonia Ianao; iza no mitady hamono Anao?'
mg1865::mg_43::7::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Asa iray loha ihany no nataoko, ka gaga avokoa ianareo rehetra.'
mg1865::mg_43::7::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nanomezan''i Mosesy anareo ny famorana: tsy noho izy avy tamin''i Mosesy, fa noho izy avy tamin''ny razana, ka na dia amin''ny Sabata aza dia mamora olona ihany ianareo.'
mg1865::mg_43::7::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha amin''ny Sabata aza no amorana olona, mba tsy hahafoana ny lalàn''i Mosesy, dia tezitra amiko va ianareo, satria nisy olona anankiray nataoko sitrana avokoa ny tenany rehetra tamin''ny Sabata.'
mg1865::mg_43::7::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitsara araka ny miseho, fa mba mitsarà marina.'
mg1865::mg_43::7::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mponina sasany tany Jerosalema dia nanao hoe: Tsy Ilehity va Ilay tadiaviny hovonoina?'
mg1865::mg_43::7::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary indro Izy miteny miharihary, nefa tsy misy miteny Azy akory. Sao efa fantatry ny mpanapaka anie fa Io no Kristy?'
mg1865::mg_43::7::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa fantatsika izay nihavian''ilehio, fa raha avy Kristy, tsy misy mahalala izay hihaviany.'
mg1865::mg_43::7::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso teo an-kianjan''ny tempoly Jesoa, raha nampianatra, ka nanao hoe: Izaho dia fantatrareo, sady fantatrareo koa izay nihaviako; ary tsy avy ho Ahy Aho, fa marina ny naniraka Ahy, Izay tsy fantatrareo.'
mg1865::mg_43::7::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho mahalala Azy; fa Izy no nihaviako, ka Izy no naniraka Ahy.'
mg1865::mg_43::7::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitady hisambotra Azy ny olona; kanefa tsy nisy naninji-tanana taminy, satria tsy mbola tonga ny fotoany.'
mg1865::mg_43::7::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro ny vahoaka no nino Azy ka nanao hoe: Raha tonga Kristy, moa hanao famantarana maro mihoatra noho ny nataon''ity Lehilahy ity va Izy?'
mg1865::mg_43::7::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Fariseo nandre ny vahoaka nitakoritsika izany zavatra izany ny aminy; ary ny lohan''ny mpisorona sy ny Fariseo dia naniraka mpiandry raharaha mba hisambotra Azy.'
mg1865::mg_43::7::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa: Kely foana no itoerako aminareo, dia hankany amin''izay naniraka Ahy Aho.'
mg1865::mg_43::7::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitady Ahy ianareo, fa tsy hahita; ary izay itoerako dia tsy azonareo haleha.'
mg1865::mg_43::7::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niresaka hoe ny Jiosy: Hankaiza moa no halehan''ilehity, no tsy ho hitantsika? Hankany amin''izay miely any amin''ny Grika va Izy ka hampianatra ny Grika?'
mg1865::mg_43::7::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana re izao teny nolazainy izao hoe: Hitady Ahy ianareo, fa tsy hahita; ary izay itoerako tsy azonareo haleha?'
mg1865::mg_43::7::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro farany, izay andro lehibe tamin''ny andro firavoravoana, dia nitsangana Jesoa ka niantso nanao hoe: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro.'
mg1865::mg_43::7::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mino Ahy, dia hisy onin''ny rano velona miboiboika avy ao an-kibony, araka ny voalazan''ny Soratra Masina.'
mg1865::mg_43::7::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fanahy, Izay efa horaisin''ny mino Azy, no nolazainy tamin''izany; fa ny Fanahy* tsy mbola nomena, satria Jesoa tsy mbola niditra tamin''ny voninahiny. [*Na: Fanahy Masina]'
mg1865::mg_43::7::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ny vahoaka, raha nandre izany teny izany, dia nanao hoe: Ity tokoa no Ilay Mpaminany.'
mg1865::mg_43::7::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny sasany: Ity no Kristy. Fa hoy kosa ny sasany: Avy any Galilia va no ihavian''i Kristy?'
mg1865::mg_43::7::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy voalazan''ny Soratra Masina va fa Kristy dia avy amin''ny taranak''i Davida, sady avy ao Betlehema, vohitra nonenan''i Davida (Mika 5:1)?'
mg1865::mg_43::7::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisara-tsaina ny amin''i Jesoa ny vahoaka.'
mg1865::mg_43::7::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany nitady hisambotra Azy; kanefa tsy nisy naninji-tanana taminy.'
mg1865::mg_43::7::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiandry raharaha nankeo amin''ny lohan''ny mpisorona sy ny Fariseo, ka hoy izy ireo taminy: Nahoana ianareo no tsy nitondra Azy?'
mg1865::mg_43::7::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiandry raharaha namaly hoe: Tsy mbola nisy olona niteny tahaka izany.'
mg1865::mg_43::7::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo namaly azy hoe: Ianareo koa va voafitaka?'
mg1865::mg_43::7::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa misy mpanapaka na Fariseo mba nino Azy?'
mg1865::mg_43::7::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voaozona ireto vahoaka ireto, izay tsy mahalala ny lalàna.'
mg1865::mg_43::7::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nikodemosy, anankiray teo aminy, dia ilay nankeo amin''i Jesoa teo aloha, dia nanao taminy hoe:'
mg1865::mg_43::7::51:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa manameloka olona va ny lalàntsika, raha tsy mbola mihaino azy aloha ka mahafantatra izay nataony?'
mg1865::mg_43::7::52:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy ireo namaly ka nanao taminy hoe: Ianao koa angaha mba avy any Galilia? Diniho, dia ho hitanao fa tsy mba misy mpaminany avy any Galilia.'
mg1865::mg_43::7::53:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 7
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy lasa nody ho any an-tranony avy izy rehetra;'
mg1865::mg_43::8::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Jesoa kosa nankany an-tendrombohitra Oliva'
mg1865::mg_43::8::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny amin''ilay vehivavy azo nijangajanga'
  verse_text: 'Ary nony maraina koa dia nankeo an-kianjan''ny tempoly indray Jesoa, ary ny vahoaka rehetra nanatona Azy, dia nipetraka Izy ka nampianatra azy'
mg1865::mg_43::8::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy anankiray azo nijangajanga nentin''ny mpanora-dalàna sy ny Fariseo; ary rehefa napetrany teo afovoany izy,'
mg1865::mg_43::8::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy ireo taminy: Mpampianatra o, ity vehivavy ity azo olan-tanana nijangajanga'
mg1865::mg_43::8::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ao amin''ny lalàna Mosesy dia nandidy antsika fa hotoraham-bato izay vehivavy manao toy izany (Deoteronomia 22:22-24) fa ahoana kosa hoy Ianao?'
mg1865::mg_43::8::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nolazainy hakany fanahy Azy, mba hahazoany izay hiampangany Azy. Fa Jesoa niondrika ka nanoratra teo amin''ny tany tamin''ny rantsan-tànany'
mg1865::mg_43::8::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha naharitra nanontany Azy ireo, dia nitraka Izy ka nanao taminy hoe: Izay tsy nanota eo aminareo no aoka hitora-bato azy voalohany'
mg1865::mg_43::8::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niondrika indray Izy ka nanoratra teo amin''ny tany tamin''ny rantsan-tànany'
mg1865::mg_43::8::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandre izany izy, dia nivoaka tsirairay hatramin''ny zokinjokiny ka hatramin''ny zandrinjandriny; ary Jesoa irery ihany no sisa teo sy ilay vehivavy teo'
mg1865::mg_43::8::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitraka Jesoa, dia hoy Izy taminy; Ravehivavy, aiza ireny? Tsy nisy nanameloka anao va?'
mg1865::mg_43::8::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Tsy misy, Tompoko. Dia hoy Jesoa: Izaho koa dia tsy manameloka anao; mandehana, ary amin''izao sisa izao dia aza manota intsony'
mg1865::mg_43::8::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa indray teo an-kianjan''ny tempoly, sy ny nahatezeran''ny lehibe taminy'
  verse_text: 'Ary Jesoa niteny tamin''ny olona indray ka nanao hoe: Izaho no fahazavan''izao tontolo izao; izay manaraka Ahy tsy mba handeha amin''ny maizina, fa hanana ny fahazavan''aina.'
mg1865::mg_43::8::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Fariseo taminy: Ianao manambara ny tenanao, koa tsy marina ny fanambaranao.'
mg1865::mg_43::8::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Na dia manambara ny tenako aza Aho, dia marina ny fanambarako, satria fantatro izay nihaviako sy izay alehako; fa ianareo kosa tsy mahalala izay ihaviako, na izay alehako.'
mg1865::mg_43::8::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mitsara araka ny nofo; Izaho tsy mitsara olona na dia iray akory aza.'
mg1865::mg_43::8::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia mitsara aza Aho, dia marina ny fitsarako, satria tsy irery Aho, fa Izaho sy ny Ray Izay naniraka Ahy.'
mg1865::mg_43::8::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voasoratra ao amin''ny lalànareo fa marina ny fanambaran''ny olona roa lahy (Deoteronomia 19:15).'
mg1865::mg_43::8::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no manambara ny tenako, ary ny Ray Izay naniraka Ahy dia manambara Ahy koa.'
mg1865::mg_43::8::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Aiza izay Rainao? Jesoa namaly hoe: Samy tsy fantatrareo, na Izaho, na ny Raiko; raha nahalala Ahy ianareo, dia ho nahalala ny Raiko koa.'
mg1865::mg_43::8::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany teny izany no nolazain''i Jesoa teo akaikin''ny fandatsahan-drakitra, raha nampianatra teo an-kianjan''ny tempoly Izy; ary tsy nisy olona nisambotra Azy, satria tsy mbola tonga ny fotoany.'
mg1865::mg_43::8::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy indray Jesoa taminy: Handeha Aho, ary hitady Ahy ianareo, ary ho faty amin''ny fahotanareo; izay alehako tsy azonareo haleha.'
mg1865::mg_43::8::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Jiosy: Hamono tena va Izy, no manao hoe: Izay alehako tsy azonareo haleha?'
mg1865::mg_43::8::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy; Ianareo avy aty ambany; Izaho avy any ambony; ianareo avy amin''izao tontolo izao; Izaho tsy mba avy amin''izao tontolo izao;'
mg1865::mg_43::8::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa izany no nilazako taminareo fa ho faty amin''ny fahotanareo ianareo; fa raha tsy mino ianareo fa Izaho no Izy, dia ho faty amin''ny fahotanareo ianareo.'
mg1865::mg_43::8::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Iza moa Ianao? Hoy Jesoa taminy: Ilay nolazaiko taminareo hatramin''ny voalohany*. [*Na: Ilay lazaiko aminareo indrindra]'
mg1865::mg_43::8::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manana zavatra maro hilazana sy hitsarana anareo Aho, satria marina Izay naniraka Ahy; ary izay zavatra efa reko taminy no lazaiko amin''izao tontolo izao.'
mg1865::mg_43::8::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantany fa ny Ray no nolazainy taminy,'
mg1865::mg_43::8::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia hoy Jesoa: Rehefa asandratrareo ny Zanak''olona, dia ho fantatrareo fa Izaho no Izy, ary tsy manao na inona na inona ho Ahy Aho, fa araka ny nampianarin''ny Raiko Ahy no ilazako izany zavatra izany.'
mg1865::mg_43::8::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay naniraka Ahy dia eto amiko; tsy nandao Ahy ho irery Izy, satria Izaho manao izay sitrany mandrakariva.'
mg1865::mg_43::8::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanao izany teny izany Jesoa, dia maro no nino Azy.'
mg1865::mg_43::8::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa tamin''ny Jiosy izay nino Azy: Raha maharitra amin''ny teniko ianareo, dia ho mpianatro tokoa;'
mg1865::mg_43::8::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ho fantatrareo ny marina, ary ny marina hahafaka anareo tsy ho andevo.'
mg1865::mg_43::8::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia namaly Azy ka nanao hoe: Taranak''i Abrahama izahay, fa tsy mba andevon''olona hatrizay ela izay; koa nahoana no ataonao hoe: Ho afaka ianareo?'
mg1865::mg_43::8::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Lazaiko aminareo marina dia marina tokoa fa izay rehetra manota dia andevon''ny ota.'
mg1865::mg_43::8::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny andevo tsy mitoetra ao an-trano mandrakariva*; fa ny zanaka no mitoetra mandrakariva*. [*Grika: mandrakizay]'
mg1865::mg_43::8::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ny Zanaka no hahafaka anareo, dia ho afaka tokoa ianareo.'
mg1865::mg_43::8::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ihany fa taranak''i Abrahama ianareo, nefa mitady hamono Ahy, satria ny teniko tsy mitombo ao anatinareo.'
mg1865::mg_43::8::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay efa hitako tamin''ny Ray no lazaiko, ary ianareo kosa manao izay renareo tamin''ny rainareo.'
mg1865::mg_43::8::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ireo ka nanao taminy hoe: Abrahama no rainay. Hoy Jesoa taminy: Raha zanak''i Abrahama ianareo, dia ny asan''i Abrahama no hataonareo.'
mg1865::mg_43::8::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny ianareo mitady hamono Ahy, Izay Lehilahy nilaza ny marina taminareo, dia izay efa reko tamin''Andriamanitra; tsy mba nanao izany Abrahama.'
mg1865::mg_43::8::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo manao ny asan''ny rainareo. Hoy ireo taminy: Tsy mba teraka avy tamin''ny fijangajangana izahay; iray Ray izahay, dia Andriamanitra ihany.'
mg1865::mg_43::8::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Raha Andriamanitra no Rainareo, dia ho tia Ahy ianareo, satria avy tamin''Andriamanitra no nivoahako sy nankanesako aty ; fa Izaho tsy tonga ho Ahy, fa Izy no naniraka Ahy.'
mg1865::mg_43::8::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no tsy azonareo ny teniko? satria tsy mahay mihaino ny teniko ianareo.'
mg1865::mg_43::8::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 44
  verse_date_revised: '2022-07-22T06:01:36+0000'
  verse_title: null
  verse_text: 'Ianareo avy tamin''ny devoly rainareo, ka izay sitraky ny rainareo no tianareo hatao. Izy dia mpamono olona hatramin''ny taloha, ary tsy nitoetra tamin''ny* marina, satria tsy misy marina aminy. Raha mandainga izy, dia ny azy no lazainy, satria mpandainga izy sady rain''ny lainga. [*Na: (mitoetra amin'')]'
mg1865::mg_43::8::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa satria milaza ny marina Aho, dia tsy inoanareo.'
mg1865::mg_43::8::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa aminareo no mampiseho Ahy ho nanota? Raha ny marina no lazaiko, nahoana ianareo no tsy mino Ahy?'
mg1865::mg_43::8::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay avy amin''Andriamanitra dia mihaino ny tenin''Andriamanitra; izany no tsy ihainoanareo, satria tsy mba avy amin''Andriamanitra ianareo.'
mg1865::mg_43::8::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ny Jiosy ka nanao taminy hoe: Tsy marina va ny filazanay fa Samaritana Ianao sady manana demonia?'
mg1865::mg_43::8::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Izaho tsy manana demonia, fa mankalaza ny Raiko, ary ianareo kosa mahafa-boninahitra Ahy.'
mg1865::mg_43::8::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho tsy mitady ny voninahitro; misy Iray mitady sy mitsara.'
mg1865::mg_43::8::51:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Raha misy olona mitandrina ny teniko, dia tsy mba hahita fahafatesana izy mandrakizay.'
mg1865::mg_43::8::52:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Jiosy taminy: Fantatray ankehitriny fa manana demonia Ianao. Efa maty Abrahama sy ny mpaminany; nefa hoy Ianao: Raha misy olona mitandrina ny teniko, dia tsy mba hanandrana fahafatesana izy mandrakizay.'
mg1865::mg_43::8::53:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa Ianao va lehibe noho Abrahama rainay izay efa maty? sady efa maty koa ny mpaminany; manao Anao ho iza moa Ianao?'
mg1865::mg_43::8::54:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Raha mankalaza ny tenako Aho, dia tsinontsinona ny lazako; ny Raiko, Izay ataonareo fa Andriamanitrareo, Izy no mankalaza Ahy.'
mg1865::mg_43::8::55:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrareo Izy, fa Izaho no mahalala Azy; ary raha hoy Izaho: Tsy fantatro Izy, dia mba mpandainga tahaka anareo koa Aho; nefa mahalala Azy Aho ka mitandrina ny teniny.'
mg1865::mg_43::8::56:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ravoravo Abrahama rainareo hahita ny androko; ary nahita izy ka faly.'
mg1865::mg_43::8::57:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Jiosy taminy: Tsy mbola dimam-polo taona akory Ianao, ka dia efa nahita an''i Abrahama va?'
mg1865::mg_43::8::58:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Lazaiko aminareo marina tokoa: Fony tsy mbola ary Abrahama, dia Izy Aho.'
mg1865::mg_43::8::59:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 8
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka vato hitoraka Azy ny olona; fa Jesoa niery ka niala teo an-kianjan''ny tempoly*. [*Ampio hoe: ary namaky teo afovoan''ny olona ka lasa]'
mg1865::mg_43::9::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampahiratan''i Jesoa an-dralehilahy teraka jamba.'
  verse_text: 'Ary raha nandalo Jesoa, dia nahita lehilahy jamba hatry ny fony vao teraka.'
mg1865::mg_43::9::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianany nanontany Azy hoe: Raby o, iza moa no nanota, io lehilahy io va, sa ny ray aman-dreniny, no dia teraka jamba izy?'
mg1865::mg_43::9::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Tsy io lehilahy io no nanota, na ny ray aman-dreniny, fa ny hanehoana ny asan''Andriamanitra eo aminy.'
mg1865::mg_43::9::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isika tsy maintsy manao ny asan''izay naniraka Ahy, raha mbola antoandro; avy ny alina, ka tsy mahazo miasa ny olona.'
mg1865::mg_43::9::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha amin''izao tontolo izao Aho, dia fahazavan''izao tontolo izao.'
mg1865::mg_43::9::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa nilaza izany Izy, dia nandrora tamin''ny tany ka nanao feta tamin''ny rora, dia nahosony ny mason''ilay jamba.'
mg1865::mg_43::9::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Andeha, sasao ny masonao any amin''ny farihy Siloama (izay atao hoe, raha adika, Nirahina). Dia lasa izy ka nanasa, dia niverina nahiratra.'
mg1865::mg_43::9::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay nifanolotra taminy sy izay nahita azy fa mpangataka izy taloha dia nanao hoe: Tsy ity va ilay nipetraka nangataka?'
mg1865::mg_43::9::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny sasany: Izy ity, fa hoy ny sasany: Tsia, fa tahaka azy ihany; ary hoy kosa izy: Izaho no izy.'
mg1865::mg_43::9::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny olona taminy: Ahoana no nahiratan''ny masonao?'
mg1865::mg_43::9::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy namaly ka nanao hoe: Ilay Lehilahy atao hoe Jesoa no nanao feta, dia nanosotra ny masoko ka nanao tamiko hoe: Mankanesa any Siloama, ka sasao ny masonao; koa nandeha aho, dia nanasa azy, ka dia nahiratra.'
mg1865::mg_43::9::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny olona taminy: Aiza moa izany Lehilahy izany? Hoy ralehilahy: Tsy fantatro.'
mg1865::mg_43::9::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay jamba taloha dia nentiny tany amin''ny Fariseo.'
mg1865::mg_43::9::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro Sabata no nanaovan''i Jesoa ny feta sy nampahiratany ny mason-dralehilahy.'
mg1865::mg_43::9::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo koa nanontany azy izay nahiratan''ny masony. Dia hoy izy taminy: Nasiany feta ny masoko, dia nosasako, ka nahiratra aho.'
mg1865::mg_43::9::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Fariseo sasany: Tsy avy amin''Andriamanitra izany Lehilahy izany, satria tsy mitandrina ny Sabata Izy. Hoy ny sasany: Hataon''ny lehilahy mpanota ahoana no fahay manao fahagagana toy izany? Dia nisara-tsaina izy.'
mg1865::mg_43::9::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy indray izy tamin''ilay jamba: Ahoana no ilazanao Azy, fa nampahiratra ny masonao Izy? Dia hoy izy: Mpaminany Izy.'
mg1865::mg_43::9::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany ny Jiosy tsy nino azy ho efa jamba ka nahiratra, ambara-piantsony ny ray aman-drenin''ilay nahiratra'
mg1865::mg_43::9::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanontaniany hoe: Zanakareo moa ity, izay lazainareo fa teraka jamba? Koa nanao ahoana ary no nahiratany izao?'
mg1865::mg_43::9::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ray aman-dreniny namaly ka nanao hoe: Fantatray fa zanakay ity sady teraka jamba;'
mg1865::mg_43::9::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy fantatray izay nahiratany izao; ary tsy fantatray izay nampahiratra ny masony; izy ihany no anontanio; efa lehibe izy, aoka izy no hilaza ny amin''ny tenany.'
mg1865::mg_43::9::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany teny izany no nolazain''ny ray aman-dreniny, satria natahotra ny Jiosy izy; fa efa nifanaiky rahateo ny Jiosy fa raha misy manaiky Azy ho Kristy dia horoahina hiala amin''ny synagoga.'
mg1865::mg_43::9::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nilazan''ny ray aman-dreniny hoe: Efa lehibe izy, koa izy no anontanio.'
mg1865::mg_43::9::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso ilay jamba teo aloha indray izy ka nanao taminy hoe: Omeo voninahitra Andriamanitra; izahay mahalala fa mpanota izany Lehilahy izany.'
mg1865::mg_43::9::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy namaly hoe. Tsy fantatro na mpanota Izy, na tsia; zavatra iray loha ihany no fantatro: jamba aho teo aloha, fa mahiratra aho izao.'
mg1865::mg_43::9::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Inona no nataony taminao? Nanao ahoana ange no nampahiratany ny masonao?'
mg1865::mg_43::9::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly azy hoe izy: Efa voalazako taminareo rahateo, fa tsy nihaino ianareo; nahoana no te-hihaino indray ianareo? Moa te-ho mpianany koa va ianareo?'
mg1865::mg_43::9::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanevateva azy izy ka nanao hoe: Ialahy no mpianany; fa izahay mpianatr''i Mosesy.'
mg1865::mg_43::9::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahay mahalala fa Mosesy no nitenenan''Andriamanitra; fa ny amin''izany Lehilahy izany, dia tsy fantatray izay nihaviany.'
mg1865::mg_43::9::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ralehilahy namaly azy hoe: Mba mahagaga tokoa lahy izany! fa tsy fantatrareo ny nihaviany, nefa nampahiratra ny masoko Izy.'
mg1865::mg_43::9::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay mivavaka aminy sy manao ny sitrapony no henoiny..'
mg1865::mg_43::9::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatrizay hatrizay dia tsy mbola re fa nisy nampahiratra ny mason''izay teraka jamba.'
mg1865::mg_43::9::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy avy amin''Andriamanitra izany Lehilahy izany, dia tsy mahefa na inona na inona Izy.'
mg1865::mg_43::9::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly ireo ka nanao taminy hoe: Tena teraka tamin''ny ota ialahy, ka ialahy indray va mampianatra anay? Dia noroahiny izy.'
mg1865::mg_43::9::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa nandre fa efa noroahiny ralehilahy; ary rehefa nahita azy Izy, dia nanao hoe: Mino ny Zanak-Andriamanitra va ianao?'
mg1865::mg_43::9::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ralehilahy namaly ka nanao hoe: Iza moa no Izy, Tompoko, mba hinoako Azy?'
mg1865::mg_43::9::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Efa nahita Azy ianao, sady Izay miresaka aminao izao no Izy.'
mg1865::mg_43::9::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Tompoko, mino aho. Dia niankohoka teo anatrehany izy.'
mg1865::mg_43::9::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa: Ho fitsarana no nahatongavako amin''izao tontolo izao, mba hahiratra ny tsy mahiratra, ary mba ho tonga jamba kosa ny mahiratra.'
mg1865::mg_43::9::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo sasany izay teo aminy, nony nandre izany, dia nanao taminy hoe: Izahay koa va mba jamba?'
mg1865::mg_43::9::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 9
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Raha jamba ianareo, dia tsy ho nanan-keloka; nefa hoy ianareo ankehitriny: Mahiratra izahay; dia tsy afaka ny helokareo.'
mg1865::mg_43::10::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitorian''i Jesoa ny amin''ny mpiandry ondry, sy ny nilazany ny tenany ho Mpiandry Tsara.'
  verse_text: 'Lazaiko aminareo marina dia marina tokoa fa izay tsy miditra amin''ny vavahady ho amin''ny valan''ondry, fa mananika ny fefy, dia mpangalatra sy jiolahy.'
mg1865::mg_43::10::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay miditra amin''ny vavahady no mpiandry ny ondry.'
mg1865::mg_43::10::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy no vohan''ny mpiandry vavahady; ary ny ondry mihaino ny feony; ary izay ondriny tokoa dia antsoiny amin''ny anarany avy ka entiny mivoaka.'
mg1865::mg_43::10::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mamoaka ireo rehetra ireo izy, dia mialoha azy; ary ny ondriny manaraka azy, satria mahalala ny feony ireo.'
mg1865::mg_43::10::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahiny tsy harahiny, fa handosirany, satria tsy fantany ny feon''ny vahiny.'
mg1865::mg_43::10::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany fanoharana izany no nolazain''i Jesoa taminy, nefa tsy azony izay zavatra nolazainy taminy.'
mg1865::mg_43::10::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy indray Jesoa taminy: Lazaiko aminareo marina dia marina tokoa: Izaho no vavahadin''ondry.'
mg1865::mg_43::10::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpangalatra sy jiolahy izay rehetra tonga talohako; fa tsy nihaino azy ny ondry.'
mg1865::mg_43::10::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no vavahady; raha Izaho no hidiran''ny olona, dia hovonjena izy ka hiditra sy hivoaka sady hahazo hanina.'
mg1865::mg_43::10::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpangalatra tsy avy raha tsy hangalatra sy hamono ary handringana; Izaho avy mba hananany fiainana, sady hananany be dia be.'
mg1865::mg_43::10::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Mpiandry Tsara; ny Mpiandry Tsara manolotra ny ainy hamonjy ny ondry.'
mg1865::mg_43::10::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpikarama, satria tsy mpiandry na tompon''ny ondry izy, koa raha mahita ny amboadia* avy, dia mandao ny ondry ka mandositra, ary ny amboadia* misambotra ny ondry ka mampihahaka azy; [*lopa]'
mg1865::mg_43::10::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandositra izy, satria mpikarama ka tsy mitandrina ny ondry.'
mg1865::mg_43::10::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Mpiandry Tsara; ary fantatro ny Ahy, sady fantany Aho,'
mg1865::mg_43::10::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tahaka ny ahafantaran''ny Ray Ahy sy ny ahafantarako ny Ray; ary Izaho manolotra ny aiko hamonjy ny ondry.'
mg1865::mg_43::10::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manana ondry hafa izay tsy amin''ity vala ity Aho; ary ireny koa dia tsy maintsy ho entiko ka hihaino ny feoko; ary ho tonga andiany iray izy, sady iray ihany ny Mpiandry.'
mg1865::mg_43::10::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no itiavan''ny Raiko Ahy, satria Izaho manolotra ny aiko mba handraisako azy indray.'
mg1865::mg_43::10::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy manaisotra ny aiko amiko, fa ny tenako ihany no manolotra azy. Manana fahefana hanolotra azy Aho, ary manana fahefana haka azy indray. Izany didy izany dia azoko tamin''ny Raiko.'
mg1865::mg_43::10::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fisarahana indray tao amin''ny Jiosy noho izany teny izany.'
mg1865::mg_43::10::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro tamin''ireo no nanao hoe: Manana demonia Izy ka efa very saina; nahoana no mihaino Azy ianareo?'
mg1865::mg_43::10::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy kosa ny sasany: Tsy mba tenin''ny demoniaka izany; moa ny demonia va mahay mampahiratra ny mason''ny jamba?'
mg1865::mg_43::10::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny teny nataon''i Jesoa teny Jerosalema tamin''ny andro firavoravoana noho ny nanadiovana ny tempoly, sy ny nanoheran''ny Jiosy Azy, ary ny nankanesany tany andafin''i Jordana'
  verse_text: 'Ary tonga ny andro firavoravoana tany Jerosalema, dia ilay atao hoe Fitokanana, ary efa ririnina ny andro.'
mg1865::mg_43::10::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nitsangantsangana teo an-kianjan''ny tempoly teo amin''ny Fialofan''i Solomona.'
mg1865::mg_43::10::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitangoronan''ny Jiosy Izy ka nanontaniany hoe: Ambara-pahoviana no hampisalasalanao anay? Raha Ianao no Kristy, dia lazao marimarina aminay.'
mg1865::mg_43::10::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Efa nilaza taminareo ihany Aho, nefa tsy mino ianareo; ny asa izay ataoko amin''ny anaran''ny Raiko no manambara Ahy.'
mg1865::mg_43::10::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ianareo tsy mino, satria tsy mba isan''ny ondriko.'
mg1865::mg_43::10::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ondriko mihaino ny feoko, ary Izaho mahalala azy, ary izy manaraka Ahy,'
mg1865::mg_43::10::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Izaho manome azy fiainana mandrakizay, ka tsy ho very izy mandrakizay, ary tsy hisy handrombaka azy amin''ny tanako.'
mg1865::mg_43::10::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Raiko Izay nanome Ahy dia lehibe noho izy rehetra; ary tsy misy mahay mandrombaka amin''ny tanan''ny Ray.'
mg1865::mg_43::10::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho sy ny Ray dia iray ihany.'
mg1865::mg_43::10::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka vato indray ny Jiosy hitoraka Azy.'
mg1865::mg_43::10::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Maro ny asa tsara nasehoko taminareo avy tamin''ny Ray; koa ny asa manao ahoana amin''ireny moa no itorahanareo vato Ahy?'
mg1865::mg_43::10::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Jiosy namaly Azy hoe: Tsy asa tsara no itorahanay vato Anao, fa fitenenan-dratsy*, satria olona ihany Ianao, nefa manao ny tenanao ho Andriamanitra. [*Grika: blasfemia, izahao Matio 9:3]'
mg1865::mg_43::10::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Tsy voasoratra ao amin''ny lalànareo va hoe: Hoy Izaho: Andriamanitra ianareo? (Salamo 82:6).'
mg1865::mg_43::10::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ireny izay nanaovana izany tenin''Andriamanitra izany no natao hoe andriamanitra (ary ny Soratra Masina tsy azo foanana),'
mg1865::mg_43::10::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'moa Izay nohasinin''ny Ray ka nirahiny ho amin''izao tontolo izao va no ataonareo hoe: Miteny ratsy Ianao, satria hoy Izaho: Zanak''Andriamanitra Aho?'
mg1865::mg_43::10::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy manao ny asan''ny Raiko Aho, dia aza mino Ahy.'
mg1865::mg_43::10::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao ihany kosa Aho, na dia tsy mino Ahy aza ianareo, dia minoa ny asa, mba ho fantatrareo sy hekenareo fa ny Ray no ato amiko, ary Izaho ao amin''ny Ray.'
mg1865::mg_43::10::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitady hisambotra Azy indray ny Jiosy; fa nandositra azy* Izy. [*Grika: Ny tànany]'
mg1865::mg_43::10::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nankany an-dafin''i Jordana indray Jesoa, ho any amin''ilay tany nanaovan''i Jaona batisa voalohany, ka nitoetra tany Izy.'
mg1865::mg_43::10::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro no nankeo aminy ka nanao hoe: Jaona tsy mba nanao famantarana, nefa izay rehetra nolazainy ny amin''ity Lehilahy ity dia marina avokoa.'
mg1865::mg_43::10::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 10
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro no nino Azy teo.'
mg1865::mg_43::11::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nananganan''i Jesoa an''i Lazarosy tamin''ny maty.'
  verse_text: 'Ary nisy lehilahy anankiray narary, dia Lazarosy avy any Betania, tanànan''i Maria sy Marta rahavaviny.'
mg1865::mg_43::11::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maria dia ilay nanosotra ny Tompo tamin''ny menaka manitra sy namaoka ny tongony tamin''ny volon-dohany, ary Lazarosy anadahiny no narary.'
mg1865::mg_43::11::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy mirahavavy dia naniraka tany amin''i Jesoa hanao hoe: Tompoko, marary ilay tianao.'
mg1865::mg_43::11::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Jesoa izany, dia hoy Izy: Tsy ho fahafatesana no anton''izany aretina izany, fa ny hampisehoana ny voninahitr''Andriamanitra, mba hankalazana ny Zanak''Andriamanitra.'
mg1865::mg_43::11::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa tia an''i Marta sy ny rahavaviny ary Lazarosy.'
mg1865::mg_43::11::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony ren''i Jesoa fa narary Lazarosy, dia mbola nitoetra indroa andro teo amin''izay nitoerany ihany Izy.'
mg1865::mg_43::11::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia hoy Izy tamin''ny mpianatra: Andeha isika ho any Jodia indray.'
mg1865::mg_43::11::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny mpianatra taminy: Raby o, vao haingana teo no nitadiavan''ny Jiosy hitora-bato Anao, ka hankany indray va Ianao?'
mg1865::mg_43::11::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Tsy roa ambin''ny folo va ny ora amin''ny indray andro? Raha misy mandeha amin''ny antoandro, dia tsy mba tafintohina izy, fa mahita ny fahazavan''izao tontolo izao.'
mg1865::mg_43::11::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: '2022-08-08T08:06:33+0000'
  verse_title: null
  verse_text: 'Fa raha misy kosa mandeha amin''ny alina, dia ho tafintohina izy, satria tsy misy mazava ao aminy.'
mg1865::mg_43::11::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nolazainy; ary rehefa afaka izany, dia hoy Izy taminy: Matory Lazarosy sakaizantsika; fa handeha hamoha azy Aho.'
mg1865::mg_43::11::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpianatra taminy: Tompoko, raha matory izy, dia ho tsara ihany*. [*Grika: hovonjena]'
mg1865::mg_43::11::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jesoa nilaza ny fahafatesany; fa nataon''izy ireo kosa fa fialan-tsasatra amin''ny torimaso no nolazainy.'
mg1865::mg_43::11::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany Jesoa dia nilaza tsotra taminy hoe: Maty Lazarosy;'
mg1865::mg_43::11::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary faly Aho noho ny aminareo, satria tsy teo Aho, mba hinoanareo; fa andeha isika hankany aminy.'
mg1865::mg_43::11::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Tomasy (izay atao hoe Didymo) tamin''ny mpianatra namany: Andeha isika mba hiara-maty aminy.'
mg1865::mg_43::11::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga Jesoa, dia hitany fa efa nilevina hefarana izy.'
mg1865::mg_43::11::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Betania dia tao akaikin''i Jerosalema, tokony ho dimy ambin''ny folo stadio* no elanelany. [*Na: telo kilometatra]'
mg1865::mg_43::11::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro tamin''ny Jiosy no efa tonga teo amin''i Marta sy Maria hitsapa alahelo azy noho ny amin''ny anadahiny.'
mg1865::mg_43::11::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Marta, raha nandre fa tamy Jesoa, dia nandeha nitsena Azy; fa Maria kosa nitoetra tao an-trano.'
mg1865::mg_43::11::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Marta tamin''i Jesoa: Tompoko, raha teto Ianao, dia tsy maty ny anadahiko.'
mg1865::mg_43::11::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa fantatro fa na dia ankehitriny izao aza na inona na inona no hangatahinao amin''Andriamanitra dia homen''Andriamanitra Anao.'
mg1865::mg_43::11::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Hitsangana ny anadahinao.'
mg1865::mg_43::11::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Marta taminy: Fantatro ihany fa hitsangana izy amin''ny fitsanganan''ny maty amin''ny andro farany;'
mg1865::mg_43::11::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Izaho no fananganana ny maty sy fiainana; izay mino Ahy, na dia maty aza, dia ho velona indray.'
mg1865::mg_43::11::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra velona ka mino Ahy dia tsy ho faty mandrakizay. Mino izany va ianao?'
mg1865::mg_43::11::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy taminy: Eny, Tompoko; mino aho fa Ianao no Kristy, Zanak''Andriamanitra, Ilay ho tonga amin''izao tontolo izao.'
mg1865::mg_43::11::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany izy, dia lasa nandeha ka niantso mangingina an''i Maria rahavaviny, nanao hoe: Tonga ny Mpampianatra ka miantso anao.'
mg1865::mg_43::11::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nandre izany Maria, dia nitsangana faingana izy ka nankeo aminy.'
mg1865::mg_43::11::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa tsy mbola tonga tao an-tanàna, fa mbola teo amin''ilay nitsenan''i Marta Azy ihany.'
mg1865::mg_43::11::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy izay tao amin''i Maria tao an-trano ka nitsapa alahelo azy, raha nahita azy nitsangana faingana ka nivoaka, dia nanaraka azy, satria nataony fa nankany amin''ny fasana hitomany any izy.'
mg1865::mg_43::11::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Maria, rehefa tonga teo amin''izay nitoeran''i Jesoa ka nahita Azy, dia niankohoka teo amin''ny tongony ka nanao taminy hoe: Tompoko, raha teto Ianao, dia tsy maty ny anadahiko.'
mg1865::mg_43::11::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nony nahita azy nitomany sy ny Jiosy izay niaraka taminy nitomany koa, dia vonto ny fanahiny, ka tora-kovitra Izy;'
mg1865::mg_43::11::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy Izy: Aiza moa no nandevenanareo azy? Dia hoy ireo taminy: Tompoko, andeha hizaha.'
mg1865::mg_43::11::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa nitomany.'
mg1865::mg_43::11::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Jiosy: Akory ity haben''ny fitiavany azy!'
mg1865::mg_43::11::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny sasany: Moa tsy hain''ilehity, Izay nampahiratra ny mason''ilay jamba va, ny manao izay tsy ho nahafaty an-dralehilahy ity?'
mg1865::mg_43::11::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vonto indray ny fanahin''i Jesoa ka nankeo amin''ny fasana Izy; ary zohy izany, sady nisy vato narindrina teo.'
mg1865::mg_43::11::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa: Esory ny vato. Hoy Marta, anabavin''ny maty, taminy: Tompoko, maimbo izy izao, fa efa hefarana izay.'
mg1865::mg_43::11::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Tsy voalazako va fa raha hino ianao, dia ho hitanao ny voninahitr''Andriamanitra?'
mg1865::mg_43::11::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesoriny ny vato. Ary Jesoa dia nanandratra ny masony ka nanao hoe: Ray o, misaotra Anao Aho, fa efa nihaino Ahy Ianao.'
mg1865::mg_43::11::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha Izaho, dia fantatro fa mihaino Ahy mandrakariva Ianao; fa noho ny vahoaka mitsangana manodidina no nilazako izany, mba hinoany fa Ianao no naniraka Ahy.'
mg1865::mg_43::11::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanao izany teny izany Izy, dia niantso tamin''ny feo mahery hoe: Ry Lazarosy, mivoaha!'
mg1865::mg_43::11::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny maty nisy fehim-paty ny tànany sy ny tongony, sady voafehy mosara koa ny tavany. Hoy Jesoa tamin''ny olona: Vahao izy, ka avelao handeha.'
mg1865::mg_43::11::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro tamin''ny Jiosy, dia ireo nankeo amin''i Maria ka nahita ny zavatra nataon''i Jesoa ireo, no nino Azy.'
mg1865::mg_43::11::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany tamin''ireo kosa dia lasa nankany amin''ny Fariseo ka nilaza taminy izay nataony.'
mg1865::mg_43::11::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 47
  verse_date_revised: null
  verse_title: 'Ny nikendren''ny lehibe hahafaty an''i Jesoa.'
  verse_text: 'Ary ny lohan''ny mpisorona sy ny Fariseo nanangona ny Synedriona ka nanao hoe: Ahoana no hataontsika? fa iny Lehilahy iny dia manao famantarana maro.'
mg1865::mg_43::11::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha avelantsika hanao toy izany ihany Izy, dia hino Azy avokoa ny olona rehetra; ary ho avy ny Romana ka handrava ny fonenantsika sy ny firenentsika.'
mg1865::mg_43::11::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray taminy, dia Kaiafa, mpisoronabe tamin''izany taona izany, nanao taminy hoe: Ianareo tsy mahalala na inona na inona,'
mg1865::mg_43::11::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'na misaina akory fa tsara ho anareo, raha ny lehilahy iray no ho faty hamonjy ny firenena, mba tsy ho rava avokoa ity firenena ity.'
mg1865::mg_43::11::51:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy niteny izany ho azy izy, fa satria mpisoronabe tamin''izany taona izany izy, dia naminany fa Jesoa ho faty hamonjy ny firenena;'
mg1865::mg_43::11::52:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy hamonjy io firenena io ihany, fa mba hanangona ny zanak''Andriamanitra izay efa niely ho antoko iray.'
mg1865::mg_43::11::53:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hatramin''izany andro izany dia nikendry hahafaty Azy ireo.'
mg1865::mg_43::11::54:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 54
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tany Efraima, sy ny nahatongavan''i Jesoa tany Betania, ary ny nanosoran''i Maria Azy.'
  verse_text: 'Ary Jesoa tsy nandeha niharihary teny amin''ny Jiosy intsony; fa niala teo Izy nankany amin''ny tany akaikin''ny efitra, ho any an-tanàna atao hoe Efraima, ary nitoetra tany Izy mbamin''ny mpianatra.'
mg1865::mg_43::11::55:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa akaiky ny Pasky ny Jiosy; ary maro avy tany an-tsaha no niakatra ho any Jerosalema talohan''ny Paska mba hanadio ny tenany.'
mg1865::mg_43::11::56:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitady an''i Jesoa ireo, raha nijanona teo an-kianjan''ny tempoly, ka niresaka hoe: Ahoana no hevitrareo? Tsy mba ho tonga amin''ny andro firavoravoana va Izy?'
mg1865::mg_43::11::57:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 11
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona sy ny Fariseo efa nandidy fa raha misy olona mahalala izay itoerany, dia tsy maintsy milaza, mba hisamborany Azy.'
mg1865::mg_43::12::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa henemana no sisa tsy tonga ny Paska, Jesoa dia tonga tao Betania, izay nitoeran''i Lazarosy, ilay natsangany tamin''ny maty.'
mg1865::mg_43::12::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao fanasana ho an''i Jesoa tao izy; ary Marta no nanompo; fa Lazarosy no anankiray tamin''izay niara-nipetraka nihinana taminy.'
mg1865::mg_43::12::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Maria, rehefa naka menaka manitra nisy narda sady tsara no saro-bidy, lanjan''iray livatra, dia nanosotra ny tongotr''i Jesoa sy namaoka ny tongony tamin''ny volondohany; ary feno ny hanitry ny menaka ny trano.'
mg1865::mg_43::12::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jodasy Iskariota, anankiray tamin''ny mpianany, ilay efa hamadika Azy:'
mg1865::mg_43::12::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana io menaka io no tsy namidy denaria telon-jato ka nomena ny malahelo?'
mg1865::mg_43::12::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy no nilaza izany, tsy noho ny fiahiany ny malahelo, fa satria mpangalatra izy sady nitondra ny kitapo ka naka izay tao anatiny.'
mg1865::mg_43::12::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa: Avelao izy, mba hotehiriziny ho amin''ny andro hanamboarany Ahy halevina io.'
mg1865::mg_43::12::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny malahelo dia ety aminareo mandrakariva; fa Izaho tsy mba ho ety aminareo mandrakariva.'
mg1865::mg_43::12::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka betsaka tamin''ny Jiosy nahalala fa teo Izy, dia tonga teo, nefa tsy noho Jesoa ihany, fa mba hahita an''i Lazarosy koa, ilay natsangany tamin''ny maty.'
mg1865::mg_43::12::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nikendry hahafaty an''i Lazarosy koa ny lohan''ny mpisorona,'
mg1865::mg_43::12::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria izy no nialan''ny maro tamin''ny Jiosy ka ninoany an''i Jesoa.'
mg1865::mg_43::12::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny niakaran''i Jesoa tany Jerosalema.'
  verse_text: 'Ary nony ampitson''iny ny vahoaka betsaka, izay tonga ho amin''ny andro firavoravoana, rehefa nahare fa hankany Jerosalema Jesoa,'
mg1865::mg_43::12::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia naka sampan-drofia ka nivoaka hitsena Azy sady niantso hoe: Hosana! Isaorana anie ny Mpanjakan''ny Isiraely, Ilay avy amin''ny anaran''i Jehovah (Salamo 118:26).'
mg1865::mg_43::12::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nahita zana-boriky anankiray, dia nitaingina azy, araka ny voasoratra hoe:'
mg1865::mg_43::12::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra, ry Ziona zanakavavy; indro, avy ny Mpanjakanao mitaingina zana-boriky (Zakaria 9:9).'
mg1865::mg_43::12::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany dia tsy fantatry ny mpianany tamin''ny voalohany; fa rehefa niditra tamin''ny voninahiny Jesoa, dia vao nahatsiaro izy fa voasoratra hilaza Azy izany zavatra izany, ary efa nataony taminy izany.'
mg1865::mg_43::12::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanambara Azy ny vahoaka izay teny aminy, fony Izy niantso an''i Lazarosy hivoaka tamin''ny fasana ka nanangana azy tamin''ny maty.'
mg1865::mg_43::12::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany koa no nitsenan''ny vahoaka Azy, satria efa reny fa nanao izany famantarana izany Izy.'
mg1865::mg_43::12::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ny Fariseo dia nifampilaza hoe: Hitanareo fa tsy mahefa na inona na inona akory ianareo; indro, efa lasa manaraka Azy avokoa izao tontolo izao.'
mg1865::mg_43::12::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny amin''ny Grika izay ta-hahita an''i Jesoa, sy ny nilazan''i Jesoa ny amin''ny hahafatesany, ary ny amin''ny tsi-finoan''ny olona Azy.'
  verse_text: 'Ary nisy Grika sasany tamin''izay niakatra hivavaka tamin''ny andro firavoravoana,'
mg1865::mg_43::12::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy ireo nankany amin''i Filipo avy any Betsaida any Galilia, dia nangataka taminy ka nanao hoe: Tompoko, mba ta-hahita an''i Jesoa izahay.'
mg1865::mg_43::12::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Filipo nilaza tamin''i Andrea; ary Andrea sy Filipo lasa nilaza tamin''i Jesoa.'
mg1865::mg_43::12::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly azy hoe: Tonga ny fotoana hankalazana ny Zanak''olona.'
mg1865::mg_43::12::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Raha tsy latsaka ao amin''ny tany ny voambary ka maty, dia mitoetra foana izy; fa raha maty kosa izy, dia hahavokatra be.'
mg1865::mg_43::12::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia ny ainy no mahavery izany; fa izay mankahala ny ainy amin''izao fiainana izao no hiaro izany ho amin''ny fiainana mandrakizay.'
mg1865::mg_43::12::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona manompo Ahy, dia aoka izy hanaraka Ahy, ary izay itoerako, dia ao koa no hitoeran''ny mpanompoko; raha misy olona manompo Ahy, dia hankalaza azy ny Ray.'
mg1865::mg_43::12::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny mangorohoro ny fanahiko; ary ahoana no holazaiko: Ray o, vonjeo Aho ho afaka amin''ity ora ity? nefa izao no nihaviako ho amin''ity ora ity;'
mg1865::mg_43::12::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ray o, mankalazà ny anaranao. Dia nisy feo avy tany an-danitra nanao hoe: Efa nankalaza azy Aho, ary hankalaza azy indray.'
mg1865::mg_43::12::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka izay nitsangana teo ka nahare dia nanao hoe: Kotrokorana izany. Hoy ny sasany: Anjely no niteny taminy.'
mg1865::mg_43::12::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao hoe: Tsy noho Izaho no nahatongavan''izany feo izany, fa noho ianareo.'
mg1865::mg_43::12::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga ankehitriny ny fitsarana izao tontolo izao; ankehitriny ny andrianan''izao tontolo izao no horoahina.'
mg1865::mg_43::12::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho, raha asandratra hiala amin''ny tany, dia hitaona ny olona rehetra hanatona Ahy.'
mg1865::mg_43::12::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nolazainy hanambara izay fahafatesana efa hiaretany.'
mg1865::mg_43::12::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Azy ny vahoaka ka nanao hoe: Efa renay tamin''ny lalàna fa Kristy haharitra mandrakizay; koa ahoana no ilazanao hoe: Tsy maintsy hasandratra ny Zanak''olona? Iza moa izany Zanak''olona izany?'
mg1865::mg_43::12::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Mbola kely ihany no hitoeran''ny mazava aminareo. Mandehana, raha mbola manana ny mazava ianareo, mba tsy hahatratra anareo ny maizina; fa izay mandeha amin''ny maizina dia tsy mahalala izay alehany.'
mg1865::mg_43::12::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola manana ny mazava ianareo, dia minoa ny mazava, mba ho tonga zanaky ny mazava. Rehefa nilaza izany Jesoa, dia niala Izy ka niery azy.'
mg1865::mg_43::12::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na dia efa nanao izany famantarana betsaka izany teo anatrehany aza Izy, dia tsy mba nino Azy ireo,'
mg1865::mg_43::12::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka ny teny nataon''Isaia mpaminany hoe: Tompoko, iza no nino ny teny nampitondraina anay? Ary iza no nampisehoana ny sandrin''i Jehovah? (Isaia 53:1.)'
mg1865::mg_43::12::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no tsy nahaizany nino, satria hoy koa Isaia:'
mg1865::mg_43::12::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanajamba ny masony sy nanamafy ny fony Izy, Mba tsy hahita ny masony, na hahalala ny fony, Dia tsy hibebaka izy, Ka tsy hahasitrana azy Aho (Isaia 6:10).'
mg1865::mg_43::12::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany teny izany no nolazain''Isaia, satria nahita ny voninahiny izy ka nilaza Azy.'
mg1865::mg_43::12::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa maro tamin''ny mpanapaka aza no nino Azy; nefa noho ny Fariseo dia tsy nanaiky ireo, fandrao havoaka hiala amin''ny synagoga.'
mg1865::mg_43::12::43:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tia ny voninahitra avy amin''ny olona izy ireo, fa tsy ny voninahitra avy amin''Andriamanitra.'
mg1865::mg_43::12::44:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niantso ka nanao hoe: Izay mino Ahy, dia tsy Izaho no inoany, fa Izay naniraka Ahy.'
mg1865::mg_43::12::45:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mahita Ahy dia mahita Izay naniraka Ahy.'
mg1865::mg_43::12::46:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho tonga amin''izao tontolo izao ho fahazavana, mba tsy hitoetra ao amin''ny maizina izay rehetra mino Ahy.'
mg1865::mg_43::12::47:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mandre ny teniko ka tsy mitandrina, Izaho tsy mitsara azy; fa tsy tonga hitsara izao tontolo izao Aho, fa hamonjy izao tontolo izao.'
mg1865::mg_43::12::48:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manda Ahy ka tsy mandray ny teniko, dia manana izay mitsara azy: ny teny izay nolazaiko, izany ihany no hitsara azy amin''ny andro farany,'
mg1865::mg_43::12::49:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria Izaho tsy niteny ho Ahy, fa ny Ray Izay naniraka Ahy, Izy no nandidy Ahy izay holazaiko sy izay hotoriko.'
mg1865::mg_43::12::50:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 12
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatro fa fiainana mandrakizay ny didiny; koa izay lazaiko dia lazaiko araka izay nolazain''ny Ray tamiko.'
mg1865::mg_43::13::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanasan''i Jesoa ny tongotry ny mpianany'
  verse_text: 'Ary talohan''ny andro firavoravoana tamin''ny Paska, satria fantatr''i Jesoa fa tonga ny fotoana hialany amin''izao tontolo izao ho any amin''ny Ray, ary efa tia ny Azy izay amin''izao tontolo izao Izy, dia tia azy hatramin''ny farany.'
mg1865::mg_43::13::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola teo amin''ny fisakafoana hariva, ary Jodasy Iskariota, zanak''i Simona, efa nomen''ny devoly saina rahateo mba hamadika Azy,'
mg1865::mg_43::13::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady fantatr''i Jesoa koa fa ny Ray efa nanolotra ny zavatra rehetra ho eo an-tànany, ary Andriamanitra no nihaviany, sady Andriamanitra koa no hiverenany,'
mg1865::mg_43::13::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitsangana niala teo am-pihinanana Izy ka nametraka ny lambany ary naka lamba famaohana, ka nisikinany;'
mg1865::mg_43::13::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa vita izany, dia nampidina rano tamin''ny tavy Izy ka nanomboka nanasa ny tongotry ny mpianatra sy namaoka azy tamin''ny lamba famaohana izay nisikinany.'
mg1865::mg_43::13::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo amin''i Simona Petera Izy; fa hoy Petera taminy: Tompoko, Ianao va hanasa ny tongotro?'
mg1865::mg_43::13::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Izay ataoko dia tsy fantatrao ankehitriny, fa ho fantatrao rahatrizay.'
mg1865::mg_43::13::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Petera taminy: Sanatria raha hanasa ny tongotro Ianao. Jesoa namaly azy hoe: Raha tsy hosasako ianao, dia tsy manana anjara amiko.'
mg1865::mg_43::13::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Simona Petera taminy: Tompoko, tsy ny tongotro ihany ary, fa ny tanako sy ny lohako koa.'
mg1865::mg_43::13::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Izay efa nandro tsy mila hosasana, afa-tsy ny tongotra ihany, fa efa madio avokoa; ary ianareo dia madio, nefa tsy ianareo rehetra.'
mg1865::mg_43::13::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantany ilay efa hamadika Azy; koa izany no nilazany hoe: Tsy madio avokoa ianareo rehetra.'
mg1865::mg_43::13::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voasasany ny tongony, dia nandray ny lambany Izy ka nipetraka indray, dia nanao taminy hoe: Fantatrareo va izay nataoko taminareo?'
mg1865::mg_43::13::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo manao Ahy hoe Mpampianatra sy Tompo; ary marina ny filazanareo, fa izany tokoa Aho.'
mg1865::mg_43::13::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha Izaho, Tompo sy Mpampianatra aza, no nanasa ny tongotrareo, ianareo kosa mba tokony hifanasa tongotra.'
mg1865::mg_43::13::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fianarana no nomeko anareo, mba hanaovanareo araka izay nataoko taminareo.'
mg1865::mg_43::13::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Ny andevo tsy lehibe noho ny tompony, na ny iraka noho ny maniraka azy.'
mg1865::mg_43::13::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha fantatrareo izany, dia sambatra ianareo, raha manao izany.'
mg1865::mg_43::13::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy milaza anareo rehetra Aho; fa fantatro izay nofidiko; fa mba hahatanteraka ny Soratra Masina hoe: Izay homana ny mofoko* no nanangana ny ombelahin-tongony hamely Ahy (Salamo 41:9). [*Na: miara-komana amiko]'
mg1865::mg_43::13::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''izao dia milaza aminareo Aho, raha tsy mbola tonga izany, mba hinoanareo, rehefa tonga, fa Izaho no Izy.'
mg1865::mg_43::13::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Izay mandray izay hirahiko dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy.'
mg1865::mg_43::13::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nanondroan''i Jesoa izay hamadika Azy, sy ny nialan''i Jodasy.'
  verse_text: 'Rehefa nilaza izany Jesoa, dia nangorohoro ny fanahiny, ka nanambara hoe Izy: Lazaiko aminareo marina dia marina tokoa fa ny anankiray aminareo no hamadika Ahy.'
mg1865::mg_43::13::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifampijerijery ny mpianatra ka nieritreritra izay iray nolazainy.'
mg1865::mg_43::13::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpianatra anankiray nipetraka nihinana teo anilan''i Jesoa, dia ilay tian''i Jesoa.'
mg1865::mg_43::13::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Simona Petera nanatsika azy ka nanao taminy hoe: Lazao izay izy.'
mg1865::mg_43::13::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nipetraka tahaka izany izy, dia niraika ho amin''ny tratran''i Jesoa ka nanao taminy hoe: Tompoko, iza moa izany?'
mg1865::mg_43::13::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Jesoa ka nanao hoe: Ilay homeko ny sombin-kanina lemako no izy. Ary rehefa nolemany ny sombin-kanina, dia noraisiny ka nomeny an''i Jodasy, zanak''i Simona Iskariota.'
mg1865::mg_43::13::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaraka izany no nidiran''i Satana tao aminy, ka hoy Jesoa taminy: Izay ataonao dia ataovy faingana.'
mg1865::mg_43::13::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy tamin''izay nipetraka nihinana nahalala ny anton''ny nilazany izany taminy.'
mg1865::mg_43::13::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nataon''ny sasany fa satria Jodasy no nitondra ny kitapo, no nilazan''i Jesoa taminy hoe: Vidio ny zavatra ilaintsika amin''ny andro firavoravoana, na mba hanome zavatra ho an''ny malahelo.'
mg1865::mg_43::13::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandray ny sombin-kanina izy, dia nivoaka niaraka tamin''izay; ary efa alina ny andro.'
mg1865::mg_43::13::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay, nony efa nivoaka izy, dia hoy Jesoa: Ankehitriny dia efa ankalazaina ny Zanak''olona; ary Andriamanitra no ankalazaina eo aminy.'
mg1865::mg_43::13::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra kosa hankalaza Azy amin''ny tenany; eny, hankalaza Azy miaraka amin''izay Izy.'
mg1865::mg_43::13::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, vetivety foana no sisa hitoerako eto aminareo. Hitady Ahy ianareo, ary araka ny voalazako tamin''ny Jiosy hoe: Izay alehako tsy azonareo haleha, dia toy izany koa no lazaiko aminareo ankehitriny.'
mg1865::mg_43::13::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Didy vaovao no omeko anareo, dia ny mba hifankatiavanareo; eny, aoka ho tahaka ny fitiavako anareo no mba hifankatiavanareo kosa.'
mg1865::mg_43::13::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no hahafantaran''ny olona rehetra fa mpianatro ianareo, raha mifankatia.'
mg1865::mg_43::13::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Simona Petera taminy: Tompoko, hankaiza moa Ianao? Jesoa namaly hoe: Izay alehako, dia tsy azonao anarahana Ahy ankehitriny fa hanaraka Ahy ihany ianao rahatrizay.'
mg1865::mg_43::13::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Petera taminy: Tompoko, nahoana no tsy mahazo manaraka Anao ankehitriny aho? Na ny aiko aza dia hafoiko noho ny aminao.'
mg1865::mg_43::13::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 13
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Ny ainao va no hafoinao noho ny amiko? Lazaiko aminao marina dia marina tokoa: Tsy mbola hisy akoho haneno mandra-pandànao Ahy intelo.'
mg1865::mg_43::14::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampiononan''i Jesoa ny fon''ny mpianany, sy ny nilazany ny amin''ny Fanahy Masina.'
  verse_text: 'Aza malahelo ny fonareo; minoa an''Andriamanitra, ary minoa Ahy koa*. [*Na: mino an''Andriamanitra ianareo, dia minoa Ahy koa]'
mg1865::mg_43::14::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao an-tranon''ny Raiko misy fitoerana maro; raha tsy izany, dia efa nilaza taminareo Aho; fa handeha hamboatra fitoerana ho anareo Aho.'
mg1865::mg_43::14::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha handeha hamboatra fitoerana ho anareo Aho, dia ho avy indray ka handray anareo ho any amiko, ka izay itoerako no hitoeranareo koa.'
mg1865::mg_43::14::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatrareo koa ny lalana ho any amin''izay halehako*. [*Na: (ary izay alehako dia fantatrareo, ary fantatrareo koa ny lalana)]'
mg1865::mg_43::14::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Tomasy taminy: Tompoko, tsy fantatray izay alehanao; ka hataonay ahoana no fahafantatra ny lalana?'
mg1865::mg_43::14::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Izaho no lalana sy fahamarinana ary fiainana; tsy misy olona mankany amin''ny Ray, afa-tsy amin''ny alalako.'
mg1865::mg_43::14::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nahafantatra Ahy ianareo, dia ho nahafantatra ny Raiko koa; ary hatramin''izao dia mahafantatra Azy ianareo sady efa nahita Azy.'
mg1865::mg_43::14::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Filipo taminy: Tompoko, asehoy anay ny Ray, dia ampy ho anay izay.'
mg1865::mg_43::14::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Izay ela izay no efa nitoerako teto aminareo, ka tsy mbola fantatrao ihany va Aho, ry Filipo? Izay nahita Ahy dia nahita ny Ray; koa ahoana no anaovanareo hoe: Asehoy anay ny Ray?'
mg1865::mg_43::14::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mino va ianao fa Izaho ao amin''ny Ray, ary ny Ray ato amiko? Ny teny izay lazaiko aminareo, dia tsy avy amiko izany lazaiko izany; fa ny Ray mitoetra ato amiko no manao ny asa.'
mg1865::mg_43::14::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Minoa Ahy fa Izaho ao amin''ny Ray, ary ny Ray ato amiko; fa raha tsy izany, dia minoa Ahy noho ny asa ihany aza.'
mg1865::mg_43::14::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Izay mino Ahy, ny asa ataoko no hataony koa; ary hanao asa lehibe noho izany aza izy, satria Izaho mankany amin''ny Ray.'
mg1865::mg_43::14::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na inona na inona no hangatahinareo amin''ny anarako, dia hataoko izany, mba hankalazana ny Ray eo amin''ny Zanaka.'
mg1865::mg_43::14::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mangataka zavatra amiko amin''ny anarako* ianareo, dia hataoko izany. [*Na: mangataka zavatra amin''ny anarako]'
mg1865::mg_43::14::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tia Ahy ianareo, dia hitandrina ny didiko.'
mg1865::mg_43::14::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho hangataka amin''ny Ray, ary Izy hanome anareo Mpananatra* hafa mba ho eo aminareo mandrakizay, [*Grika: Parakleto, dia Mpanampy, na Mpampahery, na Solovava]'
mg1865::mg_43::14::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny Fanahin''ny fahamarinana, Izay tsy azon''izao tontolo izao horaisina, satria tsy hitany na fantany; fa ianareo no mahafantatra Azy, satria mitoetra eo aminareo Izy, ary ho ao anatinareo.'
mg1865::mg_43::14::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hamela anareo ho kamboty Aho; hankaty aminareo Aho.'
mg1865::mg_43::14::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vetivety foana dia tsy hahita Ahy intsony izao tontolo izao; fa ianareo no hahita Ahy; satria velona Aho, dia ho velona koa ianareo.'
mg1865::mg_43::14::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia ho fantatrareo fa Izaho ao amin''ny Raiko, ary ianareo ato amiko, ary Izaho ao aminareo.'
mg1865::mg_43::14::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manana ny didiko ka mitandrina izany, dia izy no tia Ahy; ary izay tia Ahy no ho tian''ny Raiko, ary Izaho ho tia azy ka hiseho aminy.'
mg1865::mg_43::14::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jodasy (tsy Iskariota) taminy: Tompoko, nahoana no aminay ihany no hisehoanao, fa tsy amin''izao tontolo izao koa?'
mg1865::mg_43::14::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly ka nanao taminy hoe: Raha misy tia Ahy, dia hitandrina ny teniko izy; ary ny Raiko ho tia azy, ary hankao aminy Izahay ka honina ao aminy.'
mg1865::mg_43::14::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy tia Ahy dia tsy mitandrina ny teniko; ary ny teny izay renareo dia tsy Ahy, fa an''ny Ray izay naniraka Ahy.'
mg1865::mg_43::14::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany teny izany dia efa voalazako taminareo raha mbola mitoetra eto aminareo Aho;'
mg1865::mg_43::14::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny Mpananatra*, dia ny Fanahy Masina, Izay hirahin''ny Ray amin''ny anarako. Izy no hampianatra anareo ny zavatra rehetra sy hampahatsiaro anareo ny zavatra rehetra izay nolazaiko taminareo. [*Grika: Parakleto, dia Mpanampy, na Mpampahery, na Solovava]'
mg1865::mg_43::14::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fiadanana no avelako ho anareo, ny fiadanako no omeko anareo; tsy tahaka ny fanomen''izao tontolo izao no fanomeko anareo. Aza malahelo na matahotra ny fonareo.'
mg1865::mg_43::14::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renareo fa Izaho nilaza taminareo hoe: Handeha Aho, nefa ho avy aminareo indray. Raha tia Ahy ianareo, dia ho faly, satria mankany amin''ny Ray Aho; fa ny Ray dia lehibe noho Izaho.'
mg1865::mg_43::14::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny efa nilaza taminareo Aho, dieny tsy mbola tonga izany, mba hinoanareo, rehefa tonga.'
mg1865::mg_43::14::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hilaza zavatra maro aminareo intsony Aho; fa avy ny andrianan''izao tontolo izao, nefa tsy manana na inona na inona ato amiko izy.'
mg1865::mg_43::14::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba ho fantatr''izao tontolo izao fa tiako ny Ray, ary araka izay nandidian''ny Ray Ahy, dia izany no hataoko. Mitsangàna, andeha isika hiala eto.'
mg1865::mg_43::15::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny voaloboka sy ny sampany, ary ny firaisan''i Jesoa sy ny mpianany.'
  verse_text: 'Izaho no tena voaloboka, ary ny Raiko no mpamboatra.'
mg1865::mg_43::15::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sampany rehetra eo amiko izay tsy mamoa dia esoriny; fa ny sampany rehetra izay mamoa kosa dia amboariny*, mba hamoa bebe kokoa. [*Gr dioviny]'
mg1865::mg_43::15::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa madio rahateo ianareo noho ny teniko, izay nolazaiko taminareo.'
mg1865::mg_43::15::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tomoera amiko ary Izaho aminareo. Tahaka ny sampany tsy mahay mamoa ho azy, raha tsy miray amin''ny voaloboka izy, dia toy izany koa ianareo, raha tsy miray amiko.'
mg1865::mg_43::15::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no voaloboka, ianareo no sampany. Izay miray amiko, ary Izaho aminy, dia mamoa be izy; fa raha misaraka amiko kosa ianareo, dia tsy mahay manao na inona na inona.'
mg1865::mg_43::15::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy tsy miray amiko, dia ariana eny ivelany tahaka ny sampany izy ka malazo; ary angonina izy ka atsipy ao anaty afo, dia ho may.'
mg1865::mg_43::15::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miray amiko ianareo, ka mitoetra ao anatinareo ny teniko, dia angataho izay tianareo na inona na inona, fa ho tonga aminareo izany.'
mg1865::mg_43::15::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ankalazana ny Raiko, mba hamoazanareo be ka ho tonga mpianatro ianareo.'
mg1865::mg_43::15::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny nitiavan''ny Ray Ahy no nitiavako anareo; tomoera amin''ny fitiavako ianareo.'
mg1865::mg_43::15::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitandrina ny didiko ianareo, dia hitoetra amin''ny fitiavako, tahaka ny nitandremako ny didin''ny Raiko sy ny itoerako amin''ny fitiavany.'
mg1865::mg_43::15::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany dia efa nolazaiko taminareo, mba ho ao aminareo ny fifaliako, ka ho tanteraka ny fifalianareo.'
mg1865::mg_43::15::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no didiko, dia ny mba hifankatiavanareo tahaka ny nitiavako anareo.'
mg1865::mg_43::15::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy manana fitiavana lehibe noho izao, dia ny manolotra ny ainy hamonjy ny sakaizany.'
mg1865::mg_43::15::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no sakaizako, raha manao araka izay andidiako anareo.'
mg1865::mg_43::15::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hataoko hoe mpanompo intsony ianareo, fa ny mpanompo tsy mahalala izay ataon''ny tompony; fa efa nataoko hoe sakaiza ianareo, satria izay rehetra reko tamin''ny Raiko no nambarako taminareo.'
mg1865::mg_43::15::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ianareo no nifidy Ahy, fa Izaho no nifidy anareo ka nanendry anareo mba handeha sy hamoa, ary mba haharetan''ny vokatrareo, mba homen''ny Ray anareo izay rehetra hangatahinareo amin''ny anarako na inona na inona.'
mg1865::mg_43::15::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany no andidiako anareo, mba hifankatiavanareo.'
mg1865::mg_43::15::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha halan''izao tontolo izao ianareo, dia aoka ho fantatrareo fa Izaho efa halany talohanareo.'
mg1865::mg_43::15::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha naman*''izao tontolo izao ianareo, dia ho tia ny azy izao tontolo izao; fa satria tsy naman*''izao tontolo izao ianareo, fa Izaho efa nifidy anareo tamin''izao tontolo izao, dia halan''izao tontolo izao ianareo. [*Grika: avy amin'']'
mg1865::mg_43::15::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny teny izay nolazaiko taminareo hoe: Ny mpanompo tsy lehibe noho ny tompony. Raha nanenjika Ahy izy, dia hanenjika anareo koa; ary raha nitandrina ny teniko izy, dia hitandrina ny anareo koa.'
mg1865::mg_43::15::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany rehetra izany no hataony aminareo noho ny anarako, satria tsy mahalala Izay naniraka Ahy izy.'
mg1865::mg_43::15::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy tonga Aho ka niteny taminy, dia tsy nanan-keloka izy; fa ankehitriny dia tsy misy fialàna azony atao ny amin''ny helony.'
mg1865::mg_43::15::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mankahala Ahy dia mankahala ny Raiko koa.'
mg1865::mg_43::15::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: '2022-08-18T06:29:24+0000'
  verse_title: null
  verse_text: 'Raha tsy nataoko teo aminy Izay asa tsy nataon''olona, dia tsy nanan-keloka izy; fa ankehitriny efa hitany sady efa halany Aho sy ny Raiko koa;'
mg1865::mg_43::15::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tonga izany mba hahatanteraka ny teny izay voasoratra ao amin''ny lalàny hoe: Halany foana Aho (Salamo 69:4; Salamo 109:3).'
mg1865::mg_43::15::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tonga ny Mpananatra*, Izay hirahiko ho aminareo avy amin''ny Ray, dia ny Fanahin''ny fahamarinana Izay mivoaka avy amin''ny Ray, dia Izy no ho vavolombelona hanambara Ahy. [*Izahao Jaona 14:16]'
mg1865::mg_43::15::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo koa dia vavolombelona hanambara, satria ianareo efa teto amiko hatramin''ny voalohany.'
mg1865::mg_43::16::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa ny hahatongavan''ny Mpananatra, sy ny hihaviany indray.'
  verse_text: 'Izany teny izany dia efa nolazaiko taminareo, mba tsy hahatafintohina anareo.'
mg1865::mg_43::16::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handroaka anareo hiala amin''ny synagoga izy; eny, ho avy ny andro*, ka hataon''izay rehetra mamono anareo fa manatitra fanompoam-pivavahana ho an''Andriamanitra izy. [*Grika: ora]'
mg1865::mg_43::16::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no hataony, satria tsy fantany ny Ray na Izaho.'
mg1865::mg_43::16::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany teny izany efa nolazaiko taminareo, mba hotsaroanareo, raha tonga ny fotoan''androny, fa Izaho efa nilaza izany taminareo. Ary tsy mba nolazaiko taminareo hatramin''ny voalohany izany, satria mbola taty aminareo ihany Aho.'
mg1865::mg_43::16::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny mankany amin''izay naniraka Ahy Aho, ary tsy misy aminareo manontany Ahy hoe: Hankaiza Ianao?'
mg1865::mg_43::16::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa satria nilaza izany taminareo Aho, dia vonton''alahelo ny fonareo.'
mg1865::mg_43::16::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho milaza ny marina aminareo; mahatsara anareo ny fialàko; fa raha tsy hiala Aho, dia tsy ho avy aty aminareo ny Mpananatra*; fa raha handeha Aho, dia hirahiko ho aty aminareo Izy. [*Izahao Jaona 14:16]'
mg1865::mg_43::16::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga Izy, dia hampiaiky izao tontolo izao ny fahotana sy ny fahamarinana ary ny fitsarana:'
mg1865::mg_43::16::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahotana, satria tsy mino Ahy izy;'
mg1865::mg_43::16::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahamarinana, satria mankany amin''ny Ray Aho, ka tsy mahita Ahy intsony ianareo;'
mg1865::mg_43::16::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fitsarana, satria ny andrianan''izao tontolo izao dia efa voatsara.'
mg1865::mg_43::16::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola manana zavatra maro holazaina aminareo Aho, nefa tsy zakanareo ankehitriny.'
mg1865::mg_43::16::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tonga ny Fanahin''ny fahamarinana, dia Izy no hitari-dalana anareo ho amin''ny marina rehetra; fa tsy hiteny ho Azy Izy, fa izay ho reny dia holazainy avokoa; ary ny zavatra ho avy aza dia hambarany aminareo.'
mg1865::mg_43::16::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy hankalaza Ahy; fa handray avy amin''ny Ahy Izy ka hanambara izany aminareo.'
mg1865::mg_43::16::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra ananan''ny Ray dia Ahy avokoa, koa izany no nilazako fa mandray avy amin''ny Ahy Izy ka hanambara izany aminareo.'
mg1865::mg_43::16::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vetivety foana dia tsy hahita Ahy intsony ianareo; ary vetivety foana indray dia hahita Ahy ianareo.'
mg1865::mg_43::16::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianany sasany niresaka hoe: Inona izany nolazainy tamintsika hoe: Vetivety foana dia tsy hahita Ahy ianareo; ary vetivety foana indray dia hahita Ahy ianareo, ary, satria mankany amin''ny Ray Aho?'
mg1865::mg_43::16::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa ireo: Inona izany lazainy hoe vetivety foana izany? Tsy fantatsika izay lazainy.'
mg1865::mg_43::16::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nahalala fa ta-hanontany Azy ireo, dia hoy Izy taminy: Mifanontany va ianareo, satria hoy Izaho: Vetivety foana dia tsy hahita Ahy ianareo, ary vetivety foana indray dia hahita Ahy ianareo?'
mg1865::mg_43::16::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina dia marina tokoa: Hitomany sy hisaona ianareo, fa izao tontolo izao kosa hifaly; ary ianareo halahelo, nefa ny alahelonareo hody fifaliana.'
mg1865::mg_43::16::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manam-pahoriana ny vehivavy raha miteraka, satria tonga ny fotoany; fa rehefa velon-jaza izy, dia tsy tsaroany intsony ilay fahoriany, noho ny fifaliany fa misy zaza nateraka ho ambonin''ny tany.'
mg1865::mg_43::16::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo dia manana alahelo ankehitriny; fa hahita anareo indray Aho, dia ho faly ny fonareo, ary tsy misy olona manaisotra ny fifalianareo aminareo.'
mg1865::mg_43::16::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia tsy hanontany Ahy na inona na inona ianareo; lazaiko aminareo marina dia marina tokoa fa na inona na inona hangatahinareo amin''ny Ray dia homeny anareo amin''ny anarako izany.'
mg1865::mg_43::16::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandraka ankehitriny dia tsy mbola nangataka na inona na inona tamin''ny anarako ianareo; mangataha, dia hahazo ianareo, mba ho tanteraka ny fifalianareo.'
mg1865::mg_43::16::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fanoharana no nilazako izany zavatra izany taminareo; fa ho avy ny andro* izay tsy hilazako fanoharana aminareo intsony, fa hambarako tsotra aminareo ny amin''ny Ray. [*Grika: ora]'
mg1865::mg_43::16::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hangataka amin''ny anarako ianareo; ary tsy milaza aminareo Aho fa Izaho no hangataka amin''ny Ray ho anareo;'
mg1865::mg_43::16::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny Ray dia tia anareo satria ianareo efa tia Ahy, ary efa nino fa nivoaka avy tamin''ny Ray Aho.'
mg1865::mg_43::16::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nivoaka avy tamin''ny Ray Aho ka tonga amin''izao tontolo izao; ary hiala amin''izao tontolo izao indray Aho ka hankany amin''ny Ray.'
mg1865::mg_43::16::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny mpianany: Indro, milaza tsotra Ianao ankehitriny, fa tsy manao fanoharana akory.'
mg1865::mg_43::16::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia fantatray fa mahalala ny zavatra rehetra Ianao ka tsy mitady olona hanontany Anao; izany no inoanay fa nivoaka avy tamin''Andriamanitra Ianao.'
mg1865::mg_43::16::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Mino va ianareo ankehitriny?'
mg1865::mg_43::16::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro*, eny, efa tonga, izay hielezanareo samy ho any amin''ny azy avy, ary hilaozanareo ho irery Aho; kanefa tsy irery Aho, fa ny Ray no ato amiko. [*Gr ora]'
mg1865::mg_43::16::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: '2022-04-20T11:21:00+0000'
  verse_title: null
  verse_text: 'Izany teny izany efa nolazaiko taminareo mba hanananareo fiadanana amiko. Aty amin''izao tontolo izao no ahitanareo fahoriana; nefa matokia; Izaho efa naharesy izao tontolo izao.'
mg1865::mg_43::17::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny vavaka nataon''i Jesoa ho an''ny mpianany.'
  verse_text: 'Rehefa nolazain''i Jesoa izany teny izany, dia nanandratra ny masony ho amin''ny lanitra Izy ka nanao hoe: Ray o, tonga ny fotoana; mankalazà ny Zanakao, mba hankalazan''ny Zanaka Anao.'
mg1865::mg_43::17::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny nanomezanao Azy fahefana amin''ny nofo rehetra mba hanome fiainana mandrakizay ho an''izay rehetra nomenao Azy.'
mg1865::mg_43::17::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fiainana mandrakizay, dia ny mahafantatra Anao, Izay Andriamanitra tokana sady marina, sy Jesoa Kristy, Izay efa nirahinao.'
mg1865::mg_43::17::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho efa nankalaza Anao tety ambonin''ny tany; vitako ny asa nomenao Ahy hataoko.'
mg1865::mg_43::17::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, Ray o, mankalazà Ahy amin''ny tenanao, dia amin''ny voninahitra niarahako nanana taminao, fony tsy mbola ary izao tontolo izao.'
mg1865::mg_43::17::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nasehoko tamin''ny olona izay nomenao Ahy avy tamin''izao tontolo izao ny anaranao; Anao ireny ka nomenao Ahy; ary notandremany ny teninao.'
mg1865::mg_43::17::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantany ankehitriny fa avy taminao izay rehetra efa nomenao Ahy.'
mg1865::mg_43::17::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny teny izay nomenao Ahy dia nomeko azy kosa, ary noraisiny, ka fantany marina tokoa fa avy taminao Aho; ary nino izy fa Ianao no naniraka Ahy.'
mg1865::mg_43::17::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho mangataka ho azy; tsy mangataka ho an''izao tontolo izao Aho, fa ho an''izay nomenao Ahy, satria Anao izy.'
mg1865::mg_43::17::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay Ahy rehetra dia Anao; ary izay Anao dia Ahy; ary efa ankalazaina eo aminy Aho.'
mg1865::mg_43::17::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ho eto amin''izao tontolo izao intsony Aho, fa izy ireto no ho eto amin''izao tontolo izao, ary Izaho mankany aminao. Ray masina o, tehirizo ireo amin''ny anaranao izay nomenao Ahy, mba ho iray ihany izy, tahaka ny mahiray Antsika.'
mg1865::mg_43::17::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola teo aminy Aho, dia nitahiry azy tamin''ny anaranao izay nomenao Ahy; ary notandremako izy, ka tsy misy very, afa-tsy ilay zanaky ny fahaverezana ihany; mba hahatanteraka ny Soratra Masina.'
mg1865::mg_43::17::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny mankany aminao Aho; ary izany teny izany no lazaiko eto amin''izao tontolo izao, mba hananany ny fifaliako tanteraka ao aminy.'
mg1865::mg_43::17::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nomeko azy ny teninao; ary halan''izao tontolo izao izy, satria tsy naman*''izao tontolo izao, tahaka Ahy tsy naman*''izao tontolo izao. [*Grika: avy amin'']'
mg1865::mg_43::17::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho tsy mangataka aminao mba hampiala azy amin''izao tontolo izao, fa ny mba hiaro azy amin''ny ratsy*. [*Na: amin''ilay ratsy]'
mg1865::mg_43::17::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy naman* izao tontolo izao izy, tahaka Ahy tsy naman*''izao tontolo izao. [*Grika: avy amin'']'
mg1865::mg_43::17::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manamasina azy amin''ny fahamarinana; ny teninao no fahamarinana.'
mg1865::mg_43::17::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny nanirahanao Ahy ho amin''izao tontolo izao no mba nanirahako azy kosa ho amin''izao tontolo izao.'
mg1865::mg_43::17::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''ireto no anamasinako ny tenako, mba hanamasinan''ny fahamarinanao azy.'
mg1865::mg_43::17::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy ho an''ireto ihany no angatahako, fa ho an''izay mino Ahy koa noho ny teniny;'
mg1865::mg_43::17::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho iray ihany izy rehetra, tahaka Anao Ray ato amiko, ary Izaho koa ao aminao, mba ho ao amintsika koa izy; mba hinoan''izao tontolo izao fa Ianao no naniraka Ahy.'
mg1865::mg_43::17::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeko azy ny voninahitra izay nomenao Ahy, mba ho iray izy, tahaka ny mahiray Antsika:'
mg1865::mg_43::17::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho ao aminy, ary Ianao ato amiko, mba ho tanteraka ho iray izy, mba ho fantatr''izao tontolo izao fa Ianao efa naniraka Ahy sady efa tia azy tahaka ny nitiavanao Ahy.'
mg1865::mg_43::17::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ray o, tiako mba ho any amiko amin''izay itoerako ireo izay nomenao Ahy, mba hahita ny voninahitro nomenao Ahy izy; fa efa tia Ahy Ianao, fony tsy mbola ary ny fanorenan''izao tontolo izao.'
mg1865::mg_43::17::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ray marina o, tsy nahalala Anao izao tontolo izao; fa Izaho nahalala Anao, ary ireto efa mahalala fa Ianao no naniraka Ahy.'
mg1865::mg_43::17::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nampahafantariko azy ny anaranao, ary mbola hampahafantariko ihany, mba ho ao aminy ny fitiavana izay nitiavanao Ahy, ary Izaho koa ho ao aminy.'
mg1865::mg_43::18::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tao Getsemane, sy ny nisamborana Azy.'
  verse_text: 'Rehefa voalazan''i Jesoa izany teny izany, dia nandeha Izy mbamin''ny mpianany ka nita ny lohasahan-driaka Kidrona; ary nisy saha teo, izay nidiran''izy sy ny mpianany.'
mg1865::mg_43::18::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jodasy koa, ilay namadika Azy, dia nahalala izany tany izany, satria mpankao matetika Jesoa mbamin''ny mpianany.'
mg1865::mg_43::18::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jodasy, rehefa nahazo ny miaramila iray toko sy mpiandry raharaha avy tamin''ny lohan''ny mpisorona sy ny Fariseo, dia nankeo nitondra fanilo sy fanala ary fiadiana.'
mg1865::mg_43::18::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria fantatr''i Jesoa izay rehetra hanjo Azy, dia nivoaka Izy ka nanao tamin''ireo hoe: Iza moa no tadiavinareo?'
mg1865::mg_43::18::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo namaly Azy hoe: Jesoa avy any Nazareta. Hoy Jesoa taminy: Izaho no Izy. Ary teo koa Jodasy, ilay namadika Azy.'
mg1865::mg_43::18::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Jesoa vao nilaza taminy hoe: Izaho no Izy, dia nianotra ireo ka lavo tamin''ny tany.'
mg1865::mg_43::18::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanontany azy indray hoe: Iza moa no tadiavinareo? Dia hoy izy: Jesoa avy any Nazareta.'
mg1865::mg_43::18::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Efa nolazaiko taminareo fa Izaho no Izy; koa raha Izaho no tadiavinareo, dia avelao handeha ireto;'
mg1865::mg_43::18::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka ny teny izay nataony hoe: Tsy nasiako very izay nomenao Ahy.'
mg1865::mg_43::18::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona Petera nanana sabatra, dia nanatsoaka azy ka nikapa ny mpanompon''ny mpisoronabe ary nahafaka ny sofiny ankavanana. Ary Malko no anaran''ilay mpanompo.'
mg1865::mg_43::18::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa tamin''i Petera: Ampidiro amin''ny tranony ny sabatrao; ny kapoaka nomen''ny Raiko Ahy tsy hosotroiko va?'
mg1865::mg_43::18::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nitsarana an''i Jesoa teo anatrehan''i Anasy sy Kaiafa, sy ny nandavan''i Petera Azy intelo.'
  verse_text: 'Ary ny miaramila iray toko sy ny mpifehy arivo ary ny mpiandry raharaha tamin''ny Jiosy dia nisambotra an''i Jesoa ka namatotra Azy,'
mg1865::mg_43::18::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitondra Azy tany amin''i Anasy aloha, fa izy no rafozan''i Kaiafa, mpisoronabe tamin''izany taona izany.'
mg1865::mg_43::18::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kaiafa no ilay nanome saina ny Jiosy fa mahatsara raha maty ny olona anankiray hamonjy ny firenena.'
mg1865::mg_43::18::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona Petera sy ny mpianatra anankiray koa dia nanaraka an''i Jesoa; ary fantatry ny mpisoronabe izany mpianatra izany, dia niara-niditra tamin''i Jesoa ho ao an-kianjan''ny tranon''ny mpisoronabe izy.'
mg1865::mg_43::18::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera nijanona teo ala-trano teo am-bavahady. Dia nivoaka ilay mpianatra anankiray, izay fantatry ny mpisoronabe, ka niteny tamin''ny mpiandry vavahady, dia nitondra an''i Petera niditra.'
mg1865::mg_43::18::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny ankizivavy mpiandry vavahady tamin''i Petera: Moa ianao mba isan''ny mpianatr''io Lehilahy io? Hoy izy: Tsia.'
mg1865::mg_43::18::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompo sy ny mpiandry raharaha namelona afon''arina ka nijanona namindro teo, fa nangatsiaka ny andro; ary Petera koa mba nijanona niara-namindro taminy.'
mg1865::mg_43::18::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisoronabe nanadina an''i Jesoa ny amin''ny mpianany sy ny fampianarany.'
mg1865::mg_43::18::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Izaho niteny miharihary tamin''izao tontolo izao; Izaho nampianatra mandrakariva tao amin''ny synagoga sy ny kianjan''ny tempoly, izay iangonan''ny Jiosy rehetra; ary tsy nisy nolazaiko tao amin''ny takona;'
mg1865::mg_43::18::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nahoana no manontany Ahy ianao? Ireo nihaino no anontanio izay nolazaiko taminy; fa ireo no mahalala izay nolazaiko.'
mg1865::mg_43::18::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany teny izany Izy, ny mpiandry raharaha anankiray izay nitsangana teo dia namely tahamaina* an''i Jesoa ka nanao hoe: Izany va no famalinao ny mpisoronabe? [*Na: tehina]'
mg1865::mg_43::18::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Raha niteny ratsy Aho, ambarao izay ratsy; fa raha tsara ihany kosa, nahoana no dia mamely Ahy ianao?'
mg1865::mg_43::18::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nasain''i Anasy nentina tamin''ny fatorany ho any amin''i Kaiafa mpisoronabe Izy.'
mg1865::mg_43::18::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona Petera nijanona namindro. Dia nisy nilaza taminy hoe: Moa ianao koa mba isan''ny mpianany? Fa izy nandà ka nanao hoe: Tsia.'
mg1865::mg_43::18::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny anankiray tamin''ny mpanompon''ny mpisoronabe havan''ilay nokapain''i Petera ny sofiny: Tsy efa hitako teo aminy tao anaty saha va ianao?'
mg1865::mg_43::18::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandà indray Petera; ary niaraka tamin''izay dia nisy akoho naneno.'
mg1865::mg_43::18::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Ny nitsaran''i Pilato an''i Jesoa.'
  verse_text: 'Ary Jesoa dia nentiny niala tao amin''i Kaiafa ho ao anatirova*; ary maraina koa ny andro tamin''izay; nefa ireo tsy niditra tao anati-rova*, fandrao ho voaloto, fa efa hihinana ny Paska izy. [*Grika: pretoria]'
mg1865::mg_43::18::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato nivoaka ho eo aminy teo ivelany ka nanao hoe: Inona moa no iampanganareo io Lehilahy io?'
mg1865::mg_43::18::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ireo ka nanao taminy hoe: Raha tsy mpanao ratsy Izy, dia tsy mba natolotray anao.'
mg1865::mg_43::18::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Pilato taminy: Entonareo Izy, ka tsarao araka ny lalànareo. Hoy ny Jiosy taminy: Izahay tsy manam-pahefana hahafaty olona;'
mg1865::mg_43::18::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka ny tenin''i Jesoa izay nolazainy nanambara ny fomban''ny fahafatesana izay efa hiaretany.'
mg1865::mg_43::18::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra tao anati-rova* indray Pilato, dia niantso an''i Jesoa ka nanao taminy hoe: Ianao va no Mpanjakan''ny Jiosy? [*Grika: pretoria]'
mg1865::mg_43::18::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Hevitrao ihany va no anaovanao izany, sa nisy hafa nilaza Ahy taminao?'
mg1865::mg_43::18::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Pilato namaly hoe: Moa aho Jiosy? Ny firenenao sy ny mpisoronabe no nanolotra Anao tamiko; inona moa no nataonao?'
mg1865::mg_43::18::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly hoe: Ny fanjakako tsy avy amin''izao tontolo izao; fa raha mba avy amin''izao tontolo izao ny fanjakako, dia ho niady ny mpanompoko, mba tsy ho voatolotra tamin''ny Jiosy Aho; nefa ankehitriny tsy avy amin''izany ny fanjakako.'
mg1865::mg_43::18::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Pilato taminy: Mpanjaka va ary Ianao ? Jesoa namaly hoe: Voalazanao fa mpanjaka Aho. Izao no nahaterahako, ary izao no nihaviako amin''izao tontolo izao, dia ny hanambara ny marina. Izay rehetra avy amin''ny marina dia mihaino ny feoko.'
mg1865::mg_43::18::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Pilato taminy: Inona no marina? Ary rehefa nanontany izany izy, dia nivoaka nankeo amin''ny Jiosy indray ka nanao taminy hoe: Tsy hitako izay helony, na dia kely akory aza.'
mg1865::mg_43::18::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy fanaonareo amin''ny Paska, handefasako anankiray ho anareo; koa tianareo va raha halefako ho anareo ny Mpanjakan''ny Jiosy?'
mg1865::mg_43::18::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 18
  verse_number: 40
  verse_date_revised: '2022-08-18T06:29:13+0000'
  verse_title: null
  verse_text: 'Ary ireo niantso indray ka nanao hoe: Tsy Ilehio, fa Barabasy; koa nefa jiolahy Barabasy.'
mg1865::mg_43::19::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanomboana an''i Jesoa tamin''ny hazo fijaliana.'
  verse_text: 'Ary tamin''izany dia nalain''i Pilato Jesoa ka nokapohiny.'
mg1865::mg_43::19::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramila nandrandrana satroka tsilo, ka nasatrony ny lohany, ary nampitafiny lamba volomparasy Izy,'
mg1865::mg_43::19::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanatona Azy ireo ka niteny hoe: Arahaba, ry Mpanjakan''ny Jiosy! sady namely tahamaina* Azy izy. [*Na: tehina]'
mg1865::mg_43::19::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka indray Pilato ka nanao taminy hoe: Indro, izaho mitondra Azy mivoaka ho eto aminareo, mba ho fantatrareo fa tsy hitako izay helony, na dia kely akory aza.'
mg1865::mg_43::19::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka Jesoa misatroka tsilo sy mitafy ny lamba volomparasy. Dia hoy Pilato tamin''ny vahoaka: Indro ny Lehilahy!'
mg1865::mg_43::19::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny lohan''ny mpisorona sy ny mpiandry raharaha Jesoa, dia niantso ireo ka nanao hoe: Homboy amin''ny hazo fijaliana Izy! homboy amin''ny hazo fijaliana Izy! Hoy Pilato taminy: Entonareo Izy, ka homboy amin''ny hazo fijaliana; fa izaho tsy mahita izay helony.'
mg1865::mg_43::19::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Jiosy namaly azy hoe: Izahay manana lalàna, ary araka izany lalàna izany dia tokony ho faty Izy, satria nanao ny tenany ho Zanak''Andriamanitra.'
mg1865::mg_43::19::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Pilato izany teny izany, dia vao mainka natahotra izy,'
mg1865::mg_43::19::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niditra tao anati-rova* indray izy ka nanao tamin''i Jesoa hoe: Avy aiza moa Ianao? Fa tsy namaly azy akory Jesoa. [*Grika: pretoria]'
mg1865::mg_43::19::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Pilato taminy: Tsy miteny amiko va Ianao? tsy fantatrao va fa manana fahefana handefa Anao aho, sady manana fahefana hanombo Anao amin''ny hazo fijaliana koa?'
mg1865::mg_43::19::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa namaly azy hoe: Ianao tsy manana fahefana amiko akory, raha tsy nomena anao avy any ambony; koa izay nanolotra Ahy taminao no manan-keloka bebe kokoa.'
mg1865::mg_43::19::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''izany* dia nitady handefa Azy Pilato; nefa ny Jiosy niantso ka nanao hoe: Raha alefanao io Lehilahy io, dia tsy mba sakaizan''i Kaisara ianao; fa izay rehetra manao ny tenany ho mpanjaka dia manao teny manohitra an''i Kaisara. [*Na: noho izany]'
mg1865::mg_43::19::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Pilato izany teny izany, dia nitondra an''i Jesoa nivoaka izy ka nipetraka teo amin''ny seza fitsarana teo amin''ny fitoerana atao hoe Lampivato, fa amin''ny teny Hebreo Gabata'
mg1865::mg_43::19::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary andro fiomanana amin''ny Paska ny andro, tokony ho tamin''ny ora fahenina dia hoy izy tamin''ny Jiosy: Indro ny Mpanjakanareo!'
mg1865::mg_43::19::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niantso ireo hoe: Ento, ento, homboy amin''ny hazo fijaliana Izy! Hoy Pilato taminy: Hohomboako amin''ny hazo fijaliana va ny Mpanjakanareo? Ny lohan''ny mpisorona namaly hoe: Tsy manana mpanjaka afa-tsy Kaisara izahay.'
mg1865::mg_43::19::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany Pilato dia nanolotra Azy taminy mba hohomboana amin''ny hazo fijaliana. Dia noraisin''ireo Jesoa;'
mg1865::mg_43::19::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Izy nitondra ny hazo fijaliany, dia nankany amin''ny tany atao hoe Ikarandoha, izay atao amin''ny teny Hebreo hoe Golgota.'
mg1865::mg_43::19::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo no nanomboana Azy tamin''ny hazo fijaliana, ary nisy roa lahy koa niaraka taminy, iray avy teo an-daniny roa, ary Jesoa teo afovoany.'
mg1865::mg_43::19::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato nanoratra anarana, ka napetany teo amin''ny hazo fijaliana. Ary izao no voasoratra: JESOSY AVY ANY NAZARETA, MPANJAKAN''NY JIOSY.'
mg1865::mg_43::19::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany anarana izany dia novakin''ny Jiosy maro, fa akaikin''ny tanàna ny tany izay nanomboana an''i Jesoa tamin''ny hazo fijaliana; ary voasoratra tamin''ny teny Hebreo sy Romana sy Grika izany.'
mg1865::mg_43::19::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny lohan''ny mpisorona tamin''ny Jiosy dia nanao tamin''i Pilato hoe; Aza soratana hoe: Mpanjakan''ny Jiosy; fa izao: Izy no nilaza hoe: Mpanjakan''ny Jiosy Aho.'
mg1865::mg_43::19::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Pilato namaly hoe: Izay voasoratro dia voasoratro.'
mg1865::mg_43::19::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voahombon''ny miaramila tamin''ny hazo fijaliana Jesoa, dia nalainy ny fitafiany ka nozarainy efatra, samy nanana ny anjarany avy ny miaramila; ary ny akanjony koa; fa tsy nisy vitrana ny akanjony, fa tenona iray ihany.'
mg1865::mg_43::19::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niresaka hoe izy: Aza mba triarintsika, fa aoka hilokantsika ho an''izay hahazo azy; mba hahatanteraka ny Soratra Masina manao hoe: Nozarainy ny fitafiako, ary nilokany ny akanjoko (Salamo 22:18). Izany zavatra izany no nataon''ny miaramila.'
mg1865::mg_43::19::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nijanona teo akaikin''ny hazo fijalian''i Jesoa ny reniny sy ny rahavavin-dreniny, Maria, vadin''i Klopa, sy Maria Magdalena.'
mg1865::mg_43::19::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Jesoa ny reniny sy ilay mpianatra tiany nijanona teo, dia hoy Izy tamin''ny reniny: Ravehivavy, indro ny zanakao!'
mg1865::mg_43::19::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy tamin''ilay mpianatra: Indro ny reninao! Ary tamin''izany ora izany dia noraisin''ilay mpianatra ho any aminy izy.'
mg1865::mg_43::19::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia fantatr''i Jesoa fa efa vita ny zavatra rehetra tamin''izay, mba hahatanteraka ny Soratra Masina, dia hoy Izy: Mangetaheta Aho.'
mg1865::mg_43::19::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy bakoly feno vinaingitra nipetraka teo; ary nisy sipaonjy feno vinaingitra notohiziny tamin''ny hysopa ka nataony tamin''ny vavany.'
mg1865::mg_43::19::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanandrana ny vinaingitra Jesoa, dia nanao hoe: Vita; dia nanondrika ny lohany Izy ka nanolotra ny fanahiny.'
mg1865::mg_43::19::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria andro fiomanana ny andro, dia nangataka tamin''i Pilato ny Jiosy mba hotapahina ny ranjon''ireo, ary hesorina ny faty, mba tsy ho tratry ny andro Sabata eo amin''ny hazo fijaliana, satria andro lehibe izany Sabata izany.'
mg1865::mg_43::19::32:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga ny miaramila ka nanapaka ny ranjon''ny voalohany sy ny an''ny anankiray koa izay niaraka nohomboana tamin''i Jesoa tamin''ny hazo fijaliana.'
mg1865::mg_43::19::33:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nankeo amin''i Jesoa izy, dia hitany fa efa maty sahady Izy, ka dia tsy mba notapahiny ny ranjony.'
mg1865::mg_43::19::34:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny miaramila anankiray nandefona ny lanivoany, ary niaraka tamin''izay dia nisy rà sy rano nandeha.'
mg1865::mg_43::19::35:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay nahita dia vavolombelona manambara, ary marina ny fanambarany; ary fantany fa milaza ny marina izy, mba hinoanareo koa.'
mg1865::mg_43::19::36:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga izany mba hahatanteraka ny Soratra Masina hoe: Tsy hisy hotapahina ny taolany (Eksodosy 12:46; Salamo 34:20).'
mg1865::mg_43::19::37:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa ny teny iray ao amin''ny Soratra Masina: Hijery Izay nolefoniny izy (Zakaria 12:10).'
mg1865::mg_43::19::38:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny nandevenana an''i Jesoa.'
  verse_text: 'Ary rehefa afaka izany, Josefa avy any Arimatia (mpianatr''i Jesoa izy, nefa tamin''ny mangingina ihany noho ny fahatahorany ny Jiosy) dia nangataka tamin''i Pilato, mba hahazoany manaisotra ny fatin''i Jesoa. Ary nanaiky Pilato. Dia lasa izy ka nanaisotra ny fatin''i Jesoa.'
mg1865::mg_43::19::39:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga koa Nikodemosy (ilay nankao amin''i Jesoa nony alina tamin''ny voalohany) ka nitondra miora sy hazo manitra voaharoharo, tokony ho zato livatra.'
mg1865::mg_43::19::40:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisiny ny fatin''i Jesoa ka nofonosiny lambam-paty mbamin''ny zava-manitra, araka ny fanaon''ny Jiosy, raha mamboatra faty halevina.'
mg1865::mg_43::19::41:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy saha teo amin''ilay nanomboana Azy tamin''ny hazo fijaliana; ary teo anatin''ilay saha nisy fasana vaovao, izay tsy mbola nandevenana olona.'
mg1865::mg_43::19::42:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 19
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo no nandevenany an''i Jesoa noho ny andro fiomanan''ny Jiosy, satria teo akaiky ny fasana.'
mg1865::mg_43::20::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsanganan''i Jesoa tamin''ny maty, sy ny nisehoany tamin''ny mpianany.'
  verse_text: 'Ary tamin''ny andro voalohany amin''ny herinandro dia nandeha maraina koa mbola maizimaizina hankany amin''ny fasana Maria Magdalena ka nahita ny vato voaisotra tamin''ny fasana.'
mg1865::mg_43::20::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihazakazaka nankany amin''i Simona Petera sy ilay mpianatra tian''i Jesoa izy ka nanao taminy hoe: Nalain''olona tao am-pasana ny Tompo, ka tsy fantatray izay nametrahany Azy.'
mg1865::mg_43::20::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Petera sy ilay mpianatra anankiray ka nankany amin''ny fasana.'
mg1865::mg_43::20::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niara-nihazakazaka izy roa lahy; ary ilay mpianatra anankiray nihazakazaka nihoatra an''i Petera ka tonga taloha tao amin''ny fasana.'
mg1865::mg_43::20::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niondrika nitsirika izy, dia nahita ny lambam-paty nipetraka teo, nefa tsy niditra tao izy.'
mg1865::mg_43::20::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy koa Simona Petera nanaraka azy, dia niditra tao am-pasana ka nijery ny lambam-paty nipetraka teo,'
mg1865::mg_43::20::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mosara izay nafehy ny lohany tsy mba nipetraka teo amin''ny lambam-paty, fa voavalona mitokana.'
mg1865::mg_43::20::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia niditra koa ny mpianatra anankiray izay tonga taloha teo amin''ny fasana, ary nahita ka nino.'
mg1865::mg_43::20::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mbola fantany ny Soratra Masina fa tsy maintsy hitsangana amin''ny maty Jesoa.'
mg1865::mg_43::20::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa indray ny mpianatra nody tany aminy.'
mg1865::mg_43::20::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Maria nijanona nitomany teo ivelan''ny fasana; ary raha nitomany izy, dia niondrika nitsirika ny tao am-pasana'
mg1865::mg_43::20::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nahita anjely roa nitafy lamba fotsy nipetraka teo, ny anankiray teo an-doha tamin''ilay nandrian''ny fatin''i Jesoa, ary ny anankiray teo an-tongotra.'
mg1865::mg_43::20::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo taminy: Ravehivavy, nahoana ianao no mitomany? Dia hoy izy taminy: Satria nalain''olona ny Tompoko, ka tsy fantatro izay nametrahany Azy.'
mg1865::mg_43::20::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa nilaza izany izy, dia nitodika ka nahita an''i Jesoa nitsangana teo, nefa tsy fantany ho Jesoa.'
mg1865::mg_43::20::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Ravehivavy, nahoana ianao no mitomany? iza no tadiavinao? Nataony fa mpiandry saha Izy, ka hoy izy taminy: Tompoko, raha Ianao no naka Azy teto, lazao amiko izay nametrahanao Azy, ary izaho dia haka Azy.'
mg1865::mg_43::20::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Ry Maria! Dia nitodika izy ka niteny taminy nanao teny Hebreo hoe: Rabàny! izany hoe: Mpampianatra o.'
mg1865::mg_43::20::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Aza manendry Ahy; fa tsy mbola niakatra tany amin''ny Ray Aho; fa mandehana mankany amin''ny rahalahiko, ka lazao aminy hoe: Miakatra ho any amin''ny Raiko sy ny Rainareo Aho, ary ho any amin''Andriamanitro sy Andriamanitrareo.'
mg1865::mg_43::20::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga Maria Magdalena ka nilaza tamin''ny mpianatra hoe: Efa nahita ny Tompo aho, sady izany teny izany no nolazainy taminy.'
mg1865::mg_43::20::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa harivan''ilay andro voalohany amin''ny herinandro, raha voarindrina ny varavaran''izay niangonan''ny mpianatra, noho ny fahatahorany ny Jiosy, dia tonga Jesoa ka nitsangana teo afovoany, dia nanao taminy hoe: Fiadanana ho anareo.'
mg1865::mg_43::20::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany Izy, dia nasehony azy ny tànany sy ny lanivoany. Dia faly ny mpianatra, raha nahita ny Tompo.'
mg1865::mg_43::20::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy indray Jesoa taminy: Fiadanana ho anareo; tahaka ny nanirahan''ny Ray Ahy no anirahako anareo kosa.'
mg1865::mg_43::20::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany Izy, dia nanisy fofonaina, ka hoy Izy taminy; Raiso ny Fanahy Masina;'
mg1865::mg_43::20::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'na helok''iza na helok''iza no avelanareo, dia voavela izany; ary na an''iza na an''iza kosa no tsy avelanareo, dia tsy voavela izany.'
mg1865::mg_43::20::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Tomasy, anankiray tamin''ny roa ambin''ny folo lahy, ilay atao hoe Didymo, dia tsy mba teo aminy raha tonga Jesoa.'
mg1865::mg_43::20::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpianatra sasany taminy: Efa nahita ny Tompo izahay. Fa hoy kosa izy taminy: Raha tsy hitako eo amin''ny tànany ny holatry ny nohomboana, ka ataoko eo amin''ny holatry ny nohomboana ny rantsan-tanako, ary ataoko eo amin''ny lanivoany koa ny tanako, dia tsy mba hino aho.'
mg1865::mg_43::20::26:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka havaloana, dia tafangona teo indray ny mpianany, ary teo koa Tomasy. Dia tonga Jesoa, rehefa voarindrina ny varavarana, ka nitsangana teo afovoany, dia nanao hoe: Fiadanana ho anareo.'
mg1865::mg_43::20::27:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: '2022-04-27T03:09:22+0000'
  verse_title: null
  verse_text: 'Ary hoy Izy tamin''i Tomasy: Atehefo eto ny rantsan-tananao, ka jereo ny tanako; ary atehefo eto koa ny tananao, ka ataovy amin''ny lanivoako; ary aza ho isan''izay tsy mino, fa minoa.'
mg1865::mg_43::20::28:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Tomasy ka nanao taminy hoe: Tompoko sy Andriamanitro!'
mg1865::mg_43::20::29:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Satria nahita Ahy ianao, dia nino; sambatra kosa izay tsy nahita, nefa nino.'
mg1865::mg_43::20::30:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy famantarana maro hafa koa nataon''i Jesoa teo imason''ny mpianatra, izay tsy voasoratra amin''ity boky ity;'
mg1865::mg_43::20::31:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa voasoratra izao, mba hinoanareo fa Jesoa no Kristy, Zanak''Andriamanitra, ary mba hanananareo fiainana amin''ny anarany, raha mino ianareo.'
mg1865::mg_43::21::1:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nisehoan''i Jesoa tamin''ny mpianatra teo amoron''ny Ranomasin''i Galilia.'
  verse_text: 'Rehefa afaka izany, dia niseho tamin''ny mpianatra indray Jesoa teo amoron''ny Ranomasin''i Tiberiasy; ary toy izao no nisehoany:'
mg1865::mg_43::21::2:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niaraka Simona Petera sy Tomasy, izay atao hoe Didymo, sy Natanaela, ilay avy tany Kana any Galilia, sy ireo zanak''i Zebedio ary mpianatra roa lahy hafa koa.'
mg1865::mg_43::21::3:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Simona Petera taminy: Handeha hanarato aho. Hoy ireo taminy: Handeha hiaraka aminao koa izahay. Dia nandeha izy ka niditra an-tsambokely, ary tamin''iny alina iny dia tsy nahazo na inona na inona akory izy.'
mg1865::mg_43::21::4:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nazava ratsy ny andro, dia nitsangana teo amoron-dranomasina Jesoa, kanefa tsy fantatry ny mpianatra ho Jesoa izany.'
mg1865::mg_43::21::5:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Anaka, manan-kanina* va ianareo? Dia namaly Azy hoe izy: Tsia. [*Grika: laoka]'
mg1865::mg_43::21::6:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Alatsaho eo amin''ny sisiny ankavanan''ny sambokely ny haratonareo, dia hahazo ianareo. Koa dia nalatsany izany, ka tsy zakany nakarina noho ny habetsahan''ny hazandrano.'
mg1865::mg_43::21::7:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpianatra izay tian''i Jesoa tamin''i Petera: Ny Tompo iry . Ary raha ren''i Simona Petera fa ny Tompo iny, dia nisikinany ny akanjo ivelany (fa tsy niakanjo izy), ka nirotsaka teo amin''ny ranomasina izy.'
mg1865::mg_43::21::8:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpianatra sasany nandeha an-tsambokely ihany nisarika ny harato feno hazandrano; fa tsy lavitra ny tany izy, fa tokony ho roan-jato hakiho ihany.'
mg1865::mg_43::21::9:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha vao nikatra teo an-tanety izy, dia nahita afon''arina teo sy hazandrano teo amboniny ary mofo.'
mg1865::mg_43::21::10:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Analao hazandrano amin''ireo vao azonareo teo.'
mg1865::mg_43::21::11:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra Simona Petera, ka nosarihany ho eo an-tanety ny harato feno hazandrano vaventy, telo amby dimam-polo amby zato; ary na dia be tahaka izany aza izy, dia tsy triatra ny harato.'
mg1865::mg_43::21::12:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Avia hisakafo. Fa tsy nisy mpianatra sahy nanontany Azy hoe: Iza moa Ianao? satria fantany ihany fa ny Tompo Izy.'
mg1865::mg_43::21::13:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga Jesoa, dia nandray ny mofo, ka natolony azy, dia vao ny hazandrano indray.'
mg1865::mg_43::21::14:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no fanintelon''ny nisehoan''i Jesoa tamin''ny mpianatra, rehefa nitsangana tamin''ny maty Izy.'
mg1865::mg_43::21::15:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nisakafo izy, dia hoy Jesoa tamin''i Simona Petera: Simona, zanak''i Jaona, moa ny fitiavanao Ahy mihoatra noho ny fitiavan''ireto? Hoy izy taminy: Eny, Tompoko; Ianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Fahano ary ny ondrikeliko.'
mg1865::mg_43::21::16:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy indray Izy taminy fanindroany: Simona, zanak''i Jaona, moa tia Ahy va ianao? Dia hoy izy taminy: Eny, Tompoko; Ianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Andraso ary ny ondriko.'
mg1865::mg_43::21::17:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Izy fanintelony: Simona, zanak''i Jaona, moa tia Ahy va ianao? Dia nalahelo Petera, satria Izy nanao intelo taminy hoe: Moa tia Ahy va ianao? Ka hoy izy taminy: Tompoko, Ianao mahalala ny zavatra rehetra; fantatrao fa tia Anao aho. Hoy Jesoa taminy: Fahano ary ny ondriko.'
mg1865::mg_43::21::18:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminao marina dia marina tokoa: Raha mbola tanora ianao, dia nisikina ka nandeha tamin''izay tianao; fa rehefa antitra kosa ianao, dia haninjitra ny tananao, ary olon-kafa no hanikina anao ka hitondra anao amin''izay tsy tianao.'
mg1865::mg_43::21::19:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no nolazainy hanambara ny fomban''ny fahafatesana izay hankalazany an''Andriamanitra. Ary rehefa voalazany izany, dia hoy Izy taminy: Manaraha Ahy.'
mg1865::mg_43::21::20:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitodika Petera ka nahita ny mpianatra izay tian''i Jesoa manaraka, dia ilay niankina tamin''ny tratrany tamin''ny fisakafoana ka nanao hoe: Tompoko, iza no hamadika Anao?'
mg1865::mg_43::21::21:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa rehefa nahita azy Petera, dia hoy izy: Tompoko, inona no ho amin''ity lehilahy ity?'
mg1865::mg_43::21::22:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Raha tiako hitoetra izy mandra-pihaviko, ahoanao izany? fa manaraha Ahy ianao.'
mg1865::mg_43::21::23:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niely tamin''ny rahalahy izany teny izany, fa tsy ho faty izany mpianatra izany; nefa Jesoa tsy nilaza taminy fa tsy ho faty izy, fa: Raha tiako hitoetra izy mandra-pihaviko, ahoanao izany?'
mg1865::mg_43::21::24:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no ilay mpianatra izay vavolombelona manambara izany sy nanoratra izany; ary fantatsika fa marina ny fanambarany.'
mg1865::mg_43::21::25:
  verse_version: mg1865
  verse_book: mg_43
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary misy zavatra maro hafa koa izay nataon''i Jesoa, ka raha voasoratra tsirairay avokoa izany rehetra izany, ataoko fa izao tontolo izao aza dia tsy omby ny boky voasoratra.'
