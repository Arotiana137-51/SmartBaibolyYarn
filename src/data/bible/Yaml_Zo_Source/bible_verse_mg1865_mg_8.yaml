mg1865::mg_8::1::1:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjo an''i Naomy, sy ny niarahan''i Rota taminy, rehefa niverina ho any Betlehema izy'
  verse_text: 'Ary tamin''ny andro nitsaran''ny mpitsara dia nisy mosary teo amin''ny tany. Ary nisy lehilahy avy any Betlehema-joda nandeha nivahiny tany amin''ny tany Moaba, dia izy sy ny vadiny mbamin''ny zanany roa lahy;'
mg1865::mg_8::1::2:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Elimeleka no anaran-dralehilahy, ary Naomy no anaran''ny vadiny, ary ny anaran''ny zanany roa lahy dia Malona sy Kiliona, Efratita avy any Betlehema-joda izy ireo. Dia tonga tany amin''ny tany Moaba izy ka nitoetra tany.'
mg1865::mg_8::1::3:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Elimeleka, vadin''i Naomy ka izy sy ny zanany roa lahy ihany no sisa.'
mg1865::mg_8::1::4:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naka vady tamin''ny vehivavy Moabita izy roa lahy: Orpa no anaran''ny anankiray, ary Rota no anaran''ny anankiray; dia nitoetra tany Moaba tokony ho folo taona izy.'
mg1865::mg_8::1::5:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty koa izy mirahalahy, dia Malona sy Kiliona, ka dia namoy ny zanany roa lahy sy ny vadiny ravehivavy.'
mg1865::mg_8::1::6:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga izy sy ny vinantoni-vavy ka nody avy tany amin''ny tany Moaba; fa efa reny tany amin''ny tany Moaba fa novangian''i Jehovah ny olony ka nomeny hanina.'
mg1865::mg_8::1::7:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala tamin''izay nitoerany izy, ary ny vinantony roa vavy niaraka taminy; ary nandeha teny an-dàlana izy hiverina any amin''ny tanin''ny Joda.'
mg1865::mg_8::1::8:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Naomy tamin''ny vinantony roa vavy: Andeha, samy mody any amin''ny tranon-dreninareo avy ianareo; mba hohasoavin''i Jehovah anie ianareo araka izay efa nataonareo tamin''ny maty sy tamiko koa.'
mg1865::mg_8::1::9:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Homen''i Jehovah tokan-trano anie ianareo ka hahita fiadanana amin''izay tranon''ny vadinareo avy. Dia nanoroka azy Naomy; ary izy roa vavy dia samy nanandratra ny feony ka nitomany.'
mg1865::mg_8::1::10:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy roa vavy taminy: Hiara-miverina aminao tokoa izahay ho any amin''ny firenenao.'
mg1865::mg_8::1::11:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Naomy: Miverena ihany ianareo, anaka; nahoana no hiara-mandeha amiko ianareo? Mbola misy zazalahy va ato an-kiboko mba ho vadinareo?'
mg1865::mg_8::1::12:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena ihany ianareo, anaka, ka mandehana; fa efa antitra aho ka tsy hahazo vady intsony tsy akory. Raha hoy izaho: Manantena ihany aho, eny, na dia hanam-bady anio alina aza aho ka hiteraka zazalahy,'
mg1865::mg_8::1::13:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'moa hahandry azy mandra-pahalehibeny va ianareo ka hijanona tsy hanam-bady? Tsia, anaka, fa mangidy lavitra ny nanjo ahy noho ny nanjo anareo; fa ny tanan''i Jehovah efa nahinjiny hamely ahy.'
mg1865::mg_8::1::14:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy nanandratra ny feony indray izy roa vavy ka nitomany; ary Orpa dia nanoroka ny rafozani-vavy, fa Rota kosa nifikitra taminy ihany.'
mg1865::mg_8::1::15:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Indro ny rahavavinao lasa nody ho any amin''ny fireneny sy ny andriamaniny ka mba miverena ianao koa hanaraka ny rahavavinao.'
mg1865::mg_8::1::16:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Rota: Aza manery ahy handao anao sy hiala amin''ny fanarahana anao; fa izay alehanao no halehako ary izay itoeranao no hitoerako, ny firenenao no ho fireneko, ary ny Andriamanitrao no ho Andriamanitro;'
mg1865::mg_8::1::17:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay tany hahafatesanao no hahafatesako, sady any koa no handevenana ahy; hataon''i Jehovah amiko anie izany, eny mihoatra noho izany aza, raha tsy ny fahafatesana ihany no hampisaraka antsika.'
mg1865::mg_8::1::18:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitany fa mbola mikikitra homba azy ihany Rota, dia nitsahatra tsy niteny taminy intsony izy.'
mg1865::mg_8::1::19:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha izy mianaka mandra-pahatongany tany Betlehema. Ary rehefa tonga tany Betlehema izy, dia taitra taminy ny tanàna rehetra, ka hoy ny vehivavy hoe: Naomy va re ity?'
mg1865::mg_8::1::20:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy taminy: Aza atao hoe Naomy* intsony aho, fa ataovy hoe Mara**, satria mangidy indrindra ny nataon''ny Tsitoha amiko. [*Naomy = Mahafinaritra] [**Mara = Mangidy]'
mg1865::mg_8::1::21:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nivoaka nanam-be aho, fa ampodin''i Jehovah tsy manana na inona na inona. Nahoana aho no ataonareo hoe Naomy, fa Jehovah efa nitsangan-ko fahavaloko, ary ny Tsitoha efa nampahory ahy?'
mg1865::mg_8::1::22:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina Naomy, ary Rota, vehivavy Moabita, vinantoni-vavy. nomba azy tamin''izy niverina avy tany amin''ny tany Moaba; dia tonga tao Betlehema izy tamin''ny niandohan''ny taom-pijinjana ny vary hordea.'
mg1865::mg_8::2::1:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsimponan''i Rota salohim-bary teny an-tanimbarin''i Boaza, sy ny soa nataon''i Boaza taminy'
  verse_text: 'Ary nisy havan''ny vadin''i Naomy avy amin''ny fokon''i Elimeleka, lehilahy mpanjatobe, Boaza no anarany.'
mg1865::mg_8::2::2:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Rota, vehivavy Moabita, tamin''i Naomy: Aoka aho hankany an-tsaha mba hitsimpona salohim-bary eo aorian''izay hahitako fitia eo imasony. Dia hoy izy taminy: Andeha ary, anaka.'
mg1865::mg_8::2::3:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nandeha izy ka nitsimpona tany an-tsaha teo aorian''ny mpijinja; ary sendra tonga tany amin''ny tanimbarin''i Boaza, izay avy amin''ny fokon''i Elimeleka, izy.'
mg1865::mg_8::2::4:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Boaza tonga avy tany Betlehema ka niteny tamin''ny mpijinja hoe: Jehovah anie ho aminareo. Dia hoy kosa Ireo taminy: Hitahy anao anie Jehovah.'
mg1865::mg_8::2::5:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Boaza tamin''ny zatovony, izay nitandrina ny mpijinja: Zanak''iza moa io zazavavy io?'
mg1865::mg_8::2::6:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ilay zatovo nitandrina ny mpijinja ka nanao hoe: Zazavavy Moabita, izay niverina nomba an''i Naomy avy tany amin''ny tany Moaba io;'
mg1865::mg_8::2::7:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hoy izy: Masïna ianao aoka aho hitsimpona sy hanangona eo aorian''ny mpijinja eny anelanelan''ny amboara; dia tonga izy ka nijanona teto hatramin''ny maraina ka mandraka ankehitriny; kely foana no nitoerany tao an-trano.'
mg1865::mg_8::2::8:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Boaza tamin''i Rota: Tsy mandre va ianao, anaka? Aza mandeha hitsimpona any an-tanimbary hafa na miala eto ianao, fa mitoera eto anilan''ny zatovovavy.'
mg1865::mg_8::2::9:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny masonao ho amin''ny tanimbary izay jinjany, ka manaraha eo aoriany ianao: tsy efa nodidiako va ny zatovo tsy haninona anao? Ary raha mangetaheta ianao, mankanesa eroa amin''ny siny, ka misotroa amin''izay antsakain''ny zatovo.'
mg1865::mg_8::2::10:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niondrika sy niankohoka tamin''ny tany Rota ka nanao taminy hoe: Ahoana no mba ahitako fitia eto imasonao sy itsinjovanao ahy, nefa vahiny ihany aho?'
mg1865::mg_8::2::11:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Boaza ka nanao taminy hoe: Efa reko tsara izay rehetra nataonao tamin''ny rafozanao-vavy hatrizay nahafatesan''ny vadinao sy ny nahafoizanao ny rainao sy ny reninao mbamin''ny tany nahaterahanao sy nankanesanao aty amin''ny firenena tsy mbola fantatrao.'
mg1865::mg_8::2::12:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamaly ny nataonao anie Jehovah. ka homen''i Jehovah, Andriamanitry ny Isiraely, valim-pitia lehibe anie ianao, satria avy hialoka eo ambanin''ny elany ianao.'
mg1865::mg_8::2::13:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Aoka hahita fitia eo imasonao aho, tompokolahy; fa efa nampifaly ahy ianao, ary efa niteny mora tamin''ny zatovovavinao, na dia tsy tahaka ny anankiray amin''ny zatovovavinao aza aho.'
mg1865::mg_8::2::14:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga ny fotoam-pisakafoana, dia hoy Boaza taminy: Mankanesa aty, ka mihinàna mofo, ary atsobohy amin''ny vinaingitra ny sombi-mofonao. Dia nipetraka teo anilan''ny mpijinja izy; ary nangalan-dralehilahy lango izy, dia nihinana ka voky, ary nisy sisa tsy laniny aza.'
mg1865::mg_8::2::15:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitsangana hitsimpona izy, dia nodidian''i Boaza ny ankizilahiny hoe: Aoka izy hitsimpona na dia eny anelanelan''ny amboara aza, ka aza maninona azy.'
mg1865::mg_8::2::16:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary asio latsadatsaka avy amin''ny amboara, ka avelao ireny hotsimponiny, fa aza raràna izy.'
mg1865::mg_8::2::17:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsimpona tany an-tsaha mandra-paharivan''ny andro Rota, dia nively izay efa voatsimpony, ka nisy vary hordea tokony ho iray efaha.'
mg1865::mg_8::2::18:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny izany, ka nankany an-tanàna izy, ary hitan''ny rafozani-vavy izay efa voatsimpony; ary navoakany koa ilay sisa tsy laniny tamin''ny nisakafoany ka nomeny ny rafozany.'
mg1865::mg_8::2::19:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny rafozanivavy taminy: Taiza no nitsimponanao androany, ary taiza no nanaovanao? Hotahina anie izay nitsinjo anao. Dia nambarany tamin''ny rafozani-vavy izay efa nitsimponany ka hoy izy: Boaza no anaran''ny lehilahy, izay tompon''ny tanimbary nitsimponako androany'
mg1865::mg_8::2::20:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Naomy tamin''ny vinantonivavy: Hotahin''i Jehovah anie izay tsy nitsahatra hanao soa amin''ny velona sy ny maty. Ary hoy koa Naomy taminy: Havantsika akaiky ihany ralehilahy, ka isan''izay mahavotra antsika izy.'
mg1865::mg_8::2::21:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Rota, vehivavy Moabita: Izao koa no nataony tamiko: Mitoera tsara eo anilan''ny zatovoko ianao mandra-pahatapitry ny fijinjana.'
mg1865::mg_8::2::22:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Naomy tamin''i Rota vinantoni-vavy: Tsara izany, anaka, raha miara-mivoaka amin''ny ankizivavy ianao, fandrao hisy haninona anao raha any an-tsaha hafa.'
mg1865::mg_8::2::23:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy tsy nety nisaraka tamin''ny zatovovavin''i Boaza, fa nitsimpona mandra-pahatapitry ny fijinjana ny vary hordea sy ny vary tritika; ary nitoetra tao amin''ny rafozani-vavy Izy.'
mg1865::mg_8::3::1:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nangatahan''i Rota an''i Boaza hitondra loloha azy araka ny hevitra natoron''i Naomy'
  verse_text: 'Dia hoy Naomy rafozani-vavy taminy: Tsy hitady izay tokan-trano hahitanao fiadanana va aho, anaka, mba hahasoa anao?'
mg1865::mg_8::3::2:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny tsy isan''ny havantsika va Boaza, tompon''ny ankizivavy izay niarahanao? Indro, mikororoka vary hordea eo am-pamoloana izy anio alina.'
mg1865::mg_8::3::3:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mandroa sy mihosora diloilo ary miakanjoa, dia midìna any am-pamoloana; nefa aza atao fanta-dralehilahy akory ianao, raha tsy efa avy nihinana sy nisotro izy.'
mg1865::mg_8::3::4:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mandry izy, dia fantaro izay andriany, ary midira, ka songay ny lamba eo an-tongony, dia mandria eo ianao; ary holazainy aminao izay hataonao.'
mg1865::mg_8::3::5:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Eny, fa hataoko izay rehetra lazainao amiko.'
mg1865::mg_8::3::6:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina tany am-pamoloana izy ka nanao araka izay rehetra nandidian''ny rafozani-vavy azy.'
mg1865::mg_8::3::7:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa avy nihinana sy nisotro Boaza, ka faly ny fony, dia nandeha handry teo amin''ny faran''ny antontam-bary izy; fa nandeha nitsaitsaika kosa Rota, dia nanonga ny lamba teo an-tongony ka nandry teo.'
mg1865::mg_8::3::8:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony namatonalina, dia taitra ralehilahy ka niarina hitsapa, ary, indro, nisy vehivavy nandry teo an-tongony.'
mg1865::mg_8::3::9:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Iza moa izato? Ary hoy kosa ravehivavy: Rota zatovovavinao aho; mba rakofy ny lambanao ny zatovovavinao, fa havana mahavotra ianao.'
mg1865::mg_8::3::10:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Hotahin''i Jehovah anie ianao, anaka; efa nanao soa be lavitra tamin''ny ato aoriana ianao noho ny tamin''ny voalohany, noho ny tsy nanarahanao ny zatovo, na ny malahelo, na ny manan-karena.'
mg1865::mg_8::3::11:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny anaka, aza matahotra; hataoko aminao izay rehetra angatahinao; fa fantatr''izay rehetra ao an-tanànan''ny fireneko fa vehivavy tsara ianao.'
mg1865::mg_8::3::12:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny marina izany, fa havana mahavotra aho; nefa misy havana mahavotra akaiky kokoa noho izaho.'
mg1865::mg_8::3::13:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitoera ihany aty anio alina, ary rehefa maraina, raha hitondra loloha anao izy, dia tsara izany, aoka izy no hitondra loloha anao; fa raha tàhiny kosa tsy hanao izany izy, dia ho entiko loloha ihany ianao, raha velona koa Jehovah, mitoera ihany aty mandra-pahamarain''ny andro.'
mg1865::mg_8::3::14:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandry teo an-tongony mandra-pahamarain''ny andro Rota, ary nifoha, raha mbola maizimaizina, ilay mbola tsy ahitana tarehy iny. Fa hoy ralehilahy: Aza avela ho fantatr''olona fa taty am-pamoloana ravehivavy.'
mg1865::mg_8::3::15:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy koa izy: Ento ety ny lamba itafianao, ka hazony izy. Ary rehefa nataony izany, dia namatra vary hordea inenin''ny famarana Boaza, ka nampitondrainy azy izany. Dia lasa nankany an-tanàna Boaza.'
mg1865::mg_8::3::16:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany amin''ny rafozani-vavy Rota, dia hoy Naomy: Nanao ahoana izay tany, anaka? Dia nambarany azy izay rehetra nataon-dralehilahy taminy.'
mg1865::mg_8::3::17:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy: Ireto vary hordea inenin''ny famarana ireto dia nomeny ahy; fa hoy izy tamiko: Aza mandeha tsy mitondra zavatra ho any amin''ny rafozanao-vavy.'
mg1865::mg_8::3::18:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Mitoera ihany, anaka, mandra-pahafantatrao izay hiantefan''ny raharaha; fa tsy hijanona ralehilahy, fa hovitainy anio ihany ny raharaha.'
mg1865::mg_8::4::1:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampakaran''i Boaza an''i Rota, sy ny nahaterahan''i Obeda, ary ny filazam-pirazanana hatramin''i Fareza ka hatramin''i Davida'
  verse_text: 'Ary rehefa tafakatra teo am-bavahady Boaza ka nipetraka teo, dia, indro, nandalo ilay havana mahavotra voalazany, dia hoy Boaza: Ranona iry o! maitia kely ange; mipetraha eto. Dia nanatona izy ka nipetraka.'
mg1865::mg_8::4::2:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka folo lahy tamin''ny loholona tao an-tanàna Boaza ka nanao hoe: Mipetraha eto ianareo. Dia nipetraka ireo.'
mg1865::mg_8::4::3:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''Ilay havana akaiky izy ka nanao hoe: Naomy, izay niverina avy tany amin''ny tany Moaba, dia mivarotra ny tany izay an''i Elimeleka rahalahintsika.'
mg1865::mg_8::4::4:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho nikasa hampandre anao hoe: Vidio eto anatrehan''izay mipetraka eto sy eto anatrehan''ny loholona amin''ny fireneko izany. Raha hanavotra ianao, dia avoty; fa raha tàhiny tsy hanavotra ianao, dia lazao amiko mba ho fantatro; fa tsy misy tokony hanavotra afa-tsy ianao, ary izaho no manarakaraka anao. Ary hoy izy: Hanavotra ihany aho.'
mg1865::mg_8::4::5:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Boaza: Amin''izay andro ividiananao ny tany amin''ny tanan''i Naomy, dia amin''i Rota koa, vehivavy Moabita, vadin''ny maty, no hividiananao azy, mba hamelo-maso ny anaran''ny maty ao amin''ny lovany ianao.'
mg1865::mg_8::4::6:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ilay havana mahavotra: Tsia, tsy mahazo manavotra ho an''ny tenako aho, fandrao mahasimba ny lovako; avoty ihany ho anao ny ahy, fa tsy mahavotra aho.'
mg1865::mg_8::4::7:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny fanavotana sy ny fanakalozana teo amin''ny Isiraely fahiny hahamafy ny teny rehetra dia izao: nesorin''ny lehilahy ny kirarony ka nomeny ho an''ny namany; dia vavolombelona teo amin''ny Isiraely izany.'
mg1865::mg_8::4::8:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay havana mahavotra tamin''i Boaza: Vidio ho anao izany. Dia nanaisotra ny kirarony izy.'
mg1865::mg_8::4::9:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Boaza tamin''ny loholona sy ny vahoaka rehetra: Ianareo no vavolombelona androany fa efa novidiko tamin''ny tanan''i Naomy izay rehetra an''i Elimeleka sy izay rehetra an''i Kiliona sy Malona.'
mg1865::mg_8::4::10:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rota koa, vehivavy Moabita, vadin''i Malona, dia lasako ho vadiko hamelo-maso ny anaran''ny maty ao amin''ny lovany, mba tsy ho faty maso ny anaran''ny maty eo amin''ny rahalahiny sy eo amin''ny vavahadin''ny fonenany; ianareo no vavolombelona androany.'
mg1865::mg_8::4::11:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny vahoaka rehetra izay teo amin''ny vavahady sy ny loholona: Eny, vavolombelona izahay; hataon''i Jehovah tahaka an''i Rahely sy tahaka an''i Lea anie izay vehivavy efa ho tonga ao an-tranonao; fa izy roa vavy no nanangana ny tranon''ny Isiraely; ary aoka ho lehibe any Efrata anie ianao, ary halaza any Betlehema anie ny anaranao;'
mg1865::mg_8::4::12:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho tahaka ny taranak''i Fareza, izay naterak''i Tamara tamin''i Joda, anie ny taranakao avy amin''ny zanaka izay homen''i Jehovah anao amin''ity vehivavy ity.'
mg1865::mg_8::4::13:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Boaza dia nampakatra an''i Rota ka nanambady azy; ary Jehovah nampanan''anaka azy, ka niteraka zazalahy izy.'
mg1865::mg_8::4::14:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo vehivavy tamin''i Naomy: Isaorana anie Jehovah, Izay tsy namela anao androany tsy hanan-kavana mahavotra, ary aoka halaza ny anarany eo amin''ny Isiraely.'
mg1865::mg_8::4::15:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hamelona ny ainao sy hitaiza anao izy, rehefa antitra ianao; fa niteraka azy ny vinantonaovavy, izay tia anao, ilay tsara lavitra aminao mihoatra noho ny zanaka fito lahy.'
mg1865::mg_8::4::16:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandray ny zaza Naomy ka nitrotro azy, dia tonga mpitaiza azy.'
mg1865::mg_8::4::17:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vehivavy namany nifidy ny anarany ka nanao hoe: Misy zazalahy teraka ho an''i Naomy; ary ny anarany nataony hoe Obeda; izy no rain''i Jese, rain''i Davida.'
mg1865::mg_8::4::18:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no taranak''i Fareza: Fareza niteraka an''i Hezrona;'
mg1865::mg_8::4::19:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hezrona niteraka an''i Rama; ary Rama niteraka an''i Aminadaba;'
mg1865::mg_8::4::20:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Aminadaba niteraka an''i Nasona; ary Nasona niteraka an''i Salmona;'
mg1865::mg_8::4::21:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Salmona niteraka an''i Boaza; ary Boaza niteraka an''i Obeda;'
mg1865::mg_8::4::22:
  verse_version: mg1865
  verse_book: mg_8
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Obeda niteraka an''i Jese; ary Jese niteraka an''i Davida.'
