mg1865::mg_58::1::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampitahana an''i Kristy sy ny anjely'
  verse_text: 'Rehefa nampitenenin''Andriamanitra tamin''ny razana fahiny ny mpaminany tamin''ny andro samy hafa sy ny fanao samy hafa;'
mg1865::mg_58::1::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia amin''izao andro farany izao kosa no nampitenenany tamintsika ny Zanany, Izay voatendriny ho Mpandova ny zavatra rehetra; Izy no nahariany izao tontolo izao,'
mg1865::mg_58::1::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy koa no famirapiratan''ny voninahiny sy endriky ny tenany indrindra ary mihazona ny zavatra rehetra amin''ny herin''ny teniny; ary rehefa nanao fanadiovana hahafaka ny fahotana Izy, dia nipetraka teo amin''ny tanana ankavanan''ny Lehibe any amin''ny avo'
mg1865::mg_58::1::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka natao tsara noho ny anjely, araka ny nandovany anarana tsara noho ireny.'
mg1865::mg_58::1::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa anjely iza no mba nilazany hoe: "Zanako Ianao, Izaho niteraka Anao androany"? (Salamo 2:7). Ary koa: "Izaho ho Rainy, Ary Izy ho Zanako"? (II Samoela 7:14.)'
mg1865::mg_58::1::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mitondra ny Lahimatoa ho amin''izao fiainana izao indray, dia hoy Izy: "Ary aoka ny anjelin''Andriamanitra rehetra hiankohoka eo anoloany" (Salamo 97:7).'
mg1865::mg_58::1::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely dia ilazany hoe: "Izy manao ny anjeliny ho rivotra, Ary ny mpanompony ho lelafo" (Salamo 104:4).'
mg1865::mg_58::1::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanaka kosa dia nilazany hoe: "Ny seza fiandriananao, Andriamanitra o, dia mandrakizay doria; Ary ny tehim-pahitsiana no tehim-panjakanao;'
mg1865::mg_58::1::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tianao ny fahamarinana, fa halanao ny heloka; Koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana Anao Mihoatra noho ny namanao" (Salamo 45:6-7).'
mg1865::mg_58::1::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao koa: "Ianao, Jehovah o, tany aloha no nanorenanao ny tany, Ary asan''ny tananao ny lanitra;'
mg1865::mg_58::1::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia ho levona, fa Ianao no maharitra; Ary izy rehetra ho rovitra toy ny fitafiana,'
mg1865::mg_58::1::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny lamba no hamalonanao azy, Dia toy ny fitafiana, ka hovana izy; Fa Ianao no tsy miova, Ary ny taonanao no tsy ho tapitra" (Salamo 102:25-27).'
mg1865::mg_58::1::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa anjely iza no mba nilazany hoe: "Mipetraha eo an-tanako ankavanana, Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao"? (Salamo 110:1.)'
mg1865::mg_58::1::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fanahy manompo* va izy rehetra, nirahina hanao fanompoana ho an''izay handova famonjena? [*Na: manao fanompoam-pivavahana]'
mg1865::mg_58::2::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia tokony hotandremantsika mafimafy kokoa izay efa rentsika, fandrao hindaosina hiala aminy isika.'
mg1865::mg_58::2::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mafy ny teny izay nampilazaina ny anjely, ka samy voavaly marina avokoa ny fahadisoana rehetra mbamin''ny fahotana,'
mg1865::mg_58::2::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'hataontsika ahoana no fandositra, raha tsy mitandrina izao famonjena lehibe izao isika? dia ilay nampilazaina ny Tompo tamin''ny voalohany, ary nohamafin''izay nandre tamintsika kosa,'
mg1865::mg_58::2::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady Andriamanitra koa no niara-nanambara taminy tamin''ny famantarana sy ny fahagagana ary tamin''ny asa lehibe samy hafa sy ny fanomezana ny Fanahy Masina nozarazarainy araka ny sitrapony.'
mg1865::mg_58::2::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy anjely no nampanekeny ny fiainana ho avy, izay lazainay.'
mg1865::mg_58::2::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny anankiray nanambara eo amin''ny teny iray hoe: "Inona ny olona, no ahatsiarovanao azy? Ary ny zanak''olombelona, no amangianao azy?'
mg1865::mg_58::2::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataonao ambany kely* noho ny anjely izy; Efa nosatrohanao voninahitra sy fiandrianana izy, Ary nampanjakainao amin''ny asan''ny tananao; [*Na: vetivety]'
mg1865::mg_58::2::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: '2022-12-11T07:12:23+0000'
  verse_title: null
  verse_text: 'Ny zavatra rehetra dia efa nampanekenao ho eo ambanin''ny tongony" (Salamo 8:4-6). Fa tamin''ny nampanekeny azy ny zavatra rehetra, dia tsy nisy izay tsy nampanekeny azy. Nefa ankehitriny tsy mbola hitantsika fa efa ampanekena azy ny zavatra rehetra.'
mg1865::mg_58::2::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ilay natao ambany kely* noho ny anjely no hitantsika, dia Jesoa, ary noho ny fitondrany ny fahafatesana dia voasatroka voninahitra aman-daza Izy, mba hanandrana fahafatesana hamonjy ny olona rehetra noho ny fahasoavan''Andriamanitra. [*Na: vetivety]'
mg1865::mg_58::2::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miendrika Izay anton''ny nanaovana ny zavatra rehetra sady nahariana ny zavatra rehetra, raha mitondra zanaka maro ho any amin''ny voninahitra, ny hahatanteraka ny Tompon''ny famonjena ireo amin''ny fahoriana.'
mg1865::mg_58::2::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iray no nihavian''izy roroa, na Izay manamasina, na izay hamasinina; koa izany no tsy mahamenatra Azy hanao ireo hoe "rahalahy"'
mg1865::mg_58::2::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manao hoe: "Hitory ny anaranao amin''ny rahalahiko Aho; Eo amin''ny fiangonana* no hiderako Anao" (Salamo 22:22). [*Grika: eklesia]'
mg1865::mg_58::2::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa: "Izaho hatoky Azy". Ary indray koa: "Indreto Izaho sy ireo zaza nomen''Andriamanitra Ahy" (Isaia 8:27-18).'
mg1865::mg_58::2::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa satria manana nofo aman-drà ny zaza, dia mba nandray izany koa Izy, mba handringanany amin''ny fahafatesana ilay manana ny herin''ny fahafatesana, dia ny devoly,'
mg1865::mg_58::2::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hanafahany izay rehetra nandany ny fiainany rehetra tamin''ny fahandevozana noho ny tahotra ny fahafatesana.'
mg1865::mg_58::2::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hita marina fa tsy anjely no vonjeny, fa ny taranak''i Abrahama no vonjeny.'
mg1865::mg_58::2::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany dia miendrika mba hatao tahaka ny rahalahiny amin''ny zavatra rehetra Izy, mba ho Mpisoronabe mamindra fo sy mahatoky ny amin''Andriamanitra, mba hanaovany fanavotana noho ny heloky ny olona.'
mg1865::mg_58::2::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa satria nalaim-panahy ny tenany tamin''ny fahoriana nentiny*, dia mahavonjy izay alaim-panahy koa Izy. [*Na: satria nijaly ny tenany, raha nalaim-panahy izy]'
mg1865::mg_58::3::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampitahana an''i Kristy sy Mosesy'
  verse_text: 'Koa amin''izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, hevero ny Apostoly sy Mpisoronabe Izay ekentsika, dia Jesoa,'
mg1865::mg_58::3::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahatoky ny nanendry Ary, tahaka an''i Mosesy koa tao amin''ny tranon''Andriamanitra rehetra*. [*Izahao Nomery 12:7]'
mg1865::mg_58::3::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy dia natao miendrika hanam-boninahitra noho Mosesy, araka ny ananan''ny mpanao trano voninahitra bebe kokoa noho ny trano nataony.'
mg1865::mg_58::3::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa Izay nanao ny zavatra rehetra kosa dia Andriamanitra.'
mg1865::mg_58::3::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia mpanompo nahatoky tao amin''ny tranon''Andriamanitra rehetra, ho fanambarana izay zavatra mbola holazaina;'
mg1865::mg_58::3::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Kristy kosa dia Zanaka manapaka ny tranon''Andriamanitra; ary isika no tranony, raha hazonintsika mafy hatramin''ny farany ny fahasahiana sy ny firavoravoana momba ny fanantenana.'
mg1865::mg_58::3::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa araka izay lazain''ny Fanahy Masina hoe: "Anio, raha hihaino ny feony ianareo,'
mg1865::mg_58::3::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manamafy ny fonareo tahaka ny tamin''ny fahasosorana, tamin''ny andro fakam-panahy tany an''efitra,'
mg1865::mg_58::3::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nakan''ny razanareo fanahy Ahy tamin''ny nizahany toetra Ahy, Ary nahita ny asako efa-polo taona izy.'
mg1865::mg_58::3::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tezitra tamin''izany taranaka izany Aho Ka nanao hoe: Ireo dia maniasia amin''ny fony mandrakariva Ka tsy nahalala ny lalako;'
mg1865::mg_58::3::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izany no nianianako tamin''ny fahatezerako hoe: Tsy hiditra amin''ny fitsaharako mihitsy izy" (Salamo 95:7-11).'
mg1865::mg_58::3::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo, ry rahalahy, fandrao hisy aminareo hanana fo ratsy tsy mino ka hiala amin''Andriamanitra velona;'
mg1865::mg_58::3::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mifananara isan''andro, raha mbola atao hoe "Anio"; fandrao hisy aminareo ho tonga mafy fo noho ny famitahan''ny ota.'
mg1865::mg_58::3::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa tonga mpiombona amin''i Kristy isika, raha mihazona mafy ny fiandohan''ny fahatokiantsika hatramin''ny farany;'
mg1865::mg_58::3::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha atao hoe: "Anio, raha hihaino ny feony ianareo, Aza manamafy ny fonareo tahaka ny tamin''ny fahasosorana." (Salamo 95:7-8).'
mg1865::mg_58::3::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa no nahatezitra Azy, rehefa nandre? Tsy izay rehetra nentin''i Mosesy niala tany Egypta va?'
mg1865::mg_58::3::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no nahatezitra Azy efa-polo taona? Tsy izay nanota va, ka dia niampatrampatra tany an''efitra ny fatiny?'
mg1865::mg_58::3::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no nianianany fa tsy hiditra any amin''ny fitsaharany, afa-tsy izay tsy nanaiky?'
mg1865::mg_58::3::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsy finoany.'
mg1865::mg_58::4::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia mbola misy teny fikasana fa hiditra any amin''ny fitsaharany aza isika, dia aoka isika hatahotra, fandrao mba misy eo aminareo toa tsy mahatratra izany.'
mg1865::mg_58::4::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika koa dia nitoriana filazantsara tahaka ireny ihany; kanefa ny teny izay efa reny dia tsy nahasoa azy, satria tsy niharo finoana tao amin''izay nandre*. [*Na: satria tsy nampiraisin''ny finoana tamin''izay nandre izy]'
mg1865::mg_58::4::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika izay nino no miditra amin''izany fitsaharana izany, araka ny voalazany hoe: "Toy ny nianiako tamin''ny fahatezerako hoe: Tsy hiditra amin''ny fitsaharako mihitsy izy" (Salamo 95:11), na dia vita hatramin''ny nanorenana izao tontolo izao aza ny asa.'
mg1865::mg_58::4::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nilaza ny andro fahafito Izy eo amin''ny teny anankiray araka izao: "Ary Andriamanitra nitsahatra tamin''ny asany rehetra tamin''ny andro fahafito" (Genesisy 2:3).'
mg1865::mg_58::4::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izao koa: "Tsy hiditra amin''ny fitsaharako mihitsy izy" (Salamo 95:11].'
mg1865::mg_58::4::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa satria mbola hiditra eo ihany ny sasany, ary izay nitoriana filazantsara tamin''ny voalohany dia tsy niditra noho ny tsy finoana,'
mg1865::mg_58::4::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mametra andro anankiray indray Izy, na dia efa ela toy izany aza, milaza ao amin''i Davida hoe: "Anio", araka ny voalaza teo hoe: "Anio, raha hihaino ny feony ianareo Aza manamafy ny fonareo" (Salamo 95:7-8)'
mg1865::mg_58::4::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha Josoa no nanome azy fitsaharana, dia tsy mba ho nilaza andro hafa Izy tao aorian''izany.'
mg1865::mg_58::4::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia mbola misy sabata fitsaharana ho an''ny olon''Andriamanitra.'
mg1865::mg_58::4::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay niditra tao amin''ny fitsaharany, dia Izy* koa no nitsahatra tamin''ny asany, tahaka an''Andriamanitra tamin''ny Azy. [*Na: izy]'
mg1865::mg_58::4::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka isika hazoto hiditra amin''izany fitsaharana izany, fandrao hisy olona latsaka amin''ny tsy finoana tahaka izany koa.'
mg1865::mg_58::4::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa velona sy mahery ny tenin''Andriamanitra ka maranitra noho ny sabatra roa lela, ka manindrona hatramin''ny fampisarahana ny aina sy ny fanahy ary ny tonona sy ny tsoka, ka mahay mamantatra ny eritreritra sy ny fisainan''ny fo.'
mg1865::mg_58::4::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy zavatra ary na inona na inona izay tsy miseho eo anatrehany; fa ny zavatra rehetra dia mihanjahanja sy aharihary eo imason''izay iafaran''ny ataontsika.'
mg1865::mg_58::4::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Fampitahana an''i Kristy sy ny mpisoronabe'
  verse_text: 'Koa satria Isika manana Mpisoronabe lehibe, Izay lasa namaky ny lanitra, dia Jesoa, Zanak''Andriamanitra, aoka isika hihazona ilay efa nekentsika.'
mg1865::mg_58::4::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika tsy manana mpisoronabe izay tsy mahay miara-mitondra ny fahalementsika, fa Izay efa nalaim-panahy tamin''ny zavatra rehetra tahaka antsika, kanefa tsy nanana ota.'
mg1865::mg_58::4::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka isika hanatona ny seza fiandrianan''ny fahasoavana amin''ny fahasahiana, mba hahazoantsika famindram-po sy hahitantsika fahasoavana ho famonjena amin''izay andro mahory*. [*Grika: tandrifin''izany]'
mg1865::mg_58::5::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpisoronabe rehetra dia alaina amin''ny olona ka tendrena ho solon''ny olona hanao ny raharahan''Andriamanitra, hanatitra fanomezana sy fanatitra hanafaka ota,'
mg1865::mg_58::5::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona izay mahay mitondra mora ny tsy mahalala sy ny mania, satria ny tenany koa dia mba hodidinin''ny fahalemena ihany;'
mg1865::mg_58::5::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary noho izany dia tsy maintsy hanao fanatitra hanafaka ota ho an''ny tenany koa izy, toy ny ataony ho an''ny olona ihany.'
mg1865::mg_58::5::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy maka izany voninahitra izany ho an''ny tenany afa-tsy izay antsoin''Andriamanitra, tahaka an''i Arona.'
mg1865::mg_58::5::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany koa Kristy: tsy Izy no nanandratra ny tenany ho Mpisoronabe, fa Ilay nanao taminy hoe: "Zanako Ianao, Izaho niteraka Anao androany" (Salamo 2:7)'
mg1865::mg_58::5::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary toy ny lazainy eo amin''ny teny hafa koa hoe: "Ianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka" (Salamo 110:4).'
mg1865::mg_58::5::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andron''ny nofony, raha nanao* fivavahana sy fangatahana nomban''ny fitarainana mafy sy ny ranomaso be tamin''izay nahavonjy Azy tamin''ny fahafatesana Izy, sady voahaino noho ny fahatahorany an''Andriamanitra**, [*Grika: nanatitra] [** Na: voahaino ka afaka tamin''ny fahatahorany]'
mg1865::mg_58::5::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nianatra fanarahana tamin''izay fahoriana nentiny Izy, na dia Zanaka aza;'
mg1865::mg_58::5::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa natao tanteraka Izy, dia tonga loharanon''ny famonjena mandrakizay ho an''izay rehetra manaraka Azy,'
mg1865::mg_58::5::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa notononin''Andriamanitra hoe Mpisoronabe "araka ny fanaon''i Melkizedeka."'
mg1865::mg_58::5::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Anatra sy famporisihana hampandroso tsara ny olona'
  verse_text: 'Ny amin''izany dia manana teny maro izahay sady sarotra ambara, satria lalodalovana ny sofinareo.'
mg1865::mg_58::5::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia tokony ho efa mpampianatra aza ianareo noho ny fahelan''ny andro, dia mbola mila izay hampianatra anareo ny abidim-pianaran''ny tenin''Andriamanitra indray; ary efa toy izay tokony homen-dronono ianareo, fa tsy ventin-kanina.'
mg1865::mg_58::5::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra mivelona amin''ny ronono dia tsy zatra amin''ny tenin''ny fahamarinana, satria mbola zaza-bodo.'
mg1865::mg_58::5::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho an''izay efa lehibe* ny ventin-kanina, dia ho an''izay manana ny saina efa zatra nampiasaina tsara ka mahay manavaka ny tsara sy ny ratsy. [*Na: tanteraka]'
mg1865::mg_58::6::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka hilaozantsika ny abidim-pianarana ny amin''i Kristy, fa aoka handroso ho amin''ny tanteraka isika ka tsy hanao fanorenana indray, dia fibebahana hahafahana amin''ny asa maty sy finoana an''Andriamanitra,'
mg1865::mg_58::6::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary fampianarana ny amin''ny fisasana maro sy ny fametrahan-tanana, ary ny fitsanganan''ny maty sy ny fitsarana mandrakizay.'
mg1865::mg_58::6::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no hataontsika, raha avelan''Andriamanitra.'
mg1865::mg_58::6::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay efa nohazavaina indray mandeha sady efa nanandrana ny fanomezana avy any an-danitra sy efa nandray ny Fanahy Masina'
mg1865::mg_58::6::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa nanandrana ny teny tsaran''Andriamanitra sy ny herin''ny fiainana ho avy,'
mg1865::mg_58::6::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa nihemotra, dia tsy azo havaozina indray ho amin''ny fibebahana, satria manombo ny Zanak''Andriamanitra indray amin''ny hazo fijaliana ka manao Azy ho fahamenarana.'
mg1865::mg_58::6::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tany mifoka ny ranonorana milatsaka aminy matetika ka maniry anana tsara ho an''ny olona iasana azy dia mahazo fitahiana avy amin''Andriamanitra;'
mg1865::mg_58::6::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay maniry tsilo sy songosongo kosa dia lavina sady akaikin''ny ozona, ary ny hiafarany dia ny hodorana.'
mg1865::mg_58::6::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa, ry malala, na dia miteny izany aza izahay, dia manantena zavatra tsara ny aminareo, dia izay momba ny famonjena.'
mg1865::mg_58::6::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra tsy mba tsy marina hanadino ny asanareo sy ny fitiavana izay nasehonareo ho voninahitry ny anarany, raha nanompo ny olona masina ianareo sady mbola manompo ihany.'
mg1865::mg_58::6::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola irinay ianareo rehetra samy haneho izany fahazotoana izany mba hahazo ny fahatokiana be ny amin''ny fanantenana hatramin''ny farany;'
mg1865::mg_58::6::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hiketraka ianareo, fa hanahaka ireo mandova araka ny teny fikasana amin''ny finoana sy ny faharetana.'
mg1865::mg_58::6::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra nanao teny fikasana tamin''i Abrahama ary satria tsy nisy lehibe noho ny tenany izay azony nianianana, dia nianiana tamin''ny tenany Izy'
mg1865::mg_58::6::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: "Hitahy anao tokoa Aho ary hahamaro dia hahamaro anao" (Genesisy 22:17).'
mg1865::mg_58::6::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izany, rehefa naharitra tsara Abrahama, dia nahazo ny teny fikasana.'
mg1865::mg_58::6::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona dia mianiana amin''izay lehibe noho ny tenany; ary ny fianianana dia ataony mba hahamafy ny teny hampitsahatra ny fifandirana rehetra.'
mg1865::mg_58::6::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, raha Andriamanitra ta-haneho kokoa amin''ny mpandova araka ny teny fikasana ny tsy fiovan''ny sitrapony, dia nataony mafy tamin''ny fianianana izany,'
mg1865::mg_58::6::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho zavatra roa loha tsy mety miova, izay tsy hain''Andriamanitra andaingana, no hahazoantsika famporisihana mafy, dia isika izay nandositra hihazona ny fanantenana napetraka eo anoloantsika,'
mg1865::mg_58::6::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay ananantsika ho vatofantsiky ny aina sady mafy no tsy mihetsika ary miditra any anatin''ny efitra lamba;'
mg1865::mg_58::6::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'tany no nidiran''i Jesoa ho Mpialoha antsika, rehefa tonga Mpisoronabe "mandrakizay araka ny fanaon''i Melkizedeka" Izy.'
mg1865::mg_58::7::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampitahana an''i Kristy sy Melkizedeka'
  verse_text: 'Fa io Melkizedeka io, izay mpanjakan''i Salema sy mpisoron''Andriamanitra Avo Indrindra, ilay nitsena an''i Abrahama, rehefa niverina avy nandresy ny mpanjaka maro izy ka nitso-drano azy,'
mg1865::mg_58::7::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nomen''i Abrahama ny ampahafolon''ny zavatra rehetra aza (voalohany, raha adika ny anarany, dia Mpanjakan''ny fahamarinana, dia vao Mpanjakan''i Salema koa, izany hoe: Mpanjakan''ny fiadanana;'
mg1865::mg_58::7::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy manan-dray, tsy manan-dreny, tsy manana tantaram-pirazanana, tsy manana voalohan''andro na faran''ny fiainana, fa natao tahaka ny Zanak''Andriamanitra),- izy dia mitoetra ho mpisorona mandrakariva.'
mg1865::mg_58::7::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hevero ny halehiben''io lehilahy io -, izay nomen''i Abrahama patriarka ny ampahafolon''izay tsara tamin''ny zavatra nobaboina.'
mg1865::mg_58::7::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay avy tamin''ny taranak''i Levy ka mandray ny fisoronana no mahazo teny haka ny fahafolon-karena amin''ny olona araka ny lalàna, dia amin''ny rahalahiny izany, na dia teraky ny kibon''i Abrahama aza ireny;'
mg1865::mg_58::7::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa izay tsy isan''ny firazanan''ireo akory no nandray ny fahafolon-karena tamin''i Abrahama sy nitso-drano ilay nanana ny teny fikasana.'
mg1865::mg_58::7::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy azo lavina akory anefa fa ny kely no mahazo tso-drano amin''ny lehibe noho ny tenany.'
mg1865::mg_58::7::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ety dia izay olona mety maty no mandray ny fahafolon-karena, fa any kosa dia izay nambara fa velona.'
mg1865::mg_58::7::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toa azo lazaina fa Levy aza, izay mandray ny fahafolon-karena, dia mba nandoa ny fahafolon-karena koa tao anatin''i Abrahama,'
mg1865::mg_58::7::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria mbola tao an-kibon-drainy ihany izy tamin''ny nitsenan''i Melkizedeka an''i Abrahama.'
mg1865::mg_58::7::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha nisy fanatanterahana tamin''ny fisoronan''i Levy (fa tamin''izany no nahazoan''ny olona ny lalàna), ahoana no mbola ilana mpisorona hafa hiseho araka ny fanaon''i Melkizedeka ihany, izay tsy hotononina ho araka ny fanaon''i Arona?'
mg1865::mg_58::7::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ovana ny fisoronana, dia tsy maintsy ovana koa ny lalàna.'
mg1865::mg_58::7::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izay nolazaina amin''izany teny izany dia avy tamin''ny firenena hafa, izay tsy nisy olona manompo eo amin''ny alitara.'
mg1865::mg_58::7::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hita marimarina fa avy tamin''ny Joda no nisehoan''ny Tompontsika, ary izany firenena izany dia tsy nisy nolazain''i Mosesy akory ny amin''izay ho mpisorona.'
mg1865::mg_58::7::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hita marimarina kokoa indray izany, raha misy Mpisorona hafa miseho ka tahaka an''i Melkizedeka,'
mg1865::mg_58::7::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay natao tsy araka ny lalàn''izay didy momba ny nofo, fa araka ny herin''ny fiainana tsy manam-pahataperana.'
mg1865::mg_58::7::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy dia nambara hoe: "Ianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka" (Salamo 110:4).'
mg1865::mg_58::7::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy fahafoanana ny didy nialoha noho ny halemeny sy ny tsy fanasoavany'
mg1865::mg_58::7::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa ny lalàna dia tsy nahatanteraka na inona na inona), ary misy kosa fampidirana ny fanantenana tsaratsara kokoa, izay anatonantsika an''Andriamanitra.'
mg1865::mg_58::7::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka an''i Melkizedeka tsy natao mpisorona raha tsy tamin''ny fianianana'
mg1865::mg_58::7::21:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: '- fa ireny kosa dia natao mpisorona tsy tamin''ny fianianana, fa Ity tamin''ny fianianana nataon''ilay nilaza taminy hoe: "Efa nianiana Jehovah ka tsy hanenina: Ianao no Mpisorona mandrakizay" (Salamo 110:4)'
mg1865::mg_58::7::22:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: '- dia tahaka izany koa no nanaovana an''i Jesoa ho Mpiantoka ny fanekena tsara lavitra.'
mg1865::mg_58::7::23:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa natao maro ireny mpisorona ireny. satria tsy navelan''ny fahafatesana haharitra izy;'
mg1865::mg_58::7::24:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izy kosa dia manana fisoronana tsy dimbiasana, satria maharitra mandrakizay Izy;'
mg1865::mg_58::7::25:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa amin''izany dia mahavonjy tokoa* izay manatona an''Andriamanitra amin''ny alalany Izy, satria velona mandrakizay hanao fifonana ho azy. [*Na: hatramin''ny farany]'
mg1865::mg_58::7::26:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mpisoronabe tahaka izao no miendrika ho antsika: dia Izay masina, tsy misy tsiny, tsy misy loto, voasaraka amin''ny mpanota ka natao avo noho ny lanitra,'
mg1865::mg_58::7::27:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy mila hanatitra fanatitra isan''andro tahaka ny ataon''ireny mpisoronabe ireny, voalohany noho ny otan''ny tenany, dia vao noho ny an''ny olona kosa; fa izany dia nataony indray mandeha ihany, raha nanatitra ny tenany Izy.'
mg1865::mg_58::7::28:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lalàna dia manendry olona izay manana fahalemena ho mpisoronabe; fa ny tenin''ny fianianana kosa, izay tato aorian''ny lalàna, dia manendry ny Zanaka, Izay notanterahina ho mandrakizay.'
mg1865::mg_58::8::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampitahana ny fanompoam-pivavahana tao amin''ny tabernakely araka ny lalàn''i Mosesy sy ny any an-danitra'
  verse_text: 'Ary amin''izany zavatra lazainay izany dia izao no fotony: Manana Mpisoronabe toy izany isika, dia Ilay efa mipetraka eo amin''ny ankavanan''ny seza fiandrianan''ny Avo Indrindra any an-danitra,'
mg1865::mg_58::8::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpanao fanompoam-pivavahana ao amin''ny fitoerana masina sy ny tena tabernakely, izay naorin''ny Tompo, fa tsy olona.'
mg1865::mg_58::8::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpisoronabe rehetra dia tendrena hanatitra fanomezana sy fanatitra; ary amin''izany dia tsy maintsy mba manan-katerina koa Izy.'
mg1865::mg_58::8::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ety ambonin''ny tany dia tsy mba ho mpisorona akory Izy, satria misy rahateo ireo manatitra ny fanomezana araka ny lalàna,'
mg1865::mg_58::8::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ireo manao fanompoam-pivavahana amin''izay endrika sy aloky ny zavatra any an-danitra, tahaka ny natoron''Andriamanitra an''i Mosesy, rehefa hanao ny tabernakely izy; fa hoy Izy: "Tandremo mba hataonao araka ny endrika izay naseho taminao tao an-tendrombohitra ny zavatra rehetra" (Eksodosy 25:40).'
mg1865::mg_58::8::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny efa mahazo fanompoam-pivavahana tsara noho ny an''ireny Izy, dia araka ny nanaovana Azy ho Mpanalalana amin''ny fanekena tsara lavitra, izay natao tamin''ny teny fikasana tsara lavitra.'
mg1865::mg_58::8::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy nanan-tsiny izany fanekena voalohany izany, dia tsy mba nisy fitoerana hotadiavina ho an''ny faharoa.'
mg1865::mg_58::8::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manome tsiny ny olona Izy manao hoe: "Indro, avy ny andro, hoy Jehovah, Izay hanaovako fanekena vaovao amin''ny taranak''isiraely sy ny taranak''i Joda,'
mg1865::mg_58::8::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy araka ny fanekena nataoko tamin''ny razany Tamin''ny andro nitantanako azy nitondra azy nivoaka avy tany amin''ny tany Egypta; Fa izy ireny tsy nitoetra tamin''ny fanekeko, Ary Izaho kosa dia tsy nitandrina azy, hoy Jehovah.'
mg1865::mg_58::8::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no fanekena hataoko amin''ny taranak''isiraely, Rehefa afaka izany andro izany, hoy Jehovah: Dia hataoko ao an-tsainy ny lalàko, Sady hosoratako ao am-pony, Ary Izaho ho Andriamaniny, ary izy ho oloko;'
mg1865::mg_58::8::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy izy, Na hanao hoe: Mahalalà an''i Jehovah; Fa samy hahalala Ahy avokoa izy rehetra Hatramin''ny kely indrindra ka hatramin''ny lehibe indrindra;'
mg1865::mg_58::8::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hamindra fo amin''ny tsy fahamarinany Aho, Ary tsy hotsarovako intsony ny fahotany" (Jeremia 31:31-34).'
mg1865::mg_58::8::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny anaovany hoe "vaovao" dia nataony fa efa ela ny voalohany. Fa izay tratra ela sy mihantitra dia efa madiva ho levona.'
mg1865::mg_58::9::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia ny fanekena voalohany aza dia nisy fitsipika ny amin''ny fanompoam-pivavahana, ary nisy ny fitoerany masina momba ny ety an-tany.'
mg1865::mg_58::9::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy tabernakely voavoatra: ny efitra voalohany, ilay atao hoe "ny fitoerana masina", izay nisy ny fanaovan-jiro sy ny latabatra ary ny mofo aseho.'
mg1865::mg_58::9::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ao anatin''ny efitra lamba faharoa no nisy ny tabernakely izay atao hoe "ny fitoerana masina indrindra,"'
mg1865::mg_58::9::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nisy lovia* volamena fandoroana ditin-kazo manitra sy ny fiaran''ny fanekena, izay voapetaka takela-bolamena avokoa; ary tao anatin''io nisy ny vilany volamena, izay nitoeran''ny mana, sy ny tehin''i Arona izay nitsimoka, ary ny vato fisaky ny fanekena; [*Na: alitara]'
mg1865::mg_58::9::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary teo ambonin''io koa ny kerobima nisy ny voninahitra, izay nanaloka ny rakotra fanaovam-panavotana,- tsy azonay lazaina tsirairay ireo ankehitriny.'
mg1865::mg_58::9::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voavoatra toy izany ireo zavatra ireo, dia miditra mandrakariva eo amin''ny tabernakely voalohany ny mpisorona hanefa ny fanompoam-pivavahana.'
mg1865::mg_58::9::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny faharoa kosa no idiran''ny mpisoronabe irery ihany indray mandeha isan-taona; ary izy aza dia tsy miditra, raha tsy mitondra rà, izay ateriny noho ny amin''ny tenany sy ny fahadisoana nataon''ny olona amin''ny tsy fahalalana;'
mg1865::mg_58::9::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa izany no anambaran''ny Fanahy Masina fa tsy mbola voaseho ny lalana mankany amin''ny fitoerana masina indrindra, raha mbola ao ihany ny tabernakely voalohany;'
mg1865::mg_58::9::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'fanoharana izany amin''izao andro ankehitriny izao, ary araka izany no anaterana fanomezana sy fanatitra, izay tsy mahatanteraka ny mpivavaka ny amin''ny fieritreretana'
mg1865::mg_58::9::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: '2022-09-26T05:29:29+0000'
  verse_title: null
  verse_text: '(fa naman''ny zavatra hohanina sy ny zavatra hosotroina sy ny fanasana samy hafa), dia fitsipika araka ny nofo, voatendry hatao mandra-pihavin''ny andro fanovana.'
mg1865::mg_58::9::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kristy kosa, rehefa tonga ho Mpisoronabe ny amin''ny zavatra tsara ho avy, dia namaky teo amin''ny tabernakely lehibe lavitra sady tsara lavitra, izay tsy nataon-tanana, izany hoe, tsy isan''izao zavatra ary izao,'
mg1865::mg_58::9::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy mba nitondra ran''osilahy sy ran-janak''omby Izy, fa ny ran''ny tenany, dia niditra indray mandeha ho any amin''ny fitoerana masina ka nahazo fanavotana mandrakizay.'
mg1865::mg_58::9::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny ran''osilahy sy ny ran''ombilahy ary ny lavenom-bantotr''ombivavy afafy amin''izay voaloto no manamasina hatramin''ny fanadiovana ny nofo,'
mg1865::mg_58::9::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'mainka fa ny ran i Kristy, Izay nanatitra ny tenany tsy manan-tsiny ho an''Andriamanitra, tamin''ny alalan''ny Fanahy mandrakizay, no hahadio ny fieritreretanareo ho afaka amin''ny asa maty mba hanompoanareo an''Andriamanitra velona.'
mg1865::mg_58::9::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia Mpanalalana amin''izay fanekena vaovao Izy, rehefa niaritra fahafatesana ho fanavotana amin''ny fahotana natao tamin''ny fanekena voalohany, mba hahazoan''izay voantso ny teny fikasana, dia ny lova mandrakizay.'
mg1865::mg_58::9::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy didim-pananana*, dia teny foana izany, raha tsy efa maty izay nanao azy. [*Na: fanekena]'
mg1865::mg_58::9::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mafy ny didim-pananana*, rehefa tonga ny fahafatesana; fa tsy mafy akory izany, raha mbola velona ilay nanao azy. [*Na: fanekena]'
mg1865::mg_58::9::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia ny fanekena voalohany aza dia tsy nohamasinina raha tsy nisy rà.'
mg1865::mg_58::9::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa voalazan''i Mosesy tamin''ny vahoaka rehetra ny didy rehetra araka ny lalàna, dia nalainy ny ran-janak''omby sy ny ran''osilahy mbamin''ny rano sy ny volon''ondry jaky sy ny hysopa ka nafafiny tamin''ny boky sy ny vahoaka rehetra;'
mg1865::mg_58::9::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy izy; Ity no ran''ny fanekena izay nandidian''Andriamanitra anareo (Eksodosy 24:8).'
mg1865::mg_58::9::21:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tabernakely sy ny fanaka rehetra enti-manao fanompoam-pivavahana dia nofafazany rà toy izany koa.'
mg1865::mg_58::9::22:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary saiky diovina amin''ny rà avokoa ny zavatra rehetra araka ny lalàna; fa raha tsy misy rà alatsaka, dia tsy misy famelan-keloka.'
mg1865::mg_58::9::23:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tsy maintsy nodiovina tamin''ireny ny tandindon''ny zavatra any an-danitra, fa ny tenan''ny zavatra any an-danitra kosa dia tamin''izay fanatitra tsara noho ireny.'
mg1865::mg_58::9::24:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kristy tsy mba niditra tao amin''izay fitoerana masina nataon-tanana, izay tandindon''ny tena fitoerana masina, fa ho any an-danitra tokoa, mba hiseho eo anatrehan''Andriamanitra ankehitriny ho antsika;'
mg1865::mg_58::9::25:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy niditra Izy mba hanatitra ny tenany matetika, tahaka ny mpisoronabe miditra ao amin''ny fitoerana masina isan-taona mitondra ny ran''ny zavatra hafa;'
mg1865::mg_58::9::26:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha izany, dia tsy maintsy ho nijaly matetika Izy hatrizay nanaovana izao tontolo izao; fa ankehitriny dia efa naseho indray mandeha tamin''izao andro farany izao Izy raha hanafaka ny ota tamin''ny nanaterany ny tenany.'
mg1865::mg_58::9::27:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny nanendrena ny olona ny ho faty indray mandeha, ary rehefa afaka izany, dia hisy fitsarana,'
mg1865::mg_58::9::28:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tahaka izany koa Kristy, rehefa natolotra indray mandeha hitondra ny otan''ny maro, dia hiseho fanindroany, tsy amin''ota, amin''izay miandry Azy, ho famonjena.'
mg1865::mg_58::10::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lalàna, izay misy aloky ny zava-tsoa ho avy, fa tsy ny tena endrik''izany zavatra izany, dia tsy mba mahatanteraka ny olona manatona amin''izay fanatitra ateriny mandrakariva isan-taona.'
mg1865::mg_58::10::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha izany, dia tsy ho nitsahatra va ny nanaterany ireo, satria rehefa nodiovina indray mandeha ny mpivavaka, dia tsy ho nasian''ny fieritreretany ny ota intsony izy?'
mg1865::mg_58::10::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ireo dia misy fahatsiarovana ny ota isan-taona.'
mg1865::mg_58::10::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mahaisotra ny ota ny ran''ombilahy sy ny ran''osilahy.'
mg1865::mg_58::10::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony niditra tamin''izao fiainana izao Izy, dia nanao hoe: "Ny fanatitra alatsa-drà sy ny fanatitra hohanina tsy mba nilainao, Fa tena no namboarinao ho Ahy;'
mg1865::mg_58::10::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitra odorana sy ny fanatitra noho ny ota tsy sitrakao;'
mg1865::mg_58::10::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izaho: Inty Aho tonga — Ao amin''ny horonam-boky no nanoratana Ahy -Hanao ny sitraponao, Andriamanitra o". (Salamo 40:6-8).'
mg1865::mg_58::10::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa nolazainy teo hoe: "Ny fanatitra alatsa-drà sy ny fanatitra hohanina sy ny fanatitra odorana ary ny fanatitra noho ny ota" (dia ireny aterina araka ny lalàna) "no tsy ilainao ary tsy sitrakao",'
mg1865::mg_58::10::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy indray Izy: "Inty Aho tonga hanao ny sitraponao." Manaisotra ny voalohany Izy mba hampitoerany ny faharoa.'
mg1865::mg_58::10::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany sitrapo izany no nanamasinana antsika tamin''ny nanaterana ny tenan''i Jesoa Kristy indray mandeha.'
mg1865::mg_58::10::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona rehetra dia mitsangana isan''andro manao fanompoam-pivavahana sy manatitra ireny fanatitra ireny ihany matetika izay tsy mahaisotra ny ota;'
mg1865::mg_58::10::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izy kosa, rehefa nanao fanatitra iray monja ho mandrakizay noho ny ota, dia efa mipetraka* eo an-tanana ankavanan''Andriamanitra, [*Na: noho ny ota, dia efa mipetraka mandrakizay]'
mg1865::mg_58::10::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hatramin''izao dia miandry Izy mandra-panaony ny fahavalony ho fitoeran-tongony.'
mg1865::mg_58::10::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanatitra iray ihany no efa nahatanterahany ho mandrakizay izay olona hamasinina.'
mg1865::mg_58::10::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fanahy Masina koa manambara izany amintsika; fa rehefa voalazany hoe:'
mg1865::mg_58::10::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: '"Izao no fanekena hataoko aminy, Rehefa afaka izany andro izany, hoy Jehovah: Hataoko ao am-pony ny lalàko, Sady hosoratako ao an-tsainy,"'
mg1865::mg_58::10::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy koa Izy: "Ny fahotany sy ny helony tsy hotsarovako intsony" (Jeremia 31:33-34).'
mg1865::mg_58::10::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa misy famelana ireo, dia tsy misy fanatitra noho ny ota intsony.'
mg1865::mg_58::10::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Teny famporisihana sy fananarana ho an''izay nihamalaina ka mila hihemotra'
  verse_text: 'Koa amin''izany, ry rahalahy. satria manana fahatokiana hiditra ao amin''ny fitoerana masina isika noho ny ran''i Jesoa,'
mg1865::mg_58::10::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''izay lalana natokany ho antsika, dia lalana vaovao sady velona, namaky teo amin''ny efitra lamba, dia ny nofony,'
mg1865::mg_58::10::21:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady manana Mpisorona lehibe mitandrina ny tranon''Andriamanitra,'
mg1865::mg_58::10::22:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aoka isika hanatona amin''ny fo marina sy amin''ny fahatokiana be avy amin''ny finoana, manana fo voadio* ho afaka amin''ny fieritreretana ratsy sy tena voasasa tamin''ny rano madio; [*Grika: voafafy]'
mg1865::mg_58::10::23:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'aoka hohazonintsika mafy ny fanekena ny fanantenana mba tsy hihozongozonany (fa mahatoky Ilay efa nanao ny teny fikasana)'
mg1865::mg_58::10::24:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka isika hifampandinika hampandroso ny fitiavana sy ny asa tsara;'
mg1865::mg_58::10::25:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon''ny sasany, fa mifananara kosa, mainka satria hitanareo fa mihantomotra ny andro.'
mg1865::mg_58::10::26:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha minia manota isika rehefa nahazo ny fahalalana tsara ny marina, dia tsy misy fanatitra noho ny ota intsony,'
mg1865::mg_58::10::27:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fiandrasana mahatahotra amin''ny fitsarana ary fahatezerana mirehitra izay handany ny fahavalo rehetra kosa.'
mg1865::mg_58::10::28:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manohitra ny lalàn''i Mosesy dia maty amin''ny tenin''ny vavolombelona roa na telo ka tsy asiana famindram-po;'
mg1865::mg_58::10::29:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'manao ahoana kosa ary no hamafin''ny fampijaliana ataonareo tokony hihatra amin''izay nanitsaka ny Zanak''Andriamanitra ka nanao ny ran''ny fanekena izay nanamasinana azy ho zavatra tsy masina sady naniratsira ny Fanahin''ny fahasoavana?'
mg1865::mg_58::10::30:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatsika Izay nanao hoe: "Ahy ny famaliana; Izaho no hamaly;" ary koa: "Jehovah hitsara ny olony" (Deoteronomia 32:35-36).'
mg1865::mg_58::10::31:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zavatra mahatahotra ny ho azon''ny tanan''Andriamanitra velona.'
mg1865::mg_58::10::32:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsarovy ny andro fahiny izay naharetanareo ny ady mafy tamin''ny fahoriana, rehefa nohazavaina ianareo;'
mg1865::mg_58::10::33:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'indraindray raha natao ho fizaha noho ny fanaratsiana sy ny fampahoriana ianareo, ary indraindray koa raha tonga naman''izay azon''izany.'
mg1865::mg_58::10::34:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sady niara-niaritra tamin''izay nifatotra ianareo no nifaly raha norobaina ny fanananareo, satria fantatrareo fa ianareo dia manana fananana tsara lavitra sady maharitra*. [*Na: fa ianareo dia manana ny tenanareo ho fananana tsara lavitra sady maharitra]'
mg1865::mg_58::10::35:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza manary ny fahasahianareo izay misy valiny lehibe.'
mg1865::mg_58::10::36:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: '2022-08-25T12:17:47+0000'
  verse_title: null
  verse_text: 'Fa tokony hanana faharetana ianareo mba hahazoanareo izay lazain''ny teny fikasana, rehefa vitanareo ny sitrapon''Andriamanitra.'
mg1865::mg_58::10::37:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa "rehefa afaka kelikely, Dia ho tonga Ilay ho avy, fa tsy hitaredretra"'
mg1865::mg_58::10::38:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary "ny oloko marina* dia ho velon''ny finoana;" Fa raha mihemotra izy, dia tsy sitraky ny fanahiko (Habakoka 2:3-4). [*(ny marina)]'
mg1865::mg_58::10::39:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika tsy mba naman''izay mihemotra ho amin''ny fahaverezana, fa naman''izay mino ho amin''ny famonjena ny fanahy.'
mg1865::mg_58::11::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Filazan-tantara mampiseho ny herin''ny finoana sy ny valiny'
  verse_text: 'Ary ny finoana no fahatokiana ny amin''ny zavatra antenaina, fanehoana ny zavatra tsy hita.'
mg1865::mg_58::11::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany no nahatsara laza ny ntaolo.'
mg1865::mg_58::11::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no ahafantarantsika fa ny tenin''Andriamanitra no nanaovana izao tontolo izao, ka dia tsy izay zavatra miseho no nanaovana izao zavatra hita izao.'
mg1865::mg_58::11::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nanateran''i Abela ho an''Andriamanitra fanatitra tsara noho ny an''i Kaina, ka izany no nanambarana azy fa marina, satria Andriamanitra no nanambara ny amin''ny fanatitra nataony: ary amin''izany, na dia maty aza izy, dia mbola miteny ihany.'
mg1865::mg_58::11::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no namindrana an''i Enoka tsy hiharan''ny fahafatesana; ka dia tsy hita izy, satria nafindran''Andriamanitra; fa talohan''ny namindrana azy dia nambara fa nankasitrahan''Andriamanitra izy.'
mg1865::mg_58::11::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy amin''ny finoana, dia tsy misy azo atao hahazoana sitraka aminy; fa izay manatona an''Andriamanitra dia tsy maintsy mino fa misy Izy sady Mpamaly soa izay mazoto mitady Azy.'
mg1865::mg_58::11::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nanamboaran''i Noa sambo-fiara hamonjena ny ankohonany, fa natahotra izy, rehefa notoroan''Andriamanitra hevitra ny amin''ny zavatra tsy mbola hita; koa izany no nanamelohany izao tontolo izao sy nahatongavany ho mpandova ny fahamarinana araka ny finoana.'
mg1865::mg_58::11::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no naneken''i Abrahama, rehefa nantsoina, hiainga hankany amin''izay tany ho azony ho lova; ka dia niainga izy, nefa tsy fantany izay halehany.'
mg1865::mg_58::11::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nivahiniany tany amin''ny tany nolazain''ny teny fikasana, toy ny any an-tanin''olona, mitoetra an-day, mbamin''isaka sy Jakoba, mpiara-mandova izany teny fikasana izany aminy;'
mg1865::mg_58::11::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nanantena hahazo ny tanàna misy fanorenana izy, Andriamanitra no Tompo-marika sy Mpanao izany.'
mg1865::mg_58::11::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na Saraha aza, dia finoana koa no nandraisany hery hanan''anaka, rehefa nitsaha-jaza izy, satria nataony fa mahatoky Ilay efa nanome ny teny fikasana.'
mg1865::mg_58::11::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia avy tamin''ny anankiray, izay efa toy ny maty, no nihavian''ny maro toy ny kintana eny amin''ny lanitra sy toy ny fasika eny amoron-dranomasina, izay tsy hita isa.'
mg1865::mg_58::11::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo dia maty tamin''ny finoana, kanefa tsy mbola nahazo ny teny fikasana; fa nahatazana azy eny lavitra eny izy ka ravoravo niarahaba azy, dia nanaiky fa vahiny sy mpivahiny tety ambonin''ny tany izy.'
mg1865::mg_58::11::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay milaza izany zavatra izany dia maneho marimarina fa mitady izay ho taniny izy.'
mg1865::mg_58::11::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tàhiny nahatsiaro ny tany nialany izy, dia ho nahita andro hiverenany.'
mg1865::mg_58::11::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany ny tsara lavitra no iriny, dia ny any an-danitra; ary noho izany Andriamanitra dia tsy menatra hatao hoe Andriamaniny, satria efa nanamboatra tanàna ho an''ireo Izy.'
mg1865::mg_58::11::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nanateran i Abrahama an''isaka, raha nizahan-toetra izy; eny, ny zananilahy tokana no naterin''ilay efa nandray tsara ny teny fikasana,'
mg1865::mg_58::11::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ilay nilazana hoe: "Avy amin''Isaka no hantsoina izay taranaka ho anao" (Genesisy 21:12).'
mg1865::mg_58::11::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nihevitra izy fa Andriamanitra dia mahay manangana ny maty aza; ary hoatra ny avy tamin''izany no nandraisany azy.'
mg1865::mg_58::11::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nitsofan''isaka rano an''i Jakoba sy Esao ny amin''ny zavatra ho avy.'
mg1865::mg_58::11::21:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nitsofan''i Jakoba rano ny zanak''i Josefa roa lahy, rehefa ho faty izy, ka nivavaka izy, niankina tamin''ny lohan''ny tehiny.'
mg1865::mg_58::11::22:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nilazan''i Josefa ny fialan''ny Zanak''isiraely, rehefa ho faty izy, sy nanafarany ny amin''ny taolany.'
mg1865::mg_58::11::23:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nanafenan''ny ray aman-drenin''i Mosesy azy telo volana, raha vao teraka izy, satria hitany fa zaza tsara izy, ary tsy natahorany ny didin''ny mpanjaka.'
mg1865::mg_58::11::24:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nandavan''i Mosesy tsy hatao hoe zanaky ny zanakavavin''i Farao, rehefa lehibe izy,-'
mg1865::mg_58::11::25:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'nifidy mantsy hiara-mitondra fahoriana amin''ny olon''Andriamanitra toy izay hanana fifaliana vetivety amin''ny fahotana,'
mg1865::mg_58::11::26:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao ny fanaratsiana an''i Kristy ho harena be lavitra noho ny zava-tsoan''i Egypta, satria nijery ny famalian-tsoa izy.'
mg1865::mg_58::11::27:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nandaovany an''i Egypta, ka tsy natahorany ny fahatezeran''ny mpanjaka; fa naharitra toy ny mahita Izay tsy hita izy.'
mg1865::mg_58::11::28:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nitandremany* ny Paska sy ny famafazana ny rà, fandrao hahatratra ny azy ilay nandringana ny lahimatoa. [*Na: nanendreny]'
mg1865::mg_58::11::29:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nitana ny Ranomasina Mena toy ny mandia tany maina, izay mba nandraman''ny Egyptiana, ka dia voatelina izy.'
mg1865::mg_58::11::30:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no nampirodana ny màndan''i Jeriko, rehefa nohodidinina hafitoana.'
mg1865::mg_58::11::31:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finoana no tsy nahafaty an-dRahaba janga niaraka tamin''ny tsy nino, satria nandray ny mpisafo-tany tamin''ny fihavanana izy.'
mg1865::mg_58::11::32:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary inona koa no holazaiko? Fa ho lany ny andro, raha milaza an''i Gideona sy Baraka sy Samsona ary Jefta aho, Davida koa sy Samoela ary ny mpaminany,'
mg1865::mg_58::11::33:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nandresy fanjakana tamin''ny finoana, niasa fahamarinana; nahazo teny fikasana, nanakombona ny vavan''ny liona,'
mg1865::mg_58::11::34:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'namono ny fidedadedan''afo, afaka tamin''ny lelan-tsabatra, raha nalemy dia nampahatanjahina, tonga nahery tamin''ny ady, dia nampandositra ny miaramilan''ny firenena hafa.'
mg1865::mg_58::11::35:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy nandray ny azy efa maty, fa natsangana ho velona indray; ary ny sasany nampijalijalina ho faty, nefa tsy mety nanao izay hahafahany, mba hahazoany fitsanganana tsara lavitra;'
mg1865::mg_58::11::36:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sasany niaritra fanesoana sy kapoka mafy ary fatorana sy tranomaizina koa;'
mg1865::mg_58::11::37:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'notoraham-bato izy, notsofana, nalaim-panahy, novonoina tamin''ny sabatra, dia nirenireny nitafy hoditr''ondry sy hoditr''osy; efa lao, ory, fadiranovana'
mg1865::mg_58::11::38:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: '(nefa izao tontolo izao tsy miendrika ho nitoerany akory) dia nirenireny tany an''efitra sy tany an''tendrombohitra sy tany an-johy ary tao an-dava-tany izy.'
mg1865::mg_58::11::39:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo rehetra ireo, na dia efa nahazo laza tsara noho ny finoana aza, dia tsy mba nandray ny teny fikasana,'
mg1865::mg_58::11::40:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 11
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Andriamanitra efa namboatra izay tsara lavitra ho antsika, mba tsy hatao tanteraka ireo raha tsy efa mby eo koa isika.'
mg1865::mg_58::12::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana hampahatanjaka ny sain''ny malemy finoana sy hampaharitra azy'
  verse_text: 'Koa amin''izany, satria misy vavolombelona maro be toy izany manodidina antsika toy ny rahona, dia aoka isika koa hanaisotra izay rehetra mitambesatra amintsika mbamin''ny ota izay malaky mahazo antsika, ary aoka isika hihazakazaka amin''ny faharetana amin''izao fihazakazahana filokana napetraka eo anoloantsika izao,'
mg1865::mg_58::12::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mijery an''i Jesoa, Tompon''ny finoantsika sy Mpanefa azy, Izay naharitra ny hazo fijaliana, fa tsy nitandro henatra, mba hahazoany ny fifaliana napetraka teo anoloany, ka dia efa mipetraka eo amin''ny ankavanan''ny seza fiandrianan''Andriamanitra Izy.'
mg1865::mg_58::12::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hevero tsara Ilay naharitra ny fanoherana nataon''ny mpanota taminy*, fandrao ho ketraka ianareo, ka ho reraka ny fanahinareo. [*Na: ireo mpanota manimba tena]'
mg1865::mg_58::12::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo tsy mbola nanohitra niady tamin''ny ota hatramin''ny fahalatsahan-drà.'
mg1865::mg_58::12::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hadinonareo ny fananarana izay milaza aminareo toy ny amin''ny zanaka hoe: "Anaka, aza atao ho zavatra kely ny famaizana ataon''i Jehovah, Ary aza reraka, raha resi-lahatry ny anatra ataony ianao;'
mg1865::mg_58::12::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tian''i Jehovah no faizany, Ary izay zanaka rehetra raisiny no kapohiny" (Ohabolana 3:11-12).'
mg1865::mg_58::12::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Famaizana no anton''ny iaretanareo; Andriamanitra mitondra anareo tahaka ny zanaka; fa aiza moa izay zanaka tsy faizan-drainy?'
mg1865::mg_58::12::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy faizana tahaka ny itondrana azy rehetra ianareo, dia zazasary, fa tsy zanaka.'
mg1865::mg_58::12::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, isika dia nanana ny rain''ny nofontsika ho mpanafay antsika ka efa nanaja azy; tsy mainka va ny hanekentsika ny Rain''ny fanahy, ka ho velona isika?'
mg1865::mg_58::12::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireny dia nanao izay hahafay antsika tamin''ny andro vitsy araka izay sitrapony, fa Izy kosa dia ny hahasoa, mba handraisantsika ny fahamasinany.'
mg1865::mg_58::12::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny famaizana rehetra dia tsy mba atao ho mahafaly andro anaovana, fa mampahory; fa rehefa afaka izany, dia vao mitondra ny vokatry ny fahamarinana hiadanana ho an''izay nanaovana azy izy.'
mg1865::mg_58::12::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hatanjaho* ny tanana miraviravy sy ny lohalika malemy; [*Na: ahitsio]'
mg1865::mg_58::12::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manaova lala-mahitsy halehan''ny tongotrareo, mba tsy hampipitsoka ny tongotry ny mandringa, fa ny mba hahasitrana azy kosa.'
mg1865::mg_58::12::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miezaha mitady fihavanana amin''ny olona rehetra ary fahamasinana; fa izay. tsy manam-pahamasinana dia tsy hahita ny Tompo.'
mg1865::mg_58::12::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitandrema tsara, fandrao hisy hiala amin''ny fahasoavan''Andriamanitra; fandrao hisy faka mangidy mitsimoka hampikorontana, ka ho voaloto ny maro;'
mg1865::mg_58::12::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao hisy mpijangajanga na olona tsy manaja ny masina, dia tahaka an''i Esao, izay nivarotra ny fizokiany hahazoany hanina indraim-bava.'
mg1865::mg_58::12::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatrareo fa rehefa afaka izany, raha ta-handova ny fitahiana izy, dia nolavina; fa tsy nahita izay hibebahana izy; na dia nitady fatratra tamin''ny ranomaso aza.'
mg1865::mg_58::12::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny halehiben''ny fahasoavana azo amin''ny fanekena vaovao, sy ny halehiben''ny helok''izay mandà izany'
  verse_text: 'Fa ianareo tsy mby eo amin''izay tendrombohitra azo tsapaina sady mirehitra afo, dia eo amin''ny fahamaintisana sy ny aizina na sy ny tafio-drivotra'
mg1865::mg_58::12::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny fanenon''ny trompetra ary ny feon''ny teny, ka izay nandre izany dia nangataka mba tsy hasian-teny intsony izy;'
mg1865::mg_58::12::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy tohany ilay nandidiana hoe: "Ary raha misy biby aza mikasika ny tendrombohitra, dia hotoraham-bato izany" (Eksodosy 19:12-13),'
mg1865::mg_58::12::21:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary satria loza indrindra ny fahitana, dia hoy Mosesy: "Matahotra loatra sy mangovitra indrindra aho" (Deoteronomia 9:19).'
mg1865::mg_58::12::22:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa efa mby eo an-tendrombohitra Ziona, tanànan''Andriamanitra velona, dia Jerosalema any an-danitra, ary ho ao amin''ny anjely tsy omby alinalina,'
mg1865::mg_58::12::23:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny fihaonana fifaliana* sy ny fiangonan**''ny lahimatoa voasoratra any an-danitra, sy amin''Andriamanitra, Mpitsara ny olona rehetra, ary amin''ny fanahin''ny olona marina izay efa natao tanteraka, [*Na: ho amin''ireo tsy omby alinalina, dia ny fivorian''ny anjely] [** Grika: eklesia]'
mg1865::mg_58::12::24:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy amin''i Jesoa, Mpanalalana amin''ny fanekena vaovao, ary amin''ny rà famafazana, izay tsara lavitra noho ny an''i Abela.'
mg1865::mg_58::12::25:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo mba tsy holavinareo Izay miteny. Fa raha izy ireo tsy afa-nandositra tamin''ny nandavany ilay nilaza ny tenin''Andriamanitra taminy tety ambonin''ny tany, mainka fa isika, raha mihodina miala amin''ilay avy any an-danitra,'
mg1865::mg_58::12::26:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nampihorohoro ny tany fahiny tamin''ny feony; fa ankehitriny Izy efa nanao teny fikasana hoe: "Indray maka koa tsy ny tany ihany no hampihorohoroiko, fa ny lanitra koa" (Hagay 2:6).'
mg1865::mg_58::12::27:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hoe "indray maka koa" dia manambara ny hanovana izay zavatra ampihorohoroina, toy ny zavatra natao, mba haharetan''izay zavatra tsy ampihorohoroina.'
mg1865::mg_58::12::28:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa satria mandray fanjakana tsy azo ampihorohoroina isika, dia aoka isika hanana fahasoavana* ho entintsika manao izay fanompoana sitrak''Andriamanitra amin''ny fanajana sy ny fahatahorana; [*Na: hanana fanahy misaotra]'
mg1865::mg_58::12::29:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Andriamanitsika dia afo mandevona (Deoteronomia 4:24).'
mg1865::mg_58::13::1:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra sy fanaovam-beloma'
  verse_text: 'Aoka haharitra ny fitiavana ny rahalahy.'
mg1865::mg_58::13::2:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manadino ny fampiantranoam-bahiny; fa tamin''izany dia nampiantrano anjely ny sasany, nefa tsy fantany.'
mg1865::mg_58::13::3:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy izay mifatotra, ho toy ny miara-mifatotra aminy ianareo, ary izay ampahorina, satria mbola eo amin''ny tena koa ianareo.'
mg1865::mg_58::13::4:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanan-kaja amin''ny olona rehetra ny fanambadiana, ary aoka tsy ho voaloto ny fandriana; fa ny mpijangajanga sy ny mpaka vadin''olona dia hohelohin''Andriamanitra.'
mg1865::mg_58::13::5:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy ho amin''ny fitiavam-bola ny toe-tsainareo, fa mianina amin''izay anananareo; fa hoy Izy: "Izaho tsy handao anao mihitsy na hahafoy anao akory" (Josoa 1:5).'
mg1865::mg_58::13::6:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia sahy manao hoe isika: "Jehovah no Mpamonjy ahy, ka tsy hatahotra aho; Inona no azon''ny olona atao amiko?" (Salamo 118:6).'
mg1865::mg_58::13::7:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny mpitondra anareo, izay efa nitory ny tenin''Andriamanitra taminareo; hevero ny niafaran''ny fiainany, ka araho ny finoany.'
mg1865::mg_58::13::8:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jesoa Kristy no tsy miova omaly sy anio ary mandrakizay.'
mg1865::mg_58::13::9:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety havilin''izay fampianarana maro hafahafa ianareo. Fa tsara raha ampiorenina amin''ny fahasoavana ny fo, fa tsy amin''ny hanina, izay tsy mahasoa ny mahavatra azy.'
mg1865::mg_58::13::10:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isika manana alitara, izay tsy ananan''ny mpanompo ny tabernakely fahefana hihinanana.'
mg1865::mg_58::13::11:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa nentin''ny mpisoronabe niditra ho ao amin''ny fitoerana masina ho fanatitra noho ny ota ny ran''ny biby, dia nodorana teny ivelan''ny toby ny fatiny.'
mg1865::mg_58::13::12:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany Jesoa koa dia niaritra teny ivelan''ny vavahady mba hahamasina ny olona amin''ny ràny.'
mg1865::mg_58::13::13:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka isika hivoaka hankeo aminy eo ivelan''ny toby, mitondra ny latsa izay nentiny.'
mg1865::mg_58::13::14:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ety isika tsy manana tanàna maharitra, fa mitady ny ho avy.'
mg1865::mg_58::13::15:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka isika hanatitra ny fanati-piderana amin''ny alalany ho an''Andriamanitra mandrakariva, dia ny vokatry ny molotra izay manaiky ny anarany.'
mg1865::mg_58::13::16:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aza manadino hanao soa sy hiantra; fa fanatitra toy izany no sitrak''Andriamanitra.'
mg1865::mg_58::13::17:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: '2022-12-17T08:40:04+0000'
  verse_title: null
  verse_text: 'Manekà ny mpitondra anareo, ka manoava azy; fa izy miambina ny fanahinareo araka izay tokony hataon''ny olona mbola hampamoahina, mba hanaovany izany amin''ny fifaliana, fa tsy amin''ny fisentoana; fa tsy hahasoa anareo izany.'
mg1865::mg_58::13::18:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivavaha ho anay; fa matoky izahay fa manana fieritreretana tsara ka te-hitondra tena tsara amin''ny zavatra rehetra.'
mg1865::mg_58::13::19:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mainka mangataka anareo hanao izany aho, mba hampodina faingampaingana kokoa ho aminareo.'
mg1865::mg_58::13::20:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitry ny fiadanana, Izay nitondra an''i Jesoa Tompontsika, Mpiandry ondry lehibe, hiala amin''ny maty, mitondra ny ran''ny fanekena mandrakizay*, [*Na: Mpiandry ondry lehibe amin''ny ran''ny fanekena mandrakizay hiala amin''ny maty]'
mg1865::mg_58::13::21:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy anie hahatanteraka anareo amin''ny tsara* rehetra hanao ny sitrapony ka hiasa ao anatinareo** izay ankasitrahana eo imasony amin''ny alalan''i Jesoa Kristy; ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena. [*Na: asa tsara] [**Na: (anatintsika)]'
mg1865::mg_58::13::22:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mangataka aminareo aho, ry rahalahy, zakao ny teny fananarana; fa efa nanoratra epistily fohifohy ihany ho aminareo aho.'
mg1865::mg_58::13::23:
  verse_version: mg1865
  verse_book: mg_58
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fantatrareo fa efa afaka Timoty rahalahintsika; koa raha tàhiny handeha faingana izy, dia hiaraka aminy hamangy anareo aho.'
