mg1865::mg_13::1::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Filaharan''ny firazanana hatramin''i Adama ka hatramin''i Abrahama'
  verse_text: 'Adama, Seta, Enosy,'
mg1865::mg_13::1::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kenana, Mahalalila, Jareda,'
mg1865::mg_13::1::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enoka, Metosela, Lameka,'
mg1865::mg_13::1::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noa, Sema, Hama ary Jafeta.'
mg1865::mg_13::1::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Jafeta dia Gomera sy Magoga sy Maday sy Javana sy Tobala sy Maseta ary Tirasa.'
mg1865::mg_13::1::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Gomera dia Askenaza sy Rifata ary Togarma.'
mg1865::mg_13::1::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Javana dia Elisaha sy Tarsisy sy ny Kitima ary ny Dodanita.'
mg1865::mg_13::1::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Hama dia Kosy sy Mizraima sy Pota ary Kanana.'
mg1865::mg_13::1::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kosy dia Seba sy Havila sy Sabta sy Ragarna ary Sabteka. Ary ny zanakalahin''i Ragama dia Seba sy Dedana.'
mg1865::mg_13::1::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kosy niteraka an''i Nimroda; izy no voalohany izay tonga olona mahery teo ambonin''ny tany.'
mg1865::mg_13::1::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mizraima niteraka ny Lodita sy ny Anamita sy ny Lehabita sy ny Naftohita'
mg1865::mg_13::1::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny Patrosita sy ny Kaslohita (izay nihavian''ny Filistina) ary ny Kaftorita.'
mg1865::mg_13::1::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kanana niteraka an''i Sidona, lahimatoany, sy Heta'
mg1865::mg_13::1::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny Jebosita sy ny Amorita sy ny Girgasita'
mg1865::mg_13::1::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny Hivita sy ny Arkita sy ny Sinita'
mg1865::mg_13::1::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny Arvadita sy ny Zemarita ary ny Harnatita.'
mg1865::mg_13::1::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Sema dia Elama sy Asyra sy Arpahada sy Loda sy Arama sy Oza sy Hola sy Gatera ary Maseka.'
mg1865::mg_13::1::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arpaksada niteraka an''i Sela; ary Sela niteraka an''i Ebera.'
mg1865::mg_13::1::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ebera niteraka roa lahy: ny anaran''ny iray natao hoe Palega*, satria tamin''ny androny no nizarana ny tany; ary Joktana no anaran''ny rahalahiny. [*Palega = Fizarana]'
mg1865::mg_13::1::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joktana niteraka an''i Almodada sy Salefa sy Hazarmaveta sy Jera'
mg1865::mg_13::1::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Hadorama sy Ozala sy Dikla'
mg1865::mg_13::1::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ebala sy Abimaela sy Sheba'
mg1865::mg_13::1::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ofira sy Havila ary Jobaba; ireo rehetra ireo no zanakalahin''i Joktana.'
mg1865::mg_13::1::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sema, Arpaksada, Sela,'
mg1865::mg_13::1::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ebera, Palega, Reo,'
mg1865::mg_13::1::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Seroga, Nahora, Tera,'
mg1865::mg_13::1::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Abrama (dia Abrahama izany).'
mg1865::mg_13::1::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Ny taranak''i Abrahama sy Isaka ary Esao sy Jakoba'
  verse_text: 'Ny zanakalahin''i Abrahama dia Isaka sy Isimaela.'
mg1865::mg_13::1::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no taranany: Nebaiota, lahimatoan''Isimaela, dia Kedara sy Abdela sy Mibsama'
mg1865::mg_13::1::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Misma sy Doma sy Masa sy Hadada sy Tema'
mg1865::mg_13::1::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jetora sy Nafisy ary Kedma. Ireo no zanakalahin''Isimaela.'
mg1865::mg_13::1::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Ketora, vaditsindranon''i Abrahama. Izy no niteraka an''i Zimrama sy Joksana sy Medana sy Midiana sy Jisbaka ary Soaha. Ary ny zanakalahin''i Joksana dia Sheba sy Dedana.'
mg1865::mg_13::1::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Midiana dia Efaha sy Efera sy Hanoka sy Abida ary Eldaha. Ireo rehetra ireo no zanakalahin''i Ketora.'
mg1865::mg_13::1::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abrahama niteraka an''Isaka. Ny zanakalahin''i Isaka dia Esao sy Isiraely.'
mg1865::mg_13::1::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Esao dia Elifaza sy Regoela sy Jeosy sy Jalama ary Kora.'
mg1865::mg_13::1::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanak''i Elifaza dia Temana sy Omara sy Zefo sy Gatama sy Kenaza sy Timna ary Amaleka.'
mg1865::mg_13::1::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Regoela dia Nahata sy Zera sy Sama ary Miza.'
mg1865::mg_13::1::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Seira dia Lotana sy Sobala sy Zibona sy Ana sy Disona sy Ezera ary Disana.'
mg1865::mg_13::1::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Lotana dia Hory sy Homama; ary Timna no anabavin''i Lotana.'
mg1865::mg_13::1::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Sobala dia Aliana sy Manahata sy Ebala sy Sefy ary Onama. Ary ny zanakalahin''i Zibona dia Aia sy Ana.'
mg1865::mg_13::1::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Ana dia Disona. Ary ny zanakalahin''i Disona dia Hamrana sy Esbana sa Jitrana ary Kerana.'
mg1865::mg_13::1::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin i Ezera dia Bilana sy Zavana ary Jakana. Ny zanakalahin''i Disana dia Oza sy Arana.'
mg1865::mg_13::1::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no mpanjaka izay nanjaka tany amin''ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin''ny Zanak''Isiraely: Bela, zanak''i Beora; ary Dinaba no anaran''ny tanànany.'
mg1865::mg_13::1::44:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Bela, dia nanjaka nandimby azy Jobaba, zanak''i Zera, avy any Bozra.'
mg1865::mg_13::1::45:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Jobaba, dia nanjaka nandimby azy Hosama, avy any amin''ny tanin''ny Temanita.'
mg1865::mg_13::1::46:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Hosama, dia nanjaka nandimby azy Hadada, zanak''i Bedada, izay namely ny Midianita tany amin''ny tany Moaba; ary Avita no anaran''ny tanànany.'
mg1865::mg_13::1::47:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Hadada, dia nanjaka nandimby azy Samla avy any Masreka.'
mg1865::mg_13::1::48:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Samla, dia nanjaka nandimby azy Saoly avy any Rehobota eo amoron''ny Ony.'
mg1865::mg_13::1::49:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Saoly, dia nanjaka nandimby azy Bala-hanana, zanak''i Akbora.'
mg1865::mg_13::1::50:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Bala-hanana, dia nanjaka nandimby azy Hadada; ary Pao no anaran''ny tanànany; ary ny anaran''ny vadiny dia Mehetabela, zanakavavin''i Matreda, zanakavavin''i Me-zahaba.'
mg1865::mg_13::1::51:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia maty koa Hadada. Ary ny loham-pirenen''i Edoma dia Timna loham-pireneny, Alva loham-pireneny, Jetata loham-pireneny,'
mg1865::mg_13::1::52:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Oholibama loham-pireneny, Elaha loham-pireneny, Pinona loham-pireneny,'
mg1865::mg_13::1::53:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kenaza loham-pireneny, Temana loham-pireneny, Mibzara loham-pireneny,'
mg1865::mg_13::1::54:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 1
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Magdiela loham-pireneny, Irama loham-pireneny. Ireo no loham-pirenen''i Edoma.'
mg1865::mg_13::2::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny zanakalahin''Isiraely, sy ny taranak''i Joda, ary ny fonenany'
  verse_text: 'Izao no zanakalahin''Isiraely: Robena sy Simeona sy Levy sy Joda sy Isakara sy Zebolona'
mg1865::mg_13::2::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Dana sy Josefa sy Benjamina sy Naftaly sy Gada ary Asera.'
mg1865::mg_13::2::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Joda dia Era sy Onana ary Sela; ireo telo ireo no naterak''i Batsoa Kananita taminy. Ary ratsy fanahy teo imason''i Jehovah Era, lahimatoan''i Joda, dia nahafaty azy Jehovah.'
mg1865::mg_13::2::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Tamara vinantoni-vavy niteraka an''i Fareza sy Zera taminy. Dimy no zanakalahin''i Joda rehetra.'
mg1865::mg_13::2::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Fareza dia Hezrona sy Hamola.'
mg1865::mg_13::2::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Zera dia Zimry sy Etana sy Hemana sy Kalkola ary Dara; dimy lahy no isany.'
mg1865::mg_13::2::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Karmy dia Akara, izay nampidi-doza tamin''ny Isiraely, dia ilay nandika ny didy ny amin''ny zavatra voaozona*. [*Hebreo: natao herema]'
mg1865::mg_13::2::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Etana dia Azaria.'
mg1865::mg_13::2::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Hezrona izay naterany dia Jeramela sy Rama ary Kelobay;'
mg1865::mg_13::2::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Rama niteraka an''i Aminadaba; ary Aminadaba niteraka an''i Nasona, lohan''ny taranak''i Joda;'
mg1865::mg_13::2::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Nasona niteraka an''i Salma; ary Salma niteraka an''i Boaza;'
mg1865::mg_13::2::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Boaza niteraka an''i Obeda; ary Obeda niteraka an''i Jese;'
mg1865::mg_13::2::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jese niteraka an''i Eliaba, lahimatoa, sy Abinadaba, lahiaivo, sy Simea, fahatelo,'
mg1865::mg_13::2::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Netanela, fahefatra, sy Raday, fahadimy,'
mg1865::mg_13::2::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ozema, fahenina, ary Davida, faralahy;'
mg1865::mg_13::2::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zeroba sy Abigaila no anabaviny; ary telo ny zanakalahin''i Zeroia, dia Abisay sy Joaba ary Asahela;'
mg1865::mg_13::2::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Abigaila niteraka an''i Amasa; ary Jitra Isimaelita no rain''i Amasa.'
mg1865::mg_13::2::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kaleba, zanakalahin''i Hezrona, niteraka tamin''i Azoba vadiny sy tamin''i Jeriota. Izao no zanakalahin''i Azoba: Jasera sy Sobaba ary Ardona.'
mg1865::mg_13::2::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maty Azoba, dia Efrata no nalain''i Kaleba ho vadiny, ary izy niteraka an''i Hora taminy;'
mg1865::mg_13::2::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hora niteraka an''i Ory; ary Ory niteraka an''i Bezalila.'
mg1865::mg_13::2::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka izany, Hezrona niray tamin''ny zanakavavin''i Makira, rain''i Gileada, izay novadiny rehefa enim-polo taona izy, dia niteraka an''i Segoba taminy ravehivavy;'
mg1865::mg_13::2::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Segoba niteraka an''i Jaira, izay nanana tanàna madinika telo amby roa-polo tany amin''ny tany Gileada.'
mg1865::mg_13::2::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Gesora sy Arama tamin''ny Jairita ny tanàna madinika an''i Jaira mbamin''i Kenata sy ny zana-bohiny, dia tanàna enim-polo izany. Ireo rehetra ireo no an''ny zanak''i Makira, rain''i Gileada.'
mg1865::mg_13::2::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maty Hezrona tany Kaleba-efrata, Abia, vadin''i Hezrona, dia niteraka an''i Asora, razamben''ny any Tekoa, taminy.'
mg1865::mg_13::2::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jeramela, lahimatoan''i Hezrona, dia Rama, lahimatoa, sy Bona sy Orena sy Ozema ary Ahia.'
mg1865::mg_13::2::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jeramela nanana vady hafa koa atao hoe Atara; izy no renin''i Onama.'
mg1865::mg_13::2::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Rama, lahimatoan''i Jeramela, dia Maza sy Jamina ary Ekera.'
mg1865::mg_13::2::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Onama dia Samay sy Jada. Ary ny zanakalahin''i Samay dia Nadaba sy Abisora.'
mg1865::mg_13::2::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ny vadin''i Abisora dia Abihaila; ary izy niteraka an''i Abana sy Molida taminy.'
mg1865::mg_13::2::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Nadaba dia Saleda sy Apaima; fa maty momba Saleda.'
mg1865::mg_13::2::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Apaima dia Jisy Ary ny zanakalahin''i Jisy dia Sesana. Ary ny zanakalahin''i Sesana dia Ahelay.'
mg1865::mg_13::2::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jada, rahalahin''i Samay, dia Jatera sy Jonatana; nefa maty momba Jatera.'
mg1865::mg_13::2::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jonatana dia Paleta sy Zaza. Ireo no zanakalahin''i Jeramela.'
mg1865::mg_13::2::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Sesana tsy nanana zanakalahy, fa vavy avokoa. Ary Sesana nanana mpanompo Egyptiana, Jara no anarany.'
mg1865::mg_13::2::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zananivavy nomen''i Sesana ho vadin''i Jara mpanompony; ary izy niteraka an''i Atahy taminy.'
mg1865::mg_13::2::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Atahy niteraka an''i Natana; ary Natana niteraka an''i Zabada;'
mg1865::mg_13::2::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Zabada niteraka an''i Efiala; ary Efiala niteraka an''i Obeda;'
mg1865::mg_13::2::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Obeda niteraka an''i Jeho; ary Jeho niteraka an''i Azaria;'
mg1865::mg_13::2::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Azaria niteraka an''i Haleza; ary Haleza niteraka an''i Elasa;'
mg1865::mg_13::2::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Elasa niteraka an''i Sismay; ary Sismay niteraka an''i Saloma;'
mg1865::mg_13::2::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Saloma niteraka an''i Jekamia; ary Jekamia niteraka an''i Elisama.'
mg1865::mg_13::2::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kaleba, rahalahin''i Jeramela, dia Mesa, lahimatoa, razamben''ny any Zifa, sy ny zanakalahin''i Maresa, razamben''ny any Hebrona.'
mg1865::mg_13::2::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Hebrona dia Kora sy Tapoa sy Rakema ary Sema.'
mg1865::mg_13::2::44:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Sema niteraka an''i Rahama, rain''i Jorkeama, ary Rakema niteraka an''i Samay;'
mg1865::mg_13::2::45:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zanakalahin''i Samay dia Maona, ary Maona no razamben''ny any Beti-zora;'
mg1865::mg_13::2::46:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Efaha, vaditsindranon''i Kaleba, niteraka an''i Harana sy Moza sy Gazeza; ary Harana niteraka an''i Gazeza.'
mg1865::mg_13::2::47:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jeday dia Ragema sy Jotama sy Gesana sy Paleta sy Efaha ary Safa.'
mg1865::mg_13::2::48:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maka, vaditsindranon''i Kaleba, niteraka an''i Sabera sy Tirana.'
mg1865::mg_13::2::49:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy koa niteraka an''i Safa, razamben''ny any Madmana, sy Seva, razamben''ny any Makbena sady razamben''ny any Gibea; ary ny zanakavavin''i Kaleba dia Aksa.'
mg1865::mg_13::2::50:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no zanakalahin''i Kaleba, zanak''i Hora, lahimatoan''i Efrata: Sobala, razamben''ny any Kiriata-Jearima,'
mg1865::mg_13::2::51:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Salma, razamben''ny any Betlehema, Harefa, razamben''ny any Beti-gadera.'
mg1865::mg_13::2::52:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Sobala, razamben''ny any Kiriata Zarima, nanan-janakalahy, dia Haroe sy Hatsi-hamenokota'
mg1865::mg_13::2::53:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fokon''i Kiriata-Jearima koa, dia ny Jitrita sy ny Potita sy ny Somatita ary ny Misraita; avy tamin''ireo no nihavian''ny Zoraita sy ny Estaolita.'
mg1865::mg_13::2::54:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Salma dia Betlehema sy ny Netofatita sy Atrota-beti-joaba ary Hatsi-hamanatita sy ny Zoraita'
mg1865::mg_13::2::55:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 2
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fokon''ny mpanoratra izay nonina tany Jabeza, dia ny Tiratita sy ny Simeatita ary ny Sokatita. Ireo no Kenita avy tamin''i Hamata, rain''ny taranak''i Rekaba.'
mg1865::mg_13::3::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny taranak''i Davida'
  verse_text: 'Ary izao no zanakalahin''i Davida, izay naterany tao Hebrona: Amnona, zanak''i Ahinoama Jezirelita, no lahimatoa; ary Daniela, zanak''i Abigaila Karmelita, no lahiaivo;'
mg1865::mg_13::3::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Absaloma, zanak''i Maka, zanakavavin''i Talmay, mpanjakan''i Gesora, no fahatelo; Adonia, zanak''i Hagita, no fahefatra;'
mg1865::mg_13::3::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sefatia, zanak''i Abitala, no fahadimy; Jitreama, zanak''i Egla vadiny, no fahenina.'
mg1865::mg_13::3::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo enina ireo no naterany tao Hebrona; fa tao no nanjakany fito taona sy enim-bolana; ary tany Jerosalema kosa no nanjakany telo amby telo-polo taona.'
mg1865::mg_13::3::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no naterany tany Jerosalema: Simea sy Sobaba sy Natana ary Solomona (ireo efa-dahy ireo no naterak''i Batsoa, zanakavavin''i Amiela)'
mg1865::mg_13::3::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jibara sy Elisama sy Elifeleta'
mg1865::mg_13::3::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Noga sy Nafega sy Jafia'
mg1865::mg_13::3::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elisama sy Eliada ary Elifeleta; dia sivy kosa ireo.'
mg1865::mg_13::3::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo no zanakalahin''i Davida, afa-tsy ny zanaky ny vaditsindranony sy Tamara, anabavin''ireo.'
mg1865::mg_13::3::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Solomona dia Rehoboama, Abia no zanakalahin-dRehoboama, Asa no zanakalahin''i Abia, Josafata no zanakalahin''i Asa,'
mg1865::mg_13::3::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehorama no zanakalahin''i Josafata, Ahazia no zanakalahin''i Jehorama. Joasy no zanakalahin''i Ahazia,'
mg1865::mg_13::3::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amazia no zanakalahin''i Joasy, Azaria no zanakalahin''Amazia, Jotama no zanakalahin i Azaria,'
mg1865::mg_13::3::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahaza no zanakalahin''i Jotama Hezekia no zanakalahin''i Ahaza, Manase no zanakalahin''i Hezetia,'
mg1865::mg_13::3::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amona no zanakalahin''i Manase, Josia no zanakalahin''i Amona.'
mg1865::mg_13::3::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no zanakalahin''i Josia: Johanana, lahimatoa, Joiakima, lahiaivo, Zedekia, fahatelo, Saloma, faralahy.'
mg1865::mg_13::3::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Joiakima dia Jekonia, ary Zedekia no zanak''i Jekonia.'
mg1865::mg_13::3::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''Jekonia dia Asira*, Sealtiela no zanak''i Asira, [*Na: Jekonia mpifatotra]'
mg1865::mg_13::3::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Malkirama koa sy Pedaia sy Senazara sy Jekamia sy Hosama ary Nedabia.'
mg1865::mg_13::3::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Pedaia dia Zerobabela sy simey. Ary ny zanakalahin''i Zerobabela dia Mesolama sy Hanania ary Selomita, anabaviny,'
mg1865::mg_13::3::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hasoba sy Ohela sy Berekia sy Hasadia ary Josaba-heseda; dimy izy.'
mg1865::mg_13::3::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Hanania dia Pelatia sy Jisaia sy ny zanakalahin''i Rafaia sy ny zanakalahin''i Arnana sy ny zanakalahin''i Obadia ary ny zanakalahin''i Sekania.'
mg1865::mg_13::3::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Sekania dia Semaia. Ary ny zanakalahin''i Semaia dia Hatosy sy Jigala sy Baria sy Nearia ary Safata; enina izy.'
mg1865::mg_13::3::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Nearia dia Elioenay sy Hezekia ary Azrikama; telo izy.'
mg1865::mg_13::3::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Elioenay dia Hodaia sy Eliasiba sy Pelaia sy Akoba sy Johanana sy Delaia ary Anany; fito izy.'
mg1865::mg_13::4::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny taranak''i Joda sisa'
  verse_text: 'Ny zanakalahin''i Joda dia Fareza sy Hezrona sy Karmy sy Hora ary Sobala.'
mg1865::mg_13::4::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Reaia, zanakalahin''i Sobala, niteraka an''i Jahata; ary Jahata niteraka an''i Ahomay sy Lahada. Ireo no fokon''ny Zoraita.'
mg1865::mg_13::4::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no avy amin''ny rain''i Etama: Jezirela sy Jisma ary Jidbasy, ary Hazelelpony no anaran''ny anabaviny,'
mg1865::mg_13::4::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Penoela, rain''i Gedora, sy Ezera, rain''i Hosa. Ireo no zanak''i Hora, lahimatoan''i Efrata, razamben''ny any Betlehema.'
mg1865::mg_13::4::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asora, razamben''ny any Tekoa, namporafy, dia Hela sy Nara.'
mg1865::mg_13::4::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nara niteraka an''i Ahozama sy Hafera sy Temeny ary Hahastary. Ireo no zanakalahin''i Nara.'
mg1865::mg_13::4::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Hela dia Zareta sy Jizara ary Etnana.'
mg1865::mg_13::4::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hakoza niteraka an''i Anoba sy Zobeba ary ny fokon''i Aharela, zanakalahin''i Haroma.'
mg1865::mg_13::4::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jabeza dia nalaza noho ny rahalahiny; ary ny reniny nanao ny anarany hoe Jabeza, fa hoy izy: Ory aho, raha niteraka azy.'
mg1865::mg_13::4::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jabeza niantso an''Andriamanitry ny Isiraely hoe: Enga anie ka hotahinao tokoa aho, ka hohalalahinao ny faritaniko, ary ho amiko ny tananao, ka harovanao amin''ny ratsy aho, mba tsy hampahory ahy izany. Ary dia nomen''Andriamanitra azy ny nangatahiny.'
mg1865::mg_13::4::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Keloba, rahalahin''i Soha, niteraka an''i Mehira, rain''i Estona;'
mg1865::mg_13::4::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Estona niteraka an''i Betirafa sy Pasea ary Tehina, rain''Ir-nahasa. Ireo dia mponina tao Reka.'
mg1865::mg_13::4::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kenaza dia Otniela sy Seraia; ary ny zanakalahin''i Otniela dia Hatata.'
mg1865::mg_13::4::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Meonotahy niteraka an''i Ofra; ary Seraia niteraka an''i Joaba, razamben''ny ao an-dohasahan''ny mpiasa; fa mpiasa ireo.'
mg1865::mg_13::4::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kaleba, zanakalahin''i Jefone, dia Iro sy Elaha sy Nama; ary ny zanakalahin''i Elaha dia Kenaza.'
mg1865::mg_13::4::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jehalalila dia Zifa sy Zifaha sy Tiria ary Asarela.'
mg1865::mg_13::4::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Ezra dia Jatera sy Mareda sy Efera ary Jalona; ary izy niteraka an''i Miriama sy Samay ary Jisba, razamben''ny any Estemoa.'
mg1865::mg_13::4::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehodia vadiny niteraka an''i Jareda, razamben''ny any Gedora, sy Hebera, razamben''ny any Soko, ary Jakotiela, razamben''ny any Zanoa. Ireo no zanakalahin''i Bitia, zanakavavin''i Farao, izay novadin''i Mareda.'
mg1865::mg_13::4::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Hodia vadiny, izay anabavin''i Nahama, dia ny razamben''ny an''i Keila Garmita sy Estemoa Makatita.'
mg1865::mg_13::4::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Simona dia Amnona sy Rina sy Ben-hanana ary Tilona. Ary ny zanakalahin''i Jisy dia Zoheta sy Ben-zoheta.'
mg1865::mg_13::4::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Sela, zanak''i Joda, dia Era, rain''i Leka, sy Lada, rain''i Maresa, sy ny fokon''ny mpanao rongony fotsy madinika amin''ny ankohonan''i Asbea;'
mg1865::mg_13::4::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jokima sy ny mponina tao Kozeba ary Joasy sy Sarafa, izay samy nanapaka tany Moaba, ary Jasobi-lehema. Ary efa ela izany zavatra izany.'
mg1865::mg_13::4::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no mpanefy vilany sy mponina tany Netaima sy Gadera; tany no nitoerany tamin''ny mpanjaka hanao ny asany.'
mg1865::mg_13::4::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny taranak''i Simeona sy ny fonenany'
  verse_text: 'Ny zanakalahin''i Simeona dia Nemoela sy Jamina sy Jariba sy Zera ary Saoly,'
mg1865::mg_13::4::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Saloma no zanakalahin''i Saoly, Mibsama no zanakalahin''i Saloma, Misma no zanakalahin''i Mibsama.'
mg1865::mg_13::4::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Misma dia Hamoela, ary Zakora no zanakalahin''i Hamoela, Simey no zanakalahin''i Zakora.'
mg1865::mg_13::4::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simey nanan-janaka enina ambin''ny folo lahy sy enim-bavy; fa ny rahalahiny tsy nanan-janaka maro, sady tsy nihamaro tahaka ny taranak''i Joda ny fokony rehetra.'
mg1865::mg_13::4::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nonina tao Beri-sheba sy Molada sy Hazara-soala'
mg1865::mg_13::4::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Bila sy Ezema sy Tolada'
mg1865::mg_13::4::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Betoela sy Horma sy Ziklaga'
mg1865::mg_13::4::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Beti-markabota sy Hazora-sosima sy Beti-biry ary Saraima. Ireo no tanàna nonenany mandra-panjakan''i Davida.'
mg1865::mg_13::4::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zana-bohiny dia Etama sy Aina sy Rimona sy Tokena ary Asana, tanana dimy ireo,'
mg1865::mg_13::4::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zana-bohiny rehetra koa izay manodina izany tanàna izany hatrany Bala. Ireo no fonenany sady nanana fitantaram-pirazanana manokana izy.'
mg1865::mg_13::4::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mesobaba sy Jamleka sy Josa, zanak''i Amazia,'
mg1865::mg_13::4::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Joela sy Jeho, zanak''i Josibia, zanak''i Seraia, zanak''i Asiela,'
mg1865::mg_13::4::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Elioenay sy Jakoba sy Jesohaia sy Asaia sy Adiela sy Jesimiela sy Benaia'
mg1865::mg_13::4::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ziza, zanak''i Sify, zanak''i Alona, zanak''i Jedaia, zanak''i Simry, zanak''i Semaia;'
mg1865::mg_13::4::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ireo voalaza anarana ireo dia samy lohany tamin''ny fotony avy; ary efa nihamaro indrindra ny fianakaviany.'
mg1865::mg_13::4::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankany amin''ny fidirana ho any Gedora izy, dia hatramin''ny ilany atsinanana amin''ny lohasaha, hitady ahitra ho an''ny ondriny aman''osiny.'
mg1865::mg_13::4::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita ahitra maitso sady tsara izy, ary malalaka ny tany sady nandry fahizay; nefa ny taranak''i Hama no nonina tany taloha.'
mg1865::mg_13::4::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo voasoratra anarana ireo dia tonga tao tamin''ny andron''i Hezekia, mpanjakan''ny Joda, ka namely ny lay sy ny fonenana* hitany tao sy nandringana** azy rehetra mandraka ankehitriny, dia nonina nisolo azy; fa nisy ahitra ho an''ny ondriny aman''osiny tany. [*Na: sy ny Meonita] [**Hebreo: nanao azy ho herema]'
mg1865::mg_13::4::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy dimam-jato tamin''ny taranak''i Simeona nankany amin''ny tendrombohitra Seira ka nanana an''i Peletia sy Nearia sy Refaia ary Oziela, zanakalahin''i Jisy, ho mpifehy azy.'
mg1865::mg_13::4::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 4
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namely ny sisa afaka tamin''ny Amalekita izy, ka dia monina ao mandraka androany.'
mg1865::mg_13::5::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny taranak''i Robena sy Gada ary ny antsasaky ny firenen''i Manase'
  verse_text: 'Ary ny zanakalahin''i Robena, lahimatoan''Isiraely (fa izy no lahimatoa; saingy ny nandotoany ny farafaran-drainy no nanomezana ny fizokiany ho an''ny zanak''i Josefa, zanak''Isiraely; nefa tsy voasoratra ho zokiny amin''ny fitantaram-pirazanana ireo;'
mg1865::mg_13::5::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Joda nisandratra noho ny rahalahiny, ary izy no nihavian''ny mpanapaka; nefa ny fizokiana kosa dia an''i Josefa ihany),'
mg1865::mg_13::5::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny zanakalahin''i Robena, lahimatoan''Isiraely, dia Hanoka sy Palo sy Hezrona ary Karmy.'
mg1865::mg_13::5::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Joela dia Semaia, ary Goga no zanakalahin''i Semaia, Sirney no zanakalahin''i Goga,'
mg1865::mg_13::5::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mika no zanakalahin''i simey, Reaia no zanakalahin''i Mika, Bala no zanakalahin''i Reaia,'
mg1865::mg_13::5::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Bera no zanakalahin''i Bala, izay nobaboin''i Tiglato-pilesera, mpanjakan''i Asyria; izy no loham-pirenen''ny Robenita.'
mg1865::mg_13::5::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahiny araka ny fokony avy, raha nisaina ny firazanan''ny fireneny, dia Jeiela lohany sy Zakaria'
mg1865::mg_13::5::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Bela, zanak''i Azaza, zanak''i Sema, zanak''i Joela, izay nonina tao Aroera hatrany Nebo sy Balameona.'
mg1865::mg_13::5::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nonina tany atsinanana hatrany akaikin''ny efitra ka hatramin''ny ony Eofrata izy; fa ny ombiny aman''ondriny nihamaro teny amin''ny tany Gileada.'
mg1865::mg_13::5::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andron''i Saoly dia niady tamin''ny Hagarita izy ka naharesy azy; ary nonina an-day eran''ny ilany atsinanana rehetra amin''i Gileada* izy. [*Na: tany antsinanan''i Gileada]'
mg1865::mg_13::5::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Gada nonina tandrifiny, teny amin''ny tany Basana hatrany Saleka;'
mg1865::mg_13::5::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Joela no lohany, dia Safama no manarakaraka, dia Janay sy Safata tany Basana.'
mg1865::mg_13::5::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahiny araka ny fianakaviany avy dia Mikaela sy Mesolama sy Seba sy Joray sy Jakana sy Zia ary Ebera; fito izy.'
mg1865::mg_13::5::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no zanakalahin''i Abihaila, zanak''i Hory, zanak''i Jaroa, zanak''i Gileada, zanak''i Mikaela, zanak''i Jesisay, zanak''i Jado, zanak''i Boza;'
mg1865::mg_13::5::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahia, zanak''i Abdiela, zanak''i Gony, no lohan''ny fianakaviany.'
mg1865::mg_13::5::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nonina tany Gileada sy tany Basana sy tamin''ny zana-bohiny ary tamin''ny tany rehetra an-tsisin''i Sardna manodidina izy.'
mg1865::mg_13::5::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo dia nisaina araka ny firazanany tamin''ny andron''i Jotama, mpanjakan''ny Joda, sy tamin''ny andron''i Jeroboama, mpanjakan''ny Isiraely.'
mg1865::mg_13::5::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Robena sy ny Gadita ary ny antsasaky ny firenen''i Manase, izay isan''ny lehilahy mahery, ka lehilahy mahatana ampinga sy sabatra ary mahahenjana tsipïka sady zatra ny miady, dia enim-polo amby fiton-jato amby efatra arivo sy efatra alina no isan''ny azo nalefa hanafika.'
mg1865::mg_13::5::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady tamin''ny Hagarita sy tamin''i Jetora sy Nafisy ary Nodaba izy.'
mg1865::mg_13::5::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nombana hamely ireo izy, ka dia voatolotra teo an-tanany ny Hagarita mbamin''izay rehetra nomba azy, satria nitaraina tamin''Andriamanitra teo amin''ny ady izy, ary nekeny ny fangatahany noho ny fahatokiany Azy.'
mg1865::mg_13::5::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nobaboiny ny bibiny, dia rameva dimy alina sy ondry aman''osy dimy alina amby roa hetsy sy boriky roa arivo ary olona iray hetsy;'
mg1865::mg_13::5::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa maro ny faty niampatrampatra, satria avy tamin''Andriamanitra ny ady. Ary nonina nandimby ireo izy mandra-pahatongan''ny namaboana azy kosa.'
mg1865::mg_13::5::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranaky ny antsasaky ny firenen''i Manase dia nonina tamin''ny tany; ary nihamaro izy hatrany Basana ka hatrany Bala-hermona sy Senira ary hatramin''ny tendrombohitra Hermona.'
mg1865::mg_13::5::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no lohan''ny fianakaviany: Efera sy Jisy sy Eliala sy Azriela sy Jeremia sy Hodavia ary Jadiela; lehilahy mahery ireo ary malaza sady samy lohan''ny fianakaviany avy.'
mg1865::mg_13::5::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivadika tamin''Andriamanitry ny razany ireo, fa nijangajanga nanaraka ny andriamanitry ny tompon-tany, izay naringan''Andriamanitra tsy ho eo anoloany.'
mg1865::mg_13::5::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitry ny Isiraely namporisika an''i Pola, mpanjakan''i Asyria, sy Tiglato-pilesera mpanjakan''i Asyria, ka dia nobaboin''ireo ny Robenita sy ny Gadita sy ny antsasaky ny firenen''i Manase ka nentiny tany Hala sy Habora sy Hara ary tany amoron''ny ony Gozana ambaraka androany.'
mg1865::mg_13::5::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny taranak''i Levy'
  verse_text: 'Ny zanakalahin''i Levy dia Gersona sy Kehata ary Merary.'
mg1865::mg_13::5::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela.'
mg1865::mg_13::5::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''i Amrama dia Arona sy Mosesy ary Miriama. Ny zanakalahin''i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara.'
mg1865::mg_13::5::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eleazara niteraka an''i Finehasa; ary Finehasa niteraka an''i Abisoa;'
mg1865::mg_13::5::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Abisoa niteraka an''i Boky; ary Boky niteraka an''i Ozy;'
mg1865::mg_13::5::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ozy niteraka an''i Zerahia; ary Zerahia niteraka an''i Meraiota;'
mg1865::mg_13::5::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Meraiota niteraka an''i Amaria; ary Amaria niteraka an''i Ahitoba;'
mg1865::mg_13::5::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ahitoba niteraka an''i Zadoka; ary Zadoka niteraka an''i Ahimaza;'
mg1865::mg_13::5::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ahimaza niteraka an''i Azaria; ary Azaria niteraka an''i Johanana;'
mg1865::mg_13::5::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Johanana niteraka an''i Azaria (ilay nanao fisoronana tao amin''ny trano nataon''i Solomona tany Jerosalema)'
mg1865::mg_13::5::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Azaria niteraka an''i Amaria; ary Amaria niteraka an''i Ahitoba;'
mg1865::mg_13::5::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ahitoba niteraka an''i Zadoka; ary Zadoka niteraka an''i Saloma;'
mg1865::mg_13::5::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Saloma niteraka an''i Hilkia; ary Hilkia niteraka an''i Azaria;'
mg1865::mg_13::5::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Azaria niteraka an''i Seraia; ary Seraia niteraka an''i Jozadaka;'
mg1865::mg_13::5::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 5
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia lasan-ko babo Jozadaka, nony voatolotr''i Jehovah ho babon''i Nebokadnezara ny Joda sy Jerosalema.'
mg1865::mg_13::6::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Levy dia Gersona sy Kehata ary Merary.'
mg1865::mg_13::6::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny zanakalahin''i Gersona: Libny sy Semey.'
mg1865::mg_13::6::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela.'
mg1865::mg_13::6::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Merary dia Maly sy Mosy. Ary izao no fokon''ny Levita araka ny rainy:'
mg1865::mg_13::6::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy amin''i Gersona: Libny no zanak''i Gersona, Jahata no zanak''i Libny, Zima no zanak''i Jahata,'
mg1865::mg_13::6::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Joa no zanak''i Zima, Ido no zanak''i Joa, Zera no zanak''Ido, Jeateray zanak''i Zera.'
mg1865::mg_13::6::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Kehata dia Aminadaba, Kora no zanakalahin''i Aminadaba, Asira no zakalahin''i Kora,'
mg1865::mg_13::6::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Elkana no zanakalahin''i Asira, Ebiasafa no zanakalahin''i Elkana, Asira no zanakalahin''i Ebiasafa,'
mg1865::mg_13::6::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahata no zanakalahin''i Asira, Oriela no zanakalahin''i Tahata, Ozia no zanakalahin''i Oriela, ary Saoly no zanakalahin''i Ozia.'
mg1865::mg_13::6::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zakalahin''i Elkana dia Amasay sy Ahimota.'
mg1865::mg_13::6::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''i Elkana, ny zananilahy dia Zofay, ary Nahata no zanakalahin''i Zofay,'
mg1865::mg_13::6::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eliaba no zanakalahin''i Nahata, Jerohama no zanakalahin''i Eliaba, Elkana no zanakalahin''i Jerohama.'
mg1865::mg_13::6::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Samoela dia Vasny lahimatoa sy Abia*. [*Na: (Jozla sy Abia faralahy) izahao I Tantara 6:18 sy I Samoela 8:2]'
mg1865::mg_13::6::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Merary dia Maly, Libny no zanakalahin''i Maly, Semey no zanakalahin''i Libny, Oza no zanakalahin''i Semey,'
mg1865::mg_13::6::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Simea no zanakalahin''i Oza, Hagia no zanakalahin''i Simea, Asaba no zanakalahin''i Hagia.'
mg1865::mg_13::6::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no notendren''i Davida ho mpiventy hira tao amin''ny tranon''i Jehovah, rehefa voapetraka tao ny fiara,'
mg1865::mg_13::6::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hira fanompoam-pivavahana izy tao amin''ny tabernakely, dia ny trano-lay fihaonana, ambara-panaon''i Solomona ny tranon''i Jehovah tany Jerosalema; koa raha nanao ny raharahany izy, dia nitsangana araka ny filaharany avy,'
mg1865::mg_13::6::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao no nanompo mbamin''ny zanany: Tamin''ny zanakalahin''ny Kehatita dia Hemana mpihira, zanakalahin''i Joela, zanakalahin''i Samoela,'
mg1865::mg_13::6::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Elkana, zanakalahin''i Jerohama, zanakalahin''i Eliala, zanakalahin''i Toa.'
mg1865::mg_13::6::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Zofa, zanakalahin''i Elkana, zanakalahin''i Mahata, zanakalahin''i Amasay,'
mg1865::mg_13::6::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Elkana, zanakalahin''i Joela, zanakalahin''i Azaria, zanakalahin''i Zefania,'
mg1865::mg_13::6::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Tahata, zanakalahin''i Asira, zanakalahin''i Ebiasafa, zanakalahin''i Kora,'
mg1865::mg_13::6::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Jizara, zanakalahin''i Kehata, zanakalahin''i Levy, zanak''Isiraely.'
mg1865::mg_13::6::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asafa rahalahiny, izay nitsangana teo amin''ny ankavanany, dia Asafa, zanakalahin''i Berekia, zanakalahin''i Simea,'
mg1865::mg_13::6::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Mikaela, zanakalahin''i Beseia, zanakalahin''i Malkia,'
mg1865::mg_13::6::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Etny, zanakalahin''i Zera, zanakalahin''i Adaia,'
mg1865::mg_13::6::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Etana, zanakalahin''i Zima, zanakalahin''i Simey,'
mg1865::mg_13::6::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Jahata, zanakalahin''i Gersona, zanakalahin''i Levy.'
mg1865::mg_13::6::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahin''ireo kosa, dia ny zanakalahin''i Merary, nitsangana teo amin''ny ankaviany: Etana, zanakalahin''i Kisy, zanakalahin''i Abdia, zanakalahin''i Maloka,'
mg1865::mg_13::6::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Hasabia, zanakalahin''i Amazia, zanakalahin''i Hilkia,'
mg1865::mg_13::6::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Amzy, zanakalahin''i Bany, zanakalahin''i Samera,'
mg1865::mg_13::6::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanakalahin''i Maly, zanakalahin''i Mosy, zanakalahin''i Merary, zanakalahin''i Levy.'
mg1865::mg_13::6::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita rahalahin''ireo koa dia efa nomena hanao ny fanompoana rehetra ao amin''ny tabernakelin''ny tranon''Andriamanitra.'
mg1865::mg_13::6::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Arona sy ny zananilahy no nanatitra* teo ambonin''ny alitara fandoroana ny fanatitra dorana sy teo ambonin''ny alitara fandoroana ditin-kazo manitra, mba hanao ny raharaha rehetra ao amin''ny fitoerana masina indrindra sy hanao fanavotana ho an''ny Isiraely, araka izay rehetra nandidian''i Mosesy, mpanompon''Andriamanitra. [*Hebreo: nandoro ho fofona]'
mg1865::mg_13::6::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Arona dia Eleazara, ary Finehasa no zanakalahin''i Eleazara, Abisoa no zanakalahin''i Finehasa,'
mg1865::mg_13::6::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Boky no zanakalahin''i Abisoa, Ozy no zanakalahin''i Boky, Zerahia no zanakalahin''i Ozy,'
mg1865::mg_13::6::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Meraiota no zanakalahin''i Zerahia, Amaria no zanakalahin''i Meraiota, Ahitoba no zanakalahin''i Amaria,'
mg1865::mg_13::6::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zadoka no zanakalahin''i Ahitoba, Ahimaza no zanakalahin''i Zadoka.'
mg1865::mg_13::6::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fonenany araka ny vohiny tao amin''ny zara-taniny avy, dia ny an''ny taranak''i Arona, avy amin''ny fokon''ny Kehatita; fa azy ny loka:'
mg1865::mg_13::6::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nomeny azy Hebrona tao amin''ny tanin''ny Joda sy ny tany manodidina azy.'
mg1865::mg_13::6::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny saha momba ny tanàna sy ny vohiny kosa nomeny an''i Kaleba, zanak''i Jefone.'
mg1865::mg_13::6::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Arona nomeny an''i Hebrona, tanàna fiarovana, ary Libna sy ny tany manodidina azy ary Jatira sy Estemoa sy ny tany manodidina azy'
mg1865::mg_13::6::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hilena sy ny tany manodidina azy ary Debira sy ny tany manodidina azy'
mg1865::mg_13::6::44:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Asana sy ny tany manodidina azy ary Beti-semesy sy ny tany manodidina azy;'
mg1865::mg_13::6::45:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary avy tamin''ny firenen''i Benjamina dia Geba sy ny tany manodidina azy ary Alemeta sy ny tany manodidina azy ary Anotata sy ny tany manodidina azy. Dia telo ambin''ny folo no isan''ny tanànan''izy mianakavy rehetra.'
mg1865::mg_13::6::46:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny an''ny taranak''i Kehata sisa tamin''ny fokon''izany firenena izany dia tanàna folo araka ny filokana tamin''ny antsasaky ny firenen''i Manase.'
mg1865::mg_13::6::47:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny an''ny taranak''i Gersona araka ny fokony dia tanàna telo ambin''ny folo tamin''ny firenen''Isakara sy ny firenen''i Asera sy ny firenen''i Naftaly ary ny firenen''i Manase any Basana.'
mg1865::mg_13::6::48:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loka azon''ny taranak''i Merary araka ny fokony dia tanàna roa ambini ny folo avy tamin''ny firenen''i Robena sy ny firenen''i Gada ary ny firenen''i Zebolona.'
mg1865::mg_13::6::49:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomen''ny Zanak''i Isiraely ho an''ny Levita ireo tanàna ireo sy ny tany manodidina azy.'
mg1865::mg_13::6::50:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeny tamin''ny filokana ireto tanàna tononina ireto avy tamin''ny firenena taranak''i Joda sy ny firenena taranak''i Simeona ary ny firenena taranak''i Benjamina.'
mg1865::mg_13::6::51:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany amin''ny fokon''ny taranak''i Kehata dia nahazo tanàna avy tamin''ny firenen''i Efraima.'
mg1865::mg_13::6::52:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeny azy Sekema, tanàna fiarovana, tao amin''ny tany havoan''i Efraima sy ny tany manodidina azy ary Gazera sy ny tany manodidina azy'
mg1865::mg_13::6::53:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jokmeama sy ny tany manodidina azy ary Beti-horona sy ny tany manodidina azy'
mg1865::mg_13::6::54:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Aialona sy ny tany manodidina azy ary Gata-rimona sy ny tany manodidina azy;'
mg1865::mg_13::6::55:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny antsasaky ny firenen''i Manase dia Amera sy ny tany manodidina azy ary Bileama sy ny tany manodidina azy, dia ho an''ny fokon''ny taranak''i Kehata sisa.'
mg1865::mg_13::6::56:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny an''ny taranak''i Gersona dia Golana any Basana sy ny tany manodidina azy ary Astarta, sy ny tany manodidina azy avy tamin''ny antsasaky ny firenen''i Manase;'
mg1865::mg_13::6::57:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny firenen''Isakara dia Kadesy sy ny tany manodidina azy ary Daberata sy ny tany manodidina azy'
mg1865::mg_13::6::58:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ramota sy ny tany manodidina azy ary Anema sy ny tany manodidina azy;'
mg1865::mg_13::6::59:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny firenen''i Asera dia Masala sy ny tany manodidina azy ary Abdona sy ny tany manodidina azy'
mg1865::mg_13::6::60:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hokoka sy ny tany manodidina azy ary Rehoba sy ny tany manodidina azy;'
mg1865::mg_13::6::61:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy tamin''ny firenen''i Naftaly dia Kadesy any Galilia sy ny tany manodidina azy ary Hamona sy ny tany manodidina azy ary Kiriataima sy ny tany manodidina azy.'
mg1865::mg_13::6::62:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny an''ny sisa, taranak''i Merary, dia avy tamin''ny firenen''i Zebolona, dia Rimono sy ny tany manodidina azy ary Tabara sy ny tany manodidina azy;'
mg1865::mg_13::6::63:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary any an-dafin''i Jordana, tandrifin''i Jeriko, atsinanan''i Jordana, koa dia avy tamin''ny firenen''i Robena, dia Bazera any an''efitra sy ny tany manodidina azy ary Jaza sy ny tany manodidina azy'
mg1865::mg_13::6::64:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Kedemota sy ny tany manodidina azy ary Mefata sy ny tany manodidina azy;'
mg1865::mg_13::6::65:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary avy tamin''ny firenen''i Gada dia Ramota-gileada sy ny tany manodidina azy ary Mahanaima sy ny tany manodidina azy'
mg1865::mg_13::6::66:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 6
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hesbona sy ny tany manodidina azy ary Jazera sy ny tany manodidina azy.'
mg1865::mg_13::7::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny taranak''Isakara sy Benjamina sy Naftaly sy ny antsasaky ny firenen''i Manase sy Efraima ary Asera'
  verse_text: 'Ary ny zanakalahin''Isakara dia Tola sy Poa sy Jasoba ary Simrona; efatra izy.'
mg1865::mg_13::7::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Tola dia Ozy sy Refaia sy Jeriela sy Jamay sy Jibsama ary Samoela, samy lohan''ny fianakaviany avy, dia zanak''i Tola sady samy lehilahy mahery tamin''ny fokony avy ireo; enin-jato amby roa arivo sy roa alina no isany tamin''ny andron''i Davida.'
mg1865::mg_13::7::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Ozy dia Jizrahia. Ary ny zanakalahin''i Jizrahia dia Mikaela sy Obadia sy Joela ary Jisia; dimy izy; loholona avokoa izy rehetra ireo.'
mg1865::mg_13::7::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanana miaramila antokotokony izy araka ny fireneny sy ny fianakaviany avy, dia enina arivo amby telo alina; fa maro ny vady aman-janak''ireo.'
mg1865::mg_13::7::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahiny ao amin''ny fokon''ny Isakara rehetra, izay samy lehilahy mahery, ny isan''izy rehetra araka ny firazanany avy dia fito arivo amby valo alina.'
mg1865::mg_13::7::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Benjamina dia Bela sa Bakera ary Jediaela; telo izy.'
mg1865::mg_13::7::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Bela dia Ezbona sy Ozy sy Oziela sy Jerimota ary Iry; dimy izy, ary samy lohan''ny fianakaviany avy sady lehilahy mahery avokoa; ary ny Isany araka ny firazanany dia efatra amby telo-polo amby roa arivo sy roa alina.'
mg1865::mg_13::7::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Bakera dia Zemira sy Joasy sy Eliezera sy Elioenay sy Omry sy Jerimota sy Abia sy Anatota ary Alameta. Ireo rehetra ireo no zanakalahin''i Bakera.'
mg1865::mg_13::7::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isany araka ny firazanany amin''ny fireneny, izay samy lohan''ny fianakaviany avy sady lehilahy mahery, dia roanjato sy roa alina.'
mg1865::mg_13::7::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Jediaela dia Bilana; ary ny zanakalahin''i Bilana dia Jeosy sy Benjamina sy Ehoda sy Kenana sy Zetana sy Tarsisy ary Ahisahara'
mg1865::mg_13::7::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo zanakalahin''i Jediaela rehetra ireo, araka ny lohan''ny fianakaviany, dia roan-jato amby fito arivo sy iray alina no isan''ny lehilahy mahery azo nalefa hanafika.'
mg1865::mg_13::7::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sopima koa sy Hopima, zanakalahin''Iry, ary Hosima, zanakalahin''i Ahera.'
mg1865::mg_13::7::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Naftaly dia Jaziela sy Gony sy Jezera sy Saloma, samy zanakalahin''i Bila ireo.'
mg1865::mg_13::7::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Manase dia Asriela, Izay naterany; fa ilay Syriana* vaditsindranony kosa no niteraka an''i Matira, rain''i Gileada. [*Hebreo: Aramiana]'
mg1865::mg_13::7::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Makira naka vady ho an''i Hopima sy Sopima; ny anaran''ny rahavaviny dia Imaka; ary ny anaran''ny manarakaraka dia Zelofada; ary Zelofada nanan-janakavavy.'
mg1865::mg_13::7::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Imaka, vadin''i Makira, niteraka zaza, ahy, ka Paresy no nataony anarany; ary Saresy no anaran''ny rahalahiny; ary ny anaran''ny zananilahy dia Olama sy Rakema.'
mg1865::mg_13::7::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Olama dia Bedana. Ireo no zanakalahin''i Gileada, zanakalahin''i Makira, zanakalahin''i Manase.'
mg1865::mg_13::7::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hamoleketa anabaviny niteraka an''Isehoda sy Abiezera ary Mahala.'
mg1865::mg_13::7::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Semida dia Ahiana sy Sekema sy Liky ary Aniama.'
mg1865::mg_13::7::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Efraima dia Sotela (Bareda no zanakalahin''i Sotela, Tahata no zanakalahin''i Bareda, Elada no zanakalahin''i Tahata, Tahata no zanakalahin''i Elada,'
mg1865::mg_13::7::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zabada no zanakalahin''i Tahata, Sotela no zanakalahin''i Zabada) ary Ezera sy Elada, izay novonoin''ny tompon-tany tao Gata, satria nidina hangalatra ny ombiny aman''ondriny izy.'
mg1865::mg_13::7::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Efraima, rainy nisaona azy ela, dia avy ny rahalahiny hampionona azy.'
mg1865::mg_13::7::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niray tamin''ny vadiny izy, dia nanan''anaka ravehivavy ka niteraka zazalahy, ary ny anarany nataony hoe Beria, satria nisy fahoriana tao an-tranony tamin''izany.'
mg1865::mg_13::7::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: '(Ary ny zananivavy dia Sera, izay nanorina an''i Beti-horona ambany sy ambony sy Ozena-sera).'
mg1865::mg_13::7::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Refa sy Rasefa no zanakalahin''i Beria, Tela no zanakalahin''i Rasefa, Tahana no zanakalahin''i Tela,'
mg1865::mg_13::7::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ladana no zanakalahin''i Tahana, Amihoda no zanakalahin''i Ladana, Elisama no zanakalahin''i Amihoda.'
mg1865::mg_13::7::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nona no zanakalahin''i Elisama, Josoa no zanakalahin''i Nona.'
mg1865::mg_13::7::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taniny sy ny fonenany dia Betela sy ny zana-bohiny, ary any atsinanana dia Narana, ary any andrefana dia Gazera sy ny zana-bohiny ary Sekema sy ny zana-bohiny hatrany Gaza sy ny zana-bohiny;'
mg1865::mg_13::7::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary teo amin''ny sisin-tanin''ny taranak''i Manase dia Beti-sana sy ny zana-bohiny, Tanaka sy ny zana-bohiny, Megido sy ny zana-bohiny, Dora sy ny zana-bohiny Tamin''ireo no nonenan''ny taranak''i Josefa, zanak''Isiraely.'
mg1865::mg_13::7::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Asera dia Jimna sy Jisva sy Jisvy sy Beria; ary Sera no anabavin''ireo.'
mg1865::mg_13::7::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Beria dia Hebera sy Malkiela, rain''i Birzavita.'
mg1865::mg_13::7::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hebera niteraka an''i Jafleta sy Somera sy Hotama; ary Soha no anabavin''ireo.'
mg1865::mg_13::7::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jafleta dia Pasaka sy Bimala ary Asvata. Ireo no zanakalahin''i Jafleta.'
mg1865::mg_13::7::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Samera dia Ahaia sy Rohaga sy Hoba ary Arama.'
mg1865::mg_13::7::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Helema rahalahiny dia Zofa sy Jimna sy Selesy ary Amala.'
mg1865::mg_13::7::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Zofa dia Soha sy Harnefera sy Soala sy Bery sy Jimra'
mg1865::mg_13::7::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Bazera sy Hoda sy Sama sy Silsa sy Jitrana ary Bera.'
mg1865::mg_13::7::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jatera dia Jefone sy Pispa ary Ara.'
mg1865::mg_13::7::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Ola dia Ara sy Haniela ary Rizia.'
mg1865::mg_13::7::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 7
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo zanakalahin''i Asera rehetra ireo dia samy lohan''ny fianakaviany, olom-boafidy sady mahery ary lehiben''ny loham-pireneny avy. Ary ny nanisana azy, araka ny firazanany, dia enina arivo amby roa alina no isan''ny azo nalefa hanafika.'
mg1865::mg_13::8::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny taranak''i Benjamina sy ny firazanan''i Saoly'
  verse_text: 'Ary Benjamina niteraka an''i Bela, lahimatoa, sy Asbela, lahiaivo, sy Ahara, fahatelo,'
mg1865::mg_13::8::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Noha, fahefatra, ary Rafa, faralahy.'
mg1865::mg_13::8::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Bela dia Adara sy Gera sy Abihoda'
mg1865::mg_13::8::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Abisoa sy Namana sy Ahoa'
mg1865::mg_13::8::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Gera sy Sefofana ary Horama.'
mg1865::mg_13::8::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no zanakalahin''i Ehoda (izao no lohan''ny fianakavian''ny mponina any Geba; ary nitondra azy ho babo tany Manahata,'
mg1865::mg_13::8::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namana sy Ahia ary Gera; izy no nitondra azy ho babo), niteraka an''i Oza sy Ahihoda izy.'
mg1865::mg_13::8::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saharaima niteraka tao amin''ny tany Moaba taorian''ny nisaorany an''i Hosima sy Bara vadiny.'
mg1865::mg_13::8::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hodesy vadiny no niterahany an''i Jobaba sy Ziba sy Mesa sy Malkama'
mg1865::mg_13::8::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jeoza sy Sakia ary Mirma. Ireo no zananilahy, samy lohan''ny fianakaviany avy.'
mg1865::mg_13::8::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hosima no niterahany an''i Abitoba sy Elpala.'
mg1865::mg_13::8::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Elpala dia Ebera sy Misama ary Samera, izay nanorina an''i Ono sy Loda sy ny zana-bohiny;'
mg1865::mg_13::8::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Beria koa sy Sema, izay lohan''ny fianakavian''ny mponina ao Aialona sady nandroaka ny mponina tao Gata;'
mg1865::mg_13::8::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ahio sy Sasaka sy Jeremota'
mg1865::mg_13::8::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Zebadia sy Arada sy Adera'
mg1865::mg_13::8::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Mikaela sy Jispa sy Joha (zanakalahin''i Beria ireo),'
mg1865::mg_13::8::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Zebadia sy Mesolama sy Hizky sy Hebera'
mg1865::mg_13::8::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jismeray sy Jizlia sy Jobaba (zanakalahin''i Elpala ireo),'
mg1865::mg_13::8::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jakima sy Zikry sy Zabdy'
mg1865::mg_13::8::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elienay sy Ziletahy sy Eliala'
mg1865::mg_13::8::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Adaia sy Beraia sy Simrata (zanakalahin''i Simey ireo),'
mg1865::mg_13::8::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jispana sy Hebera sy Eliala'
mg1865::mg_13::8::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Abdona sy Zikry sy Hanana'
mg1865::mg_13::8::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Hanania sy Elama sy Antotia'
mg1865::mg_13::8::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jifdia sy Penoela (zanakalahin''i Sasaka ireo),'
mg1865::mg_13::8::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Samseray sy Seharia sy Atalia'
mg1865::mg_13::8::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jaresia sy Elia sy Zitry (zanakalahin''i Jerohama ireo).'
mg1865::mg_13::8::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no lohan''ny fianakaviany araka ny firazanany, dia samy loholona. Ireo no nonina tany Jerosalema.'
mg1865::mg_13::8::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao Gibeona no nonenan''ny razamben''ny an''i Gibeona, ary ny anaran''ny vadiny dia Imaka,'
mg1865::mg_13::8::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Abdona no lahimatoany, dia Zora, dia Kisy, dia Bala, dia Nadaba,'
mg1865::mg_13::8::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Gedora, dia Ahio, dia Zakera.'
mg1865::mg_13::8::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Miklota niteraka an''i Simea. Ireo koa dia niara-nonina tamin''ny rahalahiny tany Jerosalema nifanandrify fonenana taminy.'
mg1865::mg_13::8::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nera niteraka an''i Kisy; ary Kisy niteraka an''i Saoly; ary Saoly niteraka an''i Jonatana sy Malkisoa sy Abinadaba ary Esbala.'
mg1865::mg_13::8::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jonatana dia Meribala; ary Meribala niteraka an''i Mika.'
mg1865::mg_13::8::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Mika dia Pitona sy Maleka sy Tarea ary Ahaza.'
mg1865::mg_13::8::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza niteraka an''i Joada; ary Joada niteraka an''i Alemeta sy Azmaveta ary Zimry; ary Zimry niteraka an''i Moza;'
mg1865::mg_13::8::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Moza niteraka an''i Binea; Rafa no zanakalahin''i Binea, Elasa no zanakalahin''i Rafa, Azela no zanakalahin''i Elasa'
mg1865::mg_13::8::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Azela nanana zanaka enina mirahalahy, ka izao no anarany: Azrikama sy Bokero sy Isimaela sy Searia sy Obadia ary Hanana. Ireo rehetra ireo no zanakalahin''i Azela.'
mg1865::mg_13::8::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Eseka rahalahiny dia Olama, lahimatoa, sy Jeosy, lahiaivo, ary Elifeleta, faralahy.'
mg1865::mg_13::8::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 8
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Olama dia lehilahy mahery sady mpandefa zana-tsipïka, ary nanana zanakalahy sy zafy maro izy, dia dimam-polo amby zato. Ireo rehetra ireo no taranak''i Benjamina.'
mg1865::mg_13::9::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mponina tany Jerosalema talohan''ny namaboana azy'
  verse_text: 'Dia nisaina araka ny firazanany avy ny Isiraely rehetra; ary, indro, efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Isiraely izany. Ary ny Joda dia nentina ho babo tany Babylona noho ny fahotany.'
mg1865::mg_13::9::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mponina taloha tamin''ny taniny sy ny tanànany avy dia ny Isiraely sy ny mpisorona sy ny Levita ary ny Netinima.'
mg1865::mg_13::9::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany Jerosalema no nonenan''ny sasany amin''ny taranak''i Joda sy Benjamina sy Efraima sy Manase:'
mg1865::mg_13::9::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Otahy, zanak''i Amihoda, zanak''i Omry, zanak''Imry, zanak''i Bany, avy amin''ny taranak''i Fareza, zanak''i Joda.'
mg1865::mg_13::9::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Silonita dia Asay, lahimatoa, sy ny zanany.'
mg1865::mg_13::9::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Zera dia Jeoela sy ny rahalahiny, dia sivi-folo amby enin-jato.'
mg1865::mg_13::9::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Benjamina dia Salo, zanak''i Mesolama, zanak''i Hodavia, zanak''i Hasenoa,'
mg1865::mg_13::9::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jibnia, zanak''i Jerohama, sy Elaha, zanak''i Ozy, zanak''i Mikry, sy Mesolama, zanak''i Sefatia, zanak''i Regoela, zanak''i Jibnia;'
mg1865::mg_13::9::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny isan''ny rahalahiny araka ny firazanany dia enina amby dimam-polo sy sivin-jato. Ireo lehilahy rehetra ireo dia samy lohan''ny fianakaviany avy.'
mg1865::mg_13::9::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny mpisorona dia Jedaia sy Joiariba sy Jatina'
mg1865::mg_13::9::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Azaria, zanak''i Hilkia, zanak''i Mesolama, zanak''i Zadoka, zanak''i Meraiota, zanak''i Ahitoba, mpanapaka ny tranon''Andriamanitra,'
mg1865::mg_13::9::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Adaia, zanak''i Jerohama, zanak''i Pasora, zanak''i Malkia, ary Masay, zanak''i Adiela, zanak''i Jazera, zanak''i Mesolama, zanak''i Mesilemita, zanak''Imera.'
mg1865::mg_13::9::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahin''ireo, izay samy lohan''ny fianakaviany avy, dia enim-polo amby fiton-jato amby arivo; lehilahy mahery amin''ny fanaovana ny fanompoana ao an-tranon''Andriamanitra ireo.'
mg1865::mg_13::9::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Levita dia Semaia, zanak''i Hasoba, zanak''i Azrikama, zanak''i Hasabia, tamin''ny taranak''i Merary,'
mg1865::mg_13::9::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Bakbakara sy Haresy sy Galala sy Matania, zanak''i Mika, zanak''i Zikry, zanak''i Asafa,'
mg1865::mg_13::9::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Obadia, zanak''i Semaia, zanak''i Galala, zanak''i Jedotona, ary Berekia, zanak''i Asa, zanak''i Elkana, izay nonina tamin''ny vohitry ny Netotatita.'
mg1865::mg_13::9::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiandry varavarana dia Saloma sy Akoba sy Talmona sy Ahimana ary ny rahalahiny; fa Saloma no lohany;'
mg1865::mg_13::9::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ambaraka ankehitriny dia ao amin''ny vavahadin''ny mpanjaka atsinanana izy; ireo no mpiandry varavarana tamin''ny tobin''ny taranak''i Levy.'
mg1865::mg_13::9::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saloma, zanak''i Kore, zanak''i Abiasafa, zanak''i Kora, sy ny Koraita rahalahiny araka ny fianakaviany avy no mpanao ny fanompoana amin''ny fiandrasana ny varavaran''ny lay; ary ny razany koa dia mpiambina ny vavahady tao amin''ny tobin''i Jehovah.'
mg1865::mg_13::9::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Finehasa, zanak''i Eleazara, no mpanapaka ireo taloha, ary Jehovah nomba azy.'
mg1865::mg_13::9::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zakaria, zanak''i Meselemia, no mpiandry ny varavaran''ny trano-lay fihaonana.'
mg1865::mg_13::9::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isan''ireo voafidy ho mpiandry varavarana ireo dia roa ambin''ny folo amby roan-jato. Ireo dia voasoratra araka ny firazanany tany amin''ny vohiny avy; ary notendren''i Davida sy Samoela mpahita izy noho ny fahamarinany.'
mg1865::mg_13::9::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ireo sy ny taranany no niandry varavarana tao amin''ny tranon''i Jehovah, dia ny trano-lay.'
mg1865::mg_13::9::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny lafiny efatra no nitoeran''ny mpiandry varavarana, dia teo atsinanana sy andrefana sy avaratra ary atsimo.'
mg1865::mg_13::9::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahiny izay nonina teo amin''ny vohiny dia nasaina ho avy isan-kafitoana ho eo aminy.'
mg1865::mg_13::9::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanao tamin''ny fahamarinany ireo Levita efa-dahy, lohan''ny mpiandry varavarana, ireo, ary tonian''ny efi-trano fitehirizana sy ny rakitry ny tranon''Andriamanitra koa izy ireo.'
mg1865::mg_13::9::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manodidina ny tranon''Andriamanitra no nandriany; fa izy ireo no mpiambina azy sady adidiny ny famohana ny trano isa-maraina.'
mg1865::mg_13::9::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany aminy nitandrina ny fanaka momba ny fanompoana; fa an-isany no nitondrany azy miditra sy mivoaka.'
mg1865::mg_13::9::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany aminy koa notendrena hitandrina ny fanaka, dia ny fanaka masina rehetra, sy ny koba tsara toto sy ny divay sy ny diloilo sy ny ditin-kazo manitra ary ny zava-manitra.'
mg1865::mg_13::9::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ny zanaky ny mpisorona nangaroharo ny zava-manitra fanosorana.'
mg1865::mg_13::9::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Matatia, anankiray tamin''ny Levita, lahimatoan''i Saloma Koraita, no tonian''ny zavatra izay natao tamin''ny fanendasana.'
mg1865::mg_13::9::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ny rahalahiny, tamin''ny taranaky ny Kehatita, no tonian''ny mofo aseho hamboatra azy isan-tSabata.'
mg1865::mg_13::9::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo ihany koa no mpihira, lohan''ny fianakaviana amin''ny Levita, izay mitoetra tsy manan-draharaha hafa ao amin''ireo efi-trano; fa tsy maintsy ho amin''izany raharaha izany andro aman''alina izy.'
mg1865::mg_13::9::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia lohan''ny fianakaviana tamin''ny Levita araka ny firazanany avy, dia samy loholona. Ireo no nonina tany Jerosalema.'
mg1865::mg_13::9::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny amin''ny fianakavian''i Saoly'
  verse_text: 'Ary tao Gibeona no nonenan''i Jeiela, razamben''ny an''i Gibeona, ary ny anaran''ny vadiny dia Imaka;'
mg1865::mg_13::9::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zanany lahimatoa dia Abdona, dia Zora, dia Kisy, dia Bala, dia Nera, dia Nadaba,'
mg1865::mg_13::9::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Gedora, dia Ahio, dia Zakaria, dia Miklota.'
mg1865::mg_13::9::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Miklota niteraka an''i Simeama. Ary ireo koa niara-nonina tamin''ny rahalahiny tany Jerosalema nifanandrify fonenana taminy.'
mg1865::mg_13::9::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nera niteraka an''i Kisy; ary Kisy niteraka an''i Saoly; ary Saoly niteraka an''i Jonatana sy Malkisoa sy Abinadaba ary Esbala.'
mg1865::mg_13::9::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Jonatana dia Meribala, ary Meribala niteraka an''i Mika.'
mg1865::mg_13::9::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Mika dia Pitona sy Maleka sy Tarea ary Ahaza*. [*Izahao I Tantara 8:35]'
mg1865::mg_13::9::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza niteraka an''i Jara; ary Jara niteraka an''i Alemeta sy Azmaveta ary Zimry; ary Zimry niteraka an''i Moza;'
mg1865::mg_13::9::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Moza niteraka an''i Binea; ary Refaia no zanakalahin''i Binea, Elasa no zanakalahin''i Refaia, Azela no zanakalahin''i Elasa.'
mg1865::mg_13::9::44:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 9
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Azela nanana zanaka enina mirahalahy ka izao no anarany avy: Azrikama sy Bokero sy Isimaela sy Searia sy Obadia ary Hanana; ireo no zanakalahin''i Azela.'
mg1865::mg_13::10::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahafatesan''i Saoly sy ny zananilahy'
  verse_text: 'Ary ny Filistina niady tamin''ny Isiraely, ary nandositra teo anoloan''ny Filistina ny lehilahy amin''ny Isiraely, ka niampatrampatra teny an-tendrombohitra Gilboa ny faty.'
mg1865::mg_13::10::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina nanenjika fatratra an''i Saoly sy ny zanany, ka matin''ny Filistina Jonatana sy Abinadaba sy Malkisoa, zanakalahin''i Saoly.'
mg1865::mg_13::10::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mafy ny ady tamin''i Saoly, dia nifanehatra tamin''ny mpandefa tsipïka izy; ary raiki-tahotra izy noho ny mpandefa tsipïka.'
mg1865::mg_13::10::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy Saoly tamin''ny mpitondra ny fiadiany: Tsoahy ny sabatrao, ka tsatohy miboroaka aho; fandrao avy irery tsy mifora irery ka hanao ahy ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadiany, fa natahotra loatra izy. Dia nalain''i Saoly ny sabatra ka nianjerany.'
mg1865::mg_13::10::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny mpitondra ny fiadiana fa maty Saoly, dia mba nianjera tamin''ny sabany koa izy ka maty.'
mg1865::mg_13::10::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niara-maty Saoly sy ny zanany telo lahy ary ny ankohonany rehetra.'
mg1865::mg_13::10::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny lehilahy rehetra amin''ny Isiraely teny amin''ny lohasaha fa nandositra ny olona, ary maty Saoly sy ny zanany, dia niala tamin''ny tanànany izy ka nandositra; ary dia tonga ny Filistina ka nonina tao.'
mg1865::mg_13::10::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso, raha tonga haka ny zavatra teo amin''ny faty ny Filistina, dia nahita an''i Saoly sy ny zananilahy niampatrampatra teo an-tendrombohitra Gilboa izy.'
mg1865::mg_13::10::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesoriny ny akanjony, ka nentiny ny lohany sy ny fiadiany, ary dia naniraka tany amin''ny tanin''ny Filistina manodidina izy hanambara izany zavatra mahafaly izany tamin''ny sampiny sy ny olona.'
mg1865::mg_13::10::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia napetrany tao an-tranon''ny andriamaniny ny fiadian''i Saoly, ary nohomboany teo amin''ny tempolin''i Dagona ny lohany.'
mg1865::mg_13::10::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny mponina rehetra tao Jabesi-gileada izay rehetra nataon''ny Filistina tamin''i Saoly,'
mg1865::mg_13::10::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niainga ny lehilahy mahery rehetra naka ny fatin''i Saoly sy ny fatin''ny zanany ka nitondra azy ho any Jabesy, ary nandevina ny taolany teo ambanin''ilay hazo terebinta tany Jabesy izy, ary dia nifady hanina hafitoana.'
mg1865::mg_13::10::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, maty Saoly noho ny nivadihany tamin''i Jehovah, dia noho ny tsy nitandremany ny tenin''i Jehovah sy noho ny nakany saina tamin''izay nanao azy ho tsindrian-javatra'
mg1865::mg_13::10::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary noho ny tsy nanontaniany tamin''i Jehovah; ka dia novonoiny izy, ary nafindrany ho an''i Davida, zanak''i Jese, ny fanjakana.'
mg1865::mg_13::11::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanosorana an''i Davida ho mpanjaka handimby an''i Saoly, sy ny nahazoany an''i Jerosalema'
  verse_text: 'Ary dia nivory teo amin''i Davida tao Hebrona ny Isiraely rehetra ka nanao hoe: Indreto izahay, fa taolanao sy nofonao.'
mg1865::mg_13::11::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatry ny fahiny ihany koa, fony Saoly mbola nanjaka aza, dia ianao ihany no mpitarika ny Isiraely nivoaka sy niditra; ary hoy Jehovah Andriamanitrao taminao; Ianao no ho mpiandry ny Isiraely oloko, ary ianao no ho mpanapaka azy.'
mg1865::mg_13::11::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tonga tao amin''ny mpanjaka tao Hebrona ny loholon''ny Isiraely rehetra; ary Davida nanao fanekena taminy tao Hebrona teo anatrehan''i Jehovah; ary dia nanosotra an''i Davida ho mpanjakan''ny Isiraely izy araka ny tenin''i Jehovah izay nampilazainy an''i Samoela.'
mg1865::mg_13::11::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny Isiraely rehetra nankany Jerosalema (Jebosa izany) ary tao ny Jebosita tompon-tany.'
mg1865::mg_13::11::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mponina tao Jebosa tamin''i Davida: Tsy ho tafiditra eto ianao. Kanjo afak''i Davida ihany ny batery fiarovana, dia Ziona (Tanànan''i Davida izany).'
mg1865::mg_13::11::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida: Na iza na iza no hamely voalohany ny Jebosita, dia izy no ho lohany sy ho komandy. Ary Joaba, zanak''i Zeroia, no niakatra voalohany, ka dia izy no lohany.'
mg1865::mg_13::11::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitoetra tao anatin''ny batery fiarotana Davida, ka izany no nanaovana ny anarany hoe Tanànan''i Davida'
mg1865::mg_13::11::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrafitra ny manodidina ny tanàna hatrany Milo* izy; ary Joaba nampamboatra ny sisa tamin''ny tanàna. [*Hebreo: fiarovana]'
mg1865::mg_13::11::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nandroso nihalehibe Davida; fa Jehovah, Tompon''ny maro, no nomba azy.'
mg1865::mg_13::11::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny amin''ny lehilahy maherin''i Davida izay niady hampanjaka azy'
  verse_text: 'Ary izao no lohan''ny lehilahy maherin''i Davida izay nifikitra mafy taminy tamin''ny fanjakany, mbamin''ny Isiraely rehetra hampanjaka azy araka ny tenin''i Jehovah ny amin''ny Isiraely.'
mg1865::mg_13::11::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no isan''ny lehilahy maherin''i Davida: Jasobeama, zanak''i Hakmony, lehiben''ny mpanafika malaza; izy no namely telon-jato lahy tamin''ny lefona ka naharingana azy tamin''ny ady indray mandeha monja.'
mg1865::mg_13::11::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny manarakaraka azy dia Eleazara, zanak''i Dodo Ahohita, anankiray amin''izy telo lahy mahery.'
mg1865::mg_13::11::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy dia teo amin''i Davida tao Efesa-damima, raha vory teo ny Filistina hiady, ary ny tany nisy vary hordea maniry, ary ny olona nandositra ny Filistina.'
mg1865::mg_13::11::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nijanona teo afovoan''io tany io kosa Eleazara ka nahazo io ary namono ny Filistina, ka dia nanao famonjena lehibe Jehovah.'
mg1865::mg_13::11::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy telo lahy malaza tamin''ny telo-polo nidina nankeo amin''ny vatolampy ho any amin''i Davida tamin''ny zohin''i Adolama; ary ny miaramilan''ny Filistina nitoby tao amin''ny Lohasahan''ny Refaita.'
mg1865::mg_13::11::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia tao amin''ny batery fiarovana tamin''izay, ary ny miaramilan''ny Filistina kosa dia tao Betlehema.'
mg1865::mg_13::11::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naniry ka nanao hoe: Enga anie ka hisy hampisotro rano ahy avy amin''ny fantsakana ao Betlehema, ilay ao akaikin''ny vavahady.'
mg1865::mg_13::11::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy telo lahy ireo namaky teo amin''ny miaramilan''ny Filistina ka nanovo rano tao amin''ny fantsakana tao Betlehema, ilay tao akaikin''ny vavahady, dia nentiny ho any amin''i Davida. Kanjo tsy nety nisotro izy, fa naidiny ho an''i Jehovah.'
mg1865::mg_13::11::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Sanatria amiko eo anatrehan''Andriamanitra raha hanao izany; hisotro ny ran''ireto olona nanao vi-very ny ainy ireto va aho? fa nanao vi-very ny ainy izy ireo tamin''ny nakany ity. Ka dia tsy nety nisotro izy. Izany zavatra izany no nataon''ireo telo lahy mahery ireo.'
mg1865::mg_13::11::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abisay, rahalahin''i Joaba, no lehibe tamin''izy telo lahy; fa izy koa namely telonjato lahy tamin''ny lefona ka nahafaty azy, ka dia izy no nalaza tamin''izy telo lahy.'
mg1865::mg_13::11::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tamin''izy telo lahy dia izy no nanana voninahitra mihoatra noho ny azy roa lahy, fa izy no lehibeny; nefa tsy nahomby azy telo lahy teo izy.'
mg1865::mg_13::11::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Benaia, zanak''i Joiada, zanaky ny lehilahy mahay tany Kabzela, izay nahavita asa be, izy no nahafaty ny roa lahy mahery* tany Moaba; ary izy koa no nidina namono ny liona tao anatin''ny lavaka fantsakana tamin''ilay andro nisy oram-panala iny. [*Hebreo: lionan''Andriamanitra]'
mg1865::mg_13::11::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy koa no namono ilay Egyptiana makadiry, izay dimy hakiho ny halavany, nefa teny an-tanan''ilay Egyptiana nisy lefona tahaka ny vodi-tenon''ny mpanenona; nefa namorotsahan''i Benaia tamin''ny tehiny ihany izy, dia nosarihany ny lefona teny an-tanan''ilay Egyptiana, ka iny lefony iny ihany no namonoany azy.'
mg1865::mg_13::11::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany no nataon''i Benaia, zanak''i Joiada, ary tamin''izy telo lahy mahery dia izy no nalaza.'
mg1865::mg_13::11::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro fa be voninahitra tamin''ny telo-polo lahy izy, nefa tsy nahomby azy telo lahy teo; ary Davida nanao azy ho isan''ny mpanolo-tsaina azy.'
mg1865::mg_13::11::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy mahery dia Asahela, rahalahin''i Joaba, sy Elanana, zanak''i Dodo, avy any Betlehema,'
mg1865::mg_13::11::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Samota Harorita sy Haleza Pelonita'
mg1865::mg_13::11::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ira, zanak''Ikesy Tekoita, sy Abiezera Anatotita'
mg1865::mg_13::11::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Sibekay Hosatita sy Ely Ahohita'
mg1865::mg_13::11::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Maharay Netofatita sy Heleda, zanak''i Bana Netofatita,'
mg1865::mg_13::11::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Itahy, zanak''i Ribay avy any Gibean''ny taranak''i Benjamina, sy Benaia Piratonita'
mg1865::mg_13::11::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Horay, any amin''ny lohasahan-driak''i Gasy, sy Abiela Arbatita'
mg1865::mg_13::11::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Azmaveta Baharomita sy Eliaba Salbonita'
mg1865::mg_13::11::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny zanak''i Hasema Gizonita sy Jonatana, zanak''i Sage Hararita,'
mg1865::mg_13::11::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ahiama, zanak''i Sakara Hararita, sy Elifala, zanak''i Ora,'
mg1865::mg_13::11::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Hefera Mekeratita sy Ahia Pelonita'
mg1865::mg_13::11::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Hezro Karmelita sy Naray, zanak''i Ezbay,'
mg1865::mg_13::11::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Joela, rahalahin''i Natana, sy Mibara, zanak''i Hagry.'
mg1865::mg_13::11::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Zaleta Amonita sy Naharay Berotita, mpitondra ny fiadian''i Joaba, zanak''i Zeroia,'
mg1865::mg_13::11::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ira Jitrita sy Gareba Jitrita'
mg1865::mg_13::11::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Oria Hetita sy Zabada, zanak''i Ahelay,'
mg1865::mg_13::11::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Adina, zanak''i Siza Robenita, mpifehy ny Robenita, ary ny namany telo-polo lahy koa,'
mg1865::mg_13::11::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Hanana, zanak''i Maka, sy Josafata Mitnita'
mg1865::mg_13::11::44:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Ozia Astartita ary Sama sy Jeiela, zanak''i Hotama Aroerita,'
mg1865::mg_13::11::45:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jediaela, zanak''i Simry, sy Joha Tizita rahalahiny'
mg1865::mg_13::11::46:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Eliala Mahavita sy Jeribay sy Josavia, zanak''i Elnama, sy Jitma Moabita'
mg1865::mg_13::11::47:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 11
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Eliala sy Obeda ary Jasiela Mezobaita.'
mg1865::mg_13::12::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny lehilahy mahery izay nanatona an''i Davida, fony izy mbola nenjehin''i Saoly'
  verse_text: 'Ary izao no nankany amin''i Davida tany Ziklaga, fony izy mbola niery an''i Saoly, zanak''i Kisy; ary isan''ny lehilahy mahery mpanampy amin''ny ady ireo'
mg1865::mg_13::12::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady mpitondra tsipïka ka nahay nanavia sy nanavanana raha nitora-bato na nandefa tsipïka. Isan''ny Benjamita, rahalahin''i Saoly, ireo.'
mg1865::mg_13::12::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohany dia Ahiezera sy Joasy, zanak''i Sema Gibeatita, sy Jeziela sy Peleta zanak''i Azmaveta, ary Beraka sy Jeho Anatotita'
mg1865::mg_13::12::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jismaia Gibeonita, lehilahy mahery isan''ny telo-polo lahy sady mpifehy ny telo-polo lahy, ary Jeremia sy Jahaziela sy Johanana sy Jozababa Gaderatita'
mg1865::mg_13::12::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elozay sy Jerimota ary Bealia sy Semaria sy Sefatia Harofita'
mg1865::mg_13::12::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elkana sy Jisia sy Azarela sy Joezera ary Jasobeama Koraita'
mg1865::mg_13::12::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Joela sy Zebadia, zanak''i Jerohama avy any Gedora.'
mg1865::mg_13::12::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Gadita nisy lehilahy mahery niendaka hanatona an''i Davida ho amin''ny fiarovana tany an''efitra, dia ny miaramila nahay niady ka nahatana ampinga lehibe sy lefona; ny tarehiny dia tahaka ny tarehin''ny liona, ary faingam-pandeha tahaka ny gazela* eny an-tendrombohitra izy. [*Izahao II Samoela 1:19]'
mg1865::mg_13::12::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ezera no voalohany, Obadia no faharoa, Eliaba no fahatelo,'
mg1865::mg_13::12::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mismana no fahefatra, Jeremia no fahadimy,'
mg1865::mg_13::12::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atahy no fahenina, Eliala no fahafito,'
mg1865::mg_13::12::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Johanana no fahavalo, Elizabada no fahasivy,'
mg1865::mg_13::12::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jeremia no fahafolo, Makbanay no fahiraika ambin''ny folo.'
mg1865::mg_13::12::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no isan''ny taranak''i Gada sady samy mpifehy miaramila; ny kely indrindra naharesy olona zato, ary ny lehibe indrindra naharesy arivo.'
mg1865::mg_13::12::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no nita an''i Jordana tamin''ny volana voalohany, fony iny nihoatra ny morony rehetra; ary nampandositra izay rehetra teny amin''ny lohasaha na atsinanana na andrefana ireo.'
mg1865::mg_13::12::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tamin''ny taranak''i Benjamina sy Joda nankany amin''i Davida tany amin''ny fiarovana.'
mg1865::mg_13::12::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nivoaka hitsena azy ka niteny taminy hoe: Raha fihavanana no ihavianareo aty amiko hanampy ahy, dia hikambana isika; fa raha avy hamadika ahy kosa ianareo ho azon''ny fahavaloko, nefa tsy mba nanao an-keriny ny tanako, dia Andriamanitry ny razantsika no hijery sy hamaly izany.'
mg1865::mg_13::12::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amasay, lehibehin''ny mpanafika malaza*, dia nampitenenin''ny Fanahy hoe : Anao izahay, ry Davida o, fa miandany aminao, ry zanak''i Jese; fiadanana, eny, fiadanana anie ho anao, ary fiadanana anie ho an''ny manampy anao; fa Andriamanitrao no manampy anao. Dia noraisin''i Davida ireo ka notendreny ho mpifehy ny miaramila. [*Na: ny telo-polo lahy]'
mg1865::mg_13::12::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy sasany tamin''ny Manase niala hanatona an''i Davida, raha nomba ny Filistina hiady amin''i Saoly izy, nefa tsy nanampy azy izy; fa ireo andrianan''ny Filistina nifampisaina, dia nampandeha azy ka nanao hoe: Ny lohantsika no ho entiny mila sitraka hiverenany amin''i Saoly tompony.'
mg1865::mg_13::12::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nankany Ziklaga izy, nisy tamin''ny Manase nanatona azy, dia Adna sy Jozabada sy Jediada sy Mikaela sy Jozabada sy Eliho ary Ziletahy, mpifehy arivo tamin''ny Manase.'
mg1865::mg_13::12::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia nanampy an''i Davida hamely ny antokon''ny jirika; fa lehilahy mahery avokoa izy sady komandy amin''ny miaramila.'
mg1865::mg_13::12::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''izany nisy nankany amin''i Davida isan''andro isan''andro hanampy azy mandra-pahatongany ho toby lehibe toy ny tobin''Andriamanitra.'
mg1865::mg_13::12::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny amin''ny miaramila avy tamin''ny Isiraely rehetra izay nanatona an''i Davida tao Hebrona hampanjaka azy'
  verse_text: 'Ary izao no isan''ny miaramila efa voaomana hiady, izay tonga tao amin''i Davida tao Hebrona hamindra ny fanjakan''i Saoly ho azy araka ny tenin''i Jehovah:'
mg1865::mg_13::12::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taranak''i Joda, valon-jato amby enina arivo, mpitondra ampinga lehibe sy lefona sady efa voaomana hiady.'
mg1865::mg_13::12::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taranak''i Simeona, zato amby fito arivo, lehilahy mahery sady matanjaka amin''ny ady.'
mg1865::mg_13::12::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taranak''i Levy, enin-jato amby efatra arivo.'
mg1865::mg_13::12::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joiada dia lehiben''ny Aronita, ary nisy fiton-jato amby telo arivo teo aminy;'
mg1865::mg_13::12::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Zadoka, zatovo mahery, sy ny fianakaviany, dia roa amby roa-polo lahy mpifehy.'
mg1865::mg_13::12::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Benjamina, havan''i Saoly, telo arivo; fa hatramin''izany ny ankamaroany mbola nomba ny mpianakavin''i Saoly ihany.'
mg1865::mg_13::12::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Efraima dia valon-jato amby roa alina, lehilahy mahery avokoa sady samy nalaza tamin''ny fianakaviany avy.'
mg1865::mg_13::12::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny antsasaky ny firenen''i Manase dia valo arivo amby iray alina, izay notononina anarana ho avy hampanjaka an''i Davida.'
mg1865::mg_13::12::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''Isakara dia roanjato no lohany, samy nahay namantatra tsara izay fotoana mety ka nahalala izay lokony hataon''ny Isiraely; ary ny rahalahiny rehetra nanaraka ny teniny.'
mg1865::mg_13::12::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny Zebolona, izay azo nalefa hanafika ka nahay niady tamin''ny fiadiana samy hafa rehetra dia dimy alina, izay nahay nilahatra tsara tamin''ny firaisan-kina.'
mg1865::mg_13::12::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Naftaly dia nisy mpifehy arivo, ary manaraka azy dia nisy fito arivo amby telo alina amin''ampinga lehibe sy lefona.'
mg1865::mg_13::12::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Danita dia enin-jato amby valo arivo sy roa alina izay nahay niady.'
mg1865::mg_13::12::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Asera, efatra alina izay azo nalefa hanafika sady nahay niady.'
mg1865::mg_13::12::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy tany an-dafin''i Jordana, tamin''ny Robenita sy ny Gadita ary ny antsasaky ny firenen''i Manase, nisy roa alina amby iray hetsy nitana fiadiana samy hafa rehetra.'
mg1865::mg_13::12::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo miaramila rehetra ireo, izay nahay nilahatra tsara, dia niray fo nankany Hebrona hampanjaka an''i Davida amin''ny Isiraely rehetra; ary ny sisa rehetra tamin''ny Isiraely koa niray fo hampanjaka an''i Davida.'
mg1865::mg_13::12::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao amin''i Davida hateloana izy sady nihinana sy nisotro; fa efa nanao nahandro ho azy ny rahalahiny.'
mg1865::mg_13::12::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 12
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay teo akaikiny koa hatramin''ny Isakara sy ny Zebolona ary ny Naftaly dia samy nampitondra hanina samy hafa nentin''ny boriky sy rameva sy ampondra ary omby, dia koba sy ampempan''aviavy sy voaloboka maina sy divay sy diloilo, ary omby sy ondry aman''osy betsaka koa; fa nisy fifaliana tamin''ny Isiraely.'
mg1865::mg_13::13::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namindrana ny fiara niala tao Kiriata-jearima, sy ny nitoerany tao an-tranon''i Obed-edoma'
  verse_text: 'Ary Davida naka saina tamin''ny mpifehy arivo sy ny mpifehy zato, dia ny mpifehy rehetra,'
mg1865::mg_13::13::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy Davida tamin''ny Isiraely rehetra izay tafangona: Raha ataonareo ho mety, sady avy amin''i Jehovah Andriamanitsika izany, dia andeha isika haniraka faingana any amin''ny rahalahintsika rehetra izay sisa amin''ny tanin''ny Isiraely rehetra ary amin''ny mpisorona sy ny Levita koa, izay any amin''ny tanànany sy ny tany manodidina azy, mba hivory aty amintsika;'
mg1865::mg_13::13::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho entintsika aty amintsika indray ny fiaran''Andriamanitsika; fa tsy nahoantsika tamin''ny andron''i Saoly izany.'
mg1865::mg_13::13::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra izay tafangona dia nanaiky hanao izany, satria marina teo imason''ny olona rehetra izany.'
mg1865::mg_13::13::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novorin''i Davida ny Isiraely rehetra hatrany Sihora any Egypta ka hatrany akaikin''i Hamata haka ny fiaran''Andriamanitra avy any Kiriata-jearima.'
mg1865::mg_13::13::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra Davida sy ny Isiraely rehetra hankany Bala any Joda (Kiriata-jearima izany) hampakatra ny fiaran''i Jehovah Andriamanitra, Izay mipetraka amin''ny kerobima, dia ilay niantsoany ny anarany.'
mg1865::mg_13::13::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny tamin''ny sariety vaovao niala tao an-tranon''i Abinadaba ny fiaran''Andriamanitra, ary Oza sy Ahio no nampandeha ny sariety.'
mg1865::mg_13::13::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny Isiraely rehetra dia nitsinjaka fatratra teo anatrehan''Andriamanitra tamin''ny hira sy ny lokanga sy ny valiha sy ny ampongatapaka sy ny kipantsona ary ny trompetra.'
mg1865::mg_13::13::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''ny famoloan''i Kidona izy, dia naninjitra ny tanany hihazona ny fiara Oza, satria nazeran''ny omby izany.'
mg1865::mg_13::13::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''i Oza ny fahatezeran''i Jehovah, ka namely azy Izy noho ny naninjirany ny tanany tamin''ny fiara, dia maty teo anatrehan''Andriamanitra izy.'
mg1865::mg_13::13::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tezitra* Davida noho ny namelezan''i Jehovah an''i Oza, ka dia nataony hoe Perez-oza** no anaran''izany tany izany mandraka androany. [*Na: nalahelo] [**Perez-oza = Famelezana an''i Oza]'
mg1865::mg_13::13::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida natahotra an''Andriamanitra tamin''izany andro izany ka nanao hoe: Nahoana aho no hitondra ny fiaran''Andriamanitra ho aty amiko?'
mg1865::mg_13::13::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy nafindran''i Davida ho ao aminy ao an-tanànan''i Davida ny fiara, fa naviliny ho ao an-tranon''i Obededoma Gatita.'
mg1865::mg_13::13::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nipetraka telo volana tao amin''ny ankohonan''i Obed-edoma tao an-tranony ny fiaran''Andriamanitra; ka dia notahin''i Jehovah ny ankohonan''i Obed-edoma sy izay rehetra nananany.'
mg1865::mg_13::14::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny lapa nataon''i Davida, sy ny anaran''ny zanany'
  verse_text: 'Ary Hirama, mpanjakan''i Tyro, naniraka olona tany amin''i Davida sady nampanatitra hazo sedera ary nandefa mpanao trano vato sy mpandrafitra hanao trano ho azy.'
mg1865::mg_13::14::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia fantatr''i Davida fa Jehovah efa nampitoetra azy ho mpanjakan''ny Isiraely, ka voasandratra ny fanjakany noho ny amin''ny Isiraely olony.'
mg1865::mg_13::14::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nampaka-bady koa tany Jerosalema ka niteraka zazalahy sy zazavavy.'
mg1865::mg_13::14::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny zanany naterany tany Jerosalema: Samoa sy Sobaba sy Natana sy Solomona'
mg1865::mg_13::14::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jibara sy Elisoa sy Elipeleta'
mg1865::mg_13::14::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Noga sy Nafega sy Jafia'
mg1865::mg_13::14::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elisama sy Seliada ary Elifeleta.'
mg1865::mg_13::14::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny nandresen''i Davida ny Filistina'
  verse_text: 'Koa nony ren''ny Filistina fa efa nohosorana ho mpanjakan''ny Isiraely rehetra Davida, dia niakatra hitady azy ny Filistina rehetra. Koa raha ren''i Davida izany, dia nivoaka hiady taminy izy.'
mg1865::mg_13::14::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga ny Filistina ka nihahakahaka teny amin''ny Lohasahan''ny Refaita.'
mg1865::mg_13::14::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanontany tamin''Andriamanitra hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy Jehovah taminy: Miakara, fa hatolotro eo an-tananao izy.'
mg1865::mg_13::14::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra nankao Bala-perazima Davida ka namely azy teo; dia hoy izy: Ny tanako no namakian''Andriamanitra ny fahavaloko hipariaka toy ny rano vaky; koa izany no nanaovany ny anaran''izany tany izany hoe Bala-perazima*. [*Bala-perazima = Tany nahavakiana]'
mg1865::mg_13::14::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilaozan''ireny teo ireo andriamaniny, ka dia nasain''i Davida nodorana tamin''ny afo.'
mg1865::mg_13::14::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga indray ny Filistina ka nihahakahaka teny an-dohasaha indray.'
mg1865::mg_13::14::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany tamin''Andriamanitra indray Davida ka novaliany hoe: Aza mandeha hanenjika azy; fa mivilia azy, dia mandehana, fa ho tonga eo aminy ianao eo amin''ny tandrifin''ny hazo balsama.'
mg1865::mg_13::14::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha toa mahare fingadongadon''olona eny amin''ny tendron''ny hazo balsama ianao, dia miaingà amin''izay hiady; fa amin''izay no efa miainga mialoha anao Andriamanitra hamely ny miaramilan''ny Filistina.'
mg1865::mg_13::14::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanao araka izay nandidian''Andriamanitra azy Davida, ka dia namely ny miaramilan''ny Filistina hatrany Gibeona ka hatrany Gazera izy.'
mg1865::mg_13::14::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lazan''i Davida niely teny amin''ny tany rehetra; ary nataon''i Jehovah nahazo ny firenena rehetra ny tahotra an''i Davida.'
mg1865::mg_13::15::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nitondrana ny fiara niakatra tany Jerosalema'
  verse_text: 'Ary Davida nanao trano ho azy tao an-Tanànan''i Davida sady namboatra fitoerana sy nanorin-day ho an''ny fiaran''Andriamanitra.'
mg1865::mg_13::15::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia hoy Davida: Tsy misy tokony hitondra ny fiaran''Andriamanitra afa-tsy ny Levita ihany, satria izy no efa nofidin''i Jehovah hitondra ny fiaran''Andriamanitra sy hanao fanompoam-pivavahana ho Azy mandrakizay.'
mg1865::mg_13::15::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novorin''i Davida tany Jerosalema ny Isiraely rehetra hampakatra ny fiaran''i Jehovah ho any amin''ny fitoerana izay namboariny ho azy.'
mg1865::mg_13::15::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novorin''i Davida ny taranak''i Arona sy ny Levita:'
mg1865::mg_13::15::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Kehata dia Oriela lehibeny sy ny rahalahiny roa-polo amby zato;'
mg1865::mg_13::15::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Merary dia Asaia lehibeny sy ny rahalahiny roa-polo amby roan-jato;'
mg1865::mg_13::15::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Gersona dia Joela lehibeny sy ny rahalahiny telo-polo amby zato;'
mg1865::mg_13::15::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Elizafana dia Semaia lehibeny sy ny rahalahiny roan-jato;'
mg1865::mg_13::15::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Hebrona dia Eliala lehibeny sy ny rahalahiny valo-polo,'
mg1865::mg_13::15::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Oziela dia Aminadaba lehibeny sy ny rahalahiny roa ambin''ny folo amby zato.'
mg1865::mg_13::15::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida niantso an''i Zadoka sy Abiatara mpisorona sy ny Levita, dia Oriela sy Asaia sy Joela sy Semaia sy Eliala ary Aminadaba,'
mg1865::mg_13::15::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Ianareo lohan''ny fianakavian''ny Levita, hamasino ny tenanareo, dia ianareo sy ny rahalahinareo, mba hampakaranareo ny fiaran''i Jehovah, Andriamanitry ny Isiraely, ho ao amin''ilay namboariko ho azy.'
mg1865::mg_13::15::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy ianareo no tamin''ilay teo, dia nasian''i Jehovah Andriamanitsika isika, fa tsy nitady Azy araka ny voadidy.'
mg1865::mg_13::15::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanamasina ny tenany ny mpisorona sy ny Levita hampakatra ny fiaran''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_13::15::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita nilanja ny fiaran''Andriamanitra tamin''ny hazo, tahaka ny nandidian''i Mosesy araka ny tenin''i Jehovah.'
mg1865::mg_13::15::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo lehiben''ny Levita dia nasain''i Davida nanendry ny mpihira rahalahiny hitondra ny zava-maneno, dia ny valiha sy ny lokanga ary hampaneno ny kipantsona, mba hanandra-peo amin''ny fifaliana.'
mg1865::mg_13::15::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia notendren''ny Levita Hemana, zanak''i Joela; ary tamin''ny rahalahiny dia Asafa, zanak''i Berekia; ary tamin''ny taranak''i Merary rahalahiny dia Etana, zanak''i Kosaia;'
mg1865::mg_13::15::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary naman''ireo ihany koa ny rahalahiny manarakaraka, dia Zakaria sy Bena sy Jaziela sy Semiramota sy Jehiela sy Ony sy Eliaba sy Benaia sy Mahaseia sy Matitia sy Elifeleho sy Mikneia sy Obed-edoma ary Jeiela, mpiandry varavarana.'
mg1865::mg_13::15::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hemana sy Asafa ary Etana mpihira dia nasaina nitondra kipantsona varahina hampanenoina.'
mg1865::mg_13::15::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zakaria sy Aziela sy Semiramota sy Jehiela sy Ony sy Eliaba sy Mahaseia sy Benaia no nasaina nitendry valiha tamin''ny Alamota.'
mg1865::mg_13::15::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Matitia sy Elifeleho sy Mikneia sy Obed-edoma sy Jeiela ary Azazia no nasaina nitendry ny lokanga tamin''ny Seminita ho mpitarika.'
mg1865::mg_13::15::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kenania, lehiben''ny Levita, no tonian''ny fitondrana*; ary nampianatra ny fitondrana izy, fa nahay. [*Na: ny hira]'
mg1865::mg_13::15::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Berekia sy Elikana no mpiandry varavarana amin''ny fiara.'
mg1865::mg_13::15::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Sebania sy Josafata sy Netanela sy Amasay sy Zakaria sy Benaia ary Eliezera, izay samy mpisorona, no nitsoka ny trompetra teo alohan''ny fiaran''Andriamanitra, ary Obed-edoma sy Jehia koa no mpiandry varavarana amin''ny fiara.'
mg1865::mg_13::15::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny loholon''ny Isiraely mbamin''ny mpifehy arivo no nandeha hampakatra ny fiaran''ny faneken''i Jehovah avy tao an-tranon''i Obed-edoma tamin''ny fifaliana.'
mg1865::mg_13::15::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nomban''Andriamanitra ny Levita izay nilanja ny fiaran''ny faneken''i Jehovah, dia namono vantotr''ombilahy fito sy ondrilahy fito hatao fanatitra izy.'
mg1865::mg_13::15::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakanjo akanjo rongony fotsy madinika Davida, ary niakanjo toy izany koa ny Levita rehetra izay nitondra ny fiara ary ny mpihira sy Kenania, tonian''ny fitondrana, mbamin''ny mpihira; ary Davida nisalotra efoda rongony fotsy koa.'
mg1865::mg_13::15::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nampakaran''ny Isiraely rehetra ny fiaran''ny faneken''i Jehovah tamin''ny fihobiana sy ny feon''ny anjomara sy ny trompetra ary ny kipantsona sy tamin''ny fitendrena ny valiha sy ny lokanga.'
mg1865::mg_13::15::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tao an-Tanànan''i Davida ny fiaran''ny faneken''i Jehovah, dia nitsirika teo am-baravarankely Mikala, zanakavavin''i Saoly, ka nahita an''i Davida mpanjaka nibitaka sy nitsinjaka; ka dia nikizaka azy tao am-pony izy.'
mg1865::mg_13::16::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampiditra ny Fiaran''Andriamanitra ny olona ka nametraka azy tao afovoan''ny lay izay naorin''i Davida ho azy; ary nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan''Andriamanitra izy.'
mg1865::mg_13::16::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony voatitr''i Davida ny fanatitra odorana sy ny fanati-pihavanana, dia nitso-drano ny olona tamin''ny anaran''i Jehovah izy.'
mg1865::mg_13::16::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nizara mofo iray avy sy hena iray didy* ary ampempam-boaloboka ho an''ny Isiraely rehetra na lahy na vavy izy. [*Na: divay eran''ny kapoaka]'
mg1865::mg_13::16::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny nandaminan''i Davida ny fanompoam-pivavahana, sy ny salamo natao ho fisaorana an''i Jehovah'
  verse_text: 'Ary ny Levita sasany notendren''i Davida ho mpanao fanompoam-pivavahana eo anatrehan''ny fiaran''i Jehovah mba hankalaza sy hisaotra ary hidera an''i Jehovah, Andriamanitry ny Isiraely:'
mg1865::mg_13::16::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asafa no lohany, ary Zakaria no nanarakaraka, dia Jeiela sy Semiramota sy Jehiela sy Matitia sy Eliaba sy Benaia sy Obed-edoma ary Jeiela no nitendry ny valiha sy ny lokanga; fa Asafa no nampaneno ny kipantsona;'
mg1865::mg_13::16::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Benaia sy Jahaziela mpisorona kosa no mpitsoka ny trompetra mandrakariva eo anoloan''ny fiaran''ny faneken''Andriamanitra.'
mg1865::mg_13::16::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izay andro izay no voalohan''ny nanendren''i Davida an''i Asafa sy ny rahalahiny hidera an''i Jehovah.'
mg1865::mg_13::16::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà an''i Jehovah, miantsoa ny anarany; Ampahafantaro ny firenena ny asany.'
mg1865::mg_13::16::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihira ho Azy, mankalazà Azy; Saintsaino ny fahagagana rehetra ataony.'
mg1865::mg_13::16::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy ho reharehanareo ny anarany masina; Aoka hifaly ny fon''izay mitady an''i Jehovah.'
mg1865::mg_13::16::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitadiava an''i Jehovah sy ny heriny, Katsaho mandrakariva ny tavany.'
mg1865::mg_13::16::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiarova ny asa mahagaga izay nataony, dia ny fahagagany sy ny fitsaran''ny vavany,'
mg1865::mg_13::16::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo taranak''Isiraely mpanompony, Ianareo olom-boafidiny, taranak''i Jakoba.'
mg1865::mg_13::16::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Izy no Andriamanitsika, manerana ny tany rehetra ny fitsarany.'
mg1865::mg_13::16::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy mandrakizay ny fanekeny. Dia ilay teny voadidiny ho an''ny taranaka arivo mandimby,'
mg1865::mg_13::16::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, dia ilay nataony tamin''i Abrahama sy ny fianianany tamin''Isaka,'
mg1865::mg_13::16::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay naoriny ho lalàna ho an''i Jakoba sy ho fanekena mandrakizay ho an''Isiraely,'
mg1865::mg_13::16::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nataony hoe: Homeko anao ny tany Kanana ho lovanareo voazara amin''ny famolaina;'
mg1865::mg_13::16::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola olom-bitsy ianareo, Eny, Vitsy sady vahiny tao,'
mg1865::mg_13::16::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifindrafindra tany amin''ny firenena, sy nifindrafindra fanjakana ho amin''ny firenen-kafa,'
mg1865::mg_13::16::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nisy navelany hampahory azy; Ary nananatra mpanjaka Izy noho ny amin''ireo hoe:'
mg1865::mg_13::16::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manendry ireo voahosotro, Ary aza manisy ratsy Ireo mpaminaniko.'
mg1865::mg_13::16::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihira ho an''i Jehovah, ry tany rehetra; Lazao isan''andro isan''andro ny famonjeny mahafaly.'
mg1865::mg_13::16::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambarao any amin''ny jentilisa ny voninahiny, ary any amin''ny firenena rehetra ny fahagagana ataony.'
mg1865::mg_13::16::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe Jehovah ka mendrika hoderaina indrindra, sady mahatahotra, fa ambonin''ny andriamanitra rehetra.'
mg1865::mg_13::16::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny andriamanitry ny firenena rehetra dia tsinontsinona, fa Jehovah no nanao ny lanitra.'
mg1865::mg_13::16::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Famirapiratana sy voninahitra no eo anatrehany, Hery sy hafaliana no ao amin''ny fitoerany.'
mg1865::mg_13::16::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry firenena, manomeza an''i Jehovah, eny, manomeza voninahitra sy hery ho an''i Jehovah.'
mg1865::mg_13::16::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manomeza an''i Jehovah ny voninahitry ny anarany; Mitondrà fanatitra, ka mankanesa eo anatrehany; Miankohofa eo anatrehan''i Jehovah amin''ny fihaingoana masina'
mg1865::mg_13::16::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangovita eo anatrehany, ry tany rehetra; Izao rehetra izao voaorina ka tsy hihetsika.'
mg1865::mg_13::16::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho faly ny lanitra ary ho ravo ny tany; Ary aoka holazaina any amin''ny firenena hoe: Jehovah no Mpanjaka.'
mg1865::mg_13::16::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy; Aoka ho faly ny saha sy izay rehetra ao aminy.'
mg1865::mg_13::16::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hihoby eo anatrehan''i Jehovah amin''izay ny hazo an''ala; Fa avy hitsara ny tany Izy.'
mg1865::mg_13::16::34:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà an''i Jehovah, fa tsara Izy: Fa mandrakizay ny famindram-pony.'
mg1865::mg_13::16::35:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manaova hoe: Vonjeo izahay, ry Andriamanitry ny famonjena anay o, ary angony izahay, ka vonjeo tsy ho azon''ny jentilisa, Mba hisaoranay ny anaranao masina, ka ho reharehanay ny fiderana Anao.'
mg1865::mg_13::16::36:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin''ny taloha indrindra ka ho mandrakizay. Ary ny olona rehetra nanao hoe: Amena, sady nidera an''i Jehovah.'
mg1865::mg_13::16::37:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asafa sy ny rahalahiny dia navelan''i Davida teo anoloan''ny fiaran''ny faneken''Jehovah hanao fanompoam-pivavahana ao mandrakariva araka ny raharaha tokony hatao isan''andro,'
mg1865::mg_13::16::38:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Obed-edoma sy ny rahalahiny valo amby enim-polo sy Obed-edoma, zanak''i Jedotona, ary Hosa ho mpiandry varavarana kosa.'
mg1865::mg_13::16::39:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zadoka mpisorona sy ny mpisorona rahalahiny dia navelany teo anoloan''ny tabernakelin''i Jehovah teo amin''ny fitoerana avo any Gibeona,'
mg1865::mg_13::16::40:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'hanatitra fanatitra dorana ho an''i Jehovah marain-tsy hariva eo amin''ny alitara fandoroana ny fanatitra dorana mandrakariva, ary hanao araka izay rehetra voasoratra ao amin''ny lalàn''i Jehovah, izay nandidiany ny Isiraely,'
mg1865::mg_13::16::41:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary naman''ireo koa Hemana sy Jedotona ary ny sisa amin''ny olona voafidy izay voatonona anarana hidera an''i Jehovah, fa mandrakizay ny famindram-pony.'
mg1865::mg_13::16::42:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao amin''i Hemana sy Jedotona nisy trompetra sy kipantsona ho an''izay mampaneno ary ny fomban''ny zava-manenon''Andriamanitra. Ary ny zanak''i Jedotona no mpiandry varavarana.'
mg1865::mg_13::16::43:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 16
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia samy nody tany an-tranony avy ny olona rehetra, ary Davida koa lasa nody mba hitso-drano ny ankohonany.'
mg1865::mg_13::17::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanirian''i Davida hanao tempoly, sy ny toky nomen''Andriamanitra azy ny amin''ny haharetan''ny fanjakany'
  verse_text: 'Ary Davida, raha nipetraka tao an-tranony, dia nanao tamin''i Natana mpaminany hoe: Akory izato izaho mitoetra amin''ny trano sedera, nefa ny fiaran''ny neken''i Jehovah kosa mitoetra ao anaty lay!'
mg1865::mg_13::17::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Natana tamin''i Davida: Ataovy izay rehetra ao am-ponao, fa Andriamanitra no momba anao.'
mg1865::mg_13::17::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tamin''ny alin''iny ihany dia tonga tamin''i Natana ny tenin''Andriamanitra nanao hoe:'
mg1865::mg_13::17::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha, lazao amin''i Davida mpanompoko hoe: Izao no lazain''i Jehovah: Tsy ianao no hanao trano hitoerako;'
mg1865::mg_13::17::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy mbola nitoetra an-trano Aho hatramin''ny nitondrako ny Isiraely niakatra ka mandraka androany, fa nifindrafindra toby* sy nifindrafindra toerana**. [*Hebreo: lay] [**Hebreo: tabernakely]'
mg1865::mg_13::17::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay rehetra nifindrafindrako niaraka tamin''ny Isiraely moa nisy nitenenako akory va ny mpitsaran''ny Isiraely, izay notendreko ho mpiandry ny oloko, ka nanaovako hoe: Nahoana no tsy nanao trano sedera ho Ahy ianareo?'
mg1865::mg_13::17::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao amin''i Davida mpanompoko hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Izaho no naka anao tany an-tsaha, dia avy tamin''ny niandrasanao ondry, mba ho mpanapaka ny Isiraely oloko.'
mg1865::mg_13::17::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomba anao tamin''izay rehetra nalehanao Aho, ka naringako tsy ho eo anoloanao ny fahavalonao rehetra, ary homeko anarana tahaka ny anaran''izay lehibe ambonin''ny tany ianao.'
mg1865::mg_13::17::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hifidy tany ho an''ny Isiraely oloko Aho sady hamponina azy, ka dia handry fahizay amin''ny fonenany izy ka tsy hanana ahiahy intsony, ary ny zanaky ny faharatsiana tsy hampahory azy intsony tahaka ny tany aloha'
mg1865::mg_13::17::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy tahaka ny hatramin''ny andro nanendreko mpitsara ho mpifehy ny Isiraely oloko. Ary haetriko avokoa ny fahavalonao rehetra. Ary ambarako aminao koa fa Jehovah hanome taranaka anao*. [*Hebreo: hanao trano ho anao]'
mg1865::mg_13::17::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny andronao, ka lasa any amin''ny razanao ianao, dia hatsangako ny zanakao anankiray mandimby anao, izay isan''ny terakao; ary hampitoeriko ny fanjakany;'
mg1865::mg_13::17::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia io no hanao trano ho Ahy, ary Izaho kosa hampitoetra ny seza fiandrianany ho mandrakizay.'
mg1865::mg_13::17::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho ho rainy, ary izy ho zanako; ary tsy hanaisotra ny famindram-poko aminy Aho, tahaka ny nanesorako izany tamin''ilay nodiasanao;'
mg1865::mg_13::17::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hampitoeriko ao an-tranoko sy ao amin''ny fanjakako mandrakizay izy; ary hampitoerina mandrakizay ny seza fiandrianany.'
mg1865::mg_13::17::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izany teny rehetra izany sy araka izao fahitana izao no nolazain''i Natana tamin''i Davida.'
mg1865::mg_13::17::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mpanjaka niditra ka nipetraka teo anatrehan''i Jehovah, dia nanao hoe: Zinona moa aho, Jehovah Andriamanitra o? Ary zinona moa ny mpianakaviko, no nentinao ambaraka ankehitriny aho?'
mg1865::mg_13::17::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola nataonao ho zavatra kely ihany aza izany, Andriamanitra o; fa, indro, efa voalazanao koa ny amin''ny taranaky ny mpanomponao hatramin''ny mbola any aoriana lavitra aza, ary nitsinjo ahy araka ny fanaon''ny olona Ianao, Jehovah Andriamanitra o, ka nanandratra ahy.'
mg1865::mg_13::17::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona intsony no holazain''i Davida aminao ny amin''ny voninahitra omena ny mpanomponao? fa Ianao no mahalala ny mpanomponao.'
mg1865::mg_13::17::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, noho ny amin''ny mpanomponao sy araka ny sitraponao no nanaovanao io zavatra lehibe io, mba hampiharihariana ireo zavatra lehibe rehetra ireo.'
mg1865::mg_13::17::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tsy misy tahaka Anao, ary tsy misy Andriamanitra afa-tsy Ianao, araka izay rehetra ren''ny sofinay.'
mg1865::mg_13::17::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aiza moa no misy firenena ety an-tany tahaka ny Isiraely olonao, izay nalehan''Andriamanitra havotana ho olony, hanaovanao anarana lehibe sy mahatahotra ho Anao, dia tamin''ny nandroahanao firenena tsy ho eo anoloan''ny olonao, izay navotanao avy tany Egypta?'
mg1865::mg_13::17::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Isiraely olonao nofidinao ho olonao mandrakizay, ary Ianao, Jehovah o, no efa tonga Andriamaniny.'
mg1865::mg_13::17::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, Jehovah o, ilay teny nolazainao ny amin''ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay, ary ataovy araka izay nolazainao.'
mg1865::mg_13::17::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, aoka hampitoerina izany, ary aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe: Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, no Andriamanitry ny Isiraely; ka dia hampitoerina eo anatrehanao ny taranak''i Davida mpanomponao.'
mg1865::mg_13::17::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Andriamanitro o, efa nanambara tamin''ny mpanomponao fa homenao taranaka izy*; koa Izany no nampahasahy ny mpanomponao hivavaka eto anatrehanao. [*Hebreo: hanao trano ho azy Ianao]'
mg1865::mg_13::17::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany, Jehovah o, satria Ianao no Andriamanitra, ary Ianao efa nilaza izany zava-tsoa izany ny amin''ny mpanomponao,'
mg1865::mg_13::17::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa izay tahinao, Jehovah o, dia voatahy mandrakizay.'
mg1865::mg_13::18::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandresen''i Davida ny fahavalony'
  verse_text: 'Ary nony afaka izany, dia nandresy ny Filistina Davida ka nampietry azy, ary Gata sy ny zana-bohiny dia nesoriny tamin''ny tanan''ny Filistina.'
mg1865::mg_13::18::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandresy ny Moabita koa izy, ka dia tonga mpanompon''i Davida nandoa hetra ireo.'
mg1865::mg_13::18::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia resin''i Davida koa Hadarezera, mpanjakan''i Zoba akaikin''i Hamata, tamin''izy lasa nampiorina ny fanjakany* teo amoron''ny ony Eofrata. [*Na: nanangana saina]'
mg1865::mg_13::18::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nahazo babo kalesy arivo taminy sy mpitaingin-tsoavaly fito arivo ary miaramila an-tongotra roa alina; ary notraingotraingoin''i Davida avokoa ny soavalin-kalesy rehetra, fa ny tokony ho amin''ny kalesy zato ihany no navelany.'
mg1865::mg_13::18::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny Syriana avy any Damaskosy hanampy an''i Hadarezera, mpanjakan''i Zoba, dia nahafatesan''i Davida olona roa arivo sy roa alina ny Syriana.'
mg1865::mg_13::18::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy namponenin''i Davida tany Syria any Damaskosy; dia tonga mpanompon''i Davida ny Syriana ka nandoa hetra. Fa Jehovah nampahery an''i Davida teny amin''izay rehetra nalehany.'
mg1865::mg_13::18::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Davida ny ampinga volamena teny amin''ny mpanompon''i Hadarezera ka nentiny nankany Jerosalema.'
mg1865::mg_13::18::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao Tibata sy Kona, tanànan''i Hadarezera, no nahazoan''i Davida babo varahina be dia be, ary izany no nanaovan''i Solomona ilay tavin-drano* varahina lehibe sy ny andry ary ny fanaka varahina. [*Hebreo: ranomasina]'
mg1865::mg_13::18::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Toy, mpanjakan''i Hamata, fa Davida efa naharesy ny miaramila rehetra an''i Hadarezera, mpanjakan''i Zoba,'
mg1865::mg_13::18::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia naniraka an''i Hadorama zanany hankany amin''i Davida mpanjaka izy hiarahaba sy hisaotra azy noho ny niadiany tamin''i Hadarezera sy ny nahareseny azy (fa Hadarezera dia fahavalon''i Toy), sady nampitondrainy fanaka volamena sy volafotsy ary varahina izay samy maro karazana izy.'
mg1865::mg_13::18::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nohamasinin''i Davida mpanjaka ho an''i Jehovah koa izany mbamin''ny volafotsy sy ny volamena nentiny avy tamin''ny firenena rehetra, dia tany Edoma sy Moaba sy ny taranak''i Amona sy ny Filistina ary ny Amalekita'
mg1865::mg_13::18::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abisay, zanak''i Zeroia, naharesy ny Edomita teo amin''ny Lohasahan-tsira, dia lehilahy valo arivo sy iray alina.'
mg1865::mg_13::18::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nametraka miaramila tany Edoma izy; dia tonga mpanompon''i Davida ny Edomita rehetra. Fa Jehovah nampahery an''i Davida teny amin''izay rehetra nalehany.'
mg1865::mg_13::18::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny mpanao raharaham-panjakana tamin''i Davida'
  verse_text: 'Ary Davida nanjaka tamin''ny Isiraely rehetra ka nitsara sy nitondra ny vahoakany rehetra tamin''ny fahamarinana.'
mg1865::mg_13::18::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba, zanak''i Zeroia, no komandin''ny miaramila; ary Josafata, zanak''i Ahiloda, no mpitadidy ny raharaham-panjakana.'
mg1865::mg_13::18::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zadoka, zanak''i Ahitoba, sy Abimeleka, zanak''i Abiatara, no mpisorona; ary Saosa no mpanoratra.'
mg1865::mg_13::18::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Benaia, zanak''i Joiada, no mpifehy ny miaramila mpiambina andriana*; ary ny zanak''i Davida no lehibe tamin''izay nanolotra ny mpanjaka. [*Hebreo: Keretita sy Peletita]'
mg1865::mg_13::19::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahatonga ny niadian''i Davida tamin''ny Syriana sy ny Amonita, ary ny nahareseny azy'
  verse_text: 'Ary rehefa afaka izany, dia maty Nahasy, mpanjakan''ny taranak''i Amona, ary ny zanany no nanjaka nandimby azy.'
mg1865::mg_13::19::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida: Hanisy soa an''i Hanona, zanak''i Nahasy, aho, fa soa no nataon''ny rainy tamiko. Ary Davida naniraka olona hitsapa alahelo azy noho ny amin-drainy. Ary tonga tany amin''i Hanona tany amin''ny tanin''ny Amonita ny mpanompon''i Davida hitsapa alahelo azy.'
mg1865::mg_13::19::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo mpanapaka ny taranak''i Amona tamin''i Hanona: Moa ataonao ho fanajana ny rainao no anirahan''i Davida hitsapa alahelo anao? Fa tsy hizaha sy handrava ary hisafo ny tany va no nalehan''ireo mpanompony ireo aty aminao?'
mg1865::mg_13::19::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosamborin''i Hanona ny mpanompon''i Davida ka noharatany, sady nofolonany hatreo amin''ny foto-peny ny akanjony, ka dia nalefany hody izy.'
mg1865::mg_13::19::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nisy lasa nanambara tamin''i Davida izay natao tamin''ireo lehilahy ireo; ary izy naniraka hitsena azy, fa afa-baraka* loatra izy, ka dia hoy ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin''ny somotrareo, vao mody ianareo. [*Na: menatra]'
mg1865::mg_13::19::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny taranak''i Amona fa efa nanao izay nampangidy hoditra azy tamin''i Davida izy, dia naniraka nampanatitra talenta volafotsy arivo hakaramany kalesy sy mpitaingin-tsoavaly any Mesopotamia sy Syriamaka ary Zoba Hanona sy ny taranak''i Amona.'
mg1865::mg_13::19::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanakarama kalesy roa arivo amby telo alina mbamin''ny mpanjakan''i Maka sy ny olony izy; ary tonga ireo ka nitoby tandrifin''i Medeba. Ary nivory ny taranak''Amona niala tany amin''ny tanànany avy ka tamy hiady.'
mg1865::mg_13::19::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Davida izany, dia naniraka an''i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery.'
mg1865::mg_13::19::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Amona nivoaka ka nilahatra hiady teo anoloan''ny vavahadin''ny tanàna; fa ireo mpanjaka tonga ireo kosa dia nitokana teny an-tsaha.'
mg1865::mg_13::19::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Joaba fa sady teo anoloany no teo ivohony ny fahavalo, dia nifidy olona tamin''ireo voafantina tamin''ny Isiraely rehetra izy, ka nalahany hiady tamin''ny Syriana.'
mg1865::mg_13::19::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa kosa nomeny ho entin''i Abisay rahalahiny, ka dia nilahatra hiady amin''ny taranak''i Amona ireo.'
mg1865::mg_13::19::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Joaba: Raha tsy tohako ny Syriana, dia vonjeo aho; fa raha tsy tohanao kosa ny taranak''i Amona, dia hovonjeko ianao;'
mg1865::mg_13::19::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'mahereza, ary aoka hitombandahy isika ho an''ny firenentsika sy ireo tanànan''Andriamanitsika; ary aoka Jehovah hanao izay sitrapony.'
mg1865::mg_13::19::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandroso hiady tamin''ny Syriana Joaba sy ny olona nanaraka azy; ka dia nandositra niala teo anoloany ireo.'
mg1865::mg_13::19::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny taranak''i Amona fa nandositra ny Syriana, dia mba nandositra niala teo anoloan''i Abisay, rahalahin''i Joaba, koa izy ka niditra tao an-tanàna. Ary dia tonga tany Jerosalema Joaba.'
mg1865::mg_13::19::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny Syriana fa resy teo anoloan''ny Isiraely izy, dia naniraka olona izy haka ny Syriana izay tany an-dafin''ny Ony*; ary Sobaka, komandin''ny miaramilan''i Hadarezera, no nitarika azy. [*Eofrata]'
mg1865::mg_13::19::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nambara tamin''i Davida izany, dia namory ny Isiraely rehetra izy ka lasa nita an''i Jordana, dia tonga teo aminy ka nilahatra hiady aminy. Ary nony nilahatra hiady amin''ny Syriana Davida, dia niady taminy ireo.'
mg1865::mg_13::19::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vaky nandositra teo anoloan''ny Isiraely ny Syriana, ka nahafaty ny teo amin''ny kalesy fito arivo sy miaramila an-tongotra efatra alina tamin''ny Syriana Davida; ary matiny koa Sobaka, komandin''ny miaramila.'
mg1865::mg_13::19::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ireo nanoa an''i Hadarezera fa resy teo anoloan''ny Isiraely izy, dia nanao fihavanana tamin''i Davida izy ka nanompo azy; ary tsy nety nanampy ny taranak''i Amona intsony ny Syriana.'
mg1865::mg_13::20::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niherina ny taona, ka mby amin''ny andro fandehanan''ny mpanjaka hiady, dia nitondra ny miaramila rehetra Joaba ka nandrava ny tanin''ny taranak''i Amona, dia tonga izy ka nanao fahirano an''i Raba; fa Davida kosa nijanona tany Jerosalema ihany. Ary Joaba nahafaka an''i Raba, ka dia nandrava azy.'
mg1865::mg_13::20::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesorin''i Davida ny satro-boninahitr''ilay mpanjaka* teo an-dohany, ka hitany fa talenta volamena iray no lanjany, sady nisy vato soa, ary dia nisatrohan''i Davida. Ary navoakany ny babo azo tao an-tanàna ka be dia be. [*Na: Malkama; ]'
mg1865::mg_13::20::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia navoakany koa ny olona izay tao, ka nasiany* tamin''ny tsofa sy tamin''ny fangao-by lehibe sy ny famaky; toy izany no nataon''i Davida tamin''ny tanànan''ny taranak''i Amona rehetra. Ary Davida sy ny vahoaka rehetra dia niverina nankany Jerosalema. [*Hebreo: notsofiny]'
mg1865::mg_13::20::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny nataon''ny lehilahy maherin''i Davida tamin''ny niadiany tamin''ny Filistina'
  verse_text: 'Ary nony afaka izany, dia nisy ady tamin''ny Filistina tao Gazera; tamin''izany no namonoan''i Sibekay Hosatita an''i Sipay, izay isan''ny taranaky ny Refaita, ka dia naetriny ny Filistina.'
mg1865::mg_13::20::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nisy ady tamin''ny Filistina indray ary Elanana, zanak''i Jaira, namono an''i Lamy, rahalahin''i Goliata Gatita, izay nanan-jaran-defona tahaka ny vodi-tenon''ny mpanenona.'
mg1865::mg_13::20::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ady indray tao Gata; ary tao nisy lehilahy vaventibe izay enin-drantsana, ka dia efatra amby roa-polo no isan''ny rantsan-tanany sy ny rantsan-tongony; ary izy koa mba isan''ny taranaky ny Refaita.'
mg1865::mg_13::20::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nihaika ny Isiraely izy, dia nahafaty azy Jonatana, zanak''i Simea, rahalahin''i Davida.'
mg1865::mg_13::20::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no taranaky ny Refaita tao Gata, ka matin''ny tanan''i Davida sy ny tanan''ny mpanompony ireo.'
mg1865::mg_13::21::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanisana ny vahoaka, sy ny aretina nanjo ny olona noho izany, ary ny fifonana nataon''i Davida'
  verse_text: 'Ary Satana nitsangana hampidi-doza tamin''ny Isiraely ka nanome saina an''i Davida hanisa ny Isiraely.'
mg1865::mg_13::21::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida tamin''i Joaba sy tamin''ireo lehiben''ny vahoaka: Mandehana, isao ny Isiraely hatrany Beri-sheba ka hatrany Dana; ary ento aty amiko ny isany mba ho fantatro.'
mg1865::mg_13::21::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Joaba: Jehovah anie hampitombo ny olony ho injato toy izao na firy na firy izy; fa moa tsy mpanompon''ny tompoko izy rehetra, ry mpanjaka tompoko? Koa inona indray no itadiavan''ny tompoko izany zavatra izany? Nahoana no dia hampahadiso ny Isiraely?'
mg1865::mg_13::21::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy azon''i Joaba nolavina ny tenin''ny mpanjaka; ka dia niainga izy ka nitety ny Isiraely rehetra; dia tonga tany Jerosalema indray izy.'
mg1865::mg_13::21::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary natolotr''i Joaba an''i Davida ny isan''ny olona voalamina, ka nisy iray hetsy sy iray tapitrisa ny lehilahy mahatan-tsabatra teo amin''ny Isiraely; ary fito alina sy efatra hetsy ny lehilahy mahatan-tsabatra teo amin''ny Joda.'
mg1865::mg_13::21::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Levy sy ny Benjamina tsy mba nalaminy, satria fahavetavetana tamin''i Joaba ny tenin''ny mpanjaka.'
mg1865::mg_13::21::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy sitrak''Andriamanitra izany zavatra izany; ka dia namely ny Isiraely Izy.'
mg1865::mg_13::21::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''Andriamanitra; Efa nanota indrindra aho tamin''izao nataoko izao; koa ankehitriny, mifona aminao aho, esory ny heloky ny mpanomponao, fa efa nanao fahadalana lehibe tokoa aho.'
mg1865::mg_13::21::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Gada mpahitan''i Davida:'
mg1865::mg_13::21::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka lazao amin''i Davida hoe: Izao no lazain''i Jehovah: Zavatra telo loha no apetrako eto anoloanao, koa fidio izay iray hataoko aminao.'
mg1865::mg_13::21::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gada nankany amin''i Davida ka nanao taminy hoe: Izao no lazain''i Jehovah: Mifidia:'
mg1865::mg_13::21::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mosary telo taona va? Sa fandringanana eo alohan''ny fahavalonao telo volana, raha tratry ny sabatry ny fahavalonao ianao? Sa ny sabatr''i Jehovah, dia areti-mandringana, no hamely ny tany hateloana, ka Ilay Anjelin''i Jehovah handringana eran''ny tanin''ny Isiraely rehetra? Koa hevero tsara izay valiny ho entiko miverina any amin''Izay naniraka ahy.'
mg1865::mg_13::21::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Gada: Indrisy! poritra loatra aho! nefa aleoko ho azon''ny tanan''i Jehovah, fa lehibe ny famindram-pony toy izay ho azon''izay tanan''olona.'
mg1865::mg_13::21::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasian''i Jehovah areti-mandringana ny Isiraely ka nahafatesana fito alina izy.'
mg1865::mg_13::21::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra naniraka Anjely hankany Jerosalema handrava azy; ary raha ilay mbola nandrava iny Izy, dia nijery Jehovah ka nanenina ny amin''ny loza ka nanao tamin''Ilay Anjely nandrava hoe: Aoka izay! Atsaharo ny tananao ankehitriny. Ary Ilay Anjelin''i Jehovah nitsangana teo anilan''ny famoloan''i Araona Jebosita.'
mg1865::mg_13::21::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanopy ny masony ka nahita Ilay Anjelin''i Jehovah nitsangana teo anelanelan''ny tany sy ny lanitra sady nitana sabatra voatsoaka teny an-tanany, izay natondrony manandrify an''i Jerosalema. Dia niankohoka Davida sy ny loholon''ny Isiraely, izay efa samy nitafy lamba fisaonana*. [*Hebreo: lamba malailay]'
mg1865::mg_13::21::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''Andriamanitra: Tsy izaho va no nandidy hanisa ny vahoaka? Izaho no nanota sy nanao ratsy tokoa; fa ireo ondry ireo kosa, inona moa no mba nataony? Eny, Jehovah Andriamanitro o, mifona aminao re aho, aoka ny tananao hamely ahy sy ny mpianakavin''ny raiko, fa aza ny olonao no asianao amin''ny areti-mandringana.'
mg1865::mg_13::21::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gada nasain''Ilay Anjelin''i Jehovah hilaza amin''i Davida mba hiakatra hanangana alitara ho an''i Jehovah ao amin''ny famoloan''i Araona Jebosita.'
mg1865::mg_13::21::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia niakatra Davida araka ny tenin''i Gada, izay nolazainy tamin''ny anaran''i Jehovah.'
mg1865::mg_13::21::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Araona niherika ka nahita Ilay Anjely; ary ny zanany efa-dahy izay teo aminy dia niery. Ary Araona nively vary tao tamin''izay.'
mg1865::mg_13::21::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''i Araona Davida, dia nijery Araona ka nahita an''i Davida, ary dia niala avy teo amin''ny famoloana izy ka niankohoka tamin''ny tany teo anatrehan''i Davida.'
mg1865::mg_13::21::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Araona: Mba omeo ahy amin''izay tokom-bidiny ity famoloana ity hanorenako alitara ho an''i Jehovah; omeo ahy izy, mba hitsaharan''ny areti-mandringana tsy hamely ny vahoaka.'
mg1865::mg_13::21::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Araona tamin''i Davida: Ento ary ho anao, ary aoka ny mpanjaka tompoko hanao izay sitrany; indro, omeko koa ny omby ho fanatitra dorana ary ny fivelezam-bary ho kitay ary ny vary tritika ho fanatitra hohanina; foiko avokoa izy rehetra.'
mg1865::mg_13::21::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida mpanjaka tamin''i Araona: Tsia, fa hovidiko mihitsy araka izay tokom-bidiny; fa tsy haka izay anao ho an''i Jehovah aho ary tsy hanatitra fanatitra dorana amin''izay azoko fotsiny.'
mg1865::mg_13::21::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomen''i Davida sekely volamena lanjan''enin-jato Araona ho vidin''ny tany.'
mg1865::mg_13::21::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanorina alitara teo ho an''i Jehovah ka nanatitra fanatitra dorana sy fanati-pihavanana; dia niantso an''i Jehovah izy ka novaliany tamin''ny afo avy tany an-danitra, izay latsaka teo amin''ny alitara fandoroana ny fanatitra dorana.'
mg1865::mg_13::21::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandidy Ilay Anjely, ka dia nampidiriny tamin''ny tranony ny sabany.'
mg1865::mg_13::21::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany, nony hitan''i Davida fa novalian''i Jehovah teo amin''ny famoloan''i Araona Jebosita izy, dia namono zavatra hatao fanatitra teo izy.'
mg1865::mg_13::21::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tabernakelin''i Jehovah izay nataon''i Mosesy tany an''efitra sy ny alitara fandoroana ny fanatitra dorana kosa dia teo amin''ny fitoerana avo tao Gibeona fahizay;'
mg1865::mg_13::21::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa Davida tsy nahazo nankeo anoloan''izany hanontany amin''Andriamanitra; fa raiki-tahotra izy noho ny sabatr''Ilay Anjelin''i Jehovah.'
mg1865::mg_13::22::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida: Eto no ho tranon''i Jehovah Andriamanitra, ary eto no ho alitara fandoroana ny fanatitra dorana ho an''ny Isiraely.'
mg1865::mg_13::22::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny namorian''i Davida ny zavatra ho enti-manao ny tempoly, sy ny hafatra nataony ny amin''ny hanaovana azy'
  verse_text: 'Ary nasain''i Davida novorina ny olona hafa firenena izay tany amin''ny tanin''ny Isiraely, ka nanendreny tambato hipai-bato hanaovana ny tranon''Andriamanitra.'
mg1865::mg_13::22::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nahavonona vy betsaka hatao hombon''ny lela-vavahady sy ny fikambanany, ary varahina betsaka tsy hita lanja'
mg1865::mg_13::22::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy hazo sedera tsy hita isa; fa ny mponina tany Sidona sy Tyro nitondra hazo sedera betsaka ho any amin''i Davida.'
mg1865::mg_13::22::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida: Solomona zanako mbola zaza sady tanora fanahy, ary ny trano hatao ho an''i Jehovah dia tsy maintsy ho lehibe indrindra, mba hiely any amin''ny tany rehetra ny lazany sy ny voninahiny, koa hovononiko rahateo ny zavatra ho enti-manao azy. Ka dia nahavonona betsaka Davida, raha mbola velona izy.'
mg1865::mg_13::22::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: '2022-05-26T06:48:48+0000'
  verse_title: null
  verse_text: 'Ary niantso an''i Solomona zanany izy ka nandidy azy hanao trano ho an''i Jehovah, andriamanitry ny Isiraely,'
mg1865::mg_13::22::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao taminy hoe: Anaka, efa mby tato am-poko ny hanao trano ho an''ny anaran''i Jehovah Andriamanitro;'
mg1865::mg_13::22::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'saingy nisy tenin''i Jehovah tonga tamiko* nanao hoe: Be ny rà efa nalatsakao, ary ady lehibe no efa nataonao; koa tsy mahazo manao trano ho an''ny anarako ianao, satria be ny rà efa nalatsakao tamin''ny tany teo imasoko. [*Na: ny amiko]'
mg1865::mg_13::22::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ianao hiteraka zazalahy, izay ho lehilahy miadana, ary hampiadaniko tsy hisy hahazo azy ny fahavalony rehetra manodidina; koa ny anarany dia hatao hoe Solomona*; ary hampiadaniko sy hampandriko fahizay ny Isiraely amin''ny androny. [*Solomona = Miadana]'
mg1865::mg_13::22::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no hanao trano ho an''ny anarako; ary izy ho zanako, ary Izaho ho rainy, ary Izaho hampitoetra ny seza fiandrianan''ny fanjakany amin''ny Isiraely mandrakizay.'
mg1865::mg_13::22::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, anaka, ho aminao anie Jehovah, ka hambinina anie ianao, fa ataovy ny tranon''i Jehovah Andriamanitrao araka izay nilazany anao.'
mg1865::mg_13::22::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homen''i Jehovah saina sy fahendrena anie ianao ka hatsangany ho mpanapaka ny Isiraely, mba hitandremanao ny lalan''i Jehovah Andriamanitrao.'
mg1865::mg_13::22::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia hambinina ianao, raha mitandrina hankatò ny lalàna sy ny fitsipika izay nandidian''i Jehovah an''i Mosesy ho an''ny Isiraely; mahereza sy matanjaha; aza matahotra na mivadi-po.'
mg1865::mg_13::22::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, he! fa na dia be fahoriana aza aho, dia nahavory talenta volamena iray hetsy sy talenta volafotsy iray tapitrisa ary varahina sy vy betsaka tsy hita lanja ho enti-manao ny tranon''i Jehovah; ary efa nahavonona hazo sy vato koa aho; ka dia ampionao kosa ireo.'
mg1865::mg_13::22::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, efa manana mpiasa betsaka ianao, dia mpikapa hazo sy tambato sy mpandrafitra ary olona mahay ny asa samy hafa rehetra.'
mg1865::mg_13::22::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volamena sy ny volafotsy ary ny varahina sy ny vy dia tsy hita isa. Koa mitsangàna ianao, ka manaova, ary homba anao anie Jehovah.'
mg1865::mg_13::22::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nandidy ny lehibe rehetra tamin''ny Isiraely hanampy an''i Solomona zanany hoe:'
mg1865::mg_13::22::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy momba anareo va Jehovah Andriamanitrareo ka efa nampiadana anareo amin''ny manodidina? Fa efa natolony teo an-tanako ny mponina amin''ny tany; ary ny tany efa resy teo anoloan''i Jehovah sy teo anoloan''ny olony.'
mg1865::mg_13::22::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny ampitadiavo an''i Jehovah Andriamanitrareo ny fonareo sy ny fanahinareo, ka mitsangàna, ary manaova ny fitoerana masina ho an''i Jehovah Andriamanitra, hampidirana ny fiaran''ny faneken''i Jehovah sy ny fanaka masin''Andriamanitra ho ao amin''ny trano izay hatao ho an''ny anaran''i Jehovah.'
mg1865::mg_13::23::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanendrena an''i Solomona ho mpanjaka, sy ny nandaminana ny raharahan''ny Levita'
  verse_text: 'Ary nony efa ela niainana sy tratrantitra tsara* Davida, dia Solomona zanany no nataony mpanjaka tamin''ny Isiraely. [*Hebreo: voky andro, na afa-pon''ny miaina]'
mg1865::mg_13::23::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novoriny ny lehiben''ny Isiraely rehetra mbamin''ny mpisorona sy ny Levita.'
mg1865::mg_13::23::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisaina ny Levita hatramin''ny telo-polo taona no ho miakatra, ka valo arivo amby telo alina no isan''ny lehilahy.'
mg1865::mg_13::23::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida: Ny efatra arivo amby roa alina amin''ireo dia ataoko ho tonian''ny asa ao an-tranon''i Jehovah, ary ny enina arivo ataoko mpifehy sy mpitsara,'
mg1865::mg_13::23::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny efatra arivo ho mpiandry varavarana, ary ny efatra arivo ho mpidera an''i Jehovah amin''ny zavatra namboariko hiderana Azy.'
mg1865::mg_13::23::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nozarazarain''i Davida ho antokony ireo araka ny zanakalahin''i Levy, dia Gersona sy Kehata sy Merary:'
mg1865::mg_13::23::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny Gersonita dia Ladana sy Simey.'
mg1865::mg_13::23::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Ladana dia Jehiela lohany sy Zetama ary Joela; telo izy.'
mg1865::mg_13::23::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Simey dia Selomota sy Haziela ary Harana; telo izy. Ireo no lohany tamin''ny fianakavian''i Ladana.'
mg1865::mg_13::23::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Simey dia Jahata sy Zina sy Jeosy ary Beria; izy efa-dahy ireo no zanakalahin''i Simey.'
mg1865::mg_13::23::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jahata no lohany, ary Ziza no faharoany; fa Jeosy sy Beria tsy nanana zanakalahy maro, ka dia nisaina ho fianakaviana iray sy antokony iray izy.'
mg1865::mg_13::23::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela; efatra izy.'
mg1865::mg_13::23::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Amrama dia Arona sy Mosesy. Ary Arona natokana ka nohamasinina ho masina indrindra, dia izy sy ny taranany mandrakizay, handoro ditin-kazo manitra eo anatrehan''i Jehovah sy hanao fanompoam-pivavahana ho Azy ary hitso-drano amin''ny anarany mandrakizay.'
mg1865::mg_13::23::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny amin''i Mosesy, lehilahin''Andriamanitra, dia nisaina tamin''ny firenen''i Levy ihany ny zanany.'
mg1865::mg_13::23::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Mosesy dia Gersona sy Eliezera.'
mg1865::mg_13::23::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny zanakalahin''i Gersona dia Seboela no lohany.'
mg1865::mg_13::23::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny zanakalahin''i Eliezera dia Rehabia no lohany (Eliezera anefa tsy nanan-janaka hafa) fa ny zanak''i Rehabia dia maro indrindra.'
mg1865::mg_13::23::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny zanakalahin''i Jizara dia Selomota no lohany.'
mg1865::mg_13::23::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Hebrona, dia Jeria no lahimatoa, Amaria no lahiaivo, Jahaziela no fahatelo, ary Jekameama no faralahy.'
mg1865::mg_13::23::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Oziela, dia Mita no lahimatoa, ary Jisia no faralahy.'
mg1865::mg_13::23::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Merary dia Maly sy Mosy. Ny zanakalahin''i Maly dia Eleazara sy Kisy.'
mg1865::mg_13::23::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Eleazara ka tsy nanan-janakalahy, fa vavy avokoa; ary ireny zanakalahin''i Kisy havany no nanambady ireo.'
mg1865::mg_13::23::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Mosy dia Maly sy Edera ary Jeremota; telo izy.'
mg1865::mg_13::23::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no zanakalahin''i Levy araka ny fianakaviany, dia ny lohan''ny fianakaviana tamin''ny antokony avy araka ny nanisana ny anarany tsirairay, dia izay nanao ny fanompoana tao an-tranon''i Jehovah, hatramin''ny roa-polo taona no ho miakatra.'
mg1865::mg_13::23::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida: Jehovah, Andriamanitry ny Isiraely, efa nanome fitsaharana ho an''ny olony sady mitoetra eto Jerosalema mandrakizay.'
mg1865::mg_13::23::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita kosa dia tsy hitondra ny tabernakely na ny fanaka enti-manompo ao aminy intsony.'
mg1865::mg_13::23::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa araka ny fara-tenin''i Davida dia nisaina hatramin''ny roa-polo taona no ho miakatra ny Levita.'
mg1865::mg_13::23::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny raharahany dia ny hanampy ny taranak''i Arona amin''ny fanompoana ao an-tranon''i Jehovah amin''ireo kianja sy efi-trano tao ary amin''ny fanadiovana ny zavatra masina rehetra sy ny fanompoana ao an-tranon''Andriamanitra,'
mg1865::mg_13::23::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''ny mofo aseho sy ny koba tsara toto ho fanatitra hohanina sy amin''ny mofo manify tsy misy masirasira sy amin''izay endasina amin''ny lapoely sy amin''izay vonton-diloilo ary amin''ny famarana sy ny fandrefesana rehetra,'
mg1865::mg_13::23::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hitsangana isa-maraina hisaotra sy hidera an''i Jehovah, ary toy izany koa amin''ny hariva,'
mg1865::mg_13::23::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hanatitra ny fanatitra dorana rehetra ho an''i Jehovah na amin''ny Sabata, na amin''ny voaloham-bolana, na amin''ny fotoam-pivavahana hafa dia araka ny isany avy, sy araka ny fanao voatendry hanaovana azy mandrakariva eo anatrehan''i Jehovah.'
mg1865::mg_13::23::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho toy izany no hitandremany ny anjara-raharahany ny amin''ny trano-lay fihaonana sy ny anjara-raharahany ny amin''ny fitoerana masina ary ny anjara-raharahany ny amin''ny taranak''i Arona rahalahiny ho fanompoana ao an-tranon''i Jehovah.'
mg1865::mg_13::24::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nizarana ny mpisorona ho efatra amby roa-polo toko'
  verse_text: 'Ary ny amin''ny taranak''i Arona dia izao no nizarana azy ho antokony: Ny zanakalahin''i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara;'
mg1865::mg_13::24::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Nadaba sy Abiho dia maty talohan-drainy sady samy tsy nanan-janaka, koa dia Eleazara sy Itamara no nanao fisoronana.'
mg1865::mg_13::24::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy Zadoka, isan''ny taranak''i Eleazara, sy Ahimeleka, isan''ny taranak''Itamara, dia nizara azy araka ny antokony sy ny fanompoany avy.'
mg1865::mg_13::24::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohany tamin''ireo, dia tamin''ny taranak''i Eleazara, no maromaro kokoa noho ny tamin''ny taranak''Itamara, ka dia nozarainy toy izao izy: Tamin''ny taranak''i Eleazara dia enina ambin''ny folo no lohan''ny fianakaviana; ary tamin''ny taranak''Itamara dia valo kosa no lohan''ny fianakaviana.'
mg1865::mg_13::24::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nozarazaraina tamin''ny filokana avokoa izy rehetra; fa samy mpifehy masina, dia mpifehy ho an''Andriamanitra avokoa, na ny avy tamin''ny taranak''i Eleazara, na ny avy tamin''ny taranak''Itamara.'
mg1865::mg_13::24::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Semaia, zanak''i Netanela, mpanoratra anankiray tamin''ny Levita, no nanoratra azy teo anatrehan''ny mpanjaka sy ny mpanapaka sy Zadoka mpisorona sy Ahimeleka, zanak''i Abiatara, sy teo anatrehan''ny lohan''ny fianakaviana tamin''ny mpisorona sy ny Levita: fianakaviana iray no nalaina ho an''i Eleazara, ary iray kosa ho an''Itamara.'
mg1865::mg_13::24::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny loka voalohany dia azon''i Joariba, ny faharoa an''i Jedaia,'
mg1865::mg_13::24::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahatelo an''i Harima, ny fahefatra an''i Seorima,'
mg1865::mg_13::24::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahadimy an''i Malkia, ny fahenina an''i Miamina,'
mg1865::mg_13::24::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahafito an''i Hakoza, ny fahavalo an''i Abia,'
mg1865::mg_13::24::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahasivy an''i Jesoa, ny fahafolo an''i Sekania.'
mg1865::mg_13::24::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahiraika ambin''ny folo an''i Eliasiba, ny faharoa ambin''ny folo an''i Jakima,'
mg1865::mg_13::24::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahatelo ambin''ny folo an''i Hopa, ny fahefatra ambin''ny folo an''i Jesebaba,'
mg1865::mg_13::24::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahadimy ambin''ny folo an''i Bilga, ny fahenina ambin''ny folo an''Imera,'
mg1865::mg_13::24::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahafito ambin''ny folo an''i Hezira, ny fahavalo ambin''ny folo an''i Hafizeza,'
mg1865::mg_13::24::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahasivy ambin''ny folo an''i Petahia, ny faharoa-polo an''i Jehezekela,'
mg1865::mg_13::24::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahiraika amby roa-polo an''i Jakina, ny faharoa amby roa-polo an''i Gamola,'
mg1865::mg_13::24::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahatelo amby roa-polo an''i Delaia, ny fahefatra amby roa-polo an''i Mazia.'
mg1865::mg_13::24::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo avy no antokony amin''ny fanompoany izay idirany* ao an-tranon''i Jehovah araka ny fitsipika voatendrin''i Arona rainy, araka ny nandidian''i Jehovah, Andriamanitry ny Isiraely, azy. [*Na: Ary ny raharahan''ireo tamin''ny fanompoana dia ny hiditra]'
mg1865::mg_13::24::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Levy sisa dia izao; Tamin''ny taranak''i Amrama dia Sobaela; tamin''ny zanak''i Sobaela dia Jedala.'
mg1865::mg_13::24::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''i Rehabia: tamin''ny taranak''i Rehabia dia Jisia no voalohany.'
mg1865::mg_13::24::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny Jizarita dia Selomota; tamin''ny taranak''i Selomota dia Jahata.'
mg1865::mg_13::24::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny taranak''i Sebrona dia Jeria no voalohany, Amaria no faharoa, Jahaziela no fahatelo, Jekameama no fahefatra.'
mg1865::mg_13::24::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Oziela dia Mika; tamin''ny taranak''i Mika dia Samira;'
mg1865::mg_13::24::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny rahalahin''i Mika dia Jisia; tamin''ny taranak''i Jisia dia Zakaria.'
mg1865::mg_13::24::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Merary dia Maly sy Mosy; ny zanakalahin''i Jazia dia Beno.'
mg1865::mg_13::24::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Merary tamin''i Jazia dia Beno sy Sohama sy Zakora ary Ibry.'
mg1865::mg_13::24::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''i Maly no nihavian''i Eleazara, izay tsy nanan-janakalahy.'
mg1865::mg_13::24::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''i Kisy, ny zananilahy dia Jeramela.'
mg1865::mg_13::24::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Mosy dia Maly sy Edera ary Jerimota. Ireo no taranaky ny Levita araka ny fianakaviany avy.'
mg1865::mg_13::24::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 24
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia mba niara-niloka tamin''ny rahalahiny, taranak''i Arona, teo anatrehan''i Davida mpanjaka sy Zadota sy Ahimeleka sy ny lohan''ny fianakavian''ny mpisorona sy ny Levita: niara-niloka avokoa na ny zokiny na ny zandriny.'
mg1865::mg_13::25::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nizarana ny mpihira ho efatra amby roa-polo toko'
  verse_text: 'Ary ny* taranak''i Asafa sy Hemana ary Jedotona dia natokan''i Davida sy ireo komandin''ny miaramila ho amin''ny fanompoana mba haminany amin''ny lokanga sy ny valiha ary ny kipantsona; ary izao no isan''ny mpanao araka ny fanompoany avy: [*Na: ny asany amin''ny]'
mg1865::mg_13::25::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny zanakalahin''i Asafa dia Zakora sy Josefa sy Netania ary Asarela, zanak''i Asafa, nofehezin''i Asafa, izay naminany araka izay nifehezan''ny mpanjaka azy.'
mg1865::mg_13::25::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''i Jedotona, ny zanany dia Gedalia sy Zery sy Jesaia sy Hasabia ary Matitia, enin-dahy ireo ka nofehezin''i Jedotona rainy, izay naminany tamin''ny lokanga hidera sy hisaotra an''i Jehovah.'
mg1865::mg_13::25::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''i Hemana, ny zanany dia Bokia, Matania, Oziela, Seboela sy Jerimota, Hanania, Hanany, Eliata, Gidalty sy Romamti-ezera sy Josbekasa sy Maloty sy Hotira ary Mahaziota.'
mg1865::mg_13::25::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo no zanak''i Hemana, mpahitan''ny mpanjaka ny amin''ny tenin''Andriamanitra, hanandratra ny tandroka. Ary Hemana dia efa nomen''Andriamanitra zazalahy efatra ambin''ny folo sy zazavavy telo.'
mg1865::mg_13::25::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo no fehin''ny rainy tamin''ny hira natao tao an-tranon''i Jehovah tamin''ny kipantsona sy ny valiha sy ny lokanga hanaovana ny fanompoana ao an-tranon''Andriamanitra; Asafa sy Jedotona ary Hemana dia nofezehin''ny mpanjaka.'
mg1865::mg_13::25::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isany mbamin''ny rahalahiny, izay efa nianatra ny hira ho an''i Jehovah izay rehetra nahay dia valo amby valo-polo amby roan-jato.'
mg1865::mg_13::25::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao filokana ny amin''ny anjara-raharahany avy izy, na ny kely na ny lehibe, na ny mpampianatra na ny mpianatra.'
mg1865::mg_13::25::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loka voalohany dia azon''i Josefa avy amin''ny taranak''i Asafa; ny faharoa an''i Gedalia, izy mbamin''ny rahalahiny sy ny zanany, dia roa ambin''ny folo;'
mg1865::mg_13::25::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahatelo an''i Zakora, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahefatra an''i Jizry, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahadimy an''i Netania, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahenina an''i Bokia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahafito an''i Jesarela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahavalo an''i Jesaia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahasivy an''i Matania, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahafolo an''i Simey, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahiraika ambin''ny folo an''i Azarela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny faharoa ambin''ny folo an''i Hasabia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahatelo ambin''ny folo an''i Sobaela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahefatra ambin''ny folo an''i Matitia, izy mbamin''ny zanany sy ny rahalahiny dia roa ambin''ny folo;'
mg1865::mg_13::25::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahadimy ambin''ny folo an''i Jeremota, izy mbamin''ny zanany sy ny rahalahiny dia roa ambin''ny folo;'
mg1865::mg_13::25::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahenina ambin''ny folo an''i Hanania, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahafito ambin''ny folo an''i Josbekasa, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahavalo ambin''ny folo an''i Hanany, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahasivy ambin''ny folo an''i Maloty, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny faharoa-polo an''i Eliata, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahiraika amby roa-polo an''i Hotira, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny faharoa amby roa-polo an''i Gidalty, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahatelo amby roa-polo an''i Mahaziota, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo;'
mg1865::mg_13::25::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 25
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahefatra amby roa-polo an''i Romamti-ezera, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo.'
mg1865::mg_13::26::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpiandry varavarana'
  verse_text: 'Ary ny amin''ny antokon''ny mpiandry varavarana: Tamin''ny Koraita dia Meselemia, zanak''i Kore, avy tamin''ny zanak''i Asafa.'
mg1865::mg_13::26::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Meselemia dia Zakaria, lahimatoa, sy Jediaela, lahiaivo, sy Zebadia, fahatelo, sy Jediaela, fahefatra,'
mg1865::mg_13::26::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elama, fahadimy, sy Johanana, fahenina, sy Elihoenay, faralahy.'
mg1865::mg_13::26::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Obed-edoma dia Semaia, lahimatoa, sy Jozabada, lahiaivo, sy Joa, fahatelo, sy Sakara, fahefatra, sy Netanela, fahadimy,'
mg1865::mg_13::26::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Amiela, fahenina, sy Isakara, fahafito, sy Peoletahy, faralahy; fa Andriamanitra efa nitahy azy.'
mg1865::mg_13::26::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Semaia zanany niteraka zazalahy maromaro izay samy tonga mpanapaka tamin''ny fianakavian-drainy, satria samy lehilahy mahay izy.'
mg1865::mg_13::26::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakalahin''i Semaia dia Otny sy Refaela sy Obeda ary Elzabada mbamin''ireo rahalahiny, lehilahy mahay, dia Eliho sy Semakia.'
mg1865::mg_13::26::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo no avy tamin''ny zanak''i Obededoma, dia izy sy ny zanany sy ny rahalahiny, izay samy lehilahy mahery sady matanjaka amin''ny fanompoany; roa amby enim-polo no an''i Obed-edoma.'
mg1865::mg_13::26::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Meselemia nanan-janaka sy rahalahy valo ambin''ny folo, samy lehilahy mahay avokoa.'
mg1865::mg_13::26::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hosa, tamin''ny taranak''i Merary, nanan-janakalahy, dia Simry, lohany (fa na dia tsy lahimatoa aza izy, dia izy no nataon-drainy ho lohany),'
mg1865::mg_13::26::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Hilkia, lahiaivo, sy Tebalia, fahatelo, ary Zakaria, fahefatra; ny zanakalahin''i Hosa sy ny rahalahiny rehetra dia telo ambin''ny folo.'
mg1865::mg_13::26::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo lohan''ny tonian''ny mpiandry varavarana ireo dia nomena anjara-raharaha niaraka tamin''ny rahalahiny hanao fanompoam-pivavahana ao an-tranon''i Jehovah.'
mg1865::mg_13::26::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo, na ny kely na ny lehibe, dia nanao filokana avokoa araka ny fianakaviany ny ho amin''ny isam-bavahady.'
mg1865::mg_13::26::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny loka tamin''ny atsinanana dia azon''i Selemia. Ary nanaovana filokana Zakaria zanany, mpanolo-tsaina hendry, ka ny loka tamin''ny avaratra no azony.'
mg1865::mg_13::26::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''i Obed-edoma ny atsimo, ary an''ny zanany ny trano firaketana.'
mg1865::mg_13::26::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''i Sopima sy Hosa ny andrefana mbamin''ny vavahady Saleketa amin''ny lalana miakatra; ary dia feno avokoa ny fiambenana.'
mg1865::mg_13::26::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny atsinanana nisy Levita enina, ny avaratra nisy efatra Isan''andro, ny atsimo nisy efatra isan''andro, ary ny trano firaketana nisy efa-dahy nizara ho roa avy.'
mg1865::mg_13::26::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany Parbara* andrefana nisy efatra amin''ny lalana, ary roa tao Parbara. [*Izahao II Mpanjaka 23:11]'
mg1865::mg_13::26::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ireo no antokon''ny mpiandry varavarana tamin''ny taranak''i Kora sy ny taranak''i Merary.'
mg1865::mg_13::26::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny amin''ny raharaha sasany koa nataon''ny Levita'
  verse_text: 'Ary tamin''ny Levita dia Ahia* no tonian''ny rakitry ny tranon''Andriamanitra sy ny zavatra nohamasinina ho rakitra. [*Na: (ary ny Levita rahalahiny)]'
mg1865::mg_13::26::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Ladana, ilay Ladana Gersonita, ireo lohan''ny fianakavian''i Ladana Gersonita, dia ny Jehielita.'
mg1865::mg_13::26::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranaky ny Jehielita, dia Zetama sy Joela rahalahiny, no tonian''ny rakitry ny tranon''i Jehovah.'
mg1865::mg_13::26::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny Amramita sy ny Jizarita sy ny Hebronita ary ny Ozielita'
mg1865::mg_13::26::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Seboela, avy tamin''ny taranak''i Gersona, zanak''i Mosesy, no tonian''ny rakitra.'
mg1865::mg_13::26::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahiny avy tamin''i Eliezera dia Rehabia, zanak''i Eliezera, sy Jesaia, zanak''i Rehabia, sy Jorama, zanak''i Jesaia, sy Zikry, zanak''i Jorama, ary Selomota, zanak''i Zikry.'
mg1865::mg_13::26::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Io Selomota io sy ny rahalahiny no tonian''ny zavatra nohamasinina ho rakitra, dia Izay nohamasinin''i Davida mpanjaka sy ny lohan''ny fianakaviana ary ny mpifehy arivo sy ny mpifehy zato ary ny komandin''ny miaramila.'
mg1865::mg_13::26::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny babo izay azony tamin''ny ady nisy nohamasininy ho enti-manamboatra ny tranon''i Jehovah.'
mg1865::mg_13::26::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra nohamasinin''i Samoela mpahita sy Saoly, zanak''i Kisy, sy Abnera, zanak''i Nera, sy Joaba, zanak''i Zeroia, dia izay rehetra nohamasininy, dia Selomota sy ny rahalahiny no nitahiry izany.'
mg1865::mg_13::26::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny Jizarita dia Kenania sy ny zanany no voatendry ho amin''ny raharaha ivelany amin''ny Isiraely, dia ho mpifehy sy mpitsara.'
mg1865::mg_13::26::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny Hebronita dia Hasabia sy ny rahalahiny, lehilahy mahay fiton-jato amby arivo, no mpifehy tamin''ny Isiraely tany an-dafy andrefan''i Jordana ny amin''ny raharaha rehetra ho an''i Jehovah sy ny fanompoana ny mpanjaka.'
mg1865::mg_13::26::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Hebronita dia Jeria lohany (tamin''ny taona fahefa-polo nanjakan''i Davida no nitadiavana ny Hebronita araka ny fianakaviany avy, ka nisy lehilahy mahay hita tao aminy tao Jazera any Gileada)'
mg1865::mg_13::26::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 26
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny rahalahiny fiton-jato amby roa arivo, samy lehilahy mahay, lohan''ny fianakaviany avy. Ary Davida nanendry ireo ho mpifehy ny Robenita sy ny Gadita ary ny antsasaky firenen''i Manase, ny amin''ny raharahan''Andriamanitra sy ny mpanjaka.'
mg1865::mg_13::27::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandaminana ny miaramila'
  verse_text: 'Ary ny amin''ny Zanak''Isiraely araka ny isany, dia ny lohan''ny fianakaviany sy ny mpifehy arivo sy ny mpifehy zato ary ny mpifehy azy, izay nanompo ny mpanjaka tamin''izay raharahany rehetra isan-tokony, Izay nifandimby isam-bolana mandritra ny herintaona, dia efatra arivo amby roa alina avy no isan''ny isan-tokony.'
mg1865::mg_13::27::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nifehy ny antokony voalohany, ho amin''ny volana voalohany, dia Jasobeama, zanak''i Zabdiela, ary ny antokony dia efatra arivo amby roa alina;'
mg1865::mg_13::27::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'isan''ny taranak''i Fareza izy sady lohan''ny mpifehy rehetra tamin''ny miaramila amin''ny volana voalohany.'
mg1865::mg_13::27::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nifehy ny antokony ho amin''ny volana faharoa dia Dodo Ahohita; Miklota andriandahy no isan''ny antokony; ary ny antokon''ny Ahohita dia efatra arivo amby roa alina.'
mg1865::mg_13::27::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny komandin''ny antokony fahatelo tamin''ny miaramila, ho amin''ny volana fahatelo, dia Benaia lohany, zanak''i Joiada mpisorona; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Io no ilay Benaia, izay nahery sady ambony tamin''izy telo-polo lahy; Amizabada zanany no isan''ny antokony.'
mg1865::mg_13::27::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahefatra, ho amin''ny volana fahefatra, dia Asahela, rahalahin''i Joaba, ary Zebadia zanany no nanarakaraka azy; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahadimy, ho amin''ny volana fahadimy, dia Samihota Jizarita; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahenina, ho amin''ny volana fahenina, dia Ira, zanak''Ikesy Tekoita; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahafito, ho amin''ny volana fahafito, dia Heleza Pelonita, isan''ny taranak''i Efraima; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahavalo, ho amin''ny volana fahavalo, dia Sibekay Hosatita, isan''ny Zerita; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahasivy, ho amin''ny volana fahasivy, dia Abiezera Anatotita, Isan''ny Benjamita; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahafolo, ho amin''ny volana fahafolo, dia Maharay Netofatita, isan''ny Zerita; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahiraika ambin''ny folo, ho amin''ny volana fahiraika ambin''ny folo, dia Benaia Piratonita, isan''ny taranak''i Efraima; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny faharoa ambin''ny folo, ho amin''ny volana faharoa ambin''ny folo, dia Helday Netofatita, isan''ny taranak''i Otniela; ary ny antokony dia efatra arivo amby roa alina.'
mg1865::mg_13::27::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny lohan''ny firenena roa ambin''ny folo'
  verse_text: 'Ary izao no lohan ny firenen''Isiraely: Tamin''ny Robenita dia Eliezera, zanakalahin''i Zikry; tamin''ny Simeonita dia Sefatia, zanakalahin''i Maka;'
mg1865::mg_13::27::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny Levita dia Hasabia, zanakalahin''i Kemoela; tamin''ny Aronita dia Zadoka;'
mg1865::mg_13::27::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny Joda dia Eliho, izay isan''ny rahalahin''i Davida; tamin''ny Isakara dia Omry, zanakalahin''i Mikaela;'
mg1865::mg_13::27::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny Zebolona dia Jismala, zanakalahin''i Obadia; tamin''ny Naftaly dia Jerimota, zanakalahin''i Azriela;'
mg1865::mg_13::27::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taranak''i Efraima dia Hosea, zanakalahin''i Azazia; tamin''ny antsasaky ny firenen''i Manase dia Joela, zanakalahin''i Pedaia;'
mg1865::mg_13::27::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny antsasaky ny firenen''i Manase tao Gileada dia Ido, zanakalahin''i Zakaria; tamin''ny Benjamina dia Jasiela, zanakalahin''i Abnera;'
mg1865::mg_13::27::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny Dana dia Azarela, zanakalahin''i Jerohama. Ireo no lohan''ny firenen''Isiraely.'
mg1865::mg_13::27::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nanisa ny hatramin''ny roa-polo taona no ho midina Davida; fa Jehovah efa nilaza fa hampitombo ny Isiraely ho tahaka ny kintana eny amin''ny lanitra Izy.'
mg1865::mg_13::27::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Joaba, zanak''i Zeroia, nanomboka nanisa, fa tsy nahefa, satria nisy fahatezerana nihatra tamin''ny Isiraely tamin''izany, ka dia tsy voasoratra ao amin''ny bokin''ny tantaran''i Davida mpanjaka ny isany.'
mg1865::mg_13::27::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 25
  verse_date_revised: null
  verse_title: 'Ny mpitandrina ny fananan''i Davida, sy ny mpanolo-tsaina azy'
  verse_text: 'Ary ny tonian''ny rakitry ny mpanjaka dia Azmaveta, zanak''i Adiela; ary ny tonian ny trano firaiketana tany ambany vohitra, na tamin''ny tanàna, na tamin''ny vohitra, na tamin''ny tilikambo, dia Jonatana, zanak''i Ozia;'
mg1865::mg_13::27::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpifehy ny mpiasa tany an-tsaha hiasa ny tany dia Ezry, zanak''i Keloba;'
mg1865::mg_13::27::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tonian''ny tanim-boaloboka dia Simey Ramatita; ary ny tonian''ny divay tehirizina any amin''ny tanim-boaloboka dia Zebdy Sifmita;'
mg1865::mg_13::27::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tonian''ny hazo oliva sy ny aviavy eny amin''ny tany lemaka amoron-tsiraka* dia Bala-hanana Gaderita; ary ny tonian''ny diloilo tehirizina dia Joasy; [*Hebreo: Sefela]'
mg1865::mg_13::27::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tonian''ny omby nandrasana tany Saràna dia Sitray Sarànita; ary ny tonian''ny omby tany an-dohasaha dia Safata, zanak''i Adlay;'
mg1865::mg_13::27::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tonian''ny rameva dia Obila Ismaelita; ary ny tonian''ny borikivavy dia Jedda Meronotita;'
mg1865::mg_13::27::31:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tonian''ny ondry aman''osy dia Jaziza Hagarita. Ireo rehetra ireo no tonian''ny fananan''i Davida mpanjaka.'
mg1865::mg_13::27::32:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana, rahalahin-drain''i Davida, dia mpanolo-tsaina, lehilahy hendry sady be fahalalana izy; ary Jehiela, zanak''i Hakmony, dia teo amin''ny zanaky ny mpanjaka;'
mg1865::mg_13::27::33:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 27
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ahitofela dia mpanolo-tsaina ny mpanjaka; ary Hosay Arkita no sakaizan''ny mpanjaka; ary ny manarakaraka an''i Ahitofela dia Joiada, zanak''i Benaia, sy Abiatara; ary ny komandin''ny miaramilan''ny mpanjaka dia Joaba.'
mg1865::mg_13::28::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hafatra nataon''i Davida ny amin''ny hanaovana ny tempoly sy ny amin''ny fivavahana'
  verse_text: 'Ary novorin''i Davida tany Jerosalema ny lehibe rehetra tamin''ny Isiraely, dia ny lohan''ny firenena sy ny komandin''ny antokony Izay nanompo ny andriamanjaka, ary ny mpifehy arivo sy ny mpifehy zato sy ny mpitandrina ny harena mbanin''ny fananana rehetra an''ny mpanjaka sy ny zanany mbamin''ny tandapa* sy ny lehilahy mahery, dia ny lehibe rehetra. [*Hebreo: ionoka]'
mg1865::mg_13::28::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mpanjaka nitsangana ka nanao hoe: Mihainoa ahy, ry rahalahiko sy ry vahoakako! Raha izaho, dia efa mby tato am-poko ny hanao trano fitsaharana ho an''ny fiaran''ny faneken''i Jehovah sy ho an''ny fitoeran-tongotr''Andriamanitsika, ary efa novononiko izay ho enti-manao azy;'
mg1865::mg_13::28::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa hoy Andriamanitra tamiko: Tsy hanao trano ho an''ny anarako ianao, satria lehilahy mpiady sy mpandatsa-drà.'
mg1865::mg_13::28::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa kosa Jehovah, Andriamanitra ny Isiraely efa nifidy ahy tamin''ny ankohonan''ny raiko rehetra ho mpanjakan''ny Isiraely mandrakizay; fa Joda no nofidiny ho mpanjaka, ary tamin''ny taranak''i Joda indray dia ny ankohonan''ny raiko no nofidiny; ary tamin''ny ankohonan''ny raiko dia izaho kosa no nankasitrahany ka nataony mpanjaka amin''ny Isiraely rehetra.'
mg1865::mg_13::28::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny zanako rehetra (fa zanaka maro no nomen''i Jehovah ahy) dia Solomona zanako no nofidiny hipetraka amin''ny seza fiandrianan''ny fanjakan''i Jehovah hanjaka amin''ny Isiraely.'
mg1865::mg_13::28::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Solomona zanakao no hanao ny tranoko sy ny kianjako, fa efa nifidy azy ho zanako Aho, ary Izaho ho rainy.'
mg1865::mg_13::28::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampitoetra ny fanjakany ho mandrakizay Aho, raha maharitra mitandrina ny didiko sy ny fitsipiko mandra-kariva izy tahaka ny amin''izao anio izao.'
mg1865::mg_13::28::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, eto anatrehan''ny Isiraely rehetra, fiangonan''i Jehovah, sy eto anatrehan''Andriamanitsika, tandremo sy diniho ny didin''i Jehovah Andriamanitrareo rehetra, mba hahatananareo ity tany soa ity, sady havelanareo ho lovan''ny zanakareo mandimby anareo, mandrakizay izy.'
mg1865::mg_13::28::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Solomona zanako, aoka ho fantatrao Andriamanitry ny rainao, ka manompoa Azy amin''ny fo rehetra sy ny fanahy mazoto; fa Jehovah, dia mpandinika ny fo rehetra, ary ny fieritreretana rehetra dia fantany avokoa. Raha mitady Azy ianao, dia hahita Azy; fa raha mahafoy Azy kosa ianao, dia hariany mandrakizay.'
mg1865::mg_13::28::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitandrema; fa Jehovah efa nifidy anao hanao trano ho fitoerana masina; dia mahereza ka mahefà.'
mg1865::mg_13::28::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanome an''i Solomona zanany ny sarin''ny lavarangana fidirana sy ny tranony sy ny trano firaketany sy ny efi-trano ambony sy ny efi-trano anatiny ary ny trano misy ny rakotra fanaovam-panavotana,'
mg1865::mg_13::28::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sarin''izay rehetra efa niseho tamin''ny fanahiny; dia ny amin''ny kianjan''ny tranon''i Jehovah sy ny efi-trano rehetra manodidina azy ho an''ny rakitry ny tranon''i Jehovah sy ny zavatra nohamasinina ho rakitra,'
mg1865::mg_13::28::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ho an''ny antokon''ny mpisorona sy ny Levita koa, ary ho an''ny fanompoana rehetra ao an-tranon''i Jehovah sy ho an''ny fanaka rehetra ho enti-manompo ao an-tranon''i Jehovah,'
mg1865::mg_13::28::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lanjan''ny volamena hanaovana ny fanaka volamena samy hafa rehetra, ary ny lanjan''ny volafotsy koa hanaovana ny fanaka volafotsy samy hafa rehetra,'
mg1865::mg_13::28::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lanjan''ny volamena hanaovana ny fanaovan-jiro volamena sy ny lela fanaovan-jirony araka ny lanjany avy, ary ny lanjan''ny volafotsy hanaovana ny fanaovan-jiro volafotsy sy ny lela fanaovan-jirony araka ny fombany avy,'
mg1865::mg_13::28::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lanjan''ny volamena hanaovana ireo latabatra hametrahana ny mofo aseho, ary ny amin''ny volafotsy ho amin''ny latabatra volafotsy,'
mg1865::mg_13::28::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny amin''ny fitrebika sy ny lovia famafazana ary ny fitoeran-divay, izay samy volamena tsara, ary ny amin''ny kapoaka misarona, na ny volamena, na ny volafotsy, araka ny lanjany avy,'
mg1865::mg_13::28::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lanjan''ny volamena voadio hanaovana ny alitara fandoroana ditin-kazo manitra; ary nomeny koa ny sarin''ny kalesy, dia ny kerobima volamena, izay manana elatra mivelatra ka manaloka ny fiaran''ny faneken''i Jehovah.'
mg1865::mg_13::28::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany asa rehetra araka ny sary izany, hoy Davida, no nampahafantarin''i Jehovah ahy tamin''ny soratra avy tamin''ny tanany, izay aty amiko.'
mg1865::mg_13::28::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Davida tamin''i Solomona zanany: Mahereza sy matanjaha ka mahefà; aza matahotra na mivadi-po; fa Jehovah Andriamanitra, dia Andriamanitro, no momba anao; tsy handao na hahafoy anao Izy ambara-pahavitanao ny asa rehetra hanaovana ny tranon''i Jehovah.'
mg1865::mg_13::28::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary indreo ny antokon''ny mpisorona sy ny Levita hanao ny fanompoana rehetra ao an-tranon''Andriamanitra; ary ao aminao hanampy amin''ny asa samy hafa rehetra ny olon-kendry izay manolo-tena mba hahavita ny fanompoana rehetra sy ny mpifehy ary ny vahoaka rehetra hankatò ny didinao.'
mg1865::mg_13::29::1:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny zavatra naterin''ny lehibe amin''ny Isiraely ho enti-manao ny tempoly'
  verse_text: 'Ary hoy Davida mpanjaka tamin''ny fiangonana rehetra: Solomona zanako, ilay nofidin''Andriamanitra, dia mbola zaza sy tanora fanahy; nefa lehibe ny asa, fa tsy lapa ho an''olona, fa ho an''i Jehovah Andriamanitra.'
mg1865::mg_13::29::2:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny heriko rehetra no namoriako izay hanaovana ny tranon''Andriamanitra, dia ny volamena hanaovana ny fanaka volamena, ary ny volafotsy hanaovana ny fanaka volafotsy, ary ny varahina hanaovana ny fanaka varahina, ary ny vy hanaovana ny fanaka vy, ary ny hazo hanaovana ny fanaka hazo, ary ny vato beryla sy ny vato halatsaka an-tranontranony* ary ny vato alatsaka asiana antimony sy ny vato misoratsoratra** ary ny vato soa samy hafa rehetra ary ny vatosanga*** betsaka. [*Na: beryla mbamin''ny tranontranony] [**Na: tenona samy hafa soratra] [***marmora fotsy]'
mg1865::mg_13::29::3:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, noho ny fitiavako ny tranon''Andriamanitro dia omeko ho an''ny tranon''Andriamanitra, ho fanampin''ny zavatra rehetra novoriko hanaovana ny tempoly masina, izay volamena sy volafotsy ananako,'
mg1865::mg_13::29::4:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia talenta volamena telo arivo, volamena avy any Ofira, ary talenta volafotsy voadio fito arivo hapetaka amin''ny rindrin''ny isan-efi-trano,'
mg1865::mg_13::29::5:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny volamena hanaovana ny fanaka volamena ary ny volafotsy hanaovana ny fanaka volafotsy sy hanaovana ny fanaka volafotsy sy hanaovana ny asa samy hafa rehetra izay hataon''ny tanan''ny mpiasa mahay tao-zavatra. Iza ary no mazoto hitondra fanatitra ho an''i Jehovah anio?'
mg1865::mg_13::29::6:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy nazoto nanatitra zavatra ny lohan''ny fianakaviana sy ny lehiben''ny firenen''Isiraely ary ny mpifehy arivo sy ny mpifehy zato mbamin''ny mpitandrina ny raharahan''ny mpanjaka'
mg1865::mg_13::29::7:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanome izay hanaovana ny fanompoana amin''ny tranon''Andriamanitra, dia talenta volamena dimy arivo sy darika* iray alina sy talenta volafotsy iray alina sy talenta varahina valo arivo amby iray alina ary talenta vy iray hetsy. [*Ny darika dia anaran''ny farantsakely volamena, ary tokony ho ariary dimy sy loso no heviny]'
mg1865::mg_13::29::8:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nanana vato soa dia nanome azy no amin''ny rakitry ny tranon''i Jehovah, hotehirizin''i Jehiela Gersonita.'
mg1865::mg_13::29::9:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia faly ny vahoaka noho ny fahazotoan''ireo, fa tamin''ny fony rehetra no nahazotoany nanatitra ho an''i Jehovah; ary Davida mpanjaka koa faly dia faly.'
mg1865::mg_13::29::10:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny nisaoran''i Davida an''Andriamanitra sy ny fara-teniny tamin''ny Isiraely, sy ny nanendrena an''i Solomona, ary ny nahafatesan''i Davida'
  verse_text: 'Koa dia nisaotra an''i Jehovah teo anatrehan''ny fiangonana rehetra Davida ka nanao hoe: Isaorana anie Ianao, Jehovah o, Andriamanitr''Isiraely razanay, hatramin''ny taloha indrindra ka ho mandrakizay.'
mg1865::mg_13::29::11:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anao, Jehovah o, ny fahalehibiazana sy ny hery sy ny voninahitra sy ny famirapiratana ary ny fiandrianana, dia izay rehetra any an-danitra sy ety an-tany; Anao ny fanjakana, Jehovah o, ary Anao ny fisandratana ho Lohany ambonin''izy rehetra.'
mg1865::mg_13::29::12:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy aminao ny harena sy ny voninahitra, ary Ianao no manjaka amin''izao rehetra izao; eo an-tananao ny hery sy ny tanjaka, ka eo an-tananao koa ny mampahalehibe sy ny mampahatanjaka izao rehetra izao.'
mg1865::mg_13::29::13:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny misaotra Anao izahay, ry Andriamanitray o, sy midera ny anaranao be voninahitra.'
mg1865::mg_13::29::14:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa zinona moa aho, ary zinona moa ny oloko, no ahazoanay hery hanatitra toy izao? Fa avy aminao ny zavatra rehetra, ary avy tamin''ny Anao ihany no nanomezanay Anao.'
mg1865::mg_13::29::15:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vahiny sy mpivahiny eo anatrehanao izahay tahaka ny razanay rehetra; tahaka ny aloka ny andronay ety an-tany, ka tsy misy fanantenana.'
mg1865::mg_13::29::16:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jehovah Andriamanitray o, ireto zavatra rehetra novorinay hanaovana ny trano ho an''ny anaranao masina ireto dia avy tamin''ny tananao, ary Anao rahateo izy rehetra.'
mg1865::mg_13::29::17:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatro, ry Andriamanitro o, fa Ianao no mamantatra ny fo ary mankasitraka izay mahitsy. Ary ny amiko, dia amin''ny hitsim-poko no nahazotoako nanatitra ireto zavatra rehetra ireto; ary ankehitriny efa hitako tamin''ny fifaliana ny olonao, izay vory eto, mazoto mitondra fanatitra ho Anao.'
mg1865::mg_13::29::18:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, Andriamanitry ny razanay, dia Abrahama sy Isaka ary Isiraely, mba ampahareto ao am-pon''ny olonao mandrakizay izany fikasan''ny sainy izany, ka ampiomany ho Anao ny fony;'
mg1865::mg_13::29::19:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary omeo fo marina Solomona zanako hitandrina ny didinao sy ny teni-vavolombelonao sy ny lalànao ka hanao izany rehetra izany sady hahavita ny lapa izay efa namoriako ny hanaovana azy.'
mg1865::mg_13::29::20:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''ny fiangonana rehetra: Masïna ianareo, misaora an''i Jehovah Andriamanitrareo. Ary ny fiangonana rehetra dia nisaotra an''i Jehovah, Andriamanitry ny razany, sady niondrika ka niankohoka teo anatrehan''i Jehovah sy ny mpanjaka.'
mg1865::mg_13::29::21:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namono zavatra hatao fanatitra ho an''i Jehovah izy sady nanatitra fanatitra dorana ho an''i Jehovah nony ampitson''iny, dia vantotr''ombilahy arivo sy ondrilahy arivo ary zanak''ondry arivo mbamin''ny fanatitra aidina momba ireo ary fanatitra hafa be dia be ho an''ny Isiraely rehetra.'
mg1865::mg_13::29::22:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihinana sy nisotro tamin''ny fifaliana be teo anatrehan''i Jehovah ny olona tamin''izany andro izany. Ary nampanjakainy fanindroany Solomona, zanak''i Davida, sady nohosorany ho an''i Jehovah ho mpanapaka, ary Zadoka ho mpisorona.'
mg1865::mg_13::29::23:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona dia nipetraka tamin''ny seza fiandrianan''i Jehovah ho mpanjaka handimby an''i Davida rainy, sady nambinina izy, ka nanaiky azy ny Isiraely rehetra.'
mg1865::mg_13::29::24:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy rehetra sy ny lehilahy mahery ary ny zanak''i Davida rehetra koa dia samy nanaiky an''i Solomona mpanjaka.'
mg1865::mg_13::29::25:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanandratra an''i Solomona indrindra teo imason''ny Isiraely rehetra sady nanome azy voninahitry ny fiandrianana mihoatra noho ny mpanjaka rehetra talohany teo amin''ny Isiraely.'
mg1865::mg_13::29::26:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nanjakan''i Davida, zanak''i Jese, tamin''ny Isiraely rehetra.'
mg1865::mg_13::29::27:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nanjakany tamin''ny Isiraely dia efa-polo taona; tao Hebrona no nanjakany fito taona, ary tany Jerosalema no nanjakany telo amby telo-polo taona.'
mg1865::mg_13::29::28:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty izy rehefa tratrantitra tsara sady lava andro ary be harena sy voninahitra*; ary Solomona zanany no nanjaka nandimby azy. [*Hebreo: voky andro sy harena ary voninahitra]'
mg1865::mg_13::29::29:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Davida mpanjaka, na ny voalohany na ny farany, indro fa efa voasoratra ao amin''ny bokin''i Samoela mpahita sy ao amin''ny bokin''i Natana mpaminany ary ao amin''ny bokin''i Gada mpahita izany,'
mg1865::mg_13::29::30:
  verse_version: mg1865
  verse_book: mg_13
  verse_chapter: 29
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'mbamin''ny nanjakany rehetra sy ny heriny, ary izay niseho tamin''ny* ary tamin''ny Isiraely sy tamin''ny fanjakana rehetra tamin''ny tany. [*Hebreo: ny andro niseho taminy]'
