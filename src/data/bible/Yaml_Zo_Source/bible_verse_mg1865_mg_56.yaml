mg1865::mg_56::1::1:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fiarahabana
  verse_text: 'Paoly, mpanompon''Andriamanitra sy Apostolin''i Jesoa Kristy hampandroso ny finoan''ny olom-boafidin''Andriamanitra sy ny fahalalana tsara ny marina izay manaraka ny toe-panahy araka an''Andriamanitra,'
mg1865::mg_56::1::2:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny fanantenana ny fiainana mandrakizay izay nampanantenain''Andriamanitra tsy mahay mandainga hatry ny fony fahagola;'
mg1865::mg_56::1::3:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tamin''izay andro voatendry dia nasehony ny teniny tamin''ny tori-teny izay natolotra ho adidiko, araka ny didin''Andriamanitra, Mpamonjy antsika;'
mg1865::mg_56::1::4:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho an''i Titosy, tena zanako araka ny finoana iombonantsika, anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Ray sy Kristy Jesoa, Mpamonjy antsika.'
mg1865::mg_56::1::5:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny miendrika hotendrena ho loholona, sy ny faharatsian''ny toetry ny olona tany Kreta'
  verse_text: 'Izao no namelako anao tany Kreta, dia ny handaminanao izay mbola tsy tanteraka sy hanendrenao loholona* amin''ny isan-tanàna, araka ny nandidiako anao; [*Grika: presbytera]'
mg1865::mg_56::1::6:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha misy tsy manan-tsiny, dia lehilahy manambady tokana, manana zanaka mino izay tsy mba ampangaina ho mpanaram-po amin''ny ratsy na ho maditra.'
mg1865::mg_56::1::7:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpitandrina* dia tsy maintsy ho tsy manan-tsiny, fa mpitandrina ny an''Andriamanitra, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpimamo lian''ady, tsy mpikapoka, tsy tia harena maloto,'
mg1865::mg_56::1::8:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mampiantrano vahiny, tia ny tsara, mahonon-tena, marina, masina, mahonom-po,'
mg1865::mg_56::1::9:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitana mafy ny teny marina araka ny efa nampianarina, mba hahaizany hananatra amin''ny fampianarana tsy misy kilema* sady handresy lahatra ny mpanohitra. [*Grika: salama]'
mg1865::mg_56::1::10:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro no maditra, mpitaria foana sy mpamitaka, indrindra fa ny avy amin''ny voafora -'
mg1865::mg_56::1::11:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy maintsy hotampenam-bava ireo — izay mampivadika mpianakavy maro, fa mampianatra izay tsy mety, mba hahazoany harena maloto.'
mg1865::mg_56::1::12:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny anankiray amin''ireny, izay mpaminany teo aminy: "Mpandainga mandrakariva ny Kretana, biby ratsy, kamo be tenda".'
mg1865::mg_56::1::13:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina izany vavolombelona izany. Ary noho izany dia anaro mafy izy mba hatanjaka amin''ny finoana, [*Grika: salama]'
mg1865::mg_56::1::14:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mitandrina ny anganonganon''ny Jiosy sy ny didin''ny olona izay mivily miala amin''ny fahamarinana.'
mg1865::mg_56::1::15:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Madio avokoa ny zavatra rehetra raha amin''ny olona madio; fa raha amin''ny olona voaloto sady tsy mino kosa dia tsy misy madio na inona na inona; fa voaloto na ny sainy na ny fieritreretany.'
mg1865::mg_56::1::16:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaiky fa mahalala an''Andriamanitra izy, nefa mandà Azy amin''ny asany, dia olona vetaveta sady tsy manaraka ary olona tsy izy, izay tsy manao asa tsara na inona na inona.'
mg1865::mg_56::2::1:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny mety hataon''ny anti-panahy sy ny tanora fanahy sy ny mpanompon''olona, ary fananarana sy hafatra samy hafa'
  verse_text: 'Fa ianao kosa dia milazà izay miendrika ny fampianarana tsy misy kilema*; [*Grika: salama]'
mg1865::mg_56::2::2:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny lehilahy anti-panahy anaro hahonon-tena, ho maotona, ho hendry, hatanjaka* amin''ny finoana, amin''ny fitiavana, amin''ny faharetana. [*Grika: salama]'
mg1865::mg_56::2::3:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy anti-panahy koa anaro hitondra tena toy izay miendrika ny olona masina, tsy ho mpanendrikendrika, tsy ho andevozin''ny divay be, ho mpampianatra ny zavatra tsara,'
mg1865::mg_56::2::4:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampianarany ny vehivavy tanora fanahy ho tia ny vadiny, ho tia ny zanany,'
mg1865::mg_56::2::5:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'hahonon-tena, ho madio toe-panahy, hiasa ao an-tranony, ho tsara fanahy, hanaiky ny vadiny, mba tsy hitenenana ratsy* ny tenin''Andriamanitra. [*Grika: hanaovana blasfemia; izahao Matio 9:3]'
mg1865::mg_56::2::6:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehilahy tanora fanahy koa anaro hahonon-tena;'
mg1865::mg_56::2::7:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka amin''ny zavatra rehetra dia asehoy ny tenanao ho fianarana ny asa tsara, amin''ny fampianaranao maneho ny tsy faharatsiana, ny fahamaotinana,'
mg1865::mg_56::2::8:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny teny tsy misy kilema*, izay tsy azo tsinina, mba ho menatra izay manohitra; satria tsy hisy ratsy hitenenany anareo. [*Grika: salama]'
mg1865::mg_56::2::9:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanompo koa dia anaro hanaiky ny tompony ka hanao izay sitrapony amin''ny zavatra rehetra, fa tsy hamalivaly,'
mg1865::mg_56::2::10:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy hangala-tety, fa haneho izay toe-panahy mahatoky indrindra, mba hampahamendrika ny fampianaran''Andriamanitra, Mpamonjy antsika, amin''ny zavatra rehetra.'
mg1865::mg_56::2::11:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa miseho ny fahasoavan''Andriamanitra, izay famonjena ny olona rehetra,'
mg1865::mg_56::2::12:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mampianatra antsika handà izay toe-panahy tsy araka an''Andriamanitra sy ny filan''izao tontolo izao ary ho velona amin''ny onony sy ny marina ary ny toe-panahy araka an''Andriamanitra amin''izao fiainana ankehitriny izao,'
mg1865::mg_56::2::13:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'miandry ny fanantenana mahafinaritra sy ny fisehoan''ny voninahitr''Andriamanitra lehibe sady Mpamonjy antsika, dia Jesoa Kristy*, [*Na: Andriamanitra lehibe sy Jesoa Kristy, Mpamonjy antsika]'
mg1865::mg_56::2::14:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanolotra ny tenany hamonjy antsika, mba hanavotany antsika ho afaka amin''ny ota rehetra, sy hanadiovany izay olona ho an''ny tenany, sady ho mazoto indrindra amin''ny asa tsara izany.'
mg1865::mg_56::2::15:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no lazao sy ananaro ary andrarao amin''ny fahefana rehetra. Aza avela hisy hanao tsinontsinona anao.'
mg1865::mg_56::3::1:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampahatsiarova azy hanaiky izay manapaka sy manam-pahefana, hanoa tsara, ho vonona ho amin''ny asa tsara rehetra,'
mg1865::mg_56::3::2:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy hiteny ratsy olona, tsy ho mpila ady, fa ho mpandefitra, maneho ny halemem-panahy rehetra amin''ny olona rehetra.'
mg1865::mg_56::3::3:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika koa dia adala fahiny, tsy nanaiky, voafitaka, dia andevon''ny filàna sy ny fahafinaretana maro, ary velona teo amin''ny lolompo sy ny fialonana, sady hala no nifankahala.'
mg1865::mg_56::3::4:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: '2022-05-01T13:31:38+0000'
  verse_title: null
  verse_text: 'Fa rehefa niseho ny fahamoram-panahin''Andriamanitra, Mpamonjy antsika, sy ny fitiavany ny olona,'
mg1865::mg_56::3::5:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy avy tamin''ny asa amin''ny fahamarinana izay nataontsika, fa araka ny famindrampo kosa no namonjeny antsika, tamin''ny fanasan''ny fiterahana indray sy ny fanavaozan''ny Fanahy Masina,'
mg1865::mg_56::3::6:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay naidiny betsaka tamintsika tamin''ny alalan''i Jesoa Kristy, Mpamonjy antsika,'
mg1865::mg_56::3::7:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hohamarinina amin''ny fahasoavany isika ka ho tonga mpandova araka ny fanantenana ny fiainana mandrakizay.'
mg1865::mg_56::3::8:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatoky izany teny izany, ary izany zavatra izany dia tiako hitompoanao mafy, mba hotandreman''izay efa mino an''Andriamanitra ny hanao asa tsara. Sady tsara no mahasoa ny olona izany zavatra izany.'
mg1865::mg_56::3::9:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa halaviro ny fanontaniana adala sy ny tantaram-pirazanana sy ny fifandirana sy ny ady teny ny amin''ny lalàna; fa tsy mahasoa sady zava-poana izany.'
mg1865::mg_56::3::10:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mpanao hevi-diso*, rehefa nanarinao indray maka na indroa, dia ialao, [*Na: olona mitokana ho azy]'
mg1865::mg_56::3::11:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria fantatrao fa voavadika izay manao izany ka sady manota no manamelo-tena koa.'
mg1865::mg_56::3::12:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa maniraka an''i Artema ny Tykiko ho aty aminao aho, dia mazotoa hankany amiko any Nikopolia hianao, fa mikasa handany ny ririnina any aho.'
mg1865::mg_56::3::13:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mazotoa hamoaka an''i Zena mpahay lalàna sy Apolosy, mba tsy hisy zavatra hilainy.'
mg1865::mg_56::3::14:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny antsika koa hianatra hanao asa tsara hahazoany izay ilainy, fandrao tsy hisy vokatra izy.'
mg1865::mg_56::3::15:
  verse_version: mg1865
  verse_book: mg_56
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao veloma anao izay rehetra aty amiko. Manaova veloma izay rehetra tia anay amin''ny finoana. Ho aminareo rehetra anie ny fahasoavana.'
