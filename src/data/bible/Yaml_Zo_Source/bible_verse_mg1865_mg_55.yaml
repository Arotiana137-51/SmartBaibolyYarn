mg1865::mg_55::1::1:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatsiarovan''i Paoly an''i Timoty sy ny fitiavany azy'
  verse_text: 'Paoly, Apostolin''i Kristy Jesoa noho ny sitrapon''Andriamanitra, mba ho mpitory ny teny fikasana milaza ny fiainana izay ao amin''i Kristy Jesoa,'
mg1865::mg_55::1::2:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mamangy an''i Timoty, zanako malala: ho aminao anie ny fahasoavana sy ny famindram-po ary ny fiadanana avy amin''Andriamanitra Ray sy Kristy Jesoa Tompontsika.'
mg1865::mg_55::1::3:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''Andriamanitra aho, Izay tompoiko araka ny nataon''ny razako amin''ny fieritreretana madio, fa tsy manam-pitsaharana akory ny fahatsiarovako anao amin''ny fivavahako andro aman''alina;'
mg1865::mg_55::1::4:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary maniry hahita anao aho* (satria tsaroako ny ranomasonao), mba ho feno fifaliana aho [*Na: fa andro aman''alina dia maniry hahita anao aho];'
mg1865::mg_55::1::5:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nisy nahatsiarovako ny finoana tsy mihatsaravelatsihy izay ao anatinao, izay nitoetra taloha tao anatin''i Loisa renibenao sy Eonika reninao, ary matoky aho fa ao anatinao koa izany.'
mg1865::mg_55::1::6:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: '2022-07-12T08:25:22+0000'
  verse_title: 'Famporisihana an''i Timoty mba hamelona tsara ny fanomezam-pahasoavana azony avy tamin''Andriamanitra.'
  verse_text: 'Ary noho izany dia mampahatsiaro anao aho mba hamelomanao ny fanomezam-pahasoavana avy amin''Andriamanitra, izay ao anatinao tamin''ny fametrahako ny tanako.'
mg1865::mg_55::1::7:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: '2022-06-06T05:44:50+0000'
  verse_title: null
  verse_text: 'Fa tsy nomen''Andriamanitra fanahy osa isika, fa Fanahy Mahery sy fitiavana ary fahononan-tena.'
mg1865::mg_55::1::8:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza menatra ny ho vavolombelon''ny Tompontsika, na ahy mpifatony ianao; fa aoka ianao ho mpiombona ny fahoriana noho ny filazantsara araka ny herin''Andriamanitra,'
mg1865::mg_55::1::9:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namonjy antsika sy niantso antsika tamin''ny fiantsoana masina, tsy araka ny asantsika, fa araka ny fikasany sy ny fahasoavany izay nomena antsika tao amin''i Kristy Jesoa hatry ny fony fahagola;'
mg1865::mg_55::1::10:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa naharihary ankehitriny tamin''ny nisehoan''i Kristy Jesoa, Mpamonjy antsika, Izay nahafoana ny herin''ny fahafatesana, ka ny filazantsara no nampisehoany mazava ny fiainana sy ny tsy fahalovana mandrakizay;'
mg1865::mg_55::1::11:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny amin''io filazantsara io no nanendrena ahy ho mpitory sy Apostoly ary mpampianatra*. [*Na: "mpampianatra ny jentilisa"]'
mg1865::mg_55::1::12:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany koa no iaretako izao zavatra izao, ka tsy menatra aho, satria fantatro Izay inoako, ary matoky aho fa Izy dia mahatahiry ilay zavatra natolotro Azy* mandra-pihavin''izay andro izay. [*Na: ilay zavatra natolony ahy]'
mg1865::mg_55::1::13:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tano amin''ny finoana sy ny fitiavana ao amin''i Kristy Jesoa ny mariky ny teny tsy misy kilema, izay efa renao tamiko.'
mg1865::mg_55::1::14:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay zavatra tsara natolotra anao dia tehirizo amin''ny fampaherezan''ny Fanahy Masina, Izay mitoetra ao anatintsika.'
mg1865::mg_55::1::15:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao fa efa nahafoy ahy izay rehetra any Asia; isan''ireny Fygelo sy Hermogena.'
mg1865::mg_55::1::16:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Homen''ny Tompo famindram-po anie ny ankohonan''i Onesiforosy; satria namelombelona ny fanahiko matetika izy, fa tsy menatra ny gadrako;'
mg1865::mg_55::1::17:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tany Roma izy, dia nitady ahy fatratra ka nahita'
mg1865::mg_55::1::18:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: '(ny Tompo anie hampahita azy famindram-po amin''ny Tompo amin''izay andro izay) ary ny hafatratry ny nanompoany ahy tany Efesosy dia fantatrao tsara.'
mg1865::mg_55::2::1:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Famporisihana an''Timoty haharitra tsara, na dia azom-pahoriana aza'
  verse_text: 'Koa ianao, anaka, dia aoka hihahery amin''ny fahasoavana izay ao amin''i Kristy Jesoa.'
mg1865::mg_55::2::2:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay zavatra efa renao tamiko teo anatrehan''ny vavolombelona maro dia atolory ny olona mahatoky, izay hahay mampianatra ny sasany kosa.'
mg1865::mg_55::2::3:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaraha miaritra ny mafy amiko ianao tahaka ny miaramila tsaran''i Kristy Jesoa.'
mg1865::mg_55::2::4:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny miaramila manafika dia tsy mba misy maningo-tena amin''ny raharahan''izao fiainana izao. mba hahafaly izay efa nifidy azy ho miaramila.'
mg1865::mg_55::2::5:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy manezaka amin''ny filalaovana, dia tsy satrohana satro-boninahitra izy, raha tsy manezaka araka ny lalàna.'
mg1865::mg_55::2::6:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiasa tany izay misasatra no tokony ho voalohany handray ny vokatra.'
mg1865::mg_55::2::7:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diniho izay lazaiko, fa homen''ny Tompo fahazavan-tsaina ny amin''ny zavatra rehetra ianao.'
mg1865::mg_55::2::8:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy Jesoa Kristy Izay natsangana tamin''ny maty, dia Ilay avy tamin''ny taranak''i Davida, araka ny filazantsarako,'
mg1865::mg_55::2::9:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: '2022-07-22T12:32:39+0000'
  verse_title: null
  verse_text: 'izay iaretako fahoriana hatramin''ny fatorana aza, ohatra ny mpanao ratsy; nefa ny tenin''Andriamanitra dia tsy mba voafatotra.'
mg1865::mg_55::2::10:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no iaretako ny zavatra rehetra noho ny amin''ny olom-boafidy, mba hahazoan''ireny koa famonjena. dia izay ao amin''i Kristy Jesoa. mbamin''ny voninahitra mandrakizay.'
mg1865::mg_55::2::11:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatoky izao teny izao: Fa raha miara-maty aminy isika, dia hiara-belona aminy koa;'
mg1865::mg_55::2::12:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha miaritra isika, dia hiara-manjaka aminy; raha mandà Azy isika, Izy kosa handà antsika;'
mg1865::mg_55::2::13:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa na dia tsy matoky Azy aza isika, dia mbola mahatoky ihany Izy, fa tsy mahazo mandà ny tenany.'
mg1865::mg_55::2::14:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny mety hataon''i Timoty noho ny fisian''ny mpampianatra sandoka'
  verse_text: 'Izany zavatra izany no ampahatsiarovy ny olona, ka anaro mafy eo anatrehan''ny Tompo izy mba tsy hiady teny, satria tsy mahasoa akory izany, fa mamadika ny mpihaino,'
mg1865::mg_55::2::15:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mazotoa manolotra ny tenanao amin''Andriamanitra ho olona voazaha toetra, dia mpiasa tsy mahazo henatra, mizara tsara* ny teny fahamarinana. [*Na: mamoaka tsara; na: mizotra mahitsy amin'']'
mg1865::mg_55::2::16:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa halaviro ny fibedibedena foana; fa mbola handroso amin''ny haratsiam-panahy ihany izy ireny,'
mg1865::mg_55::2::17:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: '2022-07-13T08:18:52+0000'
  verse_title: null
  verse_text: 'ary ny teniny dia handany tahaka ny aretina mihady*; isan''ireny Hymeneo sy Fileto, [*Grika: gangrena]'
mg1865::mg_55::2::18:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nania tamin''ny marina ka milaza fa efa lasa sahady ny fitsanganan''ny maty, dia mamadika ny finoan''ny sasany.'
mg1865::mg_55::2::19:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny fanorenana mafy nataon''Andriamanitra dia miorina tsara sady manana izao tombo-kase izao: "Ny Tompo mahalala ny azy", ary koa: "Aoka ny olona rehetra izay manonona ny anaran''ny Tompo hiala amin''ny ratsy."'
mg1865::mg_55::2::20:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao an-trano lehibe, tsy dia fanaka volamena sy volafotsy ihany no ao, fa fanaka hazo sy tany koa, ny sasany homem-boninahitra, ary ny sasany halam-baraka.'
mg1865::mg_55::2::21:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha misy olona manadio ny tenany ho afaka amin''ireny, dia ho fanaka homem-boninahitra izy, efa nohamasinina ka mahasoa ho an''ny Tompo, voavoatra ho amin''ny asa tsara rehetra.'
mg1865::mg_55::2::22:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandosira ny filan''ny tanora fanahy; ary miezaha mitady fahamarinana, finoana, fitiavana, fihavanana amin''izay miantso ny Tompo amin''ny fo madio.'
mg1865::mg_55::2::23:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandava ny fanontaniana adaladala tsy misy antony, satria fantatrao fa mahatonga ady izany.'
mg1865::mg_55::2::24:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mety raha miady ny mpanompon''ny Tompo, fa ho malemy fanahy amin''ny olona rehetra, mahay mampianatra, mahalefitra,'
mg1865::mg_55::2::25:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'mananatra ny mpanohitra amin''ny fahamoram-panahy; fa angamba Andriamanitra hanome azy fibebahana hahalalany tsara ny marina,'
mg1865::mg_55::2::26:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hody ny sainy ho afaka amin''ny fandriky ny devoly, izay nanao azy sambo-belona hanao ny sitrapony*. [*Na: ka hody ny sainy — ho afaka amin''ny fandriky ny devoly, izay nanao azy sambo-belona — hanao ny sitrapon''Andriamanitra; na: fa ataon''ny mpanompon''ny Tompo sambo-belona izay hanao ny sitrapon''Andriamanitra]'
mg1865::mg_55::3::1:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fihemorana any am-parany,'
  verse_text: 'Fa aoka ho fantatrao izao: fa any am-parany any dia hisy andro mahory.'
mg1865::mg_55::3::2:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona ho tia tena, ho tia vola, ho mpandoka tena, mpiavonavona, miteny ratsy*, tsy manoa ray sy reny, tsy misaotra, tsy manaja izay masina, [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_55::3::3:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy manam-pitiavana, mpanontolo fo, mpanendrikendrika, tsy mahonom-po, lozabe, tsy tia ny tsara,'
mg1865::mg_55::3::4:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mpamadika, kirina, mpieboebo, tia ny fahafinaretana mihoatra noho ny fitiavany an''Andriamanitra,'
mg1865::mg_55::3::5:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'manana ny endriky ny toe-panahy araka an''Andriamanitra, nefa nandà ny heriny; ireny koa dia halaviro.'
mg1865::mg_55::3::6:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isan''ireny izay misokosoko miditra any an-tranon''ny sasany ka mahalasa ho babo ny vehivavy adaladala, vesaran''ny fahotana, entin''ny filàna maro,'
mg1865::mg_55::3::7:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'mianatra mandrakariva, nefa tsy mahatratra ny fahalalana ny marina.'
mg1865::mg_55::3::8:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny nanoheran''i Jana sy Jambra an''i Mosesy no anoheran''ireo koa ny fahamarinana, dia olona maloto saina sady tsy manam-pinoana marina.'
mg1865::mg_55::3::9:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy handroso intsony izy; fa ny hadalany dia haseho amin''ny olona rehetra, tahaka ny an''ireo koa.'
mg1865::mg_55::3::10:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Famporisihana an''i Timoty handroso tsara araka ny efa nataony ihany'
  verse_text: 'Fa ianao kosa dia efa nanaraka tsara ny fampianarako, ny fitondran-tenako, ny fisainako, ny finoako, ny fandeferako, ny fitiavako, ny faharetako,'
mg1865::mg_55::3::11:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny nanenjehana ahy, ny fahoriana izay nanjo ahy tany Antiokia, tany Ikonioma, tany Lystra, dia ny fanenjehana izay niaretako; ary ny Tompo nahafaka ahy tamin''izany rehetra izany.'
mg1865::mg_55::3::12:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izay rehetra te-ho velona amin''ny toe-panahy araka an''Andriamanitra, izay ao amin''i Kristy Jesoa, dia henjehina.'
mg1865::mg_55::3::13:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ratsy fanahy sy ny mpanoloky kosa dia handroso hiharatsiratsy kokoa sady mamitaka no fitahina.'
mg1865::mg_55::3::14:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa dia mahareta amin''izay zavatra nianaranao sy nampinoana anao, satria fantatrao izay nampianatra anao izany;'
mg1865::mg_55::3::15:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hatry ny fony vao zaza ianao dia efa nahalala ny Soratra Masina, izay mampahahendry anao ho amin''ny famonjena amin''ny finoana izay ao amin''i Kristy Jesoa.'
mg1865::mg_55::3::16:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay soratra rehetra nomen''ny tsindrimandrin''Andriamanitra dia mahasoa koa ho fampianarana, ho fandresen-dahatra, ho fanitsiana izay diso, ho fitaizana amin''ny fahamarinana,'
mg1865::mg_55::3::17:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho tanteraka ny olon''Andriamanitra, ho vonona tsara ho amin''ny asa tsara rehetra.'
mg1865::mg_55::4::1:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anatrehan''Andriamanitra sy Kristy Jesoa, Izay hitsara ny velona sy ny maty, ary noho ny amin''ny fisehoany sy ny fanjakany, no ananarako anao mafy:'
mg1865::mg_55::4::2:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitoria ny teny, mazotoa, na amin''ny fotoana, na tsy amin''ny fotoana, mandrese lahatra, mamporisiha, mananara mafy amin''ny fahari-po sy ny fampianarana rehetra.'
mg1865::mg_55::4::3:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy ny andro izay tsy hahazakan''ny olona ny fampianarana tsy misy kilema*; fa hangidihidy sofina izy, dia hamory mpampianatra ho azy araka ny filany; [*Grika: salama]'
mg1865::mg_55::4::4:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hampiala ny sofiny amin''ny teny marina tokoa izy ka hivily ho amin''ny anganongano.'
mg1865::mg_55::4::5:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa mahonona tena amin''ny zavatra rehetra, miareta fahoriana, ataovy ny asan''ny evanjelista, tanteraho ny fanompoanao.'
mg1865::mg_55::4::6:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho dia efa hatolotra* sahady, ary efa mba akaiky ny andro fialàko. [*Grika: haidina ho fanatitra aidina]'
mg1865::mg_55::4::7:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: '2022-09-26T05:32:05+0000'
  verse_title: null
  verse_text: 'Efa niady ny ady tsara aho; nahatanteraka ny fihazakazahako aho; nitahiry ny finoana aho;'
mg1865::mg_55::4::8:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: '2022-07-14T09:27:37+0000'
  verse_title: null
  verse_text: 'hatrizao dia tehirizina ho ahy ny satro-boninahitry ny fahamarinana, izay homen''ny Tompo, Mpitsara marina, ho ahy amin''izay andro izay; ary tsy ho ahy ihany, fa ho an''izay rehetra tia ny fisehoany koa.'
mg1865::mg_55::4::9:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Fanaovam-beloma sy hafatra'
  verse_text: 'Mazotoa hankaty amiko faingana ianao;'
mg1865::mg_55::4::10:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Demasy efa nandao ahy, satria tia izao fiainana izao izy ka lasa nankany Tesalonika; Kreska nankany Galatia, Titosy nankany Dalmatia.'
mg1865::mg_55::4::11:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lioka ihany no ato amiko. Alao Marka, ka ento miaraka aminao, fa mahasoa ahy amin''ny fanompoana izy.'
mg1865::mg_55::4::12:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tykiko dia nirahiko ho any Efesosy.'
mg1865::mg_55::4::13:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay kapoty navelako tany Troasy tao amin''i Karpo, dia ento, raha mankaty ianao, ary ny boky, indrindra fa ireo boky hoditra.'
mg1865::mg_55::4::14:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleksandro, mpanefy varahina, efa nanisy ratsy ahy be loatra; ny Tompo hamaly azy araka ny asany;'
mg1865::mg_55::4::15:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'tandremonao ihany izy iny, fa nanohitra fatratra ny teninay.'
mg1865::mg_55::4::16:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny nandaharako voalohany hanala tsiny ny tenako dia tsy nisy nomba ahy, fa nandao ahy avokoa izy rehetra (aza mba isaina ho helony anie izany).'
mg1865::mg_55::4::17:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny Tompo nitsangana teo anilako ka nampahery ahy, mba hotanterahina tokoa amin''ny ataoko ny fitorian-teny, ary mba ho ren''ny jentilisa rehetra izany; ary izaho novonjena tao am-bavan''ny liona.'
mg1865::mg_55::4::18:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo hanafaka ahy amin''ny asa ratsy rehetra ka hamonjy ahy ho any amin''ny fanjakany any an-danitra; ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena.'
mg1865::mg_55::4::19:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova veloma amin''i Prisila sy Akoila mbamin''ny ankohonan''i Onesiforosy;'
mg1865::mg_55::4::20:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Erasto nitoetra tany Korinto; fa Trofimo nilaozako tany Mileto, satria narary izy.'
mg1865::mg_55::4::21:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mazotoa hankaty alohan''ny ririnina. Manao veloma anao Eobolo sy Poda sy Lino sy Klaodia mbamin''ny rahalahy rehetra.'
mg1865::mg_55::4::22:
  verse_version: mg1865
  verse_book: mg_55
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny fanahinao anie ny Tompo. Ho aminareo anie ny fahasoavana.'
