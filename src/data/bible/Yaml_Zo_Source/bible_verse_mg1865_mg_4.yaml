mg1865::mg_4::29::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray, ho fanatitra noho ny ota, ho fanampin''ny fanatitra dorana mandrakariva, sy ny fanatitra hohanina momba azy ary ny fanatitra aidina momba azy.'
mg1865::mg_4::29::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no haterinareo ho an''i Jehovah amin''ny fotoam-pivavahanareo afa-tsy ny fanati-panalamboadinareo sy ny fanati-tsitraponareo izay aterinareo ho fanatitra dorana sy fanatitra hohanina sy fanatitra aidina ary fanati-pihavanana.'
mg1865::mg_4::30::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazain''i Mosesy tamin''ny Zanak''Isiraely izany, araka izay rehetra efa nandidian''i Jehovah azy.'
mg1865::mg_4::30::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Lalàna ny amin''ny hahatanterahana ny voady sy ny hanafoanana azy'
  verse_text: 'Ary Mosesy niteny tamin''ireo lohan''ny firenen''ny Zanak''Isiraely ka nanao hoe: Izao no teny izay nandidian''i Jehovah:'
mg1865::mg_4::30::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy lehilahy mivoady amin''i Jehovah, na mianiana hamehy ny fanahiny hifady, dia tsy hitsoa-teny izy; araka izay rehetra naloaky ny vavany no hataony.'
mg1865::mg_4::30::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy vehivavy mivoady amin''i Jehovah ka mamehy tena hifady, raha mbola zaza ao an-tranon-drainy izy,'
mg1865::mg_4::30::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ren-drainy ny voadiny sy ny namehezany ny fanahiny hifady, nefa tsy niteny azy rainy, dia tsy afaka ny voadiny sy izay famehezana na inona na inona namehezany ny fanahiny.'
mg1865::mg_4::30::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nandrara azy rainy tamin''ny andro nandrenesany, dia afaka ny voadiny, na izay famehezana namehezany ny fanahiny; ary Jehovah hamela ny helony, satria nandrara azy rainy.'
mg1865::mg_4::30::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manam-bady izy ka misy voady efa nataony, na misy teniteny foana nataon''ny molony, izay namehezany ny fanahiny hifady,'
mg1865::mg_4::30::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nandre izany ny lahy, nefa tsy niteny azy tamin''ny andro nandrenesany, dia tsy afaka ny voadiny sy izay famehezana namehezany ny fanahiny.'
mg1865::mg_4::30::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nandrara azy ny vadiny tamin''ny andro nandrenesany, dia hahafoana ny voadiny izay nivoadiany sy izay teniteny foana naloaky ny vavany ka namehezany ny fanahiny izy; ary Jehovah hamela ny helony.'
mg1865::mg_4::30::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny voadin''ny vehivavy maty vady na ny efa nisaorana kosa, dia tsy afaka izay rehetra namehezany ny fanahiny.'
mg1865::mg_4::30::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nisy vehivavy nivoady tao an-tranon''ny vadiny, na nianiana namehy ny fanahiny hifady,'
mg1865::mg_4::30::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nandre ny vadiny, nefa tsy niteny azy na nandrara azy, dia tsy afaka ny voadiny, na ny famehezana na inona na inona izay namehezany ny fanahiny.'
mg1865::mg_4::30::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nahafoana izany kosa ny vadiny tamin''ny andro nandrenesany, dia afaka izay rehetra naloaky ny vavany ho voadiny na ho famehezana ny fanahiny; ny vadiny no nahafoana izany, ary Jehovah hamela ny helony.'
mg1865::mg_4::30::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voady rehetra sy ny fianianana rehetra amehezany tena hampahory ny tenany, dia ny lahy ihany no tsy hahafaka azy, na hahafaka azy.'
mg1865::mg_4::30::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy niteny azy akory tamin''ny an-davan''andro ny lahy, dia tsy hahafaka ny voadiny, na izay famehezana namehezany ny tenany, izy; tsy mahafaka izany izy, satria tsy niteny azy tamin''ny andro nandrenesany.'
mg1865::mg_4::30::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao izay hahafoana izany izy aorian''ny andrenesany azy, dia hitondra ny heloky ny vavy izy.'
mg1865::mg_4::30::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no lalàna izay nandidian''i Jehovah an''i Mosesy ny amin''ny lehilahy sy ny vadiny, ary ny amin''ny ray sy ny zananivavy, raha mbola zaza ao an-tranon-drainy izy.'
mg1865::mg_4::31::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tafika namaliana ny Midianita'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::31::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valio ny Midianita noho ny nataony tamin''ny Zanak''Isiraely; ary rehefa afaka izany, dia hangonina any amin''ny razanao ianao.'
mg1865::mg_4::31::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''ny olona Mosesy ka nanao hoe: Miomàna ho any an-tafika ny sasany aminareo, ary aoka izy hanafika ny Midianita, hahatanteraka ny famalian''i Jehovah azy.'
mg1865::mg_4::31::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arivo lahy avy isam-pirenena amin''ny firenen''Isiraely no hampandehaninareo ho any an-tafika.'
mg1865::mg_4::31::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia navahana tamin''ny firenen''Isiraely ny arivo isam-pirenena, dia roa arivo amby iray alina, samy voaomana hiady.'
mg1865::mg_4::31::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampandehanin''i Mosesy ho any an-tafika ireo arivo lahy isam-pirenena ireo sy Finehasa, zanak''i Eleazara mpisorona, izay nitondra ny fanaka masina teny an-tanany, dia ny trompetra avo feo.'
mg1865::mg_4::31::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niady tamin''ny Midianita ireo, araka izay efa nandidian''i Jehovah an''i Mosesy; ary namono ny lehilahy rehetra izy'
mg1865::mg_4::31::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpanjakan''i Midiana dimy lahy dia matiny niaraka tamin''ireny koa, dia Evy sy Rekema sy Zora sy Hora ary Reba; ary Balama, zanak''i Beora, koa dia novonoiny tamin''ny sabatra.'
mg1865::mg_4::31::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely namabo ny vehivavy Midianita sy ny zanany madinika; ary nobaboiny avokoa ny biby fiompiny rehetra sy ny omby aman''ondriny rehetra ary ny fananany rehetra.'
mg1865::mg_4::31::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanànany rehetra izay teo amin''ny fonenany sy ny tobiny rehetra dia nodorany tamin''ny afo.'
mg1865::mg_4::31::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainy avokoa ny babo rehetra, na olona na biby fiompy,'
mg1865::mg_4::31::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nentiny tany amin''i Mosesy sy Eleazara mpisorona ary ny fiangonan''ny Zanak''Isiraely teo an-toby, teo Arbota-moaba, izay eo amoron''i Jordana tandrifin''i Jeriko.'
mg1865::mg_4::31::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Eleazara mpisorona ary ny lohan''ny fiangonana rehetra nivoaka hitsena azy teo ivelan''ny toby.'
mg1865::mg_4::31::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tezitra tamin''ny mpifehy ny miaramila Mosesy, dia tamin''ny mpifehy arivo sy ny mpifehy zato, izay avy tany an-tafika,'
mg1865::mg_4::31::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy izy taminy: Nahoana no novelominareo ny vehivavy rehetra?'
mg1865::mg_4::31::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo ihany no nampahadiso ny Zanak''Isiraely tamin''i Jehovah ny amin''i Peora, araka ny tenin''i Balama, ka nahazo ny fiangonan''i Jehovah ny areti-mandringana.'
mg1865::mg_4::31::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, vonoy ny zazalahy madinika rehetra, ary vonoy koa ny vehivavy rehetra izay efa nahalala lahy.'
mg1865::mg_4::31::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zazavavy rehetra izay tsy mbola nahalala lahy dia velomy ho anareo.'
mg1865::mg_4::31::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitobia eo ivelan''ny toby hafitoana; ary izay nahafaty olona na nikasika faty dia samia manadio ny tenany, na ianareo, na ny sambotrareo amin''ny andro fahatelo sy ny andro fahafito.'
mg1865::mg_4::31::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fitafiana rehetra, na ny fanaka hoditra, na ny fanaka volon''osy, na ny fanaka hazo, dia diovy avokoa.'
mg1865::mg_4::31::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Eleazara mpisorona tamin''ny mpanafika, izay efa tany amin''ny ady: Izao no lalàna hotandremana, izay nandidian''i Jehovah''an i Mosesy:'
mg1865::mg_4::31::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volamena sy ny volafotsy sy ny varahina sy ny vy sy ny vifotsy ary ny firaka,'
mg1865::mg_4::31::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny zavatra rehetra izay maharitra afo, dia ataovy ao amin''ny afo, dia hadio, kanefa hodiovina amin''ny rano fanadiovana koa izy; ary izay rehetra tsy maharitra afo kosa dia ataovy ao amin''ny rano ihany.'
mg1865::mg_4::31::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sasao ny fitafianareo amin''ny andro fahafito, dia hadio ianareo; ary rehefa afaka izany, dia mahazo miditra eo amin''ny toby ianareo.'
mg1865::mg_4::31::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::31::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alaonao sy Eleazara mpisorona sy ny lohan''ny fianakaviana amin''ny fiangonana ny isan''ny babo izay azo, na olona, na biby fiompy;'
mg1865::mg_4::31::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary sasaho ny babo ho an''izay niady, dia izay efa tany an-tafika, sy ho an''ny fiangonana rehetra;'
mg1865::mg_4::31::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa makà anjara ho an''i Jehovah avy amin''ny mpanafika izay nivoaka ho any an-tafika, dia iray isan-diman-jato, na olona, na omby, na boriky, na ondry aman''osy;'
mg1865::mg_4::31::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny antsasany izay azy no hanalanao izany ka homenao an''i Eleazara mpisorona ho fanatitra alaina ho an''i Jehovah.'
mg1865::mg_4::31::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny antsasany an''ny Zanak''Isiraely kosa dia analao iray isan-dimam-polo, na olona, na omby, na boriky, na ondry aman''osy, dia ny biby fiompy rehetra, ka omeo ho an''ny Levita, izay mitandrina ny anjara-raharaha momba ny tabernakelin''i Jehovah.'
mg1865::mg_4::31::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Mosesy sy Eleazara mpisorona izany, araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::31::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny babo sisa afa-tsy izay azon''ny mpanafika, dia ondry aman''osy dimy arivo amby fito alina sy enina hetsy,'
mg1865::mg_4::31::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy omby roa arivo amby fito alina,'
mg1865::mg_4::31::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy boriky arivo amby enina alina,'
mg1865::mg_4::31::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary olona, dia ny zazavavy izay tsy mbola nahalala lahy, roa arivo amby telo alina.'
mg1865::mg_4::31::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny antsasany izay anjaran''ny efa tany an-tafika dia izao: ny isan''ny ondry aman''osy dia diman-jato amby fito arivo sy telo alina sy telo hetsy;'
mg1865::mg_4::31::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny anjaran''i Jehovah avy tamin''ny ondry aman''osy dia dimy amby fito-polo sy enin-jato.'
mg1865::mg_4::31::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny omby dia enina arivo amby telo alina; ary ny anjaran''i Jehovah avy tamin''ireo dia roa amby fito-polo.'
mg1865::mg_4::31::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny boriky dia diman-jato amby telo alina; ary ny anjaran''i Jehovah avy tamin''ireo dia iraika amby enim-polo.'
mg1865::mg_4::31::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zazavavy dia enina arivo amby iray alina; ary ny anjaran''i Jehovah avy tamin''ireo dia roa amby telo-polo.'
mg1865::mg_4::31::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomen''i Mosesy an''i Eleazara mpisorona ny anjara izay nalaina ho an''i Jehovah, araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::31::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy tamin''ny antsasany an''ny Zanak''Isiraely, izay nozarain''i Mosesy avy tamin''ny mpanafika'
mg1865::mg_4::31::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa ny antsasany an''ny fiangonana dia ondry aman''osy dimanjato amby fito arivo sy telo alina sy telo hetsy,'
mg1865::mg_4::31::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy omby enina arivo amby telo alina,'
mg1865::mg_4::31::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy boriky diman-jato amby telo alina,'
mg1865::mg_4::31::46:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary olona enina arivo amby iray alina),'
mg1865::mg_4::31::47:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny antsasany an''ny Zanak''Isiraely dia nanalan''i Mosesy iray isan-dimam-polo, na olona, na biby fiompy, ka nomeny ho an''ny Levita mpitandrina ny anjara-raharaha momba ny tabernakelin''i Jehovah izany, araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::31::48:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy, izay nifehy ny miaramila, dia ny mpifehy arivo sy ny mpifehy zato, dia nanatona an''i Mosesy'
mg1865::mg_4::31::49:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Ny mpanomponao efa naka ny isan''ny mpanafika izay nofehezinay, ka tsy misy diso isa aminay na dia lehilahy iray akory aza;'
mg1865::mg_4::31::50:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nitondra fanatitra ho an''i Jehovah izahay, dia ny firavaka volamena efa azonay avy, dia fehin-tanana sy haba sy peratra fanombohan-kase sy kavina ary voavola, hanaovana fanavotana ho an''ny ainay eo anatrehan''i Jehovah.'
mg1865::mg_4::31::51:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Mosesy sy Eleazara mpisorona taminy ny volamena, dia firavaka voatefy avokoa.'
mg1865::mg_4::31::52:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny volamena rehetra tamin''ny fanatitra nalain''ny mpifehy arivo sy ny mpifehy zato ho an''i Jehovah, dia sekely dimam-polo amby fiton-jato sy enina arivo sy iray alina'
mg1865::mg_4::31::53:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa ny mpanafika samy namabo ho an''ny tenany).'
mg1865::mg_4::31::54:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 31
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Mosesy sy Eleazara mpisorona ny volamena nomen''ny mpifehy arivo sy ny mpifehy zato ka nentiny tao amin''ny trano-lay fihaonana ho fahatsiarovana ho an''ny Zanak''Isiraely eo anatrehan''i Jehovah.'
mg1865::mg_4::32::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahazoan''ny firenen''i Robena sy Gada ary ny antsasaky ny firenen''i Manase zara-tany tao an-dafy atsinanan''i Jordana'
  verse_text: 'Ary nanana omby aman''ondry be indrindra ny taranak''i Robena sy ny taranak''i Gada; ary rehefa nahita ny tany Jazera sy ny tany Gileada izy, fa tany tsara ho fiandrasana omby aman''ondry io,'
mg1865::mg_4::32::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia avy ny taranak''i Gada sy ny taranak''i Robena ka niteny tamin''i Mosesy sy Eleazara mpisorona sy tamin''ny lohan''ny fiangonana ka nanao hoe:'
mg1865::mg_4::32::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atarota sy Dibona sy Jazera sy Nimra sy Hesbona sy Elale sy Sebama sy Nebo ary Beona,'
mg1865::mg_4::32::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ireo tany noresen''i Jehovah teo anoloan''ny fiangonan''ny Isiraely, dia tany tsara ho fiandrasana omby aman''ondry, ary ny mpanomponao manana omby aman''ondry;'
mg1865::mg_4::32::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy koa izy: Raha mahita fitia eo imasonao izahay; aoka homena anay mpanomponao ho zara-taninay io tany io; fa aza ampitaina an''i Jordana izahay.'
mg1865::mg_4::32::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''ny taranak''i Gada sy ny taranak''i Robena: Ny rahalahinareo handeha hanafika, ka ianareo kosa hijanona eto va?'
mg1865::mg_4::32::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianareo no mampiketraka ny fon''ny Zanak''Isiraely, mba tsy handehanany ho any amin''ny tany izay nomen''i Jehovah azy?'
mg1865::mg_4::32::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nataon''ny rainareo, fony nirahiko avy tao Kadesi-barnea hisafo ny tany izy;'
mg1865::mg_4::32::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha niakatra hatrany an-dohasaha Eskola izy ka nahita ny tany, dia nampiketraka ny fon''ny Zanak''Isiraely izy, mba tsy handehanany ho any amin''ny tany izay efa nomen''i Jehovah azy.'
mg1865::mg_4::32::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nirehitra ny fahatezeran''i Jehovah tamin''izay andro izay, dia nianiana Izy ka nanao hoe:'
mg1865::mg_4::32::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona izay niakatra avy tany Egypta, hatramin''ny roa-polo taona no ho miakatra, dia tsy hisy hahita ny tany izay efa nianianako tamin''i Abrahama sy Isaka ary Jakoba homena azy, satria tsy tanteraka tamin''ny fanarahana Ahy izy;'
mg1865::mg_4::32::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy Kaleba, zanak''i Jefone Kenizita, sy Josoa, zanak''i Nona, izay tanteraka tamin''ny fanarahana an''i Jehovah.'
mg1865::mg_4::32::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka nampirenireny azy tany an''efitra efa-polo taona Izy mandra-pahalany ritra ny taranaka rehetra izay nanao ratsy teo imason''i Jehovah.'
mg1865::mg_4::32::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreto, ianareo mitsangana hisolo ny rainareo, ho taranaka mbola mpanota, hampitombo ny firehetan''ny fahatezeran''i Jehovah amin''ny Isiraely.'
mg1865::mg_4::32::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miala amin''ny fanarahana Azy ianareo dia hamela azy any an''efitra Indray Izy; ka dia ianareo no handringana izao olona rehetra izao.'
mg1865::mg_4::32::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanatona azy izy ireo ka nanao hoe: Hanao vala eto izahay ho an''ny omby aman''ondrinay sy tanàna koa ho an''ny zanakay madinika;'
mg1865::mg_4::32::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny tenanay dia hiomana faingana handroso eo alohan''ny Zanak''Isiraely mandra-pitondranay azy ho any amin''ny taniny; ary ny zanakay madinika dia hitoetra amin''ny tanàna mimanda noho ny mponina amin''ny tany.'
mg1865::mg_4::32::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hody any an-tranonay izahay, mandra-pahazon''ny Zanak''Isiraely ny zara-taniny avy.'
mg1865::mg_4::32::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hiara-mandray zara-tany aminy izahay hatrany an-dafin''i Jordana no ho miankandrefana, satria efa azonay aty an-dafy atsinanan''i Jordana aty ny zara-taninay.'
mg1865::mg_4::32::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy taminy: Raha hanao izany zavatra izany ianareo ka hiomana eo anatrehan''i Jehovah ho any an-tafika,'
mg1865::mg_4::32::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa samy efa voaomana hiady, dia hita ho any an-dafin''i Jordana eo anatrehan''i Jehovah, mandra-pandroakany ny fahavalony hiala eo anoloany,'
mg1865::mg_4::32::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ho resy eo anatrehan''i Jehovah ny tany; ary rehefa vita izany, dia hody ianareo ka tsy hanan-tsiny, na amin''i Jehovah, na amin''ny Isiraely; ary ity tany ity ho zara-taninareo eo anatrehan''i Jehovah.'
mg1865::mg_4::32::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy hanao izany kosa ianareo, dia manota amin''i Jehovah; ary aoka ho fantatrareo fa hanody anareo ny fahotanareo.'
mg1865::mg_4::32::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova tanàna ho an''ny zanakareo madinika sy vala ho an''ny ondry aman''osinareo, ka ataovy izay naloaky ny vavanareo.'
mg1865::mg_4::32::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''i Mosesy ny taranak''i Gada sy ny taranak''i Robena ka nanao hoe: Ny mpanomponao dia hanao araka izay andidianao, tompoko:'
mg1865::mg_4::32::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny zanakay madinika sy ny vadinay sy ny ondry aman''osinay ary ny biby fiompinay rehetra dia hitoetra ato amin''ny tanànan''i Gileada;'
mg1865::mg_4::32::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny mpanomponao handeha hita, samy efa voaomana hiady eo anatrehan''i Jehovah, ho any an-tafika, araka izay nolazainao, tompoko.'
mg1865::mg_4::32::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia nandidy an''i Eleazara mpisorona sy Josoa, zanak''i Nona, ary ny lohan''ny fianakaviana tamin''ny firenen''ny Zanak''Isiraely ny amin''ireo'
mg1865::mg_4::32::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Raha handeha hita an''i Jordana hiaraka aminareo ny taranak''i Gada sy ny taranak''i Robena, samy efa voaomana hiady eo anatrehan''i Jehovah, ka ho resy ny tany eo anoloanareo, dia homenareo azy ny tany Gileada ho zara-taniny;'
mg1865::mg_4::32::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tsy mandeha samy efa voaomana hiady miaraka aminareo Izy, dia eo aminareo amin''ny tany Kanana ihany no hahazoany zara-tany.'
mg1865::mg_4::32::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ny taranak''i Gada sy ny taranak''i Robena ka nanao hoe: Araka izay nolazain''i Jehovah tamin''ny mpanomponao no hataonay:'
mg1865::mg_4::32::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahay handeha hita eo anatrehan''i Jehovah ho any amin''ny tany Kanana samy efa voaomana hiady, kanefa ety an-dafin''i Jordana ety ihany no hahazoanay zara-tany.'
mg1865::mg_4::32::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomen''i Mosesy ho an''ny taranak''i Gada sy ny taranak''i Robena ary ny an-tsasaky ny firenen''i Manase, zanak''i Josefa, ny fanjakan''i Sihona, mpanjakan''ny Amorka, sy ny fanjakan''i Oga, mpanjakan''i Basana dia ny tany mbamin''ny tanànany ao amin''ny faritany, dia ny tanàna eny amin''ny tany manodidina.'
mg1865::mg_4::32::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Gada nanao an''i Dibona sy Atarota sy Aroera'
mg1865::mg_4::32::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Atrota-sofana sy Jazera ary Jogbeha'
mg1865::mg_4::32::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Beti-nimra sy Beti-harana, tanàna mimanda, ary vala ho an''ny ondry.'
mg1865::mg_4::32::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Robena nanao an''i Hesbona sy Elale sy Kiriataima'
mg1865::mg_4::32::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Nebo sy Bala-meona (nefa novana ny anaran''ireo) ary Sibma; ary nasiany anarana vaovao ny tanàna izay nataony.'
mg1865::mg_4::32::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Makira, zanak''i Manase, nankany Gileada ka nahafaka azy, dia nandroaka ny Amorita izay nonina teo.'
mg1865::mg_4::32::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gileada dia nomen''i Mosesy an''i Makira, zanak''i Manase, ka nonina tao izy.'
mg1865::mg_4::32::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaira, zanak''i Manase, nandeha ka nahafaka ny tanàna madinika teo, ary ny anarany nataony hoe Havota-jaira.'
mg1865::mg_4::32::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 32
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Noba nandeha ka nahafaka an''i Kenata sy ny zana-bohiny, dia nataony hoe Noba, araka ny anarany izy.'
mg1865::mg_4::33::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitobian''ny Zanak''Isiraely tany an''efitra'
  verse_text: 'Ary izao no nandehan''ny Zanak''Isiraely, izay nentin''i Mosesy sy Arona nivoaka avy tany amin''ny tany Egypta araka ny antokony.'
mg1865::mg_4::33::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosoratan''i Mosesy ny nialany araka ny nandehanany, araka ny didin''i Jehovah; ary izao no nandehanany araka ny nialany:'
mg1865::mg_4::33::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niala tao Ramesesa Izy tamin''ny volana voalohany, dia tamin''ny andro fahadimy ambin''ny folo tamin''ny volana voalohany; nony ampitson''ny Paska no nivoahan''ny Zanak''Isiraely tamin''ny tanana avo teo imason''ny Egyptiana rehetra.'
mg1865::mg_4::33::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Egyptiana mbola nandevina izay efa novonoin''i Jehovah teo aminy, dia ny lahimatoa rehetra; ary ny andriamaniny dia notsarain''i Jehovah.'
mg1865::mg_4::33::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Ramesesa ny Zanak''Isiraely, dia nitoby tao Sokota.'
mg1865::mg_4::33::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Sokota izy, dia nitoby ao Etama, izay teo an-tsisin''ny efitra.'
mg1865::mg_4::33::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Etama izy, dia nivily nankao Pi-hahirota, izay tandrifin''i Balazefona, ka nitoby tandrifin''i Migdola.'
mg1865::mg_4::33::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tandrifin''i Hahirota izy, dia nandeha nita teo afovoan''ny ranomasina ho any an''efitra, dia nandeha lalan-kateloana tany an''efitra Etama izy ka nitoby tao Mara.'
mg1865::mg_4::33::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Mara izy, dia nankany Elima; ary tao Elima dia nisy loharano roa ambin''ny folo sy hazo rofia fito-polo, dia nitoby teo izy.'
mg1865::mg_4::33::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Elima izy, dia nitoby tao amoron''ny Ranomasina Mena.'
mg1865::mg_4::33::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao amoron''ny Ranomasina Mena izy, dia nitoby tany an''efitra Sina.'
mg1865::mg_4::33::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tany an''efitra Sina izy, dia nitoby tao Dopka.'
mg1865::mg_4::33::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Dopka izy, dia nitoby tao Alosy.'
mg1865::mg_4::33::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Alosy izy, dia nitoby tao Refidima; ary tsy nisy rano tao hosotroin''ny olona.'
mg1865::mg_4::33::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Refidima izy, dia nitoby tany an''efitr''i Sinay.'
mg1865::mg_4::33::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tany an''efitr''i Sinay izy, dia nitoby tao Kibrota-hatava.'
mg1865::mg_4::33::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Kibrota-hatava izy, dia nitoby tao Hazerota.'
mg1865::mg_4::33::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Hazerota izy, dia nitoby tao Ritma.'
mg1865::mg_4::33::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Ritma izy, dia nitoby tao Rimona-pareza.'
mg1865::mg_4::33::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Rimona-pareza izy, dia nitoby tao Libna.'
mg1865::mg_4::33::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Libna izy, dia nitoby tao Risa.'
mg1865::mg_4::33::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Risa izy, dia nitoby tao Kehelata.'
mg1865::mg_4::33::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Kehelata izy, dia nitoby tao an-tendrombohitra Sapera.'
mg1865::mg_4::33::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary. nony niala tao an-tendrombohitra Sapera izy, dia nitoby tao Harada.'
mg1865::mg_4::33::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Harada izy, dia nitoby tao Makelota.'
mg1865::mg_4::33::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Makelota izy, dia nitoby tao Tahata.'
mg1865::mg_4::33::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Tahata izy, dia nitoby tao Tera.'
mg1865::mg_4::33::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Tera izy, dia nitoby tao Mitka.'
mg1865::mg_4::33::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Mitka izy, dia nitoby tao Hasmona.'
mg1865::mg_4::33::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Hasmona izy, dia nitoby tao Moserota.'
mg1865::mg_4::33::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Moserota izy, dia nitoby tao Bene-jakana.'
mg1865::mg_4::33::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Bene-jakana izy, dia nitoby tao Hora-hagidgada.'
mg1865::mg_4::33::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Hora-hagidgada izy, dia nitoby tao Jotbata.'
mg1865::mg_4::33::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Jotbata izy, dia nitoby tao Abrona.'
mg1865::mg_4::33::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Abrona izy, dia nitoby tao Ezion-gebera.'
mg1865::mg_4::33::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Ezion-gebera izy, dia nitoby tany an''efitra Zina (Kadesy izany).'
mg1865::mg_4::33::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Kadesy izy, dia nitoby tao an-tendrombohitra Hora, tao an-tsisin''ny tany Edoma.'
mg1865::mg_4::33::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona mpisorona niakatra tao an-tendrombohitra Hora, araka ny didin''i Jehovah, dia maty tao izy tamin''ny fahefa-polo taona taorian''ny nivoahan''ny Zanak''Isiraely avy tany amin''ny tany Egypta, tamin''ny andro voalohany tamin''ny volana fahadimy.'
mg1865::mg_4::33::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa telo amby roa-polo amby zato taona Arona, raha maty tao an-tendrombohitra Hora izy.'
mg1865::mg_4::33::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''ilay Kananita, mpanjakan''i Arada, izay nonina teo amin''ny tany atsimo amin''ny tany Kanana, fa avy ny Zanak''Isiraely.'
mg1865::mg_4::33::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao an-tendrombohitra Hora izy, dia nitoby tao Zalmona.'
mg1865::mg_4::33::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Zalmona izy, dia nitoby tao Ponona.'
mg1865::mg_4::33::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Ponona izy, dia nitoby tao Obota.'
mg1865::mg_4::33::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Obota izy, dia nitoby tao Ie-abarima tao amin''ny faritanin''i Moaba.'
mg1865::mg_4::33::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Ie-abarima izy, dia nitoby tao Dibon-gada.'
mg1865::mg_4::33::46:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Dibon-gada izy, dia nitoby tao Almon-diblataima.'
mg1865::mg_4::33::47:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Almon-diblataima izy, dia nitoby tao amin''ny tendrombohitra Abarima, tandrifin''i Nebo.'
mg1865::mg_4::33::48:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tamin''ny tendrombohitra Abarima izy, dia nitoby tao Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko.'
mg1865::mg_4::33::49:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitoby teo amoron''i Jordana izy hatrany Betijesimota ka hatrany Abela-sitima, tao Arbota-moaba.'
mg1865::mg_4::33::50:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko, ka nanao hoe:'
mg1865::mg_4::33::51:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely hoe: Rehefa tafita an''i Jordana ka tonga any amin''ny tany Kanana ianareo,'
mg1865::mg_4::33::52:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia horoahinareo eo alohanareo ny mponina rehetra amin''ny tany, ary horavanareo ny vato soratany rehetra, ary hosimbanareo ny sarin-javany an-idina rehetra, ary horavanareo ny fitoerana avony rehetra;'
mg1865::mg_4::33::53:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia halainareo ny tany, ka hitoetra eo ianareo; fa ianareo no nomeko ny tany ho zara-taninareo.'
mg1865::mg_4::33::54:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary filokana no hizaranareo ny tany araka ny fokonareo avy: ny maro isa homenareo zara-tany bebe kokoa, ary ny vitsy isa homenareo kelikely kokoa; samy ao amin''izay ivoahan''ny filokana ho azy no ho anjarany; araka ny firenen''ny razanareo no hahazoanareo zara-tany.'
mg1865::mg_4::33::55:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy roahinareo eo alohanareo ny mponina amin''ny tany, dia ho lay amin''ny masonareo sy ho tsilo amin''ny tehezanareo izay avelanareo hitoetra eo, ka handrafy anareo eo amin''ny tany izay onenanareo izy;'
mg1865::mg_4::33::56:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 33
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hataoko aminareo izay nokasaiko hatao aminy.'
mg1865::mg_4::34::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny ho faritry ny tany Kanana'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::34::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandidia ny Zanak''Isiraely hoe: Raha tonga any amin''ny tany Kanana ianareo, dia izao no tany izay ho azonareo ho lova, dia ny tany Kanana araka izay faritaniny.'
mg1865::mg_4::34::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lafiny atsimo amin''ny taninareo dia hatramin''ny efitra Zina, izay mifanolotra amin''i Edoma. Ary ny faritaninareo atsimo dia hatramin''ny faran''ny Ranomasin-tsira any atsinanana,'
mg1865::mg_4::34::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia miolaka eo atsimon''ny fiakarana Akrabima, dia mandroso hatrany Zina, dia mahazo any atsimon''i Kadesibarnea, dia mahazo an''i Hazar-adara ka mandroso hatrany Azmona,'
mg1865::mg_4::34::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary miolaka hatrany Azmona ka hatramin''ny lohasahan-driak''i Egypta, ka dia mihatra amin''ny ranomasina.'
mg1865::mg_4::34::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny faritany andrefana, dia indro ny Ranomasina Lehibe sy ny amorony, ka hatreo no ho faritaninareo andrefana.'
mg1865::mg_4::34::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho faritaninareo avaratra: hatramin''ny Ranomasina Lehibe dia aoka ny tendrombohitra Hora no hotandrifinareo;'
mg1865::mg_4::34::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hatramin''ny tendrombohitra Hora dia aoka ny lalana mankany Hamata no hotandrifinareo, ary aoka ny faritany hahazo an''i Zedada,'
mg1865::mg_4::34::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hahazo an''i Zifrona, ka dia hihatra an''i Hazar-enana; izany no ho faritaninareo avaratra.'
mg1865::mg_4::34::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ho faritaninareo atsinanana dia ampifanitsio amin''i Hazar-enana ka hatrany Sefama,'
mg1865::mg_4::34::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hidina hatrany Sefama ka hatrany Ribla any atsinanan''i Aina, dia mbola hidina ihany koa ka hipaka amin''ny Ranomasin''i Kinereta atsinanana,'
mg1865::mg_4::34::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hidina ihany indray hatrany Jordana, ka dia hihatra amin''ny Ranomasin-tsira. Izany no ho taninareo araka ny faritaniny manodidina.'
mg1865::mg_4::34::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nandidy ny Zanak''Isiraely ka nanao hoe: Izany no tany izay hozarainareo araka ny filokana, dia izay andidian''i Jehovah homena ny firenena sivy sy sasany;'
mg1865::mg_4::34::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny firenena taranak''i Robena araka ny fianakaviany sy ny firenena taranak''i Gada araka ny fianakaviany dia efa nandray ny zara-taniny, ary ny antsasaky ny firenen''i Manase koa dia efa nandray ny zara-taniny;'
mg1865::mg_4::34::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny firenena roa sy sasany samy efa nandray ny zara-taniny aty an-dafy atsinanan''i Jordana, hitsin''i Jeriko, tandrifin''ny fiposahan''ny masoandro.'
mg1865::mg_4::34::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny anaran''ny lehilahy roa ambin''ny folo notendrena hizara ny tany'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::34::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no anaran''ny lehilahy izay hizara ny tany ho anareo: Eleazara mpisorona sy Josoa, zanak''i Nona.'
mg1865::mg_4::34::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary loholona iray avy amin''ny isam-pirenena koa no halainareo hizara ny tany.'
mg1865::mg_4::34::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ireo lehilahy ireo: ny avy amin''ny firenen''i Joda dia Kaleba, zanak''i Jefone;'
mg1865::mg_4::34::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy amin''ny firenena taranak''i Simeona dia Semoela, zanak''i Amihoda;'
mg1865::mg_4::34::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy amin''ny firenen''i Benjamina dia Elidada, zanak''i Kislona;'
mg1865::mg_4::34::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lohan''ny firenena taranak''i Dana dia Boky, zanak''i Jogly;'
mg1865::mg_4::34::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny avy amin''ny taranak''i Josefa: ny lohan''ny firenena taranak''i Manase dia Haniela, zanak''i Efoda;'
mg1865::mg_4::34::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lohan''ny firenena taranak''i Efraima dia Kemoela, zanak''i Siftana;'
mg1865::mg_4::34::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lohan''ny firenena taranak''i Zebolona dia Elizafana, zanak''i Parnaka;'
mg1865::mg_4::34::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lohan''ny firenena taranak''Isakara dia Paltiela, zanak''i Azana;'
mg1865::mg_4::34::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lohan''ny firenena taranak''i Asera dia Ahihoda, zanak''i Selomy;'
mg1865::mg_4::34::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lohan''ny firenena taranak''i Naftaly dia Pedahela, zanak''i Amihoda.'
mg1865::mg_4::34::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 34
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no nodidian''i Jehovah hizara ny tany Kanana ho an''ny Zanak''Isiraely.'
mg1865::mg_4::35::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hanomezana tanàna ho an''ny Levita'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy teo Arbota-moaba, amoron''i Jordana tandrifin''i Jeriko, ka nanao hoe:'
mg1865::mg_4::35::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandidia ny Zanak''Isiraely mba hanome tanàna ao amin''ny zara-taniny avy honenan''ny Levita; ary homenareo tany manodidina ny tanàna koa izy.'
mg1865::mg_4::35::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny tanàna dia honenany; ary ny tany dia ho an''ny biby fiompiny sy ny fananany mbamin''ny bibiny rehetra.'
mg1865::mg_4::35::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany manodidina ny tanàna izay homenareo ny Levita dia izao: Hatramin''ny màndan''ny tanàna ka hatramin''ny faritry ny taniny dia arivo hakiho amin''ny lafiny efatra avy.'
mg1865::mg_4::35::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handrefy roa arivo hakiho eo ivelan''ny tanàna ianareo amin''ny lafiny atsinanana, ary roa arivo hakiho amin''ny lafiny atsimo, ary roa arivo hakiho amin''ny lafiny andrefana, ary roa arivo hakiho amin''ny lafiny avaratra, ary ny tanàna dia ho eo afovoany; izany no ho taniny manodidina ny tanàna.'
mg1865::mg_4::35::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no tanàna izay homenareo ny Levita: dia tanàna enina, fandosirana, izay homenareo handosiran''izay nahafaty olona, sy tanàna roa amby efa-polo koa.'
mg1865::mg_4::35::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny tanàna rehetra izay homenareo ny Levita dia valo amby efa-polo mbamin''ny tany manodidina azy.'
mg1865::mg_4::35::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny tanàna izay homenareo avy amin''ny zara-tanin''ny firenen''ny Zanak''Isiraely, dia izay be no hanalanareo be, ary izay kely no hanalanareo kely: samy hanome tanàna ho an''ny Levita izy rehetra araka ny zara-taniny avy.'
mg1865::mg_4::35::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny hifidianana tanàna handosiran''izay nahafaty olona tsy nahy'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::35::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely hoe: Rehefa tafita an''i Jordana ianareo ka tonga any amin''ny tany Kanana,'
mg1865::mg_4::35::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hifidy tanàna ianareo, ho tanàna fandosirana ho anareo, mba handosiran''izay nahafaty olona tsy nahy.'
mg1865::mg_4::35::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fandosirana ho anareo mba tsy ho azon''ny mpamaly rà izany tanàna izany, mba tsy ho faty izay nahafaty olona mandra-pisehony hotsaraina eo anatrehan''ny fiangonana.'
mg1865::mg_4::35::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo tanàna homenareo ireo dia ho tanàna fandosirana enina ho anareo.'
mg1865::mg_4::35::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanàna telo dia homenareo ety an-dafin''i Jordana ety, ary ny tanàna telo kosa homenareo ao amin''ny tany Kanana; ho tanàna fandosirana ireo.'
mg1865::mg_4::35::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo tanàna enina ireo dia ho fandosirana ho an''ny Zanak''Isiraely sy ny vahiny ary ny mpitoetra ao aminy, mba handosiran''izay rehetra nahafaty olona tsy nahy.'
mg1865::mg_4::35::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha misy mamely vy olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona.'
mg1865::mg_4::35::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mamely vato olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona.'
mg1865::mg_4::35::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mamely hazo olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona.'
mg1865::mg_4::35::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpamaly rà no mahazo mamono azy; raha mihaona aminy izy, dia mahazo mamono azy.'
mg1865::mg_4::35::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mamely olona noho ny lolom-po, na mitoraka olona amin''ny fanotrehana, ka mahafaty,'
mg1865::mg_4::35::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'na mamely amin''ny tanany noho ny fandrafiana ka mahafaty, dia hatao maty tokoa ilay namely; nahafaty olona izy; ny mpamaly rà no mahazo mamono azy, raha mihaona aminy izy.'
mg1865::mg_4::35::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy mamely olona tsy nahy, ka tsy noho ny fandrafiana, na mitoraka olona na amin''inona na amin''inona, nefa tsy amin''ny fanotrehana,'
mg1865::mg_4::35::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'na sendra manjera vato ka mahafaty olona, nefa tsy hitany, sady tsy fahavalony izy, na mitady handratra azy,'
mg1865::mg_4::35::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hotsarain''ny fiangonana ilay namely sy ny mpamaly rà araka izany lalàna izany.'
mg1865::mg_4::35::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovonjen''ny fiangonana ho afaka amin''ny mpamaly rà ilay nahafaty olona, ka hateriny indray ho ao amin''ny tanàna fandosirana izay nalehany tamin''izy nandositra; ary hitoetra ao izy mandra-pahafatin''ny mpisoronabe izay voahosotra tamin''ny diloilo masina.'
mg1865::mg_4::35::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mivoaka ho eo ivelan''ny tanàna fandosirana izay nalehany tamin''izy nandositra ilay nahafaty olona'
mg1865::mg_4::35::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hitan''ny mpamaly rà eo ivelan''ny tanàna, dia azony vonoina izy; ary tsy hisy valin-drà amin''izany,'
mg1865::mg_4::35::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tokony ho nitoetra tao an-tanàna fandosirana izy mandra-pahafatin''ny mpisoronabe; fa rehefa maty ny mpisoronabe, dia mahazo mody any amin''ny zara-taniny ihany ilay nahafaty olona.'
mg1865::mg_4::35::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany zavatra izany dia ho lalàna hitondrana anareo hatramin''ny taranakareo fara mandimby eny amin''izay rehetra onenanareo.'
mg1865::mg_4::35::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''izay rehetra mahafaty olona, dia hatao maty izay mahafaty, araka ny tenin''ny vavolombelona; nefa raha vavolombelona iray monja, dia tsy ampy hanameloka hahafaty olona izany.'
mg1865::mg_4::35::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo tsy handray avotry ny ain''ny nahafaty olona, izay meloka ka tokony ho faty; fa hatao maty tokoa izy.'
mg1865::mg_4::35::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo tsy handray avotra ho an''izay mandositra ho ao an-tanàna fandosirana, mba hodiany indray hitoetra amin''ny taniny, raha mbola tsy maty ny mpisorona.'
mg1865::mg_4::35::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mametaveta ny tany izay onenanareo, fa ny rà dia fametavetana ny tany; ary ny tany tsy azo anaovana fanavotana ny amin''ny rà izay nalatsaka teo, afa-tsy amin''ny ran''izay nandatsaka azy ihany.'
mg1865::mg_4::35::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 35
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza lotoinareo ny tany onenanareo, izay itoerako; fa Izaho Jehovah mitoetra eo amin''ny Zanak''Isiraely.'
mg1865::mg_4::36::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Lalàna ny amin''ny hanambadian''ny zazavavy mandova zara-tany'
  verse_text: 'Dia nanatona ny lohan''ny fianakaviana tamin''ny fokon''ny taranak''i Gileada, zanak''i Makira, zanak''i Manase, avy tamin''ny fokon''ny taranak''i Josefa, ka niteny teo anatrehan''i Mosesy sy ny lehibe, lohan''ny fianakaviana tamin''ny Zanak''Isiraely, ka nanao hoe:'
mg1865::mg_4::36::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, tompokolahy, efa nodidian''i Jehovah hizara ny tany amin''ny filokana ho an''ny Zanak''Isiraely; ary ianao, tompokolahy, efa nodidian''i Jehovah hanome ny zara-tanin''i Zelofada rahalahinay ho an''ny zananivavy.'
mg1865::mg_4::36::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha manambady ny zanakalahin''ny firenena sasany amin''ny Zanak''Isiraely ireo, dia hesorina amin''ny an''ny razanay ny zara-taniny ka hanampy ny zara-tanin''ny firenena izay hatoniny, dia hesorina amin''ny zara-taninay izay azonay tamin''ny filokana izany.'
mg1865::mg_4::36::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga ny Jobilin''ny Zanak''Isiraely, ny zara-taniny dia hanampy ny an''ny firenena izay hatoniny, ary ny azy dia hesorina amin''ny zara-tanin''ny razanay.'
mg1865::mg_4::36::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nandidy ny Zanak''Isiraely araka ny tenin''i Jehovah ka nanao hoe: Marina ny tenin''ny firenena taranak''i Josefa.'
mg1865::mg_4::36::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no teny izay andidian''i Jehovah ny amin''ny zanakavavin''i Zelofada: Aoka izy hanambady izay tiany, nefa ny ao amin''ny fokon''ny firenen''ny razany ihany no hovadiny.'
mg1865::mg_4::36::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy hifindra maso ny zara-tanin''ny firenen''ny Zanak''Isiraely; fa samy ho eo amin''ny zara-tanin''ny razany avy no hipetrahan''ny Zanak''Isiraely.'
mg1865::mg_4::36::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zazavavy rehetra izay mandova zara-tany eo amin''ny firenen''ny Zanak''Isiraely dia hanambady ny anankiray ao amin''ny fokon''ny firenen''ny razany ihany, mba hananan''ny Zanak''Isiraely rehetra ny zara-tanin''ny razany avy.'
mg1865::mg_4::36::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka tsy hisy hifindra maso ny zara-tanin''ny firenena samy hafa, fa samy ho eo amin''ny azy avy no hipetrahan''ny Zanak''Isiraely.'
mg1865::mg_4::36::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay efa nandidian''i Jehovah an''i Mosesy no nataon''ny zanakavavin''i Zelofada,'
mg1865::mg_4::36::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka Mahala sy Tirza sy Hogla sy Milka ary Noa, zanakavavin''i Zelofada, dia samy nanambady ny zanaky ny rahalahin''ny rainy avy.'
mg1865::mg_4::36::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay avy tamin''ny fokon''ny taranak''i Manase, zanak''i Josefa, no novadin''ireo, ka dia nitoetra teo amin''ny firenen''ny mpianakavin''ny rainy ihany ny zara-taniny.'
mg1865::mg_4::36::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no didy sy fitsipika izay nandidian''i Jehovah ka nampitondrainy an''i Mosesy ho amin''ny Zanak''Isiraely teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko.'
