  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray ho fanatitra noho ny ota, ho fanampin''ny fanatitra noho ny ota hanaovana fanavotana sy ny fanatitra dorana mandrakariva sy ny fanatitra hohanina momba azy ary ny fanatitra aidina momba azy.'
