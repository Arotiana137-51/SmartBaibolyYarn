  verse_chapter: 7
  verse_number: 78
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro faharoa ambin''ny folo dia Ahira, zanak''i Enana, lohan''ny taranak''i Naftaly, no nanatitra.'
mg1865::mg_4::7::79:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 79
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatiny dia lovia volafotsy iray, sekely telo-polo amby zato no lanjany, sy lovia volafotsy iray famafazana, sekely fito-polo, araka ny sekely masina; izy roa samy feno koba tsara toto voaharo diloilo, ho fanatitra hohanina;'
mg1865::mg_4::7::80:
  verse_version: mg1865
