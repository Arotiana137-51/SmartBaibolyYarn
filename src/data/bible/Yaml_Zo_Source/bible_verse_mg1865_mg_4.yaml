  verse_title: null
  verse_text: 'ary koba tsara toto voaharo diloilo ho fanatitra hohanina momba azy (telo ampahafolon''ny efaha amin''ny isam-bantotr''ombilahy iray, roa ampahafolon''ny efaha amin''ny isan-ondrilahy iray,'
mg1865::mg_4::29::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
