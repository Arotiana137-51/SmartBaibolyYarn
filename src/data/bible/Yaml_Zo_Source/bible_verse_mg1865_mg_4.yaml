  verse_chapter: 29
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro fahavalo dia hisy fara-fivoriana ho anareo; aza manao tao-zavatra akory.'
mg1865::mg_4::29::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no atero ho fanatitra odorana, dia fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah: vantotr''ombilahy iray sy ondrilahy iray ary zanak''ondry fito, izay iray taona avy sady tsy misy kilema,'
mg1865::mg_4::29::37:
  verse_version: mg1865
