  verse_chapter: 7
  verse_number: 81
  verse_date_revised: null
  verse_title: null
  verse_text: 'vantotr''ombilahy iray, ondrilahy iray, zanak''ondry iray izay iray taona, ho fanatitra odorana;'
mg1865::mg_4::7::82:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 82
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray, ho fanatitra noho ny ota;'
mg1865::mg_4::7::83:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 83
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak''ondry dimy izay iray taona; ireo no fanatitr''i Ahira, zanak''i Enana.'
mg1865::mg_4::7::84:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 84
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no zavatra naterin''ny lohan''ny Isiraely ho amin''ny fitokanana ny alitara tamin''ny andro izay nanosorana azy: lovia volafotsy roa ambin''ny folo, lovia volafotsy roa ambin''ny folo famafazana, lovia kely volamena roa ambin''ny folo;'
mg1865::mg_4::7::85:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 85
  verse_date_revised: null
  verse_title: null
  verse_text: 'sekely telo-polo amby zato avy no lanjan''ny lovia volafotsy, ary sekely fito-polo avy ny lovia famafazana; ny lanjan''ny volafotsy rehetra tamin''ireo fanaka ireo dia sekely efa-jato amby roa arivo, araka ny sekely masina;'
mg1865::mg_4::7::86:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 86
  verse_date_revised: null
  verse_title: null
  verse_text: 'lovia kely volamena roa ambin''ny folo, feno ditin-kazo manitra, dia sekely masina; ny lanjan''ny lovia kely volamena rehetra dia sekely roa-polo amby zato.'
mg1865::mg_4::7::87:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 87
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny isan''ny biby rehetra izay natao fanatitra dorana dia vantotr''ombilahy roa ambin''ny folo, ondrilahy roa ambin''ny folo, zanak''ondry roa ambin''ny folo, izay samy iray taona,''mbamin''ny fanatitra hohanina momba azy, ary osilahy roa ambin''ny folo ho fanatitra noho ny ota.'
mg1865::mg_4::7::88:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 88
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isan''ny biby rehetra izay natao fanati-pihavanana dia vantotr''ombilahy efatra amby roa-polo, ondrilahy enim-polo, osilahy enim-polo, zanak''ondry enim-polo, izay samy iray taona. Izany no nateriny ho amin''ny fitokanana ny alitara, rehefa voahosotra izy.'
mg1865::mg_4::7::89:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 89
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niditra tao amin''ny trano-lay fihaonana Mosesy mba hiteny amin''Andriamanitra, dia nandre ny feo miresaka aminy izy avy tao amin''ny rakotra fanaovam-panavotana izay teo ambonin''ny fiaran''ny Vavolombelona, avy eo anelanelan''ny kerobima roa; dia niteny taminy Jehovah.'
mg1865::mg_4::8::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fampirehetana ny jiro, sy ny nanadiovana ny Levita, ary ny fe-taona hanompoany'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::8::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''i Arona hoe: Raha mampirehitra ny jiro fito ianao, dia ataovy mahazava ny eo anoloan''ny fanaovan-jiro izy.'
mg1865::mg_4::8::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Arona izany, fa nampirehetiny ny jiro mba hahazava ny eo anoloan''ny fanaovan-jiro, araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::8::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no toetry ny fanaovan-jiro; volamena novoasana izy; hatramin''ny faladiany sy ny voniny aza dia samy novoasana avokoa; araka ny endrika izay nasehon''i Jehovah an''i Mosesy no nanaovany ny fanaovan-jiro.'
mg1865::mg_4::8::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::8::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny Levita avy amin''ny Zanak''Isiraely, ka diovy izy.'
mg1865::mg_4::8::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no hataonao aminy hanadiovana azy: Fafazo rano fanadiovana izy, ary asaovy haratany avokoa ny tenany rehetra, ary aoka hosasany ny fitafiany, ka dia hadio izy.'
mg1865::mg_4::8::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia asaovy maka vantotr''ombilahy iray izy mbamin''ny fanatitra hohanina fombany, dia koba tsara toto voaharo diloilo; ary vantotr''ombilahy iray koa no halainao ho fanatitra noho ny ota.'
mg1865::mg_4::8::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ento ny Levita hankeo anoloan''ny trano-lay fihaonana; ary vorio ny fiangonana, dia ny Zanak''Isiraely rehetra.'
mg1865::mg_4::8::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ento ny Levita hankeo anatrehan''i Jehovah; ary ny Zanak''Isiraely hametraka ny tanany aminy;'
mg1865::mg_4::8::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Arona dia hanatitra ny Levita eo anatrehan''i Jehovah ho fanatitra ahevaheva avy amin''ny Zanak''Isiraely, mba hanao ny fanompoana an''i Jehovah izy.'
mg1865::mg_4::8::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita hametraka ny tanany amin''ny lohan''ny vantotr''ombilahy roa; dia atero ny anankiray ho fanatitra noho ny ota, ary ny anankiray kosa ho fanatitra dorana ho an''i Jehovah, hanaovana fanavotana ho an''ny Levita.'
mg1865::mg_4::8::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary apetraho eo anatrehan''i Arona sy ny zanany ny Levita, ka atero ho fanatitra ahevaheva ho an''i Jehovah izy.'
mg1865::mg_4::8::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ampiavaho amin''ny Zanak''Isiraely ny Levita, dia ho Ahy izy.'
mg1865::mg_4::8::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia hiditra ny Levita hanao fanompoana ao amin''ny trano-lay fihaonana. Dia hodiovinao toy izany izy ka haterinao ho fanatitra ahevaheva;'
mg1865::mg_4::8::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nomena ho Ahy avy tamin''ny Zanak''Isiraely mihitsy izy; ho solon''izay voalohan-teraka rehetra, dia izay lahimatoa rehetra amin''ny Zanak''Isiraely, no nanalako azy ho Ahy.'
mg1865::mg_4::8::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ahy ny voalohan-teraka rehetra amin''ny Zanak''Isiraely, na olona na biby fiompy; tamin''ilay andro namelezako ny voalohan-teraka rehetra tany amin''ny tany Egypta no nanamasinako azy ho Ahy.'
mg1865::mg_4::8::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nalaiko ny Levita ho solon''ny lahimatoa rehetra amin''ny Zanak''Isiraely.'
mg1865::mg_4::8::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeko ho an''i Arona sy ny zanany mihitsy ny Levita, avy amin''ny Zanak''Isiraely, hanao ny fanompoan''ny Zanak''Isiraely ao amin''ny trano-lay fihaonana sy hanao fanavotana ho an''ny Zanak''Isiraely, mba tsy hisy areti-mandringana hanjo azy, raha manakaiky ny fitoerana masina izy.'
mg1865::mg_4::8::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Mosesy sy Arona mbamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, tamin''ny Levita izany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy ny amin''ny Levita no nataon''ny Zanak''Isiraely taminy.'
mg1865::mg_4::8::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nodiovin''ny Levita ny tenany ho afaka ota, ary nosasany ny fitafiany; ary Arona nanatitra azy ho fanatitra ahevaheva eo anatrehan''i Jehovah sady nanao fanavotana ho azy hanadiovana azy.'
mg1865::mg_4::8::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia niditra ny Levita hanao ny fihaonana teo anatrehan''i Arona sy ny zanany; araka izay efa nandidian''i Jehovah an''i Mosesy ny amin''ny Levita no nataony taminy.'
mg1865::mg_4::8::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::8::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny Levita dia izao: Hatramin''ny dimy amby roa-polo taona no ho miakatra izy no hanatona hilatsaka amin''ny antokony hanao ny fanompoana ao amin''ny trano-lay fihaonana;'
mg1865::mg_4::8::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa rehefa dimam-polo taona kosa izy, dia hiala amin''ny antokon''ny fanompoana ka tsy hanompo intsony;'
mg1865::mg_4::8::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa mahazo manampy ny rahalahiny ao amin''ny trano-lay fihaonana ihany izy mba hitandrina izay anjara-raharaha; fa tsy hanao fanompoana hafa izy. Izany no hataonao amin''ny Levita ny amin''ny anjara-raharahany.'
mg1865::mg_4::9::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitandreman''ny Zanak''Isiraely ny Paska tany an''efitr''i Sinay'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy tany an''efitr''i Sinay tamin''ny volana voalohany tamin''ny taona faharoa taorian''ny nivoahany avy tany amin''ny tany Egypta ka nanao hoe:'
mg1865::mg_4::9::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hotandreman''ny Zanak''Isiraely ny Paska amin''ny fotoany.'
mg1865::mg_4::9::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny harivan''ny andro fahefatra ambin''ny folo amin''ity volana ity no hitandremanareo azy amin''ny fotoany; araka ny didy sy ny fanao rehetra aminy no hitandremanareo azy.'
mg1865::mg_4::9::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niteny tamin''ny Zanak''Isiraely mba hitandrina ny Paska.'
mg1865::mg_4::9::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitandrina ny Paska tany an''efitr''i Sinay izy tamin''ny harivan''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy no nataon''ny Zanak''Isiraely.'
mg1865::mg_4::9::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olona sasany izay naloto tamim-paty ka tsy nahazo nitandrina ny Paska tamin''izany andro izany; dia nankeo anatrehan''i Mosesy sy Arona izy tamin''izany andro izany'
mg1865::mg_4::9::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Maloto tamim-paty izahay, ka nahoana no sakanana tsy hiaraka amin''ny Zanak''Isiraely hanatitra ny fanatitra ho an''i Jehovah amin''ny fotoany?'
mg1865::mg_4::9::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mosesy taminy: Andraso aloha, fa hanontaniako izay handidian''i Jehovah ny aminareo.'
mg1865::mg_4::9::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::9::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha misy olona eo aminareo, na eo amin''ny taranakareo hatramin''ny fara mandimby, maloto amim-paty, na lasan-davitra, dia mbola hitandrina ny Paska ho an''i Jehovah ihany koa izy.'
mg1865::mg_4::9::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny harivan''ny andro fahefatra ambin''ny folo amin''ny volana faharoa no hitandremany azy; ary hampiarahina amin''ny mofo tsy misy masirasira sy ny anana mangidy no fihinany azy.'
mg1865::mg_4::9::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hasiany sisa ho tra-maraina, ary aza avela hisy hotapahiny ny taolany; araka ny lalàna rehetra ny amin''ny Paska ihany koa no hitandremany azy.'
mg1865::mg_4::9::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay madio sady tsy lasan-davitra, nefa tsy mety mitandrina ny Paska, dia hofongorana tsy ho amin''ny fireneny, satria tsy nanatitra ny fanatitra ho an''i Jehovah tamin''ny fotoany izy; ho meloka izany olona izany.'
mg1865::mg_4::9::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mivahiny eo aminareo ka mba te-hitandrina ny Paska ho an''i Jehovah, dia araka ny didy sy ny fanao amin''ny Paska ihany no hanaovany azy; lalàna iray ihany no ho aminareo, na vahiny, na tompon-tany.'
mg1865::mg_4::9::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny amin''ny rahona izay nitarihan''i Jehovah ny Zanak''Isiraely'
  verse_text: 'Ary tamin''ny andro izay nananganana ny tabernakely ny rahona dia nanarona ny tabernakely, dia ny trano-lain''ny Vavolombelona; ary nony hariva dia niseho teo ambonin''ny tabernakely tahaka ny afo izy mandra-pahamarain''ny andro.'
mg1865::mg_4::9::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany mandrakariva izy: ny rahona nanarona azy, nefa niseho tahaka ny afo izy nony alina.'
mg1865::mg_4::9::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niakatra niala tamin''ny tranolay ny rahona, dia niainga ny Zanak''Isiraely, ka teo amin''izay nijanonan''ny rahona no nitobiany.'
mg1865::mg_4::9::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny didin''i Jehovah no niaingan''ny Zanak''Isiraely, ary araka ny didin''i Jehovah koa no nitobiany; tamin''ny andro rehetra izay nijanonan''ny rahona teo ambonin''ny tabernakely no nitobiany.'
mg1865::mg_4::9::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia nijanona ela teo ambonin''ny tabernakely aza ny rahona, dia nitandrina izay nasain''i Jehovah notandremana ihany ny Zanak''Isiraely ka tsy niainga.'
mg1865::mg_4::9::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa indraindray kosa dia andro vitsy ihany no nijanonan''ny rahona teo ambonin''ny tabernakely; araka ny didin''i Jehovah ihany no nitobiany, ary araka ny didin''i Jehovah no niaingany.'
mg1865::mg_4::9::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary indraindray kosa dia nijanona hatramin''ny hariva ka hatramin''ny maraina ihany ny rahona, ary raha niakatra izy nony maraina, dia niainga ny Zanak''Isiraely; koa na andro na alina no niakaran''ny rahona, dia niainga izy.'
mg1865::mg_4::9::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na indroa andro, na iray volana, na ela aza, no nijanonan''ny rahona teo ambonin''ny tabernakely dia mbola nitoby ihany ny Zanak''Isiraely, fa tsy niainga; fa raha niakatra kosa ny rahona, dia niainga izy.'
mg1865::mg_4::9::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny didin''i Jehovah no nitobiany, ary araka ny didin''i Jehovah no niaingany; nitandrina izay nasain''i Jehovah notandremany izy, araka ny tenin''i Jehovah izay nampitondrainy an''i Mosesy.'
mg1865::mg_4::10::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny trompetra volafotsy'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::10::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova trompetra volafotsy roa ho anao; voasana no hanaovanao azy; dia ho fiantsoanao ny fiangonana sy ho fampiainganao ny toby ireo.'
mg1865::mg_4::10::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsofina avokoa ireo, dia hivory eo aminao, eo anoloan''ny varavaran''ny trano-lay fihaonana, ny fiangonana rehetra.'
mg1865::mg_4::10::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny iray ihany no tsofina, dia ny lohan''ny firenena, izay mpifehy arivo amin''ny Isiraely, ihany no hivory eo aminao.'
mg1865::mg_4::10::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mitsoka ho fampitairana ianareo, dia hiainga ny toby izay mitoetra eo atsinanana.'
mg1865::mg_4::10::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mitsoka ho fampitairana fanindroany ianareo, dia hiainga ny toby izay mitoetra eo atsimo; fampitairana no hatao fiaingany.'
mg1865::mg_4::10::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hampivory ny fiangonana kosa ianareo, dia hitsoka fotsiny, fa tsy hanao fampitairana.'
mg1865::mg_4::10::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo mpisorona, zanak''i Arona, no hitsoka ny trompetra; dia ho lalàna mandrakizay ho anareo hatramin''ny taranakareo fara mandimby izany.'
mg1865::mg_4::10::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy ady eo amin''ny taninareo, ka mandeha hiady amin''ny fahavalo izay mampahory anareo ianareo, dia hitsoka ireo trompetra ireo ho fampitairana, dia hotsarovana eo anatrehan''i Jehovah Andriamanitrareo ianareo ka hovonjena amin''ny fahavalonareo.'
mg1865::mg_4::10::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro fifalianareo, sy amin''ny fotoam-pivavahanareo, ary amin''ny voaloham-bolanareo no hitsofanareo ny trompetra, raha manao ny fanatitra doranareo sy ny fanati-pihavananareo; dia ho fahatsiarovana ho anareo izany eo anatrehan''Andriamanitrareo: Izaho Jehovah no Andriamanitrareo.'
mg1865::mg_4::10::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny niaingan''ny Zanak''Isiraely niala tany an''efitr''i Sinay, sy ny teny nataon''i Mosesy tamin''i Hobaba.'
  verse_text: 'Ary tamin''ny andro faharoa-polo tamin''ny volana faharoa, tamin''ny taona faharoa, no niakaran''ny rahona niala teo ambonin''ny tabernakelin''ny Vavolombelona.'
mg1865::mg_4::10::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga tany an''efitr''i Sinay ny Zanak''Isiraely ka nandroso, ary ny rahona nijanona tany an''efitra Parana.'
mg1865::mg_4::10::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izany no niaingany voalohany araka ny didin''i Jehovah izay nampitondrainy an''i Mosesy.'
mg1865::mg_4::10::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanevan''ny tobin''ny taranak''i Joda no niainga voalohany araka ny antokony, ary Nasona, zanak''i Aminadaba, no mpifehy ny antokony.'
mg1865::mg_4::10::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Netanela, zanak''i Zoara, no mpifehy ny antokon''ny firenena taranak''Isakara.'
mg1865::mg_4::10::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliaba, zanak''i Helona, no mpifehy ny antokon''ny firenena taranak''i Zebolona.'
mg1865::mg_4::10::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahorona ny tabernakely, ka niainga ny taranak''i Gersona sy ny taranak''i Merary, nitondra ny tabernakely.'
mg1865::mg_4::10::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ny fanevan''ny tobin''i Robena araka ny antokony; ary Elizora, zanak''i Sedeora, no mpifehy ny antokony.'
mg1865::mg_4::10::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Selomiela, zanak''i Zorisaday, no mpifehy ny antokon''ny firenena taranak''i Simeona.'
mg1865::mg_4::10::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliasafa, zanak''i Doela, no mpifehy ny antokon''ny firenena taranak''i Gada.'
mg1865::mg_4::10::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ny Kehatita, mitondra ny zava-masina; ary nisy nanangana ny tabernakely mandra-pihaviny.'
mg1865::mg_4::10::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ny fanevan''ny tobin''ny taranak''i Efraima, araka ny antokony; ary Elisama, zanak''i Amihoda, no mpifehy ny antokony.'
mg1865::mg_4::10::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gamaliela, zanak''i Pedazora, no mpifehy ny antokon''ny firenena taranak''i Manase.'
mg1865::mg_4::10::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abidana, zanak''i Gideony, no mpifehy ny firenena taranak''i Benjamina.'
mg1865::mg_4::10::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ny fanevan''ny tobin''ny taranak''i Dana, izay vodi-lalan''ny toby rehetra, araka ny antokony; ary Ahiezera, zanak''i Amisaday, no mpifehy ny antokony.'
mg1865::mg_4::10::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pagiela, zanak''i Okrana, no mpifehy ny antokon''ny firenena taranak''i Asera.'
mg1865::mg_4::10::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahira, zanak''i Enana, no mpifehy ny antokon''ny firenena taranak''i Naftaly.'
mg1865::mg_4::10::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no fandehan''ny Zanak''Isiraely, araka ny antokony avy, raha niainga izy.'
mg1865::mg_4::10::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''i Hobaba, zanak''i Regoela Midianita, rafozan''i Mosesy: Izahay izao dia mandeha hankany amin''ny tany izay nolazain''i Jehovah hoe: Homeko anareo izy; andeha hiaraka aminay ianao, dia hasianay soa; fa Jehovah efa nilaza soa ny amin''ny Isiraely.'
mg1865::mg_4::10::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy taminy: Tsy handeha aho; fa hody any amin''ny taniko sy ny havako.'
mg1865::mg_4::10::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy: Aza dia ilaozanao izahay; fa fantatrao izay tokony hitobianay aty an''efitra, ka dia ho masonay ianao.'
mg1865::mg_4::10::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hiaraka aminay ianao, dia izay soa hataon''i Jehovah aminay no mba hataonay aminao kosa.'
mg1865::mg_4::10::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga niala tany an-tendrombohitr''i Jehovah lalan-kateloana izy; ary ny fiaran''ny faneken''i Jehovah nandroso nialoha azy lalan-kateloana hitady fialan-tsasatra ho an''ny olona.'
mg1865::mg_4::10::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahon''i Jehovah dia teo amboniny nony andro tamin''ny niaingany niala tamin''ny nitobiany.'
mg1865::mg_4::10::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niainga ny fiara, dia hoy Mosesy: Mitsangàna, Jehovah o, ka aoka hiely ny fahavalonao; ary aoka handositra ny tavanao izay mankahala Anao.'
mg1865::mg_4::10::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nijanona kosa ny fiara, dia hoy izy: Miverena, Jehovah o, ho amin''ny Isiraely tsy omby alinalina.'
mg1865::mg_4::11::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nimonomononan''ny Zanak''Isiraely tao Tabera sy Kibrota-hatava'
  verse_text: 'Ary dia nitaraim-pahoriana teo anatrehan''i Jehovah ny olona, ary nony ren''i Jehovah izany, dia nirehitra ny fahatezerany, ary ny afon''i Jehovah nandoro azy, ka may ny teo an-tsisin''ny toby.'
mg1865::mg_4::11::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Mosesy ny olona; ary Mosesy nifona tamin''i Jehovah, dia maty ny afo.'
mg1865::mg_4::11::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''izany tany izany dia nataony hoe Tabera, satria nandoro azy ny afon''i Jehovah.'
mg1865::mg_4::11::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona hafa firenena izay niharo taminy dia liana, ary ny Zanak''Isiraely koa dia nitomany indray hoe: Enga anie ka hisy hanome hena hohaninay!'
mg1865::mg_4::11::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsaroanay ny hazandrano izay nohaninay, maimaim-poana tany Egypta mbamin''ny voatango sy tongolo samy hafa karazana.'
mg1865::mg_4::11::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao dia maina ny ainay: tsy misy na inona na inona eto imasonay afa-tsy ny mana ihany.'
mg1865::mg_4::11::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mana dia toy ny voan-drafy, ary ny tarehiny dia tahaka ny tarehin''ny bedola.'
mg1865::mg_4::11::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandehandeha ny olona ka nanangona azy, dia nitoto azy tamin''ny fikosoham-bary na tamin''ny laona, ary nahandro azy tamin''ny vilany, dia nanao mofo azy; ary ny fanandramana azy dia tahaka ny fanandramana mofo misy diloilo.'
mg1865::mg_4::11::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nilatsaka tamin''ny toby ny ando nony alina, dia nilatsaka koa niaraka taminy ny mana.'
mg1865::mg_4::11::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nandre ny olona nitomany tamin''ny isam-pianakaviany, samy teo amin''ny varavaran''ny lainy avy; dia nirehitra fatratra ny fahatezeran''i Jehovah; ary tsy sitrak''i Mosesy koa izany.'
mg1865::mg_4::11::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''i Jehovah: Nahoana no dia nasianao ratsy ny mpanomponao? ary nahoana no tsy nahita fitia eo imasonao aho, ka nampitondrainao enta-mavesatra, dia ity firenena rehetra ity?'
mg1865::mg_4::11::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho va no torontoronina an''ity firenena rehetra ity? ary izaho va no niteraka azy, no ilazanao hoe: Trotroinao izy, tahaka ny ray mpitaiza mitondra ny zaza minono, ho any amin''ny tany izay nianiananao tamin''ny razany homena azy?'
mg1865::mg_4::11::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy aiza no hahazoako hena homena ity firenena rehetra ity, no dia mitomany amiko izy manao hoe: Omeo hena izahay hohaninay?'
mg1865::mg_4::11::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy zakako izaho irery ny mitondra ity firenena rehetra ity, fa mavesatra amiko loatra.'
mg1865::mg_4::11::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha izao no ataonao amiko, masïna Ianao, vonoy mihitsy aho, raha nahita fitia eo imasonao; fa aza avela hahita ny fahoriako aho.'
mg1865::mg_4::11::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Manangona fito-polo lahy amin''ny loholon''ny Isiraely ho ety amiko, dia izay fantatrao ho loholona amin''ny fireneny sy mpifehy azy; ary ento miaraka aminao ho ao amin''ny trano-lay fihaonana izy.'
mg1865::mg_4::11::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hidina Aho ka hiteny aminao eo; ary Izaho haka amin''ny Fanahy Izay ao aminao ka hametraka izany ao amin''ireo, ary hiara-mitondra ity firenena ity aminao ireo, fa tsy ianao irery intsony no hitondra azy.'
mg1865::mg_4::11::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao amin''ny olona hoe: Manamasïna ny tenanareo ho amin''ny ampitso, dia hihinan-kena ianareo; fa nitomany teo anatrehan''i Jehovah ianareo ka nanao hoe: Enga anie ka hisy hanome hena hohaninay! fa soa no hitanay tany Egypta; dia homen''i Jehovah hena ianareo, ka hohaninareo.'
mg1865::mg_4::11::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy indray andro no hihinananareo na indroa andro, na hadimiana, na hafoloana, na roa-polo andro aza,'
mg1865::mg_4::11::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hatramin''ny iray volana mipaka, dia mandra-pivoakany amin''ny vavoronareo ka haharikoriko anareo; satria nolavinareo Jehovah, Izay eo aminareo, ka nitomany teo anatrehany ianareo nanao hoe: Nahoana re no nivoaka avy tany Egypta izahay?'
mg1865::mg_4::11::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy: Ny olona izay itoerako dia lehilahy enina hetsy izay mahalia lalana; ary hoy ianao: Homeko hena izy mba hohaniny mandritra ny iray volana.'
mg1865::mg_4::11::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ondry aman''osy sy omby va no hovonoina ho azy hahavoky azy? sa ny hazandrano rehetra ao amin''ny ranomasina no hangonina ho azy hahavoky azy?'
mg1865::mg_4::11::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Nihafohy va ny tanan''i Jehovah? ankehitriny dia ho hitanao na ho tanteraka aminao ny teniko, na tsia.'
mg1865::mg_4::11::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka Mosesy ka nilaza ny tenin''i Jehovah tamin''ny olona; dia nanangona fito-polo lahy tamin''ny loholon''ny firenena izy ka nampitoetra azy manodidina ny trano-lay.'
mg1865::mg_4::11::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nidina teo amin''ny rahona Jehovah ka niteny taminy, dia nangalany ny Fanahy izay tao amin''i Mosesy ka napetrany tao amin''ny loholona fito-polo lahy; ary raha mbola nitoetra tao aminy ny Fanahy, dia naminany izy, nefa tsy nanao intsony.'
mg1865::mg_4::11::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy roa lahy nijanona teo an-toby, Eldada no anaran''ny anankiray, ary Medada no anaran''ny anankiray; ary ny Fanahy nitoetra tao aminy; ary isan''izay voasoratra izy roa lahy, nefa tsy mba nankeo amin''ny trano-lay; dia naminany teo an-toby izy roa lahy.'
mg1865::mg_4::11::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy zatovo nihazakazaka, dia nilaza tamin''i Mosesy ka nanao hoe: Eldada sy Medada maminany etsy an-toby.'
mg1865::mg_4::11::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Josoa, zanak''i Nona, izay nanompo an''i Mosesy hatry ny fony tanora, ka nanao hoe: Ry Mosesy, tompoko, rarao izy roa lahy.'
mg1865::mg_4::11::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mosesy taminy: Izaho va no ialonanao? enga anie ka ho mpaminany avokoa ny olon''i Jehovah rehetra, ka halatsak''i Jehovah aminy ny Fanahiny!'
mg1865::mg_4::11::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo an-toby Mosesy sy ny loholon''ny Isiraely.'
mg1865::mg_4::11::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy rivotra nivoaka avy tamin''i Jehovah ka nitondra papelika avy tany amin''ny ranomasina ary nampihahakahaka azy teny amin''ny toby, ka tokony ho lalana indray andro manodidina ny toby no nisy azy, ary tokony ho roa hakiho ambonin''ny tany izy.'
mg1865::mg_4::11::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny olona nandritra izany andro izany sy nandritra ny alina sy ny ampitson''iny koa ka nanangona ny papelika; ary izay kely fanangona no folo homera; ary nahahiny ho maina ireny manodidina ny toby.'
mg1865::mg_4::11::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola teo am-bavany ny hena ka tsy mbola lany, dia nirehitra tamin''ny olona ny fahatezeran''i Jehovah, ary namely ny olony tamin''ny kapoka mafy indrindra Izy.'
mg1865::mg_4::11::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''izany tany izany nataony hoe: Kibrota-hatava, satria teo no nandevenana ny olona izay liana.'
mg1865::mg_4::11::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niala tao Kibrota-hatava ny olona ka nifindra nankany Hazerota; dia nitoetra tany Hazerota izy.'
mg1865::mg_4::12::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanomezan''i Miriama sy Arona tsiny an''i Mosesy, sy ny nataon''Andriamanitra tamin''izany'
  verse_text: 'Ary Miriama sy Arona niteny nanome tsiny an''i Mosesy noho ny vehivavy Kosita izay efa nampakariny; fa efa nampakatra vehivavy Kosita izy.'
mg1865::mg_4::12::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy mianadahy: Moa Mosesy ihany va no efa nitenenan''i Jehovah? tsy izahay koa va no nitenenany? Dia ren''i Jehovah izany.'
mg1865::mg_4::12::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia lehilahy nalemy fanahy mihoatra noho ny olona rehetra aty ambonin''ny tany.'
mg1865::mg_4::12::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia niteny tampoka tamin''i Mosesy sy Arona ary Miriama hoe: Mivoaha ianareo telo mianadahy ho any amin''ny trano-lay fihaonana. Dia nivoaka izy telo mianadahy.'
mg1865::mg_4::12::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary andri-rahona no nidinan''i Jehovah, ka nitsangana teo am-baravaran''ny trano-lay Izy; dia niantso an''i Arona sy Miriama Izy, ka nivoaka izy mianadahy.'
mg1865::mg_4::12::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Mba mihainoa ny teniko: Raha misy mpaminanin''i Jehovah eo aminareo, dia amin''ny fahitana no hisehoako aminy, ary amin''ny nofy no hitenenako aminy.'
mg1865::mg_4::12::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy toy izany kosa Mosesy mpanompoko, izay mahatoky amin''ny tranoko rehetra.'
mg1865::mg_4::12::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifanatrika no itenenako aminy, dia amin''ny fahitana, fa tsy amin''ny teny saro-pantarina, ary mijery ny endrik''i Jehovah izy; ka nahoana ianareo no tsy natahotra hanome tsiny an''i Mosesy mpanompoko?'
mg1865::mg_4::12::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra ny fahatezeran''i Jehovah tamin''izy mianadahy, ka niala Izy.'
mg1865::mg_4::12::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahona niala tamin''ny trano-lay; ary, indro, boka Miriama ka fotsy tahaka ny oram-panala; ary Arona dia nijery an''i Miriama, ka indro fa boka izy.'
mg1865::mg_4::12::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Arona tamin''i Mosesy: Indrisy, tompoko, masïna ianao, aza atao ho helokay ny nanaovanay adaladala sy ny nanotanay.'
mg1865::mg_4::12::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza dia avela ho toy ny maty izy, izay lany ny antsasaky ny nofony, raha vao teraka izy.'
mg1865::mg_4::12::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia nitaraina tamin''i Jehovah ka nanao hoe: Andriamanitra o, mifona aminao aho, mba sitrano re izy!'
mg1865::mg_4::12::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Raha nandrora tamin''ny tavany rainy, moa tsy ho menatra hafitoana va izy? koa atokàny any ivelan''ny toby hafitoana izy, ary rehefa afaka izany, dia ampidiro indray.'
mg1865::mg_4::12::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natokana tany ivelan''ny toby hafitoana Miriama; ary ny olona tsy niainga, raha tsy efa nampidirina Miriama.'
mg1865::mg_4::12::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia niainga niala tany Hazerota ny olona ka nitoby tany an''efitra Parana.'
mg1865::mg_4::13::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpisafo-tany'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy, ka nanao hoe:'
mg1865::mg_4::13::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maniraha lehilahy vitsivitsy hisafo ny tany Kanana, izay omeko ho an''ny Zanak''Isiraely; dia lehilahy iray avy isam-pirazanany no hirahinareo, ka izay samy lohan''ny fireneny avy.'
mg1865::mg_4::13::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia naniraka azy hiala any an''efitra Parana, araka ny didin''i Jehovah; ary samy lohan''ny firenen''ny Zanak''Isiraely ireo lehilahy rehetra ireo.'
mg1865::mg_4::13::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anarany: Avy tamin''ny firenen''i Robena dia Samoa, zanak''i Zakora;'
mg1865::mg_4::13::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Simeona dia Safata, zanak''i Hory;'
mg1865::mg_4::13::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Joda dia Kaleba, zanak''i Jefone;'
mg1865::mg_4::13::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''Isakara dia Jigala, zanak''i Josefa;'
mg1865::mg_4::13::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Efraima dia Hosea, zanak''i Nona;'
mg1865::mg_4::13::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Benjamina dia Palty, zanak''i Rafo;'
mg1865::mg_4::13::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Zebolona dia Gadiela, zanak''i Sody;'
mg1865::mg_4::13::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Josefa, tamin''ny firenen''i Manase, dia Gady, zanak''i Sosy;'
mg1865::mg_4::13::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Dana dia Amiela, zanak''i Gemaly;'
mg1865::mg_4::13::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Asera dia Setora, zanak''i Mikaela;'
mg1865::mg_4::13::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Naftaly dia Naby, zanak''i Vofsy;'
mg1865::mg_4::13::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny firenen''i Gada dia Geoela, zanak''i Maky.'
mg1865::mg_4::13::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no anaran''ny lehilahy izay nirahin''i Mosesy hisafo ny tany. Ary Hosea, zanak''i Nona, dia nataon''i Mosesy hoe Josoa.'
mg1865::mg_4::13::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy naniraka ireo hisafo ny tany Kanana ka nanao taminy hoe: Miakara aty amin''ny tany atsimo ianareo, ka miakara ho any amin''ny tany havoana;'
mg1865::mg_4::13::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izahao izay toetry ny tany sy ny olona monina any, na mahery, na osa, na vitsy, na maro;'
mg1865::mg_4::13::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay toetry ny tany itoerany, na tsara, na ratsy; ary ny toetry ny tanàna izay itoerany, na ao an-day, na ao an-tanàna mimanda;'
mg1865::mg_4::13::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny toetry ny tany, na lonaka, na màzana, na misy hazo eo, na tsia; ary mahereza ianareo, ka itondray ny vokatry ny tany. Ary ny andro fahizany dia fahamasahan''ny voaloboka mialin-taona.'
mg1865::mg_4::13::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra ireo ka nisafo ny tany hatramin''ny efitra Zina ka hatrany Rehoba, dia ao akaikin''i Hamata.'
mg1865::mg_4::13::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra tao amin''ny tany atsimo izy ka nankany Hebrona; ary teo Ahimana sy Sesay ary Talmay, teraky ny Anakita. (Ary Hebrona dia voaorina fito taona talohan''i Zoana any Egypta.)'
mg1865::mg_4::13::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''ny lohasaha Eskola izy ka nanapaka sampam-boaloboka teo izay nisy sampahony iray ihany, ary nolanjain-droa lahy tamin''ny hazo izany; ary ny ampongaben-danitra sy ny aviavy dia nitondrany koa.'
mg1865::mg_4::13::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany tany izany dia nataony hoe Lohasaha Eskola, noho ny sampahom-boaloboka izay notapahin''ny Zanak''Isiraely teo.'
mg1865::mg_4::13::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niverina avy nisafo ny tany ireo, nony afaka efa-polo andro.'
mg1865::mg_4::13::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo amin''i Mosesy sy Arona ary ny fiangonana, dia ny Zanak''Isiraely rehetra, tany an''efitra Parana izy, dia tany Kadesy, ka nitondra teny taminy sy ny fiangonana rehetra sady naneho azy ny vokatry ny tany.'
mg1865::mg_4::13::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilaza taminy izy ka nanao hoe: Tonga tany amin''ny tany izay nanirahanao anay izahay, koa tondra-dronono sy tantely tokoa izy; ary itony no vokatra avy tany.'
mg1865::mg_4::13::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa mahery ny olona izay monina eo amin''ny tany; ary ny tanàna dia mimanda sady lehibe dia lehibe; ary koa, nahita ny teraky ny Anakita teo izahay.'
mg1865::mg_4::13::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Amalekita no monina eo amin''ny tany atsimo; ary ny Hetita sy ny Jebosita ary ny Amorita no monina any amin''ny tany havoana; ary ny Kananita no monina eo amoron''ny ranomasina sy eo amoron''i Jordana.'
mg1865::mg_4::13::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kaleba dia nampangina ny olona teo anatrehan''i Mosesy ka nanao hoe: Andeha isika hiakatra mihitsy mba hahazoantsika azy, fa haharesy azy tokoa isika.'
mg1865::mg_4::13::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa ny lehilahy izay niara-niakatra taminy: Tsy mahazo miakatra handresy ny olona isika; fa mahery noho isika izy.'
mg1865::mg_4::13::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilaza ratsy ny tany izay nosafoiny tamin''ny Zanak''Isiraely izy ka nanao hoe: Ny tany izay nalehanay nosafoina dia tany izay mandevona ny monina eo, ary ny olona rehetra izay hitanay teo dia olona vaventibe;'
mg1865::mg_4::13::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nahita ny Nefilima teo izahay, dia taranaky ny Anakita avy amin''ny Nefilima; ary teo imasonay dia tahaka ny tsingentana izahay; ary toy izany koa izahay teo imasony.'
mg1865::mg_4::14::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandavan''ny Zanak''Isiraely tsy hiakatra ho eny amin''ny tany Kanana'
  verse_text: 'Dia nanandratra ny feony ny fiangonana rehetra ka nitaraina; ary nitomany ny olona tamin''iny alina iny.'
mg1865::mg_4::14::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nimonomonona tamin''i Mosesy sy Arona ny Zanak''Isiraely rehetra, ka hoy ny fiangonana rehetra taminy; Inay anie isika mba maty tany amin''ny tany Egypta ihany; na inay anie isika mba maty taty amin''ity efitra ity!'
mg1865::mg_4::14::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana Jehovah no mitondra antsika ho amin''ity tany ity ho lavon-tsabatra, ary ny vadintsika sy ny zanatsika madinika ho babo; tsy aleontsika miverina ho any Egypta va?'
mg1865::mg_4::14::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifampitaona hoe izy: Andeha hifidy mpitarika isika ka hiverina any Egypta.'
mg1865::mg_4::14::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona dia niankohoka teo anatrehan''ny fivorian''ny fiangonana, dia ny Zanak''Isiraely rehetra.'
mg1865::mg_4::14::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josoa, zanak''i Nona, sy Kaleba, zanak''i Jefone, izay isan''ny nisafo ny tany, dia nandriatra ny fitafiany;'
mg1865::mg_4::14::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niteny tamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, izy roa lahy ka nanao hoe: Ny tany izay nalehanay nosafoina dia tany tsara indrindra.'
mg1865::mg_4::14::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha sitrak''i Jehovah isika, dia hitondra antsika ho amin''izany tany izany Izy, ka homeny antsika, dia tany tondra-dronono sy tantely.'
mg1865::mg_4::14::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aza miodina amin''i Jehovah ianareo, ary aza matahotra ny tompon-tany; fa hanina ho antsika ireo; ny fiarovany efa niala taminy, ary Jehovah momba antsika; koa aza matahotra azy ianareo.'
mg1865::mg_4::14::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny fiangonana rehetra: Torahy vato izy roa lahy. Kanjo ny voninahitr''i Jehovah niseho teo amin''ny trano-lay fihaonana, teo anatrehan''ny Zanak''Isiraely rehetra.'
mg1865::mg_4::14::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Mandra-pahoviana no hamotsifotsian''ity firenena ity Ahy? ary mandra-pahoviana no tsy hinoany Ahy noho ny famantarana rehetra izay nataoko teo aminy?'
mg1865::mg_4::14::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamely azy amin''ny areti-mandringana Aho ka hamongotra azy, fa hanao anao ho firenena lehibe sy mahery noho izy kosa.'
mg1865::mg_4::14::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''i Jehovah: Dia ho ren''ny Egyptiana izany; fa ny herinao no nitondranao ity firenena ity nivoaka avy teo aminy,'
mg1865::mg_4::14::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary holazainy amin''ny monina eo amin''ity tany ity izany; ary efa reny fa Ianao Jehovah no eto amin''ity firenena ity, ary Ianao Jehovah no hita mifanatrika, ary ny rahonao mijanona eo amboniny, ary Ianao no mitarika azy eo aloha amin''ny andri-rahona nony andro, ary amin''ny andri-afo nony alina.'
mg1865::mg_4::14::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mahafaty ity firenena ity toy ny olona iray Ianao, dia hiteny ny jentilisa, izay nandre ny lazanao, ka hanao hoe:'
mg1865::mg_4::14::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy zakan''i Jehovah ny mitondra iny firenena iny ho any amin''ny tany izay nianianany taminy homena azy, dia namono azy tany an''efitra Izy.'
mg1865::mg_4::14::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, aoka hiseho ny halehiben''ny herin''ny Tompo, araka ilay teninao hoe:'
mg1865::mg_4::14::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahari-po Jehovah sady be famindram-po, mamela heloka sy fahadisoana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin''ny zanaka hatramin''ny zafiafy sy ny zafindohalika.'
mg1865::mg_4::14::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifona aminao aho, mamelà ny helok''ity firenena ity araka ny halehiben''ny famindram-ponao, sy araka ny namelanao ny helok''ity firenena ity hatrany Egypta ka mandraka ankehitriny.'
mg1865::mg_4::14::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah: Efa navelako araka ny teninao izany.'
mg1865::mg_4::14::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha velona koa Aho, ka ho feno ny voninahitr''i Jehovah ny tany rehetra,'
mg1865::mg_4::14::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ireo lehilahy rehetra ireo, izay nahita ny voninahitro sy ny famantarako izay nataoko tany Egypta sy tany an''efitra, nefa naka fanahy Ahy izao im-polo izao, ka tsy nihaino ny feoko,'
mg1865::mg_4::14::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy hahita mihitsy ny tany izay nianianako tamin''ny razany homena azy; eny, izay rehetra namotsifotsy Ahy dia samy tsy hahita izany.'
mg1865::mg_4::14::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''i Kaleba mpanompoko kosa, satria fanahy hafa no tao aminy, ka tanteraka tamin''ny fanarahana Ahy izy, dia ho entiko ho any amin''ny tany izay nalehany izy, ary ny zanany handova izany.'
mg1865::mg_4::14::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Amalekita sy ny Kananita no mponina eo amin''ny lohasaha; koa rahampitso dia miverena ianareo, ka mankanesa any an''efitra amin''ny lalana mankany amin''ny Ranomasina Mena.'
mg1865::mg_4::14::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe:'
mg1865::mg_4::14::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no mbola handeferako amin''izao fiangonana ratsy mimonomonona amiko izao? Efa reko ny fimonomononan''ny Zanak''Isiraely, izay imonomononany amiko.'
mg1865::mg_4::14::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao aminy hoe: Raha velona koa Aho, hoy Jehovah, dia araka izay nolazainareo teo anatrehako no hataoko aminareo:'
mg1865::mg_4::14::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ety amin''ity efitra ity no hiampatramparan''ny fatinareo; ary ianareo rehetra izay voalamina araka ny nanisana anareo, dia ny hatramin''ny roa-polo taona no ho miakatra, izay efa nimonomonona tamiko,'
mg1865::mg_4::14::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy ho tonga mihitsy any amin''ny tany izay nananganako tanana hamponenana anareo, afa-tsy Kaleba, zanak''i Jefone, sy Josoa, zanak''i Nona.'
mg1865::mg_4::14::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zanakareo madinika kosa, izay nolazainareo fa ho babo, dia izy no ho entiko miditra, ary izy no hahalala ny tany izay nolavinareo.'
mg1865::mg_4::14::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny aminareo, dia hiampatrampatra amin''ity efitra ity ny fatinareo;'
mg1865::mg_4::14::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zanakareo hirenireny toy ny mpiandry ondry aty an''efitra efa-polo taona ka hiharan''ny valin''ny fijangajanganareo, mandra-pahafatinareo rehetra aty an''efitra.'
mg1865::mg_4::14::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny isan''ny andro efa-polo izay nisafoanareo ny tany, ka ny andro iray hosoloana taona iray no hitondranareo ny helokareo efa-polo taona; ka dia ho fantatrareo ny fahafoizako anareo.'
mg1865::mg_4::14::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Jehovah efa nilaza fa hataoko tokoa izany amin''izao fiangonana ratsy rehetra izao, izay miangona hiodina amiko; ety amin''ity efitra ity no hahalany ritra azy, ary ety no hahafatesany.'
mg1865::mg_4::14::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy izay nirahin''i Mosesy hisafo ny tany, dia izay niverina ka nampimonomonona ny fiangonana rehetra tamin''i Mosesy, satria nanao laza ratsy ny tany izy,'
mg1865::mg_4::14::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia matin''ny areti-mandringana teo anatrehan''i Jehovah ireny lehilahy nilaza ratsy ny tany ireny.'
mg1865::mg_4::14::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Josoa, zanak''i Nona, sy Kaleba, zanak''i Jefone, kosa, izay isan''ny lehilahy nandeha nisafo ny tany, dia velona ihany.'
mg1865::mg_4::14::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazain''i Mosesy tamin''ny Zanak''Isiraely rehetra izany teny izany; ka dia nanjoretra tery ny olona.'
mg1865::mg_4::14::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa izy ary niakatra tany an-tampon''ny tendrombohitra ka nanao hoe: Indreto izahay hiakatra ho any amin''ny tany izay nolazain''i Jehovah, fa efa nanota izahay.'
mg1865::mg_4::14::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy: Nahoana no mandika ny didin''i Jehovah ianareo? fa tsy hambinina izany.'
mg1865::mg_4::14::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miakatra, fa tsy momba anareo Jehovah,'
mg1865::mg_4::14::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao ho resy eo anoloan''ny fahavalonareo ianareo; fa ny Amalekita sy ny Kananita dia eo anoloanareo, ka ho lavon-tsabatra ianareo; satria niala tamin''ny fanarahana an''i Jehovah ianareo, dia tsy homba anareo Izy.'
mg1865::mg_4::14::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo sahisahy foana izy ka niakatra teo an-tampon''ny tendrombohitra ihany; nefa Mosesy sy ny fiaran''ny faneken''i Jehovah tsy niala teo an-toby.'
mg1865::mg_4::14::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 14
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina ny Amalekita sy ny Kananita, izay nonina teo amin''izany tendrombohitra izany, ka namely azy ary nanorotoro azy hatrany Horma.'
mg1865::mg_4::15::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Didy samy hafa ny amin''ny fanatitra'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::15::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha tonga any amin''ny tany honenanareo izay omeko anareo ianareo'
mg1865::mg_4::15::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manatitra fanatitra atao amin''ny afo ho an''i Jehovah, dia omby na ondry aman''osy hatao fanatitra dorana, na fanatitra hafa alatsa-drà hanalana voady, na amin''ny sitrapo na amin''ny fotoam-pivavahanareo, hanaovana hanitra ankasitrahana ho an''i Jehovah:'
mg1865::mg_4::15::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay manatitra ny fanatiny ho an''i Jehovah dia hanatitra fanatitra hohanina koa, dia koba tsara toto ampahafolon''ny efaha voaharo diloilo ampahefatry ny hina;'
mg1865::mg_4::15::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary divay ampahefatry ny hina hatao fanatitra aidina no hampombainao ny fanatitra dorana, na ny fanatitra hafa alatsa-drà, amin''ny isan-janak''ondry iray.'
mg1865::mg_4::15::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fanampin''ny isan-ondrilahy iray dia koba tsara toto roa ampahafolon''ny efaha voaharo diloilo ampahatelon''ny hina no haterinao ho fanatitra hohanina;'
mg1865::mg_4::15::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary divay ampahatelon''ny hina no haterinao ho fanatitra aidina, ho hanitra ankasitrahana ho an''i Jehovah.'
mg1865::mg_4::15::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manatitra omby ho fanatitra dorana na ho fanatitra hafa alatsa-drà ianao, hanalana voady, na ho fanati-pihavanana ho an''i Jehovah,'
mg1865::mg_4::15::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia fanatitra hohanina koa no haterinao ho fanampin''ny isan-omby iray, dia koba tsara toto telo ampahafolon''ny efaha voaharo diloilo antsasaky ny hina;'
mg1865::mg_4::15::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary divay antsasaky ny hina no haterinao ho fanatitra aidina, ho fanatitra atao amin''ny afo, ho hanitra ankasitrahana ho an''i Jehovah.'
mg1865::mg_4::15::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no hatao amin''ny isan-omby iray, na ny isan-ondrilahy iray, na ny isan-janak''ondry iray, na ny isan-janak''osy iray.'
mg1865::mg_4::15::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka izany no hataonareo amin''izy rehetra, araka ny isan''ny zavatra aterinareo.'
mg1865::mg_4::15::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tompon-tany rehetra samy hanao ireo zavatra ireo araka izany, raha manatitra fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izy.'
mg1865::mg_4::15::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy vahiny eo aminareo, na olona miara-mitoetra aminareo, hatramin''ny taranakareo fara mandimby, ka manatitra fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izy, dia araka izay ataonareo no hataony.'
mg1865::mg_4::15::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny fiangonana, dia lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo koa, dia lalàna mandrakizay hatramin''ny taranakareo fara mandimby izany: tsy hisy hafa eo anatrehan''i Jehovah na ianareo na ny vahiny.'
mg1865::mg_4::15::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo.'
mg1865::mg_4::15::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::15::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha tonga any amin''ny tany izay itondrako anareo ianareo'
mg1865::mg_4::15::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hihinana mofo avy amin''ny vokatry ny tany, dia hanokana izay ho an''i Jehovah.'
mg1865::mg_4::15::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanokana mofo iray izay hatao amin''ny voalohan''ny kobanareo voafetafeta ianareo; tahaka izay atokana avy eo amin''ny famoloana no hanokananareo izany.'
mg1865::mg_4::15::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voalohan''ny kobanareo voafetafeta dia hanomezanareo ho an''i Jehovah hatramin''ny taranakareo fara mandimby.'
mg1865::mg_4::15::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manota tsy nahy ianareo ka tsy mankatò ireo didy rehetra ireo, izay nolazain''i Jehovah tamin''i Mosesy,'
mg1865::mg_4::15::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay rehetra nasain''i Jehovah nandidian''i Mosesy anareo, hatramin''ny andro izay nanaovan''i Jehovah izany didy izany ka hatramin''ny taranakareo fara mandimby,'
mg1865::mg_4::15::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa atao tsy nahy izany ka tsy fantatry ny fiangonana; dia hanatitra vantotr''ombilahy iray ny fiangonana rehetra ho fanatitra dorana, ho hanitra ankasitrahana ho an''i Jehovah, mbamin''ny fanatitra hohanina sy ny fanatitra aidina momba azy, araka ny fanao, ary osilahy iray ho fanatitra noho ny ota.'
mg1865::mg_4::15::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona dia hanao fanavotana ho an''ny fiangonana, dia ny Zanak''Isiraely rehetra, ka dia havela ny helony, satria natao tsy nahy izany; ary hitondra ny fanatiny izy, dia fanatitra atao amin''ny afo ho an''i Jehovah, ary ny fanatiny noho ny ota, eo anatrehan''i Jehovah, noho ny ota tsy nahy nataony.'
mg1865::mg_4::15::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia havela ny heloky ny fiangonana, dia ny Zanak''Isiraely rehetra, mbamin''izay vahiny eo aminy; fa nahazo ny olona rehetra izany noho ny ota tsy nahy,'
mg1865::mg_4::15::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha olona iray kosa no manota tsy nahy, dia hanatitra osivavy iray izay iray taona izy ho fanatitra noho ny ota.'
mg1865::mg_4::15::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona dia hanao fanavotana ho an''ny olona izay nanota tsy nahy eo anatrehan''i Jehovah, ka dia havela ny helony.'
mg1865::mg_4::15::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lalàna iray ihany no hatao amin''izay manota tsy nahy, na amin''ny Zanak''Isiraely rehetra, na amin''ny vahiny eo aminareo.'
mg1865::mg_4::15::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay manota sahisahy kosa, na tompon-tany, na vahiny, dia manamavo an''i Jehovah, ka dia hofongorana tsy ho amin''ny fireneny.'
mg1865::mg_4::15::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenin''i Jehovah no nohamavoiny, ary ny lalàny no nodikainy, dia hofongorana tokoa izany olona izany; ny helony dia ho aminy ihany.'
mg1865::mg_4::15::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Ny natao tamin''ilay lehilahy nanangona kitay tamin''ny andro Sabata'
  verse_text: 'Ary raha tany an''efitra ny Zanak''Isiraely, dia nahita lehilahy anankiray nanangona kitay hazo tamin''ny andro Sabata.'
mg1865::mg_4::15::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nahita azy nanangona kitay dia nitondra azy teo amin''i Mosesy sy Arona ary ny fiangonana rehetra.'
mg1865::mg_4::15::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambenana ralehilahy, satria tsy mbola fantatra izay hatao aminy.'
mg1865::mg_4::15::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Hatao maty tokoa izany lehilahy izany; hitora-bato azy eny ivelan''ny toby ny fiangonana rehetra.'
mg1865::mg_4::15::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namoaka azy ho eny ivelan''ny toby ny fiangonana rehetra ka nitora-bato azy, ka maty izy, dia araka izay nandidian''i Jehovah an''i Mosesy ihany.'
mg1865::mg_4::15::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 37
  verse_date_revised: null
  verse_title: 'Ny amin''ny hanaovana somotraviavy amin''ny sisin''ny fitafian''ny Zanak''Isiraely'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::15::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely, ka asaovy asiany somotraviavy ny sisin''ny fitafiany hatramin''ny taranany fara mandimby, ary aoka hasiany kofehy manga eo amin''ny somotraviaviny.'
mg1865::mg_4::15::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho somotraviavy ho anareo izany, ka raha jerenareo, dia hotsarovanareo sy hankatoavinareo ny didin''i Jehovah rehetra; ary tsy handeha araka ny fonareo ianareo, na araka ny masonareo, izay andehananareo hijangajangana,'
mg1865::mg_4::15::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hotsarovanareo sy hankatoavinareo ny didiko rehetra, ka dia ho masina ho an''Andriamanitrareo ianareo.'
mg1865::mg_4::15::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 15
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta mba ho Andriamanitrareo: Izaho no Jehovah Andriamanitrareo.'
mg1865::mg_4::16::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niodinan''i Kora sy ny namany, sy ny nanamarinan''i Jehovah ny fisoronan''i Arona'
  verse_text: 'Ary Kora, zanak''i Jizara, zanak''i Kehata, zanak''i Levy, ary Datana sy Abàrama, zanak''i Eliaba, sy Ona, zanak''i Peleta, izay samy taranak''i Robena, dia nandrendri-bahoaka,'
mg1865::mg_4::16::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nitsangana teo anatrehan''i Mosesy izy ireo sy ny Zanak''Isiraely dimam-polo amby roan-jato, izay samy lohan''ny fiangonana avokoa, dia olona voafidin''ny fiangonana sady nanan-daza;'
mg1865::mg_4::16::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa niangona hiodina amin''i Mosesy sy Arona ireo ka nanao taminy hoe: Aoka izay ianareo! fa masina avokoa ny fiangonana rehetra, sady Jehovah no eo aminy; koa nahoana no dia manandra-tena ho ambonin''ny fiangonan''i Jehovah ianareo?'
mg1865::mg_4::16::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandre izany Mosesy, dia niankohoka izy'
mg1865::mg_4::16::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny tamin''i Kora sy ny namany rehetra nanao hoe: Rahampitso dia hasehon''i Jehovah izay Azy sy izay masina ka hampanakekeny Azy; dia izay fidiny no hampanakekeny Azy.'
mg1865::mg_4::16::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ataovy, ry Kora sy ianareo namany rehetra: Makà fitondran''afo ho anareo rahampitso.'
mg1865::mg_4::16::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia asio afo eo anatiny ka asio ditin-kazo manitra eo aminy eo anatrehan''i Jehovah; ary ny lehilahy izay fidin''i Jehovah, dia izy no ho masina; fa aoka izay ianareo, ry taranak''i Levy!'
mg1865::mg_4::16::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy koa Mosesy tamin''i Kora: Henoy, ry taranak''i Levy:'
mg1865::mg_4::16::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ataonareo ho zavatra kely va ny nampisarahan''Andriamanitry ny Isiraely anaoreo tamin''ny fiangonan''ny Isiraely hitondrany anareo ho akaiky Azy, hanaovanareo ny fanompoam-pivavahana momba ny tabernakelin''i Jehovah sy hitoeranareo eo anatrehan''ny fiangonana hanompo azy?'
mg1865::mg_4::16::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia napanakekeny Azy ianao sy ny rahalahinao taranak''i Levy rehetra miaraka aminao, ary mitady ho mpisorona koa va ianareo?'
mg1865::mg_4::16::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ianao sy ny namanao rehetra dia tafangona hiodina amin''i Jehovah; fa Arona moa no inona, no imonomononanareo?'
mg1865::mg_4::16::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy naniraka nampaka an''i Datana sy Abàrama, zanak''i Eliaba; fa hoy izy roa lahy: Tsy hiakatra izahay.'
mg1865::mg_4::16::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa zavatra kely va ny nitondranao anay niakatra niala tany amin''izay tany tondra-dronono sy tantely hahafaty anay aty an''efitra, no dia manao anao ho lehibenay koa ianao?'
mg1865::mg_4::16::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ianao tsy nitondra anay ho any amin''izay tany tondra-dronono sy tantely tsinona, na nanome anay saha sy tanim-boaloboka ho fanananay; hopotsirinao va ny mason''ireto lehilahy ireto? Tsy hiakatra izahay.'
mg1865::mg_4::16::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra indrindra Mosesy ka nanao tamin''i Jehovah hoe: Aza mijery ny fanatiny akory Ianao; tsy naka na dia boriky iray akory aza taminy aho, ary tsy nanisy ratsy na dia tamin''ny anankiray aminy akory aza.'
mg1865::mg_4::16::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''i Kora: Aoka ianao sy ny namanao rehetra ho tonga eo anatrehan''i Jehovah rahampitso, dia ianao sy ireo ary Arona.'
mg1865::mg_4::16::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samia maka ny fitondran''afony avy ianareo rehetra, ka asio ditin-kazo manitra eo anatiny, ary samia mitondra ny fitondran''afony avy ianareo rehetra ho eo anatrehan''i Jehovah, dia fitondran''afo dimam-polo amby roan-jato; dia ianao sy Arona samy hitondra ny fitondran''afony avy.'
mg1865::mg_4::16::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy naka ny fitondran''afony avy izy rehetra ka nanisy afo teo anatiny, dia nanisy ditin-kazo manitra teo anatiny; ary nijanona teo anoloan''ny varavaran''ny trano-lay fihaonana izy mbamin''i Mosesy sy Arona.'
mg1865::mg_4::16::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kora nanangona ny namany rehetra ho eo anoloan''ny varavaran''ny trano-lay fihaonana hanohitra azy roa lahy; dia niseho tamin''ny fiangonana rehetra ny voninahitr''i Jehovah.'
mg1865::mg_4::16::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe:'
mg1865::mg_4::16::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihataha amin''ity fiangonana ity ianareo handringanako azy amin''ny indray mipi-maso monja.'
mg1865::mg_4::16::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka izy roa lahy ka nanao hoe: Andriamanitra o, Andriamanitry ny fanahin''ny nofo rehetra, olona iray no nanota, ka ho tezitra amin''ny fiangonana rehetra va Ianao?'
mg1865::mg_4::16::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::16::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny fiangonana, ka lazao hoe: Mihataha tsy hanodidina ny lain''i Kora sy Datana ary Abàrama.'
mg1865::mg_4::16::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Mosesy ka nankeo amin''i Datana sy Abàrama; ary nanaraka azy ny loholon''ny Isiraely.'
mg1865::mg_4::16::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''ny fiangonana izy ka nanao hoe: Mialà amin''ny lain''ireo olon-dratsy ireo, ka aza mikasika izay azy akory, fandrao haringana koa ianareo noho ny fahotany rehetra.'
mg1865::mg_4::16::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihataka ny olona mba tsy ho eo akaikin''ny lain''i Kora sy Datana ary Abàrama; ary Datana sy Abàrama nivoaka ka nijanona teo anoloan''ny varavaran''ny lainy mbamin''ny vadiny sy ny zananilahy ary ny zanany madinika.'
mg1865::mg_4::16::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy: Izao no hahafantaranareo fa Jehovah no naniraka ahy hanao ireny asa rehetra ireny, fa tsy avy tamin''ny saiko izany:'
mg1865::mg_4::16::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha maty toy ny fahafatin''ny olona rehetra ireo olona ireo, na valiana araka ny famaliana ny olona rehetra izy, dia tsy Jehovah no naniraka ahy.'
mg1865::mg_4::16::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hanao zavatra vaovao kosa Jehovah, ka hisokatra ny tany ary hitelina azy mbamin''izay azy rehetra, ka ho latsaka velona any amin''ny fiainan-tsy hita''izy, dia ho fantatrareo fa efa nandà an''i Jehovah ireo lehilahy ireo.'
mg1865::mg_4::16::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra voalazany izany teny rehetra izany, dia nivava ny tany izay teo ambaniny;'
mg1865::mg_4::16::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, nisokatra ny tany ka nitelina azy sy ny ankohonany mbamin''ny olona rehetra izay an''i Kora ary ny fananany rehetra.'
mg1865::mg_4::16::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia latsaka velona ho any amin''ny fiainan-tsy hita izy mbamin''izay azy rehetra; ary ny tany dia nikatona taminy, ka fongotra tsy ho amin''ny fiangonana intsony izy.'
mg1865::mg_4::16::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely rehetra izay nanodidina azy dia nandositra noho ny fidradradradrany; fa hoy izy: Andrao hitelina antsika koa ny tany.'
mg1865::mg_4::16::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 16
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy afo nivoaka avy tamin''i Jehovah ka nandevona ny lehilahy dimam-polo amby roan-jato izay nanatitra ditin-kazo manitra.'
mg1865::mg_4::17::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::17::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''i Eleazara, zanak''i Arona mpisorona, mba hotsimponiny eo anatin''ny may ny fitondran''afo, ary ny afo dia aelezo lavitra; fa masina ireny;'
mg1865::mg_4::17::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fitondran''afon''ireo mpanota nanimba tena ireo dia aoka hatao takelaka manify hapetaka amin''ny alitara; fa nateriny teo anatrehan''i Jehovah ireny ka masina; ary ho famantarana ho an''ny Zanak''Isiraely ireny.'
mg1865::mg_4::17::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Eleazara mpisorona ny fitondran''afo varahina, izay efa nanateran''ireo olona may ireo, ka nofisahiny ho takelaka hapetaka amin''ny alitara'
mg1865::mg_4::17::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho fahatsiarovana ho an''ny Zanak''Isiraely mba tsy hisy olon-kafa afa-tsy ny taranak''i Arona ihany no hahazo manakaiky handoro ditin-kazo manitra eo anatrehan''i Jehovah; fandrao ho tahaka an''i Kora sy ny namany izy, dia araka ny tenin''i Jehovah izay nampitondrainy an''i Mosesy.'
mg1865::mg_4::17::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia nimonomonona tamin''i Mosey sy Arona ny fiangonana, dia ny Zanak''Isiraely rehetra, ka nanao hoe: Ianareo efa nahafaty ny olon''i Jehovah.'
mg1865::mg_4::17::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niangona hanome tsiny an''i Mosesy sy Arona ny fiangonana, dia nijery ny trano-lay fihaonana izy, ka, indro, nanarona azy ny rahona, ary niseho ny voninahitr''i Jehovah.'
mg1865::mg_4::17::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona dia nankeo anoloan''ny trano-lay fihaonana.'
mg1865::mg_4::17::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::17::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà amin''io fiangonana io handringanako azy amin''ny indray mipi-maso monja. Dia niankohoka izy roa lahy.'
mg1865::mg_4::17::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mosesy tamin''i Arona: Alao ny fitondran''afo, ka asio afo avy eo ambonin''ny alitara izy, dia asio ditin-kazo manitra, ka ento faingana eo amin''ny fiangonana, ka manaova fanavotana ho azy; fa efa mivoaka avy tamin''i Jehovah ny fahatezerana, ary efa miantomboka ny areti-mandringana.'
mg1865::mg_4::17::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''i Arona izany, araka izay nandidian''i Mosesy, ka nihazakazaka ho eo afovoan''ny fiangonana izy; ary, indro, efa niantomboka teo amin''ny olona ny areti-mandringana; ary nandoro ny ditin-kazo manitra teo izy ka nanao fanavotana ho an''ny olona.'
mg1865::mg_4::17::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijanona teo anelanelan''ny maty sy ny velona izy, ka dia nitsahatra ny areti-mandringana.'
mg1865::mg_4::17::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay efa matin''ny areti-mandringana dia fiton-jato amby efatra arivo sy iray alina, afa-tsy izay efa maty noho ny amin''i Kora.'
mg1865::mg_4::17::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona niverina ho eo amin''i Mosesy teo anoloan''ny varavaran''ny trano-lay fihaonana; ary ny areti-mandringana dia nitsahatra.'
mg1865::mg_4::17::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::17::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely, ka analao tehina iray avy araka ny fianakaviany izy, ka ny lohan''ny fireneny rehetra araka ny fianakaviany avy no hanalana azy, dia tehina roa ambin''ny folo; ary samy soraty eo amin''ny tehiny avy ny anaran''izy rehetra.'
mg1865::mg_4::17::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny anaran''i Arona no hosoratanao amin''ny tehin''i Levy; fa tehina iray avy no ho an''ny lohan''ny fianakaviany.'
mg1865::mg_4::17::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hataonao ao amin''ny trano-lay fihaonana ireo, dia eo anoloan''ny Vavolombelona, izay ihaonako aminareo.'
mg1865::mg_4::17::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tehin''ny lehilahy izay hofidiko dia hitsimoka; ka dia hampanginiko ny fimonomononan''ny Zanak''Isiraely amiko, izay imonomononany aminareo.'
mg1865::mg_4::17::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia niteny tamin''ny Zanak''Isiraely, ka ny lohan''ny firenena dia samy nanatitra tehina iray avy teo aminy araka ny fianakaviany, dia tehina roa ambin''ny folo; ary ny tehin''i Arona dia teo afovoan''ireo tehiny ireo.'
mg1865::mg_4::17::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia napetrak''i Mosesy teo anatrehan''i Jehovah, dia tao amin''ny trano lain''ny Vavolombelona ireo tehina ireo.'
mg1865::mg_4::17::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia niditra tao amin''ny trano-lain''ny Vavolombelona Mosesy, ary indro fa nitsimoka ny tehin''i Arona, izay ho an''ny taranak''i Levy, dia nanaroka sy namony ka namoa amygdala.'
mg1865::mg_4::17::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentin''i Mosesy nivoaka hiala eo anatrehan''i Jehovah ny tehina rehetra, ho eo amin''ny Zanak''Isiraely rehetra; dia nijery izy, ka samy nandray ny tehiny avy.'
mg1865::mg_4::17::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Avereno ny tehin''i Arona ho eo anoloan''ny Vavolombelona, hotehirizina ho famantarana ho an''ny mpiodina, ka dia hatsahatrao hiala amiko ny fimonomononany, mba tsy ho faty izy.'
mg1865::mg_4::17::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''i Mosesy izany; araka izay efa nandidian''i Jehovah azy no nataony.'
mg1865::mg_4::17::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''i Mosesy ny Zanak''Isiraely ka nanao hoe: Indro, maty izahay, ringana izahay, eny, ringana avokoa izahay rehetra.'
mg1865::mg_4::17::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho faty izay rehetra manakaiky, dia izay manakaiky ny tabernakelin''i Jehovah; ho lany maty va izahay?'
mg1865::mg_4::18::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny raharahan''ny Levita sy ny mpisorona, ary ny zavatra izay natao anjarany'
  verse_text: 'Ary hoy Jehovah tamin''i Arona: Ianao sy ny zanakao ary ny tarana-drainao no hitondra ny heloky ny fitoerana masina; ary ianao sy ny zanakao koa no hitondra ny heloky ny fisoronanareo.'
mg1865::mg_4::18::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahinao avy amin''ny firenen''i Levy izay firenen''ny razanao koa dia ento miaraka aminao, mba hikambana aminao izy ka hanompo anao; fa ianao sy ny zanakao ho eo anoloan''ny trano-lain''ny Vavolombelona.'
mg1865::mg_4::18::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitandrina ny anjara-raharahanao sy ny anjara-raharaha rehetra momba ny trano-lay izy; kanefa ny fanaky ny fitoerana masina sy ny alitara dia tsy mba hakekeny, fandrao maty ireo sy ny tenanareo koa.'
mg1865::mg_4::18::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hikambana aminao izy ka hitandrina ny anjara-raharaha momba ny trano-lay fihaonana, dia ny fanompoana rehetra momba ny trano-lay; ary tsy hisy olon-kafa hanakaiky anareo.'
mg1865::mg_4::18::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotandremanareo ny anjara-raharaha momba ny fitoerana masina sy ny anjara-raharaha momba ny alitara, mba tsy hisy fahatezerana hahazo ny Zanak''Isiraely intsony.'
mg1865::mg_4::18::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Izaho efa naka ny Levita rahalahinareo avy tamin''ny Zanak''Isiraely; omena anareo izy ho fanomezana ho an''i Jehovah mba hanao ny fanompoana momba ny trano-lay fihaonana.'
mg1865::mg_4::18::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao sy ny zanakao kosa no hitandrina ny fisoronanareo ka hanompo ny amin''ny zavatra rehetra momba ny alitara sy ny ao anatin''ny efitra lamba, dia fanompoana omeko anareo ny fisoronana; ary ny olon-kafa izay manakaiky dia hatao maty.'
mg1865::mg_4::18::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Arona hoe: Indro, Izaho efa nampitandrina anao ny fanatitra ho Ahy, dia ny zava-masina rehetra aterin''ny Zanak''Isiraely; efa nomeko ho anjaranao sy ny taranakao izany, ho anjara mandrakizay.'
mg1865::mg_4::18::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ho anao amin''ny zavatra masina indrindra, avy amin''ny fanatitra atao amin''ny afo; ny fanatiny rehetra sy ny fanatiny noho ny ota rehetra ary ny fanati-panonerany rehetra, izay hanonerany ho Ahy; ho masina indrindra ho anao sy ny taranakao izany.'
mg1865::mg_4::18::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny fihinananao ny zavatra masina indrindra no hihinananao azy; ny lehilahy rehetra no mahazo mihinana azy: masina ho anao izany.'
mg1865::mg_4::18::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao koa no ho anao: ny zavatra omeny ho fanatitra, dia ny fanatitra ahevaheva rehetra aterin''ny Zanak''Isiraely; efa nomeko ho anao sy ny zanakao-lahy ary ny zanakao-vavy koa izany ho anjara mandrakizay; izay rehetra madio amin''ny ankohonanao no mahazo mihinana izany.'
mg1865::mg_4::18::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra tsara indrindra amin''ny diloilo sy ny ranom-boaloboka ary ny vary, dia ny voaloham-bokatra aminy, izay ateriny ho an''i Jehovah, dia efa nomeko anao.'
mg1865::mg_4::18::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voaloham-bokatra rehetra eo amin''ny taniny, izay hateriny ho an''i Jehovah, dia ho anao; izay rehetra madio amin''ny ankohonanao no mahazo mihinana azy.'
mg1865::mg_4::18::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra rehetra voatokana amin''ny Isiraely dia ho anao.'
mg1865::mg_4::18::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voalohan-teraka rehetra, izay ateriny ho an''i Jehovah, na olona, na biby, dia ho anao avokoa; kanefa tsy maintsy havotanao ny voalohan-teraky ny biby maloto dia havotanao koa.'
mg1865::mg_4::18::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny fanavotana azy, dia izay efa iray volana no havotanao, araka izay ataonao tombany, dia sekely dimy, araka ny sekely masina (gera roa-polo izany).'
mg1865::mg_4::18::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny voalohan-teraky ny omby, na ny voalohan-teraky ny ondry, na ny voalohan-teraky ny osy kosa tsy mba havotanao, fa masina ireny; ny ràny dia hatopinao amin''ny alitara, ary ny saborany hodoranao ho fofona, ho fanatitra atao amin''ny afo, ho hanitra ankasitrahana ho an''i Jehovah.'
mg1865::mg_4::18::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho anao ny henany, ho anao tahaka ny tratra ahevaheva sy tahaka ny soroka ankavanana.'
mg1865::mg_4::18::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitra rehetra izay alaina avy amin''ny zava-masina aterin''ny Zanak''Isiraely ho an''i Jehovah dia efa nomeko anao sy ny zanakao-lahy ary ny zanakao-vavy ho anjara mandrakizay; dia fanekena mandrakizay asian-tsira eo anatrehan''i Jehovah izany ho aminao sy ny taranakao koa.'
mg1865::mg_4::18::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Arona: Tsy mba hanana lova eo amin''ny tany ianao sady tsy mba hanana anjara eo aminy; Izaho no anjaranao sy lovanao eo amin''ny Zanak''Isiraely.'
mg1865::mg_4::18::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ny taranak''i Levy efa nomeko ny fahafolon-karena rehetra amin''ny Isiraely ho fananany noho ny fanompoana izay ataony, dia ny fanompoana ny amin''ny trano-lay fihaonana.'
mg1865::mg_4::18::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mahazo manakaiky ny trano-lay fihaonana intsony ny Zanak''Isiraely, fandrao meloka izy ka maty.'
mg1865::mg_4::18::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Levita ihany no hanao ny fanompoana momba ny trano-lay fihaonana, ary izy no hitondra ny helony; ho lalàna mandrakizay amin''ny taranakareo hatramin''ny taranaka fara mandimby izany, fa tsy hanan-tany ho lovany eo amin''ny Zanak''Isiraely izy.'
mg1865::mg_4::18::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahafolon-karen''ny Zanak''Isiraely, izay ateriny ho fanatitra ho an''i Jehovah, dia efa nomeko ho an''ny taranak''i Levy ho fananany; izany no nilazako taminy hoe: Tsy hanana lova eo amin''ny Zanak''Isiraely izy.'
mg1865::mg_4::18::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::18::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena indray amin''ny Levita hoe: Rehefa raisinareo amin''ny zanak''Isiraely ny fahafolon-karena, izay efa nomeko ho fanananareo avy aminy, dia hanalanareo ampahafolony kosa ho an''i Jehovah izany.'
mg1865::mg_4::18::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatitra alainareo dia hisaina ho anareo toy ny vary avy eo am-pamoloana sy ny divay avy eo amin''ny famiazana.'
mg1865::mg_4::18::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany koa no hanateranareo fanatitra ho an''i Jehovah avy amin''ny fahafolon-karenareo rehetra, izay horaisinareo amin''ny Zanak''Isiraely; ary avy amin''izany no hanateranareo ho an''i Jehovah, dia ho an''i Arona mpisorona.'
mg1865::mg_4::18::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zavatra rehetra omena anareo no hanateranareo ny fanatitra rehetra izay alaina ho an''i Jehovah, dia amin''izay rehetra tsara indrindra avy aminy, dia izay zavatra masina avy aminy.'
mg1865::mg_4::18::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lazao aminy hoe: Raha maka ny tsara indrindra avy aminy ianareo, dia hisaina ho an''ny Levita toy ny vokatra avy eo am-pamoloana sy ny divay avy eo amin''ny famiazana izany.'
mg1865::mg_4::18::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mahazo mihinana izany eo amin''ny fitoerana rehetra ianareo sy ny ankohonanareo; fa karamanareo izany noho ny fanompoanareo ao amin''ny trano-lay fihaonana.'
mg1865::mg_4::18::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hahazoanareo heloka ireny, raha maka ny tsara indrindra avy aminy ianareo; ary tsy holotoinareo ny zava-masina aterin''ny Zanak''Isiraely, dia tsy ho faty ianareo.'
mg1865::mg_4::19::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny lalàna ny amin''ny vantotr''ombivavy mena'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe:'
mg1865::mg_4::19::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lalàna hotandremana, izay efa nandidian''i Jehovah: Lazao amin''ny Zanak''Isiraely mba hitondrany vantotr''ombivavy mena, izay tsy misy kilema na tsiny sady tsy mbola nasiana zioga.'
mg1865::mg_4::19::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary omeo ho an''i Eleazara mpisorona iny, dia hasaina ho entina eny ivelan''ny toby ka hovonoina eo anatrehany.'
mg1865::mg_4::19::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanalan''i Eleazara mpisorona amin''ny fanondrony ny ràny ka hafafiny impito manandrify ny trano-lay fihaonana.'
mg1865::mg_4::19::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hodorana eo imasony ilay vantotr''ombivavy: ny hodiny sy ny henany ary ny ràny mbamin''ny tain-drorohany dia hodorana avokoa.'
mg1865::mg_4::19::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona dia haka hazo sedera sy hysopa ary jaky ka hanipy azy eo afovoan''ny afo andoroana ny vantotr''ombivavy.'
mg1865::mg_4::19::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hosasan''ny mpisorona ny fitafiany, ary handro amin''ny rano izy, ary rehefa afaka izany, dia hankeo amin''ny toby izy; ary haloto mandra-paharivan''ny andro ny mpisorona.'
mg1865::mg_4::19::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mandoro ilay ombivavy dia hanasa ny fitafiany sady handro amin''ny rano, ary haloto mandra-paharivan''ny andro.'
mg1865::mg_4::19::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hangonin''izay lehilahy madio anankiray ny lavenon''ilay vantotr''ombivavy ka hapetrany eo ivelan''ny toby eo amin''izay fitoerana madio anankiray, dia hotehirizina ho an''ny fiangonan''ny Zanak''Isiraely izany ho rano fanadiovana: fanatitra noho ny ota izany.'
mg1865::mg_4::19::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay nanangona ny lavenon''ny vantotr''ombivavy dia hanasa ny fitafiany, ary haloto mandra-paharivan''ny andro; ary ho lalàna mandrakizay ho an''ny Zanak''Isiraely sy ny vahiny eo aminy izany.'
mg1865::mg_4::19::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mikasika fatin''olona dia haloto hafitoana.'
mg1865::mg_4::19::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanadio ny tenany amin''izany rano izany izy amin''ny andro fahatelo, ary amin''ny andro fahafito dia hadio izy; fa raha tsy manadio ny tenany amin''ny andro fahatelo kosa izy, dia tsy hadio amin''ny andro fahafito.'
mg1865::mg_4::19::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mikasika fatin''olona ka tsy manadio ny tenany dia mandoto ny tabernakelin''i Jehovah ka hofongorana tsy ho amin''ny Isiraely; satria tsy nofafazana ny rano fanadiovana izy, dia haloto: ny fahalotoany mbola eo aminy ihany.'
mg1865::mg_4::19::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lalàna, raha misy olona maty ao an-day: Izay rehetra miditra ao an-day sy izay rehetra ao anatin''ny lay dia haloto hafitoana.'
mg1865::mg_4::19::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanaka rehetra misokatra izay tsy misy rakotra voafehy aminy, dia haloto.'
mg1865::mg_4::19::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra mikasika izay matin-tsabatra any an-tsaha, na fatin''olona, na taolan''olona, na fasana, dia haloto hafitoana.'
mg1865::mg_4::19::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hangalana ho an''ny maloto ny lavenon''ilay nodorana teo ho fanatitra noho ny ota, ary hasiany rano nalaina tamin''ny rano mandeha izany eo am-bilia.'
mg1865::mg_4::19::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haka hysopa ny lehilahy madio anankiray ka hanoboka azy eo amin''ny rano, dia hafafiny amin''ny lay mbamin''ny fanaka rehetra sy ny olona izay eo ary ilay nikasika ny taolana, na ny novonoina, na ny matin''aretina, na ny fasana.'
mg1865::mg_4::19::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny maloto dia hofafazan''ilay olona madio amin''ny andro fahatelo sy ny fahafito; dia hanadio ny tenany amin''ny andro fahafito izy ka hanasa ny fitafiany sy handro amin''ny rano, dia hadio rehefa hariva.'
mg1865::mg_4::19::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay naloto ka tsy nanadio ny tenany dia hofongorana tsy ho amin''ny fiangonana, satria nandoto ny fitoera-masin''i Jehovah izy; ny rano fanadiovana tsy nafafy taminy: maloto izy.'
mg1865::mg_4::19::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho lalàna mandrakizay aminy izany, fa izay mamafy ny rano fanadiovana dia hanasa ny fitafiany; ary izay mikasika ny rano fanadiovana dia haloto mandra-paharivan''ny andro.'
mg1865::mg_4::19::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zavatra rehetra izay voakasiky ny maloto dia haloto; ary ny olona izay mikasika azy dia haloto mandra-paharivan''ny andro.'
mg1865::mg_4::20::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitobian''ny Zanak''Isiraely tao Kadesy, sy ny nahadiso an''i Mosesy sy Arona tamin''izy nampivoaka rano avy tamin''ny vatolampy'
  verse_text: 'Ary tamin''ny volana voalohany tonga tao an''efitra Zina ny Zanak''Isiraely, dia ny fiangonana rehetra; ary nitoetra tao Kadesy ny olona. Ary maty tao Miriama ka nalevina tao.'
mg1865::mg_4::20::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy rano ho an''ny fiangonana, ka dia niangona izy hiodina amin''i Mosesy sy Arona.'
mg1865::mg_4::20::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nila ady tamin''i Mosesy ny olona ka niteny hoe: Inay anie izahay mba maty tamin''ny nahafatesan''ny rahalahinay teo anatrehan''i Jehovah!'
mg1865::mg_4::20::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nahoana no nitondra ny fiangonan''i Jehovah ho amin''ity efitra ity ianareo, mba hahafaty anay sy ny ombinay eto?'
mg1865::mg_4::20::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana no nitondra anay niakatra avy tany Egypta ianareo, hampiditra anay ho amin''ity tany ratsy ity, izay tsy misy voan-javatra, na aviavy, na voaloboka, na ampongaben-danitra akory, sady tsy misy rano hosotroina?'
mg1865::mg_4::20::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala teo anatrehan''ny fiangonana Mosesy sy Arona ho eo anoloan''ny varavaran''ny trano-lay fihaonana ka niankohoka; dia niseho taminy ny voninahitr''i Jehovah.'
mg1865::mg_4::20::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::20::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny tehina, ka vorionao sy Arona rahalahinao ny fiangonana, ary mitenena amin''ny vatolampy eo imasony, dia hampiboiboika ny ranony izy; ary hampivoaka rano ho an''ny olona avy amin''ny vatolampy ianao, ka dia hampisotroinao ny fiangonana sy ny biby fiompiny.'
mg1865::mg_4::20::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''i Mosesy ny tehina avy teo anatrehan''i Jehovah, araka izay nandidiany azy.'
mg1865::mg_4::20::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novorin''i Mosesy sy Arona teo anoloan''ny vatolampy ny fiangonana; ka dia hoy izy: Mihainoa, ry mpiodina: Moa amin''ity vatolampy ity va no hampivoahanay rano ho anareo?'
mg1865::mg_4::20::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy dia nanainga ny tanany ka nikapoka ny vatolampy indroa tamin''ny tehiny; dia niboiboika be dia be ny rano, ka nisotro avokoa ny fiangonana sy ny biby fiompiny.'
mg1865::mg_4::20::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona hoe: Satria tsy nino Ahy ianareo hanamasina Ahy eo imason''ny Zanak''Isiraely, dia tsy hitondra izao fiangonana izao ho any amin''ny tany izay nomeko azy ianareo.'
mg1865::mg_4::20::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no ranon''i Meriba, izay nilan''ny Zanak''Isiraely ady tamin''i Jehovah, ka nisehoan''i Jehovah ho masina tamin''ny nataony taminy.'
mg1865::mg_4::20::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny teny nampitondrain''ny Isiraely tamin''ny mpanjakan''i Edoma'
  verse_text: 'Ary Mosesy dia naniraka olona avy tao Kadesy hankany amin''ny mpanjakan''i Edoma hanao hoe: Izao no lazain''i Isiraely rahalahinao: Ianao mahalala ny fahoriana rehetra izay nanjo anay:'
mg1865::mg_4::20::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny nidinan''ny razanay tany Egypta, sy ny nitoeranay ela tany; ary nampahory anay sy ny razanay ny Egyptiana;'
mg1865::mg_4::20::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nitaraina tamin''i Jehovah izahay, dia nihaino ny feonay Izy ka naniraka Anjely sy nitondra anay nivoaka avy tany Egypta; ary, indreto, tonga eto Kadesy, tanàna eto amin''ny faritry ny taninao, izahay;'
mg1865::mg_4::20::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa aoka mba handeha hamaky ny taninao izahay; fa tsy handeha hamaky ny saha sy ny tanim-boaloboka, na hisotro ny rano amin''ny lavaka fantsakana akory: ny lalan''andriana ihany no halehanay, fa tsy hania izahay na ho amin''ny ankavanana na ho amin''ny ankavia mandra-pahafakay ny faritry ny taninao.'
mg1865::mg_4::20::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Edomita taminy: Tsy mahazo mandeha mamaky ny taniko ianao, fandrao hivoaka hamely anao amin''ny sabatra aho.'
mg1865::mg_4::20::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Zanak''Isiraely taminy: Ny lalam-be ihany no halehanay, fa raha hisotro ny ranonao izaho sy ny omby aman''ondriko, dia hefaiko vola izany; fa tsy hanao na inona na inona aho, fa handalo fotsiny ihany.'
mg1865::mg_4::20::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Tsy mahazo mandalo aty ianao. Ary nivoaka hisakana azy ny Edomita nitondra vahoaka betsaka sady nanao tàna-mahery.'
mg1865::mg_4::20::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nandavan''ny Edomita ka tsy namela ny Isiraely hamaky ny taniny, ka dia nivily niala taminy ny Zanak''Isiraely.'
mg1865::mg_4::20::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifindra ny Zanak''Isiraely, dia ny fiangonana rehetra, ka niala tany Kadesy ary tonga tao an-tendrombohitra Hora.'
mg1865::mg_4::20::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona tao an-tendrombohitra Hora, tao amin''ny faritanin''i Edoma, ka nanao hoe:'
mg1865::mg_4::20::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arona hangonina any amin''ny razany; fa tsy hiditra any amin''ny tany izay nomeko ny Zanak''Isiraely izy, satria nandà ny teniko teo amin''ny ranon''i Meriba ianareo.'
mg1865::mg_4::20::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao Arona sy Eleazara zanany, ka ento miakatra ao an-tendrombohitra Hora izy mianaka;'
mg1865::mg_4::20::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia esory ny fitafian''i Arona, ka atafio an''i Eleazara zanany; ary Arona hangonina any amin''ny razany ka ho faty ao.'
mg1865::mg_4::20::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nanao araka izay nandidian''i Jehovah; dia niakatra tao an-tendrombohitra Hora teo imason''ny fiangonana rehetra izy telo mianaka.'
mg1865::mg_4::20::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesorin''i Mosesy ny fitafian''i Arona ka natafiny an''i Eleazara zanany; ary maty tao an-tampon''ny tendrombohitra Arona; dia nidina avy tao an-tendrombohitra Mosesy sy Eleazara.'
mg1865::mg_4::20::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony hitan''ny fiangonana rehetra fa maty Arona, dia nisaona azy telo-polo andro izy, dia ny taranak''Isiraely rehetra.'
mg1865::mg_4::21::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandresen''ny Isiraely ny mpanjakan''i Arada'
  verse_text: 'Ary raha ren''ilay Kananita, mpanjakan''i Arada, izay nonina teo amin''ny tany atsimo, fa efa mandeha amin''ny lalana mankany Atarima ny Isiraely, dia niady taminy izy, ka nentiny ho babo ny sasany tamin''ny Isiraely.'
mg1865::mg_4::21::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoady tamin''i Jehovah ny Isiraely ka nanao hoe: Raha hatolotrao eo an-tananay tokoa ity firenena ity, dia hataonay levona avokoa ny tanànany.'
mg1865::mg_4::21::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nihaino ny feon''ny Isiraely ka dia natolony azy ny Kananita: ary dia nataon''ny Isiraely levona izy sy ny tanànany; koa ny anaran''izany tany izany dia natao hoe Horma.'
mg1865::mg_4::21::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny Menarana Varahina'
  verse_text: 'Ary niala tany an-tendrombohitra Hora izy ka nahazo ny lalana mankany amin''ny Ranomasina Mena hanodidina ny tany Edoma; dia kivy ny fanahin''ny olona noho ny lalana.'
mg1865::mg_4::21::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny nanome tsiny an''Andriamanitra sy Mosesy ny olona ka nanao hoe: Nahoana no nentinao niakatra avy tany Egypta amin''ny lalan''ny mpisafo-tany izahay ho faty aty an''efitra? fa tsy misy mofo na rano aty ary mahamonamonaina ny fanahinay itony mofomofo foana itony.'
mg1865::mg_4::21::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia nampandeha ny menaran''afo teny amin''ny olona, ka nanaikitra ny olona ireny; dia nahafatesana be ny olona Isiraely.'
mg1865::mg_4::21::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo amin''i Mosesy ny olona ka nanao hoe: Efa nanota izahay, fa efa niteny nanome tsiny an''i Jehovah sy ianao. Ifony amin''i Jehovah izahay mba hanesorany ny menarana aminay. Dia nifona ho an''ny olona Mosesy.'
mg1865::mg_4::21::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Manaova menaran''afo, ka ahantòny amin''ny hazo lava, ary izay rehetra voakaikitra dia ho velona, raha mijery izany.'
mg1865::mg_4::21::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao menarana varahina Mosesy ka nanantona azy tamin''ny hazo lava; ary izay olona voakaikitry ny menarana ka nijery ilay menarana varahina dia velona.'
mg1865::mg_4::21::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny nandehanan''ny Isiraely nanodidina ny tany Edoma sy Moaba, ary ny nandreseny an''i Sihona sy Oga'
  verse_text: 'Ary ny Zanak''Isiraely nifindra ka nitoby tao Obota.'
mg1865::mg_4::21::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Obota, izy, dia nitoby tao Ie-abarima, tany amin''ny efitra izay mifanolotra amin''i Moaba, tandrifin''ny fiposahan''ny masoandro.'
mg1865::mg_4::21::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao izy, dia nitoby tao amin''ny lohasahan-driaka Zareda.'
mg1865::mg_4::21::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao izy, dia nitoby tao an-dafin''i Arnona, izay any an''efitra sady avy amin''ny faritanin''ny Amorita; fa Arnona no faritanin''ny Moabita, eo anelanelan''ny Moabita sy ny Amorita.'
mg1865::mg_4::21::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no ilazana eo amin''ny Bokin''ny Adin''i Jehovah hoe: Vaheba any Sofa sy ny lohasahan-driaka Arnona,'
mg1865::mg_4::21::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany kisolosolo amin''ny lohasahan-driaka, izay mandroso mankeo amin''ny tanin''i Ara ka mipaka amin''ny faritanin''i Moaba.'
mg1865::mg_4::21::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niala tao izy hankany Bera, dia ilay lavaka fantsakana nilazan''i Jehovah tamin''i Mosesy hoe: Angony ny olona, fa homeko rano izy.'
mg1865::mg_4::21::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihira izao fihirana izao ny Isiraely: Miboiboiha, ry lavaka fantsakana! Ataovinareo an-kira izy;'
mg1865::mg_4::21::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lavaka fantsakana izay nohadin''ireo mpanao lalàna, ary nolavahan''ireo manan-kaja amin''ny firenena. Tamin''ny tehiny, dia ny tehina fanapahana. Ary nony niala tany an''efitra izy, dia nankao Matana.'
mg1865::mg_4::21::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao Matana izy, dia nankao Nahaliela; ary nony niala tao Nahaliela izy, dia nankao Bamota;'
mg1865::mg_4::21::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony niala tao Bamota izy, dia nankany an-dohasaha izay ao amin''ny tany Moaba, ao an-tampon''i Pisga, izay manatrika ny efitra.'
mg1865::mg_4::21::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely naniraka olona ho any amin''i Sihona, mpanjakan''ny Amorita, hanao hoe:'
mg1865::mg_4::21::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka mba handeha hamaky ny taninao izahay, fa tsy hania ho amin''ny saha na ho amin''ny tanim-boaloboka izahay, ary tsy hisotro ny rano amin''ny lavaka fantsakana; ny lalan''andriana ihany no halehanay mandra-pahafakay ny faritaninao.'
mg1865::mg_4::21::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Sihona tsy namela ny Isiraely handeha hamaky ny taniny, fa nanangona ny vahoakany rehetra izy ka nivoaka avy tany an''efitra hihaona amin''ny Isiraely, dia nankany Jahaza; ary niady tamin''ny Isiraely teo izy.'
mg1865::mg_4::21::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely namely azy tamin''ny lelan-tsabatra ka nahazo ny taniny hatrany Amona ka hatrany Jaboka, dia hatramin''ny taranak''i Amona; fa mafy ny faritanin''ny taranak''i Amona.'
mg1865::mg_4::21::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''ny Isiraely izany tanàna rehetra izany; ary nonenany ny tanànan''ny Amorita rehetra, dia Hesbona sy ny zana-bohiny rehetra.'
mg1865::mg_4::21::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hesbona no tanànan''i Sihona, mpanjakan''ny Amorita, izay efa nanafika ny mpanjakan''i Moaba taloha, ka efa nalainy taminy avokoa ny taniny rehetra hatrany Arnona.'
mg1865::mg_4::21::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nanaovan''ny mpanao oha-teny hoe: Midira ao Hesbona ianareo; aoka hamboarina sy hatao mafy ny tanànan''i Sihona;'
mg1865::mg_4::21::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy afo nivoaka avy tao Hesbona, sy lelafo avy tao an-tanànan''i Sihona, Ka nandevona an''i Aran''i Moaba sy ny tompon''ny havoan''i Arnona.'
mg1865::mg_4::21::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanao, ry Moaba! Ringana ianao, ry olon''i Kemosy! Foiny handositra ny zananilahy, ary navelany ho babo ny zananivavy, ho an''i Sihona, mpanjakan''ny Amorita.'
mg1865::mg_4::21::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Notifirintsika izy; ringana Hesbona hatrany Dibona; nofoanantsika izy hatrany Nofa, izay mipaka an''i Medeba.'
mg1865::mg_4::21::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitoetra tao amin''ny tanin''ny Amorita ny Isiraely.'
mg1865::mg_4::21::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy naniraka olona hisafo an''i Jazera; ary ny Isiraely dia nahafaka ny zana-bohiny ka nandroaka ny Amorita izay tany.'
mg1865::mg_4::21::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niverina ny olona ka niakatra tamin''ny lalana mankany Basana; dia nivoaka Oga, mpanjakan''i Basana, hihaona aminy, dia izy sy ny vahoakany rehetra, hiady tao Edrehy.'
mg1865::mg_4::21::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Aza matahotra azy ianao, fa efa natolotro eo an-tananao izy sy ny vahoakany rehetra ary ny taniny; ary ianao hanao aminy araka izay nataonao tamin''i Sihona, mpanjakan''ny Amorita, izay nitoetra tao Hesbona.'
mg1865::mg_4::21::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 21
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namely azy sy ny zananilahy ary ny vahoakany rehetra izy, ka tsy nasiany niangana na dia iray akory aza; dia nahazo ny taniny izy.'
mg1865::mg_4::22::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nifindra nitoby tao Arbota-moaba, tany an-dafin''i Jordana tandrifin''i Jeriko.'
mg1865::mg_4::22::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny nampanalan''i Balaka an''i Balama'
  verse_text: 'Ary Balaka, zanak''i Zipora, nahita izay rehetra efa nataon''ny Isiraely tamin''ny Amorita.'
mg1865::mg_4::22::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra indrindra ny Moabita noho ny hamaroan''ny olona; ary nangorohoro ny Moabita noho ny Zanak''Isiraely.'
mg1865::mg_4::22::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny loholon''ny Midianita: Ankehitriny dia hiraoka izay rehetra manodidina antsika ireto vahoaka be ireto tahaka ny firaokan''ny omby ny zava-maitso any an-tsaha. Ary Balaka, zanak''i Zipora, no mpanjakan''i Moaba tamin''izany andro izany.'
mg1865::mg_4::22::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka olona izy ho any amin''i Balama, zanak''i Beora, any Petora, izay eo amoron''ny Ony, dia eo amin''ny tanin''ny fireneny, mba hampaka azy, ka nanao hoe: Indro, misy firenena nivoaka avy tany Egypta; ary indro, mandrakotra ny tany rehetra izy ka mitoby tandrifiko;'
mg1865::mg_4::22::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa ankehitriny mba mankanesa aty, ka ozony ho ahy ity firenena ity, fa mahery noho izaho izy; angamba hahazo mamely azy isika, ka handroaka azy hiala amin''ny tany aho; satria fantatro fa izay tsofinao rano dia voatahy, ary izay ozoninao dia voaozona.'
mg1865::mg_4::22::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha ny loholon''ny Moabita sy ny loholon''ny Midianita nitondra ny saran''ny fankatovana teny an-tanany; dia nankany amin''i Balama izy ka nilaza taminy izay tenin''i Balaka.'
mg1865::mg_4::22::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Balama taminy: Mandria aty anio alina, dia hamaly ny teninareo aho, araka izay holazain''i Jehovah amiko. Dia nitoetra tao amin''i Balama ireo andrian-dahin''i Moaba.'
mg1865::mg_4::22::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra nankao amin''i Balama ka nanao hoe: Iza moa ireo lehilahy ato aminao ireo?'
mg1865::mg_4::22::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''Andriamanitra: Balaka, zanak''i Zipora, mpanjakan''i Moaba, no efa naniraka tamiko hoe:'
mg1865::mg_4::22::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny firenena izay nivoaka avy tany Egypta mandrakotra ny tany rehetra; koa mankanesa aty ankehitriny, ka ozony ho ahy izy; angamba haharesy azy aho ka haharoaka azy.'
mg1865::mg_4::22::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Andriamanitra tamin''i Balama: Aza mandeha miaraka aminy, na manozona izany firenena izany, fa voatahy izy.'
mg1865::mg_4::22::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa Balama, ka nanao tamin''ireo andriandahin''i Balaka hoe: Andeha mody any amin''ny taninareo; fa tsy avelan''i Jehovah handeha hiaraka aminareo aho.'
mg1865::mg_4::22::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niainga ireo andriandahin''i Moaba, dia tonga tany amin''i Balaka ka nanao hoe: Tsy nety nandeha niaraka taminay Balama.'
mg1865::mg_4::22::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Balaka naniraka andriandahy maro sady malaza noho ny teo indray.'
mg1865::mg_4::22::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tao amin''i Balama ireny ka nanao taminy hoe: Izao no lazain''i Balaka, zanak''i Zipora: Aoka mba tsy ho azon-tsampona ny hankanesanao aty amiko;'
mg1865::mg_4::22::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hanome anao voninahitra lehibe indrindra aho, ary izay rehetra holazainao amiko dia hataoko avokoa; koa masïna ianao, mankanesa aty, ozony ho ahy ity firenena ity.'
mg1865::mg_4::22::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly Balama ka nanao tamin''ny mpanompon''i Balaka hoe: Na dia homen''i Balaka volafotsy sy volemana eran''ny tranony aza aho, dia tsy mahazo manoatra ny tenin''i Jehovah Andriamanitro aho, na handatsaka, na hampihoatra.'
mg1865::mg_4::22::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa, na dia izany aza, mitoera aty ihany koa ianareo anio alina, mba ho fantatro izay mbola holazain''i Jehovah amiko koa.'
mg1865::mg_4::22::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony alina dia nankao amin''i Balama Andriamanitra ka nanao taminy hoe: Raha haka anao no nahatongavan''ireo olona ireo, dia miaingà ka mandehana ihany miaraka aminy; kanefa ny teny izay holazaiko aminao ihany no hataonao.'
mg1865::mg_4::22::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa Balama ka nanisy lasely ny borikiny, dia nandeha niaraka tamin''ireo andriandahin''i Moaba.'
mg1865::mg_4::22::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nirehitra taminy ny fahatezeran''Andriamanitra, satria nandeha izy; ka dia nijanona teo an-dàlana Ilay Anjelin''i Jehovah ho mpisakana azy. Ary Balama nitaingina ny borikiny, ary ny zatovony roa lahy nanaraka azy.'
mg1865::mg_4::22::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitan''ny boriky nijanona teo an-dàlana Ilay Anjelin''i Jehovah sady nitana ny sabany voatsoaka teny an-tanany; dia nivily lalana ny boriky ka nankany amin''ny saha; dia nikapoka ny boriky Balama mba hampiverina azy ho amin''ny lalana.'
mg1865::mg_4::22::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ilay Anjelin''i Jehovah nijanona teo an-kandemponana tanelanelan''ny tanim-boaloboka, izay nisy fefy teo an-daniny roa.'
mg1865::mg_4::22::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny boriky nahita Ilay Anjelin''i Jehovah, dia niampify teo amin''ny fefy ka nanery ny tongotr''i Balama tamin''ny fefy; dia nikapoka azy indray izy.'
mg1865::mg_4::22::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola nandroso Ilay Anjelin''i Jehovah ka nijanona teo amin''ny fitoerana oty, izay tsy nisy lalana hiviliana, na ho amin''ny ankavanana, na ho amin''ny ankavia.'
mg1865::mg_4::22::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny boriky nahita ilay Anjelin''i Jehovah, dia nandry teo ambanin''i Balama; ary nirehitra ny fahatezeran''i Balama ka nikapoka ny boriky tamin''ny tehina izy.'
mg1865::mg_4::22::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosokafan''i Jehovah ny vavan''ny boriky, ka hoy ny boriky tamin''i Balama: Inona no nataoko taminao no dia nokapohinao intelo aho izao?'
mg1865::mg_4::22::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''ny boriky: Satria namazivazy ahy ianao; enga anie ka misy sabatra ety an-tanako, dia matiko mihitsy ianao ankehitriny.'
mg1865::mg_4::22::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny boriky tamin''i Balama: Tsy borikinao va aho, izay nitaingenanao hatrizay nanananao ahy ka mandraka androany? Moa efa fanaoko va ny manao toy izao aminao? Dia hoy izy: Tsia.'
mg1865::mg_4::22::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampahiratin''i Jehovah ny mason''i Balama hahita Ilay Anjelin''i Jehovah mijanona eo an-dàlana sady mitana ny sabany voatsoaka eny an-tanany; dia niondrika izy ka niankohoka.'
mg1865::mg_4::22::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ilay Anjelin''i Jehovah taminy: Nahoana no nikapoka ny borikinao intelo ianao izao? indro, Izaho no nivoaka ho mpisakana anao, satria mivarina amin-doza eto anatrehako ny lalanao.'
mg1865::mg_4::22::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahita Ahy ny boriky ka nivily Ahy intelo izao; raha tsy nivily Ahy izy, dia ianao no nataoko maty mihitsy toy izay, fa izy kosa no novelomiko.'
mg1865::mg_4::22::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''Ilay Anjelin''i Jehovah: Efa nanota aho; fa tsy fantatro fa Ianao no nijanona nisakana ahy teo an-dàlana; koa ankehitriny, raha tsy sitrakao izany, dia hiverina aho.'
mg1865::mg_4::22::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Ilay Anjelin''i Jehovah tamin''i Balama: Mandehana ihany miaraka amin''ireo lehilahy ireo, kanefa ny teny izay holazaiko aminao ihany no holazainao. Dia nandeha Balama niaraka tamin''ireo andriandahin''i Balaka.'
mg1865::mg_4::22::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Balaka fa tonga Balama, dia nivoaka izy mba hitsena azy teo amin''ny Tanànan''i Moaba, teo amin''ny faritanin''i Arnona, izay eo amin''ny sisin''ny faritany.'
mg1865::mg_4::22::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Balaka tamin''i Balama: Tsy naniraka dia naniraka tany aminao va aho nampaka anao;? Ka nahoana no tsy nankaty amiko ianao? tsy haiko tokoa va ny hanome voninahitra anao?'
mg1865::mg_4::22::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''i Balaka: Inty aho tonga eto aminao ankehitriny; kanefa mahazo milaza teny akory va aho? ny teny izay hataon''Andriamanitra ao am-bavako, dia izany no holazaiko.'
mg1865::mg_4::22::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Balama niaraka tamin''i Balaka, ka nankany Kinata-hozota izy roa lahy.'
mg1865::mg_4::22::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Balaka namono omby sy ondry aman''osy hatao fanatitra ka nampanatitra ho an''i Balama sy ny andriandahy izay teo aminy.'
mg1865::mg_4::22::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 22
  verse_number: 41
  verse_date_revised: null
  verse_title: 'Ny oha-teny nataon''i Balama'
  verse_text: 'Ary nony maraina Balama dia nalain''i Balaka ka nentiny niakatra ho ao Bamota-bala, ka dia tazany tao ny olona hatramin''ny sisin''ny tobiny.'
mg1865::mg_4::23::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Balama tamin''i Balaka: Manorena alitara fito eto ho ahy, ka manamboara vantotr''ombilahy fito sy ondrilahy fito.'
mg1865::mg_4::23::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia narahin''i Balaka izay efa nolazain''i Balama; ary Balaka sy Balama nanatitra vantotr''ombilahy sy ondrilahy iray avy teo ambonin''ny isan''alitara.'
mg1865::mg_4::23::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''i Balaka: Mitoera eto anilan''ny fanatitra doranao, fa izaho kosa handeha; angamba ho avy hihaona amiko Jehovah; ary izay hasehony amiko dia hambarako aminao. Ary lasa nankany amin''ny tendrombohitra anankiray mangadihady izy.'
mg1865::mg_4::23::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra dia nihaona tamin''i Balama; ary hoy Balama taminy: Ny alitara fito dia efa namboariko, ary efa nanatitra vantotr''ombilahy sy ondrilahy iray avy teo ambonin''ny isan''alitara aho.'
mg1865::mg_4::23::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanisy teny teo am-bavan''i Balama ka nanao hoe: Miverena any amin''i Balaka, ary izany no holazainao.'
mg1865::mg_4::23::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina tany amin''i Balaka izy, ary, indreo, teo anilan''ny fanatitra dorany izy sy ireo andriandahin''i Moaba rehetra.'
mg1865::mg_4::23::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao oha-teny Balama ka nilaza hoe: Balaka nampaka ahy avy tany Arama, Ny mpanjakan''i Moaba nampaka ahy avy tany amin''ny tendrombohitra atsinanana: Avia, ka ozony ho ahy Jakoba; ary mankanesa aty, ka sahatoy ny Isiraely.'
mg1865::mg_4::23::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko ahoana no fanozona izay tsy nozonin''Andriamanitra? Ary hataoko ahoana no fisahato izay tsy nosahatoin''i Jehovah?'
mg1865::mg_4::23::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa eto an-tampon''ny vatolampy no ahitako azy, ary eto amin''ny havoana no itazanako azy; indro, firenena mitoka-monina izy, ary tsy hatao ho isan''ny jentilisa.'
mg1865::mg_4::23::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahisa ny vovok''i Jakoba, na ny isan''ny ampahefatry ny Isiraely? Aoka ho tahaka ny fahafatesan''ny olo-marina ny fahafatesako, ary aoka ny hiafarako ho tahaka ny azy!'
mg1865::mg_4::23::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balaka tamin''i Balama: Ahoana izao nataonao tamiko izao? Hanozona ny fahavaloko no nangalako anao, kanjo nitso-drano dia nitso-drano azy kosa ianao.'
mg1865::mg_4::23::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly izy ka nanao hoe: Tsy hotandremako va ny hilaza izay ataon''i Jehovah eto am-bavako?'
mg1865::mg_4::23::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balaka taminy: Andeha mba hiaraka amiko ho any amin''ny tany hafa izay hahitanao azy; kanefa ny sisiny ihany no ho hitanao eo, fa tsy ho hitanao avokoa izy rehetra; ka ozony ho ahy ao izy.'
mg1865::mg_4::23::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra azy tao an-tsaha Zofima izy, tao an-tampon''i Pisga; ary nanorina alitara fito izy ka nanatitra vantotr''ombilahy sy ondrilahy iray avy teo ambonin''ny isan''alitara.'
mg1865::mg_4::23::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''i Balaka: Mitoera eto anilan''ny fanatitra doranao, fa izaho hankery hihaona amin''i Jehovah.'
mg1865::mg_4::23::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nihaona tamin''i Balama, dia nanisy teny teo am-bavany ka nanao hoe: Miverena mankeo amin''i Balaka ary izany no holazainao.'
mg1865::mg_4::23::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany aminy izy, dia, indreo, teo anilan''ny fanatitra dorany izy sy ireo andriandahin''i Moaba izay teo aminy. Dia hoy Balaka taminy: Ahoana no nolazain''i Jehovah?'
mg1865::mg_4::23::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao oha-teny Balama ka nilaza hoe: Mitsangàna, ry Balaka, ka mandrenesa; Atongilano amiko ny sofinao, ry zanak''i Zipora;'
mg1865::mg_4::23::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra tsy mba olona ka handainga, na zanak''olombelona ka hanenina; moa efa nilaza va Izy, ka tsy hefainy? na efa niteny va Izy, ka tsy hotoviny?'
mg1865::mg_4::23::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny hitahy no efa azoko; ary efa nitahy Izy, ka tsy mahova izany aho.'
mg1865::mg_4::23::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mijery faharatsiana eo amin''i Jakoba Izy. Ary tsy mahita fahoriana eo amin''ny Isiraely; Jehovah Andriamaniny no nomba azy, Ary hoby fanao amin''andriana no re eo aminy.'
mg1865::mg_4::23::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nentin''Andriamanitra nivoaka avy tany Egypta izy, ary manan-kery toy ny ombimanga,'
mg1865::mg_4::23::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy fisikidianana eo amin''i Jakoba, ary tsy misy fankatovana eo amin''Isiraely. Fa amin''ny fotoana no hilazana amin''i Jakoba sy Isiraely izay efa nataon''i Jehovah.'
mg1865::mg_4::23::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, firenena mitsangana toy ny liom-bavy sy miarina toy ny liona; tsy handry izy mandra-pihinany toha sy mandra-pisotrony ny ran''ny voavono.'
mg1865::mg_4::23::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balaka tamin''i Balama: Aza manozona na mitso-drano azy akory'
mg1865::mg_4::23::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly kosa Balama ka nanao tamin''i Balaka hoe; Tsy efa nilaza taminao va aho ka nanao hoe: Izay rehetra holazain''i Jehovah, izany no hataoko?'
mg1865::mg_4::23::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balaka tamin''i Balama: Andeha ho entiko any amin''izay tany hafa ianao; angamba ho sitrak''Andriamanitra ny hanozonanao azy any ho ahy.'
mg1865::mg_4::23::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Balama dia nentin''i Balaka ho ao an-tampon''i Peora, izay manatrika ny efitra.'
mg1865::mg_4::23::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''i Balaka: Manorena alitara fito eto ho ahy, ka manamboara vantotr''ombilahy fito sy ondrilahy fito.'
mg1865::mg_4::23::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Balaka dia nanao araka izay efa nolazain''i Balama ka nanatitra vantotr''ombilahy, sy ondrilahy iray avy teo ambonin''ny isan''alitara.'
mg1865::mg_4::24::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Balama fa sitrak''i Jehovah ny hitahy ny Isiraely, dia tsy nandeha tahaka ny teo hanao sikidy intsony izy, fa nitodika nanatrika ny efitra fotsiny.'
mg1865::mg_4::24::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natopin''i Balama ny masony, ka nahita ny Isiraely mitoby araka ny fireneny izy; ary ny Fanahin''Andriamanitra tonga tamin''i Balama.'
mg1865::mg_4::24::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao oha-teny izy ka nilaza hoe: Hoy Balama, zanak''i Beora, dia ny lehilahy izay voakimpy ny masony'
mg1865::mg_4::24::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandre ny tenin''Andriamanitra sady mahita fahitana avy amin''ny Tsitoha, torana, kanefa voahiratra ny masony:'
mg1865::mg_4::24::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny hatsaran''ny lainao, ry Jakoba o! sy ny lasinao, ry Isiraely o!'
mg1865::mg_4::24::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny lohasaha malalaka, tahaka ny saha ao amoron''ony, tahaka ny hazo manitra nambolen''i Jehovah, tahaka ny hazo sedera ao amoron-drano.'
mg1865::mg_4::24::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisy rano mandeha avy eo amin''ny sininy, ary ny taranany ho any amoron''ny renirano maro. Hisandratra noho Agaga ny mpanjakany, ary handroso voninahitra ny fanjakany.'
mg1865::mg_4::24::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nentin''Andriamanitra nivoaka avy tany Egypta izy. Ary manan-kery toy ny ombimanga; Handany ny jentilisa fahavalony izy, ka hotapatapahiny ny taolany, ary haripany amin''ny zana-tsipïkany.'
mg1865::mg_4::24::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamitaka izy, mandry toy ny liona, ary toy ny liom-bavy, ka iza no hanaitra azy? Hohasoavina anie izay manisy soa anao, ary ho voaozona anie izay manozona anao!'
mg1865::mg_4::24::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''i Balama ny fahatezeran''i Balaka, ka niteha-tanana izy; dia hoy izy tamin''i Balama: Hanozona ny fahavaloko no niantsoako anao, kanjo efa nitso-drano azy intelo ianao izao.'
mg1865::mg_4::24::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, mandosira ho any amin''ny fonenanao ianao. Hoy izaho teo: Hanome voninahitra anao tokoa aho; fa, indro, Jehovah efa nisakana anao tsy hahazo voninahitra.'
mg1865::mg_4::24::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Balama tamin''i Balaka: Moa tsy efa nilaza tamin''ny irakao izay nirahinao tamiko va aho ka nanao hoe:'
mg1865::mg_4::24::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia homen''i Balaka volafotsy sy volamena eran''ny tranony aza aho, dia tsy mahazo manoatra ny didin''i Jehovah, na hanao soa, na hanao ratsy, avy amin''ny saiko; izay holazain''i Jehovah ihany no holazaiko?'
mg1865::mg_4::24::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, indro, efa handeha ho any amin''ny fireneko aho, dia aoka hananatra anao aho ny amin''izay hataon''ity firenena ity amin''ny vahoakanao any am-parany.'
mg1865::mg_4::24::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao oha-teny izy ka nilaza hoe: Hoy Balama, zanak''i Beora, dia ny lehilahy izay voakimpy ny masony;'
mg1865::mg_4::24::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandre ny tenin''Andriamanitra sady mahalala ny fahalalan''ny Avo Indrindra, izay mahita fahitana avy amin''ny Tsitoha, torana, kanefa voahiratra ny masony:'
mg1865::mg_4::24::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitako Izy, nefa tsy ankehitriny; tazako Izy, nefa tsy akaiky; misy kintana miseho avy amin''i Jakoba sy tehim-panjakana miposaka avy amin''Isiraely ka mandrava ny sisin-tanin''i Moaba Ary mandringana ny mpitabataba rehetra.'
mg1865::mg_4::24::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Edoma sy Seàra fahavalony dia samy lasany ho azy, ary ny Isiraely mandroso amin-kery.'
mg1865::mg_4::24::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy amin''i Jakoba no isehoan''Izay hanapaka ka handringana izay sisa avy ao an-tanàna.'
mg1865::mg_4::24::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita ny Amalekita izy, dia nanao oha-teny hoe: Voalohany tamin''ny jentilisa Amaleka, fa ho lany ringana no hiafarany.'
mg1865::mg_4::24::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita ny Kenita izy, dia nanao oha-teny hoe: Mafy orina ny fonenanao, ary atao ao amin''ny vatolampy ny akaninao.'
mg1865::mg_4::24::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ho ringana Kaina, alohan''ny hamaboan''i Asyra anao.'
mg1865::mg_4::24::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao oha-teny koa izy ka nilaza hoe: Indrisy! iza no ho velona, raha manao izany Andriamanitra?'
mg1865::mg_4::24::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy sambo avy any amin''ny tany Kitima, dia hampietry an''i Asyra sy Ebera, ka ho lany ringana no hiafarany.'
mg1865::mg_4::24::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Balama ka lasa nody tany amin''ny fonenany; fa Balaka kosa nandeha tany amin''izay nalehany.'
mg1865::mg_4::25::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nijangajangan''ny Isiraely tamin''ny zanakavavin''ny Moabita'
  verse_text: 'Ary nitoetra tao Sitima ny Isiraely, dia niantomboka nijangajanga tamin''ny zanakavavin''ny Moabita izy.'
mg1865::mg_4::25::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo nanasa ny olona hihinana tamin''ny zavatra novonoiny ho fanatitra ho an''ny andriamaniny, ka nihinana ny olona sady niankohoka tamin''ny andriamaniny.'
mg1865::mg_4::25::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niray tamin''i Bala-peora ny Isiraely, ka nirehitra taminy ny fahatezeran''i Jehovah.'
mg1865::mg_4::25::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Alao ny loholona rehetra, ary ahantòny tandrifin''ny masoandro eo anatrehan''i Jehovah ireo nijangajanga ireo, mba hitsaharan''ny firehetan''ny fahatezeran''i Jehovah amin''ny Isiraely.'
mg1865::mg_4::25::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mosesy tamin''ny mpitsara ny Isiraely: Samia ianareo mamono ny olom-peheziny, izay niray tamin''i Bala-peora.'
mg1865::mg_4::25::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, avy ny anankiray tamin''ny Zanak''Isiraely nitondra vehivavy Midianita teo amin''ny rahalahiny, teo imason''i Mosesy sy ny fiangonana, dia ny Zanak''Isiraely rehetra, izay nitomany teo amin''ny varavaran''ny trano-lay fihaonana.'
mg1865::mg_4::25::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita izany Finehasa, zanak''i Eleazara, zanak''i Arona mpisorona, dia nitsangana niala teo amin''ny fiangonana izy ka nitondra lefona teny an-tanany;'
mg1865::mg_4::25::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nandeha nanaraka ilay lehilahy Isiraelita tao an-day izy, ary nataony indray nandefona izy roroa, dia ny lehilahy Isiraelita sy ny vehivavy, ka voagorobaka hatrany amin''ny kibon-dravehivavy. Dia natsahatra ny areti-mandringana teo amin''ny Zanak''Isiraely.'
mg1865::mg_4::25::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay maty tamin''ny areti-mandringana dia efatra arivo amby roa alina.'
mg1865::mg_4::25::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::25::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Finehasa, zanak''i Eleazara, zanak''i Arona mpisorona, nampiala ny fahatezerako tamin''ny Zanak''Isiraely, raha nirehitra noho ny fitiavany Ahy izy; ka dia tsy nataoko lany ringana ny Zanak''Isiraely tamin''ny firehetan''ny fahatezerako.'
mg1865::mg_4::25::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia lazao hoe: Indro, omeko azy ny faneken''ny fihavanako;'
mg1865::mg_4::25::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy sy ny zanany mandimby azy no hanana izany ho faneken''ny fisoronana mandrakizay, satria nirehitra noho ny fitiavany an''Andriamaniny izy ka nanao fanavotana ho an''ny Zanak''Isiraely.'
mg1865::mg_4::25::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ilay lehilahy Isiraelita novonoina, izay niaraka novonoina tamin-dravehivavy Midianita, dia Zimry, zanak i Salo, lohan''ny fianakaviana tamin''ny Simeonita.'
mg1865::mg_4::25::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ny vehivavy Midianita izay novonoina dia Kosby, zanak''i Zora, lohan''ny fianakaviana tamin''ny Midianita.'
mg1865::mg_4::25::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::25::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rafeso ny Midianita, ka iadio;'
mg1865::mg_4::25::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izy nandrafy anareo tamin''ny fanangoleny, izay nanangoleny anareo tamin''ny an''i Peora sy Kosby anabaviny, zanakavavin''ny andriandahy Midianita anankiray, izay novonoina tamin''ny andron''ny areti-mandringana noho ny an''i Peora.'
mg1865::mg_4::26::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandaminana ny Isiraely fanindroany, teo Arbota-moaba'
  verse_text: 'Ary rehefa afaka ny areti-mandringana, dia hoy Jehovah tamin''i Mosesy sy Eleazara, zanak''i Arona mpisorona:'
mg1865::mg_4::26::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao isa ny fiangonana, dia ny Zanak''Isiraely rehetra, hatramin''ny roa-polo taona no ho miakatra, araka ny fianakaviany avy, dia izay rehetra amin''ny Isiraely azo halefa hanafika.'
mg1865::mg_4::26::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Eleazara mpisorona dia nilaza taminy teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko, ka nanao hoe:'
mg1865::mg_4::26::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hatramin''ny roa-polo taona no ho miakatra no alao isa; araka izay nandidian''i Jehovah an''i Mosesy sy ny Zanak''Isiraely izay nivoaka avy tany amin''ny tany Egypta.'
mg1865::mg_4::26::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Robena, lahimatoan''Isiraely; ary ny zanak''i Robena dia Hanoka sy ny fokon''ny Hanokita; avy tamin''i Palo ny fokon''ny Paloita;'
mg1865::mg_4::26::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Hezrona ny fokon''ny Hezronita; avy tamin''i Karmy ny fokon''ny Karmita.'
mg1865::mg_4::26::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''ny Robenita; ary izay voalamina taminy dia telo-polo amby fiton-jato sy telo arivo sy efatra alina.'
mg1865::mg_4::26::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''i Palo dia Eliaba.'
mg1865::mg_4::26::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''i Eliaba dia Nemoela sy Datana ary Abàrama. Ireo dia ilay Datana sy Abàrama, olom-boafidin''ny fiangonana, izay nila ady tamin''i Mosesy sy Arona, teo amin''ny antokon''i Kora, raha nila ady tamin''i Jehovah izy,'
mg1865::mg_4::26::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisokatra ny tany ka nitelina azy mbamin''i Kora, tamin''ny nahafatesan''izany antokony izany, ary levon''ny afo koa ny dimam-polo amby roan-jato lahy ka tonga fananarana.'
mg1865::mg_4::26::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny zanak''i Kora tsy mba maty.'
mg1865::mg_4::26::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Simeona, araka ny fokony, dia izao: avy tamin''i Nemoela ny fokon''ny Nemoelita; avy tamin''i Jamina ny fokon''ny Jaminita; avy tamin''i Jakina ny fokon''ny Jakinita;'
mg1865::mg_4::26::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Zera ny fokon''ny Zerita; avy tamin''i Saoly ny fokon''ny Saolita.'
mg1865::mg_4::26::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''ny Simeonita, dia roanjato amby roa arivo sy roa alina.'
mg1865::mg_4::26::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Gada, araka ny fokony, dia izao: avy tamin''i Zefona ny fokon''ny Zefonita; avy tamin''i Hagy ny fokon''ny Hagita; avy tamin''i Sony ny fokon''ny Sonita;'
mg1865::mg_4::26::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Ozny ny fokon''ny Oznita; avy tamin''i Ery ny fokon''ny Erita;'
mg1865::mg_4::26::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Aroda ny fokon''ny Arodita; avy tamin''i Arely ny fokon''ny Arelita.'
mg1865::mg_4::26::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''ny zanak''i Gada, araka izay voalamina taminy, dia diman-jato amby efatra alina'
mg1865::mg_4::26::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanak''i Joda dia Era sy Onana; kanefa Era sy Onana dia maty tany amin''ny tany Kanana ihany.'
mg1865::mg_4::26::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Joda, araka ny fokony, dia izao: avy tamin''i Sela ny fokon''ny Selita; avy tamin''i Fareza ny fokon''ny Farezita; avy tamin''i Zera ny fokon''ny Zerita.'
mg1865::mg_4::26::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Fareza dia izao: avy tamin''i Hezrona ny fokon''ny Hezronita; avy tamin''i Hamola ny fokon''ny Hamolita.'
mg1865::mg_4::26::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''i Joda, araka izay voalamina taminy, dia diman-jato amby enina arivo sy fito alina.'
mg1865::mg_4::26::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''Isakara, araka ny fokony, dia izao: avy tamin''i Tola ny fokon''ny Tolita; avy tamin''i Pova ny fokon''ny Povita;'
mg1865::mg_4::26::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Jasoba ny fokon''ny Jasobita; avy tamin''i Simrona ny fokon''ny Simronita,'
mg1865::mg_4::26::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''Isakara, araka izay voalamina taminy, dia telon-jato amby efatra arivo sy enina alina.'
mg1865::mg_4::26::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Zebolona, araka ny fokony, dia izao: avy tamin''i Sereda ny fokon''ny Seredita; avy tamin''i Elona ny fokon''ny Elonita; avy tamin''i Jahalela ny fokon''ny Jahalelita.'
mg1865::mg_4::26::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''ny Zebolonita, araka izay voalamina taminy. dia diman-jato amby enina alina.'
mg1865::mg_4::26::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanak''i Josefa, araka ny fokony, dia Manase sy Efraima.'
mg1865::mg_4::26::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Manase dia izao: avy tamin''i Makira ny fokon''ny Makirita; ary Makira niteraka an''i Gileada; avy tamin''i Gileada ny fokon''ny Gileadita.'
mg1865::mg_4::26::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no taranak''i Gileada: avy tamin''i Jezera ny fokon''ny Jezerita; avy tamin''i Heleka ny fokon''ny Helekita;'
mg1865::mg_4::26::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary avy tamin''i Asriela ny fokon''ny Asrielita; ary avy tamin''i Sekema ny fokon''ny Sekemita;'
mg1865::mg_4::26::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary avy tamin''i Semida ny fokon''ny Semidita; ary avy tamin''i Hefera ny fokon''ny Heferita.'
mg1865::mg_4::26::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zelofada, zanak''i Hefera, tsy mba nanan-janakalahy, fa zanakavavy ihany; ary ny anaran''ny zanakavavin''i Zelofada dia Mahala sy Noa sy Hogla sy Milka ary Tirza.'
mg1865::mg_4::26::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''i Manase; ary izay voalamina taminy dia fiton-jato amby roa arivo amby dimy alina.'
mg1865::mg_4::26::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no taranak''i Efraima, araka ny fokony: avy tamin''i Sotela ny fokon''ny Sotelita; avy tamin''i Bekera ny fokon''ny Bekerita; avy tamin''i Tahana ny fokon''ny Tahanita.'
mg1865::mg_4::26::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no taranak''i Sotela: avy tamin''i Erana ny fokon''ny Eranita.'
mg1865::mg_4::26::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''ny taranak''i Efraima, araka izay voalamina taminy, dia diman-jato amby roa arivo sy telo alina. Ireo no taranak''i Josefa araka ny fokony.'
mg1865::mg_4::26::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Benjamina, araka ny fokony, dia izao: avy tamin''i Bela ny fokon''ny Belita; avy tamin''i Asibela ny fokon''ny Asibelita; avy tamin''i Ahirama ny fokon''ny Ahiramita;'
mg1865::mg_4::26::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Sefofama ny fokon''ny Sefofamita; avy tamin''i Hofama ny fokon''ny Hofamita.'
mg1865::mg_4::26::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Bela dia Arda sy Namana; dia ny fokon''ny Ardita; ary avy tamin''i Namana ny fokon''ny Namanita.'
mg1865::mg_4::26::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no taranak''i Benjamina araka ny fokony; ary izay voalamina taminy dia enin-jato amby dimy arivo sy efatra alina.'
mg1865::mg_4::26::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no taranak''i Dana, araka ny fokony: avy tamin''i Sohama ny fokon''ny Sohamita. Ireo no fokon''i Dana, araka ny fokony.'
mg1865::mg_4::26::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fokon''ny Sohamita rehetra, araka izay voalamina taminy, dia efa-jato amby efatra arivo sy enina alina.'
mg1865::mg_4::26::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Asera, araka ny fokony dia izao: avy tamin''i Jimna ny fokon''ny Jimnita; avy tamin''i Jisvy ny fokon''ny Jisvita; avy tamin''i Beria ny fokon''ny Berita;'
mg1865::mg_4::26::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''ny zanak''i Bena dia izao: avy tamin''i Hebera ny fokon''ny Heberita; avy tamin''i Malkiela ny fokon''ny Malkielita.'
mg1865::mg_4::26::46:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ny zanakavavin''i Asera dia Sera.'
mg1865::mg_4::26::47:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''ny taranak''i Asera, araka izay voalamina taminy, dia efa-jato amby telo arivo sy dimy alina.'
mg1865::mg_4::26::48:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Naftaly, araka ny fokony, dia izao: avy tamin''i Jaziela ny fokon''ny Jazielita; avy tamin''i Gony ny fokon''ny Gonita;'
mg1865::mg_4::26::49:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'avy tamin''i Jezera ny fokon''ny Jezerita; avy tamin''i Silema ny fokon''ny Silemita.'
mg1865::mg_4::26::50:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no fokon''i Naftaly araka ny fokony; ary izay voalamina taminy dia efa-jato amby dimy arivo sy efatra alina.'
mg1865::mg_4::26::51:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no voalamina tamin''ny Zanak''Isiraely, dia telo-polo amby fiton-jato sy arivo sy enina hetsy.'
mg1865::mg_4::26::52:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::26::53:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no hizarana ny tany ho lovany, araka ny isany.'
mg1865::mg_4::26::54:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maro isa homenao zara-tany bebe kokoa, ary ny vitsy isa homenao kelikely kokoa; samy araka ny voalamina taminy no hanomezana ny zara-taniny.'
mg1865::mg_4::26::55:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa filokana no hizarana ny tany; araka ny anaran''ny firenen''ny razany no hahazoany zara-tany.'
mg1865::mg_4::26::56:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia filokana no hizarana ny tany ho lovany, na ny ho an''ny maro, na ny ho an''ny vitsy.'
mg1865::mg_4::26::57:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no voalamina tamin''ny taranak''i Levy, araka ny fokony: avy tamin''i Gersona ny fokon''ny Gersonita; avy tamin''i Kehata ny fokon''ny Kehatita; avy tamin''i Merary ny fokon''ny Merarita.'
mg1865::mg_4::26::58:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no fokon''i Levy: ny fokon''ny Libnita, ny fokon''ny Hebronita, ny fokon''ny Mahalita, ny fokon''ny Mosita, ny fokon''ny Koralta. Ary Kehata niteraka an''i Amrama.'
mg1865::mg_4::26::59:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ny vadin''i Amrama dia Jokebeda, zanakavavin''i Levy, izay naterany tany Egypta; dia niteraka an''i Arona sy Mosesy ary Miriama anabaviny tamin''i Amrama izy.'
mg1865::mg_4::26::60:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny naterak''i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara.'
mg1865::mg_4::26::61:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maty Nadaba sy Abiho tamin''izy nanatitra afo tsy izy teo anatrehan''i Jehovah.'
mg1865::mg_4::26::62:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay voalamina taminy dia telo arivo amby roa alina, dia ny lahy rehetra hatramin''ny iray volana no ho miakatra; fa tsy niaraka nalamina tamin''ny Zanak''Isiraely izy, satria tsy mba nomena zara-tany teo amin''ny Zanak''Isiraely.'
mg1865::mg_4::26::63:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no voalamin''i Mosesy sy Eleazara mpisorona, izay nandamina ny Zanak''Isiraely teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko.'
mg1865::mg_4::26::64:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ireo dia tsy nisy olona avy tamin''izay efa voalamin''i Mosesy sy Arona mpisorona tamin''izy nandamina ny Zanak''Isiraely tany an''efitr''i Sinay.'
mg1865::mg_4::26::65:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 26
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nilaza azy hoe: Ho faty any an''efitra tokoa ireo. Koa dia tsy nisy olona sisa tamin''ireny afa-tsy Kaleba, zanak''i Jefone, sy Josoa, zanak''i Nona, ihany.'
mg1865::mg_4::27::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanontanian''ny zanakavavin''i Zelofada, sy ny lalàna izay natao ny amin''izany'
  verse_text: 'Ary avy ny zanakavavin''i Zelofada, zanakalahin''i Hefera, zanak''i Gileada, zanak''i Makira, zanak''i Manase, avy tamin''ny fokon''i Manase, zanak i Josefa (ary izao no anarany: Mahala sy Noa sy Hogla sy Milka ary Tirza),'
mg1865::mg_4::27::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitsangana teo anatrehan''i Mosesy sy Eleazara mpisorona ary ny lohan''ny fiangonana sy ny fiangonana rehetra, teo anoloan''ny varavaran''ny trano-lay fihaonana izy ka nanao hoe:'
mg1865::mg_4::27::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rainay dia maty tany an''efitra, kanefa tsy mba isan''ny antokon''i Kora izay niangona hiodina tamin''i Jehovah tsy akory; fa matin''ny fahotany ihany izy, nefa tsy nanan-janakalahy.'
mg1865::mg_4::27::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ny rainay no ho fati-maso eo amin''ny fokony, na dia tsy nanan-janakalahy aza izy? mba omeo zara-tany eo amin''ny rahalahin''ny rainay izahay.'
mg1865::mg_4::27::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalahatr''i Mosesy teo anatrehan''i Jehovah ny tenin''ireo.'
mg1865::mg_4::27::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::27::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina ny tenin''ny zanakavavin''i Zelofada: omeo zara-tany eo amin''ny rahalahin-drainy tokoa izy; dia ampandovay ny zara-tanin-drainy izy.'
mg1865::mg_4::27::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''ny Zanak''Isiraely hoe: Raha misy lehilahy maty ka tsy manan-janakalahy, dia ny zananivavy no hampandovainareo ny zara-taniny.'
mg1865::mg_4::27::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy manan-janakavavy izy, dia ny rahalahiny no homenareo ny zara-taniny.'
mg1865::mg_4::27::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy manan-drahalahy izy, dia ny rahalahin-drainy no homenareo ny zara-taniny.'
mg1865::mg_4::27::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy manan-drahalahy ny rainy, dia ny havany akaiky azy amin''ny fokony no homenareo ny zara-taniny, ka izy no handova azy: ho lalàna hitondrana ny Zanak''Isiraely izany araka izay nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::27::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny amin''ny hahafatesan''i Mosesy, sy ny nanendrena an''i Josoa ho mpandimby azy.'
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Miakara amin''ity tendrombohitra Abarima ity, ka tazano ny tany izay omeko ny Zanak''Isiraely.'
mg1865::mg_4::27::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitanao izany, dia hangonina any amin''ny razanao koa ianao, tahaka izay nanangonana an''i Arona rahalahinao;'
mg1865::mg_4::27::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nandà ny teniko ianareo tany an''efitra Zina, tamin''ilay nilan''ny fiangonana ady, ka tsy nanamasina Ahy teo amin''ny rano teo imasony. (Izany no ranon''i Meriba any Kadesy any an''efitra Zina.)'
mg1865::mg_4::27::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niteny tamin''i Jehovah hoe:'
mg1865::mg_4::27::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka Jehovah, Andriamanitry ny fanahin''ny nofo rehetra, hanendry lehilahy izay hitandrina ny fiangonana'
mg1865::mg_4::27::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hivoaka sy hiditra eo alohany ary hitarika azy hivoaka sy hiditra, mba tsy ho tahaka ny ondry tsy misy mpiandry ny fiangonan''i Jehovah.'
mg1865::mg_4::27::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Alao ho anao Josoa, zanak''i Nona, lehilahy izay manam-panahy, ka ametraho ny tananao izy;'
mg1865::mg_4::27::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary asaovy mijoro eo anatrehan''i Eleazara mpisorona sy ny fiangonana rehetra izy, ka mandidia azy eo imasony ianao.'
mg1865::mg_4::27::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia anomezo azy ny voninahitrao, mba hihainoan''ny fiangonana, dia ny Zanak''Isiraely rehetra azy.'
mg1865::mg_4::27::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josoa hijanona eo anatrehan''i Eleazara mpisorona, izay hanadina amin''ny fitsaran''i Orima eo anatrehan''i Jehovah ho azy; araka ny teniny no hivoahany, ary araka ny teniny no hidirany, dia izy sy ny Zanak''Isiraely rehetra, dia ny fiangonana rehetra.'
mg1865::mg_4::27::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''i Mosesy araka izay efa nandidian''i Jehovah azy; dia naka an''i Josoa izy ka nampijoro azy teo anatrehan''i Eleazara mpisorona sy ny fiangonana rehetra'
mg1865::mg_4::27::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nametraka ny tanany taminy ary nandidy azy, araka ny tenin''i Jehovah izay nampitondrainy an''i Mosesy.'
mg1865::mg_4::28::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fandaharana ny fanatitra atao isan''andro sy amin''izay fotoana hafa voatendrin''Andriamanitra'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::28::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandidia ny Zanak''Isiraely hoe: Ny fanatitra ho Ahy, dia ny haniko, izay fanatitra atao amin''ny afo ho hanitra ankasitrahana ho Ahy, dia aoka hotandremanareo ny hanaterana izany ho Ahy amin''ny fotoany avy.'
mg1865::mg_4::28::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao aminy hoe: Izao no fanatitra atao amin''ny afo, izay haterinareo ho an''i Jehovah: zanak''ondry roa isan''andro izay iray taona sady tsy misy kilema, ho fanatitra dorana mandrakariva'
mg1865::mg_4::28::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: '(ny zanak''ondry iray haterinao nony maraina, ary ny zanak''ondry iray koa haterinao nony hariva),'
mg1865::mg_4::28::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto ampahafolon''ny efaha, voaharo diloilo voavely ampahefatry ny hina, ho fanatitra hohanina.'
mg1865::mg_4::28::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fanatitra dorana mandrakariva izany, izay voatendry tao an-tendrombohitra Sinay ho hanitra ankasitrahana, dia fanatitra atao amin''ny afo ho an''i Jehovah.'
mg1865::mg_4::28::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatitra aidina momba azy dia ampahefatry ny hina amin''ny isan-janak''ondry iray; ao amin''ny fitoerana masina no hanidinanao divay ho an''i Jehovah ho fanatitra aidina.'
mg1865::mg_4::28::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''ondry iray koa haterinao nony hariva; ary fanatitra hohanina sy fanatitra aidina tahaka ny natao tamin''ny fanatitra maraina no hampombainao azy ho fanatitra atao amin''ny afo, ho hanitra ankasitrahana ho an''i Jehovah.'
mg1865::mg_4::28::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro Sabata kosa dia izao no atero: zanak''ondry roa izay iray taona''sady tsy misy kilema, ary koba tsara toto roa ampahafolon''ny efaha voaharo diloilo ho fanatitra hohanina ary ny fanatitra aidina momba azy.'
mg1865::mg_4::28::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fanatitra dorana amin''ny isan-tSabata izany, ho fanampin''ny fanatitra dorana mandrakariva sy ny fanatitra aidina momba azy.'
mg1865::mg_4::28::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no atero amin''ny voaloham-bolanareo ho fanatitra dorana ho an''i Jehovah: vantotr''ombilahy roa sy ondrilahy iray ary zanak''ondry fito, izay iray taona sady tsy misy kilema,'
mg1865::mg_4::28::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto telo ampahafolon''ny efaha voaharo diloilo ho fanatitra hohanina amin''ny isam-bantotr''ombilahy iray, ary koba tsara toto roa ampahafolon''ny efaha voaharo diloilo, ho fanatitra hohanina amin''ny isan-ondrilahy iray,'
mg1865::mg_4::28::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto ampahafolon''ny efaha voaharo diloilo, ho fanatitra hohanina amin''ny isan-janak''ondry iray; ho fanatitra dorana izany, dia hanitra ankasitrahana, fanatitra atao amin''ny afo ho an''i Jehovah.'
mg1865::mg_4::28::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatitra aidina momba izany dia divay antsasaky ny hina amin''ny isam-bantotr''ombilahy iray, ary ampahatelon''ny hina ho amin''ny isan-ondrilahy iray, ary ampahefatry ny hina ho amin''ny isan-janak''ondry iray. Izany no fanatitra dorana amin''ny isam-bolana, araka ny volana amin''ny taona.'
mg1865::mg_4::28::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary osilahy iray koa hatao fanatitra noho ny ota ho an''i Jehovah; ho fanampin''ny fanatitra dorana mandrakariva no hanaterana azy sy ny fanatitra aidina momba azy.'
mg1865::mg_4::28::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro fahefatra ambin''ny folo amin''ny volana voalohany dia Paskan''i Jehovah.'
mg1865::mg_4::28::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro fahadimy ambin''ny folo amin''izany volana izany dia andro firavoravoana; hafitoana no hihinanana mofo tsy misy masirasira.'
mg1865::mg_4::28::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: '2022-04-18T04:54:42+0000'
  verse_title: null
  verse_text: 'Amin''ny andro voalohany dia hisy fivoriana masina; aza manao taozavatra akory;'
mg1865::mg_4::28::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izao no atero ho fanatitra atao amin''ny afo, dia fanatitra dorana ho an''i Jehovah: vantotr''ombilahy roa sy ondrilahy iray ary zanak''ondry fito izay iray taona (izay tsy misy kilema no haterinareo).'
mg1865::mg_4::28::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto voaharo diloilo ho fanatitra hohanina momba izany (telo ampahafolon''ny efaha no hiaraka haterinareo amin''ny isam-bantotr''ombilahy iray, ary roa ampahafolon''ny efaha amin''ny isan-ondrilahy iray,'
mg1865::mg_4::28::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ampahafolon''ny efaha no hiaraka haterinao amin''ny isan-janak''ondry, dia ny zanak''ondry fito),'
mg1865::mg_4::28::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray ho fanatitra noho ny ota, hanaovana fanavotana ho anareo.'
mg1865::mg_4::28::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atero ireo ho fanampin''ny fanatitra dorana isa-maraina, izay atao fanatitra dorana mandrakariva.'
mg1865::mg_4::28::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izany no hanateranareo isan''andro amin''ny hafitoana, ho hanina ho an''i Jehovah, dia fanatitra atao amin''ny afo ho hanitra ankasitrahana ho Azy; ho fanampin''ny fanatitra dorana mandrakariva no hanaterana azy sy ny fanatitra aidina momba azy.'
mg1865::mg_4::28::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro fahafito dia hisy fivoriana masina ho anareo; aza manao tao-zavatra akory.'
mg1865::mg_4::28::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro fanaterana ny voaloham-bokatra, raha manatitra fanatitra hohanina vaovao ho an''i Jehovah ianareo, rehefa afaka ireo herinandronareo, dia hisy fivoriana masina ho anareo; aza manao tao-zavatra akory;'
mg1865::mg_4::28::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izao no atero ho fanatitra odorana ho hanitra ankasitrahana ho an''i Jehovah: vantotr''ombilahy roa sy ondrilahy iray sy zanak''ondry fito, izay iray taona avy,'
mg1865::mg_4::28::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto voaharo diloilo ho fanatitra hohanina momba azy (telo ampahafolon''ny efaha amin''ny isam-bantotr''ombilahy iray, roa ampahafolon''ny efaha amin''ny isan''ondrilahy iray,'
mg1865::mg_4::28::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ampahafolon''ny efaha amin''ny isan-janak''ondry iray, dia amin''ny zanak''ondry fito)'
mg1865::mg_4::28::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray, hanaovana fanavotana ho anareo.'
mg1865::mg_4::28::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 28
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haterinareo ireo sy ny fanatitra aidina momba azy ho fanampin''ny fanatitra dorana mandrakariva sy ny fanatitra hohanina momba azy; izay tsy misy kilema no haterinareo.'
mg1865::mg_4::29::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro voalohany ny volana fahafito dia hisy fivoriana masina ho anareo, aza manao tao-zavatra akory; ho andro fitsofan-trompetra ho anareo izany.'
mg1865::mg_4::29::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no atero ho fanatitra odorana, ho hanitra ankasitrahana ho an''i Jehovah: vantotr''ombilahy iray sy ondrilahy iray ary zanak''ondry fito, izay iray taona avy sady tsy misy kilema,'
mg1865::mg_4::29::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koba tsara toto voaharo diloilo ho fanatitra hohanina momba azy (telo ampahafolon''ny efaha amin''ny isam-bantotr''ombilahy iray, roa ampahafolon''ny efaha amin''ny isan-ondrilahy iray,'
mg1865::mg_4::29::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ampahafolon''ny efaha amin''ny isan-janak''ondry, dia ny zanak''ondry fito)'
mg1865::mg_4::29::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray ho fanatitra noho ny ota, hanaovana fanavotana ho anareo,'
mg1865::mg_4::29::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho fanampin''ny fanatitra dorana noho ny voaloham-bolana sy ny fanatitra ho hanina momba azy ary ny fanatitra dorana mandrakariva sy ny fanatitra hohanina momba azy sy ny fanatitra aidina momba azy, araka ny fanaony, ho hanitra ankasitrahana, dia fanatitra atao amin''ny afo ho an''i Jehovah.'
mg1865::mg_4::29::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro fahafolo amin''izany volana fahafito izany dia hisy fivoriana masina ho anareo, dia hampahory ny tenanareo ianareo; aza manao raharaha akory.'
mg1865::mg_4::29::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no atero ho fanatitra dorana ho hanitra ankasitrahana ho an''i Jehovah: vantotr''ombilahy iray sy ondrilahy iray ary zanak''ondry fito izay iray taona avy (dia izay tsy misy kilema no haterinareo)'
mg1865::mg_4::29::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 9
