mg1865::mg_4::1::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandaminana ny firenen''Isiraely'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy tany an''efitr''i Sinay, tao amin''ny trano-lay fihaonana tamin''ny andro voalohany tamin''ny volana faharoa, tamin''ny taona faharoa taorian''ny nivoahany avy tany amin''ny tany Egypta, ka nanao hoe:'
mg1865::mg_4::1::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao isa ny fiangonana, dia ny Zanak''Isiraely rehetra, araka ny fokony sy ny fianakaviany avy, ary araka ny anarany tsirairay,'
mg1865::mg_4::1::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny lehilahy rehetra amin''ny Isiraely hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo alefa hanafika; handamina azy araka ny antokony avy ianao sy Arona.'
mg1865::mg_4::1::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hisy lehilahy iray avy isam-pirenena ho namanareo, dia izay samy lohan''ny fianakaviany avy.'
mg1865::mg_4::1::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ireo lehilahy ho namanareo ireo: Ny avy amin''i Robena dia Elizora, zanak''i Sedeora;'
mg1865::mg_4::1::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Simeona dia Selomiela, zanak''i Zorisaday;'
mg1865::mg_4::1::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Joda dia Nasona, zanak''i Aminadaba;'
mg1865::mg_4::1::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''Isakara dia Netanela, zanak''i Zoara;'
mg1865::mg_4::1::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Zebolona dia Eliaba, zanak''i Helona;'
mg1865::mg_4::1::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''ny zanak''i Josefa dia Elisama, zanak''i Amihoda, avy amin''i Efraima, ary Gamaliela, zanak''i Pedazora, avy amin''i Manase kosa;'
mg1865::mg_4::1::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Benjamina dia Abidana, zanak''i Gideony;'
mg1865::mg_4::1::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Dana dia Ahiezera, zanak''i Amisaday;'
mg1865::mg_4::1::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Asera dia Fagiela, zanak''i Okrana;'
mg1865::mg_4::1::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Gada dia Eliasafa, zanak''i Doela;'
mg1865::mg_4::1::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny avy amin''i Naftaly dia Ahira, zanak''i Enana.'
mg1865::mg_4::1::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no voafidin''ny fiangonana, dia samy lohan''ny fireneny avy sady mpifehy arivo amin''ny Isiraely.'
mg1865::mg_4::1::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona naka ireo olona voatonona anarana ireo,'
mg1865::mg_4::1::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia namory ny fiangonana rehetra tamin''ny andro voalohany tamin''ny volana faharoa; ary samy nampanoratra ny anarany avy izy araka ny firazanany, dia araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra.'
mg1865::mg_4::1::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay nandidian''i Jehovah an''i Mosesy no nandaminany azy tany an''efitr''Sinay.'
mg1865::mg_4::1::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Robena, lahimatoan''Isiraely, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin''ny roa-polo taona no ho miakatra izay azo nalefa hanafika,'
mg1865::mg_4::1::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Robena dia diman-jato amby enina arivo sy efatra alina.'
mg1865::mg_4::1::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Simeona araka ny fokony sy ny fianakaviany, dia izay rehetra voalamina, araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin''ny roa-polo taona no ho miakatra, izay azo nalefa hanafika'
mg1865::mg_4::1::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Simeona dia telon-jato amby sivy arivo sy dimy alina.'
mg1865::mg_4::1::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Gada araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Gada dia dimam-polo amby enin-jato sy dimy arivo sy efatra alina.'
mg1865::mg_4::1::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Joda araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Joda dia enin-jato amby efatra arivo sy fito alina.'
mg1865::mg_4::1::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''Isakara araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''Isakara dia efa-jato amby efatra arivo sy dimy alina.'
mg1865::mg_4::1::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Zebolona araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Zebolona dia efa-jato amby fito arivo sy dimy alina.'
mg1865::mg_4::1::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Josefa: dia avy tamin''ny taranak''i Efraima araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Efraima dia diman-jato amby efatra alina;'
mg1865::mg_4::1::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tamin''ny taranak''i Manase araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Manase dia roan-jato amby roa arivo sy telo alina.'
mg1865::mg_4::1::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Benjamina araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Benjamina dia efa-jato amby dimy arivo sy telo alina.'
mg1865::mg_4::1::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Dana araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Dana dia fiton-jato amby roa arivo sy enina alina.'
mg1865::mg_4::1::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Asera araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika'
mg1865::mg_4::1::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Asera dia diman-jato amby arivo sy efatra alina.'
mg1865::mg_4::1::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taranak''i Naftaly araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika,'
mg1865::mg_4::1::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay voalamina avy tamin''ny firenen''i Asera dia efa-jato amby telo arivo sy dimy alina.'
mg1865::mg_4::1::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no voalamin''i Mosesy sy Arona ary ny roa ambin''ny folo lahy lehibe amin''ny Isiraely, izay samy lohan''ny fianakaviany avy.'
mg1865::mg_4::1::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra avy tamin''ny Zanak''Isiraely araka ny fianakaviany, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika avy amin''ny Isiraely,'
mg1865::mg_4::1::46:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia dimam-polo amby dimam-jato sy telo arivo sy enina hetsy.'
mg1865::mg_4::1::47:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 47
  verse_date_revised: null
  verse_title: 'Ny amin''ny raharahan''ny Levita'
  verse_text: 'Fa ny Levita, araka ny fireneny kosa dia tsy mba nalamina ho isan''ireo.'
mg1865::mg_4::1::48:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::1::49:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenen''ny Levita ihany no aza alamina, ary aza mba alaina isa miaraka amin''ny Zanak''Isiraely;'
mg1865::mg_4::1::50:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tendreo izy hitandrina ny tabernakelin''ny Vavolombelona sy ny fanaka rehetra ary ny zavatra rehetra izay momba azy; fa izy no hitondra ny tabernakely sy ny zavatra rehetra momba azy sady hanao fanompoam-pivavahana ao; ary manodidina ny tabernakely no hitobiany.'
mg1865::mg_4::1::51:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hafindra ny tabernakely, dia ny Levita no hangorona azy; ary raha haorina ny tabernakely, dia ny Levita no hanangana azy; fa raha olon-kafa no manakaiky, dia hatao maty izy.'
mg1865::mg_4::1::52:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitoby ny Zanak''Isiraely, samy eo amin''ny tobiny avy, ary samy eo amin''ny fanevany ary, araka ny antokony.'
mg1865::mg_4::1::53:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Levita kosa hitoby manodidina ny tabernakelin''ny Vavolombelona, mba tsy hisy fahatezerana hahatratra ny fiangonan''ny Zanak''Isiraely; ary ny Levita hitandrina ny anjara raharaha momba ny tabernakelin''ny Vavolombelona.'
mg1865::mg_4::1::54:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 1
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''ny Zanak''Isiraely izany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy no nataony.'
mg1865::mg_4::2::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny filaharan''ny tobin''ny Isiraely araka ny fireneny avy'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe:'
mg1865::mg_4::2::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy eo amin''ny fanevany sy eo amin''ny faneva kelin''ny fianakaviany avy no hitobian''ny Zanak''Isiraely; manodidina ny trano-lay fihaonana sady manandrify azy no hitobiany.'
mg1865::mg_4::2::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hitoby eo amin''ny lafiny atsinanana, tandrifin''ny fiposahan''ny masoandro, dia izay momba ny fanevan''ny tobin''i Joda, araka ny antokony; ary ny lohan''ny taranak''i Joda dia Nasona, zanak''i Aminadaba;'
mg1865::mg_4::2::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia enin-jato amby efatra arivo sy fito alina.'
mg1865::mg_4::2::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hitoby eo anilany dia ny firenen''Isakara; ary ny lohan''ny taranak''Isakara dia Netanela, zanak''i Zoara;'
mg1865::mg_4::2::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia efa-jato amby efatra arivo sy dimy alina.'
mg1865::mg_4::2::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vao ny firenen''i Zebolona; ary ny lohan''ny taranak''i Zebolona dia Eliaba, zanak''i Helona;'
mg1865::mg_4::2::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia efa-jato amby fito arivo sy dimy alina.'
mg1865::mg_4::2::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''izay nalamina teo amin''ny tobin''i Joda dia efa-jato amby enina arivo sy valo alina sy iray hetsy, araka ny antokony. Ireo no loha-lalana.'
mg1865::mg_4::2::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanevan''ny tobin''i Robena no ho eo amin''ny lafiny atsimo, araka ny antokony; ary ny lohan''ny taranak''i Robena dia Elizora, zanak''Sedeora;'
mg1865::mg_4::2::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia diman-jato amby enina arivo sy efatra alina.'
mg1865::mg_4::2::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hitoby eo anilany dia ny firenen''i Simeona; ary ny lohan''ny taranak''i Simeona dia Selomiela, zanak''i Zorisaday;'
mg1865::mg_4::2::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia telon-jato amby sivy arivo sy dimy alina.'
mg1865::mg_4::2::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vao ny firenen''i Gada; ary ny lohan''ny taranak''i Gada dia Eliasafa, zanak''i Roela;'
mg1865::mg_4::2::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia dimam-polo amby enin-jato sy dimy arivo sy efatra alina.'
mg1865::mg_4::2::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''izay nalamina teo amin''ny tobin''i Robena dia dimam-polo amby efa-jato sy arivo sy dimy alina sy iray hetsy, araka ny antokony. Ireo no mandeha faharoany.'
mg1865::mg_4::2::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handroso ny trano-lay fihaonana sy ny tobin''ny Levita, eo afovoan''ny toby rehetra; ka araka ny itobiany ihany no handrosoany, samy eo amin''ny filaharany avy, araka ny fanevany.'
mg1865::mg_4::2::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanevan''ny tobin''i Efraima, araka ny antokony, dia ho eo amin''ny lafiny andrefana; ary ny lohan''ny taranak''i Efraima dia Elisama, zanak''i Amihoda;'
mg1865::mg_4::2::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia diman-jato amby efatra alina.'
mg1865::mg_4::2::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenen''i Manase ho eo anilany; ary ny lohan''ny taranak''i Manase dia Gamaliela, zanak''i Pedazora;'
mg1865::mg_4::2::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia roan-jato amby roa arivo amby telo alina.'
mg1865::mg_4::2::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vao ny firenen''i Benjamina; ary ny lohan''ny taranak''i Benjamina dia Abidana, zanak''i Gideony;'
mg1865::mg_4::2::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia efa-jato amby dimy arivo amby telo alina.'
mg1865::mg_4::2::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''izay nalamina teo amin''ny tobin''i Efraima dia zato amby valo arivo sy iray hetsy, araka ny antokony. Ireo no mandeha fahatelony.'
mg1865::mg_4::2::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanevan''ny tobin''i Dana, araka ny antokony, dia ho eo amin''ny lafiny avaratra; ary ny lohan''ny taranak''i Dana dia Ahiezera, zanak''i Amisaday;'
mg1865::mg_4::2::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia fiton-jato amby roa arivo sy enina alina.'
mg1865::mg_4::2::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hitoby eo anilany dia ny firenen''i Asera; ary ny lohan''ny taranak''i Asera dia Pagiela, zanak''i Okrana;'
mg1865::mg_4::2::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia dimam-jato amby arivo sy efatra alina.'
mg1865::mg_4::2::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vao ny firenen''i Naftaly; ary ny lohan''ny taranak''i Naftaly dia Ahira, zanak''i Enana;'
mg1865::mg_4::2::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny miaramilany izay nalamina dia efa-jato amby telo arivo sy dimy alina.'
mg1865::mg_4::2::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''izay nalamina teo amin''ny tobin''i Dana dia enin-jato amby fito arivo sy dimy alina sy iray hetsy. Dia ireo kosa no vodi-lalana.'
mg1865::mg_4::2::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no nalamina avy tamin''ny Zanak''Isiraely, araka ny fianakaviany; ny tontalin''izay nalamina tamin''ny toby rehetra, araka ny antokony, dia dimam-polo amby dimanjato amby telo arivo sy enina hetsy.'
mg1865::mg_4::2::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Levita dia tsy mba niaraka nalamina tamin''ny Zanak''Isiraely, araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::2::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely dia nanao araka izay rehetra efa nandidian''i Jehovah an''i Mosesy ka nitoby araka ny fanevany avy, ary samy nandroso araka ny fokony avy sy ny fianakaviany avy izy.'
mg1865::mg_4::3::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandaminana ny firenen''i Levy, sy ny nitobiany, ary ny zavatra hotandremany'
  verse_text: 'Ary izao no taranak''i Arona sy Mosesy tamin''ny andro nitenenan''i Jehovah tamin''i Mosesy teo an-tendrombohitra Sinay.'
mg1865::mg_4::3::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anaran''ny zanakalahin''i Arona dia Nadaba lahimatoa sy Abiho ary Eleazara sy Itamara.'
mg1865::mg_4::3::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no anaran''ny zanakalahin''i Arona, dia ny mpisorona voahosotra, izay natokana hanao fisoronana.'
mg1865::mg_4::3::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maty teo anatrehan''i Jehovah Nadaba sy Abiho tamin''izy nanatitra afo tsy izy teo anatrehan''i Jehovah tany an''efitr''i Sinay, sady samy tsy nanan-janaka izy mirahalahy; ary Eleazara sy Itamara no nanao fisoronana teo anatrehan''i Arona rainy.'
mg1865::mg_4::3::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::3::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ento ny firenen''i Levy hanatona, ka ampitoero eo anatrehan''i Arona mpisorona mba hanompo azy.'
mg1865::mg_4::3::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitandrina ny anjara-raharahan''i Arona sy ny anjara raharahan''ny fiangonana rehetra eo anoloan''ny trano-lay fihaonana izy, ka hanao ny fanompoana ao amin''ny tabernakely.'
mg1865::mg_4::3::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitandrina ny fanaka rehetra momba ny trano-lay fihaonana sy ny anjara-raharahan''ny Zanak''Isiraely izy ka hanao ny fanompoana ao amin''ny tabernakely.'
mg1865::mg_4::3::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homenao an''i Arona sy ny zananilahy ny Levita; efa nomena azy mihitsy avy amin''ny Zanak''Isiraely ireo.'
mg1865::mg_4::3::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Arona sy ny zananilahy hotendrenao hitandrina ny fisoronany; fa raha olon-kafa no manakaiky, dia hatao maty izy.'
mg1865::mg_4::3::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::3::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho efa naka ny Levita avy tamin''ny Zanak''Isiraely ho solon''ny lahimatoa rehetra izay voalohan-teraka eo amin''ny Zanak''Isiraely: dia Ahy ny Levita,'
mg1865::mg_4::3::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria Ahy ny lahimatoa rehetra; tamin''ilay andro namelezako ny voalohan-teraka rehetra tany amin''ny tany Egypta no nanamasinako ny voalohan-teraka rehetra eo amin''ny Isiraely ho Ahy, na olona, na biby fiompy: Ahy ireo; Izaho no Jehovah.'
mg1865::mg_4::3::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy tany an''efitr''i Sinay ka nanao hoe:'
mg1865::mg_4::3::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alamino ny Levita araka ny fianakaviany sy ny fokony; ny lahy rehetra eo aminy hatramin''ny iray volana no ho miakatra no halaminao.'
mg1865::mg_4::3::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nandamina azy araka ny tenin''i Jehovah, araka izay efa nandidiana azy.'
mg1865::mg_4::3::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no zanakalahin''i Levy, araka ny anarany: Gersona sy Kehata ary Merary.'
mg1865::mg_4::3::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny zanakalahin''i Gersona, araka ny fianakaviany: Libny sy Simey.'
mg1865::mg_4::3::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Kehata, araka ny fianakaviany, dia Amrama sy Jizara sy Hebrona ary Oziela.'
mg1865::mg_4::3::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Merary, araka ny fianakaviany, dia Maly sy Mosy. Ireo no fokon''ny Levita, araka ny fianakaviany.'
mg1865::mg_4::3::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''i Gersona ny fokon''ny Libnita sy ny Simeita: Ireo no fokon''ny Gersonita.'
mg1865::mg_4::3::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nalamina, araka ny isan''ny lahy rehetra hatramin''ny iray volana no ho miakatra, dia diman-jato amby fito arivo.'
mg1865::mg_4::3::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fokon''ny Gersonita dia hitoby eo ivohon''ny tabernakely, dia eo andrefany.'
mg1865::mg_4::3::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny fianakavian''ny Gersonka dia Efiasafa, zanak''i Laela.'
mg1865::mg_4::3::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjara-raharahan''ny zanak''i Gersona eo amin''ny trano-lay fihaonana dia ny tabernakely sy ny lay sy ny firakony sy ny varavarana lamba amin''ny varavaran''ny trano-lay fihaonana,'
mg1865::mg_4::3::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fefi-lamban''ny kianja sy ny vavahady lamba amin''ny vavahadin''ny kianja, izay manodidina ny tabernakely sy ny alitara, ary ny kofehy rehetra momba azy.'
mg1865::mg_4::3::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy tamin''i Kehata ny fokon''ny Amramita sy ny fokon''ny Jizarita sy ny fokon''ny Hebronita ary ny fokon''ny Ozielita; ireo no fokon''ny Kehatita.'
mg1865::mg_4::3::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny isan''ny lahy rehetra hatramin''ny iray volana no ho miakatra, izay mpitandrina ny anjara-raharaha momba ny fitoerana masina, dia enin-jato amby valo arivo.'
mg1865::mg_4::3::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fokon''ny zanak''i Kehata dia hitoby eo amin''ny lafiny atsimo amin''ny tabernakely.'
mg1865::mg_4::3::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny fianakaviana amin''ny fokon''ny Kehatita dia Elisafana, zanak''i Oziela.'
mg1865::mg_4::3::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjara-raharahany dia ny fiara sy ny latabatra sy ny fanaovan-jiro sy ny alitara roa, ary ny fanaky ny fitoerana masina, izay fanaovana fanompoam-pivavahana, ary ny varavarana lamba mbamin''ny zavatra rehetra fanaovana ny fanompoana momba azy.'
mg1865::mg_4::3::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehiben''ny lohan''ny Levita dia Eleazara, zanak''i Arona mpisorona, izay lehiben''ny mpitandrina ny anjara-raharaha ny amin''ny fitoerana masina.'
mg1865::mg_4::3::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''i Merary ny fokon''ny Malita sy ny fokon''ny Mosita; Ireo no fokon''i Merary.'
mg1865::mg_4::3::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nalamina, araka ny isan''ny lahy rehetra hatramin''ny iray volana no ho miakatra, dia roan-jato amby enina arivo,'
mg1865::mg_4::3::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny fianakaviana amin''ny fokon''i Merary dia Zoriela, zanak''i Abihaila; ireo no hitoby eo amin''ny lafiny avaratra amin''ny tabernakely.'
mg1865::mg_4::3::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjara-raharahan''ny zanak''i Merary dia ny zana-kazo amin''ny tabernakely sy ny barany sy ny andriny ary ny faladiany, ary ny fanaka rehetra momba azy, sy ny zavatra rehetra enti-manao fanompoana ao,'
mg1865::mg_4::3::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tsangantsangan''ny kianja manodidina sy ny faladiany sy ny tsimany ary ny kofehiny.'
mg1865::mg_4::3::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mitoby eo anoloan''ny taberna-kely atsinanany, dia eo anoloan''ny trano-lay fihaonana, tandrifin''ny fiposahan''ny masoandro, dia Mosesy sy Arona ary ny zanany izay mpitandrina ny anjara-raharaha momba ny fitoerana masina, dia ny anjara-raharahan''ny Zanak''Isiraely; ary raha olon-kafa no manakaiky, dia hatao maty izy.'
mg1865::mg_4::3::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''izay nalamina avy tamin''ny Levita, dia izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah, avy tamin''ny fokony, ny lahy rehetra hatramin''ny iray volana no ho miakatra, dia roa arivo amby roa alina.'
mg1865::mg_4::3::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Alamino ny lahimatoa rehetra eo amin''ny Zanak''Isiraely hatramin''ny iray volana no ho miakatra, ka alao isa ny anarany.'
mg1865::mg_4::3::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ho Ahy ny Levita ho solon''ny lahimatoa rehetra eo amin''ny Zanak''Isiraely: Izaho no Jehovah; ary ny biby fiompin''ny Levita ho solon''ny voalohan-teraka rehetra amin''ny biby fiompin''ny Zanak''Isiraely.'
mg1865::mg_4::3::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalamin''i Mosesy ny lahimatoa rehetra teo amin''ny Zanak''Isiraely, araka izay efa nandidian''i Jehovah azy.'
mg1865::mg_4::3::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lahimatoa rehetra, araka ny anarany tsirairay hatramin''ny iray volana no ho miakatra, izay nalamina avy taminy dia telo amby fito-polo sy roan-jato sy roa arivo sy roa alina.'
mg1865::mg_4::3::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::3::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny Levita ho solon''ny lahimatoa rehetra eo amin''ny Zanak''Isiraely; ary ny biby fiompin''ny Levita ho solon''ny biby fiompiny: Ahy ny Levita; Izaho no Jehovah.'
mg1865::mg_4::3::46:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny avotry ny telo amby fito-polo sy roan-jato amin''ny lahimatoan''ny Zanak''Isiraely, izay mihoatra isa noho ny Levita,'
mg1865::mg_4::3::47:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hangalanao sekely dimy isan-olona; araka ny sekely masina no hangalanao azy (gera roa-polo ny sekely iray).'
mg1865::mg_4::3::48:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia homenao an''i Arona sy ny zanany ny vola ho avotr''ireo mihoatra isa ireo.'
mg1865::mg_4::3::49:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nandray ny vola izay avotry ny nihoatra isa noho ny voavotry ny Levita;'
mg1865::mg_4::3::50:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny lahimatoan''ny Zanak''Isiraely no nandraisany ny vola, dia sekely dimy amby enim-polo sy telon-jato sy arivo, araka ny sekely masina;'
mg1865::mg_4::3::51:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 3
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nomen''i Mosesy an''i Arona sy ny zanany izany vola avotra izany, araka ny tenin''i Jehovah, dia araka izay efa nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::4::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny raharahan''ny Levita, sy ny isany isam-pirazanany'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe:'
mg1865::mg_4::4::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao isa ny taranak''i Kehata eo amin''ny taranak''i Levy, araka ny fokony sy ny fianakaviany,'
mg1865::mg_4::4::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra miditra amin''ny antokony hanao raharaha ao amin''ny trano-lay fihaonana.'
mg1865::mg_4::4::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ho fanompoan''ny taranak''i Kehata ao amin''ny trano-lay fihaonana, dia ny zavatra masina indrindra:'
mg1865::mg_4::4::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hifindra ny toby, dia hiditra Arona sy ny zanany ka hampidina ny efitra lamba fanakonana; ary hasarony ny fiaran''ny Vavolombelona* izany; [*Dia ny didy folo]'
mg1865::mg_4::4::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hodi-takasy no hataony sarona eo amboniny, ka lamba volon''ondry manga tokam-bolo no hovelariny hasarony eo ambonin''io, dia hataony eo aminy ny baony.'
mg1865::mg_4::4::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamelatra lamba, volon''ondry manga eo ambonin''ny latabatry ny mofo aseho izy, ka hataony eo ny lovia sy ny lovia kely sy ny kapoaka ary ny fitoeran-divay ho fanidinana; ary ny mofo aseho* dia hataony eo amboniny. [*Hebreo: mofo lalandava]'
mg1865::mg_4::4::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hovelarany lamba jaky eo amboniny izy, ka hosaronany amin''ny sarona hodi-takasy izany; dia hataony eo aminy ny baony.'
mg1865::mg_4::4::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haka lamba volon''ondry manga izy, ka hasarony ny fanaovan-jiro fanazavana sy ny lela fanaovan-jirony sy ny hetin-jirony sy ny fitoeran-davenon-jirony ary ny fitoeran-diloilo rehetra eo, izay anaovana ny fanompoam-pivavahana;'
mg1865::mg_4::4::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ireo sy ny fanaka rehetra momba azy dia hataony ao anatin''ny sarona hodi-takasy ka hatainginy eo ambonin''ny filanjana azy.'
mg1865::mg_4::4::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamelatra lamba manga eo ambonin''ny alitara volamena izy, dia hosaronany sarona hodi-takasy, ary hataony eo aminy ny baony;'
mg1865::mg_4::4::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia halainy ny fanaka rehetra enti-manompo, dia izay fanaovany fanompoam-pivavahana ao amin''ny fitoerana masina, ka hataony ao anaty lamba volon''ondry manga ka hosaronany sarona hodi-takasy, dia hatainginy eo ambonin''ny filanjana azy.'
mg1865::mg_4::4::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanaisotra ny lavenona amin''ny alitara izy ka hamelatra lamba volomparasy eo amboniny.'
mg1865::mg_4::4::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hapetrany eo amboniny avokoa ny fanaka rehetra momba azy, izay fanaovana fanompoan-pivavahana eo, dia ny fitondran''afony sy ny fitrebiny sy ny sotron''afony ary ny loviany famafazana, dia ny fanaka rehetra momba ny alitara; ary hovelarany sarona hodi-takasy eo amboniny izy, dia hataony eo aminy ny baony.'
mg1865::mg_4::4::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vitan''i Arona sy ny zanany ny manarona ny fitoerana masina sy ny fanaka rehetra momba azy, ka efa hifindra ny toby, dia vao izay no ho avy ny zanak''i Kehata hitondra azy; fa tsy hikasika ny fitoerana masina izy, fandrao maty. Izany zavatra momba ny trano-lay fihaonana izany no ho anjara entan''ny taranak''i Kehata.'
mg1865::mg_4::4::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny raharahan''i Eleazara, zanak''i Arona mpisorona, dia ny diloilo hatao fanazavana sy ny ditin-kazo mani-pofona sy ny fanatitra hohanina fanao isan''andro ary ny diloilo fanosorana, dia ny raharaha rehetra amin''ny tabernakely sy izay rehetra ao anatiny amin''ny fitoerana masina sy ny fanaka momba azy.'
mg1865::mg_4::4::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe:'
mg1865::mg_4::4::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy izay tsy hahafongotra ny fokon''ny Kehatita tsy ho amin''ny Levita:'
mg1865::mg_4::4::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izao no hataonareo aminy, mba ho velona izy ka tsy ho faty, raha manatona ny zavatra masina indrindra: Arona ny ny zanany ihany no hahazo miditra ka hanendry azy rehetra samy ho amin''ny fanompoany avy sy amin''ny entany avy;'
mg1865::mg_4::4::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izy dia tsy hiditra hijery ny fitoerana* masina, na dia indray mipi-maso akory aza, fandrao maty. [*Na: zavatra]'
mg1865::mg_4::4::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::4::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao isa koa ny taranak''i Gersona, araka ny fianakaviany sy ny fokony avy;'
mg1865::mg_4::4::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona no halaminao, dia izay rehetra miditra amin''ny antokony hanao fanompoana ao amin''ny trano-lay fihaonana.'
mg1865::mg_4::4::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ho fanompoan''ny fokon''ny Gersonita hanompoany sy hitondrany entana:'
mg1865::mg_4::4::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny ambain''ny tabernakely sy ny trano-lay fihaonana sy ny firakony sy ny sarona hodi-takasy izay eo amboniny, ary ny varavarana lamba amin''ny varavaran''ny trano-lay fihaonana,'
mg1865::mg_4::4::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fefy lamban''ny kianja sy ny vavahady lamba amin''ny vavahadin''ny kianja, izay manodidina ny tabernakely sy ny alitara, ary ny kofehiny mbamin''ny fiasana rehetra momba azy; ary izay rehetra hatao amin''ireo no ho fanompoany.'
mg1865::mg_4::4::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny tenin''i Arona sy ny zanany no hanaovan''ny Gersonita ny fanompoany amin''ny entany rehetra sy ny fanompoany rehetra; ary hatolotrao azy ho anjara-raharahany ny zavatra rehetra izay ho entiny.'
mg1865::mg_4::4::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ho fanompoan''ny fokon''ny Gersonita ny amin''ny trano-lay fihaonana; ary ny ho mpifehy azy amin''izany anjara-raharahany izany dia Itamara, zanak''i Arona mpisorona.'
mg1865::mg_4::4::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny taranak''i Merary, dia araka ny fokony sy ny fianakaviany no handaminanao azy;'
mg1865::mg_4::4::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona no halaminao, dia izay rehetra miditra amin''ny antokony hanao ny fanompoana momba ny trano-lay fihaonana.'
mg1865::mg_4::4::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho anjara-raharahany ny amin''ny entana araka ny fanompoany rehetra ao amin''ny trano-lay fihaonana: ny zana-kazo amin''ny tabernakely sy ny barany sy ny andriny sy ny faladiany,'
mg1865::mg_4::4::32:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny tsangantsangan''ny kianja manodidina sy ny faladiany sy ny tsimany rehetra ary ny kofehy momba ny fiasana rehetra sy ny zavatra rehetra enti-manao fanompoana ao; ary araka ny anarany avy no handaminanareo ny fanaka izay anjarany ho entina.'
mg1865::mg_4::4::33:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ho fanompoan''ny fokon''ny taranak''i Merary, araka ny fanompoany rehetra ao amin''ny trano-lay fihaonana, ary Itamara, zanak''i Arona mpisorona, no ho mpifehy azy.'
mg1865::mg_4::4::34:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy sy Arona ary ny lohan''ny fiangonana nandamina ny taranaky ny Kehatita, araka ny fokony sy ny fianakaviany avy,'
mg1865::mg_4::4::35:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra tamin''ny antokony hanao fanompoana ao amin''ny trano-lay fihaonana.'
mg1865::mg_4::4::36:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nalamina taminy, araka ny fokony, dia dimam-polo amby fiton-jato sy roa arivo.'
mg1865::mg_4::4::37:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no nalamina tamin''ny fokon''ny Kehatita, dia izay rehetra manao fanompoana ao amin''ny trano-lay fihaonana, izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah nampitondrainy an''i Mosesy.'
mg1865::mg_4::4::38:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nalamina tamin''ny taranak''i Gersona, araka ny fokony sy ny fianakaviany,'
mg1865::mg_4::4::39:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra amin''ny antokony hanao fanompoana ao amin''ny trano-lay fihaonana'
mg1865::mg_4::4::40:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nalamina taminy, araka ny fokony sy ny fianakaviany, dia telo-polo amby enin-jato sy roa arivo.'
mg1865::mg_4::4::41:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no nalamina tamin''ny fokon''ny taranak''i Gersona, izay rehetra manao fanompoana ao amin''ny trano-lay fihaonana, dia izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah.'
mg1865::mg_4::4::42:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nalamina tamin''ny fokon''ny taranak''i Merary, araka ny fokony sy ny fianakaviany'
mg1865::mg_4::4::43:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra tamin''ny antokony, hanao fanompoana ao amin''ny trano-lay fihaonana,'
mg1865::mg_4::4::44:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nalamina taminy, araka ny fokony, dia roan-jato sy telo arivo;'
mg1865::mg_4::4::45:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'ireo no nalamina tamin''ny fokon''ny taranak''i Merary, izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah izay nampitondrainy an''i Mosesy.'
mg1865::mg_4::4::46:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tontalin''ny taranak''i Levy izay nalamin''i Mosesy sy Arona mbamin''ny lohan''ny Isiraely, araka ny fokony sy ny fianakaviany'
mg1865::mg_4::4::47:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra hanao raharaha amin''ny fanompoana sy ny fitondrana entana ao amin''ny trano-lay fihaonana,'
mg1865::mg_4::4::48:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nalamina taminy dia valo-polo amby diman-jato sy valo arivo.'
mg1865::mg_4::4::49:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 4
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny didin''i Jehovah izay nampitondrainy an''i Mosesy no nandaminany azy samy ho amin''ny fanompoany avy sy ny anjara-entany avy ary ny zavatra nalamina araka izay nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_4::5::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Lalàna ny amin''ny famoahana izay misy fahalotoana ho any ivelan''ny toby'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::5::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandidia ny Zanak''Isiraely hamoaka ny boka rehetra sy ny marary mitsika rehetra ary ny maloto amim-paty rehetra hiala amin''ny toby;'
mg1865::mg_4::5::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'na lehilahy na vehivavy dia samy havoakanareo any ivelan''ny toby, mba tsy handoto ny tobiny izay itoerako eo afovoany.'
mg1865::mg_4::5::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao izany ny Zanak''Isiraely ka namoaka ireny ho any ivelan''ny toby; araka izay nolazain''i Jehovah tamin''i Mosesy no nataon''ny Zanak''Isiraely.'
mg1865::mg_4::5::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny amin''ny fanonerana, raha misy manao izay mahadiso'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::5::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny Zanak''Isiraely hoe: Raha misy lehilahy na vehivavy manao izay mety ho fahotan''ny olona ka manao izay mahadiso amin''i Jehovah ary meloka,'
mg1865::mg_4::5::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy maintsy hiaiky ny fahotana izay nataony izy ary hanonitra ny amin''ny fahadisoany ka hanampy azy ho tonga avy fahenina, ary homeny an''ilay nanaovany diso.'
mg1865::mg_4::5::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tàhiny tsy manana havana akaiky haterany ny fanonerana ny amin''ny fahadisoany ilay olona, ny zavatra naterina ho fanonerana dia ho an''i Jehovah ka ho an''ny mpisorona, ho fanampin''ny ondrilahy fanavotana izay hanaovany fanavotana ho azy.'
mg1865::mg_4::5::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatitra rehetra alaina amin''ny zava-masina rehetra aterin''ny Zanak''Isiraely, izay ateriny ho an''ny mpisorona, dia ho azy izany.'
mg1865::mg_4::5::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho azy ny zava-masina aterin''ny olona rehetra; na inona na inona omen''olona ho an''ny mpisorona, dia ho azy izany.'
mg1865::mg_4::5::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny lalàna ny amin''ny fanatitra noho ny ahiahy'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::5::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely, ka lazao aminy hoe: Na iza na iza vadin''olona mivily ka manao izay mahadiso azy amin''ny lahy,'
mg1865::mg_4::5::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nisy lehilahy nandry taminy, nefa tsy hitan''ny lahy, fa miafina, ary voaloto ravehivavy, nefa tsy misy vavolombelona hiampanga azy, ary tsy azo olan-tanana izy;'
mg1865::mg_4::5::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa misy fiahiahiana ao amin''ny lahy, ka miahiahy ny vadiny izy, sady efa voaloto ravehivavy; na misy fiahiahiana ao amin''ny lahy, ka miahiahy ny vadiny izy, kanjo tsy voaloto ravehivavy;'
mg1865::mg_4::5::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho entin''ny lahy ho eo amin''ny mpisorona ny vadiny, ary hitondra ny fanatiny noho ny vavy izy, dia kobam-bary hordea ampahafolon''ny efaha; tsy hanidinany diloilo izany, sady tsy hasiany ditin-kazo mani-pofona, satria fanatitra noho ny ahiahy izany, dia fanati-pahatsiarovana, hampahatsiaro heloka.'
mg1865::mg_4::5::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampanakaiky azy ny mpisorona ka hampitoetra azy eo anatrehan''i Jehovah;'
mg1865::mg_4::5::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia haka rano masina amin''ny lovia tany ny mpisorona; ary ny vovoka eo amin''izay itoeran''ny tabernakely dia hangalan''ny mpisorona ka hataony amin''ny rano;'
mg1865::mg_4::5::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ravehivavy dia hampitoeran''ny mpisorona eo anatrehan''i Jehovah, ka harakarakany ny volondohan-dravehivavy, ary hataony eo an-tanany ny fanati-pahatsiarovana, dia ny fanatitra noho ny ahiahy; ary ho eo an-tanan''ny mpisorona ny ranom-pangidiana izay mitondra ozona;'
mg1865::mg_4::5::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hampianiana an-dravehivavy ny mpisorona ka hanao aminy hoe: Raha tsy nisy lehilahy nandry taminao, ka tsy nivily niala tamin''ny vadinao ho amin''ny fahalotoana ianao, dia afaka amin''ity ranom-pangidiana mitondra ozona ity;'
mg1865::mg_4::5::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha nivily niala tamin''ny vadinao kosa ianao ka voaloto ihany, fa nisy lehilahy nandry taminao, afa-tsy ny vadinao,'
mg1865::mg_4::5::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hampianiana an-dravehivavy ny mpisorona mba hiozona, ka hanao aminy hoe: Jehovah anie hanao anao ho fiozonana sy ho fianianana eo amin''ny firenenao, amin''ny fampifezahan''i Jehovah ny fenao sy ny fampivontosany ny kibonao;'
mg1865::mg_4::5::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ity rano mitondra ozona ity dia hiditra ao an-kibonao ka hampivonto ny kibonao sy hampifezaka ny fenao. Ary ravehivavy hanao hoe: Amena, amena.'
mg1865::mg_4::5::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosoratan''ny mpisorona amin''ny taratasy izany fiozonana izany ka hosasany eo amin''ny rano mangidy ny soratra;'
mg1865::mg_4::5::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hampisotroiny an-dravehivavy ny ranom-pangidiana mitondra ozona; aty ny rano izay mitondra ozona dia hiditra ao anatiny ho zava-mangidy.'
mg1865::mg_4::5::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia halain''ny mpisorona eo an-tanan-dravehivavy ny fanatitra noho ny ahiahy; ary hahevahevany eo anatrehan''i Jehovah izany ka hateriny eo amin''ny alitara.'
mg1865::mg_4::5::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia horaofin''ny mpisorona ny fanati-pahatsiarovana avy amin''ny fanatitra ka hodorany ho fofona eo ambonin''ny alitara; ary rehefa afaka izany, dia hampisotroiny io rano io ravehivavy.'
mg1865::mg_4::5::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nampisotroina ny rano izy, ary voaloto, satria nanao izay nahadiso azy tamin''ny vadiny, dia hiditra ao anatiny ho zava-mangidy ny rano mitondra ozona, ary hivonto ny kibony, sady hifezaka ny feny; ka dia ho fiozonana eo amin''ny fireneny ravehivavy.'
mg1865::mg_4::5::28:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa kosa, raha tsy voaloto ravehivavy, fa madio, dia ho afaka izy ka hanan''anaka.'
mg1865::mg_4::5::29:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no lalàna ny amin''ny ahiahy, raha misy vehivavy mivily miala amin''ny vadiny ka voaloto;'
mg1865::mg_4::5::30:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'na misy lehilahy azon''ny fiahiahiana ka miahiahy ny vadiny; dia hampitoetra ny vadiny eo anatrehan''i Jehovah izy, ary ny mpisorona hanefa izany lalàna rehetra izany aminy.'
mg1865::mg_4::5::31:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy hanan-tsiny ralehilahy, fa ravehivavy kosa ho meloka.'
mg1865::mg_4::6::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny lalàna ny amin''ny mivoady ho Nazirita'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::6::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha misy lehilahy na vehivavy mivoady hitokana ho Nazirita mba hitokana ho an''i Jehovah,'
mg1865::mg_4::6::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hifady divay sy toaka izy; tsy hisotro divay efa maharikivy na toaka efa maharikivy izy, ary tsy hisotro ranom-boaloboka izy, na hihinana voaloboka akory, na ny lena, na ny maina.'
mg1865::mg_4::6::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro fitokanany rehetra dia tsy hihinana izay atao amin''ny voaloboka hatramin''ny voany ka hatramin''ny hodiny izy.'
mg1865::mg_4::6::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro rehetra izay nivoadiany hitokana dia tsy hokasihin-kareza ny lohany; mandra-pahatapitry ny andro izay nitokanany ho an''i Jehovah dia ho masina izy, ka havelany haniry ny volondohany.'
mg1865::mg_4::6::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro rehetra izay itokanany ho an''i Jehovah dia tsy hiditra am-paty izy;'
mg1865::mg_4::6::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'aoka tsy handoto tena izy na dia amin''ny rainy, na ny reniny, na ny rahalahiny, na ny anabaviny aza, raha maty ireo, satria eo amin''ny lohany ny fitokanana ho an''Andriamaniny.'
mg1865::mg_4::6::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro fitokanany rehetra dia ho masina ho an''i Jehovah izy.'
mg1865::mg_4::6::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona maty tampoka eo anilany ka mandoto ny lohany izay fitokanany dia hanaratra ny lohany amin''ny andro fanadiovana azy izy, dia amin''ny andro fahafito no hanaratany azy;'
mg1865::mg_4::6::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''ny andro fahavalo dia hitondra domohina roa na zana-boromailala roa ho eo amin''ny mpisorona, eo anoloan''ny varavaran''ny trano-lay fihaonana izy.'
mg1865::mg_4::6::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona dia hanatitra ny anankiray ho fanatitra noho ny ota, ary ny anankiray kosa ho fanatitra dorana, dia hanao fanavotana ho azy, satria nanota ny amin''ny faty izy; ary hanamasina ny lohany amin''izany andro izany izy.'
mg1865::mg_4::6::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanokana ho an''i Jehovah ny androny fitokanany izy ka hitondra ondrilahy iray izay iray taona ho fanati-panonerana; fa ho very ny andro teo aloha, satria voaloto ny fitokanany'
mg1865::mg_4::6::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no lalàna ny amin''ny Nazirita: Rehefa tapitra ny andro fitokanany, dia ho entina ho eo anoloan''ny varavaran''ny trano-lay fihaonana izy;'
mg1865::mg_4::6::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hanatitra ny fanatiny ho an''i Jehovah izy, dia ondrilahy iray izay iray taona tsy misy kilema ho fanatitra dorana, ary ondrivavy iray izay iray taona tsy misy kilema ho fanatitra noho ny ota, ary ondrilahy iray tsy misy kilema ho fanati-pihavanana,'
mg1865::mg_4::6::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mofo tsy misy masirasira iray harona, dia mofo atao amin''ny koba tsara toto voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo, mbamin''ny fanatitra hohanina sy ny fanatitra aidina momba azy.'
mg1865::mg_4::6::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haterin''ny mpisorona eo anatrehan''i Jehovah ireo; ary hateriny koa ny fanatiny noho ny ota sy ny fanatitra dorany;'
mg1865::mg_4::6::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hateriny ny ondrilahy ho fanati-pihavanana ho an''i Jehovah mbamin''ny mofo tsy misy masirasira iray harona; ary haterin''ny mpisorona koa ny fanatitra hohaniny sy ny fanatitra aidiny.'
mg1865::mg_4::6::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Nazirita hanaratra, ny lohany izay fitokanany eo anoloan''ny varavaran''ny trano-lay fihaonana, ary horaisiny ny volon-dohany fitokanany ka hataony eo amin''ny afo izay eo ambanin''ny fanati-pihavanana.'
mg1865::mg_4::6::19:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia halain''ny mpisorona ny sorok''ondrilahy izay efa masaka sy mofo iray tsy misy masirasira avy amin''ny harona ary mofo manify iray tsy misy masirasira ka hataony eo amin''ny tanan''ny Nazirita, rehefa voaharatra ny lohany izay fitokanany.'
mg1865::mg_4::6::20:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hahevahevan''ny mpisorona ireo ho fanatitra ahevaheva eo anatrehan''i Jehovah; ho masina izany ho an''ny mpisorona ho fanampin''ny tratra ahevaheva sy ny soroka asandratra; ary rehefa afaka izany, dia vao mahazo misotro divay ny Nazirita.'
mg1865::mg_4::6::21:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no lalàna ny amin''ny Nazirita, izay mivoady hitondra fanatitra ho an''i Jehovah noho ny fitokanany, afa-tsy izay zavatra hafa tratry ny ananany; araka ny voady izay nivoadiany no hataony, araka ny lalàna ny amin''ny fitokanany.'
mg1865::mg_4::6::22:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny tso-drano fanaon''ny mpisorona'
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::6::23:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin''i Arona sy ny zanany hoe: Izao no teny ho entinareo mitso-drano ny Zanak''Isiraely:'
mg1865::mg_4::6::24:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitahy anao anie Jehovah ka hiaro anao;'
mg1865::mg_4::6::25:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampamirapiratra ny tavany aminao anie Jehovah ka hamindra fo aminao;'
mg1865::mg_4::6::26:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanandratra ny tavany aminao anie Jehovah ka hanome anao fiadanana.'
mg1865::mg_4::6::27:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hametraka ny anarako amin''ny Zanak''Isiraely izy; ary Izaho hitahy azy.'
mg1865::mg_4::7::1:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny zavatra naterin''ny lohan''ny firenen''ny Isiraely ho amin''ny fitokanana ny alitara'
  verse_text: 'Ary tamin''ny andro izay nahavitan''i Mosesy ny nananganana ny tabernakely dia nanosotra sy nanamasina azy izy mbamin''ny fanaka rehetra momba azy ary ny alitara sy ny fanaka rehetra momba azy; ary rehefa nanosotra sy nanamasina ireo izy,'
mg1865::mg_4::7::2:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitondra fanatitra ny lohan''ny firenen''ny Isiraely, dia ny lohan''ny fianakaviana (ireo no lohan''ny firenena, izay nifehy ny voalamina).'
mg1865::mg_4::7::3:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nitondra ny fanatiny teo anatrehan''i Jehovah, dia sariety enina mirakotra sy omby roa ambin''ny folo, dia sariety iray no avy amin''ny lohan''ny firenena roa, ary omby iray avy; dia nitondra ireo teo anoloan''ny tabernakely izy.'
mg1865::mg_4::7::4:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe:'
mg1865::mg_4::7::5:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raiso aminy ireo hanaovana ny fanompoana momba ny trano-lay fihaonana, ka omeo ny Levita, dia samy araka ny fanompoany avy.'
mg1865::mg_4::7::6:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Mosesy ny sariety sy ny omby ka nomeny ny Levita.'
mg1865::mg_4::7::7:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sariety roa sy omby efatra no nomeny ho an''ny taranak''i Gersona, araka ny fanompoany;'
mg1865::mg_4::7::8:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary sariety efatra sy omby valo no nomeny ho an''ny taranak''i Merary, araka ny fanompoany, eo amin''ny fehin''Itamara, zanak''i Arona mpisorona.'
mg1865::mg_4::7::9:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny taranak''i Kehata kosa dia tsy mba nomeny na dia iray akory aza, satria ny fanompoana momba ny fitoerana masina no azy, ka eo an-tsorony ihany no hilanjany azy.'
mg1865::mg_4::7::10:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny lohan''ny firenena no nanatitra ho amin''ny fitokanana ny alitara tamin''ny andro izay nanosorana azy; koa dia samy nanatitra ny fanatiny teo anoloan''ny alitara izy.'
mg1865::mg_4::7::11:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Aoka ny lohan''ny firenena samy hanatitra ny fanatiny amin''ny an''androny avy ho amin''ny fitokanana ny alitara.'
mg1865::mg_4::7::12:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nanatitra ny fanatiny tamin''ny andro voalohany dia Nasona, zanak''i Aminadaba, avy tamin''ny firenen''i Joda.'
mg1865::mg_4::7::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatiny dia lovia volafotsy iray, sekely telo-polo amby zato no lanjany, sy lovia volafotsy iray famafazana, sekely fito-polo, araka ny sekely masina; izy roa samy feno koba tsara toto voaharo diloilo, ho fanatitra hohanina;'
mg1865::mg_4::7::14:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'lovia kely volamena iray, sekely folo, feno ditin-kazo manitra;'
mg1865::mg_4::7::15:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary vantotr''ombilahy iray sy ondrilahy iray ary zanak''ondry iray izay iray taona, ho fanatitra dorana;'
mg1865::mg_4::7::16:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary osilahy iray, ho fanatitra noho ny ota;'
mg1865::mg_4::7::17:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak''ondry dimy izay iray taona; ireo no fanatitr''i Nasona, zanak''i Aminadaba.'
mg1865::mg_4::7::18:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro faharoa dia Netanela, zanak''i Zoara, lohan''ny taranak''Isakara, no nanatitra.'
