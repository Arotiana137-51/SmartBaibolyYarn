  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro fahadimy ambin''ny folo amin''ny volana fahafito dia hisy fivoriana masina ho anareo; aza manao tao-zavatra akory, fa mitandrema ny andro firavoravoana hafitoana ho an''i Jehovah.'
mg1865::mg_4::29::13:
  verse_version: mg1865
  verse_book: mg_4
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no atero ho fanatitra dorana, dia fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah: vantotr''ombilahy telo ambin''ny folo sy ondrilahy roa ary zanak''ondry efatra ambin''ny folo, izay iray taona avy sady tsy misy kilema.'
