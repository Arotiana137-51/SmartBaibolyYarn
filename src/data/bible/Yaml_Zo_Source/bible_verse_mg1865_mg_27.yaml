mg1865::mg_27::1::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Daniela sy ny namany telo lahy'
  verse_text: 'Tamin''ny taona fahatelo nanjakan''i Joiakima, mpanjakan''ny Joda, no nankanesan''i Nebokadnezara, mpanjakan''i Babylona, tany Jerosalema sy nanaovany fahirano azy.'
mg1865::mg_27::1::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo nanolotra an''i Joiakima, mpanjakan''ny Joda, mbamin''ny fanaka sasany tao an-tranon''Andriamanitra ho eo an-tanany, ka nentiny ho any amin''ny tany Sinara ireny, ho ao an-tranon''andriamaniny; koa ny fanaka dia nampidiriny tao amin''ny trano firaketan''andriamaniny.'
mg1865::mg_27::1::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Aspenaza, lehiben''ny tandapany, hitondra ny sasany amin''ny Zanak''Isiraely, dia amin''ny zanak''andriana na amin''ny ambony firazanana,'
mg1865::mg_27::1::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia zatovo izay tsy nisy kilema, fa tsara tarehy sady kanto amin''ny fahendrena rehetra sy manam-pahalalana ary mazava saina ka miendrika hitoetra ao an-dapan''ny mpanjaka sady nasainy nampianarina ny taratasy sy ny tenin''ny Kaldeana.'
mg1865::mg_27::1::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nampanokana hanina ho an''ireo isan''andro avy tamin''ny haniny sy avy tamin''ny divay izay fisotrony mba hamelomana azy telo taona, ary rehefa afaka izany, dia hitoetra eo anatrehan''ny mpanjaka izy.'
mg1865::mg_27::1::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ireo dia nisy avy amin''ny taranak''i Joda, dia Daniela sy Hanania sy Misaela ary Azaria.'
mg1865::mg_27::1::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nomen''ny lehiben''ny tandapa anarana, ka Daniela nataony hoe Beltesazara, ary Hanania nataony hoe Sadraka, ary Misaela nataony hoe Mesaka, ary Azaria nataony hoe Abednego.'
mg1865::mg_27::1::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Daniela ninia tao am-pony tsy handoto ny tenany tamin''ny anjara-hanina avy tamin''ny hanin''ny mpanjaka, na tamin''ny divay izay fisotrony; ka dia nangataka tamin''ny lehiben''ny tandapa izy mba havelany tsy handoto ny tenany.'
mg1865::mg_27::1::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''Andriamanitra nahita fitia sy famindram-po tamin''ilay lehiben''ny tandapa Daniela.'
mg1865::mg_27::1::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay lehiben''ny tandapa tamin''i Daniela: Matahotra ny mpanjaka tompoko izay nampanokana ny hohaninareo sy ny hosotroinareo aho; fa hanao ahoana raha mahita ny tarehinareo mahia noho ny an''ny zatovo namanareo izy, moa tsy hahameloka ahy amin''ny mpanjaka va ianareo, ka hotapahiny ny lohako?'
mg1865::mg_27::1::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Daniela tamin''ny mpiadidy, izay notendren''ny lehiben''ny tandapa ho mpiadidy an''i Daniela sy Hanania sy Misaela ary Azaria:'
mg1865::mg_27::1::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, izahao toetra hafoloana izahay mpanomponao, ary aoka homena hanin-kotrana hohaninay sy rano hosotroinay.'
mg1865::mg_27::1::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka hizahana eo anatrehanao ny tarehinay sy ny tarehin''ny zatovo izay mihinana ny anjara avy amin''ny hanin''ny mpanjaka, ary araka izay hitanao no ataovy amin''ny mpanomponao.'
mg1865::mg_27::1::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanaiky izany teny izany izy ka nizaha toetra azy hafoloana.'
mg1865::mg_27::1::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tapitra ny hafoloana, dia hita fa mandimandina sy matavy aza ny tarehiny noho ny an''ny zatovo rehetra izay nihinana anjara avy tamin''ny hanin''ny mpanjaka.'
mg1865::mg_27::1::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia najanon''ilay mpiadidy ny anjara-haniny sy ny divay hosotroiny, ka hanin-kotrana no nomeny azy.'
mg1865::mg_27::1::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo zatovo efa-dahy ireo dia nomen''Andriamanitra fahalalana sy saina ny amin''ny taratasy sy ny fahendrena rehetra; ary Daniela nahafantatra ny amin''ny fahitana sy ny nofy rehetra.'
mg1865::mg_27::1::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny andro nasain''ny mpanjaka hampidirana azy, dia nentin''ilay lehiben''ny tandapa niditra teo anatrehan''i Nebokadnezara izy.'
mg1865::mg_27::1::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka niresaka taminy, ka tsy nisy hita izay tahaka an''i Daniela sy Hanania sy Misaela ary Azaria tamin''izy rehetra, ka dia nitoetra teo anatrehan''ny mpanjaka izy ireo.'
mg1865::mg_27::1::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny fahendrena sy ny fahalalana rehetra izay nanontanian''ny mpanjaka azy, dia hitany fa nanan-tombo im-polo heny noho ny ombiasy rehetra sy ny mpisikidy izay teo amin''ny fanjakany rehetra aza izy.'
mg1865::mg_27::1::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Daniela nahatratra ny taona voalohany nanjakan''i Kyrosy mpanjaka.'
mg1865::mg_27::2::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nofin''i Nebokadnezara, sy ny nilazan''i Daniela ny hevitr''izany'
  verse_text: 'Ary tamin''ny taona faharoa nanjakan''i Nebokadnezara dia nanonofy Nebokadnezara, ka nitebiteby ny fanahiny, ary tsy nahita torimaso izy.'
mg1865::mg_27::2::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasain''ny mpanjaka nantsoina ny ombiasy sy ny mpisikidy sy ny mpanana ody ary ny Kaldeana hilaza amin''ny mpanjaka ny nofiny. Dia tonga ireny ka nitsangana teo anatrehan''ny mpanjaka.'
mg1865::mg_27::2::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Nanonofy aho, ka mitebiteby ta-hahalala ny nofy ny fanahiko.'
mg1865::mg_27::2::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''ny mpanjaka amin''ny teny Aramiana ireny Kaldeana ireny ka nanao hoe: Ry mpanjaka o, ho velona mandrakizay anie ianao, ambarao aminay mpanomponao ny nofy, dia holazainay ny heviny.'
mg1865::mg_27::2::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ny mpanjaka ka nanao tamin''ireny Kaldeana ireny hoe: Efa niloa-bava aho*; raha tsy hampahafantarinareo ahy ny nofy sy ny heviny, dia hotetitetehina ianareo, ary ny tranonareo hatao trano fivoahana. [*Na: efa hadinoko ilay nonofisiko]'
mg1865::mg_27::2::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha milaza ny nofy sy ny heviny kosa ianareo, dia hahazo fanomezana sy valim-pitia ary voninahitra be; koa ambarao ahy ny nofy mbamin''ny heviny.'
mg1865::mg_27::2::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly indray ireo ka nanao hoe: Aoka ny mpanjaka hilaza ny nofy aminay mpanompony, dia hambaranay ny heviny.'
mg1865::mg_27::2::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka namaly ka nanao hoe: Fantatro marimarina fa mandany andro foana ianareo, satria hitanareo fa efa niloa-bava aho.1'
mg1865::mg_27::2::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy hampahafantarinareo ahy ny nofy, dia lalàna iray monja no hitondrana anareo; fa ianareo miray tetika hilaza teny lainga sy arirarira foana eto anatrehako mandra-pahatongan''izay andro mahamety*; koa ambarao ahy ny nofy, dia ho fantatro fa mahalaza ny heviny amiko koa ianareo. [*Aramiana. mandra-piovan''ny andro]'
mg1865::mg_27::2::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Kaldeana namaly teo anatrehan''ny mpanjaka hoe: Tsy misy olona ety ambonin''ny tany mahay milaza izany nofin*''ny mpanjaka izany; fa tsy mbola nisy mpanjaka, na dia izay lehibe sy mahery aza, nila zavatra toy izany tamin''ny ombiasy sy ny mpisikidy ary ny Kaldeana. [* [*Aramiana: tenin'']'
mg1865::mg_27::2::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sarotra ny zavatra anontanian''ny mpanjaka, ka tsy misy mahay milaza izany eo anatrehan''ny mpanjaka afa-tsy ireo andriamanitra, izay tsy manam-ponenana amin''ny nofo.'
mg1865::mg_27::2::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vinitra sady tezitra indrindra ny mpanjaka noho izany, ka nasainy naringana ny olon-kendrin''i Babylona rehetra.'
mg1865::mg_27::2::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navoaka ny didy nampamono ny olon-kendry; ary Daniela sy ny namany koa mba notadiaviny hovonoina.'
mg1865::mg_27::2::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novalian''i Daniela tamin''ny fanahy sy ny fahendrena Arioka lehiben''ny mpiambina ny mpanjaka, izay nivoaka hamono ny olon-kendrin''i Babylona;'
mg1865::mg_27::2::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, namaly izy ka nanao tamin''i Arioka, lehibe voatendrin''ny mpanjaka, hoe: Nahoana no dia mafy toy izany ny teny avy amin''ny mpanjaka? Dia nambaran''i Arioka tamin''i Daniela ilay teny.'
mg1865::mg_27::2::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra Daniela ka nangataka tamin''ny mpanjaka hanome andro azy, dia holazainy amin''ny mpanjaka ny hevitry ny nofy.'
mg1865::mg_27::2::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Daniela nody tany an-tranony ka nanambara ilay teny tamin''i Hanania sy Misaela ary Azaria namany,'
mg1865::mg_27::2::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hangatahan''ireo famindram-po amin''Andriamanitry ny lanitra ny amin''izany zava-miafina izany, mba tsy haringana Daniela sy ny namany mbamin''ny olon-kendrin''i Babylona rehetra.'
mg1865::mg_27::2::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naseho an''i Daniela tamin''ny fahitana amin''ny alina izany zava-miafina izany, ka dia nisaotra an''Andriamanitry ny lanitra Daniela.'
mg1865::mg_27::2::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, niteny izy ka nanao hoe: Isaorana anie ny anaran''Andriamanitra mandrakizay mandrakizay, fa Azy ny fahendrena sy ny hery.'
mg1865::mg_27::2::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no mandahatra* ny andro sy ny fotoana; Izy no manaisotra mpanjaka sy manangana mpanjaka; Izy no manome fahendrena ho an''ny hendry sy fahalalana ho an''izay mazava saina. [* [*Aramiana: manova]'
mg1865::mg_27::2::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no mampiseho ny zavatra lalina sy miafina; Izy no mahalala izay ao amin''ny maizina, ary ny mazava mitoetra ao aminy.'
mg1865::mg_27::2::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: '2022-10-24T04:42:43+0000'
  verse_title: null
  verse_text: 'Ianao, ry Andriamanitry ny razako o, no deraiko sy isaorako, satria nomenao fahendrena sy hery aho, ary ankehitriny efa nampahafantarinao ahy izay nangatahinay taminao; fa nampahafantarinao anay ilay nofin''ny mpanjaka.'
mg1865::mg_27::2::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany Daniela dia niditra nankao amin''i Arioka, izay notendren''ny mpanjaka handringana ny olon-kendrin''i Babylona, eny, nandeha izy ka nanao taminy hoe: Aza mandringana ny olon-kendrin''i Babylona; fa ento ho eo anatrehan''ny mpanjaka aho, dia hambarako aminy ny hevitry ny nofiny.'
mg1865::mg_27::2::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentin''i Arioka faingana ho eo anatrehan''ny mpanjaka Daniela, ka hoy izy taminy: Nahita lehilahy isan''ny babo avy any Joda aho, izay hilaza amin''ny mpanjaka ny hevitry ny nofy.'
mg1865::mg_27::2::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjaka namaly ka nilaza tamin''i Daniela, izay atao hoe koa Beltesazara, hoe: Moa mahay manambara amiko ny nofy izay hitako mbamin''ny heviny va ianao?'
mg1865::mg_27::2::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly teo anatrehan''ny mpanjaka Daniela nanao hoe: Ilay zava-miafina nanontanian''ny mpanjaka dia tsy hain''ny olon-kendry, na ny mpisikidy, na ny ombiasy, na ny mpanandro, nolazaina tamin''ny mpanjaka;'
mg1865::mg_27::2::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa misy Andriamanitra any an-danitra, Izay mampiseho zava-miafina ka mampahafantatra an''i Nebokadnezara mpanjaka izay ho tonga any am-parany. Ny nofinao sy ny fahitan''ny lohanao teo amin''ny farafaranao dia izao:'
mg1865::mg_27::2::29:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny aminao, ry mpanjaka o, raha nandry ianao, dia tonga ny eritreritrao ny amin''izay ho avy rahatrizay; ary Izay mampiseho zava-miafina dia mampahafantatra anao izay ho avy.'
mg1865::mg_27::2::30:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho aza, dia tsy noho ny fahendrena ananako mihoatra noho ny olombelona rehetra tsy akory no nampisehoana tamiko ny zava-miafina, fa ny mba hampahafantarana ny mpanjaka ilay hevitra, ka hahafantaranao ny eritreritry ny fonao.'
mg1865::mg_27::2::31:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, ry mpanjaka o, nahita fa, indro, nisy sariolona lehibe anankiray. Izany sary izany dia lehibe sady namirapiratra tsara, nijoro teo anatrehanao izy, ary ny tarehiny dia nahatahotra.'
mg1865::mg_27::2::32:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohan''izany sary izany dia volamena tsara, ny tratrany sy ny sandriny dia volafotsy, ny kibony sy ny feny dia varahina,'
mg1865::mg_27::2::33:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny ranjony dia vy, ary ny tongony dia vy sy tanimanga.'
mg1865::mg_27::2::34:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nijery ianao ambara-pahanisy vato voaendaka, nefa tsy nendahan-tanana, ary namely ilay sary teo amin''ny tongony vy sy tanimanga iny ka nahatorotoro azy.'
mg1865::mg_27::2::35:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niara-torotoro* ny vy sy ny tanimanga sy ny varahina sy ny volafotsy ary ny volamena ka tonga toy ny akofa eo am-pamoloana fahavaratra; ary nopaohin''ny rivotra izy, ka tsy nisy hitoerany, ary ilay vato namely ny sary dia tonga tendrombohitra lehibe nahafeno ny tany rehetra. [*Na: torotoro tamin''ny indray mamely monja]'
mg1865::mg_27::2::36:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nofy, ary holazainay eto anatrehan''ny mpanjaka koa ny heviny.'
mg1865::mg_27::2::37:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, ry mpanjaka o, izay mpanjakan''ny mpanjaka sady nomen''Andriamanitry ny lanitra fanjakana sy hery sy fahaleovana ary voninahitra,'
mg1865::mg_27::2::38:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ny zanak''olombelona sy ny bibi-dia ary ny voro-manidina, na aiza na aiza itoerany, dia nomeny ho eo an-tananao, ary nataony ho mpanjakan''izy rehetra ianao, dia ianao izany loha volamena izany.'
mg1865::mg_27::2::39:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manarakaraka anao dia hisy fanjakana hafa hitsangana ambany noho ny anao, ary hisy fanjakana fahatelo koa izay varahina sady hanam-pahefana amin''ny tany rehetra.'
mg1865::mg_27::2::40:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanjakana fahefatra dia ho mafy toy ny vy; fa toy ny vy manorotoro sy mahamongomongo ny zavatra rehetra, ary toy ny famakivakin''ny vy ireo rehetra ireo, dia toy izany no amakivakiany sy anorotoroany azy.'
mg1865::mg_27::2::41:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria hitanao ny tongotra sy ny rantsan-tongotra, fa ny tapany tanimangan''ny mpanefy tanimanga, ary ny tapany vy dia ho fanjakana mizarazara izy; nefa hisy herim-by ao aminy, satria nahita vy miharo tanimanga mbola fotaka ianao.'
mg1865::mg_27::2::42:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny rantsan-tongotra, ny tapany vy, ny tapany tanimanga, dia ho toy izany ny fanjakana, ny tapany ho mafy, ary ny tapany ho malemy.'
mg1865::mg_27::2::43:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny nahitanao ny vy miharo tanimanga mbola fotaka, dia ho toy izany no hiharoany amin''ny taranak''olombelona; nefa tsy hitambatra izy, dia toy ny tsy fetezan''ny vy miharo amin''ny tanimanga.'
mg1865::mg_27::2::44:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andron''ireo mpanjaka ireo Andriamanitry ny lanitra dia hanorina fanjakana izay tsy ho rava mandrakizay; ary izany fanjakana izany tsy havela ho an''olon-kafa, fa ireo fanjakana rehetra ireo dia hotorotoroiny sy holevoniny, fa izy kosa hitoetra mandrakizay.'
mg1865::mg_27::2::45:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ilay nahitanao ny vato nendahana tamin''ny tendrombohitra, nefa tsy nendahan-tanana, sy ny nanorotoroany ny vy sy ny varahina sy ny tanimanga sy ny volafotsy ary ny volamena, dia ampahafantarin''Andriamanitra lehibe ny mpanjaka ny amin''ny zavatra ho avy rahatrizay: marina ny nofy, ary tsy maintsy ho to ny heviny.'
mg1865::mg_27::2::46:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka Nebokadnezara mpanjaka ka nivavaka tamin''i Daniela ary nampanatitra fanatitra sy hanitra ankasitrahana ho azy.'
mg1865::mg_27::2::47:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjaka namaly an''i Daniela ka nanao hoe: Marina tokoa fa Andriamanitrareo dia Andriamanitry ny andriamanitra sy Tompon''ny mpanjaka ary Mampiseho zava-miafina, ka dia nahay nampiseho izany zava-miafina izany ianao.'
mg1865::mg_27::2::48:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ny mpanjaka dia nanandratra an''i Daniela ho lehibe, ka nanome azy zavatra maro sady lehibe ary nanendry azy ho mpanapaka any Babylona sy ny fehiny rehetra, sy ho lehiben''ny mpanapaka ny olon-kendrin''i Babylona rehetra.'
mg1865::mg_27::2::49:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 2
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Daniela nangataka tamin''ny mpanjaka, ary izy nanendry an''i Sadraka sy Mesaka ary Abednego ho tonian''ny raharahan''i Babylona sy ny fehiny; ary Daniela dia teo am-bavahadin''ny mpanjaka.'
mg1865::mg_27::3::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanipazana an''i Sadraka sy Mesaka ary Abednego tao anatin''ny lafaoro nisy afo mirehitra'
  verse_text: 'Nebokadnezara mpanjaka nanao sariolona volamena, enim-polo hakiho ny hahavony, ary enina hakiho ny sakany; dia natsangany teo amin''ny tany lemaka Dora tamin''ny fehin''i Babylona izany.'
mg1865::mg_27::3::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Nebokadnezara mpanjaka naniraka nampamory ny solom-panjaka sy ny mpanapaka sy ny governora sy ny andriambaventy sy ny mpitahiry ny volam-panjakana sy ny mpahay lalàna sy ny mpitsara ary ny komandy isan-tokony mba hanamasina ilay sariolona efa natsangan''i Nebokadnezara mpanjaka.'
mg1865::mg_27::3::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: '2022-07-03T04:03:46+0000'
  verse_title: null
  verse_text: 'Dia nivory hanamasina ny sariolona izay efa natsangan''i Nebokadnezara mpanjaka ny solom-panjaka sy ny mpanapaka sy ny governora sy ny andriambaventy sy ny mpitahiry ny volam-panjakana sy ny mpahay lalàna sy ny mpitsara ary ny komandy isan-tokony, ka dia nitsangana tandrifin''ny sariolona izay efa natsangan''i Nebokadnezara ireo.'
mg1865::mg_27::3::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nisy mpikabary niantso mafy hoe: Izao no lazaina aminareo, ry fokom-pirenena, ry firenena sy samy hafa fiteny:'
mg1865::mg_27::3::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa mandre ny fanenon''ny anjomara sy ny sobaba sy ny lokanga sy ny samboka sy ny valiha sy ny symponia ary ny zava-maneno isan-karazany ianareo, dia miankohofa, ka mivavaha amin''ny sariolona volamena izay efa natsangan''i Nebokadnezara mpanjaka,'
mg1865::mg_27::3::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary na iza na iza no tsy miankohoka sy tsy mivavaka dia hatsipy miaraka amin''izay ho ao anatin''ny lafaoro misy afo mirehitra.'
mg1865::mg_27::3::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tamin''ny fotoana nandrenesan''ny fokom-pirenena rehetra ny fanenon''ny anjomara sy ny sobaba sy ny lokanga sy ny samboka sy ny valiha ary ny zava-maneno isan-karazany, dia niankohoka sy nivavaka tamin''ny sariolona volamena izay efa natsangan''i Nebokadnezara mpanjaka ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra.'
mg1865::mg_27::3::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia nisy Kaldeana sasany nanatona ka niampanga* ny Jiosy. [* [*Aramiana: nihinana ny nofon'']'
mg1865::mg_27::3::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny izy ka nanao tamin''i Nebokadnezara mpanjaka hoe: Ry mpanjaka o, ho velona mandrakizay anie ianao.'
mg1865::mg_27::3::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mpanjaka o, ianao efa nanao lalàna fa ny olona rehetra izay mandre ny fanenon''ny anjomara sy ny sobaba sy ny lokanga sy ny samboka sy ny valiha sy ny symponia ary ny zava-maneno isan-karazany dia hiankohoka hivavaka amin''ny sariolona volamena;'
mg1865::mg_27::3::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay tsy miankohoka sy tsy mivavaka kosa dia hatsipy ao anatin''ny lafaoro misy afo mirehitra.'
mg1865::mg_27::3::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa misy Jiosy izay nataonao ho tonian''ny raharaha amin''i Babylona sy ny fehiny, dia Sadraka sy Mesaka ary Abednego; ireo lehilahy ireo tsy mba manaiky ny teninao akory, ry mpanjaka o: tsy mba manompo ny andriamanitrao izy, na mivavaka amin''ny sariolona volamena izay efa natsanganao.'
mg1865::mg_27::3::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''ny fahavinirana sy ny fahatezerana Nebokadnezara, ka nasainy nalaina Sadraka sy Mesaka ary Abednego. Dia nentiny teo anatrehan''ny mpanjaka ireo lehilahy ireo.'
mg1865::mg_27::3::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny Nebokadnezara ka nanao taminy hoe: Moa fanahy ninianareo va, ry Sadraka sy Mesaka sy Abednego, no tsy mba anompoanareo ny andriamanitro, na ivavahanareo amin''ny sariolona volamena izay natsangako?'
mg1865::mg_27::3::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny raha miomana ianareo amin''izay handrenesanareo ny fanenon''ny anjomara sy ny samboka sy ny valiha sy ny symponia sy ny Sobaba sy ny lokanga ary ny zava-maneno isan-karazany ka miankohoka sy mivavaka amin''ny sariolona izay nataoko, dia tsara izany; fa raha tsy mety mivavaka kosa ianareo, dia hatsipy miaraka amin''izay ho ao anatin''ny lafaoro misy afo mirehitra; ary iza moa izany Andriamanitra hahavonjy anareo amin''ny tanako izany?'
mg1865::mg_27::3::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Sadraka sy Mesaka ary Abednego ka nanao tamin''ny mpanjaka hoe: Ry Nebokadnezara, tsy misy antony tokony hamalianay anao akory ny amin''izany zavatra izany.'
mg1865::mg_27::3::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Andriamanitra Izay tompoinay dia mahavonjy anay amin''ny lafaoro misy afo mirehitra sady hamonjy anay amin''ny tananao, ry mpanjaka o.'
mg1865::mg_27::3::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia tsy izany aza, aoka ho fantatrao, ry mpanjaka o, fa ny andriamanitrao dia tsy hotompoinay, ary ny sariolona volamena efa natsanganao dia tsy hivavahanay.'
mg1865::mg_27::3::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia feno fahatezerana Nebokadnezara, ka niova ny tarehiny tamin''i Sadraka sy Mesaka ary Abednego, dia nasainy nafanaina ho impito mihoatra noho ny famana azy ny lafaoro.'
mg1865::mg_27::3::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay lehilahy matanjaka indrindra tamin''ny miaramilany no nasainy namatotra an''i Sadraka sy Mesaka ary Abednego sy nanipy azy tao anatin''ny lafaoro nisy afo mirehitra.'
mg1865::mg_27::3::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nafatotra ireo lehilahy ireo, nefa mbola teny aminy ihany ny lobany sy ny akanjony ary ny kapôtiny mbamin''ny fitafiany hafa koa, ka dia natsipy teo anatin''ny lafaoro nisy afo mirehitra izy;'
mg1865::mg_27::3::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary satria mafy ny tenin''ny mpanjaka, ka natao mahamay indrindra ny lafaoro, dia matin''ny lelafo ireny lehilahy izay nanipy* an''i Sadraka sy Mesaka sy Abednego. [* [*Aramiana: nampiakatra]'
mg1865::mg_27::3::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy telo lahy ireo, Sadraka sy Mesaka sy Abednego, dia voatsipy am-patorana teo anatin''ny lafaoro nisy afo mirehitra.'
mg1865::mg_27::3::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona Nebokadnezara mpanjaka ary nitsangana faingana izy ka niteny tamin''ny mpanolo-tsainy hoe: Moa tsy telo lahy mifatotra va no natsipintsika tao anatin''ny afo? Dia namaly ny mpanjaka ireo ka nanao hoe: Marina izany, ry mpanjaka o.'
mg1865::mg_27::3::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Ka no indro aho mahita efa-dahy tsy mifatotra, mandehandeha eo anaty afo, nefa tsy maninona tsy maninona akory izy; ary ny fijery ilay fahefatra dia toa zanak''ireo andriamanitra.'
mg1865::mg_27::3::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona ny varavaran''ny lafaoro nisy afo mirehitra Nebokadnezara ka niantso hoe: Ry Sadraka sy Mesaka sy Abednego, mpanompon''Andriamanitra Avo Indrindra, mivoaha, ka avia aty. Dia nivoaka avy teo anatin''ny afo Sadraka sy Mesaka ary Abednego.'
mg1865::mg_27::3::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifanatona ny solo-mpanjaka sy ny mpanapaka sy ny governora ary ny mpanolotsain''ny mpanjaka ka nahita ireo lehilahy ireo, fa tsy nanan-kery hampaninona ny tenany akory ny afo, na nisy singam-bolo nikainkona tamin''ny lohany, na niova ny lobany, ary tsy nisy fofon''afo akory taminy.'
mg1865::mg_27::3::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nebokadnezara niteny ka nanao hoe: Isaorana anie Andriamanitr''i Sadraka sy Mesaka sy Abednego, Izay naniraka ny anjeliny hamonjy ny mpanompony izay natoky Azy ka nandika ny tenin''ny mpanjaka ary nanolotra ny tenany tsy hanompo na hivavaka amin''izay andriamani-kafa, afa-tsy Andriamaniny ihany.'
mg1865::mg_27::3::29:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia manao lalàna aho fa ny fokom-pirenena sy ny firenena sy ny samy hafa fiteny rehetra izay manao teny tsy mety ny amin''Andriamanitr''i Sadraka sy Mesaka sy Abednego dia hotetitetehina, ary hatao trano fivoahana ny tranony; fa tsy misy andriamani-kafa mahavonjy tahaka izao.'
mg1865::mg_27::3::30:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Sadraka sy Mesaka sy Abednego dia nasandratry ny mpanjaka tamin''i Babylona sy ny fehiny.'
mg1865::mg_27::3::31:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Ny nofy nananaran''Andriamanitra an''i Nebokadnezara, sy ny nahatanterahan''izany nofy izany'
  verse_text: 'Nebokadnezara mpanjaka nampitondra teny ho any amin''ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra, izay monina amin''ny tany rehetra, nanao hoe: Hitombo anie ny fiadananareo.'
mg1865::mg_27::3::32:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sitrako ny hanambara ny famantarana sy ny fahagagana izay nataon''Andriamanitra Avo Indrindra tamiko.'
mg1865::mg_27::3::33:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akory ny halehiben''ny famantarany! Ny fanjakany dia fanjakana mandrakizay, ary ny fanapahany dia hahatratra ny taranaka fara mandimby.'
mg1865::mg_27::4::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Nebokadnezara niadana tao an-tranoko ary faly finaritra* tao an-dapako. [* [*Aramiana: maitso]'
mg1865::mg_27::4::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanonofy zavatra nahatahotra aho ka nieritreritra teo am-pandriako, ary ny fahitan''ny lohako dia naharaiki-tahotra ahy.'
mg1865::mg_27::4::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nandidy aho mba ho entina eo anatrehako ny olon-kendrin''i Babylona rehetra hilaza amiko ny hevitry ny nofy.'
mg1865::mg_27::4::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra ny ombiasy sy ny mpisikidy sy ny Kaldeana ary ny mpanandro; ary nambarako teo anatrehany ny nofy, kanjo tsy nahalaza ny heviny tamiko ireny.'
mg1865::mg_27::4::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony farany dia niditra teo anatrehako kosa Daniela, izay atao hoe Beltesazara, araka ny anaran''andriamanitro, sady misy fanahin''ireo andriamanitra masina ao anatiny; ary ny nofy dia nambarako teo anatrehany hoe:'
mg1865::mg_27::4::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Beltesazara, lehiben''ny ombiasy, fantatro fa misy fanahin''ireo andriamanitra masina ao anatinao, ary tsy misy zava-miafina manahirana anao, koa ambarao ahy ny fahitana izay hitako tamin''ny nofy mbamin''ny heviny.'
mg1865::mg_27::4::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no fahitan''ny lohako teo am-pandriako: Nijery aho, ka, indro, nisy hazo teo afovoan''ny tany, ary fatratra ny hahavony.'
mg1865::mg_27::4::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihalehibe sy nihahery io hazo io, ary ny hahavony nipaka tamin''ny lanitra, ary ny fijery azy dia hatrany amin''ny faran''ny tany rehetra.'
mg1865::mg_27::4::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara tarehy ny raviny, ary betsaka ny voany, sady teo aminy no nisy hanina ho an''ny rehetra; teny ambaniny no nialokalofan''ny bibidia, ary teny amin''ny sampany no nitoeran''ny voro-manidina, ary ny nofo rehetra nahazo hanina avy aminy.'
mg1865::mg_27::4::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nijery tamin''ny fahitan''ny lohako teo am-pandriako aho, ka, indro, nisy mpiambina masina anankiray nidina avy tany an-danitra.'
mg1865::mg_27::4::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niantso mafy izy ka nanao hoe: Kapao io hazo io, dia rantsano; ahintsano ny raviny, ary aelezo ny voany; aoka ny biby hipariaka avy eo ambaniny, ary ny vorona hiboridana avy eny amin''ny rantsany.'
mg1865::mg_27::4::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa avelao amin''ny tany ao amin''ny ahitra maitso any an-tsaha ihany ny fotony, ka asio fehy vy sy varahina; ary aoka ho kotsan''ny andon''ny lanitra izy, ary aoka ny anjarany ho amin''ny biby any amin''ny ahitra amin''ny tany;'
mg1865::mg_27::4::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'aoka hovana ny fony tsy ho fon''olombelona, ary aoka ho fom-biby no ho ao aminy; ary aoka ho fetr''andro fito no holanina aminy.'
mg1865::mg_27::4::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Didin''ny mpiambina izany zavatra izany; eny, avy amin''ny tendrin''ireo masina izany zavatra izany, hahafantaran''ny velona fa ny Avo Indrindra no manapaka amin''ny fanjakan''ny olona ka manome izany ho an''izay tiany, ary olona ambany toetra no ampanapahiny azy.'
mg1865::mg_27::4::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nofy izay hitako, izaho Nebokadnezara. Ary ianao kosa, ry Beltesazara, milazà ny heviny, fa ny olon-kendry rehetra amin''ny fanjakako tsy nisy nahay nampahafantatra ahy ny hevitr''izany; fa ianao no mahay azy, satria misy fanahin''ireo andriamanitra masina no anatinao.'
mg1865::mg_27::4::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia gaga vetivety Daniela, izay atao hoe Beltesazara, ary ny eritreriny naharaiki-tahotra azy. Ary niteny ny mpanjaka nanao hoe: Ry Beltesazara o, aoka tsy haharaiki-tahotra anao ny nofy na ny heviny. Beltesazara namaly ka nanao hoe: Tompokolahy o, ny nofy anie ho an''izay mankahala anao, ary ny heviny ho an''izay fahavalonao.'
mg1865::mg_27::4::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Io hazo hitanao io, dia ilay nihalehibe sy nihahery, ka ny hahavony nipaka tamin''ny lanitra, ary ny fijery azy hatramin''ny tany rehetra,'
mg1865::mg_27::4::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny raviny dia tsara tarehy, sady betsaka ny voany, ary teo aminy nisy hanina ho an''ny rehetra, teny ambaniny no nitoeran''ny bibi-dia, ary teny amin''ny rantsany no nitoeran''ny voro-manidina,'
mg1865::mg_27::4::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ianao indrindra izany, ry mpanjaka o; ianao dia nihalehibe sy nihahery; fa ny halehibiazanao efa nitombo ka mipaka amin''ny lanitra, ary ny fanapahanao hatramin''ny faran''ny tany.'
mg1865::mg_27::4::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nahitan''ny mpanjaka ny mpiambina masina anankiray nidina avy tany an-danitra nanao hoe: Kapao io hazo io, ary simbao; nefa avelao amin''ny tany ao amin''ny ahitra maitso any an-tsaha ihany ny fotony, fa asio fehy vy sy varahina, ary aoka ho kotsan''ny andon''ny lanitra izy, ary aoka ny anjarany ho ao amin''ny bibi-dia, ambara-pahalanin''ny fetr''andro fito aminy,'
mg1865::mg_27::4::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'izao no heviny, ry mpanjaka, ary izao no tendrin''ny Avo Indrindra, izay mihatra amin''itompokolahy mpanjaka:'
mg1865::mg_27::4::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Horoahina hiala amin''ny olona ianao, ary ny fonenanao ho any amin''ny bibi-dia ary hampihinanina ahitra toy ny omby ianao ary ho kotsan''ny andon''ny lanitra, ary fetr''andro fito no holanina aminao, ambara-pahafantatrao fa ny Avo Indrindra no manapaka amin''ny fanjakan''ny olona ka manome izany ho an''izay tiany.'
mg1865::mg_27::4::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nasainy namelana ny fotony: ny fanjakanao mbola hampodina ho anao tokoa, rehefa fantatrao fa ny lanitra no manapaka.'
mg1865::mg_27::4::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka hankasitrahanao ny anatro, ry mpanjaka, ka dia ny fahamarinana no ento mampitsahatra* ny fahotanao, ary ny fiantrana ny mahantra no ento mampitsahatra* ny helokao, fandrao mba hampaharetina ahay ny fiadananao. [* [*Aramiana: anapaho]'
mg1865::mg_27::4::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany no nanjo an''i Nebokadnezara mpanjaka.'
mg1865::mg_27::4::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka roa ambin''ny folo volana, dia nitsangantsangana teo an-tampon''ny tranony tao Babylona izy.'
mg1865::mg_27::4::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka niteny ka nanao hoe: Tsy ity va no Babylona lehibe, izay nataoko ho lapan''ny fanjakana tamin''ny haben''ny heriko mba ho voninahitry ny fahalehibiazako?'
mg1865::mg_27::4::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola teo am-bavan''ny mpanjaka ihany ny teny, dia nisy feo latsaka avy tany an-danitra nanao hoe: Ry Nebokadnezara mpanjaka, ianao indrindra no anaovana hoe: Ny fanjakana niala taminao.'
mg1865::mg_27::4::29:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa horoahina hiala amin''ny olona ianao, ka ho any amin''ny bibi-dia ny fonenanao; hampihinanina ahitra toy ny omby ianao, ary fetr''andro fito no holanina aminao ambara-pahafantatrao fa ny Avo Indrindra no manapaka amin''ny fanjakan''ny olona ka manome izany ho an''izay tiany.'
mg1865::mg_27::4::30:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izay indrindra no nahatanterahan''izany tamin''i Nebokadnezara; fa noroahina niala tamin''ny olona izy ka nihinana ahitra toy ny omby, ary ny tenany dia kotsan''ny andon''ny lanitra ambara-panirin''ny volony ho toy ny an''ny voromahery, ary ny hohony ho toy ny an''ny vorona.'
mg1865::mg_27::4::31:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny andro, izaho Nebokadnezara nanandrandra ny masoko tamin''ny lanitra, ary nody tamiko indray ny saiko, ka dia nisaotra ny Avo Indrindra aho ary nidera sy nankalaza Izay velona mandrakizay, ny fanapahany dia fanapahana mandrakizay, ary ny fanjakany hahatratra ny taranaka fara mandimby;'
mg1865::mg_27::4::32:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mponina rehetra ety an-tany hatao tsinontsinona; ary manao izay sitrapony amin''ireo maro be any an-danitra sy amin''ny mponina ety an-tany Izy; ary tsy misy mahasakana Azy, na manao aminy hoe: Inona no ataonao?'
mg1865::mg_27::4::33:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izay dia nody tamiko ny saiko, ary nody tamiko koa ny fahalehibiazako sy ny voninahitro ho tabihan''ny fanjakako, ary ny mpanolotsaiko sy ny andriandahiko nikatsaka ahy, ka nampitoerina teo amin''ny fanjakako aho, sady nanampy ho ahy ny fahalehibiazana malaza.'
mg1865::mg_27::4::34:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, izaho Nebokadnezara midera sy manandratra ary mankalaza ny Mpanjakan''ny lanitra; marina avokoa ny asany rehetra, ary araka ny rariny ny lalany; ary izay mandeha amin''ny fiavonavonana dia hainy aetry.'
mg1865::mg_27::5::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanasana nataon''i Belsazara, sy ny sora-tanana niseho teo amin''ny rindrina'
  verse_text: 'Belsazara mpanjaka nanao fanasana lehibe ho an''ny mpanolo-tsainy arivo lahy, ary teo anatrehan''ireny no nisotroany divay.'
mg1865::mg_27::5::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony efa nisotro divay Belsazara, dia nasainy nalaina ny fanaka volamena sy volafotsy izay nalain''i Nebokadnezara rainy avy tao amin''ny tempoly tany Jerosalema, mba hisotroan''ny mpanjaka sy ny mpanolotsainy sy ny vadiny mbamin''ny vaditsindranony.'
mg1865::mg_27::5::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny ny fanaka volamena izay nalaina avy teo amin''ny tempolin''ny tranon''Andriamanitra tany Jerosalema, ary ny mpanjaka sy ny mpanolo-tsainy sy ny vadiny mbamin''ny vaditsindranony nisotro taminy.'
mg1865::mg_27::5::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nisotro divay izy sady nankalaza ny andriamanitra volamena sy volafotsy sy varahina sy vy sy hazo ary vato.'
mg1865::mg_27::5::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izay dia nisy rantsan-tanan''olona niseho ka nanoratra tandrifin''ny jiro tamin''ny lalotra sokay teo amin''ny rindrin''ny lapan''ny mpanjaka; ary ny mpanjaka nahita ilay rantsan-tanana nanoratra.'
mg1865::mg_27::5::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivaloarika ny tarehin''ny mpanjaka, ary naharaiki-tahotra azy ny eritreriny, ka dia nivahavaha ny valahany, sady niady ny lohaliny.'
mg1865::mg_27::5::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso mafy ny mpanjaka hampiditra ny mpisikidy sy ny Kaldeana ary ny mpanandro. Ary ny mpanjaka niteny ka nanao tamin''ny olon-kendrin''i Babylona hoe: Na zovy na zovy no mahavaky io soratra io sady milaza ny heviny amiko dia hampiakanjoina volomparasy, sy hasiana rojo volamena ny vozony, ary ho isan''ny mpanapaka telo lahy amin''ny fanjakana izy.'
mg1865::mg_27::5::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra avokoa ny olon-kendrin''ny mpanjaka, nefa tsy nisy nahavaky ny soratra na nampahalala ny mpanjaka ny heviny.'
mg1865::mg_27::5::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natahotra indrindra Belsazara mpanjaka, ka nivaloarika ny tarehiny, ary vaka tery ny mpanolo-tsainy.'
mg1865::mg_27::5::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny renin''ny mpanjaka niditra tao amin''ny trano fanasana noho ny tenin''ny mpanjaka sy ny mpanolo-tsainy; dia niteny ny renin''ny mpanjaka ka nanao hoe: Ry mpanjaka o, ho velona mandrakizay anie ianao, aoka tsy haharaiki-tahotra anao ny eritreritrao, na hivaloarika ny tarehinao.'
mg1865::mg_27::5::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy lehilahy ato amin''ny fanjakanao izay manana fanahin''ireo andriamanitra masina ao anatiny; ary fony fahavelon-drainao dia hita fa nisy fahazavan-tsaina sy fahalalana ary fahendrena tao aminy tahaka ny fahendren''ireo andriamanitra; ka nataon''i Nebokadnezara mpanjaka rainao, dia ny mpanjaka rainao, hoy izaho, ho lehiben''ny ombiasy sy ny mpisikidy sy ny Kaldeana ary ny mpanandro izy;'
mg1865::mg_27::5::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fanahy hendry sy fahalalana sy saina ary fahaiza-milaza nofy sy fanambarana teny sarotra sy fampisehoana hevitra miafina no hita tao amin''izany Daniela izany, izay nomen''ny mpanjaka anarana hoe Beltesazara, koa aoka hantsoina Daniela, fa holazainy ny hevitry ny teny.'
mg1865::mg_27::5::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampidirina teo anatrehan''ny mpanjaka Daniela. Ary ny mpanjaka niteny ka nanao tamin''i Daniela hoe: Ianao mantsy no Daniela, ilay isan''ny babo avy amin''ny taranak''i Joda, izay nentin''ny mpanjaka raiko avy tany Joda.'
mg1865::mg_27::5::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa reko ny aminao, fa ianao manana fanahin''ireo andriamanitra sady misy fahazavan-tsaina sy fahalalana ary fahendrena tsara hita ao aminao.'
mg1865::mg_27::5::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vao teo dia efa nampidirina teto anatrehako ny olon-kendry sy ny mpisikidy hamaky io soratra io sy hampahafantatra ahy ny heviny; fa tsy nahalaza ny hevitry ny teny izy;'
mg1865::mg_27::5::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa reko ny aminao, fa ianao no mahalaza hevitra sy mahay mampiseho hevitra miafina; koa raha mahavaky ny soratra sy mampahafantatra ahy ny heviny ianao, dia hampiakanjoina volomparasy, sy hasiana rojo volamena ny vozonao, ary ho isan''ny mpanapaka telo lahy amin''ny fanjakana ianao.'
mg1865::mg_27::5::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Daniela ka nanao teo anatrehan''ny mpanjaka hoe: Aoka ihany ho anao ny fanomezanao, ary ny valim-pitianao omeo ny hafa; nefa hovakiko amin''ny mpanjaka ihany ny soratra, ary hampahafantariko azy ny heviny.'
mg1865::mg_27::5::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny aminao, ry mpanjaka o, Andriamanitra Avo Indrindra efa nanome fanjakana sy fahalehibiazana sy voninahitra ary laza an''i Nebokadnezara rainao;'
mg1865::mg_27::5::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary noho ny fahalehibiazana izay nomeny azy, ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra dia nangovitra sy natahotra teo anatrehany; izay tiany hovonoina dia novonoiny; ary izay tiany hovelomina dia novelominy; ary izay tiany hasandratra dia nasandrany; ary izay tiany haetry dia naetriny.'
mg1865::mg_27::5::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony niavonavona kosa ny fony, ary nikikitra tamin''ny fireharehana ny fanahiny, dia naetry niala tamin''ny seza fiandrianan''ny fanjakany izy, ary ny voninahiny nesorina taminy;'
mg1865::mg_27::5::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia noroahina niala tamin''ny zanak''olombelona izy; ary ny fony natao tahaka ny an''ny biby, ary ny fonenany tany amin''ny boriki-dia, dia nampihinanina ahitra toy ny omby izy, ary kotsan''ny andon''ny lanitra ny tenany, ambara-pahafantany fa Andriamanitra Avo Indrindra no manapaka amin''ny fanjakan''ny olona, ary izay tiany no tendreny ho mpanjakany.'
mg1865::mg_27::5::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Belsazara zanany, dia tsy mba nampietry ny fonao, na dia fantatrao aza izany rehetra izany;'
mg1865::mg_27::5::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa niavonavona tamin''ny Tompon''ny lanitra ianao; ary ny fanaky ny tranon''Andriamanitra dia nentina eto anatrehanao, ary ianao sy ny mpanolo-tsainao sy ny vadinao mbamin''ny vaditsindranonao nisotro divay taminy; ary ianao nankalaza ny andriamanitra volafotsy sy volamena sy varahina sy vy sy hazo ary vato, izay tsy mahita, na mandre, na mahalala; fa Andriamanitra Izay mitana ny ainao sady Tompon''ny alehanao rehetra dia tsy mba nankalazainao.'
mg1865::mg_27::5::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia Izy no nihavian''ilay rantsan-tanana, ka voasoratra ireo teny ireo.'
mg1865::mg_27::5::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny teny voasoratra dia izao: Mene, Mene, Tekela, Oparesina*. [*Oparesina = sy Paresina]'
mg1865::mg_27::5::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no hevitry ny teny: Mene, voaisan''Andriamanitra ny nanjakanao ka taperiny amin''izao;'
mg1865::mg_27::5::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tekela, efa voalanja tamin''ny mizana ianao ka, indro, latsa-danja;'
mg1865::mg_27::5::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Paresa, zarazaraina ny fanjakanao ka omena ho an''ny Mediana sy ny Persiana.'
mg1865::mg_27::5::29:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Belsazara dia nanome teny, ka dia nampiakanjoina volomparasy Daniela, sady nasiana rojo volamena ny vozony, ary nisy niantso azy ho isan''ny mpanapaka telo lahy amin''ny fanjakana.'
mg1865::mg_27::5::30:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''io alina io ihany dia novonoina Belsazara, mpanjakan''ny Kaldeana.'
mg1865::mg_27::6::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Dariosa Mediana no nandray ny fanjakana, rehefa tokony ho roa amby enim-polo taona no andro niainany.'
mg1865::mg_27::6::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny amin''ny nanipazana an''i Daniela tao an-davaky ny liona'
  verse_text: 'Sitrak''i Dariosa ny hanendry solo-mpanjaka roa-polo amby zato hanapaka ny fanjakana, izay hanapaka ny fanjakana rehetra.'
mg1865::mg_27::6::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tamin''ireo dia nisy komandy lehibe telo lahy, ary Daniela no anankiray tamin''ireo, mba hilazan''ny solo-mpanjaka ny raharaha tsy hahafatiantoka ny mpanjaka.'
mg1865::mg_27::6::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany Daniela izany dia nihoatra noho ny komandy lehibe sy ny solo-mpanjaka namany, fa nanam-panahy hendry izy; ary ny mpanjaka nikasa hanandratra azy ho lehibe amin''ny fanjakana rehetra.'
mg1865::mg_27::6::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny komandy lehibe sy ny solo-mpanjaka dia nitady izay hiampangany an''i Daniela ny amin''ny fanjakana, nefa tsy nahita izay hiampangany azy na izay tsininy akory ireo, satria marina izy, ka tsy nisy kilema na tsiny hita taminy.'
mg1865::mg_27::6::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo lehilahy ireo: Tsy ho hitantsika izay hiampangantsika io Daniela io raha tsy ny amin''ny lalan''Andriamaniny no misy hitantsika hiampangana azy.'
mg1865::mg_27::6::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia somaritaka nivory ho any amin''ny mpanjaka ireo komandy lehibe sy solo-mpanjaka ireo; ary izao no nataony taminy: Ry Dariosa mpanjaka o, ho velona mandrakizay anie ianao.'
mg1865::mg_27::6::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny komandy lehibe rehetra amin''ny fanjakana sy ny mpanapaka sy ny solo-mpanjaka sy ny mpanolo-tsaina ary ny governora dia mifanara-kevitra fa tokony hanao lalàna sy didy mafy ianao, ry mpanjaka, ka na zovy na zovy no hanao fangatahana ato anatin''ny telo-polo andro, na amin''Andriamanitra na amin''olona, afa-tsy aminao ihany, ry mpanjaka o, dia hatsipy ao an-davaky ny liona izy.'
mg1865::mg_27::6::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny, ry mpanjaka o, ataovy mafy ny lalàna, ka asio sonia mba tsy hiova, araka ny lalàn''ny Mediana sy ny Persiana izay tsy azo ovana.'
mg1865::mg_27::6::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia nasian''i Dariosa mpanjaka sonia izany lalàna sy didy izany.'
mg1865::mg_27::6::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony fantatr''i Daniela fa efa voaisy sonia ny didy, dia nankao an-tranony izy; ary ny varavarankelin''ny tranony ambony nanandrify an''i Jerosalema dia nivoha. Koa intelo isan''andro no nandohalika ka nivavaka sy nisaotra teo anatrehan''Andriamaniny izy, satria fanaony hatramin''ny taloha izany.'
mg1865::mg_27::6::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia somaritaka nivory ireo lehilahy ireo ka nahita an''i Daniela mangataka sy mifona eo anatrehan''Andriamaniny.'
mg1865::mg_27::6::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona izy ka niteny teo anatrehan''ny mpanjaka noho ny amin''ilay lalàn''ny mpanjaka ka nanao hoe: Moa tsy misy lalàna nasianao sonia fa na zovy na zovy no hanao fangatahana, na amin''Andriamanitra na amin''olona, ato anatin''ny telo-polo andro afa-tsy aminao ihany, ry mpanjaka o, dia hatsipy ao an-davaky ny liona? Ny mpanjaka namaly ka nanao hoe: Marina izany, dia araka ny lalàn''ny Mediana sy ny Persiana izay tsy azo ovana.'
mg1865::mg_27::6::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny ireo ka nanao teo anatrehan''ny mpanjaka hoe: Ilay Daniela, isan''ny babo avy amin''ny taranak''i Joda, dia tsy manaiky anao, na ny lalàna izay nasianao sonia, ry mpanjaka o, fa manao fangatahana intelo isan''andro izy.'
mg1865::mg_27::6::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra indrindra ny mpanjaka, raha nahare izany teny izany, nefa matiny ihany izy ny hanafaka an''i Daniela, ka nanao izay tratry ny heviny hamonjy azy mandra-pilentiky ny masoandro.'
mg1865::mg_27::6::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia somaritaka nivory ho any amin''ny mpanjaka ireo lehilahy ireo ka nanao tamin''ny mpanjaka hoe: Aoka ho fantatrao, ry mpanjaka, fa izao no lalàn''ny Mediana sy ny Persiana: Ny lalàna sy ny didy izay efa navoaky ny mpanjaka dia tsy azo ovana.'
mg1865::mg_27::6::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy ny mpanjaka; ary nentina Daniela ka natsipy tao an-davaky ny liona. Dia niteny ny mpanjaka ka nanao tamin''i Daniela hoe: Andriamanitrao Izay tompoinao mandrakariva anie hamonjy anao.'
mg1865::mg_27::6::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vato natampina ny vava-lavaka; ary ny mpanjaka nanomboka izany tamin''ny fanombohan-kaseny sy tamin''ny fanombohan-kasen''ny andriandahiny, mba tsy hovana ny teny ny amin''i Daniela.'
mg1865::mg_27::6::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nody tany an-dapany ny mpanjaka ary tsy nitendry hanina mandritra ny alina, sady tsy nisy zava-maneno* nampidirina teo anatrehany, ary tsy nahita torimaso izy. [*Na: zazavavy mpandihy]'
mg1865::mg_27::6::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa ny mpanjaka ka nandeha faingana ho any amin''ny lavaky ny liona.'
mg1865::mg_27::6::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''ny lavaka izy, dia niantso an''i Daniela tamin''ny feo malahelo; eny, niteny ny mpanjaka ka nanao tamin''i Daniela hoe: Ry Daniela, mpanompon''Andriamanitra velona o, moa Andriamanitrao Izay tompoinao mandrakariva mahavonjy anao amin''ny liona va?'
mg1865::mg_27::6::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namaly ny mpanjaka Daniela hoe: Ry mpanjaka, ho velona mandrakizay anie ianao.'
mg1865::mg_27::6::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro efa naniraka ny anjeliny ka nanakombona ny vavan''ny liona tsy handratra ahy, satria fahamarinana no hitany tamiko; ary teo anatrehanao koa, ry mpanjaka o, tsy nanao ratsy aho.'
mg1865::mg_27::6::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia faly indrindra ny mpanjaka, ka nasainy nakarina avy ao an-davaka Daniela. Dia nakarina avy tao an-davaka Daniela, ary tsy hita nisy naratra izy, satria nino an''Andriamaniny.'
mg1865::mg_27::6::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy, ka nentina ireo lehilahy niampanga* an''i Daniela ireo, dia natsipy tao an-davaky ny liona izy mbamin''ny vadiny aman-janany, ary ny liona nanan-kery taminy ka nanapatapaka ny taolany, raha tsy mbola nipaka tamin''ny vodin''ny lavaka akory aza izy. [* [*Aramiana: nihinana ny nofony]'
mg1865::mg_27::6::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany Dariosa mpanjaka dia nanoratra ho amin''ny fokom-pirenena sy ny firenena sy ny samy hafa fiteny rehetra izay monina ambonin''ny tany rehetra hoe: Hitombo anie ny fiadananareo.'
mg1865::mg_27::6::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao lalàna aho mba hangovitan''ny olona sy hatahorany eo anatrehan''Andriamanitr''i Daniela eran''ny fanjakako rehetra; fa Izy no Andriamanitra velona sady maharitra mandrakizay; ny fanjakany haharitra hatramin''ny farany.'
mg1865::mg_27::6::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no mamonjy sy manafaka ary manao famantarana sy fahagagana any an-danitra sy ety an-tany, ary Izy no namonjy an''i Daniela ho afaka tamin''ny herin''ny liona.'
mg1865::mg_27::6::29:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany Daniela izany dia nambinina tamin''ny nanjakan''i Dariosa sy tamin''ny nanjakan''i Kyrosy Persiana.'
mg1865::mg_27::7::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana niseho tamin''i Daniela ny amin''ny fanjakana efatra lehibe, sy ny hitsaran''Andriamanitra ireo.'
  verse_text: 'Tamin''ny taona voalohany nanjakan''i Belsazara, mpanjakan''i Babylona, dia nanonofy Daniela sady nahita fahitana* tao am-pandriany, ary nosoratany ny nofy, ka nambarany ny fotopototry ny teny. [* [*Aramiana: fahitan''ny lohany]'
mg1865::mg_27::7::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny Daniela ka nanao hoe: Nahita tamin''ny fahitako tamin''ny alina aho, fa, indreo, ny rivotra efatry ny lanitra nibosesika teny amin''ny ranomasina lehibe.'
mg1865::mg_27::7::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy biby efatra lehibe samy hafa niakatra avy tamin''ny ranomasina.'
mg1865::mg_27::7::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voalohany dia toy ny liona ary nanana elatry ny voromahery; nijery aho ambara-panongotra ny elany, ary natsangana avy tamin''ny tany izy ka najoro tamin''ny tongony roa toy ny fijoron''ny olona, sady natao manana fon''olombelona izy.'
mg1865::mg_27::7::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary indro koa ny faharoa, biby hafa tahaka ny bera, izay nampisondrotra ny ila-tenany, sady nisy taolan-tehezana telo teo am-bavany anelanelan''ny nifiny; ary toy izao no voalaza taminy: Mitsangàna, homàna nofo be.'
mg1865::mg_27::7::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka izany, dia nahita aho fa, indro, nisy hafa koa toy ny leoparda, izay nanana ela-borona efatra teo an-damosiny, ary io biby io nanana loha efatra, ary nomena fanapahana izy.'
mg1865::mg_27::7::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony afaka izany, dia nahita tamin''ny fahitana tamin''ny alina aho, ary, indro ny fahefatra, biby mahatsiravina sady matanjaka sy mahery indrindra, ary nanana nify vy lehibe izy; nihinana sy nanotahota izy, ary ny sisa tsy laniny dia nohosihosen''ny tongony; ary hafa noho ny biby rehetra teo alohany izy sady nanana tandroka folo.'
mg1865::mg_27::7::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nodinihiko ny tandroka, ka, indro, nisy tandroka iray kely koa nipoitra teo aminy, ary novohana teo anoloan''io ny tandroka telo tamin''ireo taloha; ary, indro, nanana maso toy ny mason''olona sy vava miteny zavatra mihoa-pampana izy.'
mg1865::mg_27::7::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola nijery ihany aho mandra-pametraka ny seza fiandrianana, ary ny Fahagola no nipetraka teo, ny fitafiany dia fotsy toy ny fanala, ary ny volon-dohany toy ny volon''ondry madio; ny seza fiandrianany dia lelafo, ary ny kodiany dia afo mirehitra.'
mg1865::mg_27::7::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ony afo no nivoaka sy nandeha avy teo anatrehany; arivoarivo no nanompo Azy, ary alinalina no nitsangana teo anatrehany; nipetraka ny Mpitsara, ary novelarina ny boky.'
mg1865::mg_27::7::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mbola nijery ihany aho noho ny feon''ny teny mihoapampana notenenin''ilay tandroka; eny, nijery aho ambara-pamono ny biby, ka nolevonina ny tenany, ary natao teo amin''ny afo mirehitra izy.'
mg1865::mg_27::7::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny biby, sasany, dia nesorina taminy ny fanapahany; nefa nohalavaina ihany ny andro hiainany mandra-pahalanin''ny andro sy ny fotoana.'
mg1865::mg_27::7::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola nahita tamin''ny fahitana tamin''ny alina ihany aho, ary, indro, nisy toy ny zanak''olona avy tamin''ny rahon''ny lanitra, ary nankeo amin''ny Fahagola Izy, dia nampanakekeny teo anatrehany.'
mg1865::mg_27::7::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomena fanapahana sy voninahitra ary fanjakana Izy, mba hanompoan''ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra Azy; ny fanapahany dia fanapahana mandrakizay ka tsy ho tapaka, ary ny fanjakany tsy ho rava.'
mg1865::mg_27::7::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Daniela nalahelo tam-panahy, ary ny fahitan''ny lohako naharaiki-tahotra ahy.'
mg1865::mg_27::7::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanakaiky ilay anankiray tamin''izay nitsangana teo aho ka nanontany azy ny fototr''izany rehetra izany. Dia nambarany tamiko, ka nampahafantariny ahy ny hevitry ny zavatra.'
mg1865::mg_27::7::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo biby lehibe efatra ireo dia mpanjaka efatra izay hitsangana avy amin''ny tany.'
mg1865::mg_27::7::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny olo-masin''ny Avo Indrindra no hahazo ny fanjakana ary hanana ny fanjakana mandrakizay alaovalo.'
mg1865::mg_27::7::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniry hahalala izay fototra marina ny amin''ny fahefatra aho, dia ilay biby hafa noho izy rehetra sady mahatsiravina indrindra izay nanana nify vy sy hoho varahina sady nihinana sy nanotahota, ary ny sisa tsy laniny dia nohosihosen''ny tongony;'
mg1865::mg_27::7::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny amin''ny tandroka folo teo an-dohany sy ny anankiray koa izay nipoitra, ka nisy telo potraka teo anoloany, dia ilay tandroka nanana maso sy vava izay niteny zavatra mihoapampana, ary ny fijery azy dia lehibe noho ny namany.'
mg1865::mg_27::7::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola nijery ihany aho, ary izany tandroka izany nanoto ny olo-masina ka naharesy azy,'
mg1865::mg_27::7::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ambara-pihavin''ny Fahagola, ka nomena rariny ny olo-masin''ny Avo Indrindra; ary tonga ny fotoana nahazoan''ny olo-masina ny fanjakana.'
mg1865::mg_27::7::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nolazainy: Ilay fahefatra amin''ny biby dia fanjakana fahefatra ety ambonin''ny tany, izay ho hafa noho ny fanjakana rehetra sady handrava ny tany rehetra ary hanosihosy sy hanorotoro azy.'
mg1865::mg_27::7::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tandroka folo dia mpanjaka folo izay hitsangana avy amin''izany fanjakana izany; ary hisy iray koa hitsangana manaraka azy; hafa noho ny voalohany izy ary handresy mpanjaka telo.'
mg1865::mg_27::7::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiteny hanohitra ny Avo Indrindra izy sy hampahory ny olo-masin''ny Avo Indrindra ary hitady hanova fotoana sy lalàna; ary hatolotra eny an-tanany ireo ambara-pahatapitry ny fetr''andro iray sy ny fetr''andro roa ary ny antsasaky ny fetr''andro.'
mg1865::mg_27::7::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hipetraka ny Mpitsara, ary hesorina ny fanapahany, ka horavana sy hosimbana hatramin''ny farany izy.'
mg1865::mg_27::7::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanjakana sy ny fanapahana ary ny fahalehibiazan''ny fanjakana eny ambanin''ny lanitra rehetra dia homena ny olo-masin''ny Avo Indrindra; ny fanjakany dia fanjakana mandrakizay, ary ny fanapahana rehetra dia hanompo sy hanoa Azy.'
mg1865::mg_27::7::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''izao no faran''izany zavatra izany. Ny amiko, izaho Daniela, dia naharaiki-tahotra ahy indrindra ny eritreritro, ka nivaloarika ny tarehiko, nefa notehiriziko tao am-poko ihany izany zavatra izany.'
mg1865::mg_27::8::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fahavalo anankiray izay nampahory ny olon''Andriamanitra'
  verse_text: 'Tamin''ny taona fahatelo nanjakan''i Belsazara mpanjaka dia nisy fahitana niseho tamiko, izaho Daniela, taorian''ilay niseho tamiko tamin''ny voalohany.'
mg1865::mg_27::8::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita tamin''ny fahitana aho, ka raha mbola nijery aho, dia, indro, tao Sosana tao amin''ny lapan''ny mpanjaka izay ao amin''ny tany Elama aho; ary nahita tamin''ny fahitana aho, ka teo amoron''ny ony Olay aho.'
mg1865::mg_27::8::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natopiko ny masoko, ka hitako, fa, indro, nisy ondrilahy iray nitsangana teo amoron''ny ony, izay nanana tandroka roa; lava ireo tandroka ireo, ary ny anankiray lava noho ny anankiray, nefa ilay lavalava kokoa no niposaka taoriana.'
mg1865::mg_27::8::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitako ny ondrilahy manoto miankandrefana sy mianavaratra ary mianatsimo; ary tsy nisy biby nahajanona teo anoloany, ary tsy nisy naharombaka izay mby teny an-tanany; fa nanao araka izay sitrapony izy ka tonga lehibe*. [*Na: niavonavona]'
mg1865::mg_27::8::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nandinika aho, dia, indro, nisy osilahy nivoaka avy tany andrefana ka nitety ny tany rehetra, nefa tsy nikasika ny tany; ary ilay osilahy dia nanana tandroka lehibe teo anelanelan''ny masony.'
mg1865::mg_27::8::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nankeo amin''ilay ondrilahy nanana tandroka roa, dia ilay efa hitako nitsangana eo amoron''ny ony, ka nanazakazaka azy tamin''ny fahatezeran''ny heriny.'
mg1865::mg_27::8::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako nanatona ho eo anilan''ny ondrilahy izy, dia nisafoaka taminy ka namely ny ondrilahy ary nanapaka ny tandrony roa, ka tsy nahajanona teo anoloany intsony ilay ondrilahy, fa nazerany teo amin''ny tany ka nohitsakitsahiny; ary tsy nisy nahavonjy ilay ondrilahy teny an-tanany.'
mg1865::mg_27::8::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nihahery indrindra ilay osilahy; nefa nony nahery izy, dia tapaka ilay tandrony lehibe; ary nisy efatra lehibe nipoitra nisolo iny nifanandrify tamin''ny rivotra efatry ny lanitra.'
mg1865::mg_27::8::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tandroka kely nipoitra avy tamin''ny anankiray amin''ireny ka nihalehibe indrindra nianatsimo sy niantsinanana ary nankany amin''ny tany mahafinaritra.'
mg1865::mg_27::8::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihalehibe izy ka nihatra tamin''ireo maro be eny amin''ny lanitra; ary nisy nazerany ho amin''ny tany ireo maro be sy ny kintana ka nohitsakitsahiny.'
mg1865::mg_27::8::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nihalehibe izy ka dia niady tamin''ny Komandin''ireo maro be, ary nesorina taminy ny fanatitra isan''andro, ary ny fitoerana masina noravana.'
mg1865::mg_27::8::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy maro be mbamin''ny fanatitra isan''andro natolotra azy noho ny fahadisoana, dia nazerany ho amin''ny tany ny fahamarinana; ary niasa izy sady nambinina.'
mg1865::mg_27::8::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandre ny masina anankiray niteny aho, ary nisy masina iray koa nanao tamin''ilay niteny hoe: Mandra-pahoviana ny fahitana mandrakariva* sy ny fahotana mahatonga fandravana mba hanolorana ny fitoerana masina sy ireo maro be ho fanitsaka? [*Na: ny amin''ny fanatitra isan''andro]'
mg1865::mg_27::8::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Telon-jato sy roa arivo andro*; ary nony afaka izany, dia amin''izay vao hodiovina** ny fitoerana masina. [*Hebreo: hariva sy maraina] [**Hebreo: ho marina]'
mg1865::mg_27::8::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita ny fahitana izaho Daniela ka nitady hahafantatra izany, dia, indro, nisy nanana tarehy tahaka ny olona nitsangana teo anatrehako.'
mg1865::mg_27::8::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandre feon''olona tao afovoan''i Olay aho, izay niantso ka nanao hoe: Ry Gabriela, ampahalalao ny fahitana ity lehilahy ity.'
mg1865::mg_27::8::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nankeo amin''ilay nitsanganako izy; ary nony tonga izy, dia raiki-tahotra aho ka nikarapoka nihohoka; nefa hoy izy tamiko: Aoka ho fantatrao, ry zanak''olona, fa io fahitana io dia milaza ny farany.'
mg1865::mg_27::8::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niresaka tamiko izy, dia renoky ny torimaso teo amin''ny tany aho; fa izy nanohina nampitsangana ahy.'
mg1865::mg_27::8::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Indro, hampahafantariko anao izay ho tonga amin''ny fahatezerana farany; fa ho amin''ny fotoana any am-parany izany.'
mg1865::mg_27::8::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay ondrilahy hitanao nanana tandroka roa dia ny mpanjakan''i Media sy Persia.'
mg1865::mg_27::8::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny osilahy lava volo dia ny mpanjakan''i Grisia; ary ny tandroka lehibe teo anelanelan''ny masony dia ny mpanjaka voalohany.'
mg1865::mg_27::8::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ilay efa tapaka, ka nisy efatra nitsangana nandimby azy, dia hisy fanjakana efatra hitsangana avy amin''ny jentilisa, nefa tsy mitovy hery aminy.'
mg1865::mg_27::8::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hiafaran''ny fanjakany, rehefa tanteraky ny mpanota ny asany, dia hisy mpanjaka hitsangana, izay masia-tarehy sy mahafantatra zavatra saro-pantarina.'
mg1865::mg_27::8::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho be ny heriny, nefa tsy amin''ny herin''ny tenany; ary mahagaga ny fanimbana hataony; ary hambinina izy ka hahefa ary hanimba ny mahery sy ny olo-masina.'
mg1865::mg_27::8::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahafetseny koa no hahatanteraka ny fitaka eny an-tanany; ary izy hiavonavona am-po ka handringana ny maro amin''izay tsy ampoiziny; ary hitsangana hanohitra ny Andrianan''ny andriana izy, kanjo ho torotoro kosa, nefa tsy hisy tanana hamely azy tsinona.'
mg1865::mg_27::8::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia marina ny amin''ireo andro voalaza ireo, nefa ahorony ny fahitana, fa mbola ho andro maro izany.'
mg1865::mg_27::8::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho Daniela dia torana ka nandraiky narary andro vitsivitsy; ary nony afaka izany dia nitsangana aho ka nanao ny raharahan''ny mpanjaka; ary gaga aho ny amin''ny fahitana, nefa tsy nisy nahafantatra izany.'
mg1865::mg_27::9::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny vavaka nataon''i Daniela, sy ny teny nolazaina taminy ny amin''ny herinandro fito-polo'
  verse_text: 'Tamin''ny taona voalohany nanjakan''i Dariosa, zanak''i Ahasoerosy, avy amin''ny taranaky ny Mediana, izay nampanjakaina tamin''ny fanjakan''ny Kaldeana,'
mg1865::mg_27::9::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taona voalohany nanjakany, izaho Daniela nahalala tamin''ny boky ny isan''ny taona nampahafantarin''ny tenin''i Jehovah an''i Jeremia mpaminany, izay hahataperan''ny fito-polo taona amin''ny hahafoanan''i Jerosalema.'
mg1865::mg_27::9::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampanatrehiko an''Andriamanitra Tompo ny tavako hitady izay hivavahana sy hifonana amin''ny fifadian-kanina ny lamba fisaonana* ary ny lavenona. [*Hebreo: lamba malailay]'
mg1865::mg_27::9::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivavaka tamin''i Jehovah Andriamanitro aho ka nitsotra hoe: Indrisy! Tompo o, Andriamanitra lehibe sy mahatahotra, mitandrina ny fanekena sy ny famindram-po ho amin''izay tia Azy sy mitandrina ny didiny,'
mg1865::mg_27::9::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'efa nanota izahay sady nanao meloka ary nanao ratsy sy niodina, eny, efa niala tamin''ny didinao sy ny fitsipikao izahay,'
mg1865::mg_27::9::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nohenoinay ny mpaminany mpanomponao, izay niteny tamin''ny anaranao tamin''ny mpanjakanay sy ny mpanapaka anay sy ny razanay ary ny vahoaka rehetra.'
mg1865::mg_27::9::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anao ny fahamarinana, Tompo o, fa anay kosa ny fangaihaizana, tahaka ny amin''izao anio izao, dia an''ny Joda sy ny mponina any Jerosalema ary ny Isiraely rehetra, na ny akaiky na ny lavitra, dia any amin''ny tany rehetra izay efa nandroahanao azy noho ny fahadisoany izay nandisoany taminao;'
mg1865::mg_27::9::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, anay ny fangaihaizana, Tompo o, dia an''ny mpanjakanay sy ny mpanapaka anay ary ny razanay, satria efa nanota taminao izahay.'
mg1865::mg_27::9::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''ny Tompo Andriamanitray kosa ny famindram-po sy ny famelan-keloka, satria efa niodina taminy izahay'
mg1865::mg_27::9::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy nihaino ny feon''i Jehovah Andriamanitray, mba handeha araka ny lalàny izay nasainy napetraky ny mpaminany mpanompony teo anoloanay.'
mg1865::mg_27::9::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny Isiraely rehetra efa nandika ny lalànao ka niala, fa tsy nihaino ny feonao, ka dia naidina taminay ny ozona sy ny fianianana izay voasoratra ao amin''ny lalàn''i Mosesy, mpanompon''Andriamanitra, satria efa nanota taminy izahay.'
mg1865::mg_27::9::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary notanterahiny ny teniny, izay nolazainy hamelezana anay sy ny mpitsaranay izay nitsara anay, ka nataony niharan-doza lehibe izahay, fa tety ambanin''ny lanitra rehetra dia tsy mbola nisy natao tahaka izay natao tany Jerosalema.'
mg1865::mg_27::9::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny voasoratra ao amin''ny lalàn''i Mosesy no nahatongavan''izao loza rehetra izao taminay; nefa tsy nifona teo anatrehan''i Jehovah Andriamanitray izahay hialanay amin''ny helokay sy hahafantaranay ny fahamarinanao.'
mg1865::mg_27::9::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nitehirizan''i Jehovah ny loza, ka nataony mihatra aminay, fa marina Jehovah Andriamanitray amin''ny asany rehetra izay efa nataony; fa izahay no tsy nihaino ny feony.'
mg1865::mg_27::9::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, Tompo Andriamanitray o, Izay nitondra ny olonao nivoaka avy tany amin''ny tany Egypta tamin''ny tanana mahery ka nanao anarana ho Anao tahaka ny amin''izao anio izao, efa nanota izahay, efa nanao ratsy izahay.'
mg1865::mg_27::9::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, mifona aminao aho, araka ny fahamarinanao rehetra, aoka re hionona ny fahatezeranao sy ny fahaviniranao amin''i Jerosalema tanànanao, tendrombohitrao masina, fa ny helokay sy ny fahotan''ny razanay no nahatonga an''i Jerosalema sy ny olonao ho latsa amin''izay rehetra manodidina anay.'
mg1865::mg_27::9::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, ry Andriamanitray o, henoy ny fivavaky ny mpanomponao sy ny fifonany, ary ampamirapirato ny tavanao amin''ny fitoeranao masina izay efa foana, satria Tompo Ianao.'
mg1865::mg_27::9::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, atongilano ny sofinao, ka mihainoa; ahirato ny masonao, ka jereo ny fahafoananay sy ny tanàna izay nantsoina amin''ny anaranao; fa tsy amin''ny fahamarinanay no andoaranay ny fifonanay eto anatrehanao, fa amin''ny halehiben''ny indrafonao.'
mg1865::mg_27::9::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, mandrenesa, Tompo o, mamelà heloka; Tompo o, mihainoa, ka miasà; aza ela Ianao, ry Andriamanitro o noho ny aminao; fa ny tanànanao sy ny olonao dia nantsoina amin''ny anaranao.'
mg1865::mg_27::9::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niteny sy nivavaka sy niaiky ny fahotako mbamin''ny fahotan''ny Isiraely fireneko aho ka nandoatra ny fifonako teo anatrehan''i Jehovah Andriamanitro ho an''ny tendrombohitra masin''Andriamanitro,'
mg1865::mg_27::9::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, raha mbola niteny nivavaka aho, dia, indro, ilay lehilahy Gabriela izay hitako tamin''ny fahitana voalohany, dia nampanidinina faingana ka nanatona ahy tokony ho tamin''ny fotoan''ny fanatitra hariva.'
mg1865::mg_27::9::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nampahalala ahy sy niresaka tamiko ka nanao hoe: Ry Daniela o, avy hampahazava saina anao aho.'
mg1865::mg_27::9::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny niantombohan''ny fivavakao dia nisy teny nivoaka, ka dia tonga hanambara aminao aho, satria malala indrindra ianao; koa diniho ny teny, ary aoka ho fantatrao ny fahitana.'
mg1865::mg_27::9::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fito-polo herinandro no voatendry ho an''ny firenenao sy ny tanànanao masina, hahatapaka ny fahadisoana sy hanampina* ny fahotana, ary hanao fanavotana noho ny heloka sy hampiditra fahamarinana mandrakizay, ary hanisy tombo-kase ny fahitana sy ny faminaniana** sy hanosotra izay masina indrindra. [*Hebreo: hanisy tombo-kase] [**Hebreo: mpaminany]'
mg1865::mg_27::9::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrao sy ho azonao fa hatramin''ny hivoahan''ny didy hanavaozana sy hanamboarana an''i Jerosalema ka hatramin''i Mesia Andriana* dia ho fito herinandro sy roa amby enim-polo herinandro**; hamboarina indray ny lalana sy ny hady, dia amin''izay andro mampahory. [*Na: ilay andriana voahosotra] [**Na: ary amin''ny herinandro roa amby enim-polo, dia etc]'
mg1865::mg_27::9::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka ny roa amby enim-polo herinandro, dia hovonoina ny Mesia* ka tsy hanana; ary ny vahoaky ny mpanjaka izay ho avy dia handrava ny tanana sy ny fitoerana masina; ary ny farany dia hisy safotra, ary hatramin''ny farany dia hisy ady sy fandravana voatendry. [*Na: ilay voahosotra]'
mg1865::mg_27::9::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanorina fanekena ho herinandro amin''ny maro izy ary hampitsahatra ny fanatitra alatsa-drà sy ny fanatitra hafa hatramin''ny antsasaky ny herinandro, ary amin''ny elatry* ny fahavetavetana no nihavian''ny mpandrava, hatramin''ny fahafonganana voatendry, izay haidina amin''ny mpandrava**. [*Na: eo an-tampon''] [**Na: ny efa lao]'
mg1865::mg_27::10::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Toky ho an''ny olon''Andriamanitra fa tsy ho resin''ny fahavalony izy'
  verse_text: 'Tamin''ny taona fahatelo nanjakan''i Kyrosy, mpanjakan''i Persia, dia nisy nambara tamin''i Daniela, izay atao hoe Beltesazara; marina ny teny, ary ady mafy no nolazainy; ary nahalala ny teny izy sady nahafantatra ny fahitana.'
mg1865::mg_27::10::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany izaho Daniela dia nisaona roatokom-bolana mipaka.'
mg1865::mg_27::10::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nihinana hanim-py aho, sady tsy nanendry hena na divay ny vavako, ary tsy nihosotra diloilo akory aho ambara-pahatapitry ny roatokom-bolana mipaka.'
mg1865::mg_27::10::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahefatra amby roa-polo tamin''ny volana voalohany, raha teo amoron''ny ony lehibe aho (Hidekela izany),'
mg1865::mg_27::10::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanopy ny masoko aho ka nijery, ary, indro, nisy lehilahy iray nitafy rongony fotsy, ka tena volamena avy any Ofaza no nisikinany;'
mg1865::mg_27::10::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny krysolita ny tenany. ary tahaka ny helatra ny tarehiny, ary tahaka ny fanilo mirehitra ny masony, ary mivolom-barahina manganohano ny sandriny sy ny tongony; ary ny feony toy ny feon''olona maro be;'
mg1865::mg_27::10::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izaho Daniela ihany no nahita ny fahitana; fa ny olona izay teo amiko kosa tsy mba nahita izany, fa toran-kovitra indrindra izy ka nandositra niery.'
mg1865::mg_27::10::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nilaozana ho irery aho ary nahita izany fahitana lehibe izany, dia tsy nisy hery tafajanona tato amiko; fa nihasimba nivaloarika ny tarehiko, ary tsy nisy hery intsony tamiko.'
mg1865::mg_27::10::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nandre ny teniny ihany aho; ary nony nandre izany aho, dia renoky ny torimaso niankohoka tamin''ny tany.'
mg1865::mg_27::10::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy tanana nanohina ka nanarina ahy handohalika sy hitehin-tanana, nefa mbola nangozohozo ihany.'
mg1865::mg_27::10::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Ry Daniela malala o, fantaro ny teny Izay lazaiko aminao, ka mijoroa; fa nirahina ho aty aminao aho ankehitriny. Ary nony nilaza izany teny izany tamiko izy, dia nitsangana nangozohozo teo aho.'
mg1865::mg_27::10::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Aza matahotra, ry Daniela; fa hatramin''ilay andro voalohany nampiasanao ny fonao hahalala sy hampahory ny tenanao teo anatrehan''Andriamanitrao dia reko ny teninao, ary noho ny teninao dia avy aho.'
mg1865::mg_27::10::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay andrianan''ny fanjakan''i Persia nanohitra ahy iraika amby roa-polo andro; fa indro kosa Mikaela, anankiray amin''ireo andriana lehibe*, no tonga hanampy ahy; ka dia izaho ihany no sisa nijanona teo amin''ny mpanjakan''i Persia. [*Hebreo: voalohany]'
mg1865::mg_27::10::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy hampahafantatra anao izay hanjo ny firenenao any am-parany aho, satria mbola hihatra amin''izany andro izany ny fahitana.'
mg1865::mg_27::10::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nilaza izany teny izany tamiko izy, dia niankohoka tamin''ny tany aho sady tsy nahateny.'
mg1865::mg_27::10::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy anankiray miendri-janak''olombelona nanendry ny molotro, dia niloa-bava aho ka niteny nanao tamin''ilay nitsangana teo anatrehako hoe: Tompoko, azon''ny fanaintainana aho noho ny fahitana ka tsy manan-kery intsony.'
mg1865::mg_27::10::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aiza no ahazoan''ity izaho mpanompon''ny tompoko ity hiteny aminao tompoko? Ary tamin''izay dia tsy nisy hery nitoetra tato amiko intsony, na nisy aina sisa tato amiko.'
mg1865::mg_27::10::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy indray nanana endrik''olona nanendry ahy koa, dia nampahery ahy'
mg1865::mg_27::10::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Aza matahotra, ry ilay malala indrindra; fiadanana anie ho anao, mahereza, eny, mahereza. Ary rehefa niteny tamiko izy, dia nihahery aho ka nanao hoe: Aoka hiteny ianao tompoko, satria efa nampahery ahy.'
mg1865::mg_27::10::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Moa fantatrao va ny nihaviako aty aminao? Ankehitriny dia hiverina hiady amin''ny andrianan''i Persia aho, ary rehefa mivoaka aho, dia, indro, ho avy ny andrianan''i Grisia.'
mg1865::mg_27::10::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hambarako aminao izay voasoratra ao amin''ny soratra marina; nefa tsy misy miara-misikina amiko hanohitra ireo, afa-tsy Mikaela andriananareo.'
mg1865::mg_27::11::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny taona voalohany nanjakan''i Dariosa Mediana dia nitsangana hampahery sy hanatanjaka azy aho.'
mg1865::mg_27::11::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Faminaniana koa ny amin''ny zavatra mbola hiseho'
  verse_text: 'Ary ankehitriny izay tenany tokoa dia haharihariko aminao. Indro, mbola hisy mpanjaka telo koa hitsangana any Persia; ary ny fahefatra hanan-karena be mihoatra noho izy rehetra; koa rehefa mahery izy noho ny hareny, dia hotairiny avokoa ny olona rehetra hamely ny fanjakan''i Grisia.'
mg1865::mg_27::11::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy mpanjaka mahery hitsangana, izay hanapaka amin''ny fanapahana lehibe sady hanao araka izay sitrapony.'
mg1865::mg_27::11::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mitsangana izy, dia horavana ny fanjakany ka hozaraina ho amin''ny rivotra efatry ny lanitra; fa tsy ho an''ny taranany, na araka ny fanapahany izay nanapahany, fa hongotana ny fanjakany ka ho an''ny hafa, fa tsy ho an''ireo.'
mg1865::mg_27::11::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hahery ny mpanjakan''ny atsimo; nefa ny anankiray amin''ny andriandahiny dia hahery noho izy aza ka hanapaka; ary ho fanapahana lehibe ny fanapahany.'
mg1865::mg_27::11::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka taona vitsivitsy, dia hikambana izy roa lahy ireo; ary ho avy ny zanakavavin''ny mpanjakan''ny atsimo hankany amin''ny mpanjakan''ny avaratra hahatsara ny fihavanana; nefa tsy hahatana ny herin-tsandry izy, ary tsy hahajanona ilay mpanjaka na ny sandriny, fa hatolotra razazavavy sy ireo nitondra azy sy rainy niteraka azy mbamin''izay nampahery azy tamin''izany andro izany*. [*Na: dia samy amin''ny fotoany avy]'
mg1865::mg_27::11::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy solofony anankiray avy amin''ny fakany hitsangana handimby azy, ka hihavian''izay ny miaramila, ary hidirany ny fiarovana mafin''ny mpanjakan''ny avaratra, ka hasiany ireo, dia hahery izy.'
mg1865::mg_27::11::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andriamaniny koa mbamin''ny sarin-javatra an-idina sy ny fanaka tsara ananany, na ny volafotsy na ny volamena, dia hobaboiny avokoa; ary hijanona elaela tsy hamely* ny mpanjakan''ny avaratra izy. [*Na: haharitra ela noho]'
mg1865::mg_27::11::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tonga amin''ny fanjakan''ny mpanjakan''ny atsimo izy, nefa hody any amin''ny taniny ihany.'
mg1865::mg_27::11::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hanomana tafika ny zanany ka hanangona miaramila maro be; dia ho avy tokoa ireo ka hanerana toy ny safotra, rehefa afaka izany, dia hiverina izy, ary hanihiny ihany na dia ny fiarovana mafiny aza.'
mg1865::mg_27::11::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hisafoaka ny mpanjakan''ny atsimo, ka hivoaka hiady aminy izy, dia amin''ny mpanjakan''ny avaratra, ary izy hanangona maro be; ary ny maro be dia hatolotra ho eo an-tanany.'
mg1865::mg_27::11::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha miainga ireo maro be ireo, dia hiavonavona ny fony; ary haharipaka alinalina izy, nefa tsy hahery.'
mg1865::mg_27::11::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hiverina ny mpanjakan''ny avaratra ka hanangona olona maro be mihoatra noho ny teo; ary rehefa afaka ny fe-taona, dia ho avy tokoa izy ka hitondra miaramila maro sy fitaovana betsaka.'
mg1865::mg_27::11::14:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia maro no hitsangana hamely ny mpanjakan''ny atsimo; ary ireo loza indrindra amin''ny firenenao dia hanandra-tena hahatò ny fahitana, nefa ho lavo izy.'
mg1865::mg_27::11::15:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho avy ny mpanjakan''ny avaratra hanandratra tovon-tany hanafaka ny tanàna mimanda; ary na ny sandrin''ny atsimo na ny olom-pidiny dia tsy hahomby, ary tsy hisy hery hahombiazany.'
mg1865::mg_27::11::16:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay avy hamely azy dia hanao araka Izay sitrapony, ka tsy hisy hahajanona eo anatrehany; ary izy hijanona ao amin''ny tany mahafinaritra, ary hisy fandringanana eny an-tanany.'
mg1865::mg_27::11::17:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hivonona tsara handeha amin''ny herin''ny fanjakany rehetra izy ka hanao izay hahatsara ny fihavanana; ary homeny ny zanakavavin''ny vehivavy izy ka hahatonga loza aminy; ary tsy hahalavorary razazavavy, na hahasoa azy akory.'
mg1865::mg_27::11::18:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitodika mankany amin''ny nosy izy ka hahalasa be; ary hisy mpanapaka hampitsahatra ny latsa ataony, sady hatsingeriny aminy ny latsa ataony.'
mg1865::mg_27::11::19:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitodika hankany, amin''ny fiarovana mafy any amin''ny taniny izy; kanjo ho tafintohina sy ho lavo izy ka tsy ho hita.'
mg1865::mg_27::11::20:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitsangana handimby azy indray ny anankiray izay hampandeha mpampiasa ho any amin''izay tsara indrindra amin''ny fanjakany; fa rehefa afaka andro vitsy, dia ho faty io, nefa tsy amin''ny fahatezerana, na amin''ny ady.'
mg1865::mg_27::11::21:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy olona famingavinga hitsangana handimby io indray, izay tsy homena ny voninahitry ny fanjakana; fa hiditra tsy ampoizina izy ka hahazo ny fanjakana amin''ny fahafetsena,'
mg1865::mg_27::11::22:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ireo miaramila toy ny safotra* no hindaosina hiala eo anatrehany sady ho resiny mbamin''ny andriana vita fanekena aminy koa. [*Hebreo: sandrin''ny safotra]'
mg1865::mg_27::11::23:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, rehefa mifanaiky aminy io, dia hanao fitaka; fa hiakatra izy ka hahery, na dia vitsy aza ny olona entiny.'
mg1865::mg_27::11::24:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiditra tsy ampoizina amin''ny faritany mahavokatra indrindra izy ka hanao izay tsy nataon''ny rainy na ny razany; hahahany eny amin''ireny ny sambotra sy ny babo ary ny harena; ary hamoron-tsaina izy ka hamely ny fiarovana mandra-pahalanin''ny fotoana.'
mg1865::mg_27::11::25:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanaitra ny heriny sy ny fony izy hamely ny mpanjakan''ny atsimo amin''ny miaramila maro; ary ny mpanjakan''ny atsimo kosa hanafika mitondra miaramila maro sady mahery indrindra; nefa tsy hahajanona izy, satria hisy hamoron-tsaina hamely azy.'
mg1865::mg_27::11::26:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izay homana ny hanina avy aminy ihany no hahalavo azy, ary ny miaramilany hanerana toy ny safotra, sady maro ny faty hiampatrampatra.'
mg1865::mg_27::11::27:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fon''ireo mpanjaka roa ireo dia samy ta-hanao ratsy, ary eo an-databatra iray no hiresahany lainga; nefa tsy hambinina izany; fa ny farany dia ho amin''ny fotoana ihany.'
mg1865::mg_27::11::28:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiverina ho any amin''ny taniny mitondra harena be izy; koa ny fony dia hanohitra ny fanekena masina; ary hahefa sy hiverina ho any amin''ny taniny izy'
mg1865::mg_27::11::29:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fotoana dia ho lasa mianatsimo indray izy; nefa ny farany tsy ho toy ny voalohany;'
mg1865::mg_27::11::30:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny sambon''i Kitima ho avy namely azy, ka dia ho kivy izy ka hiverina ary hisafoaka amin''ny fanekena masina ka hamely; eny, hiverina izy ka hisaina ny amin''ireo efa mahafoy ny fanekena masina.'
mg1865::mg_27::11::31:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy miaramila* hitsangana noho ny teniny ka handoto ny fitoerana masina, dia ny fiarovana mafy, ary hampitsahatra ny fanatitra isan''andro sady hampiditra ny fahavetavetana mahatonga fandravana. [*Hebreo: sandry]'
mg1865::mg_27::11::32:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: '2022-07-06T04:32:05+0000'
  verse_title: null
  verse_text: 'Ary izay mivadika ny fanekena dia hambosiny amin''ny fandroboana; fa ny olona izay mahalala an''Andriamaniny kosa dia hifikitra amin''izany ka hankatò azy*. [*Na: dia hahery ka hahefa]'
mg1865::mg_27::11::33:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay hendry ao amin''ny olona dia hampianatra ny maro; nefa ho lavon''ny sabatra sy ny lelafo sy ny famaboana ary ny fandrobana elaela ihany izy.'
mg1865::mg_27::11::34:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lavo izy, dia hahazo famonjena kely; ary maro no hikambana aminy amin''ny fihatsaram-belatsihy.'
mg1865::mg_27::11::35:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy ho lavo koa ny manan-tsaina, mba hizahan-toetra sy hanadiovana ary hamotsiana azy ambara-pahatongan''ny andro farany, fa mbola ho amin''ny fotoana ihany izany.'
mg1865::mg_27::11::36:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka hanao araka izay sitrapony; ary hisandratra sy hanandra-tena ho ambonin''ny andriamanitra rehetra izy ka hiteny zavatra mahagaga ny amin''Andriamanitry ny andriamanitra, ary hambinina ihany izy mandra-pahatanteraky ny fahatezerana; fa izay efa voatendry no tsy maintsy hatao.'
mg1865::mg_27::11::37:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hahoany akory ny andriamanitry ny razany, na ny fitiavan''ny vehivavy; eny, tsy hahoany akory izay andriamanitra, fa hanandra-tena noho izy rehetra izy.'
mg1865::mg_27::11::38:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny andriamanitry ny fiarovana mafy no hankalazainy hisolo izany; ary volamena sy volafotsy sy vato soa ary zavatra mahafinaritra no ho entiny mankalaza ny andriamanitra izay tsy fantatry ny razany.'
mg1865::mg_27::11::39:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia homban''ny andriamani-kafa izy ka hamely ny batery mafy indrindra, ary izay manaiky azy dia homeny voninahitra be sady hataony mpanapaka ny maro, ary hozarainy ho azy ny tany ho valim-pitia.'
mg1865::mg_27::11::40:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny faran''ny andro dia hanoto azy ny mpanjakan''ny atsimo; ary ny mpanjakan''ny avaratra koa ho avy hamely azy toy ny tafio-drivotra ka hitondra kalesy sy mpitaingin-tsoavaly ary sambo maro; ary hiditra amin''ny tany izy ka hanerana toy ny safotra.'
mg1865::mg_27::11::41:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiditra ao amin''ny tany mahafinaritra koa izy, ary maro no ho ripaka; fa izao kosa no ho afa-mandositra ny tanany: Edoma sy Moaba ary ireo lohan''ny taranak''i Amona.'
mg1865::mg_27::11::42:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haninjitra ny tanany amin''ny tany sasany koa izy; ary ny tany Egypta tsy ho afa-mandositra.'
mg1865::mg_27::11::43:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hahalasa ny rakitra volamena sy volafotsy ary ny zava-tsoan''i Egypta rehetra izy; ary ny Libyana sy ny Etiopiana hanaraka azy.'
mg1865::mg_27::11::44:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy siosion-teny avy any atsinanana sy avy any avaratra haharaiki-tahotra azy, ka dia hivoaka amin''ny fahatezerana be izy handrava sy handringana maro.'
mg1865::mg_27::11::45:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 11
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haoriny eo anelanelan''ny ranomasina sy ny tendrombohitra masina mahafinaritra ny trano-lainy izay lapany; nefa ho tonga ao amin''ny hiafarany ihany izy, ka tsy hisy hamonjy azy.'
mg1865::mg_27::12::1:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hitsangana Mikaela, andrian-dehibe, izay mitsangana hiaro ny zanaky ny firenenao; ary hisy andro fahoriana, izay tsy nisy tahaka azy hatrizay nisian''ny firenena ka hatramin''izany andro izany; ary amin''izany dia ho afaka ny firenenao, dia izay rehetra hita voasoratra ao amin''ny boky.'
mg1865::mg_27::12::2:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro amin''izay matory ao amin''ny vovoky ny tany no hifoha: ny sasany ho amin''ny fiainana mandrakizay, ary ny sasany ho amin''ny henatra sy ny latsa mandrakizay.'
mg1865::mg_27::12::3:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay hendry dia hamirapiratra toy ny famirapiratry ny lanitra; ary izay mamerina ny maro ho amin''ny fahamarinana dia ho tahaka ny kitana mandrakizay doria.'
mg1865::mg_27::12::4:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Teny farany'
  verse_text: 'Ary ianao, ry Daniela, dia ahoroninao ny teny, ka asio tombo-kase ny taratasy mandra-pihavin''ny andro farany; maro no hazoto mandinika*, ka hitombo ny fahalalana. [*Hebreo: hivoivoy]'
mg1865::mg_27::12::5:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijery aho Daniela, ka, indro, nisy roa hafa koa nitsangana ny anankiray teto amoron''ny ony, ary ny anankiray kosa teroa an-dafiny.'
mg1865::mg_27::12::6:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny anankiray tamin''ilay lehilahy mitafy rongony fotsy, izay teo ambonin''ny rano amin''ny ony: Mandra-pahoviana vao ho tanteraka ny faran''ireo fahagagana ireo?'
mg1865::mg_27::12::7:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay lehilahy mitafy rongony fotsy, izay teo ambonin''ny rano amin''ny ony, dia nanandratra ny tanany ankavanana sy ny tanany ankavia ho amin''ny lanitra ka reko nianiana tamin''Izay velona mandrakizay izy fa ho fetr''andro iray sy fetr''andro roa ary antsasaky ny fetr''andro; ary rehefa vita ny fanamontsamontsanana ny herin''ny olo-masina, dia ho tanteraka ireo rehetra ireo.'
mg1865::mg_27::12::8:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandre izany aho, nefa tsy nahafantatra; dia hoy izaho: Tompoko o, hanao ahoana no hiafaran''ireo zavatra ireo?'
mg1865::mg_27::12::9:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Andeha, ry Daniela, fa efa voahorona ny teny sady voaisy tombo-kase mandra-pihavin''ny andro farany.'
mg1865::mg_27::12::10:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no hodiovina sy hofotsiana ary hozahan-toetra; fa ny ratsy fanahy kosa mbola hanao ratsy ihany, ary tsy hisy amin''ny ratsy fanahy hahafantatra, fa ny hendry no hahafantatra.'
mg1865::mg_27::12::11:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''ny andro hampitsaharana ny fanatitra isan''andro sy hampidirana ny fahavetavetana mahatonga fandravana dia hisy andro sivifolo sy roan-jato amby arivo.'
mg1865::mg_27::12::12:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay miandry sy mahatratra ny andro dimy amby telo-polo amby telon-jato sy arivo.'
mg1865::mg_27::12::13:
  verse_version: mg1865
  verse_book: mg_27
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandehana ianao mandra-pihavin''ny farany; fa hitsahatra ianao ka hitsangana ho ao amin''ny anjaranao amin''ny andro farany.'
