mg1865::mg_57::1::1:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: '2022-07-14T09:27:55+0000'
  verse_title: 'Fiarahabana an''i Filemona, sy fifonana ho an''i Onesimosy, ary fanaovam-beloma'
  verse_text: 'Paoly, mpifatotra an''i Kristy Jesoa, ary Timoty rahalahy, mamangy an''i Filemona, ilay malalanay sy mpiara-miasa aminay,'
mg1865::mg_57::1::2:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mamangy an''i Apia anabavinay sy Arkipo, miaramila namantsika, ary ny fiangonana ao an-tranonao:'
mg1865::mg_57::1::3:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesoa Kristy Tompo.'
mg1865::mg_57::1::4:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''Andriamanitro mandrakariva aho, raha mahatsiaro anao amin''ny fivavahako,'
mg1865::mg_57::1::5:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria reko ny fitiavanao sy ny finoana* izay anananao ho an''i Jesoa Tompo sy ho an''ny olona masina rehetra, [*Na: ny finoanao]'
mg1865::mg_57::1::6:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hiasa mafy ho an''i Kristy ny fiombonana avy amin''ny finoanao amin''ny fahalalana tsara ny zavatra rehetra izay ao anatinareo.'
mg1865::mg_57::1::7:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanana fifaliana sy fiononana amin''ny fitiavanao aho, satria efa novelombelominao ny fon''ny olona masina, ry rahalahy.'
mg1865::mg_57::1::8:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia manana fahasahiana be ao amin''i Kristy handidy anao amin''izay mendrika aza aho,'
mg1865::mg_57::1::9:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa noho ny fitiavana, izaho Paoly, izay efa anti-panahy* sady mpifatotra an''i Kristy Jesoa koa ankehitriny, dia miangavy aminao. [*Na: ambasadôro]'
mg1865::mg_57::1::10:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, miangavy aminao aho ny amin''ny zanako, izay naterako teto amin''ny fifatorako, dia Onesimosy*, [*Onesimosy = Mahasoa]'
mg1865::mg_57::1::11:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ilay tsy nahasoa anao fahiny, nefa ankehitriny mahasoa antsika, dia ianao sy izaho;'
mg1865::mg_57::1::12:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nampodiko indray, dia ilay sombin''ny aiko;'
mg1865::mg_57::1::13:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'saiky nohazoniko taty amiko izy hanompo ahy hisolo anao eto amin''ny fifatorako noho ny filazantsara;'
mg1865::mg_57::1::14:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa raha tsy nahalala izay hevitrao aho aloha, dia tsy ta-hanao na inona na inona, mba tsy ho toy ny amin''ny fanerena ny soa ataonao, fa amin''ny sitrapo.'
mg1865::mg_57::1::15:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany angaha no nialany vetivety, dia ny mba hanananao azy mandrakizay,'
mg1865::mg_57::1::16:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy toy ny andevo intsony anefa, fa efa mihoatra noho ny andevo, dia rahalahy malala, indrindra fa ho ahy, mainka fa ho anao, na amin''ny nofo, na amin''ny Tompo.'
mg1865::mg_57::1::17:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ataonao ho namanao aho, dia raiso toa ahy izy.'
mg1865::mg_57::1::18:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha nanao izay tsy marina taminao izy, na mitrosa, dia ataovy ho ahy izany;'
mg1865::mg_57::1::19:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'izaho Paoly no manoratra izany amin''ny tanako, izaho no handoa izany — nefa tsy lazaiko aminao fa mitrosa ny tenanao amiko aza ianao.'
mg1865::mg_57::1::20:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ry rahalahy, aoka hanana fifaliana avy aminao ao amin''ny Tompo aho; velombelomy ny foko ao amin''i Kristy.'
mg1865::mg_57::1::21:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fahatokiako fa hanaiky ianao no anoratako aminao, ka fantatro fa hanao mihoatra noho izay lazaiko aza ianao.'
mg1865::mg_57::1::22:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao koa: Mba anamboary trano hitoerako aho; fa manantena aho fa homena anareo noho ny vavaka ataonareo.'
mg1865::mg_57::1::23:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao veloma anao Epafra, mpifatotra namako ao amin''i Kristy Jesoa,'
mg1865::mg_57::1::24:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Marka sy Aristarko sy Demasy ary Lioka, mpiara-miasa amiko.'
mg1865::mg_57::1::25:
  verse_version: mg1865
  verse_book: mg_57
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny fanahinareo anie ny fahasoavan''i Jesoa Kristy Tompontsika. Amena.'
