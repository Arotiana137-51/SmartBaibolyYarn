mg1865::mg_62::1::1:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny firaisan''ny Kristiana amin''Andriamanitra, ary ny vavolombelona mampiseho sy mahamarina izany'
  verse_text: 'Izay hatramin''ny voalohany, dia izay efa renay, izay efa hitan''ny masonay, izay efa nojerenay sady efa notsapain''ny tananay, dia ny amin''ny Teny Fiainana'
mg1865::mg_62::1::2:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa efa naseho ny fiainana, ary efa nahita azy izahay, dia tonga vavolombelona ka manambara aminareo ny fiainana mandrakizay, izay tao amin''ny Ray ka efa naseho taminay), -'
mg1865::mg_62::1::3:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay efa hitanay sy renay no ambaranay aminareo, mba hahazoanareo firaisana aminay koa; ary ny firaisanay dia amin''ny Ray sy amin''i Jesoa Kristy Zanany.'
mg1865::mg_62::1::4:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao zavatra izao no soratanay, mba ho tanteraka ny fifaliantsika*. [*Na: fifalianareo]'
mg1865::mg_62::1::5:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no teny renay taminy ka ambaranay aminareo: Andriamanitra dia mazava, ary tsy misy maizina akory ao aminy.'
mg1865::mg_62::1::6:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy isika: Manana firaisana aminy isika, kanefa mandeha amin''ny maizina, dia mandainga isika ka tsy manao ny marina.'
mg1865::mg_62::1::7:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mandeha eo amin''ny mazava isika, tahaka Azy eo amin''ny mazava, dia manana firaisana isika, ary ny ran''i Jesoa Zanany no manadio antsika ho afaka amin''ny ota rehetra.'
mg1865::mg_62::1::8:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy isika: Tsy manana ota isika, dia mamita-tena, ary ny marina tsy ato anatintsika.'
mg1865::mg_62::1::9:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miaiky ny fahotantsika isika, dia mahatoky sy marina Izy ka mamela ny fahotantsika sy manadio antsika ho afaka amin''ny tsy fahamarinana rehetra.'
mg1865::mg_62::1::10:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy isika: Tsy nanota isika, dia mampandainga Azy, ary ny teniny tsy ato anatintsika.'
mg1865::mg_62::2::1:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, izany zavatra izany no soratako ny aminareo mba tsy hanotanareo. Ary raha misy manota, dia manana Solovava* ao amin''ny Ray isika, dia Jesoa Kristy, Ilay Marina; [*Grika: parakleto; izahao Jaona 14:16]'
mg1865::mg_62::2::2:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Izy no avotra* noho ny fahotantsika, ary tsy noho ny antsika ihany, fa noho ny an''izao tontolo izao koa. [*Na: fanatitra fampiononam-pahatezerana; izahao Romana 3:25]'
mg1865::mg_62::2::3:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ahafantarantsika fa mahalala Azy isika, dia ny fitandremana ny didiny.'
mg1865::mg_62::2::4:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao hoe: Fantatro Izy, nefa tsy mitandrina ny didiny, dia mpandainga, ary ny marina tsy ao anatiny.'
mg1865::mg_62::2::5:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza mitandrina ny teniny, dia tanteraka ao aminy marina tokoa ny fitiavana an''Andriamanitra* izany no ahafantarantsika fa ao aminy isika. [*Na: ny fitiavan''Andriamanitra]'
mg1865::mg_62::2::6:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay* milaza fa mitoetra ao aminy izy, dia tsy maintsy mandeha toy izay nandehanany koa. [*Na: Izao no ahafantarantsika fa ao aminy isika: Izay etc]'
mg1865::mg_62::2::7:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, tsy didy vaovao no soratako aminareo, fa didy ela, izay nanananareo hatramin''ny voalohany. Ny didy ela dia izay teny efa renareo.'
mg1865::mg_62::2::8:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, didy vaovao no soratako aminareo, dia zavatra marina eo aminy sy eo aminareo, satria miala ny maizina, ary ny mazava marina no mahazava ankehitriny.'
mg1865::mg_62::2::9:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay milaza fa ao amin''ny mazava izy, kanefa mankahala ny rahalahiny, dia mbola ao amin''ny maizina ihany.'
mg1865::mg_62::2::10:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia ny rahalahiny no mitoetra ao amin''ny mazava, ka tsy misy fahatafintohinana ao aminy.'
mg1865::mg_62::2::11:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mankahala ny rahalahiny dia ao amin''ny maizina ary mandeha ao amin''ny maizina ka tsy mahalala izay alehany, satria ny maizina no efa nahajamba ny masony.'
mg1865::mg_62::2::12:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Fananarana mba tsy ho tia izao tontolo izao, na hofitahin''ny antikristy, fa mba hiorina tsara ao amin''i Kristy'
  verse_text: 'Manoratra aminareo zanaka aho, satria voavela ny helokareo noho ny anarany.'
mg1865::mg_62::2::13:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manoratra aminareo ray aho, satria efa mahalala Ilay hatramin''ny voalohany ianareo. Manoratra aminareo zatovo aho, satria efa naharesy ilay ratsy ianareo. Nanoratra taminareo ankizy madinika aho satria efa mahalala ny Ray ianareo.'
mg1865::mg_62::2::14:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanoratra taminareo ray aho, satria efa nahalala Ilay hatramin''ny voalohany ianareo. Nanoratra taminareo zatovo aho, satria mahery ianareo, ary mitoetra ao anatinareo ny tenin''Andriamanitra, sady efa naharesy ilay ratsy ianareo.'
mg1865::mg_62::2::15:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza tia izao tontolo izao, na izay zavatra eo amin''izao tontolo izao. Raha misy olona tia izao tontolo izao dia tsy ao anatiny ny fitiavana ny Ray.'
mg1865::mg_62::2::16:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zavatra rehetra eo amin''izao tontolo izao, dia ny filan''ny nofo sy ny filan''ny maso ary ny rehaka momba izao fiainana izao, dia tsy avy amin''ny Ray, fa avy amin''izao tontolo izao ihany.'
mg1865::mg_62::2::17:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandalo izao fiainana izao sy ny filany; fa izay manao ny sitrapon''Andriamanitra no maharitra mandrakizay.'
mg1865::mg_62::2::18:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rankizy, izao no ora farany, ary tahaka ny efa renareo fa ho avy ny* antikristy, sady maro no antikristy efa tonga sahady; koa izany no ahafantarantsika fa izao no ora farany. [*Na: ilay]'
mg1865::mg_62::2::19:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamintsika ihany no niala ireo, nefa tsy mba namantsika izy; fa raha tàhiny namantsika izy, dia ho nitoetra tamintsika ihany; fa efa niala izy, mba haseho fa tsy isantsika izy rehetra.'
mg1865::mg_62::2::20:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa manana hosotra avy amin''ilay Masina ka mahalala ny zavatra rehetra.'
mg1865::mg_62::2::21:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy noho ny tsy ahafantaranareo ny marina no nanoratako taminareo, fa noho ny ahafantaranareo izany sy noho ny tsy fisiana lainga avy amin''ny marina.'
mg1865::mg_62::2::22:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mpandainga, afa-tsy ilay mandà an''i Jesoa tsy ho Kristy? Izy no antikristy*, dia izay mandà ny Ray sy ny Zanaka. [*Na: ilay antikristy]'
mg1865::mg_62::2::23:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mandà ny Zanaka no tsy manana ny Ray koa; izay manaiky ny Zanaka no manana ny Ray koa.'
mg1865::mg_62::2::24:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny aminareo, dia izay efa renareo hatramin''ny voalohany no aoka hitoetra ao anatinareo. Raha mitoetra ao anatinareo izay efa renareo hatramin''ny voalohany, dia hitoetra ao amin''ny Zanaka sy ny Ray kosa ianareo.'
mg1865::mg_62::2::25:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no teny fikasana izay nataony tamintsika, dia ny fiainana mandrakizay.'
mg1865::mg_62::2::26:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany no voasoratro taminareo ny amin''ny mamitaka anareo.'
mg1865::mg_62::2::27:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny aminareo, dia ilay hosotra noraisinareo taminy no mitoetra ao aminareo, ka tsy mila hampianarin''olona ianareo; fa satria ny hosotra avy aminy no mampianatra anareo ny zavatra rehetra, sady marina, fa tsy lainga izany, dia tomoera ao aminy ianareo, araka ny nampianarany anareo.'
mg1865::mg_62::2::28:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, anaka, tomoera ao aminy, mba hananantsika fahasahiana, raha hiseho Izy, ka tsy ho menatra eo anatrehany amin''ny fihaviany.'
mg1865::mg_62::2::29:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha fantatrareo fa marina Izy, dia fantaro fa izay rehetra manao ny marina no zanany naterany.'
mg1865::mg_62::3::1:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahazotoan''ny zanak''Andriamanitra hanao ny sitrapon''ny Rainy sy hifankatia amin''ny namany, ary ny fahatokiana ananany'
  verse_text: 'Endrey! manao ahoana ny fitiavana nasehon*''ny Ray ho antsika, dia ny niantsoana antsika hoe zanak''Andriamanitra, sady izany tokoa isika! Koa noho izany dia tsy mahalala antsika izao tontolo izao, satria tsy nahalala Azy izy. [*Grika: nomen'']'
mg1865::mg_62::3::2:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, ankehitriny aza dia zanak''Andriamanitra isika, nefa tsy mbola naseho izay ho toetsika rahatrizay. Fantatsika fa raha hiseho Izy, dia ho tahaka Azy isika, fa ho hitantsika Izy, dia izay tena endriny tokoa.'
mg1865::mg_62::3::3:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra manana izany fanantenana miorina aminy izany dia manadio ny tenany mba hadio tahaka Azy.'
mg1865::mg_62::3::4:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra manota no mandika ny lalàna; fa ny ota no fandikana ny lalàna.'
mg1865::mg_62::3::5:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatrareo fa Izy no naseho hanaisotra* ny ota; ary tsy mba misy ota ao aminy. [*Na: hitondra]'
mg1865::mg_62::3::6:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mitoetra ao aminy dia tsy manota; izay rehetra manota dia tsy nahita na nahalala Azy.'
mg1865::mg_62::3::7:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, aza avela hisy hamitaka anareo: izay manao ny marina no marina; eny, marina tahaka Azy.'
mg1865::mg_62::3::8:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manota dia avy amin''ny devoly, satria ny devoly manota hatramin''ny voalohany. Izao no nisehoan''ny Zanak''Andriamanitra, dia ny handrava ny asan''ny devoly.'
mg1865::mg_62::3::9:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra naterak''Andriamanitra no tsy manota, satria ny voany mitoetra ao anatiny, ary tsy mahay manota izy, satria naterak''Andriamanitra.'
mg1865::mg_62::3::10:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no mampiseho miharihary izay Zanak''Andriamanitra sy izay zanaky ny devoly. Tsy mba avy amin''Andriamanitra izay rehetra tsy manao ny marina sy izay tsy tia ny rahalahiny.'
mg1865::mg_62::3::11:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no teny nampitondraina izay efa renareo hatramin''ny voalohany: tsy maintsy mifankatia isika,-'
mg1865::mg_62::3::12:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mba tahaka an''i Kaina, izay avy tamin''ilay ratsy ka namono ny rahalahiny. Ary nahoana no namono azy izy? Satria ratsy ny asany, fa marina ny an''ny rahalahiny.'
mg1865::mg_62::3::13:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza gaga, ry rahalahy, raha halan''izao tontolo izao ianareo.'
mg1865::mg_62::3::14:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatsika fa efa tafafindra niala tamin''ny fahafatesana ho amin''ny fiainana isika satria tia ny rahalahy. Izay tsy tia dia mitoetra ao amin''ny fahafatesana ihany.'
mg1865::mg_62::3::15:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mankahala ny rahalahiny dia mpamono olona; ary fantatrareo fa tsy mba misy mpamono olona manana fiainana mandrakizay mitoetra ao anatiny.'
mg1865::mg_62::3::16:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ahafantarantsika ny fitiavana, satria Izy no nanolotra ny ainy hamonjy antsika; ary isika kosa mba tokony hanolotra ny aintsika hamonjy ny rahalahy.'
mg1865::mg_62::3::17:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra manam-pananana amin''izao fiainana izao, ary mahita ny fahantran''ny rahalahiny ka mihirim-belona aminy, ahoana no itoeran''ny fitiavana an''Andriamanitra ao anatiny?'
mg1865::mg_62::3::18:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, aoka tsy ho tia amin''ny teny na amin''ny lela isika, fa amin''ny asa sy amin''ny marina.'
mg1865::mg_62::3::19:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no hahafantarantsika fa avy amin''ny marina isika sy hampahatokiantsika ny fontsika eo anatrehany,'
mg1865::mg_62::3::20:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'na amin''inona na amin''inona no anamelohan''ny fontsika antsika, satria Andriamanitra lehibe noho ny fontsika ka mahalala ny zavatra rehetra.'
mg1865::mg_62::3::21:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, raha tsy mba manameloka antsika ny fontsika, dia manana fahasahiana eo anatrehan''Andriamanitra isika.'
mg1865::mg_62::3::22:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na inona na inona no angatahintsika dia raisintsika aminy, satria mitandrina ny didiny sy manao izay ankasitrahana eo imasony isika.'
mg1865::mg_62::3::23:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no didiny, dia ny hinoantsika ny anaran''i Jesoa Kristy Zanany sy ny hifankatiavantsika araka ny didy nomeny antsika.'
mg1865::mg_62::3::24:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mitandrina ny didiny no mitoetra ao aminy, ary Izy kosa ao aminy. Ary izao no ahafantarantsika fa mitoetra ao amintsika Izy, dia ny Fanahy Izay nomeny antsika.'
mg1865::mg_62::4::1:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fampianarana sandoka, sy ny tokony hitiavantsika ny rahalahy, ary ny hanekentsika ny fanambaran''Andriamanitra ny Zanany'
  verse_text: 'Ry malala, aza mino ny fanahy rehetra, fa izahao toetra ny fanahy, na avy amin''Andriamanitra ireny, na tsia, satria maro ny mpaminany sandoka efa lasa any amin''izao tontolo izao.'
mg1865::mg_62::4::2:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ahafantaranareo ny Fanahin''Andriamanitra: Ny fanahy rehetra izay manaiky fa efa tonga tamin''ny nofo Jesoa Kristy no avy amin''Andriamanitra;'
mg1865::mg_62::4::3:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanahy rehetra izay tsy manaiky an''i Jesoa dia tsy mba avy amin''Andriamanitra; ary izany no fanahin''ny antikristy, izay efa renareo fa ho avy, sady efa eo amin''izao tontolo izao sahady izy.'
mg1865::mg_62::4::4:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, ianareo dia avy amin''Andriamanitra ary efa naharesy ireny, satria lehibe Izay ao aminareo noho izay ao amin''izao tontolo izao.'
mg1865::mg_62::4::5:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isan''izao tontolo izao ireny, ka dia miteny araka ny an''izao tontolo izao izy, ary mihaino azy izao tontolo izao.'
mg1865::mg_62::4::6:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy amin''Andriamanitra izahay; izay mahalala an''Andriamanitra no mihaino anay; Izay tsy avy amin''Andriamanitra tsy mba mihaino anay. Izany no ahafantarantsika ny fanahin''ny fahamarinana sy ny fanahin''ny fampiviliana.'
mg1865::mg_62::4::7:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, aoka hifankatia isika; fa avy amin''Andriamanitra ny fitiavana, ary Izay rehetra tia no naterak''Andriamanitra sady mahalala an''Andriamanitra.'
mg1865::mg_62::4::8:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy tia dia tsy mba mahalala an''Andriamanitra; fa Andriamanitra dia fitiavana.'
mg1865::mg_62::4::9:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nanehoana ny fitiavan''Andriamanitra antsika: Andriamanitra naniraka ny Zanani-lahy Tokana tamin''izao tontolo izao, mba hahavelona antsika amin''ny alalany.'
mg1865::mg_62::4::10:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no fitiavana: tsy ny nitiavantsika an''Andriamanitra fa ny nitiavany antsika, ka nirahiny ny Zanany ho avotra* noho ny fahotantsika. [*Na: fanatitra fampionona-paherezana; izahao II Jaona 2:2]'
mg1865::mg_62::4::11:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, raha izany no nitiavan''Andriamanitra antsika, dia mba tokony hifankatia kosa isika.'
mg1865::mg_62::4::12:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola nisy olona nahita an''Andriamanitra na oviana na oviana. Raha mifankatia isika, dia mitoetra ato amintsika Andriamanitra, ary tanteraka ato amintsika ny fitiavany*. [*Na: ny fitiavana Azy]'
mg1865::mg_62::4::13:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ahafantarantsika fa mitoetra ao aminy isika, ary Izy ato amintsika, dia ny nanomezany antsika ny Fanahiny.'
mg1865::mg_62::4::14:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay efa nahita ka manambara fa ny Ray efa naniraka ny Zanaka ho Mpamonjy izao tontolo izao.'
mg1865::mg_62::4::15:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na iza na iza manaiky fa Zanak''Andriamanitra Jesoa, dia mitoetra ao aminy Andriamanitra, ary izy kosa ao amin''Andriamanitra.'
mg1865::mg_62::4::16:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isika efa mahalala sy mino ny fitiavan''Andriamanitra antsika. Andriamanitra dia fitiavana; ary izay mitoetra amin''ny fitiavana no mitoetra ao amin''Andriamanitra, ary Andriamanitra ao aminy.'
mg1865::mg_62::4::17:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ahatanterahana ny fitiavana amintsika, mba hananantsika fahasahiana amin''ny andro fitsarana; fa tahaka Azy isika eo amin''izao tontolo izao.'
mg1865::mg_62::4::18:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manan-tahotra ny fitiavana; fa ny fitiavana tanteraka mandroaka ny tahotra; fa mampahory ny tahotra. Fa izay matahotra dia tsy mbola tanteraka amin''ny fitiavana.'
mg1865::mg_62::4::19:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isika tia, satria Izy efa tia antsika taloha.'
mg1865::mg_62::4::20:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manao hoe: Tia an''Andriamanitra aho, nefa mankahala ny rahalahiny, dia mpandainga izy; fa izay tsy tia ny rahalahiny izay hitany, hataony ahoana no fitia an''Andriamanitra Izay tsy hitany?'
mg1865::mg_62::4::21:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no didy efa azontsika taminy: Izay tia an''Andriamanitra dia tsy maintsy tia ny rahalahiny koa.'
mg1865::mg_62::5::1:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mino fa Jesoa no Kristy dia naterak''Andriamanitra; ary izay rehetra tia Izay niteraka dia tia izay naterany koa.'
mg1865::mg_62::5::2:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ahafantarantsika fa tia ireo zanak''Andriamanitra isika, dia ny itiavantsika an''Andriamanitra sy ny ankatoavantsika ny didiny.'
mg1865::mg_62::5::3:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no fitiavana an''Andriamanitra, dia ny hitandremantsika ny didiny, sady tsy mavesatra ny didiny.'
mg1865::mg_62::5::4:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra naterak''Andriamanitra dia maharesy izao tontolo izao; ary ny fandresena izay enti-maharesy izao tontolo izao dia ny finoantsika.'
mg1865::mg_62::5::5:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no maharesy izao tontolo izao afa-tsy izay mino fa Jesoa no Zanak''Andriamanitra?'
mg1865::mg_62::5::6:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy ilay avy tamin''ny rano sy ny rà, dia Jesoa Kristy; tsy tamin''ny rano ihany, fa tamin''ny rano sy ny rà. Ary ny Fanahy no manambara, satria ny Fanahy no fahamarinana.'
mg1865::mg_62::5::7:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy telo izay manambara,'
mg1865::mg_62::5::8:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny Fanahy sy ny rano ary ny rà; ary mifanaraka tsara izy telo.'
mg1865::mg_62::5::9:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandray ny fanambaran''ny olona isika, lehibe lavitra ny fanambaran''Andriamanitra; fa ny fanambaran''Andriamanitra dia ny nanambarany ny Zanany.'
mg1865::mg_62::5::10:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: '2022-04-24T05:50:16+0000'
  verse_title: null
  verse_text: 'Izay mino ny Zanak''Andriamanitra no manana ny fanambarana ao anatiny; izay tsy mino an''Andriamanitra dia efa nampandainga Azy, satria tsy mino ny fanambarana izay nanambaran''Andriamanitra ny Zanany izy.'
mg1865::mg_62::5::11:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fanambarany: Fiainana mandrakizay no omen''Andriamanitra antsika, ary ao amin''ny Zanany izany fiainana izany.'
mg1865::mg_62::5::12:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manana ny Zanaka no manana ny fiainana; izay tsy manana ny Zanak''Andriamanitra no tsy manana ny fiainana.'
mg1865::mg_62::5::13:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny amin''ny fivavahana ary ny tsy fitovian''ny zanak''Andriamanitra amin''ny ratsy fanahy'
  verse_text: 'Izany no nosoratako aminareo, izay mino ny anaran''ny Zanak''Andriamanitra, mba ho fantatrareo fa manana fiainana mandrakizay ianareo.'
mg1865::mg_62::5::14:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fahasahiana ananantsika eo anatrehany: Raha mangataka zavatra araka ny sitrapony isika, dia mihaino antsika Izy;'
mg1865::mg_62::5::15:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha fantatsika fa mihaino antsika Izy, na inona na inona no angatahintsika, dia fantatsika fa azontsika izay angatahintsika aminy.'
mg1865::mg_62::5::16:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mahita ny rahalahiny manao ota tsy mahafaty, dia aoka hifona ho azy izy, ary Andriamanitra no hanome azy fiainana* ho an''izay manao ota tsy mahafaty*. Misy ota mahafaty**; tsy mba lazaiko fa tokony hangataka ny amin''izany izy. [*Grika: ota tsy ho amin''ny fahafatesana] [** Grika: ota ho amin''ny fahafatesana]'
mg1865::mg_62::5::17:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ota avokoa ny tsy fahamarinana rehetra; ary misy ota tsy mahafaty*. [*Grika: ota ny ho amin''ny fahafatesana]'
mg1865::mg_62::5::18:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatsika fa izay rehetra naterak''Andriamanitra dia tsy manota; fa izay naterak''Andriamanitra, dia miaro ny tenany* ka tsy mikasika azy akory ilay ratsy. [*Na: Ilay naterak''Andriamanitra no miaro azy]'
mg1865::mg_62::5::19:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatsika fa avy amin''Andriamanitra isika, ary izao tontolo izao kosa dia mipetraka eo amin''ilay ratsy avokoa.'
mg1865::mg_62::5::20:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatsika fa tonga ny Zanak''Andriamanitra ka efa nanome antsika ny fahazavan-tsaina, mba ho fantatsika ilay marina; ary isika ao amin''ilay marina, dia ao amin''i Jesoa Kristy Zanany. Izy no Andriamanitra marina sy fiainana mandrakizay.'
mg1865::mg_62::5::21:
  verse_version: mg1865
  verse_book: mg_62
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, arovy ny tenanareo amin''ny sampy.'
