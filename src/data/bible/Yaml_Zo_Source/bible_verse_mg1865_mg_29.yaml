mg1865::mg_29::1::1:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah, izay tonga tamin''i Joela, zanak''i Petoela.'
mg1865::mg_29::1::2:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Filazana ny loza nanjo, ary fitarainana sy anatra noho izany'
  verse_text: 'Henoy izao, ry anti-panahy! Ary mandrenesa, ianareo mponina rehetra amin''ny tany! Moa mba efa nisy tamin''ny andronareo na tamin''ny andron''ny razanareo, va izao?'
mg1865::mg_29::1::3:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny zanakareo izao, ary aoka ny zanakareo hilaza amin''ny zanany kosa, ary ny zanak''ireo kosa indray amin''ny taranaka mandimby azy.'
mg1865::mg_29::1::4:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay sisan''ny kijeja* dia nohanin''ny koraika; Ary izay sisan''ny koraika dia nohanin''ny valalavao*: Ary izay sisan''ny valalavao dia nohanin''ny sompanga***. [*Hebreo: mpikiky] [**Hebreo: mpilelaka] [***Hebreo: mpandany]'
mg1865::mg_29::1::5:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, ianareo mpimamo, ka mitomania, eny, midradradradrà, ianareo mpisotro divay rehetra, noho ny ranom-boaloboka, satria tapaka tsy ho amin''ny vavanareo izany.'
mg1865::mg_29::1::6:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy firenena mahery sady tsy hita isa miakatra hamely ny taniko; Ny nifiny dia nifin-diona, ary ny vazany dia vazan''ny liom-bavy.'
mg1865::mg_29::1::7:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataony simba tokoa ny voaloboko, ary notapatapahiny ny aviaviko; Nataony nakiky tokoa ireny ka nariany, eny, tonga fotsy ny rantsany.'
mg1865::mg_29::1::8:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà toy ny virijina misikindamba fisaonana* noho ny amin''ny vadin''ny fahatanorany. [*Hebreo: lamba malailay]'
mg1865::mg_29::1::9:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tapaka tsy ho ao amin''ny tranon''i Jehovah ny fanatitra hohanina sy ny fanatitra aidina; Mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an''i Jehovah.'
mg1865::mg_29::1::10:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mariry ny saha, misaona ny tany fambolena; Fa simba ny vary, ritra ny ranom-boaloboka, mihena* ny diloilo. [*Hebreo: Malazo]'
mg1865::mg_29::1::11:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra ianareo mpiasa tany; midradradradrà, ianareo mpamboatra tanim-boaloboka, noho ny vary tritika sy ny vary hordea; Fa majifa ny vokatry ny saha;'
mg1865::mg_29::1::12:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maina ny voaloboka, malazo ny aviavy, ary malazo koa ny ampongaben-danitra sy ny rofia* ary ny poma aza, dia ny hazo rehetra any an-tsaha; Eny, malazo ny fifalian''ny zanak''olombelona. [*palma]'
mg1865::mg_29::1::13:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misikina sy mitomania, ianareo mpisorona; midradradradrà, ianareo mpanao fanompoam-pivavahana eo amin''ny alitara; Andeha mandry amin''ny lamba fisaonana* mandritra ny alina, ianareo mpanao fanompoam-pivavahana ho an''Andriamanitro, fa tapaka tsy ho ao amin''ny tranon''Andriamanitra ny fanatitra hohanina sy ny fanatitra aidina. [*Hebreo: lamba malailay]'
mg1865::mg_29::1::14:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manamasina andro fifadian-kanina, miantsoa fivoriana masina, angony ny loholona sy ny mponina rehetra amin''ny tany ho ao an-tranon''i Jehovah Andriamanitrareo, koa andeha mitaraina amin''i Jehovah.'
mg1865::mg_29::1::15:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy ny andro! Fa efa antomotra ny andron''i Jehovah, ka tahaka ny loza tsy toha avy amin''ny Tsitoha no fihaviny.'
mg1865::mg_29::1::16:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy efa tapaka teo imasontsika va ny hanina, eny, ny fifaliana sy ny faharavoravoana tsy ho ao an-tranon''Andriamanitsika?'
mg1865::mg_29::1::17:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matimaso ao ambanin''ny baingan-tany ny vary nafafy, foana ny sompitra, mirodana ny trano fitehirizam-bary; Fa nalazo ny vary.'
mg1865::mg_29::1::18:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy, ny fitoreon''ny biby! Very hevitra ny omby andiany, satria tsy misy ahitra ho azy; Eny, na dia ny andian''ny ondry aman''osy aza dia mijaly noho ny heloka.'
mg1865::mg_29::1::19:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, Ianao no itarainako, fa efa levon''ny afo ny kijana any an''efitra, ary nisy lelafo efa nandoro ny hazo rehetra any an-tsaha.'
mg1865::mg_29::1::20:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao, satria ritra ny renirano, ary efa levon''ny afo ny kijana any an''efitra.'
mg1865::mg_29::2::1:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Filazana ny loza hanjo, sy fiantsoana ny olona hibebaka'
  verse_text: 'Tsofy ao Ziona ny anjomara! Ary miantsoa mafy ao an-tendrombohitro masina! Aoka hangovitra ny mponina rehetra amin''ny tany; Fa avy ny andron''i Jehovah, eny, efa antomotra izany,'
mg1865::mg_29::2::2:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia andro maizina sy manjombona, andro mandrahona sy maizim-pito, toy ny fahazavan''ny maraina miely manerana ny tendrombohitra, dia firenena lehibe sy matanjaka, ka tsy nisy tahaka azy hatrizay hatrizay, sady tsy hisy tahaka azy intsony any aoriany hatramin''ny taonan''ny taranaka fara mandimby.'
mg1865::mg_29::2::3:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo alohany misy afo mandevona, ary any aoriany misy lelafo mandoro; Tahaka ny saha Edena ny tany eo alohany, fa ny any aoriany kosa dia tahaka ny efitra foana, eny, tsy misy tsy azony.'
mg1865::mg_29::2::4:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitarehin-tsoavaly ny tarehiny; Ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany.'
mg1865::mg_29::2::5:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny figorodon''ny kalesy any an-tampon''ny tendrombohitra no figorodon''ny fitsambikimbikiny, sy tahaka ny fipororotry ny lelafo eny amin''ny hain-tanety, ary tahaka ny firenena mahery voalamina hiady.'
mg1865::mg_29::2::6:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anoloany dia raiki-tahotra indrindra ny firenena; Ny tarehy rehetra mivaloarika*; [*Na: tera-mena]'
mg1865::mg_29::2::7:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsarapaka tahaka ny lehilahy mahery izy ary mananika ny manda tahaka ny mpiady, samy mandroso amin''izay hitsiny ka tsy vaky laharana;'
mg1865::mg_29::2::8:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mifanosika izy, fa samy mandroso amin''izay hitsiny; Ary na dia miezaka mamaky ny sabatra aza izy, dia tsy voaratra*. [*Na: voasakana]'
mg1865::mg_29::2::9:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifamoivoy eran''ny tanàna izy, mihazakazaka eny amin''ny manda izy, mananika ny trano izy, miditra ao am-baravarankely toy ny mpangalatra izy.'
mg1865::mg_29::2::10:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo alohany dia mihorohoro ny tany, ary mihozongozona ny lanitra; Ny masoandro sy ny volana tonga maizina, ary ny kintana tsy mamirapiratra.'
mg1865::mg_29::2::11:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah mahatonga kotroka eo alohan''ny miaramilany; Fa lehibe indrindra ny tobiny ary mahery izay manatanteraka ny teniny; Fa lehibe sy mahatahotra indrindra ny andron''i Jehovah, ka iza no mahatanty izany?'
mg1865::mg_29::2::12:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia ankehitriny aza, hoy Jehovah, miverena amiko amin''ny fonareo rehetra ary amin''ny fifadian-kanina sy ny fitomaniana ary ny fitarainana.'
mg1865::mg_29::2::13:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fonareo no triatriaro, fa aza ny fitafianareo, ary miverena amin''i Jehovah Andriamanitrareo; Fa mamindra fo sy miantra Izy, mahari-po sady be famindram-po ary manenina ny amin''ny loza,'
mg1865::mg_29::2::14:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao mba* hanenina ihany Izy ka hamela fitahiana ao aoriany, dia fanatitra hohanina sy fanatitra aidina ho an''i Jehovah Andriamanitrareo. [*Hebreo: Iza no mahalala na]'
mg1865::mg_29::2::15:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsofy ao Ziona ny anjomara, ka manamasina andro fifadian-kanina, miantsoa fivoriana masina.'
mg1865::mg_29::2::16:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angony ny vahoaka, manamasina fiangonana, vorio ny loholona, angony ny ankizy madinika mbamin''ny zaza minono; Aoka ny mpampakatra hiala ao an-efi-tranony, ary aoka ny ampakarina hiala ao an-trano fandriany.'
mg1865::mg_29::2::17:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anelanelan''ny lavarangana fidirana sy ny alitara no aoka hitomanian''ny mpisorona, mpanao fanompoam-pivavahana ho an''i Jehovah, ka hanao hoe: Iantrao ny olonao, Jehovah, ary aza avela ho latsa ny lovanao, ka hotapahin''ny jentilisa*; Fa nahoana no hataony any amin''ny firenena hoe: Aiza Izay Andriamaniny? [*Na: Hanaovan''ny jentilisa azy ho ambentinteny]'
mg1865::mg_29::2::18:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny hitsaharan''ny loza, sy ny hihavian''ny fitahiana'
  verse_text: 'Ary Jehovah dia saro-piaro ny taniny sady niantra ny olony.'
mg1865::mg_29::2::19:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Jehovah namaly ka nanao amin''ny olony hoe: Indro, hanatitra ny divay sy ny ranom-boaloboka ary ny diloilo ho anareo Aho, ka ho vokin''izany ianareo; Ary tsy havelako ho latsa any amin''ny Jentilisa intsony ianareo.'
mg1865::mg_29::2::20:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay avy any avaratra dia hampanalaviriko anareo ka horoahiko ho any amin''ny tany karankaina sy mariry; Ny loha-lalany ho any amin''ny ranomasina atsinanana, ary ny vodi-lalany ho any amin''ny ranomasina andrefana; Ary ny hamaimboany hiakatra, ary ny fofon-dratsiny hisondrotra; Fa efa nanao zava-dehibe izy.'
mg1865::mg_29::2::21:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra, ry tany fambolena, miravoravoa sy mifalia; Fa manao zava-dehibe Jehovah.'
mg1865::mg_29::2::22:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra, ry biby any an-tsaha, fa mihamaitso ny kijana any an''efitra, mamoa ny hazo, ary vokatra ny aviavy sy ny voaloboka.'
mg1865::mg_29::2::23:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo, ry zanak''i Ziona, miravoravoa sy mifalia amin''i Jehovah Andriamanitrareo; Fa hanome anareo ny loha-orana onony Izy*, dia handatsaka ranonorana mivatravatra ho anareo, eny, ny loha-orana sy ny fara-orana aloha. [*Na: Homeny mpampianatra ny fahamarinana ianareo]'
mg1865::mg_29::2::24:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho feno vary ny famoloana, ary hihoatra ny vata fanantazana ny divay sy ny diloilo.'
mg1865::mg_29::2::25:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary honerako ho anareo ilay taona nohanin''ny valala, dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo.'
mg1865::mg_29::2::26:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hihinana ianareo ka ho voky dia hidera ny anaran''i Jehovah Andriamanitrareo, fa mahagaga ny fitondrany anareo; Ary tsy ho menatra mandrakizay oloko.'
mg1865::mg_29::2::27:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantatrareo fa ao afovoan''Isiraely Aho, ary Izaho no Jehovah Andriamanitrareo, fa tsy misy hafa; Ary tsy ho menatra mandrakizay ny oloko.'
mg1865::mg_29::3::1:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny handatsahana ny Fanahy Masina, sy ny hitsarana ny firenena rehetra'
  verse_text: 'Ary rehefa afaka izany, dia handatsaka ny Fanahiko amin''ny nofo rehetra Aho; Dia haminany ny zanakalahinareo sy ny zanakavavinareo, ny lahiantitrareo hanonofy, ary ny zatovonareo hahita fahitana;'
mg1865::mg_29::3::2:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ny mpanompolahy sy ny mpanompovavy aza dia handatsahako ny Fanahiko amin''izany andro izany.'
mg1865::mg_29::3::3:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanisy fahagagana eny amin''ny lanitra sy ety amin''ny tany Aho, dia rà sy afo ary setroka mitankosina.'
mg1865::mg_29::3::4:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoandro hampodina ho aizina, ary ny volana ho rà, alohan''ny hahatongavan''ny andron''i Jehovah, izay sady lehibe no mahatsiravina.'
mg1865::mg_29::3::5:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na zovy na zovy no hiantso ny anaran''i Jehovah dia ho afa-mandositra; Fa ao an-tendrombohitra Ziona sy any Jerosalema dia hisy sisa afaka, araka izay efa voalazan''i Jehovah, ary izay antsoin''i Jehovah dia ho isan''izay afa-mandositra.'
mg1865::mg_29::4::1:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, amin''ireo andro ireo sy amin''izany fotoana izany, raha hampodiko ny Joda sy Jerosalema avy amin''ny fahababoany,'
mg1865::mg_29::4::2:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hangoniko ny jentilisa rehetra ka ho entiko midina ao amin''ny Lohasahan''i Josafata*, ary ao no hifandaharako aminy noho ny amin''ny Isiraely, oloko sy lovako, izay naeliny tany amin''ny jentilisa; Ary nozarazarainy ny taniko, [*Josafata = Jehovah no mitsara]'
mg1865::mg_29::4::3:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady nanaovany loka ny oloko, dia zazalahy no nataony takalon''ny vehivavy janga, ary zazavavy no namidiny divay ka nosotroiny.'
mg1865::mg_29::4::4:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo koa, ry Tyro sy Sidona, sy ry tany Filistia rehetra, moa mampaninona Ahy akory ianareo? Hamaly Ahy va ianareo, sa hanahoana Ahy? Faingana dia faingana no hanatsingerenako ny nataonareo ho eo an-dohanareo,'
mg1865::mg_29::4::5:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny natanareo ny volafotsiko sy ny volamenako, sy ny nitondranareo ny zava-tsoako mahafinaritra ho ao amin''ny tempolinareo;'
mg1865::mg_29::4::6:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanak''i Joda sy ny zanak''i Jerosalema dia namidinareo tamin''ny zanaky ny Grika, hamindranareo azy hanalavitra ny taniny.'
mg1865::mg_29::4::7:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hofohaziko izy hiala ny amin''ny tany Izay nahaverezany noho ny nahalafosanareo azy, ary hatsingeriko ho eo an-dohanareo ny nataonareo,'
mg1865::mg_29::4::8:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hamidiko ho lasan''ny zanak''i Joda kosa ny zanakalahinareo sy ny zanakavavinareo, ary hamidiny amin''ny Sabeana kosa ireny, dia ho an''izay firenena lavitra; Fa Jehovah no efa niteny.'
mg1865::mg_29::4::9:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Antsoy any amin''ny jentilisa izany, miantsoa hanao ady masina, fohazy ny lehilahy mahery, aoka handroso ny mpiady rehetra ka hiakatra;'
mg1865::mg_29::4::10:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tefeo ho sabatra ny fangadinareo, ary ho lefona ny antsinareo fanetezam-boaloboka; Aoka izay kelikely aina hihiaka hoe: Mahery aho!'
mg1865::mg_29::4::11:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia faingana, ianareo jentilisa rehetra avy eny manodidina eny, dia ento midina ao ny maherinao, Jehovah o.'
mg1865::mg_29::4::12:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifoha ny jentilisa ka hiakatra ho ao amin''ny Lohasahan''i Josafata; Fa ao no hipetrahako hitsara ny jentilisa rehetra avy eny manodidina eny.'
mg1865::mg_29::4::13:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arosoy ny fijinjana, fa masaka ny vokatra; Avia ianareo, ka manosihose, fa feno ny famiazam-boaloboka, mihoatra ny vata fanantazana, fa be ny faharatsiany.'
mg1865::mg_29::4::14:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'He izany vahoaka mireondreona ao amin''ny lohasaha fitsarana! Fa efa antomotra ny andron''i Jehovah ao amin''ny lohasaha fitsarana.'
mg1865::mg_29::4::15:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoandro sy ny volana ho tonga maizina, ary ny kintana tsy hamirapiratra,'
mg1865::mg_29::4::16:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mierona ao Ziona, ary mampikotroka ao Jerosalema, ka hihorohoro ny tany aman-danitra; Fa Jehovah no fialofan''ny olony sy fiarovana mafy ho an''ny Zanak''Isiraely.'
mg1865::mg_29::4::17:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo, Izay monina ao Ziona, tendrombohitro masina; Dia ho masina Jerosalema, ary ny hafa firenena tsy mba handeha hamaky eo intsony.'
mg1865::mg_29::4::18:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hipoipoitra ranom-boaloboka ny tendrombohitra, handriaka ronono ny havoana, ho feno rano ny lohasahan-driak''i Joda rehetra, ary hisy loharano hivoaka avy ao an-tranon''i Jehovah ka handena ny lohasahan-driak''i Sitima.'
mg1865::mg_29::4::19:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Egypta kosa ho tonga tany lao, ary Edoma ho efitra foana, noho ny fampahoriana ny taranak''i Joda, dia ny nandatsahany rà marina teo amin''ny taniny.'
mg1865::mg_29::4::20:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joda honenana mandrakizay, ary Jerosalema hatramin''ny taranaka fara mandimby.'
mg1865::mg_29::4::21:
  verse_version: mg1865
  verse_book: mg_29
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamaly ny rà marina izay tsy mbola novaliako Aho; Fa Jehovah monina ao Ziona.'
