mg1865::mg_5::1::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Teny nataon''i Mosesy ho fampahatsiarovana ny soa nataon''Andriamanitra tamin''ny Isiraely sy ny nitondrany azy hatrany Horeba ka hatrany an-dafy atsinanan''i Jordana'
  verse_text: 'IZAO no teny izay nolazain''i Mosesy tamin''ny Isiraely rehetra tany an-dafin''i Jordana, tany an''efitra, dia tany amin''ny tani-hay tandrifin''i Sofa, tanelanelan''i Parana sy Tofela sy Labana sy Hazerota ary Dizahaba.'
mg1865::mg_5::1::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: '(lalana Iraika ambin''ny folo andro Kadesi-barnea raha ao Horeba, raha ny lalana mahazo ny tendrombohitra Seira no aleha.)'
mg1865::mg_5::1::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro voalohany tamin''ny volana fahiraika ambin''ny folo tamin''ny taona fahefa-polo dia niteny tamin''ny Zanak''Isiraely Mosesy, araka izay rehetra efa nandidian''i Jehovah azy holazainy aminy,'
mg1865::mg_5::1::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa namono an''i Sihona, mpanjakan''ny Amorita, ilay nonina tao Hesbona, sy Oga, mpanjakan''i Basana, ilay nonina tao Astarta tany Edrehy, izy.'
mg1865::mg_5::1::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany an-dafin''i Jordana, dia tany amin''ny tany Moaba, no nanombohan''i Mosesy nanazava izao lalàna izao hoe:'
mg1865::mg_5::1::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitsika niteny tamintsika tany Horeba ka nanao hoe: Aoka izay ny itoeranareo amin''ny tendrombohitra ity;'
mg1865::mg_5::1::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'mihodìna ianareo, dia mandehana ka mankanesa any amin''ny tany havoan''ny Amorita sy any amin''izay rehetra ao akaikiny, dia any amin''ny tani-hay sy ny tany havoana sy ny tany lemaka amoron-tsiraka sy ny tany atsimo sy ny amoron''ny ranomasina, dia any amin''ny tanin''ny Kananita sy any Libanona ka hatrany amin''ny ony lehibe, dia ny ony Eofrata.'
mg1865::mg_5::1::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa natolotro eo anoloanareo ny tany, idiro ka lovao ny tany izay efa nianianan''i Jehovah tamin''ny razanareo, Abrahama sy Isaka ary Jakoba, homena azy sy ny taranany mandimby azy.'
mg1865::mg_5::1::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny taminareo tamin''izany andro izany aho ka nanao hoe: Tsy zakako izaho irery ny hitondra anareo;'
mg1865::mg_5::1::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitrareo efa nahamaro anareo, ary, indro, efa maro toy ny kintana eny amin''ny lanitra ianareo izao.'
mg1865::mg_5::1::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: '(Jehovah, Andriamanitry ny razanareo, anie hampitombo anareo ho arivo toraka izao ka hitahy anareo, araka izay efa nolazainy taminareo!)'
mg1865::mg_5::1::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko izaho irery ahoana no fitondra ny fahasahirananareo sy ny entanareo ary ny adinareo?'
mg1865::mg_5::1::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifidiana izay lehilahy hendry sy manan-tsaina ary hita toetra amin''ny firenenareo, ka hataoko ho lehibenareo izy.'
mg1865::mg_5::1::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ahy ianareo ka nanao hoe: Tsara ny teny izay nolazainao ka tokony hankatoavina.'
mg1865::mg_5::1::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalaiko ny lohan''ny firenenareo, dia olona hendry sady hita toetra, ka nataoko mpifehy anareo, dia mpifehy arivo sy mpifehy zato sy mpifehy dimam-polo sy mpifehy folo ary mpitondra vahoaka amin''ny firenenareo.'
mg1865::mg_5::1::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy ny mpitsara anareo tamin''izany andro izany aho ka nanao hoe: Henoy ny adin''ny rahalahinareo, ka tsarao marina ny olona, na ny tompon-tany, na ny vahiny eo aminy.'
mg1865::mg_5::1::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mizaha tavan''olona amin''ny fitsarana, fa henoy ny kely toy ny lehibe; aza matahotra olona akory, fa an''Andriamanitra ny fitsarana; ary izay sarotra loatra aminareo dia ento ety amiko ka hohenoiko.'
mg1865::mg_5::1::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy anareo tamin''izany andro izany aho ny amin''ny zavatra rehetra izay hataonareo.'
mg1865::mg_5::1::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tany Horeba isika, dia nandeha namaky ilay efitra lehibe sy mahatahotra izay hitanareo teny amin''ny lalana mankany amin''ny tany havoan''ny Amorita, araka izay efa nandidian''i Jehovah Andriamanitsika; dia tonga tao Kadesi-barnea isika.'
mg1865::mg_5::1::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho taminareo: Ianareo efa tonga eto amin''ny tany havoan''ny Amonita, izay omen''i Jehovah Andriamanitsika ho antsika;'
mg1865::mg_5::1::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'indro, efa natolotr''i Jehovah Andriamanitrao eo anoloanao ny tany; iakaro izy ka lovao, araka izay nolazain''i Jehovah, Andriamanitry ny razanao, taminao; aza matahotra na mivadi-po ianao.'
mg1865::mg_5::1::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona ahy ianareo rehetra ka nanao hoe: Aoka haniraka olona hialoha isika, mba hisafo ny tany ho antsika izy ka hitondra teny amintsika hilaza ny lalana izay halehantsika sy ny tanàna izay hiakarantsika.'
mg1865::mg_5::1::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitrako ny teny ka dia nifidy roa ambin''ny folo lahy teo aminareo aho, iray avy isam-pirenena;'
mg1865::mg_5::1::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niainga ireo ka niakatra tany amin''ny tany havoana, dia tonga tao amin''ny lohasaha Eskola ka nisafo ny tany;'
mg1865::mg_5::1::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nangalany ny vokatry ny tany ka nentiny nidina tamintsika, dia nilaza tamintsika hoe izy: Tsara ny tany izay omen''i Jehovah Andriamanitsika ho antsika.'
mg1865::mg_5::1::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy nety niakatra ianareo, fa nandà ny tenin''i Jehovah Andriamanitrareo.'
mg1865::mg_5::1::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nimonomonona tao an-dainareo ianareo ka nanao hoe: Halan''i Jehovah isika, no nitondrany antsika nivoaka avy tany Egypta hanolorany antsika eo an-tanan''ny Amorita handringanana antsika.'
mg1865::mg_5::1::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho aiza no hiakarantsika? Ny rahalahintsika efa nanaketraka ny fontsika tamin''ny nanaovany hoe: Lehibe sy lava noho isika ny olona; ary ny tanàna dia lehibe sady misy mànda manakatra ny lanitra; ary efa hitanay teo koa ny taranaky ny Anakita.'
mg1865::mg_5::1::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho taminareo: Aza manahy, ary aza matahotra azy;'
mg1865::mg_5::1::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitrareo, Izay mandeha eo anoloanareo, Izy no hiady ho anareo, araka izay rehetra nataony ho anareo tany Egypta teo imasonareo,'
mg1865::mg_5::1::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tany an''efitra, izay nahitanao ny fitondran''i Jehovah Andriamanitrao anao tahaka ny fitondran''ny olona ny zanany, dia teny amin''ny lalana rehetra izay nalehanareo mandra-pahatonganareo teto amin''ity tany ity.'
mg1865::mg_5::1::32:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, na dia nataoko aza izany teny izany, mbola tsy ninoanareo ihany Jehovah Andriamanitrareo,'
mg1865::mg_5::1::33:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nandeha tamin''ny lalana teo alohanareo hitady tany ho anareo hitobianareo, ka ny afo nony alina sy ny rahona nony antoandro no nisehoany hanoro izay lalana nety halehanareo.'
mg1865::mg_5::1::34:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any nandre ny teninareo Jehovah, dia tezitra Izy ka nianiana hoe:'
mg1865::mg_5::1::35:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisy olona mihitsy amin''izao taranaka ratsy fanahy izao hahita ny tany soa izay nianianako homena ny razanareo,'
mg1865::mg_5::1::36:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy Kaleba, zanak''i Jefone; izy no hahita azy, any izy sy ny zanany no homeko ny tany izay nodiaviny, satria efa tanteraka tamin''ny fanarahana an''i Jehovah izy.'
mg1865::mg_5::1::37:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho koa dia notezeran''i Jehovah noho ny aminareo ka nataony hoe: Ianao koa tsy hiditra any;'
mg1865::mg_5::1::38:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Josoa, zanak''i Nona, izay mitsangana eo anatrehanao, izy no hiditra any, koa izy no ampaherezo, fa izy no hampandova ny Zanak''Isiraely ny tany.'
mg1865::mg_5::1::39:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakareo madinika, izay nolazainareo fa ho babo, any ny zanakareo izay tsy mahalala ny tsara sy ny ratsy amin''izao andro izao, dia izy no hiditra any, ary izy no homeko ny tany, ary izy no handova azy.'
mg1865::mg_5::1::40:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa dia miverena, ka mandehana any an''efitra, dia any amin''ny lalana mankany amin''ny Ranomasina Mena.'
mg1865::mg_5::1::41:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ianareo ka nanao tamiko hoe: Efa nanota tamin''i Jehovah izahay; hiakatra ihany izahay ka hiady, araka izay rehetra nandidian''i Jehovah Andriamanitsika antsika. Dia samy nivonona tamin''ny fiadiany avy ianareo rehetra, ka nataonareo ho tsinontsinona ny hiakatra any an-tendrombohitra.'
mg1865::mg_5::1::42:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Lazao aminy hoe: Aza miakatra ianareo, ary aza miady, fa tsy eo aminareo Aho; fandrao ho resy eo anoloan''ny fahavalonareo ianareo.'
mg1865::mg_5::1::43:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny taminareo aho, nefa tsy nihaino ianareo; ary nandà ny tenin''i Jehovah ianareo, dia nanao sahisahy ka niakatra tany an-tendrombohitra ihany.'
mg1865::mg_5::1::44:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka hiady aminareo ny Amorita, izay nonina tamin''izany tendrombohitra izany, ka nanenjika anareo tahaka ny fanenjiky ny reni-tantely, dia nandringana anareo tany Seira ka hatrany Horma.'
mg1865::mg_5::1::45:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina ianareo ka nitomany teo anatrehan''i Jehovah; nefa tsy nihaino ny feonareo Jehovah, na nanongilana ny sofiny taminareo.'
mg1865::mg_5::1::46:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 1
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitoetra ela tao Kadesy ianareo, araka ny andro izay nitoeranareo tao.'
mg1865::mg_5::2::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina isika ka nandeha tany an''efitra tamin''ny lalana mankany amin''ny Ranomasina Mena, araka izay nolazain''i Jehovah tamiko; ary nanodidina ny tendrombohitra Seira ela ihany isika.'
mg1865::mg_5::2::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamiko Jehovah ka nanao hoe:'
mg1865::mg_5::2::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izay ny nandehananareo nanodidina ity tendrombohitra ity, fa miverena hianavaratra ianareo.'
mg1865::mg_5::2::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandidia ny olona hoe: Ianareo efa handeha hamaky ny tanin''ny taranak''i Esao rahalahinareo, izay monina any Seira; dia hatahotra anareo izy; nefa mitandrema tsara ianareo,'
mg1865::mg_5::2::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka aza mila ady aminy; fa tsy hanomezako anao ny taniny, na dia eram-paladia akory aza, satria nomeko ho lovan''i Esao ny tendrombohitra Seira.'
mg1865::mg_5::2::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vola no hamidinareo hanina aminy hohaninareo; ary vola koa no hamidinareo rano aminy hosotroinareo.'
mg1865::mg_5::2::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrao efa nitahy anao tamin''izay rehetra nataon''ny tananao; fantany ny nandehananao namaky ity efitra lehibe ity; izay efa-polo taona izay Jehovah Andriamanitrao no teo aminao, ka tsy nanan-java-mahory akory ianao.'
mg1865::mg_5::2::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandalo ny taranak''i Esao rahalahintsika izay monina any Seira isika ary niala tamin''ny lalana amin''ny tani-hay sy tao Elata ary Ezion-gebera, dia nivily isika ka nandeha tamin''ny lalana mankany amin''ny efitr''i Moaba.'
mg1865::mg_5::2::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Aza mandrafy ny Moabita, na mila ady aminy, fa tsy hanomezako ho lovanao ny taniny, satria Ara dia nomeko ho lovan''ny taranak''i Lota.'
mg1865::mg_5::2::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Emima nonina tany fahiny, dia firenena lehibe sy maro isa ary olona lava tahaka ny Anakita.'
mg1865::mg_5::2::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo koa no natao ho Refaita tany aloha tahaka ny Anakita; fa ny Moabita kosa nanao azy hoe Emima.'
mg1865::mg_5::2::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany Seira dia nonenan''ny Horita, fa ny taranak''i Esao nandroaka azy ka nandringana azy tsy ho eo anoloany, dia nonina nisolo azy, araka ny nataon''ny Isiraely tao amin''ny tany izay nomen''i Jehovah azy ho lovany.)'
mg1865::mg_5::2::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miaingà ianareo ankehitriny, ka mandehana mita ny lohasahan-driaka Zareda. Dia nita ny lohasahan-driaka Zareda isika.'
mg1865::mg_5::2::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nandehanantsika hatrany Kadesi-barnea ka hatramin''ny nitantsika ny lohasahan-driaka Zareda dia valo amby telo-polo taona, mandra-pahalany ritran''ny mpanafika rehetra tamin''izany taranaka rehetra izany ka tsy nisy intsony teo amin''ny toby, araka izay efa nianianan''i Jehovah taminy.'
mg1865::mg_5::2::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny tanan''i Jehovah dia namely azy handringanana azy mandra-pahalany ritrany ka tsy nisy intsony teo amin''ny toby.'
mg1865::mg_5::2::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lany ritra ny mpanafika ka maty avokoa,'
mg1865::mg_5::2::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niteny tamiko Jehovah ka nanao hoe:'
mg1865::mg_5::2::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny efa hamaky ny tany Moaba ianao ka hahazo any Ara,'
mg1865::mg_5::2::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho tonga ao akaikin''ny taranak''i Amona, nefa aza mandrafy azy, na mila ady aminy; fa tsy hanomezako ho lovanao ny tanin''ny taranak''i Amona, satria nomeko ho lovan''ny taranak''i Lota izany.'
mg1865::mg_5::2::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany koa no natao ho tanin''ny Refaita; fa ny Refaita no nitoetra tao tany aloha ka nataon''ny Amonita hoe Zamzomita.'
mg1865::mg_5::2::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Firenena lehibe sy maro isa ary olona lava tahaka ny Anakita ireny, nefa naringan''i Jehovah tsy ho eo anoloany izy, ka ny Amonita no nonina nisolo azy,'
mg1865::mg_5::2::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka izay nataony koa ho an''ny taranak''i Esao, izay mitoetra any Seira, fa nandringana ny Horita tsy ho eo anoloany Izy, ka dia nandroaka azy ireo ka nonina nisolo azy mandraka androany;'
mg1865::mg_5::2::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny amin''ny Avita, izay nonina am-bohitra hatrany Gaza, dia naringan''ny Kaftorita, izay avy tany Kaftora, izy; ary ireo no nonina nisolo azy).'
mg1865::mg_5::2::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, miaingà, ka mità ny lohasahan-driaka Arnona ianareo; indro, efa natolotro eo an-tananao Sihona Amorita, mpanjakan''i Hesbona, mbamin''ny taniny. Santaro ny handovanao azy, ka tafiho.'
mg1865::mg_5::2::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anio no vao hataoko mahazo ny firenena ambanin''ny lanitra rehetra ny horohoro sy tahotra anareo, ka raha reny ny lazanao, dia hangovitra sy hangorohoro eo anoloanao izy.'
mg1865::mg_5::2::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka olona avy tany an''efitr''i Kedemota aho hankany amin''i Sihona, mpanjakan''i Hesbona, nitondra teny fihavanana hoe:'
mg1865::mg_5::2::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka mba handeha hamaky ny taninao aho; ny lalambe ihany no halehako, ka tsy hivily aho, na ho amin''ny ankavanana, na ho amin''ny ankavia;'
mg1865::mg_5::2::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'vola no hamidiko hanina aminao hohaniko, ary vola no hamidiko rano aminao hosotroiko; ary handalo fotsiny ihany aho'
mg1865::mg_5::2::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: '(araka izay nataon''ny taranak''i Esao, izay monina any Moabita, izay monina any Ara, tamiko) mandra-pitako an''i Jordana ho any amin''ny tany izay omen''i Jehovah Andriamanitray anay.'
mg1865::mg_5::2::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Sihona, mpanjakan''i Hesbona, tsy nety namela antsika handeha hamaky ny taniny; fa Jehovah Andriamanitrao nanamafy ny fony sy nampahaditra ny fanahiny, mba hanolorany azy eo an-tananao tahaka ny amin''izao anio izao.'
mg1865::mg_5::2::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamiko hoe Jehovah: Indro, vao manomboka hanolotra an''i Sihona sy ny taniny eo anoloanao Aho; santaro ny handovanao ny taniny.'
mg1865::mg_5::2::32:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka Sihona mbamin''ny vahoakany rehetra hiady amintsika tao Jahaza.'
mg1865::mg_5::2::33:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanolotra azy teo anoloantsika Jehovah Andriamanitsika, ka nandresy azy sy ny zanany ary ny vahoakany rehetra isika.'
mg1865::mg_5::2::34:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahafaka ny tanànany rehetra tamin''izany andro izany isika ka nandringana ny mponina rehetra tamin''ny isan-tanàna mbamin''ny zaza amim-behivavy; tsy nasiantsika niangana izy na dia iray akory aza.'
mg1865::mg_5::2::35:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny biby fiompy sy ny fananany tao amin''ny tanàna izay afatsika ihany no nataontsika ho babo.'
mg1865::mg_5::2::36:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, dia hatramin''ny tanàna izay ao an-dohasaha ka hatrany Gileada, dia tsy nisy tanàna tsy afatsika; fa izy rehetra dia natolotr''i Jehovah Andriamanitsika teo anoloantsika.'
mg1865::mg_5::2::37:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny tanin''ny taranak''i Amona no tsy nakekenareo, dia ny tany amoron''ny lohasahan-driaka Jaboka, sy ny tanàna ao amin''ny tany havoana, ary izay rehetra nandraran''i Jehovah Andriamanitsika antsika.'
mg1865::mg_5::3::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina isika ka niakatra tamin''ny lalana mankany Basana; ary nivoaka hiady amintsika tao Edrehy Oga, mpanjakan''i Basana, mbamin''ny vahoakany rehetra.'
mg1865::mg_5::3::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Aza matahotra azy ianao; fa efa natolotro eo an-tananao izy mbamin''ny vahoakany rehetra sy ny taniny, ary ianao hanao aminy araka izay nataonao tamin''i Sihona, mpanjakan''ny Amorita, izay nonina tao Hesbona.'
mg1865::mg_5::3::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natolotr''i Jehovah Andriamanitsika teo an-tanantsika koa Oga, mpanjakan''i Basana, sy ny vahoakany rehetra; dia nandresy azy isika mandra-paha tsy hisy niangana na dia iray akory aza.'
mg1865::mg_5::3::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia afatsika ny tanànany rehetra tamin''izany andro izany, tsy nisy tanàna izay tsy nalaintsika taminy, dia tanàna enim-polo, dia ny tany Argoba rehetra, izay fanjakan''i Oga tany Basana.'
mg1865::mg_5::3::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo tanàna rehetra ireo dia samy nasiana manda avo sy vavahady ary hidy hahamafy azy, afa-tsy ny vohitra madinika maro dia maro.'
mg1865::mg_5::3::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naringantsika ireny tahaka izay efa nataontsika tamin''i Sihona, mpanjakan''i Hesbona; naringana ny mponina rehetra tamin''ny isan-tanàna mbamin''ny zaza amim-behivavy.'
mg1865::mg_5::3::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny biby fiompy rehetra sy ny fananana tamin''ireo tanàna ireo dia nataontsika babo ho antsika.'
mg1865::mg_5::3::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalaintsika tamin''izany andro izany tamin''ny mpanjaka roan''ny Amorita ny tany izay any an-dafin''i Jordana, hatramin''ny lohasahan-driaka Arnona ka hatramin''ny tendrombohitra Hermona'
mg1865::mg_5::3::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hermona nataon''ny Sidoniana hoe Siriona; ary ny Amorita kosa nanao azy hoe Senira,'
mg1865::mg_5::3::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny tanàna rehetra amin''ny tany lemaka sy Gileada rehetra ary Basana rehetra hatrany Saleka sy Edrehy, dia ny tanàna amin''ny fanjakan''i Oga tany Basana.'
mg1865::mg_5::3::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Oga, mpanjakan''i Basana, ihany no sisa velona tamin''ny Refalta; indro, farafara vy ny farafarany (tsy ao Raban''ny taranak''i Amona va Izany?), sivy hakiho ny halavany, ary efatra hakiho ny sakany, araka ny hakihon''ny lehilahy.'
mg1865::mg_5::3::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary io tany io dia azontsika tamin''izany andro izany; hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, sy ny antsasaky ny tany havoan''i Gileada ary ny tanàna eo dia nomeko ny Robenita sy ny Gadita.'
mg1865::mg_5::3::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ry Gileada sisa sy Basana rehetra, izay fanjakan''i Oga, dia nomeko ny antsasaky ny firenen''i Manase, dia ny tany Argoba rehetra, dia Basana rehetra (atao hoe tanin''ny Refaita izany.'
mg1865::mg_5::3::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jaïra, zanak''i Manase, no nahafaka ny tany Argoba rehetra, hatramin''ny faritanin''ny Gesorita sy ny Makatita; ary ny anaran''izany (dia Basana) nataony hoe Havota-jaira, araka ny anaran-tenany ihany, mandraka androany).'
mg1865::mg_5::3::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gileada dia nomeko an''i Makira.'
mg1865::mg_5::3::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Robenita sy ny Gadita dia nomeko ny hatrany Gileada ka hatramin''ny lohasahan-driaka Arnona, dia ny antsasaky ny lohasaha, sy ny faritany hatramin''ny amoron''ny lohasahan-driaka Jaboka, izay faritanin''ny taranak''i Amona,'
mg1865::mg_5::3::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tani-hay koa sy Jordana ary ny faritany hatrany Kireneta ka hatramin''ny ranomasina amin''ny tani-hay, dia ny Ranomasin-tsira, eo am-bodin''i Pisga, dia ao atsinanany.'
mg1865::mg_5::3::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandidy anareo tamin''izany andro izany aho ka nanao hoe: Jehovah Andriamanitrareo efa nanome anareo ity tany ity ho lovanareo; andeha mita eo alohan''ny Zanak''Isiraely rahalahinareo ianareo rehetra izay mahery, samy efa voaomana hiady.'
mg1865::mg_5::3::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vadinareo sy ny zanakareo madinika ary ny ombinareo (fantatro fa be omby ianareo) dia hitoetra ao an-tanànanareo izay nomeko anareo,'
mg1865::mg_5::3::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandra-panomen''i Jehovah fitsaharana ny rahalahinareo tahaka ny anareo, ka holovany koa ny tany izay nomen''i Jehovah Andriamanitrareo azy any an-dafin''i Jordana; dia hiverina ianareo, samy ho any amin''ny taniny avy, izay nomeko anareo.'
mg1865::mg_5::3::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny amin''ny tsy hidiran''i Mosesy ao Kanana, sy ny nanendrena an''i Josoa handimby azy'
  verse_text: 'Dia nandidy an''i Josoa aho tamin''izany andro izany ka nanao hoe: Ny masonao efa nahita izay rehetra nataon''i Jehovah Andriamanitrareo tamin''ireo mpanjaka roa lahy ireo; dia toy izany no hataon''i Jehovah amin''ny fanjakana rehetra izay halehanao.'
mg1865::mg_5::3::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra azy ianareo; fa Jehovah Andriamanitrareo no hiady ho anareo.'
mg1865::mg_5::3::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah tamin''izany andro izany aho ka nanao hoe:'
mg1865::mg_5::3::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tompo o, Ianao vao naneho tamin''ny mpanomponao ny fahalehibiazanao sy ny tananao mahery; fa aiza no misy andriamanitra, na any an-danitra na aty an-tany, izay mahay manao araka ny asanao sy ny herinao?'
mg1865::mg_5::3::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka mba handeha hita aho ka hahita ny tany soa izay any an-dafin''i Jordana, dia ilay be tendrombohitra tsara sy Libanona.'
mg1865::mg_5::3::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tezitra tamiko Jehovah noho ny aminareo ka tsy nihaino ahy; dia hoy Jehovah tamiko: Aoka izay, fa aza miteny amiko intsony ny amin''izany zavatra izany ianao.'
mg1865::mg_5::3::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara eo an-tampon''i Pisga ianao, ary atopazy ny masonao miankandrefana sy mianavaratra ary mianatsimo sy miantsinanana, ary aoka hijery ny masonao; fa tsy hita izany Jordana izany ianao;'
mg1865::mg_5::3::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mandidia an''i Josoa ianao, dia mampahereza azy sy mampahatanjaha azy; fa izy no handeha hita eo alohan''ity firenena ity, ary izy no hampandova azy ny tany izay ho hitanao.'
mg1865::mg_5::3::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nitoetra tany an-dohasaha tandrifin''i Beti-peora isika.'
mg1865::mg_5::4::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Famporisihan''i Mosesy ny Isiraely mba hazoto mitandrina ny lalàna'
  verse_text: 'Ary ankehitriny, ry Isiraely, mihainoa ny didy sy ny fitsipika izay ampianariko anareo harahinareo, mba ho velona ianareo ka hiditra sy handova ny tany izay omen''i Jehovah, Andriamanitry ny razanareo, anareo.'
mg1865::mg_5::4::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ampianareo ny teny izay andidiako anareo, ary aza anesoranareo, fa tandremo ny didin''i Jehovah Andriamanitrareo izay andidiako anareo.'
mg1865::mg_5::4::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masonareo efa nahita izay nataon''i Jehovah noho ny tamin''i Bala-peora; fa ny olona rehetra izay nanaraka an''i Bala-peora dia naringan''i Jehovah Andriamanitrao tsy ho eo aminao.'
mg1865::mg_5::4::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo izay nifikitra tamin''i Jehovah Andriamanitrareo kosa dia samy velona avokoa izao anio izao.'
mg1865::mg_5::4::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa nampianariko didy sy fitsipika ianareo, araka izay nandidian''i Jehovah Andriamanitro ahy, mba harahinareo any amin''ny tany izay efa hidiranareo holovana.'
mg1865::mg_5::4::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo ary ataovy izany, fa izany no ho fahendrenareo sy ho fanananareo saina eny imason''ny firenen-tsamy hafa; fa handre izany lalàna rehetra izany izy ka hanao hoe: Olona hendry sy manan-tsaina tokoa io firenena io'
mg1865::mg_5::4::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no firenena, na dia lehibe aza, no mba manana andriamanitra akaiky azy tahaka an''i Jehovah Andriamanitra amin''izay rehetra iantsoantsika Azy?'
mg1865::mg_5::4::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no firenena, na dia lehibe aza, no mba manana didy sy fitsipika marina tahaka izao lalàna rehetra izao, izay ataoko eo anatrehanareo anio?'
mg1865::mg_5::4::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa mitandrema ianao, ka tandremo tsara ny fanahinao, fandrao hadinoinao ny zavatra izay efa hitan''ny masonao, ary andrao miala amin''ny fonao izany, amin''ny andro rehetra hiainanao, fa ampahafantaro ny zanakao sy ny zafinao izany,'
mg1865::mg_5::4::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay hitanao tamin''ny andro izay nitsangananao teo anatrehan''i Jehovah Andriamanitrao tany Horeba, fony Jehovah nilaza tamiko hoe: Angony ety amiko ny olona, dia hampandrenesiko azy ny teniko, izay hianarany mba hatahotra Ahy amin''ny andro rehetra hiainany ambonin''ny tany sady hampianariny ny zanany koa.'
mg1865::mg_5::4::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanakaiky ianareo ka nitsangana teo am-bodin''ny tendrombohitra; ary ny tendrombohitra nirehitra afo manakatra ny lanitra, sady nisy aizina sy rahona ary aizim-pito.'
mg1865::mg_5::4::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny taminareo teo amin''ny afo Jehovah; ny teny ihany no renareo, fa tsy nahita endrika akory ianareo.'
mg1865::mg_5::4::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambarany taminareo ny fanekeny, izay nandidiany anareo harahina, dia ny Didy Folo ary nosoratany teo amin''ny vato fisaka roa ireo.'
mg1865::mg_5::4::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho nodidian''i Jehovah tamin''izany andro izany hampianatra anareo didy sy fitsipika, mba harahinareo any amin''ny tany izay efa hidiranareo holovana.'
mg1865::mg_5::4::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tandremo tsara ny fanahinareo; fa tsy nahita endrika akory ianareo tamin''ny andro izay nitenenan''i Jehovah taminareo tao amin''ny afo tany Horeba;'
mg1865::mg_5::4::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao manao ratsy ianareo ka manao sarin-javatra voasokitra ho anareo, araka izay endri-javatra na inona na inona, dia sarin-dehilahy, na sarim-behivavy,'
mg1865::mg_5::4::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'na sarim-biby izay ety ambonin''ny tany, na sarim-borona manana elatra izay manidina eny amin''ny habakabaka,'
mg1865::mg_5::4::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'na sarim-biby mandady na mikisaka amin''ny tany, na sarin-kazandrano izay ao amin''ny rano ambanin''ny tany.'
mg1865::mg_5::4::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: '2022-06-13T08:17:09+0000'
  verse_title: null
  verse_text: 'Ary andrao raha miandrandra ny lanitra ianao ka mahita ny masoandro sy ny volana ary ny kintana, dia izay rehetra eny amin''ny lanitra, dia ho voataona ianao hiankohoka eo anatrehany sy hanompo azy, izay nataon''i Jehovah Andriamanitrao ho anjaran''ny firenena rehetra ambanin''ny lanitra.'
mg1865::mg_5::4::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo no nalain''i Jehovah ka nentiny nivoaka avy tao amin''ny memy fandrendreham-by (dia avy tany Egypta) mba ho firenena ho Azy tahaka ny amin''izao anio izao.'
mg1865::mg_5::4::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia tezitra tamiko noho ny aminareo ka nianiana fa tsy hita an''i Jordana aho, na hiditra any amin''ny tany soa izay omen''i Jehovah Andriamanitrao ho lovanao.'
mg1865::mg_5::4::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho ho faty amin''ity tany ity, fa tsy hita an''i Jordana; fa ianareo kosa no hita ka handova izany tany soa izany.'
mg1865::mg_5::4::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema ianareo, fandrao manadino ny faneken''i Jehovah Andriamanitrareo izay nataony taminareo ka manao sarin-javatra voasokitra ho anareo, araka ny endriky ny zavatra izay efa nandraran''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::4::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrao dia afo mandevona; eny, Andriamanitra saro-piaro Izy.'
mg1865::mg_5::4::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miteraka sy ho loa-jafy koa ianao, ka efa nitoetra ela teo amin''ny tany ianareo ary manao ratsy ka manao sarin-javatra voasokitra, araka izay endriky ny zavatra na inona na inona, sy manao ratsy eo imason''i Jehovah Andriamanitrao ary mampahatezitra Azy,'
mg1865::mg_5::4::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia miantso ny lanitra sy ny tany ho vavolombelona aho anio fa vetivety foana dia ho fongotra tokoa ianareo tsy ho eo amin''ny tany izay alehanareo hita an''i Jordana holovana; tsy ho maro andro eo ianareo, fa haringana tokoa.'
mg1865::mg_5::4::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hampiely anareo any amin''ny firenen-tsamy hafa; ary ho tonga olom-bitsy izay sisa aminareo any amin''ny firenen-tsamy hafa izay hitondran''i Jehovah anareo.'
mg1865::mg_5::4::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary any no hanompoanareo andriamanitra asan''ny tanan''olona, dia vato aman-kazo, izay tsy mahita, na mandre, na mihinana, na manimbolo.'
mg1865::mg_5::4::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa any ianao no hitady an''i Jehovah Andriamanitrao ka hahita Azy, raha mitady Azy amin''ny fonao rehetra sy ny fanahinao rehetra.'
mg1865::mg_5::4::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha azom-pahoriana ianao, fa manjo anao ireo zavatra rehetra ireo, dia hiverina amin''i Jehovah Andriamanitrao ianao any am-parany ka hihaino ny feony;'
mg1865::mg_5::4::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Andriamanitra mamindra fo Jehovah Andriamanitrao ka tsy hahafoy anao, na handringana anao, na hanadino ny fanekena tamin''ny razanao, izay efa nianianany taminy.'
mg1865::mg_5::4::32:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa anontanio ange ny andro lasa, izay teo alohanao hatramin''ny andro izay namoronan''Andriamanitra olombelona tety ambonin''ny tany ary hatramin''ny faravodilanitra manodidina, raha mba nisy zavatra lehibe tahaka izany, na mba efa nisy re tahaka izany.'
mg1865::mg_5::4::33:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa nisy firenena nandre ny feon''Andriamanitra niteny tao amin''ny afo, tahaka ny efa renao, ka velona ihany?'
mg1865::mg_5::4::34:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa nanandrana handeha haka firenena ho Azy avy amin''ny firenena hafa va Andriamanitra amin''ny fizahan-toetra sy ny famantarana sy ny fahagagana sy ny ady sy ny tanana mahery sy ny sandry nahinjitra ary ny fampahatahorana lehibe, araka izay rehetra nataon''i Jehovah Andriamanitrareo ho anareo tany Egypta teo imasonao?'
mg1865::mg_5::4::35:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no nampahitainy izany, mba hahafantaranao fa Jehovah no Andriamanitra, fa tsy misy afa-tsy Izy.'
mg1865::mg_5::4::36:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tany an-danitra no nampandrenesany anao ny feony hananarany anao; ary teo ambonin''ny tany no nanehoany anao ny afony lehibe; ary ny teniny efa renao avy tao afovoan''ny afo.'
mg1865::mg_5::4::37:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tia ny razanao Izy ka nifidy ny zanany mandimby azy, dia Izy no nitondra anao nivoaka avy tany Egypta tamin''ny heriny lehibe,'
mg1865::mg_5::4::38:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'handroahany eo anoloanao firenena maro izay lehibe sy mahery noho ianao, mba hampidirany anao sy hanomezany anao ny taniny ho lova, tahaka ny amin''izao anio izao.'
mg1865::mg_5::4::39:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrao anio, ka tsarovy ao am-ponao, fa Jehovah no Andriamanitra any amin''ny lanitra ambony sy ety amin''ny tany ambany, ka tsy misy afa-tsy Izy.'
mg1865::mg_5::4::40:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tandremo ny lalàny sy ny didiny izay andidiako anao anio, mba hahita soa ianao sy ny taranakao mandimby anao, ary mba ho maro andro ianao any amin''ny tany, izay omen''i Jehovah Andriamanitrao ho anao mandrakizay.'
mg1865::mg_5::4::41:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: 'Ny nanendrena tanàna telo handosiran''izay nahafaty olona tsy nahy'
  verse_text: 'Ary tamin''izay Mosesy dia nanokana tanàna telo any an-dafy atsinanan''i Jordana,'
mg1865::mg_5::4::42:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba handosiran''izay nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha, dia ho velona izy raha mandositra ao amin''ny anankiray amin''ireo tanàna ireo:'
mg1865::mg_5::4::43:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Bazera any an''efitra, amin''ny tany lemaka, an''ny Robenita; ary Ramota-gileada an''ny Gadita; ary Golana any Basana an''ny Manasita.'
mg1865::mg_5::4::44:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 44
  verse_date_revised: null
  verse_title: 'Fitarihan-teny nataon''i Mosesy ny amin''ny lalàna'
  verse_text: 'Ary izao no lalàna izay nalahatr''i Mosesy teo anatrehan''ny Zanak''Isiraely.'
mg1865::mg_5::4::45:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no teni-vavolombelona sy didy ary fitsipika, izay nambaran''i Mosesy tamin''ny Zanak''Isiraely, rehefa nivoaka avy tany Egypta izy,'
mg1865::mg_5::4::46:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'tany an-dafin''i Jordana, tao an-dohasaha tandrifin''i Beti-peora, tao amin''ny tanin''i Sihona, ilay mpanjakan''ny Amorita nonina tao Hesbona, dia ilay noresen''i Mosesy sy ny Zanak''Isiraely, rehefa nivoaka avy tany Egypta izy,'
mg1865::mg_5::4::47:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia azony ny tanin''i Sihona sy ny tanin''i Oga, mpanjakan''i Basana, dia ny mpanjaka roa tamin''ny Amorita, izay tany an-dafy atsinanan''i Jordana,'
mg1865::mg_5::4::48:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatrany Aroera, izay ao amoron''ny lohasahan-driaka Arnona, ka hatramin''ny tendrombohitra Siona (Hermona izany),'
mg1865::mg_5::4::49:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 4
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny tani-hay rehetra any an-dafy atsinanan''i Jordana ka hatramin''ny ranomasina amin''ny tani-hay eo ambodin''i Pisga.'
mg1865::mg_5::5::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Didy Folo'
  verse_text: 'Ary Mosesy niantso ny Isiraely rehetra ka nanao taminy hoe: Ry Isiraely o, mihainoa ny didy sy ny fitsipika izay lazaiko eto anatrehanareo anio, ka ianaro ireo, sy mitandrema mba hankatò azy.'
mg1865::mg_5::5::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitsika nanao fanekena tamintsika tany Horeba;'
mg1865::mg_5::5::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy tamin''ny razantsika no nanaovan''i Jehovah izany fanekena izany, fa tamintsika, dia isika rehetra izay samy mbola velona eto anio.'
mg1865::mg_5::5::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niteny nifanatrika taminareo Jehovah tao an-tendrombohitra, tao amin''ny afo.'
mg1865::mg_5::5::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho nitsangana teo anelanelan''i Jehovah sy ianareo tamin''izany andro izany, hanambara aminareo ny tenin''i Jehovah, fa natahotra noho ny fahitana ny afo ianareo ka tsy niakatra tao amin''ny tendrombohitra, ka hoy Izy:'
mg1865::mg_5::5::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana.'
mg1865::mg_5::5::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manana andriamani-kafa, fa Izaho ihany.'
mg1865::mg_5::5::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao sarin-javatra voasokitra ho anao, na ny mety ho endriky ny zavatra any amin''ny lanitra ambony, na izay ety amin''ny tany ambany, na izay any amin''ny rano ambanin''ny tany.'
mg1865::mg_5::5::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miankohoka eo anatrehany, ary aza manompo azy; fa Izaho, Jehovah Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin''ny zanaka hatramin''ny zafiafy sy ny zafindohalika, dia amin''izay mankahala Ahy,'
mg1865::mg_5::5::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa kosa mamindra fo amin''ny olona arivo mandimby, izay tia Ahy ka mitandrina ny didiko.'
mg1865::mg_5::5::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manonona foana ny anaran''i Jehovah Andriamanitrao; fa tsy hataon''i Jehovah ho tsy manan-tsiny izay manonona foana ny anarany.'
mg1865::mg_5::5::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema ny andro Sabata hanamasima azy, araka izay nandidian''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::5::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra.'
mg1865::mg_5::5::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Sabatan''i Jehovah Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin''izany, na ny zanakao-lahy, na ny zanakao-vavy, na ny ankizilahinao, na ny ankizivavinao, na ny ombinao, na ny borikinao, na ny biby fiompinao rehetra, na ny vahininao izay tafiditra eo am-bavahadinao; mba hitsaharan''ny ankizilahinao sy ny ankizivavinao tahaka anao koa.'
mg1865::mg_5::5::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsarovy fa andevo tany amin''ny tany Egypta ianao, ka tanana mahery sy sandry nahinjitra no nitondran''i Jehovah Andriamanitrao anao nivoaka avy tany; izany no nandidian''i Jehovah Andriamanitrao anao hitandrina ny andro Sabata.'
mg1865::mg_5::5::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manajà ny rainao sy ny reninao, araka izay nandidian''i Jehovah Andriamanitrao anao, mba ho maro andro ianao, ary mba hahita soa any amin''ny tany izay omen''i Jehovah Andriamanitrao ho anao.'
mg1865::mg_5::5::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamono olona. Ary aza mijangajanga. Ary aza mangalatra. Ary aza mety ho vavolombelona mandainga hanameloka ny namanao.'
mg1865::mg_5::5::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mitsiriritra ny vadin''ny namanao; ary aza mitsiriritra ny tranon''ny namanao, na ny taniny, na ny ankizilahiny, na ny ankizivaviny, na ny ombiny, na ny borikiny, na izay mety ho an''ny namanao akory aza.'
mg1865::mg_5::5::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo teny ireo no nolazain''i Jehovah tamin''ny feo mahery tao amin''ny afo sy ny rahona ary ny aizim-pito, raha nivory tany an-tendrombohitra ianareo, ka dia tsy nampiany intsony; ary nosoratany tamin''ny vato fisaka roa ireo ka natolony ahy.'
mg1865::mg_5::5::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa renareo ny feo avy tao amin''ny aizina, raha nirehitra afo ny tendrombohitra, dia nanatona ahy ianareo, dia ny loham-pirenenareo rehetra sy ny loholonareo,'
mg1865::mg_5::5::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy ianareo: Indro, efa nampahitain''i Jehovah Andriamanitsika ny voninahiny sy ny fahalehibiazany isika, ary efa rentsika ny feony avy tao amin''ny afo; koa efa hitantsika androany fa Andriamanitra miteny amin''ny olona, nefa velona ihany izy.'
mg1865::mg_5::5::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, nahoana no ho faty izahay? fa handevona anay io afo lehibe io; raha mbola mandre ny feon''i Jehovah Andriamanitsika indray izahay, dia ho faty.'
mg1865::mg_5::5::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa tamin''ny nofo rehetra no efa nandre ny feon''Andriamanitra velona niteny tao afovoan''ny afo, tahaka antsika, ka velona ihany?'
mg1865::mg_5::5::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manatona ianao, ka mihainoa izay rehetra holazain''i Jehovah Andriamanitsika; ary ianao no aoka hilaza aminay izay rehetra holazain''i Jehovah Andriamanitsika aminao, dia hohenoinay ka harahinay izany.'
mg1865::mg_5::5::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandre ny teninareo, raha niteny tamiko ianareo, ka hoy Izy tamiko: Efa reko ny tenin''ireo olona ireo, izay nolazainy taminao, ka tsara izay rehetra nolazainy.'
mg1865::mg_5::5::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka mba hanana fo toy izany izy hatahorany Ahy sy hitandremany ny didiko rehetra mandrakariva, mba hahita soa izy sy ny taranany mandrakizay'
mg1865::mg_5::5::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka lazao aminy hoe: Miverena any an-dainareo ianareo.'
mg1865::mg_5::5::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa dia mijanona eto anilako, ka holazaiko aminao ny lalàna rehetra sy ny didy ary ny fitsipika, izay hampianarinao azy mba harahiny any amin''ny tany izay omeko azy ho lovany.'
mg1865::mg_5::5::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo mba hanao araka izay efa nandidian''i Jehovah Andriamanitrareo anareo; aza mivily, na ho amin''ny ankavanana, na ho amin''ny ankavia;'
mg1865::mg_5::5::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny lalana rehetra izay nandidian''i Jehovah Andriamanitrareo anareo no halehanareo, mba ho velona ianareo ka hahita soa, ary ho maro andro any amin''ny tany izay holovanareo.'
mg1865::mg_5::6::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fitiavana an''Andriamanitra'
  verse_text: 'Ary izao no lalàna, dia ny didy sy ny fitsipika, izay nasain''i Jehovah Andriamanitrareo hampianarina anareo mba harahinareo any amin''ny tany izay alehanareo holovana,'
mg1865::mg_5::6::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hatahoranao an''i Jehovah Andriamanitrao, hitandremanao ny lalàny rehetra sy ny didiny izay andidiako anao, dia ianao sy ny zanakao ary ny zafinao, amin''ny andro rehetra hiainanao, mba ho maro andro ianao.'
mg1865::mg_5::6::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa, ry Isiraely, ka mitandrema hanaraka izany, mba hahita soa ianao, ary mba hitomboanareo indrindra, araka izay nolazain''i Jehovah, Andriamanitry ny razanao, taminao, dia any amin''ny tany tondra-dronono sy tantely.'
mg1865::mg_5::6::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, ry Isiraely: Jehovah Andriamanitsika dia Jehovah iray ihany.'
mg1865::mg_5::6::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra ary ny herinao rehetra.'
mg1865::mg_5::6::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho ao am-ponao izao teny andidiako anao anio izao.'
mg1865::mg_5::6::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ampianaro tsara ny zanakao izany, ary resaho, na mipetraka ao an-tranonao ianao, na mandeha any an-dàlana, na mandry, na mifoha;'
mg1865::mg_5::6::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary fehezo ho famantarana eo amin''ny tananao ireny, ary aoka ho fehy fampahatsiarovana eo ambonin''ny handrinao,'
mg1865::mg_5::6::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary soraty eo amin''ny tolam-baravaran''ny tranonao sy eo amin''ny vavahadinao.'
mg1865::mg_5::6::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa entin''i Jehovah Andriamanitrao ianao ho any amin''ny tany izay nianianany tamin''i Abrahama sy Isaka ary Jakoba razanao homena anao, dia tany misy tanàna lehibe sady tsara, izay tsy nataonao,'
mg1865::mg_5::6::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy trano feno zava-tsoa rehetra, izay tsy nofenoinao, sy lavaka famorian-drano voalavaka eo amin''ny vato, izay tsy nolavahanao, sy tany voavoly voaloboka sy hazo oliva, izay tsy nambolenao, ary mihinana ianao ka voky,'
mg1865::mg_5::6::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mitandrema fandrao hadinoinao Jehovah, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana.'
mg1865::mg_5::6::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matahora an''i Jehovah Andriamanitrao ianao, ka manompoa Azy, ary aoka ny anarany no hianiananao.'
mg1865::mg_5::6::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manaraka izay andriamani-kafa amin''ireny andriamanitry ny firenena manodidina anareo,'
mg1865::mg_5::6::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Andriamanitra saro-piaro eo aminao Jehovah Andriamanitrao, fandrao hirehitra aminao ny fahatezeran''i Jehovah Andriamanitrao, ka hofongorany tsy ho eo ambonin''ny tany ianao.'
mg1865::mg_5::6::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza maka fanahy an''i Jehovah Andriamanitrareo ianareo, tahaka ilay nakanareo fanahy Azy tao Masa.'
mg1865::mg_5::6::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo tsara ny didin''i Jehovah Andriamanitrareo sy ny teni-vavolombelony ary ny lalàny, izay efa nandidiany anao.'
mg1865::mg_5::6::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy izay mahitsy sady tsara eo imason''i Jehovah, mba hahita soa ianao ary mba hidiranao handova ny tany soa izay nianianan''i Jehovah tamin''ny razanao homena azy,'
mg1865::mg_5::6::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba horoahiny tsy ho eo anoloanao ny fahavalonao rehetra, araka izay nolazain''i Jehovah.'
mg1865::mg_5::6::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manontany anao ny zanakao amin''ny andro ho avy ka manao hoe: Manao ahoana moa ny teni-vavolombelona sy ny didy ary ny fitsipika, izay efa nandidian''i Jehovah Andriamanitsika anareo?'
mg1865::mg_5::6::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia holazainao aminy hoe: Andevon''i Farao tany Egypta isika, ary tanana mahery no nitondran''i Jehovah antsika nivoaka avy tany Egypta.'
mg1865::mg_5::6::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanao famantarana sy fahagagana lehibe sady mandoza tamin''ny Egyptiana sy Farao ary ny ankohonany teo imasontsika.'
mg1865::mg_5::6::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra antsika nivoaka avy tany Izy hampidirany antsika mba homeny antsika ny tany izay nianianany tamin''ny razantsika homena azy.'
mg1865::mg_5::6::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandidy antsika hanaraka ireo didy rehetra ireo sy hatahotra an''i Jehovah Andriamanitsika, mba hahita soa mandrakariva isika sy ho velona tahaka ny amin''izao anio izao.'
mg1865::mg_5::6::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fahamarinantsika ny mitandrina hanaraka izany didy rehetra izany eo anatrehan''i Jehovah Andriamanitsika, araka izay efa nandidiany antsika.'
mg1865::mg_5::7::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny handringanana ny Kananita'
  verse_text: 'Rehefa entin''i Jehovah Andriamanitrao ianao ka tafiditra any amin''ny tany izay efa hidiranao holovana, ary firenena maro no voaroakany hiala eo anoloanao, dia ny Hetita sy ny Girgasita sy ny Amorita sy ny Kananita sy ny Perizita sy ny Hivita ary ny Jebosita, dia firenena fito izay lehibe sy mahery noho ianao.'
mg1865::mg_5::7::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa voatolotr''i Jehovah Andriamanitrao eo anoloanao ireny ka resinao: dia aringano mihitsy izy; aza manao fanekena aminy, na mamindra fo aminy;'
mg1865::mg_5::7::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza mifanambady anaka aminy: ny zanakao-vavy tsy homenao ho vadin''ny zananilahy, ary ny zananivavy tsy halainao ho vadin''ny zanakao-lahy.'
mg1865::mg_5::7::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hampiala ny zanakao-lahy amin''ny fanarahana Ahy izy mba hanompoany andriamani-kafa, dia hirehitra aminareo ny fahatezeran''i Jehovah, ka handrifigana anao vetivety Izy.'
mg1865::mg_5::7::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao kosa no ataovinareo aminy: ny alitarany horavanao, ary ny tsangam-baton-tsampiny hovakivakinao; ny Aserahany hokapainao, ary ny sarin-javatra voasokitra hodoranao amin''ny afo.'
mg1865::mg_5::7::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa firenena masina ho an''i Jehovah Andriamanitrao ianao; fa ianao efa nofidin''i Jehovah Andriamanitrao ho firenena rakitra soa ho Azy mihoatra noho ny firenena rehetra ambonin''ny tany.'
mg1865::mg_5::7::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny hamaroanareo noho ny firenena rehetra anefa no niraiketan''ny fitiavan''i Jehovah taminareo sy nifidianany anareo, fa ianareo dia vitsy noho ny firenena rehetra aza;'
mg1865::mg_5::7::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny nitiavan''i Jehovah anareo sy ny nitandremany ny fianianana izay efa nianianany tamin''ny razanareo no nitondran''i Jehovah anareo tamin''ny tanana mahery sy nanavotany anao tamin''ny trano nahandevozana dia tamin''ny tanan''i Farao, mpanjakan''i Egypta.'
mg1865::mg_5::7::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrao fa Jehovah Andriamanitrao ihany no Andriamanitra, dia Andriamanitra mahatoky, Izay mitandrina fanekena sy famindram-po amin''izay tia Azy sy mitandrina ny didiny, hatramin''ny taranaka arivo mandimby,'
mg1865::mg_5::7::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mamaly miharihary izay mandrafy Azy amin''ny fandringanana azy; tsy hitaredretra Izy ny amin''izay mandrafy Azy, fa hamaly azy miharihary.'
mg1865::mg_5::7::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo ny lalàna sy ny didy ary ny fitsipika, izay andidiako anao anio, ka araho izy.'
mg1865::mg_5::7::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mihaino ireo fitsipika ireo ianareo ka mitandrina sy manaraka azy, dia hotanterahin''i Jehovah Andriamanitrao aminao ny fanekena sy ny famindram-po, izay nianianany tamin''ny razanao;'
mg1865::mg_5::7::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho tia anao sy hitahy anao ary hahamaro anao Izy; ary Izy hitahy ny ateraky ny kibonao sy ny vokatry ny taninao, dia ny varinao sy ny ranom-boalobokao sy ny diloilonao, ary ny ateraky ny ombinao sy ny ateraky ny ondry aman''osinao any amin''ny tany izay nianianany tamin''ny razanao homena anao.'
mg1865::mg_5::7::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina ianao mihoatra noho ny firenena rehetra; tsy hisy lahy na vavy tsy hiteraka, na ianareo na ny biby fiompinareo.'
mg1865::mg_5::7::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary harovan''i Jehovah tsy ho azon''aretina ianao, ka tsy hisy hameliny anao ny aretin-dratsin''i Egypta, izay fantatrao; fa hataony amin''izay rehetra mankahala anao kosa ireny.'
mg1865::mg_5::7::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka holaninao ny firenena rehetra, izay hatolotr''i Jehovah Andriamanitrao anao, ka aoka tsy hiantra azy ny masonao; ary aza manompo ny andriamaniny, fa ho fandrika aminao ireny.'
mg1865::mg_5::7::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ianao hanao anakampo hoe: Maro noho izaho ireo firenena ireo, ka hataoko ahoana no fahay mandroaka azy?'
mg1865::mg_5::7::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aza matahotra azy ianao; fa tsarovy tsara izay nataon''i Jehovah Andriamanitrao tamin''i Farao sy ny Egyptiana rehetra,'
mg1865::mg_5::7::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny fizahan-toetra lehibe, izay efa hitan''ny masonao, sy ny famantarana sy ny fahagagana sy ny tanana mahery ary ny sandry nahinjitra, izay nitondran''i Jehovah Andriamanitrao anao nivoaka; fa toy izany no hataon''i Jehovah Andriamanitrao amin''ny firenena rehetra izay atahoranao.'
mg1865::mg_5::7::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanenitra koa dia hampandehanin''i Jehovah Andriamanitrao ho eo aminy mandra-paharingan''izay sisa sy izay efa niery ka tsy hitanao.'
mg1865::mg_5::7::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra azy ianao; fa Jehovah Andriamanitrao no eo aminao, dia Andriamanitra lehibe sy mahatahotra.'
mg1865::mg_5::7::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary horoahin''i Jehovah Andriamanitrao eo alohanao tsikelikely ireny firenena ireny; tsy haharoaka azy faingana ianao, fandrao hihamaro ny bibi-dia ka hamely anao.'
mg1865::mg_5::7::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatolotr''i Jehovah Andriamanitrao eo anoloanao izy ka hataony mifanaritaka be ihany mandra-pahalany ritrany.'
mg1865::mg_5::7::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatolony eo an-tananao koa ny mpanjakany, ka ho foananao tsy ho re intsony aty ambanin''ny lanitra ny anarany; tsy hisy olona hahajanona eo anoloanao, fa haringanao avokoa izy mandra-pahalaniny.'
mg1865::mg_5::7::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sarin-javatra voasokitra, izay andriamaniny, dia hodoranareo amin''ny afo; aza mitsiriritra ny volafotsy na ny volamena izay eo aminy, na maka izany ho anao, fandrao ho voafandriny ianao, fa fahavetavetana eo imason''i Jehovah Andriamanitrao izany.'
mg1865::mg_5::7::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mitondra fahavetavetana ho ao an-tranonao, fandrao ho voaozona tahaka izany koa ianao; ho halanao sy ho fahavetavetana eo imasonao indrindra izany, fa zavatra voaozona.'
mg1865::mg_5::8::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampahatsiarovana ny nitondran''Andriamanitra ny Isiraely sy ny nampanetreny tena azy, ary fananarana azy, andrao miavonavona izy ka manadino an''Andriamanitra'
  verse_text: 'Ny lalàna rehetra izay andidiako anao anio dia tandremo harahinareo, mba ho velona ianareo ka hihamaro ary hiditra sady handova ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy.'
mg1865::mg_5::8::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsarovy ny lalana rehetra izay nitondran''i Jehovah Andriamanitrao anao tany an''efitra izao efa-polo taona izao, hampanetry tena anao sy hizaha toetra anao ary hahalala izay ao am-ponao, na hitandrina ny didiny ianao, na tsia.'
mg1865::mg_5::8::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanetry tena anao Izy ka namela anao ho noana, dia nanome anao ny mana hohaninao, izay tsy fantatrao na ny razanao, hampahafantarany anao fa tsy mofo ihany no iveloman''ny olona; fa izay rehetra aloaky ny vavan''i Jehovah no iveloman''ny olona.'
mg1865::mg_5::8::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitafianao teny aminao tsy rovitra, ary ny tongotrao tsy nivonto izao efa-polo taona izao.'
mg1865::mg_5::8::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrao amin''ny fonao, fa tahaka ny fananaran''ny olona ny zanany no fananaran''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::8::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo ny didin''i Jehovah Andriamanitrao, mba handehananao amin''ny lalany sy hatahoranao Azy.'
mg1865::mg_5::8::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrao efa hampiditra anao any amin''ny tany soa, dia tany misy renirano sy loharano ary rano lalina eny amin''ny lohasaha sy ny tendrombohitra,'
mg1865::mg_5::8::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'tany misy vary tritika sy vary hordea sy voaloboka sy aviavy ary ampongaben-danitra, tany misy hazo oliva sy tantely,'
mg1865::mg_5::8::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tany izay hihinananao hanina amin''ny fanaranam-po, sady tsy hanan-java-mahory akory eo ianao, tany misy vy ny vato ao aminy, ary ao amin''ny tendrombohiny no hihadianao varahina.'
mg1865::mg_5::8::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nihinana ianao ka voky ary misaotra an''i Jehovah Andriamanitrao noho ny tany soa izay nomeny anao,'
mg1865::mg_5::8::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mitandrema, fandrao hadinoinao Jehovah Andriamanitrao, ka tsy tandremanao ny didiny sy ny fitsipiny ary ny lalàny, izay andidiako anao anio;'
mg1865::mg_5::8::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao, rehefa nihinana ianao ka voky ary nanao trano tsara ka mitoetra ao,'
mg1865::mg_5::8::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mihamaro ny ombinao sy ny ondry aman''osinao, ary mitombo koa ny volafotsinao sy ny volamenanao, ary mitombo ny fanananao rehetra,'
mg1865::mg_5::8::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hiavonavona ny fonao, ka hohadinoinao Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana,'
mg1865::mg_5::8::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nitondra anao tany amin''ny efitra lehibe sady mahatahotra, izay misy menaran''afo sy maingoka, dia ny tany mangentana tsy misy rano, ary nampivoaka rano ho anao avy tamin''ny vatolampy afovato,'
mg1865::mg_5::8::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanome anao mana hohanina tany an''efitra, dia zavatra tsy fantatry ny razanao, mba hampanetry tena anao sy hizaha toetra anao ary hanisy soa anao any am-parany;'
mg1865::mg_5::8::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary andrao ianao hanao anakampo hoe: Ny tanjako sy ny herin''ny tanako no nahavoriako izao harena izao;'
mg1865::mg_5::8::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsarovy Jehovah Andriamanitrao, fa Izy no manome anao hery hahavory harena, mba haoriny ny fanekeny, izay nianianany tamin''ny razanao, tahaka ny amin''izao anio izao.'
mg1865::mg_5::8::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manadino an''i Jehovah Andriamanitrao mihitsy ianao ka manaraka izay andriamani-kafa sady manompo azy sy miankohoka eo anatrehany, dia milaza aminareo marimarina aho fa haringana tokoa ianareo:'
mg1865::mg_5::8::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny andringanana ny firenen-tsamy hafa, izay aringan''i Jehovah eo anoloanareo, no handringanana anareo, satria tsy nihaino ny feon''i Jehovah Andriamanitrareo ianareo.'
mg1865::mg_5::9::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra ny amin''ny tsy fanamarinan-tena'
  verse_text: 'MIHAINOA, ry Isiraely o: ianao izao dia efa hita an''i Jordana hiditra eo amin''ny tany ka handresy firenen-tsamy hafa, izay lehibe sy mahery noho ianao, sy hahafaka tanàna lehibe izay misy manda manakatra ny lanitra,'
mg1865::mg_5::9::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia firenena lehibe sady olona lava, dia taranaky ny Anakita izay fantatrao, sady efa renao ny lazany hoe: Iza no mahajanona eo anoloan''ny taranak''i Anàka?'
mg1865::mg_5::9::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrao anio fa Jehovah Andriamanitrao no efa handeha hita eo alohanao tahaka ny afo mandevona, ka Izy no handringana azy sy hampietry azy eo anoloanao; dia handroaka azy ianao ka handringana azy faingana, araka izay nolazain''i Jehovah taminao.'
mg1865::mg_5::9::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voaroak''i Jehovah Andriamanitrao eo anoloanao izy, dia aza manao anakampo hoe: Ny fahamarinako no nitondran''i Jehovah ahy niditra handova ity tany ity; fa ny haratsiam-panahin''ireo firenena ireo no androahan''i Jehovah azy eo anoloanao.'
mg1865::mg_5::9::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny fahamarinanao, na ny hitsim-ponao, no andehananao handova ny taniny; fa ny haratsiam-panahin''ireo firenena ireo no androahan''i Jehovah Andriamanitrao azy eo anoloanao hahatò ny teny izay nianianan''i Jehovah tamin''i Abrahama sy Isaka ary Jakoba razanao.'
mg1865::mg_5::9::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrao fa tsy ny fahamarinanao no anomezan''i Jehovah Andriamanitrao izany tany soa izany ho lovanao; fa firenena mafy hatoka ianao.'
mg1865::mg_5::9::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ka aza hadinoinao ny nampahatezeranao an''i Jehovah Andriamanitrao tany an''efitra: eny, hatramin''ny andro nialanao tany amin''ny tany Egypta ka hatramin''ny nahatongavanareo teto amin''ity tany ity dia mbola niodina tamin''i Jehovah ihany ianareo.'
mg1865::mg_5::9::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia tany Horeba aza dia nampahatezitra an''i Jehovah ianareo, dia tezitra taminareo Izy ka saiky nandringana anareo.'
mg1865::mg_5::9::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha niakatra tao an-tendrombohitra aho handray ny vato fisaka, dia ny vato fisaka izay nisy ny fanekena nataon''i Jehovah taminareo, ka nitoetra efa-polo andro sy efa-polo alina tao an-tendrombohitra sady tsy nihinan-kanina na nisotro rano,'
mg1865::mg_5::9::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nomen''i Jehovah ahy ny vato fisaka roa, voasoratry ny fanondron''Andriamanitra; ary teo aminy no nisy ilay teny rehetra nolazain''i Jehovah taminareo tao an-tendrombohitra tao amin''ny andro nivoriana.'
mg1865::mg_5::9::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tapitra ny efa-polo andro sy efa-polo alina, dia nomen''i Jehovah ahy ny vato fisaka roa, dia ilay nisy ny fanekena.'
mg1865::mg_5::9::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Miaingà, ka midina faingana hiala ety ianao; fa efa nanao ratsy ny olonao izay nentinao nivoaka avy tany Egypta; efa nalaky nivily niala tamin''ny lalana izay efa nasaiko nalehany izy ka nanao sarin-javatra an-idina ho azy.'
mg1865::mg_5::9::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jehovah tamiko: Efa hitako ity firenena ity, fa, indro, olona mafy hatoka izy.'
mg1865::mg_5::9::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avelao Aho handringana azy, ka hovonoiko ny anarany tsy ho eny ambanin''ny lanitra, ary dia hataoko firenena mahery sy lehibe noho izy ianao.'
mg1865::mg_5::9::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihodina aho ka nidina niala tamin''ny tendrombohitra, raha mbola nirehitra afo izy; ary ny vato fisaka roa nisy ny fanekena dia teny an-tanako roa.'
mg1865::mg_5::9::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nijery aho, ka, indro, efa nanota tamin''i Jehovah Andriamanitrareo ianareo ka nanao ombilahy kely an-idina ho anareo; nalaky nivily ianareo niala tamin''ny lalana izay efa nasain''i Jehovah nalehanareo.'
mg1865::mg_5::9::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisiko ny vato fisaka roa ka nazerako avy teny an-tanako roa ho vakivaky teo imasonareo.'
mg1865::mg_5::9::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niankohoka teo anatrehan''i Jehovah efa-polo andro sy efa-polo alina tahaka ilay teo ihany aho ka tsy nihinan-kanina, na nisotro rano, noho ny fahotanareo rehetra, izay nataonareo tamin''ny nanaovanareo izay ratsy eo imason''i Jehovah, ka nampahatezeranareo Azy.'
mg1865::mg_5::9::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa natahotra ny fahavinirana sy ny fahatezerana aho, izay nahatezeran''i Jehovah taminareo handringanana anareo. Dia nihaino ahy indray Jehovah tamin''izany andro izany.'
mg1865::mg_5::9::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia tezitra indrindra tamin''i Arona ka saiky nandevona azy; dia nifona ho an''i Arona koa aho tamin''izany andro izany.'
mg1865::mg_5::9::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noraisiko ny fahotanareo, dia ilay ombilahy kely izay nataonareo, ka nodorako tamin''ny afo, dia notorotoroiko sy nomontsamontsaniko mandra-pahatongany ho madinika toy ny vovoka; ary ny vovony dia nariako teo amin''ny renirano izay midina avy amin''ny tendrombohitra.'
mg1865::mg_5::9::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao Tabera sy Masa ary Kibrota-hatava no nampahatezeranareo an''i Jehovah.'
mg1865::mg_5::9::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nampandehanin''i Jehovah niala tao Kadesi-barnea ianareo ka nataony hoe: Miakara, ka lovao ny tany izay nomeko anareo, dia nandà ny tenin''i Jehovah Andriamanitrareo ianareo, fa tsy nihaino Azy, na nino ny feony.'
mg1865::mg_5::9::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, niodina tamin''i Jehovah ihany ianareo hatramin''ny andro nahalalako anareo no ho mankaty.'
mg1865::mg_5::9::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niankohoka teo anatrehan''i Jehovah aho nandritra izany efa-polo andro sy efa-polo alina izany, satria efa nolazain''i Jehovah fa handringana anareo Izy.'
mg1865::mg_5::9::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifona tamin''i Jehovah aho ka nanao hoe: Jehovah Tompo o, aza mandringana ny firenenao sy ny lovanao, izay navotanao tamin''ny fahalehibiazanao ka nentinao nivoaka avy tany Egypta tamin''ny tananao mahery.'
mg1865::mg_5::9::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny mpanomponao, dia Abrahama sy Isaka ary Jakoba; fa aza mijery ny ditran''ity firenena ity, na ny haratsiam-panahiny, na ny fahotany,'
mg1865::mg_5::9::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao izay monina amin''ny tany nitondranao anay nivoaka avy tany hanao hoe: Satria tsy hain''i Jehovah ny hitondra azy ho any amin''ny tany izay nolazainy taminy, ary satria nankahala azy Izy, dia izany no nitondrany azy nivoaka hahafaty azy aty an''efitra.'
mg1865::mg_5::9::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ireo dia firenenao sy lovanao, izay nentinao nivoaka tamin''ny herinao lehibe sy ny sandrinao nahinjitra.'
mg1865::mg_5::10::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no nilazan''Jehovah tamiko hoe: Manamboara vato fisaka roa ho anao tahaka ilay teo, ka miakara ho ety amiko ety an-tendrombohitra, ary manaova fiara hazo ho anao;'
mg1865::mg_5::10::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hosoratako amin''ny vato fisaka ilay teny teo amin''ny vato fisaka nomontsamontsaninao, ka hataonao ao anatin''ny fiara ireny.'
mg1865::mg_5::10::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao fiara tamin''ny hazo akasia aho ka nanamboatra vato fisaka roa tahaka ny teo, dia niakatra tao an-tendrombohitra aho ka nitondra ny vato fisaka roa teny an-tanako.'
mg1865::mg_5::10::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasiany soratra tahaka ny teo ihany ny vato fisaka, dia ny Didy Folo Izay nolazain''i Jehovah taminareo tao an-tendrombohitra tao amin''ny afo tamin''ny andro nivoriana; dia nomen''i Jehovah ahy ireny.'
mg1865::mg_5::10::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihodina aho ka nidina niala teo amin''ny tendrombohitra, ary ny vato fisaka napetrako tao anatin''ny fiara izay efa nataoko, dia mbola ao ihany ireny, araka izay nandidian''i Jehovah ahy.'
mg1865::mg_5::10::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nandeha niala tamin''ny fantsakan''i Bene-jakana ka nankany Mosera; tao no nahafatesan''i Arona, ary tao no nandevenana azy; ary Eleazara zanany no tonga mpisorona nandimby azy.'
mg1865::mg_5::10::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tao izy, dia nankany Godgoda; ary nony niala tao Godgoda izy, dia nankany Jotbata, tany be ony.'
mg1865::mg_5::10::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no nanokanan''i Jehovah ny firenen''i Levy hitondra ny fiaran''ny faneken''i Jehovah sy hijanona eo anatrehan''i Jehovah hanao fanompoam-pivavahana aminy sy hitso-drano amin''ny anarany mandraka androany.'
mg1865::mg_5::10::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no tsy ananan''ny Levita anjara na lova eo amin''ny rahalahiny; Jehovah no lovany, araka izay nolazain''i Jehovah Andriamanitrao taminy.'
mg1865::mg_5::10::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho nitoetra efa-polo andro sy efa-polo alina tao an-tendrombohitra tahaka ilay teo ihany; ary Jehovah nihaino ahy tamin''izany andro izany koa ka tsy nety nandringana anao.'
mg1865::mg_5::10::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Miaingà, mandehana eo alohan''ny olona, hidirany sy handovany ny tany, izay nianianako tamin''ny razany homena azy.'
mg1865::mg_5::10::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Anatra ny amin''ny fahatahorana an''Andriamanitra sy ny fitiavana Azy, ary filazana ny soa ho azon''ny manaraka ny lalàna sy ny loza hanjo ny tsy manaraka azy'
  verse_text: 'Ary ankehitriny, ry Isiraely o, inona moa no ilain''i Jehovah Andriamanitrao aminao, afa-tsy ny hatahotra an''i Jehovah Andriamanitrao sy ny handeha amin''ny lalany rehetra ary ny ho tia Azy sy hanompo an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra,'
mg1865::mg_5::10::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'hitandrina ny didin''i Jehovah sy ny lalàny izay andidiany anao anio, mba hahita soa ianao?'
mg1865::mg_5::10::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, an''i Jehovah Andriamanitrao ny lanitra sy ny lanitry ny lanitra ary ny tany mbamin''izay rehetra eo aminy.'
mg1865::mg_5::10::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny razanao no niraiketan''ny fitiavan''i Jehovah, ka nifidy anareo zanany mandimby azy Izy mihoatra noho ny firenena rehetra, tahaka ny amin''izao anio izao.'
mg1865::mg_5::10::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa forao ny fonareo, fa aza mafy hatoka intsony ianareo.'
mg1865::mg_5::10::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrareo no Andriamanitra Avo Indrindra sy Tompon''ny tompo, Andriamanitra lehibe sy mahery ary mahatahotra, Izay tsy mizaha tavan''olona, na mandray kolikoly;'
mg1865::mg_5::10::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'manome rariny ny kamboty sy ny mpitondratena Izy, sady tia ny vahiny ka manome azy hanina sy fitafiana.'
mg1865::mg_5::10::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tiava vahiny; fa efa mba vahiny tany amin''ny tany Egypta ianareo.'
mg1865::mg_5::10::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitrao no hatahoranao; Izy no hotompoinao, ary Izy no hifikiranao, ary ny anarany no hianiananao.'
mg1865::mg_5::10::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: '2022-10-24T04:43:03+0000'
  verse_title: null
  verse_text: 'Izy no fideranao, ary Izy no Andriamanitrao, Izay efa nanao ireo zavatra lehibe sy mahatahotra ireo taminao, izay efa hitan''ny masonao.'
mg1865::mg_5::10::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Olona fito-polo ny razanao izay nidina tany Egypta; nefa ankehitriny efa nataon''i Jehovah Andriamanitrao maro tahaka ny kintana eny amin''ny lanitra ianao.'
mg1865::mg_5::11::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tiava an''i Jehovah Andriamanitrao, ka tandremo mandrakariva Izay asainy hotandremana, dia ny lalàny sy ny fitsipiny ary ny didiny.'
mg1865::mg_5::11::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho fantatrao anio, fa izaho tsy miteny amin''ny zanakareo izay tsy nahalala na nahita ny famaizan''i Jehovah Andriamanitrareo sy ny fahalehibiazany sy ny tanany mahery sy ny sandriny nahinjitra'
mg1865::mg_5::11::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny famantarany sy ny asany, izay nataony tany Egypta tamin''i Farao, mpanjakan''i Egypta, sy ny taniny rehetra,'
mg1865::mg_5::11::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy izay nataony tamin''ny miaramilan''ny Egyptiana sy ny soavaliny ary ny kalesiny, dia ny nanasaforany azy tao amin''ny Ranomasina Mena, raha nanenjika anareo Izy, dia voaringan''i Jehovah mandraka androany,'
mg1865::mg_5::11::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay nataony taminareo tany an''efitra, hatramin''ny nahatongavanareo teto amin''ity tany ity,'
mg1865::mg_5::11::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay nataony tamin''i Datana sy Abàrama, zanak''i Eliaba, zanak''i Robena, teo amin''ny Isiraely rehetra, dia izay nisokafan''ny tany sy nitelemany azy mbamin''ny ankohonany sy ny lainy ary ny zava-manan''aina izay nomba azy;'
mg1865::mg_5::11::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny masonareo efa nahita ny asa lehibe rehetra izay nataon''i Jehovah.'
mg1865::mg_5::11::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo ny lalàna rehetra izay andidiako anareo anio, mba hahery ianareo, dia hiditra handova ny tany izay efa halehanareo holovana;'
mg1865::mg_5::11::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary, mba ho maro andro ianareo amin''ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely.'
mg1865::mg_5::11::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany izay efa hidiranao holovana dia tsy mba tahaka ny tany Egypta, izay nivoahanareo, izay namafazanao ny voan-javatrao sy nandeman''ny tongotrao rano azy tahaka ny fambolen''anana.'
mg1865::mg_5::11::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany izay efa halehanareo holovana dia tany be tendrombohitra sy lohasaha sady mifoka rano avy amin''ny ranonoran-danitra,'
mg1865::mg_5::11::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tany izay tandreman''i Jehovah Andriamanitrao; ny mason''i Jehovah Andriamanitrao mitsinjo azy mandrakariva hatramin''ny fiandohan''ny taona ka hatramin''ny fiafarany.'
mg1865::mg_5::11::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hihaino tsara ny didiko izay andidiako anareo anio ianareo ka ho tia an''i Jehovah Andriamanitrareo sy hanompo Azy amin''ny fonareo rehetra sy ny fanahinareo rehetra,'
mg1865::mg_5::11::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia halatsako eo amin''ny taninareo ny ranonorana amin''ny fotoany, dia ny loha-orana sy ny fara-orana, mba hanangonanao ny varinao sy ny ranom-boalobokao ary ny diloilonao;'
mg1865::mg_5::11::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hampaniriko ahitra ny sahanao ho an''ny biby fiompinao, ary hihinan-kanina ianao ka ho voky.'
mg1865::mg_5::11::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa mitandrema ianareo, fandrao ho voafitaka ny fonareo, ka hivily hanompo andriamani-kafa sy hiankohoka eo anatrehany ianareo;'
mg1865::mg_5::11::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia hirehitra aminareo ny fahatezeran''i Jehovah, dia hanampina ny lanitra Izy, ka tsy hisy ranonorana, ary tsy hahavokatra ny tany; dia ho lany ringana faingana ianareo tsy ho eo amin''ny tany soa izay omen''i Jehovah anareo.'
mg1865::mg_5::11::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa alatsaho ao amin''ny fonareo sy ao amin''ny fanahinareo izao teniko izao, ary fehezo ho famantarana eo amin''ny tananareo izy, ka aoka ho fehy fampahatsiarovana eo ambonin''ny handrinareo;'
mg1865::mg_5::11::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ampianaro ny zanakareo izany, ka resaho, na mipetraka ao an-tranonao ianao, na mandeha an-dàlana, na mandry, na mifoha;'
mg1865::mg_5::11::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary soraty eo amin''ny tolam-baravaran''ny tranonao sy eo amin''ny vavahadinao izy;'
mg1865::mg_5::11::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho maro ny andronareo sy ny andron''ny taranakareo eo amin''ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy, toy ny faharetan''ny lanitra ambonin''ny tany.'
mg1865::mg_5::11::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hitandrina tsara izao lalàna rehetra izao izay andidiako anareo ianareo ka manaraka azy ary ho tia an''i Jehovah Andriamanitrareo sy handeha eo amin''ny lalany rehetra sy hifikitra aminy,'
mg1865::mg_5::11::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia horoahin''i Jehovah eo anoloanareo ireo firenena rehetra ireo, ary ianareo haharesy firenena maro, izay lehibe sy mahery noho ianareo.'
mg1865::mg_5::11::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany rehetra izay hodiavin''ny faladian''ny tongotrareo dia ho anareo: hatramin''ny efitra sy Libanona ary hatramin''ny ony Eofrata ka hatramin''ny ranomasina andrefana no ho faritaninareo.'
mg1865::mg_5::11::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisy olona hahajanona eo anoloanareo, fa hataon''i Jehovah Andriamanitrareo ho azon''ny tahotra sy horohoro anareo ny tany rehetra izay hodiavinareo, araka izay nolazainy taminareo.'
mg1865::mg_5::11::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho mametraka fitahiana sy ozona eo anoloanareo anio:'
mg1865::mg_5::11::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'fitahiana, raha hohenoinareo ny didin''i Jehovah Andriamanitrareo, izay andidiako anareo anio;'
mg1865::mg_5::11::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ozona kosa, raha tsy hohenoinareo ny didin''i Jehovah Andriamanitrareo, fa hivily hiala amin''ny lalana izay andidiako anareo anio mba haleha ianareo ka hanaraka andriamani-kafa izay tsy fantatrareo.'
mg1865::mg_5::11::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa entin''i Jehovah Andriamanitrao ianao ka tafiditra any amin''ny tany izay alehanao holovana, dia ny fitahiana no hotononinao eo an-tendrombohitra Gerizinia, ary ny fanozonana kosa eo an-tendrombohitra Ebala.'
mg1865::mg_5::11::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy any an-dafin''i Jordana va izy roa, any ankoatry ny lalana andrefana, amin''ny tanin''ny Kananita, izay monina eo amin''ny tani-hay tandrifin''i Gilgaly, eo anilan''ny hazo terebintan''i More?'
mg1865::mg_5::11::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo efa handeha hita an''i Jordana ka hiditra sy handova ny tany izay omen''i Jehovah Andriamanitrareo anareo, ary handova azy ianareo ka honina eo;'
mg1865::mg_5::11::32:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa tandremo mba harahinareo ny didy rehetra sy ny fitsipika izay ataoko eo anoloanareo anio.'
mg1865::mg_5::12::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny handravana izay zavatra momba ny fivavahana amin''ny sampy, ary ny amin''ny hivavahana amin''Andriamanitra ao amin''izay tany fidiny'
  verse_text: 'IZAO no didy sy fitsipika izay hotandremanareo harahina any amin''ny tany izay omen''i Jehovah, Andriamanitry ny razanao, anao holovana amin''ny andro rehetra hiainanareo ambonin''ny tany.'
mg1865::mg_5::12::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Horavanareo mihitsy ny toerana rehetra izay nanompoan''ny firenen-tsamy hafa izay horoahinareo ny andriamaniny teny ambonin''ny tendrombohitra avo sy ny havoana ary teny ambanin''ny hazo maitso rehetra.'
mg1865::mg_5::12::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia horavanareo ny alitarany, ary hotorotoroinareo ny tsangam-baton-tsampiny, ary hodoranareo amin''ny afo ny Aserahany, ary ny sarin-javatra voasokitra, izay andriamaniny, dia hokapainareo, ka dia hofoananareo tsy ho eo amin''izany tany izany intsony ny anarany.'
mg1865::mg_5::12::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao toy izany amin''i Jehovah Andriamanitrareo ianareo.'
mg1865::mg_5::12::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany izay hofidin''i Jehovah Andriamanitrareo amin''ny firenenareo rehetra hasiany ny anarany sy honenany no hohatoninareo sy halehanareo.'
mg1865::mg_5::12::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary any no hitondranareo ny fanatitra doranareo sy ny fanatitrareo hafa alatsa-drà sy ny fahafolon-karenareo sy ny fanatitra asandratry ny tananareo sy ny fanalam-boadinareo sy ny fanati-tsitraponareo ary ny voalohan-teraky ny ombinareo sy ny ondry aman''osinareo;'
mg1865::mg_5::12::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary any no hihinananareo sy ny ankohonanareo eo anatrehan''i Jehovah Andriamanitrareo ary hifalianareo amin''izay rehetra harin''ny tananareo, izay efa nitahian''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::12::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao araka izay rehetra ataontsika eto ankehitriny intsony ianareo, dia izao samy manao izay mahitsy eo imasony avy izao.'
mg1865::mg_5::12::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo tsy mbola tonga any amin''ny fitsaharana sy ny lova izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::12::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa tafita an''i Jordana ianareo ka monina any amin''ny tany izay omen''i Jehovah Andriamanitrareo anareo holovana, ary homeny fitsaharan''ady amin''ny fahavalonareo rehetra manodidina ianareo ka mandry fahizay,'
mg1865::mg_5::12::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia eo amin''ny tany izay hofidin''i Jehovah Andriamanitrareo hampitoerany ny anarany no hitondranareo izay rehetra andidiako anareo, dia ny fanatitra doranareo sy ny fanatitrareo hafa alatsa-drà sy ny fahafolon-karenareo sy ny fanatitra asandratry ny tananareo, ary izay zavatra tsara ataonareo voady amin''i Jehovah.'
mg1865::mg_5::12::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hifaly eo anatrehan''i Jehovah Andriamanitrareo ianareo sy ny zanakareo-lahy sy ny zanakareo-vavy sy ny ankizilahinareo sy ny ankizivavinareo ary ny Levita izay ao an-tanànanareo; fa ny Levita tsy mba manana anjara na lova eo aminareo.'
mg1865::mg_5::12::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema mba tsy haterinao eny amin''izay tany rehetra tianao ny fanatitra doranao;'
mg1865::mg_5::12::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa eo amin''ny tany izay hofidin''i Jehovah ihany amin''ny firenenao anankiray no hanateranao azy, sady eo koa no hanaovanao izay rehetra andidiako anao.'
mg1865::mg_5::12::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa mahazo mamono zavatra sy mihinan-kena ianao, araka izay rehetra irinao eny amin''ny tanànanao rehetra, araka ny fitahian''i Jehovah Andriamanitrao izay omeny anao; na ny maloto, na ny madio dia samy mahazo mihinana azy ihany, tahaka ny ahazoany mihinana ny gazela sy ny diera.'
mg1865::mg_5::12::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny ràny no aza hanina, fa aidino amin''ny tany toy ny rano.'
mg1865::mg_5::12::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy azonao hanina ao an-tanànanao, na ny ampahafolon''ny varinao sy ny ranom-boalobokao sy ny diloilonao, na ny voalohan-teraky ny ombinao sy ny ondry aman''osinao, na ny zavatra rehetra hataonao voady, na ny fanati-tsitraponao, na ny fanatitra asandratry ny tananao.'
mg1865::mg_5::12::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa eo anatrehan''i Jehovah Andriamanitrao no hihinananao azy, dia eo amin''ny tany izay hofidin''i Jehovah Andriamanitrao, dia ianao sy ny zanakao-lahy sy ny zanakao-vavy sy ny ankizilahinao sy ny ankizivavinao ary ny Levita izay ao an-tanànanao; ary hifaly eo anatrehan''i Jehovah Andriamanitrao ianao amin''izay rehetra hanin''ny tananao.'
mg1865::mg_5::12::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema mba tsy ho foinao ny Levita amin''ny andro rehetra hiainanao amin''ny taninao.'
mg1865::mg_5::12::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hitarin''i Jehovah Andriamanitrao ny faritaninao, araka izay nolazainy taminao, ka hoy ianao: Hihinan-kena aho, satria maniry hihinan-kena ny fanahinao, dia mahazo mihinan-kena araka izay rehetra irin''ny fanahinao ianao.'
mg1865::mg_5::12::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha lavitra anao loatra ny tany izay hofidin''i Jehovah Andriamanitrao hasiany ny anarany, dia hamonoanao ny ombinao sy ny ondry aman''osinao izay nomen''i Jehovah anao, araka izay efa nandidiako anao, ary hohaninao ao an-tanànanao, araka izay rehetra irin''ny fanahinao izany.'
mg1865::mg_5::12::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tahaka ny ahazoanao mihinana ny gazela sy ny diera no hahazoanao mihinana ireny: na ny maloto na ny madio dia samy mahazo mihinana azy.'
mg1865::mg_5::12::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tandremo tsara mba tsy hohaninao ny rà, fa ny rà no aina, ary tsy mahazo mihinana ny aina amin''ny hena ianao.'
mg1865::mg_5::12::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihinana azy ianao, fa aidino amin''ny tany toy ny rano izy;'
mg1865::mg_5::12::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, aza mihinana azy ianao, mba hahita soa ianao sy ny taranakao mandimby anao, raha manao izay mahitsy eo imason''i Jehovah ianao.'
mg1865::mg_5::12::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny zava-masinao sy ny zavatra nataonao voady dia ento mankany amin''ny tany izay hofidin''i Jehovah.'
mg1865::mg_5::12::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary atero eo amin''ny alitaran''i Jehovah Andriamanitrao ny fanatitra doranao, dia ny henany sy ny ràny; ary ny ran''ny fanatitrao hafa dia aidino eo amin''ny alitaran''i Jehovah Andriamanitrao, fa ny henany dia azonao hohanina ihany.'
mg1865::mg_5::12::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo, ka henoy izao teny rehetra izao, izay andidiako anao, mba hahita soa ianao sy ny taranakao mandimby anao mandrakizay, raha manao izay tsara sy mahitsy eo imason''i Jehovah Andriamanitrao ianao.'
mg1865::mg_5::12::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa aringan''i Jehovah Andriamanitrao eo anoloanao ny firenen-tsamy hafa, izay alehanao horesenao, ary handresy azy ianao ka honina eo amin''ny taniny,'
mg1865::mg_5::12::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mitandrema, fandrao voafandrika hanaraka ny fanaony ianao, rehefa voaringana eo anoloanao izy; ary andrao mamotopototra ny amin''ny andriamaniny ianao ka manao hoe: Nanao ahoana no nanompoan''ireny firenena ireny ny andriamaniny? fa izaho koa mba hanao toy izany.'
mg1865::mg_5::12::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao toy izany amin''i Jehovah Andriamanitrao; fa ny fahavetavetana rehetra, izay halan''i Jehovah, no nataony tamin''ny andriamaniny; fa ny zananilahy sy ny zananivavy aza dia nodorany tamin''ny afo ho an''ny andriamaniny.'
mg1865::mg_5::13::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra andidiako anareo dia tandremo mba harahina; aza ampianao izany, ary aza anesoranao.'
mg1865::mg_5::13::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny amin''ny fampijaliana izay mivavaka amin''ny sampy na mitaona ny sasany hivavaka aminy'
  verse_text: 'Raha tàhiny misy mpaminany na mpanonofy eo aminareo izay milaza famantarana na fahagagana aminao'
mg1865::mg_5::13::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady manao hoe: Andeha isika hanaraka andriamani-kafa (izay tsy fantatrao), ka aoka hanompo azy isika, na dia tanteraka aza ny famantarana na fahagagana izay nolazainy taminao,'
mg1865::mg_5::13::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aza mihaino ny tenin''izany mpaminany na mpanonofy izany; fa mizaha toetra anareo Jehovah Andriamanitrareo, hahalalany na miorina amin''ny fitiavana an''i Jehovah Andriamanitrareo amin''ny fonareo rehetra sy ny fanahinareo rehetra ianareo.'
mg1865::mg_5::13::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaraha an''i Jehovah Andriamanitrareo, ka aoka Izy no hatahoranareo, ary ny didiny no hotandremanareo, ary ny feony no hohenoinareo, ary aoka Izy no hotompoinareo sy hifikiranareo.'
mg1865::mg_5::13::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany mpaminany na mpanonofy izany dia hatao maty satria efa nanao teny fampiodinana amin''i Jehovah Andriamanitrareo (Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta ka nanavotra anao tamin''ny trano nahandevozana), mba hitaona anao hiala amin''ny lalana izay nasain''i Jehovah Andriamanitrao halehanao. Ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.'
mg1865::mg_5::13::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitaona anao mangingina ny rahalahinao, zanaky ny reninao, na ny zanakaolahy, na ny zanakao-vavy, na ny vady andefimandrinao na ny sakaizanao izay toy ny ainao, ka manao hoe: Andeha isika hanompo andriamani-kafa (izay tsy fantatrao, na ny razanao),'
mg1865::mg_5::13::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny andriamanitry ny firenena izay manodidina anareo, na ny akaikinao, na ny lavitra anao, hatramin''ny faran''ny tany rehetra),'
mg1865::mg_5::13::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aza manaiky azy na mihaino azy ianao; ary aza mba iantran''ny masonao izy, na amindranao fo, na afeninao;'
mg1865::mg_5::13::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa vonoy ho faty izy; ny tananao no ho voalohany hamono azy, dia vao ny tanan''ny vahoaka rehetra.'
mg1865::mg_5::13::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary torahy vato ho faty izy, satria izy efa nitady hitaona anao hiala amin''i Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana.'
mg1865::mg_5::13::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely rehetra handre izany, dia hatahotra ka tsy hanao ratsy toy izany intsony eo aminao.'
mg1865::mg_5::13::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandre teny ianao ny amin''ny tanànanao anankiray izay nomen''i Jehovah Andriamanitrao anao honenana, manao hoe:'
mg1865::mg_5::13::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy olona tena ratsy fanahy nivoaka avy teo aminao ka nitaona ny mponina ao an-tanànany nanao hoe: Andeha isika hanompo andriamani-kafa (izay tsy fantatrareo).'
mg1865::mg_5::13::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia diniho sy fotory ary adino tsara, ka raha, indro fa nisy marina tokoa izany zavatra izany, ka natao teo aminao izany fahavetavetana izany,'
mg1865::mg_5::13::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia asio ny lelan-tsabatra mihitsy ny mponina amin''izany tanàna izany, ka levony ny tanàna sy izay rehetra eo aminy, ary ny biby fiompy dia aringano amin''ny lelan-tsabatra.'
mg1865::mg_5::13::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny entana nobaboina rehetra eo dia angony eo afovoan''ny kianja, ka doroy amin''ny afo avokoa ny tanàna sy ny entana rehetra ao ho an''i Jehovah Andriamanitrao, ary aoka ho tanàna haolo mandrakizay izany tanàna izany ka tsy haorina intsony.'
mg1865::mg_5::13::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka tsy hisy hiraikitra amin''ny tananao akory ny zavatra efa natolotra holevonina, mba hitsaharan''i Jehovah amin''ny fahatezerany mirehitra hamindrany fo aminao sy hiantrany anao, ary hahamaroany anao araka izay nianianany tamin''ny razanao,'
mg1865::mg_5::13::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha hohenoinao ny feon''i Jehovah Andriamanitrao ka hotandremanao ny didiny rehetra izay andidiako anao anio, mba hanaovana izay mahitsy eo imason''i Jehovah Andriamanitrao.'
mg1865::mg_5::14::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hifadiana izay fanao vetaveta, na izay zavatra tsy fihinana'
  verse_text: 'Zanak''i Jehovah Andriamanitrareo ianareo, koa aza mitetika ny tenanareo, na manaratra ny eo ambonin''ny handrinareo noho ny amin''ny maty.'
mg1865::mg_5::14::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa firenena masina ho an''i Jehovah Andriamanitrao ianao ka voafidiny ho rakitra soa ho Azy mihoatra noho ny firenena rehetra ambonin''ny tany.'
mg1865::mg_5::14::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihinana izay fahavetavetana.'
mg1865::mg_5::14::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no biby izay ho fihinanareo: Ny omby sy ny ondry sy ny osy'
mg1865::mg_5::14::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny diera, ny gazela, ny kapreola, ny osi-dia, ny pygarga, ny antilopa ary ny ropikapra:'
mg1865::mg_5::14::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay biby rehetra mivaky kitro, ka misaraka tsara ny kitrony sady mandinika, no ho fihinanareo.'
mg1865::mg_5::14::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa amin''izay mandinika na mivaky kitro dia izao ihany kosa no tsy ho fihinanareo: Ny rameva sy ny rà bitro ary ny hyraka, satria mandinika ihany izy, fa tsy mivaky kitro; maloto aminareo izy;'
mg1865::mg_5::14::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny kisoa koa, satria mivaky kitro izy, fa tsy mandinika, maloto aminareo izy; ny henan''ireny tsy ho fihinanareo, ary ny fatiny tsy hokasihinareo.'
mg1865::mg_5::14::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izay rehetra ao anatin''ny rano dia izao no ho fihinanareo: izay rehetra misy vombony sy kirany no ho fihinanareo;'
mg1865::mg_5::14::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay rehetra tsy misy vombony sy kirany kosa dia tsy ho fihinanareo; maloto aminareo izy.'
mg1865::mg_5::14::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vorona madio rehetra no ho fihinanareo.'
mg1865::mg_5::14::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izao kosa no tsy ho fihinanareo: ny voltora sy ny gypa sy ny ankoay'
mg1865::mg_5::14::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny papango sy ny voromahery sy ny papango mainty, samy araka ny karazany, avy'
mg1865::mg_5::14::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny goaika rehetra, samy araka ny karazany avy,'
mg1865::mg_5::14::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny ostritsa sy ny tararaka sy ny vorondriaka ary ny hitsikitsika, samy araka ny karazany avy,'
mg1865::mg_5::14::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny vorondolo sy ny vorondolo lehibe sy ny ibisa'
mg1865::mg_5::14::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sama sy ny voltora madinika sy ny manarana'
mg1865::mg_5::14::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny vano sy ny vanobe, samy araka ny karazany avy, ary ny takidara sy ny manavy.'
mg1865::mg_5::14::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zava-mandady rehetra izay manana elatra dia haloto aminareo ka tsy ho fihinanareo.'
mg1865::mg_5::14::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zava-manana elatra izay madio no ho fihinanareo.'
mg1865::mg_5::14::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza homana izay maty ho azy, fa omeo ho an''ny vahiny izay ao an-tanànanao izany mba hohaniny, na amidio amin''ny olona hafa firenena; fa firenena masina ho an''i Jehovah Andriamanitrao ianao. Aza mahandro zanak''osy amin''ny rononon-dreniny.'
mg1865::mg_5::14::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny amin''ny fandoavana ny fahafolon-karena'
  verse_text: 'Aloavy tsara ny ampahafolon''ny vokatra rehetra avy amin''ny voa nafafinao, dia ny vokatra any an-tsaha isan-taona;'
mg1865::mg_5::14::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aoka ho eo anatrehan''i Jehovah Andriamanitrao eo amin''ny tany izany hofidiny hampitoerany ny anarany no hihinananao ny ampahafolon''ny varinao sy ny ranom-boalobokao sy ny diloilonao ary ny voalohan-teraky ny ombinao sy ny ondry aman''osinao, mba hianaranao hatahotra an''i Jehovah Andriamanitrao mandrakariva.'
mg1865::mg_5::14::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha lavitra loatra ny lalana halehanao ka tsy mahatondra izany zavatra izany ianao, satria lavitra anao loatra ny tany izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany, raha notahin''i Jehovah Andriamanitrao ianao,'
mg1865::mg_5::14::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hamidinao vola izany, ary hofonosinao ny vola ka ho entinao eo an-tananao hankany amin''ny tany izay hofidin''i Jehovah Andriamanitrao;'
mg1865::mg_5::14::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny vola dia amidio izay rehetra tian''ny fanahinao, na omby, na ondry, na osy, na divay, na toaka, na izay zavatra hafa tian''ny fanahinao; ary aoka ho eo anatrehan''i Jehovah Andriamanitrao no hihinananao izany sy hifalianao mbamin''ny ankohonanao;'
mg1865::mg_5::14::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny Levita izay ao an-tanànanao dia aza foinao; fa tsy manana anjara na lova eo aminao izy.'
mg1865::mg_5::14::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isan-telo taona dia alao ny ampahafolon''ny vokatrao rehetra amin''izany taona izany, ka ataovy ao an-tanànanao;'
mg1865::mg_5::14::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia aoka ho avy ny Levita (satria tsy mba manana anjara na lova eo aminao izy) sy ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao, dia hihinana izy ka ho voky, mba hotahin''i Jehovah Andriamanitrao ianao amin''ny asan-tananao rehetra izay ataonao.'
mg1865::mg_5::15::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny taom-panafahana'
  verse_text: 'Ary isam-pito taona dia manaova fanafahana ianao.'
mg1865::mg_5::15::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho fomban''ny fanafahana: Ny tompon-trosa rehetra izay nampanàna vola tamin''ny namany dia hamoy izany; tsy hanery ny namany izay rahalahiny handoa izy, satria efa voantso ny fanafahan''i Jehovah.'
mg1865::mg_5::15::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona hafa firenena ihany no azonao terena handoa; fa izay anao amin''ny rahalahinao kosa dia hafoinao;'
mg1865::mg_5::15::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa tsy dia hisy olo-malahelo eo aminao, fa hitahy anao tokoa Jehovah eo amin''ny tany izay omen''i Jehovah Andriamanitrao ho lovanao,'
mg1865::mg_5::15::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mihaino tsara ny feon''i Jehovah Andriamanitrao ianao ka mitandrina hanaraka izao lalàna rehetra izao, izay andidiako anao anio.'
mg1865::mg_5::15::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrao hitahy anao araka izay nolazainy taminao; ary hampisambotra ny firenena maro ianao, fa ianao kosa tsy hisambotra; ary hanapaka firenena maro ianao, fa izy kosa tsy mba hanapaka anao.'
mg1865::mg_5::15::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy malahelo ny rahalahinao ao an-tanànanao anankiray amin''ny taninao izay omen''i Jehovah Andriamanitrao anao, dia aza manamafy ny fonao, na manakombona ny tananao, amin''ny rahalahinao malahelo;'
mg1865::mg_5::15::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa sokafy tsara aminy ny tananao, ka ampisambory izay ilainy, araka izay mahory azy.'
mg1865::mg_5::15::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema fandrao hisy hevi-dratsy ao am-ponao manao hoe: Antomotra ny taona fahafito, dia ny taom-panafahana; ary ho ratsy fijery ny rahalahinao malahelo ianao, ka tsy hanome azy akory ianao; ary hitaraina amin''i Jehovah hiampanga anao Izy, ka dia ho fahotanao izany.'
mg1865::mg_5::15::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo tokoa izy, ary aoka tsy halahelo ny fonao raha manome azy, satria izany zavatra izany no hitahian''i Jehovah Andriamanitrao anao amin''ny asanao rehetra sy amin''izay rehetra ataon''ny tananao.'
mg1865::mg_5::15::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany tsy ilaozan''olo-malahelo, koa izany no andidiako anao hoe: Sokafy tsara amin''ny rahalahinao ny tananao, dia amin''ny malahelo sy ny mahantra eo amin''ny taninao.'
mg1865::mg_5::15::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hamidy aminao ny namanao, na lehilahy Hebreo, na vehivavy Hebreo, ka efa nanompo anao enin-taona, dia hovotsoranao ho afaka izy amin''ny taona fahafito.'
mg1865::mg_5::15::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hovotsoranao ho afaka izy, dia tsy havelanao handeha fotsiny;'
mg1865::mg_5::15::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hisy hampitondrainao azy avy amin''ny ondry aman''osinao ary avy amin''ny famoloanao sy ny famiazanao: araka izay efa nitahian''i Jehovah Andriamanitrao anao no hanomezanao azy.'
mg1865::mg_5::15::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsarovy fa andevo tany amin''ny tany Egypta ianao, nefa Jehovah Andriamanitrao efa nanavotra anao, koa izany no andidiako anao izao zavatra izao anio.'
mg1865::mg_5::15::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha hoy izy aminao: Tsy hiala aminao aho, satria tsy foiny ianao sy ny ankohonanao, ka finaritra aminao izy,'
mg1865::mg_5::15::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia halainao ny haolo ka hotevehinao amin''ny varavarana ny sofiny, dia ho mpanomponao mandrakizay izy. Ary toy izany koa no hataonao amin''ny ankizivavinao.'
mg1865::mg_5::15::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ataonao ho sarotra ny hamotsotra azy ho afaka, fa indroa toraka ny karaman''ny mpikarama no azonao tamin''ny nanompoany anao enin-taona; dia hitahy anao Jehovah Andriamanitrao amin''izay rehetra ataonao.'
mg1865::mg_5::15::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny ho fanao amin''ny voalohan-teraky ny biby fiompy'
  verse_text: 'Ny lahy rehetra amin''ny voalohan-teraky ny ombinao sy ny ondry aman''osinao dia hohamasininao ho an''i Jehovah Andriamanitrao; aza mampiasa ny voalohan-teraky ny ombinao, na manety ny voalohan-teraky ny ondry aman''osinao.'
mg1865::mg_5::15::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anatrehan''i Jehovah Andriamanitrao no hihinananao sy ny ankohonanao azy isan-taona isan-taona eo amin''ny fitoerana izay hofidin''i Jehovah.'
mg1865::mg_5::15::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy kilemany izy: na mandringa, na jamba, na izay kilema ratsy hafa akory, dia aza vonoinao hatao fanatitra ho an''i Jehovah Andriamanitrao ireny.'
mg1865::mg_5::15::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao an-tanànanao ihany no hihinananao ireny; na ny olona maloto na ny madio dia samy mahazo mihinana azy, tahaka ny ahazoany mihinana ny gazela sy ny diera.'
mg1865::mg_5::15::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny ràny no aza hanina, fa aidino amin''ny tany toy ny rano.'
mg1865::mg_5::16::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny andro firavoravoana telo, dia ny Paska sy ny Pentekosta ary ny Tabernakely'
  verse_text: 'Tandremo ny volana Abiba, ka ataovy ny Paskan''i Jehovah Andriamanitrao fa tamin''ny volana Abiba no nitondran''i Jehovah Andriamanitrao anao nivoaka avy tany Egypta tamin''ny alina.'
mg1865::mg_5::16::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vonoy ny Paskan''i Jehovah Andriamanitrao, dia ondry aman''osy sy omby, eo amin''ny tany izay hofidin''i Jehovah hampitoerany ny anarany.'
mg1865::mg_5::16::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ny mofo misy masirasira no haninao aminy; hafitoana no hihinananao mofo tsy misy masirasira, dia mofom-pahoriana, fa tampoka no nivoahanao avy tany amin''ny tany Egypta, mba hotsarovanao amin''ny andro rehetra hiainanao ny andro izay nivoahanao avy tany amin''ny tany Egypta.'
mg1865::mg_5::16::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka tsy hisy masirasira eo aminao ao anatin''ny faritaninao rehetra hafitoana; ary aoka tsy hisy hitoetra miloaka alina ny henan''ny fanatitra izay novonoinao tamin''ny harivan''ny andro voalohany.'
mg1865::mg_5::16::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hisy azonao hamonoana ny Paska ny tanànanao rehetra izay omen''i Jehovah Andriamanitrao anao;'
mg1865::mg_5::16::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa eo amin''ny fitoerana izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany no hamonoanao azy rehefa hariva tokony ho maty masoandro, dia tahaka izay nivoahanao avy tany Egypta.'
mg1865::mg_5::16::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary atsatsiho amin''ny afo izy, ka hano eo amin''ny tany izay hofidin''i Jehovah Andriamanitrao; ary miverena nony maraina, ka modia any amin''ny lainao.'
mg1865::mg_5::16::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henemana no hihinananao mofo tsy misy masirasira; fa ny andro fahafito dia fara-fivoriana ho an''i Jehovah Andriamanitrao, ka tsy hanao raharaha ianao amin''izany.'
mg1865::mg_5::16::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Herinandro fito no hisainao ho anao: hatramin''ny andro iandohan''ny fijinjam-bary no hanisanao azy.'
mg1865::mg_5::16::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitandrema andro firavoravoana manarakaraka ireo herinandro ho an''i Jehovah Andriamanitrao, ka manatera fanati-tsitrapo, izay homenao araka izay itahian''i Jehovah Andriamanitrao anao;'
mg1865::mg_5::16::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mifalia eo anatrehan''i Jehovah Andriamanitrao ianao sy ny zanakao-lahy sy ny zanakao-vavy ary ny ankizilahinao sy ny ankizivavinao ary ny Levita izay ao an-tanànanao mbamin''ny vahiny sy ny kamboty ary ny mpitondratena izay eo aminao, dia eo amin''ny tany izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany.'
mg1865::mg_5::16::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsarovy fa andevo tany Egypta ianao; koa tandremo sy araho ireo didy ireo.'
mg1865::mg_5::16::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo hafitoana ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo, rehefa nangoninao ny avy amin''ny famoloanao sy ny famiazanao.'
mg1865::mg_5::16::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifalia amin''ny andro firavoravoanao ianao sy ny zanakao-lahy sy ny zanakao-vavy sy ny ankizilahinao sy ny ankizivavinao ary ny Levita mbamin''ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao.'
mg1865::mg_5::16::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no itandremanao andro firavoravoana ho an''i Jehovah Andriamanitrao eo amin''ny tany izay hofidin''i Jehovah, satria hitahy anao Jehovah Andriamanitrao amin''ny vokatrao rehetra sy ny asan-tananao rehetra, ka dia hifaly tokoa ianao.'
mg1865::mg_5::16::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Intelo isan-kerintaona ny lehilahy rehetra aminao no hiseho eo anatrehan''i Jehovah Andriamanitrao, eo amin''ny tany izay hofidiny, dia amin''ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro ary ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo. Ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehan''i Jehovah;'
mg1865::mg_5::16::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa aoka samy hanatitra izay zakany avy, araka ny fitahian''i Jehovah Andriamanitrao, izay omeny anao.'
mg1865::mg_5::16::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny amin''ny fitsarana sy ny fifidianana mpanjaka'
  verse_text: 'Mifidiana mpitsara sy mpifehy ho anao ao an-tanànanao rehetra, izay omen''i Jehovah Andriamanitrao anao, araka ny firenenao; dia hitsara ny olona amin''ny fitsarana marina ireo.'
mg1865::mg_5::16::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao fitsarana miangatra, aza mizaha tavan''olona, ary aza mandray kolikoly; fa ny kolikoly mahajamba ny mason''ny hendry ary mamadika ny tenin''ny marina.'
mg1865::mg_5::16::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina dia marina no harahinao, mba ho velona ianao ka handova ny tany izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::16::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manangana hazo ho Aseraha ho anao eo anilan''ny alitaran''i Jehovah Andriamanitrao, izay ataonao ho anao.'
mg1865::mg_5::16::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza manao tsangam-baton-tsampy ho anao; fa halan''i Jehovah Andriamanitrao izany.'
mg1865::mg_5::17::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza vonoina hatao fanatitra ho an''i Jehovah Andriamanitrao izay misy kilema maharatsy azy, na omby na ondry, fa fahavetavetana eo imason''i Jehovah Andriamanitrao ny manao izany.'
mg1865::mg_5::17::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy hita ao aminao ao an-tanànanao, izay omen''i Jehovah Andriamanitrao anao, na lehilahy na vehivavy manao izay ratsy eo imason''i Jehovah Andriamanitrao ka mivadika ny fanekeny'
mg1865::mg_5::17::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka lasa mandeha manompo andriamani-kafa ary mivavaka aminy na amin''ny masoandro, na amin''ny volana, na amin''ny kintana, izay zavatra efa nandrarako azy,'
mg1865::mg_5::17::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka voalaza aminao izany, ary efa renao, dia diniho tsara, ka indro, raha nisy marina tokoa izany zavatra izany, ka natao teo amin''ny Isiraely izany fahavetavetana izany:'
mg1865::mg_5::17::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia avoahy ho eo am-bavahadinao izay lehilahy na vehivavy efa nanao izany zava-dratsy izany, ka torahy vato ho faty.'
mg1865::mg_5::17::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny tenin''ny vavolombelona roa na telo no hamonoana izay tokony ho faty; fa ny tenin''ny vavolombelona iray monja dia tsy hahafaty azy.'
mg1865::mg_5::17::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanan''ny vavolombelona no ho voalohany hamono azy, dia vao ny tanan''ny vahoaka rehetra; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.'
mg1865::mg_5::17::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy teny sarotra loatra amin''ny fitsarana ka tsy efanao, na ny amin''ny mahafaty aina, na ny ady na ny vonoana, izay iadiana ao an-tanànanao, dia miaingà ianao, ka miakara any amin''ny tany izay hofidin''i Jehovah Andriamanitrao.'
mg1865::mg_5::17::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mankanesa amin''ireo Levita mpisorona sy amin''ny anankiray izay mpitsara amin''izany andro izany, ka manontania, dia hambarany aminao ny teny fitsarana.'
mg1865::mg_5::17::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araho ny teny izay hambarany aminao eo amin''ny tany izay hofidin''i Jehovah, ka mitandrema hanao araka izay rehetra hatorony anao.'
mg1865::mg_5::17::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny lalàna izay hatorony anao sy araka ny fitsarana izay holazainy aminao no hataonao; aza mivily miala amin''ny teny izay hambarany aminao, na ho amin''ny ankavanana, na ho amin''ny ankavia.'
mg1865::mg_5::17::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay miavonavona ka tsy mihaino ny mpisorona izay mitsangana hanao fanompoam-pivavahana eo anatrehan''i Jehovah Andriamanitrao, na ny mpitsara, dia aoka ho faty izany olona izany; ka dia hofongoranao tsy ho eo amin''ny Isiraely ny fanao ratsy.'
mg1865::mg_5::17::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra handre, dia hatahotra ka tsy hiavonavona intsony.'
mg1865::mg_5::17::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa tonga any amin''ny tany izay omen''i Jehovah Andriamanitrao anao ianao ka mandova azy sy monina eo ary manao hoe: Hanangana mpanjaka ho ahy aho, mba ho tahaka ny firenena rehetra izay manodidina ahy,'
mg1865::mg_5::17::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay hofidin''i Jehovah Andriamanitrao ihany no hatsanganao ho mpanjakanao: anankiray amin''ny rahalahinao no hatsanganao ho mpanjakanao, fa tsy mahazo mifidy olona hafa firenena izay tsy avy amin''ny rahalahinao ianao.'
mg1865::mg_5::17::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa aoka tsy hanana soavaly maro izy, na hampiverina ny olona ho any Egypta mba hahazoany soavaly maro, satria hoy Jehovah taminareo: Aza miverina amin''izany lalana izany intsony.'
mg1865::mg_5::17::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka tsy hamporafy maro izy, fandrao hivily ny fony; ary aoka tsy hamory volafotsy na volamena be ho azy izy.'
mg1865::mg_5::17::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mipetraka eo ambonin''ny sezam-panjakany izy, dia aoka hadikany ho azy amin''ny boky izao lalàna izao ka hataony araka ilay tehirizin''ireo Levita mpisorona.'
mg1865::mg_5::17::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho ao aminy izany ka hovakiny amin''ny andro rehetra hiainany, mba hianarany hatahotra an''i Jehovah Andriamaniny ka hitandrina ny teny rehetra amin''izao lalàna izao sy ireto didy ireto hankatoavany azy,'
mg1865::mg_5::17::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hiavonavonan''ny fony amin''ny rahalahiny, ary mba tsy hiviliany hiala amin''ny lalàna, na ho amin''ny ankavanana, na ho amin''ny ankavia, mba ho maro andro amin''ny fanjakany eo amin''ny Isiraely; izy sy ny taranany.'
mg1865::mg_5::18::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny ho anjaran''ny mpisorona sy ny Levita'
  verse_text: 'Ny Levita mpisorona, dia ny firenen''i Levy rehetra, tsy mba hanana anjara na lova eo amin''ny Isiraely; ny fanatitra atao amin''ny afo ho an''i Jehovah sy ny anjaran''i Jehovah no ho fihinany.'
mg1865::mg_5::18::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hanan-dova eo amin''ny rahalahiny izy; Jehovah no lovany, araka izay nolazainy taminy.'
mg1865::mg_5::18::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho anjaran''ny mpisorona avy amin''ny olona, dia avy amin''izay mamono zavatra hatao fanatitra, na omby, na ondry, na osy: dia homeny ho an''ny mpisorona ny sorony sy ny takolany roa ary ny vavoniny;'
mg1865::mg_5::18::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny voaloham-bokatry ny varinao koa sy ny ranom-boalobokao sy ny diloilonao ary ny voalohan''ny volon''ondrinao no homenao azy.'
mg1865::mg_5::18::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy sy ny taranany no nofidin''i Jehovah Andriamanitrao tamin''ny firenenao rehetra hitsangana hanao fanompoam-pivavahana mandrakizay amin''ny anaran''i Jehovah.'
mg1865::mg_5::18::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy Levita miala amin''ny tanànanao anankiray, izay nivahiniany, amin''ny Isiraely rehetra, ka mandeha araka ny fanirian''ny fony ho any amin''ny tany izay hofidin''i Jehovah,'
mg1865::mg_5::18::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manao fanompoam-pivavahana amin''ny anaran''i Jehovah Andriamaniny, tahaka ny Levita rahalahiny rehetra, izay mitsangana eo anatrehan''i Jehovah,'
mg1865::mg_5::18::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia anjara mitovy amin''ny an''ireo ihany no ho fihinany, na dia misy aza izay vidin''ny azony tamin-drainy.'
mg1865::mg_5::18::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpaminany'
  verse_text: 'REHEFA tonga any amin''ny tany izay omen''i Jehovah Andriamanitrao anao ianao, dia aza mianatra hanao araka ny fahavetavetana ataon''ireo firenena ireo.'
mg1865::mg_5::18::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hisy eo aminao izay mampandeha ny zananilahy na ny zananivavy hamaky ny afo, na mpanao fankatovana, na mpanandro, na mpanao sikidy, na mpanana ody,'
mg1865::mg_5::18::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'na manao ho masim-bava, na mpanadina amin''ny manao azy ho tsindrian-javatra, na mpanao hatsarana, na mpanontany amin''ny maty.'
mg1865::mg_5::18::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahavetavetana eo imason''i Jehovah izay rehetra manao izany zavatra izany, ary izany fahavetavetana izany no androahan''i Jehovah Andriamanitrao azy eo anoloanao.'
mg1865::mg_5::18::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tanteraka amin''i Jehovah Andriamanitrao ianao.'
mg1865::mg_5::18::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo firenena izay efa horoahinao ireo dia mihaino ny mpanandro sy ny mpanao fankatovana; fa ianao kosa tsy navelan''i Jehovah Andriamanitrao hanao izany.'
mg1865::mg_5::18::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpaminany avy eo aminao, dia avy amin''ny rahalahinao, tahaka ahy, no hatsangan''i Jehovah Andriamanitrao ho anao; izy no hohenoinareo;'
mg1865::mg_5::18::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka izay rehetra nangatahinao tamin''i Jehovah Andriamanitrao tao Horeba tamin''ny andro nivoriana hoe: Aoka tsy hihaino ny feon''i Jehovah Andriamanitro intsony aho, ary aoka tsy hahita izany afo lehibe izany intsony aho, fandrao maty.'
mg1865::mg_5::18::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Tsara ny teny izay nolazainy.'
mg1865::mg_5::18::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpaminany no hatsangako ho azy avy amin''ny rahalahiny, tahaka anao, ka hataoko ao am-bavany ny teniko, ary holazainy aminy izay rehetra handidiako azy.'
mg1865::mg_5::18::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra tsy mihaino ny teniko, izay holazainy amin''ny anarako, dia Izaho no hitsara azy.'
mg1865::mg_5::18::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpaminany izay sahy hilaza teny amin''ny anarako, nefa tsy nasaiko nolazainy, na izay miteny amin''ny anaran''andriamani-kafa, dia hatao maty.'
mg1865::mg_5::18::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hoy ianao anakampo: Hataontsika ahoana no fahafantatra ny teny izay tsy nolazain''i Jehovah?'
mg1865::mg_5::18::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miteny amin''ny anaran''i Jehovah ny mpaminany, ka tsy efa ny zavatra, na tsy tanteraka, dia teny izay tsy nolazain''i Jehovah izany: tamin''ny fahasahisahiana no nilazan''ny mpaminany izany, koa aza matahotra azy.'
mg1865::mg_5::19::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny tanàna handosiran''izay mahafaty olona tsy nahy'
  verse_text: 'Rehefa aringan''i Jehovah Andriamanitrao ny firenen-tsamy hafa, izay tompon''ny tany omen''i Jehovah Andriamanitrao anao, ary mandresy azy ianao ka monina ao an-tanànany sy ao an-tranony,'
mg1865::mg_5::19::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia manokàna tanàna telo ho anao eo afovoan''ny taninao, izay omen''i Jehovah Andriamanitrao anao holovana.'
mg1865::mg_5::19::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amboary ny lalana, ka zarao ho telo toko ny taninao, izay omen''i Jehovah Andriamanitrao holovanao, mba handosiran''ny mahafaty olona rehetra ao.'
mg1865::mg_5::19::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mahafaty olona izay hovelomina, raha mandositra ao, dia ny mahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha'
mg1865::mg_5::19::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'toy ny olona izay miaraka amin''ny namany ho any an''ala hikapa hazo, koa manainga ny famaky hikapa ny hazo ny tanany, dia mitsoaka amin''ny zarany ny lela-famaky, ary mahavoa ny namany ka mahafaty azy, dia aoka handositra ao amin''ny anankiray amin''ireo tanàna ireo izy ka hovelomina;'
mg1865::mg_5::19::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao hanenjika ny nahafaty olona ny mpamaly rà, raha mbola mirehitra ny fony, ka hahatratra azy, noho ny halavitry ny alehany, dia hahafaty azy izy; nefa tsy tokony ho faty izy, satria tsy nankahala ny namany teo aloha.'
mg1865::mg_5::19::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no andidiako anao hoe: Manokàna tanàna telo ho anao.'
mg1865::mg_5::19::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitarin''i Jehovah Andriamanitrao ny faritaninao, araka izay nianianany tamin''ny razanao, ka homeny anao ny tany rehetra izay nolazainy homena ny razanao'
mg1865::mg_5::19::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: '(raha hitandrina ianao ka hanaraka izao lalàna rehetra izao, izay andidiako anao anio, ka ho tia an''i Jehovah Andriamanitrao, ary handeha mandrakariva amin''ny lalany), dia hampianao tanàna telo koa ireny telo ireny;'
mg1865::mg_5::19::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hisy rà marina alatsaka eo amin''ny taninao, izay omen''i Jehovah Andriamanitrao anao ho lovanao, ka tsy ho meloka amin''ny rà ianao.'
mg1865::mg_5::19::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy olona mankahala ny namany ka manotrika azy, ary mitsangana ka mamely mahafaty azy, ary mandositra ho ao amin''ny anankiray amin''ireo tanàna ireo,'
mg1865::mg_5::19::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny loholona amin''ny tanànany dia haniraka haka azy ao, dia hanolotra azy eo an-tanan''ny mpamaly rà, mba hovonoiny ho faty izy.'
mg1865::mg_5::19::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hiantra azy ny masonao; fa hesorinao tsy ho eo amin''ny Isiraely ny heloka ny amin''ny rà marina, mba hahita soa ianao.'
mg1865::mg_5::19::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny amin''ny tsy famindrana faritany, sy ny amin''ny vavolombelona'
  verse_text: 'Aza mamindra ny faritanin''ny namanao, izay efa vitan''ny razana teo amin''ny zara-taninao, izay azonao eo amin''ny tany izay omen''i Jehovah Andriamanitrao anao holovanao.'
mg1865::mg_5::19::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha vavolombelona iray monja, dia aoka tsy hitsangana hiampanga olona ny amin''izay heloka na ota nataony na inona na inona; fa amin''ny tenin''ny vavolombelona roa na telo no hanorenana mafy ny teny.'
mg1865::mg_5::19::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy vavolombelona mampidi-doza mitsangana hiampanga olona ho nanao ratsy,'
mg1865::mg_5::19::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hitsangana eo anatrehan''i Jehovah izy roa lahy izay miady, dia eo anatrehan''ny mpisorona sy ny mpitsara amin''izany andro izany;'
mg1865::mg_5::19::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha hadinin''ny mpitsara mafy izy ka hitany fa vavolombelona mandainga, fa miampanga lainga ny namany,'
mg1865::mg_5::19::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia araka izay nokasainy hatao amin''ny namany no hataonareo aminy; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.'
mg1865::mg_5::19::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa dia handre izany ka hatahotra ary tsy hanao araka izany ratsy izany eo aminao intsony.'
mg1865::mg_5::19::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy hiantra azy ny masonao; fa aina no hataonao solon''ny aina, maso solon''ny maso, nify solon''ny nify, tanana solon''ny tanana, tongotra solon''ny tongotra.'
mg1865::mg_5::20::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny miaramila sy ny tafika'
  verse_text: 'Raha mivoaka hanafika ny fahavalonao ianao ka mahita soavaly sy kalesy ary olona maro noho ianao, dia aza matahotra azy; fa Jehovah Andriamanitrao kosa, Izay nitondra anao niakatra avy tany amin''ny tany Egypta, no momba anao.'
mg1865::mg_5::20::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hanafika ianareo, dia hanatona ny mpisorona ka hiteny amin''ny olona hoe:'
mg1865::mg_5::20::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, ry Isiraely o, fa efa hanafika ny fahavalonareo ianareo anio; koa aza ketraka ny fonareo ary aza matahotra, na mikorapaka foana, na mangorohoro noho ny tahotra azy;'
mg1865::mg_5::20::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Jehovah Andriamanitrareo no miara-mandeha aminareo hiady ho anareo amin''ny fahavalonareo mba hamonjy anareo.'
mg1865::mg_5::20::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny amin''ny olona ireo mpifehy azy ka hanao hoe: Iza no olona izay efa nanao trano vaovao, nefa tsy mbola nitokanany? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin''ny ady, ka olon-kafa no hitokana ny tranony.'
mg1865::mg_5::20::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no olona izay efa nanao tanim-boaloboka, nefa tsy mbola nihinana ny vokatra? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin''ny ady, ka olon-kafa no hihinana ny vokatra.'
mg1865::mg_5::20::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no olona izay efa nifofo vady, nefa tsy mbola nampakatra azy? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin''ny ady, ka olon-kafa no hampakatra ny vadiny.'
mg1865::mg_5::20::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola hiteny amin''ny olona ihany ny mpifehy azy ka hanao hoe: Iza no olona izay matahotra ka osa fo? Aoka handeha hiverina any an-tranony izy, fandrao ho ketraka tahaka ny fony koa ny fon''ny rahalahiny.'
mg1865::mg_5::20::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vitan''ny mpifehy vahoaka ny teny ataony amin''ny olona, dia hasiany mpifehy ny miaramila hitarika azy.'
mg1865::mg_5::20::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mby akaikin''izay tanàna hiadiana ianao, dia milazà fihavanana aminy.'
mg1865::mg_5::20::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha fihavanana no avaliny anao, ka mampandroso anao izy, dia hampanaovinao fanompoana ny olona rehetra ao, ka hanompo anao izy.'
mg1865::mg_5::20::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mety manao fihavanana aminao kosa izy, fa te-hiady aminao, dia ataovy fahirano izy.'
mg1865::mg_5::20::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa atolotr''i Jehovah Andriamanitrao eo an-tananao izy, dia hovonoinao amin''ny lelan-tsabatra ny lehilahy rehetra ao.'
mg1865::mg_5::20::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny babo rehetra ao, dia ny zaza amim-behivavy sy ny biby fiompy ary izay rehetra ao an-tanàna, dia ho entinao ho anao; ary hohaninao ny babo azo tamin''ny fahavalonao, izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::20::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no hataonao amin''ny tanàna rehetra izay lavitra anao indrindra ka tsy tanànan''ireto firenena ireto.'
mg1865::mg_5::20::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tanànan''ireto firenena ireto kosa, izay omen''i Jehovah Andriamanitrao ho lovanao, dia aza asiana miangana izay olona rehetra ao.'
mg1865::mg_5::20::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aringano tokoa ireo, dia ny Hetita sy ny Amorita sy ny Kananita sy ny Perizita sy ny Hivita ary ny Jebosita, araka izay nandidian''i Jehovah Andriamanitrao anao,'
mg1865::mg_5::20::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hampianarany anareo hanao araka ny fahavetavetany rehetra izay nataony tamin''ireo andriamaniny, ka tsy hanotanareo amin''i Jehovah Andriamanitrareo.'
mg1865::mg_5::20::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hataonao fahirano ela ny tanàna izay tafihinao halaina, dia aza simbana kapaina amin''ny famaky ny hazo eo; fa hisy hohaninao amin''ireo, koa aza kapaina, fa olona va ny hazo any an-tsaha, no hataonao fahirano?'
mg1865::mg_5::20::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny hazo izay fantatrao fa tsy fihinam-boa dia kapao ihany, ka ataovy manda hamelezana ny tanàna izay miady aminao mandra-paharesiny.'
mg1865::mg_5::21::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fanesoran-keloka, raha misy faty hita, nefa tsy fantatra izay nahafaty azy'
  verse_text: 'Raha tahàny misy maty novonoin''olona hita miampatra any an-tsaha amin''ny tany izay omen''i Jehovah Andriamanitrao anao holovana, ary tsy fantatra izay nahafaty azy,'
mg1865::mg_5::21::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hivoaka ny loholonao sy ny mpitsaranao ka horefesiny hatreo amin''ny faty ka hatramin''izay tanàna manodidina azy.'
mg1865::mg_5::21::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loholona amin''ny tanàna izay akaikin''ny faty indrindra dia haka ombivavy kely izay tsy mbola nampiasaina na nasiana zioga hitarihany.'
mg1865::mg_5::21::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay ombivavy kely dia ho entin''ny loholona amin''izany tanàna izany midina any amin''izay lohasaha tsy voasa na voafafy sady misy renirano tsy mety ritra, dia hofolahiny any an-dohasaha ny vozony.'
mg1865::mg_5::21::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo mpisorona, taranak''i Levy, dia hanatona, fa izy no nofidin''i Jehovah Andriamanitrao hanao fanompoam-pivavahana aminy sy hitso-drano amin''ny anaran''i Jehovah; koa araka ny teniny no hanefana ny ady rehetra sy ny vonoana rehetra;'
mg1865::mg_5::21::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny loholona rehetra amin''izany tanàna akaikin''ny faty izany dia hanasa ny tanany eo ambonin''ilay ombivavy kely izay efa voafolaka tany an-dohasaha ny vozony;'
mg1865::mg_5::21::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hiloa-bava ireo ka hanao hoe: Tsy ny tananay no nandatsaka ity rà ity, sady tsy nahita izany ny masonay.'
mg1865::mg_5::21::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, mamelà ny heloky ny Isiraely olonao izay navotanao ka aza atao ho heloky ny Isiraely olonao ny rà marina! Dia ho afa-keloka ny amin''izany rà izany izy.'
mg1865::mg_5::21::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hesorinao ho afaka aminao ny rà marina, raha hanao izay mahitsy eo imason''i Jehovah ianao.'
mg1865::mg_5::21::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny amin''ny vehivavy babo hovadin''izay nahazo azy'
  verse_text: 'Raha mivoaka hanafika ny fahavalonao ianao, ary atolotr''i Jehovah Andriamanitrao eo an-tananao izy ka voababonao,'
mg1865::mg_5::21::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary misy vehivavy tsara tarehy hitanao eo amin''ny babo ka tianao hovadina,'
mg1865::mg_5::21::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ento ho ao an-tranonao izy, ka asaovy haratany ny lohany sy alàny ny hohony,'
mg1865::mg_5::21::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary asaovy esoriny koa ny fitafiany tamin''ny nahababo azy, dia aoka hitoetra ao an-tranonao andro iray volana izy hitomany ny ray aman-dreniny; ary rehefa afaka izany, dia vao mahazo mandry aminy ianao ka ho tompom-bady azy, ary ho vadinao izy.'
mg1865::mg_5::21::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy tianao intsony ravehivavy, dia alefaso handeha araka izay sitrapony izy: fa aza mivarotra azy hatao vola aman-karena na manandevo azy, satria efa nampietry azy ianao.'
mg1865::mg_5::21::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny amin''ny lovan''ny lahimatoa'
  verse_text: 'Raha misy lehilahy mamporafy, ka ny anankiray tiany, fa ny anankiray kosa tsy tiany, ary samy miteraka zaza aminy izy roa vavy, na ny tiany na ny tsy tiany, ary zanak''ilay tsy tiany no lahimatoa:'
mg1865::mg_5::21::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny andro handidiany fananana ho an''ny zananilahy dia tsy azo hatao lahimatoa ny zanaky ny tiany, raha mbola eo ihany ny zanaky ny tsy tiany, izay tena lahimatoany;'
mg1865::mg_5::21::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny lahimatoa, zanak''ilay tsy tiany ihany, no hekeny ka homeny anjaran-droa amin''izay rehetra ananany; fa voalohan''ainy izy, ka azy ny fizokiana.'
mg1865::mg_5::21::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny fanao amin''ny zanaka maditra tsy zaka anarina'
  verse_text: 'Raha misy olona manana zanakalahy maditra sy manohitra ka tsy mety mihaino ny feon''ny rainy, na ny feon''ny reniny, ka tsy zakany anarina,'
mg1865::mg_5::21::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hosamborin''ny rainy sy ny reniny izy ka ho entiny amin''ny loholona amin''ny tanànany, eo amin''ny vavahadin''ny tanàna onenany,'
mg1865::mg_5::21::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hiteny amin''ny loholona amin''ny tanànany izy mivady hoe: Ity zanakay ity dia maditra sy manohitra ka tsy mihaino ny feonay, fa mpandany sy fileony.'
mg1865::mg_5::21::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitora-bato azy ho faty ny mponina rehetra ao an-tanànany; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy; ary ny Isiraely rehetra dia handre izany ka hatahotra.'
mg1865::mg_5::21::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny amin''ny fandevenana ny fatin''ny meloka izay efa nahantona tamin''ny hazo'
  verse_text: 'Ary raha misy olona manao fahotana izay tokony hahafaty azy ka atao maty ary ahantona amin''ny hazo.'
mg1865::mg_5::21::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy havela hiloaka alina eo amin''ny hazo ny fatiny, fa tsy maintsy halevinao androtr''iny ihany izy (fa voaozon''Andriamanitra ny mihantona amin''ny hazo) koa aza lotoina ny taninao, izay omen''i Jehovah Andriamanitrao anao ho lovanao.'
mg1865::mg_5::22::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Didy samy hafa ny amin''ny fitiavana ny namana, sy ny tsy fampifamadihana ny fomban-javatra'
  verse_text: 'Raha hitanao mania ny omby na ny ondrin''ny rahalahinao, dia aza atao tsy ho raharahanao izany, fa avereno any amin''ny rahalahinao mihitsy izany.'
mg1865::mg_5::22::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy akaiky anao, na tsy fantatrao, ny rahalahinao, dia ento mody any aminao ilay nania, ary aoka hitoetra aminao mandra-pitadin''ny rahalahinao azy, dia haverinao any aminy.'
mg1865::mg_5::22::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa no hataonao amin''ny borikiny, na ny fitafiany, na ny zavatry ny rahalahinao, na inona na inona izay very ka hitanao; fa aza atao tsy ho raharahanao izany.'
mg1865::mg_5::22::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitanao ny borikin''ny rahalahinao, na ny ombiny, potraka any an-dàlana, dia aza atao tsy ho raharahanao izany; fa manampia ny rahalahinao hanarina azy.'
mg1865::mg_5::22::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny vehivavy tsy hitafy ny fitafian-dehilahy; ary aoka ny lehilahy tsy hitafy ny fitafiam-behivavy; fa fahavetavetana eo imason''i Jehovah Andriamanitrao izay rehetra manao izany.'
mg1865::mg_5::22::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha sendra mahita akanim-borona eo anoloanao eny an-dàlana ianao, na amin''ny efa foy, na mbola atodiny, ary ny reniny manomba ny efa foy, na mikotrika ny atodiny, dia aza maka ny reniny mbamin''ny zanany.'
mg1865::mg_5::22::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alefaso mihitsy ny reniny, fa ny zanany ihany no alao ho anao, mba hahita soa ianao ka ho maro andro.'
mg1865::mg_5::22::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manao trano vaovao ianao, dia asio aro-fanina ny tampony, fandrao hisy olona hianjera eny, ka hahatonga heloka ny amin''ny rà ho ao an-tranonao ianao.'
mg1865::mg_5::22::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza fafazana voan-javatra roa karazana mifangaroharo ny taninao, fandrao samy ho lasa ho sazy ny vokatry ny voan-javatra nafafinao sy ny vokatry ny tanim-boalobokao.'
mg1865::mg_5::22::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mampikambana omby sy boriky hiasa tany.'
mg1865::mg_5::22::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitafy lamba volon''ondry sy rongony mifamahofaho.'
mg1865::mg_5::22::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asio somotraviaviny ny zorony efatra amin''ny lambanao izay itafianao.'
mg1865::mg_5::22::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Didy ny amin''ny fanamasinana ny fanambadiana'
  verse_text: 'Raha misy lehilahy mampaka-bady ary mandry aminy, ka tsy tiany indray ravehivavy,'
mg1865::mg_5::22::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia haratsiny sy alàny baraka ka ataony hoe: Efa nampakatra ity vehivavy ity aho, nefa raha nandry taminy, dia tsy hitako ny famantarana azy ho virijina:'
mg1865::mg_5::22::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia halain''ny ray aman-drenin-drazazavavy ny famantarana azy ho virijina ka ho entiny ho eo amin''ny loholona amin''ny tanàna eo am-bavahady.'
mg1865::mg_5::22::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny amin''ny loholona ny rain-drazazavavy hoe: Ny zanako-vavy nomeko ho vadin''io lehilahy io, kanefa tsy tiany indray izy;'
mg1865::mg_5::22::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary indro fa efa noharatsiny izy ka nataony hoe: Tsy hitako ny famantarana ny zanakao vavy ho virijina; kanefa indreto ny famantarana ny zanakao-vavy ho virijina. Dia hamelatra ny lamba eo anatrehan''ny loholona amin''ny tanàna izy mivady.'
mg1865::mg_5::22::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary halain''ny loholona amin''ny tanàna izany lehilahy izany ka hofaizany.'
mg1865::mg_5::22::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hosaziny sekely volafotsy zato koa izy, ka homeny ny rain-drazazavavy izany, satria nahafa-baraka ny virijina anankiray tamin''ny Isiraely ralehilahy; nefa dia ho vadiny ihany razazavavy ka tsy azony hisaorana amin''ny andro rehetra hiainany.'
mg1865::mg_5::22::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha marina kosa izany lazainy izany, ka tsy hita ny famantarana an-drazazavavy ho virijina,'
mg1865::mg_5::22::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho entiny mivoaka ho eo anoloan''ny varavaran''ny tranon-drainy razazavavy ka hotorahan''ny mponina amin''ny tanànany vato ho faty, satria nanao izay fady indrindra teo amin''ny Isiraely izy ka nijangajanga tao an-tranon-drainy; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.'
mg1865::mg_5::22::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy lehilahy azo mandry amim-behivavy vadin''olona, dia samy hatao maty izy roroa, na ralehilahy izay nandry tamin-dravehivavy, na ravehivavy koa; ka dia hofongoranao tsy ho eo amin''ny Isiraely ny fanao ratsy.'
mg1865::mg_5::22::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy zazavavy virijina voafofo ho vadin''olona, ary misy lehilahy mahita azy eo an-tanàna ka mandry aminy,'
mg1865::mg_5::22::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho entinareo mivoaka ho eo amin''ny vavahadin''izany tanàna izany izy roroa ka hotorahanareo vato ho faty: razazavavy moa, satria tsy niantso, nefa tao an-tanàna ihany; ary ralehilahy koa, satria nandry tamin''ny vadin''ny namany; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.'
mg1865::mg_5::22::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha any an-tsaha kosa no ahitan-dralehilahy an-drazazavavy voafofo ho vadin''olona, ary misavika azy ralehilahy ka mandry aminy, dia ralehilahy izay nandry taminy ihany no hatao maty.'
mg1865::mg_5::22::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ravehivavy dia tsy hasianao na inona na inona; fa tsy misy ota tokony hahafaty azy; fa tahaka ny olona mitsangana hamely ny namany ka mahafaty azy no hevitr''izany zavatra izany.'
mg1865::mg_5::22::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tany an-tsaha no nahitany azy; ary niantso ihany razazavavy voafofo ho vadin''olona, nefa tsy nisy hamonjy azy.'
mg1865::mg_5::22::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy lehilahy mahita zazavavy virijina, izay tsy voafofo ho vadin''olona, ka misavika azy sady mandry aminy, koa hita izy roroa,'
mg1865::mg_5::22::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanome sekely volafotsy dimam-polo ho an''ny rain-drazazavavy ralehilahy izay nandry taminy; ary hovadiny izy, satria efa nosavihiny sady nandriany; ary tsy azony hisaorana izy amin''ny andro rehetra hiainany.'
mg1865::mg_5::23::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahazo maka ny vadin-drainy ny olona, na maniry amin''izay nandrian-drainy.'
mg1865::mg_5::23::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Didy maro samy hafa'
  verse_text: 'Tsy mahazo miditra amin''ny fiangonan''i Jehovah izay torotoro vihina, na izay voatapaka ny filahiany.'
mg1865::mg_5::23::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zazasary tsy mahazo miditra amin''ny fiangonan''i Jehovah: na dia hatramin''ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin''ny fiangonan''i Jehovah.'
mg1865::mg_5::23::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Amonita sy ny Moabita tsy mahazo miditra amin''ny fiangonan''i Jehovah: na dia hatramin''ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin''ny fiangonan''i Jehovah hatramin''ny mandrakizay ireny,'
mg1865::mg_5::23::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tsy nitsena hanina sy rano anareo teny an-dàlana izy, raha nivoaka avy tany Egypta ianareo, ary satria nanamby an''i Balama, zanak''i Beora, avy any Petora any Mesopotamia, hanozona anao izy.'
mg1865::mg_5::23::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Jehovah Andriamanitrao tsy nety nihaino an''i Balama, fa nampody ny fanozonana ho fitahiana anao Izy noho ny fitiavany anao.'
mg1865::mg_5::23::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitady izay hiadanany na izay hahasoa azy amin''ny andronao rehetra mandrakizay.'
mg1865::mg_5::23::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza atao ho fahavetavetana ny Edomita, fa rahalahinao izy, na ny Egyptiana, fa efa mba vahiny tany amin''ny taniny ianao.'
mg1865::mg_5::23::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zafiafin''ireo dia hahazo miditra amin''ny fiangonan''i Jehovah.'
mg1865::mg_5::23::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoaka hiady amin''ny fahavalonao ny tafikao, dia mifadia ny ratsy rehetra.'
mg1865::mg_5::23::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona eo aminao, izay tsy madio noho izay nanjo azy tamin''ny alina, dia hivoaka eny ivelan''ny toby izy, fa tsy hiditra ao anatiny.'
mg1865::mg_5::23::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa hariva, dia aoka handro amin''ny rano izy; ary nony tokony ho maty masoandro, dia mahazo miverina eo amin''ny toby indray izy.'
mg1865::mg_5::23::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hisy tany voafaritrao any ivelan''ny toby ho fivoahanao;'
mg1865::mg_5::23::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mitondrà fantaka miaraka amin''ny fiadianao, ka raha hipetraka eny ivelany ianao, dia mihadia lavaka amin''ny fantaka, ka totofy ny fivalananao.'
mg1865::mg_5::23::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrao mandeha eo afovoan''ny tobinao hamonjy anao sy hanolotra ny fahavalonao eo anoloanao; ka dia ho masina ny tobinao, mba tsy hahita zavatra maloto eo aminao izy ka tsy hiala aminao.'
mg1865::mg_5::23::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza atolotrao amin''ny tompony intsony ny andevo izay mandositra mamonjy tena ho eo aminao.'
mg1865::mg_5::23::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo aminao no hitoerany, dia eo amin''ny tanàna izay tiany sy izay sitraky ny fony; fa aza mampahory azy.'
mg1865::mg_5::23::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hisy zanakavavy na zanakalahin''ny Isiraely hanolo-tena hijangajanga ho fanompoan-tsampy.'
mg1865::mg_5::23::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitondra ny tangin''ny vehivavy janga, na ny karaman''alika, ho ao an-tranon''i Jehovah Andriamanitra, hanefana voady; fa fahavetavetana eo imason''i Jehovah Andriamanitrao ireo zavatra roa ireo.'
mg1865::mg_5::23::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mampanàna zavatra amin''ny rahalahinao, na vola, na hanina, na zavatra hafa mety hampananaina.'
mg1865::mg_5::23::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona hafa firenena ihany no hampanananao zavatra; fa ny rahalahinao kosa dia tsy hampanananao; mba hotahin''i Jehovah Andriamanitrao ianao amin''izay rehetra ataon''ny tananao eo amin''ny tany izay efa hidiranao holovana.'
mg1865::mg_5::23::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoady amin''i Jehovah Andriamanitrao ianao, dia aza ela fanefa; fa hadinin''i Jehovah Andriamanitrao aminao tokoa izany ka ho fahotana aminao.'
mg1865::mg_5::23::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mivoady ianao, dia tsy fahotana aminao izany.'
mg1865::mg_5::23::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay aloaky ny vavanao dia tandremo hotanterahinao, araka ny sitraponao nivoadianao tamin''i Jehovah ihany, dia izay nolazain''ny vavanao.'
mg1865::mg_5::23::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mankany amin''ny tanim-boaloboky ny namanao ianao, dia mahazo manaram-po mihinam-boaloboka hahavoky anao; fa aza mitondra mody.'
mg1865::mg_5::23::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mankany amin''ny tanimbarin''ny namanao ianao, dia mahazo mioty salohim-bary ny tananao; fa aza jinjanao antsy ny varin''ny namanao.'
mg1865::mg_5::24::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Didy samy hafa ny amin''ny fisaoram-bady sy ny tsy fanaovana izay hampahory ny sasany'
  verse_text: 'Raha misy lehilahy maka vady ka mampakatra azy, ary tsy tiany intsony ravehivavy noho ny ahitany fahalotoana eo aminy, dia aoka hanoratra taratasy fisaoram-bady ho an-dravehivavy Izy ary hanolotra izany eo an-tanany ka hampiala azy ao an-tranony.'
mg1865::mg_5::24::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa miala ao an-tranony ravehivavy, dia mahazo mandeha ka manambady olon-kafa.'
mg1865::mg_5::24::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy tia an-dravehivavy ilay vao manambady azy ka manoratra taratasy fisaoram-bady koa ary manolotra izany eo an-tanany ka mampiala azy ao an-tranony, na maty ilay nanambady azy taoriana:'
mg1865::mg_5::24::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ilay nanambady azy taloha ka nisaotra azy dia tsy mahazo manambady azy intsony, rehefa voaloto izy; fa fahavetavetana eo imason''i Jehovah izany; ary aza mampiditra heloka amin''ny tany, izay omen''i Jehovah Andriamanitrao ho lovanao.'
mg1865::mg_5::24::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy lehilahy vao nampaka-bady, dia tsy handeha hiantafika izy, ary tsy hampanaovina fanompoana akory, fa havela hitoetra ao an-tranony herintaona ka hampifaly ny vadiny izay vao nampakariny.'
mg1865::mg_5::24::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza misy olona maka ny fikosoham-bary ho tsatòka, na ny vatony ambony aza; fa maka aina ho tsatòka izany.'
mg1865::mg_5::24::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona hita mangalatra ny anankiray amin''ny Zanak''Isiraely rahalahiny ka manandevo azy, dia hatao maty izany mpangalatra izany; hofongoranao tsy ho eo aminao ny fanao ratsy.'
mg1865::mg_5::24::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema ny amin''ny habokana, ka araho tsara izay rehetra hatoron''ireo Levita mpisorona anareo; araka izay nandidiako azy no hotandremanareo harahina.'
mg1865::mg_5::24::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy izay nataon''i Jehovah Andriamanitrao tamin''i Miriama teny an-dàlana tamin''ny nandehananareo avy tany Egypta.'
mg1865::mg_5::24::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mampisambo-javatra ny namanao ianao, dia aza miditra ao an-tranony handray ny antoka aminy.'
mg1865::mg_5::24::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mijanona eo ala-trano, ary ny lehilahy izay nampisamborinao no hamoaka ny antoka ho aminao eo ala-trano.'
mg1865::mg_5::24::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha malahelo ralehilahy, dia aza tananao miloaka alina ny antoka,'
mg1865::mg_5::24::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy maintsy haverinao aminy mihitsy, rehefa tokony ho maty masoandro, mba hirakofany ny lambany, ka hisaorany anao; dia ho fahamarinana ho anao eo anatrehan''i Jehovah Andriamanitrao izany.'
mg1865::mg_5::24::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao fitondrana sarotra amin''ny mpikarama izay mahantra sy malahelo, na rahalahinao, na vahiny ao amin''ny taninao sy ao an-tanànanao.'
mg1865::mg_5::24::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa andro anaovany ihany no hanomezanao azy ny karamany, raha mbola tsy milentika ny masoandro, fa malahelo izy, ka izany no irin''ny fony; fandrao hitaraina amin''i Jehovah noho ny nataonao izy, dia ho fahotana aminao izany.'
mg1865::mg_5::24::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ray tsy hatao maty amin''ny ataon''ny zanany, ary ny zanaka tsy hatao maty amin''ny ataon''ny rainy; fa samy hatao maty amin''ny fahotany avy ihany ny olona.'
mg1865::mg_5::24::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao fitsarana miangatra amin''ny vahiny sy ny kamboty; ary aza maka ny fitafian''ny mpitondratena ho tsatòka.'
mg1865::mg_5::24::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsarovy fa andevo tany Egypta ianao, ary Jehovah Andriamanitrao efa nanavotra anao ho afaka tany; koa izany no andidiako anao hanao izany zavatra izany.'
mg1865::mg_5::24::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mijinja ny varinao any an-tsaha ianao, ka misy amboara hadinonao any, dia aza miverina haka azy; fa aoka ho an''ny vahiny sy ny kamboty ary ny mpitondratena izany; mba hotahin''i Jehovah Andriamanitrao ianao amin''ny asa rehetra ataon''ny tananao.'
mg1865::mg_5::24::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manintsana ny hazo olivanao ianao, dia aza miverina hitsimpona izay sisa; fa aoka ho an''ny vahiny sy ny kamboty ary ny mpitondratena izany.'
mg1865::mg_5::24::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mioty ny voalobokao ianao, dia aza miverina hitsimpona izay sisa; fa aoka ho an''ny vahiny sy ny kamboty ary ny mpitondratena izany.'
mg1865::mg_5::24::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsarovy fa andevo tany amin''ny tany Egypta ianao; koa izany no andidiako anao hanao izany zavatra izany.'
mg1865::mg_5::25::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny kapoka hatao amin''izay meloka, sy ny fitondran-doloha ny vadin-drahalahy, ary ny tsy hanaovana varo-dratsy'
  verse_text: 'Raha misy olona manana ady ka mankeo amin''ny fitsarana ary tsarain''ny mpitsara, dia aoka hohamarininy izay marina ary hohelohiny kosa izay meloka.'
mg1865::mg_5::25::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tokony hokapohina ny meloka, dia aoka hampandrin''ny mpitsara izy ka hokapohina eo anatrehany, ary hatao araka ny helony no isan''ny kapoka hatao aminy.'
mg1865::mg_5::25::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny efa-polo no kapoka azo hatao aminy, fa tsy hatao mihoatra; fandrao raha mihoatra noho izany, dia ho toy ny tsinontsinona eo imasonao ny rahalahinao.'
mg1865::mg_5::25::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manakombona ny vavan''ny omby mively vary.'
mg1865::mg_5::25::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mpirahalahy miara-monina, ary maty momba ny anankiray, dia aoka tsy hanambady vahiny any ivelany ny vadin''ny maty; fa ny rahalahin''ny vadiny ihany no aoka hanambady azy ka hitondra loloha azy.'
mg1865::mg_5::25::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lahimatoa izay haterany dia hitondra ny anaran''ilay rahalahy izay efa maty, mba tsy ho faty maso eo amin''ny Isiraely izy.'
mg1865::mg_5::25::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy sitra-dralehilahy ny hitondra loloha ny vadin-drahalahiny, dia aoka hankeo amin''ny vavahady ho eo amin''ny loholona ravehivavy ka hanao hoe: Ny rahalahin''ny vadiko tsy mety mamelo-maso ny rahalahiny, fa tsy mety mitondra loloha ahy.'
mg1865::mg_5::25::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hantsoin''ny loholona amin''ny tanàna ralehilahy ka hadininy; ary raha mikiry izy ka manao hoe: Tsy sitrako ny hanambady azy,'
mg1865::mg_5::25::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanatona azy eo anatrehan''ny loholona ny vadin-drahalahiny ka hanala ny kapa amin''ny tongo-dralehilahy, dia handrora amin''ny tavany ka hiteny hoe: Toy izany no hatao amin''izay olona tsy mety mamelo-maso ny rahalahiny.'
mg1865::mg_5::25::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran-dralehilahy dia hatao eo amin''ny Isiraely hoe: Fianakavian''ilay nalan-kapa.'
mg1865::mg_5::25::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona miady, ary ny vadin''ny anankiray manatona hamonjy ny vadiny amin''ny tanan''izay mamely azy, ary maninjitra ny tanany ka mandray azy an-kasarotana,'
mg1865::mg_5::25::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hotapahinao ny tanany; tsy hiantra azy ny masonao.'
mg1865::mg_5::25::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hisy vato mahery sy reraka ao an-kitaponao.'
mg1865::mg_5::25::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hisy famarana mihoatra sy latsaka ao an-tranonao.'
mg1865::mg_5::25::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vato feno lanja sady marina ary famarana tonga ohatra sady marina no aoka hotananao, mba ho maro andro ianao any amin''ny tany izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::25::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahavetavetana eo imason''i Jehovah Andriamanitrao izay rehetra manao izany zavatra izany, dia izay rehetra manao ny tsy marina.'
mg1865::mg_5::25::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny amin''ny handringanana ny Amalekita'
  verse_text: 'Tsarovy izay nataon''ny Amalekita taminao teny an-dàlana tamin''ny nandehananareo avy tany Egypta,'
mg1865::mg_5::25::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny nitsenany anao teny an-dàlana sy ny namelezany ny vodi-lalanao, dia izay rehetra tsy afaka teo aorianao, raha reraka sy sasatra ianao; fa tsy natahotra an''Andriamanitra izy.'
mg1865::mg_5::25::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa omen''i Jehovah Andriamanitrao fitsaharana amin''ny fahavalonao rehetra manodidina ianao any amin''ny tany izay omen''i Jehovah Andriamanitrao anao ho lovanao, dia hovonoinao ny fahatsiarovana ny Amalekita tsy ho eo ambanin''ny lanitra intsony: aza hadinoinao izany.'
mg1865::mg_5::26::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fisaorana ho fanao raha manatitra ny fahafolon-karena, ary izay tokony hatao aminy'
  verse_text: 'Ary rehefa tonga ao amin''ny tany izay omen''i Jehovah Andriamanitrao ho lovanao ianao ka mandova azy ary monina ao,'
mg1865::mg_5::26::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia analao ny voaloham-bokatra rehetra amin''ny tany, izay alainao avy amin''ny taninao, izay omen''i Jehovah Andriamanitrao anao, ka ataovy an-karona; ary mankanesa ho any amin''ny tany izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany;'
mg1865::mg_5::26::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mankanesa amin''ny mpisorona amin''izany andro izany, ka lazao aminy hoe: Manambara amin''i Jehovah Andriamanitrao aho anio fa tonga eto amin''ny tany izay nianianan''i Jehovah tamin''ny razantsika homeny antsika.'
mg1865::mg_5::26::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia horaisin''ny mpisorona eny an-tananao ny harona ka hapetrany eo anoloan''ny alitaran''i Jehovah Andriamanitrao.'
mg1865::mg_5::26::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny eo anatrehan''i Jehovah Andriamanitrao ianao ka hanao hoe: Syriana mpanjenjena no raiko, ka nidina tany Egypta izy, dia nivahiny tany mbamin''ny olom-bitsy; ary tany izy no tonga firenena lehibe sy mahery sady maro isa.'
mg1865::mg_5::26::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ratsy tamintsika ny Egyptiana ka nampahory antsika sy nampanao antsika fanompoana mafy.'
mg1865::mg_5::26::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah, Andriamanitry ny razantsika, isika, ka nihaino ny feontsika Izy ary nijery ny alahelontsika sy ny asantsika ary ny fahoriantsika;'
mg1865::mg_5::26::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tanana mahery sy sandry nahinjitra sy fampahatahorana lehibe sy famantarana ary fahagagana no nitondran''i Jehovah antsika nivoaka avy tany Egypta,'
mg1865::mg_5::26::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitondra antsika niditra teto amin''ity tany ity Izy ka nanome antsika ity tany ity, dia tany tondra-dronono sy tantely.'
mg1865::mg_5::26::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, Jehovah o, indro, efa nentiko ny voaloham-bokatra amin''ny tany izay nomenao ahy. Dia avelao eo anatrehan''i Jehovah Andriamanitrao ny zavatra, ary mivavaha eo anatrehan''i Jehovah Andriamanitrao.'
mg1865::mg_5::26::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifalia amin''ny soa rehetra izay nomen''i Jehovah Andriamanitrao anao sy ny ankohonanao ianao sy ny Levita mbamin''ny vahiny eo aminao.'
mg1865::mg_5::26::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa voangonao ny fahafolon-karena rehetra avy amin''ny vokatrao amin''ny taona fahatelo, izay taona fanangonana ny fahafolon-karena, dia omeo ny Levita sy ny vahiny sy ny kamboty ary ny mpitondratena izany, mba hohaniny ao an-tanànanao, ka ho voky izy,'
mg1865::mg_5::26::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia lazao eo anatrehan''i Jehovah Andriamanitrao hoe: Efa navoakako avokoa ny zava-masina tao an-tranoko ka nomeko ny Levita sy ny vahiny sy ny kamboty ary ny mpitondratena, araka ny lalànao rehetra izay nandidianao ahy; tsy nandika ny didinao aho na nanadino azy.'
mg1865::mg_5::26::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nisy nohaniko teo amin''ny fisaonako, na nentiko nivoaka teo amin''ny fahalotoako, na nataoko fahan-kanina noho ny maty; fa efa nihaino ny feon''i Jehovah Andriamanitro aho ka nanao araka izay rehetra nandidianao ahy.'
mg1865::mg_5::26::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsinjovy ao amin''ny fonenanao masina any an-danitra, ka tahio ny Isiraely olonao sy ny tany izay nomenao anay araka izay nianiananao tamin''ny razanay, dia tany tondra-dronono sy tantely.'
mg1865::mg_5::26::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Teny farany hampahazoto ny Isiraely hatoky ny fahasoavan''i Jehovah sy mpanaraka Azy'
  verse_text: 'Anio no andidian''i Jehovah Andriamanitrao anao hanaraka ireo didy sy fitsipika ireo; koa tandremo sy araho amin''ny fonao rehetra sy ny fanahinao rehetra ireo.'
mg1865::mg_5::26::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampiteny an''i Jehovah ianao androany fa ho Andriamanitrao Izy, ka handeha amin''ny lalany sy hitandrina ny lalàny sy ny didiny ary ny fitsipiny ianao ary hihaino ny feony.'
mg1865::mg_5::26::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah kosa efa nampiteny anao androany fa firenena rakitra soa ho Azy ianao, araka izay nolazainy taminao, mba hitandremanao ny didiny rehetra,'
mg1865::mg_5::26::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy hanandratany anao ho ambonin''ny firenena rehetra izay nataony, ho fiderana sy ho anarana ary ho voninahitra ary mba ho firenena masina ho an''i Jehovah Andriamanitrao ianao, araka izay nolazainy.'
mg1865::mg_5::27::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hanaovana tsangam-bato hanoratana ny lalàna, sy ny hanaovana ny tso-drano sy ny fanozonana ao an-tendrombohitra Gerizinia sy Ebala'
  verse_text: 'Ary Mosesy sy ny loholon''ny Isiraely dia nandidy ny vahoaka ka nanao hoe: Tandremo ny lalàna rehetra izay andidiako anao anio.'
mg1865::mg_5::27::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro izay hitànareo an''i Jordana ho any amin''ny tany izay omen''i Jehovah Andriamanitrao anao, dia manangona vato lehibe ho anao, ka lalory sokay;'
mg1865::mg_5::27::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia soraty eo aminy ny teny rehetra amin''ity lalàna ity, rehefa tafita ianao mba hiditra ao amin''ny tany izay omen''i Jehovah Andriamanitrao anao, dia tany tondra-dronono sy tantely, araka izay nolazain''i Jehovah, Andriamanitry ny razanao taminao.'
mg1865::mg_5::27::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tafita an''i Jordana ianareo, dia atsangano ao an-tendrombohitra Ebala ireo vato ireo, izay nandidiako anareo andro any ka lalory sokay.'
mg1865::mg_5::27::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manorena alitara ao ho an''i Jehovah Andriamanitrao; vato no hataonao alitara, nefa aza pehim-by izy.'
mg1865::mg_5::27::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vato tsy voapaika no hataonao alitaran''i Jehovah Andriamanitrao; ka manatera fanatitra dorana eo amboniny ho an''i Jehovah Andriamanitrao.'
mg1865::mg_5::27::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manatera koa fanati-pihavanana, ka mihinàna eo sy mifalia eo anatrehan''i Jehovah Andriamanitrao.'
mg1865::mg_5::27::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary soraty amin''ireo vato ireo ny teny rehetra amin''ity lalàna ity, ka ataovy velona tsara ny soratra.'
mg1865::mg_5::27::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny tamin''ny Isiraely rehetra Mosesy sy ireo Levita mpisorona ka nanao hoe: Mangona, ka mihainoa, ry Isiraely o: androany no efa tonga firenen''i Jehovah Andriamanitrao ianao.'
mg1865::mg_5::27::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa henoy ny feon''i Jehovah Andriamanitrao, ary araho ny didiny sy ny lalàny, izay andidiako anao anio.'
mg1865::mg_5::27::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy ny vahoaka tamin''izany andro izany Mosesy ka nanao hoe:'
mg1865::mg_5::27::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireto no hijanona eo an-tendrombohitra Gerizima hitso-drano ny vahoaka, rehefa tafita an''i Jordana ianareo: dia ny Simeona sy ny Levy sy ny Joda sy ny Isakara sy ny Josefa ary ny Benjamina.'
mg1865::mg_5::27::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireto kosa no hijanona eo an-tendrombohitra Ebala hanozona: dia ny Robena sy ny Gada sy ny Asera sy ny Zebolona sy ny Dana ary ny Naftaly.'
mg1865::mg_5::27::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny ny Levita ka hanao amin''ny Isiraely rehetra amin''ny feo mahery hoe:'
mg1865::mg_5::27::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina ny olona izay manao sarin-javatra voasokitra na sarin-javatra an-idina, izay fahavetavetana eo imason''i Jehovah, asan''ny tanan''ny mahay tao-zavatra, ka mametraka azy ao amin''ny takona. Dia hamaly ny vahoaka rehetra ka hanao hoe: Amena.'
mg1865::mg_5::27::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay manao tsinontsinona ny rainy na ny reniny. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mamindra ny faritanin''ny namany. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mampivily lalana ny jamba. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay manao fitsarana miangatra amin''ny vahiny sy ny kamboty ary ny mpitondratena. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mandry amin''ny vadin-drainy, fa mandry amin''izay nandrian-drainy izy. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mandry amin''ny biby. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mandry amin''ny anabaviny, dia ny zanakavavin-drainy, na ny zanakavavin-dreniny. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mandry amin''ny rafozani-vavy. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mamely ny namany ao amin''ny takona. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay mandray kolikoly hahafaty olo-marina. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::27::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 27
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina izay tsy mankatò ny tenin''ity lalàna ity. Ary ny vahoaka rehetra hanao hoe: Amena.'
mg1865::mg_5::28::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny soa izay ho valin''ny fanarahana an''i Jehovah, ary ny loza izay hanjo ny miala aminy kosa'
  verse_text: 'Raha mihaino tsara ny feon''i Jehovah Andriamanitrao ianao ka mitandrina hanaraka ny didiny rehetra, izay andidiako anao anio, dia hasandratr''i Jehovah Andriamanitrao ho ambonin''ny firenena rehetra amin''ny tany ianao;'
mg1865::mg_5::28::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho tonga aminao sy ho azonao izao fitahiana rehetra izao, raha mihaino ny feon''i Jehovah Andriamanitrao ianao'
mg1865::mg_5::28::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina ianao ao an-tanàna, ary hotahina ianao any an-tsaha.'
mg1865::mg_5::28::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina ny ateraky ny kibonao sy ny vokatry ny taninao ary ny ateraky ny biby fiompinao, dia ny ateraky ny ombinao sy ny ateraky ny ondry aman''osinao.'
mg1865::mg_5::28::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina ny haronao sy ny vilia fanaova-mofonao.'
mg1865::mg_5::28::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina ianao, raha miditra; ary hotahina ianao, raha mivoaka.'
mg1865::mg_5::28::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatolotr''i Jehovah ho resy eo anoloanao ny fahavalonao, izay mitsangana hiady aminao, ka lalana iray no hivoahany hanatona anao, fa lalana fito kosa no handosirany hiala eo anoloanao.'
mg1865::mg_5::28::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handidy ny fitahiany ho aminao Jehovah amin''ny fitoeram-barinao sy izay rehetra ataon''ny tananao, ka hitahy anao Izy any amin''ny tany izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::28::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanandratra anao ho firenena masina ho Azy Jehovah, araka izay nianianany taminao, raha mitandrina ny didin''i Jehovah Andriamanitrao ianao ka mandeha amin''ny lalany.'
mg1865::mg_5::28::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho hitan''ny firenena rehetra ambonin''ny tany fa ny anaran''i Jehovah no antsoina aminao, dia hatahotra anao izy.'
mg1865::mg_5::28::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataon''i Jehovah manana amby ampy izay hahasoa anao, dia ny ateraky ny kibonao sy ny ateraky ny biby fiompinao ary ny vokatry ny taninao, any amin''ny tany izay nianianan''i Jehovah tamin''ny razanao homena anao.'
mg1865::mg_5::28::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hovohan''i Jehovah ho anao ny lanitra, tranony fitehirizan-tsoa, handatsahany ranonorana amin''ny taninao amin''ny fotoany sy hitahiany ny asan''ny tananao rehetra. Ary hampisambotra ny firenena maro ianao, fa ianao kosa tsy hisambotra.'
mg1865::mg_5::28::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hataon''i Jehovah ho lohany ianao, fa tsy ho rambony; ary ho ambony tokoa ianao, fa tsy ho ambany, raha mihaino ny didin''i Jehovah Andriamanitrao, izay andidiako anao anio, ka mitandrina sy manaraka azy.'
mg1865::mg_5::28::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza miala amin''ny teny rehetra izay andidiako anao anio, na ho amin''ny ankavanana, na ho amin''ny ankavia, hanaraka andriamani-kafa ka hanompo azy.'
mg1865::mg_5::28::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mihaino ny feon''i Jehovah Andriamanitrao kosa ianao ka tsy mitandrina hanaraka ny didiny rehetra sy ny lalàny, izay andidiako anao anio, dia ho tonga aminao sy hahatratra anao izao fanozonana rehetra izao :'
mg1865::mg_5::28::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina ianao ao an-tanàna, ary hozonina ianao any an-tsaha.'
mg1865::mg_5::28::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina ny haronao sy ny vilia fanaova-mofonao.'
mg1865::mg_5::28::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina ny ateraky ny kibonao sy ny vokatry ny taninao ary ny ateraky ny ombinao sy ny ateraky ny ondry aman''osinao.'
mg1865::mg_5::28::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozonina ianao, raha miditra; ary hozonina ianao, raha mivoaka.'
mg1865::mg_5::28::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampandehanin''i Jehovah aminao ny ozona, dia horohoro sy fampitahorana amin''izay rehetra ataon''ny tananao, mandra-paharinganao sy mandra-pahalaninao faingana noho ny faharatsian''ny nataonao tamin''ny nahafoizanao Ahy.'
mg1865::mg_5::28::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampiraiketin''i Jehovah aminao ny areti-mandringana, mandra-pandaniny anao tsy ho eo amin''ny tany izay efa hidiranao holovana.'
mg1865::mg_5::28::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary areti-mahasahozanina sy tazo mahamay sy fahamaizana sy hafanana mangotraka sy andro mihantona sy vary main''ny rivotra na maty fotsy no hamelezan''i Jehovah anao; dia hanenjika anao ireny mandra-pahalany ritranao.'
mg1865::mg_5::28::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho varahina ny lanitra eo ambonin''ny lohanao, ary ho vy ny tany eo ambaninao.'
mg1865::mg_5::28::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataon''i Jehovah vovoka sy jofo ny ranonorana amin''ny taninao; avy any an-danitra no hidinan''izany aminao mandra-paharinganao.'
mg1865::mg_5::28::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatolotr''i Jehovah ho resy eo anoloan''ny fahavalonao ianao, ka lalana iray no hivoahanao hiady aminy, fa lalana fito kosa no handosiranao hiala eo anoloany; dia ho mpanjenjena any amin''ny fanjakana rehetra ambonin''ny tany ianao.'
mg1865::mg_5::28::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatinao hohanin''ny voro-manidina rehetra sy ny bibi-dia, ka tsy hisy hanaitaitra azy.'
mg1865::mg_5::28::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamelin''i Jehovah anao ny vain''i Egypta sy ny tomboka sy ny hatina ary ny hazaka (izay tsy azom-panafody)'
mg1865::mg_5::28::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hamelin''i Jehovah anao koa ny fahadalana sy ny fahajambana ary ny fahaverezan-kevitra.'
mg1865::mg_5::28::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitsapatsapa ianao na dia amin''ny mitatao-vovonana aza tahaka ny fitsapatsapan''ny jamba ao amin''ny aizim-pito ka tsy ho tonga amin''izay halehanao; dia hampahorin''ny sasany sy hobaboiny mandrakariva ianao, fa tsy hisy hamonjy.'
mg1865::mg_5::28::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifofo vady ianao, fa olon-kafa no handry aminy; hanao trano ianao, fa tsy hitoetra ao; hanao tanim-boaloboka ianao, fa tsy hihinana ny vokatra.'
mg1865::mg_5::28::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ombinao hovonoina eo imasonao, fa tsy hihinana ny henany ianao. Ny borikinao halaina an-keriny eo anatrehanao ka tsy haverina aminao. Ny ondry aman''osinao homena ho an''ny fahavalonao, nefa tsy hanan-kamonjy ianao.'
mg1865::mg_5::28::32:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanakao-lahy sy ny zanakao-vavy homena ho an''ny firenena hafa, ary hijery ny masonao ka ho pahina manontolo andro noho ny alahelonao azy, nefa tsy hahefa na inona na inona ny tananao.'
mg1865::mg_5::28::33:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatry ny taninao sy izay rehetra efa nisasaranao dia hohanin''ny firenena izay tsy fantatrao; any hanaovan''ny sasany an-keriny sy hotorotoroiny mandrakariva ianao.'
mg1865::mg_5::28::34:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho very saina ianao noho ny zavatra izay ho hitan''ny masonao.'
mg1865::mg_5::28::35:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamelin''i Jehovah anao ny vay ratsy, izay tsy azom-panafody, dia amin''ny lohalikao sy ny tongotrao, hatramin''ny faladianao ka hatramin''ny tampon-dohanao.'
mg1865::mg_5::28::36:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho entin''i Jehovah ho any amin''ny firenena izay tsy fantatrao na ny razanao ianao sy ny mpanjakanao, izay hatsanganao hanjaka aminao; ary any no hanompoanao andriamani-kafa, dia vato aman-kazo.'
mg1865::mg_5::28::37:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho figagana sy ohabolana ary ho ambentinteny ianao any amin''ny firenena rehetra izay hitondran''i Jehovah anao.'
mg1865::mg_5::28::38:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voan-javatra betsaka no ho entinao hambolena any an-tsaha, fa kely kosa no hangoninao, satria ho lanin''ny valala ireny.'
mg1865::mg_5::28::39:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao tanim-boaloboka ianao ka hiasa azy, nefa tsy hisotro divay na hioty voaloboka ianao, satria ho lanin''ny fositra ireny.'
mg1865::mg_5::28::40:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanana hazo oliva amin''ny taninao rehetra ianao, nefa tsy hihosotra diloilo; fa hihintsana ny olivanao.'
mg1865::mg_5::28::41:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiteraka zazalahy sy zazavavy ianao, nefa tsy ho anao ireny, fa ho lasan-ko babo.'
mg1865::mg_5::28::42:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hazonao sy ny vokatry ny taninao rehetra dia ho lanin''ny valala.'
mg1865::mg_5::28::43:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahiny eo aminao hisandratra ho ambony dia ambony noho ianao, fa ianao kosa hietry ho ambany dia ambany.'
mg1865::mg_5::28::44:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy hampisambotra anao, fa ianao kosa tsy hampisambotra azy; izy ho lohany, fa ianao ho rambony.'
mg1865::mg_5::28::45:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tonga aminao ireo ozona rehetra ireo ka hanenjika anao sy hahatratra anao mandra-paharinganao, satria tsy nihaino ny feon''i Jehovah Andriamanitrao ianao hitandremanao ny didiny sy ny lalàny, izay nandidiany anao.'
mg1865::mg_5::28::46:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho famantarana sy fahagagana aminao sy ny taranakao mandrakizay izany,'
mg1865::mg_5::28::47:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tsy nanompo an''i Jehovah Andriamanitrao tamin''ny fahafaliana sy ny faharavoam-po ianao noho ny habetsahan''ny zavatra rehetra.'
mg1865::mg_5::28::48:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any amin''ny fahanoanana sy ny hetaheta sy ny fitanjahana ary ny tsy fananana na inona na inona no hanompoanao ny fahavalonao izay hampandehanin''i Jehovah hiady aminao; dia hanisy zioga vy amin''ny vozonao ireny mandra-pandringany anao.'
mg1865::mg_5::28::49:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho entin''i Jehovah hiady aminao izay firenena avy lavitra, dia ny avy amin''ny faran''ny tany -- tahaka ny fanidin''ny voromahery no fihaviny, sady firenena izay tsy ho fantatrao ny fiteniny,'
mg1865::mg_5::28::50:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'firenena masiaka endrika, izay tsy hanaja ny antitra, na hiantra ny tanora --'
mg1865::mg_5::28::51:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hohaniny ny ateraky ny ombinao sy ny vokatry ny taninao mandra-paharinganao; ka tsy hisy havelany ho anao, na vary, na ranom-boaloboka, na diloilo, na ny ateraky ny ombinao, na ny ateraky ny ondry aman''osinao, mandra-pandringany anao.'
mg1865::mg_5::28::52:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hataony fahirano any amin''ny tanànanao rehetra ianao mandra-pandravany ny mandanao avo sy mafy, izay itokianao, eran''ny taninao rehetra; eny, hataony fahirano ianao any amin''ny tanànanao rehetra eran''ny taninao rehetra, izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::28::53:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eo amin''ny fahirano sy ny fanerena, izay haneren''ny fahavalonao anao, dia ny ateraky ny kibonao no hohaninao, dia ny nofon''ny zanakao-lahy sy ny zanakao-vavy, izay omen''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::28::54:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehilahy malemilemy sy mihantahanta indrindra eo aminao dia ho ratsy fijery ny rahalahiny sy ny vadiny andefimandry ary ny zanany sisa,'
mg1865::mg_5::28::55:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy hisy amin''ireo hanomezany ny nofon''ny zanany izay haniny fandrao tsy hisy intsony ho azy amin''ny fahirano sy ny fanerena, izay haneren''ny fahavalonao anao any amin''ny tanànanao rehetra.'
mg1865::mg_5::28::56:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy malemilemy sy mihantahanta eo aminao, izay tsy mbola nanandrana nandia tany noho ny fihantahantany sy ny fahalemilemeny, dia ho ratsy fiteny ny vadiny andefimandry sy ny zananilahy ary ny zananivavy'
mg1865::mg_5::28::57:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny ahitra izay mivoaka avy aminy sy ny zanany vao teraka; fa hihinana izany mangingina izy noho ny tsy fisian-javatra amin''ny fahirano sy ny fanerena, izay haneren''ny fahavalonao anao any amin''ny tanànanao.'
mg1865::mg_5::28::58:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy tandremanao ny hanaraka ny teny rehetra amin''ity lalàna ity, izay voasoratra eto amin''ity boky ity, hatahoranao izao anarana efa nankalazaina sady mahatahotra izao hoe: JEHOVAH ANDRIAMANITRAO,'
mg1865::mg_5::28::59:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hataon''i Jehovah mahagaga ny kapoka hataony aminao sy ny zanakao, dia kapoka mafy sady maharitra ela ary faharariana mafy sady maharitra ela.'
mg1865::mg_5::28::60:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haveriny aminao indray ny aretin''i Egypta rehetra, izay natahoranao ka hiraikitra aminao ireny.'
mg1865::mg_5::28::61:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faharariana rehetra sy ny kapoka rehetra koa, izay tsy voasoratra amin''ny bokin''ity lalàna ity aza, dia ho entin''i Jehovah mamely anao mandra-paharinganao.'
mg1865::mg_5::28::62:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary olona vitsy no ho sisa aminareo hisolo izao fahamaroanareo toy ny kintana eny amin''ny lanitra izao, satria tsy nihaino ny feon''i Jehovah Andriamanitrao ianao.'
mg1865::mg_5::28::63:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izay nifalian''i Jehovah taminareo hahasoa sy hahamaro anareo, dia araka izany kosa no hifalian''i Jehovah handringana sy handrava anareo; dia hofongorana ianareo tsy ho eo amin''ny tany, izay efa hidiranao holovana.'
mg1865::mg_5::28::64:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haelin''i Jehovah any amin''ny firerena rehetra hatramin''ny faran''ny tany ianao; ary any no hanompoanao andriamani-kafa vato aman-kazo, izay tsy fantatrao na ny razanao.'
mg1865::mg_5::28::65:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary any amin''ireo firenena ireo dia tsy hisy hiainanao, na hitsaharan''ny faladianao; fa any no hanomezan''i Jehovah anao fo miemponempona sy maso pahina ary fahakiviam-panahy.'
mg1865::mg_5::28::66:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ainao hihevingevina eo anatrehanao; dia hatahotra andro aman''alina ianao ka tsy hanampo izay ho velona.'
mg1865::mg_5::28::67:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony maraina ny andro dia hanao hoe ianao: Malakia hariva! ary nony hariva ny andro, dia hanao hoe ianao: Malakia maraina! noho ny tahotry ny fonao izay hatahoranao, sy noho ny zavatra izay ho hitan''ny masonao.'
mg1865::mg_5::28::68:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao ho entin''i Jehovah an-tsambo hiverina any Egypta amin''izay lalana efa nolazaiko taminao hoe: Tsy hahita izany intsony ianao; dia hivaro-tena ho andevolahy sy ho andevovavy any amin''ny fahavalonareo ianareo, nefa tsy hisy mpividy.'
mg1865::mg_5::28::69:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 28
  verse_number: 69
  verse_date_revised: null
  verse_title: 'Filazana ny faneken''i Jehovah tamin''ny Isiraely, sy fananarana azy, andrao misy mandika izany fanekena izany.'
  verse_text: 'IZAO no tenin''ny fanekena izay nandidian''i Jehovah an''i Mosesy hatao amin''ny Zanak''Isiraely tany amin''ny tany Moaba, afa-tsy ilay fanekena nataony taminy tao Horeba.'
mg1865::mg_5::29::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso ny Isiraely rehetra Mosesy ka nanao taminy hoe: Ianareo efa nahita izay rehetra nataon''i Jehovah teo imasonareo tany amin''ny tany Egypta tamin''i Farao sy ny mpanompony rehetra ary ny taniny rehetra,'
mg1865::mg_5::29::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny fizahan-toetra lehibe, izay efa hitan''ny masonao, dia ireny famantarana sy fahagagana lehibe ireny.'
mg1865::mg_5::29::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nomen''i Jehovah fo hahalala sy maso hahita ary sofina handre ianareo mandraka androany.'
mg1865::mg_5::29::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra anareo tany an''efitra efa-polo taona aho; tsy rovitra teny aminareo ny fitafianareo, ary tsy rovitra teo amin''ny tongotrao ny kapanao.'
mg1865::mg_5::29::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mofo no fihinanareo, ary tsy divay na toaka no fisotronareo, mba ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.'
mg1865::mg_5::29::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tamin''ity tany ity ianareo, dia nivoaka Sihona, mpanjakan''i Hesbona, sy Oga, mpanjakan''i Basana, hiady amintsika, dia resintsika izy roa lahy.'
mg1865::mg_5::29::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalaintsika ny taniny ka nomentsika ho zara-tanin''ny Robenita sy ny Gadita ary ny antsasaky ny firenen''i Manase.'
mg1865::mg_5::29::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tandremo ny tenin''izao fanekena izao, ka araho, mba hambinina ianareo amin''izay rehetra ataonareo.'
mg1865::mg_5::29::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo rehetra miseho eto anatrehan''i Jehovah Andriamanitrareo anio, dia ny lehibenareo sy ny firenenareo, ny lohan''ny firenenareo sy ny mpifehy anareo ary ny lehilahy rehetra amin''ny Isiraely,'
mg1865::mg_5::29::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny zanakareo madinika koa sy ny vadinareo ary ny vahiny eo amin''ny tobinareo mbamin''ny mpikapa hazonao sy ny mpantsaka ranonao'
mg1865::mg_5::29::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'hidiranao amin''ny faneken''i Jehovah Andriamanitrao sy ny fianianana, izay ataon''i Jehovah Andriamanitrao aminao anio,'
mg1865::mg_5::29::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'hanandratany anao ho fireneny, ary mba ho Andriamanitrao Izy, araka izay nolazainy taminao sy araka izay nianianany tamin''ny razanao, dia Abrahama sy Isaka ary Jakoba.'
mg1865::mg_5::29::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy aminareo ihany no anaovako izao fanekena sy fianianana izao,'
mg1865::mg_5::29::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''izay eto amintsika anio eto anatrehan''i Jehovah Andriamanitsika sy amin''izay tsy eto amintsika anio koa;'
mg1865::mg_5::29::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatrareo izay nitoerantsika tany amin''ny tany Egypta sy izay nandehanantsika namaky ny tanin''ny jentilisa;'
mg1865::mg_5::29::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa hitanareo ny fahavetavetany sy ny sampiny hazo sy vato sy volafotsy ary volamena, izay teo aminy;'
mg1865::mg_5::29::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao hisy lehilahy, na vehivavy, na mpianakavy, na firenena eto aminareo, izay manana fo mivily anio, ka miala amin''i Jehovah Andriamanitsika, handehanany hanompo ny andriamanitr''ireny firenena ireny; fandrao hisy faka eo aminareo izay miteraka zava-mangidy sady mahafaty;'
mg1865::mg_5::29::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha ren''izany olona izany ny tenin''ity fanozonana ity, dia hiarahaba tena ao am-pony izy ka hanao hoe: Hanam-piadanana aho, fa hanaraka ny ditry ny foko, handringanana ny leony mbamin''ny mangetaheta.'
mg1865::mg_5::29::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah dia tsy hety hamela ny helony, fa hanetroka amin''izany lehilahy izany ny fahatezeran''i Jehovah sy ny fahasaro-piarony, ary hitoetra aminy ny fanozonana rehetra izay voasoratra amin''ity boky ity, ka hovonoin''i Jehovah tsy ho eo ambanin''ny lanitra ny anarany.'
mg1865::mg_5::29::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hosarahin''i Jehovah amin''ny firenen''Isiraely rehetra ho amin''ny loza izy, araka ny fanozonana rehetra amin''ny fanekena izay voasoratra amin''ity bokin''ny lalàna ity.'
mg1865::mg_5::29::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiteny ny taranaka any aoriana, dia ny zanakareo izay hitsangana handimby anareo, sy ny vahiny avy amin''ny tany lavitra, raha mahita ny kapoka natao tamin''ity tany ity sy ny faharariana izay nampahararian''i Jehovah azy --'
mg1865::mg_5::29::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ho solifara sy sira ary fahamaizana ny tany rehetra eo: tsy hofafazana izy, na hanirian-javatra, sady tsy hisy ahitra akory hitrebona ao, tahaka ny nandravana an''i Sodoma sy Gomora sy Adma ary Zeboima, izay noravan''i Jehovah tamin''ny fahavinirany sy ny fahatezerany --'
mg1865::mg_5::29::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hiteny ny firenena rehetra hoe: Nahoana Jehovah no dia nanao toy izany tamin''ity tany ity? Inona no hevitry ny firehetan''izao fahatezerana lehibe izao?'
mg1865::mg_5::29::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny ny vahoaka ka hanao hoe: Satria izy nahafoy ny faneken''i Jehovah, Andriamanitry ny razany, izay nataony taminy fony Izy nitondra azy nivoaka avy tany amin''ny tany Egypta.'
mg1865::mg_5::29::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nandeha izy ka nanompo andriamani-kafa sady niankohoka teo anatrehany, dia andriamanitra izay tsy fantany sady tsy nomena azy;'
mg1865::mg_5::29::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nirehitra tamin''ity tany ity ny fahatezeran''i Jehovah, ka nataony tonga taminy avokoa ny fanozonana rehetra izay voasoratra eto amin''ity boky ity;'
mg1865::mg_5::29::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary fahavinirana sy fahatezerana ary fahatezerana mirehitra no nandroahan''i Jehovah azy tsy ho eo amin''ny taniny sy nampandehanany azy ho any amin''ny tany hafa, tahaka ny amin''izao anio izao.'
mg1865::mg_5::29::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 29
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''i Jehovah Andriamanitsika ny zava-miafina; fa antsika sy ny zanatsika mandrakizay kosa ny zavatra ambara, hankatoavantsika ny teny rehetra amin''ity lalàna ity.'
mg1865::mg_5::30::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga aminao izany zavatra rehetra izany, dia ny fitahiana sy ny fanozonana izay nataoko teo anoloanao, ary mahatsiaro izany ao am-ponao any amin''ny firenena rehetra izay androahan''i Jehovah Andriamanitrao anao ianao,'
mg1865::mg_5::30::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka miverina amin''i Jehovah Andriamanitrao sy mihaino ny feony amin''ny fonao rehetra sy ny fanahinao rehetra, araka izay rehetra andidiako anao sy ny zanakao anio,'
mg1865::mg_5::30::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hampodin''i Jehovah Andriamanitrao avy amin''ny fahababoanao ianao, ary hamindra fo aminao Izy ka hanangona anao indray avy any amin''ny firenena rehetra izay nampielezan''i Jehovah Andriamanitrao anao.'
mg1865::mg_5::30::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy aminao voaroaka any amin''ny faravodilanitra, dia avy any no hanangonan''i Jehovah Andriamanitrao anao, ary avy any indray no hanalany anao.'
mg1865::mg_5::30::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampidirin''i Jehovah Andriamanitrao ao amin''ny tany izay nolovan''ny razanao ianao, ka holovanao izany; ary hanisy soa anao Izy sy hahamaro anao mihoatra noho ny razanao.'
mg1865::mg_5::30::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoforan''i Jehovah Andriamanitrao ny fonao sy ny fon''ny taranakao hitiavanao an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra, mba ho velona ianao.'
mg1865::mg_5::30::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataon''i Jehovah Andriamanitrao amin''ny fahavalonao sy ny mankahala anao izay nanenjika anao ireny fanozonana rehetra ireny.'
mg1865::mg_5::30::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hihaino ny feon''i Jehovah indray ianao ka hanaraka ny didiny rehetra, izay andidiako anao anio.'
mg1865::mg_5::30::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataon''i Jehovah Andriamanitrao manana amby ampy ianao amin''izay hahasoa anao, dia amin''ny asan''ny tananao sy ny ateraky ny kibonao sy ny ateraky ny biby fiompinao ary ny vokatry ny taninao; fa ho faly aminao indray Jehovah ka hahasoa anao, araka izay nahafaliany tamin''ny razanao,'
mg1865::mg_5::30::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mihaino ny feon''i Jehovah Andriamanitrao ianao, hitandremanao ny didiny sy ny lalàny, izay voasoratra amin''ity bokin''ny lalàna ity, ka miverina amin''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra.'
mg1865::mg_5::30::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao lalàna izao, izay andidiako anao anio, tsy dia saro-pantarina aminao, ary tsy lavitra.'
mg1865::mg_5::30::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy any an-danitra izany ka hanaovanao hoe: Iza no hiakatra any an-danitra haka azy ho antsika, mba hohenointsika ka harahintsika?'
mg1865::mg_5::30::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy any an-dafin''ny ranomasina izany ka hanaovanao hoe: Iza no hankany an-dafin''ny ranomasina haka azy ho antsika mba hohenointsika ka harahintsika?'
mg1865::mg_5::30::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa eo akaikinao indrindra ny teny, dia eo am-bavanao sy ao am-ponao, mba harahinao.'
mg1865::mg_5::30::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro efa nataoko teo anoloanao androany ny fiainana sy ny soa ary ny fahafatesana sy ny loza,'
mg1865::mg_5::30::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny nandidiako anao androany ho tia an''i Jehovah Andriamanitrao ka handeha amin''ny lalany ary hitandrina ny didiny sy ny lalàny ary ny fitsipiny, mba ho velona ianao ka hihamaro, ary mba hitahian''i Jehovah Andriamanitrao anao any amin''ny tany izay efa hidiranao holovana.'
mg1865::mg_5::30::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mivily kosa ny fonao, ka tsy mihaino ianao, fa voataona hiankokoha eo anatrehan''izay andriamani-kafa sy hanompo azy,'
mg1865::mg_5::30::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia lazaiko aminareo anio fa ho ringana tokoa ianareo, ary tsy ho maro andro eo amin''ny tany izay efa hidiranao holovana, rehefa tafita an''i Jordana ianareo.'
mg1865::mg_5::30::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantso ny lanitra sy ny tany aho anio ho vavolombelona aminareo fa efa nataoko teo anoloanao ny fiainana sy ny fahafatesana ary ny fitahiana sy ny fanozonana; koa mifidiana ny fiainana, mba ho velona ianao sy ny taranakao,'
mg1865::mg_5::30::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny ho tia an''i Jehovah Andriamanitrao ianao ka hihaino ny feony sy hifikitra aminy; fa izany no fiainanao sy fahamaroan''ny andronao, mba honenanao eo amin''ny tany izay nianianan''i Jehovah tamin''i Abrahama sy Isaka ary Jakoba razanao, homena azy.'
mg1865::mg_5::31::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra farany nataon''i Mosesy tamin''ny Isiraely sy Josoa, ary ny fanaperany ny lalàna'
  verse_text: 'Ary Mosesy nandeha, dia nilaza izao teny izao tamin''ny Isiraely rehetra'
mg1865::mg_5::31::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Efa roa-polo amby zato taona androany aho ka tsy afa-mivoaka sy miditra intsony, ary Jehovah efa nilaza tamiko hoe: Tsy hita io Jordana io ianao.'
mg1865::mg_5::31::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitrao no hita eo alohanao, ary Izy no handringana ireo firenena ireo tsy ho eo anoloanao, ka hahazo ny taniny ianao; ary Josoa no hita eo alohanao, araka izay efa nolazain''i Jehovah.'
mg1865::mg_5::31::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hanao amin''ireo tahaka ny nataony tamin''i Sihona sy Oga, mpanjakan''ny Amorita, izay naringany, sy tahaka ny nataony tamin''ny taniny.'
mg1865::mg_5::31::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatolotr''i Jehovah eo anoloanareo ireo hanaovanareo azy araka ny lalàna rehetra izay nandidiako anareo.'
mg1865::mg_5::31::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahereza sy matanjaha; aza matahotra na manahy azy; fa Jehovah Andriamanitrao no miara-mandeha aminao; tsy handao anao na hahafoy anao Izy.'
mg1865::mg_5::31::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy niantso an''i Josoa ka niteny taminy teo imason''ny Isiraely rehetra hoe: Mahereza sy matanjaha; fa ianao sy ity firenena ity dia hiara-miditra ao amin''ny tany izay nianianan''i Jehovah tamin''ny razany homena azy; ary ianao no hampandova azy izany.'
mg1865::mg_5::31::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah no mandeha eo alohanao; ary Izy no hiaraka aminao; tsy handao anao na hahafoy anao Izy; koa aza matahotra na mivadi-po ianao.'
mg1865::mg_5::31::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosoratan''i Mosesy izany lalàna izany ka natolony ireo mpisorona, taranak''i Levy, izay mpitondra ny fiaran''ny faneken''i Jehovah, sy ny loholon''ny Isiraely rehetra.'
mg1865::mg_5::31::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandidy azy Mosesy ka nanao hoe: Isam-pito taona, dia amin''ny taom-panafahana, amin''ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo,'
mg1865::mg_5::31::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka avy hiseho eo anatrehan''i Jehovah Andriamanitrao eo amin''ny tany izay hofidiny ny Isiraely rehetra, dia aoka hovakinao eo anatrehan''ny Isiraely rehetra ny tenin''ity lalàna ity hihainoany azy.'
mg1865::mg_5::31::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vorio ny vahoaka rehetra, na lehilahy, na vehivavy, na ankizy madinika, na ny vahiny ao an-tanànanao, hihainoany sy hianarany ka hatahorany an''i Jehovah Andriamanitrao sy hitandremany hanaraka ny teny rehetra amin''ity lalàna ity.'
mg1865::mg_5::31::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanany koa, izay tsy nahalala, dia handre ka hianatra hatahotra an''i Jehovah Andriamanitrareo amin''ny andro rehetra hiainanareo eo amin''ny tany, izay efa hidiranareo holovana, rehefa tafita an''i Jordana ianareo.'
mg1865::mg_5::31::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Mosesy: Indro, antomotra ny andro hahafatesanao; koa miantsoa an''i Josoa, ary mitoera ao amin''ny trano-lay fihaonana ianareo mba handidiako azy. Dia nandeha Mosesy sy Josoa ka nitoetra tao amin''ny trano-lay fihaonana.'
mg1865::mg_5::31::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niseho teo amin''ny trano-lay tamin''ny andri-rahona; dia nijanona teo anoloan''ny varavaran''ny trano-lay ny andri-rahona.'
mg1865::mg_5::31::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Mosesy: Indro fa hodi-mandry any amin''ny razanao ianao; ary hitsangana ity firenena ity ka hijangajanga hanaraka ny andriamani-kafa any amin''ny tany izay efa hidirany honenana, dia hahafoy Ahy izy ka hivadika ny fanekeko izay nataoko taminy.'
mg1865::mg_5::31::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hirehitra aminy ny fahatezerako amin''izany andro izany, ka hahafoy azy Aho ary hanafina ny tavako aminy, ka ho lany ritra izy, ary loza maro sy fahoriana no hanjo azy; dia hiteny izy amin''izany andro izany ka hanao hoe: Moa tsy ny tsy itoeran''Andriamanitro eto amiko va no mahatonga izao fahoriana izao amiko?'
mg1865::mg_5::31::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho dia hanafina ny tavako tokoa amin''izany andro izany noho ny ratsy rehetra izay nataony, fa nivily nanaraka andriamani-kafa izy.'
mg1865::mg_5::31::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny soraty ho anareo izao fihirana izao, ka ampianaro ny Zanak''Isiraely, ary aoka tsy ho afaka am-bavany izao fihirana izao mba ho vavolombelona amin''ny Zanak''Isiraely.'
mg1865::mg_5::31::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa entiko any amin''ny tany tondra-dronono sy tantely, izay nianianako tamin''ny razany homena azy izy, ary hihinana ka ho voky sy hihamatavy, dia hivily hanaraka andriamani-kafa izy ka hanompo azy, ary handà Ahy ka hivadika ny fanekeko.'
mg1865::mg_5::31::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manjo azy ny zava-dratsy maro sy ny fahoriana, dia ho vavolombelona aminy izao fihirana izao, fa tsy ho afaka am-bavan''ny taranany izao, fa fantatro ny fisainany izay efa hataony, na dia ankehitriny aza, raha tsy mbola nentiko any amin''ny tany izay nianianako homena azy izy.'
mg1865::mg_5::31::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosoratan''i Mosesy androtrizay ihany izao fihirana izao ka nampianariny ny Zanak''Isiraely.'
mg1865::mg_5::31::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandidy an''i Josoa, zanak''i Nona, ka nanao hoe: Mahereza sy matanjaha; fa ianao no hitondra ny Zanak''Isiraely hiditra ao amin''ny tany izay nianianako taminy homena azy, ary homba anao Aho.'
mg1865::mg_5::31::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voasoratr''i Mosesy teo amin''ny boky avokoa ny tenin''ity lalàna ity,'
mg1865::mg_5::31::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nandidy ny Levita, izay mpitondra ny fiaran''ny faneken''i Jehovah, izy ka nanao hoe:'
mg1865::mg_5::31::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raiso ity bokin''ny lalàna ity, ka apetraho eo anilan''ny fiaran''ny faneken''i Jehovah Andriamanitrareo mba ho vavolombelona aminao.'
mg1865::mg_5::31::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho mahalala ny ditranao sy ny hamafi-hatokao; indro, na dia mbola velona eto aminareo ankehitriny aza aho, dia miodina amin''i Jehovah ianareo, ka mainka fa rehefa maty aho.'
mg1865::mg_5::31::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vorio ho eto amiko ny loholona rehetra amin''ny firenenareo sy ny mpifehy anareo, mba holazaiko eo anatrehany izao teny izao; ary hiantso ny lanitra sy ny tany ho vavolombelona aminy aho.'
mg1865::mg_5::31::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro fa rehefa maty aho, dia hanao ratsy tokoa ianareo ka hiala amin''ny lalana izay nasaiko nalehanareo; dia ho tratry ny loza ianareo any am-parany, satria hanao izay ratsy eo imason''i Jehovah ianareo ka hampahatezitra Azy amin''ny asan''ny tananareo.'
mg1865::mg_5::31::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 31
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazain''i Mosesy teo anatrehan''ny fiangonana, dia ny Isiraely rehetra, ny tenin''izao fihirana izao mandra-pahavitany.'
mg1865::mg_5::32::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fihirana nataon''i Mosesy'
  verse_text: 'MIHAINOA, ry lanitra, fa hiteny aho! Ary mandrenesa, ry tany, ny tenin''ny vavako!'
mg1865::mg_5::32::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho avy tahaka ny ranonorana ny fampianarako, Ary hilatsaka tahaka ny ando ny teniko, Sy tahaka ny erika amin''ny ahi-maitso Ary ny ranonorana amin''ny anana.'
mg1865::mg_5::32::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny anaran''i Jehovah no hotoriko; Maneke ny fahalehibiazan''Andriamanitsika.'
mg1865::mg_5::32::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny Vatolampy, tanteraka ny asany; Fa ny lalany rehetra dia amin''ny rariny avokoa. Andriamanitra mahatoky Izy, ka tsy misy ratsy ao aminy; Marina sy mahitsy Izy.'
mg1865::mg_5::32::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nasian-dratsy Izy; Tsy zanany ireny, tsininy izany; Taranaka miolakolaka sady efa nivadika izy.'
mg1865::mg_5::32::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa Jehovah hovalianareo toy izany va, Ry firenena adala ka tsy hendry? Tsy Izy va no Rainao, Izay nanavotra anao? Tsy Izy va no nanao anao sy nanorina anao?'
mg1865::mg_5::32::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny andro fahiny, Saino ny taona hatrizay hatrizay; Anontanio amin-drainao, fa hanambara aminao izy, Sy amin''ny anti-panahy eo aminao, fa hilaza aminao izy;'
mg1865::mg_5::32::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony nomen''ny Avo Indrindra zara-tany ny jentilisa, Ka samy natokantokany ny zanak''olombelona, Dia notendreny ny faritanin''ireo firenena Araka ny isan''ny Zanak''Isiraely.'
mg1865::mg_5::32::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa anjaran''i Jehovah ny olony: Jakoba no natokany ho lovany.'
mg1865::mg_5::32::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahita azy tany an''efitra Izy, Dia tany amin''ny tany foana be nampierona, Ka dia nanodidina sy niahy azy Ary notandremany tahaka ny anakandriamasony.'
mg1865::mg_5::32::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny voromahery manaitra ny ao amin''ny akaniny Ka manidintsidina eo ambonin''ny zanany, Dia toy izany no namelarany ny elany sy nandraisany azy Ary nitondrany azy teo ambonin''ny elany,'
mg1865::mg_5::32::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah irery no nitondra azy, Ary tsy nisy andriamani-kafa teo aminy.'
mg1865::mg_5::32::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampandeha azy teny ambonin''ny havoana amin''ny tany Izy, Ka nohaniny ny vokatry ny saha. Nampitsentsitra azy tantely avy teo amin''ny vatolampy Izy Sy diloilo avy teo amin''ny vatolampy afovato'
mg1865::mg_5::32::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy rononomandrin''omby sy rononon''ondry aman''osy Mbamin''ny tavin''ny zanak''ondry Sy ondrilahin''i Basana sy osilahy Ary vary izay vokatra indrindra; Ary nisotro divay mahery avy tamin''ny ran''ny voaloboka ianao.'
mg1865::mg_5::32::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihanatavy Jesorona ka namely daka, Efa matavy ianao sady vory nofo no vaventibe, Dia nahafoy an''Andriamanitra Izay nanao azy izy, Ary nanamavo ny Vatolampy famonjena azy.'
mg1865::mg_5::32::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampahasaro-piaro Azy tamin''ny hafa Izy; Ary tamin''ny zava-betaveta no nampahasosorany Azy;'
mg1865::mg_5::32::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namono zavatra ho fanatitra ho an''ny demonia izay tsy Andriamanitra izy, Dia andriamanitra tsy fantany, Fa andriamanitra vao niseho, Izay tsy natahoran''ny razanareo.'
mg1865::mg_5::32::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Vatolampy Izay niteraka anao dia tsy tsaroanao, Ary hadinoinao Andriamanitra Izay nahary anao.'
mg1865::mg_5::32::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nahita izany ka nandà Noho ny fahasosorany tamin''ny zananilahy sy ny zananivavy.'
mg1865::mg_5::32::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Hafeniko azy ny tavako; Ho hitako izay hiafarany; Fa firenena tena mpivadibadika izy, Dia zaza tsy mahatoky.'
mg1865::mg_5::32::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy efa nampahasaro-piaro Ahy tamin''izay tsy Andriamanitra Sy nampahasosotra Ahy tamin''ny zava-poanany; Ary Izaho kosa hampahasaro-piaro azy amin''izay tsy olona, Sy hampahasosotra azy amin''izay firenena adala.'
mg1865::mg_5::32::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa arehitra ny afon''ny fahatezerako, Ka mandoro hatrany amin''ny fiainan-tsy hita any ambany indrindra, Sady mandevona ny tany mbamin''ny vokatra ao aminy Ary mampirehitra ny fanambanin''ny tendrombohitra aza.'
mg1865::mg_5::32::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Havangongoko aminy ny loza betsaka; Ary holaniko aminy ny zana-tsipikako:'
mg1865::mg_5::32::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hofezahin''ny mosary izy sady holanin''ny areti-mandripaka Sy ny fandringanana mangidy; Ary nifim-biby no hampandehaniko aminy Jesorona dia anaran''ny Isiraely. Mbamin''ny poizin''ny biby mpikisaka amin''ny vovoka.'
mg1865::mg_5::32::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny ivelany dia ny sabatra no hahafaty ny zanany, Ary ao amin''ny efi-trano dia ny fampahatahorana Na ny zatovolahy na ny zatovovavy, Na ny zaza minono na ny fotsy volo.'
mg1865::mg_5::32::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nolazaiko hoe: Hotsofiko hihahaka izy; Hatsahatro ny fahatsiarovana azy tsy ho eo amin''ny zanak''olombelona,'
mg1865::mg_5::32::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy ny fireharehan''ny fahavalo no natahorako, Andrao diso hevitra ireny mpandrafy azy ireny Ka hanao hoe: Ny tananay no avo; Fa tsy Jehovah tsy akory no nanao izany rehetra izany.'
mg1865::mg_5::32::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa firenena tsy manan-tsaina izy Sady tsy manam-pahalalana.'
mg1865::mg_5::32::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hendry izy mba hahalala izao Ka hahafantatra izay ho farany.'
mg1865::mg_5::32::30:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataon''ny irery ahoana no fanenjika ny arivo, Ary hataon''ny roa lahy ahoana no fampandositra ny iray alina, Raha tsy ny Vatolampiny no efa nivarotra azy, Ary Jehovah no efa nanolotra azy?'
mg1865::mg_5::32::31:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba mitovy amin''ny Vatolampintsika ny vatolampin''ireny, Na dia izy fahavalontsika aza no hitsara.'
mg1865::mg_5::32::32:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tahom-boalobony dia tahom-boalobok''i Sodoma Ary avy ao amin''ny sahan''i Gomora; Ny voalobony dia voaloboka mahafaty, Sady mangidy koa ny sampahony.'
mg1865::mg_5::32::33:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny divainy dia zava-mahafaty avy amin''ny dragona, Ary poizina loza avy amin''ny bibilava.'
mg1865::mg_5::32::34:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy voatahiry ato amiko va izany Ka voaisy kase ato an-trano firaketako?'
mg1865::mg_5::32::35:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahy ny famaliana sy ny fampanodiavana, Raha avy izay hahasolafaka ny tongony; Fa antomotra ny andro hahitany loza, Ary ho avy faingana ny zava-boatendry hanjo azy.'
mg1865::mg_5::32::36:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah hanome rariny ny olony Ary hanenina ny amin''ny mpanompony, Raha hitany fa lany ny heriny, Ka lasa avokoa na ny voahazona, na ny afaka.'
mg1865::mg_5::32::37:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiteny hoe Izy: Aiza ireo andriamaniny, Dia ny vatolampy izay nialofany,'
mg1865::mg_5::32::38:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nihinana ny saboran''ny fanatiny Ary nisotro ny divain''ny fanatitra aidiny? Aoka ireny no hitsangana ka hamonjy anareo Ary ho fierena ho anareo.'
mg1865::mg_5::32::39:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantaro ankehitriny fa Izaho dia Izaho no Izy, Ka tsy misy andriamanitra eto amiko. Izaho no mahafaty sy mahavelona, Ary Izaho no maharatra sy mahasitrana, Ka tsy misy mahafaka amin''ny tanako.'
mg1865::mg_5::32::40:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manangana ny tanako amin''ny lanitra Aho Ka manao hoe: Raha velona koa Aho mandrakizay:'
mg1865::mg_5::32::41:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manasa ny sabatro manelatselatra Aho, Ka voarain''ny tanako ny fitsarana, Dia hampanodiaviko ny mpandrafy Ahy ny ataony, Ary hovaliako ny mankahala Ahy.'
mg1865::mg_5::32::42:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko mamon-drà ny zana-tsipikako, Ary ny sabatro hihina-nofo, Dia ny ran''ny voavono sy ny babo Mbamin''ny lohan''izay lehibe amin''ny fahavalo.'
mg1865::mg_5::32::43:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihobia, ry jentilisa mbamin''ny olony; Fa ny ran''ny mpanompony no hovaliany. Hamaly ny mpandrafy Azy Izy, Ary hanao fanavotana kosa ho an''ny taniny sy ny olony.'
mg1865::mg_5::32::44:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Mosesy ka nilaza ny teny rehetra amin''izany fihirana izany teo anatrehan''ny olona, dia izy sy Hosea, zanak''i Nona.'
mg1865::mg_5::32::45:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa tapitra voalazan''i Mosesy tamin''ny Isiraely rehetra izany teny rehetra izany,'
mg1865::mg_5::32::46:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo hotandremany sy hankatoaviny, dia ny teny rehetra amin''ity lalàna ity.'
mg1865::mg_5::32::47:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy zava-poana ho anareo izany, fa izany no fiainanareo; ary izany zavatra izany no hahamaro andro anareo eo amin''ny tany izay efa hidiranareo holovana, rehefa tafita an''i Jordana ianareo.'
mg1865::mg_5::32::48:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niteny tamin''i Mosesy androtrizay indrindra ka nanao hoe:'
mg1865::mg_5::32::49:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara amin''ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin''ny tany Moaba tandrifin''i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak''Isiraely ho lovany.'
mg1865::mg_5::32::50:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka ho faty ao amin''ny tendrombohitra izay iakaranao ianao, ka ho voangona any amin''ny razanao, tahaka ny nahafatesan''i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy any amin''ny razany,'
mg1865::mg_5::32::51:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria nivadika tamiko teo amin''ny Zanak''Isiraely ianareo tao amin''ny ranon''i Meriba any Kadesy, tany an''efitra Zina; fa tsy nahamasina Ahy teo amin''ny Zanak''Isiraely ianareo.'
mg1865::mg_5::32::52:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 32
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hahatazana ny tany eo anoloanao ihany ianao, kanefa tsy hiditra any amin''ny tany izay omeko ny Zanak''Isiraely.'
mg1865::mg_5::33::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tso-drano nataon''i Mosesy tamin''ny firenen''Isiraely'
  verse_text: 'Ary izao no tso-drano nataon''i Mosesy, lehilahin''Andriamanitra, tamin''ny Zanak''Isiraely, rehefa nadiva ho faty izy.'
mg1865::mg_5::33::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy: Jehovah avy tao Sinay, Ary niseho taminy avy tany Seàra; Niposaka namirapiratra avy tany an-tendrombohitra Parana Izy; Ary avy tao amin''ny masiny tsy omby alinalina; Ary teo ankavanany nisy lalàn''afo ho an''ireo.'
mg1865::mg_5::33::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tia ireo firenena Izy; Eo an-tananao avokoa ny masiny rehetra; Miandry eo anilan''ny tongotrao ireo Ka samy mandray amin''ny teninao.'
mg1865::mg_5::33::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lalàna no nandidian''i Mosesy antsika Ho lovan''ny fiangonan''i Jakoba.'
mg1865::mg_5::33::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga mpanjakan''i Jesorona Izy, Rehefa tafangona ny lehiben''ny vahoaka Sy ny firenen''Isiraely rehetra.'
mg1865::mg_5::33::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho velona ROBENA, fa tsy ho faty, Nefa aoka ho vitsy olona izy.'
mg1865::mg_5::33::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i JODA dia izao, hoy izy: Jehovah o, mihainoa ny feon''i Joda, Ka ento ho amin''ny olony izy. Ny tanany no hiadiany ho azy*, Ka manampia azy Ianao hamelezany ny mpandrafy azy. [*Na: Aoka ho ampy azy ny tànany]'
mg1865::mg_5::33::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i LEVY dia hoy izy: Ny Tomimanao sy ny Orimanao dia amin''ny olonao masina. Izay nizahanao toetra tao Masa Sy nifamalianao tao amin''ny ranon''i Meriba,'
mg1865::mg_5::33::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nilaza ny rainy sy ny reniny hoe: Tsy mahita azy aho, Sady tsy nahalala izay rahalahiny izy, Ary izay zanany aza dia tsy fantany; Fa nitandrina ny teninao izy Ka nitana ny fanekenao.'
mg1865::mg_5::33::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jakoba no hampianariny ny fitsipikao, Ary Isiraely ny lalànao; Hametraka ditin-kazo manitra eo anatrehanao* izy Sy fanatitra dorana eo ambonin''ny alitaranao. [*Na: hitoetra eo anelanelan''ny sorony]'
mg1865::mg_5::33::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tahio ny heriny, Ary aoka ho sitrakao ny asan''ny tanany; Asio mafy ny valahan''izay mitsangana hiady aminy, Ka aoka tsy hiarina intsony izay mankahala azy.'
mg1865::mg_5::33::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i BENJAMINA dia hoy izy: Ny malalan''i Jehovah honina fahizay eo aminy, Dia halofany mandrakariva, Ary hobabeny eo an-damosiny.'
mg1865::mg_5::33::13:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i JOSEFA dia hoy izy: Hotahin''i Jehovah anie ny taniny Amin''ny zava-tsoan''ny lanitra, dia amin''ny ando, Ary amin''ny rano lalina mamitsaka any ambany,'
mg1865::mg_5::33::14:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny zava-tsoa vokatry ny masoandro Sy ny voan-javatra soa vokatry ny volana,'
mg1865::mg_5::33::15:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny zava-malaza avy amin''ny tendrombohitra fahagola Sy ny zava-tsoa avy amin''ny havoana mandrakizay'
mg1865::mg_5::33::16:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbamin''ny zava-tsoan''ny tany sy izay rehetra eo aminy Sy ny fankasitrahan''Izay nitoetra tao amin''ilay roimemy; Ary aoka ho tonga eo an-dohan''i Josefa izany, Dia eo an-tampon-dohan''ilay nalaza tamin''ny rahalahiny.'
mg1865::mg_5::33::17:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voalohan-teraky ny ombiny dia malaza, Tandrok''ombimanga ny tandrony; Izany no hanotoany ny firenena rehetra, Dia ny faran''ny tany; Ireo no alinalin''i Efraima Sy arivoarivon''i Manase.'
mg1865::mg_5::33::18:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i ZEBOLONA dia hoy izy: Mifalia, ry Zebolona, amin''izay alehanao, Ary ianao, ry ISAKARA, ao an-dainao.'
mg1865::mg_5::33::19:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Firenena no antsoiny hankao an-tendrombohitra, Ary ao no hamonoany zavatra ho fanati-pahamarinana; Fa hitsentsitra ny haren''ny ranomasina izy Sy ny zava-tsoa miafina ao amin''ny fasika.'
mg1865::mg_5::33::20:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i GADA dia hoy Izy; Isaorana anie Izay manome malalaka ho an''i Gada; Mamitsaka tahaka ny liom-bavy izy Ka mamiravira ny sandry mbamin''ny tampon-doha.'
mg1865::mg_5::33::21:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nizaha izay tsara indrindra ho an''ny tenany izy, Fa teo ny anaran''ny mpanao lalàna no efa voatokana. Niaraka tamin''ny lohan''ny firenena izy, Ary araka ny fahamarinan''i Jehovah ny nataony, Sy araka ny fitsipiny izay iombonany amin''ny Isiraely.'
mg1865::mg_5::33::22:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''DANA dia hoy izy: Dana dia zana-diona; Miantsampy avy ao Basana izy.'
mg1865::mg_5::33::23:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i NAFTALY dia hoy izy: Ry Naftaly, voky fankasitrahana Ka feno ny fitahian''i Jehovah, Mandovà ny andrefana sy ny atsimo anie ianao.'
mg1865::mg_5::33::24:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i ASERA dia hoy izy: Aoka hotahina mihoatra noho ny zaza maro Asera, Ary hankasitrahana mihoatra noho ny rahalahiny izy Ka hanoboka ny tongony amin''ny diloilo.'
mg1865::mg_5::33::25:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho vy sy varahina ny hidinao; Ary hifamatra amin''ny andronao ny fiadananao.'
mg1865::mg_5::33::26:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jesorona, tsy misy tahaka an''Andriamanitra, Izay mitaingina ny lanitra hamonjy anao, Sady mandia ny rahona amin''ny voninahiny.'
mg1865::mg_5::33::27:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Andriamanitra hatrizay hatrizay no fonenana, Ary ny sandry mandrakizay no eto ambany. Mandroaka ny fahavalo eo anoloanao Izy Ka manao hoe: Aringano.'
mg1865::mg_5::33::28:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandry fahizay Isiraely, Mitokana irery ny loharanon''i Jakoba Ao amin''ny tany be vary sy ranom-boaloboka, Eny, mampilatsaka ando ny lanitra eo amboniny.'
mg1865::mg_5::33::29:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 33
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ianao, ry Isiraely; Iza no tahaka anao, ry olona voavonjin''i Jehovah, Ampingan''ny famonjena anao sy sabatry ny voninahitrao! Hikoy anao ny fahavalonao. Ary ianao handia ny fitoerany avo.'
mg1865::mg_5::34::1:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahafatesan''i Mosesy, sy ny nandevenana azy'
  verse_text: 'Dia niakatra niala teo Arbota-moaba Mosesy ka nankany an-tendrombohitra Nebo, ao an-tampon''i Pisga, izay tandrifin''i Jeriko. Ary nasehon''i Jehovah azy ny tany Gileada rehetra hatrany Dana'
mg1865::mg_5::34::2:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Naftaly rehetra sy ny tanin''ny Efraima sy ny Manase sy ny tanin''ny Joda rehetra hatramin''ny ranomasina andrefana'
mg1865::mg_5::34::3:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tany atsimo sy ny ao amin''ny lohasahan''i Jeriko, tanàna be rofia hatrany Zoara.'
mg1865::mg_5::34::4:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah taminy: Io no tany izay nianianako tamin''i Abrahama sy Isaka ary Jakoba hoe: Homeko ny taranakao izy; nataoko mahita azy ny masonao, nefa tsy ho tafita ho tonga eny ianao.'
mg1865::mg_5::34::5:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy, mpanompon''i Jehovah, dia maty teo amin''ny tany Moaba araka ny tenin''i Jehovah.'
mg1865::mg_5::34::6:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naleviny tao an-dohasaha tao amin''ny tany Moaba, tandrifin''i Beti-peora, izy; ka tsy misy olona mahalala ny fasany mandraka androany.'
mg1865::mg_5::34::7:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa roa-polo amby zato taona Mosesy vao maty; ary tsy pahina ny masony, na nihena ny heriny.'
mg1865::mg_5::34::8:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nisaona an''i Mosesy telo-polo andro teo Arbota-moaba; dia tapitra ny andro fitomaniana nisaonana an''i Mosesy.'
mg1865::mg_5::34::9:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josoa, zanak''i Nona, dia feno ny fanahim-pahendrena, fa efa nametrahan''i Mosesy tanana izy; dia nihaino azy ny Zanak''Isiraely ka nanao araka izay nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_5::34::10:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy mpaminany intsony niseho teo amin''ny Isiraely tahaka an''i Mosesy, izay fantatr''i Jehovah nifanatrika'
mg1865::mg_5::34::11:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny famantarana rehetra sy ny fahagagana, izay nanirahan''i Jehovah azy mba hataony tany Egypta tamin''i Farao sy ny mpanompony rehetra ary ny taniny rehetra'
mg1865::mg_5::34::12:
  verse_version: mg1865
  verse_book: mg_5
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tamin''ny herin-tanana rehetra sy ny fampahatahorana lehibe rehetra, izay nasehon''i Mosesy teo imason''ny Isiraely rehetra.'
