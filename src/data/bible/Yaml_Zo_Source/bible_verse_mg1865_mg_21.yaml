mg1865::mg_21::1::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarihan-teny milaza ny maha-zava-poana ny zavatra rehetra'
  verse_text: 'Ny tenin''i Mpitoriteny, zanak''i Davida, mpanjaka tany Jerosalema.'
mg1865::mg_21::1::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-poana dia zava-poana, hoy Mpitoriteny, zava-poana dia zava-poana, eny, zava-poana ny zavatra rehetra!'
mg1865::mg_21::1::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no soa azon''ny olona amin''ny fisasarany rehetra izay isasarany aty ambanin''ny masoandro?'
mg1865::mg_21::1::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa ny taranaka iray, ary mandimby kosa ny taranaka iray; fa ny tany mbola maharitra mandrakizay.'
mg1865::mg_21::1::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoandro koa miposaka ary ny masoandro milentika sady miriotra ho any amin''ny fitoerana izay niposahany.'
mg1865::mg_21::1::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mianatsimo ny rivotra, dia mihodina mianavaratra, mivezivezy mandrakariva izy ka miverimberina manodidina indray.'
mg1865::mg_21::1::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny renirano rehetra dia samy mankamin''ny ranomasina, nefa tsy tondraka ny ranomasina; any amin''izay falehan''ny renirano ihany no iverenany indray.'
mg1865::mg_21::1::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maivana* ny teny rehetra, ka tsy misy olona mahalaza**; ny maso tsy mamo mijery, ary ny sofina tsy mamo mihaino. [*Hebreo: Feno fahasasarana] [**Na: Feno fahasasarana ny zavatra rehetra ka tsy hain''ny olona lazaina]'
mg1865::mg_21::1::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay efa teo ihany no ho tonga indray, ary izay efa natao ihany no mbola hatao indray fa tsy misy zava-baovao akory aty ambanin''ny masoandro.'
mg1865::mg_21::1::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy zavatra azo lazaina hoe: He! ity no vaovao, dia ilay efa teo ela tany amin''ny andro talohantsika ihany izany.'
mg1865::mg_21::1::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fahatsiarovana ny taloha; ary ny ho avy koa dia tsy hotsarovan''izay handimby azy.'
mg1865::mg_21::1::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny tsy ahitana fahafaham-po, na dia amin''ny fitadiavam-pahendrena aza'
  verse_text: 'Izaho Mpitoriteny dia mpanjakan''ny Isiraely tany Jerosalema;'
mg1865::mg_21::1::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nampiasaiko ny foko mba hitady sy hikatsaka amim-pahendrena ny zavatra rehetra izay atao aty ambanin''ny lanitra; asa mahareraka omen''Andriamanitra hisasaran''ny zanak''olombelona izany.'
mg1865::mg_21::1::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitako ny zavatra rehetra izay atao aty ambanin''ny masoandro; fa, indro, zava-poana sy misambo-drivotra* foana izany rehetra izany. [*Na: Homan-drivotra]'
mg1865::mg_21::1::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny meloka tsy mety tonga mahitsy; ary ny tsy ao tsy mba azo isaina*. [*Na: ny tsy fahampiana dia tsy tambo isaina]'
mg1865::mg_21::1::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho tamin''ny foko: Indro, izaho nahazo fahendrena be dia be mihoatra noho izay rehetra talohako teto Jerosalema; eny, ny foko nahita ny fahendrena sy ny fahalalana betsaka.'
mg1865::mg_21::1::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampiasaiko ny foko hahalala fahendrena sy hahalala fahaverezan-tsaina sy fahadalana; dia fantatro fa misambo-drivotra* foana koa izany, [*Na: Homan-drivotra]'
mg1865::mg_21::1::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria izay be fahendrena dia be alahelo, ary izay mitombo fahalalana dia mitombo fahoriana.'
mg1865::mg_21::2::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny maha-zava-poana ny fahafinaretana sy ny voninahitra momba izao fiainana izao, na dia omban''ny fahendrena aza'
  verse_text: 'Hoy izaho anakampo: Aoka mba hizahako toetra amin''ny hafaliana ianao, ka dia mifalia amin''ny fahitana ny fahafinaretana; kanjo, indro, zava-poana koa izany.'
mg1865::mg_21::2::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho, miantso ny fihomehezana: Fahadalana, ary ny fifaliana hoe: Mahefa inona?'
mg1865::mg_21::2::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisaina tato am-poko hamalifaly ny nofoko tamin''ny divay aho (ny foko anefa mbola hitondra azy amin''ny fahendrena ihany) ary hitana ny fahadalana, mandra-pahitako izay tsara ho an''ny zanak''olombelona ka tokony hataony aty ambanin''ny lanitra amin''ny andro vitsy iainany.'
mg1865::mg_21::2::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao asa lehibe ho ahy aho, nanao trano, nanao tanim-boaloboka,'
mg1865::mg_21::2::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao tanimboly sy saha aho ka namboly hazo fihinam-boa samy hafa karazana tao;'
mg1865::mg_21::2::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao kamory aho handemana ny ala be zana-kazo;'
mg1865::mg_21::2::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'nahazo ankizilahy sy ankizivavy aho sady nanana ompikely; ary nanana fananana be aho, dia omby sy ondry aman''osy mihoatra noho izay rehetra talohako teto Jerosalema.'
mg1865::mg_21::2::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihary volafotsy sy volamena koa aho ary fanaka tsara fananan''ny mpanjaka sy izay avy amin''ny tany samy hafa; ary nahazo mpihiralahy sy mpihiravavy aho mbamin''izay mahafinaritra ny zanak''olombelona, dia vady sy vaditsindrano betsaka*. [*Na: fahafinaretan''ny zanak''olombelona be dia be]'
mg1865::mg_21::2::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia efa nisandratra mihoatra noho izay rehetra talohako teto Jerosalema aho; ary ny fahendreko anefa dia mbola tato amiko ihany.'
mg1865::mg_21::2::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na inona na inona nirin''ny masoko dia tsy nisy narovako taminy; tsy nisakana ny foko tamin''izay mety ho fifaliana aho; fa nahazo hafaliana avy tamin''ny fisasarako rehetra ny foko; ary izany no anjarako avy tamin''ny fisasarako rehetra.'
mg1865::mg_21::2::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa nitodika aho nandinika ny asa rehetra nataon''ny tanako sy ny fisasarana izay nisasarako, ka, indreo, zava-poana sy misambo-drivotra* foana izany rehetra izany, fa tsy nisy nahasoa taty ambanin''ny masoandro. [*Na: Homan-drivotra]'
mg1865::mg_21::2::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny fihoaran''ny fahendrena noho ny fahadalana, ary ny mahatsara ny fiononana, na dia hita aza fa misy zavatra maro itovian''ny hendry sy ny adala'
  verse_text: 'Ary nitodika aho hijery ny fahendrena sy ny fahaverezan-tsaina ary ny fahadalana; fa inona no hataon''ny olona izay handimby ny mpanjaka? Izay efa natao hatramin''ny ela ihany.'
mg1865::mg_21::2::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitako fa ny fahendrena dia tsara* noho ny fahadalana, toy ny fahatsaran**''ny mazava noho ny maizina. [*Hebreo: mihoatra] [**Hebreo: fihoaran'']'
mg1865::mg_21::2::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mason''ny hendry dia eo an-dohany; fa ny adala kosa mandeha amin''ny maizina; nefa hitako fa mitovy ihany ny manjo azy roa tonta.'
mg1865::mg_21::2::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho anakampo: Mitovy amin''ny manjo ny adala ihany ny manjo ahy, koa nahoana ary no nanan-tombom-pahendrena aho? Dia hoy izaho anakampo: zava-poana koa izany.'
mg1865::mg_21::2::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy tsy misy fahatsiarovana mandrakizay na ny hendry na ny adala; fa amin''ny andro ho avy dia samy ho hadino ela izy. Indrisy! samy ho faty na ny adala na ny hendry.'
mg1865::mg_21::2::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia efa halako ny aina, satria nataoko ho ratsy ny asa atao aty ambanin''ny masoandro; fa zava-poana sy misambo-drivotra* foana izy rehetra. [*Na: Homan-drivotra]'
mg1865::mg_21::2::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, efa halako ny fisasarako rehetra izay nisasarako taty ambanin''ny masoandro, fa havelako ho an''ny olona izay handimby ahy izany,'
mg1865::mg_21::2::19:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary iza no mahalala na ho hendry na ho adala izy? Nefa izy no ho tompon''izay rehetra nisasarako sy nataoko tamin''ny fahendreko taty ambanin''ny masoandro. Zava-poana koa izany.'
mg1865::mg_21::2::20:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitodika aho hampamoy ny foko amin''ny fahakiviana ny amin''ny fisasarana rehetra izay nisasarako taty ambanin''ny masoandro.'
mg1865::mg_21::2::21:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy olona izay misasatra amin''ny fahendrena sy ny fahalalana ary ny fahaizana, nefa ny olona izay tsy nisasatra tamin''izany akory no tsy maintsy hamelany azy ho lovany. Zava-poana sy faharatsiana lehibe koa izany.'
mg1865::mg_21::2::22:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona no azon''ny olona amin''ny fisasarany rehetra sy amin''ny fikatsahan''ny fony, izay nisasarany taty ambanin''ny masoandro?'
mg1865::mg_21::2::23:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny androny rehetra dia fanaintainana avokoa, ary ny fisasarany dia fahasorisorena; eny, na dia amin''ny alina aza dia tsy manam-pitsaharana ny fony. Zava-poana koa izany.'
mg1865::mg_21::2::24:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mahasoa ny olona mihoatra noho ny mihinana sy misotro ary ny mampahafinaritra ny tenany amin''ny fisasarany. Izany koa aza dia efa hitako fa avy amin''ny tanan''Andriamanitra* [*Na: Tsy misy tsara amin''ny olona. Ny mihinana sy misotro ary ny mampahafinaritra ny tenanay amin''ny fisasaranay dia hitako fa avy amin''ny tanan''Andriamanitra koa]'
mg1865::mg_21::2::25:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa iza no mahalany, ary iza no mahazo manaram-po mihoatra noho izaho?).'
mg1865::mg_21::2::26:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay ankasitrahan''Andriamanitra dia omeny fahendrena sy fahalalana ary fifaliana; fa ny mpanota kosa ampiasainy hanangona sy hamory, mba hisy homeny izay ankasitrahan''Andriamanitra. Zava-poana sy misambo-drivotra* foana koa izany. [*Na: Homan-drivotra]'
mg1865::mg_21::3::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny filaharan''ny zavatra samy amin''ny fotoany avy, sy ny mbola hitsaran''Andriamanitra ny ratsy fanahy, ary ny anton''ny nanaovana ny olombelona ho faty toy ny biby'
  verse_text: 'Ny zavatra rehetra samy manana ny fotoany avy, ary samy manana ny androny avy ny raharaha rehetra aty ambanin''ny lanitra:'
mg1865::mg_21::3::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: '2022-04-26T05:00:39+0000'
  verse_title: null
  verse_text: 'Ao ny andro ahaterahana, ary ao ny andro ahafatesana; Ao ny andro ambolena, ary ao ny andro anongotana ny nambolena;'
mg1865::mg_21::3::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ny andro amonoana, ary ao ny andro anasitranana; Ao ny andro andravana, ary ao ny andro ananganana;'
mg1865::mg_21::3::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ny andro itomaniana, ary ao ny andro ihomehezana; Ao ny andro isaonana, ary ao ny andro andihizana;'
mg1865::mg_21::3::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ny andro anariam-bato, ary ao ny andro anangonam-bato; Ao ny andro anohonana, ary ao ny andro ifadiana tsy hanohona;'
mg1865::mg_21::3::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ny andro itadiavana, ary ao ny andro ahaverezana; Ao ny andro itehirizana, ary ao ny andro anariana;'
mg1865::mg_21::3::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ny andro andriarana, ary ao ny andro anjairana; Ao ny andro anginana, ary ao ny andro itenenana;'
mg1865::mg_21::3::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ny andro itiavana, ary ao ny andro ankahalana; Ao ny andro iadiana, ary ao ny andro ihavanana.'
mg1865::mg_21::3::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no soa azon''ny miasa amin''izay isasarany?'
mg1865::mg_21::3::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitako ny asa mampahory izay nomen''Andriamanitra ny zanak''olombelona hisasarany.'
mg1865::mg_21::3::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra rehetra samy nataony ho mendrika amin''ny fotoany avy; ary ny mandrakizay* dia efa nataony tao am-pony, kanefa tsy hitan''ny olona ny asan''Andriamanitra hatramin''ny voalohany ka hatramin''ny farany. [*Na: izao tontolo izao]'
mg1865::mg_21::3::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro fa tsy misy tsara amin''ny olombelona afa-tsy ny mifaly sy ny manao tsara*, raha mbola velona koa izy. [*Na: mahazo soa]'
mg1865::mg_21::3::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, raha mihinana sy misotro ary finaritra amin''ny fisasarany rehetra ny olombelona, dia fanomezan''Andriamanitra izany.'
mg1865::mg_21::3::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro fa izay rehetra ataon''Andriamanitra dia haharitra mandrakizay; tsy azo ampiana ary tsy azo analana izany; ka dia ataon''Andriamanitra matahotra eo imasony ny olona.'
mg1865::mg_21::3::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay atao izao dia efa natao fahiny; ary izay mbola ho avy dia efa nisy fahiny ihany koa; ary mbola tadiavin''Andriamanitra indray izay efa lasa*. [*Hebreo: voaroaka]'
mg1865::mg_21::3::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao koa no efa hitako aty ambanin''ny masoandro: ny fitoeran''ny fitsarana nisy faharatsiana tao; ary ny fitoeran''ny fahamarinana nisy faharatsiana koa tao.'
mg1865::mg_21::3::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho anakampo: Samy hotsarain''Andriamanitra na ny marina na ny meloka; fa any dia samy manana ny androny avy ny zavatra rehetra sy ny asa rehetra.'
mg1865::mg_21::3::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho anakampo: Noho ny amin''ny zanak''olombelona izany, mba hizahan''Andriamanitra toetra* azy, ka ho hitany fa raha ny tenany ihany, dia biby izy. [*Na: hanadiovan''Andriamanitra]'
mg1865::mg_21::3::19:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa zavatra sendrasendra foana ny zanak''olombelona, ary zavatra sendrasendra foana koa ny biby*, mitovy ihany ny mihatra amin''izy roa tonta; fa toy ny ahafatesan''ny iray no ahafatesan''ny iray koa; eny, iray ihany no fofonaina ananan''izy rehetra; ary tsy misy ihoaran''ny olona noho ny biby; fa samy zava-poana izy rehetra. [*Na: Fa izay manjo ny zanak''olombelona dia manjo ny biby koa]'
mg1865::mg_21::3::20:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy rehetra samy mankamin''ny fitoerana iray: avy tamin''ny vovoka izy rehetra, ary hiverina ho amin''ny* vovoka indray izy rehetra. [*Na: hody]'
mg1865::mg_21::3::21:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahalala ny fanahin''ny olombelona, na miakatra any ambony izy, na tsia, ary ny fanahin''ny biby, na midina amin''ny tany izy, na tsia*? [*Na: Iza no mahalala ny fanahin''ny olombelona izay miakatra any ambony, na ny fanahin''ny biby izay midina amin''ny tany?]'
mg1865::mg_21::3::22:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia efa hitako fa tsy misy tsara noho ny ifalian''ny olona amin''ny asany, satria izany no anjarany; fa iza no hampahalala azy izay ho avy any aoriany?'
mg1865::mg_21::4::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny manjo ny olona noho ny fampahorian''ny sasany azy, sy ny lolom-po, sy ny fitoerany irery ary ny ataon''ny mpitondra azy'
  verse_text: 'Dia hitako koa ny fampahoriana rehetra atao aty ambanin''ny masoandro; ary indro ny ranomason''ny ampahorina, sady tsy nisy mpanony azy; ary loza no ataon''ny tanan''ny mpampahory azy, sady tsy nisy mpanony.'
mg1865::mg_21::4::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny maty izay efa maty ela dia nataoko ho sambatra noho ny velona izay mbola velona,'
mg1865::mg_21::4::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa tsara indray noho izy roa tonta aza ny tsy ary, izay tsy nahita ny ratsy atao aty ambanin''ny masoandro akory.'
mg1865::mg_21::4::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako ny fisasarana rehetra sy ny fahaizan-javatra rehetra, fa avy amin''ny fifampialonan''ny olona izany. Zava-poana sy misambo-drivotra* foana koa izany. [*Na: Homan-drivotra]'
mg1865::mg_21::4::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny adala manohon-tanana ka homana ny tenany.'
mg1865::mg_21::4::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny eran-tanan''ila misy fiadanana noho ny eran-tanan-droa misy fisasarana* sady misambo-drivotra** foana. [*Na: Tsara ny fiadanana eran-tanan''ila noho ny fisasarana] [**Na: Homan-drivotra]'
mg1865::mg_21::4::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao koa no zava-poana hitako aty ambanin''ny masoandro:'
mg1865::mg_21::4::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mitoetra irery ka tsy mana-namana, eny, tsy manan-janaka na rahalahy aza, nefa tsy misy farany ny fisasarany rehetra, ary ny masony tsy afa-po amin''ny harena, hanaovany hoe: Ho an''iza no isasarako sy tsy ampananako soa ny fanahiko? Zava-poana sy asa mahareraka koa izany.'
mg1865::mg_21::4::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny roa noho ny iray; fa misy valiny tsara ny fisasarany.'
mg1865::mg_21::4::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy lavo izy, dia arenin''ny namany; fa mahantra ny lavo izay tsy manana namana hanarina azy.'
mg1865::mg_21::4::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, raha miara-mandry ny roa, dia mafana izy; fa hatao ahoana no hampahafana ny irery?'
mg1865::mg_21::4::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy maharesy ny irery aza, ny roa tsy ho leony tsy akory; ary ny mahazaka telo olana tsy mora tapahina.'
mg1865::mg_21::4::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo zatovo malahelo hendry toy izay mpanjaka antitra adala ka tsy laitra anarina intsony;'
mg1865::mg_21::4::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa avy ao an-tranomaizina no nivoahany hanjaka, na dia nateraka tamin''alahelo tamin''ny fanjakany aza izy*. [*Na: fa na dia nateraka tamin''ny fanjakany aza izy, dia tamin''alahelo ihany]'
mg1865::mg_21::4::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitako ny miaina rehetra izay miriaria aty ambanin''ny masoandro manotrona ilay zazalahy dia ilay faharoa izay mitsangana handimby ny teo.'
mg1865::mg_21::4::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hita isa ny olona rehetra, dia izay rehetra anjakany; nefa izay any aoriana tsy mba hifaly aminy; fa zava-poana sy misambo-drivotra* foana koa izany. [*Na: Homan-drivotra]'
mg1865::mg_21::4::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny mety hatao amin''Andriamanitra na amin''ny fivavahana na amin''ny voady'
  verse_text: 'Tandremo ny tongotrao, raha mankao an-tranon''Andriamanitra ianao; fa ny manatona hihaino no tsara noho ny fanateran''ny adala fanatitra; fa tsy fantatr''ireny ho manao ratsy izy.'
mg1865::mg_21::5::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza haingam-bava, ary aza malaky manonona teny eo anatrehan''Andriamanitra ny fonao; fa Andriamanitra dia any an-danitra ary ianao ety an-tany, koa aoka ho vitsy ny teninao.'
mg1865::mg_21::5::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny haben''ny fisasarana no mahatonga ny nofy; ary ny haben''ny teny no isehoan''ny rediredin''ny adala.'
mg1865::mg_21::5::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoady amin''Andriamanitra ianao, aza manao ampitso lava: fa tsy ankasitrahany ny adala; koa efao ny voadinao.'
mg1865::mg_21::5::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo tsy mivoady toy izay mivoady ka tsy mahefa.'
mg1865::mg_21::5::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hahatonga heloka amin''ny tenanao ny vavanao; ary aza manao eo imason''ny anjely* hoe: Niteny tsy nahy aho; nahoana no ho tezitra amin''ny teninao Andriamanitra ka hanimba ny asan''ny tananao? [*Na: iraka;]'
mg1865::mg_21::5::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny haben''ny nofy dia misy zava-poana; ary toy izany koa ny haben''ny teny, fa Andriamanitra no atahory.'
mg1865::mg_21::5::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny mbola hitsarana ny mpampahory sy ny mpamadika ny rariny ary ny maha-zava-poana ny harena sy ny tokony hifaliana amin''izay omen''Andriamanitra'
  verse_text: 'Raha hitanao ny fampahoriana ny malahelo sy ny famadihana ny fitsarana sy ny rariny amin''ny tany, dia aza gaga amin''izany; fa misy ambony kokoa mibanjina ny ambony, ary mbola misy ambony noho ireo indray aza.'
mg1865::mg_21::5::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia izany rehetra izany aza, dia mahasoa ny tany ny fisian''ny mpanjaka amin''izay tany volena.'
mg1865::mg_21::5::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia vola tsy hety ho voky vola; ary izay fatra-pitia harena be tsy hety ho vokin''ny fitomboan-karena; fa zava-poana koa izany.'
mg1865::mg_21::5::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitombo ny fananana, dia mitombo koa ny mpihinana azy; ary inona no soa azon''ny tompony, afa-tsy ny mijery maso azy fotsiny ihany?'
mg1865::mg_21::5::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamy ny torimason''ny mpiasa, na homan-kely na homam-be izy; fa ny haben''ny ananan*''ny manan-karena kosa no tsy ahitany tory. [*Na: ny fahavokisan'']'
mg1865::mg_21::5::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy ratsy mahory efa hitako aty ambanin''ny masoandro, dia harena tehirizin''ny tompony, nefa mampidi-doza amin''ny tenany;'
mg1865::mg_21::5::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady levona izany harena izany noho ny loza manjo; ary miteraka zazalahy ralehilahy nefa tsy misy na inona na inona eny an-tanany,'
mg1865::mg_21::5::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nivoahany mitanjaka avy tany an-kibon-dreniny, dia toy izay nihaviany ihany no hiverenany; ary tsy hisy na inona na inona ho entin''ny tanany ho valin''ny fisasarany.'
mg1865::mg_21::5::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ratsy mahory koa izany, fa toy izay nihaviany indrindra no handehanany; ary inona no soa azony noho ny nisasarany ho an''ny rivotra?'
mg1865::mg_21::5::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, homa-maizina amin''ny androny rehetra izy sady manana alahelo be sy fahoriana ary fahasosorana.'
mg1865::mg_21::5::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa hitako izay soa sy izay tsara, dia ny mihinana sy misotro ary mifaly amin''ny fisasarana rehetra izay isasaran''ny olona aty ambanin''ny masoandro amin''izay andro vitsy iainany omen''Andriamanitra azy; fa izany no anjarany.'
mg1865::mg_21::5::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny olona rehetra izay omen''Andriamanitra vola aman-karena sady omeny fahefana hihinanany azy sy hahazoany ny anjarany sy hifaliany amin''ny fisasarana, dia fanomezan''Andriamanitra izany.'
mg1865::mg_21::5::19:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hahatsiaro loatra ny andro niainany izy, satria ny fahafinaretan''ny fony no avalin''Andriamanitra azy.'
mg1865::mg_21::6::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahantran''ny sasany noho ny tsy ahitany soa amin''ny zavatra ananany'
  verse_text: 'Misy ratsy efa hitako aty ambanin''ny masoandro, ary mitambesatra amin''ny olona izany:'
mg1865::mg_21::6::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona izay omen''Andriamanitra vola aman-karena sy voninahitra, ka tsy misy tsy ananany na inona na inona iriny, nefa tsy omen''Andriamanitra fahefana hihinana amin''izany izy, fa olon-kafa no homana azy; zava-poana sy ratsy mahory koa izany.'
mg1865::mg_21::6::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia misy miteraka zaza zato aza sady tratrantitra, ka efa maro ny andro niainany, nefa tsy mba voky soa ny fanahiny, sady tsy mba alevina akory ny fatiny, dia hoy izaho: Ny tsy tonga volana dia tsara kokoa noho izy.'
mg1865::mg_21::6::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toa zava-poana no nihavian''io, ary mandeha ao amin''ny maizina izy, sady ho voasaron''ny aizina ny anarany,'
mg1865::mg_21::6::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koa, tsy nahita na nahalala ny masoandro akory izy, mahita fitsaharana bebe kokoa noho ilay teo izy.'
mg1865::mg_21::6::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, na dia tratra arivo taona indroa aza izy, nefa tsy nahita soa, tsy ho any amin''ny fitoerana iray ihany va no alehan''izy rehetra?'
mg1865::mg_21::6::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisasarana rehetra ataon''ny olona dia ho an''ny vavany ihany, nefa tsy mety afa-po ny faniriany.'
mg1865::mg_21::6::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona no soa azon''ny hendry noho ny adala? Inona no azon''ny malahelo izay mahay mitondra tena eo imason''ny velona?'
mg1865::mg_21::6::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahitan''ny maso dia mahafinaritra noho ny firenirenin''ny faniriana. Zava-poana sy misambo-drivotra* foana koa izany. [*Na: Homan-drivotra]'
mg1865::mg_21::6::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay efa teo dia voalaza anarana hatry ny fony ela, ary fantatra fa ny olona dia tsy mahazo mifandahatra amin''izay mahery noho izy.'
mg1865::mg_21::6::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro ny zavatra mahabe ny zava-poana, koa inona no soa azon''ny olona?'
mg1865::mg_21::6::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no mahalala izay mahasoa ny olona amin''izao fiainana izao, dia ny andro vitsy mandalo foana izay laniny toy ny fihelin''ny aloka? Fa iza no hahalaza amin''ny olona izay zavatra ho avy any aoriany aty ambanin''ny masoandro?'
mg1865::mg_21::7::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ohabolana samy hafa ny amin''ny mahasoa ny olombelona'
  verse_text: 'Tsara ny laza soa noho ny menaka manitra; ary ny andro ahaterahana tsy mahaleo ny andro ahafatesana.'
mg1865::mg_21::7::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny mankamin''ny trano misy fisaonana noho ny mankamin''ny trano misy fanasana; fa ho amin''iny no hiafaran''ny olombelona rehetra, ary ny velona handatsaka am-po izany.'
mg1865::mg_21::7::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny alahelo noho ny hehy; fa na dia malahelo aza ny tarehy, mety tsara* ihany ny fo. [*Na: faly]'
mg1865::mg_21::7::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny hendry dia ao amin''ny trano misy fisaonana; fa ny fon''ny adala kosa dia ao amin''ny trano misy fifaliana.'
mg1865::mg_21::7::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny mihaino ny anatra mafy ataon''ny hendry noho ny mihaino ny hiran''ny adala.'
mg1865::mg_21::7::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny firefodrefotry ny tsilo eo ambanin''ny vilany, dia tahaka izany ny fihomehezan''ny adala; zava-poana koa izany.'
mg1865::mg_21::7::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fampahoriana dia mahavery saina ny hendry; ary ny kolikoly mahasimba ny fo.'
mg1865::mg_21::7::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: '2022-04-27T06:20:09+0000'
  verse_title: null
  verse_text: 'Tsara ny iafaran''ny raharaha noho ny iandohany; tsara ny mahari-po noho ny miavonavom-panahy.'
mg1865::mg_21::7::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy halaky tezitra ny fanahinao; fa ny fahatezerana mitoetra ao an-tratran''ny adala.'
mg1865::mg_21::7::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao hoe: Ahoana no nahatsara ny andro taloha noho ny ankehitriny? fa tsy avy amin''ny fahendrena no anontanianao izany.'
mg1865::mg_21::7::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara tahaka ny lova ny fahendrena, sady zava-mahasoa ho an''izay mahita masoandro izany.'
mg1865::mg_21::7::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fialokalofana ny fahendrena, ary fialokalofana ny vola; ary ny mahatsara ny fahalalana dia izao: Maharo ny ain''ny manana azy ny fahendrena.'
mg1865::mg_21::7::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saino ny asan''Andriamanitra; fa iza moa no mahahitsy izay nataony ho meloka?'
mg1865::mg_21::7::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro mahafaly dia mifalia; ary amin''ny andro mahory mieritrereta; fa nampitanandrifin''Andriamanitra ireo, mba tsy hahitan''ny olona akory izay ho avy any aoriany.'
mg1865::mg_21::7::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao rehetra izao dia efa hitako tamin''ny androko mandalo foana: misy marina maty amin''ny hamarinany; ary misy meloka ela velona amin''ny haratsiany.'
mg1865::mg_21::7::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza marina loatra, ary aza miseho ho hendry loatra; nahoana noho simbanao ny tenanao?'
mg1865::mg_21::7::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ratsy loatra ianao, ary aza adala; nahoana no ho faty ianao, raha tsy efa tonga ny andronao?'
mg1865::mg_21::7::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara raha mitana iroa ianao, nefa aza mampiala ny tananao amin''itsy; fa izay matahotra an''Andriamanitra dia ho afaka amin''izany rehetra izany.'
mg1865::mg_21::7::19:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahendrena no maharo ny hendry mihoatra noho ny mpanapaka folo ao an-tanàna.'
mg1865::mg_21::7::20:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy olona marina ambonin''ny tany izay manao tsara ka tsy manota.'
mg1865::mg_21::7::21:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihainohaino ny teny rehetra tenenina, fandrao handre ny mpanomponao manozona anao ianao;'
mg1865::mg_21::7::22:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatry ny fonao fa na dia ny tenanao aza dia mba efa nanozona ny sasany matetika ihany koa.'
mg1865::mg_21::7::23:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany dia notsapaiko tamin''ny fahendrena. Hoy izaho: Ho hendry aho; kanjo lavitra ahy izany.'
mg1865::mg_21::7::24:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izay rehetra lavitra sady lalina dia lalina, iza no mahatakatra azy?'
mg1865::mg_21::7::25:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitodika aho, ka nampiasaiko ny foko hahalala sy handinika ary hitady fahendrena sy izay anton-javatra ary hahafantatra ny faharatsiana ho fahadalana, ary ny fahadalana ho fahaverezan-tsaina;'
mg1865::mg_21::7::26:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hitako fa mangidy noho ny fahafatesana ny vehivavy, izay fandrika sy harato ny fony, sady famatorana ny tanany; nefa izay ankasitrahan''Andriamanitra dia ho afa-mandositra azy, fa ny mpanota ihany no ho azony.'
mg1865::mg_21::7::27:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izany no hitako, hoy Mpitoriteny, raha nandinidinika ny zavatra tsirairay aho mba hahitana izay antony.'
mg1865::mg_21::7::28:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay notadiaviko koa, fa tsy hitako, dia izao: lehilahy iray no hitako ho marina tao amin''ny arivo; fa tao amin''ny vehivavy arivo* dia tsy nisy hitako na dia iray akory aza. [*Hebreo: teo amin''ireo dia tsy nisy vehivavy hitako, etc]'
mg1865::mg_21::7::29:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izao ihany no hitako: nataon''Andriamanitra mahitsy ny olona, kanjo namorona sain-kafa maro izy.'
mg1865::mg_21::8::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no toy ny hendry? Ary iza no mahalala izay anton-javatra? Ny fahendren''ny olona mahamiramirana ny tarehiny, ary voaova ny fahadontoan''ny endriny.'
mg1865::mg_21::8::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Tandremo ny didin''ny mpanjaka noho ny efa nianianana tamin''Andriamanitra.'
mg1865::mg_21::8::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza malaky miala eo anatrehany; aza mikikitra amin''ny fanaovan-dratsy; fa na inona na inona sitrany dia azony atao avokoa;'
mg1865::mg_21::8::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny tenin''ny mpanjaka dia misy hery, ka iza no mahazo manao aminy hoe: Inona no ataonao?'
mg1865::mg_21::8::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitandrina ny didy tsy mba mikambana* amin''ny fanaovan-dratsy; ary ny fon''ny hendry dia mahalala fotoana sy fitsarana; [*Hebreo: mahalala]'
mg1865::mg_21::8::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa samy manana ny fotoany sy ny fitsarana azy avy ny hevitra rehetra, satria efa be ny heloky* ny olona. [*Na: fahorian'']'
mg1865::mg_21::8::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mahafantatra izay ho avy izy; fa iza no hampahafantatra azy izay hihaviany?'
mg1865::mg_21::8::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy olona manan-kery hahatana ny ainy, na manan-kery ny amin''ny andro hahafatesana; ary tsy misy fahafahana amin''ny ady, ary ny ratsy fanahy tsy ho voavonjin''ny faharatsiany.'
mg1865::mg_21::8::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany dia efa hitako avokoa tamin''ny nampiasako ny foko nandinika ny asa rehetra atao aty ambanin''ny masoandro. Misy andro anapahan''ny olona ny namany ka ampidirany loza aminy.'
mg1865::mg_21::8::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia hitako ny ratsy fanahy nalevina ka tafiditra; fa izay nanao ny marina kosa dia lasa niala tamin''ny fitoeran''ny masina ka nohadinoina tao an-tanàna*; zava-poana koa izany. [*Na: ary tafiditra izy ka niala tamin''ny fitoeran''ny masina, ary nohadinoin''ny tao an-tanàna izay efa nanaovany izany]'
mg1865::mg_21::8::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saingy tsy tanterahina vetivety ny famaliana ny ratsy atao, dia izany no ikirizan''ny fon''ny zanak''olombelona amin''ny fanaovan-dratsy.'
mg1865::mg_21::8::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, fa na dia manao ratsy injato aza ny mpanota ka ela velona ihany, dia fantatro kosa fa hisy soa ho an''izay matahotra an''Andriamanitra, dia izay matahotra eo anatrehany.'
mg1865::mg_21::8::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hisy soa ho an''ny ratsy fanahy; fa ho toy ny aloka izy ka tsy haharitra ela, satria tsy matahotra eo anatrehan''Andriamanitra.'
mg1865::mg_21::8::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao koa no zava-poana izay atao aty ambonin''ny tany: Misy olo-marina iharan''izay tokony ho valin''ny asa ratsy; ary misy olo-meloka mahazo izay tokony ho valin''ny asa marina; hoy izaho: Zava-poana koa izany.'
mg1865::mg_21::8::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noderaiko ny fifaliana, satria tsy misy mahasoa ny olona aty ambanin''ny masoandro afa-tsy ny mihinana sy ny misotro ary ny miravoravo, ka hisy izany amin''ny fisasarany mandritra ny andro hiainany, izay nomen''Andriamanitra azy aty ambanin''ny masoandro.'
mg1865::mg_21::8::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny tsy fahatakaran''ny saina ny fitondran''Andriamanitra, sy ny tokony hifaliana amin''izay soa hita ary hahazotoana amin''izay rehetra azo atao'
  verse_text: 'Raha nampiasaiko ny foko hahalala fahendrena sy hahita ny raharaha atao aty ambonin''ny tany (fa misy tsy mahita torimaso na andro na alina),'
mg1865::mg_21::8::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hitako avokoa ny asan''Andriamanitra, fa tsy takatry ny sain''ny olona ny asa atao aty ambanin''ny masoandro; koa na dia mikely aina hitady izany aza ny olona, tsy ho hitany; eny, na ny hendry aza no manao hahafantatra izany, dia tsy ho azony fantarina akory.'
mg1865::mg_21::9::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireto dia nalatsako tato am-poko sady nodinihiko avokoa: ny marina sy ny hendry mbamin''ny asany dia samy eo an-tanan''Andriamanitra avokoa; ary koa, na ho fitiavana, na ho fankahalana, dia samy tsy fantatry ny olombelona; fa zavatra mbola ho avy aminy avokoa izany rehetra izany.'
mg1865::mg_21::9::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitovy avokoa ny manjo ny olombelona rehetra; eny, zavatra iray ihany no manjo ny marina sy ny meloka, ny tsara fanahy sy ny madio ary ny tsy madio, ny mamono zavatra hatao fanatitra sy ny tsy mamono zavatra hatao fanatitra; mitovy ihany ny amin''ny tsara fanahy sy ny amin''ny mpanota, ary ny amin''ny mianiana sy ny amin''izay tsy sahy hianiana.'
mg1865::mg_21::9::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no fahoriana amin''izay rehetra atao aty ambanin''ny masoandro: Zavatra iray ihany no manjo ny olombelona rehetra, sady feno ratsy ny fon''ny zanak''olombelona, ka fahadalana no ao am-pony amin''ny andro iainany, ary nony afaka izany, dia ho any amin''ny maty izy.'
mg1865::mg_21::9::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra isan''ny velona dia mbola hantenaina*; fa ny amboa velona no tsara noho ny liona maty. [*Na: Fa iza no ho afaka? Ny amin''ny velona rehetra dia mbola misy hantenaina]'
mg1865::mg_21::9::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatry ny velona fa ho faty izy; fa ny maty kosa tsy mba mahalala na inona na inona, ary tsy manana valim-pitia intsony izy; fa hadino ny fahatsiarovana azy.'
mg1865::mg_21::9::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny fitiavany, na ny fankahalany, na ny fialonany, dia samy efa levona ela sady tsy manana anjara intsony mandrakizay amin''izay atao aty ambanin''ny masoandro izy.'
mg1865::mg_21::9::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, hano amin''ny fifaliana ny haninao, ary sotroy amin''ny fo falifaly ny divainao, fa efa nankasitrahan''Andriamanitra ela ny asanao.'
mg1865::mg_21::9::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fotsy mandrakariva ny fitafianao, ary aoka tsy ho diso menaka ny lohanao.'
mg1865::mg_21::9::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miravoravoa amin''ny vady malalanao amin''ny andronao rehetra mandalo foana, izay efa nomeny anao aty ambanin''ny masoandro, dia ny andronao rehetra mandalo foana; fa izany no anjaranao amin''ny andro iainanao sy amin''ny fisasarana izay isasaranao aty ambanin''ny masoandro.'
mg1865::mg_21::9::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra azon''ny tananao atao dia ataovy amin''ny herinao; fa tsy misy asa, na hevitra, na fahalalana, na fahendrena, any amin''ny fiainan-tsy hita* izay alehanao. [*Hebreo: Sheola]'
mg1865::mg_21::9::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny fihoaran''ny fahendrena noho ny hery'
  verse_text: 'Ary hitako aty ambanin''ny masoandro indray fa tsy ho an''ny haingan-tongotra ny fihoarana, ary tsy ho an''ny mahery ny ady, ary tsy ho an''ny hendry ny hanina, ary tsy ho an''ny mazava saina ny harena, ary tsy ho an''ny manam-pahalalana ny fitia; fa ny fotoana sy ny sampona dia samy mahazo azy rehetra.'
mg1865::mg_21::9::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy fantatry ny olona ny androny; fa toy ny hazandrano azon''ny harato fahitan-doza izy, ary toy ny voron-kely izay voan''ny fandrika, dia voafandrika toy izany ny zanak''olombelona amin''ny andro mahory, raha mahavoa azy tampoka izany.'
mg1865::mg_21::9::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao koa no fahendrena efa hitako taty ambanin''ny masoandro, ka dia nataoko ho lehibe izany:'
mg1865::mg_21::9::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy vohitra kely sady vitsy olona, dia avy ny mpanjaka lehibe anankiray ka namely sy nanao fahirano azy ary nanao manda lehibe hamelezany azy.'
mg1865::mg_21::9::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy malahelo hendry hita teo, koa nahavonjy ny tanàna tamin''ny fahendreny ralehilahy, nefa tsy nisy olona mba nahatsiahy ilay malahelo.'
mg1865::mg_21::9::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hoy izaho: Aleo fahendrena toy izay hery; kanjo hamavoina ny fahendren''ny malahelo, ary ny teniny tsy mba henoina.'
mg1865::mg_21::9::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ohabolana samy hafa ny amin''ny tsy fitovian''ny fahendrena sy ny fahadalana, ary ny amin''ny fanaovan-tsoa sy ny fahazotoana ary ny fahamarinana'
  verse_text: 'Ny tenin''ny hendry izay re amin''ny mangingina dia mahery noho ny fitreron''izay mpanapaka adala.'
mg1865::mg_21::9::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo fahendrena toy izay fiadiana; ary ny mpanota iray mahasimba ny soa be.'
mg1865::mg_21::10::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fatin-dalitra mahamaimbo sy mampamorivory ny menaky ny mpangaroharo zava-manitra; ary toy izany, ny fahadalana kely dia mavesatra noho ny fahendrena sy ny voninahitra.'
mg1865::mg_21::10::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny hendry dia eo ankavanany; fa ny fon''ny adala kosa dia eo ankaviany.'
mg1865::mg_21::10::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, raha mandeha eny an-dalambe ny adala, dia levona ny fahalalany, ka milaza tena amin''ny olona rehetra izy fa adala.'
mg1865::mg_21::10::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tezeran''ny mpanapaka ianao, aza miala amin''ny fitoeranao; fa ny fahatsindriam-po mahasakana ny fahadisoana lehibe.'
mg1865::mg_21::10::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy ratsy efa hitako aty ambanin''ny masoandro, ka toa fahadisoana ataon''ny mpanapaka izany;'
mg1865::mg_21::10::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandratra ho ambony indrindra ny adala, ary ny mpanankarena mipetraka eo amin''ny toerana ambany.'
mg1865::mg_21::10::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitako ny mpanompo mitaingin-tsoavaly, ary ny mpanapaka kosa mandeha an-tongotra toy ny mpanompo.'
mg1865::mg_21::10::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihady lavaka no ho latsaka ao, ary izay mandrava fefy vato no hokekerin''ny menarana.'
mg1865::mg_21::10::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manovoka vato dia haratrany, ary izay mamaky hazo no ho voany.'
mg1865::mg_21::10::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha dombo ny antsy ka tsy asainy, dia tsy maintsy manao an-teninaina izy; fa ny fahendrena no mahasoa, satria mahalavorary ny raharaha izany.'
mg1865::mg_21::10::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manaikitra ny menarana, satria tsy mbola nasiana ody, dia ahoana no mahatsara ny mpanao ody?'
mg1865::mg_21::10::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Soa ny teny aloaky ny vavan''ny hendry; fa ny molotry ny adala kosa mitelina ny tenany.'
mg1865::mg_21::10::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiandohan''ny teny aloaky ny vavany dia fahadalana, ary ny fiafaran''ny teniny dia fahaverezan-tsaina mampidi-doza.'
mg1865::mg_21::10::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro teny ny adala nefa tsy misy olona mahalala izay ho avy; ary iza no mahalaza aminy ny ho avy any aoriany?'
mg1865::mg_21::10::15:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisasaran''ny adala mahareraka azy, fa ny lalana mankany an-tanàna aza tsy fantany akory.'
mg1865::mg_21::10::16:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanao, ry tany, raha zaza no mpanjakanao, ary ny lehibenao homa-maraina!'
mg1865::mg_21::10::17:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra kosa ianao, ry tany, raha tena karazan''andriana no mpanjakanao, ary ny lehibenao homana amin''izay fotoana mety, mba hampahatanjaka ny tenany, fa tsy ny hampahamamo azy!'
mg1865::mg_21::10::18:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahalainana be no mampianjera ny lohatrano, ary ny hakamoan''ny tanana no mampitete ny trano.'
mg1865::mg_21::10::19:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataony laolao ny hanina, ary ny divay no maharavoravo ny aina, ary ny vola no hahazoana ny zavatra rehetra.'
mg1865::mg_21::10::20:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manozona ny mpanjaka na dia amin''ny eritreritrao aza; ary aza manozona ny mpanankarena na dia ao anatin''ny efi-trano fandrianao aza; fa na dia ny voro-manidina aza anie ka hitondra ny feo, ary na dia ny manana elatra dia hanambara ny teny.'
mg1865::mg_21::11::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atsipazo eny ambonin''ny rano ny haninao, fa ho hitanao ihany izy rehefa ela.'
mg1865::mg_21::11::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy omeo anjara ny fito, ary na dia ny valo aza, fa tsy fantatrao izay fahoriana hanjo aty ambonin''ny tany.'
mg1865::mg_21::11::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha feno ranonorana ny rahona, dia halatsany amin''ny tany izany; ary na mianjera mianatsimo na mianavaratra ny hazo, dia eo amin''izay ianjerany ihany no handriany.'
mg1865::mg_21::11::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay fatra-pihevitra ny rivotra tsy hamafy, ary izay manahy* ny rahona tsy hijinja. [*Hebreo: mijery]'
mg1865::mg_21::11::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tsy ahafantaranao ny amin''ny alehan''ny rivotra, na ny amin''ny fitombon''ny taolana ao an-kibon''izay manan''anaka, dia toy izany no tsy ahafantaranao ny asan''Andriamanitra, Mpanao ny zavatra rehetra.'
mg1865::mg_21::11::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny maraina dia afafazo ny voanao, ary amin''ny hariva dia aza atsahatra ny tananao; fa tsy fantatrao izay ho vanona, na ny teo aloha, na ny teo aoriana, na angamba samy ho vanona avokoa izy roa tonta.'
mg1865::mg_21::11::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamy tokoa ny mazava, ary mahafinaritra ny maso ny mijery ny masoandro;'
mg1865::mg_21::11::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa na dia ela velona aza ny olona, dia aoka ho faly amin''ny androny rehetra izy ka hahatsiaro ny andro maizina, fa ho maro ireny: izay rehetra ho avy dia zava-poana.'
mg1865::mg_21::11::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Anatra ho an''ny tanora fanahy mba hanampoizany ny hihavian''ny fahanterana sy ny fahafatesana'
  verse_text: 'Mifalia, ry zatovo, dieny mbola tanora ianao; ary aoka ny fonao hampifalifaly anao amin''ny andro fahatanoranao; ka mandehana any amin''izay sitraky ny fonao sy izay jeren''ny masonao; nefa aoka ho fantatrao fa ho entin''Andriamanitra hotsaraina ianao amin''izany rehetra izany.'
mg1865::mg_21::11::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa esory ao am-ponao ny alahelo, ary avilio tsy hikasika ny nofonao ny ratsy; fa ny fahatanorana sy ny fahatanjahana dia samy zava-poana.'
mg1865::mg_21::12::1:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsarovy ny Mpanao anao amin''ny andro fahatanoranao, dieny tsy mbola tonga ny andro mahory, ary tsy mbola mihatra ny taona izay hanaovanao hoe; Tsy sitrako izao;'
mg1865::mg_21::12::2:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dieny tsy mbola maizina ny masoandro sy ny fahazavana sy ny volana sy ny kintana, ary tsy mbola mitambatra indray ny rahona, rehefa latsaka ny ranonorana;'
mg1865::mg_21::12::3:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''izay dia hangovitra ny mpiandry trano, ary hanjoko ny lehilahy matanjaka, ary hitsahatra ny ankizivavy mpitoto, satria efa vitsy ireo, ary ho maizina ny vehivavy mitsirika eo am-baravarankely,'
mg1865::mg_21::12::4:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hirindrina ny varavarana kopa-droa mankeny an-dalambe, rehefa malemy ny feon''ny fikosoham-bary; ary ho taitra ny olona, raha vao maneno ny voronkely*, ary halemy feo ny zazavavy mpihira rehetra; [* Na: ka tsy mafy noho ny an''ny voron-kely aza ny feony]'
mg1865::mg_21::12::5:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary koa, hatahotra ny fiakarana izy, ary toa hisy zava-mahatahotra eny an-dàlana; ary hamony ny hazo amygdala, ary ny valala aza ho tonga mavesatra, ary ny voan-tsimperifery aza tsy hanan-kery intsony* fa mandroso ho any amin''ny tranony mandrakizay ny olona, ary ny mpisaona mandehandeha eny an-dalambe [*Na: hitsaha-panirian-javatra izy]'
mg1865::mg_21::12::6:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dieny tsy mbola mivaha ny kofehy volafotsy, ary tsy mbola vaky ny vilia volamena fitoeran-diloilo, ary tsy mbola rava ny barika eo an-doharano, ary tsy mbola tapaka ny kodia eo an-davaka famorian-drano,'
mg1865::mg_21::12::7:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ny vovoka dia hiverina amin''ny tany ho toy ny teo, fa ny fanahy kosa hiverina amin''Andriamanitra, Izay nanome iny.'
mg1865::mg_21::12::8:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-poana dia zava-poana, hoy Mpitoriteny, eny, zava-poana ny zavatra rehetra!'
mg1865::mg_21::12::9:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Teny farany'
  verse_text: 'Ary koa, satria hendry Mpitoriteny, dia nampianatra ny olona fahalalana izy; eny, nandinika sy nieritreritra ary nandahatra ohabolana maro izy.'
mg1865::mg_21::12::10:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpitoriteny nitady hahita teny mahafinaritra; ary izay mahitsy no voasorany, dia tenin''ny fahamarinana.'
mg1865::mg_21::12::11:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''ny hendry dia toy ny fanindronan-omby sy toy ny hombo voatsatoka, ry mpanangona, omen''ny mpiandry iray izy;'
mg1865::mg_21::12::12:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary he koa, anaka! minoa anatra ianao; fa tsy misy farany ny manao boky maro, ary manasatra ny tena ny fianarana be.'
mg1865::mg_21::12::13:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa re izany rehetra izany, dia izao no faran''ny teny: Andriamanitra no atahory, ary ny didiny no tandremo, fa izany no tokony hataon''ny olona rehetra.'
mg1865::mg_21::12::14:
  verse_version: mg1865
  verse_book: mg_21
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny atao rehetra dia ho entin''Andriamanitra ho amin''ny fitsarana ny* zava-miafina rehetra, na soa na ratsy. [*Na: mbamin''ny]'
