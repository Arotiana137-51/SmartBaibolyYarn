mg1865::mg_40::1::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny filazana ny razan''i Jesoa Kristy'
  verse_text: 'Ny filazana ny razan''i Jesoa Kristy, zanak''i Davida zanak''i Abrahama.'
mg1865::mg_40::1::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Abrahama niteraka an''i Isaka; ary Isaka niteraka an''i Jakoba; ary Jakoba niteraka an''i Joda mirahalahy avy;'
mg1865::mg_40::1::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Joda niteraka an''i Fareza sy Zara tamin''i Tamara; ary Fareza niteraka an''i Hezrona; ary Hezrona niteraka an-dRama*;'
mg1865::mg_40::1::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Rama* niteraka an''i Aminadaba; ary Aminadaba niteraka an''i Nasona; ary Nasona niteraka an''i Salmona; [*Grika: Arama]'
mg1865::mg_40::1::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Salmona niteraka an''i Boaza tamin-dRahaba; ary Boaza niteraka an''i Obeda tamin-dRota; ary Obeda niteraka an''i Jese;'
mg1865::mg_40::1::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jese niteraka an''i Davida mpanjaka. Ary Davida niteraka an''i Solomona tamin''ny vadin''i Oria;'
mg1865::mg_40::1::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Solomona niteraka an-dRehoboama; ary Rehoboama niteraka an''i Abia; ary Abia niteraka an''i Asa*; [*Grika: Asafa]'
mg1865::mg_40::1::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Asa* niteraka an''i Josafata; ary Josafata niteraka an''i Jorama; ary Jorama niteraka an''i Ozia; [*Grika: Asafa]'
mg1865::mg_40::1::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ozia niteraka an''i Jotama; ary Jotama niteraka an''i Ahaza; ary Ahaza niteraka an''i Hezekia;'
mg1865::mg_40::1::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Hezekia niteraka an''i Manase; ary Manase niteraka an''i Amona*; ary Amona* niteraka an''i Josia; [*Grika: Amosa]'
mg1865::mg_40::1::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Josia niteraka an''i Jekonia mirahalahy avy, tamin''ny nifindrana tany Babylona.'
mg1865::mg_40::1::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary taorian''ny nifindrana tany Babylona Jekonia dia niteraka an''i Sealtiela*; ary Sealtiela* niteraka an''i Zerobabela; [*Grika: Salatiela]'
mg1865::mg_40::1::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Zerobabela niteraka an''i Abihoda; ary Abihoda niteraka an''i Eliakima; ary Eliakima niteraka an''i Azora;'
mg1865::mg_40::1::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Azora niteraka an''i Zadoka; ary Zadoka niteraka an''i Akima; ary Akima niteraka an''i Elihoda;'
mg1865::mg_40::1::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Elihoda niteraka an''i Eleazara; ary Eleazara niteraka an''i Matana; ary Matana niteraka an i Jakoba;'
mg1865::mg_40::1::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jakoba niteraka an''i Josefa, vadin''i Maria; ary Maria niteraka an''i Jesoa, Izay atao hoe Kristy.'
mg1865::mg_40::1::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranaka rehetra hatramin''i Abrahama ka hatramin''i Davida dia taranaka efatra ambin''ny folo; ary hatramin''i Davida ka hatramin''ny nifindrana tany Babylona dia taranaka efatra ambin''ny folo; ary hatramin''ny nifindrana tany Babylona ka hatramin''i Kristy dia taranaka efatra ambin''ny folo.'
mg1865::mg_40::1::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nilazan''ny anjely tamin''i Josefa fa ny Fanahy Masina no nanan''i Maria anaka.'
  verse_text: 'Ary ny nahaterahan''i Jesoa Kristy dia toy izao: Rehefa nanaiky Maria, renin''i Jesoa, ho fofombadin''i Josefa, raha tsy mbola nivady izy, dia hita fa nitoe-jaza avy tamin''ny Fanahy Masina izy.'
mg1865::mg_40::1::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josefa vadiny, izay lehilahy marina sady tsy ta-hanala baraka azy, dia nikasa hametraka azy mangingina.'
mg1865::mg_40::1::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola nisaina izany izy, indro, nisy anjelin''ny Tompo niseho taminy tamin''ny nofy ka nanao hoe: Ry Josefa, zanak''i Davida, aza matahotra hampakatra an''i Maria vadinao; fa ny Zaza ao an-kibony dia avy amin''ny Fanahy Masina,'
mg1865::mg_40::1::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hiteraka Zazalahy izy, ary ny anarany hataonao hoe Jesoa*; fa Izy no hamonjy ny olony ho afaka amin''ny fahotany. [*Jesoa = Jehovah no Mpamonjy]'
mg1865::mg_40::1::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany rehetra izany dia tonga mba hahatanteraka izay nampilazain''ny Tompo ny mpaminany* hoe: [*Grika: profeta dia olona voafidin''Andriamanitra ho mpilaza ny teniny]'
mg1865::mg_40::1::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny virijina hitoe-jaza ka hiteraka zazalahy; Ary ny anarany hataon''ny olona hoe Imanoela (Isaia 7:14), izany hoe, raha adika: Amintsika Andriamanitra.'
mg1865::mg_40::1::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josefa, rehefa nahatsiaro tamin''ny torimasony, dia nanao araka izay nandidian''ny anjelin''ny Tompo azy ka nampakatra ny vadiny.'
mg1865::mg_40::1::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nahalala azy izy mandra-piterany Zazalahy; ary ny anarany nataony hoe Jesoa.'
mg1865::mg_40::2::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namangian''ny Magy sasany an''i Jesoa.'
  verse_text: 'Ary rehefa teraka Jesoa tao Betlehema an''i Jodia, tamin''ny andron''i Heroda mpanjaka, indreo, nisy Magy* avy tany atsinanana tonga tany Jerosalema ka nanao hoe: [*Magy = olon-kendry]'
mg1865::mg_40::2::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza Ilay teraka ho Mpanjakan''ny Jiosy? fa nahita ny kintany teny atsinanana izahay ka tonga mba hiankohoka eo anatrehany.'
mg1865::mg_40::2::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany Heroda mpanjaka, dia nangorohoro izy mbamin''i Jerosalema rehetra.'
mg1865::mg_40::2::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namory ny lohan''ny mpisorona rehetra sy ny mpanora-dalàna tamin''ny vahoaka izy ka nanontany azy hoe: Aiza moa no hahaterahan''i Kristy?'
mg1865::mg_40::2::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo taminy: Ao Betlehema an''i Jodia; fa izao no voasoratry ny mpaminany:'
mg1865::mg_40::2::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Betlehema, tanin''ny Joda, tsy dia kely indrindra ao amin''ny andrianan''ny Joda ianao tsy akory; Fa avy ao aminao no hivoahan''izay anankiray ho Mpanapaka, Ka Izy no ho Mpiandry ny Isiraely oloko (Mika 5:1).'
mg1865::mg_40::2::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampaka ny Magy mangingina Heroda ka namototra fatratra taminy izay andro nisehoan''ilay kintana.'
mg1865::mg_40::2::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka azy hankany Betlehema izy ka nanao hoe: Andeha, fotory tsara ny amin''ilay Zazakely; koa rehefa hitanareo Izy, dia ambarao amiko, mba hankanesako any koa hiankohoka eo anatrehany.'
mg1865::mg_40::2::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre ny tenin''ny mpanjaka izy ireo, dia lasa; ary, indro, ilay kintana hitany teny atsinanana nialoha azy mandra-pijanony teo ambonin''izay nitoeran''ny Zazakely.'
mg1865::mg_40::2::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita ny kintana izy, dia nifaly indrindra.'
mg1865::mg_40::2::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tafiditra tao an-trano izy, dia nahita ny Zazakely sy Maria reniny ka niankohoka teo anatrehany; ary nony efa nosokafany ny fitehirizan-drakiny, dia nanolotra zavatra ho Azy izy, dia volamena sy zava-manitra ary miora.'
mg1865::mg_40::2::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa notoroan''Andriamanitra hevitra tamin''ny nofy izy tsy hiverina any amin''i Heroda, dia lalana hafa no nalehany nody ho any amin''ny fonenany.'
mg1865::mg_40::2::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: '2022-12-30T06:26:45+0000'
  verse_title: 'Ny nitondran''i Josefa an''i Jesoa sy Maria nandositra nankany Egypta.'
  verse_text: 'Ary nony efa lasa nandeha ireo, indro, nisy anjelin''ny Tompo niseho tamin''i Josefa tamin''ny nofy ka nanao hoe: Mifohaza ianao, ka ento ny Zazakely sy ny reniny, dia mandosira any Egypta, ary mitoera any ambara-pilazako aminao; fa Heroda efa hitady ny Zazakely hovonoiny.'
mg1865::mg_40::2::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, raha mbola alina, dia lasa nankany Egypta;'
mg1865::mg_40::2::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nitoetra tany izy ambara-pahafatin''i Heroda, mba hahatanteraka izay nampilazain''i Jehovah ny mpaminany hoe: Nantsoiko hiala tany Egypta ny zanako (Hosea 11:1).'
mg1865::mg_40::2::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny nampamonoan''i Heroda ny zazakely tao Betlehema.'
  verse_text: 'Ary nony efa fantatr''i Heroda fa voafitaky ny Magy izy, dia tezitra indrindra izy ka naniraka namono ny zazalahy rehetra hatramin''ny roa taona no ho midina, izay tao Betlehema sy tamin''ny manodidina rehetra, araka ny andro izay nofotorany fatratra tamin''ny Magy.'
mg1865::mg_40::2::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tanteraka izay nampilazaina an''i Jeremia mpaminany hoe:'
mg1865::mg_40::2::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy feo re tao Rama, dia fidradradradrana sy fitomaniana fatratra; Rahely nitomany ny zanany, Ary tsy azo nampiononina izy, satria lany ritra ireny (Jeremia 31:15).'
mg1865::mg_40::2::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny nitondran''i Josefa an''i Jesoa sy Maria niverina tao Nazareta.'
  verse_text: 'Ary rehefa maty Heroda, indro, nisy anjelin''ny Tompo niseho tamin''i Josefa tany Egypta tamin''ny nofy ka nanao hoe:'
mg1865::mg_40::2::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza ianao, ka ento ny Zazakely sy ny reniny, dia mankanesa any amin''ny tanin''ny Isiraely; fa efa maty izay nitady ny ain''ny Zazakely.'
mg1865::mg_40::2::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, dia tonga tany amin''ny tanin''ny Isiraely.'
mg1865::mg_40::2::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa reny fa Arkelaosy no nanjaka tany Jodia nandimby an''i Heroda rainy, dia natahotra hankany izy; ary rehefa notoroan''Andriamanitra hevitra tamin''ny nofy izy, dia lasa nankany amin''ny tany Galilia.'
mg1865::mg_40::2::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany izy, dia nonina tao amin''ny tanàna atao hoe Nazareta, mba hahatanteraka izay nampilazaina ny mpaminany hoe: Hatao hoe Nazarena Izy.'
mg1865::mg_40::3::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nataon''i Jaona Mpanao-batisa.'
  verse_text: 'Ary tamin''izany andro izany dia niseho Jaona Mpanao batisa, nitory tany an''efitr''i Jodia nanao hoe:'
mg1865::mg_40::3::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mibebaha ianareo; fa efa akaiky ny fanjakan''ny lanitra.'
mg1865::mg_40::3::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy no ilay nampilazaina an''Isaia mpaminany hoe: Injany! misy feon''ny miantso mafy any an''efitra hoe: Amboary ny lalan''i Jehovah, Ataovy mahitsy ny lalan-kalehany (Isaia 40:3).'
mg1865::mg_40::3::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fitafian''izany Jaona izany dia lamba volon-drameva, ary fehin-kibo hoditra no tamin''ny valahany; ary ny fihinany dia valala sy tantely remby.'
mg1865::mg_40::3::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jerosalema sy Jodia rehetra mbamin''ny tany rehetra amoron''i i Jordana dia nivoaka nankany amin''i Jaona,'
mg1865::mg_40::3::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nataony batisa tao amin''ny ony Jordana ireny, rehefa niaiky ny fahotany.'
mg1865::mg_40::3::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nahita ny Fariseo sy ny Sadoseo maro nanatona ny batisany izy, dia hoy izy taminy: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy?'
mg1865::mg_40::3::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mamoaza voa miendrika ny fibebahana ianareo;'
mg1865::mg_40::3::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza manao anakampo hoe: Manana an''i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an''i Abrahama avy amin''ireto vato ireto.'
mg1865::mg_40::3::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, efa mipetraka eo amin''ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.'
mg1865::mg_40::3::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia manao batisa anareo amin''ny rano ho amin''ny fibebahana; fa Ilay avy ao aoriako no mahery noho izaho, ka tsy miendrika hitondra ny kapany aza aho; Izy no hanao batisa anareo amin''ny Fanahy Masina sy ny afo;'
mg1865::mg_40::3::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny an-tanany ny fikororohany, ary Izy hanadio tsara ny eo am-pamoloany ka hanangona ny variny ho any an-tsompitra; fa ny akofa sy ny mololo hodorany amin''ny afo tsy mety maty.'
mg1865::mg_40::3::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nanaovan''i Jaona batisa an''i Jesoa.'
  verse_text: 'Ary tamin''izay Jesoa dia avy tany Galilia ka tonga teo amoron''i Jordana, dia nanatona an''i Jaona Izy mba hataony batisa.'
mg1865::mg_40::3::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jaona nandà Azy ka nanao hoe: Izaho no tokony hataonao batisa, ka Ianao indray va no mankaty amiko?'
mg1865::mg_40::3::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly Jesoa ka niteny taminy hoe: Ekeo ihany ankehitriny, fa izao no mety amintsika hahatanteraka ny fahamarinana rehetra. Ka dia nekeny Izy.'
mg1865::mg_40::3::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao natao batisa Jesoa, dia niakatra avy teo amin''ny rano niaraka tamin''izay Izy; ary, indro, nisokatra taminy ny lanitra, ary hitany ny Fanahin''Andriamanitra nidina tahaka ny voromailala ka nankeo amboniny.'
mg1865::mg_40::3::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, injao! nisy feo avy tany an-danitra nanao hoe: Ity no Zanako malalako Izay sitrako.'
mg1865::mg_40::4::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nakan''ny devoly fanahy an''i Jesoa.'
  verse_text: 'Ary Jesoa dia nentin''ny Fanahy nankany an''efitra, mba halain''ny devoly* fanahy. [*Devoly = mpiampanga, na mpanendrikendrika]'
mg1865::mg_40::4::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifady hanina efa-polo andro sy efa-polo alina Izy, koa nony afaka izany, dia noana.'
mg1865::mg_40::4::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona ny mpaka fanahy ka nanao taminy hoe: Raha Zanak''Andriamanitra Ianao, dia teneno ho tonga mofo ireto vato ireto.'
mg1865::mg_40::4::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy kosa namaly ka nanao hoe: Voasoratra hoe: Tsy mofo ihany no hiveloman''ny olona, fa ny teny rehetra izay aloaky ny vavan''Andriamanitra (Deoteronomia 8:3).'
mg1865::mg_40::4::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny devoly nitondra Azy nankany amin''ny tanàna masina ka nampitoetra Azy teo an-tampon ny tempoly,'
mg1865::mg_40::4::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao taminy hoe: Raha Zanak''Andriamanitra Ianao, mianjerà any ambany any; fa voasoratra hoe: Izy handidy ny anjeliny ny aminao; Ary eny an-tanany no hitondran''ireo Anao, fandrao ho tafintohina amin''ny vato ny tongotrao (Salamo 91:11-12).'
mg1865::mg_40::4::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Voasoratra hoe koa: Aza maka fanahy an''i Jehovah Andriamanitrao (Deoteronomia 6:16).'
mg1865::mg_40::4::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny devoly nitondra Azy Indray nankany an-tendrombohitra avo dia avo ka naneho Azy ny fanjakana rehetra amin''izao tontolo izao mbamin''ny voninahiny,'
mg1865::mg_40::4::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao taminy hoe: Izao rehetra izao dia homeko Anao, raha hiankohoka eto anatrehako Ianao.'
mg1865::mg_40::4::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Mandehana ianao, ry Satana: fa voasoratra hoe; Jehovah Andriamanitrao no hiankohofanao, ary Izy irery ihany no hotompoinao (Deoteronomia 6:13).'
mg1865::mg_40::4::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao Azy ny devoly, ary indreo, nisy anjely tonga ka nanompo Azy.'
mg1865::mg_40::4::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tany Galilia.'
  verse_text: 'Ary nony ren''i Jesoa fa efa voasambotra Jaona, dia lasa nankany Galilia Izy.'
mg1865::mg_40::4::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala tany Nazareta Izy, dia nankany Kapernaomy, izay ao amoron-dranomasina, ao amin''ny zara-tanin''ny Zebolona sy ny Naftaly, ka nonina tao Izy,'
mg1865::mg_40::4::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka izay nampilazaina an''Isaia mpaminany hoe:'
mg1865::mg_40::4::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanin''ny Zebolona sy ny tanin''ny Naftaly, Ao amin''ny tany amoron-dranomasina, any an-dafin''i Jordana, Galilia, tanin''ny jentilisa,'
mg1865::mg_40::4::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona izay nitoetra tao amin''ny maizina dia nahita mazava lehibe; Ary izay nitoetra tao amin''ny tany aloky ny fahafatesana no niposahan''ny fahazavana (Isaia 8:23; Isaia 9:1).'
mg1865::mg_40::4::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany dia nanomboka nitori-teny Jesoa ka nanao hoe: Mibebaha ianareo, fa efa akaiky ny fanjakan''ny lanitra.'
mg1865::mg_40::4::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny niantsoan''i Jesoa an''i Petera sy Andrea ary Jakoba sy Jaona.'
  verse_text: 'Ary nony nitsangantsangana teny amoron''ny Ranomasin''i Galilia Jesoa, dia nahita olona mirahalahy, dia Simona, izay atao hoe Petera, sy Andrea rahalahiny, nanarato teny amin''ny ranomasina; fa mpanarato izy.'
mg1865::mg_40::4::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Andeha hanaraka Ahy, fa hataoko mpanarato olona ianareo.'
mg1865::mg_40::4::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao ny harato niaraka tamin''izay izy ka nanaraka Azy.'
mg1865::mg_40::4::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nandroso Izy, dia nahita olona mirahalahy hafa koa, dia Jakoba zanak''i Zebedio, sy Jaona rahalahiny, izay niara-nipetraka tamin''i Zebedio rainy teo an-tsambokely ka namboatra ny haratony; ary niantso azy mirahalahy Izy.'
mg1865::mg_40::4::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao ny sambokely sy ny rainy niaraka tamin''izay izy ka nanaraka Azy.'
mg1865::mg_40::4::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nandehanan''i Jesoa eran''i Galilia nampianatra sy nahasitrana ny marary.'
  verse_text: 'Ary Jesoa nandeha eran''i Galilia ka nampianatra tao amin''ny synagogan''ny olona teo sy nitory ny filazantsaran''ny fanjakana ary nahasitrana ny aretina rehetra mbamin''ny rofy rehetra tamin''ny olona.'
mg1865::mg_40::4::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niely eran''i Syria ny lazany, ka dia nentin''ny olona tany aminy ny marary rehetra, izay azon''ny aretina maro samy hafa sy ny fangirifiriana, dia ny demoniaka* sy izay mararin''ny androbe ary ny mararin''ny paralysisa, ka nahasitrana ireny Izy. [*Demoniaka = olona nidiran''ny demonia; izahao Matio 7:22]'
mg1865::mg_40::4::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanaraka Azy ny vahoaka betsaka avy tany Galilia sy Dekapolisy sy Jerosalema sy Jodia ary ny avy tany an-dafin''i Jordana.'
mg1865::mg_40::5::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tori-teny nataon''i Jesoa Kristy teo an-tendrombohitra.'
  verse_text: 'Ary Jesoa, nony nahita ny vahoaka, dia niakatra teo an-tendrombohitra; ary rehefa tafapetraka Izy, dia nanatona Azy ny mpianany.'
mg1865::mg_40::5::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niloa-bava Izy ka nampianatra azy hoe:'
mg1865::mg_40::5::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny malahelo am-panahy; fa azy ny fanjakan''ny lanitra.'
mg1865::mg_40::5::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: '2022-06-13T18:00:40+0000'
  verse_title: null
  verse_text: 'Sambatra ny ory; fa izy no hampifaliana.'
mg1865::mg_40::5::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny malemy fanahy; fa izy no handova ny tany (Salamo 37:11).'
mg1865::mg_40::5::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny noana sy mangetaheta ny fahamarinana; fa izy no hovokisana.'
mg1865::mg_40::5::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny miantra; fa izy no hiantrana.'
mg1865::mg_40::5::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny madio am-po; fa izy no hahita an''Andriamanitra,'
mg1865::mg_40::5::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny mpampihavana; fa izy no hatao hoe zanak''Andriamanitra.'
mg1865::mg_40::5::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay enjehina noho ny fahamarinana; fa azy ny fanjakan''ny lanitra.'
mg1865::mg_40::5::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ianareo, raha haratsin''ny olona sy enjehiny ary asiany izay teny ratsy rehetra hitenenany lainga anareo noho ny amiko.'
mg1865::mg_40::5::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia sy miravoravoa ianareo, fa lehibe ny valim-pitianareo any an-danitra; fa toy izany ihany no nanenjehany ny mpaminany izay talohanareo.'
mg1865::mg_40::5::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no fanasin''ny tany; fa raha ny fanasina no tonga matsatso, inona indray no hahasira azy? Tsy misy heriny hanaovana na inona na inona intsony izy, fa hariana any ivelany ka hohitsahin''ny olona.'
mg1865::mg_40::5::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no fahazavan''izao tontolo izao. Tsy azo afenina izay tanàna miorina eo an-tampon-tendrombohitra.'
mg1865::mg_40::5::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, tsy misy olona mandrehitra jiro ka mametraka azy ao ambanin''ny vata famarana, fa apetrany eo amin''ny fanaovan-jiro, ka dia mazava amin''izay rehetra ao an-trano izany.'
mg1865::mg_40::5::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hazava eo imason''ny olona toy izany koa ny fahazavanareo, mba hahitany ny asa soa ataonareo ka hankalazany ny Rainareo Izay any an-danitra.'
mg1865::mg_40::5::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ataonareo fa tonga Aho handrava ny lalàna na ny mpaminany; tsy tonga Aho handrava, fa hanatanteraka.'
mg1865::mg_40::5::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo marina tokoa: Mandra-pahafoan''ny lanitra sy ny tany, dia tsy hisy ho foana akory amin''ny lalàna, na dia litera* iray na tendron-tsoratra iray aza, mandra-pahatanterak''izy rehetra. [*Dia yod, izay litera kely indrindra amin''ny Abidy Hebreo]'
mg1865::mg_40::5::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany na zovy na zovy no mamaha ny anankiray amin''ireo didy madinika indrindra ireo ka mampianatra ny olona toy izany, dia hatao hoe kely indrindra amin''ny fanjakan''ny lanitra izy. Fa na zovy na zovy no mankatò sy mampianatra ireo dia izy no hatao hoe lehibe amin''ny fanjakan''ny lanitra.'
mg1865::mg_40::5::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo: Raha tsy mihoatra noho ny an''ny mpanora-dalàna sy ny Fariseo ny fahamarinanareo, dia tsy hiditra amin''ny fanjakan''ny lanitra mihitsy ianareo.'
mg1865::mg_40::5::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renareo fa voalaza tamin''ny ntaolo hoe: Aza mamono olona (Eksodosy 20:13) ary izay mamono olona dia miendrika hohelohina amin''ny fitsarana.'
mg1865::mg_40::5::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra tezitra* amin''ny rahalahiny dia miendrika hohelohina amin''ny fitsarana; ary na zovy na zovy no hanao amin''ny rahalahiny hoe: Olom-poana ianao, dia miendrika hohelohina amin''ny Synedriona; ary na zovy na zovy no hanao hoe: Foka ialahy, dia miendrika ho ao amin''ny helo** mirehitra afo. [*Na: tezitra foana] [**Grika: Gehena]'
mg1865::mg_40::5::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, raha mitondra ny fanatitrao ho eo amin''ny alitara ianao, ary eo no mahatsiaro fa ny rahalahinao manana alahelo aminao,'
mg1865::mg_40::5::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia avelao eo anoloan''ny alitara ny fanatitrao, ka mandehana aloha, ataovy izay hihavananao amin''ny rahalahinao, ary rehefa miverina, dia vao atero ny fanatitrao.'
mg1865::mg_40::5::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihavàna faingana amin''ilay manana ady aminao, raha mbola miara-dia aminy ianao, fandrao ilay manana ady aminao hanolotra anao amin''ny mpitsara, ary ny mpitsara kosa hanolotra anao amin''ny mpamatotra, ka hatao ao an-tranomaizina ianao.'
mg1865::mg_40::5::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminao marina tokoa: Tsy ho afaka ao mihitsy ianao, ambara-pandoanao ny variraiventy farany indrindra.'
mg1865::mg_40::5::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa, renareo fa voalaza hoe: Aza mijangajanga (Eksodosy 20:14).'
mg1865::mg_40::5::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa milaza aminareo fa izay rehetra mijery vehivavy hila azy dia efa nijangajanga taminy tam-pony sahady.'
mg1865::mg_40::5::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny masonao ankavanana no manafintohina* anao, dia esory hiala iny, ka ario ho afaka aminao; fa mahasoa anao na dia very aza ny iray momba ny tenanao, ka tsy ny tenanao rehetra no hariana any amin''ny helo. [*Ny teny Grika adika hoe manafintohina amin''ny Testamenta Vaovao, dia mamandrika no tena dikany]'
mg1865::mg_40::5::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny tananao ankavanana no manafintohina anao, dia tapaho Izy, ka ario ho afaka aminao; fa mahasoa anao na dia very aza ny iray momba ny tenanao, ka tsy ny tenanao rehetra no ho lasa ho any amin''ny helo.'
mg1865::mg_40::5::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voalaza hoe: Na zovy na zovy no misaotra ny vadiny, dia aoka izy hanome an-dravehivavy taratasy fisaoram-bady (Deoteronomia 24:1).'
mg1865::mg_40::5::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra misaotra ny vadiny afa-tsy noho ny fijangajangana ihany dia mampijangajanga azy; ary na zovy na zovy no manambady izay voasaotra, dia mijangajanga.'
mg1865::mg_40::5::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, efa renareo fa voalaza tamin''ny ntaolo hoe: Aza mianian-tsy to, fa efao amin''i Jehovah ny fianiananao (Levitikosy 19:12).'
mg1865::mg_40::5::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa milaza aminareo hoe: Aza mianiana akory na amin''ny lanitra, fa seza fiandrianan''Andriamanitra izany;'
mg1865::mg_40::5::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'na amin''ny tany, fa fitoeran-tongony izany; na amin''i Jerosalema, fa tanànan''ny Mpanjaka lehibe izany.'
mg1865::mg_40::5::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mianiana amin''ny lohanao; fa tsy mahay mahafotsy na mahamainty na dia singam-bolo iray akory aza ianao.'
mg1865::mg_40::5::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aoka ny teninareo ho Eny, eny; Tsia, tsia; fa izay mihoatra noho izany dia avy amin''ny ratsy*. [*Na amin''ilay ratsy]'
mg1865::mg_40::5::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renareo fa voalaza hoe: Maso solon''ny maso, ary nify solon''ny nify (Eksodosy 21:24).'
mg1865::mg_40::5::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa milaza aminareo hoe: Aza manohitra izay manisy ratsy anareo; fa na zovy na zovy no mamely tahamaina ny takolakao ankavanana, atolory azy koa ny anankiray.'
mg1865::mg_40::5::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay te hiady aminao ka ta haka ny akanjonao, dia avelao ho azy koa ny lambanao.'
mg1865::mg_40::5::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na zovy na zovy no hanery anao handeha maily* iray, mandehana miaraka aminy maily roa. [*Na: kilometatra]'
mg1865::mg_40::5::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo izay mangataka aminao; ary aza ilaoza-mihodina izay te hisambotra aminao.'
mg1865::mg_40::5::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renareo fa voalaza hoe: Tiava ny namanao (Levitikosy 19:18), ary mankahalà ny fahavalonao.'
mg1865::mg_40::5::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa milaza aminareo hoe: Tiava ny fahavalonareo, ary mivavaha ho an''izay manenjika anareo,'
mg1865::mg_40::5::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho tonga zanaky ny Rainareo Izay any an-danitra ianareo; fa Izy mampiposaka ny masoandrony amin''ny ratsy fanahy sy ny tsara fanahy ary mampilatsaka ny ranonorana amin''ny marina sy ny tsy marina.'
mg1865::mg_40::5::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izay tia anareo ihany no tianareo, inona no valim-pitia azonareo? Moa na dia ny mpamory hetra aza tsy mba manao izany koa va?'
mg1865::mg_40::5::47:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny rahalahinareo ihany no arahabainareo, inona no ataonareo mihoatra noho ny sasany? Moa na dia ny jentilisa aza tsy mba manao toy izany ihany va?'
mg1865::mg_40::5::48:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 5
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany aoka ho tanteraka ianareo toy ny fahatanterahan''ny Rainareo Izay any an-danitra.'
mg1865::mg_40::6::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo mba tsy hanao ny asan''ny fahamarinanareo* eo imason''ny olona hahitany izany; Fa raha tsy izany, dia tsy manana valim-pitia amin''ny Rainareo Izay any an-danitra ianareo. [*Na: ny fiantrana]'
mg1865::mg_40::6::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, raha manao fiantrana ianao, aza mba mitsoka trompetra eo aloanao tahaka ny fanaon''ny mpihatsaravelatsihy eo amin''ny synagoga sy eny an-dalambe mba hankalazan''ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany.'
mg1865::mg_40::6::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa, raha manao fiantrana, dia aoka tsy ho fantatry ny tananao ankavia izay ataon''ny tananao ankavanana,'
mg1865::mg_40::6::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hatao ao amin''ny mangingina ny fiantranao; ary ny Rainao, Izay mahita ao amin''ny mangingina, no hamaly anao.'
mg1865::mg_40::6::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mivavaka ianareo, aza mba ho tahaka ny mpihatsaravelatsihy; Fa izy tia ny mivavaka mitsangana eo amin''ny synagoga sy eo anjoron-dalana hahitan''ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany.'
mg1865::mg_40::6::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa, raha mivavaka, dia midira ao amin''ny efi-tranonao, ka rehefa voarindrinao ny varavaranao, dia mivavaha amin''ny Rainao, Izay ao amin''ny mangingina; ary ny Rainao, Izay mahita ao amin''ny mangingina no hamaly anao.'
mg1865::mg_40::6::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mivavaka ianareo, dia aza mba manao teny maro foana tahaka ny jentilisa; Fa ataony ho ny hamaroan''ny teniny no hihainoana azy.'
mg1865::mg_40::6::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza manahaka azy ianareo; fa fantatry ny Rainareo izay tokony ho anareo, raha tsy mbola mangataka aminy aza ianareo.'
mg1865::mg_40::6::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany mivavaha toy izao ianareo: Rainay Izay any an-danitra, hohamasinina anie ny anaranao.'
mg1865::mg_40::6::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tonga anie ny fanjakanao. Hatao anie ny sitraponao ety an-tany tahaka ny any an-danitra.'
mg1865::mg_40::6::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo anay anio izay hanina sahaza ho anay.'
mg1865::mg_40::6::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mamelà ny helokay* tahaka ny namelanay izay meloka** taminay. [*Na: trosa] [**Na:nitrosa]'
mg1865::mg_40::6::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mitondra anay ho amin''ny fakam-panahy, fa manafaha anay amin''ny* ratsy**. [*Na: amin''ilay] [** Ampio hoe: Fa Anao ny fanjakana sy ny hery ary ny voninahitra mandrakizay. Amena]'
mg1865::mg_40::6::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mamela ny fahadisoan''ny olona ianareo, dia mba hamela ny anareo kosa ny Rainareo Izay any an-danitra.'
mg1865::mg_40::6::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mamela ny fahadisoan''ny olona ianareo, dia tsy hamela ny fahadisoanareo ny Rainareo.'
mg1865::mg_40::6::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mifady hanina ianareo, aza mety ho tahaka ny mpihatsaravelatsihy, izay malahelo tarehy; fa mampisotisoty ny tavany izy mba ho hitan''ny olona fa mifady. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany.'
mg1865::mg_40::6::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa, raha mifady hanina, dia hosory ny lohanao, ary sasao ny tavanao,'
mg1865::mg_40::6::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy ho hitan''ny olona fa mifady, fa ho hitan''ny Rainao, Izay ao amin''ny mangingina; ary ny Rainao, Izay mahita ao amin''ny mangingina, no hamaly anao.'
mg1865::mg_40::6::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihary harena ho anareo eto an-tany, izay misy kalalao sy harafesina manimba, sady misy mpangalatra manami-trano sy mangalatra.'
mg1865::mg_40::6::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miharia harena ho anareo any an-danitra, izay tsy misy kalalao na harafesina manimba, sady tsy misy mpangalatra manamitrano na mangalatra.'
mg1865::mg_40::6::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay itoeran''ny harenao, dia ho any koa ny fonao.'
mg1865::mg_40::6::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maso no jiron''ny tena; koa amin''izany, raha tsara ny masonao, dia hazava avokoa ny tenanao rehetra.'
mg1865::mg_40::6::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ratsy ny masonao, dia ho maizina avokoa ny tenanao rehetra; koa raha maizina ny fahazavana ao anatinao, manao ahoana ny halehiben''izany fahamaizinana izany!'
mg1865::mg_40::6::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy olona mahay manompo tompo roa; fa ny anankiray ho halany, ary ny anankiray ho tiany; na ny anankiray hombany, ary ny anankiray hohamavoiny. Tsy mahay manompo an''Andriamanitra sy Mamòna* ianareo. [*Mamòna = harena]'
mg1865::mg_40::6::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia lazaiko aminareo hoe: Aza manahy ny amin''ny ainareo, dia izay hohaninareo na izay hosotroinareo, na ny amin''ny tenanareo, dia izay hotafinareo. Moa ny aina tsy mihoatra noho ny hanina va, ary ny tena noho ny fitafiana?'
mg1865::mg_40::6::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsinjovy ny voro-manidina, fa tsy mba mamafy, na mijinja, na mitaona ho any an-tsompitra ireny; ary ny Rainareo Izay any an-danitra mamelona azy. Moa tsy mihoatra lavitra noho ireny va ianareo?'
mg1865::mg_40::6::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza ao aminareo, na dia manahy aza, no mahay manampy ny andro hiainany* na dia kely monja** aza? [*Na: Ny halavan''ny tenany] [** Grika: Hakiho iray]'
mg1865::mg_40::6::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana no manahy ny amin''ny fitafiana ianareo? Diniho tsara ny fanirin''ny voninkazo* any an-tsaha; tsy mba miasa na mamoly ireny; [*Karazan''ny lilia]'
mg1865::mg_40::6::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa lazaiko aminareo fa na dia Solomona tao amin''ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin''ireny.'
mg1865::mg_40::6::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny ahitra any an-tsaha, izay any ihany anio ka hatsipy ao am-patana rahampitso, no ampitafin''Andriamanitra toy izany, tsy mainka va ianareo, ry kely finoana?'
mg1865::mg_40::6::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aza manahy ianareo ka manao hoe: Inona no hohaninay? na: Inona no hosotroinay? na: Inona no hotafinay?'
mg1865::mg_40::6::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany rehetra izany dia katsahin''ny jentilisa fatratra; fa fantatry ny Rainareo Izay any an-danitra fa tokony ho anareo izany rehetra izany.'
mg1865::mg_40::6::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa katsaho aloha ny fanjakany sy ny fahamarinany, dia hanampy ho anareo izany rehetra izany.'
mg1865::mg_40::6::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia aza manahy ny amin''ny ampitso ianareo; fa ny ampitso hanahy ny azy. Ampy ho an''ny andro ny ratsy miseho ao aminy.'
mg1865::mg_40::7::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitsara, mba tsy hotsaraina ianareo.'
mg1865::mg_40::7::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa araka ny fitsarana ataonareo no hitsarana anareo; ary araka ny ohatra ataonareo no hanoharana ho anareo.'
mg1865::mg_40::7::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana ianao no mijery ny sombin-kazo eo amin''ny mason''ny rahalahinao, fa ny andry eo amin''ny masonao dia tsy mba tsaroanao?'
mg1865::mg_40::7::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ahoana no hilazanao amin''ny rahalahinao hoe: Aoka aho hanaisotra ny sombin-kazo eo amin''ny masonao; nefa, indro, ny andry eo amin''ny masonao?'
mg1865::mg_40::7::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mpihatsaravelatsihy, esory aloha ny andry eo amin''ny masonao, ary amin''izay vao ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin''ny mason''ny rahalahinao.'
mg1865::mg_40::7::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: '2022-05-23T05:15:24+0000'
  verse_title: null
  verse_text: 'Aza omena ny alika izay masina; ary aza atsipy eo anoloan''ny kisoa ny vatosoanareo*, fandrao hanitsaka azy izy, dia hifotitra ka hamiravira anareo. [*perilanareo]'
mg1865::mg_40::7::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataha, dia homena ianareo; mitadiava, dia hahita ianareo; dondony, dia hovohana ianareo.'
mg1865::mg_40::7::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana.'
mg1865::mg_40::7::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza moa aminareo, raha angatahan''ny zanany mofo, no hanome azy vato?'
mg1865::mg_40::7::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha angatahany hazandrano, no hanome azy menarana?'
mg1865::mg_40::7::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ianareo, na dia ratsy aza, mahalala hanome zava-tsoa ho an''ny zanakareo, tsy mainka va ny Rainareo Izay any an-danitra no hanome zava-tsoa ho an''izay mangataka aminy?'
mg1865::mg_40::7::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany na inona na inona tianareo hataon''ny olona aminareo, dia mba ataovy aminy kosa tahaka izany; fa izany no lalàna sy mpaminany.'
mg1865::mg_40::7::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midira amin''ny vavahady èty ianareo; fa lehibe ny vavahady, ary malalaka ny làlana izay mankany amin''ny fahaverezana, ka maro ny miditra any.'
mg1865::mg_40::7::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ety ny vavahady, ary tery ny lalana izay mankany amin''ny fiainana, ka vitsy ny mahita azy.'
mg1865::mg_40::7::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema ianareo, fandrao ho voafitaky ny mpaminany sandoka, izay mankao aminareo amin''ny fitafian''ny ondry, fa ao anatiny dia amboadia* mitoha izy. [*lopa]'
mg1865::mg_40::7::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voany no hahafantaranareo azy. Manoty voaloboka amin''ny tsilo va ny olona, na aviavy amin''ny songosongo?'
mg1865::mg_40::7::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany, ny hazo tsara rehetra dia mamoa voa tsara; fa ny hazo ratsy rehetra dia mamoa voa ratsy.'
mg1865::mg_40::7::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hazo tsara tsy mety mamoa voa ratsy, ary ny hazo ratsy tsy mety mamoa voa tsara.'
mg1865::mg_40::7::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.'
mg1865::mg_40::7::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ny voany no hahafantaranareo azy.'
mg1865::mg_40::7::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izay rehetra manao amiko hoe: Tompoko, Tompoko, no hiditra amin''ny fanjakan''ny lanitra, fa izay manao ny sitrapon''ny Raiko Izay any an-danitra.'
mg1865::mg_40::7::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no hanao amiko amin''izany andro izany hoe: Tompoko, Tompoko, tsy efa naminany tamin''ny anaranao va izahay? ary tsy efa namoaka demonia* tamin''ny anaranao va izahay? Ary tsy efa nanao asa lehibe maro tamin''ny anaranao va izahay? [*Demonia = fanahy ratsy, na anjely ratsy]'
mg1865::mg_40::7::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hambarako aminy marimarina hoe: Tsy mba fantatro akory ianareo hatrizay hatrizay; mialà amiko, ianareo mpanao meloka.'
mg1865::mg_40::7::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany na zovy na zovy no mandre izany teniko izany ka mankatò azy, dia hoharina amin''ny lehilahy manan-tsaina izy, izay nanorina ny tranony teo ambonin''ny vatolampy.'
mg1865::mg_40::7::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary latsaka ny ranonorana, ka nisy riaka be, sady nifofofofo ny rivotra ka namely izany trano izany; nefa tsy nianjera izy, satria efa naorina teo ambonin''ny vatolampy.'
mg1865::mg_40::7::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra mandre izany teniko izany, nefa tsy mankatò azy, dia hoharina amin''ny lehilahy adala, izay nanorina ny tranony teo ambonin''ny fasika.'
mg1865::mg_40::7::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary latsaka ny ranonorana, ka nisy riaka be, sady nifofofofo ny rivotra ka namely izany trano izany; dia nianjera izy, ka loza ny fianjerany.'
mg1865::mg_40::7::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa vitan''i Jesoa izany teny izany, dia talanjona ny vahoaka noho ny fampianarany,'
mg1865::mg_40::7::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria nampianatra azy toy izay manana fahefana Izy, fa tsy tahaka ny mpanora-dalàna teo aminy.'
mg1865::mg_40::8::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay boka.'
  verse_text: 'Ary raha nidina avy teo an-tendrombohitra Izy, dia nisy vahoaka betsaka nanaraka Azy.'
mg1865::mg_40::8::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy boka anankiray nanatona dia niankohoka teo anatrehany ka nanao hoe: Tompoko o, raha mety Ianao, dia mahay manadio ahy.'
mg1865::mg_40::8::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa naninjitra ny tanany, dia nanendry azy ka nanao hoe: Mety Aho; madiova ianao. Dia nadio tamin''ny habokany niaraka tamin''izay izy.'
mg1865::mg_40::8::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Tandremo mba tsy hilaza amin''olona na dia iray akory aza ianao; fa mandehana, misehoa amin''ny mpisorona, ka mitondrà ny fanatitra izay nandidian''i Mosesy ho vavolombelona amin''ireo.'
mg1865::mg_40::8::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny mpanompon''ilay kapiteny.'
  verse_text: 'Ary nony tonga tao Kapernaomy Jesoa, dia nisy kapiteny anankiray nankao aminy ka nitaraina taminy'
mg1865::mg_40::8::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao hoe: Tompoko o, ny ankizilahiko mandry ao an-trano, mararin''ny paralysisa ka mijaly loatra.'
mg1865::mg_40::8::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Ho avy Aho hahasitrana azy.'
mg1865::mg_40::8::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly ilay kapiteny ka nanao hoe: Tompoko, tsy miendrika hidiranao ao ambanin''ny tafon-tranoko aho; fa mitenena ihany, dia ho sitrana ny ankizilahiko.'
mg1865::mg_40::8::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho koa mba lehilahy manan-dehibe ihany ka manana miaramila izay feheziko; ary raha hoy izaho amin''ny anankiray: Mandehana, dia mandeha izy; ary amin''ny anankiray koa: Avia, dia avy izy; ary amin''ny andevolahiko: Ataovy izao, dia manao izy.'
mg1865::mg_40::8::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahare izany Jesoa, dia gaga ka niteny tamin''izay nanaraka Azy hoe: Lazaiko aminareo marina tokoa fa tsy mbola nahita finoana lehibe toy izany Aho na dia tamin''ny Isiraely aza.'
mg1865::mg_40::8::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko aminareo fa maro ny avy any atsinanana sy any andrefana no ho tonga ka hipetraka hiara-mihinana amin''i Abrahama sy Isaka ary Jakoba any amin''ny fanjakan''ny lanitra;'
mg1865::mg_40::8::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny zanaky ny fanjakana dia hariana amin''ny maizina any ivelany; any no hisy ny fitomaniana sy ny fikitroha-nify.'
mg1865::mg_40::8::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niteny tamin''ilay kapiteny hoe: Mandehana; tongava aminao araka ny ninoanao. Dia sitrana tamin''izany ora izany ilay ankizilahy.'
mg1865::mg_40::8::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny rafozambavin''i Petera mbamin''ny olona maro koa.'
  verse_text: 'Ary Jesoa, nony niditra tao an-tranon''i Petera, dia nahita ny rafozam-bavin''i Petera nandry teo nanavin''ny tazo.'
mg1865::mg_40::8::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanendry ny tanany Izy, dia niala taminy ny tazo; dia nitsangana ravehivavy ka nanompo Azy.'
mg1865::mg_40::8::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hariva ny andro, dia nentin''ny olona tany aminy ny demoniaka maro; ary ny teniny ihany no namoahany ny fanahy ratsy, ary izay narary rehetra dia nositraniny avokoa,'
mg1865::mg_40::8::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba, hahatanteraka izay nampilazaina an''Isaia mpaminany hoe: Izy naka ny rofintsika sy nitondra ny aretintsika (Isaia 53:4).'
mg1865::mg_40::8::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny teny nataon''i Jesoa tamin''ny lehilahy roa izay nikasa hanaraka Azy.'
  verse_text: 'Ary Jesoa, nony nahita ny vahoaka betsaka manodidina Ary, dia nanome teny hiala ho eny am-pita.'
mg1865::mg_40::8::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatona ny mpanora-dalàna anankiray ka nanao taminy hoe: Mpampianatra o, hanaraka Anao aho na aiza na aiza no halehanao.'
mg1865::mg_40::8::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy : Ny amboahaolo* manan-davaka; ary ny voro-manidina manana fialofana; fa ny Zanak''olona tsy mba manana izay hipetrahan''ny lohany. [*volpa]'
mg1865::mg_40::8::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy hafa koa tamin''ny mpianatra niteny taminy hoe: Tompoko, aoka aho aloha handeha handevina ny raiko.'
mg1865::mg_40::8::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Manaraha Ahy; ary aoka ny maty handevina ny maty ao aminy.'
mg1865::mg_40::8::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nampitsaharan''i Jesoa ny tafio-drivotra.'
  verse_text: 'Ary nony niondrana an-tsambokely Izy, dia nanaraka Azy ny mpianany.'
mg1865::mg_40::8::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy tafio-drivotra mafy tonga tamin''ny ranomasina, ka dia efa nila ho voasafotry ny alon-drano ny sambokely; fa Izy natory.'
mg1865::mg_40::8::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatona izy ireo, dia namoha Azy ka nanao hoe: Tompoko, vonjeo, fa maty izahay!'
mg1865::mg_40::8::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Nahoana no saro-tahotra ianareo, ry kely finoana? Dia nitsangana Izy, ka noteneniny mafy ny rivotra sy ny ranomasina, dia tonga tony tsara ny andro.'
mg1865::mg_40::8::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary talanjona ny olona ka nanao hoe: Lehilahy manao ahoana re Io, fa ny rivotra sy ny ranomasina aza dia manaiky Azy!'
mg1865::mg_40::8::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Ny namoahan''i Jesoa demonia maro tamin''izy roa lahy teo amin''ny tanin''ny Gadarena.'
  verse_text: 'Ary nony tonga teny am-pita teo amin''ny tanin''ny Gadarena Izy, dia nifanena taminy ny demoniaka roa lahy, nivoaka avy teny amin''ny fasana, sady masiaka loatra, ka tsy nisy olona nahazo nandalo tamin''izany lalana izany.'
mg1865::mg_40::8::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, niantso izy ka nanao hoe: Moa mifaninona akory izahay sy Ianao, ry Zanak''Andriamanitra o? Tonga eto va Ianao hampijaly anay alohan''ny fotoana?'
mg1865::mg_40::8::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy kisoa maro andiany iray nihinana teny lavidavitra azy teny.'
mg1865::mg_40::8::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny demonia nifona tamin''i Jesoa ka nanao hoe: Raha avoakanao ary izahay, dia iraho hankany anatin''ireo kisoa andiany ireo.'
mg1865::mg_40::8::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Mandehana. Dia nivoaka ireo, ka lasa nankany anatin''ny kisoa; ary, indreny, ny kisoa andiany rehetra nitratrevatreva teny amin''ny hantsana ho any amin''ny ranomasina, ka dia maty tany anatin''ny rano.'
mg1865::mg_40::8::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiandry nandositra, dia nankany an-tanàna ka nilaza ny zavatra rehetra ny amin''ireo demoniaka.'
mg1865::mg_40::8::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, nivoaka ny tao an-tanàna rehetra mba hitsena an''i Jesoa; ka nony nahita Azy izy, dia nifona taminy mba hiala amin''ny faritaniny.'
mg1865::mg_40::9::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niverenan''i Jesoa tany Galilia, sy ny nahasitranany ny lehilahy nararin''ny paralysisa.'
  verse_text: 'Ary niondrana an-tsambokely Izy, dia nita ka tonga tao an-tanànany.'
mg1865::mg_40::9::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy lehilahy anankiray mararin''ny paralysisa nandry tamin''ny fandriana nentin''ny olona teo aminy; ary Jesoa, nony nahita ny finoan''ireo, dia nanao tamin''ilay mararin''ny paralysisa hoe: Matokia, anaka; voavela ny helokao.'
mg1865::mg_40::9::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, ny mpanora-dalàna sasany nanao anakampo hoe: Miteny ratsy* ity Lehilahy ity. [*Grika: manao blasfemia, dia miteny ratsy, indrindra fa ny amin''Andriamanitra, na mihambo hanana izay fomban''Andriamanitra]'
mg1865::mg_40::9::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nahafantatra ny eritreriny, dia nanao hoe: Nahoana ianareo no mieritreri-dratsy ao am-ponareo?'
mg1865::mg_40::9::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa no moramora kokoa, ny manao hoe va: Voavela ny helokao, sa ny manao hoe: Mitsangàna, ka mandehana?'
mg1865::mg_40::9::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba ho fantatrareo fa ny Zanak''olona manana fahefana eto ambonin''ny tany hamela heloka (dia hoy Izy tamin''ilay mararin''ny paralysisa): Mitsangàna, betao ny fandrianao, ka modia any an-tranonao.'
mg1865::mg_40::9::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana izy ka lasa nody tany an-tranony.'
mg1865::mg_40::9::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka, raha nahita izany, dia raiki-tahotra ka nankalaza an''Andriamanitra, Izay nanome ny olona fahefana toy izany.'
mg1865::mg_40::9::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny niantsoana an''i Matio, sy ny fanasana nataony tao an-tranony, ary ny tori-teny nataon''i Jesoa ny amin''ny fifadian-kanina.'
  verse_text: 'Ary nony niala teo Jesoa, dia nahita lehilahy atao hoe Matio nipetraka teo am-pamorian-ketra*, ka hoy Izy taminy; Andeha hanaraka Ahy. Dia nitsangana Matio ka nanaraka Azy. [*Dia ny hetra sy ny fadin-tseranana, etc]'
mg1865::mg_40::9::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nipetraka nihinana tao an-trano Izy, indreo, nisy mpanota sy mpamory hetra maro tonga ka niara-nipetraka tamin''i Jesoa mbamin''ny mpianany.'
mg1865::mg_40::9::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo, raha nahita izany, dia niteny tamin''ny mpianatra hoe: Nahoana kosa ny Mpampianatra anareo no miara-komana amin''ny mpamory hetra sy ny mpanota?'
mg1865::mg_40::9::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahare izany Jesoa, dia nanao hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary.'
mg1865::mg_40::9::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandehana ka mianara izay hevitry ny teny hoe: Famindram-po no sitrako, fa tsy fanatitra alatsa-drà (Hosea 6:6) fa tsy tonga hiantso ny marina Aho, fa ny mpanota.'
mg1865::mg_40::9::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''i Jesoa ny mpianatr''i Jaona ka nanao hoe: Nahoana izahay sy ny Fariseo no mifady hanina matetika, fa ny mpianatrao kosa tsy mba mifady?'
mg1865::mg_40::9::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Moa mahay misaona va ny havan''ny mpampakatra, raha mbola ao aminy ihany ny mpampakatra? fa ho avy ny andro izay hanesorana ny mpampakatra hiala aminy, dia amin''izay vao hifady izy.'
mg1865::mg_40::9::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy olona manampina lamba tonta amin''ny tapa-damba tsy mbola voalàna; fa ny vaovao izay natampina dia handrovitra ny lamba, ka hitatra ny triatra.'
mg1865::mg_40::9::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy manisy divay vaovao ao anaty siny hoditra tonta; raha izany, dia ho triatra ny siny hoditra, ka ho raraka ny divay, sady ho simba ny siny hoditra; fa ny siny hoditra vaovao no asian''ny olona divay vaovao, dia miara-maharitra izy roroa.'
mg1865::mg_40::9::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay vehivavy narary roa ambin''ny folo taona, sy ny nananganany ny zakavavin''i Jairo tamin''ny maty.'
  verse_text: 'Raha mbola nilaza izany taminy Izy, indro, tonga ny mpanapaka anankiray, dia niankohoka teo anatrehany ka nanao hoe: Maty ankehitriny izao ny zanako-vavy; fa andeha re, mametraha ny tananao aminy, dia ho velona izy.'
mg1865::mg_40::9::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana nanaraka azy Jesoa mbamin''ny mpianany.'
mg1865::mg_40::9::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy vehivavy anankiray, izay efa narary* roa ambin''ny folo taona, nankeo ivohony ka nanendry ny somotraviavin-dambany. [*Grika: narary nandeha rà]'
mg1865::mg_40::9::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy anakampony: Na dia ny lambany ihany aza no ho voatendriko, dia ho sitrana* aho. [*Na: voavonjy]'
mg1865::mg_40::9::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nihodina ka nahita azy, dia nanao hoe: Matokia, ry zanako-vavy, ny finoanao no efa nahasitrana* anao. Dia sitrana** ilay vehivavy tamin''izay ora izay. *Na: namonjy. [*Na: voavonjy]'
mg1865::mg_40::9::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa, nony niditra tao an-tranon''ilay mpanapaka ka nahita ny mpitsoka sodina sy ny vahoaka nitabataba,'
mg1865::mg_40::9::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao hoe: Mivoaha; fa tsy maty razazavavy, fa matory. Dia nihomehy Azy fatratra ny olona.'
mg1865::mg_40::9::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa navoaka ny olona, dia niditra Jesoa ka nandray ny tanan-drazazavavy, dia nitsangana izy.'
mg1865::mg_40::9::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lazan''izany dia niely tamin''izany tany rehetra izany.'
mg1865::mg_40::9::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny nampahiratan''i Jesoa ny jamba roa lahy.'
  verse_text: 'Ary nony niala teo Jesoa, dia nisy jamba roa lahy nanaraka Azy sady niantsoantso hoe: Mamindrà fo aminay, ry Zanak''i Davida o!'
mg1865::mg_40::9::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niditra tao an-trano Izy, dia nanatona Azy ireo jamba; ary hoy Jesoa taminy: Mino va ianareo fa mahay manao izany Aho? Hoy izy taminy: Eny, Tompoko.'
mg1865::mg_40::9::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanendry ny masony Izy ka nanao hoe: Tongava aminareo araka ny finoanareo.'
mg1865::mg_40::9::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahiratra ny masony; ary Jesoa namepetra azy mafy ka nanao hoe: Tandremo mba tsy ho fantatr''olona izao.'
mg1865::mg_40::9::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony niala teo izy roa lahy, dia nampiely ny lazany tamin''izany tany rehetra izany.'
mg1865::mg_40::9::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Ny nampitenenan''i Jesoa ny lehilahy moana anankiray izay demoniaka.'
  verse_text: 'Ary rehefa nivoaka ireo, dia indro, nisy lehilahy moana anankiray izay demoniaka nentin''ny olona tany amin''i Jesoa.'
mg1865::mg_40::9::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa navoaka ny demonia, dia niteny ilay moana; ary gaga ny vahoaka ka nanao hoe: Tsy mbola nisy niseho toy izao tamin''ny Isiraely.'
mg1865::mg_40::9::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Fariseo kosa nanao hoe: Ny lohan''ny demonia no amoahany ny demonia.'
mg1865::mg_40::9::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny nandehanan''i Jesoa nampianatra tany Galilia, sy ny niantsoany ny Apostoly roa ambin''ny folo lahy, ary ny teny nomeny azy.'
  verse_text: 'Ary Jesoa nandeha nitety ny tanàna rehetra sy ny vohitra, nampianatra tao amin''ny synagoga sy nitory ny filazantsaran''ny fanjakana ary nahasitrana ny aretina rehetra mbamin''ny rofy rehetra.'
mg1865::mg_40::9::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita ny vahoaka Jesoa, dia nahonena Azy ny fijeriny ireo, satria nampahantraina ireo ka nafoy toy ny ondry tsy misy mpiandry.'
mg1865::mg_40::9::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamin''ny mpianany:'
mg1865::mg_40::9::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 9
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be ny vokatra, fa ny mpiasa no vitsy; koa amin''izany mangataha amin''ny Tompon''ny vokatra mba hampandehanany mpiasa hamory ny vokatra.'
mg1865::mg_40::10::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niantso ny mpianany roa ambin''ny folo lahy hankeo aminy ka nanome azy fahefana hamoaka fanahy maloto sy hahasitrana ny aretina rehetra mbamin''ny rofy rehetra.'
mg1865::mg_40::10::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny Apostoly roa ambin''ny folo lahy: Ny voalohany, Simona, izay atao hoe Petera, dia Andrea rahalahiny; Jakoba, zanak''i Zebedio, sy Jaona rahalahiny;'
mg1865::mg_40::10::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Filipo sy Bartolomeo; Tomasy sy Matio mpamory hetra; Jakoba, zanak''i Alfeo,'
mg1865::mg_40::10::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Tadeo; Simona Kananeana* ary Jodasy Iskariota, ilay namadika Azy. [*Na: Zelota, izahao Lioka 6:15]'
mg1865::mg_40::10::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo roa ambin''ny folo lahy ireo dia nirahin''i Jesoa ka nodidiany hoe: Aza mandeha any amin''ny lalan''ny jentilisa, ary aza miakatra amin''izay tanànan''ny Samaritana,'
mg1865::mg_40::10::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa aleo mankany amin''ny ondry very amin''ny taranak''isiraely.'
mg1865::mg_40::10::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mandeha ianareo, dia mitoria hoe: Efa mby akaiky ny fanjakan''ny lanitra.'
mg1865::mg_40::10::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sitrano ny marary, atsangano ny maty, diovy ny boka, avoahy ny demonia; efa nahazo maimaimpoana ianareo, koa manomeza maimaimpoana.'
mg1865::mg_40::10::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitady volamena, na volafotsy, na varahina, ho ao anatin''ny fehin-kibonareo,'
mg1865::mg_40::10::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'na kitapom-batsy ho amin''izay haleha, na akanjo roa, na kapa na tehina; fa ny mpiasa dia miendrika hahazo ny haniny.'
mg1865::mg_40::10::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay tanàna na vohitra hiakaranareo, dia fantaro tsara izay miendrika ao; ka mitoera ao aminy mandra-pialanareo.'
mg1865::mg_40::10::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao miditra ao amin''ny trano ianareo, dia miarahabà ny ao.'
mg1865::mg_40::10::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha miendrika ny ao an-trano, dia aoka ho ao aminy ny fiadanana tononinareo; fa raha tsy miendrika izy, dia aoka hiverina aminareo ny fiadanana voatononareo.'
mg1865::mg_40::10::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay tsy hampandroso anareo, na tsy hihaino ny teninareo, raha miala amin''izany trano na tanàna izany ianareo, dia ahintsano ny vovoka amin''ny tongotrareo.'
mg1865::mg_40::10::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa fa ho moramora kokoa ny ho amin''ny tany Sodoma sy Gomora amin''ny andro fitsarana noho ny ho amin''izany tanàna izany.'
mg1865::mg_40::10::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho maniraka anareo ho tahaka ny ondry ao ampovoan''ny amboadia*; koa hendre tahaka ny menarana, ary morà** tahaka ny voromailala. [*lopa] [** Grika: aoka ho tsotra]'
mg1865::mg_40::10::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitandrema ianareo noho ny amin''ny olona; fa hatolony ho amin''ny Synedriona sy hokapohiny ao amin''ny synagogany ianareo;'
mg1865::mg_40::10::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho entiny eo anatrehan''ny mpanapaka sy ny mpanjaka ianareo noho ny amiko, ho vavolombelona aminy sy amin''ny jentilisa.'
mg1865::mg_40::10::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manolotra anareo izy, dia aza manahy ny amin''izay fomba hitenenanareo, na izay holazainareo; Fa homena anareo amin''izany ora izany izay holazainareo.'
mg1865::mg_40::10::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ianareo no miteny, fa ny Fanahin''ny Rainareo no miteny ao anatinareo.'
mg1865::mg_40::10::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahy hanolotra ny rahalahiny mba ho faty, ary ny ray hanolotra ny zanany; ary ny zanaka hitsangana hanohitra ny rainy sy ny reniny ka hahafaty azy.'
mg1865::mg_40::10::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho halan''ny olona rehetra ianareo noho ny anarako; fa izay maharitra hatramin''ny farany no hovonjena.'
mg1865::mg_40::10::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manenjika anareo amin''ny tanàna anankiray ny olona dia mandosira ho any amin''ny hafa; fa lazaiko aminareo marina tokoa: Tsy hahatapitra ny tanànan''ny Isiraely ianareo tsy akory mandra-pahatongan''ny Zanak''olona.'
mg1865::mg_40::10::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpianatra tsy mihoatra noho ny mpampianatra, na ny mpanompo noho ny tompony.'
mg1865::mg_40::10::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ampy amin''ny mpianatra, raha tonga tahaka ny mpampianatra azy, ary ny mpanompo, raha tonga tahaka ny tompony. Raha ny tompon-trano no nataony hoe Belzeboba, tsy mainka va ny ankohonany?'
mg1865::mg_40::10::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany aza matahotra azy ianareo; fa tsy misy afenina izay tsy haseho, na takona izay tsy ho fantatra.'
mg1865::mg_40::10::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay lazaiko aminareo ao amin''ny maizina, dia ambarao eo amin''ny mazava, ary izay ren''ny sofinareo, dia torio eo ambonin''ny tampon-trano.'
mg1865::mg_40::10::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza matahotra izay mamono ny tena, nefa tsy mahay mamono ny fanahy; fa aleo matahotra Izay mahay mahavery ny fanahy sy ny tena ao amin''ny helo*. [*Grika: gehena]'
mg1865::mg_40::10::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy varidimiventy* ihany va no vidin''ny tsintsina roa? nefa tsy misy na dia iray akory aza amin''ireny ho latsaka amin''ny tany, raha tsy avelan''ny Rainareo. [*Grika: asaria, izay ampahafolon''ny denaria]'
mg1865::mg_40::10::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ny volon-dohanareo aza dia voaisa avokoa.'
mg1865::mg_40::10::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza matahotra; fa mihoatra noho ny tsintsina maro ianareo.'
mg1865::mg_40::10::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany na zovy na zovy no hanaiky Ahy eo anatrehan''ny olona, dia hekeko kosa izy eo anatrehan''ny Raiko Izay any an-danitra.'
mg1865::mg_40::10::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na zovy na zovy no handà Ahy eo anatrehan''ny olona, dia holaviko kosa izy eo anatrehan''ny Raiko Izay any an-danitra.'
mg1865::mg_40::10::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza ataonareo fa tonga hitondra fiadanana ambonin''ny tany Aho; tsy tonga hitondra fiadanana Aho, fa sabatra.'
mg1865::mg_40::10::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga Aho hampifandrafy olona amin''ny rainy, ary ny zanakavavy amin''ny reniny, ary ny vinantovavy amin''ny rafozanivavy;'
mg1865::mg_40::10::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny ankohonan''ny olona ihany no fahavalony (Mika 7:6).'
mg1865::mg_40::10::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia ray na reny mihoatra noho ny fitiavany Ahy dia tsy miendrika ho Ahy, ary izay tia ny zananilahy na ny zananivavy mihoatra noho ny fitiavany Ahy dia tsy miendrika ho Ahy.'
mg1865::mg_40::10::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay tsy mitondra* ny hazo fijaliany ka tsy manaraka Ahy dia tsy miendrika ho Ahy. [*Grika: mandray]'
mg1865::mg_40::10::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamonjy ny ainy no hamery azy; ary izay mamery ny ainy noho ny amiko dia hahazo azy.'
mg1865::mg_40::10::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandray anareo dia mandray Ahy; ary izay mandray Ahy dia mandray Izay naniraka Ahy.'
mg1865::mg_40::10::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandray mpaminany, satria mpaminany izy, dia handray ny valim-pitian''ny mpaminany; ary izay mandray olona marina, satria olona marina izy, dia handray ny valim-pitian''ny olona marina.'
mg1865::mg_40::10::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 10
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na zovy na zovy no manome rano mangatsiaka na dia eran''ny kapoaka ihany aza hosotroin''ny anankiray amin''ireo madinika ireo, satria mpianatra izy, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.'
mg1865::mg_40::11::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vitan''i Jesoa ny nandidiany ny mpianany roa ambin''ny folo lahy, dia niala teo Izy hampianatra sy hitoriteny any an-tanànan''ny olona.'
mg1865::mg_40::11::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny nanirahan''i Jaona Mpanao-batisa tany amin''i Jesoa, sy ny teny nataon''i Jesoa tamin''izany.'
  verse_text: 'Ary rehefa ren''i Jaona tao an-tranomaizina ny asa nataon''i Kristy, dia naniraka ny mpianany izy'
mg1865::mg_40::11::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'hanao aminy hoe: Ianao va Ilay ho avy, sa mbola hafa no andrasantsika?'
mg1865::mg_40::11::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Mandehana ianareo, ka ambarao amin''i Jaona izao renareo sy hitanareo izao:'
mg1865::mg_40::11::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahiratra ny jamba, ary afaka ny mandringa; diovina ny boka, ary malady ny marenina; atsangana ny maty, ary ny malahelo dia itoriana ny filazantsara.'
mg1865::mg_40::11::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sambatra izay tsy ho tafintohina noho ny amiko.'
mg1865::mg_40::11::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony lasa ireny, dia vao nilaza an''i Jaona tamin''ny vahoaka Jesoa ka nanao hoe: Hizaha inona no nivoahanareo nankany an''efitra? Volotara nohozongozonin''ny rivotra va?'
mg1865::mg_40::11::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sa hizaha inona no nivoahanareo? Olona mitafy soa* va? Indro, ny mitafy soa* dia ao an-tranon''ny mpanjaka. [*Grika: malemy]'
mg1865::mg_40::11::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sa hizaha inona no nivoahanareo? Mpaminany va? Eny, hoy Izaho aminareo, sady mihoatra lavitra noho ny mpaminany izy.'
mg1865::mg_40::11::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no ilay voasoratra hoe: Indro, Izaho maniraka ny irako hialoha Anao, Izay hamboatra ny lalanao eo alohanao (Malakia 3:1).'
mg1865::mg_40::11::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Amin''izay nateraky ny vehivavy tsy mbola nisy nitsangana izay lehibe noho Jaona Mpanao batisa; nefa ny kely indrindra amin''ny fanjakan''ny lanitra dia lehibe noho izy.'
mg1865::mg_40::11::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''ny andron''i Jaona Mpanao batisa ka mandraka ankehitriny ny fanjakan''ny lanitra dia rombahina, ary ny mpandrombaka maka azy an-keriny.'
mg1865::mg_40::11::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpaminany rehetra sy ny lalàna dia naminany hatramin''i Jaona.'
mg1865::mg_40::11::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mety mandray ianareo, dia izy no ilay Elia izay ho avy.'
mg1865::mg_40::11::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.'
mg1865::mg_40::11::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny inona no hanoharako ity taranaka ity? Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay miantso ny namany ka manao hoe:'
mg1865::mg_40::11::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nitsoka sodina taminareo izahay, nefa tsy nandihy ianareo, efa nanao feo fisaonana izahay, nefa tsy niteha-tratra ianareo.'
mg1865::mg_40::11::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga Jaona tsy nihinana na nisotro, ka hoy ny olona: Manana demonia izy.'
mg1865::mg_40::11::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga ny Zanak''olona mihinana sy misotro kosa, ka hoy ny olona: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan''ny mpamory hetra sy ny mpanota. Fa ny fahendrena dia hamarinin ny asany*. [*Na: (ny zanany)]'
mg1865::mg_40::11::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny nitenenan''i Jesoa mafy ny tanàna izay efa nanaovany fahagagana maro.'
  verse_text: 'Ary tamin''izany dia vao niteny mafy ny tanàna izay nanaovany ny ankamaroan''ny asany lehibe Izy, satria tsy nibebaka ireo, ka nanao hoe:'
mg1865::mg_40::11::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! fa raha mba tany Tyro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho efa nibebaka ela tamin''ny lamba fisaonana sy ny lavenona ireny.'
mg1865::mg_40::11::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo fa ho moramora kokoa ny ho amin''i Tyro sy Sidona amin''ny andro fitsarana noho ny ho aminareo.'
mg1865::mg_40::11::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Hietry hatrany amin''ny fiainan-tsy hita* ianao; fa raha mba tany Sodoma no natao ny asa lehibe izay natao teo aminao, dia ho naharitra ambaraka androany izy.'
mg1865::mg_40::11::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo fa ho moramora kokoa ny ho amin''ny tany Sodoma amin''ny andro fitsarana noho ny ho aminao.'
mg1865::mg_40::11::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany dia namaly Jesoa ka nanao hoe: Midera Anao Aho, Raiko, Tompon''ny lanitra sy ny tany, fa nafeninao tamin''ny hendry sy ny manan-tsaina izany zavatra izany ka nasehonao tamin''ny zaza madinika.'
mg1865::mg_40::11::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Raiko; fa izany no sitraponao.'
mg1865::mg_40::11::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra rehetra natolotry ny Raiko Ahy; ary tsy misy mahalala tsara ny Zanaka, afa-tsy ny Ray; ary tsy misy mahalala tsara ny Ray, afa-tsy Zanaka sy izay tian''ny Zanaka hanehoana Azy.'
mg1865::mg_40::11::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa aty amiko, ianareo rehetra izay miasa fatratra sy mavesatra entana, fa Izaho no hanome anareo fitsaharana.'
mg1865::mg_40::11::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ento ny ziogako, ka mianara amiko; fa malemy fanahy sady tsy miavona am-po Aho; dia hahita fitsaharana ho an''ny fanahinareo ianareo.'
mg1865::mg_40::11::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mora ny ziogako, ary maivana ny entako.'
mg1865::mg_40::12::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanotazan''ny mpianatra salohimbary tamin''ny Sabata, sy ny naninian''ny Fariseo azy.'
  verse_text: 'Tamin''izany andro izany Jesoa nandeha namaky ny tanimbary tamin''ny Sabata; ary noana ny mpianany ka nanoty salohim-bary, dia nihinana.'
mg1865::mg_40::12::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nahita izany ny Fariseo, dia hoy izy taminy: Indro, ny mpianatrao manao izay tsy mety hatao amin''ny Sabata.'
mg1865::mg_40::12::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Tsy mbola novakinareo va ny teny milaza ilay nataon''i Davida, raha noana izy mbamin''izay nanaraka azy,'
mg1865::mg_40::12::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niditra tao amin''ny tranon''Andriamanitra izy ka nihinana ny mofo aseho, izay nahadiso raha haniny, na izay nanaraka azy, afa-tsy ny mpisorona ihany?'
mg1865::mg_40::12::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mbola novakinareo ao amin''ny lalàna va fa amin''ny Sabata ny mpisorona ao amin''ny tempoly manota ny Sabata, nefa tsy manan-tsiny?'
mg1865::mg_40::12::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia lazaiko aminareo fa misy eto lehibe noho ny tempoly.'
mg1865::mg_40::12::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha fantatrareo izay hevitry ny teny hoe: Famindram-po no sitrako, fa tsy fanatitra alatsa-drà (Hosea 6:6), dia tsy mba nanameloka ny tsy manan-tsiny ianareo.'
mg1865::mg_40::12::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Tompon''ny Sabata ny Zanak''olona.'
mg1865::mg_40::12::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny lehilahy anankiray maty tànana tamin''ny Sabata, sy ny fahatezeran''ny Fariseo noho izany.'
  verse_text: 'Ary nony niala teo Jesoa, dia niditra tao amin''ny synagoga;'
mg1865::mg_40::12::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary, indro, nisy lehilahy maty* tanana teo. Ary ny olona nanontany Azy hoe: Mety va ny mahasitrana amin''ny Sabata? mba hiampangany Azy. [*Grika: efa maina, na malazo]'
mg1865::mg_40::12::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Iza moa no olona ao aminareo, raha manana ondry anankiray, ka latsaka any an-kady amin''ny Sabata, no tsy handray azy sy hampakatra azy?'
mg1865::mg_40::12::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mihoatra lavitra noho ny ondry va ny olona? Koa amin''izany dia mety ny manao soa amin''ny Sabata.'
mg1865::mg_40::12::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamin-dralehilahy: Ahinjiro ny tananao. Dia nahinjiny ka sitrana ho tahaka ny anankiray.'
mg1865::mg_40::12::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo dia lasa nivoaka ka niara-nisaina mba hahafaty Azy.'
mg1865::mg_40::12::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nahalala izany, ka dia niala teo. Ary nisy olona betsaka nanaraka Azy, ka dia nositraniny avokoa izy rehetra;'
mg1865::mg_40::12::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nandrara azy Izy tsy hanao izay hahafantarana Azy,'
mg1865::mg_40::12::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka izay nampilazaina an''Isaia mpaminany hoe:'
mg1865::mg_40::12::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny Mpanompoko, Izay nofidiko, Ny Malalako, Izay sitraky ny foko indrindra; Hapetrako ao aminy ny Fanahiko, Ary hitory ny rariny amin''ny jentilisa Izy;'
mg1865::mg_40::12::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hifanditra, na hiantso mafy Izy; Ary tsy hisy handre ny feony any an-dàlana;'
mg1865::mg_40::12::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hotapahiny ny volotara torotoro, Ary tsy hovonoiny ny lahin-jiro manetona, Ambara-pamoakany ny rariny ho mpandresy;'
mg1865::mg_40::12::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anarany no hitokian''ny jentilisa (Isaia 42:1-4).'
mg1865::mg_40::12::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny demoniaka anankiray, sy ny namaliany ny teny ratsy nataon''ny Fariseo.'
  verse_text: 'Dia nentina tany amin''i Jesoa ny lehilahy anankiray izay demoniaka, sady jamba no moana; dia nositraniny, ka dia niteny sy nahita ilay moana.'
mg1865::mg_40::12::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona ny vahoaka rehetra ka nanao hoe: Moa Ity va Ilay Zanak''i Davida?'
mg1865::mg_40::12::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony ren''ny Fariseo izany, dia hoy izy: Tsy misy amoahan''ilehiny ny demonia, afa-tsy Belzeboba, lohan''ny demonia.'
mg1865::mg_40::12::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nahalala ny eritreriny, dia nanao taminy hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary tsy haharitra ny tanàna rehetra, na ny trano, izay miady an-trano.'
mg1865::mg_40::12::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Satana no mamoaka an''i Satana, dia miady an-trano izy; ka ahoana no haharetan''ny fanjakany?'
mg1865::mg_40::12::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Belzeboba no amoahako ny demonia, iza kosa no mba amoahan''ny zanakareo azy? ary noho izany dia izy ihany no ho mpitsara anareo.'
mg1865::mg_40::12::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny Fanahin''Andriamanitra kosa no amoahako ny demonia, dia efa tonga aminareo sahady ny fanjakan''Andriamanitra.'
mg1865::mg_40::12::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hataon''ny olona ahoana no fiditra ao an-tranon''ny mahery handroba ny entany, raha tsy afatony aloha ny mahery? dia vao handroba ny ao an-tranony izy.'
mg1865::mg_40::12::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia manahaka.'
mg1865::mg_40::12::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia lazaiko aminareo hoe: Hahazo famelan-keloka ny olona amin''ny ota sy fitenenan-dratsy* samy hafa rehetra; fa tsy hahazo famelan-keloka ny olona amin''ny fitenenan-dratsy* ny Fanahy Masina. [*Grika:blasfemia, izahao Matio 9:3]'
mg1865::mg_40::12::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza no manao teny hanohitra ny Zanak''olona, dia hahazo famelan-keloka ihany; fa na iza na iza no miteny hanohitra ny Fanahy Masina, dia tsy mba hahazo famelan-keloka, na amin''izao fiainana izao, na amin''ny ho avy.'
mg1865::mg_40::12::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ataovy tsara ny hazo mbamin''ny voany, na ataovy ratsy ny hazo mbamin''ny voany; fa ny voany no ahafantarana ny hazo.'
mg1865::mg_40::12::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry taranaky ny menarana! hataonareo, izay ratsy fanahy, ahoana no fahay miteny zavatra tsara? fa avy amin''ny haben''ny ao am-po no itenenan''ny vava.'
mg1865::mg_40::12::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rakitra tsara no amoahan''ny olona tsara fanahy zavatra tsara; ary ny rakitra ratsy kosa no amoahan''ny olona ratsy fanahy zavatra ratsy.'
mg1865::mg_40::12::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko aminareo fa hampamoahina ny olona amin''ny andro fitsarana noho ny amin''ny teny foana rehetra izay ataony.'
mg1865::mg_40::12::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny teninao no hanamarinana anao, ary ny teninao no hanamelohana anao.'
mg1865::mg_40::12::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny nitadiavan''ny mpanora-dalàna sy ny Fariseo famantarana, sy ny navalin''i Jesoa azy.'
  verse_text: 'Ary tamin''izany ny sasany tamin''ny mpanora-dalàna sy ny Fariseo namaly Azy ka nanao hoe: Mpampianatra o, ta-hahita famantarana avy aminao izahay.'
mg1865::mg_40::12::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly ka nanao taminy hoe: Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy hisy famantarana homena azy, afa-tsy famantarana ny amin''i Jona mpaminany;'
mg1865::mg_40::12::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tahaka ny nitoeran''i Jona hateloan''andro sy hateloan''alina tao an-kibon''ny hazandrano lehibe, dia toy izany no hitoeran''ny Zanak''olona hateloan''Andro sy hateloan''alina ao anatin''ny tany.'
mg1865::mg_40::12::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tany Ninive hiara-mitsangana amin''ity taranaka ity amin''ny andro fitsarana ka hanameloka azy; fa nibebaka izy tamin''ny nitorian''i Jona teny; nefa, indro, misy lehibe noho Jona eto.'
mg1865::mg_40::12::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjakavavy avy tany atsimo hiara-mitsangana amin''ity taranaka ity amin''ny andro fitsarana ka hanameloka azy; fa avy tany amin''ny faran''ny tany izy hihaino ny fahendren''i Solomona; nefa, indro, misy lehibe noho Solomona eto.'
mg1865::mg_40::12::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoaka amin''ny olona ny fanahy maloto, dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana, fa tsy mahita.'
mg1865::mg_40::12::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Hody any amin''ny tranoko izay nivoahako aho; ary nony tonga izy, dia hitany fa foana ny trano sady voafafa no voavoatra.'
mg1865::mg_40::12::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia mandeha izy ka mitondra fanahy fito hafa koa miaraka aminy izay ratsy noho izy; dia miditra ireo ka mitoetra ao; ary ny faran''izany olona izany dia tonga ratsy noho ny voalohany. Ary dia tahaka izany koa no ho amin''ity taranaka ratsy fanahy ity.'
mg1865::mg_40::12::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 46
  verse_date_revised: null
  verse_title: 'Ny nitadiavan''ny renin''i Jesoa sy ny rahalahiny Azy.'
  verse_text: 'Ary raha mbola niteny tamin''ny vahoaka Jesoa, indreo, ny reniny mbamin''ny rahalahiny nijanona teo ala-trano nitady hiteny aminy.'
mg1865::mg_40::12::47:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anankiray nanao taminy hoe: Indreo, ny reninao mbamin''ny rahalahinao mijanona ato ala-trano mitady hiteny aminao.'
mg1865::mg_40::12::48:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly Izy ka nanao tamin''ilay nilaza taminy hoe: Iza moa no reniko, ary iza no rahalahiko?'
mg1865::mg_40::12::49:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naninjitra ny tanany nanondro ny mpianany Izy ka nanao hoe: Indreo ny reniko sy ny rahalahiko;'
mg1865::mg_40::12::50:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 12
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no hanao ny sitrapon''ny Raiko Izay any an-danitra, dia izy no rahalahiko sy anabaviko ary reniko.'
mg1865::mg_40::13::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana fito nataon''i Jesoa.'
  verse_text: 'Ary tamin''izany andro izany dia nivoaka avy tao an-trano Jesoa ka nipetraka teo amoron''ny ranomasina.'
mg1865::mg_40::13::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vahoaka betsaka tafangona teo aminy, dia niditra teo an-tsambokely Izy ka nipetraka; ary ny vahoaka rehetra kosa dia teny amoron-dranomasina.'
mg1865::mg_40::13::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nilaza zavatra maro taminy tamin''ny fanoharana Izy ka nanao hoe: Indro, nivoaka ny mpamafy mba hamafy;'
mg1865::mg_40::13::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana; dia avy ny vorona ka nandany azy.'
mg1865::mg_40::13::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tany marivo ambony vatolampy; dia nalaky nitrebona ireny, satria tsy nisy tany lalina.'
mg1865::mg_40::13::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa niposaka ny masoandro, dia nalazo ireny, ary satria tsy nanam-paka, dia maty izy.'
mg1865::mg_40::13::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo naniry ka nangeja azy.'
mg1865::mg_40::13::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, dia namoa: ny sasany avy zato heny, ary ny sasany avy enim-polo heny, ary ny sasany avy telo-polo heny.'
mg1865::mg_40::13::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina*, aoka izy hihaino. [*Na: (Izay manan-tsofina ho enti-mihaino)]'
mg1865::mg_40::13::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanatona ny mpianany ka nanao taminy hoe: Nahoana no fanoharana no itenenanao aminy?'
mg1865::mg_40::13::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly Izy ka nanao taminy hoe: Satria ianareo no navela* hahalala ny zava-miafina ny amin''ny fanjakan''ny lanitra, fa ireny kosa tsy mba navela**. [*Grika: nomena] [** Grika: nomena]'
mg1865::mg_40::13::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manana no homena, ka hanana be dia be izy; fa izay tsy manana kosa, na izay ananany aza dia hesorina aminy.'
mg1865::mg_40::13::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia fanoharana no itenenako aminy: satria mijery izy, fa tsy mahita; ary mandre izy, fa tsy mihaino, na mahalala.'
mg1865::mg_40::13::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tanteraka aminy ny faminanian''Isaia, izay manao hoe: Handre mandrakariva ihany ianareo, fa tsy hahafantatra: Ary hijery mandrakariva ihany ianareo, fa tsy hahita;'
mg1865::mg_40::13::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa adala ny fon''izao olona izao. Ary efa lalodalovana ny sofiny, Ary efa nakimpiny ny masony, Fandrao hahita ny masony, Sy handre ny sofiny, Ka hahalala ny fony, Dia hibebaka izy, Ka hahasitrana azy Aho. (Isaia 6:9-10).'
mg1865::mg_40::13::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sambatra ny masonareo, fa mahita, ary ny sofinareo, fa mandre.'
mg1865::mg_40::13::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo marina tokoa fa maro ny mpaminany sy ny olona marina naniry hahita izay hitanareo, nefa tsy mba nahita; ary naniry handre izay renareo, nefa tsy mba nandre.'
mg1865::mg_40::13::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany dia henoinareo ny fanoharana ny amin''ny mpamafy:'
mg1865::mg_40::13::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mandre ny tenin''ny fanjakana, fa tsy mahalala, dia avy ilay ratsy ka manaisotra izay nafafy tao am-pony. Dia izany no ilay nafafy teny amoron-dalana.'
mg1865::mg_40::13::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay nafafy teny amin''ny tany marivo ambony vatolampy dia izay mandre ny teny ka malaky mandray azy amin''ny hafaliana;'
mg1865::mg_40::13::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa tsy manam-paka ao anatiny izy, fa maharitra vetivety foana; koa raha avy izay fahoriana na fanenjehana noho ny teny, dia malaky tafintohina izy.'
mg1865::mg_40::13::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay nafafy teny amin''ny tsilo dia izay mandre ny teny ary ny fiahiahiana izao fiainana izao sy ny fitaky ny harena mangeja ny teny, ka dia tsy mamoa izy.'
mg1865::mg_40::13::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay nafafy teny amin''ny tany tsara kosa dia izay mandre ny teny ka mahalala; dia izy no mamoa ka vokatra: ny sasany avy zato heny ary ny sasany avy enim-polo heny, ary ny sasany avy telo-polo heny.'
mg1865::mg_40::13::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fanoharana hafa koa taminy Izy ka nanao hoe: Ny fanjakan''ny lanitra dia tahaka ny lehilahy anankiray izay namafy voa tsara tany an-tanimbariny;'
mg1865::mg_40::13::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha natory ny olona, dia avy ny fahavalony ka namafy voan-tsimparifary teny amin''ny vary, dia lasa nandeha.'
mg1865::mg_40::13::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa naniry ny vary ka niteraka dia niposaka koa ny tsimparifary.'
mg1865::mg_40::13::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy ny mpanompon-dralehilahy ka nanao taminy hoe: Tompoko, tsy voa tsara va no nafafinao tany an-tanimbarinao? koa avy taiza kosa ny tsimparifary? Dia hoy izy taminy:'
mg1865::mg_40::13::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavalo no nanao izany. Ary ny mpanompony nanao taminy hoe: Koa tianao va handehananay hanongotra sy hanangona azy?'
mg1865::mg_40::13::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Tsia, fandrao, raha manongotra ny tsimparifary ianareo, dia hongotanareo miaraka aminy koa ny vary.'
mg1865::mg_40::13::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ihany hiara-maniry izy roroa ambara-pihavin''ny fararano; ary amin''ny fararano dia holazaiko amin''ny mpijinja hoe: Angony aloha ny tsimparifary, ka ataovy amboarany mba hodorana; fa ny vary dia taomy ho any an-tsompitro.'
mg1865::mg_40::13::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fanoharana hafa koa taminy Izy ka nanao hoe: Ny fanjakan''ny lanitra dia tahaka ny voan-tsinapy izay nalain''olona ka nafafiny tany an-tsahany;'
mg1865::mg_40::13::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa kely noho ny voa rehetra izy, kanefa rehefa maniry, dia lehibe noho ny anana ka tonga hazo, dia avy ny voro-manidina ka mitoetra ao amin''ny rantsany.'
mg1865::mg_40::13::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fanoharana hafa koa taminy Izy hoe: Ny fanjakan''ny lanitra dia tahaka ny masirasira, izay nalain''ny vehivavy anankiray ka nataony* tao amin''ny koba intelon''ny famarana, mandra-pahazon''ny masirasira azy rehetra. [*Grika: nafeniny]'
mg1865::mg_40::13::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fanoharana no nilazan''i Jesoa izany zavatra rehetra izany tamin''ny vahoaka, ary tsy nisy nolazainy taminy, afa-tsy tamin''ny fanoharana,'
mg1865::mg_40::13::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka izay nampilazaina ny mpaminany hoe: Hiloa-bava hilaza fanoharana Aho; Hanambara zavatra izay nafenina hatrizay nanorenana izao tontolo izao Aho (Salamo 78:2).'
mg1865::mg_40::13::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nampody ny vahoaka Jesoa, dia niditra tao an-trano Izy, ary ny mpianany nankao aminy ka nanao hoe: Lazao aminay ny hevitry ny fanoharana ny amin''ny tsimparifary tany an-tanimbary.'
mg1865::mg_40::13::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly Izy ka nanao hoe: Ny mpamafy ny voa tsara dia ny Zanak''olona;'
mg1865::mg_40::13::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ny zanaky ny fanjakana; ny tsimparifary dia ny zanak''ilay ratsy;'
mg1865::mg_40::13::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahavalo izay namafy izany dia ny devoly; ny fararano dia ny fahataperan''izao tontolo izao; ary ny mpijinja dia anjely.'
mg1865::mg_40::13::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tahaka ny anangonana ny tsimparifary sy andoroana azy amin''ny afo, dia toy izany no hatao amin''ny fahataperan''izao tontolo izao.'
mg1865::mg_40::13::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Zanak''olona haniraka ny anjeliny, ary ireny dia hanangona ka hamoaka amin''ny fanjakany ny zavatra mahatafintohina rehetra mbamin''izay manao meloka,'
mg1865::mg_40::13::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanipy azy any amin''ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify.'
mg1865::mg_40::13::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany ny marina dia hamirapiratra tahaka ny masoandro any amin''ny fanjakan''ny Rainy. Izay manan-tsofina*, aoka izy hihaino. [*Na: (Izay manan-tsofina ho enti-mihaino)]'
mg1865::mg_40::13::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanjakan''ny lanitra dia tahaka ny harena nafenina tany an-tsaha, izay hitan''olona, ka dia nafeniny; ary noho ny hafaliany dia lasa nandeha izy ka nivarotra ny fananany rehetra, dia nividy izany saha izany.'
mg1865::mg_40::13::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny fanjakan''ny lanitra dia tahaka ny mpandranto anankiray izay nikatsaka vato soa*; [*Grika:perila]'
mg1865::mg_40::13::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa nahita vato soa* iray saro-bidy izy, dia lasa nivarotra ny fananany rehetra ka nividy azy. [*Grika: perila]'
mg1865::mg_40::13::47:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny fanjakan''ny lanitra dia tahaka ny harato-tarihina, izay nalatsaka tao amin''ny ranomasina ka nahavory ny samy hafa karazana rehetra;'
mg1865::mg_40::13::48:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa feno izany, dia notarihiny ho eny an-tanety, dia nipetraka ny olona ka nifantina ny tsara hataony ao an-karona, fa ny ratsy nariany.'
mg1865::mg_40::13::49:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany no hatao amin''ny fahataperan''izao tontolo izao; hivoaka ny anjely ka hanavaka ny ratsy fanahy hisaraka amin''ny marina,'
mg1865::mg_40::13::50:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hatsipiny any amin''ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify.'
mg1865::mg_40::13::51:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa azonareo va izany rehetra izany? Hoy ireo taminy: Eny.'
mg1865::mg_40::13::52:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy taminy: Koa amin''izany ary ny mpanora-dalàna rehetra izay nampianarina ho amin''ny fanjakan''ny lanitra dia samy tahaka ny tompon-trano, izay mamoaka avy amin''ny firaketany zava-baovao sy ela.'
mg1865::mg_40::13::53:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 53
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa tany tamin''ny taniny, sy ny tsi-finoan''ny olona Azy.'
  verse_text: 'Ary rehefa vitan''i Jesoa ireo fanoharana ireo, dia niala teo Izy.'
mg1865::mg_40::13::54:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany amin''ny taniny Izy, dia nampianatra ny olona tao amin''ny synagoga, ary talanjona ny olona ka nanao hoe: Avy taiza re no nahazoan''ilehity izany fahendrena sy asa lehibe izany?'
mg1865::mg_40::13::55:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Ilehity va ilay Zanaky ny mpandrafitra? Tsy Maria va no anaran''ny reniny? Ary tsy Jakoba sy Josefa sy Simona ary Jodasy va no rahalahiny?'
mg1865::mg_40::13::56:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anabaviny, moa tsy eto amintsika avokoa va izy? Koa avy taiza no nahazoan''ilehity izany zavatra rehetra izany?'
mg1865::mg_40::13::57:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tafintohina taminy izy. Fa hoy Jesoa taminy: Tsy misy mpaminany tsy hajaina, afa-tsy amin''ny taniny sy ny mpianakaviny ihany.'
mg1865::mg_40::13::58:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 13
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nanao asa lehibe maro teo Izy noho ny tsy finoan''ireo.'
mg1865::mg_40::14::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Heroda sy Jaona Mpanao-batisa.'
  verse_text: 'Tamin''izany andro izany Heroda mpanapaka nandre ny lazan''i Jesoa,'
mg1865::mg_40::14::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy izy tamin''ny mpanompony: Jaona Mpanao batisa izay; efa nitsangana tamin''ny maty izy, koa izany no ananany hery hanao izany asa lehibe izany.'
mg1865::mg_40::14::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Heroda efa nisambotra an''i Jaona, dia namatotra azy ka nanao azy tao an-tranomaizina, noho ny tamin''i Herodiasy, vadin''i Filipo rahalahiny.'
mg1865::mg_40::14::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jaona efa nilaza taminy hoe: Diso ianao, raha manambady azy.'
mg1865::mg_40::14::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Heroda naniry hamono azy, saingy natahotra ny vahoaka izy, satria nataon''ireo ho mpaminany Jaona.'
mg1865::mg_40::14::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony tonga ny fitsingerenan''ny taona nahaterahan''i Heroda, dia nandihy teo anatrehany ny zanakavavin''i Herodiasy ka nahafaly an''i Heroda.'
mg1865::mg_40::14::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia nianiana izy fa hanome azy izay hangatahiny na inona na inona.'
mg1865::mg_40::14::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nomen-dreniny saina razazavavy, dia nanao hoe: Omeo ahy eto an-dovia ny lohan''i Jaona Mpanao batisa.'
mg1865::mg_40::14::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalahelo ny mpanjaka; kanefa noho ny fianianany sy ny olona izay niara-nipetraka nihinana teo aminy, dia nandidy ihany izy mba homena izany.'
mg1865::mg_40::14::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia naniraka hanapaka ny lohan''i Jaona tao an-tranomaizina izy.'
mg1865::mg_40::14::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentina an-dovia ny lohany ka nomena ilay zazavavy; ary izy nitondra azy ho ao amin-dreniny.'
mg1865::mg_40::14::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy ny mpianany, dia naka ny faty ka nandevina azy; ary dia lasa izy ka nilaza tamin''i Jesoa.'
mg1865::mg_40::14::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nampihinanan''i Jesoa ny olona tsy omby dimy arivo.'
  verse_text: 'Ary nony nandre izany Jesoa, dia niondrana an-tsambokely niala teo handeha hitokana any an-tany foana; ary raha nandre izany ny vahoaka, dia niala teny amin''ny tanàna maro izy ka nandeha an-tanety* nanaraka Azy. [*Na: nandeha tongotra]'
mg1865::mg_40::14::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nivoaka Jesoa, dia nahita vahoaka betsaka, ary onena azy ka nahasitrana ny marariny.'
mg1865::mg_40::14::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hariva ny andro, dia nanatona Azy ny mpianatra ka nanao hoe: Tany foana ity, ary efa hariva ny andro izao; ravao ny vahoaka, mba hankanesany eny amin''ny vohitra hividy hanina ho azy.'
mg1865::mg_40::14::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Tsy tokony handeha izy; omeonareo hanina izy.'
mg1865::mg_40::14::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpianany taminy: Tsy misy aty aminay, afa-tsy mofo dimy sy hazandrano roa.'
mg1865::mg_40::14::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Ento eto amiko izany.'
mg1865::mg_40::14::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasainy nipetraka teny ambonin''ny ahitra ny vahoaka, ary noraisiny ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy ka nisaotra; ary nony efa novakiny ny mofo, dia natolony ny mpianatra, ary ny mpianatra kosa nanolotra ho an''ny vahoaka.'
mg1865::mg_40::14::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihinana avokoa izy rehetra, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka dia nahafeno harona roa ambin''ny folo.'
mg1865::mg_40::14::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nihinana dia tokony ho dimy arivo lahy, afa-tsy ny zaza amim-behivavy.'
mg1865::mg_40::14::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nanery ny mpianatra hiondrana an-tsambokely Jesoa ka hita eo alohany ho eny am-pita mandra-pandràvany ny vahoaka.'
mg1865::mg_40::14::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa noravany ny vahoaka, dia niakatra tao an-tendrombohitra Izy mba hitokana hivavaka; ary nony hariva ny andro, dia nitoetra irery teo Izy.'
mg1865::mg_40::14::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nitsangatsanganan''i Jesoa teny ambonin''ny ranomasina.'
  verse_text: 'Ary efa mby teo ampovoan''ny ranomasina ny sambokely tamin''izay, dia natopatopan''ny alon-drano izy, fa notohain''ny rivotra.'
mg1865::mg_40::14::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fiambenana fahefatra amin''ny alina dia nankeny amin''ny mpianany Jesoa, nitsangantsangana teny ambonin''ny ranomasina.'
mg1865::mg_40::14::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita Azy nitsangantsangana tambonin''ny ranomasina ny mpianatra, dia raiki-tahotra ka nanao hoe: Matoatoa io; dia niantso izy noho ny tahotra.'
mg1865::mg_40::14::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niteny taminy niaraka tamin''izay hoe: Matokia, fa Izaho ihany, aza matahotra.'
mg1865::mg_40::14::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera namaly Azy ka nanao hoe: Tompoko, raha Ianao ihany, dia asaovy manatona Anao eny ambonin''ny rano aho.'
mg1865::mg_40::14::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Manatona. Dia nidina niala tamin''ny sambokely Petera ka nandeha tambonin''ny rano hanatona an''i Jesoa.'
mg1865::mg_40::14::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nahita ny rivotra* izy, dia natahotra, ary raha vao nilentika izy, dia niantso hoe: Tompo o, vonjeo aho! [*Na: (rivotra mahery)]'
mg1865::mg_40::14::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naninjitra ny tanany niaraka tamin''izay Jesoa, dia nandray azy ka nanao taminy hoe: Ry kely finoana, nahoana no niahanahana ianao?'
mg1865::mg_40::14::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niakatra teo an-tsambokely izy, dia nitsahatra ny rivotra.'
mg1865::mg_40::14::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay teo an-tsambokely dia niankohoka teo anatrehany ka nanao hoe: Zanak''Andriamanitra tokoa Ianao.'
mg1865::mg_40::14::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafita izy, dia tonga teo an-tanety, any Genesareta.'
mg1865::mg_40::14::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahafantatra Azy ny tompon-tany teo, dia naniraka tany amin''ny tany rehetra manodidina izy ka nitondra ny marary rehetra ho eo aminy.'
mg1865::mg_40::14::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 14
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangataka taminy ireo mba hamela azy hanendry na dia ny somotraviavin-dambany ihany aza; koa na iza na iza no nanendry dia sitrana tokoa.'
mg1865::mg_40::15::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Tori-teny nataon''i Jesoa ny amin''ny fanaon-drazana.'
  verse_text: 'Dia nankeo amin''i Jesoa ny Fariseo sy ny mpanora-dalàna sasany avy tany Jerosalema ka nanao hoe:'
mg1865::mg_40::15::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ny mpianatrao no mandika ny fampianarana voatolotry ny razana? Fa tsy mba manasa tanana izy, raha hihinan-kanina.'
mg1865::mg_40::15::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao taminy hoe: Nahoana kosa ianareo no mandika ny didin''Andriamanitra noho ny fampianarana voatolotra anareo?'
mg1865::mg_40::15::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra efa nanao hoe: Manajà ny rainao sy ny reninao (Eksodosy 20:12), ary koa: Izay miteny ratsy ny rainy na ny reniny dia hatao maty tokoa (Eksodosy 21:17).'
mg1865::mg_40::15::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa ianareo: Na zovy na zovy no hilaza amin''ny rainy na ny reniny hoe: Efa fanatitra ho an''Andriamanitra izay rehetra tokony hahazoanao soa avy amiko, dia tsy mba hanaja ny rainy akory izy.'
mg1865::mg_40::15::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia foananareo ny tenin''Andriamanitra noho ny fampianarana voatolotra anareo.'
mg1865::mg_40::15::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mpihatsaravelatsihy, marina ny naminanian''Isaia anareo hoe:'
mg1865::mg_40::15::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity firenena ity manaja Ahy amin''ny molony; Fa ny fony kosa lavitra Ahy.'
mg1865::mg_40::15::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa foana ny ivavahan''ireo amiko, raha mampianatra ny didin''olombelona ho fampianarana izy (Isaia 29:13).'
mg1865::mg_40::15::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso ny vahoaka hankeo aminy Izy ka nanao taminy hoe: Mihainoa ka mahafantara:'
mg1865::mg_40::15::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy izay miditra amin''ny vava no mahaloto ny olona; fa izay mivoaka avy amin''ny vava, izany no mahaloto ny olona.'
mg1865::mg_40::15::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo aminy ny mpianatra ka nanao taminy hoe: Fantatrao va fa tafintohina ny Fariseo, raha nandre izany teny izany?'
mg1865::mg_40::15::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao hoe: Ny zavatra rehetra izay tsy nambolen''ny Raiko Izay any an-danitra dia hongotana.'
mg1865::mg_40::15::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avelao izy; mpitarika jamba izy; ary raha ny jamba no mitarika ny jamba, dia samy ho latsaka any an-kady izy roa.'
mg1865::mg_40::15::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera namaly ka nanao taminy hoe: Lazao aminay ny hevitr''izany fanoharana izany.'
mg1865::mg_40::15::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa: Ianareo koa va mbola tsy mahafantatra ihany?'
mg1865::mg_40::15::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrareo va fa izay rehetra miditra amin''ny vava dia mankao an-kibo ka avoaka ao amin''ny fivoahana?'
mg1865::mg_40::15::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mivoaka avy amin''ny vava kosa dia avy amin''ny fo, ka izany no mahaloto ny olona.'
mg1865::mg_40::15::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa avy amin''ny fo no ivoahan''ny sain-dratsy, dia ny vonoan''olona, ny fakam-badin''olona, ny fijangajangana, ny halatra, ny ampanga lainga, ny fitenenan-dratsy*; [*Grika: blasfemia, izahao Matio 9:3]'
mg1865::mg_40::15::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'izany no mahaloto ny olona; fa ny mihinana amin''ny tanana tsy misasa tsy mba mahaloto ny olona.'
mg1865::mg_40::15::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny zanakavavin''ilay vehivavy Kananita.'
  verse_text: 'Dia niala teo Jesoa ka nankany amin''ny faritanin''i Tyro sy Sidona.'
mg1865::mg_40::15::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy vehivavy Kananita anankiray nivoaka avy tamin''izany tany izany ka niantso nanao hoe: Mamindrà fo amiko, Tompoko, Zanak''i Davida o! ny zanako-vavy ampahorin''ny demonia loatra.'
mg1865::mg_40::15::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy tsy namaly teny azy. dia nanatona ny mpianany ka nangataka taminy nanao hoe: Roahy izy, fa miantso mafy ato aoriantsika.'
mg1865::mg_40::15::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao hoe: Tsy nirahina Aho afa-tsy ho amin''ny ondry very amin''ny taranak''isiraely.'
mg1865::mg_40::15::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanatona ihany ravehivavy, dia niankohoka teo anatrehany ka nanao hoe: Tompoko o, vonjeo aho.'
mg1865::mg_40::15::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy namaly ka nanao hoe: Tsy mety raha maka ny mofon-jaza ka manipy azy ho an''ny amboakely.'
mg1865::mg_40::15::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ravehivavy: Marina izany, Tompoko; fa na dia ny amboakely aza mba mihinana izay sombintsombiny latsaka avy amin''ny latabatry ny tompony ihany.'
mg1865::mg_40::15::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Jesoa ka nanao taminy hoe: Ravehivavy, lehibe ny finoanao; tongava aminao araka izay irinao. Dia sitrana ny zananivavy tamin''izay ora izay.'
mg1865::mg_40::15::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny marary maro, sy ny nampihinanany olona tsy omby efatra arivo, ary ny nitadiavan''ny Fariseo sy ny Sadoseo famantarana avy any an-danitra.'
  verse_text: 'Ary raha niala teo Jesoa, dia nankany amoron''ny Ranomasin''i Galilia Izy; ary niakatra nankeo an-tendrombohitra Izy ka nipetraka teo;'
mg1865::mg_40::15::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisy vahoaka betsaka nankeo aminy nitondra ny mandringa, ny jamba, ny moana, ny kilemaina, ary ny maro hafa koa, ka nametraka azy teo akaikin''ny tongotr''i Jesoa; dia nahasitrana azy Izy;'
mg1865::mg_40::15::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia talanjona ny vahoaka, raha nahita ny moana miteny, ny kilemaina sitrana, ny mandringa afaka, ary ny jamba mahiratra; dia nankalaza an''Andriamanitry ny Isiraely izy.'
mg1865::mg_40::15::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niantso ny mpianany hankeo aminy ka nanao hoe: Mahonena Ahy ny vahoaka, fa efa nitoetra hateloana taty amiko izy izao ka tsy manan-kohanina; ary tsy tiako ny hampody azy tsy mihinana, fandrao reraka eny an-dàlana izy.'
mg1865::mg_40::15::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpianatra taminy: Aiza no hahitanay mofo aty an''efitra ampy hahavoky izao vahoaka betsaka izao!'
mg1865::mg_40::15::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Misy mofo firy any aminareo? Ary hoy izy: Fito sy hazandrano madinika vitsy foana.'
mg1865::mg_40::15::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nandidy ny vahoaka betsaka hipetraka amin''ny tany.'
mg1865::mg_40::15::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandray ny mofo fito mbamin''ny hazandrano Izy, ary rehefa nisaotra, dia namaky ka nanolotra azy ho an''ny mpianatra, ary ny mpianatra kosa nanolotra ho an''ny vahoaka.'
mg1865::mg_40::15::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihinana avokoa izy rehetra, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka dia nahafeno sobiky fito.'
mg1865::mg_40::15::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nihinana dia efatra arivo lahy, afa-tsy ny zaza amim-behivavy.'
mg1865::mg_40::15::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 15
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nampody ny vahoaka Izy, dia niondrana an-tsambokely ka nankany amin''ny sisin-tanin''i Magadana.'
mg1865::mg_40::16::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo sy ny Sadoseo nankeo aminy, dia naka fanahy Azy ka nangataka Azy haneho famantarana aminy avy any an-danitra.'
mg1865::mg_40::16::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao taminy hoe: Nony hariva, dia hoy ianareo: Ho tsara ny andro, fa mena ny lanitra.'
mg1865::mg_40::16::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, dia hoy ianareo: Ho ratsy ny andro, fa mena sy manjombona ny lanitra. Fantatrareo ny hamantatra ny tarehin''ny lanitra, fa ny famantarana ny fotoana dia tsy hainareo.'
mg1865::mg_40::16::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy misy famantarana homena azy, afa-tsy ny famantarana ny amin''i Jona ihany. Ary nandao azy Jesoa ka lasa.'
mg1865::mg_40::16::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny nananaran''i Jesoa ny mpianany tsy hanaiky ny fampianaran''ny Fariseo sy ny Sadoseo.'
  verse_text: 'Ary rehefa tonga teny am-pita ny mpianatra, dia nanadino hitondra mofo izy.'
mg1865::mg_40::16::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Mihevera, ka mitandrema ianareo, fandrao azon''ny masirasiran''ny Fariseo sy ny Sadoseo.'
mg1865::mg_40::16::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niara-nisaina izy ka nanao hoe: Ny tsy nitondrantsika mofo angaha izany.'
mg1865::mg_40::16::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nahalala izany, dia nanao hoe: Nahoana ianareo, ry kely finoana, no miara-misaina satria tsy manana mofo?'
mg1865::mg_40::16::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola mahafantatra va ianareo, ary tsy tsaroanareo va ny mofo dimy ho an''ny dimy arivo, ka firy harona moa no nangoninareo?'
mg1865::mg_40::16::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'na ny mofo fito ho an''ny efatra arivo, ka firy sobiky moa no nangoninareo?'
mg1865::mg_40::16::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no tsy ahafantaranareo fa tsy ny amin''ny mofo no nolazaiko taminareo? Fa tandremo, fandrao azon''ny masirasiran''ny Fariseo sy ny Sadoseo.'
mg1865::mg_40::16::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia fantany fa tsy nasainy hitandrina izy, fandrao azo''ny masirasira fanaovana mofo, fa andrao azon''ny fampianaran''ny Fariseo sy ny Sadoseo.'
mg1865::mg_40::16::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny naneken''i Petera an''i Jesoa ho Kristy, Zanak''Andriamanitra, ary ny nilazan''i Jesoa voalohany ny amin''ny hahafatesany sy ny hitsanganany amin''ny maty.'
  verse_text: 'Ary rehefa tonga tany amin''ny faritanin''i Kaisaria-filipo Jesoa, dia nanontany ny mpianany Izy ka nanao hoe: Ataon''ny olona ho iza moa ny Zanak''olona*? [*Na: (Aho)]'
mg1865::mg_40::16::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo: Hoy ny sasany: Jaona Mpanao batisa; ary hoy ny sasany: Elia; ary hoy ny sasany: Jeremia, na anankiray amin''ny mpaminany.'
mg1865::mg_40::16::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Fa ianareo kosa manao Ahy ho iza?'
mg1865::mg_40::16::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly Simona Petera ka nanao hoe: Ianao no Kristy, Zanak''Andriamanitra velona.'
mg1865::mg_40::16::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Jesoa ka nanao taminy hoe: Sambatra ianao, ry Simona Bar-jona; fa tsy nofo aman-drà no naneho anao izany, fa ny Raiko Izay any an-danitra.'
mg1865::mg_40::16::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho milaza aminao koa: Ianao no Petera*, ary ambonin''ity vatolampy ity no haoriko ny fiangonako**; ary ny vavahadin''ny fiainan-tsy hita*** tsy haharesy azy. [*Petera = Vato; izahao Jaona 1:42] [**Grika: eklesia] [***Grika: Hadesy]'
mg1865::mg_40::16::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Homeko anao ny fanalahidin''ny fanjakan''ny lanitra; ka na inona na inona fehezinao eto ambonin''ny tany dia hofehezina any an-danitra; ary na inona na inona vahanao ety ambonin''ny tany dia hovahana any an-danitra.'
mg1865::mg_40::16::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia nandrara ny mpianatra Izy mba tsy hilaza amin''olona akory fa Izy no Kristy.'
mg1865::mg_40::16::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''izany no vao natoron''i Jesoa ny mpianany fa tsy maintsy hankany Jerosalema Izy ka hampijalin''ny loholona sy ny lohan''ny mpisorona ary ny mpanora-dalàna, dia hovonoina, ary hatsangana amin''ny andro fahatelo.'
mg1865::mg_40::16::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nanohina Azy hitanila kely ka niteny mafy Azy hoe: Sanatria aminao izany, Tompoko! Tsy ho aminao tokoa izany!'
mg1865::mg_40::16::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nihodina ka niteny tamin''i Petera hoe: Mankanesa ato ivohoko, ry Satana; fahatafintohinana amiko ianao, satria tsy misaina izay an''Andriamanitra ianao, fa izay an''ny olona.'
mg1865::mg_40::16::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa tamin''ny mpianany: Raha misy olona ta-hanaraka Ahy, aoka izy handà ny tenany sy hitondra ny hazo fijaliany ka hanaraka Ahy.'
mg1865::mg_40::16::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no ta-hamonjy ny ainy, dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny amiko, dia hahazo izany.'
mg1865::mg_40::16::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona moa no soa ho azon''ny olona, raha mahazo izao tontolo izao, kanefa very ny ainy? Ary inona no homen''ny olona ho takalon''ny ainy?'
mg1865::mg_40::16::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy ny Zanak''olona amin''ny voninahitry ny Rainy, mbamin''ny anjeliny, dia hamaly ny olona rehetra araka ny nataony.'
mg1865::mg_40::16::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny Zanak''olona avy amin''ny fanjakany.'
mg1865::mg_40::17::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niovan''i Jesoa tarehy tao an-tendrombohitra.'
  verse_text: 'Ary nony afaka henemana, Jesoa dia naka an''i Petera sy Jakoba ary Jaona rahalahiny ka nitondra azy niakatra ho any an-tendrombohitra avo mba hitokana.'
mg1865::mg_40::17::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niova tarehy teo anatrehany Izy, ka ny tavany namirapiratra tahaka ny masoandro, ary ny fitafiany tonga fotsy tahaka ny mazava.'
mg1865::mg_40::17::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, niseho tamin''ny mpianatra Mosesy sy Elia, niresaka tamin''i Jesoa.'
mg1865::mg_40::17::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny Petera ka nanao tamin''i Jesoa hoe: Tompoko, tsara raha mitoetra eto isika; koa raha sitrakao, aoka aho hanao lay telo eto: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia.'
mg1865::mg_40::17::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola niteny izy, indro, nisy rahona mazava nanarona azy ireo; ary, injao, nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako malalako Izay sitrako; Izy no henoy.'
mg1865::mg_40::17::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany ny mpianatra, dia lavo niankohoka sady natahotra indrindra.'
mg1865::mg_40::17::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nankeo aminy, dia nanendry azy ka nanao hoe; Mitsangàna, fa aza matahotra.'
mg1865::mg_40::17::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niandrandra izy ireo, dia tsy nahita olona, afa-tsy Jesoa irery ihany.'
mg1865::mg_40::17::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nidina avy tao an-tendrombohitra izy, dia nandrara azy Jesoa ka nanao hoe: Aza milaza amin''olona ny fahitana, mandra-pitsangan''ny Zanak''olona amin''ny maty.'
mg1865::mg_40::17::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianany nanontany Azy ka nanao hoe: Nahoana ary no ilazan''ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha?'
mg1865::mg_40::17::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao hoe: Elia dia avy ihany ka hampody ny zavatra rehetra.'
mg1865::mg_40::17::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa lazaiko aminareo: Efa tonga sahady Elia; nefa ny olona tsy nahafantatra azy, fa nanao izay sitraky ny fony taminy. Dia tahaka izany koa no hampiaretany ny Zanak''olona.'
mg1865::mg_40::17::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia fantatry ny mpianatra fa Jaona Mpanao batisa no nolazainy taminy.'
mg1865::mg_40::17::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay zazalahy nampahorin''ny demonia.'
  verse_text: 'Ary rehefa tonga teo amin''ny vahoaka izy ireo, nisy lehilahy anankiray nanatona an''i Jesoa, dia nandohalika teo anatrehany ka nanao hoe:'
mg1865::mg_40::17::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompoko, mamindrà fo amin''ny zanako-lahy, fa mararin''ny androbe izy ka mahantra tokoa; fa matetika izy no mianjera ao amin''ny afo, ary matetika ao amin''ny rano.'
mg1865::mg_40::17::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra azy tamin''ny mpianatrao aho, fa tsy nahay nahasitrana azy izy.'
mg1865::mg_40::17::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao hoe: Ry taranaka tsy mino sady efa nivadika, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento aty amiko izy.'
mg1865::mg_40::17::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny mafy azy Jesoa, dia nivoaka taminy ny demonia, ka sitrana ilay zazalahy tamin''izay ora izay.'
mg1865::mg_40::17::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankao amin''i Jesoa mangingina ny mpianatra ka nanao hoe: Nahoana izahay no tsy nahavoaka azy?'
mg1865::mg_40::17::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: '2022-07-04T16:56:56+0000'
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Noho ny fahakelezan''ny finoanareo ihany; fa lazaiko aminareo marina tokoa: Raha manana finoana ohatra ny voan-tsinapy iray aza ianareo ka hiteny amin''io tendrombohitra io hoe: Mifindrà ery , dia hifindra izy; ary tsy hisy tsy ho hainareo hatao.'
mg1865::mg_40::17::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: '2022-09-02T07:35:50+0000'
  verse_title: null
  verse_text: '(Kanefa iny karazana iny tsy mivoaka raha tsy avoaka amin''ny fivavahana sy ny fifadian-kanina)'
mg1865::mg_40::17::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa fanindroany ny hahafatesany sy ny hitsanganany indray.'
  verse_text: 'Ary raha nitoetra tany Galilia izy, Jesoa dia nilaza tamin''ny mpianany hoe: Ny Zanak''olona efa hatolotra ho eo an-tanan''ny olona'
mg1865::mg_40::17::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hovonoiny, nefa amin''ny andro fahatelo dia hatsangana indray Izy. Ary dia nalahelo indrindra ireo.'
mg1865::mg_40::17::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nampadoavan''i Jesoa an''i Petera ny antsasaky ny sekely.'
  verse_text: 'Ary nony tonga tao Kapernaomy izy, dia nankeo amin''i Petera ny mpandray ny antsasaky ny sekely ka nanao hoe: Moa ny mpampianatra anareo tsy mba mandoa ny antsasaky ny sekely* va? [*Grika: didrakma]'
mg1865::mg_40::17::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Petera : Mandoa ihany Izy. Ary raha vao tafiditra tao an-trano Petera, dia nosakanan''i Jesoa teny izy ka nataony hoe : Ahoana no hevitrao, ry Simona? Avy amin''iza moa no andraisan''ny mpanjaka ety an-tany fadin-tseranana sy vola hetra? Avy amin''ny zanany va, sa avy amin''ny olon-kafa?'
mg1865::mg_40::17::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hoy Petera taminy: Avy amin''ny olon-kafa, dia hoy kosa Jesoa: Dia afaka ary ny zanaka.'
mg1865::mg_40::17::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa andrao isika manafintohina azy, dia mankanesa ao amin''ny ranomasina ianao, ka manjonoa; ary raiso izay hazandrano azo voalohany, ka rehefa sokafanao ny vavany, dia hahita vola sekely* eo ianao; dia raiso izany, ka omeo azy ho avy amiko sy ianao.'
mg1865::mg_40::18::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa ny mpianany hanetry tena sy hamela ny heloky ny namany, sy ny fanoharana ny amin''ny mpitrosa tsy nanan-kaloa.'
  verse_text: 'Tamin''izany ora izany dia nankeo amin''i Jesoa ny mpianatra ka nanao hoe: Iza moa no lehibe indrindra ao amin''ny fanjakan''ny lanitra?'
mg1865::mg_40::18::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niantso zazakely anankiray hankeo aminy, dia nametraka azy teo afovoany'
mg1865::mg_40::18::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Lazaiko aminareo marina tokoa: Raha tsy miova* ianareo ka ho tonga tahaka ny zazakely, dia tsy hiditra amin''ny fanjakan''ny lanitra mihitsy ianareo. [*Grika: mitodika]'
mg1865::mg_40::18::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na zovy na zovy no hanetry tena tahaka ity zazakely ity, dia izy no ho lehibe indrindra amin''ny fanjakan''ny lanitra.'
mg1865::mg_40::18::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na zovy na zovy no handray zazakely anankiray aza tahaka itony noho ny anarako, dia mandray Ahy.'
mg1865::mg_40::18::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na zovy na zovy no hanafintohina na dia iray aza amin''ireny madinika mino Ahy ireny, dia tsara lavitra ho azy raha anantonana vato lehibe* fikosoham-bary ny vozony, ka alentika any amin''ny ranomasina lalina izy. [*Na: ahodim-boriky]'
mg1865::mg_40::18::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''izao tontolo izao noho ny fahatafintohinana! fa tsy maintsy ho avy ny fahatafintohinana, nefa lozan''izay olona mahatonga ny fahatafintohinana.'
mg1865::mg_40::18::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ny tananao na ny tongotrao no manafintohina anao, tapaho izy ka ario ho afaka aminao; fa tsara ho anao ny hiditra kilemaina na mandringa any amin''ny fiainana noho ny manana tanana roa sy tongotra roa, nefa hariana any amin''ny afo maharitra mandrakizay.'
mg1865::mg_40::18::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny masonao no manafintohina anao, esory hiala izy, ka ario ho afaka aminao; fa tsara ho anao ny hiditra toka-maso amin''ny fiainana noho ny manana maso roa, nefa hariana any amin''ny helo mirehitra afo.'
mg1865::mg_40::18::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema, fandrao manao tsinontsinona na dia ny iray aza amin''ireny madinika ireny ianareo; fa lazaiko aminareo: Ny anjeliny any an-danitra mahita mandrakariva ny tavan''ny Raiko Izay any an-danitra*. [*Ampio hoe:]'
mg1865::mg_40::18::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa tonga ny Zanak''olona hamonjy ny very.)'
mg1865::mg_40::18::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no hevitrareo? Raha misy olona manana ondry zato, ka mania ny anankiray moa tsy hamela ny sivy amby sivi-folo eny an-tendrombohitra va izy ka handeha hitady ilay nania?'
mg1865::mg_40::18::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tàhiny hitany izy, dia lazaiko aminareo marina tokoa fa mahafaly azy iny noho ny sivy amby sivifolo izay tsy nania.'
mg1865::mg_40::18::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka izany, dia tsy sitraky ny Rainareo Izay any an-danitra, raha ho very na dia iray aza amin''ireny madinika ireny.'
mg1865::mg_40::18::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manota aminao ny rahalahinao, dia mankanesa any aminy, ka rehefa mitokana ianareo roa lahy, dia asehoy azy ny fahadisoany. Raha mihaino anao izy, dia efa azonao ny rahalahinao;'
mg1865::mg_40::18::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tsy mihaino anao kosa izy, dia ento miaraka aminao ny olona iray na roa, mba ho voaorina mafy avokoa ny teny rehetra amin''ny tenin''ny vavolombelona roa na telo (Deoteronomia 19:15).'
mg1865::mg_40::18::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mety mihaino ireo izy, dia ambarao amin''ny fiangonana*; ary raha tsy mety mihaino ny fiangonana** koa izy, dia aoka hataonao ho tahaka ny jentilisa sy ny mpamory hetra izy. [*Grika: eklesia] [** Grika: eklesia]'
mg1865::mg_40::18::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Na inona na inona fehezinareo ety ambonin''ny tany dia hofehezina any an-danitra; ary na inona na inona vahanareo ety ambonin''ny tany dia hovahana any an-danitra.'
mg1865::mg_40::18::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko aminareo koa: Raha misy roa aminareo mifanaiky ety ambonin''ny tany na amin''inona na amin''inona ka hangataka izany, dia ho azony avy amin''ny Raiko Izay any an-danitra izany.'
mg1865::mg_40::18::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na aiza na aiza no iangonan''ny roa na telo amin''ny anarako, dia ao afovoany Aho.'
mg1865::mg_40::18::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona Petera ka nanao taminy hoe: Tompoko, impiry moa no hanotan''ny rahalahiko amiko, ka havelako izy? Hatramin''ny impito va?'
mg1865::mg_40::18::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Tsy lazaiko aminao hoe: Hatramin''ny impito, fa hatramin''ny impito amby fito-polo*. [*Na: fito-polo impito]'
mg1865::mg_40::18::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany ny fanjakan''ny lanitra dia tahaka ny mpanjaka anankiray, izay te-hidinika amin''ny mpanompony ny amin''ny volany.'
mg1865::mg_40::18::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nidinika izy, dia nisy anankiray nentina teo aminy, izay nitrosa talenta* iray alina. [*Anaram-bola; ny talenta volafotsy dia sekely telo arivo]'
mg1865::mg_40::18::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tsy nanan-kaloa izy, dia nasain''ny tompony hamidy izy sy ny vadiny aman-janany mbamin''ny fananany rehetra handoavana ny trosa.'
mg1865::mg_40::18::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka teo anatrehany ilay mpanompo ka nanao hoe: Tompoko, omeo andro aho, fa haloako ny anao rehetra.'
mg1865::mg_40::18::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tompon''izany mpanompo izany dia onena azy ka nandefa azy sady namoy ny trosa taminy.'
mg1865::mg_40::18::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nony nivoaka izany mpanompo izany, dia nahita mpanompo namany anankiray, izay nitrosa denaria* zato taminy; dia nosamboriny izy ka notraohiny sady nataony hoe: Aloavy izay trosako aminao. [*Anaram-bola tokony ho venty no heviny]'
mg1865::mg_40::18::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niankohoka ilay mpanompo namany ka nifona taminy nanao hoe: Omeo andro aho, fa haloako ny anao.'
mg1865::mg_40::18::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nety izy, fa lasa nampanao azy tao an-tranomaizina mandra-pandoany ny trosa.'
mg1865::mg_40::18::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ireo mpanompo namany izay efa natao, dia nalahelo indrindra izy ka nandeha nanambara tsara tamin''ny tompony izany rehetra natao izany.'
mg1865::mg_40::18::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanalain''ny tompony ralehilahy ka noteneniny hoe: Ry mpanompo ratsy fanahy, efa nafoiko ilay trosa rehetra taminao, satria nifona tamiko ianao;'
mg1865::mg_40::18::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'moa tsy tokony mba ho namindra fo tamin''ny mpanompo namanao koa va ianao tahaka ny namindrako fo taminao?'
mg1865::mg_40::18::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra ny tompony ka nanolotra azy ho amin''ny mpampijaly mandra-pandoany ny trosa rehetra.'
mg1865::mg_40::18::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 18
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka izany koa no hataon''ny Raiko Izay any an-danitra aminareo, raha tsy samy mamela ny rahalahinareo amin''ny fonareo avy ianareo.'
mg1865::mg_40::19::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa teny an-dafin''i Jordana, sy ny namaliany ny fanontanian''ny Fariseo ny amin''ny fisaoram-bady.'
  verse_text: 'Ary rehefa vitan''i Jesoa izany teny izany, dia niala tany Galilia Izy ka nihazo ny lalana teny an-dafin''i Jordana, dia tonga tany amin''ny sisin''i Jodia.'
mg1865::mg_40::19::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vahoaka betsaka nanaraka Azy, dia nahasitrana azy teo Izy.'
mg1865::mg_40::19::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Fariseo nanatona Azy*, dia naka fanahy Azy hoe: Mahazo misaotra ny vadiny va ny lehilahy noho izay rehetra entiny iampangany azy na inona na inona? [*Na: (Ary nanatona Azy ny Fariseo)]'
mg1865::mg_40::19::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao hoe: Tsy mbola novakinareo va ny teny, fa Izay nahary azy tamin''ny voalohany dia nahary azy ho lahy sy vavy (Genesisy 1:27), ka dia nanao hoe:'
mg1865::mg_40::19::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin''ny vadiny; ary dia ho nofo iray ihany izy roroa. (Genesisy 2:24)?'
mg1865::mg_40::19::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia tsy roa intsony izy, fa nofo iray ihany. Koa amin''izany, izay nampiraisin''Andriamanitra dia aoka tsy hampisarahin''olona.'
mg1865::mg_40::19::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ireo taminy: Nahoana ary Mosesy no nandidy hanome taratasy fisaoram-bady sy hisaotra azy? (Deoteronomia 24:1).'
mg1865::mg_40::19::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Ny hamafin''ny fonareo no namelan''i Mosesy anareo hisao-bady; fa tamin''ny voalohany dia tsy mba toy izany.'
mg1865::mg_40::19::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo: Na zovy na zovy no misaotra ny vadiny, afa-tsy noho ny fijangajangana ihany, ka mampakatra ny hafa, dia mijangajanga; ary izay mampakatra ny voasaotra dia mijangajanga koa.'
mg1865::mg_40::19::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpianatra taminy: Raha izany no toetry ny lehilahy amin''ny vadiny, dia aleo tsy manambady.'
mg1865::mg_40::19::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Tsy ny olona rehetra no mahay mandray izany teny izany, fa izay nomena ihany;'
mg1865::mg_40::19::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa misy ionoka, izay teraka ionoka hatrany an-kibon-dreniny; ary misy ionoka, izay nataon''ny olona ionoka; ary misy ionoka, izay nanao ny tenany ionoka noho ny fanjakan''ny lanitra. Aoka handray izany izay mahay mandray.'
mg1865::mg_40::19::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nitondrana zazakely ho eo amin''ny Jesoa.'
  verse_text: 'Ary tamin''izany dia nisy zazakely nentina teo amin''i Jesoa mba hametrahany ny tanany sy hivavahany ho azy; fa ny mpianany niteny mafy ireny.'
mg1865::mg_40::19::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jesoa kosa nanao hoe: Avelao ny zaza, ary aza raràna tsy hanatona Ahy; fa an''ny toa azy ny fanjakan''ny lanitra.'
mg1865::mg_40::19::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nametraka ny tanany taminy Izy, dia niala teo.'
mg1865::mg_40::19::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny namalian''i Jesoa ny fanontanian''ny mpanan-karena anankiray sy ny resaka nataony tamin''ny mpianany, rehefa lasa ralehilahy.'
  verse_text: 'Ary, indro, nisy anankiray nanatona Azy ka nanao hoe: Mpampianatra o*, inona no tsara hataoko hahazoako fiainana mandrakizay? [*Na: (Mpampianatra tsara o)]'
mg1865::mg_40::19::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Nahoana Aho no anontanianao ny amin''izay tsara? Iray no tsara*; fa raha te-hiditra any amin''ny fiainana ianao, tandremo ny didy. [*Na: (Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy iray ihany dia Andriamanitra.)]'
mg1865::mg_40::19::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ralehilahy taminy: Inona avy moa? Dia hoy Jesoa: Ny hoe: Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga,'
mg1865::mg_40::19::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manajà ny rainao sy ny reninao (Eksodosy 20:12-16), ary: Tiava ny namanao tahaka ny tenanao (Lev. 19:18).'
mg1865::mg_40::19::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ilay zatovo taminy: Izany rehetra izany efa voatandriko avokoa; fa inona no tsy mbola mahatanteraka ahy?'
mg1865::mg_40::19::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Raha tia ho tanteraka ianao, mandehana, amidio ny fanananao, ka omeo ny malahelo, dia hanana rakitra any an-danitra ianao; ary avia hanaraka Ahy.'
mg1865::mg_40::19::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nandre izany teny izany ilay zatovo, dia niala tamin''alahelo izy, satria nanana fananana be.'
mg1865::mg_40::19::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa tamin''ny mpianany: Lazaiko aminareo marina tokoa fa sarotra ny hidiran''ny manan-karena amin''ny fanjakan''ny lanitra.'
mg1865::mg_40::19::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izaho aminareo indray: Ho moramora kokoa ny hidiran''ny rameva amin''ny vodi-fanjaitra noho ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra.'
mg1865::mg_40::19::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany ny mpianatra, dia talanjona indrindra ka nanao hoe: Iza indray no azo hovonjena?'
mg1865::mg_40::19::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijery azy ka nanao taminy hoe: Tsy hain''ny olona izany, fa hain''Andriamanitra ny zavatra rehetra.'
mg1865::mg_40::19::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Petera ka nanao taminy hoe: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao; koa inona ary no ho azonay?'
mg1865::mg_40::19::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Lazaiko aminareo marina tokoa fa rehefa mby amin''ny fanavaozana*, ka hipetraka amin''ny seza fiandrianan''ny voninahiny ny Zanak''olona, ianareo koa, izay nanaraka Ahy, dia hipetraka amin''ny seza fiandrianana roa ambin''ny folo ka hitsara ny firenen''isiraely roa ambin''ny folo. [*Grika:fiteraham-baovao]'
mg1865::mg_40::19::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra efa nahafoy trano, na rahalahy, na anabavy, na ray, na reny*, na zanaka, na tany, noho ny anarako, dia handray zato heny ka handova fiainana mandrakizay. [*Ampio hoe: (na vady.)]'
mg1865::mg_40::19::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 19
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.'
mg1865::mg_40::20::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanjakan''ny lanitra dia tahaka ny lehilahy tompon-trano, izay nivoaka maraina koa hanakarama mpiasa ho any an-tanim-boalobony.'
mg1865::mg_40::20::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nifanekeny tamin''ny mpiasa fa ho denaria isan''andro ny karamany, dia nasainy nankany amin''ny tanim-boalobony ireny.'
mg1865::mg_40::20::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka tamin''ny ora fahatelo izy, dia nahita ny sasany nitoetra foana tany an-tsena,'
mg1865::mg_40::20::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy izy taminy: Mandehana koa ianareo hankany amin''ny tanim-boaloboka, fa izay an-keviny marina dia homeko anareo. Ka dia lasa ireny.'
mg1865::mg_40::20::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka tamin''ny ora fahenina sy fahasivy indray izy ka nanao toy izany koa.'
mg1865::mg_40::20::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tokony ho tamin''ny ora fahiraika ambin''ny folo dia nivoaka izy ka nahita ny sasany mitoetra eo, dia hoy izy taminy: Nahoana ianareo no mitoetra foana eto mandritra ny andro?'
mg1865::mg_40::20::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy taminy: Satria tsy nisy olona nanakarama anay. Dia hoy ralehilahy taminy: Mandehana koa ianareo mankany amin''ny tanim-boaloboka.'
mg1865::mg_40::20::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hariva ny andro, dia hoy ny tompon''ny tanim-boaloboka tamin''ny mpitandrina ny raharahany: Antsoy ny mpiasa, ka aloavy ny karamany: atombohy amin''ireo taoriana ka vao hatramin''ireo voalohany.'
mg1865::mg_40::20::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga ireo nokaramaina tamin''ny ora fahiraika ambin''ny folo, dia nahazo denaria misesy avy izy.'
mg1865::mg_40::20::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa tonga ireo voalohany, dia nanantena hahazo mihoatra izy; kanjo samy denaria misesy avy ihany no azony.'
mg1865::mg_40::20::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahazo izany izy, dia nimonomonona tamin''ny tompon-trano ka nanao hoe:'
mg1865::mg_40::20::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo olona farany ireo dia niasa ora iray monja, kanefa nataonao mitovy aminay, izay niaritra ny fahatrotrahana sy ny hainandro.'
mg1865::mg_40::20::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy namaly ka nanao tamin''ny anankiray amin''ireny hoe: Ry sakaiza, tsy mba manao izay tsy marina aminao aho; tsy efa denaria va no nifanekenao tamiko?'
mg1865::mg_40::20::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raiso ny anao, ka mandehana; fa ilay farany dia tiako homena toraka ny anao koa.'
mg1865::mg_40::20::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahazo manao izay tiako amin''ny ahy va aho? Ratsy va ny masonao, satria tsara aho?'
mg1865::mg_40::20::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany, ny farany ho voalohany, ary ny voalohany ho farany.'
mg1865::mg_40::20::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa fanintelony ny hiaretany.'
  verse_text: 'Ary Jesoa, nony niakatra ho any Jerosalema, dia naka mangingina ny mpianatra roa ambin''ny folo lahy ka niteny taminy teny an-dàlana hoe:'
mg1865::mg_40::20::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, miakatra ho any Jerosalema isika; ary ny Zanak''olona hatolotra ho amin''ireo lohan''ny mpisorona sy ny mpanora-dalàna, dia hohelohiny ho faty Izy'
mg1865::mg_40::20::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hatolony amin''ny jentilisa mba hataony ho fihomehezana sy hokapohiny sy hohomboany amin''ny hazo fijaliana; ary amin''ny andro fahatelo dia hatsangana indray Izy.'
mg1865::mg_40::20::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny fangatahana nataon''ny renin''ny zanak''i Zebedio, sy ny navalin''i Jesoa azy.'
  verse_text: 'Ary tamin''izany dia nanatona an''i Jesoa ny renin''ny zanak''i Zebedio mbamin''ny zananilahy, dia niankohoka ka nangataka zavatra taminy.'
mg1865::mg_40::20::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Inona no irinao? Dia hoy ravehivavy taminy: Mandidia mba hipetrahan''ireto zanako roa lahy ireto, ny anankiray ho eo amin''ny ankavananao, ary ny anankiray ho eo amin''ny ankavianao, ao amin''ny fanjakanao.'
mg1865::mg_40::20::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly ka nanao hoe: Tsy fantatrareo izay angatahinareo; hainareo va ny misotro amin''ny kapoaka izay efa hisotroako? Hoy izy roa lahy taminy: Hainay ihany.'
mg1865::mg_40::20::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy kosa Izy taminy: Hisotro amin''ny kapoakako tokoa ianareo; fa ny hipetraka eo an-tanako ankavanana sy eo an-tanako ankavia, dia tsy Ahy ny hanome izany; fa izay nanamboaran''ny Raiko izany no homena.'
mg1865::mg_40::20::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany izy folo lahy, dia tezitra noho ny nataon''izy mirahalahy.'
mg1865::mg_40::20::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa niantso azy hankeo aminy ka nanao hoe: Fantatrareo fa ny andrianan''ny jentilisa mampanompo azy tokoa, ary ny lehibeny manapaka azy fatratra.'
mg1865::mg_40::20::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba ho toy izany aminareo; fa izay te-ho lehibe aminareo dia ho mpanompo anareo;'
mg1865::mg_40::20::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay te-ho ambony indrindra aminareo dia ho mpanomponareo.'
mg1865::mg_40::20::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka izany, ny Zanak''olona tsy tonga mba hotompoina, fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.'
mg1865::mg_40::20::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: 'Ny nampahiratan''i Jesoa ny jamba roa lahy tao akaikin''ny Jeriko.'
  verse_text: 'Ary raha niala tao Jeriko izy, dia nisy vahoaka betsaka nanaraka an''i Jesoa.'
mg1865::mg_40::20::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, nisy jamba roa lahy nipetraka teo amoron-dalana, ary nony reny fa Jesoa no mandalo, dia niantso izy ka nanao hoe: Mamindrà fo aminay, ry Tompo, Zanak''i Davida o!'
mg1865::mg_40::20::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka niteny mafy azy mba hangina; fa vao mainka niantsoantso izy ka nanao hoe: Mamindrà fo aminay, ry Tompo, Zanak''i Davida o!'
mg1865::mg_40::20::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijanona, dia niantso azy ka nanao hoe: Inona no tianareo hataoko aminareo?'
mg1865::mg_40::20::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy taminy: Tompoko o, ny mba hampahiratina ny masonay.'
mg1865::mg_40::20::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa dia onena azy ka nanendry ny masony; ary nahiratra niaraka tamin''izay izy, dia nanaraka an''i Jesoa.'
mg1865::mg_40::21::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niakaran''i Jesoa tany Jerosalema.'
  verse_text: 'Ary raha nanakaiky an''i Jerosalema izy ka tonga tao Betifaga any an-tendrombohitra Oliva, dia naniraka mpianatra roa lahy Jesoa ka nanao taminy hoe:'
mg1865::mg_40::21::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankanesa amin''iroa vohitra tandrifinareo iroa, ary miaraka amin''izay dia hahita boriky mifatotra sy ny zanany eo aminy ianareo; vahao izy, dia ento ety amiko.'
mg1865::mg_40::21::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy miteny anareo, dia lazao hoe: Misy raharaha analan''ny Tompo azy; ary dia havelany ho entina miaraka amin''izay izy.'
mg1865::mg_40::21::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany dia tonga mba hahatanteraka izay nampilazaina ny mpaminany hoe:'
mg1865::mg_40::21::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''i Ziona zanakavavy; Indro, ny Mpanjakanao avy ho anao, Malemy fanahy sady mitaingina boriky, Dia zanaky ny boriky miasa* (Zakaria 9:9). [*Grika: mitondra zioga]'
mg1865::mg_40::21::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nandeha ny mpianatra ka nanao araka izay nandidian''i Jesoa azy,'
mg1865::mg_40::21::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nentiny ny boriky sy ny zanany ary nataony teo amboniny ny lambany, ary Jesoa dia nitaingina azy.'
mg1865::mg_40::21::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: '2022-05-30T05:36:32+0000'
  verse_title: null
  verse_text: 'Ary ny ankabeazan''ny vahoaka dia namelatra ny lambany teny an-dàlana; ary ny sasany nanapaka rantsan-kazo, dia nahahany teny an-dàlana koa izany.'
mg1865::mg_40::21::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka izay nialoha Azy sy izay nanaraka dia niantso hoe: Hosana* ho an''ny Zanak''i Davida! Isaorana anie Izay avy amin''ny anaran''i Jehovah! Hosana* any amin''ny avo indrindra (Salamo 118:26). [*Hosana = vonjeo re!]'
mg1865::mg_40::21::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa tafiditra tany Jerosalema Izy, dia nihorakoraka ny tanàna rehetra ka nanao hoe: Iza moa izao?'
mg1865::mg_40::21::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka nilaza hoe: Izao no Jesoa mpaminany Izay avy any Nazareta any Galilia.'
mg1865::mg_40::21::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nandroahan''i Jesoa ny mpivarotra sy ny nanesorany ny varony hiala teo an-kianjan''ny tempoly.'
  verse_text: 'Ary Jesoa niditra teo an-kianjan''ny tempolin''Andriamanitra, dia nandroaka izay rehetra nivarotra sy nividy teo an-kianjan''ny tempoly ka nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan''ny mpivarotra ny voromailala;'
mg1865::mg_40::21::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Izy taminy: Efa voasoratra hoe: Ny tranoko hatao hoe trano fivavahana (Isaia 56:7) fa ianareo kosa manao azy ho zohy fieren''ny jiolahy (Jeremia 7:11).'
mg1865::mg_40::21::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy jamba sy mandringa nanatona Azy teo an-kianjan''ny tempoly, dia nahasitrana azy Izy.'
mg1865::mg_40::21::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony hitan''ny lohan''ny mpisorona sy ny mpanora-dalàna ny zavatra mahagaga izay nataony sy ny ankizy madinika miantso eo an-kianjan''ny tempoly ka manao hoe: Hosana ho an''ny Zanak''i Davida! - dia tezitra izy'
mg1865::mg_40::21::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Renao va izay lazain''ireo? Dia hoy Jesoa taminy: Eny; tsy mbola novakinareo va ny teny manao hoe: Avy amin''ny vavan''ny ankizy madinika sy ny zaza minono no nanamboaranao fiderana (Salamo 8:2)?'
mg1865::mg_40::21::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao azy Izy ka niala tao an-tanàna hankany Betania; ary dia nitoetra tao mandritra ny alina Izy.'
mg1865::mg_40::21::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nanozonan''i Jesoa ilay aviavy izay tsy namoa.'
  verse_text: 'Ary nony niverina maraina hankany an-tanàna Izy, dia noana.'
mg1865::mg_40::21::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita hazo aviavy* anankiray teo amoron-dalana Izy, dia nankeo aminy, kanjo tsy nahita na inona na inona teo aminy, afa-tsy ravina ihany; dia hoy Izy taminy: Aza misy voa avy aminao intsony mandrakizay. Dia maina vetivety foana ilay hazo aviavy. [*aviavimbazaha]'
mg1865::mg_40::21::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny mpianatra izany, dia gaga izy ka nanao hoe: Nanao ahoana re no dia nahamaina vetivety io aviavy io?'
mg1865::mg_40::21::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Lazaiko aminareo marina tokoa: Raha manam-pinoana ianareo ka tsy miahanahana, dia tsy izao natao tamin''ny aviavy izao ihany no ho vitanareo, fa raha hiteny amin''ity tendrombohitra ity aza ianareo ka hanao hoe: Mifindrà ianao, ka mianjerà any an-dranomasina, dia ho tonga izany.'
mg1865::mg_40::21::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na inona na inona no angatahinareo amin''ny fivavahana atao amin''ny finoana dia ho azonareo.'
mg1865::mg_40::21::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nanontanian''ny lohan''ny mpisorona sy ny loholona an''i Jesoa ny amin''ny fahefany, ary ny fanoharana navalin''i Jesoa azy.'
  verse_text: 'Ary rehefa tafiditra teo an-kianjan''ny tempoly Jesoa ka nampianatra, dia nanatona Azy ny lohan''ny mpisorona sy ny loholona ka nanao hoe: Fahefana manao ahoana no anaovanao izao? Ary iza no nanome Anao izao fahefana izao?'
mg1865::mg_40::21::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Izaho kosa hanontany anareo zavatra iray loha, ary raha hovalianareo izany, Izaho kosa dia hilaza aminareo izay fahefana anaovako izany:'
mg1865::mg_40::21::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny batisan''i Jaona, avy taiza moa izany? Avy tany an-danitra va, sa avy tamin''ny olona? Ary izy ireo niara-nisaina* ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hovaliany hoe isika: Ka nahoana no tsy nino azy ianareo? [*Na:nieritreritra]'
mg1865::mg_40::21::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha holazaintsika hoe kosa: Avy tamin''ny olona, dia matahotra ny vahoaka isika, satria ataon''izy rehetra ho mpaminany Jaona.'
mg1865::mg_40::21::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly an''i Jesoa izy ka nanao hoe: Tsy fantatray. Dia hoy Jesoa taminy: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izany.'
mg1865::mg_40::21::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahoana kosa no hevitrareo? Nisy lehilahy nanana zanaka roa lahy; dia nankeo amin''ny lahimatoa izy ka nanao hoe: Anaka, andeha miasa any amin''ny tanim-boaloboko anio.'
mg1865::mg_40::21::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly izy ka nanao hoe: Tsy handeha aho; nefa nony afaka izany, dia nanenina izy ka nandeha ihany.'
mg1865::mg_40::21::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo amin''ny faralahy izy ka niteny toy izany koa. Ary izy namaly ka nanao hoe: Handeha aho, tompoko; kanjo tsy nandeha izy.'
mg1865::mg_40::21::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka iza moa amin''izy mirahalahy no nanao ny sitrapon''ny rainy? Hoy izy: Ny lahimatoa. Dia hoy Jesoa taminy: Lazaiko aminareo marina tokoa fa ny mpamory hetra sy ny vehivavy janga efa mialoha anareo ho amin''ny fanjakan''Andriamanitra.'
mg1865::mg_40::21::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jaona nankany aminareo tamin''ny lalan''ny fahamarinana, nefa tsy nino azy ianareo; fa ny mpamory hetra sy ny vehivavy janga no nino azy; fa ianareo kosa, na dia efa nahita izany aza, dia mbola tsy nanenina mba hinoanareo azy.'
mg1865::mg_40::21::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa fanoharana hafa koa: Nisy lehilahy tompon-trano nanao tanim-boaloboka, dia namefy azy manodidina dia nihady famiazana teo anatiny, dia nanao tilikambo, ary dia nahofany tamin''olona mpiasa tany izany, ka nandeha ho any amin''ny tany hafa izy.'
mg1865::mg_40::21::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mby akaiky ny taom-pahavokarana, dia naniraka ny mpanompony izy hankany amin''ny mpiasa tany handray ny vokatra.'
mg1865::mg_40::21::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpiasa tany nisambotra ny mpanompony, ka ny anankiray nokapohiny, ary ny anankiray novonoiny, ary ny anankiray notorahany vato.'
mg1865::mg_40::21::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka mpanompo hafa koa indray izy, maro noho ny teo; fa nataony toy izany koa ireny.'
mg1865::mg_40::21::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony farany dia naniraka ny zanany hankany aminy izy ka nanao hoe: Hanaja ny zanako izy.'
mg1865::mg_40::21::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo ny mpiasa tany, nony nahita ny zanaka, dia niresaka hoe: Ity no mpandova; andeha hovonointsika izy, dia ho lasantsika ny lovany.'
mg1865::mg_40::21::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisambotra azy izy ka namoaka azy teo ivelan''ny tanim-boaloboka, dia namono azy.'
mg1865::mg_40::21::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha tonga ny tompon''ny tanim-boaloboka, hataony ahoana moa izany mpiasa tany izany?'
mg1865::mg_40::21::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy taminy: Hataony loza tokoa ny handringanany izany olon-doza izany, ary ny tanim-boaloboka dia hahofany amin''ny mpiasa tany sasany izay hanome azy ny vokatra amin''ny fotoany avy.'
mg1865::mg_40::21::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Tsy mbola novakinareo va ny teny ao amin''ny Soratra Masina hoe: Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro; Avy tamin''i Jehovah izao Ka mahagaga eo imasontsika? (Salamo 118:22-23).'
mg1865::mg_40::21::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia lazaiko aminareo hoe: Hesorina aminareo ny fanjakan''Andriamanitra ka homena izay firenena mahavokatra ny voany.'
mg1865::mg_40::21::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay potraka amin''ity vato ity dia ho torotoro, fa na zovy na zovy no hianjerany, dia ho mongomongo*. [*Grika: haely toy ny vovoka]'
mg1865::mg_40::21::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny lohan''ny mpisorona sy ny Fariseo ny fanoharana nataon''i Jesoa, dia fantany fa ny tenany no nolazainy amin''izany.'
mg1865::mg_40::21::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 21
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitady hisambotra Azy izy, saingy natahotra ny vahoaka, satria nataon''ny vahoaka ho mpaminany Jesoa.'
mg1865::mg_40::22::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly, dia nilaza fanoharana taminy indray ka nanao hoe:'
mg1865::mg_40::22::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanjakan''ny lanitra dia tahaka ny mpanjaka, izay nanao fanasana fampakaram-bady ho an''ny zananilahy.'
mg1865::mg_40::22::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy naniraka ny mpanompony hiantso izay efa nasaina mba hankao amin''ny fampakaram-bady; fa tsy nety ho avy ireo.'
mg1865::mg_40::22::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka mpanompo hafa koa indray izy ka nanao hoe: Lazao amin''ny efa nasaina hoe: Indro, efa voavoatra ny nahandroko; efa voavono ny ombiko sy ny nafahiko, ka efa voavoatra avokoa ny zavatra rehetra; koa mankanesa aty amin''ny fampakaram-bady ianareo.'
mg1865::mg_40::22::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nahoany akory izany, fa samy lasa nandeha izy, ny anankiray ho any amin''ny sahany, ary ny anankiray ho any amin''ny varony.'
mg1865::mg_40::22::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sisa nisambotra ny mpanompony, dia nisetrasetra taminy ka namono azy.'
mg1865::mg_40::22::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tezitra ilay mpanjaka ka naniraka ny miaramilany, dia nandringana izany mpamono olona izany sady nandoro ny tanànany.'
mg1865::mg_40::22::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny mpanompony: Efa voavoatra ny fampakaram-bady, fa ny efa nasaina no tsy miendrika.'
mg1865::mg_40::22::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mankanesa ianareo any amin''ny sampanan-dàlana, ary izay hitanareo, dia asao ho ao amin''ny fampakaram-bady.'
mg1865::mg_40::22::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ho any amin''ny lalana ireny mpanompo ireny ka namory izay rehetra hitany, na ny ratsy, na ny tsara; ary dia feno mpihinana ny fampakaram-bady.'
mg1865::mg_40::22::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa niditra ny mpanjaka hizaha ny mpihinana, dia nahita lehilahy anankiray izay tsy niakanjo ny akanjo fitondra amin''ny fampakaram-bady.'
mg1865::mg_40::22::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Ry sakaiza, ahoana no idiranao eto, nefa ianao tsy miakanjo ny akanjo fitondra amin''ny fampakaram-bady? Dia sina izy.'
mg1865::mg_40::22::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hoy ny mpanjaka tamin''ny mpanompony: Afatory ny tongony aman-tanany, dia ario any amin''ny maizina any ivelany izy; any no hisy ny fitomaniana sy ny fikitroha-nify.'
mg1865::mg_40::22::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro no antsoina, nefa vitsy no fidina.'
mg1865::mg_40::22::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny nanontaniana an''i Jesoa ny amin''ny mandoa vola hetra ho an''i Kaisara.'
  verse_text: 'Ary tamin''izay dia lasa ny Fariseo ka niara-nisaina mba hamandrika Azy amin''ny teniny.'
mg1865::mg_40::22::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka ny mpianany mbamin''ny Herodiana hankeo aminy izy ka nanao hoe: Mpampianatra o, fantatray fa marina Ianao ka mampianatra marina ny lalan''Andriamanitra ary tsy manahy olona, satria tsy mba mizaha tavan''olona.'
mg1865::mg_40::22::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminay ary izay hevitrao: Moa mety va ny mandoa vola hetra ho an''i Kaisara, sa tsia?'
mg1865::mg_40::22::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nahalala ny faharatsiany, dia nanao hoe: Nahoana no maka fanahy Ahy ianareo, ry mpihatsaravelatsihy?'
mg1865::mg_40::22::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asehoy Ahy ny farantsakely fandoa amin''ny hetra. Dia nitondrany denaria Izy.'
mg1865::mg_40::22::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: An''iza ity sary sy soratra ity?'
mg1865::mg_40::22::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy taminy: An''i Kaisara. Dia hoy Jesoa taminy: Aloavy ho an''i Kaisara ary izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra.'
mg1865::mg_40::22::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahare izy, dia gaga, ary dia nandao Azy ka lasa nandeha.'
mg1865::mg_40::22::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nanontanian''ny Sadoseo an''i Jesoa ny amin''ny hitsanganan''ny maty.'
  verse_text: 'Tamin''izany andro izany dia nankeo amin''i Jesoa ny Sadoseo sasany, izay milaza fa tsy misy fitsanganan''ny maty, ka nanontany Azy hoe:'
mg1865::mg_40::22::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpampianatra o, Mosesy nilaza hoe: Raha misy maty momba, aoka ny rahalahiny hampakatra ny vadiny ka hiteraka hamelo-maso ny rahalahiny (Deoteronomia 25:5).'
mg1865::mg_40::22::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nisy fito mirahalahy tety aminay; ary ny zokiny nampaka-bady, dia maty, ary satria tsy nanan-janaka izy, dia navelany ho an''ny rahalahiny ny vadiny;'
mg1865::mg_40::22::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary toy izany koa ny faharoa sy ny fahatelo, hatramin''ny fahafito.'
mg1865::mg_40::22::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa faran''izy rehetra dia maty koa ravehivavy.'
mg1865::mg_40::22::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny fitsanganan''ny maty, ho vadin''iza amin''izy fito mirahalahy moa ravehivavy? satria efa samy nanambady azy avokoa izy rehetra.'
mg1865::mg_40::22::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Mahadiso hevitra anareo ny tsy fahafantaranareo ny Soratra Masina na ny herin''Andriamanitra.'
mg1865::mg_40::22::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny fitsanganan''ny maty dia tsy mba hisy hampaka-bady, na havoaka hampakarina, fa ho tahaka ny anjely* any an-danitra izy. [*Na: (anjelin''Andriamanitra)]'
mg1865::mg_40::22::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny fitsanganan''ny maty, moa tsy mbola novakinareo va ny teny nataon''Andriamanitra taminareo manao hoe:'
mg1865::mg_40::22::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Andriamanitr''i Abrahama sy Andriamanitr''isaka ary Andriamanitr''i Jakoba (Eksodosy 3:6)? Andriamanitra tsy an''ny maty, fa an''ny velona.'
mg1865::mg_40::22::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka, raha nandre, dia talanjona tamin''ny fampianarany.'
mg1865::mg_40::22::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 34
  verse_date_revised: null
  verse_title: 'Ny nanontaniana an''i Jesoa ny amin''izay didy lehibe.'
  verse_text: 'Fa ny Fariseo, nony nandre fa nampahasina ny Sadoseo Izy, dia niangona.'
mg1865::mg_40::22::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ireo, izay mpahay lalàna, nanontany naka fanahy Azy ka nanao hoe:'
mg1865::mg_40::22::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpampianatra o, ny didy manao ahoana moa no lehibe ao amin''ny lalàna?'
mg1865::mg_40::22::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra ary ny sainao rehetra (Deoteronomia 6:5).'
mg1865::mg_40::22::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no didy lehibe sady voalohany.'
mg1865::mg_40::22::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faharoa, izay tahaka azy ihany, dia izao: Tiava ny namanao tahaka ny tenanao (Levitikosy 19:18).'
mg1865::mg_40::22::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany didy roa izany no ihantonan''ny lalàna rehetra sy ny mpaminany.'
mg1865::mg_40::22::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 41
  verse_date_revised: null
  verse_title: 'Ny nanontanian''i Jesoa ny Fariseo ny amin''izay maha-Zanak''i Davida ny Mesia.'
  verse_text: 'Ary rehefa tafangona ny Fariseo, dia nanontany azy Jesoa ka nanao hoe:'
mg1865::mg_40::22::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no hevitrareo ny amin''i Kristy? Zanak''iza moa Izy? Hoy izy taminy: Zanak''i Davida.'
mg1865::mg_40::22::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Koa nahoana ary Davida amin''ny Fanahy no manao Azy hoe Tompo, ka manao hoe:'
mg1865::mg_40::22::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho eo ambanin''ny tongotrao (Salamo 110:1)?'
mg1865::mg_40::22::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha Davida ary manao Azy hoe Tompo, ahoana no maha-zanany Azy?'
mg1865::mg_40::22::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 22
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy nisy nahavaly Azy na dia teny iray akory aza; ary hatramin''izay andro izay dia tsy nisy sahy nanontany Azy intsony.'
mg1865::mg_40::23::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa ny faharatsian''ny mpanora-dalàna sy ny Fariseo.'
  verse_text: 'Ary tamin''izany Jesoa dia niteny tamin''ny vahoaka sy tamin''ny mpianany ka nanao hoe:'
mg1865::mg_40::23::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo amin''ny fipetrahan''i Mosesy no ipetrahan''ny mpanora-dalàna sy ny Fariseo;'
mg1865::mg_40::23::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa amin''izany, izay rehetra lazainy dia ataovy ka tandremo; fa aza mba manao araka ny asany, satria miteny ihany izy, nefa tsy manao.'
mg1865::mg_40::23::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, mamehy entana sady mavesatra no sarotra entina izy ka manaingina izany eo amin''ny soroky ny olona, nefa ny tenany tsy mety manetsika izany na dia amin''ny rantsan-tanany anankiray aza.'
mg1865::mg_40::23::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: '2022-07-26T09:35:46+0000'
  verse_title: null
  verse_text: 'Ary ny asany rehetra dia ataony mba ho hitan''ny olona; fa ataony lehibe ny filakiterany, ary ataony vaventy ny somotraviaviny.'
mg1865::mg_40::23::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tia ny fitoerana aloha eo amin''ny fanasana izy, sy ny fipetrahana aloha eo amin''ny synagoga'
mg1865::mg_40::23::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny hoharabain''ny olona eny an-tsena ary ny hataon''ny olona hoe: Raby o!'
mg1865::mg_40::23::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa aza mba mety hatao hoe: Raby o; fa iray ihany no mpampianatra anareo, ary ianareo rehetra dia mpirahalahy avokoa.'
mg1865::mg_40::23::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza milaza olona ety an-tany ho rainareo; fa iray ihany no Rainareo, dia Izay any an-danitra.'
mg1865::mg_40::23::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mba mety hatao hoe mpitarika ianareo; fa iray ihany no Mpitarika anareo, dia Kristy.'
mg1865::mg_40::23::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay lehibe aminareo no ho mpanompo anareo.'
mg1865::mg_40::23::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manandra-tena no haetry; ary izay manetry tena no hasandratra.'
mg1865::mg_40::23::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa arindrinareo eo anoloan''ny olona ny fanjakan''ny lanitra; fa ianareo tsy miditra, ary izay miditra dia tsy avelanareo hiditra*. [*Ampio hoe:]'
mg1865::mg_40::23::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: '(Lozanareo mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! Fa laninareo ny tranon''ny mpitondratena, ary dia manao vavaka lavareny ho fiolahana ianareo; koa izany no hahazoanareo fahamelohana mafimafy kokoa.)'
mg1865::mg_40::23::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa mandeha mitety ny ranomasina sy ny tany maina ianareo mba hahazoanareo na dia iray ihany aza ho proselyta; ary rehefa azonareo izy, dia ataonareo zanaky ny helo mihoatra indroa noho ianareo aza.'
mg1865::mg_40::23::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpitarika jamba izay manao hoe: Raha misy mianiana amin''ny tempoly, dia tsy mampaninona izany; fa raha misy mianiana amin''ny volamena amin''ny tempoly, dia haningo-tena izy.'
mg1865::mg_40::23::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry adala sy jamba! iza no lehibe, ny volamena va, sa ny tempoly izay nahamasina ny volamena?'
mg1865::mg_40::23::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa: Raha misy mianiana amin''ny alitara, dia tsy mampaninona izany; fa raha misy mianiana amin''ny fanatitra eo amboniny, dia haningo-tena izy.'
mg1865::mg_40::23::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry jamba! iza no lehibe, ny fanatitra, sa ny alitara izay mahamasina ny fanatitra?'
mg1865::mg_40::23::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, izay mianiana amin''ny alitara, dia mianiana aminy mbamin''ny zavatra rehetra izay eo amboniny.'
mg1865::mg_40::23::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mianiana amin''ny tempoly dia mianiana aminy mbamin''izay mitoetra ao anatiny.'
mg1865::mg_40::23::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mianiana amin''ny lanitra dia mianiana amin''ny seza fiandrianan''Andriamanitra mbamin''izay mipetraka eo amboniny.'
mg1865::mg_40::23::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa mandoa ny fahafolon''ny solila sy ny aneta ary ny komina* ianareo, nefa navelanareo izay lehibe amin''ny lalàna, dia ny rariny sy ny famindram-po ary ny finoana; ireto tokony ho nataonareo, nefa tsy tokony havelanareo ireroana. [*Anaran-java-maniry ireo]'
mg1865::mg_40::23::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mpitarika jamba! tantavaninareo ny moka, nefa atelinareo ny rameva.'
mg1865::mg_40::23::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa diovinareo ny vohon''ny kapoaka sy ny lovia, nefa ny ao anatiny dia feno rombaka sy tsy fahononana.'
mg1865::mg_40::23::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Fariseo jamba! diovy aloha ny atin''ny kapoaka sy ny lovia, mba ho madio koa ny vohony.'
mg1865::mg_40::23::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa ianareo dia tahaka ny fasana voalalotra fotsy, izay miseho tsara tarehy eo ivelany, nefa ny ao anatiny dia feno taolan''ny maty mbamin''ny fahalotoana rehetra.'
mg1865::mg_40::23::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa ianareo: raha amin''ny eo ivelany dia miseho amin''ny olona ho marina, nefa ny ao anatinareo dia feno fihatsaram-belatsihy sy tsy fankatoavan-dalàna.'
mg1865::mg_40::23::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa manao ny fasan''ny mpaminany ianareo sady manisy haingony ny rarivatom-pasan''ny olona marina,'
mg1865::mg_40::23::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy ianareo: Raha niara-belona tamin''ny razanay izahay, dia tsy mba nikambana taminy handatsa-drà ny mpaminany.'
mg1865::mg_40::23::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia miampanga tena ianareo fa zanak''izay namono ny mpaminany.'
mg1865::mg_40::23::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo koa dia mamenoa ny famaran''ny razanareo.'
mg1865::mg_40::23::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry bibilava, taranaky ny menarana, hataonareo ahoana no fandositra ny fanamelohana ho any amin''ny helo?'
mg1865::mg_40::23::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany, indro, Izaho maniraka mpaminany sy olon-kendry ary mpanora-dalàna ho aty aminareo; koa ny sasany hovonoinareo sy hohomboanareo amin''ny hazo fijaliana, ary ny sasany hokapohinareo ao amin''ny synagoganareo sy henjehinareo mitety vohitra,-'
mg1865::mg_40::23::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanody anareo ny rà marina rehetra, izay nalatsaka tambonin''ny tany, hatramin''ny ran''i Abela marina ka hatramin''ny ran''i Zakaria, zanak''i Barakia, izay novonoinareo teo anelanelan''ny tempoly sy ny alitara.'
mg1865::mg_40::23::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Hanody ity taranaka ity izany rehetra izany.'
mg1865::mg_40::23::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay irahina ho aminao, impiry Aho no ta-hanangona ny zanakao, tahaka ny fanomban''ny akoho ny zanany ao ambanin''ny elany, fa tsy nety ianareo!'
mg1865::mg_40::23::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avela ho lao ho anareo ny tranonareo.'
mg1865::mg_40::23::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 23
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo: Hatramin''izao dia tsy hahita Ahy tokoa ianareo mandra-pilazanareo hoe: Isaorana anie Izay avy amin''ny anaran''i Jehovah.'
mg1865::mg_40::24::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanambaran''i Jesoa ny handravana an''i Jerosalema sy ny hihaviany indray.'
  verse_text: 'Ary nony niala teo an-kianjan''ny tempoly Jesoa, dia lasa nandeha; ary ny mpianany nanatona Azy hampizaha Azy ny rafitry ny tempoly.'
mg1865::mg_40::24::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy namaly ka nanao taminy hoe: Tsy hitanareo va ireo rehetra ireo? Lazaiko aminareo marina tokoa: Tsy havela hisy vato hifanongoa eto ka tsy horavana. [*Na:Tsy hitanareo izany rehetra izany]'
mg1865::mg_40::24::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nipetraka teo an-tendrombohitra Oliva Izy, dia nanatona Azy mangingina ny mpianany ka nanao hoe: Lazao aminay izay andro hahatongavan''izany, ary izay ho famantarana ny fihavianao sy ny fahataperan''izao tontolo izao.'
mg1865::mg_40::24::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Mitandrema, fandrao hisy hamitaka anareo.'
mg1865::mg_40::24::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro no ho avy amin''ny anarako hanao hoe: Izaho no Kristy, ka maro no ho voafitany.'
mg1865::mg_40::24::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary handre ady sy filazana ady ianareo; koa mitandrema, aza matahotra; fa tsy maintsy ho tonga izany; nefa tsy mbola tonga ny farany.'
mg1865::mg_40::24::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohorontany amin''ny tany samy hafa.'
mg1865::mg_40::24::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany rehetra izany no fiandohan''ny fahoriana*. [*Grika: faharariam-piterahana; izahao Matio 19:28]'
mg1865::mg_40::24::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hatolony ho amin''ny fahoriana ianareo ka hovonoiny; ary ho halan''ny firenena rehetra ianareo noho ny anarako.'
mg1865::mg_40::24::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia ho tafintohina ny maro, ary hifampiampanga sy hifankahala izy.'
mg1865::mg_40::24::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy mpaminany sandoka maro hitsangana ka hamitaka ny maro.'
mg1865::mg_40::24::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny haben''ny tsy fankatoavan-dalàna dia hihamangatsiaka ny fitiavan''ny maro.'
mg1865::mg_40::24::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay maharitra hatramin''ny farany no hovonjena.'
mg1865::mg_40::24::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hotorina amin''izao tontolo izao ity filazantsaran''ny fanjakana ity ho vavolombelona amin''ny firenena rehetra, dia vao ho tonga ny farany.'
mg1865::mg_40::24::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha hitanareo mitsangana ao amin''izay fitoerana masina ny fahavetavetan''ny fandravana, izay nampilazaina an''i Daniela mpaminany (Daniela 12:11; Daniela 9:27) (aoka hisaina izay mamaky izany),'
mg1865::mg_40::24::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aoka izay olona any Jodia handositra ho any an-tendrombohitra;'
mg1865::mg_40::24::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay ao an-tampon-trano aoka tsy hidina haka ny ao an-tranony;'
mg1865::mg_40::24::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay any an-tsaha aoka tsy hiverina haka ny lambany.'
mg1865::mg_40::24::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lozan''ny bevohoka sy ny mampinono amin''ireo andro ireo!'
mg1865::mg_40::24::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mivavaha ianareo mba tsy ho amin''ny ririnina na ho amin''ny Sabata no handosiranareo.'
mg1865::mg_40::24::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany andro izany dia hisy fahoriana lehibe, izay tsy mbola nisy toa azy hatrizay niandohan''izao tontolo izao ka mandraka ankehitriny, sady tsy hisy intsony.'
mg1865::mg_40::24::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy efa nohafohezina izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy dia hohafohezina izany andro izany.'
mg1865::mg_40::24::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha misy manao aminareo hoe: Indro, atý Kristy, na: Indro, arý ; aza mino ianareo.'
mg1865::mg_40::24::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana lehibe sy fahagagana, ary raha azo atao, na dia ny olom-boafidy aza dia hofitahiny.'
mg1865::mg_40::24::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, voalazako aminareo rahateo izany.'
mg1865::mg_40::24::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, raha misy manao aminareo hoe: Indro, any an''efitra Izy, aza mankany ianareo; Indro, ao amin''ny efi-trano Izy, aza mino.'
mg1865::mg_40::24::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny helatra avy any atsinanana ka hita hatrany andrefana, dia ho tahaka izany ny fihavian''ny Zanak''olona.'
mg1865::mg_40::24::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay itoeran''ny faty, dia any no hiangonan''ny voromahery.'
mg1865::mg_40::24::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao afaka ny fahoriana amin''ireo andro ireo, ny masoandro dia hohamaizinina, ary ny volana tsy hahazava; ny kintana hiraraka avy any an-danitra, ary ny herin''ny lanitra hohozongozonina.'
mg1865::mg_40::24::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hiseho eo amin''ny lanitra ny famantarana ny Zanak''olona, ka dia hitomany ny firenena rehetra ambonin''ny tany, ary hahita ny Zanak''olona avy amin-kery sy voninahitra lehibe eo amin''ny rahon''ny lanitra izy.'
mg1865::mg_40::24::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny ampanenoana mafy ny trompetra dia haniraka ny anjeliny Izy, ary hangonin''ireo ny olom-boafidy avy amin''ny vazan-tany* efatra hatramin''ny faravodilanitra rehetra. [*Grika: rivotra]'
mg1865::mg_40::24::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mianara ny fanoharana ny amin''ny aviavy:* Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona. [*aviavimbazaha]'
mg1865::mg_40::24::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa ianareo, raha vao hitanareo izany rehetra izany, dia aoka ho fantatrareo fa efa akaiky mby eo am-baravarana Izy*. [*Na: izany]'
mg1865::mg_40::24::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Tsy mba ho lany izao taranaka izao mandra-pahatongan''izany rehetra izany.'
mg1865::mg_40::24::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.'
mg1865::mg_40::24::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''izany andro sy ora izany dia tsy misy mahalala, na dia ny anjelin''ny lanitra aza, [*ary na ny Zanaka aza,] afa-tsy ny Ray ihany.'
mg1865::mg_40::24::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny andron''i Noa, dia ho tahaka izany koa ny fihavian''ny Zanak''olona.'
mg1865::mg_40::24::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny tamin''ny andro fony tsy mbola tonga ny Safo-drano, ka nihinana sy nisotro ny olona ary nampaka-bady sy namoaka ny ampakarina, mandra-pihavin''ny andro izay nidiran''i Noa tao amin''ny sambo-fiara,'
mg1865::mg_40::24::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy fantany mandra-pihavin''ny Safo-drano izay nandringana ny olona rehetra, dia ho tahaka izany ny fihavian''ny Zanak''olona.'
mg1865::mg_40::24::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela.'
mg1865::mg_40::24::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy roa vavy manodina ny fikosoham-bary; ny anankiray horaisina, ary ny anankiray havela.'
mg1865::mg_40::24::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany miambena ianareo; fa tsy fantatrareo izay andro hihavian''ny Tomponareo.'
mg1865::mg_40::24::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa aoka ho fantatrareo izao: Raha fantatry ny tompon-trano ny fiambenana amin''ny alina izay hihavian''ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina.'
mg1865::mg_40::24::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miomana kosa ianareo; fa amin''izay ora tsy ampoizinareo no hihavian''ny Zanak''olona.'
mg1865::mg_40::24::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no mpanompo mahatoky sy manan-tsaina, izay notendren''ny tompony hifehy ny mpanompony mba hanome azy hanina amin''ny fotoana?'
mg1865::mg_40::24::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izany mpanompo izany, raha avy ny tompony ka hahita azy manao izany.'
mg1865::mg_40::24::47:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Hotendreny ho mpanapaka ny fananany rehetra izy.'
mg1865::mg_40::24::48:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao anakampo izany mpanompo ratsy fanahy izany hoe: Maharitra ela ny tompoko,'
mg1865::mg_40::24::49:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia mikapoka ny mpanompo namany izy ary mihinana sy misotro amin''ny mpimamo,'
mg1865::mg_40::24::50:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho avy ny tompon''izany mpanompo izany amin''ny andro izay tsy ampoiziny sy amin''ny ora izay tsy fantany,'
mg1865::mg_40::24::51:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 24
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hotapahiny roa* izy ka homeny anjara any amin''ny mpihatsaravelatsihy; any no hisy ny fitomaniana sy ny fikitroha-nify. [*Na: hokapohiny mafy]'
mg1865::mg_40::25::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny virijiny folo.'
  verse_text: 'Ary amin''izany ny fanjakan''ny lanitra dia ho tahaka ny virijina folo, izay nitondra ny fanalany* ka nivoaka hitsena ny mpampakatra. [*Na: fanilony]'
mg1865::mg_40::25::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny dimy tamin''ireo dia adala, fa ny dimy kosa hendry.'
mg1865::mg_40::25::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny adala nandray ny fanalany*, nefa tsy nitondra solika fitaiza; [*Na: fanilony]'
mg1865::mg_40::25::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hendry kosa nitondra solika tao anatin''ny fitondrany sy ny fanalany*. [*Na: fanilony]'
mg1865::mg_40::25::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha naharitra ela ny mpampakatra, dia samy rendrehana avy izy rehetra, ka dia natory.'
mg1865::mg_40::25::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony mamatonalina, dia nisy antso hoe: Indro ny mpampakatra! Mivoaha mba hitsena azy.'
mg1865::mg_40::25::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ireo virijina ireo, ka samy namboatra ny fanalany*. [*Na: fanilony]'
mg1865::mg_40::25::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny adala tamin''ny hendry: Mba omeo kely amin''ny solikareo izahay; fa efa ho faty ny fanalanay*. [*Na: fanilonay]'
mg1865::mg_40::25::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny hendry namaly ka nanao hoe: Sao tsy ampy ho anay sy ho anareo, fa mandehana mankany amin''ny mpivarotra ianareo, ka mividiana ho anareo.'
mg1865::mg_40::25::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola lasa nividy izy, dia tonga ny mpampakatra, ary izay efa niomana dia niara-niditra taminy tao amin''ny fampakaram-bady, ary dia narindrina ny varavarana.'
mg1865::mg_40::25::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia tonga kosa ireo virijina teo ka nanao hoe Tompoko, tompoko, vohay izahay.'
mg1865::mg_40::25::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy namaly hoe: Lazaiko aminareo marina tokoa: Tsy fantatro ianareo.'
mg1865::mg_40::25::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany miambena ianareo, fa tsy fantatrareo na ny andro na ny ora.'
mg1865::mg_40::25::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny talenta.'
  verse_text: 'Fa ny fanjakan''ny lanitra dia tahaka ny olona izay efa handeha ho any an-tany hafa ka niantso ny mpanompony, dia nanolotra azy ny fananany:'
mg1865::mg_40::25::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa ny anankiray nomeny talenta dimy, ny anankiray roa, ary ny anankiray iray,- samy araka izay fahaizany avy; dia lasa nandeha izy.'
mg1865::mg_40::25::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia lasa ilay nandray ny talenta dimy, ka nataony varotra izany; ary nahazo tombony talenta dimy koa izy.'
mg1865::mg_40::25::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa, ilay nandray ny roa dia nahazo roa ho tombony.'
mg1865::mg_40::25::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay nandray ny iray kosa dia lasa nihady ny tany ka nandevina ny volan''ny tompony.'
mg1865::mg_40::25::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ela, dia tonga ny tompon''ireo mpanompo ireo ka nampilaza azy ny amin''ny volany.'
mg1865::mg_40::25::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nanatona ilay nandray ny talenta dimy, dia nitondra talenta dimy koa izy ka nanao hoe: Tompoko, talenta dimy no natolotrao ahy; indro, nahazo tombony talenta dimy koa aho.'
mg1865::mg_40::25::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky* tamin''ny kely ianao, dia hotendreko ho mpanapaka ny be; midira amin''ny fifalian''ny tomponao. [*Na: Ry mpanompo tsara sady mahatoky, nahatoky tsara, etc]'
mg1865::mg_40::25::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nanatona koa ilay nandray ny talenta roa, dia hoy izy: Tompoko, talenta roa no natolotrao ahy; indro, nahazo tombony talenta roa koa aho.'
mg1865::mg_40::25::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky* tamin''ny kely ianao, dia hotendreko ho mpanapaka ny be; midira amin''ny fifalian''ny tomponao. [*Na: Ry mpanompo tsara sady mahatoky, nahatoky tsara, etc]'
mg1865::mg_40::25::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nanatona kosa ilay nandray ny talenta iray, dia nilaza hoe: Tompoko, fantatro fa olona mila voatsiary ianao, mijinja eny amin''izay tsy namafazanao, ary manangona eny amin''izay tsy nanahafanao;'
mg1865::mg_40::25::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia natahotra aho ka lasa nandevina ny talentanao tao anatin''ny tany; indry, lasanao ny anao.'
mg1865::mg_40::25::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tompony namaly ka nanao taminy hoe: Ry mpanompo ratsy sady malaina, efa fantatrao fa mijinja eny amin''izay tsy namafazako aho, ary manangona eny amin''izay tsy nanahafako;'
mg1865::mg_40::25::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa tokony ho nampanàna ny volako tamin''ny mpanana vola ianao, ka raha tonga aho, dia ho nandray ny ahy mban-janany.'
mg1865::mg_40::25::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa alao aminy ny talenta, dia omeo ilay manana ny talenta folo.'
mg1865::mg_40::25::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra manana dia homena, ka hanam-be izy; fa izay tsy manana kosa, na dia izay ananany aza dia halaina aminy.'
mg1865::mg_40::25::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ario ho any amin''ny maizina any ivelany ny mpanompo tsy mahasoa; any no hisy ny fitomaniana sy ny fikitroha-nify.'
mg1865::mg_40::25::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 31
  verse_date_revised: '2022-06-01T06:35:04+0000'
  verse_title: 'Ny hihavian''i Kristy hitsara ny firenena rehetra.'
  verse_text: 'Ary raha tonga ny Zanak''olona amin''ny voninahiny, arahin''ny anjely rehetra, dia hipetraka eo ambonin''ny seza fiandrianan''ny voninahiny Izy;'
mg1865::mg_40::25::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 32
  verse_date_revised: '2022-10-13T07:24:42+0000'
  verse_title: null
  verse_text: 'ary ny firenena rehetra hangonina eo anatrehany, dia hanavaka azy izy
, tahaka ny mpiandry ondry manavaka ny ondry amin''ny osy*; [*Gr: zanak''osy]'
mg1865::mg_40::25::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hametraka ny ondry eo amin''ny ankavanany Izy, fa ny osy* eo amin''ny ankaviany.'
mg1865::mg_40::25::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany ny Mpanjaka dia hilaza amin''izay eo amin''ny ankavanany hoe: Avia ianareo izay notahin''ny Raiko, mandovà ny fanjakana izay voavoatra ho anareo hatrizay nanorenana izao tontolo izao;'
mg1865::mg_40::25::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa noana Aho, dia nomenareo hanina; nangetaheta Aho dia nampisotroinareo; nivahiny Aho, dia nampiantranoinareo;'
mg1865::mg_40::25::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy nanan-kitafy Aho, dia notafianareo; narary Aho, dia notsaboinareo; tao an-tranomaizina Aho, dia novangianareo.'
mg1865::mg_40::25::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hamaly Azy ny marina ka hanao hoe: Tompoko, oviana no hitanay noana Ianao ka nomenay hanina, na nangetaheta ka nampisotroinay?'
mg1865::mg_40::25::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary oviana no hitanay nivahiny Ianao ka nampiantranoinay, na tsy nanan-kitafy ka notafianay?'
mg1865::mg_40::25::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary oviana no hitanay narary Ianao, na tao an-tranomaizina, ka novangianay?'
mg1865::mg_40::25::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hamaly ny Mpanjaka ka hanao aminy hoe: Lazaiko aminareo marina tokoa: Araka izay efa nataonareo tamin''ny anankiray amin''ireto rahalahiko kely indrindra ireto no nataonareo tamiko.'
mg1865::mg_40::25::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hilaza indray amin''izay eo amin''ny ankaviany kosa Izy hoe: Mialà amiko, ianareo izay voaozona, ho any amin''ny afo maharitra mandrakizay, izay voavoatra ho an''ny devoly sy ny anjeliny;'
mg1865::mg_40::25::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa noana Aho, fa tsy mba nomenareo hanina; nangetaheta Aho, fa tsy mba nampisotroinareo;'
mg1865::mg_40::25::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'nivahiny Aho, fa tsy mba nampiantranoinareo; tsy nanan-kitafy Aho, fa tsy mba notafianareo; narary sy tao an-tranomaizina Aho, fa tsy mba novangianareo.'
mg1865::mg_40::25::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hamaly kosa ireo hoe: Tompoko, oviana no hitanay noana Ianao, na nangetaheta, na nivahiny, na tsy nanan-kitafy, na narary, na tao an-tranomaizina, ka tsy mba nanompo Anao izahay?'
mg1865::mg_40::25::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hamaly azy Izy ka hanao hoe: Lazaiko aminareo marina tokoa: Araka izay tsy nataonareo tamin''ny anankiray amin''ireto kely indrindra ireto no tsy mba nataonareo tamiko.'
mg1865::mg_40::25::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 25
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia hiala ho any amin''ny fampijaliana mandrakizay; fa ny marina ho any amin''ny fiainana mandrakizay.'
mg1865::mg_40::26::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikendren''ny loholona sy ny lohan''ny mpisorona hamono an''i Jesoa.'
  verse_text: 'Ary rehefa vitan''i Jesoa izany teny rehetra izany, dia nilaza tamin''ny mpianany hoe Izy:'
mg1865::mg_40::26::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrareo fa raha afaka indroa andro, dia ho tonga ny Paska, koa ny Zanak''olona dia hatolotra hohomboana amin''ny hazo fijaliana.'
mg1865::mg_40::26::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia nivory ny lohan''ny mpisorona sy ny loholona tao an-kianjan''ny tranon''ny mpisoronabe atao hoe Kaiafa.'
mg1865::mg_40::26::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niara-nihevitra izy hisambotra an''i Jesoa amin''ny fitaka ka hamono Azy;'
mg1865::mg_40::26::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa hoy izy: Tsy amin''ny andro firavoravoana, fandrao hisy tabataba amin''ny olona.'
mg1865::mg_40::26::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny nanosoran-dravehivavy ny tongotr''i Jesoa tao an-tranon''i Simona boka.'
  verse_text: 'Ary nony tany Betania Jesoa, tao an-tranon''i Simona boka,'
mg1865::mg_40::26::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanatona Azy ny vehivavy anankiray nitondra tavoara alabastara feno menaka manitra saro-bidy loatra, ka naidiny tamin''ny lohany izany, raha nipetraka nihinana Izy.'
mg1865::mg_40::26::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nahita izany ny mpianatra, dia tezitra ka nanao hoe: Inona no anton''izao fandaniam-poana izao?'
mg1865::mg_40::26::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa azo namidy ho lafo be iny ka homena ny malahelo.'
mg1865::mg_40::26::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatr''i Jesoa izay nataon''ireo, ka dia hoy Izy taminy: Nahoana ianareo no mampalahelo an-dravehivavy? fa asa soa no nataony tamiko.'
mg1865::mg_40::26::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny malahelo dia eto aminareo mandrakariva, fa Izaho tsy mba ho eto aminareo mandrakariva.'
mg1865::mg_40::26::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy no nampidina izany menaka manitra izany tamin''ny tenako, dia ny hamboatra Ahy halevina no nanaovany izany.'
mg1865::mg_40::26::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Na aiza na aiza amin''izao tontolo izao no hitoriana ity filazantsara ity, dia holazaina koa izay nataon-dravehivavy mba ho fahatsiarovana azy.'
mg1865::mg_40::26::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny naneken''i Jodasy hamadika an''i Jesoa.'
  verse_text: 'Ary ny anankiray tamin''ny roa ambin''ny folo lahy, atao hoe Jodasy Iskariota, dia nankao amin''ny lohan''ny mpisorona'
mg1865::mg_40::26::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Homenareo hoatrinona aho hanolorako Azy aminareo? Ary izy nandanja sekely volafotsy telo-polo homena azy.'
mg1865::mg_40::26::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''izay no nitadiavany izay andro hahazoany mamadika Azy.'
mg1865::mg_40::26::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny niarahan''i Jesoa sy ny mpianany nihinana ny Paska.'
  verse_text: 'Ary tamin''ny voalohan''ny andro fihinanana ny mofo tsy misy masirasira dia nankeo amin''i Jesoa ny mpianatra ka nanao hoe: Aiza no tianao hamboarinay hihinananao ny Paska?'
mg1865::mg_40::26::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Mankanesa any an-tanàna ho any amin-dralehilahy, ka lazao aminy hoe: Hoy ny Mpampianatra: Efa akaiky ny fotoako; koa ato aminao Aho sy ny mpianatro no hitandrina ny Paska.'
mg1865::mg_40::26::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianatra dia nanao araka ny nasain''i Jesoa nataony ka namboatra ny Paska.'
mg1865::mg_40::26::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hariva ny andro, dia nipetraka nihinana Izy mbamin''ny mpianatra roa ambin''ny folo lahy*. [*Na: (mbamin''ny roa ambin''ny folo lahy)]'
mg1865::mg_40::26::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nihinana izy, dia hoy Jesoa: Lazaiko aminareo marina tokoa fa ny anankiray aminareo hamadika Ahy.'
mg1865::mg_40::26::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalahelo indrindra izy rehetra, ka samy nanontany Azy hoe: Moa izaho va izany, Tompoko?'
mg1865::mg_40::26::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao hoe: Izay niara-nanatsoboka ny tanany tamiko tao anatin''ny lovia, izy no hamadika Ahy.'
mg1865::mg_40::26::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Zanak''olona dia mandeha tokoa araka izay nanoratana Azy, nefa lozan''izay olona hahazoana ny Zanak''olona hatolotra! tsara ho an''izany olona izany raha tsy ary akory.'
mg1865::mg_40::26::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jodasy, izay namadika Azy, dia namaly ka nanao hoe: Izaho va izany, Raby o? Dia hoy Izy taminy: Voalazanao.'
mg1865::mg_40::26::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nihinana izy, dia nandray mofo Jesoa, ka nony efa nisaotra Izy, dia novakiny ka natolony ny mpianatra, ary hoy Izy: Raiso, hano, ity no tenako.'
mg1865::mg_40::26::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandray kapoaka* Izy, ka nony efa nisaotra, dia natolony azy ka nataony hoe: Sotroinareo rehetra ity; [*Na: (ny kapoaka)]'
mg1865::mg_40::26::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ity no rako, dia ny amin''ny fanekena*, izay alatsaka ho an''ny maro ho famelan-keloka. [*Na: (ny fanekena vaovao)]'
mg1865::mg_40::26::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko aminareo fa hatramin''izao dia tsy mba hisotro itony vokatry ny voaloboka itony intsony Aho mandra-pihavin''ny andro hiarahako misotro izay vaovao aminareo any amin''ny fanjakan''ny Raiko.'
mg1865::mg_40::26::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 30
  verse_date_revised: null
  verse_title: 'Ny resaka nataon''i Jesoa sy ny mpianany teny an-dàlana, raha nankany amin''ny tendrombohitra Oliva.'
  verse_text: 'Ary rehefa nihira fiderana izy, dia lasa nankany amin''ny tendrombohitra Oliva.'
mg1865::mg_40::26::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia hoy Jesoa taminy: Ianareo rehetra dia ho tafintohina noho ny amiko anio alina; fa voasoratra hoe: Hamely ny mpiandry Aho, dia hihahaka ny ondry andrasana (Zakaria 13:7).'
mg1865::mg_40::26::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa atsangana Aho, dia hialoha anareo ho any Galilia.'
mg1865::mg_40::26::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera namaly ka nanao taminy hoe: Na dia ho tafintohina noho ny aminao aza ny olona rehetra, izaho tsy mba ho tafintohina mandrakizay.'
mg1865::mg_40::26::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Lazaiko aminao marina tokoa fa anio alina, raha tsy mbola misy akoho maneno, dia handà Ahy intelo ianao.'
mg1865::mg_40::26::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Petera taminy: Na dia hiara-maty aminao aza aho, tsy mba handà Anao tokoa aho. Ary toy izany koa no nolazain''ny mpianatra rehetra.'
mg1865::mg_40::26::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 36
  verse_date_revised: null
  verse_title: 'Jesoa tao Getsemane.'
  verse_text: 'Ary Jesoa mbamin''ny mpianany dia tonga tao amin''ny saha anankiray atao hoe Getsemane, ary hoy Izy tamin''ny mpianany: Mipetraha eto aloha ianareo, raha mbola mankeroa hivavaka Aho.'
mg1865::mg_40::26::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra an''i Petera mbamin''izy roa lahy zanak''i Zebedio Izy, dia nalahelo am-po sy ory indrindra.'
mg1865::mg_40::26::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy taminy: Fadiranovana loatra ny fanahiko, toy ny efa ho faty; mitoera eto, ka miaraha miari-tory amiko.'
mg1865::mg_40::26::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandroso kelikely Izy, dia niankohoka ka nivavaka hoe: Raiko o, raha azo atao, dia aoka hesorina amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao.'
mg1865::mg_40::26::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankeo amin''ny mpianatra Izy ka nahita azy matory, dia hoy Izy tamin''i Petera: Hay! tsy mahazaka ny miara-miari-tory amiko na dia ora iray ihany aza ianareo!'
mg1865::mg_40::26::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miareta tory sy mivavaha ianareo, mba tsy hidiranareo amin''ny fakam-panahy; mety ihany ny fanahy, fa ny nofo no tsy manan-kery.'
mg1865::mg_40::26::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha fanindroany Izy ka nivavaka hoe: Raiko o, raha tsy azo esorina ity, fa tsy maintsy hosotroiko, dia aoka ny sitraponao no hatao.'
mg1865::mg_40::26::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga Izy, dia nahita azy matory indray; fa efa nilondolondo ny masony.'
mg1865::mg_40::26::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandao azy Izy ka lasa indray, dia nivavaka fanintelony ka nanao izany teny izany ihany.'
mg1865::mg_40::26::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo amin''ny mpianatra Izy ka nanao taminy hoe: Matoria ary ankehitriny, ka mialà sasatra ianareo*; indro, efa akaiky ny ora, ary ny Zanak''olona hatolotra eo an-tanan''ny mpanota. [*Na: Mbola matory ihany va ianareo ka miala sasatra?]'
mg1865::mg_40::26::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, andeha isika; indro fa efa akaiky ilay mamadika Ahy.'
mg1865::mg_40::26::47:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 47
  verse_date_revised: null
  verse_title: 'Ny nisamborana an''i Jesoa.'
  verse_text: 'Ary raha mbola niteny Jesoa, indro, avy Jodasy, izay isan''ny roa ambin''ny folo lahy, mbamin''ny vahoaka betsaka niaraka taminy, nitondra sabatra sy langilangy, nirahin''ny lohan''ny mpisorona sy ny loholona.'
mg1865::mg_40::26::48:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay namadika Azy nanome famantarana ny olona ka nanao hoe: Izay horohako no Izy; sambory Izy.'
mg1865::mg_40::26::49:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nanatona an''i Jesoa izy ka nanao hoe: Finaritra, Raby! dia nanoroka Azy.'
mg1865::mg_40::26::50:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Ry sakaiza, ataovy izay nalehanao eto*. Dia nanatona ny olona ka nisambotra an''i Jesoa ary nitana Azy. [*Na: haninona eto ianao?]'
mg1865::mg_40::26::51:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ny anankiray tamin''izay nomba an''i Jesoa naninjitra ny tanany, dia nanatsoaka ny sabany ka nikapa ny mpanompon''ny mpisoronabe ary nahafaka ny sofiny.'
mg1865::mg_40::26::52:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Ampidiro amin''ny tranony ny sabatrao; fa izay rehetra mandray sabatra no hovonoina amin''ny sabatra.'
mg1865::mg_40::26::53:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataonao va fa tsy mahazo mangataka amin''ny Raiko Aho, dia haniraka anjely tsy omby roa ambin''ny folo legiona ho ety amiko Izy ankehitriny?'
mg1865::mg_40::26::54:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha izany, dia hatao ahoana no hahatanteraka ny Soratra Masina, izay milaza fa tsy maintsy ho tonga izany?'
mg1865::mg_40::26::55:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ora izany dia niteny tamin''ny vahoaka Jesoa ka nanao hoe : Mivoaka mitondra sabatra sy langilangy hisamboatra Ahy toy ny hisambotra jiolahy va ianareo? Isan''andro dia nipetraka nampianatra teo an-kianjan''ny tempoly Aho, nefa tsy nisambotra Ahy ianareo.'
mg1865::mg_40::26::56:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany rehetra izany dia tonga mba hahatanteraka izay voasoratry ny mpaminany. Ary tamin''izany dia nandao Azy ny mpianatra rehetra ka nandositra.'
mg1865::mg_40::26::57:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 57
  verse_date_revised: null
  verse_title: 'Ny nitsarana an''i Jesoa teo anatrehan''i Kaiafa, sy ny nandavan''i Petera Azy intelo.'
  verse_text: 'Ary izay efa nisambotra an''i Jesoa dia nitondra Azy ho any amin''i Kaiafa mpisoronabe, izay nivorian''ny mpanora-dalàna sy ny loholona.'
mg1865::mg_40::26::58:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nanaraka Azy teny lavidavitra eny hatrany amin''ny kianjan''ny tranon''ny mpisoronabe; ary niditra izy, dia niara-nipetraka tao amin''ny mpiandry raharaha mba hahita izay hiafarany.'
mg1865::mg_40::26::59:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona mbamin''ny Synedriona rehetra nitady teny ho entiny hiampanga lainga an''i Jesoa mba hamonoany Azy;'
mg1865::mg_40::26::60:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy nahita izy, na dia maro aza ny vavolombelona mandainga tonga teo. Ary nony farany dia nisy roa lahy tonga teo, izay nanao hoe:'
mg1865::mg_40::26::61:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilehity nanao hoe: Mahay mandrava ny tempolin''Andriamanitra Aho sy manangana azy amin''ny hateloana.'
mg1865::mg_40::26::62:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny mpisoronabe ka nanao tamin''i Jesoa hoe: Tsy mety mamaly akory va Ianao? Inona no iampangan''ireto Anao?'
mg1865::mg_40::26::63:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy niteny Jesoa. Dia hoy ny mpisoronabe taminy: Ampianianiko amin''Andriamanitra velona Ianao hilaza aminay, raha Ianao no Kristy, Zanak''Andriamanitra.'
mg1865::mg_40::26::64:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa taminy: Voalazanao; ary koa, lazaiko aminareo: Hatramin''izao dia ho hitanareo ny Zanak''olona mipetraka eo amin''ny tanana ankavanan''ny Hery sy avy eo amin''ny rahon''ny lanitra.'
mg1865::mg_40::26::65:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ny mpisoronabe dia nandriatra ny fitafiany ka nanao hoe: Efa niteny ratsy* Izy; ahoana no mbola ilantsika vavolombelona indray? indro, efa renareo izao fitenenan-dratsy* izao. [*Grika: blasfemia, izahao Matio 9:3]'
mg1865::mg_40::26::66:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no hevitrareo? Ary ireo namaly ka nanao hoe: Miendrika hohelohina ho faty Izy.'
mg1865::mg_40::26::67:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nororany ny tavany, ka nasiany totohondry Izy; ary ny sasany namely tahamaina Azy.'
mg1865::mg_40::26::68:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Maminania aminay, ry Kristy, iza no namely Anao?'
mg1865::mg_40::26::69:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nipetraka teo ivelany, teo an-kianja, dia nanatona azy ny ankizivavy anankiray ka nanao hoe: Ianao koa nomba an''i Jesoa, ilay Galiliana.'
mg1865::mg_40::26::70:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy nandà teo anatrehan''izy rehetra ka nanao hoe: Tsy azoko izay lazainao.'
mg1865::mg_40::26::71:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala ho eo am-bavahady izy, dia nahita azy ny ankizivavy anankiray koa ka nilaza tamin''izay teo hoe: Ity koa nomba an''i Jesoa avy any Nazareta.'
mg1865::mg_40::26::72:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 72
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandà indray tamin''ny fianianana izy ka nanao hoe: Tsy fantatro izany Lehilahy izany.'
mg1865::mg_40::26::73:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 73
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka kelikely, dia nanatona izay nijanona teo ka nanao tamin''i Petera hoe: Marina tokoa fa naman''ireny ianao; fa ny fiteninao miampanga anao.'
mg1865::mg_40::26::74:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 74
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vao niozona sy nianiana izy ka nanao hoe: Tsy fantatro izany Lehilahy izany; ary niaraka tamin''izay dia nisy akoho naneno.'
mg1865::mg_40::26::75:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 26
  verse_number: 75
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nahatsiaro ny tenin''i Jesoa, izay nolazainy hoe: Raha tsy mbola misy akoho maneno, dia handà Ahy intelo ianao. Ary rehefa nivoaka teny ivelany izy, dia nitomany fatratra.'
mg1865::mg_40::27::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsaran''i Pilato an''i Jesoa, sy ny nanolorany Azy hohomboana amin''ny hazo fijaliana, ary ny nanenenan''i Jodasy.'
  verse_text: 'Ary nony maraina ny andro, ny lohan''ny mpisorona rehetra sy ny loholona dia niara-nihevitra hiampanga an''i Jesoa mba hamonoany Azy.'
mg1865::mg_40::27::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nafatony Izy, dia nentiny ka natolony an''i Pilato governora.'
mg1865::mg_40::27::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jodasy, ilay namadika Azy, raha nahita fa nohelohina Jesoa, dia nanenina ka namerina ny sekely volafotsy telo-polo tamin''ny lohan''ny mpisorona sy ny loholona'
mg1865::mg_40::27::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Nanota aho, satria namadika rà marina. Fa hoy ireo: Ahoanay izany? fa asa anao.'
mg1865::mg_40::27::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony natsipiny teo amin''ny tempoly ny vola, dia niala izy ka lasa nandeha, dia nanao tadimody ary nananton-tena, ka dia maty.'
mg1865::mg_40::27::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona nandray ny vola ka nanao hoe: Tsy mety raha alatsaka ao amin''ny rakitry ny tempoly io, fa vidin-drà.'
mg1865::mg_40::27::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niara-nihevitra izy, dia namidiny ny sahan''ny mpanefy vilany ny vola ho fandevenam-bahiny.'
mg1865::mg_40::27::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no anaovana ny anaran''izany saha izany mandraka androany hoe Sahan-drà.'
mg1865::mg_40::27::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia tanteraka izay nampilazaina an''i Jeremia mpaminany hoe: Dia nalainy ny sekely volafotsy telo-polo, vidin''ilay notombanana*, dia ilay notombanan''ny Zanak''Isiraely, [*Na: Nohajaina]'
mg1865::mg_40::27::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nomeny hamidy ny sahan''ny mpanefy vilany izany, araka izay efa nandidian''i Jehovah ahy (Jeremia 18:2; Zakaria 11:13).'
mg1865::mg_40::27::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nitsangana teo anatrehan''ny governora; ary ny governora nanontany Azy ka nanao hoe: Ianao va no Mpanjakan''ny Jiosy? Dia hoy Jesoa taminy: Voalazanao.'
mg1865::mg_40::27::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nampangain''ny lohan''ny mpisorona mbamin''ny loholona Izy, dia tsy namaly akory.'
mg1865::mg_40::27::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Pilato taminy: Tsy renao va izany zavatra maro iampangany Anao izany?'
mg1865::mg_40::27::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy namaly azy Izy na dia indraim-bava akory aza, ka dia gaga indrindra ny governora.'
mg1865::mg_40::27::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaky ny tonga ny andro firavoravoana dia fanaon''ny governora ny mandefa mpifatotra anankiray ho an''ny vahoaka, araka izay tiany.'
mg1865::mg_40::27::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia nisy mpifatotra malaza atao hoe Barabasy.'
mg1865::mg_40::27::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony tafangona teo ny olona, dia hoy Pilato taminy: Iza moa no tianareo halefako ho anareo? Barabasy, sa Jesoa, Izay atao hoe Kristy?'
mg1865::mg_40::27::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantany fa fialonana no nanoloran''ireo Azy.'
mg1865::mg_40::27::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nipetraka teo amin''ny fitsarana izy, ny vadiny dia naniraka hankeo aminy ka nanao hoe: Aza manao na inona na inona amin''izany Lehilahy marina izany, fa nampahory ahy be ihany ny nanofisako Azy any naraina.'
mg1865::mg_40::27::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona mbamin''ny loholona nitaona ny vahoaka mba hangataka an''i Barabasy ary hamono an''i Jesoa.'
mg1865::mg_40::27::21:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny governora namaly ka nanao taminy hoe: Iza moa amin''izy roa lahy no tianareo halefako ho anareo? Dia hoy izy: Barabasy.'
mg1865::mg_40::27::22:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Pilato taminy: Ka ahoana kosa ary no hataoko amin''i Jesoa, Izay atao hoe Kristy? Dia hoy izy rehetra: Aoka hohomboana amin''ny hazo fijaliana Izy.'
mg1865::mg_40::27::23:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny governora: Inona ary no ratsy nataony? Fa vao mainka niantsoantso izy ka nanao hoe: Aoka hohomboana amin''ny hazo fijaliana Izy!'
mg1865::mg_40::27::24:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''i Pilato, fa tsy nahaleo ditra aza izy, fa vao mainka nandroso ihany aza ny tabataba, dia naka rano izy ka nanasa tanana teo anatrehan''ny vahoaka ary nanao hoe: Afaka amin''ny ran''ity Lehilahy marina ity aho, fa asa anareo.'
mg1865::mg_40::27::25:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra dia namaly ka nanao hoe: Aoka ny ràny ho aminay mbamin''ny zanakay.'
mg1865::mg_40::27::26:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nandefa an''i Barabasy ho an''ny olona izy; fa Jesoa nasainy nokapohina*, dia natolony mba hohomboana tamin''ny hazo fijaliana. [*Grika: dia nokapohiny; ny teny Grika milaza ny nokapohina tamin''ny fikapohana hoditra lehibe nisy varahina]'
mg1865::mg_40::27::27:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny nanomboana an''i Jesoa amin''ny hazo fijaliana.'
  verse_text: 'Ary ny miaramilan''ny governora dia nitondra an''i Jesoa ho ao anati-rova* sady nanangona ny miaramila namany rehetra ho eo aminy. [*Grika: pretoria]'
mg1865::mg_40::27::28:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanala ny fitafiany, dia nanafy Azy lamba jaky izy.'
mg1865::mg_40::27::29:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrandrana satroka tsilo izy, ka nasatrony ny lohany, ary nampitaniny volotara ny tanany ankavanana, dia nandohalika teo anatrehany izy ka naneso Azy hoe: Arahaba, ry Mpanjakan''ny Jiosy!'
mg1865::mg_40::27::30:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nororany Izy, ary nalainy ny volotara ka nokapohiny ny lohany.'
mg1865::mg_40::27::31:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa naneso Azy izy, dia nanala ilay lamba taminy, ka nampitafiny Azy indray ny fitafiany, ary dia nentiny Izy mba hohomboana amin''ny hazo fijaliana.'
mg1865::mg_40::27::32:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha izy, dia nahita lehilahy Kyreniana anankiray, atao hoe Simona, ka izy notereny hitondra ny hazo fijalian''i Jesoa.'
mg1865::mg_40::27::33:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo amin''ny tany atao hoe Golgota izy, izany hoe Ikarandoha,'
mg1865::mg_40::27::34:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nomeny divay miharo afero Izy hosotroiny; ary nony nanandrana izany Izy, dia tsy nety nisotro.'
mg1865::mg_40::27::35:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voahombony tamin''ny hazo fijaliana Izy, dia nanaovany loka no fizàrany ny fitafiany.'
mg1865::mg_40::27::36:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nipetraka izy, dia niambina Azy teo.'
mg1865::mg_40::27::37:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary napetany teo ambonin''ny lohany ny soratra milaza ny nanamelohana Azy, dia izao: Ity no Jesoa, Mpanjakan''ny Jiosy.'
mg1865::mg_40::27::38:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy jiolahy roa nohomboana tamin''ny hazo fijaliana teo an-daniny roa, ny anankiray teo amin''ny ankavanany, ary ny anankiray teo amin''ny ankaviany.'
mg1865::mg_40::27::39:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nandalo dia niteny ratsy* Azy, sady nihifikifi-doha [*Grika: nanao blasfemia; izahao Matio 9:3]'
mg1865::mg_40::27::40:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Ry Ilay mandrava ny tempoly sy manangana azy amin''ny hateloana, vonjeo ny tenanao. Raha Zanak''Andriamanitra Ianao, midina hiala amin''ny hazo fijaliana.'
mg1865::mg_40::27::41:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia naneso toy izany koa ny lohan''ny mpisorona mbamin''ny mpanora-dalàna sy ny loholona ka nanao hoe:'
mg1865::mg_40::27::42:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sasany novonjeny; fa ny tenany tsy hainy vonjena. Mpanjakan''ny Isiraely Izy, aoka hidina hiala amin''ny hazo fijaliana Izy ankehitriny, dia hino Azy izahay;'
mg1865::mg_40::27::43:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'natoky an''Andriamanitra Izy, aoka Izy hamonjy Azy ankehitriny, raha ankasitrahany Izy (Salamo 22:8), satria hoy Izy: Zanak''Andriamanitra Aho.'
mg1865::mg_40::27::44:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandatsa Azy toy izany koa ireo jiolahy niaraka nohomboana taminy tamin''ny hazo fijaliana.'
mg1865::mg_40::27::45:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''ny ora fahenina ka hatramin''ny ora fahasivy dia maizina ny tany rehetra.'
mg1865::mg_40::27::46:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tokony ho tamin''ny ora fahasivy, dia niantso tamin''ny feo mahery Jesoa ka nanao hoe: Ely, Ely, lamà sabaktany? izany hoe: Andriamanitro o, Andriamanitro o, nahoana no dia mahafoy Ahy Ianao? (Salamo 22:1).'
mg1865::mg_40::27::47:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''izay nijanona teo, raha nandre izany, dia nanao hoe: Miantso an''i Elia Ilehio.'
mg1865::mg_40::27::48:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay ny anankiray teo aminy dia nihazakazaha ka nandray sipaonjy, ary rehefa natsobony tamin''ny vinaingitra izany ka notohiziny tamin''ny volotara, dia natohony hotsentsefin''i Jesoa.'
mg1865::mg_40::27::49:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany kosa nanao hoe: Aoka hoe hizahantsika na ho avy hamonjy Azy Elia, na tsia.'
mg1865::mg_40::27::50:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niantso tamin''ny feo mahery indray Jesoa, dia nanolotra ny fanahiny.'
mg1865::mg_40::27::51:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ny efitra lamba tao amin''ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany; dia nihorohoro ny tany, ka nitresaka ny vatolampy;'
mg1865::mg_40::27::52:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisokatra ny fasana, ka maro ny fatin''ny olona masina izay efa nodi-mandry no natsangana,'
mg1865::mg_40::27::53:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nivoaka avy tao amin''ny fasana ireo taorian*''ny nitsanganan''i Jesoa, dia nankao amin''ny Tanàna Masina ka niseho tamin''ny maro. [*Na:ary taorin'', etc]'
mg1865::mg_40::27::54:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapiteny sy ny fehiny, izay niambina an''i Jesoa, raha nahita ny horohorontany mbamin''izay zavatra tonga teo, dia raiki-tahotra indrindra ka nanao hoe: Marina tokoa fa Zanak''Andriamanitra io Lehilahy io.'
mg1865::mg_40::27::55:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy maro nitsinjo teny lavitra eny, izay nanaraka an''i Jesoa hatrany Galilia ka nanompo Azy.'
mg1865::mg_40::27::56:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isan''ireny Maria Magdalena sy Maria, renin''i Jakoba sy Josesy, ary ny renin''ny zanak''i Zebedio.'
mg1865::mg_40::27::57:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 57
  verse_date_revised: null
  verse_title: 'Ny nandevenana an''i Jesoa.'
  verse_text: 'Ary nony hariva ny andro, dia avy ny lehilahy manan-karena anankiray, avy any Arimatia, ny anarany atao hoe Josefa, ary izy koa dia mpianatr''i Jesoa.'
mg1865::mg_40::27::58:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany lehilahy izany dia nankao amin''i Pilato ka nangataka ny fatin''i Jesoa. Dia nasain''i Pilato homena azy izany.'
mg1865::mg_40::27::59:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nalain''i Josefa ny faty ka nofonosiny hariry madinika madio,'
mg1865::mg_40::27::60:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia naleviny tao amin''ny fasany vaovao izay efa nolavahany tamin''ny vatolampy; ary rehefa nanakodia vato lehibe ho eo amin''ny varavaran''ny fasana izy, dia lasa nandeha.'
mg1865::mg_40::27::61:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao Maria Magdalena sy ilay Maria anankiray ka nipetraka tandrifin''ny fasana.'
mg1865::mg_40::27::62:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''ny andro fiomanana, dia nivory nankeo amin''i Pilato ny lohan''ny mpisorona sy ny Fariseo'
mg1865::mg_40::27::63:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Tompoko, tsaroanay fa iny mpamitaka iny, fony Izy mbola velona, dia nanao hoe: Raha afaka hateloana, dia hitsangana Aho.'
mg1865::mg_40::27::64:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa asaovy hambenana mafy ny fasana mandra-pahatongan''ny andro fahatelo, fandrao avy ny mpianany ka mangalatra Azy, dia hilaza amin''ny olona hoe: Efa natsangana tamin''ny maty Izy; ka dia ho ratsy ny fitaka farany noho ny voalohany.'
mg1865::mg_40::27::65:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Pilato taminy: Makà mpiambina ka mandehana, ary ataovy mafy araka izay hainareo ny fiambenana.'
mg1865::mg_40::27::66:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 27
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony lasa izy, dia nalatsany ny mpiambina hiambina mafy ny fasana, rehefa nasiany tombo-kase ny vato.'
mg1865::mg_40::28::1:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsanganan''i Jesoa tamin''ny maty, sy ny nisehoany tamin''ny mpianany.'
  verse_text: 'Ary tamin''ny alin''ny Sabata, raha vao nazava ratsy ny andro voalohany amin''ny herinandro, dia avy hizaha ny fasana Maria Magdalena sy ilay Maria anankiray.'
mg1865::mg_40::28::2:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy horohorontany mafy; fa nisy anjelin''ny Tompo nidina avy tany an-danitra, dia nankeo ka nanakodia ny vato, dia nipetraka teo amboniny.'
mg1865::mg_40::28::3:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fijery azy dia tahaka ny helatra, ary ny fitafiany fotsy tahaka ny oram-panala;'
mg1865::mg_40::28::4:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpiambina nivadi-po noho ny fahatahorana azy ka tonga tahaka ny maty.'
mg1865::mg_40::28::5:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely namaly ka nilaza tamin''ny vehivavy hoe: Aza matahotra ianareo; fa fantatro fa Jesoa, Izay efa nohomboana tamin''ny hazo fijaliana, no tadiavinareo.'
mg1865::mg_40::28::6:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ato Izy, fa efa nitsangana araka izay nolazainy. Avia, ka jereo, fa tao no nandrian''ny Tompo.'
mg1865::mg_40::28::7:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandehana faingana, ka lazao amin''ny mpianany fa efa nitsangana tamin''ny maty Izy; ary, indro, mialoha anareo ho any Galilia Izy; any no hahitanareo Azy; indro, efa nilaza taminareo aho.'
mg1865::mg_40::28::8:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala faingana tamin''ny fasana izy ireo sady natahotra no faly indrindra, dia nihazakazaka hilaza tamin''ny mpianatra.'
mg1865::mg_40::28::9:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Jesoa nifanena taminy ka nanao hoe: Finaritra. Ary izy ireo nanatona, dia nihazona ny tongony ka niankohoka teo anatrehany.'
mg1865::mg_40::28::10:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Aza matahotra; fa mandehana, ka asaovy mankany Galilia ny rahalahiko; fa any no hahitany Ahy.'
mg1865::mg_40::28::11:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha izy ireo, indreny, ny mpiambina sasany nankany an-tanana ka nilaza tamin''ny lohan''ny mpisorona ny zavatra rehetra izay vao niseho.'
mg1865::mg_40::28::12:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niangona izy mbamin''ny loholona, dia niara-nihevitra ka nanome vola be ny miaramila'
mg1865::mg_40::28::13:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao hoe: Lazao hoe: Ny mpianany no tonga alina ka nangalatra Azy raha sendra natory izahay;'
mg1865::mg_40::28::14:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha misy milaza izany amin''ny governora, izahay dia hampanaiky azy ka hanao izay tsy hampaninona anareo.'
mg1865::mg_40::28::15:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandray ny vola izy ka nanao araka ny teny nomeny azy; ary izany teny izany dia naelin''ny Jiosy mandraka androany.'
mg1865::mg_40::28::16:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianatra iraika ambin''ny folo lahy dia nankany Galilia, ho any amin''ilay tendrombohitra nasain''i Jesoa halehany.'
mg1865::mg_40::28::17:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita Azy izy, dia niankohoka, fa ny sasany niahanahana.'
mg1865::mg_40::28::18:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanatona dia niteny taminy ka nanao hoe: Efa nomena Ahy ny fahefana rehetra any an-danitra sy ety an-tany;'
mg1865::mg_40::28::19:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa mandehana ianareo, dia ataovy mpianatra ny firenena rehetra, manao batisa azy ho amin''ny anaran''ny Ray sy ny Zanaka ary ny Fanahy Masina'
mg1865::mg_40::28::20:
  verse_version: mg1865
  verse_book: mg_40
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady mampianatra azy hitandrina izay rehetra nandidiako anareo; ary, indro, Izaho momba anareo mandrakariva ambara-pahatongan''ny fahataperan''izao tontolo izao.'
