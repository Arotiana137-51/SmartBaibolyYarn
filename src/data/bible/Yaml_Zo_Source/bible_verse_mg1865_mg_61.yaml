mg1865::mg_61::1::1:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana, sy fananarana mba hitondra tena mendrika ny Kristiana'
  verse_text: 'Simona Petera, mpanompo sy Apostolin''i Jesoa Kristy, mamangy izay efa nahazo finoana soa tahaka ny anay amin''ny fahamarinan''i Jesoa Kristy, Andriamanitsika sy Mpamonjy: [*Na: ny fahamarinan''Andriamanitra sy Jesoa Kristy, Mpamonjy antsika]'
mg1865::mg_61::1::2:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana amin''ny fahalalana tsara an''Andriamanitra sy Jesoa Tompontsika.'
mg1865::mg_61::1::3:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nomen''ny herin''Andriamanitra ho antsika ny zavatra rehetra momba ny fiainana sy ny toe-panahy araka an''Andriamanitra amin''ny fahalalana Ilay niantso antsika tamin''ny voninahiny sy ny fahatsarany*; [*Na: "tamin''ny voninahitra sy ny fahatsarana"]'
mg1865::mg_61::1::4:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izany no nahatanterahany amintsika ireo teny fikasana sady soa no lehibe indrindra, mba ho tonga mpiray amin''ny fomban''Andriamanitra amin''izany ianareo, rehefa afa-nandositra ny fahalotoana izay eo amin''izao tontolo izao noho ny filàna;'
mg1865::mg_61::1::5:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa noho izany dia manaova izay zotom-po rehetra kosa ianareo, ka amin''ny finoanareo dia manehoa fahatanjahan-tsaina, ary amin''ny fahatanjahan-tsainareo dia fahalalana,'
mg1865::mg_61::1::6:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''ny fahalalanareo dia fahononam-po, ary amin''ny fahononam-ponareo dia faharetana, ary amin''ny faharetanareo dia toe-panahy araka an''Andriamanitra,'
mg1865::mg_61::1::7:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''ny toe-panahinareo araka an''Andriamanitra dia fitiavana ny rahalahy, ary amin''ny fitiavanareo ny rahalahy dia fitiavana ny olona rehetra.'
mg1865::mg_61::1::8:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha anananareo izany zavatra izany, sady anananareo betsaka, dia tsy avelan''izany ho malaina na tsy hahavokatra ianareo amin''ny fahalalana tsara an''i Jesoa Kristy Tompontsika.'
mg1865::mg_61::1::9:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tsy manana izany zavatra izany kosa dia toa jamba ka tsy mahajery lavitra, sady nanadino ny nanadiovana azy tamin''ny fahotany voalohany izy.'
mg1865::mg_61::1::10:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia mazotoa kokoa, ry rahalahy, hampitoetra ny fiantsoana sy ny fifidianana anareo; fa raha manao izany zavatra izany ianareo, dia tsy ho tafintohina akory mandrakizay;'
mg1865::mg_61::1::11:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa toy izany no hanomezana malalaka ho anareo ny fidirana ho any amin''ny fanjakana mandrakizay, izay an''i Jesoa Kristy, Tompontsika sy Mpamonjy antsika.'
mg1865::mg_61::1::12:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Fananarana mba hiorina tsara amin''ny fampianarana marina'
  verse_text: 'Koa hazoto mandrakariva hampahatsiaro anareo ny amin''izany zavatra izany aho, na dia efa fantatrareo aza, ka efa naorina tsara amin''ny fahamarinana izay efa eo aminareo.'
mg1865::mg_61::1::13:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola eto amin''ity trano-lay ity aho, dia ataoko fa mety ny hampifoha anareo amin''ny fampahatsiarovana anareo,'
mg1865::mg_61::1::14:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria fantatro fa ho avy tampoka ny hanesorana ny trano-laiko, dia toy ny nasehon''i Jesoa Kristy Tompontsika tamiko koa.'
mg1865::mg_61::1::15:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hataoko izay zakako mba hisy hahatsiarovanareo izany zavatra izany mandrakariva, rehefa maty aho.'
mg1865::mg_61::1::16:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nanaraka izay anganongano noforonin''ny fahafetsen''ny saina izahay, raha nampahafantatra anareo ny hery sy ny fihavian''i Jesoa Kristy Tompontsika; fa efa hitan''ny masonay ny fiandrianany.'
mg1865::mg_61::1::17:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nahazo laza amam-boninahitra tamin''Andriamanitra Ray Izy, raha tonga teo aminy avy tamin''ny voninahitra lehibe indrindra ilay feo nanao hoe: "Ity no Zanako malalako izay sitrako" (Matio 17:5).'
mg1865::mg_61::1::18:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary renay io feo avy tany an-danitra io, raha niara-nipetraka taminy tany an-tendrombohitra masina izahay.'
mg1865::mg_61::1::19:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manana ny teny faminaniana atao mafy orina kokoa isika; koa raha mandinika izany ianareo, dia manao tsara, fa toy ny jiro mahazava ao amin''ny fitoerana maizimaizina izany, mandra-pahazavan''ny andro, ka miposaka ao am-ponareo ny fitarik''andro;'
mg1865::mg_61::1::20:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatrareo voalohany indrindra fa ny famoahan-kevitry ny faminaniana ao amin''ny Soratra Masina dia tsy efan''ny fisainan''ny olona fotsiny ihany;'
mg1865::mg_61::1::21:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy nisy faminaniana avy tamin''ny sitrapon''ny olona tany aloha rehetra; fa avy tamin''Andriamanitra no nitenenan''ny olona araka izay nitondran''ny Fanahy Masina azy.'
mg1865::mg_61::2::1:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hahafantarana ny mpampianatra sandoka, sy faminaniana ny handringanana azy'
  verse_text: 'Efa nisy mpaminany sandoka teo amin''ny olona Isiraely, ary hisy koa mpampianatra sandoka tahaka izany eo aminareo, izay hahatonga mangingina sain-diso* mahavery ary handà ny Tompo Izay nividy azy aza ka hahatonga fahaverezana tampoka ho amin''ny tenany. [*Na: fitokoana]'
mg1865::mg_61::2::2:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro no hanaraka ny fijejojejoany; ka ireny no hitenenan-dratsy* ny lalan''ny fahamarinana. [*Grika: hanaovana blasfemia, izahao Matio 9:3]'
mg1865::mg_61::2::3:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny hafatratry ny fitiavany harena no hanaovany varotra anareo amin''ny teny mamitaka; efa ela izay no tsy nijanonjanona ny fitsarana ireny, ary tsy rendremana ny fahaverezany.'
mg1865::mg_61::2::4:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy navelan''Andriamanitra ny anjely fony nanota, fa noroahiny ho any amin''ny helo ka natolony ho ao an-davaka maizina* mba hotehirizina ho amin''ny fitsarana, [*Na: (nafatony tamin''ny gadra fahamaizinana)]'
mg1865::mg_61::2::5:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha tsy namela izao rehetra izao taloha Izy, fa namonjy an''i Noa, mpitory ny fahamarinana, sy ireo fito, fony nahatonga ny safo-drano tamin''ny ratsy fanahy teo amin''izao tontolo izao,-'
mg1865::mg_61::2::6:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nataony nanjary lavenona ny tanàna Sodoma sy Gomora ka nohelohiny horavana ary nataony fananarana ho an''izay ratsy fanahy ato aoriana,-'
mg1865::mg_61::2::7:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Lota marina, izay ory dia ory noho ny fijejojejoan''ny olona ratsy fanahy, no novonjeny ho afaka'
mg1865::mg_61::2::8:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa izany lehilahy marina izany, raha nitoetra teo aminy, dia nahory loatra ny fanahiny marina isan''andro isan''andro noho ny nahitany sy ny nandrenesany ny fandikan''ireo ny lalàna):'
mg1865::mg_61::2::9:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia fantatry ny Tompo izay hamonjeny ny tsara fanahy amin''ny fakam-panahy sy ny hitehirizany ny olona tsy marina amin''ny fijaliana ho amin''ny andro fitsarana,-'
mg1865::mg_61::2::10:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'indrindra fa izay mandeha araka ny fitarihan''ny nofo hila zava-mahaloto ka manamavo ny manana fahalehibiazana. Ireo efa olona sahisahy, mitompo teny fantatra sady tsy matahotra hiteny ratsy ny manana voninahitra.'
mg1865::mg_61::2::11:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny anjely aza, izay mihoatra amin''ny tanjaka sy ny hery, tsy mitondra fiampangana hitenenan-dratsy azy eo anatrehan''ny Tompo.'
mg1865::mg_61::2::12:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo kosa izay miteny ratsy ny zavatra tsy fantany (tahaka ny biby tsy manan-tsaina, fa zava-manan''aina fotsiny ihany, izay teraka ho fisambotra sy ho famono) dia haringana tokoa amin''ny fahalotoany,'
mg1865::mg_61::2::13:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hiharan''ny ratsy ho valin''ny faharatsiany izy. Ataony ho zava-mahafinaritra ny velona vetivety amin''ny fy, ka be pentimpentina sy tsiny izy sady velona amin''ny fy eo amin''ny fanasam-pifankatiavany*, raha miara-mihinana aminareo, [*Na: amin''ny famitahany].'
mg1865::mg_61::2::14:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'manana maso feno fijangajangana, izay tsy mety mitsahatra amin''ny fahotana: dia mamitaka ny tsy miorina tsara izy; ary mampaharatra ny fony amin''ny hafatratry ny fitiavany harena, dia zanaky ny fanozonana izy;'
mg1865::mg_61::2::15:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'efa niala tamin''ny lalana mahitsy izy ka nivily nanaraka ny lalan''i Balama, zanak''i Beora*, izay tia ny tambin''ny tsy fahamarinana, [*Na: Bosora].'
mg1865::mg_61::2::16:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa voanatra izy noho ny fahotany: ny boriky moana efa nanao feon''olona ka nisakana ny hadalan''ilay mpaminany.'
mg1865::mg_61::2::17:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo efa loharano ritra, zavona entin''ny tafio-drivotra, ka efa tehirizina ho azy ny fahamaintisan''ny maizina.'
mg1865::mg_61::2::18:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandoka fatratra ny zava-poana ireo, ka ny filan''ny nofo, dia ny fijejojejoana, no entiny mamitaka ny olona izay saiky afaka tsy ho naman''ny velona eo amin''ny fahadisoana intsony*; [*Na: Satria velona amin''ny filan''ny nofo ireo, dia ny fandokafany fatratra ny zava-poana no entiny mitaona ny olona izay saiky afaka tsy ho naman''ny velona eo amin''ny fahadisoana intsony ho amin''ny fijejojejoana]'
mg1865::mg_61::2::19:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fahafahana no ampanantenainy ireny, kanjo ny tenany aza dia andevon''ny fahalotoana; fa izay maharesy ny olona dia mahandevo azy .'
mg1865::mg_61::2::20:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy efa afaka amin''ny fahalotoan''izao tontolo izao noho ny fahalalana tsara an''i Jesoa Kristy, Tompo sy Mpamonjy, nefa voasingotr''izany indray ka resy, ny farany dia ratsy noho ny voalohany.'
mg1865::mg_61::2::21:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsara aminy raha tsy nahalala ny lalan''ny fahamarinana toy izay hiala amin''ny didy masina natolotra azy, rehefa nahalala izany izy.'
mg1865::mg_61::2::22:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa mihatra aminy ny ohabolana marina hoe: "Ny amboa miverina indray amin''ny loany" (Ohabolana 26:11), ary: "Ny kisoavavy efa nisasa dia mihosim-potaka indray."'
mg1865::mg_61::3::1:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hihavian''ny Tompo, sy fananarana noho izany'
  verse_text: 'Ry malala, ity no epistily faharoa soratako ho aminareo ankehitriny, ka izy roroa dia samy entiko mampifoha ny sainareo madio amin''ny fampahatsiarovana,'
mg1865::mg_61::3::2:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatsiarovanareo ny teny voalazan''ny mpaminany masina rahateo sy ny didin''ny Tompo sady Mpamonjy izay nentin''ny Apostoly nirahina ho aty aminareo;'
mg1865::mg_61::3::3:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'efa fantatrareo voalohany indrindra fa amin''ny andro farany dia hisy mpaniratsira avy haniratsira, mandeha araka ny filany'
mg1865::mg_61::3::4:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manao hoe: Aiza ny teny fikasana ny amin''ny fihaviany? Fa hatrizay nodian''ny razana mandry dia maharitra tsy miova ny zavatra rehetra; eny, hatramin''ny nanaovana izao tontolo izao aza.'
mg1865::mg_61::3::5:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa minia jamba ireo ka tsy mahalala fa nisy hatramin''ny ela ny lanitra, ary nisy tany koa, izay niseho avy tamin''ny rano, sady rano no nanaovana azy tamin''ny tenin''Andriamanitra,'
mg1865::mg_61::3::6:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rano koa no nandravana izao rehetra izao taloha tamin''ny nanasaforany azy;'
mg1865::mg_61::3::7:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izao lanitra sy tany ankehitriny izao dia hazonin''izany teny izany ho amin''ny afo ka tehirizina ho amin''ny andro fitsarana sy fandringanana ny ratsy fanahy.'
mg1865::mg_61::3::8:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa, ry malala, izao zavatra iray loha izao no aoka tsy hohadinoinareo: ny indray andro amin''ny Tompo dia toy ny arivo taona, ary ny arivo taona toy ny indray andro.'
mg1865::mg_61::3::9:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Tompo tsy mahela ny teny fikasany, araka izay ataon''ny sasany ho fahelany; fa mahari-po aminareo Izy, ka tsy tiany hisy ho very, fa mba ho tonga amin''ny fibebahana izy rehetra,'
mg1865::mg_61::3::10:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy tahaka ny mpangalatra ny andron''ny Tompo, ary amin''izany ny lanitra dia ho lasa amin''ny firimorimoana mafy, ary ho levon''ny afo ny tenan''ny zavatra rehetra*, ka hodorana avokoa ny tany sy ny asa izay eo aminy. [*Na: ny masoandro sy ny volana ary ny kintana]'
mg1865::mg_61::3::11:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ho levona toy izany izao zavatra rehetra izao, dia olona tokony hanao ahoana moa ianareo amin''ny fitondran-tena masina sy ny toe-panahy araka an''Andriamanitra,'
mg1865::mg_61::3::12:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady manantena no mampahafaingana* ny hihavian''ny andron''Andriamanitra, izay hahamay sy hahalevona ny lanitra ary handoro sy hampiempo ny tenan''ny zavatra rehetra*! [*Na: maniry mafy]'
mg1865::mg_61::3::13:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa isika, araka ny teny fikasany, dia manantena lanitra vaovao sy tany vaovao, izay itoeran''ny fahamarinana.'
mg1865::mg_61::3::14:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: '2022-12-11T07:14:05+0000'
  verse_title: null
  verse_text: 'Koa amin''izany, ry malala, satria manantena izany zavatra izany ianareo, dia mazotoa mba ho hita tsy manan-tsiny amam-pondro eo anatrehan''ny Tompo amin''ny fihavanana.'
mg1865::mg_61::3::15:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahari-pon''ny Tompontsika dia ekeo ho famonjena, tahaka ny voasoratr''i Paoly, rahalahy malalantsika, taminareo koa araka ny fahendrena nomena azy,'
mg1865::mg_61::3::16:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny ataony ao amin''ny epistiliny rehetra koa, fa milaza izany zavatra izany ao aminy izy; ary amin''ireo efa misy zavatra saro-pantarina, izay aolan''ny olona kely fahalalana sady tsy miorina tsara, tahaka ny anaovany ny teny sasany amin''ny Soratra Masina koa, ka mahatonga fahaverezana ho an''ny tenany.'
mg1865::mg_61::3::17:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, satria fantatrareo rahateo izany, ry malala, dia tandremo fandrao ho voataonan''ny fahadisoan''ny ratsy fanahy ianareo ka ho lavo hiala amin''izay iorenanareo;'
mg1865::mg_61::3::18:
  verse_version: mg1865
  verse_book: mg_61
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mitomboa amin''ny fahasoavana sy ny fahalalana an''i Jesoa Kristy, Tompontsika sy Mpamonjy. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay. Amena.'
