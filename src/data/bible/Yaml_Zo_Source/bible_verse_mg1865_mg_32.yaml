mg1865::mg_32::1::1:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanirahan''Andriamanitra an''i Jona hankany Ninive, sy ny nandosirany, ary ny nanjo azy noho izany'
  verse_text: 'Ary tonga tamin''i Jona, zanak''i Amitahy, ny tenin''i Jehovah nanao hoe:'
mg1865::mg_32::1::2:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, mankanesa any Ninive, ilay tanàna lehibe, ary miantsoa ny amin''ny hamelezana azy, fa tafakatra eto anatrehako ny faharatsiany.'
mg1865::mg_32::1::3:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jona nitsangana handositra ho any Tarsisy mba hiala eo anatrehan''i Jehovah; ary nidina tany Jopa izy ka nahita sambo hankany Tarsisy, dia nandoa ny karamany ka niondrana taminy hiara-mandeha tamin''ny tao ho any Tarsisy hiala eo anatrehan''i Jehovah.'
mg1865::mg_32::1::4:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah nahatonga rivotra mahery teny ambonin''ny ranomasina, dia nanonja mafy ny ranomasina, ka dia efa nila ho vaky ny sambo.'
mg1865::mg_32::1::5:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra ny matilo, ka samy nitaraina tamin''ny andriamaniny avy sady nariany tany anaty ranomasina ny zavatra* tao an-tsambo mba hampahatony ny loza. Fa Jona kosa efa nidina nankao anaty sambo ka nandry renoky ny torimaso. [*Hebreo: fanaka]'
mg1865::mg_32::1::6:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankao aminy ny kapitenin-tsambo ka nanao taminy hoe: Endrey ity ianao renoky ny torimaso foana eto! Mitsangàna, ka antsoy ny Andriamanitrao, fa angamba hihevitra antsika Andriamanitra, ka dia tsy ho faty isika.'
mg1865::mg_32::1::7:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia samy nanao tamin''ny namany hoe izy: Avia isika hanao filokana mba hizahantsika izay mahatonga izao loza izao amintsika. Dia nanao filokana izy, ka Jona no azo.'
mg1865::mg_32::1::8:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Masïna ianao, lazao aminay: Noho ny amin''iza moa no mahatonga izao loza izao amintsika? Inona no raharaha fanaonao? Ary avy taiza ianao? Aiza no taninao? Ary avy amin''ny firenen''iza ianao?'
mg1865::mg_32::1::9:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ireo: Hebreo aho; ary Jehovah, Andriamanitry ny lanitra, no ivavahako, dia Izay nanao ny ranomasina sy ny tany maina.'
mg1865::mg_32::1::10:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra indrindra ny olona ka nanao taminy hoe: Adray izato ataonao izato! Fa fantany fa nandositra hiala eo anatrehan''i Jehovah izy, satria efa nambarany taminy izany.'
mg1865::mg_32::1::11:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Hataonay ahoana ary ianao mba hahatony ny ranomasina aminay? Fa mbola nihananonja ihany ny ranomasina.'
mg1865::mg_32::1::12:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ireo: Betao aho, ka atsipazo any anatin''ny ranomasina hahatony ny ranomasina aminareo; fa fantatro fa noho ny amiko no mahatonga izao onja mahery izao aminareo.'
mg1865::mg_32::1::13:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa namaky onja fatratra ny olona mba hamerina ny sambo ho amin''ny tany maina, fa tsy zakany, satria ny ranomasina mbola nihananonja mafy taminy.'
mg1865::mg_32::1::14:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah izy ka nanao hoe: Mifona aminao izahay, Jehovah o, aoka tsy ho faty izahay noho ny amin''ny ain''ity lehilahy ity ary aza atao ho mpandatsaka rà marina izahay; fa Ianao, Jehovah o, efa nanao izay sitraky ny fonao.'
mg1865::mg_32::1::15:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nobetain''izy ireo Jona ka natsipiny tany anatin''ny ranomasina; ary dia nitsahatra ny fisafoaky ny ranomasina.'
mg1865::mg_32::1::16:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natahotra an''i Jehovah indrindra ireo olona ireo ka namono zavatra hatao fanatitra ho an''i Jehovah sady nivoady.'
mg1865::mg_32::2::1:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namonjena an''i Jona, sy ny vavaka aman-tsaotra nataony'
  verse_text: 'Ary Jehovah nanomana hazandrano lehibe hitelina an''i Jona. Ary Jona dia tao an-kibon''ilay hazandrano hateloan''andro sy hateloan''alina.'
mg1865::mg_32::2::2:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivavaka tamin''i Jehovah Andriamaniny tao an-kibon''ny hazandrano Jona'
mg1865::mg_32::2::3:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Niantso an''i Jehovah tamin''ny fahoriako aho, Ka dia namaly ahy Izy; Tao anatin''ny fiainan-tsy hita* no nitarainako, Dia nihaino ny feoko Ianao. [*Hebreo: Shoela]'
mg1865::mg_32::2::4:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa natsipinao tao amin''ny lalina aho, Dia tao amin''ny ranomasina, Ka voasafotry ny riaka aho; Nanarona ahy ny alon-dranonao sy ny onjanao rehetra.'
mg1865::mg_32::2::5:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Voaroaka tsy ho eo anatrehanao aho, Nefa mbola nanatrika ny tempolinao masina ihany.'
mg1865::mg_32::2::6:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rano nanarona ahy hatramin''ny aiko, Ny lalina namefy ahy manodidina; Ny zava-maniry any an-dranomasina nisingotra manodidina ny lohako.'
mg1865::mg_32::2::7:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tafalatsaka tany amin''ny fanambanin''ny tendrombohitra aho; Ny hidin''ny tany nanidy ahy mandrakizay; Nefa nampiakatra ny aiko avy tao an-davaka Ianao, Jehovah Andriamanitro o.'
mg1865::mg_32::2::8:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha reraka tato anatiko ny fanahiko, Dia nahatsiaro an''i Jehovah aho; Ka tonga tao aminao ny fivavako, Dia tao amin''ny tempolinao masina.'
mg1865::mg_32::2::9:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mivavaka amin''ny sampy* Dia mahafoy Izay Mpamindra fo aminy** [*Hebreo: zava-poana mandainga] [**Hebreo: ny famindram-pony]'
mg1865::mg_32::2::10:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho, dia feo midera no entiko mamono zavatra hatao fanatitra ho Anao, Ary izay nivoadiako dia hefaiko; An''i Jehovah ny famonjena.'
mg1865::mg_32::2::11:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nandidy ilay hazandrano, ka dia naloany ho eny amin''ny tany maina Jona.'
mg1865::mg_32::3::1:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitorian''i Jona teny tao Ninive'
  verse_text: 'Ary tonga fanindroany tamin''i Jona ny tenin''i Jehovah nanao hoe:'
mg1865::mg_32::3::2:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, ka mankanesa any Ninive, ilay tanàna lehibe; ary torio aminy ny teny izay lazaiko aminao.'
mg1865::mg_32::3::3:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Jona ka nankany Ninive araka ny tenin''i Jehovah. Ary Ninive dia tanàna lehibe teo anatrehan''Andriamanitra, dia lalana hateloana.'
mg1865::mg_32::3::4:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jona niantomboka nandeha* tao an-tanàna lalana indray andro ka nitory hoe: Rehefa afaka efa-polo andro, dia horavana Ninive. [*Hebreo: niditra]'
mg1865::mg_32::3::5:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nino an''Andriamanitra ny mponina tao Ninive ka niantso fifadian-kanina sady nitafy lamba fisaonana hatramin''ny lehibe ka hatramin''ny kely.'
mg1865::mg_32::3::6:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa ren''ny mpanjakan''i Ninive izany, dia nitsangana niala tamin''ny seza fiandrianany izy, ka nanaisotra ny akanjom-boninahiny, dia nisarona lamba fisaonana sady nipetraka tamin''ny lavenona.'
mg1865::mg_32::3::7:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasaina nantsoina sy nambara eran''i Ninive araka ny didin''ny mpanjaka sy ny mpanapaka hoe: Aza avela hisy hanendry hanina akory, na olona, na biby fiompy; dia ny ondry aman''osy sy ny omby; eny, aza avela hisy hihinana na hisotro rano akory ireo.'
mg1865::mg_32::3::8:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aoka samy hisarona lamba fisaonana ny olona sy ny biby fiompy, ary aoka hitaraina mafy amin''Andriamanitra izy, ary aoka samy hahafoy ny lalany ratsy sy ny fandozana eny an-tanany avy izy rehetra.'
mg1865::mg_32::3::9:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa angamba hiverina ihany Andriamanitra ka hanenina ary hiala amin''ny fahatezerany mirehitra, mba tsy ho lany ritra isika?'
mg1865::mg_32::3::10:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''Andriamanitra ny nataon''ireo ny amin''ny nialany tamin''ny lalan-dratsiny, dia nanenina Izy ny amin''ny loza izay nolazainy hamelezany azy, ka tsy nataony izany.'
mg1865::mg_32::4::1:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nimonomononan''i Jona, sy ny nananaran''Andriamanitra azy'
  verse_text: 'Fa tsy sitrak''i Jona indrindra izany, ka nirehitra ny fahatezerany.'
mg1865::mg_32::4::2:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivavaka tamin''i Jehovah izy ka nanao hoe: Mifona aminao aho, Jehovah o, tsy izao ihany va no efa nolazaiko fony aho mbola tany amin''ny taniko? Fa ny andrao hisy toy izao no nandosirako ho any Tarsisy, satria fantatro fa Ianao dia Andriamanitra mamindra fo sy miantra, mahari-po sady be famindram-po ary manenina ny amin''ny loza.'
mg1865::mg_32::4::3:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mifona aminao aho ankehitriny, Jehovah o, esory ny aiko; fa aleoko ho faty toy izay ho velona.'
mg1865::mg_32::4::4:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jehovah: Moa mety va izao firehitry ny fahatezeranao izao?'
mg1865::mg_32::4::5:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny tanàna Jona* ka nipetraka teo atsinanan-tanàna; ary nanao trano rantsan-kazo ho azy teo izy ka nipetraka teo ambanin''ny alokalony ambara-pahitany izay hiafaran''ny tanàna. [*Na: ary Jona efa nivoaka ny tanàna]'
mg1865::mg_32::4::6:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah Andriamanitra nanomana tanantanamanga, ka nampaniriny hanalokaloka an''i Jona izany ho alokaloky ny lohany, hanafaka ny alahelony. Ka dia nahafaly an''i Jona indrindra ny tanantanamanga.'
mg1865::mg_32::4::7:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony ampitso maraina dia nanomana fositra koa Andriamanitra, ka namely ilay tanantanamanga iny, dia nalazo io.'
mg1865::mg_32::4::8:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niposaka ny masoandro, Andriamanitra dia nanomana rivotra mahamay avy any atsinanana, ary dia namely ny lohan''i Jona ny masoandro, dia ana izy ka nangataka ny ho faty, nanao hoe: Aleoko ho faty toy izay ho velona.'
mg1865::mg_32::4::9:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Andriamanitra tamin''i Jona: Moa mety va izao firehitry ny fahatezeranao ny amin''ny tanantanamanga izao ? Ary hoy izy: Mety ny hahatezerako na dia mandra-pahafatiko aza.'
mg1865::mg_32::4::10:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah: Ianao malahelo ny tanantanamanga izay tsy nisasaranao na nampanirinao, dia ilay naniry indray alina monja ary maty indray alina koa;'
mg1865::mg_32::4::11:
  verse_version: mg1865
  verse_book: mg_32
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka moa Izaho tsy mba halahelo an''i Ninive, ilay tanàna lehibe va. izay misy olona tsy omby roa alina sy iray hetsy, izay tsy mahafantatra ny havanany sy ny haviany, sady be biby fiompy koa?'
