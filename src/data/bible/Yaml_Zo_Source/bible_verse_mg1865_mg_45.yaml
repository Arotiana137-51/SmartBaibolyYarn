mg1865::mg_45::1::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fitarihan-teny
  verse_text: 'Paoly, mpanompon''i Jesoa Kristy, voantso ho Apostoly, voatokana ho amin''ny filazantsaran''Andriamanitra,'
mg1865::mg_45::1::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nampilazainy ny mpaminany rahateo teo amin''ny Soratra Masina*, [*teo amin''izay soratra masina]'
mg1865::mg_45::1::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny amin''ny Zanany, Izay nateraka avy tamin''ny taranak''i Davida araka ny nofo,'
mg1865::mg_45::1::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: '2022-07-22T12:33:58+0000'
  verse_title: null
  verse_text: 'ary naseho* tamin-kery ho Zanak''Andriamanitra** araka ny fanahin''ny fahamasinana tamin''ny fitsanganany tamin''ny maty, - dia Jesoa Kristy Tompontsika, [*Na: notendrena] [** Na: naseho ho Zanak''Andriamanitra mahery]'
mg1865::mg_45::1::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nandraisanay fahasoavana sy ny mah''Apostoly anay hahatonga fanekena ny finoana ho voninahitry ny anarany any amin''ny jentilisa rehetra;'
mg1865::mg_45::1::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ianareo koa, izay isan''ireny, dia voantso ho an''i Jesoa Kristy, -'
mg1865::mg_45::1::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho an''izay rehetra any Roma, malalan''Andriamanitra sady voantso ho masina; ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesoa Kristy Tompo.'
mg1865::mg_45::1::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voalohany, misaotra an''Andriamanitro amin''ny alalan''i Jesoa Kristy aho noho ny aminareo rehetra, satria efa re eran''izao tontolo izao ny lazan''ny finoanareo.'
mg1865::mg_45::1::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra, Izay tompoin''ny fanahiko amin''ny filazantsaran''ny Zanany, no vavolombeloko fa tsy mitsahatra mahatsiaro anareo aho, ka mandrakariva, raha mivavaka aho,'
mg1865::mg_45::1::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mangataka fandrao mba hisy hahafahako amin''izao ho tonga aminareo, raha sitrapon''Andriamanitra.'
mg1865::mg_45::1::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maniry hahita anareo aho hanomezako anareo fahasoavam-panahy ho anareo, mba hampaharezina ianareo,'
mg1865::mg_45::1::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'izany dia ny mba hiarahako hamporisihina aminareo amin''ny finoantsika, dia ny anareo sy ny ahy.'
mg1865::mg_45::1::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy tiako tsy ho fantatrareo, ry rahalahy, fa matetika aho no efa nikasa hankaty aminareo (saingy azon-tsampona mandraka ankehitriny aho), hananako izay vokatra aty aminareo koa, toy ny any amin''ny jentilisa sasany.'
mg1865::mg_45::1::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ananan''ny Grika sy ny firenena hafa rehetra, ny hendry sy ny tsy hendry, trosa aho;'
mg1865::mg_45::1::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha izaho, dia mazoto hitory ny filazantsara aminareo izay any Roma koa aho.'
mg1865::mg_45::1::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy menatra ny filazantsara aho; fa herin''Andriamanitra ho famonjena izay rehetra mino izany, amin''ny Jiosy aloha, dia vao amin''ny jentilisa* koa. [*Grika: Grika]'
mg1865::mg_45::1::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany no anehoana fahamarinana avy amin''Andriamanitra avy amin''ny finoana sy ho amin''ny finoana, araka ny voasoratra hoe: Ny marina amin''ny finoana no ho velona* (Habakoka 2:4). [*Na: Ny marina ho velon''ny finoana]'
mg1865::mg_45::1::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny amin''ny faharatsian''ny toetry ny jentilisa sy ny mahameloka azy'
  verse_text: 'Fa aseho avy any an-danitra ny fahatezeran''Andriamanitra amin''ny faharatsiana rehetra sy ny tsy fahamarinan''ny olona izay misakana ny fahamarinana amin''ny fanaovan-dratsy,'
mg1865::mg_45::1::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria izay fantatra ny amin''Andriamanitra dia miseho ao am-pon''ireny, fa nasehon''Andriamanitra taminy.'
mg1865::mg_45::1::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fombany tsy hita, dia ny heriny mandrakizay sy ny mah''Andriamanitra Azy, dia miseho hatramin''ny nanaovana izao tontolo izao, fa fantatra amin''ny zavatra nataony; ka dia tsy manan-kalahatra* ireo; [*Na: Mba tsy hanan-kalahatra]'
mg1865::mg_45::1::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa na dia nahalala an''Andriamanitra aza izy, dia tsy mba nankalaza Azy toy izay miendrika ho an''Andriamanitra, na nisaotra Azy, fa tonga zava-poana izy tamin''ny fisainany, ary tonga maizina ny fony donto.'
mg1865::mg_45::1::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandoka tena ho hendry izy ka tonga adala,'
mg1865::mg_45::1::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa ny voninahitr''Andriamanitra tsy mety lo dia nosoloany zavatra tahaka ny endriky ny olona mety lo sy ny vorona sy ny biby manan-tongotra efatra ary ny zavatra mandady sy mikisaka.'
mg1865::mg_45::1::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no nanoloran''Andriamanitra azy tamin''ny filan''ny fony ho amin''ny fahalotoana, dia ny nifanalany voninahitra tamin''ny tenany avy;'
mg1865::mg_45::1::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fahamarinan''Andriamanitra dia nosoloany lainga, ka nanaja sy nanompo ny zavatra natao izy, fa tsy ny Mpanao, Izay isaorana mandrakizay. Amena.'
mg1865::mg_45::1::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nanoloran''Andriamanitra azy ho amin''ny filan-dratsy mahavoafady; fa ny vehivavy tao aminy nanova ny fanaony ho amin''izay tsy fanaony;'
mg1865::mg_45::1::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tahaka izany koa ny lehilahy, fa namela ny fanao amin''ny vehivavy izy ka maimay tamin''ny fifampilany samy lehilahy nifanao izay mahamenatra, dia nandray tao amin''ny tenany ny valiny izay tokony ho azy noho ny fiviliany.'
mg1865::mg_45::1::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka ny nanaovany ny fahalalana marina an''Andriamanitra ho tsy miendrika hotanany, dia araka izany kosa no nanoloran''Andriamanitra azy ho amin''ny fisainana tsy mahamendrika hanao izay zavatra tsy tokony hatao,'
mg1865::mg_45::1::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia feno ny tsy fahamarinana rehetra, ny faharatsiana, ny fieremana, ny lolompo,- feno fialonana, vonoan-olona, fifandirana, fitaka, otri-po,-'
mg1865::mg_45::1::30:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'mpibitsibitsika, mpanendrikendrika, halan''Andriamanitra*, mpampahory, mpiavonavona, mpandoka tena, mpamoron-tsain-dratsy, tsy manoa ray sy reny, [*Na: mpankahala an''Andriamanitra]'
mg1865::mg_45::1::31:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy manam-pahalalana, tsy mitana fanekena, tsy manam-pitiavana, tsy miantra;'
mg1865::mg_45::1::32:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona mahalala tsara ny fitsipika nomen''Andriamanitra fa izay manao izany zavatra izany no miendrika ho faty, nefa tsy manao izany ihany izy, fa mankasitraka ny manao koa.'
mg1865::mg_45::2::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny tsy fahamarinan''ny Jiosy sy ny tsy ahazoany fahamarinana avy amin''ny lalàna'
  verse_text: 'Koa amin''izany dia tsy manan-kalahatra ianao, ralehilahy*, na zovy na zovy ianao izay mitsara; fa izay itsaranao ny sasany no anamelohanao ny tenanao koa, fa ianao izay mitsara aza dia mba manao izany ihany koa. [*Grika: olona]'
mg1865::mg_45::2::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa fantatsika fa ny fitsaran''Andriamanitra dia araka ny marina amin''izay manao toy izany.'
mg1865::mg_45::2::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ralehilahy*, izay mitsara ny manao izany, kanefa manao izany koa ny tenanao, moa ataonao va fa ho afa-mandositra ny fitsaran''Andriamanitra ianao? [*Grika: olona]'
mg1865::mg_45::2::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sa hamavoinao ny haren''ny fahamoram-panahiny sy ny fandeferany ary ny fahari-pony, satria tsy fantatrao fa ny fahamoram-panahin''Andriamanitra dia mitaona anao hibebaka?'
mg1865::mg_45::2::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ditranao sy ny fonao tsy mibebaka no irakatenao fahatezerana ho anao amin''ny andro fahatezerana sy fampisehoana ny fitsarana marin''Andriamanitra,'
mg1865::mg_45::2::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay hamaly ny olona rehetra araka ny asany avy:'
mg1865::mg_45::2::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho an''izay maharitra manao soa mandrakariva ka mitady voninahitra sy laza ary tsy fahafatesana, dia fiainana mandrakizay;'
mg1865::mg_45::2::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ho an''izay mitady ny ho an''ny tenany ihany kosa sady tsy manaraka ny marina, fa manaraka ny tsy marina, dia fahavinirana sy fahatezerana,'
mg1865::mg_45::2::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, fahoriana sy fahantrana ho an''ny fanahin''ny olona rehetra izay manao ratsy, amin''ny Jiosy aloha, dia vao amin''ny jentilisa koa;'
mg1865::mg_45::2::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa voninahitra sy laza ary fiadanana kosa ho an''ny olona rehetra izay manao ny tsara, amin''ny Jiosy aloha, dia vao amin''ny jentilisa* koa. [*Grika: Grika]'
mg1865::mg_45::2::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy fizahan-tavan''olona amin''Andriamanitra.'
mg1865::mg_45::2::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay nanota tsy nanana ny lalàna dia ho very tsy manana ny lalàna; fa izay nanota nanana ny lalàna kosa dia hotsaraina araka ny lalàna.'
mg1865::mg_45::2::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny mpandre ny lalàna no marina eo anatrehan''Andriamanitra, fa ny mpankatò ny lalàna no hohamarinina;'
mg1865::mg_45::2::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa na oviana na oviana ireo jentilisa tsy manana ny lalàna ireo no misy manao izay nandidian''ny lalàna araka ny nahim-pony, na dia tsy manana ny lalàna aza ireo, dia lalàn-tenany ihany;'
mg1865::mg_45::2::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ireo maneho ny asan''ny lalàna ho voasoratra ao am-pony, sady ny fieritreretany no vavolombelony, ary ny fisainany mifampiampanga, nefa mba mifanafaka ihany koa aza,-'
mg1865::mg_45::2::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny andro izay hitsaran''Andriamanitra ny zavatra takona ataon''ny olona, araka ny filazantsarako amin''ny alalan''i Jesoa Kristy.'
mg1865::mg_45::2::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha saingy atao hoe Jiosy ianao ka mitoky amin''ny lalàna sy manao an''Andriamanitra ho reharehanao'
mg1865::mg_45::2::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mahalala ny sitrapony sady mamantatra ny zavatra tsara indrindra*, satria efa nampianarina ny lalàna ianao [*Na: samy hafa]'
mg1865::mg_45::2::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary matoky ny tenanao ho mpitarika ny jamba, fanazavana ny ao amin''ny maizina,'
mg1865::mg_45::2::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'mpananatra ny adala, mpampianatra ny bodo, satria ianao manana ny lalàna ho mariky ny fahalalana sy ny fahamarinana:'
mg1865::mg_45::2::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka moa ianao izay mampianatra ny sasany, tsy mba mampianatra ny tenanao koa va? Ianao izay mitory hoe: Aza mangalatra, mba mangalatra ihany va ianao?'
mg1865::mg_45::2::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao izay manao hoe: Aza mijangajanga, mba mijangajanga ihany va ianao? Ianao izay mametaveta ny sampy, mba mandroba tempoly ihany va ianao?'
mg1865::mg_45::2::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao izay manao ny lalàna ho reharehanao, mba manala voninahitra an''Andriamanitra ihany va ianao amin''ny andikanao ny lalàna?'
mg1865::mg_45::2::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa araka ny voasoratra, dia ianareo no itenenana ratsy* ny anaran''Andriamanitra any amin''ny jentilisa (Isaia 52:5). [*Grika: anaovana blasfemia; izahao Matio 9:3]'
mg1865::mg_45::2::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny famorana mahasoa tokoa, raha mankatò ny lalàna ianao; fa raha mpandika ny lalàna kosa ianao, dia efa tonga toy ny tsy voafora, na dia efa voafora aza.'
mg1865::mg_45::2::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mankatò ny fitsipiky ny lalàna ny tsy voafora, tsy hatao ho isan''ny voafora va izy, na dia tsy voafora aza?'
mg1865::mg_45::2::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hohelohin''ny tsy mifora izay mankatò ny lalàna va ianao, izay mpandika ny lalàna, na dia manana ny soratra sy ny famorana aza ianao?'
mg1865::mg_45::2::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy izay araka ny miseho no Jiosy, ary tsy izay miseho eo amin''ny nofo no famorana;'
mg1865::mg_45::2::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay araka ny miafina no Jiosy, ary ny famorana dia amin''ny fo, amin''ny fanahy, fa tsy amin''ny soratra; ny fiderana ireny tsy avy amin''ny olona, fa avy amin''Andriamanitra.'
mg1865::mg_45::3::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa inona ary no tombony ananan''ny Jiosy, ary inona koa no soa avy amin''ny famorana?'
mg1865::mg_45::3::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be ihany amin''ny zavatra rehetra: voalohany, izy no notolorana ny tenin''Andriamanitra ho adidiny.'
mg1865::mg_45::3::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahoana kosa ary? Raha tsy nino ny sasany, moa ny tsy finoanay va hahafoana ny fahamarinan''Andriamanitra?'
mg1865::mg_45::3::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sanatria izany! Aoka Andriamanitra no ho marina, fa ny olona rehetra kosa ho mpandainga; araka ny voasoratra hoe: Mba hohamarinina amin''ny teninao Ianao, Ary hahery, rehefa manana ady* (Salamo 51:4). [*Na: tsaraina]'
mg1865::mg_45::3::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny tsy fahamarinantsika no mampiseho ny fahamarinan''Andriamanitra, ahoana ary no holazaintsika? Tsy marina angaha Andriamanitra Izay mandatsaka ny fahatezerany! - miteny araka ny fanaon''ny olona aho -'
mg1865::mg_45::3::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sanatria izany! Fa raha izany, hataon''Andriamanitra ahoana no fitsara izao tontolo izao?'
mg1865::mg_45::3::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny fahamarinan''Andriamanitra kosa no nitombo tamin''ny laingako ho voninahiny, nahoana aho no mbola tsaraina ho mpanota indray?'
mg1865::mg_45::3::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana no tsy hanao ratsy hihavian''ny soa isika,- araka ny anendrikendrehana anay sy ny filazan''ny sasany anay. Marina ny fanamelohana ireny.'
mg1865::mg_45::3::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary? Manan-kavaly* va isika? Tsia tsy akory; fa efa voalazantsika rahateo ho mpanota avokoa na ny Jiosy na ny jentilisa**; [*Na: Latsaka noho ireny va isika?] [** Grika: Grika]'
mg1865::mg_45::3::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: Tsy misy marina na dia iray akory aza;'
mg1865::mg_45::3::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy izay mahafantatra, Tsy misy izay mitady an''Andriamanitra.'
mg1865::mg_45::3::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy nania avokoa izy rehetra, Samy tsy mahasoa avokoa izy rehetra; Tsy misy izay manao ny tsara na dia iray akory aza (Salamo 14:1-3).'
mg1865::mg_45::3::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fasana misokatra ny tendany; Ny lelany no anaovany fitaka (Salamo 5:9) Ny poizin''ny menarana no ao ambanin''ny molony (Salamo 140:3)'
mg1865::mg_45::3::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Feno ozona sy fangidiana ny vavany (Salamo 10:7)'
mg1865::mg_45::3::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongony mimaona handatsa-drà;'
mg1865::mg_45::3::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandravana sy fandringanana no eo amin''ny alehany;'
mg1865::mg_45::3::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lalan''ny fiadanana dia tsy fantany (Isaia 59:7-8)'
mg1865::mg_45::3::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fahatahorana an''Andriamanitra eo anoloan''ny masony (Salamo 36:1).'
mg1865::mg_45::3::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatsika fa izay zavatra lazain''ny lalàna dia lazainy amin''izay manana ny lalàna, mba ho voatampina avokoa ny vava rehetra, ka hiharan''ny fitsaran''Andriamanitra izao tontolo izao,'
mg1865::mg_45::3::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tsy misy nofo hohamarinina amin''ny asan''ny lalàna eo anatrehany; fa ny lalàna no ahazoana ny fahalalana marina ny amin''ny ota.'
mg1865::mg_45::3::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny fanamarinan''Andriamanitra maimaimpoana ny mino an''i Kristy'
  verse_text: 'Fa ankehitriny dia efa naharihary ny fahamarinana avy amin''Andriamanitra, tsy amin''ny lalàna anefa, fa ambaran''ny lalàna sy ny mpaminany,'
mg1865::mg_45::3::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny fahamarinana avy amin''Andriamanitra amin''ny finoana an''i Jesoa Kristy* ho an''izay rehetra mino; fa tsy misy hafa, [*Ampio hoe: (ho an''ny olona rehetra sy)]'
mg1865::mg_45::3::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa samy efa nanota izy rehetra ka tsy manana ny voninahitra avy amin''Andriamanitra,'
mg1865::mg_45::3::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa hamarinina maimaimpoana amin''ny fahasoavany izy noho ny fanavotana izay ao amin''i Kristy Jesoa,'
mg1865::mg_45::3::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nasehon''Andriamanitra tamin''ny ràny ho fanavotana* amin''ny finoana, hanehoana ny fahamarinany amin''ny tsy namalian''Andriamanitra ny fahotana lasa tamin''ny nandeferany, [*Na: fanatitra fampiononam-pahatezerana]'
mg1865::mg_45::3::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanehoana ny fahamarinany ankehitriny, mba ho marina Izy sady hanamarina izay manana finoana an''i Jesoa.'
mg1865::mg_45::3::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ary ny fireharehana? Efa foana izany. Amin''ny lalàna manao ahoana? amin''ny lalàn''ny asa va? Tsia; fa amin''ny lalàn''ny finoana.'
mg1865::mg_45::3::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany dia ataontsika fa finoana no anamarinana ny olona, fa tsy ny asan''ny lalàna.'
mg1865::mg_45::3::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitry ny Jiosy ihany va Izy? fa tsy mba an''ny jentilisa koa? Eny, an''ny jentilisa koa;'
mg1865::mg_45::3::30:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa iray ihany Andriamanitra, Izay hanamarina ny voafora noho ny finoana, ary ny tsy voafora amin''ny finoana.'
mg1865::mg_45::3::31:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mahafoana ny lalàna amin''ny finoana va isika? Sanatria izany! fa mampiorina tsara ny lalàna isika.'
mg1865::mg_45::4::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ary no holazaintsika ho efa azon''i Abrahama, razantsika araka ny nofo?'
mg1865::mg_45::4::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha asa no nanamarinana an''i Abrahama, dia misy hireharehany ihany, nefa tsy amin''Andriamanitra.'
mg1865::mg_45::4::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahoana hoy ny Soratra Masina? Ary Abrahama nino an''Andriamanitra, ka dia nisaina ho fahamarinany izany (Genesisy 15:6).'
mg1865::mg_45::4::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''izay miasa, dia tsy isaina ho fahasoavana ny karama, fa ho trosa.'
mg1865::mg_45::4::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho an''izay tsy miasa kosa, fa mino Izay manamarina ny ratsy fanahy, dia ny finoany no isaina ho fahamarinana.'
mg1865::mg_45::4::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia araka izany koa no ilazan''i Davida fa sambatra ny olona izay isain''Andriamanitra fahamarinana tsy amin''ny asa, hoe:'
mg1865::mg_45::4::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay voavela ny helony sy voasarona ny fahotany.'
mg1865::mg_45::4::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona tsy hisain''i Jehovah heloka (Salamo 32:1-2).'
mg1865::mg_45::4::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany fahasambarana izany moa an''ny voafora ihany va, sa an''ny tsy voafora koa? fa lazaintsika fa ny finoana no nisaina ho fahamarinan''i Abrahama.'
mg1865::mg_45::4::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ahoana no nanisana izany? Tamin''izy efa voafora va, sa fony izy tsy mbola voafora? Tsy tamin''izy efa voafora tsy akory, fa fony izy tsy mbola voafora.'
mg1865::mg_45::4::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny famorana, izay famantarana, dia noraisiny ho tombo-kasen''ny fahamarinana amin''ny finoana izay nananany fony izy tsy mbola voafora, mba ho rain''ny olona rehetra izay mino izy, na dia ny tsy voafora aza, mba hisaina ho an''ireny ny fahamarinana,'
mg1865::mg_45::4::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho rain''ny voafora, dia tsy izay voafora ihany, fa izay mandeha araka ny dian''ny finoan''i Abrahama razantsika koa, izay nananany fony izy tsy mbola voafora.'
mg1865::mg_45::4::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy lalàna, fa fahamarinana amin''ny finoana, no nahazoan''i Abrahama sy ny taranany ny teny fikasana ho mpandova izao tontolo izao izy.'
mg1865::mg_45::4::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izay amin''ny lalàna no mpandova, dia efa foana ny finoana, ary efa tsinontsinona ny teny fikasana;'
mg1865::mg_45::4::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny lalàna mahatonga fahatezerana; fa raha tsy misy lalàna, dia tsy misy fandikan-dalàna.'
mg1865::mg_45::4::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa finoana no andovana, mba ho araka ny fahasoavana, hahatò ny teny fikasana ho an''ny taranaka rehetra,- tsy ho an''izay amin''ny lalàna ihany, fa ho an''izay amin''ny finoan''i Abrahama koa, dia ilay razantsika rehetra -'
mg1865::mg_45::4::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: Nataoko ho rain''ny firenena maro ianao (Genesisy 17:5) - teo anatrehan''izay ninoany, dia Andriamanitra Izay mamelona ny maty sy miantso ny tsy misy toy ny misy.'
mg1865::mg_45::4::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia efa tsy nisy fanantenana aza, dia nanantena ihany izy ka nino, mba ho rain''ny firenena maro; araka ny voalaza hoe: Ho tahaka izany ny taranakao (Genesisy 15:5).'
mg1865::mg_45::4::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tsy mba nalemy finoana izy, dia nihevitra ny tenany izay efa hoatra ny maty (fa efa tokony ho zato taona izy) sy ny fahafatesan''ny kibon''i Saraha,'
mg1865::mg_45::4::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy niahanahana ny amin''ny teny fikasan''Andriamanitra tamin''ny tsy finoana izy, fa nampaherezin''ny finoana ka nanome voninahitra an''Andriamanitra'
mg1865::mg_45::4::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary natoky indrindra fa izay nolazainy dia hainy hatao koa.'
mg1865::mg_45::4::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisaina ho fahamarinany izany.'
mg1865::mg_45::4::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy ho azy ihany no nanoratana fa nisaina ho azy izany,'
mg1865::mg_45::4::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ho antsika izay hanisana izany koa, dia isika izay mino Ilay nanangana an''i Jesoa Tompontsika tamin''ny maty,'
mg1865::mg_45::4::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay natolotra noho ny fahadisoantsika ka natsangana indray ho fanamarinana antsika.'
mg1865::mg_45::5::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny soa ananan''ny mino an''i Kristy, sy ny fihoaran''izany noho izay soa verin''i Adama'
  verse_text: 'Koa amin''izany, satria efa nohamarinina tamin''ny finoana isika, dia aoka isika hanana* fihavanana amin''Andriamanitra amin''ny alalan''i Jesoa Kristy Tompontsika. [*Na: (dia manana)]'
mg1865::mg_45::5::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny alalany koa no efa nahazoantsika fanatonana amin''ny finoana ho amin''izao fahasoavana itoerantsika izao, ka dia aoka isika hifaly amin''ny fanantenana ny voninahitr''Andriamanitra.'
mg1865::mg_45::5::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy izany ihany, fa aoka isika hifaly amin''ny fahoriana aza, satria fantatsika fa ny fahoriana mahatonga faharetana;'
mg1865::mg_45::5::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny faharetana mahatonga fahatsaram-panahy voazaha toetra; ary ny fahatsaram-panahy voazaha toetra mahatonga fanantenana;'
mg1865::mg_45::5::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanantenana dia tsy mampahamenatra, satria ny Fanahy Masina, Izay nomena antsika, no nentiny nampidina ny fitiavan''Andriamanitra* ho ao am-pontsika. [*Na: ny fitiavana an''Andriamanitra]'
mg1865::mg_45::5::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony mbola tsy nanan-kery isika, dia maty Kristy tamin''ny fotoan''andro hamonjy ny ratsy fanahy.'
mg1865::mg_45::5::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa saiky tsy misy olona manaiky ho faty hamonjy ny marina; fa angamba hisy ihany ny sasany sahy maty aza hamonjy ny manao soa.'
mg1865::mg_45::5::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra mampiseho* ny fitiavany antsika, fa fony mbola mpanota isika, dia maty hamonjy antsika Kristy.'
mg1865::mg_45::5::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mainka aza ny hamonjeny antsika ho afaka amin''ny fahatezerana ankehitriny, rehefa nohamarinina tamin''ny ràny isika.'
mg1865::mg_45::5::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha fony mbola fahavalo aza isika no nampihavanina tamin''Andriamanitra tamin''ny nahafatesan''ny Zanany, mainka ny hamonjena antsika amin''ny fahavelomany ankehitriny, rehefa nampihavanina.'
mg1865::mg_45::5::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy izany ihany koa, fa mifaly amin''Andriamanitra isika amin''ny alalan''i Jesoa Kristy Tompontsika, Izay nahazoantsika ny fihavanana ankehitriny.'
mg1865::mg_45::5::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany dia tahaka ny nidiran''ny ota avy tamin''ny olona iray ho amin''izao tontolo izao, ary ny ota no nidiran''ny fahafatesana, ka nahatratra ny olona rehetra ny fahafatesana, satria samy efa nanota izy rehetra;'
mg1865::mg_45::5::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hatrany alohan''ny lalàna aza dia nisy ota tamin''izao tontolo izao; nefa tsy isaina ny ota, raha tsy misy lalàna;'
mg1865::mg_45::5::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny fahafatesana nanjaka hatramin''i Adama ka hatramin''i Mosesy, na dia tamin''izay tsy nanota tahaka ny nanotan''i Adama aza, izay tandindon''ilay ho avy.'
mg1865::mg_45::5::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy tahaka ny fahadisoana ny fanomezam-pahasoavana. Fa raha ny fahadisoan''ny anankiray no nahatonga fahafatesana ho an''ny maro, mainka ny fahasoavan''Andriamanitra sy ny fanomezana amin''ny fahasoavan''ny olona iray, dia Jesoa Kristy, no tonga be ho an''ny maro kosa.'
mg1865::mg_45::5::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy tahaka ny avy amin''ny anankiray izay nanota ny fanomezana; fa noho ny nataon''ny anankiray no nisehoan''ny fitsarana ho fanamelohana, fa noho ny fahadisoana maro kosa no nisehoan''ny fanomezam-pahasoavana ho fanamarinana.'
mg1865::mg_45::5::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny fahadisoan''ny olona anankiray no nanjakan''ny fahafatesana noho ny nataon''ny anankiray, mainka izay mahazo ny haben''ny fahasoavana sy ny fanomezan''ny fahamarinana no hanjaka amin''ny fiainana noho ny nataon''ny Anankiray, dia Jesoa Kristy.'
mg1865::mg_45::5::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tahaka ny nahatongavan''ny fanamelohana ho an''ny olona rehetra noho ny fahadisoana iray no nahatongavan''ny fanamarinana ho amin''ny fiainana kosa ho an''ny olona rehetra noho ny fahamarinana iray.'
mg1865::mg_45::5::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny nanaovana ny maro ho mpanota noho ny tsy fanarahan''ny olona iray, no hanaovana ny maro ho marina kosa noho ny fanarahan''ny Anankiray.'
mg1865::mg_45::5::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lalàna dia niditra koa hahabe ny fahadisoana. Nefa teo amin''izay nihabiazan''ny ota no nihoaran''ny fahasoavana be lavitra,'
mg1865::mg_45::5::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho tahaka ny nanjakan''ny ota tao amin''ny fahafatesana no hanjakan''ny fahasoavana kosa amin''ny fahamarinana ho fiainana mandrakizay amin''ny alalan''i Jesoa Kristy Tompontsika.'
mg1865::mg_45::6::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahafahan''ny maro an''i Kristy amin''ny herin''ny ota, ary ny fanamasinana azy'
  verse_text: 'Inona ary no holazaintsika? Mbola hitoetra amin''ny ota ihany va isika hitomboan''ny fahasoavana?'
mg1865::mg_45::6::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sanatria izany! Hataontsika izay efa maty ny amin''ny ota ahoana no ho velona aminy ihany?'
mg1865::mg_45::6::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrareo va fa na iza na iza isika no efa natao batisa ho amin''i Kristy Jesoa dia natao batisa ho amin''ny fahafatesany?'
mg1865::mg_45::6::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa niara-nalevina taminy tamin''ny batisa ho amin''ny fahafatesana isika, mba ho tahaka ny nananganana an''i Kristy tamin''ny maty tamin''ny voninahitry ny Ray no handehanantsika kosa amin''ny fiainam-baovao.'
mg1865::mg_45::6::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nampiraisina* taminy tamin''ny endriky ny fahafatesany isika, dia ho tahaka izany koa amin''ny fitsanganany; [*Na: niara-nambolena]'
mg1865::mg_45::6::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatsika fa ny toetsika taloha dia niaraka nohomboana taminy hanimbana ny tenan''ny ota, mba tsy hanompoantsika ny ota intsony.'
mg1865::mg_45::6::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay efa maty dia afaka amin''ny ota.'
mg1865::mg_45::6::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niara-maty tamin''i Kristy isika, dia mino fa hiara-belona aminy koa isika;'
mg1865::mg_45::6::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary fantatsika fa rehefa nitsangana tamin''ny maty Kristy, dia tsy maty intsony Izy; tsy manan-kery aminy intsony ny fahafatesana.'
mg1865::mg_45::6::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny nahafatesany, dia maty ny amin''ny ota indray mandeha Izy; fa ny amin''ny ahavelomany kosa, dia velona ho an''Andriamanitra Izy.'
mg1865::mg_45::6::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho tahaka izany koa ianareo, ka ny tenanareo dia ataovy ho efa maty ny amin''ny ota, fa velona ho an''Andriamanitra ao amin''i Kristy Jesoa.'
mg1865::mg_45::6::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza avela ny ota hanjaka amin''ny tenanareo mety maty hanarahanareo ny filany;'
mg1865::mg_45::6::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aza manolotra ny momba ny tenanareo ho amin''ny ota ho fiadian*''ny tsy fahamarinana; fa atolory ny tenanareo ho an''Andriamanitra, toy ny efa maty nefa velona, ary ny momba ny tenanareo ho fiadian**''ny fahamarinana ho an''Andriamanitra. [*Na: fiasan''] [** Na: fiasan'']'
mg1865::mg_45::6::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ota tsy hanan-kery aminareo; fa tsy mba ambanin''ny lalàna ianareo, fa ambanin''ny fahasoavana.'
mg1865::mg_45::6::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary? hanota va isika, saingy tsy ambanin''ny lalàna, fa ambanin''ny fahasoavana? Sanatria izany!'
mg1865::mg_45::6::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrareo va fa raha manolo-tena ho mpanompo ianareo na ho an''iza na ho an''iza, dia mpanompon''izay arahinareo ianareo, na ny ota ho amin''ny fahafatesana, na ny fanarahana ho amin''ny fahamarinana?'
mg1865::mg_45::6::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaorana anie Andriamanitra, fa na dia efa mpanompon''ny ota aza ianareo, ny fonareo dia efa nanaraka ny fomban''ny fampianarana izay nanolorana anareo;'
mg1865::mg_45::6::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa natao afaka tamin''ny ota ianareo, dia tonga mpanompon''ny fahamarinana.'
mg1865::mg_45::6::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miteny araka ny fanaon''ny olona aho noho ny fahalemen''ny nofonareo; fa tahaka ny nanoloranareo ny momba ny tenanareo ho mpanompon''ny fahalotoana sy ny tsy fanarahan-dalàna hahatanteraka ny tsy fanarahan-dalàna, dia mba atolory ankehitriny toy izany koa ny momba ny tenanareo ho mpanompon''ny fahamarinana hahatanteraka ny fahamasinana.'
mg1865::mg_45::6::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony mpanompon''ny ota ianareo, dia afaka tamin''ny fahamarinana.'
mg1865::mg_45::6::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ary no vokatra azonareo fahiny tamin''izay zavatra mahamenatra anareo ankehitriny? fa fahafatesana no hiafaran''izany zavatra izany.'
mg1865::mg_45::6::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, rehefa natao afaka tamin''ny ota ianareo ka efa tonga mpanompon''Andriamanitra, dia manana ny vokatrareo ho amin''ny fahamasinana, ary ny farany dia fiainana mandrakizay.'
mg1865::mg_45::6::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahafatesana no tambin''ny ota; ary fiainana mandrakizay no fanomezam-pahasoavana avy amin''Andriamanitra ao amin''i Kristy Jesoa Tompontsika.'
mg1865::mg_45::7::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrareo, va, ry rahalahy (fa miteny amin''izay mahalala ny lalàna aho), fa ny lalàna dia manapaka ny olona, raha mbola velona izy?'
mg1865::mg_45::7::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vehivavy izay manambady dia fehezin''ny lalàna ho an''ny lahy, raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka amin''ny lalàn''ny lahy izy.'
mg1865::mg_45::7::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha mbola velona ny lahy, ka manambady olon-kafa ravehivavy, dia hatao hoe mpijangajanga izy; fa raha maty kosa ny lahy, dia afaka amin''izany lalàna izany izy ka tsy mba mpijangajanga, na dia manambady olon-kafa aza.'
mg1865::mg_45::7::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany ianareo koa, ry rahalahiko, dia efa natao maty ny amin''ny lalàna noho ny tenan''i Kristy, mba ho vadin''ny hafa ianareo, dia Izay natsangana tamin''ny maty, mba hahavokarantsika ho an''Andriamanitra.'
mg1865::mg_45::7::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony tao amin''ny nofo isika, dia ny filan''ny ota, izay nohetsehin''ny lalàna, no niasa tao amin''ny momba ny tenantsika hahavokatra ho amin''ny fahafatesana.'
mg1865::mg_45::7::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny dia efa afaka tamin''ny lalàna isika, satria maty ny amin''izay nihazonana antsika, ka dia manompo amin''ny havaozam-panahy isika, fa tsy amin''ny hahelan-tsoratra.'
mg1865::mg_45::7::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ary no holazaintsika? Ota va ny lalàna? Sanatria izany! Kanefa tsy nahalala ny ota aho, raha tsy tamin''ny lalàna, satria tsy fantatro akory ny fitsiriritana, raha tsy ny lalàna no nanao hoe: Aza mitsiriritra (Eksodosy 20:17).'
mg1865::mg_45::7::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa io didy io dia nentin''ny ota nampihetsika ny fitsiriritana rehetra tato anatiko; fa maty ny ota, raha tsy misy lalàna.'
mg1865::mg_45::7::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho dia velona tsy nanan-dalàna fahiny; fa rehefa tonga kosa ny didy, dia velona indray ny ota, ka dia maty aho.'
mg1865::mg_45::7::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny didy izay natao hahazoana fiainana, dia hitako fa nahatonga fahafatesana tamiko kosa.'
mg1865::mg_45::7::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa io didy io dia nentin''ny ota namitaka sy nahafaty ahy.'
mg1865::mg_45::7::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia masina tokoa ny lalàna, ary masina ny didy sady marina no tsara.'
mg1865::mg_45::7::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny tsara va no nahafaty ahy? Sanatria izany! Fa ny ota no nahafaty ahy, mba hiseho ho ota; fa ny tsara no nentiny nahafaty ahy, mba ho tonga ota indrindra ny ota noho ny nataon''ny lalàna.'
mg1865::mg_45::7::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatsika fa araka ny fanahy ny lalàna; fa izaho kosa nofo, namidy ho andevon''ny ota.'
mg1865::mg_45::7::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay ataoko dia tsy fantatro; fa tsy izay sitrako no ataoko; fa izay halako no ataoko.'
mg1865::mg_45::7::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao ny tsy sitrako aho, dia manaiky fa tsara ny lalàna.'
mg1865::mg_45::7::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato anatiko.'
mg1865::mg_45::7::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro fa tsy misy zavatra tsara mitoetra ato amiko, dia ato amin''ny nofoko; fa ato anatiko ihany ny fikasana, saingy ny hahatanteraka ny tsara no tsy ato.'
mg1865::mg_45::7::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny tsara izay sitrako no ataoko; fa ny ratsy izay tsy sitrako no ataoko.'
mg1865::mg_45::7::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny tsy sitrako no ataoko, dia tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato amiko.'
mg1865::mg_45::7::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hitako izao lalàna izao: raha ta-hanao ny marina aho*, dia ato amiko ihany ny ratsy. [*Na: koa hitako fa raha ta-hanaraka ny lalàna aho hanaovako ny marina]'
mg1865::mg_45::7::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mankasitraka ny lalàn''Andriamanitra aho araka ny toetra anaty;'
mg1865::mg_45::7::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa mahita lalàna hafa amin''ny momba ny tenako aho, miady amin''ny lalàn''ny saiko ka mamabo ahy ho an''ny lalàn''ny ota izay ao amin''ny momba ny tenako.'
mg1865::mg_45::7::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! olo-mahantra aho! Iza no hanafaka ahy amin''ny tenan''ity fahafatesana ity?'
mg1865::mg_45::7::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''Andriamanitra aho amin''ny alalan''i Jesoa Kristy Tompontsika. Koa raha ny amiko, dia mankatò ny lalàn''Andriamanitra aho amin''ny saiko, fa ny lalàn''ny ota kosa amin''ny nofoko.'
mg1865::mg_45::8::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny famonjen''i Kristy ny mino Azy, izay miantomboka amin''izao fiainana izao ary mbola hotanterahina ho mandrakizay'
  verse_text: 'Ary amin''izany dia tsy misy fanamelohana ho an''izay ao amin''i Kristy Jesoa.'
mg1865::mg_45::8::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao amin''i Kristy Jesoa ny lalàn''ny Fanahin''aina no nahafaka ahy tamin''ny lalàn''ny fahotana sy ny fahafatesana.'
mg1865::mg_45::8::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tsy hain''ny lalàna, satria ny nofo no nahalemy azy, dia vitan''Andriamanitra tamin''izy naniraka ny Zanany, naka ny endriky ny nofo ota sy ny amin''ny ota, ka nanameloka ny ota tao amin''ny nofo,'
mg1865::mg_45::8::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatanteraka ny fahamarinana ilain''ny lalàna amintsika, izay tsy mandeha araka ny nofo, fa araka ny Fanahy.'
mg1865::mg_45::8::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay araka ny nofo dia mihevitra izay zavatry ny nofo; fa izay araka ny Fanahy kosa mihevitra izay zavatry ny Fanahy.'
mg1865::mg_45::8::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fihevitry ny nofo dia fahafatesana; fa ny fihevitry ny Fanahy kosa fiainana, sy fiadanana'
mg1865::mg_45::8::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria fandrafiana an''Andriamanitra ny fihevitry ny nofo; fa tsy manaiky ny lalàn''Andriamanitra, sady tsy hainy akory izany.'
mg1865::mg_45::8::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay ao amin''ny nofo dia tsy mahay manao ny sitrapon''Andriamanitra.'
mg1865::mg_45::8::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo tsy ao amin''ny nofo, fa ao amin''ny Fanahy, raha ny Fanahin''Andriamanitra no mitoetra ao anatinareo. Fa raha misy kosa tsy manana ny Fanahin''i Kristy, dia tsy Azy izy.'
mg1865::mg_45::8::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha Kristy no mitoetra ao anatinareo, na dia maty ihany aza ny tena noho ny ota*, dia fiainana kosa ny fanahy noho ny fanamarinana. [*Na: na dia maty ny tena noho ny ota, fa]'
mg1865::mg_45::8::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny Fanahin''izay nanangana an''i Jesoa tamin''ny maty no mitoetra ao anatinareo, dia Izay nanangana an''i Kristy Jesoa tamin''ny maty no hamelona ny tenanareo mety maty amin''ny Fanahiny, Izay mitoetra ao anatinareo.'
mg1865::mg_45::8::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, ry rahalahy, dia mpitrosa isika — tsy amin''ny nofo anefa, ka ho velona araka ny nofo.'
mg1865::mg_45::8::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha velona araka ny nofo ianareo, dia tsy maintsy maty; fa raha ny Fanahy no amonoanareo ny asan''ny tena dia ho velona ianareo.'
mg1865::mg_45::8::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tarihin''ny Fanahin''Andriamanitra no zanak''Andriamanitra.'
mg1865::mg_45::8::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nandray ny fanahim-pahandevozana ho amin''ny tahotra indray ianareo, fa nandray ny fanahin''ny zanaka natsangana, izay iantsoantsika hoe: Aba, Ray o.'
mg1865::mg_45::8::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Fanahy dia miara-milaza amin''ny fanahintsika fa zanak''Andriamanitra isika.'
mg1865::mg_45::8::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha zanaka, dia mpandova; eny, sady mpandova an''Andriamanitra no mpiray lova amin''i Kristy koa, raha miara-miaritra aminy isika mba hiara-manam-boninahitra aminy koa.'
mg1865::mg_45::8::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ataoko fa ny fahoriana amin''izao andro ankehitriny izao dia tsy tokony hoharina amin''ny voninahitra izay haseho amintsika.'
mg1865::mg_45::8::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao zavatra ary rehetra izao dia samy maniry fatratra ka miandry ny fampisehoana ireo zanak''Andriamanitra;'
mg1865::mg_45::8::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izao zavatra ary rehetra izao dia nampanekena ho zava-poana, nefa tsy noho ny sitrapony, fa noho Izay nampanaiky azy,'
mg1865::mg_45::8::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nahazo fanantenana koa fa* izao zavatra ary rehetra izao aza dia hovotsorana amin''ny fahandevozana, dia ny fahalovana, ho amin''ny fahafahana izay momba ny voninahitr''ireo zanak''Andriamanitra. [*Na: satria]'
mg1865::mg_45::8::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatsika fa izao zavatra ary rehetra izao dia miara-misento sy miara-marary toy izay efa hiteraka mandraka ankehitriny;'
mg1865::mg_45::8::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy izany ihany, fa isika koa, na dia manana ny voaloham-bokatry ny Fanahy aza, isika aza dia misento ato anatintsika, miandry ny fananganan''anaka, dia ny fanavotana ny tenantsika.'
mg1865::mg_45::8::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanantenana no namonjena antsika; nefa ny fanantenana hita dia tsy mba fanantenana intsony; fa ahoana no mbola anantenan''ny olona izay efa hitany?'
mg1865::mg_45::8::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha isika manantena izay tsy mbola hitantsika, dia miandry amin''ny faharetana.'
mg1865::mg_45::8::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa, ny Fanahy no mamonjy ny fahalementsika: fa tsy fantatsika izay vavaka tokony hataontsika; fa ny Fanahy no mifona amin''ny fitarainana tsy azo tononina.'
mg1865::mg_45::8::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izay mandinika ny fo no mahalala izay hevitry ny Fanahy, satria araka an''Andriamanitra ny fifonany ho an''ny olona masina.'
mg1865::mg_45::8::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatsika fa ny zavatra rehetra dia miara-miasa hahasoa izay tia an''Andriamanitra, dia izay voantso araka ny fikasany rahateo.'
mg1865::mg_45::8::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria izay fantany rahateo no notendreny koa hitovy endrika amin''ny Zanany, mba ho Lahimatoa amin''ny rahalahy maro Izy.'
mg1865::mg_45::8::30:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay notendreny no nantsoiny koa; ary izay nantsoiny no nohamarininy koa; ary izay nohamarininy no nomeny voninahitra koa.'
mg1865::mg_45::8::31:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ary no holazaintsika ny amin''izany zavatra izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika?'
mg1865::mg_45::8::32:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy niaro ny Zanani-lahy, fa natolony hamonjy antsika rehetra Izy, tsy homeny antsika miaraka aminy maimaimpoana koa va ny zavatra rehetra?'
mg1865::mg_45::8::33:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hiampanga ny olom-boafidin''Andriamanitra? Andriamanitra no manamarina azy.'
mg1865::mg_45::8::34:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no manameloka? Kristy Jesoa no efa maty, eny, sady nitsangana tamin''ny maty koa ka mitoetra eo amin''ny tanana ankavanan''Andriamanitra ary mifona ho antsika.'
mg1865::mg_45::8::35:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hahasaraka antsika amin''ny fitiavan''i Kristy? Fahoriana va, sa fahantrana, sa fanenjehana, sa mosary, sa fitanjahana, sa loza, sa sabatra?'
mg1865::mg_45::8::36:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny voasoratra hoe: Fa noho ny aminao no namonoana anay mandrakariva; Toy ny ondry hovonoina no fijery anay (Salamo 44:22).'
mg1865::mg_45::8::37:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa amin''izany rehetra izany dia manoatra noho ny mpandresy isika amin''ny alalan''ilay tia antsika.'
mg1865::mg_45::8::38:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa matoky aho fa na fahafatesana, na fiainana, na anjely, na ireo fanapahana, na zavatra ankehitriny, na zavatra ho avy, na hery,'
mg1865::mg_45::8::39:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 8
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'na ny ambony, na ny ambany, na inona na inona amin''izao zavatra ary rehetra izao, dia tsy hahasaraka antsika amin''ny fitiavan''Andriamanitra izay ao amin''i Kristy Jesoa Tompontsika.'
mg1865::mg_45::9::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nandavan''Andriamanitra ny Jiosy'
  verse_text: 'Milaza ny marina ao amin''i Kristy aho, fa tsy mandainga, sady miara-milaza amiko ao amin''ny Fanahy Masina koa ny fieritreretako,'
mg1865::mg_45::9::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mafy ny alaheloko, ka tsy mety mitsahatra ny fahorian''ny foko.'
mg1865::mg_45::9::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa saiky niriko aza ho voaozona* ho afaka tamin''i Kristy ny tenako mba hahavonjeko ny rahalahiko, havako araka ny nofo, [*Grika: anatema]'
mg1865::mg_45::9::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay Isiraelita sady manana ny fananganan''anaka sy ny voninahitra sy ny fanekena sy ny fanomezana ny lalàna sy ny fombam-pivavahana ary ny teny fikasana;'
mg1865::mg_45::9::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'azy koa ny razana, sady avy taminy araka ny nofo Kristy, Izay ambonin''izy rehetra, Andriamanitra isaorana mandrakizay*. Amena. [*Na: Avy taminy araky ny nofo Kristy. Isaorana mandrakizay anie Andriamanitra, Izay ambonin''izy rehetra]'
mg1865::mg_45::9::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy lazaiko fa foana ny tenin''Andriamanitra tsy akory. Fa tsy izay rehetra avy amin''ny Isiraely no Isiraely.'
mg1865::mg_45::9::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia taranak''i Abrahama aza ireo, tsy dia ary zanany avokoa; fa avy amin''isaka no hantsoina izay taranaka ho anao (Genesisy 21:12).'
mg1865::mg_45::9::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany hoe: Tsy ny zanaky ny nofo no zanak''Andriamanitra; fa ny zanaky ny teny fikasana no isaina ho taranaka.'
mg1865::mg_45::9::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no filàzan''ny teny fikasana: Raha avy ny taona toy izao, dia ho avy Aho, ary hanana zazalahy Saraha (Genesisy 18:10).'
mg1865::mg_45::9::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy izany ihany, fa Rebeka koa dia nanan''anaka tamin''ny anankiray, dia tamin''isaka razantsika;'
mg1865::mg_45::9::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tsy mbola teraka ireo, ary tsy mbola nanao tsara na ratsy (mba hitoeran''ny fikasan''Andriamanitra araka ny fifidianana, tsy avy amin''ny asa, fa avy amin''izay miantso),'
mg1865::mg_45::9::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nolazaina tamin-dravehivavy hoe: Ny zokiny hanompo ny zandriny (Genesisy 25:23)'
mg1865::mg_45::9::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: "Jakoba no tiako, fa Esao no halako" (Malakia 1:2-3).'
mg1865::mg_45::9::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary no holazaintsika? Misy tsy fahamarinana va amin''Andriamanitra? Sanatria izany!'
mg1865::mg_45::9::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy tamin''i Mosesy: Izaho hiantra izay hiantrako, ary hamindra fo amin''izay hamindrako fo (Eksodosy 33:19).'
mg1865::mg_45::9::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tsy avy amin''izay maniry na amin''izay mihazakazaka izany, fa avy amin''Andriamanitra Izay miantra.'
mg1865::mg_45::9::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Soratra Masina tamin''i Farao: Izany no nanandratako anao, mba ho entiko mampiseho ny heriko, ary mba hanambarana ny anarako any amin''ny tany rehetra (Eksodosy 9:16).'
mg1865::mg_45::9::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay tiany hamindrana fo no amindrany fo, ary izay tiany hohamafàna fo no hamafiny fo.'
mg1865::mg_45::9::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao ary dia hanao amiko hoe: Koa nahoana Izy no manome tsiny ihany? Fa iza no manohitra ny sitrapony?'
mg1865::mg_45::9::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, ralehilahy, fa iza moa ianao, no mamaly an''Andriamanitra? Izay zavatra noforonina va hanao amin''izay namorona azy hoe: Nahoana Ianao no nanao ahy toy izao?'
mg1865::mg_45::9::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanefy vilany va tsy manam-pahefana amin''ny tanimanga, ka ny vongany iray ihany no anaovany zavatra samy hafa, ny iray hohajaina, ary ny iray hatao tsinontsinona?'
mg1865::mg_45::9::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sa ahoana kosa raha Andriamanitra, na dia ta-haneho ny fahatezerany sy hampahafantatra ny heriny aza, dia be fahari-po ka nandefitra tamin''izay fanaky ny fahatezerana voavoatra hosimbana,'
mg1865::mg_45::9::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampahafantarina koa ny haren''ny voninahiny amin''izay fanaky ny famindram-po, izay namboariny rahateo hahazo voninahitra,'
mg1865::mg_45::9::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia isika izay nantsoiny koa, tsy ny avy amin''ny Jiosy ihany, fa ny avy amin''ny jentilisa koa,'
mg1865::mg_45::9::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka izay lazainy eo amin''i Hosea hoe: Hiantso ny tsy oloko hoe oloko Aho; Ary ilay tsy malala hoe malala (Hosea 2:25)'
mg1865::mg_45::9::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary any amin''ny tany izay nilazana taminy hoe: Tsy oloko ianareo, Dia any no hiantsoana azy hoe zanak''Andriamanitra velona (Hosea 2:1).'
mg1865::mg_45::9::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isaia milaza ny amin''ny Isiraely hoe: Na dia toy ny fasika any amin''ny ranomasina aza ny isan''ny Zanak''isiraely, dia izay sisa ihany no hovonjena;'
mg1865::mg_45::9::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny fahatanterahana faingana no hanefan''i Jehovah ny teniny ambonin''ny tany (Isaia 10:22-23)'
mg1865::mg_45::9::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary araka izay nolazain''Isaia fahiny hoe: Raha tsy Jehovah, Tompon''ny maro, no namela taranaka ho antsika, Dia efa tonga tahaka an''i Sodoma sy tonga tahaka an''i Gomora isika (Isaia 1:9).'
mg1865::mg_45::9::30:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary no holazaintsika? Ny jentilisa, izay tsy nitady fahamarinana, no nahazo fahamarinana, nefa fahamarinana izay avy amin''ny finoana?'
mg1865::mg_45::9::31:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny Isiraely, izay nitady lalàn''ny fahamarinana kosa, dia tsy nahatratra izany lalàna izany.'
mg1865::mg_45::9::32:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana moa? Satria tsy tamin''ny finoana, fa toa tamin''ny asa, ka tafintohina tamin''ny vato mahatafintohina izy;'
mg1865::mg_45::9::33:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: Indro Aho mametraka vato mahatafintohina sy vatolampy mahasolafaka ao Ziona; Ary izay mino Azy tsy ho menatra (Isaia 8:14; Isaia 28:16).'
mg1865::mg_45::10::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, ny irin''ny foko sy ny angatahiko amin''Andriamanitra ho an''ireny dia famonjena.'
mg1865::mg_45::10::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vavolombelon''ireny aho fa mazoto ho an''Andriamanitra izy, saingy tsy araka ny fahalalana.'
mg1865::mg_45::10::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa satria tsy nahalala ny fahamarinana avy amin''Andriamanitra izy ka nitady hanamarina ny tenany, dia tsy nanaiky ny fahamarinana avy amin''Andriamanitra.'
mg1865::mg_45::10::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kristy no faran''ny lalàna ho fahamarinana ho an''izay rehetra mino.'
mg1865::mg_45::10::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mosesy nanoratra milaza fa izay olona manao ny fahamarinana avy amin''ny lalàna no ho velona amin''izany (Levitikosy 18:5).'
mg1865::mg_45::10::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahamarinana izay avy amin''ny finoana kosa manao hoe: Aza milaza ao am-ponao hoe; Iza no hiakatra any an-danitra? (dia ny hampidina an''i Kristy izany,)'
mg1865::mg_45::10::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'na: Iza no hidina any amin''ny lalina? (dia ny hampiakatra an''i Kristy avy any amin''ny maty izany.)'
mg1865::mg_45::10::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahoana no lazainy? Eo akaikinao ny teny, dia eo am-bavanao sy ao am-ponao (Deoteronomia 30:12-14), dia ny teny ny amin''ny finoana, izay torinay;'
mg1865::mg_45::10::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria raha manaiky an''i Jesoa ho Tompo amin''ny vavanao ianao ary mino amin''ny fonao fa Andriamanitra efa nanangana Azy tamin''ny maty, dia hovonjena ianao.'
mg1865::mg_45::10::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny fo no inoana hahazoana fahamarinana, ary amin''ny vava no anekena hahazoana famonjena.'
mg1865::mg_45::10::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Soratra Masina: Tsy ho menatra izay rehetra mino Azy (Isaia 28:16).'
mg1865::mg_45::10::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: '2022-08-09T12:35:43+0000'
  verse_title: null
  verse_text: 'Fa tsy misy hafa, na Jiosy na jentilisa*, fa iray ihany no Tompon''izy rehetra, sady manan-karena homeny izay rehetra miantso Azy Izy. [*Grika: Grika]'
mg1865::mg_45::10::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra miantso ny anaran''ny Tompo no hovonjena (Joela 3:5).'
mg1865::mg_45::10::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataony ahoana ary no fiantso izay tsy ninoany? Ary hataony ahoana no fino izay Olona tsy reny? Ary hataony ahoana no fandre raha tsy misy mpitory?'
mg1865::mg_45::10::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataony ahoana no fitory, raha tsy nirahina? araka ny voasoratra hoe: Akory ny hatsaran''ny tongotr''iry mitondra teny soa mahafaly! (Isaia 52:7).'
mg1865::mg_45::10::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy izy rehetra no nanaiky ny teny soa mahafaly*. Fa hoy Isaia: Jehovah o, iza no nino ny teny nampitondraina anay? (Isaia 53:1.)'
mg1865::mg_45::10::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny finoana dia avy amin''ny tori-teny, ary ny tori-teny kosa avy amin''ny tenin''i Kristy.'
mg1865::mg_45::10::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho: Sao tsy nahare izy? Tsia; fa Efa nivoaka ho any amin''ny tany rehetra ny feony, Ary izay mino Ary tsy ho menatra, Ary ny teniny hatramin''ny faran''izao rehetra izao (Salamo 19:4). [*Na: filazantsara]'
mg1865::mg_45::10::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho: Sao tsy nahalala ny Isiraely? Voalohany, Mosesy manao hoe: Izaho hampialona anareo amin''izay tsy firenena, Dia amin''ny firenena adala no hampahasosorako anareo (Deoteronomia 32:21).'
mg1865::mg_45::10::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sahy mihitsy Isaia ka manao hoe: Hitan''izay tsy nitady Ahy Aho, Ary niseho tamin''izay tsy nanontany Ahy.'
mg1865::mg_45::10::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny Isiraely dia hoy izy: Mandritra ny andro no efa naninjirako ny tanako tamin''izay firenena sady tsy manaraka no mandà (Isaia 65:1-2).'
mg1865::mg_45::11::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Sao narian''Andriamanitra anie ny olony? Sanatria izany! fa izaho koa mba Isiraelita''taranak''i Abrahama ihany, avy amin''ny firenen''i Benjamina.'
mg1865::mg_45::11::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra tsy nanary ny olony izay efa fantany rahateo; sa tsy fantatrareo izay lazain''ny Soratra Masina eo amin''ny tantaran''i Elia, dia ilay fitarainany tamin''Andriamanitra nentiny namely ny Isiraely hoe:'
mg1865::mg_45::11::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, efa namono ny mpaminaninao sy nandrava ny alitaranao izy: ary izaho irery ihany no sisa, ka mitady ny aiko koa izy? (I Mpanjaka 19:14).'
mg1865::mg_45::11::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahoana no navalin''Andriamanitra azy? Izaho efa niaro fito arivo lahy ho Ahy, dia izay tsy mba nandohalika tamin''i Bala (I Mpanjaka 19:18).)'
mg1865::mg_45::11::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany koa amin''izao andro ankehitriny izao misy sisa ihany araka ny fifidianana amin''ny fahasoavana.'
mg1865::mg_45::11::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha avy amin''ny fahasoavana izany, dia tsy mba avy amin''ny asa intsony; fa raha izany, dia tsy fahasoavana intsony ny fahasoavana.'
mg1865::mg_45::11::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary? Izay notadiavin''ny Isiraely dia tsy azony, fa ny voafidy ihany no nahazo izany, fa nohamafàna ny fon''ny sisa;'
mg1865::mg_45::11::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: Andriamanitra efa nanome azy fanahy sondrian-tory sy maso tsy hahita, ary sofina tsy hahare, mandraka androany(Isaia 29:10; Deoteronomia 29:3)'
mg1865::mg_45::11::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida: Aoka ny latabany ho fandrika sy ho tonta Ary ho fahatafintohinana sy ho famaliana azy;'
mg1865::mg_45::11::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny masony ho jamba tsy hahita, Ary aoka hamokoka mandrakariva izy (Salamo 69:22-23).'
mg1865::mg_45::11::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Sao dia tafintohina ho lavo anie ny Isiraely? Sanatria izany! fa ny fahatafintohinany no nahatonga famonjena ho an''ny jentilisa mba hampialona azy.'
mg1865::mg_45::11::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny fahatafintohinany no tonga haren''izao tontolo izao, ary ny nihenany no tonga haren''ny jentilisa, mainka fa ny hafenoany.'
mg1865::mg_45::11::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo jentilisa no itenenako. Koa satria Apostolin''ny jentilisa aho, dia mankalaza ny fanompoako,'
mg1865::mg_45::11::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mba misy hahazoako hampialona ireo mifanapa-tsinay amiko*, mba hamonjeko ny sasany aminy. [*Grika: ny nofoko]'
mg1865::mg_45::11::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny fanariana azy no fampihavanana izao tontolo izao, tsy ho fitsanganana* amin''ny maty ny fandraisana azy? [*Grika: fiainana]'
mg1865::mg_45::11::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, raha masina ny santatra, dia masina koa ny vongany; ary raha masina ny fakany, dia masina koa ny sampany.'
mg1865::mg_45::11::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha notapahina ny sampany sasany, ary ianao izay tahaka ny hazo oliva maniry ho azy kosa no natsofoka teo aminy mba niombona ny fakan''ny menaky* ny hazo oliva [*Na: (fakany sy ny menaky)]'
mg1865::mg_45::11::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aza mirehareha amin''ny sampany; fa raha mirehareha ianao, tsy ianao no mitondra ny fakany, fa ny fakany no mitondra anao.'
mg1865::mg_45::11::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao dia hanao hoe: Notapahina ny sampany sasany hanatsofohana ahy.'
mg1865::mg_45::11::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina ihany izany; ny tsy finoany no nanapahana azy, ary ny finoanao kosa no itoeranao. Aza miavonavona, fa matahora;'
mg1865::mg_45::11::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha ny tena sampana aza tsy navelan''Andriamanitra, dia tsy havelany koa ianao.'
mg1865::mg_45::11::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa indro ny fahamoram-panahin''Andriamanitra sy ny fahasaro-pony: amin''izay lavo dia fahasaro-po; fa aminao kosa dia fahamoram-panahin''Andriamanitra, raha maharitra ao amin''ny fahamoram-panahiny ianao; fa raha tsy izany, dia hotapahina koa ianao.'
mg1865::mg_45::11::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireny kosa, raha tsy mikikitra eo amin''ny tsy finoana, dia hatsofoka ihany; fa azon''Andriamanitra atsofoka indray izy.'
mg1865::mg_45::11::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha notapahina tamin''ny hazo oliva naniry ho azy ianao ka natsofoka tamin''ny hazo oliva tsara, nefa tsy tena sampany, mainka fa izay tena sampany no hatsofoka amin''ny hazo oliva nanapahana azy.'
mg1865::mg_45::11::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy tiako tsy ho fantatrareo izany zava-miafina izany, ry rahalahy (fandrao mihevitra ny tenanareo ho hendry ianareo), fa efa misy fahamafiam-po manjo ny Isiraely sasany mandra-piditry ny hafenoan''ny jentilisa;'
mg1865::mg_45::11::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''izany dia hovonjena avokoa ny Isiraely rehetra, - araka ny voasoratra hoe: Hivoaka avy any Ziona ny Mpanafaka, Ary hampiala ny haratsiam-panahy amin''i Jakoba Izy;'
mg1865::mg_45::11::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fanekeko aminy, raha manaisotra ny fahotany Aho (Isaia 59:20-21; Isaia 27:9).'
mg1865::mg_45::11::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amin''ny filazantsara dia fahavalo izy noho ny aminareo; fa raha ny amin''ny fifidianana kosa dia malala izy noho ny amin''ny razana.'
mg1865::mg_45::11::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanomezam-pahasoavana sy ny fiantsoan''Andriamanitra dia tsy misy hanenenany.'
mg1865::mg_45::11::30:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka anareo tsy nanaiky an''Andriamanitra fahiny, nefa ankehitriny ny tsy faneken''ireny no nahazoanareo famindram-po,'
mg1865::mg_45::11::31:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia toy izany kosa ankehitriny, tsy nanaiky ireny, mba hahazoany famindram-po ankehitriny noho ny famindram-po azonareo.'
mg1865::mg_45::11::32:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra nanidy azy rehetra tamin''ny tsy fanekena, mba hamindrany fo amin''izy rehetra.'
mg1865::mg_45::11::33:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny halalin''ny haren''Andriamanitra sy ny fahendreny* ary ny fahalalany! ny fitsarany tsy hita lany, ary ny lalany tsy azo fantarina! [*Na: ny haren''ny fahendren''Andriamanitra]'
mg1865::mg_45::11::34:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no nahalala ny sain''i Jehovah? ary iza no mpanolo-tsaina Azy? (Isaia 40:13)'
mg1865::mg_45::11::35:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na iza no nanome Azy aloha hamaliana azy indray?'
mg1865::mg_45::11::36:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no nihavian''izao zavatra rehetra izao, ary Izy no mihazona azy, sady Izy koa no antony; Izy anie no homem-boninahitra mandrakizay. Amena.'
mg1865::mg_45::12::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fitondran-tena mahamendrika ny Kristiana'
  verse_text: 'Koa amin''izany mangataka aminareo aho, ry rahalahy, noho ny famindram-pon''Andriamanitra, mba hatolotrareo ny tenanareo ho fanatitra velona, masina, sitrak''Andriamanitra, dia fanompoam-panahy* mety hataonareo izany. [*Na: fanompoam-pivavahana]'
mg1865::mg_45::12::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza manaraka ny fanaon''izao tontolo izao; fa miovà amin''ny fanavaozana ny saina, hamantaranareo ny sitrapon''Andriamanitra, dia izay tsara sady ankasitrahana no marina*. [*Grika: tanteraka].'
mg1865::mg_45::12::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho ny fahasoavana nomena ahy dia izao no lazaiko amin''ny olona rehetra izay eo aminareo: Aza mihevitra mihoatra noho izay tokony hoheverina; fa mihevera izay onony araka ny ohatry ny finoana izay nozarain''Andriamanitra ho anareo avy.'
mg1865::mg_45::12::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ny ananantsika zavatra maro momba ny tena iray, nefa tsy mitovy asa izay rehetra momba ny tena,'
mg1865::mg_45::12::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia toy izany koa isika, na dia maro aza, dia tena iray ihany ao amin''i Kristy, ary samy miara-momba ny tena isika rehetra.'
mg1865::mg_45::12::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria samy manana fanomezam-pahasoavana samy hafa isika, araka ny fahasoavana izay nomena antsika: raha faminaniana, dia aoka hatao araka ny ohatry ny finoana;'
mg1865::mg_45::12::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha fanompoana amin''ny fiangonana, dia aoka ho amin''ny fanompoana; raha mampianatra, dia aoka ho amin''ny fampianarana;'
mg1865::mg_45::12::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mananatra, dia aoka ho amin''ny fananarana; izay manome, dia aoka ho amin''ny fahatsoram-po; izay manapaka, dia aoka ho amin''ny fahazotoana; izay mamindra fo, dia aoka ho amin''ny fifaliana.'
mg1865::mg_45::12::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny fitiavana ho amin''ny tsy fihatsaram-belatsihy; mankahalà ny ratsy; mifikira amin''ny tsara.'
mg1865::mg_45::12::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifankatiava araka ny fifankatiavan''ny mpirahalahy; mitariha lalana amin''ny fifanomezam-boninahitra.'
mg1865::mg_45::12::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mazotoa, fa aza malaina, ary aoka hafana fo amin''ny fanompoana ny Tompo.'
mg1865::mg_45::12::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia amin''ny fanantenana; miareta amin''ny fahoriana; mahareta amin''ny fivavahana.'
mg1865::mg_45::12::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantrà ny olona masina araka izay ilainy; mazotoa mampiantrano vahiny.'
mg1865::mg_45::12::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora izay manenjika anareo; misaora, fa aza manozona.'
mg1865::mg_45::12::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaraha mifaly amin''izay mifaly, ary miaraha mitomany amin''izay mitomany.'
mg1865::mg_45::12::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miraisa saina. Aza mihevitra izay hiavonavonana, fa aoka mba ho zatra amin''ny fietrena ianareo*. Aza manao ny tenanareo ho hendry. [*Na: manetre tena amin''ny malahelo]'
mg1865::mg_45::12::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamaly ratsy na amin''iza na amin''iza. Miomàna hanao izay mahamendrika eo imason''ny olona rehetra.'
mg1865::mg_45::12::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha azo atao, dia ataovy izay hihavananareo amin''ny olona rehetra.'
mg1865::mg_45::12::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, aza mamaly ratsy, fa omeo lalana ny fahatezerana; fa voasoratra hoe: Ahy ny famaliana; Izaho no hamaly, hoy Jehovah (Deoteronomia 32:35).'
mg1865::mg_45::12::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha noana ny fahavalonao, omeo hanina izy; raha mangetaheta izy, omeo hosotroiny; fa raha manao izany ianao, dia hanambatra vainafo ho eo an-dohany (Ohabolana 25:21-22).'
mg1865::mg_45::12::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety ho resin''ny ratsy ianao, fa reseo amin''ny soa ny ratsy.'
mg1865::mg_45::13::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny olona rehetra samy hanaiky ny fahefana lehibe. Fa tsy misy fahefana afa-tsy izay avy amin''Andriamanitra; fa izay misy dia voatendrin''Andriamanitra.'
mg1865::mg_45::13::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay manohitra ny fahefana dia manohitra ny voatendrin''Andriamanitra; ary izay manohitra dia hahazo fahamelohana.'
mg1865::mg_45::13::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanapaka dia tsy mba tahotry ny manao tsara, fa ny manao ratsy ihany. Ary ny tsy hatahotra ny fahefana va no tianao? Ataovy ary izay tsara, dia hahazo dera avy aminy ianao;'
mg1865::mg_45::13::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mpanompon''Andriamanitra izy hahatsara anao. Fa raha ratsy kosa no nataonao, dia matahora''fa tsy entiny foana tsy akory ny sabatra; fa mpanompon''Andriamanitra izy, dia mpamaly handatsaka fahatezerana amin''izay manao ratsy.'
mg1865::mg_45::13::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsy maintsy manaiky ny olona, nefa tsy noho ny fahatezerana ihany, fa noho ny fieritreretana koa.'
mg1865::mg_45::13::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho izany no andoavanareo vola hetra; fa mpanompon''Andriamanitra mitandrina izany zavatra izany indrindra ireny.'
mg1865::mg_45::13::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandoava amin''izy rehetra izay tokony ho azy avy: vola hetra ho an''izay tokony handoavan-ketra, fadin-tseranana ho an''izay tokony handoavana fadin-tseranana''tahotra ho an''izay tokony hatahorana, haja ho an''izay tokony hohajaina.'
mg1865::mg_45::13::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hisy tsy voaloa na amin''iza na amin''iza, afa-tsy ny fifankatiavanareo ihany; fa izay tia ny namany dia efa nahatanteraka ny lalàna.'
mg1865::mg_45::13::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny hoe: "Aza mijangajanga, aza mamono olona, aza mangalatra, aza mitsiriritra zavatr''olona" (Eksodosy 20:13-17), mbamin''izay didy hafa rehetra, dia samy efa ao anatin''izao teny izao hoe: "Tiava ny namanao tahaka ny tenanao" (Levitikosy 19:18).'
mg1865::mg_45::13::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitiavana tsy manisy ratsy ny namana; koa dia ny fitiavana no fahatanterahana ny lalàna.'
mg1865::mg_45::13::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tokony hanao izany indrindra isika, satria fantatsika ny andro, fa ankehitriny izao dia ora tokony hifohazanareo amin''ny fahatoriana; fa ankehitriny ny famonjena antsika dia akaiky noho ny tamin''ny andro vao ninoantsika.'
mg1865::mg_45::13::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ho lasa ny alina, ka efa mby akaiky kokoa ny andro, koa aoka hariantsika ny asan''ny maizina ka hitafiantsika ny fiadian''ny mazava.'
mg1865::mg_45::13::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka isika hitondra tena tsara toy ny amin''ny andro; tsy amin''ny filalaovan-dratsy, na amin''ny fahamamoana, tsy amin''ny fijangajangana, na amin''ny fijejojejoana, tsy amin''ny fifandirana, na amin''ny fialonana.'
mg1865::mg_45::13::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa itafio Jesoa Kristy Tompo, ary aza miahy ny amin''ny nofo hahatanteraka ny filany.'
mg1865::mg_45::14::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny handraisana izay malemy finoana, sy ny tokony hifandeferana'
  verse_text: 'Ary raiso ny malemy finoana, nefa aza mandray azy hitsaranareo ny eritreriny.'
mg1865::mg_45::14::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: '2022-08-18T06:28:48+0000'
  verse_title: null
  verse_text: 'Ny anankiray mino fa mahazo mihinana ny zavatra rehetra izy, fa ny anankiray kosa malemy finoana, ka dia mihinana zava-maniry ihany.'
mg1865::mg_45::14::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny mihinana tsy hanamavo ny tsy mihinana; ary aoka kosa ny tsy mihinana tsy hitsara ny mihinana; fa Andriamanitra no efa nandray azy.'
mg1865::mg_45::14::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa ianao izay mitsara ny mpanompon''ny hafa? Amin''ny tompony ihany no ijoroany na ahalavoany. Nefa hampitoerina ihany izy; fa mahay mampitoetra azy ny Tompo.'
mg1865::mg_45::14::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anankiray manao ny andro anankiray ho mihoatra noho ny andro sasany; ary ny anankiray kosa manao ny andro rehetra hitovy. Aoka samy hatoky tsara ao amin''ny sainy avy izy.'
mg1865::mg_45::14::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mitandrina ny andro dia mitandrina izany ho an''ny Tompo. Ary ny mihinana dia mihinana ho an''ny Tompo, satria misaotra an''Andriamanitra izy; ary ny tsy mihinana kosa dia tsy mihinana ho an''ny Tompo, sady misaotra an''Andriamanitra koa izy.'
mg1865::mg_45::14::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy velon-ko an''ny tenany isika, ary tsy misy maty ho an''ny tenany.'
mg1865::mg_45::14::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha velona isika, dia velona ho an''ny Tompo; ary raha maty isika, dia maty ho an''ny Tompo; koa amin''izany, na velona na maty isika, dia an''ny Tompo ihany.'
mg1865::mg_45::14::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany no nahafatesan''i Kristy sy nahavelomany indray, mba ho Tompon''ny maty sy ny velona Izy.'
mg1865::mg_45::14::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nahoana ianao no mitsara ny rahalahinao? Ary nahoana kosa ianao no manao tsinontsinona ny rahalahinao? Fa samy hiseho eo anoloan''ny fitsaran''Andriamanitra isika rehetra.'
mg1865::mg_45::14::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voasoratra hoe: Raha velona koa Aho, hoy Jehovah, ny lohalika rehetra handohalika amiko, Ary ny lela rehetra hidera an''Andriamanitra (Isaia 45:23).'
mg1865::mg_45::14::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa samy hampamoahin''Andriamanitra ny amin''ny tenany avy isika rehetra.'
mg1865::mg_45::14::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza mifampitsara intsony isika; fa aleo mihevitra* izao, dia ny tsy hanisy fandavoana na fanafintohinana eo anoloan''ny rahalahy. [*Grika: mitsara]'
mg1865::mg_45::14::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahalala sady matoky ao amin''i Jesoa Tompo aho fa tsy misy zavatra maloto ho azy; fa raha misy manao zavatra ho maloto, dia aminy ihany no maloto izany.'
mg1865::mg_45::14::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mampalahelo ny rahalahinao ny fihinanao, dia tsy mba manaraka ny fitiavana intsony ianao. Aza ny fihinanao no animbanao azy, fa efa maty Kristy hamonjy azy.'
mg1865::mg_45::14::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ary tsy mba hotenenina ratsy* ny fahasoavana azonareo. [*Grika: hanaovana blasfemia; izahao Matio 9:3]'
mg1865::mg_45::14::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanjakan''Andriamanitra dia tsy amin''ny fihinanana sy ny fisotroana, fa fahamarinana sy fiadanana ary fifaliana ao amin''ny Fanahy Masina.'
mg1865::mg_45::14::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manompo an''i Kristy amin''izany zavatra izany no sitrak''Andriamanitra sy eken''ny olona fa tsara.'
mg1865::mg_45::14::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia aoka isika hiezaka hitady ny momba ny fiadanana sy ny momba ny fifampandrosoana.'
mg1865::mg_45::14::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza izay hanina no andravanao ny asan''Andriamanitra. Madio avokoa ny zavatra rehetra, nefa ratsy ho an''ny olona izay mihinana amin''ny fahatafintohinana.'
mg1865::mg_45::14::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: '2022-07-30T08:28:41+0000'
  verse_title: null
  verse_text: 'Fa tsara ny tsy mihinana hena, na misotro divay, na manao izay hahatafintohina* ny rahalahinao. [*Ampio hoe: "na hahalavo, na hahalemy"]'
mg1865::mg_45::14::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny finoana izay anananao dia hazony ho anao eo anatrehan''Andriamanitra. Sambatra izay tsy manameloka ny tenany amin''izay zavatra ekeny.'
mg1865::mg_45::14::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay miahanahana dia meloka raha homana, satria tsy avy amin''ny finoana izany; fa ota izay rehetra tsy avy amin''ny finoana.'
mg1865::mg_45::15::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika izay matanjaka dia tokony hitondra ny fahalemen''ny malemy ka tsy hitady izay hahafaly ny tenantsika ihany.'
mg1865::mg_45::15::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka isika rehetra samy hitady izay hahafaly ny namantsika amin''izay hahasoa sy hampandroso azy.'
mg1865::mg_45::15::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kristy aza tsy nitady izay hahafaly ny tenany; fa araka ny voasoratra hoe: Ny latsa nataon''izay nandatsa Anao dia nihatra tamiko (Salamo 69:9).'
mg1865::mg_45::15::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra voasoratra fahiny dia nosoratana ho fianarantsika hananantsika ny fanantenana amin''ny faharetana sy ny fiononana avy amin''ny Soratra Masina.'
mg1865::mg_45::15::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitry ny faharetana sy ny fiononana anie hampiray hevitra anareo araka an ''i Kristy Jesoa,'
mg1865::mg_45::15::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho saina iray sy vava iray no hiarahanareo mankalaza an''Andriamanitra, Rain''i Jesoa Kristy Tompontsika.'
mg1865::mg_45::15::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mifandraisa ianareo tahaka ny nandraisan''i Kristy anareo* koa ho voninahitr''Andriamanitra. [*Na: (antsika)]'
mg1865::mg_45::15::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko fa Kristy efa tonga mpanompon''ny voafora noho ny fahamarinan''Andriamanitra hahatò ny teny fikasana tamin''ny razana,'
mg1865::mg_45::15::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hankalazan''ny jentilisa an''Andriamanitra koa noho ny famindram-po, araka ny voasoratra hoe: Izany no hiderako Anao any amin''ny jentilisa Sy hankalazako ny anaranao (Salamo 18:49).'
mg1865::mg_45::15::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy: Miravoravoa. ry jentilisa, mbamin''ny olony (Deoteronomia 32:43).'
mg1865::mg_45::15::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa: Midera''an''i Jehovah, ry jentilisa rehetra. Ary aoka hankalaza Azy ny firenena rehetra (Salamo 117:1).'
mg1865::mg_45::15::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Isaia: "Hisy Solofon''i Jese. Dia Ilay hitsangana hanapaka ny jentilisa; Izy no hitokian''ny jentilisa" (Isaia 11:10).'
mg1865::mg_45::15::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitry ny fanantenana anie hameno anareo amin''ny fifaliana sy ny fiadanana rehetra amin''ny finoanareo, mba hitomboanareo amin''ny fanantenana noho ny herin''ny Fanahy Masina.'
mg1865::mg_45::15::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho koa, ry rahalahiko, dia matoky ny aminareo fa feno fahatsarana ianareo, dia feno ny fahalalana rehetra sady mahay mifananatra koa.'
mg1865::mg_45::15::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa amin''ny fahasahiana no anoratako ny teny sasany aminareo, toy ny mampahatsiaro anareo indray noho ny fahasoavana nomen''Andriamanitra ahy,'
mg1865::mg_45::15::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho mpanompon''i Kristy Jesoa ho an''ny jentilisa aho ka manao fanompoam-pivavahana amin''ny itoriako ny filazantsaran''Andriamanitra, mba horaisina amin''ny fankasitrahana ny fanatitra, dia ny jentilisa, rehefa nohamasinin''ny Fanahy Masina.'
mg1865::mg_45::15::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia manana izay hataoko rehareha ao amin''i Kristy Jesoa aho noho ny amin''Andriamanitra.'
mg1865::mg_45::15::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy sahiko lazaina izay zavatra tsy nampanaovin''i Kristy ahy, na tamin''ny teny, na tamin''ny asa, mba hampanaiky ny jentilisa,'
mg1865::mg_45::15::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tamin''ny herin''ny famantarana sy ny fahagagana, ary tamin''ny herin''ny Fanahy Masina*, dia hatrany Jerosalema ka manodidina hatrany Ilyrikiona, no nahatanterahako ny fitoriako ny filazantsaran''i Kristy. [*Na: (Fanahin''Andriamanitra)]'
mg1865::mg_45::15::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nataoko ho voninahitro ny hitory ny filazantsara toy izao: tsy eo amin''izay efa niantsoana an''i Kristy anefa, fandrao hanovona eo ambonin''izay efa naorin''ny sasany aho;'
mg1865::mg_45::15::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa araka ny voasoratra hoe: Izay tsy nilazana Azy no hahita, Ary izay tsy nandre no hahafantatra (Isaia 52:15).'
mg1865::mg_45::15::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no nahasampona ahy matetika tsy hankany aminareo.'
mg1865::mg_45::15::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, satria tsy misy antony intsony ny itoerako amin''ireto tany ireto sady efa naniry hatramin''ny taona maro hankany aminareo aho,'
mg1865::mg_45::15::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mankany Spania; fa manantena hahita anareo amin''ny alehako aho ka haterinareo ho any, rehefa afakafaka ny alaheloko anareo.'
mg1865::mg_45::15::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny dia efa hankany Jerosalema aho hanompo ny olona masina.'
mg1865::mg_45::15::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa sitrapon''i Makedonia sy Akaia ny hamory vola hiantrana ny malahelo amin''ny olona masina any Jerosalema.'
mg1865::mg_45::15::27:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, sitrapony izany, sady mpitrosa aminy izy. Fa raha ny jentilisa no niombona ny zava-panahy taminy, dia tokony hanompo azy kosa amin''ny zavatra momba ny nofo izy.'
mg1865::mg_45::15::28:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vitako izany, ka voatolotro azy soa aman-tsara izany vokatra izany, dia hihazo any aminareo aho, raha mankany Spania.'
mg1865::mg_45::15::29:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatro fa raha mankany aminareo aho, dia homba ahy ny fahafenoan''ny fitahian''i Kristy.'
mg1865::mg_45::15::30:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mangataka aminareo aho, ry rahalahy, noho ny amin''i Jesoa Kristy Tompontsika sy ny fitiavana avy amin''ny Fanahy, mba hiarahanareo miezaka amiko amin''ny fivavahanareo amin''Andriamanitra ho ahy,'
mg1865::mg_45::15::31:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: '2022-08-18T06:31:36+0000'
  verse_title: null
  verse_text: 'mba ho voavonjy amin''ny tsy mino any Jodia aho, ary mba hankasitrahan''ny  olona masina izay fanompoana hataoko any Jerosalema,'
mg1865::mg_45::15::32:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hankanesako any aminareo amin''ny fifaliana, raha sitrapon''Andriamanitra, ka samy ho velombelona ny fontsika.'
mg1865::mg_45::15::33:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitry ny fiadanana anie ho aminareo rehetra. Amena.'
mg1865::mg_45::16::1:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Famangiana sy teny farany'
  verse_text: 'Indry, Foiby anabavintsika, diakon''ny fiangonana aty Kenkrea, lazaiko tsara aminareo,'
mg1865::mg_45::16::2:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba horaisinareo ao amin''ny Tompo izy, toy izay miendrika ny olona masina, ary mba hampianareo izy amin''izay raharaha ilany anareo; fa izy dia mpiahy ny maro mbamin''ny tenako koa.'
mg1865::mg_45::16::3:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Prisila sy Akoila, mpiara-miasa amiko ao amin''i Kristy Jesoa;'
mg1865::mg_45::16::4:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: '2022-10-07T05:24:43+0000'
  verse_title: null
  verse_text: 'izy mivady dia nanolotra ny tenany hamonjy ny aiko; nefa tsy izaho ihany no misaotra azy, fa ny fiangonana rehetra any amin''ny jentilisa koa.'
mg1865::mg_45::16::5:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary veloma amin''ny fiangonana izay ao an-tranony. Veloma amin''i Epaineto malalako, izay voaloham-bokatr''i Asia ho an''i Kristy.'
mg1865::mg_45::16::6:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Maria, izay nikely aina fatratra ho anareo.'
mg1865::mg_45::16::7:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Androniko sy Jonia, havako sy namako niara-nifatotra tamiko, izay malaza eo amin''ny Apostoly sady tao amin''i Kristy talohako.'
mg1865::mg_45::16::8:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Ampliato, malalako ao amin''ny Tompo.'
mg1865::mg_45::16::9:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Orbano, mpiara-miasa aminay ao amin''i Kristy, sy Staky malalako.'
mg1865::mg_45::16::10:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Apela, ilay efa voazaha toetra ao amin''i Kristy. Veloma amin''ny ankohonan''i Aristobolo.'
mg1865::mg_45::16::11:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Herodiona havako. Veloma amin''ny ankohonan''i Narkisa, izay ao amin''ny Tompo.'
mg1865::mg_45::16::12:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Tryfena sy Tryfosa, izay mikely aina ao amin''ny Tompo. Veloma amin''i Perysa malala, izay nikely aina fatratra ao amin''ny Tompo.'
mg1865::mg_45::16::13:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Rofosy, ilay voafidy ao amin''ny Tompo, ary amin''ny reniny sy reniko.'
mg1865::mg_45::16::14:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Asynkrito, Flegona, Hermesy, Patroba, Herma, mbamin''ny rahalahy ao aminy.'
mg1865::mg_45::16::15:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Veloma amin''i Filologo sy Jolia, Nerea sy ny anabaviny, sy Olympa ary ny olona masina rehetra izay ao aminy.'
mg1865::mg_45::16::16:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifanaova veloma amin''ny fanorohana masina. Ny fiangonana rehetra an''i Kristy manao veloma anareo.'
mg1865::mg_45::16::17:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho mananatra anareo, ry rahalahy, mba hitandrina ny amin''izay mahatonga ny fisarahana sy ny fahatafintohinana tsy araka ny fampianarana efa nianaranareo; mialà amin''ireny olona ireny.'
mg1865::mg_45::16::18:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy ireny tsy mba manompo an''i Kristy Tompontsika, fa ny kibony ihany; ary teny malefaka sady tsara lahatra no amitahany ny fon''ny tsy ary saina.'
mg1865::mg_45::16::19:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa niely any amin''ny olona rehetra ny lazan''ny fanarahanareo. Ary faly aho noho ny aminareo; satria tiako ho hendry amin''izay tsara ianareo, ary tsy hiharo amin''izay ratsy.'
mg1865::mg_45::16::20:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitry ny fiadanana hanorotoro an''i Satana faingana eo ambanin''ny tongotrareo. Ho aminareo anie ny fahasoavan''i Jesoa Kristy Tompontsika.'
mg1865::mg_45::16::21:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao veloma anareo Timoty, mpiara-miasa amiko, sy Losio sy Jasona ary Sosipatro havako.'
mg1865::mg_45::16::22:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho, Tertio, izay manoratra ity epistily ity, manao veloma anareo ao amin''ny Tompo.'
mg1865::mg_45::16::23:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Gaio, ilay itoeranay sy ny fiangonana rehetra, manao veloma anareo. Erasto, mpitahiry ny volam-panjakana ato an-tanàna, sy Koarto rahalahy manao veloma anareo.'
mg1865::mg_45::16::24:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: [*24 Ho aminareo rehetra anie ny fahasoavan''i Jesoa Kristy Tompontsika Amena]'
mg1865::mg_45::16::25:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''izay mahay mampahery anareo araka ny filazantsarako sy ny fitoriana an''i Jesoa Kristy, araka ny fampisehoana ny zava-niafina, izay voàfina hatry ny fony fahagola,'
mg1865::mg_45::16::26:
  verse_version: mg1865
  verse_book: mg_45
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
