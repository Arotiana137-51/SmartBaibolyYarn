mg1865::mg_22::1::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tonon-kira tsara indrindra, izay nataon''i Solomona.'
mg1865::mg_22::1::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny ampakarina sy ny zanakavavin''i Jerosalema'
  verse_text: 'Enga anie ka hanoroka ahy amin''ny fanorohan''ny vavany izy! Fa tsara noho ny divay ny fitiavanao.'
mg1865::mg_22::1::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mani-pofona ny menakao tsara, menaka manitra voaidina ny anaranao, koa izany no itiavan''ny zatovovavy anao.'
mg1865::mg_22::1::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Taomy aho, dia hihazakazaka hanaraka anao izahay; Nentin''ny mpanjaka ho ao an-efi-tranony aho. Hifaly sy hiravoravo aminao izahay; Hankalazainay mihoatra noho ny divay ny fitiavanao; Fitiavana marina no itiavany anao.'
mg1865::mg_22::1::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivalomainty aho, nefa tsara tarehy, ry zanakavavin''i Jerosalema, toy ny lain''i Kedara, toy ny ambain-dain''i Solomona.'
mg1865::mg_22::1::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mibanjina ahy, fa mivalomainty aho, satria efa azon''ny hainandro; Tezitra tamiko ny zanak''ineny; Notendreny ho mpiandry ny tanim-boalobony aho; Nefa ny tanim-boaloboko kosa, dia ny an''ny tenako, tsy mba nandrasako.'
mg1865::mg_22::1::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amiko, ry ilay tian''ny fanahiko, izay iandrasanao ny ondrinao, sy izay ampandrianao azy raha antoandro; Fa nahoana no ho tahaka izay mivezivezy foana* aho Eny amin''ny andian''ny namanao? [*Na: misarona fisalobonana]'
mg1865::mg_22::1::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy fantatrao, ry tsara tarehy indrindra amin''ny vehivavy, dia mandehana hanaraka ny andian''ny ondry aman''osy, ary andraso eny amin''ny lain''ny mpiandry ondry ny zanak''osinao.'
mg1865::mg_22::1::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny mpanjaka sy ny ampakarina'
  verse_text: 'Ry tompokovavy havako, ianao dia ampitahaiko amin''ny soavalivaviko mitarika ny kalesin''i Farao.'
mg1865::mg_22::1::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsara ny tarehinao ireo voahangy voatohy; Manendrika ny vozonao ireo rado.'
mg1865::mg_22::1::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa rojo volamena misy voavola mibontsimbontsina kosa no hataonay ho anao.'
mg1865::mg_22::1::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mipetraka amin''ny latabany ny mpanjaka, dia mamerovero tsara ny nardako.'
mg1865::mg_22::1::13:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malalako dia miora am-pehezana madinika mandry eo an-tratrako.'
mg1865::mg_22::1::14:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malalako dia tahaka ny vonin''ny kofera amiko, any an-tanimbolin''i En-jedy.'
mg1865::mg_22::1::15:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsara tarehy ianao, ry tompokovavy havako; Indro, tsara tarehy ianao; Voromailala ny masonao. [*Na: Manana masom-boromailala ianao]'
mg1865::mg_22::1::16:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsara tarehy ianao, ry malalako, eny, mahafinaritra; Maitso ny fandriantsika.'
mg1865::mg_22::1::17:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sedera ny sakamandimbin''ny tranontsika, ary kypreso ny peta-drindrintsika.'
mg1865::mg_22::2::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia voninkazo eny an-tanety* ihany sy lilia eny an-dohasaha. [*Na: any Saràna]'
mg1865::mg_22::2::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny lilia eo amin''ny tsilo, dia toy izany tompokovavy havako eo amin''ny zazavavy.'
mg1865::mg_22::2::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny hazo poma amin''ny hazo any an''ala, dia toy izany ny malalako eo amin''ny zatovo. Mahafinaritra ahy indrindra ny mipetraka eo ambanin''ny alokalony, sady mamy ao am-bavako ny voany.'
mg1865::mg_22::2::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nentiny ho ao an-tranon-divay aho, ary ny fanevany eo amboniko dia fitiavana.'
mg1865::mg_22::2::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatanjaho amin''ampempam-boaloboka aho, ary velombelomy amin''ny poma aho, fa mararim-pitia.'
mg1865::mg_22::2::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny tanany ankavia hanondana ahy, ary aoka ny tanany ankavanana hanohona ahy.'
mg1865::mg_22::2::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianiana anareo amin''ny gazela* na amin''ny dieravavy any an-tsaha aho, ry zanakavavin''i Jerosalema: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony. [*Anaram-biby haingan-tongotra]'
mg1865::mg_22::2::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Tenin''ny ampakarina, raha nitoetra irery izy'
  verse_text: 'Injay, ny feon''ilay malalako! Indro, tamy izy ka miantsambotsambotra eny an-tendrombohitra ary mitsambikimbikina eny amin''ny havoana.'
mg1865::mg_22::2::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malalako dia tahaka ny gazela* na ny diera* tanora; Indro, mijanona eo ala-tranonay** izy, mitsidika eo am-baravarankely, manarangarana eo amin''ny makarakara. [*Anaram-biby haingan-tongotra] [**Hebreo: ivelan''ny rindrinay]'
mg1865::mg_22::2::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niteny ny malalako ka nanao tamiko hoe: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary!'
mg1865::mg_22::2::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, lasa ny ririnina, ritra tsy misy intsony ny ranonorana;'
mg1865::mg_22::2::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miposaka eo amin''ny tany ny voninkazo; Tonga ny taona fanaovam-peo fifaliana, ary re aty amin''ny tanintsika ny feon''ny domohina.'
mg1865::mg_22::2::13:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny aviavy* mahamanitra ny voany tanora, mamony ny voaloboka ka mamerovero tsara. Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary! [*aviavimbazaha]'
mg1865::mg_22::2::14:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'E, ry voromailalako ao amin''ny tsefatsefaky ny harambato, dia ao amin''ny fialokalofana amin''ny fiakarana mideza, aoka hahita ny endrikao sy handre ny feonao aho; Fa mamy ny feonao, sady mahafinaritra ny endrikao.'
mg1865::mg_22::2::15:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambory ny amboahaolo, dia ireo amboahaolo madinika izay manimba ny tanim-boaloboka; Fa efa mamony izao ny voalobotsika.'
mg1865::mg_22::2::16:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahy ny malalako, ary azy aho, dia ilay miandry ny ondriny eny amin''ny lilia.'
mg1865::mg_22::2::17:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro*, mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela** na ny diera** tanora eny an-tendrombohitra be hantsana*** ianao. [*Hebreo: mandositra ny aloka] [**Anaram-biby haingan-tongotra] [***Na: tendrombohitra manelanelana]'
mg1865::mg_22::3::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo am-pandriako nony alina dia mazàna nitady ilay tian''ny fanahiko aho; Nitady azy aho, fa tsy nahita azy.'
mg1865::mg_22::3::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Hifoha aho ka handehandeha eo an-tanàna, dia eny an-dalambe sy eny an-kalalahana, hitady ilay tian''ny fanahiko eny, nitady azy aho, nefa tsy nahita azy.'
mg1865::mg_22::3::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitan''ny antily izay mandehandeha eny an-tanàna aho; Dia hoy izaho: Sao mba hitanareo lahy ilay tian''ny fanahiko iny?'
mg1865::mg_22::3::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony vao nandalo ireo vetivety foana aho, dia hitako ilay tian''ny fanahiko, ka nohazoniko izy, fa tsy navelako handeha, mandra-pitondrako azy ho any an-tranon''ineny, dia any amin''ny efi-tranon''ilay niteraka ahy.'
mg1865::mg_22::3::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianiana anareo amin''ny gazela* na amin''ny dieravavy* any an-tsaha aho, ry zanakavavin''i Jerosalema; Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony. [*Anaram-biby haingan-tongotra]'
mg1865::mg_22::3::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny amin''ny nampakarana an-dravehivavy'
  verse_text: 'Iza moa iry vehivavy miakatra avy any an''efitra, tahaka ny setroka mitankosina, sady tsara fofona amin''ny miora sy ny ditin-kazo mani-pofona mbamin''ny vovoka manitra samy hafa entin''ny mpandranto?'
mg1865::mg_22::3::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny filanjan*''i Solomona! Lehilahy enim-polo, mahery avokoa, avy amin''ny lehilahy mahery amin''ny Isiraely, no manotrona azy. [*Hebreo: farafara]'
mg1865::mg_22::3::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'An-tsabatra avokoa izy rehetra sady mahay miady, samy mitondra ny sabany eo am-balahany avy noho ny tahotra amin''ny alina.'
mg1865::mg_22::3::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao filanjana* ho azy Solomona mpanjaka tamin''ny hazo avy any Libanona: [*Hebreo: farafara]'
mg1865::mg_22::3::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volafotsy no nataony andriny, ary volamena ny fiankinana, volomparasy ny ondany, ny ao anatiny voaravaka amin''ny fanomezam-pitiavana avy tamin''ny zanakavavin''i Jerosalema.'
mg1865::mg_22::3::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoaha, ry zanakavavin''i Ziona, ka mijere an''i Solomona mpanjaka, misatroka ilay satro-boninahitra nasatro-dreniny azy tamin''ny andro nampakarany vady, dia tamin''ny andro nifalian''ny fony.'
mg1865::mg_22::4::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey, tsara tarehy ianao, ry tompokovavy havako! Endrey, tsara tarehy ianao! Ny masonao dia voromailala eo amin''ny fisalobonanao*; Ny volonao dia tahaka ny osy andiany, izay mandriandry eny an-kilan''ny tendrombohitr''i Gileada. [*Na: volonao milantolanto]'
mg1865::mg_22::4::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nifinao dia tahaka ny ondrivavy andiany efa voahety, izay miakatra avy eo amin''ny fampandroana; Samy kambana avy ireo, fa tsy misy tsy mana-namana.'
mg1865::mg_22::4::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny kofehy jaky ny molotrao, ary mahafinaritra ny vavanao*; Tahaka ny hasin''ampongaben-danitra ny takolakao eo amin''ny fisalobonanao**, [*Hebreo: fitenenanao] [**Na: volonao milantolanto]'
mg1865::mg_22::4::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vozonao dia tahaka ny tilikambon''i Davida, natao ho trano fihantonam-piadiana; Ampinga arivo no voahantona eo, dia ny ampinga rehetra an''ny lehilahy mahery.'
mg1865::mg_22::4::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nononao roa dia toy ny diera kambana mbola tanora, izay homana eny amin''ny lilia.'
mg1865::mg_22::4::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro*, dia handeha aho ho any amin''ny tendrombohitry ny miora sy ny havoan''ny ditin-kazo mani-pofona. [*Hebreo: mandositra ny aloka]'
mg1865::mg_22::4::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara avokoa izato bikanao izato, ry tompokovavy havako; Tsy misy kilema ianao.'
mg1865::mg_22::4::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiaraka amiko avy any Libanona ianao, ry ampakariko, eny, hiaraka amiko avy any Libanona, hitazana eny an-tampon''i Amana, eny an-tampon''i Senira sy Hermona, eny an-davaky ny liona, eny an-tendrombohitry ny leoparda.'
mg1865::mg_22::4::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa lasanao ny foko, ry havako* ampakariko, efa lasanao ny foko tamin''ny masonao an''ila sy tamin''ny rojo anankiray amin''ny vozonao. [*Hebreo: ampakariko]'
mg1865::mg_22::4::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akory ny hatsaran''ny fitiavanao, ry havako* ampakariko! Akory ny hatsaran''ny fitiavanao! eny, tsara noho ny divay! Ary ny fofon''ny menaka manitrao dia mihoatra noho ny zava-manitra rehetra! [*Hebreo: ampakariko]'
mg1865::mg_22::4::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitete tantely toy ny avy amin''ny tohotra ny molotrao, ry ampakariko; Tantely sy ronono no ao ambanin''ny lelanao, ary ny fofon''ny fitafianao dia tahaka ny fofon''i Libanona.'
mg1865::mg_22::4::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saha voahidy ny havako* ampakariko, loharano voahidy, fantsakan-drano voaisy tombo-kase. [*Hebreo: anabaviko]'
mg1865::mg_22::4::13:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no saha anirian''ny ampongaben-danitra tsara voa, sady misy kofera sy narda,'
mg1865::mg_22::4::14:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, narda sy safrona, veromanitra sy havozomanitra sy ny hazo misy ny ditin-kazo mani-pofona rehetra. Miora sy hazo manitra* Mbamin''ny zava-manitra tsara rehetra; [*Hebreo: ahalota]'
mg1865::mg_22::4::15:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Loharano ao an-tanimboly ianao, loharano miboiboika, ary renirano kely avy any Libanona.'
mg1865::mg_22::4::16:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo, Mitsofa eny an-tsahako hielezan''ny fofony manitra. Aoka ny malalako hankaty an-tanimboliny ka hihinana ny voankazony tsara.'
mg1865::mg_22::5::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tonga eto an-tsahako aho, ry havako ampakariko; Mioty ny miorako mbamin''ny zava-manitro aho; Efa homana ny toho-tanteliko mbamin''ny tanteliko aho, ary efa misotro ny divaiko mbamin''ny rononoko; Homàna ianareo, ry sakaizako, misotroa, eny, mivokisa divay, ry malala.'
mg1865::mg_22::5::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Teny nataon''ny ampakarina sy ny mpanjaka ary ny zanakavavin''i Jerosalema.'
  verse_text: 'Natory aho, nefa nahatsiaro ihany ny foko; Injay! ny feon''ny malalako, izay mandondona ka manao hoe : voahy aho, ry havako* ampakariko, Ry voromailalako, ilay ahy tsy misy kilema; Fa vonton''ando ny lohako, Ny voloko milantolanto dia kotsan''ny andon''ny alina. [*Hebreo: ampakariko]'
mg1865::mg_22::5::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho: Efa niala akanjo aho, ka hataoko ahoana indray no fiakanjo? Efa nioza tongotra aho, ka hataoko ahoana no fandoto azy?'
mg1865::mg_22::5::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampiditra ny tanany teo amin''ny loaka ilay malalako, dia nangorakoraka azy ny foko.'
mg1865::mg_22::5::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitsangana hamoha varavarana ny malalako ihany aho, ary nitete miora ny tanako, eny, ny rantsan-tanako nitete ranon''ny miora teo amin''ny famohana ny hidin-trano.'
mg1865::mg_22::5::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namoha varavarana ny malalako aho, kanjo efa nihodina izy ka lasa; Very hevitra aho tamin''ny nitenenany; Nitady azy aho, fa tsy nahita; Niantso azy aho, fa tsy novaliany.'
mg1865::mg_22::5::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahita ahy ny antily izay mandehandeha eny an-tanàna, dia nikapoka ka nandratra ahy; Ny mpiambina ny manda nanala ny lamba fisaronako.'
mg1865::mg_22::5::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianiana anareo aho, ry zanakavavin''i Jerosalema: Raha mba hitanareo re ny malalako, dia ahoana no holazainareo aminy? Lazao fa mararim-pitia aho.'
mg1865::mg_22::5::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ny malalanao mihoatra noho ny malala sasany, ry tsara tarehy amin''ny vehivavy? Inona ny malalanao mihoatra noho ny malala sasany, no dia mampianiana anay toy izao ianao?'
mg1865::mg_22::5::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malalako dia sady fotsy mangatsakatsaka no mena, notsongaina tamin''ny alinalina.'
mg1865::mg_22::5::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohany dia toy ny tena volamena tsara; Ny volony dia milantolanto sady mangilohilo toy ny goaika.'
mg1865::mg_22::5::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masony dia tahaka ny voromailala eo anilan''ny sakeli-drano, mandro amin''ny ronono sady tahaka ny vato soa alatsaka an-tranontranony izy.'
mg1865::mg_22::5::13:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny takolany dia tahaka ny tanim-boninkazo misy zava-manitra eo an-tsaha, dia tahaka ny tany navosaina* misy voninkazo manitra. Ny molony dia tahaka ny lilia sady mitete ranon''ny miora. [*Hebreo: tilikambo]'
mg1865::mg_22::5::14:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenany dia tahaka ny anja-bolamena voaisy krysolita; Ny tenany dia tahaka ny ivory voarafitra tsara sady misarona safira;'
mg1865::mg_22::5::15:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ranjony dia tahaka ny andry vatosanga* miorina amin''ny faladia tena volamena; Ny tarehiny dia tahaka an''i Libanona, tsara toy ny sedera. [*marmora fotsy]'
mg1865::mg_22::5::16:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamy dia mamy ny vavany*, eny, maha-te-ho-tia avokoa izy. Toy izany ny malalako, ary toy izany ny sakaizako, ry zanakavavin''i Jerosalema! [*Hebreo: lanilaniny]'
mg1865::mg_22::6::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nankaiza ny malalanao, ry tsara tarehy amin''ny vehivavy? Nivily nankaiza ny malalanao? Mba hiarahanay aminao hitady azy.'
mg1865::mg_22::6::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa nidina ho any an-tsahany ny malalako, dia any amin''ny tanim-boninkazo misy zava-manitra eo an-tsaha, hiandry ny ondriny eny amin''ny tanimboly sy hioty ny lilia.'
mg1865::mg_22::6::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''ny malalako aho, ary ahy ny malalako, dia ilay miandry ny ondry andiany eny amin''ny lilia.'
mg1865::mg_22::6::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara tarehy tahaka an''i Tirza ianao, ry tompokovavy havako, eny, tsara tarehy tahaka an''i Jerosalema, mahatahotra toy ny antokon''ny miaramila mitondra faneva.'
mg1865::mg_22::6::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avilio ny masonao tsy hijery ahy, Fa mampiontanontana ny foko izy; Ny volonao dia tahaka ny osy andiany, izay mandriandry eny ankilan''i Gileada.'
mg1865::mg_22::6::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: '2022-08-18T06:27:26+0000'
  verse_title: null
  verse_text: 'Ny nifinao dia tahaka ny ondrivavy andiany, izay miakatra avy eo amin''ny fampandroana; Samy kambana avy ireo. Fa tsy misy tsy mana-namana,'
mg1865::mg_22::6::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny hasin''ampongaben-danitra ny takolakao eo amin''ny fisalobonanao*. [*Na: ny volonao milantolanto]'
mg1865::mg_22::6::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mpanjakavavy enim-polo sy vaditsindrano valo-polo ary zatovovavy tsy hita isa.'
mg1865::mg_22::6::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iray monja kosa no voromailalako, dia ilay ahy tsy misy kilema, vavy tokan-dreniny sady tsongaina amin''izay naterany. Ny zazavavy nahita azy ka nanao azy ho sambatra, eny, ny mpanjakavavy sy ny vaditsindrano, ka nidera azy.'
mg1865::mg_22::6::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa io vehivavy mitsidika toy ny maraina, izay tsara tarehy tahaka ny volana, madio toy ny masoandro sady mahatahotra toy ny antokon''ny miaramila mitondra faneva?'
mg1865::mg_22::6::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: '2022-08-18T06:27:34+0000'
  verse_title: null
  verse_text: 'Lasa nidina nankany an-tsaha tsara hazo* aho, hijerijery ny zava-maitso an-dohasaha, hizaha raha mitsimoka ny voaloboka sy mamony ny ampongaben-danitra. [*Hebreo: an-tanin''egoza]'
mg1865::mg_22::6::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nampoiziko ny nanandratan''ny fanahiko ahy ho eo amin''ny kalesin''ny fireneko be voninahitra.'
mg1865::mg_22::7::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena, miverena, ry Solemita; Miverena, miverena, mba hijerenay anao. Inona no hitanareo amin''ny Solemita? Dihy tahaka ny an''i Mahanaima*. [*Na: ataon''ny mpandihy roa tonta;]'
mg1865::mg_22::7::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! mahate-hijery ny famindran''ny tongotrao mikiraro*, ry zazavavy zanak''andriana! Dia tahaka ny firavaka ny amboam-penao, nataon''ny tanan''ny mahay zavatra. [*Hebreo: mikapa]'
mg1865::mg_22::7::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny foitrao dia tahaka ny tomaboha kivorivory; Tsy ho diso divay noharoharoan-java-manitra anie izy! Ny kibonao dia tahaka ny vary tritika voatoby sady voaravaka lilia manodidina.'
mg1865::mg_22::7::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nononao roa dia tahaka ny gazela kambana mbola tanora.'
mg1865::mg_22::7::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vozonao dia tahaka ny tilikambo ivory; Ny masonao dia tahaka ny kamory any Hesbona, dia eo am-bavahadin''ny tanàna be olona*; Ny oronao dia tahaka ny tilikambo any Libanona, izay manandrify an''i Damaskosy. [*Na: eo am-bavahadin''i Beta-rabina]'
mg1865::mg_22::7::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohanao dia tahaka an''i Karmela, ary ny volon-dohanao milantolanto dia somary volomparasy. Voatanan''ny volo olioly ny mpanjaka!'
mg1865::mg_22::7::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! tsara tarehy sady mahafinaritra ianao, ry malala*, amin''izao zava-mahafinaritra rehetra izao! [*Hebreo: ry fitiavana]'
mg1865::mg_22::7::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izato tsangananao dia tahaka ny rofia*, Ary ny nononao dia tahaka ny sampahony. [*palma]'
mg1865::mg_22::7::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: '2022-03-26T07:18:28+0000'
  verse_title: null
  verse_text: 'Hoy izaho: Hananika ny rofia* aho ka handray ny rantsany; Ary aoka ny nononao ho toy ny sampam-boaloboka amiko, ary ny fofonainao ho tahaka ny an''ny poma, [*palma]'
mg1865::mg_22::7::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavanao dia toy ny divay tsara, eny, divay mikorotsaka mora eo an-tendan''ny malalako sady miditra misononoka amin''ny molotry ny matory.'
mg1865::mg_22::7::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''ny malalako aho, sady manina ahy* izy. [*Hebreo: ho amiko ny faniriany;]'
mg1865::mg_22::7::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, ry malalako, aoka handeha ho any an-tsaha isika; Andeha handry any ambanivohitra isika.'
mg1865::mg_22::7::13:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka hifoha maraina koa ho any an-tanim-boaloboka isika; Aoka hizahantsika raha mitsimoka ny voaloboka, sy mivelatra ny voniny, ary mamony ny ampongaben-danitra any no hanehoako ny fitiavako anao.'
mg1865::mg_22::7::14:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamerovero tsara ny dodaima*, sady ao am-bavahadintsika misy voankazo tsara samy hafa, na ny vao na ny ela: Efa notehiriziko ho anao izany, ry malalako. [*mandragora]'
mg1865::mg_22::8::1:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho tahaka ny anadahiko, izay ninono an''ineny, ianao! Dia ho nahita anao teny ala-trano aho ka ho nanoroka anao. Eny tsy ho azon''olona notevatevaina aho.'
mg1865::mg_22::8::2:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho entiko ka hampidiriko ho ao an-tranon''ineny ianao, ary hampianarinao aho; Hampisotroiko divay noharoharoan-java-manitra mbamin''ny ranon''ampongaben-danitro ianao.'
mg1865::mg_22::8::3:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanondana ahy ny tanany ankavia, ary aoka hanohona ahy ny tanany ankavanana.'
mg1865::mg_22::8::4:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianiana anareo aho, ry zanakavavin''i Jerosalema: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.'
mg1865::mg_22::8::5:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny nandehanany ho any amin''ny tany nihavian''ny ampakarina'
  verse_text: 'Iza moa iry vehivavy miakatra avy any an''efitra, mitehina amin''ny malalany? Teo ambanin''iny hazo poma no namohazako anao; Teo no niterahan-dreninao anao, eny, teo no nahararian''ilay niteraka anao.'
mg1865::mg_22::8::6:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy toy ny fanombohan-kase ao am-ponao aho sy toy ny fanombohan-kase eo an-tsandrinao; Fa mahery toy ny fahafatesana ny fitiavana, masiaka tahaka ny fiainan-tsy hita* ny fahasaro-piaro; Ny lelafony dia lelafo midedadeda, eny, lelafon''i Jehovah. [*Hebreo: Sheola]'
mg1865::mg_22::8::7:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny ony maro aza tsy mahavono ny afon''ny fitiavana, ary ny renirano tsy mahapaoka azy; Na dia misy olona manome ny fananany rehetra ao an-tranony aza hamidy fitiavana, dia hatao tsinontsinona izy.'
mg1865::mg_22::8::8:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manana zandrivavy tsy mbola misy nono izahay*; Ahoana no hataonay** amin''ny zandrivavinay***, raha mby amin''izay andro hangatahan''olona azy ho vady? [*Na: isika] [**Na: hataontsika] [***Na: zandrivavintsika]'
mg1865::mg_22::8::9:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manda izy, dia hanangananay* tilikambo volafotsy eo an-tampony; Fa raha varavarana kosa izy, dia hotampenanay** hazo fisaka sedera. [*Na: hananganantsika] [**Na: hotampenantsika]'
mg1865::mg_22::8::10:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mànda aho, dia toy ny tilikambo ny nonoko. Raha eo imasony dia toy ny efa mahita soa aho.'
mg1865::mg_22::8::11:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Solomona nanan-tanim-boaloboka tao Bala-hamona; Nahofany tamin''olona mpiandry voly ny tanim-boaloboka, ka samy tsy maintsy mitondra sekely volafotsy arivo ho solon''ny vokatra.'
mg1865::mg_22::8::12:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanim-boaloboko, eny, ilay an''ny tenako, dia eto anatrehako, Ny arivo kosa dia anao, ry Solomona, ary ny roan-jato ho an''izay mpiandry voly.'
mg1865::mg_22::8::13:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry mitoetra eny an-tsaha! Te-hihaino ny feonao ireo namako; Mba ampandreneso izany koa aho.'
mg1865::mg_22::8::14:
  verse_version: mg1865
  verse_book: mg_22
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandosira, ry malalako, ary aoka ianao mba ho toy ny gazela* na ny diera tanora eny an-tendrombohitry ny zava-manitra. [*Anaram-biby haingan-tongotra]'
