mg1865::mg_33::1::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah izay tonga tamin''i Morastita tamin''ny andro nanjakan''i Jotama sy Ahaza ary Hezetia, mpanjakan''ny Joda, dia ilay hitany ny amin''i Samaria sy Jerosalema.'
mg1865::mg_33::1::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny loza hanjo an''i Samaria sy Joda'
  verse_text: 'Samia mihaino ianareo, ry firenena rehetra; Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy; Ary aoka Jehovah Tompo no ho vavolombelona hanameloka anareo, Dia Jehovah avy ao amin''ny tempoliny masina.'
mg1865::mg_33::1::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Jehovah mivoaka avy ao amin''ny fitoerany Ary midina ka mandia ny havoana amin''ny tany.'
mg1865::mg_33::1::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miempo ao ambaniny ny tendrombohitra, Ary mivava ny lohasaha, Tahaka ny savoka taninin''ny afo, Sy tahaka ny rano akorotsaka eny amin''ny hantsana.'
mg1865::mg_33::1::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fahadisoan''i Jakoba sy ny fahotan''ny taranak''Isiraely no isian''izany rehetra izany. Iza no nahadiso an''i Jakoba? Tsy Samaria va? Ary iza no fitoerana avon''i Joda? Tsy Jerosalema va?'
mg1865::mg_33::1::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa Samaria dia hataoko korontam-bato any an-tsaha Sy tany fambolem-boaloboka; Ary hakorotsako ho any an-dohasaha ny vatony, Ka haharihariko ny fanorenany.'
mg1865::mg_33::1::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotorotoroina ny sampiny voasokitra rehetra, Ary hodorana amin''ny afo ny tanginy rehetra, Sady hofoanako ny sampiny rehetra; Tangin''ny vehivavy janga no nanangonany ireny, Ary hody ho tangin''ny vehivavy janga indray izy.'
mg1865::mg_33::1::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no hitomaniako sy hidradradradrako, Ka handeha sady horobaina no mitanjaka aho; Hikaonkaona* toy ny amboadia** aho Ary hikiakiaka*** toy ny ostritsa. [*Hebreo: hisaona] [**Na: jakala] [***Hebreo: hitomany]'
mg1865::mg_33::1::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy azo sitranina ny ferin''i Samaria*; Fa mihatra amin''i Joda izany, Ary mahatratra ny vavahadin''ny oloko aza, dia any Jerosalema. [*He. ny feriny]'
mg1865::mg_33::1::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ambaranareo any Gata izany, Aza mitomany akory! Mihosinkosina* vovoka ao Beti-le-afra** aho. [*Na: mihosinkosena... ianao] [**Beti-le-afra = fitoeram-bovoka]'
mg1865::mg_33::1::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana mitanjaka mitondra henatra, ry mponina ao Safira*; Tsy mivoaka ny mponina ao Zanana; Ny fisaonan''i Beti-haezela no misakana anareo tsy hijanona ao. [*Safira: = tsara tarehy]'
mg1865::mg_33::1::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa malahelo* ny soa ny mponina ao Marota*, Satria loza no efa nidina avy tamin''i Jehovah ho ao am-bavahadin''i Jerosalema. [*Hebreo: manaintaina] [**Marota = fangidiana]'
mg1865::mg_33::1::13:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fehezo amin''ny soavaly haingam-pandeha ny kalesy, ry mponina ao Lakisy; Niandohan''ny fahotan''i Ziona zanakavavy iny, Fa tao aminao no nahitana ny fahadisoan''Isiraely.'
mg1865::mg_33::1::14:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no hanomezanao taratasy fisaorana ho an''i Moresetagata; Ranotrambo ho an''ny mpanjakan''ny Isiraely ireo tranon''i Akziba*. [*Akziba = ranotrambo]'
mg1865::mg_33::1::15:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hitondrako olon-kandova ianao. Ry mponina ao Maresa*; Ho tonga hatrany Adolama aza ny voninahitr''Isiraely. [*Maresa = lova]'
mg1865::mg_33::1::16:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miheteza sy mikakasa Noho ny zanakao nahafinaritra; Halehibiazo ny solanao ho toy ny an''ny voltora*, Fa lasan-ko babo niala taminao izy. [*karazam-borona lehibe izay sola]'
mg1865::mg_33::2::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny heloky ny Isiraely, sy ny hampijaliana azy, ary ny mbola hampodiana azy indray'
  verse_text: 'Lozan''izay mamoron-keloka sy misaintsain-dratsy ao am-pandriany! Ary nony maraina ny andro, dia manatanteraka izany izy, Satria manan-kery ny tanany.'
mg1865::mg_33::2::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitsiriritra saha izy ka maka izany an-keriny, Sy trano koa ka mahalasa azy; Ary mampahory olona mbamin''ny ankohonany izy, Dia ny olona mbamin''ny lovany.'
mg1865::mg_33::2::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah: Indro, mamorona loza hamelezana ity firenena ity Aho, Izay tsy hahazoanareo hanafaka ny vozonareo, Ka tsy handeha miandranandrana ianareo, Satria andro mampahory izany.'
mg1865::mg_33::2::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany no hanaovana oha-teny handatsana anareo, Ka hitomaniana sy hidradradradrana hoe: Efa levona izao! Eny, hiteny izy hoe: Fongana tokoa isika; Ataony fanakalo zavatra ny anjaran''ny oloko; Endrey! afindrany hiala amiko izany! Samy zarainy ho an''ny mpiodina avy ny tanintsika!'
mg1865::mg_33::2::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsy hisy aminao hanenjana famolaina akory hanaovana filokana Ao amin''ny fiangonan''i Jehovah.'
mg1865::mg_33::2::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miteniteny* ianareo, hoy ny fiteniteniny*; Aoka tsy hiteniteny* ny amin''ireto izy, Tsy hita lany** ny fanalam-baraka ataony! [*Hebreo: mampitete] [**Na: raha tsy miteniteny amin''ireto izy, dia tsy ho afaka]'
mg1865::mg_33::2::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! izany teny izany! Ry taranak*''i Jakoba, Malaky tezitra va ny Fanahin''i Jehovah? Ireto va no asa fanaony? Tsy mahasoa izay mandeha mahitsy va ny teniko? [*Na: he!ianao izay atao hoe taranak''i]'
mg1865::mg_33::2::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vao omaly no omaly no nitsanganan''ny oloko ho fahavalo; Hendahanareo hiala eo amin''ny lamba ny kapotin''izay mandeha tsy manana ahiahy, Dia izay tsy tia ady.'
mg1865::mg_33::2::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy eo amin''ny oloko dia roahinareo hiala amin''ny tranony mahafinaritra; Esorinareo hiala mandrakizay amin''ny zanany madinika ny voninahitro.'
mg1865::mg_33::2::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, ka mialà (Fa tsy eto no fitsaharana), Satria misy fahalotoana mahatonga fandringanana eto, eny, fandringanana mafy.'
mg1865::mg_33::2::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe: Hitori-teny* aminao ny amin''ny divay sy ny zava-mahamamo aho, Dia izy no ho mpitori-tenin**''ity firenena ity. [*Hebreo: hampitete] [**Hebreo: mpampiteten'']'
mg1865::mg_33::2::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamory anareo rehetra tokoa Aho, ry Jakoba, Ary hanangona ny sisa amin''ny Isiraely tokoa, Hakambako toy ny ondry any amin''ny vala* izy, Toy ny ondry andiany ao amin''ny tany fiandrasana; Hitabataba izy noho ny hamaroan''ny olona. [*Na: any Bozra]'
mg1865::mg_33::2::13:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanabanga miakatra eo alohany, Manabanga izy ka mandroso ho eo amin''ny vavahady, Dia mivoaka eo aminy; Ny mpanjakany mandroso eo alohany, Ary Jehovah no mitarika azy.'
mg1865::mg_33::3::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahadiso ny lehiben''ny Isiraely sy ny mpaminany, ary ny handravana an''i Jerosalema'
  verse_text: 'Ary hoy izaho: Masïna ianareo, mihainoa, ry loholon''i Jakoba, Sy ianareo mpanapaka ny taranak''Isiraely: Tsy anjara-raharahanareo va ny hahalala ny rariny?'
mg1865::mg_33::3::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ianareo izay mankahala ny tsara ka tia ny ratsy, Izay manendaka ny hoditry ny olona Sy ny nofony amin''ny taolany,'
mg1865::mg_33::3::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ianareo izay homana ny nofon''ny oloko koa Sady manendaka ny hodiny Ary mamakivaky ny taolany; Eny, mitetika azy toy ny hatao am-bilany izy, Ary toy ny hena ao anatin''ny fahandroan-kena.'
mg1865::mg_33::3::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany dia hitaraina amin''i Jehovah izy, Nefa tsy hohenoiny; Hanafina ny tavany aminy amin''izany andro izany Izy Araka ny faharatsian''ny nataon''ireo.'
mg1865::mg_33::3::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah ny amin''ny mpaminany izay mampaniasia ny oloko, dia ireo izay manaikitra amin''ny nifiny, nefa mitory fiadanana, ary izay tsy manisy hanina eo am-bavany kosa dia iantsoany hanaovana ady masina:'
mg1865::mg_33::3::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no hisian''ny alina aminareo, ka tsy hisy fahitana, Ary ny maizina aminareo, ka tsy hisy fankatovana; Fa hilentika tsy hanazava ny mpaminany ny masoandro, Ary ho maizina aminy ny andro,'
mg1865::mg_33::3::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho menatra ny mpahita, Ary hangaihay ny mpanao fankatovana; Eny, hitampim-bava avokoa izy rehetra, Satria tsy misy valiny avy amin''Andriamanitra.'
mg1865::mg_33::3::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa dia feno hery, dia* ny Fanahin''i Jehovah, Mbamin''ny rariny sy ny faherezana, Mba hanambara amin''i Jakoba ny helony Sy amin''Isiraely ny fahotany. [*Na:amin'']'
mg1865::mg_33::3::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianareo, mihainoa izao, Ry loholon''ny taranak''i Jakoba, Sy ry mpanapaka ny taranak''Isiraely, Dia ianareo izay manao ny rariny ho fahavetavetana Sy mamadika ny hitsiny rehetra,'
mg1865::mg_33::3::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay manangana an''i Ziona amin''ny fandatsahan-drà Sy Jerosalema amin''ny faharatsiana.'
mg1865::mg_33::3::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpifehiny mitsara hahazoany kolikoly, Ary ny mpisorony mampianatra hahazoany karama, Ary ny mpaminany manao fankatovana hahazoany vola; Nefa Jehovah mbola iankinany ihany hoe: Tsy ato amintsika va Jehovah? Tsy hisy loza hanjo antsika.'
mg1865::mg_33::3::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia hasaina toy ny tanimboly Ziona noho ny nataonareo, Ary Jerosalema ho tonga korontam-bato, Ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana mifono ala.'
mg1865::mg_33::4::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hampodian''i Jehovah ny voninahitr''i Ziona, rehefa avy nampahorina izy'
  verse_text: 'Ary izao no ho tonga any am-parany: Ny tendrombohitra misy ny tranon''i Jehovah dia haorina eo an-tampon''ny tendrombohitra Ary hasandratra ho avo noho ny havoana; Ary ny firenena hitanjozotra hankany.'
mg1865::mg_33::4::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, maro ny jentilisa no hiainga ka hanao hoe: Andeha Isika hiakatra any an-tendrombohitr''i Jehovah, Ho any an-tranon''Andriamanitr''i Jakoba, Mba hampianarany antsika ny amin''ny lalany, Ka handehanantsika amin''ny atorony; Fa avy any Ziona no hivoahan''ny lalàna, Ary avy any Jerosalema ny tenin''i Jehovah.'
mg1865::mg_33::4::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitsara ny adin''ny firenena maro Izy Ka hampiaiky ny firenena mahery hatrany amin''ny lavitra; Dia hanefy ny sabany ho fangady ireny Ary ny lefony ho fanetezam-boaloboka; Ny firenena tsy hanainga sabatra hifamely; Na hianatra ady intsony.'
mg1865::mg_33::4::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy hipetraka eny ambanin''ny voalobony sy ny aviaviny izy, Ary tsy hisy hanaitaitra azy; Fa ny vavan''i Jehovah, Tompon''ny maro, no efa niteny.'
mg1865::mg_33::4::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny firenena rehetra samy mandeha amin''ny anaran''ny andriamaniny avy; Fa isika kosa handeha amin''ny anaran''i Jehovah Andriamanitsika mandrakizay doria.'
mg1865::mg_33::4::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany, hoy Jehovah, No hanangonako ny mandringa Sy hamoriako izay noroahina Mbamin''izay nampahoriko;'
mg1865::mg_33::4::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mandringa no hapetrako ho sisa, Ary izay noroahina lavitra ho firenena mahery; Ary Jehovah hanjaka aminy ao an-tendrombohitra Ziona Hatramin''izany ka ho mandrakizay.'
mg1865::mg_33::4::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry tilikambon''ny andiany*. Tendrombohitr''i Ziona** zanakavavy, Aminao no ho tonga izany, eny, ho tonga ny fanapahana voalohany, Dia ny fanjakan***'' i Jerosalema zanakavavy. [*Na: tilikambon''i Edera] [**Na: Ofelan''i Ziona] [***Na: hanjakana aminy]'
mg1865::mg_33::4::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahoana no mitaraina mafy ianao? Moa tsy misy mpanjaka va ao aminao, Sa lany ringana avokoa ny mpanolotsainao, No dia azon''ny fanaintainana ianao, toy ny vehivavy raha miteraka?'
mg1865::mg_33::4::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Ziona zanakavavy, mararia, ka manezaha, Toy ny vehivavy raha miteraka! Fa ankehitriny dia hivoaka avy any an-tanàna ianao Ka hipetraka any an-tsaha, Ary dia ho tonga hatrany Babylona aza; Any no hamonjena anao, Eny, any no hanavotan''i Jehovah anao ho afaka amin''ny tanan''ny fahavalonao.'
mg1865::mg_33::4::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny dia tafangona hamely anao ny firenena maro, Izay manao hoe: Aoka halam-baraka* Ziona, Ary aoka ny masontsika ho faly mijery azy. [*Hebreo: holotoina]'
mg1865::mg_33::4::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo tsy fantatr''ireny ny hevitr''i Jehovah, Na azony ny fisainany; Fa efa nanangona azy toy ny amboara ho ao am-pamoloana Izy.'
mg1865::mg_33::4::13:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, ka miveleza, ry Ziona zanakavavy, Fa ny tandrokao hataoko vy, Ary ny kitronao hataoko varahina, Ka hanorotoro firenena maro ianao; Dia hatolotrao* ho an''i Jehovah ny hareny, Ary ho an''ny Tompon''ny tany rehetra ny fananany. [*Hebreo: hataoko herema]'
mg1865::mg_33::4::14:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mivory ho andiany ianao, ry zanakavavin''ny andiany! Manao fahirano antsika izy, Mamely tsorakazo ny takolaky ny mpitsaran''ny Isiraely izy.'
mg1865::mg_33::5::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hahaterahan''ny Mesia, sy ny ho toetry ny fanjakany'
  verse_text: 'Fa ianao, ry Betlehema Efrata, Izay kely tsy tokony ho isan''ny arivon''i Joda akory, Dia avy ao aminao no hivoahan''Izay anankiray ho Mpanapaka ho Ahy ao amin''ny Isiraely; Hatry ny fahagola no efa nivoahany, dia hatrizay hatrizay.'
mg1865::mg_33::5::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia hatolony ireny, Ambara-pihavin''ny fotoana hiterahan''izay anankiray hiteraka; Ary izay sisa amin''ny rahalahiny dia hiverina mbamin''*ny Zanak''Isiraely. [*Na: ho any]'
mg1865::mg_33::5::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitsangana Izy hiandry ny ondriny amin''ny herin''i Jehovah. Sy amin''ny voninahitry ny anaran''i Jehovah Andriamaniny, Ka handry fahizay ireny, Fa izao dia ho lehibe hatrany amin''ny faran''ny tany Izy.'
mg1865::mg_33::5::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no ho fiadanana; Raha tonga eto amin''ny tanin-tsika ny Asyriana Ka miditra ao amin''ny tranobentsika, Dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika.'
mg1865::mg_33::5::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary handany ny tany Asyria amin''ny sabatra Sy ny tanin''i Nimroda ao an-tanànany* ireo; Ary Izy hamonjy amin''ny Asyriana, Raha tonga amin''ny tanintsika sady manitsaka ato amin''ny faritanintsika ireny. [*Hebreo: am-bavahadiny]'
mg1865::mg_33::5::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay sisa amin''i Jakoba ao amin''ny firenena maro Dia ho tahaka ny ando avy amin''i Jehovah, Sy tahaka ny ranonorana eny amin''ny ahitra, Izay tsy manantena mpaniraka, Na miandry zanak''olombelona.'
mg1865::mg_33::5::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay sisa amin''i Jakoba ao amin''ny jentilisa, Ao amin''ny firenena maro, Dia ho tahaka ny liona amin''ny biby any an''ala, Sy ho tahaka ny liona tanora ao amin''ny andian''ny ondry aman''osy: Raha mamaky eo izy, dia manitsakitsaka sy mamiravira, ka tsy misy mahavonjy.'
mg1865::mg_33::5::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka haingaina amin''ny rafilahinao ny tananao, Ary aoka ho ringana ny fahavalonao rehetra.'
mg1865::mg_33::5::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany, hoy Jehovah, Dia haringako tsy ho eo aminao intsony ny soavalinao, Ary hofonganiko ny kalesinao,'
mg1865::mg_33::5::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hofoanako ny tanàna amin''ny taninao, Ary harodako ny tanànanao mimanda rehetra;'
mg1865::mg_33::5::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hofoanako tsy hisy amin''ny tananao ny fankatovanao, Ary tsy hanana mpanandro intsony ianao.'
mg1865::mg_33::5::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hofoanako tsy hisy aminao koa ny sampinao voasokitra Sy ny tsangam-baton-tsampinao; Ary tsy hiankohoka eo anatrehan''ny asan''ny tananao intsony ianao.'
mg1865::mg_33::5::13:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hongotako tsy ho eo aminao ny Aserahanao*; Ary horavako koa ny tanànanao*. [*Anaran''andriamani-tsy-izy, na ny sariny, Na: haringako koa ny fahavalonao]'
mg1865::mg_33::5::14:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahatezerana sy ny fahavinirana no hamaliako ny firenena izay tsy mihaino.'
mg1865::mg_33::6::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Teny fampibebahana ny Isiraely'
  verse_text: 'Masïna ianareo, mihainoa izay lazain''i Jehovah: Mitsangàna, mandahara eo anoloan''ny tendrombohitra, Ary aoka ho ren''ny havoana ny feonao.'
mg1865::mg_33::6::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny adin''i Jehovah ianareo, ry tendrombohitra, Sy ianareo, ry fanorena-matezan''ny tany; Fa Jehovah manana ady amin''ny olony, Eny, amin''ny Isiraely no ifandaharany.'
mg1865::mg_33::6::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry oloko, inona no nataoko taminao? Inona no nanasarako anao? Tondroy maso ary Aho.'
mg1865::mg_33::6::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nentiko niakatra avy tany amin''ny tany Egypta ianao Sady navotako avy tao amin''ny trano nahandevozana: Dia nirahiko hitarika anao Mosesy sy Arona ary Miriama.'
mg1865::mg_33::6::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry oloko, mba tsarovy ny saina nataon''i Balaka, mpanjakan''i Moaba, Sy izay navalin''i Balama, zanak''i Beora, azy, Ary izay natao hatrany Sitima ka hatrany Gilgala, Hahafantaranareo ny asa marina nataon''i Jehovah.'
mg1865::mg_33::6::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no ho entiko manatona an''i Jehovah Sy miondrika eo anatrehan''Andriamanitra Izay any amin''ny avo? Hanatona Azy mitondra fanatitra dorana Sy ny ombilahy kely iray taona va aho?'
mg1865::mg_33::6::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho sitrak''i Jehovah va ny ondrilahy arivoarivo, Na renirano diloilo iray alina? Hanolotra ny lahimatoako noho ny fahadisoako va aho, Na ny ateraky ny kiboko noho ny fahotan''ny fanahiko?'
mg1865::mg_33::6::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry olombelona, efa naseho anao izay tsara Sy izay ilain''i Jehovah aminao, Dia izao ihany: Ny hanao ny marina sy ny ho tia famindram-po Ary ny hanaraka an''Andriamanitrao amin''ny fanetren-tena'
mg1865::mg_33::6::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaitra ny tanàna ny feon''i Jehovah, Ary mahita ny anaranao ny hendry*; Henoinareo ny tsorakazo sy Izay nanendry azy. [*Hebreo: ny fahendrena; na: ary fahendrena no kendren''ny anaranao]'
mg1865::mg_33::6::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola misy rakitry ny faharatsiana ihany va ao an-tranon''ny ratsy fanahy Sy ny famarana* tsy ampy izay voaozona? [*Hebreo: efaha]'
mg1865::mg_33::6::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mety madio va aho, raha manana mizana mandainga Sy kitapo misy vato tsy marina?'
mg1865::mg_33::6::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa feno loza ny mpanankarenany, Mandainga ny mponina ao aminy, Ary ny lelany dia fitaka eo am-bavany.'
mg1865::mg_33::6::13:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho kosa dia hikapoka maharary anao Amin''ny fandringanako anao noho ny helokao.'
mg1865::mg_33::6::14:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao hihinana, nefa tsy ho voky, Fa mbola ho ao anatinao ihany ny fahanoananao; Hampirina ianao, nefa tsy hahavonjy, Ary izay voavonjinao aza dia hatolotro ho amin''ny sabatra.'
mg1865::mg_33::6::15:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiantso hamafy, nefa tsy hijinja; Ianao hanosihosy oliva, nefa tsy hihosotra diloilo, Ary hanosihosy ranom-boaloboka, nefa tsy hisotro divay;'
mg1865::mg_33::6::16:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fatra-pitandrina ny lalàn''i Omry Sy ny asan''ny taranak''i Ahaba rehetra ianareo Sady manaraka ny fisainany, Mba hanolorako anao ho figagana, Ary ny mponina any ho zavatra mampisitrisitra, Ka dia hitondra ny latsan''ny oloko ianareo.'
mg1865::mg_33::7::1:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny faharatsian''ny Isiraely, sy ny hanjo azy, ary ny hibebahany, sy ny hamindran''Andriamanitra fo aminy'
  verse_text: 'Lozako! fa efa tonga toy ny fiotazam-boankazo aho Sy toy ny fitsimponam-boaloboka, Tsy misy salohy hohanina, Na aviavy mialin-taona, izay irin''ny fanahiko,'
mg1865::mg_33::7::2:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lany tsy misy amin''ny tany intsony ny tsara fanahy; Eny, tsy misy olo-marina ao amin''ny olombelona; Samy manotrika handatsa-drà avokoa izy, Eny, mihaza ny rahalahiny amin''ny harato izy rehetra.'
mg1865::mg_33::7::3:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonona hanao ratsy ny tanany; Mila ny mpanapaka, Azon-kolikoly ny mpitsara, Ary ny lehibe milaza ny fitsiriritan''ny fanahiny, Koa izany no entiny mandrarirary azy.'
mg1865::mg_33::7::4:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny tsara indrindra ao aminy aza dia toy ny roy, Ary na dia ny mahitsy indrindra ao aminy aza dia ratsy noho ny fefy tsilo; Avy ny andron''ny tilinao, izay hamaliana anao; Amin''izany dia vao ho very hevitra ianao*. [*Hebreo: izy]'
mg1865::mg_33::7::5:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matoky namana ianareo, Aza mahazo am-po izay sakaiza mahazatra; Fa ambeno ny varavaran''ny vavanao na dia amin''izay andefimandrinao aza.'
mg1865::mg_33::7::6:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zanakalahy manamavo ny rainy, Ny zanakavavy mitsangan-kanohitra ny reniny, Ary ny vinantovavy hanohitra ny rafozani-vavy; Ary ny ankohonan''ny olona ihany no fahavalony.'
mg1865::mg_33::7::7:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa dia hanandrandra an''i Jehovah, Eny, hiandry an''Andriamanitry ny famonjena ahy aho; Andriamanitro no hihaino ahy.'
mg1865::mg_33::7::8:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mifaly ahy, ry fahavaloko, Fa na dia lavo aza aho, mbola hiarina ihany; Raha mitoetra ao amin''ny maizina aho, Dia Jehovah no fahazavana ho ahy.'
mg1865::mg_33::7::9:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeran''i Jehovah dia hiaretako ihany, Fa efa nanota taminy aho, Ambara-pandahany ny teniko Sy hanomezany rariny ho ahy; Hamoaka ahy ho amin''ny mazava Izy, Ka ho faly aho mahita ny fahamarinany.'
mg1865::mg_33::7::10:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hahita izany ilay fahavaloko ka hosaronan-kenatra, Dia ilay nanao tamiko hoe: Aiza Izay Jehovah Andriamanitrao? Ho faly mahita azy ny masoko; Ankehitriny dia ho fanitsakitsaka toy ny fotaka eny an-dalambe izy.'
mg1865::mg_33::7::11:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'He ny andro hananganana ny mandanao! Amin''izany andro izany dia hitarina ny faritra.32 [*Na: ho lavitra ny didy]'
mg1865::mg_33::7::12:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany koa dia hanatona anao ny olona Avy any Asyria sy avy any amin''ny tanànan''i Egypta*, Eny, hatrany Egypta* ka hatramin''ny Ony**, Ary hatramin''ny ranomasina ka hatramin''ny ranomasina, Ary hatramin''ny tendrombohitra ka hatramin''ny tendrombohitra. [*Hebreo: Mazora, Eofrata]'
mg1865::mg_33::7::13:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ho lao ny tany noho ny amin''ny mponina eo aminy, Dia noho ny vokatry ny asany.'
mg1865::mg_33::7::14:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tehinao no ento miandry ny olonao, Dia ny ondry lovanao, Izay monina mitokana, dia any an''ala ao an-tampon''i Karmela; Aoka handrasana any Basana sy Gileada ireny Toy ny tamin''ny andro taloha ela.'
mg1865::mg_33::7::15:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tamin''ny andro nivoahanao avy tany amin''ny tany Egypta No hanehoako azy zava-mahagaga.'
mg1865::mg_33::7::16:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahita izany ny jentilisa, Ka hahamenatra azy ny heriny rehetra; Hitampim-bava izy, Ho tonga marenina ny sofiny.'
mg1865::mg_33::7::17:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hilelaka ny vovoka toy ny menarana izy; Hiala amin-kovitra avy ao amin''ny fiarovany mafy tahaka ny biby mikisaka amin''ny tany izy; Jehovah Andriamanitsika dia hohatoniny amin-kovitra, Eny, hatahotra Anao izy.'
mg1865::mg_33::7::18:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no Andriamanitra tahaka Anao, Izay mamela heloka Sady mandalo ny fahadisoan''ny sisa amin''ny lovany? Tsy mitana ny fahatezerany ho mandrakizay Izy, Fa tia famindram-po.'
mg1865::mg_33::7::19:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamindra fo amintsika indray Izy Ka hanitsakitsaka ny fahotantsika, Eny, harianao ho any amin''ny ranomasina lalina ny fahotany rehetra.'
mg1865::mg_33::7::20:
  verse_version: mg1865
  verse_book: mg_33
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanefa fahamarinana ho an''i Jakoba Ianao Sy famindram-po ho an''i Abrahama, Dia ilay nianiananao tamin''ny razanay hatramin''ny andro taloha ela.'
