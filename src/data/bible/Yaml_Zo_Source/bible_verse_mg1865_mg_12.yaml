mg1865::mg_12::1::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahararian''i Ahazia, sy ny nilazan''i Elia fa ho faty izy'
  verse_text: 'Ary Moaba niodina tamin''ny Isiraely, rehefa maty Ahaba.'
mg1865::mg_12::1::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahazia nianjera avy teo amin''ny makarakara teo amin''ny efi-trano ambony tao Samaria ka narary; dia naniraka olona izy ka nanao taminy hoe: Mandehana, anontanio amin''i Bala-zeboba, andriamanitr''i Ekrona, na ho sitrana ihany aho amin''ity aretiko ity, na tsia.'
mg1865::mg_12::1::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ilay Anjelin''i Jehovah niteny tamin''i Elia Tisbira hoe: Miaingà, miakara hihaona amin''ny iraky ny mpanjakan''i Samaria, ka manaova aminy hoe: Izao no lazain''i Jehovah: Moa ataonareo fa tsy misy Andriamanitra eo amin''ny Isiraely va, no mandeha hanontany amin''i Bala-zeboba, andriamanitr''i Ekrona, ianareo?'
mg1865::mg_12::1::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia tsy hidina hiala amin''ny farafara izay niakaranao ianao, fa ho faty tokoa. Ary dia lasa Elia.'
mg1865::mg_12::1::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina tany amin''ny mpanjaka ny iraka, ka hoy izy taminy: Nahoana re no niverina ianareo?'
mg1865::mg_12::1::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo taminy: Nisy lehilahy niakatra nitsena anay ka nanao taminay hoe: Mandehana miverina any amin''ny mpanjaka izay naniraka anareo, ka lazao aminy hoe: Izao no lazain''i Jehovah: Moa ataonareo fa tsy misy Andriamanitra eo amin''ny Isiraely va, no maniraka hanontany amin''i Bala-zeboba, andriamanitr''i Ekrona, ianareo? Koa noho izany dia tsy hidina hiala amin''ny farafara izay niakaranao ianao, fa ho faty tokoa.'
mg1865::mg_12::1::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Lehilahy toy inona izay niakatra nitsena anareo izay ka nilaza izany teny izany taminareo?'
mg1865::mg_12::1::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo namaly azy hoe: Lehilahy mitafy volom-biby izy, sady nisy fehin-kibo hoditra tamin''ny valahany. Dia hoy izy: Elia Tisbita izay.'
mg1865::mg_12::1::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka naniraka mpifehy dimam-polo anankiray mbamin''ny dimam-polo fehiny hankany aminy. Dia niakatra tany aminy izy; ka indro izy nipetraka teo an-tampon''ny tendrombohitra; ary niteny taminy ralehilahy hoe: Ry lehilahin''Andriamanitra o, midìna ianao, antsoin''ny mpanjaka.'
mg1865::mg_12::1::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Elia namaly ka nanao tamin''ny mpifehy dimam-polo hoe: Raha lehilahin''Andriamanitra tokoa aho, dia aoka hisy afo milatsaka avy any an-danitra handevona anao sy ny dimam-polo fehinao. Ary dia nisy afo nilatsaka avy tany an-danitra ka nandevona azy mbamin''ny dimam-polo fehiny.'
mg1865::mg_12::1::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka mpifehy dimam-polo anankiray mbamin''ny dimam-polo fehiny hankany aminy koa ny mpanjaka. Dia niteny izy ka nanao taminy hoe: Ry lehilahin''Andriamanitra o, midìna faingana ianao, antsoin''ny mpanjaka.'
mg1865::mg_12::1::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly Elia ka nanao taminy hoe: Raha lehilahin''Andriamanitra tokoa aho, dia aoka hisy afo milatsaka avy any an-danitra ka handevona anao mbamin''ny dimam-polo fehinao. Ary dia nisy afon''Andriamanitra nilatsaka avy tany an-danitra ka nandevona azy mbamin''ny dimam-polo fehiny.'
mg1865::mg_12::1::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia naniraka mpifehy dimam-polo anankiray koa indray mbamin''ny dimam-polo fehiny izy. Dia niakatra ilay mpifehy dimam-polo ka tonga, ary nandohalika teo anatrehan''i Elia ka nifona taminy nanao hoe: Masïna ianao, ry lehilahin''Andriamanitra o, aoka ho zava-tsoa eo imasonao ny aiko sy ny ain''ireto mpanomponao dimam-polo ireto.'
mg1865::mg_12::1::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa nisy afo nilatsaka avy tany an-danitra ka nandevona ireo roa lahy mpifehy dimam-polo ireo mbamin''ny dimam-polo fehiny avy; fa aoka kosa ho zava-tsoa eo imasonao ny aiko ankehitriny.'
mg1865::mg_12::1::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ilay Anjelin''i Jehovah tamin''i Elia: Midina ihany hiaraka aminy ianao; fa aza matahotra azy. Ary dia niainga izy ka nidina niaraka taminy ho any amin''ny mpanjaka.'
mg1865::mg_12::1::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny mpanjaka: Izao no lazain''i Jehovah: Satria naniraka olona hanontany amin''i Bala-zeboba, andriamanitr''i Ekrona, ianao, hoatra ny tsy misy Andriamanitra eo amin''ny Isiraely, dia tsy hidina hiala amin''ny farafara izay niakaranao ianao fa ho faty tokoa.'
mg1865::mg_12::1::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia maty izy araka ny tenin''i Jehovah izay nolazain''i Elia. Ary satria tsy nanan-janaka izy, dia Jorama no nanjaka nandimby azy tamin''ny taona faharoa nanjakan''i Jehorama, zanak''i Josafata, mpanjakan''ny Joda.'
mg1865::mg_12::1::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny asan''i Ahazia sisa izay nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::2::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampakarana an''i Elia ho any an-danitra, sy ny fahagagana voalohany nataon''i Elisa'
  verse_text: 'Ary nony efa hampakarin''i Jehovah ho any an-danitra amin''ny tafio-drivotra Elia, dia niara-nandeha avy tany Gilgala izy sy Elisa.'
mg1865::mg_12::2::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia tamin''i Elisa: Masïna ianao, mijanona eto; fa Jehovah efa naniraka ahy hatrany Betela. Fa hoy Elisa: Raha velona koa Jehovah, ary raha velona koa ny ainao, tsy handao anao mihitsy aho. Ka dia nidina nankany Betela izy roa lahy.'
mg1865::mg_12::2::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka nankany amin''i Elisa ireo zanaky ny mpaminany izay tao Betela ka nanao taminy hoe: Fantatrao va fa anio no hangalan''i Jehovah ny tomponao hiala ho any ambonin''ny lohanao? Dia hoy izy: Eny, fantatro ihany koa izany, fa mangina ianareo.'
mg1865::mg_12::2::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia taminy: Masïna ianao, ry Elisa, mijanona eto; fa Jehovah efa naniraka ahy ho any Jeriko. Fa hoy Elisa: Raha velona koa Jehovah, ary raha velona koa ny ainao, tsy handao anao mihitsy aho. Ka dia tonga tany Jeriko izy roa lahy.'
mg1865::mg_12::2::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo zanaky ny mpaminany izay tao Jeriko nanatona an''i Elisa ka nanao taminy hoe: Fantatrao va fa anio no hangalan''i Jehovah ny tomponao hiala ho any ambonin''ny lohanao? Ary izy namaly hoe: Eny, fantatro ihany koa izany, fa mangina ianareo.'
mg1865::mg_12::2::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia taminy: Masïna ianao, mijanona eto; fa Jehovah efa naniraka ahy ho any Jordana. Fa hoy Elisa: Raha velona koa Jehovah, ary raha velona koa ny ainao, tsy handao anao mihitsy aho. Ary dia lasa nandeha izy roa lahy.'
mg1865::mg_12::2::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy dimam-polo lahy, zanaky ny mpaminany, nandeha, dia nijanona tandrifiny teny lavitra eny; fa izy roa lahy kosa nitsangana teo amoron''i Jordana.'
mg1865::mg_12::2::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elia nandray ny kapotiny ka namalona azy, dia nikapoka ny rano, ary nisaraka roa ny rano, ka dia nita tamin''ny tany maina izy roa lahy.'
mg1865::mg_12::2::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa tafita izy roa lahy, dia hoy Elia tamin''i Elisa: Angataho izay hataoko ho anao, dieny tsy mbola misaraka aminao aho. Ary hoy Elisa: Masïna ianao, aoka ny anjaran-droa amin''ny fanahinao mba ho ahy.'
mg1865::mg_12::2::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Sarotra ny nangatahinao; kanefa raha mahita ahy misaraka aminao ianao, dia ho anao ihany izany; fa raha tsy izany kosa, dia tsy ho anao izany.'
mg1865::mg_12::2::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nandeha sy niresaka izy roa lahy, dia, indro, nisy kalesy afo sy soavaly afo nampisaraka azy roa lahy; ary Elia niakatra tamin''ny tafio-drivotra ho any an-danitra.'
mg1865::mg_12::2::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita izany Elisa, dia niantso hoe: Ry ikaky o, ry ikaky o, eny kalesin''ny Isiraely sy ny mpitaingin-tsoavaliny! Dia tsy nahita azy intsony izy. Ary noraisiny ny fitafiany ka notriariny roa.'
mg1865::mg_12::2::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainy ny kapotin''i Elia izay latsaka avy teny aminy, dia niverina izy ka nitsangana teo amoron''i Jordana.'
mg1865::mg_12::2::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Elisa ny kapotin''i Elia, ilay latsaka avy teny aminy, ka nakapony ny rano, dia hoy izy: Aiza Jehovah, Andriamanitr''i Elia? Eny, Elisa koa nikapoka ny rano, dia nisaraka roa izany, ka dia nita izy.'
mg1865::mg_12::2::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny niverenan''i Elisa nankany Jeriko sy Betela, ary ny fahagagana nataony'
  verse_text: 'Ary raha nahita azy ireo ny zanaky ny mpaminany izay nanandrify azy teo Jeriko, dia nanao hoe: Ny fanahin''i Elia efa mipetraka amin''i Elisa. Ary nandeha nitsena azy ireo ka niankohoka tamin''ny tany teo anatrehany.'
mg1865::mg_12::2::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Indro, misy dimam-polo lahy matanjaka ato amin''ny mpanomponao; masïna ianao, aoka handeha hitady ny tomponao ireo, fandrao naingain''ny Fanahin''i Jehovah izy ka nazerany any an-tendrombohitra anankiray, na any an-dohasaha anankiray. Fa hoy izy: Aza maniraka ianareo.'
mg1865::mg_12::2::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanery azy ireo mandra-pikaodikaodiny, dia hoy izy: Maniraha ary. Dia naniraka dimam-polo lahy izy; ary nitady azy hateloana ireny, fa tsy nahita.'
mg1865::mg_12::2::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tao aminy indray ireny, raha mbola tao Jeriko ihany izy, dia hoy izy taminy: Tsy nilaza taminareo va aho nanao hoe: Aza mandeha?'
mg1865::mg_12::2::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mponina tao amin''izany tanàna izany tamin''i Elisa: Masïna ianao, indro, tsara toerana ity tanàna ity, tompoko, araka izao hitanao izao, saingy ratsy rano, ary ny tany tsy mampahavanon''anaka*. [*Na: tsy mahavanom-boly]'
mg1865::mg_12::2::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Itondray lovia vaovao aho, ka asio sira ao anatiny. Dia nentiny tany aminy izany.'
mg1865::mg_12::2::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka nankany amin''ilay niandohan''ny rano izy, dia nanipy sira tao ka nanao hoe: Izao no lazain''i Jehovah: Efa nahatsara* ity rano ity Aho; tsy hisy fahafatesana na tsy fahavanonan''anaka intsony hiseho eto. [*Hebreo: nahasitrana]'
mg1865::mg_12::2::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsara* ny rano mandraka androany araka ny teny nataon''i Elisa. [*Hebreo: sitrana]'
mg1865::mg_12::2::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niakatra avy tao izy ka nankany Betela; ary nony niakatra teny an-dàlana izy, dia, indreo, nisy ankizilahy madinika nivoaka avy tao an-tanàna ka nanakora azy hoe: Miakara, ry ilay sola; miakara, ry ilay sola!'
mg1865::mg_12::2::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitodika izy ka nahita azy, dia nanozona azy tamin''ny anaran''i Jehovah. Ary dia nisy beravavy roa avy tany an''ala namiravira roa amby efa-polo tamin''ireo ankizilahy madinika ireo.'
mg1865::mg_12::2::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala teo Elisa ka nankany an-tendrombohitra Karmela, ary avy tao no niverenany any Samaria.'
mg1865::mg_12::3::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikambanan''i Jorama, mpanjakan''ny Isiraely, sy Josafata, mpanjakan''ny Joda, hiady tamin''ny Moabita'
  verse_text: 'Ary Jorama, zanak''i Ahaba, vao nanjaka tamin''ny Isiraely tao Samaria tamin''ny fahavalo ambin''ny folo taona nanjakan''i Josafata, mpanjakan''ny Joda, ary nanjaka roa ambin''ny folo taona izy.'
mg1865::mg_12::3::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah koa izy, nefa kosa tsy dia tahaka an-drainy, na tahaka an-dreniny; fa nanaisotra ilay tsangam-baton''i Bala izay nataon''drainy izy;'
mg1865::mg_12::3::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa izy nikikitra tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely, fa tsy niala tamin''izany.'
mg1865::mg_12::3::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mesa, mpanjakan''i Moaba, nanana ondry betsaka; ary nandoa hetra ho an''ny mpanjakan''ny Isiraely izy, dia zanak''ondry iray hetsy sy ny volon''ondrilahy iray hetsy*. [*Na: ny volon-janak''ondry iray hetsy sy ondrilahy iray hetsy]'
mg1865::mg_12::3::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa maty Ahaba, dia niodina tamin''ny mpanjakan''ny Isiraely ny mpanjakan''i Moaba.'
mg1865::mg_12::3::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jorama mpanjaka nivoaka avy tany Samaria tamin''izany andro izany ka nandamina ny Isiraely rehetra.'
mg1865::mg_12::3::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha izy, dia naniraka tany amin''i Josafata, mpanjakan''ny Joda, ka nanao hoe: Ny mpanjakan''i Moaba efa niodina tamiko: koa mba hiaraka amiko va ianao hiady aminy? Ary hoy izy: Eny, handeha aho, fa tahaka ny tenanao ihany aho, ka ny oloko dia olonao, ary ny soavaliko dia soavalinao.'
mg1865::mg_12::3::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Aiza ary no lalana halehantsika? Ary izy namaly hoe: Ilay mamaky ny efitr''i Edoma.'
mg1865::mg_12::3::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha ny mpanjakan''ny Isiraely sy ny mpanjakan''ny Joda ary ny mpanjakan''i Edoma; ary nandeha nanodidina lalan-kafitoana izy; ary tsy nisy rano ho an''ny miaramila sy ny biby fiompy izay nentiny.'
mg1865::mg_12::3::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely: Indrisy! Jehovah efa niantso ireto mpanjaka telo ireto mba hatolony eo an-tanan''i Moaba.'
mg1865::mg_12::3::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Josafata: Tsy misy mpaminanin''i Jehovah va eto hanontaniantsika amin''i Jehovah? Ary nisy anankiray tamin''ny mpanompon''ny mpanjakan''ny Isiraely namaly ka nanao hoe: Ato ihany Elisa, zanak''i Safata, ilay mpanondra-drano ny tanan''i Elia.'
mg1865::mg_12::3::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Josafata: Ao amin''izy io tokoa ny tenin''i Jehovah. Dia nidina nankany amin''i Elisa ny mpanjakan''ny Isiraely sy Josafata ary ny mpanjakan''i Edoma.'
mg1865::mg_12::3::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa tamin''ny mpanjakan''ny Isiraely: Moa mifaninona akory izaho sy ianao? Mandehana any amin''ny mpaminanin-drainao sy ny mpaminanin-dreninao ianao. Fa hoy ny mpanjakan''ny Isiraely taminy: Tsia, fa Jehovah efa niantso ireto mpanjaka telo ireto mba hatolony eo an-tanan''i Moaba.'
mg1865::mg_12::3::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Elisa: Raha velona koa Jehovah, Tompon''ny maro, Izay itsanganako eo anatrehany, raha tsy noho ny fanajako an''i Josafata, mpanjakan''ny Joda, dia tsy hanatrika anao na hijery anao akory aho.'
mg1865::mg_12::3::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa itondray mpitendry lokanga aho. Ary rehefa nitendry ilay mpitendry lokanga, dia nanindry an''i Elisa ny tanan''i Jehovah.'
mg1865::mg_12::3::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa: Izao no lazain''i Jehovah: Ataovy feno lavaka ity lohasahan-driaka ity.'
mg1865::mg_12::3::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jehovah: Tsy hahita rivotra na ranonorana akory ianareo; nefa ho feno rano io lohasahan-driaka io, mba hosotroinareo, dia ianareo sy ny ombinareo ary ny biby fiompinareo.'
mg1865::mg_12::3::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho zavatra kely ihany eo imason''i Jehovah izany; fa hanolotra ny Moabita eo an-tananareo koa Izy.'
mg1865::mg_12::3::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary handrava ny tanàna mimanda rehetra sy ny tanàna soa rehetra ianareo sady hikapa ny hazo tsara rehetra sy hanampina ny loharano rehetra ary hanipy vato amin''ny tany soa rehetra ho fanimbana azy.'
mg1865::mg_12::3::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, tokony ho tamin''ny fotoana fanaterana ny fanatitra, dia, indro, nisy rano tokoa tonga avy tamin''ny lalana mankany Edoma, ka feno rano ny tany.'
mg1865::mg_12::3::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny Moabita rehetra fa avy miakatra hiady aminy ireo mpanjaka ireo, dia nivory izy hatramin''izay rehetra nahatam-piadiana* no ho miakatra, ka dia niandry teo amin''ny sisin-taniny. [*Hebreo: nahasikina]'
mg1865::mg_12::3::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nifoha maraina koa ny Moabita, sady efa niposaka ny masoandro ka nitaratra tamin''ny rano, dia hitany ny rano tandrifiny fa mena tahaka ny rà.'
mg1865::mg_12::3::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Rà io! efa nifandringana tokoa ireo mpanjaka ireo, ary efa nifamely izy rehetra; koa mamaboa amin''izao, ry Moaba!'
mg1865::mg_12::3::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony efa tonga teo an-tobin''ny Isiraely izy, dia nitsangana ny Isiraely ka namely ny Moabita, dia nandositra teo anoloany ireo; fa ny Isiraely niditra hatrany amin''ny tanin''ny Moabita ka mbola namely azy ihany.'
mg1865::mg_12::3::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandrava ny tanàna izy ary samy nanipy vato tamin''ny tany soa rehetra ka nahafeno azy, ary nanampina ny loharano rehetra koa izy sady nikapa ny hazo tsara rehetra mandra-paha-tsy nisy vato intsony afa-tsy ny tao Kira-haresa ihany; ary na dia io aza dia nohodidinin''ny mpandefa antsamotady ka nasiany.'
mg1865::mg_12::3::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny mpanjakan''i Moaba fa tsy tohany ny ady, dia nitondra fiton-jato lahy nahay sabatra nomba azy izy mba hanivakivaka hitsin''ny mpanjakan''i Edoma; nefa tsy afaka izy.'
mg1865::mg_12::3::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainy ny zanany lahimatoa, izay natao hanjaka handimby azy, ka nateriny ho fanatitra dorana teo ambonin''ny manda. Dia niharan''ny fahatezerana mafy ny Isiraely, dia niala taminy ary niverina ho any amin''ny taniny izy.'
mg1865::mg_12::4::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampitomboan''i Elisa ny diloilon''ilay vehivavy maty vady'
  verse_text: 'Ary nisy vehivavy anankiray, vadin''ny zanaky ny mpaminany, nitaraina tamin''i Elisa hoe: Maty ny vadiko mpanomponao; ary ianao mahalala fa natahotra an''i Jehovah ny mpanomponao; nefa tonga ny tompo-trosa haka ny zanako mirahalahy ho andevony'
mg1865::mg_12::4::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Elisa taminy: Inona ary no hataoko ho anao? Lazao amiko: inona avy no anananao ao an-trano? Fa hoy ravehivavy: Ny ankizivavinao tsy manana na inona na inona ao an-trano afa-tsy diloilo iray tavoara monja.'
mg1865::mg_12::4::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Andeha mindram-bilany amin''ny namanao rehetra manodidina, dia vilany tsy misy zavatra, nefa aza atao vitsy.'
mg1865::mg_12::4::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tafiditra ianao, dia aoka hirindrim-baravarana ianao sy izy mirahalahy zanakao, ary manidina amin''izany vilany rehetra izany, dia atokàny izay feno.'
mg1865::mg_12::4::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala teo aminy ravehivavy ka nirindrim-baravarana mbamin''izy mirahalahy zanany, ary izy mirahalahy nitondra ny vilany ho any aminy, fa reniny kosa nanidina ny diloilo.'
mg1865::mg_12::4::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony feno ny vilany, dia hoy izy tamin''ny zanany: Itondray vilany iray koa aho. Fa hoy kosa ireo taminy: Tsy misy vilany intsony. Ary dia nitsahatra ny diloilo.'
mg1865::mg_12::4::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy ravehivavy ka nilaza tamin''ny lehilahin''Andriamanitra. Ary hoy kosa izy: Mandehana, amidio ny diloilo, ka anefao izay trosan''olona aminao, ary izay sisa dia hivelomanao sy ny zanakao.'
mg1865::mg_12::4::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny amin''ilay vehivavy Sonemita sy ny zanany'
  verse_text: 'Ary tamin''ny indray andro Elisa dia nankany Sonema, ary nisy vehivavy mpanankarena teo izay nanery azy hihinan-kanina. Ary isaky ny mandalo izy, dia nivily nankao aminy hihinan-kanina.'
mg1865::mg_12::4::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy tamin''ny lahy; Indro, fantatro fa masina sady lehilahin''Andriamanitra ilay mpandalo eto amintsika mandrakariva.'
mg1865::mg_12::4::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, andeha isika hanao efi-trano kely ambony rihana; ary hasiantsika fandriana sy latabatra sy seza ary fanaovan-jiro ho azy ao; ary raha tonga eto amintsika izy, dia ao no hipetraka.'
mg1865::mg_12::4::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny indray andro dia tonga tao Elisa ka nipetraka tao amin''ilay efi-trano ambony ary nandry tao.'
mg1865::mg_12::4::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''i Gehazy zatovony: Antsoy ilay Sonemita. Ary rehefa nantsoiny ravehivavy, dia nitsangana teo anatrehany izy.'
mg1865::mg_12::4::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa tamin''i Gehazy: Mba lazao amin-dravehivavy hoe: Indro, efa niahy anay tamin''izao fiahiana rehetra izao ianao, koa inona kosa no mba hatao ho anao? Tianao holazaina amin''ny mpanjaka va ianao, na amin''ny komandin''ny miaramila? Dia namaly ravehivavy hoe: Mitoetra aty amin''ny fireneko aho.'
mg1865::mg_12::4::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa: Fa inona ary no hatao ho anao? Dia namaly Gehazy hoe: Tsy hitanao va fa tsy manan-janaka izy, sady efa antitra ny lahy?'
mg1865::mg_12::4::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa: Antsoy ary izy. Ary nony nantsoiny izy, dia nitsangana teo am-baravarana.'
mg1865::mg_12::4::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Raha mby amin''ny fotoana, raha avy ny taona toy izao, dia hitrotro zazalahy ianao. Ary hoy ravehivavy: Tsia, ry tompoko, lehilahin''Andriamanitra, aza mandainga amin''ny ankizivavinao.'
mg1865::mg_12::4::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nefa nanan''anaka tokoa ravehivavy, ka nony niherina ny taona, dia tera-dahy izy tamin''ilay fotoana nolazain''i Elisa taminy.'
mg1865::mg_12::4::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa lehibe ny zaza, dia nankany amin''ny rainy tany amin''ny mpijinja vary izy indray andro,'
mg1865::mg_12::4::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin-drainy: Edrey! ny an-dohako! ny an-dohako! Ary hoy rainy tamin''ny zatovo anankiray: Ento ho any amin-dreniny izy.'
mg1865::mg_12::4::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia notrotroin''ilay zatovo izy ka nentiny ho any amin-dreniny, ary nampofoiny izy mandra-pitataovovonan''ny andro, dia maty.'
mg1865::mg_12::4::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ravehivavy niakatra ka nampandry azy teo amin''ny fandrian''ilay lehilahin''Andriamanitra, dia narindriny ny trano, ka nivoaka izy.'
mg1865::mg_12::4::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso ny vadiny izy ka nanao hoe: Masïna ianao, asaovy misy zatovo anankiray mankaty amiko mitondra borikivavy anankiray, fa handeha faingana ho any amin''ny lehilahin''Andriamanitra aho, dia hiverina indray.'
mg1865::mg_12::4::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny lahy: Inona no hankanesanao any aminy anio, nefa tsy mba andro tsinam-bolana na Sabata tsinona izao? Ary hoy ravehivavy: Ka nahoana aza?'
mg1865::mg_12::4::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ravehivavy dia nanisy lasely ny borikivavy, ka hoy izy tamin''ny zatovony: Ampandehano, izy ka mizora; aza miahotrahotra akory amin''ny fampandehananao azy, raha tsy ampijanoniko ianao.'
mg1865::mg_12::4::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ravehivavy nankany amin''ny lehilahin''Andriamanitra tany an-tendrombohitra Karmela. Ary raha vao tazan''ny lehilahin''Andriamanitra avy ery izy, dia hoy izy tamin''i Gehazy zatovony: Ilay Sonemita lahy iry;'
mg1865::mg_12::4::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'masïna ianao, mihazakazaha hitsena azy, ka ataovy aminy hoe: Tsara ihany va ianao: Tsara ihany va ny vadinao? Tsara ihany va ny zazalahy? Ary hoy ny famaliny: Tsara ihany.'
mg1865::mg_12::4::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany amin''ny lehilahin''Andriamanitra tany an-tendrombohitra izy, dia nandray ny tongony; fa Gehazy nanatona hampiala azy. Nefa hoy ny lehilahin''Andriamanitra: Avelao ihany izy, fa ory ny fanahiny ao anatiny, ary Jehovah efa nanafina izany tamiko, fa tsy nanambara tamiko.'
mg1865::mg_12::4::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ravehivavy: Moa naniry zaza taminao va aho, tompoko? Tsy hoy va aho: Aza mamitaka ahy?'
mg1865::mg_12::4::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''i Gehazy: Misikina, ary ento eny an-tananao ny tehiko, ka mandehana, raha mifanena amin''olona ianao, aza miarahaba azy; ary raha misy miarahaba anao, aza mamaly azy akory; ary apetraho eo amin''ny tavan''ny zazalahy ny tehiko.'
mg1865::mg_12::4::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny renin''ny zazalahy: Raha velona koa Jehovah, ary raha velona koa ny ainao, dia tsy hiala aminao mihitsy aho. Ary ilay lehilahin''Andriamanitra nitsangana ka nanaraka azy.'
mg1865::mg_12::4::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gehazy nialoha azy ka nametraka ny tehina teo amin''ny tavan''ny zazalahy; fa tsy nisy feo na faharenesana. Dia niverina nitsena azy indray izy ka nilaza taminy hoe: Tsy mahatsiaro akory ny zazalahy.'
mg1865::mg_12::4::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tao an-trano Elisa, indro, maty ny zazalahy sady nampandrina teo am-pandriany.'
mg1865::mg_12::4::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra izy, ka nirindrim-baravarana tao izy roa lahy, ary Elisa nivavaka tamin''i Jehovah.'
mg1865::mg_12::4::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra izy ka nandry niampatra tambonin''ny zazalahy, ka ny vavany nataony tamin''ny vavany, ary ny masony tamin''ny masony, ary ny tanany tamin''ny tanany, ka dia nafana ny tenan''ny zazalahy.'
mg1865::mg_12::4::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niasa-dia tao an-trano izy ary niverina niampatra taminy indray; dia nievina impito ny zazalahy, ary nihiratra ny masony.'
mg1865::mg_12::4::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elisa niantso an''i Gehazy ka nanao hoe: Antsoy ilay Sonemita. Dia nantsoiny izy. Ary rehefa tafiditra tao aminy izy, dia hoy Elisa: Raiso ny zanakao.'
mg1865::mg_12::4::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra ravehivavy ka niantoraka tamin''ny tongony sady niankohoka tamin''ny tany, dia nandray ny zanany izy ka lasa nivoaka.'
mg1865::mg_12::4::38:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny nanatsaran''i Elisa ilay hanina saiky nahafaty, sy ny nampitomboany ny mofo roa-polo hahavoky ny olona zato lahy'
  verse_text: 'Ary Elisa niverina nankany Gilgala; ary nisy mosary tamin''ny tany; ary ny zanakalahin''ny mpaminany nipetraka teo anatrehany, ka hoy izy tamin''ny zatovony: Ataovy eo an-tokoana ny vilany lehibe, ary mahandroa hanina ho an''ny zanakalahin''ny mpaminany.'
mg1865::mg_12::4::39:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray nivoaka tany an-tsaha hitsongo anana ka nahita voantangomboalavo maniry ho azy, dia nanangona voany iray trotroana avy amin''io; ary nony tonga izy, dia nosolatsolarany narotsany tao amin''ny vilany nisy ny hanina, fa tsy nisy nahafantatra.'
mg1865::mg_12::4::40:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia noloarany hohanin''ny olona izany. Ary raha mbola nihinana izy, dia nitaraina hoe: Ry lehilahin''Andriamanitra o, misy mahafaty* ao am-bilany. Ary tsy azony nohanina. [*Hebreo: fahafatesana]'
mg1865::mg_12::4::41:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Elisa: Itondray koba. Dia narotsany tao am-bilany ny koba, ka hoy izy: Andoary amin''izao ny olona hohaniny. Ary dia tsy nisy zavatra nampaninona intsony tao am-bilany.'
mg1865::mg_12::4::42:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy avy tany Bala-salisa nitondra mofo avy amin''ny voaloham-bokatra ho an''ny lehilahin''Andriamanitra, dia mofo vary hordea roa-polo sy salohim-bary maitso tao an-kitapo. Dia hoy Elisa: Omeo ny olona hohaniny ireny.'
mg1865::mg_12::4::43:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa ny mpanompony: Hataoko ahoana no fametraka ity eo anoloan''ny zato lahy? Ary hoy indray Elisa: Omeo ihany ny olona hohaniny; fa izao no lazain''i Jehovah: Hihinana izy, ary mbola hisy sisa tsy lany.'
mg1865::mg_12::4::44:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 4
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia narosony teo anoloany, ka dia nihinana izy, ary mbola nisy sisa tsy lany aza araka ny tenin''i Jehovah.'
mg1865::mg_12::5::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanasitranana an''i Namàna, sy ny nampijaliana an''i Gehazy noho ny ratsy nataony'
  verse_text: 'Ary Namàna, komandin''ny miaramilan''ny mpanjakan''i Syria, dia olona lehibe teo anatrehan''ny tompony sady nanan-kaja, satria izy no namonjen''i Jehovah an''i Syria; ary lehilahy mahery izy, nefa kosa boka.'
mg1865::mg_12::5::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Syriana nivoaka nanao an-tokony ka nitondra ny zazavavy kely anankiray babo avy tany amin''ny tanin''ny Isiraely; ary nanompo ny vadin''i Namana io.'
mg1865::mg_12::5::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy io tamin''ny tompovaviny: Enga anie ka mba ao amin''ny mpaminany izay any Samaria ny tompoko! dia hahasitrana azy amin''ny habokany izy.'
mg1865::mg_12::5::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra Namana ka nilaza tamin''ny tompony hoe: Izany ka izany no nolazain''ilay zazavavy izay avy tany amin''ny tanin''ny Isiraely.'
mg1865::mg_12::5::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''i Syria: Andeha ary mandeha, fa hampitondra taratasy ho any amin''ny mpanjakan''ny Isiraely aho. Dia lasa izy sady nitondra talenta volafotsy folo sy volamena enina arivo sekely ary akanjo im-polo miova teny an-tanany.'
mg1865::mg_12::5::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nitondra ny taratasy ho any amin''ny mpanjakan''ny Isiraely nanao hoe: Ary raha tonga aty aminao ity taratasy ity, dia ho fantatrao fa efa nampandeha an''i Namàna mpanompoko aho hankaty aminao, koa sitrano amin''ny habokany izy.'
mg1865::mg_12::5::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa novakin''ny mpanjakan''ny Isiraely ny taratasy, dia nandriatra ny fitafiany izy ka nanao hoe: Andriamanitra va aho ka hahafaty na hahavelona, no anirahan''ilehiny aty amiko mba hahasitrana olona amin''ny habokany? Koa masïna ianareo, fantaro sy izahao fa mila ady amiko mihitsy izy.'
mg1865::mg_12::5::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Elisa, lehilahin''Andriamanitra, fa nandriatra ny fitafiany ny mpanjakan''ny Isiraely, dia naniraka tany amin''ny mpanjaka izy ka nanao hoe: Nahoana no nandriatra ny fitafianao ianao? Aoka izy hankaty amiko, dia ho fantany fa misy mpaminany tokoa ao amin''ny Isiraely.'
mg1865::mg_12::5::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nandeha Namàna nitondra ny soavaliny sy ny kalesiny ka nijanona teo am-baravaran''ny tranon''i Elisa.'
mg1865::mg_12::5::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elisa naniraka olona tany aminy hilaza hoe: Mandehana, mandroa impito ao Jordana, dia hody aminao indray ny nofonao, ka hadio ianao.'
mg1865::mg_12::5::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tezitra Namàna, dia lasa ka nanao hoe: Indro, nataoko fa hivoaka hankaty amiko mihitsy izy ka hitsangana ary hiantso ny anaran''i Jehovah Andriamaniny sady hanevaheva ny tanany eo ambonin''ny aretina ka hahasitrana ny boka.'
mg1865::mg_12::5::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tsara noho ny ranon''ny Isiraely rehetra va Abana sy Farpara, onin''i Damaskosy? Tsy mahazo mandro ao amin''ireo va aho ka hadio? Dia nihodina izy ka lasa an-katezerana.'
mg1865::mg_12::5::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona ny mpanompony ka niteny taminy hoe: Ry ikaky o, na dia zavatra lehibe aza no nasain''ny mpaminany ho nataonao, moa tsy mba ho nataonao va izany? koa mainka va, raha hoy izy aminao: Mandroa, dia hadio ianao?'
mg1865::mg_12::5::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina izy ka nisitrika tao Jordana impito araka ny tenin''ny lehilahin''Andriamanitra: ary ny nofony dia tonga tahaka ny nofon-jazakely indray, ka nadio izy.'
mg1865::mg_12::5::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niverina nankao amin''ny lehilahin''Andriamanitra izy mbamin''ny izay rehetra nanaraka azy, dia tonga tao ary nitsangana teo anatrehany ka nanao hoe: Indro, fantatro fa tsy misy Andriamanitra amin''ny tany rehetra, afa-tsy ato amin''ny Isiraely ihany koa masìna ianao, raiso ny saotra aterin''ny mpanomponao.'
mg1865::mg_12::5::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Raha velona koa Jehovah, Izay itsanganako eo anatrehany, tsy handray mihitsy aho. Ary nanery azy handray izy; fa tsy nety Elisa.'
mg1865::mg_12::5::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Namana: Masïna ianao, moa tsy homena tany zakan''ny ampondra roa va izaho mpanomponao? fa ny mpanomponao tsy mba hanatitra fanatitra dorana na fanatitra hafa intsony ho an''ny andriamani-kafa, fa ho an''i Jehovah ihany.'
mg1865::mg_12::5::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny amin''izao zavatra izao dia aoka havelan''i Jehovah ny heloky ny mpanomponao: raha ny tompoko miditra ao an-tranon-dRimona hiankohoka ao ary mitehina amin''ny tanako, ka mba miankohoka ao an-tranon-dRimona aho, raha miankohoka ao aho, Jehovah anie hamela ny heloky ny mpanomponao amin''izany zavatra izany.'
mg1865::mg_12::5::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Mandehana soa aman-tsara. Ary dia niala taminy izy ka lasa lavidavitra*. [*Hebreo: kiba iray anaram-pandrefesana tokony ho maily iray]'
mg1865::mg_12::5::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Gehazy, zatovon''i Elisa, lehilahin''Andriamanitra: Indro, ny tompoko namela fotsiny ity Namàna Syriana* ity ka tsy nandray tamin''ny tanany izay zavatra nentiny, fa raha velona koa Jehovah, dia hihazakazaka hanaraka azy aho ka handray zavatra aminy. [*Hebreo: Aramiana]'
mg1865::mg_12::5::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia lasa Gehazy nanaraka an''i Namàna Ary nony tazan''i Namàna avy mihazakazaka manaraka azy izy, dia niala faingana tamin''ny kalesy hitsena azy izy ka nanao hoe: Tsara ihany va?'
mg1865::mg_12::5::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Tsara ihany; kanefa ny tompoko naniraka ahy hilaza hoe: Indro ankehitriny misy zatovo roa lahy amin''ny zanaky ny mpaminany tonga aty amiko avy any amin''ny tany havoan''i Efraima; koa masïna ianao, omeo talenta volafotsy sy fitafiana indroa miova izy.'
mg1865::mg_12::5::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Namàna: Aoka handray talenta roa ianao. Ary nanery azy izy sady namehy talenta volafotsy roa tao anaty kitapo roa mbamin''ny fitafiana indroa miova, ka nampitondrainy ny zatovony roa lahy izany; ary nitondra izany teo alohany ireo.'
mg1865::mg_12::5::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony tonga tao amin''ny havoana izy, dia nalainy teny an-tanany izany ka napetrany tao an-trano; dia nampandehaniny ireo, ka dia lasa izy.'
mg1865::mg_12::5::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Gehazy kosa niditra ka nitsangana teo anatrehan''ny tompony. Ary hoy Elisa taminy: Avy taiza ianao, ry Gehazy? Dia hoy izy: Tsy avy taiza tsy avy taiza ny mpanomponao.'
mg1865::mg_12::5::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Elisa taminy: Tsy niaraka taminao ihany va ny foko tamin''ilay nihodina niala tamin''ny kalesy hitsena anao ralehilahy? Moa andro fandraisam-bola, na fandraisana fitafiana, na tanin''oliva, na tanim-boaloboka, na ondry aman''osy, na omby, na ankizilahy, na ankizivavy va izao?'
mg1865::mg_12::5::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny habokan''i Namàna dia hiraikitra aminao sy ny taranakao mandrakizay. Ary niala teo anatrehany izy ka, indro, boka fotsy toy ny oram-panala.'
mg1865::mg_12::6::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampitsinkafonan''i Elisa ilay lela-famaky latsaka tany anaty rano'
  verse_text: 'Ary hoy ireo zanaky ny mpaminany tamin''i Elisa: Indro, tsy omby anay ny toerana izay itoeranay eto aminao.'
mg1865::mg_12::6::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, aoka hankany Jordana izahay, ka samy haka hazo iray avy any, dia hanao trano ho anay any mba hitoeranay. Ary hoy izy: mandehana ary ianareo.'
mg1865::mg_12::6::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny anankiray: Masïna ianao, aoka mba hiaraka amin''ny mpanomponao ho any koa ianao. Ary izy namaly hoe: Handeha ihany aho.'
mg1865::mg_12::6::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niaraka taminy izy. Ary nony tonga tany Jordana ireo, dia nikapa hazo.'
mg1865::mg_12::6::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nikapa hazo ny anankiray, dia latsaka tany anaty rano ny lela-famaky*; ka dia nitaraina hoe izy: Indrisy, tompoko, nindramina iny. [*Hebreo: ny vy]'
mg1865::mg_12::6::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny lehilahin''Andriamanitra: Taiza no nahalatsahany? Dia natorony azy izay nahalatsahany. Ary Elisa nanapaka hazo, ka natsipiny teo, dia nitsinkafona ilay lela-famaky.'
mg1865::mg_12::6::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Indro, raisonao izy. Dia narosony ny tanany, ka noraisiny.'
mg1865::mg_12::6::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny nataon''i Elisa hamonjena ny Isiraely tamin''izy niadian''ny Syriana'
  verse_text: 'Ary ny mpanjakan''i Syria niady tamin''ny Isiraely ka nilaza tamin''ny mpanompony hoe: Any Anonana no hitobiako.'
mg1865::mg_12::6::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay lehilahin''Andriamanitra kosa naniraka tany amin''ny mpanjakan''ny Isiraely nanao hoe: Tandremo fandrao mankany Ananona ianao; fa any no hidinan''ny Syriana.'
mg1865::mg_12::6::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely naniraka tany amin''izay nolazain''ny lehilahin''Andriamanitra taminy sy nananarany azy, ka nampiambina tany tsy indray mandeha, na indroa aza.'
mg1865::mg_12::6::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia sosotra indrindra ny fon''ny mpanjakan''i Syria noho izany zavatra izany; koa niantso ny mpanompony izy ary nanao taminy hoe: Tsy hambaranareo ahy va izay eto amintsika momba ny mpanjakan''ny Isiraely?'
mg1865::mg_12::6::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompony anankiray: Tsy misy, ry mpanjaka tompoko; fa Elisa mpaminany ao amin''ny Isiraely ihany no milaza amin''ny mpanjakan''ny Isiraely na dia izay teny lazainao ao amin''ny trano fandrianao aza.'
mg1865::mg_12::6::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Andeha, izahao izay itoerany mba hanirahako hisambotra azy. Ary nolazaina taminy hoe: Indro, ao Dotana izy.'
mg1865::mg_12::6::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nampandeha soavaly sy kalesy ary miaramila be ho any izy; ka tonga alina ireo ary nanodidina ny tanàna.'
mg1865::mg_12::6::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nifoha maraina koa ny zatovon''ny lehilahin''Andriamanitra ka nivoaka, dia, indreo, nisy miaramila sy soavaly ary kalesy manodidina ny tanàna. Dia hoy ilay zatovo taminy: Indrisy, tompoko! Ahoana no hataontsika?'
mg1865::mg_12::6::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa: Aza matahotra; fa ny momba antsika dia be noho ny momba azy.'
mg1865::mg_12::6::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elisa nivavaka hoe: Jehovah o, mifona aminao aho, ampahirato ny masony mba hahitany. Ary Jehovah nampahiratra ny mason''ilay zatovo; ary dia nahita izy, ka, indro, ny tendrombohitra feno soavaly sy kalesy afo manodidina an''i Elisa.'
mg1865::mg_12::6::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina nankany aminy ireo, ary Elisa nivavaka tamin''i Jehovah ka nanao hoe: Mifona aminao aho, ataovy manjambena ireto olona ireto. Ary dia nataony manjambena ireo araka ny tenin''i Elisa.'
mg1865::mg_12::6::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa taminy: Tsy ity no lalana, ary tsy ity no tanàna; fa manaraha ahy ianareo, dia hitondra anareo ho any amin''ny lehilahy tadiavinareo aho. Dia nentiny nankany Samaria ireo.'
mg1865::mg_12::6::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Samaria izy ireo, dia hoy Elisa: Jehovah o, ampahirato ny mason''ireto mba hahitany. Ary Jehovah nampahiratra ny masony, dia nahita izy; ka, indro, tao afovoan''i Samaria izy.'
mg1865::mg_12::6::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita azy ny mpanjakan''ny Isiraely, dia hoy izy tamin''i Elisa: Ry ikaky o, hasiako va izy? Hasiako va izy?'
mg1865::mg_12::6::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy namaly hoe: Aza asianao izy; moa asianao izay nobaboinao tamin''ny sabatrao sy ny tsipïkanao? Rosoy mofo sy rano eo anoloany mba hohaniny sy hosotroiny ary handehanany any amin''ny tompony.'
mg1865::mg_12::6::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao fanasana lehibe ho azy ny mpanjaka; ary rehefa nihinana sy nisotro ireo, dia nampandehaniny, ary dia nankany amin''ny tompony izy. Koa dia tsy nankany amin''ny tanin''ny Isiraely intsony ny mpitoha adin''i Syria.'
mg1865::mg_12::6::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nataon''i Elisa tamin''ny nisian''ny mosary mafy tany Samaria'
  verse_text: 'Ary rehefa afaka izany, Beni-hadada, mpanjakan''i Syria, namory ny miaramilany rehetra, dia niakatra ka nanao fahirano an''i Samaria.'
mg1865::mg_12::6::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy mosary mafy tany Samaria; fa indro, nanao fahirano azy ireo mandra-pahatongan''ny loham-boriky ho lafo sekely valo-polo sy ny taim-boromailala ampahefatry ny kaba ho sekely dimy.'
mg1865::mg_12::6::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitsangantsangana teny ambonin''ny manda ny mpanjakan''ny Isiraely, dia nisy vehivavy nitaraina taminy hoe: Vonjeo aho, ry mpanjaka tompoko.'
mg1865::mg_12::6::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Raha tsy vonjen''i Jehovah ianao, aiza no hamonjeko anao? Amin''ny famoloana va, sa amin''ny famiazam-boaloboka?'
mg1865::mg_12::6::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa ny mpanjaka taminy: Inona ary no alahelonao? Ary ravehivavy namaly hoe: Hoy ity vehivavy ity tamiko: Aiza ny zanakao hohanintsika anio, ary ny zanako kosa hohanintsika rahampitso.'
mg1865::mg_12::6::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nandrahoinay ny zanako ka nohaninay; ary nony ampitso, dia hoy izaho taminy: Aiza kosa ny zanakao mba hohanintsika? kanjo nafeniny ny zanany.'
mg1865::mg_12::6::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre ny tenin-dravehivavy ny mpanjaka, dia nandriatra ny fitafiany; ary nitsangantsangana teny ambonin''ny manda izy, ka hitan''ny olona fa, indro lamba fisaonana* no nataony manolo-koditra. [*Hebreo: lamba malailay]'
mg1865::mg_12::6::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Hataon''Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hotapahina anio ny lohan''i Elisa, zanak''i Safata.'
mg1865::mg_12::6::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Elisa nipetraka tao an-tranony, ary ny loholona nipetraka tao aminy; ary ny mpanjaka naniraka olona avy teo aminy; fa raha tsy mbola tonga tany amin''i Elisa iny iraka iny, dia hoy izy tamin''ny loholona: Hitanareo va ny nanirahan''ity zanaky ny mpamono olona ity hanapaka ny lohako? Izahao, ka raha avy ny iraka, dia arindrino ny varavarana, ary atoseho mafy hisakana azy; tsy eo aoriany koa va ny fingadongadon''ny tongotry ny tompony?'
mg1865::mg_12::6::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niresaka taminy izy, indro, nidina nankao aminy ny iraka ka nanao hoe: Indro, izao loza izao avy amin''i Jehovah; ka inona intsony no anantenako an''i Jehovah?'
mg1865::mg_12::7::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Elisa: Mihainoa ny tenin''i Jehovah ianareo: Izao no lazain''i Jehovah: Rahampitso toy izao dia ho sekely iray ny vidin''ny koba tsara toto eran''ny famarana*, ary ho sekely iray koa ny vidin''ny vary hordea indroan''ny famarana ao am-bavahadin''i Samaria. [*Hebreo: sea]'
mg1865::mg_12::7::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly ny lehilahin''Andriamanitra ilay mpanafika malaza izay nitehenan''ny mpanjaka tamin''ny tanany ka nanao hoe: Indro, na dia hanao varavarankely amin''ny lanitra aza Jehovah, dia hisy izany zavatra izany va? Ary hoy Elisa: Indro, ho hitan''ny masonao indrindra izany, nefa tsy mba hihinananao.'
mg1865::mg_12::7::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy boka efa-dahy teo anoloan''ny vavahady nifampiresaka hoe: Ahoana no ipetrahantsika foana eto mandra-pahafatintsika?'
mg1865::mg_12::7::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: '2022-03-25T17:30:37+0000'
  verse_title: null
  verse_text: 'Raha hoy isika: Hankato an-tanàna isika, dia misy mosary ao an-tanàna, ka ho faty ao isika; ary raha hipetraka eto isika, dia ho faty ihany koa. Koa andeha isika hankany amin''ny tobin''ny Syriana; ka raha mamelona antsika moa izy, dia ho velona isika; fa raha mamono antsika kosa izy, dia ho faty ihany isika.'
mg1865::mg_12::7::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga izy rehefa takariva hankany amin''ny tobin''ny Syriana; ary nony tonga teny an-tsisin''ny toby izy, indro, tsy nisy olona akory tao.'
mg1865::mg_12::7::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nampandre ny miaramilan''ny Syriana ny fikodiadian-kalesy sy ny fandehan''ny soavaly, dia ny firodondrodon''ny miaramila be; ary niresaka hoe izy: Injao, fa ny mpanjakan''ny Isiraely efa nanamby ny mpanjakan''ny Hetita sy ny mpanjakan''ny Egyptiana hiady amintsika.'
mg1865::mg_12::7::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga izy ka riatra nandositra tamin''iny takariva iny ihany, ary nilaozany fotsiny ny tobiny, dia ny lainy sy ny soavaliny ary ny borikiny, ka lasa nandositra hamonjy ny ainy izy.'
mg1865::mg_12::7::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teny an-tsisin''ny toby ireo boka ireo, dia niditra tao amin''ny lay anankiray izy ka nihinana sy nisotro, dia naka volafotsy sy volamena ary fitafiana, dia nandeha ka nanafina izany; ary nandeha indray izy ka niditra tao amin''ny lay anankiray koa sady naka avy tao, dia nandeha ka nanafina izany koa.'
mg1865::mg_12::7::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifampilaza hoe izy: Tsy mety izao ataontsika izao; ity andro ity dia andro filazana ny mahafaly, nefa mangina isika; raha hitoetra eto mandra-pahamarain''ny andro isika, dia hanan-keloka; fa andeha isika hilaza ao an-tranon''ny mpanjaka.'
mg1865::mg_12::7::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy izy ka niantso ny mpiambina ny vavahadin-tanàna ary nilaza taminy hoe: Tonga tany an-tobin''ny Syriana izahay, ary indro fa tsy misy olona ao, na feon''olona akory aza, fa soavaly mifatotra sy boriky mifatotra, ary ny lay nilaozana fotsiny.'
mg1865::mg_12::7::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso ny mpiambina ny vavahady izy, ary ireo kosa nilaza izany tao an-tranon''ny mpanjaka.'
mg1865::mg_12::7::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nifoha raha mbola alina ka niteny tamin''ny mpanompony hoe: Aoka hambarako aminareo ange izao ataon''ny Syriana amintsika izao e! Fantany fa mosarena isika, ka dia niala tamin''ny toby izy mba hanotrika any an-tsaha ka nanao hoe: Raha mivoaka avy any an-tanàna izy dia hataontsika sambo-belona, ary dia hidirantsika ny tanàna.'
mg1865::mg_12::7::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompony anankiray namaly hoe: Mifona aminao aho, aoka hangalana soavaly dimy amin''izay sisa ato an-tanàna (indro toy ny hamaroan''ny Isiraely rehetra izay mitoetra ato ireo; eny, tahaka ny hamaroan''ny Isiraely rehetra izay efa lany ritra ireo) ka haniraka hizaha izany.'
mg1865::mg_12::7::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalainy ny soavalin''ny kalesy roa; ary ny mpanjaka naniraka hanaraka ny miaramilan''ny Syriana ka nanao hoe: Mandehana, ka izahao.'
mg1865::mg_12::7::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha nanaraka azy hatrany Jordana ireo; ary, indreny, ny lalambe rehetra feno fitafiana sy fanaka izay efa narian''ny Syriana, raha nandositra tamin''ny fahatairana izy. Ary ny iraka niverina ka nilaza tamin''ny mpanjaka.'
mg1865::mg_12::7::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny olona ka namabo ny tobin''ny Syriana. Koa ny koba tsara toto eran''ny famarana, dia sekely iray monja no vidiny, ary ny vary hordea indroan''ny famarana, dia sekely iray ihany koa ny vidiny, araka ny tenin''i Jehovah.'
mg1865::mg_12::7::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay mpanafika malaza izay nitehenan''ny mpanjaka tamin''ny tanany dia notendreny hiambina ny vavahady; ary voahitsaka teo am-bavahady izy, ka dia maty araka izay nolazain''ny lehilahin''Andriamanitra, dia ilay nolazainy, raha nidina tany aminy ny mpanjaka.'
mg1865::mg_12::7::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tanteraka ilay teny nolazain''ny lehilahin''Andriamanitra tamin''ny mpanjaka hoe: Raha, maraina toy izao ao am-bavahadin''i Samaria dia sekely iray monja no ho vidin''ny vary hordea indroan''ny famarana, ary ho sekely iray ihany koa ny vidin''ny koba tsara toto eran''ny famarana;'
mg1865::mg_12::7::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka izany mpanafika malaza izany no namaly ilay lehilahin''Andriamanitra hoe: Indro, na dia hanao varavarankely amin''ny lanitra aza Jehovah, dia hisy izany zavatra izany va? Fa hoy Elisa: Indro, ho hitan''ny masonao indrindra izany, fa tsy mba hihinananao.'
mg1865::mg_12::7::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia toy izany no nanjo azy, fa ny olona nanitsaka azy teo am-bavahady, ka dia maty izy.'
mg1865::mg_12::8::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nahazoan''ilay vehivavy Sonemita ny tranony sy ny taniny'
  verse_text: 'Ary Elisa efa niteny tamin-dravehivavy, renin''ilay zaza maty novelominy, ka nanao hoe: Miaingà, ka mandehana ianao sy ny ankohonanao, ary mivahinia any amin''izay azonao hivahiniana; fa Jehovah efa niantso ny mosary, sady efa ho tonga izany ka haharitra fito taona amin''ny tany.'
mg1865::mg_12::8::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ravehivavy ka nanao araka ny tenin''ilay lehilahin''Andriamanitra; eny, lasa izy sy ny ankohonany ka nivahiny fito taona tany amin''ny tanin''ny Filistina.'
mg1865::mg_12::8::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka ny fito taona, dia nody avy tany amin''ny tanin''ny Filistina ravehivavy; ary lasa nitaraina tamin''ny mpanjaka izy ny amin''ny tranony sy ny taniny.'
mg1865::mg_12::8::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka niteny tamin''i Gehazy, zatovon''ny lehilahin''Andriamanitra, hoe: Masïna ianao, lazao amiko izay zava-dehibe rehetra nataon''i Elisa.'
mg1865::mg_12::8::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nilazalaza tamin''ny mpanjaka ny amin''ny nameloman''i Elisa ny maty izy dia, indro, ilay vehivavy renin''ny zaza maty novelominy, nitaraina tamin''ny mpanjaka ny amin''ny tranony sy ny taniny. Ary hoy Gehazy: Ry mpanjaka tompoko o, ity ilay vehivavy, ary io koa ilay zanany maty novelomin''i Elisa.'
mg1865::mg_12::8::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nanontanian''ny mpanjaka ravehivavy, dia nilaza. Ary dia notendren''ny mpanjaka ny tandapa anankiray ka nomeny teny hoe: Avereno izay azy rehetra, ary onero ny vokatry ny taniny rehetra hatramin''ny andro nialany tamin''ny tany ka mandraka ankehitriny.'
mg1865::mg_12::8::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Elisa tamin''i Hazaela ny handimbasany an''i Beni-hadada, mpanjakan''i Syria'
  verse_text: 'Ary Elisa tonga tany Damaskosy tamin''i Beni-hadada, mpanjakan''i Syria, narary; ary nisy nanambara taminy hoe: Indro, tonga aty ny lehilahin''Andriamanitra.'
mg1865::mg_12::8::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka tamin''i Hazaela: Mitondrà fanomezana eny an-tananao, ka mandehana, mitsenà ilay lehilahin''Andriamanitra, ary manontania izay tenin''i Jehovah aminy ka ataovy hoe: Ho sitrana ihany va aho amin''izao aretiko izao?'
mg1865::mg_12::8::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: '2022-12-11T07:12:54+0000'
  verse_title: null
  verse_text: 'Dia lasa Hazaela nitsena azy sady nitondra fanomezana tamin''izay zava-tsoa rehetra any Damaskôsy, dia entana entin-drameva efa-polo; ary tonga izy ka nitsangana teo anatrehany ary nanao hoe: Beni-hadada zanakao, mpanjakan''i Syria, no naniraka ahy ho aty aminao hanontany hoe: Ho sitrana ihany va aho amin''izao aretiko izao?'
mg1865::mg_12::8::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa taminy: Mandehana, ka lazao aminy hoe: Eny, ho sitrana tokoa ianao. Kanefa* Jehovah efa naneho ahy fa ho faty tokoa izy. [*Na: (Tsy ho sitrana ianao; fa)]'
mg1865::mg_12::8::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nibanjina azy mandra-pikaodikaodiny izy; ary dia nitomany ny lehilahin''Andriamanitra.'
mg1865::mg_12::8::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hazaela: Nahoana no mitomany ianao, tompoko? Ary izy namaly hoe: Satria fantatro izay ratsy hataonao amin''ny Zanak''Isiraely: ny fiarovany mafy hodoranao, ny zatovony hovonoinao amin''ny sabatra, ny zanany madinika hotorotoroinao, ary izay bevohoka eo aminy hotatahanao.'
mg1865::mg_12::8::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Hazaela: Fa zinona moa ny mpanomponao, dia ity alika ity, no dia hahavita izany zavatra lehibe izany? Fa Elisa namaly hoe: Efa nasehon''i Jehovah tamiko fa, indro, ianao ho mpanjakan''i Syria.'
mg1865::mg_12::8::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala tamin''i Elisa izy ka nankany amin''ny tompony; ary izy nanontany azy hoe: Ahoana no nolazain''i Elisa taminao? Dia namaly hoe izy: Nolazainy tamiko fa ho velona tokoa ianao.'
mg1865::mg_12::8::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso, dia nalain''i Hazaela ny lamba firakotra ka natsobony tamin''ny rano ary nasarony ny tavan''i Beni-hadada, ka dia maty izy; ary Hazaela no nanjaka nandimby azy.'
mg1865::mg_12::8::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Jehorama sy Ahazia tamin''ny Joda'
  verse_text: 'Ary tamin''ny taona fahadimy nanjakan''i Jorama, zanak''i Ahaba, mpanjakan''ny Isiraely, no vao nanjakan''i Jehorama, zanak''i Josafata, mpanjakan''ny Joda, tamin''ny nanjakan''i Josafata tany Joda.'
mg1865::mg_12::8::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby telo-polo taona izy, fony vao nanjaka, ary valo taona no nanjakany tany Jerosalema.'
mg1865::mg_12::8::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha tamin''ny lalan''ny mpanjakan''ny Isiraely izy, dia tahaka ny nataon''ny taranak''i Ahaba, fa ny zanakavavin''i Ahaba no vadiny, eny, nanao izay ratsy eo imason''i Jehovah izy.'
mg1865::mg_12::8::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jehovah tsy nety nandringana ny Joda noho ny amin''i Davida mpanompony, araka ilay nolazainy taminy fa homeny jiro mandrakizay ho an*''ny taranany. [*Na: izy sy]'
mg1865::mg_12::8::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny androny no niodinan''i Edoma ka tsy nanoa ny Joda, fa nanangana mpanjaka ho azy;'
mg1865::mg_12::8::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nankany Zaira Jehorama, ary ny kalesy rehetra nentiny hiaraka aminy; ary nanaovany latsak''alina ny Edomita, izay nanodidina azy, mbamin''ny komandin''ny kalesy; ary ny olona nandositra nody*. [*Hebreo: ho any an-dainy]'
mg1865::mg_12::8::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Edoma mbola niodina ka tsy nanoa ny Joda mandraka androany. Ary Libna koa dia niodina tamin''izany andro izany.'
mg1865::mg_12::8::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Jehorama sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va?'
mg1865::mg_12::8::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehorama lasa nodimandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-tanànan''i Davida; ary Ahazia zanany no nanjaka nandimby azy.'
mg1865::mg_12::8::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona faharoa ambin''ny folo nanjakan''i Jorama, zanak''i Ahaba, mpanjakan''ny Isiraely, no vao nanjakan''i Ahazia, zanak''i Jehorama, mpanjakan''ny Joda,'
mg1865::mg_12::8::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby roa-polo taona Ahazia, fony izy vao nanjaka, ary herintaona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Atalia, zanakavavin''i Omry, mpanjakan''ny Isiraely.'
mg1865::mg_12::8::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha tamin''ny lalan''ny taranak''i Ahaba izy, ka nanao izay ratsy eo imason''i Jehovah tahaka ny nataon''ny taranak''i Ahaba, fa vinanton''ny taranak''i Ahaba ihany izy.'
mg1865::mg_12::8::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''i Jorama, zanak''i Ahaba, izy mba hiady amin''i Hazaela, mpanjakan''i Syria, tany Ramota-gileada; ary ny Syriana nahavoa an''i Jorama.'
mg1865::mg_12::8::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina Jorama mpanjaka mba hotsaboina tao Jezirela amin''ny feriny tamin''ny nahavoazan''ny Syriana azy tao Rama, fony izy niady tamin''i Hazaela, mpanjakan''i Syria. Ary Ahazia, zanak''i Jehorama, mpanjakan''ny Joda, nidina hamangy an''i Jorama, zanak''i Ahaba, teo Jezirela, satria narary izy.'
mg1865::mg_12::9::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanosorana an''i Jeho ho mpanjaka, sy ny namonoan''i Jeho an''i Jorama sy Ahazia ary Jezebela'
  verse_text: 'Ary Elisa mpaminany niantso ny anankiray tamin''ny zanakalahin''ny mpaminany ka nanao taminy hoe: Misikina, dia ento eny an-tananao ity tavoara feno diloilo ity, ka mankanesa any Ramota-gileada;'
mg1865::mg_12::9::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa mby any ianao, dia izahao Jeho, zanak''i Josafata, zanak''i Nimsy, ary midira, ka manaingà azy hiala amin''ny namany, ary ento any amin''ny efi-trano anatiny izy;'
mg1865::mg_12::9::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raiso ny tavoara feno diloilo, ka aidino amin''ny lohany, dia lazao hoe: Izao no lazain''i Jehovah: Efa nanosotra anao ho mpanjakan''ny Isiraely Aho. Dia vohay ny varavarana, ka mandosira, fa aza mijanona.'
mg1865::mg_12::9::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha ilay zatovo, dia ilay zatovon''ny mpaminany*, nankany Ramota-gileada. [*Na: ilay zatovo mpaminany]'
mg1865::mg_12::9::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony mby tany izy, indreo, nipetraka teo ny mpifehy ny miaramila; ary hoy izy: Ry komandy o, mitondra teny ho aminao aho. Ary hoy Jeho: Amin''iza aminay ireto moa? Ary hoy izy: Aminao, ry komandy o.'
mg1865::mg_12::9::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana izy ka niditra tao an-trano, dia naidiny tamin''ny lohany ny diloilo; ary hoy izy taminy: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Efa nanosotra anao Aho ho mpanjakan''ny Isiraely oloko.'
mg1865::mg_12::9::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamely ny tamingan''i Ahaba tomponao ianao, mba hampanodiaviko an''i Jezebela ny ran''ny mpaminany mpanompoko sy ny ran''ny mpanompon''i Jehovah rehetra.'
mg1865::mg_12::9::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho fongotra ny taranak''i Ahaba rehetra; ary haringako avokoa ny lehilahy rehetra amin''ny tamingany, na ny voahazona na ny afaka eo amin''ny Isiraely;'
mg1865::mg_12::9::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Ahaba hataoko tahaka ny taranak''i Jeroboama, zanak''i Nebata, sy tahaka ny taranak''i Basa, zanak''i Ahia;'
mg1865::mg_12::9::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jezebela hohanin''ny alika ao amin''ny tany Jezirela, ka tsy hisy handevina azy. Dia namoha ny varavarana ilay zatovo ka lasa nandositra.'
mg1865::mg_12::9::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho nivoaka nankao amin''ny mpanompon''ny tompony ary nanontaniany hoe: Raharaha tsara ihany va? Inona no nalehan''iny ilay adala iny tao aminao? Ary hoy izy taminy: Ianareo mahalala ihany an-dralehilahy sy ny heviny.'
mg1865::mg_12::9::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ireo: Lainga foana izany; fa ambarao aminay. Dia hoy izy: Izao ka izao no nolazainy tamiko: Izao ny lazain''i Jehovah: Efa nanosotra anao ho mpanjakan''ny Isiraely Aho.'
mg1865::mg_12::9::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy nandray faingana ny lambany avy izy ireo ka namelatra azy hitoeran''i Jeho teo amin''ny ambaratonga, ary nitsoka ny anjomara izy niantso hoe: Jeho no mpanjaka.'
mg1865::mg_12::9::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho, zanak''i Josafata, zanak''i Nimsy, nikomy tamin''i Jorama (fa Jorama mbamin''ny Isiraely rehetra niaro an''i Ramota-gileada noho ny fananihan''i Hazaela, mpanjakan''i Syria, azy;'
mg1865::mg_12::9::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jorama mpanjaka efa niverina hotsaboina tao Jezirela amin''ny feriny tamin''ny nahavoazan''ny Syriana azy, fony izy niady tamin''i Hazaela, mpanjakan''i Syria), ka dia hoy Jeho; Raha izany ary no sitrakareo, aza avela hisy hiala eto an-tanàna handeha hilaza izany any Jezirela.'
mg1865::mg_12::9::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra teo amin''ny kalesy Jeho ka nankany Jezirela, fa tany no nitoeran''i Jorama. Ary Ahazia, mpanjakan''ny Joda, efa nidina hamangy an''i Jorama.'
mg1865::mg_12::9::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitily mitsangana teo an-tampon''ny tilikambo teo Jezirela ka nahatazana fa indrery olona betsaka tamy niaraka amin''i Jeho, ary hoy izy: Mahita olona betsaka aho. Ary hoy Jorama: Makà mpitaingin-tsoavaly, ka maniraha hitsena azy, ary asaovy manao hoe: Fihavanana va?'
mg1865::mg_12::9::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha ny mpitaingin-tsoavaly anankiray hitsena azy ka nanao taminy hoe: Izao no tenin''ny mpanjaka: Fihavanana va? Ary hoy Jeho: Ahoanao izay fihavanana? fa mankanesa ato aoriako ianao. Ary ny mpitily nilaza hoe: Ny iraka dia tonga teny aminy, nefa tsy niverina.'
mg1865::mg_12::9::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka mpitaingin-tsoavaly fanindroany Jorama, ary nony tonga teny koa izy, dia nanao hoe: Izao no tenin''ny mpanjaka: Fihavanana va? Ary Jeho namaly hoe: Ahoanao izay fihavanana? fa mankanesa ato aoriako ianao.'
mg1865::mg_12::9::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitily nilaza indray hoe: Tonga teny aminy koa iny, fa tsy niverina; ary ny fampiriotrany dia hoatra ny fampiriotran''i Jeho, zanak''i Nimsy; fa mampiriotra hoatra ny olona adala izy.'
mg1865::mg_12::9::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jorama: Ampiomany. Dia nampiomaniny ny kalesiny. Dia nivoaka Jorama, mpanjakan''ny Isiraely, sy Ahazia, mpanjakan''ny Joda, samy nitsangana teo amin''ny kalesiny avy ka nandeha hitsena an''i Jeho, ary nifanena taminy teo amin''ny tanin''i Nabota Jezirelita izy.'
mg1865::mg_12::9::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jorama, nony nahita an''i Jeho, dia nanao hoe: Fihavanana va. ry Jeho? Fa izy namaly hoe: Aiza no hisy fihavanana, raha mbola ao ihany ny fijangajangan''i Jezebela reninao sy ny fankatovana betsaka ataony?'
mg1865::mg_12::9::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jorama nampihodina ka nandositra sady niteny tamin''i Ahazia hoe: Misy fitaka, ry Ahazia.'
mg1865::mg_12::9::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nohenjanin''i Jeho mafy ny tsipïka teny an-tanany, dia nitifitra an''i Jorama izy ka nahavoa azy teo anelanelan''ny sorony, ary ny zana-tsipïka niboroaka tamin''ny fony, ka dia nampianjera azy tao anatin''ny kalesiny.'
mg1865::mg_12::9::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeho tamin''i Bidkara lefiny: Betao izy, ka atsipazo ao amin''ny sahan''i Nabota Jezirelita; fa tsarovy fa fony izaho sy ianao samy nitaingina kalesy nanaraka an''i Ahaba rainy, dia nolazain''i Jehovah fa hihatra aminy izao loza voalaza izao hoe:'
mg1865::mg_12::9::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitako tokoa omaly ny ran''i Nabota sy ny ran''ny zanany, hoy Jehovah, ary Izaho hamaly anao eto amin''ity tany ity, hoy Jehovah. Koa betao izy, ka atsipazo amin''io tany io araka ny tenin''i Jehovah.'
mg1865::mg_12::9::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Ahazia, mpanjakan''ny Joda, izany, dia nandositra tamin''ny lalana mankamin''ny trano ao anatin''ny saha izy. Ary Jeho nanaraka azy ka nanao hoe: Indry, asio koa iny; dia nasiany teo anatin''ny kalesiny teo amin''ny fiakarana ho any Gora, izay eo anilan''i Jibleama, izy. Ary nandositra nankany Megido Ahazia ka maty teo.'
mg1865::mg_12::9::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompony nitondra azy tamin''ny kalesiny ho any Jerosalema ka nandevina azy tao am-pasany ao amin''ny razany tao an-tanànan''i Davida.'
mg1865::mg_12::9::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahiraika ambin''ny folo nanjakan''i Jorama, zanak''i Ahaba, no vao nanjakan''i Ahazia tamin''ny tany Joda.'
mg1865::mg_12::9::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tany Jezirela Jeho; ary nony nandre izany Jezebela, dia nohosorany loko mainty* ny masony, sady noravahany ny lohany, dia nitsidika teo am-baravarankely izy. [*Hebreo: antimony]'
mg1865::mg_12::9::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niditra teo am-bavahady Jeho, dia hoy Jezebela: Fihavanana va, ry Zimry, mpamono tompo?'
mg1865::mg_12::9::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niandrandra ny varavaran-kely Jeho ka nanao hoe: Iza aminareo ireo no momba ahy? Iza? Ary nisy tandapa roa na telo teo nitsirika azy.'
mg1865::mg_12::9::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Azerao io vehivavy io. Dia nazerany izy; ka nisy nipitipitika tamin''ny rindrin-trano sy ny soavaly ny ràny; ka dia nohitsahin''i Jeho izy.'
mg1865::mg_12::9::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra tao an-trano Jeho ka nihinana sy nisotro, ary dia nilaza hoe: Mandehana, Izahao ilay vehivavy voaozona, ka aleveno, fa zanakavavin''ny mpanjaka izy.'
mg1865::mg_12::9::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia lasa ireo handevina azy; nefa tsy nisy tratrany teo afa-tsy ny karan-dohany sy ny tongony ary ny felatanany ihany.'
mg1865::mg_12::9::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niverina ireo ka nanambara taminy. Ary hoy Jeho: Araka ny tenin''i Jehovah izany, dia ilay nampilazainy an''i Elia Tisbita mpanompony hoe: Ao amin''ny tany Jezirela no hihinanan''ny alika ny nofon''i Jezebela,'
mg1865::mg_12::9::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatiny ho toy ny zezika any an-tsaha, ny amin''ny tany Jezirela, ka tsy hisy hahazo milaza hoe Jezebela ity.'
mg1865::mg_12::10::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namongorana ny taranak''i Ahaba sy ny rahalahin''i Ahazia ary ny mpaminanin''i Bala, sy ny nanjakan''i Jeho tamin''ny Isiraely'
  verse_text: 'Ary nisy zanak''i Ahaba fito-polo lahy tany Samaria. Ary Jeho nanoratra taratasy ka nampitondra iny ho any Samaria any amin''ny mpanapaka any Jezirela dia ho any amin''ny loholona sy ny mpitaiza ny zanak''i Ahaba nanao hoe:'
mg1865::mg_12::10::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga aty aminareo ity taratasy ity (fa ao aminareo ny zanakalahin''ny tomponareo, ary ao aminareo ny kalesy sy ny soavaly sy ny tanàna mimanda ary ny fiadiana),'
mg1865::mg_12::10::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izahao izay tsara sy mendrika indrindra amin''ny zanakalahin''ny tomponareo, ary apetraho amin''ny seza fiandrianan-drainy izy, ka miadia ary ho an''ny mpianakavin''ny tomponareo.'
mg1865::mg_12::10::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raikitahotra indrindra ireo ka nifampilaza hoe: Indro ny mpanjaka roa aza tsy nahajanona teo anatrehany, ka hataontsika ahoana no fahajanona?'
mg1865::mg_12::10::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehiben''ny tandapa sy ny mpanapaka ny tanana ary ny loholona koa sy ireo mpitaiza naniraka tany amin''i Jeho nanao hoe: Mpanomponao izahay, koa izay rehetra andidianao anay dia hataonay; tsy hanangana andriana izahay, fa izay sitraky ny fonao ihany no ataovy.'
mg1865::mg_12::10::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanoratra taratasy taminy indray Jeho nanao hoe : Raha ahy ary ianareo ka hankatò ny teniko, dia tapaho ny lohan''ireo zanakalahin''ny tomponareo, ary mankanesa aty amiko aty Jezirela rahampitso toy izao. Ary izy fito-polo lahy zanaky ny mpanjaka dia tao amin''ireo lehiben''ny tanàna, mpitaiza azy.'
mg1865::mg_12::10::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa tonga tany amin''ireo ny taratasy, dia naka ny zanakalahin''ny mpanjaka izy ka namono azy fito-polo lahy, ary nataony tao an-tsobiky ny lohany ka nateriny tany amin''i Jeho tany Jezirela.'
mg1865::mg_12::10::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga ny iraka ka nanambara taminy hoe: Indro, efa nitondra ny lohan''ny zanakalahin''ny mpanjaka izy. Ary hoy Jeho: Ampifanongoavy ho roa toko eo anoloan''ny vavahady mandra-pahamarain''ny andro.'
mg1865::mg_12::10::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, dia nivoaka Jeho ary nitsangana ka nanao tamin''ny vahoaka rehetra hoe: Marina ianareo, indro, izaho nikomy tamin''ny tompoko ka nahafaty azy; fa iza kosa no nahafaty ireto rehetra ireto?'
mg1865::mg_12::10::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fantatrareo ary fa tsy hisy raraka an-tany ny tenin''i Jehovah izay nolazainy ny amin''ny taranak''i Ahaba; fa Jehovah efa nanao izay nampilazainy an''i Elia mpanompony.'
mg1865::mg_12::10::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia novonoin''i Jeho izay sisa rehetra tamin''ny taranak''i Ahaba tao Jezirela sy ny olom-baventy rehetra tao aminy mbamin''ny havany ary ny mpisorony koa, ambara-paha-tsy hisy miangana na dia iray akory aza.'
mg1865::mg_12::10::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga izy ka nankany Samaria. Ary nony mby tany an-trano fivorian*''ny mpiandry ondry tany an-dàlana Jeho, [*Na: Bet-ekda]'
mg1865::mg_12::10::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nifanena amin''ny rahalahin''i Ahazia, mpanjakan''ny Joda, izy ka nanao hoe: Iza ange ianareo? Ary izy ireo namaly hoe: Rahalahin''i Ahazia izahay ary midìna mba hamangy ny zanakalahin''ny mpanjaka sy ny zanakalahin''ny andriambavy.'
mg1865::mg_12::10::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeho: Sambory velona ireo. Dia nosamboriny ka novonoiny teo akaikin''ny lavaka famorian-drano tao an-trano fivoriana izy roa amby efa-polo lahy ireo, ary tsy nasiany miangana na dia iray akory aza.'
mg1865::mg_12::10::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niala teo Jeho, dia nahita an''i Jonadaba, zanakalahin''i Rekaba, avy manatona azy; dia niarahaba azy izy ary nanao taminy hoe: Marina va ny fonao tahaka ny foko amin''ny fonao? Ary Jonadaba namaly hoe: Eny. Raha izany ary no izy, hoy Jeho, dia aoka isika hifandray tanana. Dia natolony ny tanany, ka nampiakarin''i Jeho ho eo aminy teo anatin''ny kalesy izy.'
mg1865::mg_12::10::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeho: Andeha hiaraka amiko, ka izahao ny zotom-poko ho an''i Jehovah. Dia nentina teo amin''ny kalesy izy.'
mg1865::mg_12::10::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Samaria Jeho, dia namono izay sisa rehetra tamin''ny tamingan''i Ahaba tany Samaria mandra-paharingany, araka ny tenin''i Jehovah izay nolazainy tamin''i Elia.'
mg1865::mg_12::10::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho namory ny vahoaka rehetra ka nanao taminy hoe: Ahaba nanompo an''i Bala kelikely ihany, fa Jeho no hanompo azy fatratra.'
mg1865::mg_12::10::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny vorio ho aty amiko ny mpaminanin''i Bala rehetra, ny mpanompony rehetra sy ny mpisorony rehetra; aza avela hisy tsy ho tonga na dia iray akory aza; fa hamono zavatra betsaka ho fanatitra ho an''i Bala aho; koa na iza na iza tsy ho tonga, dia tsy hovelomina izy. Kanjo Jeho nanao izany ho fihendrena handringanany ny mpanompon''i Bala.'
mg1865::mg_12::10::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeho: Manendre* fivoriana masina ho an''i Bala. Koa dia nanendry* andro izy. [*Hebreo: Manamasina, Hebreo: nanamasina]'
mg1865::mg_12::10::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho naniraka tany amin''ny Isiraely rehetra, ary dia tonga ny mpanompon''i Bala rehetra, ka tsy nisy lehilahy tsy tonga teo na dia iray akory aza. Ary dia niditra tao an-tranon''i Bala ireo, ka feno hika ny trano.'
mg1865::mg_12::10::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jeho tamin''ny mpitahiry ny fitafiana: Amoahy fitafiana ny mpanompon''i Bala rehetra. Ary dia namoaka ny fitafiana ho azy izy.'
mg1865::mg_12::10::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho sy Jonadaba, zanak''i Rekaba, nankao an-tranon''i Bala ka niteny tamin''ny mpanompon''i Bala hoe: Fantaro tsara sy izahao, fandrao misy mpanompon''i Jehovah eto aminareo, fa tsy ny mpanompon''i Bala ihany.'
mg1865::mg_12::10::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niditra hanatitra fanatitra dorana sy fanatitra hafa alatsa-drà izy, Jeho kosa dia nametraka valo-polo lahy teo ala-trano ka nanao hoe; Raha misy afa-mandositra ny olona izay nentiko ho eto an-tananareo, izay mamela azy handeha, dia ny ainy no hisolo ny ainy.'
mg1865::mg_12::10::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita ny nanaterany ny fanatitra dorana, dia hoy Jeho tamin''ny mpiambina sy ny mpanafika malaza: Midira, ka vonoy, ary aza avela hisy ho tafavoaka. Dia namely azy tamin''ny lelan-tsabatra izy; ary ny mpiambina sy ny mpanafika malaza dia nanary ny faty ary niditra tao amin''ny tanàna nisy ny tranon''i Bala.'
mg1865::mg_12::10::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namoaka ny orin-kazo izay tao an-tranon''i Bala izy ka nandoro ireny.'
mg1865::mg_12::10::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrava ny tsangam-baton''i Bala sy ny tranony izy, ary dia nataony trano fivoahana mandraka androany izany.'
mg1865::mg_12::10::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nandravan''i Jeho an''i Bala tsy ho amin''ny Isiraely.'
mg1865::mg_12::10::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jeho tsy dia niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely, dia tamin''ireo ombilahy kely volamena izay tao Betela sy Dana.'
mg1865::mg_12::10::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Jeho: Satria efa nanao soa ianao tamin''ny nanaovanao izay mahitsy eo imasoko sady efa nataonao tamin''ny taranak''i Ahaba araka izay rehetra tao am-poko, koa dia hitoetra amin''ny seza fiandrianan''ny Isiraely ny taranakao hatramin''ny zafindohalika.'
mg1865::mg_12::10::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jeho tsy nitandrina handeha amin''ny lalàn''i Jehovah, Andriamanitry ny Isiraely, amin''ny fony rehetra; fa tsy niala tamin''ny fahotan''i Jeroboama izay nampanotany ny Isiraely izy.'
mg1865::mg_12::10::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no niantombohan''ny nanakelezan''i Jehovah ny Isiraely; fa Hazaela namely azy tamin''ny sisin-tanin''ny Isiraely rehetra'
mg1865::mg_12::10::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatrany Jordana no ho miantsinanana, dia ny tany Gileada rehetra, ny Gadita sy ny Robenita ary ny Manasita, hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, dia Gileada sy Basana.'
mg1865::mg_12::10::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Jeho sisa mbamin''izay rehetra nataony ary ny heriny rehetra, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::10::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho lasa nodi-mandry any amin''ny razany, dia nalevina tao Samaria izy. Ary Joahaza zanany no nanjaka nandimby azy.'
mg1865::mg_12::10::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro izay nanjakan''i Jeho tamin''ny Isiraely tao Samaria dia valo amby roa-polo taona.'
mg1865::mg_12::11::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Atalia, sy ny namonoana azy, ary ny nampanjakana an''i Joasy handimby azy'
  verse_text: 'Ary nony hitan''i Atalia, renin''i Ahazia, fa maty ny zanany dia nitsangana izy ka nandringana ny zanak''andriana rehetra.'
mg1865::mg_12::11::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joseba. zanakavavin''i Jehorama mpanjaka ary anabavin''i Ahazia, dia naka an''i Joasy, zanak''i Ahazia, ka namonjy azy mbamin''ny mpitaiza azy avy teo amin''ny zanaky ny mpanjaka izay novonoina ho ao an-trano fitehirizam-pandriana ary nafeniny an''i Atalia izy, ka dia tsy mba voavono.'
mg1865::mg_12::11::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niery enin-taona tao aminy tao an-tranon''i Jehovah izy. Ary Atalia no nanjaka tamin''ny tany.'
mg1865::mg_12::11::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahafito Joiada naniraka haka ny kapiteny, mpifehy ny anjolofo* sy ny mpiambina, dia nampiditra azy tao an-tranon''i Jehovah ary nampanaiky sy nampianiana azy tao an-tranon''i Jehovah, ka nasehony azy ny zanakalahin''ny mpanjaka. [*Hebreo: Kariana]'
mg1865::mg_12::11::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nandidy azy hoe: Izao no hataonareo: Ny ampahatelony izay milatsaka amin''ny Sabata dia hiambina ny tranon''ny mpanjaka;'
mg1865::mg_12::11::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny ampahatelony ho eo am-bavahady Sora; ary ny ampahatelony ho ao am-bavahady ivohon''ny mpiambina, dia hiambina ny trano ianareo ka hiaro azy.'
mg1865::mg_12::11::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny roa toko aminareo kosa, dia izay rehetra miala amin''ny andro Sabata, dia hiambina ny tranon''i Jehovah hiarovana ny mpanjaka.'
mg1865::mg_12::11::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanemitra manodidina ny mpanjaka ianareo, samy mitana ny fiadiany avy; ka na iza na iza mamaky laharana dia vonoy, ary arahonareo ny mpanjaka, na mivoaka na miditra izy.'
mg1865::mg_12::11::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapiteny dia nanao araka izay rehetra nandidian''i Joiada mpisorona, ka samy nitondra ny olom-peheziny izay nilatsaka tamin''ny Sabata sy izay niala tamin''ny Sabata ary nankany amin''i Joiada mpisorona.'
mg1865::mg_12::11::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapiteny nomen''ilay mpisorona ny lefona sy ampingan''i Davida mpanjaka izay tao an-tranon''i Jehovah.'
mg1865::mg_12::11::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiambina nitsangana, ka samy nitana ny fiadiany avy hanodidina ny mpanjaka hatramin''ny lafiny ankavanan''ny trano ka hatramin''ny lafiny ankavia, hatramin''ny alitara ka hatramin''ny trano.'
mg1865::mg_12::11::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentin''i Joiada nivoaka ny zanakalahin''ny mpanjaka ka nosatrohany ny satro-boninahitra izy, dia notolorany ny Vavolombelona*; ka dia nampanjakainy sy nohosorany izy, ary ny olona nitehaka ka niantso hoe: Ho ela velona anie ny mpanjaka! [*Dia ny Didy Folo]'
mg1865::mg_12::11::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Atalia ny tabataban''ny mpiambina sy ny vahoaka, dia mba nankao amin''ny vahoaka tao amin''ny tranon''i Jehovah izy.'
mg1865::mg_12::11::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitany fa, indro, ny mpanjaka nitsangana teo amin''ny fitoeran''andriana toy ny fanao, ary ny andrian-dahy sy ny mpitsoka trompetra dia teo anilan''ny mpanjaka; ary ny vahoaka rehetra nifaly sady nampaneno ny trompetra; dia nandriatra ny fitafiany Atalia ka niantso hoe: Fikomiana! fikomiana!'
mg1865::mg_12::11::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joiada mpisorona nandidy ny kapiteny, mpifehy ny miaramila, ka nanao taminy hoe: Avoahy eny ivelan''ny laharana izy, ary izay manaraka azy dia vonoy amin''ny sabatra. Fa ny mpisorona efa nandrara hoe Aza vonoina ao an-tranon''i Jehovah izy.'
mg1865::mg_12::11::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona nisava teo an-daniny roa, dia nandeha tamin''ny lalana fandehanan''ny soavaly ho any an-tranon''ny mpanjaka ravehivavy; dia novonoiny tao izy.'
mg1865::mg_12::11::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joiada nampanao fanekena ny mpanjaka sy ny vahoaka tamin''i Jehovah, mba ho olon''i Jehovah izy, ary nampifanaiky ny mpanjaka sy ny vahoaka koa.'
mg1865::mg_12::11::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra niditra tao an-tranon''i Bala ka nandrava azy; ny alitara sy ny endri-javatra teo aminy dia notorotoroiny avokoa, ary Matana, mpisoron''i Bala, novonoiny teo anoloan''ny alitara. Ary ny mpisorona nanendry ny ho mpitandrina ny tranon''i Jehovah.'
mg1865::mg_12::11::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainy ny kapiteny sy ny anjolofo sy ny mpiambina mbamin''ny vahoaka rehetra ary nentina nidina avy tao an-tranon''i Jehovah ny mpanjaka, ka teo am-bavahadin''ny mpiambina no nalehany hankao an-tranon''ny mpanjaka. Ary nipetraka tamin''ny seza fiandrianan''ny mpanjaka izy.'
mg1865::mg_12::11::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifaly ny vahoaka rehetra, ary nandry fahizay ny tanàna Ary Atalia novonoiny tamin''ny sabatra tao an-tranon''ny mpanjaka.'
mg1865::mg_12::12::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Joasy tamin''ny Joda, sy ny nanamboarana ny rafitry ny tempoly'
  verse_text: 'Fito taona Joasy fony izy vao nanjaka:'
mg1865::mg_12::12::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahafito nanjakan''i Jeho no vao nanjaka izy; ary efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Zibia, avy any Beri-sheba.'
mg1865::mg_12::12::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joasy nanao izay mahitsy eo imason''i Jehovah tamin''ny androny rehetra izay nanoloran''i Joiada mpisorona saina azy.'
mg1865::mg_12::12::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa kosa ny fitoerana avo tsy mba noravana; ary ny olona mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teo amin''ny fitoerana avo ihany.'
mg1865::mg_12::12::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Joasy tamin''ny mpisorona: Ny vola amin''ny zava-masina rehetra izay nampidirina tao an-tranon''i Jehovah, dia ny volan''ny olona voaisa sy ny vola rehetra izay azo tamin''ny tomban''olona ary ny vola rehetra Izay nentin''ny isan-olona an-tsitrapo ho ao an-tranon''i Jehovah,'
mg1865::mg_12::12::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'aoka horaisin''ny mpisorona amin''ny olom-pantany avy izany ka hanamboarany ny simba amin''ny trano, na amin''inona na amin''inona no hitany misy simba.'
mg1865::mg_12::12::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo hatramin''ny fahatelo amby roa-polo taona nanjakan''i Joasy mpanjaka dia tsy mbola voavoatry ny mpisorona ihany ny simba tamin''ny trano.'
mg1865::mg_12::12::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niantso an''i Joiada mpisorona sy ny mpisorona sasany koa Joasy mpanjaka ka nanao taminy hoe: Nahoana ianareo no tsy nanamboatra ny simba amin''ny trano? Koa ankehitriny, aza mandray vola amin''ny olom-pantatrareo intsony ianareo, fa omeo hanamboarana ny simba amin''ny trano ny vola.'
mg1865::mg_12::12::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona nanaiky tsy handray vola amin''ny olona intsony sady tsy hanamboatra ny simba amin''ny trano.'
mg1865::mg_12::12::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joiada mpisorona naka vata anankiray, dia noloahany ny rakony, ary napetrany teo anilan''ny alitara tamin''ny sisiny ankavanana eo am-pidirana amin''ny tranon''i Jehovah; dia nalatsaky ny mpisorona, mpiandry varavarana, tao ny vola rehetra izay nampidirina ho ao an-tranon''i Jehovah.'
mg1865::mg_12::12::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitany fa be ny vola tao am-bata, dia niakatra ny mpanoratry ny mpanjaka sy ny mpisoronabe, ka nofonosiny ny vola izay hita tao an-tranon''i Jehovah sady nisainy.'
mg1865::mg_12::12::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vola voalanja dia natolotr''ireo ho eo an-tanan''ny mpiraharaha, dia izay voatendry ny amin''ny tranon''i Jehovah; ary ireo kosa namoaka azy ho amin''ny mpandrafitra sy ny mpanao trano izay nanamboatra ny tranon''i Jehovah'
mg1865::mg_12::12::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ho amin''ny mpandatsa-bato sy ny mpipaika, ary hamidy hazo sy vato voapaika hanamboarana ny simba amin''ny tranon''i Jehovah sy holanina amin''izay rehetra hanamboarana azy.'
mg1865::mg_12::12::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nisy lovia volafotsy, na antsy, na lovia famafazana, na trompetra, na izay fanaka volamena sy volafotsy na inona na inona, natao ho amin''ny tranon''i Jehovah tamin''ny volafotsy nampidirina tao;'
mg1865::mg_12::12::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nomeny ny mpiasa izany ka nentin''ireo nanamboatra ny tranon''i Jehovah.'
mg1865::mg_12::12::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nampamoahiny ny olona izay notolorany ny vola homena ny mpiasa, fa nahatoky ireo.'
mg1865::mg_12::12::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vola natao fanati-panonerana sy fanatitra noho ny ota dia tsy mba nampidirina tao an-tranon''i Jehovah, fa an''ny mpisorona kosa izany.'
mg1865::mg_12::12::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia niakatra Hazaela, mpanjakan''i Syria, ary namely an''i Gata ka nahafaka azy; ary nizotra niakatra hamely an''i Jerosalema koa izy.'
mg1865::mg_12::12::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joasy, mpanjakan''ny Joda, naka ny zavatra rehetra izay nohamasinin''ny mpanjakan''ny Joda razany, dia Josafata sy Jehorama sy Ahazia, mbamin''ny zavatra nohamasinin''ny tenany koa sy ny volamena rehetra hita tamin''ny rakitra, na ny tao an-tranon''i Jehovah, na ny tao an-tranon''ny mpanjaka, ary nampitondrainy ho any amin''i Hazaela, mpanjakan''i Syria, izany; ka dia niverina tsy nankany Jerosalema Hazaela.'
mg1865::mg_12::12::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Joasy sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::12::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana ny mpanompon''i Joasy ka niodina taminy, dia namono azy tao an-trano Milo*, ao am-pidinana mankany Sila. [*Hebreo: fiarovana]'
mg1865::mg_12::12::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jozakara, zanak''i Simata, sy Jozabada, zanak''i Somera mpanompony namely azy ho faty; dia nalevina tao amin''ny razany tao an-tanànan''i Davida izy; ary Amazia zanany no nanjaka nandimby azy.'
mg1865::mg_12::13::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Joahaza sy Joasy zanany tamin''ny Isiraely, ary ny nahafatesan''i Elisa'
  verse_text: 'Tamin''ny taona fahatelo amby roa-polo nanjakan''i Joasy, zanak''i Ahazia, mpanjakan''ny Joda, no vao nanjakan''i Joahaza, zanak''i Jeho, tamin''ny Isiraely tany Samaria, ary nanjaka fito ambin''ny folo taona izy.'
mg1865::mg_12::13::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa nanaraka ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely; tsy niala tamin''izany izy.'
mg1865::mg_12::13::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahatezeran''i Jehovah nirehitra tamin''ny Isiraely, ka dia natolony teo an-tanan''i Hazaela, mpanjakan''i Syria, sy teo an-tanan''i Beni-hadada, zanak''i Hazaela, mandrakariva izy.'
mg1865::mg_12::13::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joahaza nifona tamin''i Jehovah, dia nohenoin''i Jehovah izy, satria hitany ny fahorian''ny Isiraely, fa nampahory azy ny mpanjakan''i Syria.'
mg1865::mg_12::13::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanome mpamonjy ho amin''ny Isiraely, ka dia afaka tamin''ny tanan''ny Syriana izy; ary nandry fahizay toy ny teo aloha ny Zanak''Isiraely.'
mg1865::mg_12::13::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy niala tamin''ny fahotan''ny taranak''i Jeroboama, izay nampanotany ny Isiraely, izy, fa nandeha tamin''izany ihany, ary na dia ilay Aseraha* aza dia mbola tao Samaria ihany. [*Anaran''andriamani-tsy izy, na ny sariny]'
mg1865::mg_12::13::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy sisa navelan''i Jehovah ho an''i Joahaza, afa-tsy mpitaingin-tsoavaly dimam-polo sy kalesy folo ary miaramila an-tongotra iray alina; fa ny mpanjakan''i Syria efa nandringana azy ka nanao azy ho toy ny vovoka hitsakitsahina.'
mg1865::mg_12::13::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Joahaza sisa mbamin''izay rehetra nataony ary ny heriny, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::13::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joahaza lasa nodi-mandry any amin''ny razany, dia nalevina tao Samaria izy; ary Joasy zanany no nanjaka nandimby azy.'
mg1865::mg_12::13::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahafito amby telo-polo nanjakan''i Joasy, mpanjakan''ny Joda, no vao nanjakan''i Joasy, zanak''i Joahaza, tamin''ny Isiraely tany Samaria, ary nanjaka enina ambin''ny folo taona izy.'
mg1865::mg_12::13::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy; fa tsy niala tamin''ny fahotana rehetra izay nataon''i Jeroboama, zanak''i Nebata, sady nampanotany ny Isiraely; fa nandeha tamin''izany ihany izy.'
mg1865::mg_12::13::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Joasy sisa mbamin''izay rehetra nataony sy ny heriny niadiany tamin''i Amazia, mpanjakan''ny Joda, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::13::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joasy lasa nodi-mandry any amin''ny razany, ary Jeroboama nipetraka tamin''ny seza fiandrianany; ary Joasy dia nalevina tany Samaria tao amin''ny mpanjakan''ny Isiraely.'
mg1865::mg_12::13::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elisa dia nararin''ny aretina izay hahafaty azy. Ary Joasy, mpanjakan''ny Isiraely, nidina nankany aminy ka niondrika nitomany teo ambonin''ny tavan''i Elisa ka nanao hoe: Ry ikaky o, ry ikaky o, ny kalesin''ny Isiraely sy ny mpitaingin-tsoavaliny!'
mg1865::mg_12::13::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elisa taminy: Makà tsipïka sy zana-tsipïka. Ary dia naka tsipïka sy zana-tsipïka izy.'
mg1865::mg_12::13::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny mpanjakan''ny Isiraely: Henjano ny tsipïka. Dia nohenjaniny; ary Elisa nametraka ny tanany teo amin''ny tanan''ny mpanjaka.'
mg1865::mg_12::13::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Vohay ny varavarankely atsinanana. Ary dia novohany. Dia hoy Elisa: Alefao. Ka dia nalefany. Ary hoy izy: Zana-tsipïkan''ny famonjen''i Jehovah, dia zana-tsipïkan''ny famonjena hahavoa ny Syriana! fa hamely ny Syriana ao Afeka ianao mandra-pandringanao azy.'
mg1865::mg_12::13::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy: Raiso ny zana-tsipïka. Dia noraisiny. Ary hoy izy tamin''ny mpanjakan''ny Isiraely: Kapohy ny tany. Ary nokapohiny intelo, dia nitsahatra izy.'
mg1865::mg_12::13::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay lehilahin''Andriamanitra dia tezitra taminy ka nanao hoe: Tokony ho nikapoka indimy na inenina ianao, dia ho nasianao ny Syriana mandra-pandringanao azy; fa izao dia intelo ihany no hamelezanao ny Syriana.'
mg1865::mg_12::13::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia maty Elisa ka nalevina. Ary ny mpitoha adin''ny Moabita nananika ny tany amin''ny fitsingerenan''ny taona.'
mg1865::mg_12::13::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nandevina olona, dia, indro, nahita ireo mpitoha ady izy, ka dia natsipiny tao am-pasan''i Elisa ny faty; ary raha vao nitehika tamin''ny taolan''i Elisa ny fatin-dralehilahy, dia velona izy ka nijoro tamin''ny tongony.'
mg1865::mg_12::13::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hazaela, mpanjakan''i Syria, nampahory ny Isiraely tamin''ny andro rehetra nanjakan''i Joahaza.'
mg1865::mg_12::13::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah namindra fo taminy sy niantra azy ary nitsinjo azy noho ny fanekeny tamin''i Abrahama sy Isaka ary Jakoba, ka tsy ta-handringana azy na hanaisotra azy tsy ho eo anatrehany mandraka ankehitriny.'
mg1865::mg_12::13::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty Hazaela, mpanjakan''i Syria; ary Beni-hadada zanany no nanjaka nandimby azy.'
mg1865::mg_12::13::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joasy, zanak''i Joahaza, naka indray teo an-tanan''i Beni-hadada, zanak''i Hazaela, ny tanàna izay efa nalain''i Hazaela teo an-tanan''i Joahaza, rain''i Joasy, tamin''ny ady. Intelo no nandresen''i Joasy azy, ka dia azony indray ny tanànan''ny Isiraely.'
mg1865::mg_12::14::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Amazia tamin''ny Joda'
  verse_text: 'Tamin''ny taona faharoa nanjakan''i Joasy, zanak''i Joahaza, mpanjakan''ny Isiraely, no vao nanjakan''i Amazia, zanak''i Joasy, mpanjakan''ny Joda.'
mg1865::mg_12::14::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary sivy amby roa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Joadana, avy any Jerosalema.'
mg1865::mg_12::14::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy, nefa tsy dia tahaka an''i Davida rainy; fa tahaka izay rehetra nataon''i Joasy rainy ihany no nataony.'
mg1865::mg_12::14::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny fitoerana avo tsy mba noravana; fa mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany ny olona.'
mg1865::mg_12::14::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafapetraka tsara teo an-tanany ny fanjakany, dia novonoiny ireo mpanompony izay namono ny mpanjaka rainy.'
mg1865::mg_12::14::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zanak''ireo namono kosa dia tsy mba novonoiny, fa nataony araka izay voasoratra ao amin''ny bokin''ny lalàn''i Mosesy, izay nandidian''i Jehovah hoe: Ny ray tsy hatao maty amin''ny ataon''ny zanany, ary ny zanaka tsy hatao maty amin''ny ataon''ny rainy; fa samy hatao maty amin''ny fahotany avy ny olona.'
mg1865::mg_12::14::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nahafaty ny Edomita iray alina tao amin''ny Lohasahan-tsira sady nahafaka an''i Sela tamin''ny ady ary nanao azy hoe Joktela, izay mbola anarany mandraka androany.'
mg1865::mg_12::14::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany Amazia dia naniraka olona tany amin''i Joasy, zanak''i Joahaza, zanak''i Jeho, mpanjakan''ny Isiraely, nanao hoe: Avia, aoka isika hihaona.'
mg1865::mg_12::14::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joasy mpanjakan''ny Isiraely, naniraka tany amin''i Amazia, mpanjakan''ny Joda, nanao hoe: Ny tsilo izay tany Libanona naniraka tamin''ny hazo sedera izay tany Libanona nanao hoe: Omeo ny zanako-lahy ny zanakao-vavy ho vadiny; ary dia namaky teo ny bibi-dia tany Libanona ka nanosihosy ny tsilo.'
mg1865::mg_12::14::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa namely an''i Edoma tokoa ianao, ka dia nirehareha ny fonao; aoka hahafa-po anao ary izany voninahitra izany, ka mitoera ao an-tranonao ihany; fa nahoana no hihaika ny loza hahalavo ny tenanao mbamin''ny Joda koa ianao?'
mg1865::mg_12::14::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nanaiky Amazia. Koa dia niakatra Joasy, mpanjakan''ny Isiraely; ary izy sy Amazia, mpanjakan''ny Joda, nihaona tany Beti-semesy izay any Joda.'
mg1865::mg_12::14::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia resy teo anoloan''ny Isiraely ny Joda, ka samy nandositra ho any amin''ny lainy avy izy.'
mg1865::mg_12::14::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amazia, mpanjakan''ny Joda, zanak''i Joasy, zanak''i Ahazia, nosamborin''i Joasy, mpanjakan''ny Isiraely tany Beti-semesy; ary dia nankany Jerosalema Joasy, ka nandravany efa-jato hakiho ny màndany hatramin''ny vavahadin''i Efraima ka hatramin''ny vavahady an-jorony.'
mg1865::mg_12::14::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainy avokoa ny volamena sy ny volafotsy rehetra ary ny fanaka rehetra izay hita tao an-tranon''i Jehovah sy tamin''ny rakitry ny tranon''ny mpanjaka mbamin''ny olona natao antoka, ka dia niverina ho any Samaria izy.'
mg1865::mg_12::14::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Joasy sisa mbamin''ny heriny sy ny niadiany tamin''i Amazia, mpanjakan''ny Joda, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::14::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joasy lasa nodimandry any amin''ny razany, dia nalevina tany Samaria tao amin''ny mpanjakan''ny Isiraely izy; ary Jeroboama zanany no nanjaka nandimby azy.'
mg1865::mg_12::14::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro niainan''i Amazia, zanak''i Joasy, mpanjakan''ny Joda, taorian''ny nahafatesan''i Joasy, zanak''i Joahada, mpanjakan''ny Isiraely, dia dimy ambin''ny folo taona.'
mg1865::mg_12::14::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Amazia sisa, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::14::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona niodina taminy tany Jerosalema, dia nandositra nankany Lakisy izy; fa ny olona nampanaraka namono azy tany.'
mg1865::mg_12::14::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasampiny tamin''ny soavaly ny fatiny, dia nalevina tany Jerosalema tao amin''ny razany tao an-Tanànan''i Davida izy.'
mg1865::mg_12::14::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra tamin''ny Joda naka an''i Azaria, izay vao enina ambin''ny folo taona tamin''izay, ka nampanjaka azy handimby an''i Amazia rainy.'
mg1865::mg_12::14::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no hanamboatra an''i Elota ka nampody azy ho an''ny Joda, rehefa lasa nodi-mandry any amin''ny razany ny mpanjaka.'
mg1865::mg_12::14::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Jeroboama II tamin''ny Isiraely sy ny nampodiany ny voninahitry ny fanjakana ho tahaka ny teo'
  verse_text: 'Tamin''ny taona fahadimy ambin''ny folo nanjakan''i Amazia, zanak''i Joasy, mpanjakan''ny Joda, no vao nanjakan''i Jeroboama, zanak''i Joasy, mpanjakan''ny Isiraely, tany Samaria, ary nanjaka iraika amby efa-polo taona izy.'
mg1865::mg_12::14::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tsy niala tamin''ny fahotana rehetra izay nataon''i Jeroboama, zanak''i Nebata, sady nampanotany ny Isiraely.'
mg1865::mg_12::14::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nampody ny sisin-tanin''ny Isiraely ka azony hatrany akaikin''i Hamata ka hatramin''ny ranomasin''ny tani-hay*, araka ny tenin''i Jehovah, Andriamanitry ny Isiraely, izay nampilazainy ny mpanompony, dia Jona, zanak''i Amitahy, mpaminany tany Gata-hefera. [*Hebreo: Arabà]'
mg1865::mg_12::14::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa hitan''i Jehovah fa nangidy indrindra ny fahorian''ny Isiraely; ary tsy nisy sisa, na ny voahazona na ny afaka, sady tsy nisy namonjy ny Isiraely akory.'
mg1865::mg_12::14::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba nolazain''i Jehovah fa hovonoiny tsy ho eo ambanin''ny lanitra ny anaran''ny Isiraely; fa ny tanan''i Jeroboama, zanak''i Joasy, no nentiny namonjy azy.'
mg1865::mg_12::14::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Jeroboama sisa mbamin''izay nataony sy ny hery izay niadiany ary ny nampodiany an''i Damaskosy sy Hamata, izay an''ny Joda fahiny, ho an''ny Isiraely, tsy efa voasoratra ao amin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::14::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeroboama lasa nodi-mandry any amin''ny razany, dia tao amin''ny mpanjakan''ny Isiraely; ary Zakaria zanany no nanjaka nandimby azy.'
mg1865::mg_12::15::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Azaria tamin''ny Joda, ary ny nanjakan''i Zakaria sy Saloma sy Menahema sy Pekahia ary Peka tamin''ny Isiraely'
  verse_text: 'Tamin''ny taona fahafito amby roa-polo nanjakan''i Jeroboama, mpanjakan''ny Isiraely, no vao nanjakan''i Azaria, zanak''i Amazia, mpanjakan''ny Joda.'
mg1865::mg_12::15::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enina ambin''ny folo taona izy, fony vao nanjaka, ary roa amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jekolia, avy any Jerosalema.'
mg1865::mg_12::15::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy tahaka izay rehetra nataon''i Amazia rainy;'
mg1865::mg_12::15::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa ny fitoerana avo tsy mba noravana; fa mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany ny olona.'
mg1865::mg_12::15::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namely ny mpanjaka, ka dia boka mandra-pahafatiny izy ka nitoetra tao an-trano nitokana. Ary Jotama, zanakalahin''ny mpanjaka, no nanapaka tao an-dapa sy nitsara ny vahoaka.'
mg1865::mg_12::15::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Azaria sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::15::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Azaria dia lasa nodimandry any amin''ny razany, ka nalevina tao amin''ny razany tao an-tanànan''i Davida izy; ary Jotama zanany no nanjaka nandimby azy.'
mg1865::mg_12::15::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahavalo amby telo-polo nanjakan''i Azaria, mpanjakan''ny Joda, no nanjakan''i Zakaria, zanak''i Jeroboama, tamin''ny Isiraely, ary nanjaka enim-bolana tao Samaria izy.'
mg1865::mg_12::15::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah tahaka ny nataon''ny razany izy, fa tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, Izay nampanotany ny Isiraely.'
mg1865::mg_12::15::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saloma, zanak''i Jabesy, nikomy taminy, dia namely azy teo anatrehan''ny olona ka nahafaty azy ary nanjaka nandimby azy.'
mg1865::mg_12::15::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Zakaria sisa, indro fa efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany.'
mg1865::mg_12::15::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ilay tenin''i Jehovah nolazainy tamin''i Jeho hoe: Ny taranakao hatramin''ny zafindohalika dia hipetraka amin''ny seza fiandrianan''ny Isiraely. Ka dia tanteraka izany.'
mg1865::mg_12::15::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saloma, zanak''i Jabesy, dia vao nanjaka tamin''ny taona fahasivy amby telo-polo nanjakan''i Ozia, mpanjakan''ny Joda; ary nanjaka andro iray volana tany Samaria izy.'
mg1865::mg_12::15::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Menahema, zanak''i Gady, niakatra avy tany Tirza ka nankany Samaria, dia namely an''i Saloma, zanak''i Jabesy, tany Samaria ka nahafaty azy ary nanjaka nandimby azy.'
mg1865::mg_12::15::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Saloma sisa mbamin''ny nikomiany, indro fa efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany.'
mg1865::mg_12::15::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany Menahema dia niala tany Tirza ka namely an''i Tifsa mbamin''izay rehetra tao hatramin''ny sisin-taniny; fa tsy namoha vavahady azy Tifsa, ka dia nasiany, ary izay bevohoka rehetra tao notatahany.'
mg1865::mg_12::15::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahasivy amby telo-polo nanjakan''i Azaria, mpanjakan''ny Joda, no vao nanjakan''i Menahema, zanak''i Gady, tamin''ny Isiraely, ary nanjaka folo taona tao Samaria izy.'
mg1865::mg_12::15::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tamin''ny androny rehetra dia tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely.'
mg1865::mg_12::15::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pola, mpanjakan''i Asyria, dia avy hananika ny tany; ary Menahema nanome an''i Pola talenta volafotsy arivo mba hampitoetra ny fanjakana eo an-tanan''i Menahema.'
mg1865::mg_12::15::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampandoavin''i Menahema io vola io ny mpanankarena rehetra tamin''ny Isiraely, dia sekely volafotsy dimam-polo avy isan-olona, homeny ny mpanjakan''i Asyria. Ka dia niverina ny mpanjakan''i Asyria, fa tsy nitoetra tao amin''ny tany.'
mg1865::mg_12::15::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Menahema sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_12::15::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Menahema lasa nodi-mandry any amin''ny razany, ary Pekahia zanany no nanjaka nandimby azy.'
mg1865::mg_12::15::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahadimam-polo nanjakan''i Azaria, mpanjakan''ny Joda, no vao nanjakan''i Pekahia, zanak''i Menahema, tamin''ny Isiraely tao Samaria, ary nanjaka roa taona izy.'
mg1865::mg_12::15::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely.'
mg1865::mg_12::15::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Peka, zanak''i Remalia, lefiny, dia nikomy taminy ka namely an''i Pekahia mbamin''i Argoba sy Aria teo Samaria, tao amin''ny trano-avo amin''ny lapa, ary teo amin''Peka nisy olona dimam-polo lahy tamin''ny taranak''i Gileada; koa namono azy izy, dia nanjaka nandimby azy.'
mg1865::mg_12::15::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Pekahia sisa mbamin''izay rehetra nataony, indro fa efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany.'
mg1865::mg_12::15::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona faharoa amby dimam-polo nanjakan''i Azaria, mpanjakan''ny Joda, no vao nanjakan''i Peka, zanak''i Remalia, tamin''ny Isiraely tao Samaria, ary nanjaka roa-polo taona izy.'
mg1865::mg_12::15::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely.'
mg1865::mg_12::15::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andron''i Peka, mpanjakan''ny Isiraely, dia tonga Tiglato-pilesera, mpanjakan''i Asyria, ka nahafaka an''Iona sy Abela-beti-maka sy Janoa sy Kadesy sy Hazora sy Gileada ary Galilia, dia ny tanin''ny Naftaly rehetra, ary nitondra ny olona ho babo tany Asyria izy.'
mg1865::mg_12::15::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hosea, zanak''i Elaha, nikomy tamin''i Peta, Zanak''i Remalia, dia namely azy ho faty ka nanjaka nandimby azy tamin''ny taona faharoa-polo nanjakan''i Jotama, zanak''i Ozia.'
mg1865::mg_12::15::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Peka sisa mbamin''izay rehetra nataony, indro fa efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany.'
mg1865::mg_12::15::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Jotama tamin''ny Joda'
  verse_text: 'Tamin''ny taona faharoa nanjakan''i Peka, zanak''i Remalia, mpanjakan''ny Isiraely, no vao nanjakan''i Jotama, zanak''i Ozia, mpanjakan''ny Joda.'
mg1865::mg_12::15::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary enina ambin''ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jerosa, zanakavavin''i Zadoka.'
mg1865::mg_12::15::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy; tahaka izay rehetra nataon''i Ozia rainy no nataony.'
mg1865::mg_12::15::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny fitoerana avo tsy mba noravana; fa mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany ny olona. Izy no nanao ny vavahady ambony amin''ny tranon''i Jehovah.'
mg1865::mg_12::15::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Jotama sisa mbamin''Izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::15::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro Izany no vao nampandehanan''i Jehovah an''i Rezina, mpanjakan''i Syria, sy Peka, zanak''i Remalia, hanafika an''i Joda.'
mg1865::mg_12::15::38:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 15
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jotama lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-Tanànan''i Davida rainy izy; ary Ahaza zanany no nanjaka nandimby azy.'
mg1865::mg_12::16::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Ahaza tamin''ny Joda'
  verse_text: 'Tamin''ny taona fahafito ambin''ny folo nanjakan''i Peka, zanak''i Remalia, no vao nanjakan''i Ahaza, zanak''i Jotama, mpanjakan''ny Joda.'
mg1865::mg_12::16::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa-polo taona Ahaza, fony izy vao nanjaka, ary enina ambin''ny folo taona no nanjakany tany Jerosalema. Ary tsy nanao izay mahitsy eo imason''i Jehovah Andriamaniny tahaka ny nataon''i Davida rainy izy;'
mg1865::mg_12::16::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nandeha tamin''ny lalan''ny mpanjakan''ny Isiraely izy; eny, ny zananilahy aza dia nampamakiny ny afo, araka ny fahavetavetan''ny jentilisa izay noroahin''i Jehovah tsy ho eo anoloan''ny Zanak''Isiraely.'
mg1865::mg_12::16::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namono zavatra hatao fanatitra izy sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo sy teny amin''ny havoana ary teny ambanin''ny hazo maitso rehetra.'
mg1865::mg_12::16::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia niakatra hanafika an''i Jerosalema Rezina, mpanjakan''i Syria, sy Peka, zanak''i Remalia, mpanjakan''ny Isiraely; ary nanao fahirano an''i Ahaza izy, nefa tsy naharesy azy.'
mg1865::mg_12::16::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany Rezina, mpanjakan''i Syria, dia nahalasa an''i Elota ho isan''ny fanjakan''i Syria ka nandroaka ny Jiosy hiala tao; ary ny Syriana nankany Elota ka monina ao mandraka androany.'
mg1865::mg_12::16::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza naniraka olona ho any amin''i Tiglato-pilesera, mpanjakan''i Asyria, hanao hoe: Mpanomponao sy zanakao aho; miakara, ka vonjeo aho tsy ho azon''ny mpanjakan''i Syria sy ny mpanjakan''ny Isiraely, izay efa mitsangana hiady amiko.'
mg1865::mg_12::16::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Ahaza ny volafotsy sy ny volamena izay hita tao an-tranon''i Jehovah sy tao amin''ny rakitry ny tranon''ny mpanjaka, dia nampanateriny ho fanomezana ho an''ny mpanjakan''i Asyria.'
mg1865::mg_12::16::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanaiky ny teniny ny mpanjakan''i Asyria ka niakatra hamely an''i Damaskosy ary nahafaka azy; dia nentiny ho any Kira ny olona nobaboiny, fa Rezina kosa novonoiny.'
mg1865::mg_12::16::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha Ahaza mpanjaka hitsena an''i Tiglato-pilesera, mpanjakan''i Asyria, any Damaskosy; ary nony nahita ny alitara tao Damaskosy izy, dia nampitondra ny mariky ny alitara sy ny sariny araka ny fombany rehetra ho any amin''i Oria mpisorona.'
mg1865::mg_12::16::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Oria mpisorona dia nanao alitara: araka ny marika rehetra nampitondrain''i Ahaza mpanjaka avy tany Damaskosy no nanaovan''i Oria mpisorona azy mandra-pihavin''i Ahaza mpanjaka avy tany Damaskosy.'
mg1865::mg_12::16::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga avy tany Damaskosy ny mpanjaka, dia nandeha nizaha azy izy ary nanatona ka nanatitra fanatitra teo amboniny.'
mg1865::mg_12::16::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandoro ny fanatitra dorany sy ny fanatitra hohaniny teo izy ary nanidina ny fanatitra aidiny sady nanopy ny ran''ny fanati-pihavanany tamin''ny alitara.'
mg1865::mg_12::16::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny alitara varahina kosa, izay teo anatrehan''i Jehovah, dia nafindrany hiala eo anoloan''ny trano dia eo anelanelan''ny alitara vaovao sy ny tranon''i Jehovah ka nataony teo avaratry ny alitarany.'
mg1865::mg_12::16::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza mpanjaka nandidy an''i Oria mpisorona hoe: Eo ambonin''ny alitara lehibe no andoroy ny fanatitra dorana maraina sy ny fanatitra hohanina hariva sy ny fanatitra dorana mbamin''ny fanatitra hohanina izay ho an''ny mpanjaka, ary ny fanatitra dorana mbamin''ny fanatitra hohanina sy ny fanatitra aidina izay ho an''ny vahoaka rehetra ary ny rà rehetra avy amin''ny fanatitra dorana sy ny fanatitra alatsa-drà hafa dia hatopinao aminy; ary ny amin''ny alitara varahina dia mbola hataoko fanontanian-javatra'
mg1865::mg_12::16::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Oria mpisorona dia nanao araka izay rehetra nandidian''i Ahaza mpanjaka.'
mg1865::mg_12::16::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nesorin''i Ahaza mpanjaka ny kibon ny fitoeran-tavin-drano; ary nesoriny ny tavin-drano, ary ilay tavin-drano lehibe* dia nampidininy niala tamin''ireo omby varahina: izay teo ambaniny ka nataony teo ambony lampivato. [*Hebreo: ranomasina]'
mg1865::mg_12::16::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fialofana tamin''ny Sabata, izay natao teo akaikin''ny trano, sy ny fidirana ivelany izay an''ny mpanjaka, dia nafindrany ho ao an-tranon''i Jehovah noho ny tahony ny mpanjakan''i Asyria.'
mg1865::mg_12::16::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Ahaza sisa, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::16::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaza lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-Tanànan''i Davida izy; ary Hezekia zanany nanjaka nandimby azy.'
mg1865::mg_12::17::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Hosea, sy ny naharavan''ny fanjakan''ny Isiraely, ary ny fototry ny nahatonga izany'
  verse_text: 'Tamin''ny taona faharoa ambin''ny folo nanjakan''i Ahaza, mpanjakan''ny Joda, no vao nanjakan''i Hosea, zanak''i Elaha, tamin''ny Isiraely tao Samaria; ary nanjaka Sivy taona izy.'
mg1865::mg_12::17::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, nefa tsy dia tahaka ny nataon''ny mpanjakan''ny Isiraely teo alohany.'
mg1865::mg_12::17::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niakatra hanafika azy Salmanesera, mpanjakan''i Asyria, ka dia tonga mpanompony nandoa hetra* ho azy Hosea. [*Hebreo: fanomezana]'
mg1865::mg_12::17::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Asyria nahita fa niodina Hosea; fa efa naniraka olona tany amin''i So, mpanjakan''i Egypta, izy sady tsy nanatitra hetra ho an''ny mpanjakan''i Asyria intsony tahaka ny fanaony isan-taona; koa dia nanidy azy ny mpanjakan''i Asyria sy namatotra azy tao an-trano-maizina.'
mg1865::mg_12::17::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra ny mpanjakan''i Asyria ka nanenika ny tany; ary niakatra tany Samaria izy ka nanao fahirano azy telo taona.'
mg1865::mg_12::17::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahasivy nanjakan''i Hosea no nahafahan''ny mpanjakan''i Asyria an''i Samaria, dia nentiny ho babo tany Asyria ny Isiraely ka namponeniny tao Hala sy teo amoron''i Habora (dia ny onin''i Gozana izany) ary teny amin''ny tanànan''ny Mediana.'
mg1865::mg_12::17::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nahatongavan''izany dia noho ny nanotan''ny Zanak''Isiraely tamin''i Jehovah Andriamaniny, Izay nitondra azy nivoaka avy tany amin''ny tany Egypta ho afaka tamin''ny tanan''i Farao, mpanjakan''i Egypta, fa natahotra izay andriamani-kafa izy'
mg1865::mg_12::17::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nandeha araka ny fanaon''ny jentilisa izay noroahin''i Jehovah tsy ho eo anoloan''ny Zanak''Isiraely sy araka ny didy izay nataon''ny mpanjakan''ny Isiraely.'
mg1865::mg_12::17::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely dia nanao teny tsy marina ho enti-manakona an''i Jehovah Andriamaniny ka nanao fitoerana avo teny amin''ny tanànany rehetra, dia hatramin''ny tilikambon''ny mpiambina ka hatramin''ny tanàna mimànda.'
mg1865::mg_12::17::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanangana tsangam-bato-tsampy sy Aseraha ho azy teny amin''ny tendrombohitra avo rehetra sy teny ambanin''ny hazo maitso rehetra izy;'
mg1865::mg_12::17::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nandoro ditin-kazo manitra teny amin''ny fitoerana avo rehetra izy, tahaka ny nataon''ny jentilisa izay noroahin''i Jehovah tsy ho eo anoloany, sady nanao zavatra ratsy ka nampahatezitra an''i Jehovah.'
mg1865::mg_12::17::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanompo sampy, izay nandraran''i Jehovah azy hoe: Aza manao izany zavatra izany ianareo.'
mg1865::mg_12::17::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny mpaminany rehetra sy ny mpahita rehetra dia nasain''i Jehovah nananatra ny Isiraely sy ny Joda hoe: Mialà amin''ny lalanareo ratsy, ary tandremo ny lalàko sy ny didiko, araka ny lalàna rehetra izay nandidiako ny razanareo sy izay nanirahako ny mpaminany mpanompoko ho aminareo.'
mg1865::mg_12::17::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy nihaino izy, fa nanamafy ny hatony, tahaka ny razany, izay tsy nino an''i Jehovah Andriamaniny.'
mg1865::mg_12::17::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nolaviny ny didiny sy ny fanekeny izay nataony tamin''ny razany mbamin''ny teni-vavolombelony izay nananarany azy; ary nandeha nanaraka ny zava-poana izy, ka dia tonga zava-poana koa ary nanaraka ny jentilisa manodidina azy, izay efa nandraran''i Jehovah azy mba tsy halainy tahaka.'
mg1865::mg_12::17::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahafoy ny didin''i Jehovah Andriamaniny rehetra izy ka nanao sarin-javatra an-idina ho an''ny tenany, dia ombilahy kely roa, ary nanao Aseraha koa izy sady niankohoka teo anatrehan''izay rehetra eny amin''ny lanitra ary nanompo an''i Bala.'
mg1865::mg_12::17::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampandeha ny zananilahy sy ny zananivavy hamaky ny afo izy, sady nanao fankatovana sy sikidy ary nivaro-tena hanao izay ratsy eo imason''i Jehovah ka nampahatezitra Azy.'
mg1865::mg_12::17::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tezitra indrindra tamin''ny Isiraely Jehovah, dia nesoriny tsy ho eo imasony izy, ka tsy nisy sisa afa-tsy ny firenen''i Joda ihany.'
mg1865::mg_12::17::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda koa aza tsy mba nitandrina ny didin''i Jehovah Andriamaniny, fa nandeha araka izay rehetra nataon''ny Isiraely koa.'
mg1865::mg_12::17::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia narian''i Jehovah ny taranak''Isiraely rehetra ka nampahoriny sy natolony ho eo an-tanan''ny mpamabo azy mandra-panaisony azy tsy ho eo imasony.'
mg1865::mg_12::17::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nendahany niala tamin''ny taranak''i Davida ny Isiraely; ary ny olona nampanjaka an''i Jeroboama, zanak''i Nebata; ary Jeroboama dia nampiala ny Isiraely tsy hanaraka an''i Jehovah ka nampanota azy indrindra.'
mg1865::mg_12::17::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely nandeha tamin''ny fahotana rehetra nataon''i Jeroboama, fa tsy niala tamin''izany izy'
mg1865::mg_12::17::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-panaisotr''i Jehovah ny Isiraely tsy ho eo anatrehany, araka izay nampilazainy ny mpaminany mpanompony rehetra. Ka dia lasan-ko babo niala tamin''ny taniny ho any Asyria ny Isiraely ka mbola any mandraka androany.'
mg1865::mg_12::17::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nametrahana olona hafa firenena tao amin''ny tany Samaria, sy ny amin''ny fivavahan''ireny.'
  verse_text: 'ARY ny mpanjakan''i Asyria nitondra olona avy tany Babylona sy Kota sy Ava sy Hamata sy Sefarvaima ka namponina azy teny amin''ny tanànan''i Samaria nisolo ny Zanak''Isiraely; dia nahazo an''i Samaria ireny ka nitoetra teny amin''ny tanànany.'
mg1865::mg_12::17::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nonina tao ireny, dia tsy natahotra an''i Jehovah; ary Jehovah kosa nampandeha ny liona hamely azy, ka nahafatesan''ireny izy.'
mg1865::mg_12::17::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny olona tamin''ny mpanjakan''i Asyria: Ny firenena izay nafindranao sy namponeninao eny amin''ny tanànan''i Samaria tsy mahalala izay tokony hatao amin''ny Andriamanitry ny tany any, ka dia nampandeha ny liona hamely azy Izy; ary, indro, nahafatesan''ireny izy noho ny tsy fahalalany ny fanaon''ny Andriamanitry ny tany.'
mg1865::mg_12::17::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Asyria nandidy hoe: Iraho ho any ny anankiray amin''ny mpisorona izay nentinareo ho babo avy tany, ary aoka handeha izy ka hitoetra any, dia aoka hampianatra azy izay tokony hatao amin''ny Andriamanitry ny tany any izy.'
mg1865::mg_12::17::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga ny mpisorona anankiray avy tamin''izay efa nentiny ho babo avy tany Samaria ka nonina tao Betela, dia nampianatra azy izay fahatahorana an''i Jehovah.'
mg1865::mg_12::17::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny isam-pirenena mbola samy nanao ny andriamaniny avy ka nametraka azy tao amin''ny trano eny amin''ny fitoerana avo, izay nataon''ny mponina tao Samaria, eny, ny isam-pirenena dia samy nanao tao amin''ny tanàna nitoerany avy.'
mg1865::mg_12::17::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny olona avy any Babylona dia nanao an''i Sokota-benota; ary ny olona avy any Kota nanao an''i Nergala; ary ny olona avy any Hamata nanao an''i Asima;'
mg1865::mg_12::17::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny Avita nanao an''i Nibaza sy Tartaka; ary ny Sefarvita nandoro ny zanany tamin''ny afo ho an''i Adrameleka Anameleka, andriamanitr''i Sefarvaima.'
mg1865::mg_12::17::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natahotra an''i Jehovah ny olona, ary izay avy tamin''ny ankabiazam-bahoaka no notendreny ho mpisorona amin''ny fitoerana avo, ary ireny no nanatitra fanatitra tao amin''ny trano eny amin''ny fitoerana avo nisolo ny vahoaka.'
mg1865::mg_12::17::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah dia natahorany ihany, kanefa mbola nanompo ny andriamaniny avy koa izy araka ny fanaon''ny firenena izay efa nangalana azy avy.'
mg1865::mg_12::17::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandraka androany dia mbola manao araka ny fanaony teo ihany izy: tsy dia matahotra an''i Jehovah, ary tsy dia manao araka ny fomban-drazany, na araka ny lalàna sy ny didy izay nandidian''i Jehovah ny taranak''i Jakoba, izay nataony hoe Isiraely'
mg1865::mg_12::17::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady nanaovany fanekena sy nodidiany hoe: Aza matahotra izay andriamani-kafa, na miankohoka eo anatrehany, na manompo azy, na namono zavatra hatao fanaritra ho azy;'
mg1865::mg_12::17::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah, Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta tamin''ny hery lehibe sy ny sandry nahinjitra, dia aoka Izy ihany no hatahoranareo, ary ho eo anatrehany no hiankohofanareo, ary ho Azy no hamonoanareo zavatra hatao fanatitra;'
mg1865::mg_12::17::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny didy sy ny fitsipika sy ny lalàna ary ny teny izay nosoratany ho anareo no aoka hotandremanareo hatao mandrakariva; ary aza matahotra izay andriamani-kafa;'
mg1865::mg_12::17::38:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanekena izay nataoko taminareo dia aza hadinoinareo; ary aza matahotra izay andriamani-kafa ianareo;'
mg1865::mg_12::17::39:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah Andriamanitrareo no aoka hatahoranareo; dia Izy no hamonjy anareo amin''ny tanan''ny fahavalonareo rehetra.'
mg1865::mg_12::17::40:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nety nihaino izy, fa nanao tahaka ny fanaony taloha ihany.'
mg1865::mg_12::17::41:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 17
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia natahotra an''i Jehovah ihany ireo firenena ireo, kanefa nanompo ny sarin-javatra voasokitra izy hatramin''ny zanany sy ny zafiny koa aza; tahaka ny fanaon''ny razany ihany no nataon''ireny mandraka androany.'
mg1865::mg_12::18::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny nanjakan''i Hezekia, sy ny naharavan''ny fanjakan''ny Isiraely'
  verse_text: 'Ary tamin''ny taona fahatelo nanjakan''i Hosea, zanak''i Elaha, mpanjakan''ny Isiraely, no vao nanjakan''i Hezekia, zanak''i Ahaza, mpanjakan''ny Joda.'
mg1865::mg_12::18::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary nanjaka sivy amby roa-polo taona tany Jerosalema izy. Ary ny anaran-dreniny dia Aby, zanakavavin''i Zakaria.'
mg1865::mg_12::18::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy tahaka izay rehetra nataon''i Davida rainy.'
mg1865::mg_12::18::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nandrava ny fitoerana avo sy namakivaky ny tsangam-baton-tsampy sy nikapa ny Aserahany ary nanorotoro ny menarana varahina izay nataon''i Mosesy; fa ny Zanak''Isiraely efa nandoro ditin-kazo manitra tamin''iny hatramin''izany andro izany aza; ary ny anarany nataony hoe Nehostana*. [*Nehostana = Ilay varahina]'
mg1865::mg_12::18::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Andriamanitry ny Isiraely, no nitokiany, ka dia tsy nisy tahaka azy tamin''izay rehetra mpanjakan''ny Joda, na ny teo aoriany, na ny teo alohany'
mg1865::mg_12::18::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nifikitra tamin''i Jehovah izy ka tsy niala tamin''ny fanarahana Azy, fa nitandrina ny didy izay nandidian''i Jehovah an''i Mosesy.'
mg1865::mg_12::18::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nomba azy, ka dia nambinina* tamin''izay nalehany rehetra izy; ary niodina tamin''ny mpanjakan''i Asyria izy ka tsy nanompo azy. [*Na: hita ho hendry]'
mg1865::mg_12::18::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no namely ny Filistina hatrany Gaza sy ny faritaniny, ka noravany avokoa hatramin''ny tilikambon''ny mpiambina ka hatramin''ny tanàna mimànda.'
mg1865::mg_12::18::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahefatra nanjakan''i Hezekia mpanjaka (dia ny taona fahafito nanjakan''i Hosea, zanak''i Elaha, mpanjakan''ny Isiraely, izany) no niakaran''i Salmanesera mpanjakan''i Asyria, hamely an''i Samaria sy nanaovany fahirano azy.'
mg1865::mg_12::18::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tapitra ny telo taona, dia afak''ireo ny tanàna; dia tamin''ny taona fahenina nanjakan''i Hezekia, izay taona fahasivy nanjakan''i Hosea, mpanjakan''ny Isiraely, no nahafahana an''i Samaria.'
mg1865::mg_12::18::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Asyria nitondra ny Isiraely ho babo tany Asyria ka nametraka azy tao Hala sy teo amoron''i Habora, onin''i Gozana, ary teny amin''ny tanànan''ny Mediana,'
mg1865::mg_12::18::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy nihaino ny feon''i Jehovah Andriamaniny izy, fa nivadika ny fanekeny, dia izay rehetra nandidian''i Mosesy, mpanompon''i Jehovah, ka tsy nihaino na nankatò izany izy.'
mg1865::mg_12::18::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny niadian''i Sankeriba tamin''i Hezekia'
  verse_text: 'Ary tamin''ny taona fahefatra ambin''ny folo nanjakan''i Hezekia mpanjaka dia niakatra Sankeriba, mpanjakan''i Asyria, hamely ny tanàna mimànda rehetra any Joda ka nahafaka azy.'
mg1865::mg_12::18::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia, mpanjakan''ny Joda, naniraka tany amin''ny mpanjakan''i Asyria tany Lakisy nanao hoe: Efa diso aho, ialao aho, fa izay hampitondrainao ahy dia ho entiko. Ary ny mpanjakan''i Asyria nampandoa an''i Hezekia, mpanjakan''ny Joda, talenta volafotsy telon-jato sy talenta volamena telo-polo.'
mg1865::mg_12::18::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nanome azy ny volafotsy rehetra izay hita tao an-tranon''i Jehovah sy tao amin''ny rakitry ny tranon''ny mpanjaka.'
mg1865::mg_12::18::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no nanendahan''i Hezekia ny volamena tamin''ny varavaran''ny tempolin''i Jehovah sy tamin''ny tolana, dia ilay efa napetak''i Hezekia, mpanjakan''ny Joda; ary dia nomeny ho an''ny mpanjakan''i Asyria izany.'
mg1865::mg_12::18::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Asyria naniraka an''i Tartana sy Raba-sarisa ary Rabsake mbamin''ny miaramila betsaka avy teo Lakisy hankany Jerosalema ho any amin''i Hezekia mpanjaka. Dia niakatra ireny ka tonga tany Jerosalema; ary nony tonga teo izy, dia nitsangana teo anilan''ny lakan-drano amin''ny kamory ambony, teo an-dalambe mankamin''ny sahan''ny mpamotsy lamba.'
mg1865::mg_12::18::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa niantso ny mpanjaka izy, dia nivoaka ho eo aminy Eliakima, zanak''i Hilkia, izay lehiben''ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak''i Asafa, mpitadidy ny raharaham-panjakana.'
mg1865::mg_12::18::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Rabsake tamin''ireo: Andeha, lazao amin''i Hezekia hoe: Izao no lazain''ny mpanjaka lehibe, dia ny mpanjakan''i Asyria: Inona izato itokianao?'
mg1865::mg_12::18::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ianao (nefa teny foana izany): Manana saina sy hery hiady aho. Koa iza no itokianao, no miodina amiko ianao?'
mg1865::mg_12::18::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ianao matoky io tehina volotara torotoro io, dia Egypta, nefa raha itehenan''olona iny, dia manindrona ny tanany miboroaka; tahaka izany Farao, mpanjakan''i Egypta, amin''izay rehetra matoky azy.'
mg1865::mg_12::18::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hoy ianareo amiko: Jehovah Andriamanitray no itokianay, moa tsy Azy va ny fitoerana avo aman''alitara izay noravan''i Hezekia, izay nilaza tamin''ny Joda sy Jerosalema hoe: Eto anoloan''ity alitara eto Jerosalema ity no hiankohofanareo?'
mg1865::mg_12::18::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka hifaninana ianao sy ny tompoko, mpanjakan''i Asyria, fa homeko soavaly roa arivo ianao, raha tàhiny manana olona hitaingina azy.'
mg1865::mg_12::18::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataonao ahoana no fampiamboho ny komandy iray amin''ny mpanompon''ny tompoko, na dia izay kely indrindra aminy aza? Nefa matoky an''i Egypta ianao hahazoanao kalesy sy mpitaingin-tsoavaly.'
mg1865::mg_12::18::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa moa haitraitro va izao niakarako izao? Tsia, fa Jehovah no naniraka ahy handrava ity tany ity ka nanao hoe: Miakara hamely ity tany ity, ka ravao izy.'
mg1865::mg_12::18::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Eliakima, zanak''i Hilkia, sy Sebna ary Joa tamin-dRabsake: Masïna ianao, teny Syriana* no ataovy aminay mpanomponao, fa fantatray ihany izany; fa aza manao teny Jiosy ho ren''ny olona eny ambonin''ny mànda. [*Hebreo: Aramiana]'
mg1865::mg_12::18::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Rabsake taminy: Moa ho amin''ny tomponao sy ianao akory va no nanirahan''ny tompoko ahy hilaza izao teny izao, fa tsy ho amin''ny olona izay mipetraka eny ambonin''ny manda, hihinanany izay tsy fihinany* sy hisotroany izay tsy fisotrony** miaraka aminareo? [*Hebreo: ny tainy] [**Hebreo: ny amaniny]'
mg1865::mg_12::18::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijoro teo Rabsake ka niantso tamin''ny feo mahery tamin''ny teny Jiosy hoe: Henoy ny tenin''ny mpanjaka lehibe, dia ny mpanjakan''i Asyria:'
mg1865::mg_12::18::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''ny mpanjaka: Aza mety ho fitahin''i Hezekia ianareo, fa tsy hahavonjy anareo amin''ny tanako izy tsy akory.'
mg1865::mg_12::18::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mety hampahatokin''i Hezetia an''i Jehovah ianareo amin''ny anaovany hoe: Jehovah no hamonjy antsika tokoa; ary tsy hatolotra eo an-tanan''ny mpanjakan''i Asyria tsy akory ity tanàna ity.'
mg1865::mg_12::18::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mihaino an''i Hezekia; fa izao no lazain''ny mpanjakan''i Asyria: Manaova fanekena amiko hiadanana, ka mankanesa aty amiko, ary samia homana ny voalobony sy ny aviaviny, ary samia misotro ny rano avy amin''ny lavaka famorian-dranony avy ianareo,'
mg1865::mg_12::18::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandra-pihaviko hitondra anareo ho any amin''izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka, tany misy oliva tsara diloilo sy tantely, mba ho velona ianareo, fa tsy ho faty, ary aza mihaino an''i Hezekia, raha izy manome vohony anareo amin''ny anaovany hoe: Jehovah no hamonjy antsika.'
mg1865::mg_12::18::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa nisy nahavonjy ny taniny tamin''ny mpanjakan''i Asyria va ireo andriamanitry ny firenena?'
mg1865::mg_12::18::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza moa ireo andriamanitr''i Hamata sy Arpada? Ary aiza koa ireo andriamanitr''i Sefarvaima sy Hena ary Iva? Nahavonjy an''i Samaria tamin''ny tanako va ireo andriamaniny?'
mg1865::mg_12::18::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa amin''ny andriamanitra rehetra amin''ny tany no efa nahavonjy ny taniny tamin''ny tanako, koa aiza no hahavonjen''i Jehovah an''i Jerosalema amin''ny tanako?'
mg1865::mg_12::18::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nangina ny olona, ka tsy nisy namaly azy na dia teny indraim-bava akory aza, satria ny mpanjaka efa nandidy hoe: Aza misy mamaly azy.'
mg1865::mg_12::18::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 18
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliakima, zanak''i Hilkia izay lehiben''ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak''i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin''i Hezekia, sady voatriatra ny fitafiany, ary nilaza taminy ny tenin-dRabsake izy.'
mg1865::mg_12::19::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny namonjena an''i Jerosalema, sy ny nandringanana ny miaramilan''i Sankeriba, mbamin''ny nahafatesan''ny tenany'
  verse_text: 'Ary raha nandre izany Hezekia mpanjaka, dia nandriatra ny fitafiany izy sady nitafy lamba fisaonana ka lasa niditra tao an-tranon''i Jehovah,'
mg1865::mg_12::19::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy naniraka an''i Eliatima, lehiben''ny tao an-dapa, sy Sebna mpanoratra ary ny lohan''ny mpisorona samy nitafy lamba fisaonana hankany amin''Isaia mpaminany, zanak''i Amoza.'
mg1865::mg_12::19::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo taminy: Izao no lazain''i Hezekia: Andro fahoriana sy famaizana ary fanalam-baraka ity andro ity; fa mby ao am-piterahana ny zaza, nefa tsy misy hery hiterahana azy.'
mg1865::mg_12::19::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angamba ho ren''i Jehovah Andriamanitrao ny teny rehetra nataon-dRabsake, izay nirahin''ny mpanjakan''i Asyria tompony hihaika an''Andriamanitra velona, ka mba hovaliany izy noho ny teniny izay efa ren''i Jehovah Andriamanitrao; koa aingao ny vavakao hamonjy izay mbola sisa.'
mg1865::mg_12::19::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''Isaia ny mpanompon''i Hezekia mpanjaka.'
mg1865::mg_12::19::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Isaia taminy: Ambarao amin''ny tomponareo hoe: Izao no lazain''i Jehovah: Aza matahotra ny teny efa renao, dia izay nanompan''iretsy ankizilahin''ny mpanjakan''i Asyria iretsy Ahy.'
mg1865::mg_12::19::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, Izaho efa hanisy fanahy ao anatiny, ary hahare siosio izy ka hiverina ho any amin''ny taniny, dia hataoko lavon-tsabatra any an-taniny izy.'
mg1865::mg_12::19::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina Rabsake ka nankany Libna, izay nataon''ny mpanjakan''i Asyria fahirano tamin''izay, satria efa reny fa efa niala tany Lakisy ny mpanjaka.'
mg1865::mg_12::19::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Sankeriba ny amin''i Tiraka, mpanjakan''i Etiopia, nanao hoe: Indro, avy hiady aminao izy, dia naniraka olona indray ho any amin''i Hezekia izy nanao hoe:'
mg1865::mg_12::19::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no holazainareo amin''i Hezekia, mpanjakan''ny Joda: Aza mety hofitahin''ny Andriamanitrao Izay itokianao ianao hoe: Jerosalema tsy hatolotra eo an-tanan''ny mpanjakan''i Asyria.'
mg1865::mg_12::19::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ianao efa nandre izay nataon''ireo mpanjakan''i Asyria tamin''ny tany rehetra, dia ny nandravany* azy; ka ianao kosa va no ho voavonjy? [*Hebreo: nanaovany herema]'
mg1865::mg_12::19::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan''ny razako, dia Gozana sy Harana sy Razefa ary ny taranak''i Edena, izay tao Telasara?'
mg1865::mg_12::19::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ny mpanjakan''i Hamata sy ny mpanjakan''i Arpada ary ny mpanjakan''ny tanàna Sefarvaima sy Hena ary Iva?'
mg1865::mg_12::19::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Hezekia tamin''ny tanan''ny iraka ny taratasy ka novakiny, dia niakatra nankao an-tranon''i Jehovah izy ka namelatra iny teo anatrehan''i Jehovah.'
mg1865::mg_12::19::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nivavaka teo anatrehan''i Jehovah nanao hoe: Ry Jehovah, Andriamanitry ny Isiraely o, Izay mipetraka amin''ny kerobima, Ianao dia Ianao irery ihany no Andriamanitry ny fanjakana rehetra ambonin''ny tany, fa Ianao no nanao ny lanitra sy ny tany.'
mg1865::mg_12::19::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atongilano ny sofinao, Jehovah o, ka mihainoa; ahirato ny masonao, Jehovah o, ka mijere, ary mandrenesa ny tenin''i Sankeriba, izay nampitondrainy hihaika an''Andriamanitra velona.'
mg1865::mg_12::19::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, marina ihany tokoa fa ireo mpanjakan''i Asyria dia efa nandrava ny jentilisa sy ny taniny'
mg1865::mg_12::19::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa nanary ny andriamaniny tao anaty afo, satria tsy Andriamanitra ireny, fa asan''ny tanan''olona ihany, dia hazo sy vato; ka dia azony nosimbana.'
mg1865::mg_12::19::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, Jehovah Andriamanitray o, mitaraina aminao aho, vonjeo izahay amin''ny tanany, mba hahafantaran''ny fanjakana rehetra ambonin''ny tany fa Ianao dia Ianao irery ihany, Jehovah o, no Andriamanitra.'
mg1865::mg_12::19::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isaia, zanak''i Amoza, dia naniraka hankany amin''i Hezekia, nanao hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ilay fitarainana nataonao tamiko ny amin''i Sankeriba, mpanjakan''i Asyria, dia efa nohenoiko.'
mg1865::mg_12::19::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no teny nolazain''i Jehovah ny amin''i Sankeriba: Manao tsinontsinona sy mandatsalatsa anao Ziona, zanakavavy virijina: Mihifikifi-doha mahita anao mandositra Jerosalema zanakavavy.'
mg1865::mg_12::19::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no nohaikainao sy nompanao? Ary hanohitra an''iza no nanandratanao ny feonao sy nampiandrandranao ny masonao any ambony hanohitra ny Iray Masin''ny Isiraely.'
mg1865::mg_12::19::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny irakao no nihaikanao ny Tompo hoe: Tamin''ny kalesiko maro no niakarako tany an-tampon''ny tendrombohitra, tao afovoan''i Libanona, ary hokapaiko ny sedera avo sy ny kypreso voafantina; dia hiditra any amin''ny faran''ny azo iakarana ao aho sy any amin''ny alany midokadoka.'
mg1865::mg_12::19::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no nihady ka nisotro rano vao niseho*, ary ny faladiako no handritako ny ony mbamin''ny lahin-drano rehetra any Egypta**. [*Na: ranon''ny firenena hafa, Hebreo: Mazora]'
mg1865::mg_12::19::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola renao va, hoy Jehovah, fa hatry ny fony ela no nanomanako izany, ary hatramin''ny andro taloha no nikasako izany? ankehitriny dia efa nahatanteraka izany Aho, ka dia nandrava tanàna mimanda ho tonga korontam-bato ianao.'
mg1865::mg_12::19::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa tsy nahatohitra ny mponina any, sady raiki-tahotra no mangaihay izy; efa tahaka ny ahitra any an-tsaha izy ary tahaka ny ahi-maitso sy ny ahitra eo amin''ny tampon-trano, ary tahaka ny vary maty raha vao mitsiry.'
mg1865::mg_12::19::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy fantatro avokoa ny ipetrahanao sy ny ivoahanao sy ny idiranao ary ny fahatezeranao amiko.'
mg1865::mg_12::19::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa tezitra amiko ianao, ary efa tonga ato an-tsofiko ny fireharehanao, dia hasiako ny masom-biko ny oronao, ary hasiako ny lamboridiko ny vavanao, ary hampivereniko amin''ny lalana izay nihavianao ianao.'
mg1865::mg_12::19::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho famantarana ho anao kosa: Hihinana ny maniry ho azy avy tamin''ny voa mihintsana ianareo iray taona, ary amin''ny taona manaraka dia ny kolokolon''izany, fa amin''ny taona fahatelo kosa dia mamafaza ianareo, ka mijinjà, ary manaova tanim-boaloboka, ka mihinàna izay vokatra eo.'
mg1865::mg_12::19::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay sisa amin''ny taranak''i Joda dia mbola hamaka lalindalina kokoa sady hisondrotra hamoa.'
mg1865::mg_12::19::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy sisa hiseho avy any Jerosalema sy sisa afaka avy any an-tendrombohitra Ziona; ny fahasaro-piaron''i Jehovah, Tompon''ny maro, no hanao izany.'
mg1865::mg_12::19::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah ny amin''ny mpanjakan''i Asyria: Tsy ho tafiditra amin''ity tanàna ity izy, na handefa zana-tsipïka ho ato, na hitondra ampinga eo anoloany, na hanandratra tovon-tany hamelezany ity.'
mg1865::mg_12::19::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalana izay nihaviany ihany no hiverenany, fa tsy ho tafiditra amin''ity tanàna ity izy, hoy Jehovah.'
mg1865::mg_12::19::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hiaro ity tanàna ity Aho ka hamonjy azy noho ny amin''ny tenako sy Davida mpanompoko.'
mg1865::mg_12::19::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny alin''io dia avy ilay Anjelin''i Jehovah ka namely olona dimy arivo amby valo alina sy iray hetsy tao an-tobin''ny Asyriana; ary nony maraina koa vao nifoha olona, dia hita fa, indreo, efa maty avokoa ireo.'
mg1865::mg_12::19::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Sankeriba, mpanjakan''i Asyria, ka lasa nody ary nitoetra tany Ninive.'
mg1865::mg_12::19::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 19
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niankohoka tao an-tranon''i Nisroka andriamaniny izy, dia nasian''i Adrameleka sy Sarezera zananilahy ny sabatra izy; ary dia afaka nandositra nankany amin''ny tany Ararata izy mirahalahy. Ary Esara-hadona zananilahy no nanjaka nandimby azy.'
mg1865::mg_12::20::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahararian''i Hezekia, sy ny nanaretany ary ny nampamangian''i Berodaka-baladana, mpanjakan''i Babylona, azy, sy ny nahafatesany'
  verse_text: 'Ary tamin''izany andro izany dia narary saiky maty Hezekia. Ary Isaia mpaminany, zanak''i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain''i Jehovah: Hafaro ny ankohonanao, fa ho faty ianao, fa tsy ho velona.'
mg1865::mg_12::20::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitodika nankany amin''ny rindrina izy ka nivavaka tamin''i Jehovah hoe:'
mg1865::mg_12::20::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin''ny fahamarinana sy tamin''ny foko rehetra ary ny nanaovako izay tsara eo imasonao. Dia nitomany mafy dia mafy izy.'
mg1865::mg_12::20::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mbola tafavoaka ny tanàna* afovoany Isaia, dia tonga taminy ny tenin''i Jehovah nanao hoe: [*Na: kianja]'
mg1865::mg_12::20::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena, ka lazao amin''i Hezekia, mpanapaka ny oloko, hoe: Izao no lazain''i Jehovah, Andriamanitr''i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hahasitrana anao Aho, ka raha afaka ampitso dia hiakatra ho ao an-tranon''i Jehovah ianao.'
mg1865::mg_12::20::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampiako dimy ambin''ny folo taona ny andronao; sady hamonjy anao sy ity tanàna ity amin''ny tanan''ny mpanjakan''i Asyria Aho; ary hiaro ity tanàna ity Aho noho ny amin''ny tenako sy Davida mpanompoko.'
mg1865::mg_12::20::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Isaia: Makà ampempan''aviavy. Ary dia nalainy ka napetany tamin''ny vay, dia sitrana izy.'
mg1865::mg_12::20::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hezekia tamin''i Isaia: Inona no famantarana fa hositranin''i Jehovah aho ka hiakatra any an-tranon''i Jehovah raha afaka ampitso?'
mg1865::mg_12::20::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Isaia: Izao no famantarana ho anao avy amin''i Jehovah hahalalanao fa Jehovah hanao izay zavatra nolazainy: handroso hàdiny* folo va ny aloka, sa hiverina hàdiny folo? [*Hebreo: ambaratonga]'
mg1865::mg_12::20::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia namaly hoe: Mora foana ny handrosoan''ny aloka hàdiny folo; tsy izany, fa aoka ny aloka hiverina hàdiny folo.'
mg1865::mg_12::20::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isaia mpaminany nitaraina tamin''i Jehovah, ka nampiverina ny aloka hàdiny folo Jehovah, dia ilay nidinany teo amin''ny dialin''i Ahaza.'
mg1865::mg_12::20::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no nampitondran''i Berodaka baladana, zanak''i Baladana, mpanjakan''i Babylona, taratasy sy fanomezana ho an''i Hezekia; fa efa reny fa narary izy.'
mg1865::mg_12::20::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia nandray* azy ka naneho azy ny trano rehetra fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin''izay rehetra tao amin''ny firaketany: tsy nisy zavatra tsy nasehon''i Hezekia azy, na ny tao an-tranony, na ny tao amin''ny fanjakany rehetra. [*Hebreo: nihaino]'
mg1865::mg_12::20::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''i Hezekia mpanjaka Isaia mpaminany ka nanao taminy hoe: Ahoana no nolazain''ireo olona nankaty aminao ireo, ary avy taiza moa izy? Ary hoy Hezekia: Avy tany an-tany lavitra izy, dia avy tany Babylona.'
mg1865::mg_12::20::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Ka inona avy anefa no hitany tato an-tranonao? Ary hoy Hezekia: Izay rehetra ato an-tranoko dia efa hitany avokoa: tsy misy zavatra tsy nasehoko azy ny ato amin''ny firaketako rehetra.'
mg1865::mg_12::20::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Isaia tamin''i Hezekia: Henoy ary ny tenin''i Jehovah:'
mg1865::mg_12::20::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharin''ny razanao ka voarakitra mandraka androany; eny, tsy hisy sisa hijanona na inona na inona, hoy Jehovah.'
mg1865::mg_12::20::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ny terakao aza dia hisy ho entiny koa; ka ho tandonaka* any amin''ny lapan''ny mpanjakan''i Babylona ireo. [*Hebreo: ionoka]'
mg1865::mg_12::20::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Hezekia tamin''Isaia: Tsara ny tenin''i Jehovah izay nolazainao. Ary hoy koa izy: Eny, tsy izany va, raha misy fiadanana amin''ny androko ka handry fahizay?'
mg1865::mg_12::20::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Hezekia sisa sy ny heriny rehetra mbamin''ny nanaovany ny kamory sy ny lakan-drano nitarihany rano ho ao an-tanàna, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::20::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hezekia lasa nodimandry any amin''ny razany; ary Manase zanany no nanjaka nandimby azy'
mg1865::mg_12::21::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Manase sy Amona'
  verse_text: 'Roa ambin''ny folo taona Manase, fony izy vao nanjaka, ary dimy amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hefziba.'
mg1865::mg_12::21::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka ny fahavetavetan''ny firenena izay noroahin''i Jehovah tsy ho eo anoloan''ny Zanak''Isiraely.'
mg1865::mg_12::21::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namboariny indray ny fitoerana avo, izay noravan''i Hezekia rainy, ka nanangana alitara ho an''i Bala izy sady nanao Aseraha, tahaka izay nataon''i Ahaba, mpanjakan''ny Isiraely; ary niankohoka teo anatrehan''izay rehetra eny amin''ny lanitra izy ka nanompo ireny,'
mg1865::mg_12::21::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanao alitara tao an-tranon''i Jehovah koa izy, dia tao amin''izay nolazain''i Jehovah hoe: Ao Jerosalema no hasiako ny anarako.'
mg1865::mg_12::21::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanao alitara teo anatin''ny kianja roa tamin''ny tranon''i Jehovah ho an''izay rehetra eny amin''ny lanitra izy.'
mg1865::mg_12::21::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanany nampamakiny ny afo, sady nanandro sy nanao sikidy izy ary naka ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana, ary nahery nanao izay ratsy eo imason''i Jehovah izy ka nampahatezitra Azy.'
mg1865::mg_12::21::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sarin''i Astarta izay nataony dia napetrany tao amin''ny trano nolazain''i Jehovah tamin''i Davida sy Solomona zanany hoe: Ato amin''ity trano ity sy eto Jerosalema, izay nofidiko tamin''ny firenen''Isiraely rehetra, no hasiako ny anarako mandrakizay.'
mg1865::mg_12::21::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hampandeha ny tongotry ny Isiraely intsony hiala amin''ny tany izay nomeko ny razany Aho, raha mba hitandrina ka hanao araka izay rehetra nandidiako azy sy araka ny lalàna rehetra izay nandidian''i Mosesy mpanompoko azy ihany izy.'
mg1865::mg_12::21::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nihaino izy; fa Manase nitaona azy hanao ratsy mihoatra noho ny nataon''ny jentilisa, izay naringan''i Jehovah tsy ho eo anoloan''ny Zanak''Isiraely.'
mg1865::mg_12::21::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nampilaza ny mpaminany mpanompony hoe:'
mg1865::mg_12::21::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria Manase, mpanjakan''ny Joda, nanao izao fahavetavetana izao ka nanao ratsy mihoatra noho izay rehetra nataon''ny Amorita izay teo alohany sady nampanota ny Joda tamin''ny sampiny,'
mg1865::mg_12::21::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao kosa no lazain''i Jehovah, Andriamanitry ny Isiraely: Indro, hahatonga loza amin''i Jerosalema sy ny Joda Aho, ka izay rehetra mandre izany dia hangintsingintsina ny sofiny roa.'
mg1865::mg_12::21::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hohenjaniko ato Jerosalema ny famolainan''i Samaria sy ny pilaon''ny taranak''i Ahaba; ary hamaoka an''i Jerosalema Aho, toy ny olona mamaoka lovia ka sady mamaoka no manohoka azy koa.'
mg1865::mg_12::21::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hafoiko ny lovako sisa ka hatolotro ho eo an-tanan''ny fahavalony; dia ho sambotra sy ho babon''ny fahavalony rehetra izy,'
mg1865::mg_12::21::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria efa nanao izay ratsy eo imasoko izy ka nampahatezitra Ahy hatramin''ny andro nivoahan''ny razany avy any Egypta ka mandraka androany.'
mg1865::mg_12::21::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ny rà marina aza dia nalatsak''i Manase be dia be mandra-pamenony an''i Jerosalema rehetra, ho fanampin''ny ota izay nampanotany ny Joda tamin''ny nanaovany izay ratsy eo imason''i Jehovah.'
mg1865::mg_12::21::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Manase sisa mbamin''izay rehetra nataony sy ny fahotana izay nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::21::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Manase lasa nodi-mandry any amin''ny razany, dia nalevina teo an-tanimboly eo ala-tranony amin''ny sahan''i Oza; ary Amona zanany no nanjaka nandimby azy.'
mg1865::mg_12::21::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roa amby roa-polo taona Amona, fony izy vao nanjaka, ary roa taona no nanjakany tany Jerosalema, Ary ny anaran-dreniny dia Mesolemeta, zanakavavin''i Haroza, avy any Jotba.'
mg1865::mg_12::21::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah koa izy tahaka ny nataon''i Manase rainy.'
mg1865::mg_12::21::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nandeha tamin''ny lalana rehetra izay efa nalehan-drainy izy ka nanompo ny sampy izay notompoin-drainy sady niankohoka teo anatrehany.'
mg1865::mg_12::21::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahafoy an''i Jehovah, Andriamanitry ny razany, izy, fa tsy nandeha tamin''ny lalan''i Jehovah.'
mg1865::mg_12::21::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''i Amona mpanjaka nikomy taminy ka namono azy tao an-tranony.'
mg1865::mg_12::21::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka namono izay rehetra nikomy tamin''i Amona mpanjaka, dia nampanjaka an''i Josia zanany hisolo azy.'
mg1865::mg_12::21::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Amona sisa, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::21::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalevina tao amin''ny fasany tao amin''ny sahan''i Oza izy; ary Josia zanany no nanjaka nandimby azy.'
mg1865::mg_12::22::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny nanjakan''i Josia, sy ny nanamboarany ny tempoly, ary ny amin''ny nahirana ny Bokin''ny Lalàna'
  verse_text: 'Valo taona Josia, fony vao nanjaka, ary iraika amby telo-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jedida, zanakavavin''i Adaia, avy any Bozkata.'
mg1865::mg_12::22::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay mahitsy eo imason''i Jehovah kosa izy ka nandeha tamin''izay rehetra nalehan''i Davida rainy, fa tsy mba nivily, na ho amin''ny ankavanana, na ho amin''ny ankavia.'
mg1865::mg_12::22::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahavalo ambin''ny folo nanjakan''i Josia mpanjaka, dia naniraka an''i Safana mpanoratra, zanak''i Azalia, zanak''i Mesolama, izy ho any an-tranon''i Jehovah ka nanao hoe:'
mg1865::mg_12::22::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara any amin''i Hilkia mpisoronabe, hanisany ny vola izay nampidirina ho ao an-tranon''i Jehovah, dia izay nangonin''ny mpiandry varavarana tamin''ny olona;'
mg1865::mg_12::22::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka hatolony ho eo an-tanan''ny mpanao raharaha izay voatendry ny amin''ny tranon''i Jehovah izany; ary aoka homen''ireo ho an''ny mpiasa izay ao an-tranon''i Jehovah hanamboarany ny simba amin''ny trano,'
mg1865::mg_12::22::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho an''ny mpandrafitra sy ny mpandatsa-bato ary ny mpipaika, dia hividianana hazo sy vato voapaika hanamboarana ny trano.'
mg1865::mg_12::22::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy nampamoahina ny amin''ny vola natolotra teo an-tanany ireo, fa nahatoky izy.'
mg1865::mg_12::22::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Hilkia mpisoronabe tamin''i Safana mpanoratra: Ny bokin''ny lalàna dia hitako tao an-tranon''i Jehovah. Dia natolotr''i Hilkia an''i Safana ny boky ka novakiny.'
mg1865::mg_12::22::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Safana mpanoratra niverina ho any amin''ny mpanjaka nitondra valiny nanao hoe: Ny mpanomponao dia efa nandrotsaka ny vola izay azo tao an-trano ka nanolotra azy teo an-tanan''ny mpanao raharaha izay voatendry ny amin''ny tranon''i Jehovah.'
mg1865::mg_12::22::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Safana mpanoratra nilaza koa tamin''ny mpanjaka hoe: Misy boky nomen''i Hilkia mpisorona ahy. Dia novakin''i Safana teo anatrehan''ny mpanjaka ny boky.'
mg1865::mg_12::22::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny mpanjaka ny teny tao amin''ilay bokin''ny lalàna, dia nandriatra ny fitafiany izy.'
mg1865::mg_12::22::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Hilkia mpisorona sy Ahikama, zanak''i Safana, sy Akbora, zanak''i Mikaia, sy Safana mpanoratra ary Asaia, mpanompon''andriana, hoe:'
mg1865::mg_12::22::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana ianareo, ka manontania amin''i Jehovah ho ahy sy ny vahoaka mbamin''ny Joda rehetra ny amin''ny tenin''ity boky vao hita ity, fa mafy ny fahatezeran''i Jehovah izay mirehitra amintsika noho ny tsy nihainoan''ny razantsika ny tenin''ity boky ity hanao araka izay rehetra voasoratra ho antsika.'
mg1865::mg_12::22::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Hilkia mpisorona sy Ahikama sy Akbora sy Safana ary Asaia ka nankany amin''i Holda mpaminanivavy, vadin''i Saloma, zanak''i Tikva, zanak''i Harasa, mpitahiry ny fitafiana (fa nitoetra tao amin''ny tanàna ambany tany Jerosalema ravehivavy) dia niresaka taminy izy ireo.'
mg1865::mg_12::22::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy taminy Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Lazao amin''ny lehilahy izay naniraka anareo ho aty amiko hoe:'
mg1865::mg_12::22::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Indro, Izaho hahatonga loza amin''ity tanàna ity sy amin''ny mponina eto, dia araka izay rehetra lazain''ny boky novakin''ny mpanjakan''ny Joda.'
mg1865::mg_12::22::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nahafoy Ahy izy ary nandoro ditin-kazo manitra tamin''izay andriamani-kafa ka nampahatezitra Ahy amin''izay rehetra nataon''ny tanany, dia mirehitra amin''ity tanàna ity ny fahatezerako ka tsy hosakanana.'
mg1865::mg_12::22::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny mpanjakan''ny Joda izay naniraka anareo hanontany amin''i Jehovah kosa anefa, dia ambarao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ny amin''ny teny izay novakinao,'
mg1865::mg_12::22::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria nino anatra ianao ka nanetry tena teo anatrehan''i Jehovah, raha nandre izay nolazaiko ny amin''izay hanjo ity tanàna ity sy ny mponina eto dia ny handravana azy sy ny hahatongavany ho fanozonana ka nandriatra ny fitafianao sady nitomany teo anatrehako ianao, dia Izaho kosa efa nihaino, hoy Jehovah.'
mg1865::mg_12::22::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, hangoniko any amin''ny razanao ianao ary hangonina any amin''ny fasanao amin''ny fiadanana; ary ny masonao tsy mba hahita izay loza rehetra ho entiko mamaly ity tanàna ity. Dia nitondra valiny ho any amin''ny mpanjaka izy ireo.'
mg1865::mg_12::23::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahazotoan''i Josia handrava ny fivavahana tsy marina sy hanangana indray ny fivavahana amin''i Jehovah, ary ny niadiany tamin''ny Egyptiana, sy ny nahafatesany'
  verse_text: 'Ary nanirahan''ny mpanjaka, ka dia vory tany aminy ny loholon''ny Joda Jerosalema rehetra.'
mg1865::mg_12::23::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra ho ao an-tranon''i Jehovah ny mpanjaka, ary nanaraka azy  ny lehilahy rehetra amin''ny Joda sy ny mponina rehetra tany Jerosalema mbamin''ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, na kely na lehibe; ary novakiny teo anatrehany ny teny rehetra tamin''ny bokin''ny fanekena izay hita tao an-tranon''i Jehovah.'
mg1865::mg_12::23::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nitsangana teo amin''ny fitoeran''andriana, dia nanao fanekena teo anatrehan''i Jehovah hanaraka Azy sy hitandrina ny lalàny sy ny teni-vavolombelony ary ny didiny amin''ny fony rehetra sy ny fanahiny rehetra, hankatò ny tenin''ny fanekena sy izay voasoratra ao amin''izany boky izany. Ary ny vahoaka rehetra koa dia mba nanaiky ny fanekena.'
mg1865::mg_12::23::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Hilkia mpisoronabe sy ireo mpisorona manarakaraka ary ny mpiandry varavarana hamoaka ny fanaka rehetra izay natao ho an''i Bala sy Astarta ary ho an''izay rehetra eny amin''ny lanitra hiala amin''ny tempolin''i Jehovah; ka nodorany tany ivelan''i Jerosalema teny amin''ny saha amoron''i Kidrona ireny, ary nentiny ho any Betela ny vovony.'
mg1865::mg_12::23::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary natsahany koa ny mpisorona amin''ny andriamani-tsy izy, izay notendren''ny mpanjakan''ny Joda handoro ditin-kazo manitra eny amin''ny fitoerana avo tany amin''ny tanànan''ny Joda sy tamin''ny manodidina an''i Jerosalema, sy izay nandoro ditin-kazo manitra koa ho an''i Bala, dia ny masoandro, ary ho an''ny volana sy ny kintana amin''ny Zodiaka* ary ho an''izay rehetra eny amin''ny lanitra. [*Hebreo: Mazotoa; izahao Joba 38:32]'
mg1865::mg_12::23::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Aseraha navoakany hiala amin''ny tranon''i Jehovah ho any ivelan''i Jerosalema, ao amin''ny lohasahan-driaka Kidrona; ary nodorany tao io ka notorotoroiny ho vovoka, ary ny vovony nafafiny teny ambonin''ny fasam-bahoaka.'
mg1865::mg_12::23::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noravany ny tranon''ny olona nanolo-tena hijangajanga ho fanompoan-tsampy izay teo amin''ny tranon''i Jehovah, dia ireo nanenoman''ny vehivavy lay ho an''i Astarta.'
mg1865::mg_12::23::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampaka ny mpisorona rehetra avy tamin''ny tanànan''ny Joda izy, dia nolotoiny ny fitoerana avo, izay nandoroan''ny mpisorona ditin-kazo manitra, hatrany Geba ka hatrany Beri-sheba ary noravany ny fitoerana avo tao akaikin''ny vavahady, dia ilay teo anoloan''ny vavahadin''i Josoa, komandin''ny tanàna, sy ilay teo an-kavia raha miditra amin''ny vavahadin''ny tanana.'
mg1865::mg_12::23::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpisorona tamin''ny fitoerana avo tsy navela hanatitra teo ambonin''ny alitaran''i Jehovah any Jerosalema; nefa nahazo niara-nihinana mofo tsy misy masirasira tamin''ny rahalahiny ihany izy.'
mg1865::mg_12::23::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nolotoiny koa Tofeta, izay eo amin''ny lohasahan''ny taranak''i Hinoma, mba tsy hisy hampandeha ny zananilahy na ny zananivavy hamaky ny afo ho an''i Moloka intsony.'
mg1865::mg_12::23::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny soavaly izay nohamasinin''ireo mpanjakan''ny Joda ho an''ny masoandro ka nataony teo amin''ny fidirana ho ao an-tranon''i Jehovah, teo akaikin''ny efi-tranon''i Natana-meleka tandapa*, izay tao Parvara**, dia nesoriny; ary ny kalesin''ny masoandro nodorany tamin''ny afo. [*Hebreo: ionoka] [**Tokony ho anaran-trano madinika sasany teo an-kianjan''ny tempoly]'
mg1865::mg_12::23::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo alitara teo an-tampon-trano ambony amin''ny tranon''i Ahaza, izay nataon''ireo mpanjakan''ny Joda, sy ny alitara izay nataon''i Manase tao anatin''ny kianja roa tamin''ny tranon''i Jehovah, dia noravan''ny mpanjaka ka notorotoroiny, dia nafafiny tany amin''ny lohasahan-driaka Kidrona ny vovony.'
mg1865::mg_12::23::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nolotoin''ny mpanjaka ireo fitoerana avo izay teo anoloan''i Jerosalema, teo amin''ny ankavanan''ny tendrombohitra nahitan-doza, dia ireo nataon''i Solomona, mpanjakan''ny Isiraely, ho an''i Astarta, fa havetavetan''ny Sidoniana, sy ho an''i Kemosy, fahavetavetan''i Moaba, ary ho an''i Milkoma, fahavetavetan''ny taranak''i Amona.'
mg1865::mg_12::23::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia notorotoroiny ny tsangam-baton-tsampy sady nokapainy koa ny Aseraha, ka nofenoiny taolan''olona ny nitoerany.'
mg1865::mg_12::23::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny alitara izay tao Betela sy ny fitoerana avo izay nataon''i Jeroboama, zanak''i Nebata, ilay nampanota ny Isiraely, dia noravany koa; ary nodorany ny fitoerana avo ka notorotoroiny ho vovoka, ary nodorany koa ny Aseraha.'
mg1865::mg_12::23::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitodika Josia ka nahita ny fasana teny an-tendrombohitra, dia naniraka naka ny taolana tao am-pasana, ary nodorany teo ambonin''ny alitara ireny nandotoany azy, araka ny tenin''i Jehovah, izay notorin''ilay lehilahin''Andriamanitra*. [*Izahao I Mpanjaka 13:2]'
mg1865::mg_12::23::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Tsangam-baton''iza itsy hitako itsy? Ary hoy ny mponina tao an-tanana taminy: Fasan''ilay lehilahin''Andriamanitra izay avy tany Joda io, dia ilay nitory izao zavatra nataonao tamin''ny alitara eto Betela izao.'
mg1865::mg_12::23::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Aoka itsy; aza misy manetsika ny taolany akory. Dia tsy nokasihiny ny taolany sy ny taolan''ilay mpaminany avy tany Samaria.'
mg1865::mg_12::23::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano rehetra tamin''ny fitoerana avo, izay teny amin''ny tanànan''i Samaria, izay nataon''ireo mpanjakan''ny Isiraely ka nahatonga fahatezerana, dia noravan''i Josia koa ka nataony araka izay rehetra efa navony tany Betela.'
mg1865::mg_12::23::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona rehetra izay teo, dia ny mpisorona amin''ny fitoerana avo, novonoiny teo ambonin''ny alitara, sady nandoro taolan''olona teo koa izy, dia niverina nankany Jerosalema.'
mg1865::mg_12::23::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy ny vahoaka rehetra hoe: Tandremo ny Paskan''i Jehovah Andriamanitrareo, araka ny voasoratra ao amin''ny bokin''ity fanekena ity.'
mg1865::mg_12::23::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy Paska notandremana toy izany hatramin''ny andron''ny mpitsara izay nitsara ny Isiraely, na tamin''ny andro rehetra nanjakan''ny mpanjakan''ny Isiraely sy ny mpanjakan''ny Joda;'
mg1865::mg_12::23::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tamin''ny taona fahavalo ambin''ny folo nanjakan''i Josia mpanjaka no nitandremany izany Paska izany ho an''i Jehovah tany Jerosalema.'
mg1865::mg_12::23::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nanao azy ho tsindrian-javatra sy ny mpanao hatsarana sy ny terafima sy ny sampy ary ny fahavetavetana rehetra izay hita tany amin''ny tany Joda sy tany Jerosalema dia nesorin''i Josia koa, mba hanatanterahana ny tenin''ny lalàna voasoratra ao amin''ilay boky hitan''i Hilkia mpisorona tao an-tranon''i Jehovah.'
mg1865::mg_12::23::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy mpanjaka tahaka azy teo alohany, izay niverina ho amin''i Jehovah tamin''ny fony rehetra sy ny fanahiny rehetra sy ny heriny rehetra araka ny lalàn''i Mosesy rehetra; sady tsy nisy tahaka azy intsony niseho tao aoriany.'
mg1865::mg_12::23::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Jehovah tsy nitsahatra tamin''ny firehetan''ny fahatezerany mafy, dia ilay fahatezerana nirehitra tamin''ny Joda noho ny fampahatezerana rehetra izay nampahatezeran''i Manase Azy.'
mg1865::mg_12::23::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah: Hesoriko koa ny Joda hiala eo imasoko, tahaka ny nanesorako ny Isiraely, ary holaviko ity tanàna Jerosalema nofidiko ity sy ny trano izay nolazaiko hoe: Ho ao ny anarako.'
mg1865::mg_12::23::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Josia sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::23::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro nanjakan''i Josia no niakaran''i Farao-neko, mpanjakan''i Egypta, hankany amoron''ny ony Eofrata hiady amin''ny mpanjakan''i Asyria; ary Josia mpanjaka dia nandeha hiady amin''i Farao. Kanjo nony hitany, dia matiny tao Megido izy.'
mg1865::mg_12::23::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatiny dia napetraky ny mpanompony tao anaty kalesy ka nentiny niala tao Megido ho any Jerosalema, dia naleviny tao amin''ny fasany. Ary nalain''ny vahoaka Joahaza, zanak''i Josia, dia nohosorany ka nampanjakainy handimby an-drainy.'
mg1865::mg_12::23::31:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Joahaza sy Joiakima ary Joiakina'
  verse_text: 'Telo amby roa-polo taona Joahaza fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hamotala, zanakavavin''i Jeremia, avy any Libna.'
mg1865::mg_12::23::32:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka izay rehetra nataon''ny razany.'
mg1865::mg_12::23::33:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nafatotr''i Farao-neko tao Ribla any amin''ny tany Hamata izy, mba tsy hanjakany any Jerosalema, sady nampandoaviny sazy talenta volafotsy zato sy talenta volamena iray ny fanjakana.'
mg1865::mg_12::23::34:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Farao-neko nanendry an''i Eliakima, zanak''i Josia, ho mpanjaka hisolo an''i Josia rainy; ary ny anarany novany ho Joiakima, fa Joahaza kosa dia nentiny ho any Egypta ka maty tany.'
mg1865::mg_12::23::35:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny volafotsy sy ny volamena dia nomen''i Joiakima an''i Farao; kanefa notombanany avokoa ny olona rehetra araka ny didin''i Farao, ary ny vahoaka rehetra dia samy nampandoaviny vola araka ny tombany avy, mba homeny an''i Farao-neko.'
mg1865::mg_12::23::36:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby roa-polo taona Joiakima, fony izy vao nanjaka, ary nanjaka iraika ambin''ny folo taona tany Jerosalema izy. Ary ny anaran-dreniny dia Zebida, zanakavavin''i Pedaia, avy any Romaha.'
mg1865::mg_12::23::37:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 23
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka izay nataon''ny razany.'
mg1865::mg_12::24::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro nanjakan''i Joiakima no niakaran''i Nebokadnezara, mpanjakan''i Babylona, ary nanoa azy telo taona Joiakima, dia nivadika ka niodina taminy.'
mg1865::mg_12::24::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nampandeha ny miaramilan''ny Kaldeana sy ny miaramilan''ny Syriana sy ny miaramilan''i Moaba ary ny miaramilan''ny taranak''i Amona hiady aminy: dia nampandehaniny hiady amin''ny Joda ireo mba handrava azy araka ny tenin''i Jehovah, izay nampilazainy ny mpaminany mpanompony.'
mg1865::mg_12::24::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia araka ny tenin''i Jehovah ihany no nahatongavan''izany tamin''ny Joda, hanesorany azy tsy ho eo imasony noho ny fahotan''i Manase tahaka izay rehetra nataony'
mg1865::mg_12::24::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy noho ny rà marina izay nalatsany koa; fa nofenoiny rà marina Jerosalema; koa izany no tsy netezan''i Jehovah hamela ny helony.'
mg1865::mg_12::24::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Joiakima sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_12::24::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joiakima lasa nodimandry any amin''ny razany, ka Joiakina zanany no nanjaka nandimby azy.'
mg1865::mg_12::24::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''i Egypta tsy nivoaka avy tany amin''ny taniny intsony; fa lasan''ny mpanjakan''i Babylona izay rehetra an''ny mpanjakan''i Egypta hatramin''ny lohasahan-driak''i Egypta ka hatramin''ny ony Eofrata.'
mg1865::mg_12::24::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valo ambin''ny folo taona Joiakina, fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Nehosta, zanakavavin''i Elnatana, avy any Jerosalema.'
mg1865::mg_12::24::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka izay rehetra nataon-drainy.'
mg1865::mg_12::24::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no niakaran''ny mpanompon''i Nebokadnezara. mpanjakan''i Babylona, hamely an''i Jerosalema, ary nataony fahirano ny tanàna.'
mg1865::mg_12::24::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga koa Nebokadnezera, mpanjakan''i Babylona, hamely ny tanàna, raha mbola nanao fahirano azy ny mpanompony.'
mg1865::mg_12::24::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joiakina, mpanjakan''ny Joda, nivoaka nankany amin''ny mpanjakan''i Babylona, dia izy sy ny reniny ary ny mpanompony sy ny mpanapaka mbamin''ny tandapany*; [*Hebreo: ionoka] ary nentin''ny mpanjakan''i Babylona izy tamin''ny taona fahavalo nanjakany.'
mg1865::mg_12::24::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navoakan''i Nebokadnezara avy tao ny rakitra rehetra tao an-tranon''i Jehovah sy tao an-tranon''ny mpanjaka, dia nendahany ny volamena rehetra izay nataon''i Solomona, mpanjakan''ny Isiraely, tao amin''ny tempolin''i Jehovah, araka izay nolazain''i Jehovah.'
mg1865::mg_12::24::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny ho babo ny tao Jerosalema rehetra sy ny mpanapaka rehetra sy ny lehilahy mahery rehetra, dia olona iray alina, mbamin''ny mahay tao-zavatra rehetra sy ny mpanefy koa, ka tsy nisy sisa navelany afa-tsy izay tompon-tany faraidina.'
mg1865::mg_12::24::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra an''i Joiakina koa ho babo any Babylona izy; ary ny renin''ny mpanjaka sy ny vadin''ny mpanjaka sy ny tandapa* sy ny lehilahy mahery amin''ny tany dia nentiny ho babo avy tany Jerosalema ho any Babylona. [*Hebreo: ionoka]'
mg1865::mg_12::24::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy mahery rehetra, dia fito arivo, ary ny mahay tao-zavatra sy ny mpanefy arivo lahy, izay samy mahery sy mahay miady, dia nentin''ny mpanjakan''i Babylona ho babo tany Babylona avokoa.'
mg1865::mg_12::24::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Matania, rahalahin-drainy, no notendren''ny mpanjakan''i Babylona ho mpanjaka hisolo an''i Joiakina, ka novany hoe Zedekia no anarany.'
mg1865::mg_12::24::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Zedekia, sy ny nandravana an''i Jerosalema, ary ny toetry ny olona sisa sy Joiakina'
  verse_text: 'Iraika amby roa-polo taona Zedekia, fony izy vao nanjaka, ary iraika ambin''ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hamotala, zanakavavin''i Jeremia, avy any Libna.'
mg1865::mg_12::24::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, tahaka izay rehetra nataon''i Joiakima.'
mg1865::mg_12::24::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahatezeran''i Jehovah no nahatongavan''izany tamin''i Jerosalema sy ny Joda ambara-pandroakany azy tsy ho eo anatrehany. Ary Zedekia niodina tamin''ny mpanjakan''i Babylona.'
mg1865::mg_12::25::1:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahafolo tamin''ny taona fahasivy nanjakan''i Zedekia dia tonga Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra hamely an''i Jerosalema indray ka nitoby tandrifiny; ary nanao tilikambo manodidina azy izy.'
mg1865::mg_12::25::2:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony fahirano ny tanàna hatramin''ny taona fahiraika ambin''ny folo nanjakan''i Zedekia mpanjaka.'
mg1865::mg_12::25::3:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahasivy tamin''ny volana fahefatra dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an''ny olona tompon-tany.'
mg1865::mg_12::25::4:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy voabanga ny tanana, dia nandositra alina ny miaramila rehetra tamin''ny lalana nankamin''ny vavahady tanelanelan''ny manda roa, izay eo anilan''ny sahan''ny mpanjaka (fa ny Kaldeana nanodidina ny tanàna), ary ny mpanjaka nandeha tamin''ny lalana mankeny amin''ny tani-hay*. [*Hebreo: Arabà]'
mg1865::mg_12::25::5:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramilan''ny Kaldeana nanenjika ny mpanjaka ka nahatratra azy teny amin''ny tani-hay any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra.'
mg1865::mg_12::25::6:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voasambotra ny mpanjaka ka nentina niakatra ho any amin''ny mpanjakan''i Babylona tao Ribla, ka dia notsaraina tao izy.'
mg1865::mg_12::25::7:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Zedekia dia novonoiny teo imason-drainy, ary ny mason''i Zedekia kosa nopotsiriny, dia nafatony tamin''ny gadra varahina izy ka nentiny nankany Babylona.'
mg1865::mg_12::25::8:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahafito tamin''ny volana fahadimy tamin''ny taona fahasivy ambin''ny folo nanjakan''i Nebokadnezara, mpanjakan''i Babylona dia tonga tany Jerosalema Nebozaradana, lehiben''ny mpiambina, mpanompon''ny mpanjakan''i Babylona,'
mg1865::mg_12::25::9:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nandoro ny tranon''i Jehovah sy ny tranon''ny mpanjaka mbamin''ny trano rehetra tany Jerosalema: ny trano lehibe rehetra dia nodorany tamin''ny afo avokoa.'
mg1865::mg_12::25::10:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny manda manodidina an''i Jerosalema dia noravan''ny miaramilan''ny Kaldeana rehetra, izay nanaraka ny lehiben''ny mpiambina.'
mg1865::mg_12::25::11:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay olona sisa tao an-tanana sy izay efa nandositra nanatona ny mpanjakan''i Babylona ary ny vahoaka betsaka sisa dia nentin''i Neborazadana, lehiben''ny mpiambina, ho babo avokoa.'
mg1865::mg_12::25::12:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny olona malahelo dia nisy navelany ihany ho mpamboatra tanim-boaloboka sy ho mpiasa tany.'
mg1865::mg_12::25::13:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo andry varahina teo an-tranon''i Jehovah sy ny fitoeran-tavin-drano sy ny tavin-drano varahina lehibe* izay teo an-tranon''i Jehovah dia notorotoroin''ny Kaldeana, ka nentiny ho any Babylona ny varahina. [*Hebreo: ny ranomasina]'
mg1865::mg_12::25::14:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny koa ny vilany fandraofan-davenona sy ny sotron''afo sy ny antsy sy ny lovia kely ary ny fanaka varahina rehetra izay nenti-nanao fanompoam-pivavahana.'
mg1865::mg_12::25::15:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny koa ny fitoeran-davenon-jiro sy ny lovia famafazana na ny volamena na ny volafotsy dia samy nentiny avokoa'
mg1865::mg_12::25::16:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny andry roa sy ny tavin-drano lehibe iray ary ireo fitoeran-tavin-drano, izay nataon''i Solomona ho amin''ny tranon''i Jehovah; ny varahina tamin''izany fanaka rehetra izany dia tsy hita lanja.'
mg1865::mg_12::25::17:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valo ambin''ny folo hakiho ny hahavon''ny andry iray, ary varahina ny kapitaliny sady telo hakiho ny hahavony; ary varahina avokoa ny harato sy ny ampongabendanitra amin''ny kapitaliny manodidina; ary tahaka izany koa ny andry faharoa mbamin''ny harato.'
mg1865::mg_12::25::18:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehiben''ny mpiambina nisambotra an''i Seraia mpisoronabe sy zefania, mpisorona manarakaraka, ary mpiandry varavarana koa telo lahy;'
mg1865::mg_12::25::19:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tao an-tanàna no nisamborany ny tandapa anankiray, mpifehy ny miaramila, ary dimy lahy tamin''izay mpitoetra teo anatrehan''ny mpanjaka, izay hita tao an-tanàna, ary ny mpanoratry ny komandin''ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enim-polo lahy, izay hitany tao an-tanàna;'
mg1865::mg_12::25::20:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nosamborin''i Nebozaradana, lehiben''ny mpiambina, ireo ka nentiny ho any amin''ny mpanjakan''i Babylona tao Ribla.'
mg1865::mg_12::25::21:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novonoin''ny mpanjakan''i Babylona tao Ribla any amin''ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin''ny taniny.'
mg1865::mg_12::25::22:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny olona izay sisa tany amin''ny tanin''ny Joda, izay navelan''i Nebokadnezara, mpanjakan''i Babylona, dia Gedalia, zanak''i Ahikama, zanak''i Safana, no notendreny ho mpanapaka azy.'
mg1865::mg_12::25::23:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny komandin''ny miaramila rehetra mbamin''ny olom-peheziny avy fa Gedalia no notendren''i Nebokadnezara, mpanjakan''i Babylona, ho mpanapaka, dia nankany amin''i Gedalia tany Mizpa Isimaela, zanak''i Netania, sy Johanana, zanak''i Karea, sy Seraia, zanak''i Tanometa Netofatita, ary Jazania, zanak''ilay Makatita, dia ireo sy ny olom-peheziny avy.'
mg1865::mg_12::25::24:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gedalia nianiana taminy sy tamin''ny olom-peheziny ka nanao hoe: Aza matahotra ny amin''ny mpanompon''ny Kaldeana, fa mitomoera amin''ny tany, ary manompoa ny mpanjakan''i Babylona, fa izany no hahasoa anareo.'
mg1865::mg_12::25::25:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny volana fahafito, dia avy Isimaela, zanak''i Netania, zanak''i Elisama, isan''ny fianakavian''ny mpanjaka, mbamin''ny olona folo lahy koa ka namely an''i Gedalia, dia nahafaty azy sy ny Jiosy ary ny Kaldeana izay tao aminy tany Mizpa.'
mg1865::mg_12::25::26:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niainga ny olona rehetra, na kely na lehibe, mbamin''ny komandin''ny miaramila, nankany Egypta, fa natahotra ny Kaldeana izy.'
mg1865::mg_12::25::27:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahafito amby roa-polo tamin''ny volana faharoa ambin''ny folo tamin''ny taona fahafito amby telo-polo taorian''ny namaboana an''i Joiakina, mpanjakan''ny Joda, tamin''ny taona vao nanjakan''i Evila-merodaka, mpanjakan''i Babylona, dia nasandrany* hiala tao an-trano-maizina Joiakina, mpanjakan''ny Joda. [*Hebreo: nasandratra ny lohany]'
mg1865::mg_12::25::28:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitenenany soa izy, ka ny seza fiandrianany nataony ambony noho ny seza fiandrianan''ireo mpanjaka namany tao Babylona.'
mg1865::mg_12::25::29:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia novan''i Joiakina ny fitafiany fony mbola tao an-trano-maizina; ary nihinan-kanina teo anatrehany mandrakariva izy tamin''ny andro niainany rehetra.'
mg1865::mg_12::25::30:
  verse_version: mg1865
  verse_book: mg_12
  verse_chapter: 25
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hanina nohaniny dia hanina nomena avy amin''ny mpanjaka araka ny tokony ho anjarany isan''andro isan''andro tamin''ny andro rehetra niainany.'
