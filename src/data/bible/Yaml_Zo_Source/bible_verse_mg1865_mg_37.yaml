mg1865::mg_37::1::1:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Famporisihana ny olona hanao ny tempoly'
  verse_text: 'Tamin''ny andro voalohany tamin''ny volana fahenina tamin''ny taona faharoa nanjakan''i Dariosa mpanjaka no nahatongavan''ny tenin''i Jehovah nentin''i Hagay mpaminany tamin''i Zerobabela, zanak''i Sealtiela, governora tany Joda, sy tamin''i Josoa, zanak''i Jozadaka, mpisoronabe, nanao hoe:'
mg1865::mg_37::1::2:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Ity firenena ity nanao hoe: Tsy mbola tonga ny andro tokony hihaviana hanaovana ny tranon''i Jehovah.'
mg1865::mg_37::1::3:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga ny tenin''i Jehovah nentin''i Hagay mpaminany nanao hoe:'
mg1865::mg_37::1::4:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa andro tokony hitoeran''ny tenanareo ao amin''ny tranonareo misy valin-drihana va izao, kanefa rava ity trano ity?'
mg1865::mg_37::1::5:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Hevero ny lalanareo.'
mg1865::mg_37::1::6:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa namafy be ianareo, nefa kely no taomina: mihinana ianareo, nefa tsy voky; misotro ianareo, nefa tsy afa-po; mitafy ianareo, nefa tsy misy mafana; ary izay mahazo karama dia mahazo karama hatao an-kitapo loaka.'
mg1865::mg_37::1::7:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Hevero ny lalanareo.'
mg1865::mg_37::1::8:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miakara any an-tendrombohitra*, ka makà hazo, ary ataovy ny trano, dia hankasitrahako izany, sady hankalazaina Aho, hoy Jehovah. [*Na: amin''ny tany havoana]'
mg1865::mg_37::1::9:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanampo be ianareo, kanjo indro, kely monja; ary nony notaominareo, dia notsofiko. Nahoana? hoy Jehovah, Tompon''ny maro. Satria efa rava ny tranoko, nefa ianareo samy mihazakazaka hanao ny tranonareo avy.'
mg1865::mg_37::1::10:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ny aminareo no nitsaharan''ny lanitra tsy hampilatsaka ando sy nitsaharan''ny tany tsy hahavokatra.'
mg1865::mg_37::1::11:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso ny fahamainana Aho hamely ny tany sy ny tendrombohitra sy ny vary sy ny ranom-boaloboka sy ny diloilo sy izay vokatry ny tany ary ny olona sy ny biby fiompy mbamin''izay rehetra efa nisasaran''ny tanana.'
mg1865::mg_37::1::12:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zerobabela, zanak''i Sealtiela, sy Josoa, zanak''i Jozadaka, mpisoronabe, mbamin''ny sisa rehetra amin''ny vahoaka, dia nihaino ny feon''i Jehovah Andriamaniny sy ny tenin''i Hagay mpaminany, araka ny nanirahan''i Jehovah Andriamaniny azy, ary natahotra teo anatrehan''i Jehovah ny olona.'
mg1865::mg_37::1::13:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambaran''i Hagay, irak''i Jehovah, ny teny nampitondrain''i Jehovah ho amin''ny olona nanao hoe: Izaho no momba anareo, hoy Jehovah.'
mg1865::mg_37::1::14:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia notairin''i Jehovah ny fanahin''i Zerobabela, zanak''i Sealtiela, governora any Joda, sy ny fanahin''i Josoa, zanak''i Jozadaka mpisoronabe, sy ny fanahin''ny sisa rehetra amin''ny vahoaka; ary dia avy izy ka nandrafitra ny tranon''i Jehovah, Tompon''ny maro, Andriamaniny,'
mg1865::mg_37::1::15:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny andro fahefatra amby roa-polo tamin''ny volana fahenina tamin''ny taona faharoa nanjakan''i Dariosa.'
mg1865::mg_37::2::1:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny voninahitry ny tempoly vaovao, sy ny fitahiana ho azon''ny olon''Andriamanitra'
  verse_text: 'Tamin''ny andro fahiraika amby roa -polo tamin''ny volana fahafito no nahatongavan''ny tenin''i Jehovah nentin''i Hagay mpaminany nanao hoe:'
mg1865::mg_37::2::2:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''i Zerobabela, zanak''i Sealtiela, governora any Joda, sy amin''i Josoa, zanak''i Jozadaka, mpisoronabe, ary amin''ny sisa amin''ny vahoaka hoe:'
mg1865::mg_37::2::3:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mbola sisa aminareo, izay nahita ity trano ity tamin''ny voninahiny taloha ? Fa manao ahoana kosa ny fahitanareo azy izao? Moa tsy toy ny tsinontsinona eo imasonareo ity?'
mg1865::mg_37::2::4:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mahereza ankehitriny, ry Zerobabela, hoy Jehovah; ary mahereza, ry Josoa, zanak''i Jozadaka, mpisoronabe; ary mahereza, ianareo vahoaka rehetra, hoy Jehovah, ka miasà; fa Izaho no momba anareo, hoy Jehovah, Tompon''ny maro,'
mg1865::mg_37::2::5:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny teny fanekena nataoko taminareo, fony nivoaka avy tany Egypta ianareo, ary ny Fanahiko dia mbola mitoetra ao aminareo ihany; koa aza matahotra ianareo.'
mg1865::mg_37::2::6:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah. Tompon''ny maro: Indray maka koa, raha afaka kelikely, dia hampihorohoroiko ny lanitra sy ny tany ary ny ranomasina sy ny tany maina;'
mg1865::mg_37::2::7:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hampihorohoroiko koa ny firenena rehetra, ka ho avy izay irin''ny firenena rehetra; ary hofenoiko voninahitra ity trano ity, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_37::2::8:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahy ny volafotsy, ary Ahy ny volamena, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_37::2::9:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voninahitr''ity trano ity any am-parany dia ho lehibe noho ny tany aloha, hoy Jehovah, Tompon''ny maro; ary eto amin''ity fitoerana ity no hanomezako fiadanana, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_37::2::10:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro fahefatra amby roa-polo tamin''ny volana fahasivy tamin''ny taona faharoa nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah nentin''i Hagay mpaminany nanao hoe:'
mg1865::mg_37::2::11:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Andeha maka hevitra amin''ny mpisorona hoe:'
mg1865::mg_37::2::12:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mitondra hena masina eny an-tsisin-dambany, ka voakasiky ny sisin-dambany ny mofo; na izay voahandro, na ny divay, na ny diloilo, na izay mety ho fihinana, moa ho tonga masina koa va ireo? Dia namaly ny mpisorona nanao hoe: Tsia.'
mg1865::mg_37::2::13:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hagay: Raha misy maloto amim-paty mikasika ireo, moa ho tonga maloto koa va ireo? Dia namaly ny mpisorona nanao hoe: Ho tonga maloto ireo.'
mg1865::mg_37::2::14:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Hagay nanao hoe: Tahaka izany eo anatrehako ireto olona ireto, ary tahaka izany ity firenena ity, hoy Jehovah; ary tahaka izany koa ny asan''ny tanany rehetra; fa izay ateriny ao dia maloto.'
mg1865::mg_37::2::15:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa masïna ianareo, hevero ny hatramin''izao andro anio izao no ho mankary, dia fony tsy mbola nisy vato nifanongoa tao amin''ny tempolin''i Jehovah;'
mg1865::mg_37::2::16:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fony tamin''izany andro izany raha nisy nankamin''ny vary roa-polo mifatra, dia folo ihany; raha nisy nankamin''ny vata fanantazana ranom-boaloboka hananty indimam-polon''ny famarana, dia roa-polo ihany.'
mg1865::mg_37::2::17:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vary main''ny rivotra sy maty fotsy sy ny havandra no namelezako anareo tamin''ny asan''ny tananareo rehetra; nefa tsy niverina tamiko ihany ianareo, hoy Jehovah.'
mg1865::mg_37::2::18:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianareo, hevero ny hatramin''izao andro anio izao no ho mankary, dia hatramin''ny andro fahefatra amby roa-polo amin''ny volana fahasivy, eny, hevero hatramin''ny andro nanorenana ny tempolin''i Jehovah.'
mg1865::mg_37::2::19:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola ao an-tsompitra ihany va ny voan-javatra? Na dia ny voaloboka sy ny aviavy sy ny ampongaben-danitra sy ny oliva aza dia tsy mbola mamoa; hatramin''izao andro anio izao no hitahiako anareo.'
mg1865::mg_37::2::20:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga fanindroany tamin''i Hagay ny tenin''i Jehovah tamin''ny andro fahefatra amby roa-polo nanao hoe:'
mg1865::mg_37::2::21:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''i Zerobabela, governora any Joda, hoe: Hampihorohoroiko ny lanitra sy ny tany'
mg1865::mg_37::2::22:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hahohoko ny seza fiandrianan''ny fanjakana, ary hofoanako ny herin''ny fanjakan''ny firenena; ary hahohoko ny kalesiny sy ny mitaingina eo aminy; ary samy ho lavon''ny sabatry ny namany avy ny soavaly sy ny mpitaingina azy.'
mg1865::mg_37::2::23:
  verse_version: mg1865
  verse_book: mg_37
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany, hoy Jehovah, Tompon''ny maro, dia horaisiko ianao, ry Zerobabela mpanompoko, zanak''i Sealtiela, hoy Jehovah, ka hataoko toy ny fanombohan-kase ianao; fa efa nifidy anao Aho, hoy Jehovah, Tompon''ny maro.'
