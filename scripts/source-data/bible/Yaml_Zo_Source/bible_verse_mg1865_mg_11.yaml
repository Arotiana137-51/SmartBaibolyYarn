mg1865::mg_11::1::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niodinan''i Adonia, sy ny nanosorana an''i Solomona ho mpanjaka'
  verse_text: 'Ary Davida mpanjaka dia efa zoki-olona sady nandroso fahanterana; ary norakofany lamba izy, fa tsy nety nafana.'
mg1865::mg_11::1::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy ny mpanompony taminy: Aoka hitadiavana zazavavy virijina ny mpanjaka tompoko, dia aoka hitoetra eto anatrehan''ny mpanjaka izy mba ho mpitaiza azy, ary aoka handry eo amin''ny tratranao izy, ka dia hampahafana ny mpanjaka tompoko.'
mg1865::mg_11::1::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nitady zazavavy tsara tarehy eran''ny tanin''ny Isiraely rehetra izy ka nahita an''i Abisaga Sonemita, dia nentiny tany amin''ny mpanjaka.'
mg1865::mg_11::1::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsara tarehy dia tsara tarehy razazavavy, dia tonga mpitaiza ny mpanjaka sady nanompo azy izy; nefa ny mpanjaka tsy nahalala azy.'
mg1865::mg_11::1::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Adonia, zanakalahin''i Hagita, nanandratra ny tenany ka nanao hoe: Izaho no hanjaka; dia nanomana kalesy sy mpitaingin-tsoavaly ary dimam-polo lahy ho mpihazakazaka eo alohany izy.'
mg1865::mg_11::1::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rainy tsy mbola niteny mafy azy atory hatrizay niainany nanao hoe: Nahoana ianao no manao toy izao ? sady lehilahy tsara tarehy tokoa izy; ary izy no natera-dreniny nanarakaraka an''i Absaloma.'
mg1865::mg_11::1::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa niresaka tamin''i Joaba, zanak''i Zeroia, sy Abiatara mpisorona izy; ka dia niandany tamin''i Adonia izy roa lahy ka nanampy azy.'
mg1865::mg_11::1::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zadoka mpisorona sy Benaia, zanak''i Joiada, sy Natana mpaminany sy Simey sy Rey ary ny lehilahy mahery izay an''i Davida kosa tsy mba niandany tamin''i Adonia.'
mg1865::mg_11::1::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Adonia namono ondry aman''osy sy omby ary zanak''omby mifahy teo anilan''ny vato Zoheleta tanilan''i En-rogela ka nanasa ny rahalahiny zanakalahin''ny mpanjaka rehetra sy ny lehilahy rehetra amin''ny Joda, mpanompon''ny mpanjaka;'
mg1865::mg_11::1::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Natana mpaminany sy Benaia sy ny lehilahy mahery ary Solomona rahalahiny no tsy mba nasainy.'
mg1865::mg_11::1::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Natana niteny tamin''i Batseba, renin''i Solomona, hoe: Moa tsy renao va fa efa manjaka Adonia, zanak''i Hagita, nefa tsy fantatr''i Davida tompontsika akory izany?'
mg1865::mg_11::1::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa etsy homeko saina ianao hamonjenao ny ainao sy ny ain''i Solomona zanakao.'
mg1865::mg_11::1::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana mankany amin''i Davida mpanjaka, ka lazao aminy hoe: Tsy nianiana tamiko mpanompovavinao va ianao, ry mpanjaka tompoko, nanao hoe: Solomona zanakao-lahy no hanjaka handimby ahy tokoa, ary izy no hipetraka eo amin''ny seza fiandrianako? Koa nahoana indray no Adonia no manjaka?'
mg1865::mg_11::1::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola miteny amin''ny mpanjaka ianao, dia, indro, izaho koa hiditra manaraka anao ka hanamarina ny teninao.'
mg1865::mg_11::1::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Batseba dia nankao amin''ny mpanjaka tao amin''ny efi-trano nitoerany; ary efa antitra ny mpanjaka; ary Abisaga Sonemita nanompo azy.'
mg1865::mg_11::1::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niondrika Batseba ka niankohoka teo anatrehan''ny mpanjaka. Ary hoy ny mpanjaka: Inona no ilainao?'
mg1865::mg_11::1::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Tompokolahy o, Jehovah Andriamanitrao no nianiananao tamiko mpanompovavinao hoe: Solomona zanakaolahy no hanjaka handimby ahy tokoa, ary izy no hipetraka eo amin''ny seza fiandrianako.'
mg1865::mg_11::1::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo izao dia, indro, Adonia no manjaka; kanefa tsy fantatrao izany, ry mpanjaka tompoko.'
mg1865::mg_11::1::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa namono omby sy zanak''omby mifahy ary ondry aman''osy betsaka izy ka efa nanasa ny zanakalahin''ny mpanjaka rehetra sy Abiatara mpisorona ary Joaba, komandin''ny miaramila; fa Solomona mpanomponao ihany no tsy mba nasainy.'
mg1865::mg_11::1::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry mpanjaka tompoko o. ny mason''ny Isiraely rehetra manandratra anao hilazanao izay hipetraka eo amin''ny seza fiandriananao mpanjaka tompoko handimby anao.'
mg1865::mg_11::1::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa lasa modi-mandry any amin''ny razany ny mpanjaka tompoko, dia izaho sy Solomona zanako no atao meloka.'
mg1865::mg_11::1::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niteny tamin''ny mpanjaka ravehivavy, dia. indro, niditra koa Natana mpaminany.'
mg1865::mg_11::1::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanambara amin''ny mpanjaka hoe: Indro Natana mpaminany. Dia niditra teo anatrehan''ny mpanjaka izy ka niankohoka tamin''ny tany teo anatrehany.'
mg1865::mg_11::1::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Natana: Ry mpanjaka tompoko o, fa angaha ianao efa niteny hoe: Adonia no hanjaka handimby ahy, ary izy no hipetraka eo amin''ny seza fiandrianako.'
mg1865::mg_11::1::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa he! izy nidina androany ary namono omby sy zanak''omby mifahy sy ondry aman''osy betsaka ka nanasa ny zanakalahin''ny mpanjaka rehetra sy ny komandin''ny miaramila sy Abiatara mpisorona; ary indreo izy mihinana ny misotro eo anatrehany ka manao hoe: Ho ela velona anie Adonia mpanjaka!'
mg1865::mg_11::1::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho mpanomponao sy Zadoka mpisorona sy Benaia, zanak''i Joiada, ary Solomona mpanomponao ihany no tsy mba nasainy.'
mg1865::mg_11::1::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa avy tamin''ny mpanjaka tompoko va no nahatonga izany zavatra izany, ka tsy mba nampahafantarinao ny mpanomponao izay hipetraka eo amin''ny seza fiandriananao mpanjaka tompoko handimby anao?'
mg1865::mg_11::1::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly Davida mpanjaka ka nanao hoe: Antsoy hankaty amiko Batseba. Dia niditra nankeo anatrehan''ny mpanjaka izy ka nitsangana teo anatrehany'
mg1865::mg_11::1::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nianiana hoe: Raha velona koa Jehovah, Izay namonjy ny aiko tamin''ny fahoriana rehetra,'
mg1865::mg_11::1::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tahaka ilay nianianako tamin''i Jehovah, Andriamanitry ny Isiraely, sady nilazako taminao hoe: Solomona zanakaolahy no hanjaka handimby ahy tokoa, ary izy no hipetraka eo amin''ny seza fiandrianako hisolo ahy, dia izany ihany no hataoko anio.'
mg1865::mg_11::1::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Batseba niondrika, dia niankohoka tamin''ny tany teo anatrehan''ny mpanjaka ka nanao hoe: Ho velona mandrakizay anio Davida mpanjaka tompoko!'
mg1865::mg_11::1::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida mpanjaka: Antsoy hankaty amiko Zadoka mpisorona sy Natana mpaminany ary Benaia, zanak''i Joiada. Dia niditra nankeo anatrehan''ny mpanjaka izy telo lahy.'
mg1865::mg_11::1::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Ento miaraka aminareo ny mpanompon''ny tomponareo, ary ampitaingeno ny ampondravaviko Solomona zanakolahy, ka ento midina any Gihona izy.'
mg1865::mg_11::1::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka Zadoka mpisorona sy Natana mpaminany hanosotra azy any ho mpanjakan''ny Isiraely; ary tsofinareo ny anjomara, ka lazao hoe: Ho ela velona anie Solomona mpanjaka!'
mg1865::mg_11::1::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia miakara manaraka azy ianareo, ary aoka izy hiditra ka hipetraka eo amin''ny seza fiandrianako; fa izy no ho mpanjaka hisolo ahy. satria izy no voatendriko ho mpanapaka ny Isiraely sy ny Joda.'
mg1865::mg_11::1::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Benaja, zanak''i Joiada, namaly ny mpanjaka hoe: Amena! Hiteny tahaka izany koa anie Jehovah, Andriamanitry ny mpanjaka tompoko.'
mg1865::mg_11::1::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nomban''i Jehovah ny mpanjaka tompoko anie no mba hombany an''i Solomona koa, ary hataony be voninahitra mihoatra noho ny seza fiandrianan''i Davida mpanjaka tompoko anie ny seza fiandrianan''i Solomona.'
mg1865::mg_11::1::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina Zadoka mpisorona sy Natana mpaminany sy Renaia, zanak''i Joiada, ary ny miaramila mpiambina andriana*, dia nampitaingina an''i Solomona ny ampondravavin''i Davida mpanjaka izy, ka dia nitondra azy nankany Gihona. [*Hebreo: Keretita sy Peletita]'
mg1865::mg_11::1::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zadoka mpisorona naka ny tandroka misy diloilo tao amin''ny trano-lay ka nanosotra an''i Solomona. Ary notsofina ny anjomara, ka dia hoy ny vahoaka rehetra: Ho ela velona anie Solomona mpanjaka!'
mg1865::mg_11::1::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra nanaraka azy ny vahoaka rehetra ary nitsoka sodina sady nifaly dia nifaly, ka dia nihorohoro* ny tany noho ny feony. [*Hebreo: nitresaka]'
mg1865::mg_11::1::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Adonia sy ireo olona rehetra izay nasaina teo aminy nandre izany, rehefa nitsahatra nihinana izy. Ka raha nahare ny feon''ny anjomara Joaba, dia hoy izy: Inona re izany hotakotaka mampitabataba ny tanàna izany e?'
mg1865::mg_11::1::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola niteny izy, indro, tonga Jonatana, zanak''i Abiatara mpisorona; ary hoy Adonia taminy: Mandrosoa; fa lehilahy tsara fanahy ianao, ka ho teny tsara no entinao.'
mg1865::mg_11::1::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jonatana niteny ka nanao tamin''i Adonia hoe: Tsia, tsy izany tsy akory, fa Davida mpanjaka tompontsika efa nanangana an''i Solomona tokoa ho mpanjaka.'
mg1865::mg_11::1::44:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka efa naniraka an''i Zadoka mpisorona sy Natana mpaminany sy Benaia, zanak''i Joiada, ary ny miaramila mpiambina andriana hiaraka aminy, ka nampitaingenin''ireo ny ampondravavin''ny mpanjaka izy.'
mg1865::mg_11::1::45:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zadoka mpisorona sy Natana mpaminany efa nanosotra azy teo Gihona ho mpanjaka; ary niakatra avy teo. izy sady nifaly, ka dia nihorika tery ny tanàna. Izany no hotakotaka renareo.'
mg1865::mg_11::1::46:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, Solomona izao dia efa mipetraka eo amin''ny seza fiandrianan''ny fanjakana.'
mg1865::mg_11::1::47:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga koa ny mpanompon''ny mpanjaka hisaotra an''i Davida mpanjaka tompontsika hoe: Hataon''Andriamanitrao ho tsara noho ny anaranao anie ny anaran''i Solomona, ary hataony ho be voninahitra mihoatra noho ny seza fiandriananao anie ny seza fiandrianany! Dia niankohoka teo am-parafara ny mpanjaka'
mg1865::mg_11::1::48:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely Izay nanome ny hipetraka eo amin''ny seza fiandrianako androany, sady hitan''ny masoko koa izany.'
mg1865::mg_11::1::49:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra izay rehetra nasain''i Adonia ka niainga, ary samy lasa nandeha amin''izay nalehany avy izy rehetra.'
mg1865::mg_11::1::50:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Adonia koa natahotra an''i Solomona, dia niainga ka lasa nangia ny tandroky ny alitara.'
mg1865::mg_11::1::51:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Solomona hoe: Indro, Adonia matahotra an''i Solomona mpanjaka; koa indro izy efa mangia ny tandroky ny alitara ka manao hoe: Aoka Solomona mpanjaka hianiana amiko aloha fa tsy hamono ahy mpanompony amin''ny sabatra.'
mg1865::mg_11::1::52:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Solomona: Raha hita fa lehilahy tsara fanahy izy, dia tsy hisy na dia singam-bolony iray akory aza ho latsaka amin''ny tany; fa raha misy heloka kosa ho hita aminy, dia ho faty ihany izy.'
mg1865::mg_11::1::53:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 1
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka Solomona mpanjaka nampidina azy hiala amin''ny alitara. Dia avy izy ka niankohoka teo anatrehan''i Solomona mpanjaka; ary dia hoy Solomona taminy: Modia any an-tranonao.'
mg1865::mg_11::2::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hafatra nataon''i Davida tamin''i Solomona, sy ny nahafatesany'
  verse_text: 'Ary rehefa antomotra ny andro hahafatesan''i Davida, dia nandidy an''i Solomona zananilahy izy hoe:'
mg1865::mg_11::2::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho efa handeha amin''ny lalan-kalehan''ny tany rehetra; koa mahereza ianao, ary misehoa ho lehilahy.'
mg1865::mg_11::2::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tandremo izay asain''i Jehovah Andriamanitrao hotandremana handehananao amin''ny lalany hitandremanao ny lalàny sy ny didiny sy ny fitsipiny ary ny teni-vavolombelony, araka ny voasoratra ao amin''ny lalan''i Mosesy, mba hataonao lavorary avokoa izay rehetra hataonao sy izay rehetra halehanao,'
mg1865::mg_11::2::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanatanterahan''i Jehovah ny teny izay nilazany ahy hoe: Raha ny taranakao hitandrina ny alehany ka handeha eo anatrehako amin''ny fahamarinana amin''ny fony rehetra sy amin''ny fanahiny rehetra (hoy Izy), dia tsy ho diso zanakalahy ho eo amin''ny seza fiandrianan''ny Isiraely ianao.'
mg1865::mg_11::2::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao koa mahalala izay nataon''i Joaba, zanak''i Zeroia, tamiko, dia ilay nataony tamin''izy roa lahy komandin''ny miaramilan''ny Isiraely, dia tamin''i Abnera, zanak''i Nera, sy tamin''i Amasa, zanak''i Jatera, izay novonoiny sady nalatsany rà toy ny amin''ny ady, nefa tsy nisy ady tsinona, ka nasiany rà toy ny amin''ny ady ny fehin-kibony teny am-balahany sy ny kapany teny an-tongony.'
mg1865::mg_11::2::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa manaova araka ny fahendrenao, ary aza avela hidina any amin''ny fiainan-tsy hita* amin''ny fiadanana ny volo fotsiny. [*Hebreo: Sheola]'
mg1865::mg_11::2::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zanak''i Barzilay Gileadita kosa dia asio soa, ka avelao mba ho isan''izay mihinana eo amin''ny latabatrao izy; fa hanao soa toy izany no nankanesan''ireo tany amiko, fony nandositra an''i Absaloma rahalahinao aho.'
mg1865::mg_11::2::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary indro fa ao aminao koa Simey, zanak''i Gera, Benjamita avy any Bahorima loza loatra ny nanozonany ahy tamin''ny andro nankanesako tany Mahanaima, nefa izy mba nidina hitsena ahy tao Jordana ihany, ary Jehovah no manianako taminy hoe: Tsy hovonoiko amin''ny sabatra ianao.'
mg1865::mg_11::2::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza ataonao afa-tsiny izy; fa lehilahy hendry ianao, ka fantatrao izay tokony hanaovanao azy, ka amin''ny fandatsahan-drà no hampidinanao ny volo fotsiny ho any amin''ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_11::2::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia lasa nodi-mandry any amin''ny razany ka nalevina ao an-Tanànan''i Davida.'
mg1865::mg_11::2::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nanjakan''i Davida tamin''ny Isiraely dia efa-polo taona; tao Hebrona no nanjakany fito taona, ary tao Jerosalema no nanjakany telo amby telo-polo taona.'
mg1865::mg_11::2::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nataon''i Solomona hampiorina tsara ny fanjakany'
  verse_text: 'Ary Solomona nipetraka teo amin''ny seza fiandrianan''i Davida rainy; ary ny fanjakany dia niorina tsara'
mg1865::mg_11::2::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Adonia, zanakalahin''i Hagita, nankany amin''i Batseba, renin''i Solomona. Ary hoy ravehivavy: Moa fihavanana va no ahatongavanao? Dia hoy izy: Eny, fihavanana.'
mg1865::mg_11::2::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy: Misy teny kely holazaiko aminao. Ary hoy ravehivavy: Lazao ary.'
mg1865::mg_11::2::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Ianao mahalala fa ahy ny fanjakana, ary ny Isiraely rehetra nanandrandra ahy hanjaka, kanjo tafahodina ny fanjakana ka lasan''ny rahalahiko, fa azony avy tamin''i Jehovah.'
mg1865::mg_11::2::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny zavatra iray loha no mba angatahiko aminao; ka aza dia lavinao aho. Ary hoy ravehivavy taminy: Lazao ary.'
mg1865::mg_11::2::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Masïna ianao, mitenena amin''i Solomona mpanjaka (fa tsy handà anao izy). mba homeny ho vadiko Abisaga Sonemita.'
mg1865::mg_11::2::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Batseba: Eny ary, fa izaho dia hilaza ny teninao amin''ny mpanjaka.'
mg1865::mg_11::2::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Batseba nankany amin''i Solomona mpanjaka hilaza aminy ny tenin''i Adonia. Ary ny mpanjaka nitsangana hitsena an''i Batseba sady niankohoka teo anatrehany, dia nipetraka teo amin''ny seza fiandrianany, ary nasainy nisy nitondra seza fiandrianana koa ho an''ny renin''ny mpanjaka; ka dia nipetraka teo amin''ny ankavanany izy.'
mg1865::mg_11::2::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Misy zavatra kely iray loha mba hangatahiko aminao, ka aza dia lavinao aho. Ary hoy ny mpanjaka: Angataho ary, ry ineny, fa tsy handà anao aho.'
mg1865::mg_11::2::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Aoka Abisaga Sonemita homena ho vadin''i Adonia rahalahinao.'
mg1865::mg_11::2::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Solomona mpanjaka namaly ka nanao tamin-dreniny hoe: Nahoana ianao no mangataka an''i Abisaga Sonemita ho an''i Adonia; angataho ho azy koa ary ny fanjakana, fa izy no zokiko, dia ho azy sy Abiatara mpisorona ary ho an''i Joaba, zanak''i Zeroia.'
mg1865::mg_11::2::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka dia nianiana tamin''i Jehovah hoe: Hataon''Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hatao maty Adonia noho ny nanaovany izany teny izany.'
mg1865::mg_11::2::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, raha velona koa Jehovah, Izay nampitoetra sy nametraka ahy teo amin''ny seza fiandrianan''i Davida raiko sady nanome ahy fara handimby* araka izay nolazainy, dia hatao maty anio ihany Adonia. [*Hebreo: nanao trano ho ahy]'
mg1865::mg_11::2::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka naniraka an''i Benaia, zanak''i Joiada; ary izy namely azy ho faty.'
mg1865::mg_11::2::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abiatara mpisorona dia nilazan''ny mpanjaka hoe: Mandehana ianao hankany Anatota ho any an-tambohonao, fa olona tokony hatao maty ianao; nefa tsy hataoko maty amin''izao andro izao. satria nitondra ny fiaran''i Jehovah Tompo teo alohan''i Davida raiko ianao sady niara-nitondra fahoriana tamin''ny raiko tamin''izay rehetra nampahoriana azy.'
mg1865::mg_11::2::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona dia nanongana an''i Abiatara tsy ho mpisoron''i Jehovah, ka dia nahatanteraka ny tenin''i Jehovah, ilay nolazainy tao Silo ny amin''ny taranak''i Ely, izy.'
mg1865::mg_11::2::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''i Joaba izany (fa Joaba efa niodina nanaraka an''i Adonia, kanefa tsy niodina nanaraka an''i Absaloma izy), dia nandositra nankao amin''ny trano-lain''i Jehovah izy ka nangia ny tandroky ny alitara.'
mg1865::mg_11::2::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Solomona mpanjaka fa Joaba efa lasa nandositra ho ao amin''ny trano-lain''i Jehovah, ka, indro, eo anilan''ny alitara izy. Dia nirahin''i Solomona Benaia, zanak''i Joiada, ka nilazany hoe: Andeha, asio izy.'
mg1865::mg_11::2::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Benaia tonga tao amin''ny tranolain''i Jehovah ka nanao tamin''i Joaba hoe: Izao no lazain''ny mpanjaka: Mivoaha ianao. Fa hoy izy: Tsia, fa eto ihany aho no ho faty. Ary Benaia nitondra teny tany amin''ny mpanjaka indray hoe: Izany no lazain''i Joaba, ary izany no navaliny ahy.'
mg1865::mg_11::2::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Ataovy araka izay nolazainy, ka asio izy, dia aleveno, mba hanesoranao amiko sy amin''ny taranaky ny raiko ny rà marina izay nalatsak''i Joaba.'
mg1865::mg_11::2::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatsingerin''i Jehovah ho amin''ny lohany ihany ny ràny, satria izy namely olona roa lahy izay marina sady tsara noho izy ka namono azy tamin''ny sabatra, dia Abnera, zanak''i Nera, komandin''ny miaramilan''ny Isiraely sy Amasa, zanak''i Jatera, komandin''ny miaramilan''ny Joda, nefa Davida raiko tsy nahalala izany akory'
mg1865::mg_11::2::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny ran''izy roa lahy ireo hitsingerina amin''ny lohan''i Joaba sy ny lohan''ny taranany mandrakizay; fa amin''i Davida sy ny taranany sy ny mpianakaviny ary amin''ny seza fiandrianany kosa dia hisy fiadanana mandrakizay avy amin''i Jehovah.'
mg1865::mg_11::2::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra Benaia, zanak''i Joiada, ka namely azy ho faty; ary nalevina tao amin''ny fonenany tany an''efitra izy.'
mg1865::mg_11::2::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Benaia, zanak''i Joiada, no notendren''ny mpanjaka ho solony ho komandin''ny miaramila; ary Zadota mpisorona no notendren''ny mpanjaka ho solon''i Abiatara.'
mg1865::mg_11::2::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka naniraka naka an''i Simey ka nanao taminy hoe: Manaova trano ato Jerosalema ianao ka mitoera ao, ary aza miala ao ianao na ho aiza na ho aiza akory.'
mg1865::mg_11::2::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izay andro hivoahanao mita ny lohasahan-driaka Kidrona, dia aoka ho fantatrao marina fa hatao maty tokoa ianao; ny rànao ho amin''ny lohanao ihany.'
mg1865::mg_11::2::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Simey tamin''ny mpanjaka: Tsara izany teny izany; araka izany nolazain''ny mpanjaka tompoko Izany no hataon''ny mpanomponao. Ary Simey nitoetra ela tany Jerosalema.'
mg1865::mg_11::2::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka telo taona mipaka, dia nisy roa lahy mpanompon''i Simey, nandositra ho any amin''i Akisy, zanak''i Maka mpanjakan''i Gata. Ary nisy nanambara tamin''i Simey hoe: Indreo, any Gata ny mpanomponao.'
mg1865::mg_11::2::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Simey nanisy lasely ny borikiny ka nankany Gata ho any amin''i Akisy hitady ny mpanompony, dia lasa nody Simey nitondra ny mpanompony avy tany Gata.'
mg1865::mg_11::2::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Solomona ny nialan''i Simey tany Jerosalema hankany Gata sy ny niveranany indray.'
mg1865::mg_11::2::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka naniraka naka an''i Simey ka nanao taminy hoe: Tsy efa nampianiana anao tamin''i Jehovah va aho ka nilaza taminao marimarina hoe: Aoka ho fantatrao marina fa amin''izay andro hivoahanao sy handehananao na ho aiza na ho aiza akory dia hatao maty tokoa ianao? Ary hoy ianao tamiko: Tsara izany teny reko any.'
mg1865::mg_11::2::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahoana ianao no tsy nitandrina ny fianianana tamin''i Jehovah sy ny didy izay nandidiako anao?'
mg1865::mg_11::2::44:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa ny mpanjaka tamin''i Simey: ianao mahalala ny ratsy rehetra nataonao tamin''i Davida raiko, eny, tsaroan''ny fonao izany, ka dia hatsingerin''i Jehovah amin''ny lohanao ny haratsianao.'
mg1865::mg_11::2::45:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hotahina kosa Solomona mpanjaka, ary ny seza fiandrianan''i Davida hampitoerina eo anatrehan''i Jehovah mandrakizay.'
mg1865::mg_11::2::46:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 2
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Benaia, zanak''i Joiada, dia nivoaka izy ka namely an''i Simey ho faty. Ary ny fanjakana dia naorina teo an-tanan''i Solomona.'
mg1865::mg_11::3::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanambadian''i Solomona ny zanakavavin''i Farao, ary ny nisehoan''Andriamanitra taminy tao Gibeona, sy ny nangatahany fahendrena.'
  verse_text: 'Ary Solomona tonga vinanton''i Farao mpanjakan''i Egypta, fa nanambady ny zanakavavin''i Farao izy ka nitondra azy ho any an-Tanànan''i Davida, mandra-pahavitany ny tranony sy ny tranon''i Jehovah ary ny màndan''i Jerosalema manodidina.'
mg1865::mg_11::3::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny olona mbola namono zavatra hatao fanatitra teny amin''ny fitoerana avo ihany, fa tsy mbola nisy trano vita ho an''ny anaran''i Jehovah hatramin''izany andro izany.'
mg1865::mg_11::3::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona tia an''i Jehovah ka nizotra araka ny dian''i Davida rainy; nefa kosa izy mbola namono zavatra hatao fanatitra sy nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany.'
mg1865::mg_11::3::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nankany Gibeona hamono zavatra hatao fanatitra any, fa izany ilay fitoerana avo malaza*; ka fanatitra dorana arivo no naterin''i Solomona teo amin''izany alitara izany. [*Hebreo: lehibe]'
mg1865::mg_11::3::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tao Gibeona no nisehoan''i Jehovah tamin''i Solomona tamin''ny nofy nony alina; ary hoy Andriamanitra: Angataho izay tianao homeko anao.'
mg1865::mg_11::3::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Solomona: Ianao efa naneho fahasoavana lehibe tamin''i Davida raiko mpanomponao, araka ny nandehanany teo anatrehanao tamin''ny tsy fivadihana sy ny fahamarinana ary ny fahitsian''ny fony taminao, ary Ianao efa nitahiry izao fahasoavana lehibe izao ho azy, dia ny nanomezanao azy zanakalahy hipetraka eo amin''ny seza fiandrianany tahaka ny amin''izao anio izao.'
mg1865::mg_11::3::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, Jehovah Andriamanitro o, Ianao efa nampanjaka ahy mpanomponao handimby an''i Davida raiko; nefa izaho dia mbola zaza ihany, ka tsy fantatro akory izay fivoaka sy fiditra.'
mg1865::mg_11::3::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho mpanomponao koa dia ao amin''ny olonao izay nofidinao, sady olona betsaka tsy tambo isaina ary tsy hita isa noho ny hamaroany.'
mg1865::mg_11::3::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa omeo ahy mpanomponao saina malady* ho entiko mitsara ny olonao hahaizako manavaka ny soa sy ny ratsy; fa iza moa no mahay mitsara izao olonao betsaka izao? [*Hebreo: fo mihaino]'
mg1865::mg_11::3::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitraky ny Tompo ny nangatahan''i Solomona izany zavatra izany;'
mg1865::mg_11::3::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia hoy Andriamanitra taminy: Satria nangataka izany zavatra izany ianao, fa tsy ny ho ela velona, na harena, na ny ain''ny fahavalonao, fa fahaizana hitsara no nangatahinao,'
mg1865::mg_11::3::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia, indro, efa nanao araka ny teninao Aho, ka indro, efa nanome anao saina hendry sady mahiratra, ka tsy nisy tahaka anao ny teo alohanao, ary tsy hisy ho tahaka anao ny ato aorianao.'
mg1865::mg_11::3::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na izay tsy nangatahinao aza dia efa nomeko anao koa, dia harena sy voninahitra, ka tsy hisy* mpanjaka tahaka anao amin''ny andronao rehetra. [*Na: nisy]'
mg1865::mg_11::3::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha handeha amin''ny lalako ianao ka hitandrina ny lalàko sy ny didiko tahaka ny nandehanan''i Davida rainao, dia hataoko ho ela velona ianao.'
mg1865::mg_11::3::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nahatsiaro Solomona, ka indro fa nofy izany. Ary nony tonga tany Jerosalema izy, dia nitsangana teo anoloan''ny fiaran''ny faneken''i Jehovah ka nanatitra fanatitra odorana sy fanati-pihavanana, ary dia nanao fanasana ho an''ny mpanompony rehetra izy.'
mg1865::mg_11::3::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny nisehoan''ny fahendren''i Solomona tamin''ny nitsarany azy roa vavy ny amin''ilay zaza maty'
  verse_text: 'Ary tamin''izany dia nisy vehivavy janga roa nankao amin''ny mpanjaka ka nitsangana teo anatrehany.'
mg1865::mg_11::3::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay vehivavy anankiray: Trarantitra ianao, tompokolahy, izaho sy ity vehivavy ity miray trano; ary teraka tao an-trano aho, sady tao koa izy.'
mg1865::mg_11::3::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa velona hateloana aho, dia mba velona koa izavavy ity; ary izahay roa vavy ihany no tao; tsy nisy olon-kafa tao aminay tao an-trano, fa izahay roa vavy ihany.'
mg1865::mg_11::3::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty tamin''ny alina ny zanak''izavavy ity, fa voatsindriny.'
mg1865::mg_11::3::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha mamatonalina izy ka naka ny zanako teo amiko tamin''ilay natory iny aho ankizivavinao, dia nampandriny teo an-tratrany, fa ny azy maty napetrany teo an-tratrako.'
mg1865::mg_11::3::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nifoha maraina hampinono ny zanako aho, indro fa maty izy; kanjo rehefa nofantariko sy nony maraina, dia indro fa tsy ny zanako naterako.'
mg1865::mg_11::3::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa ilay anankiray: Tsia, fa ny velona no zanako, ary ny maty no zanakao. Fa hoy indray ny anankiray: Tsia, fa ny maty no zanakao, ary ny velona no zanako. izany no teniny teo anatrehan''ny mpanjaka.'
mg1865::mg_11::3::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Ny anankiray manao hoe: Ity velona no zanako. ary ny maty no zanakao; ary hoy kosa ny anankiray: Tsia, fa ny maty no zanakao, ary ny velona no zanako.'
mg1865::mg_11::3::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa itondray sabatra aho, hoy ny mpanjaka. Ary nentiny ny sabatra ho eo anatrehan''ny mpanjaka.'
mg1865::mg_11::3::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Sasaho ny zaza velona, ka omeo ny anankiray ny antsasany, ary ho an''ny anankiray kosa ny antsasany.'
mg1865::mg_11::3::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niteny tamin''ny mpanjaka ravehivavy, renin''ny zaza velona satria nandevilevy ny fony noho ny amin''ny zanany ka nanao hoe: Tompokolahy o, trarantitra ianao, omeo azy ihany ary ny zaza velona, fa aza dia vonoina re! Fa hoy kosa ny iray: Aoka tsy ho ahy tsy ho anao, fa zarao mihitsy.'
mg1865::mg_11::3::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ny mpanjaka ka nanao hoe: Omeo itsy ny zaza velona, fa aoka tsy hovonoina; fa io mihitsy no reniny.'
mg1865::mg_11::3::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ren''ny Isiraely rehetra izany fitsarana nataon''ny mpanjaka izany, dia natahotra ny mpanjaka izy, satria hitany fa misy fahendren''Andriamanitra ao am-pony ho entiny mitsara.'
mg1865::mg_11::4::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpanao raharaham-panjakana, ary ny voninahitr''i Solomona sy ny fahendreny'
  verse_text: 'Ary nanjaka tamin''ny Isiraely rehetra Solomona mpanjaka.'
mg1865::mg_11::4::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no lehibe tao aminy: Azaria, zanak''i Zadoka, no mpisorona*; [*Na: zanak''i Zadoka mpisorona]'
mg1865::mg_11::4::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Elihorefa sy Ahia, zanak''i Sisa, no mpanoratra; Josafata. zanak''i Ahiloda, no mpitadidy ny raharaha-mpanjakana;'
mg1865::mg_11::4::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Benaia, zanak''i Joiada, no komandin''ny miaramila; ary Zadoka sy Abiatara no mpisorona;'
mg1865::mg_11::4::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Azaria, zanak''i Natana, no lehiben''ny olona voatendry; ary Zaboda, zanak''i Natana, no mpanolotsaina*, sakaizan''ny mpanjaka, [*Hebreo: mpisorona]'
mg1865::mg_11::4::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ahisara no lehiben''ny tao an-dapa; ary Adonirama, zanak''i Abda, no komandin''ny mpanao fanompoana.'
mg1865::mg_11::4::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanendry roa ambin''ny folo lahy ho amin''ny Isiraely rehetra hiadidy ny zavatra rehetra nilain''ny mpanjaka sy ny ankohonany; samy niadidy ny iray volana avy amin''ny herintaona izy.'
mg1865::mg_11::4::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anarany: Beni-hora tany amin''ny tany havoan''i Efraima;'
mg1865::mg_11::4::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Beni-dakera tao Makaza sy tao Salbima sy Beti-semesy ary Elon-beti-hanana;'
mg1865::mg_11::4::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Beni-haseda tao Arobota; Soko sy ny tany Hefera rehetra no azy;'
mg1865::mg_11::4::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ben''abinadaba tao amin''ny havoan''i Dora rehetra (Tafata, zanakavavin''i Solomona, no vadiny)'
mg1865::mg_11::4::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Bana, zanak''i Ahiloda; azy Tanaka sy Megido ary Beti-sana rehetra, izay anilan''i Zaretana, ambanin''i Jezirela, hatrany Beti-sana ka hatrany Abela-mehola, dia hatrany ankoatr''i Jokneama no azy.'
mg1865::mg_11::4::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Beni-gabera tao Ramota-gileada; ny tanàna madinika an''i Jaàra*, zanak''i Manase, izay any Gileada, no azy; azy koa ny tany Argoba, izay any Basana, dia tanana enim-polo lehibe nisy manda sy hidy varahina; [*Havota-jaàra; izahao Nomery 32:41]'
mg1865::mg_11::4::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahinadaba, zanak''Ido, tany Mahanaima;'
mg1865::mg_11::4::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahimaza tany Naftaly; izy kosa nanambady an''i Basemata, zanakavavin''i Solomona;'
mg1865::mg_11::4::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Bana, zanak''i Hosay, tany Asera sy Alota;'
mg1865::mg_11::4::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Josafata, zanak''i Paroa, tany Isakara;'
mg1865::mg_11::4::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Simey, zanak''i Ela, tany Benjamina;'
mg1865::mg_11::4::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Gabera, zanak''i Ory, tany amin''ny tany Gileada, tanin''i Sihona, mpanjakan''ny Amorita, sy Oga, mpanjakan''i Basana; ary izy ihany no voatendry ho amin''izany tany izany.'
mg1865::mg_11::4::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda sy ny Isiraely dia maro, tahaka ny fasika amoron-dranomasina ny hamarony, sady mihinana sy misotro ary mifaly.'
mg1865::mg_11::5::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanjaka tamin''ny fanjakana rehetra hatramin''ny Ony* sy ny tanin''ny Filistina ka hatramin''ny sisin''i Egypta; nandoa hetra ireo sady nanompo an''i Solomona tamin''ny andro rehetra niainany. [*Eofrata]'
mg1865::mg_11::5::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fihinan''i Solomona isanandro dia koba tsara toto telo-polo kora sy koba hafa enim-polo kora,'
mg1865::mg_11::5::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy omby mifahy folo sy omby an-tondraka roa-polo ary ondry aman''osy zato, afa-tsy ny diera koa sy ny gazela sy ny kapreola ary ny vorona mifahy.'
mg1865::mg_11::5::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanapaka ny tany rehetra aty* an-dafin''ny Ony** hatrany Tifsa ka hatrany Gaza izy, dia tamin''ny mpanjaka rehetra ety* an-dafin''ny Ony; ary izy dia tsara fihavanana tamin''ireny rehetra manodidina nanoa azy ireny. [*Na: any] [**Eofrata]'
mg1865::mg_11::5::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda sy ny Isiraely nandry fahizay tamin''ny andron''i Solomona rehetra, samy teny ambanin''ny voalobony sy ny aviaviny ny olona hatrany Dana ka hatrany Beri-sheba.'
mg1865::mg_11::5::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanana efi-trano efatra alina, fitoeran''ny soavaly mpitarika kalesy, ary soavaly fitaingina roa arivo amby iray alina.'
mg1865::mg_11::5::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo olona voatendry ireo dia niadidy ny zavatra rehetra nilain''i Solomona mpanjaka sy izay rehetra nentina teo amin''ny : latabatr''i Solomona mpanjaka; izy rehetra samy niadidy ny amin''ny iray volany avy, ka tsy navelany ho nisy tsy ampy na inona na inona.'
mg1865::mg_11::5::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vary hordea koa sy ny mololo ho an''ny soavaly sy ny soavaly haingampandeha dia nentiny ho ao amin''ny fitoerana izay tokony hitondrana azy, dia samy araka ny anjarany avy.'
mg1865::mg_11::5::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra nanome an''i Solomona fahendrena sy fahiratan-tsaina be indrindra ary fahalalana betsaka tahaka ny fasika amoron-dranomasina.'
mg1865::mg_11::5::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahendren''i Solomona nihoatra noho ny fahendren''ny zanaky ny atsinanana rehetra sy ny fahendren''ny Egyptiana rehetra.'
mg1865::mg_11::5::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hendry noho ny olona rehetra izy; eny, hendry mihoatra noho Etana Ezrahita sy Hemana sy Kalkola sy Darda, zanak''i Mahola, aza izy ary ny lazany efa niely tamin''ny firenena rehetra manodidina.'
mg1865::mg_11::5::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao ohabolana telo arivo izy, sady nanao tonon-kira dimy amby arivo.'
mg1865::mg_11::5::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nilaza ny amin''ny hazo hatramin''ny hazo sedera any Libanona ka hatramin''ny hysopa izay maniry eny amin''ny ampiantany izy, sady nilaza ny amin''ny biby sy ny vorona sy ny biby mandady sy mikisaka ary ny hazandrano koa.'
mg1865::mg_11::5::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nisy tonga avy tany amin''ny firenena rehetra mba hihaino ny fahendren''i Solomona, dia avy amin''ny mpanjakan''ny tany rehetra izay efa nahare ny amin''ny fahendreny.'
mg1865::mg_11::5::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny namorian''i Solomona izay ho enti-manao ny tempoly'
  verse_text: 'Ary Hirama, mpanjakan''i Tyro, naniraka ny mpanompony ho any amin''i Solomona, satria reny fa izy no voahosotra ho mpanjaka handimby an-drainy; fa Hirama dia sakaizan''i Davida hatrizay ela izay.'
mg1865::mg_11::5::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona naniraka tany amin''i Hirama hanao hoe:'
mg1865::mg_11::5::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao fa Davida raiko tsy nahavita trano ho an''ny anaran''i Jehovah Andriamaniny noho ny ady nanodidina azy, ambara-panaon''i Jehovah ireo ho eo ambanin''ny faladiany.'
mg1865::mg_11::5::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny Jehovah Andriamanitro efa nanome ahy fitsaharana amin''ny manodidina, ka tsy misy fahavalo na loza manjo intsony.'
mg1865::mg_11::5::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, izaho mikasa hanao trano ho an''ny anaran''i Jehovah Andriamanitro, araka ilay nolazain''i Jehovah tamin''i Davida raiko hoe: Ny zanakao izay hapetrako eo amin''ny seza fiandriananao handimby anao, izy no hanao trano ho an''ny anarako.'
mg1865::mg_11::5::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: '2022-04-28T05:08:48+0000'
  verse_title: null
  verse_text: 'Koa dia mba asaovy misy mikapa hazo sedera any Libanona ho ahy; ary ny vahoakako hiaraka amin''ny vahoakanao, ka ny karaman''ny vahoakanao dia homeko anao araka izay hotononinao; fa fantatrao fa tsy mba misy olona aty aminay mahay mikapa hazo tahaka ny Sidoniana.'
mg1865::mg_11::5::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Hirama ny tenin''i Solomona, dia faly indrindra izy ka nanao hoe: Ankehitriny izao dia isaorana anie Jehovah, Izay nanome zanakalahy hendry ho Davida hanapaka izao olona betsaka izao.'
mg1865::mg_11::5::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama naniraka tany amin''i Solomona hanao hoe: Efa reko ny nanirahanao taty amiko; koa izaho dia hanao izay rehetra irinao ny amin''ny hazo sedera sy ny hazo kypreso.'
mg1865::mg_11::5::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahoakako hitondra azy midina avy any Libanona ho any amin''ny ranomasina, ary hofeheziko ka hampandehaniko mitsinkafona amin''ny rano ho any amin''izay hotononinao, ary any vao hoberahiko izy, ka dia ianao kosa no hampaka azy; ary ianao dia hanao izay iriko amin''ny fanomezan-kanina ho an''ny ankohonako.'
mg1865::mg_11::5::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama dia nanome hazo sedera sy hazo kypreso ho an''i Solomona araka izay rehetra nilainy.'
mg1865::mg_11::5::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona kosa nanome an''i Hirama vary tritika roa alina kora ho an''ny ankohonany ary diloilo roa-polo kora avy amin''ny oliva voatoto; izany no nomen''i Solomona an''i Hirama isan-taona isan-taona.'
mg1865::mg_11::5::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanome fahendrena an''i Solomona, araka izay nolazainy taminy; ary nihavana Hirama sy Solomona, ka nanao fanekena izy roa lahy.'
mg1865::mg_11::5::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka naka olona tamin''ny Isiraely rehetra hanao fanompoana, ka olona telo alina no nalainy.'
mg1865::mg_11::5::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nirahiny nankany Libanona ireny, dia iray alina no indray milatsaka isam-bolana; iray volana izy no tany Libanona, ary roa volana kosa mba tany an-tranony; ary Adonirama no nifehy azy rehetra.'
mg1865::mg_11::5::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanana mpitondra entana fito alina sy tambato* valo alina teny an-tendrombohitra, [*Na: mpikapa hazo]'
mg1865::mg_11::5::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy ny lehiben''ireo olona voatendrin''i Solomona ireo, izay nitandrina ny raharaha, dia telonjato amby telo arivo lahy izay nifehy ny mpiasa.'
mg1865::mg_11::5::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka dia nandidy hanamboatra vato vaventy tsara sady voapaika hatao fanorenan''ny trano.'
mg1865::mg_11::5::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiasan''i Solomona sy Hirama (indrindra fa ny avy any Gebala) no nipaika sy nanamboatra ny hazo sy ny vato hatao trano.'
mg1865::mg_11::6::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanaovana ny tempoly'
  verse_text: 'Ary tamin''ny taona fahavalo-polo amby efa-jato taorian''ny nialan''ny Zanak''Isiraely tamin''ny tany Egypta tamin''ny volana Ziva (volana faharoa izany), tamin''ny taona fahefatra nanjakan''i Solomona tamin''ny Isiraely, dia nanorina ny tranon''i Jehovah izy.'
mg1865::mg_11::6::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano nataon''i Solomona mpanjaka ho an''i Jehovah dia enim-polo hakiho ny lavany, ary roa-polo hakiho ny sakany, ary telo-polo hakiho ny hahavony.'
mg1865::mg_11::6::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lavarangana fidirana teo anoloan''ny ati-trano lehibe, dia roa-polo hakiho ny lavany mifanerana amin''ny sakan''ny trano, ary folo akiho ny habeny teo anoloan''ny trano ihany.'
mg1865::mg_11::6::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varavarankelin''ny trano nataony makarakara tsy mivoha.'
mg1865::mg_11::6::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny lafin-trano dia nasiany paosin-trano mifanongoa manodidina, na amin''ny ati-trano lehibe, na amin''ny efitra atiny, sady nasiany efi-trano manodidina;'
mg1865::mg_11::6::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny efi-trano ambany indrindra, dimy hakiho ny sakany, ary ny an-tenatenany, enina hakiho ny sakany, ary ny fahatelony, dia fito hakiho sakany; fa ny rindrina ivelan''ny trano dia ahenany manodidina isaky ny mifanongoa, mba tsy hisy hitsatoka amin''ny rindrina.'
mg1865::mg_11::6::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny nanaovana ny trano dia vato voapaika rahateo hatrany amin''ny fihadiam-bato no nanaovany azy: ka dia tsy nisy feon''ny tantanana, na fandraka, na vy fiasana, re tao an-trano tamin''ny nanaovany azy.'
mg1865::mg_11::6::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny varavarana mankao amin''ny efi-trano an-tenatenany dia teo amin''ny ilany ankavanan''ny trano; ary tohatra miolikolika no niakarany ho ao amin''ny efi-trano an-tenatenany, ary avy tao amin''ny an-tenatenany indray no niakarany ho ao amin''ny fahatelony.'
mg1865::mg_11::6::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nanaovany ny trano sy nahavitany azy; ary rairainy nopetahany hazo fisaka sedera no nataony tafon''ny trano.'
mg1865::mg_11::6::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny paosin-trano nataony manodidina ny trano, dimy hakiho avy ny hahavony, ary hazo sedera no nikambanany tamin''ny trano.'
mg1865::mg_11::6::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah tonga tamin''i Solomona nanao hoe:'
mg1865::mg_11::6::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ity trano ataonao, ity raha handeha araka ny lalako ianao sy hanaraka ny fitsipiko ary hitandrina ny didiko rehetra ka hanaraka azy, dia hotanterahiko aminao ny teniko, izay nolazaiko tamin''i Davida rainao;'
mg1865::mg_11::6::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hitoetra ao amin''ny Zanak''Isiraely Aho ka tsy hahafoy ny Isiraely oloko.'
mg1865::mg_11::6::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''i Solomona ny trano, ka dia vitany.'
mg1865::mg_11::6::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rindrina anatiny nopetahany hazo sedera; hatramin''ny vodi-rindrina ka hatramin''ny loha-rindrina dia nopetahany hazo avokoa ary hazo kypreso no nataony gorodon''ny trano.'
mg1865::mg_11::6::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny roa-polo hakiho hatreo amin''ny rindrina farany dia nasiany efitra hazo sedera hatramin''ny vodirindrina ka hatramin''ny loha-rindrina, ary nataony ho efitra anatiny izany, dia ny fitoerana masina indrindra.'
mg1865::mg_11::6::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lavan''ny ati-trano lehibe teo anoloan''io dia efa-polo hakiho.'
mg1865::mg_11::6::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sedera amin''ny ati-trano dia nosoratany nasiany sarin''ny voantango sy voninkazo mivelatra; sedera avokoa izy, ka tsy nisy vato niseho.'
mg1865::mg_11::6::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanisy efitra anatiny tao anatin''ny trano izy hametrahany ny fiaran''ny faneken''i Jehovah.'
mg1865::mg_11::6::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo anoloan''ny efitra anatiny roa-polo hakiho ny lavany, ary roa-polo hakiho ny sakany, roa-polo hakiho koa ny hahavony, sady voapetaka takela-bolamena tsara izy dia nopetahany hazo sedera ny alitara.'
mg1865::mg_11::6::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopetahan''i Solomona takela-bolamena tsara indrindra ny atin''ny trano; sady nasiany vakoka volamena hisakana eo anoloan''ny efitra anatiny; ary nopetahany takela-bolamena koa ny alitara.'
mg1865::mg_11::6::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao ati-trano rehetra izao dia nopetahany takela-bolamena avokoa; ary ny alitara momba ny efitra anatiny koa dia nopetahany takela-bolamena avokoa.'
mg1865::mg_11::6::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao anatin''ny efitra anatiny dia nasiany kerobima hazo oliva roa. samy folo hakiho avy no hahavony.'
mg1865::mg_11::6::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy dimy hakiho avy ny elatry ny kerobima iray, dia folo hakiho hatramin''ny tendron''elany anankiray ka hatramin''ny tendron''elany anankiray.'
mg1865::mg_11::6::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kerobima iray koa folo hakiho; fa ny kerobima roa mitovy halehibe sy mitovy tarehy:'
mg1865::mg_11::6::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Folo hakiho ny hahavon''ny kerobima iray, ary tahaka io ihany koa ny kerobima anankiray.'
mg1865::mg_11::6::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kerobima nataony tao afovoan''ny trano anatiny; ary ny elany nataony mivelatra, ka ny ilany samy nipaka tamin''ny rindrina avy, ary ny ilany nifanendry teo afovoan''ny trano.'
mg1865::mg_11::6::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopetahany takela-bolamena ny kerobima.'
mg1865::mg_11::6::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rindrina manodidina nosoratany nasiany sarin''ny kerobima sy hazo rofia* ary voninkazo mivelatra, na ny efitra anatiny, na ny ati-trano lehibe. [*palma]'
mg1865::mg_11::6::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nopetahany takela-bolamena ny gorodona, na ny teo amin''ny efi-trano anatiny, na ny teo amin''ny ati-trano lehibe.'
mg1865::mg_11::6::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varavarana mankao amin''ny efitra anatiny dia nasiany lela-varavarana hazo oliva kopa-droa, ary ny tolany sy ny momba azy dia ampahadimin''ny sakan-trano. [*palma]'
mg1865::mg_11::6::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lela-varavarana hazo oliva kopa-droa dia nosoratany nasiany sarin''ny kerobima sy hazo rofia* ary voninkazo mivelatra, ary, nopetahany volamena manify ny kerobima: sy ny hazo rofia. [*palma]'
mg1865::mg_11::6::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany koa ny varavarana mankao amin''ny ati-trano lehibe, dia nasiany tolam-baravarana hazo oliva mahafeno ny ampahefatry ny sahan-trano.'
mg1865::mg_11::6::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lela-varavarana hazo kypreso kopa-droa dia kamban-droa samy nisy savily avy.'
mg1865::mg_11::6::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nosoratany nasiany sarin''ny kerobima sy ny hazo rofia ary voninkazo mivelatra ireo, dia nopetahany volamena manify ny sorany.'
mg1865::mg_11::6::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny kianja tao anatiny tamin''ny vato voapaika telo andalana sy hazo sedera iray andalana izy.'
mg1865::mg_11::6::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny volana Ziva tamin''ny taona fahefatra, no; nanaovany ny fanorenan''ny tranon''i Jehovah.'
mg1865::mg_11::6::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 6
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny volana Bola (volana fahavalo izany), tamin''ny taona fahiraika ambin''ny folo, no nahavitany ny trano araka ny fombany rehetra sy izay rehetra nahamety azy. Dia fito taona no nanaovany azy.'
mg1865::mg_11::7::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanaovan''i Solomona ny lapany'
  verse_text: 'Ary telo ambin''ny folo taona no nanaovan''i Solomona ny lapany, dia vita.'
mg1865::mg_11::7::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanao ilay trano Alan''i Libanona izy: zato hakiho ny lavany, dimam-polo hakiho ny sakany, ary telo-polo hakiho ny hahavony, teo ambonin''ny andry sedera efatra andalana mbamin''ny sedera rairainy teo ambonin''ny andry.'
mg1865::mg_11::7::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo efi-trano teo ambonin''ny andry notafoany hazo sedera; ary ny isany dia dimy ambin''ny folo isan''andalana, ka dimy amby efa-polo izy rehetra.'
mg1865::mg_11::7::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rairainy dia telo andalana, ary ny varavarankely dia nifanandrify intelo.'
mg1865::mg_11::7::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varavarana rehetra sy ny tolana dia natao efa-joro; ary ny varavarankely nifanandrify intelo.'
mg1865::mg_11::7::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nataony koa ny lavarangana maro andry; dimam-polo hakiho ny lavany, ary telo-polo hakiho ny sakany; nisy koa ny lavarangana fidirana teo anoloany; ary nisy andry sy tokonana koa teo anoloan''io.'
mg1865::mg_11::7::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony koa ny lavarangana hitoeran''ny seza fiandrianana izay hitsarany, dia ny lavarangana fitsarana; ary nataony hazo sedera avokoa ny gorodona rehetra*. [*Na: na ny gorodony, na ny rihana]'
mg1865::mg_11::7::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tranony izay nitoerany teo amin''ny kianja hafa tao anatinatiny kokoa noho ny lavarangana fidirana dia nitovy rafitra tamin''io koa. Ary Solomona nanao trano tahaka izany lavarangana fidirana izany koa ho an''ny zanakavavin''i Farao, izay efa nampakariny ho vady.'
mg1865::mg_11::7::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany dia vato tsara avokoa voapaika araka ny marika, sady voatsofa ny atiny sy ny ivelany, hatramin''ny fanambaniny ka hatramin''ny tongolany, ary teo ivelany koa hatramin''ny kianja lehibe.'
mg1865::mg_11::7::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vato tsara sady lehibe ny fanorenany, dia vato folo hakiho sy valo hakiho.'
mg1865::mg_11::7::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ambony nisy vato tsara voapaika araka ny marika sy hazo sedera;'
mg1865::mg_11::7::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manodidina ny kianja lehibe dia nasiany vato voapaika telo andalana sy hazo sedera iray andalana, tahaka ny amin''ny kianja anatiny amin''ny tranon''i Jehovah sy amin''ny lavarangana fidirana amin''ny trano.'
mg1865::mg_11::7::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nanaovan''i Solomona ny fanaka momba ny tempoly'
  verse_text: 'Ary Solomona mpanjaka naniraka haka an''i Hirama avy tany Tyro.'
mg1865::mg_11::7::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zanaky ny vehivavy mpitondra-tena tamin''ny firenen''i Naftaly izy, nefa rainy dia lehilahy Tyriana, mpiasa varahina; feno fahendrena sy fahiratan-tsaina ary fahaizana izy hahavitany ny asa varahina rehetra. Dia tonga tao amin''i Solomona mpanjaka Hirama ka nanao izay asa rehetra tao aminy.'
mg1865::mg_11::7::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao ny andry varahina roa izy: valo ambin''ny folo hakiho avy ny hahavony, ary roa ambin''ny folo hakiho ny manodidina azy*. [*Hebreo: ny faharoa]'
mg1865::mg_11::7::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao kapitaly varahina roa anidina izy hatao eo amin''ny tampon''ny andry: dimy hakiho avy ny hahavony,'
mg1865::mg_11::7::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary harato sy fesitona miolana amin''ny kapitaly izay teo amin''ny tampon''ny andry avy: fito amin''ny kapitaly iray, ary fito koa amin''ny kapitaly iray.'
mg1865::mg_11::7::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny andry izy, ary nisy roa andalana manodidina tamin''ny asa harato iray, hafono ny kapitaly izay teo an-tampon''ny andry; ary toy izany koa no nataony tamin''ny kapitaly iray.'
mg1865::mg_11::7::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapitaly izay teo an-tampon''ny andry dia nataony mitarehim-boninkazo lilia tahaka ny amin''ny lavarangana fidirana, ary efatra hakiho ny hahavony;'
mg1865::mg_11::7::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny kapitaly teo an-tampon''ny andry roa dia teo ambony koa, teo akaikin''ny kibony izay anatin''ny harato; ary nisy sarin''ampongabendanitra roan-jato nifanandalana nanodidina ny kapitaly avy.'
mg1865::mg_11::7::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andry dia natsangany teo amin''ny lavarangana fidirana amin''ny efitra lehibe: ny andry ankavanana natsangany, ka ny anarany nataony hoe Jakina*; ary ny andry ankavia natsangany koa, ka ny anarany nataony hoe Boaza**. [*Jakina = Hampiorina izy] [**Boaza = Ao aminy no misy hery (?)]'
mg1865::mg_11::7::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy natao mitarehim-boninkazo lilia teo an-tampon''ny andry. Toy izany no nahavitany ny asa tamin''ny andry.'
mg1865::mg_11::7::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny tavin-drano* an-idina boribory lehibe izy, ka folo hakiho no halehiben''ny vavany ary dimy hakiho ny hahavony, ary telo-polo hakiho ny manodidina azy. [*Hebreo: ranomasina]'
mg1865::mg_11::7::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tambanin''ny molotry ny tavin-drano lehibe* manodidina nisy sarim-boantango manodidina azy, folo amin''ny iray hakiho manodidina ny tavin-drano lehibe*, ary naidiny ho roa andalana ny sarim-boantango sady niara-nataony an-idina tamin''ny tavin-drano. [*Hebreo: ranomasina]'
mg1865::mg_11::7::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tavin-drano dia nipetraka tambonin''ny sarin''omby roa ambin''ny folo; ny telo nanatrika ny avaratra, ny telo nanatrika ny andrefana, ny telo nanatrika ny atsimo, ary ny telo nanatrika ny atsinanana; ary ny tavin-drano lehibe* dia teo ambonin''ireo, ary niady vody izy rehetra. [*Hebreo: ranomasina]'
mg1865::mg_11::7::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hateviny dia vodivoam-pelatanana, ary ny molony nataony tahaka ny molotry ny kapoaka, dia tahaka ny vonin''ny lilia; ary nahalany roa arivo bata izy.'
mg1865::mg_11::7::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ny fitoeran-tavin-drano varahina folo izy: efatra hakiho ny lavan''ny anankiray, ary efatra hakiho koa ny sakany, ary telo hakiho ny hahavony.'
mg1865::mg_11::7::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izao ny asa amin''ireo fitoeran-tavin-drano ireo: nisy kobany izy, ary ireo kobany ireo dia teo anatin''ny sisiny;'
mg1865::mg_11::7::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tamin''ny kobany izay nohodidinin''ny sisiny dia nisy sarin-diona sy omby ary kerobima; ary teo ambonin''ny sisiny koa nisy faladiany; ary teo ambanin''ny sarin-diona sy omby nisy fesitona mihantona.'
mg1865::mg_11::7::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isan''ireo fitoeran-tavin-drano ireo nisy kodia varahina efatra sy tanan-kodia varahina, ary ny tongony efatra nisy sorony; teo ambanin''ny tavin-drano no nisy ny sorony* anidina manandrify ny fesitona tsirairay. [*Na: ary ny tongony efatra dia tonga sorony]'
mg1865::mg_11::7::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vavan''ny fitoeran-tavin-drano dia teo anatin''ny kapitaliny, ary mbola nisy iray hakiho teo ambonin''io; ary ny vavany dia hakiho iray sy tapany sady boribory tahaka ny amin''ny faladia, ary tamin''ny vavany koa nisy soratra, ary ny kobany teo aminy dia efajoro, fa tsy boribory.'
mg1865::mg_11::7::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kodia efatra dia teo ambanin''ny kobany; ary ny fihazonana ny tanan-kodia dia nikambana tamin''ny fitoeran-tavin-drano ihany; ary hakiho iray sy tapany ny hahavon''ny kodia.'
mg1865::mg_11::7::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fomban''ny kodia dia tahaka ny amin''ny kodian-kalesy: ny tanany sy ny boriboriny manodidina azy sy ny tanamasoandrony ary ny foitrany dia nataony an-idina avokoa.'
mg1865::mg_11::7::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy sorony efatra tamin''ny zorony efatra amin''ny fitoeran-tavin-drano iray, sady nitranga avy teo amin''ny fitoeran-tavin-drano ireo.'
mg1865::mg_11::7::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo an-tampon''ny fitoeran-tavin-drano dia nisy boribory manodidina, irain-jehy ny hahavony; ary teo an-tampon''ny fitoeran-tavin-drano koa ny fitombenany sy ny kobany dia natao an-idina iray aminy.'
mg1865::mg_11::7::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny koban''ny sorony sy ny kobany hafa nosoratany nasiany sarin''ny kerobima sy liona ary hazo rofia*, araka izay nahafeno azy avy, sady nasiany fesitona manodidina. [*palma]'
mg1865::mg_11::7::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka izany no nanaovany ny fitoeran-tavin-drano folo: samy natao an-idina avokoa, ary nitovy halehibe sy nitovy tarehy izy.'
mg1865::mg_11::7::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao tavin-drano varahina folo koa izy; ny tavin-drano samy nahalany efa-polo bata avy; ary samy efatra hakiho avy ny tavin-drano; ary tavin-drano iray avy no tamin''ny fitoerany folo.'
mg1865::mg_11::7::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nametraka ny fitoeran-tavin-drano dimy teo ankavanan''ny trano izy, ary ny dimy teo ankavian''ny trano, ary ilay tavin-drano lehibe* nataony teo ankavanan''ny trano, dia teo atsimo-atsinanana. [*Hebreo: ranomasina]'
mg1865::mg_11::7::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama nanao ny tavin-drano sy ny sotron''afo ary ny lovia famafazana; ka dia vitan''i Hirama ny asa rehetra izay nataony ho an''i Solomona mpanjaka ho amin''ny tranon''i Jehovah:'
mg1865::mg_11::7::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny andry roa sy ny boriboriny roa amin''ny kapitaly izay teny an-tampon''ny andry roa, sy ny harato roa izay hafono ny boriboriny roa amin''ny kapitaly izay teo an-tampon''ny andry avy,'
mg1865::mg_11::7::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sarin''ampongabendanitra efa-jato ho amin''ny harato roa, ampongabendanitra roa andalana ho amin''ny harato iray hafono ny boriboriny roa amin''ny kapitaly izay teny an-tampon''ny andry avy,'
mg1865::mg_11::7::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fitoeran-tavin-drano folo sy ny tavin-drano folo ho eo ambonin''ny fitoerany'
mg1865::mg_11::7::44:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tavin-drano lehibe* iray sy ny sarin''omby roa ambin''ny folo teo ambaniny. [*Hebreo: ranomasina]'
mg1865::mg_11::7::45:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny vilany fandraofan-davenona sy ny sotron''afo ary ny lovia famafazana. Ary ireo fanaka rehetra ireo, izay nataon''i Hirama ho an''i Solomona mpanjaka ho amin''ny tranon''1 Jehovah, dia varahina manganohano avokoa.'
mg1865::mg_11::7::46:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny tany amoron''i Jordana no nanaovan''ny mpanjaka an-idina azy tamin''ny tanimanga teo anelanelan''i Sokota sy Zaretana.'
mg1865::mg_11::7::47:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nolanjain''i Solomona ny fanaka rehetra, satria be loatra izy; ary tsy nozahana izay lanjan''ny varahina.'
mg1865::mg_11::7::48:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanao ny fanaka rehetra izay ao amin''ny tranon''i Jehovah: ny alitara volamena sy ny latabatra volamena, izay fitoeran''ny mofo aseho,'
mg1865::mg_11::7::49:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanaovan-jiro, dimy amin''ny ankavanana ary dimy amin''ny ankavia, teo anoloan''ny efitra anatiny, dia samy volamena tsara; ary ny voniny sy ny lela fanaovan-jiro ary ny hetin-jiro dia volamena koa;'
mg1865::mg_11::7::50:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny vilia sy ny antsy sy ny lovia famafazana sy ny lovia kely sy ny fitoeran-davenon-jiro dia volamena tsara; ary ny vavin-tsavily ho amin''ny lela-varavaran''ny efitra anatiny, dia ny fitoerana masina indrindra, sy ho amin''ny lela-varavaran''ny efi-trano lehibe dia volamena avokoa.'
mg1865::mg_11::7::51:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 7
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nahavitana ny asa nataon''i Solomona mpanjaka ho amin''ny tranon''i Jehovah; ary nampidirin''i Solomona ny zavatra izay efa nohamasinin''i Davida rainy, dia ny volafotsy sy ny volamena ary ny fanaka, sa nataony tao amin''ny rakitry ny tranon''i Jehovah.'
mg1865::mg_11::8::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitokanana ny tempoly'
  verse_text: 'Ary tamin''izany Solomona mpanjaka dia namory ny loholon''ny Isiraely sy ny lohan''ny firenena rehetra, dia ny lohan''ny fianakaviana tamin''ny Zanak''Isiraely, ho ao aminy tany Jerosalema mba hampakatra ny fiaran''ny faneken''i Jehovah avy ao Ziona. Tanànan''i Davida.'
mg1865::mg_11::8::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivory ho any amin''i Solomona mpanjaka ny lehilahy rehetra amin''ny Isiraely tamin''ny andro firavoravoana tamin''ny volana Etanima (volana fahafito izany).'
mg1865::mg_11::8::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga ny loholon''ny Isiraely rehetra, ary ny mpisorona no nitondra ny fiara;'
mg1865::mg_11::8::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary dia nampakariny ny fiaran''i Jehovah sy ny trano-lay fihaonana mbamin''ny fanaka masina rehetra izay tao amin''ny lay. Nampakarin''ny mpisorona sy ny Levita ireo zavatra ireo.'
mg1865::mg_11::8::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka sy ny fiangonana, dia ny Isiraely rehetra, izay nivory teo aminy teo anoloan''ny fiara, dia samy namono zavatra hatao fanatitra, dia ondry aman''osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany.'
mg1865::mg_11::8::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiaran''ny faneken''i Jehovah dia nampidirin''ny mpisorona ho ao amin''ny fitoerany tao anatin''ny efi-trano anatiny, dia ny fitoerana masina indrindra, teo ambanin''ny elatry ny kerobima,'
mg1865::mg_11::8::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nivelatra teo ambonin''ny fitoeran''ny fiara ny elatry ny kerobima ka nanaloka ny fiara sy ny baony.'
mg1865::mg_11::8::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lava ny bao, ka hita ny lohany, raha amin''ny fitoerana masina eo anoloan''ny efitra anatiny, nefa tsy hita raha eny ivelany; ary mbola ao mandraka androany izy.'
mg1865::mg_11::8::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy na inona na inona tao anatin''ny fiara afa-tsy ny vato fisaka roa, izay nataon''i Mosesy tao anatiny tany Horeba, fony Jehovah nanao fanekena tamin''ny Zanak''Isiraely tamin''ny nivoahany avy tany amin''ny tany Egypta.'
mg1865::mg_11::8::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nivoaka avy tao amin''ny fitoerana masina ny mpisorona, dia nameno ny tranon''i Jehovah ny rahona;'
mg1865::mg_11::8::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona, satria ny voninahitr''i Jehovah nameno ny tranon''i Jehovah.'
mg1865::mg_11::8::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Solomona: Jehovah efa nilaza fa hitoetra ao amin''ny aizim-pito Izy.'
mg1865::mg_11::8::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanao trano hitoeranao tokoa aho, dia fitoerana hitoeranao mandrakizay.'
mg1865::mg_11::8::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nitodika ka nitso-drano ny fiangonana, dia ny Isiraely rehetra (nitsangana avokoa ny fiangonana, dia ny Isiraely rehetra),'
mg1865::mg_11::8::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely, fa ny vavany efa niteny tamin''i Davida raiko, ary ny tanany no nahatanteraka izany taminy, dia ilay hoe:'
mg1865::mg_11::8::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny andro nitondrako ny Isiraely oloko nivoaka avy tany Egypta dia tsy mbola nisy tanàna nofidiko tamin''ny firenen''Isiraely rehetra hanaovana trano hitoeran''ny anarako; fa nifidy an''i Davida Aho hanapaka ny Isiraely oloko.'
mg1865::mg_11::8::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa mby tao am-pon''i Davida raiko ny hanao trano ho an''ny anaran''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_11::8::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy Jehovah tamin''i Davida raiko: Satria tao am-ponao ny fikasana hanao trano ho an''ny anarako, dia tsara izany fikasanao izany.'
mg1865::mg_11::8::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa tsy ianao no hanao ny trano, fa ny zanakao izay haterakao, izy no hanao ny trano ho an''ny anarako.'
mg1865::mg_11::8::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah efa nahatanteraka ny teniny izay nolazainy, koa nitsangana handimby an''i Davida raiko aho ary mipetraka eo amin''ny seza fiandrianan''ny Isiraely tahaka ny efa nolazain''i Jehovah, sady efa nanao ny trano ho an''ny anaran''i Jehovah, Andriamanitry ny Isiraely, aho.'
mg1865::mg_11::8::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiako fitoerana teo ho an''ny fiara izay itoeran''ny faneken''i Jehovah, ilay nataony tamin''ny razantsika fony Izy nitondra azy nivoaka avy tany Egypta.'
mg1865::mg_11::8::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nitsangana teo anoloan ny alitaran''i Jehovah teo anatrehan''ny fiangonana, dia ny Isiraely rehetra, ka namelatra ny tanany nanandrify ny lanitra'
mg1865::mg_11::8::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao hoe. Ry Jehovah, Andriamanitry ny Isiraely o. tsy misy Andriamanitra tahaka Anao na amin''ny lanitra ambony na amin''ny tany ambany, Izay mitandrina ny fanekenao sy ny famindram-ponao ho an''ny mpanomponao izay mandeha eo anatrehanao amin''ny fony rehetra,'
mg1865::mg_11::8::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa nahatanteraka tamin''i Davida raiko mpanomponao ilay nolazainao taminy, fa nolazain''ny vavanao izany dia notanterahin''ny tananao tahaka ny amin''izao anio izao.'
mg1865::mg_11::8::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tanteraho amin''i Davida raiko mpanomponao, Jehovah, Andriamanitry ny Isiraely o. ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako ianao hipetraka amin''ny seza fiandrianan''ny Isiraely, raha ny zanakao mitandrina ny alehany handehanany eo anatrehako tahaka ny nandehananao teo anatrehako.'
mg1865::mg_11::8::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny ry Andriamanitry ny Isiraely o, mifona aminao aho, aoka ho to anie ny teninao, izay nolazainao tamin''i Davida raiko mpanomponao.'
mg1865::mg_11::8::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra va dia honina ety an-tany tokoa? He! ny lanitra, ary ny lanitry ny lanitra aza tsy omby Anao, koa mainka fa ity trano nataoko ity!'
mg1865::mg_11::8::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa atreho ny fivavaka sy ny fifonan''ny mpanomponao, Jehovah Andriamanitro o, mba hohenoinao ny fitarainana sy ny fivavaka izay ataon''ny mpanomponao eto anatrehanao anio,'
mg1865::mg_11::8::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hihiratan''ny masonao andro aman''alina amin''ity trano ity, dia amin''ny fitoerana nolazainao hoe: Ho ao ny anarako hihainoanao ny vavaka izay ataon''ny mpanomponao manatrika ity fitoerana ity.'
mg1865::mg_11::8::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary henoy ny fifonan''ny mpanomponao sy ny Isiraely olonao, raha mivavaka manatrika ity fitoerana ity izy; dia mihainoa any an-danitra fonenanao Ianao; eny, mihainoa ka mamelà heloka.'
mg1865::mg_11::8::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona manota amin''ny namany, ary ampianianiny, ka tonga hianiana eo anoloan''ny alitaranao amin''ity trano ity izy,'
mg1865::mg_11::8::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra Ianao, ka manaova, ary mitsarà ny mpanomponao, hanameloka ny ratsy fanahy ka hampitsingerina ny nataony ho amin''ny lohany, ary hanamarina ny marina kosa ka hanome azy araka ny fahamarinany.'
mg1865::mg_11::8::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha resy eo anoloan''ny fahavalo ny Isiraely olonao noho ny nanotany taminao, ary miverina aminao sy manaiky ny anaranao indray ka mivavaka sy mifona aminao eto amin''ity trano ity izy,'
mg1865::mg_11::8::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra Ianao, ka mamelà ny fahotan''ny Isiraely olonao, ary ampodio amin''ny tany nomenao ny razany izy.'
mg1865::mg_11::8::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mihantona ny andro ka tsy misy ranonorana noho ny nanotan''ny olona taminao, ka mivavaka manatrika ity fitoerana ity izy ka manaiky ny anaranao sady miala amin''ny fahotany, satria ampahorinao,'
mg1865::mg_11::8::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra Ianao, ka mamelà ny fahotan''ny mpanomponao, dia ny Isiraely olonao satria atoronao azy ny lalana tsara izay tokony halehany, ary mandatsaha ranonorana amin''ny taninao, izay nomenao ho lovan''ny olonao.'
mg1865::mg_11::8::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mosary amin''ny tany, na areti-mandringana, na mainan''ny rivotra ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin''ny taniny, dia ao amin''ny tanànany, na inona fahoriana, na inona aretina,'
mg1865::mg_11::8::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay vavaka rehetra sy fifonana rehetra ataon''olona, na ny Isiraely olonao rehetra, izay samy mahalala ny fahorian''ny fony avy, ka mamelatra ny tanany manatrika ity trano ity izy'
mg1865::mg_11::8::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra fonenanao Ianao, ka mamelà heloka, ary manaova, ka omeo ny olonao araka ny alehany rehetra, fa fantatrao ny fony (fa Ianao dia Ianao irery ihany no mahalala ny fon''ny zanak''olombelona rehetra),'
mg1865::mg_11::8::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hatahorany Anao amin''Izay andro rehetra hiainany ety amin''ny tany nomenao ny razanay.'
mg1865::mg_11::8::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary henoy koa ny vahiny izay tsy isan''ny Isiraely olonao, fa tonga avy any amin''ny tany lavitra noho ny amin''ny anaranao izy'
mg1865::mg_11::8::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa ho reny ny anaranao lehibe sy ny tananao mahery ary ny sandrinao ahinjitra), koa raha avy izy ka mivavaka manatrika ity trano ity,'
mg1865::mg_11::8::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa any an-danitra fonenanao Ianao, ka manaova araka izay rehetra iantsoan''ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin''ny tany ny anaranao hatahorany Anao tahaka ny ataon''ny Isiraely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina tamin''ity trano nataoko ity.'
mg1865::mg_11::8::44:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoaka hiady amin''ny fahavalon''ny olonao, na ho aiza na ho aiza no hanirahanao azy, ka mivavaka amin''i Jehovah manandrify ny tanàna izay nofidinao sy ny trano izay nataoko ho an''ny anaranao izy,'
mg1865::mg_11::8::45:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia henoy any an-danitra ny fivavany sy ny fifonany, ka omeo rariny izy.'
mg1865::mg_11::8::46:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manota aminao izy (fa tsy misy olombelona tsy manota), ka tezitra aminy Ianao ary manolotra azy eo anoloan''ny fahavalony, ka dia ho entin''ny mpamabo ho babo any amin''ny tanin''ny fahavalo izy, na ho lavitra na ho akaiky.'
mg1865::mg_11::8::47:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mahatsiaro any amin''ny tanin''ireo namabo azy ireo izy, ka mibebaka sy mifona aminao any amin''ny tany izay nitondrany azy ho babo ary manao hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao ratsy.'
mg1865::mg_11::8::48:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia miverina aminao amin''ny fony rehetra sy ny fanahiny rehetra ao amin''ny tanin''ny fahavalony izay namabo azy izy, ary mivavaka aminao manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay nataoko ho an''ny anaranao,'
mg1865::mg_11::8::49:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia henoy any an-danitra fonenanao ny fivavany sy ny fifonany, ka omeo rariny izy;'
mg1865::mg_11::8::50:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, mamelà ny heloky ny olonao izay nanota taminao sy ny fahadisoany rehetra izay nataony taminao, ary ataovy mahazo famindram-po amin''izay mamabo azy izy, dia ny hamindran''ireo fo aminy;'
mg1865::mg_11::8::51:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa olonao sy lovanao izy, izay nentinao nivoaka avy tany Egypta, dia avy tao amin''ny memy fandrendreham-by,'
mg1865::mg_11::8::52:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hihiratan''ny masonao amin''ny fifonan''ny mpanomponao sy ny fifonan''ny Isiraely olonao hihaino azy amin''izay rehetra iantsoany Anao.'
mg1865::mg_11::8::53:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah, Tompo o no nanavaka azy tamin''ny firenena rehetra ambonin''ny tany ho lovanao, araka izay nampilazainao an''i Mosesy mpanomponao tamin''ny nitondranao ny razanay nivoaka avy tany Egypta.'
mg1865::mg_11::8::54:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita izany vavaka sy fifonana vehetra nataon''i Solomona tamin''i Jehovah: any, dia nitsangana niala teo amin''ny alitaran''i Jehovah izay efa nandohalehan''ny lohaliny sy efa namelarany ny tanany ho amin''ny lanitra izy.'
mg1865::mg_11::8::55:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana izy ka nitso-drano ny fiangonana, dia ny Isiraely rehetra, tamin''ny feo mahery hoe:'
mg1865::mg_11::8::56:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah, izay nanome fitsaharana ho an''ny Isiraely olony araka izay rehetra nolazainy; tsy misy latsaka na dia teny iray aza tamin''izay teny soa rehetra nampilazainy an''i Mosesy mpanompony.'
mg1865::mg_11::8::57:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitsika anie no amintsika, tahaka ny tamin''ny razantsika; aoka tsy handao na hahafoy antsika Izy,'
mg1865::mg_11::8::58:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampanatoniny Azy ny fontsika handehanantsika amin''ny lalany rehetra sy hitandremantsika ny lalàny sy ny didiny ary ny fitsipiny izay nandidiany ny razantsika.'
mg1865::mg_11::8::59:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka izany teny nifonako teto anatrehan''i Jehovah izany ho ao amin''i Jehovah Andriamanitsika andro aman''alina, mba hanomezany rariny ho ahy mpanompony sy ny Isiraely olony araka izay tandrifiny ho azy isan''andro,'
mg1865::mg_11::8::60:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho fantatry ny firenena rehetra ambonin''ny tany fa Jehovah no Andriamanitra, fa tsy misy afa-tsy Izy.'
mg1865::mg_11::8::61:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho marina amin''i Jehovah Andriamanitsika anie ny fonareo, handehananareo amin''ny didiny sy hitandremanareo ny lalàny, tahaka ny amin''izao anio izao.'
mg1865::mg_11::8::62:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka sy ny Isiraely rehetra teo aminy dia namono zavatra hatao fanatitra eo anatrehan''i Jehovah.'
mg1865::mg_11::8::63:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona namono zavatra hatao fanati-pihavanana, Izay nateriny ho an''i Jehovah, dia omby roa arivo amby roa alina sy ondry aman''osy roa alina amby iray hetsy. Toy izany no nitokanan''ny mpanjaka sy ny Zanak''Isiraely rehetra ny tranon''i Jehovah.'
mg1865::mg_11::8::64:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary androtr''io ihany no nanamasinan''ny mpanjaka ny afovoan''ny kianja izay teo anoloan''ny tranon''i Jehovah; fa teo no nanaterany fanatitra dorana sy fanatitra hohanina ary ny saboran''ny fanati-pihavanana; fa kely loatra ny alitara varahina izay teo anatrehan''i Jehovah ka tsy omby ny fanatitra dorana sy ny fanatitra hohanina ary ny saboran''ny fanati-pihavanana.'
mg1865::mg_11::8::65:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany Solomona sy ny Isiraely rehetra teo aminy, dia fiangonana lehibe hatrany akaikin''i Hamata ka hatramin''ny lohasahan-driak''i Egypta, dia nitandrina ny andro firavoravoana teo anatrehan''i Jehovah Andriamanitsika hafitoana indroa, dia efatra ambin''ny folo andro.'
mg1865::mg_11::8::66:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 8
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny andro fahavalo dia nampodiny ny olona, ary nisaotra andriana izy, dia lasa nandeha ho any an-dainy avy, sady faly no ravoravo ny fony noho ny soa rehetra nataon''i Jehovah tamin''i Davida mpanompony sy ny Isiraely olony.'
mg1865::mg_11::9::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny valin''ny vavaka nataon''i Solomona'
  verse_text: 'Ary rehefa vitan''i Solomona ny nanaovany ny tranon''i Jehovah sy ny lapan''ny mpanjaka araka izay rehetra efa niriny hatao,'
mg1865::mg_11::9::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niseho tamin''i Solomona indray Jehovah tahaka ilay nisehoany taminy tao Gibeona.'
mg1865::mg_11::9::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Efa reko ny vavakao sy ny fifonanao izay nataonao teo anatrehako; koa efa nohamasiniko ity trano nataonao ity mba hampitoerana ny anarako mandrakizay: ary ho amin''ity mandrakariva ny masoko sy ny foko.'
mg1865::mg_11::9::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ianao handeha eo anatrehako tahaka ny nandehanan''i Davida rainao tamin''ny fahitsian''ny fo sy ny fahamarinana ka hanao araka izay rehetra nandidiako anao ary hitandrina ny didiko sy ny fitsipiko,'
mg1865::mg_11::9::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hampitoeriko mandrakizay amin''ny Isiraely ny seza fiandrianan''ny fanjakanao, araka ilay nolazaiko tamin''i Davida rainao hoe: Tsy ho diso zanakalahy amin''ny seza fiandrianan''ny Isiraely ianao.'
mg1865::mg_11::9::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miala amin''ny fanarahana Ahy kosa ianareo na ny zanakareo ka tsy mitandrina ny lalàko sy ny didiko, izay nataoko teo anoloanareo, fa mandeha manompo andriamanikafa sy miankohoka eo anatrehany,'
mg1865::mg_11::9::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hofongorako tsy ho amin''ny tany izay nomeko azy ny Isiraely; ary ity trano izay nohamasiniko ho an''ny anarako ity dia hofongorako tsy ho eo imasoko; ary ny Isiraely ho tonga ohabolana sy ambentinteny any amin''ny firenena rehetra;'
mg1865::mg_11::9::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary na dia avo aza ity trano ity, dia mbola hitalanjonan''izay rehetra mandalo izy sady hisitrisirany ka hanaovany hoe: Naninona re no dia nataon''i Jehovah toy izao ity tany sy ity trano ity?'
mg1865::mg_11::9::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy hamaly hoe: Satria ny olona nahafoy an''i Jehovah Andriamaniny, Izay nitondra ny razany nivoaka avy tany amin''ny tany Egypta, ary nikikitra tamin''andriamani-kafa sy niankohoka teo anatrehany ka nanompo azy, dia izany no nampidiran''i Jehovah izao loza rehetra izao taminy.'
mg1865::mg_11::9::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpiasan''i Solomona sy ny zavatra nentiny nanao ny tempoly'
  verse_text: 'Ary nony afaka ny roa-polo taona nanaovan''i Solomona ny trano roa, dia ny tranon''i Jehovah sy ny lapan''ny mpanjaka'
mg1865::mg_11::9::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: '(Hirama, mpanjakan''i Tyro, nanome an''i Solomona hazo sedera sy hazo kypreso ary volamena, araka izay rehetra niriny), dia nomen''i Solomona tanàna roa-polo tany amin''ny tany Galilia kosa Hirama.'
mg1865::mg_11::9::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama niala tany Tyro hizaha ny tanàna izay nomen''i Solomona azy, ka tsy tiany ireny.'
mg1865::mg_11::9::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Hatao inona ireo tanàna nomenao ahy ireo, ry rahalahiko? Ary ireny dia natao hoe tany Kobola mandraka androany.'
mg1865::mg_11::9::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama nampanatitra talenta volamena roa-polo amby zato ho an''ny mpanjaka.'
mg1865::mg_11::9::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no toetry ny fanompoana nampanaovin''i Solomona mpanjaka ny olona, tamin''ny nanaovany ny tranon''i Jehovah sy ny lapan''andriana ary Milo* sy ny màndan''i Jerosalema, sy Hazora sy Megido ary Gazera [*Hebreo: fiarovana]'
mg1865::mg_11::9::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa Farao, mpanjakan''i Egypta, efa niakatra, dia nahafaka an''i Gazera ka nandoro azy tamin''ny afo; ary ny Kananita izay nitoetra tao an-tanàna dia novonoiny, ary ny tanàna dia nomeny ho haren-jazavavy ho an''ny zananivavy, vadin''i Solomona),'
mg1865::mg_11::9::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary, Solomona nanamboatra an''i Gazera sy Beti-horona ambany'
mg1865::mg_11::9::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Baleta sy Tadmora any an''efitra, amin''ny tany Samata,'
mg1865::mg_11::9::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tanàna fitehirizana rehetra izay nananan''i Solomona sy ny tanàna fitoeran''ny kalesy sy ny tanàna fitoeran''ny mpitaingin-tsoavaly sy izay tian''i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin''ny tany nanjakany rehetra.'
mg1865::mg_11::9::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa rehetra tamin''ny Amorita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan''ny Zanak''Isiraely,'
mg1865::mg_11::9::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny taranany izay sisa nandimby azy teo amin''ny tany, izay tsy azon''ny Isiraely naringana* avokoa, no nampanaovin''i Solomona fanompoana mandraka androany. [*Hebreo: natao herema]'
mg1865::mg_11::9::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''Isiraely dia tsy mba nampanaovin''i Solomona izany; fa izy kosa no miaramila sy mpanompony sy komandy sy mpanafika malaza sy komandin''ny kalesiny sy ny mpitaingin-tsoavaliny.'
mg1865::mg_11::9::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no isan''ny mpifehy ny olona voatendry izay nitandrina ny asan''i Solomona: dimam-polo amby dimam-jato lahy no mpifehy ny mpiasa.'
mg1865::mg_11::9::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niakatra avy any an-Tanànan''i Davida ny zanakavavin''i Farao hankany amin''ny tranony izay nataon''i Solomona ho azy, dia nanao an''i Milo* koa izy. [*Hebreo: fiarovana]'
mg1865::mg_11::9::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary intelo isan-taona no nanateran''i Solomona fanatitra dorana sy fanati-pihavanana teo ambonin''ny alitara izay naoriny ho an''i Jehovah, sady nandoro ditin-kazo manitra teo ambonin''ny alitara teo anatrehan''i Jehovah izy. Ka toy izany no nahavitany ny trano.'
mg1865::mg_11::9::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka nanao sambo tao Ezion-gebera, izay ao anilan''i Elota, ao amoron''ny Ranomasina Mena, amin''ny tany Edoma.'
mg1865::mg_11::9::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hirama nampandeha ny vahoakany tamin''ny sambo, dia matilà izay nahay ranomasina, hiaraka amin''ny vahoakan''i Solomona.'
mg1865::mg_11::9::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankany Ofira ireo, dia naka talenta volamena roa-polo amby efa-jato, ka nentiny tany amin''i Solomona mpanjaka izany.'
mg1865::mg_11::10::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'My namangian''ny mpanjakavavin''i Sheba an''i Solomona'
  verse_text: 'Ary ny mpanjakavavin''i Sheba, rehefa nahare ny lazan''i Solomona ny amin''ny anaran''i Jehovah. dia avy hizaha toetra azy amin''ny fanontaniana sarotra,'
mg1865::mg_11::10::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tonga tany Jerosalema izy mbamin''ny mpanaraka maro be sy ny rameva izay nitondra zava-manitra sy volamena sesehena ary vato soa; ary rehefa tonga tany amin''i Solomona izy, dia nilaza taminy izay rehetra tao ampony.'
mg1865::mg_11::10::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voavalin''i Solomona izy tamin''izay rehetra nanontaniany azy; tsy nisy zavatra niafina tamin''ny mpanjaka, ka dia nambarany azy avokoa.'
mg1865::mg_11::10::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ilay mpanjakavavin''i Sheba ny fahendren''i Solomona rehetra sy ny trano izay nataony'
mg1865::mg_11::10::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny fihinany teo amin''ny latabany sy ny fipetrahan''ny tandapany sy ny fitoeran''ny mpanompony mbamin''ny fitafian''ireo sy ny mpitondra kapoakany ary ny ambaratonga izay niakarany ho ao* an-tranon''i Jehovah, dia talanjona tery izy. [*Na: ny fanatitra odorany izay nateriny tao]'
mg1865::mg_11::10::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy izy tamin''ny mpanjaka: Marina ny teny efa reko tany amin''ny taniko ny amin''ny teninao sy ny fahendrenao.'
mg1865::mg_11::10::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa tsy nino ny filazana aho, raha tsy tonga aty, ka ny masoko no mahita, kanjo hay! na dia ny antsasany aza tsy voalaza tamiko akory: fa, indro, ny fahendrenao sy ny voninahitrao dia mihoatra lavitra noho izay laza efa reko.'
mg1865::mg_11::10::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra lahy ny olonao, ary sambatra ireto tandapanao ireto, izay mijanona eto anatrehanao mandrakariva ka mandre ny fahendrenao'
mg1865::mg_11::10::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah Andriamanitrao, Izay tia anao ka nametraka anao amin''ny seza fiandrianan''ny Isiraely; fa noho ny fitiavan''i Jehovah, izay itiavany ny Isiraely mandrakizay, no nanaovany anao ho mpanjaka mba hanao fitsarana sy fahamarinana.'
mg1865::mg_11::10::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanome talenta volamena roa-polo amby zato sy zava-manitra sesehena ary vato soa ho an''ny mpanjaka; tsy nisy intsony zava-manitra be indrindra tonga tahaka ilay nomen''ny mpanjakavavin''i Sheba ho an''i Solomona mpanjaka.'
mg1865::mg_11::10::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sambon''i Hirama koa, izay naka volamena avy any Ofira, dia nitondra hazo almoga be indrindra sy vato soa avy any Ofira.'
mg1865::mg_11::10::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hazo almoga dia nataon''ny mpanjaka arofanina tamin''ny tranon''i Jehovah sy ny lapan''andriana ary nataony lokanga sy valiha ho an''ny mpihira kosa; tsy nisy hazo almoga tonga tany na hita toy izany intsony mandraka androany.'
mg1865::mg_11::10::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka nanome ny mpanjakavavin''i Sheba kosa izay rehetra niriny, na inona na inona nangatahiny, afa-tsy izay nomeny azy araka ny fanomen''i Solomona mpanjaka; ka dia niverina izy, ary lasa nody tany amin''ny taniny izy mbamin''ny mpanompony.'
mg1865::mg_11::10::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny varotra nataon''i Solomona mbamin''ny hareny sy ny voninahiny'
  verse_text: 'Ary ny lanjan''ny volamena izay tonga tao amin''i Solomona isan-taona dia talenta volamena enina amby enim-polo amby enin-jato,'
mg1865::mg_11::10::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy izay azony tamin''ny mpandranto.sy ny tamin''ny varotry ny mpivarotra ary tamin''ny mpanjakan''ny firenena samy hafa rehetra sy tamin''ny mpanapaka ny tany.'
mg1865::mg_11::10::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka nanao ampinga volamena lehibe roan-jato tamin''ny volamena voafisaka, ka takela-bolamena sekely enin-jato no napetaka tamin''ny ampinga lehibe iray.'
mg1865::mg_11::10::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ampinga volamena telonjato koa izy tamin''ny volamena voafisaka, ka takela-bolamena telo mane no napetaka tamin''ny ampinga iray. Dia napetraky ny mpanjaka tao amin''ny trano Alan''i Libanona ireo.'
mg1865::mg_11::10::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka dia nanao seza fiandrianana ivory lehibe, ka nopetahany takela-bolamena tsara indrindra.'
mg1865::mg_11::10::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy ambaratonga enina tamin''ny seza fiandrianana; ary ny lohan''ny seza fiandrianana, dia boribory ny eo an damosiny; ary nisy fitehenan-tanana teo an-daniny roa amin''ny fipetrahana; ary nisy sarin-diona roa teo an-danin''ny fitehenan-tanana.'
mg1865::mg_11::10::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy sarin-diona roa ambin''ny folo teo an-daniny roa teo amin''ny ambaratonga enina. Tsy nisy natao tahaka izany tany amin''ny fanjakana rehetra.'
mg1865::mg_11::10::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fisotroan''i Solomona mpanjaka dia volamena, ary ny fanaka rehetra tao amin''ny trano Alan''i Libanona koa dia volamena tsara avokoa; tsy nisy volafotsy ireo; fa nataony toy ny tsinontsinona izany tamin''ny andron''i Solomona.'
mg1865::mg_11::10::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka nanana sambon''i Tarsisy mbamin''ny sambon''i Hirama teny ambonin''ny ranomasina; ary indray mandeha amin''ny telo taona no nihavian''ny sambon''i Tarsisy nitondra volamena sy volafotsy sy ivory sy rajako ary vorombola*. [*pavo]'
mg1865::mg_11::10::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona mpanjaka dia nanankarena sady hendry noho ny mpanjaka rehetra ambonin''ny tany.'
mg1865::mg_11::10::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany rehetra nitady hahita ny tavan''i Solomona mba hihaino ny fahendrena izay nataon''Andriamanitra tao am-pony.'
mg1865::mg_11::10::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy rehetra dia samy nahatonga ny anjarany avy isan-taona, dia fanaka volafotsy sy fanaka volamena sy fitafiana sy fiadiana sy zava-manitra sy soavaly ary ampondra.'
mg1865::mg_11::10::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanangona kalesy sy mpitaingin-tsoavaly; ary nanana kalesy efajato amby arivo izy sy mpitaingin-tsoavaly roa arivo amby iray alina, izay nataony tao amin''ireo tanàna fitoeran''ny kalesy sy tao amin''ny mpanjaka tany Jerosalema.'
mg1865::mg_11::10::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''ny mpanjaka tahaka ny vato ny habetsaky ny volafotsy tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy eny amin''ny tany lemaka amoron-tsiraka*. [*Hebreo: Sefela]'
mg1865::mg_11::10::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy any Egypta no nahazoan''i Solomona soavaly; ary ny iray toko tamin''ny mpandranton''ny mpanjaka dia naka ny andiany iray araka izay vidiny voatendry.'
mg1865::mg_11::10::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vidin''ny kalesy iray nentiny niakatra avy tany Egypta dia sekely volafotsy enin-jato, ary ny soavaly dia dimam-polo amby zato avy; ary toy izany kosa no nitondrany ho an''ny mpanjakan''ny Hetita sy ny mpanjakan''ny Syriana.'
mg1865::mg_11::11::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nivilian''i Solomona namporafy maro, sy ny nanompoany sampy, ary ny namalian''Andriamanitra azy'
  verse_text: 'Fa Solomona mpanjaka tia vehivavy maro hafa firenena, fa tsy ilay zanakavavin''i Farao ihany, dia vehivavy Moabita sy Amonita sy Edomita sy Sidoniana ary Hetita,'
mg1865::mg_11::11::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia vehivavy avy amin''ny firenena izay nolazain''i Jehovah tamin''ny Zanak''Isiraely hoe: Tsy hanambady azy ianareo, ary izy tsy hanambady anareo, fa hampivily ny fonareo hanaraka ny andriamaniny tokoa izy; kanjo tamin''ireo no niraiketan''ny fitiavan''i Solomona.'
mg1865::mg_11::11::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanana vady andriambavy fiton-jato sy vaditsindrano telonjato izy, ka nampivily ny fony ireo vadiny ireo.'
mg1865::mg_11::11::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony efa antitra Solomona, dia navilin''ny vadiny ny fony hanaraka andriamani-kafa, ka ny fony tsy mba nahitsy tamin''i Jehovah Andriamaniny tahaka ny fon''i Davida rainy.'
mg1865::mg_11::11::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Solomona nanaraka an''i Astarta, andriamani-bavin''ny Sidoniana, sy Milkoma, fahavetavetan''ny Amonita.'
mg1865::mg_11::11::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nanao izay ratsy eo imason''i Jehovah, ka tsy mba tanteraka tamin''ny fanarahana Azy tahaka an''i Davida rainy.'
mg1865::mg_11::11::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany Solomona dia nanao fitoerana avo ho an''i Kemosy, fahavetavetan''i Moaba, teo amin''ny havoana tandrifin''i Jerosalema, ary ho an''i Moloka, fahavetavetan''ny taranak''i Amona.'
mg1865::mg_11::11::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa no nataony ho an''izay vadiny hafa firenena rehetra, izay nandoro ditin-kazo manitra sy namono zavatra hatao fanatitra ho an''ny andriamaniny.'
mg1865::mg_11::11::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah tezitra tamin''i Solomona noho ny nivilian''ny fony niala tamin''i Jehovah, Andriamanitry ny Isiraely, Izay efa niseho taminy indroa'
mg1865::mg_11::11::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa nandidy azy ny amin''izany zavatra izany tsy hanaraka andriamani-kafa; nefa tsy nitandrina izay nandidian''i Jehovah izy.'
mg1865::mg_11::11::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy Jehovah tamin''i Solomona: Satria efa tonga ao am-ponao izao, ka tsy notandremanao ny fanekeko sy ny didiko izay nandidiako anao, dia hendahako ho afaka aminao tokoa ny fanjakana ka homeko ny mpanomponao.'
mg1865::mg_11::11::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa kosa tsy hataoko amin''ny andronao izany noho ny amin''i Davida rainao; fa rehefa mby amin''ny zanakao vao hendahako aminy.'
mg1865::mg_11::11::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy dia hendahako avokoa ny fanjakana rehetra, fa mba homeko firenena iray ihany ny zanakao noho ny amin''i Davida mpanompoko sy Jerosalema izay nofidiko.'
mg1865::mg_11::11::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nanangana fahavalo hanohitra an''i Solomona, dia Hadada Edomita, tamingan''ny mpanjakan''i Edoma.'
mg1865::mg_11::11::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa nanafika an''i Edoma Davida, ary Joaba, komandin''ny miaramila, niakatra handevina ny maty ary efa namono ny lehilahy rehetra tany'
mg1865::mg_11::11::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa enim-bolana no nitoeran''i Joaba sy ny Isiraely rehetra tany Edoma mandra-pandringany ny lehilahy rehetra tany),'
mg1865::mg_11::11::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nandositra Hadada sy ny Edomita, sasany mpanompon-drainy izay nanaraka azy ka nankany Egypta; fa mbola zazalahy kely Hadada tamin''izay.'
mg1865::mg_11::11::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niainga niala tany Midiana ireo ka tonga tany Parana; dia naka olona avy tany Parana homba azy izy ka nankany Egypta ho any amin''i Farao, mpanjakan''i Egypta, izay nanome azy trano sy tany sady nilaza hanome hanina azy koa.'
mg1865::mg_11::11::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hadada nahita fitia fatratra teo imason''i Farao, ka dia ny rahavavin''i Tapanesa, vadin''ny mpanjaka, no nomeny ho vadiny.'
mg1865::mg_11::11::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahavavin''i Tapanesa niteraka zazalahy tamin''i Hadada, dia Genobata, izay notazan''i Tapanesa tao an-tranon''i Farao; ary Genobata niara-nitoetra tamin''ny zanakalahin''i Farao tao an-dapa.'
mg1865::mg_11::11::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Hadada tany Egypta fa Davida lasa nody mandry any amin''ny razany, sady maty koa Joaba, komandin''ny miaramila, dia hoy izy tamin''i Farao: Alefaso aho hody any amin''ny tanin-drazako.'
mg1865::mg_11::11::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Farao taminy: Fa inona moa no zavatra mahory anao aty amiko, no dia mitady hody any amin''ny tanin-drazanao indray ianao? Ary hoy ny navaliny: Tsy misy mahory ahy tsy akory; nefa alefaso ihany aho.'
mg1865::mg_11::11::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra nanangana fahavalo koa hanohitra an''i Solomona, dia Rezona, zanak''i Eliada, izay efa nandositra an''i Hadadezera tompony, mpanjakan''i Zoba.'
mg1865::mg_11::11::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namory olona maro ho ao aminy izy ka tonga kapiteniny tamin''ny namonoan''i Davida ny olona tany Zoba; ary nankany Damaskosy izy sy ny namany ka nitoetra sy nanjaka tao.'
mg1865::mg_11::11::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy koa dia fahavalon''ny Isiraely tamin''ny andron''i Solomona rehetra ka nanampy ny ratsy izay nataon''i Hadada; eny, nankahala ny Isiraely izy ary nanjaka tany Syria.'
mg1865::mg_11::11::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jerobeama, zanak''i Nebata, Efraimita avy any Zareda, mpanompon''i Solomona (Zeroa no anaran-dreniny, vehivavy mpitondratena), dia nanainga tanàna hikomy tamin''ny mpanjaka.'
mg1865::mg_11::11::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fototry ny nanaingany tanàna hikomy tamin''ny mpanjaka: Solomona nanorina an''i Milo* ary nanampina ny lohasaha tao an-Tanànan''i Davida rainy; [*Hebreo: fiarovana]'
mg1865::mg_11::11::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jeroboama dia lehilahy mahay; koa nony hitan''i Solomona fa zatovo mahavita raharaha izy, dia nataony mpifehy ny taranak''i Josefa tamin''ny fanompoany rehetra.'
mg1865::mg_11::11::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany, raha nivoa: ka avy tany Jerosalema Jeroboama, dia nahita azy teny an-dàlana Ahia Silonita mpaminany; ary Ahia nitafy lamba vaovao, ary izy roa lahy ihany no tany an-tsaha.'
mg1865::mg_11::11::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Ahia ny lamba vaovao-izay notafiny, ka notriatriariny ho roa ambin''ny folo.'
mg1865::mg_11::11::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''i Jeroboama: Raiso ho anao ny tapatapany folo; fa izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Indro, Izaho efa hanendaka ny fanjakana ho afaka amin''ny tanan''i Solomona, ary homeko anao ny firenena folo'
mg1865::mg_11::11::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: '(nefa ny firenena iray dia i mbola havela ho azy ihany noho ny amin''i Davida mpamompoko sy Jerosalema, tanàna izay nofidiko tamin''ny firenen''Isiraely),'
mg1865::mg_11::11::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria efa nahafoy Ahy izy ka niankohoka teo anatrehan''i Astarta, andriamani-bavin''ny Sidoniana, sy Kemosy andriamanitr''i Moaba, ary Milkoma, andriamanitry ny taranak''i Amona, fa tsy nandeha tamin''ny lalako hanao izay mahitsy eo imasoko sy hitandrina ny didiko sy ny fitsipiko tahaka an''i Davida rainy.'
mg1865::mg_11::11::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy hesoriko eo an-tanany avokoa ny fanjakana rehetra; fa hampitoeriko ho mpanjaka ihany izy amin''ny andro rehetra hiainany noho ny amin''i Davida mpanompoko izay nofidiko, satria izy nitandrina ny lalàko sy ny didiko;'
mg1865::mg_11::11::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hesoriko eo an-tanan''ny zanany kosa ny fanjakana ka homeko anao, nefa ny firenena folo ihany.'
mg1865::mg_11::11::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa firenena iray no homeko ny zanany, mba hisy fanilo ho an''i Davida mpanompoko eo anatrehako mandrakariva any Jerosalema, tanàna izay nofidiko ho Ahy hametrahana ny anarako.'
mg1865::mg_11::11::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao no halaiko, ka hanjaka amin''izay rehetra irin''ny fanahinao ary ho mpanjaka amin''ny Isiraely.'
mg1865::mg_11::11::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mihaino izay rehetra andidiako anao ianao ka mandeha amin''ny lalako ary manao izay mahitsy eo imasoko ka mitandrina ny didiko sy ny lalàko tahaka izay nataon''i Davida mpanompoko, dia ho aminao Aho ka hampaharitra ny taranakao*, tahaka izay nataoko ho an''i Davida, ary homeko anao ny Isiraely. [*Hebreo: hanao trano maharitra ho anao]'
mg1865::mg_11::11::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampietry ny taranak''i Davida kosa Aho noho izany, nefa tsy ho mandrakizay.'
mg1865::mg_11::11::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona nitady hamono an''i Jeroboama. Fa Jeroboama niainga, dia nandositra nankany Egypta ho any amin''i Sisaka, mpanjakan''i Egypta, ka nitoetra tany mandra-pahafatin''i Solomona.'
mg1865::mg_11::11::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Solomona sisa mbamin''izay rehetra nataony ary ny fahendreny, tsy voasoratra ao amin''ny bokin''ny tantaran''i Solomona va izany?'
mg1865::mg_11::11::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nanjakan''i Solomona tamin''ny Isiraely rehetra tany Jerosalema dia efa-polo taona.'
mg1865::mg_11::11::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 11
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Solomona lasa nodi-mandry any amin''ny razany, dia nalevina tao an-Tanànan''i Davida rainy izy; ary Rehoboama zanany no nanjaka nandimby azy.'
mg1865::mg_11::12::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niodinan''ny firenena folo, sy ny niandohan''ny fanjahan''Isiraely'
  verse_text: 'Ary Rehoboama nankany Sekema, fa tany no efa nalehan''ny Isiraely rehetra hampanjaka azy.'
mg1865::mg_11::12::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha nandre izany Jeroboama, zanak''i Nebata (fa izy mbola tany Egypta, izay nalehany tamin''izy nandositra niala teo anatrehan''i Solomona mpanjaka;'
mg1865::mg_11::12::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia naniraka naka azy ny olona), dia tonga izy sy ny fiangonana, dia ny Isiraely rehetra, ka niteny tamin-dRehoboama hoe:'
mg1865::mg_11::12::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rainao dia nampitondra zioga mavesatra anay, fa inty kosa mby aminao ka mba hamaivano ny fanompoana mafy tamin-drainao sy ny zioga mavesatra izay nataony taminay, dia hanompo anao izahay.'
mg1865::mg_11::12::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy taminy: Mandehana aloha, ka raha afaka hateloana, dia mankanesa aty amiko indray. Dia lasa ny olona.'
mg1865::mg_11::12::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama mpanjaka naka hevitra tamin''ny zoki-olona izay nitoetra teo anatrehan''i Solomona rainy fony fahavelony ka nanao hoe: Ahoana no hevitra omenareo havaly ny vahoaka?'
mg1865::mg_11::12::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo taminy: Raha mety ho mpanompon''ny vahoaka ianao izao ka hanompo azy sy hanao teny mora aminy, dia ho mpanomponao mandrakizay izy.'
mg1865::mg_11::12::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nolavin-dRehoboama ny hevitra nomen''ireo zoki-olona azy, dia naka hevitra tamin''ny tovolahy izay indray nihira taminy sady efa nitoetra teo anatrehany izy'
mg1865::mg_11::12::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay efa niteny tamiko hoe: Hamaivano ny zioga izay nataon-drainao taminay'
mg1865::mg_11::12::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo tovolahy indray nihira taminy nanao taminy hoe: Izao no lazao amin''ny vahoaka izay niteny taminao hoe: Rainao nampitondra zioga mavesatra anay; fa inty kosa mby aminao ka mba hamaivano aminay izany, izao no lazao aminy: Ny ankihikeliko dia lehibe noho ny valahan''ny raiko;'
mg1865::mg_11::12::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa dia mainka hanampy ny zioga ho entinareo; kotopia no namaizan''ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo.'
mg1865::mg_11::12::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeroboama sy ny vahoaka rehetra nankany amin-dRehoboama tamin''ny andro fahatelo, araka ilay nolazain''ny mpanjaka hoe: Mankanesa aty amiko indray amin''ny andro fahatelo.'
mg1865::mg_11::12::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nanao teny mafy tamin''ny olona, fa nandà ny saina nomen''ireo zoki-olona azy izy'
mg1865::mg_11::12::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny taminy araka ny hevitra nomen''ireo tovolahy hoe: Ny raiko dia nampitondra zioga mavesatra anareo, fa izaho kosa mainka hanampy ny zioga ho entinareo, kotopia no namazain''ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo.'
mg1865::mg_11::12::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tsy nihaino ny olona ny mpanjaka; fa avy tamin''i Jehovah izany zavatra izany hahatanteraka ny teniny izay nampilazainy an''i Ahia Silonita tamin''i Jeroboama, zanak''i Nebata.'
mg1865::mg_11::12::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny Isiraely rehetra fa tsy nihaino azy ny mpanjaka, dia namaly ny mpanjaka ny vahoaka ka nanao hoe: Inona moa no anjaranay amin''i Davida? Tsy manana lova amin''ny zanak''i Jese izahay; samia mody any an-dainy avy, ry Isiraely e; ankehitriny tandremo ny taranakao, ry Davida o. Dia samy nody ho any an-dainy avy ny Isiraely.'
mg1865::mg_11::12::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''Isiraely izay nonina tany an-tanànan''ny Joda ihany no nanjakan-dRehoboama .'
mg1865::mg_11::12::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia naniraka an''i Adorama, komandin''ny mpanao fanompoana, Rehoboama mpanjaka, nefa ny Isiraely rehetra nitora-bato azy, ka maty izy. Dia niezaka faingana nankeo amin''ny kalesiny Rehoboama mpanjaka handositra ho any Jerosalema.'
mg1865::mg_11::12::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niodina tamin''ny taranak''i Davida ny Isiraely mandraka androany.'
mg1865::mg_11::12::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny Isiraely rehetra fa efa tafaverina indray Jeroboama, dia naniraka naka azy ho ao amin''ny fivoriana izy ka nampanjaka azy tamin''ny Isiraely rehetra; dia tsy nisy nanaraka ny taranak''i Davida afa-tsy ny firenen''i Joda ihany.'
mg1865::mg_11::12::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany Jerosalema Rehoboama, dia novoriny ny taranak''i Joda rehetra mbamin''ny firenen''i Benjamina, dia miaramila valo alina amby iray hetsy voafantina, hiady amin''ny taranak''Isiraely hampody ny fanjakana indray ho an-dRehoboama, zanak''i Solomona.'
mg1865::mg_11::12::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo tonga tamin''i Semaia, lehilahin''Andriamanitra, kosa ny tenin''Andriamanitra nanao hoe'
mg1865::mg_11::12::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena amin-dRehoboama, zanak''i Solomona, mpanjakan''ny Joda, sy amin''ny taranak''i Joda sy Benjamina rehetra ary amin''ny vahoaka sisa hoe:'
mg1865::mg_11::12::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Aza mandeha hiady amin''ny Zanak''Isiraely rahalahinareo; fa samia mody any an-tranony avy ianareo, fa avy amiko izao zavatra izao. Dia nihaino ny tenin''i Jehovah ny olona, ka dia samy lasa nody araka ny tenin''i Jehovah.'
mg1865::mg_11::12::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: 'Ny nanaovan''i Jeroboama ireo sarin''ombilahy kely volamena tao Betela sy Dana'
  verse_text: 'Ary Jeroboama dia nanamboatra an''i Sekema any amin''ny tany havoan''i Efraima ka nonina tao; ary raha avy tao izy, dia nanamboatra an''i Pehoela koa.'
mg1865::mg_11::12::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeroboama nanao anakampo hoe: Izao ny fanjakana dia hody amin''ny taranak''i Davida ihany;'
mg1865::mg_11::12::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha miakatra hamono zavatra atao fanatitra ho amin''ny tranon''i Jehovah any Jerosalema ny vahoaka, dia hody amin''ny tompony indray ny fony, dia amin-dRehoboama, mpanjakan''ny Joda, ary dia hamono ahy izy ka hiverina any amin-dRehoboama, mpanjakan''ny Joda, indray.'
mg1865::mg_11::12::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihevitra ny mpanjaka ka nanao ombilahy kely volamena roa; ary hoy izy tamin''ny olona: "Aoka izay ny fiakaranareo any Jerosalema! Ry Isiraely o" indreo ny andriamanitrao, izay nitondra anao nivoaka avy tany amin''ny tany Egypta.'
mg1865::mg_11::12::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray dia napetrany tao Betela, fa ny anankiray kosa dia tao Dana.'
mg1865::mg_11::12::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany zavatra izany dia tonga fahotana; fa ny olona dia nandeha hivavaha teo anatrehan''ny anankiray amin''ireo hatrany Dana.'
mg1865::mg_11::12::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao trano teny amin''ny fitoerana avo izy sady nanendry olona hafa ho mpisorona, izay tsy isan''ny taranak''i Levy.'
mg1865::mg_11::12::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeroboama, nanendry andro firavoravoana tamin''ny andro fahadimy ambin''ny folo amin''ny volana fahavalo, tahaka ny andro firavoravoana tamin''ny Joda ihany, ka nanatitra fanatitra teo ambonin''ny alitara izy. Toy izany no nataony tao Betela, fa namono zavatra hatao fanatitra ho an''ireo ombilahy kely izay nataony izy; ary nampitoeriny tao Betela ireo mpisorona amin''ny fitoerana avo izay notendreny.'
mg1865::mg_11::12::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatitra fanatitra teo ambonin''ny alitara izay nataony tao Betela izy tamin''ny andro fahadimy ambin''ny folo amin''ny volana fahavalo, volana izay notendreny araka ny sitrapony ihany; ary nanao andro firavoravoana ho an''ny Zanak''Isiraely izy sady nanatitra fanatitra teo ambonin''ny alitara sy nandoro ditin-kazo manitra.'
mg1865::mg_11::13::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanirahan''Andriamanitra ilay mpaminany hananatra an''i Jeroboama noho ny nanaovany ireo sarin''ombilahy kely ireo, sy ny nanjo azy'
  verse_text: 'Ary, indro, nisy lehilahin''Andriamanitra avy tany Joda tonga tany Betela noho ny tenin''i Jehovah, raha mbola nitsangana teo anilan''ny alitara handoro ditin-kazo manitra Jeroboama.'
mg1865::mg_11::13::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay lehilahin''Andriamanitra niantso ny alitara araka ny tenin''i Jehovah ka nanao hoe: Ry alitara o, ry alitara o! izao no lazain''i Jehovah: Indro, hisy zaza hateraka ho an''ny taranak''i Davida, Josia no ho anarany; ary hovonoiny ka hateriny eo amboninao ny mpisorona amin''ny fitoerana avo izay mandoro ditin-kazo manitra eo amboninao, ary taolan''olona no hodorana eo amboninao.'
mg1865::mg_11::13::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naneho fahagagana androtrizay izy nanao hoe: Izao no fahagagana izay nolazain''i Jehovah: Indro, hitresaka ny alitara, ka hikorotsaka ny lavenona izay eo amboniny.'
mg1865::mg_11::13::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Jeroboama mpanjaka ny tenin''ny lehilahin''Andriamanitra izay niantso ny alitara tao Betela, dia naninjitra ny tanany niala tamin''ny alitara izy ka nanao hoe: Hazony ilehio. Dia maty* iny tanany nahinjiny nanondro azy iny ka tsy azony noketrahina intsony. [*Hebreo: maina]'
mg1865::mg_11::13::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitresaka koa ny alitara, ka nikorotsaka ny lavenona teo amboniny, araka ny fahagagana Izay nasehon''ilay lehilahin''Andriamanitra noho ny tenin''i Jehovah.'
mg1865::mg_11::13::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka namaly ilay lehilahin''Andriamanitra nanao hoe: Mba ifony amin''i Jehovah Andriamanitrao aho, ka mivavaha ho ahy, mba ho azoko ketrahina indray ny tanako. Ary ilay lehilahin''Andriamanitra dia nifona tamin''i Jehovah, ka dia azon''ny mpanjaka noketrahina indray ny tanany ka tonga tahaka ny teo.'
mg1865::mg_11::13::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''ilay lehilahin''Andriamanitra: Andeha hiaraka amiko ho any an-trano ianao mba hanao ody am-bavafo kely, sady homeko zavatra ianao.'
mg1865::mg_11::13::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ilay lehilahin''Andriamanitra tamin''ny mpanjaka: Na dia homenao ahy aza ny antsasaky ny ao an-tranonao, tsy hiditra any an-tranonao, na hihinan-kanina, na hisotro rano aty aho;'
mg1865::mg_11::13::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izao no tenin''i Jehovah nandrara ahy: Aza mihinan-kanina, na misotro rano, na miverina amin''izay lalana efa nalehanao.'
mg1865::mg_11::13::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha tamin''ny lalana hafa izy, fa tsy niverina tamin''ilay nalehany ho any Betela.'
mg1865::mg_11::13::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy mpaminany antitra anankiray tao Betela; ary tonga ny zanany ka nilaza taminy izay rehetra nataon''ilay lehilahin''Andriamanitra androtr''iny tao Betela; ary nolazain''ireo tamin-drainy koa ny teny izay nolazain-dralehilahy tamin''ny mpanjaka.'
mg1865::mg_11::13::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy rainy taminy: Aiza no lalana nalehany ? Fa ny zanany efa nahita ny lalana nalehan''ilay lehilahin''Andriamanitra izay tonga avy tany Joda.'
mg1865::mg_11::13::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny zanany: Asio lasely ny boriky hitaingenako. Dia nasiany lasely ny boriky hitaingenany, ka dia nitaingenany.'
mg1865::mg_11::13::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanaraka ilay lehilahin''Andriamanitra izy ka nahita azy nipetraka teo ambanin''ny hazo terebinta; ka hoy izy taminy: Ianao moa ilay lehilahin''Andriamanitra avy tany Joda ? Ary hoy izy: Eny, izaho no izy.'
mg1865::mg_11::13::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Andeha hiaraka amiko ho any an-tranoko mba hihinan-kanina.'
mg1865::mg_11::13::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy: Tsy mahazo miverina hiaraka aminao aho na hiditra any an-tranonao, ary tsy hihinan-kanina na hisotro rano aminao aty aho,'
mg1865::mg_11::13::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tonga tamiko ny tenin''i Jehovah hoe: Aza mihinan-kanina, na misotro rano any, ary aza miverina amin''ny lalana efa nalehanao.'
mg1865::mg_11::13::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy taminy: Izaho koa mba mpaminany tahaka anao ihany; ary nisy anjely nilaza tamiko araka ny tenin''i Jehovah nanao hoe: Ento miverina hiaraka aminao ho any an-tranonao izy hihinan-kanina sy hisotro rano. Kanjo laingany izany.'
mg1865::mg_11::13::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina niaraka taminy izy ka nihinan-kanina sy nisotro rano tao an-tranony.'
mg1865::mg_11::13::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nipetraka teo amin''ny latabatra izy roa lahy, dia tonga tamin''ilay mpaminany nitondra azy niverina ny tenin''i Jehovah;'
mg1865::mg_11::13::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy niteny mafy tamin''ilay lehilahin''Andriamanitra avy tany Joda hoe: Izao no lazain''i Jehovah: Satria nandà ny tenin''i Jehovah ianao ka tsy nitandrina ny didy izay nandidian''i Jehovah Andriamanitrao anao,'
mg1865::mg_11::13::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa niverina nihinan-kanina sy nisotro rano tany amin''ny tany izay nandraran''i Jehovah anao hoe: Aza mihinan-kanina na misotro rano, dia tsy ho tonga any am-pasan-drazanao ny fatinao.'
mg1865::mg_11::13::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa avy nihinana sy nisotro izy, dia nasiany lasely ny boriky hitaingenan''ilay mpaminany naveriny.'
mg1865::mg_11::13::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha izy, dia nisy liona nifanena taminy teny andalana ka nahafaty azy; ary ny fatiny dia niampatra teo an-dàlana, ary ny boriky nijanona teo anilany, ary ny liona koa nijanona teo anilan''ny faty.'
mg1865::mg_11::13::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo nisy olona nandalo ka nahita ny faty niampatra teo an-dàlana sy ny liona nijanona teo anilan''ny faty, dia lasa nandeha ireo ka nilaza izany tany an-tanàna izay nitoeran''ilay mpaminany antitra.'
mg1865::mg_11::13::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany ilay mpaminany izay namerina azy tany an-dàlana, dia hoy izy: Ilay lehilahin''Andriamanitra nandà ny tenin''i Jehovah izay; fa natolotr''i Jehovah ny liona izy ka noviravirainy sy novonoiny araka ny tenin''i Jehovah, izay efa nolazainy taminy.'
mg1865::mg_11::13::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niteny tamin''ny zananilahy hoe: Asio lasely ny boriky hitaingenako. Dia nasiany lasely izy.'
mg1865::mg_11::13::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha izy, dia nahita ny fatin-dralehilahy niampatra teo an-dàlana, ary ny boriky sy ny liona samy nijanona teo anilan''ny faty; nefa ny liona tsy nihinana ny faty na namiravira ny boriky.'
mg1865::mg_11::13::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nobetain''ilay mpaminany ny fatin''ilay lehilahin''Andriamanitra ka nasampiny tamin''ny boriky, dia nentiny niverina; ary tonga tao an-tanàna ilay mpaminany antitra mba hisaona sy handevina azy.'
mg1865::mg_11::13::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatin-dralehilahy naleviny tao am-pasany, dia nitomanian''ny olona hoe: Indrisy, ry rahalahiko!'
mg1865::mg_11::13::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voaleviny ralehilahy, dia hoy izy tamin''ny zanany: Rehefa maty aho, dia mba aleveno ao amin''ny fasana izay ilevenan''ilay lehilahin''Andriamanitra, ka ataovy eo anilan''ny taolany ny taolako;'
mg1865::mg_11::13::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy maintsy ho tanteraka ilay teny nantsoiny noho ny tenin''i Jehovah nilaza ny loza ho tonga amin''ny alitara ao Betela sy amin''ny trano rehetra eny amin''ny fitoerana avo izay any an-tanànan''i Samaria.'
mg1865::mg_11::13::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, Jeroboama dia tsy mbola niala tamin''ny lalan-dratsiny ihany, fa mbola naka tamin''ny ankabiazam-bahoaka ho mpisorona amin''ny fitoerana avo; koa na iza na iza tia izany dia natokany*, mba ho tonga mpisorona amin''ny fitoerana avo. [*Hebreo: nofenoiny ny tanany]'
mg1865::mg_11::13::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga fahotan''ny taranak''i Jeroboama izany ka namongorana sy nandringanana azy tsy ho eo ambonin''ny tany.'
mg1865::mg_11::14::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Jeroboama tamin''ny Isiraely'
  verse_text: 'Tamin''izany andro izany dia narary Abia, zanak''i Jeroboama.'
mg1865::mg_11::14::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jeroboama tamin''ny vadiny: Masïna ianao, mitsangàna, ka miovà endrika, mba tsy ho fantatr''olona ho vadin''i Jeroboama ianao; dia mankanesa any Silo, fa, indro, ao Ahia mpaminany, ilay nilaza tamiko fa ho mpanjakan''ity firenena ity aho.'
mg1865::mg_11::14::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitondrà mofo folo sy mofo madinika ary tantely iray tavoara, ka mankanesa any aminy; fa izy hanambara aminao izay ho toetry ny zaza.'
mg1865::mg_11::14::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: '2022-05-09T03:14:58+0000'
  verse_title: null
  verse_text: 'Dia nanao araka izany ny vadin''i Jeroboama ka niainga nankany Silo izy, dia nankao an-tranon''i Ahia. Ary Ahia tsy nahita, fa efa pahina ny masony noho ny fahanterany.'
mg1865::mg_11::14::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah efa nilaza tamin''i Ahia hoe: Indro, avy ny vadin''i Jeroboama hanontany anao ny amin''ny zanany, fa marary izy; ary izao ka izao no holazainao aminy; nefa raha miditra izy, dia hody vehivavy hafa.'
mg1865::mg_11::14::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Ahia ny fingodongodon''ny tongony, raha vao niditra teo am-baravarana izy, dia hoy izy: Mandrosoa, ry vadin''i Jeroboama; nahoana ianao no mody olonkafa? Fa izaho dia nirahina hitondra teny mafy aminao.'
mg1865::mg_11::14::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mandehana, ka lazao amin''i Jeroboama hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Satria nanandratra anao avy tamin''ny olona Aho ka nanendry anao ho mpanapaka ny Isiraely oloko,'
mg1865::mg_11::14::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nendahako ny fanjakana ho afaka tamin''ny taranak''i Davida ka nomeko anao, nefa kosa ianao tsy mba nanao tahaka an''i Davida mpanompoko, izay nitandrina ny teniko sy nanaraka Ahy tamin''ny fony rehetra tsy hanao na inona na inona afa-tsy izay marina eo imasoko ihany;'
mg1865::mg_11::14::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nanao ratsy mihoatra noho izay rehetra teo alohanao ianao, fa lasa nanao andriamani-kafa sy sarin-javatra an-idina ka nampahatezitra Ahy, fa Izaho efa narianao teo ivohonao:'
mg1865::mg_11::14::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa noho izany dia, indro, hahatonga loza amin''ny taranak''i Jeroboama Aho ka handringana izay lehilahy rehetra amin''ny tamingan''i Jeroboama, na ny voahazona na ny afaka amin''ny Isiraely, ary hanaisotra ny sisa amin''ny taranak''i Jeroboama Aho, toy ny fanaisotry ny olona ny diky ambara-paha-tsy hisy intsony.'
mg1865::mg_11::14::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay tamingan''i Jeroboama maty ao an-tanàna dia hohanin''ny alika; ary izay maty any an-tsaha dia hohanin''ny voro-manidina; fa Jehovah no efa niteny.'
mg1865::mg_11::14::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitsangàna ianao, ka modia any an-tranonao; fa raha vao mijadona ao an-tanàna ny tongotrao, dia, indro, ho faty ny zaza.'
mg1865::mg_11::14::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely rehetra hisaona sy handevina azy; fa amin''ny tamingan''i Jeroboama dia izy irery ihany no ho tonga ao am-pasana, satria izy ihany no nahitana fahatsaram-panahy ny amin''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_11::14::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah hanangana mpanjaka ho an''ny Isiraely izay handringana ny taranak''i Jeroboama amin''izany andro izany; fa rahoviana ange izany? Izao ankehitriny izao ihany.'
mg1865::mg_11::14::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah hamely ny Isiraely toy ny volotara hozongozonina any anaty rano sady hanongotra ny Isiraely amin''ity tany soa nomeny ny razany ity ary hanely azy ho any an-dafin''ny Ony*, satria nanao ireo Aseraha izy ka nampahatezitra an''i Jehovah. [*Eofrata]'
mg1865::mg_11::14::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy hanolotra ny Isiraely noho ny fahotana izay nataon''i Jeroboama sady nampanotany ny Isiraely.'
mg1865::mg_11::14::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga ny vadin''i Jeroboama ka lasa nandeha ary tonga tany Tirza; koa rehefa mby teo amin''ny tokonam-baravarana izy, dia maty ny zazalahy;'
mg1865::mg_11::14::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nandevina azy ny Isiraely rehetra sady nisaona azy, araka ny tenin''i Jehovah izay nampilazainy an''i Ahia mpaminany mpanompony.'
mg1865::mg_11::14::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Jeroboama sisa, dia ny niadiany sy ny nanjakany, indro, efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany.'
mg1865::mg_11::14::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nanjakan''i Jeroboama dia roa amby roa-polo taona; dia lasa nodi-mandry any amin''ny razany izy; ary Nadaba zanany no nanjaka nandimby azy.'
mg1865::mg_11::14::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nanjakan-dRehoboama tamin''ny Joda'
  verse_text: 'Ary Rehoboama, zanak''i Solomona, no nanjaka tamin''ny Joda. Efa iraika amby efa-polo taona Rehoboama, fony izy vao nanjaka, ary fito ambin''ny folo taona no nanjakany tany Jerosalema, tanàna nofidin''i Jehovah tamin''ny firenen''Isiraely rehetra hametrahany ny anarany. Ary ny anaran-dreniny dia Nama Amonita.'
mg1865::mg_11::14::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Joda nanao izay ratsy eo imason''i Jehovah ka nampahasaro-piaro Azy tamin''ny fahotana izay nataony mihoatra noho izay rehetra nataon''ny razany.'
mg1865::mg_11::14::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy koa nanao fitoerana avo ho azy sy tsangam-baton-tsampy ary Aseraha* teny an-tampon''ny tendrombohitra avo rehetra sy teny ambanin''ny hazo maitso rehetra. [*Anaran''andriamani-tsy izy, na ny sariny]'
mg1865::mg_11::14::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olona nanolo-tena nijangajanga ho fanompoan-tsampy teo amin''ny tany; ary nanaraka ny fahavetavetana rehetra fanaon''ny firenena izay noroahin''i Jehovah teo anoloan''ny Zanak''Isiraely izy.'
mg1865::mg_11::14::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona fahadimy nanjakan-dRehoboama mpanjaka dia niakatra Sisaka, mpanjakan''i Egypta, hamely an''i Jerosalema;'
mg1865::mg_11::14::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nobaboiny ny rakitry ny tranon''i Jehovah sy ny rakitry ny tranon''ny mpanjaka ka lasany avokoa; ary nobaboiny koa ny ampinga volamena rehetra nataon''i Solomona'
mg1865::mg_11::14::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama mpanjaka nanao ampinga varahina ho solon''ireny ka nanolotra azy teo an-tanan''ny lehiben''ny mpiambina, izay niambina ny varavaran''ny tranon''ny mpanjaka'
mg1865::mg_11::14::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na oviana na oviana no nidiran''ny mpanjaka tao an-tranon''i Jehovah, dia nentin''ny mpiambina ireo ka naveriny tao an-trano fiambenana indray.'
mg1865::mg_11::14::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran-dRehoboama sisa mbamin''izay rehetra nataony, tsy voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_11::14::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady mandrakariva Rehoboama sy Jeroboama.'
mg1865::mg_11::14::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rehoboama lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-Tanànan''i Davida. Ary ny anaran-dreniny dia Nama Amonita. Ary Abia zanany no nanjaka nandimby azy.'
mg1865::mg_11::15::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Abia sy Asa tamin''ny Joda'
  verse_text: 'Ary tamin''ny taona fahavalo ambin''ny folo nanjakan''i Jeroboama, zanak''i Nebata, no vao nanjakan''i Abia tamin''ny Joda.'
mg1865::mg_11::15::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Telo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Imaka, zanakavavin''i Absaloma.'
mg1865::mg_11::15::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha tamin''ny fahotana rehetra nataon-drainy izy, dia izay nataony teo alohany; ary ny fony tsy mba nahitsy tamin''i Jehovah Andriamaniny tahaka ny fon''i Davida rainy.'
mg1865::mg_11::15::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa noho ny amin''i Davida dia nomen''i Jehovah Andriamaniny fanilo tany Jerosalema ihany izy, fa natsangany handimby azy ny zanany, sady nampaharitra an''i Jerosalema Izy,'
mg1865::mg_11::15::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria Davida nanao izay mahitsy eo imason''i Jehovah ka tsy nivily niala tamin''izay nandidiany azy tamin''ny andro rehetra niainany, afa-tsy ilay tamin''i Oria Hetita ihany.'
mg1865::mg_11::15::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady Rehoboama sy Jeroboama tamin''ny andro rehetra niainany.'
mg1865::mg_11::15::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Abia sisa mbamin''izay rehetra nataony, tsy voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany ? Ary niady Abia sy Jeroboama'
mg1865::mg_11::15::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abia lasa nodi-mandry any amin''ny razany, dia nalevina tao an-Tanànan''i Davida izy; ary Asa zanany no nanjaka nandimby azy.'
mg1865::mg_11::15::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny taona faharoa-polo nanjakan''i Jeroboama, mpanjakan''ny Isiraely, no vao nanjakan''i Asa tamin''ny Joda.'
mg1865::mg_11::15::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iraika amby efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Imaka, zanakavavin''i Absaloma.'
mg1865::mg_11::15::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa nanao izay mahitsy eo imason''i Jehovah toy ny nataon''i Davida rainy.'
mg1865::mg_11::15::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nesoriny tamin''ny tany ny olona izay nanolotena hijangajanga ho fanompoan-tsampy, sady nariany ny sampy rehetra izay nataon-drainy.'
mg1865::mg_11::15::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia Imaka reniny aza dia naetriny tsy ho andriambavy, satria efa nanao sampy ho an''ny Aseraha; ary Asa nikapa ny sampiny ka nandoro azy tao an-dohasahan-driaka Kidrona.'
mg1865::mg_11::15::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fitoerana avo tsy mba noravana; nefa nahitsy teo imason''i Jehovah ny fon''i Asa tamin''ny andro rehetra niainany.'
mg1865::mg_11::15::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampidiriny ho ao an-tranon''i Jehovah ny zavatra izay nohamasinin-drainy mbamin''izay nohamasinin''ny tenany, dia volafotsy sy volamena ary fanaka.'
mg1865::mg_11::15::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady Asa sy Basa, mpanjakan''ny Isiraely, tamin''ny andro rehetra niainany.'
mg1865::mg_11::15::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Basa, mpanjakan''ny Isiraely, niakatra hamely ny Joda, dia nanamboatra an''i Rama mba tsy hisy hahazo hivoaka sy hiditra ho any amin''i Asa, mpanjakan''ny Joda.'
mg1865::mg_11::15::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa naka ny volafotsy sy ny volamena rehetra izay sisa tamin''ny rakitry ny tranon''i Jehovah sy tamin''ny rakitry ny tranon ny mpanjaka, ka natolony teo an-tanan''ny mpanompony; ary Asa mpanjaka nampanatitra azy tany amin''i Beni-hadada, zanak''i Tabrimona, zanak''i Heziona, mpanjakan''i Syria, izay nonina tao Damaskosy, ka nanao hoe:'
mg1865::mg_11::15::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisy fanekena amiko sy aminao toy ny tamin''ny raiko sy ny rainao; koa, indro, mampanatitra volafotsy sy volamena ho fanomezana ho anao aho; andeha, tsoahy ny fanekenao tamin''i Basa, mpanjakan''ny Isiraely, mba hialany amiko.'
mg1865::mg_11::15::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Beni-hadada nihaino an''i Asa mpanjaka ka naniraka komandin''ny miaramilany hamely ny tanànan''ny Isiraely, ary namely an''Iona sy Dana sy Abelabeti-maka ary Kinerota rehetra mbamin''ny tanin''ny Naftaly rehetra izy.'
mg1865::mg_11::15::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Basa izany, dia nitsahatra tsy nanamboatra an''i Rama intsony izy sady nitoetra tao Tirza.'
mg1865::mg_11::15::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asa mpanjaka kosa nampandre ny Joda rehetra (tsy nisy tsy nampandrenesiny) ary dia nesorin''ny olona ny vato sy ny hazo tao Rama, izay naorin''i Basa; ary nentin''i Asa mpanjaka nanamboatra an''i Geban''i Benjamina sy Mizpa kosa izany.'
mg1865::mg_11::15::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Asa sisa rehetra sy ny heriny rehetra mbamin''izay rehetra nataony ary ny tanàna izay nataony, tsy voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? Nefa kosa tamin''ny andro fahanterany dia narary tamin''ny tongony izy.'
mg1865::mg_11::15::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lasa nodimandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-Tanànan''i Davida rainy izy; ary Josafata zanany no nanjaka nandimby azy.'
mg1865::mg_11::15::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: 'Ny nanjahan''i Nadaba sy Basa sy Elaha sy Zimry ary Omry tamin''ny Isiraely'
  verse_text: 'Ary Nadaba, zanak''i Jeroboama, vao nanjaka tamin''ny Isiraely tamin''ny taona faharoa nanjakan''i Asa, mpanjakan''ny Joda; ary nanjaka roa taona tamin''ny Isiraely izy.'
mg1865::mg_11::15::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa nandeha tamin''ny lalan-drainy sy tamin''ny fahotany izay nampanotany ny Isiraely.'
mg1865::mg_11::15::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Basa, zanak''i Ahia, amin''ny taranak''Isakara, nikomy taminy dia namely azy tao Gibetona, izay an''ny Filistina (fa Nadaba sy ny Isiraely rehetra nanao fahirano an''i Gibetona fahizay).'
mg1865::mg_11::15::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Basa nahafaty azy tamin''ny taona fahatelo nanjakan''i Asa, mpanjakan''ny Joda, ka dia nanjaka nisolo azy.'
mg1865::mg_11::15::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanjaka izy, dia namely ny mpianakavin''i Jeroboama rehetra izy, ka tsy nasiany niangana ho an''i Jeroboama na dia olona iray akory aza, fa naringany avokoa ireo araka ny tenin''i Jehovah izay nampilazainy an''i Ahia Silonita mpanompony,'
mg1865::mg_11::15::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny fahotana nataon''i Jeroboama sady nampanotany ny Isiraely tamin''izay nataony nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely.'
mg1865::mg_11::15::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Nadaba sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_11::15::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady Asa sy Basa, mpanjakan''ny Isiraely, tamin''ny andro rehetra niainany.'
mg1865::mg_11::15::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahatelo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Basa, zanak''i Ahia, tamin''ny Isiraely rehetra tao Tirza; ary mpanjaka efatra amby roa-polo taona izy.'
mg1865::mg_11::15::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa nandeha tamin''ny lalan''i Jeroboama sy tamin''ny fahotany izay nampanotany ny Isiraely.'
mg1865::mg_11::16::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Jeho, zanak''i Hanany, ny tenin''i Jehovah ny amin''i Basa nanao hoe:'
mg1865::mg_11::16::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nasandratro avy tamin''ny vovoka ianao ka notendreko ho mpanapaka ny Isiraely oloko; nefa kosa nandeha tamin''ny lalan''i Jeroboama ihany ianao ary nampanota ny Isiraely oloko ka nampahatezitra Ahy tamin''ny fahotany,'
mg1865::mg_11::16::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia, indro, hofongorako Basa sy ny taranany, ary ny taranakao hataoko tahaka ny taranak''i Jeroboama, zanak''i Nebata.'
mg1865::mg_11::16::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay tamingan''i Basa maty ao an-tanàna dia hohanin''ny alika; ary izay tamingany maty any an-tsaha dia hohanin''ny voro-manidina.'
mg1865::mg_11::16::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Basa sisa mbamin''izay nataony ary ny heriny, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_11::16::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Basa lasa nodimandry any amin''ny razany, dia nalevina tao Tirza; ary Elaha zanany no nanjaka nandimby azy.'
mg1865::mg_11::16::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho mpaminany zanak''i Hanany, dia nampitondraina ny tenin''i Jehovah ny amin''i Basa sy ny taranany, satria nanao ratsy teo imason''i Jehovah ka nampahatezitra Azy tamin''ny asan''ny tanany, ka dia tonga tahaka ny mpianakavin''i Jeroboama, ary satria namono ireo izy.'
mg1865::mg_11::16::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahenina amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Elaha, zanak''i Basa, tamin''ny Isiraely tao Tirza, ary nanjaka roa taona izy.'
mg1865::mg_11::16::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zimry mpanompony, komandin''ny antsasaky ny kalesiny, nikomy taminy, raha nisotro ho mamo tao Tirza, tao an-tranon''i Arza, lehiben''ny tao an-dapa tao Tirza, izy.'
mg1865::mg_11::16::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra Zimry ka namely an''i Elaha ho faty tamin''ny taona fahafito amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, ary izy no nanjaka nisolo azy.'
mg1865::mg_11::16::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony vao nanjaka Zimry ka nipetraka tamin''ny seza fiandrianany, dia namono ny mpianakavin''i Basa rehetra izy; ka tsy navelany hisy miangana na dia lehilahy iray akory aza. na tamin''ny havany, na tamin''ny sakaizany.'
mg1865::mg_11::16::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nandringanan''i Zimry ny mpianakavin''i Basa rehetra, araka ny tenin''i Jehovah izay nampilazainy an''i Jehovah mpaminany ny amin''i Basa,'
mg1865::mg_11::16::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny fahotany rehetra sy ny fahotan''i Elaha zanany koa, izay nataony sady nampanotany ny Isiraely ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny zava-poanany.'
mg1865::mg_11::16::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Elaha sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_11::16::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahafito amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, no nanjakan''i Zimry hafitoana tao Tirza. Ary ny olona nanao fahirano an''i Gibetona, izay an''ny Filistina.'
mg1865::mg_11::16::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay nitoby teo dia nandre hoe: Efa nikomy Zimry sady efa namono ny mpanjaka koa; ary ny Isiraely rehetra tany an-tobiny nampanjaka an''i Omry, komandin''ny miaramila, androtrizay ihany ho mpanjakan''ny Isiraely.'
mg1865::mg_11::16::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra avy tao Gibetona Omry sy ny Isiraely rehetra niaraka taminy, ka dia nanao fahirano an''i Tirza.'
mg1865::mg_11::16::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Zimry fa afaka ny tanana, dia lasa niditra tao amin''ny trano avo amin''ny lapa izy, ary nodorany tamin''ny afo ny lapa. ka may tao izy, dia maty'
mg1865::mg_11::16::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny fahotana izay nataony tamin''ny nanaovany izay ratsy eo imason''i Jehovah, tamin''ny nandehanany tamin''ny lalan''i Jeroboama sy tamin''ny fahotana izay nataony sady nampanotany ny Isiraely.'
mg1865::mg_11::16::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Zimry sisa mbamin''ny fikomiany, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_11::16::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany dia nizara roa ny lehilahy amin''ny Isiraely: ny antsasany nomba an i Tibny, zanak''i Ginata, hampanjaka azy; ary ny antsasany kosa nomba an''i Omry.'
mg1865::mg_11::16::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona izay nomba an''i Omry naharesy ny olona izay nomba an''i Tibny, zanak''i Ginata; ka dia maty Tibny, ary Omry no nanjaka.'
mg1865::mg_11::16::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny taona fahiraika amby telo-polo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Omry; ary nanjaka roa ambin''ny folo taona tamin''ny Isiraely izy; tao Tirza no nanjakany enin-taona.'
mg1865::mg_11::16::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novidiny talenta volafotsy roa tamin''i Samera ny havoan''i Samaria, dia nanao tanàna teo an-tampon''ny havoana izy, ary nataony hoe Samaria, araka ny anaran''i Samera, tompon''ny havoana, ny anaran''ny tanàna.'
mg1865::mg_11::16::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Omry nanao izay ratsy eo imason''i Jehovah; eny, nanao ratsy mihoatra noho izay rehetra teo alohany izy;'
mg1865::mg_11::16::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nandeha tamin''ny lalana rehetra nalehan''i Jeroboama, zanak''i Nebata, sy tamin''ny fahotana izay nampanotany ny Isiraely izy ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny zava-poanany.'
mg1865::mg_11::16::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Omry sisa mbamin''izay nataony sy ny heriny izay nasehony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_11::16::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Omry lasa nodi-mandry any amin''ny razany, dia nalevina tao Samaria izy; ary Ahaba zanany no nanjaka nandimby azy.'
mg1865::mg_11::16::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: 'Ny niantombohan''ny nanjahan''i Ahaba tamin''ny Isiraely'
  verse_text: 'Ary Ahaba, zanak''i Omry, vao nanjaka tamin''ny Isiraely tamin''ny taona fahavalo amby telo-polo nanjakan''i Asa, mpanjakan''ny Joda, ary nanjaka tamin''ny Isiraely tao Samaria roa amby roa-polo Taona izy.'
mg1865::mg_11::16::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaba, zanak''i Omry, nanao izay ratsy eo imason''i Jehovah mihoatra noho izay rehetra teo alohany.'
mg1865::mg_11::16::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nataony ho zavatra kely foana ny handeha amin''ny fahotan''i Jeroboama, zanak''i Nebata. ka dia nampakatra an''i Jezebela, zanakavavin''i Etibala, mpanjakan''ny Sidoniana, izy ho vadiny, dia nandeha nanompo an''i Bala ka niankohoka teo anatrehany.'
mg1865::mg_11::16::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao alitara ho an''i Bala tao amin''ny tranon''i Bala izay nataony tao Samaria izy.'
mg1865::mg_11::16::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaba nanao ny Aseraha ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, mihoatra noho ny mpanjakan''ny Isiraely rehetra izay teo alohany.'
mg1865::mg_11::16::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 16
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andron''i Ahaba no nanorenan''i Hiela Betelita an''i Jeriko; ny ain''i Abàrama lahimatoany no sazin''ny nanorenany ny fanambaniny, ary ny ain''i Segoba faralahiny no sazin''ny nananganany ny vavahadiny, araka ny tenin''i Jehovah izay nampilazainy an''i Josoa, zanak''i Nona.'
mg1865::mg_11::17::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niandohan''ny asan''i Elia mpaminany'
  verse_text: 'Ary Elia Tisbita, isan''ny nivahiny tany Gileada, nilaza tamin''i Ahaba hoe: Raha velona koa Jehovah, Andriamanitry ny Isiraely, Izay itsanganako eo anatrehany, dia tsy hisy ando na ranonorana akory amin''izao taona izao, raha tsy araka ny teniko ihany.'
mg1865::mg_11::17::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah tonga taminy nanao hoe:'
mg1865::mg_11::17::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà eto ianao, dia miantsinanàna ka miere any anilan''ny renirano Kerita, izay any atsinanan''i Jordana.'
mg1865::mg_11::17::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny renirano no hisotroanao, ary ny goaika efa nodidiako hamelona anao any.'
mg1865::mg_11::17::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa izy ka nanao araka ny tenin''i Jehovah; fa nandeha izy ka nititra teo anilan''ny renirano Kerita any atsinanan''i Jordana.'
mg1865::mg_11::17::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny goaika nitondra mofo sy hena ho azy isa-maraina ary mofo sy hena isan-kariva, ary ny rano tamin''ny renirano no nisotroany.'
mg1865::mg_11::17::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ela, dia ritra ny renirano noho ny tsy fisian''ny ranonorana tamin''ny tany.'
mg1865::mg_11::17::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah tonga taminy ka nanao hoe:'
mg1865::mg_11::17::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaingà ka mankanesa any Zarefata, izay naman''i Sidona, ary mitoera any; fa, indro, misy vehivavy mpitondratena any izay notendreko hamelona anao.'
mg1865::mg_11::17::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga izy ka nankany Zarefata. Ary nony mby teo am-bavahadin''ny tanàna izy, dia, indro, nisy vehivavy mpitondratena nanangona kitay hazo teo; ary niantso azy Elia ka nanao hoe: Masïna ianao. itondray rano kely amin''ny fisotroana aho mba hosotroiko.'
mg1865::mg_11::17::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony lasa naka ravehivavy, dia miantso azy Elia ka nanao hoe: Masïna ianao, itondray mofo kely koa eny an-tananao aho.'
mg1865::mg_11::17::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ravehivavy: Raha velona koa Jehovah Andriamanitrao, tsy manana mofo na dia iray akory aza aho, fa koba kely eran-tanan''ila ao amin''ny barika sy diloilo kely foana ao amin''ny tavoara; ary, he! maka tapa-kazo roa aho izao, ka hiditra hanamboatra ireo hohaninay mianaka, dia ho faty izahay.'
mg1865::mg_11::17::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Elia taminy: Aza matahotra, fa andeha miditra, ka manaova araka izany lazainao izany; nefa anaovy mofo kely ihany aho aloha, ka ento ety amiko, ary rehefa izany, dia vao manaova ho anao sy ny zanakao koa.'
mg1865::mg_11::17::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Tsy ho lany ny koba ao amin''ny barika, ary tsy ho ritra ny diloilo ao amin''ny tavoara mandra-pihavin''ny andro handatsahan''i Jehovah ranonorana amin''ny tany.'
mg1865::mg_11::17::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha ravehivavy ka nanao araka ny tenin''i Elia, ary izy sy ravehivavy mbamin''ny ankohonany dia nanan-kohanina elaela ihany.'
mg1865::mg_11::17::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy lany ny koba tao amin''ny barika, ary tsy ritra ny diloilo tao amin''ny tavoara, araka ny tenin''i Jehovah izay nampilazainy an''i Elia.'
mg1865::mg_11::17::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka izany, dia narary ny zana-dravehivavy tompon-trano, ary mafy indrindra ny aretiny, ka efa tsy nisy fofonaina intsony izy.'
mg1865::mg_11::17::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ravehivavy tamin''i Elia: Moa mifaninona akory izaho sy ianao, ry lehilahin''Andriamanitra o ? Tonga aty amiko va ianao hampahatsiaro ny fahotako ka hahafaty ny zanako ?'
mg1865::mg_11::17::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia taminy: Atolory ahy ny zanakao. Dia naka ny zaza teo an-tratran-dreniny izy ka nitondra azy niakatra ho any an-efi-trano ambony izay nitoerany, ary nampandry azy teo am-pandriany.'
mg1865::mg_11::17::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah izy ka nanao hoe: Jehovah Andriamanitro o, efa nahatonga loza koa tamin''ny mpitondratena izay nivahiniako va Ianao ka nahafaty ny zanany?'
mg1865::mg_11::17::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niampatra intelo tamin''ny zaza izy sady nitaraina tamin''i Jehovah hoe: Jehovah Andriamanitro o, mifona aminao aho, aoka hody aminy indray ny ain''ity zaza ity.'
mg1865::mg_11::17::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nihaino ny feon''i Elia, dia nody taminy indray ny ain''ny zaza, ka dia velona izy.'
mg1865::mg_11::17::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elia nandray ny zaza ka nitondra azy nidina avy tao an-efi-trano ambony ho ao anaty trano, dia natolony an-dreniny, ka hoy izy: Inty, fa velona ny zanakao.'
mg1865::mg_11::17::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy tamin''i Elia: Ankehitriny izao dia fantatro fa lehilahin''Andriamanitra tokoa ianao, ary marina ny tenin''i Jehovah aloaky ny vavanao.'
mg1865::mg_11::18::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nihaonan''i Elia tamin''i Ahaba. sy ny nandreseny ny mpaminanin''i Bala'
  verse_text: 'Ary nony afaka andro maro, dia tonga tamin''i Elia ny tenin''i Jehovah tamin''ny taona fahatelo nanao hoe: Mandehana hiseho amin''i Ahaba, fa handatsaka ranonorana amin''ny tany Aho.'
mg1865::mg_11::18::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Elia hiseho amin''i Ahaba. Ary mafy ny mosary tany Samaria.'
mg1865::mg_11::18::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaba niantso an''i Obadia, izay lehiben''ny tao an-dapany (Obadia dia natahotra an''i Jehovah tokoa,'
mg1865::mg_11::18::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nony naringan''i Jezebela ny mpaminanin''i Jehovah, dia nalain''i Obadia ny mpaminany zato ka nafeniny, dimam-polo avy no nataony tao an-johy iray, ary novelominy mofo sy rano ireo).'
mg1865::mg_11::18::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ahaba tamin''i Obadia: Andeha mitety ny tany, dia hatrany amin''ny loharano rehetra sy hatrany amin''ny lohasahan-driaka rehetra; fa angamba hahita ahitra hamelomana ny soavaly sy ny ampondra isika, mba tsy hisy hovonointsika ny biby fiompintsika.'
mg1865::mg_11::18::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nizara lalana izy, ka Ahaba nandeha tamin''ny lalana iray, ary Obadia kosa nandeha tamin''ny lalana iray.'
mg1865::mg_11::18::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tany an-dàlana Obadia indro, Elia nifanena taminy; ary nahalala azy izy, dia niankohoka ka nanao hoe: Hay! ianao va ity, ry Elia tompoko?'
mg1865::mg_11::18::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy namaly azy hoe: Eny, izaho ity, andeha, lazao amin''ny tomponao hoe: Injao, atsy Elia.'
mg1865::mg_11::18::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Obadia: Inona no heloko, no anoloranao ny mpanomponao ho eo an-tanan''i Ahaba hamonoany ahy?'
mg1865::mg_11::18::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Jehovah Andriamanitrao, dia tsy misy firenena na fanjakana izay tsy nanirahan''ny tompoko hitady anao; ary raha hoy ny olona: Tsy ato izy, dia nampianianiny izany firenena sy fanjakana izany raha tsy nahita anao izy.'
mg1865::mg_11::18::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny hoy ianao: Andeha, lazao amin''ny tomponao hoe: Injao, atsy Elia.'
mg1865::mg_11::18::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha vao miala aminao aho, dia ho entin''ny Fanahin''i Jehovah any amin''izay tsy fantatro ianao; koa raha tonga aho ka milaza amin''i Ahaba, nefa tsy ho hitany ianao tsinona, dia hovonoiny aho; kanefa izaho mpanomponao matahotra an''i Jehovah hatry ny fony mbola kely.'
mg1865::mg_11::18::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy nolazaina taminao va, tompoko, izay nataoko tamin''ilay namonoan''i Jezebela ny mpaminanin''i Jehovah, dia ny nanafenako ny mpaminanin''i Jehovah zato lahy, ka dimam-polo avy no nataoko tao an-johy iray, ary novelomiko mofo sy rano ireo?'
mg1865::mg_11::18::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ankehitriny hoy ianao: Andeha, lazao amin''ny tomponao hoe: Injao, atsy Elia; dia hamono ahy Ahaba.'
mg1865::mg_11::18::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Elia: Raha velona koa Jehovah, Tompon''ny maro, Izay itsanganako eo anatrehany, dia hiseho aminy tokoa aho anio.'
mg1865::mg_11::18::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Obadia nitsena an''i Ahaba ka nilaza taminy; ary Ahaba nandeha hitsena an''i Elia.'
mg1865::mg_11::18::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Ahaba Elia, dia hoy izy taminy: Hay! tonga ety ianao, ry ilay mampidi-doza amin''ny Isiraely!'
mg1865::mg_11::18::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Elia namaly hoe: Tsy izaho no nampidi-doza tamin''ny Isiraely, fa ianao sy ny mpianakavin''ny rainao ihany tamin''ny nandavanareo ny didin''i Jehovah sy ny nanarahanao ireo Bala.'
mg1865::mg_11::18::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny maniraha hamory ny Isiraely rehetra hihaona amiko any an-tendrombohitra Karmela, ary ny mpaminanin''i Bala dimam-polo amby efa-jato sy ny mpaminanin''ny Aseraha efa-jato, izay mihinana eo amin''ny latabatr''i Jezebela.'
mg1865::mg_11::18::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka tany amin''ny Zanak''Isiraely rehetra Ahaba ka namory ny mpaminany ho any an-tendrombohitra Karmela.'
mg1865::mg_11::18::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nankeo amin''ny olona rehetra Elia ka nanao hoe: Mandra-pahoviana no hiroa saina ianareo ? Raha Jehovah no Andriamanitra, manaraha Azy; fa raha Bala kosa, dia manaraha azy. Fa ny olona tsy namaly azy akory.'
mg1865::mg_11::18::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Elia tamin''ny olona: Izaho dia izaho irery ihany no sisa amin''ny mpaminanin''i Jehovah; fa ny mpaminanin''i Bala kosa dia dimam-polo amby efa-jato lahy.'
mg1865::mg_11::18::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ireo no hanome vantotr''ombilahy roa ho antsika; ary aoka izy no hifidy ny iray ho azy, dia handrasa azy ka hametraka azy eo ambonin''ny kitay hazo, nefa tsy hasiana afo ao; ary izaho kosa hamboatra ny iray ka hametraka azy eo ambonin''ny kitay hazo, nefa tsy hasiana afo koa ao.'
mg1865::mg_11::18::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miantsoa ny anaran''ny andriamanitrareo ianareo, ary izaho kosa hiantso ny anaran''i Jehovah; koa Izay Andriamanitra mamaly amin''ny afo, dia aoka Izy no ho Andriamanitra. Ary ny olona rehetra namaly hoe: Marina izany teny izany.'
mg1865::mg_11::18::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia tamin''ireo mpaminanin''i Bala: Mifidiana vantotr''ombilahy iray ho anareo, ka dia manamboara aloha ianareo, satria ianareo no maro; ary miantsoa ny anaran''ny andriamanitrareo, nefa aza asiana afo ao.'
mg1865::mg_11::18::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka ny vantotr''ombilahy izay nomeny azy ireo ka namboatra azy, dia niantso ny anaran''i Bala hatramin''ny maraina ka mandra-pitataovovonan''ny andro izy ka nanao hoe : Ry Bala o, henoy izahay! Kanjo tsy nisy nanoina na namaly akory. Ary nihinjakinjaka tamin''ny alitara izay nataony izy.'
mg1865::mg_11::18::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nitataovovonana ny andro, dia nanesoeso azy Elia ka nanao hoe: Miantsoa mafy ihany, fa andriamanitra izy; angamba sondrian-dresaka izy, na miavela, na nisy nalehany, na matory angaha izy ka tsy maintsy hofohazina.'
mg1865::mg_11::18::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso mafy indray ireo sady nitetika ny tenany araka ny fanaony amin''ny sabatra sy ny lefona mandra-pahaloa-drà tamin''ny tenany.'
mg1865::mg_11::18::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia efa nitsidika aza ny andro, dia mbola naminany ihany izy hatramin''ny fotoan''ny fanatitra hariva; nefa tsy nisy nanoina, na namaly, na nihaino azy akory.'
mg1865::mg_11::18::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia tamin''ny olona rehetra: Manatona ahy. Dia nanatona azy ny olona rehetra. Ary Elia namboatra ny alitaran''i Jehovah izay efa rava'
mg1865::mg_11::18::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka naka vato roa ambin''ny folo, araka ny isan''ny firenen''ny zanak''i Jakoba, izay nihavian''ilay tenin''i Jehovah hoe: Isiraely no ho anaranao;'
mg1865::mg_11::18::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izany vato izany dia nataony alitara ho an''ny anaran''i Jehovah; ary nanao hady kely manodidina ny alitara koa izy, izay mifafy* voan-javatra indroan''ny famarana**. [*Na: mahalany] [**Hebreo: sea]'
mg1865::mg_11::18::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandahatra ny kitay hazo izy, dia nandrasa ny vantotr''ombilahy ka nametraka azy teo ambonin''ny kitay hazo,'
mg1865::mg_11::18::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao hoe: Fenoy rano ny siny efatra, ka aidino amin''ny fanatitra dorana sy amin''ny kitay hazo. Dia hoy koa izy: Ataovy indray izany. Dia nataony indray. Ary hoy koa izy: Ataovy indray koa izany. Ary dia nataony indray koa.'
mg1865::mg_11::18::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rano nikorotsaka nanodidina ny alitara; ka nofenoiny rano koa ny hady kely.'
mg1865::mg_11::18::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny fotoan''ny fanatitra hariva dia nanatona Elia mpaminany ka nanao hoe: Jehovah o. Andriamanitr''i Abrahama sy Isaka ary Isiraely, aoka ho fantatra anio fa Ianao no Andriamanitra amin''ny Isiraely, ary izaho no mpanomponao, ary araka ny teninao no efa nanaovako izao zavatra izao.'
mg1865::mg_11::18::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ahy mihainoa ahy, Jehovah o, mba hahafantaran''ireto olona ireto fa Ianao Jehovah no Andriamanitra, ary Ianao no mampiverina ny fony indray.'
mg1865::mg_11::18::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia latsaka ny afon''i Jehovah ka nandevona ny fanatitra dorana sy ny kitay hazo sy ny vato ary ny vovoka sady nandritra ny rano tao amin''ny hady kely.'
mg1865::mg_11::18::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita izany ny olona rehetra, dia niankohoka ka nanao hoe: Jehovah, Izy no Andriamanitra; Jehovah, Izy no Andriamanitra.'
mg1865::mg_11::18::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia taminy: Sambory ny mpaminanin''i Bala; aza avela hisy afa-mandositra izy na dia iray akory aza. Dia nosamborin''ny olona izy; ary nentin''i Elia ho eo amin''ny ony Kisona, ka dia novonoiny teo.'
mg1865::mg_11::18::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elia tamin''i Ahaba: Miakara hihinana sy hisotro, fa misasasasa izato ny ranonorana be.'
mg1865::mg_11::18::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra hihinana sy hisotro Ahaba. Fa Elia kosa niakatra ho eo an-tampon''i Karmela, dia niankohoka tamin''ny tany, ary ny lohany nataony teo anelanelan''ny lohaliny'
mg1865::mg_11::18::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny zatovony: Miakara kely, ka tazano ny ranomasina. Dia niakatra izy ka nitazana, dia nanao hoe: Tsy misy na inona na inona. Ary hoy izy: Mandehana koa impito.'
mg1865::mg_11::18::44:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony fanimpitony, dia hoy izy: Misy rahona kely hoatra ny tanan''olona miakatra avy eny amin''ny ranomasina. Dia hoy izy: Miakara, ka lazao amin''i Ahaba hoe: Amboary ny kalesinao, ka midìna, fandrao voasakan''ny ranonorana ianao.'
mg1865::mg_11::18::45:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vetivety dia maintin''ny rahona sy ny rivotra ny lanitra, ka nisy ranonorana be. Ary Ahaba niakatra tamin''ny kalesy ka nankany Jezirela.'
mg1865::mg_11::18::46:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 18
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanan''i Jehovah dia tao amin''i Elia, dia nisikina izy ka nihazakazaka teo alohan i Ahaba mandra-pahatongany tany Jezirela.'
mg1865::mg_11::19::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandosiran''i Elia nankany an''efitra, sy ny nisehoan''Andriamanitra taminy tao Horeba, ary ny nanendrena an''i Elisa handimby azy'
  verse_text: 'Dia nolazain''i Ahaba tamin''i Jezebela izay rehetra nataon''i Elia, dia ny namonoany ny mpaminany rehetra tamin''ny sabatra.'
mg1865::mg_11::19::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jezebela naniraka olona tany amin''i Elia hanao hoe: Hataon''ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hataoko toy ny ain''ny anankiray amin''ireny ny ainao raha maraina toy izao.'
mg1865::mg_11::19::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita izany izy, dia niainga ka lasa nandeha hamonjy ny ainy dia nankany Beri-sheba, izay any Joda, ary ny zatovo najanony tao.'
mg1865::mg_11::19::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy kosa nandeha lalana indray andro tany an''efitra, ary tonga ka nipetraka teo ambanin''ny anjavidy* anankiray; dia nangataka ho faty izy ka nanao hoe: Aoka izay! alao ny aiko ankehitriny, Jehovah o. fa tsy tsara noho ny razako aho. [*Hebreo: rotema; zava-maniry mifanahatahaka amin''ny kifafam-bohitra]'
mg1865::mg_11::19::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandry natory teo ambanin''ny anjavidy* anankiray izy, indro, nisy anjely nanohina azy ka nanao taminy hoe. Miarena, ka homàna. [*Hebreo: rotema; zava-maniry mifanahatahaka amin''ny kifafam-bohitra]'
mg1865::mg_11::19::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nijery izy, ka, indro, teo anilan''ny lohany nisy mofo voaendy tamin''ny vato mahamay sy rano iray tavoara; ary nihinana sy nisotro izy, dia nandry indray.'
mg1865::mg_11::19::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy fanindroany indray Ilay Anjelin''i Jehovah, dia nanohina azy ka nanao hoe: Mifohaza, ka homàna, fa lavitra loatra ny halehanao.'
mg1865::mg_11::19::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha izy ka nihinana sy nisotro; ary nandeha tamin''ny tanjaka azony tamin''izany hanina izany efa-polo andro efa-polo alina izy ho any Horeba, tendrombohitr''Andriamanitra.'
mg1865::mg_11::19::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra tao anatin''ny zohy izy ka nitoetra tao. Ary, indro, tonga taminy ny tenin''i Jehovah nanao hoe: Manao inona aty ianao, ry Elia?'
mg1865::mg_11::19::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fitiavako an''i Jehovah, Andriamanitry ny maro; fa ny Zanak''Isiraely nahafoy ny fanekenao; ny alitaranao noravany, ny mpaminaninao novonoiny tamin''ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy.'
mg1865::mg_11::19::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: Mivoaha, ka mitsangana eo ambonin''ny tendrombohitra eo anatrehan''i Jehovah. Ary, indro, nandalo Jehovah, ka nisy rivotra be sady mahery namakivaky ny tendrombohitra sy nanorotoro ny harambato teo alohan'': Jehovah; nefa Jehovah tsy tao amin''ny rivotra; ary manarakaraka ny rivotra nisy horohoron-tany; nefa Jehovah tsy tao amin''ny horohoron-tany;'
mg1865::mg_11::19::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manarakaraka ny horohorontany nisy afo; nefa Jehovah tsy tao amin''ny afo; ary manarakaraka ny afo nisy feo nitsoka malemy.'
mg1865::mg_11::19::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ren''i Elia izany, dia nosaronany ny kapotiny ny tavany, ary nivoaka izy ka nijanona teo am-bava-zohy. Ary, indro, nisy feo nankao aminy nanao hoe: Manao inona aty ianao ry Elia ?'
mg1865::mg_11::19::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fitiavako an''i Jehovah, Andriamanitry ny maro; fa ny Zanak''Isiraely efa nahafoy ny fanekenao; ny alitaranao noravany, ary ny mpaminaninao novonoiny tamin''ny sabatra, ary izaho dia izaho irery ihany no sisa. nefa mbola mitady hahafaty ny aiko koa izy.'
mg1865::mg_11::19::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jehovah taminy: Mandehana, miverena amin''ny nalehanao ho any amin''ny efitr''i Damaskosy; ary raha mby any ianao, dia hosory Hazaela ho mpanjakan''i Syria;'
mg1865::mg_11::19::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jeho, zanak''i Nimsy, dia hosory ho mpanjakan''ny Isiraely; ary Elisa, zanak''i Safata, avy any Abela-mehola, dia hosory ho mpaminany handimby anao.'
mg1865::mg_11::19::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay afa-mandositra ny sabatr''i Hazaela dia hovonoin''i Jeho; ary izay afa-mandositra ny sabatr''i Jeho kosa dia hovonoin''i Elisa.'
mg1865::mg_11::19::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hamela fito arivo ao amin''ny Isiraely Aho, dia ny lohalika rehetra izay tsy nandohalika tamin''i Bala sy ny vava rehetra izay tsy nanoroka azy.'
mg1865::mg_11::19::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niala teo Elia ka nahita an''i Elisa, zanak''i Safata, izay nampiasa omby efatra amby roa-polo mikambana tsiroaroa avy, fa izy teo amin''ny roa farany indrindra; ary Elia nandroso nanatona azy, dia nanipy ny kapotiny hanarona azy.'
mg1865::mg_11::19::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao ny omby izy ka nihazakazaka nanaraka an''i Elia ary niteny hoe: Masïna ianao, avelao aho aloha hanoroka an''ikaky sy ineny vao manaraka anao. Ary hoy izy taminy: Mandehana miverina, fa naninona anao moa aho?'
mg1865::mg_11::19::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina niala taminy indray izy ka naka ny omby roa mikambana, dia namono azy, ary nandrahoiny* tamin''ny hazo fiasàn''ny omby ny henany ka nomeny ny olona, dia nihinana ireo; ary niainga izy ka nanaraka an''i Elia, dia nanompo azy. [*Na: natonony]'
mg1865::mg_11::20::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandresen''i Ahaba indroa an''i Beni-hadada, mpanjakan''i Syria'
  verse_text: 'Ary Beni-hadada, mpanjakan''i Syria, namory ny miaramilany rehetra, koa mpanjaka roa amby telo-polo mbamin''ny soavaly sy ny kalesy no niaraka taminy; dia niakatra izy ka nanao fahirano an''i Samada ary namely azy.'
mg1865::mg_11::20::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandefa iraka ho any amin''i Ahaba, mpanjakan''ny Isiraely, tany an-tanàna izy'
mg1865::mg_11::20::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'hanao aminy hoe: Izao no lazain''i Beni-hadada: Ny volafotsinao sy ny volamenanao dia ahy; ary ny vadinao aman-janakao, na dia ny tsara tarehy indrindra aza, dia ahy koa.'
mg1865::mg_11::20::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely namaly hoe: Eny marina ny teninao ry mpanjaka tompoko o: anao aho sy izay rehetra ananako.'
mg1865::mg_11::20::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina indray ny iraka ka nanao hoe: Izao no tenin''i Beni-hadada: Naniraka taty aminao aho nanao hoe: Ny volafotsinao sy ny volamenanao ary ny vadinao aman-janakao dia omeo ahy;'
mg1865::mg_11::20::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha maniraka ny mpanompoko ho aty aminao aho rahampitso toy izao, ka savany ny tranonao sy ny tranon''ny mpanomponao, dia horaisin''ny tanany sy ho entiny avokoa izay rehetra mahafinaritra ny masonao na inona na inona.'
mg1865::mg_11::20::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely nampaka ny loholona rehetra amin''ny tany ka nanao hoe: Masïna ianareo, fantaro sy izahao fa mila sotasota mihitsy ilehiny; fa efa naniraka taty amiko izy haka ny vadiko aman-janako mbamin''ny volafotsiko sy ny volamenako ka tsy nolaviko.'
mg1865::mg_11::20::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny loholona sy ny vahoaka rehetra taminy: Aza mihaino na manaiky.'
mg1865::mg_11::20::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy Ahaba tamin''ny irak''i Beni-hadada. Lazao amin''ny mpanjaka tompoko hoe: Izay rehetra nanirahanao tany amiko mpanomponao tamin''ny voalohany dia hataoko; fa izao zavatra izao kosa tsy azoko ekena. Dia lasa ireo iraka ka nitondra teny niverina tany amin''i Beni-hadada indray;'
mg1865::mg_11::20::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy naniraka tany aminy ka nanao hoe: Hataon''ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha ho ampy eran-tanan''ila akory ny vovok''i Samaria amin''ny isan-olona manaraka ahy.'
mg1865::mg_11::20::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely namaly hoe: Izao no holazainao aminy: Aoka izay vao misikina tsy mba hirehareha tahaka ny efa mamaha.'
mg1865::mg_11::20::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Beni-hadada izany teny izany, raha mbola nisotro tao an-trano rantsan-kazo izy sy ireo mpanjaka, dia hoy izy tamin''ny mpanompony: Milahara ianareo. Ary dia nilahatra hamely ny tanàna izy.'
mg1865::mg_11::20::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy mpaminany nanatona an''i Ahaba, mpanjakan''ny Isiraely, ka nanao hoe: Izao no lazain''i Jehovah: Hitanao va ireo olona maro be rehetra ireo ? Indro, hatolotro eo an-tananao ireo anio; dia ho fantatrao fa Izaho no Jehovah.'
mg1865::mg_11::20::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ahaba: Amin''iza? Ary hoy izy: Izao no lazain''i Jehovah: Amin''ny zatovon''ny komandin''ny fanapahana isan-tokony. Dia hoy izy: Iza ary no hamely aloha ? Ianao ihany, hoy izy.'
mg1865::mg_11::20::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandamina ny zatovon''ny komandin''ny fanapahana isan-tokony izy, ka roa amby telo-polo amby roan-jato no isany; ary manarakaraka izany, dia nandamina ny olona rehetra izy, dia ny Zanak''Isiraely rehetra, ka fito arivo no isany.'
mg1865::mg_11::20::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka izy nony nitataovovonana ny andro. Fa Beni-hadada nisotro ho mamo tao an-trano rantsan-kazo, dia izy sy ireo mpanjaka roa amby telo-polo izay nanampy azy.'
mg1865::mg_11::20::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zatovon''ny komandin''ny fanapahana isan-tokony nivoaka voalohany; ary Beni-hadada naniraka, ka dia nilazana hoe: Misy olona efa nivoaka avy any Samaria.'
mg1865::mg_11::20::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Ataovy sambo-belona izy, na ho avy hihavana, na ho avy hiady.'
mg1865::mg_11::20::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka avy tao an-tanàna ireo zatovon''ny komandin''ny fanapahana isan-totony ireo sy ny miaramila izay nanaraka azy.'
mg1865::mg_11::20::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nahafaty olona iray avy izy rehetra; dia vaky nandositra ny Syriana, ka nenjehin''ny Isiraely; ary Beni-hadada, mpanjakan''i Syria, nandositra an-tsoavaly mbamin''ny mpitaingin-tsoavaly sasany koa.'
mg1865::mg_11::20::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely nivoaka, dia namely: ny an-tsoavaly sy ny an-kalesy, ka nahafatesany be dia be ny Syriana.'
mg1865::mg_11::20::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay mpaminany nankany amin''ny i mpanjakan''ny Isiraely ka nanao taminy hoe: Mahereza tsara, ary fantaro sy izahao izay ataonao; fa raha miherina ny taona, dia hiakatra indray ny mpanjakan''i Syria hiady aminao.'
mg1865::mg_11::20::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompon''ny mpanjakan''i Syria taminy: Andriamanitry ny havoana ny Andriamanitr''izy ireo, koa izany no nahareseny antsika; fa aoka ange isika hiady aminy eny an-tany lemaka, raha tsy ho resintsika izy e.!'
mg1865::mg_11::20::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao zavatra izao no ataovy: Esory ny mpanjaka samy hiala amin''ny toerany avy, ka asio mpanapaka hisolo azy;'
mg1865::mg_11::20::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ianao kosa dia makà miaramila ho anao toraka ny miaramilanao izay maty teo ary soavaly ho solon''ny soavaly sy kalesy ho solon''ny kalesy; ary hiady aminy eny an-tany lemaka isika, ka dia hahery noho izy tokoa. Ary nanaiky ny tenin''ireo izy, ka dia nataony izany.'
mg1865::mg_11::20::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niherina ny taona, dia nandamina ny Syriana Beni-hadada ka niakatra nankany Afeka hiady amin''ny Isiraely.'
mg1865::mg_11::20::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely rehetra kosa dia nalamina sy novatsiana, ka dia lasa hiady aminy; ary ny Zanak''Isiraely nitoby tandrifiny toy ny osy andiany kely roa toko; fa ny Syriana kosa nanenika ny tany.'
mg1865::mg_11::20::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatona ilay lehilahin''Andriamanitra ka nilaza tamin''ny mpanjakan''ny Isiraely hoe: Izao no lazain''i Jehovah: Satria ny Syriana nilaza hoe: Andriamanitry ny havoana ihany Jehovah, fa tsy mba Andriamanitry ny tany lemaka, dia hatolotro eo an-tananao ireo olona maro be rehetra ireo, ka dia ho fantatrao fa Izaho no Jehovah.'
mg1865::mg_11::20::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitoby mifanandrify hafitoana izy roa tonta. Ary tamin''ny andro fahafito, dia raikitra ny ady; ary ny Zanak''Isiraely nahafaty ny miaramila an-tongotra iray hetsy tamin''ny Syriana indray andro.'
mg1865::mg_11::20::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sisa dia nandositra nankany an-tanàna Afeka; nefa nianjeran''ny manda ireny olona sisa ireny, ary fito arivo amby roa alina no isany. Ary Beni-hadada nandositra nankany an-tanàna ka niditra tao amin''ny efi-trano anatiny*. [*Na: nitsofotsofoka amin''ny efi-trano]'
mg1865::mg_11::20::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpanompony taminy: Indro, efa renay fa mpanjaka mamindra fo ireo mpanjakan''ny taranak''Isiraely. Koa masïna ianao, avelao hosikinanay lamba fisaonana* ny valahanay, ary hasianay mahazaka ny lohanay, dia hankany amin''ny mpanjakan''ny Isiraely izahay; angamba hovelominy ny ainao. [*Hebreo: lamba malailay]'
mg1865::mg_11::20::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosikinany lamba fisaonana* ny valahany, ary nasiany mahazaka ny lohany, dia nankany amin''ny mpanjakan''ny Isiraely izy ka nanao hoe: Izao no fitenin''i Beni-hadada mpanomponao: Avelao mba ho velona ny aiko. Ary hoy izy: Moa mbola velona ihany va izy? Rahalahiko izy. [*Hebreo: lamba malailay]'
mg1865::mg_11::20::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''ireo olona ireo fa zara ho azy izany*, dia namonjy nanantitra ny teniny izy ka nanao hoe: Rahalahinao hoe Beni-adada. Dia hoy izy: Mandehana, alao izy. Ary Beni-hadada nankany aminy, dia nasainy niakatra ho eo amin''ny kalesiny. [*Hebreo: nanao sikidy]'
mg1865::mg_11::20::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Beni-hadada taminy: Ny tanàna izay nalain''ny raiko tamin''ny rainao dia hampodiko; ary manaova lalambe ho anao any Damaskosy, tahaka ny nataon''ny raiko tany Samaria. Ary hoy Ahaba: Halefako ianao amin''izany fanekena izany. Dia nanao fanekena taminy izy ka nandefa azy.'
mg1865::mg_11::20::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray, zanaky ny mpaminany, niteny tamin''ny namany araka ny tenin''i Jehovah ka nanao hoe: Masïna ianao asio aho. Fa tsy nety namely azy ilay lehilahy.'
mg1865::mg_11::20::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Satria ianao tsy nihaino ny feon''i Jehovah, indro, fa raha vao miala amiko eto ianao, dia hisy liona hamono anao. Ary raha vao niala teo aminy izy, dia hitan''ny liona ka novonoiny.'
mg1865::mg_11::20::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita lehilahy hafa indray ralehilahy ka nanao hoe: Masïna ianao, asio aho. Ary ilay lehilahy namely azy, dia voa izy ka naratra.'
mg1865::mg_11::20::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ilay mpaminany ka niandry ny mpanjaka teny an-dàlana, ary nasiany fehiloha tamin''ny handriny tsy hahafantarany azy.'
mg1865::mg_11::20::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandalo ny mpanjaka, dia nitaraina taminy ilay mpaminany ka nanao hoe: Izaho mpanomponao nankany anatin''ny ady; ary, indro, nisy lehilahy anankiray nivily ka nitondra lehilahy tany amiko sady nanao hoe: Hazony ity lehilahy ity; fa raha tahiny lasa izy, dia ny ainao no hisolo ny amy, na handoa talenta volafotsy iray ianao.'
mg1865::mg_11::20::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony nikeninkenina tetsy sy teroa ny mpanomponao, dia lasa izy. Ary hoy ny mpanjakan''ny Isiraely taminy: Ho tahaka izany ihany no hitsarana anao; ny tenanao no nilaza izany.'
mg1865::mg_11::20::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nesoriny haingana ilay fehi-loha tamin''ny handriny; ka dia fantatry ny mpanjakan''ny Isiraely fa isan''ny mpaminany izy.'
mg1865::mg_11::20::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Izao no lazain''i Jehovah: Satria nalefanao niala teo an-tananao ny lehilahy izay nasaiko hovonoina* tokoa, dia ny ainao no hisolo ny ainy, ary ny olonao no hisolo ny olony. [*Hebreo: nataoko herema]'
mg1865::mg_11::20::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 20
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely nandeha ho any an-tranony sady nalahelo no sosotra, dia tonga tany Samaria.'
mg1865::mg_11::21::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namonoana an''i Nabota. sy ny nahazoan''i Ahaba ny tanim-boalobony ary ny loza voalaza Anjo an''i Ahaba'
  verse_text: 'Ary rehefa afaka izany zavatra izany, Nabota Jezirelita nanana tanim-boaloboka tao Jezirela, takaikin''ny lapan''i Ahaba, mpanjakan''i Samaria.'
mg1865::mg_11::21::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaba niteny tamin''i Nabota hoe: Omeo ahy ny tanim-boalobokao mba hataoko fambolena anana, fa akaikin''ny lapako izy; ary hotakalozako tanim-boaloboka tsara noho izy, na vola tokom-bidiny, raha izany no sitraky ny fonao.'
mg1865::mg_11::21::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Nabota tamin''i Ahaba: Sanatria amiko eo anatrehan''i Jehovah izany! fa tsy homeko anao any tanin-drazako.'
mg1865::mg_11::21::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaba nankany an-trano sady malahelo no sosotra noho ny teny nolazain''i Nabota Jezirelita taminy hoe: Tsy homeko anao ny tanindrazako. Dia nandry teo am-parafarany izy ka nampihodina ny tavany sady tsy nety nihinan-kanina.'
mg1865::mg_11::21::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jezebela vadiny nankeo aminy ka nanao taminy hoe: Ahoana no mampahasosotra anao toy izao, no tsy mety homan-kanina ianao?'
mg1865::mg_11::21::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Satria niteny tamin''i Nabota Jezirelita aho ka nanao taminy hoe: Omeo ahy ny tanim-boalobokao hovidiko vola, na hotakalozako tanim-boaloboka hafa, raha izany no sitraky ny fonao; fa izy namaly hoe: Tsy homeko anao ny tanim-boaloboko.'
mg1865::mg_11::21::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jezebela vadiny taminy: Moa ianao tokoa va no manjaka amin''ny Isiraely izao? Miarena, mihinàna hanina, ary aoka ho ravoravo ny fonao; izaho hanome anao ny tanim-boalobok''i Nabota Jezirelita.'
mg1865::mg_11::21::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jezebela dia nanoratra taratasy tamin''ny anaran''i Ahaba, ka notombohiny tamin''ny fanombohan-kasen''andriana, ary ny taratasy dia nampitondrainy ho any amin''ny loholona sy ny manan-kaja tao an-tanànany, dia ireo niara-nitoetra tamin''i Nabota.'
mg1865::mg_11::21::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no nosoratany tao amin''ny taratasy: Miantsoa andro fifadian-kanina, ary apetraho eo anatrehan''ny olona Nabota.'
mg1865::mg_11::21::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia anangano roa lahy izay tena ratsy fanahy ho eo anatrehany hiampanga azy hoe: Efa niteny ratsy an''Andriamanitra sy ny mpanjaka ianao. Dia ento mivoaka izy, ka torahy vato ho faty.'
mg1865::mg_11::21::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona tao an-tanànany, dia ny loholona sy ny manan-kaja izay nonina tao, nanao araka izay nanirahan''i Jezebela tany aminy, dia ilay voasoratra ao amin''ny taratasy izay nampitondrainy tany aminy.'
mg1865::mg_11::21::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso andro fifadian-kanina izy ka nametraka an''i Nabota teo anatrehan''ny olona.'
mg1865::mg_11::21::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra ilay roa lahy tena ratsy fanahy ka nipetraka teo anatrehany, dia niampanga an''i Nabota teo anatrehan''ny olona ireo ka nanao hoe: Niteny ratsy an''Andriamanitra sy ny mpanjaka Nabota. Ary nentin''ny olona nivoaka teny ivelan''ny tanàna Nabota, dia notorahany vato ka maty.'
mg1865::mg_11::21::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka tany amin''i Jezebela izy ireo ka nanao hoe: Efa notoraham-bato Nabota ka maty.'
mg1865::mg_11::21::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Jezebela fa voatora-bato Nabota ka maty, dia hoy izy tamin''i Ahaba: Mitsangàna, ka alao ho anao ny tanim-boalobok''i Nabota Jezirelita, izay tsy foiny ho namidy taminao; fa tsy velona intsony Nabota fa efa maty.'
mg1865::mg_11::21::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Ahaba fa efa maty Nabota, dia niainga izy ka nidina nankany amin''ny tanim-boalobok''i Nabota Jezirelita mba haka ny tany ho azy.'
mg1865::mg_11::21::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah tonga tamin''i Elia Tisbita ka nanao hoe:'
mg1865::mg_11::21::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaingà, ka midìna hihaona amin''i Ahaba, mpanjakan''ny Isiraely, izay ao Samaria; indro, ao amin''ny tanim-boalobok''i Nabota izy, fa lasa nankao izy mba haka ny tany ho azy.'
mg1865::mg_11::21::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitenena aminy hoe: Izao no Jazain''i Jehovah: Efa namono va ianao ka efa naka ho anao koa? Ary ianao dia hiteny aminy hoe: Izao no lazain''i Jehovah: Ao amin''ny tany izay nilelafan''ny alika ny ran''i Nabota no hilelafan''ny alika ny rànao, dia ny rànao tokoa.'
mg1865::mg_11::21::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ahaba tamin''i Elia: Azonao va aho, ry ilay fahavaloko? Ary Elia namaly hoe: Azoko ianao, satria ianao efa nivaro-tena hanao izay ratsy eo imason''i Jehovah.'
mg1865::mg_11::21::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hahatonga loza aminao Aho ka handringana ny taranakao, ary ho fongotra ny lehilahy rehetra amin''ny taranak''i Ahaba, na ny voahazona na ny afaka amin''ny Isiraely.'
mg1865::mg_11::21::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranakao hataoko tahaka ny taranak''i Jeroboama, zanak''i Nebata, sy tahaka ny taranak''i Basa, zanak''i Ahia, noho ny nampirehetanao ny fahatezerako sy ny nampanotanao ny Isiraely.'
mg1865::mg_11::21::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''i Jezebela koa dia nolazain''i Jehovah hoe: Ny alika hihinana an''i Jezebela eny ivelan''ny màndan''i Jezirela.'
mg1865::mg_11::21::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tamingan''i Ahaba maty ao an-tanàna dia hohanin''ny alika; ary izay tamingany maty any an-tsaha kosa dia hohanin''ny voro-manidina.'
mg1865::mg_11::21::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy tahaka an''i Ahaba, izay nivarotena hanao izay ratsy eo imason''i Jehovah, satria nampirisihin''i Jezebela vadiny izy.'
mg1865::mg_11::21::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanao vetaveta loatra tamin''ny 1 nanarahany ny sampy, dia tahaka izay rehetra nataon''ny Amorita. izay noroahin''i Jehovah teo anoloan''ny Zanak''Isiraely.'
mg1865::mg_11::21::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Ahaba izany teny izany, dia nandriatra ny fitafiany izy ka nitafy lamba fisaonana nataony manolo-koditra sady nifady hanina sy nandry tamin-damba fisaonana ary nijoretra teny am-pandehanana.'
mg1865::mg_11::21::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Jehovah tonga tamin''i Elia Tisbita ka nanao hoe:'
mg1865::mg_11::21::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitanao va ny nanetren''i Ahaba tena teo anatrehako? Satria nanetry tena teo anatrehako izy. dia tsy hahatonga loza aminy Aho amin''ny androny; fa any amin''ny andron''ny zanany vao hahatonga loza amin''ny taranany Aho.'
mg1865::mg_11::22::1:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikambanan''i Ahaba sy Josafata hiady amin''ny Syriana, sy ny nakany hevitra tamin''ny mpaminany, ary ny nahafatesan''i Ahaba'
  verse_text: 'Ary nandry fahizay ny Syriana sy ny Isiraely telo taona, fa tsy niady.'
mg1865::mg_11::22::2:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny taona fahatelo, dia nidina Josafata, mpanjakan''ny Joda, ho any amin''ny mpanjakan''ny Isiraely.'
mg1865::mg_11::22::3:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjakan''ny Isiraely tamin''ny mpanompony: Moa fantatrareo va fa antsika Ramota-gileada, nefa isika mitoetra foana ka tsy maka azy amin''ny tanan''ny mpanjakan''i Syria?'
mg1865::mg_11::22::4:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy tamin''i Josafata: Mba hiaraka amiko hiady an''i Ramota-gileada va ianao? Dia hoy Josafata tamin''ny mpanjakan''ny Isiraely. Eny, fa tahaka ny tenanao ihany aho, ka ny oloko dia olonao, ary ny soavaliko dia soavalinao.'
mg1865::mg_11::22::5:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Josafata tamin''ny mpanjakan''ny Isiraely: Masïna ianao, anontanio aloha ny tenin''i Jehovah.'
mg1865::mg_11::22::6:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely dia nanangona ny mpaminany tokony ho efa-jato lahy ka nanao taminy hoe: Handena hanafika an''i Ramota-gileada va aho, sa hijanona ihany? Dia hoy ireo: Mandehana, fa hatolotry ny Tompo eo an-tananao izy, ry mpanjaka.'
mg1865::mg_11::22::7:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa Josafata: Moa tsy misy mpaminanin''i Jehovah koa va eto mba hanontaniantsika?'
mg1865::mg_11::22::8:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely tamin''i Josafata : Mbola misy lehilahy iray ihany, dia Mikaia, zanak''i Jimia, izay ahazoantsika manontany amin''i Jehovah, saingy halako izy, satria tsy mba maminany soa ho ahy izy. fa loza ihany. Dia hoy Josafata: Aza manao izany, ry mpanjaka.'
mg1865::mg_11::22::9:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely niantso ny tandapa anankiray ka nanao taminy hoe: Alao faingana Mikaia, zanak''i Jimla.'
mg1865::mg_11::22::10:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny Isiraely sy Josafata, mpanjakan''ny Joda, samy nipetraka teo amin''ny seza fiandrianany avy teo amin''ny famoloana eo anoloan''ny vavahadin''i Samaria sady samy efa niakanjo ny akanjony avy; ary ny mpaminany rehetra naminany teo matrehany.'
mg1865::mg_11::22::11:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zedekia, zanak''i Kenana, dia nanao tandroby ka nanao hoe: Izao no lazain''i Jehovah: ireto no hanotoanao ny Syriana mandra-paharingany.'
mg1865::mg_11::22::12:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpaminany rehetra naminany toy izany koa hoe: Mandehana any Ramota-gileada, dia hambinina ianao; fa Jehovah hanolotra azy eo an-tananao, ry mpanjaka.'
mg1865::mg_11::22::13:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay iraka izay nandeha naka an''i Mikaia niteny taminy hoe: Indro fa efa iray teny avokoa izao ny mpaminany ka milaza soa ho an''ny mpanjaka; masïna ianao, aoka re ny teninao mba ho tahaka ny an''ny anankiray amin''ireo, ka mba mitenena soa koa.'
mg1865::mg_11::22::14:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mikaia: Raha velona koa Jehovah, dia izay lazain''i Jehovah amiko ihany no hambarako.'
mg1865::mg_11::22::15:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''ny mpanjaka izy. Ary hoy ny mpanjaka taminy: Ry Mikaia, handeha hanafika an''i Ramota-gileada va isika, sa hijanona ihany? Ary izy namaly azy hoe: Mandehana, fa hambinina ianao, fa hatolotr''i Jehovah eo an-tananao izy, ry mpanjaka.'
mg1865::mg_11::22::16:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Impiry no hampianianako anao mba tsy hilaza na inona na inona amiko amin''ny anaran''i Jehovah afa-tsy izay marina ihany'
mg1865::mg_11::22::17:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mikaia Hitako fa indreny ny Isiraely rehetra niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry, ary hoy Jehovah: Ireto efa tsy manan-tompo, aoka izy samy hody soa aman-tsara any an-tranony avy.'
mg1865::mg_11::22::18:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely tamin''i Josafata: Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy, fa loza ihany?'
mg1865::mg_11::22::19:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mikaia: Henoy ary ny tenin''i Jehovah: Nahita an''i Jehovah nipetraka teo amin''ny seza fiandrianany aho, ary ireo maro be rehetra any an-danitra nitsangana teo andaniny avy, dia teo amin''ny ankavanany sy teo amin''ny ankaviany.'
mg1865::mg_11::22::20:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: Iza no hitaona an''i Ahaba handeha ho any Ramotagileada ka ho lavo any? Ary ny anankiray niteny toy izao, ary ny anankiray kosa niteny toy izao.'
mg1865::mg_11::22::21:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandroso ny fanahy ka nitsangana teo anatrehan''i Jehovah ary nanao hoe: Izaho no hitaona azy. Ary hoy Jehovah taminy: Amin''inona anefa?'
mg1865::mg_11::22::22:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Hivoaka aho ka ho tonga fanahy mandainga ao am-bavan''ny mpaminaniny rehetra. Dia hoy indray Jehovah: Ho voataonanao ihany izy, ka hahatanteraka ianao; mivoaha ary, ka ataovy izany.'
mg1865::mg_11::22::23:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, Jehovah efa nanisy fanahy mandainga ao am-bavan''ireto mpaminaninao rehetra ireto ary Izy koa efa nilaza ny loza hanjo anao.'
mg1865::mg_11::22::24:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zedekia, zanak''i Kenana, nanatona, dia namely ny takolak''i Mikaia sady nanao hoe: Taiza no nialan''ny Fanahin''i Jehovah tamiko hiteny aminao?'
mg1865::mg_11::22::25:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Mikaia: Indro, ho hitanao izany amin''ny andro hidiranao ao amin''ny efi-trano anatiny* hierenao. [*Na: hitsofotsofohanao amin''ny efi-trano]'
mg1865::mg_11::22::26:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjakan''ny Isiraely: Raiso Mikaia, ka ento miverina izy ho any amin''i Amona, komandin''ny tanàna, sy ho any amin''i Joasy, zanaky ny mpanjaka,'
mg1865::mg_11::22::27:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka lazao hoe: Izao no lazain''ny mpanjaka: Ataovy ao an-trano-maizina ilehity, ka fahano mofom-pahoriana sy ranom-pahoriana izy mandra-pahatongako soa aman-tsara.'
mg1865::mg_11::22::28:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mikaia: Raha tàhiny ho tafaverina soa aman-tsara ianao dia tsy nampitenenin''i Jehovah aho tsy akory. Ary hoy koa izy: Samia mihaino izany ianareo, ry firenena rehetra.'
mg1865::mg_11::22::29:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra nankany Ramota-gileada ny mpanjakan''ny Isiraely sy Josafata, mpanjakan''ny Joda.'
mg1865::mg_11::22::30:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjakan''ny Isiraely tamin''i Josafata: Hody olon-kafa aho ka hitsarapaka any anatin''ny ady, fa ianao kosa dia miakanjoa ny akanjonao ihany. Dia nody olon-kafa ny mpanjakan''ny Isiraely ka nitsarapaka tany anatin''ny ady.'
mg1865::mg_11::22::31:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjakan''i Syria efa nandidy ny roa amby telo-polo lahy, komandin''ny kalesy, nanao hoe: Aza miady na amin''ny kely na amin''ny lehibe, afa-tsy amin''ny mpanjakan''ny Isiraely ihany.'
mg1865::mg_11::22::32:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita an''i Josafata ireo komandin''ny kalesy, dia hoy izy: Iny mihitsy no mpanjakan''ny Isiraely. Dia nanatrika hiady taminy ireo; ka dia niantsoantso Josafata.'
mg1865::mg_11::22::33:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ireo komandin''ny kalesy fa tsy ny mpanjakan''ny Isiraely izy, dia niverina niala taminy ireo.'
mg1865::mg_11::22::34:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray nandefa zana-tsipïka kitoatoa ka nahavoa ny mpanjakan''ny Isiraely teo anelanelan''ny fiarovan-tratrany sy ny eo ambaniny; ka dia hoy izy tamin''ny mpampandeha ny kalesiny: Ahodino, ka ento miala eto amin''ny ady aho, fa voa.'
mg1865::mg_11::22::35:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihamafy ny ady tamin''izany andro izany; ary ny mpanjaka notohanana hitsangana teo amin''ny kalesiny tandrifin''ny Syriana, ary dia maty izy nony efa harivariva ny andro; ary ny rà nandeha avy teo amin''ny efa voa ho ao anatin''ny kalesy.'
mg1865::mg_11::22::36:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa hilentika ny masoandro, dia niely eran''ny toby rehetra izao antsoantso izao hoe: Samia mody any an-tanànany avy sy any amin''ny taniny avy!'
mg1865::mg_11::22::37:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia maty ny mpanjaka, ka nentina tany Samaria izy, dia nalevina tao.'
mg1865::mg_11::22::38:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nosasana teo am-parihin''i Samaria ny kalesiny, dia avy ny alika nilelaka ny ràny raha nandro tao ny vehivavy janga araka ny tenin''i Jehovah.'
mg1865::mg_11::22::39:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Ahaba sisa mbamin''izay rehetra nataony sy ny trano ivory izay nataony ary ny tanàna rehetra izay naoriny, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany?'
mg1865::mg_11::22::40:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahaba lasa nodi-mandry any amin''ny razany; ary Ahazia zanany no nanjaka nandimby azy.'
mg1865::mg_11::22::41:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 41
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Josafata tamin''ny Joda, sy Ahazia tamin''ny Isiraely'
  verse_text: 'Ary Josafata, zanak''i Asa, vao nanjaka tamin''ny Joda tamin''ny taona fahefatra nanjakan''i Ahaba, mpanjakan''ny Isiraely.'
mg1865::mg_11::22::42:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dimy amby telo-polo taona Josafata, fony izy vao nanjaka, ary dimy amby roa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Azoba, zanakavavin''i Sily.'
mg1865::mg_11::22::43:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha tamin''ny lalana rehetra izay nalehan''i Asa rainy izy ka tsy niala tamin''izany, fa nanao izay mahitsy eo imason''i Jehovah;'
mg1865::mg_11::22::44:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa kosa ny fitoerana avo tsy mba noravana, fa ny olona mbola namono zavatra hatao fanatitra sady mbola nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany.'
mg1865::mg_11::22::45:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josafata nanao fihavanana tamin''ny mpanjakan''ny Isiraely.'
mg1865::mg_11::22::46:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tantaran''i Josafata sisa sy ny heriny mbamin''ny niadiany, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany?'
mg1865::mg_11::22::47:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sisa amin''ny olona izay nanolo-tena hijangajanga ho fanompoan-tsampy, dia Izay mbola tany tamin''ny andron''i Asa rainy, dia nofongorany hiala amin''ny tany.'
mg1865::mg_11::22::48:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy mpanjaka tany Edoma fahizay, fa olona voatendry no nitondra ny fanjakana.'
mg1865::mg_11::22::49:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josafata nanao sambon''i Tarsisy folo hankany Ofira haka volamena; nefa tsy lasa ireo sambo ireo, fa nahavakiana tao Ezion-gebera.'
mg1865::mg_11::22::50:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Ahazia, zanak''i Ahaba, tamin''i Josafata: Aoka ny vahoakako hiaraka amin''ny vahoakanao any an-tsambo. Fa tsy nety Josafata.'
mg1865::mg_11::22::51:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josafata lasa nodi-mandry any amin''ny razany, dia nalevina tao amin''ny razany tao an-Tanànan''i Davida rainy izy; ary Jehorama zanany no nanjaka nandimby azy.'
mg1865::mg_11::22::52:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahazia, zanak''i Ahaba, vao nanjaka tamin''ny Isiraely tao Samaria tamin''ny taona fahafito ambin''ny folo nanjakan''i Josafata, mpanjakan''ny Joda; ary nanjaka roa taona tamin''ny Isiraely izy.'
mg1865::mg_11::22::53:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa nandeha tamin''ny lalan''ny rainy sy ny reniny ary tamin''ny lalan''i Jeroboama, zanak''i Nebata, izay nampanota ny Isiraely;'
mg1865::mg_11::22::54:
  verse_version: mg1865
  verse_book: mg_11
  verse_chapter: 22
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanompo an''i Bala izy, dia niankohoka teo anatrehany ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tahaka izay rehetra nataon-drainy.'
