mg1865::mg_39::1::1:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fitiavan''Andriamanitra ny Isiraely, sy ny nanamavoan''ireny ny anarany sy ny fombam-pivavahana aminy'
  verse_text: 'Teny faminaniana avy tamin''i Jehovah nampitondrainy an''i Malakia ho amin''ny Isiraely.'
mg1865::mg_39::1::2:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tia anareo Aho, hoy Jehovah; nefa hoy ianareo: Inona no nentinao nitia anay? Tsy rahalahin''i Jakoba va Esao? hoy Jehovah; nefa Jakoba no tiako,'
mg1865::mg_39::1::3:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Esao no halako, ka nataoko tany lao ny tendrombohiny, ary ny lovany natolotro ho an''ny amboadia* any an''efitra. [*Na: jakala]'
mg1865::mg_39::1::4:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia hoy aza Edoma: Torotoro izahay, nefa mbola hamboarinay indray ny efa rava dia izao no lazain''i Jehovah, Tompon''ny maro: Ireo dia hanamboatra, fa Izaho kosa handrava; ary dia hatao hoe tanin''ny faharatsiana, dia firenena tezeran''i Jehovah mandrakizay, ireo.'
mg1865::mg_39::1::5:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny masonareo no hahita, ka dia hiteny ianareo hanao hoe: Jehovah dia lehibe* any an-koatry** ny tanin''ny Isiraely. [*Na: ho lehibe anie, Na: eny amin'']'
mg1865::mg_39::1::6:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaka manaja ny rainy, ary ny mpanompo ny tompony; koa raha Ray Aho, aiza ary izay hajako? ary raha Tompo Aho, aiza izay tahotra Ahy? hoy Jehovah, Tompon''ny maro, aminareo, ry mpisorona, izay manamavo ny anarako. nefa manao hoe: Amin''inona no anamavoanay ny anaranao?'
mg1865::mg_39::1::7:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fitondrana hanina voaloto ho eo amin''ny alitarako. Nefa ianareo manao hoe: Amin''inona no andotoanay Anao ? Amin''ny fanaovanareo hoe: Ny latabatr''i Jehovah dia fanazimbazimba.'
mg1865::mg_39::1::8:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha jamba no entinareo hovonoina hatao fanatitra, tsy ratsy hoe izany! Ary raha mandringa sy marary no entinareo, tsy ratsy hoe izany! Atero ho an''ny governora manapaka anao ange izany, moa hahazo sitraka na fitia aminy va ianao? hoy Jehovah Tompon''ny maro.'
mg1865::mg_39::1::9:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa masïna ianareo, andeha mifona amin''Andriamanitra hamindrany fo amintsika fa ny tananareo no nahatonga izany, moa hankasitraka va Izy noho ny aminareo? hoy Jehovah, Tompon''ny maro.'
mg1865::mg_39::1::10:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hisy aminareo handrindrina ny varavarana ka tsy handrehitra afo foana eo ambonin''ny alitarako! Tsy hankasitraka anareo Aho, na ta-handray fanatitra amin''ny tananareo, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_39::1::11:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatramin''ny fiposahan''ny masoandro ka hatramin''ny filentehany dia lehibe* ny anarako any amin''ny jentilisa, ary any amin''ny tany rehetra no handoroana ditin-kazo manitra sy hanaterana fanatitra madio ho an''ny anarako; fa lehibe* any amin''ny jentilisa ny anarako, hoy Jehovah, Tompon''ny maro. [*Na: ho lehibe]'
mg1865::mg_39::1::12:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa manamavo izany amin''ny fanaovanareo hoe: Voaloto ny latabatr''i Jehovah, ary ny haniny aterina eo* dia tsinontsinona. [*Hebreo: vokany]'
mg1865::mg_39::1::13:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: '2022-07-22T06:01:11+0000'
  verse_title: null
  verse_text: 'Hoy koa ianareo: Tsy mba hasasarana lahy ! ary ikifinanareo izany, hoy Jehovah, Tompon''ny maro; entinareo ny nalaina an-keriny sy ny mandringa sy ny marary, ka dia aterinareo ho fanatitra; moa ta-handray izany amin''ny tenanareo va Aho ? hoy Jehovah.'
mg1865::mg_39::1::14:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voaozona ny mpamitaka, izay manana ondrilahy ao amin''ny ondriny, ary mivoady, nefa mamono zavatra misy kilema hatao fanatitra ho an''ny Tompo. Fa Mpanjaka lehibe Aho, hoy Jehovah, Tompon''ny maro, ary ny anarako dia mahatahotra any amin''ny jentilisa.'
mg1865::mg_39::2::1:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy fahamarinan''ny mpisorona, sy ny namalian''Andriamanitra azy'
  verse_text: 'Ary ankehitriny, ry mpisorona, dia ho aminareo izao didy izao:'
mg1865::mg_39::2::2:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy hihaino na handatsaka am-po ka hanome voninahitra ny anarako ianareo, hoy Jehovah, Tompon''ny maro, dia halefako hamely anareo ny ozona, ka hozoniko ny tso-drano ataonareo; eny, efa voaozoko sahady izany, satria tsy nandatsaka am-po ianareo.'
mg1865::mg_39::2::3:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hasiako teny mafy ny voa afafinareo, ary hofafazako tain-droroha ny tavanareo, dia ny tain-droroha avy amin''ny andro firavoravoanareo; ary hailika miaraka aminy ianareo.'
mg1865::mg_39::2::4:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantatrareo fa nampitondra izany didy izany ho aminareo Aho, mba haharetan''ny fanekeko amin''i Levy*, hoy Jehovah, Tompon''ny maro. [*Na: mba ho fanekeko amin''ny Levy zanany]'
mg1865::mg_39::2::5:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanekeko taminy dia fiainana sy fiadanana; ary nomeko azy ho fahatahorana izany, ka dia natahotra Ahy sy nangovitra teo anatrehan''ny anarako izy.'
mg1865::mg_39::2::6:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalàn''ny fahamarinana no teo am-bavany, ary tsy mba nisy tsy fahamarinana teo amin''ny molony; tamin''ny fiadanana sy ny fahitsiana no niarahany nandeha tamiko, ary maro no nampialainy tamin''ny heloka.'
mg1865::mg_39::2::7:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny molotry ny mpisorona tokony hitahiry fahalalana, ary ny lalàna hotadiavina eo am-bavany, satria irak''i Jehovah, Tompon''ny maro, izy.'
mg1865::mg_39::2::8:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa dia efa nivily lalana sady nampahatafintohina olona maro ny amin''ny lalàna ary namadika ny fanekena amin''i Levy, hoy Jehovah; Tompon''ny maro.'
mg1865::mg_39::2::9:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho kosa dia efa nanolotra anareo ho fanazimbazimba sy ho fanao tsinontsinona eo anatrehan''ny vahoaka rehetra, noho ny tsy nitandremanareo ny lalako sy ny nizahanareo tavan''olona ny amin''ny lalàna.'
mg1865::mg_39::2::10:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Fananarana ny olona noho ny fisaoram-bady nataony sy ny nifanambadiany tamin''ny jentilisa'
  verse_text: 'Tsy mpiombon-dray va isika rehetra? Tsy Andriamanitra iray ihany va no nahary antsika ? Koa nahoana no samy mivadika amin''ny rahalahintsika avy isika ka mamadika ny fanekena tamin''ny razantsika?'
mg1865::mg_39::2::11:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Joda efa namitaka, ary misy fahavetavetana atao ao amin''ny Isiraely sy ao Jerosalema; fa ny Joda efa nandoto ny fitoera-masin''i Jehovah, izay tiany, sady efa nanambady ny zanaka-vavin''ny andriamani-kafa.'
mg1865::mg_39::2::12:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hofongoran''i Jehovah hiala amin''ny lain''i Jakoba ny lehilahy izay manao izany, na iza na iza*, sy izay manatitra fanatitra ho an''i Jehovah, Tompon''ny maro. [*Hebreo: na ny mpiambina, na ny mpamaly]'
mg1865::mg_39::2::13:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary faharoan''izany, dia izao koa no ataonareo: Saronanareo ranomaso sy fitomaniana ary fisentoana ny alitaran''i Jehovah, ka tsy mba jereny intsony ny fanatitra, ary tsy handray fankasitrahana avy amin''ny tananareo Izy.'
mg1865::mg_39::2::14:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy ianareo: Nahoana? Satria Jehovah no vavolombelona ny aminao sy ny vadin''ny fahatanoranao izay nofitahinao, na dia namanao sady vady efa vita fanekena taminao aza izy.'
mg1865::mg_39::2::15:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: '2022-07-24T03:56:26+0000'
  verse_title: null
  verse_text: 'Moa tsy nisy anankiray nanao izany va, nefa mbola nanam-panahy ihany ? Fa inona anefa no notadiavin''ilay anankiray? Taranaka araka an''Andriamanitra*. Koa dia tandremo ny fanahinareo, ary aoka tsy hisy hamitaka ny vadin''ny fahatanorany. [*Na: moa tsy iray va no nataony? Nefa nanana fanahy sisa ihany Izy. Ary nahoana no iray? Nitady taranaka araka an''Andriamanitra Izy]'
mg1865::mg_39::2::16:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa halako ny fisaoram-bady, hoy Jehovah, Andriamanitry ny Isiraely, sy ny fanosenana fampahoriana amin''ny fitafiany, hoy Jehovah, Tompon''ny maro; koa tandremo ny fanahinareo, ary aza mamitaka ianareo.'
mg1865::mg_39::2::17:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny amin''ny andron''i Jehovah'
  verse_text: 'Efa manasatra an''i Jehovah amin''ny teninareo ianareo. Nefa hoy ianareo: Amin''inona moa no anasaranay Azy ? Amin''ny fanaovanareo hoe: Izay rehetra manao ratsy dia tsara eo imason''i Jehovah ka ankasitrahany, na amin''ny hoe: Aiza Andriamanitry ny fitsarana ?'
mg1865::mg_39::3::1:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, haniraka ny irako Aho, ary izy hanamboatra lalana eo alohako; ary ny Tompo Izay tadiavinareo dia ho avy tampoka ho eo an-tempoliny; ary ny Anjelin*''ny fanekena Izay irinareo, dia, indro, tamy Izy, hoy Jehovah, Tompon''ny maro. [*Na: Iraky]'
mg1865::mg_39::3::2:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa iza no mahatanty ny andro hihaviany? Ary iza no mahajanona, raha miseho Izy? Fa Izy dia tahaka ny afon''ny mpandrendrika sy ny savonin''ny mpanasa lamba.'
mg1865::mg_39::3::3:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hipetraka handrendrika sy hanadio volafotsy Izy; eny, hanadio ny taranak''i Levy Izy sy handrendrika azy toy ny fandrendrika volamena sy volafotsy, ka dia ho an''i Jehovah ireny ho mpanatitra fanatitra amim-pahamarinana.'
mg1865::mg_39::3::4:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho mamin''i Jehovah ny fanatitry ny Joda sy Jerosalema toy ny tamin''ny andro fahiny sy toy ny tamin''ny taona taloha.'
mg1865::mg_39::3::5:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanatona anareo ho fitsarana Aho ka ho vavolombelona faingana hanameloka ny mpanana ody sy ny mpijangajanga sy ny mpianian-tsy to sy ny mpampahory ny mpikarama amin''ny karamany mbamin''ny mpitondratena sy ny kamboty ary izay mampahory ny vahiny; fa tsy matahotra Ahy izy, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_39::3::6:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho Jehovah dia tsy miova, ary ianareo, ry taranak''i Jakoba, dia tsy fongana.'
mg1865::mg_39::3::7:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny andron''ny razanareo dia efa niala tamin''ny didiko ianareo ka tsy nitandrina azy. Miverena amiko, dia mba hiverina ho aminareo kosa Aho, hoy Jehovah, Tompon''ny maro. Nefa hoy ianareo: Ahoana ary no ho fiverinay?'
mg1865::mg_39::3::8:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handroba an''Andriamanitra va ny olona, no mandroba Ahy ianareo ? Nefa hoy ianareo: Amin''inona moa no androbanay Anao ? Amin''ny fahafolon-karena sy ny fanatitra*. [*Hebreo: fanatitra asandratra]'
mg1865::mg_39::3::9:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaozona amin''ny ozona ianareo nefa Izaho no robainareo, dia izao ianareo rehetra iray firenena izao.'
mg1865::mg_39::3::10:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Entonareo ny fahafolon-karena rehetra ho ao amin''ny trano firaketako, mba hasian-kanina ao an-tranoko, ary izahao toetra amin''izany Aho, hoy Jehovah, Tompon''ny maro, raha tsy hovohako ny varavaran''ny lanitra ho anareo ka hampidinako fitahiana manana amby ampy ho anareo.'
mg1865::mg_39::3::11:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hasiako teny mafy ny valala* noho ny aminareo, ka tsy hanimba ny vokatry ny tany intsony ireny, ka dia hahavanom-boa ny voalobokareo any an-tsaha, hoy Jehovah, Tompon''ny maro. [*Hebreo: mpandany]'
mg1865::mg_39::3::12:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo hataon''ny firenena rehetra hoe sambatra; fa ho tany mahafinaritra ianareo, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_39::3::13:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teninareo dia mahery mamely Ahy hoy Jehovah. Nefa hoy ianareo: Inona no resakay nentinay namely Anao?'
mg1865::mg_39::3::14:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny nanaovanareo hoe: zava-poana ny manompo an''Andriamanitra; ary inona moa no soa efa azo tamin''ny fitandremantsika izay nasainy notandremana sy tamin''ny nandehanantsika nitafy lamba fisaonana* teo anatrehan''i Jehovah, Tompon''ny maro. [*Na: nijoretra]'
mg1865::mg_39::3::15:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny isika dia midera ny mpirehareha hoe sambatra; eny, voaorina tsara izay nanao ratsy, sady efa naka fanahy an''Andriamanitra izy, nefa afa-nandositra ihany.'
mg1865::mg_39::3::16:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany izay natahotra an''i Jehovah dia samy niresaka tamin''ny namany avy; ary Jehovah nihaino ka nandre izany; ary nisy boky nosoratana teo anatrehany ho fahatsiarovana izay matahotra an''i Jehovah sy mihevitra ny anarany.'
mg1865::mg_39::3::17:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho rakitra soa ho Ahy ireny amin''ny andro izay hotendreko, hoy Jehovah, Tompon''ny maro, ary ho antra azy Aho toy ny olona antra ny zananilahy izay manompo azy.'
mg1865::mg_39::3::18:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho hitanareo indray ny tsy fitovian''ny marina sy ny meloka, dia ny manompo an''Andriamanitra sy ny tsy manompo Azy.'
mg1865::mg_39::3::19:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, avy ny andro, mandoro toy ny fatana fandoroana izy; ary ny mpirehareha rehetra sy ny mpanao ratsy rehetra dia ho vodivary; ka dia handoro azy ny andro izay ho avy, hoy Jehovah, Tompon''ny maro, ka tsy hasiany miangana, na ny fakany na ny sampany.'
mg1865::mg_39::3::20:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiposaka aminareo, izay matahotra ny anarako, ny Masoandron''ny fahamarinana, manana fanasitranana ao amin''ny tanany*; ary hivoaka ianareo ka hifalihavanja toy ny zanak''omby mifahy; [*Hebreo: elany]'
mg1865::mg_39::3::21:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hohitsahinareo ny ratsy fanahy; fa ho lavenona eo ambanin''ny faladianareo izay amin''ny andro izay hotendreko, hoy Jehovah, Tompon''ny maro.'
mg1865::mg_39::3::22:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovinareo ny làlan''i Mosesy mpanompoko, izay nandidiako azy tao Horeba ny amin''ny Isiraely rehetra, dia ny didy sy ny fitsipika.'
mg1865::mg_39::3::23:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Izaho haniraka an''i Elia mpaminany ho aminareo, dieny tsy mbola tonga ny andron''i Jehovah, ilay lehibe sady mahatahotra;'
mg1865::mg_39::3::24:
  verse_version: mg1865
  verse_book: mg_39
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay hampody ny fon''ny ray ho amin''ny zanaka, ary ny fon''ny zanaka ho amin''ny rainy, fandrao ho avy Aho hamely ny tany amin''ny fandringanana*. [*Hebreo: herema]'
