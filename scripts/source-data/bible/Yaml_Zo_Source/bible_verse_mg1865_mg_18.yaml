mg1865::mg_18::1::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny toetr''i Joba sy ny fizahan-toetra azy voalohany'
  verse_text: 'Nisy lehilahy tany amin''ny tany Oza Joba no anarany; ary marina sy mahitsy izany lehilahy izany sady natahotra an''Andriamanitra ka nifady ny ratsy.'
mg1865::mg_18::1::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteraka fito lahy sy vavy telo izy.'
mg1865::mg_18::1::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fananany dia ondry aman''osy fito arivo sy rameva telo arivo sy omby arivo sy borikivavy diman-jato ary mpanompo maro be; ka dia nanan-karena be mihoatra noho ny zanaky ny atsinanana rehetra izany lehilahy izany.'
mg1865::mg_18::1::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fanaon''ny zananilahy ny nandeha sy nanao fanasana isaky ny an''androny avy isan-tranony; dia naniraka naka ny anabaviny telo mirahavavy izy hiara-mihinana sy misotro aminy.'
mg1865::mg_18::1::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaky ny tapitra nitsingerina ireo andro fanasana ireo dia naniraka Joba ka nanamasina ireny ary nifoha maraina koa izy ka nanatitra fanatitra dorana araka ny isan''izy rehetra; fa hoy Joba: Fandrao efa nanota ny zanako ka nandà an''Andriamanitra tao am-pony. Izany no nataon''i Joba mandrakariva.'
mg1865::mg_18::1::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny indray andro nony avy ireo zanak''Andriamanitra hiseho teo anatrehan''i Jehovah dia mba tonga teo koa Satana tafaharo taminy.'
mg1865::mg_18::1::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Satana: Avy taiza ianao? Dia namaly an''i Jehovah Satana ka nanao hoe: Avy nizahazaha teny amin''ny tany aho ka nivezivezy teny.'
mg1865::mg_18::1::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Satana: Efa nandinika an''i Joba mpanompoko va ianao? Fa tsy misy tahaka azy eny ambonin''ny tany, fa olona marina sy mahitsy izy sady matahotra an''Andriamanitra ka mifady ny ratsy.'
mg1865::mg_18::1::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Satana dia namaly an''i Jehovah ka nanao hoe: Moa tsy fanantenan-javatra va no atahoran''i Joba an''Andriamanitra?'
mg1865::mg_18::1::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Ianao va no nanao fefy manodidina azy sy manodidina ny tranony ary manodidina izay ananany rehetra? Notahinao ny asan''ny tanany ka manenika ny tany ny omby aman''ondriny.'
mg1865::mg_18::1::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahinjiro ange ny tananao ka tendreo izay ananany rehetra raha tsy handà Anao eo imasonao aza* izy e! [*Na: hahafoy Anao mihitsy]'
mg1865::mg_18::1::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Satana: Indro eo an-tananao izay ananany rehetra; fa ny tenany ihany no aza aninjiranao ny tananao. Dia nivoaka Satana niala teo anatrehan''i Jehovah.'
mg1865::mg_18::1::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny indray andro dia nihinana sy nisotro divay teo an-tranon''ny zokiny lahimatoa ny zananilahy sy ny zananivavy;'
mg1865::mg_18::1::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisy iraka tonga tany amin''i Joba ka nanao hoe: Ny omby niasa, ary ny borikivavy nandrasana teo anilany,'
mg1865::mg_18::1::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia namely azy tampoka ny Sabeana ka namabo azy, ary ny ankizilahy dia nasiany tamin''ny lelan-tsabatra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
mg1865::mg_18::1::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Nisy afon''Andriamanitra latsaka avy tany an-danitra ary nandoro ny ondry aman''osy sy ny ankizilahy ka nandevona azy, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
mg1865::mg_18::1::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Ny Kaldeana nanao telo toko, dia niroatany ny rameva ka nobaboiny, ary ny ankizilahy dia nasiany tamin''ny lelan-tsabatra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
mg1865::mg_18::1::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Ny zanakao-lahy sy ny zanakao-vavy dia nihinana sy nisotro divay tao an-tranon''ny zokiny lahimatoa;'
mg1865::mg_18::1::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary, indro, nisy rivotra mahery avy tany an''efitra ka namely ny zoron-trano efatra, dia nianjera tamin''ny zatovo ny trano, ka maty izy rehetra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
mg1865::mg_18::1::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Joba ka nandriatra ny lambany, ary nanaratra ny lohany, dia niapoka tamin''ny tany ka niankohoka'
mg1865::mg_18::1::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanao hoe: Nitanjaka no nivoahako avy tany an-kibon''ineny, ary mitanjaka no hiverenako any; Jehovah no nanome, ary Jehovah no nanaisotra; isaorana anie ny anaran''i Jehovah'
mg1865::mg_18::1::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany rehetra izany dia tsy nanota Joba, na nanome tsiny an''Andriamanitra.'
mg1865::mg_18::2::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fizahan-toetra faharoa nahazo an''i Joba, sy ny namangian''ny sakaizany telo lahy azy'
  verse_text: 'Ary tamin''ny indray andro koa dia avy ireo zanak''Andriamanitra hiseho teo anatrehan''i Jehovah, ka dia mba tonga teo koa Satana tafaharo taminy hiseho teo anatrehan''i Jehovah.'
mg1865::mg_18::2::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Satana: Avy taiza ianao? Ary Satana dia namaly an''i Jehovah ka nanao hoe: Avy nizahazaha teny amin''ny tany aho ka nivezivezy teny.'
mg1865::mg_18::2::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Satana: Efa nandinika an''i Joba mpanompoko va ianao? Fa tsy misy tahaka azy eny ambonin''ny tany, fa olona marina sy mahitsy izy sady matahotra an''Andriamanitra ka mifady ny ratsy? Ary mbola mitana mafy ny fahamarinany ihany izy, na dia nanesika Ahy hamongotra azy foana aza ianao.'
mg1865::mg_18::2::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Satana dia namaly an''i Jehovah ka nanao hoe: Hoditra fefin''ny hoditra, eny, izay rehetra ananan''ny olona dia homeny ho-fefin''ny ainy.'
mg1865::mg_18::2::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ahinjiro ange ny tananao, ka tendreo ny taolany sy ny nofony raha tsy handà Anao eo Imasonao aza* Izy e! [*Na: hahafoy Anao mihitsy]'
mg1865::mg_18::2::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamin''i Satana: Indro, eo an-tananao izy; ny ainy tokana ihany no aza asiana.'
mg1865::mg_18::2::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka Satana avy teo anatrehan''i Jehovah ka namely vay ratsy an''i Joba hatramin''ny faladiany ka hatramin''ny tampon-dohany.'
mg1865::mg_18::2::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka tavim-bilany hihaorany izy, raha nipetraka teo an-davenona.'
mg1865::mg_18::2::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny vadiny taminy: Mbola mitana ny fahamarinanao ihany va ianao? Mahafoiza an''Andriamanitra ianao, dia aoka ho faty.'
mg1865::mg_18::2::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy taminy: Tahaka ny tenin''ny anankiray amin''ny vehivavy adala ny teninao. Moa ny soa ihany va no horaisintsika avy amin''Andriamanitra, fa tsy ny ratsy koa? Tamin''izany rehetra izany dia tsy nanota tamin''ny molony Joba.'
mg1865::mg_18::2::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny sakaizan''i Joba telo lahy ny fahoriana rehetra izay nanjo azy, dia samy niainga avy tany amin''ny fonenany avy izy dia Elifaza Temanita sy Bildada Sohita ary Zofara Namatita ary nifamotoana izy mba handeha hitsapa alahelo sy hampionona azy.'
mg1865::mg_18::2::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanopy ny masony teny lavidavitra eny izy telo lahy ka tsy nahafantatra azy, dia nanandratra ny feony izy ka nitomany; ary samy nandriatra ny lambany avy koa izy rehetra, dia nanopy vovoka ho amin''ny lanitra hiraraka amin''ny lohany.'
mg1865::mg_18::2::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niara-nipetraka teo aminy tamin''ny tany hafitoan''andro sy hafitoan''alina izy, nefa tsy nisy niteny taminy na dia indraim-bava akory aza, satria hitany fa mafy loatra ny fahoriany.'
mg1865::mg_18::3::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fitarainan''i Joba noho ny fahoriana nanjo azy'
  verse_text: 'Rehefa afaka izany, dia niloa-bava Joba ka nanozona ny androny'
mg1865::mg_18::3::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao hoe:'
mg1865::mg_18::3::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Foàna anie ny andro nahaterahako sy ny alina izay nanao hoe: Misy zazalahy vao torontoronina!'
mg1865::mg_18::3::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany andro izany dia aoka ho maizina, ary aoka tsy hitady azy Andriamanitra any ambony; ary aoka tsy hisy mazava hamirapiratra aminy;'
mg1865::mg_18::3::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny aizina sy ny aloky ny fahafatesana hahalasa azy indray*; Aoka ny rahona hitatao eo amboniny; Aoka izay zavatra mahamaizina ny andro hampahatsiravina azy. [*Na:handoto azy]'
mg1865::mg_18::3::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany alina izany aoka ny aizim-pito hisambotra azy; Aoka tsy hiara-mifaly amin''ny andron''ny taona izy. Ary tsy ho tonga amin''ny isan''ny volana;'
mg1865::mg_18::3::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro izany alina izany aoka ho momba izy; Aoka tsy ho velona ao ny hoby;'
mg1865::mg_18::3::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanozona azy ny mpanozona andro, Izay mahay mamoha ny dragona;'
mg1865::mg_18::3::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho maizina ny kintan''ny marainany; Aoka hiandry ny mazava izy, nefa tsy hisy, ary aoka tsy ho faly mahita ny hodimason''ny maraina izy,'
mg1865::mg_18::3::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy nanidy ny varavaran''ny kibon''ineny izy ka tsy nanafina fahoriana tamin''ny masoko.'
mg1865::mg_18::3::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana re aho no tsy maty hatrany am-bohoka e, ary tsy niala aina, fony vao nivoaka avy tany an-kibo e?'
mg1865::mg_18::3::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no nisy lohalika niandry ahy? Ary nahoana no nisy nono hinonoako?'
mg1865::mg_18::3::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy izany, dia efa nandry aho toy izay ka niadana, eny, natory aho ka afa-tsasatra,'
mg1865::mg_18::3::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny mpanjaka sy ny mpanolo-tsaina avy amin''ny tany, izay nanao* ireny tanàna efa rava**, [*Na: namboatra] [**Na: fasana lehibe]'
mg1865::mg_18::3::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na teo amin''ny andriandahy izay manana volamena sady mameno volafotsy ny tranony;'
mg1865::mg_18::3::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina, dia toy ny zaza izay tsy nahita ny mazava akory.'
mg1865::mg_18::3::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any no itsaharan''ny ratsy fanahy tsy hampitebiteby, ary any ny reraka no afa-tsasatra;'
mg1865::mg_18::3::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miara-miadana avokoa ny mpifatotra; Tsy mandre ny feon''ny mpampiasa izy.'
mg1865::mg_18::3::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy any ny kely sy ny lehibe, Ary ny mpanompo dia afaka amin''ny tompony.'
mg1865::mg_18::3::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no fahazavana no mba omena ny reraka, ary fiainana ho an''izay latsaka amin''ny fangidiana?'
mg1865::mg_18::3::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miandry fahafatesana, nefa tsy avy izy, sady mitady azy mihoatra noho ny fitady harena nafenina:'
mg1865::mg_18::3::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay faly indrindra sady ravoravo, raha mahita ny fasana,'
mg1865::mg_18::3::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia olona izay mandeha ao amin''ny maizina sady voafefin''Andriamanitra manodidina.'
mg1865::mg_18::3::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mialoha ny haninkaniko ny fitolokoko, ary migororoana toy ny rano ny fidradradradrako;'
mg1865::mg_18::3::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izay atahorako no mahazo ahy, ary izay angovitako no manjo ahy.'
mg1865::mg_18::3::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola nahita fiadanana na fitsaharana na fakàna aina akory aza aho, dia tonga indray ny tebiteby.'
mg1865::mg_18::4::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny voalohany nataon''i Elifaza'
  verse_text: 'Dia namaly Elifaza Temanita ka nanao hoe:'
mg1865::mg_18::4::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy sahy miteny aminao, dia ho sosotra va ianao? Fa raha ny mamehy vava kosa, iza moa no mahazaka izany?'
mg1865::mg_18::4::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa nananatra ny maro ianao. Ary ny tanana miraviravy efa nampaherezinao;'
mg1865::mg_18::4::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teninao efa nanohana izay efa saiky lavo, ary ny lohalika malemy efa nampahatanjahinao'
mg1865::mg_18::4::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ankehitriny mba manjo anao kosa izany, ka dia kivy ianao, Mihatra aminao izany, ka raiki-tahotra ianao'
mg1865::mg_18::4::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny fivavahanao* va no tokinao? Ary tsy fanantenanao va ny fahitsian''ny lalanao? [*Hebreo: fahatahoranao]'
mg1865::mg_18::4::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, tsarovy fa iza moa no very tsy nanan-tsiny? Ary taiza no nisy olo-mahitsy naringana?'
mg1865::mg_18::4::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay efa hitako, dia izay miasa heloka sy mamafy fahoriana no mijinja izany.'
mg1865::mg_18::4::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fofonain''Andriamanitra no andringanana azy. Eny, ny fofonain''ny fahatezerany no mahalevona azy.'
mg1865::mg_18::4::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''ny olona, eny, ny feon''ny liona masiaka, ary ny nifin''ny liona tanora dia ombotana;'
mg1865::mg_18::4::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mirenireny ny lion-dahy noho ny tsy fahitany remby, ary miely ny zanaky ny liom-bavy.'
mg1865::mg_18::4::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy teny tonga tamiko mangingina, ary ny sofiko nahare siosio avy taminy,'
mg1865::mg_18::4::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny eritreritra avy amin''ny tsindrimandry alina, raha sondrian-tory ny olona,'
mg1865::mg_18::4::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: '2022-06-25T06:38:47+0000'
  verse_title: null
  verse_text: 'Dia azon-tahotra sy hovitra aho, ka nampihorohoro ny taolako rehetra izany.'
mg1865::mg_18::4::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fanahy nandalo teo anatrehako ka nampitsangam-bolo ny tenako.'
mg1865::mg_18::4::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nijanona izy, nefa tsy nahafantatra ny tarehiny aho; Nisy endri-javatra teo anoloan''ny masoko; Nisy fanginana, dia nandre feo aho nanao hoe:'
mg1865::mg_18::4::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho marina noho* Andriamanitra va ny zanak''olombelona? Ho madio noho* ny Mpanao azy va ny olona? [*Na: eo anatrehan'']'
mg1865::mg_18::4::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsy matoky ireo mpanompony aza Izy, eny, ny anjeliny aza ataony ho tsy tonga ohatra.'
mg1865::mg_18::4::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mainka izay mitoetra ao an-trano tany, sady avy tamin''ny vovoka no nihaviany*, ary mora poritra noho ny kalalao izy; [*Hebreo: ao amin''ny vovoka fiorenany]'
mg1865::mg_18::4::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indray andro monja dia montsana izy; Tsy misy misaina azy, na dia levona mandrakizay aza izy.'
mg1865::mg_18::4::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy voaongotra va ny kofehin-dainy ao aminy? Maty izy, nefa tsy mbola nanam-pahendrena.'
mg1865::mg_18::5::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantsoa ange! moa misy hamaly anao va? Ary iza amin''ireo masina no hotodihinao?'
mg1865::mg_18::5::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny adala dia vonoin''ny fahasosorana, ary ny kely saina dia matin''ny fialonana.'
mg1865::mg_18::5::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho nahita olona adala mamaka, nefa vetivety Indray dia tsy maintsy nanozona ny fonenany aho;'
mg1865::mg_18::5::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lavitra ny famonjena ny zanany Ka torotoro eo am-bavahady, nefa tsy manan-kamonjy;'
mg1865::mg_18::5::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatry ny taniny dia lanin''ny noana, eny, alainy na dia voafefy tsilo aza; ary ny fandrika mitanatana vava hahazo ny fananany'
mg1865::mg_18::5::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mivoaka avy amin''ny vovoka ny alahelo, ary tsy mitrebona avy amin''ny tany ny fahoriana,'
mg1865::mg_18::5::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa teraka ho amin''ny fahoriana ny olombelona, dia tahaka ny fanidin''ny kilalaon''afo miakatra'
mg1865::mg_18::5::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha toa ahy kosa dia hitady an''Andriamanitra aho, ary Andriamanitra ihany no hotolorako ny teniko,'
mg1865::mg_18::5::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Izay manao zava-dehibe tsy takatry ny saina sy zava-mahagaga tsy hita isa,'
mg1865::mg_18::5::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Izay mampilatsaka ranonorana ety ambonin''ny tany ary mampandeha rano eny amin''ny saha,'
mg1865::mg_18::5::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka apetrany amin''ny avo Izay ambany, ary asandrany ho amin''ny fahafinaretana ny miory,'
mg1865::mg_18::5::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Izay mahafoana ny hevitry ny fetsy, ka tsy hahefan''ny tanany na inona na inona hahasoa ny tenany;'
mg1865::mg_18::5::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahafetsen''ny hendry ihany no entiny misambotra azy, ary ny saina ataon''ny mpiolakolaka dia rava;'
mg1865::mg_18::5::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia amin''ny antoandro aza dia tafatsarapaka ao amin''ny maizina ireny ka miraparapa amin''ny mitataovovonana tahaka ny amin''ny alina;'
mg1865::mg_18::5::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vonjeny kosa ny malahelo tsy ho voan''ny sabatry ny vavany; Eny, vonjeny tsy ho azon''ny tanan''ny mahery izy.'
mg1865::mg_18::5::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia misy fanantenana ho an''ny reraka; fa ny faharatsiana kosa mihombom-bava'
mg1865::mg_18::5::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, sambatra ny zanak''olombelona izay anarin''Andriamanitra, koa aza atao ho zavatra kely ny famaizan''ny Tsitoha;'
mg1865::mg_18::5::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sady mandratra Izy no mamehy; Manorotoro Izy, ary ny tanany ihany no manasitrana.'
mg1865::mg_18::5::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahoriana enina dia hamonjy anao Izy; Eny, amin''ny fito aza dia tsy hisy loza hihatra aminao.'
mg1865::mg_18::5::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha avy ny mosary, dia hiaro anao amin''ny fahafatesana Izy; Ary raha avy ny ady, dia hiaro anao tsy ho voan''ny sabatra Izy;'
mg1865::mg_18::5::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampiereny tsy ho voan''ny kapo-bava ianao, ary tsy hatahotra, raha avy ny fandringanana;'
mg1865::mg_18::5::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fandringanana sy ny mosary dia hihomehezanao; ary tsy hatahoranao ny bibi-dia;'
mg1865::mg_18::5::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vita fanekena amin''ny vato any an-tsaha aza ianao; Ary ny bibi-dia hihavana aminao;'
mg1865::mg_18::5::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho hitanao fa ny fiadanana no lainao; Ary raha mizaha ny kijanao ianao, dia ho hitanao fa tsy misy very ny ao;'
mg1865::mg_18::5::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho hitanao koa fa maro ny zanakao, ary ny terakao ho tahaka ny ahitra amin''ny tany;'
mg1865::mg_18::5::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haharitra ianao ambara-piditrao any am-pasana, raha mbola henjana, dia tahaka ny amboaram-bary akarina amin''ny fotoana.'
mg1865::mg_18::5::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany ary no izy, fa efa nandinika azy izahay; Hevero ary izany, ka fantaro tsara.'
mg1865::mg_18::6::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::6::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka holanjaina tokoa ny fahasosorako, ka hampifandaniaina amin''ny mizana izy sy ny fahoriako!'
mg1865::mg_18::6::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny mavesatra noho ny fasika any an-dranomasina ny fahoriako, koa dia nirediredy aho.'
mg1865::mg_18::6::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zana-tsipiky ny Tsitoha mitsatoka amiko, ka mifoka ny poizina avy aminy ny fanahiko; Ary ny fampitahorana Andriamanitra milahatra hamely ahy.'
mg1865::mg_18::6::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maneno va ny boriki-dia, raha eo amin''ny vilona? Na mimàmà va ny omby, raha eo amin''ny fihinany?'
mg1865::mg_18::6::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azo hanina va ny matsatso, raha tsy asian-tsira? Na mba misy tsirony va ny tafotsin''atody*? [*Na: ranon-tsikobonkobon-danitra]'
mg1865::mg_18::6::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra izay nolaviko tsy hotendrena, dia ireny no tsy maintsy haniko, na dia maharikoriko ahy aza.'
mg1865::mg_18::6::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho azoko izay angatahiko, ary homen''Andriamanitra ahy anie izay iriko!'
mg1865::mg_18::6::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka ho sitrak''Andriamanitra anie ny hanorotoro ahy! Eny, halefany anie ny tanany ka hahamaito ny aiko,'
mg1865::mg_18::6::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hahita fiononana amin''izany aho ka hiravoravo na dia amin''ny fangirifiriana tsy mifaditrovana aza, satria tsy nandà ny tenin''ny Iray Masina aho.'
mg1865::mg_18::6::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona moa ny heriko, no hanantena aho? Ary hanao ahoana moa ny farako, no hanindry fo* aho? [*Na: hanalava ny androko]'
mg1865::mg_18::6::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Herim-bato va ny heriko? Na varahina va ny nofoko?'
mg1865::mg_18::6::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy efa foana va ny hery ho entiko mamonjy tena, ary tsy efa nakifika hiala amiko va ny faharetana?'
mg1865::mg_18::6::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay efa mivarahontsana dia tokony hiantran''ny sakaizany. Fandrao mahafoy ny fahatahorana ny Tsitoha izy.'
mg1865::mg_18::6::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rahalahiko mampihambo manana ahy tahaka ny ranotrambo, dia tahaka ny mason-drano any an-dohasahan-driaka, izay malaky ritra,'
mg1865::mg_18::6::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mainty azon''ny ranomandry Sady iafenan''ny oram-panala;'
mg1865::mg_18::6::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha taninin''ny hainandro izy, dia levona; raha maina ny andro, dia ritra eo amin''ny fitoerany izy;'
mg1865::mg_18::6::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivilivily no fandehany tankina izy ka levona.'
mg1865::mg_18::6::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny antokon''i Tema mitazana, ny andian''i Sheba manantena azy;'
mg1865::mg_18::6::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Very hevitra ireo, satria samy nanampo; tonga teo izy, kanjo nangaihay.'
mg1865::mg_18::6::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny efa tsinontsinona ianareo; Nahita ny fahoriana ianareo ka raiki-tahotra.'
mg1865::mg_18::6::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa aho va efa nanao hoe: Omeo aho, ka mahafoiza zavatra ho ahy amin''ny fanananareo,'
mg1865::mg_18::6::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vonjeo amin''ny tanan''ny fahavalo aho, ka afaho amin''ny tanan''ny mpitohatoha?'
mg1865::mg_18::6::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianara ahy, dia hangina aho; Ary ampahafantaro izay nahadisoako aho.'
mg1865::mg_18::6::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny herin''ny teny marina! Fa mba mahavoa inona kosa moa ny anatra ataonareo?'
mg1865::mg_18::6::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny teniko ihany va no ananaranareo ahy? Fa ho amin''ny rivotra ny tenin''ny olona mamoy fo.'
mg1865::mg_18::6::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, fa na dia ny kamboty aza dia ataonareo loka, ary ny sakaizanareo dia ataonareo varotra.'
mg1865::mg_18::6::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny, masïna ianareo, mba atreho kely aho, dia ho hitanareo fa tsy handainga tsy akory aho.'
mg1865::mg_18::6::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianareo, diniho indray aho, ary aoka tsy hisy fitsarana tsy marina; eny, diniho indray aho, fa mbola ao ihany ny fahamarinako.'
mg1865::mg_18::6::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa misy heloka va eo amin''ny lelako?'
mg1865::mg_18::7::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahafantatra izay ratsy va ny vavako? Tsy mpiantafika va ny zanak''olombelona ety ambonin''ny tany? Ary tsy tahaka ny andron''ny mpikarama va ny androny?'
mg1865::mg_18::7::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny mpanompo maniry alokaloka, ary toy ny mpikarama miandry ny karaman''ny asany,'
mg1865::mg_18::7::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany no anaovana ahy hahita volana mampahory, ary alina mahadisadisa no tendrena ho ahy.'
mg1865::mg_18::7::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha vao mandry aho, dia mieritreritra hoe: Rahoviana re no hifoha aho? Fa mihalava izany ny alina*, ary mivadibadika indrindra aho mandra-pahazavan''ny andro. [*Hebreo: hariva]'
mg1865::mg_18::7::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nofoko mitafy olitra sy baingan-tany; efa maina ny hoditro, kanjo mitsiranorano indray.'
mg1865::mg_18::7::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faingana noho ny famahanan-tenona ny androko ka lany tsy misy fanantenana.'
mg1865::mg_18::7::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy fa rivotra ny aiko: ary tsy hahita soa intsony ny masoko.'
mg1865::mg_18::7::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hahita ahy intsony ny mason''izay mijery ahy: Ny masonao hizaha ahy, fa tsy ho ao aho.'
mg1865::mg_18::7::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny rahona misava ka levona, dia tahaka izany koa, izay midina any amin''ny fiainan-tsy hita* tsy mba hiakatra intsony; [*Hebreo: Sheola]'
mg1865::mg_18::7::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hiverina any an-tranony intsony izy. Ary tsy hahalala azy intsony ny fonenany.'
mg1865::mg_18::7::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho dia tsy hamehy vava, Fa hiteny noho ny fahorian''ny fanahiko sy hitaraina noho ny fangidian''ny aiko.'
mg1865::mg_18::7::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ranomasina va aho, na trozona, No dia asianao fiambenana?'
mg1865::mg_18::7::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy izaho: Hampionona ahy ny farafarako, hampitony ny fitarainako ny fandriako.'
mg1865::mg_18::7::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mampitahotra ahy amin''ny nofy Ianao ary mampihorohoro ahy amin''ny tsindrimandry;'
mg1865::mg_18::7::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia aleon''ny fanahiko ny hokendaina, eny, aleoko ny fahafatesana aza toy izay izato fitofezako* izato; [*Hebreo: taolako]'
mg1865::mg_18::7::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maharikoriko ahy izao, tsy tiako ny ho velona ela; Ilaozy miala aho, fa fofona foana ny androko.'
mg1865::mg_18::7::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona moa ny zanak''olombelona, no ekenao ho lehibe, ka ampandinihinao azy ny fonao,'
mg1865::mg_18::7::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady fantarinao isa-maraina izy; sy izahanao toetra isaky ny indray mipi-maso?'
mg1865::mg_18::7::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana re vao hihodina tsy hijery ahy Ianao, ka mba hiala amiko mandra-piteliko rora?'
mg1865::mg_18::7::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona? Nahoana no dia nataonao fikendry aho, ka efa tonga enta-mavesatra amiko aho?'
mg1865::mg_18::7::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Ianao? Fa izao dia efa handry any amin''ny vovoka aho; ary hitady ahy fatratra Ianao, fa tsy ho aty intsony aho.'
mg1865::mg_18::8::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny voalohany nataon''i Bildada'
  verse_text: 'Dia namaly Bildada Sohita ka nanao hoe:'
mg1865::mg_18::8::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hiteny toy izany ianao, ka ho rivotra mahery ny teny aloaky ny vavanao?'
mg1865::mg_18::8::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra va hamadika ny fitsarana, na ny Tsitoha hamadika ny rariny?'
mg1865::mg_18::8::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanota taminy ny zanakao, dia efa nampanodiaviny azy ny fahadisoany.'
mg1865::mg_18::8::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ianao kosa mandroso mitady an''Andriamanitra ka mifona amin''ny Tsitoha.'
mg1865::mg_18::8::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha madio sy mahitsy ianao, dia hifoha hamonjy* anao tokoa Izy ary hampiadana indray ny fonenan''ny fahamarinanao, [*Na: hiambina]'
mg1865::mg_18::8::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka na dia kely aza no niandohanao, dia ho lehibe indrindra no hiafaranao.'
mg1865::mg_18::8::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa masïna ianao, anontanio ange ny ntaolo, ka fantaro ny hevitra hitan''ny razany'
mg1865::mg_18::8::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa vao omaly isika ka tsy mba mahalala, fa aloka ihany ny androntsika ety ambonin''ny tany)'
mg1865::mg_18::8::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ireny va no hampianatra anao ka hilaza aminao ary hamoaka teny avy ao am-pony?'
mg1865::mg_18::8::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haniry va ny zozoro, raha tsy eny amin''ny fotaka? Hitrebona va ny harefo, raha tsy misy rano?'
mg1865::mg_18::8::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola maitso izy sady tsy voajinja, kanefa malazo alohan''ny zava-maitso rehetra.'
mg1865::mg_18::8::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no lalan''izay rehetra manadino an''Andriamanitra; Ary ho very ny fanantenan''ny mpihatsaravelatsihy*, [*Na: ratsy fanahy]'
mg1865::mg_18::8::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho maito ny fanantenany, eny, ho tranon-kala ny tokiny.'
mg1865::mg_18::8::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miankina amin''ny tranony izy, kanjo tsy maharitra iny; Mihazona azy mafy izy, kanjo tsy mahazaka azy iny.'
mg1865::mg_18::8::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsimoka tsara tandrifin''ny masoandro izy, ary ny rantsany misandrahaka eo amin''ny tanimboliny;'
mg1865::mg_18::8::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifelipelika mifaniditra eo amin''ny korontam-bato ny fakany ary mahazo any anelanelany;'
mg1865::mg_18::8::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony fongorany hiala amin''ny fitoerany izy, dia handà azy izany ka hanao hoe: Tsy mbola nahita anao akory aho.'
mg1865::mg_18::8::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izany ihany no fifalian''ny lalan-kalehany; ary hisy hafa indray mitrebona avy amin''ny vovoka.'
mg1865::mg_18::8::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Andriamanitra tsy hanary ny olona tsy manan-tsiny ary tsy hitantana ny mpanao ratsy;'
mg1865::mg_18::8::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hofenoiny hehy ny vavanao sy hoby ny molotrao.'
mg1865::mg_18::8::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mankahala anao hitafy henatra; Ary tsy hisy intsony ny lain''ny ratsy fanahy.'
mg1865::mg_18::9::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::9::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro tokoa fa izany no izy; Fa aiza no hahamarina ny zanak''olombelona eo anatrehan''Andriamanitra?'
mg1865::mg_18::9::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha te-hifandahatra aminy izy, dia tsy mahavaly teny Azy na dia iray amin''ny arivo aza.'
mg1865::mg_18::9::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hendry am-po Izy sady matanjaka amin''ny hery; iza no nikiry nanohitra Azy ka tsy naninona?'
mg1865::mg_18::9::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamindra tendrombohitra, nefa ireny tsy mahalala akory, izay mamadika azy amin''ny fahatezerany,'
mg1865::mg_18::9::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mampihorohoro ny tany ho afaka amin''ny fitoerany, ka mihozongozona ny andriny;'
mg1865::mg_18::9::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandidy ny masoandro Izy, ka tsy miposaka iny, ary manisy tombo-kase manafina ny kintana;'
mg1865::mg_18::9::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady Izy irery ihany no mamelatra ny lanitra sy mandia ny onjan-dranomasina;'
mg1865::mg_18::9::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao ireo kintana lehibe Izy, dia ny Bera sy ny Telonohorefy ary ny Ikotokelimiadilaona sy ireo kintana maro any atsimo*, [*Hebreo: ireny efi-trano ery atsimo]'
mg1865::mg_18::9::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manao zava-dehibe tsy takatry ny saina, eny, fahagagana tsy hita isa.'
mg1865::mg_18::9::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, mandalo ahy Izy, nefa tsy hitako; Ary mihelina Izy, nefa tsy fantatro.'
mg1865::mg_18::9::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, mipaoka Izy, ka iza no mahasakana Azy? Iza no hanao aminy hoe: Inona no ataonao?'
mg1865::mg_18::9::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra tsy mampitony ny fahatezerany; Ny mpanampy an-dRahaba* aza dia mitanondrika eo ambaniny. [*Rahaba = Rehareha]'
mg1865::mg_18::9::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mainka fa izaho tsy mahavaly Azy, na mahafidy teny hifandaharako aminy;'
mg1865::mg_18::9::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia marina aza aho, dia tsy hahavaly tsy akory; Hifona amin''Ilay manana ady amiko no hany heriko.'
mg1865::mg_18::9::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mba niantso aho, ka namaly ahy aza Izy, dia tsy ho nino aho fa hanaiky ny fitarainako Izy.'
mg1865::mg_18::9::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manorotoro ahy amin''ny tafio-drivotra Izy ka manamaro ny feriko tsy ahoan-tsy ahoana.'
mg1865::mg_18::9::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady tsy avelany haka aina akory aho, fa vokisany zava-mangidy.'
mg1865::mg_18::9::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amin''ny herin''ny mahery, dia: Indro ary! Ary ny amin''ny fitsarana: Iza no hifandahatra amiko?'
mg1865::mg_18::9::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia marina aza aho, dia hanameloka ahy ihany ny vavako; Ary na dia tsy manan-tsiny aza aho, dia hanao ahy ho meloka Izy.'
mg1865::mg_18::9::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina aho, ataoko tsinontsinona ny aiko; Tsy ahoako izay ho velona.'
mg1865::mg_18::9::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy hafa aminy, ka izany no nanaovako hoe: Ny marina sy ny meloka dia samy aringany avokoa.'
mg1865::mg_18::9::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy loza* mahafaty tampoka, dia mihomehy ny fizahan-toetra ny marina Izy. [*Hebreo: fikapohana]'
mg1865::mg_18::9::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany efa voatolotra ho eo an-tanan''ny ratsy fanahy; Manarona ny tavan''ny mpitsara eo Izy; Raha tsy Izy no manao izany, dia iza, kosa ary?'
mg1865::mg_18::9::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny androko dia faingana noho ny tsimandoa; Lasa ireny ka tsy nahita soa akory.'
mg1865::mg_18::9::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihelina tahaka ny lakana faingam-pandeha* izy, tahaka ny voromahery mipaoka hanina. [*Hebreo: lakana zozoro]'
mg1865::mg_18::9::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy izaho: Hanadino ny alaheloko aho, hitsahatra tsy hanjonitra aho ka ho miramirana,'
mg1865::mg_18::9::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mahatsiravina ahy ny fahoriako rehetra; Fantatro fa tsy hataonao ho tsy manan-tsiny aho.'
mg1865::mg_18::9::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy maintsy hatao ho meloka ihany aho, koa nahoana aho no hanasa-tena foana?'
mg1865::mg_18::9::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mandro amin''ny oram-panala aza aho ka manadio ny tanako amin''ny ranon-davenona,'
mg1865::mg_18::9::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hanitrika ahy any am-pahitra miaraka amin''izay Ianao, ka hataon''ny fitafiako ho zava-betaveta aho.'
mg1865::mg_18::9::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy olona tahaka ahy Izy ka ho azoko valiana hifanatrehanay amin''ny fitsarana.'
mg1865::mg_18::9::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mpanelanelana anay Hametraka ny tanany aminay roa tonta.'
mg1865::mg_18::9::34:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanaisotra ny tsorakazony amiko Izy, ary aoka tsy hampahatsiravina ahy ny fampitahorany,'
mg1865::mg_18::9::35:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny aho ka tsy hatahotra Azy; Fa fantatro fa tsy hatahotra foana aho.'
mg1865::mg_18::10::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maharikoriko ahy ny aiko; Hamoaka ny fitarainako aho sy hiteny noho ny fangidian''ny fanahiko'
mg1865::mg_18::10::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao amin''Andriamanitra hoe aho: Aza manameloka ahy; Mba ampahalalao izay anton''ny iadianao amiko aho.'
mg1865::mg_18::10::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahafaly Anao va ny hampahory sy hanary ny efa nisasaranao ka hamirapiratra amin''ny fisainan''ny ratsy fanahy?'
mg1865::mg_18::10::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manana maso nofo va Ianao? Na mijery tahaka ny fijerin''ny zanak''olombelona?'
mg1865::mg_18::10::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny andron''ny zanak''olombelona va ny andronao? Na tahaka ny taonan''ny olombelona ny taonanao,'
mg1865::mg_18::10::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'No dia mikaroka izay heloko Ianao sy mikatsaka izay fahotako,'
mg1865::mg_18::10::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia fantatrao aza fa tsy mba ratsy fanahy aho, ary tsy misy mahavonjy amin''ny tananao?'
mg1865::mg_18::10::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tananao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao, kanjo levoninao indray aho izao.'
mg1865::mg_18::10::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masina Ianao, tsarovy fa notefenao toy ny tanimanga aho, ka hamerina ahy amin''ny vovoka indray Ianao!'
mg1865::mg_18::10::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy naidinao toy ny ronono va aho ka nampandrinao toy ny ronono-mandry?'
mg1865::mg_18::10::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, notafianao hoditra sy nofo aho ary norarinao tamin''ny taolana sy ny ozatra.'
mg1865::mg_18::10::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aina sy famindram-po no nomenao ahy; Ary ny fiahianao no niaro ny aiko.'
mg1865::mg_18::10::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saingy izao no nafeninao tao am-ponao, eny, fantatro fa tao aminao izao:'
mg1865::mg_18::10::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manota aho, dia mamantatra ahy Ianao ka tsy manafaka ahy amin''ny heloko.'
mg1865::mg_18::10::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha meloka aho, dia lozako! Ary na dia marina aza aho, dia tsy ho sahy miandrandra, satria feno henatra sady mahatsiaro fahoriana aho.'
mg1865::mg_18::10::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha sahy miandrandra aho, dia hihaza ahy tahaka ny liona masiaka Ianao; Ary hiverina indray Ianao, ka ho mahagaga ny famelinao ahy.'
mg1865::mg_18::10::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Ianao sy hampitombo ny fahatezeranao amiko; Fahavalo mifanontona no mamely ahy.'
mg1865::mg_18::10::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nahoana no namoaka ahy foana avy tany am-bohoka Ianao? Fa raha tsy izany, dia ho niala aina aho, ka tsy mba nisy maso nahita ahy akory.'
mg1865::mg_18::10::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa toy ny tsy ary aho. Ka nentina avy tany an-kibo ho any am-pasana.'
mg1865::mg_18::10::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy vitsy va ny androko? Koa mitsahara Ianao, mihataha mba hakako aina kely,'
mg1865::mg_18::10::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dieny tsy mbola lasa tsy hiverina aho, dia ho any amin''ny tanin''ny aizina sy ny aloky ny fahafatesana,'
mg1865::mg_18::10::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho any amin''ny tany maizim-pito, dia ny an''ny aloky ny fahafatesana sy ny fikorontanana, sady maizim-pito ny famirapiratana any.'
mg1865::mg_18::11::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny voalohany nataon''i Zofara'
  verse_text: 'Dia namaly Zofara Namatita ka nanao hoe:'
mg1865::mg_18::11::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy hovaliana va ny teny be toy izany? Ary moa raha maro vava, dia ho marina va?'
mg1865::mg_18::11::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny bedibedinao va no hampangina ny olona? Ka dia haniratsira ianao, ka tsy hisy handresy lahatra,'
mg1865::mg_18::11::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia hiteny hoe: Madio ny teny nalahatro, ary tsy nanan-tsiny teo imasonao aho.'
mg1865::mg_18::11::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hiteny Andriamanitra ka hiloa-bava hamaly anao!'
mg1865::mg_18::11::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hasehony aminao ny fahendrena miafina, fa tsy hita lany* izany, ka dia ho fantatrao fa tsy dia novalian''Andriamanitra avokoa ny helokao. [*Hebreo: roa sosona]'
mg1865::mg_18::11::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Takatry ny sainao va ny fomban*''Andriamanitra? Ary tanteraka va ny fahitanao ny Tsitoha [*Na: ny famantarana an'']'
mg1865::mg_18::11::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avo tahaka ny lanitra izany! ka inona no hainao atao? Lalina noho ny fiainan-tsy hita*! ka inona no fantatrao? [*Hebreo: Sheola]'
mg1865::mg_18::11::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lava noho ny tany ny ohany ary lehibe noho ny ranomasina.'
mg1865::mg_18::11::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandroso Izy ka misambotra ary manao fitsarana, dia iza moa no mahasakana Azy?'
mg1865::mg_18::11::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy mahafantatra ny olon-dratsy; Ary hitany ny heloka, na dia tsy mandinika akory aza Izy*. [*Na: Ary hitany ny heloka izay tsy heverin''ny olona akory]'
mg1865::mg_18::11::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia ny olom-poana aza dia hahazo fahendrena, ary na dia ny zanaky ny boriki-dia aza dia hateraka ho olombelona*. [*Na: Nefa ny olom-poana dia tsy manam-pahendrena; Eny, ny olombelona dia teraka ho toy ny boriki-dia]'
mg1865::mg_18::11::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ampanatrehinao Azy ny fonao, ary atantinao aminy ny tananao,'
mg1865::mg_18::11::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka misy heloka eo an-tananao, dia ario lavitra izany, ary aza avela hisy ratsy hitoetra ao an-dainao;'
mg1865::mg_18::11::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hahazo hanandratra ny tavanao tsy misy tsiny ianao, koa hijoro tsara ary tsy hatahotra;'
mg1865::mg_18::11::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho hadinonao ny fahorianao: Toy ny rano efa nandalo no hahatsiarovanao azy.'
mg1865::mg_18::11::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao; na dia sendra manjombona aza, dia ho tonga tahaka ny maraina.'
mg1865::mg_18::11::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatoky ianao, satria misy fanantenana; eny, hijery manodidina ianao ka handry tsy amin''ahiahy.'
mg1865::mg_18::11::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tafandry ianao, fa tsy hisy hanaitaitra; Ary maro no hila sitraka aminao.'
mg1865::mg_18::11::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mason''ny ratsy fanahy kosa ho pahina, ka ho very avokoa ny fiarovana azy, ary ny fialàna aina ihany no hany sisa azony antenaina.'
mg1865::mg_18::12::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::12::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina ary fa ianareo ihany tokoa olombelona! Ary hiara-maty aminareo ny fahendrena!'
mg1865::mg_18::12::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa izaho mba manan-tsaina tahaka anareo ihany koa; Tsy latsaka noho ianareo aho; Fa iza moa no tsy nahalala izay zavatra toy izany?'
mg1865::mg_18::12::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga fihomehezan''ny sakaizako aho. Dia izaho izay niantso an''Andriamanitra ka novaliany; Eny, tonga fihomehezana ny olona marina tsy manan-tsiny.'
mg1865::mg_18::12::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrehin-datsa ny ozoim-pahoriana, raha araka ny hevitry ny miadana, eny, vonona ho amin''izay ela mangozohozo ny latsa*. [*Na: Fanilo milopilony ny ozoim-pahoriana, raha araka ny hevitry ny miadana, ka tandrifiny ho an''izay efa ho tafintohina ihany]'
mg1865::mg_18::12::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandry fahizay ny lain''ny mpitohatoha, Ary mitoetra tsy manahy izay sahy mampahatezitra an''Andriamanitra, dia izay mitondra ny herin''ny tanany ho andriamaniny'
mg1865::mg_18::12::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa anontanio ange ny biby, fa hampianatra anao izy, ary ny voro-manidina, fa hanambara aminao izy;'
mg1865::mg_18::12::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary makà saina* amin''ny tany, dia hampianatra anao izy. Ary ny hazandrano any an-dranomasina hampahalala anao. [*Na: amin''ny hazo madinika]'
mg1865::mg_18::12::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no tsy mahalala, raha mandinika ireny rehetra ireny*, fa ny nanao izany dia ny tanan''i Jehovah, [*Na: Iza amin''ireny rehetra ireny no tsy mahalala]'
mg1865::mg_18::12::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitana ny ain''ny zava-manan''aina rehetra sy ny fofonain''ny olombelona rehetra?'
mg1865::mg_18::12::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy ny sofina va no mamantatra ny teny? Ary tsy ny vava va no manandrana ny hanina?'
mg1865::mg_18::12::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''ny fotsy volo ny fahendrena, ary ny fahela-velona no ahazoam-pahalalana.'
mg1865::mg_18::12::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''Andriamanitra kosa no misy fahendrena sy hery; Izy no manana hevitra sy fahalalana.'
mg1865::mg_18::12::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, mandrava Izy, ka tsy hatsangana intsony; Manidy ny olona Izy, ka tsy hovohana.'
mg1865::mg_18::12::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, manampina ny rano Izy, ka dia ritra iny; Ary alefany indray ka mahasimba ny tany.'
mg1865::mg_18::12::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no manana hery sy tena fahendrena; Samy eo an-tanany avokoa ny voafitaka sy ny mpamitaka.'
mg1865::mg_18::12::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alany voninahitra ny mpanolo-tsaina, dia entiny. Ary asehony ny fahadalan''ny mpitsara.'
mg1865::mg_18::12::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vahany ny fifehezan''ny mpanjaka, ka feheziny mahazaka ny valahany.'
mg1865::mg_18::12::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alàny voninahitra ny mpisorona, dia entiny, ary ny mafy orina ela dia ravany.'
mg1865::mg_18::12::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koroiny ny laha-tenin''ny mahay, ary ny fahazavan-tsain''ny anti-panahy dia esoriny.'
mg1865::mg_18::12::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandatsaka fanamavoana amin''ny andriandahy Izy, ary ketrahiny ny fehin-kibon''ny matanjaka.'
mg1865::mg_18::12::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manala rakotra izay lalina Izy mba tsy ho maizina ary mitondra ny aloky ny fahafatesana ho eo amin''ny mazava.'
mg1865::mg_18::12::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahalehibe ny firenena Izy, nefa mandringana azy koa, mampihahaka ny firenena Izy, nefa mitondra azy hody indray.'
mg1865::mg_18::12::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahavery saina ny loholona amin''ny tany Izy ary mampirenireny azy any an''efitra tsy misy lalana;'
mg1865::mg_18::12::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsapatsapa amin''ny maizina tsy misy mavaza ireo; ary mampivembena azy tahaka ny olona mamo Izy.'
mg1865::mg_18::13::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izany rehetra izany efa hitan''ny masoko, ary efa ren''ny sofiko ka fantany.'
mg1865::mg_18::13::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay fantatrareo dia mba fantatro koa; Tsy latsaka noho ianareo aho tsy akory.'
mg1865::mg_18::13::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha izaho, dia ny Tsitoha no tiako hitenenana, ary Andriamanitra no iriko handaharan-teny.'
mg1865::mg_18::13::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa dia mpamoron-dainga; Dokotera tsy mahomby ianareo rehetra,'
mg1865::mg_18::13::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hangina mihitsy ianareo, dia ho fahendrenareo izany!'
mg1865::mg_18::13::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianareo, henoy ny anatro, ary tandremo izay alahatry ny molotro.'
mg1865::mg_18::13::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao teny tsy marina ho enti-manamarina an''Andriamanitra va ianareo? Hiteny fitaka ho Azy va ianareo?'
mg1865::mg_18::13::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiangatra ho Azy va ianareo? Handaha-teny ho an''Andriamanitra va ianareo'
mg1865::mg_18::13::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tsara aminareo va, raha mandinika anareo Izy? Na ho azonareo fitahina hoatra ny famitaka zanak''olombelona va Izy?'
mg1865::mg_18::13::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanameloka anareo mihitsy Izy, Raha miangatra mangingina ianareo.'
mg1865::mg_18::13::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hampahatahotra anareo va ny fahalehibiazany? Ary tsy hitsatoka aminareo va ny fahatahorana avy aminy?'
mg1865::mg_18::13::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo teny tononinareo ireo dia ohabolana lavenona foana, ary manda fotaka ihany ny mandanareo.'
mg1865::mg_18::13::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangina, ka mialà amiko ianareo, mba hitenenako; Fa aoka hanjo ahy ihany izay hanjo ahy.'
mg1865::mg_18::13::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no hitondra ny nofoko amin''ny nifiko aho? Tsia, fa manao ny aiko tsy ho zavatra aho*. [*Na: Ka manao ny aiko eo an-tanako]'
mg1865::mg_18::13::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia hamono ahy aza Izy, mbola hanantena Azy ihany aho*; Kanefa hanamarina ny lalako eo anatrehany aho. [*Na: Indro, hamono ahy Izy, tsy manam-panantenana aho]'
mg1865::mg_18::13::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho famonjena ahy: Ny* mpihatsaravelatsihy** tsy sahy mankeo anatrehany. [*Na: Ary ho famonjena ahy Izy, fa ny] [**Na: ratsy fanahy]'
mg1865::mg_18::13::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa dia mihainoa ny teniko, ary aoka ho ren''ny sofinareo ny filazàko.'
mg1865::mg_18::13::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fa efa voatoriko* ny adiko; Fantatro fa hanan-drariny aho. [*Na: voalamiko]'
mg1865::mg_18::13::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hahazo hifandahatra amiko? Fa raha izany, dia hangina aho ka hiala aina.'
mg1865::mg_18::13::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao zavatra roa loha izao ihany no aza mba atao amiko, dia tsy hiery Anao aho;'
mg1865::mg_18::13::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory hanalavitra ahy ny tananao, ary aoka tsy hampahatsiravina ahy fampitahoranao.'
mg1865::mg_18::13::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia miantsoa, fa izaho hamaly; Na aoka hiteny aho, ka valio aho.'
mg1865::mg_18::13::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Firy ary ny heloko sy ny fahotako? Mba ampahalalao izay fiodinako sy fahotako aho.'
mg1865::mg_18::13::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no manafina ny tavanao Ianao, ka manao ahy ho fahavalonao?'
mg1865::mg_18::13::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa izay ravin-kazo indaosin''ny rivotra avy va no ampitahorinao? Ary izay vodivary maina avy va no enjehinao?'
mg1865::mg_18::13::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa zava-mangidy no tendrenao hamely ahy, ka ampanodiavinao ahy, ny heloky ny fahatanorako;'
mg1865::mg_18::13::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mampiditra ny tongotro eo amin''ny boloky hazo Ianao ary mitsikilo ny diako rehetra; Ny hodiavin''ny tongotro dia feranao.'
mg1865::mg_18::13::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izaho ity izay mihalevona tahaka ny zavatra hanin''ny fositra, eny, tahaka ny fitafiana lanin''ny kalalao.'
mg1865::mg_18::14::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tera-behivavy dia vitsy andro sady vontom-pahoriana.'
mg1865::mg_18::14::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsimoka tahaka ny voninkazo izy ka jinjana*, ary mihelina tahaka ny aloka izy ka tsy mitoetra. [*Na: malazo]'
mg1865::mg_18::14::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa amin''izay toy izany foana no ampihiratanao ny masonao? ka dia izay izaho avy no entinao hifandahatra aminao amin''ny fitsarana*! [*Na: fitsaranao]'
mg1865::mg_18::14::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza no misy madio ateraky ny tsy madio? Tsy misy na dia iray akory aza.'
mg1865::mg_18::14::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha voafetra ny androny, ary voatendrinao ny isan''ny volana iainany, ary asianao fefy tsy azony ihoarana,'
mg1865::mg_18::14::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mihodina tsy hanatrika azy Ianao, mba hitsaharany, ka hifaliany amin*''ny androny toy ny mpikarama. [*Na: hotaperany]'
mg1865::mg_18::14::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa azo antenaina ny hazo, satria na dia kapaina aza izy, dia mbola hitsimoka indray, ka tsy maintsy hisy ny solofony;'
mg1865::mg_18::14::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia efa tonga antitra ao amin''ny tany aza ny fakany, ary maty ao amin''ny vovoka ny fotony,'
mg1865::mg_18::14::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mahare ny fofon-drano izy, dia hitsimoka indray. Ka handrahaka tahaka ny hazo tanora nambolena.'
mg1865::mg_18::14::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona kosa maty ka miampatra; Eny, miala aina ny olona, ary aiza izy?'
mg1865::mg_18::14::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rano miala eo amin''ny kamory, ary ny ony mihena ka ritra,'
mg1865::mg_18::14::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa ny olona; mandry izy ka tsy hitsangana intsony; Eny, mandra-paha-tsy hisian''ny lanitra dia tsy hahatsiaro izy na hofohazina amin''ny torimasony.'
mg1865::mg_18::14::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hanafina ahy any amin''ny fiainan-tsy hita* Ianao Ka hampiery ahy mandra-pahafaky ny fahatezeranao! Ary hanendry fetr''andro ho ahy, dia hahatsiaro ahy [*Hebreo: Sheola]'
mg1865::mg_18::14::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha maty ny olona, moa ho velona indray va izy? Raha izany, dia hiandry mandritra ny andro fanafihako aho, mandra-pahatongan''ny fahafahako*. [*Na: fiovako]'
mg1865::mg_18::14::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiantso Ianao, ary izaho hamaly Anao; ary mba halahelo ny asan''ny tananao Ianao.'
mg1865::mg_18::14::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny manisa ny diako Ianao; Tsy mitsikilo ny fahotako va Ianao?'
mg1865::mg_18::14::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa voaisy tombo-kase ny kitapo misy ny fahadisoako; Ary voazaitranao ny heloko.'
mg1865::mg_18::14::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa na dia ny tendrombohitra aza, raha mianjera, dia mihalevona; Ary ny vatolampy dia afindra hiala amin''ny fitoerany;'
mg1865::mg_18::14::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lanin''ny rano ny vato; ary indaosin''ny riaka ny vovo-tany: Toy izany no fanimbanao ny fanantenan''ny zanak''olombelona.'
mg1865::mg_18::14::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandresy azy ho mandrakizay Ianao, ka lasa izy; Manova ny tarehiny Ianao ka mampandeha azy.'
mg1865::mg_18::14::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omem-boninahitra ny zanany nefa tsy fantany; Ary mietry ireo, nefa tsy hitany.'
mg1865::mg_18::14::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mihatra amin''ny tenany ihany no mampanaintaina azy, ary ny mihatra amin''ny tenany ihany no mampalahelo ny fanahiny.'
mg1865::mg_18::15::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny fanindroany nataon''i Elifaza'
  verse_text: 'Dia namaly Elifaza Temanita ka nanao hoe:'
mg1865::mg_18::15::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tokony handahatra hevi-dravina va ny olon-kendry, ka hameno ny kibony amin''ny rivotra avy any atsinanana va,'
mg1865::mg_18::15::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamaly amin''ny teny tsy mahasoa sy ny teny tsy mahatsara?'
mg1865::mg_18::15::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, foananao ny fahatahorana an''Andriamanitra, ary tampenanao* ny fivavahana eo anatrehany; [*Na: hamavoinao]'
mg1865::mg_18::15::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny helokao no manesika ny vavanao, ary mianatra ny lelan''ny fetsy ianao*. [*Na: Tsy maneho ny helokao va ny vavanao, Na dia mianatra ny lelan''ny fetsy aza ianao?]'
mg1865::mg_18::15::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavanao ihany no manameloka anao, fa tsy izaho; Ary ny molotrao ihany no mamely anao.'
mg1865::mg_18::15::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao va no voalohany izay nateraka ho olombelona? Na naloaky ny kibo talohan''ny tendrombohitra va ianao?'
mg1865::mg_18::15::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isan''ny mpihevitra teo amin''Andriamanitra va ianao, ka voarombakao ho anao irery ny fahendrena?'
mg1865::mg_18::15::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no fantatrao, ka tsy mba fantatray koa, na saina azonao, ka tsy ato aminay koa?'
mg1865::mg_18::15::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anti-panahy sy ny fotsy volo dia misy ato aminay, eny, olona ela niainana noho ny rainao aza.'
mg1865::mg_18::15::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao ho tsinontsinona va ny fampiononana avy amin''Andriamanitra sy ny teny natao aminao amin''ny fahalemem-panahy?'
mg1865::mg_18::15::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no dia entin''ny fonao ianao? Ary nahoana no mipipy foana ny masonao,'
mg1865::mg_18::15::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka miefonefona amin''Andriamanitra ianao, sady miteniteny foana ny vavanao?'
mg1865::mg_18::15::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ny zanak''olombelona no mba hadio izy? Ary izay tera-behivavy no mba ho marina?'
mg1865::mg_18::15::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ireo anjeliny* aza tsy mahatoky Azy, ary ny lanitra aza tsy madio eo imasony; [*Hebreo: masina]'
mg1865::mg_18::15::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mainka fa izay vetaveta sy tena ratsy, dia ny olona izay misotro heloka toa rano!'
mg1865::mg_18::15::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanambara aminao aho, ka mihainoa ahy fa izay efa hitako no holazaiko,'
mg1865::mg_18::15::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia zavatra notorin''ny olon-kendry, fa tsy nafeniny, dia izay azony avy tamin''ny razany;'
mg1865::mg_18::15::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireny ihany no nomena ny tany, ary tsy nisy olona hafa firenena nisisika teo aminy.'
mg1865::mg_18::15::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mijalijaly amin''ny androny rehetra, dia amin''ny taona rehetra voatendry ho an''ny lozabe.'
mg1865::mg_18::15::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Feo mampitahotra no ren''ny sofiny; Ary na dia miadana aza izy, dia avy hamely azy ihany ny mpandroba.'
mg1865::mg_18::15::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manantena ho afaka amin''ny maizina izy; Andrasan''ny sabatra izy.'
mg1865::mg_18::15::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mirenireny hitady izay hohaniny izy ka manao hoe: Aiza re? Fantany fa antomotra azy ny andro maizina.'
mg1865::mg_18::15::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahoriana sy fahaporitana* no mampitahotra azy; Mandresy azy ireo tahaka ny mpanjaka efa vonona ho amin''ny ady, [*Na: Alahelo sy ahiahy]'
mg1865::mg_18::15::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria naninjitra ny tanany hanohitra an''Andriamanitra izy Ary nirehareha hanohitra ny Tsitoha.'
mg1865::mg_18::15::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mimaona amin''ny fahamafian-katoka hamely Azy izy, dia amin''ny foitran''ampingany matevina,'
mg1865::mg_18::15::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa matavitavy tarehy izy, ary mivalon-kotraka ny valahany;'
mg1865::mg_18::15::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary monina ao an-tanana rava izy, dia ao an-trano tokony tsy hitoeran''olona, izay efa voatendry ho korontam-bato.'
mg1865::mg_18::15::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hanan-karena izy, sady tsy haharitra ny heriny, ka tsy ho vokatra* ambonin''ny tany ny fananany. [*Hebreo: hilonjehitra amin''ny tany toy ny vary efa vokatra]'
mg1865::mg_18::15::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho afaka amin''ny maizina izy; ny solofony hikainkona azon''ny lelafo; ho levon''ny fofonain''Andriamanitra izy.'
mg1865::mg_18::15::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy ho voafitaka hatoky zava-poana izy; fa zava-poana no ho valiny homena azy.'
mg1865::mg_18::15::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola tsy tonga aza ny androny, dia manjo azy izany, ary tsy ho maitso ny sampany.'
mg1865::mg_18::15::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tahaka ny voaloboka manintsana ny voany manta izy ary ho tahaka ny hazo oliva mampiraraka ny voniny.'
mg1865::mg_18::15::34:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ho vanona ny ankohonan''ny mpihatsaravelatsihy*, ary ho lanin''ny afo ny tranon''ny mpitoroka. [*Na: ratsy fanahy]'
mg1865::mg_18::15::35:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torontoronina fampahoriana izy ka miteraka fandozana, ary ny kibony mamorom-pitaka.'
mg1865::mg_18::16::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::16::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nandre zavatra maro toy izany aho; Mpampionona mahasorisorena foana ianareo rehetra.'
mg1865::mg_18::16::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tapitra va izay ny bedibedy foana? Sa mbola misy manesika anao hamaly ahy ihany?'
mg1865::mg_18::16::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho kosa mba mahazo miteny tahaka anareo, raha mba tonga tahaka ahy ianareo; eny, mahazo manamboatra teny ho enti-mamely anareo aho ary mahazo mihifikifi-doha aminareo;'
mg1865::mg_18::16::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahazo mampahery anareo amin''ny Vavako aho, ary mahazo mampitony ny alahelonareo ny fampiononana ataon''ny molotro.'
mg1865::mg_18::16::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia miteny aza aho, dia tsy mitsahatra ny alaheloko; Ary na dia mangina aza aho, dia tsy misy mihena izany.'
mg1865::mg_18::16::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny efa nandreraka ahy Izy; Naringanao ny ankohonako rehetra.'
mg1865::mg_18::16::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nampifezaka ny tenako Ianao*, ka dia vavolombelona amiko izany. Ary mitsangana hiampanga ahy ny fahahiazako, ka dia tondromaso akaiky izany. [*Na: nosamborinao aho]'
mg1865::mg_18::16::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahatezerany no amiravirany sy andrafiany ahy, mihidy vazana amiko Izy; Eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;'
mg1865::mg_18::16::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisanasana vava tamiko ny olona; Latsa no nentiny namely ny takolako; Mitambatra hamely ahy izy.'
mg1865::mg_18::16::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa voatolotr''Andriamanitra ho amin''ny ratsy fanahy aho, ary natsipiny ho eo an-tanan''ny mpanota.'
mg1865::mg_18::16::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ilay izaho tsy nanana ahiahy iny, dia nanorotoro ahy Izy; Nosamboriny tamin''ny hatoko aho ka nomontsaniny, sady natsangany ho marika hokendreny.'
mg1865::mg_18::16::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manodidina ahy ny mpandefa zana-tsipïkany; Mamaky ny voako Izy ka tsy miantra ary manidina ny aferoko ho amin''ny tany.'
mg1865::mg_18::16::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Bangabangainy lalandava aho, ka miroatra hamely ahy tahaka ny lehilahy mahery Izy.'
mg1865::mg_18::16::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lamba fisaonana* no voazaitrako hanarona ny hoditro, ary nalàko baraka tamin''ny vovoka ny tandroko. [*Hebreo: lamba malailay]'
mg1865::mg_18::16::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tavako tera-menan''ny fitomaniana, ary eo amin''ny hodi-masoko ny aloky ny fahafatesana;'
mg1865::mg_18::16::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy misy eto an-tanako izay mba nalaina an-keriny; Ary madio ny fivavako.'
mg1865::mg_18::16::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry tany o, aza manarona ny rako, ary aoka tsy ho voahazona ny fitarainako!'
mg1865::mg_18::16::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ankehitriny aza, indro, any an-danitra ny Vavolombeloko, eny, ny Vavolombeloko dia any amin''ny avo.'
mg1865::mg_18::16::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mihomehy ahy aza ny sakaizako, dia mamarin-dranomaso eo anatrehan''Andriamanitra kosa aho,'
mg1865::mg_18::16::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hanamarina ahy olombelona eo anatrehany Izy sy hanafa-tsiny ahy zanak''olombelona amin''ny sakaizako*. [*Hebreo: sakaizany]'
mg1865::mg_18::16::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa lasa ny taona vitsy, dia handeha any amin''ny lalana izay tsy hiverenako intsony aho.'
mg1865::mg_18::17::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ho ritra ny aiko; Efa milopilopy ny androko; Efa miandry ahy ny fasana.'
mg1865::mg_18::17::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, fanesoana tokoa no manodidina ahy, ary tsy maintsy mijery ny filany ady amiko aho.'
mg1865::mg_18::17::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masina Ianao, aoka ny tenanao ihany no hiantoka ahy aminao; Fa iza moa no hety hiantoka ahy?'
mg1865::mg_18::17::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fon''ireto dia voahidinao tsy hidiran''ny fahalalana; koa izany no tsy hanandratanao azy.'
mg1865::mg_18::17::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manolotra ny sakaizany ho babo, dia ho pahina kosa ny mason''ny zanany.'
mg1865::mg_18::17::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nanao ahy ho ambentinteny amin''ny firenena Izy, ka rorany mandrakariva ny tavako.'
mg1865::mg_18::17::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa pahina ny masoko noho ny alahelo; Ary efa toy ny aloka ny momba ny tenako rehetra.'
mg1865::mg_18::17::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankona noho izany ny olona mahitsy, ary ny tsy manan-tsiny mihendratra mahita ny mpihatsaravela-tsihy.40'
mg1865::mg_18::17::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny marina mifikitra tsara amin''ny halehany, ary izay madio tanana no hitombo hery.'
mg1865::mg_18::17::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia avokoa indray ary ianareo rehetra tsy mahita izay olon-kendry eo aminareo aho.'
mg1865::mg_18::17::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihelina ny androko, voaongotra ny fikasako. Dia izay hevitra fikirin''ny foko indrindra;'
mg1865::mg_18::17::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alina ataon''ireny ho antoandro, ary ny mazava ho efa akaiky, nefa tamy ihany ny maizina.'
mg1865::mg_18::17::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola misy antenaiko, dia ny fiainan-tsy hita* fonenako ihany; Ao amin''ny maizina no hamelarako ny fandriako. [*Hebreo: Sheola]'
mg1865::mg_18::17::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fasana* no nantsoiko hoe: Raiko ianao; Ary ny kankana: Reniko sy anabaviko ianao. [*Na: Ny fahalovana]'
mg1865::mg_18::17::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aiza ary ny fanantenako? Ary iza no mahita azy?'
mg1865::mg_18::17::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midina any amin''ny vavahadin''ny fiainan-tsy hita* izany, raha mba hahita fitsaharana ao amin''ny vovoka aho. [*Hebreo: Sheola]'
mg1865::mg_18::18::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny fanindroany nataon''i Bildada'
  verse_text: 'Dia namaly Bildada Sohita ka nanao hoe:'
mg1865::mg_18::18::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hamandrika teny ianareo? Mba hendre aloha, dia vao hiteny izahay.'
mg1865::mg_18::18::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sao ataonareo ho biby anie izahay ka tahaka ny maloto eo imasonareo?'
mg1865::mg_18::18::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry ilay mamiravira tena amin''ny fahatezerana, noho ny aminao va no hahatonga ny tany ho lao, ary ny vatolampy hafindra hiala amin''ny fitoerany?'
mg1865::mg_18::18::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izany, fa ho faty ny jiron''ny ratsy fanahy, ary hilopilopy ny lelafony;'
mg1865::mg_18::18::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mazava manjary maizina ao amin''ny lainy, ary ny jirony eo amboniny dia maty.'
mg1865::mg_18::18::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Etena ny herin''ny diany, ary ny fisainany ihany no mandavo azy.'
mg1865::mg_18::18::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tongony ihany no mahatonga azy eo amin''ny fandrika harato, ka manitsaka eo amin''ny harato izy;'
mg1865::mg_18::18::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azon''ny fandrika ny ombelahin-tongony ary voahazon''ny tadivavarana'
mg1865::mg_18::18::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miafina ao amin''ny tany ny fandrika haningotra azy sy ny tonta eny an-dàlana.'
mg1865::mg_18::18::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fampitahorana no mampitahotra azy manodidina ka mampivadi-po azy eny amin''ny alehany rehetra.'
mg1865::mg_18::18::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Liana azy ny loza*, ary ny fandringanana dia vonona eo anilany; [*Na: Lanin''ny mosary izy]'
mg1865::mg_18::18::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, laniny tsikelikely ny hodiny; ny momba ny tenany dia lanin''ny lahimatoan''ny fahafatesana.'
mg1865::mg_18::18::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ongotana hiala amin''ny lainy ny zavatra itokiany, ka tsy maintsy ho entina ho amin''ilay mpanjaka mampahatahotra indrindra izy.'
mg1865::mg_18::18::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy taranany no hitoetra ao amin''ny lainy; Solifara no hafafy amin''ny fonenany.'
mg1865::mg_18::18::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maina ny fakany ao ambany, ary tapaka* ny rantsany eo ambony. [*Na: malazo]'
mg1865::mg_18::18::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatsiarovana azy dia very tsy ho eo amin''ny tany. Ary tsy malaza eny ivelany izy.'
mg1865::mg_18::18::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roahina hiala amin''ny mazava ho any amin''ny maizina izy ary enjehina hiala amin''izao tontolo izao.'
mg1865::mg_18::18::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manana fara mandimby eo amin''ny fireneny izy, ka tsy misy tsy tratry ny loza ny ao amin''ny fonenany.'
mg1865::mg_18::18::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny manjo azy dia italanjonan''ny any andrefana, ary ny any atsinanana raiki-tahotra.'
mg1865::mg_18::18::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany tokoa no anjaran''ny ratsy fanahy, ary izany no manjo ny tsy mahalala an''Andriamanitra.'
mg1865::mg_18::19::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::19::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hampalahelovanareo ny fanahiko sy hanorotoroanareo ahy amin''ny fiteny?'
mg1865::mg_18::19::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa im-polo izay no nanaratsianareo ahy; Tsy misoroka izay hampahory ahy ianareo.'
mg1865::mg_18::19::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha diso tokoa aho, dia izaho ihany no andrian''ny fa hadisoako.'
mg1865::mg_18::19::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mirehareha amiko kosa ianareo ka mampiaiky ahy ho nanao izay mahamenatra,'
mg1865::mg_18::19::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy ka efa naningotra ahy tamin''ny fandrika haratony.'
mg1865::mg_18::19::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, miantso mafy aho hoe: Loza! nefa tsy misy mamaly ahy; Mitaraina aho, nefa tsy mahita rariny.'
mg1865::mg_18::19::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalako dia nofefeny, ka tsy afa-mandroso aho; ary nasiany maizina teo amin''ny lalana alehako.'
mg1865::mg_18::19::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voninahitro nalany tamiko, ary nesoriny ny satro-boninahitra teo an-dohako.'
mg1865::mg_18::19::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nandrava ahy manodidina Izy, ka efa ho faty aho; Ary efa nofongorany tahaka ny hazo ny fanantenako.'
mg1865::mg_18::19::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampirehetiny tamiko ny fahatezerany, ka nataony ho fahavalony aho.'
mg1865::mg_18::19::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miara-mandroso ny antokon''ny miaramilany ary manandratra tovon-tany hamelezany ahy izy ka mitoby manodidina ny laiko.'
mg1865::mg_18::19::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rahalahiko efa nampanalaviriny ahy; Ary ny olona nahazatra ahy efa nihafahafa tamiko avokoa.'
mg1865::mg_18::19::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tsy misy eto intsony ny havako, ary ny sakaizako efa nanadino ahy.'
mg1865::mg_18::19::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahiny izay mitoetra ao an-tranoko sy ny ankizivaviko aza samy manao ahy ho olon-kafa; Tonga olon-ko azy eo imasony aho.'
mg1865::mg_18::19::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Antsoiko ny mpanompoko, nefa tsy namaly ahy izy; Mifona aminy amin''ny vavako aho.'
mg1865::mg_18::19::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fofonaiko mahaloiloy ny vadiko, ary maharikoriko ny zanak''ineny aho.'
mg1865::mg_18::19::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny ankizilahy madinika aza mamingavinga ahy; Raha te-hitsangana aho, dia miteny mamely ahy ireny.'
mg1865::mg_18::19::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta, ary izay olon-tiako dia mivadika ho fahavaloko.'
mg1865::mg_18::19::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taolako miraikitra amin''ny hoditro sy ny nofoko, ary ny akanjo-nifiko ihany no hany sisa azoko enti-mandositra.'
mg1865::mg_18::19::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindrà fo amiko, mamindrà fo amiko ianareo, ry sakaizako o; fa ny tanan''Andriamanitra efa mikasika ahy.'
mg1865::mg_18::19::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no manenjika ahy tahaka an''Andriamanitra koa ianareo ka tsy mety afa-po amin''ny nofoko?'
mg1865::mg_18::19::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho voasoratra ny teniko! Enga anie ka ho voatomboka eo amin''ny boky ireny!'
mg1865::mg_18::19::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho voasoratra amin''ny vy fanoratana sady voasy firaka eo amin''ny vatolampy ho mandrakizay izy!'
mg1865::mg_18::19::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha izaho, dia fantatro fa velona ny Mpanavotra* ahy, ka hitsangana any am-parany** eo ambonin''ny vovoka Izy. [*Hebreo: Goela] [**Na: ho farany]'
mg1865::mg_18::19::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa levona ny hoditro, izao simba izao, sady afaka amin''ny nofoko aho, dia hahita an''Andriamanitra*; [*Na: Dia hahita an''Andriamanitra amin''ny nofoko aho]'
mg1865::mg_18::19::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izaho no hahita Azy, ary ny masoko no hijery, fa tsy olon-kafa. Efa matim-paniriana ny saiko* ato anatiko. [*Hebreo: voako]'
mg1865::mg_18::19::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy ianareo: Andeha hanenjika azy fatratra isika. Fa hita ao anatiny* ny fototry ny mahameloka azy**. [*Hebreo: anatiko] [**Hebreo: ahy]'
mg1865::mg_18::19::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia matahora ny sabatra ianareo; Fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra, mba ho fantatrareo fa misy fitsarana.'
mg1865::mg_18::20::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny fanindroany nataon''i Zofara'
  verse_text: 'Dia namaly Zofara Namatita ka nanao hoe:'
mg1865::mg_18::20::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho izany dia mamaly ahy ny eritreritro, eny, noho* ny fihetsiketsiky ny saiko. [*Na: Ary izany no mahatonga]'
mg1865::mg_18::20::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Reko lalandava ny anatra mampahamenatra ahy; Ary ny fanahiko mamaly ahy avy amin''ny fahalalako.'
mg1865::mg_18::20::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy fantatrao va fa hatramin''ny ela, eny, hatrizay nampitoerana ny olona tety ambonin''ny tany,'
mg1865::mg_18::20::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vetivety foana ny firavoravoan''ny ratsy fanahy, ary indray mipi-maso monja ny fifalian''ny mpihatsaravelatsihy?'
mg1865::mg_18::20::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia mipaka amin''ny lanitra aza ny hahavony, ka mitehika amin''ny rahona ny lohany,'
mg1865::mg_18::20::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho very mandrakizay toy ny dikiny* ihany izy; Izay nahita azy dia hanao hoe: Aiza izy? [*Na: ny tain''omby atainy]'
mg1865::mg_18::20::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manidina tahaka ny nofy izy ka tsy ho hita; Eny, ampandosirina tahaka ny tsindrimandry amin''ny alina izy.'
mg1865::mg_18::20::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maso izay mijery, dia indray mitopy ihany no ahitany azy; Ary dia tsy hahita azy intsony ny fitoerany.'
mg1865::mg_18::20::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanany hitambitamby amin''ny malahelo, ary ny tanany ihany no hampody ny hareny.'
mg1865::mg_18::20::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taolany dia feno ny herin''ny fahatanorana*, Nefa hiara-mandry aminy eo amin''ny vovoka izany. [*Na: ota tsy fantatra]'
mg1865::mg_18::20::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mamy ao am-bavany aza ny ratsy, ka afeniny ao ambanin''ny lelany,'
mg1865::mg_18::20::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsitsiny ka tsy foiny, fa tehiriziny ao amin''ny lanilaniny ihany,'
mg1865::mg_18::20::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia miova ny haniny ao an-kibony, ka aferon''ny vipera no ao anatiny.'
mg1865::mg_18::20::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Harena no nateliny, nefa aloany indray; Loaran''Andriamanitra hiala ao an-kibony izany.'
mg1865::mg_18::20::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny poizin''ny vipera no hotsentsefiny; Hahafaty azy ny lelan''ny menarana.'
mg1865::mg_18::20::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho faly mahita renirano izy, dia ony sy riaky ny tantely sy ronono.'
mg1865::mg_18::20::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy azony atelina izay nikelezany aina, fa tsy maintsy hampodiny; Na dia be aza ny hareny, dia tsy ho araka izany ny hafaliany.'
mg1865::mg_18::20::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nampahory sy nahafoy ny reraka izy ka naka trano an-keriny, fa tsy hahatontosa azy.'
mg1865::mg_18::20::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy mahalala mionona ny kibony, dia tsy hahavonjy ny tenany mbamin''ny tiany indrindra izy.'
mg1865::mg_18::20::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy tsy tratry ny fieremany; Ka dia tsy haharitra ny fiadanany.'
mg1865::mg_18::20::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho poriporitra izy, na dia mihoa-pampana aza ny fananany; Ny tanan''ny ory no hamely azy.'
mg1865::mg_18::20::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halefan''Andriamanitra ny fahatezerany mirehitra hameno ny kibony; Eny, halatsany aminy toy ny ranonorana izany ho hanina ho azy.'
mg1865::mg_18::20::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandositra ny vy fiadiana izy, dia hahavoa azy miboroaka ny tsipïka varahina;'
mg1865::mg_18::20::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsoahany izany, ka mivoaka avy amin''ny tenany; Eny, ny manelatselatra dia mivoaka avy amin''ny aferony; Lasa izy azon''ny fahatahorana mafy.'
mg1865::mg_18::20::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny aizim-pito no voarakitra ho amin''ny raki-malalany; Afo tsy tsofina no handoro azy sady handevona izay sisa ao amin''ny lainy.'
mg1865::mg_18::20::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hambaran''ny lanitra ny helony, Ary ny tany hitsangana hiampanga azy,'
mg1865::mg_18::20::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho lasa ny harena tafiditra ao an-tranony; Eny, ho levona izany amin''ny andro fahatezerany.'
mg1865::mg_18::20::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no anjaran''ny ratsy fanahy avy amin''Andriamanitra, sy lova voatendrin''Andriamanitra ho azy.'
mg1865::mg_18::21::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::21::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa dia mihainoa ny teniko, Ary aoka izany no ho fampiononanareo ahy.'
mg1865::mg_18::21::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandefera amiko ianareo, fa mba hiteny kosa aho izao; Ary rehefa tapitra ny teniko, dia mandatsalatsà ihany indray ianareo.'
mg1865::mg_18::21::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amiko, moa ny ataon''ny olona va no itarainako? Ary raha izany, nahoana no hahalefitra ny fanahiko?'
mg1865::mg_18::21::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo aho, dia aoka ho talanjona ianareo, ary mitampena vava.'
mg1865::mg_18::21::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, raha mahatsiaro izany aho, dia raiki-tahotra, sady toran-kovitra ny tenako:'
mg1865::mg_18::21::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no velona ny ratsy fanahy ka sady tratrantitra no be hery?'
mg1865::mg_18::21::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanany koa mitomoetra tsara eo anatrehany, ary ny zafiny eo anoloany.'
mg1865::mg_18::21::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ankohonany miadana ka tsy manan-tahotra, ary ny tsorakazon''Andriamanitra tsy mamely azy.'
mg1865::mg_18::21::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ombilahiny mampiteraka ka mahavanona; Ny ombivaviny miteraka ka tsy mamotsotra.'
mg1865::mg_18::21::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamoaka ny zanany madinika toy ny ondry aman''osy izy, ka mikoriana ny zanany.'
mg1865::mg_18::21::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihoby mitondra ampongatapaka sy lokanga izy ary mifaly amin''ny feon-tsodina.'
mg1865::mg_18::21::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandany ny androny amin''ny fahafinaretana izy; Amin''ny indray mipi-maso monja no idinany any amin''ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_18::21::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa anie ireo no manao amin''Andriamanitra hoe: Mialà aminay! Fa tsy mba irinay ny hahalala ny lalanao.'
mg1865::mg_18::21::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zinona izay Tsitoha, no hotompoinay? Ary inona no soa ho azonay, raha mivavaka aminy?'
mg1865::mg_18::21::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsy avy amin''ny tenany* ihany ny fahafinaretany! Ho lavitra ahy anie ny fisainan''ny ratsy fanahy! [*Hebreo: tsy eo an-tanany]'
mg1865::mg_18::21::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indraindray foana no mba maty ny jiron''ny ratsy fanahy, sy tonga ny loza manjo azy. Ary amelaran''Andriamanitra fandrika ireny* noho ny fahatezerany, [*Na: izaran''Andriamanitra fahoriana ho an''ireny]'
mg1865::mg_18::21::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka tonga tahaka ny mololo voatetika indaosin''ny rivotra izy sy tahaka ny akofa entin''ny tafio-drivotra.'
mg1865::mg_18::21::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra, hoy ianareo, mbola hampijaly ny zanany noho ny helodrainy! Tsia; fa ny tenan''ireny ihany no aoka hovaliany, mba hahalalany.'
mg1865::mg_18::21::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny masony ihany no hahita ny loza manjo azy, ary aoka ny tenany ihany no hisotro ny fahatezeran''ny Tsitoha.'
mg1865::mg_18::21::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mampaninona azy moa ny amin''ny taranany mandimby azy, raha tapaka ny isan''ny androny?'
mg1865::mg_18::21::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa Andriamanitra va no hampianarim-pahalalana, nefa Izy no mitsara ny any an-danitra* aza? [*Hebreo: avo]'
mg1865::mg_18::21::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maty ny anankiray, raha tsy mbola mihena ny fahatanjahany, sady miadana tokoa ka tsy manana ahiahy;'
mg1865::mg_18::21::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Feno ronono ny fitoeran-drononony*, ary vonton-tsoka ny taolany. [*Na: Manotraka ny kibony]'
mg1865::mg_18::21::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray maty amin''ny fahorian''ny fanahiny kosa ka tsy mba nanandrana soa akory.'
mg1865::mg_18::21::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy mandry ao amin''ny vovoka izy roa tonta, ka feno olitra ny tenany.'
mg1865::mg_18::21::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fantatro ny hevitrareo sy ny saim-petsy amelezanareo ahy;'
mg1865::mg_18::21::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ianareo: Aiza ny tranon''ny mpitohatoha*? Ary aiza ny lay fitoeran''ny ratsy fanahy? [*Na: Manotraka ny kibony]'
mg1865::mg_18::21::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy mba nanontany tamin''ny mpandeha amin''ny tany lavitra va ianareo? Ary tsy heverinareo va ny zava-mahagaga*, ambaran''Ireo hoe: [*Hebreo: famantarana]'
mg1865::mg_18::21::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro hahitan-doza dia voaaro ihany ny ratsy fanahy, ary amin''ny andro fahatezerana dia enti-miala izy?'
mg1865::mg_18::21::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hanambara ny lalany eo anatrehany? Ary raha misy zavatra nataony, iza no sahy hamaly azy*? [*Na: Azy]'
mg1865::mg_18::21::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho entina ho eny an-tany fandevonana izy ka mbola hitazana* ao am-pasana; [*Na: mbola misy miambina]'
mg1865::mg_18::21::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho mamy aminy ny bainga any an-dohasaha, ary ny olona rehetra hanaraka azy, toy ny nandehanan''ny maro tany alohany.'
mg1865::mg_18::21::34:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! ity ianareo mba mampionona ahy foana! Ary ny famalianareo anefa, raha voasana tsara, dia lainga ihany!'
mg1865::mg_18::22::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny fanintelony nataon''i Elifaza'
  verse_text: 'Dia namaly Elifaza Temanita ka nanao hoe:'
mg1865::mg_18::22::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahasoa an''Andriamanitra va ny olona? Tsia, fa mahasoa ny tenany ihany ny olon-kendry.'
mg1865::mg_18::22::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampaninona ny Tsitoha moa, raha marina ianao, sa misy tombony ho Azy, raha ataonao tsy misy diso ny alehanao?'
mg1865::mg_18::22::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ny fahatahoranao Azy va no ananarany anao, sy ifanatrehany aminao amin''ny fitsarana?'
mg1865::mg_18::22::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy be va ny faharatsianao, sady tsy hita isa ny helokao?'
mg1865::mg_18::22::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa naka tsatòka tsy ahoan-tsy ahoana tamin''ny rahalahinao ianao ka nanendaka ny akanjon''ny mahantra*. [*Hebreo: mitanjaka]'
mg1865::mg_18::22::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nanome rano hosotroin''ny mangetaheta ianao sady tsy nahafoy hanina ho an''ny noana.'
mg1865::mg_18::22::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona sandriana ihany no nanana ny tany; Ary ny manan-kaja ihany no nitoetra teo.'
mg1865::mg_18::22::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampialainao maina ny mpitondratena. Ary tapahina ny sandrin''ny kamboty.'
mg1865::mg_18::22::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia misy fandrika manodidina anao, ary ny fahatahorana dia mampihorohoro anao tampoka;'
mg1865::mg_18::22::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy ianao va ny maizina Sy ny rano mandriaka mandifotra anao?'
mg1865::mg_18::22::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy avo tahaka ny lanitra va Andriamanitra? Jereo ny hahavon''ny kintana, endrey ny hahavony!'
mg1865::mg_18::22::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy ianao: Ataon''Andriamanitra ahoana no fahafantatra? Mahay mitsara ary ankoatry ny rahona maizina va Izy?'
mg1865::mg_18::22::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rahona matevina manakona Azy, ka tsy mahita Izy; Ary mandehandeha eny amin''ny lanitra Izy.'
mg1865::mg_18::22::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa hizotra amin''ny lalana izay nalehan''ny olona fahagola va ianao? Dia ilay nalehan''ny olona ratsy fanahy.'
mg1865::mg_18::22::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nesorina alohan''ny androny, ka nindaosin''ny riaka ny fanorenany,'
mg1865::mg_18::22::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ireo izay manao tamin''Andriamanitra hoe: Mialà aminay! Ary inona no azon''ny Tsitoha atao ho anay*? [*Hebreo: azy]'
mg1865::mg_18::22::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Izy no efa nameno zava-tsoa ny tranony ho lavitra ahy anie ny fisainan''ny ratsy fanahy!'
mg1865::mg_18::22::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina mahita ka mifaly, Ary ny tsy manan-tsiny mihomehy ireny hoe:'
mg1865::mg_18::22::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina tokoa fa efa rava ny fahavalontsika, ary ny hareny betsaka efa levon''ny afo.'
mg1865::mg_18::22::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifankazara amin''ny Tsitoha ianao, dia hiadana; Izany no hahatongavan''ny soa aminao.'
mg1865::mg_18::22::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, mandraisa fampianarana avy amin''ny vavany, ary alatsaho ao am-ponao ny teniny.'
mg1865::mg_18::22::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miverina aminy ianao, dia haorina tsara, eny, raha ampanalavirinao ny lainao ny heloka.'
mg1865::mg_18::22::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ario eny amin''ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy, eny, ario eny amin''ny vato eny an-dohasahan-driaka ny volamena avy any Ofira;'
mg1865::mg_18::22::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao, Ary ho volafotsy mamirapiratra* ho anao. [*Na tsara, na azo amin''ny fisasarana]'
mg1865::mg_18::22::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany dia hiravoravo amin''ny Tsitoha ianao ka hanandratra ny tavanao amin''Andriamanitra.'
mg1865::mg_18::22::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mifona aminy ianao, dia hihaino anao Izy; Ary ny voadinao dia hefainao.'
mg1865::mg_18::22::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy kasainao hatao, dia hotanterahina aminao, ary hamirapiratra amin''ny lalanao ny mazava.'
mg1865::mg_18::22::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mietry*, dia hataonao hoe: Misandrata; fa ny manetry tena hovonjeny. [*Na: Raha mietry izy]'
mg1865::mg_18::22::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanafaka ny olona meloka Izy, eny, ny fahadiovan''ny tananao no hamonjena azy.'
mg1865::mg_18::23::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::23::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola atao ho fikomianao* ihany ny fitarainako; Ny tanana mamely ahy dia mitambesatra amin''ny fisentoako. [*Na: mangidy]'
mg1865::mg_18::23::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho fantatro izay hahitako Azy ka ho tonga any amin''ny fitoerany aza!'
mg1865::mg_18::23::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handahatra ny teniko eo anatrehany aho. Ka hofenoiko ny teny alahatro ny vavako;'
mg1865::mg_18::23::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hahalala izay teny havaliny ahy aho sy hamantatra izay holazainy amiko.'
mg1865::mg_18::23::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hery lehibe va no handaharany teny amiko? Tsia, fa Izy indrindra no hihaino ahy'
mg1865::mg_18::23::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany dia olona marina no ho nifandahatra taminy; Ka dia ho nanan-drariny mihitsy aho tamin''ny Mpitsara ahy.'
mg1865::mg_18::23::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, miantsinanana aho, fa tsy any Izy; Ary miankandrefana aho, fa tsy hitako Izy;'
mg1865::mg_18::23::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mianavaratra amin''izay iasany aho, fa tsy tazako Izy; Mivily any atsimo Izy, ka tsy hitako.'
mg1865::mg_18::23::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahalala ny lalana falehako Izy; Raha hizahany toetra aho, dia hivoaka tahaka ny volamena.'
mg1865::mg_18::23::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongotro nifikitra tamin''ny lalany; Eny, ny lalany no nizorako tsara, ka tsy nivily aho.'
mg1865::mg_18::23::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didin''ny molony tsy mba nialako; Ny tenin''ny vavany noraketiko mihoatra noho ny faniriako*. [*Na: anjara-haniko]'
mg1865::mg_18::23::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy miova saina Izy, iza no mahasakana Azy? Fa na inona na inona irin''ny fanahiny dia ataony.'
mg1865::mg_18::23::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, manatanteraka izay voatendry ho ahy Izy; Ary zavatra maro toy izany no ao aminy;'
mg1865::mg_18::23::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: '2022-07-02T07:35:49+0000'
  verse_title: null
  verse_text: 'Toa Izany no mampangovitra ahy eo anatrehany; Raha misaintsaina izany aho, dia matahotra Azy.'
mg1865::mg_18::23::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: '2022-07-02T07:35:41+0000'
  verse_title: null
  verse_text: 'Fa Andriamanitra no mandreraka ny foko, ary ny Tsitoha no mampangovitra ahy;'
mg1865::mg_18::23::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny fahamaizinana no maharesy ahy, na ny maizim-pito izay manarona ny tavako*. [*Na: Satria tsy nalaina aho, dieny tsy mbola avy ny maizina, Ary tsy nanafina ny maizim-pito amin''ny tavako Izy]'
mg1865::mg_18::24::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no tsy misy fotoan''andro voatendrin''ny Tsitoha, ary nahoana no tsy hitan''ny mahalala Azy izany androny Izany?'
mg1865::mg_18::24::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mamindra faritany sy mangalatra omby aman''ondry sady miandry azy.'
mg1865::mg_18::24::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandroaka ny borikin''ny kamboty izy, ary maka ny ombin''ny mpitondratena ho tsatòka.'
mg1865::mg_18::24::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manosika ny mahantra hiala amin''ny lalana izy, ka dia miery azy avokoa ny malahelo amin''ny tany.'
mg1865::mg_18::24::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tahaka ny fivoaky ny boriki-dia any an''efitra no fivoak''ireny ho amin''ny asany hiremby; Ny tani-hay no ahazoany hanina ho an''ny zanany.'
mg1865::mg_18::24::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any an-tsaha izy maka vilona sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.'
mg1865::mg_18::24::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandry mitanjaka amin''ny alina izy, satria tsy manan-damba, ka dia tsy manana firakotra amin''ny hatsiaka;'
mg1865::mg_18::24::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kotsan''ny ranonoram-baratra any an-tendrombohitra izy, ka mitampisaka amin''ny vatolampy, fa tsy manam-pialofana.'
mg1865::mg_18::24::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misarika ny kamboty eo am-pinonoana izy ary maka tsatòka amin''ny ory.'
mg1865::mg_18::24::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandeha mitsaitsaika ireo, fa mitanjaka tsy manan-kitafy, ary noana eo am-pitondrana ny amboaram-bary.'
mg1865::mg_18::24::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao diloilo eo anatin''ny tambohon''ny mpampahory azy* izy; Ary manosihosy ny famiazam-boaloboka izy, nefa mangetaheta ihany. [*Hebreo: tambohon''ireny]'
mg1865::mg_18::24::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitrona ny lehilahy ao an-tanana, ary mitaraina ny fanahin''ny voalefona; Nefa tsy ahoan''Andriamanitra akory ny ratsy atao.'
mg1865::mg_18::24::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireny no mpikomy amin''ny mazava; Tsy mba mihevitra ny lalany izy, na mitoetra eo amin''ny alehany.'
mg1865::mg_18::24::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha vao mangiran-dratsy, dia mifoha ny mpamono olona; Mamono ny ory sy ny malahelo izy, ary nony alina, dia tahaka ny mpangalatra.'
mg1865::mg_18::24::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mason''ny mpijangajanga miandry ny maizimaizina, ka hoy izy: Tsy misy hahalala ahy ka dia manao very maso izy.'
mg1865::mg_18::24::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy manamy trano nony maizina; Nefa nony antoandro dia miery izy; Tsy mahalala ny mazava izy;'
mg1865::mg_18::24::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny aizim-pito* no marainan''ireo rehetra ireo; Satria efa mahazatra azy ny fampahatahoran''ny aizim-pito* izy. [*Hebreo: aloky ny fahafatesana]'
mg1865::mg_18::24::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsinkafona paohin''ny rano izy; Voaozona ny anjarany eo amin''ny tany; Tsy mivily ho amin''ny lalana mankeny amin''ny tanim-boaloboka izy.'
mg1865::mg_18::24::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny andevonan''ny maina sy ny mafana ny ranom-panala no andevonan''ny fiainan-tsy hita* ny mpanota. [*Hebreo: Sheola]'
mg1865::mg_18::24::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manadino azy ny vohoka; manjary hanim-py ho an''ny olitra izy ka tsy tsarovana intsony; Ary tapaka tahaka ny hazo ny ratsy fanahy*, [*Hebreo: faharatsiana]'
mg1865::mg_18::24::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ilay nandroba ny momba izay tsy niteraka ary tsy nanisy soa ny mpitondratena.'
mg1865::mg_18::24::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa halavain''Andriamanitra amin''ny heriny ny andron''ny olo-mahery; Mitsangana indray ireo, na dia tsy nanampo izay ho velona intsony aza.'
mg1865::mg_18::24::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataony mandry fahizay sy tsara tohana izy, sady tsinjoviny mandrakariva ny lalany.'
mg1865::mg_18::24::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nasandratra izy, kanjo vetivety dia tsy ao intsony, dia mihalevona izy ka otazana tahaka ny olona rehetra, ary tangosana tahaka ny salohim-bary.'
mg1865::mg_18::24::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy izany, dia aoka hisy hamaky lainga ahy ka hampiseho ny teniko ho tsinontsinona.'
mg1865::mg_18::25::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny fanintelony nataon''i Bilidada'
  verse_text: 'Dia namaly Bildada Sohita ka nanao hoe.'
mg1865::mg_18::25::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fanapahana sy fampahatahorana no ao aminy, manao fihavanana any amin''ny avo Izy.'
mg1865::mg_18::25::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azo isaina va ny miaramilany? Ary fahazavan''iza no tsy ihoaran''ny Azy*? [*Na: Amin''iza no tsy iposahan''ny fahazavany?]'
mg1865::mg_18::25::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aiza no hahamarina ny zanak''olombelona eo anatrehan''Andriamanitra? Ary aiza no hadio izay tera-behivavy?'
mg1865::mg_18::25::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny volana aza tsy mangarangarana, ary ny kintana aza tsy madio eo imasony;'
mg1865::mg_18::25::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mainka fa ny olombelona, izay kankana, ary ny zanak''olombelona, izay olitra.'
mg1865::mg_18::26::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Joba'
  verse_text: 'Dia namaly Joba ka nanao hoe:'
mg1865::mg_18::26::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! nanohana ny tsy manan-kery ianao sy nampahatanjaka ny sandry malemy!'
mg1865::mg_18::26::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanolo-tsaina ny tsy hendry sy nampahafantatra izay fahendrena betsaka!'
mg1865::mg_18::26::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nandaharanao teny? Ary fanahin''izay no nivoaka avy tao aminao?'
mg1865::mg_18::26::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny matoatoa dia ampanaintainina Any ambanin''ny rano sy any ambanin''ny mponina any.'
mg1865::mg_18::26::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiainan-tsy hita* miharihary eo anatrehany, ary ny fandringanana dia tsy mirakotra. [*Hebreo: Sheola]'
mg1865::mg_18::26::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamelatra ny lanitra avaratra ho eny ambonin''ny habakabaka Izy ary manantona ny tany amin''ny tsy misy.'
mg1865::mg_18::26::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fonosiny amin''ireo rahony matevina ny rano, nefa ny fanambanin''ny rahona tsy mety triatra.'
mg1865::mg_18::26::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manakona ny seza fiandrianany tsy ho hitantsika Izy amin''ny amelarany ny rahony hanarona azy.'
mg1865::mg_18::26::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asiany faritra manodidina eny ambonin''ny rano. Hatramin''izay ihaonan''ny mazava sy ny maizina.'
mg1865::mg_18::26::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny andrin''ny lanitra nihozongozona sady ankona amin''ny teny mafy ataony.'
mg1865::mg_18::26::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny heriny no entiny mampanonja ny ranomasina, ary ny fahendreny no anorotoroany an-dRahaba*; [*Izahao Joba 9:13]'
mg1865::mg_18::26::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahiny no mahatsara tarehy ny lanitra; Ny tanany no nitomboka ny menarana mandositra.'
mg1865::mg_18::26::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ireny dia vao ny sisintsisin''ny alehany ihany aza, ary siosion-teny mamelovelo no andrenesantsika Azy; Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?'
mg1865::mg_18::27::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
mg1865::mg_18::27::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Andriamanitra, Izay efa nandà tsy hanome ahy ny rariny, sy ny Tsitoha, Izay efa nampangidy ny aiko.'
mg1865::mg_18::27::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mbola ato anatiko ihany ny aiko, ary eo am-bavoroko ny Fanahin''Andriamanitra.'
mg1865::mg_18::27::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy hanao teny tsy marina ny molotro, ary tsy hanonom-pitaka ny lelako.'
mg1865::mg_18::27::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sanatria raha hanaiky ny anareo ho marina aho! Mandra-pialan''ny aiko dia tsy hanaiky ny tenako ho manan-tsiny aho.'
mg1865::mg_18::27::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinako dia hazoniko mafy ka tsy ho foiko; Ny foko tsy manome tsiny ahy akory na dia ny amin''ny androko iray monja aza.'
mg1865::mg_18::27::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho hita fa ratsy fanahy ny fahavaloko, ary tsy marina izay mitsangana hanohitra ahy.'
mg1865::mg_18::27::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona no fanantenan''ny mpihatsaravelatsihy,44 raha maito ny ainy, ka* tsoahan''Andriamanitra ny fanahiny? [*Na: Fa inona no fanantenan''ny mpihatsaravelatsihy, na dia mahazo harena be aza. Raha, etc]'
mg1865::mg_18::27::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihaino ny fitarainany va Andriamanitra, raha ozoim-pahoriana izy?'
mg1865::mg_18::27::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho azony hiravoravoana va ny Tsitoha? Hahazo miantso an''Andriamanitra mandrakariva va izy?'
mg1865::mg_18::27::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampianatra anareo ny amin''ny tanan''Andriamanitra aho, ary tsy hisorona anareo aho ny amin''ny hevitry ny Tsitoha.'
mg1865::mg_18::27::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, ianareo rehetra samy efa nahita izany; Koa nahoana ianareo no manao hevi-poana?'
mg1865::mg_18::27::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no anjaran''ny ratsy fanahy avy amin''Andriamanitra, sy lovan''ny lozabe raisiny avy amin''ny Tsitoha:'
mg1865::mg_18::27::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mihamaro aza ny zanany, dia ho an''ny sabatra ihany ireny. Ary ny zaza aterany tsy ho voky hanina;'
mg1865::mg_18::27::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ankohonany sisa dia hasitrik''Ifahafatesana*, ary tsy hisaona azy ny mpitondratenany; [*Na: halevina noho ny areti-mandringana]'
mg1865::mg_18::27::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mahary volafotsy hoatra ny vovoka aza izy ary mahangona fitafiana hoatra ny fotaka,'
mg1865::mg_18::27::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, manangona ihany izy, nefa ny marina no hitafy izany, ary ny tsy manan-tsiny no hizara ny volafotsy;'
mg1865::mg_18::27::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao ny tranony tahaka ny an''ny lolofotsy izy, ary tahaka ny trano rantsan-kazo ataon''ny mpiandry voly;'
mg1865::mg_18::27::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao avokoa ihany ny hareny, raha vao mandry izy; Nefa nony ahirany ny masony, dia tsy ao intsony ireny.'
mg1865::mg_18::27::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fampahatahorana mahatratra azy tahaka ny riaka: Nony alina paohin''ny tafio-drivotra izy;'
mg1865::mg_18::27::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rivotra avy any atsinanana mampiainga sy mahalasa azy ka mipaoka azy hiala amin''ny fitoerany;'
mg1865::mg_18::27::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asian*''Andriamanitra izy ka tsy iantrany, ary mandositra dia mandositra ho afaka amin''ny tanany izy; [*Hebreo: Torahan'', na Tifirin'']'
mg1865::mg_18::27::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tehafin''ny olona tanana izy sady isitrisirany ka ampialainy amin''ny fonenany*. [*Na: Ary ny miray monina aminy aza misitrisitra azy]'
mg1865::mg_18::28::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy tany fihadiana volafotsy, ary misy tany fahazoana volamena, izay diovina.'
mg1865::mg_18::28::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vy dia alaina avy amin''ny tany, ary ny varahina arendrika avy amin''ny vato.'
mg1865::mg_18::28::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpihady vola mampisava ny maizina ka mizaha hatramin''ny faran''ny zavatra rehetra ao, dia ny vaton''ny aizim-pito sy ny aloky ny fahafatesana;'
mg1865::mg_18::28::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihady lavaka mihalavitra amin''izay itoeran''olona izy ka tsy ampoizin''ny tongotra akory, ary mihantona sy mitsingevaheva any ambany lavitra ny olona izy.'
mg1865::mg_18::28::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany no ihavian''ny hanina; Ary ny ao ambaniny dia avadika tahaka ny afo.'
mg1865::mg_18::28::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fitoeran''ny safira ny vatony, ary misy akoram-bolamena ao aminy'
mg1865::mg_18::28::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Làlana tsy fantatry ny vorona mpihaza ary tsy hitan''ny mason''ny voromahery,'
mg1865::mg_18::28::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady tsy nodiavin''ny zanaky ny bibi-dia ary tsy mba nalehan''ny liona masiaka.'
mg1865::mg_18::28::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maninjitra ny tanany amin''ny vatokaranana ireo ary mamadika ny tendrombohitra hatramin''ny fotony;'
mg1865::mg_18::28::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vatolampy tatahany hatao lalan-drano, ary izay zava-tsoa rehetra dia hitan''ny masony avokoa.'
mg1865::mg_18::28::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tampenany ny lalan-drano mba tsy hisy mitete. Ary izay zava-miafina dia avoakany ho amin''ny mazava.'
mg1865::mg_18::28::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aiza kosa no hahitana ny fahendrena? ary aiza no fitoeran''ny fahalalana?'
mg1865::mg_18::28::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy zanak''olombelona mahalala ny vidiny, ary tsy hita eo amin''ny tanin''ny velona izy.'
mg1865::mg_18::28::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny lalina: Tsy ato anatiko izy; Ary, tsy ato amiko izy, hoy ny ranomasina.'
mg1865::mg_18::28::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volamena tsara tsy mahatakalo azy, ary ny volafotsy tsy azo lanjaina ho vidiny;'
mg1865::mg_18::28::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volamena avy any Ofira tsy ampy ho tombany, na ny beryla saro-bidy sy ny safira aza.'
mg1865::mg_18::28::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volamena sy ny fitaratra tsy azo ampitahaina aminy, ary tsy azo takalozana firavaka tena volamena izy.'
mg1865::mg_18::28::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tokony hotsaroana akory ny voahangy sy ny vato krystaly, fa ny fahazoana fahendrena dia mihoatra noho ny voahangy.'
mg1865::mg_18::28::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny topaza avy any Etiopia dia tsy azo ampitahaina aminy, ary tsy mahatakalo azy ny tena volamena tsara'
mg1865::mg_18::28::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy aiza ary ny fahendrena? Ary aiza no fitoeran''ny fahalalana?'
mg1865::mg_18::28::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miafina amin''ny mason''ny velona rehetra izany ary takona amin''ny voro-manidina.'
mg1865::mg_18::28::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Abadona* sy Ifahafatesana: Ny sofinay ihany no nandrenesany ny filazana azy. [*Abadona = Fandringanana]'
mg1865::mg_18::28::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra ihany no mahalala ny lalana ho any aminy, ary Izy no mahafantatra ny itoerany;'
mg1865::mg_18::28::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no mitsinjo hatramin''ny faran''ny tany ary mahatazana manerana izao ambanin''ny lanitra rehetra izao,'
mg1865::mg_18::28::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka manendry ny lanjan''ny rivotra ary mamatra ny rano amin''ny famarana.'
mg1865::mg_18::28::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanao lalana ho an''ny ranonorana Izy sy lalana halehan''ny helatry ny kotrokorana,'
mg1865::mg_18::28::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahita ka nanambara azy Izy; Eny, nanorina azy Izy sady namantatra azy;'
mg1865::mg_18::28::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamin''ny olona: Indro, ny fahatahorana ny Tompo no fahendrena. Ary ny fialàna amin''ny ratsy no fahalalana.'
mg1865::mg_18::29::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
mg1865::mg_18::29::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho tahaka ny tamin''ireny volana lasa ireny aho! Dia tahaka ilay tamin''ny andro niarovan''Andriamanitra ahy!'
mg1865::mg_18::29::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola nazava teo ambonin''ny lohako ny jirony, ary ny fahazavany no nandehanako tao amin''ny maizina;'
mg1865::mg_18::29::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tahaka ny toetro fony aho mbola fararano, raha niseho teo ambonin''ny laiko ny fisakaizan''Andriamanitra;'
mg1865::mg_18::29::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola tao amiko ny Tsitoha, Ary nanodidina ahy ny zanako*; [*Na: ny ankizilahiko]'
mg1865::mg_18::29::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola nanasa ny tongotro tamin''ny rononomandry aho, ary ny vatolampy namoaka renirano diloilo teo amiko;'
mg1865::mg_18::29::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha niainga niakatra ho eo amin''ny vavahadin''ny tanàna aho ka nametraka ny fipetrahako teo ankalalahana,'
mg1865::mg_18::29::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahita ahy ny zatovo ka niampirimpirina; Ary niainga ny fotsy volo, dia nijoro;'
mg1865::mg_18::29::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nangina tsy niteny ny lehibe ka nitampim-bava;'
mg1865::mg_18::29::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy sahy niteny ny mpanapaka, ary ny lelany niraikitra tamin''ny lanilaniny.'
mg1865::mg_18::29::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay sofina nandre dia nanao ahy hoe sambatra; Ary Izay maso nahita dia vavolombelona ho ahy,'
mg1865::mg_18::29::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria namonjy ny ory izay nitaraina aho sy ny kamboty izay tsy nanan-kamonjy.'
mg1865::mg_18::29::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisaoran''izay efa ho faty dia tonga tamiko; Ary ny fon''ny mpitondratena nampifaliko*. [*Hebreo: nampihobiko]'
mg1865::mg_18::29::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitafy fahamarinana aho, ka mba nitafy ahy kosa izy; Eny, tahaka ny lamba sy ny hamama ny rariny izay nananako.'
mg1865::mg_18::29::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa maso ho an''ny jamba aho ary tongotra ho an''ny mandringa.'
mg1865::mg_18::29::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ray ho an''ny malahelo aho, ary ny adin''ny olona tsy fantatro aza nodinihiko.'
mg1865::mg_18::29::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namaky ny nifin''ny ratsy fanahy aho ka nandrombaka ny babo teo am-bavany'
mg1865::mg_18::29::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Eo amin''ny akaniko ihany no hialako aina, ary hanamaro ny androko toy ny fasika aho.'
mg1865::mg_18::29::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fakako ho azon''ny rano, ary ny ando hitoetra amin''ny sampako mandritra ny alina.'
mg1865::mg_18::29::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho vaovao amiko lalandava ny voninahitro, ary ny tsipikako hihahenjana eny an-tanako.'
mg1865::mg_18::29::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihaino ahy ny olona, dia niandry, ka nangina tamin''ny fanolorako saina izy.'
mg1865::mg_18::29::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa niteny aho, dia tsy mba namaly intsony izy; ary nitetevan''ny teniko izy.'
mg1865::mg_18::29::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niandry ahy toy ny fiandry ny ranonorana izy ary nitanatana vava toy ny fiandry ny fara-orana.'
mg1865::mg_18::29::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nisy nila ho ketraka, dia mbola niseho miramirana taminy ihany ny tarehiko, ary tsy nahamaloka ny fahazavan''ny tavako ireo.'
mg1865::mg_18::29::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nifidy ny lalan-kalehany aho ka nipetraka ho lohany, eny, nitoetra toy ny mpanjaka teo amin''ny miaramila sy toy ny mpampionona ny misaona aho.'
mg1865::mg_18::30::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny kosa dia mihomehy ahy na dia izay tokon-jandriko aza, dia zanak''ireo izay nolaviko tsy ho isan''ny amboa miandry ny ondriko akory aza.'
mg1865::mg_18::30::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, mampaninona ahy ny herin''ny tanan''ireo. Izay efa very fahatanjahana?'
mg1865::mg_18::30::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manjenjena* noho ny tsy fisian-kanina sy ny mosary izy; Homankomana foana any an-tany karankaina izy, dia eo an-katoky ny loza sy ny fandringanana. [*Na: Ana, na Kaozatra, na Tsy manan-janaka]'
mg1865::mg_18::30::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsongo anambodihena eo amin''ny kirihitrala izy, ary ny fakan''ny anjavidy* no fihinany. [*Hebreo: rotema; izahao I Mpanjaka 19:4]'
mg1865::mg_18::30::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roahina tsy ho eo amin''ny olona izy sady akoraina toy ny mpangalatra.'
mg1865::mg_18::30::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any an-dohasaha mahatsiravina no tsy maintsy itoerany, dia ao an-dava-tany sy an-dava-bato.'
mg1865::mg_18::30::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Minananana eny amin''ny kirihitrala izy ary mitangorona eo ambanin''ny amiana.'
mg1865::mg_18::30::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zanaky ny adala izy sady zanaky ny tsy manan-kaja, ka roahina tsy ho eo amin''ny tany.'
mg1865::mg_18::30::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny efa ataony an-kira aho. Eny, efa ambentinteniny aho.'
mg1865::mg_18::30::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataony toy ny zava-betaveta aho ka halaviriny, ary tsy menatra handrora ny tavako izy.'
mg1865::mg_18::30::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noketrahin''Andriamanitra ny kofehiko, ka nampietreny aho; Ka dia mba nesorin''iretsy kosa teo anatrehako ny lamboridiny.'
mg1865::mg_18::30::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy androvolahy mitsangana eo ankavanako; Manosika ny tongotro hiala izy ary manandratra tovon-tany hampidirany loza amiko.'
mg1865::mg_18::30::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandrava ny lalako sy manararaotra ny andravana ahy izy, nefa ny tenany tsy manan-kamonjy,'
mg1865::mg_18::30::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny fiditra eo amin''ny banga lehibe no fihaviny, ka avy ao amin''ny voarava no imaonany*. [*Na: Raha mbola miezinezina, dia mimaona izy]'
mg1865::mg_18::30::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voatodika hamely ahy ny fampitahorana: Manenjika ny voninahitro tahaka ny rivotra izy, ka levona tahaka ny rahona ny famonjena ahy'
mg1865::mg_18::30::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, raraka ato anatiko ny fanahiko. Fenjàn''ny andro fahoriana aho.'
mg1865::mg_18::30::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alina mampahalà* ny taolako ho afaka amiko, ary tsy mitsahatra ireo manotahota ahy ireo. [*Hebreo: manindrona]'
mg1865::mg_18::30::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny haben''ny hery dia tonga tsy antonona ny akanjoko, manenda ahy tahaka ny vozon-dobaka izany.'
mg1865::mg_18::30::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nanary ahy teo amin''ny fotaka Izy, ka efa tahaka ny vovoka sy ny lavenona aho'
mg1865::mg_18::30::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitaraina aminao aho, nefa tsy mihaino ahy Ianao; Mijoro eo aho, nefa ierenao foana.'
mg1865::mg_18::30::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa manjary lozabe amiko Ianao; Ny herin''ny tananao no andrafianao ahy.'
mg1865::mg_18::30::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aingainao ho eny amin''ny rivotra aho ka alefanao handeha, ary levoninao amin''ny tafio-drivotra mifofofofo ho tsinontsinona aho.'
mg1865::mg_18::30::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro fa hampodinao any amin''ny fahafatesana aho, dia any amin''ny trano fivorian''ny olombelona rehetra.'
mg1865::mg_18::30::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy manainga ny tanany va ny olona, raha ianjeran''ny rava*? Ary tsy mitaraina va izy, raha tratry ny loza? [*Na: raha mila ho potraka izy]'
mg1865::mg_18::30::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nitomany ny ory va aho? Tsy nangorakoraka ny malahelo va ny fanahiko?'
mg1865::mg_18::30::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niandry ny soa aho, kanjo tonga ny ratsy; Ary nanantena ny mazava aho, kanjo avy ny maizina.'
mg1865::mg_18::30::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandevilevy ny tsinaiko ka tsy nanam-pitsaharana; Nitsena ahy ny andro fahoriana.'
mg1865::mg_18::30::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro*; Mitsangana aho ka mitaraina eo ampivorian''ny olona. [*Na: Efa mainty aho, fa tsy avy amin''ny hain''andro]'
mg1865::mg_18::30::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rahalahin''ny amboadia* aho Ary naman''ny ostritsa. [*Na: jakala]'
mg1865::mg_18::30::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa mainty ny hoditro sady miendakendaka, ary efa karankaina noho ny hafanana* ny taolako. [*Hebreo: fahamainana]'
mg1865::mg_18::30::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 30
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanjary fisaonana ny lokangako. Ary feon''ny mitomany ny sodiko.'
mg1865::mg_18::31::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampanekeko ny masoko; Koa hataoko ahoana indray no fijery zazavavy*? [*Hebreo: virijina]'
mg1865::mg_18::31::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izany, dia inona no anjara avy amin''Andriamanitra any ambony. Sy lova avy amin''ny Tsitoha any amin''ny avo?'
mg1865::mg_18::31::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy loza va no manjo ny ratsy fanahy? Ary tsy fahoriana va no mahazo ny mpanao ratsy?'
mg1865::mg_18::31::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy Andriamanitra* va no mijery ny lalako ka manisa ny diako rehetra? [*Hebreo: Izy]'
mg1865::mg_18::31::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny nandeha tamin''ny fitaka aho na niezaka tamin''ny fahafetsena.'
mg1865::mg_18::31::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: '(Enga anie ka holanjain''Andriamanitra eo amin''ny mizanan''ny fahamarinana aho! Dia ho fantany ny tsy fananako tsiny)'
mg1865::mg_18::31::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny nivily niala tamin''ny lalana ny diako, na nanaraka ny masoko ny foko, na nisy tsiny niraikitra tamin''ny tanako:'
mg1865::mg_18::31::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka hamafy aho, fa olon-kafa no hihinana, ary aoka ho fongotra izay amboleko.'
mg1865::mg_18::31::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tahàny adala tamin''ny vadin''olona ny foko, ka namitsaka teo am-baravaran''ny namako aho,'
mg1865::mg_18::31::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka kosa ny vadiko halain*''ny sasany, ary aoka olon-kafa no handry aminy. [*Na: hitoto ho an'']'
mg1865::mg_18::31::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahavetavetana izany, eny, heloka tokony hotsarain''ny mpitsara;'
mg1865::mg_18::31::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa afo mandevona hatrany amin''ny fandringanana izany ka hanongotra ny vokatro rehetra.'
mg1865::mg_18::31::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nandà ny rariny izay an''ny ankizilahiko na ny ankizivaviko, raha nifamaly tamiko izy,'
mg1865::mg_18::31::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia inona no hataoko, raha hitsangana Andriamanitra? Ary ahoana no havaliko Azy, raha handinika Izy?'
mg1865::mg_18::31::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy koa? Ary tsy Iray ihany va no namorona anay tany am-bohoka?'
mg1865::mg_18::31::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nandà Izay nirin''ny malahelo ka nahapahina ny mason''ny mpitondratena,'
mg1865::mg_18::31::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na nihinana ny sombin-kaniko irery, ka tsy mba nihinanan''ny kamboty'
mg1865::mg_18::31::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa tsy izany, fa hatry ny fony mbola tanora aho, dia notezaina teo amiko tahaka ny zanaka ny kamboty, Ary nitondra ny mpitondratena hatrany an-kibon-dreniko aho)'
mg1865::mg_18::31::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nahita olona efa ho faty noho ny tsy fananan-damba. Na malahelo tsy manan-kitafy,'
mg1865::mg_18::31::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsy nankasitraka ahy ny tenany*, ary tsy nanafàna azy ny volon''ondriko; [*Hebreo: valahany]'
mg1865::mg_18::31::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tahàny aho naninjitra ny tanako hampahory ny kamboty, saingy hitako fa nisy niandany tamiko teo am-bavahady:'
mg1865::mg_18::31::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka ny foto-tsandriko hitsoaka hiala amin''ny rangomainako, eny, aoka ny sandriko ho latsaka hiala amin''ny taolam-panaviko.'
mg1865::mg_18::31::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mampahatahotra ahy* ny loza avy amin''Andriamanitra, ka tsy mahavita na inona na inona aho noho ny fahalehibiazany. [*Na: Fa hanjo ahy ny zava-mahatahotra, dia]'
mg1865::mg_18::31::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nanao ny volamena ho fanantenako, na nanonona ny volamena tsara hoe: Ry tokiko o;'
mg1865::mg_18::31::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny ho nifaly noho ny haben''ny fananako sy noho ny nahazoan''ny tanako harena betsaka;'
mg1865::mg_18::31::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nijery ny masoandro, raha namirapiratra izy, na ny volana, raha nandeha tamin''ny fangarangarany izy,'
mg1865::mg_18::31::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka voafitaka mangingina ny foko, ary nanoroka ny tanako ny vavako'
mg1865::mg_18::31::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: '(Dia heloka hanamelohan''ny mpitsara koa izany; Fa ho nihatsaravelatsihy tamin''Andriamanitra Izay any ambony aho)'
mg1865::mg_18::31::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nifaly noho ny loza nanjo izay nankahala ahy, na nibitabitaka, raha nozoim-pahoriana izy'
mg1865::mg_18::31::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: '(Tsia, fa tsy navelako hanota akory ny vavako hangataka ozona hanjo azy)'
mg1865::mg_18::31::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny ny tao an-daiko tsy nanao hoe: Iza moa no tsy voky tamin''ny henany*? [*Na: Iza moa no tsy voky tamin''ny fianakaviany?]'
mg1865::mg_18::31::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahiny aza tsy nandry teny alatrano; Fa novohako ny varavarako manatrika ny lalana;'
mg1865::mg_18::31::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho mba nanarona ny fahadisoako tahaka an''i Adama* ka nanafina ny heloko tato an-tratrako, [*Na: tahaka ny olona]'
mg1865::mg_18::31::34:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nampihorohoro ny foko ny vahoaka maro be, ary natahotra aho, fandrao hamavoin''ny fokon''olona, ka dia namitsaka, fa tsy sahy nivoaka ny varavarana'
mg1865::mg_18::31::35:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hisy hihaino ahy! Indro ny soniako! Enga anie ka hamaly ahy ny Tsitoha! Indro ny taratasy voasoratr''ilay manana ady amiko!'
mg1865::mg_18::31::36:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko eny an-tsoroko tokoa izany ary hafehiko amiko ho satro-boninahitra.'
mg1865::mg_18::31::37:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny isan''ny diako dia hambarako aminy, ary tahaka ny fanakon''ny zanak''andriana no hanatonako Azy.'
mg1865::mg_18::31::38:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny mitaraina hiampanga ahy ny taniko, ka miara-mitomany ny vavasako;'
mg1865::mg_18::31::39:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny aho nihinana ny vokatra, nefa tsy nandoa ny vidiny. Na nanao izay hahafaty ny ain''ny tompony:'
mg1865::mg_18::31::40:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 31
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka ny tsilo no haniry hisolo ny vary tritika. Ary ny ahi-dratsy hisolo ny vary hordea. Tapitra ny tenin''i Joba.'
mg1865::mg_18::32::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny nataon''i Eliho'
  verse_text: 'Ary nitsahatra tsy namaly intsony izy telo lahy ireo, satria nanamarin-tena Joba.'
mg1865::mg_18::32::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nirehitra kosa ny fahatezeran''i Eliho, zanak''i Barakela, Bozita, avy amin''ny fokon''i Rama; eny, tamin''i Joba no nirehetan''ny fahatezerany, satria nanao ny tenany ho marina noho Andriamanitra izy.'
mg1865::mg_18::32::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny sakaizany telo lahy koa no nirehetan''ny fahatezerany, satria tsy nahita teny havaliny izy ireo, kanefa nanameloka an''i Joba*. [*Na: teny havaliny an''i Joba hanamelohany azy]'
mg1865::mg_18::32::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliho mbola niandry an-dr''i Joba aloha vao niteny, fa ireo no ela niainana kokoa noho izy.'
mg1865::mg_18::32::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitany fa tsy nanan-kavaly izy telo lahy, dia nirehitra ny fahatezerany;'
mg1865::mg_18::32::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia niteny Eliho, zanak''i Barakela, Bozita, ka nanao hoe: Mbola tanora aho, fa ianareo kosa efa fotsy volo, koa dia niaoriandriana aho aloha, fa tsy sahy nanambara aminareo izay fantatro.'
mg1865::mg_18::32::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Aoka ny fahanterana no hiteny, ary aoka ny hamaroan''ny taona no hampianatra fahendrena.'
mg1865::mg_18::32::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny fanahy izay ao anatin''ny zanak''olombelona sy* ny fofonain''ny Tsitoha no mahahendry azy. [*Na: Dia]'
mg1865::mg_18::32::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy dia ny fahalehibiazana no mahahendry, ary tsy dia ny fahanterana no ahalalana ny rariny;'
mg1865::mg_18::32::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia hoy izaho: Aoka samy hihaino ahy; Izaho koa mba hanambara izay fantatro.'
mg1865::mg_18::32::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, niandry ny teninareo aho, ary nandinika ny teny nalahatrareo, mandra-pihevitrareo izay holazaina;'
mg1865::mg_18::32::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nihaino dia nihaino anareo aho, fa he! tsy nisy naharesy lahatra an''i Joba ianareo, na nahavaly ny teniny akory;'
mg1865::mg_18::32::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao ianareo hanao hoe: Hitanay ny fotony*: Andriamanitra no maharesy azy, fa tsy olona. [*Hebreo: fahendrena]'
mg1865::mg_18::32::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nandaha-teny hamely ahy anefa izy; Ary tsy araka ny teninareo no havaliko azy.'
mg1865::mg_18::32::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Very hevitra tery izy ireo, ka tsy namaly intsony; Efa nanalavitra azy ny teny.'
mg1865::mg_18::32::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hangina va aho, raha tsy miteny izy ireo, fa mijanona foana izy ka tsy mamaly intsony?'
mg1865::mg_18::32::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anjarako kosa izao, koa dia hamaly aho; Eny, izaho hanambara izay fantatro;'
mg1865::mg_18::32::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa feno teny ny foko; Manery ahy ny fanahy ato anatiko.'
mg1865::mg_18::32::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! ny ato anatiko dia efa tahaka ny divay izay tsy misy hiainana, efa ho triatra tahaka ny siny hoditra vaovao izy.'
mg1865::mg_18::32::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiteny aho mba hisy hiainako tsara; Hiloa-bava aho ka hamaly.'
mg1865::mg_18::32::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hizaha tavan''olona akory aho, ary aoka tsy handrobo olona.'
mg1865::mg_18::32::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba mahay mandrobo aho; Raha izany, dia halain''ny Mpanao ahy faingana aho.'
mg1865::mg_18::33::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, masïna ianao, ry Joba; mihainoa ny alahatro, ary mandrenesa ny teniko rehetra.'
mg1865::mg_18::33::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fa efa niloa-bava aho, Miteny ato am-bavako ny lelako.'
mg1865::mg_18::33::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hitsim-poko no hiseho amin''ny teniko; Ary ny fahalalan''ny molotro no holazaina tsy hasiana fitaka.'
mg1865::mg_18::33::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Fanahin''Andriamanitra no efa nanao ahy, ary ny fofonain''ny Tsitoha no mamelona ahy.'
mg1865::mg_18::33::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hainao, valio ary aho, miomàna ianao, ka miatreha tsara.'
mg1865::mg_18::33::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izaho koa mba an''Andriamanitra: tahaka anao ihany; Eny, izaho koa mba nosombinana avy tamin''ny tanimanga.'
mg1865::mg_18::33::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny fampahatahorako tsy dia hampahatahotra anao, ary ny vesatra avy amiko tsy dia hitambesatra aminao.'
mg1865::mg_18::33::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nilaza teo anatrehako mihitsy ianao, ary efa reko ihany ny feon''ny teninao hoe:'
mg1865::mg_18::33::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Madio tsy manam-pahadisoana aho, ary tsy manan-tsiny aman-keloka;'
mg1865::mg_18::33::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! mitady izay handrafiany ahy Andriamanitra, ary ataony fahavalony aho;'
mg1865::mg_18::33::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampiditra ny tongotro eo amin''ny boloky hazo Izy ary mitsikilo ny diako rehetra.'
mg1865::mg_18::33::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! izany no tsy mahamarina anao, hoy izaho; Fa Andriamanitra dia lehibe loatra ka tsy leon''ny zanak''olombelona.'
mg1865::mg_18::33::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahoana no manome tsiny Azy ianao noho ny tsy nampisehoany izay antony amin''ny ataony*? [*Na: Noho ny tsy amaliany ny tenin''olombelona?]'
mg1865::mg_18::33::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa misy fanao iray itenenan''Andriamanitra, eny, fanao roa aza, nefa tsy tandreman''ny olona izany,'
mg1865::mg_18::33::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny nofy sy ny tsindrimandry amin''ny alina, raha sondrian-tory ny olona ka renoka eo am-pandriana,'
mg1865::mg_18::33::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia manokatra ny sofin''ny olona Izy ka manisy tombo-kase ny fananarany azy,'
mg1865::mg_18::33::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hampiala ny olona amin''ny fanaony, sy hampifady azy ny fireharehana.'
mg1865::mg_18::33::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaro ny fanahiny tsy ho any an-davaka Izy, ary ny ainy mba tsy ho voan''ny fiadiana.'
mg1865::mg_18::33::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anarina amin''ny fanaintainana eo ampandriany koa izy sy amin''ny fikotrankotran''ny taolany lalandava;'
mg1865::mg_18::33::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ainy marikorikon-kanina, eny, na dia ny hanim-py aza tsy tian''ny fanahiny.'
mg1865::mg_18::33::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihena ny nofony ka tsy hita, ary mitranitrany ny taolany izay tsy hita teo;'
mg1865::mg_18::33::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia manakaiky ny lavaka ny fanahiny, ary ny ainy manatona ny mpaka aina.'
mg1865::mg_18::33::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy Anjely ho Mpanalalana ho azy, iray amin''ny arivo, hanoro izay tokony halehan''ny olona,'
mg1865::mg_18::33::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary* hamindra fo aminy ka nanao hoe: Vonjeo izy mba tsy hidina any an-davaka, fa efa nahita avotra Aho, [*Na: Dia]'
mg1865::mg_18::33::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tsara noho ny an''ny tanora ny nofony, hody ho toy ny tamin''ny andro nahatanorany izy;'
mg1865::mg_18::33::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hivavaka amin''Andriamanitra izy ka hankasitrahany ary hahita ny havany amin''ny hafaliana, fa hampodiny amin''ny zanak''olombelona ny fahamarinany*. [*Na: hamaly ny olona araka ny fahamarinany Izy]'
mg1865::mg_18::33::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hihira izy hilaza amin''ny olona hoe: Efa nanota aho, fa nanao ny rariny ho heloka, kanefa tsy novaliana araka ny nataoko;'
mg1865::mg_18::33::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa navotany ny fanahiko mba tsy hivarina any an-davaka, ary mifaly ny aiko amin''ny fahitana ny mazava.'
mg1865::mg_18::33::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izany rehetra izany no ataon''Andriamanitra indroa amin''ny olona, eny, intelo aza,'
mg1865::mg_18::33::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hamerina ny fanahiny tsy ho* any an-davaka, mba hihazavany amin''ny fahazavan''aina. [*Na: hiala]'
mg1865::mg_18::33::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo, ry Joba, ka mihainoa ahy; Mangina kely aloha ianao, fa izaho mbola hiteny.'
mg1865::mg_18::33::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manan-kavaly ianao, dia mamalia ahy ihany; Mitenena, fa ta-hanamarina anao aho;'
mg1865::mg_18::33::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 33
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy manan-kavaly ianao, dia mihainoa ahy kosa; Mangina tsara, fa hampianariko fahendrena ianao.'
mg1865::mg_18::34::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
mg1865::mg_18::34::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandrenesa ny teniko, ianareo olon-kendry; Ary mihainoa ahy, ianareo manam-pahalalana.'
mg1865::mg_18::34::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sofina no mamantatra teny, Ary ny vava* no manandrana hanina. [*Hebreo: lanilany]'
mg1865::mg_18::34::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka izay rariny no hodinihintsika, ary aoka hiara-mamantatra izay tsara isika.'
mg1865::mg_18::34::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Joba efa nanao hoe: Marina aho, saingy nesorin''Andriamanitra tamiko ny rariny;'
mg1865::mg_18::34::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina ny ahy, nefa ampandaingainy aho; Mahafaty ny zana-tsipïka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.'
mg1865::mg_18::34::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza moa no misy lehilahy tahaka an''i Joba, izay manaram-po amin''ny famingavingana toy ny fisotro rano.'
mg1865::mg_18::34::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga naman''ny mpanao ratsy sady miara-mandeha amin''ny ratsy fanahy?'
mg1865::mg_18::34::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Tsy mahasoa ny olona ny mihavana amin''Andriamanitra.'
mg1865::mg_18::34::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany mihainoa ahy, ianareo manam-panahy: Lavitra an''Andriamanitra ny hanao ratsy! Ary lavitra ny Tsitoha ny hanao meloka!'
mg1865::mg_18::34::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny nataon''ny olona ihany no ampanodiaviny azy, ka mamaly ny olona rehetra araka ny lalany avy Izy.'
mg1865::mg_18::34::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny tokoa, Andriamanitra tsy manao ratsy mihitsy, ary ny Tsitoha tsy mba mamadika ny rariny.'
mg1865::mg_18::34::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no nanendry Azy ho Mpiadidy ny tany? Ary iza no nanorina izao tontolo izao?'
mg1865::mg_18::34::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny ny tenany ihany no heveriny, ka hangoniny ho ao aminy ny fanahiny sy ny fofonainy,'
mg1865::mg_18::34::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiala avokoa ny ain''ny nofo rehetra, ary hiverina amin''ny vovoka ny olona.'
mg1865::mg_18::34::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manam-pahalalana ianao, dia mandrenesa izao, ka mihainoa ny teniko'
mg1865::mg_18::34::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mahay mifehy va izay tsy tia rariny? Ary Ilay marina sady mahery va no hohelohinao?'
mg1865::mg_18::34::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: '(Mety va ny miteny amin''ny mpanjaka hoe: Olom-poana ianao! Ary amin''ny zanak''andriana: Ry ilay ratsy!),'
mg1865::mg_18::34::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay tsy mizaha ny tavan''ny lehibe, ary tsy manaja ny ambony mihoatra noho ny ambany, satria samy asan''ny tanany avokoa izy rehetra.'
mg1865::mg_18::34::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maty amin''ny indray mipi-maso monja amin''ny mamatonalina ireny; Eny, ringana ny olona ka tsy ao intsony; Ary ny mahery dia lasa tsy esorin-tanana.'
mg1865::mg_18::34::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mason''Andriamanitra dia mijery ny alehan''ny olona, ary mahita ny diany rehetra Izy.'
mg1865::mg_18::34::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy aizina na alim-pito, Izay hieren''ny mpanao ratsy.'
mg1865::mg_18::34::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra tsy mba miandry aloha vao mandinika ny olona Izay tonga hotsaraina eo anatrehany.'
mg1865::mg_18::34::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manorotoro ny olona mahery Izy, na dia tsy manadina aza, ka manangana olon-kafa hisolo azy.'
mg1865::mg_18::34::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa hita amin''izany fa fantany ny asan''ireo, ka dia mamono azy amin''ny alina ho torotoro Izy.'
mg1865::mg_18::34::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tehafiny tanana tahaka ny fanao amin''ny ratsy fanahy ireo* eo imason''ny vahoaka. [*Na: Mamely azy toy ny famely ny ratsy fanahy Izy]'
mg1865::mg_18::34::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nialan''ireo tamin''Andriamanitra ka tsy nitandremany ny lalany akory,'
mg1865::mg_18::34::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny mba hahatonga ny fitarainan''ny malahelo eo anatrehany ka hampandre Azy ny fitarainan''ny ory.'
mg1865::mg_18::34::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangina* Izy, ka iza no mahay manameloka? Ary manafin-tava Izy (ka iza no mahajery Azy?), na amin''ny firenena, na amin''ny olona tsirairay, [*Na: Manome fiadanana]'
mg1865::mg_18::34::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba tsy hanjakan''ny ratsy fanahy, ary tsy ho voafandrika ny vahoaka.'
mg1865::mg_18::34::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa moa mba efa nisy niteny tamin''Andriamanitra va nanao hoe: Efa nanandra-tena* aho ka tsy hanao ratsy intsony; [*Na: nijaly]'
mg1865::mg_18::34::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy hitako mba ampianaro ahy; Raha nanao ratsy aho, dia tsy hanao intsony?'
mg1865::mg_18::34::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa araka ny hevitrao va no hamaliany ny ataon''ny olona, no efa nandà ianao? Fa ianao no mifidy, fa tsy izaho*, koa izay fantatrao no ambarao. [*Na: Moa araka ny hevitrao va no hamaliany ny olona Fa efa nandà, ka dia ianao no tsy maintsy mifidy, fa tsy izaho]'
mg1865::mg_18::34::34:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona manam-panahy hilaza amiko, ary ny olon-kendry izay mihaino ahy hanao hoe:'
mg1865::mg_18::34::35:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miteny tsy amim-pahalalana Joba, ary ny teniny tsy amim-pahendrena.'
mg1865::mg_18::34::36:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hizahan-toetra mandrakariva Joba noho ny famaliana ataony araka ny fanaon''ny ratsy fanahy!'
mg1865::mg_18::34::37:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 34
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ampiany fihaikana koa ny fahotany; Miteha-tanana eto amintsika izy ka manao teny maro ho enti-miady amin''Andriamanitra.'
mg1865::mg_18::35::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
mg1865::mg_18::35::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao va fa marina ny nanaovanao hoe: Ny fahamarinako mihoatra noho ny an''Andriamanitra?'
mg1865::mg_18::35::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ianao: Mahasoa ahy* manao ahoana moa? Ary inona no soa azoko mihoatra noho ny avy amin''ny fahotako? [*Hebreo: anao]'
mg1865::mg_18::35::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no hiteny hamaly anao Mbamin''ny namanao.'
mg1865::mg_18::35::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo ary ny lanitra ka izahao; Ary tsinjovy iry habakabaka, avo loatra iny ka tsy takatrao.'
mg1865::mg_18::35::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manota ianao, moa mahefa inona aminy? Ary raha maro ny fahotanao, mampaninona Azy moa izany?'
mg1865::mg_18::35::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha marina ianao, dia hahazoany inona moa izany? Na inona no horaisiny avy amin''ny tananao?'
mg1865::mg_18::35::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihatra amin''ny olona tahaka anao ihany ny ratsy ataonao; Ary mihatra amin''ny olombelona ihany ny fahamarinanao.'
mg1865::mg_18::35::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny habiazan''ny fampahoriana no itarainan''ny olona; Eny, minananana izy noho ny sandrin''ny mahery,'
mg1865::mg_18::35::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy misy manao hoe: Aiza Andriamanitra, Mpanao ahy, Izay mahatonga fiderana amin''ny alina,'
mg1865::mg_18::35::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manome fahalalana antsika mihoatra noho ny an''ny biby ambonin''ny tany, dia Izay manome fahendrena antsika mihoatra noho ny an''ny voro-manidina?'
mg1865::mg_18::35::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, mitaraina mafy ireo (fa tsy mamaly Izy) noho ny fireharehan''ny ratsy fanahy.'
mg1865::mg_18::35::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitarainam-poana dia tsy mba henoin''Andriamanitra, ary ny Tsitoha tsy mandinika izany.'
mg1865::mg_18::35::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia lazainao fa tsy mahita azy aza ianao, efa mby eo anatrehany ny ady, koa tsy maintsy miandry Azy ianao.'
mg1865::mg_18::35::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha saingy tsy mihatra ny fahatezerany, moa dia tsy fantany tsara koa va ny fihaikana?'
mg1865::mg_18::35::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 35
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba miloa-bava foana anefa Joba ary manao teny maro tsy amim-pahalalana.'
mg1865::mg_18::36::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola nandroso niteny ihany Eliho ka nanao hoe:'
mg1865::mg_18::36::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahareta kely amiko, dia hambarako aminao, fa mbola misy teny holazaina hanamarina an''Andriamanitra.'
mg1865::mg_18::36::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halaiko avy lavitra ny fahalalako, ka hanamarina ny Mpanao ahy aho.'
mg1865::mg_18::36::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy lainga tsy akory ny teniko; Lehilahy tanteraka amin''ny fahalalana no eto aminao.'
mg1865::mg_18::36::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, lehibe Andriamanitra, kanefa tsy mba mamingavinga, lehibe amin''ny herin''ny fahalalana Izy.'
mg1865::mg_18::36::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mitsimbina ny ain''ny ratsy fanahy Izy, fa manome rariny ho an''ny ory.'
mg1865::mg_18::36::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mampiala ny masony amin''ny marina Izy; Eo amin''ny mpanjaka ambonin''ny seza fiandrianany no ampitoerany azy ho mandrakizay, ka dia tafasandratra.'
mg1865::mg_18::36::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha voafatotra amin''ny gadra izy sy voafehy amin''ny tadin''ny fahoriana.'
mg1865::mg_18::36::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ambarany azy ny asany sy ny fahotany, fa efa nanandra-tena izy ireny.'
mg1865::mg_18::36::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia manokatra ny sofiny hihaino fananarana Izy ka mandidy azy hibebaka hiala amin''ny ratsy.'
mg1865::mg_18::36::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mihaino ka manaiky Azy Izy, dia lany amin''ny fiadanana ny androny, ary ny taonany amin''ny fahafinaretana'
mg1865::mg_18::36::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mihaino kosa izy, dia ho voan''ny fiadiana ka ho faty tsy amim-pahalalana.'
mg1865::mg_18::36::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpihatsaravelatsihy* dia mirakitra fahatezerana; Tsy mitaraina izy, na dia afatony aza; [*Na: ny ratsy fanahy]'
mg1865::mg_18::36::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia maty raha mbola tanora izy, eny, afaka ny ainy eo amin''ny olom-betaveta*, [*Dia ny olona mpanolo-tena ho amin''ny fijangajangana ho fanompoan-tsampy;]'
mg1865::mg_18::36::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahorian''ny ory kosa no entin''Andriamanitra mamonjy azy, Ary ny manjo azy no entiny manokatra ny sofiny.'
mg1865::mg_18::36::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ianao aza dia ampialainy amin''ny fahaterena ho amin''ny malalaka izay tsy misy mahatery; Ary ny matavy indrindra no aroso ho eo ambonin''ny latabatrao.'
mg1865::mg_18::36::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha fatra-pikikitra amin''ny adin''ny ratsy fanahy ianao, dia hihazona anao ny ady sy ny fanamelohana*; [*Na: Dia hifanaikaiky ny ady sy ny fanamelohana;]'
mg1865::mg_18::36::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hamporisika anao hiteny ratsy ny fahatezerana, ary aoka tsy hampivily hevitra anao ny halehiben''ny avotra.'
mg1865::mg_18::36::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa hahatonga anao ho ao amin''izay tsy misy fahoriana va ny fitarainanao na izay rehetra tratry ny fahatanjahana?'
mg1865::mg_18::36::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza irinao ny hihavian''ny alina, izay ampialana ny olona amin''ny fitoerany.'
mg1865::mg_18::36::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo, aza mivily ho amin''ny ratsy; Fa saingy ozoim-pahoriana ianao, dia mifidy izany.'
mg1865::mg_18::36::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Andriamanitra miasa amin''ny heriny mampiseho ny fisandratany; Iza no mba mpampianatra tahaka Azy?'
mg1865::mg_18::36::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no efa nandidy Azy ny amin''izay lalan-kalehany? Ary iza no efa nilaza taminy hoe: Efa nanao ratsy Ianao?'
mg1865::mg_18::36::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny hankalaza ny asany, Izay efa nataon''ny olona an-kira.'
mg1865::mg_18::36::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa faly mahita izany ny olona rehetra; Ary jeren''ny zanak''olombelona eny lavitra eny izany.'
mg1865::mg_18::36::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, lehibe Andriamanitra, ka tsy takatry ny saintsika Izy; Ary tsy hita isa ny taonany.'
mg1865::mg_18::36::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mampisavoana ny rano Izy, dia milatsaka ho ranonorana aman-javona izany,'
mg1865::mg_18::36::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay aidin''ny rahona ka alatsany amin''ny olona maro be.'
mg1865::mg_18::36::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, iza moa no mahalala ny amin''ny fivelatry ny rahona sy ny fikotrokotroka ao an-dainy?'
mg1865::mg_18::36::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, mamelatra ny fahazavany eo amboniny Izy ary manao ny fanambanin''ny ranomasina ho firakofany.'
mg1865::mg_18::36::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireny zavatra ireny no itsarany ny firenena sady anomezany hanina betsaka.'
mg1865::mg_18::36::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifono fahazavana ny tanany, ary baikoiny iny mba hahavoa ny fahavalony*; [*Na: Ary baikoiny ny ady sy ny fanamelohana]'
mg1865::mg_18::36::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 36
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fikotrokotrony dia manambara Azy, ary ny omby aman''ondry koa aza milaza ny hihaviany.'
mg1865::mg_18::37::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izany no mampitepotepo ny foko ka mampiemponempona azy hiala amin''ny fitoerany.'
mg1865::mg_18::37::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa dia mihainoa ny fikotrokotroky ny feony sy ny rohona izay mivoaka avy amin''ny vavany.'
mg1865::mg_18::37::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandefa izany ho eny ambanin''ny lanitra rehetra Izy, ary ny helatra* hatramin''ny faran''ny tany. [*Hebreo: fahazavany]'
mg1865::mg_18::37::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manarakaraka izany, dia misy feo mirohondrohona; Mampikotrokotroka ny feon''ny fahalehibiazany Izy, ka rehefa re ny feony, dia tsy sakanany ny helatra.'
mg1865::mg_18::37::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahagaga ny fikotrokotrok''Andriamanitra amin''ny feony; Manao zava-dehibe tsy takatry ny saintsika Izy.'
mg1865::mg_18::37::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny oram-panala baikoiny hoe: Milatsaha eny ambonin''ny tany ianao; Ary toy izany koa ny ranonorana mivatravatra, eny, dia ny ranonorany mivatravatra mafy.'
mg1865::mg_18::37::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampiohona* ny tanan''ny olona rehetra Izy, mba samy hahalala izany ny olona rehetra izay nataony; [*Hebreo: manisy tombo-kase]'
mg1865::mg_18::37::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miditra ao am-piereny koa ny bibidia ka mamitsaka ao an-davany.'
mg1865::mg_18::37::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy any atsimo* ny tadio, ary entin''ny rivotra avy any avaratra** ny hatsiaka. [*Hebreo: efi-trano] [**Hebreo: avy amin''ireo mpanahakahaka]'
mg1865::mg_18::37::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fofonain''Andriamanitra mahamisy ranomandry, ka voageja ny rano malalaka.'
mg1865::mg_18::37::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rahona matevina tambesarany rano, ary ny rahon''ny helatra* dia ampieleziny; [*Hebreo: fahazavany]'
mg1865::mg_18::37::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mihodinkodina araka ny fitarihany azy ireo hanatanteraka izay rehetra andidiany azy eny ambonin''ny tany eran''izao tontolo izao*, [*Na: Eny ambonin''izao tontolo izao ho amin''ny tany]'
mg1865::mg_18::37::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na alatsany ho famaizana raha tokony ho an''ny taniny izany na ho famindram-po kosa*. [*Na: alatsany ho famaizana, na hahasoa ny taniny, na ho famindram-po]'
mg1865::mg_18::37::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa izany, ry Joba; Mijanona, ka mba diniho ny fahagagana ataon''Andriamanitra.'
mg1865::mg_18::37::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao va ny fanamboaran''Andriamanitra ireny sy ny fampitselatselany ny helatry* ny rahony? [*Hebreo: fahazavany]'
mg1865::mg_18::37::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao va ny fihevahevan''ny rahona matevina, dia ny fahagagana avon''Ilay tanteraka amin''ny fahalalana?'
mg1865::mg_18::37::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao izay mahatsiaro ny fitafianao ho mafana, raha migaingaina ny andro azon''ny rivotra avy any atsimo,'
mg1865::mg_18::37::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ianao niara-nanao taminy va, raha namelatra ny habakabaka Izy, izay mitoetra mafy toy ny zavatra manganohano natao an-idina?'
mg1865::mg_18::37::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba ampianaro anay ary izay holazainay aminy; Fa tsy hitanay izay halahatray noho ny aizina,'
mg1865::mg_18::37::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Holazaina aminy va, raha miteny aho? Moa misy olona maniry ho levona* tokoa va? [*Hebreo: miteny ta-hatelina]'
mg1865::mg_18::37::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hita ankehitriny ny mazava, Izay mamirapiratra any amin''ny rahona: Nefa raha mandalo ny rivotra, dia mampisava azy ihany izany.'
mg1865::mg_18::37::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy any avaratra no ihavian''ny mazava mitarehim-bolamena*; Ao amin''Andriamanitra ny voninahitra mahatahotra. [*Hebreo: ihavian''ny volamena]'
mg1865::mg_18::37::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Tsitoha, tsy mahita Azy isika; Izay lehibe amin''ny hery sy ny fitsarana mbamin''ny fahamarinana tanteraka dia tsy mba mampahory*. [*Na: mamaly]'
mg1865::mg_18::37::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 37
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no atahoran''ny olona Azy; Tsy mety mijery izay manao azy ho hendry* Izy. [*Hebreo: ny hendry am-po; na: Tsy misy mahita Azy ny hendry am-po rehetra]'
mg1865::mg_18::38::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny navalin''i Jehovah an''i Joba'
  verse_text: 'Ary teo anatin''ny tafio-drivotra Jehovah dia namaly an''i Joba ka nanao hoe:'
mg1865::mg_18::38::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa izato manao izay hahamaizina ny fisainana amin''ny teny tsy misy fahalalana?'
mg1865::mg_18::38::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misikina ary tahaka ny lehilahy; Fa hanadina anao Aho, ka valio:'
mg1865::mg_18::38::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Taiza ary ianao, fony Aho nanorina ny tany? Ambarao, raha hainao.'
mg1865::mg_18::38::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza ary no nandidy izay ho refiny, raha fantatrao? Ary iza no nanenjana ny famolaina teo aminy?'
mg1865::mg_18::38::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''inona no nanorenana ny vodi-andriny, ary iza no nametraka ny vato fehizorony,'
mg1865::mg_18::38::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha niara-nihira ny kintan''ny maraina, ary nihoby avokoa ireo zanak''Andriamanitra?'
mg1865::mg_18::38::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no nanao varavarana misakana ny ranomasina, raha nibosesika nivoaka avy tany am-bohoka izy,'
mg1865::mg_18::38::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanao ny rahona ho fitafiany Aho ary ny aizim-pito ho fonony,'
mg1865::mg_18::38::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandidy ny ho fetrany sady nanisy hidy sy varavarana'
mg1865::mg_18::38::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nanao hoe: Hatreto no azonao androsoana ka tsy hihoatra, ary eto no hampijanonana ny fisafoaky ny onjanao?'
mg1865::mg_18::38::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatrizay niainanao moa mba efa nandidy ny maraina va ianao? Efa notoroanao ny fitoerany va ny fipoak''andro,'
mg1865::mg_18::38::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba horaisiny ny sisin''ny tany. Ka hakopakopany hiala ny ratsy fanahy?'
mg1865::mg_18::38::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiova tahaka ny tanimanga tombohin-kase ny endriny, ka hiseho tahaka ny lamba misoratra* ny tarehiny, [*Hebreo: fitafiana]'
mg1865::mg_18::38::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hosakanana ny fahazavan''ny ratsy fanahy, ka ho tapaka ny sandry naingaina.'
mg1865::mg_18::38::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa niditra hatrany amin''ny loharanon-dranomasina va ianao, ary efa nandehandeha tany amin''ny fanambanin''ny lalina?'
mg1865::mg_18::38::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa naharihary taminao va ny vavahadin''ny fahafatesana? Ary efa hitanao va ny vavahadin''ny aloky ny fahafatesana?'
mg1865::mg_18::38::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa voadinikao ny hatrany amin''ny fahalalahan''ny tany? Ambarao ary, raha fantatrao izany rehetra izany.'
mg1865::mg_18::38::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ary no lalana ho any amin''ny fonenan''ny mazava? Ary aiza no fitoeran''ny maizina?'
mg1865::mg_18::38::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hitondranao izany ho amin''ny faran''ny alehany, ary ho fantatrao ny lalana ho any an-tranony.'
mg1865::mg_18::38::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, fantatrao mantsy izany, satria efa teraka ianao tamin''izay, ary maro ny isan''ny andronao!'
mg1865::mg_18::38::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa efa niditra tany amin''ny firaketana ny oram-panala va ianao? Ary efa hitanao va ny firaketana ny havandra,'
mg1865::mg_18::38::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay voatahiriko ho amin''ny andro fahoriana, dia ny andro misy ady sy tafika?'
mg1865::mg_18::38::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza moa no lalana izarazarana ny mazava sy ielezan''ny rivotra avy any atsinanana ho ety ambonin''ny tany?'
mg1865::mg_18::38::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no nihady lalan-drano ho an''ny ranonorana mirotsaka be, sy lalan-kaleha ho an''ny helatry ny kotrokorana,'
mg1865::mg_18::38::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handatsaka ranonorana ambonin''ny tany izay tsy itoeran''olona, dia any amin''ny efitra tsy misy mponina,'
mg1865::mg_18::38::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hahavonto ny efitra sy ny tany foana, ary hampitsimoka ny ahitra vao mitsiry?'
mg1865::mg_18::38::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manan-dray va ny ranonorana? Ary iza kosa no miteraka ny ranon''ando?'
mg1865::mg_18::38::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kibon''iza moa no nihavian''ny ranomandry? Ary ny vongam-panala avy amin''ny lanitra, iza no niteraka azy?'
mg1865::mg_18::38::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga mafy toy ny vato ny rano, Ary mitambatra ny fanambonin''ny lalina.'
mg1865::mg_18::38::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahavona ny kofehin''ny Ikotokelimiadilaona va ianao, ary mahavaha ny Telonohorefy?'
mg1865::mg_18::38::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahavoaka ny Mazarota* amin''ny fotoany va ianao? Ary mahatondra ny Bera mbamin''ny zanany va ianao? [*Anaran-kintana; ny Zàdiaka(?)]'
mg1865::mg_18::38::33:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao va ny lalàn''ny lanitra? Ary manendry ny fanapahan''ireny ny tany va ianao?'
mg1865::mg_18::38::34:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahasandratra ny feonao ho amin''ny rahona matevina va ianao, Mba hanafotra anao ny rano mandriaka?'
mg1865::mg_18::38::35:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahay mandefa ny helatra va ianao, ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
mg1865::mg_18::38::36:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena, Ary irery miseho ery an-danitra ho fampisehoana ny fahalalana*? [*Na: Iza no nanisy fahalalana ao am-pon''ny olona? Ary iza no nanome fahalalana ho ao an-tsaina?]'
mg1865::mg_18::38::37:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no manam-pahendrena mahisa ny rahom-potsy manify? Ary iza no mahatankina ny fitoeran-dranon*''ny lanitra, [*Hebreo: siny hoditra]'
mg1865::mg_18::38::38:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitambaran''ny vovoka ho dilatra sy hivonganany ho bainga?'
mg1865::mg_18::38::39:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahay mihaza toha ho an''ny liom-bavy va ianao, sy mahafaka ny fahalianan''ny liona tanora,'
mg1865::mg_18::38::40:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mamitsaka ao amin''ny fitoerany izy ary manotrika ao amin''ny kirihitrala?'
mg1865::mg_18::38::41:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 38
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no manome hanina ny goaika, raha mitaraina amin''Andriamanitra ny zanany ka mirenireny tsy mahita hanina?'
mg1865::mg_18::39::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao va ny fotoana fiterahan''ny osi-dia any amin''ny harambato? Voahevitrao va ny fiterahan''ny dieravavy?'
mg1865::mg_18::39::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahisa ny andro ahatanterahany* va ianao? Ary fantatrao va ny fotoana fiterahany? [*Hebreo: ny volana taperiny]'
mg1865::mg_18::39::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miondrika izy ka teraka, sady alefany ny faharariany.'
mg1865::mg_18::39::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Donga ny zanany, mihalehibe any an''efitra ireny; Mivoaka izy ka tsy mety miverina intsony.'
mg1865::mg_18::39::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no nandefa ny boriki-dia ho karenjy? Ary iza no namaha ny fatoran''ny boriki-dia,'
mg1865::mg_18::39::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nomeko ny tani''hay ho fitoerany ary ny tanin-tsira ho fonenany?'
mg1865::mg_18::39::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ihomehezany ny fitabatabana ao an-tanàna; Tsy ahoany akory ny fiantsoantson''ny mpampandeha;'
mg1865::mg_18::39::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any an-tendrombohitra rehetra any no fihinanany, ary mitady ny zava-maitso rehetra izy.'
mg1865::mg_18::39::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba mety manompo anao va ny ombimanga na handry ao am-pahitrao amin''ny alina?'
mg1865::mg_18::39::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahafatotra ny ombimanga amin''ny mahazaka ho ao am-bavasanao va ianao? Na mety manaraka anao handravona bainga any an-dohasaha va izy?'
mg1865::mg_18::39::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azonao itokiana va izy satria lehibe ny heriny? Ary havelanao hataony va ny asanao?'
mg1865::mg_18::39::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azonao itokiana hitondra ny varinao mody va izy sy hanangona izany ho eo am-pamoloanao?'
mg1865::mg_18::39::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikopakopaka noho ny fifaliana ny elatry ny ostritsa; Nefa mahalemy fanahy azy va ny elany sy ny volony?'
mg1865::mg_18::39::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, fa mandao ny atodiny ao amin''ny tany izy ka mamela azy ho afanain''ny vovoka,'
mg1865::mg_18::39::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ahiny izay ho voaporitry ny tongotra ireo. Na ho voahitsaky ny bibi-dia.'
mg1865::mg_18::39::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tia ny zanany izy fa ataony hoatra ny tsy azy ireny; Efa very foana izay nisasarany, nefa tsy ahoany akory izany;'
mg1865::mg_18::39::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nampanadinoin''Andriamanitra ny fahendrena izy, ary Tsy nomeny anjara fahalalana.'
mg1865::mg_18::39::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mikopakopak''elatra toa hanidina izy, dia ihomehezany ny soavaly sy ny mpitaingina azy.'
mg1865::mg_18::39::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa manome hery ny soavaly va ianao, na manarona vombo mihofahofa ny vozony?'
mg1865::mg_18::39::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahay mampitsipika azy tahaka ny valala va ianao? Mahatsiravina ny hamafin''ny fiefonefony!'
mg1865::mg_18::39::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihehy ao amin''ny lohasaha izy ka mifalifaly noho ny heriny; Mandroso hanetra ny ady* izy. [*Hebreo: fiadiana]'
mg1865::mg_18::39::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihomehy ny tahotra izy, fa tsy mety mivadi-po. Ary tsy mianotra amin''ny sabatra.'
mg1865::mg_18::39::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifioka eny amboniny ny zana-tsipïka* sy ny lefona manelatselatra ary ny lefom-pohy. [*Hebreo: tranon-jana-tsipïka]'
mg1865::mg_18::39::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miriotra mafy* amin''ny fahavinirana sy ny fahatezerana izy ka tsy mety mijanona intsony, rehefa maneno ny anjomara**. [*Hebreo: Mitelina ny tany] [**Na: Tsy mino izy fa feon''ny anjomara izany]'
mg1865::mg_18::39::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na oviana na oviana no anenoan''ny anjomara dia mihiaka izy. Ary manimbolo ny ady izy, raha mbola lavitra, dia ny akoralava sy ny fitabataban''ny manamboninahitra.'
mg1865::mg_18::39::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahendrenao va no mampanidina ny hitsikitsika sy mampamelatra ny elany hianatsimo?'
mg1865::mg_18::39::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny didinao va no iakaran''ny voromahery sy anaovany ny akaniny eny an-dringiringy?'
mg1865::mg_18::39::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny amin''ny harambato no itoerany sy anaovany ny akaniny, dia eo an-tampon''ny harambato sy ao amin''ny fiarovana.'
mg1865::mg_18::39::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any no itazanany remby; Mahatsinjo lavitra ny masony.'
mg1865::mg_18::39::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 39
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsentsitra ra ny zanany, Ary izay itoeran''ny faty, dia any izy.'
mg1865::mg_18::40::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny naneken''i Joba ny fahadisoan-keviny, sy ny navalin''i Jehovah azy'
  verse_text: 'Ary Jehovah mbola namaly an''i Joba nanao hoe:'
mg1865::mg_18::40::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiady amin''ny Tsitoha va io mpanadidy Azy io? Aoka ny mananatra an''Andriamanitra no hamaly!'
mg1865::mg_18::40::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joba dia namaly an''i Jehovah ka nanao hoe:'
mg1865::mg_18::40::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsinontsinona, aho ka inona no azoko avaly Anao? Hitampim-bava aho izao.'
mg1865::mg_18::40::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa niteny indray mandeha aho, ka tsy hamaly intsony; Eny, indroa aza, fa tsy hanampy teny intsony aho.'
mg1865::mg_18::40::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly an''i Joba teo amin''ny tafio-drivotra Jehovah ka nanao hoe:'
mg1865::mg_18::40::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misikina tahaka ny lehilahy; Fa hanadina anao Aho, ka ampahafantaro Aho:'
mg1865::mg_18::40::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanaisotra ny rariny amiko va ianao? Hanameloka Ahy va ianao, mba hanamarina ny tenanao kosa?'
mg1865::mg_18::40::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manan-tsandry tahaka ny an''Andriamanitra va ianao? Ary mahay mampikotrokotro-peo tahaka ny Azy va ianao?'
mg1865::mg_18::40::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miravaha fahalehibiazana sy tabiha ianao, ary mitafia famirapiratana sy voninahitra;'
mg1865::mg_18::40::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alefaso ny fahatezeranao mirehitra; Ary jereo ny avonavona rehetra, ka ampietreo.'
mg1865::mg_18::40::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, jereo ny avonavona rehetra, ka aongàny; Ary apotrahy eo amin''ny fitoerany ihany ny ratsy fanahy.'
mg1865::mg_18::40::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asitriho ao amin''ny vovoka avokoa izy rehetra; Sarony ao amin''ny fiafenana ny tavany.'
mg1865::mg_18::40::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho kosa dia hidera anao, Satria mahavonjy anao ny tananao ankavanana.'
mg1865::mg_18::40::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! jereo ange ny behemota*, izay nataoko tahaka ny nanaovako anao ihany**: Mihinana ahitra tahaka ny omby izy. [*hipopotamosy] [**Na: ho eo aminao]'
mg1865::mg_18::40::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, eo amin''ny valahany ny heriny, ary eo amin''ny ozatra amin''ny kibony ny tanjany.'
mg1865::mg_18::40::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henjaniny ny rambony ho tahaka ny hazo sedera; Mifaniditriditra ny ozatra amin''ny feny'
mg1865::mg_18::40::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taolany dia tahaka ny fantsom-barahina, eny, tahaka ny anja-by ny taolany.'
mg1865::mg_18::40::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voalohany amin''ny asan*''Andriamanitra izy; Ny Mpanao azy no nanome sabatra azy. [*Hebreo: lalan'']'
mg1865::mg_18::40::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamoaka hanina ho azy ny tendrombohitra, izay ilalaovan''ny bibi-dia rehetra;'
mg1865::mg_18::40::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo ambanin''ny hazo lota no andriany, any am-pierena anaty zozoro sy fotaka.'
mg1865::mg_18::40::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manalokaloka azy ny hazo lota; Ary ny hazomalahelo eny amoron''ny ony no manodidina azy'
mg1865::mg_18::40::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, na dia maria aza ny ony, tsy manahy izy; Matoky izy, na dia misy Jordana migorodana amin''ny vavany aza.'
mg1865::mg_18::40::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa misy mahasambotra azy va, raha mihiratra ny masony? Raha azon''ny fandrika izy, misy mahatsindrona ny orony va?'
mg1865::mg_18::40::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahasarika ny mamba* amin''ny farango va ianao, na mahafatotra ny lelany amin''ny mahazaka? [*Hebreo: leviatana]'
mg1865::mg_18::40::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahisy tady zozoro amin''ny orony va ianao, na mahaboroaka ny valanoranony amin''ny fintana?'
mg1865::mg_18::40::27:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifon-jato amin''arivo aminao va izy, na hanao teny malefaka aminao?'
mg1865::mg_18::40::28:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao fanekena aminao va izy? Azonao alaina ho andevonao mandrakizay va izy?'
mg1865::mg_18::40::29:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hilalao azy tahaka ny filalao voron-kely va ianao? Ary hamatotra azy ho an''ny zazavavy ao aminao va ianao?'
mg1865::mg_18::40::30:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataon''ny mpaka hazandrano varotra va izy, ka hotsinjarainy amin''ny mpandranto?'
mg1865::mg_18::40::31:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahafeno lefom-pohy ny hodiny va ianao, na firombaka amin''ny lohany?'
mg1865::mg_18::40::32:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 40
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atehefo aminy ange ny tananao; Raha tsaroanao ny ady, dia tsy hanindroa intsony ianao.'
mg1865::mg_18::41::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, foana ny fihendrena azy; Tsy mahakivy va na dia ny fijery azy aza?'
mg1865::mg_18::41::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy sahy manao vi-very hanaitra azy; Koa iza kosa no mahajanona eo anatrehako?'
mg1865::mg_18::41::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no nanome Ahy aloha mba hamaliako azy? Ny eny ambanin''ny lanitra rehetra dia Ahy avokoa.'
mg1865::mg_18::41::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mbola hangina Aho ny amin''ny momba ny tenany sy ny heriny ary ny fahatsaran''ny endriny.'
mg1865::mg_18::41::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahasonga ny fitafiany anoloany? Na iza no sahy hiditra ao amin''ny nifiny roa sosona?'
mg1865::mg_18::41::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahasokatra ny varavaran''ny tavany? Mahatsiravina ny nifiny manodidina!'
mg1865::mg_18::41::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Reharehany ny faharaoraon''ny kirany*, mihidy avokoa toy ny voapetaka mafy amin''ny tombo-kase ireo; [*Hebreo: ampingany]'
mg1865::mg_18::41::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikirindro ireo, ka tsy azon''ny rivotra idirana eo anelanelany.'
mg1865::mg_18::41::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifanindry lany ireo sady mifaniditra ka tsy azo sarahina,'
mg1865::mg_18::41::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fieviny dia mampamirapiratra fahazavana, ary ny masony dia tahaka ny hodimason''ny maraina.'
mg1865::mg_18::41::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lelafo no mivoaka avy amin''ny vavany; Kilalaon''afo no mipariaka avy aminy.'
mg1865::mg_18::41::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavorony dia ivoahan''ny setroka, tahaka ny avy amin''ny vilany mangotraka, na amin''ny fahandroana*. [*Na: afon-kerana]'
mg1865::mg_18::41::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fofonainy mampirehitra arina, ary misy lelafo mivoaka avy amin''ny vavany.'
mg1865::mg_18::41::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vozony no itoeran''ny hery; Ary mibitaka eo alohany ny fampahatahorana.'
mg1865::mg_18::41::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivalombalona ny hotraka amin''ny tenany; Mafy ireny ka tsy azo endahana.'
mg1865::mg_18::41::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mafy tahaka ny vato ny fony; Eny, mafy tahaka ny vato fikosoham-bary.'
mg1865::mg_18::41::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitsangana izy, dia raiki-tahotra ny mahery; Eny, toran-kovitra ireo ka tsy mahavoa.'
mg1865::mg_18::41::18:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mamely azy amin''ny sabatra dia tsy mahalaitra, na amin''ny lefom-pohy, na ny firombaka, na ny zana-tsipïka.'
mg1865::mg_18::41::19:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataony toy ny mololo ny vy, ary toy ny hazo momoka ny varahina.'
mg1865::mg_18::41::20:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mampandositra azy ny zana-tsipïka; Ataony ho toy ny vodivary ny vaton''antsamotady.'
mg1865::mg_18::41::21:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataony ho toy ny vodivary koa ny langilangy; Ihomehezany ny fanetsehana ny lefona.'
mg1865::mg_18::41::22:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny takibany dia tahaka ny tavim-bilany maranitra; Mamelatra fivelezam-bary maranitra eo amin''ny fotaka izy.'
mg1865::mg_18::41::23:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampandevy ny lalina ho tahaka ny ao am-bilany izy; Manao ny ranomasina ho tahaka ny vilany misy menaka manitra izy.'
mg1865::mg_18::41::24:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampahazava ny lalany eo aoriany izy. Ataon''ny olona ho toy ny volo fotsy ny lalina.'
mg1865::mg_18::41::25:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy tahaka azy eny ambonin''ny tany, izay voaforona tsy hahalala tahotra.'
mg1865::mg_18::41::26:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 41
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny avo rehetra jereny avokoa; Mpanjakan''ny bibi-dia rehetra izy'
mg1865::mg_18::42::1:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny farany nataon''i Joba, sy ny nanomezan''Andriamanitra azy fiadanana indray'
  verse_text: 'Ary Joba dia namaly an''i Jehovah ka nanao hoe:'
mg1865::mg_18::42::2:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro fa hainao avokoa ny zavatra rehetra, ary tsy azo ferana ny fisainanao.'
mg1865::mg_18::42::3:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahatakona ny fisainanao amin''ny tsy fahalalana? Koa dia nilaza izay tsy fantatro aho, dia zava-mahagaga loatra amiko, izay tsy takatry ny saiko.'
mg1865::mg_18::42::4:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifona aminao aho, mihainoa, fa hiteny aho; Hanontany Anao aho, ka ampahafantaro.'
mg1865::mg_18::42::5:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrenesan''ny sofina ihany no nandrenesako Anao; Fa ankehitriny izao kosa dia ny masoko no mahita Anao;'
mg1865::mg_18::42::6:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia miaiky sy mibebaka Eto amin''ny vovoka sy ny lavenona aho.'
mg1865::mg_18::42::7:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voalazan''i Jehovah tamin''i Joba izany teny izany, dia hoy koa Izy tamin''i Elifaza Temanita: Mirehitra aminao sy ny sakaizanao roa lahy ny fahatezerako satria tsy mba marina tahaka ny filàzan''i Joba mpanompoko ny filàzanareo Ahy.'
mg1865::mg_18::42::8:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny makà vantotr''ombilahy fito sy ondrilahy fito ho anareo, ary mankanesa ao amin''i Joba mpanompoko, ka manatera fanatitra dorana ho anareo; ary Joba mpanompoko no hifona ho anareo, fa izy no hankasitrahako, fandrao hamaly anareo araka ny fahadalanareo Aho, satria tsy marina tahaka ny filàzan''i Joba mpanompoko ny filàzanareo Ahy.'
mg1865::mg_18::42::9:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Elifaza Temanita sy Bildada Sohita ary Zofara Namatita ka nanao araka izay nandidian''i Jehovah azy; ary Jehovah dia nankasitraka an''i Joba.'
mg1865::mg_18::42::10:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nampody ny fiadanan''i Joba, raha nivavaka ho an''ny sakaizany izy, ka dia nanome azy indroa toraka izay nananany fahiny Izy.'
mg1865::mg_18::42::11:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy ny rahalahiny rehetra sy ny anabaviny rehetra ary ny olona rehetra izay fantany fahiny ka nankao aminy ary niara-nihinana taminy tao an-tranony ary nitsapa alahelo sady nampionona azy noho ny fahoriana rehetra izay efa nahatran''i Jehovah taminy; ary samy nanome azy vakim-bola* iray avy sy kavim-bolamena iray avy izy rehetra. [*Hebreo: kesita;]'
mg1865::mg_18::42::12:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah nitahy ny niafaran''i Joba mihoatra noho ny voalohany ka nanana ondry aman''osy efatra arivo amby iray alina sy rameva enina arivo sy omby roa arivo ary borikivavy arivo izy.'
mg1865::mg_18::42::13:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanan-janaka fito lahy sy vavy telo koa izy,'
mg1865::mg_18::42::14:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ny anaran''ny zokiny nataony hoe Jemima, ary ny anaran''ny manarakaraka Kezia, ary ny anaran''ny faravavy Kerena-hapoka.'
mg1865::mg_18::42::15:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy vehivavy tsara tarehy tahaka ny zanakavavin''i Joba hita tany amin''ny tany rehetra, ary niara-nomen-drainy lova tamin''ny anadahiny izy.'
mg1865::mg_18::42::16:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola velona efa-polo amby zato taona Joba taorian''izany ka nahita ny zananilahy sy ny zafiny ka hatramin''ny zafin-dohaliny aza.'
mg1865::mg_18::42::17:
  verse_version: mg1865
  verse_book: mg_18
  verse_chapter: 42
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia maty Joba, rehefa tratrantitra ka ela niainana*. [*Hebreo: voky andro]'
