mg1865::mg_47::1::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana sy fisaorana nataon''i Paoly noho ny nampiononan''Andriamanitra azy. Ny amin''ny nahasampona an''i Paoly tsy hankany Makedonia, sy hafatra ny amin''ny handraisana ilay efa nesorina, ary fisaoran''i Paoly an''Andriamanitra noho ny nitahiany ny tori-teniny'
  verse_text: 'Paoly, Apostolin''i Kristy Jesoa noho ny sitrapon''Andriamanitra, ary Timoty rahalahy, mamangy ny fiangonan''Andriamanitra izay any Korinto mbamin''ny olona masina rehetra eran''i Akaia:'
mg1865::mg_47::1::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesoa Kristy Tompo.'
mg1865::mg_47::1::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Andriamanitra, Rain''i Jesoa Kristy Tompontsika, Rain''ny famindram-po sady Andriamanitry ny fampiononana rehetra,'
mg1865::mg_47::1::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampionona anay amin''ny fahorianay rehetra mba hahaizanay mampionona izay rehetra mitondra fahoriana kosa, anin''ny fampiononana izay ampiononan''Andriamanitra anay.'
mg1865::mg_47::1::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa araka ny haben''ny fijalian''i Kristy mihatra aminay no haben''ny fampiononana anay kosa amin''ny alalan''i Kristy.'
mg1865::mg_47::1::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ampahorina izahay, dia ho fampiononana sy famonjena anareo izany; ary raha ampiononina izahay, dia ho fampiononana anareo izany, ka miasa amin''ny fiaretanareo fahoriana mitovy indrindra amin''izay entinay.'
mg1865::mg_47::1::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miorina tsara ny fanantenanay anareo, satria fantatray fa tahaka ny iombonanareo ny fahoriana no iombonanareo ny fampiononana koa.'
mg1865::mg_47::1::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin''ny fahoriana izay nanjo anay tany Asia, fa novesarana indrindra mihoatra noho ny zakanay izahay, ka dia efa nafoinay na dia ny ainay aza;'
mg1865::mg_47::1::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, tsy nanampo izay ho velona intsony izahay, mba tsy hitokianay amin''ny tenanay, fa amin''Andriamanitra, Izay manangana ny maty ihany.'
mg1865::mg_47::1::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no nahafaka anay tamin''izao fahafatesana lehibe izao, ary mbola hanafaka ihany; eny, Izy no antenainay fa mbola hanafaka anay koa,'
mg1865::mg_47::1::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria ianareo koa miara-miasa ho anay amin''ny fivavahanareo mba hisaoran''ny maro ny aminay noho ny fahasoavana azonay tamin''ny nataon''ny maro.'
mg1865::mg_47::1::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no ataonay ho voninahitray: ny fieritreretanay no vavolombelona fa tamin''ny fahamasinana sy ny fahadiovam-po avy amin''Andriamanitra, tsy tamin''ny fahendren''ny nofo, fa tamin''ny fahasoavan''Andriamanitra, no nitondranay tena teo amin''izao tontolo izao, mainka fa teo aminareo.'
mg1865::mg_47::1::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy manoratra teny hafa aminareo izahay, afa-tsy izay vakinareo na izay fantatrareo; ary manantena aho fa mbola ho fantatrareo ihany hatramin''ny farany aza,'
mg1865::mg_47::1::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'toy ny efa fantapantatrareo ihany fa voninahitrareo izahay, dia tahaka anareo kosa no voninahitray amin''ny andron''i Jesoa Tompontsika.'
mg1865::mg_47::1::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izao fahatokiana izao dia nikasa hankaty aminareo aloha aho (mba hahazoanareo soa fanindroany),'
mg1865::mg_47::1::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hankany Makedonia aho, raha avy aty aminareo, ary dia vao hiverina ho aty aminareo indray raha avy any Makedonia, ary mba haterinareo ho any Jodia.'
mg1865::mg_47::1::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha nikasa izany aho, moa nanao kitoatoa va aho? Ary izay zavatra kasaiko, moa kasaiko araka ny nofo va, mba hanaovako eny eny foana, sy tsia tsia foana?'
mg1865::mg_47::1::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mahatoky koa Andriamanitra, ny teninay taminareo dia tsy eny sy tsia;'
mg1865::mg_47::1::19:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny Zanak''Andriamanitra, dia Jesoa Kristy, Izay notorinay teo aminareo, dia izaho sy Silasy ary Timoty, dia tsy eny sy tsia, fa ao aminy dia eny ihany.'
mg1865::mg_47::1::20:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na firy na firy ny teny fikasan''Andriamanitra, dia ao aminy ny eny, ary amin''ny alalany koa ny Amena, ho voninahitr''Andriamanitra amin''ny ataonay.'
mg1865::mg_47::1::21:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izay mampitoetra anay mbaminareo ao amin''i Kristy sady nanosotra antsika dia Andriamanitra,'
mg1865::mg_47::1::22:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanisy tombo-kase antsika koa ka nanome ny Fanahy ho santatra ato am-pontsika.'
mg1865::mg_47::1::23:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho miantso an''Andriamanitra ho vavolombelona ny amin''ny fanahiko, fa ny fialàko nenina aminareo ihany no tsy mbola nankanesako taty Korinto.'
mg1865::mg_47::1::24:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy mihambo ho tompon''ny finoanareo izahay, fa mpiara-miasa hampandroso ny fifalianareo, satria finoana no itoeranareo.'
mg1865::mg_47::2::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ninia toy izao tato am-poko aho, dia ny tsy hankaty aminareo indray amin''alahelo.'
mg1865::mg_47::2::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mampalahelo anareo aho, iza moa no mampifaly ahy, afa-tsy ilay nampalaheloviko ihany?'
mg1865::mg_47::2::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanoratra izany indrindra aho, fandrao, rehefa tonga aho, dia hahazo alahelo amin''izay tokony hifaliako, satria matoky anareo rehetra aho, fa ny fifaliako dia anareo rehetra koa.'
mg1865::mg_47::2::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny haben''ny fahoriana sy ny alahelon''ny foko no nanoratako taminareo tamin''ny ranomaso be, tsy ny hampalahelovana anareo, fa ny mba hahafantaranareo ny fitiavana izay itiavako anareo indrindra.'
mg1865::mg_47::2::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nisy efa nampalahelo, dia tsy nampalahelo ahy ihany izy (nefa tsy ta-hanao teny mafy loatra aho), fa mba nampalahelo anareo rehetra koa.'
mg1865::mg_47::2::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampy ho amin''izany olona izany ny fampijaliana nataon''ny maro,'
mg1865::mg_47::2::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia aleo mamela heloka sy mampifaly azy kosa ianareo, fandrao dia resin*''ny fitomboan''alahelo izany olona izany. [*Grika: atelin'']'
mg1865::mg_47::2::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mananatra anareo aho mba hekenareo horaisina tsara amin''ny fitiavana izy.'
mg1865::mg_47::2::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany koa no nanoratako, mba ho fantatro izay toetrareo, na manaiky amin''ny zavatra rehetra ianareo, na tsia.'
mg1865::mg_47::2::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay avelanareo heloka dia mba avelako heloka koa; ary izaho anefa, raha nisy heloka navelako, dia noho ny aminareo no namelako azy teo imason*''i Kristy, [*Na: nisolo anay]'
mg1865::mg_47::2::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao ho resin''ny fitak''i Satana isika, fa fantatsika ny hafetseny.'
mg1865::mg_47::2::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Troasy hitory ny filazantsaran''i Kristy aho, ka novohana varavarana ao amin''ny Tompo,'
mg1865::mg_47::2::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy tafandry ny fanahiko, satria tsy nahita an''i Titosy rahalahiko aho; fa nanao veloma ny olona aho, dia niala teo nankany Makedonia.'
mg1865::mg_47::2::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isaorana anie Andriamanitra, Izay mitondra anay mandrakariva ao amin''i Kristy toy ny fanaon''izay avy nandresy, ka dia ampisehoany ny hanitry ny fahalalana Azy eny tontolo eny izahay.'
mg1865::mg_47::2::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hanitr''i Kristy ho an''Andriamanitra izahay amin''izay hovonjena sy izay ho very:'
mg1865::mg_47::2::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny sasany dia hanitra avy amin''ny fahafatesana ho amin''ny fahafatesana; fa amin''ny sasany kosa dia hanitra avy amin''ny fiainana ho amin''ny fiainana. Koa iza moa no antonona ho amin''izany zavatra izany?'
mg1865::mg_47::2::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba toy ny maro izay manatsatso ny tenin''Andriamanitra hahazoam-bola izahay; fa toy ny amin''ny fahadiovam-po kosa, dia avy amin''Andriamanitra sady eo anatrehan''Andriamanitra no itenenanay ao amin''i Kristy.'
mg1865::mg_47::3::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny voninahitra momba ny raharaha nanendrena ny Apostoly, sy ny fihoaran''izay noho ny voninahitry ny lalàna'
  verse_text: 'Moa midera tena indray va izahay, sa toy ny sasany ka mila epistily filazan-tsoa anay ho aminareo, na avy aminareo?'
mg1865::mg_47::3::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no epistilinay voasoratra ato am-ponay sady fantatry sy vakin''ny olona rehetra;'
mg1865::mg_47::3::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, aseho ho epistilin''i Kristy izay entinay* ianareo, tsy nosoratana tamin''ny ranomainty anefa, fa tamin''ny Fanahin''Andriamanitra velona, tsy teo amin''izay tena vato fisaka, fa teo amin''izay vato fisaka nofo, dia ny fo. [*Na: soratanay; Grika: anompoanay]'
mg1865::mg_47::3::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manana izany fahatokiana izany ny amin''Andriamanitra izahay amin''ny alalan''i Kristy.'
mg1865::mg_47::3::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy mihambo hanana fahaleovana avy aminay hihevitra na amin''inona na amin''inona izahay; fa ny fahaleovanay dia avy amin''Andriamanitra,'
mg1865::mg_47::3::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay efa nampahaleo anay koa ho mpanompo amin''izay fanekena vaovao, nefa tsy amin''ny soratra, fa amin''ny Fanahy; fa ny soratra mahafaty, fa ny Fanahy no mahavelona.'
mg1865::mg_47::3::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny fanompoana nitondra fahafatesana aza, izay voasoratra teo amin''ny vato, no nisy voninahitra, ka ny Zanak''Isiraely tsy nahabanjina ny tavan''i Mosesy noho ny voninahitry ny tavany izay nihalevona,'
mg1865::mg_47::3::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mainka hisy voninahitra ny fanompoana omban''ny Fanahy?'
mg1865::mg_47::3::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nisy voninahitra ny fanompoana nitondra ny fanamelohana, mainka hanan-tombom-boninahitra ny fanompoana mitondra ny fahamarinana.'
mg1865::mg_47::3::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nisy voninahitra aza dia tsy manana voninahitra kosa amin''izao noho ny voninahitra izay manan-tombo.'
mg1865::mg_47::3::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny nilevona aza nisy voninahitra, mainka fa ny mitoetra no misy voninahitra.'
mg1865::mg_47::3::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, satria manana izany fanantenana izany izahay, dia sahy tokoa,'
mg1865::mg_47::3::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy tahaka an''i Mosesy, izay nanarona ny tavany tamin''ny fisalobonana, mba tsy hibanjinan''ny Zanak''Isiraely ny faran''izay nihalevona;'
mg1865::mg_47::3::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa donto ny sainy; fa ambaraka androany dia mbola tsy nesorina ihany izany fisalobonana izany, raha vakina ny tenin''ny fanekena taloha, satria ao amin''i Kristy ihany no anesorana izany.'
mg1865::mg_47::3::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy fisalobonana manarona ny fony ambaraka androany, raha vakina ny tenin''i Mosesy.'
mg1865::mg_47::3::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: '2022-08-10T06:24:03+0000'
  verse_title: null
  verse_text: 'Kanefa rehefa miverina amin''ny Tompo izy, dia hesorina ihany ny fisalobonana.'
mg1865::mg_47::3::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo izany Fanahy izany; ary izay itoeran''ny Fanahin''ny Tompo no itoeran''ny fahafahana.'
mg1865::mg_47::3::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika rehetra kosa amin''ny tava tsy misarona dia mijery ny voninahitry ny Tompo toy ny amin''ny fitaratra*, ka ovana hahazo izany endrika izany indrindra avy amin''ny voninahitra ka ho amin''ny voninahitra, toy ny avy amin''ny Tompo, dia ny Fanahy. [*Na: Dia tahaka ny fitaratra tarafin''ny voninahitry ny Tompo]'
mg1865::mg_47::4::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, satria manana izany fanompoana izany izahay, araka ny nahazoanay famindram-po, dia tsy ketraka.'
mg1865::mg_47::4::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nolavinay ny zavatra takona mahamenatra, ka tsy mandeha amin''ny fihendrena, na manatsatso ny tenin''Andriamanitra izahay; fa amin''ny fanehoana ny marina no ideranay tena amin''ny fieritreretan''ny olona rehetra eo imason''Andriamanitra.'
mg1865::mg_47::4::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miafina ny filazantsaranay, dia miafina amin''izay ho very izany,'
mg1865::mg_47::4::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nohajambain''ny andriamanitr''izao tontolo izao, dia ny sain''ny tsy mino, mba tsy hiposahan''ny fahazavan''ny filazantsaran''ny voninahitr''i Kristy, Izay endrik''Andriamanitra.'
mg1865::mg_47::4::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny tenanay no torinay, Fa Kristy Jesoa Tompo, ary izahay mpanomponareo noho ny amin''i Jesoa.'
mg1865::mg_47::4::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra, izay nandidy hoe: Aoka ny mazava hahazava ao amin''ny maizina, no nampahazava ny fonay ho amin''ny fahazavan*''ny fahalalana ny voninahitr''Andriamanitra eo amin''ny tavan''i Jesoa Kristy. [*Na: hampisehoana]'
mg1865::mg_47::4::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manana izao rakitra izao amin''ny vilany tany izahay, mba ho an''Andriamanitra ny halehiben''ny hery, fa tsy ho avy aminay.'
mg1865::mg_47::4::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voageja manodidina izahay, nefa tsy tery; very hevitra, nefa tsy mamoy fo;'
mg1865::mg_47::4::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'enjehina, nefa tsy nafoy, potraka, nefa tsy maty;'
mg1865::mg_47::4::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitondra ny fahafatesan*''i Jesoa mandrakariva ao amin''ny tena izahay, mba haseho ao amin''ny tenanay koa ny fiainan''i Jesoa. [*Grika: ny famonoanana an'']'
mg1865::mg_47::4::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay izay velona dia atolotra ho amin''ny fahafatesana mandrakariva noho ny amin''i Jesoa, mba haseho ao amin''ny nofonay mety maty koa ny fiainan''i Jesoa.'
mg1865::mg_47::4::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny fahafatesana no miasa ao aminay, fa ny fiainana kosa ao aminareo.'
mg1865::mg_47::4::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria manana izany fanahin''ny finoana izany indrindra izahay, araka ny voasoratra hoe: Nino aho, ka dia niteny (Salamo 116:10), dia mino koa izahay ka miteny;'
mg1865::mg_47::4::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatray fa Izay nanangana an''i Jesoa Tompo no hanangana anay koa miaraka aminareo.'
mg1865::mg_47::4::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zavatra rehetra dia natao noho ny aminareo, mba hitomboan''ny fisaorana ho voninahitr''Andriamanitra noho ny fitombon''ny fahasoavana amin''ny maro.'
mg1865::mg_47::4::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ketraka izahay; fa na dia mihalevona aza ny toetray ivelany, dia havaozina isan''andro isan''andro kosa ny toetray* anatiny. [*Ny olonay]'
mg1865::mg_47::4::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahorianay maivana, izay vetivety foana, dia mainka miasa fatratra indrindra ka mahatanteraka voninahitra mavesatra maharitra mandrakariva ho anay,'
mg1865::mg_47::4::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha tsy mijery ny hita izahay, fa ny tsy hita; fa ny hita dia ho vetivety foana, fa ny tsy hita no haharitra mandrakizay.'
mg1865::mg_47::5::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatsika fa raha ravana ny trano-laintsika ety an-tany, dia manana izay voarafitr''Andriamanitra isika, dia trano tsy nataon-tanana izay maharitra mandrakizay any an-danitra.'
mg1865::mg_47::5::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary misento ao anatin''ity isika ka maniry indrindra hitafy ny tranontsika izay avy any an-danitra koa;'
mg1865::mg_47::5::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ho hita mitafy isika, fa tsy mba mitanjaka.'
mg1865::mg_47::5::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika izao amin''izao lay izao dia misento noho ny mavesatra antsika, satria tsy tiantsika ny hendahana, fa ny mba hotafiana koa, mba hatelin''ny fiainana ny mety maty.'
mg1865::mg_47::5::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izay efa namboatra antsika ho amin''izany indrindra dia Andriamanitra, Izay efa nanome antsika ny santatry ny Fanahy.'
mg1865::mg_47::5::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa matoky mandrakariva isika, ka fantatsika fa raha mitoetra eo amin''ny tena, dia tsy mitoetra any amin''ny Tompo'
mg1865::mg_47::5::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa finoana no andehanantsika, fa tsy fahitana)'
mg1865::mg_47::5::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, matoky isika, ka aleontsika ny tsy hitoetra ao amin''ny tena, fa ny hitoetra any amin''ny Tompo.'
mg1865::mg_47::5::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia ataontsika ho voninahitsika ny mba hankasitrahany antsika, na mitoetra, na tsy mitoetra.'
mg1865::mg_47::5::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika rehetra dia samy tsy maintsy ho hita toetra miharihary eo amin''ny fitsaran''i Kristy, mba handraisan''ny olona rehetra izay zavatra nataon''ny tenany, dia araka izay nataony, na tsara na ratsy.'
mg1865::mg_47::5::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, satria fantatsika ny fahatahorana ny Tompo, dia ny olona no ampanekenay, fa amin''Andriamanitra, kosa dia efa voaseho rahateo izahay, ary manantena aho fa voaseho ao amin''ny fieritreretanareo koa.'
mg1865::mg_47::5::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy midera tena indray aminareo izahay, fa manome anareo izay ho reharehanareo ny aminay, mba hisy havalinareo izay mirehareha ny amin''ny miseho* ihany, fa tsy amin''ny fo. [*Grika: tava]'
mg1865::mg_47::5::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha very saina izahay, dia ho an''Andriamanitra; fa raha tsy very saina izahay, dia ho anareo.'
mg1865::mg_47::5::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fitiavan''i Kristy no manery anay, satria izao no hevitray: maty ny Anankiray hamonjy ny olona rehetra, ka dia maty koa izy rehetra;'
mg1865::mg_47::5::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary maty hamonjy ny olona rehetra Izy, mba tsy ho velona ho an''ny tenany intsony izay velona, fa ho an''izay efa maty sy nitsangana hamonjy azy.'
mg1865::mg_47::5::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tsy mahalala olona intsony araka ny nofo isika; eny, na dia nahafantatra an''i Kristy araka ny nofo aza isika, ankehitriny dia tsy fantatsika araka izany intsony Izy.'
mg1865::mg_47::5::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha misy olona ao amin''i Kristy, dia olom-baovao izy; efa lasa ny zavatra taloha, indreo, efa tonga vaovao ireo.'
mg1865::mg_47::5::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany rehetra izany dia avy amin''Andriamanitra, Izay nampihavana antsika taminy amin''ny alalan''i Kristy sady nanome anay ny fanompoana fampihavanana,'
mg1865::mg_47::5::19:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao : Andriamanitra ao amin''i Kristy no nampihavana izao tontolo izao taminy ka tsy nanisa ny fahadisoany; ary efa napetrany aminay ny teny fampihavanana.'
mg1865::mg_47::5::20:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia iraka* solon''i Kristy izahay, toa an''Andriamanitra mampangataka anay aminareo, solon''i Kristy izahay ka mangataka indrindra aminareo hoe: mihavàna amin''Andriamanitra anie ianareo. [*Grika: ambasadôro]'
mg1865::mg_47::5::21:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy nahalala ota dia efa nataony ota hamonjy antsika, mba ho tonga fahamarinan''Andriamanitra ao aminy kosa isika.'
mg1865::mg_47::6::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay mpiara-miasa aminy dia mangataka aminareo koa mba tsy handraisanareo foana ny fahasoavan''Andriamanitra'
mg1865::mg_47::6::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hoy Izy: Tamin''ny taona fankasitrahana no nihainoako anao, Ary tamin''ny andro famonjena no namonjeko anao (Isaia 49:8) indro, ankehitriny no andro fankasitrahana; indro, ankehitriny no andro famonjena;'
mg1865::mg_47::6::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy manao izay mahatafintohina izahay na amin''inona na amin''inona, mba tsy homen-tsiny ny fanompoana;'
mg1865::mg_47::6::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny zavatra rehetra dia mampiseho ny tenanay ho mpanompon''Andriamanitra izahay, dia amin''ny faharetana be, amin''ny fahoriana, amin''ny fahaterena, amin''ny fahantrana,'
mg1865::mg_47::6::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny kapoka, amin''ny fatorana, amin''ny tabataba, amin''ny fisasarana, amin''ny tsy fahitan-tory, amin''ny fifadian-kanina,'
mg1865::mg_47::6::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny fahadiovana, amin''ny fahalalana, amin''ny fahari-po, amin''ny fahamoram-panahy, amin''ny Fanahy Masina, amin''ny fitiavana tsy mihatsaravelatsihy,'
mg1865::mg_47::6::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny teny fahamarinana, amin''ny herin''Andriamanitra, amin''ny fiadian''ny fahamarinana, na amin''ny ankavanana na amin''ny ankavia,'
mg1865::mg_47::6::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny voninahitra sy ny fahafaham-boninahitra, amin''ny laza ratsy sy ny laza soa; tahaka ny mpamitaka, nefa marina ihany;'
mg1865::mg_47::6::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny tsy fantatra, nefa fantatra tsara ihany ; tahaka ny efa ho faty, nefa, indro, velona ihany; tahaka ny faizana, nefa tsy atao maty;'
mg1865::mg_47::6::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny ampalahelovina, nefa faly mandrakariva; tahaka ny malahelo, nefa mampanan-karena ny maro; tahaka ny tsy manana na dia kely akory aza, nefa manana ny zavatra rehetra.'
mg1865::mg_47::6::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Fanarana ny Kristiana tao Korinto mba tsy hikamba amin''ny ratsy, sy filazana ny hafalian''i Paoly noho ny nibebahan''ireo, rehefa nahazo ny epistily nampitondrainy'
  verse_text: 'Ry Korintiana, ny vavanay misokatra aminareo, ny fonay malalaka.'
mg1865::mg_47::6::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tery aminay ianareo, fa tery ao am-ponareo ihany.'
mg1865::mg_47::6::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mba ho valiny toraka izany (izaho miteny toy ny amin''ny zanako), dia mba mihalalaha kosa ianareo.'
mg1865::mg_47::6::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety hasiana zioga tsy antonona anareo hikambanana amin''ny tsy mino. Fa inona no iraisan''ny fahamarinana sy ny fahotana? Ary inona no iombonana''ny mazava sy ny maizina?'
mg1865::mg_47::6::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary inona no ifanarahan''i Kristy sy Beliala? Ary inona no iraisan''ny anjaran''ny mino sy ny tsy mino?'
mg1865::mg_47::6::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary inona no ikambanan''ny tempolin''Andriamanitra amin''ny sampy ? Fa isika no tempolin''Andriamanitra velona, araka ny nataon''Andriamanitra hoe: Honina eo aminy sy handeha eo aminy Aho, ary izy ho oloko (Levitikosy 26:11-12).'
mg1865::mg_47::6::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mivoaha eo aminy ianareo, ka misaraha aminy, hoy Jehovah, Ary aza manendry izay zavatra tsy madio; Ary Izaho handray anareo.'
mg1865::mg_47::6::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho Rainareo Aho, ary ianareo ho zanako-lahy sy ho zanako-vavy, hoy Jehovah Tsitoha (Isaia 52:11-12).'
mg1865::mg_47::7::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha manana ireo teny fikasana ireo isika, ry malala, dia aoka isika hanadio ny tenantsika ho afaka amin''ny fahalotoana rehetra, na amin''ny nofo, na amin''ny fanahy, ka hahatanteraka ny fahamasinana amin''ny fahatahorana an''Andriamanitra.'
mg1865::mg_47::7::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy omby anay ny fonareo, tsy nanao izay tsy marina tamin''ny olona izahay, tsy nanimba olona, tsy nanambaka olona.'
mg1865::mg_47::7::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy miteny izany ho fanamelohana aho; fa efa nilaza rahateo aho fa ao am-ponay ianareo, mba hiara-maty sy hiara-belona isika.'
mg1865::mg_47::7::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be ny fahatokiako anareo, lehibe ny reharehako ny aminareo; feno fiononana aho sady be hafaliana indrindra amin''ny fahorianay rehetra.'
mg1865::mg_47::7::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia efa tonga tany Makedonia aza izahay, dia tsy hiainan''ny nofonay, fa nampahorina tamin''ny zavatra rehetra: teo ivelany nisy ady, tao anatiny nisy tahotra.'
mg1865::mg_47::7::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra, Izay mampionona ny mpandefitra, no efa nampionona anay tamin''ny nahatongavan''i Titosy,'
mg1865::mg_47::7::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy tamin''ny nahatongavany ihany, fa tamin''ny fampiononana izay nampiononanareo azy koa, raha nambarany taminay ny fanirianareo sy ny fitomanianareo sy ny fahazotoanareo hanaiky ahy; ka dia mainka nifaly aho.'
mg1865::mg_47::7::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia nampalahelo anareo tamin''ny epistily aza aho, dia tsy manenina intsony, na dia nanenina ihany aza teo; fa fantatro fa efa nampalahelo anareo izany epistily izany, kanefa vetivety ihany.'
mg1865::mg_47::7::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifaly kosa aho ankehitriny, nefa tsy noho ny nampalahelovana anareo, fa noho ny nampalahelovana anareo mba hibebaka; fa nampahelovina araka an''Andriamanitra ianareo, mba tsy hataonay matiantoka na amin''inona na amin''inona.'
mg1865::mg_47::7::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny alahelo araka an''Andriamanitra miasa fibebahana ho famonjena tsy hanenenana; fa miasa fahafatesana kosa ny alahelon''izao tontolo izao.'
mg1865::mg_47::7::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, izany nampalahelovana araka an''Andriamanitra izany indrindra dia nahatonga fahazotoana manao ahoana teo aminareo! eny, fialan-tsiny manao ahoana! fahatezerana manao ahoana! fahatahorana manao ahoana! faniriana manao ahoana! zotom-po manao ahoana! famaliana ny ratsy natao manao ahoana! Tamin''izany rehetra izany dia nampiseho ny fahadiovanareo ny amin''izany raharaha izany ianareo.'
mg1865::mg_47::7::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia nanoratra taminareo aza aho, dia tsy noho ny nanao izay tsy marina, na noho ny niaritra izay tsy marina, fa mba haseho aminareo eo anatrehan''Andriamanitra ny fahazotoanareo hanaiky anay.'
mg1865::mg_47::7::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia nampiononina izahay, ary tamin''ny nampiononana anay dia vao mainka nifaly izahay noho ny fifalian''i Titosy, fa ianareo rehetra efa namelombelona ny fanahiny.'
mg1865::mg_47::7::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nisy nataoko rehareha taminy ny aminareo, dia tsy mahamenatra ahy izany; fa tahaka ny nilazanay marina taminareo ny zavatra rehetra, dia tonga marina koa ny reharehanay tamin''i Titosy ny aminareo.'
mg1865::mg_47::7::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vao mainka miraikitra aminareo aza ny fony, raha mahatsiaro ny fanarahanareo rehetra izy, dia ny haben''ny fahatahorana sy ny fangovitana nandraisanareo azy.'
mg1865::mg_47::7::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary faly aho fa matoky anareo amin''ny zavatra rehetra.'
mg1865::mg_47::8::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny famorian-bola ho an''ny Kristiana malahelo tany Jodia'
  verse_text: 'Ary ampahafantarinay anareo, ry rahalahy, ny fahasoavan''Andriamanitra izay nomena tao amin''ny fiangonana any Makedonia;'
mg1865::mg_47::8::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tamin''ny fahoriana be nizahan-toetra azy no nitomboan''ny hafaliany, ary ny hamafin*''ny fahantrany no nampitombo ny haren''ny hitsim-pony**. [*Grika:halalin''] [** Na: fahafoizany]'
mg1865::mg_47::8::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa vavolombelona aho fa araka ny zakany, eny, mihoatra noho ny zakany aza, sady araka ny sitrapony ihany, no nanomezany,'
mg1865::mg_47::8::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nangataka mafy taminay koa izy mba havelanay hikambana amin''izany fanompoana ho an''ny olona masina izany;'
mg1865::mg_47::8::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy araka ny nantenainay, fa ny tenany no natolony ho an''ny Tompo aloha, dia ho anay koa noho ny sitrapon''Andriamanitra;'
mg1865::mg_47::8::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nangataka an''i Titosy izahay mba hahatanteraka izany fahasoavana izany eo aminareo koa, araka ny efa nanombohany azy teo aloha.'
mg1865::mg_47::8::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa araka ny itomboanareo amin''ny zavatra rehetra, na amin''ny finoana, na amin''ny teny, na amin''ny fahalalana, na amin''ny fahazotoana rehetra, na amin''ny fitiavanareo anay, dia aoka ho araka izany koa no hitomboanareo amin''izao fahasoavana izao.'
mg1865::mg_47::8::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy milaza izany ho didy aho, fa noho ny zotom-pon''ny sasany, mba hizaha toetra ny hamarinan''ny fitiavanareo koa.'
mg1865::mg_47::8::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatrareo ny fahasoavan''i Jesoa Kristy Tompontsika, fa na dia nanan-karena aza Izy, dia tonga malahelo noho ny aminareo, mba hampanan-karena anareo ny alahelony.'
mg1865::mg_47::8::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia ambarako izay hevitro ny amin''izany, fa mahatsara anareo izany, satria tsy ny fanaovana ihany, fa ny fikasana koa aza dia efa natombokareo teo alohan''ny sasany hatry ny taon-itsy.'
mg1865::mg_47::8::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy tanteraka ary izany, ka tahaka ny nahazotoanareo fony nikasa, dia aoka ho tahaka izany koa ny hahatanterahanareo azy araka izay ananareo.'
mg1865::mg_47::8::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy ny fahazotoana, dia araka izay ananany no ankasitrahana, fa tsy araka izay tsy ananany.'
mg1865::mg_47::8::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy ny hahatonga fitsaharana amin''ny sasany ary fahoriana aminareo no anaovako izany,'
mg1865::mg_47::8::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny mba hisy fitoviana, ka amin''izao ankehitriny izao ny haben''ny harenareo no hahafaka ny alahelon''ireo, ary ny haben''ny haren''ireo kosa no hahafaka ny alahelonareo, mba hisy fitoviana,'
mg1865::mg_47::8::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: Ny nanangona be tsy nanana amby, ary ny nanangona kely tsy nanana ny tsy ampy (Eksodosy 16:18).'
mg1865::mg_47::8::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isaorana anie Andriamanitra, Izay manome fahazotoana ho ao am-pon''i Titosy ho anareo mitovy amin''ny ahy.'
mg1865::mg_47::8::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanaiky ny fangatahanay ihany izy, nefa nazoto rahateo, ka sitrapony ihany no nandehanany nankany aminareo.'
mg1865::mg_47::8::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay rahalahy izay nalaza amin''ny filazantsara any amin''ny fiangonana rehetra no nirahinay hiaraka aminy;'
mg1865::mg_47::8::19:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy izany ihany, fa efa notendren*''ny fiangonana koa izy ho namanay hiara-mandeha aminay hitondra izao fahasoavana izao, izay angoninay** ho voninahitry ny Tompo sy ho vavolombelon''ny fahazotoanay. [*Na: Nofidina tamin''ny fananganan-tanana] [** ataonay amin''ny fanompoanay]'
mg1865::mg_47::8::20:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitandrina izahay mba tsy hisy hanome tsiny anay amin''izao harena be angoninay izao;'
mg1865::mg_47::8::21:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa miomana hanao izay mahamendrika izahay, tsy eo imason''ny Tompo ihany, fa eny imason''ny olona koa.'
mg1865::mg_47::8::22:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nirahinay niaraka tamin''ireo ilay rahalahinay izay efa hitanay mazoto matetika amin''ny zavatra maro; fa ankehitriny mazoto kokoa izy noho ny haben''ny fahatokiany anareo.'
mg1865::mg_47::8::23:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amin''i Titosy, dia namako izy sady mpiara-miasa amiko ho anareo; ary ireo rahalahinay, dia iraky* ny fiangonana izy sady voninahitr''i Kristy. [*Grika:apostoly]'
mg1865::mg_47::8::24:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany asehoy aminy eo imason''ny fiangonana ny famantarana mahamarina ny fitiavanareo sy ny reharehanay ny aminareo.'
mg1865::mg_47::9::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny fiantrana* ho an''ny olona masina, dia tsy misy tokony hanoratako aminareo; [*Grika: fanompoana]'
mg1865::mg_47::9::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatro ny fahazotoanareo, izay ataoko rehareha ny aminareo amin''ny Makedoniana hoe : Efa vonona hatry ny taon-itsy Akaia, ary ny zotom-ponareo dia namporisika ny maro.'
mg1865::mg_47::9::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa naniraka ireo rahalahy ireo ihany aho, fandrao dia ho foana ny reharehanay ny aminareo amin''izany zavatra izany, mba ho vonona ianareo araka izay nolazaiko,'
mg1865::mg_47::9::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao, raha tàhiny hisy hiaraka amiko ny avy eto Makedonia ka hahita anareo tsy mbola vonona, dia ho menatra izahay (mba tsy hanaovanay hoe, ianareo) noho izany fahatokiana izany.'
mg1865::mg_47::9::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nataoko fa tsy maintsy mangataka ny rahalahy handeha hialoha ho any aminareo aho ka hahavita rahateo ny fiantranareo izay nokasainareo teo aloha, mba hovitaina toy ny fiantrana izany, fa tsy toy ny fahihirana.'
mg1865::mg_47::9::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazaiko: Izay mamafy kely, dia kely no hojinjany; fa izay mamafy be, dia be kosa no hojinjany.'
mg1865::mg_47::9::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny olona rehetra samy hanao araka izay inian''ny fony avy, tsy amin''ny alahelo, na amin''ny faneriterena; fa ny mpanome amin''ny fifaliana no tian''Andriamanitra.'
mg1865::mg_47::9::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra mahay mampitombo ny fahasoavana rehetra aminareo, mba hanananareo ny onony rehetra mandrakariva amin''ny zavatra rehetra, ka hitombo amin''ny asa tsara rehetra;'
mg1865::mg_47::9::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra hoe: Namafy izy, eny, nanome ho an''ny malahelo; Ny fahamarinany maharitra mandrakizay (Salamo 112:9).'
mg1865::mg_47::9::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izay manome voa ho an''ny mpamafy sy mofo hohanina dia hanome sy hahabe ny voa afafinareo ary hampitombo ny vokatry ny fahamarinanareo,'
mg1865::mg_47::9::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hanan-karena amin''ny zavatra rehetra ianareo ka handroso amin''ny hitsim-po*, izay mahatonga ny fisaoranay an''Andriamanitra. [*Na: fahafoizana]'
mg1865::mg_47::9::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanaovana izany fanompoam-pivavahana izany dia tsy mahafaka ny alahelon''ny olona masina ihany, fa mahabe ny fisaoran''ny maro an''Andriamanitra koa,'
mg1865::mg_47::9::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria ny fizahan-toetra anareo amin''izany fanompoana izany no ankalazany an''Andriamanitra noho ny fitananareo tsara ny fanekenareo ny filazantsaran''i Kristy sy noho ny fahazotoanareo amin''ny fiantrana ho azy sy ho an''ny olona rehetra;'
mg1865::mg_47::9::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''ny fangatahany ho anareo dia manina anareo izy noho ny haben''ny fahasoavan''Andriamanitra aminareo.'
mg1865::mg_47::9::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Andriamanitra noho ny fanomezany tsy azo tononina.'
mg1865::mg_47::10::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: '2022-06-13T06:37:14+0000'
  verse_title: 'Teny nentin''i Paoly namaly izay nanohitra sy nanevateva ny fahefany ka nanao azy tsy ho Apostoly marina'
  verse_text: 'Ary ny tenako, izaho Paoly, dia mananatra anareo amin''ny hamoram-panahy sy ny fandeferan''i Kristy, dia izaho, izay manetry tena, hono, raha eo anatrehanareo, fa sahy aminareo kosa, raha tsy eo.'
mg1865::mg_47::10::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mangataka aho mba tsy ho sahy, rehefa tonga, amin''ny fahatokiana izay kasaiko hahasahiana amin''ny sasany, izay manao anay ho mandeha araka ny nofo.'
mg1865::mg_47::10::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia velona amin''ny nofo aza izahay, dia tsy mba miady araka ny nofo'
mg1865::mg_47::10::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa tsy avy amin''ny nofo ny fiadian''ny tafikay, fa mahery amin''Andriamanitra handrava fiarovana mafy)'
mg1865::mg_47::10::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mandrava ny fisainana sy ny zavatra avo rehetra izay atsangana hanohitra ny fahalalana an''Andriamanitra izahay ka mamabo ny hevitra rehetra hanaiky an''i Kristy,'
mg1865::mg_47::10::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary vonona hamaly ny tsy fanarahana rehetra izahay, rehefa tanteraka ny fanarahanareo.'
mg1865::mg_47::10::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: '2022-06-26T04:03:48+0000'
  verse_title: null
  verse_text: 'Mijery zavatra araka ny fisehony ihany va ianareo*? Raha misy olona matoky ny tenany fa an''i Kristy, aoka izy hisaintsaina izao indray, fa tahaka ny mah''an''i Kristy azy no mah''an''i Kristy anay koa. [*Na: Mijery zavatra araka ny fisehony ihany ianareo]'
mg1865::mg_47::10::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia bebe ihany aza ny fireharehako ny amin''ny fahefanay izay nomen''i Kristy anay hananganana, fa tsy handravana anareo, dia tsy hahazo henatra aho,'
mg1865::mg_47::10::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hisehoako toy ny ta-hampitahotra anareo amin''ny epistily.'
mg1865::mg_47::10::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny epistiliny, hoy izy, dia mavesatra sy mahery; fa malemy kosa ny fanatrehan''ny tenany, ary tsinontsinona ny teniny.'
mg1865::mg_47::10::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izany olona izany hihevitra izao, fa tahaka ny fiteninay amin''ny epistily, raha tsy eo izahay, dia ho tahaka izany koa ny asanay rehefa tonga izahay.'
mg1865::mg_47::10::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay tsy sahy hanao ny tenanay ho isan''ny sasany izay midera tena, na hampitaha ny tenanay aminy; fa tsy hendry ireny, satria manohatra ny tenanay amin''ny tenany sy mampitaha ny tenany amin''ny tenanay.'
mg1865::mg_47::10::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay tsy mba hirehareha tsy amin''ohatra, fa araka ny ohatry ny voafaritr''Andriamanitra ho anjaranay, dia ohatra mihatra aminareo.'
mg1865::mg_47::10::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy toy izay tsy mihatra aminareo izahay ka mihoatra ny faritry ny anjaranay; fa tonga hatrany aminareo aza izahay amin''ny filazantsaran''i Kristy;'
mg1865::mg_47::10::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mirehareha tsy amin''ohatra amin''izay nisasaran''ny sasany izahay, fa manana fanantenana izahay fa rehefa mitombo ny finoanareo, dia hohalehibiazina ao aminareo izahay araka ny voafaritra ho anjarany, sady mbola handroso ihany'
mg1865::mg_47::10::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hitory ny filazantsara amin''ny tany any ankoatranareo, ary tsy hirehareha amin''izay efa vonona rahateo ao anatin''ny voafaritra ho an''ny sasany.'
mg1865::mg_47::10::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mirehareha, dia aoka Jehovah no ho reharehany (Jeremia 9:23)'
mg1865::mg_47::10::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy izay midera tena no ankasitrahana, fa izay derain''ny Tompo.'
mg1865::mg_47::11::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka mba handefitra amiko amin''ny hadalana kely ianareo, kanefa mandefitra* amiko ihany ianareo. [*Na: Eny, mandefera]'
mg1865::mg_47::11::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahasaro-piaro araka an''Andriamanitra no mahasaro-piaro ahy aminareo; fa nataoko fofombadin''ny lehilahy iray ianareo, mba hatolotra tahaka ny virijina madio ho an''i Kristy.'
mg1865::mg_47::11::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa matahotra aho, fandrao ny sainareo ho simba hiala amin''ny fahitsiam-po sy ny fahadiovana amin''i Kristy, tahaka ny namitahan''ny menarana an''i Eva tamin''ny fihendreny.'
mg1865::mg_47::11::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy tonga ka mitory Jesoa hafa izay tsy notorinay, na ianareo mandray fanahy hafa izay tsy noraisinareo, hay! tsara ny andeferanareo amin''izany!'
mg1865::mg_47::11::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ataoko fa tsy misy mahalatsaka ahy noho ireo Apostoly ambony indrindra* ireo. [*Na: Fatratra loatra]'
mg1865::mg_47::11::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia olona tsy nampianarina laha-teny aza aho, dia tsy mba tahaka izany amin''ny fahalalana; fa tamin''ny zavatra rehetra dia efa nasehonay marimarina tamin''ny olona rehetra izany hahasoa anareo.'
mg1865::mg_47::11::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diso va aho, raha nanetry tena mba hisandratanareo ka nitory maimaimpoana ny filazantsaran''Andriamanitra taminareo?'
mg1865::mg_47::11::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namabo ny fiangonana sasany aho ka nandray karama hanompoako anareo.'
mg1865::mg_47::11::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nitoetra teo aminareo aho ka tsy nanana, dia tsy mba nahavaky tratra olona aho; fa raha vao tonga avy tany Makedonia ny rahalahy, dia nomeny ahy izay nilaiko; ary tamin''ny zavatra rehetra dia nitandrina tsara izay tsy hahavaky tratra anareo aho sady mbola hitandrina izany ihany.'
mg1865::mg_47::11::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ato anatiko koa ny fahamarinan''i Kristy, dia tsy hisy hahafoana izany reharehako izany any amin''ny tany Akaia.'
mg1865::mg_47::11::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana? Satria tsy tiako va ianareo? Andriamanitra no mahalala.'
mg1865::mg_47::11::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay ataoko no mbola hataoko ihany, mba hampitsaharako ny famelezan''izay mitady hamely, mba ho hita fa tahaka anay ihany izay amin''ny izay ireharehany.'
mg1865::mg_47::11::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Apostoly sandoka izy ireny, mpiasa mamitaka, ka dia mampiova ny endriny ho tahaka ny Apostolin''i Kristy.'
mg1865::mg_47::11::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mahagaga izany, fa Satana aza mampiova ny endriny ho tahaka ny anjelin''ny mazava.'
mg1865::mg_47::11::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsy zavatra lehibe tsy akory, raha ny mpanompony koa no mba mampiova ny endriny ho tahaka ny mpanompon''ny fahamarinana; nefa ny farany ho araka ny asany ihany.'
mg1865::mg_47::11::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho indray: Aza misy manao ahy ho adala; nefa, na dia misy manao izany aza, raiso toy ny adala aho mba hireharehako kelikely koa.'
mg1865::mg_47::11::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao lazaiko izao dia tsy lazaiko araka ny Tompo, fa toa amin''ny fahadalana amin''izao rehareha matoky izao ihany.'
mg1865::mg_47::11::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria maro no mirehareha araka ny nofo, dia mba hirehareha koa aho.'
mg1865::mg_47::11::19:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sitrakareo ny handefitra amin''ny adala, satria hendry angaha ianareo.'
mg1865::mg_47::11::20:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hay! mandefitra ihany ianareo, raha misy manandevo anareo, raha misy mandany anareo, raha misy misambotra anareo, raha misy mirehareha aminareo, raha misy mamely ny tavanareo.'
mg1865::mg_47::11::21:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manala-barà-tena aho ka toa manaiky fa nalemy izahay! Fa amin''izay mahasahy ny olona (miteny toy ny adala aho), dia mba sahy koa aho.'
mg1865::mg_47::11::22:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hebreo va izy? Izaho koa. Isiraelita va izy? Izaho koa. Taranak''i Abrahama va izy? Izaho koa.'
mg1865::mg_47::11::23:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpanompon''i Kristy va izy? (miteny toy ny olona very saina aho) mihoatra noho izy aho: amin''ny fisasarana manan-tombo, amin''ny tranomaizina matetika kokoa, amin''ny kapoka be efa izay tsy izy, amin''ny fahafatesana matetika.'
mg1865::mg_47::11::24:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indimy aho no nokapohin''ny Jiosy inefa-polo latsaka iray avy.'
mg1865::mg_47::11::25:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Intelo nokapohina tamin''ny hazo aho, indray maka notoraham-bato, intelo no vaky sambo, indray andro sy indray alina no nitoetra teo amin''ny lalina,'
mg1865::mg_47::11::26:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'nandeha matetika aho, saiky nahita loza tamin''ny ony, saiky nahita loza tamin''ny jiolahy, saiky nahita loza tamin''ny tompon-tany namako, saiky nahita loza tamin''ny jentilisa, saiky nahita loza tao amin''ny tanàna aho, saiky nahita loza tany an''efitra aho, saiky nahita loza tany amin''ny ranomasina aho, saiky nahita loza tamin''ny rahalahy sandoka aho,'
mg1865::mg_47::11::27:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny fisasarana sy ny fikelezan''aina, tamin''ny tsy fahitan-tory matetika, tamin''ny hanoanana sy ny hetaheta, tamin''ny fifadian-kanina matetika, tamin''ny hatsiaka sy ny fitanjahana.'
mg1865::mg_47::11::28:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afa-tsy ireo zavatra ivelany* dia mbola misy koa izay mahazo ahy isan''andro, dia ny fiahiana ny fiangonana rehetra. [*Na: izany rehetra izany]'
mg1865::mg_47::11::29:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no malemy, ka tsy malemy aho? Iza no tafintohina, ka tsy mirehitra aho?'
mg1865::mg_47::11::30:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy maintsy mirehareha aho, dia izay momba ny fahalemeko no hataoko rehareha.'
mg1865::mg_47::11::31:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra, Rain''i Jesoa Tompo, Izay isaorana mandrakizay, mahalala fa tsy mandainga aho.'
mg1865::mg_47::11::32:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany Damaskosy ny governora notendren''i Areta mpanjaka dia nampiambina ny tanàna Damaskosy mba hisambotra ahy;'
mg1865::mg_47::11::33:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa avy teo amin''ny varavarankely eo amin''ny mànda no nampidinana ahy tamin''ny sobiky, ka dia afa-nandositra ny tanany aho.'
mg1865::mg_47::12::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa handroso hilaza fahitana sy fanambaran''ny Tompo aho.'
mg1865::mg_47::12::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahalala olona anankiray ao amin''i Kristy aho, tokony ho efatra ambin''ny folo taona lasa izay — na tao amin''ny tena, na tsy tao amin''ny tena, tsy fantatro, Andriamanitra no mahalala — ilay anankiray dia nakarina ho any amin''ny lanitra fahatelo.'
mg1865::mg_47::12::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mahalala ilay olona anankiray aho — na tao amin''ny tena, na tsy tao amin''ny tena, tsy fantatro, Andriamanitra no mahalala -'
mg1865::mg_47::12::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nakarina ho any Paradisa izy ka nandre teny tsy azo tenenina sady tsy tokony holazain''olona.'
mg1865::mg_47::12::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay anankiray no hataoko rehareha; fa ny amin''ny tenako dia tsy hirehareha aho afa-tsy amin''ny fahalemena ihany.'
mg1865::mg_47::12::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia te-hirehareha aza aho, dia tsy ho adala, fa hilaza ny marina; nefa tsy manao izany aho, fandrao misy olona mihevitra ahy ho mihoatra noho izay ahitany ahy na izay andrenesany ny teniko.'
mg1865::mg_47::12::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fandrao hirehareha noho ny habetsaky ny fanambarana aho, dia nasiana tsilo tamin''ny nofo*, dia irak''i Satana hamely ahy, fandrao hirehareha aho. [*Na: Notsatohana hazo maranitra ny nofoko]'
mg1865::mg_47::12::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nangatahako intelo tamin''ny Tompo, mba hialan''izany amiko.'
mg1865::mg_47::12::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: '2022-10-24T04:41:39+0000'
  verse_title: null
  verse_text: 'Nefa hoy Izy tamiko: Ampy ho anao ny fahasoavako; fa ny heriko. dia tanterahina amin''ny fahalemena. Koa mainka sitrako ny hirehareha amin''ny fahalemeko, mba hitoeran''ny herin''i Kristy amiko.'
mg1865::mg_47::12::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia finaritra aho amin''ny fahalemena, amin''ny fampahoriana, amin''ny fahaterena, amin''ny fanenjehana, amin''ny fahantrana, noho ny amin''i Kristy; fa ny fahalemeko no fahatanjahako.'
mg1865::mg_47::12::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tonga adala aho; ianareo no nahatery ahy; fa tokony hoderainareo aho, satria tsy latsaka noho ireo Apostoly ambony indrindra* ireo, na dia tsinontsinona aza aho. [*Na: fatratra loatra]'
mg1865::mg_47::12::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famantarana mah''Apostoly ahy dia natao teo aminareo tokoa tamin''ny faharetana rehetra, tamin''ny famantarana sy ny fahagagana ary tamin''ny asa lehibe.'
mg1865::mg_47::12::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona moa no nahalatsaka anareo noho ny fiangonana sasany, afa-tsy ny tsy namakiako tratra anareo? Mamelà ahy ary amin''izany fahadisoana izany.'
mg1865::mg_47::12::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa fanintelony izao no vonona hankaty aminareo aho, nefa tsy hahavaky tratra anareo; fa tsy ny fanananareo no tadiaviko, fa ianareo; fa tsy ny zanaka no tokony hihary ho an''ny ray aman-dreniny, fa ny ray aman-dreniny no tokony hihary ho an''ny zanany.'
mg1865::mg_47::12::15:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho dia faly indrindra handany sy holanina hahasoa ny fanahinareo, na dia araka ny fitombon''ny fitiavako anareo aza no fihenan''ny fitiavanareo ahy.'
mg1865::mg_47::12::16:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, na dia izany aza, izaho tsy nahavaky tratra anareo, fa nanao saina, hono, aho, dia nahazo anareo tamin''ny fihendrena.'
mg1865::mg_47::12::17:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa izay nirahiko tany aminareo va nisy nanaovako anareo ho vola aman-karena?'
mg1865::mg_47::12::18:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nangataka an''i Titosy aho, sady nirahiko nomba azy ilay rahalahy. Moa Titosy va nanao anareo ho vola aman-karena? Tsy fanahy iray ihany va no nandehananay? Tsy iray ihany va no dianay?'
mg1865::mg_47::12::19:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa ela izay no nanaovanareo anay ho miala tsiny aminareo. Eo anatrehan''Andriamanitra no itenenanay ao amin''i Kristy; fa ny zavatra rehetra, ry malala, dia ho fampandrosoana anareo.'
mg1865::mg_47::12::20:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa matahotra aho, fandrao, rehefa tonga aho, dia hahita anareo ho toy izay tsy tiako, ary ho hitanareo aho ho toy izay tsy tianareo ; fandrao hisy fifandirana, fialonana, fiafonafonana, fifampiandaniana, fanaratsiana, fibitsibitsihana, fieboeboana, fikotranana, -'
mg1865::mg_47::12::21:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, fandrao, rehefa tonga indray aho, dia hampietry ahy eo anatrehanareo Andriamanitro, ary izaho hanana alahelo amin''ny maro izay nanota teo aloha ka tsy mbola nibebaka tamin''ny fahalotoana sy ny fijangajangana ary ny fijejojejoana nataony.'
mg1865::mg_47::13::1:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no fanintelon''ny hankanesako aty aminareo. Amin''ny tenin''ny vavolombelona roa na telo no hanorenana mafy ny teny rehetra (Deoteronomia 19:15).'
mg1865::mg_47::13::2:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nambarako fahiny, sady milaza rahateo koa aho — toy ny nataoko fony mbola teo aminareo fanindroany ihany, ary ankehitriny raha tsy eo kosa — amin''izay nanota teo aloha sy amin''ny sisa rehetra, fa rehefa tonga indray aho, dia tsy hiantra,'
mg1865::mg_47::13::3:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria ianareo mitady famantarana fa miteny ato anatiko Kristy, Izay tsy malemy aminareo, fa mahery ao aminareo kosa.'
mg1865::mg_47::13::4:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voahombo tamin''ny hazo fijaliana Izy noho ny fahalemena, nefa velona kosa noho ny herin''Andriamanitra. Fa izahay koa dia malemy ao aminy, nefa hiara-belona aminy ho anareo izahay noho ny herin''Andriamanitra.'
mg1865::mg_47::13::5:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diniho ny tenanareo, na mitoetra amin''ny finoana ianareo, na tsia; izahao toetra ny tenanareo. Moa tsy fantatrareo va ny amin''ny tenanareo, fa ao anatinareo Jesoa Kristy, raha tsy olona nolavina ianareo ?'
mg1865::mg_47::13::6:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa manantena aho fa ho fantatrareo fa izahay dia tsy olona nolavina.'
mg1865::mg_47::13::7:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mangataka amin''Andriamanitra izahay mba tsy hanao izay ratsy ianareo, tsy ny hisehoanay ho olona voazaha toetra anefa, fa ny mba hanaovanareo izay tsara, na dia ho toy ny olona nolavina aza izahay.'
mg1865::mg_47::13::8:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mahavita na inona na inona hanohitra ny marina izahay, fa hampandroso ny marina kosa.'
mg1865::mg_47::13::9:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa faly izahay, raha malemy izahay, fa ianareo no mahery; ary izao no angatahinay, dia ny fanatanterahana anareo.'
mg1865::mg_47::13::10:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no anoratako izany zavatra izany, raha tsy eo aminareo aho, fandrao, rehefa tonga aho, dia hanao izay mafy araka ny hery izay nomen''ny Tompo ahy ho fananganana, fa tsy ho fandravana.'
mg1865::mg_47::13::11:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Farany, ry rahalahy, mifalia*, aoka ho tanteraka ianareo, mandraisa ny fampiononana, miraisa saina, mihavàna; ary Andriamanitry ny fitiavana sy ny fiadanana ho aminareo. [*Na: veloma]'
mg1865::mg_47::13::12:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifanaova veloma amin''ny fanorohana masina.'
mg1865::mg_47::13::13:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona masina rehetra manao veloma anareo.'
mg1865::mg_47::13::14:
  verse_version: mg1865
  verse_book: mg_47
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho aminareo rehetra anie ny fahasoavan''i Jesoa Kristy Tompo sy ny fitiavan''Andriamanitra ary ny firaisana amin''ny Fanahy Masina.'
