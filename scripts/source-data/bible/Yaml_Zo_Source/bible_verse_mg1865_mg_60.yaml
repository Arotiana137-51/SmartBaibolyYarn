mg1865::mg_60::1::1:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana, sy filazana ny amin''ny fahatsaran''ny fanavotana'
  verse_text: 'Petera, Apostolin''i Jesoa Kristy, mamangy ny mpivahiny monina any am-pielezana any Ponto, Galatia, Kapadokia, Asia sy Bitynia, dia olom-boafidy'
mg1865::mg_60::1::2:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny fahalalana rahateo, izay an''Andriamanitra Ray, amin''ny fanamasinan''ny Fanahy, ho amin''ny fanarahana sy ny famafazan''ny ran''i Jesoa Kristy: hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana.'
mg1865::mg_60::1::3:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Andriamanitra, Rain''i Jesoa Kristy Tompontsika, Izay niteraka antsika indray araka ny haben''ny famindram-pony ho amin''ny fanantenana velona tamin''ny nitsanganan''i Jesoa Kristy tamin''ny maty,'
mg1865::mg_60::1::4:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho amin''ny lova tsy mety simba, tsy misy loto, tsy mety levona, voatahiry any an-danitra ho anareo,'
mg1865::mg_60::1::5:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay arovan''ny herin''Andriamanitra amin''ny finoana ho amin''ny famonjena efa vonona haseho any am-parany.'
mg1865::mg_60::1::6:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no iravoravoanareo, na dia ampalahelovina vetivety ankehitriny amin''ny fakam-panahy maro samy hafa aza ianareo, raha tsy maintsy hisy izany,'
mg1865::mg_60::1::7:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho hita ho fiderana sy voninahitra ary fankalazana ny fizahan-toetra ny finoanareo (izay tsara lavitra noho ny volamena mety ho simba, na dia voazaha toetra tamin''ny afo aza), dia amin''ny hisehoan''i Jesoa Kristy;'
mg1865::mg_60::1::8:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay, na dia tsy mbola hitanareo aza, dia tianareo, ary na dia tsy hitanareo ankehitriny aza, anefa, satria inoanareo, dia iravoravoanareo amin''ny fifaliana tsy azo tononina sady be voninahitra,'
mg1865::mg_60::1::9:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandray ny anton''ny finoanareo, dia ny famonjena ny fanahy.'
mg1865::mg_60::1::10:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''izany famonjena izany dia notadiavin''ny mpaminany sy nokatsahiny fatratra, dia ireo efa naminany ny fahasoavana ho anareo;'
mg1865::mg_60::1::11:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, nokatsahiny izay andro na izay toetry ny andro notondroin''ny Fanahin''i Kristy ao anatiny, raha nambarany rahateo ny fijalian''i Kristy sy ny voninahitra manaraka izany.'
mg1865::mg_60::1::12:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naseho tamin''ireo fa tsy ho azy, fa ho anareo no nanompoany ny amin''izany zavatra izany, izay voalaza aminareo ankehitriny, tamin''ny tenin''ireo nitory ny filazantsara taminareo amin''ny Fanahy Masina, Izay nirahina avy tany an-danitra; izany zavatra izany dia tian''ny anjely hodinihina.'
mg1865::mg_60::1::13:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Famporisihana hitondra tena mifanaraka amin''ny filazantsara'
  verse_text: 'Koa amin''izany sikino ny sainareo, dia mahonona tena, ka antenao tsara ny fahasoavana izay ho entina ho anareo amin''ny hisehoan''i Jesoa Kristy;'
mg1865::mg_60::1::14:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'tahaka ny zanaka manoa, tsy mitondra tena araka ny filanareo fahiny tamin''ny tsy fahalalanareo;'
mg1865::mg_60::1::15:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa araka ny fahamasinan''ilay niantso anareo, dia aoka mba ho masina koa ianareo amin''ny fitondran-tena rehetra,'
mg1865::mg_60::1::16:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria voasoratra hoe: "Ho masina ianareo, satria masina Aho" (Levitikosy 11:44).'
mg1865::mg_60::1::17:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Ilay tsy mizaha tavan''olona, fa mitsara araka ny asan''izy rehetra, no antsoinareo hoe Ray, dia mitondrà tena amin''ny fahatahorana mandritra ny andron''ny fivahinianareo ety ;'
mg1865::mg_60::1::18:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatrareo fa tsy zavatra mety ho simba, tahaka ny volafotsy sy ny volamena, no nanavotana anareo tamin''ny fitondran-tena adala, izay azonareo tamin''ny nentin-drazana,'
mg1865::mg_60::1::19:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny rà soan''i Kristy, toy ny ran''ny zanak''ondry tsy misy kilema ary tsy misy pentimpentina;'
mg1865::mg_60::1::20:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay fantatra rahateo, fony tsy mbola ary ny fanorenan''izao tontolo izao, fa efa naseho tamin''izao andro farany izao noho ny aminareo'
mg1865::mg_60::1::21:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mino an''Andriamanitra amin''ny alalany, dia Ilay nanangana Azy tamin''ny maty ka nanome voninahitra Azy,- mba hiorenan''ny finoanareo sy ny fanantenanareo amin''Andriamanitra.'
mg1865::mg_60::1::22:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa nodiovinareo ny fanahinareo tamin''ny fanarahana ny fahamarinana ho amin''ny fitiavan-drahalahy tsy miangatra dia mifankatiava fatratra amin''ny fo*; [*Na:(amin''ny fo madio)]'
mg1865::mg_60::1::23:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa teraka indray ianareo, tsy tamin''ny voa mety ho lo, fa tamin''ny tsy mety ho lo, dia ny tenin''Andriamanitra, izay velona sady maharitra.'
mg1865::mg_60::1::24:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa "ny nofo rehetra dia tahaka ny ahitra, Ary izay mety ho voninahiny dia tahaka ny vonin''ny ahitra. Malazo ny ahitra, ka mihintsana ny voniny;'
mg1865::mg_60::1::25:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenin''ny Tompo maharitra mandrakizay" (Isaia 40:6-8). Ary izany no tenin''ny filazantsara izay notorina taminareo.'
mg1865::mg_60::2::1:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: '2022-04-24T15:59:07+0000'
  verse_title: null
  verse_text: 'Koa esory ny lolompo rehetra sy ny fitaka rehetra sy ny fihatsaram-belatsihy sy ny fialonana ary ny fanaratsiana rehetra,'
mg1865::mg_60::2::2:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tahaka ny zaza vao teraka dia maniria ny rononom-panahy tsy misy fitaka, mba hitomboanareo amin''izany ho amin''ny famonjena,'
mg1865::mg_60::2::3:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha tàhiny "nanandrana ianareo fa tsara ny Tompo;"'
mg1865::mg_60::2::4:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay hatoninareo toy ny vato velona, "nolavin''ny olona, fa voafidin''Andriamanitra sady soa,"'
mg1865::mg_60::2::5:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia atsangana koa ianareo tahaka ny vato velona ho trano fanahy, ho fisoronana masina, hanatitra fanati-panahy sitrak''Andriamanitra amin''ny alalan''i Jesoa Kristy.'
mg1865::mg_60::2::6:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy teny ao amin''ny Soratra Masina manao hoe: "Indro, mametraka fehizoro ao Ziona Aho, dia vato voafidy sady tsara; Ary izay mino Azy tsy ho menatra" (Isaia 28:16).'
mg1865::mg_60::2::7:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny fahatsarana dia ho anareo izay mino; fa amin''izay tsy mino kosa "Ny vato izay nolavin''ny mpanao trano No efa tonga fehizoro" (Salamo 118:22),'
mg1865::mg_60::2::8:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: '"Ary vato mahatafintohina sy vatolampy mahasolafaka" (Isaia 8:14) ary satria tsy nanaiky ireo, dia tafintohina tamin''ny teny izy, sady izany koa no nanendrena azy.'
mg1865::mg_60::2::9:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa dia taranaka voafidy, "fanjaka-mpisorona, firenena masina" (Eksodosy 19:6), olona nalain''Andriamanitra ho an''ny tenany mba hilazanareo ny hatsaran''ilay niantso anareo hiala tamin''ny maizina ho amin''ny fahazavany mahagaga;'
mg1865::mg_60::2::10:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ianareo izay tsy firenena akory fahiny, fa ankehitriny efa olon''Andriamanitra; izay tsy namindrana fo, fa ankehitriny efa namindrana fo (Hosea 2:25).'
mg1865::mg_60::2::11:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Fananarana hamporisika mba hadio fitondran-tena amin''ny olona rehetra, ary filazana ny mety hataon''ny mpianakavy'
  verse_text: 'Ry malala, mananatra anareo aho, satria vahiny sy mpivahiny ianareo, fadio ny filan''ny nofo, fa miady amin''ny fanahy ireny;'
mg1865::mg_60::2::12:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka ho tsara ny fitondran-tenanareo eo amin''ny jentilisa, mba hankalazany an''Andriamanitra amin''ny andro famangiana noho ny ahitany ny asa tsara ataonareo, dia izay anendrikendrehany anareo ho mpanao ratsy.'
mg1865::mg_60::2::13:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny Tompo dia maneke izay rehetra voatendrin''ny olona, na ny mpanjaka, satria ambony izy,'
mg1865::mg_60::2::14:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'na ny mpanapaka, satria nirahiny hamaly izay manao ratsy izy, fa ho mpidera izay manao tsara.'
mg1865::mg_60::2::15:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy izany no sitrapon''Andriamanitra, hampanginanareo ny tsy fahalalan''ny olona adala amin''ny fanaovan-tsoa;'
mg1865::mg_60::2::16:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa olona afaka ianareo, nefa aza mitondra ny fahafahanareo ho fanaronana ny ratsy, fa ho toy ny mpanompon Andriamanitra.'
mg1865::mg_60::2::17:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manajà ny olona rehetra. Tiava ny rahalahy. Matahora an''Andriamanitra. Manajà ny mpanjaka.'
mg1865::mg_60::2::18:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mpanompo, maneke ny tomponareo amin''ny fahatahorana rehetra, tsy ny tsara sy ny malemy fanahy ihany, fa ny saro-po koa.'
mg1865::mg_60::2::19:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no ankasitrahana: raha misy olona mitondra alahelo ka mandefitra ny tsy marina noho ny fieritreretana ny amin''Andriamanitra.'
mg1865::mg_60::2::20:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona no laza, raha tàhiny kapohina noho ny fahadisoana ianareo ka mandefitra amin''izany? Fa raha tàhiny manao soa kosa ianareo ka mitondra fahoriana sy mandefitra, dia izany no sitrak''Andriamanitra.'
mg1865::mg_60::2::21:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho amin''izany no niantsoana anareo; fa Kristy aza efa nijaly hamonjy anareo ka namela fianarana ho anareo, mba hanarahanareo ny diany;'
mg1865::mg_60::2::22:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: '"Izay tsy nanota akory, sady tsy nisy fitaka teo am-bavany" (Isaia 53:9)'
mg1865::mg_60::2::23:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha notevatevaina Izy, dia tsy mba nanevateva; raha nijaly, dia tsy nandrahona, fa nanolotra ny adiny* ho amin''ny Mpitsara marina; [*Na: ny tenany]'
mg1865::mg_60::2::24:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Izy nitondra ny fahotantsika (Isaia 53:12) tamin''ny tenany teo ambonin''ny hazo, mba ho faty ny amin''ny ota isika, fa ho velona ny amin''ny fahamarinana; ary "ny dian-kapoka taminy no nahasitranana anareo" (Isaia 53:5).'
mg1865::mg_60::2::25:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nania toy ny ondry ianareo (Isaia 53:6), nefa ankehitriny dia efa niverina ho amin''ny Mpiandry sy Mpitandrina* ny fanahinareo. [*Grika: Episkopo]'
mg1865::mg_60::3::1:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa, ianareo vehivavy, maneke ny vadinareo, mba ho voataonan''ny fitondran-tenan''ny vavy izy, na dia tsy amin''ny teny aza (raha tàhiny misy tsy manaiky ny teny),'
mg1865::mg_60::3::2:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa hitany ny fahadiovan''ny fitondran-tenanareo amin''ny fahatahorana.'
mg1865::mg_60::3::3:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ny firavahanareo tsy ho zavatra eny ivelany, toy ny firandranam-bolo sy ny firava-bolamena na ny fiakanjoana;'
mg1865::mg_60::3::4:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa aoka ho toetra miafina ao am-po, izay tsy mety ho lo, dia ny fanahy malemy sady miadana, izay soa indrindra eo imason''Andriamanitra.'
mg1865::mg_60::3::5:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka izany no niravahan''ny vehivavy masina fahiny, izay nanantena an''Andriamanitra sady nanaiky ny vadiny;'
mg1865::mg_60::3::6:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tahaka an''i Saraha, izay nanaiky an''i Abrahama ka nanao azy hoe "tompoko"; dia zanany ianareo, raha mba manao soa ka tsy matahotra izay fampitahorana na inona na inona.'
mg1865::mg_60::3::7:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa, ianareo lehilahy, miaraha mitoetra aminy araka ny marina, manaja ny vavy, tahaka ny mety hatao amin''ny fanaka malemilemy kokoa sady mpiara-mandova ny fahasoavan''ny fiainana,- mba tsy ho voasakana ny fivavahanareo.'
mg1865::mg_60::3::8:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Famporisihana mba hitondra tena marina sy hiaritra tahaka ny niaretan''i Kristy'
  verse_text: 'Farany, miraisa saina ianareo rehetra. ka miaraha ory, mifankatiava tahaka ny mpirahalahy, mifamindrà fo, manetre tena,'
mg1865::mg_60::3::9:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mamaly ratsy ny ratsy, na fanaratsiana ny fanaratsiana; fa aoka hisaotra kosa, satria ho amin''izany no niantsoana anareo mba handova fitahiana.'
mg1865::mg_60::3::10:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: '"Fa na iza na iza maniry fiainana sy ta-hahita andro soa, Aoka izy hiaro ny lelany amin''ny ratsy Ary ny molony mba tsy hiteny fitaka;'
mg1865::mg_60::3::11:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka izy hiala amin''ny ratsy ka hanao soa; Aoka izy hitady fihavanana sy hanaraka azy.'
mg1865::mg_60::3::12:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mason''ny Tompo dia mitsinjo ny marina, Ary ny sofiny mihaino ny fitarainany, Fa ny tavan''ny Tompo dia tezitra amin''ny mpanao ratsy" (Salamo 34:12-16).'
mg1865::mg_60::3::13:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza no hanisy ratsy anareo, raha mazoto amin''izay tsara ianareo?'
mg1865::mg_60::3::14:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tàhiny mitondra fahoriana noho ny fahamarinana ianareo, dia sambatra; ary aza matahotra tahaka azy, ary aza mangorohoro ianareo;'
mg1865::mg_60::3::15:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa manamasïna an i''Kristy ho Tompo ao am-ponareo (Isaia 8:12-13) ary aoka ho vonona mandrakariva ianareo hamaly izay manontany anareo ny amin''ny anton''ny fanantenana ao anatinareo, nefa amin''ny fahalemem-panahy sy ny fanajana,'
mg1865::mg_60::3::16:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka manàna fieritreretana tsara, mba ho menatra izay manaratsy ny fitondran-tenanareo tsara ao amin''i Kristy, dia izay anendrikendrehana anareo.'
mg1865::mg_60::3::17:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha sitrapon''Andriamanitra, dia tsaratsara kokoa ny hitondra fahoriana amin''ny fanaovan-tsoa noho ny amin''ny fanaovan-dratsy.'
mg1865::mg_60::3::18:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kristy koa aza efa nijaly indray mandeha noho ny ota, ny Marina hamonjy ny tsy marina, mba hitondra antsika ho amin''Andriamanitra, ka novonoina tamin''ny nofo, fa novelomina tamin''ny fanahy,'
mg1865::mg_60::3::19:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nandehanany sy nitoriany teny tamin''ireo fanahy tao an-tranomaizina,'
mg1865::mg_60::3::20:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay tsy nanaiky fahiny, fony niandry ny fahari-pon''Andriamanitra tamin''ny andron''i Noa, raha mbola namboarina ny sambo-fiara, izay nidiran''ny olona vitsy, dia izy valo mianaka, ka dia namonjena azy ny rano,'
mg1865::mg_60::3::21:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay mamonjy anareo koa ankehitriny, dia ny batisa, izay tenan''io tandindona io,- tsy ny fanesorana ny fahalotoan''ny nofo anefa, fa ny fitadiavana* ny fieritreretana tsara eo anatrehan**''Andriamanitra***, amin''ny nitsanganan''i Jesoa Kristy tamin''ny maty. [*Na: fanontanian''] [** Na: amin''] [*** Na: ny fitadiavan''ny fieritreretana tsara an''Andriamanitra]'
mg1865::mg_60::3::22:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay eo amin''ny tanana ankavanan''Andriamanitra; fa efa lasa ho any an-danitra Izy ka efa nampanekena Azy ny anjely sy ny fahefana ary ny hery.'
mg1865::mg_60::4::1:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa satria niaritra tamin''ny nofo Kristy, dia alao mba ho fiadianareo izany saina izany; fa izay niaritra tamin''ny nofo dia efa afaka* tamin''ny ny ota; [*Grika:nampitsaharina]'
mg1865::mg_60::4::2:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy handanianareo ny andro sisa iainanareo amin''ny nofo araka ny filan''ny olona intsony, fa araka ny sitrapon''Andriamanitra.'
mg1865::mg_60::4::3:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ampy izay ny andro lasa ho nanaovana ny fanaon''ny jentilisa tamin''ny nandehanana tamin''ny fijejojejoana sy ny fanirian-dratsy sy ny fimamoana sy ny filalaovan-dratsy sy ny fisotroan-toaka ary ny fanompoan-tsampy izay fady indrindra;'
mg1865::mg_60::4::4:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''izany dia gaga izy ireo, satria tsy miara-mihazakazaka aminy ianareo amin''izany fanaranam-po amin''ny ratsy izany, ka dia teneniny ratsy;'
mg1865::mg_60::4::5:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa hampamoahin''ilay efa vonona hitsara ny velona sy ny maty'
mg1865::mg_60::4::6:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho izany no nitoriana ny filazantsara tamin''izay maty aza; mba hotsaraina araka ny olona amin''ny nofo izy fa ho velona araka an''Andriamanitra amin''ny fanahy.'
mg1865::mg_60::4::7:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa antomotra ny faran''ny zavatra rehetra; koa hendre ka mahonona tena ho amin''ny fivavahana.'
mg1865::mg_60::4::8:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mihoatra noho ny zavatra rehetra, mifankatiava tsara; fa "ny fitiavana manarona fahotana maro" (Ohabolana 10:12)'
mg1865::mg_60::4::9:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifampiantranoa, ka aza mimonomonona.'
mg1865::mg_60::4::10:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samia mifanompo araka ny fanomezam-pahasoavana izay noraisinareo, dia tahaka ny mpitandrina tsara ny fahasoavana maro samy hafa izay an''Andriamanitra.'
mg1865::mg_60::4::11:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona miteny, dia aoka izy hiteny toy ny milaza tenin''Andriamanitra; raha misy olona manompo, dia aoka izy hanao izany araka ny hery izay omen''Andriamanitra azy; mba hankalazana an''Andriamanitra amin''ny zavatra rehetra amin''ny alalan''i Jesoa Kristy; fa Azy ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena,'
mg1865::mg_60::4::12:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Fananarana mba hiaritra, raha enjehina noho ny fahamarinana'
  verse_text: 'Ry malala, aza gaga noho ny fizahan-toetra mahamay izay mahazo anareo ho fitsapan-toetra, ary aza atao ho zavatra mahagaga manjo anareo izany,'
mg1865::mg_60::4::13:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa araka ny iombonanareo fijaliana amin''i Kristy, dia mifalia, mba hiravoravoanareo indrindra amin''ny fisehoan''ny voninahiny koa.'
mg1865::mg_60::4::14:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ianareo, raha haratsina noho ny anaran''i Kristy, fa ny Fanahin''ny voninahitra, dia ny Fanahin''Andriamanitra, mipetraka ao aminareo.'
mg1865::mg_60::4::15:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aoka tsy hisy aminareo hijaly satria mpamono olona, na mpangalatra, na mpanao ratsy, na mpiraharaha ny an''olona.'
mg1865::mg_60::4::16:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy mijaly satria Kristiana, dia aoka tsy ho menatra izy; fa aoka hankalaza an''Andriamanitra amin''izany anarana izany izy.'
mg1865::mg_60::4::17:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga ny andro hiantombohan''ny fitsarana hatrao amin''ny ankohonan*''Andriamanitra; ary raha miantomboka amintsika izany, dia hanao ahoana kosa no hiafaran''izay tsy manaiky ny filazantsaran''Andriamanitra? [*Grika: tranony]'
mg1865::mg_60::4::18:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary "raha saiky tsy voavonjy ny marina, aiza no hisehoan ny ratsy fanahy sy ny mpanota? (Ohabolana 11:31).'
mg1865::mg_60::4::19:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay mitondra fahoriana araka ny sitrapon''Andriamanitra, dia aoka ny fanaovan-tsoa no hanolorany ny fanahiny ho an''ilay mahatoky, dia ny Mpanao azy.'
mg1865::mg_60::5::1:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny loholona mba ho malemy fanahy sy ho mahatoky, ary fananarana ny olona rehetra mba hanetry tena sy hitandrina. Vavaka farany sy fanaovam-beloma'
  verse_text: 'Koa ny amin''ny loholona* izay eo aminareo, izaho, izay naman ny loholona* sy vavolombelon''ny fijalian''i Kristy ary mpiombona ny voninahitra efa haseho koa, dia mananatra azy hoe: [*Grika: presbytera]'
mg1865::mg_60::5::2:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andraso ny ondrin''Andriamanitra izay eo aminareo*, mitandrina azy tsy an-tery, fa amin''ny sitrapo, [*araka an''Andriamanitra]; tsy amin''ny fitiavana harena maloto, fa amin''ny zotom-panahy; * [* Na: izay andraikitrareo]'
mg1865::mg_60::5::3:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy ho mpanjakazaka, amin''ny anjara-fiandrasana, fa ho fianaran''ny ondry.'
mg1865::mg_60::5::4:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa miseho ny Lohan''ny mpiandry, dia hahazo ny satro-boninahitra tsy mety simba ianareo,'
mg1865::mg_60::5::5:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo izay mbola tanora fanahy kosa, dia maneke ny loholona*. Eny, samia misikina fanetren-tena ianareo ka mifanompoa; fa "Andriamanitra manohitra ny miavonavona, fa manome fahasoavana ho an''ny manetry tena" (Ohabolana 3:34). [*Grika: presbytera]'
mg1865::mg_60::5::6:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany manetre tena ambanin''ny tàna-maherin''Andriamanitra, mba hanandratany anareo amin''ny fotoan''andro;'
mg1865::mg_60::5::7:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary apetraho aminy ny fanahianareo rehetra; fa Izy no miahy anareo (Salamo 55:22).'
mg1865::mg_60::5::8:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahonona tena, miambena: fa ny devoly fahavalonareo mandehandeha tahaka ny liona mierona mitady izay harapany;'
mg1865::mg_60::5::9:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tohero izy, ka miorena tsara amin''ny finoana ianareo, satria fantatrareo fa izany fahoriana izany dia manjo ny rahalahinareo rehetra eran''izao tontolo izao.'
mg1865::mg_60::5::10:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitry ny fahasoavana rehetra, Izay efa niantso anareo ho any amin''ny voninahiny mandrakizay ao amin''i Kristy, rehefa niaritra fahoriana vetivety ianareo, dia Izy no hahatanteraka sy hampiorina ary hampitoetra anareo.'
mg1865::mg_60::5::11:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho Azy anie ny fanjakana mandrakizay mandrakizay. Amena.'
mg1865::mg_60::5::12:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa manoratra teny fohifohy ho aminareo aho hampitondraina an''i Silasy, izay ataoko ho rahalahy mahatoky, dia mananatra anareo aho ka manambara fa izany no tena fahasoavan''Andriamanitra,- tomoera tsara amin''izany ianareo.'
mg1865::mg_60::5::13:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay any Babylona, voafidy ho namanareo, manao veloma anareo, ary Marka zanako koa.'
mg1865::mg_60::5::14:
  verse_version: mg1865
  verse_book: mg_60
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifanaova veloma amin''ny fanoroham-pitiavana. Ho aminareo rehetra izay ao amin''i Kristy anie ny fiadanana.'
