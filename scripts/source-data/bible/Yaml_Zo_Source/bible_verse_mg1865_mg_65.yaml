mg1865::mg_65::1::1:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny amin''ny mpampianatra sandoka'
  verse_text: 'Joda, mpanompon''i Jesoa Kristy sady rahalahin''i Jakoba, mamangy izay olona voantso, malala ao amin''Andriamanitra Ray sy voatahiry ho an''i Jesoa Kristy;'
mg1865::mg_65::1::2:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'hampitomboina ho anareo anie ny famindram-po sy ny fiadanana ary ny fitiavana.'
mg1865::mg_65::1::3:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry malala, raha manao izay zotom-po rehetra hanoratra aminareo aho hilaza ny amin''ny famonjena iombonantsika, dia nisy nahatery ahy hanoratra aminareo, hananatra mba hiezahanareo mafy hiaro ny finoana izay efa voatolotra indray mandeha monja ho an''ny olona masina.'
mg1865::mg_65::1::4:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy olona sasany efa niditra misokosoko, izay voasoratra fahiny ho amin''izany fahamelohana izany, dia olona ratsy fanahy izay mamadika ny fahasoavan''Andriamanitsika ho fijejojejoana sady nandà ny Andrian-tokana, dia Jesoa Kristy Tompontsika*. [*Na: mandà ny Andrian-tokana sy Jesoa Kristy Tompontsika]'
mg1865::mg_65::1::5:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ta-hampahatsiaro anareo aho, na dia efa fantatrareo rahateo aza ny zavatra rehetra, fa rehefa novonjen''ny Tompo ho afaka tany Egypta ny olona, dia naringany ihany tao aorian''izany izay tsy nino.'
mg1865::mg_65::1::6:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely izay tsy nitana ny anjara-fanapahany, fa nandao ny fonenany, dia voahazony amin''ny fatorana mandrakizay ao amin''ny maizina ho amin''ny andro fitsarana lehibe.'
mg1865::mg_65::1::7:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa, Sodoma sy Gomora mbamin''ny tanàna nanodidina azy, izay nijangajanga tahaka azy koa ka lasa nanaraka nofo hafa, dia aseho ho fananarana amin''ny iaretany fijaliana amin''ny afo maharitra mandrakizay.'
mg1865::mg_65::1::8:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa toy izany koa, ireo dia manonofy ka mandoto ny nofo sady mandà ny manana fahalehibiazana ary miteny ratsy* ny manana voninahitra. [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_65::1::9:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mikaela arikanjely aza, raha niady tamin''ny devoly ka nifanditra ny amin''ny fatin''i Mosesy, dia tsy sahy niteny ratsy hahameloka azy, fa hoy izy: "Hananatra anao anie Jehovah".'
mg1865::mg_65::1::10:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo kosa dia miteny ratsy izay zavatra rehetra tsy fantany akory; ary izay zavatra fantany fotsiny, tahaka ny fahalalan''ny biby tsy manan-tsaina kosa, no animbany* ny tenany. [*Na: andotoany]'
mg1865::mg_65::1::11:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahita loza izy! fa efa nandeha tamin''ny lalan''i Kaina, sady efa nimaona fatratra hanaraka ny fahadisoan''i Balama hahazoany tamby, ary efa ringana tamin''ny fiodinan''i Kora izy.'
mg1865::mg_65::1::12:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no harambato voasaron-drano* eo amin''ny fanasam-pifankatiavanareo, raha miara-mihinana aminareo izy, dia mpiandry mamahan-tena, nefa tsy matahotra; rahona tsy misy rano, entin''ny rivotra, ireo; hazo fararano, nefa tsy misy voany, indroa maty, voafongotra; [*Na: Ireo no pentimpentina]'
mg1865::mg_65::1::13:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'onjan-dranomasina mitopatopa mamorivory ny fahamenarany; kintana mifindrafindra, ka voatahiry ho azy mandrakizay ny fahamaintisan''ny maizina.'
mg1865::mg_65::1::14:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Enoka koa, ilay fahafito nandimby an''i Adama, dia efa naminany ny amin''ireny olona ireny ka nanao hoe: "Indro, tonga Jehovah mbamin''ny masiny tsy omby alinalina'
mg1865::mg_65::1::15:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'hitsara ny olona rehetra sy hampiaiky ny olona ratsy fanahy rehetra ny asan''ny haratsiam-panahy rehetra, izay nataony tamin''ny haratsiam-panahiny sy ny teny sarotra rehetra izay nitenenan''ny mpanota ratsy fanahy hanohitra Azy."'
mg1865::mg_65::1::16:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia mpimonomonona sy mpimoimoy, mandeha araka ny filany (ary ny vavany manao teny miavonavona loatra) ka mandoka olona mba hahazoany zavatra.'
mg1865::mg_65::1::17:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsarovinareo, ry malala, ny teny voalazan''ny Apostolin''i Jesoa Kristy Tompontsika fahiny;'
mg1865::mg_65::1::18:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nilaza taminareo hoe izy: Amin''ny andro farany dia hisy mpaniratsira, mandeha araka ny filan''ny haratsiam-panahiny.'
mg1865::mg_65::1::19:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no mahatonga fisarahana, dia olona araka ny nofo ihany, fa tsy mba manana ny Fanahy*. [*Na: tsy mba manana fanahy]'
mg1865::mg_65::1::20:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa, ry malala, dia ataovy izay handrosoanareo amin''ny finoanareo masina indrindra, ka mivavaha ao amin''ny Fanahy Masina;'
mg1865::mg_65::1::21:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tehirizo ny tenanareo ao amin''ny fitiavan''Andriamanitra, miandry ny famindram-pon''i Jesoa Kristy Tompontsika ho fiainana mandrakizay.'
mg1865::mg_65::1::22:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amindrao fo ny sasany izay miahanahana*; [*Na: raha miady aminareo izy]'
mg1865::mg_65::1::23:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sasany kosa sariho avy amin''ny afo no famonjy azy; ary ny sasany indray amindrao fo amin-tahotra, ka mankahalà na dia ny akanjo voapentimpentin''ny nofo aza.'
mg1865::mg_65::1::24:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''izay maharo anareo mba tsy ho tafintohina, ary hametraka anareo tsy hanan-tsiny eo anoloan''ny voninahiny amin''ny firavoravoana,'
mg1865::mg_65::1::25:
  verse_version: mg1865
  verse_book: mg_65
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho an''Andriamanitra tokana, Mpamonjy antsika, amin''ny alalan i Jesoa Kristy Tompontsika anie, ny voninahitra sy ny fahalehibiazana, ny fanjakana sy ny fahefana hatramin''ny taloha indrindra sy ankehitriny ary mandrakizay. Amena.'
