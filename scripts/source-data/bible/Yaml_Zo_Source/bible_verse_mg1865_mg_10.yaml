mg1865::mg_10::1::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nataon''i Davida, rehefa nahare ny nahafatesan''i Saoly, sy ny hira fisaonana nentiny nisaona azy'
  verse_text: 'Ary nony maty Saoly, ary niverina avy namono ny Amalekita Davida, dia nitoetra indroa andro tao Ziklaga izy.'
mg1865::mg_10::1::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahatelo, indro, nisy lehilahy iray tonga avy tany amin''ny miaramilan''i Saoly, triatra ny akanjony sady nihosin-tany ny lohany; ary rehefa tonga teo amin''i Davida izy, dia niankohoka tamin''ny tany ka nitsaoka.'
mg1865::mg_10::1::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida taminy: Avy taiza moa ianao? Dia hoy izy taminy: Afaka nandositra avy tany amin''ny tobin''ny Isiraely aho.'
mg1865::mg_10::1::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida taminy: Nanao ahoana izay tany? Masïna ianao, ambarao amiko. Dia hoy izy: Ny olona nandositra tamin''ny ady, ary be koa ny miampatrampatra sy maty, ary maty koa Saoly sy Jonatana zanany.'
mg1865::mg_10::1::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''ilay zatovo niteny taminy: Ahoana no nahafantaranao fa maty Saoly sy Jonatana zanany.'
mg1865::mg_10::1::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanambara taminy ilay zatovo nanao hoe: Sendra tao an-tendrombohitra Gilboa aho, ary, indro, Saoly nitehina tamin''ny lefony; ary, indreo, ny kalesy sy ny mpitaingin-tsoavaly nanenjika azy mafy.'
mg1865::mg_10::1::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niherika izy ka nahita ahy; ary niantso ahy izy, ka hoy izaho: Inty aho.'
mg1865::mg_10::1::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Iza moa ianao? Dia hoy izaho taminy: Amalekita aho.'
mg1865::mg_10::1::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy indray izy tamiko: Masïna ianao, hatony kely aho, ka vonoy, fa marary mivonkina ozatra aho, fa mbola ato anatiko ihany ny aiko.'
mg1865::mg_10::1::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona azy aho ka namono azy, satria fantatro fa tsy ho velona izy, rehefa resy*, ka dia nalaiko ny satro-boninahiny teo an-dohany sy ny fehin-tanana teo amin''ny sandriny, ka nentiko ety amin''ny tompoko izany. [*Hebreo: lavo]'
mg1865::mg_10::1::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Davida ny fitafiany ka notriariny: ary dia mba nanao toy izany koa ny olona rehetra teo aminy.'
mg1865::mg_10::1::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisaona sy nitomany sy nifady hanina ambara-paharivan''ny andro izy noho ny amin''i Saoly sy Jonatana zanany sy ny olon''i Jehovah ary ny taranak''Isiraely, satria lavon-tsabatra ireny.'
mg1865::mg_10::1::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''ilay zatovo nanambara taminy: Avy aiza ianao? Ary hoy izy: Zanaky ny vahiny Amalekita aho.'
mg1865::mg_10::1::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida taminy: Nahoana ianao no tsy natahotra haninjitra ny tananao hamono ny voahosotr''i Jehovah?'
mg1865::mg_10::1::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso zatovo anankiray Davida ka nanao hoe: Hatony io, ka vonoy; dia nasiany izy ka maty.'
mg1865::mg_10::1::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy Davida taminy: Aoka ny rànao ho eo amin''ny lohanao, satria ny vavanao ihany no efa niampanga anao nanao hoe: Izaho no namono ny voahosotr''i Jehovah.'
mg1865::mg_10::1::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nisaona an''i Saoly sy Jonatana zanany tamin''izao hira fisaonana izao'
mg1865::mg_10::1::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: '(ary nasainy nampianarina ny taranak''i Joda ny hira atao hoe Tsipika; indro, voasoratra ao amin''ny Bokin''i Jasara* izany): [*Jasara = Ilay mahitsy]'
mg1865::mg_10::1::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay voninahitrao*, ry Isiraely, no voalefona teo amin''ny havoananao; Endrey! Lavo ny mahery! [*Na: gazelanao, dia anaram-biby haingan-tongotra]'
mg1865::mg_10::1::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ambaranareo any Gata izany, Aza torinareo ho fifaliana any an-dalamben''i Askelona. Fandrao mifaly ny zanakavavin''ny Filistina. Fandrao miravoravo ny zanakavavin''ny tsy mifora.'
mg1865::mg_10::1::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo tendrombohitra Gilboa, Aza misy ando aman''orana intsony eny aminareo, na saha angalana fanatitra asandratra, satria tany no nandotoana* ny ampingan''ny mahery, Dia ny ampingan''i Saoly, ka** tsy nohosorana diloilo. [*Na: nanariana] [**Na: toy ny an''izay]'
mg1865::mg_10::1::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsipïkan''i Jonatana tsy nihemotra. Raha tsy nahazo ny ran''ny maty sy ny tavin''ny mahery; ary ny sabatr''i Saoly tsy mba niverina foana.'
mg1865::mg_10::1::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saoly sy Jonatana, izay tiana sady mahate-ho-tia fony fahavelony, dia tsy nosarahina na dia tamin''ny nahafatesany aza; Faingana noho ny voromahery izy ary mahery noho ny liona.'
mg1865::mg_10::1::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanakavavin''Isiraely, mitomania an''i Saoly, fa nahafinaritra ny mampitafiany jaky anareo, sady nasiany firava-bolamena ny fitafianareo.'
mg1865::mg_10::1::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! lavo teo amin''ny ady ny mahery voalefona teo amin''ny havoananao Jonatana.'
mg1865::mg_10::1::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ory noho ny aminao aho, ry Jonatana rahalahiko; nahafinaritra ahy indrindra ianao; nahagaga ny fitiavanao ahy mihoatra noho ny fitiavan''ny vehivavy.'
mg1865::mg_10::1::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey! lavo ny mahery, ary levona ny fiadiana!'
mg1865::mg_10::2::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanjakan''i Davida tamin''ny Joda, sy ny nanjakan''Isboseta tamin''ny Isiraely, ary ny niadian''izy roa tonta tao Gibeona'
  verse_text: 'Ary rehefa afaka izany, Davida dia nanontany tamin''i Jehovah hoe: Hiakatra ho any amin''ny tanànan''ny Joda anankiray va aho? Dia hoy Jehovah taminy: Miakara. Ary hoy Davida: Any aninona no hiakarako? Dia hoy Izy: Any Hebrona.'
mg1865::mg_10::2::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra nankany Davida mbamin''ny vadiny roa, dia Ahinoama Jezirelita sy Abigaila, ilay novinadin''i Nabala Karmelita.'
mg1865::mg_10::2::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay tao amin''i Davida mbamin''ny ankohonan''ireo dia samy nentiny niakatra koa, ka nonina tao amin''ny tanàna momba an''i Hebrona izy ireo.'
mg1865::mg_10::2::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia avy ny lehilahy amin''ny Joda ka nanosotra an''i Davida tao mba ho mpanjaka amin''ny taranak''i Joda. Ary nisy nanambara tamin''i Davida hoe: Ny olona any Jabesi-gileada no nandevina an''i Saoly.'
mg1865::mg_10::2::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia naniraka olona hankany amin''ny mponina any Jabesi-gileada hanao aminy hoe: Hotahin''i Jehovah anie ianareo noho ny soa nataonareo tamin''i Saoly tomponareo tamin''ny nandevenanareo azy.'
mg1865::mg_10::2::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa haneho famindram-po sy fahamarinana aminareo anie Jehovah, sady izaho koa efa manao izao soa izao aminareo noho ny nanaovanareo izany zavatra izany.'
mg1865::mg_10::2::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, aoka hampaherezina anie ny tananareo, ary aoka hatanjaka ianareo; fa maty Saoly tomponareo, ary izaho no nohosoran''ny firenen''i Joda ho mpanjakany.'
mg1865::mg_10::2::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Abnera, zanak''i Nera, komandin''ny miaramilan''i Saoly, efa naka an''Isboseta, zanakalahin''i Saoly, ka nitondra azy nankany Mahanaima,'
mg1865::mg_10::2::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nampanjaka azy tamin''i Gileada sy ny Asorita* sy Jezirela sy ny Efraima sy ny Benjamina ary ny Isiraely rehetra. [*Na: (Gesorita)]'
mg1865::mg_10::2::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: '(Ary efa-polo taona no nahaveloman''Isboseta, zanak''i Saoly, fony izy vao nanjaka amin''ny Isiraely, ary roa taona no nanjakany.) Fa ny firenen''i Joda nomba an''i Davida.'
mg1865::mg_10::2::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nanjakan''i Davida tao Hebrona tamin''ny taranak''i Joda dia fito taona sy enim-bolana.'
mg1865::mg_10::2::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera, zanak''i Nera, sy ny mpanompon''Isboseta, zanak''i Saoly, niala tao Mahanaima ka nankany Gibeona.'
mg1865::mg_10::2::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba, zanak''i Zeroia, sy ny mpanompon''i Davida nivoaka ka nihaona tamin''ireo teo amoron''ny kamory tao Gibeona; ary samy nipetraka teo amin''ny lafin''ny kamory avy izy.'
mg1865::mg_10::2::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Abnera tamin''i Joaba: Masïna ianao, aoka hitsangana ny zatovo hanao kilalao eto anatrehantsika. Ary hoy Joaba; Aoka ary izy hitsangana.'
mg1865::mg_10::2::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy nitsangana ka nita, dia roa ambin''ny folo lahy tamin''ny Benjamina, izay an''Isboseta, zanak''i Saoly, ary roa ambin''ny folo lahy koa tamin''ny mpanompon''i Davida.'
mg1865::mg_10::2::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy rehetra samy nifanavika nifampihazon-doha ka nifandefon-tehezana tamin''ny sabatra, dia niara-nikarapoka; koa izany no nanaovana izany fitoerana ao Gibeona izany hoe Helkata-hazorima*. [*Helkata-hazorima = Tamin''ny sabatra maranitra]'
mg1865::mg_10::2::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mafy ny ady tamin''izany andro izany; ary dia resy teo anoloan''ny mpanompon''i Davida Abnera sy ny lehilahy amin''ny Isiraely.'
mg1865::mg_10::2::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mba teo koa izy telo lahy zanak''i Zeroia, dia Joaba sy Abisay ary Asahela; ary Asahela dia haingan-tongotra tahaka ny gazela* any an''efitra. [*Izahao II Samoela 1:19]'
mg1865::mg_10::2::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asahela nanenjika an''i Abnera, ka ny fandehany nanenjika an''i Abnera dia tsy nivily akory na tamin''ny ankavanana na tamin''ny ankavia.'
mg1865::mg_10::2::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera niherika ka nanao hoe: Ianao moa izany, no Asahela? Dia hoy izy: Izaho ity.'
mg1865::mg_10::2::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Abnera taminy: Mivilia ianao, na ho amin''ny ankavanana, na ho amin''ny ankavia, ary zatovo anankiray no sambory, ka baboy ho anao izay eny aminy rehetra. Fa Asahela tsy nety nivily, fa nanenjika azy ihany.'
mg1865::mg_10::2::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy indray Abnera tamin''i Asahela: Mivilia ianao, fa aza manenjika ahy; fa hataoko inona moa izay hamely anao hikarapoka amin''ny tany, ary hataoko ahoana no fijery an''i Joaba rahalahinao?'
mg1865::mg_10::2::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nety nivily ihany izy, ka dia nasian''i Abnera ny antsedefona ny kibony, ka dia niboroaka teo an-damosiny ny lefona, ary nikarapoka teo izy ka maty niaraka tamin''izay. Ary izay rehetra tonga teo amin''ilay nikarapohan''i Asahela sy nahafatesany dia nijanona.'
mg1865::mg_10::2::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba sy Abisay dia nanenjika an''i Abnera; ka nony tonga teo amin''ny havoana Ama izy, izay tandrifin''i Gia amin''ny lalana mankany amin''ny efitr''i Gibeona, dia maty ny masoandro.'
mg1865::mg_10::2::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Benjamina niangona teo amin''i Abnera ka nifoko ho iray toko ary nijanona teo an-tampon''ny havoana anankiray.'
mg1865::mg_10::2::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera niantso an''i Joaba hoe: Handany mandrakizay va ny sabatra? Tsy fantatrao va fa hangidy ny hiafaran''izany? Koa mandra-pahoviana no tsy hampivereninao ny olona tsy hanenjika ny rahalahiny?'
mg1865::mg_10::2::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Joaba: Raha velona koa Andriamanitra, raha tsy ilay teninao*, dia efa lasa nody any naraina avokoa ny olona ka tsy nanenjika ny rahalahiny akory. [*Izaho II Samoela 2:14]'
mg1865::mg_10::2::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsoka ny anjomara Joaba, ka dia nijanona ny olona rehetra, ary tsy nanenjika ny Isiraely intsony na niady taminy intsony izy.'
mg1865::mg_10::2::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera sy ny olony nandeha mandritra ny alina namaky ny tani-hay*, dia nita an''i Jordana sy namaky an''i Bitrona rehetra, ka dia tonga tao Mahanaima izy. [*Hebreo: Arabà]'
mg1865::mg_10::2::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niverina Joaba avy nanenjika an''i Abnera, dia novoriny ny olona rehetra, ary sivy ambin''ny folo lahy ihany mbamin''i Asahela no tsy teo ny mpanompon''i Davida.'
mg1865::mg_10::2::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanompon''i Davida efa nahafaty enim-polo sy telon-jato lahy tamin''ny Benjamita sy ny olon''i Abnera.'
mg1865::mg_10::2::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Asahela dia nentiny ka naleviny tao amin''ny fasan-drainy, izay tao Betlehema. Ary Joaba sy ny olony nandeha mandritra ny alina, dia tonga tao Hebrona raha vao nazava ratsy ny andro.'
mg1865::mg_10::3::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandrosoan''ny fanjakan''i Davida, sy ny nihenan''ny an''Isboseta kosa, ary ny nivadihan''i Abnera hanaraka an''i Davida, sy ny namonoan''i Joaba azy'
  verse_text: 'Ary naharitra ela ny adin''ny tamingan''i Saoly sy ny tamingan''i Davida, nefa Davida nihahery, fa ny tamingan''i Saoly kosa nihahosa.'
mg1865::mg_10::3::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida niteraka zazalahy tao Hebrona: koa Amnona, tamin''i Ahinoama Jezirelita, no lahimatoany;'
mg1865::mg_10::3::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Kileaba, tamin''i Abigaila, ilay novinadin''i Nabala Karmelita, no lahiaivo; ary ny fahatelo dia Absaloma, zanak''i Maka, zanakavavin''i Talmay, mpanjakan''i Gesora;'
mg1865::mg_10::3::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fahefatra dia Adonia, zanak''i Hagita; ary ny fahadimy dia Sefatia, zanak''i Abitala;'
mg1865::mg_10::3::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fahenina dia Jitreama, tamin''i Egla, vadin''i Davida. Ireo no naterak''i Davida tao Hebrona.'
mg1865::mg_10::3::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niady ny tamingan''i Davida sy ny tamingan''i Saoly, Abnera dia nampiseho hery niandany tamin''ny tamingan''i Saoly.'
mg1865::mg_10::3::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: '(Ary Saoly nanana vaditsindrano, Rizpa no anarany, zanakavavin''i Aia) Kanefa Isboseta niteny tamin''i Abnera hoe: Nahoana no nalainao ny vaditsindranon''ikaky?'
mg1865::mg_10::3::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra mafy Abnera noho ny tenin''Isboseta, ka hoy izy: Lohan''alika no miandany amin''ny Joda va aho? He! izato izaho manisy soa ny tamingan''i Saoly rainao sy ny rahalahiny sy ny sakaizany izao ka tsy nanolotra anao ho eo an-tanan''i Davida, nefa aho izao helohinao noho ny amin''iny vehivavy iny?'
mg1865::mg_10::3::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataon''Andriamanitra amin''i Abnera anie izany, eny, mihoatra noho izany aza, raha tsy hataoko aminy araka ny nianianan''i Jehovah tamin''i Davida,'
mg1865::mg_10::3::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hampiala ny fanjakana amin''ny tamingan''i Saoly aho ary hampitoetra ny seza fiandrianan''i Davida amin''ny Isiraely sy amin''ny Joda hatrany Dana ka hatrany Beri-sheba.'
mg1865::mg_10::3::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy nahavaly an''i Abnera intsony izy noho ny tahony azy.'
mg1865::mg_10::3::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera dia naniraka olona tany amin''i Davida niaraka tamin''izay* hanao hoe: An''iza ny tany? Ary koa hoe: Manaova fanekena amiko, ary, indro, ny tanako homba anao hampanaiky ny Isiraely rehetra anao. [*Na: hisolo vava azy]'
mg1865::mg_10::3::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Tsara izany; izaho hanao fanekena aminao; kanefa zavatra iray loha no ilaiko aminao: Tsy hahazo mihaona amiko ianao, raha tsy entinao aty Mikala, zanakavavin''i Saoly.'
mg1865::mg_10::3::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naniraka olona nankany amin''Isboseta, zanakalahin''i Saoly, hanao hoe: Omeo ahy Mikala vadiko, izay efa nifanekena ho vadiko tamin''ny mariky ny fahafatesan*''ny Filistina zato lahy. [*Hebreo: saron-tsotsoka]'
mg1865::mg_10::3::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isboseta naniraka naka an''i Mikala tany amin''i Paltiela vadiny, zanak''i Laisy.'
mg1865::mg_10::3::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary io vadiny io nanaraka azy ka nitomany teny aoriany hatrany Bahorima. Fa hoy Abnera taminy: Mandehana miverina. Dia niverina izy.'
mg1865::mg_10::3::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera efa niteny tamin''ny loholon''ny Isiraely hoe: Efa ela izay no nitadiavanareo an''i Davida ho mpanjakanareo;'
mg1865::mg_10::3::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa tanteraho izany ankehitriny, fa Jehovah efa nilaza an''i Davida hoe: Amin''ny tanan''i Davida mpanompoko no hamonjeko ny Isiraely oloko ho afaka amin''ny tanan''ny Filistina sy amin''ny tanan''ny fahavalony rehetra.'
mg1865::mg_10::3::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abnera efa niteny tamin''ny Benjamita koa, ary lasa izy hilaza amin''i Davida ao Hebrona koa izay rehetra tian''ny Isiraely sy ny taranak''i Benjamina rehetra hatao.'
mg1865::mg_10::3::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tany amin''i Davida tao Hebrona Abnera sy olona roa-polo lahy nanaraka azy. Ary nanao fanasana ho an''i Abnera sy ny olona nanaraka azy Davida.'
mg1865::mg_10::3::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Abnera tamin''i Davida: Hiainga aho, dia handeha hamory ny Isiraely rehetra ho ety aminao mpanjaka tompoko, mba hanaovany fanekena aminao ary hanjakanao amin''izay rehetra irin''ny fonao. Ary Davida nampandeha an''i Abnera; ka dia lasa soa aman-tsara izy.'
mg1865::mg_10::3::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, tonga ny mpanaraka an''i Davida sy Joaba avy nitoha ka nitondra babo be; ary efa tsy teo amin''i Davida tao Hebrona intsony Abnera, fa efa nalefany izy, ka dia lasa soa aman-tsara.'
mg1865::mg_10::3::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony tonga Joaba sy ny miaramila rehetra izay nanaraka azy, dia nisy nanambara tamin''i Joaba hoe: Tonga tao amin''ny mpanjaka Abnera, zanak''i Nera, nefa nalefany izy, ka dia lasa soa aman-tsara.'
mg1865::mg_10::3::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba nankao amin''ny mpanjaka ka nanao hoe: Inona izany nataonao izany? Nahoana no efa tonga teto aminao Abnera ka nalefanao fotsiny, ka dia afaka soa aman-tsara izy?'
mg1865::mg_10::3::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao anefa ny amin''i Abnera, zanak''i Nera, fa hamitaka anao no nahatongavany hahalalany ny ivoahanao sy ny idiranao ary hahalalany izay rehetra ataonao.'
mg1865::mg_10::3::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka Joaba avy tao amin''i Davida ka naniraka olona hanaraka an''i Abnera, ary nitondra azy niverina avy any amin''ny lavaka famorian-drano atao hoe Siraha ireo: nefa tsy fantatr''i Davida izany.'
mg1865::mg_10::3::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niverina tao Hebrona Abnera, dia nentin''i Joaba nitanila tao anaty vavahady hiresaka aminy mangingina, kanjo nasiany tamin''ny kibony ka matiny ho todin''ny ran''i Asahela rahalahiny.'
mg1865::mg_10::3::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nahare Davida, ka hoy izy: Tsy manan-keloka mandrakizay eo anatrehan''i Jehovah izaho sy ny fanjakako ny amin''ny ran''i Abnera, zanak''i Nera.'
mg1865::mg_10::3::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsingerina amin''ny lohan''i Joaba sy ny tarana-drainy rehetra anie ny todin''izany; ary tsy ho tapaka amin''ny taranak''i Joaba anie ny marary mitsika, na ny boka, na ny mamahana amin''ny tehina, na ny lavon-tsabatra, na ny tsy manan-kohanina.'
mg1865::mg_10::3::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no namonoan''i Joaba sy Abisay rahalahiny an''i Abnera noho ny namonoany an''i Asahela rahalahiny tao Gibeona tamin''ny ady.'
mg1865::mg_10::3::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Joaba sy ny olona rehetra izay teo aminy: Triaro ny fitafianareo, ary misikìna lamba fisaonana*, ka aoka hisaona eo anolohan''i Abnera ianareo. Ary Davida mpanjaka nanaraka ny tranovorona. [*Hebreo: lamba malailay]'
mg1865::mg_10::3::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandevina an''i Abnera tao Hebrona izy; ary ny mpanjaka nanandratra ny feony ka nitomany teo amin''ny fasan''i Abnera; ary ny vahoaka rehetra dia mba nitomany koa.'
mg1865::mg_10::3::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nanao hira fisaonana an''i Abnera hoe: Tahaka ny fahafatesan''ny adala va no tokony ho nahafatesan''i Abnera?'
mg1865::mg_10::3::34:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tananao tsy nifatotra, ary ny tongotrao tsy nigadra; Fa tahaka ny fikarapok''izay asian''ny olon-dratsy no nikarapohanao. Ary ny vahoaka rehetra dia mbola nitomany azy indray.'
mg1865::mg_10::3::35:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy rehetra dia avy hampihinan-kanina an''i Davida raha mbola antoandro, nefa Davida nianiana hoe: Hataon''Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha mba hitendry hanina na inona na inona akory aho mandra-pilentiky ny masoandro.'
mg1865::mg_10::3::36:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary azon''ny vahoaka rehetra ny hevitr''izany ka nankasitrahany, dia tahaka ny nankasitrahany izay rehetra nataon''ny mpanjaka.'
mg1865::mg_10::3::37:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia fantatry ny vahoaka rehetra sy ny Isiraely rehetra tamin''izany andro izany fa tsy avy tamin''ny mpanjaka no nahafaty an''i Abnera, zanak''i Nera.'
mg1865::mg_10::3::38:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''ny mpanompony: Tsy fantatrareo va fa komandy sady lehilahy malaza no maty androany tamin''ny Isiraely?'
mg1865::mg_10::3::39:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 3
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mbola manan-kery loatra aho izao, na dia mpanjaka efa voahosotra aza; ary ireo zanak''i Zeroia ireo dia mahery sata loatra amiko; Jehovah anie hamaly izay nanao izao ratsy izao araka ny ratsy nataony.'
mg1865::mg_10::4::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namonoana an''Isboseta, sy ny namalian''i Davida ireo namono azy kosa'
  verse_text: 'Ary nony ren''ny zanakalahin''i Saoly fa maty tany Hebrona Abnera, dia niraviravy tanana izy, ary raiki-tahotra ny Isiraely rehetra.'
mg1865::mg_10::4::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy roa lahy, lehiben''ny mpitohan''ny zanakalahin''i Saoly, Bana no anaran''ny iray, ary Rekaba no anaran''ny iray, samy zanak''i Rimona Berotita tamin''ny taranak''i Benjamina (fa Berota koa natao ho isan''ny an''i Benjamina;'
mg1865::mg_10::4::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny Berotita nandositra nankany Gitaima, dia nivahiny tany mandraka androany).'
mg1865::mg_10::4::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana, zanak''i Saoly, nanan-janakalahy malemy tongotra. Dimy taona izy, fony tonga avy tany Jezirela ny filazana ny amin''i Saoly sy Jonatana; ary nentin''ny mpitaiza azy nandositra izy; ary raha nentiny nandositra tamin''ny fahatairana izy, dia nianjera ka tonga malemy tongotra, Mefiboseta no anarany.'
mg1865::mg_10::4::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rekaba sy Bana, zanak''i Rimona Berotita, nandeha; ka rehefa nafana ny andro, dia tonga tao an-tranon''Isboseta, tamin''ilay izy nandriandry tamin''ny antoandro iny.'
mg1865::mg_10::4::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra tao anaty trano Rekaba sy Bana rahalahiny haka vary, ka namely azy tamin''ny kibony, dia lasa nandositra.'
mg1865::mg_10::4::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha niditra tao an-trano izy roa lahy, ary Isboseta nandry teo amin''ny fandriany tao amin''ny trano fandriany dia namely azy izy roa lahy ka nahafaty azy, dia notapahiny ny lohany ka nentiny; ary nandeha mandritra ny alina namaky ny tani-hay* izy. [*Hebreo: Arabà]'
mg1865::mg_10::4::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra ny lohan''Isboseta tany amin''i Davida tao Hebrona izy ka nanao tamin''ny mpanjaka hoe: Indro ny lohan''Isboseta, zanak''i Saoly fahavalonao, izay nitady ny ainao; fa Jehovah efa namaly an''i Saoly sy ny taranany androany noho ny amin''ny mpanjaka tompoko.'
mg1865::mg_10::4::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Rekaba sy Bana rahalahiny, zanak''i Rimona Berotita: Raha velona koa Jehovah, Izay namonjy ahy tamin''ny fahoriana rehetra,'
mg1865::mg_10::4::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ilay nanambara tamiko hoe: Indro, maty Saoly, ka nanao ny tenany ho mpitondra teny mahafaly, dia nohazoniko ka novonoiko tao Ziklaga. hanomezako azy ny valin*''ny teny mahafaly nentiny; [*Na: dia olona nampoizina homeko valim-pitia noho]'
mg1865::mg_10::4::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa mainka raha misy olon-dratsy mamono lehilahy marina ao an-tranony eo am-pandriany; koa tsy hadiniko eo an-tananareo va ny ràny, ary tsy hofongorako tsy ho amin''ny tany intsony va ianareo'
mg1865::mg_10::4::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nandidy ny zatovony, dia namono azy ireo, ka notapahiny ny tanany sy ny tongony, dia nahantony teo anilan''ny kamory tao Hebrona. Fa ny lohan''Isboseta kosa dia nentina ka nalevina tao am-pasan''i Abnera tao Hebrona.'
mg1865::mg_10::5::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanosorana an''i Davida ho mpanjakan''ny Isiraely rehetra, sy ny nahazoany an''i Jerosalema ho renivohitry ny fanjakany'
  verse_text: 'Dia tonga tao amin''i Davida tao Hebrona ny firenen''Isiraely rehetra ka nanao hoe: Indreto izahay, fa taolanao sy nofonao.'
mg1865::mg_10::5::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatry ny fony fahiny ihany koa, raha mbola nanjaka taminay aza Saoly, dia ianao no mpitarika ny Isiraely nivoaka sy niditra; ary Jehovah efa nilaza taminao hoe: Ianao no ho mpiandry ny Isiraely oloko, ary ianao no ho mpanapaka azy.'
mg1865::mg_10::5::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tonga tao amin''ny mpanjaka tao Hebrona ny loholon''ny Isiraely rehetra, ary Davida mpanjaka nanao fanekena taminy tao Hebrona teo anatrehan''i Jehovah; ary dia nanosotra an''i Davida ho mpanjakan''ny Isiraely izy.'
mg1865::mg_10::5::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Telo-polo taona Davida fony izy vao nanjaka, ary nanjaka efa-polo taona izy.'
mg1865::mg_10::5::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tao Hebrona no nanjakany tamin''ny Joda fito taona sy enim-bolana; ary tany Jerosalema no nanjakany tamin''ny Isiraely sy ny Joda rehetra telo amby telo-polo taona.'
mg1865::mg_10::5::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka sy ny olony nankany Jerosalema hiady amin''ny Jebosita tompon-tany, ary hoy izy ireo tamin''i Davida: Tsy ho tafiditra eto ianao; fa na dia ny jamba ny mandringa aza dia hahasakana anao ka hanao hoe*: Tsy ho tafiditra eto Davida. [*Na: ary ny heviny tamin''izany dia toy ny manao hoe:]'
mg1865::mg_10::5::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo afak''i Davida ihany ny batery fiarovana, dia Ziona (Tanànan''i Davida izany).'
mg1865::mg_10::5::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''izany andro izany: Izay mamely ny Jebosita, dia aoka hananika ho eo amin''ny riana ka hamely, ny mandringa sy ny jamba izay halan''ny fon''i Davida. Koa dia mby am-pitenenana hoe: Izay jamba mandringa tsy ho tafiditra ao an-trano.'
mg1865::mg_10::5::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitoetra tao anatin''ny batery fiarovana Davida, ary ny anarany nataony hoe: Tanànan''i Davida. Ary narafitr''i Davida ny manodidina hatrany Milo* mbamin''ny ao anatiny. [*Hebreo: fiarovana]'
mg1865::mg_10::5::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nandroso sy nihalehibe Davida, fa Jehovah, Andriamanitry ny maro, no nomba azy.'
mg1865::mg_10::5::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny amin''ny lapan''i Davida, sy ny vadiny aman-janany'
  verse_text: 'Ary Hirama, mpanjakan''i Tyro, naniraka olona tany amin''i Davida nampanatitra hazo sedera ary nandefa mpandrafitra sy tambato; dia nanao trano ho an''i Davida ireo.'
mg1865::mg_10::5::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia fantatr''i Davida fa Jehovah efa nampitoetra azy ho mpanjakan''ny Isiraely ka nanandratra ny fanjakany noho ny amin''ny Isiraely olony.'
mg1865::mg_10::5::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mbola naka vaditsindrano sy vady koa tany Jerosalema, rehefa tonga avy tany Hebrona izy; ary dia nisy zanakalahy sy zanakavavy koa naterak''i Davida.'
mg1865::mg_10::5::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny naterany tany Jerosalema: Samoa sy Sobaba sy Natana sy Solomona'
mg1865::mg_10::5::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jibara sy Elisoa sy Nafega sy Jafia'
mg1865::mg_10::5::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Elisama sy Eliada ary Elifeleta.'
mg1865::mg_10::5::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny nandresen''i Davida ny Filistina'
  verse_text: 'Koa nony ren''ny Filistina fa efa nohosoran''ny olona ho mpanjakan''ny Isiraely Davida, dia niakatra hitady azy ny Filistina rehetra; fa raha ren''i Davida izany dia nidina tao amin''ny batery fiarovana izy.'
mg1865::mg_10::5::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga ny Filistina ka nihahakahaka teny amin''ny Lohasahan''ny Refaita.'
mg1865::mg_10::5::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanontany tamin''i Jehovah hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy Jehovah tamin''i Davida: Miakara, fa hatolotro eo an-tananao tokoa ny Filistina.'
mg1865::mg_10::5::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida tonga tao Bala-perazima* ka namely ireo tao, dia hoy izy: Jehovah efa namaky ny fahavaloko teo anoloako hipariaka toy ny rano vaky; koa izany no nanaovany ny anaran''izany tany izany hoe Bala-perazima. [*Bala-perazima = Tany nahavakiana]'
mg1865::mg_10::5::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nilaozany tao ny sampiny, ka dia lasan''i Davida sy ny olony ireny.'
mg1865::mg_10::5::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra indray ny Filistina ka nihahakahaka teny amin''ny Lohasahan''ny Refaita.'
mg1865::mg_10::5::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanontany tamin''i Jehovah Davida, ka novaliany hoe: Aza mandeha; fa hodidino avy eo aoriana izy, ka ho tonga eo aminy ianao eo amin''ny tandrifin''ny hazo balsama.'
mg1865::mg_10::5::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha toa mahare fingadongadon''olona eny amin''ny tendron''ny hazo balsama ianao, dia faingàna; fa amin''izay no efa miainga mialoha anao Jehovah hamely ny miaramilan''ny Filistina.'
mg1865::mg_10::5::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanao araka ny nandidian''i Jehovah azy Davida ka dia namely ny Filistina hatrany Geba ka hatrao akaikin''i Gazera izy.'
mg1865::mg_10::6::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namindrana ny fiaran''i Jehovah nankany Jerosalema'
  verse_text: 'Ary novorin''i Davida indray ny lehilahy voafantina rehetra tamin''ny Isiraely, dia telo alina.'
mg1865::mg_10::6::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Davida sy ny olona rehetra izay nanaraka azy ka niala tany Bala-joda hampakatra ny fiaran''Andriamanitra izay niantsoana* ny anaran''i Jehovah, Tompon''ny maro, Izay mipetraka amin''ny kerobima. [*Na: izay nantsoina tamin'']'
mg1865::mg_10::6::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony teo amin''ny sariety vaovao ny fiaran''Andriamanitra ka nentiny avy tao an-tranon''i Abinadaba teo an-kavoana*; ary Oza sy Ahio, zanak''i Abinadaba, no nampandeha ny sariety vaovao. [*Na: Gibea]'
mg1865::mg_10::6::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nentiny niala tao an-tranon''i Abinadaba teo ankavoana niaraka tamin''ny fiaran''Andriamanitra izany; ary Ahio nandeha teo alohan''ny fiara.'
mg1865::mg_10::6::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny taranak''Isiraely rehetra nitsinjaka teo anatrehan''i Jehovah tamin''ny karazan''ny zava-maneno rehetra natao tamin''ny hazo kypreso, dia tamin''ny lokanga sy ny valiha sy ny ampongatapaka sy ny korintsana ary ny kipantsona.'
mg1865::mg_10::6::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''ny famoloan''i Nakona izy, dia naninjitra ny tanany tamin''ny fiaran''Andriamanitra Oza ka nihazona azy, satria nazeran''ny omby ny fiara.'
mg1865::mg_10::6::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''i Oza ny fahatezeran''i Jehovah; ary namely azy teo Andriamanitra noho ny fahadisoany, ka dia maty teo anilan''ny fiaran''Andriamanitra izy.'
mg1865::mg_10::6::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tezitra* Davida noho ny namelezan''i Jehovah an''i Oza, ka dia nataony hoe Perez-oza** ny anaran''izany tany izany mandraka androany. [*Na: nalahelo] [**Perez-oza = Famelezana an''i Oza]'
mg1865::mg_10::6::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida natahotra an''i Jehovah tamin''izany andro izany ka nanao hoe: Nahoana no ho entina aty amiko ny fiaran''i Jehovah?'
mg1865::mg_10::6::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia tsy nety namindra ny fiaran''i Jehovah ho ao aminy ao an-Tanànan''i Davida; fa naviliny ho ao an-tranon''i Obed-edoma Gatita.'
mg1865::mg_10::6::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nipetraka telo volana tao an-tranon''i Obed-edoma Gatita ny fiaran''i Jehovah; ka dia notahin''i Jehovah Obed-edoma sy ny ankohonany rehetra.'
mg1865::mg_10::6::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Davida mpanjaka hoe: Jehovah efa nitahy ny ankohonan''i Obed-edoma sy izay nananany rehetra noho ny fiaran''Andriamanitra. Dia nandeha Davida ka nampakatra ny fiaran''Andriamanitra tamim-pifaliana avy tao an-tranon''i Obed-edoma ho any an-Tanànan''i Davida.'
mg1865::mg_10::6::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa namindra inenina ny mpitondra ny fiaran''i Jehovah, dia namono omby sy zanak''omby mifahy izy hatao fanatitra.'
mg1865::mg_10::6::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nitsinjaka mafy dia mafy teo anatrehan''i Jehovah sady nisalotra efoda rongony fotsy.'
mg1865::mg_10::6::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny taranak''i Isiraely rehetra nampakatra ny fiaran''i Jehovah tamin''ny hoby sy ny feon''ny anjomara.'
mg1865::mg_10::6::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo an-Tanànan''i Davida ny fiaran''i Jehovah, dia nitsirika teo am-baravarankely Mikala, zanakavavin''i Saoly, ka nahita an''i Davida mpanjaka nibitaka sy nitsinjaka teo anatrehan''i Jehovah; ka dia nikizaka azy tao am-pony izy.'
mg1865::mg_10::6::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampiditra ny fiaran''i Jehovah ny olona ka nametraka azy teo amin''ny fitoerany tao amin''ny lay izay naorin''i Davida hitoerany; ary Davida nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan''i Jehovah.'
mg1865::mg_10::6::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony voatitr''i Davida ny fanatitra dorana sy ny fanati-pihavanana, dia nitso-drano ny vahoaka tamin''ny anaran''i Jehovah, Tompon''ny maro, izy.'
mg1865::mg_10::6::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomeny mofo iray sy hena iray didy* ary ampempam-boaloboka iray avy ny olona rehetra, dia ny Isiraely rehetra, na lahy na vavy. Ary dia samy nody tany an-tranony avy ny olona rehetra. [*Na: divay eran''ny kapoaka]'
mg1865::mg_10::6::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida koa mba nody hitso-drano ny ankohonany. Fa Mikala, zanakavavin''i Saoly, nivoaka hitsena an''i Davida ka nanao hoe: Akory ity voninahitry ny mpanjakan''ny Isiraely androany! ilay nanary lamba anikeheo teo imason''ny zanakavavin''ny mpanompony, tahaka ny adala manary lamba ka tsy manan-kenatra.'
mg1865::mg_10::6::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa Davida tamin''i Mikala: Teo anatrehan''i Jehovah, Izay nifidy ahy noho ny rainao sy ny ankohonany rehetra ka nanendry ahy ho mpanapaka ny Isiraely, olon''i Jehovah, eny, teo anatrehan''i Jehovah no nitsinjahako.'
mg1865::mg_10::6::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola hivazina kokoa noho izany aza aho, ka hataoko tsinontsinona ny tenako; nefa hiaraka hanam-boninahitra amin''ireo tovovavy nantsoinao ireo kosa aho.'
mg1865::mg_10::6::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsy nanan-janaka intsony mandra-pahafatiny Mikala, zanakavavin''i Saoly.'
mg1865::mg_10::7::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanirian''i Davida hanao tempoly sy ny toky nomen''Andriamanitra azy ny amin''ny haharetan''ny fanjakany, ary ny vavaka nataon''i Davida tamin''izany'
  verse_text: 'Ary raha nipetraka tao an-tranony ny mpanjaka, ary efa nampiadanin''i Jehovah tamin''ny fahavalony rehetra manodidina azy izy,'
mg1865::mg_10::7::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy ny mpanjaka tamin''i Natana mpaminany: Akory izato izaho mitoetra amin''ny trano sedera, nefa ny fiaran''Andriamanitra kosa mitoetra ao anaty lay!'
mg1865::mg_10::7::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Natana tamin''ny mpanjaka: Andeha, ataovy izay rehetra ao am-ponao; fa Jehovah no momba anao.'
mg1865::mg_10::7::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny alin''iny ihany dia tonga tamin''i Natana ny tenin''i Jehovah nanao hoe:'
mg1865::mg_10::7::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha, lazao amin''i Davida mpanompoko hoe: Izao no lazain''i Jehovah: Ianao va no hanao trano hitoerako?'
mg1865::mg_10::7::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mbola nitoetra an-trano Aho hatramin''ny nitondrako ny Zanak''Isiraely niakatra avy tany Egypta ka mandraka androany, fa nifindrafindra toby* sy nifindrafindra toerana**. [*Hebreo: lay] [**Hebreo: tabernakely]'
mg1865::mg_10::7::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay rehetra nifindrafindrako niaraka tamin''ny Zanak''Isiraely, moa nisy nitenenako akory va ny firenen''Isiraely, izay notendreko ho mpiandry ny Isiraely oloko, ka nanaovako hoe: Nahoana no tsy manao trano sedera ho Ahy ianareo?'
mg1865::mg_10::7::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao amin''i Davida mpanompoko hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Izaho no naka anao avy tany an-tsaha, dia avy tamin''ny niandrasanao ondry, mba ho mpanapaka ny Isiraely oloko.'
mg1865::mg_10::7::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomba anao tamin''izay nalehanao rehetra Aho, ka naringako tsy ho eo anoloanao ny fahavalonao rehetra, ary homeko anarana malaza tahaka ny anaran''izay lehibe ambonin''ny tany ianao.'
mg1865::mg_10::7::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hifidy tany ho an''ny Isiraely oloko Aho sady hamponina azy, ka dia handry fahizay amin''ny fonenany ary tsy hanana ahiahy intsony izy, ary ny zanaky ny faharatsiana tsy hampahory azy intsony tahaka ny taloha'
mg1865::mg_10::7::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy tahaka ny hatramin''ny nanendreko mpitsara ho mpifehy ny Isiraely oloko; ary hampiadana* anao ho afaka amin''ny fahavalonao rehetra Aho. Ary lazain''i Jehovah aminao koa fa hanome taranaka** ho anao Izy. [*Hebreo: nampiadana] [**Hebreo: hanao trano]'
mg1865::mg_10::7::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny andronao, ka hodi-mandry any amin''ny razanao ianao, dia hatsangako handimby anao ny zanakao izay haterakao, ary hampitoeriko ny fanjakany;'
mg1865::mg_10::7::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia io no hanao trano ho an''ny anarako, ary Izaho kosa hampitoetra ny seza fiandrianan''ny fanjakany ho mandrakizay.'
mg1865::mg_10::7::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho ho rainy, ary izy ho zanako. Raha manao izay meloka izy, dia hanariko amin''ny tsorakazon''ny olona sy ny kapoky ny zanak''olombelona;'
mg1865::mg_10::7::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa ny famindram-poko tsy mba hiala aminy, tahaka ny nanesorako izany tamin''i Saoly, izay nesoriko teo alohanao.'
mg1865::mg_10::7::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranakao sy ny fanjakanao hitoetra eo anatrehanao mandrakizay; ny seza fiandriananao hitoetra mandrakizay.'
mg1865::mg_10::7::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izany teny rehetra izany sy araka izao fahitana rehetra izao no nolazain''i Natana tamin''i Davida.'
mg1865::mg_10::7::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mpanjaka niditra ka nipetraka teo anatrehan''i Jehovah ary nanao hoe: Zinona moa aho, Jehovah Tompo o? Ary zinona ny mpianakaviko, no novimbininao ambaraka ankehitriny aho?'
mg1865::mg_10::7::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola ataonao ho zavatra kely ihany aza izany, Jehovah Tompo o, fa, indro, efa voalazanao koa ny amin''ny taranaky ny mpanomponao hatramin''ny mbola any aoriana lavitra aza. Ary izany dia fanaon''ny olona, Jehovah Tompo o.'
mg1865::mg_10::7::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka inona intsony no holazain''i Davida aminao? Fa Ianao, Jehovah Tompo o, no mahalala ny mpanomponao.'
mg1865::mg_10::7::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny teninao sy araka ny sitraponao no nanaovanao io zavatra lehibe rehetra io, hampahalalanao ny mpanomponao.'
mg1865::mg_10::7::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany dia lehibe Ianao, Jehovah Andriamanitra; fa tsy misy tahaka Anao, ka tsy misy Andriamanitra afa-tsy Ianao araka izay rehetra ren''ny sofinay.'
mg1865::mg_10::7::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aiza moa no misy firenena ety an-tany tahaka ny Isiraely olonao, izay nalehan''Andriamanitra havotana ho olony, sy hanaovany anarana ho Azy, ary hanaovany zavatra lehibe ho anareo sy zava-mahatahotra ho an''ny taninao teo anatrehan''ny olonao, izay navotanao ho Anao avy tamin''ny firenen''i Egypta sy ny andriamaniny?'
mg1865::mg_10::7::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampitoerinao ny Isiraely olonao ho olonao mandrakizay: ary Ianao, Jehovah o, no efa tonga Andriamaniny.'
mg1865::mg_10::7::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, Jehovah Andriamanitra o, ilay teny nolazainao ny amin''ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay, ary ataovy araka izay nolazainao.'
mg1865::mg_10::7::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe; Jehovah, Tompon''ny maro, no Andriamanitry ny Isiraely; ka dia hampitoerina eo anatrehanao ny taranak''i Davida mpanomponao.'
mg1865::mg_10::7::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah Tompon''ny maro, Andriamanitry ny Isiraely, efa nilaza tamin''ny mpanomponao hoe: Izaho hanome taranaka anao*; koa izany no nampahasahy ny fon''ny mpanomponao hanao izao vavaka izao aminao. [*Hebreo: hanao trano ho anao]'
mg1865::mg_10::7::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany, Jehovah Tompo o, satria Ianao no Andriamanitra, ary marina ny teninao, ary Ianao efa nilaza izany zava-tsoa izany ny amin''ny mpanomponao,'
mg1865::mg_10::7::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aoka ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa Ianao, Jehovah Tompo o, efa niteny izany; eny, aoka ny fitahianao no hitahianao ny taranaky ny mpanomponao mandrakizay.'
mg1865::mg_10::8::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandresen''i Davida ny fahavalony'
  verse_text: 'Ary nony afaka izany, dia nandresy ny Filistina Davida ka nampietry azy; ary ny fanapahana ny renivohitra dia nesorin''i Davida tamin''ny tanan''ny Filistina.'
mg1865::mg_10::8::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandresy ny Moabita koa izy, dia nampandriny tamin''ny tany ireo ary nohariny tamin''ny kofehy, ka izay indroan''ny kofehy novonoiny, fa ny erany kosa novelominy; ka dia tonga mpanompon''i Davida ny Moabita ka nandoa hetra.'
mg1865::mg_10::8::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia resin''i Davida koa Hadadezera, zanak''i Rehoba, mpanjakan''i Zoba, tamin''izy lasa nampody ny fanjakany teo amoron''ny ony Eofrata.'
mg1865::mg_10::8::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nahazo babo taminy, dia miaramila an-tsoavaly fiton-jato amby arivo sy miaramila an-tongotra roa alina; ary notraingotraingoin''i Davida avokoa ny soavalin-kalesy rehetra, fa ny tokony ho amin''ny kalesy zato ihany no navelany.'
mg1865::mg_10::8::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga ny Syriana avy tany Damaskosy hanampy an''i Hadadezera, mpanjakan''i Zoba; dia nahafatesan''i Davida olona roa arivo sy roa alina koa ny Syriana.'
mg1865::mg_10::8::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nametrahan''i Davida miaramila tany Syria momba an''i Damaskosy; dia tonga mpanompon''i Davida ny Syriana ka nandoa hetra. Fa Jehovah nampahery an''i Davida teny amin''izay rehetra nalehany.'
mg1865::mg_10::8::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Davida ny ampinga volamena izay teny amin''ny mpanompon''i Hadadezera ka nentiny nankany Jerosalema.'
mg1865::mg_10::8::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo Beta sy Berotahy, tanànan''i Hadadezera, no nahazoan''i Davida mpanjaka babo varahina be dia be.'
mg1865::mg_10::8::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Toy, mpanjakan''i Hamata, fa efa naharesy ny miaramilan''i Hadadezera rehetra Davida,'
mg1865::mg_10::8::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: '2022-04-19T04:24:36+0000'
  verse_title: null
  verse_text: 'dia nirahin''i Toy Jorama zanany hankany amin''i Davida mpanjaka hiarahaba azy sy hisaotra azy noho ny niadiany tamin''i Hadadezera sy ny nandreseny azy (fa Hadadezera dia fahavalon''i Toy) ary Jorama nitondra fanaka volafotsy sy fanaka volamena ary fanaka varahina;'
mg1865::mg_10::8::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nohamasinin''i Davida mpanjaka ho an''i Jehovah koa izany mbamin''ny volafotsy sy ny volamena izay nohamasininy avy tamin''ny firenena rehetra izay efa resiny,'
mg1865::mg_10::8::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tamin''i Syria sy Moaba sy ny taranak''i Amona sy ny Filistina sy ny Amalekita ary ny babo azony tamin''i Hadadezera, zanak''i Rehoba, mpanjakan''i Zoba.'
mg1865::mg_10::8::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nahazo laza nony niverina avy nandresy ny Syriana valo arivo sy iray alina teo amin''ny Lohasahan-tsira.'
mg1865::mg_10::8::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nametrahany miaramila tany Edoma; eny, nametrahany miaramila avokoa Edoma rehetra, ary ny mponina rehetra tany Edoma dia tonga mpanompon''i Davida. Ary Jehovah nampahery an''i Davida teny amin''izay rehetra nalehany.'
mg1865::mg_10::8::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny mpanao raharaham-panjakana tamin''i Davida'
  verse_text: 'Ary Davida nanjaka tamin''ny Isiraely rehetra ka nitsara sy nitondra marina ny vahoakany rehetra.'
mg1865::mg_10::8::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba, zanak''i Zeroia, no komandin''ny miaramila; ary Josafata, zanak''i Ahiloda, no mpitadidy ny raharaham-panjakana;'
mg1865::mg_10::8::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Zadoka, zanak''i Ahitoba, sy Ahimeleka, zanak''i Abiatara, no mpisorona; ary Seraia no mpanoratra;'
mg1865::mg_10::8::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Benaia, zanak''i Joiada, no mpifehy ny mpiambina andriana*; ary ny zanak''i Davida no mpanolo-tsaina**. [*Hebreo: Kerenita sy Peletita] [**Na: mpisorona]'
mg1865::mg_10::9::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny soa nataon''i Davida tamin''i Mefiboseta'
  verse_text: 'Ary hoy Davida: Mbola misy sisa ihany va ny tamingan''i Saoly mba hasiako soa noho ny amin''i Jonatana?'
mg1865::mg_10::9::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpanompon''ny fianakavian''i Saoly, Ziba no anarany. Ary nantsoiny hankany amin''i Davida izy, ka hoy ny mpanjaka taminy: Ianao moa no Ziba? Ary hoy izy: Izaho mpanomponao no izy.'
mg1865::mg_10::9::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Mbola misy sisa ihany va ny tamingan''i Saoly mba hasiako soa araka ny fanaon''Andriamanitra? Dia hoy Ziba tamin''ny mpanjaka: Mbola misy zanakalahin''i Jonatana iray ihany ao, nefa malemy tongotra izy.'
mg1865::mg_10::9::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy; Aiza anefa izy? Dia hoy Ziba tamin''ny mpanjaka: Indro izy ao an-tranon''i Makira, zanak''i Amiela, ao Lo-debara.'
mg1865::mg_10::9::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mpanjaka naniraka haka azy tao an-tranon''i Makira, zanak''i Amiela, tao Lodebara.'
mg1865::mg_10::9::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''i Davida Mefiboseta, zanak''i Jonatana, zanak''i Saoly, dia niankohoka sy nitsaoka azy izy. Ary hoy Davida: Mefiboseta! Dia hoy izy: Inty ny mpanomponao.'
mg1865::mg_10::9::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida taminy: Aza matahotra, fa hasiako soa tokoa ianao noho ny amin''i Jonatana rainao, ary hampodiko ho anao ny tany rehetra izay an''i Saoly rainao, ary ianao hihinana eo amin''ny latabatro mandrakariva.'
mg1865::mg_10::9::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka izy ka nanao hoe: Zinona moa aho mpanomponao izay toy ny alika maty, no mba jerenao?'
mg1865::mg_10::9::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso an''i Ziba, mpanompon''i Saoly, ny mpanjaka ka nanao taminy hoe: Izay rehetra nananan''i Saoly sy ny mpianakaviny rehetra dia nomeko ny zanakalahin''ny tomponao.'
mg1865::mg_10::9::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ianao sy ny zanakaolahy ary ny mpanomponao no hiasa ny tany ho azy ka hanatitra hanin-kohanina ho an''ny zanakalahin''ny tomponao; fa Mefiboseta, zanakalahin''ny tomponao, hihinana eo amin''ny latabatro mandrakariva. Ary Ziba nanana zanakalahy dimy ambin''ny folo sy mpanompo roa-polo.'
mg1865::mg_10::9::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ziba tamin''ny mpanjaka: Araka izay rehetra nandidianao mpanjaka tompoko no hataon''ny mpanomponao. Fa ny amin''i Mefiboseta, hoy Davida, dia hihinana eo amin''ny latabatro toy ny anankiray amin''ny zanakalahin''ny mpanjaka izy.'
mg1865::mg_10::9::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mefiboseta nanan-janakalahy tanora, Mika no anarany. Ary izay rehetra nitoetra tao an-tranon''i Ziba dia mpanompon''i Mefiboseta avokoa.'
mg1865::mg_10::9::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mefiboseta nonina tany Jerosalema; fa teo amin''ny latabatry ny mpanjaka no nihinanany mandrakariva; ary nalemy ny tongony roa.'
mg1865::mg_10::10::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahatonga ny niadian''i Davida tamin''ny Amonita sy ny Syriana, ary ny nandreseny azy'
  verse_text: 'Ary rehefa afaka izany, dia maty ny mpanjakan''ny taranak''i Amona, ka Hanona zanany no nanjaka nandimby azy.'
mg1865::mg_10::10::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida: Hanisy soa an''i Hanona, zanak''i Nahasy, aho, toy ny soa nataon-drainy tamiko. Ary Davida naniraka ny mpanompony hitsapa alahelo azy ny amin-drainy. Ary tonga tany amin''ny tanin''ny taranak''i Amona ny mpanompon''i Davida.'
mg1865::mg_10::10::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo mpanapaka ny taranak''i Amona tamin''i Hanona tompony: Moa ataonao ho fanajana ny rainao no anirahan''i Davida hitsapa alahelo anao? Fa tsy hizaha ny tanàna sy hisafo azy ary handrava azy va no nanirahan''i Davida ireo mpanompony ireo hankaty aminao?'
mg1865::mg_10::10::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosamborin''i Hanona ny mpanompon''i Davida, ka noharatany ny ila-somony, sady nofolonany hatreo amin''ny foto-peny ny akanjony, ka dia nalefany hody izy.'
mg1865::mg_10::10::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nisy lasa nanambara izany tamin''i Davida, ary izy naniraka hitsena azy, fa afa-baraka* loatra ireo lehilahy ireo; ka dia hoy ny tenin''ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin''ny somotrareo, vao mody ianareo. [*Na: menatra]'
mg1865::mg_10::10::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny taranak''i Amona fa efa mangidy hoditra eo anatrehan''i Davida izy, dia naniraka nanakarama ny Syriana any Beti-rehoba sy ny Syriana any Zoba izy, dia miaramila an-tongotra roa alina, ary tamin''ny mpanjakan''i Maka, olona arivo lahy, ary tamin''ny olona tany Toba, roa arivo sy iray alina.'
mg1865::mg_10::10::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Davida izany, dia naniraka an''i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery.'
mg1865::mg_10::10::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranak''i Amona nivoaka ka nilahatra hiady teo anoloan''ny vavahady; ary ny Syriana avy any Zoba sy Rehoba sy ny olona avy tany Toba ary Maka nitokana teny an-tsaha kosa.'
mg1865::mg_10::10::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Joaba fa teo anoloany sady teo ivohony ny fahavalo, dia nifidy olona tamin''ireo voafantina tamin''ny Isiraely rehetra izy, ka nalahany hiady tamin''ny Syriana.'
mg1865::mg_10::10::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa kosa nomeny ho entin''i Abisay rahalahiny halahany hiady amin''ny taranak''i Amona.'
mg1865::mg_10::10::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Raha tsy tohako ny Syriana, dia vonjeo aho; fa raha tsy tohanao kosa ny taranak''i Amona, dia hovonjeko ianao.'
mg1865::mg_10::10::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahereza ary, ka aoka hitombandahy isika ho an''ny firenentsika sy ny tanànan''Andriamanitsika; ary aoka Jehovah hanao izay sitrapony.'
mg1865::mg_10::10::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba sy ny olona nanaraka azy nandroso hiady amin''ny Syriana; ary dia nandositra niala teo anoloany ireo.'
mg1865::mg_10::10::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny taranak''i Amona fa nandositra ny Syriana, dia mba nandositra koa izy niala teo anoloan''i Abisay ka niditra tao an-tanàna. Ary Joaba niverina avy namely ny taranak''i Amona ka tonga tany Jerosalema.'
mg1865::mg_10::10::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny Syriana fa resy teo anoloan''ny Isiraely izy, dia nivory izy.'
mg1865::mg_10::10::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hadadezera naniraka naka ny Syriana izay tany an-dafin''ny Ony*; ary dia tonga tany Helama izy; ary Sobaka, komandin''ny miaramilan''i Hadadezera, no nitarika azy. [*Eofrata]'
mg1865::mg_10::10::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nambara tamin''i Davida izany, dia nampamory ny Isiraely rehetra izy ka lasa nita an''i Jordana, dia tonga tany Helama. Ary nilahatra ny Syriana hiady amin''i Davida, ka dia rafitra ny ady.'
mg1865::mg_10::10::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vaky nandositra teo anoloan''ny Isiraely ny Syriana, ka nahafaty ny tao an-kalesy fiton-jato sy ny an-tsoavaly efatra alina tamin''ny Syriana Davida sady namely an''i Sobaka koa, ilay komandin''ny miaramila, ka nahafaty azy teo.'
mg1865::mg_10::10::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny mpanjaka rehetra izay nanoa an''i Hadadezera fa resy teo anoloan''ny Isiraely izy, dia nanao fihavanana tamin''ny Isiraely izy ireo ka nanompo azy. Dia natahotra ny Syriana, ka tsy nety namonjy ny taranak''i Amona intsony.'
mg1865::mg_10::11::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanaovana fahirano an''i Raba, sy ny nakan''i Davida ny vadin''i Oria'
  verse_text: 'Ary rehefa niherina ny taona, ka mby amin''ny andro fandehanan''ny mpanjaka hiady, dia naniraka an''i Joaba sy ny mpanompony ary ny Isiraely rehetra Davida, ka nandringana ny taranak''i Amona ireo sady nanao fahirano an''i Raha; fa Davida kosa nijanona tany Jerosalema ihany.'
mg1865::mg_10::11::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony harivariva, dia niala tao ampandriany Davida ka nitsangantsangana teo an-tampon''ny lapa; ary raha teo izy dia nahatazana vehivavy mandro; ary ravehivavy dia tsara tarehy maha-te-hijery.'
mg1865::mg_10::11::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia naniraka hanontany ny amin-dravehivavy. Ary nisy nanao hoe: Tsy iny va no Batseba, zanakavavin''i Eliama, sady vadin''i Oria Hetita?'
mg1865::mg_10::11::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naniraka olona ka nampaka azy; dia tonga tao aminy izy ka nandriany. Ary ravehivavy nanamasina ny tenany ho afaka tamin''ny halotoany, dia nody tany an-tranony.'
mg1865::mg_10::11::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanan''anaka ravehivavy ka naniraka hilaza tamin''i Davida hoe: Manan''anaka aho.'
mg1865::mg_10::11::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naniraka tany amin''i Joaba hanao hoe: Asaovy mankaty amiko kely Oria Hetita. Dia nasain''i Joaba nankany amin''i Davida Oria.'
mg1865::mg_10::11::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''i Davida izy, dia nanontaniany ny toetr''i Joaba sy ny olona ary ny toetry ny ady.'
mg1865::mg_10::11::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Oria: Andeha ary mody, ka sasao ny tongotrao. Ary Oria niala tao an-tranon''ny mpanjaka, ary dia nampanarahina nahandro avy tao amin''ny mpanjaka izy.'
mg1865::mg_10::11::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Oria nandry teo am-baravarana ny tranon''ny mpanjaka, teo amin''ny mpanompon''ny tompony rehetra, fa tsy nidina nody tany an-tranony izy tsy akory.'
mg1865::mg_10::11::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanambara tamin''i Davida hoe: Tsy nidina nody tany an-tranony Oria. Dia hoy Davida tamin''i Oria: Tsy avy lavitra va ianao? koa nahoana ianao no tsy midina mody any an-tranonao?'
mg1865::mg_10::11::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Oria tamin''i Davida: Ny fiara sy ny Isiraely ary ny Joda mitoetra amin''ny trano rantsan-kazo; ary Joaba tompoko sy ny mpanompon''ny tompoko mitoby any an-tsaha, ka izaho kosa va hody any an-tranoko hihinana sy hisotro ary handry amin''ny vadiko? Raha velona koa ianao, ary raha velona koa ny ainao, tsy hanao izany aho.'
mg1865::mg_10::11::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Oria: Mitoera ihany ary aty anio, fa rahampitso dia halefako ianao. Dia nitoetra tany Jerosalema androtrizay sy ny ampitson''iny Oria.'
mg1865::mg_10::11::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasain''i Davida izy, dia nihinana sy nisotro teo anatrehany, ka nomamoiny, ary nony hariva dia nivoaka izy ka nandry teo amin''ilay nandriany teo amin''ny mpanompon''ny tompony ihany, fa tsy nidina nody tany an-tranony.'
mg1865::mg_10::11::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, Davida dia nanoratra taratasy ho any amin''i Joaba, ka nampitondrainy an''i Oria izany.'
mg1865::mg_10::11::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no soratra nataony tao amin''ny taratasy: Arosoinareo amin''ny ady mafy Oria; dia ilaozy izy mba hasiany ho faty.'
mg1865::mg_10::11::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nanao fahirano ny tanàna Joaba, dia nanendry an''i Oria ho eo amin''izay hitany misy lehilahy mahery.'
mg1865::mg_10::11::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mponina tao an-tanàna nivoaka hiady amin''i Joaba, ka nahafatesana ny mpanompon''i Davida, ary maty koa Oria Hetita.'
mg1865::mg_10::11::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba naniraka hilaza tsara any amin''i Davida ny toetry ny ady;'
mg1865::mg_10::11::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nandidy ilay iraka izy hoe: Rehefa voalazanao tsara amin''ny mpanjaka ny toetry ny ady,'
mg1865::mg_10::11::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tezitra ny mpanjaka ary manao aminao hoe: Nahoana no nanakaiky ny tanàna toy izany ianareo raha niady? Tsy fantatrareo va fa hitifitra eo amin''ny manda izy?'
mg1865::mg_10::11::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no namely an''i Abimeleka, zanak''i Jerobeseta? Moa tsy vehivavy va no nanjera vato fikosoham-bary* taminy avy teo amin''ny manda, ka dia maty tao Tebeza izy? Koa nahoana no nanakaiky ny manda ianareo? dia ataovy hoe: Oria Hetita mpanomponao mba maty koa. [*vato amboniny]'
mg1865::mg_10::11::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha ilay iraka, dia tonga tamin''i Davida ka nanambara taminy izay rehetra nanirahan''i Joaba azy.'
mg1865::mg_10::11::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny iraka tamin''i Davida: Nahery noho izahay ireny, ary nivoahany tany an-tsaha izahay, ka dia nenjehinay hatreo anoloan''ny vavahady kosa izy.'
mg1865::mg_10::11::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitifitra teo amin''ny manda nitifitra ny mpanomponao; ary nahafatesana ny mpanompon''ny mpanjaka, ary Oria Hetita mpanomponao mba maty koa.'
mg1865::mg_10::11::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida tamin''ny iraka: Izao no holazainao amin''i Joaba: Aza malahelo amin''izany ianao, fa ny sabatra tsy mifidy hasiana; herezo ihany ny adinao amin''ny tanàna, ka ravao izy. Ary omeo toky Joaba.'
mg1865::mg_10::11::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny vadin''i Oria fa maty ny lahy, dia nisaona azy izy.'
mg1865::mg_10::11::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afa-tsaona izy, dia nampanalain''i Davida ho any an-tranony, ary dia novadiny izy ka niteraka zazalahy taminy. Nefa tsy sitrak''i Jehovah izany nataon''i Davida izany.'
mg1865::mg_10::12::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nibebahan''i Davida, rehefa nanarin''i Natana, ary ny nahafahany an''i Raba'
  verse_text: 'Ary Jehovah naniraka an''i Natana hankao amin''i Davida. Ary dia tonga tao aminy izy ka nanao taminy hoe: Nisy olona roa lahy tao an-tanàna anankiray, ny iray manan-karena, ary ny iray malahelo.'
mg1865::mg_10::12::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay manan-karena nanana ondry aman''osy sy omby betsaka;'
mg1865::mg_10::12::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ilay malahelo kosa tsy nanana na inona na inona afa-tsy zanak''ondry vavy kely iray momba izay novidiny; ary nokolokoloiny tsara io ka nitombo teo aminy sy ny zanany; fa tamin''ny hanin-kelin-dralehilahy no nihinanany, ary tamin''ny kapoakany no nisotroany, sady notrotroiny teo an-tratrany izy ka nataony toy ny zananivavy.'
mg1865::mg_10::12::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vahiny tonga tao amin''ilay manan-karena, nefa ny ondriny aman''osiny sy ny ombiny notsitsiny ka tsy nangalany hatao nahandro ho an''ilay vahiny tonga tao aminy; fa ny zanak''ondry vavin''ilay malahelo kosa no nalainy, ka dia nataony nahandro ho an''ilay olona tonga tao aminy.'
mg1865::mg_10::12::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra mafy ny fahatezeran''i Davida tamin''izany olona izany, ka hoy izy tamin''i Natana: Raha velona koa Jehovah, tsy maintsy hatao maty izay olona nanao izany;'
mg1865::mg_10::12::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ilay zanak''ondry vavy tsy maintsy honerany efatra heny noho ny nanaovany izany zavatra izany sy noho ny tsy namindrany fo.'
mg1865::mg_10::12::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Natana tamin''i Davida: Ianao no izy. Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Izaho nanosotra anao ho mpanjakan''ny Isiraely ka namonjy anao ho afaka tamin''ny tanan''i Saoly;'
mg1865::mg_10::12::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nomeko anao ny tranon''ny tomponao sy ny vadin''ny tomponao ho andefimandrinao, ary nomeko anao koa ny firenen''Isiraely sy Joda; ary raha mbola tsy ampy ho anao izany, dia ho nomeko bebe kokoa ianao;'
mg1865::mg_10::12::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nahoana ianao no nanamavo ny tenin''i Jehovah ka nanao izay ratsy eo imasony? Oria Hetita nasianao ny sabatra, ary ny vadiny nalainao ho vadinao. Eny, efa novonoinao tamin''ny sabatry ny taranak''i Amona izy.'
mg1865::mg_10::12::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany dia tsy hiala amin''ny taranakao mandrakizay kosa ny sabatra, satria nanamavo Ahy ianao ka naka ny vadin''i Oria Hetita ho vadinao.'
mg1865::mg_10::12::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao koa no lazain''i Jehovah: Indro, Izaho efa hahatonga loza aminao avy ao amin''ny ankohonanao ihany; ary hesoriko eo imasonao ny vadinao ka homeko ny namanao; ary izy handry amin''ny vadinao amin''izao antoandrobenanahary izao.'
mg1865::mg_10::12::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao nanao izany tao amin''ny mangingina, ary Izaho kosa haneho izany zavatra izany eo anatrehan''ny Isiraely rehetra sy amin''izao antoandrobenanahary izao.'
mg1865::mg_10::12::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida tamin''i Natana: Efa nanota tamin''i Jehovah aho. Ary hoy kosa Natana tamin''i Davida: Jehovah efa nanaisotra ny helokao, ka tsy ho faty ianao.'
mg1865::mg_10::12::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa noho ny nampitenenanao ratsy ny fahavalon''i Jehovah amin''izany zavatra izany dia ho faty tokoa ny zaza izay haterakao.'
mg1865::mg_10::12::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Natana nody tany an-tranony. Ary Jehovah namely ny zaza izay nateraky ny vadin''i Oria tamin''i Davida, ka dia narary be ny zaza.'
mg1865::mg_10::12::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifona tamin''Andriamanitra ho an''ny zaza Davida, dia nifady hanina sady niditra ka nandry tamin''ny tany mandritra ny alina.'
mg1865::mg_10::12::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loholona tao an-tranony nitsangana nankao aminy hampiarina azy amin''ny tany; nefa tsy nety izy sady tsy nety niara-nihinan-kanina taminy.'
mg1865::mg_10::12::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandray hafitoana, dia maty ny zaza; ary ny mpanompon''i Davida natahotra hilaza ny nahafatesan''ny zaza aminy, fa hoy ireo: Indro, fony mbola velona aza ny zaza, raha niteny taminy isika, dia tsy nohenoiny ny feontsika, koa hataontsika ahoana no filaza aminy ny fahafatesan''ny zaza? fandrao hanimba tena izy.'
mg1865::mg_10::12::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Davida fa nitakoritsika ny mpanompony, dia fantany fa maty ny zaza; ka hoy izy tamin''ny mpanompony: Maty va ny zaza? Ary hoy ireo: Maty.'
mg1865::mg_10::12::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niarina tsy nandry tamin''ny tany intsony Davida ary nandro sy nihosotra diloilo ary nanova ny fitafiany, dia nankao amin''ny tranon''i Jehovah ka niankohoka; ary dia nody tany an-tranony izy ka niantso mba hisy handroso hanina eo anoloany, dia nihinana izy.'
mg1865::mg_10::12::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompony taminy: Ahoana izao zavatra nataonao izao? Fa fony mbola velona ny zaza, dia nifady hanina sy nitomany ianao, fa rehefa maty ny zaza, dia niarina sy nihinan-kanina kosa.'
mg1865::mg_10::12::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Fony mbola velona ny zaza, dia nifady hanina sy nitomany tokoa aho: fa hoy izaho: Iza moa no mahalala na mba hamindra fo amiko Jehovah ka hahavelona ny zaza, na tsia?'
mg1865::mg_10::12::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo maty izy izao, ka nahoana aho no hifady hanina intsony? Mahay mampiverina azy va aho? Izaho no hankany aminy, fa izy tsy hiverina ety amiko intsony.'
mg1865::mg_10::12::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nampionona an''i Batseba vadiny, dia niditra tao aminy ka nandry taminy; ary niteraka zazalahy izy, ka ny anarany nataony hoe Solomona*. Ary Jehovah tia azy, [*Solomona = Miadana]'
mg1865::mg_10::12::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia naniraka an''i Natana mpaminany ka nanao ny anaran''ny zaza hoe Jedidia* noho ny amin''i Jehovah. [*Jedidia = Tian''i Jehovah]'
mg1865::mg_10::12::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba namely an''i Raban''ny taranak''i Amona ka nahafaka ny tanànan''ny mpanjaka.'
mg1865::mg_10::12::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba naniraka olona tany amin''i Davida nanao hoe: Namely an''i Raba aho ka nahafaka ny tanàna misy rano.'
mg1865::mg_10::12::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa vorio ny olona sisa izao, ka mitobia hamely ny tanàna, ary aoka ho afakao izy; fandrao izaho no hahafaka ny tanàna, ka dia hotononina araka ny anarako izy.'
mg1865::mg_10::12::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namory ny vahoaka rehetra, dia nankany Raba ka namely azy ary nahafaka azy.'
mg1865::mg_10::12::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesoriny ny satro-boninahitr''ilay mpanjaka* teny an-dohany talenta volamena iray no lanjany, sady nisy vato soa, ary dia nisatrohan''i Davida. Ary navoakany tao an-tanàna ny babo azo, ka be dia be ireny. [*Na: Malkama; izahao Zefania 1:5]'
mg1865::mg_10::12::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia navoakany koa ny olona teo ka nataony teo amin*''ny tsofa sy ny fangao-by lehibe ary ny famaky vy, ary nataony tao anatin''ny fandoroam-biriky; toy izany no nataony tamin''ny tanànan''ny taranak''i Amona rehetra. Ary Davida sy ny vahoaka rehetra dia niverina nankany Jerosalema. [*Na: (nampiasaina tamin'')]'
mg1865::mg_10::13::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny ratsy nataon''i Amnona, sy ny namonoan''i Absaloma azy, ary ny nandosiran''i Absaloma'
  verse_text: 'Ary nony afaka izany, dia nisy toy izao: Absaloma, zanak''i Davida, nanana anabavy tsara tarehy, Tamara no anarany; ary tia azy Amnona, zanak''i Davida.'
mg1865::mg_10::13::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amnona nalahelo ka matiny ihany noho Tamara anabaviny; fa virijina izy, ka sarotra tamin''i Amnona ny haka azy.'
mg1865::mg_10::13::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Amnona nanan-tsakaiza, Jonadaba no anarany, zanak''i Simea, rahalahin''i Davida; ary Jonadaba dia olona fetsy loatra.'
mg1865::mg_10::13::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy izy taminy: Nahoana ianao, ry zanaky ny mpanjaka, no mihamahia isan''andro isan''andro? Tsy tianao hambara amiko va izany? Dia hoy Amnona taminy: Tia an''i Tamara, anabavin''i Absaloma rahalahiko, aho.'
mg1865::mg_10::13::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonadaba taminy: Mandria eo amin''ny fandrianao ianao, ka modia marary; ary raha avy mamangy anao rainao, dia ataovy aminy hoe: Trarantitra ianao, aoka Tamara anabaviko mba ho avy hampihinan-kanina ahy ary hanao ny nahandro eto imasoko mba ho hitako ka hihinanako ny avy eny an-tanany.'
mg1865::mg_10::13::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandry Amnona ka nody marary; ary nony avy mamangy azy ny mpanjaka, dia hoy izy taminy: Trarantitra ianao, aoka Tamara anabaviko hankaty hanao mofo roa ho ahy eto imasoko hihinanako ny avy eny an-tanany.'
mg1865::mg_10::13::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naniraka nankany amin''i Tamara any an-tranony nanao hoe: Mankanesa kely any an-tranon''i Amnona anadahinao, ka manaova nahandro ho azy.'
mg1865::mg_10::13::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Tamara nankany an-tranon''i Amnona anadahiny; ary nandry ny anadahiny. Dia naka koba razazavavy, ka nofetafetainy ary nataony mofo teo imasony, ary nendasiny ny mofo.'
mg1865::mg_10::13::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisiny ny fanendasana, ka narosony teo anoloany; fa tsy nety nihinana izy. Ary hoy Amnona: Avoahy ny olona rehetra. Dia nivoaka ny olona rehetra.'
mg1865::mg_10::13::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Amnona tamin''i Tamara: Ento aty amin''ny efi-trano ny nahandro hihinanako ny avy eny an-tananao. Dia nalain''i Tamara ny mofo nataony ka nentiny tao amin''ny efi-trano tao amin''i Amnona anadahiny.'
mg1865::mg_10::13::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nentiny tao aminy hohaniny izany; dia nihazona an''i Tamara izy ka nanao taminy hoe: Avia handry amiko, ranabaviko.'
mg1865::mg_10::13::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny anabaviny: Sanatria, ranadahy! Aza misavika ahy; fa tsy fanao eto amin''ny Isiraely izany; aza manao izany zavatra fady indrindra* izany ianao. [*Hebreo: fahadalana]'
mg1865::mg_10::13::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amiko, ho entiko aiza moa ny henatro? Ary ianao koa ho toy ny anankiray amin''ny adala eto amin''ny Isiraely. Koa trarantitra ianao, lazao amin''ny mpanjaka; fa tsy hisakana ahy tsy ho anao izy.'
mg1865::mg_10::13::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nety nihaino ny feon-drazazavavy izy, fa natanjaka noho izy, dia nisavika azy ka nandry taminy.'
mg1865::mg_10::13::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia halan''i Amnona indrindra izy, ka ny fankahalany azy dia be lavitra noho ny fitiavany azy taloha. Dia hoy Amnona taminy: Mitsangàna, mandehana.'
mg1865::mg_10::13::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Aza dia manao ratsy mandroaka ahy ianao, fa ratsy noho ny zavatra hafa nataonao izao. Nefa tsy nety nihaino azy izy.'
mg1865::mg_10::13::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso ny zatovony izay nanompo azy izy ka nanao hoe: Esory hiala eto amiko ity vehivavy ity, ka hidio ny varavarana, rehefa tafavoaka izy.'
mg1865::mg_10::13::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakanjo akanjo lava* razazavavy; fa izany no fanaon''ny zanakavavin''ny mpanjaka ho akanjo ambony, raha mbola virijina izy. Dia navoakan''ilay ankizilahy izy, ka nohidiany ny varavarana, nony tafavoaka izy. [*Na: akanjo misoratsoratra]'
mg1865::mg_10::13::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasian''i Tamara lavenona ny lohany, sady notriariny ny akanjo lava izay niakanjoany, dia niloloha tanana izy, sady nitomany nidradradradra teny am-pandehanana.'
mg1865::mg_10::13::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Absaloma anadahiny taminy: Efa tany aminao va Amnona anadahinao? Mangina ihany aloha, ranabavy, fa anadahinao izy; fa aza malahelo noho izany. Ka dia nitoetra tao an-tranon''i Absaloma anadahiny Tamara sady ory.'
mg1865::mg_10::13::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony ren''i Davida mpanjaka izany zavatra rehetra izany, dia nirehitra ny fahatezerany.'
mg1865::mg_10::13::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma tsy nifampiteny tamin''i Amnona rahalahiny akory na soa na ratsy; fa halan''i Absaloma izy noho ny nisavihany an''i Tamara anabaviny.'
mg1865::mg_10::13::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka roa taona ngarangidina, dia nampanety ondry teo Bala-hazora ao akaiky an''i Efraima Absaloma, ka nanasa ny zanakalahin''ny mpanjaka rehetra izy.'
mg1865::mg_10::13::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankao amin''ny mpanjaka Absaloma ka nanao hoe: Indro, mampanety ondry ny mpanomponao; koa trarantitra ianao, aoka ny mpanjaka sy ny mpanompony handeha hiaraka amiko mpanomponao.'
mg1865::mg_10::13::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpanjaka tamin''i Absaloma: Tsia, anaka, aoka tsy handeha avokoa izahay rehetra, fandrao mahavaky tratra anao. Fa Absaloma nanery azy ihany; nefa tsy nety nandeha izy, fa nitso-drano azy ihany.'
mg1865::mg_10::13::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Absaloma: Raha tsy izany ary, trarantitra ianao, aoka Amnona rahalahiko no handeha hiaraka aminay. Ary hoy ny mpanjaka taminy: Ahoana no hiarahany aminao?'
mg1865::mg_10::13::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanery azy Absaloma, ka dia nalefany Amnona sy ny zanakalahin''ny mpanjaka rehetra handeha hiaraka aminy.'
mg1865::mg_10::13::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma nanome teny ny zatovony hoe: Miomàna tsara, fa rehefa faly ny fon''i Amnona azon''ny divay, ka lazaiko aminareo hoe: Asio Amnona, dia ataovy maty izy, fa aza matahotra; tsy izaho va no nanome teny anareo? Matokia, aoka hiseho ho lehilahy mahery ianareo.'
mg1865::mg_10::13::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zatovon''i Absaloma nanao tamin''i Amnona araka ny teny nomen''i Absaloma azy. Dia nitsangana avokoa ny zanakalahin''ny mpanjaka rehetra, ary samy nitaingina ny ampondrany ka nandositra.'
mg1865::mg_10::13::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola teny an-dàlana izy ireo, dia tonga tao amin''i Davida ny filazana hoe: novonoin''i Absaloma avokoa ny zanakalahin''ny mpanjaka, ka tsy nasiany miangana na dia iray akory aza.'
mg1865::mg_10::13::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana ny mpanjaka ka nandriatra ny fitafiany, dia nandry tamin''ny tany; ary ny mpanompony rehetra nitsangana teo, samy voatriatra avokoa ny fitafiany.'
mg1865::mg_10::13::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonadaba, zanak''i Simea, rahalahin''i Davida, nanao hoe: Aoka ny tompoko tsy hanao hoe: Matiny avokoa ny zatovo rehetra, zanakalahin''ny mpanjaka; fa Amnona ihany no maty; fa Absaloma efa nifofo azy hatramin''ny andro nisavihany an''i Tamara anabaviny.'
mg1865::mg_10::13::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ny mpanjaka tompoko tsy hieritreritra am-po fa maty avokoa ny zanakalahin''ny mpanjaka rehetra; fa Amnona ihany no maty.'
mg1865::mg_10::13::34:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Absaloma nandositra. Ary ny zatovo mpitily nanopy ny masony ka nahita fa, indreo nisy olona maro avy teo ivohony, teo anilan''ny tendrombohitra.'
mg1865::mg_10::13::35:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonadaba tamin''ny mpanjaka: Indreo, avy ny zanakalahin''ny mpanjaka, dia araka ny nolazain''ny mpanomponao tokoa.'
mg1865::mg_10::13::36:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa voalazany izany teny izany, dia indreo, tonga ny zanakalahin''ny mpanjaka, ary nanandratra ny feony izy ka nitomany; ary ny mpanjaka sy ny mpanompony dia mba nitomany mafy dia mafy koa.'
mg1865::mg_10::13::37:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Absaloma nandositra nankany amin''i Talmay, zanakalahin''i Amihoda, mpanjakan''i Gesora. Ary nisaona ny zanany mandrakariva Davida.'
mg1865::mg_10::13::38:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma efa nandositra nankany Gesora ka nitoetra tany telo taona.'
mg1865::mg_10::13::39:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 13
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mpanjaka naniry hivoaka hankany amin''i Absaloma*; fa nionona izy noho ny amin''i Amnona, satria efa maty izy. [*Na: Koa izany no nisakana an''i Davida mpanjaka tsy hivoaka hamely an''i Absaloma]'
mg1865::mg_10::14::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nodian''i Absaloma, sy ny nampihavanana ny rainy taminy'
  verse_text: 'Ary Joaba, zanak''i Zeroia, nahalala fa ny fon''ny mpanjaka nalahelo an*''i Absaloma ihany. [*Na: mbola tezitra tamin'']'
mg1865::mg_10::14::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa naniraka tany Tekoa nampaka vehivavy hendry tany Joaba ka nanao taminy hoe: Masïna ianao, modia misaona, ka miakanjoa akanjo fisaonana, ary aza mihoso-diloilo ianao, fa manaova tahaka ny vehivavy efa nisaona ela ny maty;'
mg1865::mg_10::14::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mankanesa ao amin''ny mpanjaka, ka lazao aminy araka izao. Dia nomen''i Joaba teny izy.'
mg1865::mg_10::14::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niteny tamin''ny mpanjaka ravehivavy avy any Tekoa, dia niankohoka tamin''ny tany izy ary nitsaoka ka nanao hoe: Vonjeo, ary mpanjaka o.'
mg1865::mg_10::14::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Inona no nanjo anao? Dia hoy izy: Vehivavy mpitondra tena tokoa aho, fa maty vady.'
mg1865::mg_10::14::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho mpanompovavinao nanan-janaka roa lahy, ary nifanditra tany an-tsaha izy mirahalahy, ka tsy nisy nampisaraka azy, ary ny anankiray namely ny rahalahiny ka nahafaty azy.'
mg1865::mg_10::14::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, ny mpianakavy rehetra nanangana ady tamiko mpanompovavinao ka nanao hoe: Atolory ilay namely ny rahalahiny, fa hataonay maty izy noho ny ain''ny rahalahiny izay novonoiny ka dia hovonoinay koa ny mpandova; ka hovonoiny koa ny vainafoko sisa, ka tsy hamelany anarana na zanaka ho an''ny vadiko ety ambonin''ny tany.'
mg1865::mg_10::14::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin-dravehivavy: Modia ianao; fa izaho no handidy ny amin''izany.'
mg1865::mg_10::14::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy avy any Tekoa tamin''ny mpanjaka: Ry mpanjaka tompoko o, aoka ho amiko ny heloka sy ho amin''ny ankohonan''ny raiko; fa ny mpanjaka sy ny seza fiandrianany dia aoka tsy hanan-tsiny.'
mg1865::mg_10::14::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka: Na zovy na zovy manisy teny anao, ento ety amiko, dia tsy haninona anao intsony izy.'
mg1865::mg_10::14::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy: Trarantitra ianao, ry mpanjaka o, aoka ianao hahatsiaro an''i Jehovah Andriamanitrao, ary aoka ny mpamaly ratsy hamono intsony, fandrao mamono ny zanako izy. Dia hoy ny mpanjaka: Raha velona koa Jehovah, tsy hisy ho latsaka amin''ny tany na dia singam-bolo iray akory aza amin''ny zanakao.'
mg1865::mg_10::14::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy: Trarantitra ianao, aoka kely ny mpanompovavinao hanao teny indraim-bava monja amin''ny mpanjaka tompoko. Ary hoy izy: Lazao ary.'
mg1865::mg_10::14::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ravehivavy: Nahoana ianao no nihevitra toy izany hamely ny olon''Andriamanitra? Fa amin''ny, itenenan''ny mpanjaka izany zavatra izany, dia toa mahavoa ny tenany ihany izy noho ny tsy fampodian''ny mpanjaka ilay noroahiny.'
mg1865::mg_10::14::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy maintsy maty isika ka ho tahaka ny rano raraka amin''ny tany, izay tsy azo raofina intsony; ary Andriamanitra tsy manala ain''olona, fa mihevitra izay tsy hanariany ilay noroahiny.'
mg1865::mg_10::14::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho no tonga hilaza izany zavatra izany amin''ny mpanjaka tompoko, ny olona no nampitahotra ahy: ary hoy izaho mpanompovavinao: mba holazaiko amin''ny mpanjaka izany; fa angamba ny mpanjaka hanao izay angatahin''ny mpanompovaviny.'
mg1865::mg_10::14::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny mpanjaka hihaino ka hamonjy ny mpanompovaviny ho afaka amin''ny tanan''ny lehilahy izay ta-hamongotra ahy mbamin''ny zanako hiala amin''ny lova nomen''Andriamanitra.'
mg1865::mg_10::14::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanompovavinao: Hahazoako fiononana anie ny tenin''ny mpanjaka tompoko; fa ta-haka Ilay Anjelin''Andriamanitra ny mpanjaka tompoko ka mandinika izay soa sy ratsy; koa Jehovah Andriamanitrao anie ho aminao.'
mg1865::mg_10::14::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka namaly an-dravehivavy hoe: Aza dia afenina ahy izay zavatra hanontaniako anao. Dia hoy ravehivavy: Aoka hiteny ny mpanjaka tompoko.'
mg1865::mg_10::14::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Moa saina nomen''i Joaba va izany rehetra lazainao izany*? Dia hoy ny navalin-dravehivavy: Raha velona koa ny ainao, ry mpanjaka tompoko, tsy misy mivily izay rehetra nolazain''ny mpanjaka tompoko na ho amin''ny ankavanana na ho amin''ny ankavia; fa Joaba mpanomponao tokoa no nandidy ahy sy nanome izany teny rehetra izany ny mpanompovavinao. [*Hebreo: Moa ny tanan''i Joaba va no aminao amin''izany rehetra izany?]'
mg1865::mg_10::14::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hampiova tarehy ny raharaha no nanaovan''i Joaba mpanomponao izany zavatra izany; fa hendry tahaka Ilay Anjelin''Andriamanitra tompoko ka mahalala ny zavatra rehetra ety ambonin''ny tany.'
mg1865::mg_10::14::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Joaba: Indro fa efa nekeko izany zavatra izany: koa andeha, alao hody Absaloma zatovo.'
mg1865::mg_10::14::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka tamin''ny tany Joaba ka nitsaoka sy nisaotra ny mpanjaka; ary hoy Joaba: Anio no ahafantaran''ny mpanomponao fa efa mahita fitia eo imasonao aho, ry mpanjaka tompoko, amin''ny nanaovan''ny mpanjaka araka ny nangatahin''ny mpanompony.'
mg1865::mg_10::14::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Joaba nankany Gesora, ka nentiny nankany Jerosalema Absaloma.'
mg1865::mg_10::14::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Aoka hody any an-tranony izy, fa aza avela hahita ny tavako. Ary Absaloma nankany an-tranony, ka dia tsy nahita ny tavan''ny mpanjaka.'
mg1865::mg_10::14::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy lehilahy tsara tarehy noderaina fatratra tahaka an''i Absaloma teo amin''ny Isiraely rehetra, fa hatrany am-paladiany ka hatrany an-tampon-dohany dia tsy nisy tsiny izy.'
mg1865::mg_10::14::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanaratra ny lohany izy (fa isaky ny fitsingerenan''ny taona no nanaratany azy; fa nanavesatra azy ka noharatany), dia nolanjainy ny volon-dohany, ka sekely roan-jato no lanjany, araka ny fandanjan''ny mpanjaka.'
mg1865::mg_10::14::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma niteraka zanaka telo mirahalahy sy vavy iray, atao hoe Tamara, ary vehivavy tsara tarehy izy.'
mg1865::mg_10::14::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma nitoetra roa taona ngarangidina tany Jerosalema, nefa tsy mbola nahita ny tavan''ny mpanjaka ihany izy.'
mg1865::mg_10::14::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma dia naniraka tany amin''i Joaba, mba hanirahany azy ho any amin''ny mpanjaka, fa tsy nety nankany aminy izy; ary mbola naniraka fanindroany indray Absaloma, fa mbola tsy nety nankany ihany Joaba.'
mg1865::mg_10::14::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia hoy izy tamin''ny mpanompony: Indro, ny tanimbarin''i Joaba mifanolotra amin''ny ahy, ary manana vary hordea ao izy; andeha, dory amin''ny afo izany. Ary ny mpanompon''i Absaloma dia nandoro ny tanimbary.'
mg1865::mg_10::14::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba niainga nankany amin''i Absaloma tao an-tranony ka nanao taminy hoe: Nahoana ny mpanomponao no nandoro ny tanimbariko tamin''ny afo?'
mg1865::mg_10::14::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Absaloma tamin''i Joaba: Indro, naniraka tany aminao aho ka nanao hoe: Mankanesa aty hirahiko ho any amin''ny mpanjaka hanao hoe: Nahoana no niala tany Gesora aho? Tsara amiko raha nitoetra tany ihany mandraka ankehitriny. Koa ankehitriny, aoka re mba hahita ny tavan''ny mpanjaka aho, ka raha manan-keloka aho, dia aoka hovonoiny.'
mg1865::mg_10::14::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba nankany amin''ny mpanjaka ka nanambara izany taminy: ary dia nampanalain''ny mpanjaka Absaloma, dia nankao aminy izy ka niondrika tamin''ny tany teo anatrehan''ny mpanjaka; ary dia nanoroka an''i Absaloma ny mpanjaka.'
mg1865::mg_10::15::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niodinan''i Absaloma, sy ny nandosiran''i Davida'
  verse_text: 'Ary nony afaka izany, Absaloma dia nanomana kalesy iray sy soavaly ary olona dimam-polo lahy ho mpihazakazaka eo alohany.'
mg1865::mg_10::15::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma nifoha maraina koa, dia nijanona teo anilan''ny lalana mankeo am-bavahady, ka raha nisy olona nanana ady ho entiny any amin''ny mpanjaka hotsaraina, dia nantsoin''i Absaloma ka nanontaniany hoe: Avy any amin''ny tanàna aninona ianao? Ary hoy izy: Avy any Anonana amin''ny firenen''Isiraely ny mpanomponao.'
mg1865::mg_10::15::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Absaloma taminy: Eny, tsara sy marina ny raharahanao, saingy tsy misy olona voatendrin''ny mpanjaka hihaino anao.'
mg1865::mg_10::15::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Absaloma: Enga anie ka izaho no voatendry ho mpitsara amin''ny tany, ary ho avy aty amiko ny olona rehetra izay manana ady sy teny hotsaraina, dia homeko rariny izy!'
mg1865::mg_10::15::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaky ny nisy olona nanatona hiankohoka teo anoloany, dia narosony ny tanany ka noraisiny sy norohany izany olona izany.'
mg1865::mg_10::15::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany no nataon''i Absaloma tamin''ny Isiraely rehetra izay nankao amin''ny mpanjaka hotsaraina; ka dia voafetsin''i Absaloma ho azy ny fon''ny lehilahy amin''ny Isiraely.'
mg1865::mg_10::15::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka efa-polo taona*, dia hoy Absaloma tamin''ny mpanjaka: Trarantitra ianao, aoka aho hankany Hebrona hanefa ny voadiko izay nivoadiako tamin''i Jehovah. [*Na: (efa-taona)]'
mg1865::mg_10::15::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nivoady aho mpanomponao, fony mbola nitoetra tany Gesora any Syria, nanao hoe: Raha mbola hampodin''i Jehovah any Jerosalema ihany aho, dia hanompo an''i Jehovah.'
mg1865::mg_10::15::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Mandehana soa aman-tsara ary. Dia niainga izy ka nankany Hebrona.'
mg1865::mg_10::15::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma naniraka mpitety nankeny amin''ny firenen''Isiraely rehetra hanao hoe: Raha vao mandre ny feon''ny anjomara ianareo, dia miantsoa hoe: Absaloma no mpanjaka ao Hebrona.'
mg1865::mg_10::15::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy roan-jato lahy izay nasain''i Absaloma, ka dia nanaraka azy avy tany Jerosalema, nefa nandeha tamin''ny fahatsoran''ny fony izy ireo, fa tsy nahafantatra na inona na inona.'
mg1865::mg_10::15::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma naniraka naka an''i Ahitofela Gilonita, mpanolo-tsaina an''i Davida, avy tao an-tanànany, dia tao Gilo, raha mbola nanatitra ny fanatitra izy. Ary nihamasaka ny tetika fikomiana, ka dia nihamaro mandrakariva ny olona nomba an''i Absaloma.'
mg1865::mg_10::15::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olona tonga tao amin''i Davida ka nilaza hoe: Lasa nanaraka an''i Absaloma fon''ny lehilahy amin''ny Isiraely.'
mg1865::mg_10::15::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''ny mpanompony rehetra izay tao aminy tany Jerosalema: Mitsangàna, andeha isika handositra, fa tsy hisy hahafahantsika amin''i Absaloma; andeha hiala faingana, fandrao tamy faingana izy, ka tratrany eto isika, dia hataony idiran-doza tampoka eto isika, ary hasiany amin''ny lelan-tsabatra ny tanàna.'
mg1865::mg_10::15::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompon''ny mpanjaka taminy: Indreto ny mpanomponao hanao araka izay rehetra sitraky ny mpanjaka tompoko.'
mg1865::mg_10::15::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny mpanjaka ka narahin''ny ankohonany rehetra. Ary ny mpanjaka namela folo vavy tamin''ny vaditsindranony hiandry trano.'
mg1865::mg_10::15::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka ny mpanjaka, ka dia nanaraka azy ny vahoaka rehetra, ary nitoetra teo Faratanàna izy.'
mg1865::mg_10::15::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompony rehetra nandeha teny anilany, ka ny miaramila mpiambina andriana* rehetra sy ny Gatita rehetra, dia enin-jato lahy izay nanaraka azy avy tany Gata, nandeha teo alohan''ny mpanjaka. [*Hebreo: Keretita sy Peletita]'
mg1865::mg_10::15::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''Itahy Gatita: Nahoana no ianao avy no mba miaraka aminay? Miverena, ka mitoera any amin''ny mpanjaka; fa hafa firenena sady mpivahiny ianao; modia ho any amin''ny fonenanao.'
mg1865::mg_10::15::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vao omaly no nahatongavanao, ka anio va dia ho entiko manjenjena hiaraka aminay ianao? fa mandeha ho any amin''izay azoko aleha aho, koa miverena ihany ianao, ary ento hiara-miverina aminao koa ny rahalahinao; ho aminao anie ny famindram-po sy ny fahamarinana.'
mg1865::mg_10::15::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Itahy namaly ny mpanjaka hoe: Raha velona koa Jehovah, ary raha velona koa ny mpanjaka tompoko, izay hitoeran''ny mpanjaka tompoko, na ho faty na ho velona, dia any koa no hitoeran''ny mpanomponao.'
mg1865::mg_10::15::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''Itahy: Andeha mandroso ary. Dia nandroso Itahy Gatita sy ny olony rehetra mbamin''ny zaza amim-behivavy rehetra izay teo.'
mg1865::mg_10::15::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra dia nitomany nikaikaika, ary nita ny vahoaka rehetra; ny mpanjaka koa dia nita ny lohasahan-driaka Kidrona, ary ny vahoaka rehetra nandroso tamin''ny lalana mankany an''efitra.'
mg1865::mg_10::15::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary indro koa Zadoka sy ny Levita rehetra nanaraka azy nitondra ny fiaran''ny faneken''Andriamanitra. Ary nametraka ny fiaran''Andriamanitra izy ary Abiatara niakatra mandra-pahatapitry ny olona rehetra avy tao an-tanàna.'
mg1865::mg_10::15::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Zadoka: Ento miverina ho any an-tanàna ihany ny fiaran''Andriamanitra; fa raha mahita fitia eo imason''i Jehovah aho, dia mbola ho entiny miverina ihany, ka hasehony ahy iny sy ny fitoerany.'
mg1865::mg_10::15::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izao kosa no lazainy: Tsy sitrako ianao, dia inty aho, aoka Izy hanao amiko araka izay ataony ho tsara.'
mg1865::mg_10::15::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa ny mpanjaka tamin''i Zadoka mpisorona: Tsy mpahita va ianao? miverena soa aman-tsara any an-tanàna ianao mbamin''ny zanakareo roa lahy miaraka aminareo, dia Ahimaza zanakao sy Jonatana, zanak''i Abiatara.'
mg1865::mg_10::15::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izaho hijanonjanona eny amin''ny fitàna* any amin''ny efitra mandra-pahatongan''izay teny avy aty aminareo hambara amiko. [*Na: tani-hay]'
mg1865::mg_10::15::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Zadoka sy Abiatara nitondra ny fiaran''Andriamanitra niverina nankany Jerosalema ihany; dia nitoetra tany izy.'
mg1865::mg_10::15::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida niakatra teny an-tendrombohitra Oliva ka nitomany teny am-piakarana ary nisaron-doha sady nandeha tsy nikiraro; ary ny vahoaka rehetra izay nanaraka azy samy nisaron-doha sy niakatra ary nitomany teny am-piakarana avokoa.'
mg1865::mg_10::15::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanambara tamin''i Davida hoe: Ahitofela koa mba isan''ny mpiray tetika amin''i Absaloma. Dia hoy Davida: Mitaraina aminao aho, Jehovah o, ampodio ho fahadalana ny hevitra ataon''i Ahitofela.'
mg1865::mg_10::15::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo an-tampon''ny tendrombohitra Davida, dia teo amin''izay fivavahan''ny olona tamin''Andriamanitra, indro, avy hitsena azy Hosay Arkita, voatriatra ny akanjony sady nihosin-tany ny lohany;'
mg1865::mg_10::15::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy Davida taminy: Raha miara-mandroso amiko ianao, dia ho tonga enta-mavesatra amiko;'
mg1865::mg_10::15::34:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha hiverina any an-tanàna kosa ianao ka hanao amin''i Absaloma hoe: Ho mpanomponao aho, ry mpanjaka; efa mpanompon''ny rainao ihany aho taloha, fa ankehitriny kosa dia mpanomponao, aho dia hofoananao hahasoa ahy ny hevitra ataon''i Ahitofela.'
mg1865::mg_10::15::35:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ao aminao va Zadoka sy Abiatara mpisorona? Koa izay zavatra rehetra renao avy ao an-tranon''ny mpanjaka, dia ambarao amin''i Zadoka sy Abiatara mpisorona.'
mg1865::mg_10::15::36:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, any aminy ny zanany roa lahy, dia Ahimaza, zanak''i Zadoka, sy Jonatana, zanak''i Abiatara; ary izy no hampitondrainareo izay rehetra renareo ho aty amiko.'
mg1865::mg_10::15::37:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 15
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tonga tany an-tanàna Hosay, sakaizan''i Davida, tamin''ny nahatongavan''i Absaloma tany Jerosalema.'
mg1865::mg_10::16::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nataon''i Absaloma tany Jerosalema, sy ny hevitra nomen''i Ahitofela azy, ary ny nanafoanan''i Hosay izany'
  verse_text: 'Ary nony vao nihilana kely avy teo an-tampon''ny tendrombohitra Davida, indro, Ziba, mpanompon''i Mefiboseta, nitsena azy mitondra boriky roa voaisy lasely sady ampitondraina mofo roan-jato sy voaloboka maina zato sampaho sy voankazo masaka fahavaratra zato ary divay iray tavoara*. [*Na: siny hoditra]'
mg1865::mg_10::16::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Ziba: Ahoana no hevitrao amin''ireto? Dia hoy Ziba: Ny boriky dia ho an''ny ankohonan''ny mpanjaka itaingenany; ary ny mofo sy ny voankazo masaka fahavaratra hohanin''ny zatovo; ary ny divay hosotroin''izay reraka any an''efitra.'
mg1865::mg_10::16::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka: Aiza ny zanakalahin''ny tomponao? Ary hoy Ziba tamin''ny mpanjaka: Indro, mitoetra any Jerosalema izy; fa hoy izy: Anio no hampodian''ny taranak''Isiraely ny fanjakan''ikaky ho ahy.'
mg1865::mg_10::16::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka tamin''i Ziba: Indro, anao izay rehetra an''i Mefiboseta. Ary hoy Ziba: Trarantitra anie ianao, aoka hahazo fitia eto imasonao aho, ry mpanjaka tompoko.'
mg1865::mg_10::16::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nanakaiky an''i Bahorima Davida mpanjaka, indro, nisy lehilahy, tamingan''i Saoly ny anarany dia Simey, zanak''i Gera nivoaka avy tao izy ka nanozona teny ampandehanana.'
mg1865::mg_10::16::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitora-bato an''i Davida mpanjaka sy ny mpanompony rehetra izy; ary ny vahoaka rehetra sy ny lehilahy mahery rehetra dia teo amin''ny ankavanan''ny mpanjaka sy teo amin''ny ankaviany.'
mg1865::mg_10::16::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny fanozon''i Simey: Mandehana, mandehana, ry lehilahy mpandatsa-drà sy tena ratsy fanahy!'
mg1865::mg_10::16::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataon''i Jehovah manody anao izao ny ran''ny tamingan''i Saoly, ilay nodimbiasanao fanjakana; ary Jehovah nanome ny fanjakana ho eo an-tanan''i Absaloma zanakao kosa; ary indro, efa idiran-doza izao ianao, satria mpandatsa-drà.'
mg1865::mg_10::16::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Abisay, zanak''i Zeroia, tamin''ny mpanjaka: Nahoana no avela hanozona ny mpanjaka tompoko io alika maty io? Trarantitra ianao, aoka aho handeha ka hanapaka ny lohany.'
mg1865::mg_10::16::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpanjaka: Moa mifaninona akory izaho sy ianareo, ry zanak''i Zeroia? Raha manozona izy, sady Jehovah no nanao taminy hoe: Ozony Davida, dia iza indray no hanao hoe: Nahoana ianao no manao izany?'
mg1865::mg_10::16::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Davida tamin''i Abisay sy tamin''ny mpanompony rehetra: Indro, ny zanako naterako aza mitady ny aiko, ka mainka io Benjamita io! Avelao ihany izy hanozona, fa Jehovah no nampanao azy izany.'
mg1865::mg_10::16::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angamba Jehovah hamindra fo amiko ny amin''ny heloko* ary hamaly soa ahy noho izao ozona nanjo ahy androany izao. [*Na: hijery ny fahoriako (na, ny ranomasoko?)]'
mg1865::mg_10::16::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha teny an-dàlana Davida sy ny olony, dia nandeha tamin''ny ilan''ny havoana tandrifiny kosa Simey ka nanozona teny ampandehanana sady nitora-bato nanandrify azy sy namafy vovoka.'
mg1865::mg_10::16::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga tao ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy sady efa reraka*, ka dia naka aina teo izy. [*Na: Ary tonga tao Aiefima ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy]'
mg1865::mg_10::16::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny nataon''i Absaloma tany Jerosalema, sy ny hevitra nomen''i Ahitofela azy, ary ny nanafoanan''i Hosay izany'
  verse_text: 'Ary Absaloma sy ny vahoaka rehetra tamin''ny Isiraely dia tonga tany Jerosalema, ary Ahitofela koa dia teo aminy.'
mg1865::mg_10::16::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hosay Arkita, sakaizan''i Davida, dia tonga tao amin''i Absaloma ka nanao taminy hoe: Ho ela velona anie ny mpanjaka! ho ela velona anie ny mpanjaka!'
mg1865::mg_10::16::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Absaloma tamin''i Hosay: izao va no fitianao ny sakaizanao? Nahoana ianao no tsy mba nandeha niaraka tamin''ny sakaizanao?'
mg1865::mg_10::16::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hosay tamin''i Absaloma: Tsia, fa izay nofidin''i Jehovah sa ireto vahoaka ireto mbamin''ny lehilahy amin''ny Isiraely, dia izy no hombako, sady ao aminy no hitoerako.'
mg1865::mg_10::16::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, iza indray no hotompoiko? Tsy eo anatrehan''ny zanany va? Tahaka ny nanompoako teo anatrehan''ny rainao no hanompoako eto anatrehanao koa.'
mg1865::mg_10::16::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Absaloma tamin''i Ahitofela: Heveronareo tsara izay hataontsika.'
mg1865::mg_10::16::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Ahitofela tamin''i Absaloma: Midira ao amin''ny vaditsindranon-drainao, izay nampiandrasiny trano; dia ho ren''ny Isiraely rehetra fa efa nanamaimbo tena eo anatrehan-drainao ianao, ka dia hahery ny tanan''izay rehetra momba anao.'
mg1865::mg_10::16::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanorin-day ho an''i Absaloma teo an-tampon-trano ny olona; ary Absaloma niditra tao amin''ny vaditsindranon-drainy teo imason''ny Isiraely rehetra.'
mg1865::mg_10::16::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny hevitr''i Ahitofela izay nataony tamin''izany dia hoatra ny manontany amin''Andriamanitra; toy izany avokoa ny hevitra rehetra nataon''i Ahitofela, na tamin''i Davida, na tamin''i Absaloma.'
mg1865::mg_10::17::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ahitofela tamin''i Absaloma: Aoka aho hifantina lehilahy roa arivo amby iray alina ka hiainga hanenjika an''i Davida anio alina;'
mg1865::mg_10::17::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho tonga ao aminy aho amin''ilay izy mbola sasatra sy reraka iny, ka dia hotairiko; dia handositra ny vahoaka rehetra izay any aminy, ary ny mpanjaka ihany no hasiako;'
mg1865::mg_10::17::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia haveriko ho ety aminao ny vahoaka rehetra miankina amin''io lehilahy tadiavinareo io ny hiverenan''ny vahoaka rehetra, ka dia hiadana ny olona rehetra.'
mg1865::mg_10::17::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitrak''i Absaloma sy ny loholon''ny Isiraely rehetra izany.'
mg1865::mg_10::17::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa hoy Absaloma: Mba antsoy kosa Hosay Arkita, ary aoka ho rentsika koa izay teniny.'
mg1865::mg_10::17::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''i Absaloma Hosay dia hoy Absaloma taminy: Izao no hevitr''i Ahitofela; ka hanao araka ny teniny va isika? Sa ahoana kosa no hevitrao?'
mg1865::mg_10::17::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hosay tamin''i Absaloma: Tsy mety ny hevitra nataon''i Ahitofela tamin''ity.'
mg1865::mg_10::17::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa Hosay: Ianao mahalala ny rainao sy ny olony, fa olona mahery izy sady masiaka tahaka ny bera very anaka any an-tsaha; ary lehilahy mpiady rainao ka tsy miara-mitoetra amin''ny vahoaka raha alina.'
mg1865::mg_10::17::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, miery any an-davaka anankiray izy izao, na ao amin''ny fitoerana hafa; ka raha misy resiny amin''ny voalohany, izay mandre izany dia hanao hoe: Nahafatesana ny olona manaraka an''i Absaloma,'
mg1865::mg_10::17::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary na dia izay mahery ka manana fo tahaka ny fon''ny liona aza dia ho ketraka tokoa; fa fantatry ny Isiraely rehetra fa lehilahy mahery rainao, sady lehilahy mahery koa ireny manaraka azy ireny.'
mg1865::mg_10::17::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao kosa no mba hevitro: Aoka hovorina ho eto aminao avokoa ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba, toy ny fasika amoron-dranomasina no hamarony; ka dia ny tenanao no hankany an-tafika.'
mg1865::mg_10::17::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tonga ao aminy amin''izay fitoerana anankiray hahitana azy isika, ka dia hilatsaka aminy toy ny filatsaky ny ando amin''ny tany, ka tsy hasiantsika miangana na dia iray akory aza izy mbamin''izay olona rehetra manaraka azy.'
mg1865::mg_10::17::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miditra an-tanàna izy, dia hitondran''ny Isiraely rehetra mahazaka izany tanàna izany, ka dia hotarihintsika ho any amin''ny ony izany ambara-paha-tsy hisy na dia vato kely iray aza hita ao.'
mg1865::mg_10::17::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Absaloma sy ny lehilahy rehetra amin''ny Isiraely: Tsara noho ny hevitra nataon''i Ahitofela ny nataon''i Hosay Arkita. Fa efa notendren''i Jehovah ho foana ny sain-dalina nataon''i Ahitofela, hampidiran''i Jehovah loza amin''i Absaloma.'
mg1865::mg_10::17::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Hosay tamin''i Zadoka sy Abiatara mpisorona: Izany ka izany no hevitra nomen''i Ahitofela an''i Absaloma sy ny loholon''ny Isiraely; ary izao ka izao kosa no hevitra nomeko azy.'
mg1865::mg_10::17::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maniraha haingana izao, ary ambarao amin''i Davida hoe: Aza mitoetra any amin''ny fitàna* any amin''ny efitra anio alina, fa mità faingana tokoa, fandrao ho levona na ny mpanjaka na ny olona rehetra any aminy. [*Na: tani-hay]'
mg1865::mg_10::17::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana sy Ahimaza nitoetra tao En-rogela; fa tsy sahy niseho tao an-tanàna izy; ary nisy ankizivavy anankiray nivoivoy nanambara taminy; dia lasa nandeha nanambara tany amin''i Davida mpanjaka kosa izy roa lahy.'
mg1865::mg_10::17::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy zazalahy iray nahita azy ka nanambara tamin''i Absaloma; nefa lasa faingana izy roa lahy ka tonga tao an-tranon''olona tao Bahorima, izay nisy lavaka fantsakana tao an-tokotaniny, dia nidina tao izy roa lahy.'
mg1865::mg_10::17::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''ny vadin-dralehilahy ny rakotra ka narakony teo am-bavan''ny lavaka fantsakana, ary dia nanahy koba teo amboniny izy, ka tsy nisy nahalala.'
mg1865::mg_10::17::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tao amin-dravehivavy tao an-trano ny mpanompon''i Absaloma, dia nanao hoe: Aiza Ahimaza sy Jonatana teto? Fa hoy ravehivavy taminy: Tafita ny renirano kely izy izay. Ary nony efa nitady azy ireo ka tsy nahita, dia niverina nankany Jerosalema.'
mg1865::mg_10::17::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa lasa ireo, dia niakatra avy ao amin''ny lavaka fantsakana izy roa lahy, ka lasa nandeha izy, dia nanambara tamin''i Davida mpanjaka hoe: Miaingà, ka mità faingana ny rano; fa izany no hevitra nataon''i Ahitofela hamelezana anareo.'
mg1865::mg_10::17::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Davida sy ny olona nanaraka , azy, ka nita an''i Jordana izy; ary nony maraina ny andro, dia tsy tafita an''i Jordana na dia olona iray aza.'
mg1865::mg_10::17::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Ahitofela fa tsy narahina ny hevitra nataony, dia nasiany lasely ny borikiny, dia niainga izy dia nody tany an-tranony tany an-tanànany; ary nanafatra ny ankohonany izy, dia nanaton-tena, ka dia maty ary nalevina tao amin''ny fasan-drainy.'
mg1865::mg_10::17::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nandresena an''i Absaloma, sy ny nahafatesany'
  verse_text: 'Ary Davida tonga tao Mahanaima. Ary Absaloma nita an''i Jordana, dia izy sy ny lehilahy rehetra amin''ny Isiraely izay nanaraka azy.'
mg1865::mg_10::17::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amasa no notendren''i Absaloma ho komandin''ny miaramilany ho solon''i Joaba; ary Amasa dia zanak''ilay Isiraelita* atao hoe Jitra, ilay nandry tamin''i Abigaila, zanakavavin''i Nahasy sady rahavavin''i Zeroia, renin''i Joaba. [*Na: Ismaelita; izahao I Tantara 2:17]'
mg1865::mg_10::17::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely sy ny Absaloma nitoby tany amin''ny tany Gileada.'
mg1865::mg_10::17::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tao Mahanaima Davida, dia, indreo, tamy Soby, zanak''i Amona, sy Makira, zanak''i Amiela, avy any Lo-debara, ary Barzilay Gileadita, avy any Rogelima,'
mg1865::mg_10::17::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy mitondra fandriana sy bakoly sy vilany tany sy vary hordea sy koba sy lango sy tsaramaso sy voanemba* ary voanemba voaendy [*erva lenta]'
mg1865::mg_10::17::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 17
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy tantely sy rononomandry sy ondry ary zanak''omby* ho an''i Davida sy ny olona nanaraka azy; fa hoy izy: Noana sy sasatra ary mangetaheta aty an''efitra ny vahoaka. [*Na: rononomandrin''omby]'
mg1865::mg_10::18::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nandamina ny olona izay nomba azy ka nanendry mpifehy arivo sy mpifehy zato hifehy azy.'
mg1865::mg_10::18::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nampandeha ny olona, ka ny ampahatelony nofehezin''i Joaba, ary ny ampahatelony nofehezin''i Abisay, zanak''i Zeroia, rahalahin''i Joaba, ary ny ampahatelony kosa nofehezin''Itahy Gatita. Ary hoy ny mpanjaka tamin''ny vahoaka: Izaho koa dia handeha hiaraka aminareo tokoa.'
mg1865::mg_10::18::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny vahoaka: Tsy avelanay andeha ianao; fa raha mandositra izahay, dia tsy hahoany; ary na matiny sasaka aza izahay, dia tsy hahoany akory; fa ianao no hoatra ny iray alina aminay; koa tsara raha hamonjy anay avy tao an-tanàna ianao.'
mg1865::mg_10::18::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Izay sitrakareo ary no hataoko. Dia nitsangana teo anilan''ny vavahady ny mpanjaka, ary ny vahoaka rehetra nivoaka isan-jato sy isan''arivo.'
mg1865::mg_10::18::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nandidy an''i Joaba sy Abisay ary Itahy hoe: Noho ny amiko dia mamindrà fo amin''i Absaloma zatovo. Ary ny olona rehetra dia nahare ny nandidian''ny mpanjaka ny mpifehy rehetra ny amin''i Absaloma.'
mg1865::mg_10::18::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nivoaka teny an-tsaha ny vahoaka hiady amin''ny Isiraely, ka rafitra tao amin''ny alan''i Efraima ny ady;'
mg1865::mg_10::18::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary resy tao ny lehilahy amin''ny Isiraely teo anoloan''ny mpanompon''i Davida, ka be dia be no ringana androtrizay, dia olona roa alina.'
mg1865::mg_10::18::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nihahakahaka teny rehetra teny ny ady; ka ny matin''ny ala androtrizay dia be noho ny matin''ny sabatra.'
mg1865::mg_10::18::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma nifanehatra tamin''ny mpanompon''i Davida. Ary nitaingina ampondra izy, ary ny ampondra nandeha teo ambanin''ny rantsan-kazo mikirindro tamin''ny hazo terebinta, ka voahazon''ny hazo terebinta ny lohan''i Absaloma, ka dia nikiraviravy teo anelanelan''ny lanitra sy ny tany izy; fa lasa ny ampondra nitaingenany.'
mg1865::mg_10::18::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray nahita izany, dia nanambara tamin''i Joaba hoe: Indro, hitako mihantona amin''ny hazo terebinta Absaloma.'
mg1865::mg_10::18::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Joaba tamin''ilay lehilahy nilaza taminy: Koa nahoana, raha nahita azy ianao, no tsy nasianao hianjera amin''ny tany izy, ka dia tsy maintsy ho nomeko sekely volafotsy folo sy fehin-kibo ianao?'
mg1865::mg_10::18::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ralehilahy tamin''i Joaba: Na dia efa mby an-tanako aza ny sekely volafotsy arivo, tsy haninjitra ny tanako hamely ny zanaky ny mpanjaka aho; fa teo anatrehanay no nandidian''ny mpanjaka anao sy Abisay ary Itahy hoe: Samia mitandrina an''i Absaloma zatovo.'
mg1865::mg_10::18::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy zavatra azo afenina amin''ny mpanjaka, koa raha nanao hafahafa taminy aho, na dia ianao io aza dia ho nitsangana hanameloka ahy*. [*Na: ho nahafoy ahy]'
mg1865::mg_10::18::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Joaba: Tsy handany andro foana eto aminao aho. Ary nitondra lefona telo teny an-tanany Izy, ka natsatony tamin''ny fon''i Absaloma, raha mbola velona teo amin''ny hazo terebinta izy.'
mg1865::mg_10::18::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tovolahy folo, mpitondra ny fiadian''i Joaba, nanodidina an''i Absaloma ka namely azy ho faty.'
mg1865::mg_10::18::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba nitsoka ny anjomara, ka dia niverina avy nanenjika ny Isiraely ny vahoaka, satria niantran''i Joaba izy.'
mg1865::mg_10::18::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''ny olona Absaloma ka natsipiny tao an-davaka lehibe anankiray tao anaty ala, dia nasiany antontam-bato lehibe teo amboniny; ary ny Isiraely rehetra samy nandositra ho any amin''ny lainy avy.'
mg1865::mg_10::18::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fony mbola velona Absaloma, dia efa naka vato izy ka nanao ilay tsangam-bato ho azy tao an-dohasahan''ny Mpanjaka, fa hoy izy: Tsy manan-janakalahy hamelo-maso ahy aho; ary dia nataony araka ny anaran''ny tenany ihany ilay tsangam-bato, ka mbola atao hoe: Fahatsiarovana an''i Absaloma no anarany mandraka androany.'
mg1865::mg_10::18::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny nandrenesan''i Davida ny nahafatesan''i Absaloma sy ny hamafin''ny alahelony azy'
  verse_text: 'Dia hoy Ahimaza, zanak''i Zadoka: Aoka aho hihazakazaka hitondra teny mahafaly ho any amin''ny mpanjaka ny amin''ny nanomezan''i Jehovah azy ny rariny ka nahafahany tamin''ny fahavalony.'
mg1865::mg_10::18::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Joaba taminy: Tsy ho mpitondra teny mahafaly ianao, raha mandeha anio, satria maty ny zanakalahin''ny mpanjaka, fa andro hafa dia mbola hitondra teny mahafaly ihany ianao.'
mg1865::mg_10::18::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Joaba tamin''ilay Kosita: Andeha, ambarao amin''ny mpanjaka izay efa hitanao. Ary ilay Kosita niankohoka teo anatrehan''i Joaba, dia lasa nihazakazaka.'
mg1865::mg_10::18::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ahimaza, zanak''i Zadoka, dia mbola niteny tamin''i Joaba ihany nanao hoe: Ka nahoana aza, aoka ihany aho mba hiezaka koa hanaraka ilay Kosita. Fa hoy Joaba: Ahoana no hiezahanao, anaka; fa na dia mandeha aza ianao, tsy hisy teny mahafaly hahazoanao fitia tsinona?'
mg1865::mg_10::18::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nahoana aza, hoy izy: Aoka ihany aho hiezaka. Dia hoy Joaba taminy: Miezaha ary. Ary dia niezaka tamin''ny lalana eny amin''ny lemaka Ahimaza ka nihoatra an''ilay Kosita.'
mg1865::mg_10::18::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nipetraka teo anelanelan''ny vavahady roa; ary ny mpitily niakatra teo ambony vavahady teo amin''ny manda, ka nanopy ny masony, dia nahita, ka indry misy lehilahy iray mihazakazaka.'
mg1865::mg_10::18::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitily niantso ka nilaza tamin''ny mpanjaka. Dia hoy ny mpanjaka: Raha irery izy, dia ho teny mahafaly no entiny. Ary mbola nanatona anatona ihany ralehilahy.'
mg1865::mg_10::18::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitily nahita lehilahy iray koa nihazakazaka, dia niantso ny mpiandry vavahady izy nanao hoe: Indry koa misy lehilahy iray tamy mihazakazaka. Dia hoy ny mpanjaka: Mitondra teny mahafaly ihany koa izy.'
mg1865::mg_10::18::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpitily: Raha toa ahy, dia tahaka ny fihazakazak''i Ahimaza, zanak''i Zadoka, no fihazakazak''iny aloha. Ary hoy ny mpanjaka: Lehilahy tsara fanahy iny, ka hitondra teny soa mahafaly no ihaviany.'
mg1865::mg_10::18::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahimaza niantso ka nanao tamin''ny mpanjaka hoe: Fiadanana! sady niankohoka tamin''ny tany teo anatrehan''ny mpanjaka izy ka nanao hoe: Isaorana anie Jehovah Andriamanitrao, Izay efa nanolotra ny olona nanainga tanana hikomy amin''ny mpanjaka tompoko.'
mg1865::mg_10::18::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka: Tsara ihany va Absaloma zatovo? Fa hoy Ahimaza: Tamin''ny nanirahan''i Joaba ny mpanompon''ny mpanjaka sy izaho mpanomponao koa dia nandre tabataba be aho, nefa tsy fantatro izay antony.'
mg1865::mg_10::18::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Mitanilà kely ary, ka mijanona etsy; dia nitanila izy ka nitoetra teo.'
mg1865::mg_10::18::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, avy ilay Kosita ka nanao hoe: Aoka ny mpanjaka tompoko hihaino teny mahafaly; fa Jehovah efa nanome anao ny rariny ka nahafaka anao ankehitriny tamin''izay rehetra nitsangana hikomy aminao.'
mg1865::mg_10::18::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''ilay Kosita: Tsara ihany va Absaloma zatovo? Fa hoy ilay Kosita: Aoka ny fahavalon''ny mpanjaka tompoko sy izay rehetra mitsangana hanisy ratsy anao ho tahaka iny zatovo iny.'
mg1865::mg_10::19::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niontana tery ny fon''ny mpanjaka, ka niakatra nankeo amin''ny efi-trano teo ambony vavahady izy sady nitomany teny am-pandehanana ka nanao hoe: Ry Absaloma, zanako, zanako, ry Absaloma, zanako o! Inay anie aho no maty nisolo anao, ry Absaloma zanako, zanako o!'
mg1865::mg_10::19::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Joaba hoe: Indro, mitomany sy misaona an''i Absaloma ny mpanjaka.'
mg1865::mg_10::19::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny famonjena dia tonga fisaonana tamin''ny vahoaka rehetra androtrizay, satria ren''ny vahoaka tamin''izany andro izany hoe: Malahelo ny zanany ny mpanjaka.'
mg1865::mg_10::19::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niakatra nisokosoko tao an-tanàna ny olona tamin''izany andro izany, toy ny fisokosokon''ny olona menatra raha mandositra amin''ny ady.'
mg1865::mg_10::19::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka nanarona ny tavany sady nidradradradra tamin''ny feo mafy hoe: Ry Absaloma, zanako, ry Absaloma, zanako, zanako o!'
mg1865::mg_10::19::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: '2022-04-24T12:53:14+0000'
  verse_title: null
  verse_text: 'Ary niditra tao amin''ny mpanjaka tao an-trano Joaba ka nanao hoe: Efa nomenarinao androany ny mpanomponao rehetra izay namonjy ny ainao androany sy ny ain''ny zanakao lahy sy ny zanakao vavy ary ny ain''ny vadinao sy ny vaditsindranonao;'
mg1865::mg_10::19::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny mankahala anao no tianao, ary ny tia anao kosa no halanao, ka nasehonao androany fa tsinontsinona aminao ny manamboninahitra sy ny miaramila; ary hitako izao fa raha velona Absaloma, ka izahay rehetra no maty androany, dia izany no sitrakao.'
mg1865::mg_10::19::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitsangàna ankehitriny, ka mivoaha, ary manaova teny soa amin''ny mpanomponao; fa mianiana amin''i Jehovah aho fa raha tsy mivoaka ianao, dia tsy hisy na dia iray akory aza hitoetra eto aminao anio alina; ka dia izany no ho mafy lavitra aminao noho ny fahoriana rehetra izay nanjo anao hatry ny fony ianao vao zaza ka ambaraka ankehitriny.'
mg1865::mg_10::19::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny mpanjaka ka nijanona teo am-bavahady; ary nolazaina tamin''ny vahoaka rehetra hoe: Indro, ny mpanjaka mijanona eo am-bavahady. Ary ny vahoaka rehetra dia nankeo anatrehan''ny mpanjaka. [*Ny nodian''i Davida indray] Ary ny Isiraely dia samy efa lasa nandositra ho any amin''ny lainy avy.'
mg1865::mg_10::19::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra tamin''ny firenen''Isiraely nifanditra hoe: Ny mpanjaka no namonjy antsika tamin''ny tanan''ny fahavalontsika, indrindra fa tamin''ny tanan''ny Filistina; nefa ankehitriny dia efa nandositra niala tamin''ny tany izy noho ny amin''i Absaloma.'
mg1865::mg_10::19::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Absaloma, izay nohosorantsika hanjaka amintsika, dia efa maty tamin''ny ady. Koa nahoana ianareo no tsy miteny akory ny amin''ny hampodiana ny mpanjaka?'
mg1865::mg_10::19::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mpanjaka naniraka tany amin''i Zadoka sy Abiatara mpisorona ka nanao hoe: Ataovy amin''ny loholon''ny Joda hoe: Nahoana no dia ianareo indray no ho farany amin''ny fampodiana ny mpanjaka ho any an-tranony? fa ny tenin''ny Isiraely rehetra efa tonga tao amin''ny mpanjaka tao an-tranony'
mg1865::mg_10::19::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: '2022-04-24T12:53:01+0000'
  verse_title: null
  verse_text: 'rahalahiko ianareo, ary taolako sy nofoko ianareo; koa nahoana no dia ianareo indray no ho farany amin''ny fampodiana ny mpanjaka?'
mg1865::mg_10::19::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy amin''i Amasa koa hoe: Tsy taolako sy nofoko va ianao? Hataon''Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy komandin''ny miaramila eo anatrehako mandrakariva ho solon''i Joaba ianao.'
mg1865::mg_10::19::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nampitodika ny fon''ny lehilahy rehetra amin''ny Joda ho toy ny olona iray izy; ka dia naniraka tany amin''ny mpanjaka izy ka nanao hoe: Modia ianao sy ny mpanomponao rehetra.'
mg1865::mg_10::19::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nody ny mpanjaka ka tonga tao Jordana; ary ny Joda tonga tao Gilgala hitsena ny mpanjaka hitondra azy hita an''i Jordana.'
mg1865::mg_10::19::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simey, zanak''i Gera, Benjamita avy any Bahorina, dia nidodododo nidina araka tamin''ny lehilahy amin''ny Joda hitsena an''i Davida mpanjaka.'
mg1865::mg_10::19::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy benjamita arivo lahy koa nanaraka azy, ary Ziba, mpanompon''ny taranak''i Saoly, mbamin''ny zananilahy dimy ambin''ny folo sy mpanompony roa-polo lahy izay nanaraka azy; ary dia nita an''i Jordana teo alohan''ny mpanjaka izy ireo.'
mg1865::mg_10::19::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navoivoy teo ny lakana hampitana ny ankohonan''ny mpanjaka sy hanaovany izay sitrany. Ary nony efa hita an''i Jordana ny mpanjaka, dia indro Simey, zanak''i Gera, niankohoka teo anatrehany.'
mg1865::mg_10::19::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny mpanjaka: Aoka tsy hisain''ny tompoko heloka aho, ary aoka tsy hotsarovanao ny ratsy nataon''ny mpanomponao tamin''ny andro nivoahan''ny mpanjaka tompoko niala tany Jerosalema, ary aoka tsy ho eritreretin''ny mpanjaka izany;'
mg1865::mg_10::19::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatro, izaho mpanomponao, fa nanota aho; ka he! izaho no avy voalohany androany amin''ny taranak''i Josefa rehetra ka nidina hitsena ny mpanjaka tompoko.'
mg1865::mg_10::19::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly Abisay, zanak''i Zeroia, ka nanao hoe: Tsy hovonoina va Simey noho izany, satria efa nanozona ny voahosotr''i Jehovah izy?'
mg1865::mg_10::19::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida: Moa mifaninona akory izaho sy ianareo, ry zanak''i Zeroia, no tonga mpanohitra ahy ianareo anio? Tokony hisy olona hatao maty va eto amin''ny Isiraely izao? Fa moa tsy fantatra va fa izaho no mpanjakan''ny Isiraely anio?'
mg1865::mg_10::19::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: '2022-04-24T12:52:50+0000'
  verse_title: null
  verse_text: 'Ary dia hoy ny mpanjaka tamin''i Simey: Tsy ho faty ianao. Ary ny mpanjaka dia nianiana taminy.'
mg1865::mg_10::19::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mefiboseta, zanakalahin''i Saoly, nidina hitsena ny mpanjaka, ary tsy nanasa tongotra na namboatra volom-bava na nanasa lamba izy hatramin''ny andro nialan''ny mpanjaka ka hatramin''ny andro nahatongavany soa aman-tsara.'
mg1865::mg_10::19::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa tonga hitsena ny mpanjaka ny avy any Jerosalema, dia hoy ny mpanjaka taminy: Nahoana no tsy mba nandeha niaraka tamiko ianao, ry Mefiboseta?'
mg1865::mg_10::19::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Ry mpanjaka tompoko, nofitahin''ny mpanompoko aho; Fa hoy izaho mpanomponao : Hanisy lasely ny boriky aho hitaingenako ka hankany amin''ny mpanjaka; fa malemy tongotra ny mpanomponao.'
mg1865::mg_10::19::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nendrikendrehiny tamin''ny mpanjaka tompoko izaho mpanomponao; fa ny mpanjaka tompoko dia toy Ilay Anjelin''Andriamanitra; koa ataovy izay sitrakao.'
mg1865::mg_10::19::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny taranaky ny raiko rehetra dia samy olona tokony ho faty teo anatrehan''ny mpanjaka tompoko; nefa ianao nampitoetra ahy mpanomponao ho isan''izay mihinana amin''ny latabatrao. Koa inona intsony no rariny ho ahy, ary inona no mbola hitarainako amin''ny mpanjaka?'
mg1865::mg_10::19::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Nahoana no lazainao indray ny raharahanao? Nefa izaho efa nilaza hoe: Ianao sy Ziba no hizara ny tany.'
mg1865::mg_10::19::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Mefiboseta tamin''ny mpanjaka: Aoka dia ho azy avokoa izy rehetra, fa ianao mpanjaka tompoko efa tonga soa aman-tsara ao amin''ny tranonao indray.'
mg1865::mg_10::19::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Barzilay Gileadita nidina avy tany Rogelima, dia niara-nita an''i Jordana tamin''ny mpanjaka izy mba hanatitra azy hita an''i Jordana.'
mg1865::mg_10::19::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Barzilay dia lehilahy antitra, efa valo-polo taona; ary izy efa nanome hanina ny mpanjaka, raha nitoetra tany Mahanaima izy; fa mpanjatobe indrindra izy.'
mg1865::mg_10::19::34:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Barzilay: Andeha hiara-mita amiko ianao hovelomiko any amiko any Jerosalema.'
mg1865::mg_10::19::35:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Barzilay tamin''ny mpanjaka: Hoatrinona intsony moa no andro hahavelomako, no hiara-miakatra amin''ny mpanjaka hankany Jerosalema aho?'
mg1865::mg_10::19::36:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valo-polo taona izay ny andro nahavelomako, ka mahalala izay soa sy ratsy intsony va aho? Mahatsiaro ny tsiron-javatra haniko sy sotroiko intsony va aho mpanomponao? Mahare izay feon''ny mpihiralahy sy ny mpihiravavy intsony va aho? Koa nahoana ny mpanomponao no mbola ho enta-mavesatra amin''ny mpanjaka tompoko?'
mg1865::mg_10::19::37:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kely foana no handehanan''ny mpanomponao eo an-dafin''i Jordana hiaraka amin''ny mpanjaka; koa nahoana ny mpanjaka no dia hamaly fitia ahy loatra toy izany?'
mg1865::mg_10::19::38:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Trarantitra ianao, aoka aho mpanomponao hody ihany ka ho faty any amin''ny vohitro ao akaikin''ny fasan''ikaky sy ineny. Fa indro Kimama mpanomponao; aoka izy no hiaraka amin''ny mpanjaka tompoko, ary ataovy aminy izay sitrakao.'
mg1865::mg_10::19::39:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka: Handeha hiaraka amiko tokoa Kimama, ka hataoko aminy izay sitrakao, ary izay angatahinao dia hataoko ho anao.'
mg1865::mg_10::19::40:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra nita an''i Jordana. Ary nony tafita ny mpanjaka, dia norohan''ny mpanjaka Barzilay sady notsofiny rano, ary dia lasa nody ho any amin''ny fonenany izy.'
mg1865::mg_10::19::41:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 41
  verse_date_revised: '2022-04-24T12:52:41+0000'
  verse_title: null
  verse_text: 'Dia nandroso nankany Gilgala ny mpanjaka, ary Kimama niaraka taminy; ny lehilahy rehetra amin''ny Joda sy ny antsasaky ny lehilahy amin''ny Isiraely koa nanatitra ny mpanjaka.'
mg1865::mg_10::19::42:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 42
  verse_date_revised: null
  verse_title: 'Ny nifandiran''ny Isiraely sy ny Joda, ary ny niodinan''i Seba'
  verse_text: 'Ary, indreo, ny lehilahy rehetra amin''Isiraely nankao amin''ny mpanjaka ka nanao taminy hoe: Nahoana ny lehilahy amin''ny Joda, rahalahinay, no nangalatra anao ka nitondra ny mpanjaka sy ny ankohonany ary ny olon''i Davida rehetra teny aminy hita an''i Jordana?'
mg1865::mg_10::19::43:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 43
  verse_date_revised: '2022-04-24T12:52:17+0000'
  verse_title: null
  verse_text: 'Ary ny lehilahy rehetra amin''ny Joda dia namaly ny lehilahy amin''ny Isiraely hoe: Satria havanay akaiky ny mpanjaka; ka ahoana no mahatezitra anareo amin''izany? Nandany ny mpanjaka va izahay? Na nanome zavatra anay akory va izy?'
mg1865::mg_10::19::44:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 19
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy amin''ny Isiraely kosa namaly ny lehilahy amin''ny Joda hoe: Izahay manana anjaram-polo amin''ny mpanjaka; eny, izahay manana an''i Davida mihoatra noho ianareo; koa ahoana ianareo no nanao tsinontsinona anay? Tsy izahay va no niteny talohanareo nampody ny mpanjakanay? Ary ny tenin''ny lehilahy amin''ny Joda dia lozaloza kokoa noho ny tenin''ny lehilahy amin''ny Isiraely.'
mg1865::mg_10::20::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sendra nisy lehilahy iray tena ratsy fanahy teo, Seba no anarany, zanak''i Bikry Benjamita; ary nitsoka ny anjomara izy sady niantso hoe: Isika tsy manana anjara amin''i Davida na lova amin''ny zanak''i Jese; samia mody any amin''ny lainy avy, ry Isiraely o.'
mg1865::mg_10::20::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia samy niara-nandao an''i Davida ny lehilahy amin''ny Isiraely ka nanaraka an''i Seba, zanak''i Bikry; fa ny lehilahy amin''ny Joda no nifikitra tamin''ny mpanjakany hatrany Jordana ka hatrany Jerosalema.'
mg1865::mg_10::20::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tao an-tranony tany Jerosalema Davida mpanjaka, dia nalainy ny vaditsindranony folo vavy izay navelany hiandry trano tao, ka nataony tao an-trano fiambenana ary nomeny fivelomana, fa tsy nandriany intsony. Ka dia nambenana tao mandra-pahafatiny ireo ka velona tsy nanam-bady intsony.'
mg1865::mg_10::20::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Amasa: Vorio ny lehilahy amin''ny Joda ho eto amiko amin''ny hateloana, ary aoka mba ho eto koa ny tenanao.'
mg1865::mg_10::20::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia lasa Arnasa namory ny Joda, fa nandiso ny fotoan''andro nomeny azy izy.'
mg1865::mg_10::20::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Abisay: Ankehitriny izao dia Seba, zanak''i Bikry no ahitantsika loza mihoatra noho Absaloma; koa ento ny mpanomponao ny tomponao, ka enjeho izy, fandrao mahazo tanàna mimanda ka tsy ho azontsika.'
mg1865::mg_10::20::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nivoaka hanenjika azy ny olon''i Joaba sy ny miaramila mpiambina andriana* ary ny lehilahy mahery rehetra; dia nivoaka avy tany Jerosalema ireo hanenjika an''i Seba, zanak''i Bikry. [*Hebreo: Keretita sy Peletita]'
mg1865::mg_10::20::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony tonga tao amin''ilay vato lehibe tao Gibeona izy, dia avy Amasa nitsena azy; ary ny akanjo fiadian''i Joaba, ilay niakanjoany, dia nofehezina taminy, ary teo amboniny teo am-balahany no nisy ny fehin-tsabany ambamin''ny tranony; ary nony nandeha izy, dia latsaka ny sabatra.'
mg1865::mg_10::20::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Joaba tamin''i Amasa: Tsara ihany va ianao, ry rahalahy? Dia noraisin''i Joaba tamin''ny tanany ankavanana ny somotr''i Amasa horohany.'
mg1865::mg_10::20::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Amasa tsy nanahinahy ny sabatra teny an-tanan''i Joaba, kanjo nasiany tamin''ny kibony izy, ka dia nivaroraka tamin''ny tany ny tsinainy, ary tsy nasiany intsony, fa matiny tamin''izay. Ary Joaba sy Abisay rahalahiny nanenjika an''i Seba, zanak''i Bikry.'
mg1865::mg_10::20::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zatovon''i Joaba anankiray nijanona teo anilan''ny faty ka nanao hoe: Izay miandany amin''i Joaba sy Davida dia aoka hanaraka an''i Joaba.'
mg1865::mg_10::20::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Amasa nihosin-drà teo anaty lalambe. Ary raha hitan-dralehilahy fa nijanona ny olona rehetra, dia nafindrany niala teo amin''ny lalambe ho any an-tsaha ny fatin''i Amasa ka nosaronany lamba, nony hitany fa nijanona izay rehetra mandalo azy.'
mg1865::mg_10::20::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nafindrany niala teo amin''ny lalambe izy, dia nizotra nanaraka an''i Joaba ny olona rehetra hanenjika an''i Seba, zanak''i Bikry.'
mg1865::mg_10::20::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nandeha namaky ny firenen''Isiraely rehetra hatrany Abela sy Beti-maka sy ny an''ny Berita rehetra; ary nivory ireo, ka dia mba lasa nanaraka azy.'
mg1865::mg_10::20::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga izy ka nanao fahirano azy teo Abela sy Beti-maka, ary nanandratra tovon-tany tandrifin''ny tanàna izy, ka teo ivelany manolotra ny manda no nitoerany; ary ny olona izay nomba an''i Joaba dia namely nandrava ny manda.'
mg1865::mg_10::20::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy hendry tao an-tanàna niantso hoe: Mihainoa, mihainoa e; masïna ianareo, lazao amin''i Joaba hoe: Mankanesa ery aminy, hono, ianao, fa misy holazainy aminao.'
mg1865::mg_10::20::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa mby tao akaiky izy, dia hoy ravehivavy: Ianao va no Joaba? Dia hoy izy: Eny, izaho no izy. Ary hoy ravehivavy taminy: Mihainoa ny teniko mpanompovavinao. Dia hoy izy: Mihaino aho izao.'
mg1865::mg_10::20::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy: Izao no fitenin''ny olona taloha: Aoka hanadina ao Abela izy; koa araka izany ny nahavitany raharaha.'
mg1865::mg_10::20::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: '2022-04-24T05:49:55+0000'
  verse_title: null
  verse_text: 'Izaho dia isan''ny tia fihavanana sady olona mahatoky eto amin''ny Isiraely; fa ianao kosa mitady handrava renivohitra eto amin''ny Isiraely, koa ahoana no hamongoranao ny lovan''i Jehovah?'
mg1865::mg_10::20::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joaba namaly hoe: Sanatria dia sanatria amiko izay handripaka sy handringana.'
mg1865::mg_10::20::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izany tsy akory; fa misy lehilahy avy amin''ny tany havoan''i Efraima, Seba no anarany, zanak''i Bikry, izay efa nanainga tanana hikomy amin''i Davida mpanjaka; koa izy ihany no atolory ahy, dia hiala amin''ny tanàna aho. Ary hoy ravehivavy tamin''i Joaba: Indro, ny lohany atsipy eny aminao eny ankoatry ny manda.'
mg1865::mg_10::20::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nanatona ny olona rehetra tamin''ny fahendreny ravehivavy. Dia notapahin''ireo ny lohan''i Seba, zanak''i Bikry, ka natsipiny teny amin''i Joaba. Ary Joaba nitsoka ny anjomara, ka dia niala tamin''ny tanàna ny olona samy ho any amin''ny lainy avy. Ary Joaba niverina nankany Jerosalema ho any amin''ny mpanjaka.'
mg1865::mg_10::20::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny mpanao raharaham-panjakan''i Davida'
  verse_text: 'Ary Joaba no komandin''ny miaramila rehetra tamin''ny Isiraely; ary Benaia, zanak''i Joiada, no mpifehy ny miaramila mpiambina andriana*; [*Hebreo: Keretita sy Peletita]'
mg1865::mg_10::20::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Adorama no komandin''ny mpanao fanompoana; ary Josafata, zanak''i Ahiloda, no mpitadidy ny raharaham-panjakana;'
mg1865::mg_10::20::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Seva no mpanoratra; ary Zadoka sy Abiatara no mpisorona;'
mg1865::mg_10::20::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Ira Jairita kosa no mpanolo-tsaina* an''i Davida. [*Na: mpisorona]'
mg1865::mg_10::21::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mosary naharitra telo taona'
  verse_text: 'Ary nisy mosary telo taona misesy tamin''ny andron''i Davida, ary Davida nanontany tamin*''i Jehovah. Dia hoy Jehovah: Avy amin''ny taranak''i Saoly, izay meloka noho ny fandatsahan-drà izao, satria namono ny Gibeonita izy. [*Hebreo: nitady ny tavan'']'
mg1865::mg_10::21::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nampaka ny Gibeonita ka nanao taminy hoe (ny Gibeonita tsy mba isan''ny Zanak''Isiraely, fa sisa tamin''ny Amorita, ary ny Zanak''Isiraely efa nianiana taminy; nefa Saoly nitady izay hamelezany azy amin''ny firehetan''ny fitiavany ny Zanak''Isiraely sy ny Joda),'
mg1865::mg_10::21::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy Davida tamin''ny Gibeonita: Inona no hataoko ho anareo; ary amin''inona no hanaovako fanavotana mba hitsofanareo rano ny lovan''i Jehovah?'
mg1865::mg_10::21::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Gibeonita taminy: Izahay tsy mahazo mandray volafotsy na volamena amin''i Saoly na amin''ny taranany sady tsy mahazo mamono olona amin''ny Isiraely Ary hoy izy: Koa ahoana ary no tianareo hataoko ho anareo?'
mg1865::mg_10::21::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy ireo tamin''ny mpanjaka: Ny lehilahy izay nandringana anay sy nikasa hamely anay ho ringana tsy hitoetra amin''ny tanin''ny Isiraely rehetra'
mg1865::mg_10::21::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'no avelao hisy fito lahy amin''ny zanany hatolotra anay hahantonay ho an''i Jehovah ao Gibean''i Saoly, ilay voafidin''i Jehovah. Dia hoy ny mpanjaka: Hatolotro izy.'
mg1865::mg_10::21::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka niaro an''i Mefiboseta, zanak''i Jonatana, zanak''i Saoly, noho ny fianianana tamin''i Jehovah nataon''i Davida sy Jonatana, zanak''i Saoly.'
mg1865::mg_10::21::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: '2022-04-25T04:03:29+0000'
  verse_title: null
  verse_text: 'Ary ny mpanjaka naka azy roa lahy, zanak''i Rizpa, zanakavavin''i Aia, izay naterany tamin''i Saoly, dia Armony sy Mefiboseta, ary ny dimy lahy zanak''i Mikala,* zanakavavin''i Saoly, izay naterany tamin''i Adriela, zanak''i Barzilay Meholatita, [*Na: (Meraba) izahao I Samoela 18:19]'
mg1865::mg_10::21::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia natolony teo an-tanan''ny Gibeonita ireo ka nahanton''ireo teo amin''ny havoana teo anatrehan''i Jehovah; ary niara-maty izy fitolahy, samy novonoiny tamin''ny niandohan''ny fararano tamin''ny voalohan''ny taom-pijinjana ny vary hordea izy.'
mg1865::mg_10::21::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Rizpa, zanakavavin''i Aia, naka lamba fisaonana, dia novelariny teo amin''ny vatolampy iny hitoerany hatramin''ny niandohan''ny taom-pijinjana ka ambara-pilatsaky ny orana avy any an-danitra tamin''ny faty, ka tsy navelany hipetrahan''ny voro-manidina ireo raha antoandro, na ny bibi-dia raha alina.'
mg1865::mg_10::21::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Davida izay nataon''i Rizpa, zanakavavin''i Aia, vaditsindranon''i Saoly.'
mg1865::mg_10::21::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Davida naka ny taolan''i Saoly sy ny taolan''i Jonatana zanany tany amin''ny mponina tao Jabesi-gileada, izay nangalatra azy tao an-kalalahana any Beti-sana, ilay nanantonan''ny Filistina azy tamin''ny andro namonoan''ny Filistina an''i Saoly tao Gilboa.'
mg1865::mg_10::21::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nentiny niakatra avy tany ny taolan''i Saoly sy ny taolan''i Jonatana zanany, ary nangoniny koa ny taolan''ireo voahantona ireo.'
mg1865::mg_10::21::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taolan''i Saoly sy Jonatana zanany dia nalevin''ny olona tao amin''ny tanin''ny Benjamina tao Zela, tao amin''ny fasan''i Kisy rainy; ary dia vitany izay rehetra nandidian''ny mpanjaka. Ary nony efa vita izany, dia neken''Andriamanitra ny fifonana natao ho an''ny tany.'
mg1865::mg_10::21::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny herim-pon''ny mpiadin''i Davida raha niady tamin''ny Filistina'
  verse_text: 'Ary niady indray ny Filistina sy ny Isiraely; ary Davida sy ny mpanompony izay nanaraka azy dia nidina ka niady tamin''ny Filistina, ary reraka Davida.'
mg1865::mg_10::21::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jisbibenoba, izay isan''ny taranaky ny Refaita (ny lanjan''ny lefony dia varahina telon-jato sekely), dia nitondra fiadiana vaovao ka nikasa hahafaty an''i Davida.'
mg1865::mg_10::21::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Abisay, zanak''i Zeroia, nanampy azy, dia namely ilay Filistina ka nahafaty azy. Ary tamin''izay ny olon''i Davida dia nianiana taminy ka nanao hoe: Tsy hiara-mivoaka aminay intsony ho amin''ny ady ianao, fandrao hovonoinao ny fahazavan''ny Isiraely.'
mg1865::mg_10::21::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka izany, dia nisy ady indray amin''ny Filistina teo Goba, ary Sibeka Hosatita nahafaty an''i Safa, izay isan''ny taranaky ny Refaita.'
mg1865::mg_10::21::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ady indray koa tamin''ny Filistina teo Goba, ary Elanana, zanak''i Jare-oregima Betlehemita, namono an''i Goliata Gatita*, izay nanan-jaran-defona tahaka ny vodi-tenon''ny mpanenona. [*Na: ny rahalahin''i Goliata; izahao I Tantara 20:5]'
mg1865::mg_10::21::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ady koa tao Gata, ary nisy lehilahy vaventy, izay enin-drantsana, ka dia efatra amby roa-polo no isan''ny rantsan-tanany sy ny rantsan-tongony, ary izy koa dia mba teraky ny Refaita.'
mg1865::mg_10::21::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nihaika ny Isiraely, ka matin''i Jonatana, zanak''i Simea, rahalahin''i Davida.'
mg1865::mg_10::21::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo efatra ireo no teraky ny Refaita teo Gata, ka matin''ny tanan''i Davida sy ny tanan''ny mpanompony avokoa ireo.'
mg1865::mg_10::22::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Hira fisaorana nataon''i Davida noho ny nandreseny ny fahavalony rehetra'
  verse_text: 'Ary Davida nanao izao fihirana izao ho an''i Jehovah tamin''ny andro namonjen''i Jehovah azy tamin''ny tanan''ny fahavalony rehetra, indrindra fa tamin''ny tanan''i Saoly,'
mg1865::mg_10::22::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy izy: Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy,'
mg1865::mg_10::22::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra vatolampiko, Izy no ialofako, Ampingako sy tandroko famonjena Izy ary fiarovana avo ho ahy sy fandosirako; Ry Mpamonjy ahy, mahafaka ahy amin''ny fampahoriana Ianao.'
mg1865::mg_10::22::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantso an''i Jehovah Izay mendrika hoderaina aho, Ka dia vonjena ho afaka amin''ny fahavaloko.'
mg1865::mg_10::22::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nihodidina tamiko ny onjan''ny fahafatesana. Ary ny riaky ny faharatsiana nampahatahotra ahy.'
mg1865::mg_10::22::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famatoran''ny fiainan-tsy hita* nihodidina tamiko, nisakana ahy ny fandriky ny fahafatesana. [*Hebreo: Sheola]'
mg1865::mg_10::22::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony azom-pahoriana aho, dia niantso an''i Jehovah, eny, Andriamanitro no nitarainako; nihaino ny feoko tao an-tempoliny Izy, ary ny fitarainako dia efa tonga eo an-tsofiny.'
mg1865::mg_10::22::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihozongozona sy nihorohoro ny tany, ary ny fiorenan''ny lanitra nihorohoro, eny, nihozongozona ireo, satria tezitra Jehovah.'
mg1865::mg_10::22::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy setroka nisavoana teo am-bavorony, ary afo avy teo am-bavany no nandevona ka nisy vainafo nidedadeda teo aminy.'
mg1865::mg_10::22::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naondriny ny lanitra, ka nidina Izy; Ary aizim-pito no teo ambanin''ny tongony.'
mg1865::mg_10::22::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaingina kerobima Izy ka nanidina, eny, niseho teo amin''ny ela-drivotra Izy.'
mg1865::mg_10::22::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanao ny maizina ho tranony manodidina Azy Izy, dia fivorian-drano sy rahona matevina'
mg1865::mg_10::22::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy teo amin''ny famirapiratana teo anatrehany nisy vainafo nidedadeda.'
mg1865::mg_10::22::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampikotroka tany an-danitra Jehovah, ny Avo Indrindra niloa-peo.'
mg1865::mg_10::22::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandefa zana-tsipïka Izy ka nampiely ny fahavaloko, ary nampandeha helatra ka nampifanaritaka azy.'
mg1865::mg_10::22::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hita ny fitoeran-dranomasina, ary niseho ny fanambanin''ny tany, noho ny teny mafy nataon''i Jehovah, noho ny fifofofofon''ny fofonain''ny vavorony.'
mg1865::mg_10::22::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naninjitra ny tanany avy tany ambony Izy ka nandray ahy; nanintona ahy niala tamin''ny rano be Izy.'
mg1865::mg_10::22::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namonjy ahy tamin''ny fahavaloko mahery Izy sy tamin''izay nankahala ahy, satria tsy leoko ireny.'
mg1865::mg_10::22::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisakana ahy tamin''ny andro nahitako loza ireny, nefa Jehovah no niseho ho Mpanohana ahy.'
mg1865::mg_10::22::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra ahy ho any amin''ny malalaka Izy; namonjy ahy Izy, satria tiany aho.'
mg1865::mg_10::22::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanisy soa ahy araka ny fahamarinako Jehovah; Araka ny fahadiovan''ny tanako no namaliany ahy.'
mg1865::mg_10::22::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nitandrina ny lalan''i Jehovah aho ka tsy mba nanao ratsy hialana tamin''Andriamanitro;'
mg1865::mg_10::22::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitsipiny rehetra dia teo anatrehako, ary ny lalàny tsy mba nialako;'
mg1865::mg_10::22::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nanan-tsiny taminy aho sady niaro tena tsy ho azon''ny fahotako;'
mg1865::mg_10::22::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa namaly ahy araka ny fahamarinako Jehovah, dia araka ny fahadiovako teo imasony.'
mg1865::mg_10::22::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tsara no isehoanao fa tsara; Ny tena olo-marina no isehoanao fa marina;'
mg1865::mg_10::22::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny madio no isehoanao fa madio; Ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina*. [*Hebreo: miolakolaka]'
mg1865::mg_10::22::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona ory dia vonjenao; Fa ny masonao manandrina ny mpiavonavona, ka aetrinao ireny.'
mg1865::mg_10::22::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no jiroko, Jehovah o; Jehovah mampahazava ny fahamaizinako.'
mg1865::mg_10::22::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no ahazoako mitsarapaka hamely ny miaramila iray toko; Ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.'
mg1865::mg_10::22::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amin''Andriamanitra, dia marina ny lalany; Ny tenin''i Jehovah dia voazaha toetra amin''ny memy; Jehovah no ampingan''izay rehetra mialoka aminy.'
mg1865::mg_10::22::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no Andriamanitra afa-tsy Jehovah? Ary iza no vatolampy afa-tsy Andriamanitsika?'
mg1865::mg_10::22::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany Andriamanitra izany no fiarovana mafy ho ahy; Mitondra ny marina amin''ny lalany Izy.'
mg1865::mg_10::22::34:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manao ny tongony ho tahaka ny an''ny dieravavy Izy; Mampitoetra ahy eo amin''ny fitoerako avo Izy.'
mg1865::mg_10::22::35:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianatra ny tanako hiady Izy, ka mahahenjana tsipïka varahina ny sandriko.'
mg1865::mg_10::22::36:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omenao ahy ny ampingan''ny famonjenao; Ary ny fahamoram-panahinao no mahalehibe ahy.'
mg1865::mg_10::22::37:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halalahinao ny lalana hodiaviko, ka tsy mangovitra ny hato-tongotro.'
mg1865::mg_10::22::38:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manenjika ny fahavaloko aho ka mandripaka azy; Ary tsy mba miverina aho mandra-pahalany ritrany.'
mg1865::mg_10::22::39:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandringana sy mandripaka azy aho, ka tsy maharina izy; Lavo eo ambanin''ny tongotro izy.'
mg1865::mg_10::22::40:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao mampisikina ahy hery hiady; Aripakao ho ambaniko izay mitsangana hamely ahy.'
mg1865::mg_10::22::41:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataonao miamboho ahy ny fahavaloko; Ka aringako izay mankahala ahy.'
mg1865::mg_10::22::42:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miherikerika izy, fa tsy misy mpamonjy, eny, maniry an''i Jehovah izy, fa tsy mamaly azy Izy.'
mg1865::mg_10::22::43:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torotoroiko madinika tahaka ny vovo-tany izy; Hoseko tahaka ny fotaka eny an-dàlana izy ka apariako.'
mg1865::mg_10::22::44:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamonjy ahy amin''ny fifanoheran''ny oloko Ianao sy miaro ahy ho lohan''ny firenen-tsamy hafa; ny firenena tsy fantatro aza dia manompo ahy.'
mg1865::mg_10::22::45:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hafa firenena mikoy ahy; Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy.'
mg1865::mg_10::22::46:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hafa firenena dia mihaketraka ka miala amin-kovitra avy ao* amin''ny fiarovany mafy. [*Izahao Salamo 18:46. Ny dikan''ny teny Hebreo eto dia misikina avy ao, etc]'
mg1865::mg_10::22::47:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Velona Jehovah; isaorana anie ny Vatolampiko; Asandratra anie Andriamanitry ny vatolampy famonjena ahy,'
mg1865::mg_10::22::48:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Andriamanitra, Izay manao famaliana ho ahy ka mampanaiky ny firenena ahy,'
mg1865::mg_10::22::49:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay mitondra ahy ho afaka amin''ny fahavaloko; eny, manandratra ahy ho ambonin''izay mitsangana hanohitra ahy Ianao ary mamonjy ahy amin''ny olon-dozabe;'
mg1865::mg_10::22::50:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa Izany no hiderako Anao eny amin''ny firenen-tsamy hafa, Jehovah o, sy hankalazako ny anaranao.'
mg1865::mg_10::22::51:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 22
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao famonjen-dehibe ho an''ny mpanjaka voatendriny Izy ary mamindra fo amin''ny voahosony, dia amin''i Davida sy ny taranany mandrakizay.'
mg1865::mg_10::23::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fara-teny nataon''i Davida'
  verse_text: 'Ary izao no fara-teny nataon''i Davida: hoy Davida, zanak''i Jese, dia ny lehilahy izay voasandratra ho ambony, Ilay voahosotry* ny Andriamanitr''i Jakoba sady mpanao fihirana mahafinaritra amin''ny Isiraely: [*Na: Izay nampanantenaina ny amin''ny voahosotry, etc]'
mg1865::mg_10::23::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Fanahin''i Jehovah no mampiteny ahy, ary ny teniny no eo amin''ny lelako;'
mg1865::mg_10::23::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitry ny Isiraely manao hoe, eny, ny Vatolampin''ny Isiraely miteny amiko hoe: Indro ny Mpanapaka ny olona; Marina Izy sady manapaka amin''ny fahatahorana an''Andriamanitra;'
mg1865::mg_10::23::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany dia toy ny fahazavan''ny maraina, raha miposaka ny masoandro, dia ilay maraina tsy misy rahona iny; Ary ny ahitra manorobona amin''ny tany noho ny hain''andro manarakaraka ny ranonorana.'
mg1865::mg_10::23::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy toy izany indrindra amin''Andriamanitra va ny taranako? Fa fanekena mandrakizay no nataony tamiko, Voalamina amin''ny zavatra rehetra sady voatandrina; Fa ny famonjena ahy rehetra sy ny iriko rehetra, moa tsy hampitsimohiny va?'
mg1865::mg_10::23::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tena ratsy fanahy rehetra kosa dia tahaka ny tsilo ariana, Fa tsy azo raisin''ny tanana izy;'
mg1865::mg_10::23::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay mikasika azy Dia tsy maintsy mitondra vy sy zaran-defona*; Ary hodorana amin''ny afo avokoa amin''izay itoerany ireny. [*Hebreo: feno vy sy zaran-defona]'
mg1865::mg_10::23::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny anaran''ny lehilahy maherin''i Davida'
  verse_text: 'Ary izao no anaran''ny lehilahy maherin''i Davida: Joseba-basebeta Takemonita no lehiben''ny mpanafika malaza; izy ilay Edino Eznita izay namely ny valon-jato lahy ka nahafaty azy tamin''ny ady indray mandeha monja.'
mg1865::mg_10::23::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny manarakaraka azy dia Eleazara, zanak''i Dodo, zanak''i Ahohita, anankiray amin''izy telo lahy mahery teo amin''i Davida, raha nihaika ny Filistina izay niangona hiady ireo, ka niakatra ny lehilahy amin''ny Isiraely;'
mg1865::mg_10::23::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitsangana Eleazara ka namely ny Filistina mandra-pahavizan''ny tanany ka efa niraikitra tamin''ny sabatra; ary Jehovah nanao famonjena lehibe tamin''izany andro izany, ka ny haka babo ihany no sisa nanarahan''ny olona azy.'
mg1865::mg_10::23::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny manarakaraka azy dia Sama, zanak''i Age Hararita. Ary nony nivory ho iray toko teo amin''ny tany nisy voanemba* maniry ny Filistina, ary ny olona nandositra azy, [*erva lenta]'
mg1865::mg_10::23::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nijanona teo afovoan''io tany io kosa izy ka nahazo io ary namono ny Filistina; ka dia nanao famonjena lehibe Jehovah.'
mg1865::mg_10::23::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy telo lahy samy malaza avy tamin''ny telo-polo lahy nidina ka tonga tao amin''i Davida tao amin''ny zohin''i Adolama nony fararano; ary ny miaramilan''ny Filistina nitoby teo amin''ny Lohasahan''ny Refaita.'
mg1865::mg_10::23::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia tao amin''ny batery fiarovana tamin''izay, ary ny miaramilan''ny Filistina kosa dia tao Betlehema.'
mg1865::mg_10::23::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naniry ka nanao hoe: Enga anie ka hisy hampisotro rano ahy avy amin''ny fantsakana ao Betlehema, ilay ao akaikin''ny vavahady!'
mg1865::mg_10::23::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo telo lahy mahery namaky teo amin''ny miaramilan''ny Filistina ka nanovo rano tamin''ny fantsakana tao Betlehema, izay teo anilan''ny vavahady, dia nentiny ho any amin''i Davida; kanjo tsy nety nisotro izy, fa naidiny ho an''i Jehovah iny.'
mg1865::mg_10::23::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida: Sanatria, Jehovah o, raha hanao izany aho; tsy ran''ny lehilahy izay nandeha nanao vy very ny ainy va ity? Ka dia tsy nety nisotro izy. Izany zavatra izany no nataon''ireo telo lahy mahery ireo.'
mg1865::mg_10::23::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abisay, rahalahin''i Joaba, zanak''i Zeroia, no lehibe amin''izy telo lahy, ary izy namely ny telon-jato lahy tamin''ny lefona ka nahafaty azy, ka dia izy no nalaza tamin''izy telo lahy.'
mg1865::mg_10::23::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izy va no be voninahitra noho izy telo lahy? Fa izy no lehibeny; nefa tsy nahomby ny telo lahy teo izy.'
mg1865::mg_10::23::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Benaia, zanak''i Joiada, zanaky ny lehilahy mahay tany Kabezela, izay nahavita asa be, izy no namono ny roa lahy mahery* tany Moaba; ary izy no nidina ka namono ny liona tao an-davaka fantsakana tamin''ilay andro nisy oram-panala iny; [*Hebreo: lionan''Andriamanitra]'
mg1865::mg_10::23::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy koa no namono ilay Egyptiana makadiry be; ary ilay Egyptiana nitondra lefona teny an-tanany, nefa namorotsahan''i Benaia tamin''ny tehiny ihany izy, dia nosarihany ny lefona teny an-tanan''ilay Egyptiana, ka iny lefony iny ihany no namonoany azy.'
mg1865::mg_10::23::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nataon''i Benaia, zanak''i Joiada, ary tamin''izy telo lahy mahery dia izy no nalaza.'
mg1865::mg_10::23::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nalaza noho ny telo-polo lahy, nefa tsy nahomby azy telo lahy teo izy. Ary Davida nanendry azy ho isan''ny mpanolo-tsaina azy.'
mg1865::mg_10::23::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asahela, rahalahin''i Joaba, no anankiray amin''ny telo-polo, ary Elanana, zanak''i Dodo, avy any Betlehema,'
mg1865::mg_10::23::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sama Harodita, Elika Harodita,'
mg1865::mg_10::23::26:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Heleza Paltita, Ira, zanak''Ikesy Tekoita,'
mg1865::mg_10::23::27:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Abiezera Anatotita, Mebonay Hosatita,'
mg1865::mg_10::23::28:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zalmona Ahohita, Maharay Netofatita,'
mg1865::mg_10::23::29:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haleba, zanak''i Bana Netofatita, Itahy, zanak''i Ribay, avy any Gibean''ny taranak''i Benjamina,'
mg1865::mg_10::23::30:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Benaia Piratonita, Hiday, avy any amin''ny lohasahan-driak''i Gasy,'
mg1865::mg_10::23::31:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Abi-albona Arbatita, Azmaveta Psaromita,'
mg1865::mg_10::23::32:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eliaba Salbonita, tamin''ny zanak''i Jasena, Jonatana,'
mg1865::mg_10::23::33:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sama Hararita, Ahiama, zanak''i Sarara Hararita,'
mg1865::mg_10::23::34:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Elifeleta, zanak''i Ahasbay, zanaky ny Makatita, Eliama, zanak''i Ahitofela Gilonita,'
mg1865::mg_10::23::35:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hezray Karmelita, Paray Arbita,'
mg1865::mg_10::23::36:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jigala, zanak''i Natana, avy any Zoba, Bany Gadita,'
mg1865::mg_10::23::37:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zaleka Amonita, Naharay Berotita, mpitondra ny fiadian''i Joaba, zanak''i Zeroia,'
mg1865::mg_10::23::38:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ira Jitrita, Gareba Jitrita,'
mg1865::mg_10::23::39:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 23
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Oria Hetita; fito amby telo-polo no isan''izy rehetra.'
mg1865::mg_10::24::1:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanisana ny olona, sy ny aretim-be nanjo azy tamin''izany'
  verse_text: 'Ary ny fahatezeran''i Jehovah nirehitra indray tamin''ny Isiraely, ka dia nanome saina an''i Davida Izy hanao izay hahatonga loza amin''ny vahoakany hoe: Mandehana, isao ny Isiraely sy ny Joda.'
mg1865::mg_10::24::2:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka tamin''i Joaba, komandin''ny miaramila, izay teo aminy: Mandehana mitety ny firenen''isiraely rehetra hatrany Dana ka hatrany Beri-sheba, ary alaminonareo ny vahoaka mba ho fantatro ny isany.'
mg1865::mg_10::24::3:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Joaba amin''ny mpanjaka: Jehovah Andriamanitrao anie hampitombo ny vahoaka ho injato toy izao, na firy na firy izy, ka ho hitan''ny mason''ny mpanjaka tompoko izany; fa ahoana no itiavan''ny mpanjaka tompoko hanao izany zavatra izany?'
mg1865::mg_10::24::4:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy azon''i Joaba sy ny komandin''ny miaramila nolavina ny tenin''ny mpanjaka. Ary Joaba sy ny komandin''ny miaramila nivoaka avy teo anatrehan''ny mpanjaka handamina ny lehilahy amin''ny Isiraely.'
mg1865::mg_10::24::5:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nita an''i Jordana izy ireo ka nitoby tao Aroera eo ankavanan''ilay tanàna afovoan''ny lohasahan-driak''i Gada, dia nankany Jazera.'
mg1865::mg_10::24::6:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: '2022-04-26T05:01:10+0000'
  verse_title: null
  verse_text: 'Dia tonga tany Gileada izy, tany amin''ny tanin''i Tatima-hodsy*, dia tonga tany Danajana izy, ka nanodidina hatrany Sidona, [*Na: tany amin''ny tany lemaka vao azo]'
mg1865::mg_10::24::7:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tonga tao Tyro, tanàna mimanda, sy tany amin''ny tanànan''ny Hivita sy ny Kananita rehetra, ary dia nankany amin''ny tany atsimo izay an''ny Joda hatrany Beri-sheba izy.'
mg1865::mg_10::24::8:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: '2022-04-26T05:00:48+0000'
  verse_title: null
  verse_text: 'Ary nony efa nitety ny tany rehetra izy, dia tonga tany Jerosalema, rehefa afaka sivy volana sy roa-polo andro.'
mg1865::mg_10::24::9:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natolotr''i Joaba ny mpanjaka ny isan''ny vahoaka voalamina, ka nisy valo hetsy ny lehilahy mahery nahatan-tsabatra* tamin''ny Isiraely, ary dimy hetsy ny lehilahy tamin''ny Joda. [*Hebreo: mpanatsoaka sabatra]'
mg1865::mg_10::24::10:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny eritreritr''i Davida namely azy, rehefa voaisany ny olona. Ka dia hoy Davida tamin''i Jehovah: Efa nanota indrindra aho tamin''izao nataoko izao; koa ankehitriny mifona aminao aho, Jehovah o, esory ny heloky ny mpanomponao, fa efa nanao fahadalana lehibe aho.'
mg1865::mg_10::24::11:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nifoha maraina Davida, dia tonga tamin''i Gada mpaminany, mpahitan''i Davida, ny tenin''i Jehovah nanao hoe:'
mg1865::mg_10::24::12:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka lazao amin''i Davida hoe: Izao no lazain''i Jehovah: Zavatra telo no apetrako eto anoloanao, koa fidio izay iray hataoko aminao.'
mg1865::mg_10::24::13:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gada nankany amin''i Davida dia nanambara izany taminy ka nanao hoe: Mosary fito taona va no tianao ho tonga aminao eto amin''ny taninao? Sa handositra telo volana eo anoloan''ny fahavalonao ianao, fa henjehiny? Sa areti-mandringana hateloana eto amin''ny taninao? Koa saino sy hevero izay valiny ho entiko miverina any amin''izay naniraka ahy.'
mg1865::mg_10::24::14:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida tamin''i Gada: Indrisy! poritra loatra aho! aleontsika ho azon''ny tanan''i Jehovah, fa lehibe ny famindram-pony toy izay ho azon''izay tanan''olona.'
mg1865::mg_10::24::15:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nasian''i Jehovah areti-mandringana ny Isiraely nony maraina ka hatramin''ilay fotoana; ary dia nahafatesana fito alina ny olona hatrany Dana ka hatrany Beri-sheba.'
mg1865::mg_10::24::16:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naninjitra ny tanany tany Jerosalema Ilay Anjely handringana ny any; fa Jehovah nanenina ny amin''ny loza ka nanao tamin''ilay Anjely Izay nandringana ny olona hoe: Aoka izay, atsaharo ny tananao ankehitriny. Ary Ilay Anjelin''i Jehovah dia teo amin''ny famoloan''i Araona Jebosita.'
mg1865::mg_10::24::17:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: '2022-04-26T05:01:00+0000'
  verse_title: null
  verse_text: 'Ary nony hitan''i Davida Ilay Anjely namely ny olona, dia niteny tamin''i Jehovah izy nanao hoe: Indro, izaho no efa nanota, ary izaho no efa nanao ratsy; fa ireo ondry ireo kosa, inona moa no mba nataony? Koa mifona aminao re aho, aoka ny tananao hamely ahy sy ny mpianakavin''ny raiko.'
mg1865::mg_10::24::18:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Gada nankany amin''i Davida tamin''izany andro izany ka nanao taminy hoe: Miakara, ka manangona alitara ho an''i Jehovah ao amin''ny famoloan''i Araona Jebosita.'
mg1865::mg_10::24::19:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia niakatra Davida araka ny tenin''i Gada, araka izay nandidian''i Jehovah.'
mg1865::mg_10::24::20:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Araona nitsirika ka nahita ny mpanjaka sy ny mpanompony manatona azy, dia nivoaka izy ka niankohoka tamin''ny tany teo anatrehan''ny mpanjaka.'
mg1865::mg_10::24::21:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Araona: Ahoana no ahatongavan''ny mpanjaka tompoko aty amin''ny mpanompony? Dia hoy Davida: Hividy ny famoloana aminao mba hanorenako alitara ho an''i Jehovah hitsaharan''ny areti-mandringana tsy hamely ny olona intsony.'
mg1865::mg_10::24::22:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Araona tamin''i Davida: Aoka ny mpanjaka tompoko haka izay sitrany ka hanatitra izany. Indreo ny omby ho fanatitra dorana ary ny fivelezam-bary sy ny hazo amin''ny omby hatao kitay.'
mg1865::mg_10::24::23:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany, ry mpanjaka, dia omen''i Araona ny mpanjaka. Ary hoy Araona tamin''ny mpanjaka: Jehovah Andriamanitrao anie hankasitraka anao.'
mg1865::mg_10::24::24:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Araona: Tsia, fa hovidiko aminao mihitsy araka izay tokom-bidiny ireo; fa tsy hanatitra fanatitra dorana ho an''i Jehovah Andriamanitro amin''izay azoko fotsiny aho. Ka dia novidin''i Davida sekely volafotsy dimam-polo ny famoloana sy ny omby.'
mg1865::mg_10::24::25:
  verse_version: mg1865
  verse_book: mg_10
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanao alitara teo ho an''i Jehovah ka nanatitra fanatitra dorana sy fanati-pihavanana. Ka dia neken''i Jehovah ny fifonana natao ho an''ny tany, ka nitsahatra tsy namely ny Isiraely intsony ilay areti-mandringana.'
