mg1865::mg_26::1::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahitan''i Ezekiela ny voninahitr''i Jehovah'
  verse_text: 'Ary tamin''ny andro fahadimy tamin''ny volana fahefatra tamin''ny taona fahatelo-polo, raha teo amin''ny babo teo amoron''ny ony Kebara aho, dia nisokatra ny lanitra, ka nahita fahitana avy tamin''Andriamanitra aho.'
mg1865::mg_26::1::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro fahadimy tamin''ny volana (taona fahadimy taorian''ny namaboana an''i Joiakina mpanjaka izany)'
mg1865::mg_26::1::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tonga tamin''i Ezekiela mpisorona, zanak''i Bozy, ny tenin''i Jehovah tany amin''ny tanin''ny Kaldeana, teo amoron''ny ony Kebara; ary ny tanan''i Jehovah dia taminy teo.'
mg1865::mg_26::1::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy tafio-drivotra avy tany avaratra, dia rahona lehibe sy afo mifandrambondrambona, sady nisy namirapiratra manodidina azy; ary avy teo amin''ny afo dia nisy toy ny volon''ny metaly mamirapiratra.'
mg1865::mg_26::1::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo aminy koa nisy toa endriky ny zava-manan''aina efatra. Ary ny fijery azy dia hoatra ny endrik''olona.'
mg1865::mg_26::1::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nanana tarehy efatra sy elatra efatra avy izy.'
mg1865::mg_26::1::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mahitsy ny tongony; ary ny faladiany dia tahaka ny faladian''ny ombilahy kely; ary mamirapiratra toy ny volon''ny varahina manganohano izy.'
mg1865::mg_26::1::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tanan''olona teo ambanin''ny elany teo amin''ny lafiny efatra, ary samy nanana ny tarehiny sy ny elany avy izy efatra.'
mg1865::mg_26::1::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nifanendry ny elany; tsy niherika izy raha nandeha, fa samy nizotra tamin''izay hitsiny avy izy rehetra.'
mg1865::mg_26::1::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny toetry ny tarehiny dia tahaka ny tarehin''olona; ary tamin''ny ankavanany dia samy nanana ny tarehin''ny liona izy efatra, ary tamin''ny ankaviany dia samy nanana ny tarehin''omby, ary samy nanana ny tarehin''ny voromahery koa izy efatra.'
mg1865::mg_26::1::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tarehiny sy ny elany dia nisaraka hatreo ambony: samy nisy roa nifanendry tamin''ny an''ny namany, ary ny roa nanarona ny tenany.'
mg1865::mg_26::1::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy nizotra tamin''izay hitsiny avy izy, ka na aiza na aiza no tian''ny fanahy ho nalehany dia nalehany: tsy niherika izy raha nandeha.'
mg1865::mg_26::1::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny vainafo mirehitra ny fijery ny zava-manan''aina, dia tahaka ny fijery ny fanilo; nivoivoy teny anelanelan''ny zava-manan''aina ny afo; ary namirapiratra ny afo, sady nisy helatra nivoaka avy tao aminy.'
mg1865::mg_26::1::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zava-manan''aina nifanaretsaka nankary nankatsy toy ny helatra mifelopeloka.'
mg1865::mg_26::1::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako ny zava-manan''aina, fa, indro, nisy kodia iray avy teo ambonin''ny tany, teo anilan''ny zava-manan''aina teo anoloan''ny tarehiny efatra.'
mg1865::mg_26::1::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tarehin''ny kodia sy ny rafiny dia tahaka ny volon''ny krysolita, ary nitovy endrika izy efatra, ary ny tarehiny sy ny rafiny dia toy ny kodia anatin''ny kodia.'
mg1865::mg_26::1::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nandeha izy, dia nandeha tamin''izay hitsin''ny lafiny efatra: tsy niherika izy raha nandeha.'
mg1865::mg_26::1::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny boriboriny manodidina azy dia avo sy mahatahotra, sady feno maso manodidina izy efatra.'
mg1865::mg_26::1::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha ny zava-manan''aina, dia nandeha teo anilany koa ny kodia; ary raha niainga tsy nipaka tamin''ny tany ireo zava-manan''aina, dia mba niainga koa ny kodia.'
mg1865::mg_26::1::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na aiza na aiza no tian''ny fanahy ho naleha dia nalehan''ireo koa; fa any koa no mba tian''ny fanahy haleha, ary ny kodia dia niainga teo anilany; fa teo amin''ny kodia ny fanahin''ny zava-manan''aina.'
mg1865::mg_26::1::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nandeha ireny, dia mba nandeha koa ireto; ary raha nijanona ireny, dia mba nijanona koa ireto; ary raha niainga tsy nipaka tamin''ny tany ireny, dia mba niainga teo anilany koa ny kodia; fa ny fanahin''ny zava-manan''aina dia tao amin''ny kodia.'
mg1865::mg_26::1::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ambonin''ny lohan''ny zava-manan''aina dia nisy toa endriky ny eloelo, toy ny volon''ny krystaly mahatahotra, mivelatra eo ambonin''ny lohany.'
mg1865::mg_26::1::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivelatra mahitsy sady nifanendry ny elany teo ambanin''ny eloelo: samy nanan-droa avy izy rehetra, izay nanaronany ny tenany.'
mg1865::mg_26::1::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha izy, dia nahare ny fikopakopaky ny elany aho, toy ny firohondrohon''ny rano be, dia tahaka ny feon''ny Tsitoha, dia feo toy ny fireondreon''ny miaramila mitoby;'
mg1865::mg_26::1::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo avy teo ambonin''ny eloelo izay teo ambonin''ny lohany; nony nijanona izy, dia namihina ny elany.'
mg1865::mg_26::1::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ambonin''ny eloelo, izay teo ambonin''ny lohany, dia nisy endriky ny seza fiandrianana mitovy volo amin''ny vato safira; ary teo ambonin''ny endriky ny seza fiandrianana dia nisy hoatra ny endrik''olona.'
mg1865::mg_26::1::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita toy ny volon''ny metaly mamirapiratra aho, dia hoatra ny tarehin''ny afo manodidina azy; ary hatramin''ny valahany no ho miakatra ka hatramin''ny valahany no ho midina dia hitako tahaka ny afo, ka nisy namirapiratra manodidina azy.'
mg1865::mg_26::1::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tarehin''avana amin''ny rahona amin''ny andro nisy ranon''orana no tarehin''ny namirapiratra manodidina. Izany no fijery ny endriky ny voninahitr''i Jehovah. Ary nony nahita izany aho, dia nikarapoka nihohoka ka nandre ny feon''ny anankiray niteny.'
mg1865::mg_26::2::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niantsoana an''i Ezekiela ho mpaminany'
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona, mitsangàna, fa hiteny aminao Aho.'
mg1865::mg_26::2::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fanahy tonga tao anatiko*, raha niteny tamiko Izy, ka nampitsangana ahy, ary reko Izay niteny tamiko. [*Na: nody ny aiko]'
mg1865::mg_26::2::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona, maniraka anao ho amin''ny zanak''Isiraely Aho, eny, ho amin''ireo jentilisa mpiodina, izay efa niodina tamiko; izy sy ny razany dia samy efa nanota tamiko avokoa mandraka androany.'
mg1865::mg_26::2::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho any amin''ny zanaka mafy handrina sy madi-po no anirahako anao, ary ianao hanao aminy hoe: Izao no lazain''i Jehovah Tompo.'
mg1865::mg_26::2::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na hihaino izy na tsy hihaino (fa taranaka maditra izy), dia ho fantany fa efa nisy mpaminany teo aminy.'
mg1865::mg_26::2::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, aza matahotra azy, ary aza matahotra ny teniny, na dia voakasiky ny amiana* sy ny tsilo aza ianao, ary na dia eo amin''ny maingoka aza no ipetrahanao; eny, aza matahotra ny fiteniny, ary aza mivadi-po noho ny tarehiny, fa taranaka maditra izy. [*Na: maditra]'
mg1865::mg_26::2::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary holazainao aminy ihany ny amiko, na hihaino izy na tsy hihaino, fa tena naditra izy.'
mg1865::mg_26::2::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa, ry zanak''olona, mihainoa izay lazaiko aminao; aza maditra tahaka izany taranaka maditra izany ianao; sokafy ny vavanao, ka hano izay afahako anao.'
mg1865::mg_26::2::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: '2022-06-03T06:01:05+0000'
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy tanana nahinjitra tamiko, ary, indro, nisy horonan-taratasy eny aminy.'
mg1865::mg_26::2::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: '2022-06-08T11:51:30+0000'
  verse_title: null
  verse_text: 'Dia novelariny teo anatrehako izany, ary nisy soratra teo anatiny sy teo ivohony; ary fitomaniana sy fidradradradrana loza no voasoratra teo.'
mg1865::mg_26::3::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona, hano izay hitanao, eny, hano ity horonan-taratasy ity, dia mandehana, ka mitenena amin''ny taranak''Isiraely.'
mg1865::mg_26::3::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosokafako ny vavako, ary nafahany ahy izany horonan-taratasy izany.'
mg1865::mg_26::3::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona, vokiso ny kibonao, ary fenoy ny horonan-taratasy omeko anao ity ny tsinainao. Dia nihinana aho, ka, mamy tao am-bavako toy ny tantely izy.'
mg1865::mg_26::3::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny nanirahana an''i Ekeziela hilaza ny tenin''i Jehovah tamin''ny Isiraely'
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona, andeha mankany amin''ny taranak''Isiraely, ka lazao aminy ny teniko.'
mg1865::mg_26::3::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ho any amin''ny firenena miboediboedi-piteny sy miboeriboerika no anirahana anao, fa ho any amin''ny taranak''Isiraely ihany;'
mg1865::mg_26::3::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy ho amin''ny firenena maro, izay miboediboedi-piteny sy miboeriboerika, ka tsy ho azonao ny teniny, fa raha maniraka anao ho amin''ireto Aho, dia hihaino anao izy.'
mg1865::mg_26::3::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny taranak''Isiraely dia tsy mety mihaino anao, satria tsy mety mihaino Ahy izy; fa ny taranak''Isiraely rehetra dia mafy handrina sady madi-po.'
mg1865::mg_26::3::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa nohamafiko ny tarehinao hiatrika amin''ny tarehiny sy ny handrinao hanandrina ny handriny.'
mg1865::mg_26::3::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataoko toy ny diamondra ny handrinao, eny, mafy noho ny vatolampy aza; ka aza matahotra azy na mivadi-po noho ny tarehiny, fa taranaka maditra izy.'
mg1865::mg_26::3::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona, ny teny rehetra izay holazaiko aminao dia aoka ho mamin''ny fonao*, ka henoy amin''ny sofinao. [*Hebreo: raiso amin''ny fonao]'
mg1865::mg_26::3::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mandehana mankany amin''ny babo, dia ireo zanaky ny firenenao ary mitenena aminy hoe: Izao no lazain''i Jehovah Tompo na hihaino izy na tsy hihaino.'
mg1865::mg_26::3::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fanahy* nanainga ahy, dia nandre horakoraka be teo ivohoko aho nanao hoe: Isaorana anie ny voninahitr''i Jehovah avy amin''ny fitoerany. [*Na: rivotra]'
mg1865::mg_26::3::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary reko koa ny fikopakopaky ny elatry ny zava-manan''aina, izay nifanendry, sy ny fidilodilotry ny kodia teo anilany sy ny horakoraka be.'
mg1865::mg_26::3::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fanahy* nanainga ahy ka nitondra ahy, dia lasa aho sady nirehitra** tamin''ny fahavontosan''ny fanahiko; ary ny tanan''i Jehovah dia nahery tao amiko. [*Na: rivotra] [**Hebreo: mangidy]'
mg1865::mg_26::3::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tany amin''ny babo tany Telabiba aho, dia teo amin''izay nonina teo amoron''ny ony Kebara, teo amin''izay nipetrahany, ary mandritra ny hafitoana dia tahaka ilay torana iny aho.'
mg1865::mg_26::3::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka ny hafitoana, dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::3::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, efa nataoko mpitily ho an''ny taranak''Isiraely ianao; ka dia hohenoinao ny teny avy amin''ny vavako, ary avy amiko no hananaranao azy.'
mg1865::mg_26::3::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy Izaho amin''ny ratsy fanahy: Ho faty tokoa ianao! ary tsy mananatra azy ianao, na miteny hananatra ny ratsy fanahy, hialany amin''ny lalany ratsy hamonjena ny ainy, dia ho faty amin''ny helony ihany ilay ratsy fanahy; nefa hadiniko amin''ny tananao ny ràny.'
mg1865::mg_26::3::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mananatra ny ratsy fanahy kosa ianao, ka izy no tsy mety miala amin''ny faharatsiany sy amin''ny lalany ratsy, dia ho faty amin''ny helony ihany izy; fa ho voavonjinao ny fanahinao.'
mg1865::mg_26::3::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, raha ny marina miala amin''ny fahamarinany ka manao meloka, ary mametraka fahatafintohinana eo anoloany Aho, dia Ho faty izy; eny noho ny tsy nananaranao azy dia ho faty amin''ny fahotany ihany izy, ary ny fahamarinana izay nataony tsy hotsaroana, nefa kosa hadiniko amin''ny tananao ny ràny.'
mg1865::mg_26::3::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mananatra ny marina mba tsy hanota ianao, ka tsy manota izy, dia ho velona tokoa izy, satria nino anatra; ary voavonjinao koa ny fanahinao.'
mg1865::mg_26::3::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny hanjo an''i Jerosalema'
  verse_text: 'Ary ny tanan''i Jehovah dia tamiko, ary hoy Izy tamiko: Mitsangàna, ka mivoaha ho any amin''ny lohasaha, ary any no hitenenako aminao.'
mg1865::mg_26::3::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana aho ka nivoaka nankany amin''ny lohasaha; ary, indro, nitoetra teo ny voninahitr''i Jehovah tahaka ny voninahitra izay efa hitako teo amoron''ny ony Kebara ihany dia nikarapoka nihohoka aho.'
mg1865::mg_26::3::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fanahy tonga tao anatiko ka nampitsangana ahy; dia niteny tamiko Izy ka nanao hoe: Andeha, mirindrina ao anatin''ny tranonao ianao.'
mg1865::mg_26::3::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao, ry zanak''olona, indro, hasiany fatorana, izay hamatorany anao, ka tsy hahazo mivoaka ho ao aminy ianao.'
mg1865::mg_26::3::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampiraiketiko amin''ny lanilaninao ny lelanao, ka ho moana ianao ary tsy ho mpananatra azy; fa taranaka maditra izy.'
mg1865::mg_26::3::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miteny aminao Aho, dia hosokafako ny vavanao, ka dia holazainao aminy hoe: Izao no lazain''i Jehovah Tompo: Izay mihaino, dia aoka izy hihaino; ary izay tsy mihaino, dia aoka izy tsy hihaino kosa; fa taranaka maditra izy.'
mg1865::mg_26::4::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, makà kapila tanimanga, ary apetraho eo anoloanao, dia manorata sarin-tanàna eo aminy, dia sarin''i Jerosalema;'
mg1865::mg_26::4::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ataovy fahirano izy, ka manaova tilikambo hamelezana azy, ary manandrata tovon-tany manodidina azy; ary asio toby hamelezana azy, ary asio lohondry vy fandravana manodidina azy.'
mg1865::mg_26::4::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary makà lapoely, ka ataovy manda vy eo anelanelanao sy ny tanàna, dia banjino tsara io, ary aoka hatao fahirano, eny, aoka hataonao fahirano io. Famantarana ho amin''ny taranak''Isiraely izany.'
mg1865::mg_26::4::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy ambany mandry ny ilanao ankavia, ka ataovy eo aminy ny fahotan''ny taranak''Isiraely; koa araka ny isan''ny andro handrianao toy izany no hitondranao ny helony.'
mg1865::mg_26::4::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho dia manao fetr''andro ho anao mitovy amin''ny taonan''ny helony, dia sivi-folo amby telon-jato andro, ka ho entinao ny heloky ny taranak''Isiraely.'
mg1865::mg_26::4::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitrao ireo, dia ataovy ambany mandry kosa ny ilanao ankavanana, ary aoka hitondra ny heloky ny taranak''i Joda efa-polo andro ianao; ny indray andro no nataoko solon''ny herintaona ho anao.'
mg1865::mg_26::4::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia banjino tsara io fahirano an''i Jerosalema io, ary aoka hiseho sandry ianao ka haminany hamely azy.'
mg1865::mg_26::4::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, hafatotro ianao ka tsy hahavadi-mandry ambara-pahatapitrao ny andron''ny fahiranonao.'
mg1865::mg_26::4::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mangalà vary tritika sy vary hordea sy tsaramaso sy voanemba* sy ampemby sy spelta ianao, ary ataovy am-bilia iray ireo, ka anaovy mofo ho anao; araka ny isan''ny andro izay handrianao amin''ny ilanao, dia sivi-folo amby telon-jato andro, no hihinananao azy. [*Hebreo: nangidy]'
mg1865::mg_26::4::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary an-danjany no hihinananao ny haninao, dia roa-polo sekely isan''andro; asio elanelany ny fihinanao azy.'
mg1865::mg_26::4::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rano afàtra no hosotroinao, dia ampahenin''ny hina; asio elanelany koa ny fisotronao azy.'
mg1865::mg_26::4::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatao toy ny mofo vary hordea no ho fihinanao azy, ary diky no hataonao kitay hanendasanao azy eo imasony.'
mg1865::mg_26::4::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah: Toy izany no hihinanan''ny zanak''Isiraely ny mofony voaloto any amin''ny firenena izay handroahako azy.'
mg1865::mg_26::4::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Indrisy Jehovah Tompo o, indro tsy voaloto ny fanahiko; fa hatry ny fony aho mbola tanora ka mandraka ankehitriny dia tsy mba nihinana izay fatin-javatra na izay noviraviraim-biby akory aho; ary tsy mbola nikasika ny vavako akory izay nofo fahavetavetana.'
mg1865::mg_26::4::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: '2022-06-08T11:50:25+0000'
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Indro, tain''omby no omeko anao hisolo ny diky, ka izany no hataonao kitay hanendasanao ny mofonao.'
mg1865::mg_26::4::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy tamiko: Ry zanak''olona, indro, hotapahiko any Jerosalema ny mofo, tohan''aina, ka an-danjany amin''ny fanahiana no hihinanany mofo; ary rano afàtra no hosotroiny amin''ny fahatahorana.'
mg1865::mg_26::4::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho mosare-mofo sy rano izy, ary samy ho raiki-tahotra sady hihalevona noho ny helony.'
mg1865::mg_26::5::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia makà sabatra maranitra ho toy ny harezan''ny mpanala volombava, ka anarato ny lohanao sy ny somotrao, dia makà mizana, ka zarao ny volo.'
mg1865::mg_26::5::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ampahatelony dia dory amin''ny afo ao an-tanàna, rehefa tapitra ny andron''ny fahirano; ary alao koa ny ampahatelony, ka asio ny sabatra manodidina; ary ny ampahatelony dia aelezo ho amin''ny rivotra; ary hanatsoaka sabatra ho enti-manenjika azy Aho.'
mg1865::mg_26::5::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary analao vitsivitsy ireo, ka fonosy ao amin''ny sisin-dambanao.'
mg1865::mg_26::5::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireny indray dia mbola analao koa, dia atsipazo eo anaty afo izany, ka dory eo fa hisy afo hivoaka avy aminy ho amin''ny taranak''Isiraely rehetra.'
mg1865::mg_26::5::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Ity Jerosalema ity dia nataoko eo afovoan''ny jentilisa, ka voahodidin''ireny tany ireny izy.'
mg1865::mg_26::5::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ditra tsy nanaraka ny fitsipiko sy ny didiko izy, fa nanao ratsy mihoatra noho ny jentilisa sy ny tany manodidina azy; eny, nanao ditra tsy nanaraka ny fitsipiko sy ny didiko izy ka tsy nandeha araka izany.'
mg1865::mg_26::5::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Satria ianareo nitabataba mihoatra noho ny firenena manodidina anareo ka tsy nandeha araka ny didiko na nanaraka ny fitsipiko sady tsy nanaraka ny fitsipiky ny firenena izay manodidina anareo aza,'
mg1865::mg_26::5::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izao no lazain''i Jehovah Tompo: Indro, Izaho dia Izaho no mamely anao ka hanao fitsarana eo aminao eo imason''ny firenena.'
mg1865::mg_26::5::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny fahavetavetanao rehetra dia hataoko aminao izay tsy mbola nataoko, sady tsy hataoko tahaka izany intsony.'
mg1865::mg_26::5::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny ray dia hihinana ny zanany eo aminao, ary ny zanaka kosa hihinana ny rainy; ary hanao fitsarana eo aminao Aho, ary izay sisa rehetra aminao dia haeliko ho amin''ny rivotra rehetra;'
mg1865::mg_26::5::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, raha velona koa Aho, hoy Jehovah Tompo, noho ny nandotoanao ny fitoerako masina tamin''ny zava-dratsinao rehetra sy tamin''ny fahavetavetanao rehetra, Izaho kosa dia hampiala ny masoko, fa tsy hiantra; eny, Izaho dia tsy hamindra fo.'
mg1865::mg_26::5::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ampahatelony eo aminao dia ho fatin''ny areti-mandringana na ho ringan''ny mosary eo aminao; ary ny ampahatelony dia ho lavon''ny sabatra manodidina anao; ary ny ampahatelony dia haeliko ho amin''ny rivotra rehetra, ary hanatsoaka sabatra ho entiko manenjika azy Aho.'
mg1865::mg_26::5::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tanteraka amin''izany ny fahatezerako, sady hampariko aminy ny fahatezerako, ka hialako fo izy; dia ho fantany fa Izaho Jehovah no niteny izany tamin''ny fahasaro-piaroko, rehefa notanterahiko taminy ny fahatezerako.'
mg1865::mg_26::5::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko lao sy fandatsa eny amin''ny firenena izay manodidina anao ianao eo imason''izay rehetra mandalo.'
mg1865::mg_26::5::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hisy latsa sy fitenenan-dratsy sy famaizana sy figagana avy amin''ny jentilisa manodidina anao, rehefa manao fitsarana aminao Aho amin''ny fahatezerana sy ny fahavinirana ary amin''ny fananarana mafy Izaho Jehovah no niteny izany'
mg1865::mg_26::5::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha alefako ho fandringanana azy ny mosary dia ny zana-tsipïka ratsy izay halefako handringana anareo, sady hampitomboiko ny mosary eo aminareo, ka hotapahiko ny mofonareo, izay tohan''aina.'
mg1865::mg_26::5::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: '2022-06-06T05:45:41+0000'
  verse_title: null
  verse_text: 'Dia hanaterako mosary sy biby masiaka eo aminareo, izay hahalany fara anareo; ary handroso eo aminao ny areti-mandringana sy ny fandatsahan-drà, ary hataoko mihatra aminao ny sabatra. Izaho Jehovah no niteny izany'
mg1865::mg_26::6::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny handravana ny fomban''ny sampy sy ny mpivavaka aminy'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::6::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia ny tendrombohitry ny Isiraely, ary maminania ny hamelezana azy,'
mg1865::mg_26::6::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Ry tendrombohitry ny Isiraely o. Mihainoa ny tenin''i Jehovah Tompo: Izao no lazain''i Jehovah Tompo amin''ny tendrombohitra sy ny havoana, ary ny lohasahan-driaka sy ny lohasaha: Indro, Izaho no hahatonga sabatra hamely anareo, ary horavako ny fitoerana avonareo.'
mg1865::mg_26::6::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: '2022-06-06T05:45:07+0000'
  verse_title: null
  verse_text: 'Ary hokororohina ny alitaranareo, ary hosimbana ny tsangan-kazonareo* ho an''ny masoandro; ary hataoko mitsitra eo anoloan''ny sampinareo ny fatinareo; [*Na: tsangam-batonareo]'
mg1865::mg_26::6::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatin''ny zanak''Isiraely hataoko eo anoloan''ny sampiny; Ary ny taolanareo dia haeliko eny manodidina ny alitaranareo eny.'
mg1865::mg_26::6::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any amin''ny fonenanareo rehetra dia ho lao ny tanàna, Ary ho rava ny fitoerana avo, mba ho rava sy lao koa ny alitaranareo, dia hotapatapahina sy hofoanana ny sampinareo, ary hokapaina ny tsangan-kazonareo* ho an''ny masoandro, Ka dia holevonina ny asanareo. [*Na: tsangam-batonareo]'
mg1865::mg_26::6::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy faty hiampatrampatra eo aminareo; Ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::6::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hamelako hisy sisa ihany ianareo, fa hisy ho afaka amin''ny sabatra any amin''ny jentilisa, Rehefa voaely ho any amin''ny tany samy hafa ianareo.'
mg1865::mg_26::6::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay afaka aminareo dia hahatsiaro Ahy any amin''ny jentilisa izay hitondrana azy ho babo, rehefa voatorotoroko ny fony mijangajanga, izay efa niala tamiko, sy ny masony, izay mijangajanga manaraka ny sampiny, ary haharikoriko azy ny tenany noho ny ratsy izay efa nataony, dia ny fahavetavetany rehetra;'
mg1865::mg_26::6::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho fantany fa Izaho no Jehovah, ary tsy foana ny nilazako fa hahatonga izany loza izany aminy Aho.'
mg1865::mg_26::6::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Mameleza amin''ny tananao ianao, ary mitotoa amin''ny tongotrao, ka manaova hoe: Indrisy! ny fahavetavetana ratsy rehetra ataon''ny taranak''Isiraely, izay ho lavon''ny sabatra sy ny mosary ary ny areti-mandringana!'
mg1865::mg_26::6::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lavitra ho fatin''ny areti-mandringana, ny akaiky ho lavon''ny sabatra, ary izay sisa sy izay voaro dia ho faty mosary; Ka dia hotanterahiko aminy ny fahatezerako.'
mg1865::mg_26::6::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantatrareo fa Izaho no Jehovah, Rehefa miampatrampatra eny amin''ny sampy manodidina ny alitarany ny voavono ao aminy, eny amin''ny havoana andrandraina rehetra, eny amin''ny tendrombohitra rehetra sy eny ambanin''ny hazo maitso rehetra sy eny ambanin''ny terebinta misandrahaka rehetra, dia eny amin''izay efa nanaterany hanitra ankasitrahana tamin''ny sampiny rehetra;'
mg1865::mg_26::6::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahinjitro aminy ny tanako, ary ny tany any amin''ny fonenany rehetra dia hataoko lao sy foana mihoatra noho ny efitr''i Dibla; Ka dia ho fantany fa Izaho no Jehovah.'
mg1865::mg_26::7::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny handringanana ny Isiraely'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::7::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia izao no lazain''i Jehovah Tompo amin''ny tanin''ny Isiraely: Injao ny farany! Eny, mby akaiky ny farany ho amin''ny vazan-tany efatra.'
mg1865::mg_26::7::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia mby akaikinao ny farany, ary halefako aminao ny fahatezerako, dia hotsaraiko araka ny alehanao ianao, ka hatambesatro aminao ny fahavetavetanao rehetra.'
mg1865::mg_26::7::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hiantra anao ny masoko, sady tsy hamindra fo Aho; Fa hatambesatro aminao ny lalanao, ary ny fahavetavetanao dia ho eo aminao, ary dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::7::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Injao! avy ny loza, dia loza izay tsy misy toa azy*! [*Hebreo: loza iray]'
mg1865::mg_26::7::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injao ny farany! Eny, mby akaiky ny farany; Mifoha hamely anao iny, indro, efa mby akaiky iny.'
mg1865::mg_26::7::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mby akaiky ny anjaranao, ry mponina amin''ny tany; Mby akaiky ny fotoana, efa antomotra ny andro, dia akoran''ady, fa tsy fihobiana, eny an-tendrombohitra .'
mg1865::mg_26::7::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vetivety foana dia hampidiniko aminao ny fahatezerako, Ary hotanterahiko aminao ny fahavinirako; ka hotsaraiko araka ny alehanao ianao, ary hatambesatro aminao ny fahavetavetanao.'
mg1865::mg_26::7::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hiantra anao ny masoko, sady tsy hamindra fo Aho; Hatambesatro aminao ny lalanao, ary ny fahavetavetanao dia ho eo aminao, ka dia ho fantatrareo fa Izaho Jehovah no mamely.'
mg1865::mg_26::7::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny andro, indro mby akaiky iny! Miseho ny anjaranao. Mamonjy ny tsorakazo, manorobona ny avonavona!'
mg1865::mg_26::7::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanaovana an-keriny dia mitsangana ho tsorakazo hamelezana ny faharatsiana; tsy hisy sisa intsony aminy, na ny hamaroany, na ny hareny*, na ny zava-mendrika eo aminy. [*Na: ny hamaroany mitabataba sy mireondreona]'
mg1865::mg_26::7::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mby akaiky ny fotoana, antomotra ny andro; aoka tsy hifaly ny mpividy, ary aoka halahelo ny mpivarotra; Fa iharan''ny fahatezerana mirehitra ny hamaroany rehetra.'
mg1865::mg_26::7::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpivarotra tsy hifodian''izay efa lafony, na dia mbola isan''ny velona aza izy; Fa ny fahitana ny amin''ny hanjo ny hamaroanay dia tsy hitsoaka, ary tsy hisy ampahery ny ainy amin''ny helony.'
mg1865::mg_26::7::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nitsoka ny trompetra izy ka nahavonona ny zavatra rehetra, nefa tsy misy mankany amin''ny ady, satria iharan''ny fahatezerako mirehitra ny hamaroany rehetra.'
mg1865::mg_26::7::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sabatra no eny ivelany, ary ny areti-mandringana sy ny mosary kosa no ao anatiny; Izay any an-tsaha dia ho fatin-tsabatra, ary izay any an-tanàna kosa dia ho levon''ny mosary sy ny areti-mandringana.'
mg1865::mg_26::7::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia misy afa-mandositra aza, dia ho any an-tendrombohitra izy ka ho toy ny voromailala an-dohasaha: Izy rehetra dia samy hitoloko avokoa noho ny helony.'
mg1865::mg_26::7::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiraviravy ny tanana rehetra, ary ho rano ny lohalika rehetra;'
mg1865::mg_26::7::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisikina lamba fisaonana* koa izy, ka ho menatra ny tava rehetra. [*Hebreo: lamba malailay]'
mg1865::mg_26::7::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volafotsiny dia harianay eny an-dalambe, ary ny volamenany hataony ho maharikoriko, ny volafotsiny sy ny volamenany tsy hahavonjy azy amin''ny andro fahatezeran''ny Jehovah Tsy hahavoky ny fanahiny na hahafeno ny kibony izany, fa tonga fahatafintohinana mahameloka azy.'
mg1865::mg_26::7::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny firàvany tsara tarehy dia nataony ho rehareha sady nentiny nanao ireo sary fahavetavetany, dia ireo zava-dratsiny, koa izany no efa nanaovako ireny ho zava-maharikoriko azy.'
mg1865::mg_26::7::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatolotro ho babo eny an-tanan''ny hafa firenena izy, Eny, ho babo ho an''ny ratsy fanahy amin''ny tany, ka holotoin''ireny izy.'
mg1865::mg_26::7::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiamboho azy koa Aho, ka holotoiny ny rakitro; Fa hiditra ao aminy ny mpandroba ka handoto azy.'
mg1865::mg_26::7::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manefa gadra, fa efa feno fitsarana ny amin''ny fandatsahan-drà ny tany, ary feno fampahoriana ny tanàna.'
mg1865::mg_26::7::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hitondra izay jentilisa ratsy indrindra Aho, ary ho lasan''ireny ny tranony; dia hatsahatro ny avonavon''ny mahery, ary ho lotoina ny fitoerany masina.'
mg1865::mg_26::7::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho avy ny fandringanana*; ary hitady fiadanana izy, fa tsy hisy. [*Na: fampangovitana]'
mg1865::mg_26::7::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifanontona ny fandravana, ary mifanindry ny filazan-doza; Dia manontany fahitana amin''ny mpaminany izy, fa tsy misy lalàna intsony amin''ny mpisorona, na fahendrena amin''ny anti-panahy.'
mg1865::mg_26::7::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitomany ny mpanjaka, eny, hitafy fahatalanjonana ny andriana, ary hangovitra ny tanan''ny vahoaka; Araka ny alehany no hataoko aminy, ary hotsaroiko araka ny fitsarana nataony izy, ka dia fantany fa Izaho no Jehovah.'
mg1865::mg_26::8::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana ny amin''ny nanarahan''ny olona tany Jerosalema ny fomban-tsampy'
  verse_text: 'Ary tamin''ny andro fahadimy tamin''ny volana fahenina tamin''ny taona fahenina, raha nipetraka tao an-tranoko aho, ary nipetraka teo anatrehako ny loholon''ny Joda, dia nilatsaka tamiko ny tanan''i Jehovah Tompo.'
mg1865::mg_26::8::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy nitarehin''afo; hatramin''ny valahany no ho midina dia afo; ary hatramin''ny valahany no ho miakatra kosa dia nitarehin-java-mamirapiratra dia toy ny volon''ny metaly mamirapiratra.'
mg1865::mg_26::8::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nitarehin-tanana nahinjiny, ka noraisiny tamin''ny voloko aho, dia nisy fanahy* nanainga ahy ho eny anelanelan''ny tany sy ny lanitra ka nitondra ahy ho any Jerosalema tamin''ny fahitana avy amin''Andriamanitra, ho eo amin''ny vavahadin''ny kianja anatiny, izay manatrika ny avaratra, dia ilay nisy ny sarin-javatra fampahasaro-piaro, dia ilay mampahasaro-piaro. [*Na: rivotra]'
mg1865::mg_26::8::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, teo ny voninahitr''Andriamanitry ny Isiraely tahaka ilay fahitana efa hitako teo amin''ny lohasaha.'
mg1865::mg_26::8::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Ry zanak''olona, atopazy kely amin''ny lalana mianavaratra ny masonao. Dia natopiko tamin''ny lalana mianavaratra ny masoko ka, indro, eny avaratry ny vavahadin''ny alitara no nisy ilay sarin-javatra fampahasaro-piaro teo amin''ny fidirana.'
mg1865::mg_26::8::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy koa Izy tamiko: Ry zanak''olona, hitanao va izay ataon''ireo, dia ny fahavetavetana lehibe izay ataon''ny taranak''Isiraely eto ka mampanalavitra Ahy amin''ny fitoerako masina? Mbola hahita fahavetavetana lehibe koa ianao.'
mg1865::mg_26::8::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny ho eo amin''ny vavahadin''ny kianja aho; ary hitako fa, indro, nisy loaka teo amin''ny ampiantany.'
mg1865::mg_26::8::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Ry zanak''olona, loahy ny ampiantany; dia noloahako ny ampiantany ka, indro, nisy varavarana.'
mg1865::mg_26::8::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Midira, ka jereo ny fahavetavetana lehibe ataony eto.'
mg1865::mg_26::8::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra aho ka nahita, ary indreo, nisy sarin''ny biby mandady sy mikisaka rehetra sy ny biby hafa, dia izay fahavetavetana, sy ny sampy rehetra an''ny taranak''Isiraely, voasoratra teo amin''ny rindrina manodidina.'
mg1865::mg_26::8::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: '2022-06-05T05:23:59+0000'
  verse_title: null
  verse_text: 'Ary nisy olona fito-polo lahy, isan''ny loholon''ny taranak''Isiraely, nitsangana teo anoloan''ireo, ary Jazania, zanak''i Safana, nitsangana teo afovoany, samy nitondra ny loviany fandoroana ditin-kazo manitra teny an-tanany avy, ary ny setroky ny ditin-kazo manitra dia nidonaka.'
mg1865::mg_26::8::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Ry zanak''olona efa hitanao va ny ataon''ny loholon''ny taranak''Isiraely amin''ny maizina, dia samy ao amin''ny efi-tranony misy sary*? Fa hoy izy: Jehovah tsy mahita anay; efa nahafoy ny tany Izy. [*Na: tsara soratra]'
mg1865::mg_26::8::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy tamiko: Mbola hahita fahavetavetana lehibe izay ataony koa ianao.'
mg1865::mg_26::8::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny ho eo anoloan''ny vavahadin''ny tranon''i Jehovah, izay manatrika ny avaratra aho; ary, indreo, nisy vehivavy nipetraka teo, nitomany an''i Tamoza.'
mg1865::mg_26::8::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Hitanao va izany ry zanak''olona? Mbola hahita fahavetavetana lehibe noho ireto koa ianao.'
mg1865::mg_26::8::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny ho eo amin''ny kianja anatiny amin''ny tranon''i Jehovah aho, ary, indro, teo am-baravaran''ny tempolin''i Jehovah, dia teo anelanelan''ny lavarangana fidirana sy ny alitara, dia nisy tokony ho dimy amby roa-polo lahy niamboho ny tempolin''i Jehovah ka nanatrika ny atsinanana; ary ireo dia niankohoka manandrify ny masoandro, nanatrika ny atsinanana.'
mg1865::mg_26::8::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Hitanao va izany, ry zanak''olona? Moa ataon''ny taranak''i Joda ho kely loatra va ny nanaovany ny fahavetavetana izay ataony eto, no fenoiny fampahoriana koa ny tany, ka mampahatezitra Ahy lalandava izy; ary indro izy nanainga ny rantsan-kazo ho amin''ny orony.'
mg1865::mg_26::8::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho kosa dia hamely amin''ny fahatezerako; tsy hiantra ny masoko, sady tsy hamindra fo Aho; ary na dia mitaraina mafy eo an-tsofiko aza izy, dia tsy hihaino azy Aho.'
mg1865::mg_26::9::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ireo lehilahy nirahina hamely an''Jerosalema'
  verse_text: 'Ary niantso tamin''ny feo mahery teo anatrehako Jehovah ka nanao hoe: Manakeke ianareo, ry mpiambina ny tanàna, ka samia mitondra ny fiadiany eny an-tanany avy ho enti-mandringana.'
mg1865::mg_26::9::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, nisy lehilahy enina avy tamin''ny lalana mankamin''ny vavahady ambony, izay manatrika ny avaratra, sady samy nitondra ny fiasany fanorotoroana teny an-tanany avy izy; ary ny anankiray tamin''ireo dia nitafy rongony fotsy, sady nisy fitoeran-dranomaintin''ny mpanoratra teo am-balahany; ary niditra izy ireo ka nitsangana teo anilan''ny alitara varahina.'
mg1865::mg_26::9::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: '2022-09-26T05:30:51+0000'
  verse_title: null
  verse_text: 'Ary ny voninahitr''Andriamanitry ny Isiraely efa niakatra niala teo amin''ny kerobima, izay nitoerany, ho eo amin''ny tokonam-baravaran''ny trano, ary Izy niantso ilay olona nitafy rongony fotsy izay nisy fitoeran-dranomaintin''ny mpanoratra teo am-balahany.'
mg1865::mg_26::9::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Mandehana mamaky ny tanàna, dia Jerosalema, ka asio marika* ny handrin''ny olona izay misento sy mitaraina noho ny fahavetavetana rehetra atao eo aminy. [*Hebreo: marika mitanam-bokovoko]'
mg1865::mg_26::9::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary reko Izy nanao tamin''ny sasany hoe: Mandehana manaraka azy ianareo hamaky ny tanàna, ka mameleza; aoka tsy hamindra fo aminy ny masonareo, ary aza ananana antra izy,'
mg1865::mg_26::9::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na lahy antitra, na zatovo, na virijina, na zaza madinika, na vehivavy, dia aringano avokoa; fa izay olona misy ilay marika ihany no aza kasihina ary atombohy hatreo amin''ny fitoerako masina izany. Dia nanomboka tamin''ny lahy antitra izay teo anoloan''ny trano ireo.'
mg1865::mg_26::9::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Lotoy ny trano, ary fenoy faty ny kianja; dia mivoaha ianareo. Ary dia nivoaka izy ka namely ny tao an-tanàna.'
mg1865::mg_26::9::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola namely izy, ary izaho ihany no sisa teo, dia niankohoka aho ka nitaraina hoe: Indrisy! Jehovah Tompo o! haringanao va ny sisa rehetra amin''ny Isiraely amin''izao ampidinanao ny fahatezeranao amin''i Jerosalema izao?'
mg1865::mg_26::9::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Lehibe dia lehibe ny heloky ny taranak''ny Isiraely sy ny Joda, ary feno ran''olona nalatsaka ny tany, sady feno fitsarana miangatra ny tanàna, satria hoy izy: Jehovah efa nahafoy ny tany ary Jehovah tsy mahita.'
mg1865::mg_26::9::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho kosa, dia tsy hiantra ny masoko, sady tsy hamindra fo aho, fa hatsingeriko ho eo an-dohany ny nataony*. [*Hebreo: lalany]'
mg1865::mg_26::9::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ralehilahy, ilay nitafy rongony fotsy sady nisy fitoeran-dranomainty teo am-balahany, dia nitondra teny niverina nanao hoe: Efa vitako izay nandidianao ahy.'
mg1865::mg_26::10::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana ny amin''ny handoroana an''i Jerosalema, sy ny hialan''ny voninahitr''i Jehovah aminy'
  verse_text: 'Ary hitako fa, indro, teo ambonin''ny eloelo izay teo ambonin''ny lohan''ny kerobima dia nisy tahaka ny vato safira; tahaka ny endriky ny seza fiandrianana no fijery azy; ary Jehovah* niseho teo amboniny. [*Hebreo: Izy]'
mg1865::mg_26::10::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny tamin-dralehilahy nitafy rongony fotsy Izy nanao hoe: Midira eo anelanelan''ny kodia, dia eo ambanin''ny kerobima, ary fenoy vain''afo avy eo anelanelan''ny kerobima ny tananao roa, ka afafazo amin''ny tanàna izany. Dia niditra teo imasoko izy.'
mg1865::mg_26::10::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kerobima nitsangana teo amin''ny ankavanan''ny trano, raha niditra ralehilahy; ary feno ilay rahona ny kianja anatiny.'
mg1865::mg_26::10::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra niala teo amin''ny kerobima ny voninahitr''i Jehovah ho eo amin''ny tokonam-baravaran''ny trano; ary feno ilay rahona ny trano, ary ny kianja dia feno ny famirapiratan''ny voninahitr''i Jehovah.'
mg1865::mg_26::10::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fikopakopaky ny elatry ny kerobima dia re hatrany amin''ny kianja ivelany, toy ny feon''Andriamanitra Tsitoha, raha miteny.'
mg1865::mg_26::10::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nodidiany ralehilahy nitafy rongony fotsy, nataony hoe: Manalà afo avy eo analenelan''ny kodia, eo anelanelan''ny kerobima, dia niditra izy ka nitsangana teo anilan''ny kodia.'
mg1865::mg_26::10::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kerobima anankiray naninjitra ny tanany avy teo anelanelan''ny kerobima, tamin''ny afo Izay teo anelanelan''ny kerobima, dia nangalany ka nataony teny amin''ny tanan-droan''ilay nitafy rongony fotsy; ary rehefa nandray izany ralehilahy, dia nivoaka.'
mg1865::mg_26::10::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nitarehin-tanan''olona niseho teo ambanin''ny elatry ny kerobima.'
mg1865::mg_26::10::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indreo, nisy kodia efatra teo anilan''ny kerobima, dia kodia iray avy teo anilan''ny isan-kerobima; ary ny tarehin''ny kodia dia toy ny volon''ny vato krysolita.'
mg1865::mg_26::10::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy efatra dia nitovy tarehy, toy ny kodia anatin''ny kodia.'
mg1865::mg_26::10::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nandeha izy, dia nandeha tamin''ny hitsin''ny lafiny efatra; tsy niherika izy raha nandeha, fa tamin''ny hitsin''izay natrehin''ny lohany ihany no nalehany; tsy niherika izy raha nandeha.'
mg1865::mg_26::10::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary feno maso manodidina ny tenany* rehetra sy ny lamosiny sy ny tanany sy ny elany mbamin''ny kodia; izy efatra dia samy nisy kodia avokoa. [*Hebreo: nofony]'
mg1865::mg_26::10::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny kodia dia reko nisy niantso azy hoe: Ry kodia*! [*Na: Mikodiadiava!]'
mg1865::mg_26::10::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nanana tarehy efatra avy izy: ny tarehin''ny voalohany dia nitarehin-kerobima, ary ny tarehin''ny faharoa dia nitarehin''olona, ary ny fahatelo nitarehin-diona, ary ny fahefatra nitarehim-boromahery.'
mg1865::mg_26::10::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra ny kerobima. Izany dia ilay zava-manan''aina hitako teo amoron''ny ony Kebara ihany.'
mg1865::mg_26::10::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha ny kerobima, dia mba nandeha teo anilany koa ny kodia; ary raha nasandratry ny kerobima ny elany hiainga tsy hipaka amin''ny tany, dia tsy nisaraka taminy koa ny kodia.'
mg1865::mg_26::10::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nijanona izy, dia mba nijanona koa ireo, ary raha niainga izy, dia mba niainga koa ireo: fa ny fanahin''ny zava-manan''aina no tao aminy.'
mg1865::mg_26::10::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala avy teo ambonin''ny tokonambaravaran''ny trano ny voninahitr''i Jehovah ka nijanona teo ambonin''ny kerobima.'
mg1865::mg_26::10::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasandratry ny kerobima ny elany, ka niainga tsy nipaka tamin''ny tany teo imasoko izy, raha nivoaka, ary teo anilany ny kodia ary samy nijanona teo anoloan''ny vavahady atsinanana amin''ny tranon''i Jehovah izy ireo; ary ny voninahitr''Andriamanitry ny Isiraely no teo amboniny.'
mg1865::mg_26::10::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany dia ilay zava-manan''aina hitako teo ambanin''Andriamanitry ny Isiraely teo amoron''ny ony Kebara; ary fantatro fa kerobima ireo.'
mg1865::mg_26::10::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy nanana tarehy efatra avy izy, sady samy nanana elatra efatra avy koa; ary nisy nitarehin-tanan''olona teo ambanin''ny elany.'
mg1865::mg_26::10::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny endriky ny tarehiny dia nitovy tamin''ilay efa hitako teo amoron''ny ony Kebara ihany, dia ny endriny sy ny tenany; ary ny hitsin''ny tavany no nalehany.'
mg1865::mg_26::11::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Filazana ny amin''ny loza hanjo, sy fampanantenana ny famindram-po'
  verse_text: 'Ary nisy fanahy* nanainga ahy koa, dia nitondra ahy ho eo amin''ny vavahady atsinanana amin''ny tranon''i Jehovah, dia ilay manatrika ny atsinanana; ary, indreo, nisy olona dimy amby roa-polo lahy teo anoloan''ny vavahady; dia hitako teo amin''ireo Jazania, zanak''i Azora, sy Pelatia, zanak''i Benaia, lehiben''ny vahoaka. [*Na: rivotra]'
mg1865::mg_26::11::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Ry zanak''olona, ireo no lehilahy izay mamoron-tsain-dratsy sady manolo-tsain-dratsy eto amin''ity tanàna ity,'
mg1865::mg_26::11::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izay manao hoe: Mbola lavitra ny hanaovana trano; ity tanàna ity no vilany, ary isika no hena;'
mg1865::mg_26::11::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia maminania hamely azy, eny, maminania, ry zanak''olona.'
mg1865::mg_26::11::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tao amiko ny Fanahin''i Jehovah, ka hoy Izy tamiko: Lazao hoe: Izao no lazain''i Jehovah: Izany no fiteninareo, ry taranak''Isiraely, ary fantatro izay rehetra ao an-tsainareo.'
mg1865::mg_26::11::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo efa nahamaro ny voavononareo teto amin''ity tanàna ity, ary ny lalambeny efa nofenoinareo faty.'
mg1865::mg_26::11::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Ny voavononareo, izay nataonareo tao aminy, no hena, ary ity tanàna ity no vilany; nefa havoaka avy ao aminy ianareo.'
mg1865::mg_26::11::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Natahotra ny sabatra ianareo; nefa hataoko mahatratra anareo ihany ny sabatra, hoy Jehovah Tompo.'
mg1865::mg_26::11::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary havoakako avy ato aminy ianareo ka hatolotro ho eny an-tanan''ny hafa firenena, ary hanao fitsarana aminareo Aho.'
mg1865::mg_26::11::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho lavon''ny sabatra ianareo; any amin''ny sisin-tanin''ny Isiraely no hitsarako anareo, ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::11::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity tanàna ity tsy ho vilaninareo, ary ianareo tsy ho hena ato anatiny; fa any amin''ny sisin-tanin''ny Isiraely no hitsarako anareo'
mg1865::mg_26::11::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia ho fantatrareo fa Izaho no Jehovah, satria tsy nandeha araka ny lalàko ianareo na nanaraka ny fitsipiko, fa araka ny fitsipiky ny jentilisa izay manodidina anareo ihany no nataonareo.'
mg1865::mg_26::11::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola naminany aho, dia maty Pelatia, zanak''i Benaia. Dia niankohoka aho ka nitaraina tamin''ny feo mahery nanao hoe: Indrisy! Jehovah Tompo o, holevoninao va ny hany sisa amin''ny Isiraely?'
mg1865::mg_26::11::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::11::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ny rahalahinao, eny, ny rahalahinao no andraikitrao*, dia ny taranak''Isiraely rehetra, izay nitenenan''ny mponina any Jerosalema hoe: Manalavira an''i Jehovah; izahay no nomena ity tany ity ho lova. [*Na: iray firazanana aminao]'
mg1865::mg_26::11::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao hoe: Izao no lazain''i Jehovah Tompo: Na dia nampandehaniko lavitra any amin''ny jentilisa aza izy ka naeliko tany amin''ny tany maro, dia ho fitoerana masina ho azy vetivety* Aho any amin''ny tany izay alehany. [*Na: kely ho azy]'
mg1865::mg_26::11::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao hoe: Izao no lazain''i Jehovah Tompo: Hovoriko avy any amin''ny firenena ianareo, ary hangoniko avy any amin''ny tany izay nampielezana anareo, ka homeko ny tanin''ny Isiraely ianareo.'
mg1865::mg_26::11::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tonga ao izy ka hanaisotra ny zava-dratsiny rehetra sy ny fahavetavetany rehetra.'
mg1865::mg_26::11::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia homeko fo iray izy, ary hasiako fanahy vaovao ao anatinareo; ary hesoriko amin''ny nofony ny fo vato, ka homeko fo nofo izy,'
mg1865::mg_26::11::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba handehanany araka ny didiko sy hitandremany ny fitsipiko ka hanarahany izany, ary izy dia ho oloko, ary Izaho ho Andriamaniny.'
mg1865::mg_26::11::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''izay manana fo manina ny zava-dratsiny* sy ny fahavetavetany, dia hatsingeriko ho eo an-dohany ihany ny nataony**, hoy Jehovah Tompo. [*Hebreo: manaraka ny fon''ny zava-dratsiny, Hebreo: lalana]'
mg1865::mg_26::11::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasandratry ny kerobima ny elany sy ny kodia teo anilany; ary ny voninahitr''Andriamanitry ny Isiraely no teo amboniny.'
mg1865::mg_26::11::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahitr''i Jehovah niakatra niala tao amin''ny tanàna ka nijanona teo an-tampon''ny tendrombohitra atsinanan''ny tanàna.'
mg1865::mg_26::11::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy fanahy* nanainga ahy tamin''ny fahitana, dia tamin''ny Fanahin''Andriamanitra, ka nitondra ahy ho any Kaldea ho any amin''ny babo. Dia niakatra niala tamiko ny fahitana izay efa hitako. [*Na: rivotra]'
mg1865::mg_26::11::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nolazaiko tamin''ny babo ny teny rehetra izay nasehon''i Jehovah ahy.'
mg1865::mg_26::12::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nasain''Andriamanitra nataon''i Ezekiela hahalalan''ny Isiraely fa samy ho lasan-ko babo, na ny mpanjaka, na ny vahoaka'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::12::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ianao monina eto amin''ny taranaka maditra, izay mana-maso hahitana, nefa tsy mahita, ary manan-tsofina handrenesana, nefa tsy mandre fa taranaka maditra izy.'
mg1865::mg_26::12::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ianao, ry zanak''olona, mifeheza entana handeha hifindra ho any amin''ny fahababoana, ka miaingà antoandro eo imasony; ary mialà eo imasony eo amin''izay itoeranao ho any amin''ny fitoerana hafa; angamba mba ho fantany fa taranaka maditra izy.'
mg1865::mg_26::12::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia havoakanao antoandro eo imasony ny entanao, toy ny entan''ny olona handeha ho any amin''ny fahababoana; fa ny tenanao kosa dia hivoaka hariva eo imasony toy ny fivoaky ny handeha ho any amin''ny fahababoana.'
mg1865::mg_26::12::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Boroboahy eo imasony ny manda, ka ao no amoahy ny entanao.'
mg1865::mg_26::12::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy an-tsoroka eo imasony no fitondranao azy, ka ento mivoaka, rehefa maizina dia maizina ny andro; sarony ny tavanao mba tsy hahitanao ny tany; fa efa nataoko ho famantarana mahagaga ho an''ny taranak''Isiraely ianao.'
mg1865::mg_26::12::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: '2022-06-10T06:34:07+0000'
  verse_title: null
  verse_text: 'Dia nanao araka izay efa nandidiana ahy aho, ka nentiko nivoaka antoandro ny entako, toy ny entan''ny olona handeha ho any amin''ny fahababoana, ary nony hariva dia noboroboahako tamin''ny tanako ny manda, ka nony efa maizina dia maizina ny andro, dia nentiko nivoaka izany ka teny an-tsoroka no nitondrako azy teo imasony.'
mg1865::mg_26::12::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::12::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, moa ny taranak''Isiraely, izay taranaka maditra, tsy manontany aminao hoe va: Inona izao ataonao izao?'
mg1865::mg_26::12::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambarao aminy hoe: Izao no lazain''i Jehovah Tompo: Ity faminaniana ny loza ity dia ho amin''ny mpanjakan''i Jerosalema sy ny taranak''Isiraely rehetra izay ao aminy.'
mg1865::mg_26::12::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao hoe: Izaho dia famantarana mahagaga ho anareo, koa tahaka izay ataoko no hatao amin''ireo; hifindra sy ho lasan-ko babo izy.'
mg1865::mg_26::12::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka, izay ao aminy dia hitondra ny entany eny an-tsorony nony efa maizina dia maizina ny andro ka hivoaka; hoboroboahan''ny olona ny manda hamoahana azy; hanarona ny tavany izy mba tsy ho hitan''ny masony ny tany.'
mg1865::mg_26::12::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fandrika haratoko dia hovelariko aminy, ka ho voan''ny fandrika izy; dia ho entiko any Babylona any amin''ny tanin''ny Kaldeana izy, ary tsy hahita izany, nefa ho faty any ihany.'
mg1865::mg_26::12::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra manodidina azy, dia ny mpanampy azy sy ny miaramilany rehetra, haeliko ho amin''ny rivotra rehetra, sady hanatsoaka sabatra ho enti-manenjika azy Aho.'
mg1865::mg_26::12::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia ho fantany fa Izaho no Jehovah, raha ahahako any amin''ny jentilisa sy ampieleziko any amin''ny tany samy hafa izy.'
mg1865::mg_26::12::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: '2022-06-10T06:34:14+0000'
  verse_title: null
  verse_text: 'Nefa hamelako olom-bitsy ihany izy ho sisa tsy ho ringan''ny sabatra sy ny mosary sy ny areti-mandringana, mba hisy hitantara ny fahavetavetany rehetra any amin''ny jentilisa izay alehany; ka dia ho fantany fa Izaho no Jehovah.'
mg1865::mg_26::12::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::12::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, hano amin-korohoro ny haninao, ary sotroy amin-kovitra sy amin''ahiahy ny ranonao.'
mg1865::mg_26::12::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''ny vahoaka hoe Izao no lazain''i Jehovah Tompo ny amin''ny mponina ao Jerosalema, ao amin''ny tanin''ny Isiraely: Amin''ahiahy no hihinanany ny haniny, ary amim-pahatalanjonana no hisotroany ny ranony, mba ho foana mihitsy ny tany, ka tsy hisy na inona na inona ao, noho ny fandozan''izay rehetra monina ao aminy.'
mg1865::mg_26::12::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho rava ny tanàna onenana, ary ho lao ny tany; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::12::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::12::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ahoana moa, izao fitenenana ataonareo ao amin''ny tanin''ny Isiraely izao hoe: Mihaela ny andro, ary tonga tsinontsinona ny fahitana rehetra?'
mg1865::mg_26::12::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Hatsahatro izany fitenenana izany ka tsy hatao fiteny ao amin''ny Isiraely intsony; fa lazao aminy kosa hoe: Akaiky ny andro sy ny tenin''ny fahitana rehetra.'
mg1865::mg_26::12::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hisy fahitana foana intsony na faminaniana mandrobo ao amin''ny taranak''Isiraely.'
mg1865::mg_26::12::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho no Jehovah; hiteny Aho, ary ny teny lazaiko dia ho to tokoa; tsy hajanona ela intsony izany; fa ho amin''ny andronareo, ry taranaka maditra, no hilazako ny teny sy hanatanterahako azy, hoy Jehovah Tompo.'
mg1865::mg_26::12::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::12::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, indro, ny taranak''Isiraely manao hoe: Mbola ho ela izany fahitana hitany izany, ary ny amin''ny fotoana mbola lavitra no vinaniny.'
mg1865::mg_26::12::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Tsy hisy hajanona ela intsony ny teniko; fa ny teny izay lazaiko dia hotanterahiko, hoy Jehovah Tompo.'
mg1865::mg_26::13::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ireo mpaminany sandoka'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::13::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, maminania ny hamelezana ny mpaminanin''ny Isiraely izay maminany, ka lazao amin''izay maminany araka ny fony hoe: Mihainoa ny tenin''i Jehovah ianareo.'
mg1865::mg_26::13::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Lozan''ny mpaminany adala, izay manaraka ny fanahiny sy ny zavatra tsy hitany.'
mg1865::mg_26::13::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny amboahaolo any an-tanàna haolo ny mpaminaninao, ry Isiraely.'
mg1865::mg_26::13::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy niakatra ho eo amin''ny banga ianareo, sady tsy nanao manda hiarovana ny taranak''Isiraely mba hifaharany amin''ny ady amin''ny andron''i Jehovah.'
mg1865::mg_26::13::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita zava-poana sy faminaniana lainga ireo izay manao hoe: Hoy Jehovah, nefa tsy nirahin''i Jehovah izy tsinona, hahazoany manantena ny hahatòvan''ny teny'
mg1865::mg_26::13::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy fahitana tsy izy no hitanareo, ary faminaniana lainga no lazainareo, raha hoy ianareo: Jehovah no nilaza izany; kanefa tsy nilaza izany Aho tsinona ?'
mg1865::mg_26::13::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Noho ny nilazanareo anoano foana sy ny nahitanareo lainga, dia, indro, hamely anareo Aho, hoy Jehovah Tompo.'
mg1865::mg_26::13::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanako no hamely ny mpaminany izay mahita anoano foana sy maminany lainga; tsy ho isan''ny mpanolo-tsainan''ny oloko na ho voasoratra amin''ny bokin''ny taranak''Isiraely izy sady tsy hiditra ao amin''ny tanin''ny Isiraely; ka dia ho fantatrareo fa Izaho no Jehovah Tompo.'
mg1865::mg_26::13::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny nampiviliany ny oloko tamin''ny nanaovany hoe: Fiadanana, kanjo tsy nisy fiadanana tsinona; ary raha manao ampiantany ny oloko, dia, indreo, izy no mandalotra azy amin''ny feta tsy madity,'
mg1865::mg_26::13::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa lazao amin''izay mandalotra azy amin''ny feta tsy madity fa hirodana izy; hisy ranonorana mifafy; eny, milatsaha ianareo, ry havandra vaventy; ary mifofofofoa ianareo, ry tafiodrivotra.'
mg1865::mg_26::13::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, raha mirodana ny ampiantany, tsy holazaina aminareo hoe va: Aiza ny lalotra izay nandaloranareo azy?'
mg1865::mg_26::13::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Hampifofofofo ny tafio-drivotra amin''ny fahatezerako Aho; ary hisy ranonorana mifafy amin''ny fahatezerako sy havandra vaventy amin''ny fahavinirako hahafongana azy.'
mg1865::mg_26::13::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia harodako ny ampiantany izay nolalorinareo tamin''ny feta tsy madity, ka ho fongotra hatramin''ny tany izy, ary hiseho ny fanambaniny; eny, hirodana izy, ka haringana ao anatiny ianareo; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::13::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotanterahiko amin''ny ampiantany sy izay mandalotra azy amin''ny feta tsy madity ny fahatezerako, ary holazaiko aminareo hoe: Tsy misy intsony ny manda sy izay mpandalotra azy,'
mg1865::mg_26::13::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: '2022-06-10T06:34:02+0000'
  verse_title: null
  verse_text: 'dia ny mpaminanin''ny Isiraely izay maminany ny amin''i Jerosalema sy izay mahita fahitana fiadanana ho azy, kanjo tsy misy fiadanana tsinona, hoy Jehovah Tompo.'
mg1865::mg_26::13::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ianao, ry zanak''olona, handrino mafy ny zanakavavin''ny firenenao, izay manao faminaniana araka ny fony, ary maminania ny hamelezana azy,'
mg1865::mg_26::13::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Lozan''ny vehivavy rehetra izay manjaitra fono ho ao amin''ny famavanin''ny tanana* rehetra, ary manao fisaronana antonona amin''ny loha samy hafa rehetra mba hihaza fanahy! Ny fanahin''ny oloko dia hazainareo, nefa ny fanahinareo kosa velominareo! [*Na: tanako]'
mg1865::mg_26::13::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manamavo Ahy ao amin''ny oloko ianareo noho ny vary hordea eran-tanan''ila sy ny sombi-mofo, mba hahafaty ny fanahy izay tsy tokony ho faty ary hahavelona ny fanahy izay tsy tokony hovelomina, amin''ny andainganareo amin''ny oloko izay mihaino ny lainganareo.'
mg1865::mg_26::13::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Indro, hosimbako ny fononareo, izay entinareo hihaza ny fanahy any, mba hahafahan''ireny hanidina, eny, hotriariko hiala amin''ny sandrinareo izy, ka halefako hanidina ny fanahy izay nohazainareo.'
mg1865::mg_26::13::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotriariko koa ny fisaronanareo, ka hovonjeko ho afaka amin''ny tananareo ny oloko, dia tsy ho azon''ny tananareo ho haza intsony izy; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::13::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria lainga no entinareo mampalahelo ny fon''ny marina, izay tsy nampalaheloviko, sady entinareo manatanjaka ny tanan''ny ratsy fanahy, tsy hialany amin''ny lalan-dratsiny mba hamelomana azy,'
mg1865::mg_26::13::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy hahita anoano foana na hanao faminaniana intsony ianareo; fa hovonjeko ho afaka amin''ny tananareo ny oloko; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::14::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra ho an''ny mpanompo sampy, sy filazana ny hanjo azy'
  verse_text: 'Dia nisy loholon''ny Isiraely tonga tao amiko ka nipetraka teo anoloako.'
mg1865::mg_26::14::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::14::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ireto olona ireto efa nampiorina ny sampiny ao am-pony, ary ny fahatafintohinana mahameloka azy dia apetrany eo anoloany. Moa hety hanontanian''ireto va Aho?'
mg1865::mg_26::14::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitenena aminy hoe: Izao no lazain''i Jehovah Tompo: Ny amin''ny olona rehetra amin''ny taranak''Isiraely izay mampiorina ny sampiny ao am-pony ary mametraka ny fahatafintohinana mahameloka azy eo anoloany ary manatona ny mpaminany, Izaho Jehovah no hamaly azy araka ny habetsaky ny sampiny,'
mg1865::mg_26::14::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hisamborako ny taranak''Isiraely amin''ny fony, satria efa nihemotra niala tamiko izy rehetra noho ny sampiny.'
mg1865::mg_26::14::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ataovy amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Mibebaha, dia miambohoa ny sampinareo sy ny fahavetavetanareo rehetra; eny, miambohoa ireny.'
mg1865::mg_26::14::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza amin''ny taranak''Isiraely, na amin''ny vahiny izay mivahiny eo amin''ny Isiraely, no misaraka amiko ka mampiorina ny sampiny ao am-pony ary mametraka ny fahatafintohinana mahameloka azy eo anoloany sady manatona ny mpaminany hanontany amiko, dia Izaho Jehovah ihany no hamaly azy araka izay toetro;'
mg1865::mg_26::14::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hanandrina izany olona izany ny tavako, ka hataoko mahita loza izy mba ho famantarana sy ho ohabolana, ary hofongorako tsy ho eo amin''ny oloko izy; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::14::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy voataona ny mpaminany ka milaza zavatra, dia Izaho Jehovah no nitaona izany mpaminany izany; ary hahinjitro aminy ny tanako, ka hofongorako tsy ho eo amin''ny Isiraely oloko izy.'
mg1865::mg_26::14::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitondra ny heloky ny tenany izy; ny heloky ny mpaminany dia hitovy amin''ny helok''izay manontany aminy koa,'
mg1865::mg_26::14::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hialan''ny taranak''Isiraely amiko intsony, ary tsy handotoany ny tenany intsony amin''ny fahadisoany rehetra; fa ho oloko izy, ary Izaho ho Andriamaniny, hoy Jehovah Tompo.'
mg1865::mg_26::14::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko indray ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::14::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, raha misy tany manota amiko ka manao izay mahadiso, ary ahinjitro aminy ny tanako, ka tapahiko ny mofo, tohan''ainy, sady andefasako mosary, ary aringako avokoa ny olona sy ny biby,'
mg1865::mg_26::14::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'na dia ao aza ireto telo lahy ireto, dia Noa sy Daniela ary Joba, dia ny tenany ihany no ho voavonjiny noho ny fahamarinany, hoy Jehovah Tompo.'
mg1865::mg_26::14::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mampandeha biby masiaka eo amin''ny tany Aho, ka mandringana ny zana-bahoaka ireny, ary lao ny tany ka tsy azon''olona aleha noho ny biby,'
mg1865::mg_26::14::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'na dia ao aza ireo telo lahy ireo, raha velona koa Aho, hoy Jehovah Tompo, tsy hahavonjy ny zananilahy na ny zananivavy izy; fa ny tenany ihany no ho voavonjy, fa ny tany kosa ho lao.'
mg1865::mg_26::14::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mitondra sabatra mamely izany tany izany Aho ka manao hoe: Aoka hotetezin-tsabatra ny tany, ka hofongorako izy, na ny olona na ny biby,'
mg1865::mg_26::14::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'na dia ao aza ireo telo lahy ireo, raha velona koa Aho, hoy Jehovah Tompo, dia tsy hahavonjy ny zananilahy na ny zananivavy ireo; fa ny tenany ihany no ho voavonjy.'
mg1865::mg_26::14::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mandefa areti-mandringana mamely izany tany izany Aho, sady aidiko aminy ny fahatezerako, dia amin''ny fandatsahan-drà mba haharingana ny olona sy ny biby ao aminy,'
mg1865::mg_26::14::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'na dia ao aza Noa sy Daniela ary Joba, raha velona koa Aho, hoy Jehovah Tompo, dia tsy hahavonjy ny zananilahy na ny zananivavy ireo, fa ny tenany ihany no ho voavonjiny noho ny fahamarinany.'
mg1865::mg_26::14::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Koa mainka raha alefako hamely an''i Jerosalema izao fitsarako efatra mandoza izao, dia ny sabatra sy ny mosary sy ny biby masiaka ary ny areti-mandringana, mba hahafongotra azy, na olona na biby!'
mg1865::mg_26::14::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, indro, hisy sisa afaka ihany izy ho entina mivoaka, dia ny zanakalahy sy ny zanakavavy; indro, hivoaka ho any aminareo ireo, ka ho hitanareo ny alehany sy ny ataony, dia hionona ianareo noho ny amin''ny loza rehetra izay nataoko mihatra amin''i Jerosalema, dia izay rehetra nataoko mihatra aminy.'
mg1865::mg_26::14::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hampionona anareo ireo, rehefa hitanareo ny alehany sy ny ataony; ka dia ho fantatrareo fa tsy nataotaoko foana izay rehetra nataoko taminy, hoy Jehovah Tompo.'
mg1865::mg_26::15::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana mampiseho ny toetr''i Jerosalema'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::15::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, inona no ihoaran''ny tahom-boaloboka noho ny hazo rehetra, dia ny sakeli-boaloboka izay isan''ny hazo any an''ala?'
mg1865::mg_26::15::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mba fangalan-kazo hatao zavatra akory va izy, na mba fangalana fihantonan-javatra?'
mg1865::mg_26::15::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hatsipy any anaty afo hataina izy; ny laniny roa ho levon''ny afo, ary ny tenatenany ho may. Ka moa azo atao zavatra akory va izy?'
mg1865::mg_26::15::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fony izy tsy mbola nahafahana aza, dia tsy azo natao zavatra, koa mainka fa rehefa levon''ny afo sy may izy?'
mg1865::mg_26::15::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Toy ny tahom-boaloboka amin''ny hazo any an''ala, izay natolotro hataina, dia toy izany no hanolorako ny mponina any Jerosalema.'
mg1865::mg_26::15::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanandrina azy ny tavako; hiala avy amin''ny afo izy nefa ho levon''ny afo hafa indray; ka dia ho fantatrareo fa Izaho no Jehovah, raha manandrina azy ny tavako.'
mg1865::mg_26::15::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko lao ny tany noho ny nivadihany tamiko, hoy Jehovah Tompo.'
mg1865::mg_26::16::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nivadihan''i Jerosalema, sy ny nahafoizany an''i Jehovah, ary ny hamaliany azy amin''izany'
  verse_text: 'Tonga tamiko indray ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::16::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ampahafantaro an''i Jerosalema ny fahavetavetany,'
mg1865::mg_26::16::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo amin''i Jerosalema: Ny tany Kanana no nahaterahanao sy nahabe anao; Amorita no rainao, ary Hetita no reninao.'
mg1865::mg_26::16::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny nahaterahanao, dia tsy voatapaka akory ny tadim-poitrao tamin''ny andro nahaterahanao, ary tsy voampandro tamin''ny rano ianao, na voahosotra sira, na voahodidina lamban-jaza akory.'
mg1865::mg_26::16::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nisy maso niantra anao hanao izany aminao, na dia iray akory amin''ireo zavatra ireo aza, mba hamindra fo aminao; fa nariana tany an-tsaha ianao, satria natao ho zava-maharikoriko ianao tamin''ny andro nahaterahanao.'
mg1865::mg_26::16::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandalo Aho ka nahita anao nihosinkosina teo amin''ny rànao, dia hoy Izaho taminao, raha mbola tamin''ny rànao ianao: Ho velona anie ianao; eny, hoy Izaho taminao, raha mbola tamin''ny rànao ianao: Ho velona anie ianao.'
mg1865::mg_26::16::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nataoko alinalina, toy ny zava-maniry any an-tsaha, ny isanao, ka nitombo sy nihalehibe ary tonga tsara tarehy tokoa ianao; naniry nono ianao sady naniry volo, nefa mbola nitanjaka sy nihanjahanja ihany'
mg1865::mg_26::16::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandalo Aho ka nijery anao, dia hitako fa izay no fotoanao, dia ny fotoam-pitiavana: ary narakotro anao ny lambako, ka nosaronako ny fitanjahanao; eny, nianiana taminao Aho ka nanao fanekena taminao, hoy Jehovah Tompo, ka dia efa Ahy ianao.'
mg1865::mg_26::16::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampandroiko rano ianao, eny, nosasako tsara ho afaka tamin''ny rànao, dia nohosorako diloilo.'
mg1865::mg_26::16::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Notafiako lamba misoratsoratra koa ianao sy nokiraroako hoditakasy*, ary nampisikiniko rongony fotsy madinika sy notafiako amparasily. [*Hoditra voasoka ho menamena. na hodi-biby tsy fantatra]'
mg1865::mg_26::16::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noravahako firavaka koa ianao, ka nasiako haba ny tananao ary rojo ny vozonao'
mg1865::mg_26::16::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasiako kavina ny oronao sy ny sofinao ary satro-boninahitra tsara tarehy ny lohanao,'
mg1865::mg_26::16::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia niravaka volamena sy volafotsy ianao, ary rongony fotsy madinika sy amparasily ary lamba misoratsoratra ny fitafianao; koba tsara toto sy tantely ary diloilo no fihinanao; ary efa nihatsara tarehy dia nihatsara tarehy ianao sady nambinina ho miendrik''andriana'
mg1865::mg_26::16::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niely tany amin''ny jentilisa aza ny lazanao noho ny hatsaran-tarehinao; fa tanteraka izany noho ny voninahitro izay nataoko taminao, hoy Jehovah Tompo.'
mg1865::mg_26::16::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanjo natoky ny hatsaran-tarehinao ianao ka nijangajanga noho ny lazanao* sady nanaram-po nijangajanga tamin''ny mpandalo rehetra, ka nafoy ho azy izany [*Hebreo: anarana]'
mg1865::mg_26::16::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangalanao ny fitafianao, dia nanaovanao fitoerana avo ho anao ka noravahanao sora-damba, ka nijangajanga teo aminy ianao; dia zavatra izay tsy tokony hiseho na hisy akory.'
mg1865::mg_26::16::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalainao koa ny firavakao tamin''ny volamenako sy ny volafotsiko, izay nomeko anao, dia nataonao sarin-dehilahy ho anao ka nijangajanganao;'
mg1865::mg_26::16::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'nalainao koa ny fitafianao misoratsoratra ka natatinao ireo; ary ny diloiloko sy ny ditin-kazo manitro dia napetrakao teo anoloany'
mg1865::mg_26::16::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny haniko izay nomeko anao koa, dia ny koba tsara toto sy ny diloilo ary ny tantely, izay nafahako anao, dia napetrakao teo anoloan''ireo ho hanitra ankasitrahana; teo tokoa izany, hoy Jehovah Tompo.'
mg1865::mg_26::16::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentinao ny zanakao-lahy sy ny zanakao-vavy, izay naterakao ho Ahy, dia novonoinao ho fanatitra ho an''ireo mba hohanina. Moa zavatra kely va izany fijangajanganao izany?'
mg1865::mg_26::16::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novonoinao ny zanakao, fa natolotrao ka nampandehaninao namaky ny afo ho an''ireo.'
mg1865::mg_26::16::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fahavetavetanao sy ny fijangajanganao rehetra dia tsy nahatsiaro ny andro fahakelezanao ianao, fony ianao nitanjaka sy nihanjahanja sady nihosinkosina teo amin''ny rànao.'
mg1865::mg_26::16::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vitanao izany faharatsianao rehetra izany (lozanao! lozanao! hoy Jehovah Tompo),'
mg1865::mg_26::16::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao trano fijangajangana ho anao ianao sady nanao fitoerana avo ho anao teny an-kalalahana rehetra teny.'
mg1865::mg_26::16::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teny an-tsampanan-dàlana rehetra no nanaovanao ny fitoerana avonao, ary novetavetainao ny hatsaran-tarehinao, ka nabahanao ho amin''ny mpandalo rehetra ny tongotrao, ary nampitomboinao ny fijangajanganao.'
mg1865::mg_26::16::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao efa nijangajanga tamin''ny zanak''i Egypta be nofo izay mifanila fonenana aminao; ary nampitomboinao ny fijangajanganao ka nampahatezitra Ahy.'
mg1865::mg_26::16::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nahinjitro taminao ny tanako. ka nahenako ny anjara-haninao, ary natolotro ho amin''ny sitrapon''izay mankahala anao ianao, dia ny zanakavavin''ny Filistina, izay menatra noho ny fahavetavetana fanaonao.'
mg1865::mg_26::16::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nijangajanga tamin''ny zanak''i Asyria koa ianao noho ny tsy fahafaham-ponao; eny, nijangajanga taminy ianao, nefa mbola tsy afa-po ihany.'
mg1865::mg_26::16::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: '2022-06-11T04:50:23+0000'
  verse_title: null
  verse_text: 'Ary mbola nampandrosoinao ihany ny fijangajanganao hatrany amin''ny tanin''ny mpandranto*. Dia hatrany Kaldea; fa na dia tamin''izany aza dia mbola tsy afa-po ihany ianao. [*Hebreo tany Kanana: izaho Ezekiela 17:4]'
mg1865::mg_26::16::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akory ny fahamaimain''ny fonao! hoy Jehovah Tompo, tamin''ny nanaovanao ireo rehetra ireo, dia ny fanaon''ny janga tsivalahara!'
mg1865::mg_26::16::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny nanaovanao ny trano fijangajanganao teny an-tsampanan-dàlana rehetra sy ny nanaovanao ny fitoerana avonao teny an-kalalahana rehetra dia tsy mba tahaka ny vehivavy janga ianao. satria tsy nahoanao akory izay tangy.'
mg1865::mg_26::16::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vadin''olona mijangajanga dia maka olon-kafa ho solon''ny vadiny!'
mg1865::mg_26::16::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: '2022-06-11T04:50:03+0000'
  verse_title: null
  verse_text: 'Ny vehivavy janga rehetra dia omen-tangy; fa ianao kosa manangy ireo lehilahinao rehetra sady manome azy fanambatambazana hanatonan''ny ny manodidina rehetra anao mba hijangajangany aminao.'
mg1865::mg_26::16::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hafa noho ny amin''ny vehivavy sasany mihitsy ny fanaonao tamin''ny fijangajanganao, fa tsy nisy nanaraka anao hijangajanga taminao; eny, satria nanome tangy ianao, fa tsy mba nomena, dia izany indrindra no mahahafa anao'
mg1865::mg_26::16::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ny tenin''i Jehovah. ry kala janga:'
mg1865::mg_26::16::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Noho ny nandanianao volabe* sy ny nampisehoana ny fitanjahanao tamin''ny nijangajanganao tamin''ireny lehilahinao sy ny sampinao rehetra. izay fahavetavetanao. ary noho ny ran''ny zanakao izay naterinao ho an''ireo. [*Hebreo: nanidinanao varahina]'
mg1865::mg_26::16::37:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia, indro, hovoriko ireny lehilahinao rehetra ireny, izay mankamany anao sy izay tianao rehetra mbamin''ireny rehetra izay halanao koa, eny hovoriko avy amin''ny manodidina ireny mba hamely anao, ka hampisehoiko aminy ny fitanjahanao, dia hahita ny fitanjahanao rehetra izy;'
mg1865::mg_26::16::38:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hotsaraiko ianao araka ny fitsara vehivavy mijangajanga sy izay mandatsa-drà, ka halatsako ny rànao noho ny fahatezerana sy ny fahasaro-piaro.'
mg1865::mg_26::16::39:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatolotro ho eny an-tanan''ireny ianao, ka harodany ny trano fijangajanganao, ary horavany ny fitoerana avonao; dia hendahany koa ny fitafianao, ary hesoriny ny firavakao soa, ka havelany hitanjaka sy hiboridana ianao.'
mg1865::mg_26::16::40:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitondra vahoaka maro be hiakatra hamely anao koa izy ka hotorahany vato sady hotetitetehiny amin''ny sabany ianao.'
mg1865::mg_26::16::41:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hodorany amin''ny afo ny tranonao, ka hotanterahiny eo imason''ny vehivavy maro ny famaliana anao ary hatsahatro tsy hijangajanga ianao ka tsy hanangy intsony.'
mg1865::mg_26::16::42:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no hialako fo aminao, ary ho afaka ny fahasaro-piaroko aminao, dia hionona Aho ka tsy ho tezitra intsony.'
mg1865::mg_26::16::43:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny tsy nahatsiarovanao ny andro fahakelezanao, fa niempo nanohitra Ahy tamin''ireo rehetra ireo ianao, dia; indro, ny nataonao* ihany no hatsingeriko ho eo an-dohanao, hoy Jehovah Tompo. Ary tsy nanao izany ratsy izany ho fanampin''ny fahavetavetanao rehetra va ianao**? [*Hebreo: lalanao] [**Na: Fa raha tsy izany, dia Izao indray no hanao ratsy miohatra noho ny fahavetavetanao rehetra]'
mg1865::mg_26::16::44:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny mpanao ohabolana rehetra dia hamely anao amin''izao ohabolana izao hoe: Manahaka an-dreniny ihany ny zananivavy.'
mg1865::mg_26::16::45:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao dia zanakavavin-dreninao, izay mahafoy ny vadiny aman-janany; ary ianao dia rahavavin''ireo rahavavinao, izay nahafoy ny vadiny aman-janany; Hetita no reninareo, ary Amorita no rainareo.'
mg1865::mg_26::16::46:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samaria no zokinao-vavy, dia izy sy ny zananivavy izay monina eo an-kavianao; ary ny zandrinao vavy, izay monina amin''ny an-kavananao, dia Sodoma sy ny zananivavy.'
mg1865::mg_26::16::47:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy araka ny alehan''ireo ihany no nalehanao, ary tsy araka ny fahavetavetan''ireo ihany no nataonao; fa hoatra ny zavatra kely loatra izany, ka dia nanao ratsy mihoatra noho ireo indray ianao tamin''ny nalehanao rehetra.'
mg1865::mg_26::16::48:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy Jehovah Tompo, na dia Sodoma rahavavinao sy ny zananivavy aza tsy mba nanao tahaka ny nataonao sy ny zanakao-vavy.'
mg1865::mg_26::16::49:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, izao no helok''i Sodoma rahavavinao: Avonavona sy fahabetsahan-kanina ary fahatokiam-poana no tao aminy sy tao amin''ny zananivavy, ary tsy mba nitantana ny malahelo sy ny mahantra izy.'
mg1865::mg_26::16::50:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niavonavona izy ka nanao fahavetavetana teo anatrehako; ary nony nahita izany Aho, dia nanaisotra azy.'
mg1865::mg_26::16::51:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ampy antsasaky ny fahotanao ny nataon''i Samaria; fa ianao efa nampitombo ny fahavetavetanao mihoatra noho izy, ary nampiseho ny rahavavinao ho toa marina indray tamin''ny fahavetave-tanao rehetra izay nataonao.'
mg1865::mg_26::16::52:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao koa dia aoka hitondra ny henatrao araka ny efa nitsaranao ny rahavavinao. Noho ny fahotanao izay nahatonga anao ho vetaveta mihoatra noho ireo, ka dia miseho ho toa marina noho ianao izy, eny, menara koa ianao, ka mitondrà ny henatrao noho ny nampisehoanao ny rahavavinao ho toa marina.'
mg1865::mg_26::16::53:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampodiko avy amin''ny fahababoana ireny, dia Sodoma sy ny zananivavy, ary Samaria sy ny zananivavy mbamin''izay olonao voababo,'
mg1865::mg_26::16::54:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hitondranao ny henatrao sy hangaihaizanao noho izay rehetra nataonao amin''ny hampiononanao azy*. [*Na: tamin''ny nampiononanao azy]'
mg1865::mg_26::16::55:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahavavinao, dia Sodoma sy ny zananivavy, dia hody amin''ny toetrany taloha, ary Samaria sy ny zananivavy dia hody amin''ny toetrany taloha, ary ianao sy ny zanakaovavy dia hody amin''ny toetrareo taloha koa.'
mg1865::mg_26::16::56:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy mbola mba notononin''ny vavanao akory ny nanjo an''i Sodoma rahavavinao tamin''ny andro niavonavonanao,'
mg1865::mg_26::16::57:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'fony tsy mbola niseho ny faharatsianao, toy ny tamin''ny andro nandatsan''ny zanakavavin''i Syria sy izay rehetra manodidina azy ary ny zanakavavin''ny Filistina, izay namingavinga anao manodidina.'
mg1865::mg_26::16::58:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny faharatsianao sy ny fahavetavetanao no ho entinao, hoy Jehovah.'
mg1865::mg_26::16::59:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Araka ny nataonao ihany no hataoko aminao, izay namingavinga ny fianianana ka nivadika ny fanekena.'
mg1865::mg_26::16::60:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hotsarovako ny fanekena nataoko taminao, tamin''ny andro fahakelezanao, ka hanorina fanekena mandrakizay aminao Aho.'
mg1865::mg_26::16::61:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotsarovanao ny nalehanao, ka ho menatra ianao, raha mandray ireo rahavavinao, dia ny zokinao sy ny zandrinao; ka homeko ho zanakao-vavy ireo, na dia tsy mba isan''ilay nanaovako fanekena taminao aza.'
mg1865::mg_26::16::62:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho hanorina ny fanekeko aminao, ka dia ho fantatrao fa Izaho no Jehovah,'
mg1865::mg_26::16::63:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 16
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahatsiarovanao sy hangaihainao ary tsy hiloahanao vava intsony noho ny henatrao, raha mamela ny helokao ny amin''ny nataonao rehetra Aho, hoy Jehovah Tompo.'
mg1865::mg_26::17::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nanetrena ny taranak''i Dasida, sy ny mbola hanandratana azy indray'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::17::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manaova fampanonona, ary milazà fanoharana amin''ny taranak''Isiraely,'
mg1865::mg_26::17::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Nisy voromahery lehibe nanana elatra lehibe, sady lava ny volon''elany, ary nisoratsoratra avokoa ny volony rehetra; dia tonga tao Libanona izy ka naka izay avo indrindra amin''ny rantsan''ny sedera;'
mg1865::mg_26::17::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny tendron''ny tarony dia nolaingosany ka nentiny ho any amin''ny tany fandrantoana*; eny, tao an-tanànan''ny mpandranto no namboleny azy. [*Hebreo: Kanana; izahao Ezekiela 26:29]'
mg1865::mg_26::17::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nangalany koa ny voan-javatra tamin''ny tany ka namboleny tao amin''ny tany lonaka; nentiny ho eo amoron''ny rano be iny ka nataony araka ny fanao amin''ny hazomalahelo.'
mg1865::mg_26::17::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniry iny ka tonga voaloboka iva misandrahaka, mba hitodihan''ny rantsany ho eo aminy ary ny fakany ho ao ambaniny; ka dia tonga voaloboka izy ka nandrantsana sy nanaroka.'
mg1865::mg_26::17::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy voromahery lehibe hafa koa nanana elatra lehibe sady be volo, ary, indro, manina azy izany voaloboka izany ka nampanatona ny fakany hankany aminy sady nampanaroka ny rantsany avy tamin''ny tany voafaritra nambolena azy mba hankany aminy koa mba holemany.'
mg1865::mg_26::17::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voavoly tao amin''ny saha tsara teo amoron''ny rano be izy mba handrantsana sy hamoa ka ho voaloboka tsara indrindra.'
mg1865::mg_26::17::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovinao hoe: Izao no lazain''i Jehovah Tompo: Ho vanona va izy? Tsy hongotana va ny fakany, ary hotazana ny voany, mba halazo izy? Halazo ny raviny rehetra, raha vao mitsimoka, ka na dia ny sandry mahery sy ny vahoaka betsaka aza tsy hahay mampaniry azy avy amin''ny fakany intsony*. [*Na: na dia tsy misy sandry mahery na vahoaka betsaka manongotra azy amin''ny fakany aza]'
mg1865::mg_26::17::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, na dia voavoly aza izy, moa ho vanona va? Tsy halazo tokoa va izy, raha asian''ny rivotra avy any atsinanana? Eny, halazo eo amin''ny tany voafaritra naniriany izy.'
mg1865::mg_26::17::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::17::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny taranaka maditra hoe: Tsy fantatrareo va ny hevitr''ireto zavatra ireto? Lazao aminy hoe: Indro, efa tonga tany Jerosalema ny mpanjakan''i Babylona ka naka ny mpanjaka sy ny mpanapaka tao, dia nitondra azy ho any aminy any Babylona.'
mg1865::mg_26::17::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naka ny anankiray tamin''ny taranaky ny mpanjaka izy, dia nanao fanekena taminy ka nampianiana azy, ary ny lehilahy mahery tamin''ny tany dia nentiny nandeha,'
mg1865::mg_26::17::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hietry ny fanjakana ka tsy hiarina, mba hotandremana ny fanekeny ka haharitra.'
mg1865::mg_26::17::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niodina taminy izy ka naniraka olona hankany Egypta, mba hanome soavaly sy olona maro azy ireo. Moa hambinina va izy? Ho afa-mandositra va izay manao toy izany? Nivadika ny fanekena izy, ka ho afa-mandositra va?'
mg1865::mg_26::17::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy Jehovah Tompo, dia any amin''ny tanin''ilay mpanjaka nampanjaka azy sady nampianiana azy nefa nohamavoiny ny fianianana, ary nivadihany ny fanekeny eny, any amin''io, any Babylona, no hahafatesany.'
mg1865::mg_26::17::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny hanandratan''ireo tovon-tany sy ny hanaovany tilikambo handringanana olona maro, dia tsy hanampy azy amin''ny ady akory Farao, na dia manana miaramila maro sy vahoaka betsaka aza.'
mg1865::mg_26::17::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nanamavo ny fianianana izy tamin''ny nivadihany ny fanekena, fa he! efa nanolotra ny tanany izy, kanjo nanao izany rehetra izany ihany, dia tsy ho afa-mandositra izy.'
mg1865::mg_26::17::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Raha velona koa Aho, ny fampianianako izay nohamavoiny ary ny fanekeko izay nivadihany dia hatsingeriko ho eo an-dohany tokoa.'
mg1865::mg_26::17::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fandrika haratoko dia hovelariko aminy, ka ho voan''ny fandriko izy, ary ho entiko any Babylona ka hotsaraiko any noho ny nivadihany tamiko.'
mg1865::mg_26::17::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramilany rehetra izay afa-mandositra dia ho lavon''ny sabatra, ary izay sisa dia haely ho amin''ny rivotra rehetra, ka dia ho fantatrareo fa Izaho Jehovah no niteny izany.'
mg1865::mg_26::17::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Izaho dia haka amin''ny rantsana avo indrindra amin''ny sedera avo, ka hamboleko izany; holaingosako ny tendron''ny laingony milenodenoka, ka hamboleko ao amin''ny tendrombohitra avo sy milangalanga izany.'
mg1865::mg_26::17::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''ny tendrombohitra avon''ny Isiraely no hamboleko azy; ary handrantsana sy hamoa izy ka ho tonga sedera tsara indrindra, ary ny vorona samy hafa rehetra hitoetra ao aminy; ao amin''ny alokaloky ny rantsany no hitoerany.'
mg1865::mg_26::17::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantatry ny hazo rehetra any an-tsaha fa Izaho Jehovah no efa nanetry ny hazo avo ka nanandratra ny hazo iva ary nandazo ny hazo maitso ka nampaniry ny hazo maina; Izaho Jehovah no niteny sady nanao izany.'
mg1865::mg_26::18::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny famalian''Andriamanitra ny olona araka ny asany avy'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::18::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no manao izao ohabolana izao ao amin''ny tanin''ny Isiraely ianareo: Ny ray no mihinana voaloboka maharikivy, ka ny nifin''ny zanany no madilo?'
mg1865::mg_26::18::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: '2023-01-02T02:56:18+0000'
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy Jehovah Tompo, tsy hisy hanaovanareo izany ohabolana izany ao amin''ny Isiraely intsony.'
mg1865::mg_26::18::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Ahy ny fanahy rehetra: toy ny fanahin''ny ray, dia toy izany koa ny fanahin''ny zanany; samy Ahy ireny; ny fanahy izay manota no ho faty.'
mg1865::mg_26::18::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha marina ny olona ka manao izay marina sy mahitsy,'
mg1865::mg_26::18::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin''ny sampin''ny taranak''Isiraely, na mandoto ny vadin''ny namany, na manakaiky ny vehivavy izay mararin''ny fadim-bolana,'
mg1865::mg_26::18::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'na mampahory olona, fa mamerina ny natao tsatòka, ary tsy mandroba, fa manome ny haniny ho an''ny noana ary manafy lamba ny matanjaka,'
mg1865::mg_26::18::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mampanàna vola, na maka tombony akory, fa miaro ny tanany tsy hanao ratsy ary manao fitsarana marina amin''ny miady,'
mg1865::mg_26::18::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: '2022-06-12T05:03:47+0000'
  verse_title: null
  verse_text: 'ary mandeha araka ny lalàko sy ny mitandrina ny fitsipiko ka manao izay marina, dia marina izy ka ho velona tokoa, hoy Jehovah Tompo.'
mg1865::mg_26::18::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha miteraka zazalahy mpanao an-keriny sy mpandatsa-drà izy, ka manao na dia iray ihany amin''ireo zavatra ireo aza iny'
mg1865::mg_26::18::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: '(nefa tsy nanao ireo zavatra ireo akory ny tenany), na mihinana eny an-tendrombohitra, na mandoto ny vadin''ny namany,'
mg1865::mg_26::18::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'na mampahory ny malahelo sy ny mahantra, na mandroba, na tsy mamerina ny natao tsatòka, na manandratra ny masony ho amin''ny sampy ka manao izay fahavetavetana,'
mg1865::mg_26::18::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'na mampanana vola, na maka tombony moa ho velona va izy? Tsy ho velona izy; nanao ireo fahavetavetana rehetra ireo izy; ho faty tokoa izy, ary ny ràny dia ho aminy ihany.'
mg1865::mg_26::18::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, raha iny kosa indray miteraka zazalahy, izay mahita ny fahotana rehetra nataon-drainy, nefa nony mahita izany izy, dia tsy mba manao tahaka izany,'
mg1865::mg_26::18::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin''ny sampin''ny taranak''Isiraely, na mandoto ny vadin''ny namany,'
mg1865::mg_26::18::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'na mampahory olona, na maka tsatòka, na mandroba, fa manome ny haniny ho an''ny noana ary manafy lamba ny mitanjaka,'
mg1865::mg_26::18::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'miaro ny tanany tsy hampahory ny mahantra, tsy mampanana vola, na maka tombony, fa manaraka ny fitsipiko sy mandeha araka ny lalàko, dia tsy ho faty noho ny helo-drainy izy; ho velona tokoa izy.'
mg1865::mg_26::18::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny rainy, noho ny nanaovany an-keriny sy ny nandrobany ny rahalahiny ary ny nanaovany izay tsy mety tao amin''ny fireneny, dia, indro, ho faty noho ny helony izy.'
mg1865::mg_26::18::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa, hoy ianareo: Nahoana moa ny zanaka no tsy mba hitondra ny helo-drainy? Raha ny zanaka manao izay marina sy mahitsy sy mitandrina ny didiko rehetra ka mankatò azy, dia ho velona tokoa izy.'
mg1865::mg_26::18::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahy izay manota no ho faty. Ny zanaka tsy mba hitondra ny heloky ny rainy, ary ny ray tsy mba hitondra ny heloky ny zanany; ny fahamarinan''ny marina ho aminy ihany ary ny faharatsian''ny ratsy fanahy kosa ho aminy ihany.'
mg1865::mg_26::18::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny ratsy fanahy miala amin''ny fahotana rehetra izay nataony ka mitandrina ny didiko rehetra ary manao izay marina sy mahitsy, dia ho velona tokoa izy, fa tsy ho faty.'
mg1865::mg_26::18::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahadisoany rehetra izay nataony tsy hotsarovana aminy intsony; ho velona izy noho ny fahamarinana izay nataony.'
mg1865::mg_26::18::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa sitrako akory va ny fahafatesan''ny ratsy fanahy, hoy Jehovah Tompo, fa tsy ny hialany amin''ny alehany mba ho velona izy ?'
mg1865::mg_26::18::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny marina no miala amin''ny fahamarinany ka manao meloka ary manaraka ny fahavetavetana rehetra izay nataon''ny ratsy fanahy, ho velona va izy? Ny fahamarinany rehetra izay nataony dia tsy hotsarovana; noho ny fahadisoana izay nandisoany sy ny fahotana izay nanotany dia ho faty izy.'
mg1865::mg_26::18::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy ianareo: Tsy marina ny fitondran*''ny Tompo. Mihainoa ange, ry taranak''Isiraely: Moa ny fitondrako* va no tsy marina ? Tsy ny fitondranareo* va no tsy marina? [*Hebreo: lalana]'
mg1865::mg_26::18::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny marina miala amin''ny fahamarinany ary manao meloka ka maty amin''izany, dia maty noho ny heloka nataony ihany izy.'
mg1865::mg_26::18::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny ratsy fanahy miala amin''ny faharatsiana nataony ka manao izay marina sy mahitsy, dia hovelominy ny fanahiny.'
mg1865::mg_26::18::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mahita izy ka miala amin''ny fahadisoana rehetra izay nataony, dia ho velona tokoa izy, fa tsy ho faty.'
mg1865::mg_26::18::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy ny taranak''Isiraely: Tsy marina ny fitondran*''ny Tompo. Ry taranak''Isiraely, ny fitondrako* va no tsy marina? Tsy ny fitondranareo* va no tsy marina? [*Hebreo: lalana]'
mg1865::mg_26::18::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa samy hotsaraiko araka ny ataonareo avy ianareo, ry taranak''Isiraely, hoy Jehovah Tompo. Mitodiha, ka mibebaha amin''ny fahadisoanareo rehetra, dia tsy ho tonga fahatafintohinana mahameloka anareo intsony izany.'
mg1865::mg_26::18::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory ho afaka aminareo ny fahadisoanareo rehetra izay nataonareo, ka manaova fo vaovao sy fanahy vaovao ho anareo; fa nahoana no ho faty ianareo, ry taranak''Isiraely?'
mg1865::mg_26::18::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy sitrako ny fahafatesan''izay maty, hoy Jehovah Tompo. Koa mibebaha ianareo mba ho velona.'
mg1865::mg_26::19::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Hira fahalahelovana ny amin''ireo lehiben''ny Isiraely.'
  verse_text: 'Ary manaova hira fahalahelovana ny amin''ireo andrianan''ny Isiraely ianao,'
mg1865::mg_26::19::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Nahoana ny liom-bavy reninareo no namitsaka* tao amin''ny liom-bavy. Ary nitaiza ny zanany tao amin''ny liona tanora? [*Na: Inona moa reninareo? Liom-bavy izy. Namitsaka]'
mg1865::mg_26::19::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahalehibe ny zanany anankiray izy, dia tonga liona tanora io ka nianatra hamiravira haza sady nihinana olona.'
mg1865::mg_26::19::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahare ny lazany ny firenena, dia namandrika azy tamin''ny lavaka, ka nasiany masom-by ny orony, dia nentiny ho any amin''ny tany Egypta izy.'
mg1865::mg_26::19::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny liom-bavy fa foana sy levona ny fanantenany, dia nangalany indray ny zanany ka notezainy ho tonga liona tanora.'
mg1865::mg_26::19::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoivoy teny amin''ny liom-bavy iny, dia tonga liona tanora ka nianatra hamiravira haza sady nihinana olona.'
mg1865::mg_26::19::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisavika ny mpitondratenan''ireny izy* sady nandrava ny tanànany, ka lao ny tany mbamin''izay rehetra tao aminy. Noho ny feon''ny fierony. [*Na: Ary fantany ny lapan''ireny]'
mg1865::mg_26::19::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny jentilisa manodidina, izay avy any amin''ny fanjakana samy hafa, dia nanamboatra sy namelatra ny fandrika haratony taminy, ka dia voafandrika tamin''ny lavaka izy.'
mg1865::mg_26::19::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony tamin''ny vata izy, sady nasiany masom-by ny orony, ka nentiny ho any amin''ny mpanjakan''i Babylona izy, nentiny ho ao amin''ny fiarovana izy, mba tsy ho re eny amin''ny tendrombohitry ny Isiraely intsony ny feony.'
mg1865::mg_26::19::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny reninao dia tahaka ny voalobota voavoly teo amoron-drano Tamin''ny andro niadananao*: Vokatra sady nanaroka izy azon''ny rano be, [*Na: Fony tamin''ny rànao ianao; izahao Ezekiela 16:6; na: Eny, tahaka ny tenanao]'
mg1865::mg_26::19::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nisy rantsany mafy azo natao tehim-panjakana ho an''izay manapaka, dia tonga avo izy ka nitehika tamin''ny rahona matevina, ary niseho tamin''ny hahavony izy noho ny hamaroan''ny rantsany.'
mg1865::mg_26::19::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nongotana tamin''ny fahavinirana izy ka nazera ho amin''ny tany, ary ny rivotra avy any atsinanana no nahamaina ny voany; Ny rantsany mafy dia tapaka ka maina; Levon''ny afo ireny.'
mg1865::mg_26::19::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny voavoly any an''efitra, dia ao amin''ny tany maina karankaina izy.'
mg1865::mg_26::19::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary afo no mivoaka avy amin''ny sampany misy tehina ka mandevona ny voany, dia tsy misy rantsany mafy azo atao tehim-panjakana ho fanapahana intsony izy. Hira fahalahelovana izany sady mbola ho hira fahalahelovana ihany.'
mg1865::mg_26::20::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny toetry ny Isiraely hatramin''ny ela, sy ny zavatra hanjo azy, ary ny mbola hampodian''Andriamanitra azy'
  verse_text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahadimy tamin''ny taona fahafito dia nisy tonga ny loholon''ny Isiraely mba hanontany amin''i Jehovah, ka nipetraka teo anatrehako izy.'
mg1865::mg_26::20::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::20::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, mitenena amin''ireo loholon''ny Isiraely, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Moa hanontany amiko va no ihavianareo? Raha velona koa Aho, hoy Jehovah Tompo, dia tsy hety hanontanianareo mihitsy Aho.'
mg1865::mg_26::20::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hotsarainao va izy, ry zanak''olona, tsy hotsarainao va izy? Ampahalalao ny fahavetavetan''ny razany izy.'
mg1865::mg_26::20::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Tamin''ny andro nifidianako ny Isiraely sy ny ananganako tanana tamin''ny taranak''i Jakoba sy nanaovako izay hahafantarany Ahy tany amin''ny tany Egypta raha nanangan-tanana taminy Aho ka nanao hoe: Izaho no Jehovah Andriamanitrareo,'
mg1865::mg_26::20::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''izany andro izany no nananganako tanana taminy hitondra azy hivoaka avy tany amin''ny tany Egypta ho any amin''ny tany notadiaviko ho azy, izay tondra-dronono sy tantely sady tena endriky ny tany rehetra,'
mg1865::mg_26::20::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Izaho taminy: Samia manary ny fahavetavetan''ny masonareo avy ianareo, ary aza mandoto tena amin''ny sampin''i Egypta; Izaho no Jehovah Andriamanitrareo.'
mg1865::mg_26::20::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa niodina tamiko izy ka tsy nety nihaino Ahy; samy tsy nanary ny fahavetavetan''ny masony na nahafoy ny sampin''i Egypta, ka dia hoy Izaho: Haidiko aminy ny fahavinirako, ary hotanterahiko aminy eo amin''ny tany Egypta ny fahatezerako.'
mg1865::mg_26::20::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa niasa noho ny amin''ny anarako Aho, mba tsy handotoana izany eo imason''ny jentilisa izay nitoerany, sady teo imasony no nanaovako izay hahafantarany Ahy tamin''ny nitondrako azy nivoaka avy tany amin''ny tany Egypta.'
mg1865::mg_26::20::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nentiko nivoaka avy tany amin''ny tany Egypta izy ka nentiko ho any an''efitra.'
mg1865::mg_26::20::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomeko azy ny didiko, ary nampahafantariko azy ny fitsipiko, izay mahavelona ny olona manaraka izany.'
mg1865::mg_26::20::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeko azy koa ny Sabatako ho famantarana ho amiko sy ho aminy mba ho fantany fa Izaho Jehovah no manamasina azy.'
mg1865::mg_26::20::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo niodina tamiko tany an''efitra ihany ny taranak''Isiraely, ka tsy nandeha araka ny didiko izy, fa nanamavo ny fitsipiko, izay mahavelona ny olona manaraka izany, ary nandoto dia nandoto ny Sabatako izy, dia hoy Izaho: Haidiko aminy any an''efitra ny fahatezerako hahalany ringana azy.'
mg1865::mg_26::20::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa niasa noho ny amin''ny anarako Aho, mba tsy handotoana izany eo anatrehan''ny jentilisa izay nahita ay nitondrako azy nivoaka.'
mg1865::mg_26::20::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho dia nanangan-tanana taminy tany an''efitra koa fa tsy hitondra azy ho any amin''ny tany efa nomeko azy, izay tondra-dronono sy tantely sady tena endriky ny tany rehetra,'
mg1865::mg_26::20::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria efa nanamavo ny fitsipiko izy ary tsy nandeha araka ny didiko, fa nandoto ny Sabatako; fa ny fony dia nanaraka ny sampiny.'
mg1865::mg_26::20::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa niantra azy ihany ny masoko, ka dia tsy naringako na nolevoniko tany an''efitra izy.'
mg1865::mg_26::20::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izaho tamin''ny zanany tany an''efitra: Aza mandeha araka ny fanaon-drazanareo ianareo, na mitandrina ny fitsipiny, na mandoto tena amin''ny sampiny;'
mg1865::mg_26::20::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izaho no Jehovah Andriamanitrareo; koa mandehana araka ny didiko, ary mitandrema ny fitsipiko, ka araho izany.'
mg1865::mg_26::20::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manamasina sy Sabatako, mba ho famantarana ho amiko sy ho aminareo, ka dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.'
mg1865::mg_26::20::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo niodina tamiko koa ny zanany: tsy nandeha araka ny didiko izy, na nitandrina hanaraka ny fitsipiko, izay mahavelona ny olona manaraka izany, fa nandoto ny Sabatako izy, ka dia hoy Izaho: Haidiko aminy ny fahavinirako. ary hotanterahiko aminy any an''efitra ny fahatezerato.'
mg1865::mg_26::20::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nampihemotra ny tanako Aho, ka dia niasa noho ny amin''ny anarako, mba tsy ho voaloto izany eo anatrehan''ny jentilisa izay nahita ny nitondrako azy nivoaka.'
mg1865::mg_26::20::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanangan-tanana taminy tany an''efitra, indray Aho, hampiely azy any amin''ny jentilisa sy hampihahaka azy any amin''ny tany samy hafa,'
mg1865::mg_26::20::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tsy nanaraka ny fitsipiko izy, fa nanamavo ny didiko sy nandoto ny Sabatako, ary ny masony nanaraka ny sampin''ny razany.'
mg1865::mg_26::20::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeko didy tsy tsara koa izy sy fitsipika izay tsy mahavelona Azy.'
mg1865::mg_26::20::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandoto azy tamin''ny fanatiny Aho, dia tamin''ny nampandehanany ny voalohan-teraka rehetra hamaky ny afo*, hampahatalanjonako azy, mba hahafantarany fa Izaho no Jehovah. [*Na: dia tamin''ny nanokanany ny voalohan-teraka rehetra; izahao Eksodosy 13:12]'
mg1865::mg_26::20::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitenena amin''ny taranak''Isiraely, ry zanak''olona, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Tamin''izao no mbola nanamavoan''ny razanareo Ahy tamin''ny nivadihany tamiko:'
mg1865::mg_26::20::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony nitondra azy ho any amin''ny tany izay nananganako tanana homena azy Aho, dia nahita ny havoana andrandraina rehetra sy ny hazo misandrahaka rehetra izy, ka tao no namonoany zavatra hatao fanatitra, ary tao koa no nametrahany ny fanatiny mahatezitra; tao koa no nanaterany hanitra ankasitrahana, ary tao no nanidinany ny fanatitra aidiny.'
mg1865::mg_26::20::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy Izaho taminy: Ahoana moa ny amin''ny fitoerana avo alehanareo ? Ka dia fitoerana avo no natao anarany mandraka androany.'
mg1865::mg_26::20::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ataovy amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Moa mandoto tena araka ny fanaon*''ny razanareo va ianareo, sy mijangajanga manaraka ny fahavetavetany va, [*Hebreo: lalana]'
mg1865::mg_26::20::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mandoto tena amin''ny sampinareo rehetra mandraka androany va ianareo amin''ny anateranareo ny fanomezanareo sy ny ampandehananareo ny zanakareo hamaky ny afo? Ary Izaho va hety hanontanianareo, ry taranak''Isiraely? Raha velona koa Aho, hoy Jehovah Tompo, tsy hety hanontanianareo mihitsy Aho.'
mg1865::mg_26::20::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ho tanteraka mihitsy ny eritreritry ny fanahinareo hoe: Ho tahaka ny jentilisa izahay, dia tahaka ny firenena amin''ny tany samy hafa, ka hanao fanompoam-pivavahana ho an''ny vato aman-kazo.'
mg1865::mg_26::20::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy Jehovah Tompo, dia tanana mahery sy sandry ahinjitra ary fahatezerana aidina no hanjakako aminareo.'
mg1865::mg_26::20::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny tanana mahery sy ny sandry ahinjitra ary amin''ny fahatezerana aidina no hitondrako anareo mivoaka avy any amin''ny firenena sy hamoriako anareo avy any amin''ny tany izay nampielezana anareo.'
mg1865::mg_26::20::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho entiko ho any an''efitry ny firenena ianareo, ary any no hifandaharako mifanatrika aminareo.'
mg1865::mg_26::20::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny nifandaharako tamin''ny razanareo tany an''efitry ny tany Egypta, dia toy izany koa no hifandaharako aminareo, hoy Jehovah Tompo.'
mg1865::mg_26::20::37:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampandaloviko eo ambanin''ny tehina ianareo ka hampidiriko hofehezin''ny fanekena.'
mg1865::mg_26::20::38:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary havahako hiala aminareo ny mpiodina sy izay manota amiko; eny, ho entiko hiala amin''ny tany ivahiniany ireo, nefa tsy hisy ho tafiditra ao amin''ny tanin''ny Isiraely izy; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::20::39:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny aminareo, ry taranak''Isiraely, izao no lazain''i Jehovah Tompo; Samia mandeha ianareo, ka manompoa ny sampinareo; nefa any aoriana kosa dia hihaino Ahy mihitsy ianareo ka tsy handoto ny anarako masina intsony amin''ny fanatitrareo sy amin''ny sampinareo.'
mg1865::mg_26::20::40:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao an-tendrombohitro masina, dia ao an-tendrombohitra avon''ny Isiraely, hoy Jehovah Tompo, no hanompoan''ny taranak''Isiraely rehetra Ahy, dia izay rehetra amin''ny tany; ao no hankasitrahako azy, ary ao no hilako ny fanatitrareo sy ny voaloham-bokatra aterinareo amin''ny zava-masinareo rehetra,'
mg1865::mg_26::20::41:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 41
  verse_date_revised: '2022-06-12T05:04:14+0000'
  verse_title: null
  verse_text: 'Hankasitrahako toy ny hanitra ankasitrahana ianareo amin''ny hitondrako anareo mivoaka avy any amin''ny firenena sy ny hamoriako anareo avy any amin''ny tany samy hafa nampielezana anareo, ka dia hiseho ho masina eo anatrehan''ny jentilisa Aho amin''ny hataoko aminareo.'
mg1865::mg_26::20::42:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantatrareo fa Izaho no Jehovah, raha mitondra anareo ho any amin''ny tanin''ny Isiraely Aho, dia ny tany izay nananganako tanana nomena ny razanareo.'
mg1865::mg_26::20::43:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hotsaroanareo any ny nalehanareo sy ny nataonareo rehetra izay nahaloto anareo; ary haharikoriko anareo ny tenanareo noho ny ratsy rehetra izay nataonareo.'
mg1865::mg_26::20::44:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 20
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantatrareo fa Izaho no Jehovah, rehefa miasa aminareo Aho noho ny amin''ny anarako, fa tsy araka ny lalàn-dratsinareo, na araka ny ratsy fanaonareo, ry taranak''Isiraely, hoy Jehovah Tompo.'
mg1865::mg_26::21::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana ny amin''ny ala may sy ny sabatra voatsoaka'
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::21::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manatreha ny atsimo, ary mitenena manandrify ny atsimo, ka maminania ny amin''ny hamelezana ny ala amin''ny tany atsimo.'
mg1865::mg_26::21::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''ny ala amin''ny tany atsimo hoe: Henoy ny tenin''i Jehovah: Izao no lazain''i Jehovah Tompo: Indro, hampirehitra afo ao aminao Aho, izay handevona ny hazo maitso sy ny hazo maina rehetra ao aminao; tsy hovonoina ny lelafo midedadeda, fa ho main''ny afo ny tava rehetra hatrany atsimo ka hatrany avaratra;'
mg1865::mg_26::21::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho hitan''ny nofo rehetra fa Izaho Jehovah no nampirehitra io, ka tsy hovonoina.'
mg1865::mg_26::21::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Indrisy, Jehovah Tompo o! Hoy ny fitenin''ny olona ahy: Tsy fanoharana va no ataony?'
mg1865::mg_26::21::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::21::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia an''i Jerosalema, ary mitenena manandrify ny fitoerana masina, ka maminania ny amin''ny hamelezana ny tanin''ny Isiraely.'
mg1865::mg_26::21::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataovy amin''ny tanin''ny Isiraely hoe: Izao no lazain''i Jehovah: Indro, Izaho no mamely anao, ary hotsoahako amin''ny tranony ny sabatro, ka haringako ny marina sy ny meloka eo aminao.'
mg1865::mg_26::21::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny handringanako ny marina sy ny meloka eo aminao, dia izany no hitsoahan''ny sabatro amin''ny tranony hamely ny nofo rehetra hatrany atsimo ka hatrany avaratra,'
mg1865::mg_26::21::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho fantatry ny nofo rehetra fa Izaho Jehovah no nanatsoaka ny sabatro tamin''ny tranony; Tsy hiditra intsony izy.'
mg1865::mg_26::21::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, midridridridria toy ny tapa-balahana, eny, midridridridria amin''ny fangidiana eo imasony.'
mg1865::mg_26::21::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha izy manao aminao hoe: Nahoana ianao no midridridridry? Dia valio hoe: Noho ny teny efa re, fa ho avy izany, ho kivy ny fo rehetra, hiraviravy ny tanana rehetra, ary hivarahontsana ny fanahy rehetra, sady hanjary ho toy ny rano ny lohalika rehetra. Eny, ho avy izany ka ho tanteraka, hoy Jehovah Tompo;'
mg1865::mg_26::21::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: '2022-06-13T08:17:01+0000'
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::21::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, maminania, ka ataovy hoe: Izao no lazain''i Jehovah: Injao! sabatra! sabatra re! Voaranitra sady voafotsy koa.'
mg1865::mg_26::21::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaranitra hahafaty be izy; Voafotsy hanelatselatra izy (Sa isika hifaly hoe: Ny tsorakazon''ny zanako mamingavinga ny hazo rehetra?)'
mg1865::mg_26::21::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomena hofotsiana izy Mba horaisin-tanana; Voaranitra io sabatra io sady voafotsy, Mba hatolotra eo an-tanan''ny mpamono.'
mg1865::mg_26::21::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitomania sy midradradradrà, ry zanak''olona! Fa mihatra amin''ny oloko izany, dia amin''ny lehibe rehetra amin''ny Isiraely; Lavon''ny sabatra miaraka amin''ny oloko izy, koa misafoa sirana ianao;'
mg1865::mg_26::21::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vita ny fizahan-toetra, Ka manao ahoana, raha ilay tehim-panjakana namingavinga iny aza no ho tonga tsinontsinona ? hoy Jehovah Tompo.'
mg1865::mg_26::21::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia maminania, ka mitehafa tanana, ary aoka hihaloza roa heny, na telo heny aza, ny sabatra, dia ny sabatra izay efa nahatrabaka olona; Eny, ny sabatra izay efa nahatrabaka ny andriana* no manemitra azy. [*Hebreo: lehibe]'
mg1865::mg_26::21::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahebihebiko teny amin''ny vavahadiny rehetra ny sabatra, mba hahakivy ny fo sy hahatonga fahatafintohinana maro. Indrisy! nataoko nanelatselatra izy sady voaranitra* hamono. [*Na: voatsoaka]'
mg1865::mg_26::21::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miomana, ka mandrosoa eo ankavanana ianao, mijoroa, ka mandrosoa eo an-kavia, amin''izay voatendry hamelezanao na aiza na aiza.'
mg1865::mg_26::21::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiteha-tanana koa Aho ary hiala fo; Izaho Jehovah no nilaza izany.'
mg1865::mg_26::21::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah hoe:'
mg1865::mg_26::21::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, ry zanak''olona, manaova lalana roa ho anao hihavian''ny sabatry ny mpanjakan''i Babylona; avy amin''ny tany iray no hihavian''izy roa; ka manaova sarin''ny famantaran-dàlana*, eo an-tsampanan-dàlana mankany amin''ny tanàna no anaovinao azy. [*Hebreo: voatsoaka]'
mg1865::mg_26::21::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova lalana hihavian''ny sabatra ho any Raban''ny taranak''i Amona sy ho any ny Joda ao Jerosalema mimanda.'
mg1865::mg_26::21::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjakan''i Babylona mijanona eo amin''ny sampanan-dàlana, dia eo an-dohan''ny lalana roa, mba hanao sikidy; dia manetsiketsika ny zana-tsipïka izy ary manontany amin''ny sampy* sy mizaha amin''ny atin-kena. [*Hebreo: terafima]'
mg1865::mg_26::21::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mby eo an-tanany ankavanana ny sikidy, dia ny ho an''i Jerosalema, mba hametraka lohondry vy fandravana, hisoka-bava hiantsoantso, hanandra-peo amin''ny akoran''ady, hametraka lohondry vy fandravana eo akaikin''ny vavahady, hanandratra tovon-tany sy tilikambo.'
mg1865::mg_26::21::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tahaka ny sikidy lainga izany eo imason''ireny izay efa nianiana mafy*, nefa Jehovah** no mampahatsiaro ny helony mba hisamborana azy. [*Na: izay efa nianianana mafy] [**Hebreo: Izy]'
mg1865::mg_26::21::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Noho ny nampahatsiarovanareo ny helokareo tamin''ny nampiharihariana ny fahadisoanareo mba hampisehoana ny fahotanareo tamin''izay rehetra nataonareo, noho ny nahatsiarovana anareo dia hosamborin-tanana ianareo.'
mg1865::mg_26::21::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry ilay ratsy fanahy voatrabaka, dia ilay mpanjakan''ny Isiraely, izay tapitra andro amin''ny fotoan''ny heloka mahafaty,'
mg1865::mg_26::21::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'izao no lazain''i Jehovah Tompo Hesorina ny hamama, ary halàna ny satro-boninahitra, tsy ho ao intsony ireo; hasandratra ny iva, ary haetry ny avo.'
mg1865::mg_26::21::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Havadiko, havadiko, havadiko izany; fa izany koa aza dia tsy mba haharitra mandra-pahatongan''izay tena tompony tokoa, ka homeko azy izany.'
mg1865::mg_26::21::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia maminania, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Ny amin''ny taranak''i Amona sy ny latsa ataony, dia ataovy hoe: Indro sabatra! Dia sabatra voatsoaka hamono! Voafotsy handringana sy hanelatselatra izy'
mg1865::mg_26::21::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: '(Raha mahita zava-poana ho anao izy sy maminany lainga aminao) Handavoany* anao ao amin''ny vozon''ny ratsy fanahy voatrabaka, Izay tapitra andro amin''ny fotoan''ny heloka mahafaty. [*Hebreo: Hametrahana]'
mg1865::mg_26::21::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampidiro amin''ny tranony izy. Any amin''ny tany namoronana anao, dia any amin''ny tany nahaterahanao, no hitsarako anao.'
mg1865::mg_26::21::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haidiko aminao ny fahavinirako, ny afon''ny fahatezerako no hotsofiko aminao, ka hatolotro eo an-tanan''ny olona ketrina. Sy izay mpamorona fandringanana ianao,'
mg1865::mg_26::21::37:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 21
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho kitain''ny afo ianao; Ho eny amin''ny tany ny rànao; Tsy hotsaroana ianao; Fa Izaho Jehovah no niteny izany.'
mg1865::mg_26::22::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahotan''i Jerosalema sy ny Isiraely'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::22::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, moa tsy hitsara va ianao ? Tsy hitsara ny tanana mpandatsa-drà va ianao ? Ampahafantaro azy ary ny fahavetavetany rehetra,'
mg1865::mg_26::22::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Tanàna mpandatsa-drà ao ampovoany hahatonga ny fotoany sady manao sampy ao aminy hahaloto azy.'
mg1865::mg_26::22::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rà izay nalatsakao no nahameloka anao, ary ny sampy izay nataonao no nahaloto anao; ary efa nampanakaiky ny andronao ianao ka efa tonga amin''ny taonanao, koa izany no nanaovako anao ho fandatsan''ny jentilisa sy ho fanakoran''ny tany rehetra,'
mg1865::mg_26::22::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka na ny akaiky anao na ny lavitra anao dia samy hanakora anao voaloto anarana sy be tabataba.'
mg1865::mg_26::22::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo ny lehiben''ny Isiraely efa samy ao aminao araka ny heriny* avy mba handatsa-drà. [*Hebreo: sandriny]'
mg1865::mg_26::22::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao aminao no anozonana ray aman-dreny; ary ao aminao no anaovana izay sarotra amin''ny vahiny; ary ao aminao no ampahoriana ny kamboty sy ny mpitondratena.'
mg1865::mg_26::22::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamavoinao ny zavatra masina. ary lotoinao ny Sabatako.'
mg1865::mg_26::22::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao aminao misy olona mandehandeha manaratsy mba handatsa-drà; ary ao aminao misy mihinana eny an-tendrombohitra; ao aminao misy manao fahavetavetana.'
mg1865::mg_26::22::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao aminao misy mandry amin-drainy; ao aminao misy misavika izay mararin''ny fadim-bolana.'
mg1865::mg_26::22::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy manao fahavetavetana amin''ny vadin''ny namany; misy manao fahavetavetana mandoto ny vinantovaviny; ary misy misavika ny anabaviny zanakavavin-drainy.'
mg1865::mg_26::22::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao aminao misy mandray kolikoly handatsa-drà; maka zana-bola sy tombony ianao sady manao an-keriny mandroba ny an''ny namanao ka manadino Ahy, hoy Jehovah Tompo.'
mg1865::mg_26::22::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, manjera tanana Aho noho ny harena azonao tamin''ny tsy marina sy ny latsa-drà tao aminao.'
mg1865::mg_26::22::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: '2022-06-16T06:37:12+0000'
  verse_title: null
  verse_text: 'Hahatoha va ny fonao, na hahazaka va ny tananao, amin''ny andro izay hisehoako* aminao? Izaho Jehovah no nilaza sady hahatanteraka izany. [*Hebreo: hanaovako]'
mg1865::mg_26::22::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haeliko ho any amin''ny jentilisa sy hahahako ho any amin''ny tany samy hafa ianao, ary holevoniko ho afaka aminao mihitsy ny fahalotoanao.'
mg1865::mg_26::22::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia ho hitan''ny jentilisa fa ny nataonao ihany no nahaloto anao; ka dia ho fantatrao fa Izaho no Jehovah.'
mg1865::mg_26::22::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah anao hoe:'
mg1865::mg_26::22::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ny taranak''Isiraely dia efa tonga tain-drendrika amiko; izy rehetra dia varahina sy vifotsy sy vy ary firaka ao anatin''ny memy; eny, efa tonga taim-bolafotsy izy.'
mg1865::mg_26::22::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Noho ny nahatongavanareo rehetra ho tain-drendrika, dia, indro, hangoniko ho ao Jerosalema ianareo.'
mg1865::mg_26::22::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny anangonana volafotsy sy varahina sy vy sy firaka ary vifotsy ho ao anatin''ny memy ka misy mifofotra azy amin''ny afo ho rendrika, dia toy izany no hanangonako anareo amin''ny fahatezerako sy ny fahavinirako, ary hataoko ao ianareo ka ho voarendrika;'
mg1865::mg_26::22::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, nangoniko ianareo, dia hifofotra anareo amin''ny afon''ny fahatezerako Aho, ka ho voarendrika ao anatiny ianareo.'
mg1865::mg_26::22::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny andrendrika volafotsy ao anatin''ny memy no handrendrehana anareo ao anatiny; ka dia ho fantatrareo fa Izaho Jehovah no nampidina ny fahatezerako aminareo.'
mg1865::mg_26::22::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::22::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, lazao aminy hoe: Ianao no tany tsy hazavain''ny hainandro* sady tsy ilatsahan''ny ranonorana amin''ny andro fahatezerana. [*Na: tsy voadio]'
mg1865::mg_26::22::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikomy ny mpaminany ao aminy; tahaka ny liona mierona mamiravira haza izy; mihinana olona izy sady mahalasa ny harena sy ny zava-tsoa ary mahamaro ny mpitondratena ao aminy.'
mg1865::mg_26::22::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpisorona dia mandika ny lalàko sy mandoto ny zavatra masina; tsy manavaka ny masina sy ny tsy masina izy, na mampiseho ny tsy fitovian''ny maloto sy ny madio, ary mitampi-maso tsy hijery ny Sabatako izy, ary tsiratsiraina ao aminy Aho.'
mg1865::mg_26::22::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny amboa-dia* mamiravira haza ny lehibeny ao aminy ka mandatsa-drà sy mahafaty aina ary mahazo harena amin''ny tsy marina. [*Na: lopa]'
mg1865::mg_26::22::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpaminaniny mandalotra azy amin''ny feta tsy madity ka mahita zava-poana sy maminany lainga aminy hoe: Izao no lazain''i Jehovah Tompo; nefa Jehovah tsy niteny tsinona.'
mg1865::mg_26::22::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahoaka manao an-keriny sy mandroba ka mampahory ny malahelo sy ny mahantra; ary ny vahiny dia ampahoriny tsy andrariny.'
mg1865::mg_26::22::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitady olona teo aminy Aho hanao manda sy hijanona eo amin''ny banga eo anatrehako hifona ho an''ny tany mba tsy handravako azy, kanjo tsy nahita;'
mg1865::mg_26::22::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa dia haidiko eo aminy ny fahatezerako; ny afon''ny fahatezerako no handaniako azy; ary hatsingeriko ho eo an-dohany ihany ny fanaony*, hoy Jehovah Tompo. [*Hebreo: lalana]'
mg1865::mg_26::23::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana ny amin''Ohola sy Oholiba hampiseho ny nijangajangan''i Samaria sy Jerosalema'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::23::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, nisy vehivavy mirahavavy iray tam-po;'
mg1865::mg_26::23::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nijangajanga tany Egypta izy; fony izy mbola tanora no nijangajanga; tao no nisafosafoana ny tratrany, ary tao no nitsapatsapana ny nonon''ny fahavirijinany.'
mg1865::mg_26::23::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anaran''ny zokiny dia Ohola*, ary ny rahavaviny dia Oholiba**; ary novadiko izy ka niteraka zazalahy sy zazavavy. Ny amin''ny anarany: Samaria no Ohola, ary Jerosalema no Oholiba. [*Ohola = lainy] [**Oholiba = Ny laiko no ao aminy]'
mg1865::mg_26::23::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola vadiko Ohola, dia nijangajanga izy; maimay izy tamin''ireo lehilahiny, dia ny Asyriana mifanolotra aminy,'
mg1865::mg_26::23::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay mitafy mangamanga, dia ny governora sy ny lefiny, tovolahy bikàna izy rehetra sady mpitaingin-tsoavaly.'
mg1865::mg_26::23::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nijangajanga tamin''ireny izy, dia tamin''izay tsara indrindra tamin''ny zanakalahin''i Asyria sy tamin''izay rehetra nahamaimay azy; tamin''ny sampiny rehetra no nandotoany tena.'
mg1865::mg_26::23::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fijangajangana izay fanaony hatrany Egypta dia tsy foiny; fa fony izy mbola tanora dia nandrian''ireny, ary ireny no nitsapatsapa ny tratran''ny fahavirijinany sady nanaram-po nijangajanga taminy.'
mg1865::mg_26::23::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia natolotro ho eo an-tanan''ireo lehilahiny izy, dia eo an-tanan''ny Asyriana izay nahamaimay azy.'
mg1865::mg_26::23::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireny no nampiseho ny fitanjahany; ny zananilahy sy ny zananivavy dia lasan''ireny, ary ny tenany novonoiny tamin''ny sabatra, ka dia tonga ambentinteny tamin''ny vehivavy izy ary efa niharan''ny fitsarana.'
mg1865::mg_26::23::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Oholiba rahavaviny izany, dia vao mainka nataony manoatra noho ny azy indray ny fahamaimaizany, ary ny fijangajangany manoatra noho ny an''ny rahavaviny,'
mg1865::mg_26::23::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maimay tamin''ny Asyriana mifanolotra aminy izy, dia ny governora sy ny lefiny, olona mareva-pitafiana sady mpitaingin-tsoavaly, samy tovolahy bikàna izy rehetra.'
mg1865::mg_26::23::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitako fa efa nandoto ny tenany izy, fa lalana iray ihany no nalehan''izy mirahavavy;'
mg1865::mg_26::23::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mbola nampandrosoiny ihany ny fijangajangany, fa nahita sariolona voasoratra teo amin''ny rindrina izy sy ny sarin''ny Kaldeana voasoratra tamin''ny loko mena.'
mg1865::mg_26::23::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'samy nisy fehin-kibo nifehy teo am-balahany sy hamama voanato nisy rambony teo an-dohany; ny fijery azy rehetra dia toy ny fijery zanak''andriana, dia tahaka ny zanakalahin''i Babylona, izay teraka tany amin''ny tany Kaldea.'
mg1865::mg_26::23::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao hitan''ny masony ireny, dia maimay taminy izy ka naniraka olona ho any aminy tany Kaldea.'
mg1865::mg_26::23::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany aminy ho ao amin''ny fandriam-pitiavana ireny zanakalahin''i Babylona ka nandoto azy tamin''ny fijangajangany; ary nony efa voaloton''ireny izy, dia niombotra niala taminy kosa ny fanahiny.'
mg1865::mg_26::23::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa naneho ny fijangajangany sy nampiseho ny fitanjahany izy, dia niombotra niala taminy ny fanahiko, toy ny efa niombotan''ny fanahiko niala tamin''ny rahavaviny ihany.'
mg1865::mg_26::23::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampitombo ny fijangajangany ihany izy, ka dia nahatsiaro ny andro fahatanorany, izay nijangajangany tany amin''ny tany Egypta.'
mg1865::mg_26::23::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy dia maimay tamin''ireo lehilahiny, izay manana nofo tahaka ny nofom-boriky, ary ny avy aminy dia toy ny avy amin''ny soavaly.'
mg1865::mg_26::23::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitady ny fijangajangan''ny fahatanoranao ianao, dia ilay nitsapatsapan''ny Egyptiana ny nononao, satria nonon''ny fahavirijinanao ireo.'
mg1865::mg_26::23::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao, ry Oholiba, no lazain''i Jehovah Tompo: Indro, hotairiko hamely anao ireny lehilahinao, izay efa niombotan''ny fanahinao, ka ho entiko avy amin''ny tany manodidina izy mba hamely anao,'
mg1865::mg_26::23::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ireny zanakalahin''i Babylona mbamin''ny Kaldeana rehetra, mpanapaka sy manan-jo sy andrian-dahy*, ary ny Asyriana rehetra koa miaraka aminy; tovolahy bikàna izy rehetra, dia ny governora sy ny lefiny, zanak''andriana sy olom-boafidy, sady mpitaingin-tsoavaly avokoa izy rehetra. [*Na: Pekoda sy Soa ary Koa]'
mg1865::mg_26::23::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho avy izy mitondra fiadiana sy kalesy sy kodia mbamin''ny firenena betsaka hamely anao, izay hanisy ampinga lehibe sy ampinga kely sy fiarovan-doha manodidina hamelezana anao, ary hatolotro azy ny fitsarana, ka hitsara anao araka ny fitsarany izy.'
mg1865::mg_26::23::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho entiko hamely anao ny fahasaro-piaroko, ka hamely anao amin''ny fahatezerana ireny: hesoriny ny oronao sy ny sofinao, ary izay sisa aminao dia ho lavon''ny sabatra, ka ho lasan-ko babony ny zanakalahinao sy ny zanakavavinao, ary izay sisa aminao holevonin''ny afo.'
mg1865::mg_26::23::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hendahany ny lambanao, sady hesoriny aminao ny firavakao soa.'
mg1865::mg_26::23::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: '2022-06-13T08:16:40+0000'
  verse_title: null
  verse_text: 'Ary hatsahatro ny fahavetavetanao, dia ny fijangajanganao izay fanaonao hatrany amin''ny tany Egypta, fa tsy handrandrainao aminy intsony ny masonao, sady tsy hotsarovanao intsony Egypta.'
mg1865::mg_26::23::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Indro, hatolotro eo an-tanan''izay halanao ianao, dia eo an-tanan''izay efa niombotan''ny fanahinao;'
mg1865::mg_26::23::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hamely anao amin''ny fankahalana izy, ka hesoriny ny vokatry ny asanao, dia hilaozany mitanjaka sy mihanjahanja ianao, ary hiseho ny fitanjahan''ny fijangajanganao, dia ny fahavetavetanao sy ny fijangajanganao.'
mg1865::mg_26::23::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: '2022-06-13T08:16:42+0000'
  verse_title: null
  verse_text: 'Ho avy aminao izany zavatra izany noho ny nijangajanganao nanaraka ny jentilisa sy noho ny nandotoanao tena tamin''ny sampiny.'
mg1865::mg_26::23::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny nalehan''ny rahavavinao no nalehanao koa, ka dia hataoko eo an-tananao ny kapoakany.'
mg1865::mg_26::23::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Amin''ny kapoaky ny rahavavinao no hisotroanao, dia ilay lalina oty sady lehibe; ho fihomehezana sy ho fanakorana tsy tanty ianao.'
mg1865::mg_26::23::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho feno fahamamoana sy alahelo ianao; kapoaka fahatalanjonana sy fandringanana ny kapoak''i Samaria rahavavinao.'
mg1865::mg_26::23::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hosotroinao sy hotrohinao izy, ary hokikisanao ny vakivakiny sady handriatanao ny nononao; fa Izaho no niteny izany, hoy Jehovah Tompo.'
mg1865::mg_26::23::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Noho ny nanadinoanao Ahy sy ny nanarianao Ahy teo ivohonao, dia mba zakaonao kosa ny fahavetavetanao sy ny fijangajanganao.'
mg1865::mg_26::23::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah niteny tamiko hoe: Ry zanak''olona, tsy hotsarainao va Ohola sy Oholiba? Dia asehoy azy ny fahavetavetany,'
mg1865::mg_26::23::37:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa nijangajanga izy, sady misy rà eny an-tanany, eny, ny sampiny no nijangajangany, ary ny zananilahy naterany ho Ahy dia nampamakiny ny afo ho an''ireny mba ho levona.'
mg1865::mg_26::23::38:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao koa no nataony tamiko: Nandoto ny fitoerako masina izy tamin''izany andro izany sady nandoto ny Sabatako koa.'
mg1865::mg_26::23::39:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa novonoiny ho an''ny sampiny ny zanany, dia nidirany tamin''iny andro iny ihany ny fitoerako masina ka nolotoiny; koa, he! izany no nataony teo anatin''ny tranoko.'
mg1865::mg_26::23::40:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, naniraka ho any amin''ny olona avy lavitra ianao*; eny, nanirahanao ireo, ka, indreo, tonga izay efa nandroanao sy nanosoranao loko mainty ny masonao sy niravahanao. [*Hebreo: ianareo]'
mg1865::mg_26::23::41:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nipetrahanao tamin''ny farafara marevaka, sady nisy latabatra voavelatra teo anoloany, izay nametrahanao ny ditin-kazo manitro sy ny diloiloko.'
mg1865::mg_26::23::42:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo aminy nisy ny feon''ny maro izay mipetraka tsy manana ahiahy, ary afa-tsy ny ankabiazam-bahoaka dia nisy mpiboboka nentina avy tany an''efitra; ary nasian''ireo haba teny an-tanan''izy mirahavavy sy satro-boninahitra tsara tarehy teny an-dohany.'
mg1865::mg_26::23::43:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izaho ny amin''ilay efa tontan''ny fijangajangana ela: Amin''izao dia mbola hisy hijangajanga amin''io ihany va?'
mg1865::mg_26::23::44:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, mbola nankao aminy ihany ny olona toy ny ankanesany ao amin''ny vehivavy janga, dia toy ny efa nankanesany tao amin''i Ohola sy Oholiba, vehivavy janga.'
mg1865::mg_26::23::45:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary olona marina no hitsara azy araka izay fitsara vehivavy mijangajanga sy mandatsa-drà, satria mijangajanga izy, sady misy rà eny an-tanany.'
mg1865::mg_26::23::46:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Ho entiko hamely azy ny olona maro, ka natolotro ho mpanjenjena* sy ho babo izy. [*Na: ho fampangovitana]'
mg1865::mg_26::23::47:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo olona maro ireo dia hitora-bato azy sy hitetitetika azy amin''ny sabatra; hovonoiny ny zananilahy sy ny zananivavy, ary hodorany amin''ny afo koa ny tranony.'
mg1865::mg_26::23::48:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no hampitsaharako ny fahavetavetana amin''ny tany, mba hahazo anatra ny vehivavy rehetra tsy hanao araka ny fahavetavetanareo.'
mg1865::mg_26::23::49:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 23
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsingeriny aminareo ny fahavetavetanareo, ary ho entinareo ny heloka noho ny sampinareo; ka dia ho fantatrareo fa Izaho no Jehovah Tompo.'
mg1865::mg_26::24::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahitana ny amin''ny vilany fahandroana, ary ny tenin''Andriamanitra ny amin''ny hahafatesan''ny vadin''i Ezekiela'
  verse_text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahafolo tamin''ny taona fahasivy dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::24::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, soratinao ny anaran''ny andro, dia izao andro anio izao; ny mpanjakan''i Babylona miantomboka mamely an''i Jerosalema amin''izao andro anio izao.'
mg1865::mg_26::24::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary milazà fanoharana amin''ny taranaka maditra, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Asio vilany eo an-tokoana, eny, ataovy eo an-tokoana, ka asio rano ao anatiny;'
mg1865::mg_26::24::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary arotsahy ao ny vaingambaingany, dia ny vaingambaingany tsara rehetra, na ny feny na ny sorony; fenoy taolana voafantina izy.'
mg1865::mg_26::24::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny ondry voafantina, ka tohofy kitay betsaka ao ambaniny koa hahandroana ny taolana*, dia ampangotrahy tsara izy, ka andrahoy ao ny taolany. [*Na: ka angony eo ambaniny ny taolana]'
mg1865::mg_26::24::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Lozan''ny tanàna mpandatsa-drà sy ny vilany izay misy harafesina tsy mety afaka ao anatiny! Loary tsirairay ny vaingambaingany, fa aza anaovana filokana.'
mg1865::mg_26::24::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ràny dia ao aminy; teo ambonin''ny vatolampy mangadihady no nametrahany azy; tsy naidiny tamin''ny tany hosaronan''ny vovoka izy.'
mg1865::mg_26::24::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hampakatra ny fahatezerana hamaliana azy no nametrahako ny ràny teo ambonin''ny vatolampy mangadihady mba tsy ho voasarona.'
mg1865::mg_26::24::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Lozan''ny tanàna mpandatsa-drà; Izaho koa hamory kitay betsaka.'
mg1865::mg_26::24::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atohofy betsaka ny kitay hazo, ampireheto ny afo, masaho tsara ny hena, ka asio zavatra hahamanitra azy*, ary aoka ho may ny taolana. [*Na: eny, taneho tsara izy]'
mg1865::mg_26::24::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia foàny ny vilany, ka ataovy eo ambonin''ny vainafo hampahafana sy hahamay ny varahiny, ka ho levona eo aminy ny fahalotoany, ary ho afaka ny harafesiny.'
mg1865::mg_26::24::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanasatra dia nanasatra ny tenany izy, nefa tsy nety afaka ny harafesim-beny; aoka ho eo amin''ny afo ny harafesiny.'
mg1865::mg_26::24::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahalotoanao dia misy fahavetavetana; satria nanadio anao Aho, nefa tsy nadio ianao, dia tsy hadio ho afaka amin''ny fahalotoana intsony ianao ambara-pialako fo aminao.'
mg1865::mg_26::24::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Jehovah no niteny, ka ho tonga izany ary hataoko; tsy hiahotrahotra Aho, na hiantra, na hanenina; araka ny fanaonao sy ny asanao no hitsarana anao, hoy Jehovah Tompo.'
mg1865::mg_26::24::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::24::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, indro, efa hesoriko amin''ny loza indray mamely monja ilay tian''ny masonao; nefa aza misaona na mitomany na mandatsa-dranomaso akory ianao.'
mg1865::mg_26::24::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misentoa malemilemy ihany ianao, fa aza mitomany na misaona ny maty; afehezo aminao ny hamamanao, ary asio kiraro ny tongotrao, ary aza manarona ny saokanao na mihinana ny fahan-kanina aterin''olona.'
mg1865::mg_26::24::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina dia niteny tamin''ny olona aho; ary nony hariva dia maty ny vadiko; ary nony maraina indray dia nanao araka ny efa nandidiana ahy aho.'
mg1865::mg_26::24::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny olona tamiko: Moa tsy holazainao aminay va izay hevitra tokony ho azonay amin''izao ataonao izao?'
mg1865::mg_26::24::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho taminy: Tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::24::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Indro, holotoiko ny fitoerako masina, izay reharehan''ny herinareo, dia ilay tian''ny masonareo sy mahamanina ny fanahinareo; ary ho lavon''ny sabatra ny zanakalahinareo sy ny zanakavavinareo, izay nilaozanareo.'
mg1865::mg_26::24::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia manaova tahaka ny nataoko ianareo: aza manarona ny saokanareo ianareo, na mihinana ny fahan-kanina aterin''olona;'
mg1865::mg_26::24::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka ho eo an-dohanareo ny hamamanareo sy ho eo an-tongotrareo ny kiraronareo; aza misaona na mitomany ianareo; fa ho levona noho ny helokareo ianareo ka hifampitoloko.'
mg1865::mg_26::24::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ezekiela dia ho famantarana mahagaga ho anareo; koa araka izay rehetra nataony no mba hataonareo; ary rehefa tonga izany, dia ho fantatrareo fa Izaho no Jehovah Tompo.'
mg1865::mg_26::24::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, amin''ny andro hanesorako aminy ny heriny sy ny fifalian''ny voninahiny, ilay tian''ny masony sy ilay tian''ny fanahiny, dia ny zananilahy sy ny zananivavy,'
mg1865::mg_26::24::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, amin''izany andro izany dia hisy olona handositra ho tonga any aminao mba hampandre ny sofinao izany;'
mg1865::mg_26::24::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: '2022-06-14T07:35:44+0000'
  verse_title: null
  verse_text: 'amin''izany andro izany dia hisokatra miaraka amin''ny an''ilay mandositra ny vavanao, ka dia hiteny ianao, fa tsy ho moana intsony; ary ho famantarana mahagaga aminy ianao; ka dia ho fantany fa Izaho no Jehovah.'
mg1865::mg_26::25::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny firenena mifanila fonenana amin''ny Isiraely, dia ny Amonita, ny Moabita, ny Edomita ary ny Filistina'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::25::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia ny Amonita, ary maminania ny hamelezana azy,'
mg1865::mg_26::25::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy aminy hoe: Mihainoa ny tenin''i Jehovah Tompo: Izao no lazain''i Jehovah Tompo; Noho ny nanaovanao hoe: Hià! sakoa izay! raha nolotoina ny fitoerako masina, Ary noravana ny tanin''ny Isiraely, Sady lasan-ko babo ny taranak''i Joda,'
mg1865::mg_26::25::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia indro kosa, hatolotro ho fananan''ny zanaky ny atsinanana ianao, Ka haoriny ao aminao ny tobiny, ary hataony ao aminao ny fonenany; Ireny no hihinana ny vokatrao sy hisotro ny ronononao.'
mg1865::mg_26::25::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Raba dia hataoko tany fitoeran''ny rameva, ary ny taranak''i Amona ho tany fandrian''ny ondry aman''osy; Ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::25::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Noho ny nitehafanao tanana sy ny nitotoanao tamin''ny tongotrao ary ny nifalian''ny fonao tamin''ny fanaovana tsinontsinona ny tanin''ny Isiraely,'
mg1865::mg_26::25::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, hahinjitro aminao ny tanako, ka hatolotro ho babon''ny jentilisa ianao; Ary hofongorako tsy ho vanon-ko firenena intsony ianao, ka hataoko lany ritra tsy ho amin''ny tany; Eny, haringako ianao, ka dia ho fantatrao fa Izaho no Jehovah.'
mg1865::mg_26::25::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Noho ny nanaovan''i Moaba sy Seàra hoe: Indro, ny taranak''i Joda efa tonga tahaka ny firenena rehetra izao,'
mg1865::mg_26::25::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, hotatahako kosa ny tanin''ny Moaba, hatrany amin''ny tanànany rehetra, izay ravaky ny tany, dia Beti-jesimota sy Bala-meona ary Kiriataima,'
mg1865::mg_26::25::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: '2022-06-14T07:35:32+0000'
  verse_title: null
  verse_text: 'Ho an''ny zanaky ny atsinanana koa tahaka ny taranak''i Amona ihany, eny, hatolotro ho fananan''ireny izy, mba tsy hotsarovana ao amin''ny firenena intsony ny taranak''i Amona.'
mg1865::mg_26::25::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hotanterahiko ny fitsarana an''i Moaba; ka dia ho fantany fa Izaho no Jehovah.'
mg1865::mg_26::25::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Noho ny namelezan''i Edoma ny taranak''i Joda tamin''ny namaliany azy ary ny nanotany indrindra sy ny namaliany azy,'
mg1865::mg_26::25::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Hahinjitro amin''i Edoma ny tanako, ka haringako ny olona sy ny biby ao aminy; Ary hataoko lao hatrany Temana izy sy ho lavon''ny sabatra hatrany Dedana.'
mg1865::mg_26::25::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanan''ny Isiraely oloko no ho entiko mamaly an''i Edoma, ka hanao aminy araka ny fahatezerako sy ny fahavinirako ireo; Ka dia ho fantany ny famaliako, hoy Jehovah Tompo.'
mg1865::mg_26::25::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Noho ny famaliana nataon''ny Filistina, eny, noho ny namaliany ratsy tamin''ny nanaovany tsinontsinona azy, ka nandringana noho ny fandrafiany hatry ny fony ela,'
mg1865::mg_26::25::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Indro, hahinjitro amin''ny Filisitna ny tanako, ka haringako ny keretita, ary horavako izay sisa any amoron-dranomasina;'
mg1865::mg_26::25::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: '2022-06-16T06:37:00+0000'
  verse_title: null
  verse_text: 'Ary famaizana mirehitra no ho entiko manao famaliana lehibe aminy; ka dia ho fantatra fa Izaho no Jehovah, rehefa hataoko mihatra aminy ny famaliako.'
mg1865::mg_26::26::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: '2022-06-16T06:36:44+0000'
  verse_title: 'Faminaniana ny amin''ny handravana an''i Tyro'
  verse_text: 'Ary tamin''ny andro voalohany amin''ny volana tamin''ny taona fahiraika ambin''ny folo dia tonga tamiko ny tenin''Jehovah nanao hoe:'
mg1865::mg_26::26::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, noho ny nandatsan''i Tyro an''i Jerosalema hoe: Hià! sakoa izay! rava ilay vavahadin''ny firenena! Mba hifindra amiko kosa izao, ka ho feno aho, fa izy kosa ho foana,'
mg1865::mg_26::26::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Indro, hamely anao Aho, ry Tyro, ka hampiakatra ny firenena maro hiady aminao, tahaka ny fampiakatry ny ranomasina ny onjany.'
mg1865::mg_26::26::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary horavan''ireo ny mandan''i Tyro, sady harodany ny tilikambony; Dia hofafako hiala aminy ny vovo-taniny, ka hataoko tahaka ny vatolampy mangadihady izy.'
mg1865::mg_26::26::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho famelarana harato eo amin''ny ranomasina izy; Fa Izaho no niteny izany, hoy Jehovah Tompo, ka dia ho babon''ny-firenena izy.'
mg1865::mg_26::26::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zana-bohiny* eny an-tanety dia hovonoina amin''ny sabatra; ka dia ho fantatra fa Izaho no Jehovah. [*Hebreo: zananivavy]'
mg1865::mg_26::26::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Indro, ho entiko avy any avaratra ho any Tyro Nebokadnezara, mpanjakan''i Babylona, andrianan''ny andriana, mitondra soavaly sy kalesy sy mpitaingin-tsoavaly ary vahoaka betsaka.'
mg1865::mg_26::26::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zana-bohitrao* any an-tanety dia hovonoiny amin''ny sabatra; ary hanandratra tilikambo sy tovon-tany sady hanangana ampinga lehibe hamelezany anao izy. [*Hebreo: zanakao-vavy]'
mg1865::mg_26::26::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hametraka lohondry vy fandravana eo akaikin''ny mandanao izy, sady horavany amin''ny fiadiany* ny tilikambonao. [*Hebreo: sabany]'
mg1865::mg_26::26::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho feno ny vovo-taniny ianao noho ny habetsahan''ny soavaliny; hihorohoro ny mandanao noho ny fikorodondrodon''ny mpitaingin-tsoavaly sy ny kodia sy ny kalesy, raha miditra eo amin''ny vavahadinao tahaka ny olona miditra amin''ny tanàna izay voabanga izy.'
mg1865::mg_26::26::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kitron-tsoavaliny no hanitsakitsahany ny lalambenao rehetra; ny olonao dia hovonoiny amin''ny sabatra, ary ny tsangambatonao mafy dia hianjera amin''ny tany.'
mg1865::mg_26::26::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: '2022-06-16T06:36:48+0000'
  verse_title: null
  verse_text: 'Hobaboiny ny harenao, horobainy ny rantonao, harodany ny mandanao, horavany ny tranonao mahafinantra; ary ny vatonao sy ny hazonao sy ny vovokao dia hataony any amin''ny rano.'
mg1865::mg_26::26::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsahatro ny feon''ny hiranao, sady tsy ho re intsony ny fanenon''ny lokanganao.'
mg1865::mg_26::26::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hataoko toy ny vatolampy mangadihady ianao ka ho famelarana harato sady tsy haorina intsony; fa Izaho Jehovah no niteny, hoy Jehovah Tompo.'
mg1865::mg_26::26::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo amin''i Tyro: Tsy hihorohoro va ny moron-dranomasina noho ny fikotrokotroky ny firodananao, raha mitrona ny voatrabaka, ary misy vonoana eo ampovoanao?'
mg1865::mg_26::26::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: '2022-06-16T06:34:08+0000'
  verse_title: null
  verse_text: 'Dia hidina hiala amin''ny seza fiandrianany ireo andrianan''ny ranomasina rehetra ka hiala akanjo sy hanaisotra ny fitafiany misoratsoratra; Hovotra no hitafiany, ka hipetraka amin''ny tany izy; ary hangovitra isaky ny indray mipi-maso izy ka ho gaga anao.'
mg1865::mg_26::26::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanao hira fahalahelovana ny aminao izy ka hanao aminao hoe: Indrisy! rava ianao, ry ilay nonenan''ny avy any an-dranomasina! Dia ilay tanàna malaza izay nahery teo amin''ny ranomasina, dia izy mbamin''ny mponina ao, izay nampahatahotra ny mponina rehetra eo aminy!'
mg1865::mg_26::26::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia raiki-tahotra ny amoron-dranomasina amin''ny andro hianjeranao; Eny, toran-kovitra ny nosy any an-dranomasina noho ny haharavanao.'
mg1865::mg_26::26::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Raha hataoko tanàna lao tahaka ireo tanàna haolo ianao, ary hampiakariko aminao ny rano lalina, ka hosaronan''ny rano be ianao,'
mg1865::mg_26::26::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampidiniko hiaraka amin''izay mivarina any an-davaka ianao, Hankany amin''ny razana, ka hamponeniko any ambanin''ny tany ianao, dia any amin''ny fonenana efa lao hatramin''ny ela, hiaraka amin''izay mivarina any an-davaka, mba tsy honenana intsony; ary hasiako voninahitra eo amin''ny velona;'
mg1865::mg_26::26::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hataoko fampitahorana ianao, ka tsy ho eo intsony; Eny, hotadiavina ianao, nefa tsy ho hita intsony mandrakizay, hoy Jehovah Tompo.'
mg1865::mg_26::27::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny harena amam-boninahitra nananan''i Tyro, sy fitomaniana noho ny manjo azy'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::27::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, ry zanak''olona, manaova hira fahalahelovana ny amin''i Tyro,'
mg1865::mg_26::27::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy aminy hoe: He, ry ilay monina amin''ny vava-ranomasina, Mpandranto ho an''ny firenena ho any ny moron-dranomasina maro samy hafa; Izao no lazain''i Jehovah Tompo: He, ry Tyro, ianao efa nanao hoe: Izaho dia tena tsara tarehy!'
mg1865::mg_26::27::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''ny ranomasina ny taninao, efa tanteraky ny mpandrafitra anao ny hatsaran-tarehinao.'
mg1865::mg_26::27::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hazo kypreso avy any Senira no nanaovany ny lampihazonao; Sedera avy any Libanona no nalainy hatao andrin-tsambonao.'
mg1865::mg_26::27::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Oka avy any Basana no nanaovany ny fivoinao; hazo bokso avy any amin''ny moron-dranomasin''i Kitima no nataony fipetrahan''ny mpivoinao sady nasiany parike ivory.'
mg1865::mg_26::27::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rongony madinika samy hafa soratra avy any Egypta no natao lainao mba ho faneva ho anao; Lamba manga sy volomparasy avy any amin''ny moron-dranomasin''i Elisa no eloelonao.'
mg1865::mg_26::27::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mponina any Sidona sy Arvada no mpivoinao; Ny olon-kendrinao, ry Tyro, no tao aminao, ka ireo no mpitondra sambonao.'
mg1865::mg_26::27::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zokiolon''i Gebala sy izay hendry tany no tao aminao ho mpanentsin-tsambonao; ny sambo rehetra teny amin''ny ranomasina mbamin''ny matilony dia tonga tao aminao hanakalo ny rantonao.'
mg1865::mg_26::27::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny avy any Persia sy ny Lydiana* ary ny Libyana** dia isan''ny miaramila mpiadinao; Nanantona ampinga sy fiarovan-doha teny aminao ireo ka nahatsara tarehy anao. [*Hebreo: Loda] [**Hebreo: Pota]'
mg1865::mg_26::27::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny terak''i Arvada sy ny miaramilanao no teny ambonin''ny mandanao manodidina, ary lehilahy mahery no tao amin''ny tilikambonao; Ny ampingany dia nahantony teny amin''ny mandanao manodidina; Ireo no nahatanteraka ny hatsaran-tarehinao.'
mg1865::mg_26::27::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tarsisy no mpandranto nankany aminao noho ny haben''ny harena samy hafa rehetra; Volafotsy sy vy sy vifotsy ary firaka na nentiny natakalo ny entanao.'
mg1865::mg_26::27::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Javana sy Tobala ary Maseka no mpandranto nankany aminao, ka olona sy fanaka varahina no natakalony ny varotrao.'
mg1865::mg_26::27::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny terak''i Togarma nitondra soavaly sy soavaly fitaingina ary ampondra natakalo ny entanao.'
mg1865::mg_26::27::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny terak''i Dedana no mpandranto nankany aminao; Ny avy amin''ny moron-dranomasina maro no tonga hivarotra tao aminao ka nitondra ivory* sy hazomainty natakalo ny entanao. [*Hebreo: vangy ivory]'
mg1865::mg_26::27::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Syria no mpandranto nankany aminao noho ny habetsahan''ny tao-zavatrao, ka karbonkolo sy lamba volomparasy sy tenona samy hafa soratra sy rongony fotsy madinika sy voahangy ary robina No nentiny natakalo ny entanao.'
mg1865::mg_26::27::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Joda sy ny tanin''ny Isiraely no mpandranto nankany aminao, ka vary tritika avy tany Minita sy zava-mamy sy tantely sy diloilo ary balsama no natakalony ny varotrao.'
mg1865::mg_26::27::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Damaskosy no mpandranto nankany aminao noho ny habetsahan''ny taozavatrao, dia ny haben''ny harenao rehetra, ka nitondra divay avy any Helbona sy volon''ondry fotsy izy.'
mg1865::mg_26::27::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vedana koa sy Javana avy any Ozala dia nitondra vy voatefy* natakalo ny entanao; Kasia sy veromanitra no natakalony ny varotrao**. [*Na: vy mamirapiratra] [**Na: Vedana sy Javana nitondra folo hatakalo ny varotrao; vy voatefy sy kasia ary veromanitra no isian''ny varotrao]'
mg1865::mg_26::27::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dedana no mpandranto nankany aminao, nitondra lamba fanao lamban-tsoavaly.'
mg1865::mg_26::27::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arabia sy ireo andriandahin''i Kedara rehetra no nandranto tany aminao, ka zanak''ondry sy ondrilahy ary osilahy no nentiny natao varotra tao aminao.'
mg1865::mg_26::27::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpandranto avy any Sheba sy Rama no mpandranto nankany aminao, Ka zava-manitra tsara indrindra sy vato soa samy hafa karazana ary volamena no nentiny natakalo ny entanao.'
mg1865::mg_26::27::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Harana sy Kane ary Edena sy mpandranto avy any Sheba sy Asyria ary Kilmada no mpandranto nankany aminao.'
mg1865::mg_26::27::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no mpandranto nankany aminao nitondra ny fitafiana marevaka rehetra, dia kapoty manga sy samy hafa soratra ary vata sedera mifehy* misy fitafiana soa no natakalony ny varotrao. [*Na: vata mifehy mafy]'
mg1865::mg_26::27::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sambon''i Tarsisy no mpitondra ny entanao, dia feno sady be voninahitra ianao teo amin''ny ranomasina.'
mg1865::mg_26::27::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nentin''ny mpivoinao teny amin''ny rano be ianao, dia nahavaky anao tao amin''ny ranomasina ny rivotra avy any atsinanana.'
mg1865::mg_26::27::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harenao sy ny vidin''entanao, ny varotrao, ny matilonao sy ny mpitondra sambonao, ny mpanentsin-tsambonao sy ny mpividy ny entanao ary ny miaramilanao rehetra izay tao aminao mbamin''ny olona betsaka tafangona tao aminao dia nilentika tao amin''ny ranomasina tamin''ny andro nandravana anao.'
mg1865::mg_26::27::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fidradradradran''ny mpitondra sambonao dia mihorohoro ny tany manodidina.'
mg1865::mg_26::27::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy midina miala amin''ny sambony ny mpivoy rehetra sy ny matilo ary ny mpitondra sambo rehetra eny an-dranomasina ka mijanona eny an-tanety;'
mg1865::mg_26::27::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manandratra ny feony noho ny nanjo anao izy ka midradradradra mafy* sady manopy vovoka hiraraka amin''ny lohany ary mihosinkosin-davenona; [*Hebreo: mangidy]'
mg1865::mg_26::27::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mibory loha avokoa izy noho ny aminao sy misikina lamba fisaonana ary mitomany anao amin''ny fangidiam-panahy izy, dia fisaonana mafy.'
mg1865::mg_26::27::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha midradradradra izy, dia manao hira fahalahelovana ny aminao ka mitomany anao hoe: Iza moa no tahaka an''i Tyro, dia tahaka ilay rava ao ampovoan''ny ranomasina ?'
mg1865::mg_26::27::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nivoaka avy amin''ny ranomasina ny varotrao, dia nahatretrika firenena maro ianao; Tamin''ny haben''ny harenao sy ny varotrao dia nampanan-karena ny mpanjakan''ny tany ianao.'
mg1865::mg_26::27::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro nandravan''ny ranomasina anao ho any amin''ny rano lalina dia niara-nilentika taminao ny varotrao sy ny olona tafangona tao aminao.'
mg1865::mg_26::27::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Talanjona anao ny mponina rehetra amin''ny moron-dranomasina, ary raiki-tahotra ny mpanjakany ka dia mivalomainty.'
mg1865::mg_26::27::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 27
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misitrisitra anao ny mpandranto amin''ny firenena; tonga fampitahorana ianao ary tsy ho ao intsony mandrakizay'
mg1865::mg_26::28::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''ny mpanjakan''i Tyro;'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe;'
mg1865::mg_26::28::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, lazao amin''ny mpanjakan''i Tyro hoe: Izao no lazain''i Jehovah Tompo: Satria miavonavona ny fonao. ka hoy ianao: Mba Andriamanitra koa aho; eto amin''ny anankiray amin''ny fipetrahan''Andriamanitra no ipetrahako, dia eto ampovoan''ny ranomasina. Nefa olona ihany ianao, fa tsy Andriamanitra tsinona, Na dia nataonao toy ny fon''Andriamanitra aza ny fonao,'
mg1865::mg_26::28::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hay! hendry noho Daniela ianao! Tsy misy zava-miafina azo afenina anao izany!'
mg1865::mg_26::28::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: '2022-06-16T06:33:32+0000'
  verse_title: null
  verse_text: 'Ny fahendrenao sy ny fahalalanao no nahazoanao harena. Eny, izany no nahazoanao volamena sy volafotsy ho ao amin''ny rakitrao'
mg1865::mg_26::28::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny haben''ny fahendrenao tamin''ny varotrao no nampitomboanao ny harenao, ka dia miavonavona ny fonao noho ny harenao;'
mg1865::mg_26::28::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, izao no lazain''i Jehovah Tompo: Satria efa nataonao ho toy ny fon''Andriamanitra ny fonao,'
mg1865::mg_26::28::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, hitondra olona hafa firenena Aho hamely anao, dia izay masiaka indrindra amin''ny firenena, Ka hotsoahany ny sabany hamelezany ny fahendrenao tsara, ary hataony matroka ny famirapiratanao'
mg1865::mg_26::28::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Havariny ho any an-davaka ianao, ka ho faty toy ny fahafatesan''izay voatrabaka ao amin''ny ranomasina.'
mg1865::mg_26::28::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa mbola hitompo teny fantatra va ianao eo imason''izay mamono anao hoe mba Andriamanitra koa aho? Nefa olona ihany ianao, fa tsy Andriamanitra tsinona, raha mby eo an-tanan''izay manatrabaka anao'
mg1865::mg_26::28::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fahafatesan''ny tsy voafora no hahafatesan''ny fahavalo anao; Fa Izaho no niteny izany, hoy Jehovah Tompo.'
mg1865::mg_26::28::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::28::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manaova hira fahalahelovana ny amin''ny mpanjakan''i Tyro, ka lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Ry ilay mahatanteraka* ny rafitra tsara tarehy tonga marika sady feno fahendrena no tena tsara tarehy, [*Hebreo: manisy tombon-kase]'
mg1865::mg_26::28::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany Edena, sahan''Andriamanitra, ianao; Ny vato soa rehetra ny eloelo teo amboninao, dia ny karneola, ny topaza, ny onyksa, ny krysolita, ny beryla, ny jaspy, ny safira, ny robina, ny emeralda ary ny volamena; Ny fampanenoana ny ampongatapakao sy ny sodinao* dia tao aminao, tamin''ny andro namoronana anao dia natao koa ireo. [*Na: vehivavy]'
mg1865::mg_26::28::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao dia kerobima voahosotra izay manaloka, fa voatendriko ianao; Tao an-tendrombohitra masin''Andriamanitra ianao; Tao amin''ny vato mirehitra no nitsangantsangananao.'
mg1865::mg_26::28::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nanan-tsiny ianao tamin''ny nalehanao hatramin''ny andro namoronana anao ka mandra-pahita heloka tao aminao.'
mg1865::mg_26::28::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny habetsahan''ny varotra nataonao dia nofenoina loza tao aminao, ka nanota ianao; Ary dia nolotoiko ka nariako niala tamin''ny tendrombohitr''Andriamanitra ianao, Ary nosimbako ianao, ry kerobima manaloka, hiala tao amin''ny vato mirehitra.'
mg1865::mg_26::28::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niavonavona ny fonao noho ny hatsaran-tarehinao; Efa nahasimba ny fahendrenao mbamin''ny famirapiratanao ianao; Nazerako eny an-tany ianao sady natolotro ho fitalanjonan''ireo mpanjaka,'
mg1865::mg_26::28::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny haben''ny helokao tamin''ny tsy fahamarinan''ny varotrao, dia voalotonao ny fitoeranao masina; Koa izany no hamoahako afo avy ao aminao handevona anao, ary hataoko tonga lavenona eny ambonin''ny tany ianao eo imason''izay rehetra mijery anao.'
mg1865::mg_26::28::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenena rehetra izay mahalala anao dia ho gaga anao; Ho tonga fampitahorana ianao ary tsy ho ao intsony mandrakizay.'
mg1865::mg_26::28::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Faminaniana ny amin''i Sidona, sy fanomezan-toky ny Isiraely'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::28::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia an''i Sidona, dia maminania ny hamelezana azy,'
mg1865::mg_26::28::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, efa hamely anao Aho, ry Sidona, ary hankalazaina ao ampovoanao Aho; Ka dia ho fantatra fa Izaho no Jehovah, raha manatanteraka ny fitsarana azy Aho ka miseho ho masina amin''ny ataoko aminy.'
mg1865::mg_26::28::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hahatonga areti-mandringana hamely azy Aho ary rà ho eny an-dalambeny; Dia hiampatrampatra eny aminy ny voatrabaky ny sabatra izay mamely avy eny manodidina eny; Ka dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::28::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hisy roy mampangirifiry na tsilo mampanaintaina intsony ho an''ny taranak''Isiraely, avy amin''ireo manodidina azy, izay manao tsinontsinona azy; Ka dia ho fantatra fa Izaho no Jehovah Tompo.'
mg1865::mg_26::28::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Raha angoniko avy any amin''ny firenena izay nampielezana azy ny taranak''Isiraely, dia hiseho ho masina eo imason''ny firenena Aho amin''ny ataoko aminy, ka honina any amin''ny taniny izay nomeko an''i Jakoba mpanompoko izy.'
mg1865::mg_26::28::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handry fahizay any izy ka hanorina trano sy hanao tanim-boaloboka; eny, handry fahizay izy amin''ny anatanterahako ny fitsarana ireo rehetra manodidina azy izay manao tsinontsinona azy; ka dia ho fantatra fa Izaho no Jehovah Andriamaniny.'
mg1865::mg_26::29::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hamaliana an''i Farao sy ny vahoakany ary ny taniny'
  verse_text: 'Tamin''ny andro faharoa ambin''ny folo tamin''ny volana fahafolo tamin''ny taona fahafolo dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::29::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia an''i Farao, mpanjakan''i Egypta, ka maminania ny hamelezana azy mbamin''i Egypta rehetra.'
mg1865::mg_26::29::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitenena, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, avy hamely anao Aho, ry Farao, mpanjakan''i Egypta, ilay dragona* makadiry mamitsaka ao amin''ny Neiliny, dia ilay efa nanao hoe: Ahy ny Neiliko, fa izaho no namorona azy ho an''ny tenako. [*Na: mamba]'
mg1865::mg_26::29::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hasiako farango ny valanoranonao, sady hampiraiketiko amin''ny kiranao ny hazandrano ao amin''ny Neilinao, dia hampiakariko avy eo afovoan''ny Neilinao ianao, ary ny hazandrano rehetra amin''ny Neilinao dia hiraikitra amin''ny kiranao.'
mg1865::mg_26::29::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hariako any an''efitra ianao, dia ianao sy ny hazandrano rehetra avy amin''ny Neilinao; hitsitsitra eny an-tanety ianao ka tsy hovorina na hangonina; Efa nomeko hohanin''ny bibi-dia sy ny voro-manidina ianao.'
mg1865::mg_26::29::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho fantatry ny mponina rehetra any Egypta fa Izaho no Jehovah, satria efa tehina volotara ho an''ny taranak''Isiraely izy.'
mg1865::mg_26::29::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: '(Nony mandray anao amin''ny tanany izy, dia folaka ianao, ka voatsindronao ny helik''izy rehetra; Ary nony mitehina aminao izy, dia tapaka ianao ka mampilefidefitra ny valahan''izy rehetra.)'
mg1865::mg_26::29::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Indro, hahatonga sabatra hamely anao Aho, ka hofongorako tsy ho aminao ny olona sy ny biby.'
mg1865::mg_26::29::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany Egypta ho rava sy lao; Ka dia ho fantatra fa Izaho no Jehovah. Satria hoy izy: Ahy Neily, ary izaho no nanao azy,'
mg1865::mg_26::29::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, avy hamely anao sy ny Neilinao Aho, ary ny tany Egypta hataoko lao tokoa, eny, sady ho lao no ho rava, hatrany Migdola ka hatrany Syena, dia hatramin''ny sisin''i Etiopia.'
mg1865::mg_26::29::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hodiavin-tongotr''olona ny tany, ary ny tongo-biby aza tsy handia azy, sady tsy honenana efa-polo taona izy.'
mg1865::mg_26::29::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko tany rava dia rava* ny tany Egypta, ary ho lao dia ho lao** efa-polo taona ny tanànany; Eny, haeliko ho any amin''ny firenena samy hafa ny Egyptiana, ary hahahako any amin''ny tany samy hafa. [**Hebreo: rava ao amin''ny tany rava] [**Hebreo: lao amin''ny tanàna lao]'
mg1865::mg_26::29::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Rehefa afaka efa-polo taona, dia hangoniko avy any amin''ny firenena izay nielezany ny Egyptiana:'
mg1865::mg_26::29::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haveriko avy amin''ny fahababoany izy, ka hampodiko any amin''ny tany Patrosa, tany nihaviany, izy; Ary ho fanjakana ambany Egypta;'
mg1865::mg_26::29::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho ambany noho ny fanjakana hafa izy ka tsy hisandratra ambonin''ny firenena hafa intsony; Fa hohakeleziko izy ka tsy hampanompo ny firenena intsony.'
mg1865::mg_26::29::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy ho tokin''ny taranak''Isiraely intsony izy ho fampahatsiarovana ny helony amin''ny andehanan''ireo hanaraka azy; Ka dia ho fantatra fa Izaho no Jehovah Tompo.'
mg1865::mg_26::29::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny babo azon''i Nebokadnezara tany Egypta ho karaman''ny miaramilany noho ny fahasasarany tany Tyro'
  verse_text: 'Ary tamin''ny andro voalohany tamin''ny volana voalohany tamin''ny taona fahafito amby roa-polo dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::29::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, mafy ny fanompoana izay nampanaovin''i Nebokadnezara, mpanjakan''1 Babylona, ny miaramilany tamin''ny namelezany an''i Tyro, ka efa samy tonga sola avokoa ny lohany, sady niendaka ny sorony, nefa tsy nahazo karama avy tany Tyro izy sy ny miaramilany noho ny fanompoana izay nataony tamin''ny namelezany azy.'
mg1865::mg_26::29::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Indro, homeko an''i Nebokadnezara, mpanjakan''i Babylona, ny tany Egypta, dia halainy ny hareny, ary hobaboiny izay hita ao, ka hataony sambotra izay azo ao, koa izany no ho karaman''ny miaramilany.'
mg1865::mg_26::29::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho valin''ny fanompoana nataony tany Tyro no nanomezako azy ny tany Egypta, satria nataony ho Ahy izany, hoy Jehovah Tompo.'
mg1865::mg_26::29::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hampitsimoka tandroka ho an''ny taranak''Isiraely Aho, ary hampiloahiko vava eo aminy ianao; ka dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::30::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny andro hitsarana an''i Egypta'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::30::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, maminania, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Midradradradrà ianareo! Indrisy ny andro!'
mg1865::mg_26::30::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa antomotra ny andro, eny, antomotra ny andron''i Jehovah, dia andro mandrahona sy fotoana hamaliana ny jentilisa izany.'
mg1865::mg_26::30::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy sabatra tonga any Egypta sy fangorohoroana fatratra any Etiopia, raha miampatrampatra any Egypta ny voatrabaka; Ary ho lasa ny hareny, sady ho rava ny fanorenany.'
mg1865::mg_26::30::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Etiopia sy Libya* sy Lydia** sy ny olona samy hafa firenena rehetra sy ny Kobiana sy ny zanaky ny tany vita fanekena dia hiaraka ho lavon-tsabatra aminy. [*Hebreo: Pota] [**Hebreo: Loda]'
mg1865::mg_26::30::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Ho lavo koa izay manohana an''i Egypta, ary hietry ny fiavonavonan''ny heriny; Hatrany Migdola ka hatrany Syena no ho lavon-tsabatra izy, hoy Jehovah Tompo.'
mg1865::mg_26::30::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho rava dia ho rava* izy, ary ny tanànany ho lao dia ho lao**. [*Hebreo: rava ao amin''ny tany rava] [**Hebreo: lao ao amin''ny tanàna lao]'
mg1865::mg_26::30::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho fantatra fa Izaho no Jehovah, raha mampirehitra afo any Egypta Aho, ka torotoro izay rehetra manampy azy.'
mg1865::mg_26::30::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hisy iraka mivoaka avy amiko handeha an-tsambo hampahatahotra ny Etiopiana izay mitoetra tsy manahinahy, ka dia hangorohoro tahaka ny tamin''ny andro namelezana an''i Egypta izy; Fa, indro, avy izany.'
mg1865::mg_26::30::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Ny tanan''i Nebokadnezara, mpanjakan''i Babylona, no ho entiko mahafoana ny horakorak*''i Egypta. [*Na: mandevona ny hareny]'
mg1865::mg_26::30::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin''ny firenena, no ho entina handrava ny tany; Ary hanatsoaka ny sabany hamely an''i Egypta ireny, ka ho feno faty ny tany.'
mg1865::mg_26::30::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatankina an''i Neily sy hivarotra ny tany ho eo an-tanan''ny ratsy fanahy Aho, ary ny tanan''ny fahavalo no ho entiko mandrava ny tany mbamin''izay rehetra ao aminy; Izaho Jehovah no niteny izany.'
mg1865::mg_26::30::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Horavako koa ny sampy, ary hatsahatro ny andriamani-tsy izy ao Memfisa*; ary tsy hisy mpanjaka intsony amin''ny tany Egypta; [*Hebreo: Nofa]'
mg1865::mg_26::30::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handrava an''i Patrosa Aho sy hampirehitra afo any Zoana, ary hotanterahiko ny fitsarana an''i No;'
mg1865::mg_26::30::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampidina ny fahatezerako amin''i Sina, fiarovana mafy any Egypta, Aho, ary hofongorako ny vahoaka be any No.'
mg1865::mg_26::30::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampirehitra afo any Egypta Aho; Hiolanolana fatratra Sina noho ny faharariany; Ho banga No, ary Memifisa* dia hasian''ny fahavalo antoandro. [*Hebreo: Nofa]'
mg1865::mg_26::30::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zatovon''i Avena sy Pi-beseta ho lavon-tsabatra, sady ho lasan-ko babo ny ao.'
mg1865::mg_26::30::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any Tapanesa dia ho maizina ny andro, raha tapahiko any ny ziogan''i Egypta, ary hitsahatra ny fiavonavonan''ny heriny; Ho voasaron''ny rahona izy, sady ho lasan-ko babo ny zananivavy.'
mg1865::mg_26::30::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no hanatanterahako ny fitsarana an''i Egypta; Ka dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::30::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny hahafoanan''i Nebokadnezara ny herin''Farao'
  verse_text: 'Ary tamin''ny andro fahafito tamin''ny volana voalohany tamin''ny taona fahiraika ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::30::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ny sandrin''i Farao, mpanjakan''i Egypta, dia efa notorotoroiko, ary he! tsy noharatoina mba ho sitrana izy, na nofehezina lamba, mba hanatanjaka azy hahatan-tsabatra.'
mg1865::mg_26::30::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nanaovan''i Jehovah Tompo hoe: Indro, efa hamely an''i Farao, mpanjakan''i Egypta, Aho, ka hotorotoroiko ny sandriny, na ny mbola matanjaka, na ny efa torotoro; Ary hampilatsaka ny sabatra eny an-tanany Aho.'
mg1865::mg_26::30::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haeliko ho any amin''ny firenena samy hafa ny Egyptiana, ka hahahako any amin''ny tany samy hafa.'
mg1865::mg_26::30::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hampahatanjahiko kosa ny sandrin''ny mpanjakan''i Babylona, ka hataoko eny an-tanany ny sabatro; Fa hotorotoroiko ny sandrin''i Farao, dia hitrona eo anatrehany toy ny fitronan''ny voatrabaka izy.'
mg1865::mg_26::30::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hampahatanjahiko ny sandrin''ny mpanjakan''i Babylona, dia hiraviravy ny sandrin''i Farao: Ka dia ho fantatra fa Izaho no Jehovah, raha hataoko eny an-tanan''ny mpanjakan''i Babylona ny sabatro, ka haingainy hamelezana ny tany Egypta.'
mg1865::mg_26::30::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haeliko ho any amin''ny firenena samy hafa ny Egyptiana ka hahahako any amin''ny tany samy hafa; Ka dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::31::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanetrena an''i Asyria atao fananarana an''i Egypta'
  verse_text: 'Ary tamin''ny andro voalohany tamin''ny volana fahatelo tamin''ny taona fahiraika ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::31::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ataovy amin''i Farao, mpanjakan''i Egypta, sy amin''ny vahoakany maro be hoe: Tahaka an''iza moa ianao amin''ny fahalehibiazanao ?'
mg1865::mg_26::31::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Asyria dia sedera tsara rantsana any Libanona ary misandrahaka manalokaloka sady mijoroaka avo, ka mitehika amin''ny rahona matevina ny tendrony.'
mg1865::mg_26::31::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rano no nahalehibe azy, eny, ny rano lalina no nampijoroaka azy, ary ny ranovelona no nandeha manodidina ny tany nambolena azy ka nampandeha ny lakan-dranony hankamin''ny hazo rehetra any an-tsaha.'
mg1865::mg_26::31::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nijoroaka ho avo noho ny hazo rehetra any an-tsaha izy, ary nihamaro ny sampany sady nihalava ny rantsany noho ny habetsahan''ny rano tamin''ny fisandrahany.'
mg1865::mg_26::31::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny sampany no nanaovan''ny voro-manidina rehetra akany; Ary teo ambanin''ny rantsany no niterahan''ny bibi-dia rehetra; Sady teo amin''ny alokalony no nitoeran''ny firenena malaza rehetra.'
mg1865::mg_26::31::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsara tarehy tamin''ny fahalehibiazany sy ny halavan''ny sampany izy; Fa tany amin''ny rano maro ny fakany.'
mg1865::mg_26::31::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nahatakona azy ny sedera tao amin''ny sahan''Andriamanitra; Tsy mba nahatoraka ny sampany ny hazo kypreso, tsy mba nanana rantsana tahaka azy ny hazo platana; Ary tsy nisy tsara tarehy tahaka azy ny hazo rehetra tany amin''ny sahan''Andriamanitra.'
mg1865::mg_26::31::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nohatsaraiko tamin''ny haben''ny rantsany ny tarehiny; Ka dia nialona azy ny hazo rehetra tany Edena, dia ireo tany amin''ny sahan''Andriamanitra.'
mg1865::mg_26::31::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nanaovan''i Jehovah Tompo hoe: Satria nijoroaka avo izy* ka nanandratra ny lohany teo amin''ny rahona matevina, ary nirehareha ny fony noho ny hahavony, [*Hebreo: ianao]'
mg1865::mg_26::31::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatolotro eo an-tanan''ilay mahery amin''ny firenena izy; Hamely azy tokoa io; Noho ny faharatsiany no nandroahako azy.'
mg1865::mg_26::31::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay fahavalo masiaka indrindra amin''ny firenena no nanapaka azy sady nanary azy; Teny an-tendrombohitra sy teny amin''ny lohasaha rehetra no nihahafan''ny sampany, ary notapatapahina teny amoron''ny ony rehetra amin''ny tany ny rantsany; Ary nidina niala tamin''ny alokalony ny firenena rehetra ka nahafoy avy.'
mg1865::mg_26::31::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipetraka eo amin''ny vatany nianjera ny voro-manidina rehetra, ary eny amin''ny sampany ny bibi-dia rehetra,'
mg1865::mg_26::31::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba tsy hisy hiavonavona intsony noho ny hahavony ny hazo rehetra eny amoron''ny rano, na hanandratra ny lohany ho eo amin''ny rahona matevina, sady tsy hisy hitoky amin''ny hahavony intsony ny hazo mifo-drano rehetra; Fa voatolotra ho faty izy rehetra ho any ambanin''ny tany, ho ao amin''ny zanak''olombelona, dia any amin''izay midina any an-davaka.'
mg1865::mg_26::31::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Tamin''ny andro nidinany ho any amin''ny fiainan-tsy hita* dia nampanao fisaonana Aho: Nanarona ny rano lalina noho ny aminy Aho sady nanampina ny ony avy aminy, ka dia najanona ny rano maro; Nampisaoniko Libanona noho ny aminy, ka nalazo noho izany ny hazo rehetra tany an-tsaha. [*Hebreo: sheola]'
mg1865::mg_26::31::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny fiezinezin''ny fianjerany dia nampihorohoroiko ny firenena, raha nampidiniko ho any amin''ny fiainan-tsy hita* izy, ho naman''izay midina any an-davaka; Ary ny hazo rehetra any Edena, dia ny nojobonina sady soa indrindra any Libanona, dia izay mifo-drano rehetra, samy nampionona ny tenany any ambanin''ny tany, [*Hebreo: sheola]'
mg1865::mg_26::31::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo koa dia niara-nidina taminy ho any amin''ny fiainan-tsy hita*, ho any amin''izay voatrabaky ny sabatra, mbamin''ireo izay efa sandriny teo, ka nipetraka teo ambanin''ny alokalony teo amin''ny firenena. [*Hebreo: sheola]'
mg1865::mg_26::31::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka an''iza amin''ny hazo any Edena moa ianao amin''izao voninahitra sy fahalebiazana izao? Hampidinina ho any ambanin''ny tany miaraka amin''ny hazo any Edena ianao; Eo amin''ny tsy voafora no hiamparanao, dia eo amin''izay voa-trabaky ny sabatra. Farao sy ny vahoakany maro be rehetra izany, hoy Jehovah Tompo.'
mg1865::mg_26::32::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitomaniana noho ny nanjo an''i Farao sy ny vahoakany'
  verse_text: 'Ary tamin''ny andro voalohany tamin''ny volana faharoa ambin''ny folo tamin''ny taona faharoa ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::32::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manaova hira fahalahelovana ny amin''i Farao, mpanjakan''i Egypta, ka ataovy aminy hoe: Nanao ny tenanao ho tahaka ny liona tanora tamin''ny firenena ianao, kanjo tahaka ny dragona* ao anatin''ny rano be; Ary nitsoriaka teny amin''ny oninao ianao dia nanakobankobana ny rano tamin''ny tongotrao ka nahaloto ny ony. [*Na: mamba]'
mg1865::mg_26::32::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Ny firenena betsaka tafatambatra no ho entiko mamelatra ny haratoko aminao, ary hakarin''ireny amin''ny haratoko ianao,'
mg1865::mg_26::32::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hatsipiko eny an-tanety ianao ary hariako any an-tsaha, dia hampitangoroniko eo aminao ny voro-manidina rehetra, ary homeko hivokisan''ny bibi-dia rehetra ny tenanao.'
mg1865::mg_26::32::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haeliko eny an-tendrombohitra ny nofonao, ary hofenoiko ny tenabenao* ny lohasaha. [*Hebreo: hahavonao]'
mg1865::mg_26::32::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko safotry ny rànao ny tany Hatramin''ny tendrombohitra aza; Ary ho feno anao ny ony.'
mg1865::mg_26::32::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hovonoiko ny fahazavanao, dia hosaronako ny lanitra: Hotafiako lamba fisaonana ny kintany; Ny masoandro hotakonako rahona, ary ny volana tsy hangarangarana.'
mg1865::mg_26::32::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ireny fanazavana eny amin''ny lanitra ireny dia hotafiako lamba fisaonana avokoa noho ny aminao, ary hosaronako aizina ny taninao, hoy Jehovah Tompo.'
mg1865::mg_26::32::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko mitebiteby koa ny fon''ny firenena maro, raha hampandrenesiko ny firenena maro ny naharavanao, dia any amin''ny tany izay tsy fantatrao'
mg1865::mg_26::32::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hataoko talanjona anao ny firenena maro, Ary hipararetra noho ny aminao ny mpanjakany, raha hantsodiko eo imasony ny sabatro, ary samy hangovitra lalandava izy amin''ny fanahiany ny ainy, raha mby amin''ny andro haharavanao.'
mg1865::mg_26::32::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Ny sabatry ny mpanjakan''i Babylona dia ho tonga aminao.'
mg1865::mg_26::32::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sabatry ny mahery, izay samy masiaka indrindra amin''ny firenena, ho entiko mandavo ny vahoakanao maro be, dia horavany ny reharehan''i Egypta, ka ho fongotra ny vahoakany maro be rehetra.'
mg1865::mg_26::32::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haringako koa ny biby fiompiny rehetra eny amoron''ny rano maro, ary tsy hanakobankobana azy intsony ny tongotry ny olona, na handoto azy ny kitron''ny biby fiompy.'
mg1865::mg_26::32::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hahenako* ny ranony, ary hampandehaniko toy ny diloilo ny oniny, hoy Jehovah Tompo, [*Na: hampandriko hadio]'
mg1865::mg_26::32::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hataoko lao ny tany Egypta, ka hofoanako tsy hisy na inona na inona izay nahafeno azy teo; Ary haringako ny monina rehetra ao aminy, dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::32::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no hira fahalahelovana hataon''ny olona; Ny zanakavavin''ny firenena no hihira izany; Eny, ho fahalahelovana an''i Egypta sy ny vahoakany maro be rehetra no hihirany izany, hoy Jehovah Tompo.'
mg1865::mg_26::32::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahadimy ambin''ny folo tamin''ny volana tamin''ny taona faharoa ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::32::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, isaony ny vahoaka maroben''i Egypta, ary ampidino izy mbamin''ny zanakavavin''ny firenena malaza ho any ambanin''ny tany, miaraka amin''izay midina any an-davaka.'
mg1865::mg_26::32::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihoatra noho ny an''iza moa ny hatsaran-tarehinao? Midina, ka miampara* amin''izay tsy voafora. [*Hebreo: mandria]'
mg1865::mg_26::32::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any amin''ny voatrabaky ny sabatra no hiampatramparany; Ny sabatra dia efa voatolotra; Tariho izy mbamin''ny vahoakany maro be rehetra.'
mg1865::mg_26::32::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy sy ny nanampy azy no resahin''ireo malaza amin''ny lehilahy mahery any amin''ny fiainan-tsy hita* manao hoe: Tafidina ka miampatra ny tsy voafora, dia ireo voatrabaky ny sabatra. [*Hebreo: Sheola]'
mg1865::mg_26::32::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao koa Asyria mbamin''ny vahoakany maro be rehetra; Manodidina azy ny fasany; Voatrabaka izy rehetra, samy lavon''ny sabatra;'
mg1865::mg_26::32::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa natao any am-paravodi-lavaka ny fasany, ary ny vahoakany maro be dia manodidina ny fasany; Voatrabaka izy rehetra, samy lavon''ny sabatra, dia ireo izay nahatonga tahotra tany amin''ny tanin''ny velona.'
mg1865::mg_26::32::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao koa Elama mbamin''ny vahoakany maro be rehetra manodidina ny fasany; Voatrabaka izy rehetra, samy lavon''ny sabatra, ka tafidina tsy voafora ho any ambanin''ny tany, dia ireo nahatonga ny fahatahorana azy tany amin''ny tanin''ny velona, ary samy mitondra henatra miaraka amin''izay midina any an-davaka.'
mg1865::mg_26::32::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny voatrabaka no nanaovana fandriana ho azy mbamin''ny vahoakany maro be rehetra; Manodidina azy ny fasany, izy rehetra samy tsy voafora sady voatrabaky ny sabatra, fa efa niely tany amin''ny tanin''ny velona ny fahatahorana azy, ary samy mitondra henatra miaraka amin''izay midina any an-davaka izy; Ao amin''ny voa-trabaka no nametrahany azy.'
mg1865::mg_26::32::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao koa Meseka-tobala mbamin''ny vahoakany maro be rehetra; Manodidina azy ny fasany; Samy tsy voafora izy rehetra sady voatrabaky ny sabatra, satria nahatonga ny fahatahorana azy tany amin''ny tanin''ny velona izy.'
mg1865::mg_26::32::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hiara-miampatra* amin''ny lehilahy mahery izay lavo isan''ny tsy voafora izy, dia ireo tafidina any amin''ny fiainan-tsy hita** ka mitondra ny fiadiany, sady voapetraka eo ambanin''ny lohany ny sabany. Ary ao amin''ny taolany ny helony, satria nampahatahotra ny mahery tany amin''ny tanin''ny velona izy. [*Hebreo: mandry] [**Hebreo: Sheola]'
mg1865::mg_26::32::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ianao dia haripaka ao amin''ny tsy voafora ka hiara-miampatra* amin''ny voatrabaky ny sabatra. [*Hebreo: mandry]'
mg1865::mg_26::32::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao koa Edoma mbamin''ny mpanjakany sy ny mpanapaka rehetra tao aminy, Izay natao ao amin''ny voatrabaky ny sabatra, na dia be aza ny heriny, miara-miampatra* amin''ny tsy voafora izy sy amin''izay midina any an-davaka. [*Hebreo: mandry]'
mg1865::mg_26::32::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao koa ireo andrianan''ny avaratra rehetra sy ny Sidoniana rehetra, izay niara-nidina tamin''ny voatrabaka menatra izy, na dia efa natahorana noho ny heriny aza, ary miampatra* tsy voafora ao amin''izay voatrabaky ny sabatra izy ka mitondra henatra ao amin''izay midina any an-davaka. [*Hebreo: mandry]'
mg1865::mg_26::32::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 31
  verse_date_revised: '2022-06-19T09:27:11+0000'
  verse_title: null
  verse_text: 'Ireny dia ho hitan''i Farao, ka dia hionona izy ny amin''ny vahoakany maro be. Voatrabaky ny sabatra i Farao mbamin''ny miaramilany rehetra, hoy Jeehovah Tompo.'
mg1865::mg_26::32::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 32
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nahatonga ny fahatahorana azy* tany amin''ny tanin''ny velona Aho; Ary Farao dia halevina** ao amin''ny tsy voafora, Miaraka amin''ireo voatrabaky ny sabatra, dia Farao mbamin''ny vahoakany maro be rehetra, hoy Jehovah Tompo. [*Na: Ahy] [**Hebreo: hampandrian]'
mg1865::mg_26::33::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananterana ny nanendrena an''i Ezekiela ho mpaminany'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::33::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, mitenena amin''ny zanaky ny firenenao, ka lazao aminy hoe: Raha mahatonga sabatra amin''ny tany anankiray Aho, ary ny tompon-tany maka lehilahy anankiray ao aminy ka manendry azy ho mpitily,'
mg1865::mg_26::33::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hitan-dralehilahy fa, indro, avy ny sabatra, ka mitsoka ny anjomara hampitaitra* ny olona izy, [*Hebreo: hananatra]'
mg1865::mg_26::33::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: '2022-06-19T09:26:00+0000'
  verse_title: null
  verse_text: 'nefa tsy mety taitra izay mandre ny feon''ny anjomara, dia tonga ny sabatra ka mandripaka azy, dia ho eo an-dohany ihany ny ràny.'
mg1865::mg_26::33::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandre ny feon''ny anjomara ihany izy, nefa tsy nety taitra*; ho ao aminy ihany ny ràny; fa raha nety taitra izy, dia ho nahavonjy ny ainy ihany. [*Hebreo: tsy nino anatra]'
mg1865::mg_26::33::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hitan''ilay mpitily kosa fa, indro, avy ny sabatra, nefa tsy nitsoka ny anjomara izy, ka tsy notairina ny olona, ary tonga ny sabatra ka mandringana olona ao aminy, dia matin''ny helony ihany iny; nefa ny ràny dia hadiniko amin''ny tanan''ilay mpitily.'
mg1865::mg_26::33::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ianao, ry zanak''olona, dia efa notendreko ho mpitily ho an''ny taranak''Isiraely, ka raha mandre ny teny aloaky ny vavako ianao, dia izany no ho entinao mananatra azy.'
mg1865::mg_26::33::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy Izaho amin''ny ratsy fanahy: He! ry ilay ratsy fanahy, ho faty tokoa ianao! nefa tsy mety mananatra azy ianao hiala amin''ny alehany, dia ho fatin''ny helony ihany izany ratsy fanahy izany, fa ny ràny dia hadiniko amin''ny tananao.'
mg1865::mg_26::33::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mananatra ny ratsy fanahy ihany kosa ianao hiala amin''ny lalany ratsy; fa izy no tsy mety miala amin''izany, dia ho fatin''ny helony ihany izy, nefa voavonjinao ny ainao.'
mg1865::mg_26::33::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, mitenena amin''ny taranak''Isiraely hoe: Izao no fiteninareo: Eto aminay ny fahadisoanay sy ny fahotanay, ka mihalevona amin''izany izahay, dia nahoana no mbola velona izahay?'
mg1865::mg_26::33::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao aminy hoe: Raha velona koa Aho, hoy Jehovah Tompo, dia tsy sitrako ny hahafatesan''ny ratsy fanahy, fa ny hialan''ny ratsy fanahy amin''ny lalany, mba ho velona izy. Mialà, mialà amin''ny lalan-dratsinareo, fa nahoana moa no te-ho faty ianareo, ry taranak''Isiraely?'
mg1865::mg_26::33::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: '2022-06-19T09:25:54+0000'
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona lazao amin''ny zanaky ny firenenao hoe: Ny fahamarinan''ny marina tsy hahavonjy azy, raha mby amin''ny andro ahadisoany; ary ny faharatsian''ny ratsy fanahy tsy hahavoa azy, raha mby amin''ny andro ialany amin''ny faharatsiany; ary ny marina tsy ho velona noho ny fahamarinany, raha mby amin''ny andro anotany.'
mg1865::mg_26::33::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha lazaiko amin''ny marina hoe: Ho velona tokoa ianao*, nefa izy mitoky amin''ny fahamarinany ka manao meloka, dia tsy hotsarovana ny fahamarinana rehetra izay nataony, fa ny heloka nataony no hahafaty azy. [*Hebreo: izy]'
mg1865::mg_26::33::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, raha hoy Izaho kosa amin''ny ratsy fanahy: Ho faty tokoa ianao*, nefa miala amin''ny fahotany izy sady manao izay marina sy mahitsy. [*Hebreo: izy]'
mg1865::mg_26::33::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka mamerina ny natao tsatòka sady mampody izay nangalariny ary mandeha araka ny didy mahavelona ka tsy manao meloka, dia ho velona tokoa izy, fa tsy ho faty.'
mg1865::mg_26::33::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahotana rehetra izay nataony dia tsy hotsarovana aminy intsony; manao izay marina sy mahitsy izy, ka dia ho velona tokoa.'
mg1865::mg_26::33::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, hoy ny zanaky ny firenenao: Tsy marina ny fitondran*''ny Tompo; nefa ny fitondran*''ny tenany no tsy marina. [*Hebreo: lalan'']'
mg1865::mg_26::33::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny marina miala amin''ny fahamarinany ka manao meloka, dia ho faty amin''izany izy.'
mg1865::mg_26::33::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny ratsy fanahy miala amin''ny faharatsiany ka manao izay marina sy mahitsy, dia ho velona amin''izany izy.'
mg1865::mg_26::33::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, hoy ianareo: Tsy marina ny fitondran*''ny Tompo. He! ry taranak''Isiraely, samy hotsaraiko araka ny alehany avy ianareo. [*Hebreo: lalan'']'
mg1865::mg_26::33::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nisokafan''ny vavan''i Ezekiela taorian''ny nandravana an''i Jerosalema haminany izay mbola hanjo ny Isiraely noho ny tsy fibebahany'
  verse_text: 'Ary nony tamin''ny andro fahadimy tamin''ny volana fahafolo tamin''ny taona faharoa ambin''ny folo taorian''ny namaboana antsika, dia nisy olona efa nandositra avy tany Jerosalema tonga tao amiko ka nanao hoe: Afaka ny tanàna.'
mg1865::mg_26::33::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia efa tonga tamiko ny tanan''i Jehovah tamin''ny omaly harivan''ny andro nahatongavan''ilay nandositra izay tonga tao amiko, ka nosokafany ny vavako mandra-pahatongan''ilay nandositra, izay tonga tao amiko nony maraina; dia efa nisokatra ny vavako, ka tsy moana intsony aho.'
mg1865::mg_26::33::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::33::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 24
  verse_date_revised: '2022-06-19T09:25:41+0000'
  verse_title: null
  verse_text: 'Ry zanak''olona, ny monina amin''ireny rava amin''ny tanin''ny Isiraely ireny dia manao hoe: Irery ihany Abrahama, nefa nandova ny tany izy, fa isika kosa dia maro, ary omena antsika ny tany ho lovantsika'
mg1865::mg_26::33::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Homan-javatra misy rà sady miandrandra ny sampinareo ianareo ary mandatsa-drà, moa hahazo handova ny tany va ianareo?'
mg1865::mg_26::33::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitoky amin''ny sabatrareo ianareo sady manao fahavetavetana, ka samy mandoto ny vadin''ny namany avy; koa hahazo handova ny tany va ianareo?'
mg1865::mg_26::33::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no holazainao aminy: Izao no lazain''i Jehovah Tompo: Raha velona koa Aho, dia tsy maintsy ho lavon''ny sabatra izay ao amin''ny tanàna rava, ary izay any an-tsaha dia homeko ho rembin''ny bibi-dia, ary izay ao amin''ny harambato* sy amin''ny lava-tany dia ho fatin''ny areti-mandringana. [*Hebreo: fiarovana]'
mg1865::mg_26::33::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hataoko rava sy lao ny tany, ary hitsahatra ny fiavonavonan''ny heriny; ho lao ny tendrombohitry ny Isiraely, ka tsy hisy mpandia azy.'
mg1865::mg_26::33::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantany fa Izaho no Jehovah, raha hataoko rava sy lao ny tany noho ny fahavetavetana nataony.'
mg1865::mg_26::33::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, ny zanaky ny firenenao dia miresaka anao eny am-bodirindrina sy eo am-baravaran''ny tranony, ka samy manao amin''ny rahalahiny hoe: Andeha isika, ary aoka handre izay teny avy amin''i Jehovah.'
mg1865::mg_26::33::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mankao aminao tahaka ny fihavin''ny olona izy ka mipetraka eo anatrehanao toa oloko ary mahare ny teninao, nefa tsy mety mankatò azy; fa, indro, teny mamy no lazain''ny vavany*, nefa ny fony dia lasa manaraka ny filan-karena. [*Na: izay mamy am-bavany no lazainy; na: kalokalo no ataon''ny vavany]'
mg1865::mg_26::33::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, ianao dia ataony ho tahaka ny mpanao hira mahafinaritra*, izay tsara feo sady mahay mitendry; fa mandre ny teninao izy, nefa tsy mety mankatò azy. [*Na: kalokalo]'
mg1865::mg_26::33::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 33
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tanteraka izany (indro, efa ho tanteraka ihany), dia ho fantany fa efa nisy mpaminany tokoa tao aminy.'
mg1865::mg_26::34::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpiandry ondry ratsy fanahy, sy ny mbola hanangonana ny ondry, ary ny hanendrena mpiandry tsara hiandry azy'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::34::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, maminania ny hamelezana ny mpiandry ny Isiraely, eny, maminania, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Lozan''ny mpiandry ondrin''ny Isiraely izay mamahan-tena! Moa tsy ny ondry va no tokony handrasan''ny mpiandry?'
mg1865::mg_26::34::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taviny dia haninareo, ary ny volony tafinareo, ny nafahy vonoinareo; nefa ny ondry tsy mba andrasanareo.'
mg1865::mg_26::34::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manatanjaka ny malemy ianareo, na manasitrana ny marary, na manamatra ny folaka, na mampody ny noroahina, na mikatsaka ny very; fa loza loatra ny fampanomponareo azy.'
mg1865::mg_26::34::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia miely izy, satria tsy misy mpiandry; ary rehefa miely izy, dia tonga rembin''ny bibidia rehetra.'
mg1865::mg_26::34::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mirenireny eny an-tendrombohitra sy eny amin''ny havoana andrandraina rehetra ny ondriko; eny, any amin''ny tany rehetra no ielezan''ny ondriko, ary tsy misy mitady na miahy azy.'
mg1865::mg_26::34::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ny tenin''i Jehovah ianareo, ry mpiandry ondry:'
mg1865::mg_26::34::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velona koa Aho, hoy Jehovah Tompo, noho ny nahababoan''ny ondriko sy ny nahatongavan''ny ondriko ho rembin''ny bibi-dia rehetra, satria tsy nisy mpiandry azy, fa tsy nitady ny ondriko ny mpiandry, fa ny mamahan-tena kosa no ataony, ka tsy namahana ny ondriko,'
mg1865::mg_26::34::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mihainoa ny tenin''i Jehovah ianareo, ry mpiandry ondry.'
mg1865::mg_26::34::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Indro, avy hamely ny mpiandry ondry Aho, dia hampamoahiko ny amin''ny ondriko izy ka hesoriko tsy hiandry ny ondry intsony; dia tsy hamahan-tena intsony ny mpiandry ondry, fa hovonjeko eo amin''ny vavany ny ondriko mba tsy ho azony hohanina intsony.'
mg1865::mg_26::34::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazain''i Jehovah Tompo: Indro, Izaho, eny, Izaho no hiahy ny ondriko sy handinidinika azy.'
mg1865::mg_26::34::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny fandinidiniko ny mpiandry ny ondriny amin''izay andro hahatratrarany ny ondriny izay efa niely, dia toy izany no handinidinihako ny ondriko sy hamonjeko azy avy any amin''izay rehetra efa nielezany tamin''ny andro mandrahona sy maizim-pito.'
mg1865::mg_26::34::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho entiko mivoaka avy any amin''ny firenena izy ka hangoniko avy any amin''ny tany samy hafa, dia ho entiko ho any amin''ny taniny sy handrasako eny an-tendrombohitry ny Isiraely sy eny an-dohasahan-driaka izy ary eny amin''izay tsara honenana rehetra eran''ny tany.'
mg1865::mg_26::34::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny amin''ny tany tsara ho fiandrasana no hiandrasako azy, ary eny an-tendrombohitra avon''ny Isiraely no ho tany hiandrasana azy; ao no handriany amin''ny tany tsara, ary eny amin''ny fiandrasana tsara ahitra* no hihinanany, dia any an-tendrombohitry ny Isiraely. [*Hebreo: matavy]'
mg1865::mg_26::34::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no hiandry ny ondriko, ary Izaho no hampandry azy, hoy Jehovah Tompo.'
mg1865::mg_26::34::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny very hotadiaviko, ny voaroaka hampodiko, ny folaka hohamarako, ny malemy hohatanjahiko; fa ny matavy sy ny matanjaka kosa dia haringako ka handrasako amin''ny fitsarana.'
mg1865::mg_26::34::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny aminareo, ry ondriko, izao no lazain''i Jehovah Tompo: Indro, hotsaraiko ny adin''ny ondry aman''osy, dia ny ady ataon''ny ondrilahy sy ny osilahy namany aminy.'
mg1865::mg_26::34::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ataonareo ho zavatra kely va ny nandanianareo ny ahitra tsara, no dia nohosihosen''ny tongotrareo ny ahitrareo sisa, ary ny efa nisotroanareo ny rano madio, no dia nolotoin''ny tongotrareo ny sisa?'
mg1865::mg_26::34::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny ondriko, moa izay voahosihosin''ny tongotrareo va no hohaniny, ary izay voaloton''ny tongotrareo va no hosotroiny?'
mg1865::mg_26::34::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo aminy: Indro, Izaho, eny, Izaho no hitsara ny adin''ny ondry matavy amin''ny ondry mahia.'
mg1865::mg_26::34::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria ny tehezanareo sy ny sorokareo no entinareo manosika ny marary rehetra, ary ny tandrokareo no entinareo manoto azy mandra-pandronjinareo azy ho any ivelany;'
mg1865::mg_26::34::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: '2022-11-10T12:33:48+0000'
  verse_title: null
  verse_text: 'dia hovonjeko ny ondriko, ary tsy ho babo intsony izy, ary hotsaraiko ny adin''ny ondry amin''ny ondry namany.'
mg1865::mg_26::34::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanangana Mpiandry iray ho azy Aho, Izy no hiandry azy, dia Davida Mpanompoko, ka Izy no hitondra azy sy ho Mpiandry azy.'
mg1865::mg_26::34::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho Jehovah no ho Andriamaniny, ary Davida Mpanompoko no ho Mpanapaka ao aminy. Izaho Jehovah no niteny izany.'
mg1865::mg_26::34::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanao fanekem-pihavanana aminy Aho ka hampiala ny biby masiaka tsy ho eo amin''ny tany intsony, dia handry fahizay izy na dia any an''efitra aza, sady hatory na dia any anaty ala aza.'
mg1865::mg_26::34::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 26
  verse_date_revised: '2022-09-26T05:29:22+0000'
  verse_title: null
  verse_text: 'Ary izy sy ny manodidina ny havoanako dia hataoko fitahiana, ary hampilatsaka ranonorana amin''ny fotoany Aho, dia ranonoram-pitahiana mivatravatra.'
mg1865::mg_26::34::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamoa ny hazo any an-tsaha, sady hahavokatra ny tany, ary handry fahizay amin''ny tany izy; ka dia ho fantany fa Izaho no Jehovah, raha hotapahiko ny ziogany, ary hovonjeko amin''ny tanan''izay nampanompo azy izy.'
mg1865::mg_26::34::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ho babon''ny jentilisa na ho rembin''ny bibi-dia intsony izy, fa handry fahizay, ary tsy hisy hanaitaitra azy.'
mg1865::mg_26::34::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampaniry voly ho laza ho azy Aho, ka tsy ho ritry ny mosary amin''ny tany intsony izy, na hitondra ny latsan''ny jentilisa intsony;'
mg1865::mg_26::34::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia ho fantany fa Izaho, Jehovah Andriamaniny, no momba azy, ary izy, taranak''Isiraely, no oloko, hoy Jehovah Tompo.'
mg1865::mg_26::34::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 34
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny aminareo ondriko ondry fiandriko olona ianareo, ary Izaho no Andriamanitrareo, hoy Jehovah Tompo.'
mg1865::mg_26::35::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handravana an''i Edoma noho ny nandrafiany ny Isiraely'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::35::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia ny tendrombohitra Seàra, ka maminania ny hamelezana azy,'
mg1865::mg_26::35::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Indro, avy hamely anao Aho, ry tendrombohitra Seàra, ary hahinjitro aminao ny tanako, ka hataoko foana sy lao ianao.'
mg1865::mg_26::35::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanànanao hataoko korontam-bato, ary ianao ho lao; Ka dia ho fantatrao fa Izaho no Jehovah.'
mg1865::mg_26::35::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fandrafianao hatry ny fony ela sy ny nanoloranao ny zanak''Isiraely ho fatin*''ny sabatra, fony tamin''ny andro nahitany loza, dia ny fotoan''ny heloka mahafaty, [*Hebreo: ho eo an-tanan'']'
mg1865::mg_26::35::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah: Raha velona koa Aho, dia hataoko manjary rà ianao, ary rà no hanenjika anao; Satria tsy nankahalainao ny rà, dia rà kosa no hanenjika anao.'
mg1865::mg_26::35::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko foana sy lao ny tendrombohitra Seàra, sady hataoko tsy misy intsony ny mandroso sy ny miverina,'
mg1865::mg_26::35::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofenoiko ny olony voavono ny tendrombohiny; Eny, ao amin''ny havoananao sy ny lohasahanao Ary amoron''ny lohasahan-driakanao rehetra no hiampatramparan''izay voatrabaky ny sabatra.'
mg1865::mg_26::35::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko rava mandrakizay ianao, ary tsy honenana intsony ny tanànanao; Ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::35::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny nanaovanao hoe: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa, Ka hanana azy izahay kanefa teo ihany Jehovah'
mg1865::mg_26::35::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah: Raha velona koa Aho, dia hanao araka ny fahatezeranao sy ny fialonanao Aho, izay nataonao noho ny fandrafianao azy; Ary hampahafantariko ao aminy ny tenako amin''ny hitsarako anao.'
mg1865::mg_26::35::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho fantatrao fa Izaho Jehovah no efa nandre ny fanaratsiana, izay nolazainao ny amin''ireny tendrombohitry ny Isiraely hoe: Foana ireny ka nomena anay ho fivelomanay.'
mg1865::mg_26::35::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: '2022-06-19T09:23:52+0000'
  verse_title: null
  verse_text: 'Ary nanao teny miavonavona namely Ahy ianareo sy nanamaro ny teninareo namely Ahy; efa reko izany.'
mg1865::mg_26::35::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Rehefa mifaly ny tany rehetra, dia hofoanako kosa ianao,'
mg1865::mg_26::35::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nifalianao ny amin''ny lovan''ny taranak''Isiraely, satria nofoanana ireny, dia toy izany kosa no hataoko aminao: Ho foana ianao, ry tendrombohitra Seàra sy Edoma rehetra; Ka dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::36::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hitahian''i Jehovah ny tanin''ny Isiraely'
  verse_text: 'Ary ianao, ry zanak''olona, maminania amin''ny tendrombohitry ny Isiraely, ka ataovy hoe: Ry tendrombohitry ny Isiraely, mihainoa ny tenin''i Jehovah:'
mg1865::mg_26::36::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Noho ny nanaovan''ny fahavalo anareo hoe: Hià! efa lasanay ny havoana fahagola!'
mg1865::mg_26::36::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia maminania, ka lazao hoe: Izao no lazain''i Jehovah Tompo: Noho ny nandravany anareo sy ny nisafoahany nanenjika anareo avy amin''ny tany manodidina, ka dia efa lasan''ny jentilisa sisa ho fananany ianareo, sady efa nataon''ny molotry ny mpibedibedy fitenenana ka efa ambentinteny amin''ny firenena,'
mg1865::mg_26::36::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mihainoa ny tenin''i Jehovah Tompo, ry tendrombohitry ny Isiraely: Izao no lazain''i Jehovah Tompo amin''ny tendrombohitra sy ny havoana, ny lohasahan-driaka sy ny lohasaha ary amin''ny korontam-bato sy ny tanàna haolo, izay efa babo sy fandatsa ho an''ny firenena sisa amin''ny manodidina,'
mg1865::mg_26::36::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izao no lazain''i Jehovah Tompo: Tamin''ny afon''ny fahasaro-piaroko no nitenenako tokoa Namely ny firenena sisa sy Edoma rehetra, Izay nahalasa ny taniko ho fananany Tamin''ny hafalian''ny fony tokoa sy tamin''ny fanahy mamingavinga, mba hangoronany azy ho babo.'
mg1865::mg_26::36::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maminania ny amin''ny tanin''ny Isiraely, ka lazao amin''ny tendrombohitra sy ny havoana ary ny lohasahan-driaka sy ny lohasaha hoe: Izao no lazain''i Jehovah Tompo: (Indro, tamin''ny fahasaro-piaroko sy ny fahatezerako no nitenenako): Noho ny nitondranareo latsa tamin''ny firenena,'
mg1865::mg_26::36::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no lazain''i Jehovah Tompo: Izaho efa nanangan-tanana nanao hoe; Ny firenena manodidina anareo no hitondra henatra.'
mg1865::mg_26::36::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa, ry tendrombohitry ny Isiraely, dia hisandrahaka sy hahavokatra ho an''ny Isiraely oloko; Fa efa antomotra ny hihavian''ireny.'
mg1865::mg_26::36::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, hitodika ho aminareo Aho ka hanatrika anareo; Dia hasaina sy hofafazana ianareo;'
mg1865::mg_26::36::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hahamaro ny olona eny aminareo Aho, dia ny taranak''Isiraely rehetra rehetra, ary honenana ny tanàna, ka haorina indray ny efa rava;'
mg1865::mg_26::36::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampitombo olona sy biby fiompy eny aminareo Aho, ka hitombo sy hiteraka ireo; Hametrahako mponina tahaka ny taloha any aminareo, ary hanisy soa anareo mihoatra noho ny tamin''ny niandohanareo Aho; Ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::36::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hampivoivoy olona eny aminareo Aho, dia ny Isiraely oloko; Dia hanana anareo* izy ka hahalasa anareo* ho lovany, ary tsy hahalany fara azy intsony ianareo**. [*Hebreo: anao] [**Hebreo: ianao]'
mg1865::mg_26::36::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Noho ny nanaovany taminareo hoe: Ianao, ry tany, dia mandany olona, Sady mahalany fara ny firenenao,'
mg1865::mg_26::36::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy handany olona intsony ianao, na hahalavo ny firenenao intsony, hoy Jehovah Tompo.'
mg1865::mg_26::36::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko tsy mahare ny latsan''ny jentilisa intsony ianao Sady tsy hitondra ny fanaratsian''olona intsony; Ary tsy hahalavo ny firenenao intsony ianao, hoy Jehovah Tompo.'
mg1865::mg_26::36::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny fifampiankinan''ny famonjena ny Isiraely sy ny fahamasinany'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::36::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, ny taranak''Isiraely nonina tany amin''ny taniny, dia nandoto izany tamin''ny fanaony* sy tamin''ny asany izy; fa tahaka ny fahalotoan''ny vehivavy mararin''ny fadim-bolana no fahalotoan''ny fanaony* eo anatrehako. [*Hebreo: lalany]'
mg1865::mg_26::36::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia naidiko ho aminy ny fahatezerako mirehitra noho ny rà nalatsany teo amin''ny tany sy noho ny nandotoany izany tamin''ny sampiny.'
mg1865::mg_26::36::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naeliko ho any amin''ny firenena izy ka nahahaka ho any amin''ny tany samy hafa; araka ny fanaony* sy ny asany no nitsarako azy. [*Hebreo: lalany]'
mg1865::mg_26::36::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany amin''ny firenena izay nalehany izy, dia tonga fandotoana ny anarako masina tamin''ny nanaovan''ny olona azy hoe: Ireo no olon''i Jehovah, nefa niala tamin''ny tanin''i Jehovah izy.'
mg1865::mg_26::36::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namindrako fo ny anarako masina, izay nolotoin''ny taranak''Isiraely tany amin''ny firenena izay nalehany.'
mg1865::mg_26::36::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ataovy amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Tsy noho ny aminareo no anaovako izany, ry taranak''Isiraely, fa noho ny anarako, masina, izay nolotoinareo tany amin''ny jentilisa izay nalehanareo.'
mg1865::mg_26::36::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hohamasiniko ny anarako lehibe izay efa nolotoinareo tany amin''ny jentilisa, ka dia ho fantany fa Izaho no Jehovah, hoy Jehovah Tompo, rehefa miseho ho masina eo imasony Aho amin''ny ataoko aminareo.'
mg1865::mg_26::36::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa halaiko avy any amin''ny jentilisa ianareo ary hangoniko avy any amin''ny tany rehetra ka ho entiko ho any amin''ny taninareo.'
mg1865::mg_26::36::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hofafazako rano madio ianareo, ka hadio; ny mba ho afaka amin''ny fahalotoanareo rehetra sy ny sampinareo rehetra no hanadiovako anareo.'
mg1865::mg_26::36::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homeko fo vaovao ianareo, ary fanahy vaovao no hataoko ao anatinareo, ary hesoriko amin''ny nofonareo ny fo vato, ka homeko fo nofo ianareo.'
mg1865::mg_26::36::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fanahiko no hataoko ao anatinareo, ka hahatonga anareo handeha araka ny lalàko sy hitandrina ny fitsipiko ka hanaraka azy.'
mg1865::mg_26::36::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary honina any amin''ny tany izay nomeko ny razanareo ianareo, ka ho oloko ianareo, ary Izaho ho Andriamanitrareo.'
mg1865::mg_26::36::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovonjeko ho afaka amin''ny fahalotoanareo rehetra ianareo, ary hantsoiko sy hataoko vokatra ny vary, ary tsy hanaterako mosary intsony ianareo;'
mg1865::mg_26::36::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hataoko vokatra koa ny voankazo sy ny vokatry ny saha, mba tsy ho voalatsan''ny jentilisa amin''ny mosary intsony ianareo.'
mg1865::mg_26::36::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotsarovanareo ny lalan-dratsinareo sy ny fanao tsy metinareo, ka dia haharikoriko anareo ny tenanareo noho ny fahadisoanareo sy ny fahavetavetanareo.'
mg1865::mg_26::36::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy noho ny aminareo no anaovako izany, hoy Jehovah Tompo aoka ho fantatrareo izany; koa menara sy mangaihaiza ianareo noho ny lalanareo, ry taranak''Isiraely.'
mg1865::mg_26::36::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Amin''ny andro hanadiovako anareo ho afaka amin''ny helokareo rehetra dia hametrahako mponina ao amin''ny tanana, ary haorina indray ny efa rava.'
mg1865::mg_26::36::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hasaina ny tany efa lao, fa tsy ho lao eo imason''ny mpandalo rehetra intsony izy.'
mg1865::mg_26::36::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa holazainy hoe: Ity tany efa lao ity dia tonga tahaka ny saha Edena; ary ny tanàna efa foana sy lao dia misy mponina sady asiana manda;'
mg1865::mg_26::36::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia ho fantatry ny jentilisa sisa manodidina anareo fa Izaho Jehovah no manorina indray ny efa rava sy mamboly izay efa foana. Izaho Jehovah no niteny sady hahatanteraka izany.'
mg1865::mg_26::36::37:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Mbola hotadiavin''ny taranak''Isiraely Aho amin''ny hanaovako izao ho azy; hohamaroiko toy ny ondry ny olony.'
mg1865::mg_26::36::38:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 36
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny ondry aman''osy masina, izay any Jerosalema amin''ny fotoam-pivavahana, dia toy izany no hahafenoan''ny tanànany efa lao amin''ny olona maro toy ny ondry aman''osy; ka dia ho fantatra fa Izaho no Jehovah.'
mg1865::mg_26::37::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana ny amin''ny hampodiana ny Isiraely, sy ny hanakambanana azy ho firenena iray hanjakan''i Davida'
  verse_text: 'Tao amiko ny tanan''i Jehovah, ary ny Fanahy no nitondran''i Jehovah ahy nivoaka, dia napetrany teo amin''ny lohasaha feno taolana aho.'
mg1865::mg_26::37::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra ahy nandehandeha teny amin''ireo Izy; ary, indreo, betsaka dia betsaka teny amin''ny lohasaha ireo, ary, indreo, maina dia maina Ireo.'
mg1865::mg_26::37::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Ry zanak''olona, moa mety ho velona ihany va ireto taolana ireto? Ary hoy izaho: Jehovah Tompo o, Ianao no mahalala.'
mg1865::mg_26::37::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy indray Izy tamiko: Maminania amin''ireto taolana ireto, ka ataovy aminy hoe: Ry taola-maina, mihainoa ny tenin''i Jehovah!'
mg1865::mg_26::37::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo amin''ireto taolana ireto: Indro, hasiako fofonaina ianareo ka ho velona;'
mg1865::mg_26::37::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hasiako ozatra ianareo ka hampaniriko nofo; ary hosaronako hoditra ianareo; ary hasiako fofonaina ianareo ka ho velona; ka dia ho fantatrareo fa Izaho no Jehovah.'
mg1865::mg_26::37::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naminany aho araka izay efa nandidiana ahy, ary nony efa naminany aho. dia injany! nisy feo, ary, indreo, nihetsiketsika sady nifanatonatona ny taolana, samy nanatona ny taolana namany avy.'
mg1865::mg_26::37::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, naniry ny ozatra sy ny nofo, ary nisarona hoditra izy, nefa tsy mbola nisy fofonaina tao aminy.'
mg1865::mg_26::37::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Maminania amin''ny fofonaina, eny, maminania. ry zanak''olona, ka ataovy amin''ny fofonaina hoe: Izao no lazain''i Jehovah Tompo: Manatona avy amin''ny rivotra efatra, ry fofonaina, ka tsotsofy ireo voavono ireo, mba ho velona izy.'
mg1865::mg_26::37::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naminany araka izay efa nandidiany ahy aho, ka dia nidiran''ny fofonaina ireo ka velona, dia nijoro tamin''ny tongony izy maro be dia maro be tokoa.'
mg1865::mg_26::37::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Ry zanak''olona, ireto taolana ireto dia ny taranak''Isiraely rehetra; indreo izy manao hoe: Maina ny taolanay, levona ny fanantenanay, fongotra izahay.'
mg1865::mg_26::37::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maminania, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Indro, ry oloko, Izaho no hanokatra ny fasanareo, ary hampiakariko avy amin''ny fasanareo ianareo, ka ho entiko ho any amin''ny tanin''ny Isiraely;'
mg1865::mg_26::37::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia ho fantatrareo fa Izaho no Jehovah, raha manokatra ny fasanareo Aho, ry oloko, ka mampiakatra anareo hiala amin''ny fasanareo.'
mg1865::mg_26::37::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hataoko ao anatinareo ny Fanahiko, dia ho velona ianareo, ary hamponeniko any amin''ny taninareo ianareo; ka dia ho fantatrareo fa Izaho Jehovah no efa niteny sady nahatanteraka izany, hoy Jehovah.'
mg1865::mg_26::37::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::37::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia mangalà tapa-kazo iray, ka asio soratra hoe: Ho an''ny Joda sy ho an''ny zanak''Isiraely namany; dia mangalà tapa-kazo anankiray koa, ka asio soratra hoe: Ho an''i Josefa dia tapa-kazon''i Efraima sy ho an''ny taranak''Isiraely namany rehetra.'
mg1865::mg_26::37::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ampifanatony izy roa ho tonga tapa-kazo iray ihany, dia ho iray eny an-tananao izy.'
mg1865::mg_26::37::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha miteny aminao ny zanaky ny firenenao manao hoe: Moa tsy hilaza izay hevitrao amin''izany va ianao?'
mg1865::mg_26::37::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Indro, Izaho haka ny tapa-kazon''i Josefa, izay eny an-tanan''i Efraima, sy ny firenen''ny Isiraely namany, ary hakambako ho eo amin''ny tapa-kazon''i Joda izy, ary hataoko tapa-kazo iray ihany izy ka ho tonga iray eny an-tanako.'
mg1865::mg_26::37::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tapa-kazo izay hasianao soratra dia ho eny an-tananao eo imasony.'
mg1865::mg_26::37::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Indro, Izaho haka ny zanak''Isiraely avy any amin''ny jentilisa izay nalehany, eny, hangoniko avy any amin''ny manodidina any izy ka ho entiko ho any amin''ny taniny:'
mg1865::mg_26::37::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hataoko ho firenena iray any amin''ny tany izy, dia any an-tendrombohitry ny Isiraely, ary mpanjaka iray ihany no ho mpanjakan''izy rehetra, ka tsy ho firenena roa intsony izy ary tsy hisaraka ho fanjakana roa intsony.'
mg1865::mg_26::37::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy handoto tena amin''ny sampiny, na amin''ny fahavetavetany, na amin''ny fahadisoany intsony izy; fa hovonjeko ho afaka amin''ny fonenany rehetra izay nanotany izy, ary hodioviko izy, ka dia ho oloko, ary Izaho ho Andriamaniny.'
mg1865::mg_26::37::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida Mpanompoko no ho Mpanjakany; ary hiray Mpiandry izy rehetra, dia handeha araka ny fitsipiko izy sady hitandrina ny lalàko sy hankatò izany.'
mg1865::mg_26::37::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary honina any amin''ny tany izay nomeko an''i Jakoba mpanompoko izy, dia ilay efa nonenan''ny razanareo, ka honina any izy sy ny zanany mbamin''ny zafiny mandrakizay; ary Davida mpanompoko no ho Mpanapaka azy mandrakizay.'
mg1865::mg_26::37::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanao fanekem-pihavanana ho azy Aho, ka ho fanekena mandrakizay eo aminy any, ary hametraka sy hahamaro azy Aho sady hametraka ny fitoerako masina eo aminy mandrakizay.'
mg1865::mg_26::37::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tabernakeliko ho eo aminy; ary Izaho ho Andriamaniny, ary izy ho oloko.'
mg1865::mg_26::37::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 37
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho fantatry ny jentilisa fa Izaho Jehovah no manamasina ny Isiraely amin''ny isian''ny fitoerako masina eo aminy mandrakizay.'
mg1865::mg_26::38::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handresena an''i Goga sy Magoga mbamin''ny firenena maro izay ho entiny hiady amin''ny Isiraely'
  verse_text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe:'
mg1865::mg_26::38::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry zanak''olona, manandrifia an''i Goga avy any amin''ny tany Magoga, izay mpanjakan''i Rosy sy Meseka ary Tobala, ary maminania ny hamelezana azy,'
mg1865::mg_26::38::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, avy hamely anao Aho, ry Goga, mpanjakan''i Rosy sy Meseka ary Tobala.'
mg1865::mg_26::38::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitarika anao Aho ka hanisy masom-by ny valanoranonao, ary ho entiko mivoaka ianao sy ny tafikao rehetra, dia ny soavaly sy ny mpitaingin-tsoavaly, samy mitafy marevaka izy rehetra, dia olona maro be mitondra ampinga lehibe sy ampinga kely, ary samy mitan-tsabatra;'
mg1865::mg_26::38::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'miaraka aminy ny Persiana sy ny Etiopiana ary ny Libyana*, samy mitondra ampinga lehibe sy fiarovan-doha avokoa, [*Hebreo: Pota]'
mg1865::mg_26::38::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Gomera koa mbamin''ny miaramilany rehetra, ny taranak''i Togarma avy any amin''ny farany avaratra mbamin''ny miaramilany rehetra, dia firenena maro izay miaraka aminao.'
mg1865::mg_26::38::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miomana, ka mitaova tsara ianao, eny, ianao sy ireo momba anao izay efa mivory ao aminao, ary aoka ianao no ho mpitarika* azy. [*Na: mpitandrina]'
mg1865::mg_26::38::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka andro maro, dia hotadiavina ianao, raha mby any am-parany, dia ho tonga any amin''ny tany izay novonjena ka afaka tamin''ny sabatra ianao, dia tany novorina avy tany amin''ny firenena maro, any an-tendrombohitry ny Isiraely, izay efa lao hatry ny ela; fa efa navoaka avy tany amin''ny firenena izy, ka dia mandry fahizay izy rehetra.'
mg1865::mg_26::38::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hiakatra ianao, ary ho tahaka ny fihavin''ny rivo-doza no hihavianao, ka ho tahaka ny rahona hanarona ny tany dia ianao sy ny miaramilanao rehetra mbamin''ny firenena maro izay miaraka aminao.'
mg1865::mg_26::38::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Amin''izany andro izany dia hisy eritreritra hiditra ao an-tsainao, ary hamoron-kevi-dratsy ianao'
mg1865::mg_26::38::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hanao hoe: Hiakatra aho hamely ny tany izay misy tanàna tsy mimanda; hankamin''izay mandry fahizay sy mitoetra tsy manana ahiahy aho, samy, monina ao an-tanàna tsy misy manda na hidy na vavahady izy rehetra,'
mg1865::mg_26::38::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hamabo sy handroba ary hamely indray izay efa rava, saingy vao misy mponina ankehitriny izao, ary ny firenena izay nangonina avy tany amin''ny jentilisa sady nihary omby sy fananana, dia ireo mitoetra ao amin''ny foiben''ny tany.'
mg1865::mg_26::38::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sheba sy Dedana ary ny mpandranton''i Tarsisy rehetra mbamin''ireo lionany tanora rehetra dia hanao aminao hoe: Tonga hamabo va ianao? Nangoninao handroba va ireto olonao betsaka ireto, hahalasa volafotsy sy volamena, handroba harena sy fananana ary hahazo babo betsaka?'
mg1865::mg_26::38::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maminania, ry zanak''olona, ka ataovy amin''i Goga hoe: Izao no lazain''i Jehovah Tompo: Moa amin''izany andro hitoeran''ny Isiraely oloko mandry fahizay izany dia tsy ho fantatrao va izany?'
mg1865::mg_26::38::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tonga avy any amin''ny fonenanao avy any amin''ny farany avaratra ianao mbamin''ny firenena maro miaraka aminao, izay samy mitaingin-tsoavaly, dia olona maro be sy miaramila betsaka;'
mg1865::mg_26::38::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hiakatra hamely ny Isiraely oloko tahaka ny fiakatry ny rahona hanarona ny tany ianao; any am-parany no ho tonga izany; ary ho entiko hamely ny taniko ianao, mba hahafantaran''ny firenena Ahy, rehefa miseho ho masina eo anatrehany Aho amin''ny ataoko aminao, ry Goga.'
mg1865::mg_26::38::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Moa ianao va ilay nampilazaiko ny mpanompoko hatramin''ny fahiny, dia ny mpaminanin''ny Isiraely, izay naminany ela tamin''izany andro izany ny hampakarako anao hamely azy?'
mg1865::mg_26::38::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany, dia ny andro hihavian''i Goga hamely ny tanin''ny Isiraely, hoy Jehovah Tompo, dia hiefona eo am-bavoroko ny fahatezerako.'
mg1865::mg_26::38::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny fahasaro-piaroko sy ny afon''ny fahatezerako no nitenenako hoe: Amin''izany andro izany dia hisy horohoro mafy any amin''ny tanin''ny Isiraely,'
mg1865::mg_26::38::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 20
  verse_date_revised: '2022-06-21T11:26:47+0000'
  verse_title: null
  verse_text: 'ka hangorohoro eo anatrehako ny hazandrano any an-dranomasina sy ny voro-manidina sy ny bibi-dia ary ny biby mandady sy mikisaka rehetra izay mandady sy mikisaka amin''ny tany ary ny olona rehetra ambonin''ny tany; dia hazera ny tendrombohitra, hikoa ny fiakarana mideza, ary hirodana ity ampiantany rehetra.'
mg1865::mg_26::38::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiantso sabatra Aho hamely azy eny amin''ny tendrombohitro rehetra, hoy Jehovah Tompo: ary hifamely sabatra amin''ny namany avy izy rehetra.'
mg1865::mg_26::38::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamaly azy* amin''ny areti-mandringana sy ny rà sy ny ranon''orana manafotra ary ny havandra vaventy Aho; ary koa, handatsaka afo sy solifara aminy sy amin''ny miaramilany mbamin''ny firenena maro izay miaraka aminy Aho. [*Hebreo: hifandahatra aminy]'
mg1865::mg_26::38::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 38
  verse_number: 23
  verse_date_revised: '2022-06-21T11:26:54+0000'
  verse_title: null
  verse_text: 'Ka dia hasehoko ny fahalehibiazako sy ny fahamasinako; ary ho fantatra eo imason''ny firenena maro Aho: ka dia ho fantany fa Izaho no Jehovah.'
mg1865::mg_26::39::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia maminania ny hamelezana an''i Goga, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, hamely anao Aho, ry Goga, mpanjakan''i Rosy sy Meseka ary Tobala.'
mg1865::mg_26::39::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitarika sy hitondra anao hiakatra avy any amin''ny farany avaratra Aho, dia ho entiko ho any an-tendrombohitry ny Isiraely ianao.'
mg1865::mg_26::39::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hasiako ny tsipïkanao hiala eny an-tananao ankavia, ary halatsako hiala eny an-tananao an-kavanana ny zana-tsipïkanao.'
mg1865::mg_26::39::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any an-tendrombohitry ny Isiraely no hiampatramparanao sy ny miaramilanao rehetra mbamin''ny firenena izay miaraka aminao; homeko hohanin''ny vorona mpihaza samy hafa karazana rehetra sy ny bibi-dia ianao.'
mg1865::mg_26::39::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-tsaha no hiamparanao; fa Izaho no efa niteny, hoy Jehovah Tompo.'
mg1865::mg_26::39::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haterako afo Magoga sy izay mipetraka tsy manana ahiahy any amoron-tsiraka; ka dia ho fantany fa Izaho no Jehovah.'
mg1865::mg_26::39::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anarako masina dia hataoko fantatra ao amin''ny Isiraely oloko; ary tsy havelako holotoina intsony ny anarako masina; ka dia ho fantatry ny firenena fa Izaho no Jehovah, Izay masina ao amin''ny Isiraely.'
mg1865::mg_26::39::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tonga izany ka tanteraka, hoy Jehovah Tompo. Izany no andro izay nolazaiko.'
mg1865::mg_26::39::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hivoaka ny mponina ao amin''ny tanànan''ny Isiraely ka handrehitra sy hitaina ny fiadiana, dia ny ampinga lehibe, ny tsipïka sy ny zana-tsipïka, ny langilangy sy ny lefona, ary hitaina izany mandritra ny fito taona izy;'
mg1865::mg_26::39::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy haka kitay hazo any an-tsaha na hanapaka hazo any an''ala izy, fa hitaina ny fiadiana ka hamabo izay efa namabo azy sy handroba izay efa nandroba azy, hoy Jehovah Tompo.'
mg1865::mg_26::39::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia homeko tany eo amin''ny Isiraely Goga hasiana fasana, dia ny lohasahan''ny mpandalo manolotra ny ranomasina, ka hisakana* ny mpandalo izany; ary any no handevenany an''i Goga sy ny olony maro be rehetra; ary ny anarany hataony hoe Lohasahan''ireo olona maroben''i Goga. [*Na: hampitampina orona]'
mg1865::mg_26::39::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fito volana mipaka no handevenan''ny taranak''Isiraely azy, hanadiovany ny tany.'
mg1865::mg_26::39::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny tompon-tany rehetra no handevina azy; ary ho laza ho azy izany amin''ny andro hampisehoako ny voninahitro, hoy Jehovah Tompo.'
mg1865::mg_26::39::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy hanavaka sy hanendry olona ho mpitety ny tany sy izay hiaraka amin''ny mpitety koa handevina ny mbola sisa eny ambonin''ny tany, hanadiovana azy; rehefa afaka fito volana, dia vao hikatsaka izy;'
mg1865::mg_26::39::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha mandeha mitety ny tany ireo mpitety ka mahita taolan''olona, dia hanorina marika eo anilany izy, mandra-pandevin''ny mpandevina azy ao amin''ny Lohasahan''ireo maro ben''i Goga.'
mg1865::mg_26::39::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy tanàna koa hatao hoe Hamona*. Toy izany no hanadiovany ny tany. [*Hamona = Olona maro be]'
mg1865::mg_26::39::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zanak''olona, dia izao na lazain''i Jehovah Tompo: Ataovy amin''ny voro-manidina rehetra sy ny bibi-dia rehetra hoe: Mivoria ianareo, ka mankanesa aty; miangona ianareo avy amin''ny manodidina ho amin''ny fanatitro izay vonoiko ho anareo, dia fanatitra lehibe eny an-tendrombohitry ny Isiraely, hihinananareo nofo sy hisotroanareo rà.'
mg1865::mg_26::39::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nofon''ny lehilahy mahery no hohaninareo, ary ny ran''ireo mpanjakan''ny tany no hosotroinareo, dia ondrilahy sy zanak''ondry sy osilahy ary vantotr''ombilahy, samy mifahy avy any Basana izy rehetra.'
mg1865::mg_26::39::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hihinana matavy ianareo mandra-pahavokinareo ary hisotro rà mandra-pahaleonareo avy amin''ny fanatitro izay novonoiko ho anareo.'
mg1865::mg_26::39::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho voky soavaly sy ny mpitaingina azy ary lehilahy mahery mbamin''ny miaramila rehetra eo amin''ny latabatro ianareo, hoy Jehovah Tompo.'
mg1865::mg_26::39::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hasehoko any amin''ny jentilisa ny voninahitro, ka ho hitan''ny firenena rehetra ny fitsarana hataoko sy ny tanako izay hahinjitro aminy.'
mg1865::mg_26::39::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantatry ny taranak''Isiraely fa Izaho no Jehovah Andriamaniny hatry ny androtr''iny ka hatramin''ny ho avy rehetra.'
mg1865::mg_26::39::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantatry ny jentilisa fa ny heloky ny taranak''Isiraely no nahababo azy; fa satria nivadika tamiko izy, dia izany no nanafenako ny tavako taminy sy nanolorako azy ho eo an-tanan''ny fahavalony, ka dia lavon-tsabatra izy rehetra.'
mg1865::mg_26::39::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny fahalotoany sy ny fahadisoany no navaliko azy sy nanafenako ny tavako taminy.'
mg1865::mg_26::39::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no lazain''i Jehovah Tompo: Ankehitriny dia hampodiko avy amin''ny fahababoany Jakoba, ary hamindrako fo ny taranak''Isiraely rehetra; ary hiseho ho saro-piaro noho ny amin''ny anarako masina Aho.'
mg1865::mg_26::39::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mba hahatsiaro* ny fahamenarany sy ny fahadisoany rehetra izay nandisoany tamiko izy, rehefa mandry fahizay ao amin''ny taniny, ka tsy misy manaitaitra azy, [*Hebreo: hitondra]'
mg1865::mg_26::39::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa ampodiko avy any amin''ny firenena izy ary angoniko avy any amin''ny tanin''ny fahavalony; ary hiseho ho masina eo imason''ny jentilisa Aho amin''ny ataoko amin''ireny;'
mg1865::mg_26::39::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho fantany fa Izaho Jehovah no Andriamaniny amin''ny ampandehanako azy ho babo any amin''ny firenena sy amin''ny anangonako azy ho any amin''ny taniny, ka tsy hisy hafoiko any izy na dia iray akory aza.'
mg1865::mg_26::39::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 39
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hafeniko aminy intsony ny tavako; fa haidiko ao amin''ny taranak''Isiraely ny Fanahiko, hoy Jehovah Tompo.'
mg1865::mg_26::40::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahitana naseho tamin''i Ezekiela ny amin''ny tempoly vaovao'
  verse_text: 'Tamin''ny taona fahadimy amby roa-polo taorian''ny namaboana antsika, tamin''ny niandohan''ny taona, dia tamin''ny andro fahafolo tamin''ny volana, tamin''ny taona fahefatra ambin''ny folo taorian''ny namelezana ny tanàna, tamin''izany andro izany dia tamiko ny tanan''i Jehovah, ka nitondra ahy ho any Izy.'
mg1865::mg_26::40::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahitana avy amin''Andriamanitra no nitondrany ahy ho any amin''ny tanin''ny Isiraely, ka napetrany teo an-tendrombohitra avo dia avo aho, ary nisy nitarehin-tanàna teo amin''ny ilany atsimo.'
mg1865::mg_26::40::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny nankao aho, ka, indro, nisy lehilahy izay nitarehim-barahina, nitondra tady rongony teny an-tanany sy volotara fandrefesana, ary nitsangana teo am-bavahady izy.'
mg1865::mg_26::40::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ralehilahy tamiko: Ry zanak''olona, mijere amin''ny masonao, ary mihainoa amin''ny sofinao, ary aoka ny fonao handinika izay rehetra hasehoko anao; fa ny hanehoako anao izao no nitondrana anao eto. Ambarao amin''ny taranak''Isiraely izay rehetra hitanao.'
mg1865::mg_26::40::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, misy ampiantany vato manodidina teny ivelan''ny trano, ary eny an-tànan-dralehilahy nisy volotara fandrefesana, enina hakiho ny halavany, kanefa isaky ny hakiho iray dia nihoatra vodivoam-pelatanana noho ny fanao; ka dia norefesiny ny hatevin''ny ampiantany, ka eran''ny volotara. ary ny hahavony dia eran''ny volotara koa.'
mg1865::mg_26::40::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga teo amin''ny vavahady manatrita ny atsinanana izy ka niakatra tamin''ny ambaratongany dia nandrefy ny tokonam-bavahady, ka eran''ny volotara ny sakany, dia ny tokonana voalohany izany, ka eran''ny volotara ny sakany*. [*Na: ary eran''ny volotara ny sakan''ny tokonana iray koa]'
mg1865::mg_26::40::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano fiambenana, dia eran''ny volotara ny lavany, ary eran''ny volotara koa ny sakany; ary ny elanelan''ny trano fiambenana dia dimy hakiho; ary ny tokonam-bavahady eo anilan''ny lavarangan''ny vavahady anatiny dia eran''ny volotara.'
mg1865::mg_26::40::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia norefesiny koa ny lavarangan''ny vavahady, ka eran''ny volotara koa.'
mg1865::mg_26::40::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary norefesiny ny lavarangan''ny vavahady, ka valo hakiho; ary ny tongo-batony dia roa hakiho; ary ny lavarangan''ny vavahady dia teo anatiny.'
mg1865::mg_26::40::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano fiambenana teo amin''ny vavahady atsinanana dia telo avy no teo an-daniny; mitovy ohatra izy telo, ary mitovy ohatra koa ny tongo-bato teo amin''ny lafiny roa.'
mg1865::mg_26::40::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary norefesiny koa ny haben''ny vavahady, ka folo hakiho; ary ny lavan''ny vavahady dia telo ambin''ny folo hakiho.'
mg1865::mg_26::40::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nifefy teo anoloan''ny trano fiambenana, ka iray hakiho avy no teo an-daniny roa; ary ny trano fiambenana, dia enina hakiho ny tamin''ny lafiny iray, ary enina hakiho koa ny tamin''ny lafiny iray.'
mg1865::mg_26::40::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia norefesiny koa ny vavahady hatramin''ny tafon''ny trano fiambenana iray ka hatramin''ny tafon''ny iray koa, ka dimy amby roa-polo hakiho ny sakany, ary mifanatrika ny varavarana.'
mg1865::mg_26::40::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tongo-bato dia noheveriny ho enim-polo hakiho, ary nihatra tamin''ny tongo-bato ny kianja manodidina ny vavahady.'
mg1865::mg_26::40::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatreo anoloan''ny vavahady fidirana ka hatreo anoloan''ny lavarangan''ny vavahady anatiny dia dimam-polo hakiho.'
mg1865::mg_26::40::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy varavarankely makarakara tsy mivoha manodidina, na ao amin''ny trano fiambenana, na amin''ny tongo-bato ao anatin''ny vavahady*; ary toy izany koa amin''ny tohany; ary ny ao anatiny dia nisy varavarankely manodidina; ary teo amin''ny tongo-bato rehetra dia samy nisy sarin''ny hazo rofia** avokoa. [*Na: sady manodidina azy ny vavahady] [**palma]'
mg1865::mg_26::40::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny ho any amin''ny kianja ivelany aho, ary, indro, nisy efi-trano madinika sy lampivato teny amin''ny kianja manodidina: nisy efi-trano telo-polo teny amin''ny lampivato.'
mg1865::mg_26::40::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lampivato dia teo anilan''ny vavahady, sady nifanerana tamin''ny lavan''ny vavahady: lampivato ambany io.'
mg1865::mg_26::40::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia norefesiny koa ny sakany hatreo anoloan''ny vavahady ambany ka hatreo anoloan''ny kianja anatiny, dia hatreo amin''ny ivelany, ka zato hakiho, dia teo atsinanana sy teo avaratra.'
mg1865::mg_26::40::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 20
  verse_date_revised: '2022-06-21T11:19:46+0000'
  verse_title: null
  verse_text: 'Ary norefesiny koa ny lavany sy ny sakan''ny vavahadin''ny kianja ivelany, izay nanatrika ny avaratra.'
mg1865::mg_26::40::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano fiambenany dia telo avy no teo an-daniny; ary ny tongo-batony sy ny tohany dia nitovy ohatra tamin''ny vavahady voalohany, ka dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany.'
mg1865::mg_26::40::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 22
  verse_date_revised: '2022-06-21T11:19:42+0000'
  verse_title: null
  verse_text: 'Ary ny varavarankeliny sy ny tohany ary ny sarin''ny hazo rofia* taminy dia nitovy ohatra tamin''ny ireo amin''ny vavahady atsinanana, ary nisy ambaratonga fito ho fiakarana ao; ary ny tohany dia tandrifin''ireo. [*palma]'
mg1865::mg_26::40::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vavahadin''ny kianja anatiny, tandrifin''ny vavahady fidirana manatrika ny avaratra sy ny atsinanana; ka dia norefesiny hatramin''ny vavahady anankiray ka hatramin''ny anankiray, ka zato hakiho.'
mg1865::mg_26::40::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny nianatsimo aho, ka, indro, nisy vavahady teo atsimo; ka norefesiny ny tongo-batony sy ny tohany, ka araka ireo ohatra ireo ihany koa.'
mg1865::mg_26::40::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy varavarankely teo aminy sy teo amin''ny tohany manodidina, dia tahaka ireo varavarankely ireo ihany koa, ka dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany.'
mg1865::mg_26::40::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ambaratonga fito ho fiakarana ao, ary ny tohany dia tandrifin''ireo; ary nisy sarin''ny hazo rofia* iray tamin''ny lafiny iray, ary iray koa tamin''ny lafiny iray teo amin''ny tongo-batony. [*palma]'
mg1865::mg_26::40::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vavahady fidirana amin''ny kianja anatiny teo atsimo, dia norefesiny teo atsimo hatramin''ny vavahady anankiray ka hatramin''ny anankiray, ka zato hakiho koa.'
mg1865::mg_26::40::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny niditra tamin''ny vavahady atsimo ho any amin''ny kianja anatiny aho; dia norefesiny ny vavahady atsimo, ka araka ireo ohatra ireo ihany koa;'
mg1865::mg_26::40::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny trano fiambenany sy ny tongo-batony ary ny tohany dia araka ireo ohatra ireo ihany koa; ary nisy varavarankely teo aminy sy teo amin''ny tohany manodidina, dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany.'
mg1865::mg_26::40::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tohany manodidina, dia dimy amby roa-polo hakiho ny lavany, ary dimy hakiho ny sakany.'
mg1865::mg_26::40::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tohany dia nanatrika ny kianja ivelany; ary nisy sarin''ny hazo rofia* teo amin''ny tongo-batony, ary nisy ambaratonga valo ho fiakarana ao. [*palma]'
mg1865::mg_26::40::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny niantsinanana aho ho any amin''ny kianja anatiny, dia norefesiny ny vavahady, ka araka ireo ohatra ireo ihany koa.'
mg1865::mg_26::40::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano fiambenany sy ny tongo-batony ary ny tohany dia araka ireo ohatra ireo ihany koa; ary nisy varavarankely teo aminy sy teo amin''ny tohany manodidina, dimam-polo hakiho ny lavany, ary dimy amby-roa-polo hakiho ny sakany.'
mg1865::mg_26::40::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatrika ny kianja ivelany ny tohany; ary nisy sarin''ny hazo rofia* teo amin''ny tongo-batony andaniny roa, ary nisy ambaratonga valo ho fiakarana ao. [*palma]'
mg1865::mg_26::40::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny ho any amin''ny vavahady avaratra aho, dia norefesiny, ka araka ireo ohatra ireo ihany koa,'
mg1865::mg_26::40::36:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny trano fiambenany sy ny tongo-batony ary ny tohany, ary nisy varavarankely teo aminy manodidina, dia dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany.'
mg1865::mg_26::40::37:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatrika ny kianja ivelany ny tongo-batony; nisy sarin''ny hazo rofia* teo amin''ny tongo-batony andaniny roa; ary ambaratonga valo no fiakarana ao. [*palma]'
mg1865::mg_26::40::38:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy efi-trano misy varavarana teo anilan''ny tongo-bato teo am-bavahady, izay nanakobahany ny fanatitra dorana.'
mg1865::mg_26::40::39:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo amin''ny lavarangan''ny vavahady dia nisy latabatra roa avy tamin''ny lafiny roa hamonoana ny fanatitra dorana sy ny fanatitra noho ny ota ary ny fanati-panonerana.'
mg1865::mg_26::40::40:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo anilany eo ivelany amin''ny fiakarana hiditra eo amin''ny vavahady avaratra dia nisy latabatra roa, ary teo anilany anankiray koa teo amin''ny lavarangan''ny vavahady, dia nisy latabatra roa koa.'
mg1865::mg_26::40::41:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy latabatra efatra teo amin''ny ilany iray amin''ny vavahady ary latabatra efatra koa teo amin''ny ilany iray, dia latabatra valo izay famonoana.'
mg1865::mg_26::40::42:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy latabatra efatra natao tamin''ny vato voapaika ho amin''ny fanatitra dorana, iray hakiho sy sasany ny lavany, ary iray hakiho sy sasany koa ny sakany, ary iray hakiho ny hahavony; teo no nametrahany ny zavatra famonoana ny fanatitra dorana sy ny fanatitra hafa.'
mg1865::mg_26::40::43:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fihantonana roa rantsana*, vodivoam-pelatanana ny halavany**, naorina manodidina eny amin''ny rindrina; ary natao teo ambonin''ny latabatra ny hena fanatitra. [*Na: nisy filirany] [**Na: ny habeny]'
mg1865::mg_26::40::44:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ivelan''ny vavahady anatiny, teo anilan''ny vavahady avaratra ka manatrika ny atsimo, dia nisy ireo efi-trano ho an''ny mpihira teo amin''ny kianja anatiny, ary nisy iray koa teo anilan''ny vavahady atsinanana ka nanatrika ny avaratra.'
mg1865::mg_26::40::45:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Ity efi-trano manatrika ny atsimo ity dia ho an''ny mpisorona izay mitandrina ny anjara-raharahany amin''ny trano.'
mg1865::mg_26::40::46:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny efi-trano manatrika ny avaratra kosa dia ho an''ny mpisorona izay mitandrina ny anjara-raharaha ny amin''ny alitara, ireo dia taranak''i Zadoka, izay isan''ny taranak''i Levy, ka manatona an''i Jehovah hanao fanompoam-pivavahana ho Azy.'
mg1865::mg_26::40::47:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia norefesiny ny kianja, ka zato hakiho ny lavany, ary zato hakiho koa ny sakany, dia efa-joro sokera izy; ary ny alitara dia teo anoloan''ny trano.'
mg1865::mg_26::40::48:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny ho any amin''ny lavarangan''ny trano aho, dia norefesiny ny tongo-batony amin''ny lavarangana fidirana, ka dimy hakiho ny tamin''ny lafiny iray, ary dimy hakiho koa ny tamin''ny lafiny iray, ary ny sakan''ny vavahady dia telo hakiho ny tamin''ny lafiny iray, ary telo hakiho koa ny tamin''ny lafiny iray.'
mg1865::mg_26::40::49:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 40
  verse_number: 49
  verse_date_revised: '2022-06-21T11:19:53+0000'
  verse_title: null
  verse_text: 'Roa-polo hakiho ny lavan''ny lavarangana fidirana, ary iraika ambin''ny folo hakiho ny sakany; ary ambaratonga no fiakarana ao; ary nisy tongo-bato teo anilan''ny tolana, iray tamin''ny lafiny iray, ary iray tamin''ny lafiny iray koa.'
mg1865::mg_26::41::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny ho ao amin''ny ati-trano lehibe aho, dia norefesiny ny tongo-bato, ka enina hakiho ny sakany tamin''ny lafiny iray, ary enina hakiho koa ny sakany tamin''ny lafiny iray; sakan''ny trano-lay izany.'
mg1865::mg_26::41::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sakan''ny varavarana dia folo hakiho; ary ny teo an-danin''ny varavarana dia dimy hakiho avy; ary norefesiny ny lavany, ka efa-polo hakiho, ary ny sakany roa-polo hakiho.'
mg1865::mg_26::41::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandroso ho ao anatiny indrindra izy ary, norefesiny ny tongo-bato eo an-danin''ny varavarana, ka roa hakiho, ary ny varavarana enina hakiho, ary ny sakan''ny varavarana fito hakiho.'
mg1865::mg_26::41::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia norefesiny ny lavany, ka roa-polo hakiho, ary ny sakany roa-polo hakiho teo anoloan''ny ati-trano lehibe; dia hoy izy tamiko: Io no fitoerana masina indrindra.'
mg1865::mg_26::41::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy norefesiny manodidina, ka ny hatevin''ny rindrin''ny trano dia enina hakiho, ary ny sakan''ny paosin-trano dia efatra hakiho.'
mg1865::mg_26::41::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo paosin-trano ireo dia nifanongoa telo sady telo-polo milahatra; ary niankina tamin''ny rindrin-trano izay ho an''ny paosin-trano manodidina izy mba hitsatohany, fa tsy hitsatoka amin''ny rindrin''ny trano.'
mg1865::mg_26::41::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sakan''ireo efi-trano ireo dia nihamalalaka manodidina isaky ny mifanongoa, fa niampy isaky ny mifanongoa izy, ka dia nihamalalaka araka ny fisandrany; ary ny tombon''ny ambony amin''ny an-tenatenany dia tahaka ny tombon''ny an-tenatenany amin''ny ambany.'
mg1865::mg_26::41::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitako fa nisy tokotany nasandratra manodidina ny trano ho fanorenan''ny paosin-trano, dia* eran''ilay volotara hatramin''ny ifanohizany. [*Na: Dia noheveriko ny hahavon''ny trano manodidina; ary ny fanorenan''ny paosin-trano dia]'
mg1865::mg_26::41::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hatevin''ny rindrina ivelany amin''ny paosin-trano dia dimy hakiho; ary hoatra izany koa ilay sisa navela manolotra ny paosin-trano.'
mg1865::mg_26::41::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny teo anelanelan''ny efi-trano dia roa-polo hakiho manodidina ny trano na aiza na aiza.'
mg1865::mg_26::41::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny varavaran''ny paosin-trano dia mankao amin''ilay sisa navela, dia varavarana iray manatrika ny avaratra, ary iray koa manatrika ny atsimo; ary ny sakan''ilay sisa navela dia dimy hakiho manodidina.'
mg1865::mg_26::41::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny trano izay teo anoloan''ilay kianja voatokana tamin''ny lafiny andrefana, dia dia fito-polo hakiho ny sakany; ary ny rindrin''ny trano, dia dimy hakiho ny hatevin''ny manodidina, ary sivi-folo hakiho ny lavany.'
mg1865::mg_26::41::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandrefy ny trano izy, ka zato hakiho ny lavany, ary ny kianja voatokana sy ny trano ary ny rindrina, dia zato hakiho ny lavany.'
mg1865::mg_26::41::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sakan''ny trano eo anoloany sy ny kianja voatokana teo atsinanana dia zato hakiho.'
mg1865::mg_26::41::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia norefesiny ny lavan''ny trano teo anoloan''ny kianja izay tao ivohony, ary ny lalan-tsarany teo an-daniny roa, ka zato hakiho. Ny tempoly ao anaty sy ny lavarangana ao amin''ny kianja'
mg1865::mg_26::41::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tokonana sy ny varavarankely makarakara tsy mivoha ary ny lalan-tsara manodidina amin''izy telo (manandrify ny tokonana dia nopetahana hazo fisaka manodidina, ary hatramin''ny tany ka hatramin''ny varavarankely koa, ary voasarona ny varavarankely),'
mg1865::mg_26::41::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny eo ambonin''ny varavarana, na amin''ny trano ao anatiny, na ny eny ivelany, mbamin''ny rindrina manodidina, na ny ao anatiny na ny eny ivelany, koa samy natao tamin''ny ohatra avokoa.'
mg1865::mg_26::41::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy sarin''ny kerobima sy ny hazo rofia* natao, ka ny sarin''ny hazo rofia* dia teo anelanelan''ny kerobima, ary ny kerobima dia samy nanana tarehy roa avy, [*palma]'
mg1865::mg_26::41::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ny tarehin''olona no nanatrika ny hazo rofia tamin''ny an-kilany iray, ary ny tarehin-diona tanora kosa no nanatrika ny hazo rofia* tamin''ny an-kilany iray; ny manodidina ny trano dia natao tahaka izany avokoa izy rehetra. [*palma]'
mg1865::mg_26::41::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny tany ka hatrany ambonin''ny varavarana no nasiana sarin''ny kerobima sy ny hazo rofia*, dia teo amin''ny rindrin''ny ati-trano lehibe. [*palma]'
mg1865::mg_26::41::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa-joro ny tolan''ny ati-trano lehibe, ary ny anoloana amin''ny fitoerana masina dia nitovy tarehy tamin''izany koa.'
mg1865::mg_26::41::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alitara dia hazo, ka telo hakiho ny hahavony, ary roa hakiho ny lavany; ary nisy zorony koa, ary ny lavany sy ny rindriny dia hazo. Ary hoy izy tamiko: Io no latabatra izay eo anatrehan''i Jehovah.'
mg1865::mg_26::41::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ati-trano lehibe sy ny fitoerana masina dia nisy lela-varavarana roa.'
mg1865::mg_26::41::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo lela-varavarana ireo dia samy kopa-droa avy, dia lela-varavarana roa amin''ny anankiray, ary lela-varavarana roa koa amin''ny anankiray.'
mg1865::mg_26::41::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy sarin''ny kerobima sy ny hazo rofia* natao teo amin''ny varavaran''ny ati-trano lehibe tahaka izay natao teo amin''ny rindrina ihany; ary nisy tokonana** hazo teo anoloan''ny lavarangana fidirana, dia teo ivelany. [*palma] [**Na: tatao]'
mg1865::mg_26::41::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 41
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy varavarankely makarakara tsy mivoha sy sarin''ny hazo rofia* teo an-daniny roa, dia teo anilan''ny lavarangana fidirana sy teo amin''ny efi-trano momba ny trano ary teo amin''ny tokonana*. [*palma] [**Na: tatao]'
mg1865::mg_26::42::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny nivoaka nianavaratra ho any amin''ny kianja ivelany aho, ary nampidiriny ho ao amin''ny efi-trano tandrifin''ny kianja voatokana sady tandrifin''ny trano eo amin''ny avaratra,'
mg1865::mg_26::42::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho eo anoloan''ilay lavany zato hakiho izay nisy ny varavarana avaratra, ary ny sakany dimam-polo hakiho.'
mg1865::mg_26::42::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandrifin''ny roa-polo hakiho amin''ny kianja anatiny sady tandrifin''ny lampivato amin''ny kianja ivelany dia nisy lalan-tsarany nifanandrify teo amin''ny trano fahatelo ambony indrindra.'
mg1865::mg_26::42::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo anoloan''ny efi-trano dia nisy lalana, folo hakiho ny sakany, mankao anatiny, ary lalana iray* hakiho izany; ary nanatrika ny avaratra ny varavarany. [*Na: (zato)]'
mg1865::mg_26::42::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nohakelezina ny efi-trano ambony, fa nangalana ho lalantsarany, ka izany no nahakely azy noho ny ambany sy ny an-tenatenany.'
mg1865::mg_26::42::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nifanongoa telo ireo, fa tsy nisy andry tahaka ny andrin''ny kianja, ka izany no nahakely azy noho ny ao ambany sy ny ao an-tenatenany hatreny an-tany.'
mg1865::mg_26::42::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ampiantany teo ivelany, tandrifin''ny efi-trano, nanatrika ny kianja ivelany, teo anoloan''ny efi-trano, ka dimam-polo hakiho ny lavany.'
mg1865::mg_26::42::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lavan''ireo efi-trano izay teo amin''ny kianja ivelany dia dimam-polo hakiho; ary, indro, ny teo anoloan''ny ati-trano lehibe dia zato hakiho.'
mg1865::mg_26::42::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo ambanin''ireo efi-trano ireo dia nisy fidirana avy eo atsinanana, raha miditra amin''ireo avy eo amin''ny kianja ivelany.'
mg1865::mg_26::42::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy efi-trano koa teo amin''ny sakan''ny ampiantanin''ny kianja teo amin''ny atsinanana, tandrifin''ny kianja voatokana sady tandrifin''ny trano.'
mg1865::mg_26::42::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lalana teo anoloany, ary tahaka ny tarehin''ny efi-trano teo amin''ny avaratra ny tarehiny, sady mitovy amin''ny an''ireo avokoa ny lavany sy ny sakany ary ny fivoahana avy ao aminy mbamin''ny fombafombany rehetra sy ny varavarany;'
mg1865::mg_26::42::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tahaka ny varavaran''ny efi-trano eo amin''ny atsimo dia nisiana varavarana koa teo amin''ny fiandohan''ny lalana, dia ilay lalana eo anoloan''ny ampiantany mifanolotra aminy, dia ny lalana avy eo amin''ny atsinanana, raha miditra ao aminy.'
mg1865::mg_26::42::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko; Ny efi-trano avaratra sy ny efi-trano atsimo, izay eo anoloan''ny kianja voatokana, dia efi-trano masina, hihinanan''ny mpisorona izay manatona an''i Jehovah ny zavatra masina indrindra; any no hametrahany izay zavatra masina indrindra, dia ny fanatitra hohanina sy ny fanatitra noho ny ota ary ny fanati-panonerana: fa masina io fitoerana io.'
mg1865::mg_26::42::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miditra ao ny mpisorona, dia tsy hiala amin''ny fitoerana masina ho any amin''ny kianja ivelany izy, fa ao no hamelany ny fitafiana masina izay nentiny nanao fanompoam-pivavahana, satria masina ireo; ary hitafy fitafiana hafa izy vao manatona ny olona.'
mg1865::mg_26::42::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony vita ny nandrefesany ny trano anatiny, dia nentiny nivoaka nankany amin''ny vavahady izay manatrika ny atsinanana aho, ka norefesiny ny manodidina.'
mg1865::mg_26::42::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 16
  verse_date_revised: '2022-06-21T11:19:37+0000'
  verse_title: null
  verse_text: 'Norefesiny tamin''ny volotara fandrefesana ny lafiny atsinanana, ka indiman-jaton''ny volotara manodidina, raha amin''ny volatara fandrefesana.'
mg1865::mg_26::42::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Norefesiny koa ny lafiny avaratra, ka indiman-jaton''ny volotara manodidina, raha amin''ny volotara fandrefesana.'
mg1865::mg_26::42::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Norefesiny koa ny lafiny atsimo, ka indiman-jaton''ny volotara, raha amin''ny volotara fandrefesana.'
mg1865::mg_26::42::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitodika nankany amin''ny lafiny andrefana izy ka nandrefy indiman-jaton''ny volotara tamin''ny volotara fandrefesana.'
mg1865::mg_26::42::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 42
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Norefesiny avokoa ny lafiny efatra. Nisy ampiantany manodidina, indiman-jaton''ny volotara ny lavany, ary indiman-jatony koa ny sakany, hampiavaka ny masina sy ny tsy masina.'
mg1865::mg_26::43::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 1
  verse_date_revised: '2022-06-25T06:41:48+0000'
  verse_title: 'Ny nidiran''ny voninahitr''i Jehovah ho ao amin''ny tempoly, sy ny teny nampitondrainy tamin''izany'
  verse_text: 'Ary nentiny ho any amin''ny vavahady aho, dia ilay vavahady manatrika ny atsinanana.'
mg1865::mg_26::43::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, tamy ny voninahitr''Andriamanitry ny Isiraely avy tany atsinanana; ary ny feony dia tahaka ny firohondrohon''ny rano be; ary ny tany dia namirapiratra azon''ny voninahiny.'
mg1865::mg_26::43::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tarehin''ny zavatra hitako dia tahaka ny an''ilay efa hitako, fony aho tonga handrava ny tanàna; ary nisy tahaka ny tarehin''ilay efa hitako teo amoron''ny ony Kebara ihany; ka dia nikarapoka nihohoka aho.'
mg1865::mg_26::43::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahitr''i Jehovah dia niditra tamin''ny vavahady manatrika ny atsinanana ho ao an-trano.'
mg1865::mg_26::43::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy fanahy* nanainga ahy ka nitondra ahy niditra ho ao amin''ny kianja anatiny; ary, indro, feno ny voninahitr''i Jehovah ny trano. [*Na: rivotra]'
mg1865::mg_26::43::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia reko fa nisy niteny tamiko tao an-trano; ary nisy lehilahy nitsangana teo anilako.'
mg1865::mg_26::43::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamiko: Ry zanak''olona, eto no hitoeran''ny seza fiandrianako sy hitoeran''ny faladiako, izay honenako mandrakizay eto amin''ny zanak''Isiraely; ary tsy holotoin''ny taranak''Isiraely, na izy na ny mpanjakany, amin''ny fijangajangany sy amin''ny sampin*''ny mpanjakany ao amin''ny fitoerany avo intsony ny anarako masina, [*Hebreo: fatin'']'
mg1865::mg_26::43::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 8
  verse_date_revised: '2022-06-25T06:41:31+0000'
  verse_title: null
  verse_text: 'tamin''ny nametrahany ny tokonam-baravaran''ireny teo anilan''ny tokonam-baravarako sy ny tolanan''ireny teo anilan''ny tolanako, rindrina ihany no teo anelanelako sy ireny, dia nolotoiny tamin''ny fahavetavetana nataony ny anarako masina; ka dia nahalany ringana azy tamin''ny fahatezerako Aho.'
mg1865::mg_26::43::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izao kosa dia aoka hariany lavitra Ahy ny fijangajangany sy ny sampin*'' ny mpanjakany, ka dia honina ao aminy mandrakizay Aho. [*Hebreo: fatin'']'
mg1865::mg_26::43::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, ry zanak''olona, asehoy amin''ny taranak''Isiraely ny trano mba hahamenatra azy ny amin''ny helony, ka dia horefesiny ny mari-trano.'
mg1865::mg_26::43::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha menatra ny amin''izay rehetra efa nataony izy, dia asehoy azy ny endriky ny trano mbamin''ny fombafombany sy ny fivoahana avy ao aminy sy ny fidirana ho ao aminy ary ny endriny rehetra sy ny didy rehetra aminy, eny, ny endriny rehetra ary ny lalàna rehetra aminy; koa soraty eo imasony izany, hitandremany ny endriny rehetra ary ny lalàny rehetra ka hanatanterahany izany.'
mg1865::mg_26::43::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lalàna amin''ny trano: Ho masina dia ho masina avokoa izay rehetra voafaritra ho azy eo an-tampon''ny tendrombohitra. Eny, izany no lalana amin''ny trano.'
mg1865::mg_26::43::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 13
  verse_date_revised: '2022-06-25T06:41:17+0000'
  verse_title: 'Ny amin''ny alitaran''ny fanatitra dorana sy ny fanokanana azy'
  verse_text: 'Ary izao no mariky ny alitara araka ny hakiho, nefa isaky ny hakiho iray dia mihoatra vodivoam-pelatanana noho ny fanao: Ny fara-vodiny dia iray hakiho, ary iray hakiho koa ny sakany, ary ny koronosiny manodidina dia irain-jehy; ireo no fiorenan''ny alitara.'
mg1865::mg_26::43::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatramin''ny fara-vodiny eo amin''ny tany ka hatramin''ny rindriny ambany dia roa hakiho, ary ny sakany dia iray hakiho; ary hatramin''ny rindriny iva ka hatramin''ny rindriny avo dia efatra hakiho; ary ny sakany dia iray hakiho.'
mg1865::mg_26::43::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanambonin''ny alitara* dia ho efatra hakiho, ary eo ambonin''ny fatana** dia hisy tandroka efatra. [*Hebreo: Harela = tendrombohitr''Andriamanitra] [**Hebreo: Ariela = fatan''Andriamanitra, na lion''Andriamanitra, ka tokony ho anaran''ny momba ny fanambonin''ny alitara ireo]'
mg1865::mg_26::43::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 16
  verse_date_revised: '2022-06-25T06:41:00+0000'
  verse_title: null
  verse_text: 'Roa ambin''ny folo hakiho ny lavan''ny fatana, ary roa ambin''ny folo hakiho koa ny sakany, ary efa-joro sokera izy,'
mg1865::mg_26::43::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rindriny dia efatra ambin''ny folo hakiho ny lavany, sy efatra hakiho koa ny sakany, amin''ny lafiny efatra; ary ny koronosiny manodidina dia antsasaky ny hakiho; ary ny fara-vodiny dia iray hakiho manodidina; ary ny ambaratongany dia manatrika ny atsinanana.'
mg1865::mg_26::43::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Ry zanak''olona, izao no lazain''i Jehovah Tompo: Izao no didy ny amin''ny alitara amin''izay andro hanaovana azy, hanaterana fanatitra dorana sy hanopazana rà aminy:'
mg1865::mg_26::43::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 19
  verse_date_revised: '2022-06-25T06:40:52+0000'
  verse_title: null
  verse_text: 'Ny Levita mpisorona, taranak''i Zadoka, izay manatona Ahy hanao fanompoam-pivavahana ho Ahy, dia homenao vantotr''ombilahy iray hatao fanatitra noho ny ota, hoy Jehovah Tompo.'
mg1865::mg_26::43::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hangalanao ny ràny ka hatentinao amin''ny tandrony efatra sy amin''ny zorony efatra amin''ny rindriny ary amin''ny koronosiny manodidina; izany no hanadiovanao* azy sy hanaovanao fanavotana ho azy. [*Ny dikan''ny teny Hebreo amin''ireo dia manafaka ota azy; Levitikosy 8:15]'
mg1865::mg_26::43::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halainao koa ny vantotr''ombilahy hatao fanatitra noho ny ota ka hodorana ao amin''ny fitoerana voatendry ao amin''ny trano ivelan''ny fitoerana masina.'
mg1865::mg_26::43::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro faharoa no hanateranao osilahy tsy misy kilema hatao fanatitra noho ny ota; ary hodioviny* ny alitara tahaka ny nanadiovany* azy tamin''ny vantotr''ombilahy. [*Ny dikan''ny teny Hebreo amin''ireo dia manafaka ota azy; Levitikosy 8:15]'
mg1865::mg_26::43::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita ny anadiovanao* azy, dia hanatitra vantotr''ombilahy tsy misy kilema sy ondrilahy tsy misy kilema ianao. [*Ny dikan''ny teny Hebreo amin''ireo dia manafaka ota azy; Levitikosy 8:15]'
mg1865::mg_26::43::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haterinao eo anatrehan''i Jehovah ireo, ary ny mpisorona handraraka sira eo aminy, dia hanatitra azy ho fanatitra dorana ho an''i Jehovah.'
mg1865::mg_26::43::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no hanateranao osilahy isan''andro hatao fanatitra noho ny ota sy vantotr''ombilahy sy ondrilahy izay tsy misy kilema.'
mg1865::mg_26::43::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hafitoana no hanaovany fanavotana ho an''ny alitara sy hanadiovany azy ary hanokanany* azy. [*Hebreo: hamenoana ny tanany]'
mg1865::mg_26::43::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 43
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra izany andro izany, dia hiantomboka amin''ny andro fahavalo ny hanateran''ny mpisorona ny fanatitra doranareo ao amin''ny alitara sy ny fanati-pihavananareo; ary dia hankasitrahako ianareo, hoy Jehovah Tompo.'
mg1865::mg_26::44::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Lalàna ny amin''ny mpanjaka sy ny mpisorona'
  verse_text: 'Dia nentiny niverina aho tamin''ny lalana mankamin''ny vavahady ivelany amin''ny fitoerana masina, dia ilay manatrika ny atsinanana; ka, indro, nirindrina io.'
mg1865::mg_26::44::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah tamiko: Ity vavahady ity dia hirindrina ka tsy hovohana ary tsy hidiran''olona; fa efa nidiran''i Jehovah, Andriamanitry ny Isiraely, io, ka izany no hirindrinany.'
mg1865::mg_26::44::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 3
  verse_date_revised: '2022-06-25T06:40:42+0000'
  verse_title: null
  verse_text: 'Kanefa kosa ny mpanjaka no mahazo mipetraka ao hihinan-kanina eo anatrehan''i Jehovah, satria mpanjaka izy; amin''ny lalana mankamin''ny lavarangan''ny vavahady no hidirany, ary amin''ny lalana nalehany ihany koa no hivoahany.'
mg1865::mg_26::44::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 4
  verse_date_revised: '2022-03-26T03:17:35+0000'
  verse_title: null
  verse_text: 'Dia nentiny nankamin''ny vavahady avaratra ho eo anoloan''ny trano koa aho, dia hitako fa, indro, feno ny voninahitr''i Jehovah ny tranon''i Jehovah; ka dia nikarapoka nihohoka aho.'
mg1865::mg_26::44::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamiko: Ry zanak''olona, mandiniha tsara, ka mijere amin''ny masonao, ary aoka hohenoin''ny sofinao izay rehetra lazaiko aminao ny amin''ny didy sy ny lalàna rehetra amin''ny tranon''i Jehovah; ary diniho tsara ny fidirana amin''ny trano sy ny fivoahana rehetra avy ao amin''ny fitoerana masina.'
mg1865::mg_26::44::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''ireo maditra, dia ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Aoka izay ny fahavetavetanareo, ry taranak''Isiraely!'
mg1865::mg_26::44::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny nitondranareo vahiny tsy mifora fo na nofo hitoetra ao amin''ny fitoerako masina mba handoto ny tranoko tamin''ny nanateranareo ny haniko, dia ny sabora sy ny rà, ka dia nivadika ny fanekeko ireo ho fanampin''ny fahavetavetanareo rehetra;'
mg1865::mg_26::44::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 8
  verse_date_revised: '2022-06-25T06:40:38+0000'
  verse_title: null
  verse_text: 'ary tsy nitandrina ny anjara-raharaha ny amin''ny fitoerako masina ianareo, fa efa nanendry izay ho mpitandrina ny anjara raharaha ao amin''ny fitoerana masina hisolo anareo.'
mg1865::mg_26::44::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Ny vahiny tsy mifora fo sy nofo rehetra izay ao amin''ny zanak''Isiraely dia tsy misy hahazo miditra ao amin''ny fitoerako masina.'
mg1865::mg_26::44::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia ny Levita aza, izay nanalavitra Ahy tamin''ny nivilian''ny Isiraely, izay nivily niala tamiko ka nanaraka ny sampiny, dia hitondra ny helony izy.'
mg1865::mg_26::44::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 11
  verse_date_revised: '2022-06-25T06:40:33+0000'
  verse_title: null
  verse_text: 'Ary ho mpanao fanompoam-pivavahana ao amin''ny fitoerako masina izy, dia ho mpiadidy ny amin''ny fiandrasana ny vavahadin''ny tempoly* sy ho mpanao fanompoam-pivavahana ao amin''ny tempoly; hisolo ny olona hamono ny fanatitra dorana sy ny fanatitra hafa izy ary hitoetra eo anatrehany hanao fanompoam-pivavahana ho azy. [*Hebreo: trano]'
mg1865::mg_26::44::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nanao fanompoam-pivavahana ho azy teo anatrehan''ny sampiny izy ka tonga fahatafintohinana nahameloka ny taranak''Isiraely, dia izany no nananganako tanana hamely azy ka nilazako fa hitondra ny helony izy, hoy Jehovah Tompo,'
mg1865::mg_26::44::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy hanatona Ahy ho mpisoroko izy, na hanakaiky izay zavatra masina na inona na inona, dia izay zavatra masina indrindra; fa hitambesaran''ny fahamenarany sy ny fahavetavetana nataony izy.'
mg1865::mg_26::44::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 14
  verse_date_revised: '2022-06-25T06:40:22+0000'
  verse_title: null
  verse_text: 'Ary hotendreko ho mpitandrina ny anjara raharaha ny amin''ny trano izy, dia ny fanompoana rehetra sy ny zavatra rehetra atao ao.'
mg1865::mg_26::44::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 15
  verse_date_revised: '2022-06-25T06:40:26+0000'
  verse_title: null
  verse_text: 'Fa ny Levita mpisorona, taranak''i Zadoka kosa, izay nitandrina ny anjara-raharaha ny amin''ny fitoerako masina, tamin''ny nivilian''ny zanak''Isiraely niala tamiko, dia izy no hanatona Ahy hanao fanompoam-pivavahana ho Ahy, ary izy no ho eo anatrehako hanatitra ho Ahy ny sabora sy ny rà, hoy Jehovah Tompo.'
mg1865::mg_26::44::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izy no hiditra ao amin''ny fitoerako masina sy hanatona ny latabatro hanao fanompoam-pivavahana ho Ahy ary hitandrina izay nasaiko hotandremana.'
mg1865::mg_26::44::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha miditra any amin''ny vavahadin''ny kianja anatiny izy, dia hiakanjo rongony fotsy; fa tsy hisy volon''ondry eny aminy, raha manao fanompoam-pivavahana ao am-bavahadin''ny kianja anatiny sy ao anatiny izy.'
mg1865::mg_26::44::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satroka rongony no ho eo an-dohany, ary kalisaona fohy rongony fotsy no ho eo am-balahany, ary tsy hifehy zavatra mahatsemboka azy izy.'
mg1865::mg_26::44::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 19
  verse_date_revised: '2022-06-25T06:40:15+0000'
  verse_title: null
  verse_text: 'Ary raha mivoaka ho any amin''ny kianja ivelany hankany amin''ny olona izy, dia hesoriny ilay fitafiana nentiny nanao fanompoam-pivavahana, ka havelany ao amin''ny efitrano masina, ary hitafy fitafiana hafa izy, fa tsy hanamasina ny olona amin''ireny fitafiany ireny.'
mg1865::mg_26::44::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hanaratra ny lohany izy, nefa kosa tsy hanao lava volo, fa hataony tsara hety.'
mg1865::mg_26::44::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny divay dia tsy hosotroin''izay mpisorona, raha miditra any amin''ny kianja anatiny izy.'
mg1865::mg_26::44::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hanambady vehivavy efa maty vady na izay efa nisaorana izy; fa virijiny avy amin''ny taranak''Isiraely, na izay novinadin''ny mpisorona efa maty no hovadiny.'
mg1865::mg_26::44::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampianatra ny oloko ny tsy fitovian''ny masina sy ny tsy masina izy ary hampahafantatra azy ny tsy fitovian''ny tsy madio sy ny madio.'
mg1865::mg_26::44::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mifanditra, dia ireo no hitsangana hitsara, ka araka ny fitsipiko no hitsarany azy; ary ny lalàko sy ny didiko dia hotandremany amin''ny fotoam-pivavahana rehetra voatendriko, ary ny Sabatako dia hohamasininy.'
mg1865::mg_26::44::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hiditra am-paty handoto ny tenany izy ireny; kanefa raha rainy, na reniny, na zananilahy, na zananivavy, na rahalahiny, na anabaviny tsy manam-bady, dia mahazo miditra am-paty ihany izy.'
mg1865::mg_26::44::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voadio aza izy, dia mbola hampiandrasina hafitoana aloha.'
mg1865::mg_26::44::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro hidirany ao amin''ny fitoerana masina, dia any amin''ny kianja anatiny, hanao fanompoam-pivavahana ao amin''ny fitoerana masina, dia hanatitra ny fanatiny noho ny ota izy, hoy Jehovah Tompo.'
mg1865::mg_26::44::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy lova ho azy, dia Izaho no lovany; ary tsy homenareo zara-tany eo amin''ny Isiraely izy, fa Izaho no anjarany.'
mg1865::mg_26::44::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitra hohanina sy ny fanatitra noho ny ota ary ny fanati-panonerana no hohaniny; ary ny zavatra rehetra izay voatokana* eo amin''ny Isiraely dia ho azy koa. [*Hebreo: herema]'
mg1865::mg_26::44::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny santatry ny voaloham-bokatra rehetra avy amin''ny zavatra rehetra sy ny fanatitra rehetra izay alaina amin''ny zavatra atao fanatitra dia ho an''ny mpisorona; ary ny santatry ny kobanareo voafetafeta dia homenareo ny mpisorona koa, mba hampitoerana fitahiana ao an-tranonao.'
mg1865::mg_26::44::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 44
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra maty ho azy sy izay noviraviraim-biby, na vorona na biby dia samy tsy hohanin''ny mpisorona.'
mg1865::mg_26::45::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny tany homena ho an''ny tempoly sy ny mpisorona sy ny Levita ary ny mpanjaka, ary ny amin''ny zavatra haloa ho an''ny mpanjaka hanaovany fanatitra'
  verse_text: 'Ary rehefa zarainareo araka ny filokana ny tany mba ho lova, dia hisy hatokanareo ho fanatitra ho an''i Jehovah, dia anjara masina amin''ny tany; ny lavany dia indimy arivo sy roa alin''ny volotara, ary ny sakany iray alina. Ho masina any amin''ny faritaniny rehetra manodidina izany.'
mg1865::mg_26::45::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 2
  verse_date_revised: '2022-06-25T06:40:02+0000'
  verse_title: null
  verse_text: 'Ary io dia hanalana efa-joro sokera ho tany masina, dimam-jato ny lavany, ary dimanjato koa ny sakany; ary ho dimam-polo hakiho ny tany manodidina azy.'
mg1865::mg_26::45::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, araka izany fandrefesana izany no handrefesanao* dimy arivo amby roa alina ny lavany, ary iray alina ny sakany; ary ho ao amin''io ny fitoerana masina, dia ny masina indrindra. [*Na: Ary amin''izany voarefy izany dia mbola hisy horefesinao koa, dia]'
mg1865::mg_26::45::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho anjara masina amin''ny tany izany ka ho an''ny mpisorona, mpanao fanompoam-pivavahana ao amin''ny fitoerana masina, dia izay manatona hanao fanompoam-pivavahana ho an''i Jehovah, ary ho fitoeran''ny tranony sy ho tany masina hasiana ny fitoerana masina.'
mg1865::mg_26::45::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany dimy arivo amby roa alina ny lavany, ary iray alina ny sakany, no ho an''ny Levita, mpanao fanompoam-pivavahana ao amin''ny trano; ho zara-tany ho azy izany efi-trano roa-polo.'
mg1865::mg_26::45::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homenareo koa ny zara-tany ho an''ny tanàna, dimy arivo ny sakany, ary dimy arivo amby roa alina ny lavany, mifanolotra amin''ny anjara masina voatokana; ho an''ny taranak''Isiraely rehetra izany.'
mg1865::mg_26::45::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka dia homenareo tany eo andaniny roa amin''ny anjara masina voatokana sy amin''ny tany ho an''ny tanàna, dia ny mifanolotra amin''ny anjara masina voatokana sy ny mifanolotra amin''ny tany ho an''ny tanàna, hatreo amin''ny andrefana mikipaka miankandrefana, ary hatreo amin''ny atsinanana mikipaka miantsinanana; ary ny sakany*, dia mifanolotra amin''ireo anjaran''ny firenena, na amin''ny andrefana na amin''ny atsinanana. [*Hebreo: lavany]'
mg1865::mg_26::45::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho taniny izany, dia anjara ho azy ao amin''ny Isiraely, ary ireo mpanjaka voahosotro* dia tsy hampahory ny oloko intsony, fa hahafoy ny tany ho an''ny taranak''Isiraely isam-pireneny. [*Hebreo: mpanjakako]'
mg1865::mg_26::45::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Aoka izay, ry mpanjakan''ny Isiraely! Ajanony ny halozana sy ny fampahoriana, ary manaova fitsarana sy fahamarinana; atsaharo ny fandroahanareo ny oloko, hoy Jehovah Tompo.'
mg1865::mg_26::45::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mizana marina sy efaha marina ary bata marina no aoka hotananareo.'
mg1865::mg_26::45::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitovy fatra ny efaha sy ny bata, ary ny bata hahalany ny ampahafolon''ny homera, ary ny efaha koa dia ampahafolon''ny homera: ny homera no mariky ny fatrany.'
mg1865::mg_26::45::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sekely dia roa-polo gera; sekely roa-polo sy dimy amby roa-polo ary dimy ambin''ny folo no ho manenareo.'
mg1865::mg_26::45::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no zavatra haloanareo: Ny ampahenin''ny efaha isaky ny homeran''ny vary tritika; ary haloanareo koa ny ampahenin''ny efaha isaky ny homeran''ny vary hordea;'
mg1865::mg_26::45::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny didy ny amin''ny diloilo (ny diloilo iray bata) dia ampahafolon''ny bata isaky ny kora; fa ny homera dia misy bata folo, satria bata folo no homera iray.'
mg1865::mg_26::45::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ondry iray isan-droanjato amin''ny tanin''ny Isiraely izay azon-drano no haloanareo hatao fanatitra hohanina sy fanatitra dorana ary fanati-pihavanana, mba hanaovana fanavotana ho an''ny vahoaka, hoy Jehovah Tompo.'
mg1865::mg_26::45::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vahoaka rehetra no handoa izany ho an''ny mpanjakan''ny Isiraely.'
mg1865::mg_26::45::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 17
  verse_date_revised: '2022-06-25T06:39:57+0000'
  verse_title: null
  verse_text: 'Fa ny mpanjaka kosa no hiantoka ny fanatitra dorana sy ny fanatitra hohanina ary ny fanatitra aidina amin''ny andro firavoravoana sy ny voaloham-bolana ary ny Sabata, dia amin''ny fotoam-pivavahana rehetra tandreman''ny taranak''Isiraeb; eny, izy no hiantota ny fanatitra noho ny ota sy ny fanatitra hohanina sy ny fanatitra dorana ary ny fanati-Pihavanana, mba hanaovana fanavotana ho an''ny taranak''Isiraely'
mg1865::mg_26::45::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny amin''ny andro firavoravoana sy ny fanatitra isan''andro'
  verse_text: 'Izao no lazain''i Jehovah Tompo: Raha mby amin''ny andro voalohany amin''ny volana voalohany dia haka vantotr''ombilahy tsy misy kilema ianao ka hanadio* ny fitoerana masina. [*Hebreo: hanafaka ota]'
mg1865::mg_26::45::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hangalan''ny mpisorona ny ran''ny fanatitra noho ny ota ka hatentiny amin''ny tolan''ny trano sy amin''ny zoro efatra amin''ny rindrin''ny alitara ary amin''ny tolan''ny vavahadin''ny kianja anatiny.'
mg1865::mg_26::45::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa no hataonao amin''ny andro fahafito amin''ny volana ho an''ny olona manota tsy nahy, na noho izy kely saina, ka dia hanao fanavotana ho an''ny trano ianareo.'
mg1865::mg_26::45::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro fahefatra ambin''ny folo amin''ny volana voalohany no hanaovanareo ny Paska; andro firavoravoana hafitoana izany, ka mofo tsy misy masirasira no hohanina.'
mg1865::mg_26::45::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany ny mpanjaka dia hanatitra vantotr''ombilahy iray hatao fanatitra noho ny ota ho an''ny tenany sy ny vahoaka rehetra.'
mg1865::mg_26::45::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro firavoravoana hafitoana dia hanatitra fanatitra dorana isan''andro mandritra ny hafitoana ho an''i Jehovah izy, dia vantotr''ombilahy fito sy ondrilahy fito tsy misy kilema, ary osilahy iray isan''andro hataony fanatitra noho ny ota.'
mg1865::mg_26::45::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanatitra ny fanatitra hohanina koa izy, dia iray efaha isam-bantotr''ombilahy sy iray efaha isan-ondrilahy, ary diloilo eran''ny hina isan-efaha.'
mg1865::mg_26::45::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 45
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro fahadimy ambin''ny folo amin''ny volana fahafito, amin''ny andro firavoravoana, dia hanatitra tahaka izany koa hafitoana izy, na ny fanatitra noho ny ota, na ny fanatitra dorana, na ny fanatitra hohanina, na ny diloilo.'
mg1865::mg_26::46::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny mpanjaka sy ny fanatitra hataony sy ny hataon''ny vahoaka, sy ny zavatra homeny ho an''ny zanany sy ny mpanompony, ary ny amin''ny fahandroana ny fanatitra naterin''ny vahoaka'
  verse_text: 'Izao no lazain''i Jehovah Tompo: Ny vavahadin''ny kianja anatiny izay manatrika ny atsinanana dia harindrina mandritra ny henemana fanaovan-draharaha; fa amin''ny Sabata sy amin''ny andro voaloham-bolana kosa no hivoha izy.'
mg1865::mg_26::46::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiditra avy any ivelany amin''ny lalana mankamin''ny lavarangan''ny vavahady ny mpanjaka ka hijanona eo anilan''ny tolam-bavahady, ary ny fanatitra dorany sy ny fanati-pihavanany dia haterin''ny mpisorona, ary ny mpanjaka hiankohoka eo amin''ny tokonam-bavahady, dia hivoaka izy; ary tsy hirindrina ny vavahady, raha tsy efa hariva ny andro.'
mg1865::mg_26::46::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka koa hiankohoka eo anatrehan''i Jehovah eo am-bavahady amin''ny Sabata sy amin''ny andro voaloham-bolana.'
mg1865::mg_26::46::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatitra dorana izay haterin''ny mpanjaka ho an''i Jehovah amin''ny andro Sabata dia zanak''ondry enina tsy misy kilema sy ondrilahy iray tsy misy kilema koa.'
mg1865::mg_26::46::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanatitra hohanina fanampin''ilay ondrilahy iray dia iray efaha, ary ny fanatitra hohanina fanampin''ireo zanak''ondry dia araka izay tiany*, ary ny diloilo iray hina isan''efaha. [*Na: tratry ny ananany]'
mg1865::mg_26::46::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''ny andro voaloham-bolana dia vantotr''ombilahy iray tsy misy kilema sy zanak''ondry enina ary ondrilahy iray; samy tsy hisy kilema ireo.'
mg1865::mg_26::46::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanatitra fanatitra hohanina izy, dia iray efaha isam-bantotr''ombilahy sy iray efaha isan-ondrilahy koa; ary ny amin''ny zanak''ondry dia araka izay tiany*, ary ny diloilo dia iray hina isan''efaha. [*Na: tratry ny ananany]'
mg1865::mg_26::46::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha miditra ny mpanjaka, dia amin''ny lalana mankamin''ny lavarangan''ny vavahady no hidirany ary amin''ny lalana nalehany ihany koa no hivoahany.'
mg1865::mg_26::46::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny vahoaka kosa no miditra ho eo anatrehan''i Jehovah amin''ny fotoam-pivavahana, dia izay miditra amin''ny vavahady avaratra hiankohoka dia hivoaka amin''ny vavahady atsimo kosa; ary izay miditra amin''ny vavahady atsimo dia hivoaka amin''ny vavahady avaratra kosa: tsy hiverina amin''ilay vavahady nidirany izy, fa amin''izay tandrifiny ihany no hivoahany'
mg1865::mg_26::46::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka dia hiara-miditra amin''ireo, ary raha mivoaka ireo, dia hiara-mivoaka aminy.'
mg1865::mg_26::46::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro firavoravoana sy ny fotoam-pivavahana dia iray efaha no ho fanatitra hohanina isam-bantotr''ombilahy iray, ary iray efaha isan-ondrilahy iray, ary ny amin''ny zanak''ondry, dia araka izay tiany*, ary ny diloilo dia eran''ny hina isan-efaha. [*Na: tratry ny ananany]'
mg1865::mg_26::46::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 12
  verse_date_revised: '2022-06-25T06:39:51+0000'
  verse_title: null
  verse_text: 'Ary raha ny mpanjaka no manatitra fanatitra dorana na fanati-pihavanana ho fanatitra sitrapo ho an''i Jehovah, dia hovohana ho azy ny vavahady manatrika ny atsinanana, dia hateriny ny fanatitra dorany sy ny fanati-pihavanany, tahaka izay ataony amin''ny Sabata; ary rehefa tafavoaka izy, dia harindrina ny vavahady.'
mg1865::mg_26::46::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary zanak''ondry anankiray iray taona tsy misy kilema no haterinao isan''andro ho fanatitra dorana ho an''i Jehovah; isa-maraina no hanateranao azy.'
mg1865::mg_26::46::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanatitra fanatitra hohanina ho fanampiny isa-maraina ianao, dia ampahenin''ny efaha sy diloilo ampahatelon''ny hina handemana ny koba tsara toto; fanatitra hohanina ho an''i Jehovah izany: lalàna tsy miova mandrakizay izany.'
mg1865::mg_26::46::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany no anatero ny zanak''ondry sy ny fanatitra hohanina ary ny diloilo isa-maraina ho fanatitra mandrakariva.'
mg1865::mg_26::46::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah Tompo: Raha manome zavatra ho an''ny anankiray amin''ny zanany ny mpanjaka, dia ho lovan''ny zanany izany; eny, ho zara-lovany izany.'
mg1865::mg_26::46::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manome zavatra avy amin''ny lovany ho an''ny anankiray amin''ny mpanompony kosa izy, dia ho azy mandra-pahatongan''ny taona fanafahana ihany izany; dia hiverina ho amin''ny mpanjaka indray izany ka ho lova ho an''ny zanany ihany.'
mg1865::mg_26::46::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy haka amin''ny lovan''ny vahoaka hampiala azy amin''ny zara-taniny izy; fa homeny lova avy amin''ny fananany ihany ny zanany, mba tsy hielezan''ny oloko hiala amin''ny zara-taniny.'
mg1865::mg_26::46::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny niditra tamin''ny fidirana eo anilan''ny vavahady aho ho ao amin''ireo efi-trano masin''ny mpisorona, izay manatrika ny avaratra; ary, indro, nisy fitoerana teo amin''ny faran''ny andrefana.'
mg1865::mg_26::46::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 20
  verse_date_revised: '2022-06-25T06:39:46+0000'
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Io no fitoerana fahandroan''ny mpisorona ny fanati-panonerana sy ny fanatitra noho ny ota sy hanendasany ny fanatitra hohanina, mba tsy hitondrany azy mivoaka ho any amin''ny kianja ivelany hanamasina ny olona.'
mg1865::mg_26::46::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny nivoaka ho any amin''ny kianja ivelany aho ka nampiteteziny ny zorony efatra amin''ny kianja; ary, indro, ao amin''ny isan-joron''ny kianja dia nisy kianja hafa koa.'
mg1865::mg_26::46::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teny amin''ny zorony efatra amin''ny kianja dia nisy kianja nofefena, efa-polo hazizo avy ny lavany, ary telo-polo avy ny sakany; mitovy ohatra ireo an-jorony efatra ireo.'
mg1865::mg_26::46::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy rafitra teo anatiny manodidina azy, dia manodidina ireo efatra ireo, izay nisy fahandroana ambanin''izany rafitra manodidina izany.'
mg1865::mg_26::46::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 46
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Ireto no tranon''ny mpahandro, izay fahandroan''ny mpanao fanompoam-pivavahana eto an-trano ny fanatitra halatsa-drà aterin''ny olona.'
mg1865::mg_26::47::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny onin''ny ranon''aina'
  verse_text: 'Dia nentiny niverina ho eo amin''ny varavaran''ny trano aho; ary, indro, nisy rano niboika avy eo atsinanana eo ambanin''ny tokonan''ny trano; fa manatrika ny atsinanana ny trano, ary ny rano nidina avy teo ambanin''ny lafiny ankavanan''ny trano teo atsimon''ny alitara.'
mg1865::mg_26::47::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny nivoaka tamin''ny lalana mankamin''ny vavahady avaratra aho ka nampandehaniny manodidina tamin''ny lalana ivelany, hankany amin''ny vavahady ivelany, dia teo amin''ny lalana manatrika ny atsinanana, ary, indro, nisy rano nipoitra avy teo amin''ny ilany ankavanana.'
mg1865::mg_26::47::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha niantsinanana ralehilahy, nisy famolaina teny an-tanany, ka nandrefy arivo hakiho izy, dia nampitainy ny rano aho, ka hakitrokely ny rano.'
mg1865::mg_26::47::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrefy arivo hakiho indray izy, dia nampitainy ny rano aho, ka halohalika ny rano. Ary nandrefy arivo hakiho indray izy, dia nampitainy aho, ka havalahana ny rano.'
mg1865::mg_26::47::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrefy arivo hakiho indray koa izy, ary efa ony tsy azo itana, fa efa nihalalina ny rano, dia rano holanosina, eny, ony tsy azo itana.'
mg1865::mg_26::47::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Ry zanak''olona, efa hitanao va izany? Dia nitondra ahy niverina ho eny amoron''ny ony izy.'
mg1865::mg_26::47::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niverina aho, indro, nisy hazo betsaka teny amoron''ny ony, dia teny an-daniny roa.'
mg1865::mg_26::47::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Ity rano ity dia mivoaka hankany amin''ny tany atsinanana, dia midina any amin''ny tani-hay* ka miditra eo amin''ny ranomasina; ary rehefa tonga eo an-dranomasina izy, dia sitrana ny rano. [*Hebreo: Arabà]'
mg1865::mg_26::47::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zava-manan''aina rehetra sesehena na aiza na aiza alehan''ny ony tondraka* dia ho velona, ka hisy hazandrano sesehena; fa nony tonga ao ity rano ity, dia ho sitrana izy, ary ho velona izay rehetra hidiran''ny ony. [*Hebreo: ony roa]'
mg1865::mg_26::47::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy mpaka hazandrano hitsangana eny amorony hatrany En-jedy ka hatrany En-eglaima; ho famelarana harato izany; ary ny hazandranony ho maro karazana, tahaka ny hazandrano betsaka dia betsaka any amin''ny Ranomasina Lehibe.'
mg1865::mg_26::47::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny honahona sy ny heniheny dia tsy hositranina, fa havela ho sira.'
mg1865::mg_26::47::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eny amoron''ny ony, eny an-daniny roa, no anirian''ny hazo rehetra fihinam-boa; tsy halazo ny raviny, na ho lany ny voany; fa hamoa voa vaovao isam-bolana izy, satria mivoaka avy ao amin''ny fitoerana masina ny ranony; ary ho fihinana ny voany, ary ho fanafody ny raviny.'
mg1865::mg_26::47::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny ho faritry ny Tany Masina, sy ny hizarana azy, ary ny ho toetry ny Tanànan''Andriamanitra'
  verse_text: 'Izao no lazain''i Jehovah Tompo: Izao no faritry ny tany hozarainareo ho lova araka ny firenen''Isiraely roa ambin''ny folo; anjaran-droa no ho an''i Josefa.'
mg1865::mg_26::47::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy handova avokoa ianareo rehetra, satria efa nanangan-tanana hanome ity ho an''ny razanareo Aho, ka dia ho azonareo ho lova ity tany ity.'
mg1865::mg_26::47::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no faritry ny tany: Ny lafiny avaratra dia hatramin''ny Ranomasina Lehibe amin''ny lalana mankany Hetlona ka hatrany akaikin''i zedada,'
mg1865::mg_26::47::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Hamata, Berota, Sibraima, izay eo anelanelan''ny faritanin''i Damaskosy sy ny faritanin''i Hamata, Hazara afovoany, izay eo an-tsisin''i Haorana.'
mg1865::mg_26::47::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faritaniny dia hatramin''ny ranomasina, dia Hazar-enana, faritanin''i Damaskosy, ary amin''ny avaratra dia Hamata no faritaniny. Izany no lafiny avaratra.'
mg1865::mg_26::47::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lafiny atsinanana hatrany anelanelan''i Haorana sy Damaskosy sy Gileada ary ny tanin''ny Isiraely dia Jordana; hatramin''ny faritany ka hatreo amoron''ny ranomasina atsinanana no horefesinareo. Izany no lafiny atsinanana.'
mg1865::mg_26::47::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lafiny atsimo dia hatrany Tamara dia hatramin''ny ranon''i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin''ny Ranomasina Lehibe. Izany no lafiny atsimo.'
mg1865::mg_26::47::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lafiny andrefana koa dia ny Ranomasina Lehibe hatramin''ny faritany ka hatrany akaikin''i Hamata. Izany no lafiny andrefana.'
mg1865::mg_26::47::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hozarainareo ho anareo izany tany izany araka ny firenen''Isiraely.'
mg1865::mg_26::47::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny filokana no hizaranareo azy ho lovanareo sy ny vahiny monina ao aminareo, izay miteraka ao aminareo; ka izy dia hataonareo ho tahaka ny tena zanak''Isiraely; hiara-manao filokana aminareo hiara-mandova amin''ny firenen''Isiraely izy.'
mg1865::mg_26::47::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 47
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izay firenena hitoeran''ny vahiny dia ao no hanomezanareo azy ny lovany, hoy Jehovah Tompo.'
mg1865::mg_26::48::1:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no anaran''ny firenena: Hatramin''ny farany avaratra any amoron-dranomasina amin''ny lalana mankany Hetlona any akaikin''i Hamata sy Hazar-enana, faritanin''i Damaskosy eo avaratra, any anilan''i Hamata; izany no ho lafiny atsinanana sy andrefana; anjara iray ho an''i Dana.'
mg1865::mg_26::48::2:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Dana hatrany atsinanana ka hatrany andrefana dia iray koa ho an''i Asera.'
mg1865::mg_26::48::3:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Asera, hatrany atsinanana ka hatrany andrefana dia iray koa ho an''i Naftaly.'
mg1865::mg_26::48::4:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Naftaly, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Manase,'
mg1865::mg_26::48::5:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Manase, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Efraima.'
mg1865::mg_26::48::6:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 6
  verse_date_revised: '2022-06-25T06:39:32+0000'
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Efraima, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Robena.'
mg1865::mg_26::48::7:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Robena, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Joda.'
mg1865::mg_26::48::8:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Joda, hatrany atsinanana ka hatrany andrefana, no hisian''ilay tany hatokanareo, indimy arivo amby roa alin''ny volotara ny sakany, ary ny lavany mitovy amin''ny anjaran''ny sasany hatrany atsinanana ka hatrany andrefana; ary ny fitoerana masina no ho eo afovoany.'
mg1865::mg_26::48::9:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany izay hatokanareo ho an''i Jehovah, dia dimy arivo amby roa alina ny lavany, ary iray alina ny sakany.'
mg1865::mg_26::48::10:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''ny mpisorona izany tany masina voatokana izany, dimy arivo amby roa alina ny lavany avaratra, ary iray alina ny sakany andrefana, ary iray alina ny sakany atsinanana, ary dimy arivo amby roa alina ny lavany atsimo; ary ny fitoerana masin''i Jehovah no ho eo afovoany.'
mg1865::mg_26::48::11:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 11
  verse_date_revised: '2022-06-25T06:39:28+0000'
  verse_title: null
  verse_text: 'Ho an''ny mpisorona izay nohamasinina avy amin''ny taranak''i Zadoka izany, dia ireo nitandrina ny nasaiko notandremana ka tsy nivily tamin''ny nivilian''ny zanak''Isiraely, tahaka ny nivilian''ny Levita,'
mg1865::mg_26::48::12:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, ho azy izany ho tany halaina amin''ilay efa voatokana, dia zavatra masina indrindra, mifanolotra amin''ny faritanin''ny Levita.'
mg1865::mg_26::48::13:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita koa dia hahazo ny mifanolotra amin''ny faritanin''ny mpisorona, dia dimy arivo amby roa alina ny lavany, ary iray alina ny sakany, eny, samy dimy arivo amby roa alina ny lavany, sy iray alina ny sakany.'
mg1865::mg_26::48::14:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ho azony hamidy izany, na hatakalo, ary tsy hafindrany ny voaloham-bokatra amin''ny tany; fa masina ho an''i Jehovah izany.'
mg1865::mg_26::48::15:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny dimy arivo, ilay navela tamin''ny sakany mifanolotra amin''ny dimy arivo amby roa alina, dia tsy masina, fa ho an''ny tanàna, ho fonenana sy ho tany fiandrasana; ary ny tanàna no ho ao afovoany.'
mg1865::mg_26::48::16:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 16
  verse_date_revised: '2022-06-25T06:39:14+0000'
  verse_title: null
  verse_text: 'Ary izao no ohany: Ny avaratra ho diman-jato amby efatra arivo, ary ny atsimo ho diman-jato amby efatra arivo, ary ny atsinanana ho diman-jato amby efatra arivo, ary ny andrefana ho diman-jato amby efatra arivo.'
mg1865::mg_26::48::17:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny tany fiandrasana momba ny tanàna, ny eo amin''ny avaratra dia ho dimam-polo amby roan-jato, ary ny eo amin''ny atsinanana dia ho dimam-polo amby roan-jato, ary ny eo amin''ny andrefana dia ho dimam-polo amby roan-jato.'
mg1865::mg_26::48::18:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lavany sisa mifanolotra amin''ny anjara masina voatokana dia iray alina atsinanana ary iray alina andrefana, ary hifanolotra amin''ny anjara masina voatokana izany; ary ny vokany hohanin''ny mpiasa ao an-tanàna.'
mg1865::mg_26::48::19:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mpiasa ao an-tanàna avy amin''ny firenen''Isiraely rehetra no hiasa azy.'
mg1865::mg_26::48::20:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany voatokana rehetra dia dimy arivo amby roa alina sokera; ny ampahefatry ny anjara masina voatokana dia halainareo ho zara-tany momba ny tanàna.'
mg1865::mg_26::48::21:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 21
  verse_date_revised: '2022-06-25T06:39:09+0000'
  verse_title: null
  verse_text: 'Ary ho an''ny mpanjaka ny sisa an-daniny roa amin''ny anjara masina voatokana sy ny zara-tany momba ny tanàna; mifanolotra amin''ny dimy arivo amby roa alina amin''ny anjara voatokana hatramin''ny faritany atsinanana, ary mifanolotra amin''ny dimy arivo amby roa alina hatramin''ny faritany andrefana, mifanolotra amin''ireo anjaran''ny sasany, ho an''ny mpanjaka izany; ary ny anjara masina voatokana sy ny trano fitoerana masina no ho eo afovoany.'
mg1865::mg_26::48::22:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 22
  verse_date_revised: '2022-03-24T00:00:00+0000'
  verse_title: null
  verse_text: 'Ary hatramin''ny zara-tanin''ny Levita sy ny zara-tany momba ny tanàna, sy ao ampovoan''ny an''ny mpanjaka, anelanelan''ny faritanin''i Joda sy Benjamina, dia ho an''ny mpanjaka izany.'
mg1865::mg_26::48::23:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny firenena sisa, dia hatramin''ny lafiny atsinanana ka hatramin''ny andrefana, dia hisy anjara iray ho an''i Benjamina.'
mg1865::mg_26::48::24:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Benjamina, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Simeona.'
mg1865::mg_26::48::25:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Simeona, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''Isakara.'
mg1865::mg_26::48::26:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''Isakara, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Zebolona.'
mg1865::mg_26::48::27:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Zebolona, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Gada.'
mg1865::mg_26::48::28:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanolotra amin''ny faritanin''i Gada, amin''ny lafiny atsimo, dia hatrany Tamara sy ny ranon''i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin''ny Ranomasina Lehibe.'
mg1865::mg_26::48::29:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 29
  verse_date_revised: '2022-06-25T06:39:03+0000'
  verse_title: null
  verse_text: 'Izany no tany hozarainareo amin''ny filokana ho an''ny firenen''Isiraely ho lovany, ary izany no ho anjarany avy, hoy Jehovah Tompo.'
mg1865::mg_26::48::30:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ohatry ny tanàna amin''ny lafiny avaratra: diman-jato amby efatra arivo.'
mg1865::mg_26::48::31:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ny vavahady dia ho toy ny anaran''ny firenen''Isiraely: ny vavahady telo avaratra, dia vavahadin''i Robena ny iray vavahadin''i Joda ny iray, vavahadin''i Levy ny iray.'
mg1865::mg_26::48::32:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny atsinanana dimanjato amby efatra arivo; ary ny vavahady telo, dia vavahadin''i Josefa ny iray, vavahadin''i Benjamina ny iray, ary vavahadin''i Dana ny iray.'
mg1865::mg_26::48::33:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny atsimo diman-jato amby efatra arivo ohatra, ary ny vavahady telo, dia vavahadin''i Simeona ny iray, vavahadin''Isakara ny iray, vavahadin''i Zebolona ny iray.'
mg1865::mg_26::48::34:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andrefana dimanjato amby efatra arivo sy vavahady telo, dia vavahadin''i Gada ny iray, vavahadin''i Asera ny iray, vavahadin''i Naftaly ny iray.'
mg1865::mg_26::48::35:
  verse_version: mg1865
  verse_book: mg_26
  verse_chapter: 48
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valo arivo amby iray alina ny manodidina. Ary ny anaran''ny tanàna hatramin''izay andro izay dia Jehovah no ao.'
