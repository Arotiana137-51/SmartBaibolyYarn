mg1865::mg_25::1::1:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Alahelo noho ny nanjo ny :Joda sy Jerosalema'
  verse_text: 'Indrisy, mitoetra manirery izao ilay tanàna feno olona! Efa tonga toy ny mpitondratena izy! Ilay nalaza tamin''ny firenena sy andriambavy tamin''ny tany samy hafa dia efa miankin-doha kosa izao!'
mg1865::mg_25::1::2:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitomany dia mitomany izy nony alina, ary ny ranomasony dia eny an-takolany; Izay rehetra tia azy dia tsy misy mampionona azy; Ny sakaizany rehetra efa nivadika taminy ka tonga fahavalony.'
mg1865::mg_25::1::3:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasan-ko babo* ny Joda noho ny fahoriana sy ny haben''ny fanompoana; Mipetraka ao amin''ny jentilisa izy, nefa tsy mahita fitsaharana; Izay rehetra nanenjika azy dia nahatratra azy teo an-ketena. [*Na: Lasa nivahiny]'
mg1865::mg_25::1::4:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo lalana mankany Ziona dia mitomany, satria tsy misy miakatra ho amin''ny fotoam-pivavahana; Lao* ny vavahadiny rehetra, misento ny mpisorony; Ory ny virijinany, ary Ziona dia efa azon''ny fahoriana mangidy. [*Na: Rava]'
mg1865::mg_25::1::5:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rafiny no mpanapaka*, ny fahavalony no miadana, Satria Jehovah no efa nampahory azy noho ny hamaroan''ny fahotany; Ny zanany madinika dia lasan-ko babo eo anoloan''ny fahavalony, [*Hebreo: loha]'
mg1865::mg_25::1::6:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahitr''i Ziona zanakavavy rehetra dia efa tsy ananany intsony; Ny mpanapaka azy dia toy ny diera tsy mahita ahitra, Ary mandeha reraka eo anoloan''ny mpanenjika azy izy.'
mg1865::mg_25::1::7:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsaroan''i Jerosalema amin''ny andro fahoriany sy fanjenjenany ny zava-tsoa rehetra izay nananany hatry ny ela; Fa nony naripaky ny fahavalo ny olony, ka tsy nisy namonjy azy, dia nahita azy ny fahavalo ka nihomehy ny faharavany*. [*Hebreo: fitsaharany]'
mg1865::mg_25::1::8:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanota dia nanota Jerosalema. ka izany no nahatonga azy ho fahavetavetana; izay rehetra nanaja azy dia mamingavinga azy, satria efa nahita ny fitanjahany ireny; Eny, na ny tenany aza dia miferinaina sady miamboho.'
mg1865::mg_25::1::9:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lotony dia teo amin''ny moron-tongotr''akanjony, tsy nitsapa farany izy; Dia mahagaga ny fietreny, tsy misy mampionona azy. Jehovah o, jereo ny fahoriako, fa mirehareha ny fahavalo.'
mg1865::mg_25::1::10:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahavalo naninjitra ny tanany naka ny zava-tsoany rehetra; Fa ny jentilisa, izay noraranao tsy hiditra amin''ny fiangonanao, dia hitany tafiditra ao amin''ny fitoerany masina.'
mg1865::mg_25::1::11:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misento ny olony rehetra, mitady hanina; Eny, atakalony hanina ny zava-tsoany hamelombelona ny ainy; Jehovah o, jereo ka diniho, fa vingavingaina aho.'
mg1865::mg_25::1::12:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy mampaninona anareo va, ry mpandalo rehetra? Jereo sy izahao raha mba misy fahoriana toy ny fahoriako, izay namelezany ahy, dia ilay nampahorian''i Jehovah ahy tamin''ny andro firehetan''ny fahatezerany.'
mg1865::mg_25::1::13:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tany amin''ny avo no nandatsahany afo ho amin''ny taolako handoroany azy; Namela-pandrika harato haningorana ny tongotro Izy ka nampihemotra ahy; Nampahalao sy nampahareraka ahy mandritra ny andro Izy.'
mg1865::mg_25::1::14:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ziogan''ny fahotako nofehezin''ny tanany; Voaolana ireny ka tonga eo an-katoko; noketrahiny ny heriko; Natolotry ny Tompo ho eo an-tanan izay tsy leoko aho.'
mg1865::mg_25::1::15:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataon''ny Tompo tsinontsinona ny maheriko rehetra; Nanendry fotoana hamelezana ahy Izy, handringanana ny zatovoko; Ny Tompo nanosihosy an''i Joda zanakavavy virijina toy ny eo amin''ny famiazam-boaloboka.'
mg1865::mg_25::1::16:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany no mampitomany ahy; e! ny masoko, ny masoko mamarin-dranomaso, fa lavitra ahy ny mpampionona izay tokony hamelombelona ny fanahiko; Ringana ny zanako, fa mahery ny fahavalo.'
mg1865::mg_25::1::17:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ziona mananty tanana, nefa tsy misy mampionona azy; Jehovah nandidy ny amin''i Jakoba mba ho tonga fahavalony ny manodidina azy; Jerosalema dia tonga fahavetavetana eo afovoan''ireo.'
mg1865::mg_25::1::18:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina Jehovah, fa efa nandà ny teniny aho; Ry firenena rehetra, masïna ianareo, mba jereo ny fahoriako; Lasan-ko babo ny virijinako sy ny zatovoko.'
mg1865::mg_25::1::19:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nantsoiko ireo tia ahy, fa nofitahiny aho; Ny mpisoroko sy ny loholoko niala aina tao an-tanana, Tamin''ny nitadiavany hanina hamelombelona ny ainy.'
mg1865::mg_25::1::20:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahao, Jehovah o, fa azom-pahoriana aho, mandevilevy ny foko; Miontana ato anatiko ny foko, fa naditra dia naditra aho; Eny ivelany dia ny sabatra no mahafoana anaka, ary ao an-trano dia toa misy fahafatesana kosa.'
mg1865::mg_25::1::21:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Reny fa misento aho; tsy misy mampionona ahy; Ny fahavaloko rehetra nandre ny fahoriako, ka faly izy, satria Ianao no nanao izany; Hahatonga izay andro nantsoinao Ianao, ka dia ho tonga tahaka ahy koa ireo.'
mg1865::mg_25::1::22:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tonga eo anatrehanao ny faharatsiany rehetra, ary mba ataovy aminy kosa tahaka izay nataonao tamiko noho ny fahotako rehetra; Fa imbetsaka ny fisentoako, ka reraka ny foko.'
mg1865::mg_25::2::1:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitomaniana noho ny nanjo an''i Ziona sy ny Joda'
  verse_text: 'Indrisy! Ziona zanakavavy dia saronan''ny Tompo rahona amin''ny fahatezerany; Nazerany avy tany an-danitra ho amin''ny tany ny reharehan''ny Isiraely, Ary tsy tsaroany ny fitoeran-tongony tamin''ny andro fahatezerany!'
mg1865::mg_25::2::2:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nolevonin*''ny Tompo ny fonenan''i Jakoba rehetra, fa tsy niantrany; Noravany an-katezerana ny fiarovan''i Joda zanakavavy ka nazerany tamin''ny tany, tsy nohamasininy ny fanjakana sy ny mpanapaka, [*Hebreo: Natelin'']'
mg1865::mg_25::2::3:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nokapainy tamin''ny fahatezerany mirehitra ny tandroky ny Isiraely rehetra; Nahemony teo anoloan''ny fahavalo ny tanany ankavanana; Ary nandoro an''i Jakoba Izy toy ny lelafo miredareda izay nandevona manodidina.'
mg1865::mg_25::2::4:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanenjana ny tsipïkany toy ny fahavalo Izy, nijoro naninjitra ny tanany ankavanana toy ny rafilahy Izy ka nandripaka izay rehetra mahafinaritra ny maso; Ny fahatezerany dia naidiny toy ny afo tamin''ny lain''i Ziona zanakavavy.'
mg1865::mg_25::2::5:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Tompo dia tonga toy ny fahavalo ka nandevona* ny Isiraely. Eny, nolevoniny** ny lapany rehetra, sady noravany ny fiarovany; Ary nampitomboiny ny fisentoana sy ny fitarainan''i Joda zanakavavy. [*Hebreo: nitelina] [**Hebreo: nateliny]'
mg1865::mg_25::2::6:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noravany an-keriny toy ny tanimboly ilay nofefena ho Azy, sady noravany ny trano fihaonany; Nataon''i Jehovah hadino tao Ziona ny fotoam-pivavahana sy ny Sabata, ka nolaviny tamin''ny fahatezerany mirehitra ny mpanjaka sy ny mpisorona.'
mg1865::mg_25::2::7:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alitarany narian''ny Tompo, ny fitoerany masina nolaviny; Natolony ho eo an-tanan''ny fahavalo ny mandan''ny lapa ao Ziona; Nanandratra ny feony tao an-tranon''i Jehovah toy ny amin''ny fotoam-pivavahana ireny.'
mg1865::mg_25::2::8:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah ninia handrava ny mandan''i Ziona zanakavavy; Nanenjana ny famolaina Izy ka tsy namonkina ny tanany tsy handrava*; dia mampitomany ny fiarovany ivelany sy ny manda Izy, ka miara-dreraka ireo. [*Hebreo: hitelina]'
mg1865::mg_25::2::9:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavahadiny dia tototry ny tany, nosimbany sy notapatapahiny ny hidiny; Ny mpanjakany sy ny mpanapaka azy efa mby any amin''ny firenena; Tsy misy lalàna intsony, fa na ny mpaminaniny aza dia tsy mahita fahitana avy amin''i Jehovah.'
mg1865::mg_25::2::10:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipetraka amin''ny tany ny loholon''i Ziona zanakavavy ka mangina; Nasiany vovoka ny lohany, misikina lamba fisaonana izy; Ny virijina any Jerosalema nampitanondrika ny lohany ho amin''ny tany.'
mg1865::mg_25::2::11:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Pahina ny masoko azon''ny ranomaso, mandevilevy ny foko; Naidina tamin''ny tany ny atiko noho ny fandringanana ny oloko zanakavavy, sy noho ny ankizy madinika sy ny zaza minono izay ana eny an-kalalahana ao an-tanàna.'
mg1865::mg_25::2::12:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ana toy ny voatrobaka eny an-kalalahana ao an-tanana izy, na miala aina eo am-pofoan-dreniny, dia manontany an-dreniny hoe izy: aiza izay vary sy divay?'
mg1865::mg_25::2::13:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no hataoko vavolombelona ho anao? Inona no hanoharako anao, ry Jerosalema zanakavavy? Inona no hampitahaiko aminao mba hampiononako anao, ry Ziona zanakavavy virijina? Fa lehibe toy ny ranomasina ny faharatranao, iza no mahasitrana anao?'
mg1865::mg_25::2::14:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaminaninao nahita lainga sy fahadalana ho anao; Ary tsy nampiseho ny helokao mba hiaro anao tsy ho babo; Fa nahita faminaniana lainga sy fampiviliana* ho anao izy. [*Na: fandroahana]'
mg1865::mg_25::2::15:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miteha-tanana anao izay rehetra mandalo eny an-dàlana; Misitrisitra sy mihifikifi-doha amin''i Jerosalema zanakavavy izy ka manao hoe: Ity va ilay tanàna nataony hoe Tena fahatsaran-tarehy Fifalian''ny tany rehetra ?'
mg1865::mg_25::2::16:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misanasana vava aminao ny fahavalonao rehetra; Misitrisitra sy mihidy vazana izy ka manao hoe: Efa nolevoninay*! Ity tokoa no andro nandrasanay ka efa azonay sady hitanay. [*Hebreo: natelinay]'
mg1865::mg_25::2::17:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nanao izay nosaininy ka nahatanteraka ny teniny izay nandidiany hatramin''ny andro fahagola; Nandrava Izy, fa tsy niantra; Ary nampifaly ny fahavalo taminao Izy sady nanandratra ny tandroky ny rafilahinao.'
mg1865::mg_25::2::18:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fonao* mitaraina amin''ny Tompo: Ry mandan''i Ziona zanakavavy! mandrotsaha ranomaso andro aman''alina toy ny riaka; Aza mangina, aoka tsy hitsahatra ny anakandriamasonao. [*Hebreo: fony]'
mg1865::mg_25::2::19:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, miantsoantsoa amin''ny alina hatramin''ny filatsahan''ny fiambenana, Aidino hataka ny rano eo anatrehan''ny Tompo ny fonao! Asandrato aminy ny tananao hifona ho an''ny ain''ny zanakao madinika, izay anan''ny hanoanana eny an-joron-dalambe rehetra eny.'
mg1865::mg_25::2::20:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, jereo ka izahao ny amin''ny olona izay nanaovanao izany. Ny vehivavy va hihinana ny ateraky na kibony, dia ny zanany madinika trotroiny? Hovonoina ao amin''ny fitoera-masin''i Jehovah va ny mpisorona sy ny mpaminany ?'
mg1865::mg_25::2::21:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miampatrampatra eny an-dalambe ny tanora sy ny antitra; Ny virijinako sy ny zatovoko dia lavon''ny sabatra, Novonoinao tamin''ny andro fahatezeranao izy, eny, naripakao, fa tsy niantranao.'
mg1865::mg_25::2::22:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nantsoinao ny fampangorohoroana manodidina ahy, toy ny amin''ny fotoam-pivavahana, ka dia tsy nisy sisa afa-nandositra tamin''ny andro fahatezeran''i Jehovah; Izay notrotroiko sy notezaiko aza dia lanin''ny fahavaloko.'
mg1865::mg_25::3::1:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fitondrana alahelo, sy ny fampiononana ataon''Andriamanitra, ALEFA'
  verse_text: 'Izaho ilay lehilahy nahita fahoriana tamin''ny tsorakazon''ny fahatezerany.'
mg1865::mg_25::3::2:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no notarihiny sy nampandehaniny ho amin''ny maizina, fa tsy ho amin''ny mazava.'
mg1865::mg_25::3::3:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho ihany no asian''ny tanany mandritra ny andro mandrakariva.'
mg1865::mg_25::3::4:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: BETA
  verse_text: 'Nataony antitra ny nofoko sy ny hoditro, notapatapahiny ny taolako.'
mg1865::mg_25::3::5:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manorina izay hamelezany ahy Izy ary manemitra ahy amin''ny zava-mangidy sy ny fahoriana.'
mg1865::mg_25::3::6:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampitoeriny ao amin''ny maizina toy izay efa maty fahagola aho.'
mg1865::mg_25::3::7:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: GIMELA
  verse_text: 'Nofefeny manodidina aho ka tsy afa-nivoaka, nataony mavesatra ny gadrako.'
mg1865::mg_25::3::8:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia mitaraina sy minananana aza aho, dia tampenany ny fivavako.'
mg1865::mg_25::3::9:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vato voapaika no narafiny natampiny ny lalako, naolikoliny ny alehako.'
mg1865::mg_25::3::10:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: DALETA
  verse_text: 'Tonga bera manotrika ahy Izy, ary toy ny liona ao amin''ny fierena;'
mg1865::mg_25::3::11:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namily ny alehako Izy, ary noviravirainy aho ka nataony mahatsiravina.'
mg1865::mg_25::3::12:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanenjana ny tsipïkany Izy ka nanangana ahy ho toy ny marika hokendrena zana-tsipïka.'
mg1865::mg_25::3::13:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: HE
  verse_text: 'Nampitsatoka ny zana-tsipïkany* tamin''ny voako Izy. [*Hebreo: zanaky ny tranon-jana-tsipïka]'
mg1865::mg_25::3::14:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga fihomehezan''ny fireneko rehetra aho sady ataony an-kira mandritra ny andro.'
mg1865::mg_25::3::15:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Novokisany zava-mangidy aho ary nobobohany zava-mahafaty.'
mg1865::mg_25::3::16:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: VAO
  verse_text: 'Ary notorotoroiny tamin''ny sila-bato ny nifiko, sady natsinkasinkasiny tamin''ny lavenona aho.'
mg1865::mg_25::3::17:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noroahinao tsy hahita fiadanana ny fanahiko, ka efa hadinoko ny tsara.'
mg1865::mg_25::3::18:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Levona ny faharetako sy ny fanantenako an''i Jehovah.'
mg1865::mg_25::3::19:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: ZAINA
  verse_text: 'Tsarovy ny fahoriako sy ny fanjenjenako, dia ny zava-mahafaty sy ny rano mangidy.'
mg1865::mg_25::3::20:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsaroan''ny fanahiko indrindra izany, ka mitanondrika ato anatiko izy.'
mg1865::mg_25::3::21:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ho eritreretiko ato am-poko, ka dia hanantena aho.'
mg1865::mg_25::3::22:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: HETA
  verse_text: 'Ny famindram-pon''i Jehovah no tsy nahalany ritra antsika, fa tsy mitsahatra ny fiantrany.'
mg1865::mg_25::3::23:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vaovao isa-maraina izany; lehibe ny fahamarinanao.'
mg1865::mg_25::3::24:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no anjarako, hoy ny fanahiko, ka dia hanantena Azy aho.'
mg1865::mg_25::3::25:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: TETA
  verse_text: 'Tsara Jehovah amin''izay manantena Azy, dia amin''ny olona izay mitady Azy.'
mg1865::mg_25::3::26:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny miandry ny famonjen''i Jehovah amin''ny fanginana.'
mg1865::mg_25::3::27:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara amin''ny olona ny mitondra zioga, raha mbola tanora izy.'
mg1865::mg_25::3::28:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: JODA
  verse_text: 'Aoka hanjokaiky irery izy ka hangina, raha ampitondraina izany.'
mg1865::mg_25::3::29:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanohoka ny vavany eo amin''ny vovoka izy, angamba hisy hantenaina.'
mg1865::mg_25::3::30:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanolotra ny takolany ho amin''izay mamely azy izy ka ho feno latsa.'
mg1865::mg_25::3::31:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: KAFA
  verse_text: 'Fa tsy hanary mandrakizay ny Tompo;'
mg1865::mg_25::3::32:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny fa na dia mampahory aza Izy, dia mbola hiantra ihany araka ny haben''ny famindram-pony.'
mg1865::mg_25::3::33:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy sitrany ny mampahory na mampalahelo ny zanak''olombelona.'
mg1865::mg_25::3::34:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: LAMEDA
  verse_text: 'Ny fanitsakitsahana ny mpifatotra rehetra ambonin''ny tany ho eo ambanin''ny tongotra,'
mg1865::mg_25::3::35:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny familiana ny rariny amin''ny olona eo anatrehan''ny Avo Indrindra,'
mg1865::mg_25::3::36:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famadihana ny adin''ny olona, dia samy tsy sitraky* ny Tompo. [*Hebreo: jeren'']'
mg1865::mg_25::3::37:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 37
  verse_date_revised: null
  verse_title: MEMA
  verse_text: 'Iza moa no miteny, ka dia mahatonga izany, raha tsy zavatra efa nodidian''ny Tompo?'
mg1865::mg_25::3::38:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy avy amin''ny vavan''ny Avo Indrindra va no ivoahan''ny soa sy ny loza ?'
mg1865::mg_25::3::39:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ahoana no imonomononan''ny olona mbola velona, fa no tsy aleo misento noho ny amin''ny fahotany avy*? [*Na: Eny, nahoana no imonomononan''ny olona, raha mijaly noho ny fahotany?]'
mg1865::mg_25::3::40:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 40
  verse_date_revised: null
  verse_title: NONA
  verse_text: 'Aoka isika handinika sy hamantatra ny alehantsika ka hiverina indray amin''i Jehovah.'
mg1865::mg_25::3::41:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hasandratsika amin''Andriamanitra any an-danitra ny fontsika sy ny tanantsika.'
mg1865::mg_25::3::42:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahay efa nanota sy nanao ditra, ary Ianao kosa tsy namela heloka.'
mg1865::mg_25::3::43:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 43
  verse_date_revised: null
  verse_title: SAMEKA
  verse_text: 'Nisarona fahatezerana Ianao ka nanenjika anay; eny, novonoinao izahay, fa tsy niantranao.'
mg1865::mg_25::3::44:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisarona rahona Ianao, ka dia voasakana ny vavaka.'
mg1865::mg_25::3::45:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataonao tahaka ny fakofako sy ny zavatra nariana teo afovoan''ny firenena izahay.'
mg1865::mg_25::3::46:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 46
  verse_date_revised: null
  verse_title: PE
  verse_text: 'Ny fahavalonay rehetra misanasana vava aminay.'
mg1865::mg_25::3::47:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahavoa anay ny tahotra sy ny lavaka ary ny fandringanana sy ny fahatorotoroana.'
mg1865::mg_25::3::48:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rano mandriaka no mijononoka amin''ny masoko noho ny faharatran''ny oloko zanakavavy.'
mg1865::mg_25::3::49:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 49
  verse_date_revised: null
  verse_title: AINA
  verse_text: 'Ny masoko mandrotsa-dranomaso ka tsy mijanona, eny, tsy misy fiatoana,'
mg1865::mg_25::3::50:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambara-pitazan''i Jehovah ka ho tsinjony any an-danitra.'
mg1865::mg_25::3::51:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoko mampiditra fahoriana ho an''ny fanahiko noho ny amin''ny zanakavavin''ny tanànako rehetra.'
mg1865::mg_25::3::52:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 52
  verse_date_revised: null
  verse_title: TSADE
  verse_text: 'Izay fahavaloko tsy ahoan-tsy ahoana dia nanenjika ahy mafy hoatra ny fanenjika voron-kely.'
mg1865::mg_25::3::53:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanjera ahy tao an-davaka famoriandrano izy ka nitady hahafaty ahy sady nitora-bato ahy.'
mg1865::mg_25::3::54:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandifotra ny lohako ny rano, ka dia hoy izaho: Maty* aho ity! [*Hebreo: Voajinja]'
mg1865::mg_25::3::55:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 55
  verse_date_revised: null
  verse_title: KOFA
  verse_text: 'Jehovah o, niantso ny anaranao tany an-davaka lalina indrindra aho.'
mg1865::mg_25::3::56:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feoko dia efa renao, aza tampenana ny sofinao, raha mitaraina mitady izay mba hiainana kely aho.'
mg1865::mg_25::3::57:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanakaiky Ianao tamin''ny andro niantsoako Anao, ka dia hoy Ianao: Aza matahotra.'
mg1865::mg_25::3::58:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 58
  verse_date_revised: null
  verse_title: RESY
  verse_text: 'Tompo o, Ianao nandahatra ny adiko izay nikasika ny aiko, eny, nanavotra ny aiko Ianao.'
mg1865::mg_25::3::59:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, hitanao ny fitsarana miangatra natao tamiko, ka mba tsarao ny adiko.'
mg1865::mg_25::3::60:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitanao ny famalian-dratsy rehetra ataon''ireo, dia ny saina rehetra entiny mamely ahy'
mg1865::mg_25::3::61:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 61
  verse_date_revised: null
  verse_title: SINA
  verse_text: 'Jehovah o, efa renao ny latsa ataony, dia ny saina rehetra entiny mamely ahy,'
mg1865::mg_25::3::62:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny molotr''izay mitsangana hanohitra ahy sy ny saina ataony mandritra ny andro hamelezana ahy.'
mg1865::mg_25::3::63:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo ny fipetrany sy ny fitsangany, fa ataony an-kira aho.'
mg1865::mg_25::3::64:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 64
  verse_date_revised: null
  verse_title: TAO
  verse_text: 'Hovalianao araka ny asan''ny tanany izy, Jehovah o.'
mg1865::mg_25::3::65:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hohamaizininao ny fony, hihatra aminy ny ozonao.'
mg1865::mg_25::3::66:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 3
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henjehinao amin''ny fahatezerana izy ka haringanao tsy ho ety ambanin''ny lanitr''i Jehovah.'
mg1865::mg_25::4::1:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fietren-tena noho ny fitsarana ataon''Andriamanitra, ary fanantenam-pamonjena'
  verse_text: 'Indrisy! efa matromatroka ny volamena; Efa niova ny tena volamena tsara! Ny vato nohamasinina dia efa nahahany eny an-joron-dalambe rehetra eny.'
mg1865::mg_25::4::2:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! ny zanaka mahafinaritr''i Ziona, izay saro-bidy tahaka ny tena volamena, dia efa atao ho toy ny siny, asan-tanan''ny mpanefy tanimanga!'
mg1865::mg_25::4::3:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny amboadia* aza dia manolotra nono hampinonoany ny zanany; Fa ny oloko zanakavavy kosa dia efa masiaka toy ny ostritsa any an''efitra. [*Na: jakala]'
mg1865::mg_25::4::4:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lelan''ny zaza minono miraikitra amin''ny lanilaniny noho ny hetaheta; Ny ankizy madinika mangataka hanina, nefa tsy misy mizara ho azy.'
mg1865::mg_25::4::5:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nihinana zava-py dia mahantra eny an-dalambe; Izay notezaina tamin''ny jaky dia mandamaka eny amin''ny zezika*. [*Hebreo: Naziritany]'
mg1865::mg_25::4::6:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny heloky ny oloko zanakavavy dia lehibe noho ny helok''i Sodoma, Izay noravana indray mipi-maso monja, nefa tsy nokasihin-tanana akory,'
mg1865::mg_25::4::7:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehibeny* dia mangatsakatsaka noho ny fanala, eny, fotsy noho ny ronono; Mena noho ny voahangy** ny tenany; Tahaka ny vato safira ny endriny. [*Hebreo: Naziritany] [**Na: perila]'
mg1865::mg_25::4::8:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao kosa dia mainty noho ny arina ny tarehiny, ka tsy fantatra eny an-dàlana izy; Ny hodiny miraikitra amin''ny taolany ka tonga maina toy ny hazo.'
mg1865::mg_25::4::9:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny matin-tsabatra noho ny maty mosary; Fa ireto dia mihareraka toy ny voatrobaka noho ny tsy fisian''ny vokatry ny saha.'
mg1865::mg_25::4::10:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanan''ny vehivavy malemy fanahy aza dia nahandro ny zanany: Eny, izany no nohaniny tamin''ny fandringanana ny oloko zanakavavy.'
mg1865::mg_25::4::11:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tanterahin''i Jehovah ny fahavinirany, naidiny ny fahatezerany mirehitra, ary Izy nampirehitra afo tao Ziona, handevonana ny fanorenany.'
mg1865::mg_25::4::12:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjakan''ny tany sy ny mponina rehetra amin''izao tontolo izao dia tsy nanampo fa ny rafilahy sy ny fahavalo no ho tafiditra ao amin''ny vavahadin''i Jerosalema.'
mg1865::mg_25::4::13:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fahotan''ny mpaminany sy ny heloky ny mpisorony, izay nandatsaka ny ran''ny marina tao aminy, no nahatongavan''izao.'
mg1865::mg_25::4::14:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niraparapa toy ny jamba teny an-dalambe izy, sady voahosin-drà ny tenany, ka tsy nisy sahy nikasika ny akanjony.'
mg1865::mg_25::4::15:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona niantsoantso azy hoe: Mialà ianareo, fa maloto, mialà, mialà, aza mikasika anay. Raha nandositra sy niraparapa izy, dia hoy ny olona tany amin''ny jentilisa: Tsy mahazo mivahiny aty intsony ireny.'
mg1865::mg_25::4::16:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeran*''i Jehovah no nampihahakahaka azy, ary tsy mijery azy intsony Izy; Ny mpisorona tsy hajain''ireny, ary ny antitra tsy amindrany fo. [*Hebreo: tavany]'
mg1865::mg_25::4::17:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola pahina ny masonay miandry foana ny hamonjy anay; Nitazana teo amin''ny tilikambo izahay nanantena ny firenena izay tsy nahavonjy anay.'
mg1865::mg_25::4::18:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsongo-dia anay izy, ka tsy mahazo mandeha eny an-dalambe aza izahay; Akaiky ny fara-fiainanay, tapitra ny andronay, eny, tonga ny fara-fiainanay.'
mg1865::mg_25::4::19:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanenjika anay dia haingam-pandeha noho ny voromahery eny amin''ny lanitra, ka miolomay manenjika anay any an-tendrombohitra ary manotrika anay any an''efitra izy.'
mg1865::mg_25::4::20:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fofonainay, ilay voahosotr''i Jehovah, dia efa voafandriky ny longoany, dia ilay nataonay hoe: Ao ambanin''ny alokalony no hahavelona anay any amin''ny firenena.'
mg1865::mg_25::4::21:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia sy miravoravoa ihany ary, ry Edoma zanakavavy, izay monina any amin''ny tany Oza, ianao koa no horosoana ny kapoaka, ka ho mamo sy hitanjaka ianao.'
mg1865::mg_25::4::22:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy intsony ny helokao, ry Ziona zanakavavy, tsy ho entina ho babo intsony ianao; Hamaly anao Izy, ry Edoma zanakavavy, noho ny helokao ka hampiseho ny fahotanao.'
mg1865::mg_25::5::1:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana amin''Andriamanitra sy fangatahana ny hodian''ny soa nananana fahiny'
  verse_text: 'Jehovah o, tsarovy izay nanjo anay; Hevero sy diniho ny latsa mahazo anay.'
mg1865::mg_25::5::2:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lovanay dia afindra ho an''ny vahiny ary ny tranonay ho an''ny hafa firenena.'
mg1865::mg_25::5::3:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa kamboty izahay ka tsy manan-dray, ny reninay dia toy ny mpitondra-tena.'
mg1865::mg_25::5::4:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny loharanonay aza dia andoavanay vola vao azonay isotroana, ary ny kitay hazonay dia vidinay vao azo.'
mg1865::mg_25::5::5:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rambondrambonan''ny mpanenjika amin''ny hatokay izahay; Reraka izahay fa tsy manam-pitsaharana.'
mg1865::mg_25::5::6:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanolo-tanana tamin''ny Egyptiana sy ny Asyriana izahay mba ho voky hanina.'
mg1865::mg_25::5::7:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanota ny razanay tsy ety intsony izy; Ary izahay no mivesatra ny helony.'
mg1865::mg_25::5::8:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andevo no manapaka anay; Tsy misy manafaka anay amin''ny tanany.'
mg1865::mg_25::5::9:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny sabatra mamely any an''efitra dia manao vy very ny ainay izahay vao mahazo hanina.'
mg1865::mg_25::5::10:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahamay toy ny fatana ny hodi-tray noho ny fahamaimaizana avy amin''ny mosary.'
mg1865::mg_25::5::11:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nosavihina ny vehivavy tao Ziona ary ny virijina tao amin''ny tanànan''ny Joda.'
mg1865::mg_25::5::12:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahantona tamin''ny tanany ny lehibe; Ary ny antitra tsy mba nohajaina.'
mg1865::mg_25::5::13:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zatovo nitondra ny fikosoham-bary; Ary ny ankizy madinika nivembena nitondra ny hazo.'
mg1865::mg_25::5::14:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny loholona tsy misy eo am-bavahady, ary ny zatovo tsy mitendry zava-maneno intsony.'
mg1865::mg_25::5::15:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hafalian''ny fonay dia nitsahatra, ary ny dihinay niova ho fitomaniana.'
mg1865::mg_25::5::16:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa afaka ny satro-boninahitra tamin''ny lohanay; Idiran-doza izahay, fa efa nanota!'
mg1865::mg_25::5::17:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia reraka ny fonay, eny, noho izany dia maizina ny masonay,'
mg1865::mg_25::5::18:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny amin''ny tendrombohitra Ziona, izay efa lao sady ikarenjen''ny amboahaolo.'
mg1865::mg_25::5::19:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, ianao no mipetraka mandrakizay, eny, ny seza fiandriananao no maharitra hatramin''ny taranaka fara mandimby.'
mg1865::mg_25::5::20:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no dia anadinoanao anay mandrakizay sy ahafoizanao anay andro lava ?'
mg1865::mg_25::5::21:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, ampivereno aminao izahay, mba hiverenanay; Havaozy ho toy ny fahiny ny andronay.'
mg1865::mg_25::5::22:
  verse_version: mg1865
  verse_book: mg_25
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa dia nandà anay tokoa va Ianao sy tezitra aminay indrindra?'
