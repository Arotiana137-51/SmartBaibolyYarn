mg1865::mg_44::1::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarihan-teny sy filazana ny nanafaran''i Jesoa ny mpianany, sy ny nisarahany taminy, raha niakatra ho any an-danitra'
  verse_text: 'Ry Teofilo, ilay boky voalohany dia nosoratako ny amin''izay nataon''i Jesoa sy nampianariny,'
mg1865::mg_44::1::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny andro nampiakarana Azy, rehefa nodidiany tamin''ny Fanahy Masina ny Apostoly izay nofidiny,'
mg1865::mg_44::1::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady niseho koa tamin''ny famantarana maro taorian''ny nijaliany fa velona Izy, ka niseho taminy efa-polo andro Izy ary nilaza ny amin''ny fanjakan''Andriamanitra.'
mg1865::mg_44::1::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niara-niangona* teo aminy Jesoa, dia namepetra azy tsy hiala an''i Jerosalema, fa hiandry ny teny fikasan''ny Ray, izay efa renareo tamiko, hoy Izy; [*Na: niara-nihinana]'
mg1865::mg_44::1::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Jaona nanao batisa tamin''ny rano; fa ianareo kosa hatao batisa amin''ny Fanahy Masina, rehefa afaka andro vitsivitsy.'
mg1865::mg_44::1::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay tafangona teo dia nanontany Azy hoe: Tompoko, amin''izao va no hampodianao ny fanjakana ho amin''ny Isiraely?'
mg1865::mg_44::1::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Izy taminy: Tsy anareo ny hahalala ny andro na ny fotoana izay efa notendren''ny Ray amin''ny fahefany ihany*. [*Na: izay nataon''ny Ray ho adidin''ny tenany ihany]'
mg1865::mg_44::1::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hahazo hery ianareo amin''ny hilatsahan''ny Fanahy Masina aminareo, ary ho vavolombeloko any Jerosalema sy eran''i Jodia sy Samaria ary hatramin''ny faran''ny tany.'
mg1865::mg_44::1::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany Jesoa, dia nakarina Izy, raha mbola nijery izy ireo; ary nisy rahona nitondra Azy, ka tsy hitan''ny masony intsony Izy.'
mg1865::mg_44::1::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nandinika ny lanitra izy ireo tamin''ny nandehanan''i Jesoa, indreo, nisy roa lahy teo anilany niakanjo akanjo fotsy,'
mg1865::mg_44::1::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nanao hoe: Ry lehilahy Galiliana, nahoana no mijanona eto mijery ny lanitra ianareo? iny Jesoa Izay nampiakarina niala taminareo ho any an-danitra iny dia mbola ho avy tahaka ny nahitanareo Azy niakatra ho any an-danitra.'
mg1865::mg_44::1::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo niverina tany Jerosalema, rehefa avy teo amin''ny tendrombohitra atao hoe Oliva, izay akaikin''i Jerosalema (araka izay mety haleha amin''ny Sabata).'
mg1865::mg_44::1::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tafiditra izy, dia niakatra ho any an-trano ambony, izay fitoerany, - dia Petera sy Jaona sy Jakoba sy Andrea, Filipo sy Tomasy, Bartolomeo sy Matio, Jakoba zanak''i Alfeo, sy Simona Zelota ary Jodasy, zanak*''i Jakoba. [*Na: rahalahin'']'
mg1865::mg_44::1::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo niray saina naharitra nivavaka mbamin''ny vehivavy sy Maria, renin''i Jesoa, ary ny rahalahiny.'
mg1865::mg_44::1::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny nifidianan''ny Apostoly ny anankiray ho namany hisolo an''i Jodasy'
  verse_text: 'Ary tamin''izany andro izany dia nitsangana teo afovoan''ny rahalahy Petera (tokony ho roa-polo amby zato no isan''ny olona* vory teo) ka nanao hoe: [*Grika: anarana]'
mg1865::mg_44::1::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, tsy maintsy notanterahina ilay tenin''ny Soratra Masina nampilazain''ny Fanahy Masina rahateo an''i Davida ny amin''i Jodasy, izay tonga mpitarika ny olona nisambotra an''i Jesoa;'
mg1865::mg_44::1::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izy dia isantsika ihany ka nahazo anjara tamin''izao fanompoana izao koa.'
mg1865::mg_44::1::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany lehilahy izany dia nahazo saha tamin''ny tambin''ny fahotany; ary potraka niankohoka izy, dia vaky ny kibony ka nipoaka sady nivaroraka avokoa ny tsinainy.'
mg1865::mg_44::1::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatr''izay rehetra monina eto Jerosalema izany, ka ny anaran''izany saha izany amin''ny fiteniny dia atao hoe Akeldama, izany hoe Sahan-drà.'
mg1865::mg_44::1::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voasoratra eo amin''ny Bokin''ny Salamo hoe: Aoka ho lao ny fonenany, Ary aoka tsy hisy olona honina ao (Salamo 69:25) ary koa: Aoka ho lasan''olon-kafa ny anjara-raharahany (Salamo 109:8).'
mg1865::mg_44::1::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''ireo lehilahy niaraka teto amintsika mandrakariva ireo, raha niditra sy nivoaka tamintsika Jesoa Tompo,'
mg1865::mg_44::1::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'hatramin''ny batisan''i Jaona ka hatramin''ny andro nampiakarana Azy niala tamintsika, dia tokony hisy anankiray ho namantsika mba ho vavolombelon''ny nitsanganany.'
mg1865::mg_44::1::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanokana roa lahy izy, dia Josefa, atao hoe Barsabasy, izay atao hoe koa Josto, ary Matia.'
mg1865::mg_44::1::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivavaka izy ka nanao hoe: Ianao, Tompo o, Izay mahalala ny fon''ny olona rehetra, asehoy izay nofidinao amin''izy roa lahy ireto,'
mg1865::mg_44::1::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahazoany anjara amin''izao fanompoana sy ny mah''Apostoly izao, izay nialan''i Jodasy hankanesany any amin''ny fitoerany.'
mg1865::mg_44::1::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao filokana ho azy izy, ka latsaka tamin''i Matia ny filokana; ary izy no lany ho isan''ny Apostoly iraika ambin''ny folo lahy.'
mg1865::mg_44::2::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nilatsahan''ny Fanahy Masina tamin''ny Andro Pentekosta, sy ny tori-teny nataon''i Petera tamin''izany'
  verse_text: 'Ary nony tonga ny Andro Pentekosta, dia teo amin''ny fitoerana iray izy rehetra.'
mg1865::mg_44::2::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo tonga tampoka avy tany an-danitra, toy ny rivotra mahery mifofofofo, ka nanenika ilay trano niangonany.'
mg1865::mg_44::2::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lela maro mitarehin''afo niseho taminy, izay nizarazara; ary nipetraka tamin''izy rehetra isan-olona izany.'
mg1865::mg_44::2::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy feno ny Fanahy Masina izy rehetra, ka dia niteny tamin''ny fiteny maro samy hafa, araka ny nampitenenan''ny Fanahy Masina azy.'
mg1865::mg_44::2::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Jiosy, mpivavaka tsara, nitoetra tany Jerosalema, avy tany amin''ny firenena samy hafa rehetra ambanin''ny lanitra.'
mg1865::mg_44::2::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony re izany feo izany, dia niangona ny olona maro ka very hevitra, fa samy nahare azy ireo niteny tamin''ny fiteniny avy izy rehetra.'
mg1865::mg_44::2::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona sady gaga izy rehetra ka nanao hoe: Indreo, tsy Galiliana va ireo rehetra miteny ireo?'
mg1865::mg_44::2::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ahoana no andrenesantsika amin''ny fitenintsika avy izay nahabe antsika'
mg1865::mg_44::2::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: '- dia Partiana sy Mediana sy Elamita, ary mponina any Mesopotamia, sy Jodia sy Kapadokia sy Ponto sy Asia'
mg1865::mg_44::2::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Frygia sy Pamfylia, sy Egypta sy ny tany Libya izay manodidina an''i Kyrena, ary vahiny avy any Roma, na Jiosy na proselyta,'
mg1865::mg_44::2::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kretana sy Arabo — koa ahoana no andrenesantsika ireo miteny amin''ny fitenintsika avy ny asa lehibe ataon''Andriamanitra?'
mg1865::mg_44::2::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona izy rehetra ka niahanahana sady niresaka hoe: Ahoana no tokony ho hevitr''izany?'
mg1865::mg_44::2::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany nihomehy ka nanao hoe: Leon-divay mamy ireo.'
mg1865::mg_44::2::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nitsangana Petera sy ny iraika ambin''ny folo lahy, dia nanandra-peo izy ka nanao taminy hoe: Ry lehilahy Jiosy sy izay rehetra monina eto Jerosalema, aoka ho fantatrareo izao, ka henoy ny teniko:'
mg1865::mg_44::2::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mamo araka ny hevitrareo tsy akory ireo, fa vao ora fahatelo ihany izao ny andro.'
mg1865::mg_44::2::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao ilay nampilazaina an''i Joela mpaminany hoe:'
mg1865::mg_44::2::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''ny andro farany, hoy Andriamanitra, No handatsahako ny Fanahiko amin''ny nofo rehetra; Ary ny zanakalahinareo sy ny zanakavavinareo haminany, Ary ny zatovonareo hahita fahitana, Ary ny lahiantitrareo hanonofy;'
mg1865::mg_44::2::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompoko, na lahy na vavy, Dia handatsahako ny Fanahiko amin''izany andro izany, Ka dia haminany izy;'
mg1865::mg_44::2::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanisy fahagagana eny amin''ny lanitra ambony Aho sy famantarana amin''ny tany ambany, Dia rà sy afo ary zavon''ny setroka;'
mg1865::mg_44::2::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoandro hampodina ho aizina, Ary ny volana ho rà, Alohan''ny hahatongavan''ny andron''i Jehovah, Dia ilay sady lehibe no malaza;'
mg1865::mg_44::2::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na zovy na zovy no hiantso ny anaran''i Jehovah dia hovonjena (Joela 3:1-5).'
mg1865::mg_44::2::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry lehilahy Isiraely, mihainoa izao teny izao: Jesoa avy any Nazareta, lehilahy nasehon''Andriamanitra teo aminareo tamin''ny asa lehibe sy ny fahagagana ary ny famantarana izay nampanaovin''Andriamanitra Azy teo aminareo, tahaka ny fantatrareo ihany,'
mg1865::mg_44::2::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy efa natolotra araka ny saina niniana sy ny fahalalan''Andriamanitra rahateo, dia nohomboanareo sy novonoinareo tamin''ny tanan''ny olona tsy tan-dalàna;'
mg1865::mg_44::2::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Andriamanitra nanangana Azy, rehefa nahafaka ny fanaintainan''ny fahafatesana, satria tsy laitr''izany hohazonina Izy.'
mg1865::mg_44::2::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Davida milaza Azy hoe: Nijery an''i Jehovah teo anatrehako mandrakariva aho; Satria eo ankavanako Izy, mba tsy hangozohozo aho,'
mg1865::mg_44::2::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izany no nifalian''ny foko sy niravoravoan''ny lelako; Ny nofoko koa hitoetra amin''ny fanantenana;'
mg1865::mg_44::2::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ho foinao ho any amin''ny fiainan-tsy hita* ny aiko; Ary tsy hamela ny Iray Masinao ho tratry ny lo Ianao; [*Grika: Hadesy]'
mg1865::mg_44::2::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampahafantatra ahy ny lalan''aina Ianao; Hampifaly ahy indrindra amin''ny tavanao (Salamo 16:8-11).'
mg1865::mg_44::2::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, aoka aho mba hilaza aminareo marimarina ny amin''i Davida patriarka, fa efa maty izy ka nalevina koa, ary ny fasany eto amintsika mandraka androany.'
mg1865::mg_44::2::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria mpaminany izy ka nahalala fa Andriamanitra efa nanao fianianana taminy fa izay hateraky ny kibony no hipetraka* eo ambonin''ny seza fiandrianany, [*Na: hapetrany]'
mg1865::mg_44::2::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha nahita rahateo izy, dia nilaza ny fitsanganan''i Kristy, fa tsy nafoy ho any amin''ny fiainan-tsy hita* Izy, ary ny nofony tsy tratry ny lo. [*Grika: Hadesy]'
mg1865::mg_44::2::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany Jesoa izany dia efa natsangan''Andriamanitra, ary vavolombelon''izany izahay rehetra.'
mg1865::mg_44::2::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nasandratry ny tanana ankavanan''Andriamanitra* Izy, ary nandray tamin''ny Ray ny Fanahy Masina Izay nokasainy, dia efa nampilatsaka izao hitanareo sy renareo izao Izy. [*Na: ho eo an-tanana ankavanan''Andriamanitra]'
mg1865::mg_44::2::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy Davida no niakatra tany an-danitra; fa hoy izy: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana'
mg1865::mg_44::2::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao (Salamo 110:1).'
mg1865::mg_44::2::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatry ny taranak''isiraely rehetra marimarina fa iny Jesoa nohomboanareo tamin''ny hazo fijaliana iny dia efa nataon''Andriamanitra ho Tompo sy Kristy.'
mg1865::mg_44::2::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandre izany ny olona, dia voatsindrona tam-pony ka nanao tamin''i Petera sy ny Apostoly namany hoe: Ry rahalahy, inona no hataonay?'
mg1865::mg_44::2::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera taminy: Mibebaha, ary aoka samy hatao batisa amin''ny anaran''i Jesoa Kristy ianareo rehetra mba hahazo famelana ny helokareo; ary ianareo handray ny fanomezana, dia ny Fanahy Masina;'
mg1865::mg_44::2::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny teny fikasana dia ho anareo sy ny zanakareo ary ho an''izay rehetra lavitra, na iza na iza hantsoin''i Jehovah Andriamanitsika hanatona Azy.'
mg1865::mg_44::2::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanambara sy nananatra azy tamin''ny teny maro hafa koa izy ka nanao hoe: Aoka hovonjena ho afaka amin''ity taranaka maditra ity ianareo.'
mg1865::mg_44::2::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nandray tsara ny teniny dia natao batisa; ary tokony ho telo arivo no olona nanampy ho isany tamin''izany andro izany.'
mg1865::mg_44::2::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo naharitra tamin''ny fampianaran''ny Apostoly sy ny fiombonana sy ny famakiana ny mofo ary ny fivavahana.'
mg1865::mg_44::2::43:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra ny olona rehetra teo, ary fahagagana sy famantarana maro no nataon''ny Apostoly.'
mg1865::mg_44::2::44:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra nino dia niray toerana, sady niombonany avokoa ny fananany rehetra,'
mg1865::mg_44::2::45:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary namidiny ny taniny sy ny fananany ka nozarainy tamin''izy rehetra araka izay nilainy avy.'
mg1865::mg_44::2::46:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niray saina isan''andro izy ka nazoto nankeo an-kianjan''ny tempoly ary namaky mofo tao an-trano ka nihinan-kanina tamin''ny fifaliana sy ny fahatsaram-po,'
mg1865::mg_44::2::47:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 2
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'nidera an''Andriamanitra sady nahita fitia tamin''ny vahoaka rehetra. Ary ny olom-bonjena dia nanampin''ny Tompo isan''andro ho isan''ireo.'
mg1865::mg_44::3::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Petera ilay lehilahy nalemy tongotra, sy ny tori-teny nataony tamin''ny olona'
  verse_text: 'Ary Petera sy Jaona niakatra ho eo an-kianjan''ny tempoly tamin''ny ora fahasivy fotoam-pivavahana.'
mg1865::mg_44::3::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nitondra lehilahy nalemy tongotra hatrany an-kibon-dreniny, izay napetrany isan''andro teo anoloan''ny vavahadin''ny tempoly, ilay atao hoe Itsaraendrika, mba hangataka fiantrana amin''izay niditra teo an-kianjan''ny tempoly;'
mg1865::mg_44::3::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'nony nahita an''i Petera sy Jaona efa niditra eo an-kianjan''ny tempoly izy, dia nangataka mba homena fiantrana.'
mg1865::mg_44::3::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera sy Jaona nibanjina azy ka nanao hoe: Mijere anay.'
mg1865::mg_44::3::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nibanjina azy roa lahy tsara izy, fa nanantena hahazo zavatra taminy.'
mg1865::mg_44::3::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Petera: Tsy manana volafotsy na volamena aho, fa izay ananako no omeko anao: Amin''ny anaran''i Jesoa Kristy avy any Nazareta, mitsangantsangàna.'
mg1865::mg_44::3::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noraisiny tamin''ny tanany ankavanana ralehilahy ka natsangany; dia natanjaka niaraka tamin''izay ny tongony sy ny kitrokeliny.'
mg1865::mg_44::3::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantsambotra izy ka nijoro, dia nitsangantsangana ary niara-niditra taminy ho eo an-kianjan''ny tempoly, nitsangantsangana sy niantsambotsambotra sady nidera an''Andriamanitra.'
mg1865::mg_44::3::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra nahita azy mitsangantsangana sy midera an''Andriamanitra.'
mg1865::mg_44::3::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantany tsara fa io no ilay nipetraka teo amin''ny vavahady Itsaraendrika eo amin''ny tempoly mba hiantrana; dia gaga sady talanjona ny olona noho izay tonga tamin-dralehilahy.'
mg1865::mg_44::3::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nihazona an''i Petera sy Jaona izy, dia niara-nirohitra ny olona rehetra ho eo amin''izy telo lahy teo amin''ny fialofana izay atao hoe Fialofan''i Solomona, ka talanjona.'
mg1865::mg_44::3::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera, nony nahita, dia namaly ny vahoaka hoe: Ry lehilahy Isiraely, nahoana no talanjona amin''izany ianareo? Ary nahoana no mandinika anay ianareo, toa herinay na fahamasinanay no nanaovanay azy ho afa-mandeha?'
mg1865::mg_44::3::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitr''i Abrahama sy Isaka ary Jakoba, Andriamanitry ny razantsika, no nanome voninahitra an''i Jesoa Mpanompony*, Izay natolotrareo sy nolavinareo teo anatrehan''i Pilato, rehefa nokasainy halefa. [*Na: Zanany]'
mg1865::mg_44::3::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo nandà Ilay Masina sy Marina, ary mpamono olona no nangatahinareo halefa ho anareo;'
mg1865::mg_44::3::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny Tompon''ny aina kosa no novonoinareo; fa Izy natsangan''Andriamanitra tamin''ny maty, ary vavolombelon''izany izahay.'
mg1865::mg_44::3::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anarany no nampahatanjaka io lehilahy hitanareo sy fantatrareo io noho ny finoana ny anarany; eny, ny finoana izay azo amin''ny alalany no nahazoany izao fahasitranana tsara eto imasonareo rehetra izao.'
mg1865::mg_44::3::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, ry rahalahy, fantatro fa tamin''ny tsy fahalalana no nanaovanareo izany, tahaka ny mpanapaka anareo koa.'
mg1865::mg_44::3::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany no nahatanterahan''Andriamanitra ny zavatra nampilazainy ny mpaminany rehetra rahateo, fa hiaretan''ny Kristiny.'
mg1865::mg_44::3::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mibebaha ianareo, ka miverena hamonoana ny fahotanareo, mba ho avy izay andro famelombelomana avy amin''ny fanatrehan''ny Tompo,'
mg1865::mg_44::3::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hanirahany ny Kristy voatendry ho anareo, dia Jesoa,'
mg1865::mg_44::3::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay tsy maintsy horaisin''ny lanitra mandra-pihavin''ny andro fampodiana ny zavatra rehetra, izay nampilazain''Andriamanitra ny mpaminaniny masina hatramin''ny voalohany indrindra.'
mg1865::mg_44::3::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mosesy nilaza hoe: Mpaminany no hatsangan''i Jehovah Andriamanitra ho anareo avy amin''ny rahalahinareo, tahaka ahy; izy no hohenoinareo amin''izay rehetra holazainy aminareo.'
mg1865::mg_44::3::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra tsy hihaino izany mpaminany izany dia haringana tsy ho eo amin''ny olona (Deoteronomia 18:15-19).'
mg1865::mg_44::3::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpaminany rehetra koa hatramin''i Samoela sy izay nanarakaraka, na iza na iza niteny, dia nanambara izao andro izao.'
mg1865::mg_44::3::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no zanaky ny mpaminany sy ny fanekena nataon''Andriamanitra tamin''ny razanareo, raha hoy Izy tamin''i Abrahama: Ary amin''ny taranakao no hitahiana ny firenena rehetra ambonin''ny tany (Genesisy 22:18).'
mg1865::mg_44::3::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra, rehefa nanangana ny Mpanompony*, dia naniraka Azy ho aminareo voalohany, mitahy anareo amin''ny fialanareo rehetra amin''ny faharatsianareo isam-batan''olona. [*Na: ny Zanany]'
mg1865::mg_44::4::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namatorana an''i Petera sy Jaona, sy ny nataon''ny Synedriona taminy'
  verse_text: 'Ary raha mbola niteny tamin''ny vahoaka izy, dia, indreo, tonga teo aminy ny mpisorona sy ny lehiben''ny mpiambina ny tempoly ary ny Sadoseo;'
mg1865::mg_44::4::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa sosotra izy noho ny nampianaran''ny Apostoly ny vahoaka sy ny nitoriany tamin''ny alalan''i Jesoa ny fitsanganana amin''ny maty.'
mg1865::mg_44::4::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisambotra azy izy ka nanao azy tao an-tranomaizina ambara-pahamarain''ny andro; fa efa hariva ny andro tamin''izay.'
mg1865::mg_44::4::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa maro tamin''izay nandre ny teny no nino, ka dia tonga tokony ho dimy arivo no isan''ny lehilahy.'
mg1865::mg_44::4::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina ny andro, dia niangona tany Jerosalema ny mpanapaka sy ny loholona sy ny mpanora-dalàna'
mg1865::mg_44::4::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Anasy mpisoronabe sy Kaiafa sy Jaona sy Aleksandro mbamin''izay rehetra mety ho havan''ny mpisoronabe.'
mg1865::mg_44::4::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nataony teo ampovoany izy roa lahy, dia nanontaniany hoe: Fahefana manao ahoana, na anarana manao ahoana, no nanaovanareo izany?'
mg1865::mg_44::4::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera, feno ny Fanahy Masina, dia nanao taminy hoe: Ry mpanapaka ny vahoaka sy loholona,'
mg1865::mg_44::4::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha adinina izahay anio ny amin''ny asa tsara natao tamin''ny nahasitranana ilay lehilahy malemy,'
mg1865::mg_44::4::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aoka ho fantatrareo rehetra sy ny olona Isiraely rehetra fa ny anaran''i Jesoa Kristy avy any Nazareta, Izay nohomboanareo tamin''ny hazo fijaliana, fa natsangan''Andriamanitra tamin''ny maty kosa, dia Izy no itsanganan''io lehilahy io finaritra eto imasonareo.'
mg1865::mg_44::4::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no vato izay nolavinareo mpanao trano, nefa tonga fehizoro (Salamo 118:22).'
mg1865::mg_44::4::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy famonjena amin''ny hafa; fa tsy misy anarana hafa ambanin''ny lanitra nomena ny olona izay hahazoantsika famonjena.'
mg1865::mg_44::4::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita ny fahasahisahian''i Petera sy Jaona izy, sady nahalala fa tsy mba mpahay lalàna na nampianarina izy roa lahy, dia gaga izy; ary fantany tsara fa efa niaraka tamin''i Jesoa izy roa lahy.'
mg1865::mg_44::4::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nijery ny lehilahy izay efa sitrana nitsangana teo aminy izy, dia tsy hitany izay havaliny.'
mg1865::mg_44::4::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nasainy niala teo amin''ny Synedriona izy roa lahy, dia niara-nisaina izy'
mg1865::mg_44::4::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Hataontsika ahoana ireo lehilahy ireo? fa efa nanao famantarana malaza tokoa izy, ary fantatry ny mponina rehetra eto Jerosalema izany, ka tsy azontsika lavina.'
mg1865::mg_44::4::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba tsy hielezan''izany intsony amin''ny vahoaka, dia aoka horahonantsika izy mba tsy hiteny amin''izany anarana izany intsony na amin''iza na amin''iza.'
mg1865::mg_44::4::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso azy izy ka nandrara azy tsy hiteny na hampianatra amin''ny anaran''i Jesoa intsony.'
mg1865::mg_44::4::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera sy Jaona kosa namaly azy ka nanao hoe: Tsaraonareo na marina eo imason''Andriamanitra, na tsia, ny hanaiky anareo mihoatra noho Andriamanitra.'
mg1865::mg_44::4::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay tsy maintsy milaza izay zavatra efa hitanay sy renay.'
mg1865::mg_44::4::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa norahonany indray izy, dia nalefany; fa tsy hitany izay hampijaliany azy noho ny tahony ny vahoaka; satria izy rehetra nankalaza an''Andriamanitra noho ny amin''ny zavatra efa natao.'
mg1865::mg_44::4::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa tsy omby efa-polo taona ralehilahy izay nanaovana izany famantarana nahasitrana azy izany.'
mg1865::mg_44::4::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nalefa izy roa lahy, dia tonga teo amin''ny namany ka nanambara izay rehetra nolazain''ny lohan''ny mpisorona sy ny loholona taminy.'
mg1865::mg_44::4::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa nandre izany izy ireo, dia niara-nanandratra ny feony ho amin''Andriamanitra ka nanao hoe: Tompo o, Ianao no nanao ny lanitra sy ny tany ary ny ranomasina mbamin''izay rehetra ao anatiny,'
mg1865::mg_44::4::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny Fanahy Masina no nampitenenanao an''i Davida razanay sady mpanomponao hoe: Nahoana no mitabataba ny jentilisa, Ary misaina anoano foana ny firenena?'
mg1865::mg_44::4::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo mpanjakan''ny tany nitsangana, Ary ny mpanapaka niangona Hanohitra an''i Jehovah sy ny Mesiany (Salamo 2:1-2).'
mg1865::mg_44::4::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa niangona marina tokoa teto amin''ity tanàna ity Heroda sy Pontio Pilato mbamin''ny jentilisa sy ny olona Isiraely hanohitra ny Mpanomponao* Masina, dia Jesoa Izay nohosoranao, [*Na: ny Zanakao]'
mg1865::mg_44::4::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanao izay notendren''ny tananao aman-tsainao rahateo hatao.'
mg1865::mg_44::4::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, Tompo o, jereo ny fandrahonany; ary omeo anay mpanomponao ny mba hitory ny teninao amin''ny fahasahiana rehetra,'
mg1865::mg_44::4::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'omban''ny aninjiranao ny tananao hahasitrana sy ny anaovana famantarana sy fahagagana amin''ny anaran''i Jesoa, Mpanomponao* Masina. [*: Na: Zanakao]'
mg1865::mg_44::4::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nivavaka izy, dia nihovitrovitra ny trano izay niangonany; dia feno ny Fanahy Masina izy rehetra ka nitory ny tenin''Andriamanitra tamin''ny fahasahiana.'
mg1865::mg_44::4::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Ny nifankatiavan''ny mpianatra sy ny fahazotoany'
  verse_text: 'Ary niray fo sy fanahy ny olona rehetra izay nino; ary tsy nisy nanonona ny fananany ho azy na dia iray aza, fa niombonany avokoa ny zavatra rehetra nananany.'
mg1865::mg_44::4::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny hery be no nanambaran''ny Apostoly ny nitsanganan''i Jesoa Tompo; ary fahasoavana be no tao amin''izy rehetra.'
mg1865::mg_44::4::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy olona nalahelo teo aminy; fa izay nanana tany na trano, raha nivarotra izany, dia nitondra ny vola vidin''ny zavatra lafo,'
mg1865::mg_44::4::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka napetrany teo anoloan''ny tongotry ny Apostoly, dia nozaraina tamin''izy rehetra araka izay nilainy avy'
mg1865::mg_44::4::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josefa, izay nataon''ny Apostoly hoe koa Barnabasy (izany hoe, raha adika, Zanaky ny fananarana), Levita, avy any Kyprosy no firazanany,'
mg1865::mg_44::4::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nivarotra ny sahany, ary nentiny ny vola vidiny ka napetrany teo anoloan''ny tongotry ny Apostoly.'
mg1865::mg_44::5::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Ananiasy sy Safira'
  verse_text: 'Fa nisy kosa lehilahy atao hoe Ananiasy sy Safira vadiny nivarotra tany,'
mg1865::mg_44::5::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanafenany ho azy ny vola vidiny, ary ny vavy koa nahalala izany; dia nentiny ny vola sasany vidiny ka napetrany teo anoloan''ny tongotry ny Apostoly.'
mg1865::mg_44::5::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera: Ry Ananiasy, nahoana Satana no nameno ny fonao handainga amin''ny Fanahy Masina ka hanafina ny vola sasany vidin''ny tany?'
mg1865::mg_44::5::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony tsy namidy, tsy anao ihany va izy? Ary rehefa namidy, tsy anao hanaovanao izay sitraponao koa va? Nahoana no nisaina izany tao am-ponao ianao? Tsy nandainga tamin''olona ianao, fa tamin''Andriamanitra.'
mg1865::mg_44::5::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ananiasy, nony nandre izany teny izany, dia nikarapoka, ka afaka ny ainy; dia raiki-tahotra loatra izay rehetra nandre izany.'
mg1865::mg_44::5::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana ny zatovo, dia nofonosiny ny faty ka nentiny nivoaka, dia naleviny.'
mg1865::mg_44::5::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa afaka tokony ho ora telo, dia niditra koa ny vavy, nefa tsy fantany izay efa nanjo teo.'
mg1865::mg_44::5::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera taminy: Lazao amiko: Izany ihany va no vola vidin''ny taninareo? Dia hoy izy: Eny, izany ihany.'
mg1865::mg_44::5::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera taminy: Nahoana ianareo no niray tetika haka fanahy ny Fanahin''ny Tompo? Indro, eo am-baravarana ny tongotr''izay nandevina ny vadinao, ary hitondra anao hivoaka koa izy.'
mg1865::mg_44::5::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nikarapoka teo anoloan''ny tongony niaraka tamin''izay koa izy, ka afaka ny ainy; ary raha niditra ny zatovo, dia hitany fa maty, ary nentiny nivoaka ka naleviny teo anilan''ny lahy.'
mg1865::mg_44::5::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra indrindra ny fiangonana rehetra sy izay rehetra nandre izany.'
mg1865::mg_44::5::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny fahagagana nataon''ny Apostoly sy ny nandrosoan''ny fiangonana'
  verse_text: 'Ary ny tanan''ny Apostoly no nanaovana famantarana sy fahagagana maro teo amin''ny vahoaka; ary izy rehetra niray saina teo amin''ny Fialofan''i Solomona;'
mg1865::mg_44::5::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nisy tamin''ny olona sisa rehetra sahy niray taminy; nefa nankalaza azy ny vahoaka.'
mg1865::mg_44::5::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vao mainka nisy olona maro koa na lahy na vavy izay nino ny Tompo nanampy ho isany;'
mg1865::mg_44::5::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nentiny teny an-dalambe aza ny marary ka napetrany teny ambony farafara sy fandriana, mba hisy ho azon''ny tandindon''i Petera ahay, raha mandalo izy.'
mg1865::mg_44::5::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona maro avy tamin''ny vohitra manodidina an''i Jerosalema dia nivory koa, nitondra ny marary sy izay nampahorin''ny fanahy maloto; dia sitrana avokoa izy rehetra.'
mg1865::mg_44::5::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny namatorana ny Apostoly rehetra, sy ny nitondrana azy teo anatrehan''ny Synedriona'
  verse_text: 'Ary nitsangana ny mpisoronabe mbamin''ny namany rehetra (izay antokon''ny Sadoseo), fa feno fialonana izy,'
mg1865::mg_44::5::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nisambotra ny Apostoly izy ka nanao azy tao an-tranomaizina.'
mg1865::mg_44::5::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy anjelin''ny Tompo namoha ny varavaran''ny tranomaizina nony alina, dia nitondra azy nivoaka ka nanao hoe:'
mg1865::mg_44::5::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana, ka mitsangàna, ary mitoria amin''ny vahoaka eo an-kianjan''ny tempoly ny teny rehetra milaza izany fiainana izany.'
mg1865::mg_44::5::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany izy, dia niditra maraina koa teo an-kianjan''ny tempoly ka nampianatra. Ary rehefa tonga ny mpisoronabe sy ny namany, dia nampiangona ny Synedriona sy ny loholona rehetra tamin''ny Zanak''isiraely izy ka naniraka nankao amin''ny tranomaizina haka ny Apostoly.'
mg1865::mg_44::5::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony tonga ny mpiandry raharaha, dia tsy nahita azy tao an-tranomaizina; dia niverina izy ka nilaza hoe:'
mg1865::mg_44::5::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tranomaizina dia hitanay mihidy tsara, ary ny mpiambina mitsangana eo am-baravarana; kanefa nony novohanay, dia tsy nahita olona tao izahay.'
mg1865::mg_44::5::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehiben''ny mpiambina ny tempoly sy ny lohan''ny mpisorona, rehefa nandre izany teny izany, dia niroahana ny amin''izay ho faran''izany.'
mg1865::mg_44::5::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy tonga ka nilaza taminy hoe: Ireny lehilahy izay nataonareo tao an-tranomaizina ireny, dia indreo izy mitsangana eo an-kianjan''ny tempoly ka mampianatra ny olona.'
mg1865::mg_44::5::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ny lehiben''ny mpiambina sy ny mpiandry raharaha ka nitondra azy, nefa tsy nanao mahery, satria natahotra ny vahoaka izy, fandrao hotorahany vato.'
mg1865::mg_44::5::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nentiny, dia napetrany teo anatrehan''ny Synedriona ireo, ary ny mpisoronabe nanontany azy'
mg1865::mg_44::5::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Efa noraranay mafy dia mafy ianareo tsy hampianatra amin''izany anarana izany; kanjo, indro, efa nofenoinareo ny fampianaranareo Jerosalema, ka tianareo hankinina aminay ny ran''izany Lehilahy izany.'
mg1865::mg_44::5::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera sy ny Apostoly namaly ka nanao hoe: Andriamanitra no tokony hekena mihoatra noho ny olona.'
mg1865::mg_44::5::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitry ny razantsika efa nanangana an''i Jesoa, Izay novonoin''ny tananareo nahantonareo teo amin''ny hazo.'
mg1865::mg_44::5::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy nasandratry ny tanana ankavanan''Andriamanitra* ho Tompo sy Mpamonjy, hanome fibebahana sy famelan-keloka ho an''ny Isiraely. [*Na: nasandratra ho eo an-tanana ankavanan''Andriamanitra]'
mg1865::mg_44::5::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay dia vavolombelon''izany zavatra izany, ary ny Fanahy Masina koa, Izay efa nomen''Andriamanitra ny manaiky Azy.'
mg1865::mg_44::5::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandre izany izy, dia lotika ny fony, ka nikendry hamono azy izy.'
mg1865::mg_44::5::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana teo amin''ny Synedriona ny Fariseo anankiray atao hoe Gamaliela, mpampiana-dalàna, izay nalaza teo amin''ny olona rehetra, ary nasainy navoaka kely ireo olona ireo.'
mg1865::mg_44::5::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny namany: Ry lehilahy Isiraely, tandremo tsara izay hataonareo amin''ireo olona ireo.'
mg1865::mg_44::5::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nitsangana fahiny Teodasy ka nanao ny tenany ho zavatra; tokony ho efa-jato no isan''ny lehilahy izay niandany taminy; fa novonoina izy ka nihahaka izay rehetra nanaiky azy ka tonga tsinontsinona.'
mg1865::mg_44::5::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanarakaraka azy indray, tamin''ny andro nanoratana ny vahoaka, dia nitsangana Jodasy avy any Galilia; ary izy nitaona olona hikomy hanaraka azy; dia novonoina koa izy, ka nihahaka izay rehetra nanaiky azy.'
mg1865::mg_44::5::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny dia lazaiko aminareo: Mandefera amin''ireo olona ireo, ka avelao ihany izy; fa raha avy amin''olona izao saina na asa izao, dia ho foana;'
mg1865::mg_44::5::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha avy amin''Andriamanitra kosa izao, dia tsy ho azonareo foanana, sao dia miseho ho mpiady amin''Andriamanitra ianareo.'
mg1865::mg_44::5::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanaiky azy izy; ary rehefa niantso ny Apostoly izy, dia nikapoka azy sady nandrara azy tsy hiteny amin''ny anaran''i Jesoa intsony, ary dia nandefa azy handeha.'
mg1865::mg_44::5::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia niala teo anatrehan''ny Synedriona, sady faly, satria natao miendrika hitondra fahafaham-baraka ho voninahitr''izany anarana izany.'
mg1865::mg_44::5::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 5
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nitsahatra nampianatra sy nitory an''i Jesoa ho Kristy isan''andro teo an-kianjan''ny tempoly sy tao an-trano izy.'
mg1865::mg_44::6::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: '2022-08-24T08:44:01+0000'
  verse_title: 'Ny nifidianana ny fito lahy, sy ny nandrosoan''ny fiangonana'
  verse_text: 'Ary tamin''izany andro izany, rehefa nihamaro ny isan''ny mpianatra, dia nimonomonona tamin''ny Hebreo ny Helenista, satria tsy mba henina tamin''ny fiantrana isan''andro ny mpitondratenany.'
mg1865::mg_44::6::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny roa ambin''ny folo lahy nampiangona ny mpianatra rehetra ka nanao hoe: Tsy mety raha mandao ny tenin''Andriamanitra hitandrina latabatra izahay.'
mg1865::mg_44::6::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, ry rahalahy, mizahà fito lahy eo aminareo, izay tsara laza sady feno ny Fanahy sy fahendrena, mba hotendrenay hitandrina izany raharaha izany.'
mg1865::mg_44::6::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay kosa haharitra amin''ny fivavahana sy ny fampianarana.'
mg1865::mg_44::6::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia sitraky ny olona rehetra ny teniny, ka nifidy an''i Stefana izy, lehilahy feno finoana sy ny Fanahy Masina, ary Filipo sy Prokoro sy Nikanora sy Timona sy Parmena ary Nikoleo (proselyta avy any Antiokia),'
mg1865::mg_44::6::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ireo dia narosony teo anatrehan''ny Apostoly; ary rehefa nivavaka ny Apostoly, dia nametra-tanana taminy.'
mg1865::mg_44::6::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandroso ny tenin''Andriamanitra; ary nihamaro indrindra ny isan''ny mpianatra tany Jerosalema; ary maro be kosa ny mpisorona nanaiky ny finoana.'
mg1865::mg_44::6::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny amin''i Stefana'
  verse_text: 'Ary Stefana, feno fahasoavana sy hery, dia nanao fahagagana sy famantarana lehibe teo amin''ny vahoaka.'
mg1865::mg_44::6::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany, izay avy amin''ny synagoga atao hoe Synagogan''ny Libertina sy ny Kyreniana sy ny Aleksandriana mbamin''izay avy any Kilikia sy Asia, dia nitsangana ka niady hevitra tamin''i Stefana.'
mg1865::mg_44::6::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nahatohitra ny fahendrena sy ny Fanahy izay nitenenany ireo;'
mg1865::mg_44::6::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nisy olona nomeny vava hanao hoe: Efa renay niteny ratsy* an''i Mosesy sy Andriamanitra ity. [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_44::6::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampitaitra ny olona sy ny loholona ary ny mpanora-dalàna izy, dia nankeo amin''i Stefana ka nisarika azy, dia nitondra azy ho eo amin''ny Synedriona;'
mg1865::mg_44::6::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy nanangana vavolombelona mandainga, izay nanao hoe: Io lehilahy io tsy mitsahatra miteny ratsy ity fitoerana masina ity sy ny lalàna;'
mg1865::mg_44::6::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa renay izy nilaza fa ilay Jesoa avy any Nazareta dia handrava ity fitoerana ity sy hanova ny fomba izay natolotr''i Mosesy antsika.'
mg1865::mg_44::6::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra nipetraka teo amin''ny Synedriona, raha nandinika an''i Stefana, dia nahita ny tarehiny tahaka ny tarehin''anjely. ]'
mg1865::mg_44::7::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpisoronabe: Moa izany tokoa va?'
mg1865::mg_44::7::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hoy Stefana: Mihainoa, ry rahalahy sy ianareo ray: Andriamanitry ny voninahitra niseho tamin''i Abrahama razantsika, raha tany Mesopotamia izy, fony tsy mbola nonina tany Harana,'
mg1865::mg_44::7::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Mialà amin''ny taninao sy ny havanao, ka andeha ho any amin''ny tany izay hasehoko anao (Genesisy 12:1).'
mg1865::mg_44::7::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala tamin''ny tanin''ny Kaldeana izy ka nonina tany Harana; ary rehefa maty ny rainy, dia nafindran''Andriamanitra niala teo izy hankany amin''ny tany izay onenanareo ankehitriny.'
mg1865::mg_44::7::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nomeny lova teto izy, na dia eram-paladia akory aza; kanefa nampanantenainy izy fa homeny azy sy ny taranany mandimby azy ho lovany izany, na dia tsy mbola nanan-janaka akory aza izy.'
mg1865::mg_44::7::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nolazain''Andriamanitra fa ny taranany hivahiny any amin''ny tanin''ny firenena hafa ary handevoziny sy hampahoriny efa-jato taona.'
mg1865::mg_44::7::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny firenena izay hotompoiny dia hotsaraiko kosa, hoy Andriamanitra; ary rehefa afaka izany, dia hivoaka izy ka hanompo Ahy eto amin''ity tany ity (Genesisy 15:13-14).'
mg1865::mg_44::7::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeny fanekena amin''ny famorana izy. Ary dia niteraka an''Isaka izy ka namora azy tamin''ny andro fahavalo; ary Isaka niteraka an''i Jakoba, ary Jakoba niteraka ny patriarka roa ambin''ny folo lahy.'
mg1865::mg_44::7::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nialona an''i Josefa ny patriarka ka nivarotra azy ho any Egypta; nefa Andriamanitra nomba azy'
mg1865::mg_44::7::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nahafaka azy tamin''ny fahoriany rehetra sady nanome azy fahasoavana sy fahendrena teo imason''i Farao, mpanjakan''i Egypta; ary izy nanendry azy ho mpanapaka any Egypta mbamin''izay rehetra tao an-dapany.'
mg1865::mg_44::7::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mosary eran''i Egypta sy Kanana rehetra, ka mafy ny fahoriana; ary tsy nahita hanina ny razantsika.'
mg1865::mg_44::7::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nandre Jakoba fa nisy vary tany Egypta, dia naniraka ny razantsika izy tamin''ny voalohany.'
mg1865::mg_44::7::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fanindroany dia fantatr''izy mirahalahy avy Josefa, ary dia fantatr''i Farao koa ny havan''i Josefa.'
mg1865::mg_44::7::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josefa naniraka ka nampaka an''i Jakoba rainy mbamin''ny mpianakaviny rehetra, dia olona dimy amby fito-polo izy.'
mg1865::mg_44::7::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jakoba nidina nankany Egypta, dia maty izy sy ny razantsika;'
mg1865::mg_44::7::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nentina ho any Sekema izy ka nalevina tao amin''ny fasana izay novidin''i Abrahama vola tamin''ny zanak''i Hamora tany Sekema.'
mg1865::mg_44::7::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa ho tonga ny fotoana hahatanterahana ny teny fikasana, izay nataon''Andriamanitra tamin''i Abrahama, dia nitombo sy nihamaro ny olona tany Egypta,'
mg1865::mg_44::7::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandra-pitsangan''ny mpanjaka hafa tany Egypta, izay tsy nahalala an''i Josefa.'
mg1865::mg_44::7::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanao hafetsena tamin''ny razantsika, dia nampahory azy, ka dia samy nanary ny zanany vao teraka mba tsy ho velona izy.'
mg1865::mg_44::7::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany andro izany no nahaterahan''i Mosesy, ary tsara teo anatrehan''Andriamanitra izy ka notezaina telo volana tao an-tranon''ny rainy.'
mg1865::mg_44::7::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa nariana izy, dia nalain''ny zanakavavin''i Farao ka notezainy ho zanany.'
mg1865::mg_44::7::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy nampianarina ny fahendrena rehetra nananan''ny Egyptiana, ary nahery tamin''ny teniny sy ny asany izy.'
mg1865::mg_44::7::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ho efa-polo taona izy, dia velona tao am-pony ny hamangy ny Zanak''isiraely, rahalahiny'
mg1865::mg_44::7::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita ny anankiray nampahorina maina izy, dia namaly ka namono ilay Egyptiana ary namonjy ilay nampahorina.'
mg1865::mg_44::7::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony fa ho fantatry ny rahalahiny fa ny tanany no hamonjen''Andriamanitra azy; kanjo tsy fantany.'
mg1865::mg_44::7::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''iny dia niseho tamin''ireo izay niady Mosesy ary nanao izay hampihavana azy ka nanao hoe: Raondriana, mirahalahy ianareo, koa nahoana ianareo no miady?'
mg1865::mg_44::7::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay namely maina ny namany dia nanosika azy ka nanao hoe: Iza no nanendry an''ialahy ho mpanapaka sy mpitsara anay?'
mg1865::mg_44::7::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa ta-hamono ahy koa va ialahy tahaka ny namonoan''ialahy ilay Egyptiana omaly? (Eksodosy 2:13-14.)'
mg1865::mg_44::7::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany teny izany dia nandositra Mosesy ka nivahiny tany amin''ny tany Midiana, ary tany no niterahany zanaka roa lahy.'
mg1865::mg_44::7::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka efa-polo taona, dia nisy anjely niseho taminy tany an''efitry ny tendrombohitra Sinay teo anaty lelafo teo amin''ny voaroy.'
mg1865::mg_44::7::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy, nony nahita, dia gaga noho ny fahitana; nefa nony nanatona handinika izy, dia tonga ny feon''ny Tompo nanao hoe:'
mg1865::mg_44::7::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Andriamanitry ny razanao, dia Andriamanitr''i Abrahama sy Isaka ary Jakoba (Eksodosy 3:6). Dia tora-kovitra Mosesy ka tsy sahy nandinika.'
mg1865::mg_44::7::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Esory ny kapa amin''ny tongotrao; fa masina io tany ijanonanao io.'
mg1865::mg_44::7::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitako tokoa ny fahorian''ny oloko any Egypta, ary reko ny fitarainany, dia nidina hamonjy azy Aho. Koa andeha ankehitriny, dia hirahiko ho any Egypta ianao (Eksodosy 3:5-10).'
mg1865::mg_44::7::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany Mosesy izany dia nolaviny ka nataony hoe: Iza no nanendry an''ialahy ho mpanapaka sy mpitsara? (Eksodosy 2:14) kanjo izy ihany no nirahin''Andriamanitra ho mpanapaka sy mpanavotra nomban''ny tanan''ny Anjely, Ilay niseho taminy teo amin''ny voaroy.'
mg1865::mg_44::7::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nitondra ny olona nivoaka sady nanao fahagagana sy famantarana tany Egypta sy teo amin''ny Ranomasina Mena ary tany an''efitra efa-polo taona.'
mg1865::mg_44::7::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no Mosesy izay nilaza tamin''ny Zanak''isiraely hoe: Mpaminany no hatsangan''Andriamanitra ho anareo avy amin''ny rahalahinareo, tahaka ahy (Deoteronomia 18:15).'
mg1865::mg_44::7::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy ilay teo amin''ny fiangonana tany an''efitra mbamin''ny Anjely izay niteny taminy tany an-tendrombohitra Sinay sy tamin''ny razantsika, ka izy no nandray teny velona mba homeny antsika.'
mg1865::mg_44::7::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny razantsika tsy nety nanaiky azy, fa nandà, dia manina an''i Egypta ny fony,'
mg1865::mg_44::7::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy izy tamin''i Arona: Anaovy andriamanitra izahay, hitarika antsika eo aloha; fa ilay Mosesy iny, izay nitondra antsika nivoaka avy tany amin''ny tany Egypta, dia tsy fantatray izay nanjo azy (Eksodosy 32:1).'
mg1865::mg_44::7::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanao ombilahy kely izy tamin''izany andro izany, dia nanatitra fanatitra tamin''ny sampy ka niravoravo tamin''ny asan''ny tanany.'
mg1865::mg_44::7::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra nihodina, dia nanolotra azy hanompo izay eny amin''ny lanitra; araka ny voasoratra eo amin''ny bokin''ny mpaminany hoe: Moa nanatitra zavatra voavono sy fanatitra ho Ahy efa-polo taona tany an''efitra va ianareo, ry taranak''isiraely?'
mg1865::mg_44::7::43:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, fa nobetainareo ny tranolain''i Moloka sy ny kintan''ny andriamanitra atao hoe Refana, Dia ny endri-javatra izay nataonareo hivavahana, Ka dia hamindra anareo ho any ankoatr''i Babylona Aho (Amosa 5:25-27).'
mg1865::mg_44::7::44:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny trano-lain''ny Vavolombelona dia teo amin''ny razantsika tany an''efitra, tahaka ny voatendrin''izay niteny tamin''i Mosesy mba hanaovany azy araka ny endrika izay efa hitany.'
mg1865::mg_44::7::45:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany koa dia noraisin''ny razantsika izay nandimby ireo, ka nentiny niditra niaraka tamin''i Josoa tamin''ny nahazoany ny tanin''ny firenena izay noroahin''Andriamanitra hiala teo anoloan''ny razantsika hatramin''ny andron''i Davida;'
mg1865::mg_44::7::46:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'izy nahita fitia anatrehan''Andriamanitra ka nangataka hahita trano ho an''Andriamanitr''i Jakoba.'
mg1865::mg_44::7::47:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Solomona kosa no nanao trano ho Azy.'
mg1865::mg_44::7::48:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny Avo Indrindra tsy mitoetra ao amin''izay nataon-tanan''olona; araka ny nolazain''ny mpaminany hoe:'
mg1865::mg_44::7::49:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra no seza fiandrianako, Ary ny tany no fitoeran-tongotro; Koa trano manao ahoana no hataonareo ho Ahy? hoy Jehovah, Ary manao ahoana no ho fitoerana fitsaharako?'
mg1865::mg_44::7::50:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny tanako va no nanao izao zavatra rehetra izao? (Isaia 66:1-2.)'
mg1865::mg_44::7::51:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry olona mafy hatoka sady tsy voafora fo sy sofina, ianareo manohitra ny Fanahy Masina mandrakariva; tahaka ny nataon''ny razanareo ihany no ataonareo koa.'
mg1865::mg_44::7::52:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mpaminany izay tsy nenjehin''ny razanareo? Eny, novonoiny aza izay naminany ny fihavian''ilay Marina; ary ankehitriny dia efa tonga mpamadika sy mpamono Azy ianareo,'
mg1865::mg_44::7::53:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona izay nahazo ny lalàna tamin''ny nandaharan''anjely azy, nefa tsy nankatò izany.'
mg1865::mg_44::7::54:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany izy ireo, dia lotika ny fony, ka nihidy vazana taminy izy.'
mg1865::mg_44::7::55:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Stefana, feno ny Fanahy Masina, dia nibanjina ny lanitra ka nahita ny voninahitr''Andriamanitra sy Jesoa nitsangana teo ankavanan''Andriamanitra,'
mg1865::mg_44::7::56:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao hoe: Indro, hitako ny lanitra misokatra ary ny Zanak''olona mitsangana eo ankavanan''Andriamanitra.'
mg1865::mg_44::7::57:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona niantso tamin''ny feo mahery sady nanentsin-tadiny ka indray nirodona taminy,'
mg1865::mg_44::7::58:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nandroaka azy ho eny ivelan''ny tanàna ka nitora-bato azy; ary ireo vavolombelona dia nametraka ny fitafiany teo anilan''ny tongotry ny zatovo anankiray atao hoe Saoly.'
mg1865::mg_44::7::59:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona nitora-bato an''i Stefana, izay niantso hoe: Ry Jesoa Tompo o, raiso ny fanahiko.'
mg1865::mg_44::7::60:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 7
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandohalika izy ka niantso tamin''ny feo mahery hoe Tompo o, aza atao ho helony anie izao ota izao. Ary rehefa nilaza izany izy, dia nodi-mandry.'
mg1865::mg_44::8::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly mba nankasitraka ny namonoana azy koa. [*Ny nielezan''ny mpianatra noho ny fanenjehana, sy ny nitorian''ny Filipo tany Samaria sy tamin''ilay tandapa Etiopiana] Ary tamin''izany andro izany dia nisy fanenjehana mafy tamin''ny fiangonana tany Jerosalema; ka dia niely teny amin''ny tany Jodia sy Samaria izy rehetra, afa-tsy ny Apostoly ihany.'
mg1865::mg_44::8::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mpivavaka tsara no nandevina an''i Stefana sady nisaona azy fatratra.'
mg1865::mg_44::8::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Saoly nampahory mafy ny fiangonana, ka nidirany isan-trano sady nosarihany, na ny lehilahy na ny vehivavy, ka nataony tao an-tranomaizina.'
mg1865::mg_44::8::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay niely dia nandeha nitory teny tontolo eny.'
mg1865::mg_44::8::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Filipo nidina tany an-tanàna any Samaria ka nitory an''i Kristy tamin''ny olona tao.'
mg1865::mg_44::8::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka betsaka dia niray hevitra nihaino izay nolazain''i Filipo, raha nandre azy sy nahita ny fahagagana nataony.'
mg1865::mg_44::8::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanahy maloto niantso tamin''ny feo mahery, dia nivoaka tamin''ny maro izay nanana azy; ary maro ny mararin''ny paralysisa sy ny mandringa no nositraniny.'
mg1865::mg_44::8::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy fifaliana lehibe tao amin''izany tanàna izany.'
mg1865::mg_44::8::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray rahateo teo an-tanàna, atao hoe Simona, izay nanao ody ka nahatalanjona ny olona tany Samaria sady nandoka tena nanao azy ho zavatra;'
mg1865::mg_44::8::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nihaino azy ny olona rehetra, na ny kely na ny lehibe, ka nanao hoe: Ity lehilahy ity no herin''Andriamanitra, izay atao hoe hery lehibe.'
mg1865::mg_44::8::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihaino azy ny olona, satria efa ela no talanjona tamin''ny odiny.'
mg1865::mg_44::8::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nino an''i Filipo nitory ny teny soa mahafaly ny amin''ny fanjakan''Andriamanitra sy ny anaran''i Jesoa Kristy ireo, dia natao batisa avokoa na lahy na vavy.'
mg1865::mg_44::8::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona koa mba nino; ary rehefa natao batisa izy, dia nanaraka an''i Filipo. Ary talanjona izy, raha nahita ny famantarana sy ny asa lehibe izay natao.'
mg1865::mg_44::8::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny Apostoly tany Jerosalema fa Samaria efa nandray ny tenin''Andriamanitra, dia naniraka an''i Petera sy Jaona izy hankany aminy.'
mg1865::mg_44::8::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony tafidina tany izy roa lahy, dia nivavaka ho an''ny olona mba handraisany ny Fanahy Masina.'
mg1865::mg_44::8::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mbola nisy nilatsahany izy na dia iray akory aza; fa natao batisa tamin''ny anaran''i Jesoa Tompo ihany izy.'
mg1865::mg_44::8::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy roa lahy nametra-tanana taminy, ka dia nandray ny Fanahy Masina ireo.'
mg1865::mg_44::8::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona, nony nahita fa ny fametrahan''ny Apostoly tanana no nanomezana ny Fanahy Masina, dia nitondra vola homena azy'
mg1865::mg_44::8::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Omeo izany fahefana izany koa aho, mba handray ny Fanahy Masina izay olona hametrahako tanana.'
mg1865::mg_44::8::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Petera taminy: Aoka ho very mbamin''ny tenanao ny volanao, satria nataonao fa azo vidim-bola ny fanomezan''Andriamanitra.'
mg1865::mg_44::8::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manana anjara na raharaha amin''izany zavatra izany ianao, satria tsy mahitsy fo eo anatrehan''Andriamanitra.'
mg1865::mg_44::8::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mibebaha amin''izao haratsianao izao, ka mangataha amin''ny Tompo, andrao mba havelany izay noheverin''ny fonao.'
mg1865::mg_44::8::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hitako fa mbola mitoetra amin''ny fangidian''afero sy ny fehin-keloka ihany ianao.'
mg1865::mg_44::8::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona namaly ka nanao hoe: Mangataha ho ahy amin''ny Tompo, mba tsy ho tonga amiko izay nolazainareo.'
mg1865::mg_44::8::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanambara sy nitory ny tenin''ny Tompo Petera sy Jaona, dia niverina nankany Jerosalema ka nitory ny filazantsara teny amin''ny vohitra maro izay an''ny Samaritana.'
mg1865::mg_44::8::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjelin''ny Tompo nilaza tamin''i Filipo ka nanao hoe: Mitsangàna, ka mandehana mianatsimo ho any amin''ny lalana midina avy any Jerosalema mankany Gaza; dia efitra izany.'
mg1865::mg_44::8::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana izy ka lasa nandeha; ary, indro, nisy lehilahy Etiopiana, tandapan''i Kandasy, mpanjakavavin''ny Etiopiana, sady mpitahiry ny hareny rehetra, ary tonga tany Jerosalema izy mba hivavaka;'
mg1865::mg_44::8::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nody izy ka nipetraka teo anatin''ny kalesiny ary namaky teny tao amin''Isaia mpaminany'
mg1865::mg_44::8::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Fanahy tamin''i Filipo: Andeha manatona ka mankanesa amin''io kalesy io.'
mg1865::mg_44::8::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Filipo nihazakazaka nankeo aminy, dia nandre azy mamaky teny tao amin''Isaia mpaminany, ka niteny taminy hoe: Moa fantatrao va izay vakinao?'
mg1865::mg_44::8::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Hataoko ahoana no fahay, raha tsy misy mampianatra* ahy? Ary izy nangataka an''i Filipo hiakatra sy hipetraka eo aminy. [*Grika: mitari-dalana]'
mg1865::mg_44::8::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no tenin''ny Soratra Masina novakiny: Nentina hovonoina tahaka ny ondry Izy, Ary tsy niloa-bava, Tahaka ny zanak''ondry moana eo anoloan''ny mpanety azy;'
mg1865::mg_44::8::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fietren-tena no nanaovana Azy resy lahatra; Ary iza no hahalaza ny amin''ny niara-belona taminy *? Fa ny ainy nesorina tamin''ny tany (Isaia 53:7-8). [*Na: ny fianakaviany]'
mg1865::mg_44::8::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay tandapa namaly an''i Filipo ka nanao hoe: Masìna ianao, iza moa no lazain''ny mpaminany amin''izany? Ny tenany va, sa olon-kafa?'
mg1865::mg_44::8::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Filipo niloa-bava, dia nanomboka teo amin''izany Soratra Masina izany nitory an''i Jesoa taminy.'
mg1865::mg_44::8::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha teny an-dàlana izy, dia tonga teo amin''izay nisy rano; ary hoy ilay tandapa: Indro rano, ka inona moa no misakana ahy tsy hatao batisa?'
mg1865::mg_44::8::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: 37 Dia hoy Filipo: raha mino amin''ny fonao rehetra ianao, dia azo atao ihany. Ary namaly izy ka nanao hoe: Mino aho fa Kristy no Zanak''Andriamanitra]'
mg1865::mg_44::8::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasainy najanona ny kalesy; ary izy roa lahy, dia Filipo sy ilay tandapa, nidina ho eo amin''ny rano; dia nataony batisa izy.'
mg1865::mg_44::8::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niakatra avy teo amin''ny rano izy roa lahy, dia nentin''ny Fanahin''ny Tompo Filipo ka tsy hitan''ilay tandapa intsony; fa nandeha tamin''ny nalehany izy sady nifaly.'
mg1865::mg_44::8::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 8
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Filipo hita tany Azota, dia nitory ny filazantsara tany amin''ny tanàna rehetra izay nalehany ambara-pahatongany tany Kaisaria.'
mg1865::mg_44::9::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niovan''i Saoly ho Kristiana'
  verse_text: 'Ary Saoly mbola nifofofofo fandrahonana sy famonoana tamin''ny mpianatry ny Tompo ihany, dia nankao amin''ny mpisoronabe izy'
mg1865::mg_44::9::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nangataka taratasy taminy ho any amin''ny synagoga any Damaskosy, mba ho entiny mifatotra ho any Jerosalema izay rehetra hitany momba izany fampianarana* izany, na lahy na vavy. [*Gr: lalana]'
mg1865::mg_44::9::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha izy, dia tonga teo akaikin''i Damaskosy; ary nisy mazava avy tany an-danitra nanelatrelatra tampoka manodidina azy;'
mg1865::mg_44::9::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia lavo tamin''ny tany izy ka nandre feo nanao taminy hoe: Saoly, Saoly, nahoana ianao no manenjika Ahy?'
mg1865::mg_44::9::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Iza moa ianao, Tompoko? Dia hoy Izy: Izaho no Jesoa Izay enjehinao;'
mg1865::mg_44::9::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mitsangàna, ka mankanesa ho any an-tanàna, dia holazaina aminao izay mety hataonao.'
mg1865::mg_44::9::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay nomba azy tamin''ny nalehany dia nitsangana tsy nahateny, ary nandre ny feo izy, nefa tsy nahita olona.'
mg1865::mg_44::9::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nitsangana tamin''ny tany, ary rehefa nahirany ny masony, dia tsy nahita na inona na inona izy; ary ireo nitantana azy ka nitondra azy ho any Damaskosy.'
mg1865::mg_44::9::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nahita izy hateloana sady tsy nihinana na nisotro.'
mg1865::mg_44::9::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpianatra anankiray tany Damaskosy, atao hoe Ananiasy; ary hoy ny Tompo taminy tamin''ny fahitana: Ry Ananiasy. Dia hoy izy: Inty aho, Tompoko.'
mg1865::mg_44::9::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Tompo taminy: Mitsangàna, ka mandehana any amin''ny lalana atao hoe Imahitsy, ka izahao ao an-tranon''i Jodasy izay lehilahy atao hoe Saoly avy any Tarsosy; fa, indro, efa mivavaka izy;'
mg1865::mg_44::9::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izy efa nahita lehilahy atao hoe Ananiasy niditra ka nametra-tanana taminy, mba hahiratra indray ny masony.'
mg1865::mg_44::9::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ananiasy namaly hoe: Tompoko, efa reko tamin''ny maro ny haben''ny ratsy nataon''izany lehilahy izany tamin''ny olonao masina tany Jerosalema.'
mg1865::mg_44::9::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manana fahefana aty koa avy tamin''ny mpisoronabe izy hamatotra izay rehetra miantso ny anaranao.'
mg1865::mg_44::9::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Tompo taminy: Mandehana, fa fanaka voafidy izy ho fitondrana ny anarako eo anatrehan''ny jentilisa sy ny mpanjaka ary ny Zanak''isiraely;'
mg1865::mg_44::9::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hasehoko azy ny habetsahan''izay tsy maintsy hiaretany ho voninahitry ny anarako.'
mg1865::mg_44::9::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha Ananiasy ka niditra tao an-trano, dia nametra-tanana taminy ka nanao hoe Ry Saoly rahalahy, ny Tompo, dia Jesoa Izay niseho taminao teo amin''ny lalana nalehanao, no efa naniraka ahy, mba hahiratan''ny masonao, ary mba ho feno ny Fanahy Masina ianao.'
mg1865::mg_44::9::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nisy zavatra toy ny kiran''ny hazandrano niala avy tamin''ny masony, dia nahiratra izy ka nitsangana, dia natao batisa;'
mg1865::mg_44::9::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nihinan-kanina izy ka dia natanjaka. #Ny nitorian''i Saoly tany Damaskosy sy Jerosalema# Ary Saoly nitoetra andro vitsivitsy teo amin''ny mpianatra tany Damaskosy.'
mg1865::mg_44::9::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nitory teo amin''ny synagoga izy ka nilaza an''i Jesoa fa Zanak''Andriamanitra.'
mg1865::mg_44::9::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary talanjona izay rehetra nandre ka nanao hoe: Tsy ity va ilay nandringana izay niantso izany anarana izany tany Jerosalema? ary tonga koa izy mba hitondra azy mifatotra ho any amin''ny mpisoronabe.'
mg1865::mg_44::9::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly mainka nihahery, dia nandresy lahatra ny Jiosy izay nonina tany Damaskosy ka naneho marimarina fa Jesoa* no Kristy. [*Grika: Ity]'
mg1865::mg_44::9::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka andro maromaro, dia nikendry hamono azy ny Jiosy;'
mg1865::mg_44::9::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa fantatr''i Saoly ny fihendreny. Ary izy ireo niambina ny vavahady andro aman''alina hamonoany azy.'
mg1865::mg_44::9::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpianany naka azy nony alina ka nampidina azy tamin''ny sobiky avy eo amin''ny mànda.'
mg1865::mg_44::9::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Jerosalema Saoly, dia nitady hiray tamin''ny mpianatra; fa izy rehetra natahotra azy ka tsy nino azy ho mpianatra.'
mg1865::mg_44::9::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Barnabasy naka azy ka nitondra azy ho any amin''ny Apostoly, dia nanambara taminy ny nahitany ny Tompo sy ny nitenenany taminy teny an-dàlana ary ny fahasahiany nitory ny anaran''i Jesoa tany Damaskosy.'
mg1865::mg_44::9::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niara-niditra sy nivoaka tamin''ireo tany Jerosalema,'
mg1865::mg_44::9::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nitory tamin''ny anaran''ny Tompo tamin''ny fahasahiana ary niresaka sy niady hevitra tamin''ny Helenista; fa ireny nitady hahafaty azy.'
mg1865::mg_44::9::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa fantatry ny rahalahy izany, dia nentiny nidina nankany Kaisaria izy ka nampandehaniny ho any Tarsosy.'
mg1865::mg_44::9::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanam-piadanana ny fiangonana eran''i Jodia sy Galilia ary Samaria rehetra, sady nandroso tsara sy nandeha tamin''ny fahatahorana ny Tompo sy ny famporisihan''ny Fanahy ka nihamaro.'
mg1865::mg_44::9::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Ny nandehanan''i Petera nitety tany, sy ny nananganany an''i Dorkasy tamin''ny maty'
  verse_text: 'Ary raha nandeha nitety ny tany rehetra Petera, dia nidina ho any amin''ny olona masina nonina tany Lyda koa.'
mg1865::mg_44::9::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nahita lehilahy anankiray teo, atao hoe Enea, izay efa nandry valo taona teo am-parafara, fa mararin''ny paralysisa.'
mg1865::mg_44::9::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera taminy: Ry Enea, manasitrana anao Jesoa Kristy; mitsangàna, ka amboary ny fandrianao. Dia nitsangana niaraka tamin''izay izy.'
mg1865::mg_44::9::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita azy izay rehetra nonina tany Lyda sy Saròna, ka dia niverina ho amin''ny Tompo.'
mg1865::mg_44::9::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany Jopa nisy vehivavy mpianatra atao hoe Tabita, izany hoe, raha adika, Dorkasy*; ary be ny asa soa sy ny fiantrana izay nataon''izany vehivavy izany. [*Dorkasy = Gazela; izahao II Samoela 2:18]'
mg1865::mg_44::9::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary narary izy tamin''izany andro izany, ka dia maty; ary rehefa nampandroiny ny faty, dia napetrany tao an-trano ambony.'
mg1865::mg_44::9::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria Lyda akaikin''i Jopa, ary ny mpianatra nandre fa efa tonga ao Petera, dia naniraka roa lahy izy hangataka azy hoe: Aza misalasala hankaty aminay.'
mg1865::mg_44::9::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Petera ka nandeha niaraka taminy. Ary nony tonga izy, dia nentiny tany an-trano ambony; ary ny mpitondratena rehetra nitsangana teo anilany ka nitomany sady nampiseho ny akanjo sy lamba izay nozairin''i Dorkasy fony fahavelony.'
mg1865::mg_44::9::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navoak''i Petera avokoa izy rehetra, dia nandohalika izy ka nivavaka; ary nitodika nanatrika ny faty izy ka nanao hoe: Ry Tabita, mitsangàna. Dia nahirany ny masony; ary raha nahita an''i Petera izy, dia niarina.'
mg1865::mg_44::9::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nanolo-tanana azy ka nanangana azy; ary rehefa niantso ny olona masina sy ny mpitondratena izy, dia nanolotra azy velona.'
mg1865::mg_44::9::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia fantatra eran''i Jopa izany, ka maro no nino ny Tompo.'
mg1865::mg_44::9::43:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 9
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nitoetra andro maromaro tany Jopa tao amin''i Simona mpandon-koditra.'
mg1865::mg_44::10::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Kornelio'
  verse_text: 'Ary nisy lehilahy anankiray tany Kaisaria, atao hoe Kornelio, kapiteny tamin''ny antokon''ny miaramila atao hoe Italiana;'
mg1865::mg_44::10::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mpivavaka tsara sady natahotra an''Andriamanitra izy mbamin''ny ankohonany rehetra ka nanao fiantrana be tamin''ny olona sady nivavaka tamin''Andriamanitra mandrakariva.'
mg1865::mg_44::10::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nahita miharihary tamin''ny fahitana, rehefa tokony ho tamin''ny ora fahasivy antoandro, fa, indro, nisy anjelin''Andriamanitra niditra tao aminy ka nanao taminy hoe: Ry Kornelio.'
mg1865::mg_44::10::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nibanjina azy izy, dia raiki-tahotra ka nanao hoe: Ahoana, Tompoko? Ary izy nanao taminy hoe: Ny fivavakao sy ny fiantranao dia efa tafakatra ho fampahatsiarovana eo anatrehan''Andriamanitra.'
mg1865::mg_44::10::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny maniraha olona hankany Jopa, ka ampanalao Simona anankiray, izay atao hoe koa Petera;'
mg1865::mg_44::10::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitoetra ao amin''i Simona mpandon-koditra izy, eo amoron-dranomasina ny tranony.'
mg1865::mg_44::10::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lasa ny anjely izay niteny tamin''i Kornelio, dia niantso roa lahy tamin''ny mpanompony izy sy miaramila mpivavaka anankiray isan''izay nanaraka azy isan''andro.'
mg1865::mg_44::10::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nambarany taminy izany rehetra izany, dia naniraka azy hankany Jopa izy.'
mg1865::mg_44::10::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso, raha mbola nandeha teny an-dàlana izy ireo ka mby teo akaikin''ny tanàna, dia niakatra teo ambonin''ny tampon-trano Petera mba hivavaka, rehefa tokony ho tamin''ny ora fahenina.'
mg1865::mg_44::10::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noana loatra izy ka te-hihinana; fa raha mbola natao ny nahandro, dia azon-tsindrimandry izy'
mg1865::mg_44::10::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nahita ny lanitra misokatra, sady nisy zavatra midina toa lamba lehibe nampidinina tamin''ny zorony efatra ho amin''ny tany;'
mg1865::mg_44::10::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tao anatiny nisy ny biby rehetra izay manan-tongotra efatra sy ny zava-mandady sy mikisaka ety an-tany ary ny voro-manidina.'
mg1865::mg_44::10::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo nanao taminy hoe: Mitsangàna, ry Petera; vonoy, ka hano.'
mg1865::mg_44::10::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Petera: Sanatria, Tompoko! fa tsy mbola nihinana zava-padina na tsy madio aho.'
mg1865::mg_44::10::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ilay feo taminy fanindroany: Izay efa nodiovin''Andriamanitra dia aza ataonao ho fady.'
mg1865::mg_44::10::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary intelo no nanaovana izany; dia nakarina tany an-danitra niaraka tamin''izay ilay zavatra.'
mg1865::mg_44::10::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nieritreritra tao am-pony Petera ny amin''izay anton''ny fahitana efa hitany, dia, indreo, ny olona izay nirahin''i Kornelio nanontany ny tranon''i Simona ka nijanona teo am-bavahady,'
mg1865::mg_44::10::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niantso ka nanontany na mitoetra ao Simona, izay atao hoe koa Petera, na tsia.'
mg1865::mg_44::10::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola nieritreritra ny fahitana Petera, dia hoy ny Fanahy taminy: Indreo, misy telo lahy mitady anao;'
mg1865::mg_44::10::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mitsangàna ianao, dia midina, ary mandehana miaraka aminy, ka aza misalasala, fa Izaho no naniraka azy.'
mg1865::mg_44::10::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nidina tany amin''ireo olona ireo ka nanao hoe: Inty aho izay tadiavinareo; inona no anton''ny ahatongavanareo aty?'
mg1865::mg_44::10::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ireo: Kornelio kapiteny, lehilahy marina sady matahotra an''Andriamanitra ka tsara laza amin''ny firenen''ny Jiosy rehetra, dia efa notoroan''anjely masina hevitra hampaka anao ho any an-tranony sy hihaino teny avy aminao.'
mg1865::mg_44::10::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nampiantrano azy handry tao. Ary nony ampitso dia niainga Petera ka nandeha niaraka taminy, ary ny rahalahy sasany avy tany Jopa niaraka taminy koa.'
mg1865::mg_44::10::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso indray dia tonga tany Kaisaria izy. Ary Kornelio niandry azy sady efa nampiangona ny havany sy ny tena sakaizany.'
mg1865::mg_44::10::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao niditra Petera, dia nitsena azy Kornelio ka niankohoka teo amin''ny tongony sady nitsaoka azy.'
mg1865::mg_44::10::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera nampitsangana azy ka nanao hoe: Mitsangàna; fa izaho dia olona ihany.'
mg1865::mg_44::10::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niresaka taminy izy, dia niditra tao an-trano ka nahita ny olona maro tafangona tao.'
mg1865::mg_44::10::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Ianareo mahalala fa fady amin''ny Jiosy ny hanan-draharaha na hiantrano amin''ny olona hafa firenena; nefa izaho efa nampahafantarin''Andriamanitra fa tsy misy olona azoko atao hoe fady na tsy madio.'
mg1865::mg_44::10::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia tsy nandà tsy hankaty aho, raha nampanalaina; koa manontany aho: Ahoana moa no nampanalanareo ahy?'
mg1865::mg_44::10::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Kornelio: Loak''andro afak''omaly, mandra-paha-toy izao ny andro, raha nivavaka teto an-tranoko aho mandritra ny ora fahasivy, dia, indro, nisy lehilahy niakanjo akanjo mamirapiratra nitsangana teto anatrehako'
mg1865::mg_44::10::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Ry Kornelio, efa re ny fivavakao, ary efa tsarovana eo anatrehan''Andriamanitra ny fiantranao.'
mg1865::mg_44::10::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maniraha hankany Jopa, ka ampanalao Simona, izay atao hoe koa Petera: mitoetra ao an-tranon''i Simona mpandon-koditra eo amoron-dranomasina izy.'
mg1865::mg_44::10::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa niaraka tamin''izay dia naniraka tany aminao aho; ary nanao soa ianao no avy. Koa ankehitriny izahay rehetra dia efa eto anatrehan''Andriamanitra hihaino izay rehetra nandidian''ny Tompo anao.'
mg1865::mg_44::10::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera niloa-bava ka nanao hoe: Hitako marina tokoa izao fa tsy mizaha tavan''olona Andriamanitra;'
mg1865::mg_44::10::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny firenena rehetra izay olona matahotra Azy ka manao ny marina no ankasitrahany.'
mg1865::mg_44::10::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mahalala ny teny izay nampitondrainy ho amin''ny Zanak''isiraely, mitory teny soa milaza fiadanana amin''ny alalan''i Jesoa Kristy (Izy no Tompon''izao rehetra izao),'
mg1865::mg_44::10::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ilay teny natomboka hatrany Galilia ka notorina tany Jodia rehetra teo aorian''ny batisa izay notorin''i Jaona, dia ny amin''i Jesoa avy any Nazareta,'
mg1865::mg_44::10::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nohosoran''Andriamanitra tamin''ny Fanahy Masina sy ny hery sady nandehandeha nanao soa sy nahasitrana izay rehetra azon''ny herin''ny devoly, satria Andriamanitra nomba Azy.'
mg1865::mg_44::10::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay no vavolombelon''ny zavatra rehetra izay nataony tany amin''ny tanin''ny Jiosy sy tany Jerosalema; Izy dia novonoiny nahantony teo amin''ny hazo;'
mg1865::mg_44::10::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa natsangan''Andriamanitra kosa Izy tamin''ny andro fahatelo ka nasehony marimarina,'
mg1865::mg_44::10::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy tamin''ny olona rehetra, fa tamin''ny vavolombelona izay notendren''Andriamanitra rahateo, dia taminay izay niara-nihinana sy nisotro taminy, rehefa nitsangana tamin''ny maty Izy.'
mg1865::mg_44::10::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nandidy anay hitory amin''ny olona ka hanambara fa Izy no voatendrin''Andriamanitra ho Mpitsara ny velona sy ny maty.'
mg1865::mg_44::10::43:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no ambaran''ny mpaminany rehetra, fa amin''ny anarany no hahazoan''izay rehetra mino Azy famelan-keloka.'
mg1865::mg_44::10::44:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola nilaza izany teny izany Petera, dia nilatsaka tamin''izay rehetra nandre ny teny ny Fanahy Masina.'
mg1865::mg_44::10::45:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary talanjona ny mino isan''ny voafora izay niaraka tamin''i Petera, satria nilatsaka tamin''ny jentilisa koa ny fanomezana, dia ny Fanahy Masina.'
mg1865::mg_44::10::46:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nandre azy niteny tamin''ny fiteny tsy fantatra sy nankalaza an''Andriamanitra izy. Dia namaly Petera ka nanao hoe:'
mg1865::mg_44::10::47:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa misy olona mahazo mandrara ny rano tsy hanaovana batisa ireo, izay efa nandray ny Fanahy Masina tahaka antsika koa?'
mg1865::mg_44::10::48:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 10
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasainy natao batisa amin''ny anaran''i Jesoa Kristy izy. Ary nangatahin''ireo mba hitoetra ao aminy andro vitsivitsy izy.'
mg1865::mg_44::11::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namalian''i Petera ny olona izay nanome tsiny azy'
  verse_text: 'Ary ny Apostoly sy ny rahalahy izay tany Jodia dia nahare fa ny jentilisa koa efa nandray ny tenin''Andriamanitra.'
mg1865::mg_44::11::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafakatra tany Jerosalema Petera, dia nila ady taminy ny mino izay isan''ny voafora'
mg1865::mg_44::11::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Efa niantrano tany amin''ny olona tsy voafora ianao sady niara-nihinana taminy.'
mg1865::mg_44::11::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera dia nitantara izany taminy hatramin''ny niandohany ka nanao hoe:'
mg1865::mg_44::11::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany an-tanàna Jopa aho ka nivavaka, ary azon-tsindrimandry aho, dia nahita fahitana, ka, indro, nisy zavatra nidina avy tany an-danitra toa lamba lehibe nampidinina tamin''ny zorony efatra, dia nankeo amiko izany;'
mg1865::mg_44::11::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nijery sy nandinika azy aho, dia hitako ny biby ety an-tany, izay manan-tongotra efatra, sy ny bibi-dia sy ny zava-mandady sy mikisaka ary ny voro-manidina koa.'
mg1865::mg_44::11::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandre feo koa aho nanao tamiko hoe: Mitsangàna, ry Petera, vonoy, ka hano.'
mg1865::mg_44::11::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho: Sanatria, Tompoko! fa tsy mbola niditra tamin''ny vavako izay zava-padina na tsy madio.'
mg1865::mg_44::11::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo avy tany an-danitra namaly fanindroany hoe: Izay efa nodiovin''Andriamanitra aza ataonao ho fady.'
mg1865::mg_44::11::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary intelo no nanaovana izany, dia nosarihana niakatra tany an-danitra indray izany rehetra izany.'
mg1865::mg_44::11::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia, Indreo, nisy telo lahy nijanona teo anoloan''ny trano nitoeranay, izay iraka avy tany Kaisaria hankeo amiko.'
mg1865::mg_44::11::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasain''ny Fanahy hiaraka tamin''ireo aho ka tsy hizaha tavan''olona na dia kely akory aza. Ary niaraka tamiko koa ireto rahalahy enina ireto, ka niditra tao an-tranon-dralehilahy izahay.'
mg1865::mg_44::11::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambarany taminay ny nahitany ny anjely nitsangana tao an-tranony ka nanao hoe: Maniraha ho any Jopa, ka ampanalao Simona, izay atao hoe koa Petera;'
mg1865::mg_44::11::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'izy hilaza teny aminao, izay hamonjena anao sy ny ankohonanao rehetra.'
mg1865::mg_44::11::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao niteny aho, dia nilatsaka taminy ny Fanahy Masina tahaka ny tamintsika fahiny.'
mg1865::mg_44::11::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahatsiaro ny tenin''ny Tompo aho, izay nolazainy hoe: Jaona nanao batisa tamin''ny rano, fa ianareo kosa dia hatao batisa amin''ny Fanahy Masina.'
mg1865::mg_44::11::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha mba homen''Andriamanitra azy ny fanomezana, tahaka antsika fony isika vao nino an''i Jesoa Kristy Tompo dia iza moa aho no hahasakana an''Andriamanitra?'
mg1865::mg_44::11::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany ireo, dia nangina sady nankalaza an''Andriamanitra ka nanao hoe: Efa nomen''Andriamanitra ny jentilisa koa ny fibebahana hahazoany fiainana.'
mg1865::mg_44::11::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny nandrosoan''ny tenin''Andriamanitra tao Antiokia, sy ny nampianaran''i Barnabasy sy Saoly tao'
  verse_text: 'Ary izay niely noho ny fanenjehana tamin''i Stefana dia nandeha hatrany, Foinika sy Kyprosy ary Antiokia, nefa tsy nitoriteny tamin''ny olona izy, afa-tsy tamin''ny Jiosy ihany.'
mg1865::mg_44::11::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ireny, dia lehilahy avy any Kyprosy sy Kyrena izay tonga tany Antiokia, dia niresaka tamin''ny jentilisa* koa ka nitory an''i Jesoa Tompo. [*Grika: Grika; na Helenista]'
mg1865::mg_44::11::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanan''ny Tompo nomba azy ireo, ka maro no isan''izay nino sy niverina ho amin''ny Tompo.'
mg1865::mg_44::11::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''ny sofin''ny fiangonana tany Jerosalema ny amin''ireo, dia naniraka an''i Barnabasy izy handeha hatrany Antiokia.'
mg1865::mg_44::11::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga izy ka nahita ny fahasoavan''Andriamanitra, dia faly ka nananatra azy rehetra haharitra hiray amin''ny Tompo amin''ny fo minia fatratra.'
mg1865::mg_44::11::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehilahy tsara fanahy izy sady feno ny Fanahy Masina sy finoana; ary maro be ny olona nanampy ho an''ny Tompo.'
mg1865::mg_44::11::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Barnabasy nankany Tarsosy hitady an''i Saoly.'
mg1865::mg_44::11::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahita azy izy, dia nitondra azy hankany Antiokia. Ary niara-niasa tao amin''ny fiangonana hatramin''ny herintaona ngarangidina izy roa lahy ka nampianatra olona maro; ary tany Antiokia no voalohany nanaovana ny anaran''ny mpianatra hoe Kristiana.'
mg1865::mg_44::11::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny naminanian''i Agabo fa hisy mosary'
  verse_text: 'Ary tamin''izany andro izany dia nisy mpaminany sasany avy tany Jerosalema nankany Antiokia.'
mg1865::mg_44::11::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana ny anankiray tamin''ireny, izay atao hoe Agabo, fa voatsindrin''ny Fanahy izy ka nilaza fa hisy mosary be eran''ny tany rehetra. Ary dia tonga izany tamin''ny andron''i Klaodio.'
mg1865::mg_44::11::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianatra ninia hampitondra zavatra araka ny ananany hamonjy ny rahalahy izay nonina tany Jodia.'
mg1865::mg_44::11::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataony izany, ary ny tanan''i Barnabasy sy Saoly no nampitondrainy izany ho any amin''ny loholona*. [*Grika: presbytera]'
mg1865::mg_44::12::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nanenjehana ny fiangonana, sy ny nanafahana an''i Petera tao an-tranomaizina'
  verse_text: 'Ary tamin''izany andro izany Heroda mpanjaka naninjitra ny tanany hampahory ny sasany tamin''ny fiangonana.'
mg1865::mg_44::12::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy namono an''i Jakoba, rahalahin''i Jaona, tamin''ny sabatra.'
mg1865::mg_44::12::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitany fa sitraky ny Jiosy izany, dia nandroso nisambotra an''i Petera koa izy. (Efa mby tamin''ny andro fihinanana ny mofo tsy misy masirasira tamin''izany.)'
mg1865::mg_44::12::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nosamboriny izy, dia nataony tao an-tranomaizina ka natolony tamin''ny miaramila enina ambin''ny folo* hambenany; dia nikasa hamoaka azy ho eo amin''ny vahoaka izy, rehefa afaka ny Paska. [*Grika: miaramila efatra katernia; ny katernia iray dia miaramila efa-dahy]'
mg1865::mg_44::12::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nambenana tao an-tranomaizina; ary ny fiangonana nahery nangataka tamin''Andriamanitra ho azy.'
mg1865::mg_44::12::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa hamoaka azy Heroda, dia natory teo anelanelan''ny miaramila roa lahy Petera tamin''iny alina iny, sady voafatotra tamin''ny gadra roa izy; ary nisy mpiambina niambina ny tranomaizina teo am-baravarana.'
mg1865::mg_44::12::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy anjelin''ny Tompo tonga teo, sady nisy mazava namirapiratra tao an-trano; ary izy nanohina ny tehezan''i Petera, dia namoha azy ka nanao hoe: Mitsangàna faingana. Dia niala tamin''ny tanany ny gadra.'
mg1865::mg_44::12::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay anjely taminy: Misikina, ary fehezo ny kapanao. Dia nataony izany. Ary hoy koa izy taminy: Tafio ny lambanao, ka manaraha ahy.'
mg1865::mg_44::12::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: '2022-07-03T07:39:43+0000'
  verse_title: null
  verse_text: 'Dia nivoaka izy ka nanaraka azy; ary tsy fantany ho marina izay nataon''ny anjely, fa nataony ho nahita fahitana ihany izy.'
mg1865::mg_44::12::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa nandalo ny fiambenana voalohany sy faharoa izy, dia tonga teo amin''ny vavahady vy izay mahazo ny lalana ho any an-tanàna; ary nivoha ho azy io mba halehany; ary nony nivoaka izy, dia nandroso tamin''ny lalana iray; ary niaraka tamin''izay dia nandao azy ilay anjely.'
mg1865::mg_44::12::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahatsiaro fanahy Petera, dia nanao hoe: Ankehitriny fantatro marina tokoa fa ny Tompo efa naniraka ny anjeliny ka namonjy ahy tamin''ny tanan''i Heroda sy ny fanantenan''ny Jiosy rehetra.'
mg1865::mg_44::12::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa fantany tsara izany, dia nankany an-tranon''i Maria, renin''i Jaona, izay atao hoe koa Marka, izy; ary nisy olona maro niangona nivavaka tao.'
mg1865::mg_44::12::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandondona ny vavahady Petera, dia nisy ankizivavy atao hoe Roda nankeo hihaino.'
mg1865::mg_44::12::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahalala ny feon''i Petera izy, dia tsy namoha ny vavahady noho ny hafaliany, fa lasa nihazakazaka ary niditra ka nilaza fa Petera no mijanona eo am-bavahady.'
mg1865::mg_44::12::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny olona taminy: Very saina ianao. Fa izy nitompo rariny fa izany tokoa. Dia hoy indray ny olona: Anjeliny izany.'
mg1865::mg_44::12::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera naharitra nandòndòna ihany, ary rehefa novohany, dia nahita azy ireo ka talanjona.'
mg1865::mg_44::12::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy nanofa tanana azy mba hangina, dia nanambara taminy izay namoahan''ny Tompo azy avy tao an-tranomaizina. Ary dia hoy izy: Ambarao amin''i Jakoba sy ny rahalahy izany zavatra izany. Dia niala izy ka lasa nankany amin''ny fitoerana hafa.'
mg1865::mg_44::12::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nazava ny andro, dia nifanaritaka be ihany ny miaramila ka nanao hoe: Nankaiza Petera?'
mg1865::mg_44::12::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitady azy fatratra Heroda, fa tsy nahita, dia nadininy ny mpiambina ka nasainy novonoina. Ary Heroda nidina niala tany Jodia hankany Kaisaria, dia nitoetra tany.'
mg1865::mg_44::12::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Heroda tezitra loatra tamin''ny Tyriana sy ny Sidoniana; fa niray saina kosa ireo ka nankany aminy, ary rehefa nahazo an''i Blasto, mpitandrina ny trano fandrian''ny mpanjaka, ho sakaizany, dia nangataka fihavanana, satria ny taniny nivelona tamin''ny tanin''i Heroda*. [*Grika: ny mpanjaka]'
mg1865::mg_44::12::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro voatendry dia niakanjo akanjom-panjakana Heroda ka nipetraka teo ambonin''ny seza fiandrianany, dia nikabary tamin''ny vahoaka.'
mg1865::mg_44::12::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka niantso hoe: Feon''Andriamanitra izany, fa tsy an''olona!'
mg1865::mg_44::12::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nisy anjelin''ny Tompo namely azy, satria tsy nanome voninahitra an''Andriamanitra izy; ka dia nohanin''ny kankana izy ka maty.'
mg1865::mg_44::12::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandroso sy niely ny tenin''Andriamanitra.'
mg1865::mg_44::12::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Barnabasy sy Saoly niverina avy tany* Jerosalema, rehefa vita ny fanompoany, dia nitondra an''i Jaona, izay atao hoe Marka, hiaraka aminy. [*Na: niverina tany]'
mg1865::mg_44::13::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandefasana an''i Barnabasy sy Saoly ho misionera, sy ny nampianarany tao Kyprosy'
  verse_text: 'Ary teo amin''ny fiangonana tany Antiokia nisy mpaminany sy mpampianatra: Barnabasy sy Simeona, izay atao hoe Nigera, sy Losio Kyreniana sy Menahema (izay niolonono tamin''i Heroda mpanapaka) ary Saoly.'
mg1865::mg_44::13::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanao fanompoam-pivavahana ho an''ny Tompo sy nifady hanina ireo, dia hoy ny Fanahy Masina: Atokàny ho Ahy Barnabasy sy Saoly hanao ny asa izay efa niantsoako azy.'
mg1865::mg_44::13::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nifady hanina sy nivavaka ary nametra-tanana taminy izy, dia nandefa azy.'
mg1865::mg_44::13::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nirahin''ny Fanahy Masina izy roa lahy, dia nidina nankany Seleokia izy ka niondrana an-tsambo teo hankany Kyprosy.'
mg1865::mg_44::13::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany Salamisy izy, dia nitory ny tenin''Andriamanitra teny amin''ny synagogan''ny Jiosy; ary nitondra an''i Jaona koa ho mpanampy azy izy.'
mg1865::mg_44::13::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa namaky ny nosy ka tonga tany Pafo izy, dia nahita Jiosy anankiray atao hoe Barjesosy, mpanao ody sady mpaminany sandoka,'
mg1865::mg_44::13::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nitoetra tao amin''i Serygio Paolo, governoran''ny tany sady lehilahy hendry; ary izy nampaka an''i Barnabasy sy Saoly hankao aminy ka naniry mba hahare ny tenin''Andriamanitra.'
mg1865::mg_44::13::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Elyma, mpanao ody (fa izany no anarany, raha adika), nanohitra azy roa lahy sady nitady hampivily ny governora tsy hanaiky ny finoana.'
mg1865::mg_44::13::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Saoly kosa, izay atao hoe koa Paoly, feno ny Fanahy Masina, dia nibanjina azy'
mg1865::mg_44::13::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Ialahy feno ny fitaka rehetra sy ny fahafetsena rehetra, ialahy zanaky ny devoly sady fahavalon''ny fahamarinana rehetra, tsy hitsahatra tsy hamily ny lala-mahitsin''ny Tompo va ialahy?'
mg1865::mg_44::13::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ankehitriny ny tanan''ny Tompo hamely an''ialahy, dia ho jamba ialahy ka tsy hahita masoandro aloha. Dia latsaka tao aminy niaraka tamin''izay ny mampanjambena sy ny aizina, ary niraparapa nitady olona hitantana azy izy.'
mg1865::mg_44::13::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny governora, nony nahita izay efa natao, dia nino sady talanjona tamin''ny fampianaran''ny Tompo.'
mg1865::mg_44::13::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly sy ny namany, rehefa niondrana an-tsambo niala avy tany Pafo, dia tonga tany Peryga any Pamfyha; fa Jaona nandao azy ka niverina nankany Jerosalema.'
mg1865::mg_44::13::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niala tany Peryga izy ireo, dia nandroso nankany Antiokia any Pisidia, dia niditra tao amin''ny synagoga tamin''ny andro Sabata ka nipetraka teo.'
mg1865::mg_44::13::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita ny famakiana ny lalàna sy ny mpaminany, ny mpanapaka ny synagoga dia nampilaza taminy ka nanao hoe: Ry rahalahy, raha misy fananarana hataonareo amin''ny olona, dia ataovy.'
mg1865::mg_44::13::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly nitsangana, dia nanofa tanana azy ka nanao hoe: Ry lehilahy Isiraely sy ianareo izay matahotra an''Andriamanitra, mihainoa;'
mg1865::mg_44::13::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitr''izao olona Isiraely izao efa nifidy ny razantsika ka nanandratra ny olona, raha nivahiny tany amin''ny tany Egypta izy, ary sandry avo no nitondrany azy nivoaka avy tany.'
mg1865::mg_44::13::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nandefitra tamin''ny nataony* tany an''efitra tokony ho efa-polo taona. [*Na: (nitondra azy tahaka ny fitondran''ny olona ny zanany; izahao Deoteronomia 1:31)]'
mg1865::mg_44::13::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandrava firenena fito tany amin''ny tany Kanana Izy, dia nampandovainy ny tanin''ireny izy'
mg1865::mg_44::13::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'tokony ho dimam-polo amby efa-jato taona; ary rehefa afaka izany, dia nomeny mpitsara izy hatramin''i Samoela mpaminany.'
mg1865::mg_44::13::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka indray izany, dia nangataka mpanjaka izy; ka dia nomen''Andriamanitra azy efa-polo taona Saoly, zanak''i Kisy, lehilahy avy tamin''ny firenen''i Benjamina.'
mg1865::mg_44::13::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanaisotra an''i Saoly Izy, dia nanandratra an''i Davida ho mpanjakany sady nanambara azy hoe: Izaho nahita an''i Davida, zanak''i Jese, lehilahy araka ny foko, izay hanao ny sitrapoko rehetra (I Samoela 13:14; Salamo 89:20).'
mg1865::mg_44::13::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''ny taranak''izany lehilahy izany no nitondran''Andriamanitra an''i Jesoa araka ny teny fikasana ho Mpamonjy ny Isiraely,'
mg1865::mg_44::13::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa notorin''i Jaona tamin''ny olona Isiraely rehetra aloha ny batisan''ny fibebahana, fony tsy mbola tonga Izy.'
mg1865::mg_44::13::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaona, rehefa nadiva no nahatanteraka ny nalehany, dia nanao hoe: Ataonareo ho iza moa aho? Tsy Izy aho; fa, indro, misy Anankiray avy ao aoriako, ka izaho tsy miendrika hamaha ny kapa eo an-tongony akory.'
mg1865::mg_44::13::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, taranak''i Abrahama, sy izay rehetra eo aminareo matahotra an''Andriamanitra, dia ho amintsika no nampitondrana ny tenin''izao famonjena izao.'
mg1865::mg_44::13::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay monina any Jerosalema sy ny loholony, satria tsy mba nahafantatra Azy, na ny feon''ny mpaminany izay vakina isan-tSabata, dia nahatanteraka izany tamin''ny nanamelohany Azy.'
mg1865::mg_44::13::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: '2022-07-05T04:35:41+0000'
  verse_title: null
  verse_text: 'Ary na dia tsy hitany aza izay tokony hanamelohana Azy ho faty, dia nangataka tamin''i Pilato ihany izy hamonoana Azy.'
mg1865::mg_44::13::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahatanteraka izay rehetra voasoratra ny amin''i Jesoa izy, dia nanaisotra Azy tamin''ny hazo ka nandevina Azy tao am-pasana.'
mg1865::mg_44::13::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra kosa nanangana Azy tamin''ny maty.'
mg1865::mg_44::13::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy niseho andro maro tamin''izay niara-niakatra taminy avy tany Galilia ho any Jerosalema, ka dia ireo no vavolombelony amin''ny olona ankehitriny.'
mg1865::mg_44::13::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay mitory ny filazantsara aminareo, dia ilay teny fikasana nolazaina tamin''ny razana,'
mg1865::mg_44::13::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny nahatanterahan''Andriamanitra izany tamin''ny zanatsika, raha nanangana an''i Jesoa Izy, araka ny voasoratra eo amin''ny Salamo faharoa hoe: Zanako Ianao, Izaho niteraka Anao androany (Salamo 2:7).'
mg1865::mg_44::13::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny nananganany Azy tamin''ny maty, ka tsy hiverina ho amin''ny lo intsony Izy, dia izao no voalazany: Homeko anareo ny famindram-po mahatoky nampanantenaina an''i Davida (Isaia 55:3).'
mg1865::mg_44::13::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy ao amin''ny Salamo hafa koa: Tsy hamela ny Iray Masinao ho tratry ny lo Ianao (Salamo 16:10).'
mg1865::mg_44::13::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Davida, rehefa nahatanteraka ny sitrapon''Andriamanitra hahasoa ny olona niara-belona taminy, dia nodi-mandry* ka nangonina ho any amin''ny razany izy ary tratry ny lo; [*Na. Fa Davida, rehefa nanompo ny olona niara-belona taminy, dia nodi-mandry araka ny sitrapon''Andriamanitra]'
mg1865::mg_44::13::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izay natsangan''Andriamanitra no tsy mba tratry ny lo.'
mg1865::mg_44::13::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho fantatrareo, ry rahalahy, fa izany Lehilahy izany no itoriana famelan-keloka aminareo;'
mg1865::mg_44::13::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ao aminy no anamarinana izay rehetra mino ho afaka amin''ny heloka rehetra izay tsy azo nanamarinana anareo tamin''ny lalàn''i Mosesy.'
mg1865::mg_44::13::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo fandrao hihatra izay voalaza eo amin''ny mpaminany hoe:'
mg1865::mg_44::13::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahaonareo mpamotsifotsy, dia gagà, ka levona; Fa Izaho manao asa amin''ny andronareo, Dia asa izay tsy hinoanareo akory, na dia hisy hilaza aminareo aza (Habakoka 1:5)'
mg1865::mg_44::13::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nivoaka izy, dia nangatahiny holazaina aminy indray izany teny izany amin''ny Sabata manaraka.'
mg1865::mg_44::13::43:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nirava ny fiangonana, dia maro tamin''ny Jiosy sy ny proselyta izay nanompo an''Andriamanitra no nanaraka an''i Paoly sy Barnabasy, izay niteny taminy ka namporisika azy haharitra amin''ny fahasoavan''Andriamanitra.'
mg1865::mg_44::13::44:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny Sabata manaraka, dia saiky tafangona avokoa ny tao an-tanàna hihaino ny tenin''Andriamanitra.'
mg1865::mg_44::13::45:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny Jiosy kosa, raha nahita ny vahoaka betsaka, dia feno fialonana ka nanohitra ny teny nolazain''i Paoly, sady niteny ratsy*. [*Grika: nanao blasfemia, izahao Matio 9:3]'
mg1865::mg_44::13::46:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly sy Barnabasy dia niteny tamin''ny fahasahiana ka nanao hoe: Ianareo no tsy maintsy nitoriana ny tenin''Andriamanitra aloha; fa rehefa mandà izany ianareo ka manao ny tenanareo ho tsy miendrika hahazo fiainana mandrakizay, dia indro, mitodika mankany amin''ny jentilisa izahay;'
mg1865::mg_44::13::47:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izao no nandidian''ny Tompo anay: Efa nanendry Anao ho fahazavan''ny jentilisa Aho, Mba ho famonjena hatrany amin''ny faran''ny tany Ianao (Isaia 49:6).'
mg1865::mg_44::13::48:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany ny jentilisa, dia faly izy ka nankalaza ny tenin''Andriamanitra*; ary izay voalahatra ho amin''ny fiainana mandrakizay dia nino. [*Na: ny tenin''ny Tompo]'
mg1865::mg_44::13::49:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''ny Tompo dia naely eran''izany tany rehetra izany.'
mg1865::mg_44::13::50:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Jiosy nampitaitra ny vehivavy manan-kaja izay nivavaka sy ny lehibe tao an-tanàna, dia nahatonga fanenjehana tamin''i Paoly sy Barnabasy ireny ka nandroaka azy niala tamin''ny taniny.'
mg1865::mg_44::13::51:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy roa lahy kosa nanintsana ny vovoka tamin''ny tongony hiampanga ireo, dia nankany Ikonioma.'
mg1865::mg_44::13::52:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 13
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia feno fifaliana sy ny Fanahy Masina ny mpianatra.'
mg1865::mg_44::14::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitorian''ny Paoly sy Barnabasy teny tany Ikonioma sy Lystra ary Derbe, sy ny niverenany nankany Antiokia indray.'
  verse_text: 'Ary nony tany Ikonioma Paoly sy Barnabasy dia niara-niditra tao amin''ny synagogan''ny Jiosy izy ka nitori-teny, ka dia olona betsaka no nino, na Jiosy na jentilisa*. [*Grika: Grika]'
mg1865::mg_44::14::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: '2022-07-06T04:30:51+0000'
  verse_title: null
  verse_text: 'Fa ny Jiosy izay tsy nino dia nampitaitra ny jentilisa ka nanome fo azy hanohitra ny rahalahy.'
mg1865::mg_44::14::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitoetra ela teo izy, dia nitory tamin''ny fahasahiana noho ny fahatokiany ny Tompo, Izay nanome vavolombelona hahamarina ny tenin''ny fahasoavany'
mg1865::mg_44::14::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vahoaka tao an-tanàna nisara-tsaina, ny sasany nomba ny Jiosy, fa ny sasany kosa nomba ny Apostoly.'
mg1865::mg_44::14::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niray tetika hanisy ratsy sy hitora-bato azy ny jentilisa sy ny Jiosy mbamin''ny loholony,'
mg1865::mg_44::14::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka fantany izany, dia nandositra nankany Lystra sy Derbe, tanàna any Lykaonia, mbamin''ny tany manodidina, izy,'
mg1865::mg_44::14::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitory ny filazantsara tany.'
mg1865::mg_44::14::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy anankiray nipetraka tany Lystra nalemy tongotra hatrany an-kibon-dreniny ka tsy afaka namindra;'
mg1865::mg_44::14::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'izy nahare an''i Paoly nitori-teny; ary Paoly, nony nibanjina azy mafy ka nahita fa nanam-pinoana hositranina io,'
mg1865::mg_44::14::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niteny tamin''ny feo mahery hoe: Mijoroa amin''ny tongotrao. Dia niantsambotsambotra ralehilahy ka nitsangantsangana.'
mg1865::mg_44::14::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny vahoaka betsaka izay zavatra nataon''i Paoly, dia nanandratra ny feony ka nanao tamin''ny fitenin''i Lykaonia hoe: Efa nidina nankaty amintsika ny andriamanitra maka ny endrik''olona!'
mg1865::mg_44::14::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''i Barnabasy nataony hoe Jopitera*, ary Paoly kosa Merkory**, satria izy no mpitarika ny teny nalahatra. [*Grika: Zeosy] [** Grika: Hermesy]'
mg1865::mg_44::14::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisoron''ilay Jopitera teo anoloan''ny tanàna, mbamin''ny vahoaka, dia nitondra ombilahy sy voninkazo natao fihaingoana ho ao am-bavahady ka nikasa hanao fanatitra.'
mg1865::mg_44::14::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nahare izany ny Apostoly, dia Barnabasy sy Paoly, dia nandriatra ny fitafiany izy ka nitsarapaka nankeo afovoan''ny olona sady niantso nanao hoe:'
mg1865::mg_44::14::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raondriana, ahoana no anaovanareo izao? Olona tahaka anareo ihany izahay ary mitory ny filazantsara aminareo, mba hialanareo amin''izao zava-poana izao hanatona an''Andriamanitra velona, Izay nanao ny lanitra sy ny tany ary ny ranomasina mbamin''izay rehetra ao anatiny,'
mg1865::mg_44::14::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namela ny firenena rehetra handeha tamin''ny lalana tiany haleha tamin''ny andro lasa.'
mg1865::mg_44::14::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy namela ny tenany tsy hanana vavolombelona Izy; fa manao soa Izy, mampilatsaka ny ranonorana avy eny amin''ny lanitra ho anareo sady manome taon-jina ka mahavoky ny fonareo amin''ny hanina sy ny fifaliana.'
mg1865::mg_44::14::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na dia nilaza izany aza izy, dia saiky tsy nahasakana ny olona tsy hamono zavatra hatao fanatitra aminy.'
mg1865::mg_44::14::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Jiosy tonga avy tany Antiokia sy Ikonioma, izay nitaona ny vahoaka ka nitora-bato an''i Paoly, dia nitarika azy ho eny ivelan''ny tanàna, satria nataony fa efa maty izy.'
mg1865::mg_44::14::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nanodidina azy ny mpianatra, dia nitsangana izy ka lasa niakatra tao an-tanàna. Ary nony ampitso dia niala tao izy sy Barnabasy ka nankany Derbe.'
mg1865::mg_44::14::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitory ny filazantsara tamin''izany tanàna izany izy ka nahazo mpianatra maro, dia niverina nankany Lystra sy Ikonioma ary Antiokia indray izy,'
mg1865::mg_44::14::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'nampahery ny fanahin''ny mpianatra ka nananatra azy haharitra amin''ny finoana, sady nilaza fa tsy maintsy ho amin''ny fahoriana be no idirantsika amin''ny fanjakan''Andriamanitra.'
mg1865::mg_44::14::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanendry* loholona** teo amin''ny isam-piangonana izy, dia nivavaka sady nifady hanina ka dia nanolotra azy ho an''ny Tompo Izay efa ninoany. [*Na: nampananga-tanana nifidy] [** Grika: presbytera]'
mg1865::mg_44::14::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandeha namaky an''i Pisidia izy, dia tonga tany Pamfylia.'
mg1865::mg_44::14::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nitory ny teny tany Peryga izy, dia nidina nankany Atalia.'
mg1865::mg_44::14::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niondrana an-tsambo niala teo izy hankany Antiokia, izay efa nanolorana azy ho amin''ny fahasoavan''Andriamanitra ho amin''ny asa izay novitainy.'
mg1865::mg_44::14::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tao izy ka namory ny fiangonana, dia nilaza izay rehetra nataon''Andriamanitra tamin''ny nombany azy, sy ny namohany varavaram-pinoana ho an''ny jentilisa.'
mg1865::mg_44::14::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitoetra elaela ihany tamin''ny mpianatra izy.'
mg1865::mg_44::15::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nifandiran''ny sasany ny amin''ny famorana, sy ny nataon''ny Apostoly sy ny loholona tany Jerosalema tamin''izany'
  verse_text: 'Ary ny olona sasany izay nidina avy tany Jodia nampianatra ny rahalahy hoe: Raha tsy forana araka ny fanaon''i Mosesy ianareo, dia tsy azo vonjena.'
mg1865::mg_44::15::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nifanditra sy niady hevitra be ihany tamin''ireo Paoly sy Barnabasy, dia nifanarahana ny hiakaran''izy roa lahy sy ny sasany koa hankany Jerosalema ho any amin''ny Apostoly sy ny loholona* hanadina izany teny niadian-kevitra izany. [* Grika: presbytera]'
mg1865::mg_44::15::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanatitra azy ny fiangonana, dia nandeha namaky an''i Foinika sy Samaria izy ka nilaza ny niovan''ny jentilisa; dia nampifaly ny rahalahy rehetra indrindra izy.'
mg1865::mg_44::15::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Jerosalema izy, dia noraisin''ny fiangonana sy ny Apostoly ary ny loholona*, ka dia nilaza izay rehetra efa nataon''Andriamanitra tamin''ny nombany azy. [*Grika: presbytera]'
mg1865::mg_44::15::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mino sasany, izay isan''ny antokon''ny Fariseo kosa, dia nitsangana ka nanao hoe: Tsy maintsy forana ireny ka asaina mitandrina ny lalàn''i Mosesy.'
mg1865::mg_44::15::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nivory ny Apostoly sy ny loholona* mba hihevitra izany zavatra izany. [*Grika: presbytera]'
mg1865::mg_44::15::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nisy ady hevitra be ihany, dia nitsangana Petera ka nanao taminy hoe: Ry rahalahy, fantatrareo fa hatramin''ny ela Andriamanitra dia efa nifidy teo aminareo fa amin''ny vavako no handrenesan''ny jentilisa ny tenin''ny filazantsara ka hinoany.'
mg1865::mg_44::15::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra, Izay mahalala ny fo, dia vavolombelony tamin''ny nanomezany azy ny Fanahy Masina tahaka antsika koa;'
mg1865::mg_44::15::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy nataony misy hafa isika sy izy, fa nodioviny tamin''ny finoana ny fony.'
mg1865::mg_44::15::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahoana ianareo no maka fanahy an''Andriamanitra amin''ny fametrahanareo zioga amin''ny vozon''ny mpianatra, izay tsy zakan''ny razantsika na isika ho entina?'
mg1865::mg_44::15::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mino isika fa ny fahasoavan''i Jesoa Tompo no hamonjena antsika, dia tahaka ny azy ihany koa.'
mg1865::mg_44::15::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nangina ny olona rehetra ka nihaino an''i Barnabasy sy Paoly, izay nilaza ny famantarana sy ny fahagagana nampanaovin''Andriamanitra azy tany amin''ny jentilisa.'
mg1865::mg_44::15::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitsahatra tsy niteny izy roa lahy, dia namaly Jakoba ka nanao hoe: Ry rahalahy, mihainoa ahy:'
mg1865::mg_44::15::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Simeona efa nanambara izay nitsinjovan''Andriamanitra ny jentilisa tamin''ny voalohany hanalany olona aminy hankalazana ny anarany.'
mg1865::mg_44::15::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mifanaraka amin''izany ny tenin''ny mpaminany, araka ny voasoratra hoe:'
mg1865::mg_44::15::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia hiverina Aho Ka hanangana ny trano-lain''i Davida izay efa nianjera; Ary hanangana izay efa rava ao Aho Ka hanamboatra azy indray;'
mg1865::mg_44::15::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hitady ny Tompo ny olona sisa sy ny jentilisa rehetra, Izay efa niantsoana ny anarako, hoy Jehovah,'
mg1865::mg_44::15::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao izany zavatra fantatra hatramin''ny voalohany indrindra izany (Amosa 9:11-12).'
mg1865::mg_44::15::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia izao no hevitro: Tsy mety raha isika manome fahasahiranana ny avy amin''ny jentilisa izay miverina ho amin''Andriamanitra;'
mg1865::mg_44::15::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa aoka hanoratra epistily aminy isika mba hifadiany ny hena fahavetavetana aterina amin''ny sampy sy ny fijangajangana ary ny zavatra kendaina sy ny rà.'
mg1865::mg_44::15::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatramin''ny razana fahiny dia manana izay mitory azy ao amin''ny isan-tanàna Mosesy, fa vakina ao amin''ny synagoga rehetra isan-tSabata ny teniny.'
mg1865::mg_44::15::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitraky ny Apostoly sy ny loholona* mbamin''ny fiangonana rehetra ny hifidy olona amin''ny namany mba hirahina hiaraka amin''i Paoly sy Barnabasy hankany Antiokia, dia Joda, izay atao hoe Barnabasy, sy Silasy, izay lehilahy samy tsara laza eo amin''ny rahalahy; [*Grika: presbytera]'
mg1865::mg_44::15::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanoratra taratasy izy ho entin''ireo, dia izao: Ny Apostoly sy ny rahalahy loholona miarahaba ny rahalahy avy amin''ny jentilisa izay any Antiokia sy Syria ary Kilikia. [*Grika: presbytera]'
mg1865::mg_44::15::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa renay fa ny sasany izay avy tany aminay efa nanao teny nampitabataba anareo ka namadika ny sainareo, kanefa tsy nasainay nanao izany izy,'
mg1865::mg_44::15::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia sitrakay, rehefa nifanara-kevitra, ny hifidy olona hirahina hankaty aminareo hiaraka amin''i Barnabasy sy Paoly malalanay,'
mg1865::mg_44::15::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'lehilahy izay nanao ny ainy tsy ho zavatra ho voninahitry ny anaran''i Jesoa Kristy Tompontsika.'
mg1865::mg_44::15::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirahinay Joda sy Silasy, sady hilaza vava izany teny izany koa izy.'
mg1865::mg_44::15::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sitraky ny Fanahy Masina sy izahay tsy hampitondra enta-mavesatra anareo afa-tsy izao zavatra tsy maintsy hotandremana izao ihany:'
mg1865::mg_44::15::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny hifadianareo ny hena aterina amin''ny sampy sy ny rà sy ny zavatra kendaina ary ny fijangajangana; raha mahatandrin-tena hifady izany ianareo, dia ho soa. Veloma ianareo.'
mg1865::mg_44::15::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nalefany izy ireo, dia nidina nankany Antiokia; ary namory ny olona maro izy, dia natolony ilay epistily.'
mg1865::mg_44::15::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa namaky izany ny olona, dia nifaly noho ny anatra tsara.'
mg1865::mg_44::15::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria mpaminany Joda sy Silasy, dia namporisika ny rahalahy tamin''ny teny maro izy ka nampahery azy.'
mg1865::mg_44::15::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitoetra elaela teo izy ireo, dia nampandehanin''ny rahalahy soa aman-tsara ho any amin''izay naniraka azy.'
mg1865::mg_44::15::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: 34 Nefa mbola sitrak''i Silasy ny hitoetra ao]'
mg1865::mg_44::15::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly sy Barnabasy kosa nitoetra tany Antiokia; dia nampianatra sy nitory ny tenin''ny Tompo izy roa lahy mbamin''ny maro koa.'
mg1865::mg_44::15::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 36
  verse_date_revised: null
  verse_title: 'Ny niaingan''i Paoly fanindroany hitety vohitra tany Asia Minora'
  verse_text: 'Ary rehefa afaka andro vitsivitsy, dia hoy Paoly tamin''i Barnabasy: Andeha isika hiverina hamangy ny rahalahy any amin''ny tanàna rehetra izay efa nitoriantsika ny tenin''ny Tompo, hahitantsika izay toetrany.'
mg1865::mg_44::15::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tian''i Barnabasy ny hitondra an''i Jaona, izay atao hoe Marka, hiaraka aminy.'
mg1865::mg_44::15::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nataon''i Paoly fa tsy tokony ho entiny miaraka aminy izy, satria nandao azy tany Pamfylia ka tsy niaraka taminy ho any amin''ny raharaha.'
mg1865::mg_44::15::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifanditra mafy izy roa lahy ka nisaraka; ary Barnabasy nitondra an''i Marka, dia niondrana an-tsambo nankany Kyprosy.'
mg1865::mg_44::15::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Paoly kosa nifidy an''i Silasy, dia niainga, rehefa natolotry ny rahalahy ho amin''ny fahasoavan''ny Tompo izy.'
mg1865::mg_44::15::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 15
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha namaky an''i Syria sy Kilikia izy nampahery ny fiangonana tany.'
mg1865::mg_44::16::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tany Derbe sy Lystra koa izy; ary, indro, nisy mpianatra anankiray teo atao hoe Timoty — zanaky ny vehivavy Jiosy izay nino, fa jentilisa* rainy - [*Grika: Grika]'
mg1865::mg_44::16::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsara laza teo amin''ny rahalahy tany Lystra sy Ikonioma izy.'
mg1865::mg_44::16::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tian''i Paoly ho entiny miaraka aminy izy; dia nalainy izy ka noforany noho ny Jiosy tany amin''izany tany izany, satria fantatr''izy rehetra fa jentilisa* rainy. [* Grika: Grika]'
mg1865::mg_44::16::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha nitety ny tanàna tao izy, dia natolony hotandreman''ny olona ireo didy navoaky ny Apostoly sy ny loholona* tany Jerosalema. [*Grika:presbytera]'
mg1865::mg_44::16::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihanahery finoana ny fiangonana sady nihamaro isan''andro.'
mg1865::mg_44::16::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny niantsoan''Andriamanitra an''i Paoly hankany Makedonia, sy ny nataon''i Paoly tao Filipy'
  verse_text: 'Ary rehefa noraran''ny Fanahy Masina tsy hitory ny teny tany Asia izy, dia nandeha namaky ny tany Frygia sy Galatia'
mg1865::mg_44::16::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka efa tonga tany an-tsisin''i Mysia, dia nitady hankany Bitynia izy, fa tsy navelan''ny Fanahin''i Jesoa.'
mg1865::mg_44::16::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandalo an''i Mysia izy, dia nidina nankany Troasy.'
mg1865::mg_44::16::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony alina dia nisy fahitana niseho tamin''i Paoly, koa, indro, nisy lehilahy Makedoniana nitsangana teo ka nangataka azy hoe: Mità mankaty Makedonia, ka vonjeo izahay!'
mg1865::mg_44::16::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita ny fahitana izy, dia nitady handeha niaraka tamin''izay hankany Makedonia izahay, satria nataonay fa Andriamanitra no efa niantso anay hitory ny filazantsara amin''ny olona any.'
mg1865::mg_44::16::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niondrana an-tsambo niala tany Troasy izahay, dia nizotra nankany Samotrakia; ary nony ampitso dia nankany Neapolia.'
mg1865::mg_44::16::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala teo izahay, dia nankany Filipy, izay tanàna voalohany amin''izany zara-tanin''i Makedonia izany sady zana-panjakana*; ary nitoetra teo amin''izany tanàna izany andro vitsivitsy izahay. [*Grika: kolonia]'
mg1865::mg_44::16::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro Sabata dia nivoaka teo ivelan''ny vavahady izahay nankeny amoron''ony, izay nataonay fa nisy fitoerana fivavahana; ary nipetraka teo izahay ka niresaka tamin''ny vehivavy vory teo.'
mg1865::mg_44::16::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy atao hoe Lydia, mpivarotra lamba volomparasy, avy any an-tanàna Tyatira, izay nivavaka tamin''Andriamanitra, dia nihaino izy, ary ny Tompo nanokatra ny fony hitandrina ny teny izay nolazain''i Paoly.'
mg1865::mg_44::16::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa natao batisa ravehivavy mbamin''ny ankohonany, dia nangataka izy nanao hoe: Raha ataonareo ho mahatoky amin''ny Tompo aho, dia midira ao an-tranoko ka mitoera ao. Dia nanery anay izy.'
mg1865::mg_44::16::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha ho any amin''ilay fitoerana fivavahana izahay, dia nisy ankizivavy anankiray nanam-panahy mahavaly nifanena taminay, ary ny faminaniana nataony no nahazoan''ny tompony harena be.'
mg1865::mg_44::16::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy nanaraka an''i Paoly sy izahay ka niantso hoe: Ireo lehilahy ireo dia mpanompon''Andriamanitra Avo Indrindra, izay manoro anareo lalam-pamonjena.'
mg1865::mg_44::16::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataony tamin''ny andro maro izany. Ary sosotra Paoly, dia nitodika ka nanao tamin''ny fanahy hoe: Mandidy anao amin''ny anaran''i Jesoa Kristy aho hivoaka aminy. Dia nivoaka tamin''izany ora izany indrindra izy.'
mg1865::mg_44::16::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ireo tompony fa very ny fanantenany hahazoany harena, dia nisambotra an''i Paoly sy Silasy izy ka nitondra azy ho any an-tsena any amin''ny lehibe;'
mg1865::mg_44::16::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa nentiny tany amin''ireo governora izy roa lahy, dia nolazainy hoe: Ireto lehilahy Jiosy ireto mampitabataba ny tanànantsika loatra'
mg1865::mg_44::16::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka mampianatra fanao tsy mety horaisintsika na hataontsika, fa Romana isika.'
mg1865::mg_44::16::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka niara-nitsangana hamely azy; ary ireo governora nanaisotra ny lambany, ka nasainy nokapohina tamin''ny hazo izy.'
mg1865::mg_44::16::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nokapohiny mafy dia mafy izy, dia nataony tao an-tranomaizina, ka nasainy niambina azy tsara ny mpiandry tranomaizina.'
mg1865::mg_44::16::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahazo teny toy izany ralehilahy, dia nataony tao amin''ny tranomaizina anatiny indrindra izy, ary ny tongony nobolokiny mafy tamin''ny boloky hazo.'
mg1865::mg_44::16::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony mamatonalina, dia nivavaka sy nihira fiderana an''Andriamanitra Paoly sy Silasy; ary nihaino azy ny mpifatotra.'
mg1865::mg_44::16::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy horohorontany mafy dia mafy avy tampoka, ka nihozongozona ny fanorenan''ny tranomaizina; dia nivoha niaraka tamin''izay ny varavarana rehetra, ary nivaha avokoa ny fatoran''izy rehetra.'
mg1865::mg_44::16::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahatsiaro ny mpiandry tranomaizina ka nahita ny varavaran''ny tranomaizina nivoha, dia nanatsoaka ny sabany izy ka saiky hamono tena, satria nataony fa efa nandositra ny mpifatotra.'
mg1865::mg_44::16::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Paoly niantso tamin''ny feo mahery ka nanao hoe: Aza mamono tena, fa ato ihany izahay rehetra.'
mg1865::mg_44::16::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niantso jiro, dia nikaretsaka niditra sady tora-kovitra ka niankohoka teo anatrehan''i Paoly sy Silasy.'
mg1865::mg_44::16::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nentiny nivoaka izy roa lahy, dia hoy izy: Tompoko, inona no mety hataoko, mba hovonjena aho?'
mg1865::mg_44::16::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy roa lahy: Minoa an''i Jesoa Tompo, dia hovonjena ianao sy ny ankohonanao.'
mg1865::mg_44::16::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy roa lahy nitory ny tenin''ny Tompo taminy sy tamin''izay rehetra tao an-tranony.'
mg1865::mg_44::16::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandray azy roa lahy izy tamin''izany ora amin''ny alina izany ka nanasa ny dian-kapoka; ary natao batisa tamin''izay izy mbamin''izay azy rehetra.'
mg1865::mg_44::16::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nentiny niakatra ho ao an-trano izy roa lahy, dia norosoany hanina teo anoloany, dia nifaly indrindra izy mbamin''izay rehetra tao an-tranony, satria efa nino an''Andriamanitra.'
mg1865::mg_44::16::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa maraina ny andro, ireo governora dia naniraka ny mpitan-defona ka nanao hoe: Alefaso ireo olona ireo.'
mg1865::mg_44::16::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiandry tranomaizina nilaza izany teny izany tamin''i Paoly hoe: Ireo governora efa naniraka handefa anareo, koa ankehitriny mivoaha ianareo ka mandehana soa aman-tsara.'
mg1865::mg_44::16::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Paoly taminy: Efa nokapohiny tsy voatsara teo amin''ny miharihary izahay, kanefa Romana izahay, ka nataony tao an-tranomaizina, ary ankehitriny moa mamoaka anay mangingina va izy? Tsia, fa aoka izy ihany ho hankaty hamoaka anay.'
mg1865::mg_44::16::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitan-defona nilaza izany teny izany tamin''ireo governora; dia natahotra izy, raha nahare fa Romana izy roa lahy.'
mg1865::mg_44::16::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga izy ka nanony azy sady nitondra azy nivoaka ary nangataka azy handeha hiala ao an-tanàna.'
mg1865::mg_44::16::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 16
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niala tao an-tranomaizina izy ka niditra tao an-tranon''i Lydia; ary rehefa nahita ny rahalahy izy, dia nananatra azy ka lasa nandeha.'
mg1865::mg_44::17::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Paoly sy Silasy tany Tesalonika sy Beria'
  verse_text: 'Ary rehefa nandeha namaky an''i Amfipolia sy Apolonia izy, dia tonga tao Tesalonika, ary nisy synagogan''ny Jiosy tao.'
mg1865::mg_44::17::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly dia niditra tao araka ny fanaony; ary Sabata telo no niadiany hevitra avy amin''ny Soratra Masina tamin''ny olona tao.'
mg1865::mg_44::17::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanambara izy ka naneho marimarina fa tsy maintsy nijaly sy nitsangana tamin''ny maty Kristy; ary Jesoa, Izay toriko aminareo, hoy izy, no Kristy.'
mg1865::mg_44::17::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ireo dia nino ka nanampy ho isan''ny mpianatr''i Paoly sy Silasy, ary maro be koa tamin''ny jentilisa* izay mpivavaka, ary tsy vitsy tamin''ny vehivavy nanan-kaja. [*Grika: Grika]'
mg1865::mg_44::17::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nialona ny Jiosy ka naka olona ratsy fanahy teny an-tsena ary nahavory vahoaka betsaka, dia nampitabataba ny tanàna ka namely ny tranon''i Jasona ary nitady hamoaka azy roa lahy ho ao amin''ny olona.'
mg1865::mg_44::17::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: '2022-09-02T07:42:18+0000'
  verse_title: null
  verse_text: 'Ary raha tsy nahita azy roa lahy izy, dia nisarika an''i Jasona sy ny rahalahy sasany ho ao amin''ny lehiben''ny tanàna ka niantso mafy hoe: Tonga koa ireo lehilahy namadika izao tontolo izao ireo;'
mg1865::mg_44::17::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa nampandrosoin''i Jasona izy, ka izy rehetra ireo manohitra ny tenin''i Kaisara, satria izy milaza fa misy mpanjaka hafa, dia Jesoa.'
mg1865::mg_44::17::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia taitra ny vahoaka sy ny lehiben''ny tanàna, raha nahare izany.'
mg1865::mg_44::17::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nasainy nametraka antoka Jasona sy ny sasany teo aminy, dia navelany handeha izy.'
mg1865::mg_44::17::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly sy Silasy dia nampandehanin''ny rahalahy niaraka tamin''izay nony alina hankany Beria; koa raha tonga tany izy, dia niditra tao amin''ny synagogan''ny Jiosy.'
mg1865::mg_44::17::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny toe-panahin''ireo dia tsara noho ny tao Tesalonika; satria nandray ny teny tamin''ny zotom-po indrindra ireo ka nandinika ny Soratra Masina isan''andro, na marina izany, na tsia.'
mg1865::mg_44::17::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa maro tamin''ireo no nino, ary tsy vitsy tamin''ny vehivavy jentilisa* nanan-kaja sy ny lehilahy. [*Grika: Grika]'
mg1865::mg_44::17::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ren''ny Jiosy tany Tesalonika fa Paoly nitory ny tenin''Andriamanitra tany Beria, dia nankany izy ka nampikotrana sy nampitabataba ny vahoaka.'
mg1865::mg_44::17::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nasain''ny rahalahy nandeha hatrany amoron-dranomasina Paoly; fa Silasy sy Timoty kosa dia mbola nijanona teo ihany.'
mg1865::mg_44::17::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nanatitra an''i Paoly dia nitondra azy nankany Atena; ary rehefa nahazo teny holazainy amin''i Silasy sy Timoty izy mba hankanesan''izy roa lahy any aminy faingana, dia lasa nandeha ireo.'
mg1865::mg_44::17::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny nataon''i Paoly tany Atena'
  verse_text: 'Ary raha niandry azy tany Atena Paoly, dia taitra tao anatiny ny fanahiny, raha nahita ny tanàna feno sampy izy.'
mg1865::mg_44::17::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niady hevitra tamin''ny Jiosy sy ny proselyta tao amin''ny synagoga sy tamin''izay tafavory tany an-tsena isan''andro.'
mg1865::mg_44::17::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olon-kendry sasany tamin''ny Epikoreana sy ny Stoika nanohitra azy koa, ka hoy ny sasany: Inona no tian''io mpibedibedy* io holazaina? Ary hoy kosa ny sasany: Toa mitory andriamani-baovao izy, satria Jesoa sy ny fitsanganan''ny maty no notoriny. [*Grika: mpitsindroka]'
mg1865::mg_44::17::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo naka azy, dia nitondra azy ho any Areopago ka nanao hoe: Moa mba mahazo mahafantatra izany fampianarana vaovao lazainao izany izahay?'
mg1865::mg_44::17::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mampandre ny sofinay zavatra hafahafa izay tsy fantatray ianao; koa tianay ho fantatra izay hevitr''izany zavatra izany.'
mg1865::mg_44::17::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa ny Ateniana rehetra sy ny vahiny izay nitoetra teo tsy nandany ny androny tamin''ny zavatra hafa, afa-tsy ny hilaza na hihaino zava-baovao.)'
mg1865::mg_44::17::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly nitsangana teo afovoan''i Areopago ka nanao hoe: Ry lehilahy Ateniana, hitako fa amin''ny zavatra rehetra dia fatra-pivavaka amin''ny andriamanitrareo indrindra ianareo.'
mg1865::mg_44::17::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nandeha aho ka nandinika izay zavatra ivavahanareo, dia nahita alitara anankiray misy izao soratra izao: HO AN''IZAY ANDRIAMANITRA TSY FANTATRA. Koa izay ivavahanareo, kanefa tsy fantatrareo, dia izany no toriko aminareo,'
mg1865::mg_44::17::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Andriamanitra Izay nanao izao tontolo izao sy ny ao aminy rehetra, Izy no Tompon''ny lanitra sy ny tany ka tsy mba mitoetra ao anaty tempoly nataon-tanana,'
mg1865::mg_44::17::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady tsy mba tompoin''ny tanan''olona toa mila zavatra, fa Izy ihany no manome izao rehetra izao aina sy fofon''aina ary ny zavatra rehetra;'
mg1865::mg_44::17::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny firenena rehetra avy amin''ny iray ihany dia namponeniny ambonin''ny tany rehetra, ary efa notendreny ny fotoan''andro sy ny faritry ny fonenany,'
mg1865::mg_44::17::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hitady an''Andriamanitra izy, raha tàhiny hahatsapa ka hahita Azy, kanefa tsy mba lavitra antsika rehetra Izy;'
mg1865::mg_44::17::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izy no ivelomantsika sy ihetsehantsika ary iainantsika; araka ny nataon''ny mpanao tonon-kira sasany teo aminareo hoe: Fa terany koa isika.'
mg1865::mg_44::17::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria terak''Andriamanitra isika, dia tsy mety raha ny fomban''Andriamanitra no ataontsika ho tahaka ny volamena, na volafotsy, na vato voasoratry ny fahaizana aman-tsain''olombelona.'
mg1865::mg_44::17::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra ninia tsy nijery ny andron''ny tsy fahalalana; fa ankehitriny Izy mandidy ny olona rehetra amin''izao tontolo izao hibebaka,'
mg1865::mg_44::17::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria Izy efa nanendry andro iray, izay hitsarany izao tontolo izao amin''ny fahamarinana amin''ny alalan''ny Lehilahy iray voatendriny, koa efa nanome vavolombelona hampino ny olona rehetra izany Izy tamin''ny nananganany Azy tamin''ny maty.'
mg1865::mg_44::17::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahare ny amin''ny fitsanganan''ny maty izy, dia nihomehy ny sasany; ary ny sasany kosa nanao hoe: Mbola hihaino anao indray izahay ny amin''izany zavatra izany.'
mg1865::mg_44::17::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly dia niala teo aminy.'
mg1865::mg_44::17::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 17
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anefa ny olona sasany niray taminy ka nino; mba naman''izany Dionysio Areopagita sy ny vehivavy anankiray atao hoe Damary ary ny sasany koa.'
mg1865::mg_44::18::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahatongavan''i Paoly tao Korinto, sy ny nampianarany tao herintoana sy enim-bolana'
  verse_text: 'Ary rehefa afaka izany, dia niala tany Atena Paoly ka nankany Korinto.'
mg1865::mg_44::18::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nahita Jiosy anankiray atao hoe Akoila, izay teraka tany Ponto, vao avy tany Italia, ary Prisila vadiny (fa Klaodio efa nandidy ny Jiosy rehetra hiala tany Roma), dia nankeo amin''izy mivady Paoly.'
mg1865::mg_44::18::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria niray raharaha taminy izy, dia nitoetra tao aminy ka niasa; fa ny manao lay no raharahany.'
mg1865::mg_44::18::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady hevitra isan-tSabata tao amin''ny synagoga izy ka nampanaiky ny Jiosy sy ny jentilisa.'
mg1865::mg_44::18::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tafidina avy tany Makedonia Silasy sy Timoty, dia voaterin''ny teny Paoly ka nanambara tamin''ny Jiosy fa Jesoa no Kristy.'
mg1865::mg_44::18::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nanohitra sy niteny ratsy ireo, dia nanopakopa-damba izy ka nanao taminy hoe: Aoka ho ao an-dohanareo ny ranareo; afaka aho; ary amin''izao sisa izao dia hankany amin''ny jentilisa aho.'
mg1865::mg_44::18::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niala teo izy, dia niditra tao an-tranon''ny lehilahy atao hoe Titosy Josto, izay nivavaka tamin''Andriamanitra; ary ny tranony nifanolotra tamin''ny synagoga.'
mg1865::mg_44::18::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Krispo, mpanapaka ny synagoga, mbamin''ny ankohonany rehetra dia nino ny Tompo; ary maro koa ny Korintiana, raha nandre, dia nino ka natao batisa.'
mg1865::mg_44::18::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo niteny tamin''i Paoly tamin''ny fahitana nony alina ka nanao hoe: Aza matahotra, fa mitenena ihany, ka aza mangina;'
mg1865::mg_44::18::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izaho momba anao, ary tsy hisy olona hihazona anao hanisy ratsy anao; fa manana olona maro amin''ity tanàna ity Aho.'
mg1865::mg_44::18::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nitoetra teo herintaona sy enim-bolana ka nampianatra ny tenin''Andriamanitra teo aminy.'
mg1865::mg_44::18::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha Galio no governora tany Akaia dia niray tetika hisambotra an''i Paoly ny Jiosy, ary nitondra azy nankeo amin''ny fitsarana,'
mg1865::mg_44::18::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nanao hoe: Ilehio mampanaiky ny olona hivavaka amin''Andriamanitra, nefa tsy araka ny lalàna.'
mg1865::mg_44::18::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hiloa-bava Paoly, dia hoy Galio tamin''ny Jiosy: Ry Jiosy, raha misy heloka, na zavatra ratsy natao, dia mety raha mandefitra aminareo aho;'
mg1865::mg_44::18::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha ady hevitra sy anarana ary ny lalànareo kosa, dia ataovinareo ihany; fa izaho tsy te-hitsara izany raharaha izany.'
mg1865::mg_44::18::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandroaka azy hiala teo anoloan''ny fitsarana izy.'
mg1865::mg_44::18::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy rehetra nisambotra an''i Sostena, mpanapaka ny synagoga, dia nikapoka azy teo anoloan''ny fitsarana. Nefa tsy nahoan''i Galio izany zavatra izany.'
mg1865::mg_44::18::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny niverenan''i Paoly nankany Antiokia, sy ny nandehanany indray namaky an''i Galatia sy Frygia, ary ny nahatongavany tao Efesosy sy ny nampianarany tao'
  verse_text: 'Ary Paoly mbola nitoetra teo andro maromaro ihany, ary rehefa nanao veloma ny rahalahy izy, dia niondrana an-tsambo nankany Syria, ary Prisila sy Akoila niaraka taminy koa; ny volon-dohany nohetezany tany Kenkrea, satria efa nivoady izy.'
mg1865::mg_44::18::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany Efesosy izy, dia nandao azy mivady teo Paoly ka lasa niditra tao amin''ny synagoga ka niady hevitra tamin''ny Jiosy.'
mg1865::mg_44::18::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangataka azy hitoetra elaela kokoa ny olona, fa tsy nety izy,'
mg1865::mg_44::18::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nanao veloma azy ka nanao hoe: Mbola hiverina hankaty aminareo indray aho, raha sitrapon''Andriamanitra. Dia niondrana an-tsambo niala tany Efesosy izy.'
mg1865::mg_44::18::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tafatody tany Kaisaria izy, dia niakatra ka niarahaba ny fiangonana vao nidina nankany Antiokia.'
mg1865::mg_44::18::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitoetra tao elaela ihany izy, dia lasa nandeha nitety ny tany Galatia sy Frygia ka nampahery ny mpianatra rehetra.'
mg1865::mg_44::18::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany Efesosy ny Jiosy anankiray atao hoe Apolosy, izay teraka tany Aleksandria, lehilahy nahay nandaha-teny sady nahery tamin''ny Soratra Masina.'
mg1865::mg_44::18::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany lehilahy izany efa nampianarina ny lalan''ny Tompo; ary nafana fo izy, dia niteny sy nampianatra marimarina ny amin''i Jesoa, kanefa ny batisan''i Jaona ihany no fantany.'
mg1865::mg_44::18::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niteny tamin''ny fahasahiana teo amin''ny synagoga; ary rehefa nandre azy Prisila sy Akoila, dia nandray azy hankao aminy ka nampianatra azy marimarina kokoa ny amin''ny lalan''Andriamanitra.'
mg1865::mg_44::18::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ta-handroso hankany Akaia izy, dia namporisika azy ny rahalahy sady nanoratra taratasy ho any amin''ny mpianatra mba handray azy tsara; ary rehefa tonga izy, dia nampahatanjaka tsara izay efa nino noho ny fahasoavana;'
mg1865::mg_44::18::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izy nahery nandresy lahatra ny Jiosy teo imason''ny olona ka naneho marimarina tamin''ny Soratra Masina fa Jesoa no Kristy.'
mg1865::mg_44::19::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola tany Korinto Apolosy, dia nitety ny tany ambony Paoly ka tonga tany Efesosy, dia nahita mpianatra sasany teo izy'
mg1865::mg_44::19::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Efa noraisinareo va ny Fanahy Masina, fony vao nino ianareo? Fa ireo nanao taminy hoe: Tsy renay akory fa efa nomena ny Fanahy Masina.'
mg1865::mg_44::19::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Paoly: Ho amin''inona ary no nanaovana batisa anareo? Dia hoy ireo: Ho amin''ny batisan''i Jaona.'
mg1865::mg_44::19::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Paoly: Jaona nanao ny batisan''ny fibebahana ka nilaza tamin''ny olona hino Izay ho avy manaraka azy, dia Jesoa.'
mg1865::mg_44::19::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahare izany izy, dia natao batisa ho amin''ny anaran''i Jesoa Tompo.'
mg1865::mg_44::19::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nametrahan''i Paoly tanana izy, dia nilatsaka taminy ny Fanahy Masina; ary niteny tamin''ny teny tsy fantatra izy sady naminany.'
mg1865::mg_44::19::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tokony ho roa ambin''ny folo lahy no isan''izy rehetra.'
mg1865::mg_44::19::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly niditra tao amin''ny synagoga ka niteny tamin''ny fahasahiana, dia niady hevitra telo volana ka nampanaiky ny amin''ny fanjakan''Andriamanitra.'
mg1865::mg_44::19::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nikiribiby ny sasany ka tsy nanaiky, fa niteny ratsy izany fampianarana* izany teo imason''ny olona maro, dia niala tamin''ireo izy ka nitondra ny mpianatra nitokana, dia niady hevitra isan''andro tao amin''ny trano fampianaran''i Tyrano. [*Grika: lalana]'
mg1865::mg_44::19::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naharitra roa taona ngarangidina izany, ka dia nandre ny tenin''ny Tompo izay rehetra nonina tany Asia, na Jiosy na jentilisa*. [*Grika: Grika]'
mg1865::mg_44::19::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanan''i Paoly no nanaovan''Andriamanitra fahagagana lehibe maro,'
mg1865::mg_44::19::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia ny mosara sy ny fiaron''akanjo teny aminy no nentina hatao amin''ny marary, dia sitrana ny aretiny, ary nivoaka ny fanahy ratsy.'
mg1865::mg_44::19::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Jiosy sasany, mpiriorio mamoaka fanahy ratsy, izay ninia nanonona ny anaran''i Jesoa Tompo koa teo ambonin''ny manana fanahy ratsy ka nanao hoe: Mampianiana anareo amin''i Jesoa Izay torin''i Paoly aho.'
mg1865::mg_44::19::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fito mirahalahy, zanak''i Skeva, Jiosy, lohan''ny mpisorona, izay nanao izany.'
mg1865::mg_44::19::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanahy ratsy namaly ka nanao taminy hoe: Fantatro Jesoa, ary fantatro koa Paoly; fa mba iza kosa moa ianareo?'
mg1865::mg_44::19::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy izay nanana ny fanahy ratsy dia niantsambotra tamin''ireo ary nahery ka naharesy azy roa lahy, dia nandositra niala tamin''izany trano izany ireo sady nitanjaka no voaratra.'
mg1865::mg_44::19::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatry ny Jiosy sy ny jentilisa rehetra izay nonina tany Efesosy izany; dia raiki-tahotra ny olona rehetra ka nankalaza ny anaran''i Jesoa Tompo.'
mg1865::mg_44::19::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro izay nino dia tonga ka niaiky sy nilaza ny asany.'
mg1865::mg_44::19::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro ny mpanao ody no nanangona ny bokiny ka nandoro azy teo imason''ny olona rehetra; ary nony voatontaly ny tokom-bidiny, dia hita fa volafotsy dimy alina izany.'
mg1865::mg_44::19::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fatratra toy izany no fandroson''ny tenin''Andriamanitra sy ny heriny.'
mg1865::mg_44::19::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita izany zavatra izany, Paoly dia nikasa tao am-pony handeha hamaky an''i Makedonia sy Akaia aloha vao hankany Jerosalema ka nanao hoe: Rehefa tonga any aho, dia tsy maintsy hahita an''i Roma koa.'
mg1865::mg_44::19::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny roa lahy tamin''izay nanompo ary, dia Timoty sy Erasto, no nirahiny nankany Makedonia; fa izy mbola nitoetra tany Asia andro vitsivitsy kosa.'
mg1865::mg_44::19::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny tabataba nataon''i Demetrio sy ny namany tao Efesosy'
  verse_text: 'Ary tamin''izany andro izany dia nisy tabataba be ihany ny amin''izany fampianarana* izany. [*Grika: lalana]'
mg1865::mg_44::19::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy lehilahy anankiray atao hoe Demetrio, mpanefy volafotsy, izay nanao sarin''ny tempolin''i Diana* tamin''ny volafotsy, dia nampahazo harena be ny mpanefy; [*Grika: Artemisy]'
mg1865::mg_44::19::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ireny mbamin''ny mpanao zavatra hafa koa toy izany dia nantsoiny hiangona ka nilazany hoe: Tompokolahy, fantatrareo fa amin''izao tao-zavatra izao no ahazoantsika harena.'
mg1865::mg_44::19::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitanareo sy renareo fa tsy eto Efesosy ihany, fa saiky manerana an''i Asia rehetra dia mitaona olona betsaka izany Paoly izany ka mampivily ny samy manao hoe: Tsy Andriamanitra izay zavatra nataon-tanana.'
mg1865::mg_44::19::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsy izao raharahantsika izao ihany no ahina hatao ho zava-poana; fa ny tempolin''i Diana, andriamani-bavy lehibe, dia hatao tsinontsinona koa aza, ka ho afa-boninahitra ilay ivavahan''i Asia rehetra sy izao tontolo izao.'
mg1865::mg_44::19::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany izy ireo, dia tezitra loatra ka niantso hoe: Lehibe Dianan''ny Efesiana!'
mg1865::mg_44::19::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanerana ny tanàna ny tabataba; ary rehefa nisarika an''i Gaio sy Aristarko, lehilahy Makedoniana niara-dia tamin''i Paoly, izy, dia niray saina niriotra ho ao an-trano filalaovana.'
mg1865::mg_44::19::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha te-hiditra ho any amin''ny olona Paoly, dia tsy navelan''ny mpianatra.'
mg1865::mg_44::19::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehibe sasany tany Asia*, izay sakaizany, dia nampitondra teny nananatra azy mba tsy ho sahy hiditra ao an-trano filalaovana. [*Grika: Asiarka]'
mg1865::mg_44::19::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany niantso zavatra iray, ary ny sasany kosa zavatra hafa; fa nihorikorika ny olona vory; koa ny ankamaroany tsy nahalala izay anton''ny niangonany teo.'
mg1865::mg_44::19::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nisarika an''i Aleksandro avy teo amin''ny vahoaka, fa ny Jiosy nanesika azy handroso. Ary Aleksandro nanofa tanana, fa ta-handaha-teny hiala tsiny tamin''ny olona.'
mg1865::mg_44::19::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa fantatry ny olona fa Jiosy, izy dia niredona niantso tokony ho ora roa izy rehetra hoe: Lehibe Dianan''ny Efesiana!'
mg1865::mg_44::19::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitahiry ny didy dia nampangina ny olona ka nanao hoe: Ry lehilahy Efesiana, iza no olona tsy mahalala fa ny tanànan''ny Efesiana no mpitahiry an''i Diana lehibe sy ny sarin-javatra izay latsaka avy tamin''i Jopitera *? [*Grika: Zeosy]'
mg1865::mg_44::19::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tsy azo toherina izany, dia tokony hangina ianareo ka tsy hanao na inona na inona an-kamehana.'
mg1865::mg_44::19::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nentinareo ety ireo lehilahy ireo, izay tsy nandroba tempoly, na niteny ratsy ny andriamanitsika.'
mg1865::mg_44::19::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha manan-teny hifamaliana amin''olona Demetrio sy ny mpanefy izay momba azy, aoka hifandahatra izy, fa misy ihany ny andro hitsarana, ary ao ihany koa ireo governora.'
mg1865::mg_44::19::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mitady zavatra hafa kosa ianareo, dia hotsaraina amin''izay fivoriana voatendrin''ny lalàna.'
mg1865::mg_44::19::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa andrao ampangaina isika noho ny tabataba tsy misy antony izay niseho androany, ka tsy hita izay hilazantsika izao fampitairana izao.'
mg1865::mg_44::19::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 19
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany izy, dia nampirava ny olona vory teo.'
mg1865::mg_44::20::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Paoly tany Grisia indray, sy ny niverenany tany Asia'
  verse_text: 'Ary rehefa nitsahatra ny tabataba, dia nampaka ny mpianatra Paoly ka nananatra azy sy nanao veloma azy, dia lasa nankany Makedonia izy.'
mg1865::mg_44::20::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitety izany tany izany sy nananatra ny olona tamin''ny teny maro izy, dia tonga tany Grisia.'
mg1865::mg_44::20::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nitoetra telo volana teo izy ka efa hiondrana an-tsambo hankany Syria, ary nisy Jiosy nanotrika azy, dia niova hevitra izy ka lasa niverina namaky an''i Makedonia.'
mg1865::mg_44::20::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka taminy hatrany Asia Sopatera, zanak''i Pyro, avy any Beria, ary Aristarko sy Sekondo avy any Tesalonika, ary Gaio avy any Derbe, ary Timoty, ary Tykiko sy Trofimo avy any Asia.'
mg1865::mg_44::20::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia efa nialoha ka niandry anay tany Troasy.'
mg1865::mg_44::20::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niondrana an-tsambo niala tany Filipy izahay, rehefa tapitra ny andro fihinanana ny mofo tsy misy masirasira, dia nankany aminy tany Troasy izahay nony afaka hadimiana; ary tany no nitoeranay hafitoana.'
mg1865::mg_44::20::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro voalohany amin''ny herinandro, rehefa niangona hamaky mofo izahay, Paoly dia nitori-teny taminy, fa nikasa handeha maraina izy; dia naharitra nitori-teny mandra-paha-mamatonalina izy.'
mg1865::mg_44::20::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy jiro maro teo an-trano ambony izay niangonanay.'
mg1865::mg_44::20::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy zatovo anankiray atao hoe Eotyka nipetraka teo am-baravarankely ka sondrian-tory; ary raha naharitra ela ny toritenin''i Paoly, dia niraika noho ny torimaso ilay zatovo ka nianjera tamin''ny tany avy eny amin''ny rihana intelo mifanongoa, ary nony narenina izy, dia indro fa efa maty.'
mg1865::mg_44::20::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly nidina, dia niankohoka taminy sy nanohona azy ka nanao hoe: Aza mihorikorika ianareo, fa mbola misy aina ihany izy.'
mg1865::mg_44::20::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra Paoly, dia namaky ny mofo, ary rehefa nihinana sy niresaka ela ambara-pahamarain''ny andro izy, dia lasa nandeha.'
mg1865::mg_44::20::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra ilay zatovo efa velona izy ireo ka faly dia faly.'
mg1865::mg_44::20::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay nialoha ho any an-tsambo, dia niondrana nankany Aso, fa eo no handraisana an''i Paoly, satria eo no fotoana nataony, fa nikasa handeha an-tanety* izy. [*Na: handeha tongotra]'
mg1865::mg_44::20::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nihaona taminay tany Aso izy, dia noraisinay, ary dia lasa nankany Mitylena izahay.'
mg1865::mg_44::20::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niondrana an-tsambo niala teo izahay, dia tonga tandrifin''i Kio nony ampitso; ary nony ampitso indray dia niantsona tao Samo; ka* tonga tany Mileto izahay nony ampitson''iny. [* Ampio hoe: (rehefa nitoetra any Trogilio, dia)]'
mg1865::mg_44::20::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Paoly efa nikasa handeha an-tsambo handalo any Efesosy mba tsy hitoerany ela any Asia; fa maika izy, raha azony hatao, hamonjy ny andro Pentekosta any Jerosalema.'
mg1865::mg_44::20::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny anatra nataon''i Paoly tamin''ny loholon''ny fiangonana tao Efesosy'
  verse_text: 'Ary raha tany Mileto Paoly, dia naniraka hankany Efesosy izy ka nampaka ny loholon*''ny fiangonana** hankeo aminy. [*Grika: presbytera] [**Grika: eklesia]'
mg1865::mg_44::20::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo aminy ireo, dia hoy izy taminy: Fantatrareo hatramin''ny andro voalohany nahatongavako teto Asia izay toetry ny fitondran-tenako taminareo tamin''izany andro rehetra izany,'
mg1865::mg_44::20::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny nanompoako ny Tompo tamin''ny fanetren-tena rehetra sy ny ranomaso ary ny fakam-panahy izay nanjo ahy tamin''ny fanotrehan''ny Jiosy,'
mg1865::mg_44::20::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy mba nafeniko izay mahasoa, fa nambarako sy nampianariko anareo teo imason''ny olona ary tao amin''ny isan-trano;'
mg1865::mg_44::20::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nambarako tamin''ny Jiosy sy ny jentilisa* koa ny fibebahana amin''Andriamanitra sy ny finoana an''i Jesoa Kristy Tompontsika. [*Grika: Grika]'
mg1865::mg_44::20::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, indro, tery* am-panahy hankany Jerosalema aho, nefa tsy fantatro izay hanjo ahy any, [*mifatotra]'
mg1865::mg_44::20::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy izay ambaran''ny Fanahy Masina amiko amin''ny isan-tanàna, fa hisy famatorana sy fahoriana hanjo ahy.'
mg1865::mg_44::20::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy ataoko ho zavatra akory ny aiko, mba hahavita ny alehako, dia ny fanompoana izay noraisiko tamin''i Jesoa Tompo hanambara ny filazantsaran''ny fahasoavan''Andriamanitra.'
mg1865::mg_44::20::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ankehitriny fantatro fa tsy hahita ny tavako intsony ianareo rehetra izay nalehako nitoriako ny fanjakana.'
mg1865::mg_44::20::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa manambara aminareo aho anio fa afaka amin''ny ranareo rehetra aho.'
mg1865::mg_44::20::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nafeniko anareo, fa notoriko taminareo avokoa ny saina rehetra natolotr''Andriamanitra.'
mg1865::mg_44::20::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny tenanareo sy ny ondry rehetra izay nanaovan''ny Fanahy Masina anareo ho mpitandrina*, hiandrasanareo ny fiangonan**''Andriamanitra***, izay novidiny tamin''ny ràny. [*Grika: episkopo] [** Grika: eklesia''] [*** Na: "ny fiangonan''ny Tompo"]'
mg1865::mg_44::20::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro fa rehefa lasa aho dia hisy amboadia* masiaka hiditra eo aminareo izay tsy hiantra ny ondry. [*Grika: lopa]'
mg1865::mg_44::20::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy aminareo no hiposahan''ny olona sasany mitory teny tsy marina hitaona ny mpianatra hanaraka azy.'
mg1865::mg_44::20::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miambena, ary tsarovy fa telo taona mipaka aho tsy nitsahatra nananatra anareo rehetra andro aman''alina tamin''ny ranomaso.'
mg1865::mg_44::20::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny izaho manolotra anareo ho amin''Andriamanitra sy ho amin''ny tenin''ny fahasoavany, izay mahay mampandroso sy manome lova anareo eo amin''izay rehetra nohamasinina.'
mg1865::mg_44::20::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba naniry volafotsy na volamena na lamban''olona aho.'
mg1865::mg_44::20::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatrareo ihany fa ireto tanako ireto no niasa mba hahazoako sy ny niaraka tamiko izay nilainay.'
mg1865::mg_44::20::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nasehoko anareo tamin''ny zavatra rehetra fa tokony hiasa toy izany koa ianareo, mba hiantra ny mahantra ka hahatsiaro ny tenin''i Jesoa Tompo, izay manao hoe: Mahasambatra kokoa ny manome noho ny mandray.'
mg1865::mg_44::20::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niteny izany izy, dia nandohalika teo ka niara-nivavaka tamin''izy rehetra.'
mg1865::mg_44::20::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitomany mafy izy rehetra, dia namihina ny vozon''i Paoly ka nanoroka azy,'
mg1865::mg_44::20::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 20
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nalahelo loatra noho ny nilazany fa tsy hahita ny tavany intsony izy. Dia nanatitra azy teny an-tsambo izy.'
mg1865::mg_44::21::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: '2022-09-26T05:31:22+0000'
  verse_title: 'Ny nahatongavan''i Paoly tany Jerosalema, sy ny nataony hampihena ny tsy fitiavan''ny Kristiana tany Palestina azy'
  verse_text: 'Ary rehefa tafasaraka taminy izahay, dia niondrana an-tsambo ka nizotra nankany Kosy; ary nony ampitso dia tonga tao Rodo, dia niala tao nankany Patara;'
mg1865::mg_44::21::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony nahita sambo nita ho any Foinika izahay, dia nifindra sambo teo ka lasa nandeha.'
mg1865::mg_44::21::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahatsinjo an''i Kyprosy izahay, dia nandalo azy tamin''ny ankavia ka nankany Syria, dia niantsona tao Tyro; fa tao no notaterina ny entan''ny sambo.'
mg1865::mg_44::21::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nitady ny mpianatra izahay ka nahita azy, dia nitoetra teo hafitoana; ary izy ireo dia voatsindrin''ny Fanahy hilaza amin''i Paoly mba tsy hiakatra any Jerosalema.'
mg1865::mg_44::21::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra izany andro izany, dia niala izahay ka lasa nandeha; ary izy rehetra mbamin''ny vadiny aman-janany dia nanatitra anay hatrany ivelan''ny tanàna; ary nandohalika teo amoron-dranomasina izahay ka nivavaka;'
mg1865::mg_44::21::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa nifanao veloma izahay, dia nirotsaka an-tsambo; fa izy ireo kosa niverina nody.'
mg1865::mg_44::21::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny niafaran''ny nandehananay an-tsambo dia tany Tolemaia, rehefa avy tany Tyro; ary niarahaba ny rahalahy izahay ka nitoetra teo aminy indray andro.'
mg1865::mg_44::21::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia niala teo izahay ka tonga tany Kaisaria ary niditra tao an-tranon''i Filipo evanjelista, izay anankiray tamin''izy fito lahy, dia nitoetra tao aminy izahay.'
mg1865::mg_44::21::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany lehilahy izany dia nanana zanakavavy virijina efatra izay naminany.'
mg1865::mg_44::21::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitoetra tao andro maro izahay, dia nisy mpaminany anankiray atao hoe Agabo nidina avy tany Jodia.'
mg1865::mg_44::21::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tao aminay izy, dia noraisiny ny fehin-kibon''i Paoly, ka namatorany ny tongotra aman-tanan''ny tenany, dia hoy izy; Izao no lazain''ny Fanahy Masina: Toy izao no hamatoran''ny Jiosy any Jerosalema ny lehilahy tompon''ity fehin-kibo ity, ka hatolony ho eo an-tanan''ny jentilisa izy.'
mg1865::mg_44::21::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao renay izany, dia nangataka taminy izahay mbamin''izay nonina teo mba tsy hiakarany any Jerosalema.'
mg1865::mg_44::21::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Paoly namaly ka nanao hoe: Nahoana ianareo no mitomany ka mampangorakoraka ny foko? Fa vonona aho tsy ny hafatotra ihany, fa ny ho faty any Jerosalema koa aza mba ho voninahitry ny anaran''i Jesoa Tompo.'
mg1865::mg_44::21::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tsy nanaiky izy, dia nitsahatra izahay ka nanao hoe: Aoka ny sitrapon''ny Tompo no hatao.'
mg1865::mg_44::21::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany andro izany, dia nifehy entana izahay ka niakatra nankany Jerosalema.'
mg1865::mg_44::21::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niaraka taminay koa ny mpianatra sasany avy tany Kaisaria, izay nitondra anay ho any amin''i Menasona, olona avy any Kyprosy sady mpianatra maintimolaly, izay nokasainay hitoerana.'
mg1865::mg_44::21::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany Jerosalema izahay, dia nandray anay tamin''ny fifaliana ny rahalahy.'
mg1865::mg_44::21::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia niara-niditra tany amin''i Jakoba izahay sy Paoly; ary vory teo ny loholona* rehetra. ]*Grika: presbytera]'
mg1865::mg_44::21::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niarahaba azy Paoly, dia nilaza tsirairay ny zavatra rehetra izay efa nampanaovin''Andriamanitra azy tany amin''ny jentilisa izy.'
mg1865::mg_44::21::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany ireo, dia nankalaza an''Andriamanitra; ary hoy koa izy tamin''i Paoly: Hitanao, rahalahy, fa tsy omby alinalina ny Jiosy izay efa mino; ary fatra-pitàna ny lalàna izy rehetra,'
mg1865::mg_44::21::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa novokisan''olona ny aminao, fa ianao, hono, mampianatra ny Jiosy rehetra izay any amin''ny jentilisa hahafoy an''i Mosesy ka mandrara azy tsy hamora ny zaza na hanaraka ny fanaon-drazana.'
mg1865::mg_44::21::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary no izy? Tsy maintsy ho reny ny nahatongavanao.'
mg1865::mg_44::21::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ataovy izao lazainay aminao izao: Misy efa-dahy ety izay nivoady;'
mg1865::mg_44::21::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'raiso ireo ka manadiova ny tenanao miaraka aminy, ary mandoava ny vola ho lany mba hanaratany ny lohany, ka dia ho fantatry ny olona rehetra fa tsinontsinona izay zavatra namokisana azy ny aminao, fa ianao aza mandeha manaraka ny lalàna kosa.'
mg1865::mg_44::21::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny jentilisa izay efa mino, dia efa nampitondra epistily izahay nandidy azy hifady ny hena aterina amin''ny sampy sy ny rà sy ny zavatra kendaina ary ny fijangajangana.'
mg1865::mg_44::21::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisin''i Paoly ireo lehilahy ireo, ary nony ampitso dia nanadio ny tenany niaraka taminy izy ka niditra teo an-kianjan''ny tempoly, nanambara ny fahatanterahan''ny andro fahadiovana mandra-panatitra ny fanatitra ho an''ny isan-dahy.'
mg1865::mg_44::21::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny nisamborana an''i Paoly, sy ny teny nalahany tamin''izany'
  verse_text: 'Ary rehefa ho tapitra ny hafitoana, dia nahita an''i Paoly teo an-kianjan''ny tempoly ny Jiosy avy tany Asia, ka nampikotaba ny vahoaka rehetra izy sady nisambotra an''i Paoly,'
mg1865::mg_44::21::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia niantso hoe: Avia, ry lehilahy Isiraely, fa io no lehilahy mampianatra ny olona rehetra ombieniombieny manohitra ny olona Isiraely sy ny lalàna sy ity fitoerana ity, sady nampiditra jentilisa* teo an-kianjan''ny tempoly izy ka nandoto ity fitoerana masina. [*Grika: Grika]'
mg1865::mg_44::21::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa efa hitany rahateo fa niaraka taminy tao an-tanàna Trofimo Efesiana, ka nataony fa nampidirin''i Paoly teo an-kianjan''ny tempoly izy).'
mg1865::mg_44::21::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifanaritaka be ihany ny tao an-tanàna rehetra, ka nihazakazaka nivory ny olona; ary Paoly dia nosamboriny ka nosarihany hiala eo an-kianjan''ny tempoly; ary niaraka tamin''izay dia narindrina ny vavahady.'
mg1865::mg_44::21::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitady hamono azy ny olona, dia nisy teny nakarina tany amin''ny mpifehy arivo tamin''ny antokon''ny miaramila nilaza fa mikotaba avokoa Jerosalema rehetra;'
mg1865::mg_44::21::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niaraka tamin''izay dia naka miaramila sy kapiteny izy ka nihazakazaka nidina nankeo aminy; ary raha nahita ny mpifehy arivo sy ny miaramila ny olona, dia nitsahatra tsy nikapoka an''i Paoly.'
mg1865::mg_44::21::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy arivo nanakaiky, dia nisambotra azy ka nandidy hamatotra ary tamin''ny gadra roa, dia nanontany hoe: Iza moa izy, ary inona moa no nataony?'
mg1865::mg_44::21::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany tamin''ny olona maro niantso mafy nilaza zavatra iray, ary ny sasany kosa zavatra hafa; ary rehefa tsy azony nofantarina izay marina noho ny fikotranana, dia nasainy nentina ho any anati-rova Paoly.'
mg1865::mg_44::21::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo amin''ny ambaratonga izy, dia nobetain''ny miaramila noho ny fifanosehan''ny olona;'
mg1865::mg_44::21::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny olona maro nanaraka ka niantso hoe: Vonoy ilehio!'
mg1865::mg_44::21::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nentiny tany anati-rova Paoly, dia hoy izy tamin''ny mpifehy arivo: Mahazo miteny aminao va aho? Dia hoy izy: Mahay teny Grika va ianao?'
mg1865::mg_44::21::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy ianao va ilay Egyptiana, izay nampikomy ny olona fahiny ka nitarika ny efatra arivo lahy mpitondra lefom-pohy nankany an''efitra?'
mg1865::mg_44::21::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Paoly: Izaho Jiosy avy any Tarsosy any Kilikia, tompon-tany amin''izay tanàna tsy kely laza; koa trarantitra ianao, aoka aho mba hiteny amin''ny olona.'
mg1865::mg_44::21::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 21
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly, rehefa navelany, dia nitsangana teo amin''ny ambaratonga ka nanofa tanana tamin''ny olona. Ary rehefa nangina tsara ny olona, dia niteny mafy tamin''ny teny Hebreo izy ka nanao hoe:'
mg1865::mg_44::22::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy sy ianareo ray henoy ny teny halahatro aminareo ankehitriny hanala tsiny ny tenako.'
mg1865::mg_44::22::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny olona fa teny Hebreo no nitenenany taminy, dia mainka nangina izy; ary hoy Paoly:'
mg1865::mg_44::22::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho lehilahy Jiosy, teraka tany Tarsosy any Kilikia, fa teto amin''ity tanàna ity no nahabe ahy teo anilan''ny tongotr''i Gamaliela, dia nampianarina tsara ny lalàna avy tamin''ny razana aho, ary nazoto indrindra ho an''Andriamanitra tahaka anareo rehetra ankehitriny.'
mg1865::mg_44::22::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanenjika izay nanaiky izany fampianarana* izany aho hatramin''ny mahafaty azy aza, dia namatotra azy, na lahy na vavy, ka nanolotra azy hatao an-tranomaizina; [*Grika: lalana]'
mg1865::mg_44::22::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny mpisoronabe sy ny loholona rehetra no vavolombeloko, sady izy no nandraisako taratasy ho amin''ny rahalahy, dia nankany Damaskosy aho, mba ho entiko am-patorana hankany Jerosalema koa izay hita teo, mba hampijalina.'
mg1865::mg_44::22::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha aho ka mby teo akaiky an''i Damaskosy, tamin''ilay antoandrobe iny, dia nisy mazava lehibe nanelatrelatra tampoka avy tany an-danitra manodidina ahy;'
mg1865::mg_44::22::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia lavo tamin''ny tany aho ka nandre feo nilaza tamiko hoe: Saoly, Saoly, nahoana ianao no manenjika Ahy?'
mg1865::mg_44::22::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho namaly hoe: Iza moa Ianao, Tompoko? Dia hoy Izy tamiko: Izaho no Jesoa avy any Nazareta, Izay enjehinao.'
mg1865::mg_44::22::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay niaraka tamiko dia nahita ny mazava; nefa tsy mba nahare ny feon''izay niteny tamiko izy.'
mg1865::mg_44::22::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho: Tompoko, inona no hataoko? Dia hoy ny Tompo tamiko: Mitsangana, ka mandehana ho any Damaskosy; fa any no holazaina aminao izay rehetra voatendry hataonao.'
mg1865::mg_44::22::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy nahajery aho noho ny famirapiratan''izany mazava izany, dia notantanan''ireo niaraka tamiko aho, ka dia tonga tany Damaskosy.'
mg1865::mg_44::22::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy anankiray atao hoe Ananiasy, mpivavaka manaraka ny lalàna sady tsara laza teo amin''ny Jiosy rehetra izay nonina teo,'
mg1865::mg_44::22::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanatona ahy ary nitsangana ka nanao tamiko hoe: Ry Saoly rahalahy, mahirata. Ary tamin''izany ora izany dia nahiratra aho ka nahita azy.'
mg1865::mg_44::22::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Andriamanitry ny razantsika efa nanendry anao hahafantatra ny sitrapony sy hahita ny Iray Marina ary hihaino ny teny aloaky ny vavany;'
mg1865::mg_44::22::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ho vavolombelony amin''ny olona rehetra ianao ny amin''izay efa hitanao sy renao.'
mg1865::mg_44::22::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny inona no mampijanona anao? Mitsangàna, miantsoa ny anarany, ary aoka hatao batisa ianao ka hosasana ho afaka amin''ny fahotanao.'
mg1865::mg_44::22::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Jerosalema indray aho ka nivavaka teo an-kianjan''ny tempoly, dia azon-tsindrimandry'
mg1865::mg_44::22::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nahita Azy milaza amiko hoe: Maladia ianao, ka mivoaha faingana an''i Jerosalema; fa tsy handray ny fanambaranao Ahy izy.'
mg1865::mg_44::22::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Tompoko, izy ireo mahalala fa ny mino Anao dia nataoko tao an-tranomaizina sady nokapohiko tao amin''ny synagoga rehetra;'
mg1865::mg_44::22::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nalatsaka ny ran''i Stefana martioranao, izaho koa dia mba nitsangana teo ka nanaiky sady nitandrina ny fitafian''izay namono azy.'
mg1865::mg_44::22::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamiko: Mandehana, fa Izaho haniraka anao handeha lavitra any amin''ny jentilisa.'
mg1865::mg_44::22::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona nihaino azy hatramin''izany teny izany, dia nanandratra ny feony ka nanao hoe: Esory amin''ny tany ilehio, fa tsy tokony hovelomina izy!'
mg1865::mg_44::22::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niantso sy niala lamba ary nanipy vovoka ho amin''ny rivotra izy,'
mg1865::mg_44::22::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nasain''ny mpifehy arivo ho entina any anati-rova Paoly, ary nasainy hadinina amin''ny kapoka, mba hahafantarany izay fototry ny nanakoran''ny olona azy toy izany.'
mg1865::mg_44::22::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha namatotra azy tamin''ny kofehy hoditra izy, dia hoy Paoly tamin''ny kapiteny izay hitsangana teo: Mety aminareo va ny mikapoka lehilahy Romana izay tsy mbola nohelohina?'
mg1865::mg_44::22::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapiteny, nony nahare, dia lasa nilaza tamin''ny mpifehy arivo ka nanao hoe: Inona izao hataonao izao? fa Romana io lehilahy io.'
mg1865::mg_44::22::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankeo aminy ny mpifehy arivo ka nanao taminy hoe: Lazao amiko: Romana va ianao? Dia hoy izy: Eny.'
mg1865::mg_44::22::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy arivo namaly hoe: Vola be no nahazoako izany voninahitra izany. Fa hoy Paoly: Izaho kosa efa nanana izany hatry ny fony vao teraka.'
mg1865::mg_44::22::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao azy faingana ireo olona efa hanadina azy; ary ny mpifehy arivo natahotra koa, rehefa nahalala azy fa Romana, satria efa nampamatotra azy izy.'
mg1865::mg_44::22::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: 'Ny nandaharan''i Paoly teny teo anatrehan''ny Synedriona'
  verse_text: 'Ary nony ampitso, satria ta-hahafantatra marina izay niampangan''ny Jiosy azy ny mpifehy arivo, dia namaha azy, ary nasainy niangona ny lohan''ny mpisorona sy ny Synedriona rehetra, ary Paoly nentiny nidina ka nampitoeriny teo anatrehany.'
mg1865::mg_44::23::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly dia nibanjina ny Synedriona ka nanao hoe: Ry rahalahy, izaho nanompo an''Andriamanitra tamin''ny fieritreretana tsara mandraka androany.'
mg1865::mg_44::23::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ananiasy mpisoronabe nandidy izay nitsangana teo hamely ny vavany.'
mg1865::mg_44::23::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Paoly taminy: Andriamanitra mba hamely anao, ry rafi-bato voalalotra fotsy; fa ianao va mipetraka hitsara ahy araka ny lalàna, nefa asainao kapohina tsy araka ny lalàna aho?'
mg1865::mg_44::23::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nitsangana teo dia nanao hoe: Tevatevainao va ny mpisoronaben''Andriamanitra?'
mg1865::mg_44::23::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Paoly: Tsy fantatro fa mpisoronabe izy, ry rahalahy; fa voasoratra hoe: Aza miteny ratsy ny mpanapaka ny firenenao (Eksodosy 22:27).'
mg1865::mg_44::23::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa fantatr''i Paoly fa Sadoseo ny sasany, ary ny sasany kosa Fariseo, dia niantso teo amin''ny Synedriona izy ka nanao hoe: Ry rahalahy, izaho dia Fariseo, zanaky ny Fariseo; ny amin''ny fanantenana sy ny fitsanganan''ny maty no itsarana ahy.'
mg1865::mg_44::23::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany izy, dia nifanditra ny Fariseo sy ny Sadoseo, ka nizara roa toko ny olona maro.'
mg1865::mg_44::23::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Sadoseo manao hoe: Tsy misy fitsanganan''ny maty, sady tsy misy anjely na fanahy; fa ny Fariseo kosa manaiky izany avokoa.'
mg1865::mg_44::23::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy antsoantso maharenina teo, ary ny mpanora-dalàna sasany, izay isan''ny antoko atao hoe Fariseo, nitsangana dia niady hevitra ka nanao hoe: Tsy hitanay izay helok''io lehilahy io; fa sao fanahy na anjely no niteny taminy.'
mg1865::mg_44::23::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitabataba be ihany izy, dia natahotra ny mpifehy arivo, fandrao hifandroritan''ny olona Paoly ka ho samatsamaka, dia nasainy nidina ny miaramila mba haka azy an-keriny hiala teo ampovoany ary mba hitondra azy ho any anati-rova.'
mg1865::mg_44::23::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo nitsangana teo anilany tamin''iny alina iny ka nanao hoe: Matokia, fa tahaka ny nanambaranao Ahy tany Jerosalema no mbola hanambaranao Ahy any Roma koa.'
mg1865::mg_44::23::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny namindrana an''i Paoly nankany Kaisaria mba tsy ho azon''izay efa nianiana hahafaty azy'
  verse_text: 'Ary nony maraina dia niray tetika ny Jiosy ka niozona sy nianiana fa tsy hihinana na hisotro izy ambara-pamonony an''i Paoly.'
mg1865::mg_44::23::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy omby efa-polo no niray tetika nanao izany.'
mg1865::mg_44::23::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nankany amin''ny mpisoronabe sy ny loholona ka nanao hoe: Efa niozona sy nianiana izahay fa tsy hanandran-javatra na inona na inona ambara-pamononay an''i Paoly.'
mg1865::mg_44::23::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny dia milazà amin''ny mpifehy arivo ianareo sy ny Synedriona mba hampidina azy hankaty aminareo, mody ta-hamototra azy marimarina kokoa ny amin''izay nataony; ary izahay kosa dia efa vonona hamono azy, dieny tsy mbola mby akaiky izy.'
mg1865::mg_44::23::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny zanak''anabavin''i Paoly ny fanotrehana, dia lasa nankany anatirova izy ka nilaza tamin''i Paoly.'
mg1865::mg_44::23::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly niantso ny kapiteny anankiray hankeo aminy ka nanao hoe: Ento mankany amin''ny mpifehy arivo ity zatovo ity, fa manan-teny holazaina aminy izy.'
mg1865::mg_44::23::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nandray azy ilay kapiteny ka nitondra azy ho any amin''ny mpifehy arivo, dia nanao hoe: Paoly mpifatotra niantso ahy hankeo aminy ka nangataka ahy hitondra ity zatovo ity hanketo aminao, fa manan-teny holazaina aminao, hono, izy.'
mg1865::mg_44::23::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy arivo nitantana azy, ary nony efa nitokana tao amin''ny mangingina izy, dia nanontaniany hoe: Inona moa no teny holazainao amiko?'
mg1865::mg_44::23::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ilay zatovo: Ny Jiosy efa nifanaiky hangataka aminao hampidina an''i Paoly ho any amin''ny Synedriona rahampitso, mody ta-hanadina azy marimarina kokoa.'
mg1865::mg_44::23::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza manaiky azy ianao, fa misy tsy omby efa-polo lahy izy manotrika hisambotra an''i Paoly, ka efa niozona sy nianiana izy fa tsy hihinana na hisotro ambara-pamonony azy; ary efa vonona izy ankehitriny ka miandry ny teny avy aminao.'
mg1865::mg_44::23::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpifehy arivo nampandeha ilay zatovo ka nandidy azy hoe: Aza milaza amin''olona fa efa nilaza izany tamiko ianao.'
mg1865::mg_44::23::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso kapiteny roa lahy hankeo aminy izy ka nanao hoe: Manomàna miaramila roan-jato lahy sy an-tsoavaly fito-polo ary mpiloka lefona roan-jato hankany Kaisaria anio alina amin''ny ora fahatelo;'
mg1865::mg_44::23::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary itondray biby koa hitaingenan''i Paoly hitondra azy soa aman-tsara ho any amin''i Feliksa mpanapaka.'
mg1865::mg_44::23::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanoratra taratasy nisy izao teny izao:'
mg1865::mg_44::23::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Klaodio Lysia miarahaba an''i Feliksa, mpanapaka tsara indrindra.'
mg1865::mg_44::23::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity lehilahy ity dia nosamborin''ny Jiosy ka efa saiky novonoiny; fa nony fantatro fa Romana izy, dia nitondra ny miaramila aho ka namonjy azy.'
mg1865::mg_44::23::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria ta-hahalala tsara izay niampangany azy aho, dia nentiko nidina ho eo amin''ny Synedriona izy;'
mg1865::mg_44::23::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hitako fa ady hevitra ny amin''ny lalàny no niampangany azy, fa tsy nisy niampangany azy izay tokony hahafaty na hamatorana azy.'
mg1865::mg_44::23::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voalaza tamiko fa nisy nikasa hanotrika hisambotra an-dralehilahy, dia naniraka faingana hitondra azy aminao aho, ary ny mpiampanga koa nasaiko hilaza aty anatrehanao izay iampangany azy. [* Ampio hoe. [*Veloma]'
mg1865::mg_44::23::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''ny miaramila Paoly araka ny nandidiana azy ka nentiny tamin''iny alina iny ho any Antipatria.'
mg1865::mg_44::23::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia navelany handeha hiaraka aminy ny an-tsoavaly, fa izy kosa niverina ho any anati-rova.'
mg1865::mg_44::23::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa tonga tany Kaisaria ireo, dia nanolotra ny taratasy tamin''ny mpanapaka sady nanolotra an''i Paoly ho eo anatrehany koa.'
mg1865::mg_44::23::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa novakiny ilay taratasy, dia nanontany izay zara-fanapahana nihaviany izy; ary rehefa fantany fa avy tany Kilikia izy,'
mg1865::mg_44::23::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: '2022-11-12T13:12:15+0000'
  verse_title: null
  verse_text: 'dia hoy izy: Hihaino tsara ny teninao aho, rehefa tonga ny mpiampanga anao. Dia nasainy nambenana tao an-dapan''i* Heroda izy. [*Grika: pretoria]'
mg1865::mg_44::24::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsarana an''i Paoly teo anatrehan''i Feliksa, sy ny nifatorany roa taona tao Kaisaria'
  verse_text: 'Ary rehefa afaka hadimiana dia nidina Ananiasy mpisoronabe mbamin''ny loholona sasany sy Tertylo, mpandaha-teny anankiray, izay nanambara tamin''ny mpanapaka ny niampangany an''i Paoly.'
mg1865::mg_44::24::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nantsoina izy, dia niampanga azy Tertylo ka nanao hoe:'
mg1865::mg_44::24::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no ahazoanay fiadanana lehibe, ary ny fitondranao efa nampandry tsara ity firenena ity; koa raisinay amin''ny fankasitrahana mandrakariva eny tontolo eny izany, ry Feliksa tsara indrindra o.'
mg1865::mg_44::24::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba tsy hanahirana anao ela loatra aho, trarantitra ianao, henoy kely amin''ny faharetana izahay.'
mg1865::mg_44::24::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa io lehilahy io dia hitanay fa tena ratsy fanahy sady mpampikomy ny Jiosy rehetra eny tontolo eny, ary izy no tari-dalan''ilay antoko atao hoe Nazarena.'
mg1865::mg_44::24::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy io koa nitady handoto ny tempoly; dia nosamborinay izy*; [*Ampio hoe: ka tianay hotsaraina araka ny lalànay]'
mg1865::mg_44::24::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga Lysia, mpifehy arivo, dia nanao an-keriny ka naka azy teo an-tananay. Ary nasainy nankaty aminao ny mpiampanga azy'
mg1865::mg_44::24::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa manadina azy ianao, dia ho fantatrao marina izay rehetra iampanganay azy.'
mg1865::mg_44::24::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy koa dia nanaiky sy nilaza fa izany no izy.'
mg1865::mg_44::24::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa notondroin''ny mpanapaka hiteny Paoly, dia namaly ka nanao hoe: Fantatro fa ianao dia efa mpitsara ela tamin''ity firenena ity, ka dia faly aho handaha-teny hanala tsiny ny tenako;'
mg1865::mg_44::24::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa azonao fantarina mora fa tsy mba mihoatra noho ny roa ambin''ny folo andro izay no niakarako hivavaka tany Jerosalema.'
mg1865::mg_44::24::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy nahita ahy niady hevitra tamin''olona teo an-kianjan''ny tempoly na nampitabataba ny vahoaka tao amin''ny synagoga, na tao an-tanàna;'
mg1865::mg_44::24::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy hainy hamarinina eto anatrehanao izay zavatra iampangany ahy ankehitriny.'
mg1865::mg_44::24::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no ekeko aminao, fa araka ny fampianarana* izay ataony hoe fitokoana no anompoako an''Andriamanitry ny razako, sady inoako izay rehetra voasoratra eo amin''ny lalàna sy ny mpaminany, [*Grika: lalàna]'
mg1865::mg_44::24::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manantena amin''Andriamanitra aho, izay antenain''izy ireo koa, fa hisy fitsanganan''ny marina sy ny meloka.'
mg1865::mg_44::24::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia mikely aina koa aho mba hanana fieritreretana tsy manameloka ahy na amin''Andriamanitra na amin''olombelona mandrakariva.'
mg1865::mg_44::24::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka taona maro, dia tonga aho hitondra fiantrana sy fanatitra ho an''ny fireneko.'
mg1865::mg_44::24::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia hitany voadio teo an-kianjan''ny tempoly aho, tsy tamin''ny olona maro anefa, na tamin''ny fitabatabana; fa nisy Jiosy sasany avy any Asia,'
mg1865::mg_44::24::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: '- tokony hiseho eto anatrehanao ireo mba hiampanga ahy, raha tàhiny misy izay hiampangany ahy.'
mg1865::mg_44::24::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na aoka ireto olona ireto ihany no hilaza izay ratsy hitany raha nitsangana teo anatrehan''ny Synedriona aho,'
mg1865::mg_44::24::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'afa-tsy izao teny iray loha izao ihany, dia ilay nantsoiko raha nijanona teo afovoany aho hoe: Ny amin''ny fitsanganan''ny maty no itsarana ahy eto anatrehanareo anio.'
mg1865::mg_44::24::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria fantatr''i Feliksa tsaratsara kokoa ny amin''izany fampianarana* izany, dia nampandeha azy rehetra izy aloha ka nanao hoe: Rehefa tafidinay Lysia, mpifehy arivo, dia hofotorako tsara ny raharahanareo. [*Grika: lalàna]'
mg1865::mg_44::24::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nandidy ny kapiteny hiambina an''i Paoly sy hamela azy hitsangantsangana ary tsy handrara olona na dia iray akory aza amin''ny sakaizany izay ho avy hanompo azy.'
mg1865::mg_44::24::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka andro vitsivitsy, dia tonga Feliksa sy Drosila vadiny, vehivavy Jiosy, dia nampaka an''i Paoly izy ka nihaino azy nitory ny finoana an''i Kristy Jesoa.'
mg1865::mg_44::24::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitory ny amin''ny fahamarinana sy ny fahononana ary ny fitsarana ho avy izy, dia raiki-tahotra Feliksa ka namaly hoe: Mandehana angaloha; fa raha malalaka, dia hampaka anao indray aho.'
mg1865::mg_44::24::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady nanantena koa izy fa homen''i Paoly vola; ka dia nampaka azy matetika izy ka niresaka taminy.'
mg1865::mg_44::24::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka roa taona, dia Porsio Festosy no nandimby an''i Feliksa; ary Feliksa ta-hahazo sitraka tamin''ny Jiosy, ka dia mbola navelany ho mpifatotra ihany Paoly.'
mg1865::mg_44::25::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hevitra nataon''ny Jiosy hahafaty an''i Paoly, sy ny nangatahan''i Paoly hotsarain''i Kaisara'
  verse_text: 'Ary Festosy, nony tonga teo amin''ny zara-fanapahany, dia niala tany Kaisaria hiakatra any Jerosalema, rehefa afaka hateloana.'
mg1865::mg_44::25::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona sy ny olona manan-kaja tamin''ny Jiosy nanambara taminy izay niampangany an''i Paoly sady niangavy taminy'
mg1865::mg_44::25::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nangataka azy hohelohina, mba hampanalainy hankany Jerosalema; fa nikasa hanotrika eny amoron-dalana izy hamonoany azy.'
mg1865::mg_44::25::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Festosy namaly fa Paoly dia ambenana any Kaisaria, sady izy koa efa hankany faingana.'
mg1865::mg_44::25::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay manam-pahefana eo aminareo, hoy izy, no aoka hiara-midina amiko ka hiampanga an-dralehilahy, raha manan-keloka izy.'
mg1865::mg_44::25::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitoetra teo aminy tsy mihoatra noho ny havaloana na hafoloana izy, dia nidina nankany Kaisaria; ary nony ampitso dia nipetraka teo amin''ny fitsarana izy, ka nasainy halaina Paoly.'
mg1865::mg_44::25::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga izy, dia nitsangana manodidina azy ny Jiosy izay nidina avy tany Jerosalema, ka zavatra maro sady lehibe, izay tsy azony nohamarinina akory, no niampangany azy;'
mg1865::mg_44::25::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Paoly nandaha-teny hanala tsiny ny tenany hoe: Tsy nanao ratsy aho, na tamin''ny lalàn''ny Jiosy, na tamin''ny tempoly, na tamin''i Kaisara.'
mg1865::mg_44::25::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Festosy ta-hahazo sitraka tamin''ny Jiosy, dia namaly an''i Paoly ka nanao hoe: Tianao va hiakatra any Jerosalema hotsaraina eo anatrehako any ny amin''izany zavatra izany?'
mg1865::mg_44::25::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Paoly: Eto amin''ny fitsaran''i Kaisara, izay tokony hitsarana ahy, no itsanganako. Tsy nanisy ratsy ny Jiosy akory aho, ary na ianao aza dia mahafantatra izany marina.'
mg1865::mg_44::25::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha mpanao ratsy aho, na nanao izay tokony hahafaty ahy, dia tsy mandà tsy ho faty aho; fa raha tsy marina kosa izay zavatra iampangan''ireo ahy, dia tsy misy olona mahazo manolotra ahy ho amin''ny sitrapony. Handahatra eo anatrehan''i Kaisara aho.'
mg1865::mg_44::25::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niresaka tamin''ny mpanolo-tsaina Festosy, dia namaly hoe: Efa nifidy ny handahatra any anatrehan''i Kaisara ianao, ka dia ho any amin''i Kaisara ihany ianao.'
mg1865::mg_44::25::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nandaharan''i Paoly teny teo anatrehan''i Agripa sy Berenika'
  verse_text: 'Ary rehefa afaka andro vitsivitsy, dia tonga tany Kaisaria Agripa mpanjaka sy Berenika hiarahaba an''i Festosy.'
mg1865::mg_44::25::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitoetra teo andro maro izy, dia nambaran''i Festosy tamin''ny mpanjaka ny amin''i Paoly, ka hoy izy: Misy mpifatotra anankiray ato navelan''i Feliksa,'
mg1865::mg_44::25::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa tamin''izaho tany Jerosalema ny mpisorona sy ny loholon''ny Jiosy niampanga azy ka nangataka izay hanamelohana azy.'
mg1865::mg_44::25::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly azy kosa aho hoe: Tsy fanaon''ny Romana ny manolotra olona, raha tsy mbola mifanatrika ny ampangaina sy ny mpiampanga, ka mahazo mandahatra hanala tsiny ny tenany ny amin''izay niampangan''ireo azy izy.'
mg1865::mg_44::25::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga taty izy, dia tsy mba nijanonjanona aho, fa nony ampitso dia nipetraka teo amin''ny fitsarana, ka nasaiko nalaina ralehilahy.'
mg1865::mg_44::25::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa nitsangana ireo mpiampanga ireo, dia tsy mba niampanga azy araka izay zavatra ratsy nampoiziko izy tsy akory,'
mg1865::mg_44::25::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nanana ady hevitra taminy ny amin''ny fivavahany sy ny amin''izay Jesoa anankiray efa maty, nefa nolazain''i Paoly ho velona.'
mg1865::mg_44::25::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria variana ny hevitro ny amin''ny hitsarana izany zavatra izany, dia nanontany aho na tian-dralehilahy ny hankany Jerosalema hotsaraina any ny amin''izany zavatra izany, na tsia,'
mg1865::mg_44::25::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nangataka hambenana hotsarain''ny mpanjaka Paoly, dia nasaiko nambenana mandra-pandefako azy ho any amin''i Kaisara.'
mg1865::mg_44::25::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Agripa tamin''i Festosy: Izaho koa mba ta-handre izay lehilahy izay. Ary hoy izy: Rahampitso ary dia handre azy ihany ianao.'
mg1865::mg_44::25::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso, dia tonga Agripa sy Berenika niseho tamin''ny voninahitry ny fiandrianany ka niditra teo amin''ny trano fihaonana niaraka tamin''ny mpifehy arivo sy ny lehibe tao an-tanàna, dia nentina nankeo Paoly araka ny didin''i Festosy.'
mg1865::mg_44::25::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Festosy: Ry Agripa mpanjaka sy izay rehetra eto amintsika, hitanareo io lehilahy io, izay notarainan''ny Jiosy rehetra tamiko, na tany Jerosalema na teto koa, ka nataony antso avo hoe: Tsy tokony hovelomina intsony ilehio.'
mg1865::mg_44::25::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nony hitako fa tsy nisy zavatra nataony izay tokony hahafaty azy, saingy izy ihany no ta-handahatra amin''ny mpanjaka, dia nanaiky hampanatitra azy aho.'
mg1865::mg_44::25::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''io lehilahy io tsy hitako izay teny marina hosoratako amin''ny tompoko, koa dia nentiko eto anatrehanareo izy, indrindra fa eto anatrehanao, ry Agripa mpanjaka, mba hadinina izy, ka dia ho hitako izay hosoratako.'
mg1865::mg_44::25::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ataoko fa tsy mety ny mampanatitra mpifatotra, nefa tsy milaza izay zavatra iampangana azy.'
mg1865::mg_44::26::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Agripa tamin''i Paoly: Mahazo mandahatra ny teninao ianao. Ary Paoly naninjitra ny tanany ka nandaha-teny hanala tsiny ny tenany nanao hoe:'
mg1865::mg_44::26::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny zavatra rehetra iampangan''ny Jiosy ahy, ry Agripa mpanjaka, dia ataoko fa sambatra aho, satria mahazo mandaha-teny hanala tsiny ny tenako eto anatrehanao anio,'
mg1865::mg_44::26::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'indrindra fa efa fantatrao tsara ny fanao sy ny ady hevitra rehetra amin''ny Jiosy; koa trarantitra ianao, mba mahareta hihaino ahy.'
mg1865::mg_44::26::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatry ny Jiosy rehetra ny fitondran-tenako hatry ny fony aho mbola kely teo amin''ny fireneko tany Jerosalema hatramin''ny voalohany;'
mg1865::mg_44::26::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, fantany hatramin''ny voalohany aho (raha mety milaza izy), fa efa Fariseo aho araka ny antoko, fatra-pitana indrindra ny lalàna amin''ny fivavahantsika.'
mg1865::mg_44::26::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny ny fanantenana ny teny fikasana izay nataon''Andriamanitra tamin''ny razantsika no itsanganako hotsaraina eto,'
mg1865::mg_44::26::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ilay fanantenana andrasan''ny firenentsika roa ambin''ny folo, izay mazoto manao fanompoam-pivavahana ho an''Andriamanitra andro aman''alina. Izany fanantenana izany no iampangan''ny Jiosy ahy, ry mpanjaka o.'
mg1865::mg_44::26::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no ataonareo ho zavatra tsy azo inoana, raha Andriamanitra manangana ny maty?'
mg1865::mg_44::26::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho efa nihevitra tao am-poko tokoa fa tsy mety raha tsy manao zavatra maro hanohitra ny anaran''i Jesoa avy any Nazareta,'
mg1865::mg_44::26::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nataoko tany Jerosalema izany, ka maro ny olona masina no nohidiako tao an-tranomaizina, rehefa nahazo fahefana tamin''ny lohan''ny mpisorona aho; ary raha hovonoina ireny, dia mba nandatsa-bato nanaiky izany koa aho.'
mg1865::mg_44::26::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampijaly azy matetika teo amin''ny synagoga rehetra aho ka nanery azy hiteny ratsy*; ary satria very saina tamin''ny fahatezerako taminy aho, dia nanenjika azy hatramin''ny tanàna any ivelany koa aza. [*Grika: hanao blasfemia; izahao Matio 9:3]'
mg1865::mg_44::26::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany, raha nankany Damaskosy aho, nitondra fahefana sy teny izay efa azoko tamin''ny lohan''ny mpisorona,'
mg1865::mg_44::26::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nony ilay nitatao-vovonana iny ny andro, ry mpanjaka o, dia hitako teny an-dàlana fa, indro, nisy mazava avy tany an-danitra nanelatrelatra manodidina ahy mbamin''izay niaraka tamiko mihoatra noho ny famirapiratry ny masoandro.'
mg1865::mg_44::26::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lavo tamin''ny tany izahay rehetra, dia nandre feo nilaza tamiko aho nanao tamin''ny teny Hebreo hoe: Saoly Saoly, nahoana ianao no manenjika Ahy? Zavatra sarotra aminao ny hanipaka ny fanindronana.'
mg1865::mg_44::26::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho: Iza moa Ianao, Tompoko? Ary hoy ny Tompo: Izaho no Jesoa Izay enjehinao.'
mg1865::mg_44::26::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mitsangàna, ka mijoroa amin''ny tongotrao; fa izao no nisehoako taminao, dia ny hanendry anao ho mpanompo sy ho vavolombelona ny amin''izay efa nahitanao Ahy* sy izay hisehoako aminao, [*Na: (izay efa hitanao)]'
mg1865::mg_44::26::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'hamonjy anao amin''ny olona Isiraely sy ny jentilisa, izay anirahako anao,'
mg1865::mg_44::26::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'hampahiratra ny masony hialany amin''ny maizina ho amin''ny mazava, ary amin''ny fahefan''i Satana ho amin''Andriamanitra, mba hahazoany famelan-keloka sy lova eo amin''izay nohamasinina noho ny finoana Ahy.'
mg1865::mg_44::26::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, ry Agripa mpanjaka o, dia tsy nandà ny fahitana avy tany an-danitra aho;'
mg1865::mg_44::26::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nambarako voalohany tamin''izay tany Damaskosy sy Jerosalema sy tany amin''ny tany Jodia rehetra ary tany amin''ny Jentilisa, mba hibebaka sy hiverina amin''Andriamanitra izy ka hanao asa miendrika ny fibebahana.'
mg1865::mg_44::26::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no nisamboran''ny Jiosy ahy teo an-kianjan''ny tempoly sy nitadiavany hahafaty ahy.'
mg1865::mg_44::26::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny fitahian''Andriamanitra ahy dia mbola maharitra mandraka androany aho ka manambara na amin''ny kely na amin''ny lehibe, ary tsy milaza na inona na inona afa-tsy izay nolazain''ny mpaminany sy Mosesy fa ho avy,'
mg1865::mg_44::26::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Kristy tsy maintsy mijaly ary ho voalohany hitsangana amin''ny maty ka hitory fahazavana amin''ny olona Isiraely sy amin''ny jentilisa.'
mg1865::mg_44::26::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandahatra izany izy, dia hoy Festosy tamin''ny feo mahery: Ry Paoly o, very saina ianao; ny fianarana be loatra no efa nahavery saina anao.'
mg1865::mg_44::26::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Paoly: Tsy very saina aho, ry Festosy tsara indrindra, fa mandahatra tenin''ny fahamarinana sy ny fahononana.'
mg1865::mg_44::26::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatry ny mpanjaka izany zavatra izany, ka dia miteny amin''ny fahasahiana eto anatrehany aho; fa mino aho fa tsy miafina aminy izany zavatra izany, satria tsy natao tao amin''ny takona izany.'
mg1865::mg_44::26::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Agripa mpanjaka o, mino ny mpaminany va ianao? Fantatro fa mino ianao.'
mg1865::mg_44::26::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Agripa tamin''i Paoly: Hay! ataonao fa mora toy izany no hampanekenao ahy ho Kristiana.'
mg1865::mg_44::26::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Paoly: Mangataka amin''Andriamanitra aho, fa na amin''ny mora, na amin''ny sarotra, tsy ianao ihany, fa izay rehetra mandre ahy anio, dia hitovy amiko, afa-tsy amin''ireto gadra ireto ihany.'
mg1865::mg_44::26::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana ny mpanjaka sy ny governora ary Berenika mbamin''izay niara-nipetraka teo aminy;'
mg1865::mg_44::26::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa niala teo izy, dia niresaka hoe: Tsy manao izay tokony hahafaty na hamatorana azy tsy akory izany lehilahy izany.'
mg1865::mg_44::26::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 26
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Agripa tamin''i Festosy: Azo nalefa ihany io lehilahy io, saingy efa nifidy ny handahatra any anatrehan''i Kaisara izy.'
mg1865::mg_44::27::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitondrana an''i Paoly nankany Roma, sy ny zavatra nanjo azy teny an-dàlana'
  verse_text: 'Ary rehefa voadidy hiondrana an-tsambo hiala hankany Italia izahay, Paoly sy ny mpifatotra sasany dia natolotra tamin''ny kapiteny atao hoe Jolio, tamin''ny antokon''i Aogosto.'
mg1865::mg_44::27::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nirotsaka an-tsambo avy any Adramytena izay efa handeha hitety ny sisin-tanin''i Asia izahay, dia lasa nandeha; ary niaraka taminay Aristarko Makedoniana avy any Tesalonika.'
mg1865::mg_44::27::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso dia tonga tany Sidona izahay. Ary tsara ny nitondran''i Jolio an''i Paoly, fa navelany hankany amin''ny sakaizany izay hiahy azy izy.'
mg1865::mg_44::27::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala teo izahay, dia nanara-morona an''i Kyprosy nihazo ny ilany takon-drivotra, satria nanohitra ny rivotra.'
mg1865::mg_44::27::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa namaky ny ranomasina tany Kilikia sy Pamfilia izahay, dia tonga tany Myra any Lykia.'
mg1865::mg_44::27::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tao no nahitan''ny kapiteny sambon''Aleksandria hankany Italia, dia nasainy niondrana teo aminy izahay.'
mg1865::mg_44::27::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandeha niadana andro maromaro izahay ka saiky tsy tonga tandrifin''i Kinido, satria nisakana anay ny rivotra, dia takon-drivotra tandrifin''i Salmona izahay;'
mg1865::mg_44::27::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony sahirana nanara-morona izahay, dia tonga teo amin''ny tany anankiray atao hoe Tsara-fitodian-tsambo; akaikin''izany ny tanàna Lasea.'
mg1865::mg_44::27::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lany ny andro maro, sady sarotra ny fandehanan-tsambo tamin''izany, satria efa afaka ny Andro Fifadiana*, dia nananatra azy Paoly [*Ny Andro Fanavotana izany]'
mg1865::mg_44::27::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Ry tompokolahy o, hitako fa izao fandehanana izao dia hisy fahasimbana sy fatiantoka be ihany, ka tsy amin''ny entana sy ny sambo ihany, fa ny aintsika koa aza.'
mg1865::mg_44::27::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny kapiteny nino ny mpitondra sy ny tompon-tsambo, fa tsy ny teny nolazain''i Paoly.'
mg1865::mg_44::27::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria ny fitodian-tsambo teo dia tsy tsara hitoerana amin''ny ririnina, dia nataon''ny maro fa tsara raha miala, fandrao mba ho tonga any Foiniksa ahay handany ny ririnina any; fitodian-tsambo any Kreta izany ka manatrika mianatsimo-andrefana sy mianavaratra-andrefana*. [*Na: mianavaratra-atsinanana sy mianatsimo-atsinanana]'
mg1865::mg_44::27::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitsoka malemy ny rivotra avy any atsimo, ka nataony fa efa nahazo izay niriny izy, dia niala teo izy ka nandalo akaikikaikin''i Kreta.'
mg1865::mg_44::27::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy ela rehefa afaka izany, dia nifofofofo nidina avy teo ny tafio-drivotra mahery atao hoe Eorakylona.'
mg1865::mg_44::27::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nopaohin''ny rivotra ny sambo ka tsy nahatoha azy, dia navelanay haveziveziny izy.'
mg1865::mg_44::27::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandeha faingana nanara-morona ny nosy atao hoe Kaoda* nihazo ny ilany takon-drivotra izahay, dia saiky tsy nahazo ny salopy; [*Na: (Klaoda)]'
mg1865::mg_44::27::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa nakarina izany, dia novahorany manodidina ny sambo; ary natahotra izy, fandrao hihatra any amin''ilay fasika mandrevo*, dia nampidina ny lay, ka navelany handeha ho azy ny sambo. [*Grika: Syrtisy]'
mg1865::mg_44::27::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nasian''ny rivotra mafy izahay, dia nanariany ny entana nony ampitso;'
mg1865::mg_44::27::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony ampitson''io indray dia narian''ny tanany ihany ny fanaka teo amin''ny sambo;'
mg1865::mg_44::27::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa rehefa tsy hita ny masoandro na ny kintana hatramin''ny andro maro, ary tsy kely ny rivotra izay namely, dia tsy nanantena ho voavonjy intsony izahay.'
mg1865::mg_44::27::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tsy nihinan-kanina ela izy ireo, Paoly dia nitsangana teo afovoany ka nanao hoe: Ry tompokolahy o, tsara raha ho nihaino ahy ianareo ka tsy niala tany Kreta, mba tsy ho nahitana izao fahasimbana sy fatiantoka izao.'
mg1865::mg_44::27::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny mananatra anareo aho mba hatoky; fa tsy hisy ho faty ianareo, fa ny sambo ihany no ho very.'
mg1865::mg_44::27::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy anjelin''Andriamanitra, Izay Tompoko sady tompoiko, nitsangana teo anilako halina'
mg1865::mg_44::27::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Aza matahotra, ry Paoly; fa tsy maintsy hitsangana eo anatrehan''i Kaisara ianao; ary, indro, efa nomen''Andriamanitra anao ny olona rehetra izay miaraka aminao.'
mg1865::mg_44::27::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa matokia, ry tompokolahy o, fa mino an''Andriamanitra aho fa ho tonga araka ny voalazany tamiko izany.'
mg1865::mg_44::27::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy maintsy fefika ihany eo amin''ny nosy anankiray isika.'
mg1865::mg_44::27::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny alina fahefatra ambin''ny folo, raha navezimbezina tany Adria izahay, nony namatonalina dia nataon''ny matilo fa efa manakaiky tany izy;'
mg1865::mg_44::27::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanaka-drano izy ka hitany fa faharoa-polo refy; ary nony nandrosoroso kokoa izy, dia nanaka-drano indray ka hitany fa fahadimy ambin''ny folo refy.'
mg1865::mg_44::27::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natahotra izahay, fandrao hidona amin''ny harambato, ka dia nandatsaka vatofantsika efatra teo am-bodisambo ary naniry ny andro ho maraina.'
mg1865::mg_44::27::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nitady handositra hiala tamin''ny sambo ny matilo ka efa nampidina ny salopy teo amin''ny ranomasina izy, nody handatsaka vatofantsika eo an-doha-sambo,'
mg1865::mg_44::27::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Paoly tamin''ny kapiteny sy ny miaramila: Raha tsy mitoetra eto an-tsambo ireo, dia tsy azo vonjena ianareo.'
mg1865::mg_44::27::32:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia notapahin''ny miaramila ny mahazaka rehetra tamin''ny salopy, ka navelany ho latsaka.'
mg1865::mg_44::27::33:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola tsy nazava ny andro, dia niangavy tamin''ny olona rehetra Paoly mba hihinan-kanina ka nanao hoe: Anio no fahefatra ambin''ny folo andro niandrasanareo, sady nahari-noana ianareo ka tsy nihinana.'
mg1865::mg_44::27::34:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mananatra anareo aho hihinan-kanina, fa izany no isan''ny hamonjena anareo; ary tsy hisy ho very aminareo rehetra na dia singam-bolo iray akory aza.'
mg1865::mg_44::27::35:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nilaza izany izy sady nandray mofo, dia nisaotra an''Andriamanitra teo anatrehan''ny olona rehetra; ary rehefa novakiny, dia nihinana izy.'
mg1865::mg_44::27::36:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahazo toky izy rehetra ka nihinana koa.'
mg1865::mg_44::27::37:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay rehetra teo anaty sambo dia olona enina amby fito-polo amby roan-jato.'
mg1865::mg_44::27::38:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voky izy, dia nanariany ho any anaty ranomasina ny hanina* mba hanamaivana ny sambo. [*Na: ny vary tritika]'
mg1865::mg_44::27::39:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nazava ny andro, dia tsy nahalala ny tany izy, fa nahita helodrano anankiray tsara morona, ka teo no nokasainy hampidonana ny sambo, raha azony atao.'
mg1865::mg_44::27::40:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nesoriny avokoa ny vatofantsika, dia navelany ho any an-dranomasina, ary novahany koa ny kofehin''ny familian-tsambo dia namelatra ny lay anoloana izy ho azon''ny rivotra ka nanatona ny tany.'
mg1865::mg_44::27::41:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga tamin''izay nisy fihaonan-dranomasina izy, dia navelany hidona tamin''ny tany ny sambo; ary ny loha-sambo nihizina ka nitoetra tsy nihetsika, fa ny vodi-sambo kosa dia vakivaky azon''ny herin''ny onja.'
mg1865::mg_44::27::42:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramila nanao tetika hamono ny mpifatotra, fandrao hisy hilomano ireo ka ho afaka.'
mg1865::mg_44::27::43:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny kapiteny ta-hamonjy an''i Paoly, dia nisakana azy tsy hanao izay nokasainy; fa izay nahay nilomano no nasainy hirotsaka aloha ka hilomano ho any amin''ny tany,'
mg1865::mg_44::27::44:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 27
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny sisa dia samy hanao izay hahafaka azy, na amin''ny hazo fisaka, na amin''ny zavatra avy amin''ny sambo. Dia tonga soa aman-tsara teny an-tanety avokoa izy rehetra.'
mg1865::mg_44::28::1:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voavonjy izahay, vao fantatray fa Melita no anaran''ilay nosy.'
mg1865::mg_44::28::2:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy kely ny soa nasehon''ny tompon-tany taminay; fa namelona afo izy ka nandray tsara anay rehetra, satria nilatsaka tamin''izay ny ranonorana, sady nangatsiaka ny andro.'
mg1865::mg_44::28::3:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namory kitay hazo iray trotroana Paoly ka nanohoka izany teo amin''ny afo; ary nisy menarana nivoaka avy tamin''ny afo ka niraikitra tamin''ny tanany.'
mg1865::mg_44::28::4:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''ny tompon-tany ny biby niraikitra tamin''ny tanany, dia niresaka hoe izy: Mpamono olona tokoa io lehilahy io, ka na dia voavonjy tamin''ny ranomasina aza izy, tsy avelan''ny todin''aina ho velona.'
mg1865::mg_44::28::5:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nakifiny ho eo amin''ny afo ilay biby, ka tsy nisy naninona izy na dia kely akory aza.'
mg1865::mg_44::28::6:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona kosa nanampo azy hivonto, na hikarapoka ho faty tampoka; fa rehefa niandry ela izy ka nahita fa tsy nisy na inona na inona nanjo an''i Paoly, dia niova saina izy ka nanao hoe: andriamanitra io.'
mg1865::mg_44::28::7:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo akaikin''io dia nisy sahan''i Popilo, mpanapaka ny nosy, izay nandray anay ka nampiantrano anay tsara hateloana.'
mg1865::mg_44::28::8:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nararin''ny tazo sady nivalan-drà ny rain''i Popilo; ary Paoly niditra teo aminy ka nivavaka sady nametra-tanana taminy, dia nahasitrana azy.'
mg1865::mg_44::28::9:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita izany, dia tonga koa ny sasany izay narary teo amin''ny nosy, ka dia sitrana.'
mg1865::mg_44::28::10:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voninahitra be no nomen''ny olona anay; ary rehefa handeha izahay, dia novatsiany tsara.'
mg1865::mg_44::28::11:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka telo volana, dia niondrana izahay tamin''ny sambon''Aleksandria, izay efa nandany ny ririnina teo amin''izany nosy izany sady nisy sarin''ny Zaza Kambana*. [*Grika: Dioskory; dia Kastora sy Poloksa]'
mg1865::mg_44::28::12:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitody tany Syrakosa izahay, dia nitoetra teo hateloana.'
mg1865::mg_44::28::13:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala teo izahay, dia nisompirana nankany Regioma; ary rehefa afaka indray andro, dia nifofofofo avy any atsimo ny rivotra, koa nony ampitso dia tonga tao Potioly izahay;'
mg1865::mg_44::28::14:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'tao no nahitanay ny rahalahy sasany, ary izy niangavy anay hitoetra tao aminy hafitoana. Ary toy izany no nandrosoanay nankany Roma.'
mg1865::mg_44::28::15:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahare ny dianay ny rahalahy tany, dia tonga izy nitsena anay hatrany amin''ny Tsenan''Apio sy ny Tranombahiny Telo; raha nahita azy Paoly, dia nisaotra an''Andriamanitra izy ka nahazo toky.'
mg1865::mg_44::28::16:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny toetr''i Paoly tany Roma, sy izay nataony tany'
  verse_text: 'Ary rehefa tonga tany Roma izahay*, Paoly dia navelany hitoetra mitokana teo amin''ny miaramila anankiray izay niambina azy. [*Ampio hoe: ny mpifatotra dia natolotry ny kapiteny ho amin''ny lehiben''ny mpiambina; fa]'
mg1865::mg_44::28::17:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka hateloana, dia nampanalain''i Paoly hiangona izay lohandohany tamin''ny Jiosy; ary rehefa niangona ireo, dia hoy izy taminy: Ry rahalahy, izaho dia mpifatotra avy tany Jerosalema natolotra teo an-tanan''ny Romana, na dia tsy diso tamin''ny firenentsika aza, na tamin''ny fanaon-drazana;'
mg1865::mg_44::28::18:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa nanadina ahy mafy ireo, dia saiky nandefa ahy ihany, satria tsy nisy nataoko izay tokony hahafaty ahy.'
mg1865::mg_44::28::19:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha notoherin''ny Jiosy izany, dia tery aho ka nilaza fa handahatra amin''i Kaisara, nefa tsy mba toy ny manana teny hiampangako ny fireneko tsy akory.'
mg1865::mg_44::28::20:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany zavatra izany no nampanalako anareo, hahitako anareo sy hiresahako aminareo; fa noho ny fanantenan''ny Isiraely no ifatorako amin''ity gadra ity.'
mg1865::mg_44::28::21:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy ireo taminy; Izahay tsy mbola nahazo taratasy avy tany Jodia milaza anao, ary tsy mbola nisy rahalahy izay nankaty nanambara na nilaza ratsy anao;'
mg1865::mg_44::28::22:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tianay ho re aminao izay hevitrao; fa ny amin''izany antoko izany dia fantatray fa efa ratsy laza eny tontolo eny izy.'
mg1865::mg_44::28::23:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanao fotoana taminy ireo, dia maro no nankeo aminy tao an-trano nitoerany; ary izy nilaza sy nanambara taminy ny fanjakan''Andriamanitra hatramin''ny maraina ka hatramin''ny hariva, ary ny teny eo amin''ny lalàn''i Mosesy sy ny mpaminany no nitaomany azy hino an''i Jesoa.'
mg1865::mg_44::28::24:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany nino izay nolazainy, fa ny sasany kosa tsy mba nino.'
mg1865::mg_44::28::25:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy niray saina ireo dia niala, rehefa nanao teny indraim-bava Paoly hoe: Marina izay nampilazain''ny Fanahy Masina an''Isaia mpaminany tamin''ny razanareo'
mg1865::mg_44::28::26:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'manao hoe: Mandehana any amin''ity firenena ity ianao, ka lazao hoe: Mba hahare mandrakariva ihany ianareo, fa tsy hahalala; Ary mba hijery mandrakariva ihany ianareo, fa tsy hahita;'
mg1865::mg_44::28::27:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa adala ny fon''ireo olona ireo, ary efa lalodalovana ny sofiny, ary efa nakimpiny ny masony, Fandrao hahita ny masony, sy handre ny sofiny, ary hahalala ny fony, dia hibebaka izy, ka hahasitrana azy Aho. (Isaia 6:9-10).'
mg1865::mg_44::28::28:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka ho fantatrareo fa izao famonjen''Andriamanitra izao dia nampitondraina ho any amin''ny jentilisa, ary izy hihaino azy.'
mg1865::mg_44::28::29:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: [*29 Ary rehefa nilaza izany izy, dia lasa ny Jiosy ka niady hevitra fatratra]'
mg1865::mg_44::28::30:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Paoly nitoetra roa taona ngarangidina tao an-trano nohofany ka nandray tsara izay rehetra nankeo aminy,'
mg1865::mg_44::28::31:
  verse_version: mg1865
  verse_book: mg_44
  verse_chapter: 28
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitory ny fanjakan''Andriamanitra ka nampianatra ny amin''i Jesoa Kristy Tompo tamin''ny fahasahiana be, ary tsy nisy fisakanana.'
