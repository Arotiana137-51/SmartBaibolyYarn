mg1865::mg_28::1::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah, izay tonga tamin''i Hosea, zanak''i Bery, tamin''ny andro nanjakan''i Ozia sy Jotama sy Ahaza ary Hezekia, mpanjakan''ny Joda, sy tamin''ny andron''i Jeroboama, zanak''i Joasy, mpanjakan''ny Isiraely.'
mg1865::mg_28::1::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: '[*] Tamin''ny niandohan''ny nitenenan''i Jehovah tamin''i Hosea dia hoy Jehovah taminy: Andeha ianao maka vady izay efa tena janga sy zanaky ny fijangajangana; fa fatra-pijangajanga miala amin''i Jehovah ny tany.'
mg1865::mg_28::1::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa izy naka an''i Gomera, zanakavavin''i Diblaima; ary dia nanan''anaka ravehivavy ka nitera-dahy taminy.'
mg1865::mg_28::1::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah taminy: Ataovy Jezirela no anarany; fa vetivety dia hovaliako ny taranak''i Jeho noho ny rà nalatsaka tao Jezirela, ary hatsahatro ny fanjakan''ny taranak''Isiraely.'
mg1865::mg_28::1::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hotapahiko ao amin''ny tany lemaka Jezirela ny tsipïkan''Isiraely.'
mg1865::mg_28::1::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanan''anaka indray ravehivavy ka nitera-bavy. Dia hoy Jehovah taminy: Ataovy Lô-rohama* no anarany; fa tsy hamindra fo amin''ny taranak''Isiraely intsony Aho, eny, tsy havelako mihitsy ny helony**. [*Lô-rohama = Tsy namindrana fo] [**Na: hofoanako avokoa ny ananany]'
mg1865::mg_28::1::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny taranak''i Joda no hamindrako fo, ary Izaho Jehovah Andriamaniny no hamonjy azy, nefa tsy amin''ny tsipïka, na amin''ny sabatra, na amin''ny ady, na amin''ny soavaly, na amin''ny mpitaingin-tsoavaly.'
mg1865::mg_28::1::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa notazana Lô-rohama, dia nanan''anaka indray reniny ka nitera-dahy.'
mg1865::mg_28::1::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jehovah: Ataovy Lô-amy* no anarany; fa ianareo tsy oloko, ary Izaho tsy ho Andriamanitrareo**. [*Lô-amy = Tsy oloko] [**Hebreo: tsy ho anareo]'
mg1865::mg_28::2::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, na dia izany aza, ny isan''ny Zanak''Isiraely dia ho betsaka toy ny fasika amin''ny ranomasina, izay tsy azo afatra sady tsy tambo isaina; ary any amin''ny tany izay nilazana taminy hoe: Tsy oloko ianareo, dia any no hanaovana aminy hoe: Zanak''Andriamanitra velona ianareo.'
mg1865::mg_28::2::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiara-mivory ny taranak''i Joda sy ny taranak''Isiraely ka hifidy anankiray ho lohany izy, dia hiakatra hiala amin''ny tany, fa ho lehibe ny andron''i Jezirda.'
mg1865::mg_28::2::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova amin''ny rahalahinareo hoe: Amy*, ary amin''ny anabavinareo hoe: Rohama**. [*Amy = Oloko] [**Rohama = Namindrana fo]'
mg1865::mg_28::2::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Ny hamaizana ny Isiraely, sy ny mbola hampodian''i Jehovah azy'
  verse_text: 'Mifandahara amin-dreninareo, eny, mifandahara fa izy tsy vadiko, ary Izaho tsy vadiny, ary aoka hesoriny ny fijejojejoany hiala eo amin''ny tavany sy ny fijangajangany tsy ho eo an-tratrany;'
mg1865::mg_28::2::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao hampihanjahanjaiko izy ka hataoko toy ny tamin''ny andro nahaterahany, ary hataoko toy ny efitra sy ny tany karankaina izy, eny, hataoko matin-ketaheta izy.'
mg1865::mg_28::2::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hamindrako fo ny zanany, Satria zanaky ny fijangajangana ireny.'
mg1865::mg_28::2::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nijangajanga ny reniny, eny, ilay torontoronina azy efa nanao izay mahamenatra; Fa hoy izy: Hanaraka ireo lehilahiko ihany aho, Izay manome ahy ny hanin-kohaniko sy ny rano hosotroiko, sy ny volon''ondriko sy ny rongoniko sy ny diloiloko ary ny fisotroko.'
mg1865::mg_28::2::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, hotampenako tsilo ny lalanao sady hasiako fefy, ary tsy hahita izay lalan-kalehany izy.'
mg1865::mg_28::2::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiezaka hanenjika ireo lehilahiny izy, nefa tsy hahatratra azy; Eny, hitady ireo izy, nefa tsy hahita; Dia hanao hoe izy: Handeha hody amin''ny vadiko taloha aho; Fa niadana aho tamin''izay noho ny ankehitriny.'
mg1865::mg_28::2::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy fantany fa Izaho no nanome azy ny vary sy ny ranom-boaloboka sy ny diloilo, sady nataoko be ny volafotsiny sy ny volamenany, izay nolaniny ho an*''i Bala, [*Na: nataony ho]'
mg1865::mg_28::2::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia halaiko indray ny variko amin''ny androny sy ny ranom-boaloboko amin''ny taonany, ary haoriko ny volon''ondriko sy ny rongoniko, izay nomena hasarony ny fitanjahany.'
mg1865::mg_28::2::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny hasehoko eo imason''ireo lehilahiny ny fahamenarany, ka tsy hisy hahafaka azy amin''ny tanako.'
mg1865::mg_28::2::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatsahatro ny fifaliany rehetra, dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany, eny, ny fotoam-pivavahany rehetra.'
mg1865::mg_28::2::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofongorako ny voalobony sy ny aviaviny, izay nataony hoe: Tangiko avy tamin''ireo lehilahiko ireto, ary hataoko ho tonga ala ireny ka hohanin''ny bibidia.'
mg1865::mg_28::2::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovaliako izy noho ny andron''ireo Bala, izay efa nandoroany ditin-kazo manitra sady niravahany ny kaviny sy ny firavany, ka nanaraka ireo lehilahiny izy; Fa Izaho kosa nohadinoiny, hoy Jehovah.'
mg1865::mg_28::2::16:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, Izaho dia hitaona azy ka hitondra azy ho any an''efitra ary hanao teny malefaka hahafinaritra azy.'
mg1865::mg_28::2::17:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatrany dia homeko azy ny tanim-boalobony sy ny lohasaha Akora ho varavaram-panantenana; Ary any no hamaliany* toy ny tamin''ny andro fahatanorany, dia toy ny tamin''ny andro niakarany avy tany amin''ny tany Egypta. [*Na: hihirany]'
mg1865::mg_28::2::18:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mby amin''izany andro izany, hoy Jehovah, dia hataonao hoe Aho Vadiko, fa tsy hataonao intsony hoe Balako*. [*Balako = Tompoko]'
mg1865::mg_28::2::19:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hesoriko amin''ny vavany ny anaran''ireo Bala, ka tsy hotsarovana amin''ny anarany intsony ireo.'
mg1865::mg_28::2::20:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mby amin''izany andro izany, Izaho dia hanao fanekena ho azy amin''ny bibidia sy amin''ny voro-manidina ary amin''ny biby mandady sy mikisaka amin''ny tany; Ary hotapatapahiko tsy hisy amin''ny tany intsony ny tsipïka sy ny sabatra ary ny fiadiana, dia hataoko mandry fahizay izy;'
mg1865::mg_28::2::21:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofofoiko ho vadiko mandrakizay ianao, eny, hofofoiko ho vadiko amin''ny rariny sy ny hitsiny ary amin''ny fitiavana sy ny indrafo ianao;'
mg1865::mg_28::2::22:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hofofoiko ho vadiko amin''ny fahamarinana ianao. Ka dia hahalala an''i Jehovah.'
mg1865::mg_28::2::23:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hihaino* Aho, hoy Jehovah, eny, hihainoa ny lanitra Aho, ary izy kosa hihaino ny tany; [*Na: hamaly]'
mg1865::mg_28::2::24:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tany kosa hihaino ny vary sy ny ranom-boaloboka ary ny diloilo; Ary ireo kosa dia hihaino an''i Jezirela,'
mg1865::mg_28::2::25:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hafafiko ho Ahy amin''ny tany izy; Ary hamindra fo amin''i Lô-rohama* Aho sady hanao amin''i Lô-amy hoe: Oloko ianao; Ary izy kosa hanao hoe: Andriamanitro Ianao. [*Izahao Hosea 1:6]'
mg1865::mg_28::3::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny vehivavy janga anankiray, izay natao tandindon''ny Isiraely'
  verse_text: 'Dia hoy Jehovah tamiko: Mandehana indray, tiava vehivavy izay tian''ny vadiny nefa* mijangajanga, dia tahaka ny fitiavan''i Jehovah ny Zanak''Isiraely, nefa ireo kosa dia mihodina ho amin''izay andriamani-kafa sady tia ampempam-boaloboka. [*Na: tian''ny sakaizany sady]'
mg1865::mg_28::3::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia novidiko sekely volafotsy dimy ambin''ny folo sy vary hordea homera iray sy tapany izy.'
mg1865::mg_28::3::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho taminy: Andro maro no hitoeranao miandry ahy; fa tsy havela hijangajanga na hanambady olon-kafa ianao; ary izaho koa dia ho toy izany aminao.'
mg1865::mg_28::3::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa andro maro no hitoeran''ny Zanak''Isiraely tsy hanana mpanjaka, na mpanapaka, na fanatitra, na tsangam-bato, na efoda, na terafima.'
mg1865::mg_28::3::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia hiverina ny Zanak''Isiraely ka hitady an''i Jehovah Andriamaniny sy Davida mpanjakany; ary nandeha amin-kovitra hanatona an''i Jehovah sy ny fahasoavany izy, raha mby any amparany.'
mg1865::mg_28::4::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fananarana ny Isiraely noho ny helony'
  verse_text: 'Mihainoa ny tenin''i Jehovah, ianareo Zanak''Isiraely! Fa Jehovah manana ady amin''ny mponina amin''ny tany, satria tsy misy fahamarinana, na fitiavana, na fahalalana an''Andriamanitra eo amin''ny tany,'
mg1865::mg_28::4::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fianianana sy lainga sy vonoana sy halatra sy fijangajangana kosa, eny, manao an-keriny izy* ka mifanontona ny fandatsahan-drà. [*Na: Fa ny fianianana sy ny lainga sy ny vonoana sy ny halatra ary ny fijangajangana no mihabetsaka]'
mg1865::mg_28::4::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia mitomany ny tany ary reraka izay rehetra mitoetra ao aminy, dia* ny bibi-dia sy ny voro-manidina; Eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa. [*Na: Mbamin'']'
mg1865::mg_28::4::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa aza misy mandahatra, na mananatra; Fa ny oloko dia efa tahaka ny mifanditra amin''ny mpisorona.'
mg1865::mg_28::4::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho tafintohina antoandro ianao, ary ny mpaminany hiara-tafintohina aminao koa amin''ny alina, ary hovonoiko ny reninao.'
mg1865::mg_28::4::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ringana ny oloko noho ny tsy fisian''ny fahalalana. Satria ianao efa nandà ny fahalalana, dia mba holaviko kosa tsy ho mpisoroko intsony; Ary efa nanadino ny lalan''Andriamanitrao ianao, ka dia mba hohadinoiko kosa ny zanakao.'
mg1865::mg_28::4::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny nitomboany no nanotany tamiko, ka dia hampodiko ho henatra kosa ny voninahiny.'
mg1865::mg_28::4::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitra noho ny ota izay aterin''ny oloko dia haniny ka satriny ihany ny ho diso ireny.'
mg1865::mg_28::4::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho sahala ihany ny hanjo ny olona sy ny mpisorona; Dia hovaliako izy noho ny lalany, ary ny ataony dia hatsingeriko aminy.'
mg1865::mg_28::4::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hihinana izy, nefa tsy ho voky, hijangajanga izy, nefa tsy hihabetsaka, satria Jehovah efa tsy nahoany intsony.'
mg1865::mg_28::4::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fijangajangana sy divay ary ranom-boaloboka no mahalasa ny saina.'
mg1865::mg_28::4::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny oloko dia mila saina amin''ny tapa-kazony, ary ny tehiny no manambara aminy; Fa ny fanahim-pijangajangana no nampania azy, ary lasan-ko janga izy ka tsy manaiky an''Andriamaniny.'
mg1865::mg_28::4::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-tampon''ny tendrombohitra no amonoany zavatra hatao fanatitra, ary eny amin''ny havoana no andoroany ditin-kazo manitra, dia eny ambanin''ny hazo oka sy ny popola ary ny terebinta, satria tsara alokaloka ireny; Koa izany no ijejojejoan''ny zanakavavinareo sy ijangajangan''ny vinantovavinareo.'
mg1865::mg_28::4::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hamaly ny zanakavavinareo Aho, raha mijejojejo izy, na ny vinantovavinareo, raha mijangajanga izy; Fa ny tenanareo* aza dia miavaka hankamin''ny mpijangajanga sady mamono zavatra hatao fanatitra miaraka amin''ireo vehivavy mpanolotena hijangajanga ho fanompoan-tsampy, ka dia ho lavo ny firenena tsy misaina. [*Hebreo: ireny]'
mg1865::mg_28::4::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mijangajanga aza ianao, ry Isiraely. Aoka ny Joda tsy mba hanota; Ary aza mankany Gilgala na miakatra any Betavena ianareo; Ary aza mianiana hoe: Raha velona koa Jehovah!'
mg1865::mg_28::4::16:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Isiraely dia maditra toy ny vantotr''ombivavy maditra; Ankehitriny dia handrasan''i Jehovah toy ny zanak''ondry eny amin''ny malalaka izy.'
mg1865::mg_28::4::17:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tafaraikitra amin''ny sampy Efraima; Aoka izy ho eo.'
mg1865::mg_28::4::18:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa lefy ny divainy; Mahery mijangajanga izy*; Fatra-pitia henatra ireo mpanapaka azy**. [*Na: Rehefa mitsahatra ny fibobohany, dia mahery mijangajanga izy] [**Hebreo: ampingany]'
mg1865::mg_28::4::19:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voapaoky ny elatry ny rivotra izy ka ho menatra noho ny zavatra novonoiny hatao fanatitra.'
mg1865::mg_28::5::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoinareo izao, ry mpisorona, ary mandrenesa, ry taranak''Isiraely; Ary atongilano ny sofinareo, ry mpianakavin''ny mpanjaka; Fa ianareo no hihiran''ny fitsarana, satria tonga fandrika ao Mizpa ianareo sy fandrika harato voavelatra ao Tabara.'
mg1865::mg_28::5::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpivadika dia fatra-pamono*; Fa Izaho kosa famaizana azy rehetra. [*Na: fatra-panao ratsy]'
mg1865::mg_28::5::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho mahalala an''i Efraima, ary Isiraely tsy takona amiko; Ankehitriny dia tonga mpijangajanga ianao, ry Efraima, voaloto Isiraely.'
mg1865::mg_28::5::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy avelan''ny ataony hiverina* amin''Andriamanitra izy; Fa ny fanahim-pijangajangana no ao anatiny, ary Jehovah tsy fantany. [*Na: tsy mety manao izay hiverenany]'
mg1865::mg_28::5::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avonavon''Isiraely dia vavolombelona manameloka azy; Ary Isiraely indrindra fa Efraima, ho lavon-keloka; Joda hiara-davo aminy koa.'
mg1865::mg_28::5::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitondra ny ombiny aman''ondriny izy ka handeha hitady an''i Jehovah. Nefa tsy hahita Azy; Jehovah efa niala taminy.'
mg1865::mg_28::5::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nivadika tamin''i Jehovah izy, fa niteraka zaza sary; Ankehitriny dia ho levon''ny voaloham-bolana izy mbamin''ny zara-lovany.'
mg1865::mg_28::5::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsofy ao Gibea ny anjomara ary ny trompetra ao Rama! Miantsoa mafy ao Betavena! Inay! misy manenjika anao, ry Benjamina!'
mg1865::mg_28::5::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho lao Efraima, raha mby amin''ny andro fanamelohana; Izay tsy maintsy ho to no nambarako tao amin''ny firenen''Isiraely.'
mg1865::mg_28::5::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanapaka ny Joda dia efa tonga toy izay mamindra faritany, ka dia ireo no hampidinako ny fahatezerako toy ny fampidina rano.'
mg1865::mg_28::5::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahorina Efraima sady voatorotoron''ny fitsarana, satria ninia nanaraka didin''olombelona izy,'
mg1865::mg_28::5::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''i Efraima dia tahaka ny kalalao Aho ary amin''ny taranak''i Joda dia toy ny fositra*. [*Na: momoka]'
mg1865::mg_28::5::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa hitan''i Efraima ny aretiny, ary Joda ny feriny, dia nantany amin''ny Asyriana Efraima, eny, naniraka ho any amin''i Jareba* mpanjaka izy; Nefa izy tsy mahasitrana anareo, na mampanaritra ny ferinareo. [*Jareba = Mpandahatra, na Mpiady]'
mg1865::mg_28::5::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''i Efraima dia tahaka ny liona Aho, ary amin''ny taranak''i Joda dia tahaka ny liona tanora: Izaho dia Izaho no mamiravira, dia lasa mandeha; Mahalasa Aho, ka tsy misy mahavonjy.'
mg1865::mg_28::5::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handeha hody any amin''ny fitoerako Aho ambara-piaikiny ny helony sy hitadiavany ny tavako. Rehefa azom-pahoriana izy, dia hitady Ahy fatratra.'
mg1865::mg_28::6::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha hiverina ho amin''i Jehovah isika; Fa Izy no namiravira, ary Izy ihany no hahasitrana antsika; Izy no namely, ary Izy no hamehy ny ferintsika.'
mg1865::mg_28::6::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka indroa andro, dia hovelominy indray isika; Ary amin''ny andro fahatelo, dia hatsangany ho velona eo anatrehany isika'
mg1865::mg_28::6::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka hahalala, eny, aoka hiezaka hahalala an''i Jehovah isika; Mahatoky toy ny maraina ny fiposahany, dia ho avy amintsika toy ny ranonorana mivatravatra Izy, sy toy ny fara orana izay mahavonto ny tany.'
mg1865::mg_28::6::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona re no ho azoko atao aminao, ry Efraima? Inona re no ho azoko atao aminao, ry Joda? Fa toy ny rahona maraina ny fitiavanareo sy tahaka ny ando izay levona, raha vao maraina ny andro.'
mg1865::mg_28::6::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny mpaminany no nentiko nikapa azy, ny tenin''ny vavako no nentiko namono azy; Ary ny fitsarana anao dia hiposaka toy ny mazava.'
mg1865::mg_28::6::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa famindram-po no sitrako, fa tsy fanatitra alatsa-drà, ary fahalalana an''Andriamanitra noho ny fanatitra dorana.'
mg1865::mg_28::6::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireny dia nivadika ny fanekena tahaka an''i Adama, tao no nivadihany nahafoizany Ahy.'
mg1865::mg_28::6::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Gileada dia tanànan''ny mpanao ratsy sady voaloton''ny rà.'
mg1865::mg_28::6::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy ny fanotriky ny jiolahy no fikamban''ny mpisorona: Mamono eny an-dalambe mankany Sekema izy, eny, efa nanao fahavetavetana koa izy.'
mg1865::mg_28::6::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tao amin''ny taranak''Isiraely no nahitako zavatra mahatsiravina: ao ny fijangajangan''i Efraima, voaloto Isiraely.'
mg1865::mg_28::6::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny aminao, ry Joda, dia voatendry koa ny andro hijinjana anao, rehefa ampodiko avy amin''ny fahababoana ny oloko.'
mg1865::mg_28::7::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ta-hanasitrana ny Isiraely Aho, dia miseho ny helok''i Efraima sy ny faharatsian''i Samaria, fa manao fitaka izy; Miditra ny mpangalatra, ary ny jiolahy manao andiany dia mandehandeha eny ivelany.'
mg1865::mg_28::7::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy heveriny ao am-po* fa tsarovako ny faharatsiany rehetra; Ankehitriny dia gejan''ny nataony izy, efa tonga eo anatrehako izany. [*Hebreo: ataony hoe]'
mg1865::mg_28::7::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny faharatsiany no ampifaliany ny mpanjaka, ary amin''ny laingany ny mpanapaka.'
mg1865::mg_28::7::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy mpaka vadin''olona avokoa izy rehetra ka toy ny fatana voafanan''ny mpanendy mofo, izay mitsahatra tsy misorona afo hatramin''ny ametafetany ny koba ka ambara-pitombony.'
mg1865::mg_28::7::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andron''ny mpanjakantsika dia nankarary tena tamin''ny fanafanan''ny herin''ny divay ny mpanapaka; Nifandray tanana tamin''ny mpaniratsira ny mpanjaka.'
mg1865::mg_28::7::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa entin''ireo ho ao am-panotrehana ny fony, toy ny ho ao amin''ny fatana; Mandritra ny alina dia matory ihany ny mpanendy azy, ary nony maraina dia toy ny lelafo mirehitra ny fatana.'
mg1865::mg_28::7::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy mahamay toy ny fatana izy rehetra ka mandevona ny andriambaventiny; Efa lavo avokoa, ny mpanjakany, tsy misy miantso Ahy izy rehetra.'
mg1865::mg_28::7::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efraima dia miharoharo amin''ireo firenena; Efraima dia efa tonga ampempa tsy voavadika.'
mg1865::mg_28::7::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lanin''ny vahiny ny heriny, nefa tsy fantany akory izany; Eny, efa mipi-bolo ihany izy, saingy tsy fantany.'
mg1865::mg_28::7::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avonavon*''Isiraely dia vavolombelona manameloka azy; Nefa, na dia izany rehetra izany aza, dia tsy miverina amin''i Jehovah Andriamaniny ihany izy, na mitady Azy. [*Na: ny reharehany]'
mg1865::mg_28::7::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Efraima dia efa tonga tahaka ny voromailala adaladala tsy manan-tsaina; Efa miantso an''i Egypta izy ary efa mankany Asyria.'
mg1865::mg_28::7::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha vao mandeha izy, dia hovelariko aminy ny fandrika haratoko, ka hampidiniko ao toy ny voro-manidina izy; Hofaizako izy araka izay efa nambara tamin''ny fiangonany.'
mg1865::mg_28::7::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ireny! satria nandositra Ahy izy, haringana izy! satria niodina tamiko; Izaho ta-hanavotra azy, fa izy kosa dia lainga no entiny milaza Ahy.'
mg1865::mg_28::7::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mitaraina amiko ao am-pony izy, fa midradradradra foana ao am-pandriany; Mitangorona hitady vary sy ranom-boaloboka izy, dia miodina miala amiko.'
mg1865::mg_28::7::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho no nampianatra sy nanatanjaka ny sandriny, nefa izy kosa dia misaintsain-dratsy Ahy,'
mg1865::mg_28::7::16:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverina ihany izy, nefa tsy ho amin''ny Avo; Tonga tahaka ny tsipïka manjiona izy; Ho lavon-tsabatra ny mpanapaka azy noho ny firehitry ny lelany; Izany no ho latsany any amin''ny tany Egypta.'
mg1865::mg_28::8::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny loza hanjo ny Isiraely noho ny nivadihany'
  verse_text: 'Ataovy eo am-bavanao* ny anjomara! Fa hisy toy ny voromahery hipaoka ny tranon''i Jehovah, satria efa nivadika ny fanekeko sy nandika ny lalàko ireo. [*Hebreo: lanilaninao]'
mg1865::mg_28::8::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia hitarainany hoe: Andriamanitro o, izahay Isiraely mahalala Anao.'
mg1865::mg_28::8::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataon''ny Isiraely ho zavatra maharikoriko ny soa; Ny fahavalo no hanenjika azy.'
mg1865::mg_28::8::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireny dia nanangana mpanjaka nefa tsy avy tamiko; Nifidy mpanapaka izy, nefa tsy fantatro; Ny volafotsiny sy ny volamenany no nataony sampiny mba hamongorana azy.'
mg1865::mg_28::8::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maharikoriko* ilay ombilahy kelinao, ry Samaria; Mirehitra aminareo** ny fahatezerako; Mandra-pahoviana no tsy ho tohanareo*** ny fahadiovana? [*Na: Ataony ho zava-maharikoriko] [**Hebreo: aminy] [***Hebreo: tohany]'
mg1865::mg_28::8::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa avy tamin''ny Isiraely koa izany; Ny mpiasa no nanao azy, ka dia tsy Andriamanitra izy, fa ho torotoro ilay ombilahy kelin''i Samaria.'
mg1865::mg_28::8::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rivotra no nafafiny, ary tadio no hojinjany; Tsy misy vary mitsangana, ny salohiny tsy hisy ventiny; Ary raha tàhiny hisy aza, dia ny olona hafa firenena no hihinana azy.'
mg1865::mg_28::8::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voatelina Isiraely; Ankehitriny dia efa tonga tahaka ny fanaka tsy mahafinaritra izy any amin''ny jentilisa.'
mg1865::mg_28::8::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niakatra ho any Asyria izy Toy ny borikidia mandeha irery; Efraima dia nanangy ireo lehilahiny* [*Hebreo: fitiavany]'
mg1865::mg_28::8::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia nanangy tany amin''ny jentilisa aza izy, dia hovoriko ankehitriny; Ary hihavitsy izy noho ny entan''ny mpanjakan''ireo mpanapaka.'
mg1865::mg_28::8::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Efraima nanao alitara maro hanotana, eny, efa nahazo alitara hanotana izy.'
mg1865::mg_28::8::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia soratako ho azy ny teny betsaka amin''ny lalàko aza, dia ataony ho toy ny zavatra tsy izy izany.'
mg1865::mg_28::8::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamono zavatra hatao fanatitra ho Ahy izy, eny, mihinana ny henan''izany, nefa tsy sitrak''i Jehovah izany; Ankehitriny dia hotsarovany ny fahotany, ary hovaliany ny helony; Eny, izy ireny dia hiverina ho any Egypta.'
mg1865::mg_28::8::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanadino ny Mpanao azy Isiraely ka nanorina trano vaventy, ary Joda nanamaro tanàna mimanda; Fa haterako afo ao an-tanànany, ka holevonin''izany ny trano vaventiny.'
mg1865::mg_28::9::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza dia fatra-pifaly loatra, toy ny firenena hafa, ry Isiraely; Fa ianao efa nijangajanga niala tamin''Andriamanitrao sady efa tia tangy teny am-pamoloana rehetra;'
mg1865::mg_28::9::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famoloana sy ny fanantazana tsy hahavelona azy, ary hahadiso fanantenana azy ny ranom-boaloboka.'
mg1865::mg_28::9::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy honina ao amin''ny tanin''i Jehovah izy; Fa Efraima hiverina ho any Egypta ary hihinana zava-padina any Asyria.'
mg1865::mg_28::9::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hanidina divay ho fanatitra ho an''i Jehovah izy, ary tsy hankasitrahany; Ny zavatra vonoiny hatao fanatitra dia ho toy ny fahan-kanina ho an''ny mpisaona aminy: Izay rehetra homana izany dia voaloto; Fa ny haniny dia ho an''ny tenany ihany, fa tsy ho tafiditra ao an-tranon''i Jehovah.'
mg1865::mg_28::9::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao ahoana kosa re ianareo, raha mby amin''ny fotoam-pivavahana sy amin''ny andro firavoravoana voatendrin''i Jehovah?'
mg1865::mg_28::9::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa he! lasa izy noho* ny fandringanana; Egypta no hanangona azy, Memfisa no handevina azy; Ny fana-bolafotsiny mahafinaritra dia ho lasan''ny amiana, tsilo no ho ao an-dainy. [*Na: miala amin'']'
mg1865::mg_28::9::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga ireo andro famaliana, tonga ireo andro fanodiavana Ho fantatr''Isiraely fa adala ny mpaminany, ary very saina ny olona tsindriam-panahy noho ny hamaroan''ny helokao sy ny habetsahan''ny fanoherana.'
mg1865::mg_28::9::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efraima dia mizaha, nefa tsy avy amin''Andriamanitro*; Ny mpaminany dia fandriky ny mpamandri-borona eny amin''ny alehany rehetra sy fanoherana ao an-tranon''Andriamaniny. [*Na: Efraima dia tily tao amin''Andriamanitro]'
mg1865::mg_28::9::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fatra-panao ratsy toy ny tamin''ny andro tany Gibea izy; Ka dia hotsarovana ny helony, ary hovaliana ny fahotany.'
mg1865::mg_28::9::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fahitana voaloboka any an''efitra no nahitako ny Isiraely, toy ny fahitana aviavy mialin-taona no nahitako ny razanareo; Nefa ireny dia tonga tany Bala-peora ka nanolo-tena ho amin''ilay mampahamenatra, ka dia tonga fahavetavetana tahaka an''ilay tiany ihany izy.'
mg1865::mg_28::9::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''i Efraima, hihelina toy ny voro-manidina ny voninahiny, ka tsy hisy hiteraka, na hanan''anaka, na ho torontoronina.'
mg1865::mg_28::9::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia misy mitaiza zanaka aza izy, dia hofoanako ihany ireny, ka tsy hisy miangana; Eny, hahita loza koa izy amin''ny handaozako azy!'
mg1865::mg_28::9::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efraima, raha araka ny hitako, dia voavoly ao amin''ny tany mahafinaritra tahaka an''i Tyro*, nefa tsy maintsy mamoaka ny zanany ho amin''ny mpamono izy. [*Na: araka ny nahitako azy hatrany Tyro, dia voavoly, etc]'
mg1865::mg_28::9::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, omeo azy — inona no homenao azy? Omeo azy ny kibo tsy mahazo zaza* sy ny nono ritra. [*Na: momba]'
mg1865::mg_28::9::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao Gilgala ny fahotany rehetra, eny, tao no vao nankahalako azy; Noho ny faharatsian''ny ataony dia horoahiko hiala ao an-tranoko izy; Tsy ho tia azy intsony Aho, mpiodina avokoa ny mpanapaka azy.'
mg1865::mg_28::9::16:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaratra Efraima, maina ny fakany, ka tsy hamoa izy; Eny, na dia miteraka aza izy, dia hovonoiko ny zanany mahafinaritra azy.'
mg1865::mg_28::9::17:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Harian''Andriamanitro izy, satria tsy nihaino Azy; Ka dia ho tonga mpirenireny any amin''ny jentilisa izy.'
mg1865::mg_28::10::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaloboka misandrahaka Isiraely, mamoa ho azy izy; Araka ny habetsahan''ny voany no nanaovany alitara betsaka, araka ny hatsaran''ny taniny no nanaovany tsangam-baton-tsampy tsara tarehy.'
mg1865::mg_28::10::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamitaka* ny fony, koa dia hovaliana izy izao noho ny helony; Jehovah no hanimba ny alitarany sy handrava ny tsangam-baton-tsampiny [*Hebreo: Malambolambo]'
mg1865::mg_28::10::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany dia hiteny izy hoe: Tsy mana-mpanjaka isika; Fa tsy natahorantsika Jehovah, koa hahavita inona ho antsika moa izay mpanjaka?'
mg1865::mg_28::10::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niteniteny foana izy tamin''ny nianianany tsy to sy ny nanaovany fanekena; Ka nitrebona toy ny zava-mangidy eny am-bavasa eny an-tsaha ny rariny.'
mg1865::mg_28::10::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mponina any Samaria matahotra noho ny amin''ny ombivavy kely ao Betavena; Fa ny olony mitomany azy,'
mg1865::mg_28::10::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ary ny mpisorony mangovitra noho ny aminy, dia noho ny amin''ny voninahiny, fa lasan-ko babo izany'
  verse_text: 'Iny koa ho entina any Asyria ho fanomezana ho an''i Jareba mpanjaka; Ho afa-baraka Efraima, eny, hangaihay Isiraely noho ny saina nataony.'
mg1865::mg_28::10::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho rava Samaria, ny mpanjakany dia ho tonga toy ny sombin-javatra eny ambonin''ny rano.'
mg1865::mg_28::10::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho rava koa ny fitoerana avo ho Avena, izay anotan''Isiraely; Ho rakotry ny tsilo sy ny ahitra ratsy ny alitarany; Ary izy hanao amin''ny tendrombohitra hoe: sarony izahay, ary amin''ny havoana hoe: Mianjerà aminay.'
mg1865::mg_28::10::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny andro fony tany Gibea no efa nanotanao, ry Isiraely; Nikikitra tany izy; Tsy nahatratra azy tany Gibea ny ady namelezana ny zanaky ny faharatsiana.'
mg1865::mg_28::10::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny sitrako no hamaizako azy; Ary hovorina hamely azy ny firenena, amin''ny hamatorana azy noho ny helony roa loha.'
mg1865::mg_28::10::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Efraima dia tahaka ny ombivavy kely efa voafolaka ka faly hively vary; Ary hasiako zioga* ny vozony tsara tarehy; Hampandehaniko Efraima; Joda hiasa tany, ary Jakoba handravona. [*Hebreo: hihoarako]'
mg1865::mg_28::10::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamafaza ho anareo araka ny fahamarinana, mijinjà araka ny fitiavana, hevoy ny tombam-borakareo*; Fa izao no andro hitadiavana an''i Jehovah ambara-pihaviny sy handatsahany fahamarinana aminareo**. [*Na: Miasà tany vaovao ho anareo] [**Na: hampianarany anareo ny fahamarinana]'
mg1865::mg_28::10::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niasa faharatsiana ianareo, ka fahadisoana no nojinjanareo; Nihinana ny vokatry ny lainga ianareo fa nitoky tamin''ny alehanareo sy ny habetsahan''ny lehilahy maherinareo* ianareo. [*Hebreo: alehanareo, maherinao, ianao, olonao, tanànanao]'
mg1865::mg_28::10::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hisy tabataba hamelezana ny olonareo*, ka horavana ny tanànareo* mimanda rehetra, toy ny nandravan''i Salamana an''i Bet-arbela tamin''ny andro niadiana, ka torotoro avokoa ny reniny mbamin''ny zanany. [*Hebreo: alehanareo, maherinao, ianao, olonao, tanànanao]'
mg1865::mg_28::10::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no hataon''i Betela* aminareo, noho ny haben''ny faharatsianareo; Raha maraina ny andro, dia ho levona mihitsy ny mpanjakan''ny Isiraely. [*Na: Toy izany no hatao aminareo, ry Betela]'
mg1865::mg_28::11::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hamindran''i Jehovah fo amin''ny Isiraely, na dia be aza ny helony'
  verse_text: 'Fony mbola zaza Isiraely, dia tiako izy, ary nantsoiko hiala tany Egypta ny zanako.'
mg1865::mg_28::11::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony nisy niantso azy, dia vao mainka nandositra ireny izy; Ho an''ireo Bala kosa no amonoany zavatra hatao fanatitra, ary ho an''ny sarin-javatra voasokitra no andoroany ditin-kazo manitra.'
mg1865::mg_28::11::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho no nampianatra an''i Efraima handeha. Eny, notrotroiko tamin''ny sandriko* aza izy. Nefa tsy fantany fa Izaho no nahasitrana azy. [*Hebreo: notrotroiny tamin''ny sandriny]'
mg1865::mg_28::11::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny kofehy fitarihana olona no nitarihako azy, dia tamin''ny mahazakan''ny fitiavana; Ary efa toy izay manainga ny fehim-bava* eo ambonin''ny valanoranony Aho ka nanolo-kanina azy tsimoramora. [*Hebreo: zioga]'
mg1865::mg_28::11::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hiverina ho any amin''ny tany Egypta izy, fa Asyria no ho mpanjakany, satria tsy nety nibebaka izy.'
mg1865::mg_28::11::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho ny fisainany dia hisy sabatra hantsodina ao an-tanànany ka handrava sy handevona ny hidiny.'
mg1865::mg_28::11::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Minia miodina amiko ny oloko; Ary na dia antsoiny ho amin''ny Avo aza izy, samy tsy mety miainga akory.'
mg1865::mg_28::11::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataoko ahoana e no fahafoy anao, ry Efraima, na ho fanolotra anao, ry Isiraely! Hataoko ahoana e no fanao anao ho tahaka an''i Adma! Hataoko ahoana e no fametraka anao ho tahaka an''i Zeboima! Onena ny foko, mafy loatra ny alaheloko.'
mg1865::mg_28::11::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hanontolo fo Aho, na handringana an''i Efraima intsony; Fa Andriamanitra Aho, fa tsy olona, dia ny Iray Masina ao aminao, ka dia tsy ho avy amim-pahatezerana mirehitra* Aho. [*Na: tsy hiditra ao an-tanàna Aho]'
mg1865::mg_28::11::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Harahin''ireny Jehovah, hierona toy ny liona Izy; Eny, Izy no hierona, dia hanatona amin-kovitra avy any andrefana ny zanaka.'
mg1865::mg_28::11::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanatona amin-kovitra avy any Egypta toy ny voronkely izy, ary avy any amin''ny tany Asyria toy ny voromailala; Ka dia hampitoeriko ao an-tranony izy, hoy Jehovah.'
mg1865::mg_28::12::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny Isiraely noho ny helony'
  verse_text: 'Efraima manodidina Ahy amin''ny lainga, ary ny taranak''Isiraely amin''ny fitaka; Ary Joda mbola mikarenjy tsy manatona an''Andriamanitra, dia ny Iray Masina sy Mahatoky.'
mg1865::mg_28::12::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efraima homan-drivotra sady manenjika ny rivotra avy any atsinanana, mandritra ny andro dia ataony betsaka ny lainga sy ny fandozana; Manao fanekena amin''ny Asyriana izy, ary diloilo no entina ho any Egypta.'
mg1865::mg_28::12::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manana ady amin''i Joda koa Jehovah ary tsy maintsy mamaly an''i Jakoba araka ny alehany, ka hatsingeriny aminy ny nataony.'
mg1865::mg_28::12::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola tany am-bohoka dia nihazona ny ombelahin-tongotry ny rahalahiny izy, ary rehefa lehibe izy, dia nitolona tamin''Andriamanitra;'
mg1865::mg_28::12::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nitolona tamin''Ilay Anjely izy ka nahery; Nitomany izy sady nifona taminy; Nahita azy tao Betela Izy, ary tao no niresahany tamintsika;'
mg1865::mg_28::12::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Andriamanitry ny maro, Jehovah no hahatsiarovana Azy.'
mg1865::mg_28::12::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miverena amin''Andriamanitrao ianao; Tandremo ny famindram-po sy ny rariny. Ary miandrasa an''Andriamanitrao mandrakariva.'
mg1865::mg_28::12::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanana* eny an-tanany misy mizana miangatra, ny manambaka no tiany. [*Na: Mpandranto izy]'
mg1865::mg_28::12::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Efraima: Fiharian-karena ihany no efa nataoko, nahazo fananana aho; Ny asako rehetra tsy misy hahatonga fahotana na heloka amiko.'
mg1865::mg_28::12::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izaho no Jehovah Andriamanitrao hatrany amin''ny tany Egypta; Ary mbola hampiditra anao an-day indray Aho tahaka ny tamin''ny fotoam-pivavahana.'
mg1865::mg_28::12::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa niteny tamin''ny mpaminany koa Aho, sady Izaho no nahabetsaka ny fahitana, ary ny mpaminany dia nampilazaiko ohatra.'
mg1865::mg_28::12::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tena heloka Gileada, dia ho tonga zava-poana tokoa izy; Tany Gilgala no namonoany omby betsaka ho fanatitra, koa ny alitarany dia ho toy ny korontam-bato eny am-bavasa any an-tsaha.'
mg1865::mg_28::12::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jakoba nandositra ho any amin''ny tany Syria, Isiraely nanompo hahazoany vady, eny, ny hahazoany vady no niandrasany ondry aman''osy.'
mg1865::mg_28::12::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpaminany no nentin''i Jehovah nitondra ny Isiraely nivoaka avy tany Egypta, ary mpaminany koa no nentina niahy azy'
mg1865::mg_28::12::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao izay nahatezitra indrindra Efraima, ka dia havelan''ny Tompony ho eo aminy ny ràny, ary hatsingeriny aminy ny vava ratsy nataony.'
mg1865::mg_28::13::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny loza nanjo ny Isiraely noho ny fahotany'
  verse_text: 'Raha niteny Efraima, dia nampangorohoro, ka nisandratra tao amin''ny Isiraely izy. Dia nanota ny amin''i Bala izy ka maty;'
mg1865::mg_28::13::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny dia mandroso manota izy, fa ny volafotsiny no anaovany sarin-javatra an-idina ho azy, dia sampy araka ny fahaizany, izay asan''ny mpiasa avokoa; Ireny dia lazainy hoe: Aoka hanoroka ny ombilahy kely izay olona mamono zavatra hatao fanatitra.'
mg1865::mg_28::13::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ho toy ny rahona maraina izy sy ho toy ny ando izay levona, raha mbola maraina ny andro, sy ho toy ny akofa izay paohin''ny rivotra hiala amin''ny fa noloana, ary ho toy ny setroka avy amin''ny varavarana makarakara.'
mg1865::mg_28::13::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izaho no Jehovah Andriamanitrao hatrany amin''ny tany Egypta, ary tsy mahalala Andriamanitra afa-tsy Izaho ianao, sady tsy misy mpamonjy afa-tsy Izaho.'
mg1865::mg_28::13::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia nahalala anao tany an''efitra, dia tany amin''ny tany mampangetaheta.'
mg1865::mg_28::13::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny ahitra teny aminy no nahavoky azy; Eny, voky izy, ka niavonavona ny fony; Koa izany no nanadinoany Ahy.'
mg1865::mg_28::13::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tonga toy ny liona aminy Aho, toy ny leoparda amoron-dalana no famitsako.'
mg1865::mg_28::13::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamely azy toy ny famelin''ny bera very anaka Aho, ka mandriatra ny sarom-pony, eny, any no andrapahako azy toy ny fandrapaky sy liom-bavy; Ny bibi-dia no hamiravira azy.'
mg1865::mg_28::13::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no maharingana anao, ry Isiraely o; Manohitra Ahy Izay famonjena anao ianao.'
mg1865::mg_28::13::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ary izay mpanjakanao, Mba hamonjy anao ao an-tanànanao rehetra? Ary aiza ireo andriambaventinao, izay nantsoinao hoe: Omeo mpanjaka sy mpanapaka aho?'
mg1865::mg_28::13::11:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nomeko mpanjaka ianao tamin''ny fahatezerako, ary nesoriko izy tamin''ny fahavinirako.'
mg1865::mg_28::13::12:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voafehy ny helok''i Efraima, voatahiry ny fahotany.'
mg1865::mg_28::13::13:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy; Zazalahy tsy hendry izy, fa raha tonga ny fotoana, dia tsy mba mandroso ho eo amin''ny fiterahan-jaza izy.'
mg1865::mg_28::13::14:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Havotako tsy ho azon''ny herin''ny fiainan-tsy hita* izy; Hovonjeko ho afaka amin''ny fahafatesana Izy; Ry fahafatesana o, aiza ny aretina fandripahanao? Ry fiainan-tsy hita o, aiza ny fandringananao? Afenina tsy ho hitan''ny masoko ny nenina. [*Hebreo: Sheola]'
mg1865::mg_28::13::15:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Efraima dia hahavokatra eo amin''ny rahalahy; Nefa ho avy ny rivotra avy any atsinanana, dia ny rivotr''i Jehovah miakatra avy any an''efitra, ka dia ho ritra ny loharanony, ary ho tankina ny fantsakany; Hobaboina ny rakitra, dia ny fanaka tsara rehetra.'
mg1865::mg_28::14::1:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hovaliana Samaria noho ny helony, Fa niodina tamin''Andriamaniny izy; Ho lavon-tsabatra izy, ny zanany madinika hotorotoroina, ary izay bevohoka eo aminy hotatahana.'
mg1865::mg_28::14::2:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny hamindran''i Jehovah fo amin''ny Isiraely, rehefa mibebaka'
  verse_text: 'Ry Isiraely o, miverena amin''i Jehovah Andriamanitrao, fa lavon-keloka ianao.'
mg1865::mg_28::14::3:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitondrà teny ianareo, eny, miverena amin''i Jehovah, ka manaova aminy hoe: Mamelà ny heloka rehetra, ary raiso izay tsara, ka dia haterinay* ho fanatitra** ny molotray. [*Hebreo: haloanay] [**Hebreo: vantotr''ombilahy]'
mg1865::mg_28::14::4:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asyria tsy hamonjy anay, tsy hitaingin-tsoavaly izahay sady tsy hiteny amin''ny asan''ny tananay intsony hoe: Ry Andriamanitray o; Fa ao aminao no ahitan''ny kamboty famindram-po.'
mg1865::mg_28::14::5:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hositraniko ny fiodinany, ho tia azy tsy vozonana Aho; Fa efa niala taminy ny fahatezerako.'
mg1865::mg_28::14::6:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tahaka ny ando Aho amin''ny Isiraely; Hamony tahaka ny lilia izy, ary hamaka tahaka an''i Libanona.'
mg1865::mg_28::14::7:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisandrahaka ny rantsany, ho tahaka ny an''ny hazo oliva ny hatsaran-tarehiny, ary ho tahaka ny an''i Libanona ny hanitra avy aminy.'
mg1865::mg_28::14::8:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mipetraka ao ambanin''ny alokalony dia hampahavokatra vary indray*, ary haniry tahaka ny voaloboka izy; Ny lazany ho tahaka ny an''ny divay avy any Libanona. [*Na: ho velombelominao indray toy ny vary izy]'
mg1865::mg_28::14::9:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Efraima o, hataoko* inona intsony izay sampy? Izaho dia efa nihaino ka nitsinjo anao**; Tahaka ny hazo kypreso maitso Aho, avy amiko no hahazoana ny vokatrao. [*Na: Efraima hanao hoe: Hataoko] [**Hebreo: azy]'
mg1865::mg_28::14::10:
  verse_version: mg1865
  verse_book: mg_28
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hendry mba hahafantatra izany zavatra izany? Na manan-tsaina mba hahalala izany? Fa mahitsy ny lalan''i Jehovah, ary ny marina no mizotra eny aminy; Fa ny mpanota kosa dia tafintohina eny aminy.'
