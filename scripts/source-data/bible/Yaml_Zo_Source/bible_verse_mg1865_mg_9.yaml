mg1865::mg_9::1::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahaterahan''i Samoela, sy ny nanolorana azy ho an''i Jehovah'
  verse_text: 'Ary nisy lehilahy Efraimita anankiray tany Ramataima-zofima any amin''ny tany havoan''i Efraima, Elkana no anarany zanak''i Jerohama, zanak''i Eliho, zanak''i Toho, zanak''i Zofa.'
mg1865::mg_9::1::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: '2022-04-01T02:36:10+0000'
  verse_title: null
  verse_text: 'Ary nampirafy izy, Hana no anaran''ny vadiny anankiray, ary Penina no anaran''ny anankiray; ary Penina nanan-janaka, fa Hana kosa tsy mba nanana.'
mg1865::mg_9::1::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ralehilahy niakatra isan-taona niala tamin''ny tanànany hivavaka sy hamono zavatra hatao fanatitra ho an''i Jehovah, Tompon''ny maro, tao Silo. Ary tao izy mirahalahy, zanak''i Ely, dia Hofinia sy Finehasa, mpisoron''i Jehovah.'
mg1865::mg_9::1::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro namonoan''i Elkana zavatra hatao fanatitra dia samy nomeny anjara iray avy Penina vadiny sy ny zananilahy ary ny zananivavy rehetra.'
mg1865::mg_9::1::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Hana kosa nomeny anjaran-droa, satria izy no tiany, nefa nataon''i Jehovah momba.'
mg1865::mg_9::1::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rafiny dia nanorisory azy mba hampalahelo azy mafy noho ny nanaovan''i Jehovah azy momba.'
mg1865::mg_9::1::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no fanaon''i Elkana isan-taona, raha niakatra ho any an-tranon''i Jehovah Hana, ary izany koa no nanorisoren''ny rafiny azy, koa nitomany izy sady tsy nety nihinan-kanina.'
mg1865::mg_9::1::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Elkana vadiny nanao taminy hoe: Ry Hana, nahoana no mitomany ianao? ary nahoana no tsy mety mihinan-kanina ianao? ary nahoana no malahelo fo ianao? Tsy tsara lavitra aminao mihoatra noho ny zanaka folo mirahalahy va aho?'
mg1865::mg_9::1::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nihinana sy nisotro tao Silo izy, dia nitsangana Hana. Ary Ely mpisorona nipetraka tamin''ny sezany teo anilan''ny tolam-baravaran''ny tempolin''i Jehovah.'
mg1865::mg_9::1::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hana dia nalahelo fanahy indrindra, ka nivavaka tamin''i Jehovah izy sady nitomany dia nitomany.'
mg1865::mg_9::1::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoady izy ka nanao hoe: Jehovah, Tompon''ny maro, raha mba hitsinjo tokoa ny alahelon''ny ankizivavinao Ianao ka hahatsiaro ahy ary tsy hanadino ny ankizivavinao, fa hanome ahy zazalahy, dia homeko ho an''i Jehovah kosa izy amin''ny andro rehetra hiainany, ka tsy hokasihin-kareza ny lohany.'
mg1865::mg_9::1::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola naharitra nivavaka teo anatrehan''i Jehovah izy, dia nodinihin''i Ely ny vavany.'
mg1865::mg_9::1::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niteny anakampo Hana, ka ny molony ihany no nihetsiketsika, fa ny feony tsy re akory; ka dia nataon''i Ely fa mamo izy.'
mg1865::mg_9::1::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Ely taminy: Mandrapahoviana no ho mamo ianao? Esory aminao ny divainao.'
mg1865::mg_9::1::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Hana ka nanao hoe: Tsia, tompoko; vehivavy malahelo fanahy aho, fa tsy nisotro divay na toaka tsy akory, fa mamoaka ny ato am-poko eto anatrehan''i Jehovah aho.'
mg1865::mg_9::1::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mba atao ho vehivavy tena ratsy fanahy ny ankizivavinao; fa ny haben''ny fahoriako sy ny alaheloko no nitenenako mandraka ankehitriny.'
mg1865::mg_9::1::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Ely ka nanao hoe: Mandehana soa aman-tsara; ary homen''Andriamanitry ny Isiraely anao anie izay nangatahinao taminy.'
mg1865::mg_9::1::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Aoka hahita fitia eo imasonao ny ankizivavinao. Dia lasa nandeha ravehivavy, ary nihinana izy ka tsy nalahelo tarehy intsony.'
mg1865::mg_9::1::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifoha maraina koa izy ireo ka nivavaka teo anatrehan''i Jehovah, dia lasa nody ka tonga tao an-tranony tany Rama; ary Elkana nahalala an''i Hana vadiny, ary Jehovah nahatsiaro azy.'
mg1865::mg_9::1::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fahatanterahan''ny andro dia nanan''anaka Hana ka nitera-dahy, ary ny anarany nataony hoe Samoela*, fa hoy izy: Tamin''i Jehovah no nangatahako azy. [*Samoela = Nohenoin''Andriamanitra (?)]'
mg1865::mg_9::1::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ralehilahy Elkana sy ny ankohonany rehetra niakatra hamono zavatra mba hanaterany ny fanatitra fanao isan-taona ho an''i Jehovah sy ny fanalam-boadiny.'
mg1865::mg_9::1::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Hana kosa tsy mba niakatra; fa hoy izy tamin''ny vadiny: Aoka aloha mandra-panoty ny zaza, fa amin''izay aho vao hitondra azy hiseho eo anatrehan''i Jehovah, ka hitoetra ao mandrakizay izy.'
mg1865::mg_9::1::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Elkana vadiny taminy: Ataovy ary izay tianao; mitoera ihany mandra-panotinao azy; ary hefain''i Jehovah anie ny teniny. Dia nitoetra ravehivavy ka nampinono ny zanany mandra-panotiny azy.'
mg1865::mg_9::1::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa maoty ny zaza, vao nentiny niakatra niaraka taminy izy mbamin''ny vantotr''ombilahy telo* sy koba iray efaha ary divay iray tavoara**, ka nentiny ho ao an-tranon''i Jehovah tao Silo izy; ary mbola kely ny zaza. [*Na: (izay efa telo taona)] [**Na: siny hoditra]'
mg1865::mg_9::1::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novonoiny ny vantotr''ombilahy iray, ary nentiny ho ao amin''i Ely ny zaza.'
mg1865::mg_9::1::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Hana: Tompoko o, raha velona koa ny ainao, tompoko, izaho ilay vehivavy nitsangana teto anilanao ka nivavaka tamin''i Jehovah.'
mg1865::mg_9::1::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hahazoako ity zazalahy ity no nivavahako; dia nomen''i Jehovah ahy izay nangatahiko taminy.'
mg1865::mg_9::1::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa atolotro ho an''i Jehovah kosa izy: eny, amin''ny andro rehetra hiainany dia voatolotra ho an''i Jehovah izy. Dia nivavaka tamin''i Jehovah izy.'
mg1865::mg_9::2::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana nataon''i Hana'
  verse_text: 'Ary Hana nivavaka ka nanao hoe: Ny foko ravoravo amin''i Jehovah, Ny tandroko voasandratra amin''i Jehovah; ny vavako misokatra hamaly ny fahavaloko; fa mifaly amin''ny famonjenao aho.'
mg1865::mg_9::2::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy masina tahaka an''i Jehovah, fa tsy misy afa-tsy Ianao; ary tsy misy vatolampy tahaka an''Andriamanitsika .'
mg1865::mg_9::2::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza dia mahery miteny avonavona; ary aoka tsy haloaky ny vavanareo ny fireharehana. Fa Jehovah no Andriamanitry ny fahalalana, ary Izy no mandanja ny asa.'
mg1865::mg_9::2::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tapaka ny tsipïkan''ny olo-mahery, ary izay mila ho reraka dia sikinana hery.'
mg1865::mg_9::2::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikarama mofo ny voky, ary mianina kosa ny noana; ny momba miteraka fito, ary mihamalemy kosa ny maro anaka.'
mg1865::mg_9::2::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no mahafaty sy mahavelona; izy no mampidina ho any amin''ny fiainan-tsy hita* ary mampitsangana. [*Hebreo: Sheola]'
mg1865::mg_9::2::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no mampalahelo sy mampanan-karena; izy no mampietry sy mampisandratra.'
mg1865::mg_9::2::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no manangana ny malahelo ho afaka amin''ny vovoka, ary manandratra ny mahantra hiala eo amin''ny zezika, mba hampiara-mitoetra azy eo amin''ny mpanapaka ka hampandova azy ny sezam-boninahitra; fa an''i Jehovah ny andrin''ny tany, ary izany no ametrahany izao tontolo izao.'
mg1865::mg_9::2::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongotry ny olo-masiny dia tandremany, fa ny ratsy fanahy kosa hampangininy* any amin''ny maizina; fa tsy amin''ny hery no handresen''ny olona. [*Na: hangina]'
mg1865::mg_9::2::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho torotoro izay miady amin''i Jehovah; any an-danitra Izy no hampikotrokorana hamely azy. Jehovah hitsara ny vazan-tany, ary Izy hanome hery ny mpanjakany sy hanandratra ny tandroky ny voahosony.'
mg1865::mg_9::2::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny nanompoan''i Samoela teo anatrehan''i Ely, ary ny ratsy nataon''ny zanakalahin''i Ely, sy ny nampilazan''Andriamanitra ny loza hanjo azy'
  verse_text: 'Ary Elkana nankany an-tranony tany Rama; fa ny zaza kosa nanao fanompoam-pivavahana tamin''i Jehovah teo anatrehan''i Ely mpisorona.'
mg1865::mg_9::2::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakalahin''i Ely dia tena ratsy fanahy, tsy nahalala an''i Jehovah.'
mg1865::mg_9::2::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no fanaon''ny mpisorona tamin''ny olona: Raha* nisy olona namono zavatra hatao fanatitra, dia avy ny zatovon''ny mpisorona nitondra fitrebika telo rantsana teny an-tanany, raha mbola nahandroina ny hena, [*Na: tsy nahalala an''i Jehovah, na ny tokony ho anjaran''ny mpisorona avy amin''ny olona. Koa raha]'
mg1865::mg_9::2::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia natsindrony tao anatin''ny fanendasana ny fitrebika, na tao anatin''ny fahandroan-kena, na ny vilany, na ny vilanibe, ka izay rehetra azon''ny fitrebika tao dia nalain''ny mpisorona ho azy. Ary izany no fanaony tao Silo tamin''ny Isiraely rehetra izay tonga tao.'
mg1865::mg_9::2::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mbola nodorany ho fofona ny sabora, dia avy ny zatovon''ny mpisorona ka nanao tamin''izay lehilahy namono zavatra hatao fanatitra hoe: Omeo hena hatsatsika ho an''ny mpisorona; fa tsy haka hena masaka aminao izy, fa ny manta ihany.'
mg1865::mg_9::2::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nisy olona nanao taminy hoe: Hodorana aloha ny sabora, dia amin''izay vao halainao izay sitraky ny fonao, dia novaliany hoe: Tsia; fa omeo ankehitriny izao ihany; fa raha tsy izany, dia halaiko an-keriny.'
mg1865::mg_9::2::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia lehibe indrindra ny helok''ireo zatovo ireo teo anatrehan''i Jehovah, satria halan''ny olona ny fanatitra ho an''i Jehovah.'
mg1865::mg_9::2::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Samoela nanao fanompoam-pivavahana teo anatrehan''i Jehovah raha mbola zaza, ary nisalotra efoda rongony fotsy izy.'
mg1865::mg_9::2::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanaovan-dreniny akanjo kely izy, ka nentiny ho azy isan-taona isan-taona izany, raha niara-ran''ny mpisorona avy amin''ny olona. Koa raha niakatra tamin''ny vadiny hanatitra ny fanatitra fanao isan-taona izy.'
mg1865::mg_9::2::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ely nitso-drano an''i Elkana mivady ka nanao hoe: Homen''i Jehovah zaza amin''ity vehivavy ity anie ianao ho solon''ilay voatolotra ho an''i Jehovah. Dia lasa nody izy mivady.'
mg1865::mg_9::2::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namangy an''i Hana, ka dia nanan''anaka koa izy ary niteraka lahy telo sy vavy roa. Ary Samoela zaza nitombo teo anatrehan''i Jehovah.'
mg1865::mg_9::2::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa antitra indrindra Ely, ary izy nandre izay rehetra nataon''ny zananilahy tamin''ny Isiraely rehetra sy ny nandriany tamin''ireo vehivavy izay nanompo teo amin''ny varavaran''ny trano-lay fihaonana.'
mg1865::mg_9::2::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy taminy: Nahoana ianareo no manao izany zavatra izany? fa reko amin''izao olona rehetra izao ny ratsy ataonareo.'
mg1865::mg_9::2::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia anaka, fa tsy tsara ny teny reko; fa mampanota ny olon''i Jehovah ianareo.'
mg1865::mg_9::2::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona manota amin''olona, dia ny mpitsara* no hitsara azy; fa raha misy manota amin''i Jehovah kosa, iza no hifona ho azy? Nefa tsy nihaino ny tenin-drainy izy ireo, satria sitrak''i Jehovah ny hahafaty azy. [*Hebreo: Andriamanitra]'
mg1865::mg_9::2::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela zaza nitombo, sady tian''i Jehovah sy ny olona koa izy.'
mg1865::mg_9::2::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahin''Andriamanitra nankany amin''i Ely ka nanao taminy hoe: Izao no lazain''i Jehovah: Tsy efa niseho tokoa tamin''ny ankohonan-drainao va Aho, raha mbola tany Egypta tao an-tranon''i Farao izy?'
mg1865::mg_9::2::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nofidiko tamin''ny firenen''Isiraely rehetra ho mpisoroko izy mba hanatitra fanatitra eo ambonin''ny alitarako sy handoro ditin-kazo manitra ary hisalotra efoda eo anatrehako, ary nomeko ho an''ny tarana-drainao ny fanatitra rehetra ataon''ny Zanak''Isiraely amin''ny afo.'
mg1865::mg_9::2::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no hitsahinareo ny fanatitra alatsa-drà sy ny fanatitra hohanina izay aterina ho Ahy, dia ilay nasaiko hatao ao amin''ny fonenako, ka ny zanakao no omenao voninahitra mihoatra noho Izaho, mba hanatavy anareo amin''izay tsara indrindra amin''ny fanatitra rehetra aterin''ny Isiraely oloko?'
mg1865::mg_9::2::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no anaovan''i Jehovah, Andriamanitry ny Isiraely, hoe: Efa voalazako tokoa fa ny taranakao sy ny tarana-drainao no handeha eo anatrehako mandrakizay; fa ankehitriny kosa, hoy Jehovah, sanatria Ahy izany; fa izay manome voninahitra Ahy no homeko voninahitra, ary izay manamavo Ahy no ho afa-baraka.'
mg1865::mg_9::2::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avy ny andro izay hanapahako ny sandrinao sy ny sandrin''ny tarana-drainao, ka tsy hisy lehilahy ho tratrantitra amin''ny taranakao.'
mg1865::mg_9::2::32:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hahita ny manjo* ny fonenako ianao na inona na inona soa omena ho an''ny Isiraely, ka tsy hisy lehilahy ho tratrantitra amin''ny taranakao mandrakizay. [*Na: fahavalo eo amin'']'
mg1865::mg_9::2::33:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy dia hofongorako avokoa tsy ho eo anilan''ny alitarako izy, mba hahapahina ny masonao sy hampalahelo ny fonao*; ary ny taranakao rehetra dia ho faty raha vao herotrerony. [*Na: Ary ny lehilahy amin''ny taranakao izay tsy hofongorako tsy ho eo anilan''ny alitarako dia hahapahina ny masonao sy hampalahelo ny fonao]'
mg1865::mg_9::2::34:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho famantarana ho anao, izay hanjo ny zanakao roa lahy, dia Hofinia sy Finehasa: ho indray andro maty izy mirahalahy.'
mg1865::mg_9::2::35:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho hanangana mpisorona mahatoky ho Ahy, izay hanao araka ny ato am-poko sy ato an-tsaiko; ary Izaho hampaharitra ny taranany, ka handeha eo anatrehan''ny voahosotro mandrakizay izy.'
mg1865::mg_9::2::36:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho avy izay sisa rehetra amin''ny taranakao ka hiankohoka eo anatrehany hangataka vola kely sy mofo iray ka hanao hoe: Masïna ianao, mba tendreo ho isan''ny mpisorona aho, mba hahazoako sombi-mofo hohanina.'
mg1865::mg_9::3::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niantsoana an''i Samoela ho mpaminanin''i Jehovah'
  verse_text: 'Ary Samoela zaza nanao fanompoam-pivavahana tamin''i Jehovah teo anatrehan''i Ely. Ary tamin''izany andro izany efa nahàlana ny tenin''i Jehovah: tsy nisy fahitana niseho loatra.'
mg1865::mg_9::3::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany andro izany, raha nandry tao amin''ny fandriany Ely (efa pahina ny masony, ka tsy nahita izy),'
mg1865::mg_9::3::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady tsy mbola maty ny jiron''Andriamanitra, ary Samoela efa nandry tao amin''ny tempolin''i Jehovah, izay nisy ny fiaran''Andriamanitra,'
mg1865::mg_9::3::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niantso an''i Samoela Jehovah, ary izy namaly hoe: Inty aho.'
mg1865::mg_9::3::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihazakazaka nankeo amin''i Ely izy ka nanao hoe: Inty aho, fa niantso ahy ianao. Fa hoy Ely: Tsy niantso aho, andeha mandry ihany. Dia lasa nandry izy.'
mg1865::mg_9::3::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niantso azy indray hoe: Ry Samoela! Dia nifoha Samoela ka nankao amin''i Ely ary nanao hoe: Inty aho, fa niantso ahy ianao. Fa hoy izy: Tsy niantso aho, anaka; andeha mandry ihany.'
mg1865::mg_9::3::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela tsy mbola nahalala an''i Jehovah, sady tsy mbola nanehoana ny tenin''i Jehovah izy.'
mg1865::mg_9::3::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah niantso an''i Samoela indray fanintelony. Dia nifoha izy ka nankao amin''i Ely ary nanao hoe: Inty aho, fa niantso ahy ianao. Dia fantatr''i Ely fa Jehovah no niantso ny zaza.'
mg1865::mg_9::3::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ely tamin''i Samoela: Andeha mandry ihany; ary raha tàhiny miantso anao Izy, dia valio hoe: Mitenena, Jehovah o; fa mihaino ny mpanomponao. Dia lasa Samoela nandry tao amin''ny fandriany.'
mg1865::mg_9::3::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy Jehovah, dia nitsangana ka niantso toy ny teo ihany hoe: Ry Samoela, ry Samoela o! Dia namaly Samoela hoe: Mitenena, fa mihaino ny mpanomponao.'
mg1865::mg_9::3::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Samoela: Indro, Izaho hanao zavatra eo amin''ny Isiraely, ka izay rehetra mandre izany, dia hangintsingintsina ny sofiny roa.'
mg1865::mg_9::3::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia hotanterahiko amin''i Ely izay zavatra rehetra voalazako ny amin''ny taranany: hatomboko izany, ka dia hotanterahiko.'
mg1865::mg_9::3::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nambarako taminy fa hotsaraiko mandrakizay ny taranany noho ny heloka izay fantany, satria ny zanany nahatonga ozona ho an''ny tenany, nefa tsy nosakanany.'
mg1865::mg_9::3::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nianianako ny amin''ny taranak''i Ely fa tsy hisy fanatitra hahafaka ny helony mandrakizay.'
mg1865::mg_9::3::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandry Samoela mandra-pahamarain''ny andro, dia namoha ny varavaran''ny tranon''i Jehovah izy. Ary Samoela natahotra hilaza ny fahitana tamin''i Ely.'
mg1865::mg_9::3::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ely niantso an''i Samoela ka nanao hoe: Ry Samoela, zanako! Dia hoy izy: Inty aho.'
mg1865::mg_9::3::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Inona no zavatra nolazain''i Jehovah taminao? masïna ianao, aza afeninao ahy; hataon''Andriamanitra aminao anie izany, eny, mihoatra noho izany aza, raha nisy afeninao ahy ny zavatra rehetra nolazainy taminao.'
mg1865::mg_9::3::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambaran''i Samoela azy avokoa ny zavatra rehetra, ka tsy nisy nafeniny azy. Dia hoy Ely: Izy no Jehovah, aoka Izy hanao izay sitraky ny fony.'
mg1865::mg_9::3::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitombo Samoela, sady nomba azy Jehovah, ka tsy nisy navelany ho raraka an-tany ny teniny.'
mg1865::mg_9::3::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba nahalala fa efa mpaminanin''i Jehovah tokoa Samoela.'
mg1865::mg_9::3::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niseho tao Silo indray Jehovah; fa niseho tamin''i Samoela tao Silo Jehovah tamin''ny teniny.'
mg1865::mg_9::4::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niadian''ny Isiraely tamin''ny Filistina, sy ny namaboana ny fiaran''i Jehovah'
  verse_text: 'Ary tonga tany amin''ny Isiraely rehetra ny tenin''i Samoela. Dia nandeha ny Isiraely hiady tamin''ny Filistina ka nitoby teo anilan''i Ebenezera; ary ny Filistina kosa nitoby tany Afeka.'
mg1865::mg_9::4::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilahatra ny Filistina hiady amin''ny Isiraely; ary rehefa raikitra ny ady, dia resin''ny Filistina ny Isiraely, ka nahafatesany tokony ho efatra arivo lahy ny miaramila nilahatra tany an-tsaha.'
mg1865::mg_9::4::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany an-toby ny olona, dia hoy ny loholon''ny Isiraely : Nahoana no namely antsika teo anoloan''ny Filistina Jehovah androany? Andeha halaintsika avy any Silo ho eto amintsika ny fiaran''ny faneken''i Jehovah, ka raha tonga eto amintsika izany, dia hamonjy antsika amin''ny tanan''ny fahavalontsika.'
mg1865::mg_9::4::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka nankany Silo ny olona haka ny fiaran''ny faneken''i Jehovah, Tompon''ny maro, Izay mipetraka amin''ny kerobima; ary tao Silo, teo amin''ny fiaran''ny faneken''Andriamanitra, izy mirahalahy zanak''i Ely, dia Hofinia sy Finehasa.'
mg1865::mg_9::4::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo an-toby ny fiaran''ny faneken''i Jehovah, dia nihoby mafy ny Zanak''Isiraely rehetra, ka dia nanako ny tany.'
mg1865::mg_9::4::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny Filistina ny hoby, dia hoy izy; Inona re izany hoby mafy any an-tobin''ny Hebreo izany? Ary fantany fa tonga ao an-toby ny fiaran''i Jehovah.'
mg1865::mg_9::4::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra ny Filistina ka nanao hoe: Andriamanitra no tonga ao an-toby. Ary hoy koa izy: Mahita loza isika! fa tsy mbola nisy toy izao.'
mg1865::mg_9::4::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita loza isika! Iza no hamonjy antsika amin''ny tanan''ireo andriamanitra mahery ireo? Ireo no andriamanitra izay namely ny Egyptiana tamin''ny kapoka rehetra tany an''efitra.'
mg1865::mg_9::4::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahereza, ary aoka hitomban-dahy ianareo, ry Filistina, fandrao hanompo ny Hebreo ianareo tahaka ny nanompoany anareo; misehoa ho lehilahy ianareo, ka miadia.'
mg1865::mg_9::4::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niady ny Filistina, dia resy ny Isiraely, ka samy nandositra ho any an-dainy avy izy rehetra, ary be dia be no maty, dia lehilahy telo alina mandeha an-tongotra tamin''ny Isiraely no niampatrampatra.'
mg1865::mg_9::4::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasan-ko babo ny fiaran''Andriamanitra, ary maty izy mirahalahy zanak''i Ely, dia Hofinia sy Finehasa.'
mg1865::mg_9::4::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy Benjamita anankiray nihazakazaka avy tany tamin''ny miaramila ka tonga tao Silo androtrizay ihany, ary triatra ny akanjony, sady nihosin-tany ny lohany.'
mg1865::mg_9::4::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga izy, indro, Ely nipetraka teo amin''ny sezany ka nitazana teo amoron-dalana, fa niemponempona ny fony noho ny fiaran''Andriamanitra. Ary nony tonga tao an-tanàna ralehilahy ka nilaza, dia nidradradradra ny tao an-tanàna rehetra.'
mg1865::mg_9::4::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Ely ny feo midradradradra, dia hoy izy: Inona izao feo mitabataba izao? Ary ilay lehilahy nanatona faingana ka nilaza tamin''i Ely.'
mg1865::mg_9::4::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa valo amby sivi-folo taona Ely tamin''izay, sady efa pahina ny masony, ka tsy nahita izy.'
mg1865::mg_9::4::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay lehilahy tamin''i Ely: Izaho ilay avy tany an-tafika, ary androany ihany no nandosirako niala tamin''ny miaramila. Ary hoy izy: Nanao ahoana izay tany, anaka?'
mg1865::mg_9::4::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ilay nitondra teny ka nanao hoe: Nandositra teo anoloan''ny Filistina ny Isiraely, ka be dia be no maty, ary izy mirahalahy zanakao, Hofinia sy Finehasa, mba maty koa, sady lasan-ko babo ny fiaran''Andriamanitra.'
mg1865::mg_9::4::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nilaza ny amin''ny fiaran''Andriamanitra izy, dia lavo nitsilany niala tamin''ny sezany teo anilan''ny vavahady Ely, ka folaka ny vozony, dia maty izy, satria efa antitra sady mavesatra. Ary efa nitsara ny Isiraely efa-polo taona izy.'
mg1865::mg_9::4::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vinantoni-vavy, vadin''i Finehasa, nanan''anaka ka efa ho teraka; koa nony reny fa lasan-ko babo ny fiaran''Andriamanitra, sady maty avokoa ny rafozany sy ny vadiny, dia nitanondrika izy ka narary nihetsi-jaza, fa efa ho teraka.'
mg1865::mg_9::4::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nadiva hiala aina izy, dia niteny ireo vehivavy nitsangana teo anilany ka nanao taminy hoe: Aza matahotra, fa velon-dahy ianao. Fa tsy namaly na nihaino izany izy.'
mg1865::mg_9::4::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataony hoe Ikaboda* ny anaran''ny zaza; fa hoy izy: Afaka ny voninahitry ny Isiraely, satria efa lasan-ko babo ny fiaran''Andriamanitra, sady efa maty koa ny rafozany sy ny vadiny. [*Ikaboda = Tsy misy voninahitra]'
mg1865::mg_9::4::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Afaka tamin''ny Isiraely ny voninahitra, fa lasan-ko babo ny fiaran''Andriamanitra.'
mg1865::mg_9::5::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namelezan''Andriamanitra ny Filistina noho ny namaboany ny fiara, sy ny namerenan''ny Filistina azy'
  verse_text: 'Dia nalain''ny Filistina ny fiaran''Andriamanitra ka nentiny niala tany Ebenezera ho any Asdoda.'
mg1865::mg_9::5::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa azon''ny Filistina ny fiaran''Andriamanitra, dia nentiny tao an-tranon''i Dagona izy ka napetrany teo anilany.'
mg1865::mg_9::5::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''iny dia nifoha maraina koa ny Asdodita, ka indro Dagona potraka niankohoka tamin''ny tany teo anoloan''ny fiaran''i Jehovah; dia narenin''ny olona izy ka napetrany teo amin''ny fitoerany indray.'
mg1865::mg_9::5::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''iny indray dia nifoha maraina koa ny olona, ka indro Dagona potraka niankohoka indray tamin''ny tany teo anoloan''ny fiaran''i Jehovah, ary tapaka teo amin''ny tokonam-baravarana ny lohan''i Dagona sy ny felatanany roa; fa ny tenabeny ihany no sisa'
mg1865::mg_9::5::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'izany no tsy anitsahan''ny mpisoron''i Dagona, na izay miditra ao an-tranony, ny tokonam-baravaran''i Dagona ao Asdoda mandraka androany).'
mg1865::mg_9::5::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navesatra tamin''ny Asdodita ny tanan''i Jehovah, fa nandringana azy Izy; ary nasiany vay ny tao Asdoda sy ny tamin''ny faritaniny rehetra.'
mg1865::mg_9::5::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny mponina tao Asdoda fa nisy izany, dia hoy izy: Aza avela hitoetra eto amintsika ny fiaran''ny Andriamanitry ny Isiraely; fa mavesatra amintsika sy amin''i Dagona andriamanitsika ny tanany.'
mg1865::mg_9::5::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka olona izy ka nanangona ireo andriana rehetra tamin''ny Filistina hankeo aminy ka nanao hoe: Hataontsika ahoana ny fiaran''ny Andriamanitry ny Isiraely? Dia hoy ireo: Aoka hafindra hankany Gata ny fiaran''ny Andriamanitry ny Isiraely. Dia nafindrany ny fiaran''ny Andriamanitry ny Isiraely.'
mg1865::mg_9::5::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voafindrany ny fiara, dia namely ny tanàna ny tanan''i Jehovah ka nampangorohoro azy indrindra, fa Izy namely ny mponina tao an-tanàna, na kely na lehibe, ka nisy vay nipoipoitra taminy.'
mg1865::mg_9::5::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia naterin''ny olona nankany Ekrona ny fiaran''Andriamanitra. Ary raha vao tonga tany Ekrona ny fiaran''Andriamanitra, dia nitaraina ny Ekronita nanao hoe: Efa nafindran''ny olona ho aty amintsika ny fiaran''ny Andriamanitry ny Isiraely hahafaty antsika sy ny firenentsika.'
mg1865::mg_9::5::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka olona izy ka nanangona ireo andriana rehetra tamin''ny Filistina ka nanao hoe: Ampandehano ny fiaran''ny Andriamanitry ny Isiraely, ary aoka ho entina ho any amin''ny fitoerany ihany indray izy mba tsy hahafaty antsika sy ny firenentsika; fa nanerana ny tanàna ny horohoron''ny fahafatesana, fa navesatra indrindra tao ny tanan''Andriamanitra.'
mg1865::mg_9::5::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona izay tsy maty dia voan''ny vay kosa, ka ny fitarainan''ny tao an-tanàna dia niakatra ho any an-danitra.'
mg1865::mg_9::6::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiaran''i Jehovah dia tany amin''ny tanin''ny Filistina fito volana.'
mg1865::mg_9::6::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina nampaka ny mpisorona sy ny mpanao fankatovana ka nanao hoe: Ahoana no hataontsika amin''ny fiaran''i Jehovah? Lazao aminay izay hanateranay azy ho any amin''ny fitoerany.'
mg1865::mg_9::6::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo: Raha aterinareo ny fiaran''ny Andriamanitry ny Isiraely, aza aterina foana izy, fa manatera fanati-panonerana ho Azy mihitsy, dia ho sitrana ianareo, ary ho fantatrareo koa izay tsy ialan''ny tanany aminareo.'
mg1865::mg_9::6::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny olona: Inona ary no fanati-panonerana haterinay ho Azy? Ary hoy kosa ireo: Vay volamena dimy sy totozy volamena dimy, araka ny isan''ireo andrianan''ny Filistina; fa aretina iray ihany no manjo anareo rehetra sy ny andriananareo.'
mg1865::mg_9::6::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa manaova sarin''ny vainareo sy sarin''ny totozinareo izay manimba ny tany; ary omeo voninahitra ny Andriamanitry ny Isiraely; angamba hanamaivana ny tanany hiala aminareo sy ny andriamanitrareo ary ny taninareo Izy.'
mg1865::mg_9::6::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nahoana no manamafy ny fonareo ianareo, toy ny nanamafian''ny Egyptiana sy Farao ny fony? Raha nanao fahagagana namelezany azy Izy, moa tsy nalefany handeha va ny olona, ka dia lasa?'
mg1865::mg_9::6::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny manaova sariety vaovao, ary mangalà ombivavy roa mitaiza, izay tsy mbola nasiana zioga, dia afehezo amin''ny sariety ny ombivavy, ka ento mody ny zanany hiala aminy.'
mg1865::mg_9::6::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary alao ny fiaran''i Jehovah, ka apetraho eo ambonin''ny sariety, dia ataovy ao anaty vata kely eo anilany ny fanaka volamena haterinareo ho Azy ho fanati-panonerana, ka ampandehano izany.'
mg1865::mg_9::6::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahao, ka raha miakatra amin''ny lalana mankany amin''ny taniny ihany ho any Beti-semesy izany, dia Jehovah no nahatonga izao loza lehibe izao tamintsika; fa raha tsy izany, dia ho fantatsika fa tsy ny tanany no namely antsika, fa mby amin''izay hanjo antsika.'
mg1865::mg_9::6::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataon''ny olona izany, ka naka ombivavy roa mitaiza izy, dia nafehiny tamin''ny sariety ireo, fa ny zanany narindriny tao an-trano.'
mg1865::mg_9::6::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia napetrany teo ambonin''ny sariety ny fiaran''i Jehovah sy ny vata kely ary ny totozy volamena sy ny sarin''ny vay.'
mg1865::mg_9::6::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ombivavy nizotra mahitsy tamin''ny lalana mankany Beti-semesy, dia nandeha tamin''ny lalambe ka nimàmà teny am-pandehanana, ary tsy nania, na ho amin''ny ankavanana, na ho amin''ny ankavia, ary ireo andrianan''ny Filistina nanaraka azy hatramin''ny faritanin''i Beti-semesy.'
mg1865::mg_9::6::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Beti-semesita nijinja ny vary tritika teny an-dohasaha; ary nanopy ny masony izy ka nahita ny fiara, dia faly raha nahita izany.'
mg1865::mg_9::6::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sariety tonga teo an-tanimbarin''i Josoa Beti-semesita, dia nijanona teo, ary nisy vato lehibe teo; dia namaky ny hazon''ny sariety ny olona ka nanatitra ny ombivavy ho fanatitra dorana ho an''i Jehovah.'
mg1865::mg_9::6::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Levita nampidina ny fiaran''i Jehovah sy ny vata kely izay teo aminy, dia ilay nitoeran''ny fanaka volamena, ka nametraka azy teo ambonin''ny vato lehibe; ary tamin''izany andro izany ny mponina tao Beti-semesy nanatitra fanatitra dorana sy fanatitra hafa alatsa-drà ho an''i Jehovah.'
mg1865::mg_9::6::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''ireo andriana dimy tamin''ny Filistina izany, dia niverina nankany Ekrona androtrizay ihany izy.'
mg1865::mg_9::6::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no sary volamenan''ny vay naterin''ny Filistina ho fanati-panonerana ho an''i Jehovah: an''i Asdoda iray, an''i Gaza iray, an''i Askelona iray, an''i Gata iray, an''i Ekrona iray;'
mg1865::mg_9::6::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny totozy volamena dia araka ny isan''ny tanàna rehetra an''ny Filistina, izay an''ireo andriana dimy, an''ny tanàna mimanda, na ny vohitra any ivelany, ka hatramin''ny vato lehibe izay nametrahany ny fiaran''i Jehovah; ary mbola any an-tanimbarin''i Josoa Beti-semesita mandraka androany izany.'
mg1865::mg_9::6::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namely ny mponina tao Beti-semesy noho ny nijerijeren''ireo ny fiarany, ka dia olona fito-polo amby dimy alina no maty; dia nisaona ny olona, satria nasian''i Jehovah, ka be dia be no maty.'
mg1865::mg_9::6::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mponina tao Beti-semesy: Iza no mahajanona eo anoloan''izao Jehovah Andriamanitra masina izao? Ary ho amin''iza no hiakarany, rehefa miala amintsika?'
mg1865::mg_9::6::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka olona nankany amin''ny mponina tao Kiriata-jearima izy hanao hoe: Efa naverin''ny Filistina ny fiaran''i Jehovah; koa midìna ianareo, dia ento miakatra ho any aminareo izy.'
mg1865::mg_9::7::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga teo ny mponina tao Kiriata-jearima ka nitondra ny fiaran''i Jehovah niakatra, dia nitondra azy ho ao an-tranon''i Abinadaba teo an-kavoana*, ary nanamasina an''i Eleazara zanany mba hitandrina ny fiaran''i Jehovah izy. [*Na: Gebea]'
mg1865::mg_9::7::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny nampibebahan''i Samoela ny Isiraely, sy ny nandreseny ny Filistina, ary ny nitsaran''i Samoela ny Isiraely'
  verse_text: 'Ary hatramin''izany andro izany dia nitoetra ela tany Kiriata-jearima ny fiaran''i Jehovah, dia roa-polo taona; ary ny taranak''Isiraely rehetra nalahelo an''i Jehovah*. [*Na: nivory ho eo amin''i Jehovah]'
mg1865::mg_9::7::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''ny taranak''Isiraely rehetra: Raha miverina amin''i Jehovah amin''ny fonareo rehetra tokoa ary ianareo, dia ario hiala aminareo ny andriamani-kafa sy ireo Astarta, ka ampiomany ny fonareo ho an''i Jehovah, ary aoka Izy ihany no hotompoinareo, dia hamonjy anareo amin''ny tanan''ny Filistina Izy.'
mg1865::mg_9::7::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanary ireo Bala sy Astarta ny Zanak''Isiraely ka nanompo an''i Jehovah irery ihany.'
mg1865::mg_9::7::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela: Vorio ny Isiraely rehetra ho any Mizpa, dia hivavaka amin''i Jehovah ho anareo aho.'
mg1865::mg_9::7::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivory tany Mizpa izy ary nanovo rano ka nandraraka izany teo anatrehan''i Jehovah, sady nifady hanina tamin''izany andro izany izy ka nanao hoe: Efa nanota tamin''i Jehovah isika. Ary Samoela nitsara ny Zanak''Isiraely tany Mizpa.'
mg1865::mg_9::7::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''ny Filistina fa efa vory tany Mizpa ny Zanak''Isiraely, dia niakatra hamely azy ireo andrianan''ny Filistina. Ary nony nandre izany ny Zanak''Isiraely, dia raiki-tahotra izy noho ny Filistina.'
mg1865::mg_9::7::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny Zanak''Isiraely tamin''i Samoela: Aza mitsahatra mitaraina amin''i Jehovah Andriamanitsika ho anay ianao, mba hamonjeny anay amin''ny tanan''ny Filistina.'
mg1865::mg_9::7::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka zanak''ondry mbola minono Samoela ka nanatitra azy ho fanatitra dorana ho an''i Jehovah; dia nitaraina tamin''i Jehovah ho an''ny Isiraely Samoela, ary nihaino azy Jehovah.'
mg1865::mg_9::7::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nanatitra ny fanatitra dorana Samoela, dia nanatona ny Filistina hiady amin''ny Isiraely; fa Jehovah nampikotrokorana mafy tamin''ny Filistina tamin''izany andro izany ka nampifanaritaka azy, dia resy teo anoloan''ny Isiraely izy.'
mg1865::mg_9::7::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy amin''ny Isiraely niala tany Mizpa, dia nanenjika ny Filistina ka namely azy mandra-pahatongany teo ambanin''i Beti-kara.'
mg1865::mg_9::7::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela naka vato ka nanorina azy teo anelanelan''i Mizpa sy Sena, ary ny anarany nataony hoe Ebenezera*; fa hoy izy: Efa novonjen''i Jehovah isika hatramin''izao. [*Ebnezera = Vato famonjena]'
mg1865::mg_9::7::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia resy ny Filistina ka tsy tafiditra teo anatin''ny faritanin''ny Isiraely intsony; ary ny tanan''i Jehovah namely ny Filistina tamin''ny andro rehetra niainan''i Samoela.'
mg1865::mg_9::7::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanàna izay efa nalain''ny Filistina tamin''ny Isiraely dia azon''ny Isiraely indray, hatrany Ekrona ka hatrany Gata; ary ny faritanin''ireo dia nalain''ny Isiraely tamin''ny tanan''ny Filistina koa. Ary nihavana ny Isiraely sy ny Amorita.'
mg1865::mg_9::7::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela nitsara ny Isiraely tamin''ny andro rehetra niainany.'
mg1865::mg_9::7::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha isan-taona isan-taona izy nitety any Betela sy Gilgala ary Mizpa ka nitsara ny Isiraely teo amin''ireo tanàna rehetra ireo.'
mg1865::mg_9::7::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina ho any Rama indray izy, fa tao ny tranony; ary nitsara ny Isiraely tao izy sady nanorina alitara tao ho an''i Jehovah.'
mg1865::mg_9::8::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nangatahan''ny Isiraely mpanjaka'
  verse_text: 'Ary rehefa antitra Samoela, dia ny zanany no nataony mpitsara ny Isiraely.'
mg1865::mg_9::8::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Joela no anaran''ny lahimatoany, ary Abia no anaran''ny faralahiny; mpitsara tany Beri-sheba izy ireo.'
mg1865::mg_9::8::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny zanany tsy nanaraka ny dian-drainy, fa nivily nitady vola aman-karena ka nandray kolikoly sy nanao fitsarana miangatra.'
mg1865::mg_9::8::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loholon''ny Isiraely rehetra nivory tao Rama ho any amin''i Samoela'
mg1865::mg_9::8::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Indro, efa antitra ianao, ary ny zanakao tsy manaraka ny dianao; koa manendre mpanjaka ho anay hitsara anay, tahaka ny firenena rehetra.'
mg1865::mg_9::8::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy sitrak''i Samoela ny nanaovan''ny olona hoe: Omeo mpanjaka izahay hitsara anay. Dia nivavaka tamin''i Jehovah Samoela.'
mg1865::mg_9::8::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Samoela: Henoy ihany ny tenin''ny olona amin''izany rehetra lazainy aminao; fa tsy ianao no laviny, fa Izaho no laviny tsy hanjaka aminy.'
mg1865::mg_9::8::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny asa rehetra izay nataony hatramin''ny andro nitondrako azy nivoaka avy tany Egypta ka mandraka androany, dia ny nahafoizany Ahy sy ny nanompoany andriamani-kafa, dia toy izany koa no ataony aminao.'
mg1865::mg_9::8::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny henoy ihany ny teniny, kanefa lazao aminy marimarina, ka asehoy azy ny ho fanaon''ny mpanjaka izay hanjaka aminy.'
mg1865::mg_9::8::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nambaran''i Samoela tamin''ny olona izay nangataka mpanjaka taminy ny teny rehetra nolazain''i Jehovah.'
mg1865::mg_9::8::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Izao no ho fanaon''ny mpanjaka izay hanjaka aminareo: Ny zanakareo-lahy dia halainy ka hotendreny ho amin''ny kalesiny sy ho mpitaingin-tsoavaliny ary hihazakazaka eo alohan''ny kalesiny,'
mg1865::mg_9::8::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hotendreny ho mpifehy arivo sy ho mpifehy dimam-polo, ary hiasa ny taniny sy hijinja ny vokany ary hanao ny fiadiany sy ny fanaka momba ny kalesiny;'
mg1865::mg_9::8::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zanakareo-vavy dia halainy ho mpangaroharo zava-manitra ary ho mpahandro sy mpanao mofo;'
mg1865::mg_9::8::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny tsara indrindra amin''ny sahanareo sy ny tanim-boalobokareo sy ny tanin''olivanareo dia halainy ka homeny ho an''ny mpanompony;'
mg1865::mg_9::8::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny ampahafolon''ny voan-javatrareo sy ny tanim-boalobokareo dia halainy ka homeny ho an''ny tandapany* sy ny tandonany. [*Hebreo: ionoka]'
mg1865::mg_9::8::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ankizilahinareo sy ny ankizivavinareo sy ny zatovonareo tsara indrindra ary ny borikinareo dia halainy ka hampanaoviny ny asany.'
mg1865::mg_9::8::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary halainy koa ny ampahafolon''ny ondry aman''osinareo; ary ny tenanareo ho tonga mpanompony.'
mg1865::mg_9::8::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitaraina amin''izany andro izany ianareo noho ny mpanjakanareo izay nofidinareo ho anareo, fa Jehovah tsy hamaly anareo amin''izany andro izany.'
mg1865::mg_9::8::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy nety nihaino ny tenin''i Samoela ny olona, fa hoy izy: Tsia, fa aoka ihany hisy mpanjaka hanjaka aminay,'
mg1865::mg_9::8::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho tahaka ny firenena rehetra koa izahay, ka ny mpanjakanay hitsara anay sy hivoaka eo alohanay ary hitarika ny adinay.'
mg1865::mg_9::8::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''i Samoela ny teny rehetra nolazain''ny olona, ka dia nolazainy teo anatrehan''i Jehovah kosa.'
mg1865::mg_9::8::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jehovah tamin''i Samoela: Henoy ny teniny ka manendre mpanjaka ho azy. Dia hoy Samoela tamin''ny lehilahy amin''ny Isiraely: Samia ary mandeha ho any amin''ny tanànanareo avy ianareo rehetra.'
mg1865::mg_9::9::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanendrena an''i Saoly ho mpanjakan''ny Isiraely'
  verse_text: 'Ary nisy lehilahy avy amin''ny Benjamina, atao hoe Kisy, zanak''i Abiela, zanak''i Zerora, zanak''i Bekorata, zanak''i Afia, Benjamita izy sy mpanjatobe.'
mg1865::mg_9::9::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanan-janakalahy atao hoe Saoly izy, izay mbola tanora sady tsara tarehy, ka tsy nisy tsara tarehy noho izy teo amin''ny Zanak''Isiraely, ary nanan-tombo noho ny olona rehetra hatramin''ny sorony no ho miakatra ny halavany.'
mg1865::mg_9::9::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary very ny borikivavin''i Kisy, rain''i Saoly. Dia hoy Kisy tamin''i Saoly zanany: Mitondrà zatovo anankiray hanaraka anao, dia miaingà, ka mandehana hitady ny boriky.'
mg1865::mg_9::9::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha namaky ny tany havoan''i Efraima izy ka namaky ny tany Salisa, fa tsy nahita azy; dia nandeha namaky ny tany Salima indray izy, nefa tsy tany ireny; dia nandeha namaky ny tanin''ny Benjamina izy, fa mbola tsy nahita azy ihany indray.'
mg1865::mg_9::9::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga teo amin''ny tany Zofa izy, dia hoy Saoly tamin''ny zatovony nanaraka azy: Andeha isika hiverina, fandrao isika indray no ahin''ikaky, fa tsy ny boriky intsony.'
mg1865::mg_9::9::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpanompony taminy: Indro, misy lehilahin''Andriamanitra amin''iroa tanàna iroa, ary lehilahy malaza izy, fa izay rehetra lazainy dia tanteraka tokoa; koa andeha isika hankany, fa angamba hatorony antsika izay lalana tokony halehantsika.'
mg1865::mg_9::9::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''ny zatovony: indro, raha mankany isika, inona moa no haterintsika ho an-dralehilahy? fa efa lany ny mofo rehetra tao amin''ny fitondrantsika, ary tsy misy zavatra haterintsika ho an''ny lehilahin''Andriamanitra; ka inona moa no aty amintsika?'
mg1865::mg_9::9::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly an''i Saoly indray ilay zatovo ka nanao hoe: Indro, aty an-tanako misy vola ampahefatry ny sekely; koa homeko ny lehilahin''Andriamanitra izany, mba hanoroany antsika izay lalana tokony halehantsika.'
mg1865::mg_9::9::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fahiny teo amin''ny Isiraely, raha nisy olona nandeha hanontany amin''Andriamanitra, dia izao no fanaony: Andeha, aoka hankany amin''ny mpahita isika; fa izay atao hoe mpaminany ankehitriny no natao hoe mpahita tany aloha.)'
mg1865::mg_9::9::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''ny mpanompony: Tsara izany, fa andeha isika hankany. Dia lasa izy roa lahy nankany amin''ny tanàna nitoeran''ilay lehilahin''Andriamanitra.'
mg1865::mg_9::9::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niakatra teo amin''ny fiakarana ho any an-tanàna izy roa lahy, dia nahita zazavavy mivoaka hantsaka, ka hoy izy taminy: Ao ihany va ny mpahita?'
mg1865::mg_9::9::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly azy ireo ka nanao hoe: Ao ihany izy; indro ao alohanao ao izy; mandehana faingana, fa efa tonga ao an-tanàna izy izao, satria misy fanatitra hataon''ny vahoaka ao amin''ny fitoerana avo anio;'
mg1865::mg_9::9::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha vao miditra ao an-tanàna ianareo, dia ho hitanareo izy, raha tsy mbola miakatra hihinana ao amin''ny fitoerana avo, fa tsy hihinana ny vahoaka mandra-pahatongany, fa izy no manao fisaorana amin''ny fanatitra, ary rehefa afaka izany, dia vao mihinana izay nasaina; koa miakara ianareo ankehitriny, fa amin''izao no hahitanareo azy.'
mg1865::mg_9::9::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niakatra tao an-tanàna izy roa lahy; ary nony tonga tao izy, dia, indro, Samoela nivoaka niakatra ho any amin''ny fitoerana avo ka nifanena taminy.'
mg1865::mg_9::9::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah efa nanambara tamin''i Samoela omalin''ny andro nahatongavan''i Saoly ka nanao hoe:'
mg1865::mg_9::9::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rahampitso toy izao dia hampandehaniko ho aty aminao ny lehilahy anankiray avy amin''ny tanin''ny Benjamina, ary hohosoranao ho mpanapaka ny Isiraely oloko izy ka hamonjy azy amin''ny tanan''ny Filistina, fa efa nijery ny oloko Aho, satria efa mby ety amiko ny fitarainany.'
mg1865::mg_9::9::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Samoela Saoly, dia hoy Jehovah taminy*: Indro ny lehilahy voalazako taminao; io no hanjaka amin''ny oloko. [*Hebreo: Jehovah namaly azy hoe]'
mg1865::mg_9::9::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly dia nanatona an''i Samoela teo am-bavahady ka nanao hoe: Masïna ianao, atoroy ahy ny tranon''ny mpahita.'
mg1865::mg_9::9::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela dia namaly an''i Saoly hoe: Izaho no mpahita; miakara eo alohako ho any amin''ny fitoerana avo; fa hiara-mihinana amiko ianareo anio, ary raha maraina dia halefako handeha ianao ka holazaiko aminao izay rehetra ao am-ponao.'
mg1865::mg_9::9::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza malahelo ny amin''ny borikinao izay efa very hateloana, fa efa hita ireny; ary ho an''iza ny zavatra irina rehetra eo amin''ny Isiraely? Tsy ho anao sy ny ankohonan-drainao va?'
mg1865::mg_9::9::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Saoly ka nanao hoe: Tsy Benjamita va aho, avy amin''ilay kely indrindra amin''ny firenen''Isiraely? ary tsy kely indrindra va ny mpianakaviko eo amin''ny mpianakavin''ny firenen''i Benjamina rehetra? ka nahoana no miteny amiko toy izany ianao?'
mg1865::mg_9::9::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela dia nitondra an''i Saoly sy ny zatovony ka nampiditra azy tao amin''ny efi-trano, dia nanome azy toerana aloha teo amin''izay nasaina; ary tokony ho olona telo-polo ireo.'
mg1865::mg_9::9::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''ny mpanao nahandro: Ento ilay anjara nomeko anao, izay efa nolazaiko taminao hoe. Tehirizo ity.'
mg1865::mg_9::9::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''ny mpanao nahandro ny soro-kena* mbamin''ny eo aminy ka napetrany teo anoloan''i Saoly, ary hoy Samoela: Indro, izay efa natokana dia voapetraka eto anoloanao, koa hano; fa ho amin''izao fotoana izao no nitehirizana izany ho anao hatramin''izay nanaovako hoe: Efa nanasa ny vahoaka aho. Ary Saoly dia niara-nihinana tamin''i Samoela androtrizay. [*Na: fe]'
mg1865::mg_9::9::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy roa lahy nidina avy tao amin''ny fitoerana avo hankany an-tanàna, ary dia niresaka tamin''i Saoly teo an-tampon-trano Samoela.'
mg1865::mg_9::9::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifoha maraina koa izy ireo; ary nony nazavaratsy ny andro, dia niantso an''i Saoly teo an-tampon-trano Samoela ka nanao hoe: Mitsangàna ianao mba havoakako. Dia nitsangana Saoly, ka lasa nivoaka ho any ala-trano izy roa lahy, dia izy sy Samoela.'
mg1865::mg_9::9::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nidina teo amin''ny faran''ny tanàna izy, dia hoy Samoela tamin''i Saoly: Ampandehano eo alohantsika ny zatovo (dia lasa nandeha izy), fa mijanona kely ianao hilazako ny tenin''Andriamanitra.'
mg1865::mg_9::10::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela nitondra tavoara feno diloilo ka nanidina ny diloilo teo an-dohan''i Saoly, dia nanoroka azy ka nanao hoe: Tsy nanosotra anao va Jehovah mba ho mpanapaka ny lovany?'
mg1865::mg_9::10::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa misaraka amiko ianao anio, dia hahita olona roa lahy eo anilan''ny fasan-dRahely, ao amin''ny faritanin''ny Benjamina, ao Zelza, ary izy ireo hilaza aminao hoe: Efa hita ny boriky izay notadiavinao; ary, indro, tsy ny boriky intsony no heverin''ny rainao, fa ianareo kosa indray no ahiny, ka hoy izy: Ahoana re no hataoko ny amin''ny zanako?'
mg1865::mg_9::10::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handroso hiala ao ianao ka ho tonga ao amin''ny hazo terebinta any Tabara, dia hifanena amin''ny olona telo lahy miakatra ho any amin''Andriamanitra any Betela, ny anankiray mitondra zanak''osy telo, ny anankiray mitondra mofo telo, ary ny anankiray mitondra divay iray tavoara*; [*Na: siny hoditra]'
mg1865::mg_9::10::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hiarahaba anao ireo sy hanome anao mofo roa, dia horaisinao amin''ny tanany izany.'
mg1865::mg_9::10::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia ho tonga any Gibean''Andriamanitra ianao, izay misy miaramilan''ny Filistina; ary rehefa tonga ao an-tanàna ianao, dia hifanena amin''ny mpaminany maro irai-dia midina avy ao amin''ny fitoerana avo mitondra lokanga sy ampongatapaka sy sodina ary valiha eo alohany, dia haminany ireo.'
mg1865::mg_9::10::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hilatsaka aminao ny Fanahin''i Jehovah, ka hiara-maminany aminy ianao, dia ho voaova ho olom-baovao.'
mg1865::mg_9::10::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga aminao ireo famantarana ireo, dia ataovy izay azon''ny tananao atao, fa Andriamanitra no momba anao.'
mg1865::mg_9::10::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao hidina eo alohako ho any Gilgala, ary indro aho hidina ho any aminao mba hanatitra fanatitra dorana sy fanati-pihavanana; ka hafitoana no hitoeranao mandra-pahatongako aminao, dia holazaiko aminao izay hataonao.'
mg1865::mg_9::10::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nihodina niala tamin''i Samoela izy, dia nomen''Andriamanitra fo vaovao; ary tonga avokoa androtrizay ihany ireo famantarana rehetra ireo.'
mg1865::mg_9::10::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tany Gibea, izy indro, ny mpaminany maro irai-dia nifanena taminy; dia nilatsaka tamin''i Saoly ny Fanahin''Andriamanitra, ka naminany teo aminy izy.'
mg1865::mg_9::10::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''izay rehetra nahalala azy hatramin''ny taloha fa, indro, maminany eo amin''ny mpaminany izy, dia nifampilaza ny olona ka nanao hoe: Inona izao tonga amin''ny zanak''i Kisy izao? Saoly koa va mba isan''ny mpaminany?'
mg1865::mg_9::10::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray teo namaly hoe: Fa iza moa no rain''ireny? Ary izany no nisehoan''ny fitenenana hoe: Saoly koa va mba isan''ny mpaminany?'
mg1865::mg_9::10::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitsahatra naminany Saoly, dia nankeo amin''ny fitoerana avo.'
mg1865::mg_9::10::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny rahalahin-drain''i Saoly taminy sy tamin''ny mpanompony: Taiza no alehanareo? Ary hoy izy: Nitady ny boriky izahay; ka nony tsy hitanay izy, dia nankany amin''i Samoela izahay.'
mg1865::mg_9::10::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny rahalahin-drain''i Saoly: Masïna ianao, lazao amiko izay nolazain''i Samoela taminao.'
mg1865::mg_9::10::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''ny rahalahin-drainy: Nolazainy marimarina taminay fa efa hita ny boriky. Fa ilay nolazain''i Samoela ny amin''ny fanjakana tsy mba nambarany taminy.'
mg1865::mg_9::10::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela namory ny vahoaka ho any Mizpa ho any amin''i Jehovah'
mg1865::mg_9::10::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao tamin''ny Zanak''Isiraely hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Izaho nitondra ny Isiraely niakatra avy tany Egypta ka namonjy anareo tamin''ny tanan''ny Egyptiana sy tamin''ny tanan''ny fanjakana rehetra izay nampahory anareo.'
mg1865::mg_9::10::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ianareo kosa efa nandà an''Andriamanitrareo androany, Izay mamonjy anareo amin''ny zavatra manjo anareo sy ny fahorianareo rehetra; fa hoy ianareo taminy: Tsia, fa manendre mpanjaka ho anay. Koa ankehitriny, mijanona eo anatrehan''i Jehovah araka ny firenenareo sy ny arivonareo avy.'
mg1865::mg_9::10::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanatona ny firenen''Isiraely rehetra Samoela, ka ny firenen''i Benjamina no voafidy.'
mg1865::mg_9::10::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampanatona ny firenen''i Benjamina araka ny fokony avy izy, ary ny fokon''ny Matrita no voafidy. Dia voafidy Saoly, zanak''i Kisy; ary raha nitady azy ny olona, dia tsy nahita azy.'
mg1865::mg_9::10::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany tamin''i Jehovah indray ny olona, na mba efa tonga ao ralehilahy, na tsia. Ary hoy Jehovah: Indro, miery ao amin''ny entana izy.'
mg1865::mg_9::10::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihazakazaka ny olona ka naka azy tao; ary rehefa nitsangana teo afovoan''ny olona izy, dia nanan-tombo noho ny olona rehetra hatramin''ny sorony no ho miakatra ny halavany.'
mg1865::mg_9::10::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''ny vahoaka rehetra: Hitanareo va izay nofidin''i Jehovah, fa tsy misy tahaka azy eo amin''ny vahoaka rehetra? Dia nihoby ny vahoaka rehetra ka nanao hoe: Ho ela velona anie ny mpanjaka.'
mg1865::mg_9::10::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela nilaza tamin''ny olona izay mety ho fitondrana ny fanjakana, dia nosoratany tamin''ny taratasy izany ka napetrany teo anatrehan''i Jehovah. Ary ny vahoaka rehetra samy nampodin''i Samoela ho any an-tranony avy.'
mg1865::mg_9::10::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Saoly kosa nandeha nody tany Gibea, ary nomba azy ny olona maro, izay voatendrin''ny tanan''Andriamanitra ny fony.'
mg1865::mg_9::10::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy kosa olona tena ratsy fanahy nanao hoe: Hataon''io lehilahy io ahoana no famonjy antsika? Dia nanazimba an''i Saoly ireo ka tsy nitondra fanomezana ho azy. Nefa Saoly dia tahaka ny marenina.'
mg1865::mg_9::11::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandresen''i Saoly ny Amonita, sy ny nanavaozana ny fanjakana'
  verse_text: 'Ary Nahasy Amonita niakatra ka nitoby tandrifin''i Jabesi-gileada; dia hoy ny mponina rehetra tao Jabesy tamin''i Nahasy: Manaova fanekena aminay, dia hanompo anao izahay.'
mg1865::mg_9::11::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Nahasy Amonita: Izao no hanaovako fanekena aminareo: hopotsirina ny masonareo ankavanana rehetra, ka hataoko fandatsana ny Isiraely rehetra izany.'
mg1865::mg_9::11::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny loholon''i Jabesy taminy: Omeo andro hafitoana izahay, mba hanirahanay olona ho any amin''ny faritanin''ny Isiraely rehetra, ka raha tàhiny tsy misy olona hamonjy anay, dia hivoaka hanatona anao izahay.'
mg1865::mg_9::11::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tany Gibean''i Saoly ny iraka ka nanambara ny teniny teo anatrehan''ny vahoaka; dia nanandratra ny feony ny vahoaka rehetra ka nitomany.'
mg1865::mg_9::11::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Saoly tonga nandroaka ny omby avy tany an-tsaha ka nanao hoe: Inona izato nanjo ny olona, no mitomany izy? Ary nambarany azy ny tenin''ny mponina tao Jabesy.'
mg1865::mg_9::11::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilatsaka tamin''i Saoly ny Fanahin''Andriamanitra, ka nirehitra mafy ny fahatezeran''i Saoly, raha nandre izany teny izany.'
mg1865::mg_9::11::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka omby roa izy, ka norasainy ireo, dia nampitondrainy ny iraka ho any amin''ny faritanin''ny Isiraely rehetra ka nataony hoe: Na iza na iza tsy mivoaka hanaraka an''i Saoly sy Samoela, dia tahaka ireny no hanaovana ny ombiny. Dia nahazo ny olona ny fahatahorana an''i Jehovah, ka nivoaka toy ny olona iray ihany izy.'
mg1865::mg_9::11::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandamina azy tany Bezeka izy, dia telo hetsy no isan''ny Zanak''Isiraely, ary telo alina no isan''ny lehilahy amin''ny Joda.'
mg1865::mg_9::11::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny iraka izay tonga teo: Izao no holazainareo amin''ny mponina ao Jabesi-gileada: Rahampitso ilay efa mafampana iny dia hisy famonjena ho anareo. Dia tonga ny iraka ka nanambara izany tamin''ny mponina tao Jabesy; ka dia faly ireo.'
mg1865::mg_9::11::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mponina tao Jabesy: Rahampitso no hivoahanay ho eny aminareo, dia hataonareo aminay izay rehetra sitrakareo.'
mg1865::mg_9::11::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, dia nozarain''i Saoly ho telo toko ny olona, ka tonga teo amin''ny toby tamin''ny fiambenana maraina izy ary namely ny Amonita mandra-pahafampanan''ny andro; koa izay sisa dia niely patrana, ka tsy nisy olona tafaraka na dia hatramin''ny roa aza.'
mg1865::mg_9::11::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny vahoaka tamin''i Samoela: Iza moa no nanao hoe: Saoly va no hanjaka aminay? Atolory ireny olona ireny hataonay maty.'
mg1865::mg_9::11::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Saoly: Tsy hisy olona hatao maty anio; fa androany no nanaovan''i Jehovah famonjena teo amin''ny Isiraely.'
mg1865::mg_9::11::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''ny vahoaka: Andeha isika hankany Gilgala hanavao ny fanjakana any.'
mg1865::mg_9::11::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ny vahoaka nankany Gilgala; ary tany Gilgala no nananganany an''i Saoly ho mpanjaka teo anatrehan''i Jehovah; ary tany no nanaterany fanati-pihavanana teo anatrehan''i Jehovah, dia nifaly indrindra teo Saoly mbamin''ny lehilahy rehetra amin''ny Isiraely.'
mg1865::mg_9::12::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny anatra nataon''i Samoela tamin''ny Isiraely noho ny nangatahany mpanjaka'
  verse_text: 'Ary hoy Samoela tamin''ny Isiraely rehetra: Indro, efa nihaino ny teninareo aho tamin''izay rehetra nolazainareo tamiko ka efa nanendry mpanjaka hanjaka aminareo.'
mg1865::mg_9::12::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, indro, ny mpanjaka mandeha eo anatrehanareo; fa izaho efa antitra sy fotsy volo; koa, indreo, eo aminareo ny zanako, ary izaho efa nandeha teo anatrehanareo hatry ny fony vao zaza ka mandraka androany.'
mg1865::mg_9::12::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa inty aho; tondroy maso eto anatrehan''i Jehovah sy ny voahosony aho: ombin''iza moa no nalaiko? na borikin''iza no nalaiko? na an''iza no nanaovako an-keriny? na iza no nampahoriko? na teo an-tanan''iza no nandraisako kolikoly hahatampina ny masoko? fa honerako aminareo izany.'
mg1865::mg_9::12::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo: Ianao tsy nanao an-keriny taminay, na nampahory anay, na naka zavatra teny an-tanan''olona na dia iray akory aza.'
mg1865::mg_9::12::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Samoela taminy: Vavolombelona aminareo anio Jehovah, ary vavolombelona koa ny voahosony, fa tsy nisy zavatra hitanareo teo an-tanako na inona na inona. Dia hoy ireo: Eny, vavolombelona Izy.'
mg1865::mg_9::12::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''ny olona: Jehovah no nanendry an''i Mosesy sy Arona, ary nitondra ny razanareo niakatra avy tany amin''ny tany Egypta.'
mg1865::mg_9::12::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny avia ianareo, fa hifandahatra aminareo eto anatrehan''i Jehovah aho ny amin''ny asa marina rehetra izay nataon''i Jehovah taminareo sy ny razanareo.'
mg1865::mg_9::12::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa tonga tany Egypta Jakoba, ka nitaraina tamin''i Jehovah ny razanareo, Jehovah dia naniraka an''i Mosesy sy Arona, ka ireo no nitondra ny razanareo nivoaka avy tany Egypta ary namponina azy teto amin''ity tany ity.'
mg1865::mg_9::12::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha nanadino an''i Jehovah Andriamaniny izy, dia namidiny ho eo an-tanan''i Sisera, komandin''ny miaramilan''i Hazora, sy ho eo an-tanan''ny Filistina ary ho eo an-tanan''ny mpanjakan''i Moaba, ka niadian''ireo izy.'
mg1865::mg_9::12::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah izy ka nanao hoe: Efa nanota izahay, fa efa nahafoy an''i Jehovah ka nanompo ireo Bala sy Astarta, nefa ankehitriny vonjeo amin''ny tanan''ny fahavalonay izahay, dia hanompo Anao.'
mg1865::mg_9::12::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah efa naniraka an''i Jerobala sy Bedana* sy Jefta ary Samoela, ka namonjy anareo tamin''ny tanan''ny fahavalonareo manodidina Izy, dia nandry fahizay ianareo. [*Na: (Baraka)]'
mg1865::mg_9::12::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony hitanareo fa avy hiady taminareo Nahasy, mpanjakan''ny Amonita, dia hoy ianareo tamiko: Tsia, fa aoka hisy mpanjaka hanjaka aminay; kanefa Jehovah Andriamanitrareo no mpanjakanareo.'
mg1865::mg_9::12::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, indro ny mpanjaka izay nofidinareo sy nangatahinareo; ary indro fa Jehovah nanome mpanjaka hanjaka aminareo.'
mg1865::mg_9::12::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hatahotra an''i Jehovah sy hanompo Azy ary hihaino ny feony ka tsy handà ny didiny ianareo, fa samy hanaraka an''i Jehovah Andriamanitrareo ianareo sy ny mpanjaka izay manjaka aminareo.'
mg1865::mg_9::12::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy mihaino ny tenin''i Jehovah kosa ianareo, fa mandà ny didiny, dia hamely anareo ny tanan''i Jehovah tahaka ny namelezany ny razanareo.'
mg1865::mg_9::12::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mitsangàna ankehitriny, ka jereo izao zavatra lehibe hataon''i Jehovah eto imasonareo izao:'
mg1865::mg_9::12::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy taom-pijinjana vary tritika va izao? Hiantso an''i Jehovah aho, ary hahatonga kotrokorana sy orana Izy, dia ho hitanareo sy ho fantatrareo fa lehibe ny ratsy nataonareo teo imason''i Jehovah, satria nangataka mpanjaka ianareo.'
mg1865::mg_9::12::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela niantso an''i Jehovah, ary Jehovah nahatonga kotrokorana sy orana tamin''izany andro izany; ary ny vahoaka rehetra dia natahotra an''i Jehovah sy Samoela indrindra.'
mg1865::mg_9::12::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny vahoaka rehetra tamin''i Samoela: Mangataha amin''i Jehovah Andriamanitrao ho an''ny mpanomponao, Fandrao maty izahay! fa efa nanao izao ratsy Izao izahay ho fanampin''ny fahotanay rehetra, satria nangataka mpanjaka ho anay.'
mg1865::mg_9::12::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''ny vahoaka: Aza matahotra; efa nanao izany ratsy rehetra izany tokoa ianareo; kanefa aza mivily tsy hanaraka an''i Jehovah; fa manompoa Azy amin''ny fonareo rehetra.'
mg1865::mg_9::12::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, aza mivily; fa manaraka ireo zava-poana ianareo, izay tsy mahasoa na mahavonjy; fa zava-poana ireo.'
mg1865::mg_9::12::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah tsy hahafoy ny olony noho ny anarany lehibe, satria sitrak''i Jehovah ny nanaovany anareo ho olony.'
mg1865::mg_9::12::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amiko, sanatria raha hanota amin''i Jehovah aho ka hitsahatra tsy hangataka ho anareo; fa izaho hanoro anareo izay lalana tsara sy mahitsy.'
mg1865::mg_9::12::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa matahora an''i Jehovah ianareo, ka manompoa Azy marina amin''ny fonareo rehetra; fa eritrereto izao zavatra lehibe nataony ho anareo izao.'
mg1865::mg_9::12::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola manao ratsy ihany ianareo, dia haringana ianareo sy ny mpanjakanareo koa.'
mg1865::mg_9::13::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niadian''ny Isiraely indray tamin''ny Filistina, sy ny nahadiso an''i Saoly, ary ny nandavan''Andriamanitra azy'
  verse_text: 'Telo-polo taona Saoly, raha vao nanjaka; ary nanjaka roa taona tamin''ny Isiraely izy.'
mg1865::mg_9::13::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nifantina telo arivo lahy tamin''ny Isiraely, ka ny roa arivo lahy nitoetra teo aminy tany Mikmasy sy tany amin''ny tany havoan''i Betela, ary ny arivo lahy nitoetra teo amin''i Jonatana tany Gibean''ny Benjamina; fa ny olona sisa kosa samy nampodiny ho any an-dainy avy.'
mg1865::mg_9::13::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana namely ny miaramilan''ny Filistina, izay tany Geba, ary ren''ny Filistina izany. Ary Saoly nampitsoka anjomara teny amin''ny tany rehetra ka nanao hoe Aoka handre ny Hebreo.'
mg1865::mg_9::13::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ren''ny Isiraely rehetra fa efa namely ny miaramilan''ny Filistina Saoly, ka dia halan''ny Filistina ny Isiraely. Dia nivory ny olona hanaraka an''i Saoly ho any Gilgala.'
mg1865::mg_9::13::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina telo alina an-kalesy sy enina arivo an-tsoavaly ary vahoaka betsaka tahaka ny fasika eny amoron-dranomasina dia nivory hiady tamin''ny Isiraely; dia nandeha izy ka nitoby tany Mikmasy atsinanan''i Betavena.'
mg1865::mg_9::13::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny lehilahy amin''ny Isiraely fa poritra izy (fa efa ory indrindra ny olona), dia nijery tany an-johy sy tany amin''ny kirihitrala sy tany, amin''ny harambato sy tany amin''ny fierena ary tany amin''ny lavaka famorian-drano izy.'
mg1865::mg_9::13::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Hebreo sasany dia lasa nita an''i Jordana nankany amin''ny tany Gada sy Gileada. Fa Saoly mbola tany Gilgala ihany, ary ny vahoaka rehetra nanaraka azy, nefa toran-kovitra be ihany.'
mg1865::mg_9::13::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niandry hafitoana izy araka ny fotoana nataon''i Samoela; fa Samoela tsy mbola tonga tany Gilgala; ary ny olona niely nandao an''i Saoly.'
mg1865::mg_9::13::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Ento ety amiko ny fanatitra dorana sy ny fanati-pihavanana; ka dia nanatitra ny fanatitra dorana izy.'
mg1865::mg_9::13::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa vita ny nanaterany ny fanatitra dorana, indro, tamy Samoela, ary nivoaka hitsena azy Saoly mba hiarahaba azy.'
mg1865::mg_9::13::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Samoela: Inona no nataonao? Ary hoy Saoly: Raha hitako fa niely nandao ahy ny olona, sady tsy tonga tamin''ny fotoana ianao, ary tafangona tany Mikmasy ny Filistina,'
mg1865::mg_9::13::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy izaho: Hidina amin''izao ny Filistina hamely ahy aty Gilgala, nefa tsy mbola nanao fifonana tamin''i Jehovah aho; dia sahy ihany aho ka nanatitra ny fanatitra dorana.'
mg1865::mg_9::13::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''i Saoly: Nanao adala ianao; tsy nitandrina ny didin''i Jehovah Andriamanitrao izay nandidiany anao ianao; fa raha tsy izany, ankehitriny Jehovah dia ho nampitoetra ny fanjakanao amin''ny Isiraely ho mandrakizay.'
mg1865::mg_9::13::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao dia tsy haharitra ny fanjakanao; Jehovah efa nitady lehilahy ho Azy araka ny fony, ary izay no voatendrin''i Jehovah ho mpanapaka ny olony, satria tsy nitandrina izay nandidian''i Jehovah anao ianao.'
mg1865::mg_9::13::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: '2022-12-17T08:41:01+0000'
  verse_title: null
  verse_text: 'Dia niainga Samoela ka niala tany Gilgala hankany Gibean''ny Benjamina. Ary Saoly nandamina ny olona izay teo aminy, dia tokony ho enin-jato lahy ireny.'
mg1865::mg_9::13::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny nampahorian''ny Filistina ny Isiraely, sy ny nahasahian''i Jonatana namely azy'
  verse_text: 'Ary raha mbola nitoetra tany Gibean''ny Benjamina Saoly sy Jonatana zanany sy ny vahoaka teo amin''izy roa lahy, ary ny Filistina kosa nitoby, tany Mikmasy.'
mg1865::mg_9::13::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nivoaka nanao telo toko ny mpandrava avy teo amin''ny tobin''ny Filistina: ny iray toko nizotra tamin''ny lalana mankany Ofra ho any amin''ny tany Solala;'
mg1865::mg_9::13::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny iray toko nizotra ho any amin''ny lalana mankany Beti-horona; ary ny iray toko kosa nizotra ho any amin''ny lalana mankany amin''ny faritany manatrika ny lohasaha Zeboima tandrifin''ny efitra.'
mg1865::mg_9::13::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teny amin''ny tanin''ny Isiraely rehetra tsy nisy mpanefy; fa hoy ny Fifistina: Andrao manefy sabatra na lefona ny Hebreo.'
mg1865::mg_9::13::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia samy nidina ho any amin''ny Filistina ny Isiraely rehetra hanasa ny fangadiny sy ny fiasàny sy ny famakiny ary ny fihadia-taniny.'
mg1865::mg_9::13::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nanana tsofa ihany izy handranitany ny fihadian-tany sy ny fiasïna sy ny telorantsana sy ny famaky ary handranitany ny fanindronan-omby.'
mg1865::mg_9::13::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro niadiana dia tsy nisy sabatra na lefona hita teny an-tanan''ny vahoaka rehetra izay eo amin''i Saoly sy Jonatana; fa tamin''i Saoly sy Jonatana zanany ihany no nisy.'
mg1865::mg_9::13::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny avy tao amin''ny miaramilan''ny Filistina nivoaka ho ao amin''ny hadilanana mankany. Mikmasy.'
mg1865::mg_9::14::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny indray andro dia hoy Jonatana, zanak''i Saoly, tamin''ny zatovo, mpitondra ny fiadiany: Andeha isika hankany amin''ny miaramilan''ny Filistina izay ery an-dafy ery. Nefa tsy nilaza tamin-drainy izy.'
mg1865::mg_9::14::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nitoetra tao an-tsisin''i Gibea teo ambanin''ny hazo ampongabendanitra any Migrona; ary ny vahoaka teo aminy dia tokony ho enin-jato lahy;'
mg1865::mg_9::14::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary teo koa nisalotra efoda Ahia, zanak''i Ahitoba, rahalahin''i Ikaboda, zanak''i Finehasa, zanak''i Ely, mpisoron''i Jehovah tany Silo. Fa tsy fantatry ny olona fa lasa Jonatana.'
mg1865::mg_9::14::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo an-daniny roa teo an-tenatenan''ny hadilanana izay nitadiavan''i Jonatana hankanesana ao amin''ny miaramilan''ny Filistina dia nisy harambato kitso loha: ny anaran''ny anankiray dia Bozeza, ary ny anaran''ny anankiray kosa Sene.'
mg1865::mg_9::14::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny iray amin''ireo harambato ireo dia nijoro avo teo andaniny avaratra manandrify an''i Mikmasy, ary ny iray kosa nijoro avo teo atsimo manandrify an''i Gibea.'
mg1865::mg_9::14::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana tamin''ny zatovo, mpitondra ny fiadiany: Andeha isika hankany amin''ny miaramilan''ireo tsy mifora ireo; angamba homba antsika Jehovah, fa tsy misy mahasakana an''i Jehovah tsy hamonjy, na amin''ny maro, na amin''ny vitsy.'
mg1865::mg_9::14::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy kosa ny mpitondra ny fiadiany taminy: Ataovy izay rehetra ao am-ponao; mandrosoa ihany; indro, hanaraka anao aho araka ny sitraponao.'
mg1865::mg_9::14::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana: Indro, handroso ho amin''ireo olona ireo isika ka hiseho aminy.'
mg1865::mg_9::14::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hoy izy: Andraso mandra-pahatonganay any aminareo, dia hitoetra ao amin''izay itoerantsika ihany isika ka tsy hiakatra eny aminy.'
mg1865::mg_9::14::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hoy kosa izy: Miakara ety aminay, dia hiakatra isika, fa efa natolotr''i Jehovah eo an-tanantsika izy; ary izany no ho famantarana ho antsika.'
mg1865::mg_9::14::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niseho tamin''ny miaramilan''ny Filistina izy roa lahy, ary hoy ny Filistina: Indreo, misy Hebreo mifongatra avy any an-davaka niereny.'
mg1865::mg_9::14::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramila namaly an''i Jonatana sy ny mpitondra ny fiadiany hoe: Miakara ety aminay, dia hanehoanay zavatra ianareo. Ary hoy Jonatana tamin''ny mpitondra ny fiadiany: Manaraha ahy, fa efa natolotr''i Jehovah eo an-tanan''ny Isiraely izy.'
mg1865::mg_9::14::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana nananika, nandady tongotra aman-tanana, ary nanaraka azy ny mpitondra ny fiadiany. Dia lavo teo anatrehan''i Jonatana ny Filistina, ary ny mpitondra ny fiadiany namono teo aoriany.'
mg1865::mg_9::14::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tokony ho roa-polo lahy no matiny aloha, izay novonoin''i Jonatana sy ny mpitondra ny fiadiany tao anatin''ny tany tokony ho antsasaky ny vavasa iray akera.'
mg1865::mg_9::14::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nisy hovitra tao amin''ny toby tany an-tsaha sy tamin''ny vahoaka rehetra; ary ny teo amin''ny miaramila sy ny mpandrava nangovitra koa, ary nihorohoro ny tany, ka dia nisy fampangovitana avy tamin''Andriamanitra.'
mg1865::mg_9::14::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpitilin''i Saoly ao Gibean''ny Benjamina dia nitazana, ka, indro, niely ny vahoaka sady nifanaritaka be ihany.'
mg1865::mg_9::14::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny nanenjehan''i Saoly sy ny Isiraely ny Filistina, sy ny nampianianan''i Saoly ny olona, ary ny zavatra niseho avy tamin''izany'
  verse_text: 'Ary hoy Saoly tamin''ny olona teo aminy: Alaharo, ka izahao izay niala tamintsika. Ary nony voalahatra ny olona, dia Jonatana sy ny mpitondra ny fiadiany no tsy teo.'
mg1865::mg_9::14::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''i Ahia: Ento ety ny fiaran''Andriamanitra (fa teo amin''ny Zanak''Isiraely ny fiaran''Andriamanitra fahizany*). [*Na: Ento ety ny efoda. (Fa nisalotra ny efoda teo anatrehan''ny Isiraely izy fahizany.)]'
mg1865::mg_9::14::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Saoly mbola niresaka tamin''ny mpisorona, dia nandroso sy nitombo ny tabataba tery an-tobin''ny Filistina. Ary hoy Saoly tamin''ny mpisorona: Aoka ihany.'
mg1865::mg_9::14::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly sy ny vahoaka rehetra izay teo aminy nivory, ka dia tonga tany amin''ny ady izy, ary indreo ny Filistina nifamely tamin''ny sabany, dia izy samy izy, ka nifanaritaka be ihany.'
mg1865::mg_9::14::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Hebreo izay teo amin''ny Filistina taloha ka niara-niakatra taminy ho any an-toby avy tamin''ny tany manodidina dia nikambana tamin''ny Isiraely izay teo amin''i Saoly sy Jonatana koa.'
mg1865::mg_9::14::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy rehetra amin''ny Isiraely izay niery tany amin''ny tany havoan''i Efraima, raha nandre ny nandosiran''ny Filistina, dia nanenjika azy fatratra koa tamin''ny ady.'
mg1865::mg_9::14::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah namonjy ny Isiraely tamin''izany andro izany; ary tafahoatra any Betavena ny ady.'
mg1865::mg_9::14::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ory ny lehilahy amin''ny Isiraely tamin''izany andro izany, nefa Saoly efa nampianiana ny olona hoe: Ho voaozona anie izay olona homan-kanina anio tontolo andro mandra-pamaliko ny fahavaloko. Dia tsy nisy olona nitendry hanina na dia iray akory aza.'
mg1865::mg_9::14::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra amin''ny tany* dia niditra ny ala; ary nisy tantely teny ambonin''ny tany. [*Hebreo: ny tany rehetra]'
mg1865::mg_9::14::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo anaty ala ny olona, indro, nisy tantely nitsororoka; fa tsy nisy olona sahy nanainga ny tanany ho amin''ny vavany, fa natahotra ny fianianana izy.'
mg1865::mg_9::14::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jonatana kosa tsy nandre ny nampianianan-drainy ny olona; koa dia narosony ny loha-tehiny teny an-tanany ka natsobony teo amin''ny tantely, ary nataony teo am-bavany ny tanany, ka dia nazava ny masony.'
mg1865::mg_9::14::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olona anankiray niteny taminy ka nanao hoe: Rainao anie ka efa nampianiana mafy ny olona hoe: Ho voaozona anie izay olona homan-kanina anio; ka efa reraka ny olona.'
mg1865::mg_9::14::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jonatana: Ikaky efa nampiditra loza tamin''ny tany; koa jereo, masïna ianareo, he! izato fahazavan''ny masoko tamin''ilay nanandramako kely tamin''ity tantely ity.'
mg1865::mg_9::14::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka mainka fa raha navela hihinanan''ny olona ny babo azony tamin''ny fahavalony, tsy ho nahafatesana be lavitra va ny Filistina?'
mg1865::mg_9::14::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo namely ny Filistina tamin''izany andro izany hatrany Mikmasy ka hatrany Aialona, ary reraka indrindra ny olona.'
mg1865::mg_9::14::32:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanaovan''ny olona an-kazakazaka ny babo, ka naka ondry aman''osy sy omby ary zanak''omby izy, dia namono azy teo amin''ny tany, ka dia nohanin''ny olona mbamin''ny ràny.'
mg1865::mg_9::14::33:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanambara tamin''i Saoly hoe: Indro, ny olona manota amin''i Jehovah, fa mihinana zavatra mbamin''ny ràny izy. Ary hoy Saoly: Efa diso ianareo, manakodiava vato lehibe ety amiko anio.'
mg1865::mg_9::14::34:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy: Mieleza eny amin''ny olona ianareo, ka lazao aminy hoe: Samia mitondra ny ombiny ety amiko, ary samia mitondra ny ondriny, ka vonoy eto izy, dia hano, ary aza manota amin''i Jehovah amin''ny fihinanana zavatra mbamin''ny ràny. Ary ny vahoaka rehetra samy nitondra ny ombiny niaraka taminy tamin''izany alina izany ka namono azy teo.'
mg1865::mg_9::14::35:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nanao alitara ho an''i Jehovah; io no alitara voalohany naoriny ho an''i Jehovah.'
mg1865::mg_9::14::36:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Andeha isika hidina hanenjika ny Filistina anio alina ka hamabo azy ambara-pahazavan''ny andro, ary tsy hasiantsika miangana izy. Dia hoy ny olona: Ataovy izay sitrakao. Fa hoy ny mpisorona: Andeha isika hanatona an''Andriamanitra etoana.'
mg1865::mg_9::14::37:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nanontany tamin''Andriamanitra hoe: Hidina hanenjika ny Filistina va aho? Hatolotrao eo an-tanan''ny Isiraely va izy? Fa tsy namaly azy akory Izy androtr''iny.'
mg1865::mg_9::14::38:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Manatona ety, ianareo loholona rehetra, ary fantaro ka izahao izay nahatonga izao fahotana androany izao?'
mg1865::mg_9::14::39:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha velona koa Jehovah, Izay Mpamonjy ny Isiraely, dia na amin''i Jonatana zanako aza no hahitana izany, dia ho faty tokoa izy. Fa tsy nisy namaly azy ny vahoaka rehetra.'
mg1865::mg_9::14::40:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy kosa izy tamin''ny Isiraely rehetra: Ianareo no aoka ho an-daniny, ary izaho sy Jonatana zanako kosa ho an-daniny. Ary hoy ny vahoaka tamin''i Saoly: Ataovy izay sitrakao.'
mg1865::mg_9::14::41:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''i Jehovah, Andriamanitry ny Isiraely: Asehoy izay marina. Ary Jonatana sy Saoly no notanany, fa afaka ny olona.'
mg1865::mg_9::14::42:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly; Manaova filokana ny amiko sy Jonatana zanako. Ary Jonatana no notanany.'
mg1865::mg_9::14::43:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''i Jonatana: Ambarao amiko izay nataonao. Ary Jonatana nanambara taminy hoe: Nanandrana tantely kely monja tamin''ny tendron''ny tehina tety an-tanako aho, ary, indro, tsy maintsy ho faty aho.'
mg1865::mg_9::14::44:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly: Hataon''Andriamanitra toy izany anie, eny mihoatra noho izany aza, raha tsy hatao maty tokoa ianao, ry Jonatana.'
mg1865::mg_9::14::45:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho ny vahoaka tamin''i Saoly : Ho faty va Jonatana, izay nanao izao famonjena lehibe izao tamin''ny Isiraely? Sanatria izany! Raha velona koa Jehovah, tsy hisy na dia ny singam-bolony iray akory aza ho latsaka amin''ny tany, fa niara-niasa tamin''Andriamanitra izy androany. Ary ny vahoaka namonjy an''i Jonatana, ka dia tsy maty izy.'
mg1865::mg_9::14::46:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly niakatra rehefa avy nanenjika ny Filistina; ary ny Filistina kosa dia lasa nankany amin''ny taniny.'
mg1865::mg_9::14::47:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 47
  verse_date_revised: null
  verse_title: 'Ny ady nataon''i Saoly, sy ny filazana ny amin''ny taranany'
  verse_text: 'Ary Saoly nahazo ny fanjakan''Isiraely ary niady tamin''ny fahavalony rehetra manodidina, dia tamin''ny Moaba sy ny taranak''i Amona sy ny Edomita sy ny mpanjakan''i Zoba ary ny Filistina; ary izay nalehany rehetra dia resiny avokoa.'
mg1865::mg_9::14::48:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namory miaramila izy, dia namely ny Amalekita ka namonjy ny Isiraely tamin''ny tanan''izay namaboazy.'
mg1865::mg_9::14::49:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no zanakalahin''i Saoly: Jonatana sy Jisvy sy Malkisoa; izao kosa no anaran''ny zananivavy roa: ny anaran''ny vavimatoa Meraba, ary ny anaran''ny faravavy Mikala.'
mg1865::mg_9::14::50:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anaran''ny vadin''i Saoly dia Ahinoama, zanakavavin''i Ahimaza: ary ny anaran''ny komandin''ny miaramilany dia Abnera, zanak''i Nera, rahalahin-drain''i Saoly.'
mg1865::mg_9::14::51:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Kisy no rain''i Saoly; ary Nera, rain''i Abnera, dia zanak''i Abiela.'
mg1865::mg_9::14::52:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 14
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mafy ny ady tamin''ny Filistina tamin''ny andron''i Saoly rehetra; koa raha nisy olona matanjaka sy mahery hitan''i Saoly, dia nalainy ho azy.'
mg1865::mg_9::15::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy nahatanterahan''i Saoly ny tenin''Andriamanitra ny amin''ny handringanana ny Amalekita, sy ny nandavan''Andriamanitra azy tamin''izany'
  verse_text: 'Ary hoy Samoela tamin''i Saoly: Jehovah naniraka ahy hanosotra anao ho mpanjakan''ny Isiraely olony; koa ankehitriny mihainoa ny tenin''i Jehovah ianao.'
mg1865::mg_9::15::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Hovaliako izay nataon''ny Amalekita tamin''ny Isiraely, dia ny nanotrehany azy tany an-dàlana, fony izy niakatra avy tany Egypta.'
mg1865::mg_9::15::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mandehana ankehitriny, ka mameleza ny Amalekita, ary aringano* izay rehetra mety ho azy, ka aza asiana miangana, fa vonoy avokoa, na lahy na vavy, na ankizy madinika, na zaza minono, na omby, na ondry aman''osy, na rameva, na boriky. [*Hebreo: ataovy herema]'
mg1865::mg_9::15::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly namory ny olona ka nandamina azy tao Telaima, dia roa hetsy ny mandeha an-tongotra, ary iray alina ny lehilahy amin''ny Joda.'
mg1865::mg_9::15::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly dia tonga tao an-tanànan''ny Amalekita ka nanotrika tao an-dohasaha.'
mg1865::mg_9::15::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''ny Kenita: Andeha miala ianareo, ka midìna hiala amin''ny Amalekita, fandrao miaraka aringako aminy ianareo, fa ianareo nanisy soa ny Zanak''Isiraely rehetra, fony izy nivoaka avy tany Egypta. Ka dia niala tamin''ny Amalekita ny Kenita.'
mg1865::mg_9::15::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly namely ny Amalekita hatrany Havila amin''ny lalana mankany Sora izay tandrifin''i Egypta.'
mg1865::mg_9::15::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary azony sambo-belona Agaga, mpanjakan''ny Amalekita, fa ny vahoaka rehetra kosa dia naringany* tamin''ny lelan-tsabatra. [*Hebreo: nataony herema]'
mg1865::mg_9::15::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Saoly sy ny olona tsy namono an''i Agaga sy izay tsara indrindra tamin''ny ondry aman''osy sy ny omby sy ny mifahy sy ny zanak''ondry ary izay tsara rehetra, fa tsy foiny ho naringana* ireny; fa ny ratsy rehetra sy izay tsy tiany kosa dia naringany* ihany avokoa. [*Hebreo: hatao herema]'
mg1865::mg_9::15::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tamin''i Samoela ny tenin''i Jehovah hoe:'
mg1865::mg_9::15::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manenina Aho noho ny nanaovako an''i Saoly ho mpanjaka, fa niala tamin''ny fanarahana Ahy izy ka tsy nahatanteraka ny teniko. Dia tezitra Samoela ka nitaraina tamin''i Jehovah mandritra ny alina.'
mg1865::mg_9::15::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifoha maraina koa Samoela hitsena an''i Saoly, dia nisy nilaza tamin''i Samoela hoe: Saoly efa tonga ato Karmela, ary, indro, izy nanorina fahatsiarovana ho azy, dia nihodina ka nandroso nidina ho any Gilgala.'
mg1865::mg_9::15::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela tonga teo amin''i Saoly, dia hoy Saoly taminy: Hotahin''i Jehovah anie ianao; efa nahatanteraka ny tenin''i Jehovah aho.'
mg1865::mg_9::15::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Samoela: Inona anefa izany fibarareoky ny ondry aman''osy ren''ny sofiko izany sy ny fimàmàn''ny omby reko?'
mg1865::mg_9::15::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Avy tany amin''ny Amalekita no nitondrany ireny, fa ny olona namela izay ondry aman''osy sy omby tsara indrindra mba hovonoina hatao fanatitra ho an''i Jehovah Andriamanitrao, fa ny sisa dia naringanay* ihany avokoa. [*Hebreo: nataonay herema]'
mg1865::mg_9::15::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Samoela tamin''i Saoly: Aoka izay, fa hambarako aminao izay nolazain''i Jehovah tamiko halina. Ary hoy izy taminy: Ambarao ary.'
mg1865::mg_9::15::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Samoela: Na dia noheverinao ho kely aza ny tenanao, moa tsy tonga lohan''ny firenen''Isiraely va? Ary Jehovah nanosotra anao ho mpanjakan''ny Isiraely;'
mg1865::mg_9::15::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jehovah naniraka anao ka nanao hoe: Mandehana, ka aringano* avokoa ny Amalekita mpanota, ary miadia aminy ambara-paharingany. [*Hebreo: ataovy herema]'
mg1865::mg_9::15::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nahoana ianao no tsy nihaino ny feon''i Jehovah, fa nanao an-kazakazaka tamin''ny babo ka nanao izay ratsy eo imason''i Jehovah?'
mg1865::mg_9::15::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Saoly tamin''i Samoela: Efa nihaino ny feon''i Jehovah ihany aho ka nandeha tamin''izay nanirahan''i Jehovah ahy ary nitondra an''i Agaga, mpanjakan''ny Amalekita, sady nandringana ny Amalekita rehetra.'
mg1865::mg_9::15::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nangalan''ny olona ondry aman''osy sy omby ny babo, dia izay soa avy tamin''ny zavatra haringana,1 mba hovonoina hatao fanatitra ho an''i Jehovah Andriamanitrao ao Gilgala.'
mg1865::mg_9::15::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: '2022-06-19T09:22:25+0000'
  verse_title: null
  verse_text: 'Fa hoy Samoela: Sitrak''i Jehovah moa ny fanatitra dorana sy ny fanatitra hafa alatsa-drà mihoatra noho ny mihaino ny feon''i Jehovah? He! ny manaraka no tsara noho ny fanatitra, ary ny mihaino no tsara noho ny saboran''ondrilahy.'
mg1865::mg_9::15::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny miodina dia toy ny heloka amin''ny fankatovana, ary ny ditra dia toy ny manompo sampy sy terafima. Satria nandà ny tenin''i Jehovah ianao, dia nolaviny tsy ho mpanjaka kosa.'
mg1865::mg_9::15::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''i Samoela: Efa nanota aho, fa efa nandika ny tenin''i Jehovah sy ny teninao; fa natahotra ny vahoaka aho ka nihaino ny feony.'
mg1865::mg_9::15::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, masïna ianao, mamelà ny heloko ary miverena amiko indray mba hiankohofako eo anatrehan''i Jehovah.'
mg1865::mg_9::15::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Samoela tamin''i Saoly: Tsy hiverina aminao aho; fa ianao efa nandà ny tenin''i Jehovah, ary Jehovah kosa efa nandà anao tsy ho mpanjakan''ny Isiraely intsony.'
mg1865::mg_9::15::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nihodina handeha Samoela, dia nohazonin''i Saoly ny sisin''akanjony ka triatra.'
mg1865::mg_9::15::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Samoela tamin''i Saoly: Efa notriarin''i Jehovah kosa ho afaka aminao androany ny fanjakan''Isiraely ka efa nomeny ny namanao izay tsara noho ianao.'
mg1865::mg_9::15::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ny Tokin''ny Isiraely tsy mba handainga na hanenina, fa tsy olona Izy ka hanenina.'
mg1865::mg_9::15::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Saoly: Efa nanota aho izao, kanefa, masïna ianao, mba omeo voninahitra eo anatrehan''ny loholoko sy eo anatrehan''ny Isiraely aho, ary andeha re hiara-miverina amiko indray mba hiankohofako eo anatrehan''i Jehovah Andriamanitrao.'
mg1865::mg_9::15::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela dia niverina nanaraka an''i Saoly indray ary Saoly niankohoka teo anatrehan''i Jehovah.'
mg1865::mg_9::15::32:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Samoela: Entonareo eto amiko Agaga, mpanjakan''ny Amalekita. Ary Agaga nankeo aminy sady falifaly ka nanao hoe: Lasa tokoa ny fangidian''ny fahafatesana.'
mg1865::mg_9::15::33:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Samoela: Toy ny tsy nampananan''ny sabatrao zanaka ny vehivavy no tsy hananan''ny reninao zanaka kosa ao amin''ny vehivavy. Dia notetitetehin''i Samoela teo anatrehan''i Jehovah tao Gilgala Agaga.'
mg1865::mg_9::15::34:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela nankany Rama; fa Saoly kosa niakatra tany amin''ny tranony tao Gibean''i Saoly.'
mg1865::mg_9::15::35:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela tsy namangy an''i Saoly intsony ambara-pahafatiny; fa Samoela nalahelo an''i Saoly. Ary Jehovah nanenina noho ny nanaovany an''i Saoly ho mpanjakan''ny Isiraely.'
mg1865::mg_9::16::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanosorana an''i Davida ho mpanjakan''ny Isiraely'
  verse_text: 'Ary hoy Jehovah tamin''i Samoela: Mandra-pahoviana no hahalahelovanao an''i Saoly, nefa Izaho efa nandà azy tsy ho mpanjakan''ny Isiraely? fenoy diloilo ny tandrokao, ka mandehana, fa hirahiko ho any amin''i Jese Betlehemita ianao; fa efa nahita mpanjaka ho Ahy ao amin''ny zanany Aho.'
mg1865::mg_9::16::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Samoela: Hataoko ahoana no fandeha; fa raha ren''i Saoly izany, moa tsy hovonoiny va aho? Ary hoy Jehovah: Mitondrà ombivavy kely ianao, ka lazao hoe: Avy hamono zavatra hatao fanatitra ho an''i Jehovah aho.'
mg1865::mg_9::16::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary antsoy Jese mba ho any amin''ny fanatitra, ary Izaho no hampahafantatra anao izay hataonao; ka dia hohosoranao ho Ahy izay holazaiko aminao.'
mg1865::mg_9::16::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela nanao izay nolazain''i Jehovah, dia tonga tao Betlehema. Ary nitsena azy amin-kovitra ny loholona teo an-tanàna ka nanao hoe: Fihavanana va no ihavianao?'
mg1865::mg_9::16::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Fihavanana; avy hamono zavatra hatao fanatitra ho an''i Jehovah aho; hamasino ny tenanareo, ary andeha hiaraka amiko ho any amin''ny fanatitra. Dia nohamasininy Jese sy ny zanany ka nasainy ho any amin''ny fanatitra.'
mg1865::mg_9::16::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ireo, dia nijery an''i Eliaba izy ka nanao hoe: Ny voahosotr''i Jehovah tokoa ity eto anatrehany.'
mg1865::mg_9::16::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jehovah tamin''i Samoela: Aza mijery ny tarehiny na ny hahavon''ny tsanganany, fa efa nolaviko izy; fa tsy mba toy ny fijerin''ny olona no fijerin''i Jehovah; fa ny olona mijery ny miseho eo ivelany, fa Jehovah kosa mijery ny fo.'
mg1865::mg_9::16::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jese niantso an''i Abinadaba ka nampandalo azy teo anatrehan''i Samoela. Fa hoy izy: Tsy ity no nofidin''i Jehovah.'
mg1865::mg_9::16::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jese dia nampandalo an''i Sama indray. Fa hoy izy: Tsy ity no nofidin''i Jehovah.'
mg1865::mg_9::16::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jese nampandalo fito lahy tamin''ny zanany teo anatrehan''i Samoela. Fa hoy Samoela tamin''i Jese: Tsy nofidin''i Jehovah ireto.'
mg1865::mg_9::16::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''i Jese: Tapitra eto avokoa va ny zanakao-lahy rehetra? Dia hoy izy: Ny faralahy no sisa, fa miandry ondry izy. Ary hoy Samoela tamin''i Jese: Maniraha haka azy, fa tsy hipetraka hihinana isika ambara-pahatongany eto.'
mg1865::mg_9::16::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka izy ka nitondra azy hiditra. Ary mena volo* izy sady bary maso no tsara tarehy. Ary hoy Jehovah: Mitsangàna, hosory izy, fa io no izy. [*Na: tendron-tava]'
mg1865::mg_9::16::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Samoela nandray ny tandroka feno diloilo ka nanosotra azy teo amin''ny rahalahiny; ary ny Fanahin''i Jehovah dia nilatsaka tamin''i Davida hatramin''iny andro iny. Dia nitsangana Samoela ka nankany Rama.'
mg1865::mg_9::16::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Fanahin''i Jehovah efa niala tamin''i Saoly, ary nisy fanahy ratsy avy tany amin''i Jehovah nampahatahotra azy.'
mg1865::mg_9::16::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompon''i Saoly taminy: Indro, ankehitriny misy fanahy ratsy avy any amin''Andriamanitra mampahatahotra anao.'
mg1865::mg_9::16::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny tomponay ankehitriny handidy anay mpanomponao izay eto anatrehanao, dia hitady olona mahay mitendry lokanga izahay; ary rehefa misy fanahy ratsy avy any amin''Andriamanitra tonga aminao, dia hitendry amin''ny tanany izy, ka dia ho tsara ihany ianao.'
mg1865::mg_9::16::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''ny mpanompony: Mizahà ary olona izay mahay mitendry tsara, ka ento ety amiko.'
mg1865::mg_9::16::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ny anankiray amin''ny zatovony ka nanao hoe: Indro, ny anankiray amin''ny zanak''i Jese Betlehemita no hitako mahay mitendry, sady lehilahy mahery sy mpanafika izy ary mahay mandaha-teny sy lehilahy tsara tarehy, ary Jehovah momba azy.'
mg1865::mg_9::16::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly dia naniraka tany amin''i Jese ka nanao hoe: Iraho hankaty amiko Davida zanakao izay miandry ondry.'
mg1865::mg_9::16::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jese naka mofo tokony ho zakan''ny boriky iray sy divay iray siny hoditra sy zanak''osy, ka nampitondrainy an''i Davida zanany ho an''i Saoly ireo.'
mg1865::mg_9::16::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida tonga tany amin''i Saoly ka nitoetra teo anatrehany; ary tiany indrindra izy, ka dia tonga mpitondra ny fiadiany.'
mg1865::mg_9::16::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly naniraka tany amin''i Jese nanao hoe: Masïna ianao, avelao Davida hitoetra eo anatrehako, fa efa mahita fitia amiko izy.'
mg1865::mg_9::16::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nisy fanahy avy tany amin''Andriamanitra tonga tao amin''i Saoly, dia noraisin''i Davida ny lokanga ka notendren''ny tanany; ka dia velombelona sady nanaritra Saoly, ary ny fanahy ratsy niala taminy.'
mg1865::mg_9::17::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Davida sy Goliata'
  verse_text: 'Ary ny Filistina namory ny miaramilany hiady, ka tafavory tao Soko any Joda izy ary nitoby teo anelanelan''i Soko sy Azeka, dia tao Efesa-damima.'
mg1865::mg_9::17::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly sy ny lehilahy amin''ny Isiraely dia tafavory ka nitoby teo amin''ny lohasaha Elaha ary nilahatra hiady amin''ny Filistina.'
mg1865::mg_9::17::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina dia teo am-pita teo amin''ny tendrombohitra iray, ary ny Isiraely kosa teo am-pita teo amin''ny tendrombohitra iray, ary lohasaha no elanelany.'
mg1865::mg_9::17::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy iray mpihantsy ady nivoaka avy teny amin''ny tobin''ny Filistina, Goliata avy any Gata no anarany; enina hakiho sy irain-jehy no halavany'
mg1865::mg_9::17::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisatroka fiarovan-doha varahina izy, ary niakanjo fiarovan-tratra*, ka ny lanjan''ny akanjony varahina dia dimy arivo sekely. [*Vy na varahina nifanindritsindry lany tahaka ny kiran''ny hazan-drano]'
mg1865::mg_9::17::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fiarovan-dranjo varahina tamin''ny tongony izy ary lefom-pohy varahina teo an-damosiny.'
mg1865::mg_9::17::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny haben''ny zaran-defony dia tahaka ny vodi-tenon''ny mpanenona; ary ny lela-lefony dia vy lanjan-tsekely enin-jato; ary nisy nitondra ny ampinga lehibe nandeha teo alohany.'
mg1865::mg_9::17::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nijanona izy, dia niantso ny miaramilan''ny Isiraely ka nanao taminy hoe: Nahoana ianareo no mivoaka hilahatra hiady? Tsy Filistina va aho, ary ianareo kosa mpanompon''i Saoly? Mifidiana lehilahy iray ianareo, ary aoka izy hidina ety amiko.'
mg1865::mg_9::17::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tàhiny maharesy ahy izy ka mahafaty ahy, dia ho mpanomponareo izahay; fa raha resiko kosa izy ka matiko, dia ho mpanomponay ianareo ka hanompo anay.'
mg1865::mg_9::17::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay Filistina: Izaho efa nihaika ny miaramilan''ny Isiraely androany; amoahy lehilahy iray aho hiady amiko.'
mg1865::mg_9::17::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ren''i Saoly sy ny Isiraely rehetra izany tenin''ilay Filistina izany, dia nivadi-po izy ka raikitahotra loatra.'
mg1865::mg_9::17::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia zanak''ilay Efratita avy any Betlehema-joda atao hoe Jese, izay nanana zanaka valo mirahalahy; ary Jese dia efa zokiolona sy anti-panahy tamin''ny andron''i Saoly;'
mg1865::mg_9::17::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny zokiny telo lahy tamin''ny zanak''i Jese lasa nanaraka an''i Saoly nankany an-tafika; ary ny anaran''ny zanany telo lahy lasa nankany an-tafika dia Eliaba, lahimatoa, sy Abinadaba, lahiaivo, ary Sama no fahatelony;'
mg1865::mg_9::17::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Davida no faralahy; ary izy telo lahy zokiny lasa nanaraka an''i Saoly;'
mg1865::mg_9::17::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Davida kosa nivoivoy avy tany amin''i Saoly hiandry ny ondrin-drainy tany Betlehema.'
mg1865::mg_9::17::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay Filistina nanatona marain-tsy hariva ka niseho efa-polo andro.'
mg1865::mg_9::17::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jese tamin''i Davida zanany: Ento ity lango eran''ny efaha ity sy ireto mofo folo ireto ho an''ny rahalahinao; ka dia atero faingana ho any an-toby ho any amin''ny rahalahinao.'
mg1865::mg_9::17::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ento ho an''ny mpifehy arivony ireto fromazy didiny folo ireto, dia izahao na tsara ihany ny rahalahinao, na manao ahoana, ary itondray izay hahafantarako ny toeny aho.'
mg1865::mg_9::17::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly sy izy telo lahy mbamin''ny lehilahy rehetra amin''ny Isiraely dia teo amin''ny lohasaha Elaha niady tamin''ny Filistina.'
mg1865::mg_9::17::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha maraina koa Davida ka namela ny ondriny hotandreman''olona, ary naka ny entany izy ka lasa nandeha araka ny nandidian''i Jese azy; ary tonga teo amin''ny sehatra-sariety izy; ary ny antokon''ny miaramila izay efa hivoaka hilahatra dia nanakora hiady tamin''izay.'
mg1865::mg_9::17::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Isiraely sy ny Filistina efa nilahatra hiady ka nifanatrika ny miaramila.'
mg1865::mg_9::17::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namela ny entany teo anilan''ny mpiambina entana, dia nihazakazaka nankeny amin''ny laharan''ny miaramila, ary tonga ka nanontany ny amin''izay toetry ny rahalahiny.'
mg1865::mg_9::17::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niresaka taminy izy, indro, tamy niakatra avy teo amin''ny laharan''ny miaramilan''ny Filistina ilay mpihantsy ady, lehilahy Filistina avy any Gata, Goliata no anarany; ary niteny tahaka ny teo aloha ihany izy ka ren''i Davida.'
mg1865::mg_9::17::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny lehilahy rehetra amin''ny Isiraely, raha nahita io lehilahy io, dia nandositra azy, fa natahotra indrindra izy.'
mg1865::mg_9::17::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny lehilahy amin''ny Isiraely: Efa hitanareo va io lehilahy miakatra io? Hihaika ny Isiraely no iakarany; koa izay lehilahy mahafaty io dia hataon''ny mpanjaka manan-karem-bevava, ary dia homeny koa ny zananivavy ho vadiny, sady tsy hampandoavin-ketra amin''ny Isiraely ny tarana-drainy.'
mg1865::mg_9::17::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''ny olona teo anilany: Ahoana sy ahoana ange no hatao amin''izay lehilahy mahafaty io Filistina io ka mahafa-tondromaso ny Isiraely? Fa zinona moa io Filistina tsy mifora io, no dia hihaika ny miaramilan''Andriamanitra velona?'
mg1865::mg_9::17::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona namaly hoe: Izany ka izany no hatao amin''izay lehilahy mahafaty azy.'
mg1865::mg_9::17::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Eliaba zokiny nandre azy niteny tamin''ny olona dia nirehitra tamin''i Davida ny fahatezerany, ka hoy izy: Nahoana ianao no midina ety? Ary amin''iza moa no namelanao ireny ondry vitsy ireny any an''efitra? fantatro ny avonavonao sy ny faharatsian''ny fonao, fa hizaha ny ady no idinanao ety.'
mg1865::mg_9::17::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida: Moa maninona aho izao? Mba miteny aho, ka nahoana moa?'
mg1865::mg_9::17::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niala teo aminy hankany amin''ny sasany koa izy ka niteny tahaka ny teo; ary ny olona namaly azy tahaka ny teo ihany indray.'
mg1865::mg_9::17::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny olona ny teny izay nataon''i Davida, dia nambarany tamin''i Saoly; ka dia naniraka naka azy izy.'
mg1865::mg_9::17::32:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Saoly: Aoka tsy ho ketraka amin''ilehio ny fon''ny olona; fa ny mpanomponao handeha hiady amin''io Filistina io.'
mg1865::mg_9::17::33:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Saoly tamin''i Davida: Tsy tohanao ny handeha hiady amin''io Filistina io, satria mbola zaza ianao, fa izy efa mpiady hatrizay niainany.'
mg1865::mg_9::17::34:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida tamin''i Saoly: Ny mpanomponao niandry ny ondrin-drainy, ary nisy liona sy bera tonga tao ka nahalasa zanak''ondry teo amin''ny ondry,'
mg1865::mg_9::17::35:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanenjika azy aho ka namely azy, ary azoko teny am-bavany ilay zanak''ondry; ary nony handramatra ahy izy, dia nohazoniko tamin''ny somony, ary nasiako ka matiko.'
mg1865::mg_9::17::36:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny liona sy ny bera samy novonoin''ny mpanomponao; ary io Filistina tsy mifora io dia ho tahaka ny anankiray amin''ireny, satria nihaika ny miaramilan''Andriamanitra velona izy.'
mg1865::mg_9::17::37:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Davida; Jehovah, Izay namonjy ahy tamin''ny tanan''ny liona sy ny bera, Izy no hamonjy ahy amin''ny tanan''io Filistina io. Dia hoy Saoly tamin''i Davida; Mandehana, ary homba anao anie Jehovah.'
mg1865::mg_9::17::38:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nampiakanjo an''i Davida ny akanjo fiadiany ary nanisy fiarovan-doha varahina tamin''ny lohany sy nampiakanjo azy akanjo fiarovan-tratra*. [*Vy na varahina nifanindritsindry lany tahaka ny kiran''ny hazan-drano]'
mg1865::mg_9::17::39:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namehy ny sabany tamin''ny akanjo fiadiany, dia nanandrana handeha; fa tsy mbola nahazatra azy izany, ka hoy izy tamin''i Saoly: Tsy afa-mandeha amin''ireto aho, fa tsy mbola nahazatra ahy; ary dia nesorin''i Davida izany.'
mg1865::mg_9::17::40:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra ny tehiny teny an-tanany izy sady nifidy vato kilonjy dimy tao amin''ny lohasahan-driaka, ka nataony tao anatin''ny kitapo fitondran''ny mpiandry ondry, izay teny aminy, ary ny antsamotadiny koa teny an-tanany; dia nanatona ilay Filistina izy.'
mg1865::mg_9::17::41:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay Filistina nandroso nanatona an''i Davida, sady teo alohany ilay lehilahy mitondra ny ampinga lehibe.'
mg1865::mg_9::17::42:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nijerijery an''i Davida ilay Filistina ka nahita azy, dia nianjonanjona taminy, fa tanora izy sady mena volo* no tsara tarehy. [*Na: tendron-tava]'
mg1865::mg_9::17::43:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay Filistina tamin''i Davida: Alika angaha aho, no hatonin''ialahy amin''ny tehina? Ary nanozona an''i Davida tamin''ireo andriamaniny ilay Filistina'
mg1865::mg_9::17::44:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanao tamin''i Davida hoe: Avia ety amiko, dia homeko ny voro-manidina sy ny bibi-dia ny nofon''ialahy.'
mg1865::mg_9::17::45:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Davida tamin''ilay Filistina: Ianao manatona ahy amin''ny sabatra sy ny lefona ary ny lefom-pohy; fa izaho kosa manatona anao amin''ny anaran''i Jehovah, Tompon''ny maro, Andriamanitry ny miaramilan''ny Isiraely, Izay efa nohaikainao.'
mg1865::mg_9::17::46:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anio no hanoloran''i Jehovah anao amin''ny tanako, ary hamely anao aho ka hanapaka ny lohanao, dia homeko ny voro-manidina sy ny bibi-dia ny fatin''ny miaramilan''ny Filistina anio, mba ho fantatry ny tany rehetra fa manana Andriamanitra tokoa ny Isiraely.'
mg1865::mg_9::17::47:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho fantatr''izao fiangonana rehetra izao fa tsy sabatra sy lefona no amonjen''i Jehovah; fa an''i Jehovah ny ady, ary hanolotra anareo ho eo an-tananay Izy.'
mg1865::mg_9::17::48:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niainga ilay Filistina ka nanatona hitsena an''i Davida, dia nandroso faingana Davida ka nihazakazaka ho eo amin''ny laharan''ny miaramila hitsena ilay Filistina.'
mg1865::mg_9::17::49:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 49
  verse_date_revised: '2022-08-08T08:07:16+0000'
  verse_title: null
  verse_text: 'Ary natsofok''i Davida tao an-kitapo ny tanany, ka naka vato tao izy, ka dia nalefany tamin''ny antsamotady, ka nahavoa ilay Filistina tamin''ny handriny, ary nilentika tamin''ny handriny ny vato, dia potraka niankohoka tamin''ny tany izy.'
mg1865::mg_9::17::50:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nandresen''i Davida ilay Filistina tamin''ny vaton''antsamotady, fa namely ilay Filistina izy ka nahafaty azy, ary tsy nisy sabatra teny an-tanan''i Davida.'
mg1865::mg_9::17::51:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihazakazaka Davida ka nitsangana teo anilan''ilay Filistina, dia nalainy ny sabatr''ilehio ka notsoahany tamin''ny tranony, dia namonoany azy, sy nanapahany ny lohany. Ary nony hitan''ny Filistina fa maty ilay lehilahy maheriny, dia vaky nandositra izy.'
mg1865::mg_9::17::52:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy amin''ny Isiraely sy ny Joda dia nitsangana ka nanakora sy nanenjika ny Filistina hatrany akaikin''i Gay* sy ny vavahadin''i Ekrona; ary izay voa tamin''ny Filistina dia niampatrampatra teny amin''ny lalana mankany Saraima ary hatrany Gata ka hatrany Ekrona. [*Na: (Gata)]'
mg1865::mg_9::17::53:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zanak''Isiraely niverina avy nanenjika mafy ny Filistina ka namabo ny tobiny koa.'
mg1865::mg_9::17::54:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ilay Filistina dia noraisin''i Davida ka nentiny tany Jerosalema; fa ny fiadiany napetrany tao amin''ny lainy.'
mg1865::mg_9::17::55:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 55
  verse_date_revised: null
  verse_title: 'Ny nitoeran''i Davida tao amin''i Saoly, sy ny nialonan''i Saoly azy'
  verse_text: 'Ary nony nahita an''i Davida nandeha hiady tamin''ny Filistina Saoly, dia hoy izy tamin''i Abnera, komandin''ny miaramila: Ry Abnera, zanak''iza moa iny zaza iny? Ary hoy Abnera: Raha velona koa ny ainao, ry mpanjaka, tsy fantatro velively.'
mg1865::mg_9::17::56:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Anontanionao na zanak''iza na zanak''iza iny zaza iny.'
mg1865::mg_9::17::57:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niverina avy namono ilay Filistina Davida, dia nalain''i Abnera izy ka nentiny teo anatrehan''i Saoly, ary mbola teny an-tanany ihany ny lohan''ilay Filistina.'
mg1865::mg_9::17::58:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 17
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly taminy: Zanak''iza moa ianao, ry zatovo? Ary hoy Davida: Zanak''i Jese Betlehemita mpanomponao aho.'
mg1865::mg_9::18::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitsahatra niteny tamin''i Saoly izy, dia raiki-pitia tamin''i Davida ny fanahin''i Jonatana, ka tia azy hoatra ny tenany mihitsy izy.'
mg1865::mg_9::18::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nandray azy tamin''izany andro izany ka tsy namela azy hody tany amin''ny tranon-drainy intsony.'
mg1865::mg_9::18::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy Jonatana nanao fanekena noho ny fitiavan''i Jonatana azy toy ny tenany.'
mg1865::mg_9::18::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nesorin''i Jonatana ny akanjony ivelany izay teny aminy ka nomeny an''i Davida mbamin''ny akanjo fiadiany sy ny sabany sy ny tsipïkany ary ny fehin-kibony koa aza.'
mg1865::mg_9::18::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanafika ka hita fa hendry tamin''izay rehetra nanirahan''i Saoly azy; ka dia nataon''i Saoly mpifehy ny miaramila izy sady nankasitrahan''ny vahoaka rehetra sy ny mpanompon''i Saoly koa.'
mg1865::mg_9::18::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny olona tamin''ny niverenan''i Davida avy namono ilay Filistina, dia nivoaka ny vehivavy avy tamin''ny tanànan''ny Isiraely rehetra ka nihira sy nandihy nitsena an''i Saoly mpanjaka tamin''ny ampongatapaka sy ny fifaliana ary ny kipantsona*. [*Na: varahina telo zoro]'
mg1865::mg_9::18::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vehivavy mpandihy dia nihira hoe: Saoly nahafaty arivoarivo; Fa Davida nahafaty alinalina.'
mg1865::mg_9::18::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra indrindra Saoly, fa tsy sitrany izany teny izany, ka hoy izy: Ny an''i Davida nataony alinalina lahy, fa ny ahy kosa nataony arivoarivo ihany; koa ny fanjakana ihany no sisa tsy mbola azony.'
mg1865::mg_9::18::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly hatramin''izany andro izany dia nangarika an''i Davida.'
mg1865::mg_9::18::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''iny dia nisy fanahy ratsy avy tany amin''Andriamanitra nilatsaka tamin''i Saoly, ka dia maola tao an-trano izy; ary Davida nitendry lokanga tamin''ny tanany tahaka ny fanaony isan''andro ihany, ary nisy lefona teny an-tanan''i Saoly.'
mg1865::mg_9::18::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natorak''i Saoly ny lefona; fa hoy izy: Hamely an''i Davida aho, ka hataoko miboroaka mihatra amin''ny rindrina. Fa Davida nisoroka indroa teo anatrehany.'
mg1865::mg_9::18::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly natahotra an''i Davida, satria Jehovah nomba azy, fa Saoly kosa efa nialany.'
mg1865::mg_9::18::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nesorin''i Saoly tsy ho eo aminy Davida, ary nataony mpifehy arivo, dia nitarika ny olona nivoaka sy niditra izy.'
mg1865::mg_9::18::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia hita fa hendry tamin''izay rehetra nataony, ary Jehovah nomba azy.'
mg1865::mg_9::18::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Saoly fa hendry dia hendry Davida, dia natahotra azy izy.'
mg1865::mg_9::18::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Isiraely sy ny Joda rehetra kosa tia an''i Davida, satria nitondra azy nivoaka sy niditra izy.'
mg1865::mg_9::18::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''i Davida: Indro homeko ho vadinao Meraba vavimatoako, koa mahereza ho ahy anefa ianao, ary miadia ny adin''i Jehovah. (Fa hoy Saoly: Aoka tsy ny tanako no hamely azy, fa aoka ny tanan''ny Filistina no hamely azy.)'
mg1865::mg_9::18::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida tamin''i Saoly: Zinona moa aho, ary manao ahoana no toetry ny mpianakavin''ny raiko ao amin''ny Isiraely, no ho vinanton''ny mpanjaka aho?'
mg1865::mg_9::18::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nony tamin''ny andro tokony ho namoahana an''i Meraba, zanakavavin''i Saoly, ho vadin''i Davida, dia nomena ho vadin''i Adriela Meholatita izy.'
mg1865::mg_9::18::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mikala, zanakavavin''i Saoly kosa tia an''i Davida; ary nisy nanambara izany tamin''i Saoly, ka sitrak''i Saoly izany.'
mg1865::mg_9::18::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa hoy Saoly: Homeko azy izy, mba ho fandrika aminy ka hamelezan''ny tanan''ny Filistina azy.) Dia hoy Saoly tamin''i Davida: Fanindroan''ny maha-vinantoko anao izao*. [*Na: Izy roa vavy izao dia samy maha-vinantoko anao avokoa]'
mg1865::mg_9::18::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nandidy ny mpanompony hoe: Miresaha mangingina amin''i Davida, ka ataovy hoe: Indro, tian''ny mpanjaka ianao, ary ny mpanompony rehetra tia anao; ka dia maneke ihany ho vinanton''ny mpanjaka ianao.'
mg1865::mg_9::18::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''i Saoly nilaza izany teny izany tamin''i Davida. Fa hoy Davida: Moa ataonareo ho zavatra kely izany ho vinanton''ny mpanjaka? Tsy hitanareo va fa izaho dia olona malahelo sady tsy manan-daza?'
mg1865::mg_9::18::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''i Saoly nilaza taminy hoe: Izany no navalin''i Davida.'
mg1865::mg_9::18::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly: Izao no holazainareo amin''i Davida: Ny mpanjaka tsy mila harena be ho vodiondry, fa ny mariky ny fahafatesan*''ny Filistina zato lahy ihany, mba ho famaliana ny fahavalony. Kanjo hevitr''i Saoly hahafaty an''i Davida amin''ny tanan''ny Filistina izany. [*Hebreo: saron-tsosoka]'
mg1865::mg_9::18::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nambaran''ny mpanompon''i Saoly tamin''i Davida izany teny izany, dia sitrak''i Davida ny ho vinanton''ny mpanjaka. Ary raha tsy mbola tapitra ny fetr''andro,'
mg1865::mg_9::18::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niainga Davida, ary nandeha izy sy ny olony ka nahafaty Filistina roan-jato, lahy ary Davida nitondra ny mariky ny fahafatesany* ka nanisa azy teo anatrehan''ny mpanjaka mba hahavinanton''ny mpanjaka azy. Dia nomen''i Saoly ho vadin''i Davida Mikala zananivavy. [*Hebreo: saron-tsotsoka]'
mg1865::mg_9::18::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nahita sy nahalala fa Jehovah nomba an''i Davida; ary Mikala zananivavy tia azy.'
mg1865::mg_9::18::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia vao mainka natahotra an''i Davida Saoly; ka dia tonga fahavalon''i Davida mandrakariva izy.'
mg1865::mg_9::18::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo andrianan''ny Filistina dia nanafika; ary isaky ny nanafika izy, dia Davida no hita fa hendry noho ny mpanompon''i Saoly rehetra, ka dia nisandratra ny anarany.'
mg1865::mg_9::19::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nifonan''i Jonatana ho an''i Davida, sy ny nitadiavan''i Saoly indray hahafaty azy, ary ny nandosiran''i Davida nankany amin''i Samoela'
  verse_text: 'Ary Saoly niresaka tamin''i Jonatana zanany sy tamin''ny mpanompony rehetra ny amin''izay hahafaty an''i Davida. Fa Jonatana, zanak''i Saoly, kosa tia dia tia an''i Davida.'
mg1865::mg_9::19::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana nanambara tamin''i Davida hoe: Saoly raiko mitady hamono anao; koa, masïna ianao, tandremo ny tenanao rahampitso maraina, ary mitoera amin''izay fitoerana mangingina, ka miere;'
mg1865::mg_9::19::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izaho hivoaka ka hitsangana eo anilan''ikaky amin''ny saha izay misy anao, dia hiresaka aminy ny aminao; koa izay hitako dia hambarako aminao.'
mg1865::mg_9::19::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana nilaza soa an''i Davida tamin''i Saoly rainy, ka hoy izy taminy: Aoka ny mpanjaka tsy hanisy ratsy an''i Davida mpanompony, fa izy tsy nanisy ratsy anao, sady nahasoa anao indrindra ny nataony,'
mg1865::mg_9::19::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izy efa nanao ny ainy tsy ho zavatra ka namono ny Filistina, ary Jehovah nahavita famonjena lehibe ho an''ny Isiraely rehetra; ianao nahita izany ka faly; koa nahoana no dia hanota handatsaka rà marina ianao ka hahafaty foana an''i Davida?'
mg1865::mg_9::19::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nihaino ny tenin''i Jonatana ka nianiana hoe: Raha velona koa Jehovah, dia tsy hatao maty izy.'
mg1865::mg_9::19::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana niantso an''i Davida ka nanambara izany rehetra Izany taminy, dia nitondra an''i Davida ho eo amin''i Saoly, ka dia nitoetra teo anatrehany tahaka ny teo aloha ihany indray izy.'
mg1865::mg_9::19::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola nisy ady ihany; dia nivoaka Davida ka niady tamin''ny Filistina ary nahafaty betsaka, ka dia nandositra azy ireny.'
mg1865::mg_9::19::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy fanahy ratsy avy tany amin''i Jehovah tonga tao amin''i Saoly, raha nipetraka tao an-tranony izy sy nitana ny lefony teny an-tanany; ary Davida nitendry lokanga tamin''ny tanany.'
mg1865::mg_9::19::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nikendry hamely an''i Davida tamin''ny lefona, ka hataony miboroaka mihatra amin''ny rindrina; fa izy nisoroka niala teo anatrehan''i Saoly, ka ny rindrina no voan''ny lefona; dia nandositra Davida ka afaka tamin''iny alina iny ihany.'
mg1865::mg_9::19::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly naniraka olona hankany amin''ny tranon''i Davida hiambina azy hahafaty azy raha maraina; fa Mikala, vadin''i Davida, nilaza taminy hoe: Raha tsy mamonjy ny ainao anio alina ianao, dia hatao maty raha maraina.'
mg1865::mg_9::19::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mikala nampidina an''i Davida tamin''ny varavarankely; ka dia lasa nandositra izy ka afaka.'
mg1865::mg_9::19::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nalain''i Mikala ny sampy*, dia napetrany teo amin''ny farafarany, ka nosaronany makarakara volon''osy ny lohany, dia norakofany ny lamba izy. [*Hebreo: terafima]'
mg1865::mg_9::19::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony naniraka haka an''i Davida Saoly, dia hoy ny vavy: Marary izy.'
mg1865::mg_9::19::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly naniraka ny olona hizaha an''i Davida indray ka nanao hoe: Ento miakatra aty amiko amin''ny farafara izy hovonoiko.'
mg1865::mg_9::19::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra ny iraka, kanjo, indro, ny sampy* no teo am-parafara, ary voasaron''ilay makarakara volon''osy ny lohany. [*Hebreo: terafima]'
mg1865::mg_9::19::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Saoly tamin''i Mikala: Nahoana ianao no namitaka ahy toy izany ka nandefa ny fahavaloko, ary afa-nandositra izy? Fa hoy Mikala tamin''i Saoly: Hoy izy tamiko: Avelao aho handeha, fandrao hovonoiko'
mg1865::mg_9::19::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandositra Davida ka afaka ary tonga tany amin''i Samoela tany Rama, dia nambarany azy izay rehetra nataon''i Saoly taminy; ary nandeha izy sy Samoela ka nonina tany Naiota.'
mg1865::mg_9::19::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanambara tamin''i Saoly hoe: Indro, Davida ao Naiota any Rama.'
mg1865::mg_9::19::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly naniraka olona hisambotra an''i Davida; ary nony hitan''ireo ny mpaminany tafangona sy maminany ary Samoela mitsangana eo ho lohany, dia tonga tamin''ny irak''i Saoly ny Fanahin''Andriamanitra. ka dia mba naminany koa izy.'
mg1865::mg_9::19::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nisy nanambara izany tamin''i Saoly, dia naniraka olon-kafa izy, ary ireo koa dia mba naminany. Ary Saoly naniraka olonkafa indray fanintelony, nefa naminany ihany koa ireo.'
mg1865::mg_9::19::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia lasa nankany Rama koa ny tenany, ary tonga tao amin''ny lavaka lehibe famorian-drano izay ao Seko izy ka nanontany hoe: Aiza Samoela sy Davida? Ary hoy ny anankiray: Indreo ao Naiota any Rama izy.'
mg1865::mg_9::19::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany Naiota any Rama Saoly, ary tonga tao aminy koa ny Fanahin''Andriamanitra, dia nandroso izy sady naminany teny am-pandehanana ambara-pahatongany tany Naiota any Rama.'
mg1865::mg_9::19::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanaisotra ny fitafiany koa izy ka mba naminany tahaka ny sasany teo anatrehan''i Samoela, ary izy nandry nitanjaka mandritra iny andro sy alina iny. Koa izany no nanaovan''ny olona hoe: Saoly koa moa mba isan''ny mpaminany?'
mg1865::mg_9::20::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny faran''ny nitadiavan''i Jonatana hampihavana an-drainy amin''i Davida'
  verse_text: 'Ary Davida nandositra niala tao Naiota any Rama, dia tonga ka nilaza teo anatrehan''i Jonatana hoe: Inona no nataoko? Inona no heloko? Ary inona no fahotako teo anatrehan-drainao, no dia mitady ny aiko izy?'
mg1865::mg_9::20::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Sanatria izany! Tsy ho faty ianao; indro, tsy misy tsy ambaran''ikaky ahy izay ataony na be na kely, ary hataon''ikaky ahoana no fanafina izany zavatra izany amiko? Tsy misy izany.'
mg1865::mg_9::20::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida mbola nianiana indray nanao hoe: Fantatry ny rainao marimarina fa efa mahita fitia eo imasonao aho, ka hoy izy: Aoka tsy ho fantatr''i Jonatana izany, fandrao malahelo izy; fa raha velona koa Jehovah, ary raha velona koa ny fanahinao, toa iray dia monja no anelanelako sy ny fahafatesana.'
mg1865::mg_9::20::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jonatana tamin''i Davida: Na inona na inona no angatahinao, dia hatàoko aminao izany.'
mg1865::mg_9::20::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Jonatana: Indro, ho tsinam-bolana rahampitso, ary izaho tokony hiara-mipetraka hihinana amin''ny mpanjaka; nefa avelao aho handeha hiery any an-tsaha ambara-pihavin''ny afaka ampitso harivariva.'
mg1865::mg_9::20::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha hitan''ny rainao fa tsy eo aho, dia ataovy hoe: Niera fatratra tamiko Davida mba hikaretsaka kely hankany Betlehema tanànany; fa misy fanatitra fanao amin''izy mianakavy rehetra isan-taona any.'
mg1865::mg_9::20::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha lazainy hoe: Tsara izany, dia fiadanana no ho an''ny mpanomponao; fa raha tezitra mafy kosa izy, dia aoka ho fantatrao tsara fa misy ratsy ifofoany ahy.'
mg1865::mg_9::20::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mamindrà fo amin''ny mpanomponao; fa nampanaovinao ny faneken''i Jehovah aminao ny mpanomponao; nefa raha manankeloka aho, dia aoka ianao ihany no hahafaty ahy, fa nahoana no ho entinao any amin''ny rainao aho?'
mg1865::mg_9::20::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jonatana: Sanatria raha hahazo anao izany! Fa raha fantatro tokoa fa misy ratsy ifofoan''ikaky anao, dia hambarako aminao mihitsy izany.'
mg1865::mg_9::20::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida tamin''i Jonatana: Iza no hanambara izany amiko, na hampandre ahy izay teny sarotra havalin-drainao anao*? [*Na: Iza anefa no hanambara amiko, raha tahiny mamaly sarotra anao rainao]'
mg1865::mg_9::20::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana tamin''i Davida: Andeha ary isika hivoaka any an-tsaha. Dia nivoaka tany an-tsaha izy roa lahy.'
mg1865::mg_9::20::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana tamin''i Davida: Jehovah, Andriamanitry ny Isiraely, anie ho vavolombelona! Rehefa fotorako tsara rahampitso na afaka ampitso toy izao ny hevitry ny raiko, ka hitako fa misy soa ho an''i Davida, ka tsy maniraka any aminao aho sy manambara izany aminao,'
mg1865::mg_9::20::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hataon''i Jehovah toy izany anie Jonatana, eny, mihoatra noho izany aza; fa raha kasain''ny raiko kosa ny hanisy ratsy anao, dia hambarako aminao izany, ka halefako ianao mba handehananao soa aman-tsara; ary homba anao tahaka ny tamin''ny raiko anie Jehovah.'
mg1865::mg_9::20::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola velona ihany aho, dia tsy hasehonao ahy va ny fiantran''i Jehovah mba tsy hahafaty ahy?'
mg1865::mg_9::20::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hesorinao amin''ny taranako koa ny famindram-ponao mandrakizay, eny, na dia avy aza izay handringanan''i Jehovah ny fahavalon''i Davida rehetra tsy ho ety ambonin''ny tany.'
mg1865::mg_9::20::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nanao fanekena Jonatana ny amin''ny taranak''i Davida hoe: Jehovah no hamaly ny fahavalon''i Davida.'
mg1865::mg_9::20::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana nampianiana an''i Davida indray noho ny fitiavany azy; fa tiany toy ny tenany izy.'
mg1865::mg_9::20::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana tamin''i Davida: Rahampitso ho tsinam-bolana; ary ho hita fa tsy eo ianao, fa ho foana ny fipetrahanao.'
mg1865::mg_9::20::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa rehefa mby amin''ny andro fahatelo dia midìna faingana ianao, ary tongava ao amin''ilay nierenao tamin''ny andro nitrangan''ilay raharaha iny*, ka mitoera ao anilan''ny vato Ezela. [*Izahao I Samoela 19:2-3]'
mg1865::mg_9::20::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho handefa zana-tsipïka telo eo anilany, toy ny mikendry marika.'
mg1865::mg_9::20::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia haniraka ny zazalahy aho ka hanao hoe: Mandehana, izahao ny zana-tsipïka. Ka raha lazaiko mihitsy amin''ilay zazalahy hoe: Indreo eo aorianao ny zana-tsipïka, ento ety, dia avia ianao, fa hipetraka amin''ny fiadanana ianao, ka tsy hisy haninona anao, raha velona koa Jehovah.'
mg1865::mg_9::20::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hoy kosa aho amin''ilay zazalahy: Indreo eo alohanao ny zana-tsipïka, dia mandehana ianao, fa Jehovah no nampandeha anao.'
mg1865::mg_9::20::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ilay noresahintsika, dia izaho sy ianao, indro, Jehovah no vavolombelona amiko sy aminao mandrakizay.'
mg1865::mg_9::20::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida niery tany an-tsaha. Koa nony tsinam-bolana, dia nipetraka hihinana'
mg1865::mg_9::20::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'teo amin''ny fipetrahany tahaka ny isanandro ihany ny mpanjaka, dia teo amin''ny fipetrahana teo anilan''ny rindrina, koa Jonatana nitsangana, fa Abnera nipetraka teo anilan''i Saoly; ary foana kosa ny fipetrahan''i Davida.'
mg1865::mg_9::20::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Saoly tsy niteny na inona na inona tamin''izany andro izany; fa nataony ho nisy zavatra nanjo azy, ka tsy madio izy, eny, tsy madio izy.'
mg1865::mg_9::20::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny andro faharoa dia ny ampitson''ny tsinam-bolana, ka mbola foana ihany ny fipetrahan''i Davida, dia hoy Saoly tamin''i Jonatana zanany: Ahoana no tsy mba nahatongavan''ny zanak''i Jese hihinana omaly sy androany?'
mg1865::mg_9::20::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana namaly an''i Saoly hoe: Davida niera fatratra tamiko hankany Betlehema'
mg1865::mg_9::20::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao hoe: Masïna ianao, aoka handeha aho, fa izahay mianakavy manao fanatitra any an-tanàna, ka asain''ny rahalahiko mankany aho; koa ankehitriny, raha nahita fitia eo imasonao aho, masïna ianao, aoka handeha aho hamangy ny rahalahiko; ka izany no tsy mba nahatongavany teto amin''ny latabatry ny mpanjaka.'
mg1865::mg_9::20::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''i Jonatana ny fahatezeran''i Saoly, ka hoy izy taminy: Ianao zanaky ny vehivavy maditra sy mpiodina, moa tsy fantatro va fa mifidy ny zanak''i Jese ianao ho henatrao sy ho henatry ny kibon*''ny reninao. [*Hebreo: fitanjahan'']'
mg1865::mg_9::20::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola velona ety ambonin''ny tany koa iny zanak''i Jese iny, dia tsy ho tafatoetra tsara ianao na ny fanjakanao. Koa maniraha haka azy hankaty amiko, fa meloka tokony ho faty izy.'
mg1865::mg_9::20::32:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana namaly an''i Saoly rainy ka nanao taminy hoe: Nahoana no hatao maty izy? Inona no nataony?'
mg1865::mg_9::20::33:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nitora-defona handefona azy, ka dia fantatr''i Jonatana fa nofofoin''ny rainy hovonoina Davida.'
mg1865::mg_9::20::34:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana niala teo amin''ny latabatra Jonatana, sady nirehitra ny fahatezerany, ka tsy nihinan-kanina izy tamin''ny ampitson''ny tsinam-bolana; fa nalahelo an''i Davida izy, satria nomen-drainy henatra.'
mg1865::mg_9::20::35:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, dia nivoaka nankany an-tsaha Jonatana tamin''ilay fotoana nataony tamin''i Davida, ary nisy zazalahy kely nanaraka azy.'
mg1865::mg_9::20::36:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana taminy: Mihazakazaha, ka izahao ny zana-tsipïka alefako. Ary nony nihazakazaka ilay zazalahy, dia nalefany nihoatra azy ny zana-tsipïka.'
mg1865::mg_9::20::37:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa tonga teo amin''ilay nipetrahan''ny zana-tsipïka nalefan''i Jonatana ilay zazalahy, dia nantsoin''i Jonatana izy hoe: Tsy ireo alohanao ireo va ny zana-tsipïka?'
mg1865::mg_9::20::38:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana niantso ilay zazalahy hoe: Haingàna dia haingàna, ka aza mijanonjanona. Ary ny zazalahin''i Jonatana nanangona ny zana-tsipïka, dia nankeo amin''ny tompony.'
mg1865::mg_9::20::39:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ilay zazalahy tsy nahalala na inona na inona; fa Jonatana sy Davida ihany no nahalala ny anton''izany.'
mg1865::mg_9::20::40:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomen''i Jonatana ilay zazalahy ny fiadiany, ka hoy izy taminy: Mandehana, ka ento ho any an-tanàna ireto.'
mg1865::mg_9::20::41:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony lasa ilay zazalahy, dia nitsangana avy any atsimo Davida, ka niankohoka tamin''ny tany izy sady niondrika in-telo, ary nifanoroka izy roa lahy, ka samy nitomany; nefa ny an''i Davida dia mafy loatra.'
mg1865::mg_9::20::42:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 20
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jonatana tamin''i Davida: Mandehana soa aman-tsara; fa efa nianiana tamin''ny anaran''i Jehovah isika roa lahy hoe: Jehovah no vavolombelona amiko sy aminao ary amin''ny taranako sy ny taranakao mandrakizay.'
mg1865::mg_9::21::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana Davida ka lasa; fa Jonatana kosa nankany an-tanàna.'
mg1865::mg_9::21::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny nandosiran''i Davida nankany Noba, sy ny nialany tany nankany Gata'
  verse_text: 'Ary Davida tonga tany Noba, tany amin''i Ahimeleka mpisorona; ary toran-kovitra Ahimeleka, raha nihaona tamin''i Davida, ka nanao taminy hoe: Nahoana no mandeha irery ianao, fa tsy misy manaraka anao?'
mg1865::mg_9::21::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida tamin''i Ahimeleka mpisorona: Ny mpanjaka efa nanome raharaha ahy, ka hoy izy tamiko: Aoka tsy ho fantatr''olona ny raharaha nanirahako sy nandidiako anao; ka dia nasaiko nankary ny zatovoko.'
mg1865::mg_9::21::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa inona no misy ato aminao? Omeo mofo dimy aho ho ety an-tanako, na izay misy.'
mg1865::mg_9::21::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona namaly an''i Davida hoe: Tsy misy mofo fihinana ato amiko, fa mofo masina ihany no ato, ka raha mba nifady vehivavy ahay mantsy ny zatovo.'
mg1865::mg_9::21::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namaly ny mpisorona ka nanao taminy hoe: Eny, fa hatramin''ny hateloana efa tsy niara-nitoetra tamim-behivavy rahateo izahay; ary tamin''izaho niainga dia masina ny fanaky ny zatovo; ary na dia tsy masina aza ny lalana, dia hohamasinina anio izy noho ny fanaka.'
mg1865::mg_9::21::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisorona nanome azy mofo masina; fa tsy nisy mofo teo, afa-tsy ny mofo aseho, izay nalainy teo anatrehan''i Jehovah, mba hasiana mofo mafana tamin''ny andro nanesorana azy.'
mg1865::mg_9::21::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: '(Nefa nisy anankiray tamin''ny mpanompon''i Saoly teo tamin''izany andro izany, voahazona teo anatrehan''i Jehovah, Doega Edomita no anarany; lehiben''ny mpiandrin''i Saoly izy.)'
mg1865::mg_9::21::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Ahimeleka: Tsy misy lefona na sabatra va eto aminao? fa izaho tsy nitondra ny sabatro na ny fiadiako ety amiko, satria nahamaika ny raharahan''ny mpanjaka.'
mg1865::mg_9::21::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpisorona: Ny sabatr''i Goliata Filistina, ilay novonoinao tao amin''ny lohasaha Elaha, indro, fa mifono lamba ao ivohon''ny efoda izy; ka raha iny no ho entinao, dia ento; fa tsy misy afa-tsy iny eto. Ary hoy Davida: Tsy misy tahaka iny, fa omeo ahy.'
mg1865::mg_9::21::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida niainga nandositra tamin''izany andro izany mba tsy ho azon''i Saoly, dia nankany amin''i Akisy, mpanjakan''i Gata.'
mg1865::mg_9::21::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanompon''i Akisy taminy: Tsy ity moa no Davida, mpanjakan''ny tany? Tsy izy va no nandihizany sy nifampihirany hoe: Saoly nahafaty arivoarivo, Fa Davida nahafaty alinalina?'
mg1865::mg_9::21::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nalatsak''i Davida tao am-pony izany teny izany, ka natahotra an''i Akisy, mpanjakan''i Gata, indrindra izy.'
mg1865::mg_9::21::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nody adala teo anatrehany izy ka nanao tahaka ny olona very saina teo aminy, fa nanoratsoratra teo amin''ny lela-vavahady izy, sady navelany hitsororoka tamin''ny somony ny iviny.'
mg1865::mg_9::21::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Akisy tamin''ny mpanompony: He! hitanareo fa very saina io lehilahy io, ka nahoana no nentinareo ety amiko izy?'
mg1865::mg_9::21::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho moa mitady olona very saina, no nitondranareo ity olona very saina ity mba hanondrana eto anatrehako? Moa hiditra ato an-tranoko va ilehio?'
mg1865::mg_9::22::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nirenirenen''i Davida tany Joda sy Moaba, ary ny namonoan''i Saoly ny mpisorona maro'
  verse_text: 'Ary Davida niala teo ka nandositra nankany amin''ny zohin''i Adolama; ary nony nandre izany ny rahalahiny sy ny mpianakavin-drainy, dia nidina tany aminy ireo.'
mg1865::mg_9::22::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mahantra rehetra sy izay mpitrosa rehetra ary izay manana alahelo am-po rehetra dia nivory tao aminy, ary izy no tonga mpifehy azy; ka dia tonga tokony ho efa-jato lahy ny tao aminy.'
mg1865::mg_9::22::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida niala tao nankany Mizpa any Moaba ka nanao tamin''ny mpanjakan''i Moaba hoe: Masïna ianao, avelao ny raiko sy ny reniko ho avy aty hitoetra ety aminao ambara-pahafantatro izay hataon''Andriamanitra amiko.'
mg1865::mg_9::22::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nentiny ho eo anatrehan''ny mpanjakan''i Moaba izy ireo ka nonina teo aminy tamin''ny andro rehetra nitoeran''i Davida tao amin''ny batery fiarovana.'
mg1865::mg_9::22::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Gada mpaminany tamin''i Davida: Aza mitoetra ao amin''ny batery fiarovana; fa mialà, ka mankanesa any amin''ny tanin''ny Joda. Dia nandeha Davida ka tonga tany an''ala Hareta.'
mg1865::mg_9::22::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''i Saoly fa hita Davida sy ny olona nanaraka azy (nipetraka tao Gibea teo ambanin''ny hazo tamariska teo an-kavoana Saoly tamin''izay, sady nisy lefona teny an-tanany, ary ny mpanompony rehetra nitsangana teo anoloany),'
mg1865::mg_9::22::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy Saoly tamin''ny mpanompony izay teo anoloany: Henoy kely, ry taranak''i Benjamina: Moa ianareo rehetra koa mba homen''ny zanak''i Jese saha sy tanim-boaloboka, ary mba hataony mpifehy arivo sy mpifehy zato ianareo rehetra,'
mg1865::mg_9::22::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'no dia miray tetika hanohitra ahy ianareo rehetra, ka tsy nisy nanambara tamiko fa ny zanako nanao fanekena tamin''ny zanak''i Jese, ary tsy nisy nalahelo ahy akory ianareo, na nanambara tamiko fa ny zanako efa nanome fo ny mpanompoko ho mpanotrika ahy tahaka ny amin''izao anio izao?'
mg1865::mg_9::22::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Doega Edomita, mpifehy* ny mpanompon''i Saoly, namaly ka nanao hoe: Nahita ny zanak''i Jese tonga tany Noba aho tany amin''i Ahimeleka, zanak''i Ahitoba. [*Na: izay nitsangana teo amin'']'
mg1865::mg_9::22::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahimeleka nanontany ho azy tamin''i Jehovah sady nanome azy vatsy; ary nomeny azy koa ny sabatr''i Goliata Filistina.'
mg1865::mg_9::22::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka dia naniraka naka an''i Ahimeleka mpisorona, zanak''i Ahitoba, sy ny tarana-drainy rehetra, izay mpisorona, tao Noba; ka dia tonga tany amin''ny mpanjaka izy rehetra.'
mg1865::mg_9::22::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Mba mihainoa ianao, ry zanak''i Ahitoba. Ary izy namaly hoe: Inty aho, tompoko.'
mg1865::mg_9::22::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly taminy: Nahoana ianareo no niray tetika hanohitra ahy, dia ianao sy ny zanak''i Jese, tamin''ilay nanomezanao azy mofo sy sabatra ary nanontanianao ho azy tamin''Andriamanitra hahatongavany ho mpanotrika ahy tahaka ny amin''izao anio izao?'
mg1865::mg_9::22::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahimeleka namaly ny mpanjaka hoe: Iza moa amin''ny mpanomponao rehetra no mba mahatoky tahaka an''i Davida, izay vinanton''ny mpanjaka sady mpanolo-tsaina anao sy malaza ao an-tranonao?'
mg1865::mg_9::22::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vao izay va no nanontaniako ho azy tamin''Andriamanitra? Sanatria ahy izany! Aoka ny mpanjaka tsy hanome tsiny ny mpanompony na ny tarana-draiko rehetra; fa ny mpanomponao tsy nahalala na inona na inona ny amin''izany rehetra izany, na kely na be.'
mg1865::mg_9::22::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpanjaka: Hatao maty tokoa ianao, ry Ahimeleka, dia ianao sy ny tarana-drainao rehetra.'
mg1865::mg_9::22::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''ny mpiambina* izay teo anoloany: Mihodina, ka vonoy ny mpisoron''i Jehovah; fa ny tanan''ireo koa momba an''i Davida, satria fantany ihany fa nandositra izy, nefa tsy nambarany tamiko izany. Fa ny mpanompon''ny mpanjaka tsy nety naninjitra ny tanany hamely ny mpisoron''i Jehovah. [*Hebreo: mpihazakazaka]'
mg1865::mg_9::22::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Doega: Mihodina ianao, ka asio ny mpisorona. Ary Doega Edomita nihodina ka namely ny mpisorona, dia nahafaty olona dimy amby valo-polo izay nisalotra efoda rongony fotsy.'
mg1865::mg_9::22::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasiany tamin''ny lelan-tsabatra koa Noba, tanànan''ny mpisorona, dia ny lehilahy sy ny vehivavy, ny ankizy madinika sy ny zaza minono, ny omby sy ny boriky ary ny ondry aman''osy.'
mg1865::mg_9::22::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ny zanak''i Ahimeleka, zanak''i Ahitoba, Abiatara no anarany, dia afa-nandositra ka nanaraka an''i Davida.'
mg1865::mg_9::22::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abiatara nanambara tamin''i Davida ny namonoan''i Saoly ny mpisoron''i Jehovah.'
mg1865::mg_9::22::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Abiatara: Fantatro androtr''iny ihany fa tao Doega Edomita ka hilaza amin''i Saoly tokoa; koa izaho no anton''ny nahafaty ny olona rehetra tamin''ny tarana-drainao.'
mg1865::mg_9::22::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tomoera ety amiko, ka aza matahotra; fa izay mikatsaka ny aiko no mikatsaka ny ainao koa; fa eto amiko no hahavoavonjy anao.'
mg1865::mg_9::23::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namonjen''i Davida an''i Keila'
  verse_text: 'Ary nisy nanambara tamin''i Davida hoe: Indro, ny Filistina mamely an''i Keila ka mamabo ny ao amin''ny famoloana.'
mg1865::mg_9::23::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanontany tamin''i Jehovah hoe: Handeha hamely izao Filistina izao va aho? Ary hoy Jehovah tamin''i Davida: Mandehana, asio ny Filistina, ka vonjeo Keila.'
mg1865::mg_9::23::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny olon''i Davida taminy: He! aty Joda aza isika matahotra, koa mainka raha mankany Keila hiady amin''ny miaramilan''ny Filistina?'
mg1865::mg_9::23::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany tamin''i Jehovah indray Davida. Ary Jehovah namaly azy hoe: Miaingà, midìna hankany Keila, fa Izaho no hanolotra ny Filistina ho eo an-tananao.'
mg1865::mg_9::23::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Davida sy ny olony nankany Keila ary niady tamin''ny Filistina ka namabo ny ombiny sady nahafaty olona be dia be. Ary dia voavonjin''i Davida ny mponina tao Keila.'
mg1865::mg_9::23::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandositra nankany amin''i Davida tany Keila Abiatara, zanak''i Ahimeleka, dia nitondra efoda teny an-tanany izy.'
mg1865::mg_9::23::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Saoly fa tonga tao Keila Davida. Dia hoy Saoly: Andriamanitra efa nanolotra azy ho eo an-tanako, satria efa voahidy izy izao noho ny nidirany amin''ny tanàna misy vavahady mihidy.'
mg1865::mg_9::23::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly namory ny olona rehetra hidina hankany Keila hanafika ka hanao fahirano an''i Davida sy ny olony.'
mg1865::mg_9::23::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatr''i Davida fa Saoly namorona sain-dratsy hamelezana azy; dia hoy izy tamin''i Abiatara mpisorona: Ento ety ny efoda.'
mg1865::mg_9::23::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida: Ry Jehovah, Andriamanitry ny Isiraely o, efa ren''ny mpanomponao tokoa fa Saoly mitady hankaty Keila mba handrava ny tanana noho ny amiko.'
mg1865::mg_9::23::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka moa ny mponina ety Keila hanolotra ahy ho eo an-tanany va? Hidina ety va Saoly toy ny efa ren''ny mpanomponao? Ry Jehovah, Andriamanitry ny Isiraely o, mifona aminao aho, ambarao amin''ny mpanomponao. Ary hoy Jehovah: Hidina izy.'
mg1865::mg_9::23::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Davida: Ny mponina ety Keila hanolotra ahy sy ny oloko ho eo an-tanan''i Saoly va? Ary hoy Jehovah Hanolotra anao izy.'
mg1865::mg_9::23::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niainga Davida sy ny olony tokony ho enin-jato lahy ka niala tao Keila ary nandeha tamin''izay azony naleha. Ary nolazaina tamin''i Saoly fa efa nandositra niala tao Keila Davida, dia nijanona tsy nandeha izy.'
mg1865::mg_9::23::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nitoetra tany an''efitra tao amin''ny batery fiarovana sy nitoetra tany amin''ny tany havoana tany an''efitr''i Zifa. Ary Saoly nitady azy isan''andro, fa Andriamanitra tsy nanolotra azy ho eo an-tanany.'
mg1865::mg_9::23::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny nitoeran''i Davida tany an''efitr''i Zifa sy Maona, ary ny hevitra nataon''ny Zifita hahazoan''i Saoly azy'
  verse_text: 'Ary hitan''i Davida fa Saoly nivoaka hitady ny ainy; fa Davida dia tany an''efitr''i Zifa tany anaty ala.'
mg1865::mg_9::23::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jonatana, zanak''i Saoly, niainga, dia nankany amin''i Davida tany an''ala ka nampahery ny tanany tamin''Andriamanitra.'
mg1865::mg_9::23::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''i Davida: Aza matahotra, fa tsy hahazo anao ny tanan''i Saoly raiko; fa ianao no ho mpanjaka amin''ny Isiraely, ary izaho no hanarakaraka anao, ary fantatr''i Saoly raiko koa izany.'
mg1865::mg_9::23::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao fanekena teo anatrehan''i Jehovah izy roa lahy; ary Davida dia nitoetra tany an''ala, fa Jonatana kosa nankany an-tranony.'
mg1865::mg_9::23::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra nankany amin''i Saoly tany Gibea ny Zifita ka nanao hoe: Tsy miery any aminay ao amin''ny batery fiarovana any an''ala, any amin''ny havoana Hakila, izay atsimon''ny efitra, va Davida?'
mg1865::mg_9::23::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, ry mpanjaka, araka ny fanirian''ny fonao hidina, dia midìna ianao, fa azonay hatolotra eo an-tanan''ny mpanjaka izy.'
mg1865::mg_9::23::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Hotahin''i Jehovah anie ianareo; fa ianareo namindra fo tamiko.'
mg1865::mg_9::23::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianareo, mandehana, hevero indray, ka tsongoy tsara ny diany, ary fantaro izay nahita azy tany; fa manao saina lalina dia lalina, hono, izy.'
mg1865::mg_9::23::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izahao sy fantaro tsara ny fierena rehetra izay iereny, dia miverena ety amiko indray hilaza marimarina, ary izaho dia hiaraka aminareo; koa raha mitoetra amin''ny tany izy, dia hotadiaviko eran''ny arivon''i Joda rehetra.'
mg1865::mg_9::23::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga nankany Zifa ireo hialoha an''i Saoly; fa Davida sy ny olony dia tany amin''ny efitr''i Maona, tamin''ny tani-hay* atsimon''ny efitra. [*Hebreo: Arabà]'
mg1865::mg_9::23::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandeha Saoly sy ny mpanompony hitady azy. Ary nolazaina tamin''i Davida izany, ka dia nidina tany amin''ny harambato izy ka nitoetra tany an''efitr''i Maona. Ary nony ren''i Saoly izany, dia nanenjika an''i Davida tany an''efitr''i Maona izy.'
mg1865::mg_9::23::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nandeha tamin''ny ilan''ny tendrombohitra iray, fa Davida sy ny olony tamin''ny ilany kosa; ary niezaka mafy handositra Davida noho ny tahony an''i Saoly; fa Saoly sy ny olony saiky nahodidina an''i Davida sy ny olony hisambotra azy.'
mg1865::mg_9::23::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy iraka tonga tao amin''i Saoly nanao hoe: Avia haingana ianao, fa ny Filistina efa manafika ny tany.'
mg1865::mg_9::23::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niverina Saoly tamin''ny nanenjehany an''i Davida ary nandeha niady tamin''ny Filistina; ary ny anaran''izany tany izany dia nataony hoe: Sela-hamalekota*. [*Sela-hamalekota = Harambato fandosirana]'
mg1865::mg_9::24::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy netezan''i Davida hahafaty an''i Saoly, na dia azony tao an-johy aza'
  verse_text: 'Ary Davida niakatra niala teo ka nitoetra tao amin''ny batery fiarovana tany En-jedy.'
mg1865::mg_9::24::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niverina avy nanenjika ny Filistina Saoly, dia nisy nanambara taminy hoe; Indro, Davida any an''efitr''i En-jedy.'
mg1865::mg_9::24::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly naka telo arivo lahy voafantina tamin''ny Isiraely rehetra ka lasa nitady an''i Davida sy ny olony tany amin''ny vatolampin''ny osi-dia.'
mg1865::mg_9::24::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga teo amin''ny valan''ondry tamoron-dalana izay nisy zohy izy, ka niditra tao Saoly mba hiavela; nefa Davida sy ny olony efa nipetraka tao anatin''ny zohy.'
mg1865::mg_9::24::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny olon''i Davida taminy: Izao no andro nolazain''i Jehovah taminao hoe: Indro, hatolotro eo an-tananao ny fahavalonao hataonao araka izay sitrakao. Dia nitsangana Davida ka nitsaitsaika nanapaka ny sisin''ny kapotin''i Saoly.'
mg1865::mg_9::24::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nony efa vita izany, dia namely an''i Davida ny eritreriny noho ny nanapahany ny sisin''ny kapotin''i Saoly,'
mg1865::mg_9::24::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hoy izy tamin''ny olony: Sanatria amiko eo anatrehan''i Jehovah, raha hanao izany zavatra izany amin''ny tompoko izay voahosotr''i Jehovah ka haninjitra ny tanako aminy, fa voahosotr''i Jehovah izy.'
mg1865::mg_9::24::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampijanona ny mpanompony tamin''izany teny izany Davida ka tsy namela azy hitsangana hamely an''i Saoly. Ary Saoly nitsangana ka niala tao an-johy, dia nandeha tamin''izay nalehany.'
mg1865::mg_9::24::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia mba nitsangana koa Davida ka niala tao an-johy koa, dia niantso an''i Saoly ka nanao hoe: Ry mpanjaka tompoko o! Ary nony nitodika azy Saoly, dia niondrika tamin''ny tany Davida ka niankohoka.'
mg1865::mg_9::24::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Saoly: Nahoana ianao no maka vavan''olona hoe: Indro, Davida mitady hanisy ratsy anao?'
mg1865::mg_9::24::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hitan''ny masonao androany ny nanoloran''i Jehovah anao ho eo an-tanako tao an-johy; ary nisy nilaza hevitra hamonoana anao, saingy niantra anao ny masoko, ka hoy izaho: Tsy haninjitra ny tanako amin''ny tompoko aho, fa voahosotr''i Jehovah izy.'
mg1865::mg_9::24::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary koa, ry ikaky o, jereo dia jereo ange ny sisin''ny kapotinao ety an-tanako; fa raha nanapaka ny sisin''ny kapotinao aho, fa tsy nahafaty anao, dia izahao ka fantaro fa tsy misy faharatsiana na fahadisoana amin''ny tanako, ary tsy nanota taminao aho, nefa ianao kosa mihaza ny aiko mba hahafaty azy.'
mg1865::mg_9::24::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no hitsara ahy sy ianao, ary Jehovah no hamaly anao noho ny amiko, fa ny tanako tsy mba haninona anao.'
mg1865::mg_9::24::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny lazain''ny ohabolan''ny ntaolo hoe: Avy amin''ny ratsy fanahy no ivoahan''ny ratsy, nefa ny tanako tsy haninona anao.'
mg1865::mg_9::24::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitady an''iza no nivoahan''ny mpanjakan''ny Isiraely? Iza no enjehinao? Amboa maty; parasy iray.'
mg1865::mg_9::24::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka Jehovah no ho mpitsara, ka dia hitsara ahy sy ianao ary hijery sy handahatra ho ahy ka hanafaka ahy amin''ny tananao.'
mg1865::mg_9::24::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony vita izany teny nataon''i Davida tamin''i Saoly izany, dia hoy Saoly: Feonao va izany, ry Davida zanako o? Ary Saoly nanandratra ny feony ka nitomany;'
mg1865::mg_9::24::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy izy tamin''i Davida: Marina noho izaho ianao; fa ianao dia nanisy soa ahy, fa izaho kosa namaly ratsy anao.'
mg1865::mg_9::24::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao dia naneho androany ny nanaovanao soa tamiko, fa na dia natolotr''i Jehovah teo an-tananao aza aho, dia tsy nahafaty ahy ianao.'
mg1865::mg_9::24::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa moa raha misy olona mahazo ny fahavalony, havelany handeha soa aman-tsara va izy? Koa hovalian''i Jehovah soa anie ianao noho ny nataonao tamiko androany.'
mg1865::mg_9::24::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, ankehitriny fantatro fa ho mpanjaka tokoa ianao, ary ny fanjakan''ny Isiraely ho tafatoetra tsara eo an-tananao.'
mg1865::mg_9::24::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mianiàna amiko amin''i Jehovah ianao ankehitriny fa tsy handringana ny taranako mandimby ahy ianao, ary tsy hovonoinao amin''ny mpianakavin''ny raiko ny anarako.'
mg1865::mg_9::24::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida dia nianiana tamin''i Saoly; ary dia lasa nody Saoly, fa Davida sy ny olony kosa niakatra nankany amin''ny batery fiarovana.'
mg1865::mg_9::25::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahafatesan''i Samoela, ary ny amin''i Nabala sy Abigaila'
  verse_text: 'Ary maty Samoela; ary nivory ny Isiraely rehetra ka nisaona azy sy nandevina azy tao amin''ny fonenany tao Rama. Ary Davida niainga ka nidina nankany an''efitra Parana.'
mg1865::mg_9::25::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy lehilahy tao Maona, ary tao Karmela ny fananany; mpanjatobe ralehilahy ka nanana ondry telo arivo sy osy arivo, ary nanety ny ondriny tao Karmela izy.'
mg1865::mg_9::25::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nabala no anaran-dralehilahy; ary Abigaila no anaran''ny vavy; vehivavy hendry sady tsara tarehy izy; fa ny lahy kosa saro-po sy ratsy amin''izay ataony; ary isan''ny taranak''i Kaleba izy.'
mg1865::mg_9::25::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ren''i Davida tany an''efitra fa Nabala manety ny ondriny.'
mg1865::mg_9::25::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka zatovo folo lahy Davida ka nanao taminy hoe: Miakara any Karmela ianareo, ary mankanesa any amin''i Nabala, ka miarahabà azy amin''ny anarako.'
mg1865::mg_9::25::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no holazainareo aminy: trarantitra ianao, fiadanana anie ho anao, ary fiadanana ho amin''ny ankohonanao, ary fiadanana ho amin''izay anananao rehetra.'
mg1865::mg_9::25::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny efa reko fa manety ondry ianao; koa ny mpiandry ondrinao, izay tao aminay, tsy nasianay ratsy, ary tsy nisy very na inona na inona tamin''ny andro rehetra nitoerany tao Karmela.'
mg1865::mg_9::25::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anontanio ny zatovonao, fa hilaza aminao izy. Koa aoka hahita fitia eo imasonao ny zatovo (fa andro fifaliana no ihavianay) masïna ianao, mba omeo amin''izay azon''ny tananao ireto mpanomponao sy Davida zanakao.'
mg1865::mg_9::25::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga ny zatovon''i Davida, dia niteny tamin''i Nabala tamin''ny anaran''i Davida araka izany teny rehetra Izany izy, ka dia nipetraka.'
mg1865::mg_9::25::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Nabala namaly ny mpanompon''i Davida hoe: Inona moa Davida? Ary inona moa ny zanak''i Jese? Misy mpanompo maro ankehitriny izay milefa miala amin''ny tompony.'
mg1865::mg_9::25::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa halaiko va ny mofoko sy ny ranoko ary ny zavatra izay efa novonoiko ho an''ny mpanety ondriko, ka homeko izay olona tsy fantatro nihaviana akory?'
mg1865::mg_9::25::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihodina ny zatovon''i Davida ka nankany amin''izay nalehany; ary dia nody tany aminy indray izy ka nanambara izany teny rehetra izany taminy.'
mg1865::mg_9::25::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''ny olony: Samia manao ny sabatrareo eo amin''ny fehin-tsabany avy ianareo; ka dia samy nanao ny sabany teo amin''ny fehin-tsabany avy ny olona, ary dia mba nanao ny sabany teo amin''ny fehin-tsabany koa Davida; ary nisy tokony ho efa-jato lahy niakatra nanaraka an''i Davida, ary roan-jato lahy kosa nipetraka teo amin''ny entana.'
mg1865::mg_9::25::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abigaila, vadin''i Nabala, dia nilazan''ny anankiray tamin''ny zatovony hoe: Indro, Davida naniraka olona avy tany an''efitra mba hiarahaba ny tompontsika, nefa nisafoaka tamin''ireny izy.'
mg1865::mg_9::25::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo lehilahy ireo dia nanao tsara tokoa taminay, ka tsy naninona tsy naninona izahay, ary tsy nisy zavatra very tamin''izay andro nitoeranay tao aminy, fony tany an-tsaha izahay.'
mg1865::mg_9::25::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no mandanay andro aman''alina tamin''ny andro rehetra nitoeranay niandry ondry tao aminy.'
mg1865::mg_9::25::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia fantaro sy hevero ankehitriny izay hataonao; fa ratsy no ifofoan''ny tompontsika mbamin''ny ankohonany rehetra; fa Nabala dia tena ratsy fanahy, ka tsy misy olona mahazo miteny aminy.'
mg1865::mg_9::25::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha faingana Abigaila ka naka mofo roan-jato sy divay eran''ny tavoara* roa sy ondry dimy voavoatra sy lango indimin''ny vata** sy takela-boaloboka maina zato ary ampempan''aviavy roan-jato, dia nasampiny tamin''ny boriky izany. [*Na: siny hoditra] [**Hebreo: sea]'
mg1865::mg_9::25::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''ny zatovony: Mandehana eo alohako, indro, izaho hanaraka anareo; nefa Nabala vadiny tsy mba nilazany.'
mg1865::mg_9::25::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany, nony nitaingina ny borikiny izy ka nidina tao amin''ny takon''ny havoana, dia indro, Davida sy ny olony nidina nanatona azy, ary izy nifanena taminy.'
mg1865::mg_9::25::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida efa nilaza hoe: Foana tokoa ny an''efitra, ka tsy nisy very na inona na inona; fa novaliany ratsy ny soa nataoko.'
mg1865::mg_9::25::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hataon''Andriamanitra toy izany anie ny fahavalon''i Davida, eny, mihoatra noho izany aza, raha dia havelako hisy miangana na dia lehilahy iray aza izay mety ho azy ambara-pahazavan''ny andro.'
mg1865::mg_9::25::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abigaila, raha nahita an''i Davida, dia niala faingana tamin''ny boriky ary niankohoka teo anatrehan''i Davida ka nitsaoka azy.'
mg1865::mg_9::25::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka tamin''ny tongony izy ka nanao hoe: Aoka ho ahy dia ho ahy ity heloka ity, tompokolahy; masïna ianao, avelao ny ankizivavinao hiteny eto anatrehanao, ka henoy ny tenin''ny ankizivavinao.'
mg1865::mg_9::25::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, aoka ny tompoko tsy hisaina io Nabala lehilahy tena ratsy fanahy io, fa araka ny anarany ihany no toeny; Nabala* no anarany, ary hadalana no ao aminy; fa izaho ankizivavinao, tompoko, tsy mba nahita ny zatovo nirahinao. [*Nabala = Adala]'
mg1865::mg_9::25::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, tompoko, raha velona koa Jehovah, ary raha velona koa ny fanahinao, Jehovah efa niaro anao tsy hahazo heloka amin''ny fandatsahan-drà ary tsy hamaly ho an''ny tenanao; ary avelao ny fahavalonao sy izay mitady hanisy ratsy anao, tompoko, ho tahaka an''i Nabala.'
mg1865::mg_9::25::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao saotra nentin''ny ankizivavinao aminao izao, tompoko, dia aoka homena ny zatovo manaraka ny Tompoko.'
mg1865::mg_9::25::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masïna ianao, mamelà ny fahadisoan''ny ankizivavinao, fa Jehovah hampaharitra ny taranaky ny tompoko tokoa; fa ny tompoko miady ny adin''i Jehovah, ary tsy misy ratsy ho hita aminao amin''ny andro rehetra iainanao.'
mg1865::mg_9::25::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa raha misy olona mitsangana hanenjika anao ka mitady ny ainao, dia hofehezina amin''ny fehin''aina ao amin''i Jehovah Andriamanitra ny fanahin''ny tompoko, fa ny fanahin''ny fahavalonao kosa dia hatorany toy ny eo amin''ny foitran''antsamotady.'
mg1865::mg_9::25::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, raha Jehovah mahavita amin''ny tompoko araka ny soa rehetra nilazany anao ka manendry anao ho mpanapaka ny Isiraely,'
mg1865::mg_9::25::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy ho alahelo* na ho nenina* amin''ny fon''ny tompoko izany, fa tsy nandatsa-drà foana ianao, na namaly ho an''ny tenanao, tompoko; fa rehefa asian''i Jehovah soa ny tompoko, dia mba tsarovy aho ankizivavinao. [*Hebreo: fahatafintohinana]'
mg1865::mg_9::25::32:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Abigaila: Isaorana anie Jehovah, Andriamanitry ny Isiraely, Izay naniraka anao hihaona amiko androany.'
mg1865::mg_9::25::33:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hotahiny anie ny fahendrenao, ary hotahiny anie ianao, izay niaro ahy androany tsy hahazo heloka amin''ny fandatsahan-drà ary tsy hamaly ho an''ny tenako.'
mg1865::mg_9::25::34:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa, raha velona koa Jehovah, Andriamanitry ny Isiraely, Izay niaro ahy tsy hanisy ratsy anao, raha tsy avy faingana hitsena ahy ianao toy izay, dia efa tsy nasiako niangana na dia lehilahy iray aza amin''i Nabala ambara-pahazavan''ny andro.'
mg1865::mg_9::25::35:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia noraisin''i Davida teny an-tanany ilay zavatra nentiny, ary hoy izy taminy: Miakara soa aman-tsara ho any an-tranonao ianao; indro, efa nohenoiko ny feonao, ary nankasitrahako ianao.'
mg1865::mg_9::25::36:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abigaila dia tonga tao amin''i Nabala; kanjo, indro, nanao fanasana tao an-tranony izy tahaka ny fanasan''ny mpanjaka, ary faly ny fon''i Nabala tamin''izany, ary mamo loatra izy, ka dia tsy nisy nambaran''ny vavy taminy, na kely na be mandra-pahazavan''ny andro.'
mg1865::mg_9::25::37:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, ka afaka ny hamamoan''i Nabala, dia nambaran''ny vavy taminy izany zavatra izany, ka dia matihena ny fony ka tonga tahaka ny vato.'
mg1865::mg_9::25::38:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka hafoloana, dia nasian''i Jehovah Nabala, ka dia maty izy.'
mg1865::mg_9::25::39:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''i Davida fa maty Nabala, dia hoy izy: Isaorana anie Jehovah izay niady ho ahy ka nahafa-tondromaso ahy tamin''i Nabala sy niaro ny mpanompony tsy hahatanteraka ny ratsy; fa ny ratsy nataon''i Nabala dia nampodin''i Jehovah ho eo an-dohany ihany. Ary Davida naniraka hiresaka amin''i Abigaila hila azy ho vady.'
mg1865::mg_9::25::40:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany amin''i Abigaila teo Karmela ny mpanompon''i Davida, dia hoy izy: Davida naniraka anay hankaty aminao hila anao ho vadiny.'
mg1865::mg_9::25::41:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana izy ary niankohoka tamin''ny tany ka nanao hoe: Indro, aoka ny ankizivavinao ho mpanompo hanasa ny tongotry ny mpanompon''itompokolahy.'
mg1865::mg_9::25::42:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Abigaila nitsangana faingana ka nitaingina boriky, ary ankizivaviny dimy no nanaraka azy; dia nanaraka ny irak''i Davida izy, ka dia novadiny.'
mg1865::mg_9::25::43:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida efa nanambady an''i Ahinoama avy any Jezirela koa; ary samy novadiny avokoa izy roa vavy.'
mg1865::mg_9::25::44:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 25
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Saoly efa nanome an''i Mikala, zananivavy, vadin''i Davida, ho vadin''i Palty, zanak''i Laisy, avy any Galima.'
mg1865::mg_9::26::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nilazan''ny Zifita tamin''i Saoly fanindroany izay hahazoany an''i Davida, sy ny tsy netezan''i Davida hahafaty an''i Saoly'
  verse_text: 'Ary ny Zifita tonga tao amin''i Saoly tany Gibea ka nanao hoe: Tsy miery any amin''ny havoana Hakila manandrify ny efitra va Davida?'
mg1865::mg_9::26::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Saoly nidina nankany an''efitr''i Zifa, nitondra telo arivo lahy voafantina tamin''ny Isiraely hanaraka azy hitady an''i Davida any an''efitr''i Zifa.'
mg1865::mg_9::26::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitoby tao amin''ny havoana Hakila manandrify ny efitra teo amoron-dalana izy. Fa Davida kosa nitoetra tany an''efitra, ary hitany fa tonga nanaraka azy tany an''efitra Saoly.'
mg1865::mg_9::26::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka mpisafo Davida, ka fantany fa tonga tokoa Saoly.'
mg1865::mg_9::26::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga Davida ka tonga teo amin''ny nitobian''i Saoly; ary hitan''i Davida izay nandrian''i Saoly sy Abnera, zanak''i Nera, komandin''ny miaramilany; fa Saoly nandry teo anatin''ny sehatra-sariety, sady nitoby nanodidina azy ny vahoaka.'
mg1865::mg_9::26::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Ahimeleka Hetita sy Abisay, zanak''i Zeroia, rahalahin''i Joaba; Iza no hidina hiaraka amiko ho any amin''i Saoly any an-toby? Dia hoy Abisay: Izaho hidina hiaraka aminao.'
mg1865::mg_9::26::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tao amin''ny vahoaka Davida sy Abisay nony alina; ary, indro, Saoly nandry ka natory teo anatin''ny sehatra-sariety, ary ny lefony nitsatoka amin''ny tany teo anilan''ny lohany; fa Abnera sy ny vahoaka nandry manodidina azy.'
mg1865::mg_9::26::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Abisay tamin''i Davida: Efa voahidin''Andriamanitra eo an-tananao ny fahavalonao izao; koa, masïna ianao, aoka holefoniko indray mandeha monja hataoko miboroaka amin''ny tany izy, fa tsy hamely azy indroa akory aho.'
mg1865::mg_9::26::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida tamin''i Abisay: Aza mamono azy; fa iza no maninjitra ny tanany tamin''ny voahosotr''i Jehovah ka tsy nanan-tsiny?'
mg1865::mg_9::26::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Davida: Raha velona koa Jehovah, dia aoka Jehovah no hamely azy; na ho tonga ny androny, ka ho faty izy; na hirotsaka ho amin''ny ady izy, ka any no hahafaty azy.'
mg1865::mg_9::26::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sanatria amiko eo anatrehan''i Jehovah, raha haninjitra ny tanako hamely ny voahosotr''i Jehovah aho; fa masïna ianao, ny lefona eo anilan''ny lohany sy ny tavoara fitondran-drano no alao, dia andeha isika handeha.'
mg1865::mg_9::26::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''i Davida ny lefona sy ny tavoara izay teo anilan''ny lohan''i Saoly ka dia lasa izy, ary tsy nisy olona nahita, na nahalala, na nahatsiaro; fa natory izy rehetra, satria nataon''i Jehovah renoky ny torimaso izy.'
mg1865::mg_9::26::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nita nankeny an-dafin-tsaha Davida ka nijanona teo an-tampon''ny tendrombohitra lavidavitra (lavidavitra ihany ny elanelan''izy roa tonta)'
mg1865::mg_9::26::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Davida niantso ny olona sy Abnera, zanak''i Nera, hoe: Tsy mamaly va ianao, ry Abnera? Ary Abnera dia namaly hoe: Iza moa ianao, no miantso ho re eto anatrehan''ny mpanjaka?'
mg1865::mg_9::26::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Abnera: Tsy lehilahy mahery va ianao, ary iza no tahaka anao amin''ny Isiraely? Koa nahoana ianao no tsy miambina ny mpanjaka tomponao? fa nisy anankiray tamin''ny olona tonga teo hamono ny mpanjaka tomponao.'
mg1865::mg_9::26::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mety izany nataonao izany. Raha velona koa Jehovah, dia tokony ho faty ianareo, satria tsy miambina ny tomponareo, ilay voahosotr''i Jehovah Ary izahao ange, fa aiza moa ny lefon''ny mpanjaka sy ny tavoara fitondran-drano teo anilan''ny lohany?'
mg1865::mg_9::26::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatr''i Saoly ny feon''i Davida ka hoy izy: Feonao moa izany, ry Davida zanako? Ary hoy Davida: Feoko tokoa, ry mpanjaka tompoko.'
mg1865::mg_9::26::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy: Nahoana ny tompoko no manenjika ny mpanompony? Inona no nataoko, ary inona no ratsy amin''ny tanako?'
mg1865::mg_9::26::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny masïna ianao, ry mpanjaka tompoko, mihainoa ny tenin''ny mpanomponao. Raha Jehovah no nanesika anao hamely ahy, dia aoka handray fanatitra mani-pofona Izy; fa raha zanak''olona kosa, dia aoka ho voaozona eo anatrehan''i Jehovah izy, satria efa nandroaka ahy androany tsy hanana anjara amin''ny lova nomen''i Jehovah izy ka nanao hoe: Mandehana, manompoa andriamani-kafa.'
mg1865::mg_9::26::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza avela ho latsaka amin''ny tany lavitra an''i Jehovah ny rako; fa ny mpanjakan''ny Isiraely nivoaka nitady parasy iray, tahaka ny manenjika tsipoy eny an-tendrombohitra.'
mg1865::mg_9::26::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly: Efa nanota aho: miverena, ry Davida zanako, fa tsy hanisy ratsy anao intsony aho, fa soa teo imasonao ny aiko androany; indro, efa nanao adala aho ka diso indrindra.'
mg1865::mg_9::26::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namaly hoe: Indro ny lefon''ny mpanjaka! koa asaovy misy zatovo anankiray mankety haka azy.'
mg1865::mg_9::26::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lehilahy izay nanoloran''i Jehovah anao teo an-tanany androany dia hovaliany araka ny fahitsiany sy ny fahamarinany, fa tsy nety naninjitra ny tanako hamely ny voahosotr''i Jehovah aho.'
mg1865::mg_9::26::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, fa tahaka ny nanaovako ny aina ho lehibe androany no mba hanaovan''i Jehovah ny aiko ho lehibe kosa ka hanafahany ahy amin''ny fahoriana rehetra.'
mg1865::mg_9::26::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''i Davida: Hotahina anie ianao, ry Davida zanako; hanao dia hanao ianao sady hahatontosa. Dia lasa Davida, fa Saoly kosa nitodi-doha hiverina.'
mg1865::mg_9::27::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitoeran''i Davida tany Ziklaga tany amin''ny Filistina'
  verse_text: 'Ary Davida nanao anakampo hoe; Mbola ho fatin''ny tanan''i Saoly ihany aho indray androany; tsy misy mahasoa ahy afa-tsy ny mandositra haingana any amin''ny tanin''ny Filistina, dia hamoy ahy Saoly ka tsy hitady ahy eran''ny tanin''ny Isiraely intsony, dia ho afaka amin''ny tanany aho.'
mg1865::mg_9::27::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niainga Davida nandeha mbamin''ny enin-jato lahy nanaraka azy nankany amin''i Akisy, zanak''i Maoka, mpanjakan''i Gata.'
mg1865::mg_9::27::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: '2022-12-30T06:27:23+0000'
  verse_title: null
  verse_text: 'Ary nitoetra tao amin''i Akisy tao Gata Davida, dia izy sy ny olony, samy nomban''ny ankohonany avy, ary Davida mbamin''ny vadiny roa, dia Ahinoama Jezirelita sy Abigaila Karmelita, ilay novinadin''i Nabala.'
mg1865::mg_9::27::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambara tamin''i Saoly fa Davida efa nandositra nankany Gata, ka dia tsy nitady azy intsony izy.'
mg1865::mg_9::27::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Akisy: Raha mahita fitia eo imasonao aho, aoka mba homena fonenana ao amin''ny tanàna anankiray any an-tsaha aho mba honenako any, fa nahoana ny mpanomponao no hitoetra aminao eto amin''ny renivohitry ny fanjakana?'
mg1865::mg_9::27::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomen''i Akisy azy androtrizay Ziklaga; ka dia an''ny mpanjakan''ny Joda ambaraka androany Ziklaga.'
mg1865::mg_9::27::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny andro nitoeran''i Davida tany amin''ny tanin''ny Filistina dia herintaona sy efa-bolana.'
mg1865::mg_9::27::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny olony niakatra ka nanafika ny Gesorita sy ny Gizrita ary ny Amalekita; fa ireo nonina tamin''ny tany hatrizay ela izay, dia hatrany akaikin''i Sora, hatramin''ny tany Egypta.'
mg1865::mg_9::27::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namely ny tany, ka tsy nisy novelominy na lehilahy na vehivavy, sady namabo ondry aman''osy sy omby sy boriky sy rameva ary fitafiana izy, dia niverina nankany amin''i Akisy.'
mg1865::mg_9::27::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Akisy: Moa tsy nanafika va ianareo androany? Dia hoy Davida: Nanafika ny tany atsimo izay an''i Joda sy izay an''ny Jeramelita ary izay an''ny Kenita izahay.'
mg1865::mg_9::27::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy novelomin''i Davida ho entiny any Gata, na lehilahy na vehivavy; fa hoy izy: Andrao izahay lazainy hoe: Toy izany no nataon''i Davida, ary toy izany no fanaony tamin''ny andro rehetra nitoerany tany amin''ny tanin''ny Filistina.'
mg1865::mg_9::27::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Akisy nino an''i Davida ka nanao hoe: Efa nampangidy hoditra* ny tenany any amin''ny Isiraely olony izy, ka dia ho mpanompoko mandrakizay. [*Hebreo: nanamaimbo]'
mg1865::mg_9::28::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikambanan''i Davida tamin''ny Filistina, sy ny nivorian''ny Filistina hiady tamin''ny Isiraely, ary ny nankanesan''i Saoly tany amin''ilay vehivavy nanao azy ho tsindrian-javatra'
  verse_text: 'Ary tamin''izany andro izany ny Filistina dia namory ny miaramilany hanafika ny Isiraely. Ary hoy Akisy tamin''i Davida: Aoka ho fantatrao tsara fa hiara-mivoaka amiko hanafika ianao sy ny olonao.'
mg1865::mg_9::28::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Akisy: Amin''izao dia ho fantatrao tokoa izay hain''ny mpanomponao hatao. Ary hoy Akisy tamin''i Davida: Noho izany dia hataoko mpiaro ny lohako mandrakizay ianao.'
mg1865::mg_9::28::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: '(Ary efa maty Samoela, ka ny Isiraely rehetra efa nisaona azy sy nandevina azy tao Rama, dia tao an-tanànany. Ary efa noroahin''i Saoly hiala amin''ny tany izay nanao azy ho tsindrian-javatra sy ny mpanao hatsarana.)'
mg1865::mg_9::28::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina nivory, dia tonga ka nitoby tao Sonema; fa Saoly namory ny Isiraely rehetra, ka nitoby tao Gilboa kosa ireo.'
mg1865::mg_9::28::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly, raha nahita ny miaramilan''ny Filistina, dia raiki-tahotra sady niemponempona ny fony.'
mg1865::mg_9::28::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly dia nanontany tamin''i Jehovah, fa Jehovah tsy namaly azy, na tamin''ny nofy, na tamin''ny Orima, na tamin''ny mpaminany.'
mg1865::mg_9::28::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''ny mpanompony: Itadiavo vehivavy manao azy ho tsindrian-javatra aho hankanesako any hanontaniako aminy. Ary hoy ny mpanompony taminy: Indro, misy vehivavy manao azy ho tsindrian-javatra eo Andora.'
mg1865::mg_9::28::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanova tarehy Saoly ka nitafy fitafiana hafa, dia nandeha izy sy ny olona roa lahy nanaraka azy ka tonga tao amin-dravehivavy nony alina; ary hoy izy: Masïna ianao, manaova fankatovana ho ahy amin''ny zavatra manindry anao, ka ampiakaro ho ety amiko izay hotononiko aminao.'
mg1865::mg_9::28::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ravehivavy taminy: Indro, fantatrao izay nataon''i Saoly, dia ny nandroahany ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana hiala amin''ny tany, ka nahoana ianao no mamandrika ny aiko hahafaty ahy?'
mg1865::mg_9::28::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Saoly nianiana tamin''i Jehovah ka nanao taminy hoe: Raha velona koa Jehovah, dia tsy hisy heloka hahazo anao amin''izao zavatra izao.'
mg1865::mg_9::28::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ravehivavy: Iza ary no hampiakariko ho eto aminao? Ary hoy izy: Samoela no ampiakaro ho ety amiko.'
mg1865::mg_9::28::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitan-dravehivavy Samoela, dia nidradradradra tamin''ny feo mafy izy ka nanao tamin''i Saoly hoe: Nahoana no namitaka ahy ianao? fa ianao no Saoly.'
mg1865::mg_9::28::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka taminy: Aza matahotra; fa inona no hitanao? Ary hoy ravehivavy tamin''i Saoly: Andriamanitra miakatra avy amin''ny tany no hitako.'
mg1865::mg_9::28::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Manao ahoana no endriny? Dia hoy izy: Lehilahy antitra no miakatra sady mikapoty izy. Ary fantatr''i Saoly fa Samoela izay, dia niondrika tamin''ny tany izy ka niankohoka.'
mg1865::mg_9::28::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela tamin''i Saoly: Nahoana no korontaninao aho ka ampiakarinao? Dia hoy Saoly: Tery loatra aho, fa miady amiko ny Filistina, ary Andriamanitra efa nahafoy ahy ka tsy mamaly teny ahy intsony, na amin''ny mpaminany, na amin''ny nofy; koa izany no nampanalako anao mba hampahalalanao ahy izay hataoko.'
mg1865::mg_9::28::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Samoela: Nahoana no manontany amiko ianao, nefa Jehovah efa mahafoy anao ka tonga fahavalonao.'
mg1865::mg_9::28::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nanao ho Azy araka ny nampilazainy ahy; fa efa nendahany hiala amin''ny tananao ny fanjakana ka nomeny an''i Davida namanao.'
mg1865::mg_9::28::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy nihaino ny feon''i Jehovah ianao ka tsy nahatanteraka ny fahatezerany mirehitra tamin''ny Amalekita, dia izany no nanaovan''i Jehovah izao zavatra izao taminao androany.'
mg1865::mg_9::28::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiaraka hatolotr''i Jehovah ho eo an-tanan''ny Filistina ny tenanao sy ny Isiraely; ary rahampitso dia ho ety amiko ianao sy ny zanakao; ary ny miaramilan''ny Isiraely koa dia hatolotr''i Jehovah eo an-tanan''ny Filistina.'
mg1865::mg_9::28::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lavo niampatra tamin''ny tany niaraka tamin''izay Saoly ka raiki-tahotra indrindra noho ny tenin''i Samoela; sady efa tsy nisy hery intsony izy, satria tsy nihinan-kanina indray andro sy indray alina maninjitra.'
mg1865::mg_9::28::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankao amin''i Saoly ravehivavy ka nahita azy ory indrindra, dia nanao taminy hoe: Indro, ny ankizivavinao nihaino ny feonao, dia nanao ny aiko tsy ho zavatra aho ka nihaino ny teninao izay nolazainao tamiko.'
mg1865::mg_9::28::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ankehitriny, masïna ianao, mba henoy kosa ny tenin''ny ankizivavinao, ary aoka aho handroso sombin-kanina kely eo anoloanao; dia hano izany mba hahatanjaka anao, raha handeha amin''ny alehanao ianao.'
mg1865::mg_9::28::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nety izy, fa hoy izy: Tsy hihinana aho. Fa ny mpanompony sy ravehivavy mbola nanery azy ihany, ka dia nihaino ny feony izy. Dia nitsangana izy ka nipetraka teo am-parafara.'
mg1865::mg_9::28::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ravehivavy nanana zanak''omby mifahy tao an-trano; dia nandeha haingana izy ka namono izany, ary naka koba izy, dia nofetafetainy ka nendasiny ho mofo tsy misy masirasira.'
mg1865::mg_9::28::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary narosony teo anoloan''i Saoly sy teo anoloan''ny mpanompony izany; dia nihinana izy ireo, ary dia niainga ka lasa nandeha tamin''iny alina iny ihany.'
mg1865::mg_9::29::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanesorana an''i Davida tsy hiaraka tamin''ny miaramilan''ny Filistina'
  verse_text: 'Ary ny Filistina dia namory ny miaramilany rehetra ho ao Afeka; fa ny Isiraely kosa nitoby teo anilan''ny loharano ao Jezirela.'
mg1865::mg_9::29::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo andrianan''ny Filistina nandroso nitarika ny miaramilany isan-jato sy isan''arivo; fa Davida sy ny olony kosa nandroso teo aoriana niaraka tamin''i Akisy.'
mg1865::mg_9::29::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo andrianan''ny Filistina: Haninona moa ireto Hebreo ireto? Ary hoy Akisy tamin''ireo andrianan''ny Filistina: Tsy io va no Davida, mpanompon''i Saoly, mpanjakan''ny Isiraely, ilay taty amiko elaela ihany izay, ary tsy hitako izay tsininy hatrizay nialany niandany tamiko ka mandraka androany?'
mg1865::mg_9::29::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra taminy ireo andrianan''ny Filistina ka nanao taminy hoe: Avereno ihany ilehio ho any amin''ny fonenany izay efa nomenao azy, fa aza avela hidina hiaraka amintsika hiady izy, fandrao ho tonga fahavalontsika raha miady; fa amin''inona no hahazoan''io sitraka amin''ny tompony? Tsy amin''ny lohan''ireto olona ireto va?'
mg1865::mg_9::29::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy io moa no Davida, izay nandihizany sy nanaovany hira mifamaly hoe: "Saoly nahafaty arivoarivo, Fa Davida nahafaty alinalina?"'
mg1865::mg_9::29::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Akisy niantso an''i Davida ka nanao taminy hoe: Raha velona koa Jehovah, marina ianao, sady sitrako ny iarahanao miditra sy mivoaka amiko eto an-toby, fa tsy hitako izay tsininao hatrizay nahatongavanao teto amiko ka mandraka androany; nefa kosa tsy sitrak''ireo andriana ireo ianao.'
mg1865::mg_9::29::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miverena, ary mandehana soa aman-tsara, mba tsy hanaovanao izay tsy sitrak''ireo andrianan''ny Filistina.'
mg1865::mg_9::29::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida tamin''i Akisy: Inona no nataoko, ary inona no hitanao tamin''ny mpanomponao hatrizay nitoerako taty aminao ka mandraka androany, no tsy hahazoako mandeha hiady amin''ny fahavalon''ny mpanjaka tompoko?'
mg1865::mg_9::29::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Akisy namaly an''i Davida hoe: Fantatro fa tsara eo imasoko tahaka ny anjelin''Andriamanitra ianao; nefa ireo andrianan''ny Filistina no nanao hoe: Tsy hiara-miakatra amintsika hiady izy.'
mg1865::mg_9::29::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mifohaza maraina koa ianao mbamin''ny mpanompon''ny tomponao izay nanaraka anao; ary rehefa nifoha maraina ianareo, ka mazava ny andro, dia mandehana.'
mg1865::mg_9::29::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny olony nifoha maraina koa handeha maraina hiverina any amin''ny tanin''ny Filistina. Ary ny Filistina dia niakatra nankany Jezirela.'
mg1865::mg_9::30::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namalian''i Davida ny Amalekita noho ny nandravany an''i Ziklaga'
  verse_text: 'Ary nony tonga teo Ziklaga Davida sy ny olony tamin''ny andro fahatelo, dia, indro, ny Amalekita efa nanafika ny tany atsimo sy Ziklaga ka namely an''i Ziklaga sy nandoro azy tamin''ny afo;'
mg1865::mg_9::30::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa namabo ny vehivavy sy izay rehetra tao izy, na lehibe na kely, nefa tsy nisy novonoiny na dia iray aza; fa nentiny ho babo ireo, ka lasa nandeha izy.'
mg1865::mg_9::30::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny olony tonga tao amin''ny tanàna, ary, indro, efa levon''ny afo ny tanàna; ary ny vadiny mbamin''ny zananilahy sy ny zananivavy efa lasan-ko babo.'
mg1865::mg_9::30::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny mpanaraka azy dia nanandratra ny feony nitomany ambara-paha-tsy nahatomany intsony izy.'
mg1865::mg_9::30::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voababo koa izy roa vavy vadin''i Davida, dia Ahinoama Jezirelita sy Abigaila, ilay novinadin''i Nabala Karmelita.'
mg1865::mg_9::30::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ory indrindra Davida, fa ny olona nifampitaona hitora-bato azy, satria samy nalahelo ny zananilahy sy ny zananivavy ny olona rehetra; fa Davida kosa nampahery ny tenany tamin''i Jehovah Andriamaniny.'
mg1865::mg_9::30::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida tamin''i Abiatara mpisorona, zanak''i Ahimeleka: Masïna ianao, ento ety amiko ny efoda. Dia nentin''i Abiatara teo amin''i Davida ny efoda.'
mg1865::mg_9::30::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida nanontany tamin''i Jehovah hoe: Henjehiko va izany jirika izany? Ho tratro va izy? Dia namaly azy Jehovah hoe: Enjeho izy, fa ho tratranao tokoa ary ho rarakao.'
mg1865::mg_9::30::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Davida sy ny enin-jato lahy izay nanaraka azy ka tonga teo amin''ny renirano Besora, ary teo no nijanonan''ny sasany.'
mg1865::mg_9::30::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida sy ny efa-jato lahy no nanenjika; fa ny roan-jato lahy kosa, izay reraka ka tsy afaka nita ny renirano Besora, dia nijanona tany aoriana.'
mg1865::mg_9::30::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita lehilahy Egyptiana tany an-tsaha ny olona, ka nentiny tany amin''i Davida; ary nomeny hanina ralehilahy, ka nihinana izy, ary nampisotroiny rano koa izy.'
mg1865::mg_9::30::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeny ampempan''aviavy iray didy sy voaloboka maina roa sampaho izy; ary rehefa nihinana izy, dia nody indray ny ainy; fa hateloan''andro sy hateloan''alina izy tsy nihinan-kanina na nisotro rano.'
mg1865::mg_9::30::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida taminy: An''iza moa ianao, ary avy taiza? Ary hoy izy: Zatovo Egyptiana, mpanompon''ny Amalekita anankiray, aho; ary narian''ny tompoko aho, fa narary afaka omaly.'
mg1865::mg_9::30::14:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahay efa nanafika ny tany atsimo izay an''ny Keretita sy ny an''i Joda ary ny tany atsimo izay an''i Kaleba ary nandoro an''i Ziklaga tamin''ny afo.'
mg1865::mg_9::30::15:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Davida taminy: Hitondra ahy midina ho amin''izany jirika izany va ianao? Ary hoy izy: Mianiàna amiko amin''Andriamanitra fa tsy hamono ahy ianao na hanolotra ahy ho eo an-tanan''ny tompoko, dia hitondra anao midina ho amin''izany jirika izany aho.'
mg1865::mg_9::30::16:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nentiny nidina izy, indreo, miely eran''ny tany izy ka homana sy misotro ary milanona noho ny haben''ny babo rehetra izay azony tamin''ny tanin''ny Filistina sy ny tanin''ny Joda.'
mg1865::mg_9::30::17:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida namely azy tamin''iny takariva iny ka hatramin''ny ampitso hariva; ary tsy nisy olona afaka, afa-tsy zatovo efa-jato lahy izay nitaingina rameva ka nandositra.'
mg1865::mg_9::30::18:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia rarak''i Davida izay rehetra efa nobaboin''ny Amalekita; ary dia azon''i Davida koa ny vadiny roa.'
mg1865::mg_9::30::19:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy zavatra tsy azony, na kely na be, na zazalahy na zazavavy, na inona na inona tamin''izay nobaboin''ireny; izany rehetra izany dia azon''i Davida avokoa.'
mg1865::mg_9::30::20:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida naka ny ondry aman''osy sy ny omby rehetra; ary nentiny nialoha ny omby hafa ireo, sady nisy niantso hoe: Itony no babon''i Davida.'
mg1865::mg_9::30::21:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Davida tonga teo amin''ny roan-jato lahy, izay reraka ka tsy afaka nanaraka azy, fa najanony teo amin''ny renirano Besora; ary dia nandeha ireo hitsena an''i Davida sy ny olona nanaraka azy; ary nony tonga teo akaikin''ny olona Davida, dia nanontany izay toeny.'
mg1865::mg_9::30::22:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny ny olona sompatra sy tena ratsy fanahy rehetra avy nanaraka an''i Davida ka nanao hoe: Satria tsy mba niaraka tamintsika ireo, dia tsy hanomezantsika azy ny babo izay azontsika, afa-tsy ny vadiny aman-janany isany avy; fa ireo no aoka ho entiny, dia handeha izy.'
mg1865::mg_9::30::23:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Davida: Aza manao izany amin''izay nomen''i Jehovah antsika, ry rahalahy; fa niaro antsika Izy, ary natolony teo an-tanantsika ny jirika izay tonga namely antsika.'
mg1865::mg_9::30::24:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa iza no hanaiky anareo amin''izany? Fa tahaka ny anjaran''izay nidina hiady ihany no ho anjaran''izay nitoetra tamin''ny entana: hiara-misalahy izy.'
mg1865::mg_9::30::25:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izany no fanao hatramin''izany andro izany, ka dia natao didy sy lalàna tamin''ny Isiraely izany ambaraka androany.'
mg1865::mg_9::30::26:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga tao Ziklaga Davida, dia mba nanaterany ho an''ny loholon''ny Joda sakaizany ny babo ka nataony hoe: Inty izay saotra ho anareo avy amin''ny babo azo tamin''ny fahavalon''i Jehovah,'
mg1865::mg_9::30::27:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho an''izay ao Betela sy izay any Ramata amin''ny tany atsimo sy ho an''izay ao Jatira'
mg1865::mg_9::30::28:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ho an''izay ao Aroera sy ho an''izay ao Sifmota sy ho an''izay ao Estemoa'
mg1865::mg_9::30::29:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ho an''izay ao Rakala sy ho an''izay any an-tanànan''ny Jeramelita sy ho an''izay any an-tanànan''ny Kenita'
mg1865::mg_9::30::30:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ho an''izay ao Horma sy ho an''izay ao Korasana sy ho an''izay ao Ataka'
mg1865::mg_9::30::31:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 30
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ho an''izay ao Hebrona ary ho an''izay any amin''ny tany rehetra nandehandehanan''i Davida sy ny olony.'
mg1865::mg_9::31::1:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahafatesan''i Saoly sy ny zanany, ary ny nandevenana azy'
  verse_text: 'Ary ny Filistina niady tamin''ny Isiraely, ary nandositra teo anoloan''ny Filistina ny lehilahy amin''ny Isiraely, ary niampatrampatra teny an-tendrombohitra Gilboa ny faty.'
mg1865::mg_9::31::2:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Filistina nanenjika mafy an''i Saoly sy ny zanany, ka matin''ny Filistina Jonatana sy Abinadaba ary Malkisoa, zanak''i Saoly.'
mg1865::mg_9::31::3:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mafy ny ady tamin''i Saoly, dia nifanehatra tamin''ny mpandefa tsipïka izy; ary raiki-tahotra indrindra izy noho ny mpandefa tsipïka.'
mg1865::mg_9::31::4:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Saoly tamin''ny mpitondra ny fiadiany : Tsoahy ny sabatrao, ka tsatohy miboroaka aho, fandrao avy irery tsy mifora irery ka hotsatohiny miboroaka aho, dia hataony ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadany, fa natahotra loatra izy. Dia nalain''i Saoly ny sabatra ka nianjerany.'
mg1865::mg_9::31::5:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ny mpitondra ny fiadiany fa maty Saoly, dia mba nianjera tamin''ny sabany koa izy ka niara-maty taminy.'
mg1865::mg_9::31::6:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia niara-maty androtrizay ihany Saoly sy ny zanany telo lahy sy ny mpitondra ny fiadiany ary ny olony rehetra.'
mg1865::mg_9::31::7:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny lehilahy amin''ny Isiraely teny an-dafin''ny lohasaha sy teny an-dafin''i Jordana fa nandositra ny lehilahy amin''ny Isiraely, ary maty Saoly sy ny zanany, dia niala tao an-tanàna izy ka nandositra; ary dia tonga ny Filistina ka nonina tao.'
mg1865::mg_9::31::8:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitso, raha tonga haka ny zavatra teo amin''ny maty ny Filistina, dia nahita an''i Saoly sy ny zanany telo lahy niampatrampatra teo an-tendrombohitra Gilboa izy.'
mg1865::mg_9::31::9:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary notapahiny ny lohany, sady nalainy ny fiadiany, ary dia naniraka tany amin''ny tanin''ny Filistina manodidina izy hanambara izany zavatra mahafaly izany ao amin''ny tranon''ny sampiny sy amin''ny olona.'
mg1865::mg_9::31::10:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia napetrany tao amin''ny tranon''i Astarta ny fiadiany; ary ny fatiny nohomboany teo amin''ny màndan''i Beti-sana.'
mg1865::mg_9::31::11:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ren''ny mponina tany Jabesi-gileada izay nataon''ny Filistina tamin''i Saoly,'
mg1865::mg_9::31::12:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niainga ny lehilahy mahery rehetra ka nandeha mandritra ny alina ary naka ny fatin''i Saoly sy ny fatin''ny zanany teo amin''ny màndan''i Beti-sana; ary tonga tao Jabesy izy ka nandoro azy tao.'
mg1865::mg_9::31::13:
  verse_version: mg1865
  verse_book: mg_9
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny ny taolany ka naleviny tao ambanin''ilay hazo tamariska tao Jabesy, ary dia nifady hanina hafitoana izy.'
