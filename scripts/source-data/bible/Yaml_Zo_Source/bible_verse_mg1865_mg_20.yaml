mg1865::mg_20::1::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fitarihan-teny
  verse_text: 'Ny Ohabolan''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely:'
mg1865::mg_20::1::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahalalana fahendrena sy fananarana, Ary hahafantarana ny tenin''ny fahalalana;'
mg1865::mg_20::1::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahazoana fananarana mampahahendry, Dia fahamarinana sy rariny ary fahitsiana;'
mg1865::mg_20::1::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanomezam-pahendrena ho an''ny kely saina, Ary fahalalana sy fisainana mazava ho an''ny zatovo.'
mg1865::mg_20::1::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny hendry hihaino ka hitombo saina; Ary aoka ny manam-panahy hahazo fitarihana tsara;'
mg1865::mg_20::1::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahafantarana ohabolana sy fanoharana, Ary ny tenin''ny hendry sy ny teny saro-pantarina ataony.'
mg1865::mg_20::1::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah no fiandoham-pahalalana; Fa ny adala manamavo ny fahendrena sy ny famaizana. Fananarana tsy hikambana amin''ny mpanao ratsy.'
mg1865::mg_20::1::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, mihainoa ny ana-drainao, Ary aza mahafoy ny lalàn-dreninao;'
mg1865::mg_20::1::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fehiloha tsara tarehy amin''ny lohanao izany, Ary rado amin''ny vozonao.'
mg1865::mg_20::1::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, raha taomin''ny mpanota ianao, Aza manaiky.'
mg1865::mg_20::1::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy izy: Andeha hiaraka isika, Aoka isika hanotrika handatsa-drà; Andeha hamitsahantsika tsy ahoan-tsy ahoana ny tsy manan-tsiny;'
mg1865::mg_20::1::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka isika hitelina azy velona tahaka ny fitelin''ny fiainan-tsy hita* Ary hanao azy teli-moka toy ny latsaka any an-davaka; [*Hebreo: Sheola]'
mg1865::mg_20::1::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho azontsika ny fananana sarobidy rehetra, Ka hofenointsika babo ny tranontsika;'
mg1865::mg_20::1::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia mba hiara-miloka eto aminay; Aoka ho iray ihany ny kitapom-bolantsika rehetra:'
mg1865::mg_20::1::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, aza miara-dalana aminy ianao; Arovy ny tongotrao tsy hankamin''ny alehany;'
mg1865::mg_20::1::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tongony mihazakazaka ho amin''ny ratsy Sady faingana handatsa-drà.'
mg1865::mg_20::1::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa velarim-poana ny fandrika, Raha hitan''ny vorona.'
mg1865::mg_20::1::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireny dia manotrika handatsaka ny ran''ny tenany ihany; Mamitsaka hahafaty ny tenany ihany izy.'
mg1865::mg_20::1::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no iafaran''izay rehetra fatra-pila harena; Fa hipaoka ny ain''izay fatra-pila azy izany.'
mg1865::mg_20::1::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Fiantsoana sy fananarana ataon''ny fahendrena'
  verse_text: 'Ny fahendrena miantso mafy eny ivelany; Manandratra ny feony eny an-kalalahana izy;'
mg1865::mg_20::1::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitory ao amin''izay fivorian''ny maro be mireondreona izy; Eo anoloan''ny vavahady sy ao an-tanàna no ilazany ny teniny hoe:'
mg1865::mg_20::1::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry kely saina, mandra-pahoviana no hitiavanareo ny fahadalana, Sy hifalian''ny mpaniratsira amin''ny faniratsirana, Ary hankahalan''ny adala ny fahalalana?'
mg1865::mg_20::1::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena ianareo hihaino ny fananarako; Indro, haidiko aminareo ny fanahiko, Ary hampahafantariko anareo ny teniko.'
mg1865::mg_20::1::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa niantso Aho, fa nandà ianareo; Efa naninjitra ny tanako Aho, fa tsy nisy nitandrina;'
mg1865::mg_20::1::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nolavinareo ny saina rehetra natolotro, Sady tsy nety nanaiky ny anatro ianareo:'
mg1865::mg_20::1::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho kosa hihomehy, raha tonga ny fandringanana anareo; Handatsa Aho, raha tonga ny mahatahotra anareo.'
mg1865::mg_20::1::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tonga ny zava-mahatahotra anareo tahaka ny rivo-doza Ary ny fandringanana anareo toy ny tadio, Ka manjo anareo ny fahoriana sy ny fangirifiriana,'
mg1865::mg_20::1::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vao hiantso Ahy izy, fa tsy hamaly Aho; Dia vao hitady Ahy fatratra izy, fa tsy ho hitany Aho.'
mg1865::mg_20::1::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nankahala ny fahalalana izy Ary tsy nifidy ny fahatahorana an''i Jehovah,'
mg1865::mg_20::1::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nekeny ny saina natolotro, Notsiratsirainy avokoa ny anatro rehetra,'
mg1865::mg_20::1::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hihinana ny vokatry ny alehany izy Ka ho voky ny fihendreny.'
mg1865::mg_20::1::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fihemoran''ny kely saina hahafaty azy, Ary ny fiadanan''ny adala handringana azy.'
mg1865::mg_20::1::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mihaino Ahy kosa hitoetra tsy manana ahiahy, Eny, handry fahizay izy ka tsy hatahotra ny ratsy.'
mg1865::mg_20::2::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny soa hitan''izay mandray ny fahendrena'
  verse_text: 'Anaka, raha raisinao ny teniko, Ary raketinao ao am-ponao ny didiko,'
mg1865::mg_20::2::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka atongilanao amin''ny fahendrena ny sofinao, Ary ampitandremanao fahalalana ny fonao;'
mg1865::mg_20::2::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, raha miantso ny fahalalana ianao Ary manandratra ny feonao hahazo saina,'
mg1865::mg_20::2::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitady azy toy ny fitady volafotsy ianao Ary mikatsaka azy toy ny fikatsaka harena afenina:'
mg1865::mg_20::2::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho fantatrao marina ny fahatahorana an''i Jehovah, Ary ho hitanao ny fahalalana an''Andriamanitra.'
mg1865::mg_20::2::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah no manome fahendrena; Avy amin''ny vavany no ihavian''ny fahalalana sy ny fahazavan-tsaina.'
mg1865::mg_20::2::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy mitahiry fanambinana*ho an''ny mahitsy Sady ampingan''izay mandeha tsy misy tsiny; [*Na: tena fahendrena]'
mg1865::mg_20::2::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia mitandrina ny lalan''ny fahamarinana Izy Ary miambina ny lalan''ny olony masina.'
mg1865::mg_20::2::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izay dia ho fantatrao ny fahamarinana sy ny rariny Ary ny hitsiny, dia ny lalana tsara rehetra.'
mg1865::mg_20::2::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha latsaka ao am-ponao ny fahendrena, Ary* mamin''ny fanahinao ny fahalalana, [*Na: Fa ho tafiditra ao am-ponao ny fahendrena, Ka ho]'
mg1865::mg_20::2::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiaro anao ny fisainana mazava, Ary hiambina anao ny fahalalana,'
mg1865::mg_20::2::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hamonjy anao amin''ny lalan-dratsy Sy amin''ny lehilahy izay miteny fitaka,'
mg1865::mg_20::2::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahafoy ny lalan''ny fahamarinana Mba hizorany amin''ny lalan''ny fahamaizinana,'
mg1865::mg_20::2::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay faly hanao ratsy Sy finaritra amin''ny fitaky ny ratsy,'
mg1865::mg_20::2::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay melo-dalana Sy maniasia amin''ny alehany;'
mg1865::mg_20::2::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamonjy anao amin''ny vehivavy jejo* koa izany, Dia amin''ny vahiny janga izay mandrobo amin''ny teniny, [*Hebreo: vehivavy tsy vadinao]'
mg1865::mg_20::2::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahafoy ny vadin*''ny fahatanorany Sy manadino ny fanekeny teo amin''Andriamaniny. [*Hebreo: sakaizan'']'
mg1865::mg_20::2::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tranony milentika ho amin''ny fahafatesana, Ary ny alehany mankany amin''ny maty.'
mg1865::mg_20::2::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy afa-miverina izay mankany aminy, Na mihazo amin''ny lalan''aina,'
mg1865::mg_20::2::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handehananao amin''ny lalan''ny tsara fanahy Sy hitandremanao ny alehan''ny marina.'
mg1865::mg_20::2::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona mahitsy no honina amin''ny tany, Ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao;'
mg1865::mg_20::2::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ratsy fanahy kosa hofongorana amin''ny tany, Ary ny mpivadika hongotana.'
mg1865::mg_20::3::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Famporisihana hitondra tena tsara'
  verse_text: 'Anaka, aza manadino ny lalàko; Fa aoka ny fonao hitandrina ny didiko;'
mg1865::mg_20::3::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa andro maro sy taona ela iainana Ary fiadanana no hanampiny ho anao.'
mg1865::mg_20::3::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy handao anao ny famindram-po sy ny fahamarinana; Afehezo eo am-bozonao izany, Ary soraty ao amin''ny fonao tahaka ny amin''ny vato fisaka,'
mg1865::mg_20::3::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hahazo fitia sy fahalalana tsara Eo anatrehan''Andriamanitra sy ny olona ianao.'
mg1865::mg_20::3::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matokia an''i Jehovah amin''ny fonao rehetra, Fa aza miankina amin''ny fahalalanao;'
mg1865::mg_20::3::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maneke Azy amin''ny alehanao rehetra, Fa Izy handamina ny lalanao,'
mg1865::mg_20::3::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao anao ho hendry; Matahora an''i Jehovah, ka mifadia ny ratsy.'
mg1865::mg_20::3::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho famelombelomana ny nofonao izany Sy ho fanamandoana ny taolanao.'
mg1865::mg_20::3::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah amin''ny fanananao Sy amin''izay voaloham-bokatrao rehetra;'
mg1865::mg_20::3::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho feno mitafotafo ny fitoeram-barinao, Ary hihoatra ny ranom-boaloboka eo amin''ny vata fanantazanao.'
mg1865::mg_20::3::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, aza manamavo ny famaizan''i Jehovah, Ary aza tofoka amin''ny fananarany;'
mg1865::mg_20::3::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tian''i Jehovah no anariny, Dia tahaka ny ataon''ny ray amin''ny zanaka tiany.'
mg1865::mg_20::3::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny fahasambaran''izay olona mahita fahendrena'
  verse_text: 'Sambatra izay olona mahita fahendrena Sy izay olona mahazo fahalalana.'
mg1865::mg_20::3::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fandrantoana azy dia tsara noho ny fandrantoana volafotsy, Ary ny tombom-barotra aminy dia mihoatra noho ny volamena tsara.'
mg1865::mg_20::3::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sarobidy noho ny voahangy* izy; Ary izay rehetra irinao tsy misy azo ampitahaina aminy. [*Na: perla]'
mg1865::mg_20::3::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa andro maro no eo an-tanany ankavanana; Ary harena sy voninahitra no eo an-tanany ankavia.'
mg1865::mg_20::3::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Làlana mahafinaritra ny lalany, Ary fiadanana ny alehany rehetra.'
mg1865::mg_20::3::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hazon''aina ho an''izay rehetra mifikitra aminy izy; Ary izay rehetra mitana azy no hatao hoe sambatra.'
mg1865::mg_20::3::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahendrena no nanorenan''i Jehovah ny tany, Ary fahalalana no nampitoerany ny lanitra.'
mg1865::mg_20::3::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahalalany no entiny mampiboiboika ny rano any amin''ny lalina Sy ampitetevany ando avy amin''ny rahona.'
mg1865::mg_20::3::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, aoka tsy hiala amin''ny masonao izany; Raketo ny tena fahendrena sy ny fisainana mazava,'
mg1865::mg_20::3::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho ain''ny fanahinao izany Ary ho firavaky ny vozonao,'
mg1865::mg_20::3::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handroso aman-toky ianao, Ka tsy ho tafintohina ny tongotrao.'
mg1865::mg_20::3::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hatahotra ianao, raha mandry; Eny, handry ianao, ary ho mamy ny torimasonao.'
mg1865::mg_20::3::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manahy ny tahotra avy tampoka, Na ny rivo-doza mamely* ny ratsy fanahy, raha avy izany; [*Na: ny fandringanana avy amin''ny]'
mg1865::mg_20::3::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah no ho tokinao Ka hiambina ny tongotrao tsy ho voafandrika.'
mg1865::mg_20::3::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Famporisihana hanao soa amin''olona sy hanao ny marina'
  verse_text: 'Aza mamihina ny soa amin''izay tokony homena azy, Raha azon''ny tananao atao ihany;'
mg1865::mg_20::3::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao amin''ny namanao hoe: Mandehana, ka avia indray, fa rahampitso no homeko; Kanefa manana ihany ianao.'
mg1865::mg_20::3::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamorona sain-dratsy ho enti-mamely ny namanao, Saingy mitoetra matoky eo aminao izy.'
mg1865::mg_20::3::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miady amin''olona foana, Raha tsy mbola nanisy ratsy anao izy.'
mg1865::mg_20::3::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mialona ny olon-dozabe, Na mifidy izay lalany akory,'
mg1865::mg_20::3::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria fahavetavetana eo imason''i Jehovah ny maniasia, Fa ao amin''ny marina kosa ny fisakaizany.'
mg1865::mg_20::3::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ozon''i Jehovah dia ao an-tranon''ny ratsy fanahy; Fa ny fonenan''ny marina dia tahiny kosa.'
mg1865::mg_20::3::34:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia tsiratsirainy aza ny mpaniratsira, Dia omeny fahasoavana kosa ny mpandefitra.'
mg1865::mg_20::3::35:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hendry handova voninahitra; Fa henatra kosa no ho anjaran''ny adala.'
mg1865::mg_20::4::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana hikatsaka ny fahendrena tsy hikambana amin''ny mpanao ratsy'
  verse_text: 'Ry zanaka, henoy ny anatry ny ray, Ary tandremo mba hahazoanareo ny fahalalana tsara.'
mg1865::mg_20::4::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa anatra tsara no omeko anareo; Aza mahafoy ny lalàko.'
mg1865::mg_20::4::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa zanak''ikaky aho, Sady tiana* no hany malala teo imason''ineny. [*Hebreo: malemilemy]'
mg1865::mg_20::4::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampianatra ahy izy ka nanao tamiko hoe: Aoka ny fonao hitana ny teniko; Tandremo ny didiko, dia ho velona ianao.'
mg1865::mg_20::4::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahazoa fahendrena, mahazoa fahalalana; Fa aza hadinoina na ihemorana ny teny aloaky ny vavako.'
mg1865::mg_20::4::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mahafoy azy, fa hiaro anao izy; Tiavo izy, dia hitandrina anao.'
mg1865::mg_20::4::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voaloham-pahendrena dia izao*: Mahazoa fahendrena; Eny, lanio ny fanananao rehetra hamidy fahalalana tsara. [*Na: Fahendrena no ambony indrindra]'
mg1865::mg_20::4::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandrato izy, dia hanandratra anao kosa Eny, hanome voninahitra anao izy, raha tananao.'
mg1865::mg_20::4::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hasiany fehiloha mahafinaritra ny lohanao; Eny, satro-boninahitra tsara tarehy no homeny anao.'
mg1865::mg_20::4::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, mihainoa, ka raiso ny teniko; Dia hihamaro ny taona hiainanao.'
mg1865::mg_20::4::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Làlam-pahendrena no atoroko anao: Eny, mitarika anao amin''ny lalana mahitsy aho.'
mg1865::mg_20::4::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandeha ianao, dia tsy ho ety ny lalanao; Ary raha mihazakazaka ianao, dia tsy ho tafintohina.'
mg1865::mg_20::4::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tano mafy ny fananarana, ka aza avela hiala; Hazony izy, fa ainao.'
mg1865::mg_20::4::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mankany amin''ny alehan''ny ratsy fanahy, Ary aza mizotra amin''ny lalan''ny ratsy.'
mg1865::mg_20::4::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manalavira azy; aza mandalo eo akory; Mivilia azy, ka mizora.'
mg1865::mg_20::4::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy matory ireny, raha tsy efa nanao ratsy; Ary tsy mahita torimaso izy, raha tsy efa nanafintohina ny sasany.'
mg1865::mg_20::4::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mihinana ny mofon''ny faharatsiana izy, Sy misotro ny divain''ny fahalozàna.'
mg1865::mg_20::4::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lalan''ny marina dia toy ny fipoak''andro maraina, Izay mihamazava mandra-pitataovovonan''ny andro.'
mg1865::mg_20::4::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alehan''ny ratsy fanahy dia toy ny aizim-pito; Tsy fantany akory izay manafintohina azy.'
mg1865::mg_20::4::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, tandremo ny teniko; Atongilano ny sofinao hihaino ny filazako.'
mg1865::mg_20::4::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hiala eo imasonao izy, Fa raketo ao am-ponao.'
mg1865::mg_20::4::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aina ho an''ny mahazo azy izy Ary fahasalamana ho an''ny nofony rehetra.'
mg1865::mg_20::4::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny fonao mihoatra noho izay rehetra tokony hotandremana; Fa avy ao aminy no ihavian*''ny aina. [*Hebreo: fivoahan'']'
mg1865::mg_20::4::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory aminao ny vava mandainga, Ary ampanalaviro anao ny molotra mamitaka.'
mg1865::mg_20::4::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny masonao hijery mahitsy, Ary ny hodimasonao hibanjina eo anoloanao.'
mg1865::mg_20::4::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy marina ny* alehan''ny tongotrao, Dia ho voalamina ny alehanao rehetra; [*Na: Saino tsara izay]'
mg1865::mg_20::4::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mivily, na ho amin''ny ankavanana, na ho amin''ny ankavia; Esory amin''ny ratsy ny tongotrao.'
mg1865::mg_20::5::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana tsy hijejojejo'
  verse_text: 'Anaka, tandremo ny fahendreko, Ary atongilano ny sofinao ho amin''ny fahalalako,'
mg1865::mg_20::5::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiheveranao tsara ny fisainana mazava Sy hitandreman''ny molotrao ny fahalalana.'
mg1865::mg_20::5::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny molotry ny vehivavy jejo* dia mitete toy ny tantely avy amin''ny tohotra, Ary ny vavany dia malama noho ny diloilo; [*Hebreo: vehivavy tsy vadiny]'
mg1865::mg_20::5::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny farany mangidy tahaka ny hazo mahafaty Ary maranitra hoatra ny sabatra roa lela.'
mg1865::mg_20::5::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongony midina ho any amin''ny fahafatesana, Ary ny diany mizotra ho any amin''ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_20::5::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahazo mandia ny lalan''aina mihitsy izy, Fa manjenjena, ka tsy fantany akory izay halehany.'
mg1865::mg_20::5::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ahy, ry zanaka, Ary aza miala amin''ny teny aloaky ny vavako.'
mg1865::mg_20::5::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampanalaviro azy ny alehanao, Ary aza manakaiky ny varavaran''ny tranony;'
mg1865::mg_20::5::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao omenao ho an''ny sasany ny voninahitrao, Ary ny taonanao ho an''izay lozabe;'
mg1865::mg_20::5::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao hivokisan''ny vahiny ny fanananao; Ary izay nisasaranao ho tonga ao an-tranon''ny vahiny;'
mg1865::mg_20::5::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hitoloko ianao any am-parany, Raha mihalevona ny nofonao sy ny tenanao;'
mg1865::mg_20::5::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: '2022-09-26T05:29:14+0000'
  verse_title: null
  verse_text: 'Dia hanao hoe ianao: Nahoana re no nankahala famaizana aho? Ary nahoana no naniratsira fananarana ny foko,'
mg1865::mg_20::5::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka tsy nihaino ny tenin''ny mpanoro hevitra ahy, Ary tsy nanongilana ny sofiko hihaino ny mpampianatra ahy?'
mg1865::mg_20::5::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa saiky azon''ny ratsy rehetra aho Tao amin''ny fiangonana sy ny fivoriana.'
mg1865::mg_20::5::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misotroa rano avy amin''ny lavaka famorian-dranonao ihany Sy rano miboiboika avy amin''ny fantsakanao.'
mg1865::mg_20::5::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hipasaka eny ivelany va ny rano avy amin''ny loharanonao, Ary eny an-dalambe ny rano velonao?'
mg1865::mg_20::5::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho anao irery ihany izany, Fa aza iombonana amin''ny hafa.'
mg1865::mg_20::5::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hotahina ny loharanonao, Ary mifalia amin''ny vadin''ny fahatanoranao.'
mg1865::mg_20::5::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa dieravavy mahate-ho-tia sy osi-dia tsara bika izy, Dia aoka ny tratrany no hahafeno fifaliana anao mandrakariva, Ary aoka ho feno faharavoravoana lalandava amin''ny fitiavany ianao.'
mg1865::mg_20::5::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianao, anaka, no ho renoka amin''ny fitiavana vehivavy jejo* Ka hanohona ny tratran''ny vahiny janga? [*Hebreo: vehivavy tsy vadiny]'
mg1865::mg_20::5::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa eo imason''i Jehovah ny alehan''ny olona, Ary ny diany rehetra dia dinihiny avokoa.'
mg1865::mg_20::5::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny heloky ny ratsy fanahy dia mahazo ny tenany ihany, Ary ny kofehin''ny fahotany no itanana azy'
mg1865::mg_20::5::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maty noho ny tsy fahazoany famaizana izy, Eny, mikorapaka noho ny haben''ny fahadalany.'
mg1865::mg_20::6::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy mahamety ny miantoka olona sy ny hakamoana sy ny fitaka sy ny avonavona; ary ny zavatra fito loha izay halan''i Jehovah'
  verse_text: 'Anaka, raha niantoka ny namanao ianao Ary nandray tanana hiantoka ny hafa,'
mg1865::mg_20::6::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: '2022-04-13T11:23:03+0000'
  verse_title: null
  verse_text: 'Ka voafandriky ny teny naloaky ny vavanao ianao Sady voasaringotry ny teny naloaky ny vavanao,'
mg1865::mg_20::6::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izao no ataovy, anaka, ka afaho ny tenanao (Satria efa mby eo an-tanan''ny namanao ianao): Andeha mihohoka sy mifona mafy amin''ny namanao.'
mg1865::mg_20::6::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hatory akory ny masonao, Ary aza avela hilondolondo ny hodimasonao.'
mg1865::mg_20::6::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afaho ny tenanao toy ny gazela* miala amin''izay mihazona azy, Ary toy ny voron-kely miala amin''ny tanan''ny mpamandrika. [*Izahao II Samoela 2:18]'
mg1865::mg_20::6::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana any amin''ny vitsika, ry ilay malaina; Diniho ny fanaony, ka mba hendre;'
mg1865::mg_20::6::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manana komandy ireny, Na mpifehy, na mpanapaka,'
mg1865::mg_20::6::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa mamory ny haniny raha fahavaratra izy, Ary manangona ny fihinany amin''ny fararano.'
mg1865::mg_20::6::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no mbola handry ihany ianao, ry ilay malaina? Rahoviana no hifoha amin''ny torimasonao ianao?'
mg1865::mg_20::6::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hatory kely ihany, mbola ho renoka kely ihany, Ary mbola hanohon-tanana kely hatory,'
mg1865::mg_20::6::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tonga toy ny lehilahy mimaona hamely ny alahelonao, Ary ny fahantranao ho toy ny jiolahy.'
mg1865::mg_20::6::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tena ratsy fanahy sy mpanao ratsy Dia ilay mandehandeha manao vava ratsy,'
mg1865::mg_20::6::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mami-maso sy manao famantarana amin''ny tongony Ary manao baiko amin''ny rantsan-tanany;'
mg1865::mg_20::6::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahafetsena no ao am-pony, Mihevi-dratsy mandrakariva izy Sady mamafy ady.'
mg1865::mg_20::6::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia ho avy tampoka kosa ny loza hanjo azy; Ho torotoro tampoka izy, ka tsy hisy fahasitranana.'
mg1865::mg_20::6::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao enina izao no halan''i Jehovah, Eny, fito no ataony ho fahavetavetana:'
mg1865::mg_20::6::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maso miavonavona, ny lela fandainga, Ary ny tanana mandatsa-drà marina,'
mg1865::mg_20::6::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fo mamoron-tsain-dratsy, Ny tongotra malaky mihazakazaka hanao ratsy,'
mg1865::mg_20::6::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mamoaka lainga ho vavolombelona tsy marina, Ary ny mamafy ady ao amin''ny rahalahy.'
mg1865::mg_20::6::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Fananarana hankatò tsara ny ana-dray aman-dreny mba hifady ny fifangajangana'
  verse_text: 'Anaka, tandremo ny didin-drainao, Ary aza mahafoy ny lalàn-dreninao.'
mg1865::mg_20::6::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afatory amin''ny fonao mandrakariva ireo, Ary afehezo eo am-bozonao,'
mg1865::mg_20::6::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandeha ianao, dia hitari-dalana anao ireo; Raha mandry ianao, dia hiambina anao; Ary raha mifoha ianao, dia hamelona eritreritra anao.'
mg1865::mg_20::6::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa jiro ny didy, ary fanazavana ny lalàna, Ary lalan''aina ny anatra famaizana,'
mg1865::mg_20::6::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiarovana anao amin''ny vehivavy ratsy fanahy, Ary amin''ny fandroboan''ny lelan''ny vahiny janga*. [*Hebreo: lelam-bahiny]'
mg1865::mg_20::6::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny fonao tsy haniry ny hatsaran-tarehiny; Ary aoka tsy hahazo anao amin''ny hodimasony izy.'
mg1865::mg_20::6::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho ny vehivavy mpijangajanga no mila tsy hananan''ny lehilahy sombi-mofo, Ary ny amin''ny vadin''ny olona no mihaza ny aina soa.'
mg1865::mg_20::6::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatondra afo ao an-tratran''akanjony va ny olona, Ka tsy ho may ny akanjony?'
mg1865::mg_20::6::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mahadia vain''afo va, Ka tsy ho may ny tongony?'
mg1865::mg_20::6::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany izay mankamin''ny vadin''ny namany; Tsy maintsy hampijalina izay mikasika azy.'
mg1865::mg_20::6::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy avelan''ny olona ho afa-maina ny mpangalatra, Raha maka zavatra hahavoky ny tenany izy, na dia noana aza;'
mg1865::mg_20::6::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa* raha azo izy, dia hampanoneriny fito heny Ka hanome ny fananana rehetra ao an-tranony. [*Na: Ny olona tsy manome tsiny ny mpangalatra, noana; Nefa]'
mg1865::mg_20::6::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mijangajanga amin''ny vehivavy dia tsy ampy saina; Izay ta-hanimba tena no manao izany.'
mg1865::mg_20::6::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voakapoka sy afa-baraka izy Ary tsy ho afaka amin''ny tondro-molotra.'
mg1865::mg_20::6::34:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran-dehilahy, Koa tsy hamindra fo izy amin''ny andro hamaliany.'
mg1865::mg_20::6::35:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy handray vola ho enti-manalady* akory izy, Ary tsy hety, na dia omenao fanambatambazana be aza. [*Hebreo: avotra]'
mg1865::mg_20::7::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, tandremo ny teniko, Ary raketo ao aminao ny didiko.'
mg1865::mg_20::7::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny didiko, dia ho velona ianao; Ary tandremo toy ny anakandriamasonao ny lalàko.'
mg1865::mg_20::7::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afehezo eo amin''ny rantsan-tananao izy, Soraty ao amin''ny fonao tahaka ny amin''ny vato fisaka izy.'
mg1865::mg_20::7::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahendrena dia ilazao hoe: Anabaviko ianao; Ary ny fahafantarana dia antsoy hoe: Sakaiza mahazatra ianao;'
mg1865::mg_20::7::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hiarovana anao amin''ny vehivavy jejo*, Dia amin''ny vahiny janga izay manao teny mandrobo. [*Hebreo: vehivavy tsy vadinao]'
mg1865::mg_20::7::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa teo amin''ny varavarankelin''ny tranoko, Dia teo amin''ny makarakara, no nitsirihako,'
mg1865::mg_20::7::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nahita anankiray tamin''ny kely saina aho, Eny, nandinika ny tovolahy aho ka nahita zazalahy anankiray tsy ampy saina,'
mg1865::mg_20::7::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nandeha tamin''ny lalana akaikin''ny zoron-tranon''ny vehivavy janga Sy nizotra nankany an-tranony,'
mg1865::mg_20::7::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nony takariva ilay somambisamby iny Sy tamin''ny alina efa maizina dia maizina.'
mg1865::mg_20::7::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia, indro, nisy vehivavy nitsena azy Sady manao fitafin''ny janga no mifetsy am-po,'
mg1865::mg_20::7::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady vavàna no maditra, Tsy mahajanona ao an-tranony ny tongony;'
mg1865::mg_20::7::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vetivety mby eny an-dalam-be izy, ary vetivety mby eny an-tsena, Ary mamitsaka eny an-joron-trano rehetra eny izy.'
mg1865::mg_20::7::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nisavika ilay tovolahy izy ka nanoroka azy Sady nisolantsolana taminy ka nilaza hoe:'
mg1865::mg_20::7::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nivoady hanatitra fanati-pihavanana aho; Ary androany no nanefako ny voadiko.'
mg1865::mg_20::7::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia nivoaka hitsena anao aho, Mba hitady fatratra ny tarehinao, ka dia nahita anao tokoa.'
mg1865::mg_20::7::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fandriako efa nasiako firakotra tsara, Dia lambam-pandriana misoratsoratra voafoly hatrany Egypta.'
mg1865::mg_20::7::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa norarahako zava-manitra ny fandriako, Dia miora sy hazomanitra* ary havozo manitra. [*Hebreo: ahalima]'
mg1865::mg_20::7::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andeha, aoka isika hivoky fitia ambara-pahamarain''ny andro, Aoka ho feno fahafinaretana amin''ny fitiavana isika.'
mg1865::mg_20::7::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ao an-trano ny lehilahy, Fa lasa nivahiny lavitra izy;'
mg1865::mg_20::7::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kitampom-bola dia nentiny any an-tanany, Ka tsy mbola hody izy mandra-pahafenon''ny volana.'
mg1865::mg_20::7::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny teny maro no nampanekeny azy, Tamin''ny fandroboan''ny molony no nitaomany azy,'
mg1865::mg_20::7::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nandeha nanaraka azy niaraka tamin''izay ilay zatovo*, Tahaka ny omby entina hovonoina, Ary tahaka ny adala hogadrana**, [*Na: Na iza na iza mandeha manaraka azy dia] [**Hebreo: tahaka ny gadra ho famaizana ny adala]'
mg1865::mg_20::7::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambara-piboroaky ny lefom-pohy amin''ny atiny, Ary tahaka ny vorona mipaoka ny fandrika, Fa tsy fantany hahafaty ny ainy izany.'
mg1865::mg_20::7::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ahy ianareo, anaka, Ary tandremo ny teny aloaky ny vavako.'
mg1865::mg_20::7::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hivily ho any amin''ny lalany ny fonareo, Ary aza mania ho amin''ny alehany.'
mg1865::mg_20::7::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa betsaka no naripany ka maty; Ary maro be no efa matiny.'
mg1865::mg_20::7::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tranony dia lalana mankany amin''ny fiainan-tsy hita*, Eny, midina ho any amin''ny efi-tranon''ny fahafatesana. [*Hebreo: Sheola]'
mg1865::mg_20::8::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fiantsoan''ny fahendrena, sy ny fahatsarany'
  verse_text: 'Tsy miantso va ny fahendrena, Ary tsy manandra-peo va ny fahalalana?'
mg1865::mg_20::8::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo an-tampon''ny fitoerana avo amoron-dalana Sy eo an-tsampanan-dàlana no ijoroany.'
mg1865::mg_20::8::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anilan''ny vavahady, amin''ny fidirana ho ao an-tanàna, Sy eo anaty vavahady no iantsoany mafy hoe:'
mg1865::mg_20::8::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no antsoiko, ry olona; Ary ny feoko ho amin''ny zanak''olombelona.'
mg1865::mg_20::8::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantaro ny fahendrena, ry kely saina; Ary fantaro ny fahalalana, ry adala.'
mg1865::mg_20::8::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy, fa hilaza zava-tsoa aho; Ary ny hilaza ny mahitsy no isokafan''ny molotro.'
mg1865::mg_20::8::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny marina ihany no holazain''ny vavako; Ary ny ratsy dia fahavetavetana, raha amin''ny molotro.'
mg1865::mg_20::8::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina ny teny rehetra aloaky ny vavako; Tsy misy fiolakolahana na fitaka ao aminy.'
mg1865::mg_20::8::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miharihary avokoa izy, raha amin''ny mazava saina, Ary mahitsy, raha amin''ny efa nahazo fahalalana.'
mg1865::mg_20::8::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ny volafotsy no raisina, fa ny anatro, Ary aleo ny fahalalana toy izay ny volamena voafantina.'
mg1865::mg_20::8::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahendrena dia tsara noho ny voahangy*; Ary ny zavatra irina rehetra tsy azo ampitahaina aminy. [*Na: perla]'
mg1865::mg_20::8::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho fahendrena dia miara-monina amin-tsaina, Ary hitan''ny fahalalako ny fisainana mazava.'
mg1865::mg_20::8::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fankahalana ny ratsy no fahatahorana an''i Jehovah. Ny fiavonavonana sy ny fireharehana sy ny lalana ratsy Ary ny vava fandainga dia samy halako avokoa.'
mg1865::mg_20::8::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahy ny fisainana sy ny fanambinana*; Izaho no fahalalana, izaho no manan-kery; [*Na: tena fahendrena]'
mg1865::mg_20::8::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no anjakan''ny mpanjaka Sy andidian''ny mpanapaka araka ny rariny;'
mg1865::mg_20::8::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no anapahan''ny andriandahy sy ny lehibe, Dia ny mpitsara rehetra amin''ny tany.'
mg1865::mg_20::8::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tiako izay tia ahy; Ary izay fatra-pitady ahy dia hahita ahy.'
mg1865::mg_20::8::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ato amiko ny harena sy ny voninahitra, Eny, ny harena mateza sy ny fahamarinana.'
mg1865::mg_20::8::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatro dia tsara noho ny volamena, eny, noho ny tena volamena aza, Ary ny fitomboan''ny hareko mihoatra noho ny volafotsy voafantina.'
mg1865::mg_20::8::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny alehan''ny fahamarinana no izorako, Dia ao amin''ny lalan''ny fitsarana marina,'
mg1865::mg_20::8::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hampandovako harena izay tia ahy, Sy hamenoako ny firaketany.'
mg1865::mg_20::8::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah nahary* ahy ho fiandohan''ny alehany, Ho voalohany amin''ny asany hatramin''ny taloha. [*Na: nahazo]'
mg1865::mg_20::8::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho notendreny hatramin''ny fahagola, Eny, hatramin''ny voalohany indrindra, dia fony tsy mbola ary ny tany.'
mg1865::mg_20::8::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony tsy mbola ary ny lalina, no efa teraka aho, Fony tsy mbola ary ny loharano miboiboika be,'
mg1865::mg_20::8::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony tsy mbola naorina ny tendrombohitra, Fony tsy mbola nisy havoana, no efa teraka aho,'
mg1865::mg_20::8::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony tsy mbola natao ny tany, na ny saha, Na ny voalohan''ny vovo-tany ambonin''izao rehetra izao.'
mg1865::mg_20::8::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha namorona ny lanitra Izy, dia tany aho, Raha namaritra ny hababakaka tambonin''ny lalina Izy,'
mg1865::mg_20::8::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nampitoetra ny rahona eny ambony Izy, Raha niboiboika fatratra ny loharanon''ny lalina,'
mg1865::mg_20::8::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanisy faritra ho an''ny ranomasina Izy, Mba tsy hahazoan''ny rano mihoatra ny fetrany, Ary nandidy ny amin''ny fanorenan''ny tany,'
mg1865::mg_20::8::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mpità-marika* teo anilany aho Sady ravoravo isan''andro isan''andro Ka nilalao mandrakariva teo anatrehany; [*Na: notezaina]'
mg1865::mg_20::8::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nahafaly ahy ny tany nataony honenana, Ary naharavoravo ahy ny zanak''olombelona.'
mg1865::mg_20::8::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mihainoa ahy ianareo, anaka; Fa sambatra izay manaraka ny diako;'
mg1865::mg_20::8::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Minoa anatra, ka hendre, Fa aza mandà.'
mg1865::mg_20::8::34:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona mihaino ahy Ka miari-tory mandrakariva eo am-bavahadiko, Ary miandry eo amin''ny tolam-baravarako.'
mg1865::mg_20::8::35:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mahita ahy dia mahita fiainana Sady mahazo sitraka amin''i Jehovah;'
mg1865::mg_20::8::36:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay diso ahy kosa mampidi-doza amin''ny fanahiny; Ary izay rehetra mankahala ahy tia fahafatesana.'
mg1865::mg_20::9::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fiantsoan''ny fahendrena sy ny fahadalana'
  verse_text: 'Ny fahendrena efa nanao ny tranony; Efa nipaika ny andriny fito izy;'
mg1865::mg_20::9::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa namono ny bibiny sy nangaroharo ny divainy izy Ary efa namelatra ny latabany koa;'
mg1865::mg_20::9::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa naniraka ny ankizivaviny izy; Miantso eny an-tampon''ny fitoerana avo any an-tanàna izy ka manao hoe:'
mg1865::mg_20::9::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay kely saina, dia aoka izy hankaty; Ary amin''izany tsy ampy saina dia hoy izy:'
mg1865::mg_20::9::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, hano ny mofoko, Ary sotroy ny divay voaharoharoko.'
mg1865::mg_20::9::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilaozy ny* kely saina, dia ho velona ianao, Ary mizora amin''ny lalan''ny fahalalana. [*Na: Mitsahara, ry]'
mg1865::mg_20::9::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mananatra ny mpaniratsira dia afa-baraka; Ary izay mananatra ny ratsy fanahy dia hahazo tsiny.'
mg1865::mg_20::9::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mananatra ny mpaniratsira ianao, fandrao halany; Ny hendry no anaro, dia ho tiany ianao.'
mg1865::mg_20::9::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toroy ny hendry, dia hihahendry izy; Ampianaro ny marina, dia hitombo saina izy.'
mg1865::mg_20::9::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah no fiandoham-pahendrena; Ary ny fahafantarana ny Iray Masina no fahazavan-tsaina.'
mg1865::mg_20::9::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho no hampitomboana ny andronao Sy hanamaroana ny taona hiainanao.'
mg1865::mg_20::9::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hendry ianao, dia hendry ho an''ny tenanao ihany; Fa raha maniratsira kosa ianao, dia ianao ihany no hiharan''izany.'
mg1865::mg_20::9::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahadalana dia toy ny vehivavy vavàna; Kely saina izy ka tsy mahalala na inona na inona.'
mg1865::mg_20::9::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mipetraka eo am-baravaran''ny tranony izy, Ary amin''ny seza eny amin''ny fitoerana avo eo an-tanàna,'
mg1865::mg_20::9::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hiantso ny mpandalo Izay mizotra amin''ny alehany, ka manao hoe:'
mg1865::mg_20::9::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hivily aty izay kely saina; Ary amin''izay tsy ampy saina dia hoy izy:'
mg1865::mg_20::9::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamy ny rano angalarina, Ary fy ny mofo hanina amin''ny fiafenana,'
mg1865::mg_20::9::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy fantany fa ny maty no ao, Ary any amin''ny halalin''ny fiainan-tsy hita* ny olona nasainy. [*Hebreo: Shoela]'
mg1865::mg_20::10::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ohabolana samy hafa ny amin''ny tsy fitovian''ny toetry ny hendry sy ny adala, mbamin''ny valin''ny ataony avy'
  verse_text: 'Ohabolan''i Solomona. Ny zanaka hendry mahafaly ny rainy; Fa ny zanaka adala mampalahelo ny reniny.'
mg1865::mg_20::10::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harena azo amin''ny tsy marina dia tsy mahasoa na inona na inona; Fa ny fahamarinana no mamonjy amin''ny fahafatesana.'
mg1865::mg_20::10::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy avelan''i Jehovah ho mosarena ny fanahin''ny marina; Fa foanany ny fanirian''ny ratsy fanahy.'
mg1865::mg_20::10::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tonga malahelo ny miraviravy tanana amin''ny asany; Fa mampanan-karena ny tanan''ny mazoto.'
mg1865::mg_20::10::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manangona amin''ny fararano no zanaka hendry; Fa izay sondrian-tory amin''ny taom-pijinjana no zanaka mampahamenatra.'
mg1865::mg_20::10::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fitahiana no ho ao amin''ny lohan''ny marina; Fa loza no mandrakotra* ny vavan''ny ratsy fanahy. [*Na: Fa manaron-doza]'
mg1865::mg_20::10::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hankasitrahana ny fahatsiarovana ny marina; Fa ho lo ny anaran''ny ratsy fanahy.'
mg1865::mg_20::10::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay hendry am-po no handray ny didy; Fa ho lavo ny adala maro vava.'
mg1865::mg_20::10::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandeha tsy misy tsiny no mandeha matoky; Fa izay maniasia amin''ny alehany dia fantatra.'
mg1865::mg_20::10::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mami-maso manome alahelo; Fa ho lavo ny adala maro vava.'
mg1865::mg_20::10::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Loharanon''aina ny vavan''ny marina; Fa loza no mandrakotra ny vavan''ny ratsy fanahy*. [*Izahao Ohabolana 10:6]'
mg1865::mg_20::10::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fankahalana dia manetsika ady; Fa ny fitiavana manarona ny ota rehetra.'
mg1865::mg_20::10::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny molotry ny manan-tsaina no ahitam-pahendrena; Fa tsorakazo no ho amin''ny lamosin''ny tsy ampy saina.'
mg1865::mg_20::10::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hendry mirakitra fahalalana; Fa ny vavan''ny adala eo akaikin''ny fandringanana.'
mg1865::mg_20::10::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny haren''ny manan-karena no vohiny mafy; Fa ny tsy fananan''ny ory no fandringanana azy.'
mg1865::mg_20::10::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho fiainana ny asan''ny marina; Fa ho ota ny fitomboan''ny haren''ny ratsy fanahy.'
mg1865::mg_20::10::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mino anatra dia ho tonga eo amin''ny lalan''ny fiainana; Fa mivily izay mandà anatra.'
mg1865::mg_20::10::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitahiry lolompo dia manana molotra mandainga, Ary izay mampiely endrikendrika dia adala.'
mg1865::mg_20::10::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny maro tsy ilaozan''izay ota; Fa izay mahatana ny molony no hendry.'
mg1865::mg_20::10::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volafotsy voafantina ny lelan''ny marina; Fa ny fon''ny ratsy fanahy tsy misy vidiny.'
mg1865::mg_20::10::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny molotry ny marina mamelona ny maro; Fa maty ny adala noho ny tsy fananany fahalalana.'
mg1865::mg_20::10::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitahian''i Jehovah no mampanan-karena, Ary tsy azon''ny fisasarana ampiana izany*. [*Na: Ary tsy ampiany alahelo]'
mg1865::mg_20::10::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toa laolaon''ny adala ny fanaovan-dratsy Fa raha ny manan-tsaina, dia fahendrena kosa*. [*Na: Toa laolaon''ny adala ny fahafetsena; Fa ny manan-tsaina no manam-pahendrena]'
mg1865::mg_20::10::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tahotry ny ratsy fanahy hihatra aminy; Fa ny irin''ny marina no homena azy.'
mg1865::mg_20::10::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa mipaoka ny tafio-drivotra, dia tsy ao intsony ny ratsy fanahy; Fa ny marina voaorina ho mandrakizay.'
mg1865::mg_20::10::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny vinaingitra amin''ny nify sy ny setroka amin''ny maso. Dia mba toy izany koa ny malaina amin''izay maniraka azy.'
mg1865::mg_20::10::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah no mahela velona; Fa ny taonan''ny ratsy fanahy hohafohezina.'
mg1865::mg_20::10::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanantenan''ny marina dia fifaliana; Fa ny fanantenan''ny ratsy fanahy ho foana.'
mg1865::mg_20::10::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''i Jehovah dia fiarovana mafy ho an''izay tsy misy tsiny, Fa fandringanana kosa ho an''ny mpanao ratsy.'
mg1865::mg_20::10::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina tsy hangozohozo mandrakizay; Fa ny ratsy fanahy tsy honina amin''ny tany.'
mg1865::mg_20::10::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo amin''ny vavan''ny marina no itsimohan''ny fahendrena; Fa ny lela fandainga hofongorana.'
mg1865::mg_20::10::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny molotry ny marina mahalala izay ankasitrahana; Fa ny vavan''ny ratsy fanahy dia feno fitaka.'
mg1865::mg_20::11::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mizana mandainga dia fahavetavetana eo imason''i Jehovah; Fa ny vato marina no ankasitrahany.'
mg1865::mg_20::11::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tonga ny fiavonavonana, dia tonga koa ny fahafaham-baraka; Fa ao amin''ny manetry tena no misy fahendrena.'
mg1865::mg_20::11::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahitsian''ny mahitsy no mitarika azy; Fa ny faharatsian''ny mpivadika mahatonga fandringanana amin''ny tenany.'
mg1865::mg_20::11::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harena dia tsy mahasoa amin''ny andro fahatezerana; Fa ny fahamarinana no mamonjy tsy ho azon''ny fahafatesana.'
mg1865::mg_20::11::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinan''ny marina mandamina ny alehany; Fa ny ratsy fanahy lavon''ny haratsiany ihany.'
mg1865::mg_20::11::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinan''ny mahitsy mamonjy azy; Fa ny mpivadika dia voafandriky ny filàny.'
mg1865::mg_20::11::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha maty ny ratsy fanahy, dia foana ny fanantenany, Eny, foana ny fanantenan''ny mpanao ratsy*. [*Na: mahery]'
mg1865::mg_20::11::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina dia vonjena amin''ny fahoriana; Fa ho avy kosa ny ratsy fanahy hisolo azy.'
mg1865::mg_20::11::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavan''ny mpihatsaravelatsihy* no animbany ny namany; Fa ny fahalalana no hanafahana ny marina**. [*Na: ratsy fanahy] [**Na: Ny fahalalan''ny marina no hanafahana ny namany]'
mg1865::mg_20::11::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha miadana ny marina, dia ravoravo ny tanàna; Fa raha ringana ny ratsy fanahy, dia velona ny hoby.'
mg1865::mg_20::11::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisaoran*''ny marina no isandratan''ny tanàna; Fa ny vavan''ny ratsy fanahy no aharavany. [*Na: Ny fitahiana avy amin'']'
mg1865::mg_20::11::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ampy saina izay manamavo ny namany; Fa izay hendry dia mangina.'
mg1865::mg_20::11::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandehandeha manaratsy dia manambara ny hevitra afenina; Fa ny olona mahatoky tsy mba tia lazalaza.'
mg1865::mg_20::11::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy misy mpitondra, dia rava ny firenena; Fa handry fahizay, raha maro ny mpanolo-tsaina.'
mg1865::mg_20::11::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahita loza tokoa ny mianto-bahiny: Fa mitoetra tsy manana ahiahy ny tsy tia antoka.'
mg1865::mg_20::11::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy tsara tarehy mahazo dera; Ary ny mpanao an-keriny mahazo harena.'
mg1865::mg_20::11::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona mamindra fo dia mahazo soa ho an''ny tenany; Fa ny lozabe dia todin''ny halozany.'
mg1865::mg_20::11::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy dia mahazo valiny tsy mahasoa; Fa izay mamafy fahamarinana no mahazo izay tena tambiny tokoa.'
mg1865::mg_20::11::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tena fahamarinana dia mamantana any amin''ny fiainana; Fa izay fatra-panaraka ny ratsy dia iharan''ny fahafatesana.'
mg1865::mg_20::11::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''i Jehovah ny meloka am-po; Fa ankasitrahany kosa izay mandeha tsy misy tsiny.'
mg1865::mg_20::11::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azo itompoana tokoa fa* tsy maintsy hampijalina ny ratsy fanahy; Fa ny taranaky ny marina no hovonjena. [*Na: Azo ifandraisan-tanana fa; na: Hatramin''ny taranaka fara mandimby dia]'
mg1865::mg_20::11::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny kavim-bolamena eo amin''ny oron-kisoa Ny vehivavy tsara tarehy tsy manam-pahendrena*. [*Na: efa niala tamin''ny fahendrena]'
mg1865::mg_20::11::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny soa ihany no irin''ny marina; Fa fahatezerana no fanantenan''ny ratsy fanahy.'
mg1865::mg_20::11::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mahafoy*, nefa mitombo fananana ihany; Ary misy fatra-pahihitra loatra**, nefa tonga malahelo ihany. [*Hebreo: mamafy] [**Na: mihazona ny hareny]'
mg1865::mg_20::11::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manisy soa olona hohatavezina; Ary izay mandena dia mba holemana kosa*. [*Hebreo: Ary izay mampisotro dia mba hampisotroina kosa]'
mg1865::mg_20::11::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy mamoaka ny variny dia ozonin''ny olona; Fa saotra no ho amin''ny lohan''izay mivarotra.'
mg1865::mg_20::11::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay fatra-pikatsaka ny tsara no mitady ny mahafinaritra; Fa izay mitady ny ratsy dia hiharan''izany.'
mg1865::mg_20::11::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay matoky ny hareny dia ho lavo; Fa ny marina ho tahaka ny ravina maitso.'
mg1865::mg_20::11::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampidi-doza amin''ny ankohonany dia mandova ny rivotra; Ary ny adala dia tonga mpanompon''ny hendry.'
mg1865::mg_20::11::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatry ny marina dia hazon''aina, Ary ny hendry dia mahataona olona.'
mg1865::mg_20::11::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny marina aza dia valiana ety an-tany, Koa mainka fa ny ratsy fanahy sy ny mpanota!'
mg1865::mg_20::12::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia fananarana no tia fahalalana; Fa izay mandà anatra dia biby.'
mg1865::mg_20::12::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsara fanahy mahazo sitraka amin''i Jehovah; Fa ny mamoron-tsain-dratsy hohelohiny.'
mg1865::mg_20::12::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy maha-tafatoetra ny olona ny haratsiana; Fa ny fakan''ny marina tsy mba hihetsika.'
mg1865::mg_20::12::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy tsara dia satro-boninahitry ny lahy; Fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny lo ao anatin''ny taolana.'
mg1865::mg_20::12::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rariny ny hevitry ny marina; Fa fitaka ny fisainan''ny ratsy fanahy.'
mg1865::mg_20::12::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''ny ratsy fanahy dia otrika ho enti-mandatsa-drà; Fa ny vavan''ny marina hamonjy azy.'
mg1865::mg_20::12::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haringana ny ratsy fanahy ka tsy ho ao intsony*; Fa ny mpianakavin''ny marina haharitra. [*Na: Vetivety foana dia tsy ao intsony ny ratsy fanahy]'
mg1865::mg_20::12::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny fahendren''ny olona no hiderana azy; Fa izay meloka am-po dia hatao tsinontsinona.'
mg1865::mg_20::12::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo ambany toetra, nefa manana mpanompo iray, Toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.'
mg1865::mg_20::12::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina mitsimbina ny ain''ny bibiny; Fa fahasiahana kosa no famindram-pon''ny ratsy fanahy;'
mg1865::mg_20::12::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miasa ny taniny dia ho voky hanina; Fa izay manaraka ny olom-poana* dia tsy ampy saina. [*Na: ny zava-poana]'
mg1865::mg_20::12::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanota maniry ny hazan*''ny ratsy fanahy; Fa ny fakan''ny marina mitrebona**. [*Na: ny fandriky] [**Na: Fa ny marina ataon''Andriamanitra miorim-paka]'
mg1865::mg_20::12::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahotan''ny molotra dia misy fandrika ahitan-doza; Fa ny marina ho afaka amin''ny fahoriana.'
mg1865::mg_20::12::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatry ny vavan''ny olona no mahavoky soa azy, Ary ny asan''ny tanany hitsingerina aminy.'
mg1865::mg_20::12::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''ny adala dia mahitsy eo imasony; Fa izay mino anatra no hendry.'
mg1865::mg_20::12::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahasosoran''ny adala dia fantatra miaraka amin''izay; Fa izay mahatsindry fo amin''ny fanalam-baraka no hendry.'
mg1865::mg_20::12::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay olona mahatoky dia manambara ny rariny; Fa ny vavolombelona mandainga kosa miteny fitaka.'
mg1865::mg_20::12::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron''ny sabatra; Fa ny lelan''ny marina dia fanasitranana kosa.'
mg1865::mg_20::12::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny molotra marina ampitoerina ho mandrakizay; Fa ny lela mandainga dia indray mipi-maso monja.'
mg1865::mg_20::12::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fitaka no ao am-pon''izay mamoron-tsain-dratsy; Fa hafaliana no amin''izay misaina fiadanana.'
mg1865::mg_20::12::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy ratsy manjo ny marina; Fa heni-doza* ny ratsy fanahy. [*Hebreo: henika ny ratsy]'
mg1865::mg_20::12::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''i Jehovah ny molotra mandainga; Fa izay olona mahatoky no ankasitrahany.'
mg1865::mg_20::12::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olon-kendry tsy mba mampideradera fahalalana foana*; Fa ny fon''ny adala mamoaka fahadalana. [*Hebreo: manafina fahalalana]'
mg1865::mg_20::12::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanan''ny mazoto no hanapaka; Fa izay miraviravy tanana dia hampanompoina.'
mg1865::mg_20::12::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny alahelo ao am-pon''ny olona dia mampitanondrika azy; Fa ny teny soa no mahafaly azy.'
mg1865::mg_20::12::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina dia mitari-dalana ny namany; Fa ny alehan''ny ratsy fanahy kosa no mampivily azy.'
mg1865::mg_20::12::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kamo tsy mety mihaza*; Fa fananana soa ho an''ny olona ny zoto. [*Na: tsy mahatono izay nohazainy]'
mg1865::mg_20::12::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny lalan''ny fahamarinana no misy fiainana, Ary ny tsy fahafatesana no lalan-kalehany.'
mg1865::mg_20::13::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaka hendry mihaino ny fananaran-drainy; Fa ny mpaniratsira tsy mety mihaino, na dia anarina mafy aza.'
mg1865::mg_20::13::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatry ny vavan''ny olona no ahazoany soa; Fa ny hampidi-doza no mahafaly ny mpivadika.'
mg1865::mg_20::13::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahambim-bava no miaro ny ainy*; Fa izay vavàna dia haringana. [*Na: ny fanahiny]'
mg1865::mg_20::13::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahin''ny kamo maniry, fa tsy mba mahazo; Fa ny fanahin''ny mazoto hohatavezina.'
mg1865::mg_20::13::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lainga dia halan''ny marina; Fa ny ratsy fanahy manao izay maharikoriko sy mahamenatra.'
mg1865::mg_20::13::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinana miaro izay mandeha tsy misy tsiny; Fa ny haratsiana mamotraka ny mpanota.'
mg1865::mg_20::13::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mihambo ho manan-karena, nefa tsy manana na inona na inona; Misy kosa mody malahelo, nefa manana harena be.'
mg1865::mg_20::13::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny haren''ny olona dia avotry ny ainy; Fa ny levilevy tsy mampiraika ny malahelo akory.'
mg1865::mg_20::13::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahazavan''ny marina dia tsara firehitra*; Fa ny jiron''ny ratsy fanahy ho faty. [*Hebreo: mifaly]'
mg1865::mg_20::13::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fifandirana ihany no vokatry ny fiavonavonana; Fa ao amin''ny mino anatra no misy fahendrena.'
mg1865::mg_20::13::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harena azoazo foana dia mihena lalandava; Fa izay mahavatra mitsimpona no mampitombo.'
mg1865::mg_20::13::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanantenana tsy azo vetivety dia mankarary am-bavafo; Fa hazon''aina ny faniriana tanteraka.'
mg1865::mg_20::13::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manamavo ny teny ho voasingony*; Fa izay matahotra ny didy no hahazo valim-pitia. [*Na: mahavery tena]'
mg1865::mg_20::13::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fampianaran''ny hendry dia loharanon''aina Ka mampivily tsy ho ao amin''ny fandriky ny fahafatesana.'
mg1865::mg_20::13::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahendrena tsara dia ahazoam-pitia; Fa sarotra ny lalan''ny mpivadika.'
mg1865::mg_20::13::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mahira-tsaina, rehetra miasa amin''ny fahalalana; Fa ny adala kosa mampiseho hadalana;'
mg1865::mg_20::13::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny iraka ratsy fanahy idiran-doza; Fa ny iraka mahatoky dia famelombelomana*. [*Na: fanasitranana]'
mg1865::mg_20::13::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahalahelovana sy henatra no ho an''izay mandà famaizana; Fa izay manaiky anatra no homem-boninahitra.'
mg1865::mg_20::13::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamin''ny fo ny faniriana tanteraka*; Fa fahavetavetana eo imason''ny adala ny hiala amin''ny ratsy. [*Na: efa mitranga]'
mg1865::mg_20::13::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miara-dia amin''ny hendry dia ho hendry; Fa izay misakaiza amin''ny adala dia hidiran-doza*. [*Na: ho ratsy]'
mg1865::mg_20::13::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanota dia enjehin''ny loza: Fa hovalian-tsoa ny marina.'
mg1865::mg_20::13::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsara fanahy mahenina lova ny zafiny, Fa ny haren''ny mpanota kosa voatahiry ho an''ny marina.'
mg1865::mg_20::13::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanin''ny malahelo izay voasa dia ahazoana hanina be; Fa maro no ringana noho ny fanaovan''izay tsy rariny.'
mg1865::mg_20::13::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitsitsy ny tsorakazony dia tsy tia ny zanany; Fa izay tia zanaka dia manafay azy, raha mbola kely.'
mg1865::mg_20::13::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina mihinana ka voky tsara; Fa noana ny kibon''ny ratsy fanahy.'
mg1865::mg_20::14::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy hendry* dia samy manao ny tranony; Fa ny adala** kosa mandrava ny tranony amin''ny tanany. [*Hebreo: fahendren''ny vehivavy] [**Hebreo: fahadalana]'
mg1865::mg_20::14::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandeha mahitsy izay matahotra an''i Jehovah; Fa mivily lalana kosa izay maniratsira Azy.'
mg1865::mg_20::14::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo am-bavan''ny adala misy tsorakazon''ny fiavonavonana; Fa ny molotry ny hendry miaro ny tenany.'
mg1865::mg_20::14::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy misy omby, dia foana* ny fihinanam-bilona; Fa be ny fitomboan-karena azo amin''ny herin''ny omby. [*Hebreo: madio]'
mg1865::mg_20::14::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavolombelona mahatoky tsy mba mety mandainga; Fa mamoaka lainga kosa ny vavolombelona tsy mahatoky.'
mg1865::mg_20::14::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaniratsira mba mitady fahendrena, fa tsy mahita; Fa ny manan-tsaina mora mahazo fahalalana.'
mg1865::mg_20::14::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà eo anatrehan''ny olona adala, Fa tsy ho hitanao aminy ny molotry ny fahalalana.'
mg1865::mg_20::14::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mitandrina ny alehany no fahendren''ny mahira-tsaina; Fa fitaka ny hadalan''ny adala.'
mg1865::mg_20::14::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny adala ihomehezan''ny fanati-panonerana*; Fa ao amin''ny marina no misy fankasitrahana. [*Na: Ihomehezan''ny adala ny heloka]'
mg1865::mg_20::14::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fo no mahalala ny fangidian''ny alahelony; Ary tsy raharahan''ny olon-kafa ny hafaliany.'
mg1865::mg_20::14::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ravana ny tranon''ny ratsy fanahy; Fa ambinina ny lain''ny marina.'
mg1865::mg_20::14::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy lalana ataon''ny olona ho mahitsy, Kanjo lalana mivarina any amin''ny fahafatesana no iafarany.'
mg1865::mg_20::14::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia mihomehy aza, dia ory ihany ny fo, Ary ny faran''ny hafaliana dia alahelo.'
mg1865::mg_20::14::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mihemotra am-po dia ho voky ny alehany; Fa ny tsara fanahy kosa ho voky ny azy ihany.'
mg1865::mg_20::14::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kely saina mino ny teny rehetra; Fa ny mahira-tsaina mandinika ny diany.'
mg1865::mg_20::14::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hendry matahotra ka mivily tsy ho amin''ny ratsy; Fa ny adala fatra-pirehareha* ka matokitoky foana. [*Na: misafoaka]'
mg1865::mg_20::14::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay malaky tezitra dia manao adaladala; Ary ny olona mamoron-tsain-dratsy dia ankahalaina.'
mg1865::mg_20::14::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kely saina dia handova fahadalana; Fa ny mahira-tsaina mahazo ny fahalalana ho satro-boninahiny*. [*Na: mandray fahalalana]'
mg1865::mg_20::14::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy miondrika eo anatrehan''ny tsara fanahy, Ary ny meloka dia eo am-bavahadin''ny marina.'
mg1865::mg_20::14::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malahelo dia halan''ny havany aza; Fa ny manan-karena no tian''ny maro.'
mg1865::mg_20::14::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao tsinontsinona ny namany dia manota; Fa endrey ny fahasambaran''izay mamindra fo amin''ny ory!'
mg1865::mg_20::14::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mivily va izay manao asa* ratsy? Fa famindram-po sy fahamarinana no ho an''izay manao asa** tsara. [*Na: misaina ny] [**Na. misaina ny]'
mg1865::mg_20::14::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisasarana rehetra misy valiny avokoa; Fa ny molotra mibedibedy foana tsy mba ahazoana na inona na inona.'
mg1865::mg_20::14::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satroboninahitry ny hendry ny hareny; Fa ny fahadalan''ny adala dia fahadalana ihany.'
mg1865::mg_20::14::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavolombelona marina mamonjy ain''olona; Fa izay mamoaka lainga dia tena fitaka.'
mg1865::mg_20::14::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah dia fiarovana mahatoky, Ary ny zanany hahazo fialofana.'
mg1865::mg_20::14::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah no loharanon''aina, Hanalavirana ny fandriky ny fahafatesana.'
mg1865::mg_20::14::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahabetsahan''ny vahoaka no voninahitry ny mpanjaka; Fa ny havitsiany kosa no fietreny.'
mg1865::mg_20::14::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be saina izay mahatsindry fo; Fa ny malaky tezitra mampiseho ny fahadalany.'
mg1865::mg_20::14::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fo mionona no fiainan''ny nofo; Fa ny fahamaimaizan-tsaina dia mahalà ny taolana.'
mg1865::mg_20::14::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampahory ny mahantra dia manala baraka ny Mpanao azy; Fa ny mamindra fo aminy kosa dia manome voninahitra Azy.'
mg1865::mg_20::14::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy azera* noho ny haratsiany; Fa ny marina matoky, na dia mby ao amin''ny fahafatesana aza. [*Na: roahina]'
mg1865::mg_20::14::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandry tsara ao am-pon''ny manan-tsaina ny fahendrena; Fa ny an''ny adala kosa dia miharihary.'
mg1865::mg_20::14::34:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinana manandratra ny firenena; Fa ny ota kosa dia fahafaham-baraka amin''ny olona'
mg1865::mg_20::14::35:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 14
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fankasitrahan''ny mpanjaka dia amin''ny mpanompo hendry; Fa ny fahatezerany kosa amin''ny manao izay mahamenatra.'
mg1865::mg_20::15::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famaliana mora dia mampianina ny fahatezerana mafy; Fa ny teny maharary mahatonga fahasosorana.'
mg1865::mg_20::15::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lelan''ny hendry mampiseho fahalalana tsara; Fa ny vavan''ny adala miboiboika fahadalana.'
mg1865::mg_20::15::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mason''i Jehovah amin''izao rehetra izao, Mijery ny ratsy fanahy sy ny tsara fanahy.'
mg1865::mg_20::15::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny* malemy dia hazon''aina; Fa ny vava ratsy mandratra ny fanahy. [*Hebreo: lela]'
mg1865::mg_20::15::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny adala maniratsira ny famaizan-drainy; Fa izay mitandrina ny fananarana no hita ho hendry.'
mg1865::mg_20::15::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao an-tranon''ny marina misy harena be; Fa ny fitomboan''ny haren''ny ratsy fanahy dia misy loza.'
mg1865::mg_20::15::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny molotry ny hendry mampiely fahendrena; Fa tsy mba toy izany ny fon''ny adala.'
mg1865::mg_20::15::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason''i Jehovah; Fa ny fivavaky ny marina no sitrany.'
mg1865::mg_20::15::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''i Jehovah ny lalan''ny ratsy fanahy; Fa izay fatra-panaraka ny fahamarinana no tiany.'
mg1865::mg_20::15::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Famaizana mafy no hihatra amin''izay mivily lalana. Eny, izay mankahala anatra dia ho faty.'
mg1865::mg_20::15::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiainan-tsy hita* sy ny fandringanana aza dia miharihary eo anatrehan''i Jehovah, Koa mainka ny fon''ny zanak''olombelona! [*Hebreo: Sheola]'
mg1865::mg_20::15::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tian''ny mpaniratsira izay mananatra azy, Ary tsy mety manatona ny hendry izy.'
mg1865::mg_20::15::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fo ravoravo mahamiramirana ny tarehy; Fa ny alahelon''ny fo mahareraka ny fanahy.'
mg1865::mg_20::15::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny manan-tsaina mitady fahendrena; Fa ny vavan''ny adala mankamamy ny fahadalana.'
mg1865::mg_20::15::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ratsy avokoa ny andron''ny ory; Fa ny faharavoravoam-po dia fanasana mandrakariva.'
mg1865::mg_20::15::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo ny kely misy ny fahatahorana an''i Jehovah Toy izay harena be misy ahiahy.'
mg1865::mg_20::15::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo sakafo anana ampian-tsetsetra* Toy izay omby mifahy asian-dromoromo**. [*Hebreo: fitiavana] [**Hebreo: fankahalana]'
mg1865::mg_20::15::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay malaky tezitra manetsika ady; Fa izay mahatsindry fo mampitsahatra fifandirana.'
mg1865::mg_20::15::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''ny malaina dia toy ny fefy tsilo Fa ny lalamben''ny marina dia voalamina tsara.'
mg1865::mg_20::15::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaka hendry mahafaly ny rainy; Fa ny adala manao tsinontsinona an-dreniny.'
mg1865::mg_20::15::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahadalana dia fifalian''ny tsy ampy saina; Fa ny manan-tsaina kosa mizotra mahitsy'
mg1865::mg_20::15::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho foana ny fikasana, raha tsy misy mpisaina; Fa raha maro ny mpanolo-tsaina, dia tanteraka izany.'
mg1865::mg_20::15::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faly ny olona, raha mahavaly tsara ny vavany, Ary endrey ny hatsaran''ny teny atao amin''izay andro mahamety azy!'
mg1865::mg_20::15::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Làlan''aina ho any ambony no alehan''ny hendry, Hanalavirany ny fiainan-tsy hita* any ambany, [*Hebreo: Sheola]'
mg1865::mg_20::15::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ravan''i Jehovah ny tranon''ny mpiavonavona; Fa ny faritanin''ny mpitondra-tena aoriny mafy.'
mg1865::mg_20::15::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''i Jehovah ny hevi-dratsy; Fa madio ny* teny mahafinaritra. [*Na: Fa ny madio manao]'
mg1865::mg_20::15::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay fatra-pila harena dia mampidi-doza amin''ny ankohonany; Fa izay mankahala kolikoly no ho velona.'
mg1865::mg_20::15::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny marina mihevitra vao mamaly; Fa ny vavan''ny ratsy fanahy kosa miboiboika faharatsiana.'
mg1865::mg_20::15::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah dia lavitra ny ratsy fanahy; Fa ny fivavaky ny marina no henoiny.'
mg1865::mg_20::15::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tarehy miramirana* mahafaly ny fo; Ary ny filazan-tsoa mamelombelona ny taolana. [*Hebreo: Ny fahazavan''ny maso]'
mg1865::mg_20::15::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sofina izay mihaino anatra mahavelona Dia miara-mitoetra amin''ny hendry.'
mg1865::mg_20::15::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandà anatra dia manary tena; Fa izay mihaino ny fananarana no mahazo fahalalana.'
mg1865::mg_20::15::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah dia fananarana mampahahendry; Ary ny fanetren-tena mialoha ny fisandratana.'
mg1865::mg_20::16::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fikasan''ny fo no amin''ny olona; Fa ny famalian''ny lela dia avy amin''i Jehovah.'
mg1865::mg_20::16::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataon''ny olona ho madio avokoa ny lalana rehetra alehany; Fa Jehovah ihany no mpandanja ny fanahy.'
mg1865::mg_20::16::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankino amin''i Jehovah ny asanao, Dia ho lavorary izay kasainao.'
mg1865::mg_20::16::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zavatra rehetra nataon''i Jehovah dia samy misy antony avokoa; Eny, ny ratsy fanahy koa aza dia nataony ho amin''ny andro hahitan-doza.'
mg1865::mg_20::16::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''i Jehovah izay rehetra miavonavona am-po, Azo itompoana tokoa fa* tsy maintsy hampijalina izy. [*Hebreo: Azo ifandraisan-tanana; na: Hatramin''ny taranaka fara mandimby dia]'
mg1865::mg_20::16::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famindram-po sy ny fahamarinana no avotra amin''ny heloka; Ary ny fahatahorana an''i Jehovah no analavirana ny ratsy.'
mg1865::mg_20::16::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha sitrak''i Jehovah ny alehan''ny olona, Na dia ny fahavalony aza dia hampihavaniny aminy.'
mg1865::mg_20::16::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo ny kely omban''ny fahamarinana Toy izay ny harem-bevava azo amin''ny tsy rariny.'
mg1865::mg_20::16::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny olona mihevitra tsara ny halehany; Fa Jehovah ihany no mahalavorary ny diany.'
mg1865::mg_20::16::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny marina dia eo amin''ny molotry ny mpanjaka, Ary tsy diso teny izy, raha mitsara.'
mg1865::mg_20::16::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''i Jehovah ny fandanjana sy ny mizana marina, Avy aminy* avokoa ireo vato rehetra an-kitapo. [*Hebreo: Asany]'
mg1865::mg_20::16::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''ny mpanjaka ny fanaovan-dratsy; Fa fahamarinana no iorenan''ny seza fiandrianana.'
mg1865::mg_20::16::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sitraky ny mpanjaka ny molotra marina, Ary izay miteny mahitsy no tiany.'
mg1865::mg_20::16::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeran''ny mpanjaka dia iraky ny fahafatesana. Fa ny olon-kendry mampionona izany.'
mg1865::mg_20::16::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahamiramiranan''ny tarehin''ny mpanjaka dia misy fiainana, Ary ny fankasitrahany dia toy ny rahona amin''ny fararano.'
mg1865::mg_20::16::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny mahazo fahendrena noho ny volamena, Ary tsara ny mahazo fahalalana noho ny volafotsy.'
mg1865::mg_20::16::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny manalavitra ny ratsy no lalamben''ny marina, Ary izay mitandrina ny alehany no miaro ny ainy*. [*Na: fanahiny]'
mg1865::mg_20::16::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiavonavonana mialoha ny fahasimbana, Ary ny fanahy mirehareha mialoha ny fahalavoana.'
mg1865::mg_20::16::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny malemy fanahy ao amin''izay manetry tena Noho ny mizara babo amin''izay miavonavona.'
mg1865::mg_20::16::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandinika ny teny no hahita soa; Ary izay matoky an''i Jehovah no ho sambatra.'
mg1865::mg_20::16::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay hendry am-po dia lazaina hoe manan-tsaina, Ary ny hamamian''ny molotra mampandroso fahendrena.'
mg1865::mg_20::16::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Loharanon''aina ny fahazavan-tsaina amin''izay manana izany; Fa ny famaizana ataon''ny adala dia fahadalana ihany.'
mg1865::mg_20::16::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny hendry mahahendry ny vavany Sady manampy fahendrena eo amin''ny molony.'
mg1865::mg_20::16::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toho-tantely ny teny mahafinaritra, Ka sady mamin''ny fanahy no mahatsara ny taolana.'
mg1865::mg_20::16::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy lalana ataon''ny olona ho mahitsy, Kanjo lalana mivarina any amin''ny fahafatesana no iafarany.'
mg1865::mg_20::16::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahanoanan''ny mpiasa dia mampiasa azy*, Fa ny tendany** no manesika azy. [*Hebreo: miasa ho azy] [**Hebreo: vavany]'
mg1865::mg_20::16::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mihady lavaka fanimbana, Sady misy toy ny afo mahamay eo amin''ny molony.'
mg1865::mg_20::16::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpivadibadika mamafy ady; Ary ny mpibitsibitsika mampisaraka ny tena mpisakaiza.'
mg1865::mg_20::16::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lozabe mitaona ny namany Ka mitarika azy amin''ny lalana tsy tsara.'
mg1865::mg_20::16::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manakimpy ny masony hieritreritra ny ratsy Sady manaikitraiki-molotra dia efa mikasa hanao ratsy.'
mg1865::mg_20::16::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satroboninahitra tsara tarehy ny volofotsy, Ao amin''ny lalan''ny fahamarinana no ahazoana azy.'
mg1865::mg_20::16::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny mahatsindry fo noho ny mahery, Ary izay mahazaka ny fanahiny noho izay mahafa-bohitra.'
mg1865::mg_20::16::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 16
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny filokana dia atsipy ao am-pofoany; Fa avy amin''i Jehovah ihany no isehoan''ny fitsarany.'
mg1865::mg_20::17::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny sombi-mofo maina misy fiadanana Noho ny trano feno hena misy fifandirana.'
mg1865::mg_20::17::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanompo hendry dia hanapaka ny zanaka manao izay mahamenatra Sady hizara lova amin''ny mpirahalahy.'
mg1865::mg_20::17::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny memy ho an''ny volafotsy, ary ny fatana fandrendrehana ho an''ny volamena; Fa Jehovah ihany no Mpamantatra ny fo.'
mg1865::mg_20::17::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanao ratsy mampandry sofina amin''ny molotra mandainga; Ary ny mpandainga mihaino ny lela mampidi-doza.'
mg1865::mg_20::17::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihomehy ny malahelo manala baraka ny Mpanao azy; Ary izay faly amin''ny fahorian''ny sasany dia tsy maintsy hampijalina.'
mg1865::mg_20::17::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satroboninahitry ny antitra ny zafiny; Ary voninahitry ny zanaka ny rainy.'
mg1865::mg_20::17::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny jadona tsy tandrifiny halahatry ny adala, Koa mainka fa tsy tokony ho an''ny zanak''andriana ny molotra mandainga.'
mg1865::mg_20::17::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kolikoly dia toy ny vato soa eo imason''izay mahazo azy, Ka na aiza na aiza alehany dia ambinina ihany.'
mg1865::mg_20::17::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay te-ho be fitiavana dia manaron-keloka; Fa izay mamohafoha teny mampisaraka ny tena mpisakaiza.'
mg1865::mg_20::17::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anatra dia manan-kery kokoa amin''ny hendry Noho ny kapoka injato amin''ny adala.'
mg1865::mg_20::17::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maditra dia fatra-pitady ny ratsy, Ka dia iraka lozabe no irahina hamely azy.'
mg1865::mg_20::17::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo mifanena amin''ny bera very anaka Toy izay amin''ny adala feno hadalana.'
mg1865::mg_20::17::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamaly ratsy ny soa, Ny ratsy tsy hiala ao an-tranony.'
mg1865::mg_20::17::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiandohan''ny ady dia toy ny manata-drano, Koa ilaozy ny fifandirana, dieny tsy mbola mifandramatra.'
mg1865::mg_20::17::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manamarina ny meloka, na izay manameloka ny marina,Dia samy fahavetavetana eo imason''i Jehovah.'
mg1865::mg_20::17::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatao inona re ity vola an-tanan''ny adala? Hamidy fahendrena va? tsy manan-tsaina izy.'
mg1865::mg_20::17::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tena sakaiza tokoa dia tia amin''ny andro rehetra, Sady miseho* ho rahalahy hamonjy amin''ny fahoriana. [*Hebreo: ateraka]'
mg1865::mg_20::17::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Olona tsy ampy saina izay mifandray tanana Hiantoka eo anatrehan''ny sakaizany.'
mg1865::mg_20::17::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia ady dia tia heloka; Ary izay manao vavahady avo mitady fahasimbana.'
mg1865::mg_20::17::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay madi-po tsy hahita soa; Ary izay manana lela mandainga hivarina any amin''ny loza.'
mg1865::mg_20::17::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miteraka adala hahazo alahelo; Ary ny rain''ny adala tsy ho faly.'
mg1865::mg_20::17::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fo ravoravo mahasalama tsara; Fa ny fanahy kivy mahamaina ny taolana.'
mg1865::mg_20::17::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mandray kolikoly avy any anaty lamba Ho entiny mamadika ny rariny.'
mg1865::mg_20::17::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anoloan''ny manan-tsaina ny fahendrena; Fa ny mason''ny adala dia mibirioka any amin''ny faran''ny tany.'
mg1865::mg_20::17::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaka adala mampalahelo ny rainy Sady fahoriana mangidy amin''ny reniny niteraka azy.'
mg1865::mg_20::17::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mety raha mampijaly ny marina, Na mamely ny manan-kaja noho ny fahamarinany*. [*Na: tsy amin''ny rariny]'
mg1865::mg_20::17::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahafihim-bava no manam-pahalalana; Ary izay mahatsindry fo no manan-tsaina.'
mg1865::mg_20::17::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny adala aza, raha tsy miteny, dia atao ho hendry, Ary izay mahafihim-bava dia toa manan-tsaina.'
mg1865::mg_20::18::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitokana ho azy dia mitady ny mahafinaritra ny tenany ihany, Misafoaka manohitra izay hevitra mahasoa rehetra izy.'
mg1865::mg_20::18::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny adala tsy mba finaritra amin''ny fahalalana, Fa ta-haneho izay ao am-pony.'
mg1865::mg_20::18::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha avy ny ratsy fanahy, dia avy ny fanamavoana; Ary miaraka amin''ny fahafaham-baraka ny henatra.'
mg1865::mg_20::18::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rano lalina ny teny aloaky ny vavan''ny olona, Ary rano miboiboika ny loharanon''ny fahendrena,'
mg1865::mg_20::18::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mety raha manohana ny ratsy fanahy Handresy ny marina amin''ny fitsarana.'
mg1865::mg_20::18::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny molotry ny adala manatona ny fifandirana, Ary ny vavany mihantsy kapoka.'
mg1865::mg_20::18::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavan''ny adala no fandringanana azy, Ary ny molony ihany no fandriky ny fanahiny.'
mg1865::mg_20::18::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''ny mpifosafosa dia toy ny hanim-py Ka mikorotsaka ao anaty kibo indrindra.'
mg1865::mg_20::18::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay malaina amin''ny asany Dia rahalahin''ny mpanimba.'
mg1865::mg_20::18::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anaran''i Jehovah dia tilikambo mafy; Ny marina miezaka ho ao aminy ka voavonjy*. [*Hebreo: atao amin''ny avo]'
mg1865::mg_20::18::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny haren''ny manan-karena no vohiny mafy, Ary raha araka ny fiheviny, dia toa manda avo izany.'
mg1865::mg_20::18::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fireharehan''ny fon''ny olona mialoha ny fahasimbana; Fa ny fanetren-tena kosa mialoha ny voninahitra.'
mg1865::mg_20::18::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamaly teny mbola tsy re, Dia hadalana sy henatra ho azy izany.'
mg1865::mg_20::18::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny faharariany dia zakan''ny fanahin''ny olona ihany; Fa ny fanahy kivy, iza no mahazaka izany?'
mg1865::mg_20::18::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fon''ny manan-tsaina mahazo fahalalana; Ary ny sofin''ny hendry mitady izany.'
mg1865::mg_20::18::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanomezan''ny olona dia mahalalaka ny alehany, Hahatonga azy eo anatrehan''ny lehibe.'
mg1865::mg_20::18::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandahatra aloha no toa marina; Fa nony avy kosa ny an-daniny, dia mamaly ny teniny.'
mg1865::mg_20::18::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny filokana mampitsahatra ady Ary mampisaraka ny samy mahery.'
mg1865::mg_20::18::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mampionona ny rahalahy voaisy ratsy dia sarotra noho ny manafaka vohitra mafy, Ary ny fifandirana aminy dia tahaka ny hidin''ny lapan''ny mpanjaka.'
mg1865::mg_20::18::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vokatry ny vavan''ny olona no mahavoky soa azy; Eny, ny vokatry ny molony no mahavoky azy.'
mg1865::mg_20::18::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mahafaty sy ny mahavelona samy hain''ny lela, Koa izay manarana azy dia hihinana ny vokany.'
mg1865::mg_20::18::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay lehilahy mahazo vady dia mahazo zava-tsoa Sady mahita sitraka amin''i Jehovah.'
mg1865::mg_20::18::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fitarainana no ataon''ny malahelo; Nefa ny manan-karena kosa dia mamaly mahery.'
mg1865::mg_20::18::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay maro sakaiza tsy maintsy tra-pahoriana*; Fa misy sakaiza tia, izay mifikitra noho ny rahalahy aza. [*Na: tsy maintsy hita fa ratsy]'
mg1865::mg_20::19::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny malahelo mandeha tsy misy tsiny Noho izay mandainga amin''ny molony sady adala.'
mg1865::mg_20::19::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tsara raha tsy manam-pahalalana ny fanahy; Ary izay miezaka mosalahy dia ho diso lalana.'
mg1865::mg_20::19::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahadalan''ny olona no mahasimba ny alehany, Ka amin''i Jehovah no sosotra ny fony.'
mg1865::mg_20::19::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harena mahamaro sakaiza; Fa ny malahelo afoin''ny sakaizany.'
mg1865::mg_20::19::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavolombelona mandainga tsy ho afa-tsiny, Ary izay mamoaka lainga tsy ho afa-miala.'
mg1865::mg_20::19::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no mandambolambo andriana; Ary ny olona rehetra samy misakaiza amin''izay mpanome zavatra.'
mg1865::mg_20::19::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malahelo dia halan''ny rahalahiny rehetra, Koa mainka fa ny sakaizany tsy hanalavitra azy va? Manandrandra amin''ny teny tsy misy* izy. [*Hebreo: manenjika teny tsy misy]'
mg1865::mg_20::19::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihary fahendrena no tia ny tenany, Ary izay mitandrina fahalalana hahita soa.'
mg1865::mg_20::19::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavolombelona mandainga tsy maintsy hampijalina, Ary ny miteny lainga ho very.'
mg1865::mg_20::19::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ho velona amin''ny fahafinaretana dia tsy tandrifiny ho an''ny adala, Koa mainka izay hanapahan''ny mpanompo ny zanak''andriana.'
mg1865::mg_20::19::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahendren''ny olona manindry ny fahatezerany, Ary voninahitra ho azy ny tsy mamaly fahadisoana.'
mg1865::mg_20::19::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeran''ny mpanjaka dia toy ny fieron''ny liona tanora: Fa ny fitiany kosa toy ny ando amin''ny ahitra.'
mg1865::mg_20::19::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaka adala mahabe fahoriana ny rainy; Ary ny ady ataon''ny vehivavy dia toy ny rano mitete mandrakariva.'
mg1865::mg_20::19::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Trano sy harena no lova avy amin''ny ray; Fa ny vady hendry kosa dia avy amin''i Jehovah.'
mg1865::mg_20::19::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hakamoana mahasondrian-tory, Ary ho mosarena ny olona malaina.'
mg1865::mg_20::19::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitandrina ny didy mitandrina ny ainy*; Fa izay tsy mihevitra ny alehany dia ho faty. [*Na: ny fanahiny]'
mg1865::mg_20::19::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miantra ny malahelo dia mampisambotra an''i Jehovah, Ary izay nomeny dia honerany kosa.'
mg1865::mg_20::19::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faizo ny zanakao, fa mbola misy azo antenaina ihany, Nefa aza dia entim-po loatra, fandrao mahafaty azy.'
mg1865::mg_20::19::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lozabe tsy maintsy hampijalina; Ary na dia vonjenao aza izy, dia mbola hanahirana anao ihany indray.'
mg1865::mg_20::19::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy ny saina atolotra, ary raiso ny fananarana, Mba ho hendry ianao amin''izay hiafaranao*. [*Na: any aoriana]'
mg1865::mg_20::19::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro ny hevitra ao am-pon''ny olona; Fa ny fisainan''i Jehovah no haharitra.'
mg1865::mg_20::19::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fifaliana amin''ny olona ny manisy soa; Ary aleo ho malahelo toy izay ho mpandainga.'
mg1865::mg_20::19::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah no ahazoana fiainana; Izay manana izany tsy mba handry fotsy sady tsy hiharan-doza.'
mg1865::mg_20::19::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malaina dia mangarona ny eo an-dovia amin''ny tanany, Nefa ny mampakatra azy ho amin''ny vavany dia tsy zakany.'
mg1865::mg_20::19::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kapohy ny mpaniratsira, dia ho hendry ny kely saina; Ary anaro ny manan-tsaina, dia hahalala fahendrena izy.'
mg1865::mg_20::19::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitohatoha amin-drainy sy mandroaka ny reniny Dia zanaka mahamenatra sy mahafa-baraka.'
mg1865::mg_20::19::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, mitsahara tsy hihaino anatra Izay mampanalavitra anao ny tenin''ny fahalalana*. [*Na: Anaka, raha dia minia manalavitra ny tenin''ny fahalalana ianao, Dia mitsahara tsy hihaino anatra]'
mg1865::mg_20::19::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavolombelona ratsy maniratsira ny fitsarana; Ary ny vavan''ny ratsy fanahy mitelina ny ratsy.'
mg1865::mg_20::19::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonona ho amin''ny mpaniratsira ny fanamelohana, Ary ny kapoka ho amin''ny lamosin''ny adala.'
mg1865::mg_20::20::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpaniratsira ny divay, ary mpitabataba ny toaka, Koa izay miraikiraiky azon''izany dia tsy hendry.'
mg1865::mg_20::20::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fampitahoran''ny mpanjaka dia toy ny fieron''ny liona tanora; Izay mampahatezitra azy dia mankahà-doza hihatra amin''ny ainy,'
mg1865::mg_20::20::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voninahitry ny olona ny hanalavitra ny ady; Fa ny adala rehetra kosa misafoaka.'
mg1865::mg_20::20::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malaina tsy mety miasa amin''ny ririnina*, Ka dia hangataka izy raha fararano, fa tsy hahazo. [*Na: noho ny ririnina; na: noho ny haben''ny vokatra]'
mg1865::mg_20::20::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rano lalina ny hevitra ao am-pon''ny olona; Fa izay manan-tsaina dia mahay manovo azy ihany,'
mg1865::mg_20::20::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro ny olona samy midera ny soa ataon''ny tenany avy; Fa izay olo-mahatoky, iza moa no mahita azy?'
mg1865::mg_20::20::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay olona marina mandeha amin''ny fahitsiany Sambatra ny zanany mandimby azy.'
mg1865::mg_20::20::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipetraka eo amin''ny seza fitsarana ny mpanjaka, Ka mikororoka manaisotra ny ratsy rehetra ny masony.'
mg1865::mg_20::20::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahazo manao hoe: Efa nahadio ny foko aho Ka madio tsy manana ota?'
mg1865::mg_20::20::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vato mizana samy hafa sy ny vata famarana samy hafa Dia samy fahavetavetana eo imason''i Jehovah.'
mg1865::mg_20::20::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny zaza aza dia mampiseho amin''ny fanaony Na madio sy mahitsy ny fitondran-tenany.'
mg1865::mg_20::20::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sofina mandre sy ny maso mahita Dia samy nataon''i Jehovah avokoa.'
mg1865::mg_20::20::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza tia torimaso ianao, fandrao tonga malahelo; Ahirato ny masonao, dia ho voky hanina ianao.'
mg1865::mg_20::20::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ratsy! ratsy! hoy ny mpividy; Kanjo nony lasa izy, dia mandoka tena.'
mg1865::mg_20::20::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao ihany ny volamena sy ny voahangy* betsaka; Fa ny molotra misy fahalalana no ravaka soa. [*Na: perla]'
mg1865::mg_20::20::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny lambany, fa efa niantoka olon-kafa izy, Ary tano ho solon''ny vahiny* niantohany. [*Na: vahiny janga]'
mg1865::mg_20::20::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamin''ny olona ny hanina azo amin''ny fitaka; Kanjo ho feno fasika ny vavany any am-parany.'
mg1865::mg_20::20::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hevitra rehetra dia aorin''ny fisainana, Ary ny fahaizana mandamina tsara no entonao miady.'
mg1865::mg_20::20::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandehandeha manaratsy dia manambara ny hevitra afenina, Koa aza miraharaha amin''izay mibedibedy foana.'
mg1865::mg_20::20::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manozona ny rainy na ny reniny, Dia ho faty ao amin''ny alim-pito ny jirony.'
mg1865::mg_20::20::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny harena malaky azo foana* eo am-boalohany Dia tsy hotahina any am-parany. [*Na: mahamahimahina]'
mg1865::mg_20::20::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao hoe: Hamaly ny ratsy nataony aho; Fa andraso Jehovah, fa Izy no hamonjy anao.'
mg1865::mg_20::20::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahavetavetana eo imason''i Jehovah ny vato samy hafa, Ary ny mizana mandainga dia tsy tsara.'
mg1865::mg_20::20::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy amin''i Jehovah ny dian''ny olona, Ary hataon''izay olombelona ahoana no hahafantatra ny lalany?'
mg1865::mg_20::20::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrika amin''ny olona ny malaky manao hoe: Zavatra masina ity; Ka nony vita ny voady, vao mamototra.'
mg1865::mg_20::20::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjaka hendry mikororoka manaisotra ny ratsy fanahy Sady mitarika ny kodia fivelezana eo amboniny.'
mg1865::mg_20::20::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jiron''i Jehovah ny fanahin''ny olona, Itsilovana ny efitrefitra rehetra ao am-po.'
mg1865::mg_20::20::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Famindram-po sy fahamarinana no miaro ny mpanjaka, Ary ampitoeriny amin''ny famindram-po ny seza fiandrianany.'
mg1865::mg_20::20::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voninahitry ny zatovo ny fahatanjahany, Ary ravaky ny anti-panahy ny volo fotsy.'
mg1865::mg_20::20::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fampangirifiriana* dia mahafaka ny faharatsiana, Ary ny kapoka mahadio ny efitrefitra ao an-kibo. [*Hebreo: ratra avy amin''ny kapoaka]'
mg1865::mg_20::21::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rano velona eo an-tanan''i Jehovah ny fon''ny mpanjaka, Ka tarihiny amin''izay tiany.'
mg1865::mg_20::21::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataon''ny olona ho marina avokoa ny lalana rehetra alehany; Fa Jehovah ihany no Mpandanja ny fo.'
mg1865::mg_20::21::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hanao izay marina sy mahitsy No sitrak''i Jehovah mihoatra noho ny fanatitra alatsa-drà.'
mg1865::mg_20::21::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiandranandran''ny maso sy ny fiavonavon''ny fo Izay jiron*''ny ratsy fanahy dia ota. [*Na: asan'']'
mg1865::mg_20::21::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hevitry ny mazoto dia mampanan-karena; Fa ny maimaika rehetra dia halahelo ihany.'
mg1865::mg_20::21::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahazoan-karena amin''ny lela mandainga Dia fofonaina mihelina ho an''izay mitady fahafatesana.'
mg1865::mg_20::21::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitohatohan''ny ratsy fanahy hamongotra azy, Satria mandà tsy hanao izay marina izy.'
mg1865::mg_20::21::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miolikolika ny lalan''ny mavesa-keloka; Fa mahitsy ny ataon''ny madio.'
mg1865::mg_20::21::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo mitoetra eo an-joron''ny tampon-trano Toy izay hiray trano amin''ny vehivavy tia ady.'
mg1865::mg_20::21::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahin''ny ratsy fanahy maniry ny ratsy, Ka na dia ny havany aza tsy mahita fitia eo imasony.'
mg1865::mg_20::21::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ampijalina ny mpaniratsira, dia ho hendry ny kely saina; Ary raha toroan-kevitra ny hendry, dia hahazo fahalalana izy.'
mg1865::mg_20::21::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Iray Marina no mandinika ny tranon''ny ratsy fanahy Ka mamarina azy ho amin''ny loza.'
mg1865::mg_20::21::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manentsin-tadiny amin''ny fitarainan''ny malahelo, Dia mba hitaraina kosa izy, fa tsy hohenoina.'
mg1865::mg_20::21::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanomezana mangingina mampionona ny fahatezerana, Ary ny kolikoly amin''ny takona mampitsahatra ny fahavinirana mafy.'
mg1865::mg_20::21::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fifalian''ny marina ny hanao araka ny rariny; Fa zava-mahatahotra ny mpanao ratsy kosa izany.'
mg1865::mg_20::21::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona izay mivily miala amin''ny lalan''ny fahendrena Dia hitoetra ao amin''ny fivorian''ny fanahin''ny maty.'
mg1865::mg_20::21::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia fanaranam-po dia olona halahelo, Eny, izay tia divay sy diloilo tsy mba hanan-karena.'
mg1865::mg_20::21::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy dia ho avotry ny marina, Ary ny mpivadika ho solon''ny mahitsy.'
mg1865::mg_20::21::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo mitoetra any an''efitra Toy izay amin''ny vehivavy tia ady sady foizina.'
mg1865::mg_20::21::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Harena mahafinaritra sy diloilo no ao amin''ny tranon''ny hendry; Fa ny adala mandany azy.'
mg1865::mg_20::21::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay fatra-panaraka fahamarinana sy famindram-po Dia hahazo fiainana sy fahamarinana ary voninahitra.'
mg1865::mg_20::21::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hendry mananika ny vohitry ny mahery Ka mandrodana ny fiarovana mafy izay itokiany.'
mg1865::mg_20::21::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miambina ny vavany sy ny lelany Dia miaro ny fanahiny tsy ho azom-pahoriana.'
mg1865::mg_20::21::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mirehareha sy miavonavona no atao hoe mpaniratsira, Dia izay olona fatra-piavonavona.'
mg1865::mg_20::21::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanirian''ny malaina hahafaty azy, Satria ny tanany tsy mety miasa tsinona;'
mg1865::mg_20::21::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maniry fatratra mandritra ny andro izy; Fa ny marina kosa manome ka tsy mba mahihitra.'
mg1865::mg_20::21::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitry ny ratsy fanahy dia fahavetavetana, Ka indrindra raha amin''ny sain-dratsy no itondrany azy.'
mg1865::mg_20::21::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho faty ny vavolombelona mandainga; Fa izay mihaino dia hiteny mandrakariva.'
mg1865::mg_20::21::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mampiseho ny fahasahisahiany amin''ny tarehiny; Fa ny marina kosa dia mihevitra izay halehany.'
mg1865::mg_20::21::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fahendrena, na fahalalana, Na fisainana mahaleo an''i Jehovah.'
mg1865::mg_20::21::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaomana ny soavaly ho amin''ny andro iadiana; Fa an''i Jehovah ihany ny fandresena.'
mg1865::mg_20::22::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo ho tsara laza toy izay ho be harena, Ary tsara ny fitia noho ny volafotsy sy ny volamena.'
mg1865::mg_20::22::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihaona ny manan-karena sy ny malahelo; Fa Jehovah no Mpanao azy roa tonta.'
mg1865::mg_20::22::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mahira-tsaina mahatsinjo ny loza ka miery; Fa ny kely saina kosa mandroso ka voa.'
mg1865::mg_20::22::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny valin''ny fanetren-tena sy ny fahatahorana an''i Jehovah Dia harena sy voninahitra ary fiainana.'
mg1865::mg_20::22::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsilo sy fandrika no amin''ny alehan''ny maditra; Fa izay te-hiaro ny ainy dia manalavitra izany.'
mg1865::mg_20::22::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zaro amin''izay lalana tokony halehany ny zaza, Ka na rehefa antitra aza izy, dia tsy hiala amin''izany.'
mg1865::mg_20::22::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny manan-karena dia manapaka ny malahelo, Ary izay misambotra dia mpanompon''ny mampisambotra.'
mg1865::mg_20::22::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamafy heloka dia hijinja fahoriana, Ary ho levona ny tsorakazon''ny fahatezerany.'
mg1865::mg_20::22::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manana maso miantra hotahina, Satria anomezany ho an''ny malahelo ny haniny.'
mg1865::mg_20::22::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Roahy ny mpaniratsira, dia ho afaka ny fifandirana, Eny, hitsahatra ny ady sy ny fahafaham-baraka.'
mg1865::mg_20::22::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia fahadiovam-po, dia milaza soa ny molony. Sady sakaizan''ny mpanjaka izy.'
mg1865::mg_20::22::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mason''i Jehovah miaro ny manam-pahalalana; Fa ny tenin''ny mpivadika dia foanany.'
mg1865::mg_20::22::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny malaina: Misy liona any ivelany; Ho fatin''ny sasany any an-dalambe aho.'
mg1865::mg_20::22::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavan''ny vehivavy jejo* dia lavaka lalina; Izay voaozon''i Jehovah no ho latsaka ao. [*Hebreo: vehivavy tsy vadiny]'
mg1865::mg_20::22::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miraikitra amin''ny fon''ny zaza ny hadalana; Fa ny tsorakazo famaizana no hampanalavitra izany aminy.'
mg1865::mg_20::22::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampahory ny malahelo dia mampitombo ny hareny; Fa izay manome ho an''ny manana kosa dia mampihena ny hareny.'
mg1865::mg_20::22::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ohabolana ny amin''ny fahamarinana sy ny fitondran-tenan''ny hendry'
  verse_text: 'Atongilano ny sofinao, ka henoy ny tenin''ny hendry, Ary ampitandremo ny fahalalako ny fonao;'
mg1865::mg_20::22::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahafinaritra raha voatahirinao ao an-kibonao izany, Koa aoka samy ho eo amin''ny molotrao.'
mg1865::mg_20::22::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao dia ianao no nampahafantariko izany, Mba hitokianao amin''i Jehovah.'
mg1865::mg_20::22::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy efa nanoratra zava-tsoa ho anao va aho, Izay misy hevitra tsara sy fahalalana,'
mg1865::mg_20::22::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hampahafantariko ny fahamarinan''ny teny mahatoky ianao, Sy hahazoanao teny holazaina amin''izay naniraka anao?'
mg1865::mg_20::22::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manosihosy ny malahelo, saingy malahelo izy; Ary aza dia manifakifa ny ory eo am-bavahady;'
mg1865::mg_20::22::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah anie ka hisolo vava azy amin''ny adiny. Ary hanimba ny ain''izay manimba azy.'
mg1865::mg_20::22::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza misakaiza amin''ny olona mora tezitra, Ary aza miara-dia amin''ny olona foizina,'
mg1865::mg_20::22::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao ianao mianatra ny fanaony Ka mahazo fandrika ho an''ny ainao.'
mg1865::mg_20::22::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety ho isan''ny mifandray tanana, Na izay mianto-trosa;'
mg1865::mg_20::22::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy manan-kaloa ianao, Nahoana no dia halainy ny lafika andrianao?'
mg1865::mg_20::22::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manakisaka ny faritany ela, Izay naorin''ny razanao.'
mg1865::mg_20::22::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita olona mailaka amin''ny raharahany va ianao? Eo anatrehan''ny mpanjaka no hitsanganany, Fa tsy hitsangana eo anatrehan''ny olona ambany izy.'
mg1865::mg_20::23::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mipetraka hiara-komana amin''ny mpanapaka ianao, Dia hevero tsara izay eo anatrehanao*, [*Na: anoloanao]'
mg1865::mg_20::23::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka andraso antsy ny tendanao, Raha dia liana loatra ianao.'
mg1865::mg_20::23::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitsiriritra ny hanim-piny, Fa hani-mamitaka izany.'
mg1865::mg_20::23::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manasa-tena hanan-karena, Aza entina amin''izany ny fahendrenao.'
mg1865::mg_20::23::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa hampanarahinao azy va ny masonao, nefa tsy ao intsony izy? Fa maniry elatra tokoa izy Ka manidina toy ny voromahery ho eny amin''ny lanitra.'
mg1865::mg_20::23::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza homana ny mofon''izay ratsy fijery, Ary aza mitsiriritra ny hanim-piny;'
mg1865::mg_20::23::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny heviny ao am-pony ihany no toetrany: Hoy izy aminao: Mihinàna, misotroa; Kanjo tsy sitrany ianao.'
mg1865::mg_20::23::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay sombiny kely voatelinao aza dia mbola haloanao, Ka ho very foana ny teny mahafinaritra nataonao.'
mg1865::mg_20::23::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miteny amin''ny* adala; Fa hohamavoiny foana ny fahendren''ny teninao. [*Hebreo: an-tsofin'']'
mg1865::mg_20::23::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manakisaka ny faritany ela, Ary aza manitatra mankamin*''ny sahan''ny kamboty; [*Hebreo: miditra amin'']'
mg1865::mg_20::23::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahery ny Mpanavotra azy, Izy no hisolo vava azy amin''ny adiny aminao.'
mg1865::mg_20::23::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampiekeo famaizana ny fonao, Sy tenim-pahalalana ny sofinao.'
mg1865::mg_20::23::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza tsy manafay zanaka, Fa tsy dia ho faty izy tsy akory na dia asianao ny hazo aza*; [*Na: Fa tsy ho faty izy, raha asianao ny hazo]'
mg1865::mg_20::23::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mamely azy amin''ny hazo ianao, Dia ho voavonjinao tsy ho any amin''ny fiainan-tsy hita* ny fanahiny. [*Hebreo: Sheola]'
mg1865::mg_20::23::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, raha hendry ny fonao,Dia ho faly koa ny foko, dia ny foko;'
mg1865::mg_20::23::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho ravoravo ny fanahiko*, Raha miteny marina ny molotrao. [*Hebreo: voako]'
mg1865::mg_20::23::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hialona ny mpanota ny fonao; Fa matahora an''i Jehovah mandritra ny andro;'
mg1865::mg_20::23::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola hisy koa ny farany, Dia tsy ho foana ny fanantenanao.'
mg1865::mg_20::23::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ianao, anaka, ka hendre, Ary ampizory amin''ny lalana ny fonao.'
mg1865::mg_20::23::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza misakaiza amin''izay mpiboboka divay Sy izay fatra-pitia hena;'
mg1865::mg_20::23::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa halahelo izay mpiboboka sy izay fatra-pitia hena; Ary ny fitiavan-torimaso mampitafy voro-damba.'
mg1865::mg_20::23::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maneke ny rainao izay niteraka anao. Ary aza manamavo ny reninao, saingy efa antitra izy.'
mg1865::mg_20::23::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vidio ny marina, ka aza amidy, Dia ny fahendrena sy ny fananarana ary ny fahazavan-tsaina.'
mg1865::mg_20::23::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifaly dia hifaly ny rain''ny marina, Ary izay miteraka zaza hendry hanampifaliana aminy.'
mg1865::mg_20::23::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho faly ny rainao sy ny reninao, Eny, aoka ho ravoravo ny reninao izay niteraka anao.'
mg1865::mg_20::23::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, atolory ahy ny fonao, Ary aoka ny masonao ho faly mijery ny lalako*; [*Na: Ary aoka ny masonao handinika ny lalako]'
mg1865::mg_20::23::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vehivavy jejo* dia hady lalina, Ary ny vahiny janga lavaka ety; [*Hebreo: vehivavy tsy vadiny]'
mg1865::mg_20::23::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, manotrika toy ny jiolahy ireny Ary mahamaro ny olona mpivadika.'
mg1865::mg_20::23::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''iza ny Indrisy? An''iza ny Endrey? An''iza ny fifandirana? An''iza ny fitolokoana? An''iza ny ratra tsy ahoan-tsy ahoana? An''iza ny maso mivoara-mena*? [*Na: manjambena]'
mg1865::mg_20::23::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''izay mikikitra amin''ny divay, Eny, an''izay mandeha hanandrana divay voaharoharo zavatra.'
mg1865::mg_20::23::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mijery ny divay noho ny hamenany Sy ny fanganohanony eo anaty gilasy* Ary ny fikoriany mahafinaritra; [*Hebreo: kapoaka]'
mg1865::mg_20::23::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny farany dia hanaikitra toy ny bibilava izy Ary hanindrona toy ny menarana.'
mg1865::mg_20::23::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny masonao dia hijery vehivavy jejo*, Ary ny fonao hieritreri-dratsy**. [*Hebreo: vehivavy tsy vadiny] [**Na: Ny masonao hahita zavatra hafahafa, Ary ny fonao hirediredy foana]'
mg1865::mg_20::23::34:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ho sahala amin''izay mandry ao amin''ny ranomasina ianao Sady ho tahaka izay mandry eo an-tendron''ny andrin-tsambo.'
mg1865::mg_20::23::35:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nokapohiny aho, hoy ianao, fa tsy reko naharary ahy, Nandalasiny aho, fa tsy tsaroako; Rahoviana ange aho no hifoha mba hitadiavako azy indray?'
mg1865::mg_20::24::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mialona ny olona ratsy fanahy, Na maniry ho namany;'
mg1865::mg_20::24::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fandravana no saintsainin''ny fony, Ary fampahoriana notenenin''ny molony.'
mg1865::mg_20::24::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahendrena no anaovana trano; Ary fahalalinan-tsaina no mampaharitra azy;'
mg1865::mg_20::24::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady fahalalana no hamenoana ny efi-trano Amin''izay harena soa sy mahafinaritra rehetra.'
mg1865::mg_20::24::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be hery ny lehilahy hendry, Eny, mitombo hery ny olona manam-pahalalana;'
mg1865::mg_20::24::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahaizana mandamina tsara no entonao miady, Ary raha maro ny mpanolo-tsaina, dia misy famonjena.'
mg1865::mg_20::24::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avo tsy takatry ny adala ny fahendrena*, Tsy mba mahaloa-bava eo am-bavahady izy. [*Na: Ataon''ny adala ho haingohaingo foana ny fahendrena]'
mg1865::mg_20::24::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay misaintsaina hanao ratsy Dia atao hoe mpamoron-tsain-dratsy.'
mg1865::mg_20::24::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ota ny fikasan''ny hadalana; Ary fahavetavetana eo imason''ny olona ny mpaniratsira.'
mg1865::mg_20::24::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha reraka amin''ny andro fahoriana ianao, Dia kely ny herinao.'
mg1865::mg_20::24::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo izay entina hovonoina, Ary enga anie ka mba harovanao izay mangozohozo efa ho mby eo am-pamonoana!'
mg1865::mg_20::24::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy ianao: Tsia, tsy mahalala izany* izahay, Moa Izay mandanja ny fo tsy hihevitra izany va? Ary Izay mandinika ny fanahinao tsy hahalala izany va? Eny, hovaliany araka ny ataony avy ny olona rehetra. [*Na: io]'
mg1865::mg_20::24::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, homàna tantely, fa tsara izany, Ary ny toho-tantely, fa ho mamy eo am-bavanao*; [*Hebreo:lanilaninao]'
mg1865::mg_20::24::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho toy izany no hianaranao fahendrena ho an''ny fanahinao; Fa raha azonao izany, dia hisy hiafarana, Ka tsy ho foana ny fanantenanao.'
mg1865::mg_20::24::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manotrika ao akaikin''ny tranon''ny marina ianao, ry ilay ratsy, Aza ravanao ny fonenany;'
mg1865::mg_20::24::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa potraka im-pito ny marina, nefa tafarina ihany; Ary ny ratsy fanahy kosa solafaka, raha azom-pahoriana*. [*Na: ka idiran-doza]'
mg1865::mg_20::24::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza faly, raha lavo ny fahavalonao, Ary aza ravoravo ny fonao, raha tafintohina izy;'
mg1865::mg_20::24::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao hitan''i Jehovah izany ka ataony ho ratsy, Ary ampialainy aminy ny fahatezerany.'
mg1865::mg_20::24::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hirehitra ny fahatezeranao noho ny amin''ny mpanao ratsy, Ary aza mialona ny ratsy fanahy;'
mg1865::mg_20::24::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hisy fanantenana* ho an''ny ratsy; Eny, ho faty ny jiron''ny ratsy fanahy. [*Hebreo: farany]'
mg1865::mg_20::24::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, matahora an''i Jehovah sy ny mpanjaka; Ary aza mikambana amin''izay miovaova*; [*Na: hafa saina noho izany]'
mg1865::mg_20::24::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho tampoka no hitrangan''izay hanjo ireny; Ary iza no mahalala izay loza hiseho amin''ny androny*? [*Hebreo: taonany]'
mg1865::mg_20::24::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao koa no tenin''ny hendry: Tsy mety raha mizaha tavan''olona amin''ny fitsarana.'
mg1865::mg_20::24::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao amin''ny meloka hoe: Marina ianao, Dia hozonin''ny olona sady ho halan''ny firenena;'
mg1865::mg_20::24::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mitsara marina kosa no hahita soa sy hahazo fitahiana tsara.'
mg1865::mg_20::24::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahavoa tsara amin''ny famaliana dia manoroka ny molotra.'
mg1865::mg_20::24::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amboary ny asanao any ivelany, Ary ataovy lavorary ny any an-tsaha; Ka rehefa vita izany, dia mahazo manao ny tranonao ianao.'
mg1865::mg_20::24::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety ho vavolombelona foana hanameloka ny namanao; Moa hamitaka amin''ny molotrao va ianao?'
mg1865::mg_20::24::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao hoe: Araka izay nataony tamiko no mba hataoko aminy kosa, Hovaliako ny olona araka izay nataony.'
mg1865::mg_20::24::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandalo ny sahan''ny kamo Sy ny tanim-boaloboky ny tsy ampy saina aho;'
mg1865::mg_20::24::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, feno sampivato izy Sady voasaron''ny amiana, Ary nirodana ny ampiantany vatony.'
mg1865::mg_20::24::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nojereko ka noheveriko tsara, Eny, hitako ka nahazoako anatra.'
mg1865::mg_20::24::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola hatory kely ihany, mbola ho renoka kely ihany. Mbola hanohon-tanana kely hatory;'
mg1865::mg_20::24::34:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 24
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tonga toy ny mimaona hamely ny alahelonao, Ary ny fahantranao ho toy ny jiolahy.'
mg1865::mg_20::25::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ohabolana samy hafa ny amin''ny fitondran-tena sy ny toetry ny olona marina'
  verse_text: 'Izao koa no ohabolan''i Solomona, izay nangonin*''ny olon''i Hezekia, mpanjakan''ny Joda: [*Hebreo: nafindran'']'
mg1865::mg_20::25::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voninahitr''Andriamanitra ny manafin-javatra; Fa voninahitry ny mpanjaka kosa ny mamanta-javatra.'
mg1865::mg_20::25::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hahavon''ny lanitra sy ny halalin''ny tany Ary ny fon''ny mpanjaka dia samy tsy azo fantarina avokoa.'
mg1865::mg_20::25::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory ny taim-bolafotsy, Dia hisy fanaka ho an''ny mpanao an-idina.'
mg1865::mg_20::25::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory ny ratsy fanahy tsy ho eo anatrehan''ny mpanjaka, Dia hampitoerina amin''ny fahamarinana ny seza fiandrianany.'
mg1865::mg_20::25::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manandra-tena eo anatrehan''ny mpanjaka, Ary aza mitoetra eo amin''ny fitoeran''ny lehibe;'
mg1865::mg_20::25::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aleo ianao hantsoina hoe: Miakara aty, Toy izay hatambotsotra eo imason''ny manan-kaja izay hitan''ny masonao.'
mg1865::mg_20::25::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza maika handeha hiady, Fandrao tsy ho fantatrao izay hataonao amin''ny farany, Rehefa omen''ny namanao henatra ianao.'
mg1865::mg_20::25::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miadia ihany ny adinao amin''ny namanao, Kanefa aza aseho izay tsy tian''ny sasany holazaina,'
mg1865::mg_20::25::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao izay mandre hanondro maso anao, Ka tsy ho afaka aminao ny laza ratsy.'
mg1865::mg_20::25::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny atao amin''ny antony dia poma volamena ao anaty vilia volafotsy tsara soratra*. [*Na: poma volamena misy ravaka volafotsy]'
mg1865::mg_20::25::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kavim-bolamena sy firavaka volamena tsara Ny mpananatra hendry, raha amin''ny sofina mihaino.'
mg1865::mg_20::25::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny hatsiaky ny oram-panala amin''ny taom-pijinjana, Dia toy izany ny iraka mahatoky amin''izay naniraka azy, Fa mamelombelona ny fon''ny tompony izy.'
mg1865::mg_20::25::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny rahona sy ny rivotra tsy misy orana Ny olona izay mirehaka amin''ny fizaram-bava.'
mg1865::mg_20::25::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahari-po no ahazoana mampanaiky ny mpitsara, Ary ny vava* malefaka mahatapa-taolana. [*(Hebreo: lela]'
mg1865::mg_20::25::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahita tantely va ianao? Hano izay antonona anao, Fandrao voky loatra ianao ka handoa azy.'
mg1865::mg_20::25::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miditra matetika ao an-tranon''ny namanao, Fandrao tofoka anao izy, ka ho halany ianao.'
mg1865::mg_20::25::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Langilangy sy sabatra ary zana-tsipïka maranitra Ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.'
mg1865::mg_20::25::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nify nahasimatsimahana sy ny tongotra mangozohozo Ny fahatokiana ny mpamitaka amin''ny andro fahoriana.'
mg1865::mg_20::25::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny miala lamba amin''ny hatsiaka, Ary toy ny vinaingitra amin''ny sirahazo, Dia toy izany ny mikalo amin''ny malahelo am-po.'
mg1865::mg_20::25::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha noana ny fahavalonao, omeo hanina izy; Ary raha mangetaheta izy, omeo rano hosotroiny;'
mg1865::mg_20::25::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao izany ianao, dia hanambatra vainafo ho eo an-dohany, Ary Jehovah no hamaly soa anao.'
mg1865::mg_20::25::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rivotra avy any avaratra mahatonga ranonorana, Dia toy izany, ny lelan''ny mpifosa mampahavinitra endrika.'
mg1865::mg_20::25::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo mitoetra eo an-joron''ny tampontrano Toy izay miray trano amin''ny vehivavy tia ady.'
mg1865::mg_20::25::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rano mangatsiaka amin''ny fanahy reraka Ny filazana soa avy any an-tany lavitra.'
mg1865::mg_20::25::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Loharano voahosihosy sy fantsakana simba Ny marina izay mikoy ny ratsy fanahy,'
mg1865::mg_20::25::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tsara raha mahery homana tantely; Fa ny fitadiavan''ny olona ny voninahiny dia tsy voninahitra*. [*Na: Fa ny fandinihana izay sarotra dia voninahitra (na: mavesatra)]'
mg1865::mg_20::25::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 25
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tanàna rava tsy misy manda Ny lehilahy izay tsy mahatsindry ny fanahiny.'
mg1865::mg_20::26::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny oram-panala amin''ny lohataona, Ary toy ny ranonorana amin''ny taom-pijinjana, Dia toy izany ny voninahitra tsy tandrifiny ho an''ny adala.'
mg1865::mg_20::26::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny vorona mivezivezy sy ny sidintsidina manidina, Dia toy izany ny fanozonam-poana: tsy mba hihatra izany.'
mg1865::mg_20::26::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny karavasy ho amin''ny soavaly ny lamboridy ho amin''ny boriky, Ary ny tsorakazo kosa ho amin''ny lamosin''ny adala.'
mg1865::mg_20::26::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamaly ny adala araka ny hadalany, Fandrao mba adala tahaka azy koa ianao.'
mg1865::mg_20::26::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valio ny adala araka ny hadalany, Fandrao dia manao azy ho hendry izy'
mg1865::mg_20::26::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manapaka ny tongony sady misotro loza Izay mampitondra teny ny adala.'
mg1865::mg_20::26::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mikepikepika ny tongotry ny malemy tongotra, Dia toy izany ny ohabolana eo am-bavan''ny adala.'
mg1865::mg_20::26::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny manisy vato eo amin''ny antsamotady, Dia toy izany ny manome voninahitra ny adala.'
mg1865::mg_20::26::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tsilo eny an-tanan''ny olona mamo, Dia toy izany ny ohabolana eo am-bavan''ny adala.'
mg1865::mg_20::26::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiasa mahay dia mahavita ny zavatra isan-karazany; Fa izay manakarama ny adala dia toy ny manakarama izay sendra mandalo*. [*Na: Toy ny mpandefa zana-tsipïka mahavoa ny olona rehetra, Dia toy izany ny manakarama ny adala sy manakarama izay sendra mandalo]'
mg1865::mg_20::26::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny amboa miverina amin''ny loany, Dia toy izany ny adala miverina amin''ny hadalany.'
mg1865::mg_20::26::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitanao va ny olona manao azy ho hendry? Ny adala misy hantenaina kokoa noho izy.'
mg1865::mg_20::26::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy ny malaina: Misy liona any an-dàlana, Misy liona atsy an-dalambe.'
mg1865::mg_20::26::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny varavarana mihodina amin''ny saviliny, Dia toy izany ny kamo eo amin''ny fandriany,'
mg1865::mg_20::26::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malaina mangarona ny eo an-doviany, Nefa ny hampakatra azy ho amin''ny vavany dia mahasasatra azy.'
mg1865::mg_20::26::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kamo manao ny tenany ho hendry mihoatra noho ny olona fito izay mahavaly tsara.'
mg1865::mg_20::26::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandalo ka mitsaraingona amin''ny ady tsy azy Dia mandroritra amboa amin''ny sofiny.'
mg1865::mg_20::26::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny adala izay manely afo sy zana-tsipïka ary fahafatesana,'
mg1865::mg_20::26::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia toy izany ny olona mamitaka ny namany ka manao hoe: Tsy vosobosotra ihany va no ataoko?'
mg1865::mg_20::26::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy misy kitay intsony, dia maty ny afo; Ary raha tsy misy mpifosafosa intsony, dia mitsahatra ny fifandirana.'
mg1865::mg_20::26::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny arina atao amin''ny vainafo sy ny kitay hazo atao amin''ny afo, Dia toy izany, ny olona tia ady mandrehitra fifandirana.'
mg1865::mg_20::26::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''ny mpifosafosa dia toy ny hanim-py ka mikorotsaka ao anaty kibo indrindra.'
mg1865::mg_20::26::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tavim-bilany misy ankosotra taim-bolafotsy ny molotra mihatsaravelatsihy* sy ny fo ratsy. [*Hebreo: mirehitra]'
mg1865::mg_20::26::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpandrafy dia mody ho hafa amin''ny molony Sady manafim-pitaka ao am-pony;'
mg1865::mg_20::26::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia miteny soa aza izy, aza mino azy; Fa fahavetavetana fito no ao am-pony.'
mg1865::mg_20::26::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lolompo dia miafina ao amin''ny fitaka; Nefa ny haratsiany dia haharihary eo am-pahibemaso.'
mg1865::mg_20::26::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihady lavaka no ho latsaka ao, Ary izay manakodiadia vato no hikodiavany kosa.'
mg1865::mg_20::26::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 26
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halan''ny lela mandainga izay efa nampahoriny, Ary ny vava mandrobo dia mampidi-doza.'
mg1865::mg_20::27::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mirehareha ny amin''ny ho ampitso ianao; Fa na dia ny havoaky ny anio aza tsy fantatrao.'
mg1865::mg_20::27::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny olon-kafa no hidera anao, fa tsy ny vavanao, Eny, ny vahiny, fa tsy ny molotrao.'
mg1865::mg_20::27::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mavesatra ny vato, ary mavesa-danja ny fasika; Fa ny fahasosoran''ny adala dia manoatra noho izy roa tonta.'
mg1865::mg_20::27::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Masiaka ny fahavinirana, ary misafoaka ny fahatezerana; Fa iza no mahajanona eo anatrehan''ny fahasaro-piaro?'
mg1865::mg_20::27::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo anatra imaso Toy izay fitia afenina.'
mg1865::mg_20::27::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azo itokiana hahasoa ny fery ataon''ny sakaiza; Fa tena fitaka ny fanorohan''ny fahavalo.'
mg1865::mg_20::27::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsakitsahin''ny voky na dia ny toho-tantely aza; Fa mamin''ny noana na dia ny zava-mangidy rehetra aza.'
mg1865::mg_20::27::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny voron-kely miala amin''ny akaniny ka mirenireny, Dia toy izany ny olona izay mirenireny miala amin''ny fonenany.'
mg1865::mg_20::27::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny diloilo sy ny zava-manitra mahafaly ny fo, Ary ny hamamin''ny sakaiza dia avy amin''ny ana-panahy ataony.'
mg1865::mg_20::27::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mahafoy ny sakaizanao, na ny sakaizan-drainao, Ary aza mankany amin''ny tranon''ny rahalahinao amin''ny andro fahorianao; Fa tsara ny namana akaiky noho ny rahalahy lavitra.'
mg1865::mg_20::27::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, hendre, ary ampifalio ny foko, Mba hamaliako izay miteny ratsy ahy.'
mg1865::mg_20::27::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mahira-tsaina mahatazana ny loza ka miery; Fa ny kely saina kosa mandroso ka voa.'
mg1865::mg_20::27::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alao ny lambany, fa efa niantoka olon-kafa izy, Ary tano ho solon''ny vahiny janga niantohany izy.'
mg1865::mg_20::27::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mifoha maraina koa ka misaotra ny sakaizany amin''ny feo mahery, Dia isaina ho fanozonana izany.'
mg1865::mg_20::27::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fijononoky ny ranonorana be Ny vehivavy tia ady.'
mg1865::mg_20::27::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay misakana azy dia toy ny misakana ny rivotra, Sady toy ny mamihina* diloilo ny tanany ankavanana. [*Na: mihatra amin''ny]'
mg1865::mg_20::27::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vy maharanitra ny vy, Toy izany, ny olona maharanitra ny tarehin''ny sakaizany.'
mg1865::mg_20::27::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miaro aviavy dia hihinana ny voany; Ary izay miambin-tompo dia homem-boninahitra.'
mg1865::mg_20::27::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny tandindona eny anaty rano mifanahaka amin''ny tarehy, Dia toy izany no ifanahafan''ny fon''ny olona amin''ny an''olona.'
mg1865::mg_20::27::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiainan-tsy hita* sy ny fandringanana tsy mety voky, Dia toy izany no tsy ahamamoan''ny mason''ny olona. [*Hebreo: Sheola]'
mg1865::mg_20::27::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny memy ho an''ny volafotsy, Ny fandrendrehana ho an''ny volamena, Ary ny toetry ny olona dia tsy maintsy ho araka izay zavatra derainy.'
mg1865::mg_20::27::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia miara-totoinao ny fanoto amin''ny vary eo an-daona aza ny adala, Dia tsy mba hiala aminy tsy akory ny fahadalany.'
mg1865::mg_20::27::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantaro tsara ny tarehin''ny ondry aman''osinao, Ary miahia tsara ny andian''ny bibinao;'
mg1865::mg_20::27::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny harena tsy ho mandrakizay; Ary moa haharitra ho amin''ny taranaka rehetra va ny satro-boninahitra?'
mg1865::mg_20::27::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia lany aza ny ahitra, ka mitsiry ny solofony, Ary voataona ny zava-maniry any an-tendrombohitra,'
mg1865::mg_20::27::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanak''ondry dia hahazoanao fitafiana, Ary ny osy hamidinao tany;'
mg1865::mg_20::27::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 27
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho ampy hosotroinao ny rononon''osy Sy ho an''ny ankohonanao, Ary hisy hiveloman''ny ankizivavinao.'
mg1865::mg_20::28::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mandositra, na dia tsy misy manenjika aza; Fa ny marina kosa dia matoky toy ny liona tanora.'
mg1865::mg_20::28::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahotan*''ny tany mahamaro mpanapaka; Fa ny fisian''ny olona manan-tsaina** kosa no mampahateza ny fanjakana***. [*Na: fikomian''] [**Na: manan-tsaina sady mahalala rariny] [***Na: Fa noho ny manan-tsaina no haharetan''ny fahamarinana]'
mg1865::mg_20::28::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malahelo izay mampahory ny mahantra Dia toy ny ranonorana izay manindao ka tsy maha-misy hanina.'
mg1865::mg_20::28::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahafoy ny lalàna dia mandoka ny ratsy fanahy; Fa izay mitandrina ny lalàna dia mirehitra amin''ny fanoherana azy.'
mg1865::mg_20::28::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy dia tsy mahalala rariny; Fa izay mitady an''i Jehovah no mahalala ny zavatra rehetra.'
mg1865::mg_20::28::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny malahelo izay mandeha amin''ny fahitsiany Dia tsara noho ny manan-karena izay mivadika ka mandeha amin''ny lalana miolikolika.'
mg1865::mg_20::28::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mitandrina ny lalàna no zanaka hendry; Fa izay misakaiza amin''ny mpandany harena dia manome henatra ny rainy.'
mg1865::mg_20::28::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampitombo ny fananany amin''ny zana-bola sy ny tombony Dia mamory ho an''izay miantra ny malahelo'
mg1865::mg_20::28::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manentsin-tadiny tsy hihaino ny lalàna, Na ny fivavahany aza dia fahavetavetana.'
mg1865::mg_20::28::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampivily ny mahitsy ho amin''ny lalan-dratsy Dia ho lavo amin''ny lavaka nataony; Fa ny tsy misy tsiny no handova ny soa.'
mg1865::mg_20::28::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny manan-karena manao azy ho hendry; Fa ny malahelo izay manan-tsaina dia hizaha toetra azy.'
mg1865::mg_20::28::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ravoravo ny marina, dia be ny famirapiratana; Fa raha misandratra* kosa ny ratsy fanahy, dia miery ny vahoaka. [*Na: mitsangana]'
mg1865::mg_20::28::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manafina ny fahotany tsy hambinina; Fa izay mitsotra ka mahafoy azy no hahazo famindram-po.'
mg1865::mg_20::28::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona matahotra mandrakariva; Fa izay manamafy ny fony no hidiran-doza.'
mg1865::mg_20::28::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Liona mierona sy bera miremby Ny mpanapaka ratsy fanahy amin''ny olona reraka.'
mg1865::mg_20::28::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanapaka tsy ampy saina dia mahery mampahory; Izay mankahala ny fieremana no ho ela velona.'
mg1865::mg_20::28::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay itambesaran-keloka noho ny fandatsahan-drà dia handositra hatrany an-davaka; Aoka tsy hisy hihazona azy.'
mg1865::mg_20::28::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandeha tsy misy tsiny no ho voavonjy; Fa izay mivadika ka mandeha amin''ny lalana miolikolika no ho lavo tampoka.'
mg1865::mg_20::28::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miasa ny taniny dia ho voky hanina Fa izay manaraka ny olom-poana* ho voky alahelo kosa. [*Na: zava-poana]'
mg1865::mg_20::28::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay olona mahatoky tokoa dia ho be fitahiana; Fa izay maimay ta-hanan-karena dia tsy maintsy hohelohina.'
mg1865::mg_20::28::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mety raha mizaha tavan''olona; Kanefa na dia amin''ny sombin-kanina ihany aza dia sahin''ny olona hanotana.'
mg1865::mg_20::28::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpialona dia maimay ta-hanan-karena; Tsy fantany fa hanjo azy ny alahelo.'
mg1865::mg_20::28::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mananatra olona no hahazo fitia be rahatrizay Noho izay mandrobo amin''ny lelany.'
mg1865::mg_20::28::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandroba ray sy reny Ka manao hoe: Tsy heloka izany, Dia naman''ny mpanimba.'
mg1865::mg_20::28::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mierina* manetsika ady; Fa izay matoky an''i Jehovah dia hohatavezina. [*Na: miavonavona am-po]'
mg1865::mg_20::28::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay matoky ny fony dia adala; Fa izay mandeha amin''ny fahendrena no ho afa-miala.'
mg1865::mg_20::28::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manome ny malahelo tsy hanan-java-mahory; Fa izay mitampi-maso hahazo ozona be;'
mg1865::mg_20::28::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 28
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misandratra* ny ratsy fanahy, dia miery ny vahoaka; Fa raha ringana kosa izy, dia mihamaro ny marina. [*Na: mitsangana]'
mg1865::mg_20::29::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay olona anarina matetika ka mihamafy hatoka Dia ho torotoro tampoka, ka tsy hisy fahasitranana.'
mg1865::mg_20::29::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mihamaro ny marina, dia faly ny vahoaka; Fa raha ny ratsy fanahy no manapaka, dia misento kosa izy.'
mg1865::mg_20::29::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia fahendrena no mahafaly ny rainy; Fa izay misakaiza amin''ny vehivavy janga dia mandany harena.'
mg1865::mg_20::29::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rariny no ampandrian''ny mpanjaka ny tany; Fa izay mandray tambitamby* no mandrava azy kosa. [*Na: mampandoa harena]'
mg1865::mg_20::29::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay olona mandrobo ny namany Dia mamela-pandrika ny tongony.'
mg1865::mg_20::29::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy fandrika amin''ny heloky ny olon-dratsy; Fa ny marina mihoby sy mifaly.'
mg1865::mg_20::29::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina mihevitra ny adin''ny malahelo; Fa ny ratsy fanahy tsy hahalala fahendrena.'
mg1865::mg_20::29::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpaniratsira mampihotakotaka* ny tanàna; Fa ny hendry mampionona fahatezerana. [*Hebreo: mampirehitra]'
mg1865::mg_20::29::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha iadian''ny hendry ny adala, Dia tezitra sy mihomehy izy, ka tsy hisy fitsaharana*. [*Na: Raha hendry miady amin''adala, na tezitra izy, na mihomehy, dia tsy misy fitsaharana]'
mg1865::mg_20::29::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona mpandatsa-drà mankahala ny tsy misy tsiny; Fa ny mahitsy kosa miahy ny ainy*. [*Na: Ary mitady ny ain''ny mahitsy]'
mg1865::mg_20::29::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeran''ny adala dia avoakany avokoa; Fa ny hendry kosa manindry fo.'
mg1865::mg_20::29::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mihaino lainga ny mpanapaka, Dia ho ratsy fanahy ny mpanompony rehetra.'
mg1865::mg_20::29::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihaona ny malahelo sy ny mpampahory*; Jehovah no manazava ny mason''izy roa tonta. [*Na: mpampanana vola]'
mg1865::mg_20::29::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mpanjaka mitsara marina ny malahelo, Dia haharitra mandrakizay ny seza fiandrianany.'
mg1865::mg_20::29::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tsorakazo sy ny anatra no manome fahendrena; Fa ny zaza aranana mampahamenatra ny reniny.'
mg1865::mg_20::29::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha maro ny ratsy fanahy, dia mitombo ny ota; Fa ny marina ho faly mahita ny fahalavoany.'
mg1865::mg_20::29::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faizo ny zanakao, dia ho famelombelomana ny fonao izy Sy ho fifalian''ny fanahinao.'
mg1865::mg_20::29::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy misy fahitana, dia atondraka hanaram-po amin''izay tsy mety ny olona; Fa raha mitandrina ny lalàna kosa izy, dia sambatra.'
mg1865::mg_20::29::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha teny fotsiny ihany, dia tsy ampy hananarana ny mpanompo; Fa na dia fantany aza, tsy hankatoaviny*. [*Hebreo: tsy misy valiny]'
mg1865::mg_20::29::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitanao va ny olona faingam-bava? Ny adala aza misy hantenaina kokoa noho izy.'
mg1865::mg_20::29::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanompo izay nampihantaina hatry ny fony mbola kely Dia hihambo ho zanaka any am-parany.'
mg1865::mg_20::29::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona mora tezitra manetsika ady; Ary ny olona masiaka dia be fahadisoana.'
mg1865::mg_20::29::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiavonavonan''ny olona no hampietry azy; Fa hahazo voninahitra kosa ny manetry tena.'
mg1865::mg_20::29::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miray tetika amin''ny mpangalatra dia manary tena; Mandre ny fampianianana izy, nefa tsy mety milaza.'
mg1865::mg_20::29::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamandrika ny tahotra olona; Fa izay matoky an''i Jehovah no hovonjena*. [*Hebreo: hatao amin''ny avo]'
mg1865::mg_20::29::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no mila sitraka amin*''ny mpanapaka; Fa avy amin''i Jehovah ny fitsarana ny olona. [*Hebreo: mitady ny tavan'']'
mg1865::mg_20::29::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 29
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny meloka dia fahavetavetana eo imason''ny marina; Ary ny mahitsy lalana dia mba fahavetavetana eo imason''ny ratsy fanahy kosa.'
mg1865::mg_20::30::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tenin''i Agora'
  verse_text: 'Ny teny mavesa-danja nataon''i Agora, zanak''i Jake*, dia ny teny nataon-dralehilahy tamin''Itiela, eny, tamin''Itiela sy Okala: [*Na: Ny tenin''i Agora, zanak''i Jake, avy any Masa]'
mg1865::mg_20::30::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia biby*, fa tsy olona, Ary tsy manan-tsain''olombelona aho. [*Na: Nanasa-tena aho, Andriamanitra o, nanasa-tena aho, Andriamanitra o, ka lany ny heriko fa tahaka ny biby aho]'
mg1865::mg_20::30::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nianatra fahendrena aho, Na nahazo ny fahalalana ny Iray Masina.'
mg1865::mg_20::30::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no efa niakatra tany an-danitra sady nidina indray? Iza no nahangona ny rivotra tao an-tanany? Iza no nahafono ny rano tamin''ny lambany? Iza no nahamisy ny faran''ny tany rehetra? Iza no anarany, ary iza no anaran''ny zanany? Fa toa fantatrao!'
mg1865::mg_20::30::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''Andriamanitra dia voadio avokoa; Ampinga ho an''izay mialoka aminy Izy.'
mg1865::mg_20::30::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manampy ny teniny, fandrao hanariny ianao Ka ho hita fa mpandainga.'
mg1865::mg_20::30::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zavatra roa loha no angatahiko aminao; Ka aza lavinao, dieny tsy mbola maty aho:'
mg1865::mg_20::30::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampanalaviro ahy ny zava-poana sy ny lainga; Aza manome ahy alahelo na harena; Fahano aho amin''izay anjara-hanina sahaza ho ahy;'
mg1865::mg_20::30::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao, raha voky aho, dia handà Ka hanao hoe: Iza moa Jehovah? Ary andrao, raha tonga malahelo aho, dia hangalatra Ka hanamavo ny anaran''Andriamanitro.'
mg1865::mg_20::30::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manendrikendrika ny mpanompo amin''ny tompony, Fandrao hozoniny ianao ka hahazo heloka.'
mg1865::mg_20::30::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy taranaka izay manozona ny rainy Sady tsy misaotra ny reniny.'
mg1865::mg_20::30::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy taranaka manao azy ho madio, Kanjo tsy voasasa ho afaka amin''ny fahalotoany.'
mg1865::mg_20::30::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy taranaka, endrey ny fiandrandran''ny masony Sy ny fisondrotry ny hodi-masony!'
mg1865::mg_20::30::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy taranaka izay toy ny sabatra ny nifiny, Ary toy ny antsy ny vazany, Hamongotra ny ory tsy ho amin''ny tany Sy ny malahelo tsy ho amin''ny olona.'
mg1865::mg_20::30::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo, Omeo. Misy zavatra telo tsy mety voky, Eny, efatra aza no tsy manao hoe: Aoka izay:'
mg1865::mg_20::30::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiainan-tsy hita*; sy ny kibo momba, Ny tany izay tsy vonton-drano, Ary ny afo koa no tsy mba manao hoe: Aoka izay. [*Hebreo: Sheola]'
mg1865::mg_20::30::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maso izay miandranandrana amin-dray Sady tsy mety manaja reny Dia hotsaingotsaingohin''ny goaika eny an-dohasahan-driaka Ary hohanin''ny zana-boromahery.'
mg1865::mg_20::30::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy zavatra telo mahagaga ka tsy takatro, Eny, efatra aza no tsy fantatro:'
mg1865::mg_20::30::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nalehan''ny voromahery teny amin''ny habakabaka, Ny nalehan''ny bibilava teny amin''ny vatolampy, Ny nalehan''ny sambo teny amin''ny ranomasina, Ary ny nalehan''ny lehilahy tamin''ny tovovavy.'
mg1865::mg_20::30::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka izany koa no fanaon''ny vehivavy mpijangajanga: Homana izy, dia mamafa ny vavany, Ka dia manao hoe: Tsy nanao ratsy aho.'
mg1865::mg_20::30::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao fitondrana telo izao no tsy mampandry ny tany, Eny, zavatra efatra aza no tsy zakany;'
mg1865::mg_20::30::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny andevo no tonga mpanjaka, Raha ny adala no voky hanina,'
mg1865::mg_20::30::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny vehivavy lany zara* no ampakarina, Ary raha ny ankizivavy no mandova** ny tompovaviny. [*Hebreo: ankahalaina] [**Na: mandimby]'
mg1865::mg_20::30::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao zavatra efatra izao dia kely amin''ny ety ambonin''ny tany, Nefa hendry sady mahay:'
mg1865::mg_20::30::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vitsika dia firenena tsy matanjaka, Nefa manangona ny haniny amin''ny fahavaratra izy;'
mg1865::mg_20::30::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny biby hyraka dia firenena tsy manan-kery, Nefa manao ny tranony ao amin''ny harambato izy;'
mg1865::mg_20::30::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny valala tsy manana mpanjaka, Nefa izy rehetra miainga manao antokony tsara;'
mg1865::mg_20::30::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny antsiantsy dia mandady amin''ny tanany*, Nefa tonga ao an-tranon''ny mpanjaka izy. [*Na: azonao samborin-tanana]'
mg1865::mg_20::30::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy zavatra telo izay tsara famindra, Eny, efatra aza no tsara fandeha;'
mg1865::mg_20::30::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny liona, izay mahery indrindra amin''ny biby Ka tsy mihemotra na amin''inona na amin''inona,'
mg1865::mg_20::30::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny soavaly voaomana hiady* sy ny osilahy Ary ny mpanjaka tsy azo toherina**. [*Hebreo: voafehy kibo] [**Na: otronin''ny vahoakany]'
mg1865::mg_20::30::32:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha adala ka nanandra-tena ianao, Na efa nisaina hanao ratsy, Dia tampeno ny tananao ny vavanao.'
mg1865::mg_20::30::33:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 30
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanontsankontsanana ny ronono no miteraka rononomandry, Ny fanolanana ny orona no miteraka rà; Ary ny fanetsiketsehana ny fahatezerana no miteraka ady.'
mg1865::mg_20::31::1:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny tokony ho toetry ny mpanjaka'
  verse_text: 'Ny tenin*''i Lemoela mpanjaka, dia ny teny mavesa-danja izay** nananaran-dreniny azy. [*Na: Ny teny ho an''] [**Na: Lemoela, mpanjakan''i Masa, dia ilay]'
mg1865::mg_20::31::2:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana, anaka? Ary ahoana, ry zanako naterako? Ary ahoana, ry zanaky ny voadiko?'
mg1865::mg_20::31::3:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza omena ny vehivavy ny herinao, Na ny fombam-piainanao* ho an''izay** manimba mpanjaka. [*Hebreo: lalanao] [**Na: izay zavatra]'
mg1865::mg_20::31::4:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mety amin''ny mpanjaka, ry Lemoela, Eny; tsy mety amin''ny mpanjaka ny misotro divay, Na amin''ny mpanapaka ny ho fatra-paniry toaka;'
mg1865::mg_20::31::5:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao, raha misotro izy, dia manadino ny lalàna Ka mamily ny fitsarana ny zanaky ny fahoriana.'
mg1865::mg_20::31::6:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo toaka izay efa ho faty, Eny, divay ho an''izay malahelo azon''ny fangidiam-panahy;'
mg1865::mg_20::31::7:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisotro izy mba hanadinoany ny alahelony, Ary tsy hahatsiarovany ny fahoriany intsony.'
mg1865::mg_20::31::8:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sokafy ny vavanao hisolo ny moana, Hahazoan''ny kamboty ny rariny;'
mg1865::mg_20::31::9:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sokafy ny vavanao, ka tsarao marina, Ary omeo rariny ny ory sy ny malahelo.'
mg1865::mg_20::31::10:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Fankalazana ny vehivavy izay sady tsara no mazoto'
  verse_text: 'Iza no mahita vehivavy tsara*? Fa ny tombany dia mihoatra lavitra noho ny voahangy**. [*Na: mahay] [**Na: perla]'
mg1865::mg_20::31::11:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matoky azy ny fon''ny lahy, Ary tsy mitsahatra ny fanambinana azy.'
mg1865::mg_20::31::12:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Soa no ataon-dravehivavy aminy, fa tsy ratsy, Amin''ny andro rehetra iainany.'
mg1865::mg_20::31::13:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mizaha volon''ondry sy rongony izy Ary mazoto miasa amin''ny tanany.'
mg1865::mg_20::31::14:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny sambon''ny mpandranto izy, Ka avy any amin''ny lavitra no itondrany ny haniny.'
mg1865::mg_20::31::15:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifoha izy, raha mbola alina, Ka manome hanina ho an''ny ankohonany Sy anjara ho an''ny ankizivaviny.'
mg1865::mg_20::31::16:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihevitra saha izy ka mahazo azy; Ny vokatry ny tanany no anaovany tanim-boaloboka.'
mg1865::mg_20::31::17:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misikina hery izy, Ary hatanjahiny ny sandriny.'
mg1865::mg_20::31::18:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitany fa tsara ny tombom-barony, Ary tsy maty jiro mandritra ny alina izy.'
mg1865::mg_20::31::19:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandray ny fihazonam-bohavoha izy, Ary ny tanany mihazona ny ampela.'
mg1865::mg_20::31::20:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manatsotra ny tanany amin''ny ory izy, Eny, mamelatra ny tanany amin''ny mahantra.'
mg1865::mg_20::31::21:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manahy ny oram-panala ho amin''ny ankohonany izy, Fa ny ankohonany rehetra samy voatafy volon''ondry mena avokoa.'
mg1865::mg_20::31::22:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao firakotra ho azy izy; Ny fitafiany dia rongony fotsy madinika sy lamba volomparasy.'
mg1865::mg_20::31::23:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lahy dia hajaina eo am-bavahady, Raha miara-mipetraka eo amin''ny loholona.'
mg1865::mg_20::31::24:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao akanjo hariry madinika ravehivavy ka mivarotra izany, Ary fehin-kibo no amidiny amin''ny mpandranto*. [*Hebreo: Kananita]'
mg1865::mg_20::31::25:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hery sy voninahitra no fitafiany, Ary ny andro ho avy dia ihomehezany.'
mg1865::mg_20::31::26:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manokatra ny vavany amin''ny fahendrena izy; Ary ny lalàn''ny famindram-po no eo amin''ny lelany.'
mg1865::mg_20::31::27:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrina tsara ny ataon''ny ankohonany izy Ary tsy homana ny mofon''ny fahalainana.'
mg1865::mg_20::31::28:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanany mitsangana ka midera azy hoe sambatra; Ny lahy koa mitsangana ka midera azy hoe:'
mg1865::mg_20::31::29:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no zazavavy nanao soa*, Fa ianao manoatra noho izy rehetra. [*Na: nahavory harena]'
mg1865::mg_20::31::30:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fitaka ny fahatsaram-bika, ary zava-poana ny fahatsaran-tarehy; Fa ny vehivavy matahotra an''i Jehovah ihany no hoderaina.'
mg1865::mg_20::31::31:
  verse_version: mg1865
  verse_book: mg_20
  verse_chapter: 31
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo azy ny avy amin''ny vokatry ny tanany; Ary aoka ny asany hidera azy eo am-bavahady.'
