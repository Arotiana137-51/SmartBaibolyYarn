mg1865::mg_42::1::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fitarihan-teny
  verse_text: 'Satria maro no efa nanoratra nandahatra tantara ny amin''ny zavatra izay efa tanteraka* tamintsika tokoa [*Na: inoana tokoa amintsika]'
mg1865::mg_42::1::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka izay efa noraisintsika natolotry ny vavolombelona izay sady nahita maso no efa mpitory* ny teny hatramin''ny voalohany: [*Grika: mpanompo]'
mg1865::mg_42::1::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia sitrako koa, rehefa nofotorako tsara ny zavatra rehetra hatramin''ny niandohany, ny hanoratra izany aminao araka ny filaharany, ry Teofilo tsara indrindra*, [*Grika: mahery indrindra; teny fanajana ny lehibe izany]'
mg1865::mg_42::1::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahafantaranao tsara fa mafy orina ny teny izay nampianarina anao.'
mg1865::mg_42::1::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andron''i Heroda, mpanjakan''i Jodia, nisy mpisorona anankiray atao hoe Zakaria, isan''ny antokon''i Abia; ary ny vadiny dia avy tamin''ny taranak''i Arona, Elizabeta no anarany.'
mg1865::mg_42::1::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy marina teo anatrehan''Andriamanitra izy mivady sady nitondra tena tsy nanan-tsiny araka ny didy sy ny fitsipika rehetra nomen''ny Tompo.'
mg1865::mg_42::1::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nanan-janaka izy, fa momba Elizabeta; ary samy efa antitra izy mivady.'
mg1865::mg_42::1::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nanao raharaham-pisoronana teo anatrehan''Andriamanitra Zakaria araka ny fifandimbiasan''ny antokony,'
mg1865::mg_42::1::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny fanao amin''ny fisoronana, dia anjarany araka ny filokana ny hiditra ao amin''ny tempolin''ny Tompo ka handoro ditin-kazo manitra.'
mg1865::mg_42::1::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra nitoetra teo ivelany nivavaka tamin''ny ora fandoroana ny ditin-kazo manitra.'
mg1865::mg_42::1::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjelin''ny Tompo niseho taminy teo an-kavanan''ny alitara fandoroana ny ditin-kazo manitra.'
mg1865::mg_42::1::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita azy Zakaria, dia taitra loatra izy ka raiki-tahotra.'
mg1865::mg_42::1::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ilay anjely taminy: Aza matahotra, ry Zakaria; fa efa nohenoina ny fangatahanao, ka Elizabeta vadinao dia hiteraka zazalahy aminao, ary Jaona no hataonao anarany.'
mg1865::mg_42::1::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho faly sy ho ravoravo ianao; ary maro no hifaly amin''ny hahaterahany.'
mg1865::mg_42::1::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: '2022-12-30T06:22:02+0000'
  verse_title: null
  verse_text: 'Fa ho lehibe eo anatrehan''ny Tompo izy ary tsy hisotro divay na toaka sady hofenoina ny Fanahy Masina hatrany an-kibon-dreniny aza.'
mg1865::mg_42::1::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro amin''ny Zanak''isiraely no hampodiny amin''i Jehovah Andriamaniny.'
mg1865::mg_42::1::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy handeha eo alohany amin''ny fanahy sy ny herin''i Elia mba hampody ny fon''ny ray ho amin''ny zanaka, ary ny tsy manoa ho amin''ny fahendren''ny marina, hamboatra firenena voaomana ho an''ny Tompo (Malakia 3:23-24).'
mg1865::mg_42::1::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Zakaria tamin''ilay anjely: Inona no hahafantarako izany? fa izaho efa antitra, ary efa antitra koa ny vadiko.'
mg1865::mg_42::1::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay anjely namaly ka nanao taminy hoe: Izaho no Gabriela, izay mitsangana eo anatrehan''Andriamanitra; ary nirahina hiteny aminao aho ka hilaza aminao izany teny mahafaly izany.'
mg1865::mg_42::1::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa, indro, ho moana ianao ka tsy hahay miteny ambara-pahatongan''ny andro hisehoan''izany zavatra izany, ho valin''ny tsy ninoanao ny teniko, izay ho tanteraka amin''ny fotoany.'
mg1865::mg_42::1::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona dia niandry an''i Zakaria ka gaga noho izy naharitra ela tao amin''ny tempoly.'
mg1865::mg_42::1::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo rehefa nivoaka izy, dia tsy nahay niteny taminy; ary dia fantatry ny olona fa efa nahita fahitana tao amin''ny tempoly izy; ary izy nanao baikon''ny moana taminy, ary dia mbola moana ihany.'
mg1865::mg_42::1::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny andro nanaovany fanompoam-pivavahana, dia lasa nody tany an-tranony izy.'
mg1865::mg_42::1::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary taorian''izany andro izany dia nitoe-jaza Elizabeta vadiny, dia niery dimy volana izy ka nanao hoe:'
mg1865::mg_42::1::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no nataon''ny Tompo tamiko tamin''ny andro izay nitsinjovany hahafa-tondromaso ahy amin''ny olona.'
mg1865::mg_42::1::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Gabriela tamin''i Maria fa hiteraka an''i Jesoa izy.'
  verse_text: 'Ary tamin''ny fahenim-bolana dia nirahin''Andriamanitra ny anjely Gabriela ho any an-tanàna anankiray any Galilia atao hoe Nazareta,'
mg1865::mg_42::1::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho any amin''ny virijina anankiray, izay voafofo ho vadin''ny lehilahy atao hoe Josefa, avy tamin''ny taranak''i Davida; ary ny anaran''ny virijina dia Maria.'
mg1865::mg_42::1::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niditra tao aminy ilay anjely, dia nanao hoe: Arahaba, ry ilay nohasoavina, ny Tompo momba anao*. [*Ampio hoe: voatahy samy vehivavy ianao]'
mg1865::mg_42::1::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary taitra loatra izy noho ny teniny ka nieritreritra izay tokony ho hevitr''izany fiarahabana izany.'
mg1865::mg_42::1::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay anjely taminy: Aza matahotra, ry Maria, fa efa nahita fitia tamin''Andriamanitra ianao.'
mg1865::mg_42::1::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, hitoe-jaza ianao ka hiteraka zazalahy, ary ny anarany dia hataonao hoe Jesoa.'
mg1865::mg_42::1::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy ho lehibe ka hatao hoe Zanaky ny Avo Indrindra; ary Jehovah Andriamanitra hanome Azy ny seza fiandrianan''i Davida rainy;'
mg1865::mg_42::1::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hanjaka amin''ny taranak''i Jakoba mandrakizay Izy; ary ny fanjakany tsy hanam-pahataperana.'
mg1865::mg_42::1::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Maria tamin''ilay anjely: Hanao ahoana re no hahatanteraka izany, fa tsy mahalala lahy aho?'
mg1865::mg_42::1::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay anjely namaly ka nanao taminy hoe: Ny Fanahy Masina ho tonga ao aminao, ary hisy herin''ny Avo Indrindra hanaloka anao; koa ny Masina Izay hateraka* dia hatao hoe Zanak''Andriamanitra. [*Na: haterakao]'
mg1865::mg_42::1::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Elizabeta havanao dia efa mitoe-jaza koa, na dia efa antitra aza; ary efa mandray enina izy izao, izay natao hoe momba.'
mg1865::mg_42::1::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hisy tsy ho tanteraka ny teny rehetra ataon''Andriamanitra.'
mg1865::mg_42::1::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Maria: Inty ny ankizivavin''ny Tompo; aoka anie ho tonga amiko araka ny teninao. Dia nandao azy ilay anjely.'
mg1865::mg_42::1::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: 'Ny namangian''i Maria an''i Elizabeta.'
  verse_text: 'Ary Maria niainga tamin''izany andro izany ka nandeha faingana ho any amin''ny tany havoana, ho ao an-tanàna anankiray any Joda;'
mg1865::mg_42::1::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niditra tao an-tranon''i Zakaria izy ka niarahaba an''i Elizabeta.'
mg1865::mg_42::1::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ren''i Elizabeta ny fiarahaban''i Maria, dia nibitaka* ny zaza tao an-kibony; ary nofenoina ny Fanahy Masina Elizabeta, [*Na: niantsambotra]'
mg1865::mg_42::1::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niantso tamin''ny feo mahery hoe izy: Voatahy samy vehivavy ianao, ary voatahy ny hateraky ny kibonao.'
mg1865::mg_42::1::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy aiza no ahatongavan''izao amiko, no mba vangian''ny renin''ny Tompoko aho?'
mg1865::mg_42::1::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, raha vao ren''ny sofiko ny feon''ny fiarahabanao, dia nibitaka noho ny hafaliana ny zaza ao an-kiboko.'
mg1865::mg_42::1::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sambatra ianao izay nino; fa hefaina izay zavatra nampilazain''ny Tompo taminao.'
mg1865::mg_42::1::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Maria: Ny foko mankalaza ny Tompo,'
mg1865::mg_42::1::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanahiko efa ravoravo tamin''Andriamanitra, Mpamonjy ahy;'
mg1865::mg_42::1::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nijery ny fahambani-toetry ny ankizivaviny Izy. Fa, indro, hatramin''ny ankehitriny dia hataon''ny taranaka rehetra ho sambatra aho.'
mg1865::mg_42::1::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Mahery efa nanao zavatra lehibe tamiko; Ary masina ny anarany.'
mg1865::mg_42::1::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny famindram-pony dia amin''izay matahotra Azy hatramin''ny taranaka fara mandimby.'
mg1865::mg_42::1::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao asa lehibe tamin''ny sandriny Izy; Nampihahaka ny mpiavonavona tamin''ny fiheveran''ny fony Izy.'
mg1865::mg_42::1::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampiala ny lehibe tamin''ny seza fiandrianany Izy, Ary nanandratra ny ambany kosa.'
mg1865::mg_42::1::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny noana novokisany soa; Fa ny manan-karena kosa nampialainy maina.'
mg1865::mg_42::1::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niahy an''isiraely mpanompony Izy, fa nahatsiaro ny famindram-pony'
mg1865::mg_42::1::55:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: '(Araka ny voalazany tamin''ny razantsika), tamin''i Abrahama sy ny taranany mandrakizay.'
mg1865::mg_42::1::56:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Maria nitoetra teo amin''i Elizabeta tokony ho telo volana vao nody tany an-tranony.'
mg1865::mg_42::1::57:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 57
  verse_date_revised: null
  verse_title: 'Ny nahaterahan''i Jaona Mpanao-batisa'
  verse_text: 'Ary tonga ny andro hahaveloman''i Elizabeta, dia niteraka zazalahy izy.'
mg1865::mg_42::1::58:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny niara-monina taminy sy ny havany nandre fa efa nohalehibiazin''ny Tompo ny famindram-pony taminy; dia niara-nifaly taminy ireo.'
mg1865::mg_42::1::59:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahavalo dia tonga hamora ny zaza izy, ka efa saiky hataony hoe Zakaria araka ny anaran-drainy ny anarany.'
mg1865::mg_42::1::60:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny reniny namaly ka nanao hoe: Tsy izany, fa hatao hoe Jaona izy.'
mg1865::mg_42::1::61:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy ireo taminy: Tsy misy na dia iray akory aza amin''ny havanao izay manana izany anarana izany.'
mg1865::mg_42::1::62:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao baikon''ny moana tamin''ny rainy izy ireo, izay tokony ho tiany hatao anarany.'
mg1865::mg_42::1::63:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangataka fàfana izy ka nanoratra hoe: Jaona no anarany. Dia gaga avokoa izy rehetra.'
mg1865::mg_42::1::64:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nisokatra niaraka tamin''izay ny vavany, ka afaka niteny ny lelany; dia niteny izy ka nidera an''Andriamanitra.'
mg1865::mg_42::1::65:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia raiki-tahotra izay rehetra niara-monina taminy; ary niely teny amin''ny tany havoan''i Jodia rehetra ny lazan''izany rehetra izany.'
mg1865::mg_42::1::66:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra nandre dia nandatsaka izany tam-pony ka nanao hoe: Ho zaza hanao ahoana re io? Fa ny tanan''ny Tompo nomba azy.'
mg1865::mg_42::1::67:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia feno ny Fanahy Masina Zakaria rainy ka naminany hoe:'
mg1865::mg_42::1::68:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie ny Tompo Andriamanitry ny Isiraely; Fa nitsinjo ny olony Izy ka nanao fanavotana ho azy,'
mg1865::mg_42::1::69:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanangana tandro-pamonjena ho antsika Amin''ny taranak''i Davida mpanompony Izy'
mg1865::mg_42::1::70:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: '(Araka izay nampilazainy ny mpaminaniny masina hatramin''ny fahagola),'
mg1865::mg_42::1::71:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia famonjena antsika amin''ny fahavalontsika, sy amin''ny tanan''izay rehetra mankahala antsika;'
mg1865::mg_42::1::72:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 72
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manefa famindram-po amin''ny razantsika Izy Sady mahatsiaro ny fanekeny masina,'
mg1865::mg_42::1::73:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 73
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny fianianana izay nianianany tamin''i Abrahama razantsika,'
mg1865::mg_42::1::74:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 74
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanao izay hahazoantsika hanompo Azy tsy amin-tahotra, Satria afaka amin''ny fahavalontsika isika,'
mg1865::mg_42::1::75:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 75
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny fahamasinana sy ny fahamarinana eo anatrehany amin''ny andro rehetra hiainantsika.'
mg1865::mg_42::1::76:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 76
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry zaza, dia hatao hoe mpaminanin''ny Avo Indrindra; Fa hialoha eo anatrehan''ny Tompo ianao hamboatra ny lalany.'
mg1865::mg_42::1::77:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 77
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanome ny olony ny fahalalam-pamonjena amin''ny famelana ny helony,'
mg1865::mg_42::1::78:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 78
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny halehiben''ny famindram-pon''Andriamanitsika, izay hiposahan*''ny mazava avy any amin''ny avo ho antsika. [*Na: niposahan'']'
mg1865::mg_42::1::79:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 79
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamirapiratra amin''izay mipetraka ao amin''ny maizina sy ao amin''ny aloky ny fahafatesana, Hanitsy ny diantsika ho amin''ny lalam-piadanana.'
mg1865::mg_42::1::80:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 1
  verse_number: 80
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zazakely nitombo ka nihahery tam-panahy; ary nitoetra tany an''efitra izy ambara-pahatongan''ny andro nisehoany tamin''ny Isiraely.'
mg1865::mg_42::2::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahaterahan''i Jesoa tao Betlehema.'
  verse_text: 'Ary tamin''izany andro izany dia nisy didy navoak''i Aogosto Kaisara hampanoratra ny anaran''ny vahoaka rehetra amin''ny fanjakany.'
mg1865::mg_42::2::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: '(Izany no fanoratana voalohany* natao fony Kyrenio nanapaka tany Syria.) [*Na: Ny tena fanoratana voalohany anefa dia]'
mg1865::mg_42::2::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia samy nankany amin''ny tanànany avy izy rehetra mba hosoratana.'
mg1865::mg_42::2::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Josefa koa niakatra avy tany Galilia, dia avy tao an-tanàna Nazareta, hankany Jodia, ho ao an-tanànan''i Davida, izay atao hoe Betlehema (satria avy tamin''ny taranak''i Davida sy ny mpianakaviny),'
mg1865::mg_42::2::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hosoratana izy sy Maria fofom-badiny, izay efa bevohoka.'
mg1865::mg_42::2::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitoetra teo Izy, dia tonga ny andro hahavelomany.'
mg1865::mg_42::2::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteraka ny Lahimatoany izy, dia nohodidininy lamban-jaza ka nampandriny teo amin''ny fihinanam-bilona; fa tsy nisy nitoerany tao an-tranom-bahiny.'
mg1865::mg_42::2::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: 'Ny nilazan''ny anjely tamin''ny mpiandry ondry fa teraka Jesoa.'
  verse_text: 'Ary nisy mpiandry ondry tamin''izany tany izany nitoetra tany an-tsaha nitandrina ny ondriny tamin''ny alina.'
mg1865::mg_42::2::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjelin''ny Tompo nitsangana teo anilany, ary ny voninahitry ny Tompo nanelatrelatra manodidina azy, ka raiki-tahotra indrindra izy.'
mg1865::mg_42::2::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny anjely taminy: Aza matahotra; fa, indro, milaza teny soa mahafaly aminareo aho, dia fifaliana lehibe izay ho an''ny olona rehetra;'
mg1865::mg_42::2::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Mpamonjy no teraka ho anareo anio ao an-tanànan''i Davida, dia Kristy Tompo.'
mg1865::mg_42::2::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no ho famantarana ho anareo: ianareo hahita Zazakely voahodidina lamban-jaza sady mandry ao am-pihinanam-bilona;'
mg1865::mg_42::2::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely maro be avy any an-danitra niseho tampoka niaraka tamin''ilay anjely teo ka nidera an''Andriamanitra nanao hoe:'
mg1865::mg_42::2::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voninahitra any amin''ny avo Indrindra ho an''Andriamanitra! Ary fiadanana ho ety ambonin''ny tany amin''ny olona ankasitrahany*. [*Na: Fankasitrahana ho amin''ny olona]'
mg1865::mg_42::2::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany rehefa niala teo aminy ireo anjely ireo ka nankany an-danitra, dia niresaka ireo lehilahy mpiandry ondry ka nanao hoe: Andeha isika hankany Betlehema ka hizaha izany zavatra vao tonga izany, izay nampahafantarin''ny Tompo antsika.'
mg1865::mg_42::2::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha faingana izy ka nahita an''i Maria sy Josefa, ary ny Zazakely nandry teo am-pihinanam-bilona.'
mg1865::mg_42::2::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa nahita izy, dia nampiely izay teny nolazaina taminy ny amin''izany Zaza izany.'
mg1865::mg_42::2::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra nandre dia gaga tamin''izay zavatra nolazain''ny mpiandry ondry taminy.'
mg1865::mg_42::2::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Maria kosa nitadidy izany teny rehetra izany ka nieritreritra azy tao am-pony.'
mg1865::mg_42::2::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: '2022-03-26T07:19:00+0000'
  verse_title: null
  verse_text: 'Ary ny mpiandry ondry niverina nankalaza sy nidera an''Andriamanitra noho ny zavatra rehetra izay reny sy hitany, araka izay nolazaina taminy.'
mg1865::mg_42::2::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny namorana an''i Jesoa, sy ny nitondrana Azy tao amin''ny tempoly.'
  verse_text: 'Ary rehefa tapitra ny havaloana, ka hoforana ny Zaza, dia nataony hoe Jesoa ny anarany, araka ilay nataon''ny anjely, fony tsy mbola torontoronina tao an-kibo Izy.'
mg1865::mg_42::2::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny andro fidiovany, araka ny lalàn''i Mosesy, dia nitondra Azy niakatra tany Jerosalema izy mba hatolotra ho an''ny Tompo'
mg1865::mg_42::2::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra ao amin''ny lalàn''ny Tompo hoe: Ny lahy voalohan-teraka rehetra hatao hoe masina ho an''i Jehovah. (Eksodosy 13:2)'
mg1865::mg_42::2::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hanatitra fanatitra araka izay voalaza ao amin''ny lalàn''ny Tompo hoe: domohina roa, na zana-boromailala roa (Levitikosy 12:8).'
mg1865::mg_42::2::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy lehilahy atao hoe Simeona tao Jerosalema; ary marina sady mpivavaka tsara izany lehilahy izany ka niandry ny fampiononana ny Isiraely; ary ny Fanahy Masina dia tao aminy.'
mg1865::mg_42::2::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nambaran''ny Fanahy Masina taminy fa tsy hahita fahafatesana izy mandra-pahitany ny Kristin''ny Tompo.'
mg1865::mg_42::2::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentin''ny Fanahy Masina niditra teo an-kianjan''ny tempoly izy; ary rehefa nampidirin''ny ray aman-dreniny Jesoa zaza mba hanaovany araka ny fomban''ny lalàna ny amin''ny zaza,'
mg1865::mg_42::2::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nitrotro Azy izy ka nidera an''Andriamanitra nanao hoe:'
mg1865::mg_42::2::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, ankehitriny ny mpanomponao dia alefanao amin''ny fiadanana Araka ny teninao;'
mg1865::mg_42::2::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny masoko efa nahita ny famonjenao,'
mg1865::mg_42::2::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namboarinao teo anatrehan''ny firenena rehetra,'
mg1865::mg_42::2::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia fahazavana hahazava ny firenena sady voninahitry ny Isiraely olonao.'
mg1865::mg_42::2::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia gaga ny ray aman-dreniny noho ny teny nilazana Azy.'
mg1865::mg_42::2::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simeona nitso-drano azy ireo ka nanao tamin''i Maria, renin''ny Zaza, hoe: Indro, Ity Zaza ity no voatendry ho fandavoana sy ho fananganana ny maro ao amin''ny Isiraely ary ho famantarana holavina'
mg1865::mg_42::2::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fanahinao aza dia hotsatohana sabatra — mba haseho ny hevitry ny fo maro.'
mg1865::mg_42::2::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpaminanivavy anankiray, dia Ana, zanakavavin''i Fanoela, avy tamin''ny firenen''i Asera; efa anti-panahy tokoa izy ary efa nitoetra tamin''ny vadiny fito taona taorian''ny naha-virijina azy,'
mg1865::mg_42::2::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary efa mpitondratena tokony ho efatra amby valo-polo taona; ary tsy niala teo an-kianjan''ny tempoly izy, fa nanompo tamin''ny fifadian-kanina sy ny fivavahana andro aman''alina.'
mg1865::mg_42::2::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niditra tamin''izany ora izany izy, dia nisaotra an''Andriamanitra ka nilaza Azy tamin''izay rehetra niandry ny fanavotana tao Jerosalema.'
mg1865::mg_42::2::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 39
  verse_date_revised: null
  verse_title: 'Ny niverenan''i Josefa sy Maria ary Jesoa nankany Nazareta, sy ny nitondrana an''i Jesoa niakatra tany Jerosalema, rehefa roa ambin''ny folo taona Izy.'
  verse_text: 'Ary rehefa vitany ny zavatra rehetra araka ny lalàn''ny Tompo, dia niverina tany Galilia izy, dia tao Nazareta tanànany.'
mg1865::mg_42::2::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Zaza dia nitombo ka nihahery sady feno fahendrena; ary ny fahasoavan''Andriamanitra no tao aminy.'
mg1865::mg_42::2::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ray aman-dreniny nankany Jerosalema isan-taona, raha avy ny andro firavoravoana amin''ny Paska.'
mg1865::mg_42::2::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa roa ambin''ny folo taona Jesoa, dia niakatra izy ireo, araka ny fanao amin''ny andro firavoravoana.'
mg1865::mg_42::2::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra izany andro izany, ka nody izy, Jesoa zaza dia mbola nitoetra tany Jerosalema ihany, nefa tsy fantatry ny ray aman-dreniny izany;'
mg1865::mg_42::2::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary satria nataony fa niaraka tamin''ny niara-dia taminy Izy, dia nandeha lalana indray andro izy vao nitady Azy tamin''ny havany sy ny olom-pantany.'
mg1865::mg_42::2::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tsy nahita Azy izy, dia niverina ho any Jerosalema nitady Azy.'
mg1865::mg_42::2::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka hateloana, dia hitany teo an-kianjan''ny tempoly Izy nipetraka teo afovoan''ny mpampianatra ka nihaino sady nanontany azy.'
mg1865::mg_42::2::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary talanjona izay rehetra nandre Azy noho ny fahalalany sy ny famaliany.'
mg1865::mg_42::2::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita Azy izy, dia talanjona, ka hoy ny reniny taminy: Anaka, nahoana no nanao toy izay taminay Ianao? He! izato alahelon-drainao sy izaho nitady Anao!'
mg1865::mg_42::2::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Nahoana no nitady Ahy ianareo? tsy fantatrareo va fa tsy maintsy ho eto an-tranon*''ny Raiko Aho? [*Na: eto amin''ny raharahan'']'
mg1865::mg_42::2::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy azon''ireo ny teny izay nolazainy taminy.'
mg1865::mg_42::2::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niara-nidina taminy nankany Nazareta Izy ka nanoa azy. Ary ny reniny nitahiry izany teny rehetra izany tao am-pony.'
mg1865::mg_42::2::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 2
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nitombo saina sy tena* sady nandroso fitia tamin''Andriamanitra sy ny olona. [*Na: taona]'
mg1865::mg_42::3::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nataon''i Jaona Mpanao-batisa, ary ny nampamatoran''i Heroda azy.'
  verse_text: 'Ary tamin''ny taona fahadimy ambin''ny folo nanjakan''i Tiberia Kaisara, fony Pontio Pilato no governora tany Jodia, ary Heroda no mpanapaka tany Galilia, ary Filipo rahalahiny no mpanapaka ny tany Itoria sy Trakonitisy, ary Lysania no mpanapaka tany Abilena,'
mg1865::mg_42::3::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Anasy sy Kaiafa no mpisoronabe,- dia tonga tamin''i Jaona, zanak''i Zakaria, tany an''efitra ny tenin''Andriamanitra.'
mg1865::mg_42::3::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nankany amin''ny tany rehetra any amoron''i Jordana izy nitory ny batisan''ny fibebahana ho famelan-keloka;'
mg1865::mg_42::3::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny voasoratra ao amin''ny bokin''ny tenin''Isaia mpaminany hoe: Injany! misy feon''ny miantso mafy any an''efitra hoe: Amboary ny lalan''i Jehovah, Ataovy mahitsy ny lalan-kalehany.'
mg1865::mg_42::3::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohasaha rehetra hototofana, Ary ny tendrombohitra sy ny havoana rehetra haetry, Ary ny meloka hahitsy, Ary ny lalana mikitoantoana hohamarinina;'
mg1865::mg_42::3::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nofo rehetra hahita ny famonjen''Andriamanitra (Isaia 40:3-5).'
mg1865::mg_42::3::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny vahoaka izay nankeo aminy mba hataony batisa: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy?'
mg1865::mg_42::3::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mamoaza voa miendrika ny fibebahana; ary aza manao anakampo hoe: Manana an''i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an''i Abrahama avy amin''ireto vato ireto.'
mg1865::mg_42::3::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: '2022-07-12T08:24:08+0000'
  verse_title: null
  verse_text: 'Ary, indro, efa mipetraka ao amin''ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.'
mg1865::mg_42::3::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka nanontany an''i Jaona hoe: inona ary no hataonay?'
mg1865::mg_42::3::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namaly izy ka nanao taminy hoe: Izay manana akanjo roa dia aoka hanome ho an''ny tsy manana; ary izay manan-kanina, dia aoka hanao toy izany koa izy.'
mg1865::mg_42::3::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy koa ny mpamory hetra sasany mba hataony batisa ka nanao taminy hoe: Mpampianatra o, inona no hataonay?'
mg1865::mg_42::3::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Aza mampandoa mihoatra noho izay notendrena halainareo.'
mg1865::mg_42::3::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy miaramila koa nanontany azy ka nanao hoe: Ary inona kosa no mba hataonay? Dia hoy izy taminy: Aza mitohatoha foana amin''olona, ary aza miampanga lainga, ary mianina amin''ny karamanareo.'
mg1865::mg_42::3::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mbola niandry ny olona, ka samy nisaina an''i Jaona tam-pony, na izy no Kristy, na tsia,'
mg1865::mg_42::3::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia namaly Jaona ka nanao tamin''izy rehetra hoe: Izaho manao batisa anareo amin''ny rano, fa avy Izay mahery noho izaho, ka tsy miendrika hamaha ny fehin-kapany aza aho; Izy no hanao batisa anareo amin''ny Fanahy Masina sy ny afo;'
mg1865::mg_42::3::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny an-tanany ny fikororohany hanadiovany tsara ny am-pamoloany ka hanangonany ny vary ho any amin''ny sompiny; fa ny akofa sy ny mololo hodorany amin''ny afo tsy azo vonoina.'
mg1865::mg_42::3::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fananarana maro hafa koa no notoriny tamin''ny olona.'
mg1865::mg_42::3::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Heroda mpanapaka, nony nanarin''i Jaona noho ny amin''i Herodiasy, vadin-drahalahiny, sy noho ny ratsy rehetra izay nataony,'
mg1865::mg_42::3::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanidy an''i Jaona tao an-tranomaizina ho fanampin''izany rehetra izany koa.'
mg1865::mg_42::3::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nanaovan''i Jaona batisa an''i Jesoa.'
  verse_text: 'Ary rehefa natao batisa ny vahoaka rehetra, ary Jesoa koa efa natao batisa sy nivavaka, dia nisokatra ny lanitra;'
mg1865::mg_42::3::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny Fanahy Masina nidina teo amboniny, ka ny endriny dia tahaka ny voromailala; ary nisy feo avy tany an-danitra nanao hoe: Ianao no Zanako malalako; Ianao no sitrako.'
mg1865::mg_42::3::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny filazana ny razan''i Jesoa Kristy.'
  verse_text: 'Ary tokony ho efa telo-polo taona Jesoa, raha vao nanomboka ny raharahany, ka natao ho zanak''i Josefa, izay zanak''i Hely,'
mg1865::mg_42::3::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Matata, zanak''i Levy, zanak''i Melky, zanak''i Janay, zanak''i Josefa,'
mg1865::mg_42::3::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Matitia, zanak''i Amosa, zanak''i Nahoma, zanak''i Esly, zanak''i Nagay,'
mg1865::mg_42::3::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Mata, zanak''i Matatia, zanak''i Semey, zanak''i Joseka, zanak''i Joda,'
mg1865::mg_42::3::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Joanana, zanak''i Resa, zanak''i Zerobabela, zanak''i Sealtiela*, zanak''i Nery, [*Grika: Salatiela]'
mg1865::mg_42::3::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Melky, zanak''i Ady, zanak''i Kosama, zanak''i Elmadama, zanak''i Era,'
mg1865::mg_42::3::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Jesoa, zanak''i Eliezera, zanak''i Joreima, zanak''i Matata, zanak''i Levy,'
mg1865::mg_42::3::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Simeona, zanak''i Joda, zanak''i Josefa, zanak''i Jonama, zanak''i Eliakima,'
mg1865::mg_42::3::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Melea, zanak''i Mena, zanak''i Matata, zanak''i Natana, zanak''i Davida,'
mg1865::mg_42::3::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Jese, zanak''i Obeda, zanak''i Boaza, zanak''i Salmona, zanak''i Nahasona,'
mg1865::mg_42::3::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Aminadaba, zanak''i Arny*, zanak''i Hezrona, zanak''i Fareza, zanak''i Joda, [*Na: (Arama)]'
mg1865::mg_42::3::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Jakoba, zanak''isaka, zanak''i Abrahama, zanak''i Tera, zanak''i Nahora,'
mg1865::mg_42::3::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Seroga, zanak''i Reo, zanak''i Palega, zanak''i Ebera, zanak''i Sela,'
mg1865::mg_42::3::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Kenana, zanak''i Arpaksada, zanak''i Sema, zanak''i Noa, zanak''i Lameka,'
mg1865::mg_42::3::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Metosela, zanak''i Enoka, zanak''i Jareda, zanak''i Mahalalila, zanak''i Kenana,'
mg1865::mg_42::3::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 3
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'zanak''i Enosa, zanak''i Seta, zanak''i Adama, zanak''Andriamanitra.'
mg1865::mg_42::4::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nakan''ny devoly fanahy an''i Jesoa.'
  verse_text: 'Ary Jesoa feno ny Fanahy Masina dia niverina avy tany Jordana, ary nentin''ny Fanahy tany an''efitra efa-polo andro Izy'
mg1865::mg_42::4::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nalain''ny devoly fanahy. Ary tsy nihinan-kanina akory Izy tamin''izany andro izany, ka rehefa tapitra izany, dia noana Izy.'
mg1865::mg_42::4::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny devoly taminy: raha Zanak''Andriamanitra Ianao, teneno io vato io mba ho tonga mofo.'
mg1865::mg_42::4::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly azy ka nanao hoe: Voasoratra hoe: Tsy mofo ihany no hiveloman''ny olona (Deoteronomia 8:3).'
mg1865::mg_42::4::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny devoly nitondra Azy niakatra, dia naneho Azy indray mipi-maso ny fanjakana rehetra amin''izao tontolo izao.'
mg1865::mg_42::4::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny devoly taminy: Homeko Anao izao fanapahana rehetra izao mbamin''ny voninahiny, fa efa natolotra ahy izany, ka izay tiako no homeko azy;'
mg1865::mg_42::4::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha hiankohoka eto anatrehako Ianao, dia ho Anao avokoa izany rehetra izany.'
mg1865::mg_42::4::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly ka nanao taminy hoe: Voasoratra hoe: Jehovah Andriamanitrao no hiankohofanao, ary Izy irery ihany no hotompoinao (Deoteronomia 6:13; Deoteronomia 10:20).'
mg1865::mg_42::4::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra Azy nankany Jerosalema izy, dia nampitoetra Azy teo an-tampon''ny tempoly ka nanao taminy hoe: Raha Zanak''Andriamanitra Ianao, mivarina any ambany any;'
mg1865::mg_42::4::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa voasoratra hoe: Izy handidy ny anjeliny ny aminao mba hiaro Anao;'
mg1865::mg_42::4::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary eny an-tanany no hitondran''ireo Anao, Fandrao ho tafintohina amin''ny vato ny tongotrao (Salamo 91:11-12).'
mg1865::mg_42::4::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly ka nanao taminy hoe: Voalaza hoe: Aza maka fanahy an''i Jehovah Andriamanitrao (Deoteronomia 6:16).'
mg1865::mg_42::4::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahatapitra izay fakam-panahy rehetra ny devoly, dia nandao Azy izy aloha.'
mg1865::mg_42::4::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny niverenan''i Jesoa nankany Galilia, sy ny nitoriany teny tao Nazareta'
  verse_text: 'Ary Jesoa niverina tamin''ny herin''ny Fanahy nankany Galilia; dia niely tamin''ny tany rehetra manodidina ny lazany.'
mg1865::mg_42::4::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nampianatra teny amin''ny synagogan''ny olona ka nankalazain''izy rehetra.'
mg1865::mg_42::4::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga tao Nazareta, izay nahabe Azy Izy; ary araka ny fanaony dia niditra tao amin''ny synagoga tamin''ny andro Sabata Izy ka nitsangana hamaky teny.'
mg1865::mg_42::4::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natolotra Azy ny bokin''Isaia mpaminany; ary nony namelatra ny boky Izy, dia nahita ny teny voasoratra hoe:'
mg1865::mg_42::4::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Fanahin''i Jehovah no ato amiko, Satria nanosotra Ahy hitory teny soa mahafaly amin''ny malahelo Izy; Naniraka Ahy hitory fandefasana amin''ny mpifatotra Izy, Sy fampahiratana amin''ny jamba, Hanafaka izay nampahorina,'
mg1865::mg_42::4::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitory ny taona ankasitrahan''i Jehovah (Isaia 61:1-2).'
mg1865::mg_42::4::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahorony ny boky ka naveriny tamin''ny mpanao raharaha, dia nipetraka Izy. Ary nandinika Azy ny mason''izay rehetra teo amin''ny synagoga.'
mg1865::mg_42::4::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niteny taminy hoe: Androany no efa tanteraka eto anatrehanareo izany soratra izany.'
mg1865::mg_42::4::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy rehetra nankalaza Azy sady talanjona noho ny tenin''ny fahasoavana naloaky ny vavany, ka hoy izy: Tsy Zanak''i Josefa va Ity?'
mg1865::mg_42::4::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa Jesoa taminy: Hataonareo amiko tokoa izao ohabolana izao hoe: Mpanao fanafody, sitrano ny tenanao: izay renay fa nataonao tao Kapernaomy dia mba ataovy eto amin''ny taninao koa.'
mg1865::mg_42::4::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy: Lazaiko aminareo marina tokoa: Tsy misy mpaminany izay ankasitrahana ao amin''ny taniny.'
mg1865::mg_42::4::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo marina tokoa: Maro no mpitondratena teo amin''ny Isiraely tamin''ny andron''i Elia, raha nihantona ny andro* telo taona sy enim-bolana, ka nisy mosary mafy tamin''ny tany rehetra; [*Grika:nirindrina ny lanitra]'
mg1865::mg_42::4::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa tsy mba nirahina ho any amin''ny anankiray tamin''ireo Elia, fa ho any Zarefata any amin''ny tany Sidona ihany, dia ho any amin''izay vehivavy mpitondratena.'
mg1865::mg_42::4::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro no boka teo amin''ny Isiraely tamin''ny andron''i Elisa mpaminany, nefa tsy mba nisy nodiovina na dia iray akory aza fa Namàna Syriana ihany.'
mg1865::mg_42::4::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra loatra izay rehetra teo amin''ny synagoga, raha nandre izany,'
mg1865::mg_42::4::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nitsangana izy, dia nandroaka Azy hiala ao an-tanàna ary nitondra Azy ho any an-tampon''ny havoana niorenan''ny tanàna, mba hazerany amin''ny hantsana.'
mg1865::mg_42::4::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izy namaky teo afovoany, ka dia lasa nandeha.'
mg1865::mg_42::4::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Ny nifindran''i Jesoa nankany Kapernaomy, sy ny nahasitranany ny demoniaka anankiray.'
  verse_text: 'Ary nidina tany Kapernaomy, tanàna any Galilia, Jesoa ka nampianatra ny olona tamin''ny Sabata.'
mg1865::mg_42::4::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona ny olona tamin''ny fampianarany, satria nisy fahefana ny teniny.'
mg1865::mg_42::4::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olona tao amin''ny synagoga, izay nanana ny fanahin''ny demonia maloto, dia niantso tamin''ny feo mahery izy'
mg1865::mg_42::4::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Indrisy! moa mifaninona akory izahay sy Ianao, ry Jesoa avy any Nazareta? avy handringana anay va Ianao? Fantatro fa Ilay Masin''Andriamanitra Ianao.'
mg1865::mg_42::4::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa niteny mafy azy ka nanao hoe: Mangina ianao, ka mivoaha aminy. Ary ny demonia, nony namotraka azy teo afovoan''ny olona, dia nivoaka taminy, nefa tsy naharatra azy.'
mg1865::mg_42::4::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary talanjona avokoa izy rehetra ka niresaka hoe: Manao ahoana izao teny izao! fa amin''ny fahefana sy ny hery no andidiany ny fanahy maloto, dia mivoaka ireo.'
mg1865::mg_42::4::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niely teny amin''ny tany manodidina rehetra ny lazany.'
mg1865::mg_42::4::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny rafozambavin''i Petera sy ny olona maro koa.'
  verse_text: 'Ary nony nitsangana niala tao amin''ny synagoga Jesoa, dia niditra tao an-tranon''i Simona. Ary azon''ny tazo mafy ny rafozam-bavin''i Simona; ary izy ireo nangataka taminy hahasitrana azy.'
mg1865::mg_42::4::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana teo akaikiny Izy, ka noteneniny mafy ny tazo, dia niala tamin-dravehivavy izany; ary nitsangana niaraka tamin''izay izy ka nanompo azy ireo.'
mg1865::mg_42::4::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nilentika ny masoandro, ny olona rehetra izay nanana marary tamin''ny aretina samy hafa dia nitondra azy teo aminy; ary dia nametra-tanana tamin''izy rehetra tsirairay Izy ka nahasitrana azy.'
mg1865::mg_42::4::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy demonia nivoaka tamin''ny maro ka niantso hoe: Ianao no Zanak''Andriamanitra. Nefa norarany ireo ka tsy navelany hiteny, satria nahalala Azy ho Kristy.'
mg1865::mg_42::4::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 42
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tany an-tany foana sy ny nandehanany nitety vohitra tany Galilia.'
  verse_text: 'Ary nony maraina ny andro, dia niala Jesoa ka nankany an-tany foana; ary ny vahoaka nitady Azy, dia nankeo aminy ka te-hihazona Azy mba tsy hialany tao aminy.'
mg1865::mg_42::4::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Tsy maintsy mitory ny teny soa mahafaly ny amin''ny fanjakan''Andriamanitra any amin''ny tanàna hafa koa Aho, satria izany no nanirahana Ahy.'
mg1865::mg_42::4::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 4
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nitori-teny tao amin''ny synagoga eran''i Galilia.'
mg1865::mg_42::5::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampahazoan''i Jesoa an''i Petera hazandrano be.'
  verse_text: 'Ary raha nifanizina taminy ny vahoaka mba hihaino ny tenin''Andriamanitra, dia nijanona teo amoron''ny Farihin''i Genesareta Jesoa;'
mg1865::mg_42::5::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nahita sambokely roa nijanona teo an-tsisin''ny farihy Izy; fa ny mpanarato efa niala taminy ka nanasa ny haratony.'
mg1865::mg_42::5::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra teo amin''ny sambokely anankiray izay an''i Simona Izy, dia nangataka taminy hihataka kely amin''ny tany. Dia nipetraka teo an-tsambokely Izy ka nampianatra ny vahoaka.'
mg1865::mg_42::5::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitsahatra niteny Jesoa, dia hoy Izy tamin''i Simona: Mandrosoa ho any amin''ny lalina, dia alatsaho ny haratonareo hahazoana hazandrano.'
mg1865::mg_42::5::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Simona namaly ka nanao hoe: Tompoko, mandritra ny alina no efa nikelezanay aina, nefa tsy nahazo na inona na inona; kanefa noho ny teninao; dia halatsako ihany ny harato.'
mg1865::mg_42::5::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nataony izany, dia nahazo hazandrano be dia be izy, ka efa nisy triatra ny haratony.'
mg1865::mg_42::5::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanatsika ny namany, izay teo amin''ny sambokely hafa, mba ho avy hanampy azy. Dia avy ireny, ary nofenoiny ny sambokely roa, ka efa saiky nilentika.'
mg1865::mg_42::5::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Simona Petera izany, dia niankohoka tamin''ny tongotr''i Jesoa izy ka nanao hoe: Tompoko, mialà amiko, fa olo-meloka aho.'
mg1865::mg_42::5::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa talanjona izy sy izay rehetra teo aminy noho ny haben''ny hazan-drano izay azony.'
mg1865::mg_42::5::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa Jakoba sy Jaona, zanak''i Zebedio, izay niombon-draharaha tamin''i Simona. Dia hoy Jesoa tamin''i Simona: Aza matahotra; hatramin''izao ankehitriny izao dia olona kosa no ho azonao.'
mg1865::mg_42::5::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nampiantsona ny sambokeliny teo an-tanety izy, dia nahafoy ny zavatra rehetra ka nanaraka an''i Jesoa.'
mg1865::mg_42::5::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay boka.'
  verse_text: 'Ary raha tao an-tanàna anankiray Jesoa, indro, nisy lehilahy heniky ny habokana: ary nony nahita Azy io, dia niankohoka ka nitaraina taminy hoe: Tompoko, raha mety Ianao, dia mahay manadio ahy.'
mg1865::mg_42::5::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa naninjitra ny tanany, dia nanendry azy ka nanao hoe: Mety Aho; madiova ianao. Ary ny habokany niala taminy niaraka tamin''izay.'
mg1865::mg_42::5::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nandrara azy tsy hilaza amin''olona na dia iray akory aza; fa mandehana, hoy Izy, misehoa amin''ny mpisorona, ka manatera ny fanadiovana anao araka ny nandidian''i Mosesy, ho vavolombelona amin''ireo.'
mg1865::mg_42::5::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mainka niely bebe kokoa ny lazany, dia niangona ny vahoaka betsaka hihaino Azy sy hositranina tamin''ny aretiny.'
mg1865::mg_42::5::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niala teo Izy, dia nitoetra tany an''efitra ka nivavaka.'
mg1865::mg_42::5::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay lehilahy anankiray mararin''ny paralysisa.'
  verse_text: 'Ary tamin''ny andro anankiray, raha nampianatra Jesoa, dia nipetraka teo ny Fariseo sasany sy ny mpampiana-dalàna, izay efa niala tamin''ny tanàna rehetra any Galilia sy Jodia ary tany Jerosalema; ary ny herin''ny Tompo dia tao aminy mba hahasitranany.'
mg1865::mg_42::5::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy nitondra lehilahy tamin''ny fandriana, izay mararin''ny paralysisa, ka nitady izay hampidirany sy hametrahany azy teo anatrehany.'
mg1865::mg_42::5::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tsy nahita izay hampidirany azy izy noho ny habetsahan''ny vahoaka, dia niakatra teo an-tampon-trano ka nanesorany ny tafo tanimanga, dia nampidininy ralehilahy mbamin''ny fandriany ho eo afovoan''ny olona, dia teo anatrehan''i Jesoa.'
mg1865::mg_42::5::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''i Jesoa ny finoan''ireo, dia hoy Izy: Ralehilahy, voavela ny helokao.'
mg1865::mg_42::5::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanora-dalàna sy ny Fariseo niara-nisaina hoe: Iza moa Ity miteny ratsy* Ity? Iza no mahavela heloka, afa-tsy Andriamanitra ihany? [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_42::5::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nahafantatra ny eritreriny, dia namaly ka nanao taminy hoe: Nahoana ianareo no mieritreritra ao am-ponareo?'
mg1865::mg_42::5::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no moramora kokoa, ny manao hoe va: Voavela ny helokao, sa ny manao hoe: Mitsangàna, ka mandehana?'
mg1865::mg_42::5::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba ho fantatrareo fa ny Zanak''olona manana fahefana ety ambonin''ny tany hamela heloka — dia hoy Izy tamin''ilay mararin''ny paralysisa: Izaho milaza aminao hoe: Mitsangàna, dia betao ny fandrianao, ary modia any an-tranonao.'
mg1865::mg_42::5::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izay dia nitsangana teo anatrehan''ny olona izy ka nambeta ny fandriany, dia lasa nody sady nankalaza an''Andriamanitra.'
mg1865::mg_42::5::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary talanjona avokoa ny olona rehetra, dia nankalaza an''Andriamanitra sady raiki-tahotra indrindra ka nanao hoe: Efa nahita zavatra mahagaga isika androany.'
mg1865::mg_42::5::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny niantsoana an''i Levy (Matio), sy ny fanasana tao an-tranony, ary ny tori-teny nataon''i Jesoa ny amin''ny fifadian-kanina.'
  verse_text: 'Ary rehefa afaka izany, dia nandeha Jesoa ka nahita mpamory hetra atao hoe Levy, nipetraka teo am-pamorian-ketra*; dia hoy Izy taminy: Manaraha Ahy. [*Izahao Matio 9:9]'
mg1865::mg_42::5::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahafoy ny zavatra rehetra izy ka nitsangana, dia nanaraka Azy.'
mg1865::mg_42::5::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Levy nanao fanasana lehibe tao an-tranony ho an''i Jesoa; ary nisy mpamory hetra maro sy olon-kafa koa, izay niara-nipetraka nihinana teo aminy.'
mg1865::mg_42::5::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Fariseo sy ny mpanora-dalàna izay teo aminy dia nimonomonona tamin''ny mpianatr''i Jesoa ka nanao hoe: Nahoana ianareo no miara-mihinana sy misotro amin''ny mpamory hetra sy ny mpanota?'
mg1865::mg_42::5::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary;'
mg1865::mg_42::5::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy avy hiantso ny marina Aho, fa ny mpanota mba hibebaka.'
mg1865::mg_42::5::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy ireo taminy: Ny mpianatr''i Jaona mifady hanina matetika sy mivavaka, ary ny an''ny Fariseo koa mba tahaka izany ihany, fa ny Anao kosa mihinana sy misotro ihany.'
mg1865::mg_42::5::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Mahay mampifady ny havan''ny mpampakatra va ianareo, raha mbola ao aminy ihany ny mpampakatra?'
mg1865::mg_42::5::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy ny andro; ary rehefa voaisotra* ny mpampakatra hiala aminy, dia amin''izany andro izany vao hifady izy. [*Na: Ny andro izay hanesorana]'
mg1865::mg_42::5::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nanao fanoharana taminy koa nanao hoe: Tsy misy olona mandriatra lamba vaovao hanalany tapa-damba hatampina ny lamba tonta; fa raha izany, dia mahatriatra ny vaovao izy, ary ilay tapa-damba nalaina tamin''ny vaovao dia tsy hifanaraka amin''ny tonta.'
mg1865::mg_42::5::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy olona manisy divay vaovao no anaty siny hoditra tonta; fa raha izany, ny divay vaovao mahatriatra ny siny hoditra, ka ho raraka ny divay, sady ho simba foana ny siny hoditra;'
mg1865::mg_42::5::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny divay vaovao dia tsy maintsy hatao ao anaty siny hoditra vaovao.'
mg1865::mg_42::5::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 5
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy olona, rehefa nisotro ny divay ela, no maniry ny vaovao; fa hoy izy: Ny ela no tsara*. [*Na: tsaratsara kokoa]'
mg1865::mg_42::6::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanotazan''ny mpianatra salohim-bary tamin''ny Sabata, sy ny naninian''ny Fariseo Azy.'
  verse_text: 'Ary tamin''ny Sabata anankiray* dia nandeha namaky ny tanimbary Jesoa, ary ny mpianany nanoty ny salohim-bary, ka rehefa nokosokosohiny tamin''ny tanany, dia nohaniny. [*Na: faharoa manaraka ny voalohany].'
mg1865::mg_42::6::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Fariseo sasany nanao hoe: Nahoana ianareo no manao izay tsy mety hatao amin''ny Sabata?'
mg1865::mg_42::6::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly azy ka nanao hoe: Tsy mbola novakinareo va ny teny milaza ilay nataon''i Davida, raha noana izy mbamin''izay nanaraka azy,'
mg1865::mg_42::6::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa niditra tao an-tranon''Andriamanitra izy ka nandray ny mofo aseho ary nihinana sady nanome ho an''izay nanaraka azy koa, nefa mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany?'
mg1865::mg_42::6::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Tompon''ny Sabata ny Zanak''olona.'
mg1865::mg_42::6::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny lehilahy anankiray maty tànana tamin''ny Sabata, sy ny fahatezeran''ny Fariseo tamin''izany.'
  verse_text: 'Ary nony tamin''ny Sabata hafa koa niditra tao amin''ny synagoga Jesoa ka nampianatra; ary nisy lehilahy anankiray maty* tanana tao. [*Grika: efa maina, na malazo]'
mg1865::mg_42::6::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanora-dalàna sy ny Fariseo nizaha taratra Azy, na hahasitrana amin''ny Sabata Izy, na tsia, mba hahitany izay hiampangana Azy.'
mg1865::mg_42::6::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nahalala ny hevitr''ireo, ka dia niteny tamin-dralehilahy maty tanana hoe: Mitsangàna, ka mijoroa etsy afovoany. Dia nitsangana izy ka nijoro.'
mg1865::mg_42::6::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa tamin''ireo: Manontany anareo Aho: Moa ny manao soa va no mety hatao amin''ny Sabata, sa ny manao ratsy? ny mamonjy aina va, sa ny mahavery aina?'
mg1865::mg_42::6::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nijery azy rehetra manodidina Izy, dia nanao tamin-dralehilahy hoe: Ahinjiro ny tananao. Dia nataony izany, ka sitrana ny tanany.'
mg1865::mg_42::6::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia safotry ny hatezerana* izy ireo ka nioko ny amin''izay hanaovany an''i Jesoa.'
mg1865::mg_42::6::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nifidianan''i Jesoa ny Apostoly roa ambin''ny folo lahy, ary ny nahasitranany olona maro, sy ny tori-teny nataony tamin''izany.'
  verse_text: 'Ary tamin''izany andro izany dia lasa nankany an-tendrombohitra Jesoa mba hivavaka; ary naharitra nivavaka tamin''Andriamanitra nandritra ny alina Izy.'
mg1865::mg_42::6::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina ny andro, dia nantsoiny hanatona Azy ny mpianany, ka nifidianany roa ambin''ny folo lahy, izay nataony hoe Apostoly,'
mg1865::mg_42::6::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Simona, izay nataony hoe koa Petera, sy Andrea rahalahiny, sy Jakoba sy Jaona sy Filipo sy Bartelemeo'
mg1865::mg_42::6::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Matio sy Tomasy sy Jakoba, zanak''i Alfeo, sy Simona, izay atao hoe Zelota,'
mg1865::mg_42::6::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jodasy, zanak''i* Jakoba, ary Jodasy Iskariota, izay tonga namadika. [*Na: rahalahin''i]'
mg1865::mg_42::6::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niara-nidina tamin''ireo, dia nijanona teo an-kamarenana Izy sy ny mpianany maro mbamin''ny vahoaka betsaka avy tany Jodia rehetra sy Jerosalema, ary avy tany amoron-dranomasina any Tyro sy Sidona, izay tonga mba hihaino Azy sy hositranina amin''ny aretiny;'
mg1865::mg_42::6::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary izay nampahorin''ny fanahy maloto dia nositranina.'
mg1865::mg_42::6::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra nitady hanendry Azy, satria nisy hery niala taminy ka nahasitrana azy rehetra.'
mg1865::mg_42::6::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa dia nanopy ny masony tamin''ny mpianany ka nanao hoe: Sambatra ianareo malahelo, fa anareo ny fanjakan''Andriamanitra.'
mg1865::mg_42::6::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ianareo noana ankehitriny, fa hovokisana ianareo. Sambatra ianareo mitomany ankehitriny, fa hihomehy ianareo.'
mg1865::mg_42::6::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ianareo, raha halan''ny olona ka ariany sy haratsiny, ary laviny toy ny zava-dratsy ny anaranareo, noho ny amin''ny Zanak''olona.'
mg1865::mg_42::6::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia ianareo amin''izany andro izany, ka mibitaha*; fa, indro, lehibe ny valim-pitianareo any an-danitra; fa izany no nataon''ny razany tamin''ny mpaminany. [*Na: miantsambora]'
mg1865::mg_42::6::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lozanareo izay manan-karena kosa! fa efa azonareo izay mahafa-po anareo.'
mg1865::mg_42::6::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo izay voky ankehitriny! fa mbola ho noana ianareo. Lozanareo izay mihomehy ankehitriny fa mbola ho ory sy hitomany ianareo.'
mg1865::mg_42::6::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, raha milaza soa anareo ny olona rehetra! fa izany no nataon''ny razany tamin''ny mpaminany sandoka.'
mg1865::mg_42::6::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa hoy Izaho aminareo izay mihaino: Tiava ny fahavalonareo; manaova soa amin''izay mankahala anareo;'
mg1865::mg_42::6::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'misaora izay manozona anareo, ary mivavaha ho an''izay manisy ratsy anareo.'
mg1865::mg_42::6::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mamely ny takolakao anankiray, dia atolory azy koa ny anankiray; ary raha misy maka ny lambanao, aza lavinao na dia ny akanjonao aza.'
mg1865::mg_42::6::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo izay rehetra mangataka aminao; ary raha misy maka ny anananao, dia aza manaraka izany aminy.'
mg1865::mg_42::6::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izay tianareo hataon''ny olona aminareo, dia mba ataovy aminy kosa.'
mg1865::mg_42::6::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izay tia anareo ihany no tianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota koa aza mba tia izay tia azy.'
mg1865::mg_42::6::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha izay manisy soa anareo ihany no asianareo soa, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba manao izany ihany.'
mg1865::mg_42::6::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mampisambotra izay antenainareo fa mbola hanonitra ianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba mampisambotra ny mpanota, handraisany toraka izany indray.'
mg1865::mg_42::6::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tiava ny fahavalonareo, ary manaova soa, dia mampisambora, fa aza kivy na amin''inona na amin''inona*, dia ho lehibe ny valim-pitianareo, ary ho zanaky ny Avo Indrindra ianareo; fa Izy mora fanahy amin''izay tsy misaotra sy ny ratsy fanahy. [*Na: aza manantena valiny]'
mg1865::mg_42::6::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho mpamindra fo ianareo mba ho tahaka ny Rainareo, Mpamindra fo.'
mg1865::mg_42::6::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mitsara, dia tsy hotsaraina ianareo; aza manameloka, dia tsy hohelohina ianareo; mamelà, dia mba havela ianareo;'
mg1865::mg_42::6::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'omeo, dia mba homena ianareo; fatra tsara sady ahintsana no afatratra ka mihoatra no homeny ho ao am-pofoanareo. Fa izay fatra ataonareo no hamarana ho anareo kosa.'
mg1865::mg_42::6::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanao fanoharana taminy koa hoe: Ny jamba va mahatari-dalana ny jamba? Tsy hianjera any an-kady va izy roa?'
mg1865::mg_42::6::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpianatra tsy mihoatra noho ny mpampianatra; fa izay rehetra tanteraka dia ho tahaka ny mpampianatra azy ihany.'
mg1865::mg_42::6::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana ianao no mijery ny sombin-kazo izay eo amin''ny mason''ny rahalahinao, nefa ny andry izay eo amin''ny masonao dia tsy mba tsaroanao akory?'
mg1865::mg_42::6::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ahoana no ilazanao amin''ny rahalahinao hoe: Ry rahalahy, aoka hesoriko ny sombin-kazo eo amin''ny masonao, nefa tsy mba hitanao ny andry eo amin''ny masonao? Ry mpihatsaravelatsihy, esory aloha ny andry eo amin''ny masonao, ary amin''izany dia ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin''ny maso''ny rahalahinao.'
mg1865::mg_42::6::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy hazo tsara mamoa voa ratsy na hazo ratsy mamoa voa tsara.'
mg1865::mg_42::6::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy fantatra amin''ny voany avy ny hazo rehetra; fa tsy misy manoty aviavy* amin''ny tsilo, na voaloboka amin''ny voaroy. [*aviavimbazaha]'
mg1865::mg_42::6::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tsara fanahy dia mamoaka ny tsara avy amin''ny rakitra tsaran''ny fony; ary ny ratsy fanahy kosa dia mamoaka ny ratsy; fa amin''ny haben''ny ao am-pony no itenenan''ny vavany.'
mg1865::mg_42::6::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahoana ianareo no miantso Ahy hoe: Tompoko, Tompoko, nefa tsy manao izay lazaiko?'
mg1865::mg_42::6::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra manatona Ahy sy mandre ny teniko ka mankatò azy, dia hasehoko aminareo izay tahaka azy:'
mg1865::mg_42::6::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny olona nanao trano izy, izay nihady lalina ary nanisy fanorenana teo ambonin''ny vatolampy; ary nony tondraka ny rano, dia namely mafy izany trano izany ny riaka, nefa tsy nahahozongozona azy, satria tsara fanorenana* izy. [*Na: naorina teo ambonin''ny vatolampy izy]'
mg1865::mg_42::6::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 6
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mandre, fa tsy mankato, dia tahaka ny olona izay nanao trano teo ambonin''ny tany, fa tsy nanisy fanorenana; dia namely azy mafy ny riaka, ka dia nirodana niaraka tamin''izay izy; ary loza ny naharavan''izany trano izany.'
mg1865::mg_42::7::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny mpanompon''ilay kapiteny.'
  verse_text: 'Ary rehefa vitan''i Jesoa teo anatrehan''ny olona izany toriteniny rehetra izany, dia nankany Kapernaomy Izy.'
mg1865::mg_42::7::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''ny kapiteny anankiray, izay malalany, dia narary efa ho faty.'
mg1865::mg_42::7::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha nahare ny amin''i Jesoa ilay kapiteny, dia naniraka loholon''ny Jiosy hankeo aminy hangataka Azy mba ho avy ka hahasitrana ny mpanompony.'
mg1865::mg_42::7::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo amin''i Jesoa ireo, dia nangataka mafy taminy ka nanao hoe: Miendrika ny hanaovanao izany izy,'
mg1865::mg_42::7::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tia ny firenentsika izy, sady izy no efa nanao ny synagoga ho antsika.'
mg1865::mg_42::7::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nandeha niaraka taminy. Ary rehefa efa mby teo akaikin''ny trano Izy, ilay kapiteny dia naniraka sakaiza hitsena Azy ka nanao taminy hoe: Tompoko, aza manahirana ny tenanao Ianao; fa tsy miendrika hidiranao ao ambanin''ny tafon-tranoko aho.'
mg1865::mg_42::7::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na dia ny tenako aza dia nataoko fa tsy miendrika hankeo aminao; fa mitenena ihany, dia ho sitrana ny ankizilahiko.'
mg1865::mg_42::7::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho koa mba lehilahy manan-dehibe ihany, ka manana miaramila izay feheziko; koa hoy izaho amin''ny anankiray: Mandehana, dia mandeha izy, ary amin''ny anankiray koa Avia, dia avy izy, ary amin''ny mpanompoko: Ataovy izao, dia manao izy.'
mg1865::mg_42::7::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahare izany Jesoa, dia gaga taminy; ary dia nitodika Izy ka nanao tamin''ny vahoaka izay nanaraka Azy hoe: Lazaiko aminareo fa tsy mbola nahita finoana lehibe toy izany Aho, na dia tamin''ny Isiraely aza.'
mg1865::mg_42::7::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafaverina tao an-trano ireo iraka ireo, dia hitany fa sitrana ilay mpanompo.'
mg1865::mg_42::7::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny nananganan''i Jesoa ny zanakalahin''ilay mpitondratena tao Naina.'
  verse_text: 'Ary taoriana kelin''izany* Jesoa dia nankany an-tanana atao hoe Naina; ary nanaraka Azy ny mpianany sy ny vahoaka betsaka. [*Na: (nony ampitson''iny)]'
mg1865::mg_42::7::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa mby teo akaikin''ny vavahadin''ny tanàna Izy, dia, indro, nisy fatin''ny lehilahy anankiray nentina nivoaka, izay zanakalahy tokan''ny reniny, sady mpitondratena ravehivavy; ary nisy vahoaka betsaka avy tao an-tanàna nanaraka azy.'
mg1865::mg_42::7::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nahita an-dravehivavy ny Tompo, dia onena azy ka nanao taminy hoe: Aza mitomany.'
mg1865::mg_42::7::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatona Izy ka nanendry ny tranovorona, dia nijanona izay nilanja. Ary hoy Jesoa: zatovo, hoy Izaho aminao: Miarena.'
mg1865::mg_42::7::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niarina ny maty sady niteny, ary dia natolony tamin-dreniny.'
mg1865::mg_42::7::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raiki-tahotra ny olona rehetra ka nankalaza an''Andriamanitra hoe: Mpaminany lehibe no efa mitsangana eto amintsika; ary Andriamanitra efa nitsinjo ny olony.'
mg1865::mg_42::7::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niely teny Jodia rehetra sy teny amin''ny tany manodidina rehetra ny lazan''i Jesoa ny amin''izany zavatra izany.'
mg1865::mg_42::7::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nanirahan''i Jaona Mpanao-batisa tany amin''i Jesoa, sy ny teny nataon''i Jesoa tamin''izany.'
  verse_text: 'Ary ny mpianatr''i Jaona nanambara izany rehetra izany taminy.'
mg1865::mg_42::7::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaona niantso ny mpianany roa lahy hankao aminy, dia naniraka azy hankany amin''ny Tompo hanao hoe: Ianao va Ilay ho avy, sa mbola hafa no andrasantsika?'
mg1865::mg_42::7::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany aminy ireo lehilahy ireo, dia nanao hoe: Jaona Mpanao batisa naniraka anay hankaty aminao hanao hoe: Ianao va Ilay ho avy, sa mbola hafa no andrasantsika?'
mg1865::mg_42::7::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ora izany Jesoa dia nahasitrana olona maro tamin''ny rofy sy ny aretina sy ny fanahy ratsy sady nampahiratra ny jamba maro.'
mg1865::mg_42::7::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Izy ka nanao taminy hoe: Mandehana ianareo, ambarao amin''i Jaona izao hitanareo sy renareo izao; mahiratra ny jamba, afaka ny mandringa, diovina ny boka, malady ny marenina, atsangana ny maty, ary ny malahelo dia itoriana ny filazantsara.'
mg1865::mg_42::7::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sambatra izay tsy ho tafintohina noho ny amiko.'
mg1865::mg_42::7::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa lasa ny irak''i Jaona, dia nilaza an''i Jaona tamin''ny vahoaka Jesoa ka nanao hoe: Hizaha inona no nalehanareo tany an''efitra? Volotara nohozongozonin''ny rivotra va?'
mg1865::mg_42::7::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sa hizaha inona no nalehanareo? Olona mitafy lamba soa* va? Indro, ny mitafy lamba soa sy mihinana zava-py dia ao an-tranon''ny mpanjaka. [*Grika: malemy]'
mg1865::mg_42::7::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sa hizaha inona no nalehanareo tany? Mpaminany va? Eny, hoy Izaho aminareo, sady mihoatra lavitra noho ny mpaminany izy.'
mg1865::mg_42::7::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy ilay voasoratra hoe: Indro, Izaho maniraka ny irako hialoha Anao, Izay hamboatra ny lalanao eo alohanao (Malakia 3:1).'
mg1865::mg_42::7::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo: Amin''izay nateraky ny vehivavy tsy misy lehibe noho Jaona; nefa ny kely indrindra amin''ny fanjakan''Andriamanitra dia lehibe noho izy.'
mg1865::mg_42::7::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra sy ny mpamory hetra raha nandre, dia nanamarina an''Andriamanitra, satria natao batisa tamin''ny batisan''i Jaona izy.'
mg1865::mg_42::7::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Fariseo sy ny mpahay lalàna kosa nandà ny fikasan''Andriamanitra, satria tsy mba nanatona hataon''i Jaona batisa izy.'
mg1865::mg_42::7::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny inona ary no hanoharako ny olona amin''ity taranaka ity? tahaka ny inona moa izy?'
mg1865::mg_42::7::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay mifampiantso hoe: Efa nitsoka sodina taminareo izahay, nefa tsy nandihy ianareo; efa nanao feo fisaonana izahay, nefa tsy nitomany ianareo.'
mg1865::mg_42::7::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga Jaona Mpanao batisa tsy nihinan-kanina na nisotro divay, ka hoy ianareo: Manana demonia izy.'
mg1865::mg_42::7::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga ny Zanak''olona mihinana sy misotro kosa, ka hoy ianareo: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan''ny mpamory hetra sy ny mpanota.'
mg1865::mg_42::7::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahendrena dia hamarinin''ny zanany rehetra.'
mg1865::mg_42::7::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 36
  verse_date_revised: null
  verse_title: 'Ny nanatonan''ilay vehivavy mpanota an''i Jesoa tao an-tranon''i Simona Fariseo'
  verse_text: 'Ary ny Fariseo anankiray nanasa an''i Jesoa hiara-mihinana aminy; ary dia niditra tao an-tranon''ilay Fariseo Izy ka nipetraka nihinana.'
mg1865::mg_42::7::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy vehivavy mpanota tao an-tanàna, ka rehefa fantany fa Jesoa nipetraka nihinana tao an-tranon''ilay Fariseo, dia nitondra tavoara alabastara feno menaka manitra izy;'
mg1865::mg_42::7::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nijanona teo ivohony tanilan''ny tongony izy ka nitomany, dia nahakotsa ny tongony tamin''ny ranomasony sy namaoka azy tamin''ny volon-dohany, dia nanoroka fatratra ny tongony ka nanosotra azy tamin''ny menaka manitra,'
mg1865::mg_42::7::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 39
  verse_date_revised: '2022-07-13T08:18:14+0000'
  verse_title: null
  verse_text: 'Ary nony nahita izany ilay Fariseo nanasa Azy, dia nanao anakampo hoe: Raha mpaminany Ity, dia ho nahalala io vehivavy manendry Azy io sy ny toetrany; fa mpanota io.'
mg1865::mg_42::7::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Ry Simona, manan-kolazaina aminao Aho. Dia hoy izy: Lazao ary, Mpampianatra o.'
mg1865::mg_42::7::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy roa lahy nananan''ny mpampanàna vola anankiray trosa: ny iray nananany denaria diman-jato, ary ny iray kosa dimam-polo.'
mg1865::mg_42::7::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy nanan-kaloa izy roa lahy, dia samy navelany. Koa iza moa amin''ireo no ho tia azy indrindra?'
mg1865::mg_42::7::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Simona namaly ka nanao hoe: Ataoko fa ilay namoizany be. Dia hoy Izy taminy: Marina ny hevitrao.'
mg1865::mg_42::7::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nitodika nijery an-dravehivavy ka nanao tamin''i Simona hoe: Hitanao va io vehivavy io? Niditra teto an-tranonao Aho; nefa tsy mba nanome Ahy rano hanasana ny tongotro ianao; fa izy kosa nahakotsa ny tongotro tamin''ny ranomasony, dia namaoka azy tamin''ny volon-dohany.'
mg1865::mg_42::7::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba nanoroka Ahy akory ianao; fa izy, hatr''izay nidirako, dia tsy mbola nitsahatra nanoroka fatratra ny tongotro.'
mg1865::mg_42::7::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohako tsy mba nohosoranao diloilo akory; fa izy kosa nanoso-menaka manitra ny tongotro.'
mg1865::mg_42::7::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia lazaiko aminao: Voavela ny helony be, fa be fitiavana izy; fa izay voavela tamin''ny kely dia kely fitiavana.'
mg1865::mg_42::7::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy tamin-dravehivavy: Voavela ny helokao.'
mg1865::mg_42::7::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay niara-nipetraka nihinana teo aminy dia niresaka hoe: Iza moa Ity no mba mamela heloka?'
mg1865::mg_42::7::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 7
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamin-dravehivavy: Ny finoanao efa namonjy anao; mandehana soa aman-tsara.'
mg1865::mg_42::8::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitetezan''i Jesoa ny vohitra maro tany Galilia, sy ny nanompoan''ny vehivavy sasany Azy.'
  verse_text: 'Ary taoriana kelin''izany, dia lasa Jesoa nitety ny tanàna sy ny vohitra nitory ny filazantsaran''ny fanjakan''Andriamanitra; ary ny roa ambin''ny folo lahy nanaraka Azy.'
mg1865::mg_42::8::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mbamin''ny vehivavy sasany, izay nositraniny tamin''ny fanahy ratsy sy ny aretina, dia Maria atao hoe Magdalena, izay efa nivoahan''ny demonia fito,'
mg1865::mg_42::8::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Johana, vadin''i Koza, mpitandrina ny fananan''i Heroda, ary Sosana mbamin''ny maro hafa koa, izay nanompo azy* tamin''ny fananany. [*Na: Azy]'
mg1865::mg_42::8::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: 'Fanoharana nataon''i Jesoa.'
  verse_text: 'Ary nisy vahoaka betsaka niangona, ka nanatona Azy ny olona avy tamin''ny isan-tanàna, dia nanao fanoharana hoe Izy:'
mg1865::mg_42::8::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nivoaka ny mpamafy hamafy ny voa; ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana ka voahitsakitsaka, ary dia lanin''ny voro-manidina.'
mg1865::mg_42::8::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny ambonin''ny vatolampy; ary raha vao naniry izy, dia nalazo; satria tsy nisy mandomando.'
mg1865::mg_42::8::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo niara-naniry taminy, dia nangeja azy.'
mg1865::mg_42::8::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, dia naniry ka namoa zato heny. Ary rehefa nilaza izany Izy, dia niantso hoe: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.'
mg1865::mg_42::8::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianany nanontany Azy ny amin''izay hevitr''izany fanoharana izany.'
mg1865::mg_42::8::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Ianareo no navela* hahalala ny zava-miafina ny amin''ny fanjakan''Andriamanitra; fa amin''ny olon-kafa dia fanoharana no atao, mba hijery izy, fa tsy hahita, ary hahare, fa tsy hahafantatra (Isaia 6:9). [*Grika: nomena]'
mg1865::mg_42::8::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izao no hevitry ny fanoharana: Ny voa dia ny tenin''Andriamanitra.'
mg1865::mg_42::8::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo teny amoron-dalana dia izay mandre, nefa avy ny devoly ka manaisotra ny teny ao am-pony, fandrao hino izy ka hovonjena.'
mg1865::mg_42::8::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo teny ambonin''ny vatolampy dia izay mandre sady mandray ny teny amin''ny hafaliana; nefa tsy manam-paka ireo, fa mino vetivety ihany, koa amin''izay andro isehoan''ny fakam-panahy dia mihemotra izy.'
mg1865::mg_42::8::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo teny amin''ny tsilo dia izay mandre, fa nony mandeha izy, dia voagejan''ny fiahiahiana sy ny harena ary ny fahafinaretan''izao fiainana izao ka tsy mahavanom-boa.'
mg1865::mg_42::8::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo teny amin''ny tany tsara kosa dia izay mandre ny teny amin''ny fo sady marina no tsara, dia mitana azy ka mamoa amin''ny faharetana.'
mg1865::mg_42::8::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy olona mampirehitra jiro ka manarona azy, na nametraka azy ao ambanin''ny farafara; fa ataony eo amin''ny fanaovan-jiro izy, mba ho hitan''izay miditra ny mazava.'
mg1865::mg_42::8::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy takona izay tsy ho hita, na miafina izay tsy ho fantatra sy tsy haseho.'
mg1865::mg_42::8::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo ny fihainonareo; fa izay manana dia homena; ary izay tsy manana kosa, na dia izay ataony ho ananany aza dia halaina aminy.'
mg1865::mg_42::8::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny nitadiavan''ny renin''i Jesoa sy ny rahalahiny Azy.'
  verse_text: 'Ary ny renin''i Jesoa sy ny rahalahiny nanatona Azy, fa tsy nahazo nihaona taminy, satria nifanety ny vahoaka.'
mg1865::mg_42::8::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nilaza taminy hoe: Ny reninao sy ny rahalahinao mijanona ato ala-trano ta-hahita Anao.'
mg1865::mg_42::8::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly Izy ka nanao taminy hoe: Ny reniko sy ny rahalahiko dia ireto izay mandre ny tenin''Andriamanitra ka mankatò azy.'
mg1865::mg_42::8::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nampitsaharan''i Jesoa ny tafio-drivotra.'
  verse_text: 'Ary tamin''ny andro anankiray dia niondrana an-tsambokely Jesoa sy ny mpianany; ary hoy Izy taminy: Andeha isika hankeny am-pitan''ny farihy; dia lasa izy.'
mg1865::mg_42::8::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha ny sambokely, dia azon''ny torimaso Jesoa; ary nisy tafio-drivotra nidina tamin''ny farihy, ka nila ho feno rano ny sambo, ary saiky nahita loza izy ireo.'
mg1865::mg_42::8::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanatona izy, dia namoha Azy ka nanao hoe: Tompoko, Tompoko, maty izahay! Dia nitsangana Izy, ka noteneniny mafy ny rivotra sy ny onjan-drano. Ary dia nitsahatra izany, ka tonga tony tsara ny andro.'
mg1865::mg_42::8::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Aiza ny finoanareo? Ary natahotra izy ireo sady gaga ka niresaka hoe: Iza moa Ity, no mandidy ny rivotra sy ny rano Izy, ka manaiky Azy izany!'
mg1865::mg_42::8::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: 'Ny namoahan''i Jesoa demonia maro tamin''ny lehilahy anankiray tany amin''ny tanin''ny Gerasena.'
  verse_text: 'Dia nitody tany amin''ny tanin''ny Gerasena* izay tandrifin''i Galilia izy. [*Na: (Gadarena)]'
mg1865::mg_42::8::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niala nankeny an-tanety Jesoa, dia nifanena taminy ny lehilahy anankiray avy tao an-tanàna, izay efa nanana demonia, ary efa ela izy no tsy nitafy lamba sady tsy nitoetra tao an-trano, fa teny amin''ny fasana.'
mg1865::mg_42::8::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nahita an''i Jesoa izy, dia niantso mafy sady niankohoka teo anatrehany ka niteny tamin''ny feo mahery hoe: Moa mifaninona akory izaho sy Ianao, ry Jesoa, Zanak''Andriamanitra Avo Indrindra o? masìna Ianao, aza mampijaly ahy.'
mg1865::mg_42::8::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nandidy ny fanahy maloto hivoaka tamin-dralehilahy. Fa efa nahazo azy ela izany; ary efa nafatotra tamin''ny gadra, na ny tanany, na ny tongony, ka nambenana izy; nefa notapahiny ny fatorana, ka dia nentin''ny demonia niriotra nankany an''efitra izy.'
mg1865::mg_42::8::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanontany azy ka nanao hoe: Iza moa no anaranao? Dia hoy izy: Legiona; fa demonia maro no efa niditra tao anatiny.'
mg1865::mg_42::8::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifona taminy izy mba tsy handidiany azy hankany amin''ny lavaka tsy hita noanoa.'
mg1865::mg_42::8::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy kisoa maro andiany iray nandrasana teny an-tendrombohitra, ary ny demonia nifona taminy mba havelany hiditra ao anatiny. Dia nekeny.'
mg1865::mg_42::8::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny demonia, rehefa nivoaka tamin-dralehilahy, dia niditra tao anatin''ny kisoa; ary ireo kisoa andiany ireo nitratrevatreva tamin''ny hantsana ho any amin''ny farihy, ka dia maty* tany. [*Grika: kenda]'
mg1865::mg_42::8::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny mpiandry izany natao izany, dia nandositra izy ka nilaza izany tao an-tanàna sy tany an-tsaha.'
mg1865::mg_42::8::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny olona mba hizaha izany natao izany; ary tonga tany amin''i Jesoa izy, dia nahita an-dralehilahy izay efa nivoahan''ny demonia, fa indro izy nipetraka teo anilan''ny tongotr''i Jesoa nitafy lamba sady ary saina; dia raiki-tahotra ireo.'
mg1865::mg_42::8::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay efa nahita dia nanambara tamin''ny olona ny namonjena an''ilay demoniaka.'
mg1865::mg_42::8::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra tany amin''ny tanin''ny Gerasena* manodidina dia nangataka an''i Jesoa hiala aminy, satria raiki-tahotra indrindra izy; ary Jesoa niondrana an-tsambokely ka niverina. [*Na: Gadarena]'
mg1865::mg_42::8::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy izay efa nivoahan''ny demonia dia nangataka mba hitoetra ao aminy; nefa nampodin''i Jesoa izy ka nataony hoe:'
mg1865::mg_42::8::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Modia ihany any an-tranonao, ka ambarao ny zavatra lehibe nataon''Andriamanitra taminao. Dia nandeha izy ka nitory eran''ny tanàna izay zavatra lehibe nataon''i Jesoa taminy.'
mg1865::mg_42::8::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 40
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay vehivavy narary roa ambin''ny folo taona, sy ny nananganany ny zanakavavanin''i Jairo tamin''ny maty.'
  verse_text: 'Ary nony tafaverina Jesoa, dia nandray Azy tsara ny vahoaka, fa niandry Azy avokoa izy rehetra.'
mg1865::mg_42::8::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, dia tonga ny lehilahy atao hoe Jairo, mpanapaka ny synagoga; dia niankohoka tamin''ny tongotr''i Jesoa izy ka niangavy taminy hiditra ao an-tranony.'
mg1865::mg_42::8::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanana zanakavavy tokana tokony ho roa ambin''ny folo taona izy, ary efa ho faty razazavavy. Ary raha nandeha Jesoa, dia nanety lalana Azy ny vahoaka.'
mg1865::mg_42::8::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy anankiray narary* roa ambin''ny folo taona, izay efa nandany ny fananany rehetra tamin''ny mpanao fanafody, nefa tsy nisy nahasitrana azy akory. [*Grika: narary nandeha rà]'
mg1865::mg_42::8::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankao ivohon''i Jesoa ravehivavy ka nanendry ny somotraviavin-dambany, ary niaraka tamin''izay dia nijanona ny aretiny*. [*Grika: fandehanan''ny ràny]'
mg1865::mg_42::8::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa: Iza moa no nanendry Ahy? Ary rehefa samy nandà izy rehetra, dia hoy Petera sy ny namany: Tompoko, ny vahoaka betsaka mifanety ka manizina Anao.'
mg1865::mg_42::8::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa: Nisy olona nanendry Ahy; fa fantatro fa nisy hery nivoaka avy tamiko.'
mg1865::mg_42::8::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan-dravehivavy fa tsy takona Azy izy, dia nangovitra izy ka nankeo aminy sady niankohoka teo anatrehany, dia nanambara teo anatrehan''ny vahoaka rehetra izay anton''ny nanendreny Azy sy izay nahasitranany niaraka tamin''izay.'
mg1865::mg_42::8::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Anaka, ny finoanao no nahasitrana* anao; mandehana soa aman-tsara. [*Grika: nahavonjy]'
mg1865::mg_42::8::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niteny Jesoa, dia tonga ny anankiray avy tany amin''ilay mpanapaka ny synagoga ka nanao hoe: Maty ny zanakao-vavy; aza manahirana ny Mpampianatra.'
mg1865::mg_42::8::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa, raha nahare, dia namaly azy ka nanao hoe: Aza matahotra; minoa fotsiny ihany, dia ho velona* izy. [*Grika: voavonjy]'
mg1865::mg_42::8::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga tao an-trano Izy, dia tsy nisy olona navelany hiara-miditra taminy, afa-tsy Petera sy Jaona ary Jakoba mbamin''ny ray aman-drenin-drazazavavy.'
mg1865::mg_42::8::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra nitomany sy nisaona azy; fa Jesoa nanao hoe: Aza mitomany; fa tsy maty izy, fa matory.'
mg1865::mg_42::8::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihomehy Azy fatratra ny olona satria fantany fa efa maty razazavavy.'
mg1865::mg_42::8::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa dia nandray ny tanany ka niantso hoe: Ry zazavavy, miarena.'
mg1865::mg_42::8::55:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nody indray ny ainy, ka niarina niaraka tamin''izay izy; ary nasainy nomena hanina izy.'
mg1865::mg_42::8::56:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 8
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia talanjona ny ray aman-dreniny; fa Jesoa nandrara ary tsy hilazalaza amin''olona ny zavatra efa natao.'
mg1865::mg_42::9::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanirahan''i Jesoa ny Apostoly roa ambin''ny folo lahy.'
  verse_text: 'Ary Jesoa niantso ny roa ambin''ny folo lahy hankeo aminy ka nanome azy hery sy fahefana hamoaka ny demonia rehetra sy hahasitrana aretina.'
mg1865::mg_42::9::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy naniraka ireo handeha hitory ny fanjakan''Andriamanitra sy hahasitrana ny marary.'
mg1865::mg_42::9::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Aza mitondra zavatra ho amin''ny alehanareo, na tehina, na kitapom-batsy, na mofo, na vola, ary aza misy mitondra akanjo roa.'
mg1865::mg_42::9::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay trano hidiranareo, dia ao no itoero, ary avy ao indray no ialao.'
mg1865::mg_42::9::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay tsy mampandroso, anareo, raha miala amin''izany tanàna izany ianareo, dia ahintsano ny vovoka ho afaka amin''ny tongotrareo ho vavolombelona miampanga azy.'
mg1865::mg_42::9::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nandeha izy ireo ka nitety vohitra nitory ny filazantsara sy nahasitrana teny tontolo eny.'
mg1865::mg_42::9::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny fisalasalan''i Heroda, raha nandre ny fahagagana nataon''i Jesoa.'
  verse_text: 'Ary Heroda mpanapaka nandre izay rehetra natao; dia very hevitra izy noho ny filazan''ny olona; fa hoy ny sasany: Jaona no efa nitsangana tamin''ny maty;'
mg1865::mg_42::9::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy ny sasany: Elia no efa niseho; fa hoy kosa ny sasany: Ny anankiray amin''ny mpaminany fahiny no efa nitsangana.'
mg1865::mg_42::9::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Heroda: Raha Jaona, dia izaho no efa nanapaka ny lohany; fa iza indray moa Izao, izay reko fa manao izany zavatra izany? Ary izy nitady hahita Azy.'
mg1865::mg_42::9::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny nampihinanan''i Jesoa ny olona tsy omby dimy arivo.'
  verse_text: 'Ary rehefa niverina ny Apostoly, dia nanambara tamin''i Jesoa izay efa nataony. Ary Izy nitondra azy ka nandeha nitokana nankany amin''ny tanàna atao hoe Betsaida.'
mg1865::mg_42::9::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka, nony nahalala, dia nanaraka Azy; ary Izy nandray azy tsara ka nilaza taminy ny amin''ny fanjakan''Andriamanitra; ary izay marary dia nositraniny.'
mg1865::mg_42::9::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony efa ho hariva ny andro, dia nanatona ny roa ambin''ny folo lahy ka nanao taminy hoe: Ravao ny vahoaka mba hankanesany eny amin''ny vohitra manodidina sy any an-tsaha handry sy hitady hanina; fa aty an-tany foana isika.'
mg1865::mg_42::9::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Omeonareo hanina izy. Ary hoy ireo: Tsy manana mihoatra noho ny mofo dimy sy hazandrano roa izahay, raha tsy handeha hividy hanina ho an''ireo olona rehetra ireo.'
mg1865::mg_42::9::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tokony ho dimy arivo lahy izy. Ary hoy Izy tamin''ny mpianany: Asaovy mipetraka an-tokony izy ka tokony ho dimam-polo avy.'
mg1865::mg_42::9::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataony izany, ka nampipetraka azy rehetra izy.'
mg1865::mg_42::9::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa noraisin''i Jesoa ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy, ka nanaovany* fisaorana ireo, dia novakiny ka natolony ny mpianany harosony eny anoloan''ny vahoaka. [*Na: nasiany]'
mg1865::mg_42::9::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihinana izy rehetra ka voky; ary nangonina izay sombintsombiny sisa tsy lany, ka nisy roa ambin''ny folo harona.'
mg1865::mg_42::9::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny naneken''i Petera an''i Jesoa ho Kristy, Zanak''Andriamanitra, ary ny nilazan''i Jesoa voalohany ny amin''ny hahafatesany sy ny hitsanganany.'
  verse_text: 'Ary raha nivavaka tao amin''ny mangingina Jesoa, sady teo aminy ny mpianany, dia nanontany azy Izy ka nanao hoe: Ataon''ny olona ho iza moa Aho?'
mg1865::mg_42::9::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ireo ka nanao hoe: Jaona Mpanao batisa; nefa ny sasany kosa manao Anao ho Elia, ary ny sasany indray manao hoe: Ny anankiray amin''ny mpaminany fahiny no efa nitsangana.'
mg1865::mg_42::9::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Fa ianareo kosa manao Ahy ho iza? Dia namaly Petera ka nanao hoe: Ny Kristin''Andriamanitra.'
mg1865::mg_42::9::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy niteny mafy azy sady nandrara azy mba tsy hilazalaza izany amin''olona'
mg1865::mg_42::9::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Ny Zanak''olona tsy maintsy hijaly mafy ka holavin''ny loholona sy ny lohan''ny mpisorona mbamin''ny mpanora-dalàna sady hovonoiny; ary amin''ny andro fahatelo dia hatsangana.'
mg1865::mg_42::9::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jesoa tamin''izy rehetra: Raha misy ta-hanaraka Ahy, aoka izy handà ny tenany, dia hitondra ny hazo fijaliany isan''andro ka hanaraka Ahy.'
mg1865::mg_42::9::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no ta-hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny amiko, dia izy no hamonjy izany.'
mg1865::mg_42::9::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: '2022-07-14T09:27:31+0000'
  verse_title: null
  verse_text: 'Fa inona no soa azon''ny olona, raha mahazo izao tontolo izao aza, kanefa very ny ainy*, na maty antoka izy? [*Na: ny fanahiny]'
mg1865::mg_42::9::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no ho menatra Ahy sy ny teniko, dia ho menatra azy kosa ny Zanak''olona, raha avy amin''ny voninahiny sy ny an''ny Rainy ary ny an''ny anjely masina.'
mg1865::mg_42::9::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan''Andriamanitra.'
mg1865::mg_42::9::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Ny niovan''i Jesoa tarehy tao an-tendrombohitra.'
  verse_text: 'Ary rehefa tokony ho havaloana taorian''izany teny izany, dia nitondra an''i Petera sy Jaona ary Jakoba Izy ka niakatra tany an-tendrombohitra hivavaka.'
mg1865::mg_42::9::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nivavaka Izy, dia niova ny toetry ny tarehiny, ary ny fitafiany dia tonga fotsy sady nanelatrelatra.'
mg1865::mg_42::9::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, nisy roa lahy niresaka taminy, dia Mosesy sy Elia,'
mg1865::mg_42::9::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay niseho tamim-boninahitra ka nilaza ny fialany, izay efa hefainy any Jerosalema.'
mg1865::mg_42::9::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa navesatry ny tory ny mason''i Petera sy ny namany; nefa nahari-tory ihany* izy, dia nahita ny voninahitr''i Jesoa sy izy roa lahy izay teo aminy. [*Na: Nony nahatsiaro tsara]'
mg1865::mg_42::9::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny nisarahan''izy roa lahy taminy dia hoy Petera tamin''i Jesoa: Tompoko, tsara raha mitoetra eto isika; ary aoka izahay hanao tranolay telo: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia; nefa tsy fantany izay nolazainy.'
mg1865::mg_42::9::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niteny izany izy, dia nisy rahona niseho nanarona azy ireo; ary raha niditra tao anatin''ny rahona ireo, dia raiki-tahotra ny mpianatra telo lahy.'
mg1865::mg_42::9::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako voafidiko; Izy no henoy.'
mg1865::mg_42::9::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitsahatra ny feo, dia Jesoa irery ihany no hita. Ary nangina izy ireo ka tsy nilazalaza tamin''olona na dia iray akory aza tamin''izany andro izany ny amin''izay zavatra efa hitany.'
mg1865::mg_42::9::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay zazalahy nampahorin''ny demonia.'
  verse_text: 'Ary nony ampitson''iny, raha nidina avy teo an-tendrombohitra izy ireo, dia nisy vahoaka betsaka nitsena an''i Jesoa.'
mg1865::mg_42::9::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy lehilahy anankiray avy teo amin''ny vahoaka nitaraina mafy hoe: Mpampianatra o, masina Ianao, mamindrà fo amin''ny zanako! fa zanako-lahy tokana izy.'
mg1865::mg_42::9::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, misy fanahy mahazo azy, ka miantsoantso tampoka izy, ary ny fanahy mampifanintontsintona ny tenany sy mampandoa vory azy, ary sarotra ny fialany aminy ka mahatorotorovana azy.'
mg1865::mg_42::9::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangataka tamin''ny mpianatrao aho mba hamoaka izany, fa tsy afany.'
mg1865::mg_42::9::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao hoe: Ry taranaka sady tsy mino no efa nivadika, mandra-pahoviana no hitoerako aminareo sy handeferako aminareo? Ento ety ny zanakao.'
mg1865::mg_42::9::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nanatona izy, dia nampihinjitrinjitra sy nampifanintontsintona azy ny demonia. Ary Jesoa niteny mafy ny fanahy maloto ka nahasitrana ny zazalahy; dia natolony tamin-drainy indray izy.'
mg1865::mg_42::9::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona izy rehetra noho ny fiandrianan''Andriamanitra. #Ny nilazan''i Jesoa fanindroany ny hahafatesany sy ny hitsanganany indray.# Fa raha talanjona izy rehetra tamin''izay rehetra nataon''i Jesoa, dia hoy Izy tamin''ny mpianany:'
mg1865::mg_42::9::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampidironareo ao amin''ny sofinareo izany teny izany; fa ny Zanak''olona efa hatolotra eo an-tanan''ny olona.'
mg1865::mg_42::9::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy azon''ny mpianatra io teny io sady nafenina azy izany mba tsy ho fantany; ary natahotra hanontany Azy ny amin''io teny io izy.'
mg1865::mg_42::9::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 46
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa ny mpianany hanetry tena.'
  verse_text: 'Dia nisy fisainana niseho tao am-pony ny amin''izay ho lehibe ao aminy.'
mg1865::mg_42::9::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nahalala ny fisainan''ny fony, dia nandray zaza anankiray ka nametraka azy teo anoloany;'
mg1865::mg_42::9::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy Izy tamin''ireo: Na zovy na zovy no mandray io zaza io noho ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia mandray Izay naniraka Ahy; fa izay kely indrindra ao aminareo rehetra, dia izy no lehibe.'
mg1865::mg_42::9::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaona namaly ka nanao hoe: Tompoko, izahay nahita anankiray namoaka demonia tamin''ny anaranao, ka noraranay izy, satria tsy manaraka antsika.'
mg1865::mg_42::9::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Aza raràna, fa izay tsy manohitra anareo dia momba anareo.'
mg1865::mg_42::9::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 51
  verse_date_revised: null
  verse_title: 'Ny nialan''i Jesoa tany Galilia, sy ny namakiany an''i Samaria.'
  verse_text: 'Ary rehefa ho tonga ny fotoana hampiakarana an''i Jesoa, dia niatrika hankany Jerosalema Izy.'
mg1865::mg_42::9::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandefa iraka hialoha Azy Izy; dia nandeha ireo ka niditra tao amin''ny vohitra anankiray izay an''ny Samaritana hamboatra ho Azy.'
mg1865::mg_42::9::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nandray Azy ny olona, satria nandroso toa ho any Jerosalema Izy.'
mg1865::mg_42::9::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''i Jakoba sy Jaona mpianany izany, dia hoy izy: Tompoko, tianao va raha hiteny izahay mba hisy afo milatsaka avy any an-danitra handevona azy*? [*Ampio hoe: toy ny nataon''i Elia]'
mg1865::mg_42::9::55:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nitodika, dia niteny mafy azy*. [*Ampio hoe: ka nanao hoe: Tsy fantatrareo ny toetry ny fanahy izay anareo. Fa ny Zanak''olona tsy tonga hahavery ny ain''olona, fa hamonjy azy]'
mg1865::mg_42::9::56:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''ny vohitra hafa Izy.'
mg1865::mg_42::9::57:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 57
  verse_date_revised: '2022-08-10T06:24:32+0000'
  verse_title: 'Ny teny nataon''i Jesoa tamin''izy telo lahy izay nikasa hanaraka Azy.'
  verse_text: 'Ary nony nandroso teny an-dàlana izy, dia nisy anankiray nanao tamin''i Jesoa hoe: Hanaraka Anao aho na aiza na aiza halehanao.'
mg1865::mg_42::9::58:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Ny amboahaolo* manan-davaka, ary ny voro-manidina manana fialofana; fa ny Zanak''olona tsy mba manana izay hipetrahan''ny lohany. [*volpa]'
mg1865::mg_42::9::59:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamin''ny anankiray koa: Manaraha Ahy. Fa hoy kosa izy: Tompoko, aoka aho aloha handeha handevina ny raiko.'
mg1865::mg_42::9::60:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Aoka ny maty handevina ny maty ao aminy; fa ianao kosa mandehana, ka mitoria ny fanjakan''Andriamanitra.'
mg1865::mg_42::9::61:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny anankiray koa: Tompoko, hanaraka Anao ihany aho; fa aoka aho aloha handeha hanao veloma ny ao an-tranoko.'
mg1865::mg_42::9::62:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 9
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Tsy misy olona mitana fangady tarihina ary miherika ka miendrika ho ao amin''ny fanjakan''Andriamanitra.'
mg1865::mg_42::10::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanirahan''i Jesoa ny fito-polo lahy hialoha Azy.'
  verse_text: 'Ary nony afaka izany, ny Tompo nanendry olona hafa koa, dia fito-polo lahy, ka naniraka azy tsiroaroa hialoha Azy any amin''ny tanàna sy ny tany rehetra izay efa halehany.'
mg1865::mg_42::10::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Be ny vokatra, fa ny mpiasa no vitsy; koa amin''izany mangataha amin''ny Tompon''ny vokatra mba hampandehanany mpiasa hamory ny vokatra.'
mg1865::mg_42::10::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana; indro, Izaho maniraka anareo tahaka ny zanak''ondry eo ampovoan''ny amboadia*. [*lopa]'
mg1865::mg_42::10::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitondra kitapom-bola, na kitapom-batsy, na kapa; ary aza miarahaba olona akory eny an-dàlana.'
mg1865::mg_42::10::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay trano idiranareo, dia lazao aloha hoe: Fiadanana ho amin''ity trano ity.'
mg1865::mg_42::10::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy zanaky ny fiadanana ao, dia hitoetra ao aminy ny fiadanana tononinareo; fa raha tsy izany, dia hiverina ho aminareo ihany izany.'
mg1865::mg_42::10::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitoera ao amin''izany trano izany, ka mihinàna sy misotroa izay zavatra omeny; fa ny mpiasa miendrika hahazo ny karamany. Aza mifindrafindra trano.'
mg1865::mg_42::10::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay tanàna iakaranareo, ka mandray anareo ny olona, dia hano izay zavatra aroso eo anoloanareo.'
mg1865::mg_42::10::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sitrano izay marary ao, ka lazao amin''ny olona hoe: Efa mby akaiky anareo ny fanjakan''Andriamanitra.'
mg1865::mg_42::10::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tanàna iakaranareo, ka tsy mandray anareo kosa ny olona, dia mankanesa eo amin''ny lalambe, ka lazao hoe:'
mg1865::mg_42::10::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vovoky ny tanànanareo aza, izay miraikitra amin''ny tongotray, dia fafànay hiampanga anareo; nefa aoka ho fantatrareo fa efa mby akaiky anareo ny fanjakan''Andriamanitra.'
mg1865::mg_42::10::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo fa ho moramora kokoa ny ho amin''i Sodoma amin''izany andro izany noho ny ho amin''izany tanàna izany.'
mg1865::mg_42::10::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanao, ry Korazina! lozanao, ry Betsaida! fa raha mba tany Tyro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho nibebaka ela izy ka nitafy lamba fisaonana sy nipetraka amin''ny lavenona.'
mg1865::mg_42::10::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho moramora kokoa ny ho amin''i Tyro sy Sidona amin''ny andro fitsarana noho ny ho aminareo.'
mg1865::mg_42::10::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Haetry hatrany amin''ny fiainan-tsy hita* ianao. [*Grika: Hadesy]'
mg1865::mg_42::10::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihaino anareo dia mihaino Ahy; ary izay mandà anareo dia mandà Ahy; ary izay mandà Ahy dia mandà Izay naniraka Ahy.'
mg1865::mg_42::10::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fito-polo lahy niverina tamin''ny fifaliana ka nanao hoe: Tompo o, na dia ny demonia aza dia manaiky anay noho ny anaranao.'
mg1865::mg_42::10::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Izaho nahita an''i Satana latsaka avy tany an-danitra tahaka ny varatra.'
mg1865::mg_42::10::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa nomeko fahefana hanitsaka menarana sy maingoka sy handresy ny hery rehetra ananan''ny fahavalo ianareo, ka tsy hisy hampaninona anareo akory.'
mg1865::mg_42::10::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa aza mifaly ianareo, satria manaiky anareo ny fanahy; fa mifalia, satria voasoratra any an-danitra ny anaranareo.'
mg1865::mg_42::10::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ora izany dia ravoravo tamin''ny Fanahy Masina Jesoa ka nanao hoe: Midera Anao Aho, Raiko o, Tompon''ny lanitra sy ny tany, fa efa nafeninao tamin''ny hendry sy ny manan-tsaina izany ka nasehonao tamin''ny zaza madinika; eny, Raiko, fa izany no sitrakao.'
mg1865::mg_42::10::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny namalian''i Jesoa ny mpahay lalàna anankiray, sy ny nanaovany ny fanoharana ny amin''ilay Samaritana tsara fanahy.'
  verse_text: 'Ny zavatra rehetra dia efa natolotry ny Raiko Ahy; ary tsy misy mahalala ny Zanaka afa-tsy ny Ray, ary ny Ray afa-tsy ny Zanaka sy izay tian''ny Zanaka hanehoana Azy.'
mg1865::mg_42::10::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitodika tamin''ny mpianany Izy, dia nilaza taminy manokana hoe: Sambatra ny maso mahita izay hitanareo.'
mg1865::mg_42::10::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo fa mpaminany sy mpanjaka maro no naniry hahita izay hitanareo, fa tsy nahita, ary naniry nahare izay renareo, fa tsy nahare.'
mg1865::mg_42::10::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy mpahay lalàna anankiray nitsangana ka naka fanahy an''i Jesoa hoe: Mpampianatra o, inona no hataoko handovako fiainana mandrakizay?'
mg1865::mg_42::10::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Inona no voasoratra ao amin''ny lalàna? Manao ahoana no famakinao azy?'
mg1865::mg_42::10::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy namaly ka nanao hoe: Tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra sy ny herinao rehetra ary ny sainao rehetra (Deoteronomia 6:5) ary, Tiava ny namanao tahaka ny tenanao (Levitikosy 19:18).'
mg1865::mg_42::10::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Marina ny navalinao; ataovy izany, dia ho velona ianao.'
mg1865::mg_42::10::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy ta-hanamarina ny tenany ka nanao tamin''i Jesoa hoe: Iza ary no namako?'
mg1865::mg_42::10::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao hoe: Nisy lehilahy anankiray nidina avy tany Jerosalema hankany Jeriko ka azon''ny jiolahy, dia nendahany ny lambany, sady nokapohiny izy, dia nilaozany, rehefa saiky maty.'
mg1865::mg_42::10::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary sendra nisy mpisorona anankiray nidina tamin''izany lalana izany; ary raha nahita an-dralehilahy izy, dia nandalo azy.'
mg1865::mg_42::10::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa ny Levita anankiray, izay tonga teo, dia nahita azy, nefa nandalo koa.'
mg1865::mg_42::10::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy kosa Samaritana anankiray nandeha tamin''ny nalehany ka tonga teo aminy, ary nony nahita azy, dia onena.'
mg1865::mg_42::10::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona izy, ka nofeheziny ny feriny, sady nasiany diloilo sy divay; dia nampitaingeniny tamin''ny bibiny izy, ka nentiny ho any amin''ny tranom-bahiny, dia notsaboiny.'
mg1865::mg_42::10::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony ampitson''iny, dia naka denaria roa izy, ka nomeny ny tompon''ny tranom-bahiny, sady nanao taminy hoe: Tsaboy izy; ary na hoatrinona na hoatrinona no laninao mihoatra noho ireto dia honerako, rehefa miverina aho.'
mg1865::mg_42::10::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa amin''izy telo lahy no ataonao ho naman''ilay azon''ny jiolahy?'
mg1865::mg_42::10::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Ilay niantra azy. Dia hoy Jesoa taminy: Mandehana ianao, ka mba manaova toy izany koa.'
mg1865::mg_42::10::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny amin''i Marta sy Maria.'
  verse_text: 'Ary raha nandeha izy ireo, dia niditra teo amin''ny vohitra anankiray Jesoa; ary nisy vehivavy anankiray atao hoe Marta nampiantrano Azy ho ao an-tranony.'
mg1865::mg_42::10::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanana rahavavy atao hoe Maria, izay nipetraka teo anilan''ny tongotry ny Tompo ka nihaino ny teniny.'
mg1865::mg_42::10::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Marta sahirana tamin''ny fanompoana be; dia avy izy ka nanao hoe: Tompoko, moa tsy mampaninona Anao va ny amelan''ny rahavaviko ahy hanompo irery? koa mba asaovy manampy ahy izy.'
mg1865::mg_42::10::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Tompo namaly ka nanao taminy hoe: Marta, Marta, maro ahina sy maro herehina ianao;'
mg1865::mg_42::10::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 10
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa zavatra iray loha no ilaina; fa Maria no efa nifidy ny anjara tsara, izay tsy halaina aminy.'
mg1865::mg_42::11::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa ny mpianany hivavaka.'
  verse_text: 'Ary Jesoa nivavaka tao amin''ny fitoerana iray, ka rehefa nitsahatra Izy, dia hoy ny mpianany anankiray taminy: Tompoko, mampianara anay hivavaka, tahaka ny nampianaran''i Jaona ny mpianany.'
mg1865::mg_42::11::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Raha mivavaka ianareo, dia ataovy hoe: Ray o* hohamasinina anie ny anaranao. Ho tonga anie ny fanjakanao**. [*Na: Rainay Izay any an-danitra] [** Ampio hoe: (Hatao anie ny sitraponao ety an-tany tahaka ny any an-danitra)]'
mg1865::mg_42::11::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo anay isan''andro izay hanina sahaza ho anay.'
mg1865::mg_42::11::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mamelà ny helokay; fa izahay koa mamela izay rehetra meloka aminay. Ary aza mitondra anay ho amin''ny fakam-panahy. *Ampio hoe: [*fa manafaha anay amin''ny ratsy].'
mg1865::mg_42::11::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Iza moa aminareo no manana sakaiza, izay hankeo aminy mamatonalina ka hanao aminy hoe: Ry sakaiza, ampisambory mofo telo aho;'
mg1865::mg_42::11::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny sakaizako nandeha tamin''ny nalehany, dia tonga atsy amiko, ka tsy misy izay hafahako azy;'
mg1865::mg_42::11::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ilay ao an-trano kosa hamaly ka hanao hoe: Aza manahirana ahy; fa efa mihidy ny varavarana izao, ary ny zanako mandry eto am-pandriana eto amiko; tsy afaka hifoha hanome anao aho?'
mg1865::mg_42::11::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Izaho aminareo: Na dia tsy hiainga hanome azy noho ny fisakaizana aza izy, dia hifoha ihany izy noho ny fitarainany fatratra* ka hanome azy izay ilainy. [*Grika:tsy fitandroany henatra]'
mg1865::mg_42::11::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho aminareo: Mangataha, dia homena ianareo; mitadiava, dia hahita ianareo; dondony, dia hovohana ianareo.'
mg1865::mg_42::11::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana.'
mg1865::mg_42::11::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa aminareo izay ray, raha angatahan''ny zanany mofo, no hanome azy vato? ary raha angatahany hazandrano, no hanome azy menarana ho solon''ny hazandrano?'
mg1865::mg_42::11::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha angatahany atody, no hanome azy maingoka?'
mg1865::mg_42::11::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ianareo, na dia ratsy aza, mahalala hanome zava-tsoa ho an''ny zanakareo, tsy mainka va ny Ray, Izay any an-danitra, no hanome ny Fanahy Masina ho an''izay mangataka aminy?'
mg1865::mg_42::11::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny demoniaka anankiray, sy ny namaliany ny teny ratsy nataon''ny Fariseo.'
  verse_text: 'Ary Jesoa namoaka demonia moana. Ary rehefa nivoaka ny demonia, dia niteny ilay moana; ka dia gaga ny vahoaka.'
mg1865::mg_42::11::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny sasany; Belzeboba, lohan''ny demonia, no amoahany ny demonia.'
mg1865::mg_42::11::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany kosa naka fanahy Azy ka nangataka famantarana taminy avy any an-danitra.'
mg1865::mg_42::11::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nahalala ny heviny, dia nanao taminy hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary ho rava ny ankohonana izay miady an-trano.'
mg1865::mg_42::11::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Satana koa aza no miady an-trano, ahoana no haharetan''ny fanjakany? Fa hoy ianareo: Belzeboba no amoahako ny demonia.'
mg1865::mg_42::11::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha Izaho mamoaka demonia amin''ny herin''i Belzeboba, dia amin''ny herin''iza kosa no amoahan''ny zanakareo azy? koa amin''izany dia ho mpitsara anareo ireo.'
mg1865::mg_42::11::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny rantsan-tanan''Andriamanitra no amoahako ny demonia, dia tonga aminareo tokoa ny fanjakan''Andriamanitra.'
mg1865::mg_42::11::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny mahery mivonona amin''ny fiadiany no miaro ny tranony, dia tsy haninona ny fananany.'
mg1865::mg_42::11::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha avy kosa izay mahery noho izy ka mandresy azy, dia alainy ny fiadiany rehetra izay nitokiany, ary izay azony ho babo dia zarainy.'
mg1865::mg_42::11::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia manahaka.'
mg1865::mg_42::11::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mivoaka amin''ny olona ny fanahy maloto, dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana; ary rehefa tsy mahita, dia hoy izy: Hody any an-tranoko izay nivoahako aho.'
mg1865::mg_42::11::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga izy, dia hitany fa voafafa sy voavoatra ny trano.'
mg1865::mg_42::11::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia mandeha izy ka mitondra fanahy fito hafa koa ratsy noho izy; dia miditra ireo ka mitoetra ao; ary ny faran''izany olona izany dia ratsy noho ny voalohany.'
mg1865::mg_42::11::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Anatra nataon''i Jesoa tamin''ny vehivavy anankiray sy tamin''ny olona maro izay niangona hihaino Azy.'
  verse_text: 'Ary raha nilaza izany Jesoa, dia nisy vehivavy anankiray teo amin''ny vahoaka niantso ka nanao taminy hoe: Sambatra ny kibo izay nitondra Anao sy ny nono izay ninonoanao.'
mg1865::mg_42::11::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nanao hoe: Eny tokoa, kanefa mainka sambatra aza ny mihaino ny tenin''Andriamanitra ka mitandrina izany.'
mg1865::mg_42::11::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niangona ny vahoaka betsaka, dia nilaza hoe Izy: Ity taranaka ity dia taranaka ratsy. Mitady famantarana izy; nefa tsy hisy famantarana homena azy, afa-tsy ny famantarana ny amin''i Jona;'
mg1865::mg_42::11::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka an''i Jona izay famantarana tamin''ny Ninivita, dia ho toy izany koa ny Zanak''olona amin''ity taranaka ity.'
mg1865::mg_42::11::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjakavavy avy tany atsimo dia hiara-mitsangana amin''ny lehilahy amin''ity taranaka ity amin''ny andro fitsarana ka hanameloka azy; fa avy tany amin''ny faran''ny tany izy hihaino ny fahendren''i Solomona; nefa, indro, misy lehibe noho Solomona eto.'
mg1865::mg_42::11::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tany Ninive hiara-mitsangana amin''ity taranaka ity amin''ny andro fitsarana ka hanameloka azy, fa izy nibebaka tamin''ny nitorian''i Jona teny; nefa, indro, misy lehibe noho Jona eto.'
mg1865::mg_42::11::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy olona mandrehitra jiro ka mametraka azy ao an-davaka, na ao ambanin''ny vata famarana, fa apetrany eo amin''ny fanaovan-jiro izy, mba ho hitan''izay miditra ny mazava.'
mg1865::mg_42::11::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masonao no jiron''ny tena; koa raha tsara ny masonao, dia mazava ny tenanao rehetra; fa raha ratsy izy, dia maizina koa ny tenanao.'
mg1865::mg_42::11::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo, fandrao maizina ny mazava izay ao anatinao.'
mg1865::mg_42::11::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, raha mazava ny tenanao rehetra, ka tsy misy maizina, dia hazava avokoa izy rehetra, tahaka ny jiro raha mirehitra tsara ka manazava anao.'
mg1865::mg_42::11::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 37
  verse_date_revised: '2022-08-10T06:25:19+0000'
  verse_title: 'Ny nihinanan''i Jesoa tao an-tranon''ny Fariseo anankiray sy ny nilazany faharatsian''ny Fariseo.'
  verse_text: 'Ary raha mbola niteny Jesoa, dia nisy Fariseo nampiantrano Azy hisakafo ao aminy; dia niditra Izy ka nipetraka nihinana.'
mg1865::mg_42::11::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa gaga ilay Fariseo, raha nahita fa tsy nisasa Izy vao nihinana.'
mg1865::mg_42::11::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Tompo taminy: Ankehitriny ianareo Fariseo dia manadio ny vohon''ny kapoaka sy ny lovia, nefa ny ao anatinareo kosa dia feno rombaka sy faharatsiana.'
mg1865::mg_42::11::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry adala! Tsy izay nanao ny vohony va no nanao ny atiny koa?'
mg1865::mg_42::11::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zavatra eo anatiny no aoka homenareo ho fiantrana*, dia, indro, madio ho anareo ny zavatra rehetra. [*Na: Manaova fiantrana araka izay azonareo atao]'
mg1865::mg_42::11::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lozanareo, Fariseo! fa mandoa ny fahafolon''ny solila sy ny rota ary izay anana famboly rehetra ianareo, nefa lalovanareo ny fitsarana sy ny fitiavana an''Andriamanitra; ireto tokony ho nataonareo, nefa tsy tokony havelanareo ireroana.'
mg1865::mg_42::11::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, Fariseo! fa tia ny fipetrahana aloha ao amin''ny synagoga sy ny fiarahabana any an-tsena ianareo.'
mg1865::mg_42::11::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, fa ianareo dia tahaka ny fasana tsy hita, ka tsy fantatry ny olona izay manitsaka azy.'
mg1865::mg_42::11::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ny mpahay lalàna namaly ka nanao taminy hoe: Mpampianatra o, raha miteny izany Ianao, dia manala baraka anay koa.'
mg1865::mg_42::11::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa: Lozanareo, mpahay lalàna koa! fa mampitondra ny olona entana sarotra entina ianareo, nefa tsy manendry izany entana izany akory ianareo, na dia amin''ny rantsan-tananareo iray aza.'
mg1865::mg_42::11::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo! fa manao ny rarivatom-pasan''ny mpaminany ianareo, nefa ny razanareo ihany no namono azy.'
mg1865::mg_42::11::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia vavolombelona ianareo ka manaiky ny asan''ny razanareo; fa izy no namono azy, ary ianareo kosa manao ny rarivatom-pasany.'
mg1865::mg_42::11::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nanambaran''ny fahendren''Andriamanitra hoe: Haniraka mpaminany sy apostoly ho any aminy Aho, ka ny sasany hovonoiny, ary ny sasany henjehiny,'
mg1865::mg_42::11::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hadinina amin''ity taranaka ity ny ran''ny mpaminany rehetra izay nalatsaka hatramin''ny nanorenana izao tontolo izao,'
mg1865::mg_42::11::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hatramin''ny ran''i Abela ka hatramin''ny ran''i Zakaria, izay novonoina teo anelanelan''ny alitara sy ny tempoly. Eny, lazaiko aminareo marina tokoa fa hadinina amin''ity taranaka ity izany.'
mg1865::mg_42::11::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozanareo, mpahay lalàna! satria nalainareo ny fanalahidin''ny fahalalana; ianareo tsy niditra, ary izay te-hiditra dia nosakananareo.'
mg1865::mg_42::11::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niala teo Izy, dia noteren*''ny mpanora-dalàna sy ny Fariseo fatratra sady nadinadininy zavatra maro. [*Na: tezitra mafy taminy]'
mg1865::mg_42::11::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 11
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nikendry Azy izy ireo hamandrihany Azy tamin''ny teny naloaky ny vavany.'
mg1865::mg_42::12::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nananaran''i Jesoa ny mpianany tsy hatahotra olona, ary tsy hiteny ratsy ny Fanahy Masina.'
  verse_text: 'Ary tamin''izany, raha niangona ny vahoaka betsaka tsy hita isa ka nifanitsaka, Jesoa dia niteny tamin''ny mpianany aloha ka nanao hoe: Mitandrema* ianareo, fandrao azon''ny masirasiran''ny Fariseo, dia ny fihatsaram-belatsihy. [*Na: niteny tamin''ny mpianany ka nanao hoe: Ambony indrindra, mitandrema]'
mg1865::mg_42::12::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy nafenina izay tsy haseho, na takona izay tsy ho fantatra.'
mg1865::mg_42::12::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa na inona na inona teneninareo ao amin''ny maizina dia ho re eo amin''ny mazava; ary izay bitsihinareo mangingina ao amin''ny efi-trano dia hotorina eo amin''ny tampon-trano.'
mg1865::mg_42::12::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko aminareo sakaizako hoe: Aza matahotra izay mamono ny tena, nefa nony afaka izany, dia tsy mahay manao mihoatra noho izany.'
mg1865::mg_42::12::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hasehoko anareo izay hatahoranareo: Matahora Izay manam-pahefana hanary any amin''ny helo*, rehefa novonoiny; eny, hoy Izaho aminareo: Matahora Azy. [*Grika: Gehena]'
mg1865::mg_42::12::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy eranambatry va no vidin''ny tsintsina dimy? nefa tsy misy hadinoina eo anatrehan''Andriamanitra ireny na dia iray akory aza.'
mg1865::mg_42::12::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ny volon-dohanareo aza dia voaisa avokoa. Aza matahotra; fa mihoatra noho ny tsintsina maro ianareo.'
mg1865::mg_42::12::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo: Na zovy na zovy no manaiky Ahy eo anatrehan''ny olona, dia heken''ny Zanak''olona kosa izy eo anatrehan''ny anjelin''Andriamanitra;'
mg1865::mg_42::12::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mandà Ahy eo anatrehan''ny olona, dia holavina kosa izy eo anatrehan''ny anjelin''Andriamanitra.'
mg1865::mg_42::12::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na zovy na zovy no hanao teny hanohitra ny Zanak''olona dia hahazo famelan-keloka; fa izay miteny ratsy* ny Fanahy Masina dia tsy mba hahazo famelan-keloka. [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_42::12::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mitondra anareo ho ao amin''ny synagoga sy ny mpanapaka ary ny manam-pahefana izy, dia aza manahy izay havalinareo, na izay holazainareo;'
mg1865::mg_42::12::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny Fanahy Masina no hampianatra anareo amin''izany ora izany izay mety holazainareo.'
mg1865::mg_42::12::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny namalian''i Jesoa ny lehilahy anankiray izay nangataka Azy hananatra ny rahalahiny, ary ny nilazany ny tsy mahamety ny fieremana.'
  verse_text: 'Ary nisy anankiray teo amin''ny vahoaka nanao tamin''i Jesoa hoe: Mpampianatra o, teneno ny rahalahiko mba hizara lova amiko.'
mg1865::mg_42::12::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Ralehilahy, iza no nanendry Ahy ho mpitsara na mpizara ao aminareo?'
mg1865::mg_42::12::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamin''ny olona: Mitandrema, ka miarova tena mba tsy ho azon''ny fieremana ianareo; fa ny ain''ny olona tsy miankina amin''ny habetsahan''ny zavatra ananany.'
mg1865::mg_42::12::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao fanoharana taminy Izy ka nanao hoe: Ny tanin''ny lehilahy manan-karena anankiray nahavokatra be.'
mg1865::mg_42::12::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nihevitra tao am-pony hoe: Ahoana no hataoko, fa tsy manana fitoerana hamoriako ny vokatro aho?'
mg1865::mg_42::12::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Izao no hataoko: handrava ny trano fitehirizako aho ka hanao izay lehibebe kokoa, ary ao no hamoriako ny variko rehetra sy ny fananako.'
mg1865::mg_42::12::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hilaza amin''ny fanahiko hoe aho: Ry fanahy o, manana fananana be voatahiry ho amin''ny taona maro ianao; mitsahara, mihinàna, misotroa, mifalia.'
mg1865::mg_42::12::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra kosa nanao taminy hoe: Ry adala, anio alina no halaina aminao ny fanahinao, ka ho an''iza izay zavatra noharinao?'
mg1865::mg_42::12::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany izay mihary harena ho an''ny tenany ihany, nefa tsy mba manan-karena ny amin''Andriamanitra.'
mg1865::mg_42::12::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa tamin''ny mpianany: Noho izany dia lazaiko aminareo hoe: Aza manahy ny amin''ny ainareo, izay hohaninareo, na ny amin''ny tenanareo, izay hotafinareo.'
mg1865::mg_42::12::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny aina mihoatra noho ny hanina, ary ny tena noho ny fitafiana.'
mg1865::mg_42::12::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hevero ny goaika; fa tsy mba mamafy na mijinja ireny; ary tsy manana fitoeran-javatra na trano fitehirizana, nefa Andriamanitra mamelona azy; tsy mihoatra lavitra noho ny vorona va ianareo?'
mg1865::mg_42::12::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza moa ao aminareo, na dia manahy aza, no mahay manampy ny andro iainany*, na dia kely monja** aza? [*Na: ny halavan''ny tenany] [**Grika: hakiho iray]'
mg1865::mg_42::12::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha ny kely indrindra aza tsy hainareo, nahoana ianareo no manahy ny amin''ny sisa?'
mg1865::mg_42::12::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hevero ny fanirin''ny voninkazo*; tsy mba miasa na mamoly ireny; nefa lazaiko aminareo: Na dia Solomona teo amin''ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin''ireny. [*Karazan''ny lilia]'
mg1865::mg_42::12::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny ahitra izay any an-tsaha anio, nefa hatao ao am-patana rahampitso, no ampitafin''Andriamanitra toy izany, tsy mainka va ianareo ry kely finoana?'
mg1865::mg_42::12::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza mitady izay hohaninareo na izay hosotroinareo ianareo, ary aza miahanahana*. [*Na: aza aingaingain''ny fanantenana foana]'
mg1865::mg_42::12::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny jentilisa amin''izao tontolo izao dia fatra-pitady izany rehetra izany; fa ny Rainareo mahalala fa tokony ho anareo izany zavatra izany.'
mg1865::mg_42::12::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa katsaho ny fanjakany*; dia hanampy ho anareo izany zavatra izany. [*Na: (ny fanjakan''Andriamanitra)]'
mg1865::mg_42::12::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra, ry ondry vitsy, fa efa sitraky ny Rainareo ny hanome anareo ny fanjakana.'
mg1865::mg_42::12::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amidio ny fanananareo, ka manaova fiantrana; manaova kitapom-bola tsy mety ho tonta ho anareo, dia harena any an-danitra tsy mety ho lany, izay tsy azon''ny mpangalatra, sady tsy misy kalalao manimba.'
mg1865::mg_42::12::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay itoeran''ny harenareo, dia ho any koa ny fonareo.'
mg1865::mg_42::12::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisikina ny valahanareo sy hirehitra ny jironareo;'
mg1865::mg_42::12::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka ianareo ho tahaka ny olona izay miandry ny tompony, raha mody avy amin''ny fampakaram-bady izy, ka nony tonga sy mandondona izy, dia vohany miaraka amin''izay.'
mg1865::mg_42::12::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny mpanompo izay ho hitan''ny tompony miambina, raha avy izy. Lazaiko aminareo marina tokoa fa hisikina ny tompony, dia hampipetraka azy hihinana, dia ho avy ka hanompo azy.'
mg1865::mg_42::12::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na avy amin''ny fiambenana faharoa amin''ny alina izy, na avy amin''ny fiambenana fahatelo, ka mahita toy izany, dia sambatra ireo mpanompo ireo.'
mg1865::mg_42::12::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantaro izao, fa raha fantatry ny tompon-trano izay ora hihavian''ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina.'
mg1865::mg_42::12::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia miomàna koa ianareo; fa ho avy ny Zanak''olona amin''izay ora tsy ampoizinareo.'
mg1865::mg_42::12::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera: Tompoko, izahay va no ilazanao izany fanoharana izany, sa ny olona rehetra?'
mg1865::mg_42::12::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Tompo: Iza moa no mpitandri-draharaha mahatoky sy manan-tsaina, izay hotendren''ny tompony hifehy ny mpanompony mba hanome azy anjara hanina amin''ny fotoana?'
mg1865::mg_42::12::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny mpanompo Izay ho hitan''ny tompony fa, indreo, manao toy izany, raha avy izy.'
mg1865::mg_42::12::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina fa hotendreny ho mpanapaka ny fananany rehetra izy.'
mg1865::mg_42::12::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao anakampo kosa izany mpanompo izany hoe: Maharitra ela ny tompoko vao ho avy, ka dia mikapoka ny ankizilahy sy ny ankizivavy izy sady mihinana sy misotro ka mamo,'
mg1865::mg_42::12::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho avy ny tompon''izany mpanompo izany amin''ny andro izay tsy ampoiziny sy amin''ny ora izay tsy fantany, dia hotapahiny roa* izy ka homeny anjara any amin''ny tsy mahatoky. [*Na: hokapohiny mafy]'
mg1865::mg_42::12::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay mpanompo izay mahalala ny sitrapon''ny tompony ihany ka tsy miomana na manao izay sitraky ny fony dia hokapohina be.'
mg1865::mg_42::12::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tsy nahalala kosa ka nanao izay zavatra tokony hikapohana azy dia hokapohina kely. Fa izay nomena be, dia be no hotadiavina aminy; ary izay nampitehirizina be, dia bebe kokoa no hadinina aminy.'
mg1865::mg_42::12::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga hanipy afo ety ambonin''ny tany Aho, ka manao ahoana ny faniriako mba hirehetan''izany sahady*? [*Na: ary inona intsony no iriko, raha mirehitra sahady izany?]'
mg1865::mg_42::12::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manana batisa hanaovana Ahy batisa Aho, ka manao ahoana ny fahoriako ambara-pahatanterahany!'
mg1865::mg_42::12::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonareo va fa tonga hanome fihavanana ambonin''ny tany Aho? Tsia, hoy Izaho aminareo, fa fampisarahana.'
mg1865::mg_42::12::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatramin''izao dia hisy dimy hisara-tsaina ao an-trano iray, ny telo hanohitra ny roa, ary ny roa hanohitra ny telo.'
mg1865::mg_42::12::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisara-tsaina ireo, ka ny ray hanohitra ny zananilahy, ary ny zanakalahy hanohitra ny rainy; ny reny hanohitra ny zananivavy, ary ny zanakavavy hanohitra ny reniny; ny rafozam-bavy hanohitra ny vinantoni-vavy, ary ny vinantovavy hanohitra ny rafozani-vavy.'
mg1865::mg_42::12::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa tamin''ny vahoaka: Raha mahita rahona miposaka any andrefana ianareo, miaraka amin''izay dia hoy ianareo: Ho avy ny ranonorana; dia tonga izany.'
mg1865::mg_42::12::55:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha avy any atsimo ny rivotra, dia hoy ianareo: Hafana ny andro; dia tonga izany.'
mg1865::mg_42::12::56:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mpihatsaravelatsihy, ny tarehin''ny tany sy ny lanitra dia hainareo fantarina; fa ahoana kosa no tsy ahaizanareo mamantatra izao andro izao?'
mg1865::mg_42::12::57:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ianareo no tsy mahalala mitsara araka ny marina*? [*Na: Nahoana ianareo no tsy mahay mitsara marina avy ao am-ponareo ihany?]'
mg1865::mg_42::12::58:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 58
  verse_date_revised: '2022-07-17T08:21:42+0000'
  verse_title: null
  verse_text: 'Fa raha miara-mandeha amin''ny manana ady aminao ianao hanatrika ny mpanapaka, raha mbola any an-dàlana dia mazotoa manao izay ahafahanao aminy, fandrao hitondra anao any amin''ny mpitsara izy, ary ny mpitsara hanolotra anao amin''ny mpamatotra, ary ny mpamatotra hanao anao ao an-tranomaizina.'
mg1865::mg_42::12::59:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 12
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminao fa tsy ho afaka ao ianao, ambara-pandoanao ny variraiventy farany indrindra.'
mg1865::mg_42::13::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Galiliana sasany izay novonoina, sy ny fanoharana ny amin''ny aviavy tsy namoa.'
  verse_text: 'Ary tamin''izany andro izany nisy ny sasany teo izay nanambara tamin''i Jesoa ny nanjo ny Galiliana, izay naharoharon''i Pilato tamin''ny fanatiny ny ràny.'
mg1865::mg_42::13::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly ka nanao taminy hoe: Ataonareo va fa ireny Galiliana ireny no mpanota mihoatra noho ny Galiliana rehetra, satria nozoin''izany zavatra izany izy?'
mg1865::mg_42::13::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, hoy Izaho aminareo; fa raha tsy mibebaka ianareo, dia ho ringana tahaka azy koa ianareo rehetra.'
mg1865::mg_42::13::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireny valo ambin''ny folo ireny, izay nianjeran''ny tilikambo tao Siloama ka maty, ataonareo va fa mpanota mihoatra noho ny olona rehetra izay monina ao Jerosalema ireny?'
mg1865::mg_42::13::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, hoy Izaho aminareo; fa raha tsy mibebaka ianareo, dia ho ringana tahaka azy koa ianareo rehetra.'
mg1865::mg_42::13::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanao ity fanoharana ity Izy hoe: Nisy olona nanana aviavy nambolena teo an-tanim-boalobony; dia nankeo izy nitady voa taminy, fa tsy nahita.'
mg1865::mg_42::13::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy izy tamin''ny mpamboatra ny tanim-boaloboka; Indro, efa telo taona izay aho no tonga nitady voa tamin''ity aviavy ity, fa tsy nahita; kapao io; nahoana io no manimba ny tany?'
mg1865::mg_42::13::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpamboatra namaly ka nanao taminy hoe: Tompoko, avelao ihany izy amin''ity taona ity mandra-pihadiko manodidina azy, ka hasiako zezika;'
mg1865::mg_42::13::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'angamba mbola hamoa izy; fa raha tsy izany, dia hokapainao ihany.'
mg1865::mg_42::13::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay vehivavy tsy nahatraka, sy ny nanaovany fanoharana ny amin''ny fanaovan-draharaha amin''ny Sabata.'
  verse_text: 'Ary nampianatra tao amin''ny synagoga anankiray Jesoa tamin''ny Sabata.'
mg1865::mg_42::13::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy vehivavy izay nanana fanahy mahafarofy valo ambin''ny folo taona, ary nanjoko izy ka tsy nahatraka akory.'
mg1865::mg_42::13::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahita azy Jesoa, dia niantso azy ka nanao taminy hoe: Ravehivavy, afaka amin''ny rofinao ianao.'
mg1865::mg_42::13::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nametraka ny tanany taminy Izy; ary niaraka tamin''izay dia nitraka ravehivavy sady nankalaza an''Andriamanitra.'
mg1865::mg_42::13::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanapaka ny synagoga dia tezitra, satria Jesoa nahasitrana tamin''ny Sabata, dia namaly ka nanao tamin''ny vahoaka hoe: Henemana no azo anaovan-draharaha; koa avia hositranina amin''izany, fa tsy amin''ny andro Sabata.'
mg1865::mg_42::13::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly azy ny Tompo ka nanao hoe: Ry mpihatsaravelatsihy, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin''ny fihinanam-bilona amin''ny Sabata va ianareo ka mitondra azy hisotro rano?'
mg1865::mg_42::13::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ity vehivavy zanak''i Abrahama ity, izay efa nafatotr''i Satana izao valo ambin''ny folo taona izao, moa tsy tokony hovahana ho afaka amin''izany fatorana izany amin''ny andro Sabata va?'
mg1865::mg_42::13::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nilaza izany Izy, dia nangaihay izay rehetra nanohitra Azy; fa ny vahoaka rehetra nifaly noho ny zavatra malaza rehetra nataony.'
mg1865::mg_42::13::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny voan-tsinapy sy ny masirasira.'
  verse_text: 'Dia hoy Jesoa: Tahaka ny inona ny fanjakan''Andriamanitra? ary inona no hanoharako azy?'
mg1865::mg_42::13::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny voan-tsinapy izy, izay nalain''olona ka namboleny tao an-tanimboly, ary naniry ka tonga hazo; ary ny voro-manidina nitoetra tao amin''ny rantsany.'
mg1865::mg_42::13::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Jesoa: Inona no hanoharako ny fanjakan''Andriamanitra?'
mg1865::mg_42::13::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny masirasira izy, izay nalain''ny vehivavy anankiray ka nataony* tao amin''ny koba intelon''ny famarana, mandra-pahazon''ny masirasira azy rehetra. [*Grika: nafeniny]'
mg1865::mg_42::13::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nanontaniany an''i Jesoa na ho vitsy ny olona hovonjena, na tsia.'
  verse_text: 'Ary Jesoa nandeha nitety ny tanàna sy ny vohitra nampianatra sady nandroso hankany Jerosalema.'
mg1865::mg_42::13::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny anankiray taminy; Tompoko, moa vitsy va no hovonjena? Ary hoy Izy tamin''ny olona:'
mg1865::mg_42::13::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miseseha hiditra amin''ny varavarana ety ianareo; fa hoy Izaho aminareo: Maro no hitady hiditra, fa tsy ho afaka.'
mg1865::mg_42::13::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa mitsangana ny tompon-trano ka manidy ny varavarana, ary ianareo mijanona eo ala-trano mandondòna ny varavarana ka manao hoe: Tompoko, vohay izahay, dia hamaly Izy ka hanao aminareo hoe: Tsy fantatro na avy taiza na avy taiza ianareo;'
mg1865::mg_42::13::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary amin''izay ianareo dia hanao hoe: Nihinana sy nisotro teo anatrehanao izahay, ary nampianatra teny an-dalambenay Ianao.'
mg1865::mg_42::13::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy hiteny hoe: Lazaiko aminareo: Tsy fantatro na avy taiza na avy taiza ianareo; mialà amiko, ianareo rehetra mpanao meloka.'
mg1865::mg_42::13::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any no hisy ny fitomaniana sy ny fikitroha-nify, raha mahita an''i Abrahama sy Isaka sy Jakoba ary ny mpaminany rehetra eo amin''ny fanjakan''Andriamanitra ianareo, fa ny tenanareo kosa dia voaroaka any ivelany.'
mg1865::mg_42::13::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tonga avy any atsinanana sy avy any andrefana ary avy any avaratra sy avy any atsimo ireny ka hipetraka hihinana eo amin''ny fanjakan''Andriamanitra.'
mg1865::mg_42::13::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, misy ny aoriana ho aloha, ary misy ny aloha ho aoriana.'
mg1865::mg_42::13::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Ny nilazan''ny Fariseo tamin''i Jesoa fa Heroda ta-hamono Azy.'
  verse_text: 'Tamin''izany ora izany indrindra dia nisy Fariseo sasany nankeo amin''i Jesoa ka nanao taminy hoe: Mandehana Ianao, ka mialà eto; fa ta-hamono Anao Heroda.'
mg1865::mg_42::13::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Mandehana, lazao amin''izany amboahaolo* izany hoe: Indro, mamoaka demonia sy mahasitrana Aho anio sy ampitso, ary raha afaka ampitso dia hotanterahina ny amiko. [*volpa]'
mg1865::mg_42::13::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy maintsy mandeha ihany Aho anio sy ampitso sy raha afaka ampitso; fa ny mpaminany tsy azo vonoina, raha tsy any Jerosalema.'
mg1865::mg_42::13::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay nirahina any aminao, impiry Aho no ta-hanangona ny zanakao tahaka ny fanomban''ny akoho ny zanany ao ambanin''ny elany, fa tsy nety ianareo!'
mg1865::mg_42::13::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 13
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, avela ho anareo ny tranonareo. ary lazaiko aminareo: Tsy hahita Ahy intsony ianareo mandra-pilazanareo hoe: Isaorana anie Izay avy amin''ny anaran''i Jehovah (Salamo 118:26).'
mg1865::mg_42::14::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanasan''ny Fariseo anankiray an''i Jesoa, sy ny nahasitranany lehilahy narary manirano, ary ny nitoriany teny tamin''ny olona tao an-trano.'
  verse_text: 'Ary raha niditra mba hihinana tao an-tranon''ny loholona anankiray amin''ny Fariseo Izy tamin''ny Sabata, dia nizaha taratra Azy ireo.'
mg1865::mg_42::14::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy olona manirano anankiray teo anatrehany.'
mg1865::mg_42::14::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao tamin''ny mpahay lalàna sy ny Fariseo hoe: Mety va ny mahasitrana amin''ny Sabata, sa tsia?'
mg1865::mg_42::14::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy niteny ireo. Ary Izy nanendry ilay marary, dia nahasitrana azy ka nandefa azy handeha.'
mg1865::mg_42::14::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nanao tamin''ireo hoe: Iza moa aminareo, raha manana boriky na omby latsaka ao an-davaka fantsakana, no tsy hampakatra azy miaraka amin''izay na dia amin''ny andro Sabata aza?'
mg1865::mg_42::14::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nahavaly ny amin''izany zavatra izany izy.'
mg1865::mg_42::14::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanao fanoharana tamin''izay nasaina, raha nahita azy mifidy ny fitoerana aloha, ka nanao taminy hoe:'
mg1865::mg_42::14::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy maka anao ho any amin''ny fampakaram-bady, aza mipetraka eo amin''ny fitoerana aloha, fandrao hisy olona nalaina izay mihaja kokoa noho ianao,'
mg1865::mg_42::14::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho avy izay nanasa anao sy izy ka hilaza aminao hoe: Omeo toerana io olona io: dia ho menatra ianao ka hifindra ho any amin''ny fitoerana aoriana indrindra.'
mg1865::mg_42::14::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy manasa anao, mandehana ka mipetraha eo amin''ny fitoerana aoriana indrindra, ary rehefa tonga ilay nanasa anao, dia mahazo manao aminao hoe: Ry sakaiza, mandrosoa etsy alohaloha kokoa; dia hahazo haja eo imason''izay rehetra miara-mipetraka mihinana aminao ianao.'
mg1865::mg_42::14::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra manandra-tena no haetry; ary izay manetry tena no hasandratra.'
mg1865::mg_42::14::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa tamin''ilay nanasa Azy kosa: Raha manasa olona amin''ny sakafo antoandro na ny sakafo hariva ianao, dia aza ny sakaizanao, na ny rahalahinao, na ny havanao, na ny namanao manan-karena, no asainao, fandrao hanasa anao kosa ireo, ka dia ho voavaliny ianao.'
mg1865::mg_42::14::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manao fanasana ianao, dia asao ny malahelo, ny kilemaina, ny mandringa, ny jamba;'
mg1865::mg_42::14::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ho sambatra ianao, satria tsy mba manan-kavaly ireo; fa hovaliana kosa ianao amin''ny fitsanganan''ny marina.'
mg1865::mg_42::14::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''izay niara-nipetraka nihinana taminy dia nandre izany ka nanao taminy hoe: Sambatra izay hihinan-kanina ao amin''ny fanjakan''Andriamanitra.'
mg1865::mg_42::14::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Nisy olona anankiray nanao fanasana lehibe ka nanasa olona maro.'
mg1865::mg_42::14::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naniraka ny mpanompony izy tamin''ny fotoana fisakafoana hilaza amin''izay efa nasaina hoe: Andeha, fa efa voavoatra izao ny fanasana.'
mg1865::mg_42::14::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy rehetra dia nitovy saina, ka samy nanao fialàna. Hoy ny voalohany taminy: Efa nividy tany aho ka tsy maintsy mandeha hizaha azy; masïna ianao, ekeo ny fandavako.'
mg1865::mg_42::14::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny anankiray koa: Efa nividy omby folo aho ka handeha hamantatra azy; masïna ianao, ekeo ny fandavako.'
mg1865::mg_42::14::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny anankiray koa: Efa nampaka-bady aho, koa amin''izany tsy afaka mankany.'
mg1865::mg_42::14::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ilay mpanompo, dia nambarany tamin''ny tompony izany. Dia tezitra ny tompon-trano ka nanao tamin''ilay mpanompony hoe: Mandehana faingana ho eny amin''ny lalambe sy ny sakeli-dalana eto an-tanàna, ka ampidiro ny malahelo sy ny kilemaina sy ny jamba ary ny mandringa.'
mg1865::mg_42::14::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay mpanompo: Tompoko, efa natao izay nandidianao, ary mbola tsy feno ihany ny trano.'
mg1865::mg_42::14::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny tompo tamin''ilay mpanompony: Mandehana ho eny amin''ny lalambe sy ny sisim-boly, ka tereo ny olona hiditra, mba ho feno ny tranoko.'
mg1865::mg_42::14::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo: Tsy hisy hanandrana ny nahandroko ireny olona nasaiko ireny na dia iray akory aza.'
mg1865::mg_42::14::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa tamin''ny olona maro nanaraka Azy izay tokony ho toetra ny mpianany.'
  verse_text: 'Ary nisy vahoaka betsaka niaraka tamin''i Jesoa, dia nitodika Izy ka nanao taminy hoe:'
mg1865::mg_42::14::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manaraka Ahy ka tsy mankahala ny rainy sy ny reniny sy ny vadiny sy ny zanany sy ny rahalahiny sy ny anabaviny, eny, ary ny ainy koa aza, dia tsy azo ekena ho mpianatro izy.'
mg1865::mg_42::14::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na zovy na zovy no tsy mitondra ny hazo fijaliana ka tsy manaraka Ahy, dia tsy azo ekena ho mpianatro izy.'
mg1865::mg_42::14::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa aminareo, raha ta-hanao tilikambo, no tsy mipetraka aloha mihevitra izay ho lany hanaovany izany, na misy hahavitany azy, na tsia?'
mg1865::mg_42::14::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao, rehefa nanao ny fanorenana izy ka tsy mahavita, dia handatsa azy izay rehetra mahita'
mg1865::mg_42::14::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hanao hoe: Io olona io dia nanomboka nanao trano, fa tsy nahavita.'
mg1865::mg_42::14::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza moa no mpanjaka, raha handeha hiady amin''ny mpanjaka hafa, no tsy mipetraka aloha mba haka hevitra tsara, na mahay mandresy ilay mitondra roa alina amin''ny iray alina izy, na tsia?'
mg1865::mg_42::14::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tsy izany, raha mbola lavitra ny mpanjaka anankiray, dia hampitondra teny izy ka hangataka fihavanana.'
mg1865::mg_42::14::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa ianareo rehetra, izay tsy mahafoy izay rehetra anananareo, dia tsy azo ekena ho mpianatro.'
mg1865::mg_42::14::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsara ny sira; fa raha ny sira aza no tonga matsatso, inona indray no hahasira azy?'
mg1865::mg_42::14::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 14
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahasoa ny tany na ny zezika izy, fa harian''ny olona. Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.'
mg1865::mg_42::15::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny ondry very, sy ny farantsakely very, ary ilay zanaka adala.'
  verse_text: 'Ary ny mpamory hetra rehetra sy ny mpanota nanatona hihaino an''i Jesoa.'
mg1865::mg_42::15::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nimonomonona ny Fariseo sy ny mpanora-dalàna ka nanao hoe: Ilehity mandray ny mpanota ka miara-mihinana aminy.'
mg1865::mg_42::15::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nanao izao fanoharana izao taminy hoe:'
mg1865::mg_42::15::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no olona aminareo, izay manana ondry zato, ka very ny anankiray, no tsy mandao ny sivy amby sivi-folo any an''efitra ka mandeha hitady ilay very mandra-pahitany azy?'
mg1865::mg_42::15::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa hitany iny, dia ataony eo an-tsorony, ka dia faly izy;'
mg1865::mg_42::15::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa tonga ao an-trano izy, dia mamory ny sakaizany sy ny namany ka manao aminy hoe: Avia hiara-mifaly amiko; fa efa hitako ilay ondriko very.'
mg1865::mg_42::15::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo fa hisy fifaliana toy izany any an-danitra ny amin''ny mpanota iray izay mibebaka noho ny amin''ny olona marina sivy amby sivi-folo, izay tsy misy tokony hibebahany.'
mg1865::mg_42::15::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza moa no vehivavy manana farantsakely* folo, ka very ny anankiray, no tsy mampirehitra jiro ka mifafa trano sy mitady fatratra mandra-pahitany azy? [*Grika:drakma]'
mg1865::mg_42::15::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitany iny, dia mamory ny vehivavy sakaizany sy ny namany izy ka manao hoe: Avia hiara-mifaly amiko; fa efa hitako ny farantsakely* izay very. [*Grika: drakma]'
mg1865::mg_42::15::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo fa misy fifaliana toy izany eo anatrehan''ny anjelin''Andriamanitra ny amin''ny mpanota iray izay mibebaka.'
mg1865::mg_42::15::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa: Nisy lehilahy anankiray nanana zanaka mirahalahy.'
mg1865::mg_42::15::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay zandriny tamin-drainy: Raiko, omeo ahy ny anjara-fananana tokony ho ahy. Dia nozarainy tamin''izy mirahalahy ny fananany.'
mg1865::mg_42::15::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka kelikely, dia nangonin''ilay zandriny ny fananany rehetra, ka lasa nankany an-tany lavitra izy, dia nandany ny fananany tamin''ny fiveloman-dratsy tany.'
mg1865::mg_42::15::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa laniny avokoa ny fananany rehetra, dia nisy mosary mafy tamin''izany tany izany, ka nahantra izy.'
mg1865::mg_42::15::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha izy ka niankina tamin''ny tompon-tany anankiray tamin''izany tany izany, ary dia nirahiny tany an-tsahany hiandry kisoa.'
mg1865::mg_42::15::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satriny hameno ny kibony tamin''ny voan-kazo fihinan''ny kisoa, fa tsy nisy nanome azy.'
mg1865::mg_42::15::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nody ny sainy, dia hoy izy: Indrisy maro ny olona karamain''ny raiko manan-kanina be dia be, fa izaho kosa maty mosary eto!'
mg1865::mg_42::15::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiainga aho, dia hody any amin''ny raiko ka hanao aminy hoe: Raiko o, efa nanota tamin''ny lanitra sy teo anatrehanao aho'
mg1865::mg_42::15::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy miendrika hatao hoe zanakao intsony; fa ataovy tahaka ny anankiray amin''ny olona karamainao aho.'
mg1865::mg_42::15::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga izy ka nankany amin-drainy. Fa raha mbola lavitra izy, dia tazan-drainy, ary onena azy izy ka nihazakazaka, dia namihina ny vozony sady nanoroka azy.'
mg1865::mg_42::15::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay zanany nanao taminy hoe: Raiko o, efa nanota tamin''ny lanitra sy teo anatrehanao aho ka tsy miendrika hatao hoe zanakao intsony.'
mg1865::mg_42::15::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rainy kosa nanao tamin''ny ankizilahiny hoe: Alao haingana ny akanjo tsara indrindra ka ampiakanjoy azy; ary asio peratra ny tanany sy kapa ny tongony;'
mg1865::mg_42::15::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ento ny zanak''omby nafahy, ka vonoy; ary aoka isika hihinana sy hifaly;'
mg1865::mg_42::15::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ity zanako ity efa maty, fa velona indray, ary efa very, fa hita indray. Dia nifaly izy.'
mg1865::mg_42::15::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tany an-tsaha ny zanany lahimatoa; ary nony nody izy ka mby teo akaiky ny trano, dia nandre zava-maneno sy dihy.'
mg1865::mg_42::15::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso ankizilahy anankiray izy ka nanontany azy izay anton''izany zavatra izany.'
mg1865::mg_42::15::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay ankizilahy taminy: Tonga ny rahalahinao, ka namono ny zanak''omby nafahy ny rainao, satria efa tafaverina soa aman-tsara ato aminy izy.'
mg1865::mg_42::15::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra izy ka tsy nety niditra; ary nivoaka rainy ka nampandroso azy.'
mg1865::mg_42::15::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy namaly ka nanao tamin-drainy hoe: Indro, izay ela izay aho no efa nanompo anao ka tsy mbola nandika ny didinao na dia indray mandeha akory aza; nefa izaho tsy mbola nomenao na dia zanak''osy aza mba hifaliako amin''ny sakaizako;'
mg1865::mg_42::15::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha vao tonga kosa io zanakao io, izay efa nandany ny fanananao tamin''ny vehivavy janga, dia namono ho azy ny zanak''omby nafahy ianao.'
mg1865::mg_42::15::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy rainy taminy: Anaka, ianao eto amiko mandrakariva, ary anao avokoa izay rehetra ananako.'
mg1865::mg_42::15::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mety ny mifaly sy miravoravo; fa ity rahalahinao ity efa maty, fa velona indray, ary efa very, fa hita indray.'
mg1865::mg_42::16::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ilay mpitandrina tsy marina.'
  verse_text: 'Ary hoy koa Jesoa tamin''ny mpianatra: Nisy olona manan-karena anankiray nanana mpitandrina ny fananany; ary ilehiny dia nampangain''olona taminy fa mandany ny fananany.'
mg1865::mg_42::16::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampaka azy izy ka nanao taminy hoe: Ahoana izao fandrenesako anao izao? Mamoaha ny amin''ny fitandremanao ny fananako; fa tsy mahazo mitandrina ny fananako intsony ianao.'
mg1865::mg_42::16::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay mpitandrina ny fananana nanao anakampo hoe: Inona ange no hataoko, fa esorin''ny tompoko amin''ny fitandremana ny fananany aho? Ny miasa tany tsy tratry ny aiko; ny mangataka mahamenatra ahy.'
mg1865::mg_42::16::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro izay hataoko, mba hisy handray ahy ho ao an-tranony, rehefa voaisotra amin''ny fitandremana ny fananana aho.'
mg1865::mg_42::16::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso izay rehetra nitrosa tamin''ny tompony izy hankao aminy ka nanao tamin''ny voalohany hoe: Hoatrinona no trosan''ny tompoko aminao?'
mg1865::mg_42::16::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy io: Diloilo injaton''ny famarana*. Dia hoy izy taminy koa: Inty, raiso ny taratasinao, ary mipetraha faingana, ka dimam-polo no soraty. [*Grika: bata]'
mg1865::mg_42::16::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamin''ny anankiray koa: Hoatrinona kosa no trosa aminao? Ary hoy izy: Vary injaton''ny famarana*. Dia hoy izy taminy koa: Inty, raiso ny taratasinao ka valo-polo no soraty. [*Grika: kora]'
mg1865::mg_42::16::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tompony nidera ilay mpitandrina tsy marina, satria nanan-tsaina izy; fa ny zanak''izao tontolo izao dia manan-tsaina kokoa ny amin''ny karazany noho ny zanaky ny mazava.'
mg1865::mg_42::16::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izaho aminareo: Aoka ny mamôna tsy marina ho entinareo mahazo sakaiza, mba horaisin''ireo ho any amin''ny fonenana mandrakizay ianareo, rehefa lany izany.'
mg1865::mg_42::16::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay mahatoky amin''ny kely indrindra dia mahatoky koa amin''ny be; ary izay tsy marina amin''ny kely indrindra dia tsy marina koa amin''ny be.'
mg1865::mg_42::16::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha tsy mahatoky amin''ny mamôna tsy marina ianareo, iza no hatoky anareo ny amin''ny tena harena?'
mg1865::mg_42::16::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mahatoky amin''izay an''olona ianareo, iza no hanome anareo izay anareo?'
mg1865::mg_42::16::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mpanompo mahay manompo tompo roa; fa ny anankiray ho halany, ary anankiray ho tiany; na ny anankiray hombany, ary ny anankiray hohamavoiny. Tsy mahay manompo an''Andriamanitra sy mamôna ianareo.'
mg1865::mg_42::16::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny nananaran''i Jesoa ny Fariseo, sy ny nilazany ny amin''ilay mpanan-karena sy Lazarosy.'
  verse_text: 'Ary ny Fariseo, izay fatra-pitia vola, raha nandre izany rehetra izay, dia naneso an''i Jesoa.'
mg1865::mg_42::16::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Ianareo dia mpanamarin-tena eo anatrehan''ny olona, nefa Andriamanitra mahalala ny fonareo; fa izay zavatra heverin''ny olona ho ambony dia fahavetavetana eo anatrehan''Andriamanitra.'
mg1865::mg_42::16::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalàna sy ny mpaminany dia hatramin''i Jaona; ary hatramin''izany no efa nitoriana ny filazantsaran''ny fanjakan''Andriamanitra, ary misesika izay rehetra miditra eo.'
mg1865::mg_42::16::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho moramora kokoa ny hahafoanan''ny lanitra sy ny tany noho ny hahafoanan''ny tendron-tsoratra iray monja aza amin''ny lalàna.'
mg1865::mg_42::16::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra misao-bady ka mampakatra ny hafa dia mijangajanga; ary izay mampakatra vehivavy voasaotra dia mijangajanga koa.'
mg1865::mg_42::16::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy lehilahy manan-karena anankiray niakanjo volomparasy sy rongony fotsy madinika sady nanaram-po fatratra isan''andro tamin''ny fahafinaretana.'
mg1865::mg_42::16::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olo-malahelo ferena anankiray atao hoe Lazarosy napetraka teo anilan''ny vavahadiny;'
mg1865::mg_42::16::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary naniry mba hihinana izay latsaka avy tamin''ny latabatr''ilay manan-karena izy, fa ny alika kosa no avy* ka nilelaka ny feriny. [*Na: ary ny alika koa dia avy]'
mg1865::mg_42::16::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maty ilay malahelo, dia nentin''ny anjely ho any an-tratran''i Abrahama; ary maty koa ilay manan-karena, dia nalevina;'
mg1865::mg_42::16::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nijaly tao amin''ny fiainan-tsy hita* izy ka niandrandra, dia nahita an''i Abrahama teny lavitra eny sy Lazarosy teo an-tratrany. [*Grika: Hadesy]'
mg1865::mg_42::16::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy niantso ka nanao hoe: Ry Abrahama raiko o, mamindrà fo amiko, ka iraho Lazarosy mba hanoboka ny tendron''ny rantsan-tanany amin''ny rano mba hampangatsiaka ny lelako; fa fadiranovana aho eto anatin''ity lelafo ity.'
mg1865::mg_42::16::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Abrahama: Anaka, tsarovy fa ianao efa nahazo ny zava-tsoanao tamin''ny andro niainanao, ary Lazarosy kosa ny zava-dratsy; fa ankehitriny izy no ampifalinay . ary ianao kosa no fadiranovana.'
mg1865::mg_42::16::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mihoatra noho izany rehetra izany, misy tevana makadiry ajadona ao anelanelantsika, mba tsy ho afa-mita hankeny aminareo izay te-hiala ety, ary ny tsy afa-mita hankety aminay izay eny.'
mg1865::mg_42::16::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy: Mangataka aminao ary aho, ry raiko: mba iraho Lazarosy hankany amin''ny tranon''ny raiko'
mg1865::mg_42::16::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa manana rahalahy dimy aho), mba hilaza tsara aminy, fandrao mba ho tonga amin''ity fijaliana ity koa izy.'
mg1865::mg_42::16::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Abrahama taminy: Manana an''i Mosesy sy ny mpaminany izy; aoka hihaino ireo izy.'
mg1865::mg_42::16::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa izy: Tsia, ry Abrahama, raiko; fa raha misy miala amin''ny maty hankany aminy, dia hibebaka izy.'
mg1865::mg_42::16::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 16
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Abrahama taminy: Raha tsy mihaino an''i Mosesy sy ny mpaminany izy, dia tsy hety hino izy, na dia misy mitsangana amin''ny maty aza.'
mg1865::mg_42::17::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa ny mpianany ny amin''ny fandeferana sy ny finoana ary ny fanetren-tena.'
  verse_text: 'Ary hoy Jesoa tamin''ny mpianany: Tsy maintsy ho avy ny fahatafintohinana; nefa lozan''izay olona mahatonga izany!'
mg1865::mg_42::17::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aleo anantonana vato lehibe* fikosoham-bary ny vozony, ka atsipy any an-dranomasina izy, toy izay hahatafintohina na dia ny anankiray amin''ireo madinika ireo aza. [*Na: ahodim-boriky]'
mg1865::mg_42::17::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema ianareo; fa raha manota ny rahalahinao, dia teneno mafy izy, ka raha mibebaka izy, dia mamelà ny helony.'
mg1865::mg_42::17::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha manota aminao impito indray andro izy, ary mivalo aminao impito kosa manao hoe; Mibebaka aho, dia mamelà ny helony.'
mg1865::mg_42::17::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Apostoly tamin''ny Tompo: Ampitomboy ny finoanay.'
mg1865::mg_42::17::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Tompo: Raha manana finoana na dia hoatra ny voan-tsinapy iray aza ianareo, dia azonareo lazaina amin''io vorihazo io hoe: Miongota, ary aoka hambolena ao anatin''ny ranomasina, dia hanaiky anareo izy.'
mg1865::mg_42::17::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iza moa aminareo no manana mpanompo miasa tany, na miandry ondry, ka raha tonga avy tany an-tsaha ilay mpanompo, dia hanao aminy hoe: Avia faingana, ka mipetraha hihinana?'
mg1865::mg_42::17::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hilaza aminy kosa hoe va izy: Manamboara izay hisakafoako, ary misikìna, ka manompoa ahy ambara-pihinako sy hisotroako; fa rehefa vita izany, dia vao mahazo mihinana sy misotro ianao?'
mg1865::mg_42::17::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa misaotra izany mpanompo izany va izy, satria nataony izay nandidiany?'
mg1865::mg_42::17::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa ianareo, rehefa vitanareo izay rehetra nandidiana anareo, dia ataovy hoe: Mpanompo tsy mahasoa izahay; ny tokony ho nataonay ihany no efa nataonay.'
mg1865::mg_42::17::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny nanadiovan''i Jesoa ny boka folo lahy.'
  verse_text: 'Ary raha niakatra ho any Jerosalema Jesoa, dia nandeha namaky an''i* Samaria sy Galilia. [*Na: Teny anelanelan''i]'
mg1865::mg_42::17::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niditra tao amin''ny vohitra anankiray Izy, dia nisy boka folo lahy nifanena taminy, izay nijanona teny lavitra eny.'
mg1865::mg_42::17::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo niantso mafy nanao hoe: Ry Jesoa Tompo o, mamindrà fo aminay.'
mg1865::mg_42::17::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitany ireo, dia hoy Izy taminy: Mandehana, misehoa amin''ny mpisorona. Ary rehefa lasa izy ireo, dia nadio teny am-pandehanana.'
mg1865::mg_42::17::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ireo, raha nahita fa sitrana izy, dia niverina ka nankalaza an''Andriamanitra tamin''ny feo mahery'
mg1865::mg_42::17::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady niankohoka tamin''ny tongotr''i Jesoa ka nisaotra Azy; ary Samaritana iny lehilahy iny.'
mg1865::mg_42::17::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Jesoa ka nanao hoe: Tsy efa voadio avokoa va izy folo lahy? fa aiza ny sivy?'
mg1865::mg_42::17::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy nisy hita niverina hanome voninahitra an''Andriamanitra afa-tsy ity olona hafa firenena ity ihany va?'
mg1865::mg_42::17::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Mitsangàna, mandehana; ny finoanao no efa nahavonjy anao.'
mg1865::mg_42::17::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa ny amin''ny fanjakany sy ny hihaviany indray.'
  verse_text: 'Ary Jesoa, nony nanontanian''ny Fariseo izay andro hihavian''ny fanjakan''Andriamanitra, dia namaly azy hoe: Tsy misehoseho no fihavin''ny fanjakan''Andriamanitra.'
mg1865::mg_42::17::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona tsy hanao hoe: Indro, ety! na ery ! fa, indro, ny fanjakan''Andriamanitra dia ao anatinareo*. [*Na: efa eo aminareo]'
mg1865::mg_42::17::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy tamin''ny mpianatra: Ho avy ny andro hanirianareo hahita ny anankiray amin''ny andron''ny Zanak''olona, nefa tsy hahita ianareo.'
mg1865::mg_42::17::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona hilaza aminareo hoe: Indro, ery ! na: Indro, ety! nefa aza mandeha ianareo, na manaraka azy.'
mg1865::mg_42::17::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny helatra manelatra hatramin''ny faravodilanitra ka mahazava hatramin''ny farany koa, dia ho toy izany ny Zanak''olona amin''ny androny,'
mg1865::mg_42::17::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy maintsy mijaly mafy Izy aloha ka holavin''ity taranaka ity.'
mg1865::mg_42::17::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka ny tamin''ny andron''i Noa, dia hisy toy izany koa amin''ny andron''ny Zanak''olona:'
mg1865::mg_42::17::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'nihinana izy, nisotro izy, nampaka-bady izy, navoaka hampakarina izy, mandra-pihavin''ny andro izay nidiran''i Noa tao amin''ny sambo-fiara, dia tonga ny Safo-drano ka nandringana azy rehetra.'
mg1865::mg_42::17::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 28
  verse_date_revised: '2022-12-30T06:28:08+0000'
  verse_title: null
  verse_text: 'Ary tahaka ny tamin''ny andron''i Lota koa: nihinana izy, nisotro izy, nividy izy, nivarotra izy, namboly izy, nanao trano izy;'
mg1865::mg_42::17::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tamin''ny andro izay nivoahan''i Lota avy tao Sodoma, dia nisy afo sy solifara nilatsaka avy tany an-danitra ka nandringana azy rehetra.'
mg1865::mg_42::17::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tahaka izany koa amin''ny andro hisehoan''ny Zanak''olona.'
mg1865::mg_42::17::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany izay eo an-tampon-trano, ary ny entany ao an-trano, dia aoka tsy hidina haka izany; ary toy izany koa izay any an-tsaha, aoka tsy hiverina amin''izay efa nilaozany izy.'
mg1865::mg_42::17::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny vadin''i Lota.'
mg1865::mg_42::17::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na zovy na zovy mitady hamonjy ny ainy dia hahavery azy; ary na zovy na zovy no hahavery ny ainy dia hahazo izany.'
mg1865::mg_42::17::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo fa amin''izany alina izany hisy roa lahy miray fandriana; ny anankiray horaisina, ary ny anankiray havela.'
mg1865::mg_42::17::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisy roa vavy miara-mitoto vary; ny anankiray horaisina, ary ny anankiray havela.'
mg1865::mg_42::17::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: Hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela]'
mg1865::mg_42::17::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 17
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly izy ireo ka nanao taminy hoe: Aiza, Tompoko? Ary hoy Izy taminy: Izay itoeran''ny faty, dia any koa no hiangonan''ny voromahery.'
mg1865::mg_42::18::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ilay mpitondratena nahery nangataka.'
  verse_text: 'Ary Jesoa nilaza fanoharana taminy, fa tsy mety raha tsy mivavaka mandrakariva izy ka tsy reraka,'
mg1865::mg_42::18::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao hoe: Nisy mpitsara tao an-tanàna anankiray, izay tsy natahotra an''Andriamanitra, na mena-maso olona.'
mg1865::mg_42::18::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpitondratena tao amin''izany tanàna izany, izay nankao aminy matetika ka nanao hoe: Omeo rariny aho amin''ilay manana ady amiko.'
mg1865::mg_42::18::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nanaiky izy aloha; fa rehefa afaka izany, dia nanao anakampo hoe izy: Na dia tsy matahotra an''Andriamanitra aza aho sady tsy mena-maso olona,'
mg1865::mg_42::18::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba homeko rariny ihany io mpitondratena io, fa manahirana ahy izy, fandrao ho avy mandrakariva izy ka hampahasosotra ahy.'
mg1865::mg_42::18::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Tompo: Henoy izay lazain''ilay mpitsara tsy marina.'
mg1865::mg_42::18::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra tsy hanome rariny ny olom-boafidiny va, izay mitaraina aminy andro aman''alina, ary moa hitaredretra va Izy?'
mg1865::mg_42::18::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo fa homeny rariny faingana izy. Kanefa, raha avy ny Zanak''olona, moa hahita finoana ety ambonin''ny tany va Izy?'
mg1865::mg_42::18::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny Fariseo sy ny mpamory hetra.'
  verse_text: 'Ary Jesoa nanao ity fanoharana ity tamin''ny sasany izay natoky tena ho marina ka namingavinga ny hafa;'
mg1865::mg_42::18::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy roa lahy niakatra teo an-kianjan''ny tempoly hivavaka, ny anankiray Fariseo, ary ny anankiray mpamory hetra.'
mg1865::mg_42::18::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay Fariseo nitsangana ka nivavaka nitokana hoe: Andriamanitra o, misaotra Anao aho fa tsy mba tahaka ny olona sasany, izay mpanao an-keriny, tsy marina, mpijangajanga, na tahaka io mpamory hetra io aza.'
mg1865::mg_42::18::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifady indroa isan-kerinandro aho; mandoa ny fahafolon-karena amin''izay azoko rehetra aho.'
mg1865::mg_42::18::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ilay mpamory hetra kosa nijanona teny lavitra eny, sady tsy nety niandrandra ny lanitra akory, fa niteha-tratra ka nanao hoe: Andriamanitra o, mamindrà fo amiko mpanota.'
mg1865::mg_42::18::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo: Izany lehilahy izany nidina tany an-tranony efa nohamarinina noho ny anankiray; fa izay rehetra manandra-tena no haetry, ary izay rehetra manetry tena no hasandratra.'
mg1865::mg_42::18::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny nitondrana zazakely ho eo amin''i Jesoa.'
  verse_text: 'Ary nisy nitondra zazakely koa ho eo amin''i Jesoa mba hotendreny; fa raha vao nahita izany ny mpianatra, dia nandrara azy.'
mg1865::mg_42::18::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa niantso ireo hankeo aminy ka nanao hoe: Avelao ny zaza hanatona Ahy, ary aza raràna; fa an''ny toa azy ny fanjakan''Andriamanitra.'
mg1865::mg_42::18::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan''Andriamanitra tahaka ny zaza, dia tsy ho tafiditra aminy akory.'
mg1865::mg_42::18::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny namalian''i Jesoa ny fanontanian''ny mpanan-karena anankiray.'
  verse_text: 'Ary nisy mpanapaka anankiray nanontany Azy hoe: Mpampianatra tsara o, inona no hataoko handovako fiainana mandrakizay?'
mg1865::mg_42::18::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra.'
mg1865::mg_42::18::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao ny didy hoe: Aza mijangajanga, Aza mamono olona, Aza mangalatra, Aza mety ho vavolombelona mandainga, Manajà ny rainao sy ny reninao (Eksodosy 20:12-16).'
mg1865::mg_42::18::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy kosa izy: Izany rehetra izany dia efa notandremako hatry ny fony aho mbola kely.'
mg1865::mg_42::18::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany Jesoa, dia hoy Izy taminy: Mbola diso zavatra iray loha ianao: amidio ny fanananao rehetra, ka zarao ho an''ny malahelo, dia hanana rakitra any an-danitra ianao; ary avia, manaraha Ahy.'
mg1865::mg_42::18::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany ralehilahy, dia nalahelo loatra; fa nanan-karena dia nanan-karena izy.'
mg1865::mg_42::18::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa, raha nijery azy, dia nanao hoe: Manao ahoana ny hasarotry ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra!'
mg1865::mg_42::18::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho moramora kokoa ny hidiran''ny rameva amin''ny vodi-fanjaitra noho ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra!'
mg1865::mg_42::18::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nandre dia nanao hoe: Iza indray moa no azo hovonjena?'
mg1865::mg_42::18::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa: Izay zavatra tsy hain''ny olona dia hain''Andriamanitra.'
mg1865::mg_42::18::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Petera: Indro, izahay efa nahafoy izay nety ho anay ka nanaraka Anao.'
mg1865::mg_42::18::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Lazaiko aminareo marina tokoa: Tsy misy olona izay efa nahafoy trano, na vady, na rahalahy, na ray, na reny, na zanaka, noho ny fanjakan''Andriamanitra,'
mg1865::mg_42::18::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay tsy handray be lavitra amin''izao andro ankehitriny izao, ary amin''ny andro ho avy dia fiainana mandrakizay.'
mg1865::mg_42::18::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa fanintelony ny hiaretany.'
  verse_text: 'Ary Jesoa naka ny roa ambin''ny folo lahy ka nanao taminy hoe: Indro, miakatra ho any Jerosalema isika, dia ho tanteraka ny zavatra rehetra izay voasoratry ny mpaminany ny amin''ny Zanak''olona.'
mg1865::mg_42::18::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatolotra ho amin''ny jentilisa Izy, dia hataony fihomehezana sy hisetrasetrany sy hororany'
mg1865::mg_42::18::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hokapohiny sy hovonoiny, ary amin''ny andro fahatelo dia hitsangana Izy.'
mg1865::mg_42::18::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy nisy azony akory izany teny izany, fa nafenina taminy izy ka dia tsy fantany izay nolazainy.'
mg1865::mg_42::18::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny nampahiratan''i Jesoa lehilahy jamba tao akaikin''i Jeriko.'
  verse_text: 'Ary raha Jesoa nanakaiky an''i Jeriko, dia indro jamba anankiray nipetraka nangataka teo amoron-dalana.'
mg1865::mg_42::18::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nandre ny vahoaka mandalo izy, dia nanontany hoe: Inona izany?'
mg1865::mg_42::18::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny olona taminy: Jesoa avy any Nazareta no mandalo.'
mg1865::mg_42::18::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso mafy ralehilahy ka nanao hoe: Ry Jesoa, Zanak''i Davida o, mamindrà fo amiko.'
mg1865::mg_42::18::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nandeha teny aloha dia niteny mafy azy mba hangina, fa vao mainka niantsoantso izy ka nanao hoe: Ry Zanak''i Davida o, mamindrà fo amiko.'
mg1865::mg_42::18::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijanona, dia nasainy ho entina eo aminy ralehilahy; ary rehefa mby akaiky izy, dia nanontany azy Jesoa'
mg1865::mg_42::18::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Inona moa no tianao hataoko aminao? Ary hoy izy: Tompoko, ny mba hampahiratina ny masoko.'
mg1865::mg_42::18::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Mahirata ny masonao; ny finoanao no efa nahavonjy anao.'
mg1865::mg_42::18::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 18
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nahiratra ny masony, ka nanaraka an''i Jesoa izy sady nankalaza an''Andriamanitra; ary ny vahoaka rehetra, raha nahita, dia nidera an''Andriamanitra.'
mg1865::mg_42::19::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Zakaiosy.'
  verse_text: 'Ary Jesoa niditra ka nandeha namaky an''i Jeriko.'
mg1865::mg_42::19::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nisy lehilahy atao hoe Zakaiosy, izay lehiben''ny mpamory hetra sady nanan-karena.'
mg1865::mg_42::19::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitady hahita izay Jesoa izy, kanefa tsy afaka noho ny habetsahan''ny olona nifanety, satria fohy izy.'
mg1865::mg_42::19::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihazakazaka nialoha izy ka nananika aviavy hizaha an''i Jesoa; fa efa handalo tamin''izany lalana izany Izy.'
mg1865::mg_42::19::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo Jesoa, dia niandrandra ka nanao taminy hoe: Ry Zakaiosy, midina faingana; fa tsy maintsy mitoetra ao an-tranonao Aho anio.'
mg1865::mg_42::19::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nidina faingana izy ka nampiantrano Azy sady faly.'
mg1865::mg_42::19::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita izany izy rehetra, dia nimonomonona ka nanao hoe: Lasa nandeha hiantrano amin''izay lehilahy mpanota Izy.'
mg1865::mg_42::19::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Zakaiosy kosa nitsangana ka nanao tamin''ny Tompo hoe: Indro, Tompoko, ny antsasaky ny fananako omeko ho an''ny malahelo; ary raha misy zavatr''olona nalaiko tamin''ny fanambakana, dia honerako avy efatra heny izany.'
mg1865::mg_42::19::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Anio no tonga eto amin''ity trano ity ny famonjena, fa izy dia zanak''i Abrahama koa.'
mg1865::mg_42::19::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa tonga ny Zanak''olona hitady sy hamonjy ny very.'
mg1865::mg_42::19::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny fanoharana ny amin''ny farantsa folo.'
  verse_text: 'Ary raha mbola nihaino izany ny olona, dia nandroso niteny ihany Jesoa ka nanao fanoharana, satria efa akaiky an''i Jerosalema Izy, ka nataon''ny olona fa hiseho faingana ny fanjakan''Andriamanitra.'
mg1865::mg_42::19::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Nisy andriandahy anankiray nandeha nankany an-tany lavitra mba handray fahefana hanjaka, dia hiverina.'
mg1865::mg_42::19::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso folo lahy tamin''ny mpanompony izy ary nanome azy farantsa* folo ka nanao taminy hoe: Mandrantoa mandra-pihaviko. [*Grika: mina = drakma = tokony ho farantsa 15]'
mg1865::mg_42::19::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vahoakany* nankahala azy, dia nampitondra teny nanaraka azy nanao hoe: Tsy manaiky hanjakan''iny lehilahy iny izahay. [*Na: vahoaka namany]'
mg1865::mg_42::19::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafaverina izy, rehefa nandray fahefana hanjaka, dia nasainy nantsoina hankeo aminy izany mpanompo nomeny ny vola izany mba hahitany izay azony tamin''ny fandrantoana.'
mg1865::mg_42::19::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga ny voalohany ka nanao hoe: Tompoko, ny farantsanao iray efa nahazoana tombony farantsa folo.'
mg1865::mg_42::19::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Tsara izany, ry mpanompo tsara; satria nahatoky tamin''ny kely indrindra ianao, dia manapaha tanàna folo.'
mg1865::mg_42::19::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tonga ny anankiray koa ka nanao hoe: Tompoko, ny farantsanao iray efa tonga farantsa dimy.'
mg1865::mg_42::19::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy tamin''io: Manapaha tanàna dimy koa ianao.'
mg1865::mg_42::19::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga kosa ny anankiray ka nanao hoe: Tompoko, indry ny farantsanao, izay notehiriziko voafono amin''ny mosara.'
mg1865::mg_42::19::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa natahotra anao aho, satria olona mila voatsiary ianao ka maka izay tsy napetrakao, ary mijinja izay tsy nafafinao.'
mg1865::mg_42::19::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny tompony taminy: Ny vavanao no hitsarako anao, ry mpanompo ratsy fanahy: fantatrao fa izaho dia olona mila voatsiary ka maka izay tsy napetrako, ary mijinja izay tsy nafafiko;'
mg1865::mg_42::19::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nahoana no tsy napetrakao tamin''ny mpanana vola ny volako, ka rehefa tonga aho, dia ho nandray ny ahy mban-janany?'
mg1865::mg_42::19::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamin''izay nitsangana teo anilany: Alao ny farantsa eny aminy, ka omeo ilay manana farantsa folo'
mg1865::mg_42::19::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa hoy ireo taminy: Tompoko, efa manana farantsa folo izy.)'
mg1865::mg_42::19::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo: Izay rehetra manana dia homena; fa ny amin''izay tsy manana, na dia izay ananany aza dia halaina aminy.'
mg1865::mg_42::19::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo fahavaloko tsy nanaiky hanjakako ireo, dia ento aty , ka vonoy eto anatrehako.'
mg1865::mg_42::19::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niteny izany Izy, dia nandeha nialoha hiakatra ho any Jerosalema.'
mg1865::mg_42::19::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 29
  verse_date_revised: null
  verse_title: 'Ny niakaran''i Jesoa tany Jerosalema.'
  verse_text: 'Ary raha nanakaiky an''i Betifaga sy Betania teo an-tendrombohitra atao hoe Oliva Izy, dia naniraka roa lahy tamin''ny mpianatra'
mg1865::mg_42::19::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Mankanesa amin''iroa vohitra tandrifinareo iroa; ary raha vao miditra ao ianareo, dia hisy zana-boriky mifatotra ho hitanareo, izay tsy mbola nitaingenan''olona; vahao izy, ka ento ety .'
mg1865::mg_42::19::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy manontany anareo hoe: Nahoana no vahanareo io? dia izao no holazainareo: Misy raharaha analan''ny Tompo azy.'
mg1865::mg_42::19::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandeha ireo nirahina, dia nahita araka izay nolazainy taminy.'
mg1865::mg_42::19::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha namaha ny zana-boriky izy, dia hoy ny tompony taminy: Nahoana no vahanareo ny zana-boriky?'
mg1865::mg_42::19::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Misy raharaha analan''ny Tompo azy.'
mg1865::mg_42::19::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra azy ho any amin''i Jesoa izy ary nametraka ny lambany teo ambonin''ny zana-boriky, ka nampitaingeniny azy Jesoa.'
mg1865::mg_42::19::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 36
  verse_date_revised: '2022-06-19T09:27:21+0000'
  verse_title: null
  verse_text: 'Ary raha nandeha Jesoa, dia namelatra ny lambany teny an-dàlana izy ireo.'
mg1865::mg_42::19::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanakaiky Izy ka tonga teo am-pidinana amin''ny tendrombohitra Oliva, dia nifaly avokoa ny mpianatra maro be ka nidera an''Andriamanitra tamin''ny feo mahery noho ny asa lehibe rehetra izay efa hitany'
mg1865::mg_42::19::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Isaorana anie ny Mpanjaka, Izay avy amin''ny anaran''i Jehovah. Fiadanana any an-danitra, ary voninahitra any amin''ny avo indrindra.'
mg1865::mg_42::19::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Fariseo sasany, izay teo amin''ny vahoaka, nanao taminy hoe: Mpampianatra o, rarao ny mpianatrao.'
mg1865::mg_42::19::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy namaly ka nanao hoe: Lazaiko aminareo fa raha mangina ireo, dia ny vato no hiantsoantso.'
mg1865::mg_42::19::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nanakaiky Izy ka nahita ny tanàna, dia nitomany azy'
mg1865::mg_42::19::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Raha mba nahafantatra mantsy ianao na dia amin''ity andro ity aza izay momba ny fiadanana! - fa ankehitriny miafina amin''ny masonao izany.'
mg1865::mg_42::19::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy aminao ny andro izay hananganan''ny fahavalonao tovon-tany manodidina anao, dia hanemitra anao izy ka hanidy anao manodidina'
mg1865::mg_42::19::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hamongotra anao hatramin''ny tany mbamin''ny zanakao ao anatinao, ka tsy havelany hisy vato mifanongoa eo aminao, ho valin''ny tsy nahafantaranao ny andro namangiana anao.'
mg1865::mg_42::19::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 45
  verse_date_revised: null
  verse_title: 'Ny nandroahan''i Jesoa ny mpivarotra sy ny nanesorany ny varony hiala teo an-kianjan''ny tempoly.'
  verse_text: 'Ary niditra teo an-kianjan''ny tempoly Jesoa, dia nandroaka izay nivarotra'
mg1865::mg_42::19::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Efa voasoratra hoe: Ny tranoko dia trano fivavahana (Isaia 56:7) fa ianareo kosa nanao azy ho zohy fieren''ny jiolahy (Jeremia 7:11).'
mg1865::mg_42::19::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampianatra isan''andro teo an-kianjan''ny tempoly Izy. Fa ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona nitady hahafaty Azy;'
mg1865::mg_42::19::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 19
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa tsy hitany izay hataony, satria ny vahoaka rehetra nazoto dia nazoto hihaino Azy.'
mg1865::mg_42::20::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanontanian''ny lohan''ny mpisorona sy ny loholona an''i Jesoa ny amin''ny fahefany, ary ny fanoharana navalin''i Jesoa azy.'
  verse_text: 'Ary tamin''ny andro anankiray, raha nampianatra ny olona teo an-kianjan''ny tempoly Jesoa ka nitory ny filazantsara, dia nanatona ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona'
mg1865::mg_42::20::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niteny taminy hoe: Lazao aminay: Fahefana manao ahoana no anaovanao izao zavatra izao? ary iza no nanome Anao izany fahefana izany?'
mg1865::mg_42::20::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Izaho kosa mba hanontany anareo zavatra iray loha, ka lazao amiko:'
mg1865::mg_42::20::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny batisan''i Jaona avy tany an-danitra va, sa avy tamin''ny olona?'
mg1865::mg_42::20::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niara-nisaina izy ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana no tsy nino azy ianareo?'
mg1865::mg_42::20::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha holazaintsika hoe kosa: Avy tamin''ny olona, dia hitora-bato antsika ny vahoaka rehetra, satria inoany ho mpaminany Jaona.'
mg1865::mg_42::20::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly ireo fa tsy fantany izay nihaviany.'
mg1865::mg_42::20::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
mg1865::mg_42::20::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nilaza izao fanoharana izao tamin''ny olona Izy ka nanao hoe: Nisy lehilahy anankiray nanao tanim-boaloboka, ka nahofany tamin''olona mpiasa tany izany, dia nandeha nitoetra ela tany an-tany hafa izy.'
mg1865::mg_42::20::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny fotoana dia naniraka mpanompo hankany amin''ny mpiasa tany izy mba handray amin''ny vokatry ny tanim-boaloboka; fa ny mpiasa tany nikapoka azy ka nampandeha azy maina.'
mg1865::mg_42::20::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka mpanompo anankiray koa izy; ary nokapohiny mafy koa iny sady nalany baraka ka nampandehaniny maina.'
mg1865::mg_42::20::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka anankiray koa izy; ary iny koa dia nataony naratra ka noroahiny.'
mg1865::mg_42::20::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny tompon''ny tanim-boaloboka: Inona re no hataoko? Haniraka ny zanako malalako aho; angamba hanaja azy izy.'
mg1865::mg_42::20::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha nahita iny ny mpiasa tany, dia niara-nisaina izy ka nanao hoe: Ity no mpandova; andeha hovonointsika io, mba ho antsika ny lova.'
mg1865::mg_42::20::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namoaka azy tany ivelan''ny tanim-boaloboka izy ka namono azy. Hataon''ny tompon''ny tanim-boaloboka ahoana moa izy amin''izany?'
mg1865::mg_42::20::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hankany izy, dia hamono ireo mpiasa tany ireo, ka homeny olon-kafa ny tanim-boaloboka. Ary raha nahare izany ireo, dia hoy izy: Sanatria izany!'
mg1865::mg_42::20::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijery azy ka nanao hoe: Ahoana moa izao voasoratra izao: "Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro" ? (Salamo 118:22).'
mg1865::mg_42::20::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra potraka amin''izany vato izany dia ho torotoro; fa na iza na iza no ianjerany dia ho mongomongo.'
mg1865::mg_42::20::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny nanontaniana an''i Jesoa ny amin''ny mandoa vola hetra ho an''i Kaisara.'
  verse_text: 'Ary tamin''izany ora izany dia nitady hisambotra Azy ny mpanora-dalàna sy ny lohan''ny mpisorona; nefa natahotra ny olona izy, satria fantany fa izy no nolazainy tamin''izany fanoharana izany.'
mg1865::mg_42::20::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nizaha taratra an''i Jesoa izy ka naniraka mpitsikilo, izay nody ho marina, mba hamandrika Azy amin''ny teniny, hanolorany Azy ho amin''ny hery sy ny fahefan''ny governora.'
mg1865::mg_42::20::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo nanontany Azy ka nanao hoe: Mpampianatra o, fantatray fa miteny sy mampianatra marina Ianao ka tsy mizaha tavan''olona, fa mampianatra marina ny lalan''Andriamanitra:'
mg1865::mg_42::20::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mety va raha mandoa vola hetra ho an''i Kaisara izahay, sa tsia?'
mg1865::mg_42::20::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nahafantatra ny fihendreny ka nanao taminy hoe:'
mg1865::mg_42::20::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampisehoa denaria amiko. An''iza moa io sary sy soratra eo aminy io? Hoy ireo: An''i Kaisara.'
mg1865::mg_42::20::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Aloavy ho an''i Kaisara ary izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra.'
mg1865::mg_42::20::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy sahiny nitanana Azy teo anatrehan''ny olona izany teny izany sady gaga izy noho ny famaliny ka nangina.'
mg1865::mg_42::20::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny nanontanian''ny Sadoseo an''i Jesoa ny amin''ny hitsanganan''ny maty.'
  verse_text: 'Ary ny sasany tamin''ny Sadoseo, izay milaza fa tsy misy fitsanganan''ny maty, dia nanatona ka nanontany Azy hoe:'
mg1865::mg_42::20::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpampianatra o, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin''ny maty, dia aoka ny rahalahiny hampakatra an-dravehivavy ka hiteraka hamelo-maso ny rahalahiny (Deoteronomia 25:5).'
mg1865::mg_42::20::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba.'
mg1865::mg_42::20::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faharoa'
mg1865::mg_42::20::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy ny fahatelo koa nampakatra azy; ary tahaka izany avokoa no nataon''izy fito mirahalahy; nefa maty momba avokoa izy.'
mg1865::mg_42::20::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary farany dia maty koa ravehivavy.'
mg1865::mg_42::20::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''ny fitsanganan''ny maty ho vadin''iza moa ravehivavy? fa samy efa nanambady azy avokoa izy fito mirahalahy.'
mg1865::mg_42::20::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanao taminy hoe: Ny zanak''izao fiainana izao dia mampaka-bady sady avoaka hampakarina;'
mg1865::mg_42::20::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay atao miendrika hahazo izany fiainana izany sy ny fitsanganana amin''ny maty kosa dia tsy mba mampaka-bady, na avoaka hampakarina;'
mg1865::mg_42::20::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy mety maty intsony izy, fa mitovy amin''ny anjely sady zanak''Andriamanitra, satria zanaky ny fitsanganana amin''ny maty.'
mg1865::mg_42::20::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mosesy aza nanambara teo amin''ilay teny milaza ny Voaroy fa hatsangana ny maty, raha nilaza an''i Jehovah hoe Andriamanitr''i Abrahama sy Andriamanitr''Isaka ary Andriamanitr''i Jakoba (Eksodosy 3:6).'
mg1865::mg_42::20::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy tsy mba Andriamanitry ny maty, fa an''ny velona; fa velona ho an''Andriamanitra avokoa izy rehetra.'
mg1865::mg_42::20::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanora-dalàna sasany namaly ka nanao hoe: Mpampianatra o, marina izay nolazainao.'
mg1865::mg_42::20::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nisy sahy nanontany Azy intsony ireo.'
mg1865::mg_42::20::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 41
  verse_date_revised: null
  verse_title: 'Ny nanontanian''i Jesoa ny Fariseo ny amin''izay maha-Zanak''i Davida ny Mesia.'
  verse_text: 'Ary hoy Jesoa taminy: Ahoana no lazaina fa Kristy no Zanak''i Davida?'
mg1865::mg_42::20::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Davida ihany no milaza eo amin''ny bokin''ny Salamo hoe: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana'
mg1865::mg_42::20::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambara-panaoko ny fahavalonao ho fitoeran''ny tongotrao (Salamo 110:1).'
mg1865::mg_42::20::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Davida amin''izany manao Azy hoe Tompo; koa ahoana no maha-Zanany Azy?'
mg1865::mg_42::20::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 45
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa ny faharatsian''ny mpanora-dalàna sy ny Fariseo.'
  verse_text: 'Ary hoy Jesoa tamin''ny mpianany teo anatrehan''ny olona rehetra:'
mg1865::mg_42::20::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 46
  verse_date_revised: '2022-03-25T17:24:00+0000'
  verse_title: null
  verse_text: 'Mitandrema ny amin''ny mpanora-dalàna, izay mazoto mandehandeha miakanjo akanjo lava, ary te-hoharabain''ny olona eny an-tsena, sady tia ny fipetrahana aloha eo amin''ny synagoga sy ny fitoerana aloha eo amin''ny fanasana,'
mg1865::mg_42::20::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 20
  verse_number: 47
  verse_date_revised: '2022-04-29T04:40:02+0000'
  verse_title: null
  verse_text: 'ary mandany ny tranon''ny mpitondratena sy manao vavaka lavareny mba ho fiolahana; ireo dia hahazo fanamelohana mafimafy kokoa.'
mg1865::mg_42::21::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nideran''i Jesoa ilay mpitondratena nandatsaka farantsakely roa.'
  verse_text: 'Ary Jesoa nanopy ny masony nahita ny mpanankarena mandatsa-drakitra tao amin''ny fandatsahan-drakitra;'
mg1865::mg_42::21::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nahita mpitondratena malahelo anankiray koa mandatsaka farantsakely roa* teo Izy. [*Grika: lepta roa, dia farantsakely varahina izany = kodranta iray, tokony ho variroaventy]'
mg1865::mg_42::21::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy: Lazaiko aminareo marina tokoa fa io mpitondratena malahelo io no efa nandatsaka be noho izy rehetra.'
mg1865::mg_42::21::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo rehetra ireo, dia tamin''ny haben''ny fananany no nandatsahany tao amin''ny rakitra; fa izy kosa tamin''ny fahantrany no nandatsahany ny fivelomany rehetra izay nananany.'
mg1865::mg_42::21::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: 'Ny nanambaran''i Jesoa ny handravana an''i Jerosalema, sy ny hihaviany indray.'
  verse_text: 'Ary nisy nilaza ny tempoly, fa voaravaka vato tsara sy fanatitra izy; fa hoy Jesoa:'
mg1865::mg_42::21::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ireo zavatra hitanareo ireo, dia ho avy ny andro, ka tsy havela hisy vato hifanongoa eto ka tsy horavana.'
mg1865::mg_42::21::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nanontany Azy hoe: Mpampianatra o, rahoviana no ho avy izany? ary inona no ho famantarana, rehefa ho tonga izany?'
mg1865::mg_42::21::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Mitandrema, fandrao ho voafitaka ianareo; fa maro no ho avy amin''ny anarako sady hanao hoe: Izaho no Izy; ary koa: Efa akaiky ny andro; koa aza manaraka azy.'
mg1865::mg_42::21::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha handre ady sy tabataba ianareo, aza matahotra; fa tsy maintsy ho tonga aloha izany, nefa tsy dia miaraka amin''izay ny farany.'
mg1865::mg_42::21::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana.'
mg1865::mg_42::21::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy horohorontany lehibe ary mosary sy areti-mandringana any amin''ny tany samy hafa, ary hisy zava-mahatahotra sy famantarana lehibe avy any an-danitra.'
mg1865::mg_42::21::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy mbola tonga izany rehetra izany, dia hisambotra anareo izy ka hanenjika ary hanolotra anareo ao amin''ny synagoga sy ao an-tranomaizina, ka ho entina eo anatrehan''ny mpanjaka sy ny mpanapaka ianareo noho ny anarako.'
mg1865::mg_42::21::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho tonga ho vavolombelona aminareo izany.'
mg1865::mg_42::21::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoreno ao am-ponareo ny tsy hihevitra rahateo izay havalinareo;'
mg1865::mg_42::21::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa Izaho no hanome anareo vava sy saina, izay tsy ho azon''ny fahavalonareo rehetra valiana na resena.'
mg1865::mg_42::21::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatolotry ny ray sy ny reny sy ny rahalahy ary ny havana aman-tsakaiza ianareo, koa ny sasany aminareo dia hovonoiny.'
mg1865::mg_42::21::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho halan''ny olona rehetra ianareo noho ny anarako.'
mg1865::mg_42::21::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy hisy ho very na dia singam-bolo iray eo amin''ny lohanareo aza.'
mg1865::mg_42::21::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny faharetanareo no hahatananareo ny ainareo.'
mg1865::mg_42::21::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mahita an''i Jerosalema voahodidin''ny miaramila ianareo, dia aoka ho fantatrareo fa efa mby akaiky ny fandravana azy.'
mg1865::mg_42::21::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay any Jodia amin''izany andro izany aoka handositra ho any an-tendrombohitra; ary izay ao Jerosalema aoka handositra ho any ivelany; ary izay any an-tsaha aoka tsy hiditra ao an-tanàna intsony.'
mg1865::mg_42::21::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo dia andro famaliana mba hahatanteraka izay rehetra voasoratra.'
mg1865::mg_42::21::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lozan''ny bevohoka sy ny mitaiza kely amin''izany andro izany! satria hisy fahoriana lehibe eo amin''ny tany ary fahatezerana amin''ity firenena ity.'
mg1865::mg_42::21::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho ringana amin''ny lelan-tsabatra izy ka ho entina ho babon''ny firenena rehetra, ary Jerosalema hohitsahin''ny jentilisa mandra-pahatanteraky ny andron''ny jentilisa.'
mg1865::mg_42::21::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy famantarana eo amin''ny masoandro sy ny volana ary ny kintana, ary ety ambonin''ny tany dia hisy fahorian''ny firenena amin''ny fahaverezan-kevitra noho ny firohondrohon''ny ranomasina sy ny fanonjany,'
mg1865::mg_42::21::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ho reraka ny fon*''ny olona noho ny fahatahorany sy ny fiandrasany izay zavatra ho tonga ambonin''ny tany; fa ny herin''ny lanitra dia hohozongozonina. [*Na: ka hisy ho faty aza]'
mg1865::mg_42::21::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hahita ny Zanak''olona avy eo amin''ny rahona amin-kery sy voninahitra lehibe izy.'
mg1865::mg_42::21::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao miandoha izany zavatra izany dia miandrandrà, ka asandrato ny lohanareo; fa manakaiky ny fanavotana anareo.'
mg1865::mg_42::21::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nanao fanoharana taminy hoe: Jereo ny aviavy sy ny hazo rehetra.'
mg1865::mg_42::21::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hitanareo fa vao manaroka ireo, dia fantatrareo ihany fa efa akaiky sahady ny lohataona.'
mg1865::mg_42::21::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa ianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa akaiky ny fanjakan''Andriamanitra.'
mg1865::mg_42::21::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa fa tsy ho lany ity taranaka ity mandra-pahatongan''izany rehetra izany.'
mg1865::mg_42::21::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.'
mg1865::mg_42::21::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitandrema, fandrao ny fonareo hovesaran''ny vokatry ny fisotroan-toaka sy ny fahamamoana ary ny fiahiahian''izao fiainana izao, ka ho avy tampoka aminareo tahaka ny fandrika izany andro izany.'
mg1865::mg_42::21::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hihatra amin''izay rehetra mitoetra ety ambonin''ny tany rehetra izany.'
mg1865::mg_42::21::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miambena* ka mivavaha mandrakariva, mba hahery ianareo ka handositra izany zavatra ho avy rehetra izany ary hitsangana eo anatrehan''ny Zanak''olona.'
mg1865::mg_42::21::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony antoandro dia nampianatra teo an-kianjan''ny tempoly Izy; ary nony alina dia nivoaka Izy ka nitoetra teo an-tendrombohitra atao hoe Oliva.'
mg1865::mg_42::21::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 21
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra nankeo aminy maraina koa teo an-kianjan''ny tempoly hihaino Azy.'
mg1865::mg_42::22::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikendren''ny lohan''ny mpisorona sy ny mpanora-dalàna hahafaty an''i Jesoa.'
  verse_text: 'Ary efa mby akaiky ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia ilay andro atao hoe Paska.'
mg1865::mg_42::22::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona sy ny mpanora-dalàna nitady izay hamonoany an''i Jesoa; nefa natahotra ny olona izy.'
mg1865::mg_42::22::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Satana niditra tao anatin''i Jodasy, ilay atao hoe Iskariota, anankiray tamin''ny roa ambin''ny folo lahy;'
mg1865::mg_42::22::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nankao amin''ny lohan''ny mpisorona sy ny lehiben''ny mpiambina izy ka niresaka taminy ny amin''izay hamadihany an''i Jesoa amin''ireo.'
mg1865::mg_42::22::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia faly ireo ka nanaiky hanome vola azy.'
mg1865::mg_42::22::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanaiky izy ka nitady izay andro hahazoany hamadika Azy amin''ireo amin''ny tsy misy olona.'
mg1865::mg_42::22::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny niarahan''i Jesoa nihinana ny Paska tamin''ny mpianany.'
  verse_text: 'Ary tonga ny andro fihinanana ny mofo tsy misy masirasira, dia ilay tsy maintsy hamonoana ny Paska.'
mg1865::mg_42::22::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa naniraka an''i Petera sy Jaona ka nanao hoe: Mandehana, ka amboary ny Paska hohanintsika.'
mg1865::mg_42::22::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo taminy: Aiza no tianao hanamboaranay azy?'
mg1865::mg_42::22::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy taminy: Indro, raha miditra ao an-tanàna ianareo, dia hisy lehilahy mitondra siny feno rano hifanena aminareo; manaraha azy ao amin''ny trano izay hidirany.'
mg1865::mg_42::22::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lazao amin''ny tompon-trano hoe: Izao no lazain''ny Mpampianatra aminao: Aiza ny efi-trano hiarahako mihinana ny Paska amin''ny mpianatro?'
mg1865::mg_42::22::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy hanoro anareo efi-trano malalaka ambony rihana, izay efa nasiana fipetrahana; any no amboary.'
mg1865::mg_42::22::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha izy ka nahita araka izay efa nolazainy taminy; dia namboatra ny Paska izy.'
mg1865::mg_42::22::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny fotoana, dia nipetraka hihinana Izy mbamin''ny Apostoly.'
mg1865::mg_42::22::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Naniry koa raha naniry Aho hiara-mihinana ity Paska ity aminareo, dieny mbola tsy mijaly Aho.'
mg1865::mg_42::22::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo fa tsy mba hihinana izany intsony Aho ambara-pahatanterak''izany ao amin''ny fanjakan''Andriamanitra.'
mg1865::mg_42::22::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandray kapoaka Izy, dia nisaotra ka nanao hoe: Raiso ity, ka zarao aminareo;'
mg1865::mg_42::22::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa lazaiko aminareo fa hatramin''izao dia tsy hisotro ny vokatry ny voaloboka intsony Aho mandra-pahatongan''ny fanjakan''Andriamanitra.'
mg1865::mg_42::22::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandray mofo Izy, ary rehefa nisaotra, dia novakiny ka natolony azy sady nataony hoe : Ity no tenako izay omena ho anareo; izao no ataovinareo ho fahatsiarovana Ahy.'
mg1865::mg_42::22::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izany koa ny kapoaka, rehefa vita ny sakafo, dia hoy Izy: Ity kapoaka ity no fanekena vaovao amin''ny rako, izay aidina ho anareo.'
mg1865::mg_42::22::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ny tanan''izay mamadika Ahy dia eto amiko eto ambonin''ny latabatra.'
mg1865::mg_42::22::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''olona mandeha tokoa, araka izay nanendrena; nefa lozan''izay lehilahy hahazoana manolotra Azy!'
mg1865::mg_42::22::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo nifanontany izay anankiray eo aminy hahefa izany.'
mg1865::mg_42::22::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nifandiran''ny Apostoly ny amin''izay ho lehibe, sy ny anatra nataon''i Jesoa tamin''izany.'
  verse_text: 'Ary nisy koa fifandirana tao aminy ny amin''izay anankiray aminy hatao lehibe.'
mg1865::mg_42::22::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Ny mpanjakan''ny jentilisa mampanompo azy ary izay manapaka azy no atao hoe mpanao soa.'
mg1865::mg_42::22::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba toy izany ianareo; fa izay lehibe aminareo dia aoka ho toy ny zandry; ary izay manapaka dia aoka ho toy ny mpanompo.'
mg1865::mg_42::22::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza moa no lehibe, izay mipetraka mihinana va, sa izay manompo? Tsy izay mipetraka mihinana va? Fa Izaho dia eo aminareo toy izay manompo.'
mg1865::mg_42::22::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo no naharitra nanaraka Ahy tamin''ny fakam-panahy nihatra tamiko;'
mg1865::mg_42::22::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa Izaho dia manendry fanjakana ho anareo tahaka ny nanendren''ny Raiko ho Ahy,'
mg1865::mg_42::22::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hihinana sy hisotro eo amin''ny latabatro amin''ny fanjakako ianareo sady hipetraka ambony seza fiandrianana hitsara ny firenen''isiraely roa ambin''ny folo,'
mg1865::mg_42::22::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny Tompo: Ry Simona, ry Simona, indro, Satana efa nilofo nitady anareo hokororohiny toy ny vary.'
mg1865::mg_42::22::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Izaho nangataka ho anao, mba tsy ho levona ny finoanao; ary rehefa mibebaka ianao, dia ampaherezo ireo rahalahinao.'
mg1865::mg_42::22::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Tompoko, vonona hanaraka Anao aho, na ho ao an-tranomaizina, na dia ho amin''ny fahafatesana aza.'
mg1865::mg_42::22::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa: Lazaiko aminao, ry Petera: Raha tsy mbola misy akoho maneno anio, dia handà intelo ho tsy mahalala Ahy ianao.'
mg1865::mg_42::22::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy taminy: Raha nirahiko tsy nitondra kitapom-bola na kitapom-batsy na kapa ianareo, moa nisy zavatra nahory anareo va? Dia hoy ireo: Tsy nisy.'
mg1865::mg_42::22::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Fa amin''izao kosa, izay manana kitapom-bola dia aoka hitondra azy; ary toy izany koa ny kitapom-batsy; ary izay tsy manan-tsabatra kosa, dia aoka hivarotra ny lambany izy ka hividy.'
mg1865::mg_42::22::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lazaiko aminareo: Tsy maintsy ho tanteraka amiko izao voasoratra izao hoe: Ary Izy natao ho isan''ny mpanota (Isaia 53:12) fa efa ho tanteraka ny amiko.'
mg1865::mg_42::22::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo: Tompoko, indreto sabatra roa. Dia hoy Jesoa taminy: Aoka izay.'
mg1865::mg_42::22::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 39
  verse_date_revised: null
  verse_title: 'Jesoa tao Getsemane.'
  verse_text: 'Ary nivoaka Jesoa, koa araka ny fanaony dia nankao an-tendrombohitra Oliva Izy, ary ny mpianatra koa nanaraka Azy.'
mg1865::mg_42::22::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao tonga tao amin''izany tany izany, dia hoy Izy taminy: Mivavaha mba tsy hidiranareo amin''ny fakam-panahy.'
mg1865::mg_42::22::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nihataka taminy tokony ho indray mitora-bato, dia nandohalika ka nivavaka hoe:'
mg1865::mg_42::22::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raiko o, raha sitrakao, dia esory amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao.'
mg1865::mg_42::22::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely avy tany an-danitra niseho teo aminy ka nampahery Azy.'
mg1865::mg_42::22::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fadiranovana Izy, ka dia nivavaka mafimafy kokoa; ary ny dininy dia tahaka ny rà nipotrapotraka tamin''ny tany.'
mg1865::mg_42::22::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nitsangana avy nivavaka Izy, dia nankeo amin''ny mpianatra ka nahita azy matorin''alahelo.'
mg1865::mg_42::22::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy taminy: Nahoana no dia matory ianareo? Mitsangàna, ka mivavaha, mba tsy hidiranareo amin''ny fakam-panahy.'
mg1865::mg_42::22::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 47
  verse_date_revised: null
  verse_title: 'Ny nisamborana an''i Jesoa.'
  verse_text: 'Ary raha mbola niteny Jesoa, indreo, tamy ny vahoaka, ary ilay atao hoe Jodasy, isan''ny roa ambin''ny folo lahy, dia nandeha teo alohany ka nanatona an''i Jesoa hanoroka Azy.'
mg1865::mg_42::22::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Ry Jodasy, fanorohana va no amadihanao ny Zanak''olona?'
mg1865::mg_42::22::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay teo aminy, raha nahita izay efa hanjo, dia nanao hoe: Tompoko, hamely amin''ny sabatra va izahay?'
mg1865::mg_42::22::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray teo aminy dia nikapa ny mpanompon''ny mpisoronabe ka nahafaka ny sofiny ankavanana.'
mg1865::mg_42::22::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa namaly ka nanao hoe: Aoka ihany na dia izao aza. Dia nanendry ny sofiny Izy ka nahasitrana azy.'
mg1865::mg_42::22::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa tamin''ny lohan''ny mpisorona sy ny lehiben''ny mpiambina ny tempoly ary ny loholona izay tonga hisambotra Azy: Mivoaka mitondra sabatra sy langilangy toy ny hisambotra jiolahy va ianareo?'
mg1865::mg_42::22::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha teo aminareo isan''andro teo an-kianjan''ny tempoly Aho, dia tsy naninji-tanana tamiko ianareo; fa izao no fotoanareo sy herin''ny maizina.'
mg1865::mg_42::22::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 54
  verse_date_revised: null
  verse_title: 'Ny nitsarana an''i Jesoa teo anatrehan''i Kaiafa, sy ny nandavan''i Petera Azy intelo.'
  verse_text: 'Ary izy ireo nisambotra an''i Jesoa, dia nitondra Azy ho ao an-tranon''ny mpisoronabe. Ary Petera nanaraka teny lavidavitra eny.'
mg1865::mg_42::22::55:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha namelona afo teo an-kianja ireo ka nipetraka, dia mba nipetraka teo aminy koa Petera.'
mg1865::mg_42::22::56:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ankizivavy anankiray, nony nahita azy nipetraka teo anilan''ny afo, dia nandinika azy ka nanao hoe: Ity koa nomba Azy.'
mg1865::mg_42::22::57:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy nandà ka nanao hoe: Ravehivavy, tsy fantatro Izy.'
mg1865::mg_42::22::58:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary vetivety foana rehefa afaka izany, dia nisy olona hafa koa nahita azy ka nanao hoe: Ianao koa mba naman''ireny. Fa Petera nanao hoe: Ralehilahy, tsy mba namany aho.'
mg1865::mg_42::22::59:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka tokony ho ora iray, dia nisy anankiray koa nitompo teny ka nanao hoe: Ilehio nomba Azy marina tokoa, fa Galiliana izy.'
mg1865::mg_42::22::60:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Petera: Ralehilahy, tsy fantatro izay lazainao. Ary niaraka tamin''izay, raha mbola niteny izy, dia nisy akoho naneno.'
mg1865::mg_42::22::61:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo nitodika, dia nijery an''i Petera. Ary Petera nahatsiaro ilay tenin''ny Tompo nolazainy taminy hoe: Raha tsy mbola misy akoho maneno anio, dia handà Ahy intelo ianao.'
mg1865::mg_42::22::62:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nivoaka Petera, dia nitomany mafy indrindra.'
mg1865::mg_42::22::63:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lehilahy izay nitana an''i Jesoa dia nanao Azy ho fihomehezana sady nikapoka Azy.'
mg1865::mg_42::22::64:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanampi-maso Azy izy, dia nanontany Azy hoe: Maminania; iza moa no namely Anao?'
mg1865::mg_42::22::65:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny ratsy izy nilaza zavatra maro hafa koa nanaratsiany Azy.'
mg1865::mg_42::22::66:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao nazava ny andro, niangona ny loholona, dia ny lohan''ny mpisorona sy ny mpanora-dalàna, ka nitondra an''i Jesoa ho eo amin''ny Synedriona, dia nanao hoe:'
mg1865::mg_42::22::67:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha Ianao no Kristy, dia lazao aminay. Fa hoy Izy taminy: Na dia hilaza aminareo aza Aho, dia tsy hino ianareo.'
mg1865::mg_42::22::68:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia hanontany aza Aho, dia tsy hamaly akory ianareo.'
mg1865::mg_42::22::69:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hatramin''izao ny Zanak''olona dia hipetraka eo an-tanana ankavanan''ny herin''Andriamanitra.'
mg1865::mg_42::22::70:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy rehetra: Zanak''Andriamanitra va ary Ianao? Ary hoy Izy taminy: Voalazanareo fa Izaho no Izy.'
mg1865::mg_42::22::71:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 22
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ireo: Ka inona indray no ilantsika vavolombelona? fa ny tenantsika no efa nandre tamin''ny vavany.'
mg1865::mg_42::23::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsaran''i Pilato an''i Jesoa, sy ny nanolorany Azy hohomboana tamin''ny hazo fijaliana.'
  verse_text: 'Ary ny olona rehetra nitsangana ka nitondra an''i Jesoa tany amin''i Pilato,'
mg1865::mg_42::23::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niampanga Azy ka nanao hoe: Ilehity hitanay nampiodina ny firenenay sady nandrara tsy handoa hetra ho an''i Kaisara ka nilaza ny tenany ho Kristy Mpanjaka.'
mg1865::mg_42::23::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato nanontany Azy hoe: Ianao va no Mpanjakan''ny Jiosy? Ary Izy namaly azy ka nanao hoe: Voalazanao.'
mg1865::mg_42::23::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Pilato tamin''ny lohan''ny mpisorona sy ny vahoaka: Tsy hitako izay helok''ity Lehilahy ity.'
mg1865::mg_42::23::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vao mainka nandentika ireo ka nanao hoe: Nampiodina ny olona Izy sady nampianatra eran''i Jodia rehetra, nanomboka hatrany Galilia ka hatraty.'
mg1865::mg_42::23::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nandre izany Pilato, dia nanontany raha olona avy any Galilia Jesoa.'
mg1865::mg_42::23::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa fantany fa avy tamin''ny tany tapahin''i Heroda Izy, dia nampanatitra Azy tany amin''i Heroda izy, fa tany Jerosalema koa Heroda tamin''izany andro izany.'
mg1865::mg_42::23::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary faly dia faly Heroda, raha nahita an''i Jesoa; fa efa naniry ela hahita Azy izy, satria efa nandre ny aminy ary nanantena hahita famantarana hataony.'
mg1865::mg_42::23::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanontany Azy teny maro; fa tsy namaly teny azy akory Jesoa.'
mg1865::mg_42::23::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona sy ny mpanora-dalàna nijanona teo dia nitompo teny fatratra hiampanga Azy.'
mg1865::mg_42::23::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Heroda sy ny miaramilany namingavinga Azy ka nanao Azy ho fihomehezana, dia nampiakanjo Azy akanjo tsara ka namerina Azy tany amin''i Pilato.'
mg1865::mg_42::23::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga nisakaiza Heroda sy Pilato tamin''izany andro izany; kanefa nifandrafy izy roa lahy talohan''izany.'
mg1865::mg_42::23::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nasain''i Pilato novorina ny lohan''ny mpisorona sy ny mpanapaka ary ny vahoaka,'
mg1865::mg_42::23::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hoy izy taminy: Entinareo aty amiko ity Lehilahy ity toy ny nampiodina ny vahoaka; ary, indro, efa nanadina Azy teto anatrehanareo aho, nefa tsy hitako izay helok''ity Lehilahy ity amin''izay iampanganareo Azy.'
mg1865::mg_42::23::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia, na dia Heroda koa aza, fa namerina Azy ho aty amintsika izy; ary, indro, tsy nisy zavatra nataony izay tokony hahafaty Azy;'
mg1865::mg_42::23::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa hofaizako Izy, dia halefako.'
mg1865::mg_42::23::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: 17 Fa tsy maintsy mandefa ny anankiray ho an''ny olona izy amin''ny andro firavoravoana]'
mg1865::mg_42::23::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy rehetra niantso mafy indray miredona nanao hoe: Vonoy Io, ka Barabasy no alefaso ho anay!'
mg1865::mg_42::23::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa natao tao an-tranomaizina io Barabasy io noho ny fikomiana tao an-tanàna sy ny vonoan-olona.'
mg1865::mg_42::23::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tian''i Pilato halefa Jesoa, dia niteny indray izy.'
mg1865::mg_42::23::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona niantso kosa ka nanao hoe: Homboy, homboy amin''ny hazo fijaliana Izy!'
mg1865::mg_42::23::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy taminy fanintelony: Ka inona ary no ratsy nataony: tsy hitako izay helony tokony hahafaty Azy koa hofaizako Izy, dia halefako.'
mg1865::mg_42::23::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niantso tamin''ny feo mafy ny olona ka nangataka hanomboana an''i Jesoa amin''ny hazo fijaliana. Ary nahery ny feon''ny olona.'
mg1865::mg_42::23::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato dia nandidy hanao izay nangatahiny.'
mg1865::mg_42::23::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nalefany ilay natao tao an-tranomaizina noho ny fikomiana sy ny vonoan-olona, satria io no nangatahiny; fa Jesoa kosa natolony hataony araka ny sitrapony.'
mg1865::mg_42::23::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 26
  verse_date_revised: null
  verse_title: 'Ny nanomboana an''i Jesoa tamin''ny hazo fijaliana.'
  verse_text: 'Ary raha nitondra an''i Jesoa izy, dia nitana lehilahy Kyreniana anankiray atao hoe Simona, izay vao avy any an-tsaha, ka nampitondra iny ny hazo fijaliana hanaraka an''i Jesoa.'
mg1865::mg_42::23::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vahoaka betsaka nanaraka Azy ary vehivavy maro izay niteha-tratra sady nitomany Azy.'
mg1865::mg_42::23::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nitodika azy ka nanao hoe: Ry zanakavavin''i Jerosalema, aza mitomany Ahy, fa mitomania ny tenanareo sy ny zanakareo.'
mg1865::mg_42::23::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ho avy ny andro izay hilazany hoe: Sambatra ny momba sy ny kibo izay tsy niteraka ary ny nono izay tsy ninonoan-jaza.'
mg1865::mg_42::23::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hilaza amin''ny tendrombohitra hoe izy: Mianjerà aminay; ary amin''ny havoana hoe: Saròny izahay (Hosea 10:8).'
mg1865::mg_42::23::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ataony amin''ny hazo maitso izany hatao ahoana amin''ny maina?'
mg1865::mg_42::23::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy olon-dratsy roa lahy nentina hiaraka hovonoina aminy koa.'
mg1865::mg_42::23::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga teo amin''ny tany atao hoe Ikarandoha izy, dia teo no namonoany an''i Jesoa sy ireo olon-dratsy ireo, ny anankiray teo ankavanany ary ny anankiray teo ankaviany.'
mg1865::mg_42::23::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa: Raiko o, mamelà ny helony, fa tsy fantany izay ataony. Dia nanaovany loka no fizara ny fitafiany.'
mg1865::mg_42::23::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona nijanona teo ka nijery. Ary ny loholona kosa mba nandatsa ka nanao hoe: Namonjy ny sasany Izy; aoka hovonjeny ny tenany, raha Izy no Kristin''Andriamanitra, dia Ilay nofidina.'
mg1865::mg_42::23::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny miaramila koa nihomehy Azy, dia nankeo ka nanome Azy vinaingitra,'
mg1865::mg_42::23::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanao hoe: Raha Ianao no Mpanjakan''ny Jiosy, vonjeo ny tenanao.'
mg1865::mg_42::23::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy soratra teo amboniny nanao hoe: ITY NO MPANJAKAN''NY JIOSY.'
mg1865::mg_42::23::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ireo olon-dratsy nahantona teo ireo dia niteny ratsy Azy ka nanao hoe: Tsy Ianao va no Kristy? vonjeo ny tenanao sy izahay.'
mg1865::mg_42::23::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namaly kosa ilay anankiray, sady nananatra ny namany ka nanao hoe: Moa ianao koa tsy mba matahotra an''Andriamanitra na dia izao samy voaheloka izao aza?'
mg1865::mg_42::23::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary marina ny anamelohany antsika, satria mandray ny valin''ny nataontsika isika; fa ity Lehilahy ity kosa tsy mbola nanao zavatra tsy mety na dia kely akory aza.'
mg1865::mg_42::23::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Jesoa o, tsarovy aho, rehefa avy amin''ny fanjakanao Ianao.'
mg1865::mg_42::23::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Lazaiko aminao marina tokoa: Anio no hihaonanao amiko any Paradisa.'
mg1865::mg_42::23::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tokony ho tamin''ny ora fahenina, dia maizina ny tany rehetra ka naharitra hatramin''ny ora fahasivy izany,'
mg1865::mg_42::23::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria nihamaizina ny masoandro, ary triatra misasaka ny efitra lamba teo amin''ny tempoly.'
mg1865::mg_42::23::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso tamin''ny feo mahery Jesoa ka nanao hoe: Raiko o, eo an-tananao no atolotro ny fanahiko (Salamo 31:5) ary rehefa niteny izany Izy, dia afaka ny ainy.'
mg1865::mg_42::23::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapiteny, raha nahita izay zavatra tonga teo, dia nankalaza an''Andriamanitra ka nanao hoe: Lazaiko tokoa fa marina io Lehilahy io.'
mg1865::mg_42::23::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka rehetra izay vory teo mba hijery izany, raha nahita ny zavatra tonga teo, dia niverina miteha-tratra.'
mg1865::mg_42::23::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olom-pantany rehetra sy ny vehivavy izay nanaraka Azy avy tany Galilia dia nijanona teny lavidavitra eny nijery izany zavatra izany.'
mg1865::mg_42::23::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 50
  verse_date_revised: null
  verse_title: 'Ny nandevenana an''i Jesoa.'
  verse_text: 'Ary, indro, nisy lehilahy atao hoe Josefa, izay isan''ny Synedriona, dia lehilahy tsara fanahy sady marina.'
mg1865::mg_42::23::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany lehilahy izany tsy nanaiky ny hevitra sy ny nataon''ny sasany; avy tany Arimatia, tanànan''ny Jiosy, izy sady niandry ny fanjakan''Andriamanitra.'
mg1865::mg_42::23::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany lehilahy izany dia nankao amin''i Pilato ka nangataka ny fatin''i Jesoa.'
mg1865::mg_42::23::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampidininy ny faty ka nofonosiny hariry madinika, dia naleviny tao amin''ny fasana nolavahana tamin''ny vatolampy, izay tsy mbola nandevenana olona.'
mg1865::mg_42::23::54:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary andro fiomanana izany andro izany, ka efa antomotra ny Sabata.'
mg1865::mg_42::23::55:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vehivavy izay nomba Azy avy tany Galilia dia nanaraka teo aoriana ka nahita ny fasana sy izay fampandriny ny faty.'
mg1865::mg_42::23::56:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 23
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niverina ireo ka namboatra zava-manitra sy menaka manitra. Ary tamin''ny Sabata dia nitsahatra ihany izy araka ny lalàna.'
mg1865::mg_42::24::1:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsanganan''i Jesoa tamin''ny maty, sy ny nisehoany tamin''ny mpianany, ary ny niakarany ho any an-danitra.'
  verse_text: 'Fa nony maraina koa tamin''ny andro voalohany amin''ny herinandro, dia nankany amin''ny fasana izy nitondra ny zava-manitra izay efa namboariny.'
mg1865::mg_42::24::2:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitany fa, indro, ny vato efa voakodia niala tamin''ny fasana.'
mg1865::mg_42::24::3:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra izy, nefa tsy nahita ny fatin''i Jesoa Tompo.'
mg1865::mg_42::24::4:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola very hevitra tamin''izany izy, indreo, nisy roa lahy niseho taminy nitafy fitafiana manelatrelatra.'
mg1865::mg_42::24::5:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony natahotra izy ka niankohoka, dia hoy izy roa lahy taminy: Nahoana no ato amin''ny maty no itadiavanareo ny velona?'
mg1865::mg_42::24::6:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ato Izy fa efa nitsangana; tsarovy ny teny izay nataony taminareo, fony Izy mbola tany Galilia, hoe:'
mg1865::mg_42::24::7:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Zanak''olona tsy maintsy hatolotra eo an-tanan''ny mpanota ka hohomboana amin''ny hazo fijaliana ary hitsangana amin''ny andro fahatelo.'
mg1865::mg_42::24::8:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahatsiaro ny teniny izy.'
mg1865::mg_42::24::9:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niverina niala tamin''ny fasana izy, dia nilaza izany rehetra izany tamin''ny iraika ambin''ny folo lahy sy ny namany rehetra.'
mg1865::mg_42::24::10:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo Maria Magdalena sy Johana ary Maria, renin''i Jakoba; ary ny vehivavy sasany izay naman''ireo koa dia nilaza izany tamin''ny Apostoly.'
mg1865::mg_42::24::11:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nataony ho arirarira foana izany teny izany ka tsy ninoany.'
mg1865::mg_42::24::12:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Petera nitsangana, dia nihazakazaka nankany amin''ny fasana; ary niondrika izy ka nahita ny lambam-paty mipetraka mitokana; dia lasa nody izy sady gaga noho ny zavatra izay tonga teo.'
mg1865::mg_42::24::13:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indreo, nisy roa lahy tamin''ireny nandeha tamin''izany andro izany hankany amin''ny vohitra atao hoe Emaosy, tokony ho enim-polo stadio* raha any Jerosalema. [*Na: Roa ambin''ny folo kilometatra]'
mg1865::mg_42::24::14:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niresaka ny amin''izay zavatra rehetra nanjo izy.'
mg1865::mg_42::24::15:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niresaka sy niara-nisaina izy, dia nanatona Jesoa ka niaraka taminy.'
mg1865::mg_42::24::16:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny mason''ireo nohazonina mba tsy hahafantarany Azy.'
mg1865::mg_42::24::17:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Ahoana izao teny resahinareo ety am-pandehanana izao? Dia nijanona ireo sady nalahelo tarehy.'
mg1865::mg_42::24::18:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray, izay atao hoe Kleopasy, namaly ka nanao taminy hoe: Ianao irery va no vahiny mitoetra any Jerosalema tsy mba mahalala* izay zavatra tonga tao tamin''izao andro izao? [*Na: Vahiny mitoetra irery angaha Ianao any Jerosalema ka tsy mahalala]'
mg1865::mg_42::24::19:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Zavatra manao ahoana moa izany? Ary hoy izy roa lahy taminy: Ny amin''i Jesoa avy any Nazareta, mpaminany mahery tamin''ny asa sy ny teny teo anatrehan''Andriamanitra sy ny vahoaka rehetra,'
mg1865::mg_42::24::20:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny amin''ny nanoloran''ny lohan''ny mpisorona sy ny mpanapaka eto amintsika Azy hanamelohany Azy ho faty, sy ny nanomboany Azy tamin''ny hazo fijaliana.'
mg1865::mg_42::24::21:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nantenainay fa Izy no Ilay efa hanavotra ny Isiraely; ary tsy izany ihany, fa androany no andro fahatelo hatr''izay nahatongavan''izany.'
mg1865::mg_42::24::22:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa kosa ny vehivavy sasany izay namanay nahahavery hevitra anay, fa tany amin''ny fasana maraina koa izy,'
mg1865::mg_42::24::23:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha tsy nahita ny faty izy, dia tonga ka nilaza fa efa nahita anjely niseho kosa, izay nilaza fa velona Izy.'
mg1865::mg_42::24::24:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha ny sasany izay nomba anay ka nankany amin''ny fasana, ary nahita araka izay nolazain''ny vehivavy; nefa Izy tsy hitany.'
mg1865::mg_42::24::25:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Ry adala sy votsa saina ka tsy mino izay rehetra nolazain''ny mpaminany.'
mg1865::mg_42::24::26:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy tokony ho niaritra izany va Kristy ka hiditra any amin''ny voninahiny?'
mg1865::mg_42::24::27:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanomboka hatramin''i Mosesy sy ny mpaminany rehetra Izy, ka nanambara taminy ny hevitry ny teny milaza Azy ao amin''ny Soratra Masina rehetra.'
mg1865::mg_42::24::28:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa mby teo akaikin''ny vohitra izay efa halehan''izy roa lahy izy, ary Jesoa toa nanao handeha lavitra kokoa.'
mg1865::mg_42::24::29:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo nanery Azy ka nanao hoe: Mitoera aty aminay; fa efa ho hariva izao, ka lasan-davitra ny andro. Dia niditra hitoetra tao aminy Izy.'
mg1865::mg_42::24::30:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niara-nipetraka nihinana teo aminy Izy, dia nandray ny mofo ka nisaotra, dia namaky sy nanolotra azy.'
mg1865::mg_42::24::31:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahiratra ny mason''ireo, ka nahalala Azy; fa Izy kosa dia tonga tsy hitany.'
mg1865::mg_42::24::32:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niresaka hoe izy: Tsy nangorakoraka va ny fontsika, raha niresaka tamintsika teny an-dàlana Izy ka namoaka ny hevitry ny Soratra Masina tamintsika?'
mg1865::mg_42::24::33:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niainga tamin''izany ora izany izy roa lahy ka niverina nankany Jerosalema, ary nahita ny iraika ambin''ny folo lahy mbamin''izay nomba azy tafangona teo'
mg1865::mg_42::24::34:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nilaza hoe: Efa nitsangana marina tokoa ny Tompo ka efa niseho tamin''i Simona.'
mg1865::mg_42::24::35:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo kosa dia nilaza izay efa niseho teny an-dalàna sy ny nahafantarany Azy tamin''ny namakiana ny mofo.'
mg1865::mg_42::24::36:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nilaza izany izy, Jesoa dia nitsangana teo afovoany ka nanao taminy hoe: Fiadanana ho anareo.'
mg1865::mg_42::24::37:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia taitra sady raiki-tahotra izy, satria nataony fa nahita matoatoa izy.'
mg1865::mg_42::24::38:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy Jesoa taminy: Nahoana no taitra ianareo? ary nahoana no miahanahana ny fonareo?'
mg1865::mg_42::24::39:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahao ny tanako sy ny tongotro, fa Izaho no Izy; tsapao Aho, ka jereo, fa ny matoatoa tsy mba manana nofo sy taolana, tahaka izao ahitanareo Ahy izao.'
mg1865::mg_42::24::40:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niteny izany Izy, dia nasehony azy ny tanany sy ny tongony.'
mg1865::mg_42::24::41:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola tsy nino ihany izy ireo noho ny hafaliana sady mbola talanjona, dia hoy Jesoa taminy: Manan-kanina va ianareo?'
mg1865::mg_42::24::42:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nomeny tapaky ny hazandrano voatono* Izy. [*Ampio hoe: sy tantely]'
mg1865::mg_42::24::43:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nandray, dia nihinana teo anatrehany.'
mg1865::mg_42::24::44:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Izy taminy: Izao no teniko izay nolazaiko taminareo, fony mbola tao aminareo Aho, fa tsy maintsy ho tanteraka izay rehetra nanoratana Ahy teo amin''ny lalàn''i Mosesy sy ny mpaminany ary ny Salamo.'
mg1865::mg_42::24::45:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanokatra ny sain''ireo Izy hahalala ny Soratra Masina.'
mg1865::mg_42::24::46:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Izany no voasoratra, fa Kristy hiaritra ka hitsangana amin''ny maty amin''ny andro fahatelo;'
mg1865::mg_42::24::47:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hotorina amin''ny anarany ny fibebahana sy ny famelan-keloka amin''ny firenena rehetra, manomboka eto Jerosalema.'
mg1865::mg_42::24::48:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo no vavolombelon''izany.'
mg1865::mg_42::24::49:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, Izaho mampitondra ny teny fikasan''ny Raiko ho anareo; fa mitoera eto an-tanàna mandra-panafiana anareo amin''ny hery avy any amin''ny avo.'
mg1865::mg_42::24::50:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nitondra azy hatrany Betania, dia nanandratra ny tanany ka nitso-drano azy.'
mg1865::mg_42::24::51:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nitso-drano azy Izy, dia nisaraka taminy ka nakarina ho any an-danitra.'
mg1865::mg_42::24::52:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nitsaoka Azy, dia niverina ho any Jerosalema sady faly indrindra.'
mg1865::mg_42::24::53:
  verse_version: mg1865
  verse_book: mg_42
  verse_chapter: 24
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo an-kianjan''ny tempoly isan''andro izy nankalaza an''Andriamanitra.'
