mg1865::mg_41::1::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Jaona Mpanao-batisa.'
  verse_text: 'Ny niandohan''ny filazantsaran''i Jesoa Kristy, Zanak''Andriamanitra.'
mg1865::mg_41::1::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay voasoratra ao amin''Isaia mpaminany* hoe: Indro, Izaho maniraka ny irako hialoha Anao, Izay hamboatra ny lalanao (Malakia 3:1) [*Na: ao amin''ny mpaminany]'
mg1865::mg_41::1::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! misy feon''ny miantso mafy any an''efitra hoe: Amboary ny lalan''i Jehovah. Ataovy mahitsy ny lalan-kalehany (Isaia 40:3),'
mg1865::mg_41::1::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niseho Jaona, izay nanao batisa tany an''efitra ka nitory ny batisan''ny fibebahana ho famelan-keloka.'
mg1865::mg_41::1::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha nanatona azy ny tany Jodia rehetra sy ny mponina rehetra tany Jerosalema, ka nataony batisa tao amin''ny ony Jordana ireny, rehefa niaiky ny fahotany.'
mg1865::mg_41::1::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jaona nitafy lamba volon-drameva; ary fehin-kibo hoditra no tamin''ny valahany, ary ny fihinany dia valala sy tantely remby.'
mg1865::mg_41::1::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitory izy ka nanao hoe: Avy ao aoriako Ilay mahery noho izaho, ka tsy miendrika hiondrika hamaha ny fehin-kapany aza aho.'
mg1865::mg_41::1::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho efa nanao batisa anareo tamin''ny rano, fa Izy kosa hanao batisa anareo amin''ny Fanahy Masina.'
mg1865::mg_41::1::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: '2022-06-25T06:38:57+0000'
  verse_title: 'Ny nanaovana batisa an''i Jesoa, sy ny nakan''i Satana fanahy Azy, ary ny nankanesany tany Galilia.'
  verse_text: 'Ary tamin''izany andro izany dia tonga avy tany Nazareta any Galilia Jesoa ka nataon''i Jaona batisa tao Jordana.'
mg1865::mg_41::1::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha vao niakatra avy teo amin''ny rano Izy, dia hitany ny lanitra nisokatra, ary ny Fanahy nidina tahaka ny voromailala ka nankeo amboniny.'
mg1865::mg_41::1::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo avy tany an-danitra nanao hoe: Ianao no Zanako malalako, Ianao no sitrako.'
mg1865::mg_41::1::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nampandehanin*''ny Fanahy ho any an''efitra Izy. [*Grika: noroahin'']'
mg1865::mg_41::1::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany an''efitra efa-polo andro Izy ka nalain''i Satana fanahy; ary teo amin''ny bibi-dia Izy, ary ny anjely nanompo Azy.'
mg1865::mg_41::1::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voasambotra Jaona, dia nankany Galilia Jesoa nitory ny filazantsaran''Andriamanitra'
mg1865::mg_41::1::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Efa tonga ny fotoana, ka efa akaiky ny fanjakan''Andriamanitra; mibebaha ianareo ka minoa ny filazantsara.'
mg1865::mg_41::1::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny niantsoan''i Jesoa an''i Petera sy Andrea ary Jakoba sy Jaona.'
  verse_text: 'Ary nony nandalo teny amoron''ny Ranomasin''i Galilia Izy, dia nahita an''i Simona sy Andrea, rahalahin''i Simona, nanarato teo amin''ny ranomasina; fa mpanarato izy.'
mg1865::mg_41::1::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Andeha hanaraka Ahy, fa hataoko mpanarato olona ianareo.'
mg1865::mg_41::1::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandao ny harato niaraka tamin''izay izy ka nanaraka Azy.'
mg1865::mg_41::1::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandroso kelikely Izy, nahita an''i Jakoba, zanak''i Zebedio, Jaona rahalahiny, izay teo an-tsambokely koa namboatra ny haratony.'
mg1865::mg_41::1::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso azy niaraka tamin''izay Izy; ary izy mirahalahy nandao an''i Zebedio rainy teo an-tsambokely mbamin''ny olona nokaramainy, ka dia nanaraka an''i Jesoa.'
mg1865::mg_41::1::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa tao Kapernaomy, sy ny nahasitranany ny demoniaka anankiray.'
  verse_text: 'Ary nankany Kapernaomy izy ireo; nony tamin''ny Sabata, dia niditra tao amin''ny synagoga niaraka tamin''izay Jesoa ka nampianatra.'
mg1865::mg_41::1::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona ny olona tamin''ny fampianarany, satria nampianatra azy tahaka izay manana fahefana Izy, fa tsy mba tahaka ny mpanora-dalàna.'
mg1865::mg_41::1::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nisy olona teo amin''ny synagogany, izay azon''ny fanahy maloto; ary niantso mafy ralehilahy'
mg1865::mg_41::1::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Moa mifaninona akory izahay sy Ianao, ry Jesoa avy any Nazareta? Avy handringana anay va Ianao? Fantatro fa Ilay Masin''Andriamanitra Ianao.'
mg1865::mg_41::1::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niteny mafy azy ka nanao hoe: Mangina ianao ka mivoaha aminy.'
mg1865::mg_41::1::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanahy maloto nampifanintontsintona ny tenan''ilay marary, dia niantso tamin''ny feo mahery ka niala taminy.'
mg1865::mg_41::1::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia gaga ny olona rehetra ka nifanontany hoe: Manao ahoana re izao zavatra izao? Fampianarana vaovao misy fahefana izao! fa ny fanahy maloto aza no didiany, ka dia manaiky Azy.'
mg1865::mg_41::1::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lazany dia niely niaraka tamin''izay teny tontolo eny tamin''ny tany rehetra eran''i Galilia.'
mg1865::mg_41::1::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny rafozambavin''i Petera mbamin''ny olona maro koa.'
  verse_text: 'Ary niaraka tamin''izay, raha nivoaka avy tao amin''ny synagoga izy, dia niditra tao an-tranon''i Simona sy Andrea Jesoa ary Jakoba sy Jaona.'
mg1865::mg_41::1::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rafozam-bavin''i Simona nandry teo nanavin''ny tazo; ary niaraka tamin''izay dia nilaza azy taminy izy ireo.'
mg1865::mg_41::1::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanatona Jesoa ka nandray ny tanany ary nanarina azy; dia afaka ny tazony, ka dia nanompo azy izy.'
mg1865::mg_41::1::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hariva ny andro, ka nilentika ny masoandro, dia nentina tany aminy ny marary rehetra sy ny demoniaka.'
mg1865::mg_41::1::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tao an-tanàna rehetra dia tafangona teo anoloan''ny varavarana avokoa.'
mg1865::mg_41::1::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahasitrana olona maro izay nararin''ny aretina samy hafa Izy sady namoaka demonia maro; ary tsy navelany hiteny ny demonia, satria nahafantatra Azy ireny.'
mg1865::mg_41::1::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tany an-tany foana, sy ny nandehanany nitety vohitra tany Galilia.'
  verse_text: 'Ary nifoha maraina alina koa Izy, dia nivoaka nankany an-tany foana ka nivavaka tany.'
mg1865::mg_41::1::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nandeha nitady Azy Simona sy ny namany.'
mg1865::mg_41::1::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita Azy izy, dia nanao taminy hoe: Ny olona rehetra mitady Anao.'
mg1865::mg_41::1::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa Izy taminy: Andeha isika hiala hankany amin''ny tanàna akaiky, mba hitoriako teny any koa; fa izay no nahatongavako.'
mg1865::mg_41::1::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha Izy ka nitori-teny tao amin''ny synagogan''ny olona eran''i Galilia sady namoaka ny demonia.'
mg1865::mg_41::1::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 40
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay boka.'
  verse_text: 'Ary nisy boka nanatona Azy ka nitaraina taminy sady nandohalika teo anatrehany ka nanao taminy hoe: Raha mety Ianao, dia mahay manadio ahy.'
mg1865::mg_41::1::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa dia onena azy ka naninjitra ny tanany, dia nanendry azy ka nanao taminy hoe: Mety Aho; madiova ianao.'
mg1865::mg_41::1::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia niala taminy ny habokany, ka dia nadio izy.'
mg1865::mg_41::1::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namepetra azy mafy Jesoa, dia nampandeha azy niaraka tamin''izay'
mg1865::mg_41::1::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Tandremo tsara mba tsy hisy holazainao na amin''iza na amin''iza; fa mandehana, misehoa amin''ny mpisorona, ka manatera ny fanadiovana anao, izay nandidian''i Mosesy, ho vavolombelona amin''ireo.'
mg1865::mg_41::1::45:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 1
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa lasa ralehilahy ka nilazalaza sy nampiely izany zavatra izany, ka dia tsy nahazo niditra miharihary tao an-tanàna intsony Jesoa; fa nitoetra tany ivelany tamin''ny tany foana Izy, dia nanatona Azy ny olona avy eny tontolo eny.'
mg1865::mg_41::2::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa an-dralehilahy nararin''ny paralysia tao Kapernaomy.'
  verse_text: 'Ary nony niditra tao Kapernaomy indray Izy, rehefa afaka andro vitsivitsy, dia re fa tao an-trano Izy,'
mg1865::mg_41::2::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia tafangona ny maro, ka tsy nisy hitoerana intsony, na dia teny anoloan''ny varavarana aza; ary Izy nitory ny teny taminy.'
mg1865::mg_41::2::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nanatona nitondra ny anankiray mararin''ny paralysisa ho eo aminy, izay nolanjain''efa-dahy.'
mg1865::mg_41::2::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria tsy afaka nanakaiky Azy izy noho ny habetsahan''ny vahoaka, dia nanesorany ny tafon''ny trano nitoeran''i Jesoa, ka nony efa voasokatra, dia nampidininy teo ny fandriana izay nandrian''ilay nararin''ny paralysisa.'
mg1865::mg_41::2::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa, nony nahita ny finoan''ireo, dia nanao tamin''ilay mararin''ny paralysisa hoe: Anaka, voavela ny helokao.'
mg1865::mg_41::2::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy mpanora-dalàna sasany nipetraka teo ka nieritreritra tao am-pony hoe:'
mg1865::mg_41::2::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana Ilehity no miteny toy izany? Miteny ratsy* Izy. Iza no mahavela heloka afa-tsy Iray ihany, dia Andriamanitra? [*Grika: manao blasfemia, izahao Matio 9:3]'
mg1865::mg_41::2::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay Jesoa dia nahalala tao am-panahiny fa nieritreritra izany tao am-pony ireo, dia hoy Izy taminy: Nahoana ianareo no mieritreritra izany zavatra izany ao am-ponareo?'
mg1865::mg_41::2::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza moa no moramora kokoa, ny manao amin''ilay mararin''ny paralysisa hoe: Voavela ny helokao, sa ny manao hoe: Mitsangàna, betao ny fandrianao, ka mandehana?'
mg1865::mg_41::2::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba ho fantatrareo fa ny Zanak''olona manana fahefana ety ambonin''ny tany hamela heloka, dia lazaiko aminao (hoy Izy tamin''ilay mararin''ny paralysisa):'
mg1865::mg_41::2::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, betao ny fandrianao, ka modia any an-tranonao.'
mg1865::mg_41::2::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana izy ka nambeta ny fandriany niaraka tamin''izay ary niala teo anatrehan''ny olona rehetra; dia talanjona izy rehetra ka nankalaza an''Andriamanitra nanao hoe: Tsy mbola nahita izay toy izao izahay.'
mg1865::mg_41::2::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny niantsoana an''i Levy (Matio), sy ny fanasana nataony tao an-tranony, ary ny tori-teny nataon''i Jesoa ny amin''ny fifadian-kanina.'
  verse_text: 'Ary lasa nandeha teny amoron-dranomasina indray Jesoa; ary ny vahoaka rehetra nanatona Azy, ka dia nampianatra azy Izy.'
mg1865::mg_41::2::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandalo Izy, dia nahita an''i Levy, zanak''i Alfeo, nipetraka teo am-pamorian-ketra*; ka hoy Izy taminy: Manaraha Ahy. Dia nitsangana izy ka nanaraka Azy. [*Izahao Matio 9:9]'
mg1865::mg_41::2::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nipetraka nihinana tao an-tranony Izy, dia maro ny mpamory hetra sy ny mpanota no niara-nipetraka nihinana tamin''i Jesoa mbamin''ny mpianany; fa nisy maro tao, dia nanaraka Azy izy.'
mg1865::mg_41::2::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanora-dalàna, izay isan''ny Fariseo*, raha nahita fa niara-nipetraka nihinana tamin''ny mpanota sy ny mpamory hetra Izy, dia niteny tamin''ny mpianatra hoe: Miara-mihinana sy misotro amin''ny mpamory hetra sy ny mpanota Izy! [*Na:Ary ny Mpanora-dalàna sy ny Fariseo]'
mg1865::mg_41::2::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahare izany Jesoa, dia nanao taminy hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary; tsy tonga hiantso ny marina Aho, fa ny mpanota'
mg1865::mg_41::2::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianatr''i Jaona sy ny Fariseo nifady hanina tamin''izany; dia avy izy ka nanao tamin''i Jesoa hoe: Nahoana ny mpianatr''i Jaona sy ny mpianatry ny Fariseo no mifady hanina, fa ny mpianatrao kosa tsy mba mifady?'
mg1865::mg_41::2::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niteny taminy hoe: Mahay mifady va ny havan''ny mpampakatra raha mbola ao aminy ihany ny mpampakatra? Raha mbola ao aminy ihany ny mpampakatra dia tsy mahay mifady izy.'
mg1865::mg_41::2::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy ny andro izay hanalana ny mpampakatra hiala ao aminy, ka amin''izany andro izany hifady izy.'
mg1865::mg_41::2::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: '2023-01-07T09:12:03+0000'
  verse_title: null
  verse_text: 'Tsy misy olona manjaitra tapa-damba tsy mbola voalòna amin''ny lamba tonta; fa raha izany, ny vaovao izay natampina dia handrovitra ny tonta, ka hitatra ny triatra.'
mg1865::mg_41::2::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta. fa raha izany, ny divay dia hahatriatra ny siny hoditra, ka dia samy ho very foana ny divay sy ny siny hoditra; fa divay vaovao no ho ao anaty siny hoditra vaovao.'
mg1865::mg_41::2::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: 'Ny nanotazan''ny mpianatra salohim-bary tamin''ny Sabata, sy ny naninian''ny Fariseo azy.'
  verse_text: 'Ary nandeha namaky ny tanim-bary tamin''ny Sabata Jesoa; ary ny mpianatra dia nanoty ny salohim-bary teny am-pandehanana.'
mg1865::mg_41::2::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo nanao taminy hoe: Indro, nahoana ireo no manao izay tsy mety amin''ny Sabata?'
mg1865::mg_41::2::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Tsy mbola novakinareo va ny teny milaza ilay nataon''i Davida, raha reraky ny hanoanana izy mbamin''izay nanaraka azy,'
mg1865::mg_41::2::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa niditra tao an-tranon''Andriamanitra tamin''ny andron''i Abiatara mpisoronabe izy ka nihinana ny mofo aseho, izay mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany, ary nomeny koa izay nanaraka azy?'
mg1865::mg_41::2::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Ny Sabata no natao ho an''ny olona, fa tsy ny olona ho an''ny Sabata.'
mg1865::mg_41::2::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia Tompon''ny Sabata aza ny Zanak''olona.'
mg1865::mg_41::3::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny lehilahy anankiray maty tànana tamin''ny Sabata, sy ny fahatezeran''ny Fariseo tamin''izany.'
  verse_text: 'Ary niditra tao amin''ny synagoga indray Jesoa: ary nisy lehilahy anankiray maty* tanana teo. [*Grika: efa maina, na malazo]'
mg1865::mg_41::3::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nizaha taratra Azy ny olona, na hahasitrana io amin''ny Sabata Izy na tsia, mba hiampangany Azy.'
mg1865::mg_41::3::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa tamin''ilay lehilahy maty tanana: Mitsangàna etsy afovoany.'
mg1865::mg_41::3::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy tamin''ny olona: Inona moa no mety hatao amin''ny Sabata, ny manao soa va, sa ny manao ratsy? ny mamonjy aina va, sa ny mahafaty? Fa tsy nety niteny ny olona.'
mg1865::mg_41::3::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nijerijery azy tamin''ny fahatezerana Izy sady nalahelo noho ny hamafin''ny fony, dia hoy Izy tamin-dralehilahy: Ahinjiro ny tananao. Dia nahinjiny, ka sitrana ny tanany.'
mg1865::mg_41::3::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lasa nivoaka ny Fariseo, ka niaraka tamin''izay dia niray tetika tamin''ny Herodiana izy hanohitra an''i Jesoa mba hahafaty Azy.'
mg1865::mg_41::3::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny olona maro teo amoron''ny Ranomasin''i Galilia.'
  verse_text: 'Ary Jesoa mbamin''ny mpianany niala teo ka nankany amin''ny ranomasina; ary nisy olona maro avy tany Galilia nanaraka Azy; ary nisy olona maro koa avy tany Jodia'
mg1865::mg_41::3::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Jerosalema sy Edoma sy tany an-dafin''i Jordana ary tamin''ny tany manodidina an''i Tyro sy Sidona nandre izay zavatra nataony, dia nankeo aminy.'
mg1865::mg_41::3::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nilaza tamin''ny mpianany mba hanisy sambokely hiandry Azy noho ny habetsahan''ny vahoaka, fandrao mifanety aminy ireo.'
mg1865::mg_41::3::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nahasitrana olona maro Izy, ka dia nifanety taminy mba hanendry Azy izay rehetra nanana aretina*. [*Grika: kapoka]'
mg1865::mg_41::3::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanahy maloto, raha nahita Azy dia niankohoka teo anatrehany ka niantso hoe: Ianao no Zanak''Andriamanitra.'
mg1865::mg_41::3::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrara azy mafy Izy tsy hanao izay hahafantarana Azy.'
mg1865::mg_41::3::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nanendren''i Jesoa ny Apostoly roa ambin''ny folo lahy.'
  verse_text: 'Ary niakatra teo an-tendrombohitra Jesoa ka niantso izay tiany hankeo aminy; dia nankeo aminy ireo.'
mg1865::mg_41::3::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanendry roa ambin''ny folo lahy Izy ho ao aminy sy hirahiny hitori-teny'
mg1865::mg_41::3::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady hanana fahefana hamoaka ny demonia.'
mg1865::mg_41::3::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona dia nomeny anarana hafa koa hoe Petera;'
mg1865::mg_41::3::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jakoba, zanak''i Zebedio, sy Jaona, rahalahin''i Jakoba; izy mirahalahy dia nomeny anarana hafa koa hoe Boaneryjesy, izany hoe Zana-baratra;'
mg1865::mg_41::3::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Andrea sy Filipo sy Bartolomeo sy Matio sy Tomasy sy Jakoba, zanak''i Alfeo, sy Tadeo sy Simona Kananeana* [*Na: Zelota, izahao Lioka 6:15]'
mg1865::mg_41::3::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Jodasy Iskariota, ilay namadika Azy.'
mg1865::mg_41::3::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny nitadiavan''ny havan''i Jesoa Azy, sy ny namalian''i Jesoa ny teny ratsy nataon''ny Fariseo.'
  verse_text: 'Ary niditra tao an-trano Izy, dia niangona indray ny vahoaka, ka dia tsy nahazo nihinan-kanina akory Izy.'
mg1865::mg_41::3::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny havany, raha nandre, dia nivoaka hihazona Azy; fa hoy ireo: Efa very saina Izy.'
mg1865::mg_41::3::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanora-dalàna izay nidina avy tany Jerosalema dia nanao hoe: Manana an''i Belzeboba Izy, sy hoe: Ny lohan''ny demonia no amoahany ny demonia.'
mg1865::mg_41::3::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niantso ireo hankeo aminy Izy, dia nanao fanoharana taminy hoe: Hataon''i Satana ahoana no famoaka an''i Satana?'
mg1865::mg_41::3::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy fanjakana miady an-trano, dia tsy haharitra izany fanjakana izany.'
mg1865::mg_41::3::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy mpiray trano miady an-trano, dia tsy haharitra izany mpiray trano izany.'
mg1865::mg_41::3::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha Satana no mitsangana hanohitra ny tenany ka miady an-trano, dia tsy haharitra izy, fa ho rava ny heriny.'
mg1865::mg_41::3::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tsy misy olona afaka miditra ao an-tranon''ny mahery ka handroba ny entany, raha tsy afatony aloha ilay mahery, dia vao robainy ny ao an-tranony.'
mg1865::mg_41::3::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Hahazo famelan-keloka ny zanak''olombelona amin''ny ota rehetra sy ny fitenenan-dratsy* rehetra izay ataony; [*Grika:blasfemia; izahao Matio 9:3]'
mg1865::mg_41::3::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izay miteny ratsy ny Fanahy Masina kosa dia tsy mahazo famelan-keloka mandrakizay, fa miendrika hohelohina ny amin''ny ota mandrakizay izy; izany no nolazainy,'
mg1865::mg_41::3::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria ny olona nanao hoe: Azom-panahy maloto Izy.'
mg1865::mg_41::3::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy ny reniny mbamin''ny rahalahiny ka nijanona teo ala-trano, dia naniraka tao aminy hiantso Azy.'
mg1865::mg_41::3::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka nipetraka manodidina Azy ka nanao taminy hoe: Indreo, ato ala-trano ny reninao sy ny rahalahinao mitady Anao.'
mg1865::mg_41::3::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly azy ka nanao hoe: Iza no reniko sy rahalahiko?'
mg1865::mg_41::3::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nijery izay nipetraka manodidina Azy Izy, dia hoy Izy: Indreo ny reniko sy ny rahalahiko!'
mg1865::mg_41::3::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 3
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no manao ny sitrapon''Andriamanitra, dia izy no rahalahiko sy anabaviko ary reniko.'
mg1865::mg_41::4::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanoharana nataon''i Jesoa.'
  verse_text: 'Ary nampianatra teo amoron''ny ranomasina indray Jesoa; ary nisy vahoaka betsaka nanatona Azy, dia niditra teo an-tsambokely Izy ka nipetraka teo amin''ny ranomasina; ary ny vahoaka rehetra dia teny an-tanety amoron-dranomasina.'
mg1865::mg_41::4::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampianatra azy zavatra maro tamin''ny fanoharana Izy ka nilaza tamin''ny fampianarany azy hoe:'
mg1865::mg_41::4::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa: Indro, nivoaka ny mpamafy mba hamafy.'
mg1865::mg_41::4::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana, dia avy ny vorona ka nandany izany.'
mg1865::mg_41::4::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tany marivo ambony vatolampy; dia nalaky nitrebona ireny, satria tsy nisy tany lalina.'
mg1865::mg_41::4::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa niposaka ny masoandro, dia nalazo ireny; ary satria tsy nanam-paka, dia maty izy.'
mg1865::mg_41::4::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo naniry ka nangeja azy, dia tsy namoa izy.'
mg1865::mg_41::4::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, ary raha naniry sy namoa, dia vokatra, fa namoa: ny sasany avy telo-polo heny, ary ny sasany avy enim-polo heny, ary ny sasany avy zato heny.'
mg1865::mg_41::4::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.'
mg1865::mg_41::4::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tao amin''ny mangingina Izy, dia nanontany Azy ny amin''ny fanoharana ireo nomba Azy mbamin''ny roa ambin''ny folo lahy.'
mg1865::mg_41::4::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Ianareo no efa nomena ny zava-miafina ny amin''ny fanjakan''Andriamanitra; fa amin''ireny izay any ivelany kosa ny zavatra rehetra dia atao amin''ny fanoharana;'
mg1865::mg_41::4::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hijery mandrakariva ihany izy, fa tsy hahita; ary mba handre mandrakariva ihany izy, fa tsy hahafantatra; fandrao hibebaka izy, ka havela ny helony (Isaia 6:9-10).'
mg1865::mg_41::4::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Tsy azonareo va ilay fanoharana teo? koa hataonareo ahoana no fahafantatra ny fanoharana rehetra?'
mg1865::mg_41::4::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpamafy dia mamafy ny teny.'
mg1865::mg_41::4::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireto no ilay teo amoron-dalana, dia izay amafazana ny teny, fa rehefa nandre izy, dia avy miaraka amin''izay Satana ka manaisotra ny teny izay nafafy tao aminy.'
mg1865::mg_41::4::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tahaka izany koa, ireto no ilay voafafy teny amin''ny tany marivo ambony vatolampy, dia izay mandre ny teny ka malaky mandray izany amin''ny hafaliana;'
mg1865::mg_41::4::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa tsy manam-paka ao anatiny ireny, fa maharitra vetivety foana; koa rehefa afaka izany, ka tonga izay fahoriana na fanenjehana noho ny teny, dia tafintohina miaraka amin''izay izy.'
mg1865::mg_41::4::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary misy hafa koa izay voafafy teny amin''ny tsilo, dia ireo no ilay nandre ny teny,'
mg1865::mg_41::4::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny fiahiahiana izao fiainana izao sy ny fitaky ny harena ary ny filàna ny zavatra hafa miditra, dia mangeja ny teny, ka tsy mamoa izy.'
mg1865::mg_41::4::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireto no ilay voafafy teny amin''ny tany tsara, dia izay mandre ny teny ka mandray azy dia mamoa: ny sasany avy telo-polo heny, ny sasany avy enim-polo heny, ary ny sasany avy zato heny.'
mg1865::mg_41::4::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Moa entina* va ny jiro mba hosaronan''ny vata famarana, na hatao ao ambanin''ny farafara? Tsy hatao amin''ny fanaovan-jiro va izy? [*Grika: avy]'
mg1865::mg_41::4::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy takona izay tsy ho hita, na miafina izay tsy haseho.'
mg1865::mg_41::4::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona manan-tsofina ho enti-mihaino, aoka izy hihaino.'
mg1865::mg_41::4::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Diniho izay teny renareo; araka ny ohatra anoharanareo ihany no hanoharana ho anareo, ary homena mihoatra aza ianareo.'
mg1865::mg_41::4::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manana no homena; ary ny amin''ny tsy manana, na dia izay ananany aza dia halaina aminy.'
mg1865::mg_41::4::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Toy izao ny fanjakan''Andriamanitra: tahaka ny lehilahy mamafy voa amin''ny tany'
mg1865::mg_41::4::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka matory sy mahatsiaro isan''alina sy isan''andro; ary ny voa dia mitsimoka ka maniry, nefa tsy fantany ny faniriny'
mg1865::mg_41::4::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tany mahavokatra ho azy: voalohany misy tahony, dia teraka, ary rehefa izany, dia feno voa.'
mg1865::mg_41::4::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa azo jinjana izy, dia jinjany miaraka amin''izay, fa efa tonga ny fararano.'
mg1865::mg_41::4::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Ahoana no hanoharantsika ny fanjakan''Andriamanitra, ary inona no fanoharana hanoharantsika azy?'
mg1865::mg_41::4::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny voantsinapy izy, izay kely noho ny voa rehetra, raha vao afafy amin''ny tany;'
mg1865::mg_41::4::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa voafafy kosa izy, dia maniry ka tonga lehibe noho ny anana rehetra, ary mandrantsana vaventy, ka azon''ny voro-manidina itoerana ny alokalony.'
mg1865::mg_41::4::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fanoharana maro toy izany no nanambarany ny teny taminy, araka izay hainy hohenoina.'
mg1865::mg_41::4::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy tamin''ny fanoharana dia tsy niteny taminy Izy; ary tamin''ny mangingina no nilazany tamin''ny mpianany ny hevitr''ireo rehetra ireo.'
mg1865::mg_41::4::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny nampitsaharan''i Jesoa ny tafio-drivotra.'
  verse_text: 'Ary androtrizay ihany, rehefa hariva ny andro, dia hoy Izy taminy: Andeha isika hita ho eny am-pita.'
mg1865::mg_41::4::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nampodin''ny mpianany ny vahoaka, dia nentiny tamin''io sambokely io tamin''izao ihany Jesoa. Ary nisy sambokely sasany koa niaraka taminy.'
mg1865::mg_41::4::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy tafio-drivotra mahery, ary nianjerazeran''ny alondrano ny sambokely ka nila ho feno rano.'
mg1865::mg_41::4::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa natory teo am-bodin''ny sambokely tambonin''ny ondana; ary namoha Azy izy ireo ka nanao taminy hoe: Mpampianatra o, tsy mampaninona Anao va izao hahafatesanay izao?'
mg1865::mg_41::4::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifoha Izy, dia niteny mafy ny rivotra sady nilaza tamin''ny ranomasina hoe: Mangina, mitsahara. Ary dia nitsahatra ny rivotra, ka tony tsara ny andro.'
mg1865::mg_41::4::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Nahoana no saro-tahotra ianareo? Tsy mbola manam-pinoana va ianareo?'
mg1865::mg_41::4::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 4
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary natahotra indrindra izy ireo ka niresaka hoe: Iza moa Ity, fa ny rivotra sy ny ranomasina aza manaiky Azy?'
mg1865::mg_41::5::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namoahan''i Jesoa ny demonia maro tamin''ny lehilahy tao amin''ny tanin''ny Gerasena.'
  verse_text: 'Ary tonga teny am-pitan''ny ranomasina tao amin''ny tanin''ny Gerasena izy ireo.'
mg1865::mg_41::5::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala teo an-tsambokely Izy, niaraka tamin''izay dia nisy lehilahy azom-panahy maloto nivoaka avy teny amin''ny fasana ka nifanena taminy,'
mg1865::mg_41::5::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nitoetra tao amin''ny fasana izy; ary tsy nisy olona nahafatotra azy intsony na dia tamin''ny gadra aza.'
mg1865::mg_41::5::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nafatony matetika tamin''ny gadra, na ny tanany, na ny tongony; nefa ny gadra tamin''ny tanany notapahiny, ary ny gadra tamin''ny tongony notorotoroiny, ka tsy nisy olona nahafolaka azy.'
mg1865::mg_41::5::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandrakariva, na andro na alina, dia nitoetra teny amin''ny fasana sy teny an-tendrombohitra izy ka ninananana sady niteti-tena tamin''ny vato.'
mg1865::mg_41::5::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nahita an''i Jesoa teny lavitra eny izy, dia nihazakazaka ka niankohoka teo anatrehany'
mg1865::mg_41::5::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady niantso tamin''ny feo mahery hoe: Moa mifaninona akory izaho sy Ianao, ry Jesoa, Zanak''Andriamanitra Avo Indrindra? Ampianianiko amin''Andriamanitra Ianao, aza mampijaly ahy,'
mg1865::mg_41::5::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria Jesoa efa nanao taminy hoe: Mivoaha amin''ity lehilahy ity, ry fanahy maloto.'
mg1865::mg_41::5::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany azy Jesoa hoe: Iza moa no anaranao? Ary izy namaly hoe: Legiona no anarako, satria maro izahay.'
mg1865::mg_41::5::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifona mafy taminy izy mba tsy horoahiny hiala amin''izany tany izany.'
mg1865::mg_41::5::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy kisoa maro andiany izay nandrasana teny akaikin''ny tendrombohitra.'
mg1865::mg_41::5::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifona taminy ireo ka nanao hoe: Alefaso izahay ho any anatin''ny kisoa mba hiditra any aminy.'
mg1865::mg_41::5::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia neken''i Jesoa. Ary ny fanahy maloto, rehefa nivoaka, dia niditra tao anatin''ny kisoa; ary ireo kisoa andiany ireo nitratrevatreva teny amin''ny hantsana ho any amin''ny ranomasina (tokony ho roa arivo no isany), ka dia maty* tany amin''ny ranomasina izy. [*Grika: kenda]'
mg1865::mg_41::5::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpiandry azy dia nandositra ka nilaza tao an-tanàna sy tany an-tsaha. Dia nandeha ny olona mba hizaha izany zavatra izany;'
mg1865::mg_41::5::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tonga tany amin''i Jesoa izy ka nahita ilay demoniaka, izay nisy ny legiona, fa indro izy nipetraka nitafy lamba sady ary saina; ka raiki-tahotra ny olona.'
mg1865::mg_41::5::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay efa nahita dia nilazalaza tamin''ny olona izay natao tamin''ilay demoniaka sy ny amin''ny kisoa.'
mg1865::mg_41::5::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifona tamin''i Jesoa izy mba hiala amin''ny taniny.'
mg1865::mg_41::5::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hiondrana teo an-tsambokely Jesoa, dia nangataka taminy ilay demoniaka mba hanaraka Azy.'
mg1865::mg_41::5::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy navelan''i Jesoa izy; fa hoy Izy taminy: Modia ihany any an-tranonao ho any amin''ny havanao, ka lazao aminy izay zavatra lehibe nataon''ny Tompo taminao sy ny namindrany fo taminao.'
mg1865::mg_41::5::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha izy ka nitory tany Dekapolisy izay zavatra lehibe efa nataon''i Jesoa taminy; ka dia gaga ny olona rehetra.'
mg1865::mg_41::5::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay vehivavy narary roa ambin''ny folo taona, sy ny nananganany ny zanakavavin''i Jairo tamin''ny maty.'
  verse_text: 'Ary rehefa nita an-tsambokely indray Jesoa ka tonga teny am-pita, dia nisy vahoaka betsaka tafangona teo aminy; ary teo amoron-dranomasina Izy.'
mg1865::mg_41::5::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia avy ny anankiray tamin''ny mpanapaka ny synagoga, Jairo no anarany; ary rehefa nahita an''i Jesoa izy, dia niankohoka teo amin''ny tongony'
mg1865::mg_41::5::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niangavy fatratra taminy hoe: Marary efa ho faty ny zanako-vavy kely; andeha re, mametraha ny tananao aminy, mba ho sitrana* izy ka ho velona. [*Grika: voavonjy]'
mg1865::mg_41::5::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha niaraka taminy Izy; ary nisy vahoaka betsaka nanaraka Azy ka nifanety taminy.'
mg1865::mg_41::5::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy anankiray izay efa narary* roa ambin''ny folo taona [*Grika: narary nandeha rà]'
mg1865::mg_41::5::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa niaritra zavatra be tamin''ny mpanao fanafody maro ka nandany ny fananany rehetra, nefa tsy nety sitrana, fa vao mainka nihanarary kokoa aza;'
mg1865::mg_41::5::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa rehefa nahare ny amin''i Jesoa izy, dia nankeo ivohony namaky ny vahoaka ary nanendry ny lambany.'
mg1865::mg_41::5::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Na dia ny fitafiany ihany aza no voatendriko, dia ho sitrana* aho. [*Grika: voavonjy]'
mg1865::mg_41::5::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia ritra ny loharanon''aretiny*, ka tsaroany tao amin''ny tenany fa sitrana izy. [*Grika: fandehanan''ny ràny]'
mg1865::mg_41::5::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia fantatr''i Jesoa fa nisy hery niala taminy, dia nihodina teo afovoan''ny vahoaka Izy ka nanao hoe: Iza izany nanendry ny lambako izany?'
mg1865::mg_41::5::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny mpianany taminy: Hitanao izao vahoaka mifanety aminao izao, ka hoy Ianao va: Iza no nanendry Ahy?'
mg1865::mg_41::5::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nijery manodidina Izy hizaha ny vehivavy izay efa nanao izany.'
mg1865::mg_41::5::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raiki-tahotra sady tora-kovitra ravehivavy, satria fantany izay natao taminy, ka dia nankeo aminy izy ka niankohoka teo anatrehany ary nanambara taminy ny marina rehetra.'
mg1865::mg_41::5::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Anaka, ny finoanao no nahasitrana* anao: mandehana soa aman-tsara, ary sitràna amin''ny aretinao. [*Grika: namonjy]'
mg1865::mg_41::5::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola niteny Jesoa, dia nisy tonga avy tany amin''ilay mpanapaka ny synagoga ka nanao hoe: Efa maty ny zanakao-vavy; nahoana ianao no mbola manahirana ny Mpampianatra ihany?'
mg1865::mg_41::5::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nahoan''i Jesoa izany teny nataony izany, fa* hoy Izy tamin''ilay mpanapaka ny synagoga: Aza matahotra, minoa fotsiny ihany. [*Na: Ary nony ren''i Jesoa ny teny nataony, dia]'
mg1865::mg_41::5::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy olona navelany hanaraka Azy afa-tsy Petera sy Jakoba ary Jaona, rahalahin''i Jakoba.'
mg1865::mg_41::5::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia tonga tao an-tranon''ilay mpanapaka ny synagoga izy ireo, ka hitan''i Jesoa ny tabataba, dia ny olona izay nitomany sy ninaonaona be ihany.'
mg1865::mg_41::5::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niditra Izy, dia niteny taminy hoe: Nahoana ianareo no mitabataba sy mitomany? Tsy maty razazavavy, fa matory.'
mg1865::mg_41::5::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihomehy Azy fatratra ny olona. Fa nandroaka azy rehetra Izy, dia nitondra ny ray aman-drenin-drazazavavy mbamin''izay olona teo aminy ka niditra tao amin''izay nisy an-drazazavavy.'
mg1865::mg_41::5::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandray ny tanan-drazazavavy Izy ka niteny taminy hoe: Talita komy, izany hoe, raha adika: Ry zazavavy, hoy Izaho aminao: Mitsangàna.'
mg1865::mg_41::5::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitsangana niaraka tamin''izay razazavavy ka afa-nandeha; fa efa roa ambin''ny folo taona izy. Ary niaraka tamin''izay dia talanjona indrindra ny olona.'
mg1865::mg_41::5::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 5
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nandrara azy mafy mba tsy ho fantatr''olona izany; ary nasainy nomena hanina razazavavy.'
mg1865::mg_41::6::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa tany amin''ny taniny, sy ny tsi-finoan''ny olona Azy.'
  verse_text: 'Ary niala teo Izy ka tonga tany amin''ny taniny, sady nanaraka Azy ny mpianany.'
mg1865::mg_41::6::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga ny Sabata, dia nampianatra tao amin''ny synagoga Izy; ary maro izay nihaino Azy dia talanjona indrindra ka nanao hoe: Taiza no nahazoan''ilehity izany zavatra izany, ary manao ahoana ny fahendrena nomena Azy sy izao asa lehibe ataon''ny tanany izao?'
mg1865::mg_41::6::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ilay mpandrafitra, zanak''i Maria, ary rahalahin''i Jakoba sy Josesy sy Jodasy sy Simona va Ilehity? Ary tsy ety amintsika va ireo anabaviny? Dia tafintohina taminy izy.'
mg1865::mg_41::6::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Tsy misy mpaminany tsy hajaina afa-tsy eo amin''ny taniny sy ny havany ary ny ankohonany ihany.'
mg1865::mg_41::6::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nahazo nampiseho hery akory Izy teo, afa-tsy ny nametraka ny tanany tamin''ny olona marary vitsy foana ka nahasitrana azy.'
mg1865::mg_41::6::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary gaga Izy noho ny tsy finoany. Dia nitety ny vohitra manodidina Izy ka nampianatra.'
mg1865::mg_41::6::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: 'Ny teny nataon''i Jesoa tamin''ny Apostoly roa ambin''ny folo lahy tamin''ny nanirahany azy hitoriteny.'
  verse_text: 'Ary niantso ny roa ambin''ny folo lahy hankeo aminy Izy ka naniraka azy tsiroaroa sy nanome azy fahefana hamoaka fanahy maloto.'
mg1865::mg_41::6::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrara azy Izy mba tsy hitondra zavatra ho any amin''ny halehany, na hanina, na kitapo, na vola* ao amin''ny fehin-kibony, afa-tsy tehina ihany. [*Grika: varahina]'
mg1865::mg_41::6::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa asio kapa ny tongotrareo; ary aza mitondra akanjo roa.'
mg1865::mg_41::6::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy taminy: Izay trano hidiranareo, dia mitoera ao mandra-pialanareo any.'
mg1865::mg_41::6::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay tanàna tsy hampandroso anareo, na tsy hihaino anareo, raha miala ianareo, dia ahintsano ny vovoka ao am-paladianareo ho vavolombelona aminy.'
mg1865::mg_41::6::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa nandeha izy ireo ka nitory fa tokony hibebaka ny olona.'
mg1865::mg_41::6::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary demonia maro no navoakany; ary nohosorany diloilo ny marary maro ka nositraniny.'
mg1865::mg_41::6::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny amin''i Heroda sy Jaona Mpanao-batisa.'
  verse_text: 'Ary nahare izany Heroda mpanjaka (fa efa nalaza ny anaran''i Jesoa), dia hoy izy: Jaona Mpanao batisa efa nitsangana tamin''ny maty izay, ka izany no ananany hery hanao ireo asa lehibe ireo.'
mg1865::mg_41::6::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny sasany: Elia Izy; ary hoy ny sasany: Mpaminany Izy dia toy ny anankiray amin''ny mpaminany.'
mg1865::mg_41::6::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahare izany Heroda, dia hoy izy: Jaona izay, ilay notapahiko ny lohany; efa nitsangana izy.'
mg1865::mg_41::6::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Heroda ihany no naniraka sy nisambotra an''i Jaona ka namatotra azy tao an-tranomaizina noho ny amin''i Herodiasy vadin''i Filipo rahalahiny; fa nanambady azy izy.'
mg1865::mg_41::6::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jaona efa nilaza tamin''i Heroda hoe: Diso ianao, raha manambady ny vadin''ny rahalahinao.'
mg1865::mg_41::6::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Herodiasy dia nanao otri-po taminy ka naniry hahafaty azy, nefa tsy nahazo.'
mg1865::mg_41::6::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Heroda natahotra an''i Jaona, satria fantany fa lehilahy marina sy masina izy, ka dia niaro azy izy; ary rehefa nandre azy izy, dia very hevitra be ihany*; ary nihaino azy tamin''ny hafaliana izy. [*Na: nanao zavatra maro]'
mg1865::mg_41::6::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga izay andro antonona, dia ilay nanaovan''i Heroda fanasana ho an''ny lehibe sy ny mpifehy arivo ary ny loholona tany Galilia tamin''ny andro fahatsiarovana ny* nahaterahany, [*Na: tamin''ny fitsingerenan''ny taona]'
mg1865::mg_41::6::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka niditra ny zanakavavin''i Herodiasy ary nandihy ka nahafaly an''i Heroda mbamin''izay niara-nipetraka nihinana teo aminy, dia hoy ny mpanjaka tamin-drazazavavy: Angataho amiko izay tianao na inona na inona, dia homeko anao.'
mg1865::mg_41::6::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nianiana taminy hoe izy: Na inona na inona hangatahinao amiko dia homeko anao na dia hatramin''ny antsasaky ny fanjakako aza.'
mg1865::mg_41::6::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka razazavavy ka nanao tamin-dreniny hoe: Inona no hangatahiko? Ary hoy reniny: Ny lohan''i Jaona Mpanao batisa.'
mg1865::mg_41::6::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra faingana niaraka tamin''izay izy ho ao amin''ny mpanjaka ka nangataka hoe: Tiako raha homenao ahy faingana eto an-dovia ny lohan''i Jaona Mpanao batisa.'
mg1865::mg_41::6::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalahelo indrindra ny mpanjaka, kanefa noho ny fianianany sy ny olona izay nipetraka nihinana teo, dia tsy sahy nandà azy izy.'
mg1865::mg_41::6::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay ny mpanjaka dia naniraka mpiambina, ka nasainy nentiny ny lohan''i Jaona. Ary dia nandeha izy, ka notapahiny tao an-tranomaizina ny lohany.'
mg1865::mg_41::6::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny teo an-dovia ny lohany ka nomeny an-drazazavavy; ary razazavavy kosa dia nanome azy an-dreniny.'
mg1865::mg_41::6::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany ny mpianany, dia tonga ka naka ny faty ary nandevina azy.'
mg1865::mg_41::6::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 30
  verse_date_revised: null
  verse_title: 'Ny nampihinanan''i Jesoa ny olona tsy omby dimy arivo.'
  verse_text: 'Ary ny Apostoly niangona teo amin''i Jesoa ka nilaza taminy izay rehetra efa nataony mbamin''izay nampianariny.'
mg1865::mg_41::6::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Avia ianareo hitokana any an-tany foana, ka mialà sasatra kelikely (fa maro no nifamoivoy, ka tsy nisy hihinanana aza).'
mg1865::mg_41::6::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha an-tsambokely izy hitokana any an-tany foana.'
mg1865::mg_41::6::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona nahita azy mandeha, sady betsaka no nahalala an''i Jesoa, dia niala avy teny amin''ny tanàna rehetra ny olona ka nihazakazaka nandeha an-tanety*, dia tonga talohany. [*Na: nandeha tongotra]'
mg1865::mg_41::6::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niala Jesoa, dia nahita vahoaka betsaka Izy ka onena azy, fa tahaka ny ondry tsy manana mpiandry ireo; dia nampianatra azy zavatra maro Izy.'
mg1865::mg_41::6::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hariva ny andro, dia nanatona Azy ny mpianany ka nanao hoe: Tany foana ity, ka efa hariva ny andro ankehitriny;'
mg1865::mg_41::6::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'ravao ny olona mba hankanesany eny an-tsaha sy eny amin''ny vohitra manodidina hividy hanina ho azy.'
mg1865::mg_41::6::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy namaly ka nanao taminy hoe: Omeonareo hanina izy. Fa hoy kosa izy ireo taminy: Handeha hividy mofo izay azon''ny denaria roan-jato va izahay, ka homenay azy hohaniny?'
mg1865::mg_41::6::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Izy taminy: Misy mofo firy any aminareo? Andeha, izahao. Ary rehefa fantany, dia hoy izy: Dimy sy hazandrano roa.'
mg1865::mg_41::6::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasain''i Jesoa nampipetraka ny olona rehetra hatao an-tokotokony eny ambonin''ny ahi-maitso izy.'
mg1865::mg_41::6::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nipetraka an-tokony zato sy dimam-polo avy ny olona.'
mg1865::mg_41::6::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voarain''i Jesoa ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy ka nisaotra, dia novakiny ny mofo ka natolony ny mpianatra mba harosony eny anoloan''ny olona; ary ny hazandrano roa nozarainy tamin''ny olona rehetra.'
mg1865::mg_41::6::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nihinana avokoa ny olona rehetra ka voky.'
mg1865::mg_41::6::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangoniny izay sombintsombin''ny mofo sy ny hazandrano, ka dia nahafeno harona roa ambin''ny folo.'
mg1865::mg_41::6::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nihinana ny mofo dia dimy arivo lahy.'
mg1865::mg_41::6::45:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay Jesoa dia nanery ny mpianany hiondrana an-tsambokely hita hialoha ho any Betsaida, mandra-pandràvany ny vahoaka.'
mg1865::mg_41::6::46:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanao veloma ny olona Izy, dia lasa nankany an-tendrombohitra hivavaka.'
mg1865::mg_41::6::47:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 47
  verse_date_revised: null
  verse_title: 'Ny nitsangananan''i Jesoa tambonin''ny ranomasina.'
  verse_text: 'Ary nony hariva ny andro, dia efa mby teo ampovoan''ny ranomasina ny sambokely, ary Izy irery ihany no teo an-tanety.'
mg1865::mg_41::6::48:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita azy ireo sahirana nivoy fatratra Izy, fa notohain''ny rivotra: ary tokony ho tamin''ny fiambenana fahefatra amin''ny alina dia nankeny aminy nitsangantsangana tambonin''ny ranomasina Jesoa ka nikasa handalo azy.'
mg1865::mg_41::6::49:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitany nitsangantsangana tambonin''ny ranomasina Izy, dia nataony ho matoatoa, ka niantso mafy izy ireo.'
mg1865::mg_41::6::50:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy rehetra samy nahita Azy avokoa, ka dia raiki-tahotra. Ary Izy niteny taminy niaraka tamin''izay ka nanao taminy hoe: Matokia, fa Izaho ihany; aza matahotra.'
mg1865::mg_41::6::51:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra nankeo aminy teo an-tsambokely Izy; dia nitsahatra ny rivotra, ka dia talanjona izy ireo.'
mg1865::mg_41::6::52:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy fantany ny amin''ny mofo; fa efa mafy ny fony.'
mg1865::mg_41::6::53:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tafita izy, dia tonga teo amin''ny tany Genesareta ka niantsona teo.'
mg1865::mg_41::6::54:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niala teo an-tsambokely izy, dia nahalala an''i Jesoa niaraka tamin''izay ny olona teo'
mg1865::mg_41::6::55:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nihazakazaka tamin''izany tany rehetra izany ary nitondra ny marary tamin''ny fandriana ho any amin''izay reny fa nitoerany.'
mg1865::mg_41::6::56:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 6
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na taiza na taiza no nidiran''i Jesoa, na tao amin''ny vohitra, na tao an-tanàna, na tany an-tsaha, dia napetraka teo an-kianja ny marary, ary ny olona nangataka hanendry na dia ny somotraviavin-dambany ihany aza; ary sitrana* izay rehetra nanendry Azy. [*Grika: voavonjy]'
mg1865::mg_41::7::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Tori-teny nataon''i Jesoa ny amin''ny fanaon-drazana.'
  verse_text: 'Ary niangona teo aminy ny Fariseo sy ny mpanora-dalàna sasany, izay avy tany Jerosalema'
mg1865::mg_41::7::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nahita ny mpianatra sasany fa nihinan-kanina tamin''ny tanana tsy madio, izany hoe, tsy voasasa.'
mg1865::mg_41::7::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa ny Fariseo sy ny Jiosy rehetra tsy mba mihinana, raha tsy efa manasa tsara* ny tanany, satria mitàna ny fampianarana voatolotry ny razana izy. [*Grika: sasàny amin''ny totohondry]'
mg1865::mg_41::7::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha avy any an-tsena, dia tsy mihinana izy, raha tsy misasa aloha. Ary misy fomba maro koa izay noraisiny hotanana, dia ny manasa kapoaka sy famarana* mbamin''izay fanaka varahina**.) [*Grika: sekstaria] [** ampio hoe: ary farafara]'
mg1865::mg_41::7::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany Azy ny Fariseo sy ny mpanora-dalàna hoe: Nahoana ny mpianatrao no tsy manaraka ny fampianarana voatolotry ny razana, fa mihinan-kanina amin''ny tanana tsy misasa izy?'
mg1865::mg_41::7::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nanao taminy hoe: Marina ny naminanian''Isaia anareo mpihatsaravelatsihy, araka ny voasoratra hoe: Ity firenena ity manaja Ahy amin''ny molony, Fa ny fony kosa lavitra Ahy.'
mg1865::mg_41::7::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa foana ny ivavahan''ireo amiko, Raha mampianatra ny didin''olombelona ho fampianarana izy. (Isaia 29:13).'
mg1865::mg_41::7::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahafoy ny didin''Andriamanitra ianareo ka mitana ny fanaon''ny olona.'
mg1865::mg_41::7::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy taminy: Hay! tsara ny nahafoizanareo ny didin''Andriamanitra mba hitandremanareo ny fampianarana voatolotra anareo!'
mg1865::mg_41::7::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Mosesy: Manajà ny rainao sy ny reninao (Eksodosy 20:12), ary koa: Izay miteny ratsy ny rainy sy ny reniny dia hatao maty tokoa (Eksodosy 21:17).'
mg1865::mg_41::7::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy kosa ianareo: Raha misy olona milaza amin''ny rainy na amin''ny reniny hoe: Efa korbana (izany hoe, fanatitra ho an''Andriamanitra) izay rehetra tokony hahazoanao soa avy amiko,'
mg1865::mg_41::7::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia* tsy avelanareo hanao na inona na inona ho an''ny rainy sy ny reniny intsony izy, [*Na: dia voafehin''ny voadiny izy. Ary dia etc]'
mg1865::mg_41::7::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia foananareo ny tenin''Andriamanitra amin''ny fampianarana voatolotra anareo, izay nasainareo hotandremana; ary zavatra maro mifanahatahaka amin''izany koa no ataonareo.'
mg1865::mg_41::7::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso ny vahoaka hankeo aminy indray Izy ka nanao taminy hoe: Mihainoa Ahy ianareo rehetra, ka mahafantara.'
mg1865::mg_41::7::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny zavatra avy eo ivelany izay miditra ao anatin''ny olona no mahaloto azy; fa izay mivoaka avy ao anatin''ny olona no mahaloto azy*. [*Ampio hoe:]'
mg1865::mg_41::7::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manan-tsofina ho enti-mihaino, aoka izy hihaino'
mg1865::mg_41::7::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa niala teo amin''ny vahoaka Izy ka niditra tao an-trano, dia nanontany Azy ny mpianany ny amin''izany fanoharana izany.'
mg1865::mg_41::7::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Hay! ianareo koa aza mba tsy mahafantatra! Tsy fantatrareo va fa izay rehetra eo ivelan''ny olona ka miditra ao anatiny dia tsy mahaloto azy,'
mg1865::mg_41::7::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria tsy miditra ao am-pony izany, fa ao an-kibony ihany, ka dia mivoaka ao amin''ny fivoahana; izany no nolazainy mba hahadio ny hanina rehetra.'
mg1865::mg_41::7::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Izay mivoaka avy ao amin''ny olona, dia izany no mahaloto azy.'
mg1865::mg_41::7::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa avy ao anatin''ny olona dia avy ao am-pony, no ivoahan''ny sain-dratsy, dia ny fijangajangana, ny halatra, ny vonoan-olona, ny fakam-badin''olona,'
mg1865::mg_41::7::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fieremana, ny lolom-po, ny fitaka, ny fijejojejoana, ny maso ratsy, ny fitenenan-dratsy*, ny avonavona, ny fahadalana: [*Grika: blasfemia; izahao Matio 9:3]'
mg1865::mg_41::7::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'izany zava-dratsy rehetra izany no mivoaka avy ao anatin''ny olona ka mahaloto azy.'
mg1865::mg_41::7::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 24
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny zanakavavin''ilay vehivavy Kananita.'
  verse_text: 'Ary niala teo Jesoa ka lasa nankany amin''ny sisin-tanin''i Tyro sy Sidona; dia niditra tao an-trano Izy, ary tiany tsy ho fantatry ny olona izany; kanefa tsy nahazo niery Izy.'
mg1865::mg_41::7::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niaraka tamin''izay dia nisy vehivavy anankiray nandre ny aminy (ny zananivavy tanora dia azom-panahy maloto), dia nankao ka niankohoka tamin''ny tongony.'
mg1865::mg_41::7::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary jentilisa ravehivavy, avy amin''ny firenena Syro-foinika; dia nangataka taminy izy mba hamoaka ny demonia amin''ny zananivavy.'
mg1865::mg_41::7::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Aoka ho voky aloha ny zaza; fa tsy mety raha maka ny mofon-jaza ka manipy azy ho an''ny amboakely.'
mg1865::mg_41::7::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ravehivavy namaly ka nanao taminy hoe: Eny, Tompoko; kanefa na dia ny amboakely ao ambanin''ny latabatra aza dia mba mihinana ny sombintsombin''ny mofon-jaza ihany.'
mg1865::mg_41::7::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Noho izany teny izany mandehana ianao; efa nivoaka tamin''ny zanakao-vavy ny demonia.'
mg1865::mg_41::7::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tonga tao an-tranony ravehivavy, dia hitany nandry teo ambonin''ny farafara ny zananivavy, ary ny demonia efa nivoaka taminy.'
mg1865::mg_41::7::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 31
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ny lehilahy anankiray marenina sady raiki-dela.'
  verse_text: 'Ary Jesoa niala indray tamin''ny sisin-tanin''i Tyro, dia namaky an''i Sidona sy ny tany Dekapolisy ka nankany amoron''ny Ranomasin''i Galilia.'
mg1865::mg_41::7::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy marenina sady raiki-dela anankiray nentiny tany aminy, ka nangataka taminy ireo mba hametrahany tanana.'
mg1865::mg_41::7::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra an-dralehilahy nitanila niala teo amin''ny vahoaka Izy, dia nangarona ny sofiny tamin''ny rantsan-tanany, dia nandrora ka nanendry ny lelany;'
mg1865::mg_41::7::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niandrandra ny lanitra Izy, dia nisento ka nanao taminy hoe: Efata, izany hoe: Maladia.'
mg1865::mg_41::7::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalady ny sofiny, sady voavaha ny fatoran''ny lelany, ka dia nahateny tsara izy.'
mg1865::mg_41::7::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrara ny olona teo Jesoa mba tsy hilazalaza na amin''iza na amin''iza; fa na dia norarany aza izy, dia vao mainka nampiely izany bebe kokoa.'
mg1865::mg_41::7::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 7
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona indrindra ny olona ka nanao hoe: Tsara ny nanaovany ny zavatra rehetra; fa sady mampahalady ny marenina Izy no mampiteny ny moana.'
mg1865::mg_41::8::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: '2022-06-29T05:54:53+0000'
  verse_title: 'Ny nampihinanan''i Jesoa ny olona efatra arivo, sy ny teny nentiny namaly ny Fariseo izay nitady famantarana avy any an-danitra.'
  verse_text: 'Tamin''izany andro izany, nony betsaka indray ny vahoaka teo sady tsy nanan-kohanina izy, dia nantsoin''i Jesoa hanatona Azy ny mpianany ka nilazany hoe:'
mg1865::mg_41::8::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahonena Ahy ireo vahoaka, fa hateloana izay no nitoerany taty amiko, sady tsy manan-kohanina izy;'
mg1865::mg_41::8::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha hampodiko ho any an-tranony mbola tsy nihinana izy, dia ho reraka eny an-dàlana, sady avy lavitra ny sasany.'
mg1865::mg_41::8::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpianany namaly Azy hoe: Aiza no hahazoana mofo aty an''efitra hahavoky ireto olona ireto!'
mg1865::mg_41::8::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanontany azy hoe: Misy mofo firy any aminareo? Ary hoy ireo: Fito.'
mg1865::mg_41::8::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasainy nipetraka tamin''ny tany ny vahoaka; ary dia nandray ny mofo fito Izy, ka rehefa nisaotra, dia novakiny ka natolony ny mpianany mba harosony; dia narosony teny anoloan''ny vahoaka izany.'
mg1865::mg_41::8::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy hazandrano madinika vitsy tao aminy; ka rehefa nanaovan''i Jesoa fisaorana ireo, dia nasainy naroso teny anoloany koa.'
mg1865::mg_41::8::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihinana ny olona, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka nisy fito sobiky.'
mg1865::mg_41::8::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tokony ho efatra arivo ireo. Dia nampodiny izy.'
mg1865::mg_41::8::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia niondrana an-tsambokely Izy mbamin''ny mpianany ka tonga tany amin''ny faritanin''i Dalmanota.'
mg1865::mg_41::8::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Fariseo nankany, dia niady hevitra taminy ary naka fanahy Azy ka nitady famantarana avy any an-danitra.'
mg1865::mg_41::8::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisento mafy am-panahy Jesoa ka nanao hoe: Nahoana ity taranaka ity no mitady famantarana? Lazaiko aminareo marina tokoa fa tsy homena famantarana akory ity taranaka ity.'
mg1865::mg_41::8::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandao azy Izy, dia niondrana indray ka lasa nankeny am-pita.'
mg1865::mg_41::8::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny nananaran''i Jesoa ny mpianany tsy hanaiky ny fampianaran''ny Fariseo.'
  verse_text: 'Ary tsy tsaroan''ireo ny hitondra mofo, ka tsy nisy teo an-tsambokely afa-tsy mofo iray ihany.'
mg1865::mg_41::8::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nananatra azy Izy ka nanao hoe: Mihevera, ka mitandrema ianareo, fandrao azon''ny masirasiran''ny Fariseo sy ny masirasiran''i Heroda.'
mg1865::mg_41::8::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niara-nisaina izy ka nanao hoe: Ny tsy nitondrantsika mofo angaha izany.'
mg1865::mg_41::8::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nahalala izany, dia nanao taminy hoe: Nahoana ianareo no miara-misaina, satria tsy manana mofo? Tsy mbola mahazo an-tsaina na mahafantatra va ianareo? Efa mafy va ny fonareo?'
mg1865::mg_41::8::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mana-maso, fa tsy mahita va ianareo? Ary manan-tsofina, fa tsy mandre va ianareo? Ary tsy mahatadidy va ianareo?'
mg1865::mg_41::8::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny mofo dimy no novakiko ho an''ny dimy arivo, firy harona moa no sombintsombiny nangoninareo? Hoy ny mpianany taminy: Roa ambin''ny folo.'
mg1865::mg_41::8::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny mofo fito ho an''ny efatra arivo, firy sobiky moa no sombintsombiny nangoninareo? Dia hoy ny mpianany: Fito.'
mg1865::mg_41::8::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Mbola tsy mahafantatra ihany va ianareo?'
mg1865::mg_41::8::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 22
  verse_date_revised: null
  verse_title: 'Ny nampahiratan''i Jesoa ny lehilahy jamba anankiray tany Betsaida.'
  verse_text: 'Ary tonga tany Betsaida izy; ary nisy nitondra lehilahy jamba teo amin''i Jesoa ka nangataka taminy hanendry ilay jamba.'
mg1865::mg_41::8::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitantana ilay jamba Izy ka nitondra azy teny ivelan''ny tanàna; ary rehefa nororany ny masony, ka napetrany taminy ny tanany, dia nanontaniany hoe izy: Mahita zavatra va ianao?'
mg1865::mg_41::8::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niandrandra ralehilahy ka nanao hoe: Mahita ny olona aho: fa toa hazo ny fijeriko azy, saingy mamindra.'
mg1865::mg_41::8::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia napetrany tamin''ny masony indray ny tanany, dia nibanjina ralehilahy ka nahiratra tsara, ary hitany miharihary ny zavatra rehetra.'
mg1865::mg_41::8::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nampody azy ho any an-tranony ka nanao hoe: Aza mankao an-tanàna.'
mg1865::mg_41::8::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 27
  verse_date_revised: null
  verse_title: 'Ny naneken''i Petera an''i Jesoa ho Kristy, Zanak''Andriamanitra, ary ny nilazan''i Jesoa voalohany ny amin''ny hahafatesany sy ny hitsanganany amin''ny maty.'
  verse_text: 'Ary Jesoa sy ny mpianany dia lasa nankeny amin''ireny tanàna momba an''i Kaisaria-filipo; ary nony teny an-dàlana dia nanontany ny mpianany Izy ka nanao taminy hoe: Ataon''ny olona ho iza moa Aho?'
mg1865::mg_41::8::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nanao taminy hoe: Jaona Mpanao batisa; fa hoy ny sasany: Elia; ary hoy ny sasany: Anankiray amin''ny mpaminany.'
mg1865::mg_41::8::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanontany azy hoe: Fa ianareo kosa manao Ahy ho iza? Dia namaly Petera ka nanao taminy hoe: Ianao no Kristy.'
mg1865::mg_41::8::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrara azy rehetra Izy mba tsy hilazalaza Azy amin''olona.'
mg1865::mg_41::8::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampianatra azy Izy fa ny Zanak''olona tsy maintsy hijaly mafy ka holavin''ny loholona sy ny lohan''ny mpisorona ary ny mpanora-dalàna, dia hovonoiny, ary rehefa afaka hateloana, dia hitsangana indray Izy.'
mg1865::mg_41::8::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naharihariny tsara no filaza izany teny izany. Ary Petera nanohina Azy hitanila kely, dia niteny mafy Azy.'
mg1865::mg_41::8::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nihodina, dia nijery ny mpianany ka niteny mafy an''i Petera hoe: Mankanesa ato ivohoko, ry Satana, satria tsy misaina izay an''Andriamanitra ianao, fa izay an''ny olona.'
mg1865::mg_41::8::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nantsoiny hanatona Azy ny vahoaka mbamin''ny mpianany, dia hoy Izy taminy: Raha misy ta-hanaraka Ahy, dia aoka izy handà ny tenany sy hitondra ny hazo fijaliany ka hanaraka Ahy.'
mg1865::mg_41::8::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no ta-hamonjy ny ainy, dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny amiko sy ny filazantsara, dia hamonjy izany.'
mg1865::mg_41::8::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona no soa azon''ny olona, raha mahazo izao tontolo izao aza, kanefa very ny ainy?'
mg1865::mg_41::8::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona no homen''ny olona ho takalon''ny ainy?'
mg1865::mg_41::8::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 8
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no ho menatra Ahy sy ny teniko amin''ity taranaka sady mijangajanga no manota ity, dia ho menatra azy kosa ny Zanak''olona, raha avy amin''ny voninahitry ny Rainy mbamin''ny anjely masina.'
mg1865::mg_41::9::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan''Andriamanitra tonga amin''ny hery.'
mg1865::mg_41::9::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny niovan''i Jesoa tarehy tao an-tendrombohitra'
  verse_text: 'Ary nony afaka henemana, Jesoa dia naka an''i Petera sy Jakoba ary Jaona ka nitondra azy nitokana niakatra ho any an-tendrombohitra avo anankiray; dia niova tarehy teo anatrehany Izy,'
mg1865::mg_41::9::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fitafiany niova nanelatrelatra sady fotsy indrindra, ka tsy misy mpamotsy lamba ambonin''ny tany mahafotsy toy izany.'
mg1865::mg_41::9::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Elia sy Mosesy niseho taminy ka niresaka tamin''i Jesoa.'
mg1865::mg_41::9::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny Petera ka nanao tamin''i Jesoa hoe: Raby o, tsara raha mitoetra eto isika; ary aoka hanao lay telo izahay: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia.'
mg1865::mg_41::9::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy fantany izay havaliny, satria efa raiki-tahotra izy rehetra.'
mg1865::mg_41::9::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy rahona niseho nanarona azy; ary dia nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako malalako, Izy no henoy.'
mg1865::mg_41::9::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay, nony nijery manodidina izy ireo, dia tsy nisy hitany intsony na iza na iza afa-tsy Jesoa irery ihany, Izay teo aminy.'
mg1865::mg_41::9::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nidina avy teo an-tendrombohitra Izy, dia nandrara azy Jesoa mba tsy hilazalaza amin''olona izay zavatra efa hitany mandra-pitsangan''ny Zanak''olona amin''ny maty.'
mg1865::mg_41::9::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitana izany teny izany izy ka nifampaka saina ny amin''izay hevitr''izany fitsanganana amin''ny maty izany.'
mg1865::mg_41::9::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanontany an''i Jesoa izy ka nanao hoe: Lazain*''ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha. [*Na: Nahoana no lazain'']'
mg1865::mg_41::9::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nanao taminy hoe: Elia dia avy aloha ihany ka mampody ny zavatra rehetra. Ary ahoana kosa no nanoratana ny amin''ny Zanak''olona fa tsy maintsy mijaly mafy Izy ka hatao tsinontsinona?'
mg1865::mg_41::9::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa lazaiko aminareo: Efa tonga Elia, sady nataon''ny olona taminy izay sitraky ny fony araka ny nanoratana azy.'
mg1865::mg_41::9::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: 'Ny nahasitranan''i Jesoa ilay zazalahy nampahorin''ny demonia.'
  verse_text: 'Ary nony tonga teo amin''ny mpianatra izy, dia nahita vahoaka betsaka manodidina azy sy mpanora-dalàna niady hevitra taminy.'
mg1865::mg_41::9::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay, nony nahita Azy ny vahoaka rehetra, dia talanjona ka nihazakazaka nanatona sy niarahaba Azy.'
mg1865::mg_41::9::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nanontany azy hoe: Inona no iadianareo hevitra amin''ireto?'
mg1865::mg_41::9::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ny vahoaka namaly ka nanao hoe: Mpampianatra o, nentiko ho ety aminao ny zanako-lahy, izay azom-panahy moana;'
mg1865::mg_41::9::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary na aiza na aiza no ahazoany azy, dia ampihinjitrinjiriny izy, ary mandoa vory, dia mikitro-nify sady valaka dia valaka; ary niteny tamin''ny mpianatrao aho mba hamoaka izany; fa tsy hainy.'
mg1865::mg_41::9::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly azy hoe: Ry taranaka tsy mino, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento ety amiko izy.'
mg1865::mg_41::9::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny teo aminy izy; fa nony nahita an''i Jesoa izy, dia nampifanintontsintona ny tenany niaraka tamin''izay ny fanahy. Dia lavo tamin''ny tany izy sady nitsinkasinkasina sy nandoa vory.'
mg1865::mg_41::9::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanontany an-drainy hoe: Hoatrinona izay no nahatongavan''izao taminy? Ary hoy izy: Hatry ny fony izy mbola zaza.'
mg1865::mg_41::9::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nazerany matetika tao anaty afo sy tao anaty rano izy hamonoany azy; fa raha mba misy hainao, dia mamindrà fo aminay, ka vonjeo izahay.'
mg1865::mg_41::9::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Hainao hoe? Ny zavatra rehetra dia hain''ny mino.'
mg1865::mg_41::9::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia niantso* ny rain-drazazalahy ka nanao hoe: Mino aho; vonjeo mba ho afaka amin''ny tsy finoako. [*Ampio hoe: sady nandrotsa-dranomaso].'
mg1865::mg_41::9::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''i Jesoa fa nihazakazaka nanatona azy ny vahoaka, dia niteny mafy ny fanahy maloto Izy ka nanao taminy hoe: Ry fanahy moana sy marenina! Izaho mandidy anao: Mivoaha aminy, ka aza miditra ao anatiny intsony.'
mg1865::mg_41::9::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa ninananana izy sady nampifanintontsintona mafy ilay zazalahy, dia nivoaka taminy; ary efa toy ny maty, ka dia nataon''ny maro hoe: Maty.'
mg1865::mg_41::9::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nandray ny tanany ka nanarina azy; dia nitsangana izy.'
mg1865::mg_41::9::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga tao an-trano Jesoa, dia nanontany Azy mangingina ny mpianany hoe: izahay* tsy nahavoaka azy. [*Na:Nahoana izahay no]'
mg1865::mg_41::9::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Iny karazana iny tsy mba azo avoaka na amin''inona na amin''inona, afa-tsy amin''ny fivavahana* ihany. [*Ampio hoe: sy ny fifadian-kanina].'
mg1865::mg_41::9::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa fanindroany ny hahafatesany sy ny hitsanganany indray.'
  verse_text: 'Dia niala teo izy ka nizotra namaky an''i Galilia, ary tsy tian''i Jesoa ho fantatry ny olona izany.'
mg1865::mg_41::9::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nampianatra ny mpianany Izy ka nanao taminy hoe: Ny Zanak''olona dia hatolotra eo an-tanan''ny olona ka hovonoiny; ary rehefa voavono Izy, dia hitsangana rehefa afaka hateloana.'
mg1865::mg_41::9::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy ireo tsy nahafantatra izany teny izany sady natahotra hanontany Azy.'
mg1865::mg_41::9::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 33
  verse_date_revised: null
  verse_title: 'Ny nampianaran''i Jesoa ny mpianany hanetry tena sy hifankatia.'
  verse_text: 'Ary tonga tao Kapernaomy izy; ary rehefa mby tao an-trano Jesoa, dia nanontany ny mpianany hoe: Inona no niadianareo hevitra teny an-dàlana?'
mg1865::mg_41::9::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nahateny izy, satria efa niady hevitra teny an-dàlana izy ny amin''izay lehibe indrindra.'
mg1865::mg_41::9::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 35
  verse_date_revised: '2022-06-29T05:54:44+0000'
  verse_title: null
  verse_text: 'Ary rehefa tafapetraka Jesoa, dia niantso ny roa ambin''ny folo lahy Izy ka nanao taminy hoe: Raha misy te-ho voalohany, dia hatao farany amin''izy rehetra sy ho mpanompon''izy rehetra izy.'
mg1865::mg_41::9::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandray zaza Izy ka nametraka azy teo afovoany; ary raha notrotroiny ilay zaza, dia hoy Izy tamin''ny mpianany:'
mg1865::mg_41::9::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na zovy na zovy no mandray zaza iray tahaka itony amin''ny anarako, dia mandray Ahy; ary na zovy na zovy no mandray Ahy, dia tsy mandray Ahy, fa Izay naniraka Ahy.'
mg1865::mg_41::9::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jaona taminy: Mpampianatra o, nahita olona anankiray namoaka demonia tamin''ny anaranao izahay, ka noraranay izy, satria tsy nanaraka antsika.'
mg1865::mg_41::9::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa: Aza mandrara azy; fa tsy misy olona izay hanao asa lehibe amin''ny anarako ka hahateny ratsy Ahy vetivety.'
mg1865::mg_41::9::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tsy manohitra antsika dia momba antsika.'
mg1865::mg_41::9::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza no manome anareo rano eran''ny kapoaka hosotroinareo, satria an''i Kristy ianareo, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.'
mg1865::mg_41::9::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza no mahatafintohina na iray aza amin''ireo madinika mino Ahy ireo, dia tsara ho azy, raha anantonana vato lehibe fikosoham-bary ny vozony, ka hatsipy ao anaty ranomasina izy.'
mg1865::mg_41::9::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny tananao no manafintohina anao, tapaho izy; fa tsara ho anao ny hiditra kilemaina any amin''ny fiainana noho ny manana tanana roa, nefa hariana any amin''ny helo*, dia any amin''ny afo tsy azo vonoina. [*Grika: Gehena]'
mg1865::mg_41::9::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: any amin''ny kankana tsy maty, ary ny afo tsy vonoina]'
mg1865::mg_41::9::45:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny tongotrao no manafintohina anao, tapaho izy; fa tsara ho anao ny hiditra mandringa any amin''ny fiainana noho ny manana tongotra roa, nefa hariana any amin''ny helo.'
mg1865::mg_41::9::46:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: any amin''ny afo tsy azo vonoina; any ny kankany tsy maty, ary ny afo tsy vonoina]'
mg1865::mg_41::9::47:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny masonao no manafintohina anao, esory hiala izy: fa tsara ho anao ny hiditra toka-maso amin''ny fanjakan''Andriamanitra noho ny manana maso roa, nefa hariana any amin''ny helo;'
mg1865::mg_41::9::48:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'any ny kankany tsy maty, ary ny afo tsy vonoina.'
mg1865::mg_41::9::49:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy ho voasira amin''ny afo izy rehetra*. [*Ampio hoe: ary ny fanatitra rehetra samy ho voasira amin''ny fanasina]'
mg1865::mg_41::9::50:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 9
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny sira, fa raha tonga matsatso izy, inona no ho entinareo mampody ny tsirony? Aoka hisy sira ao anatinareo, ka mihavàna tsara ianareo.'
mg1865::mg_41::10::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nankanesan''i Jesoa tany an-dafin''i Jordana, sy ny namaliany ny fanontanian''ny Fariseo ny amin''ny fisaoram-bady.'
  verse_text: 'Ary niainga niala teo Jesoa, dia tonga tany amin''ny sisin-tanin''i Jodia sy tany an-dafin''i Jordana; ary nisy vahoaka betsaka indray niangona teo aminy; koa araka ny fanaony dia nampianatra azy indray Izy.'
mg1865::mg_41::10::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Fariseo nanatona Ary, dia naka fanahy Azy ka nanontany hoe: Mahazo misao-bady va ny lehilahy?'
mg1865::mg_41::10::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy namaly ka nanao taminy hoe: Ahoana no nandidian''i Mosesy anareo?'
mg1865::mg_41::10::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy: Navelan''i Mosesy hanoratra taratasy fisaoram-bady ny lehilahy ka hisao-bady (Deoteronomia 24:1).'
mg1865::mg_41::10::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Ny hamafin''ny fonareo no nanoratany izany didy izany ho anareo;'
mg1865::mg_41::10::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hatramin''ny fony vao nanaovana izao tontolo izao dia lahy sy vavy no nanaovany ny olona (Genesisy 1:27).'
mg1865::mg_41::10::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin''ny vadiny;'
mg1865::mg_41::10::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho nofo iray izy roroa (Genesisy 2:24) ka dia tsy ho roa intsony izy, fa ho nofo iray ihany.'
mg1865::mg_41::10::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay nakamban''Andriamanitra dia aoka tsy hampisarahin''olona.'
mg1865::mg_41::10::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony mby tao an-trano, dia nanontany ny amin''izany koa ny mpianatra.'
mg1865::mg_41::10::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy: Na zovy na zovy no misao-bady ka mampakatra vehivavy hafa, dia mijangajanga ka manala-baraka ny vadiny*. [*Na: mijangajanga mandika ny lalàn''ny fanambadiana ny amin''ny vadiny]'
mg1865::mg_41::10::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ravehivavy kosa no misaotra ny lahy ka manambady olon-kafa, dia mijangajanga izy.'
mg1865::mg_41::10::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nitondrana zaza ho eo amin''i Jesoa.'
  verse_text: 'Ary nisy nitondra zazakely ho eo aminy mba hametrahany tanana; fa ny mpianany niteny mafy ireny.'
mg1865::mg_41::10::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tezitra Jesoa, raha nahita izany, ka hoy Izy taminy: Avelao ny zaza hanatona Ahy, ary aza raràna; fa an''ny toa azy ny fanjakan''Andriamanitra.'
mg1865::mg_41::10::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan''Andriamanitra tahaka ny zaza, dia tsy ho tafiditra aminy akory.'
mg1865::mg_41::10::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitrotro azy Izy, dia nametra-tanana taminy ka nitso-drano azy.'
mg1865::mg_41::10::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Ny namalian''i Jesoa ny fanontanian''ny mpanan-karena anankiray, sy ny resaka nataony tamin''ny mpianany, rehefa lasa ralehilahy.'
  verse_text: 'Ary nony vao nivoaka nankeny an-dàlana Jesoa, dia nisy olona anankiray nihazakazaka nanatona ka nandohalika teo anatrehany ary nanontany Azy hoe: Mpampianatra tsara o, inona no hataoko handovako fiainana mandrakizay?'
mg1865::mg_41::10::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Nahoana Aho no ataonao hoe tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra.'
mg1865::mg_41::10::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatrao ny didy hoe: Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga, Aza manambaka, Manajà ny rainao sy ny reninao (Eksodosy 20:12-17).'
mg1865::mg_41::10::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy taminy Mpampianatra o, izany rehetra izany efa notandremako hatry ny fony aho mbola kely.'
mg1865::mg_41::10::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijery azy tsara, dia tia azy ka nanao taminy hoe: Diso zavatra iray loha ianao; mandehana, amidio izay rehetra anananao ka omeo ny malahelo, dia hanana rakitra any an-danitra ianao; ary avia hanaraka Ahy.'
mg1865::mg_41::10::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanjombona tery ny tarehiny tamin''izany teny izany, ka niala tamin''alahelo izy, satria nanana harena be.'
mg1865::mg_41::10::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijery manodidina ka nanao tamin''ny mpianany hoe: Manao ahoana ny hasarotry ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra!'
mg1865::mg_41::10::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianatra dia gaga tamin''ny teniny. Fa Jesoa namaly indray ka nanao taminy hoe: Anaka, manao ahoana ny hasarotry ny hidiran''ny matoky ny harena amin''ny fanjakan''Andriamanitra!'
mg1865::mg_41::10::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moramora kokoa ny hidiran''ny rameva amin''ny vodi-fanjaitra noho ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra.'
mg1865::mg_41::10::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia talanjona indrindra izy ka nanao taminy* hoe: Iza indray no azo hovonjena? [*Na: nifampilaza].'
mg1865::mg_41::10::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa nijery azy ka nanao hoe: Raha amin''ny olona, dia zavatra tsy hainy izany; fa tsy mba tahaka izany amin''Andriamanitra; fa ny zavatra rehetra dia hain''Andriamanitra.'
mg1865::mg_41::10::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Petera taminy: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao.'
mg1865::mg_41::10::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Jesoa: Lazaiko aminareo marina tokoa: Tsy misy olona efa nahafoy trano, na rahalahy, na anabavy, na reny, na ray, na zanaka, na tany, noho ny amiko sy ny filazantsara,'
mg1865::mg_41::10::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy handray zato heny amin''izao andro ankehitriny izao-dia trano sy rahalahy sy anabavy sy reny sy zanaka sy tany mbamin''ny fanenjehana-ary amin''ny andro ho avy dia fiainana mandrakizay.'
mg1865::mg_41::10::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.'
mg1865::mg_41::10::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa fanintelony ny hiaretany.'
  verse_text: 'Ary Jesoa sy ny mpianany dia teny an-dàlana niakatra ho any Jerosalema, ary Jesoa nandeha eo alohany; dia gaga ny mpianany, ary izay nanaraka Azy dia natahotra. Ary naka ny roa ambin''ny folo lahy indray Izy, dia nilaza taminy izay efa hanjo Azy'
mg1865::mg_41::10::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao hoe: Indro, miakatra ho any Jerosalema isika; ary ny Zanak''olona hatolotra ho amin''ireo lohan''ny mpisorona sy mpanora-dalàna; ary hohelohiny ho faty Izy ka hatolony amin''ny jentilisa;'
mg1865::mg_41::10::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hanao Azy ho fihomehezana ireny sy handrora Azy sy hikapoka Azy ary hahafaty Azy; fa rehefa afaka hateloana, dia hitsangana indray Izy.'
mg1865::mg_41::10::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny fangatahana nataon''i Jakoba sy Jaona ary ny navalin''i Jesoa azy.'
  verse_text: 'Ary Jakoba sy Jaona, zanak''i Zebedio, nanatona an''i Jesoa ka nanao taminy hoe: Mpampianatra o, tianay mba hataonao aminay izay angatahinay aminao.'
mg1865::mg_41::10::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Inona moa no tianareo hataoko aminareo?'
mg1865::mg_41::10::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy mirahalahy taminy: Mba ekeo ny hipetrahanay, ny anankiray ho eo amin''ny ankavananao, ary ny anankiray ho eo amin''ny an-kavianao, any amin''ny voninahitrao.'
mg1865::mg_41::10::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Tsy fantatrareo izay angatahinareo; hainareo va ny hisotro amin''ny kapoaka izay sotroiko, na ny hatao batisa amin''ny batisa izay anaovana Ahy batisa?'
mg1865::mg_41::10::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy mirahalahy taminy: Hainay ihany. Ary hoy Jesoa taminy: Raha ny kapoaka izay sotroiko, dia hosotroinareo ihany, ary ny batisa izay anaovana Ahy batisa dia hanaovana anareo ihany;'
mg1865::mg_41::10::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny hipetraka eo an-tanako ankavanana na eo an-tanako ankavia kosa, dia tsy Ahy ny hanome izany, fa izay nanamboarana izany no homena.'
mg1865::mg_41::10::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandre izany izy folo lahy, dia tezitra noho ny nataon''i Jakoba sy Jaona izy.'
mg1865::mg_41::10::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa niantso azy hanatona Azy ka nanao taminy hoe: Fantatrareo fa izay eken''ny jentilisa ho mpanapaka dia mampanompo azy, ary ny lehibeny dia mifehy azy.'
mg1865::mg_41::10::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba toy izany aminareo; fa na iza na iza no te-ho lehibe eo aminareo, dia ho mpanompo anareo izy.'
mg1865::mg_41::10::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na iza na iza no te-ho ambony eo aminareo, dia ho mpanompon''izy rehetra.'
mg1865::mg_41::10::45:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''olona tsy tonga mba hotompoina, fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.'
mg1865::mg_41::10::46:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 46
  verse_date_revised: null
  verse_title: 'Ny nampahiratan''i Jesoa an''i Bartimeo jamba teo akaikin''i Jeriko.'
  verse_text: 'Ary tonga tao Jeriko izy; ary raha vao niala tao Jeriko Jesoa mbamin''ny mpianany sy ny vahoaka betsaka, dia nipetraka teo amoron-dalana Bartimeo jamba mpangataka, zanak''i Timeo.'
mg1865::mg_41::10::47:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony reny fa, injay! Jesoa avy any Nazareta, dia niantso izy ka nanao hoe: Ry Jesoa, Zanak''i Davida o, mamindrà fo amiko!'
mg1865::mg_41::10::48:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro no niteny mafy azy mba hangina; fa vao mainka niantsoantso izy ka nanao hoe: Ry Zanak''i Davida o, mamindrà fo amiko.'
mg1865::mg_41::10::49:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nijanona, dia nanao hoe: Antsoy ilay jamba. Ary ny olona niantso azy ka nanao taminy hoe: Matokia, mitsangàna, miantso anao Izy.'
mg1865::mg_41::10::50:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanary ny lambany izy ka niantsambotra nankeo amin''i Jesoa.'
mg1865::mg_41::10::51:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly azy hoe: Inona no tianao hataoko aminao? Ary hoy ilay jamba taminy: Rabôny o, ny mba hampahiratina ny masoko.'
mg1865::mg_41::10::52:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 10
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Mandehana ianao, ny finoanao no efa namonjy anao. Dia nahiratra niaraka tamin''izay ny masony, ka nanaraka an''i Jesoa teny an-dàlana izy.'
mg1865::mg_41::11::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niakaran''i Jesoa tany Jerosalema.'
  verse_text: 'Ary raha nanakaiky any Jerosalema tao Betifaga sy Betania any an-tendrombohitra Oliva izy, dia naniraka roa lahy tamin''ny mpianany Jesoa'
mg1865::mg_41::11::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Mankanesa amin''iroa vohitra tandrifinareo iroa; ary raha vao miditra eo ianareo, miaraka amin''izay dia hahita zana-boriky mifatotra, izay tsy mbola nitaingenan''olona; vahao izy, ka ento ety.'
mg1865::mg_41::11::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona manao aminareo hoe: Ahoana no anaovanareo izao? dia lazao hoe: Misy raharaha analan''ny Tompo azy; dia havelany ho entina ety indray miaraka amin''izay izy.'
mg1865::mg_41::11::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandeha izy ka nahita zana-boriky nifatotra teo ala-trano anilan''ny varavarana teo an-dàlana, dia novahany izy.'
mg1865::mg_41::11::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sasany teo nanao taminy hoe: Ahoana no amahanareo ny zana-boriky?'
mg1865::mg_41::11::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nilaza taminy araka izay nolazain''i Jesoa taminy, dia navelan''ny olona handeha izy.'
mg1865::mg_41::11::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nentiny teo amin''i Jesoa ny zana-boriky, dia nataony teo amboniny ny lambany; ary Jesoa nitaingina azy.'
mg1865::mg_41::11::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary maro no namelatra ny lambany teny an-dàlana; ary ny sasany kosa nampihahaka rantsan-kazo izay efa nalainy tany an-tsaha.'
mg1865::mg_41::11::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nandeha teo alohany sy izay nanaraka teo aoriany dia samy niantso hoe: Hosana! Isaorana anie Izay avy amin''ny anaran''i Jehovah!'
mg1865::mg_41::11::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina anie ny fanjakana izay avy, dia ny an''i Davida raintsika! Hosana any amin''ny avo indrindra (Salamo 118:26).'
mg1865::mg_41::11::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niditra tany Jerosalema ka nankeo an-kianjan''ny tempoly; ary rehefa nijerijery ny zavatra rehetra Izy, sady efa hariva ny andro tamin''izay, dia niala Izy mbamin''ny roa ambin''ny folo lahy ka nankany Betania.'
mg1865::mg_41::11::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny nanozonan''i Jesoa ny aviavy tsy namoa, sy ny nandroahany ny mpivarotra, ary ny nanesorany ny varony hiala teo an-kianjan''ny tempoly.'
  verse_text: 'Ary nony ampitson''iny, rehefa niala tany Betania izy, dia noana Jesoa.'
mg1865::mg_41::11::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahatsinjo aviavy anankiray mandravina ery lavidavitra Izy, dia nankeo, fa toa hahita voany eo aminy; kanjo nony tonga teo aminy Izy, dia tsy nahita na inona na inona, afa-tsy ravina ihany; fa tsy mbola tonga ny taom-pamoazan''ny aviavy.'
mg1865::mg_41::11::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Aza misy mihinana voa avy aminao intsony mandrakizay. Ary ny mpianany nahare izany.'
mg1865::mg_41::11::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga tany Jerosalema izy: ary Jesoa niditra teo an-kianjan''ny tempoly, dia nandroaka izay nivarotra sy izay nividy teo an-kianjan''ny tempoly sady nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan''ny mpivarotra ny voromailala;'
mg1865::mg_41::11::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy navelany hisy olona hitondra fanaka handeha hamaky ny kianjan''ny tempoly.'
mg1865::mg_41::11::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampianatra Izy ka nanao taminy hoe: Tsy voasoratra hoe va: Ny tranoko hatao hoe trano fivavahana ho an''ny firenena rehetra? (Isaia 56:7) fa ianareo kosa efa nanao azy ho zohy fieren''ny jiolahy (Jeremia 7:11).'
mg1865::mg_41::11::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare izany ny lohan''ny mpisorona mbamin''ny mpanora-dalàna, ka dia nitady izay hamonoany Azy; saingy natahotra Azy izy, satria talanjona ny vahoaka rehetra noho ny fampianarany.'
mg1865::mg_41::11::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isan-kariva dia niala tao an-tanàna Izy.'
mg1865::mg_41::11::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina, raha nandalo izy, dia hitany fa efa nalazo hatramin''ny fakany ilay aviavy.'
mg1865::mg_41::11::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera nahatsiahy ka nanao taminy hoe: Raby o, indro fa efa malazo ilay aviavy nozoninao.'
mg1865::mg_41::11::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Manàna finoana an''Andriamanitra.'
mg1865::mg_41::11::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no hilaza amin''ity tendrombohitra ity hoe: Mifindrà, ka mianjerà any an-dranomasina, ka tsy hiahanahana ao am-pony, fa hino fa ho tonga ny zavatra lazainy, dia ho azony izany.'
mg1865::mg_41::11::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa lazaiko aminareo: Na inona na inona tononinareo amin''ny fivavahana sy angatahinareo, dia minoa fa efa nandray ianareo, dia ho azonareo izany.'
mg1865::mg_41::11::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mitsangana mivavaka ianareo, ka misy olona anananareo alahelo, dia mamelà ny helony, mba havelan''ny Rainareo Izay any an-danitra kosa ny helokareo.'
mg1865::mg_41::11::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 26
  verse_date_revised: '2022-06-27T11:55:12+0000'
  verse_title: null
  verse_text: '(Ampio hoe:) Fa raha ianareo tsy mamela heloka, ny Rainareo Izay any an-danitra kosa tsy hamela ny helokareo'
mg1865::mg_41::11::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 27
  verse_date_revised: '2022-06-29T05:54:35+0000'
  verse_title: 'Ny nanontanian''ny lohan''ny mpisorona sy ny loholona an''i Jesoa ny amin''ny fahefany, ary ny fanoharana navalin''i Jesoa azy.'
  verse_text: 'Ary tonga tany Jerosalema indray izy; ary raha nitsangantsangana teo an-kianjan''ny tempoly Jesoa, dia nanatona Azy ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona'
mg1865::mg_41::11::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nanao taminy hoe: Fahefana manao ahoana no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany hanaovanao izao zavatra izao?'
mg1865::mg_41::11::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanao taminy hoe: Hanontany anareo zavatra iray loha kosa Aho, ka valio Aho; ary dia holazaiko aminareo izay fahefana anaovako izao zavatra izao:'
mg1865::mg_41::11::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny batisan''i Jaona avy tany an-danitra va, sa avy tamin''ny olona? Valio Aho.'
mg1865::mg_41::11::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo niara-nisaina ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana ary no tsy nino azy ianareo?'
mg1865::mg_41::11::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha holazaintsika hoe kosa: Avy tamin''ny olona, natahotra ny olona izy, satria neken''ny olona rehetra fa mpaminany tokoa Jaona.'
mg1865::mg_41::11::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 11
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly an''i Jesoa izy ka nanao hoe: Tsy fantatray. Ary Jesoa nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
mg1865::mg_41::12::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niteny taminy Izy ka nanao fanoharana hoe: Nisy lehilahy anankiray nanao tanim-boaloboka ka namefy azy manodidina sy nihady famiazana ary nanao tilikambo, ka nahofany tamin''olona mpiasa tany izany, dia lasa nankany an-tany hafa izy.'
mg1865::mg_41::12::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny fotoana, dia naniraka mpanompo anankiray izy hankany amin''ny mpiasa tany handray amin''ny vokatry ny tanim-boaloboka.'
mg1865::mg_41::12::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo nisambotra ilay mpanompo sady nikapoka azy ka nampiala azy maina.'
mg1865::mg_41::12::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy naniraka mpanompo anankiray koa ho any aminy indray, fa io koa, dia noratrainy ny lohany, ka nalany baraka izy.'
mg1865::mg_41::12::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naniraka anankiray koa izy, fa io kosa indray dia novonoiny ho faty; ary maro koa no nirahiny, fa ny sasany nokapohiny, ary ny sasany novonoiny ho faty.'
mg1865::mg_41::12::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mbola nanana anankiray izy, dia ny zananilahy malalany, ka nony farany dia naniraka azy hankany aminy izy ka nanao hoe: Hanaja ny zanako izy.'
mg1865::mg_41::12::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany mpiasa tany izany niresaka hoe: Ity no mpandova; andeha hovonointsika izy, dia ho antsika ny lova.'
mg1865::mg_41::12::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nisambotra azy izy, dia nahafaty azy sy namoaka azy teo ivelan''ny tanim-boaloboka.'
mg1865::mg_41::12::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ahoana no hataon''ny tompon''ny tanim-boaloboka amin''izany? Ho avy izy, dia handringana ny mpiasa tany, ka homeny olon-kafa ny tanim-boaloboka.'
mg1865::mg_41::12::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mbola novakinareo va izao Soratra Masina izao: Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro;'
mg1865::mg_41::12::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''i Jehovah izao Ka mahagaga eo imasontsika? (Salamo 118:22-23.)'
mg1865::mg_41::12::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitady hisambotra Azy izy ireo, nefa natahotra ny vahoaka izy, satria fantany fa ny tenany no nolazainy tamin''izany fanoharana izany; dia nandao an''i Jesoa ny olona ka lasa.'
mg1865::mg_41::12::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nanontaniana an''i Jesoa ny amin''ny mandoa vola hetra ho an''i Kaisara.'
  verse_text: 'Ary nirahiny hankeo amin''i Jesoa ny sasany avy tamin''ny Fariseo sy ny Herodiana hamandrika Azy amin''ny teniny.'
mg1865::mg_41::12::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga izy ireo, dia nanao taminy hoe: Mpampianatra o, fantatray fa marina Ianao, ka tsy mampaninona Anao ny hevitry ny olona, fa tsy mba mizaha tavan''olona Ianao, fa mampianatra marina ny lalan''Andriamanitra. Mety va ny mandoa vola hetra ho an''i Kaisara, sa tsia?'
mg1865::mg_41::12::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handoa va izahay, sa tsy handoa? Fa Izy nahalala ny fihatsaram-belatsihiny, ka dia nanao taminy hoe: Nahoana no maka fanahy Ahy ianareo? Itondray denaria ety amiko hizahako azy.'
mg1865::mg_41::12::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondrany Izy. Ary hoy Izy taminy: An''iza io sary sy soratra io? Ary hoy izy taminy: An''i Kaisara.'
mg1865::mg_41::12::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Jesoa taminy: Aloavy ho an''i Kaisara izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra. Dia gaga taminy ireny.'
mg1865::mg_41::12::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 18
  verse_date_revised: null
  verse_title: 'Ny nanontanian''ny Sadoseo an''i Jesoa ny amin''ny hitsanganan''ny maty.'
  verse_text: 'Ary ny Sadoseo, izay milaza fa tsy misy fitsanganan''ny maty, dia nisy sasany tonga teo aminy ka nanontany Azy hoe:'
mg1865::mg_41::12::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpampianatra o, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin''ny maty, dia aoka ny rahalahiny hampakatra azy hiteraka hamelo-maso ny rahalahiny (Deoteronomia 25:5).'
mg1865::mg_41::12::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba.'
mg1865::mg_41::12::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faharoa nampakatra an-dravehivavy, dia maty momba koa; ary ny fahatelo dia toy izany ihany koa.'
mg1865::mg_41::12::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy fito mirahalahy dia samy maty momba avokoa. Koa faran''izy rehetra dia maty koa ravehivavy.'
mg1865::mg_41::12::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''ny fitsanganan''ny maty, ho vadin''iza moa ravehivavy, satria efa samy nanambady azy avokoa izy fito mirahalahy?'
mg1865::mg_41::12::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Tsy izao tsy fahafantaranareo ny Soratra Masina sy ny herin''Andriamanitra izao va no mahadiso hevitra anareo?'
mg1865::mg_41::12::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny hitsanganana amin''ny maty dia tsy hisy hampaka-bady na havoaka hampakarina; fa tahaka ny anjely any an-danitra izy.'
mg1865::mg_41::12::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka ny amin''ny hananganana ny maty, tsy mbola novakinareo va ny eo amin''ny bokin''i Mosesy, eo amin''ilay teny milaza ny Voaroy, dia ny nanaovan''Andriamanitra taminy hoe: Izaho no Andriamanitr''i Abrahama sy Andriamanitr''isaka ary Andriamanitr''i Jakoba? (Eksodosy 3:6.)'
mg1865::mg_41::12::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Andriamanitry ny maty Izy, fa an''ny velona; koa diso indrindra ianareo.'
mg1865::mg_41::12::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 28
  verse_date_revised: null
  verse_title: 'Ny nanontaniana an''i Jesoa ny amin''izay didy lehibe.'
  verse_text: 'Dia nanatona an''i Jesoa ny mpanora-dalàna anankiray, izay efa nahare ny niadiany hevitra tamin''ny Sadoseo ka nahalala fa namaly azy tsara Izy, dia nanontany Azy hoe: Ny didy manao ahoana no voalohany amin''izy rehetra?'
mg1865::mg_41::12::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly hoe: Ny voalohany dia izao: Mihainoa, ry Isiraely: Jehovah Andriamanitsika dia Jehovah iray ihany;'
mg1865::mg_41::12::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra sy ny sainao rehetra ary ny herinao rehetra (Deoteronomia 6:4-5).'
mg1865::mg_41::12::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faharoa dia izao: Tiava ny namanao tahaka ny tenanao (Levitikosy 19:18). Tsy misy didy hafa lehibe noho ireo.'
mg1865::mg_41::12::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay mpanora-dalàna taminy: Marina izany, Tompoko; tsara ny nilazanao fa iray ihany Andriamanitra, ary tsy misy afa-tsy Izy.'
mg1865::mg_41::12::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ho tia Azy amin''ny fo rehetra sy ny saina rehetra sy ny hery rehetra, ary ny ho tia ny namana tahaka ny tena, dia mihoatra lavitra noho ny fanatitra hodorana sy ny fanatitra hafa rehetra izany.'
mg1865::mg_41::12::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha hitan''i Jesoa fa namaly tamim-pahendrena izy, dia hoy Izy taminy: Tsy lavitra ny fanjakan''Andriamanitra ianao. Ary tsy nisy sahy nanontany Azy intsony.'
mg1865::mg_41::12::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 35
  verse_date_revised: null
  verse_title: 'Ny nanontanian''i Jesoa ny Fariseo ny amin''izay maha-Zanak''i Davida ny Mesia.'
  verse_text: 'Ary Jesoa, raha nampianatra teo an-kianjan''ny tempoly, dia namaly ka nanao hoe: Ahoana no lazain''ny mpanora-dalàna fa Kristy no Zanak''i Davida?'
mg1865::mg_41::12::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ny tenan''i Davida dia nampilazain''ny Fanahy Masina hoe: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao (Salamo 110:1).'
mg1865::mg_41::12::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenan''i Davida manao Azy hoe Tompo, koa ahoana no maha-Zanany Azy? Ary ny vahoaka betsaka nihaino Azy tamin''ny hafaliana.'
mg1865::mg_41::12::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 38
  verse_date_revised: null
  verse_title: 'Ny nilazan''i Jesoa ny faharatsian''ny mpanora-dalàna.'
  verse_text: 'Ary hoy Izy amin''ny fampianarany: Mitandrema ny amin''ny mpanora-dalàna izay mazoto mandehandeha miakanjo akanjo lava sy te-hoharabain''olona eny an-tsena,'
mg1865::mg_41::12::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tia ny fipetrahana aloha ao amin''ny synagoga sy ny fitoerana aloha ao amin''ny fanasana,'
mg1865::mg_41::12::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mandany ny tranon''ny mpitondratena ka manao vavaka lavareny mba ho fiolahana; ireo no hahazo fahamelohana mafimafy kokoa.'
mg1865::mg_41::12::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 41
  verse_date_revised: null
  verse_title: 'Ny amin''ilay mpitondratena nandatsa-bola tao amin''ny fandatsahan-drakitra.'
  verse_text: 'Ary raha nipetraka tandrifin''ny fandatsahan-drakitra Jesoa, dia nijery ny fandatsaky ny vahoaka tao; ary maro ny mpanankarena nandatsaka be tao.'
mg1865::mg_41::12::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisy mpitondratena malahelo anankiray kosa tonga teo, ka nandatsaka farantsakely* roa an-kevitry ny variroaventy avy. [*Grika: lepta roa, dia farantsakely varahina izany = kodranta iray = tokony ho variroaventy]'
mg1865::mg_41::12::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niantso ny mpianany hanatona Azy ka nanao taminy hoe: Lazaiko aminareo marina tokoa fa io mpitondratena malahelo io no efa nandatsaka be noho izay rehetra nandatsaka tao amin''ny fandatsahan-drakitra.'
mg1865::mg_41::12::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 12
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireo rehetra ireo, dia tamin''ny haben''ny fananany ho nandatsahany tao; fa izy kosa, tamin''ny alahelony no nandatsahany tao izay rehetra nananany, dia ny fivelomany rehetra.'
mg1865::mg_41::13::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanambaran''i Jesoa ny handravana an''i Jerosalema, sy ny hihaviany indray.'
  verse_text: 'Ary nony niala teo an-kianjan''ny tempoly Jesoa, dia hoy ny mpianany anankiray taminy: Mpampianatra o, akory re ireto vato sy rafitra ireto!'
mg1865::mg_41::13::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nanao taminy hoe: Hitanao va ireto rafitra lehibe ireto? Tsy havela hisy vato hifanongoa eto ka tsy horavana.'
mg1865::mg_41::13::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nipetraka teo amin''ny tendrombohitra Oliva tandrifin''ny tempoly Izy, dia nanontany Azy mangingina Petera sy Jakoba sy Jaona ary Andrea hoe:'
mg1865::mg_41::13::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao aminay: Rahoviana no hisy izany? ary inona no ho famantarana, rehefa ho tonga izany rehetra izany?'
mg1865::mg_41::13::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa nilaza taminy hoe: Mitandrema, fandrao hisy hamitaka anareo.'
mg1865::mg_41::13::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro no ho avy amin''ny anarako hanao hoe: Izaho no Izy, ka maro no ho voafitany.'
mg1865::mg_41::13::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mandre ady sy filazana ady ianareo, dia aza matahotra; tsy maintsy hisy izany, nefa tsy mbola tonga ny farany.'
mg1865::mg_41::13::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy horohorontany any amin''ny tany samy hafa, sady hisy mosary; izany no fiandohan''ny fahoriana*. [*Grika: faharariam-piterahana]'
mg1865::mg_41::13::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mitandrema ianareo, fa hatolotra amin''ny Synedriona sy hokapohina ao amin''ny synagoga ary hitsangana eo anatrehan''ny mpanapaka sy ny mpanjaka noho ny amiko ianareo ho vavolombelona aminy.'
mg1865::mg_41::13::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenena rehetra tsy maintsy hitoriana ny filazantsara aloha.'
mg1865::mg_41::13::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha mitondra anareo hatolotra izy, dia aza manahy rahateo izay holazainareo; fa izay teny homena anareo amin''izany ora izany no holazainareo; fa tsy ianareo no hiteny, fa ny Fanahy Masina.'
mg1865::mg_41::13::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahalahy hanolotra ny rahalahiny ho amin''ny fahafatesana, ary ny ray hanolotra ny zanany; ary ny zanaka hitsangana hanohitra ny rainy aman-dreniny ka hahafaty azy.'
mg1865::mg_41::13::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho halan''ny olona rehetra ianareo noho ny anarako: fa izay maharitra hatramin''ny farany no hovonjena.'
mg1865::mg_41::13::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha hitanareo mitsangana amin''izay tsy mety hitsanganany ny fahavetavetan''ny fandravana (Daniela 12:11; Daniela 9:27) (aoka hisaina izay mamaky izany), dia aoka handositra ho any an-tendrombohitra izay olona any Jodia.'
mg1865::mg_41::13::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay ao an-tampon-trano aoka tsy hidina na hiditra haka zavatra ao an-tranony.'
mg1865::mg_41::13::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay any an-tsaha aoka tsy hiverina haka ny lambany.'
mg1865::mg_41::13::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lozan''ny bevohoka sy ny mitaiza kely amin''izany andro izany!'
mg1865::mg_41::13::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mivavaha ianareo mba tsy ho amin''ny ririnina izany.'
mg1865::mg_41::13::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany andro izany dia hisy fahoriana izay tsy mbola nisy toy izany hatrizay nanaovan''Andriamanitra izao tontolo izao ka mandraka izao ankehitriny izao, sady tsy hisy intsony.'
mg1865::mg_41::13::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha tsy nohafohezin''ny Tompo izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy, izay nofidiny, dia nohafoheziny izany andro izany.'
mg1865::mg_41::13::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izay raha tàhiny misy olona manao aminareo hoe: Indro, ety Kristy, na: Indro, ery ; aza mino ianareo.'
mg1865::mg_41::13::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana*, ka haneho famantarana sy fahagagana hamitahany na dia ny olom-boafidy aza, raha azo atao izany. [*Na: hatsangana]'
mg1865::mg_41::13::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mitandrema kosa ianareo; indro, efa voalazako taminareo raha-teo ny zavatra rehetra.'
mg1865::mg_41::13::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''izany andro izany, raha afaka izany fahoriana izany, ny masoandro hohamaizinina, ary ny volana tsy haneho fahazavana,'
mg1865::mg_41::13::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny kintana hiraraka avy eny amin''ny lanitra, ary hohozongozonina ny hery izay ao amin''ny lanitra.'
mg1865::mg_41::13::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izay ny Zanak''olona dia ho hita avy eo amin''ny rahona amin''ny hery lehibe sy ny voninahitra.'
mg1865::mg_41::13::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izay dia haniraka ny anjely Izy, ary hanangona ny olom-boafidiny avy amin''ny vazan-tany efatra* hatramin''ny faran''ny tany ka hatramin''ny faran''ny lanitra. [*Grika: rivotra]'
mg1865::mg_41::13::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mianara ny fanoharana ny amin''ny aviavy: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona.'
mg1865::mg_41::13::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa ianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa efa akaiky eo am-baravarana Izy*. [*Na: izany]'
mg1865::mg_41::13::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa fa tsy mba ho lany* ity taranaka ity** mandra-pahatongan''izany rehetra izany. [*Grika: handalo] [** Na: ity firenena ity]'
mg1865::mg_41::13::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.'
mg1865::mg_41::13::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''izany andro na ora izany dia tsy misy mahalala, na dia ny anjely any an-danitra, ary na dia ny Zanaka aza, afa-tsy ny Ray ihany.'
mg1865::mg_41::13::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrema, miambena*, ka mivavaha; fa tsy fantatrareo izay hihavian''ny fotoana. [*Grika: miareta tory]'
mg1865::mg_41::13::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany dia tahaka ny olona nandeha hivahiny, izay nandao ny tranony ka nanome fahefana ny mpanompony, ka samy notolorany ny raharahany avy, ary ny mpiandry varavarana dia nasainy niambina tsara;'
mg1865::mg_41::13::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miambena ianareo, fa tsy fantatrareo izay andro hihavian''ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina,'
mg1865::mg_41::13::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'fandrao avy tampoka izy ka mahita anareo matory.'
mg1865::mg_41::13::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 13
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay lazaiko aminareo dia lazaiko amin''ny olona rehetra koa: Miambena.'
mg1865::mg_41::14::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nikendren''ny lohan''ny mpisorona sy ny loholona hamonoany an''i Jesoa.'
  verse_text: 'Rehefa indroa andro no sisa tsy hahatongavan''ny Paska, fihinanana ny mofo tsy misy masirasira, dia nitady hisambotra an''i Jesoa tamin''ny fitaka ny lohan''ny mpisorona sy ny mpanora-dalàna mba hamonoany Azy.'
mg1865::mg_41::14::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hoy izy: Tsy amin''ny andro firavoravoana, fandrao hampitabataba ny vahoaka.'
mg1865::mg_41::14::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: 'Ny nanosoran-dravehivavy an''i Jesoa tao an-tranon''i Simona boka.'
  verse_text: 'Ary nony tany Betania Jesoa tao an-tranon''i Simona boka ka nipetraka nihinana, dia avy ny vehivavy anankiray nitondra tavoara alabastara feno menaka manitra nisy narda saro-bidy indrindra; dia novakiny ny tavoara, ka naidiny tamin''ny lohan''i Jesoa ny menaka.'
mg1865::mg_41::14::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ny sasany tezitra ka nifampilaza hoe: Inona no anton''izao fandaniam-poana ny menaka manitra izao?'
mg1865::mg_41::14::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa azo namidy ho lafo tsy omby denaria telon-jato iny menaka manitra iny ka homena ny malahelo. Dia tezitra indrindra tamin-dravehivavy ireo.'
mg1865::mg_41::14::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Jesoa taminy: Avelao izy; nahoana ianareo no mampalahelo azy? Asa soa no nataony tamiko.'
mg1865::mg_41::14::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny malahelo dia eto aminareo mandrakariva, ary na oviana na oviana no tianareo hanaovana soa aminy, dia mahazo manao ianareo; fa Izaho kosa tsy mba ho eto aminareo mandrakariva.'
mg1865::mg_41::14::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanao izay azony natao izy: namonjy nanosotra ny tenako hanamboarany Ahy halevina izy.'
mg1865::mg_41::14::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko aminareo marina tokoa: Na aiza na aiza amin''izao tontolo izao no hitoriana ny filazantsara, dia holazaina koa izao nataon-dravehivavy izao mba ho fahatsiarovana azy.'
mg1865::mg_41::14::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny naneken''i Jodasy hamadika an''i Jesoa.'
  verse_text: 'Ary Jodasy Iskariota, ilay isan''ny roa ambin''ny folo lahy, dia nankeo amin''ny lohan''ny mpisorona hamadika an''i Jesoa aminy.'
mg1865::mg_41::14::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandre izany izy ireo, dia faly ka nanaiky hanome vola azy. Ary Jodasy dia nitady izay andro hahazoany mamadika Azy.'
mg1865::mg_41::14::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny niarahan''i Jesoa sy ny mpianany nihinana ny Paska.'
  verse_text: 'Ary tamin''ny voalohan''ny andro fihinanana ny mofo tsy misy masirasira, izay famonoana ny Paska, dia hoy ny mpianany taminy: Aiza no tianao halehanay hanamboaranay mba hihinananao ny Paska?'
mg1865::mg_41::14::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naniraka roa lahy tamin''ny mpianany Izy ka nanao taminy hoe: Mankanesa any an-tanàna, ary hisy lehilahy mitondra siny feno rano hifanena aminareo; dia manaraha azy.'
mg1865::mg_41::14::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazao amin''ny tompon''ny trano izay hidirany hoe: Izao no lazain''ny Mpampianatra: Aiza ny efi-trano hiarahako mihinana ny Paska amin''ny mpianatro?'
mg1865::mg_41::14::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy hanoro anareo efi-trano malalaka ambony rihana izay voaisy fipetrahana sady voavoatra tsara; any no amboary ho antsika.'
mg1865::mg_41::14::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpianatra nandeha, dia tonga tany an-tanàna ka nahita araka izay nolazainy taminy; dia namboatra ny Paska izy.'
mg1865::mg_41::14::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hariva ny andro, dia tonga Izy sy ny roa ambin''ny folo lahy.'
mg1865::mg_41::14::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nipetraka nihinana izy, dia hoy Jesoa: Lazaiko aminareo marina tokoa fa ny anankiray aminareo, dia izay iray miara-mihinana amiko, no hamadika Ahy.'
mg1865::mg_41::14::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalahelo izy, ka samy nanontany Azy tsirairay hoe: Izaho va izany?'
mg1865::mg_41::14::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy nanao taminy hoe: Izay anankiray amin''ny roa ambin''ny folo lahy miara-manatsoboka amiko ao anatin''ny lovia no izy.'
mg1865::mg_41::14::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''olona dia mandeha tokoa, araka ny nanoratana Azy, nefa lozan''izay olona hahazoana ny Zanak''olona hatolotra! Tsara ho an''izany olona izany raha tsy ary akory.'
mg1865::mg_41::14::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola nihinana izy, Jesoa nandray mofo; ka nony efa nisaotra, dia novakiny ka natolony azy ary nataony hoe: Raiso, ity no tenako.'
mg1865::mg_41::14::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandray kapoaka Izy, ka nony efa nisaotra, dia natolony azy; ka dia nisotroan''izy rehetra izany.'
mg1865::mg_41::14::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Ity no rako amin''ny fanekena*, izay alatsaka hamonjy ny maro. [*Na: fanekena vaovao]'
mg1865::mg_41::14::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazaiko aminareo marina tokoa: Tsy mba hisotro ny vokatry ny voaloboka intsony Aho mandra-pihavin''ny andro hisotroako izay vaovao any amin''ny fanjakan''Andriamanitra.'
mg1865::mg_41::14::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 26
  verse_date_revised: null
  verse_title: 'Ny resaka nataon''i Jesoa sy ny mpianany teny an-dalana, raha nankany an-tendrombohitra Oliva.'
  verse_text: 'Ary rehefa nihira fiderana izy, dia lasa nankany an-tendrombohitra Oliva.'
mg1865::mg_41::14::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Ho tafintohina avokoa ianareo rehetra; fa voasoratra hoe: Hamely ny mpiandry Aho, dia hihahaka ny ondry (Zakaria 13:7).'
mg1865::mg_41::14::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa mitsangana Aho, dia hialoha anareo ho any Galilia.'
mg1865::mg_41::14::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Petera taminy: Na dia ho tafintohina avokoa aza ny olona rehetra, izaho tsy mba ho tafintohina.'
mg1865::mg_41::14::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa taminy: Lazaiko aminao marina tokoa: Anio, dia amin''ity alina ity, raha tsy mbola misy akoho maneno fanindroany, dia handà Ahy intelo ianao.'
mg1865::mg_41::14::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa vao mainka niteny mafy dia mafy izy hoe: Na dia hiara-maty aminao aza aho, tsy mba handà Anao tokoa aho. Ary toy izany koa no nolazain''izy rehetra.'
mg1865::mg_41::14::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 32
  verse_date_revised: null
  verse_title: 'Jesoa tao Getsemane.'
  verse_text: 'Ary tonga tany amin''ny saha izay atao hoe Getsemane izy; dia hoy Jesoa tamin''ny mpianany: Mipetraha eto ianareo mandra-pivavako.'
mg1865::mg_41::14::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra an''i Petera sy Jakoba sy Jaona Izy, dia talanjona sady ory indrindra.'
mg1865::mg_41::14::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Fadiranovana loatra ny fanahiko toy ny efa ho faty; mitoera eto, ka miareta tory.'
mg1865::mg_41::14::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony nandroso kelikely Izy, dia niankohoka tamin''ny tany ka nivavaka mba hialan''izany ora izany aminy, raha azo atao.'
mg1865::mg_41::14::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy: Aba, Raiko o, ny zavatra rehetra hainao; esory amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao.'
mg1865::mg_41::14::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy Izy ka nahita azy ireo matory, dia hoy Izy tamin''i Petera: Ry Simona, matory va ianao? Tsy nahazaka niari-tory na dia ora iray ihany aza va ianao?'
mg1865::mg_41::14::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miareta tory ianareo, ka mivavaha, mba tsy hidiranareo amin''ny fakam-panahy; mety ihany ny fanahy, fa ny nofo no tsy manan-kery.'
mg1865::mg_41::14::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa indray Izy ka nivavaka nanao ilay teny teo ihany.'
mg1865::mg_41::14::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony niverina indray Izy, dia nahita azy matory, fa efa nilondolondo ny masony, ka tsy hitany izay havaliny Azy.'
mg1865::mg_41::14::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary avy fanintelony Izy, dia nanao taminy hoe: Matoria ary ankehitriny, ka mialà sasatra ianareo. Aoka izay; efa tonga ny ora; indro, ny Zanak''olona hatolotra ao an-tanan''ny mpanota.'
mg1865::mg_41::14::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, andeha isika; indro fa efa akaiky ilay mamadika Ahy.'
mg1865::mg_41::14::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 43
  verse_date_revised: null
  verse_title: 'Ny nisamborana an''i Jesoa'
  verse_text: 'Ary niaraka tamin''izay, raha mbola niteny Izy, dia avy Jodasy, isan''ny roa ambin''ny folo lahy, sady nisy vahoaka niaraka taminy, nitondra sabatra sy langilangy, nirahin''ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona.'
mg1865::mg_41::14::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay hamadika Azy efa nanome famantarana ireo ka nanao hoe: Izay horohako no Izy; sambory Izy ka ento, fa aza avela ho afaka.'
mg1865::mg_41::14::45:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga izy, dia nanatona an''i Jesoa niaraka tamin''izay ka nanao hoe: Raby o! dia nanoroka Azy izy.'
mg1865::mg_41::14::46:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona naninjitra ny tanany taminy ka nisambotra Azy.'
mg1865::mg_41::14::47:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''izay teo anilany nanatsoaka ny sabany, dia nikapa ny mpanompon''ny mpisoronabe ka nahafaka ny sofiny.'
mg1865::mg_41::14::48:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa namaly ka nanao taminy hoe: Mivoaka mitondra sabatra sy langilangy hisambotra Ahy toy ny hisambotra jiolahy va ianareo?'
mg1865::mg_41::14::49:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo aminareo isan''andro Aho nampianatra teo an-kianjan''ny tempoly, nefa tsy nisambotra Ahy ianareo; fa mba hahatanteraka ny Soratra Masina izao.'
mg1865::mg_41::14::50:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nandao Azy izy rehetra ka nandositra.'
mg1865::mg_41::14::51:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy zatovo anankiray nanaraka Azy, ka lamba hariry madinika fotsiny ihany no nitafiany, ary nosamborin''ny olona teo izy.'
mg1865::mg_41::14::52:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia navelany teny aminy ny lambany hariry madinika, ka nandositra nitanjaka izy.'
mg1865::mg_41::14::53:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 53
  verse_date_revised: null
  verse_title: 'Ny nitsarana an''i Jesoa teo anatrehan''ny mpisoronabe, sy ny nandavan''i Petera Azy intelo.'
  verse_text: 'Ary nitondra an''i Jesoa ho any amin''ny mpisoronabe izy; ary niangona teo aminy ny lohan''ny mpisorona rehetra sy ny loholona ary ny mpanora-dalàna.'
mg1865::mg_41::14::54:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Petera efa nanaraka Azy teny lavidavitra eny hatrany amin''ny kianjan''ny tranon''ny mpisoronabe; ary niara-nipetraka teo amin''ny mpiandry raharaha izy namindro teo anilan''ny afo.'
mg1865::mg_41::14::55:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona sy ny Synedriona rehetra nitady vavolombelona hiampanga an''i Jesoa hamonoany Azy, nefa tsy nahita.'
mg1865::mg_41::14::56:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro no niampanga lainga Azy, nefa tsy nifanaraka ny fiampangany.'
mg1865::mg_41::14::57:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitsangana ny sasany, dia niampanga lainga Azy nanao hoe:'
mg1865::mg_41::14::58:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izahay efa nandre Azy nanao hoe: Izaho handrava ity tempoly nataon-tanana ity, ary amin''ny hateloana dia hanangana hafa izay tsy nataon-tanana Aho.'
mg1865::mg_41::14::59:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nifanaraka ny filàzany na dia tamin''izany aza.'
mg1865::mg_41::14::60:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisoronabe nitsangana nankeo afovoany, dia nanontany an''i Jesoa ka nanao hoe: Tsy mety mamaly akory va Ianao? Inona no iampangan''ireto Anao?'
mg1865::mg_41::14::61:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy niteny Jesoa sady tsy namaly akory. Dia nanontany Azy indray ny mpisoronabe ka nanao taminy hoe: Ianao va no Kristy, Zanaky ny Isaorana?'
mg1865::mg_41::14::62:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Jesoa: Izaho no Izy; ary ho hitanareo ny Zanak''olona mipetraka eo ankavanan''ny Hery sady avy eo amin''ny rahon''ny lanitra.'
mg1865::mg_41::14::63:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpisoronabe nandriatra ny fitafiany ka nanao hoe: Ahoana no mbola ilantsika vavolombelona indray?'
mg1865::mg_41::14::64:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa renareo ny fitenenany ratsy*; ahoana no hevitrareo? Dia nataon''izy rehetra fa miendrika ho faty Izy. [*Grika: blasfemia, izahao Matio 9:3]'
mg1865::mg_41::14::65:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany nandrora Azy, dia nanarona ny tavany sady namely tahamaina Azy ka nanao hoe: Maminania; ary ny mpiandry raharaha namely tahamaina* Azy koa. [*Na. tehina]'
mg1865::mg_41::14::66:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nitoetra teo ambany teo an-kianja Petera, dia avy ny anankiray tamin''ny ankizivavin''ny mpisoronabe;'
mg1865::mg_41::14::67:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony nahita an''i Petera namindro izy, dia nijery azy ka nanao hoe: Ianao koa nomba an''i Jesoa avy any Nazareta.'
mg1865::mg_41::14::68:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy nandà ka nanao hoe: Tsy fantatro sy tsy azoko ny teninao. Dia niala ho eo am-bavahady izy, ary nisy akoho naneno.'
mg1865::mg_41::14::69:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay ankizivavy nahita azy indray, dia niteny tamin''izay teo anilany hoe: Io lehilahy io mba naman''ireny;'
mg1865::mg_41::14::70:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa izy nandà indray. Ary nony afaka kelikely, izay teo anilany koa dia nilaza tamin''i Petera hoe: Naman''ireo tokoa ianao; fa Galiliana ianao.'
mg1865::mg_41::14::71:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niozona sy nianiana izy ka nanao hoe: Tsy fantatro izany Lehilahy lazainareo izany.'
mg1865::mg_41::14::72:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 14
  verse_number: 72
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia nisy akoho naneno fanindroany. Ary Petera nahatsiaro ny teny izay nolazain''i Jesoa taminy hoe: Raha tsy mbola misy akoho maneno fanindroany, dia handà Ahy intelo ianao. Ary nony nieritreritra izany izy, dia nitomany.'
mg1865::mg_41::15::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsaran''i Pilato an''i Jesoa, sy ny nanolorany Azy hohomboana tamin''ny hazo fijaliana.'
  verse_text: 'Ary niaraka tamin''izay raha vao maraina ny andro, ny lohan''ny mpisorona sy ny loholona sy ny mpanora-dalàna mbamin*''ny Synedriona rehetra dia niara-nisaina ary namatotra an''i Jesoa ka nitondra Azy, dia nanolotra Azy teo amin''i Pilato. [*Na: dia]'
mg1865::mg_41::15::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato nanontany Azy hoe: Ianao va no Mpanjakan''ny Jiosy? Ary Izy namaly ka nanao taminy hoe: Voalazanao.'
mg1865::mg_41::15::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohan''ny mpisorona niampanga Azy zavatra maro.'
mg1865::mg_41::15::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato dia nanontany Azy indray hoe: Tsy mety mamaly akory va Ianao? He! izao hamaroan''ny zavatra iampangany Anao izao!'
mg1865::mg_41::15::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jesoa tsy namaly intsony, na dia indraim-bava akory aza, ka dia gaga Pilato.'
mg1865::mg_41::15::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaky ny avy ny andro firavoravoana dia fanaony ny mandefa mpifatotra iray izay angatahin''ny vahoaka.'
mg1865::mg_41::15::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anankiray ilay atao hoe Barabasy, nifatotra tao mbamin''ny mpikomy sasany, izay efa nahafaty olona tamin''ny fikomiana.'
mg1865::mg_41::15::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka niakatra ka nangataka azy hanao araka izay fanaony aminy.'
mg1865::mg_41::15::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Pilato namaly azy ka nanao hoe: Tianareo va mba ny Mpanjakan''ny Jiosy no halefako ho anareo?'
mg1865::mg_41::15::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantany fa fialonana no nanoloran''ny lohan''ny mpisorona Azy.'
mg1865::mg_41::15::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lohan''ny mpisorona nanome fo ny vahoaka, fa aleo Barabasy no halefan''i Pilato ho azy.'
mg1865::mg_41::15::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato namaly ka nanao taminy indray hoe: Ka inona ary no hataoko amin''ilay ataonareo hoe: Mpanjakan''ny Jiosy?'
mg1865::mg_41::15::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vahoaka niantso indray hoe: Homboy amin''ny hazo fijaliana Izy!'
mg1865::mg_41::15::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Pilato taminy: Fa inona moa no ratsy nataony? Nefa vao mainka niantsoantso izy ka nanao hoe: Homboy amin''ny hazo fijaliana Izy!'
mg1865::mg_41::15::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Pilato ta-hahazo sitraka tamin''ny vahoaka, ka dia nandefa an''i Barabasy ho azy; fa Jesoa nasainy nokapohina*, dia natolony azy mba hohomboana amin''ny hazo fijaliana. [*Izahao Matio 27:36]'
mg1865::mg_41::15::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 16
  verse_date_revised: null
  verse_title: 'Ny nanomboana an''i Jesoa tamin''ny hazo fijaliana.'
  verse_text: 'Ary ny miaramila nitondra an''i Jesoa ho eo an-kianja, dia ao anati-rova*, sady nanangona ny miaramila namany rehetra.'
mg1865::mg_41::15::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nampitafy Azy lamba volomparasy izy, sady nandrandrana satroka tsilo, ka nasatrony ny lohany.'
mg1865::mg_41::15::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niarahaba Azy hoe izy: Arahaba, ry Mpanjakan''ny Jiosy!'
mg1865::mg_41::15::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nikapoka ny lohany tamin''ny volotara izy sady nandrora Azy, dia nandohalika sy niankohoka teo anatrehany.'
mg1865::mg_41::15::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nanao Azy ho fihomehezana izy, dia nanala ilay lamba volomparasy teny aminy, ka nampitafiny Azy indray ny fitafiany; ary dia nentiny hohomboany amin''ny hazo fijaliana Izy.'
mg1865::mg_41::15::21:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Simona Kyreniana (rain''i Aleksandro sy Rofosy) izay nandalo avy tany an-tsaha, no notereny hitondra ny hazo fijalian''i Jesoa.'
mg1865::mg_41::15::22:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa dia nentiny teo amin''ny tany Golgota, izany hoe, raha adika, Fitoeran-karan-doha.'
mg1865::mg_41::15::23:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia notolorany divay miharo miora Izy; nefa tsy nety nisotro Izy.'
mg1865::mg_41::15::24:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa voahombony tamin''ny hazo fijaliana Izy, dia nanaovany loka no fizara ny fitafiany, hahitany izay ho azony avy.'
mg1865::mg_41::15::25:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny ora fahatelo no nanomboany tamin''ny hazo fijaliana.'
mg1865::mg_41::15::26:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny soratra milaza ny nanamelohana Azy dia voasoratra teo amboniny hoe: MPANJAKAN''NY JIOSY.'
mg1865::mg_41::15::27:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy jiolahy roa nohomboany tamin''ny hazo fijaliana koa, ny anankiray teo amin''ny ankavanany, ary ny anankiray teo amin''ny ankaviany.'
mg1865::mg_41::15::28:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: '* [*Ampio hoe: 28 Dia tanteraka ny Soratra Masina izay manao hoe: Ary natao ho isan''ny mpanota Izy (Isaia 53:12)]'
mg1865::mg_41::15::29:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nandalo niteny ratsy Azy sady nihifikifi-doha ka nanao hoe: Hià! ry Ilay maharava ny tempoly sy mahatsangana azy amin''ny hateloana,'
mg1865::mg_41::15::30:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'vonjeo ny tenanao, ka midìna hiala amin''ny hazo fijaliana.'
mg1865::mg_41::15::31:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa no faneson''ny lohan''ny mpisorona, fa niresaka izy sy ny mpanora-dalàna nanao hoe: Namonjy ny sasany Izy, fa ny tenany tsy hainy vonjena.'
mg1865::mg_41::15::32:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka Kristy, Mpanjakan''ny Isiraely, hidina hiala amin''ny hazo fijaliana ankehitriny mba ho hitantsika ka hinoantsika. Ary ireo niaraka nohomboana taminy tamin''ny hazo fijaliana dia naneso Azy koa.'
mg1865::mg_41::15::33:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tamin''ny ora fahenina, dia tonga maizina ny tany rehetra, ka naharitra hatramin''ny ora fahasivy izany.'
mg1865::mg_41::15::34:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny ora fahasivy Jesoa dia niantso tamin''ny feo mahery ka nanao hoe: Eloy, Eloy, lamà sabaktany! izay hoe, raha adika: Andriamanitro o, Andriamanitro o, nahoana no mahafoy Ahy Ianao? (Salamo 22:2).'
mg1865::mg_41::15::35:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny sasany izay nijanona teo, raha nandre izany, dia nanao hoe: Indro, miantso an''i Elia Izy.'
mg1865::mg_41::15::36:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray nihazakazaka, dia nanatsoboka sipaonjy tamin''ny vinaingitra, ka notohiziny tamin''ny volotara, dia natohony hotsentsefin''i Jesoa, fa hoy izy: Aoka ho hizahantsika, na ho avy hampidina Azy Elia, na tsia.'
mg1865::mg_41::15::37:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa niantso tamin''ny feo mahery, dia afaka ny ainy.'
mg1865::mg_41::15::38:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny efitra lamba tao amin''ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany.'
mg1865::mg_41::15::39:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kapiteny izay nijanona tandrifiny, raha nahita fa afaka toy izany ny ainy*, dia nanao hoe: Marina tokoa fa Zanak''Andriamanitra io Lehilahy io. [*Na: nahita Azy niantso toy izany, sady afaka ny ainy]'
mg1865::mg_41::15::40:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy vehivavy koa nitsinjo teny lavidavitra eny, ary isan''ireny Maria Magdalena sy Salome ary Maria, renin''i Jakoba kely sy Josesy,'
mg1865::mg_41::15::41:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nanaraka Azy ka nanompo Azy, fony Izy tany Galilia, mbamin''ny vehivavy maro koa izay niaraka taminy niakatra tany Jerosalema.'
mg1865::mg_41::15::42:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 42
  verse_date_revised: null
  verse_title: 'Ny nandevenana an''i Jesoa.'
  verse_text: 'Ary nony hariva (satria andro fiomanana ny andro, dia ny andro alohan''ny Sabata),'
mg1865::mg_41::15::43:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia avy Josefa avy any Arimatia, lehilahy manan-kaja, izay isan''ny Synedriona sady niandry ny fanjakan''Andriamanitra koa; ary sahy niditra tao amin''i Pilato izy ka nangataka ny fatin''i Jesoa.'
mg1865::mg_41::15::44:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary gaga Pilato raha maty sahady Jesoa, ka dia niantso ny kapiteny hankao aminy izy ka nanontaniany azy na efa maty ela Izy, na tsia.'
mg1865::mg_41::15::45:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nahare tamin''ny kapiteny izy, dia nomeny an''i Josefa ny faty.'
mg1865::mg_41::15::46:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nividy hariry madinika, dia nampidininy ny fatin''i Jesoa ka nofonosiny hariry madinika, ary naleviny tao amin''ny fasana, izay nolavahana tamin''ny vatolampy, dia nanakodia vato ho eo amin''ny varavaran''ny fasana izy.'
mg1865::mg_41::15::47:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 15
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Maria Magdalena sy Maria, renin''i Josesy, dia nijery izay nametrahany Azy.'
mg1865::mg_41::16::1:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsanganan''i Jesoa tamin''ny maty, sy ny nisehoany tamin''ny mpianany, ary ny nampiakarana Azy ho any an-danitra.'
  verse_text: 'Ary rehefa afaka ny andro Sabata, dia lasa nividy zava-manitra Maria Magdalena sy Salome ary Maria, renin''i Jakoba, mba handeha hanosotra ny fatin''i Jesoa.'
mg1865::mg_41::16::2:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony maraina koa tamin''ny voalohan''andro amin''ny herinandro, rehefa niposaka ny masoandro, dia nankany amin''ny fasana izy ireo.'
mg1865::mg_41::16::3:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niresaka hoe izy: Iza re no hanakodia ny vato ho afaka amin''ny varavaram-pasana hisolo antsika?'
mg1865::mg_41::16::4:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nony nitraka izy, dia, indro, hitany fa efa voakodia niala ny vato; fa lehibe dia lehibe ny vato.'
mg1865::mg_41::16::5:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha niditra tao anatin''ny fasana izy, dia nahita zatovo anankiray nipetraka teo amin''ny ankavanana niakanjo akanjo fotsy, dia talanjona izy.'
mg1865::mg_41::16::6:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ilay zatovo taminy: Aza talanjona; mitady an''i Jesoa avy any Nazareta, Izay nohomboana tamin''ny hazo fijaliana, ianareo; efa nitsangana Izy; tsy ato Izy; jereo fa teo no nametrahany Azy.'
mg1865::mg_41::16::7:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandehana, lazao amin''ny mpianany sy Petera fa mialoha anareo ho any Galilia Izy; any no hahitanareo Azy, araka izay nolazainy taminareo.'
mg1865::mg_41::16::8:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka izy ka lasa nandositra niala tamin''ny fasana, fa tora-kovitra sady talanjona izy; ary tsy mba nilaza na inona na inona tamin''olona izy, satria natahotra.'
mg1865::mg_41::16::9:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nitsangana tamin''ny marain''ny andro voalohany amin''ny herinandro Jesoa, dia niseho voalohany tamin''i Maria Magdalena, ilay namoahany demonia fito, Izy]'
mg1865::mg_41::16::10:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Maria nandeha ka nilaza tamin''ireo efa nomba an''i Jesoa, izay mbola nisaona sy nitomany'
mg1865::mg_41::16::11:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo, na dia nandre aza fa velona Izy sady efa hitan-dravehivavy, dia mbola tsy nety nino ihany'
mg1865::mg_41::16::12:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary taorian''izany Jesoa dia niseho tamin''ny endrika hafa tamin''ny roa lahy aminy, izay nankany an-tsaha'
mg1865::mg_41::16::13:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nandeha ka nilaza tamin''ny namany; fa na dia ireo aza tsy ninoany koa'
mg1865::mg_41::16::14:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia niseho tamin''ny iraika ambin''ny folo lahy Jesoa, raha nipetraka nihinana ireo; ary izy nanome tsiny azy noho ny tsy finoany sy ny hamafin''ny fony, satria tsy ninoany ireo efa nahita Azy, rehefa nitsangana Izy'
mg1865::mg_41::16::15:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Izy taminy: Mandehana any amin''izao tontolo izao ianareo, ka mitoria ny filazantsara amin''ny olombelona rehetra'
mg1865::mg_41::16::16:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mino sy atao batisa no hovonjena; fa izay tsy mety mino no hohelohina'
mg1865::mg_41::16::17:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao famantarana izao no hanaraka izay mino: hamoaka demonia amin''ny anarako izy; hiteny amin''ny fiteny izay tsy mbola hainy izy;'
mg1865::mg_41::16::18:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'handray menarana izy; ary na dia misotro zava-mahafaty aza izy, dia tsy hampaninona azy izany; hametra-tanana amin''ny marary izy, dia ho sitrana ireny'
mg1865::mg_41::16::19:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa Tompo, rehefa niteny taminy, dia nampiakarina ho any an-danitra ka nipetraka eo an-kavanan''Andriamanitra'
mg1865::mg_41::16::20:
  verse_version: mg1865
  verse_book: mg_41
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy ireo kosa dia lasa ka nitori-teny eny tontolo eny, ary ny Tompo niara-niasa taminy ka nanamarina ny teny tamin''ny famantarana izay nomba azy. Amena'
