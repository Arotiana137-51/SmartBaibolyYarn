mg1865::mg_66::1::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fitarihan-teny
  verse_text: 'Ny Fanambaran''i Jesoa Kristy, izay nomen''Andriamanitra Azy, mba hasehony amin''ny mpanompony izay zavatra tsy maintsy ho tonga faingana; ary naniraka ny anjeliny Izy hanambara amin''i Jaona mpanompony,'
mg1865::mg_66::1::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanambara ny tenin''Andriamanitra sy ny filazana an''i Jesoa Kristy, dia ny zavatra rehetra izay efa hitany.'
mg1865::mg_66::1::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: '2022-12-30T06:26:37+0000'
  verse_title: null
  verse_text: 'Sambatra izay mamaky sy ny mihaino ny tenin''ity faminaniana ity ka mitandrina izay voasoratra ato anatiny; fa antomotra ny andro.'
mg1865::mg_66::1::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jaona mamangy ny fiangonana* fito any Asia: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''ilay ankehitriny sy taloha ary ho avy; ary avy amin''ny Fanahy fito izay eo anoloan''ny seza fiandrianany; [*Grika: eklesia]'
mg1865::mg_66::1::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary avy amin''i Jesoa Kristy, Vavolombelona marina sy Lahimatoa amin''ny maty ary Lehiben''ny mpanjaka amin''ny tany. Ho an''izay tia antsika ka namaha* antsika ho afaka amin''ny fahotantsika tamin''ny ràny, [*Grika: nanasa]'
mg1865::mg_66::1::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady efa nanao antsika ho fanjakana, dia mpisorona ho an''Andriamanitra Ray,- ho Azy anie ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena.'
mg1865::mg_66::1::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro Izy avy amin''ny rahona; ary ny maso rehetra hahita Azy, na dia izay nandefona Azy aza; ary hitomany Azy ny firenena rehetra ambonin''ny tany. Eny, Amena.'
mg1865::mg_66::1::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Alfa sy Omega, hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, dia ny Tsitoha.'
mg1865::mg_66::1::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny fisehoan''ny voninahitr''i Kristy'
  verse_text: 'Izaho Jaona, rahalahinareo sy namanareo amin''ny fahoriana ary amin''ny fanjakana sy ny faharetana ao amin''i Jesoa, dia tao amin''ny nosy atao hoe Patmo noho ny tenin''Andriamanitra sy ny filazana an''i Jesoa.'
mg1865::mg_66::1::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voatsindrin''ny Fanahy tamin''ny Andron''ny Tompo aho ka nahare feo mahery teo ivohoko, toy ny feon''ny trompetra,'
mg1865::mg_66::1::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao hoe: Izay zavatra hitanao dia soraty eo amin''ny boky, ka ampitondray ho any amin''ny fiangonana* fito, dia ho any Efesosy sy Smyrna sy Pergamosy sy Tyatira sy Sardisy sy Filadelfia ary Laodikia. [*Grika: eklesia]'
mg1865::mg_66::1::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitodika aho nizaha ilay feo niteny tamiko. Koa rehefa nitodika aho, dia nahita fanaovan-jiro volamena fito;'
mg1865::mg_66::1::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary teo afovoan''ny fanaovan-jiro dia nisy Anankiray tahaka ny Zanak''olona* niakanjo akanjo lava hatrany an-tongony sady nisikina fisikinam-bolamena teo amin''ny tratrany. [*Na: toa zanak''olona]'
mg1865::mg_66::1::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lohany sy ny volony dia fotsy tahaka ny volon''ondry fotsy, dia tahaka ny oram-panala, ary ny masony tahaka ny lelafo;'
mg1865::mg_66::1::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: '2022-08-02T06:08:43+0000'
  verse_title: null
  verse_text: 'ary ny tongony tahaka ny varahina manganohano, ohatra ilay voadio teo amin''ny fandrendrehana iny; ary ny feony toy ny firohondrohon''ny rano be.'
mg1865::mg_66::1::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitana kintana fito teny an-tanany ankavanana Izy; ary nisy sabatra maranitra roa lela nivoaka avy teo am-bavany; ary ny tarehiny dia tahaka ny masoandro mamirapiratra amin''ny heriny.'
mg1865::mg_66::1::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nahita Azy aho, dia lavo niankohoka tahaka ny maty teo anoloan''ny tongony. Fa Izy nanendry ahy tamin''ny tanany ankavanana ka nanao hoe: Aza matahotra; Izaho no Voalohany sy Farany,'
mg1865::mg_66::1::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia Ilay velona; efa maty Aho, nefa, indro, velona mandrakizay mandrakizay sady manana ny fanalahidin''ny fahafatesana sy ny fiainan-tsy hita. [*Grika: Hades]'
mg1865::mg_66::1::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa soraty izay zavatra efa hitanao, na izay zavatra ankehitriny, na izay zavatra mbola ho avy rahatrizay,'
mg1865::mg_66::1::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny zava-miafina ny amin''ny kintana fito izay efa hitanao teny an-tanako ankavanana sy ny fanaovan-jiro volamena fito. Ny kintana fito dia ny anjelin''ny fiangonana* fito: ary ny fanaovan-jiro fito dia fiangonana* fito. [*Grika: eklesia]'
mg1865::mg_66::2::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: '2022-10-24T04:40:23+0000'
  verse_title: 'Ny Epistily ho an''ny fiangonana fito tany Asia. Efesosy'
  verse_text: 'Soraty ho amin''ny anjelin''ny fiangonana* any Efesosy. Izao no lazain''ilay mihazona ny kintana fito eny an-tanany ankavanana sady mandeha eo afovoan''ny fanaovan-jiro volamena fito: [*Grika: eklesia]'
mg1865::mg_66::2::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ny asanao sy ny fikelezanao aina sy ny faharetanao ary ny tsy fahazakanao izay mpanao ratsy; ary ianao efa nizaha toetra izay milaza ny tenany ho Apostoly, kanjo tsy izy, ary hitanao fa mpandainga izy;'
mg1865::mg_66::2::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manana faharetana ianao ka niaritra noho ny anarako sady tsy reraka.'
mg1865::mg_66::2::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa manan-teny aminao Aho, satria efa niala tamin''ny fitiavanao voalohany ianao.'
mg1865::mg_66::2::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tsarovy izay nitoeranao fony tsy mbola lavo, dia mibebaha, ka manaova ny asa voalohany; fa raha tsy izany, dia ho avy aminao Aho ka hamindra ny fanaovan-jironao hiala amin''ny fitoerany, raha tsy mibebaka ianao.'
mg1865::mg_66::2::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa izao no toetranao:* halanao ny asan''ny Nikolaita, izay halako koa. [*Grika: anananao]'
mg1865::mg_66::2::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. Izay maharesy dia havelako hihinana ny avy amin''ny hazon''aina, izay eo amin''ny Paradisan''Andriamanitra. [*Grika: eklesia]'
mg1865::mg_66::2::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: Smyrna
  verse_text: 'Ary soraty ho amin''ny anjelin''ny fiangonana* any Smyrna: Izao no lazain''ny Voalohany sy ny Farany, Izay efa maty, nefa velona indray: [*Grika: eklesia]'
mg1865::mg_66::2::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ny fahorianao sy ny fahantranao (nefa manan-karena ianao), ary ny fitenenan-dratsy* ataon''izay milaza ny tenany ho Jiosy, kanjo tsy izy, fa synagogan''i Satana. [*Grika: blasfemia; izahao Matio 9:3)'
mg1865::mg_66::2::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra izay efa hiaretanao; indro, ny devoly efa hanao ny sasany aminareo ao an-tranomaizina, mba ho voazaha toetra ianareo, ary hanam-pahoriana hafoloana. Aoka ho mahatoky hatramin''ny fahafatesana ianao, dia homeko anao ny satro-boninahitra fiainana.'
mg1865::mg_66::2::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. Izay maharesy dia tsy hosimban''ny fahafatesana faharoa. [*Grika: eklesia]'
mg1865::mg_66::2::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: Pergamosy
  verse_text: 'Ary soraty ho amin''ny anjelin''ny fiangonana* any Pergamosy: Izao no lazain''ilay manana ny sabatra roa lela maranitra: [*Grika: eklesia]'
mg1865::mg_66::2::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro izay onenanao, dia ao amin''ny itoeran''ny seza fiandrianan''i Satana; ary mitàna mafy ny anarako ianao ka tsy nandà ny finoana Ahy, na dia tamin''ny andron''i Antipasy martiorako aza, izay lehilahy nahatoky Ahy, dia ilay novonoina teo aminareo, teo amin''izay onenan''i Satana.'
mg1865::mg_66::2::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa manan-teny kely aminao Aho, fa misy eo aminao izay mitàna ny fampianaran''i Balama, ilay nanome fo an''i Balaka hanisy fahatafintohinana teo anoloan''ny Zanak''isiraely, hihinana hena naterina tamin''ny sampy sy hijangajanga.'
mg1865::mg_66::2::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa, misy eo aminao izay mitàna ny fampianaran''ny Nikolaita tahaka ny an''ireny.'
mg1865::mg_66::2::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia mibebaha; fa raha tsy izany, dia ho avy aminao faingana Aho ka hamely ireo amin''ny sabatry ny vavako.'
mg1865::mg_66::2::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. Izay maharesy dia homeko mana miafina sady homeko vato fotsy, ary eo amin''ny vato dia misy anaram-baovao voasoratra, izay tsy fantatr''olona afa-tsy izay mandray azy ihany. [*Grika: eklesia]'
mg1865::mg_66::2::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: Tyatira
  verse_text: 'Ary soraty ho amin''ny anjelin''ny fiangonana* any Tyatira: Izao no lazain''ny Zanak''Andriamanitra, Izay manana maso toy ny lelafo, ary ny tongony tahaka ny varahina manganohano: [*Grika: eklesia]'
mg1865::mg_66::2::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ny asanao sy ny fitiavanao sy ny finoanao sy ny fanompoanao ary ny faharetanao, ary ny asanao farany dia be noho ny voalohany.'
mg1865::mg_66::2::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa manan-teny aminao Aho, satria ianao mandefitra amin''ilay vehivavy Jezebela, izay milaza ny tenany ho mpaminanivavy ka mampianatra sady manoloky ny mpanompoko hijangajanga sy hihinana hena naterina tamin''ny sampy.'
mg1865::mg_66::2::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeko andro hibebahany izy, nefa tsy mety mibebaka amin''ny fijangajangany izy.'
mg1865::mg_66::2::22:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hampandamahiko eo am-pandriana izy, ary izay mijangajanga aminy dia hataoko ao amin''ny fahoriana lehibe, raha tsy hibebaka amin''ny asan-dravehivavy izy.'
mg1865::mg_66::2::23:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hovonoiko amin''ny fahafatesana ny zanany; ary ny fiangonana* rehetra hahalala fa Izaho no mandinika ny voa sy ny fo; ary homeko araka ny asanareo avy ianareo rehetra. [*Grika: eklesia]'
mg1865::mg_66::2::24:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aminareo izay sisa any Tyatira, dia izay tsy manana izany fampianarana izany sady tsy mba mahalala ny ataon''ireo hoe "sain-dalin''i Satana", dia izao no lazaiko: tsy hovesarako entana hafa ianareo;'
mg1865::mg_66::2::25:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa izay anananareo dia tano mafy mandra-pihaviko.'
mg1865::mg_66::2::26:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay maharesy ka mitandrina ny asako hatramin''ny farany dia homeko fahefana amin''ny jentilisa;'
mg1865::mg_66::2::27:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hiandry azy amin''ny tehim-by izy ka hanorotoro azy toy ny fanorotoro vilany tany, dia araka izay efa noraisiko tamin''ny Raiko.'
mg1865::mg_66::2::28:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homeko azy ny kintana fitarika andro.'
mg1865::mg_66::2::29:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. [*Grika: eklesia]'
mg1865::mg_66::3::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: Sardisy
  verse_text: 'Ary soraty ho amin''ny anjelin''ny fiangonana* any Sardisy: Izao no lazain''ilay manana ny Fanahy fiton''Andriamanitra sy ny kintana fito: Fantatro ny asanao, fa manana anarana ho velona ianao, kanjo maty ihany. [*Grika: eklesia]'
mg1865::mg_66::3::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miambena*, ka aoreno tsara ny zavatra sisa izay saiky maty; fa tsy nisy hitako** tanteraka ny asanao eo anatrehan''Andriamanitro. [*Grika: Miareta tory] [** Na: (tsy hitako)]'
mg1865::mg_66::3::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsarovy ny amin''ny nandraisanao sy ny nandrenesanao, ary tano mafy, ka mibebaha. Koa raha tsy hiambina* ianao, dia ho tonga toy ny fihavin''ny mpangalatra Aho, ka tsy ho fantatrao izay ora hihaviako aminao. [*Grika: hiari-tory]'
mg1865::mg_66::3::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa misy olona* vitsy aty aminao aty Sardisy izay tsy nandoto ny fitafiany; ary hiara-mandeha amiko mitafy lamba fotsy ireo, satria miendrika Izy. [*Grika: anaranana]'
mg1865::mg_66::3::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay maharesy dia hitafy lamba fotsy tahaka ireo koa, ary tsy hamono ny anarany eo amin''ny bokin''ny fiainana tokoa Aho, fa hanaiky ny anarany eo anatrehan''ny Raiko sy eo anatrehan''ny anjeliny.'
mg1865::mg_66::3::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. [*Grika: eklesia]'
mg1865::mg_66::3::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: Filadelfia
  verse_text: 'Ary soraty ho amin''ny anjelin''ny fiangonana* any Filadelfia: Izao no lazain''izay masina, Izay marina, Izay manana ny fanalahidin''i Davida, Izay mamoha ka tsy hisy hanidy, ary manidy ka tsy misy mamoha: [*Grika: eklesia]'
mg1865::mg_66::3::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ny asanao (indro, efa nasiako varavarana mivoha eo anatrehanao, ka tsy misy maharindrina azy), fa manana hery kely ihany ianao ka nitandrina* ny teniko ary tsy mba nandà ny anarako. [*Na: fa na dia kely aza ny herinao, dia efa nitandrina, etc]'
mg1865::mg_66::3::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, alaiko ny sasany amin''ny synagogan''i Satana, izay milaza ny tenany ho Jiosy, kanjo tsy izy, fa mandainga, indro, hataoko tonga hiankohoka eo anoloan''ny tongotrao ireo, ka ho fantany fa Izaho efa tia anao.'
mg1865::mg_66::3::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa nitandrina ny teniko ny amin''ny faharetana ianao, Izaho kosa hiaro anao ho voavonjy amin''ny andro fakam-panahy izay efa hihatra amin''izao tontolo izao ho fizahan-toetra izay monina ambonin''ny tany.'
mg1865::mg_66::3::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho avy faingana Aho; tano mafy izay anananao, mba tsy hisy haka ny satro-boninahitrao.'
mg1865::mg_66::3::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay maharesy no hataoko andry eo amin''ny tempolin''Andriamanitro, ary tsy hiala eo intsony izy; ary hosoratako eo aminy ny anaran''Andriamanitro sy ny anaran''ny tanànan''Andriamanitro, dia Jerosalema vaovao, izay midina avy any an-danitra avy amin''Andriamanitro, ary ilay anarako vaovao.'
mg1865::mg_66::3::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. [*Grika: eklesia]'
mg1865::mg_66::3::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: Laodikia
  verse_text: 'Ary soraty ho amin''ny anjelin''ny fiangonana* any Laodikia: Izao no lazain''ny Amena, dia Ilay Vavolombelona mahatoky sy marina, Izay niandohan''izao zavatra noharin''Andriamanitra izao: [*Grika: eklesia]'
mg1865::mg_66::3::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ny asanao, fa tsy mangatsiaka na mafana ianao; aleo ho mangatsiaka na ho mafana ianao.'
mg1865::mg_66::3::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa satria matimaty ianao ka tsy mafana na mangatsiaka, dia efa haloan''ny vavako ianao;'
mg1865::mg_66::3::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hoy ianao: Manan-karena sy efa nihary fananana be aho ka tsy manan-java-mahory; kanjo tsy fantatrao fa ianao no ilay ory sy mahantra sy malahelo sy jamba ary mitanjaka;'
mg1865::mg_66::3::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia manoro hevitra anao Aho hividy amiko volamena voadio tamin''ny afo, mba hanan-karena ianao, ary fitafiana fotsy hotafinao, mba tsy hisehoan''ny henatrao noho ny fitanjahana, ary odi-maso hahosotrao ny masonao mba hahiratanao.'
mg1865::mg_66::3::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay* rehetra tiako no anariko sy faiziko; koa dia mazotoa ianao, ka mibebaha. [*Grika: Raha Izaho, dia izay]'
mg1865::mg_66::3::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa mitsangana eo am-baravarana Aho ka mandondòna; raha misy mihaino ny feoko ka mamoha ny varavarana, dia hiditra ao aminy Aho ka hiara-misakafo aminy, ary izy amiko.'
mg1865::mg_66::3::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay maharesy dia havelako hiara-mipetraka amiko eo ambonin''ny seza fiandrianako, dia tahaka ny nandreseko kosa sy ny niarahako nipetraka amin''ny Raiko eo ambonin''ny seza fiandrianany.'
mg1865::mg_66::3::22:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manan-tsofina, aoka izy hihaino izay lazain''ny Fanahy amin''ny fiangonana*. [*Grika: eklesia]'
mg1865::mg_66::4::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fideran''ny any an-danitra an''Andriamanitra, Mpanao ny zavatra rehetra'
  verse_text: 'Rehefa afaka izany, dia hitako fa, indro, nisy varavarana nivoha tany an-danitra; ary ilay feo voalohany izay efa reko dia tahaka ny an''ny trompetra niteny tamiko hoe: Miakara aty, dia hasehoko anao izay zavatra tsy maintsy ho avy rahatrizay.'
mg1865::mg_66::4::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niaraka tamin''izay dia voatsindrin''ny Fanahy aho; ary indro seza fiandrianana nipetraka tany an-danitra, ary nisy Anankiray nipetraka teo ambonin''ny seza fiandrianana.'
mg1865::mg_66::4::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tarehin''ilay nipetraka dia tahaka ny vato jaspy sy karneola; ary avana mitarehin''emeralda no nanodidina ny seza fiandrianana.'
mg1865::mg_66::4::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manodidina ilay seza fiandrianana iray dia nisy seza fiandrianana efatra amby roa-polo; ary teo ambonin''ireo seza fiandrianana ireo dia nisy loholona* efatra amby roa-polo nipetraka, nitafy fitafiana fotsy sady nisatroka satro-boninahitra volamena. [*Grika: presbytera]'
mg1865::mg_66::4::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy helatra sy feo ary kotrokorana nivoaka avy tamin''ny seza fiandrianana; ary nisy jiro fito nirehitra teo anoloan''ny seza fiandrianana, dia Fanahy fiton''Andriamanitra ireo.'
mg1865::mg_66::4::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo anoloan''ny seza fiandrianana dia nisy toa ranomasina fitaratra tahaka ny vato krystaly; ary teo afovoan''ny seza fiandrianana sy manodidina azy nisy zava-manan''aina efatra feno maso avokoa ny anoloany sy ny ivohony.'
mg1865::mg_66::4::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zava-manan''aina voalohany dia tahaka ny liona, ary ny zava-manan''aina faharoa dia tahaka ny zanak''omby, ary ny zava-manan''aina fahatelo dia manana tava tahaka ny tavan''olona, ary ny zava-manan''aina fahefatra dia tahaka ny voromahery manidina.'
mg1865::mg_66::4::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zava-manan''aina efatra dia samy nanana elatra enina avy, sady feno maso ny tenany rehetra manodidina ka hatrao anatiny; ary tsy mitsahatra andro aman''alina izy manao hoe: Masina, masina, masina ny Tompo Andriamanitra Tsitoha, Ilay taloha sy ankehitriny ary ho avy.'
mg1865::mg_66::4::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha ny zava-manan''aina hanome voninahitra sy haja ary fisaorana ho an''ilay mipetraka eo ambonin''ny seza fiandrianana, dia Izay velona mandrakizay mandrakizay,'
mg1865::mg_66::4::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia hiankohoka eo anoloan''izay mipetraka eo ambonin''ny seza fiandrianana ny loholona* efatra amby roa-polo ka hivavaka amin''izay velona mandrakizay mandrakizay, dia hanipy ny satro-boninahiny eo anoloan''ny seza fiandrianana ka hanao hoe:'
mg1865::mg_66::4::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, Tomponay sy Andriamanitray, no miendrika handray ny voninahitra sy ny haja ary ny hery; Fa Ianao no nahary ny zavatra rehetra, Ary noho ny sitraponao no nahanisy sy nahary azy.'
mg1865::mg_66::5::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandraisan''ny Mpanavotra ny boky izay nisy tombo-kase fito, sy ny hira natao ho fiderana Azy'
  verse_text: 'Ary hitako fa, indro, nisy boky voasoratra tao anatiny sy teo ivohony, voapetaka mafy tamin''ny tombo-kase fito, teo an-tanana ankavanan''ilay nipetraka teo ambonin''ny seza fiandrianana.'
mg1865::mg_66::5::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy anjely mahery niantso tamin''ny feo mafy hoe: Iza no miendrika hanokatra ny boky sy hamaha ny tombo-kaseny?'
mg1865::mg_66::5::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy tany an-danitra, na tety an-tany, na tany ambanin''ny tany, nahasokatra ny boky na nahajery azy.'
mg1865::mg_66::5::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitomany mafy aho, satria tsy nisy hita miendrika hanokatra ny boky na hijery azy.'
mg1865::mg_66::5::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ny loholona* nanao tamiko hoe: Aza mitomany; indro, ny Liona avy amin''ny firenen''i Joda, dia ny Solofon''i Davida, no efa naharesy ka hanokatra ny boky sy hamaha ny tombo-kaseny fito. [*Grika: presbytera]'
mg1865::mg_66::5::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, teo afovoan''ny seza fiandrianana sy ny zava-manan''aina efatra ary teo afovoan''ny loholona* dia nisy Zanak''ondry nitsangana tahaka ny efa voavono, nanan-tandroka fito sy maso fito, dia ny Fanahy fiton''Andriamanitra nirahina hankany amin''ny tany rehetra. [*Grika: presbytera]'
mg1865::mg_66::5::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga Izy ka nandray ny boky teo an-tanana ankavanan''ilay nipetraka teo ambonin''ny seza fiandrianana.'
mg1865::mg_66::5::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nandray ny boky Izy, ny zava-manana-aina efatra sy ny loholona* efatra amby roa-polo dia niankohoka teo anatrehan''ny Zanak''ondry, sady samy nanana lokanga sy lovia volamena feno ditin-kazo manitra izy, dia vavaka ataon''ny olona masina izany. [*Grika: presbytera]'
mg1865::mg_66::5::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihira fihiram-baovao izy ka nanao hoe: Ianao no miendrika haka ny boky sy hamaha ny tombo-kaseny; Fa voavono Ianao, Ary ny rànao no nanavotanao* ho an''Andriamanitra olona avy tamin''ny fokom-pirenena rehetra sy ny samy hafa fiteny sy ny olona ary ny firenena rehetra;'
mg1865::mg_66::5::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary efa nataonao fanjakana sy mpisorona ho an''Andriamanitsika ireo; Ary manjaka ambonin''ny tany izy.'
mg1865::mg_66::5::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita aho sady nandre feon''anjely maro manodidina ny seza fiandrianana sy ny zava-manan''aina ary ny loholona*, ary ny Isany dia alinalina sy arivoarivo, [*Grika: presbytera]'
mg1865::mg_66::5::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao tamin''ny feo mahery hoe: Ny Zanak''ondry, Izay novonoina, dia miendrika handray hery sy harena sy fahendrena sy faherezana sy haja sy voninahitra ary saotra.'
mg1865::mg_66::5::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao zavatra ary rehetra izao, na izay any an-danitra, na izay ety ambonin''ny tany sy any ambanin''ny tany, na izay any an-dranomasina mbamin''izay rehetra ao anatiny, dia reko samy nanao hoe: Ho an''ilay mipetraka eo ambonin''ny seza fiandrianana sy ho an''ny Zanak''ondry anie ny saotra sy ny haja sy ny voninahitra ary ny fanjakana mandrakizay mandrakizay.'
mg1865::mg_66::5::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zava-manan''aina efatra nanao hoe: Amena. Ary ny loholona* dia niankohoka ka nivavaka. [*Grika: presbytera]'
mg1865::mg_66::6::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namahana ny tombo-kase enina'
  verse_text: 'Ary nahita aho, rehefa novahan''ny Zanak''ondry ny anankiray tamin''ny tombo-kase fito, ary reko ny anankiray tamin''ny zava-manan''aina efatra, tahaka ny fikotrokotroky ny kotrokorana, nanao hoe: Avia*. [*Ampio hoe: (ka izahao)]'
mg1865::mg_66::6::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy soavaly fotsy; ary izay nitaingina azy dia nanana tsipïka; ary nomena satro-boninahitra izy; dia nivoaka izy ka naharesy sady mbola haharesy.'
mg1865::mg_66::6::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa novahany ny tombo-kase faharoa, dia reko ny zava-manan''aina faharoa nanao hoe: Avia*. [*Ampio hoe: (ka izahao)]'
mg1865::mg_66::6::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy soavaly hafa mena kosa nivoaka; ary izay nitaingina azy dia navela hanaisotra ny fihavanana amin''ny tany mba hifamonoan''ny olona; ary nomena sabatra lehibe izy.'
mg1865::mg_66::6::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa novahany ny tombo-kase fahatelo, dia reko ny zava-manan''aina fahatelo nanao hoe: Avia*. Ary hitako fa, indro, nisy soavaly mainty: ary izay nitaingina azy nitondra mizàna teny an-tanany. [*Ampio hoe: (ka izahao)]'
mg1865::mg_66::6::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare aho, ka toa nisy feo teo afovoan''ny zava-manan''aina efatra nanao hoe: venty* ny vary tritika eran''ny fatam-bary kely**, ary venty* koa ny vary hordea intelon''ny fatam-bary**; ary aza manimba ny diloilo na ny divay ianao. [*Grika: denaria] [** Grika: koiniksa]'
mg1865::mg_66::6::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa novahany ny tombo-kase fahefatra, dia reko ny feon''ny zava-manan''aina fahefatra nanao hoe: Avia*. [*Ampio hoe: (ka izahao)]'
mg1865::mg_66::6::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy soavaly hatsatra, ary ny anaran''izay nitaingina ary atao hoe Fahafatesana, ary ny Fiainan-tsy hita* nanaraka azy. Ary nomena fahefana tamin''ny ampahefatry ny tany ireo hamono amin''ny sabatra sy ny mosary sy ny fahafatesana sy ny bibi-dia ety an-tany. [*Grika: Hadesy]'
mg1865::mg_66::6::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa novahany ny tombo-kase fahadimy, dia hitako teo ambanin''ny alitara ny fanahin''izay voavono noho ny tenin''Andriamanitra sy ny filazana izay nohazoniny.'
mg1865::mg_66::6::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso tamin''ny feo mahery izy nanao hoe: Tompo masina sy marina o, mandra-pahoviana no tsy hitsaranao sy hamalianao ny rànay amin''izay monina eny ambonin''ny tany?'
mg1865::mg_66::6::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary samy nomena akanjo fotsy lava izy rehetra; ary nasaina niala sasatra kely aloha izy mandra-pahatapitry ny mpanompo namany sy ny rahalahiny, izay efa hovonoina tahaka azy koa.'
mg1865::mg_66::6::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita aho, rehefa novahany ny tombo-kase fahenina, dia nisy horohorontany mafy; ary tonga mainty tahaka ny lamba volon''osy fisaonana ny masoandro, ary tonga tahaka ny rà avokoa ny volana.'
mg1865::mg_66::6::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny kintana tamin''ny lanitra dia niraraka tamin''ny tany, toy ny aviavy manintsana ny voany manta, raha hozongozonin''ny rivotra mahery izy.'
mg1865::mg_66::6::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa tahaka ny taratasy voahorona ny lanitra, ary ny tendrombohitra sy ny nosy rehetra dia nafindra niala tamin''ny fitoerany.'
mg1865::mg_66::6::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny tany sy ny lehibe sy ny mpifehy arivo sy ny mpanankarena sy ny lehilahy mahery mbamin''ny andevo rehetra sy ny tsy andevo rehetra dia niery tao amin''ny lavaka sy tao amin''ny vatolampy eny an-tendrombohitra;'
mg1865::mg_66::6::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hoy izy tamin''ny tendrombohitra sy ny vatolampy; Mianjerà aminay, ka afeno izahay amin''ny tavan''ilay mipetraka eo ambonin''ny seza fiandrianana sy amin''ny fahatezeran''ny Zanak''ondry;'
mg1865::mg_66::6::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tonga ny andro lehiben''ny fahatezeran''ireo*, ka iza no mahajanona? [*Na: ny fahatezerany]'
mg1865::mg_66::7::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny niarovana ny Isiraely marina mba tsy hosimban''ny loza ho avy, sy ny fahasambaran''ny tonga any an-danitra ka afaka amin''ny fahoriana lehibe'
  verse_text: 'Rehefa afaka izany, dia hitako fa, indreo, nisy anjely efatra nitsangana teo amin''ny vazan-tany efatra, nihazona ny rivotra efatra amin''ny tany, mba tsy nisy rivotra hitsoka amin''ny tany, na amin''ny ranomasina, na amin''ny hazo akory aza.'
mg1865::mg_66::7::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy anjely hafa koa niakatra avy tany amin''ny fiposahan''ny masoandro, nanana ny fanombohan-kasen''Andriamanitra velona; ary izy niantso ny anjely efatra izay navela hanimba ny tany sy ny ranomasina tamin''ny feo mahery nanao hoe:'
mg1865::mg_66::7::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manimba ny tany, na ny ranomasina, na ny hazo, mandra-panisinay tombo-kase eo anin''ny handrin''ny mpanompon''Andriamanitsika.'
mg1865::mg_66::7::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare ny isan''izay voaisy tombo-kase aho: efatra arivo amby efatra alina amby iray hetsy no voaisy tombo-kase avy tamin''ny firenen''ny Zanak''isiraely rehetra.'
mg1865::mg_66::7::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''ny firenen''i Joda roa arivo amby iray alina no voaisy tombo-kase. Avy tamin''ny firenen''i Robena roa arivo amby iray alina. Avy tamin''ny firenen''i Gada roa arivo amby iray alina.'
mg1865::mg_66::7::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''ny firenen''i Asera roa arivo amby iray alina. Avy tamin''ny firenen''i Naftaly roa arivo amby iray alina. Avy tamin''ny firenen''i Manase roa arivo amby iray alina.'
mg1865::mg_66::7::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''ny firenen''i Simeona roa arivo amby iray alina. Avy tamin''ny firenen''i Levy roa arivo amby iray alina. Avy tamin''ny firenen''Isakara roa arivo amby iray alina.'
mg1865::mg_66::7::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''ny firenen''i Zebolona roa arivo amby iray alina. Avy tamin''ny firenen''i Josefa roa arivo amby iray alina. Avy tamin''ny firenen''i Benjamina roa arivo amby iray alina no voaisy tombo-kase.'
mg1865::mg_66::7::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany dia hitako fa, indreo, nisy olona betsaka tsy tambo isaina avy tamin''ny firenena rehetra sy ny fokom-pirenena sy ny olona ary ny samy hafa fiteny nitsangana teo anoloan''ny seza fiandrianana sy teo anatrehan''ny Zanak''ondry, niakanjo akanjo fotsy lava sady nitana sampan-drofia teny an-tanany,'
mg1865::mg_66::7::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niantso tamin''ny feo mahery izy nanao hoe: Ny famonjena anie ho an''Andriamanitsika, Izay mipetraka eo ambonin''ny seza fiandrianana, sy ho an''ny Zanak''ondry.'
mg1865::mg_66::7::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely rehetra nitsangana manodidina ny seza fiandrianana mbamin''ny loholona* sy ny zava-manan''aina efatra, dia niankohoka teo anoloan''ny seza fiandrianana izy ka nivavaka tamin''Andriamanitra [*Grika: presbytera]'
mg1865::mg_66::7::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao hoe: Amena! Ny saotra sy ny voninahitra sy ny fahendrena sy ny fisaorana sy ny haja sy ny hery ary ny faherezana anie Ho an''Andriamanitsika mandrakizay mandrakizay. Amena.'
mg1865::mg_66::7::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ny loholona* namaly ka nanao tamiko hoe: Iza moa ireo miakanjo akanjo fotsy lava? Ary avy taiza izy? [*Grika: presbytera]'
mg1865::mg_66::7::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho taminy: Tompoko, ianao no mahalala. Dia hoy izy tamiko: Ireo no avy tamin''ny fahoriana lehibe, ary ny akanjony nosasany sy nofotsiany tamin''ny ran''ny Zanak''ondry.'
mg1865::mg_66::7::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: '2022-03-30T07:30:13+0000'
  verse_title: null
  verse_text: 'Ary noho izany dia mitoetra eo anoloan''ny seza fiandrianan''Andriamanitra izy ka manompo Azy andro aman''alina eo amin''ny tempoliny; ary Ilay mipetraka eo ambonin''ny seza fiandrianana dia hamelatra ny trano-lainy handrakotra ary.'
mg1865::mg_66::7::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho noana na hangetaheta intsony ireo; ary tsy haninona azy ny masoandro na izay hafanana akory.'
mg1865::mg_66::7::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Zanak''ondry Izay eo afovoan''ny seza fiandrianana no ho Mpiandry azy ka hitondra azy ho amin''ny loharanon''ny ranon''aina; ary hofafan''Andriamanitra ny ranomaso rehetra amin''ny masony (Isaia 25:8).'
mg1865::mg_66::8::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny namahana ny tombo-kase fahafito, sy ny nitsofana ny trompetra efatra'
  verse_text: 'Ary rehefa novahany ny tombo-kase fahafito, dia nangina tokony ho antsasaky ny ora ny tany an-danitra.'
mg1865::mg_66::8::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako ny anjely fito izay mitsangana eo anatrehan''Andriamanitra; ary nomena trompetra fito ireo.'
mg1865::mg_66::8::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely anankiray koa tonga ka nitsangana teo ambonin*''ny alitara ary nitondra lovia volamena fandoroana ditin-kazo manitra; ary nomena ditin-kazo manitra betsaka izy, hanaterany azy mbamin''ny vavaky ny olona masina rehetra eo ambonin''ny alitara volamena fandoroana ditin-kazo manitra, izay eo anoloan''ny seza fiandrianana. [*Na: amin'']'
mg1865::mg_66::8::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fofon''ny ditin-kazo manitra mbamin''ny vavaky ny olona masina dia niakatra avy eo an-tanan''ny anjely ho eo anatrehan''Andriamanitra.'
mg1865::mg_66::8::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely nandray ny lovia fandoroana ditin-kazo manitra, dia nameno azy tamin''ny afo teo amin''ny alitara ka nanipy izany tamin''ny tany; dia nisy kotrokorana sy feo sy helatra ary horohorontany.'
mg1865::mg_66::8::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely fito izay nanana ny trompetra fito dia niomana hitsoka.'
mg1865::mg_66::8::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voalohany nitsoka, dia nisy havandra sy afo miharoharo rà, ka nararaka tamin''ny tany izany; ary may ny ampahatelon''ny tany, ary may ny ampahatelon''ny hazo, ary may koa ny ahi-maitso rehetra.'
mg1865::mg_66::8::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely faharoa nitsoka, dia nisy toa tendrombohitra lehibe mirehitra afo natsipy tany an-dranomasina; ary tonga rà ny ampahatelon''ny ranomasina;'
mg1865::mg_66::8::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary maty ny ampahatelon''ny zava-manan''aina tao an dranomasina; ary rava ny ampahatelon''ny sambo.'
mg1865::mg_66::8::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely fahatelo nitsoka, dia nisy kintana lehibe mirehitra toy ny fanilo latsaka avy tany an-danitra; ny latsaka tamin''ny ampahatelon''ny ony sy tamin''ny loharano izany;'
mg1865::mg_66::8::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny anaran''ilay kintana dia atao hoe Zava-mangidy; dia tonga mangidy ny ampahatelon''ny rano; ary maro ny olona no matin''ny rano, satria efa nangidy izany.'
mg1865::mg_66::8::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely fahefatra nitsoka, dia nasiana ny ampahatelon''ny masoandro sy ny ampahatelon''ny volana ary ny ampahatelon''ny kintana rehetra, mba ho maizina ny ampahatelony, ka tsy hazava ny ampahatelon''ny andro, mba ho toy izany koa ny alina.'
mg1865::mg_66::8::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahita ny nahare voromahery anankiray nanidina teny afovoan''ny lanitra aho, izay nanao tamin''ny feo mahery hoe: Loza, loza, loza ho an''izay monina eny ambonin''ny tany noho ny feo sisa an''ny trompetry ny anjely telo izay efa hitsoka!'
mg1865::mg_66::9::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nitsofana ny trompetra fahadimy, sy ny nahatongavan''ny loza voalohany'
  verse_text: 'Ary ny anjely fahadimy nitsoka, dia hitako fa, indro, nisy kintana anankiray avy tany an-danitra latsaka tamin''ny tany; ary nomena ilay anjely ny fanalahidin''ny lavaka tsy hita noanoa.'
mg1865::mg_66::9::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanokatra ny lavaka tsy hita noanoa izy, dia nisy setroka niakatra avy tamin''ny lavaka, tahaka ny setroka avy amin''ny lafaoro lehibe, ary tonga maizina ny masoandro sy ny habahabaka noho ny setroka avy tao amin''ny lavaka.'
mg1865::mg_66::9::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy valala nivoaka avy tamin''ny setroka nankamin''ny tany; ary nomena hery* ireny, tahaka ny herin*''ny maingoka amin''ny tany. [*Grika: fahefana]'
mg1865::mg_66::9::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nilazana izy mba tsy hanimba ny ahitra amin''ny tany, na ny zava-maitso, na ny hazo akory aza, fa ny olona izay tsy manana ny tombo-kasen''Andriamanitra eo amin''ny handriny ihany.'
mg1865::mg_66::9::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy navela hahafaty azy izy, fa ny hampanaintaina azy dimy volana; ary ny fampanaintainany dia tahaka ny fampanaintainan''ny maingoka, raha mamely olona.'
mg1865::mg_66::9::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: '2022-06-13T08:15:20+0000'
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hitady fahafatesana ny olona, fa tsy hahita; ary haniry ho faty izy, fa mandositra azy ny fahafatesana.'
mg1865::mg_66::9::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny endriky ny valala dia tahaka ny soavaly voaomana ho enti-miady; ary tamin''ny lohany nisy satro-boninahitra toy ny volamena, ary ny tavany tahaka ny tavan''olona.'
mg1865::mg_66::9::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanam-bolo tahaka ny volom-behivavy izy, ary ny nifiny tahaka ny an''ny liona.'
mg1865::mg_66::9::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanam-piarovan-tratra tahaka ny fiarovan-tratra vy izy; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy entin''ny soavaly betsaka miriotra ho amin''ny ady.'
mg1865::mg_66::9::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manan-drambo tahaka ny maingoka izy sady misy fanindronana; ary amin''ny rambony no misy ny heriny* hampahoriany ny olona dimy volana. [*Grika: fahefana]'
mg1865::mg_66::9::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manana ny anjelin''ny lavaka tsy hita noanoa ho mpanjakany izy; ny anarany amin''ny teny Hebreo dia Abadona*, fa amin''ny teny Grika kosa dia Apolyona** no anarany. [*Abadona = Fandringanana] [** Apolyona = Mpandringana]'
mg1865::mg_66::9::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa ny loza anankiray; indreo, ho avy ny loza roa hafa koa, rehefa afaka izao.'
mg1865::mg_66::9::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny nitsofana ny trompetra fahenina, sy ny nahatongavan''ny loza faharoa'
  verse_text: 'Ary ny anjely fahenina nitsoka, dia nahare feo ary tamin''ny tandroky ny alitara volamena eo anatrehan''Andriamanitra aho,'
mg1865::mg_66::9::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao tamin''ny anjely fahenina, izay nanana ny trompetra, hoe: Vahao ny anjely efatra izay mifatotra any Eofrata, ony lehibe.'
mg1865::mg_66::9::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia novahana ny anjely efatra izay voaomana ho amin''ny ora sy ny andro sy ny volana ary ny taona mba hahafaty ny ampahatelon''ny olona.'
mg1865::mg_66::9::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny isan''ny miaramila an-tsoavaly dia roa alinalina; nahare ny isany aho.'
mg1865::mg_66::9::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izao no nahitako ny soavaly teo amin''ny fahitana sy izay nitaingina azy: manam-piarovan-tratra tahaka ny afo sy ny setroka ary ny solifara izy; ary ny lohan''ny soavaly dia tahaka ny lohan''ny liona; ary misy afo sy setroka ary solifara mivoaka avy amin''ny vavany.'
mg1865::mg_66::9::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo loza telo loha ireo, dia ny afo sy ny setroka ary ny solifara izay nivoaka avy tamin''ny vavany, no nahafaty ny ampahatelon''ny olona.'
mg1865::mg_66::9::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny herin*''ny soavaly dia eo amin''ny vavany sy ny rambony; fa ny rambony dia tahaka ny menarana sady manan-doha, ka ireny no entiny mampahory.'
mg1865::mg_66::9::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny olona sisa, izay tsy matin''ireo loza ireo, dia tsy nibebaka hiala tamin''ny asan''ny tanany, mba tsy hivavaka amin''ny demonia sy ny sampy volamena sy volafotsy sy varahina sy vato ary hazo, izay tsy mahajery, na mahare, na afa-mamindra;'
mg1865::mg_66::9::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nibebaka tamin''ny namonoany olona izy, na tamin''ny nanaovany ody ratsy, na tamin''ny fijangajangany, na tamin''ny halatra nataony koa.'
mg1865::mg_66::10::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny teny nentin''ny anjely anankiray, ary ny amin''ny kotrokorana fito sy ny boky kely'
  verse_text: 'Ary hitako fa, indro, nisy anjely mahery anankiray koa, nidina avy tany an-danitra sady nitafy rahona; ary ny avana dia teo amin''ny lohany, ary ny tavany dia tahaka ny masoandro, ary ny tongony tahaka ny andry afo,'
mg1865::mg_66::10::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nitàna boky kely nivelatra teny an-tanany izy; ary nabahany ny tongony, ka ny ankavanany tamin''ny ranomasina, ary ny ankaviany tamin''ny tany;'
mg1865::mg_66::10::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niantso tamin''ny feo mahery izy, tahaka ny fieron''ny liona; ary nony niantso izy, dia nikotroka ny kotrokorana fito.'
mg1865::mg_66::10::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa nikotroka ny kotrokorana fito, dia efa hanoratra aho, kanjo nahare feo avy tany an-danitra aho nanao hoe: Asio tombo-kase izay efa notononin''ny kotrokorana fito, fa aza soratana.'
mg1865::mg_66::10::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anjely, ilay efa hitako, dia nitsangana teo ambonin''ny ranomasina sy teo ambonin''ny tany, ka nanangana ny tanany ankavanana ho amin''ny lanitra'
mg1865::mg_66::10::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nianiana tamin''izay velona mandrakizay mandrakizay, dia Ilay nahary ny lanitra sy ny ao aminy ary ny tany sy ny ao aminy ary ny ranomasina sy ny ao aminy fa tsy hisy andro* intsony; [*Na: tsy ho ela]'
mg1865::mg_66::10::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny andro hitsofan''ny anjely fahafito, rehefa hitsoka izy, dia ho tanteraka ny zava-miafina izay an''Andriamanitra, araka ny teny soa mahafaly nambarany tamin''ny mpaminany mpanompony'
mg1865::mg_66::10::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny feo izay efa reko avy tany an-danitra dia niteny tamiko indray hoe: Mandehana, raiso ilay boky mivelatra eny an-tanan''ny anjely mitsangana eo ambonin''ny ranomasina sy eo ambonin''ny tany.'
mg1865::mg_66::10::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nankany amin''ny anjely aho ka nanao taminy hoe: Omeo ahy iny boky kely iny. Ary hoy izy tamiko: Raiso, ka hano avokoa io; dia hampangidy ny kibonao izy, nefa eo am-bavanao dia ho mamy tahaka ny tantely.'
mg1865::mg_66::10::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noraisiko ilay boky kely teny an-tanan''ny anjely ka nohaniko avokoa; ary raha nataoko teo am-bavako izy, dia mamy tahaka ny tantely, kanjo nony voateliko, dia nangidy ny kiboko.'
mg1865::mg_66::10::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy nilaza tamiko hoe: Tsy maintsy maminany indray ianao ny amin''ny olona maro sy ny firenena maro sy ny fiteny maro ary ny mpanjaka maro.'
mg1865::mg_66::11::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nandrefesana ny tempoly, sy ny amin''ny vavolombelona roa'
  verse_text: 'Ary nomena volotara tahaka ny tehina aho, ka nisy nilaza tamiko hoe: Mitsangàna, ka refeso ny tempolin''Andriamanitra sy ny alitara, ary isao izay mivavaka ao.'
mg1865::mg_66::11::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny kianja eo ivelan''ny tempoly dia avelao* ihany, fa aza mba refesina; fa nomena ny jentilisa izany, ka hanitsaka ny tanàna masina roa amby efa-polo volana izy. [*Grika: atsipazo eny ivelany]'
mg1865::mg_66::11::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary homeko hery ny vavolombeloko roa, ka haminany enim-polo amby roan-jato amby arivo andro izy, sady hitafy lamba fisaonana.'
mg1865::mg_66::11::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo ilay hazo oliva roa sy ilay fanaovan-jiro roa, izay mitsangana eo anatrehan''ny Tompon''ny tany.'
mg1865::mg_66::11::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy ta-handratra ireo, dia misy afo mivoaka amin''ny vavany ka mandany ny fahavalony; ary raha misy ta-handratra ireo, dia tsy maintsy hovonoina toy izany koa izy.'
mg1865::mg_66::11::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia manam-pahefana handrindrina ny lanitra, mba tsy hilatsahan''ny ranonorana amin''ny andro aminaniany; ary manam-pahefana amin''ny rano koa izy hampody azy ho rà sy hamely ny tany amin''ny loza araka izay andro tiany na oviana na oviana.'
mg1865::mg_66::11::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tanteraka ny filazany, dia hiady aminy kosa ilay bibi-dia miakatra avy amin''ny lavaka tsy hita noanoa ka haharesy sy hahafaty azy.'
mg1865::mg_66::11::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fatiny hiampatra eny an-dalambe amin''ny tanàna lehibe, izay atao, araka ny hevi-panahy, hoe Sodoma sy Egypta, sady tao koa no nanomboana ny Tompony tamin''ny hazo fijaliana.'
mg1865::mg_66::11::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sy ny fokom-pirenena sy ny samy hafa fiteny ary ny firenena maro dia misy mijery ny fatiny hateloan''andro sy tapany; ary tsy avelany halevina ao am-pasana ny fatiny.'
mg1865::mg_66::11::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mponina ambonin''ny tany mifaly azy ka ravoravo, ary hifanati-javatra izy, satria nampangirifiry ny mponina ambonin''ny tany ireo mpaminany roa ireo.'
mg1865::mg_66::11::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka ny hateloan''andro sy tapany, dia nisy fanahin''aina avy tamin''Andriamanitra niditra tao anatin''ireo, ary nijoro tamin''ny tongony izy, ka raiki-tahotra indrindra izay nahita azy.'
mg1865::mg_66::11::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare feo mahery avy tany an-danitra izy roa nanao taminy hoe: Miakara aty. Dia niakatra ho any an-danitra tao anatin''ny rahona ireo; ary nahatsinjo azy ny fahavalony.'
mg1865::mg_66::11::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''izany ora izany dia nisy horohorontany mafy, ka rava ny ampahafolon''ny tanàna, ary maty tamin''izany horohorontany izany ny olona fito arivo; ary raiki-tahotra ny olona sisa ka nanome voninahitra an''Andriamanitry ny lanitra.'
mg1865::mg_66::11::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa ny loza faharoa; indro, avy faingana ny loza fahatelo.'
mg1865::mg_66::11::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Ny nitsofana ny trompetra fahafito, sy ny nahatongavan''ny loza fahatelo'
  verse_text: 'Ary ny anjely fahafito nitsoka, dia nisy feo mafy tany an-danitra nanao hoe: Ny fanjakana amin''izao tontolo izao dia efa lasan''ny ny Tompontsika sy ny Kristiny; ary Izy no hanjaka mandrakizay mandrakizay.'
mg1865::mg_66::11::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loholona* efatra amby roa-polo, izay mipetraka eo ambonin''ny seza fiandrianany eo anatrehan''Andriamanitra, dia niankohoka ka nivavaka tamin''Andriamanitra [*presbytera]'
mg1865::mg_66::11::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao hoe: Misaotra Anao izahay, Tompo o, Andriamanitra Tsitoha, Ilay ankehitriny sy taloha, Satria nasehonao ny herinao lehibe, ka efa manjaka Ianao.'
mg1865::mg_66::11::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tezitra ny firenena maro, ary tonga ny fahatezeranao Sy ny fotoana hitsarana ny maty, sy hanomezana valim-pitia ny mpaminany mpanomponao sy ny olona masina ary izay matahotra ny anaranao, na kely na lehibe, ary mba hanimbanao izay manimba ny tany.'
mg1865::mg_66::11::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 11
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary novohana ny tempolin''Andriamanitra any an-danitra, ka hita ny fiaran''ny fanekeny teo anatin''ny tempoliny; ary nisy helatra sy feo sy kotrokorana sy horohorontany ary havandra vaventy.'
mg1865::mg_66::12::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny vehivavy mitafy ny masoandro, izay nenjehin''ny dragona'
  verse_text: 'Ary nisy famantarana lehibe hita tany an-danitra, dia vehivavy mitafy ny masoandro, ary ny volana no eo ambanin''ny tongony, ary misy satro-boninahitra kintana roa ambin''ny folo amin''ny lohany,'
mg1865::mg_66::12::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady bevohoka izy; ary mihetsi-jaza izy ka mitaraina, satria marary fatratra efa hiteraka.'
mg1865::mg_66::12::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy famantarana hafa koa hita tany an-danitra, ka, indro, nisy dragona mena lehibe manan-doha fito sy tandroka folo, ary misy diadema fito amin''ny lohany.'
mg1865::mg_66::12::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rambony dia manala ny ampahatelon''ny kintana amin''ny lanitra ka manjera ireny ho amin''ny tany; ary ny dragona nijanona teo anatrehan''ilay vehivavy efa hiteraka mba handrapaka ny zanany, raha vao teraka;'
mg1865::mg_66::12::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niteraka zazalahy izy, izay efa hanapaka* ny firenena rehetra amin''ny tehim-by; ary ny zanany novonjena faingana nakarina ho any amin''Andriamanitra, dia ho any amin''ny seza fiandrianany. [*Grika: handry]'
mg1865::mg_66::12::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ravehivavy kosa nandositra nankany an''efitra, izay nisy fitoerany namboarin''Andriamanitra, mba hovelomina any enim-polo amby roan-jato amby arivo andro izy.'
mg1865::mg_66::12::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy ady tany an-danitra: Mikaela sy ny anjeliny niady tamin''ilay dragona; ary ilay dragona mbamin''ny anjeliny kosa dia niady,'
mg1865::mg_66::12::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa tsy naharesy, sady tsy nisy fitoerana ho azy intsony tany an-danitra.'
mg1865::mg_66::12::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nazera ilay dragona, dia ilay menarana ela, izay atao hoe devoly sy Satana, izay mamitaka izao tontolo izao; dia nazera tamin''ny tany izy, ary ny anjeliny koa niaraka nazera taminy.'
mg1865::mg_66::12::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahare feo mahery tany an-danitra aho nanao hoe: Ankehitriny dia tonga ny famonjena sy ny hery sy ny fanjakan''Andriamanitsika, Ary ny fahefan''ny Kristiny, Satria nazera ilay mpiampanga ny rahalahintsika, dia ilay miampanga azy eo anatrehan''Andriamanitsika andro aman''alina.'
mg1865::mg_66::12::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo naharesy azy noho ny amin''ny ran''ny Zanak''ondry Sy ny teny filazana Azy, Ary tsy nankamamy ny ainy intsony izy, na dia ho faty aza.'
mg1865::mg_66::12::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany mifalia, ry lanitra sy ianareo izay monina ao aminy. Loza ho an''ny tany sy ny ranomasina ! Fa nidina ho aminareo ny devoly sady manana fahatezerana lehibe, Satria fantany fa kely sisa ny androny.'
mg1865::mg_66::12::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''ilay dragona fa nazera tamin''ny tany izy, dia nanenjika ilay vehivavy niteraka ny zazalahy izy.'
mg1865::mg_66::12::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay vehivavy nomena ny elatra roa an''ny voromahery lehibe hanidinany ho any an''efitra, ho any amin''ny fitoerany, izay itaizana azy fetr''andro iray sy fetr''andro roa ary antsasaky ny fetr''andro, mba tsy ho hitan''ilay menarana izy.'
mg1865::mg_66::12::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay menarana namoaka rano tamin''ny vavany, toy ny riaka, hanaraka an-dravehivavy, mba hindaosin''ny riaka izy.'
mg1865::mg_66::12::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny tany namonjy an-dravehivavy, fa nivava ny tany ka nitelina ny riaka izay navoaky ny dragona tamin''ny vavany.'
mg1865::mg_66::12::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 12
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tezitra tamin''ilay vehivavy ny dragona ka lasa nandeha hiady tamin''ny zanany sisa, izay mitandrina ny didin''Andriamanitra sy mitana ny filazana an''i Jesoa. Ary nitsangana teo ambonin''ny fasiky ny ranomasina izy.'
mg1865::mg_66::13::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny biby roa izay mpanompon''ny dragona'
  verse_text: 'Ary hitako fa, indro, nisy bibi-dia niakatra avy tamin''ny ranomasina, nanan-tandroka folo sy loha fito, ary tamin''ny tandrony dia nisy diadema folo; ary tamin''ny lohany dia nisy anarana fitenenan-dratsy*. [*Grika: blasfemia; izahao Matio 9:3]'
mg1865::mg_66::13::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny bibi-dia izay efa hitako dia tahaka ny leoparda, ary ny tongony tahaka ny an''ny bera, ary ny vavany tahaka ny vavan''ny liona; ary ilay dragona nanome azy ny heriny sy ny seza fiandrianany ary fahefana lehibe.'
mg1865::mg_66::13::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako ny lohany anankiray, izay toa voa ka efa ho faty; nefa sitrana ihany ilay feriny saiky nahafaty azy; ary gaga ny tany rehetra nanaraka ilay bibi-dia.'
mg1865::mg_66::13::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia niankohoka teo anoloan''ilay dragona ireo, satria izy no nanome ny fahefana ho an''ny bibi-dia; ary niankohoka teo anoloan''ny bibi-dia koa ireo ka nanao hoe: Iza no tahaka ny bibi-dia? ary iza no mahay miady aminy?'
mg1865::mg_66::13::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomena lela* miteny zavatra mihoapampana sy fitenenan-dratsy** izy, ary nomena fahefana mba hiasa*** roa amby efa-polo volana. [*Grika: vava] [** Grika: manao blasfemia; izahao Matio 9:3] [*Na: haharitra]'
mg1865::mg_66::13::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanokatra ny vavany hiteny ratsy* an''Andriamanitra izy, dia ny hiteny ratsy* ny anarany sy ny tabernakeliny, dia ireo mitoetra any an-danitra. [*Grika: manao blasfemia; izahao Matio 9:3]'
mg1865::mg_66::13::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navela hiady tamin''ny olona masina izy ka haharesy azy; ary nomena fahefana tamin''ny fokom-pirenena sy ny olona sy ny samy hafa fiteny ary ny firenena rehetra iry.'
mg1865::mg_66::13::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiankohoka eo anoloany ny olona rehetra monina ambonin''ny tany, dia izay tsy manana ny anarany voasoratra eo amin''ny bokin''ny fiainan''ny Zanak''ondry, izay voavono hatramin''ny nanorenana izao tontolo izao.'
mg1865::mg_66::13::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy manan-tsofina, aoka izy hihaino.'
mg1865::mg_66::13::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy mamabo, dia mba hobaboina* kosa izy; ary raha misy mamono amin''ny sabatra, dia tsy maintsy hovonoina amin''ny sabatra kosa izy. Indro ny faharetana sy ny finoan''ny olona masina. [*Na: Raha misy ho amin''ny fahababoana, dia ho amin''ny fahababoana izy]'
mg1865::mg_66::13::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy bibi-dia iray koa niakatra avy tamin''ny tany; ary nanan-tandroka roa tahaka ny an''ny zanak''ondry izy sady niteny tahaka ny dragona.'
mg1865::mg_66::13::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahefana rehetra nananan''ilay bibi-dia voalohany dia asehony eo anatrehany, ary ny tany mbamin''izay monina eo dia asainy miankohoka eo alohan''ilay bibi-dia voalohany, izay efa sitrana tamin''ilay feriny saiky nahafaty azy.'
mg1865::mg_66::13::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manao famantarana lehibe izy, ka dia mampidina afo avy any an-danitra ho amin''ny tany eo imason''ny olona aza.'
mg1865::mg_66::13::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 14
  verse_date_revised: '2022-09-26T05:30:02+0000'
  verse_title: null
  verse_text: 'Ary mamitaka izay monina ambonin''ny tany izy amin''ny famantarana izay nomena azy hatao eo imason''ny bibi-dia, sady milaza amin''izay monina ambonin''ny tany koa mba hanao sary ho an''ny bibi-dia, izay voan''ny sabatra, nefa velona ihany.'
mg1865::mg_66::13::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary navela hanisy aina ny sarin''ny bibi-dia izy, mba hahateny ny sarin''ny bibi-dia, ary hampamono izay rehetra tsy mety miankohoka eo anoloan''ny sarin''ny bibi-dia.'
mg1865::mg_66::13::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona rehetra, na ny kely na ny lehibe, na ny manan-karena na ny malahelo, na ny tsy andevo na ny andevo, dia ampandraisiny marika eo amin''ny tanany ankavanana na eo amin''ny handriny avokoa,'
mg1865::mg_66::13::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hisy hahazo hividy na hivarotra, afa-tsy izay manana ny marika, dia ny anaran''ny bibi-dia, na ny isan''ny anarany.'
mg1865::mg_66::13::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 13
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny fahendrena. Aoka izay manan-tsaina hanisa ny isan''ny bibi-dia, fa fanisan''olona izany; ary enina amby enim-polo amby enin-jato no isany.'
mg1865::mg_66::14::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny Zanak''ondry sy ny mpanaraka Azy'
  verse_text: 'Ary hitako fa, indro, ny Zanak''ondry nitsangana teo an-tendrombohitra Ziona, ary nisy efatra arivo amby efatra alina sy iray hetsy nomba Azy, samy manana ny anarany sy ny anaran''ny Rainy voasoratra eo amin''ny handriny.'
mg1865::mg_66::14::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare feo avy tany an-danitra aho, tahaka ny firohondrohon''ny rano be sy tahaka ny fikotroky ny kotrokorana mafy; ary ny feo izay reko dia tahaka ny an''ny mpitendry lokanga mitendry ny lokangany.'
mg1865::mg_66::14::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mihira toa tonon-kira vaovao eo anoloan''ny seza fiandrianana sy eo anatrehan''ny zava-manan''aina efatra sy ny loholona* izy; ary tsy nisy nahay nianatra izany fihirana izany, afa-tsy ny efatra arivo amby efatra alina sy iray hetsy izay navotana niala tamin''ny tany. [*Grika: presbytera]'
mg1865::mg_66::14::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo no tsy voaloto tamin''ny vehivavy, fa virijina izy. Ireo no manaraka ny Zanak''ondry na aiza na aiza no alehany. lreo no navotana avy tamin''ny olona ho voaloham-bokatra ho an''Andriamanitra sy ny Zanak''ondry.'
mg1865::mg_66::14::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nisy lainga hita teo am-bavany, sady tsy manan-tsiny izy.'
mg1865::mg_66::14::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Ny amin''ny anjely telo izay nitory, sy ny fahasambaran''izay maty ao amin''ny Tompo, ary ny andro fijinjana'
  verse_text: 'Ary hitako fa, indro, nisy anjely iray koa nanidina teo afovoan''ny lanitra, nanana filazantsara mandrakizay hotorina amin''izay monina ambonin''ny tany sy amin''ny firenena sy ny fokom-pirenena sy ny samy hafa fiteny ary ny olona rehetra,'
mg1865::mg_66::14::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'nanao tamin''ny feo mahery hoe: Matahora an''Andriamanitra, ka omeo voninahitra Izy; fa tonga ny andro* fitsarany; ary miankohofa eo anoloan''izay nanao ny lanitra sy ny tany sy ny ranomasina ary ny loharano. [*Grika: ora]'
mg1865::mg_66::14::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy iray koa, dia anjely faharoa, nanaraka ka nanao hoe: Rava! rava Babylona lehibe! izay nampisotro ny firenena rehetra ny divain''ny fahatezerana noho ny fijangajangany.'
mg1865::mg_66::14::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy iray koa, dia anjely fahatelo, nanaraka ireny ka nanao tamin''ny feo mahery hoe: Raha misy miankohoka eo anoloan''ny bibi-dia sy ny sariny ka mandray ny marika eo amin''ny handriny na amin''ny tanany,'
mg1865::mg_66::14::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izy koa no hisotro ny divain''ny fahatezeran''Andriamanitra, izay naidina tao anatin''ny kapoaky ny fahatezerany tsy miharoharo zavatra, sady hampijalina amin''ny afo sy solifara eo anatrehan''ny anjely masina sy eo anatrehan''ny Zanak''ondry izy;'
mg1865::mg_66::14::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny setroky ny fijaliany dia miakatra mandrakizay mandrakizay; ary tsy manam-pitsaharana na andro na alina izay miankohoka eo anoloan''ny bibi-dia sy ny sariny, na izay mandray ny mariky ny anarany.'
mg1865::mg_66::14::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny faharetan''ny olona masina, dia izay mitandrina ny didin''Andriamanitra sy ny finoana an''i Jesoa.'
mg1865::mg_66::14::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare feo avy tany an-danitra aho nanao hoe: Soraty: Sambatra ny maty, dia izay maty ao amin''ny Tompo hatramin''izao. Eny, hoy ny Fanahy, fa hitsahatra amin''izay nisasarany izy; fa ny asany manaraka azy.'
mg1865::mg_66::14::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, indro, nahita rahona fotsy aho, ary nisy tahaka ny Zanak''Olona* nipetraka teo ambonin''ny rahona, Izay nisatroka satro-boninahitra volamena sady nitana fijinjana maranitra teny an-tanany. [*Na: toa zanak''olona]'
mg1865::mg_66::14::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely iray koa nivoaka avy tao amin''ny tempoly, niantso tamin''ny feo mahery ka nanao tamin''ilay nipetraka teo ambonin''ny rahona hoe: Arosoy ny fijinjanao, ka mijinjà*, satria tonga ny andro* fijinjana; fa masaka dia masaka ny vokatry ny tany. [*Grika: ora]'
mg1865::mg_66::14::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naroson''ilay nipetraka teo ambonin''ny rahona tamin''ny tany ny fijinjany, ka voajinja ny tany.'
mg1865::mg_66::14::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely iray koa nivoaka avy tao amin''ny tempoly tany an-danitra, ary izy koa nanana fijinjana maranitra.'
mg1865::mg_66::14::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely iray koa nivoaka avy teo amin''ny alitara, ary nanana fahefana tamin''ny afo izy; ary izy niantso ilay nanana ny fijinjana maranitra tamin''ny feo mahery hoe: Arosoy ny fijinjanao maranitra, ka angony ny sampahom-boaloboka eo amin''ny tany; fa masaka tsara ny voalobony.'
mg1865::mg_66::14::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naroson''ilay anjely tamin''ny tany ny fijinjany, dia nangoniny ny voaloboky ny tany ka nazerany tao amin''ny famiazana lehibe, dia ny fahatezeran''Andriamanitra.'
mg1865::mg_66::14::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 14
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary voahitsaka teny ivelan''ny tanàna ny famiazana, ary avy tao amin''ny famiazana dia nisy rà nahadifotra hatramin''ny lamboridin-tsoavaly ka lasa hatramin''ny enin-jato amby arivo stadio.'
mg1865::mg_66::15::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny lovia fito nisy ny loza fito, izay nentin''ny anjely fito ka naidiny tamin''ny tany'
  verse_text: 'Ary hitako fa, indro, nisy famantarana iray koa tany an-danitra, sady lehibe mahagaga, dia anjely fito izay nanana ny Ioza fito farany, Satria ireny no enti-mahatanteraka ny fahatezeran''Andriamanitra.'
mg1865::mg_66::15::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita aho fa, indro, toa ranomasina fitaratra miharo afo, ary izay naharesy ka afaka tamin''ny bibi-dia sy ny sariny ary ny isan''ny anarany dia nitsangana teo amoron*''ny ranomasina fitaratra, nitana lokangan''Andriamanitra. [*Na: tao amin]'
mg1865::mg_66::15::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mihira ny fihiran''i Mosesy, mpanompon''Andriamanitra, sy ny fihiran''ny Zanak''ondry izy manao hoe: Lehibe sy mahatalanjona ny asanao, Tompo o, Andriamanitra Tsitoha; Mahitsy sy marina ny lalanao, Ry Mpanjaka mandrakizay.'
mg1865::mg_66::15::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no tsy hatahotra? Ary iza no tsy hankalaza ny anaranao, Tompo o? Fa Ianao ihany no masina, ary ny firenena rehetra ho avy hiankohoka eo anatrehanao; Fa efa naharihary ny fitsarana marina nataonao.'
mg1865::mg_66::15::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka izany, dia nahita aho fa, indro, novohana ny tempoly, dia* ny tabernakelin''ny vavolombelona** tany an-danitra; [*Na: tao amin''] [*Dia ny Didy Folo]'
mg1865::mg_66::15::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny anjely fito izay nanana ny loza fito dia nivoaka avy tao amin''ny tempoly, ary niravaka vato soa madio sy mamirapiratra* izy sady nisikina fisikinam-bolamena teo amin''ny tratrany. [*Na: (niakanjo rongony fotsy sady madio no mangatsakatsaka)]'
mg1865::mg_66::15::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny anankiray tamin''ny zava-manan''aina efatra nanome ny anjely fito lovia volamena fito, feno ny fahatezeran''Andriamanitra, Izay velona mandrakizay mandrakizay.'
mg1865::mg_66::15::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 15
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tempoly dia feno setroka avy tamin''ny voninahitr''Andriamanitra sy ny heriny, ka tsy nisy nahazo niditra tao amin''ny tempoly mandra-pahatanteraky ny loza fito nentin''ny anjely fito.'
mg1865::mg_66::16::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare feo mahery avy tao amin''ny tempoly aho nanao tamin''ny anjely fito hoe: Mandehana, aidino amin''ny tany ny ao amin''ny lovia fito feno ny fahatezeran''Andriamanitra.'
mg1865::mg_66::16::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voalohany nandeha, dia nampidina ny tao an-doviany tamin''ny tany; dia nisy vay ratsy sady mampahory tamin''ny olona izay nanana ny mariky ny bibi-dia sy niankohoka teo anatrehan''ny sariny.'
mg1865::mg_66::16::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny faharoa nampidina ny tao an-doviany tamin''ny ranomasina; dia nody rà tahaka ny ran''ny olona maty ny ranomasina: ary maty ny zava-manan''aina rehetra tao aminy.'
mg1865::mg_66::16::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahatelo nampidina ny tao an-doviany tamin''ny ony sy ny loharano; dia nody rà ireny.'
mg1865::mg_66::16::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare ny anjelin''ny rano aho nanao hoe: Marina Ianao, ilay ankehitriny sy taloha, dia ny Iray Masina, satria efa nitsara toy izany Ianao;'
mg1865::mg_66::16::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny ran''ny olona masina sy ny mpaminany no nalatsany, ka dia rà kosa no nomenao hosotroiny; ary tandrifiny ho azy izany.'
mg1865::mg_66::16::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary reko ny alitara nanao hoe: Eny, Tompo o, Andriamanitra Tsitoha, marina sy mahitsy ny fitsaranao.'
mg1865::mg_66::16::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahefatra nampidina ny tao an-doviany tamin''ny masoandro; dia nasaina nandoro ny olona tamin''ny afo izy.'
mg1865::mg_66::16::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary main''ny hafanana be ny olona, dia niteny ratsy* ny anaran''Andriamanitra, Izay manam-pahefana amin''ireny loza ireny, izy sady tsy nibebaka mba hanome voninahitra Azy. [*Grika: nanao blasfemia; izahao Matio 9:3]'
mg1865::mg_66::16::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahadimy nampidina ny tao an-doviany tamin''ny seza fiandrianan''ilay bibi-dia; dia tonga maizina ny fanjakany, ary ny olona nitsakotsako ny lelany noho ny fanaintainana,'
mg1865::mg_66::16::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia niteny ratsy* an''Andriamanitry ny lanitra izy noho ny fanaintainany sy ny vainy sady tsy nibebaka tamin''ny asany. [*Grika: nanao blasfemia; izahao Matio 9:3]'
mg1865::mg_66::16::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahenina nampidina ny tao an-doviany tamin''i Eofrata, ony lehibe; dia ritra ny ranony hanamboarana ny làlan''ireny mpanjaka avy any amin''ny fiposahan''ny masoandro.'
mg1865::mg_66::16::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita aho fa indreo fanahy maloto telo tahaka ny sahona avy tamin''ny vavan''ilay dragona sy tamin''ny vavan''ilay bibi-dia ary tamin''ny vavan''ilay mpaminany sandoka.'
mg1865::mg_66::16::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fanahin''ny demonia ireo ka manao famantarana sady mankany amin''ny mpanjaka amin''izao tontolo izao, mba hanangona azy ho amin''ny adin''ilay andro lehiben''Andriamanitra Tsitoha.'
mg1865::mg_66::16::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: '(Indro, avy toy ny mpangalatra Aho. Sambatra izay miambina* ka miaro ny fitafiany, fandrao mandeha mitanjaka izy, ka hita ny fahamenarany.) [*Grika: miari-tory]'
mg1865::mg_66::16::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nangoniny ho any amin''ny tany atao amin''ny teny Hebreo hoe Hara-magedona ireny.'
mg1865::mg_66::16::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahafito dia nampidina ny tao an-doviany tamin''ny rivotra; dia nisy feo mahery nivoaka avy tao amin''ny tempoly, teo amin''ny seza fiandrianana, nanao hoe: Vita.'
mg1865::mg_66::16::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy helatra sy feo sy kotrokorana, ary nisy horohorontany mafy, izay tsy mbola nisy toy izany hatrizay nisian''olona tety ambonin''ny tany, eny, tsy mbola nisy horohorontany mafy sy lehibe toy izany.'
mg1865::mg_66::16::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanàna lehibe dia vaky ho telo toko, ary rava ny tanànan''ny firenena maro; ary Babylona lehibe dia notsarovana teo anatrehan''Andriamanitra, mba homena azy ny kapoaky ny divain''ny firehetan''ny fahatezerany.'
mg1865::mg_66::16::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nosy rehetra nandositra, ary ny tendrombohitra tsy hita intsony.'
mg1865::mg_66::16::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 16
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy havandra vaventy nilatsaka avy tany an-danitra ho amin''ny olona, tokony ho lanjan-talenta iray avy; ary niteny ratsy an''Andriamanitra ny olona noho ny loza avy tamin''ny havandra; fa lehibe loatra izany loza izany.'
mg1865::mg_66::17::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ilay vehivavy janga (dia Babylona), izay nitaingina ny bibi-dia nivolon-jaky'
  verse_text: 'Ary tonga ny anjely anankiray tamin''izy fito izay nanana ny lovia fito, dia niteny tamiko nanao hoe: Avia aty; dia hasehoko anao ny fitsarana ilay vehivavy janga lehibe, izay mipetraka eny ambonin''ny rano maro,'
mg1865::mg_66::17::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ilay nijangajangan''ny mpanjakan''ny tany, sady natao leon''ny divain''ny fijangajangany ny mponina tamin''ny tany.'
mg1865::mg_66::17::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentiny tamin''ny Fanahy ho any an''efitra aho ary nahita vehivavy nitaingina bibi-dia mivolon-jaky, feno anarana fitenenan-dratsy sady nanan-doha fito sy tandroka folo.'
mg1865::mg_66::17::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ravehivavy dia nitafy lamba volomparasy sy jaky ary niravaka volamena sy vato soa ary perila sady nitana kapoaka volamena teny an-tanany, feno zava-betaveta, dia ny zava-maloto momba ny fijangajangany;'
mg1865::mg_66::17::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisy anarana voasoratra teo amin''ny handriny nanao hoe: ZAVA-MIAFINA, BABYLONA LEHIBE, RENIN''NY MPIJANGAJANGA SY NY ZAVA-BETAVETA, AMIN''NY TANY.'
mg1865::mg_66::17::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, ravehivavy dia leon''ny ran ny olona masina sy ny ran''ny martioran''i Jesoa; koa raha nahita azy aho, dia gaga indrindra.'
mg1865::mg_66::17::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ilay anjely tamiko: Nahoana no gaga ianao? Izaho hilaza aminao ny zava-miafina ny amin-dravehivavy sy ny bibi-dia mitondra azy, izay manan-doha fito sy tandroka folo.'
mg1865::mg_66::17::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny bibi-dia, ilay efa hitanao, dia teo ihany ary tsy eo izao, nefa efa hiakatra avy amin''ny lavaka tsy hita noanoa izy ka ho lasa ho amin''ny fandringanana; ary ny monina ambonin''ny tany, dia izay tsy voasoratra eo amin''ny bokin''ny fiainana hatramin''ny nanorenana izao tontolo izao, dia ho gaga raha mijery ilay bibi-dia, izay teo ihany ary tsy eo izao, nefa mbola ho avy indray.'
mg1865::mg_66::17::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny hevitra izay misy fahendrena: Ny loha fito dia tendrombohitra fito, izay ipetrahan-dravehivavy.'
mg1865::mg_66::17::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mpanjaka fito ireo; efa lavo ny dimy, ka ny iray mbola eo ihany, ary ny iray koa mbola tsy tonga; ary rehefa tonga izy, dia tsy maintsy mitoetra kelikely.'
mg1865::mg_66::17::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny bibi-dia izay teo ihany ary tsy eo izao, dia izy no naman''ny fito mahavalo ary ka lasa ho amin''ny fandringanana.'
mg1865::mg_66::17::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tandroka folo, izay hitanao, dia mpanjaka folo izay tsy mbola nahazo fanjakana; fa mandray fahefana ho toa mpanjaka iray ora miaraka amin''ny bibi-dia izy.'
mg1865::mg_66::17::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia miray saina ka manome ny heriny sy ny fahefany ho an''ilay bibi-dia.'
mg1865::mg_66::17::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia hiady amin''ny Zanak''ondry, ary ny Zanak''ondry haharesy azy, satria Tompon''ny tompo sy Mpanjakan''ny mpanjaka Izy, ary haharesy azy koa izay momba Azy, dia olona voantso sy voafidy ary mahatoky.'
mg1865::mg_66::17::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Ny rano efa hitanao, izay ipetrahan''ilay vehivavy janga, dia olona sy vahoaka betsaka sy firenena maro ary samy hafa fiteny.'
mg1865::mg_66::17::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tandroka folo sy ny bibi-dia izay efa hitanao, dia ireo no hankahala ilay vehivavy janga ka hahatsinontsinona azy sy hampitanjaka azy sy hihinana ny nofony ary handevona ny tenany amin''ny afo.'
mg1865::mg_66::17::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra efa nanome fo ireo hanatanteraka ny heviny sy hifanara-tsaina ary hanome ny fanjakany ho an''ilay bibi-dia mandra-pahatanteraky ny tenin''Andriamanitra.'
mg1865::mg_66::17::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 17
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ravehivavy, ilay hitanao, dia tanàna lehibe, izay manjaka amin''ny mpanjakan''ny tany.'
mg1865::mg_66::18::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny nandravana an''i Babylona, sy ny nisaonan''ny olona azy'
  verse_text: 'Rehefa afaka izany, dia hitako fa indro, nisy anjely iray koa nidina avy tany an-danitra, nanana fahefana lehibe; ary ny tany nohazavain''ny voninahiny.'
mg1865::mg_66::18::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niantso tamin''ny feo mahery izy ka nanao hoe: Rava! rava Babylona lehibe! ka tonga fonenan''ny demonia sy fieren*''ny fanahy maloto rehetra ary akanin*''ny vorona rehetra izay maloto sy ankahalaina. [*Grika: tranomaizina]'
mg1865::mg_66::18::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny divain''ny fahatezerana noho ny fijangajangany no nahalavoan*''ny firenena rehetra, ary ny mpanjakan''ny tany nijangajanga taminy, ary ny mpandranto amin''ny tany tonga mpanankarena noho ny hafatratry ny nitiavan''io ny zava-mahafinaritra ny tena. [*Na: (nisotrohan'')]'
mg1865::mg_66::18::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare feo iray koa avy tany an-danitra aho nanao hoe: Mialà aminy ianareo, ry oloko, mba tsy hiombonanareo ota aminy, ary mba tsy hisy hahazo anareo ny loza manjo azy.'
mg1865::mg_66::18::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahotany efa nitehika tamin''ny lanitra, ary Andriamanitra efa nahatsiaro ny ratsy nataony.'
mg1865::mg_66::18::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamalia azy araka izay nataony, ka omeo azy indroa heny toy ny nataony izy; ny kapoaka izay nofenoiny*, dia fenoy** indroa heny ho azy. [*Grika: noharoharoiny] [*Grika: haroharoy]'
mg1865::mg_66::18::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toraka izay niderany tena sy nivelomany tamin''ny zava-mahafinaritra ny tena, dia omeo fanaintainana sy alahelo toraka izany koa izy, satria hoy izy anakampo: Mipetraka ho mpanjakavavy aho, fa tsy mpitondratena, ary tsy mba hahita alahelo mihitsy aho;'
mg1865::mg_66::18::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa noho izany dia ho tonga indray andro monja izao loza hanjo azy izao, dia fahafatesana sy fisaonana ary mosary, ary ho levon''ny afo izy; fa mahery ny Tompo Andriamanitra, Izay nitsara azy.'
mg1865::mg_66::18::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: '2022-09-26T05:28:47+0000'
  verse_title: null
  verse_text: 'Ary ny mpanjakan''ny tany, izay nijangajanga taminy sy niara-nanaram-po taminy tamin''ny zava-mahafinaritra ny tena, dia hiteha-tratra sy hitomany azy, raha mahita ny setroky ny fandoroana azy;'
mg1865::mg_66::18::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, hijanona eny lavitra eny izy noho ny fahatahorana ny fanaintainany ka hanao hoe: Indrisy! Indrisy! Babylona, izay tanàna lehibe! ry ilay tanàna mafy! fa tamin''ny ora iray monja dia tonga ny fitsarana anao.'
mg1865::mg_66::18::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpandranto amin''ny tany dia hitomany sy hisaona azy; fa tsy hisy mpividy intsony ny entany:'
mg1865::mg_66::18::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia entana volamena sy volafotsy sy vato soa sy perila sy rongony fotsy madinika sy lamba volomparasy sy landy sy jaky sy hazo mani-pofona, sy ny fanaka ivory rehetra mbamin''ny fanaka rehetra amin''ny hazo saro-bidy indrindra sy varahina sy vy ary vato sanga,'
mg1865::mg_66::18::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy havozomamy sy zavatra mani-pofona* sy ditin-kazo sy menaka manitra sy ditin-kazo mani-pofona**, sy divay sy diloilo sy lafarina tsara toto sy vary tritika sy omby sy ondry sy soavaly sy kalesy ary tena sy ain''olona. [*Grika: amoma] [** lebona: izahao Eksodosy 30:34]'
mg1865::mg_66::18::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vokatra soa* nirin''ny fanahinao dia efa niala taminao, ary ny zava-tsoa rehetra sy ny zava-malaza rehetra dia efa levona tsy ho anao, ary tsy ho hita intsony mandrakizay ireo. [*Na: voan-kazo]'
mg1865::mg_66::18::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpandranto izany zavatra izany, izay efa tonga mpanankarena taminy, dia hijanona eny lavitra eny noho ny fahatahorana ny fanaintainany ka hitomany sy hisaona'
mg1865::mg_66::18::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hanao hoe: Indrisy! indrisy! ilay tanàna lehibe, izay nitafy rongony fotsy madinika sy lamba volomparasy sy jaky ary niravaka volamena sy vato soa ary perila!'
mg1865::mg_66::18::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tamin''ny ora iray monja no nahafoana ny harena be toy izany. Ary ny mpitondra sambo rehetra sy izay rehetra mandeha eny ambonin''ny ranomasina sy ny matilo ary izay rehetra manao raharaha any an-dranomasina dia nijanona teny lavitra eny,'
mg1865::mg_66::18::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha nahita ny setroky ny fandoroana azy, dia niantso nanao hoe: Aiza intsony re no misy tahaka izany tanàna lehibe izany?'
mg1865::mg_66::18::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanopy vovoka hiraraka tamin''ny lohany izy, dia niantso sady nitomany sy nisaona ka nanao hoe: Indrisy! indrisy! ilay tanàna lehibe, izay nampanan-karena izay rehetra manan-tsambo eny amin''ny ranomasina noho ny zava-tsaro-bidy tao aminy; fa tamin''ny ora iray monja no nahafoana izany.'
mg1865::mg_66::18::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia noho izay zavatra nanjo azy ianao. ry lanitra, sy ianareo olona masina sy ianareo Apostoly, ary ianareo mpaminany; fa Andriamanitra efa nitsara azy ka namaly azy noho ny taminareo.'
mg1865::mg_66::18::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy anjely mahery anankiray nibata vato tahaka ny vato lehibe fikosoham-bary, dia nanipy izany tany an-dranomasina ka nanao hoe: Hatsipy mafy toy izany no ho fandrava an''i Babylona, ilay tanàna lehibe, ka tsy ho hita intsony izy.'
mg1865::mg_66::18::22:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny feon''ny mpitendry lokanga sy ny mpitsoka mozika sy mpitsoka sodina ary ny mpitsoka trompetra dia tsy ho re eo aminao intsony; ary ny mpiasa rehetra mahay zavatra na inona na inona tsy ho hita eo aminao intsony; ary ny feon''ny vato fikosoham-bary tsy ho re eo aminao intsony;'
mg1865::mg_66::18::23:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fahazavan''ny jiro tsy mba hahazava eo aminao intsony; ary ny feon''ny mpampakatra sy ny ampakarina tsy ho re eo aminao intsony; fa lehiben''ny tany ny mpandrantonao; fa ny ody ratsinao no nentinao namitaka ny firenena rehetra.'
mg1865::mg_66::18::24:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo anatiny no nahitana ny ran''ny mpaminany sy ny olona masina sy itsy rehetra novonoina teny ambonin''ny tany.'
mg1865::mg_66::19::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Saotra ataon''ny any an-danitra noho ny nitsarana an''i Babylona'
  verse_text: 'Rehefa afaka izany, dia nahare hoatra ny feon''ny vahoaka betsaka tany an-danitra aho nanao hoe: Haleloia! Ny famonjena sy ny voninahitra ary ny hery dia an''Andriamanitsika;'
mg1865::mg_66::19::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa marina sy mahitsy ny fitsarana ataony; Fa nitsara ilay vehivavy janga lehibe Izy — Dia ilay nandoto ny tany tamin''ny fijangajangany — Ary namaly azy noho ny ran''ny mpanompony izay nalatsaky ny tanany.'
mg1865::mg_66::19::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny fanindroany ireo hoe: Haleloia! Ary ny setroky ny tanàna dia miakatra mandrakizay mandrakizay.'
mg1865::mg_66::19::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny loholona* efatra amby roa-polo sy ny zava-manan''aina efatra dia niankohoka nivavaka tamin''Andriamanitra. Izay mipetraka eo ambonin''ny seza fiandrianana, ka nanao hoe: Amena; Haleloia! [*Grika: presbytera]'
mg1865::mg_66::19::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy feo koa nivoaka avy teo amin''ny seza fiandrianana ka nanao hoe: Miderà an''Andriamanitsika ianareo mpanompony rehetra, dia ianareo izay matahotra Azy, na ny kely na ny lehibe.'
mg1865::mg_66::19::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahare feo tahaka ny an''ny vahoaka betsaka aho, sy tahaka ny firohondrohon''ny rano be, ary tahaka ny fikotroky ny kotrokorana mafy, nanao hoe: Haleloia! Fa ny Tompo Andriamanitsika, dia ny Tsitoha, no Mpanjaka.'
mg1865::mg_66::19::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka isika hifaly sy ho ravoravo ka hanome voninahitra Azy; fa tonga ny fampakaram-badin''ny Zanak''ondry. Ka efa niomana ny vadiny.'
mg1865::mg_66::19::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasaina nitafy rongony fotsy madinika sady madio no mangatsakatsaka izy; fa izany rongony fotsy madinika izany dia ny asa marina ataon''ny olona masina.'
mg1865::mg_66::19::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa izy tamiko Soraty: Sambatra izay nantsoina ho amin''ny fanasana fampakaram-badin''ny Zanak''ondry. Fa hoy izy tamiko: Ireo dia teny marin''Andriamanitra.'
mg1865::mg_66::19::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niankohoka teo amin''ny tongony aho mba hivavaka aminy. Ary hoy izy tamiko: Tandremo. aza manao izao; fa mpanompo namanao ihany aho sady naman''ireo rahalahinao izay mitana ny filazana an''i Jesoa; Andriamanitra ihany no ivavaho; fa ny filazana an''i Jesoa no fanahin''ny faminaniana.'
mg1865::mg_66::19::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny amin''ilay nitaingina soavaly fotsy sy ny miaramilany, izay naharesy ny bibi-dia sy ny mpaminany sandoka'
  verse_text: 'Ary nahita ny lanitra voasokatra aho, ka, indro, nisy soavaly fotsy; ary Izay nitaingina azy dia atao hoe Mahatoky sy Marina, ary amin''ny fahamarinana no itsarany sy iadiany.'
mg1865::mg_66::19::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny masony dia lelafo, ary tamin''ny lohany nisy diadema maro; ary Izy manana anarana voasoratra, izay tsy misy mahalala akory afa-tsy ny tenany ihany.'
mg1865::mg_66::19::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miakanjo akanjo voafafy rà* Izy; ary ny anarany atao hoe Ny Tenin''Andriamanitra.'
mg1865::mg_66::19::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny antokon''ny miaramila any an-danitra dia nanaraka Azy, samy nitaingina soavaly fotsy sy niakanjo rongony madinika sady fotsy no madio.'
mg1865::mg_66::19::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary misy sabatra maranitra mivoaka avy amin''ny vavany mba hamelezany ny firenena; ary Izy hanapaka azy amin''ny tehim-by; ary Izy no manitsaka ny famiazana ny divain''ny firehetan''ny fahatezeran''Andriamanitra Tsitoha.'
mg1865::mg_66::19::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manana anarana voasoratra amin''ny lambany sy ny feny Izy nanao hoe: MPANJAKAN''NY MPANJAKA SY TOMPON''NY TOMPO.'
mg1865::mg_66::19::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy anjely anankiray koa nitsangana teo amin''ny masoandro, ary niantso tamin''ny feo mahery izy ka nanao tamin''ny voro-manidina rehetra teo afovoan''ny habakabaka hoe: Avia, ka miangona ho amin''ny fanasana lehiben''Andriamanitra,'
mg1865::mg_66::19::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hihinananareo ny nofon''ny mpanjaka sy ny nofon''ny mpifehy arivo sy ny nofon''ny mahery sy ny nofon''ny soavaly mbamin''izay mitaingina azy ary ny nofon''ny olona rehetra, na andevo na tsy andevo, na kely na lehibe.'
mg1865::mg_66::19::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako ilay bibi-dia sy ny mpanjakan''ny tany mbamin''ny miaramilany tafangona mba hiady amin''ilay mitaingina ny soavaly sy amin''ny miaramilany.'
mg1865::mg_66::19::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nosamborina ilay bibi-dia mbamin''ny mpaminany sandoka, dia ilay nanao ny famantarana teo anatrehany, izay nentiny namitaka ny efa nandray ny mariky ny bibi-dia sady miankohoka eo anoloan''ny sariny; ary dia natsipy velona ho any amin''ny farihy afo mirehitra solifara izy roroa.'
mg1865::mg_66::19::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 19
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona sisa dia matin''ny sabatra mivoaka avy amin''ny vavan''ilay mitaingina ny soavaly; ary ny vorona rehetra dia voky ny nofony.'
mg1865::mg_66::20::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny namatorana an''i Satana, sy ny amin''ny fitsanganana voalohany, ary ny arivo taona'
  verse_text: 'Ary hitako fa, indro, nisy anjely nidina avy tany an-danitra, nanana ny fanalahidin''ny lavaka tsy hita noanoa sy gadra lehibe eny an-tanany;'
mg1865::mg_66::20::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nisambotra ilay dragona izy (dia ilay menarana ela, ny devoly sy Satana izany) ka namatotra 
azy arivo taona,'
mg1865::mg_66::20::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanipy ary ho amin''ny lavaka tsy hita noanoa ka nanidy izany, dia nanisy tombo-kase teo amboniny, mba tsy hamitahany ny firenena maro intsony mandra-pahatapitry ny arivo taona; ary rehefa afaka izany, dia tsy maintsy hovahana kelikely aloha izy.'
mg1865::mg_66::20::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita seza fiandrianana maro aho, ary nisy nipetraka teo amboniny, ary nomena fahefana hitsara izy; ary hitako koa ny fanahin''izay notapahin-doha noho ny filazana an''i Jesoa sy ny tenin''Andriamanitra sy izay rehetra tsy niankohoka teo anoloan''ny bibi-dia na teo anoloan''ny sariny ary tsy nandray ny marika ho eo amin''ny handriny na ho eo amin''ny tànany; ary velona izy ka niara-nanjaka tamin''i Kristy arivo taona.'
mg1865::mg_66::20::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sisa amin''ny maty dia tsy mbola velona mandra-pahatapitry ny arivo taona. Izany no fitsanganana voalohany.'
mg1865::mg_66::20::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra sy masina izay manana anjara amin''ny fitsanganana voalohany; ireo tsy mba ananan''ny fahafatesana faharoa fahefana, fa ho mpisoron''Andriamanitra sy Kristy ireo ka hiara-manjaka aminy arivo taona.'
mg1865::mg_66::20::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra ny arivo taona, dia hovahana Satana ho afaka ao amin''ny tranomaizina nitoerany'
mg1865::mg_66::20::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hivoaka hamitaka ny firenena eny amin''ny vazan-tany efatra, dia Goga sy Magoga, mba hanangona ary ho any amin''ny ady; tahaka ny fasiky ny ranomasina ny isany.'
mg1865::mg_66::20::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra namaky ny tany izy, dia nanodidina ny tobin''ny olona masina sy ny tanàna malala; ary nisy afo* nidina avy tany an-danitra ka nandany azy. [*Na: (afo avy amin''Andriamanitra)]'
mg1865::mg_66::20::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny devoly izay namitaka azy dia natsipy tany amin''ny farihy afo sy solifara, izay misy ilay bibi-dia sy ilay mpaminany sandoka koa, ary hampijalina andro amin''alina mandrakizay mandrakizay ireo.'
mg1865::mg_66::20::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hitako fa, indro, nisy seza fiandrianana fotsy lehibe sy Ilay mipetraka eo amboniny; ny tany sy ny lanitra nandositra ny tavany, ka tsy nisy hitoerany intsony.'
mg1865::mg_66::20::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita ny maty aho, na ny lehibe na ny kely, nitsangana teo anoloan''ny seza fiandrianana; ary novelarina ny boky; ary nisy boky iray koa novelarina, dia ny bokin''ny fiainana izany; ary ny maty dia notsaraina araka izay zavatra voasoratra teo anatin''ny boky, araka ny asany.'
mg1865::mg_66::20::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny ranomasina dia namoaka ny maty tao anatiny; ary ny fahafatesana sy ny fiainan-tsy hita* namoaka ny maty tao aminy; dia samy notsaraina araka ny asany izy. [*Grika: Hadesy]'
mg1865::mg_66::20::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fahafatesana sy ny fiainan-tsy hita* dia natsipy tany amin''ny farihy afo. Izany no fahafatesana faharoa, dia ny farihy afo. [*Grika: Hadesy]'
mg1865::mg_66::20::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 20
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nisy tsy hita voasoratra teo anatin''ny bokin''ny fiainana, dia natsipy tany amin''ny farihy afo izy.'
mg1865::mg_66::21::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''i Jerosalema vaovao'
  verse_text: 'Ary nahita lanitra vaovao sy tany vaovao aho; fa efa lasa ny lanitra voalohany sy ny tany voalohany, ary ny ranomasina dia tsy misy intsony.'
mg1865::mg_66::21::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahita aho fa, indro, ny tanàna masina, dia Jerosalema vaovao, nidina avy any an-danitra tamin''Andriamanitra, voaomana tahaka ny ampakarina efa mihaingo hihaona amin''ny vadiny.'
mg1865::mg_66::21::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahare feo mahery avy teo amin''ny seza fiandrianana aho nanao hoe: Indro, ny tabernakelin''Andriamanitra dia eo amin''ny olona, ary Izy hitoetra* eo aminy, ary ireo ho olony, ary Andriamanitra no hitoetra eo aminy, dia ho Andriamaniny. [*Grika: hitoetra an-day]'
mg1865::mg_66::21::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hofafany ny ranomaso rehetra amin''ny masony; ary tsy hisy fahafatesana intsony, sady tsy hisy alahelo, na fitarainana, na fanaintainana; fa efa lasa ny zavatra taloha.'
mg1865::mg_66::21::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy Ilay mipetraka eo ambonin''ny seza fiandrianana: Indro, havaoziko ny zavatra rehetra. Ary hoy koa Izy: Soraty; fa mahatoky sy marina ireo teny ireo.'
mg1865::mg_66::21::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Izy tamiko: Tanteraka ireo. Izaho no Alfa sy Omega, ny fiandohana sy ny fiafarana. Izaho hanome maimaimpoana amin''ny loharanon''ny ranon''aina ho an''izay mangetaheta.'
mg1865::mg_66::21::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay maharesy no handova izany zavatra izany; ary ho Andriamaniny Aho, ary izy ho zanako.'
mg1865::mg_66::21::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny osa sy ny tsy mino sy ny vetaveta sy ny mpamono olona sy ny mpijangajanga sy ny mpanao ody ratsy sy ny mpanompo sampy ary ny mpandainga rehetra dia hanana ny anjarany ao anatin''ny farihy mirehitra afo sy solifara; izany no fahafatesana faharoa.'
mg1865::mg_66::21::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga ny anankiray tamin''ny anjely fito izay nanana ny lovia fito, dia ireo nitondra* ny loza fito farany ka nanao tamiko hoe: Avia ety, dia hasehoko anao ny ampakarina, vadin''ny Zanak''ondry. [*Grika: feno]'
mg1865::mg_66::21::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra ahy tamin''ny Fanahy ho any an-tendrombohitra sady lehibe no avo izy ka naneho ahy ny tanàna masina, dia Jerosalema, midina avy tamin''Andriamanitra any an-danitra,'
mg1865::mg_66::21::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady manana ny voninahitr''Andriamanitra izy; ny famirapirany dia tahaka ny vato soa indrindra, dia tahaka ny vato jaspy, manganohano toy ny vato krystaly;'
mg1865::mg_66::21::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary manana mànda lehibe sady avo sy vavahady roa ambin''ny folo izy, ary eo amin''ny vavahady dia misy anjely roa ambin''ny folo, ary misy anarana voasoratra eo, dia ny an''ny firenena roa ambin''ny folo amin''ny Zanak''isiraely;'
mg1865::mg_66::21::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'eo atsinanana vavahady telo; eo avaratra vavahady telo; eo atsimo vavahady telo; eo andrefana vavahady telo.'
mg1865::mg_66::21::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny màndan''ny tanàna dia misy fanorenana roa ambin''ny folo, ary misy anarana roa ambin''ny folo koa eo, dia ny an ny Apostoly roa ambin''ny folon''ny Zanak''ondry.'
mg1865::mg_66::21::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ilay niteny tamiko dia nanana fandrefesana volotara volamena handrefesany ny tanàna sy ny vavahadiny ary ny màndany.'
mg1865::mg_66::21::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tanàna dia efa-joro, ka mitovy ny lavany sy ny sakany; ary nandrefy ny tanàna tamin''ny volotara izy, ka roa arivo sy iray alina stadio. Mitovy ny lavany sy ny sakany ary ny hahavony.'
mg1865::mg_66::21::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandrefy ny màndany izy, ka efatra amby efa-polo amby zato hakiho, araka ny refin''ny olona, dia ny an''ny anjely.'
mg1865::mg_66::21::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny màndany dia vato jaspy; ary ny tanàna dia tena volamena, toy ny fitaratra madio.'
mg1865::mg_66::21::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fanorenan''ny màndan''ny tanàna dia voaravaka vato soa samy hafa rehetra. Ny fanorenana voalohany jaspy, ny faharoa safira, ny fahatelo kalkedona, ny fahefatra emeralda,'
mg1865::mg_66::21::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fahadimy sardonyksa, ny fahenina karneola, ny fahafito krysolita, ny fahavalo beryla, ny fahasivy topaza, ny fahafolo krysopraso, ny faharaika ambin''ny folo hyakinta, ny faharoa ambin''ny folo ametysta.'
mg1865::mg_66::21::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vavahady roa ambin''ny folo dia perila roa ambin''ny folo; perila iray avy ny isam-bavahady; ary ny lalambe teo an-tanàna dia tena volamena, toy ny fitaratra manganohano.'
mg1865::mg_66::21::22:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy nahita tempoly teo aho; fa ny Tompo Andriamanitra, dia ny Tsitoha, sy ny Zanak''ondry no tempoliny.'
mg1865::mg_66::21::23:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 23
  verse_date_revised: '2022-10-25T05:23:13+0000'
  verse_title: null
  verse_text: 'Ary ny tanàna tsy mba mila ny masoandro na ny volana hamirapiratra aminy; fa ny voninahitr''Andriamanitra no nanazava azy, ary ny Zanak''ondry no fanazavana azy*. [*Grika: jirony]'
mg1865::mg_66::21::24:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny firenena maro no handeha amin''ny fahazavany; ary ny mpanjakan''ny tany dia mitondra ny voninahiny ho ao anatiny.'
mg1865::mg_66::21::25:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vavahadiny tsy harindrina akory amin''ny andro (fa tsy mba hisy alina ao).'
mg1865::mg_66::21::26:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahitra sy ny hajan''ny firenena maro dia ho entina ao anatiny.'
mg1865::mg_66::21::27:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 21
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy mba hiditra ao mihitsy izay tsy masina, na izay manao vetaveta, na izay mandainga, fa izay voasoratra ao anatin''ny bokin''ny fiainana izay an''ny Zanak''ondry ihany.'
mg1865::mg_66::22::1:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy naneho ahy onin''ny ranon''aina, manganohano tahaka ny vato krystaly, nivoaka avy teo amin''ny seza fiandrianan''Andriamanitra sy ny Zanak''ondry'
mg1865::mg_66::22::2:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'teo afovoan''ny lalambeny. Ary teny andaniny roa amin''ny ony nisy hazon''aina mamoa voa roa ambin''ny folo samy hafa sady mamoa isam-bolana; ary ny ravin''ny hazo dia ho fanasitranana ny firenena maro.'
mg1865::mg_66::22::3:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hisy ozona intsony; ary ny seza fiandrianan''Andriamanitra sy ny Zanak''ondry ho eo aminy; ary ny mpanompony dia hanompo Azy'
mg1865::mg_66::22::4:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hahita ny tavany, ary ny anarany dia ho eo amin''ny handriny.'
mg1865::mg_66::22::5:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy hisy alina intsony; ary tsy mba mila fahazavan''ny jiro na fahazavan''ny masoandro izy; fa ny Tompo Andriamanitra no hanazava azy; ary hanjaka mandrakizay mandrakizay izy.'
mg1865::mg_66::22::6:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Teny farany'
  verse_text: 'Ary hoy izy tamiko: Mahatoky sady marina ireo teny ireo; ary ny Tompo, Andriamanitry ny fanahin''ny mpaminany, naniraka ny anjeliny haneho amin''ny mpanompony izay zavatra tsy maintsy ho tonga faingana.'
mg1865::mg_66::22::7:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary, Indro, avy faingana Aho; sambatra izay mitandrina ny tenin''ny faminaniana amin''ity boky ity.'
mg1865::mg_66::22::8:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho Jaona no nahare sy nahita ireo zavatra ireo. Ary rehefa nahare sy nahita aho, dia niankohoka hivavaka teo anoloan''ny tongotr''ilay anjely naneho ahy ireo zavatra ireo.'
mg1865::mg_66::22::9:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izy tamiko: Tandremo, aza manao izao; fa mpanompo namanao ihany aho sady naman''ny mpaminany rahalahinao sy izay mitandrina ny teny amin''ity boky ity; Andriamanitra ihany no ivavaho.'
mg1865::mg_66::22::10:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izy tamiko: Aza asiana tombo-kase ny tenin''ny faminaniana amin''ity boky ity, fa antomotra ny andro.'
mg1865::mg_66::22::11:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao ny tsy marina aoka mbola hanao ny tsy marina ihany izy; ary izay maloto, aoka mbola hihaloto ihany izy; ary izay marina kosa, aoka mbola hanao ny marina ihany izy, ary izay masina, aoka mbola hihamasina ihany izy.'
mg1865::mg_66::22::12:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro avy faingana Aho; ary eto amiko ny famaliako, mba hamaliako ny olona rehetra araka ny asany.'
mg1865::mg_66::22::13:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Alfa sy Omega, ny voalohany sy ny Farany, ny fiandohana sy ny fiafarana.'
mg1865::mg_66::22::14:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay manasa ny akanjony, mba hananany fahefana amin''ny hazon''aina sy hidirany amin''ny vavahady ho ao an-tanàna.'
mg1865::mg_66::22::15:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa any ivelany ny alika sy ny mpanao ody ratsy sy ny mpijangajanga sy ny mpamono olona sy ny mpanompo sampy ary izay rehetra tia lainga sady mandainga.'
mg1865::mg_66::22::16:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho Jesoa naniraka ny anjeliko hanambara aminareo ireo zavatra ireo ho an''ny fiangonana. Izaho no Solofo sy taranak''i Davida, ny Kintana mamirapiratra fitarika andro.'
mg1865::mg_66::22::17:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Fanahy sy ny ampakarina manao hoe: Avia; ary aoka izay mahare hanao hoe: Avia. Ary aoka ho avy izay mangetaheta; ary izay mety, aoka izy hisotro maimaimpoana amin''ny ranon''aina.'
mg1865::mg_66::22::18:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho dia manambara amin''izay rehetra mandre ny tenin''ny faminaniana amin''ity boky ity: Raha misy manampy ireo, Andriamanitra hanampy ireo loza voasoratra eto anatin''ity boky ity ho azy;'
mg1865::mg_66::22::19:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary raha misy manaisotra amin''ny teny amin''ny bokin''ity faminaniana ity, dia hesorin''Andriamanitra ny anjarany amin''ny hazon''aina sy amin''ny tanàna masina, dia izay zavatra voasoratra eto anatin''ity boky ity.'
mg1865::mg_66::22::20:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Izay manambara ireo zavatra ireo: Eny, avy faingana Aho. Amena. Avia, Jesoa Tompo!'
mg1865::mg_66::22::21:
  verse_version: mg1865
  verse_book: mg_66
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny olona masina anie ny fahasoavan''i Jesoa* Tompo. Amena. [*Na: (Jesoa Kristy)]'
