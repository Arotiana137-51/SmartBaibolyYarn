mg1865::mg_19::1::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'BOKY VOALOHANY. Ny tsy fitovian''ny tsara fanahy sy ny ratsy fanahy'
  verse_text: 'Sambatra ny olona izay tsy mandeha eo amin''ny fisainan''ny ratsy fanahy, ary tsy mijanona eo amin''ny lalana falehan''ny mpanota, ary tsy mipetraka eo amin''ny fipetrahan''ny mpaniratsira;'
mg1865::mg_19::1::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lalàn''i Jehovah no sitrany; eny ny lalàny no saintsaininy andro aman''alina.'
mg1865::mg_19::1::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka ny hazo ambolena eo amoron''ny rano velona izy, izay mamoa amin''ny fotoany, ny raviny koa tsy mba malazo; ary ny asany rehetra dia ataony lavorary avokoa.'
mg1865::mg_19::1::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba toy izany ny ratsy fanahy fa toy ny akofa aelin''ny rivotra izy.'
mg1865::mg_19::1::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny ratsy fanahy dia tsy hahajanona eo amin''ny fitsarana, na ny mpanota eo amin''ny fiangonan''ny marina.'
mg1865::mg_19::1::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatr''i Jehovah ny lalan''ny marina, fa ny lalan''ny ratsy fanahy kosa dia mankany amin''ny fahaverezana.'
mg1865::mg_19::2::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny mpikomy amin''Andriamanitra sy ny Mesiany'
  verse_text: 'Nahoana no mitabataba ny jentilisa, ary misaina anoano foana ny firenena?'
mg1865::mg_19::2::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo mpanjakan''ny tany mitsangana, Ary ny mpanapaka miara-mioko hanohitra an''i Jehovah sy ny Mesiany ka manao hoe:'
mg1865::mg_19::2::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: '"Aoka hotosantsika ny famatorany, ka hariantsika hiala amintsika ny famehezany."'
mg1865::mg_19::2::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mipetraka any an-danitra mihomehy, ny Tompo maneso ireo.'
mg1865::mg_19::2::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny azy amin''ny fahavinirany Izy ka hampangorohoro azy amin''ny fahatezerany hoe:'
mg1865::mg_19::2::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: '"Izaho kosa efa nanendry ny Mpanjakako Tambonin''i Ziona, tendrombohitro masina."'
mg1865::mg_19::2::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: '"Hilaza zava-boatendry Aho; Jehovah nilaza tamiko hoe: Zanako Ianao, Izaho niteraka anao androany.'
mg1865::mg_19::2::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataha amiko, dia homeko ho lovanao ny jentilisa ary ny faran''ny tany ho fanananao.'
mg1865::mg_19::2::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotorotoroinao amin''ny tehim-by izy: toy ny famaky vilany tany no hanamontsamontsananao azy."'
mg1865::mg_19::2::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany dia hendre ianareo, ry mpanjaka; minoa anatra ianareo, ry mpitsaran''ny tany.'
mg1865::mg_19::2::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manompoa an''i Jehovah amin''ny fahatahorana, ary mifalia amin''ny fangovitana.'
mg1865::mg_19::2::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manoroha ny Zanaka, fandrao ho tezitra Izy, ka ho very eny an-dàlana ianareo; fa vetivety dia hirehitra ny fahatezerany. Sambatra izay rehetra mialoka aminy.'
mg1865::mg_19::3::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatokian''izay manana an''Andriamanitra ho Mpiaro. na dia be aza ny fahavalony. Salamo nataon''i Davida, fony izy nandositra an''i Absaloma zanany.'
  verse_text: 'Jehovah o, akory izato hamaroan''ny mampahory ahy! Maro no mitsangana hanohitra ahy.'
mg1865::mg_19::3::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no milaza ny fanahiko hoe: tsy manam-pamonjena amin''Andriamanitra izy.'
mg1865::mg_19::3::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo Ianao, Jehovah o, no ampinga manodidina ahy, Voninahitro sy mpanandratra ny lohako.'
mg1865::mg_19::3::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny feoko no iantsoako an''i Jehovah, ary any an-tendrombohiny masina no mamaly ahy Izy.'
mg1865::mg_19::3::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho nandry ka natory; nifoha aho, satria Jehovah no manohana ahy.'
mg1865::mg_19::3::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hatahotra olona alinalina aho, izay milahatra manodidina hamely ahy.'
mg1865::mg_19::3::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Jehovah o; vonjeo aho, Andriamanitro o; fa efa namely ny takolaky ny fahavaloko rehetra Ianao; ny nifin''ny ratsy fanahy novakivakinao.'
mg1865::mg_19::3::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'An''i Jehovah ny famonjena; Ho amin''ny olonao anie ny fitahianao*. [*Na: Ho amin''ny olonao ny fitahianao]'
mg1865::mg_19::4::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fivavaky ny azom-pahoriana, sy fanantenany an''Andriamanitra. Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Salamo nataon''i Davida.'
  verse_text: 'Raha miantso aho, mamalia ahy, ry Andriamanitry ny fahamarinako o; Raha tao an-katerena aho, dia nohalalahinao toerana; Mamindrà fo amiko, ka henoy ny fivavako.'
mg1865::mg_19::4::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry lehibe, mandra-pahoviana no hataonareo ho henatra ny voninahitro, ary ho tia zava-poana sy hamoron-dainga ianareo?'
mg1865::mg_19::4::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa aoka ho fantatrareo fa efa navahan''i Jehovah ho Azy ny tsara fanahy*; Jehovah hihaino, raha miantso Azy aho. [*Na: fa efa nomen''i Jehovah voninahitra ny olo-masiny]'
mg1865::mg_19::4::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tezera*, fa aza manota; mieritrereta eo am-pandrianareo, ka mangina. [*Na: Mangovita]'
mg1865::mg_19::4::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manatera fanati-pahamarinana, ary matokia an''i Jehovah.'
mg1865::mg_19::4::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro no niteny hoe: iza no haneho soa antsika? Asandrato aminay ny fahazavan''ny tavanao, Jehovah o.'
mg1865::mg_19::4::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nasianao fifaliana ny foko mihoatra noho ny tamin''ny taona nahabetsahan''ny variny sy ny ranom-boalobony.'
mg1865::mg_19::4::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handry amin''ny fiadanana aho, ka dia hatory miaraka amin''izay, satria Ianao, Jehovah o, no mampitoetra ahy mitokana irery tsy manana ahiahy.'
mg1865::mg_19::5::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo hatao amin''ny maraina, milaza ny amin''ny olona mahazo manatona an''Andriamanitra, sy ny hitsarana ny ratsy fanahy. Ho an''ny mpiventy hira'
  verse_text: 'Hampiarahina amin''ny sodina. Salamo nataon''i Davida. Jehovah o, henoy ny teniko; fantaro ny eritreritro.'
mg1865::mg_19::5::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy ny feon''ny fitarainako, ry Mpanjakako sy Andriamanitro o;fa Ianao no ivavahako.'
mg1865::mg_19::5::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, maraina no handrenesanao ny feoko; maraina no hivavahako* aminao, ka hanandrandra aho. [*Hebreo: handaharako]'
mg1865::mg_19::5::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy Andriamanitra mankasitraka izay ratsy Ianao; tsy hitoetra aminao ny ratsy.'
mg1865::mg_19::5::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hahazo mijanona eo imasonao ny mpirehareha; halanao ny mpanao ratsy rehetra.'
mg1865::mg_19::5::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haringanao ny mpiteny lainga;ny olona mpandatsa-drà sy mpamitaka dia ataon''i Jehovah ho zava-betaveta.'
mg1865::mg_19::5::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa noho ny haben''ny famindram-ponao dia hiditra ao an-tranonao; hiankohoka manatrika ny lapanao masina amin''ny fahatahorana anao aho.'
mg1865::mg_19::5::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tariho amin''ny fahamarinanao aho noho ny amin''ny mpampahory ahy; ataovy marina eo anoloako ny lalanao.'
mg1865::mg_19::5::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy azo itokiana ny aloaky ny vavany; ny ao anatiny dia tena faharatsiana*; fasana misokatra ny tendany. Mandambolambo ny lelany izy. [*Na: lavaka mitanatana]'
mg1865::mg_19::5::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Helohy izy, Andriamanitra o; Aoka ho lavon''ny saina ataony izy; Roahy izy noho ny haben''ny fahotany, satria efa niodina taminao.'
mg1865::mg_19::5::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hifaly izay rehetra mialoka aminao, hihoby mandrakariva izy, koa miarova azy Ianao; ka dia ho ravoravo aminao izay tia ny anaranao.'
mg1865::mg_19::5::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah o, mitahy ny marina; fankasitrahana no ataonao manodidina azy toy ny ampinga lehibe.'
mg1865::mg_19::6::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fivavaky ny olona anarin''Andriamanitra. Ho an''ny mpiventy hira'
  verse_text: 'Nampiarahina amin''ny valiha. Al-hasheminith. Salamo nataon''i Davida. Jehovah o, aza ny fahatezeranao no ananaranao ahy, ary aza ny fahaviniranao no amaizanao ahy.'
mg1865::mg_19::6::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindrà fo amiko, Jehovah o, fa reraka aho; sitrano aho, Jehovah o, fa mihozohozo ny taolako.'
mg1865::mg_19::6::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahiko koa dia mangovitra loatra; fa Ianao, Jehovah o, mandra-pahoviana?'
mg1865::mg_19::6::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena, Jehovah o, afaho ny fanahiko; Vonjeo aho noho ny famindram-ponao.'
mg1865::mg_19::6::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy fahatsiarovana Anao any amin''ny fahafatesana, any amin''ny fiainan-tsy hita* iza no hidera Anao? [*Hebreo: Sheola]'
mg1865::mg_19::6::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa sasatry ny misento aho; mampitsinkafona ny farafarako isan''alina aho sady mahampo-dranomaso ny fandriako.'
mg1865::mg_19::6::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lanin''alahelo ny masoko; efa pahina izy amin''ny ataon''ny mpampahory ahy rehetra.'
mg1865::mg_19::6::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà amiko, ianareo mpanao ratsy rehetra; fa Jehovah efa nandre ny feon''ny fitomaniako.'
mg1865::mg_19::6::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nandre ny fangatahako; Jehovah no handray ny fivavahako.'
mg1865::mg_19::6::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho menatra sy hangovitra indrindra ny fahavaloko rehetra; hihodina izy ka ho menatra tampoka.'
mg1865::mg_19::7::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana an''Andriamanitra, Mpitsara marina'
  verse_text: 'Sigaiona nataon''i Davida, izay nohirainy ho an''i Jehovah noho ny tenin''i Kosy Benjamita. Jehovah Andriamanitro o, Ianao no ialofako; vonjeo aho amin''izay rehetra manenjika ahy, ka afaho;'
mg1865::mg_19::7::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao ny fanahiko viravirainy tahaka ny fanaon''ny liona, ary kepokepohiny, ka tsy misy mamonjy.'
mg1865::mg_19::7::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitro o, raha nanao izany aho; raha misy heloka eto an-tanako;'
mg1865::mg_19::7::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha namaly ratsy izay tsara fihavanana tamiko aho, novonjeko aza izay nampahory ahy tsy ahoan-tsy ahoana* [*Na: Ka nandroba izay nampahory ahy tsy ahoan-tsy ahoana]'
mg1865::mg_19::7::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka ny fahavalo hanenjika ny fanahiko ka hahatratra azy; eny, aoka izy hanitsaka ny aiko amin''ny tany, ary hampandry ny voninahitro amin''ny vovoka.'
mg1865::mg_19::7::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, mitsangàna amin''ny fahatezeranao; misandrata hisakana ny fisafoaky ny mpampahory ahy; ary mifohaza hanampy ahy, fa didy marina no navoakanao;'
mg1865::mg_19::7::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny firenena maro hivory manodidina Anao; ary miverena ho any amin''ny avo eo amboniny Ianao,'
mg1865::mg_19::7::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hitsara ny firenena; Jehovah o, tsarao aho araka ny fahamarinako sy ny tsy fananako tsiny.'
mg1865::mg_19::7::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tapaka ny ratsy ataon''ny ratsy fanahy, fa ampitoero kosa ny marina; fa Andriamanitra marina no mamantatra ny fo sy ny voa.'
mg1865::mg_19::7::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ampingako dia ao amin''Andriamanitra, Mpamonjy ny mahitsy fo.'
mg1865::mg_19::7::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpitsara marina Andriamanitra, eny Andriamanitra Izay tezitra isan''andro.'
mg1865::mg_19::7::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy ibebahana* Izy, dia hanasa ny sabany; efa manenjana ny tsipïkany Izy ka manamboatra azy, [*Na: iverenana]'
mg1865::mg_19::7::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ireo dia kendreny amin''ny fiadiana mahafaty; ny zana-tsipïkany ataony mirehitra.'
mg1865::mg_19::7::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, efa marary hiteraka zava-poana ireo; eny, torontoronina fampahoriana izy ary mitera-doza*; [*Hebreo: lainga]'
mg1865::mg_19::7::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihady lavaka izy ka manalalaka izany, dia latsaka ao anatin''ny longoa nataony ihany izy;'
mg1865::mg_19::7::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsingerina ho eo an-dohany ihany ny fampahoriany; ary eo an-tampon-dohany ihany no ianjeran''ny loza nataony.'
mg1865::mg_19::7::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 7
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera an''i Jehovah araka ny fahamarinany aho, ary hankalaza ny anaran''i Jehovah Avo Indrindra.'
mg1865::mg_19::8::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny voninahitr''Andriamanitra, sy ny voninahitra nomeny ny olombelona'
  verse_text: 'Ho an''ny mpiventy hira Al-hagitith. Salamo nataon''i Davida. Jehovah, Tomponay o, endrey ny voninahitry ny anaranao amin''ny tany rehetra! nataonao eny amin''ny lanitra ny voninahitrao.'
mg1865::mg_19::8::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy amin''ny vavan''ny ankizy madinika sy ny minono no nanorenanao hery noho ny mpandrafy Anao, mba hampanginanao ny fahavalo sy izay ta-hamaly ratsy.'
mg1865::mg_19::8::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha jereko ny lanitrao, izay asan''ny rantsan-tananao, sy ny volana aman-kintana, izay noforoninao,'
mg1865::mg_19::8::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona moa ny olona, no ahatsiarovanao azy? Ary ny zanak''olombelona, no amangianao azy?'
mg1865::mg_19::8::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nataonao ambany kely noho Andriamanitra izy, ary efa nosatrohanao voninahitra sy fiandrianana.'
mg1865::mg_19::8::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampanjakainao amin''ny asan''ny tananao izy; ny zavatra rehetra dia efa nataonao eo ambanin''ny tongony,'
mg1865::mg_19::8::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny ondry aman''osy sy ny omby rehetra, ary ny bibidia koa,'
mg1865::mg_19::8::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbamin''ny voro-manidina sy ny hazandrano any an-dranomasina, izay mandeha amin''ny lalan-dranomasina.'
mg1865::mg_19::8::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Tomponay o, endrey ny voninahitry ny anaranao amin''ny tany rehetra!'
mg1865::mg_19::9::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Fiderana an''Andriamanitra, Mpitsara marina, sy fahatokiana Azy'
  verse_text: 'Ho an''ny mpiventy hira, Almoth-laben. Salamo nataon''i Davida. Hidera an''i Jehovah amin''ny foko rehetra aho; hanambara ny fahagaganao rehetra aho.'
mg1865::mg_19::9::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho faly sy ho ravoravo aminao aho; hankalaza ny anaranao aho ry Avo Indrindra o,'
mg1865::mg_19::9::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria lasa nihodina ny fahavaloko, nirepirepy izy ka ringana tsy ho eo anatrehanao.'
mg1865::mg_19::9::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nitsara ahy Ianao ka nanome ahy ny rariny; mipetraka eo amin''ny seza fitsaranao Ianao ho Mpitsara marina.'
mg1865::mg_19::9::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanarinao mafy ny jentilisa, efa naringanao ny ratsy fanahy, ny anarany efa nokosehinao ho faty mandrakizay doria.'
mg1865::mg_19::9::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny fahavalo, dia tanteraka ho mandrakizay ny fandravàna azy*; ary izay tanàna efa noravanao, dia very na dia ny fahatsiarovana azy aza. [*Na: Ry fahavalo tanteraka ho mandrakizay ny fandravana]'
mg1865::mg_19::9::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa Jehovah mitoetra mandrakizay, efa nametraka ny sezany hitsarany Izy,'
mg1865::mg_19::9::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy hitsara izao tontolo izao amin''ny fahamarinana, eny hitsara ny firenena amin''ny fahitsiana Izy.'
mg1865::mg_19::9::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia Jehovah no ho fiarovana avo ho an''ny mahantra, ho fiarovana avo amin''ny andro fahoriana Izy.'
mg1865::mg_19::9::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hatoky Anao izay mahalala ny anaranao; fa tsy foinao izay mitady Anao, Jehovah o.'
mg1865::mg_19::9::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah, Izay mitoetra any Ziona; ambarao any amin''ny firenena ny asany.'
mg1865::mg_19::9::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay manadin-drà dia mahatsiaro ny ory; tsy manadino ny fitarainany Izy.'
mg1865::mg_19::9::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindrà fo amiko, Jehovah o; mitsinjova ny fahoriako avy amin''izay mankahala ahy, Ry Mpanandratra ahy ho afaka amin''ny vavahadin''ny fahafatesana,'
mg1865::mg_19::9::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba holazaiko avokoa ny fideràna Anao rehetra; eo am-bavahadin''i Ziona zanakavavy no hifaliako amin''ny famonjenao.'
mg1865::mg_19::9::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny jentilisa efa latsaka tamin''ny lavaka izay nohadiny, ny fandrika harato izay nafeniny efa nahazo ny tongony,'
mg1865::mg_19::9::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nanao izay mampiseho ny tenany ho Mpitsara; namandrika ny ratsy fanahy tamin''ny asan''ny tanany Izy.'
mg1865::mg_19::9::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiverina ho any amin''ny fiainan-tsy hita* ny ratsy fanahy, dia ny jentilisa rehetra izay manadino an''Andriamanitra. [*Hebreo: Sheola]'
mg1865::mg_19::9::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ho mandrakizay no hanadinoana ny malahelo; ary tsy ho very mandrakizay ny fanantenan''ny mahantra.'
mg1865::mg_19::9::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Jehovah o, aoka tsy hahery ny olona; aoka hotsaraina eo anatrehanao ny jentilisa.'
mg1865::mg_19::9::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asio fampahatahorana* izy, Jehovah o; aoka ho fantatry ny jentilisa fa olona ihany izy. [*Na: fampianarana]'
mg1865::mg_19::10::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Fitarainana sy fangataham-pamonjena noho ny fireharehan''ny ratsy'
  verse_text: 'Jehovah o, nahoana no mijanona eny lavitra eny Ianao ka miery amin''ny andro fahoriana?'
mg1865::mg_19::10::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fireharehan''ny ratsy fanahy dia enjehina mafy ny malahelo*; azon''ny fahendrena nataony izy ireny. [*Na: miolomay manenjika ny malahelo izy]'
mg1865::mg_19::10::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mandoka izay irin''ny fony; ary ny mpierina mahafoy sy manamavo an''i Jehovah.'
mg1865::mg_19::10::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mirehareha hoe: Tsy hanadina Izy; eny, "Tsy misy Andriamanitra" no tontalin-keviny.'
mg1865::mg_19::10::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tanteraka* mandrakariva ny alehany; any amin''ny avo lavitra azy ny fitsarànao; ny mpandrafy azy rehetra dia ataony hoe: zinona ireny? [*Hebreo: Mahery]'
mg1865::mg_19::10::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy am-pony: tsy hangozohozo aho, tsy ho azon-doza mandrakizay doria aho.'
mg1865::mg_19::10::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Feno ozona sy fitaka ary fanaovana an-keriny ny vavany; ao ambanin''ny lelany dia misy fampahoriana sy faharatsiana.'
mg1865::mg_19::10::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamitsaka amin''ny fanotrehana ao an-tanàna izy, ao an-katakonana no amonoany ny marina; ny masony mikendry ny mahantra.'
mg1865::mg_19::10::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manotrika ao an-katakonana tahaka ny liona ao amin''ny famitsahany izy; manotrika hisambotra ny malahelo izy; fandrihany amin''ny haratony no fisambony ny malahelo.'
mg1865::mg_19::10::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torotoro sy mitanondrika ny mahantra ka lavo amin''ny herin''ny ratsy fanahy.'
mg1865::mg_19::10::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy anakampony: efa nanadino Andriamanitra, efa nanafina ny tavany Izy ka tsy hahita mandrakizay.'
mg1865::mg_19::10::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Jehovah o; Andriamanitra o, atsangano ny tananao, aza manadino ny ory.'
mg1865::mg_19::10::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mamingavinga an''Andriamanitra ny ratsy fanahy ka manao anakampo hoe: Tsy hanadina Ianao?'
mg1865::mg_19::10::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahita ihany Ianao, satria mijery fahoriana sy alahelo, mba hovalian''ny tananao. Ianao no iononan''ny mahantra; Ianao no Mpamonjy ny kamboty.'
mg1865::mg_19::10::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torotoroy ny sandrin''ny ratsy fanahy; ary adino ny heloky ny mpanao ratsy mandra-paha-tsy hisy hitanao intsony.'
mg1865::mg_19::10::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no Mpanjaka mandrakizay doria; voafongotra tsy ho amin''ny taniny intsony ny jentilisa.'
mg1865::mg_19::10::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nohenoinao, Jehovah o, ny irin''ny mpandefitra; mampiomana ny fony Ianao sady mampihaino ny sofinao,'
mg1865::mg_19::10::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 10
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanomezanao rariny ny kamboty sy ny mahantra, mba tsy handroso hampitahotra intsony ny zanak''olombelona ety an-tany.'
mg1865::mg_19::11::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny avalin''ny mahery finoana izay sakaizany saro-tahotra. Ho an''ny mpiventy hira. Nataon''i Davida.'
  verse_text: 'Jehovah no ialofako; ahoana no anaovanareo amin''ny fanahiko hoe: mandosira ho any an-tendrombohitrareo toy ny voron-kely*? [*Na: ry voronkely]'
mg1865::mg_19::11::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, ny ratsy fanahy manenjana ny tsipïkany; efa nanamboatra ny zana-tsipïkany eo amin''ny kofehy izy, nikendry tao amin''ny maizina hitifitra ny mahitsy fo.'
mg1865::mg_19::11::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rava ny fanorenana*, ka inona indray no azon''ny marina atao? [*Na: voazera ny andry]'
mg1865::mg_19::11::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah dia ao amin''ny tempoliny masina, ny seza fiandrianan''i Jehovah dia any an-danitra; ny masony mijery, eny, ny hodi-masony mizaha toetra ny zanak''olombelona.'
mg1865::mg_19::11::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mizaha toetra ny marina; fa ny ratsy fanahy sy ny mifaly hampidi-doza dia samy halan''ny fanahiny.'
mg1865::mg_19::11::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handatsaka fandrika amin''ny ratsy fanahy Izy tahaka ny fandatsaka ranonorana; afo sy solifara ary rivo-mahamay no ho anjara kapoakany.'
mg1865::mg_19::11::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 11
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa marina Jehovah, ka fahamarinana no tiany; ny mahitsy no hahita ny tavany*. [*Na: Ny mahitsy no hitan''ny tavany]'
mg1865::mg_19::12::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana noho ny tsy fahamarinan''ny maro. Ho an''ny mpiventy hira'
  verse_text: 'Al-hasheminith. Salamo nataon''i Davida. Vonjeo, Jehovah o, fa efa lany ny tsara fanahy; eny, tsy misy mahatoky intsony eo amin''ny zanak''olombelona.'
mg1865::mg_19::12::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy milaza lainga amin''ny namany amin''ny molotra mandrobo izy; fo mamorom-pitaka no itenenany.'
mg1865::mg_19::12::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Holevonin''i Jehovah anie ny molotra mandrobo rehetra sy ny lela miteny avonavona,'
mg1865::mg_19::12::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manao hoe: hampahery anay ny lelanay;miandany aminay ny molotray; iza no tomponay?'
mg1865::mg_19::12::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fampahoriana ny ory sy ny fisentoan''ny malahelo, dia hitsangana Aho ankehitriny, hoy Jehovah; hovonjeko izay vingavingain''ny sasany*. [*Na: Hataoko mahita ny famonjena iriny izy]'
mg1865::mg_19::12::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah dia teny madio, tahaka ny volafotsy voarendrika tao anatin''ny memy ka mitsoriaka amin''ny tany eny, voadio impito.'
mg1865::mg_19::12::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, Jehovah o, no hiaro azy, Ianao no hiambina azy mandrakizay tsy ho azon''ity taranaka ity.'
mg1865::mg_19::12::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 12
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha avy izay isandratan''ny tsinontsinona eo amin''ny zanak''olombelona, dia mieboebo ombieniombieny ny ratsy fanahy. Fitarainana ataon''izay azom-pahoriana mafy loatra.'
mg1865::mg_19::13::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 13
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Jehovah o, mandra-pahoviana no mbola hanadinoanao ahy ihany? Mandra-pahoviana no mbola hanafenanao ny tavanao amiko?'
mg1865::mg_19::13::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 13
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no mbola hisaintsainako am-panahy, sy hahalahelovako am-po isan''andro? Mandra-pahoviana no mbola hisandratan''ny fahavaloko ho amboniko?'
mg1865::mg_19::13::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 13
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo aho ka valio, Jehovah Andriamanitro o; ampahazavao ny masoko, fandrao renoky ny torimaso fahafatesana aho;'
mg1865::mg_19::13::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 13
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fandrao ny fahavaloko hanao hoe: naharesy azy aho, fandrao hifaly ny rafilahiko, raha mangozohozo aho.'
mg1865::mg_19::13::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 13
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izaho kosa, dia ny famindram-ponao no itokiako; ho faly amin''ny famonjenao ny foko.'
mg1865::mg_19::13::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 13
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihira ho an''i Jehovah aho, satria nanisy soa ahy Izy;'
mg1865::mg_19::14::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny faharatsian''ny olona sy ny fanirian''ny sasany famonjena.'
  verse_text: 'Ho an''ny mpiventy hira. Nataon''i Davida. Ny adala manao anakampo hoe : Tsy misy Andriamanitra. Manao izay ratsy sy vetaveta izy; Tsy misy manao ny tsara.'
mg1865::mg_19::14::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-danitra Jehovah miondrika mijery ny zanak''olombelona, mba hizaha na misy hendry mitady an''Andriamanitra.'
mg1865::mg_19::14::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy efa nivily izy rehetra ka tonga vetaveta avokoa; tsy misy manao ny tsara, na dia iray akory aza.'
mg1865::mg_19::14::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahalala va ny mpanao ratsy rehetra, izay mihinana ny oloko toy ny fihinan-kanina, ary Jehovah tsy antsoiny?'
mg1865::mg_19::14::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, matahotra dia matahotra izy, satria Andriamanitra no eo amin''ny taranaka marina.'
mg1865::mg_19::14::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia foananareo aza ny fisainan''ny ory, Jehovah kosa no arony.'
mg1865::mg_19::14::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 14
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely! Raha ampodin''i Jehovah avy amin''ny fahababoana ny olony, dia ho faly Jakoba, ary ho ravoravo Isiraely.'
mg1865::mg_19::15::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 15
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny toetry ny olona izay mahazo monina ao amin''Andriamanitra'
  verse_text: 'Salamo nataon''i Davida. Jehovah o, iza no hitoetra ao amin''ny tabernakelinao? iza no honina ao an-tendrombohitrao masina?'
mg1865::mg_19::15::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 15
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandeha tsy misy tsiny ary manao izay mahitsy, sady misaintsaina ny marina ny fony;'
mg1865::mg_19::15::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 15
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manendrikendrika amin''ny lelany, sady tsy manisy ratsy ny sakaizany, ary tsy manao izay hahafa-baraka ny namany,'
mg1865::mg_19::15::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 15
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy manaja ny ratsy fanahy*, fa manome voninahitra ny matahotra an''i Jehovah; tsy mivadika amin''ny fianianany, na dia maningotra ny tenany aza, [*Hebreo: Ny lavina. Na: Izay mietry sy maniva tena]'
mg1865::mg_19::15::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 15
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady tsy mampihana ny volany, na mandray kolikoly hanameloka ny marina, izay mitandrina izany dia tsy mba hangozohozo mandrakizay.'
mg1865::mg_19::16::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatokiana an''Andriamanitra, Izay fototry ny soa, na dia tonga aza ny fahoriana sy ny fahafatesana'
  verse_text: 'Miktama nataon''i Davida. Arovy aho, Andriamanitra o, fa mialoka aminao aho.'
mg1865::mg_19::16::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho ny amin''i Jehovah: Tompoko Ianao; tsy misy soa ananako azo oharina aminao;'
mg1865::mg_19::16::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amin''ny olona masina ambonin''ny tany, ireo no olona tsara laza izay sitrako indrindra*. [*Na: Dia izaho sy ny olona ambonin''ny tany, Ary ny olona tsara laza izay sitrako indrindra]'
mg1865::mg_19::16::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho be ny fahorian''izay manova an''Andriamanitra hatakalony ny hafa. Tsy mba hanatitra ny fanati-drà aidiny aho, ary tsy mba hotononin''ny molotro ny anarany.'
mg1865::mg_19::16::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no anjara lovako sy kapoakako; Ianao no mampaharitra ny anjarako.'
mg1865::mg_19::16::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny voafaritra ho anjarako dia eo amin''ny tany mahafinaritra; eny, manan-dova tsara aho.'
mg1865::mg_19::16::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisaotra an''i Jehovah Izay manome saina ahy aho; ary na amin''ny alina aza dia mananatra* ahy ny foko**. [*Na: mamporisika] [**Hebreo: voako]'
mg1865::mg_19::16::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataoko eo anatrehako mandrakariva Jehovah, fa eo an-kavanako Izy, ka dia tsy hangozohozo aho.'
mg1865::mg_19::16::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ifalian''ny foko sy iravoravoan''ny fanahiko*; eny, ny nofoko aza hitoetra tsy manana ahiahy. [*Hebreo: voninahitro]'
mg1865::mg_19::16::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ho foinao ho any amin''ny fiainan-tsy hita* ny aiko; tsy hamela ny Iray Masinao ho latsaka ao amin''ny** lavaka*** Ianao. [*Hebreo: Sheola] [**Hebreo: hahita] [***Na: ho tratry ny lo]'
mg1865::mg_19::16::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 16
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampahafantatra ahy ny lalan''aina Ianao; fa havokisam-pifaliana no eo anatrehanao, ary fahafinaretana no eo an-tananao an-kavanana mandrakizay.'
mg1865::mg_19::17::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fivavaky ny ory mba hovonjen''Andriamanitra tsy ho azon''ny hery sy ny reharehan''ny fahavalony'
  verse_text: 'Fivavak''i Davida. Jehovah o, mihainoa ny rariny, mandrenesa ny fitarainako, atongilano ny sofinao amin''ny fivavako avy amin''ny molotra tsy misy fitaka.'
mg1865::mg_19::17::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hivoaka avy eo anatrehanao ny fitsarana ahy; ny masonao hijery marina.'
mg1865::mg_19::17::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nizaha toetra ny foko Ianao, namantatra ahy nony alina; nizaha toetra ahy tamin''ny memy Ianao, fa tsy nahita na inona na inona; ny vavako tsy hafa noho ny eritreritro*. [*Na: fa tsy nahita hevi-dratsy; Tsy ho diso ny vavako na: Mikasa tsy hampanota ny vavako aho]'
mg1865::mg_19::17::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny amin''ny asan''ny olona, dia ny tenin''ny molotrao no nitandremako tsy ho amin''ny lalan''ny mpanao an-keriny.'
mg1865::mg_19::17::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny diako maharitra eo amin''ny lalanao, tsy solafaka ny tongotro.'
mg1865::mg_19::17::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho miantso Anao, ka mamaly ahy Ianao, Andriamanitra o; atongilano amiko ny sofinao, ka henoy ny teniko.'
mg1865::mg_19::17::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy mahagaga ny famindram-ponao, ry Mpamonjy amin''ny tananao ankavanana izay olona mialoka aminao, mba tsy ho azon''ny fahavalo.'
mg1865::mg_19::17::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arovy tahaka ny anakandriamaso aho, afeno ao ambanin''ny aloky ny elatrao,'
mg1865::mg_19::17::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba tsy ho azon''ny ratsy fanahy izay mampahory ahy, dia ny fahavaloko masiaka, izay manodidina ahy.'
mg1865::mg_19::17::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa mihirim-belona izy; teny miavonavona no aloaky ny vavany.'
mg1865::mg_19::17::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manodidina anay* amin''ny alehanay ankehitriny izy, Vandrininy hapotrany amin''ny tany izahay; [*Na: Ahy]'
mg1865::mg_19::17::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fijery azy dia tahaka ny liona noana ta-hamiravira, sy tahaka ny liona tanora mamitsaka ao am-pierena.'
mg1865::mg_19::17::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Jehovah o, sakano izy, aripaho izy; vonjeo amin''ny sabatrao ny fanahiko tsy ho azon''ny ratsy fanahy;'
mg1865::mg_19::17::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo amin''ny tananao aho, Jehovah o, mba tsy ho azon''ny olon''izao tontolo izao, izay manana ny anjarany amin''izao fiainana izao, sady fenoinao ny harenao ny kibony; Maro anaka izy, dia mamela ny fananany be ho an''ny zanany madinika.'
mg1865::mg_19::17::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 17
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa, dia aoka hahita ny tavanao amin''ny fahamarinana; aoka ny endrikao no hahafa-po ahy, raha mifoha.'
mg1865::mg_19::18::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitantaran''i Davida ny namonjen''Andriamanitra azy. Ho an''ny mpiventy hira. Nataon''i Davida, mpanompon''i Jehovah, izay nilaza tamin''i Jehovah ny tenin''ity fihirana ity tamin''ny andro namonjen''i Jehovah azy tamin''ny tanan''ny fahavalony rehetra, indrindra fa tamin''ny tanan''i Saoly; dia hoy izy:'
  verse_text: 'mamiko indrindra Ianao, Jehovah Heriko o.'
mg1865::mg_19::18::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy; Andriamanitro, vatolampy ialofako, sy ampingako ary tandroka famonjena ahy sy fiarovana avo ho ahy.'
mg1865::mg_19::18::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantso an''i Jehovah izay mendrika hoderaina aho, ka dia vonjena ho afaka amin''ny fahavaloko.'
mg1865::mg_19::18::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihodidina tamiko ny famatoram-pahafatesana, ary ny riaky ny faharatsiana nampahatahotra ahy.'
mg1865::mg_19::18::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famatoran''ny fiainan-tsy hita* nihodidina tamiko; nisakana ahy ny fandriky ny fahafatesana. [*Hebreo: Sheola]'
mg1865::mg_19::18::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony azom-pahoriana aho, dia niantso an''i Jehovah, eny, Andriamanitro no nitarainako; nihaino ny feoko tao an-tempoliny Izy, ary ny fitarainako teo anatrehany dia efa tonga teo an-tsofiny.'
mg1865::mg_19::18::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihozongozona sy nihorohoro ny tany, ary ny fanambanin''ny tendrombohitra nihorohoro; eny, nihozongozona ireo, satria tezitra Jehovah.'
mg1865::mg_19::18::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy setroka nisavoana teo am-bavorony, ary afo avy teo am-bavany no nandevona ka nisy vainafo nidedadeda teo aminy.'
mg1865::mg_19::18::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naondriny ny lanitra, ka nidina Izy; ary aizim-pito no teo ambanin''ny tongony.'
mg1865::mg_19::18::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaingina kerobima Izy ka nanidina; eny, nanidina faingana tamin''ny ela-drivotra Izy.'
mg1865::mg_19::18::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanao ny maizina ho fiereny sy tranony manodidina Azy Izy, dia rahona ngalingaly* rahona matevina. [*Hebreo: aizin-drano]'
mg1865::mg_19::18::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo amin''ny famirapiratana teo anatrehany dia nandalo ny rahony matevina havandra sy vainafo.'
mg1865::mg_19::18::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampikotroka tany an-danitra Jehovah, ny Avo Indrindra niloa-peo. Havandra sy vainafo.'
mg1865::mg_19::18::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandefa ny zana-tsipïkany Izy ka nampiely ny fahavaloko. Ary nampandeha helatra be ka nampifanaritaka azy.'
mg1865::mg_19::18::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hita ny mason-drano, ary niseho ny fanambanin''ny tany noho ny teny mafy nataonao, Jehovah o, noho ny fifofofofon''ny fofonain''ny vavoronao.'
mg1865::mg_19::18::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naninjitra ny tanany avy tany ambony Izy ka nandray ahy; nanintona ahy niala tamin''ny rano be Izy;'
mg1865::mg_19::18::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namonjy ahy tamin''ny fahavaloko mahery Izy sy tamin''izay nankahala ahy, satria tsy leoko ireny'
mg1865::mg_19::18::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisakana ahy tamin''ny andro nahitako loza ireny, nefa Jehovah no niseho ho Mpanohana ahy.'
mg1865::mg_19::18::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra ahy ho any amin''ny malalaka Izy; namonjy ahy Izy, satria tiany aho.'
mg1865::mg_19::18::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanisy soa ahy araka ny fahamarinako Jehovah; araka ny fahadiovan''ny tanako no namaliany ahy.'
mg1865::mg_19::18::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nitandrina ny lalan''i Jehovah aho, ka tsy mba nanao ratsy hialana tamin''Andriamanitro;'
mg1865::mg_19::18::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitsipiny rehetra dia teo anatrehako, ary ny lalàny tsy mba nampialaiko tamiko;'
mg1865::mg_19::18::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nanan-tsiny taminy aho sady niaro tena tsy ho azon''ny fahotako;'
mg1865::mg_19::18::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa namaly ahy araka ny fahamarinako Jehovah, dia araka ny fahadiovan''ny tanako teo imasony.'
mg1865::mg_19::18::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona tsara no isehoanao fa tsara; ny tena olo-marina no isehoanao fa marina;'
mg1865::mg_19::18::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny madio no isehoanao fa madio; ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina*. [*Hebreo: miolakolaka]'
mg1865::mg_19::18::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao mamonjy ny olona ory; ary ny maso miandranandrana kosa aetrinao.'
mg1865::mg_19::18::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao mampirehitra ny jiroko; Jehovah Andriamanitro no mampahazava ny fahamaizinako.'
mg1865::mg_19::18::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no ahazoako mitsarapaka hamely ny miaramila iray toko; ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.'
mg1865::mg_19::18::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny amin''Andriamanitra, dia marina ny lalany; ny tenin''i Jehovah dia voazaha toetra amin''ny memy; Jehovah no ampingan''izay rehetra mialoka aminy.'
mg1865::mg_19::18::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza no Andriamanitra afa-tsy Jehovah? ary iza no vatolampy afa-tsy Andriamanitsika?'
mg1865::mg_19::18::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany Andriamanitra izany no mampisikina hery ahy sy manamarina ny alehako.'
mg1865::mg_19::18::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao ny tongotro ho tahaka ny an''ny dieravavy Izy ka mampitoetra ahy eo amin''ny fitoerako avo.'
mg1865::mg_19::18::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianatra ny tanako hiady Izy, ka mahahenjana tsipïka varahina ny sandriko.'
mg1865::mg_19::18::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omenao ahy ny ampingan''ny famonjenao; ny tananao ankavanana no manohana ahy, ary ny fahamoram-panahinao no mahalehibe ahy.'
mg1865::mg_19::18::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halalahinao ny lalana hodiaviko, ka tsy mangovitra ny hato-tongotro.'
mg1865::mg_19::18::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manenjika ny fahavaloko aho ka mahatratra azy; ary tsy mba miverina aho mandra-pahalàny ritrany.'
mg1865::mg_19::18::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamely mafy azy aho, ka tsy mahaleo izy; lavo eo ambanin''ny tongotro izy.'
mg1865::mg_19::18::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao mampisikina ahy hery hiady; aripakao ho ambaniko izay mitsangana hamely ahy.'
mg1865::mg_19::18::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ataonao miamboho ahy ny fahavaloko; ka aringako izay mankahala ahy.'
mg1865::mg_19::18::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitaraina izy, fa tsy misy mpamonjy, dia amin''i Jehovah, fa tsy mamaly azy Izy.'
mg1865::mg_19::18::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torotoroiko madinika tahaka ny vovoka entin''ny rivotra izy; Tahaka ny fanary fotaka eny an-dalambe no fanariko azy.'
mg1865::mg_19::18::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamonjy ahy amin''ny fifanoheran''ny olona Ianao. Sy manandratra ahy ho lohan''ny firenen-tsamy hafa; ny firenena tsy fantatro aza dia manompo ahy.'
mg1865::mg_19::18::44:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy; Ny hafa firenena mikoy ahy*. [*Na: Ny olona re laza ihany aza, dia hafa firenena, mikoy ahy]'
mg1865::mg_19::18::45:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hafa firenena dia mihaketraka, ka miala amin-kovitra avy ao amin''ny fiarovany mafy.'
mg1865::mg_19::18::46:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Velona Jehovah; isaorana anie ny Vatolampiko; asandratra anie Andriamanitry ny famonjena ahy,'
mg1865::mg_19::18::47:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Andriamanitra, Izay manao famaliana ho ahy ka mampanaiky ny firenena ahy.'
mg1865::mg_19::18::48:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamonjy ahy amin''ny fahavaloko Izy; eny, manandratra ahy ho ambonin''izay mitsangana hanohitra ahy Ianao, ary mamonjy ahy amin''ny olon-dozabe.'
mg1865::mg_19::18::49:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no hiderako Anao eny amin''ny firenen-tsamy hafa, Jehovah o, sy hankalazako ny anaranao.'
mg1865::mg_19::18::50:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 18
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao famonjen-dehibe ho an''ny mpanjaka voatendriny Izy, ary mamindra fo amin''ny voahosony, dia amin''i Davida sy ny taranany mandrakizay.'
mg1865::mg_19::19::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanehoana ny voninahitr''Andriamanitra, amin''ny asan''ny tanany, na amin''ny lalàna nomeny. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Ny lanitra mitory ny voninahitr''Andriamanitra; ary ny habakabaka manambara ny asan''ny tanany.'
mg1865::mg_19::19::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny andro samy miteny amin''ny andro mandimby azy, ary ny alina samy manolo-pahalalana amin''ny alina mandimby azy.'
mg1865::mg_19::19::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy teny na fiteny anefa; tsy re izay feony*. [*Na: Izay tsy andrenesana ny feony; na: Izay tsy re ny feony]'
mg1865::mg_19::19::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nivoaka ho any amin''ny tany rehetra ny famolainany*, ary ny teniny dia mihatra amin''ny faran''izao rehetra izao. Trano-lay ho an''ny masoandro no nataony teo aminy; [*Na: feony]'
mg1865::mg_19::19::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny masoandro dia tahaka ny mpampaka-bady mivoaka avy ao an-trano fandriany; sady mifaly tahaka ny lehilahy matanjaka mihazakazaka amin''ny alehany izy.'
mg1865::mg_19::19::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any amin''ny faravodilanitra ny fiposahany, ary ny alehany dia hatramin''ny farany koa, ka tsy misy takona amin''ny hafanany.'
mg1865::mg_19::19::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy tsiny ny lalàn''i Jehovah, mamelombelona ny fanahy; mahatoky ny teni-vavolombelon''i Jehovah, mahahendry ny kely saina.'
mg1865::mg_19::19::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahitsy ny fandidian''i Jehovah, mahafaly ny fo; madio ny didin''i Jehovah, mampahazava ny maso.'
mg1865::mg_19::19::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Madio ny fahatahorana an''i Jehovah, maharitra mandrakizay; marina ny fitsipik''i Jehovah, eny, mahitsy avokoa.'
mg1865::mg_19::19::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Irina noho ny volamena ireny, eny, noho ny tena volamena betsaka aza; ary mamy noho ny tantely, eny, noho ny tantely mitete avy amin''ny tohotra.'
mg1865::mg_19::19::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanomponao dia hazavain''ireny; amin''ny fitandremana azy misy valiny lehibe.'
mg1865::mg_19::19::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny fahatsontsana, dia iza re no mahalala izany? ataovy tsy manan-tsiny aho ny amin''izay ota tsy fantatra.'
mg1865::mg_19::19::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arovy ny mpanomponao tsy ho azon''ny ota sahisahy; aoka tsy hanapaka ahy izany; dia ho marina tokoa aho ka tsy hanan-tsiny ny amin''izay fahadisoana lehibe.'
mg1865::mg_19::19::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 19
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny tenin''ny vavako sy ny fisainan''ny foko samy hankasitrahana eo imasonao, Jehovah o, Vatolampiko sy Mpanavotra ahy.'
mg1865::mg_19::20::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka ho an''ny mpanjaka raha mivoaka hanafika. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Hihaino anao anie Jehovah amin''ny andro fahoriana; hitondra anao ho any amin''ny avo anie ny anaran''Andriamanitr''i Jakoba.'
mg1865::mg_19::20::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatonga famonjena ho anao avy amin''ny fitoerana masina anie Izy, ary hanohana anao avy any Ziona.'
mg1865::mg_19::20::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatsiaro ny fanatitra hohaninao rehetra anie Izy, ary hankasitraka ny fanatitra doranao.'
mg1865::mg_19::20::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanome anao araka ny fonao anie Izy ary hahatanteraka ny fisainanao rehetra.'
mg1865::mg_19::20::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hihoby noho ny famonjena azonao izahay, ary amin''ny anaran''Andriamanitray no hanangananay faneva; ho tanterahin''i Jehovah anie ny angatahinao rehetra.'
mg1865::mg_19::20::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankehitriny dia fantatro fa Jehovah mamonjy ny voahosony; hamaly azy avy amin''ny lanitry ny fahamasinany Izy amin''ny herin''ny famonjen''ny tanany ankavanana.'
mg1865::mg_19::20::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sasany mitoky amin''ny kalesy, ary ny sasany amin''ny soavaly; Fa raha izahay kosa, dia ny anaran''i Jehovah Andriamanitray no hoderainay.'
mg1865::mg_19::20::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia reraka sady lavo; fa izahay kosa efa mitsangana sy mijoro,'
mg1865::mg_19::20::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 20
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, vonjeo ny mpanjaka; hamaly anay anie Izy* amin''izay andro iantsoanay Azy. [*Na: Jehovah o, vonjeo! Hamaly anay anie ny Mpanjaka]'
mg1865::mg_19::21::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana atao rehefa miverina avy any an-tafika ny mpanjaka. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Jehovah o, ny herinao no hifalian''ny mpanjaka; ary endrey ny haben''ny hiravoravoany amin''ny famonjenao!'
mg1865::mg_19::21::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny nirin''ny fony dia nomenao azy, ary ny nangatahin''ny molony tsy mba nolavinao.'
mg1865::mg_19::21::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa notsenainao fitahiana soa izy; teo an-dohany nasianao satro-boninahitra tena volamena.'
mg1865::mg_19::21::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aina no nangatahiny taminao, dia nomenao azy izany, dia andro lava mandrakizay doria.'
mg1865::mg_19::21::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lehibe ny voninahiny amin''ny famonjenao; Laza sy voninahitra no nataonao taminy.'
mg1865::mg_19::21::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nataonao ho fitahiana mandrakizay izy; ampifalinao indrindra amin''ny tavanao izy.'
mg1865::mg_19::21::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka matoky an''i Jehovah, ary noho ny famindram-pon''ny Avo Indrindra dia tsy hangozohozo izy.'
mg1865::mg_19::21::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho azon''ny tananao ny fahavalonao rehetra; eny, ho azon''ny tananao ankavanana ny mankahala anao;'
mg1865::mg_19::21::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hataonao tahaka ny fatana misy afo mirehitra izy amin''ny andro hisehoanao, Jehovah handany azy amin''ny fahatezerany, ary handevona azy ny afo.'
mg1865::mg_19::21::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanany* haringanao tsy ho eo amin''ny tany, ary ny taranany tsy ho eo amin''ny zanak''olombelona; [*Hebreo: vokany]'
mg1865::mg_19::21::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nikasa hanisy ratsy anao izy, ka namoron-kevi-dratsy fa tsy nahefa.'
mg1865::mg_19::21::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hampiamboho azy ianao; ny tsipïkanao no ikendrenao ny tavany.'
mg1865::mg_19::21::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 21
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misandrata amin''ny herinao, Jehovah o, hihira sy hankalaza ny herinao izahay.'
mg1865::mg_19::22::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana mafy noho ny fahoriana, ary fisaorana noho ny fahafahana, sy filazana ny handrosoan''ny fanjakan''Andriamanitra. Ho an''ny mpiventy hira'
  verse_text: 'Alaieleth-hasahara. Salamo nataon''i Davida. Andriamanitra o, Andriamanitro o, nahoana no dia mahafoy ahy Ianao? Lavitra ny famonjena ahy ny tenin''ny fitarainako.'
mg1865::mg_19::22::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro o, miantso aho nony andro, nefa tsy mamaly Ianao; ary nony alina, nefa tsy mahita fiononana aho.'
mg1865::mg_19::22::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa masina Ianao, Ry mipetraka eo ambonin''ny fideran''ny Isiraely.'
mg1865::mg_19::22::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no nitokian''ny razanay; Natoky izy, ka namonjy azy Ianao.'
mg1865::mg_19::22::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no nitarainany, ka afaka izy; Ianao no nitokiany, ka tsy menatra izy.'
mg1865::mg_19::22::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho dia olitra, fa tsy olona, fandatsan''olona sy fanevatevam-bahoaka.'
mg1865::mg_19::22::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mahita ahy dia manaraby ahy; manondro molotra izy sady mihifikifi-doha ka manao hoe:'
mg1865::mg_19::22::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankino amin''i Jehovah*, dia aoka Izy hamonjy azy; eny, aoka Izy hanafaka azy, raha mankasitraka azy Izy. [*Na: Efa niankina tamin''i Jehovah izy]'
mg1865::mg_19::22::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no nampivoaka ahy avy tao an-kibo; nampandry ahy fahizay ianao, fony aho mbola nampinonoin''ny reniko;'
mg1865::mg_19::22::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nankinina taminao hatrany am-bohoka aho; hatrany an-kibon-dreniko dia Andriamanitro Ianao.'
mg1865::mg_19::22::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manalavitra ahy Ianao, fa akaiky ny fahoriana, sady tsy misy mpamonjy.'
mg1865::mg_19::22::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitangorona amiko ireo ombilahy be, ny maherin''i Basana manemitra ahy.'
mg1865::mg_19::22::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misanasana vava amiko izy; eny, liona mamiravira sy mierona izy.'
mg1865::mg_19::22::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa rano aidina aho, ka mivaha ny taolako rehetra; tahaka ny savoka ny foko: miempo ato anatiko izy.'
mg1865::mg_19::22::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maina tahaka ny tavim-bilany ny heriko, ary ny lelako miraikitra amin''ny lanilaniko; ao amin''ny vovoky ny fahafatesana no ametrahanao ahy.'
mg1865::mg_19::22::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mitangorona amiko ny amboa, ny fiangonan''ny ratsy fanahy manemitra ahy. Manindrona ny tongotro aman-tanako izy* [*Na: Manodidina ny tongotro aman-tanako hoatra ny liona izy]'
mg1865::mg_19::22::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahisa ny taolako rehetra aho ireo dia mibanjina sady mangarika ahy.'
mg1865::mg_19::22::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mizara ny fitafiako ho azy izy; ary ny akanjoko ilokàny.'
mg1865::mg_19::22::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah o, aza manalavitra; ry Heriko o, faingana hamonjy ahy.'
mg1865::mg_19::22::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo amin''ny sabatra ny fanahiko, dia ny hany malalako amin''ny herin''ny amboa.'
mg1865::mg_19::22::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo amin''ny vavan''ny liona aho; ary valio ho afaka amin''ny tandroky ny ombimanga*. [*Na: teo amin''ny tandroky ny ombimanga dia novalianao aho]'
mg1865::mg_19::22::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitory ny anaranao amin''ny rahalahiko aho; eo amin''ny fiangonana no hideràko Anao.'
mg1865::mg_19::22::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay matahotra an''i Jehovah, miderà Azy; ry taranak''i Jakoba rehetra, manomeza voninahitra Azy; ary matahora Azy, ry Zanak''Isiraely rehetra.'
mg1865::mg_19::22::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy manao tsinontsinona na marikorikon''ny fahorian''ny ory Izy, ary tsy mba manafina ny tavany aminy; fa raha mitaraina aminy ireny, dia mihaino Izy.'
mg1865::mg_19::22::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy aminao no ahazoako manao fiderana eo amin''ny fiangonan-dehibe; ny voadiko dia hefaiko eo anatrehan''izay matahotra an''i Jehovah.'
mg1865::mg_19::22::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihinana ny mpandefitra ka ho voky; hidera an''i Jehovah izay mitady azy; ho velona mandrakizay anie ny fonareo.'
mg1865::mg_19::22::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatsiaro ka hiverina ho amin''i Jehovah ny faran''ny tany rehetra; ary hiankohoka eo anatrehanao ny fokon''ny firenen-tsamy hafa.'
mg1865::mg_19::22::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa an''i Jehovah ny fanjakana; ary manapaka amin''ny firenen-tsamy hafa Izy.'
mg1865::mg_19::22::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihinana sy hiankohoka ny mpanefoefo* rehetra ambonin''ny tany, eo anatrehany no hiondrehan''izay rehetra efa hidina any amin''ny vovoka ka tsy mahavelona ny ainy. [*Hebreo: matavy]'
mg1865::mg_19::22::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisy taranaka hanompo Azy; ary ny Tompo dia holazaina amin''ny taranaka ho avy.'
mg1865::mg_19::22::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 22
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisy ho avy ka hanambara ny fahamarinany, amin''ny olona izay mbola hateraka, fa Izy no nanao izany.'
mg1865::mg_19::23::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 23
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny Mpiandry Tsara'
  verse_text: 'Salamo nataon''i Davida. Jehovah no Mpiandry ahy, tsy hanan-java-mahory aho,'
mg1865::mg_19::23::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 23
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampandry ahy amin''ny ahi-maitso Izy; mitondra ahy eo amoron''ny rano fialan-tsasatra Izy.'
mg1865::mg_19::23::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 23
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamelombelona ny fanahiko Izy; mitarika ahy amin''ny lalan''ny fahamarinana noho ny anarany Izy.'
mg1865::mg_19::23::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 23
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, na dia mandeha mamaky ny lohasaha aloky ny fahafatesana aza aho, dia tsy hatahotra ny loza aho, fa Ianao no amiko; ny tsorakazonao sy ny tehinao, ireo no mahafa-tahotra ahy.'
mg1865::mg_19::23::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 23
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamelatra latabatra eo anoloako eo imason''ny fahavaloko Ianao; manosotra diloilo ny lohako Ianao; ny kapoakako feno dia feno.'
mg1865::mg_19::23::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 23
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny tokoa, fahasoavana sy famindram-po no hanaraka ahy amin''ny andro rehetra hiainako, dia hitoetra ao an-tranon''i Jehovah andro lava aho.'
mg1865::mg_19::24::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiomanana handray ny Mpanjakan''ny voninahitra'
  verse_text: 'Salamo nataon''i Davida. An''i Jehovah ny tany sy izay rehetra eo aminy. Izao rehetra izao sy ny mponina eo aminy.'
mg1865::mg_19::24::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no nanorina azy tambonin''ny ranomasina. Tambonin''ny rano no nampitoerany azy.'
mg1865::mg_19::24::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hiakatra any an-tendrombohitr''i Jehovah? ary iza no hitoetra ao amin''ny fitoerany masina?'
mg1865::mg_19::24::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay madio tanana sy mahitsy fo, izay tsy manandratra ny fanahiny ho amin''ny lainga, na mianiana hamitaka.'
mg1865::mg_19::24::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handray fitahiana avy amin''i Jehovah izy, ary fahamarinana avy amin''Andriamanitry ny famonjena azy.'
mg1865::mg_19::24::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no taranaka mitady Azy, izay mitady ny tavanao, dia Jakoba*. [*Na: Izay mitady ny tavanao, ry Andriamanitr''i Jakoba]'
mg1865::mg_19::24::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandrato ny lohanareo, ry vavahady, ary misandrata ianareo, ry varavarana fahagola*, mba hidiran''ny mpanjakan''ny voninahitra. [*Na: mandrakizay]'
mg1865::mg_19::24::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza izao Mpanjakan''ny voninahitra izao? Jehovah mahery tsitoha, Jehovah mpiady mahery.'
mg1865::mg_19::24::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandrato ny lohanareo, ry vavahady; ary manandrata ny lohanareo, ry varavarana fahagola*, mba hidiran''ny Mpanjakan''ny voninahitra. [*Na: Mandrakizay]'
mg1865::mg_19::24::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 24
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza ary izao Mpanjakan''ny voninahitra izao? Jehovah, Tompon''ny maro, Izy no Mpanjakan''ny voninahitra.'
mg1865::mg_19::25::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Fangatahana fiarovana sy fitarihana. Nataon''i Davida.'
  verse_text: 'Aminao, Jehovah o, no anandratako ny fanahiko.'
mg1865::mg_19::25::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro o, Ianao no itokiako, aoka tsy ho menatra aho; aoka tsy hifalian''ny fahavaloko aho.'
mg1865::mg_19::25::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tsy hisy ho menatra izay rehetra miandry Anao; fa izay mivadika foana no ho menatra.'
mg1865::mg_19::25::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahafantaro ny lalanao aho, Jehovah o; ampianaro ny sitrakao aho.'
mg1865::mg_19::25::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tariho amin''ny fahamarinanao aho, ka ampianaro; fa Ianao no Andriamanitry ny famonjena ahy; Ianao no andrasako mandritra ny andro.'
mg1865::mg_19::25::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny antranao sy ny indrafonao, Jehovah o, fa hatrizay hatrizay ireny.'
mg1865::mg_19::25::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza ny fahotan''ny fahatanorako, na ny ratsy nataoko, no tsarovanao; fa aoka ho araka ny famindram-ponao no hahatsiarovanao ahy, noho ny fahasoavanao Jehovah o,'
mg1865::mg_19::25::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara sy mahitsy Jehovah, ka izany no ampianarany ny mpanota ny lalana.'
mg1865::mg_19::25::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitarika ny mpandefitra amin''ny marina Izy, ary mampianatra ny mpandefitra ny lalany.'
mg1865::mg_19::25::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''i Jehovah rehetra dia famindram-po sy fahamarinana amin''izay mitandrina ny fanekeny sy ny teni-vavolombelony.'
mg1865::mg_19::25::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny anaranao, Jehovah o, dia mamelà ny heloko, fa lehibe izany.'
mg1865::mg_19::25::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no lehilahy matahotra an''i Jehovah? Izy no hampianariny izay lalana tokony hofidiny.'
mg1865::mg_19::25::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahiny hitoetra amin''ny soa; ary ny taranany handova ny tany.'
mg1865::mg_19::25::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisainan''i Jehovah asehony amin''izay matahotra Azy, ary ny fanekeny no hampahafantariny azy.'
mg1865::mg_19::25::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoko mijery an''i Jehovah mandrakariva; fa Izy no nanafaka ny tongotro tamin''ny fandrika harato.'
mg1865::mg_19::25::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Todiho aho, ka amindrao fo, fa irery aho ka mahantra.'
mg1865::mg_19::25::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahorian''ny foko efa mihalehibe; afaho amin''ny fahatereko aho.'
mg1865::mg_19::25::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo ny fahoriako sy ny mavesatra amiko, ka mamelà ny fahotako rehetra.'
mg1865::mg_19::25::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo ny fahavaloko, fa maro izy; ary loza ny fankahalàny ahy.'
mg1865::mg_19::25::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arovy ny fanahiko, ka vonjeo aho; aoka tsy ho menatra aho, fa mialoka aminao.'
mg1865::mg_19::25::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny tsy fisian-tsiny sy ny fahitsiana no hiaro ahy; fa miandry Anao aho.'
mg1865::mg_19::25::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 25
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, afaho ny Isiraely, amin''ny fahoriany rehetra.'
mg1865::mg_19::26::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangatahana mba tsy hatao ho naman''ny ratsy fanahy. Nataon''i Davida.'
  verse_text: 'Tsarao aho, Jehovah o, fa mandeha amin''ny fahamarinako aho; ary Jehovah no itokiako, ka tsy miahanahana aho.'
mg1865::mg_19::26::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diniho aho, Jehovah o, ka fantaro; izahao toetra ny voako sy ny foko.'
mg1865::mg_19::26::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny famindram-ponao no eo anoloan''ny masoko; ary mandeha amin''ny fahamarinanao aho.'
mg1865::mg_19::26::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba miara-mipetraka amin''ny olon-dratsy aho, na manan-draharaha amin''ny olom-petsy.'
mg1865::mg_19::26::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halako ny fiangonan''ny mpanao ratsy; ary tsy miara-mipetraka amin''ny ratsy fanahy aho.'
mg1865::mg_19::26::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manasa ny tanako noho ny fahamarinako aho, ka te-hitoetra eo akaikin''ny alitaranao, Jehovah o,'
mg1865::mg_19::26::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hanao feo fiderana, ka hilaza ny asanao mahagaga rehetra.'
mg1865::mg_19::26::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tiako ny trano itoeranao, dia ny fonenan''ny voninahitrao.'
mg1865::mg_19::26::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mitondra ny fanahiko hiara-maty amin''ny mpanota, na ny aiko amin''ny mpandatsa-drà,'
mg1865::mg_19::26::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay misy fitaka eny an-tanany, ary feno kolikoly ny tanany ankavanana.'
mg1865::mg_19::26::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa dia mandeha amin''ny fahamarinako; avoty sy amindrao fo aho.'
mg1865::mg_19::26::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 26
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongotro mijoro eo amin''ny tany marina; eo am-piangonana no isaorako an''i Jehovah.'
mg1865::mg_19::27::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahatokiana an''i Jehovah, Mpiaro sy Mpitahy ny olony. Nataon''i Davida.'
  verse_text: 'Jehovah no fahazavako sy famonjena ahy; iza no hatahorako? Jehovah no fiarovana mafy ho an''ny aiko; iza no hangovitako?'
mg1865::mg_19::27::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manatona ahy hihinana ny nofoko ny ratsy fanahy, izay fahavaloko sy rafilahiko, dia izy ihany no tafintohina ka lavo.'
mg1865::mg_19::27::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia misy antokony mitoby hiady amiko aza, tsy hatahotra ny foko; na dia misy ady mihatra amiko aza, dia hatoky ihany aho.'
mg1865::mg_19::27::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zavatra iray loha no nangatahiko tamin''i Jehovah, izany no hotadiaviko, dia ny hitoetra ao an-tranon''i Jehovah amin''ny andro rehetra hiainako, mba ho faly mijery ny fahasoavan''i Jehovah sy mandinika ny tempoliny.'
mg1865::mg_19::27::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hanafina ahy ao an-trano fialofany amin''ny andro fahoriana Izy; hampiery ahy amin''ny fierena ao an-dainy Izy; hanandratra ahy ho eny ambony vatolampy Izy.'
mg1865::mg_19::27::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia hisandratra ambonin''ny fahavaloko manodidina ahy ny lohako, ka hanatitra fanatitra hihobiana ao an-dainy aho; hihira sy hankalaza an''i Jehovah aho.'
mg1865::mg_19::27::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, Jehovah o, fa mitaraina mafy aho; ary mamindrà fo amiko, ka valio aho.'
mg1865::mg_19::27::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hoy Ianao: tadiavonareo ny tavako, dia hoy ny navalin''ny foko: Eny, ny tavanao no tadiaviko, Jehovah o;'
mg1865::mg_19::27::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manafina ny tavanao amiko, aza mandroaka ny mpanomponao an-katezerana; efa famonjena ahy Ianao; aza manary na mahafoy ahy, ry Andriamanitry ny famonjena ahy.'
mg1865::mg_19::27::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny raiko aman-dreniko efa nahafoy ahy; fa Jehovah kosa no mandray ahy*. [*Na: Fa na dia mahafoy ahy aza ny ray aman-dreniko, dia ho-raisin''i Jehovah aho]'
mg1865::mg_19::27::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampianaro ny lalanao aho, Jehovah o; ary tariho amin''ny lalana marina aho noho ny fahavaloko.'
mg1865::mg_19::27::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manolotra ahy ho amin''ny sitrapon''ny mpampahory ahy; fa vavolombelona mandainga sy izay mifofofofo loza no mitsangana hiampanga ahy.'
mg1865::mg_19::27::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha izay re aho no tsy nanantena hahita ny fahasoavan''i Jehovah amin''ny tanin''ny velona.'
mg1865::mg_19::27::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 27
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miandrasa an''i Jehovah ianao; matokia, ary aoka hahery ny fonao; eny, miandrasa an''i Jehovah.'
mg1865::mg_19::28::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana an''Andriamanitra hanafaka ny olony sy hanameloka ny ratsy fanahy. Nataon''i Davida.'
  verse_text: 'Ianao no antsoiko, Jehovah o, Ry vatolampiko o, aza manentsin-tadiny amiko; fandrao, raha mangina amiko Ianao, dia ho tahaka izay midina any an-davaka aho.'
mg1865::mg_19::28::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa ny feon''ny fifonako, raha mitaraina aminao aho, raha manandratra ny tanako ho amin''ny fitoeranao masina indrindra aho.'
mg1865::mg_19::28::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza atao indray manakipaka amin''ny ratsy fanahy sy ny mpanao meloka aho, fa ireny dia milaza fihavanana amin''ny namany, kanjo ratsy no ao am-pony.'
mg1865::mg_19::28::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manomeza azy araka ny asany sy ny faharatsian''ny ataony; eny, manomeza azy araka ny vitan''ny tanany, valio izy araka izay iendrehany.'
mg1865::mg_19::28::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mihevitra ny asan''i Jehovah, na ny vitan''ny tanany, izy, dia horavan''i Jehovah izy, fa tsy haoriny.'
mg1865::mg_19::28::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah, fa efa nihaino ny feon''ny fifonako Izy.'
mg1865::mg_19::28::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no heriko sy ampingako; izy no nitokian''ny foko, ka voavonjy aho; dia mifaly ny foko, ka ny hirako no hiderako Azy.'
mg1865::mg_19::28::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no heriny, ary Izy no fiarovana mafy hamonjena ny voahosony.'
mg1865::mg_19::28::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 28
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo ny olonao, ary tahio ny lovanao; andraso izy, ka tezao* mandrakizay. [*Hebreo: ento]'
mg1865::mg_19::29::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny heriny sy ny fiandrianany izay miseho amin''ny kotrokorana'
  verse_text: 'Salamo nataon''i Davida. Manomeza an''i Jehovah, ry zanak''Andriamanitra, eny, manomeza voninahitra sy hery ho an''i Jehovah.'
mg1865::mg_19::29::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo an''i Jehovah ny voninahitry ny anarany; miankohofa eo anatrehan''i Jehovah amin''ny fihaingoana masina.'
mg1865::mg_19::29::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''i Jehovah no eny ambonin''ny rano be; Andriamanitry ny voninahitra no mampikotrokorana; Jehovah no eny ambonin''ny rano be.'
mg1865::mg_19::29::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''i Jehovah be hery; Ny feon''i Jehovah be voninahitra.'
mg1865::mg_19::29::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''i Jehovah manorotoro ny hazo sedera; eny, Jehovah manorotoro ny hazo sedera any Libanona.'
mg1865::mg_19::29::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mampitsambikina azy tahaka ny zanak''omby Izy, Libanona sy Siriona dia tahaka ny zanaky ny ombimanga.'
mg1865::mg_19::29::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''i Jehovah mampisaraka ny lelafo;'
mg1865::mg_19::29::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''i Jehovah mampihorohoro ny efitra; Jehovah mampihorohoro ny efitr''i Kadesy.'
mg1865::mg_19::29::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny feon''i Jehovah mampiteraka ny dieravavy, ary mivofy ny ala be; ary ny ao an-tempoliny samy manao hoe: Voninahitra e!'
mg1865::mg_19::29::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah nipetraka teo ambonin''ny safo-drano; eny, Jehovah mipetraka ho Mpanjaka mandrakizay.'
mg1865::mg_19::29::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 29
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hanome hery ny olony; Jehovah hitahy ny olony amin''ny fiadanana.'
mg1865::mg_19::30::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana nataon''izay narary mafy noho ny namonjen''Andriamanitra ny ainy'
  verse_text: 'Salamo. Fihirana tamin''ny nitokanana ny trano. Nataon''i Davida. Hanandratra Anao aho, Jehovah o; fa nanintona ahy niakatra Ianao, ka tsy nataonao ho fifalian''ny fahavaloko aho.'
mg1865::mg_19::30::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitro o, nitaraina taminao aho, dia nahasitrana ahy Ianao.'
mg1865::mg_19::30::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, efa nampakatra ny fanahiko avy tany amin''ny fiainan-tsy hita* Ianao; efa nampody ny aiko Ianao, mba tsy ho isan''izay midina any an-davaka aho. [*Hebreo: Sheola]'
mg1865::mg_19::30::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah, ry olony masina, ka miderà ny anarany* masina. [*Hebreo: fahatsiarovana]'
mg1865::mg_19::30::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa indray mipi-maso ihany ny fahatezerany; nefa mandritra ny andro iainana kosa ny fankasitrahany; amin''ny hariva dia misy fitomaniana tonga hivahiny miloaka alina; Fa nony maraina kosa dia misy fihobiana.'
mg1865::mg_19::30::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho, raha mbola niadana*: tsy hangozohozo mandrakizay aho. [*Hebreo: Na: noho ny fiadanako]'
mg1865::mg_19::30::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro; nanafina ny tavanao Ianao, dia ory aho.'
mg1865::mg_19::30::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no nantsoiko, Jehovah o; ary Jehovah no nifonako hoe:'
mg1865::mg_19::30::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no soa azo amin''ny rako sy ny hidinako any an-davaka? Hidera Anao va ny vovoka? Hanambara ny fahamarinanao va izany?'
mg1865::mg_19::30::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, Jehovah o, ka mamindrà fo amiko; Jehovah o, aoka ho Mpamonjy ahy Ianao.'
mg1865::mg_19::30::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampody ny fisaonako ho fandihizana Ianao; efa nanaisotra ny lamba fisaonako Ianao ka nampisikina ahy fifaliana,'
mg1865::mg_19::30::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 30
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hankalazan''ny fanahiko* Anao ka tsy hangina. Jehovah Andriamanitro o, hidera Anao mandrakizay aho. [*Hebreo: voninahitro]'
mg1865::mg_19::31::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana nataon''izay tra-panenjehana mafy. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Jehovah o, Ianao no ialofako; aoka tsy ho menatra akory mandrakizay aho; vonjeo amin''ny fahamarinanao aho.'
mg1865::mg_19::31::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atongilano amiko ny sofinao, faingàna hamonjy ahy; aoka ho vatolampiko fiarovana mafy Ianao sy batery fiarovana hamonjena ahy.'
mg1865::mg_19::31::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa harambatoko sy batery fiarovana ho ahy Ianao; ary noho ny anaranao no hitondrànao sy hitarihanao ahy.'
mg1865::mg_19::31::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanafaka ahy amin''ny fandrika harato izay nafeniny hamandrihany ahy Ianao; fa Ianao no fiarovana mafy ho ahy.'
mg1865::mg_19::31::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo an-tananao no atolotro ny fanahiko; fa efa nanavotra ahy Ianao, Jehovah o, Andriamanitry ny fahamarinana.'
mg1865::mg_19::31::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halako izay mivavaka amin''ny sampy*; fa Jehovah kosa no itokiako. [*Hebreo: zava-poana mandainga]'
mg1865::mg_19::31::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifaly sy ho ravoravo amin''ny famindram-ponao aho; fa nahita ny fahantrako Ianao, ka nahafantatra ny fahorian''ny fanahiko,'
mg1865::mg_19::31::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy mba nangeja ahy teo an-tanan''ny fahavalo; fa efa nampitoetra ny tongotro eo amin''ny malalaka Ianao.'
mg1865::mg_19::31::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindrà fo amiko, Jehovah o, fa azom-pahoriana aho; simban''alahelo ny masoko sy ny fanahiko ary ny tenako.'
mg1865::mg_19::31::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lanin''alahelo ny aiko, sady lanim-pisentoana ny taonako; Tsy manan-kery aho noho ny heloko, ary efa lany ny taolako.'
mg1865::mg_19::31::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny ataon''ny fahavaloko rehetra dia efa tonga fandatsa aho, eny, na dia amin''ny namako aza, sady atahoran''ny olom-pantatro aho; izay mahita ahy eny ivelany mandositra ahy.'
mg1865::mg_19::31::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hadino tahaka ny olona maty izay tsy tsaroana intsony aho; tahaka ny vilany ariana aho.'
mg1865::mg_19::31::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandre ny endrikendriky ny maro aho; misy fampangorohoroana manodidina, raha miara-mioko hamely ahy izy, ka miray tetika hahafaty ny aiko.'
mg1865::mg_19::31::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izaho matoky Anao, Jehovah o; hoy izaho: Andriamanitro Ianao.'
mg1865::mg_19::31::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo an-tananao ny androko; Vonjeo aho tsy ho azon''ny tanan''ny fahavaloko sy izay manenjika ahy.'
mg1865::mg_19::31::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampamirapirato amin''ny mpanomponao ny tavanao; vonjeo amin''ny famindram-ponao aho.'
mg1865::mg_19::31::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy ho menatra aho, Jehovah o, satria miantso Anao; fa aoka kosa ho menatra ny ratsy fanahy ka hangina any amin''ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_19::31::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hangina ny molotra mandainga, izay miteny sahisahy hanohitra ny marina, amin''ny avonavona sy ny fanamavoana.'
mg1865::mg_19::31::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akory re ny haben''ny zava-tsoanao voarakitrao ho an''ny matahotra Anao! dia izay nataonao teo anatrehan''ny zanak''olombelona ho an''izay mialoka aminao!'
mg1865::mg_19::31::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanafina azy ao amin''ny fiafenana eo anatrehanao Ianao, mba tsy ho tratry ny teti-dratsy ataon''ny olona izy; hampiery azy ao an-tranonao Ianao, mba tsy ho azon''ny lela mifanditra izy.'
mg1865::mg_19::31::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah; fa nataony mahagaga ny famindram-pony tamiko tao an-tanàna mimanda.'
mg1865::mg_19::31::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho tamin''ny fahatairako; voafongotra tsy ho eo imasonao aho; kanjo nihaino ny feon''ny fifonako ihany Ianao, raha nitaraina taminao aho.'
mg1865::mg_19::31::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tiava an''i Jehovah, ry olony masina rehetra; miaro ny marina Jehovah, ary mamaly dia mamaly ny mpiavonavona Izy.'
mg1865::mg_19::31::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 31
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahereza, ary aoka hatanjaka ny fonareo, dia ianareo rehetra izay manantena an''i Jehovah.'
mg1865::mg_19::32::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny famelan-keloka. Nataon''i Davida.'
  verse_text: 'Maskila. Sambatra ny olona izay voavela ny helony sy voasarona ny fahotany.'
mg1865::mg_19::32::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny olona izay tsy isain''i Jehovah heloka, ary tsy misy fitaka ny fanahiny.'
mg1865::mg_19::32::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nangina aho, dia nihalany ny taolako rehetra, noho ny fitarainako mandrakariva,'
mg1865::mg_19::32::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa navesatra tamiko andro aman''alina ny tananao; niova ny fahatanjahako toy ny azon''ny fahamainana amin''ny lohataona.'
mg1865::mg_19::32::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahotako nambarako taminao, ary ny heloko tsy mba nafeniko. Hoy izaho: hiaiky ny fahadisoako amin''i Jehovah aho; ary Ianao dia namela ny heloky ny fahotako.'
mg1865::mg_19::32::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no aoka hivavahan''ny tsara tsara fanahy rehetra aminao amin''izay andro hahitana Anao; eny tokoa, na dia tondraka aza ny rano be, tsy hahatratra azy izany.'
mg1865::mg_19::32::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no fiereko, miaro ahy tsy ho azon''ny fahoriana Ianao; fihobiam-pamonjena no ahodidinao ahy.'
mg1865::mg_19::32::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanome saina anao sy hampianatra anao izay lalan-kalehanao Aho; hitsinjo anao ny masoko ka hanolo-tsaina anao Aho.'
mg1865::mg_19::32::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina; vy sy lamboridy no haingo hihazonana azy, fa tsy mety manakaiky anao izy.'
mg1865::mg_19::32::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be ny fanaintainan''ny ratsy fanahy, fa izay matoky an''i Jehovah kosa dia ho hodidinin''ny famindram-po.'
mg1865::mg_19::32::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 32
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia amin''i Jehovah, ary ravoravoa, ianareo olo-marina, ary mihobia, ianareo mahitsy fo rehetra.'
mg1865::mg_19::33::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra Mpitondra izao rehetra izao sy Mpiaro ny olona'
  verse_text: 'Mihobia ho an''i Jehovah ianareo, ry olo-marina; fa mendrika hataon''ny olo-mahitsy ny fiderana.'
mg1865::mg_19::33::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà an''i Jehovah amin''ny lokanga; mankalazà Azy amin''ny valiha tory folo.'
mg1865::mg_19::33::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihirà fihiram-baovao ho Azy; mitendre tsara amin''ny feo fifaliana.'
mg1865::mg_19::33::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahitsy ny tenin''i Jehovah, ary ny asany rehetra dia mahatoky avokoa.'
mg1865::mg_19::33::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tia fahamarinana sy rariny Izy; henika ny famindram-pon''i Jehovah ny tany.'
mg1865::mg_19::33::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah no nanaovana ny lanitra; ary ny fofonain''ny vavany no nanaovana ny hamaroany rehetra.'
mg1865::mg_19::33::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra Izy; mitahiry ny rano lalina ao an-trano fitehirizana Izy.'
mg1865::mg_19::33::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hatahotra an''i Jehovah ny tany rehetra; aoka hangovitra eo anatrehany ny mponina rehetra amin''izao tontolo izao.'
mg1865::mg_19::33::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no niteny dia ary izany; Izy no nandidy, dia nitoetra mafy izany.'
mg1865::mg_19::33::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mahafoana ny fisainan''ny firenen-tsamy hafa; Mahatsinontsinona ny hevitry ny olona Izy.'
mg1865::mg_19::33::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fisainan''i Jehovah maharitra mandrakizay, ny hevitry ny fony mahatratra ny taranaka fara mandimby.'
mg1865::mg_19::33::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny firenena izay manana an''i Jehovah ho Andriamaniny, dia ny olona nofidiny ho lovany.'
mg1865::mg_19::33::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-danitra no itsinjovan''i Jehovah, mijery ny zanak''olombelona rehetra Izy;'
mg1865::mg_19::33::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo amin''ny fonenany no ijereny ny mponina rehetra ambonin''ny tany,'
mg1865::mg_19::33::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Izy Mpamorona ny fon''izy rehetra sy Mpamantatra ny asany rehetra.'
mg1865::mg_19::33::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mpanjaka voavonjin''ny hamaroan''ny miaramilany; ny olo-mahery tsy voavonjin''ny haben''ny heriny.'
mg1865::mg_19::33::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny soavaly tsy azo itokiana ho famonjena, ary tsy mahavonjy ny haben''ny heriny.'
mg1865::mg_19::33::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny mason''i Jehovah mitsinjo izay matahotra Azy, dia izay manantena ny famindram-pony,'
mg1865::mg_19::33::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanafaka ny fanahiny amin''ny fahafatesana, sy hamelona azy, raha misy mosary.'
mg1865::mg_19::33::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahintsika miandry an''i Jehovah; famonjena antsika sy ampingantsika Izy.'
mg1865::mg_19::33::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no ifalian''ny fontsika, satria ny anarany masina no itokiantsika.'
mg1865::mg_19::33::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 33
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, aoka ny famindram-ponao hitoetra aminay araka ny anantenanay Anao.'
mg1865::mg_19::34::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 1
  verse_date_revised: '2022-08-18T08:33:06+0000'
  verse_title: 'Salamo abidy. Fisaorana sy anatra nataon''izay efa novonjena tamin''ny fahoriana nanjo azy.'
  verse_text: 'Nataon''i Davida tamin''izy nody adala teo anatrehan''i Abimeleka, dia noroahiny ka lasa nandeha. Hisaotra an''i Jehovah lalandava aho; ho eo am-bavako mandrakariva ny fiderana Azy.'
mg1865::mg_19::34::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no reharehan''ny fanahiko; hahare izany ny mpandefitra ka ho faly.'
mg1865::mg_19::34::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaraha mankalaza an''i Jehovah amiko; ary aoka hiara-manandratra ny anarany isika.'
mg1865::mg_19::34::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitady an''i Jehovah aho, dia mamaly ahy Izy ka manafaka ahy amin''ny tahotro rehetra.'
mg1865::mg_19::34::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mijery Azy ireo ka miramirana, sady tsy mangaihay ny tavany.'
mg1865::mg_19::34::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity olo-mahantra ity niantso, dia nihaino Jehovah ka namonjy azy tamin''ny fahoriany rehetra.'
mg1865::mg_19::34::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Anjelin''i Jehovah mitoby manodidina izay matahotra Azy ka mamonjy azy.'
mg1865::mg_19::34::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andramo ka izahao fa tsara Jehovah; sambatra izay olona mialoka aminy.'
mg1865::mg_19::34::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matahora an''i Jehovah, ianareo olony masina;fa tsy hanan-java-mahory izay matahotra Azy.'
mg1865::mg_19::34::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny liona tanora aza tsy ampy hanina ka noana. Fa izay mitady an''i Jehovah kosa dia tsy ho orin-java-tsoa akory.'
mg1865::mg_19::34::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, anaka, mihainoa ahy; ny fahatahorana an''i Jehovah no hampianariko anareo.'
mg1865::mg_19::34::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na iza na iza ianao no maniry fiainana ka tia andro maro hahitana ny soa,'
mg1865::mg_19::34::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia arovy ny lelanao amin''ny ratsy ary ny molotrao mba tsy hiteny fitaka.'
mg1865::mg_19::34::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halaviro ny ratsy, manaova soa; mitadiava fihavanana, ka araho izany.'
mg1865::mg_19::34::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mason''i Jehovah dia mitsinjo ny marina, ary ny sofiny mihaino ny fitarainany.'
mg1865::mg_19::34::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tavan''i Jehovah tezitra amin''ny mpanao ratsy kosa, mba hofongorany tsy ho eo amin''ny tany ny fahatsiarovana azy.'
mg1865::mg_19::34::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitaraina ny marina, ary mihaino azy Jehovah ka mamonjy azy amin''ny fahoriany rehetra.'
mg1865::mg_19::34::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akaikin''izay manana fo mangorakoraka Jehovah, ary mamonjy izay torororo fanahy.'
mg1865::mg_19::34::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro ny fahorian''ny marina; nefa Jehovah manafaka azy amin''izany rehetra izany.'
mg1865::mg_19::34::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaro ny taolany rehetra izy; tsy hisy ho tapaka ireny na dia iray akory aza.'
mg1865::mg_19::34::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahafaty ny ratsy fanahy ny fahoriana; ary ny mankahala ny olo-marina hohelohina.'
mg1865::mg_19::34::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 34
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah manavotra ny fanahin''ny mpanompony, ka tsy mba hisy hohelohina izay rehetra mialoka aminy.'
mg1865::mg_19::35::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana an''Andriamanitra hamaly ny ratsy ataon''ny mpanenjika. Nataon''i Davida.'
  verse_text: 'Jehovah o, mamalia izay manana ady amiko; miadia amin''izay mamely ahy.'
mg1865::mg_19::35::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raiso ny ampinga kely sy ny ampinga lehibe ka mitsangàna hamonjy ahy.'
mg1865::mg_19::35::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raiso ny lefona, ka sakano izay manenjika ahy; lazao amin''ny fanahiko hoe: Famonjena anao Aho.'
mg1865::mg_19::35::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra sy ho afa-baraka izay mitady ny aiko; aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy.'
mg1865::mg_19::35::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tahaka ny akofa eo alohan''ny rivotra izy. Ary aoka ny Anjelin''i Jehovah handroaka azy.'
mg1865::mg_19::35::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho maizina sy malama ny lalany, ary aoka ny Anjelin''i Jehovah hanenjika azy.'
mg1865::mg_19::35::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ahoan-tsy ahoana no nanaovany fandri-totofana hahazoany ahy; tsy ahoan-tsy ahoana no nandavahany hamandrihany ny aiko.'
mg1865::mg_19::35::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny fandringanana ho tonga tampoka aminy; ary aoka hahazo azy ny fandrika harato nafeniny, ka ho latsaka ao amin''izany fandringanana izany indrindra izy.'
mg1865::mg_19::35::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanahiko kosa hifaly amin''i Jehovah sy ho ravoravo amin''ny famonjeny.'
mg1865::mg_19::35::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taolako rehetra hanao hoe: Jehovah o, iza no tahaka Anao, Izay manafaka ny ory amin''izay tsy tohany, eny, ny ory sy ny malahelo amin''izay mamabo azy?'
mg1865::mg_19::35::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangana ny vavolombelona mampidi-doza; ka izay tsy fantatro no anadinany ahy.'
mg1865::mg_19::35::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamaly ratsy ahy ho solon''ny soa izy, ka mamoy malala ny fanahiko.'
mg1865::mg_19::35::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amiko, raha narary izy ireo, dia lamba fisaonana no nitafiako; nampahory ny tenako tamin''ny ny fifadian-kanina aho; ary ny fivavako nody tao an-tratrako.'
mg1865::mg_19::35::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nisy nanjo ny sakaizako na ny rahalahiko no nandehanako; nitanondrika tamin''alahelo toy ny fisaona reny aho.'
mg1865::mg_19::35::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 15
  verse_date_revised: '2022-12-11T07:12:00+0000'
  verse_title: null
  verse_text: 'Nefa nony ho lavo kosa aho, dia faly izy ireo ka niangona; olona faraidina no nitangorona hamely ahy, nefa tsy fantatro*; namiravira izy ka tsy mba nitsahatra; [*Na: Olona faraidina, izay fantatro, no nitangorona hamely ahy]'
mg1865::mg_19::35::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naman''ny olon-dratsy manendrikendrika ho enti-mila sitraka* izy ka nihidy vazana tamiko. [*Hebreo: hahazoa-mofo; na;tena mpanendrikendrika indrindra]'
mg1865::mg_19::35::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Tompo o, mandra-pahoviana no hijerenao ? Avereno ny fanahiko ho afaka amin''ny fandringanany, ny hany malalako ho afaka amin''ny liona tanora.'
mg1865::mg_19::35::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisaotra Anao eo amin''ny fiangonana lehibe aho; hidera Anao eo afovoan''ny olona maro aho.'
mg1865::mg_19::35::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hifalian''izay mandrafy ahy foana aho; ary aoka tsy hami-maso izay mankahala ahy tsy ahoan-tsy ahoana.'
mg1865::mg_19::35::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy fihavanana no lazainy; fa mamorom-pitaka izy hamelezany izay mibonaika ambonin''ny tany.'
mg1865::mg_19::35::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 21
  verse_date_revised: '2022-12-30T06:28:22+0000'
  verse_title: null
  verse_text: 'Dia mitanatana vava amiko izy ka manao hoe: Hià! sakoa izay! efa hitan''ny masonay.'
mg1865::mg_19::35::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitanao, Jehovah o, ka aza manentsin-tadiny; ry Tompo o, aza manalavitra ahy.'
mg1865::mg_19::35::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiarova, ka mifohaza ho amin''ny fitsaràna ahy, O Andriamanitro sy Tompoko! mifohaza ho amin''ny adiko.'
mg1865::mg_19::35::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarao aho, Jehovah Andriamanitro o, araka ny fahamarinanao; ary aoka tsy hifalian''ireo aho.'
mg1865::mg_19::35::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hanao anakampo hoe izy: Hià! faly izahay! aoka tsy hanao hoe izy: efa natelinay izy.'
mg1865::mg_19::35::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra sy hangaihay avokoa izay mifaly amin''ny manjo ahy; aoka hitafy henatra sy fahafaham-baraka izay mirehareha amiko.'
mg1865::mg_19::35::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hihoby sy hifaly izay mankasitraka ny fahamarinako; ary aoka izy hanao mandrakariva hoe: hankalazaina anie Jehovah, Izay mankasitraka ny fiadanan''ny mpanompony.'
mg1865::mg_19::35::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 35
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lelako hilaza ny fahamarinanao; ny fiderana Anao no hataoko mandrakariva.'
mg1865::mg_19::36::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny maharatsy ny miala amin''Andriamanitra, ary ny mahatsara ny mihavana aminy. Ho an''ny mpiventy hira. Nataon''i Davida.'
  verse_text: ', mpanompon''i Jehovah. Ny ota milaza ato am-poko ny amin''ny ratsy fanahy hoe*: tsy misy fahatahorana an''Andriamanitra ao aminy. [*Na: Misy filazana ny ao am-pon''ny ratsy fanahy manao hoe:]'
mg1865::mg_19::36::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miarahaba tena izy ny amin''ny tsy hahitana ny helony ka hankahalana azy.'
mg1865::mg_19::36::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''ny vavany dia faharatsiana sy fitaka; efa nihadala izy ka nitsahatra tsy hanao soa.'
mg1865::mg_19::36::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faharatsiana no saintsaininy eo am-pandriany; mitsangana eo amin''ny lalana tsy mety izy; ny ratsy tsy mba laviny akory.'
mg1865::mg_19::36::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, mipaka amin''ny lanitra ny famindram-ponao; mihatra amin''ny rahona ny fahamarinanao.'
mg1865::mg_19::36::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo*; ny fitsaranao dia toy ny lalina indrindra; ny olona sy ny biby dia samy vonjenao, Jehovah o, [*Hebreo: tendrombohitr''Andriamanitra]'
mg1865::mg_19::36::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny hatsaran''ny famindram-ponao, Andriamanitra o! ka mialoka eo amin''ny aloky ny elatrao ny zanak''olombelona.'
mg1865::mg_19::36::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voky ny matavy ao an-tranonao izy; ary ny ony fampifalianao no ampisotroanao azy.'
mg1865::mg_19::36::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao aminao no misy loharanon''aina; ny fahazavanao no hahitanay fahazavana.'
mg1865::mg_19::36::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahareto amin''izay mahalala Anao ny famindram-ponao, ary ny fahamarinanao amin''ny mahitsy fo.'
mg1865::mg_19::36::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona, na hampandositra ahy ny tanan''ny ratsy fanahy.'
mg1865::mg_19::36::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 36
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo! efa lavo ny mpanao ratsy; naripaka izy ka tsy maharina.'
mg1865::mg_19::37::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Ny tsy faharetan''ny fanambinana ny ratsy fanahy, ary ny fahatezan''ny fitahiana azon''ny tsara fanahy. Nataon''i Davida.'
  verse_text: 'Aoka tsy hirehitra ny fahatezeranao noho ny amin''ny mpanao ratsy; Ary aza mialona ny mpanao meloka;'
mg1865::mg_19::37::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hojinjana faingana tahaka ny ahitra izy ka halazo tahaka ny ahi-maitso.'
mg1865::mg_19::37::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matokia an''i Jehovah ianao, ka manaova soa, dia honina amin''ny tany ianao ka ho faly amin''ny fahamarinana.'
mg1865::mg_19::37::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miravoravoa amin''i Jehovah ianao, dia homeny anao izay irin''ny fonao.'
mg1865::mg_19::37::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ankino amin''i Jehovah ny lalanao, ary matokia Azy, fa hataony tanteraka.'
mg1865::mg_19::37::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampiseho ny fahamarinanao tahaka ny mazava Izy, ary ny rariny ho anao tahaka ny mitataovovonana.'
mg1865::mg_19::37::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantombena tsara miandry an''i Jehovah ianao ka manantenà Azy; Aza tezitra amin''izay ambinina amin''ny lalany dia amin''izay olona manao sain-dratsy.'
mg1865::mg_19::37::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsahara amin''ny fahatezerana, ary mahafoiza ny fahavinirana; aoka tsy hirehitra ny fahatezeranao; fa ratsy no hiafaran''izany.'
mg1865::mg_19::37::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanao ratsy hofongoro-na; Ary izay miandry an''i Jehovah no handova ny tany.'
mg1865::mg_19::37::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa afaka kelikely, dia tsy hisy ny ratsy fanahy; Handinika ny fonenany ianao, fa tsy ho hita izy.'
mg1865::mg_19::37::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpandefitra kosa no handova ny tany ka hiravoravo amin''ny haben''ny fiadanana.'
mg1865::mg_19::37::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 12
  verse_date_revised: '2022-07-25T10:00:30+0000'
  verse_title: null
  verse_text: 'Ny ratsy fanahy manao hevi-dratsy hamelezana ny marina ka mihidy vazana aminy.'
mg1865::mg_19::37::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tompo mihomehy azy, satria hitany fa ho tonga ny androny.'
mg1865::mg_19::37::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy nampitsoaka ny sabany ka nanenjana ny tsipïkany mba hampikarapoka ny ory sy ny malahelo, ary hamono ny mahitsy lalana.'
mg1865::mg_19::37::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sabany hitsatoka amin''ny fony ihany, ary ny tsipïkany ho tapatapaka.'
mg1865::mg_19::37::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara lavitra ny kely ananan''ny olo-marina anankiray Noho ny be ananan''ny ratsy fanahy maro.'
mg1865::mg_19::37::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sandrin''ny ratsy fanahy ho tapatapaka; Fa Jehovah manohana ny marina.'
mg1865::mg_19::37::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatr''i Jehovah ny andron''ny mahitsy; Ary ny lovany ho mandrakizay.'
mg1865::mg_19::37::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba ho menatra amin''ny andro fahoriana ireny; ary amin''ny taona mosarena dia ho voky izy.'
mg1865::mg_19::37::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny ratsy fanahy haringana, ary ny fahavalon''i Jehovah ho tahaka ny voninahitry ny saha; Ho levona izy, eny, ho levon-ko setroka izy.'
mg1865::mg_19::37::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misambotra ny ratsy fanahy, nefa tsy manohitra*; Fa ny marina kosa mamindra fo ka manome. [*Na: tsy mahonitra]'
mg1865::mg_19::37::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay tahiny no handova ny tany; Ary izay ozoniny kosa no hofongorana.'
mg1865::mg_19::37::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy amin''i Jehovah no mahalavorary ny dian''ny olona, ka Izy no mankasitraka ny lalany.'
mg1865::mg_19::37::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia lavo aza izy, tsy dia mikarapoka, fa Jehovah no mitantana azy.'
mg1865::mg_19::37::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa mba tanora ihany aho, ary efa antitra ankehitriny; Fa tsy mbola hitako izay marina nafoy, na ny zanany mangataka hanina.'
mg1865::mg_19::37::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantra mandrakariva ireny ka mampisambotra; ary ny taranany hotahina.'
mg1865::mg_19::37::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halaviro ny ratsy, ka manaova soa. Dia honina mandrakizay ianao.'
mg1865::mg_19::37::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah tia rariny sady tsy hahafoy ny olony masina; Harovana mandrakizay ireo; Fa taranaky ny ratsy fanahy hofongorana,'
mg1865::mg_19::37::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina handova ny tany Ka honina ao aminy mandrakizay'
mg1865::mg_19::37::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavan''ny marina miresaka fahendrena, Ary ny lelany manambara ny rariny.'
mg1865::mg_19::37::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalàn''Andriamaniny no ao am-pony; Tsy mba ho solafaka ny diany.'
mg1865::mg_19::37::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsikilo ny marina ny ratsy fanahy ka mitady hahafaty azy.'
mg1865::mg_19::37::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah tsy hahafoy azy eo an-tanany. Na hanameloka azy, raha tsaraina izy.'
mg1865::mg_19::37::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miandrasa an''i Jehovah, ka tandremo ny lalàny, dia hanandratra anao handova ny tany Izy; Ho faly hahita ny hamongorana ny ratsy fanahy ianao.'
mg1865::mg_19::37::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitako ny ratsy fanahy, fa loza loatra izy, ary nandrahaka tahaka ny hazo maitso maniry ho azy;'
mg1865::mg_19::37::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo nandalo izy ka, indro, tsy teo intsony; Ary nitady azy ka, tsy hita izy.'
mg1865::mg_19::37::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diniho ny mahitsy, ka jereo ny marina; Fa misy farany* ho an''ny olona tia fihavanana*. [*Na: taranaka] [**Na: Fa fiadanana no faran''izany olona izany]'
mg1865::mg_19::37::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanota haringana avokoa; Ny hihafaran''ny ratsy fanahy ho fongotra.'
mg1865::mg_19::37::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny famonjena ny marina dia avy amin''i Jehovah; Fiarovana mafy ho azy amin''ny andro fahoriana Izy.'
mg1865::mg_19::37::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 37
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah mamonjy azy sy manafaka azy; eny, manafaka azy amin''ny ratsy fanahy Izy ka mamonjy azy, satria nialoka taminy izy.'
mg1865::mg_19::38::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fivavak''izay ory dia ory indrindra'
  verse_text: 'Salamo nataon''i Davida. Ho fampahatsiarovana. Jehovah o, aza ny fahatezeranao no ananaranao ahy; ary aza ny fahaviniranao no amaizanao ahy.'
mg1865::mg_19::38::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mitsatoka amiko ny zana-tsipïkanao, ary manindry ahy mafy ny tananao,'
mg1865::mg_19::38::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy fahasalamana ny nofoko noho ny fahatezeranao; tsy misy tsy marary ny taolako noho ny fahotako.'
mg1865::mg_19::38::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny heloko efa mihoatra ny lohako; tahaka ny entana mavesatra izy ka tsy zakako.'
mg1865::mg_19::38::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maimbo sady mihady ny feriko noho ny hadalako.'
mg1865::mg_19::38::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitanondrika sy mijoretra indrindra aho, ary misaona mandrakariva.'
mg1865::mg_19::38::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny vaniako henika ny aretina mahamay, ka tsy misy fahasalamana ny nofoko.'
mg1865::mg_19::38::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marikoditra aho sady torovana indrindra; midradradradra aho noho ny fitolokon''ny foko.'
mg1865::mg_19::38::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Tompo o, eo anatrehanao ny faniriako rehetra;ary ny fisentoako tsy mba miafina aminao.'
mg1865::mg_19::38::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miemponempona ny foko, lany ny heriko, ary ny fahiratan''ny masoko aza efa nandao ahy.'
mg1865::mg_19::38::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olo-malalako sy ny sakaizako aza efa manalavitra ny fahoriako; Ary ny havako mijanona eny lavitra eny.'
mg1865::mg_19::38::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamela-pandrika izay mitady ny aiko; ary izay mitady hanimba ahy miteny fanimbana, sy misaim-pitaka mandrakariva.'
mg1865::mg_19::38::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho dia tahaka ny marenina ka tsy mandre, ary tahaka ny moana ka tsy mahaloa-bava;'
mg1865::mg_19::38::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, dia tahaka ny olona tsy mandre, sady tsy misy teny havaly eo am-bavany.'
mg1865::mg_19::38::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao no antenaiko Jehovah o; ianao no hamaly, ry Tompo Andriamanitra o.'
mg1865::mg_19::38::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho: sao dia hifalian''izy ireo anie aho;ary raha mibolisatra ny tongotro, dia hirehareha amiko izy.'
mg1865::mg_19::38::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa ho lavo aho, ary ny fanaintainako dia tsaroako mandrakariva.'
mg1865::mg_19::38::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny heloko no hambarako; matahotra* aho noho ny fahotako. [*Na: Malahelo]'
mg1865::mg_19::38::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahavaloko velona ihany sady mahery; ary maro no mandrafy ahy tsy ahoan-tsy ahoana;'
mg1865::mg_19::38::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mamaly ratsy ny soa izy ireo ka mandrafy ahy ho valin''ny fanarahako ny tsara.'
mg1865::mg_19::38::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mahafoy ahy, Jehovah o; Ry Andriamanitro o, aza manalavitra ahy.'
mg1865::mg_19::38::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 38
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faingàna hamonjy ahy, ry Tompo, Mpamonjy ahy o.'
mg1865::mg_19::39::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatsinontsinon''izao fiainana izao. Ho an''ny mpiventy hira Ho an''i Jedotona. Salamo nataon''i Davida.'
  verse_text: 'Hoy izaho: hitandrina ny lalako aho ka tsy hanota amin''ny lelako; hasiako fehim-bava ny vavako, raha mbola eo anatrehako ny ratsy fanahy.'
mg1865::mg_19::39::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nangina mihitsy aho, namihim-bava ka tsy nilaza na dia ny tsara aza*, dia nihetsika mafy ny fanaintainan''ny aretiko. [*Na: na dia teo anatrehan''ny tsara fanahy aza]'
mg1865::mg_19::39::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nafana ny foko tato anatiko; raha nieritreritra aho, dia nisy afo nirehitra, ka niteny tamin''ny lelako aho.'
mg1865::mg_19::39::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, ampahafantaro ny farako aho sy izay ohatry ny androko; aoka ho fantatro fa olon-kandalo aho.'
mg1865::mg_19::39::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro efa nataonao vodivoam-pelatanana ny androko, ary ny fiainako toy ny tsinontsinona eo anatrehanao. Zava-poana ihany tokoa ny olon-drehetra, na dia matanjaka aza*. [*Na: Natao ho zava-poana ihany tokoa ny olona rehetra]'
mg1865::mg_19::39::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aloka tokoa no fandehandehan''ny olona; zava-poana tokoa no itabatabàny; mihary harena izy nefa tsy fantany izay ho tompon''izany.'
mg1865::mg_19::39::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, inona no andrasako Tompo o? Ianao no antenaiko.'
mg1865::mg_19::39::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manafaha ahy amin''ny fahadisoako rehetra; aza manao ahy ho fanakoran''ny adala.'
mg1865::mg_19::39::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangina aho ka tsy miloa-bava fa ianao no nanao izao.'
mg1865::mg_19::39::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hitsahatra ny fikapohanao ahy; reraka aho azon''ny famelin''ny tananao.'
mg1865::mg_19::39::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anatra noho ny fahadisoany no ananaranao ny olona, ka manimba ny hatsaran-tarehiny tahaka ny kalalao ianao; zava-poana tokoa ny olona rehetra.'
mg1865::mg_19::39::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandrenesa ny fivavako Jehovah o, ary mihainoa ny fitarainako; aza mangina amin''ny ranomasoko fa vahiny aminao aho sy mpivahiny tahaka ny razako rehetra.'
mg1865::mg_19::39::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 39
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza atrehinao aho aloha, dia ho miramirana indray, dieny aho tsy mbola lasa ka tsy ho eto intsony.'
mg1865::mg_19::40::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana noho ny famonjena efa azo sy fanolorana ny tena hankatò ny tenin''Andriamanitra, ary fangatahana ho amin''ny andro sisa. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Niandry dia niandry an''i Jehovah aho; ary nitodika nitsinjo ahy Izy ka nandre ny fitarainako.'
mg1865::mg_19::40::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampakatra ahy avy tao amin''ny lavaka fandringanana Izy, eny, tamin''ny fotaka mandrevo; ary nampitoetra ny tongotro teo ambony vatolampy Izy ka nampijoro ahy.'
mg1865::mg_19::40::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanisy fihiram-baovao teo am-bavako Izy, dia fideràna an''Andriamanitsika; maro no hahita sy hatahotra ary hatoky an''i Jehovah.'
mg1865::mg_19::40::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona manao an''i Jehovah ho tokiny, ka tsy mivily ho naman''ny mpiavonavona na ny mpivadika ho amin''ny lainga.'
mg1865::mg_19::40::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nohamaroinao ny fahagaganao sy ny hevitrao izay nataonao ho anay, Jehovah Andriamanitra o. Tsy misy azo ampitahaina aminao Raha tiako hambara sy holazaina ireny, dia, indro, maro loatra izy ka tsy tambo isaina.'
mg1865::mg_19::40::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitra alatsa-drà sy ny fanatitra hohanina tsy mba sitrakao ny sofiko nataonao malady* ny fanatitra dorana sy ny fanatitra noho ny ota tsy mba nilainao; [*Hebreo: Ny sofiko no nohadinao]'
mg1865::mg_19::40::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy izaho:inty aho tonga ao amin''ny horonam-boky no nanoratana ahy.'
mg1865::mg_19::40::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny hanao ny sitraponao, Andriamanitra o, no sitrako; ary ny lalanao no ato anatiko.'
mg1865::mg_19::40::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nilaza teny mahafaly ny amin''ny fahamarinana teo amin''ny fiangonana lehibe aho; indro ny molotro tsy mba nakomboko; Jehovah o, Ianao no mahalala.'
mg1865::mg_19::40::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinanao tsy mba nafeniko tato am-poko; ny fahamarinanao sy ny famonjenao no nambarako; tsy nanafina ny famindram-ponao sy ny fahamarinanao tamin''ny fiangonana lehibe aho.'
mg1865::mg_19::40::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao, Jehovah o, aza miaro ny antranao tsy ho amiko; aoka ny famindram-ponao sy ny fahamarinanao hiaro ahy mandrakariva.'
mg1865::mg_19::40::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanodidina ahy ny fahoriana tsy tambo isaina; nahazo ahy ny heloko, ka tsy mahay mijery aho; maro noho ny volon-dohako ireny, ka reraka ny foko.'
mg1865::mg_19::40::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho sitraky ny fonao, Jehovah o, ny hanafaka ahy; Jehovah o, faingàna hamonjy ahy.'
mg1865::mg_19::40::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho indray menatra sy mangaihay izay mitady hanimba ny aiko; aoka hiamboho sy ho menatra izay mankasitraka ahy ho ory.'
mg1865::mg_19::40::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho ankona noho ny fahamenarany ireny manao amiko hoe: Hià! sakoa izay!'
mg1865::mg_19::40::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho faly sy ho ravoravo aminao izay rehetra mitady Anao; aoka izay rehetra tia ny famonjenao hanao mandrakariva hoe: hankalazaina anie Jehovah.'
mg1865::mg_19::40::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 40
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ory sy malahelo aza aho, ny Tompo no mihevitra ahy; Mpamonjy sy Mpanafaka ahy Ianao; aza ela, Andriamanitro o.'
mg1865::mg_19::41::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainan''ilay ampahorin''ny olon-tsy tia sy ny sakaiza mamadika. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Sambatra izay mahatsiaro ny malahelo; Jehovah hamonjy azy amin''ny andro fahoriana.'
mg1865::mg_19::41::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hitandrina sy hiaro azy tsy ho faty; hatao ho sambatra ambonin''ny tany izy, ary tsy mba hatolotrao amin''ny sitrapon''ny fahavalony.'
mg1865::mg_19::41::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hanohana azy eo ambonin''ny farafara hitsaboana azy. Ny fandriany rehetra eo am-paharariany dia hovanao.'
mg1865::mg_19::41::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Jehovah o, mamindrà fo amiko; sitrano ny fanahiko, fa efa nanota taminao aho.'
mg1865::mg_19::41::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahavaloko maniry ahy ho simba ka manao hoe: Rahoviana no ho faty izy, ka ho very ny anarany?'
mg1865::mg_19::41::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha avy mamangy, izy dia miteny zava-poana; ny fony mamory faharatsiana ho an''ny tenany; mivoaka eny ivelany izy ka milazalaza.'
mg1865::mg_19::41::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitakoritsika ahy izay rehetra mankahala ahy; misaina hanisy ratsy ahy izy.'
mg1865::mg_19::41::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tena zava-dratsy, hoy izy, no aidina aminy; ary raha mandry izy dia tsy hitsangana intsony.'
mg1865::mg_19::41::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny sakaizako, izay maha-toky ahy sady nihinana ny haniko, no nanangana ny ombelahin-tongony hamely ahy.'
mg1865::mg_19::41::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao kosa Jehovah o, mamindrà fo amiko, ka atsangano aho mba hamaliako azy.'
mg1865::mg_19::41::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no hahafantarako fa mankasitraka ahy Ianao, dia ny tsy anakoran''ny fahavaloko ahy.'
mg1865::mg_19::41::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny amiko, dia manohana ahy amin''ny fahitsiako Ianao, ka mampitoetra ahy eo anatrehanao mandrakizay.'
mg1865::mg_19::41::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 41
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin''ny taloha indrindra ka mandrakizay. Amena dia Amena.'
mg1865::mg_19::42::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 1
  verse_date_revised: null
  verse_title: 'BOKY FAHAROA, Faniriana an''Andriamanitra raha lavitra an''i Ziona. Ho an''ny mpiventy hira'
  verse_text: 'Maskila. Nataon''ny Koraita. Tahaka ny diera mihanahana maniry ny rano an''ony no anirian''ny fanahiko Anao, Andriamanitra o.'
mg1865::mg_19::42::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangetaheta an''Andriamanitra ny fanahiko, dia Andriamanitra velona; Rahoviana no ho tonga aho ka hiseho eo anatrehan''Andriamanitra?'
mg1865::mg_19::42::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ranomasoko no fiahiko andro aman''alina, amin''ny anaovany ahy mandrakariva hoe: Aiza izay Andriamanitrao?'
mg1865::mg_19::42::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao zavatra izao no hotsarovako, ka haidiko ato anatiko ny fanahiko, dia ny nandrosoako niaraka tamin''ny maro, sy ny nitarihako azy ho any an-tranon''Andriamanitra, nanao feo mihoby sy midera, dia olona maro izay nitandrina ny andro firavoravoana.'
mg1865::mg_19::42::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mitanondrika ianao, ry fanahiko, ka mitoloko ato anatiko? Manantenà an''Andriamanitra ianao, fa mbola hidera Azy ihany aho noho ny famonjen''ny tavany.'
mg1865::mg_19::42::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro o, mitanondrika ato anatiko ny fanahiko; Izany no ahatsiarovako Anao eo amin''ny tanin''i Jordana sy amin''ireo Hermona ary amin''ny tendrombohitra Mizara.'
mg1865::mg_19::42::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalina miantso ny lalina noho ny firohondrohon''ny riananao; ny onjanao rehetra sy ny alon-dranonao efa nanafotra ahy.'
mg1865::mg_19::42::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah handidy ny famindram-pony nony andro, ary ho amiko nony alina ny fihirana Azy, dia vavaka amin''Andriamanitry ny aiko.'
mg1865::mg_19::42::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho amin''Andriamanitra Vatolampiko: nahoana no nanadino ahy Ianao? nahoana no mandeha mijoretra aho noho ny fampahorian''ny fahavaloko?'
mg1865::mg_19::42::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny zavatra mahatorotoro ny taolako no fandatsan''ny fahavaloko ahy, ka hoy izy isan''andro: Aiza izay Andriamanitrao?'
mg1865::mg_19::42::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 42
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mitanondrika ianao, ry fanahiko? ary nahoana no mitoloko ato anatiko ianao? Manantenà an''Andriamanitra, fa mbola hidera Azy ihany aho, Izy no famonjena ny tavako sady Andriamanitro.'
mg1865::mg_19::43::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 43
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo rariny aho, Andriamanitra o, ary alaharo ny teniko haharesy ny firenena tsy misy famindram-po; Vonjeo aho ho afaka amin''ny lehilahy mpamitaka sy mpanao meloka.'
mg1865::mg_19::43::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 43
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no Andriamanitry ny heriko; Nahoana no manary ahy Ianao? Nahoana no mandeha mijoretra aho noho ny fampahorian''ny fahavaloko?'
mg1865::mg_19::43::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 43
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampandehano ny fahazavanao sy ny fahamarinanao; aoka hitarika ahy ireo ka hitondra ahy ho any an-tendrombohitrao masina, dia ho any amin''ny tabernakelinao.'
mg1865::mg_19::43::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 43
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hankany amin''ny alitaran''Andriamanitra aho, dia any amin''Andriamanitry ny fifaliako indrindra; ary hidera Anao amin''ny lokanga aho, ry Andriamanitra o, dia Andriamanitro.'
mg1865::mg_19::43::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 43
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mitanondrika ianao ry fanahiko? ary nahoana no mitoloko ato anatiko ianao? manantenà an''Andriamanitra, fa mbola hidera Azy ihany aho. Izy no famonjena ny tavako sady Andriamanitro.'
mg1865::mg_19::44::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fivavaky ny Isiraely nony saiky resim-pahavalo, nefa tsy nahafoy an''Andriamanitra. Ho an''ny mpiventy hira'
  verse_text: 'Nataon''ny Koraita. Maskila. Ny sofinay no nandrenesanay, Andriamanitra o, ny razanay nilaza taminay ny asa nataonao tamin''ny androny, dia tamin''ny andro fahiny.'
mg1865::mg_19::44::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tananao no nandroahanao ny firenen-tsamy hafa, fa izy kosa nampitoerinao; efa nampahorinao ny firenena maro, fa izy kosa nataonao mahafeno tany.'
mg1865::mg_19::44::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny sabany no nahazoany ny tany, ary tsy ny sandriny no namonjy azy; fa ny tananao ankavanana sy ny sandrinao ary ny fahazavan''ny tavanao, satria efa sitrakao izy.'
mg1865::mg_19::44::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao dia Ianao no Mpanjakako, Andriamanitra o; Mandidia famonjena ho an''i Jakoba.'
mg1865::mg_19::44::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no hanosehanay ny fahavalonay; ny anaranao no hanitsahanay izay mitsangana hamely anay.'
mg1865::mg_19::44::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy ny tsipikako no itokiako, ary ny sabatro tsy hahavonjy ahy.'
mg1865::mg_19::44::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namonjy anay tamin''ny fahavalonay Ianao, ary ny nankahala anay dia nataonao menatra.'
mg1865::mg_19::44::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no ankalazainay mandrakariva; ary ny anaranao no hoderainay mandrakizay.'
mg1865::mg_19::44::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nanary anay ianao ka nampahamenatra anay, ary tsy mba mivoaka miaraka amin''ny antokon''ny miaramilanay Ianao.'
mg1865::mg_19::44::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao miamboho ny fahavalonay izahay, koa ny mankahala anay dia nanaram-po namabo.'
mg1865::mg_19::44::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Atolotrao tahaka ny ondry hohanina izahay, ary aelinao any amin''ny firenen-tsamy hafa.'
mg1865::mg_19::44::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivarotra ny olonao tsy vola tsy harena Ianao, ka tsy mahazo tombony amin''ny vidiny.'
mg1865::mg_19::44::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao fandatsan''ny olona miray monina aminay izahay, dia fanakora sy faneson''izay manodidina anay.'
mg1865::mg_19::44::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao ho ambentinteny amin''ny firenen-tsamy hafa izahay, dia fihifikifihan-doha amin''ny olona maro.'
mg1865::mg_19::44::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsaroako mandrakariva ny fahafaham-boninahitro, ary efa manafotra ahy ny fangaihaizako,'
mg1865::mg_19::44::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny feon''ny mpanaratsy sy ny mpanamavo, noho ny fahavalo sy ny mpamaly ratsy.'
mg1865::mg_19::44::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany rehetra izany no manjo anay, nefa tsy manadino anao izahay ary tsy mivadika ny fanekenao.'
mg1865::mg_19::44::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mihemotra ny fonay, ary tsy miala amin''ny lalanao ny dianay.'
mg1865::mg_19::44::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Ianao nanorotoro anay teo amin''ny fitoeran''ny amboadia* sy nanarona anay tamin''ny aloky ny fahafatesana. [*Na: jakala]'
mg1865::mg_19::44::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nanadino ny anaran''Andriamanitray izahay, na nananty tanana tamin''ny andriamani-kafa,'
mg1865::mg_19::44::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy handinika izany va Andriamanitra? Fa Izy mahalala ny miafina ao am-po.'
mg1865::mg_19::44::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho ny aminao no amonoana anay mandrakariva; toy ny ondry hovonoina no fijery anay.'
mg1865::mg_19::44::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, ry Tompo o, nahoana no matory Ianao? Mitsangàna, aza manary mandrakizay.'
mg1865::mg_19::44::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no manafina ny tavanao Ianao, ka manadino ny fahantranay sy ny fahorianay?'
mg1865::mg_19::44::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miankohoka amin''ny vovoka ny fanahinay, miraikitra amin''ny tany ny kibonay.'
mg1865::mg_19::44::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 44
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna hamonjy anay, ary avoty izahay araka ny famindram-ponao.'
mg1865::mg_19::45::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Tonon-kiram-panambadiana, fiderana ny mpanjaka be voninahitra. Ho an''ny mpiventy hira'
  verse_text: 'Al-shoshanim. Nataon''ny Koraita. Maskila. Tonon-kiram-pitiavana. Mampiboiboika teny tsara ny foko; miteny aho, ka ny hilaza ny mpanjaka no teny ataoko; fanoratan''ny faingan-tsoratra ny lelako.'
mg1865::mg_19::45::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara tarehy noho ny zanak''olombelona ianao; fahasoavana no naidina tamin''ny molotrao; izany no nitahian''Andriamanitra anao mandrakizay.'
mg1865::mg_19::45::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fehezo eo am-balahanao ny sabatrao, ry ilay mahery, dia ny fiandriananao sy ny voninahitrao.'
mg1865::mg_19::45::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mitaingena handroso soa aman-tsara amin''ny voninahitrao, noho ny teny marina ny fahalemem-panahim-pahamamarinana; ary hampianatra anao zava-mahatsiravina ny tananao ankavanana.'
mg1865::mg_19::45::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zana-tsipïkanao dia voaranitra — Firenena maro no ringana ka hitsakitsahinao — ka mitsatoka ao am-pon''ny fahavalon''ny mpanjaka.'
mg1865::mg_19::45::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny seza fiandriananao, Andriamanitra o, dia mandrakizay doria; tehim-pahamarinana ny tehim-panjakanao.'
mg1865::mg_19::45::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tianao ny fahamarinana, fa halanao ny heloka; koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana anao mihoatra noho ny namanao.'
mg1865::mg_19::45::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miora sy hazo manitra* ary kasia ny fitafianao rehetra, zava-maneno avy ao amin''ny lapa ivory no mampifaly anao. [*Hebreo: ahalota]'
mg1865::mg_19::45::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zanakavavin''andriamanjaka no isan''ny malalanao; eo ankavananao no itoeran''ny vadin''ny mpanjaka, miravaka volamena avy any Ofira.'
mg1865::mg_19::45::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy, razazavavy, dia jereo, ka atongilano ny sofinao, ary hadinoy ny firenenao sy ny tranon-drainao;'
mg1865::mg_19::45::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha irin''ny mpanjaka ny hatsaran-tarehinao — fa izy no tomponao — dia miankohofa eo anatrehany.'
mg1865::mg_19::45::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny zanakavavin''i Tyro hitondra fanatitra; eny, ny manan-karena amin''ny vahoaka hila sitraka aminao.'
mg1865::mg_19::45::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be voninahitra ny zanakavavin''ny mpanjaka ao anaty trano; tenona misy volamena no fitafiany.'
mg1865::mg_19::45::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitafy lamba misoratsoratra izy ka entina ho ao amin''ny mpanjaka: ny zazavavy sakaizany izay manaraka azy dia entina ao aminao.'
mg1865::mg_19::45::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Entina amin''ny fifaliana sy ny firavoravoana ireny; hiditra ao an-dapan''ny mpanjaka izy.'
mg1865::mg_19::45::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho solon-drainao ny zanakao, hotendrenao ho mpanapaka eny amin''ny tany rehetra izy.'
mg1865::mg_19::45::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 45
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampahatsiaro ny anaranao hatramin''ny taranaka fara mandimby aho. Izany rehetra izany no hideran''ny firenena anao mandrakizay doria.'
mg1865::mg_19::46::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahatokiana an''Andriamanitra fiarovana mafy. Ho an''ny mpiventy hira'
  verse_text: 'Nataon''ny Koraita; At-alamoth; Tonon-kira. Andriamanitra no aro sy hery ho antsika; Mpamonjy mora azo indrindra amin''ny fahoriana Izy.'
mg1865::mg_19::46::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no tsy hatahorantsika, na dia ho levona aza ny tany, na mifindra ho ao anatin''ny ranomasina aza ny tendrombohitra,'
mg1865::mg_19::46::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na mirohondrohona sy misamboaravoara aza ny onjany, ka mihorohoro ny tendrombohitra noho ny fisafoakany.'
mg1865::mg_19::46::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy ony, koa ny sampany dia mampifaly ny tanànan''Andriamanitra, Fonena-masin''ny Avo Indrindra.'
mg1865::mg_19::46::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no eo afovoany, ka tsy mba hihetsika izy; Andriamanitra no hamonjy azy, rehefa madiva ho maraina ny andro.'
mg1865::mg_19::46::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitabataba ny firenen-tsamy hafa, nikotrankotrana ny fanjakana maro; nanonona ny feony Izy, ka niempo ny tany.'
mg1865::mg_19::46::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro, no momba antsika; Andriamanitr''i Jakoba no fiarovana avo ho antsika.'
mg1865::mg_19::46::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, jereo ny asan''i Jehovah, izay mahatonga faharavana ety an-tany;'
mg1865::mg_19::46::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampitsahatra ady hatramin''ny faran''ny tany Izy; manapaka ny tsipïka sy manito ny lefona Izy, ary mandoro ny sariety amin''ny afo.'
mg1865::mg_19::46::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsahara, ka aoka ho fantatrareo fa Izaho no Andriamanitra; hisandratra amin''ny firenen-tsamy hafa Aho, hisandratra amin''ny tany Aho.'
mg1865::mg_19::46::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 46
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro, no momba antsika; Andriamanitr''i Jakoba no aro ho antsika.'
mg1865::mg_19::47::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fihobiana noho ny niakaran''ny Tompo. Ho an''ny mpiventy hira'
  verse_text: 'Nataon''ny Koraita. Salamo. Mitehafa tanana, ry firenena rehetra; mihobia ho an''Andriamanitra.'
mg1865::mg_19::47::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah no avo indrindra ka tokony hatahorana; Mpanjaka lehibe ambonin''ny tany rehetra Izy.'
mg1865::mg_19::47::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandresy firenena maro Izy ho ambanintsika , ary firenen-tsamy hafa ho ambanin''ny tongotsika.'
mg1865::mg_19::47::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifidy ny lovantsika ho antsika Izy, dia ny voninahitr''i Jakoba izay tiany.'
mg1865::mg_19::47::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa niakatra tamin''ny fihobiana Andriamanitra, Jehovah niakatra tamin''ny fitsofana ny anjomara.'
mg1865::mg_19::47::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''Andriamanitra, eny mankalazà; mankalazà ny Mpanjakantsika, eny, mankalazà.'
mg1865::mg_19::47::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mpanjaka amin''ny tany rehetra Andriamanitra; mahaiza mankalaza tsara ianareo.'
mg1865::mg_19::47::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra manjaka amin''ny firenen-tsamy hafa; Andriamanitra mipetraka eo ambonin''ny seza fiandrianany masina.'
mg1865::mg_19::47::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 47
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanapaka ny firenen-tsamy hafa miangona ho olon''Andriamanitr''i Abrahama; fa an''Andriamanitra ny ampingan''ny tany; Avo indrindra Izy.'
mg1865::mg_19::48::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tsy nahazoan''ny fahavalo hamely ny tanànan''Andriamanitra, Mpanjaka lehibe'
  verse_text: 'Tonon-kira. Salamo nataon''ny Koraita. Lehibe Jehovah ka mendrika hoderaina indrindra, ao an-tanànan''Andriamanitsika, ao an-tendrombohiny masina.'
mg1865::mg_19::48::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avo mahafinaritra, fifalian''ny tany rehetra, ny tendrombohitra Ziona, eo amin''ny ilany avaratra, tanànan''ny Mpanjaka lehibe.'
mg1865::mg_19::48::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra ao an-tranon''andriana ao dia nanao izay hahafantarana Azy ho fiarovana avo.'
mg1865::mg_19::48::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa he! niangona ny mpanjaka maro, niara-nandroso avokoa izy.'
mg1865::mg_19::48::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nijery izy ka talanjona tery; Very hevitra izy ka nalaky nandositra;'
mg1865::mg_19::48::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hovitra no nahazo azy teo, dia tahaka ny fanaintainan''ny vehivavy raha miteraka.'
mg1865::mg_19::48::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny rivotra avy any atsinanana no namakianao ny sambon''i Tarsisy.'
mg1865::mg_19::48::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka izay efa rentsika no hitantsika, tao an-tanànan''i Jehovah, Tompon''ny maro, tao an-tanànan''Andriamanitsika. Andriamanitra mampitoetra azy mandrakizay.'
mg1865::mg_19::48::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nieritreritra ny famindram-ponao izahay, Andriamanitra o, tao anatin''ny tempolinao.'
mg1865::mg_19::48::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny anaranao, Andriamanitra o, no fiderana Anao hatramin''ny faran''ny tany; feno fahamarinana ny tananao ankavanana.'
mg1865::mg_19::48::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hifaly ny tendrombohitra Ziona, aoka ho ravoravo ny zanaka-vavin''Joda, noho ny fitsaranao.'
mg1865::mg_19::48::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manodidina an''i Ziona ianareo, eny, mandehana manodidina azy; isao ny tilikambony,'
mg1865::mg_19::48::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hevero tsara ny mandany, diniho ny tranon''andrianany, mba hambaranareo amin''ny taranaka mandimby.'
mg1865::mg_19::48::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 48
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany no Andriamanitra, dia Andriamanitsika mandrakizay doria; Izy no hitarika antsika na dia hatramin''ny fahafatesana aza.'
mg1865::mg_19::49::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahafoanan''ny harena amam-boninahitra. Ho an''ny mpiventy hira'
  verse_text: 'Nataon''ny Koraita. Salamo. Mandrenesa izao, ry firenena rehetra; mihainoa, ry mponina rehetra amin''izao tontolo izao:'
mg1865::mg_19::49::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny ambany, na ny ambony, na ny manan-karena, na ny malahelo.'
mg1865::mg_19::49::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavako hiteny fahendrena; ary ny fieritreretan''ny foko dia fahalalana.'
mg1865::mg_19::49::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanongilana ny sofiko hihaino oha-teny aho, ary hanonona teny saro-pantarina ampiarahiko amin-dokanga.'
mg1865::mg_19::49::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no hatahotra amin''ny andro fahoriana aho, nony manodidina ahy ny haratsian''ny mpamingana ahy,'
mg1865::mg_19::49::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay matoky ny hareny, Sy mirehareha amin''ny haben''ny fananany?'
mg1865::mg_19::49::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mahavotra ny rahalahiny akory, na mahazo manome an''Andriamanitra izay avony,'
mg1865::mg_19::49::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: '(Fa sarotra avotra ny ainy ka tsy azo atao mandrakizay),'
mg1865::mg_19::49::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba ho velona mandrakizay izy, ka tsy ho latsaka ao amin''ny lavaka*. [*Na: ho tratry ny lo]'
mg1865::mg_19::49::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hita fa maty ihany ny olon-kendry; ary ny adala sy ny ketrina samy levona, ka mamela ny fananany ho an''ny hafa.'
mg1865::mg_19::49::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny heviny dia ataony fa ho mandrakizay ny tranony, ary ny fonenany hahatratra ny taranaka fara mandimby; araka ny anarany no anononany ny taniny*. [*Na: Ankalazaina ny anarany eny amin''ny tany maro]'
mg1865::mg_19::49::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na dia manana voninahitra aza ny olona, dia tsy maharitra izy; tahaka ny biby izay samy tsy maintsy ho faty izy.'
mg1865::mg_19::49::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no falehan''ny olona adala; ary ny taranany mandimby azy mankasitraka ny teniny.'
mg1865::mg_19::49::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fanangona ondry no fanangona azy any amin''ny fiainan-tsy hita*; ny fahafatesana no mpiandry azy; ary hanapaka azy ny mahitsy nony maraina; ary ny bikany ho levona any amin''ny fiainan-tsy hita*, ka tsy hisy fonenany. [*Hebreo: Sheola]'
mg1865::mg_19::49::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra kosa hamonjy ny aiko amin''ny herin''ny fiainan-tsy hita, 3 satria handray ahy Izy*. [*Na: Rehefa azony aho]'
mg1865::mg_19::49::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matahotra ianao, raha misy olona tonga manan-karena, ka mitombo ny voninahitry ny tranony;'
mg1865::mg_19::49::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hitondra na inona na inona izy, raha maty; tsy mba hidina hanaraka azy ny voninahiny.'
mg1865::mg_19::49::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia miarahaba tena aza izy, raha mbola velona — Fa hidera anao ny olona, raha manisy soa ny tenanao ianao -'
mg1865::mg_19::49::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hankany amin''ny razany izy, tsy hahita ny mazava intsony mandrakizay ireny.'
mg1865::mg_19::49::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 49
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay olona manana voninahitra, nefa tsy manan-tsaina, dia tahaka ny biby izay samy tsy maintsy ho faty.'
mg1865::mg_19::50::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fivavahana marina sy ny fanatitra sitrak''Andriamanitra'
  verse_text: 'Salamo nataon i Asafa. Andriamanitra Andriananahary, dia Jehovah, no miteny ka miantso ny tany hatramin''ny fiposahan''ny masoandro ka hatramin''ny filentehany.'
mg1865::mg_19::50::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy ao Ziona, izay tena fahatsaran-tarehy, no amirapiratan''Andriamanitra.'
mg1865::mg_19::50::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy Andriamanitsika ka tsy hangina; afo no mandevona eo alohany, ary tafio-drivotra mahery no manodidina Azy.'
mg1865::mg_19::50::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantso ny lanitra any ambony Izy, sy ny tany koa, mba hitsaràny ny olony:'
mg1865::mg_19::50::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Angony ety amiko ny oloko masina izay manao fanekena amiko amin''ny fanatitra.'
mg1865::mg_19::50::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hasehon''ny lanitra ny fahamarinany; fa Andriamanitra no Mpitsara.'
mg1865::mg_19::50::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, ry oloko, fa hiteny Aho; Ry Isiraely o, fa hanambara aminao Aho; Izaho no Andriamanitra, dia Andriamanitrao.'
mg1865::mg_19::50::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny fanatitrao no ananarako anao, ary efa eo anatrehako mandrakariva ny fanatitra doranao.'
mg1865::mg_19::50::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy maka vantotr''ombilahy amin''ny tranonao Aho, na osilahy amin''ny valanao;'
mg1865::mg_19::50::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ahy ny biby rehetra any an''ala, sy ny biby fiompy arivoarivo eny an-tendrombohitra.'
mg1865::mg_19::50::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro ny vorona rehetra eny an-tendrombohitra; ary eto amiko ny zava-mihetsiketsika eny an-tsaha.'
mg1865::mg_19::50::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mba noana Aho, dia tsy hilaza aminao; fa Ahy izao tontolo izao sy izay rehetra eo aminy.'
mg1865::mg_19::50::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihinana ny nofon''ombilahy va Aho, na hisotro ny ran''osilahy?'
mg1865::mg_19::50::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manatera fanati-pisaorana ho an''Andriamanitra; ary efao amin''ny Avo Indrindra ny voadinao;'
mg1865::mg_19::50::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Antsoy Aho amin''ny andro fahoriana, dia hamonjy anao Aho, ka hanome voninahitra Ahy ianao.'
mg1865::mg_19::50::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny ratsy fanahy kosa dia hoy Andriamanitra: ahoana no itorianao ny lalàko sy itondranao ny fanekeko eo am-bavanao?'
mg1865::mg_19::50::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao mankahala fananarana, ary arianao eo ivohonao ny teniko.'
mg1865::mg_19::50::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mahita mpangalatra ianao, dia faly hikambana aminy, ary miray anjara amin''ny mpijangajanga.'
mg1865::mg_19::50::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavanao alefanao hiteny ratsy, ary ny lelanao mamorom-pitaka.'
mg1865::mg_19::50::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipetraka miteny ratsy ny rahalahinao ianao, sady manendrikendrika* ny zanakalahin-dreninao. [*Na: manosika]'
mg1865::mg_19::50::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nataonao, nefa nangina ihany Aho, ka dia nataonao fa mitovy aminao ihany Aho! Hananatra anao Aho ka handahatra izany eo imasonao.'
mg1865::mg_19::50::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihevera izany ankehitriny, ianareo izay manadino an''Andriamanitra, fandrao hamiravira Aho, ka tsy hisy hamonjy.'
mg1865::mg_19::50::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 50
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manatitra fanati-pisaorana no manome voninahitra Ahy; ary izay mitandrina ny lalany no hanehoako ny famonjen''Andriamanitra.'
mg1865::mg_19::51::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fifonan''ny manan-keloka mba hahafahan''ny helony sy hodian''ny fifaliany amin''Andriamanitra. Ho an''ny mpiventy hira. Salamo nataon''i Davida, fony Natana mpaminany nankao aminy rehefa naka an''i Batseba izy.'
  verse_text: 'Mamindrà fo amiko, Andriamanitra o, araka ny fahasoavanao; araka ny haben''ny fiantranao vonoy ny fahadisoako.'
mg1865::mg_19::51::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sasao madio aho mba ho afa-keloka, ary diovy aho mba ho afa-pahotana.'
mg1865::mg_19::51::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsaroako ny fahadisoako, ary eo anatrehako mandrakariva ny fahotako.'
mg1865::mg_19::51::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Taminao dia taminao ihany no nanotako, ary izay ratsy eo imasonao no efa nataoko, mba ho marina Ianao, raha miteny, ary tsy hanan-tsiny Ianao, raha mitsara.'
mg1865::mg_19::51::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tamin''ny heloka no niterahana ahy, ary tamin''ny fahotana no torontoronina ahy ny reniko.'
mg1865::mg_19::51::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fahamarinana ao am-po no sitrakao; ary fahendrena ao amin''ny miafina no ampahafantarinao ahy.'
mg1865::mg_19::51::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diovy hysopa aho ho afa-pahotana, dia hadio; sasao aho, dia ho fotsy mangatsakatsaka*. [*Hebreo: toy ny oram-panala]'
mg1865::mg_19::51::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampandreneso fifaliana sy faharavoravoana aho, hifalian''ny taolana izay voavakivakinao.'
mg1865::mg_19::51::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afeno ny tavanao ny fahotako ary vonoy ny heloko rehetra.'
mg1865::mg_19::51::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amorony fo madio aho, Andriamanitra o; ary havaozy hiorina marina ny fanahiko ato anatiko.'
mg1865::mg_19::51::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manary ahy hiala eo anatrehanao; ary aza manaisotra ny Fanahinao Masina amiko.'
mg1865::mg_19::51::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampodio amiko ny fifaliana amin''ny famonjenao; ary tohàny fanahy mazoto aho.'
mg1865::mg_19::51::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampianatra ny olon-diso ny lalanao aho; ary ny mpanota hampiverenina aminao.'
mg1865::mg_19::51::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo ho afaka amin''ny valin-drà aho, Andriamanitra o, Andriamanitry ny famonjena ahy; hihoby ny fahamarinanao ny vavako*. [*Hebreo: ny lelako]'
mg1865::mg_19::51::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, sokafy ny molotro, dia hanambara ny fiderana Anao ny vavako.'
mg1865::mg_19::51::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy fanatitra no sitrakao; raha izany dia nomeko ihany; ny fanatitra dorana tsy mahafaly Anao.'
mg1865::mg_19::51::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanatitra ho an''Andriamanitra dia fanahy torotoro; ny fo torotoro sy mangorakoraka, Andriamanitra o, tsy mba ataonao tsinontsinona.'
mg1865::mg_19::51::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova soa amin''i Ziona araka ny fahasoavanao; ataovy ny mandan''i Jerosalema.'
mg1865::mg_19::51::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 51
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho sitrakao ny fanati-pahamarinana sy ny fanatitra dorana ary ny fanatitra levonina amin''ny afo; dia hanatitra vantotr''ombilahy eo amin''ny alitaranao ny olona.'
mg1865::mg_19::52::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny loza hanjo izay tsy miambim-bava. Ho an''ny mpiventy hira'
  verse_text: 'Maskila nataon''i Davida, fony tonga Doega Edomita ka nilaza tamin''i Saoly hoe: Davida dia efa tonga ao an-tranon''i Ahimeleka. Nahoana no mandoka tena amin''ny haratsiana ianao, ry ilay mahery? Ny famindram-pon''Andriamanitra maharitra mandrakariva.'
mg1865::mg_19::52::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Loza no heverin''ny lelanao, tahaka ny hareza maranitra, ry mpanao fitaka.'
mg1865::mg_19::52::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa tia ny ratsy noho ny tsara ianao, ary ny lainga noho ny miteny ny marina.'
mg1865::mg_19::52::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teny mandripaka rehetra no tianao, ry lela mamitaka.'
mg1865::mg_19::52::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra kosa hanimba* anao mandrakizay; hisambotra anao sy hanongotra anao hiala ao an-day Izy, ary hamongotra anao tsy ho eo amin''ny tanin''ny velona. [*Na: hanongana]'
mg1865::mg_19::52::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina hijery, dia hatahotra ka hihomehy azy hoe:'
mg1865::mg_19::52::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ny lehilahy izay tsy nanao an''Andriamanitra ho heriny; fa natoky ny haben''ny hareny ka nikikitra tamin''ny faharatsiany.'
mg1865::mg_19::52::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho dia tahaka ny hazo oliva maitso ao an-tranon''Andriamanitra. Matoky ny famindram-pon''Andriamanitra mandrakizay doria aho.'
mg1865::mg_19::52::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 52
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao mandrakizay aho, fa efa nataonao izany; ary hiandry ny anaranao eo anatrehan''ny olonao masina aho, fa tsara izany.'
mg1865::mg_19::53::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 53
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny faharatsian''ny olona sy ny faniriam-pamonjena. Ho an''ny mpiventy hira'
  verse_text: 'Al-mahalath. Maskila nataon''i Davida. Ny adala manao anakampo hoe: tsy misy Andriamanitra. Manao izay ratsy sy vetaveta izy, tsy misy manao ny tsara.'
mg1865::mg_19::53::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 53
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-danitra Andriamanitra miondrika mijery ny zanak''olombelona, mba hizaha na misy hendry mitady an''Andriamanitra.'
mg1865::mg_19::53::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 53
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samy efa nivily izy rehetra ka tonga vetaveta avokoa; tsy misy manao ny tsara, na dia iray akory aza.'
mg1865::mg_19::53::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 53
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahalala va ny mpanao ratsy, izay mihinana ny oloko toy ny fihinan-kanina, ary Andriamanitra tsy antsoiny?'
mg1865::mg_19::53::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 53
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indreo, matahotra dia matahotra ireny, nefa tsy nisy tokony hatahorany; fa Andriamanitra efa nanely ny taolan''izay nitoby hamely anao; nampahamenatra azy ianao, satria efa narian''Andriamanitra izy.'
mg1865::mg_19::53::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 53
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely! raha ampodin''Andriamanitra avy amin''ny fahababoana ny olony, dia ho faly Jakoba, ary ho ravoravo Isiraely.'
mg1865::mg_19::54::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangataham-pamonjena amin''Andriamanitra sy fahatokiana Azy, na dia be aza ny fahavalo. Ho an''ny mpiventy hira'
  verse_text: 'Hampiarahina amin''ny valiha. Maskila nataon''i Davida, fony tonga ny Zifita ka nanao tamin''i Saoly hoe: Tsy miery any aminay va Davida? Vonjeo amin''ny anaranao aho, Andriamanitra o, ary omeo rariny aho araka ny herinao.'
mg1865::mg_19::54::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, henoy ny fivavako; mihainoa ny tenin''ny vavako.'
mg1865::mg_19::54::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa olona hafa firenena no mitsangana hamely ahy, ary olon-dozabe no mitady ny aiko; tsy mihevitra an''Andriamanitra ho eo anatrehany izy.'
mg1865::mg_19::54::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, Andriamanitra no Mpamonjy ahy; ny Tompo no Mpanohana ny fanahiko.'
mg1865::mg_19::54::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamaly ny ratsy ataon''ny mpampahory ahy Izy; aoka ny fahamarinanao no handringananao azy.'
mg1865::mg_19::54::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sitrapoko ihany no hanaterako fanatitra ho Anao; hidera ny anaranao aho, Jehovah o, fa tsara izy.'
mg1865::mg_19::54::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 54
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa namonjy ahy ho afaka tamin''ny fahoriana rehetra Izy; ary ny masoko dia faly mijery ny amin''ny fahavaloko.'
mg1865::mg_19::55::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana nataon''izay navadiky ny sakaizany nahatoky azy. Ho an''ny mpiventy hira'
  verse_text: 'Hampiarahina amin''ny valiha. Maskila nataon''i Davida. Mihainoa ny fivavako, Andriamanitra o, ary aza miery amin''ny fitarainako.'
mg1865::mg_19::55::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy aho, ka valio; miriorio ny eritreritro, ka mitoloko aho,'
mg1865::mg_19::55::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny feon''ny fahavalo sy ny fampahorian''ny ratsy fanahy; fa mampianjera loza amiko ireny, ary amin''ny fahatezerana no ankahalany ahy.'
mg1865::mg_19::55::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangorohoro ato anatiko ny foko, ary mamely ahy ny tahotra ny fahafatesana.'
mg1865::mg_19::55::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahotra sy hovitra no mahazo ahy, ary manafotra ahy ny horohoro.'
mg1865::mg_19::55::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy izaho: enga anie ka manana elatra tahaka ny voromailala aho, dia handositra aho ka hahita izay hitoerako;'
mg1865::mg_19::55::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, handositra lavitra aho ka hitoetra any an''efitra.'
mg1865::mg_19::55::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handeha faingana aho hamonjy fialofana, mba tsy ho azon''ny tafio-drivotra sy ny ranonoram-baratra.'
mg1865::mg_19::55::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aringano izy, ary akoroy ny fiteniny, Tompo o; fa mahita loza sy ady ao an-tanàna aho.'
mg1865::mg_19::55::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hodidininy andro aman''alina eny ambonin ny mandany io; ary heloka sy fampahoriana no ao aminy;'
mg1865::mg_19::55::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ratsy no ao anatiny; ary ny fitaka sy ny fanangolena tsy mba miala amin''ny lalàmbeny.'
mg1865::mg_19::55::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy fahavalo no nanaratsy ahy, - fa raha izany, dia niaritra ihany aho; tsy olona nankahala ahy no nanandra-tena namely ahy, fa raha izany, dia niery azy aho;'
mg1865::mg_19::55::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianao, lehilahy mitovy saranga amiko, namako sy sakaizako indrindra,'
mg1865::mg_19::55::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia isika izay nifankamamy resaka ka niara-nandeha tamin''ny maro ho ao an-tranon''Andriamanitra.'
mg1865::mg_19::55::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanampoka azy ny fahafatesana*. Aoka hidina velona any amin''ny fiainan-tsy hita** izy; fa ratsy no ao amin''ny fonenany, dia ao afovoany***. [*Na: Aoka hahazo azy ny fandringanana] [**Hebreo: Sheola] [***Na: Fa hevi-dratsy ny ao amin''ny firaketany, dia ao am-pony]'
mg1865::mg_19::55::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha izaho, dia Andriamanitra no hantsoiko; ary Jehovah no hamonjy ahy.'
mg1865::mg_19::55::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hariva sy maraina ary mitatao vovonana no hitarainako sy hitolokoako; dia hihaino ny feoko Izy,'
mg1865::mg_19::55::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hanavotra ny fanahiko ho amin''ny fiadanana hahafahako amin''ny adin''ireny amiko, fa maro no miady amiko.'
mg1865::mg_19::55::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihaino Andriamanitra, Izay mipetraka hatramin''ny taloha, ka hamaly ireo olona tsy miova toetra, sady tsy matahotra an''Andriamanitra.'
mg1865::mg_19::55::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa naninjitra ny tanany hamely izay nihavana taminy izy; namadika ny fanekeny izy.'
mg1865::mg_19::55::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Malambo noho ny rononomandry ny vavany, kanjo ady no ao am-pony; malemy noho ny diloilo ny teniny, kanjo sabatra voatsoaka ireny.'
mg1865::mg_19::55::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Apetraho amin''i Jehovah ny entanao, ary Izy no hanohana anao; tsy havelany hangozohozo mandrakizay ny marina.'
mg1865::mg_19::55::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 55
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Andriamanitra o, no hampidina ireo any an-davaka fanimbana; ny mpandatsa-drà sy mpamitaka tsy hahatratra ny an-tsasaky ny androny; fa izaho kosa dia hatoky Anao.'
mg1865::mg_19::56::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangataham-pamonjena amin''Andriamanitra sy fahatokiana Azy any am-pandosirana. Ho an''ny mpiventy hira'
  verse_text: 'Al-jonathelem-rehokim. Miktama nataon''i Davida, fony nisambotra azy tany Gata ny Filistina. Mamindrà fo amiko, Andriamanitra o, fa misafoaka manenjika ahy ny olona; miady amiko mandrakariva izy ka mampahory ahy.'
mg1865::mg_19::56::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misafoaka manenjika mandrakariva ny mpampahory ahy; maro tokoa no mirehareha miady amiko.'
mg1865::mg_19::56::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro atahorako no itokiako Anao.'
mg1865::mg_19::56::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no iderako ny teniny; Andriamanitra no itokiako, ka tsy mba hatahotra aho; inona no hataon''ny nofo amiko?'
mg1865::mg_19::56::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manimba ny raharahako mandra-kariva ireny*; ny heviny rehetra dia ny hanisy ratsy ahy ihany. [*Na: Mamily ny teniko mandrakariva ireny]'
mg1865::mg_19::56::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miangona izy, miery izy, mitsongo-dia ahy izy, satria mikendry ny aiko.'
mg1865::mg_19::56::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany faharatsiany izany moa hisy hahafahany va*? Aripaho amin''ny fahatezeranao ny firenena. Andriamanitra o. [*Na: Ny faharatsiana no atao-ny ho famonjena azy]'
mg1865::mg_19::56::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manisa ny firenireneko Ianao; ataovy ao an-tavoahanginao ny ranomasoko; tsy eo amin''ny bokinao va ireny?'
mg1865::mg_19::56::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izay dia hiamboho ny fahavaloko amin''ny andro hiantsoako Anao; izao dia fantatro, fa momba ahy Andriamanitra.'
mg1865::mg_19::56::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no iderako ny teniny; Jehovah no iderako ny teniny.'
mg1865::mg_19::56::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no itokiako; ka tsy mba hatahotra aho; inona no hataon''ny olona amiko?'
mg1865::mg_19::56::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nivoady taminao aho, Andriamanitra o, dia hanatitra fanati-pisaorana ho Anao.'
mg1865::mg_19::56::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 56
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nanafaka ny fanahiko tamin''ny fahafatesana Ianao; eny, nanafaka ny tongotro Ianao mba tsy ho solafaka. Handehanako eo anatrehan''Andriamanitra amin''ny fahazavan''ny velona*. [*Na: fahazavan''aina]'
mg1865::mg_19::57::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 1
  verse_date_revised: '2022-08-17T03:26:05+0000'
  verse_title: 'Fangataham-pamindram-po sy fahatokiana an''Andriamanitra, na dia hodidinim-pahavalo aza.'
  verse_text: 'Ho an''ny mpiventy hira. Al-tasheth. Miktama nataon''i Davida tamin''ny nandosirany an''i Saoly tao anaty zohy. Mamindrà fo amiko. Andriamanitra o, mamindrà fo amiko; fa Ianao no ialofan''ny fanahiko; eny, ao amin''ny aloky ny elatrao no ialofako, mandra-pahalasan''ny loza.'
mg1865::mg_19::57::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitaraina amin''Andriamanitra Avo Indrindra aho, dia amin''Andriamanitra Izay mahatanteraka ho ahy.'
mg1865::mg_19::57::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haniraka avy any an-danitra Izy ka hamonjy ahy, raha miteny ratsy izay misafoaka manenjika ahy; eny, Andriamanitra haniraka ny famindram-pony sy ny fahamarinany.'
mg1865::mg_19::57::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahiko dia eo afovoan''ny liona; handry eo amin''ny masiaka aho, dia eo amin''ny zanak''olombelona, - lefona sy zana-tsipïka ny nifiny, ary sabatra maranitra ny lelany.'
mg1865::mg_19::57::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misandrata any ambonin''ny lanitra Ianao, Andriamanitra o! aoka ho ambonin''ny tany rehetra ny voninahitrao.'
mg1865::mg_19::57::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa namela-pandrika harato haningotra ny diako izy, ary nampitanondrika ny fanahiko*; nihady lavaka teo anoloako izy, kanjo ny tenany ihany no latsaka ao anatiny. [*Na: nitanondrika ny fanahiko]'
mg1865::mg_19::57::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tafatoetra ny foko, Andriamanitra o, eny, tafatoetra ny foko; hihira sy hankalaza aho.'
mg1865::mg_19::57::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, ry voninahitro; mifohaza ry valiha sy lokanga; hifoha maraina koa* aho. [*Na: Hampifoha ny maraina aho]'
mg1865::mg_19::57::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao eny amin''ny vahoaka aho, Tompo o, hankalaza Anao eny amin''ny firenena aho.'
mg1865::mg_19::57::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe mihatra amin''ny lanitra ny famindram-ponao, ary mihatra amin''ny rahona ny fahamarinanao.'
mg1865::mg_19::57::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 57
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misandrata any ambonin''ny lanitra Ianao, Andriamanitra o; aoka ho ambonin''ny tany rehetra ny voninahitrao.'
mg1865::mg_19::58::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny famaliana ny mpanao fitsarana tsy marina. Ho an''ny mpiventy hira'
  verse_text: 'Al-tasheth. Miktama nataon''i Davida. Moa ny tsy fitenenana va ataonareo ho filazana ny marina*? Mitsara mahitsy va ianareo, ry zanak''olombelona? [*Na: Moa milaza ny maraina tokoa va ianareo, ry mahery?]'
mg1865::mg_19::58::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy izany, fa ny fonareo no amoronanareo ny ratsy; mandanja ny fandozan''ny tananareo ety an-tany ianareo.'
mg1865::mg_19::58::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivily hatrany am-bohoka ny ratsy fanahy; mania hatrany an-kibo izy ka miteny lainga.'
mg1865::mg_19::58::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy poizina tahaka ny an''ny menarana aminy; eny, tahaka ny vipera marenina izay manentsin-tadiny izy,'
mg1865::mg_19::58::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka tsy mihaino ny feon''ny mpanao ody, na dia izay mpahay ody indrindra aza.'
mg1865::mg_19::58::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, torotoroy ny nifiny eo am-bavany; omboty ny vazan''ny liona tanora, Jehovah o.'
mg1865::mg_19::58::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho ritra tahaka ny ranotrambo izy; raha atraniny ny zana-tsipïkany, dia aoka ho tapa-doha ireny;'
mg1865::mg_19::58::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tahaka ny lelosy izay mihalevona eny am-pandehanana izy; Aoka ho tahaka ny zaza-vakimanta izay tsy mahita masoandro izy.'
mg1865::mg_19::58::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dieny tsy mbola mafanan''ny afon-tsilo ny vilaninareo, aoka ho entin''ny tafio-drivotra ireny, na ny lena na ny maina.'
mg1865::mg_19::58::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifaly ny marina, raha mahita ny famaliana; hanasa ny tongony amin''ny ran''ny ratsy fanahy izy;'
mg1865::mg_19::58::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 58
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hiteny ny olona ka hanao hoe: misy valiny* tokoa ho an''ny marina; misy tokoa Andriamanitra Izay mitsara ety ambonin''ny tany. [*Hebreo: vokatra]'
mg1865::mg_19::59::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainan''izay misy fahavalo maro mitady hahafaty azy. Ho an''ny mpiventy hira. Al-tasheth. Miktama nataon''i Davida, fony Saoly naniraka, ka nisy niambina ny trano hamonoana azy'
  verse_text: 'Afaho amin''ny fahavaloko aho, Andriamanitro o; asondroty eo amin''ny avo aho tsy ho azon''izay miodina amiko.'
mg1865::mg_19::59::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afaho amin''ny mpanao ratsy aho, ary vonjeo amin''ny mpandatsa-drà.'
mg1865::mg_19::59::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, manotrika hahazo ny aiko izy; miangona hanohitra ahy ny mahery, nefa tsy fahadisoako ary tsy fahotako, Jehovah o.'
mg1865::mg_19::59::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy heloko* no ihazakazahany sy iomanany, koa mifohaza hitsena ahy, ka jereo. [*Hebreo: vokatra]'
mg1865::mg_19::59::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ianao, Jehovah o, Andriamanitry ny maro, Andriamanitry ny Isiraely, mifohaza hitsara ny firenen-tsamy hafa; aza mamindra fo amin''izay mpivadika ratsy fanahy.'
mg1865::mg_19::59::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverina nony hariva ireny ka mierona tahaka ny alika, sady mandehandeha eran''ny tanàna.'
mg1865::mg_19::59::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, mirezadrezatra amin''ny vavany izy; sabatra no eo amin''ny molony, fa iza, hono, no handre?'
mg1865::mg_19::59::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo Ianao, Jehovah o, hihomehy azy; Ianao haneso ny firenena rehetra.'
mg1865::mg_19::59::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho ny herin''ireny dia hiandry Anao aho; fa Andriamanitra no fiarovana avo ho ahy.'
mg1865::mg_19::59::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra, Izay mamindra fo amiko, no hialoha ahy; hataon''Andriamanitra faly mijery ny amin''ny fahavaloko aho.'
mg1865::mg_19::59::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mahafaty azy Ianao, fandrao hanadino izany ny fireneko. Ampirenireneo amin''ny herinao izy, ka aripaho, ry Tompo o, Ampinganay.'
mg1865::mg_19::59::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahotan''ny vavany dia ny tenin''ny molony; aoka hosamborina amin''ny fireharehany izy, eny, noho ny ozona sy ny lainga ataony.'
mg1865::mg_19::59::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aringano an-katezerana izy, aringano mba tsy ho ao intsony; ary aoka ho fantany fa Andriamanitra no manapaka eo amin''ny Jakoba ka hatramin''ny faran''ny tany.'
mg1865::mg_19::59::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miverina nony hariva ireny ka mierona tahaka ny alika, sady mandehandeha eran''ny tanàna.'
mg1865::mg_19::59::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miriorio mitady hanina izy; raha tsy voky izy, dia any ihany mandritra ny alina.'
mg1865::mg_19::59::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa dia hihira ny herinao, ary hihoby ny famindram-ponao nony maraina, satria fiarovana avo ho ahy Ianao, ary fandosirako amin''ny andro fahoriana.'
mg1865::mg_19::59::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 59
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Heriko o, Ianao no hankalazaiko; fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra Izay mamindra fo amiko.'
mg1865::mg_19::60::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoan''ny efa resim-pahavalo, mba hotsarovan''Andriamanitra ny teniny'
  verse_text: 'Ho an''ny mpiventy hira Al-sho-shanedoth. Miktama nataon''i Davida hampianarana, fony izy nanafika an''i Mesopotamia* sy Arama-zoba tamin''ny niverenan''i Joaba ka namelezany ny Edomita roa arivo amby iray alin-dahy teo amin''ny lohasahan-tsira. Andriamanitra o, efa nanary sy nampihahaka anay Ianao; efa tezitra Ianao, velombelomy izahay. [*Arama-naharaima]'
mg1865::mg_19::60::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampihorohoro ny tany Ianao ka namaky azy; amboary izay rava aminy, fa mihozongozona izy.'
mg1865::mg_19::60::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampahita ny olonao zava-tsarotra Ianao, ary efa nampisotro anay divay mampiraikiraiky.'
mg1865::mg_19::60::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa notoloranao faneva ny matahotra Anao, hatsangany noho ny fahamarinana.'
mg1865::mg_19::60::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hahafahan''ny malalanao, dia vonjeo amin''ny tananao ankavanana aho, ka valio.'
mg1865::mg_19::60::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra niteny tamin''ny fahamasinany hoe: hifaly Aho ka hizara an''i Sekema; ary ny lohasahan''i Sokota horefesiko;'
mg1865::mg_19::60::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahy Gileada, Ahy koa Manase; ary aron''ny lohako Efraima tehim-panjakako Joda;'
mg1865::mg_19::60::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tavin-dranoko fanasana Moaba; Edoma no anipazako ny kapako; mihobia noho ny amiko, ry Filistia.'
mg1865::mg_19::60::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hitondra ahy ho any an-tanàna mafy? iza no hitarika ahy ho any Edoma?'
mg1865::mg_19::60::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Ianao va, Izay efa nanary anay*, Andriamanitra o. Sady tsy nivoaka niaraka tamin''ny antokon''ny miaramilanay, Andriamanitra o? [*Na: Tsy efa nanary anay va Ianao]'
mg1865::mg_19::60::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo amin''ny mpandrafy izahay; fa zava-poana ny famonjena ataon''ny olona.'
mg1865::mg_19::60::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 60
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no haherezantsika; fa Izy no hanitsakitsaka ny fahavalontsika.'
mg1865::mg_19::61::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangatahan''ny mpanjaka efa nandositra, mba hampodin''Andriamanitra indray. Ho an''ny mpiventy hira'
  verse_text: 'Hampiarahina amin''ny valiha. Nataon''i Davida. Henoy ny fitarainako, Andriamanitra o; tandremo ny fivavako.'
mg1865::mg_19::61::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any am-paran''ny tany no hiantsoako Anao raha reraka ny foko; ento aho ho any amin''ny vatolampy izay avo ka tsy tratro;'
mg1865::mg_19::61::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aroko Ianao sy tilikambo mafy handosirako ny fahavalo.'
mg1865::mg_19::61::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hitoetra ao an-tranonao mandrakizay aho; aoka hialoka ao ambanin''ny fanomban''ny elatrao aho,'
mg1865::mg_19::61::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Andriamanitra o efa nandre ny voadiko; efa nomenao ahy ny lovan''izay matahotra ny anaranao.'
mg1865::mg_19::61::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halavao ny andron''ny mpanjaka; aoka ny taonany hahatratra ny taranaka maro.'
mg1865::mg_19::61::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hitoetra eo anatrehan''Andriamanitra mandrakizay izy; famindram-po sy fahamarinana no tendreo hiaro azy;'
mg1865::mg_19::61::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 61
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia izany no hankalazako ny anaranao mandrakizay, mba hanefako isan''andro ny voadiko.'
mg1865::mg_19::62::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantombenan''ny fanahy izay manantena an''Andriamanitra, na dia mafy aza ny famelin''ny fahavalo. Ho an''ny mpiventy hira'
  verse_text: 'Al-jedotona. Salamo nataon''i Davida. Andriamanitra tokoa no iantombenan''ny fanahiko; avy aminy ny famonjena ahy.'
mg1865::mg_19::62::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy tokoa no vatolampiko sy famonjena ahy, dia fiarovana avo ho ahy ka tsy hangozohozo loatra aho.'
mg1865::mg_19::62::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hirohotanareo hamely olona sy handrodananareo rehetra azy toy ny manda mirona sy ny rova mihozongozona;'
mg1865::mg_19::62::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaina hanongana azy hiala amin''ny voninahiny ireny; lainga no ifaliany, misaotra amin''ny vavany izy, fa manozona amin''ny fony.'
mg1865::mg_19::62::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miantombena amin''Andriamanitra tokoa ianao, ry fanahiko; fa Izy no antenaiko.'
mg1865::mg_19::62::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy tokoa no vatolampiko sy famonjena ahy, dia fiarovana avo ho ahy, ka tsy mba hangozohozo aho.'
mg1865::mg_19::62::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no iankinan''ny famonjena ahy sy ny voninahitro; ny vatolampiko mafy sy ny aroko dia ao amin''Andriamanitra.'
mg1865::mg_19::62::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matokia Azy mandrakariva ianareo, ry olona; loary eo anatrehany ny fonareo; Andriamanitra no aro ho antsika.'
mg1865::mg_19::62::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-poana tokoa ny ambany, ary lainga ny ambony; raha hatao amin''ny mizana izy, dia maivana; zava-poana mihitsy izy.'
mg1865::mg_19::62::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matoky ny fanaovana an-keriny, ary aza miantehitra amin''ny halatra; raha mitombo ny harena, dia aza anorenana ny fonareo.'
mg1865::mg_19::62::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indray mandeha no nitenenan''Andriamanitra; indroa no nandrenesako hoe: an''Andriamanitra ny hery.'
mg1865::mg_19::62::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 62
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Anao koa, ry Tompo o, ny famindram-po, fa Ianao no mamaly ny olona rehetra araka ny asany avy.'
mg1865::mg_19::63::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hetahetan''ny fanahy maniry an''Andriamanitra'
  verse_text: 'Salamo nataon''i Davida, fony tany an''efitr''i Joda izy. ANDRIAMANITRA o, Andriamanitro Ianao; mitady Anao fatratra aho; mangetaheta Anao ny fanahiko, maniry Anao ny nofoko, eto amin''ny tany maina sy mangentana tsy misy rano;'
mg1865::mg_19::63::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no nijereko Anao tao amin''ny fitoerana masina, hahitako ny herinao sy ny voninahitrao.'
mg1865::mg_19::63::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsara noho ny aina ny famindram-ponao; ny molotro hidera Anao.'
mg1865::mg_19::63::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy izany no hisaorako Anao, raha mbola velona koa aho; amin''ny anaranao no hanandratako ny tanako.'
mg1865::mg_19::63::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny voky tsoka sy tavy no hahavokisan''ny fanahiko; ary amin''ny molotra falifaly no hideran''ny vavako Anao.'
mg1865::mg_19::63::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mahatsiaro Anao eo am-pandriako aho, dia mieritreritra Anao amin''ny fiambenan''alina.'
mg1865::mg_19::63::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa namonjy ahy Ianao, ary ao ambanin''ny aloky ny elatrao no hihobiako.'
mg1865::mg_19::63::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifikitra amiko ny fanahiko; manohana ahy ny tananao ankavanana.'
mg1865::mg_19::63::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireny dia mitady ny aiko ka mampidi-doza amin''ny tenany; hiditra any ambanin''ny tany izy;'
mg1865::mg_19::63::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatolotra ho amin''ny herin''ny sabatra izy; ho anjaran''ny amboahaolo* izy. [*volpa]'
mg1865::mg_19::63::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 63
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny mpanjaka hifaly amin''Andriamanitra; ho ravoravo izay rehetra mianiana aminy; fa hakombona ny vavan''izay rehetra mandainga.'
mg1865::mg_19::64::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana an''Andriamanitra hanafaka amin''ny fandrika amam-pitaka ataon''ny olona, sy fanambarana ny havaliny ireny. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Henoy ny feoko, raha mitaraina aho, Andriamanitra o; arovy ny aiko amin''ny tahotro ny fahavalo.'
mg1865::mg_19::64::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afeno aho tsy ho azon''ny firaisan-tetiky ny ratsy fanahy, sy ny fitabataban''ny mpanao ratsy,'
mg1865::mg_19::64::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mandranitra ny lelany ho tahaka ny sabatra, ka mikendry handefa ny zana-tsipïkany, dia teny mangidy.'
mg1865::mg_19::64::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hitifitra mangingina ny mahitsy; mitifitra azy tampoka izy ka tsy matahotra.'
mg1865::mg_19::64::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamafiny ny hevi-dratsiny; mifampitaona hanao fandri-totofana izy ka manao hoe: iza no hahita izany?'
mg1865::mg_19::64::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao saim-petsy izy; omaniny tsara ny sain-dalina voaheviny; lalina ny ao anatin''ny olombelona, dia ny fony.'
mg1865::mg_19::64::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitifitra azy Andriamanitra; tampoka toy ny fiantefan''ny zana-tsipïka no fahavoazany.'
mg1865::mg_19::64::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Apotrany izy ka voasingotra ny lelany ihany; mandositra* izay rehetra mahita azy. [*Na: Mihifikifi-doha]'
mg1865::mg_19::64::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia matahotra ny olona rehetra ka manambara ny ataon''Andriamanitra sady mandinika tsara ny asany.'
mg1865::mg_19::64::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 64
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifaly amin''i Jehovah ny marina ka mialoka aminy; eny, mifaly tena ny mahitsy fo rehetra.'
mg1865::mg_19::65::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny ataony, fa indrindra noho ny anomezany ny vokatry ny tany. Ho an''ny mpiventy hira'
  verse_text: 'Salamo nataon''i Davida. Tonon-kira. Ho anao ny fanginana sy ny fiderana*, Andriamanitra any Ziona o, ary aminao no anefana ny voady. [*Na: Ny fiononana dia fiderana ankasitrahinao]'
mg1865::mg_19::65::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Mpihaino vavaka o, Ianao no hohatonin''ny nofo rehetra.'
mg1865::mg_19::65::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zava-mahameloka ahy dia mihoatra noho izay zakako; nefa Ianao no mamela ny fahadisoanay.'
mg1865::mg_19::65::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay fidinao ka ampanatoninao hitoetra eo an-kianjanao; Te-ho voky ny zava-tsoa ao amin''ny tranonao izahay dia ny zava-masina ao amin''ny tempolinao.'
mg1865::mg_19::65::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-mahatahotra no ataonao amin''ny fahamarinana ho valin''ny vavakay, ry Andriamanitry ny famonjena anay o, ry tokin''ny faran''ny tany rehetra sy ny ranomasina eny lavitra eny.'
mg1865::mg_19::65::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampiorina ny tendrombohitra amin''ny heriny Izy, misikina fahatanjahana Izy.'
mg1865::mg_19::65::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampitsahatra ny firohondrohon''ny onjan-dranomasina Izy, sy ny fitabataban''ny firenena.'
mg1865::mg_19::65::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia matahotra noho ny famantaranao ny mponina any am-paran''ny tany; ny any amin''ny fiposahan''ny maraina sy ny hariva no ampihobinao.'
mg1865::mg_19::65::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamangy ny tany Ianao ka mahamando azy; mampahavokatra azy betsaka Ianao — Ny onin''Andriamanitra dia tondra-drano — Mamboatra vary ho an''ny olona Ianao; fa izany no famboatrao ny tany.'
mg1865::mg_19::65::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahampoka ny tany voasa Ianao ka mampiravona azy; ranonorana mivatravatra no amontosanao azy; mitahy ny fitsimohany Ianao.'
mg1865::mg_19::65::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satrohanao voninahitra ny taona fitahianao; ary ny dianao mitete menaka.'
mg1865::mg_19::65::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonton-drano ny fiandrasana ondry any an''efitra, ary misikina fifaliana ny havoana.'
mg1865::mg_19::65::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 65
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rakotra ondry ny saha; ary voasarona vary ny lohasaha: mihoby izy, eny, mihira koa.'
mg1865::mg_19::66::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana izao rehetra izao hisaotra an''Andriamanitra noho ny nataony ho an''ny mpanompony. Ho an''ny mpiventy hira'
  verse_text: 'Tonon-kira. Salamo. Mihobia ho an''Andriamanitra, ry tany rehetra;'
mg1865::mg_19::66::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà ny voninahitry ny anarany; omeo voninahitra Izy ho fiderana Azy.'
mg1865::mg_19::66::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao amin''Andriamanitra hoe: endrey, mahatahotra ny asanao! ny fahalehibiazan''ny herinao no hikoizan''ny fahavalonao Anao.'
mg1865::mg_19::66::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany rehetra hiankohoka eo anatrehanao ka hankalaza Anao; eny, hankalaza ny anaranao izy.'
mg1865::mg_19::66::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, ka jereo ny asan''Andriamanitra, mahatahotra ny zavatra ataony amin''ny zanak''olombelona.'
mg1865::mg_19::66::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampody ny ranomasina ho tany maina Izy; nandeha an-tongotra nita ny ony ny olona; tao no nifaliantsika tamin*''Andriamanitra. [*Na: Ao no aoka hifaliantsika amin'']'
mg1865::mg_19::66::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manjaka mandrakizay amin''ny heriny Izy, ary ny masony mandinika ny firenen-tsamy hafa; aoka tsy hanandra-tena ny maditra.'
mg1865::mg_19::66::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''Andriamanitsika, ry firenena; ary asandrato ny feo fiderana Azy,'
mg1865::mg_19::66::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampitoetra ny fanahintsika amin''ny fiainana ka tsy mamela ny tongotsika hangozohozo.'
mg1865::mg_19::66::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nizaha toetra anay Ianao, Andriamanitra o; efa nanadio anay Ianao, tahaka ny fanadio volafotsy amin''ny memy.'
mg1865::mg_19::66::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampiditra anay tamin''ny fandrika Ianao; efa nanisy enta-mavesatra teo am-balahanay Ianao.'
mg1865::mg_19::66::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampandeha ny olona hanitsaka ny lohanay Ianao; nandeha namaky ny afo sy ny rano izahay; fa nitondra anay nivoaka ho amin''ny fitahiana mahatretrika Ianao.'
mg1865::mg_19::66::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiditra ao an-tranonao mitondra fanatitra dorana aho; hefaiko aminao ny voadiko,'
mg1865::mg_19::66::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay notononin''ny molotro sy naloaky ny vavako, fony aho azom-pahoriana.'
mg1865::mg_19::66::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hateriko aminao ho fanatitra dorana ny matavy mbamin''ny setroky ny ondrilahy; hanatitra omby sy osilahy aho.'
mg1865::mg_19::66::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, mihainoa ianareo rehetra izay matahotra an''Andriamanitra, fa holazaiko izay nataony ho an''ny fanahiko.'
mg1865::mg_19::66::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no nantsoin''ny vavako; ary ny fanandratana Azy no teo ambanin''ny lelako.'
mg1865::mg_19::66::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nankasitraka* ota tao am-poko aho, dia tsy mba hihaino ny Tompo; [*Hebreo: nijery]'
mg1865::mg_19::66::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa efa nihaino tokoa Andriamanitra; efa nihaino ny feon''ny fivavako Izy.'
mg1865::mg_19::66::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 66
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isorana anie Andriamanitra, izay tsy nandà ny fivavako, na nanaisotra ny famindram-pony tamiko.'
mg1865::mg_19::67::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanirian''ny olo-marina mba hanaiky an''Andriamanitra avokoa ny firenena rehetra. Ho an''ny mpiventy hira'
  verse_text: 'Hampiarahina amin''ny valiha. Salamo. Tonon-kira. Andriamanitra anie hamindra fo aminay sy hitahy anay; hampamirapiratra ny tavany aminay anie Izy;'
mg1865::mg_19::67::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba ho fantatra ety ambonin''ny tany ny lalanao sy ny famonjenao any amin''ny jentilisa rehetra.'
mg1865::mg_19::67::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao ny firenena, Andriamanitra o; eny, hidera Anao ny firenena rehetra.'
mg1865::mg_19::67::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hifaly sy hihoby ny firenentsamy hafa, Satria mitsara marina ny firenena Ianao; ny firenen-tsamy hafa ambonin''ny tany dia entinao;'
mg1865::mg_19::67::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao ny firenena, Andriamanitra o; eny, hidera Anao ny firenena rehetra.'
mg1865::mg_19::67::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany efa nahavokatra; mitahy antsika Andriamanitra, dia Andriamanitsika.'
mg1865::mg_19::67::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 67
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitahy antsika Andriamanitra; ary hatahotra Azy ny vazan-tany rehetra.'
mg1865::mg_19::68::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fankalazana an''Andriamanitra noho ny fitondrany ny Isiraely sy ny fandreseny ny fahavalony. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Tonon-kira. Aoka hitsangana Andriamanitra, ka hiely ny fahavalony; ary aoka izay mankahala Azy handositra ny tavany.'
mg1865::mg_19::68::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fanely setroka no fanelinao azy; tahaka ny fiempon''ny savoka eo anoloan''ny afo no aoka hahalevonan''ny ratsy fanahy eo anatrehan''Andriamanitra.'
mg1865::mg_19::68::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny marina mifaly; eny, ravoravo eo anatrehan''Andriamanitra izy ka faly tokoa.'
mg1865::mg_19::68::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihirà ho an''Andriamanitra, mankalazà ny anarany; manamboara lalana ho an''izay mitaingina mamaky ny efitra Jehovah no anarany ary mifalia eo anatrehany.'
mg1865::mg_19::68::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rain''ny kamboty sy Mpanome rariny ny mpitondratena Andriamanitra, ao amin''ny fonenany masina.'
mg1865::mg_19::68::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra mampitoetra an-trano izay irery tena; mamoaka ny mpifatotra ho amin''ny fanambinana Izy; fa ny maditra hitoetra amin''ny tany karankaina.'
mg1865::mg_19::68::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, raha nandeha teo alohan''ny olonao Ianao ka namaky ny efitra,'
mg1865::mg_19::68::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihorohoro ny tany, ary nitaitaika ny lanitra, tamin''ny fanatrehan''Andriamanitra, na iry Sinay iry aza tamin''ny fanatrehan''Andriamanitra, Andriamanitry ny Isiraely.'
mg1865::mg_19::68::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ranonoram-pitahiana no nalatsakao tamin''ny lovanao, Andriamanitra o; ary raha kotra izy, dia novelombelominao.'
mg1865::mg_19::68::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olonao* tamàn-toerana teo; mamboatra ho an''ny ory araka ny fahasoavanao Ianao, Andriamanitra o. [*Hebreo: bibinao]'
mg1865::mg_19::68::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Tompo manome ny teny; ary ny vehivavy mpilaza soa dia antokony lehibe.'
mg1865::mg_19::68::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo mpanjaka be miaramila dia vaky mandositra; ary ny vehivavy izay mitoetra ao an-trano no mizara ny babo.'
mg1865::mg_19::68::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandry eo amin''ny vala ianareo, dia ho tahaka ny ela-boromailala miravaka volafotsy, ary ny volony miravaka volamena tsara'
mg1865::mg_19::68::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha aelin''ny Tsitoha eo ny mpanjaka maro, dia latsaka ny oram-panala ao Zalmona.'
mg1865::mg_19::68::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tendrombohitr''Andriamanitra ny tendrombohitr''i Basana. Tendrombohitra maro tampona ny tendrombohitr''i Basana.'
mg1865::mg_19::68::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry tendrombohitra maro tampona, nahoana ianareo no mihendry ny tendrombohitra izay tian''Andriamanitra hitoerany? eny, hitoetra ao mandrakizay Jehovah.'
mg1865::mg_19::68::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kalesin''Andriamanitra dia roa alina, eny, arivo arivo; ny Tompo no eo aminy; Sinay dia eo amin''ny itoerana masina*. [*Na: amin''ny fahamasinana]'
mg1865::mg_19::68::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa niakatra ho any amin''ny avo Ianao ka mitondra babo; efa nandray fanomezana teo amin''ny olombelona Ianao — eny, teo amin''ny maditra aza, - mba hitoeran''i Jehovah Andriamanitra any*. [*Na: ao aminy; na: mba hitoeranao any, ry Jehovah Andriamanitra; na: Efa nandray olona ho fanomezana Ianao Eny, na dia ny maditra aza mba hitoeranay ao amin''i Jehovah Andriamanitra]'
mg1865::mg_19::68::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie ny Tompo Izay mitondra ny entan-tsika isan''andro isan''andro*, eny, Andriamanitra Izay famonjena antsika. [*Na: Isaorana isan''andro isan''andro anie ny Tompo; Raha misy mahavesatra antsika, dia Andriamanitra no famonjena antsika; na: Isaorana anie ny Tompo, Izay mampitondra entana antsika isan''andro isan''andro]'
mg1865::mg_19::68::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no Andriamanitry ny famonjena ho antsika; ary an''i Jehovah Tompo ny fanafahana amin''ny fahafatesana.'
mg1865::mg_19::68::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra mamely mafy ny lohan''ny fahavalony, dia ny tampon-doha lava volo an''izay mandroso amin''ny fahadisoany.'
mg1865::mg_19::68::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazain''ny Tompo hoe: hampody ny any Basana Aho; hampody ny amin''ny ranomasina lalina Aho,'
mg1865::mg_19::68::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hampihosenanao rà ny tongotrao, ary ho anjaran''ny lelan''ny amboanao ny fahavalo.'
mg1865::mg_19::68::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hita ny fandehananao, Andriamanitra o, dia ny fandehanan''Andriamanitro, Mpanjakako, ao amin''ny fitoerana masina*. [*Na: amin''ny fahamasinana]'
mg1865::mg_19::68::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialoha ny mpihira, ary manaraka ny mpitendry valiha, eo afovoan''ny zatovovavy mively ampongatapaka.'
mg1865::mg_19::68::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''Andriamanitra eo amin''ny fiangonana, eny, misaora ny Tompo, ianareo ary amin''ny loharanon''ny Isiraely.'
mg1865::mg_19::68::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indry Benjamina kely, mpanapaka azy, ny antokon''ny mpanapaka ny Joda, ny mpanapaka ny Zebolona sy ny mpanapaka ny Naftaly.'
mg1865::mg_19::68::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitrao no nampahery anao; Ry Andriamanitra Izay miasa ho anay o, asehoy ny herinao.'
mg1865::mg_19::68::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho* ny tempolinao eo an-tampon''i Jerosalema, no hitondran''ny mpanjaka maro fanatitra ho Anao. [*Na: Avy amin'']'
mg1865::mg_19::68::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teneno mafy ny biby eny anaty zozoro sy ny fivorian''ny ombilahy mbamin''ireo vahoaka zanak''omby, dia izay miankohoka manatitra anja-bolafotsy aelezo ny olona tia ady'
mg1865::mg_19::68::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho avy ny tremalahin''i Egypta; Etiopia halaky hananty tanana amin''Andriamanitra.'
mg1865::mg_19::68::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry fanjakana ambonin''ny tany, mihirà ho an''Andriamanitra; mankalazà ny Tompo,'
mg1865::mg_19::68::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ilay mitaingina ny lanitry ny lanitra izay hatry ny fahagola; Indro, mamoaka ny feony Izy, dia feo mahery.'
mg1865::mg_19::68::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ekeo ho an''Andriamanitra ny hery; ambonin''ny Isiraely ny voninahiny, ary ny heriny any amin''ny lanitra.'
mg1865::mg_19::68::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 68
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatahotra Ianao, Andriamanitra o, ao amin''ny fitoeranao masina; Andriamanitry ny Isiraely no manome hery sy tanjaka ho an''ny olona. Isaorana anie Andriamanitra.'
mg1865::mg_19::69::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainan''izay nenjehina sy nampahorina noho ny amin''Andriamanitra. Ho an''ny mpiventy hira'
  verse_text: 'Al-shoshanim. Nataon''i Davida. Vonjeo aho, Andriamanitra o; fa efa mihatra amin''ny aiko ny rano.'
mg1865::mg_19::69::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milentika amin''ny fotaka mandrevo aho, ka tsy misy hifaharana; efa miditra amin''ny rano lalina aho, ka mandifotra ahy ny riaka.'
mg1865::mg_19::69::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sasatry ny mitaraina aho, maimay ny tendako; pahina ny masoko, raha miandry an''Andriamanitro aho.'
mg1865::mg_19::69::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro noho ny volon-dohako ny isan''izay mankahala ahy tsy ahoan-tsy ahoana; mahery izay ta-hahafaty ahy, dia ny fahavaloko tsy ahoan-tsy ahoana; mampanonitra ahy izay tsy nalaiko izy.'
mg1865::mg_19::69::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, Ianao mahalala ny hadalako; ary ny heloko tsy mba miafina aminao.'
mg1865::mg_19::69::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy ho menatra noho ny amiko izay miandry Anao, Jehovah, Tompon''ny maro o; aoka tsy ho very hevitra noho ny amiko izay mitady Anao, ry Andriamanitry ny Isiraely o.'
mg1865::mg_19::69::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa noho ny aminao no itondrako latsa; safotry ny henatra ny tavako.'
mg1865::mg_19::69::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa vahiny amin''ny rahalahiko aho; eny, efa olon-ko azy amin''ny zanak''ineny aho.'
mg1865::mg_19::69::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny firehetako ny amin''ny tranonao no naharitra aina ahy; ary ny latsa nataon''izay nandatsa Anao dia nihatra tamiko.'
mg1865::mg_19::69::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitomany sady nifady hanina aho, dia natao latsa ho ahy izany.'
mg1865::mg_19::69::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lamba fisaonana no nataoko fitafiako, dia efa ambentin-teny tamin''ireny aho.'
mg1865::mg_19::69::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miresaka ahy izay mipetraka eo am-bavahady; ary ataon''ny mpisotro toaka an-kira aho.'
mg1865::mg_19::69::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho hivavaka aminao amin''ny andro fankasitrahana, Jehovah o, dia aminao , Andriamanitra o noho ny haben''ny famindram-ponao; valio aho araka ny hamarinan''ny famonjenao.'
mg1865::mg_19::69::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afaho amin''ny fotaka aho, ka aza avela hilentika; vonjeo aho amin''izay mankahala ahy sy amin''ny rano lalina.'
mg1865::mg_19::69::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hanafotra ahy ny rano mandriaka, na hitelina ahy ny lalina; ary aza avela hikatom-bava amiko ny lavaka fantsakana.'
mg1865::mg_19::69::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Valio aho, Jehovah o, fa tsara ny famindram-ponao; todiho aho araka ny haben''ny fiantranao.'
mg1865::mg_19::69::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza manafina ny tavanao amin''ny mpanomponao; fa azom-pahoriana aho, koa faingàna hamaly ahy Ianao.'
mg1865::mg_19::69::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatony ny fanahiko, avoty izy; Eny, vonjeo aho noho ny ataon''ny fahavaloko.'
mg1865::mg_19::69::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no mahalala ny latsa mihatra amiko ary ny fahamenarako sy ny fahafaham-boninahitro; Eo anatrehanao ny mpandrafy ahy rehetra.'
mg1865::mg_19::69::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny latsa dia nanorotoro ny foko ka reraka indrindra aho; ary niandry antra aho, fa tsy nisy, sy mpanony fa tsy nahita.'
mg1865::mg_19::69::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa zava-mangidy no nomeny ho haniko; ary vinaingitra no natolony ahy hosotroina, raha nangetaheta aho.'
mg1865::mg_19::69::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fandrika ho azy ny latabany eo anoloany; eny, ho tonta ho an''ny tsy manana ahiahy.'
mg1865::mg_19::69::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho jamba ny masony mba tsy hahita; ary ampangozohozoy mandrakariva ny valahany.'
mg1865::mg_19::69::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aidino aminy ny fahatezeranao; ary aoka hahatratra azy ny firehetan''ny fahaviniranao.'
mg1865::mg_19::69::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho foana ny tobiny; aza avela hisy hitoetra ao an-dainy.'
mg1865::mg_19::69::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay nasianao no nenjehiny; Ary ny fahararian''ny voatsindronao dia lazalazainy.'
mg1865::mg_19::69::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiampy ny helony; ary aoka tsy hiditra amin''ny fahamarinanao izy.'
mg1865::mg_19::69::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hovonoina tsy ho eo amin''ny bokin''ny velona ny anarany, ary aoka tsy hosoratana eo amin''ny marina.'
mg1865::mg_19::69::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho dia ory sy mahantra, Andriamanitra o; aoka ny famonjenao no hanandratra ahy.'
mg1865::mg_19::69::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hankalaza ny anaran''Andriamanitra amin''ny fihirana aho, ary hidera Azy amin''ny fisaorana.'
mg1865::mg_19::69::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho sitrak''i Jehovah Izany mihoatra noho ny vantotr''ombilahy, izay manan-tandroka sady mivaky kitro.'
mg1865::mg_19::69::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahita izany ny mpandefitra ka ho faly; aoka ho velona ny fonareo, ry mpitady an''Andriamanitra.'
mg1865::mg_19::69::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mihaino ny malahelo Jehovah, ary ny olony mifatotra tsy mba hamavoiny.'
mg1865::mg_19::69::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera Azy ny lanitra sy ny tany, ny ranomasina sy izay rehetra mihetsika ao aminy.'
mg1865::mg_19::69::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra hamonjy an''i Ziona sady hanangana ny tanànan''ny Joda; ary hitoetra ao ny olony ka ho tompony;'
mg1865::mg_19::69::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 69
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia handova azy ny taranaky ny mpanompony; ary hitoetra ao izay tia ny anarany.'
mg1865::mg_19::70::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 70
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangataham-pamonjena. Ho an''ny mpiventy hira. Nataon''i Davida.'
  verse_text: 'Ho fampahatsiarovana. Andriamanitra o, faingàna hanafaka ahy; Jehovah o, faingàna hamonjy ahy.'
mg1865::mg_19::70::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 70
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra sy hangaihay izay mitady ny aiko; aoka hiamboho sy ho afa-baraka izay faly amin''ny manjo ahy;'
mg1865::mg_19::70::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 70
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiamboho noho ny fahamenarany izay manao hoe: Hià! sakoa izay!'
mg1865::mg_19::70::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 70
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hifaly sy ho ravoravo aminao izay rehetra mitady Anao; ary aoka izay tia ny famonjenao hanao mandrakariva hoe: hankalazaina anie Andriamanitra.'
mg1865::mg_19::70::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 70
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho dia ory sy malahelo; faingàna hankaty amiko, Andriamanitra o; Mpamonjy sy Mpanafaka ahy Ianao; aza ela, Jehovah o.'
mg1865::mg_19::71::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka ataon''izay mahatsiaro ny famindram-pon''Andriamanitra taminy hatry ny fony tanora'
  verse_text: 'Ianao, Jehovah o, no itokiako; aoka tsy ho menatra mandrakizay aho.'
mg1865::mg_19::71::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo ny fahamarinanao aho, ka afaho; atongilano amiko ny sofinao, ka vonjeo aho.'
mg1865::mg_19::71::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho vatolampy fonenana hohatoniko mandrakariva Ianao, Izay efa nandidy hamonjy ahy; fa harambatoko sy batery fiarovana ho ahy Ianao.'
mg1865::mg_19::71::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro o, afaho amin''ny tanan''ny ratsy fanahy aho, dia amin''ny tanan''ny mpanao meloka sy ny lozabe.'
mg1865::mg_19::71::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no fanantenako, Jehovah Tompo o, ry tokiko hatry ny fony aho mbola tanora.'
mg1865::mg_19::71::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no nanankinana ahy hatrany am-bohoka; ianao namoaka* ahy avy tany an-kibon-dreniko; ianao no deraiko mandrakariva. [*Na: no Mpiaro, na Mpanisy soa, ahy hatry, etc]'
mg1865::mg_19::71::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga toa zava-mahagaga eo imason''ny maro aho; nefa Ianao no fiarovana mafy ho ahy.'
mg1865::mg_19::71::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavako ho feno ny fideràna Anao sy ny fankalazana Anao mandrakariva.'
mg1865::mg_19::71::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manary ahy, rehefa antitra aho; ary aza mahafoy ahy, rehefa ketraka ny heriko.'
mg1865::mg_19::71::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miresaka ahy ny fahavaloko; ary miara-mioko izay manotrika hahazo ny aiko.'
mg1865::mg_19::71::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka manao hoe: Andriamanitra efa nahafoy azy; enjeho izy, ka sambory, fa tsy misy hamonjy.'
mg1865::mg_19::71::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, aza manalavitra ahy; Andriamanitro o, faingana hamonjy ahy.'
mg1865::mg_19::71::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra sy ho levona ny mpanohitra ny fanahiko; aoka hitafy henatra sy fahafaham-baraka izay mitady hanisy ratsy ahy.'
mg1865::mg_19::71::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho kosa dia hanantena mandrakariva, ary hitombo lalandava ny fideràko Anao.'
mg1865::mg_19::71::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavako hitory ny fahamarinanao sy ny famonjenao mandrakariva, fa tsy fantatro ny isany.'
mg1865::mg_19::71::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho entiko ny asa lehibe nataon''i Jehovah Tompo; hampahatsiaro ny fahamarinanao aho, dia ny Anao ihany.'
mg1865::mg_19::71::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, Ianao efa nampianatra ahy hatry ny fony aho mbola tanora; ary mandraka ankehitriny dia nitory ny fahagaganao aho.'
mg1865::mg_19::71::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mandra-pahantitro sy fotsy volo, dia aza mahafoy ahy, Andriamanitra o, mandra-pilazako ny sandrinao amin''ny taranaka sy ny asanao lehibe amin''izay rehetra mbola ho avy.'
mg1865::mg_19::71::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mihatra amin''izay avo indrindra ny fahamarinanao, Andriamanitra o, Izay nanao zava-dehibe: Andriamanitra o, iza no tahaka Anao?'
mg1865::mg_19::71::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao Izay nampahita ahy* fahoriana be sady mafy no hamelona ahy* indray, ka hampiakatra ahy* indray hiala amin''ny fitoerana lalina amin''ny tany. [*Na: anay]'
mg1865::mg_19::71::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampitomboy ny voninahitro, ary aoka hampionona ahy indray Ianao.'
mg1865::mg_19::71::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho kosa hidera Anao amin''ny valiha, dia ny fahamarinanao, Andriamanitro; hankalaza Anao amin''ny lokanga aho, ry Iray Masin''ny Isiraely o.'
mg1865::mg_19::71::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihoby ny molotro raha mankalaza Anao; ny fanahiko koa izay efa navotanao;'
mg1865::mg_19::71::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 71
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lelako hitory ny fahamarinanao mandrakariva; fa efa menatra sy mangaihay izay mitady hanisy ratsy ahy.'
mg1865::mg_19::72::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handrosoan''ny fanjakan''ny mpanjaka voatendrin''Andriamanitra'
  verse_text: 'Nataon''i Solomona. Andriamanitra o, omeo ho an''ny mpanjaka ny fitsarànao, ary ho an''ny zanaky ny mpanjaka ny fahamarinanao.'
mg1865::mg_19::72::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsara* ny olonao amin''ny fahamarinana izy. Ary ny malahelonao amin''ny fahitsiana. [*Na: Aoka, etc]'
mg1865::mg_19::72::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tendrombohitra hahavokatra fiadanana ho an''ny olona, eny, ny havoana koa amin''ny fahamarinana.'
mg1865::mg_19::72::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsara* ny olona ory izy sy hamonjy ny zanaky ny mahantra ary hanorotoro ny mpampahory. [*Na: Aoka, etc]'
mg1865::mg_19::72::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatahotra* anao ny olona, raha mbola maharitra koa ny masoandro sy ny volana hatramin''ny taranaka fara mandimby. [*Na: Aoka, etc]'
mg1865::mg_19::72::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidina* tahaka ny ranonorana amin''ny saha voajinja izy, tahaka ny ranonorana mivatravatra amin''ny tany. [*Na: Aoka, etc]'
mg1865::mg_19::72::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny* marina hitrebona amin''ny androny, ary ho be ny fiadanana mandra-paha-tsy hisy volana intsony. [*Na: Aoka, etc]'
mg1865::mg_19::72::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanjaka hatramin''ny ranomasina ka hatramin''ny ranomasina izy, ary hatramin''ny ony* ka hatramin''ny faran''ny tany. [*Eofrata]'
mg1865::mg_19::72::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mponina any an''efitra handohalika eo anatrehany; ary ny fahavalony hilelaka ny vovoka.'
mg1865::mg_19::72::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjakan''i Tarsisy sy ny nosy handoa hetra; ny mpanjakan''i Sheba sy Seba hanatitra fanomezana.'
mg1865::mg_19::72::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka rehetra hiankohoka eo anatrehany; ny firenena rehetra hanompo azy.'
mg1865::mg_19::72::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hamonjy ny mahantra mitaraina izy sy ny ory tsy manan-kamonjy;'
mg1865::mg_19::72::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiantra ny reraka sy ny malahelo izy ary hamonjy ny fanahin''ny malahelo.'
mg1865::mg_19::72::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanavotra ny fanahiny amin''ny fampahoriana sy ny fanaovana an-keriny izy; ary ho zava-dehibe eo imasony ny ràny.'
mg1865::mg_19::72::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho velona ireny ka hanome azy* volamena avy any Sheba, ary hanao fifonana ho azy mandrakariva, izy, ary isan''andro no hisaorany azy. [*Na: Dia ho velona Izy ka homena]'
mg1865::mg_19::72::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahavoka-bary betsaka ny tany na dia any an-tampon''ny tendrombohitra aza; hirondrona tahaka ny any Libanona ny fahavokarany; ary ny ao an-tanàna hidokadoka tahaka ny ahitra amin''ny tany.'
mg1865::mg_19::72::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho mandrakizay ny anarany; raha mbola maharitra koa ny masoandro, dia hanorobona ny anarany; ary izy ho fitahiana ny olona; ny firenena rehetra hanao azy ho sambatra*. [*Izaho Genesisy 22:18]'
mg1865::mg_19::72::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah Andriamanitra, Andriamanitry ny Isiraely; Izy irery ihany no manao fahagagana;'
mg1865::mg_19::72::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary isaorana mandrakizay anie ny anarany malaza; ary aoka ny tany rehetra ho henika ny voninahiny. Amena dia Amena.'
mg1865::mg_19::72::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 72
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tapitra ny fivavak''i Davida, zanak''i Jese.'
mg1865::mg_19::73::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 1
  verse_date_revised: null
  verse_title: 'BOKY FAHATELO, Ny amin''ny tsy hahaketraka ny olon''Andriamanitra, raha mahita ny ratsy fanahy ambinina'
  verse_text: 'Salamo nataon''i Asafa. Andriamanitra mahasoa ny Isiraely tokoa, dia ny madio fo.'
mg1865::mg_19::73::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho, dia saiky nibolasitra ny tongotro; saiky solafaka ny diako,'
mg1865::mg_19::73::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nialona ny mpirehareha aho, raha nahita ny fiadanan''ny ratsy fanahy.'
mg1865::mg_19::73::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy misy fanaintainana amin''ny fahafatesany, ary fatratra ny heriny.'
mg1865::mg_19::73::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba misy manavesatra azy, tahaka ny olona sasany, ary tsy mba azom-pahoriana tahaka ny olon-kafa izy.'
mg1865::mg_19::73::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izany no iambozonany rehareha toy ny rojo, sy itafiany fahalozàna tahaka ny lamba.'
mg1865::mg_19::73::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Bongon-tavy ny masony; miloatra ny hevitry ny fony.'
mg1865::mg_19::73::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manazimbazimba izy ka miresaka fampahoriana an-dolom-po; avo vava izy.'
mg1865::mg_19::73::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao vava manakatra ny lanitra izy, ary ny lelany mandeha mitety ny tany.'
mg1865::mg_19::73::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no itodihan''ny olony hankany aminy; ary rano be no gohin''ireny;'
mg1865::mg_19::73::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy izy: Hataon''Andriamanitra ahoana no fahalala? ary manam-pahalalana va ny Avo Indrindra?'
mg1865::mg_19::73::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, ireny dia olona ratsy fanahy; miadana mandrakariva izy ka mitombo harena.'
mg1865::mg_19::73::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Foana mihitsy ny nanadiovako ny foko sy ny nanasàko ny tanako tamin''ny fahamarinana.'
mg1865::mg_19::73::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azom-pahoriana mandritra ny andro aho, ary faizana isa-maraina.'
mg1865::mg_19::73::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tahiny aho nanao hoe: Hiteny izany aho, dia ho namitaka ireo zanakao.'
mg1865::mg_19::73::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nieritreritra ta-hahalala izany zavatra izany aho, kanjo sarotra teo imasoko izany.'
mg1865::mg_19::73::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-piditro tao amin''ny fitoera-masin''Andriamanitra ka nihevitra izay ho farany.'
mg1865::mg_19::73::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo amin''izay mahasolafaka tokoa no ametrahanao azy, ary aripakao ho ringana izy.'
mg1865::mg_19::73::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hià! rava indray mipi-maso izy! levona izy, matin-java-mahatahotra izy!'
mg1865::mg_19::73::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny anaovan''ny olona ny nofiny ho tsinontsinona, dia tahaka izany, Tompo o, no anaovanao ny endrik''ireny ho tsinontsinona, raha mifoha Ianao.'
mg1865::mg_19::73::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha lotika ny foko, ka voatsindrona ny voako,'
mg1865::mg_19::73::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ketrina aho ka tsy nahalala; eny, biby* teo anatrehanao aho. [*Na: hipopotamosy]'
mg1865::mg_19::73::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izaho dia eo aminao ihany mandrakariva, mihazona ny tanako ankavanana Ianao.'
mg1865::mg_19::73::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny saina omenao no hitondranao ahy, ary rehefa afaka izany, dia horaisinao ho amin''ny voninahitra aho.'
mg1865::mg_19::73::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no ahy any an-danitra? ary tsy misy ety ambonin''ny tany iriko tahaka Anao.'
mg1865::mg_19::73::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia levona aza ny nofoko sy ny foko, dia mbola vatolampin''ny foko sy anjarako mandrakizay Andriamanitra.'
mg1865::mg_19::73::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, very izay lavitra Anao; aringanao izay rehetra mijangajanga mahafoy Anao.'
mg1865::mg_19::73::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 73
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, izaho, dia ny ho akaikin''Andriamanitra no mahatsara ahy; Ianao, Jehovah Tompo o, no nataoko aroko, mba hilaza ny asanao rehetra aho.'
mg1865::mg_19::74::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana tamin''Andriamanitra, satria mafy ny fanenjehana, sady nosimbàna ny tempoly'
  verse_text: 'Maskila nataon''i Asafa. Andriamanitra o, nahoana no nanary anay mandrakizay Ianao, sady manetroka amin''ny ondry fiandrinao ny fahatezeranao?'
mg1865::mg_19::74::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny fiangonanao izay efa azonao fahiny, ilay navotanao ho firenena lovanao, dia ny tendrom-bohitra Ziona izay nonenanao.'
mg1865::mg_19::74::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aingao ny tongotrao, ka miakara ho amin''ny voarava mandrakizay; ny zavatra rehetra tao amin''ny fitoerana masina dia simban''ny fahavalo avokoa.'
mg1865::mg_19::74::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nierona tao anatin''ny fiangonanao ny mpandrafy anao; nanangana ny sainany ho famantarana izy.'
mg1865::mg_19::74::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fijery azy dia tahaka ny olona manainga famaky hijinja ny ala mikitroka;'
mg1865::mg_19::74::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izao ny rafitra misoratra rehetra ao dia asiany ny famaky sy ny kanonta.'
mg1865::mg_19::74::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nandoro ny fitoeranao masina tamin''ny afo izy; nolotoiny sy nazerany tamin''ny tany* ny fonenan''ny anaranao. [*Hebreo: Nolotoiny hatramin''ny tany]'
mg1865::mg_19::74::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy tam-pony: aoka hampahorintsika avokoa izy. Efa nandoro ny tranon''Andriamanitra eran''ny tany rehetra izy.'
mg1865::mg_19::74::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hitanay ny famantaranay tsy misy mpaminany intsony ary tsy misy aminay mahalala izay mbola haharetan''izao.'
mg1865::mg_19::74::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana, Andriamanitra o, no hanaratsian''ny mpandrafy? Hanamavo ny anaranao mandrakizay va ny fahavalo?'
mg1865::mg_19::74::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no mampihemotra ny tananao, dia ny tananao ankavanana, Ianao? mampialà azy amin''ny tratranao, ka mandringàna.'
mg1865::mg_19::74::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra no Mpanjakako hatrizay hatrizay; manao famonjena eny amin''ny tany Izy.'
mg1865::mg_19::74::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampisaraka ny ranomasina tamin''ny herinao Ianao; efa namakivaky ny lohan''ny dragona tao anaty rano Ianao.'
mg1865::mg_19::74::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao nanorotoro ny lohan''ny mamba ka nanome azy hohanin''izay firenena any an''efitra.'
mg1865::mg_19::74::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao namaky ny vatolampy hamoaka loharano sy ony; Ianao nahatankina ny ony tsy mety ritra.'
mg1865::mg_19::74::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anao ny andro, Anao koa ny alina; Ianao namboatra ny fanazavana, indrindra fa ny masoandro.'
mg1865::mg_19::74::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao nametra ny faritry ny tany rehetra; ny fahavaratra sy ny ririnina, dia Ianao no nanao azy.'
mg1865::mg_19::74::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy izao: Manaratsy an''i Jehovah ny fahavalo, ary ny olona adala manamavo ny anaranao.'
mg1865::mg_19::74::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manolotra ny ain''ny voromailalanao ho an''ny bibi-dia; ary aza manadino mandrakizay ny ain''ny olo-mahantranao.'
mg1865::mg_19::74::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hevero ny fanekena; fa feno fonenan''ny fandozana ny fitoera-maizina amin''ny tany.'
mg1865::mg_19::74::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hiverina amin-kenatra ny mahantra; aoka ny ory sy ny malahelo hidera ny anaranao.'
mg1865::mg_19::74::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Andriamanitra o, efao ny adinao; tsarovy ny fanaratsian''ny adala Anao isan''andro.'
mg1865::mg_19::74::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 74
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manadino ny feon''ny rafinao, dia ny fitabataban''ny mpanohitra Anao, izay miakatra mandrakariva.'
mg1865::mg_19::75::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahakaikin''ny Mpitsara, sy ny kapoaky ny fahatezerany. Ho an''ny mpiventy hira'
  verse_text: 'Al-tasheth. Salamo nataon''i Asafa. Tonon-kira. Hisaoranay Ianao, Andriamanitra o; eny, hisaoranay Ianao; fa akaiky ny anaranao; mitory ny fahagagana ataonao ny olona.'
mg1865::mg_19::75::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ho avy tokoa amin''ny fotoana Aho; eny, Izaho no hitsara marina.'
mg1865::mg_19::75::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihorohoro ny tany sy ny mponina rehetra eo aminy, nefa Izaho no nanorina ny andriny.'
mg1865::mg_19::75::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho tamin''ny mpirehareha: aza mirehareha*, ary tamin''ny ratsy fanahy: aza manandra-tandroka; [*Na: Hoy izaho tamin''ny adala: Aza manao adala]'
mg1865::mg_19::75::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manandratra ny tandrokareo ho avo; ary aza miteny sahisahy amin''ny fahamafian-katoka.'
mg1865::mg_19::75::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy avy any atsinanana, na avy any andrefana, na avy any atsimo, ny fisandratana*. [*Na: Na avy amin''ny efitra ny tendrombohitra no ihavian''ny fitsarana]'
mg1865::mg_19::75::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra no Mpitsara; mampietry ny anankiray Izy ary manandratra ny anankiray kosa.'
mg1865::mg_19::75::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy kapoaka eo an-tanan''i Jehovah, feno divay mandroatra* miharoharo zavatra iny, ka ampisotroany; eny, ny ratsy fanahy rehetra amin''ny tany dia hitroka ny faikany. [*Na: mena]'
mg1865::mg_19::75::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho hanambara izany mandrakizay, ka hankalaza an''Andriamanitr''i Jakoba.'
mg1865::mg_19::75::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 75
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tandroky ny ratsy fanahy rehetra hotapahiko; fa ny tandroky ny marina kosa no hasandratra.'
mg1865::mg_19::76::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny nisehoan''ny fitsarany marina. Ho an''ny mpiventy hira'
  verse_text: 'Hampiarahina amin''ny valiha. Salamo nataon''i Asafa. Tonon-kira. Andriamanitra dia fantatra eo amin''ny Joda; malaza eo amin''ny Isiraely ny anarany;'
mg1865::mg_19::76::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naoriny ao Salema ny tranolainy, ary any Ziona ny fonenany.'
mg1865::mg_19::76::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo no nanapatapahany ny zana-tsipïka manelatra, sy ny ampinga sy ny sabatra ary ny fiadiana.'
mg1865::mg_19::76::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamirapiratra Ianao sady be voninahitra miseho avy any amin*''ny tendrombohitra fitohàna. [*Na: noho]'
mg1865::mg_19::76::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voababo ny mahery fo; renoky ny torimasony izy; ary samy ankona tsy nahahetsika* ny tanany avokoa ny olo-mahery rehetra. [*Hebreo: nahita]'
mg1865::mg_19::76::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny teny mafy nataonao, ry Andriamanitr''i Jakoba, dia sondrian-tory ny kalesy sy ny soavaly.'
mg1865::mg_19::76::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no mahatahotra; ka iza no mahajanona eo anatrehanao, rehefa miseho ny fahatezeranao?'
mg1865::mg_19::76::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tany an-danitra no nampandrenesanao fitsaràna. Raiki-tahotra ny tany ka sina,'
mg1865::mg_19::76::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha nitsangana hitsara Andriamanitra mba hamonjy ny mpandefitra rehetra ambonin''ny tany.'
mg1865::mg_19::76::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fahatezeran''ny olona hidera Anao tokoa; ny fahatezerana sisa dia isikinanao.'
mg1865::mg_19::76::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivoadia, ka efao ny voadinareo amin''i Jehovah Andriamanitrareo; aoka izay rehetra manodidina Azy hitondra fanatitra ho an''Izay mahatahotra.'
mg1865::mg_19::76::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 76
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manapaka ny reharehan''ny lehibe Izy sady tahotry ny mpanjakan''ny tany.'
mg1865::mg_19::77::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahatsiarovana ny amin''ny taon-dasa ho enti-mampionona ny fo, raha mila ho reraka. Ho an''ny mpiventy hira'
  verse_text: 'Al-jedotona. Salamo nataon''i Asafa. Ny feoko dia mankany amin''Andriamanitra, ka mitaraina aho; eny, ny feoko mankany amin''Andriamanitra, ka mihaino ahy Izy.'
mg1865::mg_19::77::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro fahoriako no nitadiavako ny Tompo; ny tanako nasandratra nony alina ka tsy vizana; ny fanahiko tsy nety nampiononina.'
mg1865::mg_19::77::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ta-hahatsiaro an''Andriamanitra aho, ka dia nisento; te-hieritreritra aho, ka dia reraka ny fanahiko.'
mg1865::mg_19::77::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampiari-tory ny masoko Ianao; mitebiteby aho ka tsy mahateny.'
mg1865::mg_19::77::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihevitra ny andro fahiny aho, dia ny taon-dasa ela.'
mg1865::mg_19::77::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ta-hahatsiaro ny nitendreko valiha tamin''ny alina aho; te-hidinidinika amin''ny foko aho, ary ny fanahiko nanontany mafy hoe:'
mg1865::mg_19::77::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanary mandrakizay va ny Tompo? Tsy hankasitraka intsony va Izy?'
mg1865::mg_19::77::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nitsahatra mandrakizay va ny famindram-pony? Efa tapitra mandrakizay va ny teniny?'
mg1865::mg_19::77::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanadino hamindra fo va Andriamanitra? Efa nohidiany an-katezerana va ny fiantràny?'
mg1865::mg_19::77::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho: Izao no mahararirary ny foko, dia ny niovan*''ny tanana ankavanan''ny Avo Indrindra. [*Na: Nefa tsarovako ny taon'']'
mg1865::mg_19::77::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampahatsiaro ny asan''i Jehovah aho, fa ta-hahatsiaro ny fahagagana nataonao fony taloha;'
mg1865::mg_19::77::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny hisaina ny asanao rehetra aho, ary hihevitra ny nataonao.'
mg1865::mg_19::77::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, amin''ny fitoerana masina* ny lalanao; iza no andriamani-dehibe tahaka an''Andriamanitra? [*Na: amin''ny fahamasinana]'
mg1865::mg_19::77::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no Andriamanitra Izay manao fahagagana; efa nampahalala ny herinao teny amin''ny firenena Ianao.'
mg1865::mg_19::77::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Navotan''ny sandrinao ny olonao, dia ny taranak''i Jakoba sy Josefa.'
mg1865::mg_19::77::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rano be nahita Anao, Andriamanitra o, ny rano be nahita Anao ka toran-kovitra; eny, nanonjanonja ny lalina.'
mg1865::mg_19::77::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandatsaka ranonorana ny rahona; nikotrokotroka ny lanitra; nifanaretsaka koa ny zana-tsipïkanao.'
mg1865::mg_19::77::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fikotrokotroky ny kotrokorana dia teo amin''ny tadio*; nahazava izao rehetra izao ny helatra; nihovotrovotra sy nihorohoro ny tany. [*Na: dia nikodiadia]'
mg1865::mg_19::77::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany amin''ny ranomasina ny lalanao, ary ny nalehanao dia tany amin''ny rano mandriaka, ka tsy fantatra ny dian-tongotrao.'
mg1865::mg_19::77::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 77
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanan''i Mosesy sy Arona no nitondranao ny olonao toy ny ondry.'
mg1865::mg_19::78::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Famaranana nalaina tamin''ny tantaran''ny Isiraely hatramin''i Mosesy ka hatramin''i Davida'
  verse_text: 'Maskila nataon''i Asafa. Henoy ny lalàko, ry oloko; atongilano ny sofinareo amin''ny tenin''ny vavako.'
mg1865::mg_19::78::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiloa-bava hilaza fanoharana aho; hanonona teny saro-pantarina fony taloha aho.'
mg1865::mg_19::78::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay efa rentsika sy fantatsika, ary nambaran''ny razantsika tamintsika,'
mg1865::mg_19::78::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy mba hafenintsika amin''ny zanany; fa hambarantsika amin''ny taranaka ho avy ny fiderana an''i Jehovah sy ny heriny ary ny fahagagana izay efa nataony.'
mg1865::mg_19::78::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanorina teni-vavolombelona teo amin''i Jakoba Izy, ary teo amin''Isiraely no nametrahany lalàna, izay nandidiany ny razantsika, hampahafantariny ny zanany;'
mg1865::mg_19::78::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hahafantatra izany ny taranaka ho avy — dia ny zaza mbola hateraka — ka hitsangana hitory izany amin''ny zanany kosa,'
mg1865::mg_19::78::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hametraka ny fanantenany amin''Andriamanitra, ka tsy hanadino ny asany, fa hitandrina ny didiny;'
mg1865::mg_19::78::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba tsy ho tahaka ny razany, izay taranaka maditra sy miodina, izy, dia taranaka izay tsy nampiomana ny fony, sady tsy marina tamin''Andriamanitra ny fanahiny.'
mg1865::mg_19::78::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanak''i Efraima, izay nitondra tsipïka hitifirany, dia niamboho tamin''ny andro fiadiana.'
mg1865::mg_19::78::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nitandrina ny fanekena amin''Andriamanitra izy, ary tsy nety nandeha araka ny lalàny;'
mg1865::mg_19::78::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanadino ny asany izy sy ny fahagagana izay nampahitàny azy.'
mg1865::mg_19::78::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo anatrehan''ny razany no nanaovany fahagagana tany amin''ny tany Egypta, dia tany amin''ny tany lemak''i Zoana.'
mg1865::mg_19::78::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampisaraka ny ranomasina Izy ka nitondra azy nita, dia nampijanona ny rano ho toy ny antontan-javatra.'
mg1865::mg_19::78::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny rahona no nitondrany azy raha antoandro, sy afo mahazava nony alina.'
mg1865::mg_19::78::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namaky vatolampy tany an''efitra Izy, ka nampisotro azy nanaram-po tahaka ny amin''ny rano lalina.'
mg1865::mg_19::78::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampivoaka rano mandriaka avy tamin''ny harambato Izy ka nampirotsaka rano ho tahaka ny ony.'
mg1865::mg_19::78::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo mbola nandroso nanota taminy ihany izy ireo, ka nampahatezitra ny Avo Indrindra tany an''efitra.'
mg1865::mg_19::78::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia naka fanahy an''Andriamanitra tam-pony izy, tamin''ny nilàny hanina araka ny nahaliana azy.'
mg1865::mg_19::78::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny nanohitra an''Andriamanitra izy ka nanao hoe: mahavelatra latabatra aty an''efitra va Andriamanitra?'
mg1865::mg_19::78::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, namely ny vatolampy Izy, dia nigororoana ny rano ka nandriaka; mahay manome mofo koa va Izy? Mahatonga hena ho an''ny olony va Izy?'
mg1865::mg_19::78::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nony ren''i Jehovah izany, dia tezitra Izy; ary nisy afo nirehitra tamin''i Jakoba, sady nisy fahatezerana namely ny Isiraely,'
mg1865::mg_19::78::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy nino an''Andriamanitra izy ireo ka tsy natoky ny famonjeny.'
mg1865::mg_19::78::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa nandidy ny rahona tany ambony Izy, ary ny varavaran''ny lanitra no novohàny,'
mg1865::mg_19::78::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandatsaka mana teny aminy hohaniny Izy, ary varin''ny lanitra no nomeny azy.'
mg1865::mg_19::78::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fihinan''ny mahery no nohanin''ny olona; nanaterany hanina hahavoky azy izy.'
mg1865::mg_19::78::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampandeha ny rivotra avy any atsinanana teny amin''ny lanitra Izy ary ny heriny no nitondrany ny rivotra avy any atsimo.'
mg1865::mg_19::78::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampilatsahany hena betsaka hoatra ny vovoka izy sy voro-manidina hoatra ny fasiky ny ranomasina,'
mg1865::mg_19::78::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nalatsany teny afovoan''ny tobiny, manodidina ny fitoerany.'
mg1865::mg_19::78::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihinana izy ireo ka voky tsara, ary izay nilainy dia nomeny azy.'
mg1865::mg_19::78::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa tsy niala tamin''ny filàny izy, ary mbola teo am-bavany ihany ny haniny;'
mg1865::mg_19::78::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra taminy ny fahatezeran''Andriamanitra, ka nahafatesany ny tremalahy teo aminy, ary naripany ny zatovolahin''ny Isiraely.'
mg1865::mg_19::78::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia izany rehetra izany aza, dia mbola nanota ihany izy ireo ka tsy nino ny fahagagana nataony.'
mg1865::mg_19::78::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampahalevona ny androny toy ny fofonaina Izy, ary ny taonany tamin''ny fampitahorana.'
mg1865::mg_19::78::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha novonoiny izy ireo, dia nitady hahalala an''Andriamanitra izy, ary niverina nikatsaka Azy.'
mg1865::mg_19::78::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahatsiaro izy fa Andriamanitra no Vatolampiny, ary Andriamanitra Avo Indrindra no Mpanavotra azy.'
mg1865::mg_19::78::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa nanao vava malefaka taminy ireo, ary ny lelany no nandaingàny taminy.'
mg1865::mg_19::78::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fony tsy niorina taminy; eny tsy nitana ny fanekeny izy.'
mg1865::mg_19::78::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Andriamanitra kosa be famindram-po, dia mamela heloka ka tsy mandringana; eny nahatsindry fo tokoa Izy, ka tsy nofohaziny avokoa ny fahavinirany,'
mg1865::mg_19::78::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nahatsiaro Izy fa nofo ihany ireo, dia rivotra izay mandalo ka tsy miverina intsony.'
mg1865::mg_19::78::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Impiry akory izy ireo no efa niodina taminy tany an''efitra, ka nampalahelo Azy tany amin''ny tany foana!'
mg1865::mg_19::78::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naka fanahy an''Andriamanitra mandrakariva izy, ka nampalahelo ny Iray Masin''ny Isiraely.'
mg1865::mg_19::78::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba nahatsiaro ny tanany izy, dia ny andro izay nanavotany azy tamin''ny fahavalo,'
mg1865::mg_19::78::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanaovany famantarana tany Egypta, sy fahagagana tany an-tany lemak''i Zoana:'
mg1865::mg_19::78::44:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampody ny oniny ho rà Izy, ary ny reniranony tsy azony nisotroana.'
mg1865::mg_19::78::45:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandefa lalitra betsaka* hamely azy Izy, ka nandany azy ireny, ary sahona, ka nanimba azy ireny. [*Na: fihitra, na kalalao]'
mg1865::mg_19::78::46:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanome ny vokatry ny taniny ho an''ny sompanga Izy, ary ny sasany ho an''ny valala.'
mg1865::mg_19::78::47:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namono ny voalobony tamin''ny havandra Izy, ary ny aviaviny tamin''ny havandra vaventy.'
mg1865::mg_19::78::48:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanolotra ny biby fiompiny ho an''ny havandra Izy, ary ny omby aman''ondriny ho an''ny varatra.'
mg1865::mg_19::78::49:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandatsaka ny fahatezerany mirehitra taminy Izy: eny, fahavinirana sy fahatezerana ary fampahoriana, dia anjely andiany mitondra loza.'
mg1865::mg_19::78::50:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namboatra lalana ho an''ny fahatezerany Izy, ary tsy niaro ny fanahin''ireo tamin''ny fahafatesana, fa nanolotra ny ainy ho lanin''ny areti-mandringana;'
mg1865::mg_19::78::51:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namely ny lahimatoa rehetra tany Egypta Izy, dia ny voalohan''ainy tany an-dain''i Hama;'
mg1865::mg_19::78::52:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa namindra toerana ny olony toy ny ondry Izy, ary nitondra azy tany an''efitra toy ny ondry andiany.'
mg1865::mg_19::78::53:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nentiny soa aman-tsara izy ireo ka tsy mba natahotra; fa ny fahavalony kosa voasaron''ny ranomasina.'
mg1865::mg_19::78::54:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nitondra azy ho any amin''ny tany misy ny fitoerany masina Izy, dia ny tendrombohitra izay azon''ny tanany ankavanana.'
mg1865::mg_19::78::55:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandroaka ny jentilisa teo anoloany Izy, ka nanome ny tanin''ireny ho lova nozaraina tamin''ny famolaina, dia nampitoetra ny firenen''Isiraely tao an-dainy.'
mg1865::mg_19::78::56:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa naka fanahy an''Andriamanitra Avo Indrindra izy ka niodina taminy, ary ny teni-vavolombelony tsy notandremany.'
mg1865::mg_19::78::57:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 57
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nihemotra izy ka nivadika tahaka ny razany. Dia nania tahaka ny tsipïka manjiona.'
mg1865::mg_19::78::58:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampahatezitra Azy tamin''ny fitoerana avony izy, sady nahasaro-piaro Azy tamin''ny sarin-javatra voasokitra.'
mg1865::mg_19::78::59:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nandre izany Andriamanitra, dia tezitra Izy ka nolaviny mihitsy ny Isiraely,'
mg1865::mg_19::78::60:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady nahafoy ny tabernakeliny tao Silo Izy, dia ny lay izay naoriny teo amin''ny olona;'
mg1865::mg_19::78::61:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia natolony ho babo ny heriny ary ny voninahiny ho eo an-tanan''ny fahavalo.'
mg1865::mg_19::78::62:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanolotra ny olony ho an''ny sabatra Izy; ary tezitra Indrindra tamin''ny lovany Izy.'
mg1865::mg_19::78::63:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zatovolahiny dia lanin''ny afo; ary ny zatovovaviny tsy mba nanaovana hiram-panambadiana.'
mg1865::mg_19::78::64:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpisorony lavon-tsabatra, nefa ny mpitondratenan''ireo tsy nisaona.'
mg1865::mg_19::78::65:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 65
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifoha ny Tompo tahaka ny anankiray avy natory, tahaka ny lehilahy mahery izay miantsoantso azon''ny divay.'
mg1865::mg_19::78::66:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namely ny fahavalony hiamboho Izy ka nahafa-baraka azy mandrakizay.'
mg1865::mg_19::78::67:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanary ny lain''i Josefa Izy, ary ny firenen''i Efraima tsy nofidiny.'
mg1865::mg_19::78::68:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nifidy ny firenen''i Joda kosa Izy, dia ny tendrombohitra Ziona izay tiany.'
mg1865::mg_19::78::69:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanao ny fitoerany masina ho tahaka ny havoana Izy, tahaka ny tany izay naoriny ho mandrakizay.'
mg1865::mg_19::78::70:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nifidy an''i Davida mpanompony ka naka azy avy tany am-balan''ondry;'
mg1865::mg_19::78::71:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany amin''ny fiandrasany ny ondry ampianahana no nakàny azy, mba hiandry an''i Jakoba olony sy Isiraely lovany;'
mg1865::mg_19::78::72:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 78
  verse_number: 72
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niandry ireo araka ny hitsin''ny fony izy, ka nitondra azy araka ny fahaizan''ny tanany.'
mg1865::mg_19::79::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fifonana noho ny faharavana nataon''ny fahavalo'
  verse_text: 'Salamo nataon''i Asafa. Andriamanitra o, tonga eto amin''ny lovanao ny jentilisa, ka nandoto ny tempolinao masina sady nanao an''i Jerosalema ho korontam-bato.'
mg1865::mg_19::79::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fatin''ny mpanomponao nomeny hohanin''ny voro-manidina, ny nofon''ny olonao masina ho an''ny bibidia;'
mg1865::mg_19::79::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ràny naidiny manodidina an''i Jerosalema tahaka ny rano, ary tsy nisy handevina.'
mg1865::mg_19::79::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tonga fandatsan''ny namanay izahay, sady faneso sy fanakoran''izay manodidina anay.'
mg1865::mg_19::79::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana, Jehovah o, no hanontolo fo Ianao, ka hirehitra tahaka ny afo ny fahasaro-piaoronao?'
mg1865::mg_19::79::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aidino amin''ny jentilisa izay tsy mahalala Anao ny fahatezeranao, sy amin''ny fanjakana izay tsy miantso ny anaranao;'
mg1865::mg_19::79::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nandany an''i Jakoba izy ireo sady nandrava ny fonenany.'
mg1865::mg_19::79::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza tsarovana aminay ny heloky ny razanay; aoka ho avy faingana hitsena anay ny fiantrànao, fa reraka indrindra izahay.'
mg1865::mg_19::79::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo izahay, ry Andriamanitry ny famonjena anay o, noho ny voninahitry ny anaranao; ary afaho izahay, ka mamelà ny helokay, noho ny anaranao.'
mg1865::mg_19::79::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ny jentilisa no hanao hoe: aiza izay Andriamaniny? aoka ho fantatra amin''ny jentilisa eo imasonay ny famaliana ny ran''ny mpanomponao izay nalatsaka.'
mg1865::mg_19::79::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tonga eo anatrehanao ny fisentoan''ny mpifatotra; araka ny halehiben''ny sandrinao dia arovy tsy ho faty ny zanaky ny fahafatesana.'
mg1865::mg_19::79::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary valio impito heny ho ao an-tratran''ny mifanila fonenana aminay ny fanaratsiana izay nanaratsiany Anao, Tompo o.'
mg1865::mg_19::79::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 79
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay, olonao sy ondry fiandrinao, dia hisaotra Anao mandrakizay; hatramin''ny taranaka fara mandimby no hilazanay ny fideràna Anao.'
mg1865::mg_19::80::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fivavahana ho an''ny Isiraely, voalobok''i Jehovah. Ho an''ny mpiventy hira'
  verse_text: 'Al-shoshanim-edoth. Salamo nataon''i Asafa. Ry Mpiandry ny Isiraely o, mihainoa, Ianao Izay mitondra an''i Josefa toy ny ondry; Ianao, Izay mipetraka amin''ny kerobima, mamirapiratra.'
mg1865::mg_19::80::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fohazy ny herinao eo anoloan''i Efraima sy Benjamina ary Manase, ka avia hamonjy anay.'
mg1865::mg_19::80::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, ampodio izahay, ka ampamirapirato ny Tavanao, ary aoka hovonjena izahay.'
mg1865::mg_19::80::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Andriamanitry ny maro o, mandra-pahoviana no hanetroka amin''ny fivavaky ny olonao* ny fahatezeranao? [*Na: na dia mivavaka aza ny olonao]'
mg1865::mg_19::80::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampihinana azy mofo len-dranomaso Ianao, ary mampisotro azy ranomaso tovozina.'
mg1865::mg_19::80::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao ho fifandirana amin''ny mifanila fonenana aminay izahay; ary ny fahavalonay mifaly handatsa.'
mg1865::mg_19::80::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitry ny maro o, ampodio izahay, ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.'
mg1865::mg_19::80::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy voaloboka nafindranao avy tany Egypta; nandroaka ny jentilisa Ianao ka namboly azy kosa.'
mg1865::mg_19::80::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitevy teo alohany Ianao, dia namaka lalina izy ka nameno ny tany.'
mg1865::mg_19::80::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanaloka ny tendrombohitra ny alokalony, ary ny sampany nanaloka ny sedera andrian-kazo*. [*Hebreo: sederan''Andriamanitra]'
mg1865::mg_19::80::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampisandrahaka ny rantsany hatramin''ny ranomasina izy, ary ny sakeliny hatramin''ny Ony*. [*Eofrata]'
mg1865::mg_19::80::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana no noravànao ny fefiny ka anotazan''izay rehetra mandalo eny an-dàlana izy?'
mg1865::mg_19::80::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lambo avy any an''ala mitrongy azy; ary izay bibi-dia any an-tsaha mandàny azy.'
mg1865::mg_19::80::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Andriamanitry ny maro o, miverena, ka tsilovy any an-danitra, ary jereo, ka vangio ity voaloboka ity.'
mg1865::mg_19::80::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arovy* izay nambolen''ny tananao ankavanana sy ny zanaka izay nampaherezinao ho Anao. [*Na: Dia]'
mg1865::mg_19::80::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voadotry ny afo izy sady voakapa; fongotry ny fananaran''ny tavanao izy.'
mg1865::mg_19::80::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny tananao ho amin''ny lehilahin''ny tananao ankavanana, dia amin''ny zanak''olombelona izay nampaherezinao ho Anao.'
mg1865::mg_19::80::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy hihemotra hiala aminao izahay; velomy izahay, dia hiantso ny anaranao.'
mg1865::mg_19::80::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 80
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Jehovah, Andriamanitry ny maro o, ampodio izahay; ampamirapirato ny tavanao, ary aoka hovonjena Izahay.'
mg1865::mg_19::81::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana ny Isiraelita hifaly amin''Andriamanitra noho ny nitondràny azy nivoaka avy tany Egypta. Ho an''ny mpiventy hira'
  verse_text: 'Al-gitith. Nataon''i Asafa. Mihobia ho an''Andriamanitra herintsika; manaova feo fifaliana ho an''Andriamanitr''i Jakoba.'
mg1865::mg_19::81::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandrato ny hira, ka velezo ny ampongatapaka, ary tendreo ny lokanga mahafinaritra mbamin''ny valiha.'
mg1865::mg_19::81::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsofy ny anjomara amin''ny volana; eny, amin''ny feno-volana, dia amin''ny andro firavoravoantsika.'
mg1865::mg_19::81::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lalàna ho an''ny Isiraely izany, ary fitsipik''Andriamanitr''i Jakoba.'
mg1865::mg_19::81::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Notendreny ho vavolombelona eo amin''i Josefa izany, raha nandeha namely ny tany Egypta Izy; nandre teny tsy fantatro aho.'
mg1865::mg_19::81::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampiala ny sorony tamin''ny entana Aho; nitsahatra tsy nitondra sobiky ny tanany.'
mg1865::mg_19::81::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony azom-pahoriana ianao, dia niantso Ahy, ka namonjy anao Aho; namaly anao tao amin''ny fiafenan''ny kotrokorana Aho, ary nizaha toetra anao tao amin''ny ranon''i Meriba.'
mg1865::mg_19::81::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihainoa, ry oloko, dia hambarako aminao; enga anie hihaino Ahy ianao, ry Isiraely.'
mg1865::mg_19::81::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza asiana andriamani-kafa eo aminao; ary aza mivavaka amin''ny andriamanitry ny firenena hafa.'
mg1865::mg_19::81::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao niakatra avy tany amin''ny tany Egypta; atanatanao ny vavanao, dia hofenoiko.'
mg1865::mg_19::81::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nihaino ny feoko ny oloko; ary ny Isiraely tsy nankatò Ahy;'
mg1865::mg_19::81::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia navelako hanaraka ny ditry ny fony Izy, handehanany manaraka ny fisainan''ny tenany.'
mg1865::mg_19::81::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hihaino Ahy ny oloko, dia handeha amin''ny lalako ny Isiraely;'
mg1865::mg_19::81::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vetivety dia hampietry ny fahavalony Aho, ka hamerina ny tanako hamely ny rafiny;'
mg1865::mg_19::81::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mankahala an''i Jehovah dia hikoy aminy, ka dia haharitra mandrakizay ny andron''ny oloko;'
mg1865::mg_19::81::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 81
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampihinana azy vary tsara indrindra Izy; eny, tantely avy amin''ny vatolampy no hamokisako anao.'
mg1865::mg_19::82::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fitsaran''Andriamanitra ny mpitsara ety an-tany'
  verse_text: 'Salamo nataon''i Asafa. Andriamanitra dia eo amin''ny fiangonan''Andriamanitra; ary eo amin''ireo andriamanitra no itsarany.'
mg1865::mg_19::82::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana no hitsarànareo tsy marina ka ihenaranareo maso ny ratsy fanahy?'
mg1865::mg_19::82::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Alaharo ny tenin''ny mahantra sy ny kamboty; omeo rariny ny ory sy ny malahelo;'
mg1865::mg_19::82::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo ny mahantra sy ny malahelo; afaho amin''ny tanan''ny ratsy fanahy izy.'
mg1865::mg_19::82::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahalala na mahazo an-tsaina ireny; ao amin''ny maizina no andehanany; mihorohoro ny fanambanin''ny tany rehetra.'
mg1865::mg_19::82::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Andriamanitra ianareo, ary zanaky ny Avo Indrindra ianareo rehetra;'
mg1865::mg_19::82::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanjo ho faty tahaka ny olona ihany ianareo, ary samy ho lavo tahaka ny anankiray amin''ny lehibe.'
mg1865::mg_19::82::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 82
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Andriamanitra o, tsarao ny tany; fa Ianao no handova ny firenena rehetra.'
mg1865::mg_19::83::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana noho ny nikambanan''ny firenena maro hamely ny Isiraely'
  verse_text: 'Tonon-kira. Salamo nataon''i Asafa. Andriamanitra o, aza mangina; aza mihombom-bava Ianao, ary aza mamitsaka, Andriamanitra o.'
mg1865::mg_19::83::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, mitabataba ny fahavalonao; ary izay mankahala Anao dia manandratra ny lohany.'
mg1865::mg_19::83::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olonao no iokoany amin''ny hafetsena; ary miara-misaina hamely izay voafinao izy.'
mg1865::mg_19::83::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izy: Avia, ka andeha hofongorantsika tsy ho firenena izy, mba tsy hotsarovana intsony ny anaran''Isiraely.'
mg1865::mg_19::83::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa niray tetika tokoa ireo, ka nanao fanekena hanohitra Anao,'
mg1865::mg_19::83::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny lain''ny Edomita sy ny Isimaelita, ny Moabita sy ny Hagarita,'
mg1865::mg_19::83::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Gebalita sy ny Amonita ary ny Amalekita, ny Filistina mbamin''ny mponina any Tyro.'
mg1865::mg_19::83::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Asyriana koa nikambana taminy; tonga sandrin''ny taranak''i Lota ireo.'
mg1865::mg_19::83::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy tahaka ny Midiana izy, ary tahaka an''i Sisera sy Jabina teo amin''ny ony Kisona;'
mg1865::mg_19::83::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maty tany En-dora ireo; tonga zeziky ny tany izy.'
mg1865::mg_19::83::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy tahaka an''i Oreba sy Zeba ny mpanapaka azy. Eny, ny andrianany rehetra dia ataovy tahaka an''i Zebaha sy Zaimona,'
mg1865::mg_19::83::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanao hoe: aoka halaintsika ho antsika ny fonenan''Andriamanitra.'
mg1865::mg_19::83::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro o, ataovy tahaka ny tadio ireo, dia tahaka ny akofa entin''ny rivotra,'
mg1865::mg_19::83::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny afo mandoro ala sy tahaka ny lelafo mampirehitra tendrombohitra;'
mg1865::mg_19::83::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho toy izany no anafotofotoanao azy amin''ny tadionao, sy ampahatahoranao azy amin''ny tafio-drivotrao.'
mg1865::mg_19::83::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sarony henatra ny tavany, mba hitadiavany ny anaranao, Jehovah o.'
mg1865::mg_19::83::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra sy ho amin-tahotra mandrakizay izy; eny, aoka hangaihay sy haringana izy.'
mg1865::mg_19::83::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 83
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho fantany fa Ianao irery ihany, Izay atao hoe Jehovah, no ilay Avo Indrindra ambonin''ny tany rehetra.'
mg1865::mg_19::84::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Alahelo ny tranon''Andriamanitra. Ho an''ny mpiventy hira'
  verse_text: 'Al-hagitith. Salamo nataon''ny Koraita. Endrey ny hatsaran''ny tabernakelinao, Jehovah, Tompon''ny maro, o!'
mg1865::mg_19::84::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manina sady vonton''alahelo ny kianjan''i Jehovah ny fanahiko; ny foko sy ny nofoko mihoby an''Andriamanitra velona.'
mg1865::mg_19::84::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ny tsikirity mahita trano, ary ny sidintsidina mahita akany ho azy hametrahany ny zanany. Dia ny alitaranao, Jehovah, Tompon''ny maro o, Mpanjakako sy Andriamanitro.'
mg1865::mg_19::84::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay mitoetra ao an-tranonao; hidera Anao mandrakariva izy.'
mg1865::mg_19::84::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona manan-kery avy aminao; ao am-pony ny lalana;'
mg1865::mg_19::84::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandeha mamaky ny lohasaha Baka* izy, Dia ataony misy loharano izany, ary ny loha-orana manarom-pitahiana azy. [*Baka = Fitomaniana]'
mg1865::mg_19::84::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miampy hery eny am-pandehanana izy; samy miseho eo anatrehan''Andriamanitra any Ziona izy rehetra.'
mg1865::mg_19::84::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Andriamanitry ny maro o, henoy ny fivavako; mandrenesa ry Andriamanitr''i Jakoba o.'
mg1865::mg_19::84::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra, Ampinganay o, tsinjovy ka jereo ny tavan''ny voahosotrao.'
mg1865::mg_19::84::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo; aleoko mipetraka eo amin''ny tokonam-baravaran''ny tranon''Andriamanitra, toy izay mitoetra ao an-dain''ny ratsy fanahy.'
mg1865::mg_19::84::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Masoandro sy Ampinga Jehovah Andriamanitra; fahasoavana sy voninahitra no homen''i Jehovah; tsy hiaro zava-tsoa amin''izay mandeha amin''ny fahitsiana izy.'
mg1865::mg_19::84::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 84
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompon''ny maro o, sambatra izay olona matoky Anao.'
mg1865::mg_19::85::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangatahana mba hampodin''Andriamanitra indray ny fankasitrahany ny olony. Ho an''ny mpiventy hira'
  verse_text: 'Salamo nataon''ny Koraita. Jehovah o, efa naneho fitia tamin''ny taninao Ianao, Efa nampodinao Jakoba avy tamin''ny fahababoany.'
mg1865::mg_19::85::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voaisotrao ny heloky ny olonao, Voasaronao ny fahotany rehetra.'
mg1865::mg_19::85::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampijanona ny fahatezeranao rehetra Ianao, Ary niala tamin''ny fahatezeranao mirehitra.'
mg1865::mg_19::85::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena aminay, ry Andriamanitry ny famonjena anay o, Ary ampitsaharo ny fahatezeranao aminay.'
mg1865::mg_19::85::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tezitra aminay mandrakizay va Ianao? Hampaharetinao hahatratra ny taranaka fara mandimby va ny fahatezeranao?'
mg1865::mg_19::85::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hovelominao indray va izahay, Mba hifalian''ny olonao aminao?'
mg1865::mg_19::85::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asehoy anay ny famindram-ponao, Jehovah o, Ka omeo anay ny famonjenao.'
mg1865::mg_19::85::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihaino izay holazain''i Jehovah Andriamanitra aho; Fa hilaza fiadanana amin''ny olony Izy, dia amin''ny olony masina; Koa aoka tsy hiverina ho ao amin''ny fahadalana ireo.'
mg1865::mg_19::85::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny tokoa, akaikin''izay matahotra Azy ny famonjeny, Mba hitoeran''ny voninahitra eo amin''ny tanintsika.'
mg1865::mg_19::85::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihaona ny famindram-po sy ny fahamarinana; Mifanoroka ny rariny sy ny fihavanana.'
mg1865::mg_19::85::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinana mitsimoka amin''ny tany; Ary ny rariny mitsinjo eny an-danitra.'
mg1865::mg_19::85::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Jehovah hanome ny tsara Ary ny tanintsika hahavoka-javatra.'
mg1865::mg_19::85::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 85
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rariny no hialoha Azy, Sady hizotra hanaraka ny diany eny an-dàlana.'
mg1865::mg_19::86::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka nataon''ny mpanompon''Andriamanitra, fony nenjehin''ny mpirehareha izy'
  verse_text: 'Fivavak''i Davida. Atongilano ny sofinao, Jehovah o, ka valio aho, Fa ory sy malahelo.'
mg1865::mg_19::86::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arovy ny fanahiko, fa masina aho; Andriamanitro o, vonjeo ny mpanomponao, Izay matoky Anao.'
mg1865::mg_19::86::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, mamindrà fo amiko; Fa Ianao no itarainako mandrakariva.'
mg1865::mg_19::86::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampifalio ny fanahin''ny mpanomponao; Fa Ianao, Tompo o, no ananganako ny fanahiko.'
mg1865::mg_19::86::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Tompo o, no tsara sady mamela heloka Ary be famindram-po amin''izay rehetra miantso Anao.'
mg1865::mg_19::86::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandrenesa ny fivavako, Jehovah o, Ary henoy ny feon''ny fifonako.'
mg1865::mg_19::86::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny andro fahoriako dia miantso Anao aho, Fa mamaly ahy Ianao.'
mg1865::mg_19::86::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy tahaka Anao, Tompo o, amin''ireo andriamanitra; Ary tsy misy tahaka ny asanao.'
mg1865::mg_19::86::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenena rehetra nataonao dia ho avy hiankohoka eo anatrehanao, Tompo o, Ka hanome voninahitra ny anaranao.'
mg1865::mg_19::86::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe Ianao ka manao zava-mahagaga; Ianao irery ihany no Andriamanitra.'
mg1865::mg_19::86::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampianaro ny lalanao aho, Jehovah o, Dia handeha amin''ny fahamarinanao aho; Ampiraiso ny foko hatahotra ny anaranao.'
mg1865::mg_19::86::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao amin''ny foko rehetra aho, Andriamanitro Tompo o Hanome voninahitra ny anaranao mandrakizay aho.'
mg1865::mg_19::86::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe ny famindram-ponao amiko; Ary efa novonjenao ny fanahiko tsy ho any amin''ny fiainan-tsy hita* ambany indrindra. [*Hebreo: Shoela]'
mg1865::mg_19::86::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, ny mpirehareha mitsangana hanohitra ahy, Ary ny antokon''ny lozabe mitady ny aiko; Ary tsy mba heveriny fa eo anatrehany Ianao.'
mg1865::mg_19::86::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Tompo o, dia Andriamanitra mamindrà fo sy miantra, Mahari-po sady be famindram-po sy fahamarinana.'
mg1865::mg_19::86::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Todiho aho ka amindrao fo; Omeo ny herinao ny mpanomponao, Ary vonjeo ny zanaky ny ankizivavinao.'
mg1865::mg_19::86::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 86
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anehoy famantarana ny ho soa aho, Mba ho hitan''izay mankahala ahy, ka ho menatra izy; Fa Ianao Jehovah o, no namonjy sy nampionona ahy.'
mg1865::mg_19::87::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny tanànan''i Jehovah, izay hahaterahan''ny firenena maro ho isan''ny Isiraely'
  verse_text: 'Salamo nataon''ny Koraita. Tonon-kira. Ny naorin''i Jehovah dia ao an-tendrombohitra masina;'
mg1865::mg_19::87::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vavahadin''i Ziona dia tian''i Jehovah mihoatra noho ny fonenana rehetra izay an''i Jakoba.'
mg1865::mg_19::87::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-malaza no anambarana anao Ry tanànan''Andriamanitra'
mg1865::mg_19::87::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanonona an-dRahaba* sy Babylona Aho ho isan''izay mahalala ahy; Indro Filistia sy Tyro mbamin''i Etiopia, Ity no efa teraka teo. [*Na: Egypta]'
mg1865::mg_19::87::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ziona hilazana hoe: Ireto sy ireroa samy efa teraka teo; Ary ny Avo Indrindra no mampitoetra azy.'
mg1865::mg_19::87::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hanisa, raha manoratra ny firenena Izy: Ity no efa teraka teo.'
mg1865::mg_19::87::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 87
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izay mihira sy mandihy: Ny loharanoko rehetra dia ao aminao.'
mg1865::mg_19::88::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka nataon''izay nasian''ny fahoriana mafy ka toa foin''Andriamanitra. Tonon-kira. Salamo nataon''ny Koraita. Ho an''ny mpiventy hira. Almahalath-leanoth. Maskila nataon''i Hemana Ezrahita.'
  verse_text: 'Jehovah o, Andriamanitry ny famonjena ahy, Andro aman''alina no itarainako eo anatrehanao;'
mg1865::mg_19::88::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny fivavako ho tonga eo anatrehanao; Atongilano amin''ny fitarainako ny sofinao;'
mg1865::mg_19::88::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa diboka ny fahoriana ny fanahiko; Ary ny aiko manakaiky ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_19::88::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Natao ho isan''izay midina any an-davaka aho Ary efa tahaka izay tsy manan-kery;'
mg1865::mg_19::88::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nafoy ho any amin''ny maty aho*, Tahaka izay voavono, mandry ao am-pasana, Izay tsy tsarovanao intsony, Fa voafongotry ny tananao. [*Na: Ny fandriako dia any amin''ny maty]'
mg1865::mg_19::88::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nametraka ahy any an-davaka ambany indrindra Ianao, Ao amin''ny maizina, dia ao amin''ny lalina.'
mg1865::mg_19::88::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatezeranao manindry ahy mafy, Ary ny alon-dranonao rehetra azeranao amiko.'
mg1865::mg_19::88::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampanalavirinao ahy ny olona nahazatra ahy; Efa nataonao fahavetavetana eo imasony aho; Voahidy aho ka tsy afa-mivoaka.'
mg1865::mg_19::88::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoko efa pahina noho ny fahoriana; Jehovah o, miantso Anao isan''andro aho, Mamefy tanana aminao aho.'
mg1865::mg_19::88::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haneho fahagagana amin''ny maty va Ianao? Ny matoatoa va no hitsangana hidera Anao?'
mg1865::mg_19::88::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotorina any am-pasana va ny famindram-ponao, Ary ny fahamarinanao any amin''ny fandringanana?'
mg1865::mg_19::88::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho fantatra ao amin''ny maizina va ny fahagagana ataonao, Ary ny fahamarinanao ao amin''ny tany fanadinoana?'
mg1865::mg_19::88::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izaho, dia Ianao no itarainako, Jehovah o; Ary ny fivavako tonga eo anatrehanao nony maraina.'
mg1865::mg_19::88::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, nahoana no manary ny fanahiko Ianao Ka manafina ny tavanao amiko?'
mg1865::mg_19::88::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ory aho ka efa ho faty hatramin''ny fahazazako; Raha itambesaran''ny fampitahoranao aho, dia very hevitra;'
mg1865::mg_19::88::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manafotra ahy ny fahatezeranao; Matin''ny fampitahoranao aho;'
mg1865::mg_19::88::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandifotra ahy mandrakariva tahaka ny rano ireny; Miara-manodidina ahy izy.'
mg1865::mg_19::88::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 88
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampanalavirinao ahy ny olona tia ahy sy ny sakaizako; Ireo nahazatra ahy dia fahamaizinana.'
mg1865::mg_19::89::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny fahatsarany, indrindra fa noho ny fanekeny tamin''i Davida'
  verse_text: 'Maskila nataon''i Etana Ezrahita. Ny famindram-pon''i Jehovah no hohiraiko mandrakizay; Hatramin''ny taranaka fara mandimby no hampahafantaran''ny vavako ny fahamarinanao.'
mg1865::mg_19::89::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho Hotovonana mandrakizay ny famindram-po; Ny fahamarinanao hampitoerinao any an-danitra.'
mg1865::mg_19::89::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanao fanekena tamin''ny voafidiko Aho; Eny, efa nianiana tamin''i Davida mpanompoko Aho hoe:'
mg1865::mg_19::89::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampitoetra ny taranakao ho mandrakizay Aho Ka hanangana ny seza fiandriananao hatramin''ny taranaka fara mandimby.'
mg1865::mg_19::89::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lanitra hidera ny fahagagana ataonao, Jehovah o, Ary ny fahamarinanao koa ao amin''ny fiangonan''ny olo-masina.'
mg1865::mg_19::89::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iza any an-danitra no mitovy amin''i Jehovah? Ary iza amin''ny zanak''ireo andriamanitra no manahaka an''i Jehovah,'
mg1865::mg_19::89::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Andriamanitra mahatahotra indrindra eo amin''ny fiangonan''ny olo-masiny Ary hajain''izay rehetra manodidina Azy?'
mg1865::mg_19::89::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Andriamanitry ny maro, o, iza no mahery tahaka Anao, Jehovah? Ary manodidina Anao ny fahamarinanao.'
mg1865::mg_19::89::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao manapaka ny fisavoan''ny ranomasina; Raha manonja ny alony, dia mampitsahatra azy Ianao.'
mg1865::mg_19::89::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao nanorotoro an-dRahaba ho tahaka izay voavono; Ny sandrinao mahery no nampielezanao ny fahavalonao.'
mg1865::mg_19::89::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anao ny lanitra, Anao koa ny tany; Izao tontolo izao sy izay rehetra eo aminy. Ianao no nanorina azy.'
mg1865::mg_19::89::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny avaratra sy ny atsimo. Ianao no nahary azy; Ny anaranao no ihobian''i Tabara sy Hermona.'
mg1865::mg_19::89::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manan-tsandry mahery Ianao; Mahery ny tananao, avo ny tananao ankavanana.'
mg1865::mg_19::89::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rariny sy fitsarana no fanorenan''ny seza fiandriananao; Famindram-po sy fahamarinana no mialoha ny tavanao.'
mg1865::mg_19::89::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona mahalala ny feo mahafaly; Jehovah o, amin''ny fahazavan''ny tavanao no handehanany.'
mg1865::mg_19::89::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny anaranao no hifaliany mandrakariva; Ary ny fahamarinanao no hisandratany.'
mg1865::mg_19::89::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voninahitry ny heriny Ianao; Ary amin''ny fankasitrahanao no hisandratan''ny tandrokay.'
mg1865::mg_19::89::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa an''i Jehovah ny ampinganay; Ary an''ny Iray Masin''ny Isiraely ny mpanjakanay*.'
mg1865::mg_19::89::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''izany ny olonao masina dia nilazanao tamin''ny fahitana hoe: Nametraka famonjena tamin''izay mahery Aho Ary nanandratra ny anankiray voafidy* tamin''ny olona. [*Na: nanandratra zatovo avy]'
mg1865::mg_19::89::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahita an''i Davida mpanompoko Aho; Ny diloiloko masina no nanosorako azy;'
mg1865::mg_19::89::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no homban''ny tanako; Eny, ny sandriko no hampahery azy.'
mg1865::mg_19::89::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hamitaka* azy ny fahavalo; Ary tsy hampahory azy ny ratsy fanahy. [*Na: hitaky trosa aminy]'
mg1865::mg_19::89::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa handripaka ny fahavalony eo anoloan''ny tavany Aho Sady hamely izay mankahala azy.'
mg1865::mg_19::89::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinako sy ny famindram-poko homba azy; Ary ny anarako no hisandratan''ny tandrony.'
mg1865::mg_19::89::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hampitoetra ny tanany amin''ny ranomasina Aho Ary ny tanany ankavanana amin''ny ony.'
mg1865::mg_19::89::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy hiantso Ahy hoe: Raiko Ianao, Andriamanitro sy Vatolampin''ny famonjena ahy.'
mg1865::mg_19::89::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izaho kosa hanao azy ho lahimatoa, Ambony indrindra amin''ny mpanjakan''ny tany.'
mg1865::mg_19::89::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitahiry ny famindram-poko ho azy mandrakizay Aho, Ary ny fanekeko hampaharetiko aminy.'
mg1865::mg_19::89::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampaharitra ny taranany ho mandrakizay Aho, Ary ny seza fiandrianany ho tahaka ny faharetan''ny lanitra.'
mg1865::mg_19::89::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mahafoy ny lalàko ny zanany Ka tsy mandeha araka ny fitsipiko,'
mg1865::mg_19::89::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha ny teniko no ataony ho fahavetavetana, Ary ny didiko no tsy tandremany,'
mg1865::mg_19::89::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hovaliako tsorakazo ny fahadisoany, Ary kapoka ny helony.'
mg1865::mg_19::89::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny famindram-poko tsy hofoanako aminy, Ary ny fahamarinako tsy havadiko,'
mg1865::mg_19::89::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanekeko tsy hotsoahako, Ary ny nolazain''ny molotro tsy hovako.'
mg1865::mg_19::89::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao zavatra iray loha izao no nianianako tamin''ny fahamasinako, Tsy handainga amin''i Davida mihitsy Aho:'
mg1865::mg_19::89::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranany haharitra mandrakizay, Ary ny seza fiandrianany ho tahaka ny masoandro eo anatrehako;'
mg1865::mg_19::89::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hampitoerina mandrakizay tahaka ny volana izy, Tahaka ny vavolombelona marina any an-danitra*. [*Na: Ary ny vavolombelona any an-danitra dia marina]'
mg1865::mg_19::89::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa narianao sy nolavinao izy; Efa tezitra tamin''ny voahosotrao Ianao.'
mg1865::mg_19::89::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahafoana ny fanekena tamin''ny mpanomponao Ianao; Efa nataonao ho fahavetavetana ny satro-boninahiny ka narianao teny an-tany.'
mg1865::mg_19::89::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa noravanao ny fefiny rehetra; Efa nosimbanao ny fiarovany mafy.'
mg1865::mg_19::89::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay rehetra mandalo eny an-dàlana dia manimba azy; Efa fandà-tsan''ny mpiray monina aminy izy.'
mg1865::mg_19::89::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampisandratra ny tanana ankavanan''ny rafilahiny Ianao Ary efa nampifaly ny fahavalony rehetra.'
mg1865::mg_19::89::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampihemotra* ny lelan''ny sabany Ianao Ka tsy nampaharitra azy tamin''ny ady. [*Na: nampilefitra]'
mg1865::mg_19::89::44:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampitsahatra ny voninahiny Ianao Ka nanongana ny seza fiandrianany ho amin''ny tany.'
mg1865::mg_19::89::45:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahafohy ny andron''ny fahatanorany Ianao Ary efa nanaron-kenatra azy.'
mg1865::mg_19::89::46:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana, Jehovah o? Hiery mandrakizay va Ianao? Mirehitra tahaka ny afo va ny fahatezeranao?'
mg1865::mg_19::89::47:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny hafohin''ny androko; Toa zava-poana mihitsy ny namoronanao ny zanak''olombelona rehetra!'
mg1865::mg_19::89::48:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no olona ho velona tsy hahita fahafatesana, Fa hamonjy ny fanahiny tsy ho azon''ny tanan''ny fiainan-tsy hita*? [*Hebreo: Sheola]'
mg1865::mg_19::89::49:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 49
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, aiza ny famindram-ponao fahiny, Izay nianiananao tamin''i Davida tamin''ny fahamarinanao?'
mg1865::mg_19::89::50:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, tsarovy ny latsa manjo ny mpanomponao, Ny tratrako vesaran''ny firenena rehetra*,'
mg1865::mg_19::89::51:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny nandatsan''ny fahavalonao, Jehovah o, Eny, ny nandatsany ny dian''ny voahosotrao.'
mg1865::mg_19::89::52:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 89
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana mandrakizay anie Jehovah. Amena dia Amena.'
mg1865::mg_19::90::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 1
  verse_date_revised: null
  verse_title: 'BOKY FAHEFATRA, Ny fiankinan''ny olo-marina amin''Andriamanitra, na dia mandalo faingana aza ny androny sady isehoan''ny fahatezeran''Andriamanitra'
  verse_text: 'Fivavak''i Mosesy, lehilahin''Andriamanitra. Tompo o, efa fonenanay hatramin''ny taranaka rehetra Ianao.'
mg1865::mg_19::90::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony tsy mbola ary ny tendrombohitra, Na voaforonao ny tany sy izao rehetra izao, Dia Andriamanitra Ianao hatramin''ny taloha indrindra ka mandrakizay.'
mg1865::mg_19::90::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamerina ny olona ho amin''ny vovoka* Ianao Ka manao hoe: Miverena, ry zanak''olombelona. [*Hebreo: fahatorotoroana]'
mg1865::mg_19::90::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa eo imasonao ny arivo taona dia toy ny fandalon''ny omaly, Ary tahaka ny fotoam-piambenana iray amin''ny alina.'
mg1865::mg_19::90::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manindao azy tahaka ny riaka Ianao torimaso izy; Amin''ny maraina tahaka ny ahitra mora miova izy.'
mg1865::mg_19::90::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny maraina mamony izy, nefa mora miova*; Amin''ny hariva voajinja izy ka maina. [*Na: Amin''ny maraina dia tahaka ny kolokolon''ahitra izy]'
mg1865::mg_19::90::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lanin''ny fahatezeranao izahay, Ary raiki-tahotra noho ny fahaviniranao.'
mg1865::mg_19::90::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny helokay efa nataonao teo anatrehanao, Ary ny fahotanay miafina teo amin''ny fahazavan''ny tavanao.'
mg1865::mg_19::90::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny androanay rehetra efa lasa amin''ny fahatezeranao; Efa laninay toy ny eritreritra ny taonanay.'
mg1865::mg_19::90::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fito-polo taona no andron''ny taonanay Ary raha tàhiny mateza aza, dia valo-polo taona, Nefa fahasasarana sy zava-poana ny voninahiny, Fa mihelina faingana izany, ka lasa manidina izahay.'
mg1865::mg_19::90::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahafantatra ny herin''ny fahatezeranao sy ny fahaviniranao Araka izay tokony ho fahatahorana Anao?'
mg1865::mg_19::90::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianara anay hanisa ny andronay, Hahazoanay fo hendry.'
mg1865::mg_19::90::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena, Jehovah o! Mandra-pahoviana? Ary mba aneneno ny amin''ny mpanomponao.'
mg1865::mg_19::90::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vokiso ny famindram-ponao nony maraina izahay, Mba hihobianay sy hifalianay amin''ny andro rehetra hiainanay.'
mg1865::mg_19::90::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampifalia anay araka ny andro nampahorianao anay Sy ny taona nahitanay loza.'
mg1865::mg_19::90::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiseho amin''ny mpanomponao ny asanao, Ary ny voninahitrao amin''ny zanany.'
mg1865::mg_19::90::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 90
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho aminay ny fahasoavan''ny Tompo Andriamanitray; Ary ampitoero aminay ny asan''ny tananay; Eny, ny asan''ny tananay, ampitoero izy.'
mg1865::mg_19::91::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatokian''ny olo-marina an''Andriamanitra, na dia manakaiky azy aza ny manjo ny sasany'
  verse_text: 'Ny mitoetra ao amin''ny fierena izay an''ny Avo Indrindra Dia monina eo ambanin''ny aloky ny Tsitoha.'
mg1865::mg_19::91::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho hilaza an''i Jehovah hoe: Fialofako sy batery fiarovana ho ahy Izy Ary Andriamanitro, Izay hitokiako.'
mg1865::mg_19::91::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no hanafaka anao amin''ny fandriky ny mpihaza sy ny areti-mandoza.'
mg1865::mg_19::91::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny volon''elany no anaronany anao, Ary ao ambanin''ny elany no hialofanao; Ho ampinga kely sy ampinga lehibe ny fahamarinany.'
mg1865::mg_19::91::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hatahotra ny horohoro nony alina ianao, Na ny zana-tsipïka manidina nony andro,'
mg1865::mg_19::91::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny areti-mandringana mandeha amin''ny maizina, Na ny fandringanana mandripaka amin''ny mitataovovonana.'
mg1865::mg_19::91::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia hisy arivo aza lavo eo anilanao sy iray alina eo an-kavananao, Dia tsy hihatra aminao izany'
mg1865::mg_19::91::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hijery maso fotsiny ianao, Ka ho hitanao ny hamaliana ny ratsy fanahy.'
mg1865::mg_19::91::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria hoy ianao: Jehovah o, Ianao no aroko, Sady nataonao ho fonenanao ny Avo Indrindra,'
mg1865::mg_19::91::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy hisy loza hanjo anao, Na aretina hanakaiky ny lainao.'
mg1865::mg_19::91::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy handidy ny anjeliny ny aminao Mba hiaro anao eny amin''izay rehetra halehanao.'
mg1865::mg_19::91::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny an-tanany no hitondran''ireo anao, Fandrao ho tafintohina amin''ny vato ny tongotrao.'
mg1865::mg_19::91::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny liona masiaka sy ny vipera hodiavinao; Ny liona tanora sy ny menarana no hohitsahinao.'
mg1865::mg_19::91::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria Izaho no niraiketan''ny fitiavany, Dia hamonjy azy Aho, Hanandratra azy ho any amin''ny avo Aho, satria mahalala ny anarako izy'
mg1865::mg_19::91::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hiantso Ahy izy, dia hamaly azy Aho; Ho eo aminy Aho, raha ory izy; Hamonjy sy hanome voninahitra azy Aho.'
mg1865::mg_19::91::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 91
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hovokisako fahela-velona izy Ary hasehoko azy ny famonjeko.'
mg1865::mg_19::92::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fifaliana amin''Andriamanitra noho ny asany sy ny fitsarany marina'
  verse_text: 'Salamo. Tonon-kira hatao amin''ny andro Sabata. Tsara ny hidera an''i Jehovah Sy ny hankalaza ny anaranao, ry Avo Indrindra o,'
mg1865::mg_19::92::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hanambara ny famindram-ponao nony maraina Sy ny fahamarinanao nony alina,'
mg1865::mg_19::92::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny valiha tory folo Sy amin''ny feon-dokanga.'
mg1865::mg_19::92::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ampifalinao amin''ny nataonao aho Jehovah o; Ny asan''ny tananao no hihobiako.'
mg1865::mg_19::92::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, akory ny halehiben''ny asanao! Lalina indrindra ny fisainanao.'
mg1865::mg_19::92::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ketrina tsy mahafantatra izany, Ary ny adala koa tsy mba mahalala.'
mg1865::mg_19::92::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mitsiry tahaka ny ahitra ny ratsy fanahy, Ary mamony ny mpanao ratsy rehetra, Dia izany no ho fandringanana azy mandrakizay.'
mg1865::mg_19::92::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Ianao, Jehovah o, dia avo mandrakizay.'
mg1865::mg_19::92::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indreo, ny fahavalonao, Jehovah o, Fa, indreo, ringana ny fahavalonao; Mihahaka ny mpanao ratsy rehetra.'
mg1865::mg_19::92::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tandroko kosa asandratrao ho tahaka ny an''ny ombimanga; Mihosotra diloilo vaovao aho.'
mg1865::mg_19::92::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary faly ny masoko mahita ny amin''ny fahavaloko, Ary finaritra ny sofiko mandre ny amin''ny ratsy fanahy izay efa mitsangana hamely ahy.'
mg1865::mg_19::92::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny marina hamololona tahaka ny rofia*; Hisandrahaka** tahaka ny sedera any Libanona izy; [*palma] [**Hebreo: Ho tonga lehibe]'
mg1865::mg_19::92::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nambolena tao an-tranon''i Jehovah izy Ka maniry eo an-kianjan''Andriamanitsika;'
mg1865::mg_19::92::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mbola manorobona ihany izy, na dia efa antitra aza; Dofodofotra sy maitso izy,'
mg1865::mg_19::92::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 92
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hanambara fa mahitsy Jehovah, Vatolampiko Izay tsy misy tsiny.'
mg1865::mg_19::93::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 93
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fiandrianan''Andriamanitra'
  verse_text: 'Jehovah no Mpanjaka mitafy voninahitra Izy; Jehovah mitafy, eny, misikina hery Izy; Ary izao rehetra izao nampitoerina ka tsy hihetsika.'
mg1865::mg_19::93::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 93
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny seza fiandriananao nampitoerina hatramin''ny fahagola; Hatrizay hatrizay Ianao.'
mg1865::mg_19::93::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 93
  verse_number: 3
  verse_date_revised: '2022-12-17T08:20:59+0000'
  verse_title: null
  verse_text: 'Manandra-peo ny riaka, Jehovah o, Eny, manandra-peo ny riaka; Mampirohondrohona ny feony ny riaka.'
mg1865::mg_19::93::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 93
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihoatra noho ny rano sady be no mahery, Eny, mihoatra noho ny onjan-dranomasina lehibe, Ny voninahitr''i Jehovah any amin''ny avo.'
mg1865::mg_19::93::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 93
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teni-vavolombelonao dia marina indrindra; Fahamasinana no mendrika ny tranonao mandritra ny andro maro, Jehovah o.'
mg1865::mg_19::94::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana amin''Andriamanitra noho ny fampahoriana ataon''ny lozabe'
  verse_text: 'Jehovah, Andriamanitra Mpamaly ny natao, o, Andriamanitra, Mpamaly ny natao, o, mamirapirata.'
mg1865::mg_19::94::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misandrata, ry Mpitsara ny tany, o; Mamalia ny mpiavonavona.'
mg1865::mg_19::94::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahoviana re ny ratsy fanahy, Jehovah o, Mandra-pahoviana re no mbola hifalifaly ny ratsy fanahy?'
mg1865::mg_19::94::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mirezadrezatra sy miteny sahisahy izy; Mirehareha ny mpanao ratsy rehetra.'
mg1865::mg_19::94::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olonao, Jehovah o, torotoroiny, Ary ny lovanao ampahoriny;'
mg1865::mg_19::94::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpitondratena sy ny vahiny vonoiny, Ary ny kamboty dia matiny'
mg1865::mg_19::94::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izy: Tsy mijery Jehovah, Ary tsy mandinika Andriamanitr''i Jakoba.'
mg1865::mg_19::94::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahalalà ianareo olona ketrina; Ary ianareo adala, rahoviana re no mba ho hendry ianareo?'
mg1865::mg_19::94::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Mpanao* ny sofina va tsy handre? Ny Mpamorona ny maso va tsy hahita? [*Hebreo: Mpamboly]'
mg1865::mg_19::94::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Mpampianatra ny jentilisa va tsy hananatra, Dia Izay mampianatra fahalalana ny olona?'
mg1865::mg_19::94::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no mahalala ny hevitry ny olona, Fa zava-poana izany.'
mg1865::mg_19::94::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay olona anarinao, Jehovah o, Sady ampianarinao avy amin''ny lalanao,'
mg1865::mg_19::94::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba homenao fitsaharana amin''ny andro fahoriana izy, Mandra-pihady lavaka ho an''ny ratsy fanahy.'
mg1865::mg_19::94::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah tsy mba hanary ny olony, Ary ny lovany tsy hafoiny.'
mg1865::mg_19::94::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fitsarana hiverina ho amin''ny fahamarinana, Ary hanaraka izany ny mahitsy fo rehetra'
mg1865::mg_19::94::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hitsangana ho ahy hisakana ny mpanao ratsy? Iza no hiseho ho ahy hisakana ny mpanao meloka?'
mg1865::mg_19::94::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy Jehovah no Mpamonjy ahy, Dia efa saiky nalaky nitoetra tao amin''ny mangingina ny fanahiko.'
mg1865::mg_19::94::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony aho nanao hoe: Mangozohozo ny tongotro, Dia ny famindram-ponao, Jehovah o, no nanohana ahy.'
mg1865::mg_19::94::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha be ny ahiahy ato anatiko Dia mampifaly ny fanahiko ny fampiononanao.'
mg1865::mg_19::94::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hikambana aminao va ny seza fiandrianan''ny ratsy, Izay misaina fampahoriana manohitra ny lalàna*? [*Na: Izay misaina fampahoriana araka ny lalàny]'
mg1865::mg_19::94::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao andiany hamely ny fanahin''ny marina ireo Ka manameloka ny rà marina.'
mg1865::mg_19::94::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tonga fiarovana avo ho ahy Jehovah; Ary vatolampy fialofako Andriamanitro.'
mg1865::mg_19::94::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 94
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ampanodiaviny azy ireo ny helony ka aringany noho ny faharatsiany izy; Eny, aringan''i Jehovah Andriamanitsika izy.'
mg1865::mg_19::95::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana hivavaka amin''Andriamanitra sy hankatò ny teniny'
  verse_text: 'Avia, aoka isika hihoby ho an''i Jehovah; Aoka isika hanao feo fifaliana ho an''ny Vatolampy famonjena antsika.'
mg1865::mg_19::95::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hankeo anatrehany amin''ny fiderana isika; Aoka hanao feo fifaliana ho Azy amin''ny fihirana isika.'
mg1865::mg_19::95::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra lehibe Jehovah, Ary Mpanjaka lehibe ambonin''ny andriamanitra rehetra Izy.'
mg1865::mg_19::95::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo an-tanany ny fitoerana lalina amin''ny tany; Ary Azy ny tendrombohitra avo.'
mg1865::mg_19::95::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Azy ny ranomasina, fa Izy no nanao azy, Ary ny tany maina dia noforonin''ny tanany.'
mg1865::mg_19::95::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avia, ka aoka hiondrika sy hiankohoka isika; Aoka isika handohalika eo anatrehan''i Jehovah, Mpanao antsika;'
mg1865::mg_19::95::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no Andriamanitsika; Ary olona fiandriny sy ondry tandremany isika. Enga anie ka hohenoinareo anio ny feony manao hoe:'
mg1865::mg_19::95::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza* manamafy ny fonareo tahaka ny tao Meriba, Sy tahaka ny tamin''ny andro tao Masa fony tany an''efitra, [*Na: Anio raha hihaino ny feony ianareo, dia aza]'
mg1865::mg_19::95::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nakan''ny razanareo fanahy Ahy, Sy nizahany toetra Ahy, na dia efa hitany aza ny asako.'
mg1865::mg_19::95::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa-polo taona no nahamonamonaina Ahy tamin''izany taranaka izany, Ka hoy Izaho: Olona maniasia amin''ny fony izy Ka tsy mahalala ny lalako;'
mg1865::mg_19::95::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 95
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nianiana tamin''ny fahatezerako Aho hoe: Tsy hiditra amin''ny fitsaharako mihitsy izy.'
mg1865::mg_19::96::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Hira fifaliana noho ny hihavian''ny fanjakan''Andriamanitra'
  verse_text: 'Mihira fihiram-baovao ho an''i Jehovah; Mihirà ho an''i Jehovah ry tany rehetra.'
mg1865::mg_19::96::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihirà ho an''i Jehovah, misaora ny anarany; Lazao isan''andro isan''andro ny famonjeny mahafaly.'
mg1865::mg_19::96::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ambarao any amin''ny jentilisa ny voninahiny Ary any amin''ny firenena rehetra ny fahagagana ataony.'
mg1865::mg_19::96::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe Jehovah ka mendrika hoderaina indrindra, Sady mahatahotra, fa ambonin''ny Andriamanitra rehetra.'
mg1865::mg_19::96::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny andriamanitry ny firenena dia tsinontsinona; Fa Jehovah no nanao ny lanitra.'
mg1865::mg_19::96::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Famirapiratana sy voninahitra no eo anatrehany; Hery sy fahatsaran-tarehy no ao amin''ny fitoerany masina.'
mg1865::mg_19::96::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry firenena, manomeza an''i Jehovah, Eny, manomeza voninahitra sy hery ho an i Jehovah.'
mg1865::mg_19::96::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manomeza an''i Jehovah ny voninahitry ny anarany; Mitondrà fanatitra, ka mankanesa eo an-kianjany.'
mg1865::mg_19::96::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miankohofa eo anatrehan''i Jehovah amin''ny fihaingoana masina; Mangovita eo anatrehany, ry tany rehetra.'
mg1865::mg_19::96::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lazao any amin''ny jentilisa fa Jehovah no Mpanjaka; Ary izao rehetra izao voaorina ka tsy hihetsika; Hitsara ny olona amin''ny fahamarinana Izy.'
mg1865::mg_19::96::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho faly ny lanitra ary ho ravoravo ny tany; Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy.'
mg1865::mg_19::96::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho faly ny saha sy izay rehetra eo aminy; Dia hihoby amin''izay ny hazo rehetra any an''ala'
mg1865::mg_19::96::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 96
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anatrehan''i Jehovah, fa avy Izy, Eny, avy hitsara ny tany Izy; Hitsara izao tontolo izao araka ny rariny Izy Ary ny firenena amin''ny fahamarinany.'
mg1865::mg_19::97::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fisehoan''ny fanjakan''Andriamanitra amin''ny hery izay maharava ny sampy, fa mahasoa ny mpanompon''Andriamanitra kosa'
  verse_text: 'Jehovah no Mpanjaka, aoka ho faly ny tany; Aoka ho ravoravo ny nosy maro.'
mg1865::mg_19::97::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rahona sy aizim-pito no manodidina Azy Fahamarinana sy fitsarana no fanorenan''ny seza fiandrianany.'
mg1865::mg_19::97::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy afo mialoha Azy ka mandevona ny fahavalony manodidina.'
mg1865::mg_19::97::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahazava izao tontolo izao ny helany; Mahita izany ny tany ka mihorohoro.'
mg1865::mg_19::97::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tendrombohitra miempo tahaka ny savoka eo anatrehan''i Jehovah, Dia eo anatrehan''ny Tompon''ny tany rehetra.'
mg1865::mg_19::97::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra maneho ny fahamarinany, Ary ny firenena rehetra mahita ny voninahiny.'
mg1865::mg_19::97::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra sy miarahaba tena ny amin''ny andriamani-tsy izy; Miankohofa eo anoloan''i Jehovah ianareo andriamanitra rehetra.'
mg1865::mg_19::97::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ziona mandre ka faly; Ary ravoravo ny zanakavavin''i Joda Noho ny fitsaranao, Jehovah o.'
mg1865::mg_19::97::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah o, no avo indrindra ambonin''ny tany rehetra; Efa avo ambonin''ny andriamanitra rehetra Ianao.'
mg1865::mg_19::97::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay tia an''i Jehovah, mankahalà ny ratsy; Miaro ny fanahin''ny olony masina Izy Ary mamonjy azy amin''ny tanan''ny ratsy fanahy.'
mg1865::mg_19::97::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahazavana no voafafy ho an''ny marina, Ary ny fifaliana ho an''ny mahitsy fo.'
mg1865::mg_19::97::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 97
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia amin''i Jehovah, ry olo-marina, Ary miderà ny anarany masina*. [*Na: ny fahatsiarovana ny fahamasinany]'
mg1865::mg_19::98::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fifaliana amin''Andriamanitra noho ny nanehoany ny famonjeny sy ny fahamarinany'
  verse_text: 'Fihirana. Mihirà fihiram-baovao ho an''i Jehovah; Fa efa nanao fahagagana Izy; Ny tanany ankavanana sy ny sandriny masina no nahavitany famonjena.'
mg1865::mg_19::98::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nampahafantatra ny famonjeny; Teo imason''ny jentilisa no nanehoany ny fahamarinany.'
mg1865::mg_19::98::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahatsiaro ny famindram-pony sy ny fahamarinany tamin''ny taranak''i Isiraely Izy; Efa nahita ny famonjen''Andriamanitsika ny vazan-tany rehetra.'
mg1865::mg_19::98::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihobia ho an''i Jehovah, ry tany rehetra, Velomy ny hoby, ka mihirà.'
mg1865::mg_19::98::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah amin''ny lokanga, Dia amin''ny lokanga sy ny feo fihirana,'
mg1865::mg_19::98::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''ny trompetra sy ny fitsofana ny anjomara, Ka mihobia eo anatrehan''i Jehovah Mpanjaka.'
mg1865::mg_19::98::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy, Izao rehetra izao sy ny mponina eo aminy.'
mg1865::mg_19::98::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiteha-tanana ny riaka; Aoka hiara-mihoby aminy koa ny tendrombohitra'
mg1865::mg_19::98::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 98
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo anatrehan''i Jehovah, fa avy hitsara ny tany Izy; Hitsara izao rehetra izao amin''ny fahamarinana Izy Ary ny firenena amin''ny fahitsiana.'
mg1865::mg_19::99::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanomezam-boninahitra an''Andriamanitra noho ny fahalehibiazany sy ny fahamarinany'
  verse_text: 'Jehovah no Mpanjaka aoka hangovitra ny firenena; Mipetraka amin''ny kerobima Izy, aoka hihorohoro ny tany.'
mg1865::mg_19::99::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lehibe any Ziona Jehovah; Ary avo ambonin''ny firenena rehetra Izy.'
mg1865::mg_19::99::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera ny anaranao lehibe sy mahatahotra ireo; Fa masina Jehovah.'
mg1865::mg_19::99::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny herin''ny mpanjaka dia tia rariny; Ampitoerinao ny fahitsiana; Fitsarana sy fahamarinana no ataonao eo amin''i Jakoba.'
mg1865::mg_19::99::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manandrata an''i Jehovah Andriamanitsika ianareo, Ka miankohofa eo amin''ny fitoeran-tongony; Fa masina Izy.'
mg1865::mg_19::99::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mosesy sy Arona tamin''ny mpisorony, Ary Samoela tamin''izay mpiantso ny anarany, Niantso an''i Jehovah ireo, ary namaly: azy Izy.'
mg1865::mg_19::99::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niteny taminy tao anatin''ny andri-rahona Izy; Nitandrina ny teni-vavolombelony izy ireo, Dia ny didy izay efa nomeny azy.'
mg1865::mg_19::99::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitray o, Ianao no namaly ny nataony; Andriamanitra, Mpamela ny helony, Ianao, Na dia namaly azy noho ny nataony aza.'
mg1865::mg_19::99::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 99
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Asandrato Jehovah Andriamanitsika, Ary miankohofa eo an-tendrombohiny masina; Fa masina Jehovah Andriamanitsika.'
mg1865::mg_19::100::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 100
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana izao tontolo izao hanompo an''i Jehovah'
  verse_text: 'Salamo ho fiderana. Mihobia ho an''i Jehovah, ry tany rehetra.'
mg1865::mg_19::100::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 100
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manompoa an''i Jehovah amin''ny fifaliana; Mankanesa eo anatrehany amin''ny fihobiana.'
mg1865::mg_19::100::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 100
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fantatrareo fa Jehovah no Andriamanitra; Izy no nanao antsika, ary Azy isika*, Dia olony sy ondry fiandriny. [*Na: fa tsy isika]'
mg1865::mg_19::100::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 100
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midira eo amin''ny vavahadiny amin''ny fisaorana, Ary eo an-kianjany amin''ny fiderana; Misaora Azy, mankalazà ny anarany,'
mg1865::mg_19::100::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 100
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsara Jehovah; Mandrakizay ny famindram-pony, Ary mihatra amin''ny taranaka fara mandimby ny fahamarinany.'
mg1865::mg_19::101::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fikasan''ny mpanjaka ny amin''ny hitondrany marina ny fanjakany'
  verse_text: 'Salamo nataon''i Davida. Famindram-po sy fitsarana no hankalazaiko; Ianao, Jehovah o, no hoderaiko.'
mg1865::mg_19::101::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitandrina ny lalana marina aho; Rahoviana no ho tonga aty amiko Ianao? Handeha amin''ny fahitsian''ny foko ao anatin''ny tranoko aho.'
mg1865::mg_19::101::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hampitoetra zava-dratsy eo anoloan''ny masoko aho; Halako ny mivadika, Tsy hikambana amiko izany.'
mg1865::mg_19::101::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 4
  verse_date_revised: '2022-10-24T04:40:31+0000'
  verse_title: null
  verse_text: 'Ny fo maditra hiala amiko; Tsy hankasitraka* izay ratsy aho, [*Hebreo: hahalala]'
mg1865::mg_19::101::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manendrikendrika ny namany mangingina dia hofongorako; Tsy tohako izay miandranandrana sy miavonavona am-po;'
mg1865::mg_19::101::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoko hijery izay olo-mahatoky amin''ny tany mba hitoerany ato amiko; Izay mandeha amin''ny lalana marina no hanompo ahy.'
mg1865::mg_19::101::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba hitoetra ao anatin''ny tranoko izay manao fitaka; Tsy mba hijanona eo anoloan''ny masoko izay milaza lainga.'
mg1865::mg_19::101::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 101
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haringako isa-maraina ny ratsy fanahy rehetra amin''ny tany, Mba hofongorako ny mpanao ratsy rehetra tsy ho ao an-tanànan''i Jehovah.'
mg1865::mg_19::102::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainan''ny mpanompon''Andriamanitra noho ny fahoriana nahazo azy sy ny naharavan''i Jerosalema'
  verse_text: 'Fivavaky ny ory, raha reraka izy ka mandoatra ny alahelony eo anatrehan''i Jehovah. Jehovah o, henoy ny fivavako, Ary aoka hankeo aminao ny fitarainako.'
mg1865::mg_19::102::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manafina ny tavanao amiko amin''ny andro fahoriako; Atongilano amiko ny sofinao; Amin''ny andro itarainako dia faingàna hamaly ahy.'
mg1865::mg_19::102::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa levon-ko setroka ny androko Ary ny taolako mahamay tahaka ny forohana.'
mg1865::mg_19::102::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Taninina tahaka ny ahitra ny foko ka malazo; Fa hadinoko na dia ny fihinanan-kanina aza.'
mg1865::mg_19::102::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fisentoan''ny foko Ny taolako miraikitra amin''ny hoditro.'
mg1865::mg_19::102::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny sama any an''efitra aho, Ary tahaka ny vorondolo any an-tanànaolo.'
mg1865::mg_19::102::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahita tory aho Sady tahaka ny tsikirity irery eo an-tampontrano.'
mg1865::mg_19::102::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandatsa ahy mandrakariva ny fahavaloko. Izay misafoaka amiko dia manao ahy ho fiozonana.'
mg1865::mg_19::102::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lavenona no nohaniko tahaka ny mofo; Ary ny zavatra nosotroiko noharoharoiko ny ranomasoko,'
mg1865::mg_19::102::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fahaviniranao sy ny fahatezeranao; Fa naingainao aho, kanefa natontanao indray.'
mg1865::mg_19::102::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny androko dia tahaka ny aloka efa mandroso; Ary efa malazo tahaka ny ahitra aho.'
mg1865::mg_19::102::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Ianao, Jehovah o, mipetraka manjaka mandrakizay; Ary ny fahatsiarovana Anao mihatra amin''ny taranaka fara mandimby.'
mg1865::mg_19::102::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao hitsangana ka hamindra fo amin''i Ziona; Fa efa andro hamindram-po aminy izao; Eny, tonga ny fotoana.'
mg1865::mg_19::102::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sitraky ny mpanomponao ny vatony, Sady malahelo ny vovo-taniny izy.'
mg1865::mg_19::102::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatahotra ny anaran''i Jehovah ny jentilisa, Ary ny mpanjaka rehetra amin''ny tany hatahotra ny voninahitrao;'
mg1865::mg_19::102::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah nanangana an''i Ziona; Niseho tamin''ny voninahiny Izy;'
mg1865::mg_19::102::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nijery ny fivavaky ny mahantra Izy Ka tsy nanevateva ny fivavany.'
mg1865::mg_19::102::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hosoratana ho an''ny taranaka mandimby izany; Ary izay firenena mbola hoforonina no hidera an''i Jehovah;'
mg1865::mg_19::102::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy nitazana tany amin''ny fitoerany masina any amin''ny avo. Tany an-danitra no nitsinjovan''i Jehovah ny tany,'
mg1865::mg_19::102::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hihaino ny fisentoan''ny mpifatotra Sy hanafaka izay voatendry ho faty*, [*Hebreo: zanaky ny fahafatesana]'
mg1865::mg_19::102::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hotorina any Ziona ny anaran''i Jehovah, Ary ny fiderana Azy any Jerosalema,'
mg1865::mg_19::102::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa tafangona ny firenena Sy ny fanjakana maro hanompo an''i Jehovah.'
mg1865::mg_19::102::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahaketraka ny heriko tany an-dàlana Izy; Efa nahafohy ny androko Izy;'
mg1865::mg_19::102::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho: Andriamanitro o; aza maka ahy an-tenatenan''ny androko; Ny taonanao mihatra amin''ny taranaka fara mandimby.'
mg1865::mg_19::102::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tany aloha no nanorenanao ny tany; Ary asan''ny tananao ny lanitra.'
mg1865::mg_19::102::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo dia ho levona, fa Ianao no maharitra; Izy rehetra ho rovitra toy ny fitafiana; Toy ny lamba no hanovanao azy, ka hovana izy;'
mg1865::mg_19::102::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no tsy miova, Ary ny taonanao no tsy ho tapitra.'
mg1865::mg_19::102::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 102
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny zanaky ny mpanomponao handry fahizay*, Ary ny taranany hampitoerina eo anatrehanao. [*Na: dia mbola haharitra]'
mg1865::mg_19::103::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny fahatsarany sy ny famindram-pony. Nataon''i Davida'
  verse_text: 'Misaora an''i Jehovah, ry fanahiko; Ary izay rehetra ato anatiko, misaora ny anarany masina.'
mg1865::mg_19::103::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''i Jehovah, ry fanahiko; Ary aza misy hadinoinao ny fitahiany rehetra,'
mg1865::mg_19::103::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamela ny helokao rehetra, Izay manasitrana ny aretinao rehetra,'
mg1865::mg_19::103::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manavotra ny ainao tsy hidina any an-davaka, Izay manarona famindram-po sy fiantrana anao,'
mg1865::mg_19::103::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mahavoky soa ny vavanao*; Ny fahatanoranao mody indray toy ny an''ny voromahery**. [*Na: fanahinao, na fahanteranao] [**Na: ho toy ny voromahery]'
mg1865::mg_19::103::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah manao fahamarinana Sy fitsarana amin''izay rehetra ampahorina.'
mg1865::mg_19::103::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nampahafantatra an''i Mosesy ny lalan-kalehany Izy; Ny Zanak''Isiraely nampahafantariny ny asany.'
mg1865::mg_19::103::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindra fo sy miantra Jehovah, Mahari-po sady be famindram-po.'
mg1865::mg_19::103::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mandaha-teny mandrakariva Izy, Na mitahiry fahatezerana mandrakizay.'
mg1865::mg_19::103::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba manao amintsika araka ny fahotantsika Izy, Na mamaly antsika araka ny helotsika.'
mg1865::mg_19::103::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny hahavon''ny lanitra ambonin''ny tany No haben''ny famindram-pony amin''izay matahotra Azy.'
mg1865::mg_19::103::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny halavitry ny atsinanana amin''ny andrefana No halavitry ny anesorany ny fahotantsika amintsika.'
mg1865::mg_19::103::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny fiantràn''ny ray ny zanany No fiantran''i Jehovah izay matahotra Azy;'
mg1865::mg_19::103::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy mahalala ny toetsika Ka mahatsiaro fa vovoka isika.'
mg1865::mg_19::103::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny ahitra ny andron''ny zanak''olombelona; Tahaka ny vonin-javatra any an-tsaha ny famoniny,'
mg1865::mg_19::103::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsofin''ny rivotra izy ka lasa, Ary tsy mahalala azy intsony ny fitoerany.'
mg1865::mg_19::103::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny famindram-pon''i Jehovah dia hatramin''ny taloha indrindra ka ho mandrakizay amin''izay matahotra Azy Ary ny fahamarinany mihatra amin''ny taranaka.'
mg1865::mg_19::103::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia amin''izay mitandrina ny fanekeny Sy mahatsiaro hankatò ny didiny.'
mg1865::mg_19::103::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nampitoetra ny seza fiandrianany any an-danitra; Ary ny fanjakany manapaka izao tontolo izao.'
mg1865::mg_19::103::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''i Jehovah, ianareo anjeliny, Dia ianareo izay mahery indrindra sady mankatò ny didiny Ary mihaino ny feon''ny teniny.'
mg1865::mg_19::103::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''i Jehovah, ny miaramilany rehetra, Dia ny mpanompony izay manao ny sitrapony.'
mg1865::mg_19::103::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 103
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''i Jehovah, ny asany rehetra eran''ny fanjakany; Misaora an''i Jehovah, ry fanahiko.'
mg1865::mg_19::104::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra, Mpamorona sy Mpiahy izao rehetra izao'
  verse_text: 'Misaora an''i Jehovah, ry fanahiko. Jehovah Andriamanitro o, lehibe indrindra Ianao, Famirapiratana sy voninahitra no fitafinao,'
mg1865::mg_19::104::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitafy ny mazava tahaka ny lamba Izy Ary mamelatra ny lanitra tahaka ny lay,'
mg1865::mg_19::104::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mametraka ny rairain-drihan''ny tranony amin''ny rano, Sady manao ny rahona matevina ho kalesiny ka mandeha amin''ny elatry ny rivotra,'
mg1865::mg_19::104::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manao ny rivotra ho irany Sy ny lelafo ho mpanompony*. [*Na: Manao ny anjeliny ho rivotra Ary ny mpanompony ho lelafo]'
mg1865::mg_19::104::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanorina ny tany tambonin''ny fanorenany Izy, Mba tsy hihetseha-ny mandrakizay doria.'
mg1865::mg_19::104::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny rano lalina no nasaronao azy tahaka ny lamba; Nandifotra ny tendrombohitra aza ireny.'
mg1865::mg_19::104::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny teny mafy nataonao dia nandositra ny tendrombohitra, Noho ny feon''ny kotrokoranao dia nirifatra izy'
mg1865::mg_19::104::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisondrotra ny tendrombohitra, nietry ny lohasaha ho any amin''izay namboarinao hitoerany.'
mg1865::mg_19::104::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nasianao fetra tsy hihoarany izy Mba tsy hiverina hanarona ny tany.'
mg1865::mg_19::104::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampandeha loharano eny amin''ny lohasaha Izy; Eny anelanelan''ny tendrombohitra no alehan''ireny,'
mg1865::mg_19::104::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka isotroan''ny bibi-dia rehetra, Sy analan''ny boriki-dia ny hetahetany;'
mg1865::mg_19::104::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eo amboniny no itoeran''ny voro-manidina; Ary eo amin''ny ran-tsan-kazo no anenoany.'
mg1865::mg_19::104::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manondra-drano ny tendrombohitra avy amin''ny tranony ambony Izy; Ny vokatry ny asanao no mahavoky ny tany.'
mg1865::mg_19::104::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampaniry ahitra ho an''ny biby fiompy Izy Sy anana hahasoa ny olona. Ary mamoaka hanina avy amin''ny tany.'
mg1865::mg_19::104::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary divay izay mampifaly ny olona, ka mampinendonendo ny tavany mihoatra noho ny diloilo, Ary mofo hanohanana ny ain''ny olona.'
mg1865::mg_19::104::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voky ny hazon''i Jehovah, Dia ny sederan''i Libanona, izay namboleny;'
mg1865::mg_19::104::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay anaovan''ny voron-kely ny akaniny; Ary ny vano, dia ao amin''ny kypreso no anaovany ny tranony.'
mg1865::mg_19::104::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tendrombohitra avo dia ho an''ny osi-dia; Ny harambato no fiarovana ho an''ny hyraka.'
mg1865::mg_19::104::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao ny volana ho fotoana Izy, Ary ny masoandro mahalala ny filentehany.'
mg1865::mg_19::104::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatonga aizina Ianao, dia tonga ny alina, Ka mivezivezy ny biby rehetra any an''ala;'
mg1865::mg_19::104::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny liona tanora mierona maniry toha Ka mitady ny haniny avy amin''Andriamanitra.'
mg1865::mg_19::104::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miposaka ny masoandro, dia miverina ireny, Ary ao an-davany no amitsahany.'
mg1865::mg_19::104::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny olona kosa mivoaka ho any amin''ny taozavany, Sy ny asany mandra-paharivan''ny andro.'
mg1865::mg_19::104::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny hamaroan''ny asanao, Jehovah o! Fahendrena no nanaovanao azy rehetra; Henika ny zavatra nataonao* ny tany. [*Na: ny harenao]'
mg1865::mg_19::104::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro ny ranomasina sady lehibe no malalaka, Any no misy zava-mihetsiketsika tsy tambo isaina, Dia zava-miaina, na kely na lehibe.'
mg1865::mg_19::104::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any no alehan''ny sambo Sy ny trozona, izay noforoninao hilaolao any*. [*Na: holaolaovinao]'
mg1865::mg_19::104::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ireo rehetra ireo miandry Anao, Mba homenao ny haniny amin''ny fotoany.'
mg1865::mg_19::104::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manome Ianao, dia manangona izy; Manokatra ny tananao Ianao, dia voky ny soa izy;'
mg1865::mg_19::104::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manafina ny tavanao Ianao, dia raiki-tahotra izy; Alainao indray ny ainy, dia maty izy Ka mody any amin''ny vovoka nanalana azy,'
mg1865::mg_19::104::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maniraka ny Fanahinao Ianao, dia ary izy, Ary manavao ny tarehin''ny tany Ianao.'
mg1865::mg_19::104::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho mandrakizay anie ny voninahitr''i Jehovah; Aoka Jehovah hifaly amin''ny asany.'
mg1865::mg_19::104::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereny ny tany, dia mihorohoro; Tendren''ny tanany ny tendrombohitra, dia midonaka.'
mg1865::mg_19::104::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihira ho an''i Jehovah aho, raha mbola velona koa; Hankalaza an''Andriamanitro aho, raha mbola miaina.'
mg1865::mg_19::104::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho maminy anie ny fisainako Azy; Izaho no hifaly amin''i Jehovah.'
mg1865::mg_19::104::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 104
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho lany ringana tsy ho ety amin''ny tany ny mpanota, Ary ny ratsy fanahy tsy ho ety intsony. Misaora an''i Jehovah, ry fanahiko. Haleloia.'
mg1865::mg_19::105::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanomezam-boninahitra an''Andriamanitra noho ny asany mahagaga tamin''ny nitondrany ny Isiraely nivoaka avy tany Egypta'
  verse_text: 'Miderà an''i Jehovah, miantsoa ny anarany; Ataovy fantatra any amin''ny firenena ny asany.'
mg1865::mg_19::105::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihirà ho Azy, mankalazà Azy; Saintsaino ny fahagagana rehetra ataony.'
mg1865::mg_19::105::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy ho reharehanareo ny anarany masina; Aoka hifaly ny fon''izay mitady an''i Jehovah.'
mg1865::mg_19::105::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitadiava an''i Jehovah sy ny heriny Katsaho mandrakariva ny tavany.'
mg1865::mg_19::105::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsarovy ny asa mahagaga natao-ny Dia ny fahagagany sy ny fitsaran''ny vavany,'
mg1865::mg_19::105::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry taranak''i Abrahama mpanompony, Dia ianareo olom-boafidiny, taranak''i Jakoba.'
mg1865::mg_19::105::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Izy no Andriamanitsika; Manerana ny tany rehetra ny fitsarany.'
mg1865::mg_19::105::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiaro ny fanekeny mandrakizay Izy, Dia ilay teny izay voadidiny ho an''ny taranaka arivo mandimby,'
mg1865::mg_19::105::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, ilay nataony tamin''i Abrahama, Sy ny fianianany tamin''Isaka;'
mg1865::mg_19::105::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay naoriny ho lalana ho an''i Jakoba, Sy ho fanekena mandrakizay ho an''Isiraely,'
mg1865::mg_19::105::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nataony hoe: Homeko anao ny tany Kanana, Ho lovanareo voazara amin''ny famolaina,'
mg1865::mg_19::105::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony mbola olom-bitsy izy, Eny, vitsy sady vahiny tao,'
mg1865::mg_19::105::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nifindrafindra tany amin''ny firenena, Sy nifindrafindra fanjakana ho amin''ny firenen-kafa,'
mg1865::mg_19::105::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nisy navelany hampahory azy, Ary nananatra mpanjaka Izy noho ny amin''ireo hoe:'
mg1865::mg_19::105::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manendry ireo voahosotro, Ary aza manisy ratsy ireo mpaminaniko.'
mg1865::mg_19::105::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso ny mosary ho amin''ny tany Izy; Notapahiny avokoa ny mofo rehetra, izay tohan''aina;'
mg1865::mg_19::105::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naniraka lehilahy hialoha azy Izy; Josefa namidy ho andevo;'
mg1865::mg_19::105::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampijaliny tamin''ny fatorana ny tongony; Nogadrany vy izy.'
mg1865::mg_19::105::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahatongan''ny fotoana hahatanterahan''ny teniny; Nizaha toetra azy ny tenin''i Jehovah.'
mg1865::mg_19::105::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naniraka ny mpanjaka hamaha azy, Eny, ny mpanapaka ny vahoaka, mba handefa azy.'
mg1865::mg_19::105::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao azy ho tompon''ny tranony izy Sy ho mpanapaka ny fananany rehetra,'
mg1865::mg_19::105::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hamatotra ny mpanapaka araka ny sitrapony, Sy hampianatra fahendrena ny loholony.'
mg1865::mg_19::105::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Isiraely nankany Egypta; Eny, Jakoba nivahiny tany amin''ny tanin''i Hama.'
mg1865::mg_19::105::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahamaro ny taranaky ny olony ho be indrindra Izy ka nampahery azy noho ny fahavalony.'
mg1865::mg_19::105::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampiova ny fon''ireny hankahala ny olony Izy Sy hihendry ny mpanompony.'
mg1865::mg_19::105::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naniraka an''i Mosesy mpanompony Sy Arona izay nofidiny Izy.'
mg1865::mg_19::105::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy ireo nanao ny famantarany teo aminy Sy fahagagana tany amin''ny tanin''i Hama.'
mg1865::mg_19::105::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahatonga aizina Izy ka nahamaizina; Ary tsy nandà ny teniny izy ireo.'
mg1865::mg_19::105::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahatonga ny ranony ho rà Izy Ka nahafaty ny hazandranony.'
mg1865::mg_19::105::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisy sahona betsaka ny taniny, Eny, na dia hatrao an-trano fandrian''ny mpanjakany aza.'
mg1865::mg_19::105::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niteny Izy, dia tonga ny lalitra betsaka* Sy ny moka teny amin''ny faritaniny rehetra. [*Na: fihitra, na kalalao]'
mg1865::mg_19::105::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahatonga havandra ho solon''ny ranonorana Izy Sy afo midedadeda teny amin''ny taniny.'
mg1865::mg_19::105::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namely ny voalobony sy ny aviaviny Izy Ka nanapatapaka ny hazo teo amin''ny taniny.'
mg1865::mg_19::105::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niteny Izy, dia tonga ny valala Sy ny sompanga tsy hita isa;'
mg1865::mg_19::105::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nihinana ny zava-maitso rehetra teny amin''ny taniny ireny Ka nandany ny vokatry ny taniny.'
mg1865::mg_19::105::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary namely ny lahimatoa rehetra tany amin''ny taniny Izy, Dia ny voalohan''ainy rehetra.'
mg1865::mg_19::105::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nitondra ny olony nivoaka Izy sady nampahazo azy volafotsy sy volamena; Ary tsy nisy nangozohozo na dia iray akory aza tamin''ny fireneny.'
mg1865::mg_19::105::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faly Egypta tamin''ny nahalasanany; Fa efa nahazo azy ny fahatahorana ireo.'
mg1865::mg_19::105::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namelatra rahona ho fialokalofana Izy Ary afo ho fanazavana nony alina.'
mg1865::mg_19::105::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nangataka izy ireo, dia nahatonga papelika Izy, Ary mofon-danitra no namokisany azy.'
mg1865::mg_19::105::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanokatra ny vatolampy Izy, dia nigororoana ny rano Ka nandriaka tamin''ny tany maina ho renirano.'
mg1865::mg_19::105::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nahatsiaro ny teniny masina Sy Abrahama mpanompony Izy,'
mg1865::mg_19::105::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra ny olony nivoaka tamin''ny fifaliana Izy Ary ny voafidiny tamin''ny fihobiana;'
mg1865::mg_19::105::44:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia nanome azy ny tanin''ny jentilisa Izy; Ary nandova ny vitan''ny firenena maro ireny,'
mg1865::mg_19::105::45:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 105
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hitandremany ny didiny, Sy hankatoavany ny lalàny. Haleloia.'
mg1865::mg_19::106::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fivadibadihan''ny Isiraely ampitahaina amin''ny fahamarinan''Andriamanitra'
  verse_text: 'Haleloia. Miderà an''i Jehovah, fa tsara Izy, Fa mandrakizay ny famindram-pony.'
mg1865::mg_19::106::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahalaza ny asa lehibe ataon''i Jehovah, Na mahatonona ny fiderana Azy rehetra?'
mg1865::mg_19::106::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay mitandrina ny mety Ka manao ny marina mandrakariva.'
mg1865::mg_19::106::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tsarovy aho araka ny fankasitrahanao ny olonao; Vangio amin''ny famonjenao aho,'
mg1865::mg_19::106::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahitako ny soa azon''ny voafidinao, Hifaliako amin''ny fifalian''ny firenenao, Hiravoravoako miaraka amin''ny lovanao.'
mg1865::mg_19::106::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanota izahay mbamin''ny razanay, Efa nanao izay meloka sy ratsy izahay.'
mg1865::mg_19::106::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny razanay tany Egypta tsy mba nandinika ny fahagagana nataonao; Tsy mba nahatsiaro ny habetsahan''ny famindram-ponao ireny, Fa niodina teo amoron-dranomasina, Dia teo amoron''ny Ranomasina Mena'
mg1865::mg_19::106::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa namonjy azy ihany Izy noho ny anarany, Mba hampahafantarany ny asany lehibe.'
mg1865::mg_19::106::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia noteneniny mafy ny Ranomasina Mena, ka tonga maina iny; Ary nitondra azy nita ny rano lalina tahaka ny efitra Izy,'
mg1865::mg_19::106::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namonjy azy tamin''ny tanan''ny mpandrafy Izy Ary nanavotra azy tamin''ny tanan''ny fahavalo.'
mg1865::mg_19::106::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nosaronan''ny rano kosa ny rafiny. Ka tsy nisy niangana na dia iray akory aza.'
mg1865::mg_19::106::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nino ny teniny izy Ka nihira ny fiderana Azy.'
mg1865::mg_19::106::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nalaky nanadino ny asany izy ka tsy niandry ny saina hatolony,'
mg1865::mg_19::106::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fatra-pila izy tany an''efitra, Sady naka fanahy an''Andriamanitra tany an-tany foana.'
mg1865::mg_19::106::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nomeny azy izay nilainy, Kanefa nampahahiaziny kosa izy*. [*Na: ny fanahiny]'
mg1865::mg_19::106::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nialona an''i Mosesy tany an-toby Izy ireo Sady nialona an''i Arona, olo-masin''i Jehovah.'
mg1865::mg_19::106::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisokatra ny tany, dia nitelina an''i Datana Ka nanarona ny antokon*''i Abàrama. [*Hebreo: ny fiangonany]'
mg1865::mg_19::106::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nisy afo nirehitra tamin''ny antokony*; Lelafo no nandoro ny ratsy fanahy. [*Hebreo: ny fiangonany]'
mg1865::mg_19::106::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanao ombilahy kely tany Horeba izy Ka niankohoka teo anoloan''ny sarin-javatra an-idina.'
mg1865::mg_19::106::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny voninahiny dia natakalony Sarin''ny omby homana ahitra.'
mg1865::mg_19::106::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nohadinoiny Andriamanitra, Mpamonjy azy, Izay efa nanao zava-dehibe tany Egypta,'
mg1865::mg_19::106::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia fahagagana tany amin''ny tanin''i Hama sy zava-mahatahotra teo amin''ny Ranomasina Mena.'
mg1865::mg_19::106::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nikasa* handringana azy Izy, Raha tsy Mosesy voafidiny no nandroso hijoro tamin''ny banga teo anatrehany hampiala ny fahatezerany mba tsy handringanany azy. [*Hebreo: nilaza]'
mg1865::mg_19::106::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanamavo ny tany mahafinaritra ireo Sady tsy mba nino ny teniny,'
mg1865::mg_19::106::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nimonomonona tany an-dainy Ka tsy nihaino ny feon''i Jehovah.'
mg1865::mg_19::106::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanandratra ny tanany taminy Izy, Fa hampiampatrampatra azy any an''efitra'
mg1865::mg_19::106::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taranany kosa any amin''ny jentilisa, Ary hampihahakahaka azy any amin''ny tany maro Izy.'
mg1865::mg_19::106::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nikambana tamin''i Bala-peora ireo ka nihinana ny fanatitra ho an''ny maty,'
mg1865::mg_19::106::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampahatezitra an''i Jehovah tamin''ny nataony, Ka dia namely azy tampoka ny areti-mandringana.'
mg1865::mg_19::106::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nitsangana nandroso Finehasa ka nanao fitsarana; Dia nitsahatra ny areti-mandringana.'
mg1865::mg_19::106::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisaina ho fahamarinany izany Hatramin''ny taranaka fara mandimby mandrakizay.'
mg1865::mg_19::106::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampahatezitra an''i Jehovah teo anilan''ny ranon''i Meriba ireo, Ka nisy nanjo an''i Mosesy noho ny nataon''ireo;'
mg1865::mg_19::106::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niodina tamin''ny Fanahin''i Jehovah ireo, ka dia nihoa-bava Mosesy.'
mg1865::mg_19::106::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy naringany ny firenena Izay nasain''i Jehovah naringany;'
mg1865::mg_19::106::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nifangaro tamin''ny jentilisa izy Ka nianatra ny fanaony,'
mg1865::mg_19::106::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanompo ny sampiny izy, Ka dia nody fandrika ho azy izany.'
mg1865::mg_19::106::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namono ny zananilahy sy ny zananivavy ho fanatitra ho an''ny demonia* ireo; [*Hebreo: ireo tompo]'
mg1865::mg_19::106::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nandatsaka rà marina izy, Dia ny ran''ny zananilahy sy ny zananivavy, Izay novonoiny ho fanatitra ho an''ny sampin''i Kanana; Ka dia nametaveta ny tany tamin''ny rà izy.'
mg1865::mg_19::106::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary naloto tamin''ny asany izy Ary nahatonga azy ho mijangajanga ny nataony.'
mg1865::mg_19::106::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nirehitra tamin''ny olony ny fahatezeran''i Jehovah, Ka nataony ho zava-betaveta ny lovany.'
mg1865::mg_19::106::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nanolotra azy teo an-tanan''ny jentilisa Izy, Ka izay nankahala azy no nanapaka azy.'
mg1865::mg_19::106::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampahory azy ny fahavalony, Ka naetry tambanin''ny tanany izy.'
mg1865::mg_19::106::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matetika Izy no nahafaka azy; Fa ireo kosa niodina taminy ihany araka ny fisainany Ka nihalevona noho ny helony.'
mg1865::mg_19::106::44:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa nijery ny fahoriany ihany Izy. Raha nandre ny fitarainany;'
mg1865::mg_19::106::45:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nahatsiaro ny fanekeny Izy Ka nanenina araka ny haben''ny famindram-pony.'
mg1865::mg_19::106::46:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nataony nahita famindram-po ireny Tamin''izay rehetra namabo azy.'
mg1865::mg_19::106::47:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo izahay, ry Jehovah Andriamanitray o, Ka angony avy amin''ny jentilisa, Mba hisaoranay ny anaranao masina Sy hifalianay amin''ny fiderana Anao.'
mg1865::mg_19::106::48:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 106
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah Andriamanitry ny Isiraely, hatramin''ny taloha indrindra ka mandrakizay; Ary aoka ny olona rehetra hanao hoe: Amena! Haleloia.'
mg1865::mg_19::107::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 1
  verse_date_revised: '2022-11-01T15:22:50+0000'
  verse_title: 'BOKY FAHADIMY, Fiantsoana ny olona efa nahita soa tamin''Andriamanitra mba hisaotra Azy'
  verse_text: 'Miderà an''i Jehovah, fa tsara Izy. Fa mandrakizay ny famindram-pony.'
mg1865::mg_19::107::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hanao izany ny navotan''i Jehovah, Dia izay navotany ho afa-ka tamin''ny tanan''ny fahavalo*, [*Na: fahoriana]'
mg1865::mg_19::107::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy nangoniny avy tany amin''ny tany maro, Dia avy tany atsinanana sy andrefana ary tany avaratra sy tany amin''ny ranomasina.'
mg1865::mg_19::107::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nirenireny tany an''efitra ireny ka nanavatsava tany an-tany foana, Ary tsy nahita tanàna honenana.'
mg1865::mg_19::107::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noana sy nangetaheta izy, Sady reraka ny ainy tao anatiny,'
mg1865::mg_19::107::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny;'
mg1865::mg_19::107::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitondra azy tamin''ny lalana mahitsy Izy, Mba hankanesany any amin''izay tanàna honenana.'
mg1865::mg_19::107::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona!'
mg1865::mg_19::107::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahafa-po ny fanahy mangetaheta Izy, Ary ny fanahy noana dia vokisany soa.'
mg1865::mg_19::107::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nipetraka tao amin''ny maizina sy ny aloky ny fahafatesana, Voafato-pahoriana sy vy,'
mg1865::mg_19::107::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria nandà ny tenin''Andriamanitra Sady naniratsira ny anatry ny Avo Indrindra;'
mg1865::mg_19::107::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampietreny tamin''ny fahoriana ny fony; Ka potraka* izy, nefa tsy nisy hamonjy; [*Hebreo: tafintohina]'
mg1865::mg_19::107::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny.'
mg1865::mg_19::107::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitondra azy nivoaka avy tao amin''ny maizina sy ny aloky ny fahafatesana Izy, Ary notosany ny fatorany.'
mg1865::mg_19::107::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona!'
mg1865::mg_19::107::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanorotoro ny varavarana varahina Izy, Ary ny hidy vy nohenteriny.'
mg1865::mg_19::107::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitondra fahoriana ny adala noho ny fahadisoany sy ny helony:'
mg1865::mg_19::107::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahamonamonaina azy ny hanina rehetra; Ary nanakaiky ny vavahadin''ny fahafatesana izy.'
mg1865::mg_19::107::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny.'
mg1865::mg_19::107::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nandefa ny teniny Izy mba hahasitrana azy Ary nanafaka azy tamin''ny longoa nianjerany.'
mg1865::mg_19::107::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona!'
mg1865::mg_19::107::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hanatitra fanati-pisaorana izy Sy hilaza ny asany amin''ny fihobiana.'
mg1865::mg_19::107::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay midina any an-dranomasina ka mandeha an-tsambo Sy manao raharaha any amin''ny rano lehibe'
mg1865::mg_19::107::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'No mahita ny asan''i Jehovah Sy ny fahagagana ataony amin''ny rano lalina.'
mg1865::mg_19::107::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa niteny Izy ka nanangana rivotra mahery, Izay nampisondrotra ny onjan-drano;'
mg1865::mg_19::107::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niakatra hatramin''ny lanitra ny olona, ary nidina hatramin''ny lalina; Ny fanahiny levona noho ny fahoriana.'
mg1865::mg_19::107::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nisangodingodina ireo sady nivembena toy ny mamo, Ka dia very ny sainy rehetra.'
mg1865::mg_19::107::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka nampiala azy tamin''ny fahatereny Izy.'
mg1865::mg_19::107::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanony ny rivotra mahery Izy, Ka nitsahatra ny onjan-drano.'
mg1865::mg_19::107::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia faly ireo, satria nitsahatra izany; Ary nentiny ho amin''ny fitodiana niriny izy.'
mg1865::mg_19::107::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona!'
mg1865::mg_19::107::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hanandratra Azy eo amin''ny fiangonan''ny olona izy Ka hidera Azy eo amin''ny fipetrahan''ny loholona.'
mg1865::mg_19::107::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampody ny ony ho efitra Izy Ary ny loharano ho tany mangentana,'
mg1865::mg_19::107::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tany mahavokatra ho tanin-tsira, Noho ny faharatsian''ny mponina eo.'
mg1865::mg_19::107::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampody ny efitra ho rano monina Izy Sy ny tany maina ho loharano,'
mg1865::mg_19::107::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amponeniny eo izay noana, Mba hanamboatra tanana honenana;'
mg1865::mg_19::107::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hamafy eny an-tsaha izy Sady hanao tanim-boaloboka Ka hahazo vokatra be.'
mg1865::mg_19::107::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mitahy azy Izy mba hitomboany betsaka, Ka tsy avelany hihavitsy ny biby fiompiny.'
mg1865::mg_19::107::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mihakely sy mietry indray izy Noho ny fampahoriana sy ny loza ary ny alahelo.'
mg1865::mg_19::107::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampidina fanamavoana amin''ny mpanapaka Jehovah Ka mampirenireny azy any an''efitra tsy misy lalana;'
mg1865::mg_19::107::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 41
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manandratra ny malahelo ho afa-pahoriana kosa Izy, Ka mahamaro mianakavy azy toy ny ondry andiany.'
mg1865::mg_19::107::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahita izany ny marina ka ho faly; Fa hihombom-bava kosa ny ratsy fanahy rehetra.'
mg1865::mg_19::107::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 107
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay hendry dia aoka hahafantatra izany Ka hahalala ny famindram-pon''i Jehovah.'
mg1865::mg_19::108::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahatokiana an''Andriamanitra sy fanantenana ny heriny haharesy ny fahavalo'
  verse_text: 'Tonon-kira. Salamo nataon''i Davida. Andriamanitra o, tafatoetra ny foko; Ny fanahiko* no hihira sy hankalaza. [*Hebreo: ny voninahitro]'
mg1865::mg_19::108::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifohaza, ry valiha sy lokanga; hifoha maraina koa aho*. [*Na: hampifoha ny maraina aho]'
mg1865::mg_19::108::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao eny amin''ny firenena maro aho, Jehovah o, Ary hankalaza Anao eny amin''ny jentilisa.'
mg1865::mg_19::108::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe mihoatra ny lanitra ny famindram-ponao; Ary mipaka eny amin''ny rahona ny fahamarinanao.'
mg1865::mg_19::108::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misandrata any ambonin''ny lanitra Ianao, Andriamanitra o; Ary aoka ho ety ambonin''ny tany rehetra ny voninahitrao.'
mg1865::mg_19::108::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hahafaka ny malalanao, Dia vonjeo amin''ny tananao ankavanana aho, ka valio.'
mg1865::mg_19::108::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra niteny tamin''ny fahamasinany hoe: Hifaly Aho ka hizara an''i Sekema, Ary ny lohasahan''i Sokota horefesiko;'
mg1865::mg_19::108::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahy Gileada, Ahy Manase; Ary aron''ny lohako Efraima; Tehim-panjakako Joda;'
mg1865::mg_19::108::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tavindranoko fanasana Moaba; Edoma no hanipazako ny kapako; noho ny amin''i Filistia ho hihobiako.'
mg1865::mg_19::108::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no hitondra ahy ho any an-tanàna mafy? Iza no hitarika ahy ho any Edoma?'
mg1865::mg_19::108::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy Ianao va no efa nanary anay, Andriamanitra o, Sady tsy mivoaka miaraka amin''ny miaramilanay, Andriamanitra o?'
mg1865::mg_19::108::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo amin''ny fahavalo izahay; Fa zava-poana ny famonjena ataon''ny olona.'
mg1865::mg_19::108::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 108
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra no haharezan-tsika; Fa Izy no hanitsakitsaka ny fahavalontsika.'
mg1865::mg_19::109::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny loza hanjo ny manao teny ratsy sy tia ozona. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'RY Andriamanitra fiderako o, aza mangina Ianao,'
mg1865::mg_19::109::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy; Niteny ahy tamin''ny lela mandainga izy.'
mg1865::mg_19::109::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teny fankahalana no nanodidinany ahy; Ary niady tamiko tsy ahoan-tsy ahoana izy.'
mg1865::mg_19::109::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fitiavako dia valiany fandrafiana; Fa izaho kosa dia mivavaka.'
mg1865::mg_19::109::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny soa nataoko novaliany ratsy, Ary ny fitiavako novaliany fankahalana.'
mg1865::mg_19::109::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anendreo olona ratsy fanahy hanapaka azy; Ary aoka hisy mpanohitra* hitsangana eo an-kavanany. [*Na: aoka Satana]'
mg1865::mg_19::109::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hotsaraina izy, dia aoka ho meloka, Ary aoka ny fivavahany ho tonga fahotana.'
mg1865::mg_19::109::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho vitsy ny androny; Ary aoka ho lasan''olon-kafa ny anjara raharahany.'
mg1865::mg_19::109::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho kamboty ny zanany; Ary aoka ho mpitondratena ny vadiny'
mg1865::mg_19::109::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hirenireny mangataka ny zanany, Ary aoka hiremby lavitra ny tranony efa rava izy.'
mg1865::mg_19::109::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny mpampanàna vola hamandrika izay rehetra ananany; Ary aoka ny olon-kafa hifaoka ny vokatry ny asany.'
mg1865::mg_19::109::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hisy haharitra hamindra fo aminy, Na hiantra ny zanany kamboty.'
mg1865::mg_19::109::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fongora ny taranany; Ary aoka hovonoina amin''ny taranaka mandimby ny anarany.'
mg1865::mg_19::109::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hotsarovan''i Jehovah ny helo-drainy; Ary aoka tsy hovonoina ny helo-dreniny.'
mg1865::mg_19::109::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho eo anatrehan''i Jehovah mandrakariva izany, Ary hofoanany tsy ho eo ambonin''ny tany anie ny fahatsiarovana azy.'
mg1865::mg_19::109::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria tsy mba nahatsiaro hamindra fo izy, Fa nanenjika ny ory sy ny malahelo Ary ny reraka am-po mba hahafaty azy;'
mg1865::mg_19::109::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tia ozona izy, ka nanody azy izany; Tsy tia indrafo izy, ka nanalavitra azy izany.'
mg1865::mg_19::109::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitafy ozona tahaka ny lambany izy, Ka niditra tao an-kibony tahaka ny rano izany, Ary tao amin''ny taolany tahaka ny diloilo;'
mg1865::mg_19::109::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia aoka ho tahaka ny lamba itafiany izany, Ary ho fisikinana isikinany mandrakariva.'
mg1865::mg_19::109::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no famaliana avy amin''i Jehovah ho an''ny mpanohitra ahy, Dia izay manendrikendrika ahy.'
mg1865::mg_19::109::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao, Jehovah Tompo o, miasà ho ahy noho ny anaranao; Vonjeo aho, fa tsara ny famindram-ponao.'
mg1865::mg_19::109::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahantra sy malahelo aho, Ary ny foko dia voatsindrona ato anatiko.'
mg1865::mg_19::109::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lasa tahaka ny aloka mihelina aho; Roahina tahaka ny valala aho.'
mg1865::mg_19::109::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa malemy ny lohaliko noho ny fifadian-kanina; Ary efa mihena ny hatavin''ny nofoko.'
mg1865::mg_19::109::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izaho dia tonga fandatsan''ireny; Mijery ahy izy ka mihifikifi-doha.'
mg1865::mg_19::109::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampio aho Jehovah Andriamanitro o; Vonjeo araka ny famindram-ponao aho;'
mg1865::mg_19::109::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka ho fantany fa tananao izany; Ianao, Jehovah o, no nanao izany.'
mg1865::mg_19::109::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manozona izy ireo, fa Ianao kosa mitahy; Mitsanga-menatra izy, fa mifaly kosa ny mpanomponao.'
mg1865::mg_19::109::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitafy henatra ny fahavaloko Ka misaron-kenatra tahaka ny lamba.'
mg1865::mg_19::109::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera an''i Jehovah indrindra amin''ny vavako aho; Eny, eo amin''ny olona maro no hiderako Azy.'
mg1865::mg_19::109::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 109
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mitsangana eo an-kavanan''ny malahelo Izy Mba hamonjy azy amin''izay manameloka ny fanahiny.'
mg1865::mg_19::110::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny haherezan''ny Mpanjakan''i Ziona, Izay sady Mpanjaka no Mpisorona'
  verse_text: 'Salamo nataon''i Davida. Izao no lazain''i Jehovah amin''ny Tompoko: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao.'
mg1865::mg_19::110::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tehin''ny herinao Havoak''i Jehovah avy ao Ziona; Manapaha eo amin''ny fahavalonao Ianao.'
mg1865::mg_19::110::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olonao dia mazoto manolo-tena amin''ny andro anafihanao*; Amin''ny fihaingoana masina, tahaka ny ando ateraky ny maraina ho Anao ny zatovonao. [*Na: andron''ny herinao]'
mg1865::mg_19::110::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nianiana Jehovah ka tsy hanenina: Ianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka.'
mg1865::mg_19::110::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Tompo eo an-kavananao Dia handripaka ny mpanjaka maro amin''ny andron''ny fahatezerany'
mg1865::mg_19::110::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitsara any amin''ny jentilisa Izy ka hampiampatrampatra faty any; Handripaka loholona* any amin''ny tany malalaka Izy. [*Hebreo: loha]'
mg1865::mg_19::110::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 110
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hisotro amin''ny ony any an-dàlana Izy, Ka izany no hitrakan''ny lohany.'
mg1865::mg_19::111::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Ny fahatsaran''Andriamanitra, sy ny soa ataony amin''ny olony'
  verse_text: 'Haleloia. Hidera an''i Jehovah amin''ny foko rehetra aho, Eo amin''ny fivorian''ny marina sy ny fiangonan-dehibe.'
mg1865::mg_19::111::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lehibe ny asan''i Jehovah, Ka dinihin''izay rehetra mankasitraka azy.'
mg1865::mg_19::111::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Madera sady malaza ny asany; Ary ny fahamarinany maharitra mandrakizay.'
mg1865::mg_19::111::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao izay hahatsiarovana ny fahagagana ataony Izy; Miantra sy mamindra fo Jehovah.'
mg1865::mg_19::111::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nomeny hanina* izay matahotra Azy; Tsarovany mandrakizay ny fanekeny. [*Hebreo: toha]'
mg1865::mg_19::111::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny herin''ny asany nasehony tamin''ny olony. Tamin''ny nanomezany azy ny lovan''ny jentilisa.'
mg1865::mg_19::111::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny asan''ny tanany dia fahamarinana sy fitsarana; Mahatoky avokoa ny didiny rehetra;'
mg1865::mg_19::111::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitoetra mafy mandrakizay doria ireny, Fa natao tamin''ny fahamarinana sy ny fahitsiana.'
mg1865::mg_19::111::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manatitra fanavotana ho an''ny olony Izy; Efa nanorina ny fanekeny ho mandrakizay Izy; Masina sy mahatahotra ny anarany.'
mg1865::mg_19::111::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 111
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahatahorana an''i Jehovah no fiandoham-pahendrena; Fahalalana tsara no ananan''izay rehetra mankatò izany*; Maharitra mandrakizay ny fiderana Azy. [*Hebreo: ireo]'
mg1865::mg_19::112::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Ny toetry ny olona marina sy ny mahasambatra azy'
  verse_text: 'Haleloia. Sambatra ny olona izay matahotra an''i Jehovah Sady mankasitraka ny didiny indrindra.'
mg1865::mg_19::112::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahery ambonin''ny tany ny zanany; Hotahina ny taranaky ny marina.'
mg1865::mg_19::112::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fananana sy harena no ao an-tranony; Ary ny fahamarinany haharitra mandrakizay.'
mg1865::mg_19::112::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao amin''ny maizina no iposahan''ny mazava ho an''ny mahitsy; Mamindra fo sy miantra ary marina ireny*. [*Na: Izy]'
mg1865::mg_19::112::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny olona izay miantra ka mampisambotra; Tsy mba ho resy eo am-pitsarana izy.'
mg1865::mg_19::112::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hangozohozo mandrakizay izy; Hotsarovana mandrakizay ny marina.'
mg1865::mg_19::112::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba manahinahy hahare loza izy; Tafatoetra matoky an''i Jehovah ny fony.'
mg1865::mg_19::112::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voatohana ny fony, ka tsy hatahotra izy, Mandra-pifaliny mahita ny amin''ny mpandrafy azy.'
mg1865::mg_19::112::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namafy izy, eny, nanome ho an''ny malahelo; Ny fahamarinany maharitra mandrakizay; Hisandratra amim-boninahitra ny tandrony.'
mg1865::mg_19::112::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 112
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy hahita ka ho sosotra; Hihidy vazana izy ka ho levona; Ho foana ny fanirian''ny ratsy fanahy.'
mg1865::mg_19::113::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra lehibe, Izay manandratra ny malahelo'
  verse_text: 'Haleloia. Miderà, ianareo mpanompon''i Jehovah, Miderà ny anaran''i Jehovah.'
mg1865::mg_19::113::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie ny anaran''i Jehovah Hatramin''izao ka ho mandrakizay.'
mg1865::mg_19::113::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hatramin''ny fiposahan''ny masoandro ka hatramin''ny filentehany No hoderaina anie ny anaran''i Jehovah.'
mg1865::mg_19::113::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avo ambonin''ny jentilisa Jehovah; Ambonin''ny lanitra ny voninahiny.'
mg1865::mg_19::113::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no tahaka an''i Jehovah Andriamanitsika, Izay mipetraka any amin''ny avo,'
mg1865::mg_19::113::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa miondrika mijery Ny any an-danitra sy ny ety an-tany?'
mg1865::mg_19::113::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manangana ny malahelo hiala amin''ny vovoka Izy Ary manandratra ny mahantra ho afaka eo amin''ny zezika,'
mg1865::mg_19::113::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hametraka azy ho naman''ny mpanapaka ny olony.'
mg1865::mg_19::113::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 113
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampitoetra tsara ny momba Izy, Fa mahatonga azy ho renin-jaza mifaly. Haleloia.'
mg1865::mg_19::114::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny horohoron''ny tany aman-danitra tamin''ny nanavotan''Andriamanitra ny olony tany Egypta'
  verse_text: 'Fony nivoaka avy tany Egypta ny Isiraely, Dia ny taranak''i Jakoba avy tany amin''ny firenena hafa fiteny,'
mg1865::mg_19::114::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Joda no fitoerany masina, Isiraely no fanjakany.'
mg1865::mg_19::114::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ranomasina nahita ka nandositra; Ary niorika Jordana.'
mg1865::mg_19::114::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy, Ary ny havoana tahaka ny zanak''ondry.'
mg1865::mg_19::114::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona izato mahazo anao, ry ranomasina, no mandositra ianao? Ary ianao, ry Jordana, no miorika ianao?'
mg1865::mg_19::114::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy; Ary ianareo havoana, tahaka ny zanak''ondry?'
mg1865::mg_19::114::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihorohoroa eo anatrehan''ny Tompo, ry tany, Dia eo anatrehan''Andriamanitr''i Jakoba.'
mg1865::mg_19::114::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 114
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mampody ny vatolampy ho rano monina Ary ny afovato ho loharano.'
mg1865::mg_19::115::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fampitahana an''Andriamanitry ny Isiraely sy ny sampin''ny Jentilisa'
  verse_text: 'Jehovah o, aza izahay, aza izahay no omena voninahitra, Fa ny anaranao ihany, Noho ny famindram-ponao sy ny fahamarinanao.'
mg1865::mg_19::115::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nahoana ny jentilisa no manao hoe: Aiza izay Andriamaniny?'
mg1865::mg_19::115::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa any an-danitra Andriamanitsika; Efa nanao izay sitrapony rehetra Izy.'
mg1865::mg_19::115::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Volafotsy sy volamena ny sampin''ireny, Asan''ny tanan''olona:'
mg1865::mg_19::115::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manam-bava izy. fa tsy miteny; Mana-maso izy, fa tsy mahita;'
mg1865::mg_19::115::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manan-tsofina izy, fa tsy mandre; Manana orona izy, fa tsy manimbolo:'
mg1865::mg_19::115::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manan-tanana izy, fa tsy mandray; Manan-tongotra izy, fa tsy mandeha; Ary tsy mahaloa-peo ny tendany.'
mg1865::mg_19::115::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tahaka azy izay manao azy Sy izay rehetra matoky azy.'
mg1865::mg_19::115::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Isiraely o, matokia an''i Jehovah; Heriny sy ampingany Izy.'
mg1865::mg_19::115::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry taranak''i Arona o, matokia an''i Jehovah; Heriny sy ampingany Izy.'
mg1865::mg_19::115::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay matahotra an''i Jehovah, matokia an''i Jehovah; Heriny sy ampingany Izy.'
mg1865::mg_19::115::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mahatsiaro ka mitahy antsika; Hitahy ny taranak''i Isiraely Izy; Hitahy ny taranak''i Arona Izy;'
mg1865::mg_19::115::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahiny izay matahotra an''i Jehovah, Na ny kely na ny lehibe.'
mg1865::mg_19::115::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah anie hampitombo anareo, Dia ianareo mbamin''ny zanakareo.'
mg1865::mg_19::115::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitahy anareo anie Jehovah, Mpanao ny lanitra sy ny tany.'
mg1865::mg_19::115::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lanitra dia an''i Jehovah: fa ny tany nomeny ho an''ny zanak''olombelona.'
mg1865::mg_19::115::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny maty tsy mba hidera an''i Jehovah. Na izay midina any amin''ny mangingina;'
mg1865::mg_19::115::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 115
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay hisaotra an''i Jehovah Hatramin''izao ka ho mandrakizay. Haleloia.'
mg1865::mg_19::116::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana nataon''izay saiky maty, nefa novonjen''Andriamanitra'
  verse_text: 'Izaho tia an''i Jehovah, satria efa nandre Ny feon''ny fifonako Izy.'
mg1865::mg_19::116::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Satria efa nanongilana ny sofiny tamiko Izy, Dia hiantso aho, raha mbola velona koa.'
mg1865::mg_19::116::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihodidina tamiko ny famatoran''ny fahafatesana, Ary nahazo ahy ny fahorian''ny fiainan-tsy hita*; Nahita fahoriana sy alahelo aho. [*Hebreo: Sheola]'
mg1865::mg_19::116::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niantso ny anaran''i Jehovah hoe aho: Jehovah o, mifona aminao aho, vonjeo ny fanahiko.'
mg1865::mg_19::116::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindra fo sy marina Jehovah Eny, miantra Andriamanitsika.'
mg1865::mg_19::116::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaro ny kely saina Jehovah; Reraka aho, dia namonjy ahy Izy.'
mg1865::mg_19::116::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miverena ho amin''ny fitsaharanao, ry fanahiko, Fa Jehovah efa nanisy soa anao,'
mg1865::mg_19::116::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namonjy ny fanahiko tamin''ny fahafatesana Ianao Sy ny masoko tamin''ny ranomaso Ary ny tongotro tamin''ny fahatafintohinana.'
mg1865::mg_19::116::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handeha eo anatrehan''i Jehovah Eo amin''ny tanin''ny velona aho.'
mg1865::mg_19::116::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nino aho; hiteny tokoa aho*; Mahantra indrindra aho. [*Na: fa hiteny aho]'
mg1865::mg_19::116::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho tamin''ny fahatairako; Mpandainga ny olona rehetra.'
mg1865::mg_19::116::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no havaliko an''i Jehovah Noho ny soa rehetra nataony tamiko?'
mg1865::mg_19::116::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Handray ny kapoaky ny famonjena aho Ka hiantso ny anaran''i Jehovah.'
mg1865::mg_19::116::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanefa ny voadiko amin''i Jehovah aho. Eny, eo anatrehan''ny olony rehetra.'
mg1865::mg_19::116::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-dehibe eo imason''i Jehovah Ny fahafatesan''ny olony masina.'
mg1865::mg_19::116::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! Jehovah o, mpanomponao tokoa aho, Eny, mpanomponao sady zanaky ny ankizivavinao; Namaha ny fatorako Ianao.'
mg1865::mg_19::116::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no haterako fanati-pisaorana, Ary ny anaran''i Jehovah no hantsoiko.'
mg1865::mg_19::116::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanefa ny voadiko amin''i Jehovah aho, Eny, eo anatrehan''ny olony rehetra,'
mg1865::mg_19::116::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 116
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia eo an-kianjan''ny tranon''i Jehovah, Eo afovoanao, ry Jerosalema o. Haleloia.'
mg1865::mg_19::117::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 117
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana izao firenena rehetra izao hidera an''i Jehovah'
  verse_text: 'Miderà an''i Jehovah ry firenena rehetra; Miderà Azy, ry olona rehetra.'
mg1865::mg_19::117::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 117
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa lehibe ny famindram-pony amintsika; Ary mandrakizay ny fahamarinan''i Jehovah. Haleloia.'
mg1865::mg_19::118::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny famindram-pony, indrindra noho ny namaliany ny vavaka nataon''ny mpanompony sy ny namonjeny azy tamin''ny fahavalony'
  verse_text: 'Miderà an''i Jehovah, fa tsara Izy; Eny, mandrakizay ny famindram-pony.'
mg1865::mg_19::118::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny Isiraely hanao hoe: Mandrakizay ny famindram-pony.'
mg1865::mg_19::118::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny taranak''i Arona hanao hoe: Mandrakizay ny famindram-pony.'
mg1865::mg_19::118::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izay matahotra an''i Jehovah hanao hoe: Mandrakizay ny famindram-pony.'
mg1865::mg_19::118::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tao an-katerena no niantsoako an''i Jehovah; Dia namaly ahy Jehovah ka nampahalalaka ahy.'
mg1865::mg_19::118::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no miandany amiko, ka tsy hatahotra aho. Inona no azon''ny olona atao amiko?'
mg1865::mg_19::118::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no miandany amiko, sady mamonjy ahy; Ary izaho ho faly hahita ny amin''izay mankahala ahy.'
mg1865::mg_19::118::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny mialoka amin''i Jehovah Noho ny mialoka amin''ny olona.'
mg1865::mg_19::118::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara ny matoky an''i Jehovah Noho ny matoky ny mpanapaka.'
mg1865::mg_19::118::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny firenena rehetra nanodidina ahy; Fa ny anaran''i Jehovah no handringanako azy tokoa;'
mg1865::mg_19::118::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitangorona tamiko ireny, eny, nitangorona tamiko; Fa ny anaran''i Jehovah no handringanako azy tokoa.'
mg1865::mg_19::118::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanodidina ahy tahaka ny renitantely izy; Voavono tahaka ny afon-tsilo izy; Fa ny anaran''i Jehovah no handringanako azy tokoa.'
mg1865::mg_19::118::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanosika ahy mafy hahalavo ahy ianao; Fa Jehovah no namonjy ahy.'
mg1865::mg_19::118::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no heriko sy fiderako. Fa efa famonjena ahy Izy.'
mg1865::mg_19::118::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao an-dain''ny marina ny feo mihoby noho ny famonjena; Ny tanana ankavanan''i Jehovah mampiseho hery;'
mg1865::mg_19::118::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tanana ankavanan''i Jehovah dia misandratra; Ny tanana ankavanan''i Jehovah mampiseho hery.'
mg1865::mg_19::118::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ho faty aho, fa ho velona Ka hitory ny asan''i Jehovah.'
mg1865::mg_19::118::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nofaizan''i Jehovah mafy aho, Nefa tsy natolony ho amin''ny fahafatesana.'
mg1865::mg_19::118::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vohay ny vavahadin''ny fahamarinana aho; Hiditra eo aho ka hidera an''i Jehovah.'
mg1865::mg_19::118::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no vavahadin''i Jehovah; Ny marina no hiditra eo.'
mg1865::mg_19::118::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao aho, fa efa namaly ahy Ianao Ka efa famonjena ahy.'
mg1865::mg_19::118::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vato izay nolavin''ny mpanao trano No efa tonga fehizoro Indrindra.'
mg1865::mg_19::118::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tamin''i Jehovah izany Ka mahagaga eo imasontsika.'
mg1865::mg_19::118::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no andro nataon''i Jehovah; Hifaly sy ho ravoravo amin''izao isika.'
mg1865::mg_19::118::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifona aminao aho, Jehovah o, vonjeo o! Mifona aminao aho, Jehovah o, ambino o!'
mg1865::mg_19::118::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahina anie izay avy amin''ny anaran''i Jehovah; Avy ao an-tranon''i Jehovah no itsofanay rano anareo.'
mg1865::mg_19::118::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra Jehovah ka nampahazava antsika; Rohizo kofehy ny fanati-piravoravoana na dia hatreo amin''ny tandroky ny alitara aza.'
mg1865::mg_19::118::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitro Ianao, ka hidera Anao aho; Eny, Andriamanitro, ka hanandratra Anao aho.'
mg1865::mg_19::118::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 118
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà an''i Jehovah, fa tsara Izy; Eny, mandrakizay ny famindram-pony.'
mg1865::mg_19::119::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Fankalazana ny lalàn''Andriamanitra, ALEFA'
  verse_text: 'Sambatra ny mahitsy lalana, Izay mandeha araka ny lalàn''i Jehovah.'
mg1865::mg_19::119::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay mitandrina ny teni-vavolombelony Ka mitady Azy amin''ny fo rehetra;'
mg1865::mg_19::119::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, Izay tsy manao ratsy. Fa mandeha araka ny lalany.'
mg1865::mg_19::119::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao namoaka ny didinao Mba hotandremana tsara.'
mg1865::mg_19::119::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka ho tafatoetra ny lalako Hitandremako ny didinao!'
mg1865::mg_19::119::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tsy ho menatra aho, Raha mandinika ny didinao rehetra.'
mg1865::mg_19::119::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao amin''ny hitsim-po aho Amin''ny ianarako ny fitsipikao marina.'
mg1865::mg_19::119::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didinao no hotandremako; Aza dia mahafoy ahy Ianao.'
mg1865::mg_19::119::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 9
  verse_date_revised: null
  verse_title: BETA
  verse_text: 'Inona no hiarovan''ny zatovo ny lalan-kalehany tsy ho voaloto? Ny fitandremana araka ny teninao.'
mg1865::mg_19::119::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny foko rehetra no nitadiavako Anao; Aza avela hivily hiala amin''ny didinao aho.'
mg1865::mg_19::119::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ato am-poko no iraketako ny teninao, Mba tsy hanotako aminao.'
mg1865::mg_19::119::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Ianao, Jehovah o; Ampianaro ahy ny didinao.'
mg1865::mg_19::119::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny molotro no nentiko nilaza Ny fitsipika rehetra naloaky ny vavanao.'
mg1865::mg_19::119::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''ny teni-vavolombelonao no ifaliako, Tahaka ny ifaliako amin''ny harena rehetra.'
mg1865::mg_19::119::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didinao no hosaintsainiko, Ary hodinihiko ny lalanao.'
mg1865::mg_19::119::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didinao no hiravoravoako: Tsy hohadinoiko ny teninao.'
mg1865::mg_19::119::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 17
  verse_date_revised: null
  verse_title: GIMELA
  verse_text: 'Asio soa aho mpanomponao, mba ho velona Ka hitandrina ny teninao.'
mg1865::mg_19::119::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahirato ny masoko, mba hahitako Zava-mahagaga ao amin''ny lalànao.'
mg1865::mg_19::119::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vahiny ety an-tany aho; Aza afeninao ahy ny didinao.'
mg1865::mg_19::119::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Torotoro ny fanahiko noho ny faniriany Ny fitsipikao mandrakariva.'
mg1865::mg_19::119::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voateninao mafy ny mpirehareha, dia ny olom-boaozona, Izay mania miala amin''ny didinao.'
mg1865::mg_19::119::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory amiko ny fahafaham-baraka sy ny fanamavoana: Fa efa nitandrina ny teni-vavolombelonao aho.'
mg1865::mg_19::119::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia ny mpanapaka aza dia mipetraka, ka iokoany aho; Izaho mpanomponao misaintsaina ny didinao.'
mg1865::mg_19::119::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny teni-vavolombelonao koa no firavoravoako, Eny, mpanolo-tsaina ahy izany.'
mg1865::mg_19::119::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 25
  verse_date_revised: null
  verse_title: DALETA
  verse_text: 'Miraikitra amin''ny vovoka ny fanahiko; Velomy aho araka ny teninao.'
mg1865::mg_19::119::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalako no nolazaiko, ary namaly ahy Ianao: Ampianaro ahy ny didinao.'
mg1865::mg_19::119::27:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahalalao ahy ny lalan''ny didinao; Dia hoheveriko ny fahagagana nataonao.'
mg1865::mg_19::119::28:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipotrapotra-dranomaso aho noho ny alaheloko; Ampaherezo aho araka ny teninao.'
mg1865::mg_19::119::29:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''ny lainga no esory amiko: Ary ny lalànao no anasoavy ahy.'
mg1865::mg_19::119::30:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalàn''ny fahamarinanao no fidiko; Apetrako eo anatrehako ny fitsipikao.'
mg1865::mg_19::119::31:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifikitra amin''ny teni-vavolombelonao aho; Jehovah o, aza avela ho azon-kenatra aho;'
mg1865::mg_19::119::32:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalan''ny didinao no ihazakazahako, Fa* ampahalalahinao ny foko. [*Na: Raha]'
mg1865::mg_19::119::33:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 33
  verse_date_revised: null
  verse_title: HE
  verse_text: 'Jehovah o, toroy ny lalan''ny didinao aho; Dia hotandremako hatramin''ny farany izany.'
mg1865::mg_19::119::34:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 34
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo fahalalana aho mba hitandrina ny lalànao; Eny, hitandrina azy amin''ny foko rehetra aho.'
mg1865::mg_19::119::35:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 35
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampandehano amin''ny lalan''ny didinao aho; Fa izany no sitrako.'
mg1865::mg_19::119::36:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 36
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amporisiho ny foko ho amin''ny teni-vavolombelonao, Fa tsy ho amin''ny fieremana.'
mg1865::mg_19::119::37:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 37
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avilio ny masoko tsy hijery zava-poana; Velomy amin''ny lalanao aho.'
mg1865::mg_19::119::38:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 38
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tovy ny teninao amin''ny mpanomponao, Izay matahotra Anao indrindra*. [*Tovy amin''ny mpanomponao ny teninao, Izay mahatonga ny fahatahorana Anao]'
mg1865::mg_19::119::39:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 39
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory ny fahafaham-baraka. izay atahorako; Fa tsara ny fitsipikao.'
mg1865::mg_19::119::40:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 40
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, manina ny didinao aho, Velomy amin''ny fahamarinanao.'
mg1865::mg_19::119::41:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 41
  verse_date_revised: null
  verse_title: VAO
  verse_text: 'Aoka ho tonga amiko ny famindram-ponao, Jehovah o, Dia ny famonjenao, araka ny teninao.'
mg1865::mg_19::119::42:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 42
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hamaly izay miteny ratsy ahy aho, Satria matoky ny teninao.'
mg1865::mg_19::119::43:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 43
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza dia esorina amin''ny vavako ny teny marina; Fa miandry ny fitsaranao aho.'
mg1865::mg_19::119::44:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 44
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hitandrina ny lalànao mandrakariva aho, Dia mandrakizay doria.'
mg1865::mg_19::119::45:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 45
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary handeha amin''ny malalaka aho; Fa ny didinao no tadiaviko.'
mg1865::mg_19::119::46:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 46
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hilaza ny teni-vavolombelonao eo anatrehan''ireo mpanjaka aho Ka tsy ho menatra.'
mg1865::mg_19::119::47:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 47
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hiravoravo amin''ny didinao aho Satria tiako ireny.'
mg1865::mg_19::119::48:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 48
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hasandratro ny tanako ho amin''ny didinao satria tiako ireny: Hosaintsainiko ny didinao.'
mg1865::mg_19::119::49:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 49
  verse_date_revised: null
  verse_title: ZAINA
  verse_text: 'Tsarovy ny teny natao tamiko mpanomponao Izay nampanantenanao ahy*. [*Na: Satria nampanantenainao aho]'
mg1865::mg_19::119::50:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 50
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no mampionona ahy amin''ny fahoriako; Ny teninao no mamelona ahy.'
mg1865::mg_19::119::51:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 51
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpirehareha maniratsira ahy: Tsy mba mivily miala amin''ny lalànao aho.'
mg1865::mg_19::119::52:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 52
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiaro ny fitsipikao izay hatramin''ny taloha aho, Jehovah o, Dia mionona aho.'
mg1865::mg_19::119::53:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 53
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahatezerana mirehitra no nahazo ahy Noho ny amin''ny ratsy fanahy izay mahafoy ny lalànao.'
mg1865::mg_19::119::54:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 54
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didinao no ataoko an-kira Ao amin''ny trano fivahiniako.'
mg1865::mg_19::119::55:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 55
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatsiaro ny anaranao nony alina aho, Jehovah o, Ka mitandrina ny lalànao.'
mg1865::mg_19::119::56:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 56
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no ahy: Mitandrina ny didinao aho.'
mg1865::mg_19::119::57:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 57
  verse_date_revised: null
  verse_title: HETA
  verse_text: 'Anjarako Jehovah; Minia mitandrina ny teninao aho.'
mg1865::mg_19::119::58:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 58
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifona aminao amin''ny foko rehetra aho: Mamindrà fo amiko araka ny teninao.'
mg1865::mg_19::119::59:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 59
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihevitra ny lalako aho Ka mamerina ny tongotro ho amin''ny teni-vavolombelonao.'
mg1865::mg_19::119::60:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 60
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandeha faingana aho ka tsy mitaredretra, Amin''ny fitandremana ny didinao.'
mg1865::mg_19::119::61:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 61
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nihodidina tamiko ny famato-ran''ny ratsy fanahy; Tsy mba nanadino ny lalànao aho.'
mg1865::mg_19::119::62:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 62
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamatonalina no hifohazako hidera Anao Noho ny fitsipikao marina.'
mg1865::mg_19::119::63:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 63
  verse_date_revised: null
  verse_title: null
  verse_text: 'Naman''izay rehetra matahotra Anao aho Sy naman''izay mitandrina ny didinao.'
mg1865::mg_19::119::64:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 64
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, henika ny famindram-ponao ny tany; Ampianaro ahy ny didinao.'
mg1865::mg_19::119::65:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 65
  verse_date_revised: null
  verse_title: TETA
  verse_text: 'Jehovah o, efa nasianao soa ny mpanomponao, Araka ny teninao.'
mg1865::mg_19::119::66:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 66
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampianaro fahafantarana tsara sy fahalalana aho, Fa matoky ny didinao aho.'
mg1865::mg_19::119::67:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 67
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fony tsy mbola azom-pahoriana aho, dia naniasia; Fa ankehitriny dia mitandrina ny teninao aho.'
mg1865::mg_19::119::68:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 68
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady tsara Ianao no Mpanao ny tsara; Ampianaro ahy ny didinao.'
mg1865::mg_19::119::69:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 69
  verse_date_revised: null
  verse_title: null
  verse_text: 'Namoron-dainga hamelezana ahy ny mpirehareha; Amin''ny foko rehetra no itandremako ny didinao.'
mg1865::mg_19::119::70:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 70
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matavy tahaka ny menaka ny fony; Fa izaho kosa, dia ny lalànao no iravoravoako.'
mg1865::mg_19::119::71:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 71
  verse_date_revised: null
  verse_title: null
  verse_text: 'Soa ihany aho nampahorina, Mba hianarako ny didinao.'
mg1865::mg_19::119::72:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 72
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lalàn''ny vavanao no mahatsara ahy Mihoatra noho ny volamena sy ny volafotsy tsy omby arivo.'
mg1865::mg_19::119::73:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 73
  verse_date_revised: null
  verse_title: JODA
  verse_text: 'Ny tananao nanao ahy sy namboatra ahy; Ampianaro aho, mba hianarako ny didinao.'
mg1865::mg_19::119::74:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 74
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay matahotra Anao hahita ahy ka ho faly; Fa ny teninao no andrasako.'
mg1865::mg_19::119::75:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 75
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro, Jehovah o, fa marina ny fitsaranao. Ary ny fahamarinanao no nampahorianao ahy.'
mg1865::mg_19::119::76:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 76
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famindram-ponao anie no hampiononana ahy Araka ny teninao tamin''ny mpanomponao.'
mg1865::mg_19::119::77:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 77
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho tonga amiko ny fiantranao, mba ho velona aho; Fa ny lalànao no firavoravoako.'
mg1865::mg_19::119::78:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 78
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra ny mpirehareha, fa nampahory ahy tsy ahoan-tsy ahoana* izy; Izaho hisaintsaina ny didinao. [*Na: nanoloky ahy tamin''ny lainga]'
mg1865::mg_19::119::79:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 79
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiverina amiko izay matahotra Anao Sy izay mahalala ny teni-vavolombelonao.'
mg1865::mg_19::119::80:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 80
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho marina tsara ny foko amin''ny fitanana ny didinao, Mba tsy ho menatra aho.'
mg1865::mg_19::119::81:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 81
  verse_date_revised: null
  verse_title: KAFA
  verse_text: 'Ritra ny aiko, satria manina ny famonjenao aho; Ny teninao no andrasako.'
mg1865::mg_19::119::82:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 82
  verse_date_revised: null
  verse_title: null
  verse_text: 'Pahina ny masoko miandry ny teninao, Ka hoy izaho: Rahoviana no hampionona ahy Ianao?'
mg1865::mg_19::119::83:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 83
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny siny hoditra ao amin''ny setroka aho. Nefa ny didinao tsy mba hadinoiko.'
mg1865::mg_19::119::84:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 84
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoatrinona no andron''ny mpanomponao? Rahoviana no hanao fitsarana amin''izay manenjika ahy Ianao?'
mg1865::mg_19::119::85:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 85
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nanao longoa hianjerako ny mpirehareha, Dia izay tsy manaraka ny lalànao.'
mg1865::mg_19::119::86:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 86
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina ny didinao rehetra; Manenjika ahy tsy ahoan-tsy ahoana ireny; vonjeo aho.'
mg1865::mg_19::119::87:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 87
  verse_date_revised: null
  verse_title: null
  verse_text: 'Saiky laniny teo amin''ny tany aho, Kanefa tsy mba mahafoy ny didinao.'
mg1865::mg_19::119::88:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 88
  verse_date_revised: null
  verse_title: null
  verse_text: 'Velomy aho araka ny famindram-ponao; Dia hitandrina ny teni-vavolombelona naloaky ny vavanao aho.'
mg1865::mg_19::119::89:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 89
  verse_date_revised: null
  verse_title: LAMEDA
  verse_text: 'Ho mandrakizay, Jehovah o, No nanorenanao any an-danitra ny teninao.'
mg1865::mg_19::119::90:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 90
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihatra amin''ny taranaka fara-mandimby ny fahamarinanao; Efa nampitoetra ny tany Ianao, ka, indro, mitoetra izy.'
mg1865::mg_19::119::91:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 91
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanefa ny fitsaranao* no itoerany mandraka androany; Fa mpanomponao ny zavatra rehetra. [*Na: Araka ny nanendrenao azy]'
mg1865::mg_19::119::92:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 92
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy ny lalànao no niravoravoako, Dia maty tamin''ny fahoriako aho.'
mg1865::mg_19::119::93:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 93
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hohadinoiko mandrakizay ny didinao; Fa ireny no amelomanao ahy.'
mg1865::mg_19::119::94:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 94
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anao aho, vonjeo aho; Fa ny didinao no tadiaviko.'
mg1865::mg_19::119::95:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 95
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miandry ahy ny ratsy fanahy mba hahafaty ahy; Mandinika ny teni-vavolombelonao aho'
mg1865::mg_19::119::96:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 96
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa hitako fa manam-pahataperana avokoa ny tanteraka rehetra; Malalaka indrindra ny didinao.'
mg1865::mg_19::119::97:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 97
  verse_date_revised: null
  verse_title: MEMA
  verse_text: 'Endrey ny fitiavako ny lalànao! Fisaintsainako mandrakariva izany.'
mg1865::mg_19::119::98:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 98
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didinao mampahahendry ahy mihoatra noho ny fahavaloko, Satria ato amiko mandrakizay ireny.'
mg1865::mg_19::119::99:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 99
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hendry noho ny mpampianatra ahy rehetra aho, Satria ny teni-vavolombelonao no fisaintsainako.'
mg1865::mg_19::119::100:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 100
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hendry noho ny anti-panahy aho, Satria ny didinao no notandremako.'
mg1865::mg_19::119::101:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 101
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa narovako ny tongotro tsy ho amin''izay lalàn-dratsy, Mba hitandremako ny teninao.'
mg1865::mg_19::119::102:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 102
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba miala amin''ny fitsipikao aho; Fa Ianao no mampianatra ahy.'
mg1865::mg_19::119::103:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 103
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny hamamin''ny teninao, raha andramako! Mihoatra noho ny tantely ato am-bavako aza!'
mg1865::mg_19::119::104:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 104
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny didinao no nahazoako fahalalana; Izany no ankahalako ny lalam-pitaka rehetra.'
mg1865::mg_19::119::105:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 105
  verse_date_revised: null
  verse_title: NONA
  verse_text: 'Fanilon''ny tongotro Sy fanazavana ny lalako ny teninao.'
mg1865::mg_19::119::106:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 106
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nianiana aho fa hitandrina ny fitsipikao marina, Ka nefaiko izany.'
mg1865::mg_19::119::107:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 107
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampahorina indrindra aho; Jehovah o, velomy aho araka ny teninao.'
mg1865::mg_19::119::108:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 108
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, aoka anie mba hankasitrahanao ny fanati-tsitrapo aloaky ny vavako, Ary ampianaro ahy ny fitsipikao.'
mg1865::mg_19::119::109:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 109
  verse_date_revised: null
  verse_title: null
  verse_text: 'An-tenda* ihany ny aiko mandrakariva; Kanefa tsy manadino ny lalànao aho. [*Hebreo: An-tanako]'
mg1865::mg_19::119::110:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 110
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny ratsy fanahy mamela-pandrika haningotra ahy; Kanefa tsy mania miala amin''ny didinao aho.'
mg1865::mg_19::119::111:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 111
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa noraisiko ho lovako mandrakizay ny teni-vavolombelonao, Satria fifalian''ny foko izany.'
mg1865::mg_19::119::112:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 112
  verse_date_revised: null
  verse_title: null
  verse_text: 'Apetrako ny foko hankatò ny didinao Mandrakizay hatramin''ny farany.'
mg1865::mg_19::119::113:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 113
  verse_date_revised: null
  verse_title: SAMEKA
  verse_text: 'Halako ny mpiroa saina; Fa ny lalànao no tiako.'
mg1865::mg_19::119::114:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 114
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fiereko sy ampingako Ianao; Ny teninao no andrasako.'
mg1865::mg_19::119::115:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 115
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mialà amiko ianareo mpanao ratsy, Mba hitandremako ny didin''Andriamanitro.'
mg1865::mg_19::119::116:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 116
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tohàny aho araka ny teninao, mba ho velona, Ary aoka tsy ho menatra amin''ny fanantenako aho.'
mg1865::mg_19::119::117:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 117
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tohàny aho mba ho voavonjy, Ka ho faly hijery ny didinao mandrakariva.'
mg1865::mg_19::119::118:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 118
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataonao tsinontsinona izay rehetra mania amin''ny didinao; Fa famitahan-tena ihany ny laingany.'
mg1865::mg_19::119::119:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 119
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin''ny tany; Izany no itiavako ny teni-vavolombelonao.'
mg1865::mg_19::119::120:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 120
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mipararetra ny nofoko ny fahatahorana Anao, Ary matahotra ny fitsaranao aho.'
mg1865::mg_19::119::121:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 121
  verse_date_revised: null
  verse_title: AINA
  verse_text: 'Manaraka ny fitsipika sy ny fahamarinana aho; Aza manolotra ahy ho amin''ny mpampahory ahy.'
mg1865::mg_19::119::122:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 122
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iantohy mba ho soa ny mpanomponao; Aza avela hampahory ahy ny mpirehareha.'
mg1865::mg_19::119::123:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 123
  verse_date_revised: null
  verse_title: null
  verse_text: 'Pahina ny masoko miandry ny famonjenao. Sy ny tenin''ny fahamarinanao.'
mg1865::mg_19::119::124:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 124
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy amin''ny mpanomponao araka ny famindram-ponao; Ary ampianaro ahy ny didinao.'
mg1865::mg_19::119::125:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 125
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mpanomponao aho, ka ampianaro, Mba ho fantatro ny teni-vavolombelonao.'
mg1865::mg_19::119::126:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 126
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa andro tokony hampisehoan''i Jehovah ny heriny* izao; Fa nandika ny lalànao ny olona. [*Hebreo: hiasan''i Jehovah]'
mg1865::mg_19::119::127:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 127
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no itiavako ny didinao mihoatra noho ny volamena, Eny, noho ny tena volamena aza.'
mg1865::mg_19::119::128:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 128
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no iheverako ny didy rehetra ho marina avokoa; Halako ny lalam-pitaka rehetra;'
mg1865::mg_19::119::129:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 129
  verse_date_revised: null
  verse_title: PE
  verse_text: 'Mahagaga ny teni-vavolombelonao, Ka dia mitandrina azy ny fanahiko.'
mg1865::mg_19::119::130:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 130
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahazava ny famoahana ny hevitry ny teninao Ka manome fahalalana ho an''ny kely saina.'
mg1865::mg_19::119::131:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 131
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitanatana vava aho ka mihanahana, Fa ny didinao no iriko.'
mg1865::mg_19::119::132:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 132
  verse_date_revised: null
  verse_title: null
  verse_text: 'Todiho aho, ka mamindrà fo amiko, Araka ny tokony ho anjaran''izay tia ny anaranao.'
mg1865::mg_19::119::133:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 133
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampitoero eo amin''ny teninao ny diako; Ary aza avela hanapaka ahy izay mety ho faharatsiana.'
mg1865::mg_19::119::134:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 134
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vonjeo amin''ny fampahorian''ny olona Dia hitandrina ny didinao.'
mg1865::mg_19::119::135:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 135
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampamirapirato amin''ny mpanomponao ny tavanao; Ary ampianaro ahy ny didinao.'
mg1865::mg_19::119::136:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 136
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rano mandriaka no mijononoka amin''ny masoko Noho ny tsy fitandreman''ny olona ny lalànao.'
mg1865::mg_19::119::137:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 137
  verse_date_revised: null
  verse_title: TSADE
  verse_text: 'Marina Ianao, Jehovah o, Ary mahitsy ny fitsipikao.'
mg1865::mg_19::119::138:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 138
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa voadidinao amin''ny fahamarinana Sy ny fahatokiana indrindra ny teni-vavolombelonao.'
mg1865::mg_19::119::139:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 139
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa maharitra aina ahy ny fahasaro-piaroko, Satria nanadino ny teninao ny mpandrafy ahy.'
mg1865::mg_19::119::140:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 140
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voazaha toetra tamin''ny memy ny teninao, Ka dia tian''ny mpanomponao.'
mg1865::mg_19::119::141:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 141
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kely aho ka natao ho tsinontsinona; Nefa tsy hadinoiko ny didinao.'
mg1865::mg_19::119::142:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 142
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinanao dia fahamarinana mandrakizay, Ary marina ny lalànao.'
mg1865::mg_19::119::143:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 143
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahoriana sy fahaterena no nahazo ahy; Ny didinao no firavoravoako.'
mg1865::mg_19::119::144:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 144
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahamarinan''ny teni-vavolombelonao dia mandrakizay; Ampianaro aho, mba ho velona.'
mg1865::mg_19::119::145:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 145
  verse_date_revised: null
  verse_title: KOFA
  verse_text: 'Ny foko rehetra no nentiko nitaraina hoe: Valio aho, Jehovah o; Ny didinao no hotandremako;'
mg1865::mg_19::119::146:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 146
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nitaraina taminao aho nanao hoe Vonjeo aho, Dia hitandrina ny didinao.'
mg1865::mg_19::119::147:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 147
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mbola tsy nazavaratsy aza ny andro, dia nitaraina aho; Ny teninao no andrasako.'
mg1865::mg_19::119::148:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 148
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nialoha ny fiambenana amin''ny alina ny masoko, Mba hisaintsainako ny teninao.'
mg1865::mg_19::119::149:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 149
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy ny feoko araka ny famindram-ponao, Jehovah o, Velomy aho araka ny fitsipikao.'
mg1865::mg_19::119::150:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 150
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa mby akaiky izay fatra-panaraka ny ratsy, Dia izay manalavitra ny lalànao.'
mg1865::mg_19::119::151:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 151
  verse_date_revised: null
  verse_title: null
  verse_text: 'Akaiky Ianao, Jehovah o; Ary marina ny didinao rehetra.'
mg1865::mg_19::119::152:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 152
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa fantatro ela tamin''ny teni-vavolombelonao Fa nampitoerinao ho mandrakizay ireny.'
mg1865::mg_19::119::153:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 153
  verse_date_revised: null
  verse_title: RESY
  verse_text: 'Jereo ny fahoriako, ka vonjeo aho; Fa ny lalànao tsy mba hadinoiko.'
mg1865::mg_19::119::154:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 154
  verse_date_revised: null
  verse_title: null
  verse_text: 'Soloy vava aho, ka vonjeo; Velomy aho araka ny teninao.'
mg1865::mg_19::119::155:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 155
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lavitra ny ratsy fanahy ny famonjena, Satria ny didinao tsy tadiaviny.'
mg1865::mg_19::119::156:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 156
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lehibe ny antranao, Jehovah o; Velomy aho araka ny fitsipikao.'
mg1865::mg_19::119::157:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 157
  verse_date_revised: null
  verse_title: null
  verse_text: 'Maro ny mpanenjika sy mpandrafy ahy; Tsy mba niala tamin''ny teni-vavolombelonao aho.'
mg1865::mg_19::119::158:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 158
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mijery ny mpivadika aho, ka maharikoriko ahy ireny, Dia izay tsy nitandrina ny teninao.'
mg1865::mg_19::119::159:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 159
  verse_date_revised: null
  verse_title: null
  verse_text: 'He ny fitiavako ny didinao! Jehovah o, velomy aho araka ny famindram-ponao.'
mg1865::mg_19::119::160:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 160
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahamarinana no tontalin-kevitry ny teninao; Ary mandrakizay ny fitsipikao marina rehetra.'
mg1865::mg_19::119::161:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 161
  verse_date_revised: null
  verse_title: SINA
  verse_text: 'Na dia ny mpanapaka aza dia nanenjika ahy tsy ahoan-tsy ahoana; Nefa ny teninao no atahoran''ny foko.'
mg1865::mg_19::119::162:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 162
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faly aho noho ny teninao Tahaka ny mahazo babo be.'
mg1865::mg_19::119::163:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 163
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halako ny lainga ka ataoko ho fahavetavetana; Ny lalànao no tiako.'
mg1865::mg_19::119::164:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 164
  verse_date_revised: null
  verse_title: null
  verse_text: 'Impito isan''andro no iderako Anao Noho ny fitsipikao marina.'
mg1865::mg_19::119::165:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 165
  verse_date_revised: null
  verse_title: null
  verse_text: 'Be fiadanana izay tia ny lalànao, Ary tsy misy mahatafintohina azy.'
mg1865::mg_19::119::166:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 166
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miandry ny famonjenao aho, Jehovah o, Ka mankatò ny didinao.'
mg1865::mg_19::119::167:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 167
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrina ny teni-vavolombelonao ny fanahiko, Ka tiako indrindra izy.'
mg1865::mg_19::119::168:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 168
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitandrina ny didinao sy ny teni-vavolombelonao aho; Fa ny lalan-kalehako rehetra dia eo anatrehanao.'
mg1865::mg_19::119::169:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 169
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka anie ho tonga eo anatrehanao ny fitarainako, Jehovah o; Ampianaro aho araka ny teninao.'
mg1865::mg_19::119::170:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 170
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka anie ho tonga eo anatrehanao ny fifonako; Vonjeo aho araka ny teninao.'
mg1865::mg_19::119::171:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 171
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiboiboika fiderana ny molotro, Fa ampianarinao ahy ny didinao.'
mg1865::mg_19::119::172:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 172
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hihira ny teninao ny lelako, Fa marina ny didinao rehetra.'
mg1865::mg_19::119::173:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 173
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka anie hamonjy ahy ny tananao; Fa efa nifidy ny didinao aho.'
mg1865::mg_19::119::174:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 174
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa manina ny famonjenao aho, Jehovah o; Ary ny lalànao no firavoravoako.'
mg1865::mg_19::119::175:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 175
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka anie ho velona ny fanahiko ka hidera Anao; Ary aoka anie hamonjy ahy ny fitsaranao.'
mg1865::mg_19::119::176:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 119
  verse_number: 176
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nania aho; tadiavo ny mpanomponao toy ny fitady ondry very; Fa ny didinao tsy mba hadinoiko.'
mg1865::mg_19::120::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana ataon''ny olona miara-mitoetra amin''izay tia ady'
  verse_text: 'Fihirana fiakarana*. Jehovah no nitarainako tamin''ny fahoriako dia namaly ahy Izy, [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::120::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, vonjeo ny fanahiko amin''ny molotra mandainga, Eny, amin''ny lela mamitaka'
mg1865::mg_19::120::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no homeny anao, ary inona koa no hataony aminao, Ry lela mamitaka?'
mg1865::mg_19::120::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zana-tsipïkan''ny mahery sady voaranitra, Mbamin''ny vain''afon''anjavidy*. [*Izahao I Mpanjaka 19:4]'
mg1865::mg_19::120::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozako, fa mivahiny eto amin''ny Maseka aho Ary mitoetra ato an-dain''ny Kedarita!'
mg1865::mg_19::120::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ela loatra izay no nitoeran''ny fanahiko teo amin''Izay tsy tia fihavanana.'
mg1865::mg_19::120::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 120
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha izaho, dia fihavanana; Kanjo nony miteny aho, dia mila ady kosa ireny.'
mg1865::mg_19::121::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahatokian''izay manana an''i Jehovah ho Mpiaro azy'
  verse_text: 'Fihirana fiakarana*. Manopy ny masoko ho amin''ny tendrombohitra aho; Avy aiza ny famonjena ahy**? [**Na: Fihirana misy hevitra ambaratonga] [**Na: Izay ihavian''ny famonjena ahy]'
mg1865::mg_19::121::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famonjena ahy dia avy amin''i Jehovah, Mpanao ny lanitra sy ny tany.'
mg1865::mg_19::121::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba havelany hangozohozo anie ny tongotrao; Tsy ho rendrehana anie ny Mpiaro anao.'
mg1865::mg_19::121::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, tsy matory na rendrehana Ny Mpiaro ny Isiraely.'
mg1865::mg_19::121::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no Mpiaro anao; Jehovah no fialofanao eo amin''ny an-kavananao.'
mg1865::mg_19::121::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masoandro tsy mba hamely anao nony andro, Na ny volana nony alina.'
mg1865::mg_19::121::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hiaro anao amin''ny ratsy rehetra; Eny, hiaro ny fanahinao Izy.'
mg1865::mg_19::121::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 121
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah hiaro anao, na mivoaka na miditra, Hatramin''izao ka ho mandrakizay.'
mg1865::mg_19::122::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fifaliana ny amin''i Jerosalema sy fangatahan-tsoa ho azy'
  verse_text: 'Fihirana fiakarana*. Nataon''i Davida. FALY aho, raha hoy izy ireo tamiko: Andeha isika ho any an-tranon''i Jehovah. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::122::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tongotray efa mijoro Eo anatin''ny vavahadinao, ry Jerosalema o,'
mg1865::mg_19::122::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ianao ry Jerosalema, izay efa vita Tahaka ny tanàna efa voalamina tsara;'
mg1865::mg_19::122::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any no iakaran''ny firenena, Dia ireo firenen''i Jehovah (Lalàna amin''ny Isiraely izany). Mba hisaotra ny anaran''i Jehovah.'
mg1865::mg_19::122::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa any no misy seza fitsarana mipetraka, Dia ny seza fiandrianan''ny mpianakavin''i Davida.'
mg1865::mg_19::122::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangataha fiadanana ho an''i Jerosalema; Hambinina anie izay tia anao;'
mg1865::mg_19::122::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fiadanana anie ho ao anatin''ny mandanao; Fanambinana anie ho ao an-dapanao'
mg1865::mg_19::122::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny rahalahiko sy ny namako No hanaovako hoe Fiadanana anie ho ao anatinao.'
mg1865::mg_19::122::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 122
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny tranon''i Jehovah Andriamanitsika Dia hitady izay hahatsara anao aho.'
mg1865::mg_19::123::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 123
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanantenana an''Andriamanitra hanafaka amin''ny fanebahana sy ny fanamavoana'
  verse_text: 'Fihirana fiakarana*. Aminao no anandratako ny masoko, Ry Mpitoetra any an-danitra o. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::123::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 123
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, toy ny fijerin''ny ankizilahy Ny tanan''ny tompolahiny, Ary toy ny fijerin''ny ankizivavy Ny tanan''ny tompovaviny, No fijerintsika an''i Jehovah Andriamanitsika, Mandra-pamindra fony amintsika.'
mg1865::mg_19::123::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 123
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindrà fo aminay, Jehovah o, mamindrà fo aminay; Fa tototry ny fanamavoana loatra izahay;'
mg1865::mg_19::123::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 123
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, tototry ny famingavingan''ny miadana ny fanahinay, Sy tototry ny fanamavoan''ny mpiavonavona.'
mg1865::mg_19::124::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fisaorana an''Andriamanitra noho ny nanafahany ny mpanompony saiky tra-doza'
  verse_text: 'Fihirana fiakarana*. Nataon''i Davida. Raha tsy Jehovah no nomba antsika, Eny, aoka hataon''ny Isiraely hoe: [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::124::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy Jehovah no nomba antsika, Raha nitsangana hamely antsika ny olona.'
mg1865::mg_19::124::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nitelina antsika velona izy, Raha nirehitra tamintsika ny fahatezerany;'
mg1865::mg_19::124::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nandifotra antsika ny rano, Ary nanafotra ny fanahintsika ny riaka;'
mg1865::mg_19::124::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, nanafotra ny fanahintsika Ny rano misafoaka.'
mg1865::mg_19::124::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Jehovah, Izay tsy nanolotra antsika ho rembin''ny nifiny.'
mg1865::mg_19::124::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahintsika dia efa afaka tahaka ny vorona afaka tamin''ny fandriky ny mpihaza: Tapaka ny fandrika, ka afaka isika.'
mg1865::mg_19::124::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 124
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny famonjena antsika dia amin''ny anaran''i Jehovah, Mpanao ny lanitra sy ny tany.'
mg1865::mg_19::125::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 125
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fiarovana mahafinaritra hitan''izay matoky an''Andriamanitra'
  verse_text: 'Fihirana fiakarana*. Izay matoky an''i Jehovah dia tahaka ny tendrombohitra Ziona, izay tsy mihetsika, fa mitoetra mandrakizay. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::125::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 125
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny tendrombohitra manodidina an''i Jerosalema No anodidinan''i Jehovah ny olony Hatramin''izao ka ho mandrakizay'
mg1865::mg_19::125::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 125
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy hitoetra eo amin''ny anjaran''ny marina ny tehim-panjakan''ny ratsy fanahy, Fandrao ny marina haninjitra ny tanany hanendry zava-dratsy.'
mg1865::mg_19::125::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 125
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, manaova soa amin''ny tsara Sy ny mahitsy fo.'
mg1865::mg_19::125::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 125
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mivily ho amin''ny sakeli-dalana mivilivily Dia horoahin''i Jehovah miaraka amin''ny mpanao ratsy anie. Fiadanana anie ho amin''ny Isiraely.'
mg1865::mg_19::126::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 126
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fifalian''ny efa nampodin''i Jehovah, sy fifonana ho an''izay mbola babo'
  verse_text: 'Fihirana fiakarana*. Fony Jehovah nampody an''i Ziona avy tamin''ny fahababoany, Dia tahaka izay nanonofy isika. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::126::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 126
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahizay dia feno hehy ny vavantsika Sy fihobiana ny lelantsika; Dia natao tany amin''ny Jentilisa hoe: Zava-dehibe no nataon''i Jehovah ho an''ireny.'
mg1865::mg_19::126::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 126
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, zava-dehibe no nataon''i Jehovah ho antsika, Ka dia faly isika.'
mg1865::mg_19::126::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 126
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tanteraho, Jehovah o, ny ham-podiana anay avy amin''ny fahababoana, Tahaka ny fiverenan''ny riaka any amin''ny tany atsimo.'
mg1865::mg_19::126::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 126
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mamafy am-pitomaniana Dia hijinja am-pifaliana.'
mg1865::mg_19::126::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 126
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandeha mitomany mitondra ny voa afafiny izy, Fa hiverina mitondra ny amboarany amin''ny fihobiana kosa.'
mg1865::mg_19::127::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 127
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahatsinontsinon''ny ataon''ny olona, raha tsy ambinin''Andriamanitra'
  verse_text: 'Fihirana fiakarana*. Nataon''i Solomona. Raha tsy Jehovah no manao ny trano, Dia miasa foana ny mpanao azy. Raha tsy Jehovah no miambina ny tanàna, Dia miari-tory foana ny mpiambina. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::127::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 127
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-poana ho anareo ny mifoha maraina Sy ny alim-pandry Ka homana ny hanina azo amin''ny fahasahiranana; Izany anefa dia omeny ihany ho an''ny malalany, na dia matory aza izy.'
mg1865::mg_19::127::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 127
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, lova avy amin''i Jehovah ny zanaka maro; Tamby ny ateraky ny kibo.'
mg1865::mg_19::127::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 127
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny zana-tsipïka eo an-tanan''ny mahery Ny zanaky ny fahatanorana.'
mg1865::mg_19::127::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 127
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay mameno ny tranon-jana-tsipïkany amin''ireny; Tsy ho menatra ireny, raha mifamaly amin''ny fahavalo eo am-bavahady.'
mg1865::mg_19::128::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 128
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hatsaran''ny tokan-tranon''ny olona matahotra an''Andriamanitra'
  verse_text: 'Fihirana fiakarana*. Sambatra izay rehetra matahotra an''i Jehovah, Dia izay mandeha amin''ny lalany. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::128::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 128
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hohaninao tokoa ny asan''ny tananao; Sambatra sady ambinina ianao.'
mg1865::mg_19::128::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 128
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vadinao dia tahaka ny voaloboka mahavokatra Ao anatin''ny tranonao; Ny zanakao dia tahaka ny zanak''oliva Manodidina ny latabatrao.'
mg1865::mg_19::128::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 128
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, fa toy izany no hitahiana Izay lehilahy matahotra an''i Jehovah.'
mg1865::mg_19::128::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 128
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitahy anao avy any Ziona anie Jehovah; Ary ho faly hahita ny fahasoavan''i Jerosalema anie ianao Amin''ny andro rehetra hiainanao.'
mg1865::mg_19::128::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 128
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hahita ny zafinao anie ianao; Fiadanana anie ho amin''ny Isiraely.'
mg1865::mg_19::129::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hiafaran''ny mpandrafy an''i Ziona'
  verse_text: 'Fihirana fiakarana*. Mafy no nampahoriany ahy hatry ny fony aho mbola tanora, Eny, aoka hataon''ny Isiraely hoe: [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::129::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mafy no nampahoriany ahy hatry ny fony aho mbola tanora; Nefa tsy naharesy ahy izy.'
mg1865::mg_19::129::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiasa dia niasa ny lamosiko; Efa nanalava ny vavasany izy.'
mg1865::mg_19::129::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina Jehovah: Efa nanapaka ny famatorana nataon''ny ratsy fanahy Izy.'
mg1865::mg_19::129::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho menatra sy hiamboho Izay rehetra mandrafy an''i Ziona'
mg1865::mg_19::129::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka ho tahaka ny ahitra eo an-tampon-trano. Izay malazo, na dia tsy misy manongotra azy aza;'
mg1865::mg_19::129::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy mpijinja mameno tanana Na mpamehy amboara mameno tratra amin''izany;'
mg1865::mg_19::129::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 129
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsy hisy mpandalo hanao hoe: Hotahin''i Jehovah anie ianareo; Eny, ny anaran''i Jehovah no itsofanay rano anareo.'
mg1865::mg_19::130::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana ataon''izay latsaka amin''ny fahoriana lalina'
  verse_text: 'Fihirana fiakarana*. Tao amin''ny lalina no niantsoako Anao, Jehovah o, [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::130::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tompo o, henoy ny feoko; Aoka ny sofinao hihaino tsara ny feon''ny fifonako.'
mg1865::mg_19::130::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mandinika heloka Ianao, Jehovah o, Iza no hahajanona, Tompo o?'
mg1865::mg_19::130::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa eo aminao no misy ny famelan-keloka, Mba hatahorana Anao.'
mg1865::mg_19::130::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Niandry an''i Jehovah aho; eny, niandry Azy ny fanahiko, Ary ny teniny no nanantenako.'
mg1865::mg_19::130::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fanahiko miandry ny Tompo Mihoatra noho ny fiandrin''ny mpiambina ny maraina, Dia ny fiandrin''ny mpiambina ny maraina.'
mg1865::mg_19::130::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manantenà an''i Jehovah, ry Isiraely; Fa eo amin''i Jehovah no misy famindram-po sy fanavotana be;'
mg1865::mg_19::130::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 130
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no hanavotra ny Isiraely Ho afaka amin''ny helony rehetra.'
mg1865::mg_19::131::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 131
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiononam-po sy fiankinana amin''Andriamanitra'
  verse_text: 'Fihirana fiakarana*. Nataon''i Davida. Jehovah o, tsy nirehareha ny foko, ary tsy niandranandrana ny masoko: Ary tsy nisaintsaina izay zavatra ambony loatra aho, Na izay saro-pantarina tsy takatro. [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::131::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 131
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nampionona sy nampangina ny fanahiko aho; Tahaka ny zaza efa maoty eo amin-dreniny. Dia tahaka Izany ny fanahiko ato anatiko.'
mg1865::mg_19::131::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 131
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Isiraely o, manantenà an''i Jehovah Hatramin''izao ka ho mandrakizay.'
mg1865::mg_19::132::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka ho an''ny tranon''Andriamanitra sy ny ankohonan''i Davida'
  verse_text: 'Fihirana fiakarana*. Jehovah o, tsarovy Davida Noho ny fiahiany rehetra, [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::132::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ilay nianiana tamin''i Jehovah Sy nivoady tamin''ny Maherin''i Jakoba hoe:'
mg1865::mg_19::132::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba hiditra ao an-daiko aho, Na hiakatra amin''ny farafara fandriako,'
mg1865::mg_19::132::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mba havelako hatory ny masoko, Na ho rendrehana ny hodimasoko,'
mg1865::mg_19::132::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pahitako fitoerana ho an''i Jehovah. Dia fonenana ho an''ny Maherin''i Jakoba.'
mg1865::mg_19::132::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, nandre azy tany Efrata isika; Nahita azy tao amin''ny saha anaty ala* isika. [*Na: tany an-tsahan''i Jara]'
mg1865::mg_19::132::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hiditra any amin''ny fonenany isika Ka hivavaka eo amin''ny fitoeran-tongony.'
mg1865::mg_19::132::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitsangàna, Jehovah o, ho amin''ny fitsaharanao, Dia Ianao sy ny fiaran''ny herinao.'
mg1865::mg_19::132::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny mpisoronao hirafy fahamarinana Ary aoka ny olonao masina hihoby.'
mg1865::mg_19::132::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny amin''i Davida mpanomponao Dia aza mampiala maina ny tavan''ny voahosotrao.'
mg1865::mg_19::132::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nianiana tamin''i Davida, Ary marina izany ka tsy hitsoahany Ny ateraky ny kibonao no hapetrako eo ambonin''ny seza fiandriananao.'
mg1865::mg_19::132::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hotandreman''ny zanakao ny fanekeko Sy ny teny vavolombeloko izay hampianariko azy, Dia hipetraka eo ambonin''ny seza fiandriananao mandrakizay doria kosa ny zanany.'
mg1865::mg_19::132::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa nifidy an''i Ziona. Ary naniry azy ho fonenany.'
mg1865::mg_19::132::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity, hoy Izy, no fitsaharako mandrakizay doria; Eto no honenako, fa efa niriko ity.'
mg1865::mg_19::132::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hotahiko tokoa ny fihinana ao; Hovokisako hanina ny malahelo ao.'
mg1865::mg_19::132::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpisorona ao dia hampitafiko famonjena; Ary hihoby tokoa ny olo-masina ao.'
mg1865::mg_19::132::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao no hampitsimohako tandroka ho an''i Davida Sy hanamboarako jiro ho an''ny voahosotro.'
mg1865::mg_19::132::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 132
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahavalony hampitafiko henatra; Fa eo aminy kosa no hamirapiratra ny satro-boninahiny.'
mg1865::mg_19::133::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 133
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny mahatsara ny fifankatiavana'
  verse_text: 'Fihirana fiakarana*. Nataon''i Davida. Endrey, tsara sady mahafinaritra Raha ny mpirahalahy no miara-monina [*Na: Fihirana misy hevitra ambaratonga]'
mg1865::mg_19::133::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 133
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny diloilo tsara amin''ny loha, Izay mitsororoka amin''ny somotra, dia ny somotr''i Arona, Izay mitsororoka amin''ny moron-tongotr''akanjony*; [*Na: vozon''akanjony]'
mg1865::mg_19::133::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 133
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tahaka ny ando any Hermona, izay milatsaka amin''ny tendrombohitra Ziona; Fa voadidin''i Jehovah ho eo ny fitahiana, Dia fiainana ho mandrakizay.'
mg1865::mg_19::134::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 134
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Hira ho fisaorana an''i Jehovah amin''ny alina'
  verse_text: 'Fihirana fiakarana*. Andeha, misaora an''i Jehovah**, ianareo rehetra mpanompon''i Jehovah, Izay mitoetra alina ao an-tranon''i Jehovah. [*Na: Fihirana misy hevitra ambaratonga] [**Na: misaora an''i Jehovah amin''ny alina]'
mg1865::mg_19::134::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 134
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manandrata ny tananareo ho amin''ny fitoerana masina*, Ka misaora an''i Jehovah. [*Na: amin''ny fahamasinana]'
mg1865::mg_19::134::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 134
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hitahy anao avy ao Ziona anie Jehovah Mpanao ny lanitra sy ny tany.'
mg1865::mg_19::135::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny heriny sy ny nitondrany ny Isiraely, ary filazana ny mahatsinontsinona ny sampy'
  verse_text: 'Haleloia. Miderà ny anaran''i Jehovah; Miderà, ianareo mpanompon''i Jehovah,'
mg1865::mg_19::135::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo izay mpitoetra ao an-tranon''i Jehovah, Eo anatin''ny kianjan''ny tranon''Andriamanitsika.'
mg1865::mg_19::135::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà an''i Jehovah, fa tsara Izy; Mankalazà ny anarany, fa mahafinaritra izany.'
mg1865::mg_19::135::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jakoba nofidin''i Jehovah ho Azy, Ary Isiraely ho rakitra soa ho Azy,'
mg1865::mg_19::135::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro fa lehibe Jehovah, Ary ambonin''ny andriamanitra rehetra ny Tompontsika.'
mg1865::mg_19::135::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao izay sitrapony rehetra Jehovah, Na any amin''ny lanitra, na ety ambonin''ny tany, Na any amin''ny ranomasina sy ny rano lalina rehetra.'
mg1865::mg_19::135::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampiakatra zavona avy amin''ny faran''ny tany Izy; Manao helatra arahin-dranonorana Izy; Mamoaka ny rivotra avy ao an-trano fitehirizany Izy,'
mg1865::mg_19::135::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay namely ny voalohan-terak''i Egypta, Na olona, na biby.'
mg1865::mg_19::135::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nanatitra famantarana sy fahagagana teo aminao Izy, ry Egypta o, Eny, tamin''i Farao sy ny mpanompony rehetra,'
mg1865::mg_19::135::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Ilay namely ny jentilisa maro Ka nahafaty mpanjaka mahery,'
mg1865::mg_19::135::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Sihona, mpanjakan''ny Amorita, Sy Oga, mpanjakan''i Basana, Ary ny fanjakan''i Kanana rehetra;'
mg1865::mg_19::135::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taniny nomeny ho lova, Eny, ho lovan''ny Isiraely olony.'
mg1865::mg_19::135::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, mandrakizay ny anaranao; Jehovah o, hihatra amin''ny taranaka fara mandimby ny fahatsiarovana Anao.'
mg1865::mg_19::135::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hanome rariny ny olony Izy Ary hanenina ny amin''ny mpanompony.'
mg1865::mg_19::135::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sampin''ny jentilisa dia volafotsy sy volamena, Asan''ny tanan''olona;'
mg1865::mg_19::135::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manam-bava izy, fa tsy miteny; Mana-maso izy, fa tsy mahita;'
mg1865::mg_19::135::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manan-tsofina izy, fa tsy mandre; Ary tsy misy fofonaina ao am-bavany.'
mg1865::mg_19::135::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho tahaka azy izay manao azy Sy izay rehetra matoky azy.'
mg1865::mg_19::135::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''i Jehovah, ry taranak''Isiraely; Misaora an''i Jehovah, ry taranak''i Arona;'
mg1865::mg_19::135::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora an''i Jehovah, ry taranak''i Levy; Ianareo izay matahotra an''i Jehovah, misaora an''i Jehovah.'
mg1865::mg_19::135::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 135
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana avy any Ziona anie Jehovah, Izay mitoetra any Jerosalema. Haleloia.'
mg1865::mg_19::136::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fankalazana an''Andriamanitra noho ny nanaovany izao rehetra izao sy ny nanavotany ny olony'
  verse_text: 'Miderà an''i Jehovah, fa tsara Izy; Fa mandrakizay ny famindram-pony.'
mg1865::mg_19::136::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midera an''Andriamanitra Avo Indrindra*; Fa mandrakizay ny famindram-pony. [*Hebreo: Andriamanitry ny andriamanitra]'
mg1865::mg_19::136::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà ny Tompon''ny tompo; Fa mandrakizay ny famindram-pony;'
mg1865::mg_19::136::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy irery no Mpanao fahagagan-dehibe (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanao ny lanitra tamin''ny fahendrena (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namelatra ny tany ho ambonin''ny rano, (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanao ireo fanazavana lehibe (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ny masoandro ho mpanapaka ny andro (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny volana sy ny kintana ho mpanapaka ny alina (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namely ny voalohan-terak''i Egypta, (Fa mandrakizay ny famindram-pony)'
mg1865::mg_19::136::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nitondra ny Isiraely nivoaka avy teo aminy (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny tanana mahery sy ny sandry nahinjitra (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nampisaraka ny Ranomasina Mena (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nampandeha ny Isiraely namaky teo afovoany (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanary an''i Farao sy ny miaramilany tao anatin''ny Ranomasina Mena (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nitondra ny olony nitety ny efitra (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay namely mpanjaka lehibe (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka nahafaty mpanjaka malaza (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia Sihona, mpanjakan''ny Amorita (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy Oga, mpanjakan''i Basana (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taniny nomeny ho lova (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ho lovan''ny Isiraely mpanompony (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nahatsiaro antsika fony isika ambany toetra (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka naneho hery namonjy antsika ho afaka tamin''ny fahavalontsika (Fa mandrakizay ny famindram-pony),'
mg1865::mg_19::136::25:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manome hanina ny nofo rehetra (Fa mandrakizay ny famindram-pony)'
mg1865::mg_19::136::26:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 136
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà an''Andriamanitry ny lanitra; Fa mandrakizay ny famindram-pony.'
mg1865::mg_19::137::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fahatsiarovana ny alahelon''ny babo tany Babylona'
  verse_text: 'Teo amoron''ny onin''i Babylona no nipetrahanay, Sady nitomanianay, raha nahatsiaro an''i Ziona.'
mg1865::mg_19::137::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Teo amin''ny hazomalahelo teo afovoan''i Babylona No nanantonanay ny lokanganay.'
mg1865::mg_19::137::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa teo dia nangataka anay hihira izay namabo anay; Ary izay nampahory anay nangataka anay hanao fifaliana ka nanao hoe: Manaova hiran''i Ziona eto anatrehanay.'
mg1865::mg_19::137::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ho nataontsika ahoana no fihira ny fihiran''i Jehovah Tany an-tany nivahiniana?'
mg1865::mg_19::137::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manadino anao aho, ry Jerosalema o, Aoka kosa ny tanako ankavanana mba hanadino.'
mg1865::mg_19::137::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha tsy mahatsiaro anao aho, Aoka ny lelako hiraikitra amin''ny lanilaniko, Raha tsy Jerosalema no ataoko ambony indrindra amin''ny fifaliako rehetra.'
mg1865::mg_19::137::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, tsarovy amin''ny taranak''i Edoma Ny andron''i Jerosalema, Dia ireo izay nanao hoe: Ravao, ravao izy Hatramin''ny fanorenany.'
mg1865::mg_19::137::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Babylona zanakavavy izay efa resy*, Sambatra izay mamaly anao Araka izay nataonao taminay. [*Na: ho resy]'
mg1865::mg_19::137::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 137
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay maka ny zanakao madinika ka manjera azy ho torotoro, Amin''ny harambato.'
mg1865::mg_19::138::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 1
  verse_date_revised: '2022-11-27T08:13:07+0000'
  verse_title: 'Fiderana an''Andriamanitra noho ny famindram-pony sy ny fahamarinany, izay mbola heken''ny mpanjaka rehetra. Nataon''i Davida.'
  verse_text: 'Hidera Anao amin''ny foko rehetra aho; Eo anatrehan''ireo andriamanitra no hankalazako Anao.'
mg1865::mg_19::138::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hivavaka manandrify ny tempolinao masina aho Ka hidera ny anaranao noho ny famindram-ponao sy ny fahamarinanao; Fa efa nomenao voninahitra ny teninao ho ambonin''ny anaranao rehetra.'
mg1865::mg_19::138::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny andro nitarainako dia namaly ahy Ianao; Nomenao fahasahiana aho ka nisy hery ny fanahiko.'
mg1865::mg_19::138::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, hidera Anao ny mpanjaka rehetra amin''ny tany, Fa handre ny tenin''ny vavanao izy.'
mg1865::mg_19::138::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny hihira ny amin''ny lalan''i Jehovah izy; Fa lehibe ny voninahitr''i Jehovah.'
mg1865::mg_19::138::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia avo aza Jehovah dia* mijery ny ambany toetra, Ary ny mpiavonavona fantany eny lavitra eny. [*Na: Fa avo Jehovah ka]'
mg1865::mg_19::138::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia handeha eo amin''ny fahoriana aza aho dia hamelona ahy Ianao; Haninjitra ny tananao hanohitra ny fahatezeran''ny fahavaloko Ianao Ary hamonjy ahy ny tananao ankavanana.'
mg1865::mg_19::138::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 138
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no hahatanteraka ny amiko; Jehovah o, mandrakizay ny famindram-ponao; Aza mahafoy ny asan''ny tananao.'
mg1865::mg_19::139::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fankalazana an''Andriamanitra, Izay mahalala ny zavatra rehetra sady manerana izao rehetra izao. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Jehovah o, efa nandinika ahy Ianao ka mahalala ahy.'
mg1865::mg_19::139::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao no mahalala ny fipetrako sy ny fitsangako Sady mahafantatra ny hevitro eny lavitra eny.'
mg1865::mg_19::139::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voadinikao ny toetro, na mandeha aho, na mandry; Ary fantatrao tsara ny alehako rehetra.'
mg1865::mg_19::139::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa, indro, tsy misy teny tsy fantatrao eo amin''ny lelako, Jehovah o.'
mg1865::mg_19::139::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manodidina ahy eo ivohoko sy eo anatrehako Ianao, Ary apetrakao amiko ny tananao.'
mg1865::mg_19::139::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fahalalana mahagaga ahy loatra izany, Eny, avo loatra ka tsy tratro.'
mg1865::mg_19::139::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza no hialako amin''ny Fanahinao? Aiza no handosirako tsy ho eo anatrehanao?'
mg1865::mg_19::139::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia miakatra any an-danitra aza aho dia any Ianao; Ary na dia manao ny fiainan-tsy hita* ho fandriako aza aho, indro, any Ianao. [*Hebreo: Sheola]'
mg1865::mg_19::139::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia maka ny elatry ny maraina aza aho, Mba hitoetra any am-paran''ny ranomasina,'
mg1865::mg_19::139::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia mbola entin''ny tananao ihany aho, na dia izany aza, Sy hazonin''ny tananao ankavanana.'
mg1865::mg_19::139::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia hoy izaho aza: Aoka ny maizina hanarona ahy, Ary aoka ny mazava manodidina ahy ho tonga alina,'
mg1865::mg_19::139::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsia*, fa ny maizina aza tsy mahamaizina aminao; Fa ny alina dia mahazava toy ny andro ihany, Ka sahala ny mazava sy ny maizina. [*Na: Na dia hoy izaho aza: Hanarona ahy tokoa ny maizina, Dia ny alina aza no ho mazava manodidina ahy; Eny, etc]'
mg1865::mg_19::139::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no nahary ny voako; Namolavola ahy tao an-kibon-dreniko Ianao.'
mg1865::mg_19::139::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera Anao aho; fa mahatahotra sy mahatalanjona ny nanaovana ahy; Mahagaga ny asanao; Ary fantatry ny fanahiko marimarina izany.'
mg1865::mg_19::139::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenako tsy niafina taminao, Fony natao tao amin''ny miafina aho, Ka noforoninao hisy endrika tany ambanin''ny tany.'
mg1865::mg_19::139::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masonao efa nahita ahy na dia fony tsy mbola ary fady aza aho; Voasoratra teo amin''ny bokinao avokoa ny andro voatendry, Fony tsy mbola nisy na dia iray akory aza.'
mg1865::mg_19::139::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey, zava-tsoa amiko indrindra ny hevitrao, Andriamanitra o! Akory ny hamaron''ny isany!'
mg1865::mg_19::139::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha hanisa azy aho, dia maro isa lavitra noho ny fasika izy; Raha mifoha aho, dia mbola aminao ihany.'
mg1865::mg_19::139::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Haringanao mihitsy ny ratsy fanahy, Andriamanitra o*, Ary mialà amiko, ianareo mpandatsa-drà. [*Na: Haringanao mihitsy anie ny ratsy fanahy, Andriamanitra o]'
mg1865::mg_19::139::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia izay manonona Anao ho enti-mamitaka, Jehovah o, Eny, ny fahavalonao izay manonona Anao foana.'
mg1865::mg_19::139::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hankahala izay mankahala Anao va aho, Jehovah o, Sy ho tezitra* amin''izay mitsangana hanohitra Anao? [*Hebreo: ho maloiloy]'
mg1865::mg_19::139::22:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Halako dia halako marina tokoa ireny; Efa fahavaloko ireny.'
mg1865::mg_19::139::23:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Diniho aho, Andriamanitra o, ary fantaro ny foko; Izahao toetra aho, ary fantaro ny eritreritro;'
mg1865::mg_19::139::24:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 139
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahao na misy lalana mampahory ato anatiko, Dia tariho amin''ny lalana mandrakizay aho.'
mg1865::mg_19::140::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fangataham-piarovana noho ny ataon''ny olona ratsy fanahy sy fetsy vava. Ho an''ny mpiventy hira. Salamo nataon''i Davida.'
  verse_text: 'Jehovah o, vonjeo amin''ny olon-dratsy aho, Ary arovy amin''ny olon-dozabe,'
mg1865::mg_19::140::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay mihevitra ratsy ao am-pony Ka manangana ady isan''andro'
mg1865::mg_19::140::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandranitra ny lelany tahaka ny bibilava izy, Ny poizin''ny menarana no ao ambanin''ny molony.'
mg1865::mg_19::140::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, vonjeo amin''ny tanan''ny ratsy fanahy aho, Ary arovy amin''ny olon-dozabe, Izay efa nihevitra handronjina ahy ho potraka.'
mg1865::mg_19::140::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpiavonavona efa nanafina fandrika sy kofehy hamandrihany ahy; Efa namela-pandrika harato teo amoron-dalana izy; Nametraka tadivavarana hahazoany ahy izy.'
mg1865::mg_19::140::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy izaho tamin''i Jehovah Andriamanitro Ianao; Henoy ny feon''ny fifonako, Jehovah o!'
mg1865::mg_19::140::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah, Tompo o, ry Herin''ny famonjena ahy, Manarona ny lohako amin''ny andro fiadiana Ianao.'
mg1865::mg_19::140::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, aza manome ny irin''ny ratsy fanahy; Ary aza avela ho tanteraka ny hevi-dratsiny, fandrao hisandratra izy.'
mg1865::mg_19::140::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lohan''izay manemitra ahy Dia aoka hosaronan''ny ratsy tononin''ny molony.'
mg1865::mg_19::140::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisy vain''afo halatsaka aminy; Aoka hariana any anaty afo izy, na any amin''ny rano lalina, ka tsy hiarina intsony.'
mg1865::mg_19::140::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy hampitoerina amin''ny tany ny olo-mahay vava; Henjehin-doza ny olon-dozabe ka ho lavo.'
mg1865::mg_19::140::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantatro fa Jehovah no handahatra ny tenin''ny mahantra Sady hanome rariny ho an''ny malahelo.'
mg1865::mg_19::140::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 140
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny tokoa, ny marina hisaotra ny anaranao; Hitoetra eo anatrehanao ny mahitsy.'
mg1865::mg_19::141::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarainana ataon''izay alaim-panahy sy enjehina'
  verse_text: 'Salamo nataon''i Davida. Jehovah o, mitaraina aminao aho, faingàna hankaty amiko; Henoy ny feoko amin''ny fiantsoako Anao.'
mg1865::mg_19::141::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hankeo anatrehanao mandrakariva toy ny ditin-kazo manitra ny fivavako, Ary ho toy ny fanatitra hariva ny fanandratako ny tanako.'
mg1865::mg_19::141::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, asio fiambenana eo anoloan''ny vavako; Ambeno ny varavaran''ny molotro.'
mg1865::mg_19::141::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza avela hirona ho amin''ny zava-dratsy ny foko, Hiray raharaha amin''ny olona mpanao ratsy hanao izay asa tsy mety; Ary aoka tsy hihinana ny zava-piny aho.'
mg1865::mg_19::141::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny marina hamely ahy amin''ny fahalemen-panahy ka hananatra ahy, Fa diloilo ahosotra ny lohako izany, ary aoka tsy handà izany ny lohako; Fa ny hany heriko dia ny mbola hivavaka ihany noho ny faharatsian''ireny.'
mg1865::mg_19::141::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Havarina amin''ny hantsam-bato ny mpitsara azy, Dia hankasitraka ny teniko ny olona.'
mg1865::mg_19::141::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny fiasa sy ny fihevo ny tany No nanelezana ny taolanay teo am-bavan''ny fiainan-tsy hita*. [*Hebreo: Sheola]'
mg1865::mg_19::141::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ianao no andrandrain''ny masoko, Jehovah Tompo o; Ianao no ialofako, aza mandatsaka ny aiko.'
mg1865::mg_19::141::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arovy aho amin''ny fandrika amandrihany ahy Sy amin''ny tadivavaran''ny mpanao ratsy.'
mg1865::mg_19::141::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 141
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny ratsy fanahy ho latsaka eo anatin''ny fandriny ihany, Fa izaho kosa handalo fotsiny.'
mg1865::mg_19::142::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Vavaka ataon''izay foin''ny sakaizany sady enjehin''ny fahavalony'
  verse_text: 'Maskila nataon''i Davida tamin''izy tao anaty lavaka. Fivavahana. Ny feoko no itarainako amin''i Jehovah; Ny feoko no ifonako amin''i Jehovah.'
mg1865::mg_19::142::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Loarako eo anatrehany ny fitarainako; Ambarako eo anatrehany ny fahoriako.'
mg1865::mg_19::142::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha reraka ato anatiko ny fanahiko, dia fantatro ny alehako; Eo amin''ny lalana izorako No nanafenany fandrika hamandrihany ahy.'
mg1865::mg_19::142::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jereo eo an-kavanana, ka izahao, Fa tsy misy olona mahalala ahy; Foana avokoa ny fiarovana ahy; Tsy misy miahy ny fanahiko.'
mg1865::mg_19::142::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitaraina aminao aho, Jehovah o; Hoy izaho: Ianao no aroko Sy anjarako eo amin''ny tanin''ny velona.'
mg1865::mg_19::142::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Henoy ny fitarainako, Fa reraka indrindra aho; Vonjeo aho amin''ny mpanenjika ahy, Fa tsy leoko ireny.'
mg1865::mg_19::142::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 142
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avoahy hiala amin''ny tranomaizina ny fanahiko, Mba hiderako ny anaranao; Hanodidina ahy ny marina, Satria manisy soa ahy Ianao.'
mg1865::mg_19::143::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Faniriam-pamindram-po noho ny fahoriana mafy'
  verse_text: 'Salamo nataon''i Davida. Jehovah o, henoy ny fivavako, ary atongilano amin''ny fifonako ny sofinao; Valio aho araka ny teninao marina sy ny fahamarinanao.'
mg1865::mg_19::143::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza dia mifandahatra amin''ny mpanomponao eo am-pitsarana; Fa tsy misy olombelona ho marina eo anatrehanao.'
mg1865::mg_19::143::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nanenjika ny fanahiko ny fahavalo; Namely ny aiko ho lavo tamin''ny tany izy: Nampitoeriny tao amin''ny maizina aho, toy izay efa maty ela.'
mg1865::mg_19::143::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia reraka ny fanahiko ato anatiko; Fadiranovana ny foko ato anatiko.'
mg1865::mg_19::143::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 5
  verse_date_revised: '2022-05-10T11:34:21+0000'
  verse_title: null
  verse_text: 'Mahatsiaro ny andro fahiny aho Ary misaina ny asanao rehetra; Ny asan''ny tananao no eritreretiko.'
mg1865::mg_19::143::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mananty tanana aminao aho; Ny fanahiko dia tahaka ny tany mangetana eo anatrehanao.'
mg1865::mg_19::143::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Faingàna hamaly ahy, Jehovah o, fa reraka ny fanahiko; Aza manafina ny tavanao amiko, Fandrao ho tahaka izay midina any am-pasana aho.'
mg1865::mg_19::143::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampandreneso ny famindram-ponao aho nony maraina, Fa Ianao no itokiako; Ampahalalao ahy izay lalana tokony halehako, Fa aminao no ananganako ny fanahiko.'
mg1865::mg_19::143::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 9
  verse_date_revised: '2022-06-06T05:44:06+0000'
  verse_title: null
  verse_text: 'Jehovah o, vonjeo amin''ny fahavaloko aho; Ao aminao no iereko.'
mg1865::mg_19::143::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampianaro hanao ny sitraponao aho; Fa Ianao no Andriamanitro; Aoka ny Fanahinao tsara no hitarihanao ahy amin''izay tany marina.'
mg1865::mg_19::143::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny anaranao, Jehovah o, velomy aho; Araka ny fahamarinanao avoahy ny fanahiko ho afaka amin''ny fahoriana.'
mg1865::mg_19::143::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 143
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka ny famindram-ponao fongory ny fahavaloko, Ka aringano izay rehetra mampahory ny fanahiko; Fa mpanomponao aho.'
mg1865::mg_19::144::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiderana an''Andriamanitra noho ny nanambinany ny mpanjaka, ary filazana ny mahatsinontsinona ny olombelona sy ny soa hitan''ny mpanompon''Andriamanitra. Nataon''i Davida.'
  verse_text: 'Isaorana anie Jehovah Vatolampiko, Izay mampianatra ny tanako hamely Sy ny rantsan-tanako hiady,'
mg1865::mg_19::144::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay Mpiantra sy batery fiarovana ho ahy sady fiarovana avo sy Mpanafaka ahy, Ary ampingako sy fialofako, Izay mahafolaka ny vahoakako hanoa ahy'
mg1865::mg_19::144::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, inona ny olona, no iahianao* azy? Ary ny zanak''olombelona, no iheveranao azy? [*Hebreo: ahafantaranao]'
mg1865::mg_19::144::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona dia tahaka ny zava-poana, Ny androny dia tahaka ny aloka mihelina.'
mg1865::mg_19::144::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, aondreho ny lanitrao, ka midina; Tendreo ny tendrombohitra, dia hidonaka ireny.'
mg1865::mg_19::144::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampitselatselaro ny helatra, ka ampielezo ireo; Alefao ny zana-tsipïkanao, ka ampifanaritaho ireo;'
mg1865::mg_19::144::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahinjiro avy any ambony ny tananao; Afaho aho, ka vonjeo amin''ny rano be, Dia amin''ny tanan''ny hafa firenena,'
mg1865::mg_19::144::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay miteny zava-poana amin''ny vavany, Ary ny tanany ankavanana dia tanana ankavanana mamitaka.'
mg1865::mg_19::144::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra o, hihira fihiram-baovao ho Anao aho; Amin''ny valiha tory folo no hankalazako Anao,'
mg1865::mg_19::144::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manome famonjena ho an''ireo mpanjaka, Sady mamonjy an''i Davida mpanompony tsy ho voan''ny sabatra mandratra.'
mg1865::mg_19::144::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Afaho aho, ka vonjeo amin''ny tanan''ny hafa firenena, Izay miteny zava-poana amin''ny vavany, Ary ny tanany ankavanana dia tanana ankavanana mamitaka;'
mg1865::mg_19::144::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba ho tahaka ny zava-maniry maroroka ny zanakai-lahy, Ary ho tahaka ny vato fehizoro voasoratra tsara toy ny fomban''ny lapan''andriana ny zanakai-vavy.'
mg1865::mg_19::144::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho feno ny trano fitehirizanay, ka hisy vokatra betsaka samy hafa karazana; Hiteraka arivoarivo sy alinalina ny ondrinay any an-tsahanay;'
mg1865::mg_19::144::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahazaka be ny ombinay, Ary tsy hisy ho rava, na ho lasan-ko babo, Sady tsy hisy fitarainana any an-dalambenay.'
mg1865::mg_19::144::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 144
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra ny firenena izay tahaka izany; Eny, sambatra ny firenena izay manana an''i Jehovah ho Andriamaniny.'
mg1865::mg_19::145::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Salamo abidy. Fiderana an''Andriamanitra, Mpanjaka be indrafo'
  verse_text: 'Fideran''i Davida. Hanandratra Anao aho, ry Andriamanitro Mpanjaka o, Sy hankalaza ny anaranao mandrakizay doria.'
mg1865::mg_19::145::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hankalaza Anao isan''andro aho sy hidera ny anaranao mandrakizay doria.'
mg1865::mg_19::145::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lehibe Jehovah ka tokony hoderaina indrindra; Ary tsy takatry ny saina ny fahalehibiazany .'
mg1865::mg_19::145::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranaka rehetra samy hidera ny asanao amin''izay mandimby azy Sy hanambara ny asanao lehibe.'
mg1865::mg_19::145::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny lazan''ny voninahitry ny fiandriananao Sy ny asanao mahagaga no hosaintsainiko.'
mg1865::mg_19::145::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny herin''ny asanao mahatahotra no hotenenin''ny olona; Ary ny fahalehibiazanao no holazaiko.'
mg1865::mg_19::145::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanonona ny fahatsiarovana ny haben''ny fahatsaranao izy Sy hihoby ny fahamarinanao.'
mg1865::mg_19::145::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamindra fo sy miantra Jehovah; Mahari-po sady be famindram-po Izy.'
mg1865::mg_19::145::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manisy soa izao tontolo izao Jehovah; Ary ny fiantràny dia eny amin''ny asany rehetra.'
mg1865::mg_19::145::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah o, midera Anao ny asanao rehetra; Ary ny olonao masina misaotra Anao.'
mg1865::mg_19::145::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milaza ny voninahitry ny fanjakanao izy Sady miresaka ny herinao,'
mg1865::mg_19::145::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hampahafantarina ny zanak''olombelona ny herinao* Sy ny haben''ny voninahitry ny fanjakanao**. [*Hebreo: heriny] [**Hebreo: fanjakany]'
mg1865::mg_19::145::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 13
  verse_date_revised: '2022-08-10T06:10:47+0000'
  verse_title: null
  verse_text: 'Fanjakana mandrakizay ny fanjakanao, Ary hihatra amin''ny taranaka fara mandimby ny fanapahanao.'
mg1865::mg_19::145::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah manohana izay rehetra efa ho lavo Sy mampitraka izay rehetra mitanondrika.'
mg1865::mg_19::145::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mason''izao rehetra izao miandrandra Anao, Ary Ianao manome azy ny haniny amin''ny fotoany.'
mg1865::mg_19::145::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manokatra ny tananao Ianao Ka mahavoky soa ny zava-miaina rehetra.'
mg1865::mg_19::145::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Marina Jehovah amin''ny lalany rehetra, Sady mamindra fo amin''ny asany rehetra.'
mg1865::mg_19::145::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah dia eo akaikin''izay rehetra miantso Azy, Dia izay rehetra miantso Azy marina tokoa.'
mg1865::mg_19::145::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hanefa ny irin''izay matahotra Azy Izy Ary hihaino ny fitarainany ka hamonjy azy.'
mg1865::mg_19::145::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miaro izay rehetra tia Azy Jehovah; Fa ny ratsy fanahy rehetra kosa haringany.'
mg1865::mg_19::145::21:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 145
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fiderana an''i Jehovah no hotenenin''ny vavako; Ary aoka ny nofo rehetra hankalaza ny anarany masina mandrakizay doria.'
mg1865::mg_19::146::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Dera ho an''Andriamanitra, Mpamonjy tokana'
  verse_text: 'Haleloia. Miderà an''i Jehovah, ry fanahiko.'
mg1865::mg_19::146::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hidera an''i Jehovah aho, raha mbola miaina koa; Eny, hankalaza an''Andriamanitra aho, raha mbola velona koa.'
mg1865::mg_19::146::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza matoky ny lehibe, Na ny zanak''olombelona izay tsy mahavonjy.'
mg1865::mg_19::146::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miala ny fofonainy, ka miverina ho amin''ny taniny izy; Ary amin''izay indrindra no hahafoanan''ny fikasany.'
mg1865::mg_19::146::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sambatra izay manana an''Andriamanitr''i Jakoba ho Mpanampy azy Sady manantena an''i Jehovah Andriamaniny,'
mg1865::mg_19::146::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanao ny lanitra sy ny tany, Ny ranomasina sy izay rehetra ao anatiny, Izay mitandrina fahamarinana mandrakizay,'
mg1865::mg_19::146::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manome rariny ho an''ny ampahoriana, Izay manome hanina ho an''ny noana. Jehovah mamaha ny mpifatotra;'
mg1865::mg_19::146::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mampahiratra ny jamba Jehovah mampitraka ny mitanondrika; Jehovah tia ny marina;'
mg1865::mg_19::146::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah miaro ny vahiny Ary manandratra ny kamboty sy ny mpitondratena, Fa mamadika ny lalan''ny ratsy fanahy kosa.'
mg1865::mg_19::146::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 146
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manjaka mandrakizay Jehovah, Hatramin''ny taranaka fara mandimby Andriamanitrao, ry Ziona. Haleloia.'
mg1865::mg_19::147::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Haleloia ho an''ny Mpanohana izao rehetra izao, Izay nampody ny fahatsaran''i Jerosalema'
  verse_text: 'Haleloia; Fa tsara ny mihira ho an''Andriamanitsika; Eny, mamy sady mendrika ny fiderana.'
mg1865::mg_19::147::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manangana an''i Jerosalema Jehovah; Mamory ny Isiraely voaroaka Izy.'
mg1865::mg_19::147::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahasitrana ny torotoro fo Izy Sy mamehy ny feriny.'
mg1865::mg_19::147::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milaza ny isan''ny kintana Izy: Samy tononiny amin''ny anarany ireny rehetra ireny.'
mg1865::mg_19::147::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lehibe ny Tompontsika sady be hery; Tsy hita lany ny fahalalany.'
mg1865::mg_19::147::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manandratra ny mpandefitra Jehovah, Fa mampietry ny ratsy fanahy hatramin''ny tany.'
mg1865::mg_19::147::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihirà fiderana ho an''i Jehovah; Mankalazà an''Andriamanitsika amin''ny lokanga,'
mg1865::mg_19::147::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manaron-drahona ny lanitra, Izay mamboatra ranonorana ho amin''ny tany, Izay mampaniry ahitra ny tendrombohitra,'
mg1865::mg_19::147::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manome hanina ho an''ny biby Izy Sy ho an''ny zana-goaika izay mitaraina.'
mg1865::mg_19::147::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy ny herin''ny soavaly no mahafinaritra Azy, Ary tsy ny tongotry ny olona no sitrany.'
mg1865::mg_19::147::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah mankasitraka izay matahotra Azy, Dia izay manantena ny famindram-pony.'
mg1865::mg_19::147::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mankalazà an''i Jehovah, ry Jerosalema o; Miderà an''Andriamanitrao, ry Ziona o.'
mg1865::mg_19::147::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manamafy ny hidim-bavahadinao Izy, Sady mitahy ny zanakao eo afovoanao.'
mg1865::mg_19::147::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatonga ny faritaninao ho fiadanana Izy; Vokisany vary tsara indrindra ianao.'
mg1865::mg_19::147::15:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampandeha ny didiny ho amin''ny tany Izy; Miely faingana dia faingana ny teniny.'
mg1865::mg_19::147::16:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandatsaka oram-panala tahaka ny landihazo* Izy; Mampiely fanala tahaka ny lavenona Izy. [*Hebreo: volon''ondry]'
mg1865::mg_19::147::17:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandatsaka ny havandrany ta-haka ny sombintsombin-javatra Izy; Iza no maharitra ny hatsiakany?'
mg1865::mg_19::147::18:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamoaka ny teniny Izy ka mampiempo ireny; Mampifofofofo ny rivony Izy, dia mandriaka ny rano.'
mg1865::mg_19::147::19:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milaza ny teniny amin''i Jakoba Izy Ary ny didiny sy ny fitsipiny amin''Isiraely.'
mg1865::mg_19::147::20:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 147
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nanao toy izany tamin''izay firenena hafa Izy; Ary ny fitsipiny tsy mba fantatr''ireny. Haleloia.'
mg1865::mg_19::148::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiantsoana izao rehetra izao hidera an''Andriamanitra'
  verse_text: 'Haleloia. Miderà an''i Jehovah, ry any an-danitra; Miderà Azy any ambony.'
mg1865::mg_19::148::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà Azy, ry anjeliny rehetra; Miderà Azy, ry miaramilany rehetra.'
mg1865::mg_19::148::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà Azy, ry masoandro amam-bolana; Miderà Azy, ry kintana mazava rehetra.'
mg1865::mg_19::148::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà Azy, ry lanitry ny lanitra, Ary ianareo rano ambonin''ny lanitra.'
mg1865::mg_19::148::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera ny anaran''i Jehovah ireo; Fa Izy no nandidy, dia ary ireo.'
mg1865::mg_19::148::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nampitoetra ireo ho mandrakizay doria Izy; Nomen-dalàna ireo ka tsy mba mihoatra.'
mg1865::mg_19::148::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midera an''i Jehovah ety an-tany, Ianareo dragona sy ianareo rano lalina rehetra,'
mg1865::mg_19::148::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny afo sy ny havandra, ny oram-panala sy ny zavona, Ny rivotra mahery izay mankatò ny teniny,'
mg1865::mg_19::148::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tendrombohitra sy ny havoana rehetra, Ny hazo fihinam-boa sy ny sedera rehetra,'
mg1865::mg_19::148::10:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny bibi-dia sy ny biby fiompy rehetra, Ny biby mandady na mikisaka ary ny voro-manidina,'
mg1865::mg_19::148::11:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanjaka amin''ny tany sy ny vahoaka rehetra, Ny mpanapaka sy ny mpitsara rehetra amin''ny tany,'
mg1865::mg_19::148::12:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny zatovolahy, na ny zatovovavy, Na ny antitra, na ny tanora,'
mg1865::mg_19::148::13:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Samia midera ny anaran''i Jehovah avokoa, Fa ny anarany ihany no misandratra; Ambonin''ny tany sy ny lanitra ny voninahiny.'
mg1865::mg_19::148::14:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 148
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary manandratra tandroka ho an''ny olony Izy, Dia fiderana ho an''ny olony masina rehetra, Eny, ho an''ny Zanak''Isiraely, firenena akaiky Azy. Haleloia.'
mg1865::mg_19::149::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Haleloia ho an''i Jehovah, Izay aherezan''ny olony'
  verse_text: 'Haleloia. Mihirà fihiram-baovao ho an''i Jehovah, Ny fiderana Azy eo amin''ny fiangonan''ny olona masina.'
mg1865::mg_19::149::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny Isiraely hifaly amin''ny Mpanao azy; Aoka ho finaritra amin''ny Mpanjakany ny zanak''i Ziona.'
mg1865::mg_19::149::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hidera ny anarany amin''ny dihy izy Sy hankalaza Azy amin''ny ampongatapaka sy ny lokanga.'
mg1865::mg_19::149::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sitrak''i Jehovah ny olony; Ravahany famonjena ny mpandefitra.'
mg1865::mg_19::149::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny olona masina hifaly amin''ny voninahitra; Aoka hihoby tsara eo am-pandriany izy.'
mg1865::mg_19::149::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka hisy fanandratana an''Andriamanitra eo am-bavany Sy sabatra roa lela eny an-tanany,'
mg1865::mg_19::149::7:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamaliany ny Jentilisa Sy hamaizany ny firenena maro,'
mg1865::mg_19::149::8:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hamatorany ireo mpanjakany amin''ny gadra, Sy ny olo-malazany amin''ny gadra vy.'
mg1865::mg_19::149::9:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 149
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hanaovany ny fitsarana voasoratra: Voninahitry ny olony masina rehetra Izany. Haleloia.'
mg1865::mg_19::150::1:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 150
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Haleloia farany'
  verse_text: 'Haleloia. Miderà an''Andriamanitra eo amin''ny fitoerany masina. Miderà Azy eo amin''ny habakabaky ny heriny.'
mg1865::mg_19::150::2:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 150
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midera Azy noho ny asany lehibe; Miderà Azy araka ny haben''ny voninahiny.'
mg1865::mg_19::150::3:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 150
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà Azy amin''ny fitsofana ny anjomara; Miderà Azy amin''ny valiha sy ny lokanga.'
mg1865::mg_19::150::4:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 150
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà Azy amin''ny ampongatapaka sy ny dihy; Miderà Azy amin''ny zava-maneno tendrena sy ny sodina.'
mg1865::mg_19::150::5:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 150
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miderà Azy amin''ny kipantsona maneno; Miderà Azy amin''ny kipantsona tsara feo.'
mg1865::mg_19::150::6:
  verse_version: mg1865
  verse_book: mg_19
  verse_chapter: 150
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izay rehetra manam-pofonaina samy hidera an''i Jehovah. Haleloia.'
