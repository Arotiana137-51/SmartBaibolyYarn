mg1865::mg_48::1::1:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: Fiarahabana
  verse_text: 'Paoly Apostoly — tsy avy tamin''olona, na tamin''ny alalan''olona, fa tamin''ny alalan''i Jesoa Kristy sy Andriamanitra Ray, Izay nanangana Azy tamin''ny maty -'
mg1865::mg_48::1::2:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mbamin''ny rahalahy rehetra izay ato amiko, mamangy ny fiangonana* aty Galatia: [*Grika: eklesia]'
mg1865::mg_48::1::3:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Ray sy Jesoa Kristy Tompontsika,'
mg1865::mg_48::1::4:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nanolotra ny tenany noho ny fahotantsika, hanafahany antsika amin''izao miara-belona ratsy fanahy izao*, araka ny sitrapon''Andriamanitra Raintsika; [*Na: izao andro ratsy izao]'
mg1865::mg_48::1::5:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena.'
mg1865::mg_48::1::6:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: 'Fananarana ny Galatiana noho ny fivadibadihany, sy ny fanambarana ny mah''Apostoly an''i Paoly'
  verse_text: 'Gaga aho, raha mifindra faingana toy izao ianareo hiala amin''izay efa niantso anareo tamin''ny fahasoavan''i Kristy ho amin''ny filazantsara hafa,'
mg1865::mg_48::1::7:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay tsy filazantsara akory*, fa saingy misy ny sasany mampitabataba anareo ka ta-hamadika ny filazantsaran''i Kristy. [*Grika: anankiray koa]'
mg1865::mg_48::1::8:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na izahay, na anjely avy any an-danitra aza, no mitory filazantsara hafa aminareo afa-tsy* izay efa notorinay taminareo, aoka ho voaozona** izy. [*Na: manohitra] [** Grika: anatema]'
mg1865::mg_48::1::9:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Araka ny voalazanay fahiny no lazaiko indray ankehitriny: Raha misy olona mitory filazantsara hafa aminareo, afa-tsy izay efa noraisinareo, aoka ho voaozona* izy, [*Grika: anatema]'
mg1865::mg_48::1::10:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny, olona va no ilako fitia, sa Andriamanitra? Sa mila sitraka amin''olona aho? Raha mbola mila sitraka amin''olona aho, dia tsy mpanompon''i Kristy.'
mg1865::mg_48::1::11:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ampahafantariko anareo, ry rahalahy, ny amin''ny filazantsara izay notoriko, fa tsy araka ny fanaon''ny olona izany.'
mg1865::mg_48::1::12:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho tsy nandray azy tamin''olona, ary tsy mba nampianarina aho, fa tamin''ny fanambaran''i Jesoa Kristy ihany.'
mg1865::mg_48::1::13:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa renareo ny toetro fahiny tamin''ny fivavahan''ny Jiosy, fa nanenjika ny fiangonan*''Andriamanitra efa izay tsy izy aho ka nandrava azy; [*Grika: eklesia]'
mg1865::mg_48::1::14:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nandroso tamin''ny fivavahan''ny Jiosy mihoatra noho ny maro izay indray mihira amiko eo amin''ny fireneko aho ka fatra-pitana ny fampianarana voatolotry ny razako indrindra.'
mg1865::mg_48::1::15:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha sitrak''Andriamanitra, Izay nanokana ahy hatrany an-kibon''ineny ny niantso ahy tamin''ny fahasoavany,'
mg1865::mg_48::1::16:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny nampiseho ny Zanany tato anatiko, mba hitoriako Azy any amin''ny jentilisa, niaraka tamin''izay dia tsy naka saina tamin''ny nofo aman-drà aho,'
mg1865::mg_48::1::17:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy niakatra tany Jerosalema ho any amin''izay Apostoly talohako aho, fa lasa nankany Arabia, dia niverina ho any Damaskosy indray.'
mg1865::mg_48::1::18:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa afaka telo taona, dia niakatra tany Jerosalema hamangy an''i Kefasy aho ka nitoetra tao aminy dimy ambin''ny folo andro.'
mg1865::mg_48::1::19:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ny Apostoly sasany dia tsy nisy hitako afa-tsy Jakoba*, rahalahin''ny Tompo. [*Na: fa Jakoba kosa]'
mg1865::mg_48::1::20:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay zavatra soratako aminareo, indro, eo anatrehan''Andriamanitra fa tsy mandainga aho.'
mg1865::mg_48::1::21:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rehefa afaka izany, dia tonga tany amin''ny tany Syria sy Kilikia aho;'
mg1865::mg_48::1::22:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy mbola fantatry ny fiangonana* any Jodia, izay ao amin''i Kristy, ny tarehiko. [*Grika: eklesia]'
mg1865::mg_48::1::23:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nandre ihany izy hoe: Ilay mpanenjika antsika fahiny, indro izy ankehitriny mitory ny finoana izay noravany fahiny .'
mg1865::mg_48::1::24:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia nankalazany an''Andriamanitra aho.'
mg1865::mg_48::2::1:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony afaka efatra ambin''ny folo taona, dia niakatra tany Jerosalema indray izaho sy Barnabasy, ary Titosy dia nentiko niaraka tamiko koa.'
mg1865::mg_48::2::2:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niakatra araka ny fanambarana aho, ka nambarako taminy ny filazantsara izay toriko any amin''ny jentilisa, nefa nangingina ihany tamin''izay manan-daza, fandrao ho mihazakazaka foana aho, na efa nihazakazaka foana.'
mg1865::mg_48::2::3:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa na dia Titosy izay niaraka tamiko aza, dia tsy mba noterena hoforana, na dia Grika aza izy,'
mg1865::mg_48::2::4:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia noho ny rahalahy sandoka nampidirina misokosoko, izay niditra mangingina hisafo ny fahafahantsika, izay ananantsika ao amin''i Kristy Jesoa, mba hanandevozany antsika;'
mg1865::mg_48::2::5:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tsy nety nikoy ireo izahay na dia ora iray monja aza, mba hitoeran''ny fahamarinan''ny filazantsara aminareo.'
mg1865::mg_48::2::6:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny olona atao ho manan-daza (na nanao ahoana na nanao ahoana izy dia tsy mampaninona ahy; Andriamanitra tsy mizaha tavan''olona), izaho tsy nomen''ireo manan-daza ireo saina na tamin''inona na tamin''inona.'
mg1865::mg_48::2::7:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hafa kosa no nataony, fa nony hitany fa notolorana ny filazantsara ho adidiko ho an''ny tsy voafora aho, tahaka an''i Petera ho an''ny voafora'
mg1865::mg_48::2::8:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa Izay niasa ho an''i Petera hah''Apostoly azy ho an''ny voafora no niasa ho ahy koa ho an''ny jentilisa),'
mg1865::mg_48::2::9:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nony fantatr''i Jakoba sy Kefasy ary Jaona, izay natao ho andry, ny fahasoavana nomena ahy, dia notolorany ny tanana ankavanan''ny fihavanana izaho sy Barnabasy, mba hankany amin''ny jentilisa izahay, fa izy kosa ho any amin''ny voafora.'
mg1865::mg_48::2::10:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao ihany no tiany, dia ny mba hahatsiarovanay ny malahelo, sady nahazoto ahy indrindra rahateo ny hanao izany.'
mg1865::mg_48::2::11:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga tany Antiokia Kefasy, dia nanohitra azy nifanatrika aho, satria hita fa nanan-tsiny izy.'
mg1865::mg_48::2::12:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony tsy mbola tonga ny sasany any tany amin''i Jakoba, dia niara-nihinana tamin''ny jentilisa ihany izy; fa nony tonga ireo, dia nihatakataka izy ka niala, satria natahotra ny momba ny famorana izy.'
mg1865::mg_48::2::13:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy sasany koa niara-nihatsaravelatsihy taminy, ka Barnabasy avy aza mba voataonan''ny fihatsaram-belatsihiny koa.'
mg1865::mg_48::2::14:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa hitako fa tsy nandeha mahitsy araka ny fahamarinan''ny filazantsara ireo, dia hoy izaho tamin''i Kefasy teo anatrehan''ny olona rehetra : Raha ianao izay tena Jiosy aza no manao tahaka ny fanaon''ny jentilisa, fa tsy tahaka ny fanaon''ny Jiosy, nahoana ny jentilisa no terenao hanao tahaka ny fanaon''ny Jiosy?'
mg1865::mg_48::2::15:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Taranaky ny Jiosy isika, fa tsy mba mpanota avy amin''ny jentilisa,'
mg1865::mg_48::2::16:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa nony fantatsika fa tsy hamarinina amin''ny asan''ny lalàna ny olona, fa amin''ny finoana an''i Jesoa Kristy, dia nino an''i Kristy koa isika mba hohamarinina amin''ny finoana an''i Kristy, fa tsy amin''ny asan''ny lalàna, satria tsy misy nofo hohamarinina amin''ny asan''ny lalàna.'
mg1865::mg_48::2::17:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mitady hohamarinina ao amin''i Kristy isika, nefa ny tenantsika no hita fa mpanota, moa mpanompo ny ota va Kristy? Sanatria izany!'
mg1865::mg_48::2::18:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha ny zavatra efa noravako no atsangako indray, dia mampiseho ny tenako fa diso aho.'
mg1865::mg_48::2::19:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha izaho, dia tamin''ny lalàna no nahafatesako ny amin''ny lalàna, mba ho velona ho an''Andriamanitra aho.'
mg1865::mg_48::2::20:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Voahombo miaraka amin''i Kristy amin''ny hazo fijaliana aho, ary tsy izaho intsony no velona, fa Kristy no velona ato anatiko; fa izay ivelomako ankehitriny eo amin''ny nofo dia ivelomako amin''ny finoana ny Zanak''Andriamanitra, Izay efa tia ahy ka nanolotra ny tenany hamonjy ahy.'
mg1865::mg_48::2::21:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mahafoana ny fahasoavan''Andriamanitra aho; fa raha avy amin''ny lalàna ny fahamarinana, dia maty foana Kristy.'
mg1865::mg_48::3::1:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny famonjena sy ny fahafahan''ny mino an''i Kristy ampitahaina amin''ny fahamelohana sy ny fahandevozan''izay miankina amin''ny lalàna'
  verse_text: 'Ry Galatiana adala, iza no nanimba* anareo; kanefa teo imasonareo indrindra no nanehoana marimarina an''i Jesoa Kristy voahombo tamin''ny hazo fijaliana? [*Grika: mamosavy]'
mg1865::mg_48::3::2:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao ihany no tiako holazainareo amiko: Moa ny asan''ny lalàna va no nandraisanareo ny Fanahy, sa ny fitoriana ny finoana*? [*Na: fandrenesana amin''ny finoana]'
mg1865::mg_48::3::3:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Adala toy izany va ianareo? Rehefa nanomboka tamin''ny Fanahy ianareo, dia hahatanteraka amin''ny nofo va ankehitriny?'
mg1865::mg_48::3::4:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa izany zavatra be izany dia efa niaretanareo foana, raha dia foana tokoa izany?'
mg1865::mg_48::3::5:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izay manome anareo ny Fanahy sy mahavita asa lehibe eo aminareo, moa avy amin''ny asan''ny lalàna va izany, sa avy amin''ny fitoriana ny finoana*? [*Na: fandrenesana amin''ny finoana]'
mg1865::mg_48::3::6:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka an''i Abrahama nino an''Andriamanitra, ka dia nasaina ho fahamarinany izany (Genesisy 15:6).'
mg1865::mg_48::3::7:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa fantaro fa izay amin''ny finoana no zanak''i Abrahama.'
mg1865::mg_48::3::8:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria hitan''ny Soratra Masina rahateo fa amin''ny finoana no anamarinan''Andriamanitra ny jentilisa, dia nitory ny filazantsara tamin''i Abrahama rahateo izy, nanao hoe: Aminao no hitahiana ny firenena rehetra (Genesisy 12:3)'
mg1865::mg_48::3::9:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia izay amin''ny finoana notahina mbamin''i Abrahama mpino.'
mg1865::mg_48::3::10:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay rehetra amin''ny asan''ny lalàna dia eo ambanin''ny fanozonana; fa voasoratra hoe: Voaozona izay rehetra tsy maharitra mankatò ny zavatra rehetra voasoratra ao amin''ny bokin''ny lalàna (Deoteronomia 27:26).'
mg1865::mg_48::3::11:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hita marimarina fa amin''ny lalàna dia tsy misy olona hamarinina eo anatrehan''Andriamanitra ; fa ny marina amin''ny finoana no ho velona* (Habakoka 2:4). [*Na: ny marina ho velon''ny finoana]'
mg1865::mg_48::3::12:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny lalàna tsy araka ny finoana; fa izay mahatandrina izany no ho velona aminy (Levitikosy 18:5).'
mg1865::mg_48::3::13:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kristy nanavotra anay tamin''ny ozon''ny lalàna, satria tonga voaozona hamonjy anay Izy; fa voasoratra hoe : Voaozona izay rehetra mihantona amin''ny hazo (Deoteronomia 21:23),'
mg1865::mg_48::3::14:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho tonga amin''ny jentilisa ny fitahiana an''i Abrahama ao amin''i Kristy Jesoa, ary mba horaisintsika amin''ny finoana ny teny fikasana ny amin''ny Fanahy.'
mg1865::mg_48::3::15:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy — miteny araka ny fanaon''ny olona aho — na dia ny fanekena* ataon''olona ihany aza, rehefa vita mafy, dia tsy fanao ny manatsoaka na manampy izany. [*Na: didim-pananana]'
mg1865::mg_48::3::16:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''i Abrahama sy ny taranany no nilazana ny teny fikasana. Tsy lazainy hoe: Ary ho an''ny taranaka, toy ny milaza ny maro; fa toy ny milaza ny anankiray, ary ho an''ny taranakao (Genesisy 22:18), dia Kristy izany.'
mg1865::mg_48::3::17:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no lazaiko: Ny fanekena izay nataon''Andriamanitra mafy fahiny dia tsy tsoahan''ny lalàna, izay vao natao telo-polo amby efa-jato taona tato aoriana, hahafoana ny teny fikasana.'
mg1865::mg_48::3::18:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha avy amin''ny lalàna ny lova, dia tsy avy amin''ny teny fikasana intsony; nefa tamin''i Abrahama dia teny fikasana no nanomezan''Andriamanitra azy.'
mg1865::mg_48::3::19:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona ary ny lalàna ? Nanampy noho ny fahadisoana izy ambara-pihavin''ny taranaka izay nomena ny teny fikasana; ary nalahatr''anjely teo an-tanan''ny mpanalalana izany.'
mg1865::mg_48::3::20:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanalalana dia tsy an''ny irery, fa Andriamanitra dia iray ihany.'
mg1865::mg_48::3::21:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka moa manohitra ny teny fikasan''Andriamanitra va ny lalàna? Sanatria izany! Fa raha nisy lalàna mahavelona nomena, dia avy tamin''ny lalàna tokoa ny fahamarinana'
mg1865::mg_48::3::22:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Soratra Masina efa nanidy azy rehetra teo amin''ny fahotana, mba homena ny mino ny teny fikasana noho ny finoana an i Jesoa Kristy.'
mg1865::mg_48::3::23:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony tsy mbola tonga ny finoana, dia voambina tao ambanin''ny lalàna isika ka voahidy ho amin''ny finoana izay efa haseho ato aoriana.'
mg1865::mg_48::3::24:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny lalàna dia mpitaiza antsika ho amin''i Kristy, mba hohamarinina noho ny finoana isika.'
mg1865::mg_48::3::25:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa rehefa tonga ny finoana, dia tsy fehezin''izay mpitaiza intsony isika.'
mg1865::mg_48::3::26:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo rehetra dia zanak''Andriamanitra amin''ny finoana an''i Kristy Jesoa.'
mg1865::mg_48::3::27:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na iza na iza ianareo no natao batisa ho an''i Kristy dia nitafy an''i Kristy.'
mg1865::mg_48::3::28:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy misy intsony na Jiosy na Grika, na andevo na tsy andevo, na lahy sy vavy; fa iray ihany ianareo rehetra ao amin''i Kristy Jesoa.'
mg1865::mg_48::3::29:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 3
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha an''i Kristy ianareo, dia taranak''i Abrahama sy mpandova araka ny teny fikasana.'
mg1865::mg_48::4::1:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy izaho: Raha mbola zaza ny mpandova, dia tsy hafa noho ny andevo izy, na dia tompon''ny zavatra rehetra aza;'
mg1865::mg_48::4::2:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fehezin''izay mpitondra sy mpitaiza azy izy mandra-pahatongan''ny fetr''andro voatendrin''ny rainy.'
mg1865::mg_48::4::3:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa isika, fony mbola zaza, dia nandevozin''ny abidim-pianaran''izao tontolo izao;'
mg1865::mg_48::4::4:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa rehefa tonga ny fotoan''andro, dia nirahin''Andriamanitra ny Zanany, nateraky ny vehivavy, nateraka tao ambanin''ny lalàna,'
mg1865::mg_48::4::5:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'hanavotany izay ambanin''ny lalàna, mba handraisantsika ny fananganan''anaka.'
mg1865::mg_48::4::6:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria zanaka ianareo, dia nirahin''Andriamanitra ho ato am-pontsika ny Fanahin''ny Zanany, miantso hoe: Aba, Ray o.'
mg1865::mg_48::4::7:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia tsy mpanompo intsony ianao, fa zanaka: ary raha zanaka, dia mpandova koa noho ny ataon''Andriamanitra.'
mg1865::mg_48::4::8:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tamin''izany, fony mbola tsy nahalala an''Andriamanitra ianareo, dia nanompo izay andriamani-tsy izy;'
mg1865::mg_48::4::9:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ankehitriny, rehefa mahalala an''Andriamanitra ianareo — nefa tsy izany, fa Izy no mahalala anareo — nahoana ianareo no dia miverina indray ho amin''ny abidim-pianarana malemy sady tsy misy na inona na inona, nefa tianareo hotompoina indray?'
mg1865::mg_48::4::10:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andro sy volana sy fotoana ary taona no tandremanareo fatratra.'
mg1865::mg_48::4::11:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Matahotra ny aminareo aho, fandrao dia nisasatra foana taminareo.'
mg1865::mg_48::4::12:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, mangataka aminareo aho, aoka ho tonga tahaka ahy ianareo, fa izaho kosa mba efa tonga tahaka anareo. Tsy naninona ahy akory ianareo;'
mg1865::mg_48::4::13:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'nefa fantatrareo fa noho ny fahalemen''ny nofo no nitoriako ny filazantsara taminareo tamin''ilay voalohany;'
mg1865::mg_48::4::14:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny teo amin''ny nofoko izay tonga fakam-panahy anareo dia tsy mba nohamavoinareo na nolavinareo; fa nandray ahy tahaka ny mandray anjelin''Andriamanitra ianareo, eny, dia tahaka an''i Kristy Jesoa aza.'
mg1865::mg_48::4::15:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ary ilay nataonareo ho fahasambarana? Fa vavolombelonareo aho fa raha azo atao, na dia ny masonareo aza dia ho nesorinareo ka nomenareo ahy.'
mg1865::mg_48::4::16:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa efa tonga fahavalonareo va aho, satria milaza ny marina aminareo?'
mg1865::mg_48::4::17:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mazoto mila fitia aminareo izy ireo, nefa tsy araka ny mety; fa izy ta-hanidy anareo any ivelany, mba hampahazoto anareo hila fitia aminy kosa.'
mg1865::mg_48::4::18:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsara raha ilam-pitia amin''ny tsara mandrakariva, na dia sendra tsy eo aminareo aza aho.'
mg1865::mg_48::4::19:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, izay aharariako indray amin''ny fiterahana mandra-paharin''i Kristy ao anatinareo,'
mg1865::mg_48::4::20:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'enga anie ka ho tonga eo aminareo aho ankehitriny ka hanova ny feoko; fa misalasala aho ny aminareo.'
mg1865::mg_48::4::21:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Milazà amiko, ianareo izay te-ho ambanin''ny lalàna: tsy renareo va ny lalàna?'
mg1865::mg_48::4::22:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa voasoratra hoe: Abrahama nanana zanaka roa lahy, ny anankiray tamin''ny andevovavy, ary ny anankiray tamin''ny tsy andevo.'
mg1865::mg_48::4::23:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa ilay tamin''ny andevovavy dia nateraka araka ny nofo; fa ilay tamin''ny tsy andevo kosa dia nateraka tamin''ny teny fikasana.'
mg1865::mg_48::4::24:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany dia azo atao fanoharana; fa izy roa vavy ireo dia fanekena roa; ny anankiray avy tamin''ny tendrombohitra Sinay ka miteraka ho amin''ny fahandevozana, dia Hagara izany.'
mg1865::mg_48::4::25:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary* ny hoe Hagara dia ny tendrombohitra Sinay any Arabia ka mifamaly amin''i Jerosalema ankehitriny; fa andevo izy mbamin''ny zanany. [*Na: (Fa)]'
mg1865::mg_48::4::26:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jerosalema any ambony kosa, izay renintsika, dia tsy mba andevo.'
mg1865::mg_48::4::27:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa voasoratra hoe: Mifalia, ramomba, izay tsy miteraka; Miantsoa sy minanananà, ianao izay tsy mbola mihetsi-jaza; Fa ny zanaky ny mpitondratena dia maro noho ny an''ny manana-bady (Isaia 54:1).'
mg1865::mg_48::4::28:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika, ry rahalahy, dia zanaky ny teny fikasana tahaka an''isaka.'
mg1865::mg_48::4::29:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa tahaka ny tamin''izany andro izany, ilay teraka araka ny nofo dia nanenjika ilay araka ny Fanahy, dia tahaka izany koa ankehitriny.'
mg1865::mg_48::4::30:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa ahoana no lazain''ny Soratra Masina? Roahy io andevo-vavy io sy ny zananilahy; fa ny zanaky ny andevo tsy hiray lova amin''ny zanaky ny tsy andevo (Genesisy 21:10).'
mg1865::mg_48::4::31:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, ry rahalahy, tsy zanak''andevovavy isika, fa zanaky ny tsy andevo.'
mg1865::mg_48::5::1:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny fahafahana no nanafahan''i Kristy antsika; ka tomoera tsara, fa aza mety hohazonin''ny zioga fanandevozana intsony.'
mg1865::mg_48::5::2:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Famporisihana ny Galatiana tsy hahavery ny fahafahany, fa hazoto handroso amin''ny fitondran-tena tsara'
  verse_text: 'Indro, izaho Paoly milaza aminareo fa raha mety hoforana ianareo, dia tsy hahasoa anareo na dia kely akory aza Kristy.'
mg1865::mg_48::5::3:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary lazaiko marina indray amin''ny olona manaiky hoforana rehetra fa mpitrosa tsy maintsy mankatò ny lalàna rehetra izy.'
mg1865::mg_48::5::4:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tafasaraka amin''i Kristy ianareo na iza na iza izay mitady hohamarinina amin''ny lalàna; efa lavo niala tamin''ny fahasoavana ianareo.'
mg1865::mg_48::5::5:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay amin''ny Fanahy sy noho ny finoana dia miandry ny fanantenana* ny fahamarinana. [*Na: fanantenan'']'
mg1865::mg_48::5::6:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao amin''i Kristy Jesoa dia tsy mahasoa na ny famorana na ny tsy famorana, fa ny finoana izay miasa amin''ny fitiavana.'
mg1865::mg_48::5::7:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo nihazakazaka tsara, iza no nisakana anareo tsy hanaiky ny marina?'
mg1865::mg_48::5::8:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany fitaomana izany dia tsy avy tamin''ilay miantso anareo.'
mg1865::mg_48::5::9:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny masirasira kely dia mahatonga ny vongana rehetra ho masirasira avokoa.'
mg1865::mg_48::5::10:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho matoky anareo ao amin''ny Tompo fa tsy hisaina zavatra hafa akory ianareo; fa ilay mampitabataba anareo no hiharan''ny fanamelohana, na zovy na zovy izy.'
mg1865::mg_48::5::11:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izaho, ry rahalahy, raha mbola mitory ny famorana ihany, nahoana aho no mbola enjehina? Dia afaka tokoa ny fahatafintohinana noho ny hazo fijaliana.'
mg1865::mg_48::5::12:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Enga anie ka hiesotra* aza izay mampitabataba anareo. [*Na: hanakilema tena]'
mg1865::mg_48::5::13:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa nantsoina ho amin''ny fahafahana ianareo, ry rahalahy; kanefa aoka tsy ho entinareo hanaraka ny nofo izany fahafahana izany, fa mifampanompoa amin''ny fitiavana.'
mg1865::mg_48::5::14:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tanteraka amin''ny teny iray ihany ny lalàna rehetra, dia izao: Tiava ny namanao tahaka ny tenanao (Levitikosy 19:18).'
mg1865::mg_48::5::15:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha mifandramatra sy mifampihinana ianareo, tandremo fandrao mifandringana.'
mg1865::mg_48::5::16:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy izaho: Mandehana araka ny Fanahy, dia tsy hahatanteraka ny filan''ny nofo ianareo.'
mg1865::mg_48::5::17:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny nofo manohitra ny Fanahy, ary ny Fanahy manohitra ny nofo; ary mifanohitra izy roroa, mba tsy hahazoanareo manao izay zavatra tianareo.'
mg1865::mg_48::5::18:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha tarihin''ny Fanahy ianareo, dia tsy mba ambanin''ny lalàna.'
mg1865::mg_48::5::19:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miharihary ny asan''ny nofo, dia izao: Fijangajangana, fahalotoana, fijejojejoana,'
mg1865::mg_48::5::20:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'fanompoan-tsampy, fanaovana ody ratsy, fandrafiana, fifandirana, adi-lahy, fiafonafonana, fifampiandaniana, fisarahana, fitokoana,'
mg1865::mg_48::5::21:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'fialonana, fahamamoana, filalaovan-dratsy, ary ny toy izany, izay lazaiko aminareo rahateo, tahaka ny voalazako fahiny koa, fa izay manao izany dia tsy handova ny fanjakan''Andriamanitra.'
mg1865::mg_48::5::22:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vokatry ny Fanahy kosa dia fitiavana, fifaliana, fiadanana, fahari-po fahamoram-panahy, fanaovan-tsoa, fahamarinana,'
mg1865::mg_48::5::23:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fahalemem-panahy, fahononam-po; tsy misy lalàna manohitra izany.'
mg1865::mg_48::5::24:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay an''i Kristy Jesoa dia efa nanombo ny nofony mbamin''ny faniriany sy ny filany tamin''ny hazo fijaliana.'
mg1865::mg_48::5::25:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha velon''ny Fanahy isika, dia aoka handeha araka ny Fanahy.'
mg1865::mg_48::5::26:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka isika tsy handrani-tena foana ka hifampihaika sy hifampialona.'
mg1865::mg_48::6::1:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, raha misy olona azon''ny ota tsy nahy aza*, dia atsanganonareo izay manana ny Fanahy amin''ny fahamorana izy, ka mihevera ny tenanao, fandrao ianao koa mba halaim-panahy ihany. [*Na: azo olan-tanana amin''izay fahadisoana aza]'
mg1865::mg_48::6::2:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifampitondrà izay mahavesatra, ary aoka izany no hahatanterahanareo ny lalàn''i Kristy.'
mg1865::mg_48::6::3:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy manao ny tenany ho zavatra, kanjo tsinontsinona, dia mamitaka ny tenany izy.'
mg1865::mg_48::6::4:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa aoka ny olona rehetra samy hizaha toetra ny asany avy, dia samy hanana hafaliana ny amin''ny tenany ihany izy, fa tsy ny amin''ny olon-kafa;'
mg1865::mg_48::6::5:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa samy hitondra ny entany avy ny olona rehetra.'
mg1865::mg_48::6::6:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izay ampianarina ny teny mba hahafoy zava-tsoa ho an''izay mampianatra.'
mg1865::mg_48::6::7:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety hofitahina ianareo; Andriamanitra tsy azo vazivazina, fa izay afafin''ny olona no hojinjany.'
mg1865::mg_48::6::8:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay mamafy ho an''ny nofony dia hijinja fahasimbana avy amin''ny nofo; ary izay mamafy ho an''ny Fanahy dia hijinja fiainana mandrakizay avy amin''ny Fanahy.'
mg1865::mg_48::6::9:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mba ketraka amin''ny fanaovan-tsoa isika; fa amin''ny fotoan''andro no hijinjantsika, raha tsy reraka isika.'
mg1865::mg_48::6::10:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa araka ny ananantsika andro hanaovana, dia aoka isika hanao soa amin''ny olona rehetra, indrindra fa amin''ny mpianakavin''ny finoana.'
mg1865::mg_48::6::11:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Anatra farany'
  verse_text: 'Indro ny havaventin''ny soratra izay soratan''ny tanako ho aminareo.'
mg1865::mg_48::6::12:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na iza na iza te-hiseho ho tsara amin''ny nofo, dia ireo no manery anareo hoforana, nefa noho izao ihany : fandrao henjehina noho ny hazo fijalian''i Kristy izy.'
mg1865::mg_48::6::13:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia ny tenan''izy voafora aza dia tsy mitandrina ny lalàna; kanefa tiany ho forana koa ianareo, mba hireharehany amin''ny nofonareo.'
mg1865::mg_48::6::14:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa sanatria raha mba misy hataoko rehareha afa-tsy ny hazo fijalian''i Jesoa Kristy Tompontsika, Izay* nahavoahombo izao tontolo izao tamin''ny hazo fijaliana, raha ny amiko, ary izaho kosa, raha ny amin''izao tontolo izao. [*Na: izay]'
mg1865::mg_48::6::15:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy tsy mahasoa na ny famorana na ny tsy famorana, fa ny ho olom-baovao.'
mg1865::mg_48::6::16:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra mandeha araka ity fitsipika ity, dia ho aminy anie ny fiadanana sy ny famindram-po, ary ho amin''ny Isiraelin''Andriamanitra.'
mg1865::mg_48::6::17:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izao sisa izao aoka tsy hisy hanahirana ahy intsony; fa izaho mitondra ny marik''i Jesoa voatomboka eo amin''ny tenako.'
mg1865::mg_48::6::18:
  verse_version: mg1865
  verse_book: mg_48
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny fanahinareo anie, ry rahalahy, ny fahasoavan''i Jesoa Kristy Tompontsika. Amena.'
