mg1865::mg_53::1::1:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny hafalian''i Paoly noho ny faharetan''ny Kristiana tao Tesalonika sy ny finoany ary ny fitiavany'
  verse_text: 'Paoly sy Silasy ary Timoty mamangy ny fiangonan''ny Tesaloniana, izay ao amin''Andriamanitra Raintsika sy Jesoa Kristy Tompo:'
mg1865::mg_53::1::2:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Ray sy Jesoa Kristy Tompo.'
mg1865::mg_53::1::3:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: '2022-10-13T07:23:37+0000'
  verse_title: null
  verse_text: 'Tsy maintsy misaotra an''Andriamanitra mandrakariva izahay noho ny aminareo. ry rahalahy, fa mahamendrika izany, satria mitombo fatratra ny finoanareo, ary be ny fifankatiavanareo rehetra,'
mg1865::mg_53::1::4:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka reharehan''ny tenanay ianareo eny amin''ny fiangonan*''Andriamanitra noho ny faharetanareo sy ny finoanareo amin''ny fanenjehana rehetra izay manjo anareo sy ny fahoriana izay iaretanareo [*Grika: eklesia]'
mg1865::mg_53::1::5:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'famantarana ny fitsarana marin''Andriamanitra izany — mba hatao ho miendrika ny fanjakan''Andriamanitra ianareo, sady izany koa no iaretanareo'
mg1865::mg_53::1::6:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa zavatra marina amin''Andriamanitra ny hamaly fahoriana izay mampahory anareo,'
mg1865::mg_53::1::7:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hanome fitsaharana anareo izay ampahorina kosa mbamin''ny tenanay, raha hiseho Jesoa Tompo, avy any an-danitra mbamin''ny anjelin''ny heriny,'
mg1865::mg_53::1::8:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny afo midedadeda, hamaly izay tsy mahalala an''Andriamanitra sy izay tsy manaiky ny filazantsaran''i Jesoa Tompontsika,'
mg1865::mg_53::1::9:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona izay hiharan''ny famaliana marina dia fahaverezana mandrakizay avy amin''ny fanatrehan''ny Tompo sy ny voninahitry ny heriny,'
mg1865::mg_53::1::10:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha tonga Izy mba hankalazaina eo amin''ny olony masina sy higagana eo amin''izay rehetra mino amin''izany andro izany, satria ninoana ny fanambaranay taminareo.'
mg1865::mg_53::1::11:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany no angatahinay mandrakariva ny aminareo, mba hataon''Andriamanitsika ho miendrika ny fiantsoana ianareo, ary hotanterahiny amin''ny hery ny fankasitrahana tsara rehetra sy ny asan''ny finoana,'
mg1865::mg_53::1::12:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hankalazaina ao aminareo ny anaran''i Jesoa Tompontsika, ary ianareo ao aminy kosa, araka ny fahasoavan''Andriamanitsika sy Jesoa Kristy Tompo.'
mg1865::mg_53::2::1:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fanitsiana ny hadisoan-kevitry ny sasany ny amin''ny andron''ny Tompo'
  verse_text: 'Ary mangataka aminareo izahay, ry rahalahy, ny amin''ny fihavian''i Jesoa Kristy Tompontsika sy ny hanangonana antsika ho eo aminy,'
mg1865::mg_53::2::2:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy halaky hohetsiketsehina amin''ny saina na hampitahorina ianareo, na amin''ny fanahy, na amin''ny teny, na amin''ny epistily izay toa avy aminay, milaza fa efa miandoha ny andron''ny Tompo.'
mg1865::mg_53::2::3:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety hofitahin''olona akory ianareo; fa tsy ho avy izany, raha tsy efa tonga aloha ny fihemorana, ka hiseho ilay lehilahin''ota, dia ilay zanaky ny fahaverezana,'
mg1865::mg_53::2::4:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ilay manohitra ka manandra-tena ho ambony noho izay rehetra atao hoe Andriamanitra, na izay ivavahana, ka dia mipetraka eo amin''ny tempolin''Andriamanitra izy ka manao ny tenany ho Andriamanitra.'
mg1865::mg_53::2::5:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy tsaroanareo va fa fony mbola teo aminareo ihany aho, dia efa nilaza izany zavatra izany taminareo?'
mg1865::mg_53::2::6:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ankehitriny fantatrareo ny zavatra misakana, mba hampisehoana azy amin''ny fotoan''androny.'
mg1865::mg_53::2::7:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa miasa sahady ny zava-miafina, dia ny tsy fankatoavan-dalàna. kanefa mandra-panaisotra ilay misakana ankehitriny ihany*. [*Na: kanefa ao ihany ilay misakana mandra-panaisotra azy]'
mg1865::mg_53::2::8:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary dia haseho ilay tena mpandika lalàna, izay holevonin''i Jesoa Tompo* amin''ny fofonain''ny vavany ary hofoanany amin''ny fisehoan''ny fihaviany; [*Na:(holevonin''ny Tompo)]'
mg1865::mg_53::2::9:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny fihavin''ilehiny dia araka ny fiàsan''i Satana amin''ny hery sy ny famantarana sy ny fahagagana mandainga rehetra'
mg1865::mg_53::2::10:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny famitahana momba ny tsy fahamarinana amin''izay ho very, satria tsy nandray ny fitiavana ny fahamarinana izay hamonjena azy izy.'
mg1865::mg_53::2::11:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no ampanateran''Andriamanitra fiàsan''ny fahadisoan-kevitra aminy hinoany ny lainga,'
mg1865::mg_53::2::12:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hohelohina avokoa izay rehetra tsy nino ny marina, fa nankasitraka ny tsy marina.'
mg1865::mg_53::2::13:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Fananarana sy fanaovam-beloma'
  verse_text: 'Fa izahay tsy maintsy misaotra an''Andriamanitra mandrakariva ny aminareo, ry rahalahy malalan''ny Tompo, satria Andriamanitra efa nifidy anareo hatramin''ny voalohany hahazo famonjena amin''ny fanamasinan''ny Fanahy sy ny finoana ny marina,'
mg1865::mg_53::2::14:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady ho amin''izany koa no niantsoany anareo tamin''ny filazantsaranay hahazoanareo ny voninahitr''i Jesoa Kristy Tompontsika.'
mg1865::mg_53::2::15:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tomoera tsara, ry rahalahy, ka hazony ny fampianarana natolotra izay nampianarina anareo, na tamin''ny teninay, na tamin''ny epistilinay.'
mg1865::mg_53::2::16:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jesoa Kristy Tompontsika sy Andriamanitra Raintsika, Izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara amin''ny fahasoavana,'
mg1865::mg_53::2::17:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'no hampionona ny fonareo anie sy hampahery anareo amin''ny asa sy ny teny tsara rehetra.'
mg1865::mg_53::3::1:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Farany, ry rahalahy, mivavaha ho anay, mba handehanan''ny tenin''ny Tompo faingana ka hankalazaina toy ny eo aminareo,'
mg1865::mg_53::3::2:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hovonjena ho afaka amin''ny olona hafahafa sy ratsy fanahy izahay; fa tsy ary manana finoana avokoa ny olona rehetra.'
mg1865::mg_53::3::3:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahatoky ny Tompo, Izay hampahery sy hiaro anareo tsy ho azon''ny* ratsy. [*Na: Ilay]'
mg1865::mg_53::3::4:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izahay matoky anareo ao amin''ny Tompo, fa izay zavatra andidianay dia efa ataonareo sady mbola hataonareo ihany koa.'
mg1865::mg_53::3::5:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo anie hanitsy lalana ny fonareo ho amin''ny fitiavana an''Andriamanitra sy ho amin''ny faharetan''i Kristy.'
mg1865::mg_53::3::6:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mandidy anareo izahay, ry rahalahy, amin''ny anaran''i Jesoa Kristy Tompontsika, mba hialanareo amin''ny rahalahy rehetra izay tsy mitoetra tsara ka tsy manaraka ny fampianarana natolotra izay noraisiny taminay.'
mg1865::mg_53::3::7:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenanareo mahalala izay tokony hianaranareo anay; fa nitoetra tsara teo aminareo izahay,'
mg1865::mg_53::3::8:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nihinana foana izay hanin''olona, fa niasa andro aman''alina tamin''ny fikelezan''aina sy ny fisasarana mba tsy hahavaky tratra na dia iray akory aminareo aza;'
mg1865::mg_53::3::9:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy noho ny tsy anananay fahefana anefa, fa mba hatolotray aminareo ho fianaranareo ny tenanay.'
mg1865::mg_53::3::10:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony mbola teo aminareo ihany aza izahay, dia nandidy anareo hoe: Raha misy tsy mety miasa, dia aoka tsy hihinana izy.'
mg1865::mg_53::3::11:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa renay fa misy ny sasany eo aminareo tsy mitoetra tsara, ka tsy miasa akory, fa mivezivezy foana miraharaha ny an''olona.'
mg1865::mg_53::3::12:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay manao toy izany no didianay sy anarinay ao amin''i Jesoa Kristy Tompo mba hiasa tsara amin''ny fiadanana ka hihinana izay azy ihany.'
mg1865::mg_53::3::13:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo, ry rahalahy, aza ketraka amin''ny fanaovan-tsoa.'
mg1865::mg_53::3::14:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha misy olona tsy manaiky ny teninay amin''ity epistily ity, mariho izany olona izany, ka aza mikambana aminy, mba hahamenatra azy.'
mg1865::mg_53::3::15:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anefa aza dia atao fahavalo izy, fa anaro toy ny rahalahy.'
mg1865::mg_53::3::16:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompon''ny fiadanana anie hanome anareo fiadanana mandrakariva amin''ny zavatra rehetra. Ho aminareo rehetra anie ny Tompo.'
mg1865::mg_53::3::17:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ity no veloma ataon''ny tanako, izaho Paoly; izao no famantarana eo amin''ny epistily rehetra; izao no soratro.'
mg1865::mg_53::3::18:
  verse_version: mg1865
  verse_book: mg_53
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho aminareo rehetra anie ny fahasoavan''i Jesoa Kristy Tompontsika.'
