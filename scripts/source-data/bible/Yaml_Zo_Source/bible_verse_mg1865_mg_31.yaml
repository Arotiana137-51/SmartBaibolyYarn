mg1865::mg_31::1::1:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahitan''i Obadia ny amin''ny handravana an''i Edoma mbamin''ny jentilisa sasany noho ny ratsy nataony tamin''ny Isiraely, ary ny hampiorenana ny fanjakan''i Jehovah any Ziona'
  verse_text: 'Ny fahitan''i Obadia. Izao no lazain''i Jehovah Tompo ny amin''i Edoma: Nahare filazana avy tamin''i Jehovah izahay, Ary nisy iraka nalefa ho any amin''ny jentilisa hanao hoe: Mitsangàna, aoka isika hitsangana hanafika azy!'
mg1865::mg_31::1::2:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hataoko tsinontsinona eo amin''ny firenena ianao, Eny, ho fanazimbazimba indrindra ianao.'
mg1865::mg_31::1::3:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny avonavon''ny fonao no namitaka anao, Ry ilay monina ao an-tsefatsefaky ny harambato, Any amin''ny fonenana avo, Sady manao anakampo hoe: Iza no hampivarina ahy ho eny an-tany?'
mg1865::mg_31::1::4:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia miakatra tahaka ny voromahery aza ianao Ka mametraka ny akaninao eny amin''ny kintana, Dia havariko avy eny ianao, hoy Jehovah.'
mg1865::mg_31::1::5:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha, tahàny misy mpangalatra, na jiolahy alina, tonga ao aminao, (Indrisy, fongotra ianao!) Moa tsy izay hahafa-po azy ihany va no hangalariny ? Raha tahàny misy mpioty voaloboka tonga ao aminao, Moa tsy hamela voaloboka sisa hotsimponina va izy?'
mg1865::mg_31::1::6:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Endrey ny fitady ny an''i Esao! Endrey ny fikatsaka ny hareny miafina!'
mg1865::mg_31::1::7:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny olona rehetra izay vita fanekena taminao no nampandeha anao hatramin''ny sisin-tany; Izay tsara fihavanana aminao no namitaka ka naharesy anao; Izay mihinana ny haninao no namela-pandrika ao ambaninao Tsy misy fahalalana ao aminy!'
mg1865::mg_31::1::8:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Moa tsy amin''izany andro izany va, hoy Jehovah, no hamongorako ny olon-kendry ao Edoma, Sy ny manan-tsaina ao an-tendrombohitr''i Esao?'
mg1865::mg_31::1::9:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho raiki-tahotra ny lehilahy maherinao, ry Temana, Mba haringana amin''ny vonoana ho foana ny any an-tendrombohitr''i Esao.'
mg1865::mg_31::1::10:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny fampahoriana an''i Jakoba rahalahinao dia ho voasaron-kenatra ianao Ka ho fongotra mandrakizay.'
mg1865::mg_31::1::11:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ilay andro namitsahanao* teny am-pita, Tamin''ny andro namaboan''ny vahiny ny fananany, Sy nidiran''ny hafa firenena teo amin''ny vavahadiny, Ary nanaovany loka an''i Jerosalema, Dia mba toy ny anankiray tamin''ireny koa ianao. [*Hebreo: nijanonanao]'
mg1865::mg_31::1::12:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza finaritra mijery ny andron''ny rahalahinao amin''ny andro ahitany loza izay tsy misy toa izany; Ary aza mifaly ny amin''ny taranak''i Joda amin''ny andro andringanana azy; Ary aza manao teny miavonavona amin''ny andro fahoriana'
mg1865::mg_31::1::13:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza miditra amin''ny vavahadin''ny oloko amin''ny andro ahitany loza; Aza finaritra mijery ny fahantrany amin''ny andro ahitany loza ianao, Ary aza maninji-tàna haka ny fananany amin''ny andro ahitany loza'
mg1865::mg_31::1::14:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamitsaka* eo amin''ny sampanan-dàlana hamono izay afa-nandositra ianao; Ary aza manolotra izay sisa aminy amin''ny andro fahoriana. [*Hebreo: mijanona]'
mg1865::mg_31::1::15:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa efa antomotra amin''ny jentilisa rehetra ny andron''i Jehovah; Toy ny nataonao no mba hatao aminao kosa; Eny, hitsingerina ho eo an-dohanao ny nataonao.'
mg1865::mg_31::1::16:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa toy ny nisotroanareo teo an-tendrombohitra masina, Dia toy izany koa no hisotroan''ny firenena rehetra mandrakariva, Eny, hisotro izy ka hitelina, Ary ho toy ny tsy ary izy.'
mg1865::mg_31::1::17:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ao an-tendrombohitra Ziona dia hisy izay sisa afaka, Ary ho masina izy; Ary ny taranak''i Jakoba hahalasa ny fananany.'
mg1865::mg_31::1::18:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny taranak''i Jakoba ho afo, Ary ny taranak''i Josefa ho lelafo, Fa ny taranak''i Esao kosa ho vodivary, Ary harehitr''ireny izy ka holevoniny; Ary tsy hisy sisa afaka ny taranak''i Esao, Fa Jehovah no efa niteny.'
mg1865::mg_31::1::19:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny any amin''ny tany atsimo no hahalasa ny tendrombohitr''i Esao; Ary ny any amin''ny tany lemaka amoron-tsiraka* no hahalasa ny Filistina; Hahalasa ny tanin''ny Efraima sy ny tany Samaria izy; Ary Benjamina hahalasa an''i Gileada. [*Hebreo: sefela]'
mg1865::mg_31::1::20:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny babo amin''izao Zanak''Isiraely maro be izao hahalasa ny Kananita hatrany Zarefata, Ary ny babo* tany Jerosalema, izay any Sefarada, dia hahalasa ny tanàna any amin''ny tany atsimo. [*Na: marobe izao izay any amin''ny Kananita hatrany Zerefata, sy ny babo...]'
mg1865::mg_31::1::21:
  verse_version: mg1865
  verse_book: mg_31
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy mpamonjy miakatra ho ao an-tendrombohitra Ziona Hitsara ny tendrombohitr''i Esao; Ary ho an''i Jehovah ny fanjakana.'
