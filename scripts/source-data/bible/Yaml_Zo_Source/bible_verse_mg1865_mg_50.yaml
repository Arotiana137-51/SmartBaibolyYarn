mg1865::mg_50::1::1:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fitarihan-teny sy fiarahabana ary fisaorana'
  verse_text: 'Paoly sy Timoty, mpanompon''i Kristy Jesoa, mamangy ny olona masina rehetra ao amin''i Kristy Jesoa mbamin''ny mpitandrina* sy ny diakona izay any Filipy; [*Grika: episkopo]'
mg1865::mg_50::1::2:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesoa Kristy Tompo.'
mg1865::mg_50::1::3:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''Andriamanitro amin''ny fahatsiarovako anareo'
mg1865::mg_50::1::4:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandrakariva aho amin''ny fivavahako rehetra ho anareo rehetra, ka mangataka amin''ny fifaliana,'
mg1865::mg_50::1::5:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho ny firaisanareo hampandroso ny filazantsara hatramin''ny andro voalohany ka mandraka ankehitriny;'
mg1865::mg_50::1::6:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary matoky indrindra aho fa Izay nanomboka asa tsara ao anatinareo no hahatanteraka izany mandra-pihavin''ny andron''i Jesoa Kristy;'
mg1865::mg_50::1::7:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa marina izany fiheverako anareo rehetra izany, satria efa mby ato am-poko ianareo, fa mpiombona ny fahasoavana ananako ianareo rehetra, na amin''ny fifatorako, na amin''ny famaliako hahafa-tsiny ny filazantsara sy ny fampianarako hahamafy orina azy.'
mg1865::mg_50::1::8:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra no vavolombeloko fa manina anareo rehetra indrindra aho amin''ny famindram-pon''i Kristy Jesoa.'
mg1865::mg_50::1::9:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izao no angatahiko, dia ny mbola hitomboan''ny fitiavanareo bebe kokoa amin''ny fahalalana tsara sy ny fahafantarana rehetra,'
mg1865::mg_50::1::10:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hamantaranareo izay zavatra tsara indrindra*, mba ho madio am-po ary tsy hanan-tsiny ho amin''ny andron''i Kristy ianareo, [*Na: samy hafa]'
mg1865::mg_50::1::11:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady feno ny vokatry ny fahamarinana, izay avy amin''ny alalan''i Jesoa Kristy, ho voninahitra sy fiderana an''Andriamanitra.'
mg1865::mg_50::1::12:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Ny toetr''i Paoly tao amin''ny fifatorana, sy ny fanantenany'
  verse_text: 'Ary tiako ho fantatrareo, ry rahalahy, fa izay zavatra nanjo ahy dia efa tonga fampandrosoana ny filazantsara kosa;'
mg1865::mg_50::1::13:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ao amin''i Kristy ny fifatorako dia fantatry ny mpiambina andriana rehetra* mbamin''ny olona hafa rehetra; [*Grika: mpiambina pretoriana rehetra; na: eran''ny pretoria]'
mg1865::mg_50::1::14:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny ankabiazan''ny rahalahy dia efa matoky ao amin''ny Tompo noho ny fifatorako ka mihasahisahy kokoa hitory ny tenin''Andriamanitra tsy amin''ny tahotra.'
mg1865::mg_50::1::15:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fialonana sy fifandirana aza no itorian''ny sasany an''i Kristy, ary fifaliana kosa ny an''ny sasany;'
mg1865::mg_50::1::16:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'fitiavana ny an''ny sasany, satria fantany fa voatendry ho mpanafa-tsiny ny filazantsara aho;'
mg1865::mg_50::1::17:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fifampiandaniana kosa no itorian''ny sasany an''i Kristy, fa tsy mba fo madio, ka mihevitra hanampy fahoriana ny fifatorako.'
mg1865::mg_50::1::18:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana ary no izy, afa-tsy izao? Amin''ny atao rehetra, na amin''ny fihatsaram-belatsihy, na amin''ny marina, dia Kristy no torina, ary mifaly amin''izany aho; eny, mbola hifaly ihany aho.'
mg1865::mg_50::1::19:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatro fa ho tonga famonjena ahy izany noho ny fangatahanareo sy ny fanomezana* ny Fanahin''i Jesoa Kristy, [*Na: fanomezan'']'
mg1865::mg_50::1::20:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny hafatratry ny faniriako sy ny fanantenako fa tsy hahazo henatra aho, na amin''inona na amin''inona; fa amin''ny fahasahiana rehetra, tahaka ny amin''ny mandrakariva, dia ankehitriny koa no hankalazana an''i Kristy ao amin''ny tenako, na amin''ny fiainana, na amin''ny fahafatesana.'
mg1865::mg_50::1::21:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Kristy no anton''ny ahavelomako, ary ny fahafatesana no hahazoako tombony.'
mg1865::mg_50::1::22:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa raha ny ho velona amin''ny nofo no hahavokaran''ny asako, dia tsy hitako izay hofidiko;'
mg1865::mg_50::1::23:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa sanganehana eo anelanelan''izy roroa aho, maniry hiala ka ho ao amin''i Kristy, satria tsara lavitra izany;'
mg1865::mg_50::1::24:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa kosa ny hitoetra eo amin''ny nofo no mahasoa anareo kokoa.'
mg1865::mg_50::1::25:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary satria matoky izany aho, dia fantatro fa hitoetra sy haharitra eo aminareo rehetra aho hahazoanareo fandrosoana sy fifaliana amin''ny finoanareo,'
mg1865::mg_50::1::26:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hitombo noho ny ataoko ny firavoravoanareo ao amin''i Kristy Jesoa amin''ny hankanesako aty aminareo indray.'
mg1865::mg_50::1::27:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hany ataoko: aoka ny fitondran-tenanareo ho miendrika ny filazantsaran''i Kristy, mba handrenesako ny toetrareo (na ho tonga aho ka hahita anareo, na tsy ho tonga), fa maharitra amin''ny fanahy iray ianareo ka miray fo hiara-miezaka hampandroso ny finoana ny filazantsara,'
mg1865::mg_50::1::28:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka tsy ho azon''ny fahavalo ampitahorina ianareo na amin''inona na amin''inona; fa amin''ireo dia mariky ny fahaverezana izany, nefa mariky ny famonjena anareo kosa, sady avy amin''Andriamanitra.'
mg1865::mg_50::1::29:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo efa nomena noho ny an''i Kristy, tsy ny hino Azy ihany, fa ny hiharam-pahoriana koa noho ny aminy,'
mg1865::mg_50::1::30:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 1
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia manana izany ady izany ianareo, izay hitanareo teo amiko sady mbola renareo fa ato amiko ihany ankehitriny.'
mg1865::mg_50::2::1:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra hamporisika ny Filipiana hitondra tena tsara sy hanetry tena tahaka an''i Jesoa Kristy'
  verse_text: 'Koa raha misy famporisihana ao amin''i Kristy, raha misy fampiononana avy amin''ny fitiavana, raha misy firaisana amin''ny Fanahy, raha misy famindram-po sy fiantrana,'
mg1865::mg_50::2::2:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tanteraho ny fifaliako, mba hiraisanareo saina, miray fitiavana, miray fo, miray hevitra,'
mg1865::mg_50::2::3:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy manao na inona na inona amin''ny fifampiandaniana, na mandrani-tena foana fa amin''ny fanetren-tena dia aoka samy hanao ny namany ho mihoatra noho ny tenany.'
mg1865::mg_50::2::4:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza samy mihevitra ny azy ihany, fa samy ny an''ny namany koa.'
mg1865::mg_50::2::5:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho ao aminareo izao saina izao, izay tao amin''i Kristy Jesoa koa,'
mg1865::mg_50::2::6:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay, na dia nanana ny endrik''Andriamanitra aza, dia tsy nataony ho zavatra hofikiriny mafy ny fitoviana amin''Andriamanitra,'
mg1865::mg_50::2::7:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa nofoanany ny tenany tamin''ny nakany ny endriky ny mpanompo sy nahatongavany ho manam-pitoviana amin''ny olona;'
mg1865::mg_50::2::8:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa hita fa nanan-tarehy ho olona Izy, dia nanetry tena ka nanaiky hatramin''ny fahafatesana, dia ilay fahafatesana tamin''ny hazo fijaliana.'
mg1865::mg_50::2::9:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no nanandratan''Andriamanitra Azy indrindra sy nanomezany Azy ny anarana izay ambony noho ny anarana rehetra,'
mg1865::mg_50::2::10:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho amin''ny anaran''i Jesoa no handohalehan''ny lohalika rehetra, na ny any an-danitra, na ny ety an-tany, na ny any ambanin''ny tany,'
mg1865::mg_50::2::11:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy haneken''ny lela rehetra fa Jesoa Kristy no Tompo ho voninahitr''Andriamanitra Ray.'
mg1865::mg_50::2::12:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany, ry malalako, tahaka ny nanekenareo mandrakariva, tsy fony teo aminareo ihany aho, fa ankehitriny dia bebe kokoa aza raha tsy eo aho, miasà amin''ny tahotra sy ny hovitra hahatanteraka ny famonjena anareo.'
mg1865::mg_50::2::13:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra no miasa ao anatinareo na ny fikasana na ny fanaovana hahatanteraka ny sitrapony.'
mg1865::mg_50::2::14:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy ny zavatra rehetra amin''ny tsy fimonomononana sy ny tsy fisalasalana,'
mg1865::mg_50::2::15:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho tsy manan-tsiny sady tsy misy fitaka ianareo, dia zanak''Andriamanitra tsy manana adidy eo amin''ny firenena meloka sy maditra, izay isehoanareo tahaka ny fanazavana eo amin''izao tontolo izao,'
mg1865::mg_50::2::16:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitana ny tenin''ny fiainana, mba hisy ho reharehako amin''ny andron''i Kristy, ka tsy ho nihazakazaka foana aho na nisasatra foana.'
mg1865::mg_50::2::17:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, na dia haidina ho fanatitra aidina eo amin''ny fanatitra ny fisoronan''ny finoanareo aza aho, dia faly ka miara-mifaly aminareo rehetra.'
mg1865::mg_50::2::18:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka izany no hampifaly anareo koa, ary miaraha mifaly amiko.'
mg1865::mg_50::2::19:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: 'Ny amin''i Timoty sy Epafrodito'
  verse_text: 'Nefa manantena ao amin''i Jesoa Tompo aho fa haniraka an''i Timoty faingana ho aty aminareo, mba hifaliako koa, rehefa fantatro ny toetrareo.'
mg1865::mg_50::2::20:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy manana olona mitovy fanahy amiko* aho na dia iray akory aza, izay hazoto hiahy anareo. [*Na: aminy]'
mg1865::mg_50::2::21:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izy rehetra dia samy mitady ny azy avy, fa tsy ny an''i Jesoa Kristy;'
mg1865::mg_50::2::22:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'izy kosa dia fantatrareo fa lehilahy voazaha toetra, fa efa niara-nanompo tamiko teo amin''ny filazantsara, tahaka ny zanaka manompo ny rainy.'
mg1865::mg_50::2::23:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy no antenaiko hirahina faingana, rehefa hitako izay ho toetro.'
mg1865::mg_50::2::24:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa matoky ao amin''ny Tompo aho fa ny tenako dia mbola ho avy faingana koa.'
mg1865::mg_50::2::25:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa nihevitra aho fa tokony hampandehaniko hankaty aminareo Epafrodito, rahalahiko sady mpiray asa amiko no miaramila namako ary irakareo* sy mpanompo hanome izay nilaiko. [*Grika: apostolinareo]'
mg1865::mg_50::2::26:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manina anareo rehetra izy ka difotra alahelo, satria efa renareo fa narary izy.'
mg1865::mg_50::2::27:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, fa narary saiky maty tokoa izy; nefa Andriamanitra namindra fo taminy, ary tsy taminy ihany, fa tamiko koa, fandrao hanana alahelo mifanontona aho.'
mg1865::mg_50::2::28:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa nazoto kokoa haniraka azy aho, mba hifalianareo, rehefa hitanareo indray izy, ary mba ho afaka alahelo kokoa aho.'
mg1865::mg_50::2::29:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raiso ao amin''ny Tompo izy amin''ny fifaliana indrindra, ary omeo voninahitra izay olona tahaka izany;'
mg1865::mg_50::2::30:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 2
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa saiky maty izy noho ny asan''i Kristy sady nanao ny ainy tsy ho zavatra mba hanefa izay tsy vitanareo tamin''ny fanompoana ahy.'
mg1865::mg_50::3::1:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra nataon''i Paoly mba tsy haneken''ny Filipiana izay mpampianatra sandoka, fa hitady handroso amin''ny fitondran-tena tsara rehetra'
  verse_text: 'Farany, ry rahalahy, mifalia* ao amin''ny Tompo. Tsy manahirana ahy ny manoratra teny averina, fa mahatsara anareo izany. [*Na: veloma]'
mg1865::mg_50::3::2:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny tenanareo amin''ny amboa, tandremo ny tenanareo amin''ny mpanao ratsy, tandremo ny tenanareo amin''ny voakilema.'
mg1865::mg_50::3::3:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika no voafora, izay manompo amin''ny Fanahin''Andriamanitra ary manao an''i Kristy Jesoa ho reharehantsika ka tsy mitoky amin''ny nofo;'
mg1865::mg_50::3::4:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'kanefa mba manana izay hitokiako amin''ny nofo ihany aho. Raha misy olona hafa manao hitoky amin''ny nofo, mainka fa izaho;'
mg1865::mg_50::3::5:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa voafora tamin''ny andro fahavalo aho, avy amin''ny fototr''isiraely, dia avy amin''ny firenen''i Benjamina; Hebreo sady avy amin''ny Hebreo aho; araka ny lalàna, dia Fariseo;'
mg1865::mg_50::3::6:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny zotom-po, dia nanenjika ny fiangonana*; araka ny fahamarinana avy amin''ny lalàna, dia tsy nanan-tsiny. [*Grika: eklesia]'
mg1865::mg_50::3::7:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa izay azoko ho tombony dia nataoko fatiantoka kosa noho ny amin''i Kristy.'
mg1865::mg_50::3::8:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny tokoa, fa ataoko ho fatiantoka avokoa ny zavatra rehetra noho ny fihoaran''ny hatsaran''ny fahalalana an''i Kristy Jesoa Tompoko, Izay niaretako ny fatiantoka ny zavatra rehetra, ka ataoko ho taimboraka ireny mba hahazoako an''i Kristy;'
mg1865::mg_50::3::9:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba ho hita ao aminy aho tsy manana ny fahamarinako, izay avy amin''ny lalàna, fa izay avy amin''ny finoana an''i Kristy, dia ny fahamarinan''Andriamanitra amin''ny finoana;'
mg1865::mg_50::3::10:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, mba ho fantatro Izy sy ny herin''ny fitsanganany tamin''ny maty ary ny fiombonana amin''ny fijaliany ka hampitovina amin''ny endriky ny fahafatesany,'
mg1865::mg_50::3::11:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mba misy hahatratrarako ny fitsanganana amin''ny maty.'
mg1865::mg_50::3::12:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy toy ny efa nahazo sahady aho, na efa tanteraka sahady; fa miezaka aho hihazona izay nihazonan''i Kristy Jesoa ahy.'
mg1865::mg_50::3::13:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, tsy mbola ataoko* fa efa nahazo ny tenako; fa zavatra iray loha no ataoko; manadino izay zavatra ao aoriana ka miezaka hanatratra izay zavatra eo aloha, [*Na: (tsy nataoko)]'
mg1865::mg_50::3::14:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, miezaka hanatratra ny marika aho hahazoako ny lokan''ny fiantsoan''Andriamanitra any ambony* ao amin''i Kristy Jesoa. [*Na: ho any ambony]'
mg1865::mg_50::3::15:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aoka isika rehetra izay tanteraka hihevitra izany; fa hasehon''Andriamanitra aminareo izany, raha sendra manana sain-kafa ianareo.'
mg1865::mg_50::3::16:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa aoka ho amin''ilay efa azontsika sahady no mbola hizorantsika.'
mg1865::mg_50::3::17:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, aoka samy hanahaka ahy ianareo, ka diniho izay mandeha tahaka ny anananareo anay ho marika.'
mg1865::mg_50::3::18:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maro no mandeha, izay efa nolazaiko taminareo matetika, sady mbola lazaiko aminareo amin''ny fitomaniana koa ankehitriny, fa fahavalon''ny hazo fijalian''i Kristy ireny;'
mg1865::mg_50::3::19:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'fahaverezana no hiafarany, ny kibony no andriamaniny, ny fahamenarany no voninahiny, fa misaina ny amin''ny tany izy.'
mg1865::mg_50::3::20:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fanjakantsika dia any an-danitra, ary avy any koa no iandrasantsika Mpamonjy, dia Jesoa Kristy Tompo,'
mg1865::mg_50::3::21:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay hanova ny tenan''ny fietren-tenantsika ka hitovy endrika amin''ny tenan''ny voninahiny, araka ny fiàsan''ny heriny, izay ahaizany hampanaiky ny zavatra rehetra ho Azy.'
mg1865::mg_50::4::1:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, ry rahalahy sady malalako no mahamanina ahy, fifaliako sy satro-boninahitro, tomoera tsara ao amin''ny Tompo ianareo, ry malalako.'
mg1865::mg_50::4::2:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mananatra an''i Eodia aho, ary mananatra an''i Syntyke, mba hiray saina ao amin''ny Tompo izy.'
mg1865::mg_50::4::3:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, mangataka aminao koa aho, ry ilay tena mpiara-miasa amiko, manampia azy roa vavy, fa niara-niasa fatratra tamiko teo amin''ny filazantsara izy, mbamin''i Klementa koa sy ny mpiara-miasa amiko sisa, izay voasoatra ao amin''ny bokin''ny fiainana.'
mg1865::mg_50::4::4:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia* mandrakariva amin''ny Tompo; hoy izaho indray: Mifalia*. [*Na: veloma]'
mg1865::mg_50::4::5:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ho fantatry ny olona rehetra ny fandeferanareo. Efa mby akaiky ny Tompo.'
mg1865::mg_50::4::6:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manahy na inona na inona; fa aoka ny fivavahana sy ny fifonana mbamin''ny fisaorana no ho entinareo manambara ny fangatahanareo amin''Andriamanitra amin''ny zavatra rehetra.'
mg1865::mg_50::4::7:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny fiadanan''Andriamanitra, izay mihoatra noho ny fahalalana rehetra, hiaro ny fonareo sy ny hevitrareo ao amin''i Kristy Jesoa.'
mg1865::mg_50::4::8:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Farany, ry rahalahy, na inona na inona marina, na inona na inona manan-kaja, na inona na inona mahitsy, na inona na inona madio, na inona na inona maha-te-ho-tia, na inona na inona tsara laza, raha misy hatsaram-panahy, ary raha misy dera, dia hevero izany.'
mg1865::mg_50::4::9:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ataovy izay efa nianaranareo sy efa noraisinareo ary efa renareo sy efa hitanareo tamiko; ary ho aminareo ny Andriamanitry ny fiadanana.'
mg1865::mg_50::4::10:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Saotra nataon''i Paoly ny Filipiana noho ny fanomezana nampitondrainy an''i Epafrodito, ary fanaovam-beloma sy tso-drano.'
  verse_text: 'Ary faly indrindra ao amin''ny Tompo aho, satria nampitsimohinareo indray ankehitriny ny fiheverana ahy, izay efa noheverinareo rahateo, saingy tsy mbola nahita andro hanaovana ianareo.'
mg1865::mg_50::4::11:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy filan-javatra anefa no anaovako izany; fa izaho efa nianatra tsy hierina na manao ahoana na manao ahoana.'
mg1865::mg_50::4::12:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahalala hietry aho, ary mahalala hitombo; na aiza na aiza, ary na amin''inona na amin''inona, dia efa nampianarina ny ho voky sy ho noana aho ary hanam-be sy halahelo.'
mg1865::mg_50::4::13:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahay ny zavatra rehetra aho ao amin''ilay mampahery ahy.'
mg1865::mg_50::4::14:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa nanao soa ianareo no niaraka ory tamiko ka niantra ahy.'
mg1865::mg_50::4::15:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatrareo koa, ry Filipiana, fa tamin''ny niandohan''ny filazantsara, rehefa niala tany Makedonia aho, tsy nisy fiangonana* nanan-draharaha tamiko ny amin''ny fanomezana sy fandraisana, afa-tsy ianareo ihany. [*Grika: eklesia#'
mg1865::mg_50::4::16:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony tany Tesalonika aza aho, dia nampanatitra ho ahy indray mandeha amana indroa ianareo hamonjy ahy.'
mg1865::mg_50::4::17:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: '2022-03-26T03:22:18+0000'
  verse_title: null
  verse_text: 'Nefa tsy toy ny mitady ny fanomezana noho izany; fa mitady ny vokatra izay hitombo ho voninahitrareo aho.'
mg1865::mg_50::4::18:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manana ny zavatra rehetra aho sady manana amby ampy aza; feno aho, rehefa nandray tamin''i Epafrodito ilay zavatra nampitondrainareo, dia hanitra ankasitrahana, fanatitra tian''Andriamanitra sady ankasitrahany.'
mg1865::mg_50::4::19:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: '2023-01-02T02:55:23+0000'
  verse_title: null
  verse_text: 'Fa Andriamanitro hahatanteraka izay rehetra tokony ho anareo araka ny hareny amin''ny voninahitra ao amin''i Kristy Jesoa.'
mg1865::mg_50::4::20:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''Andriamanitra Raintsika anie ny voninahitra mandrakizay mandrakizay. Amena.'
mg1865::mg_50::4::21:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova veloma ny olona masina rehetra ao amin''i Kristy Jesoa. Manao veloma anareo ny rahalahy izay ato amiko.'
mg1865::mg_50::4::22:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manao veloma anareo ny olona masina rehetra, indrindra fa ny ankohonan''i Kaisara.'
mg1865::mg_50::4::23:
  verse_version: mg1865
  verse_book: mg_50
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho amin''ny fanahinareo anie ny fahasoavan''i Jesoa Kristy Tompo.'
