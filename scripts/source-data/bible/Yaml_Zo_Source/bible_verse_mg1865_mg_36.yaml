mg1865::mg_36::1::1:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny tenin''i Jehovah, izay tonga tamin''i Zefania, zanak''i Kosy, zanak''i Gedalia, zanak''i Amaria, zanak''i Hezekia, tamin''ny andro nanjakan''i Josia, zanak''i Amona, mpanjakan''ny Joda.'
mg1865::mg_36::1::2:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: 'Ny hamaliana ny firenena rehetra noho ny ratsy nataony, indrindra fa ny Joda'
  verse_text: 'Hakifako tokoa ny zavatra rehetra tsy ho eny ambonin''ny tany, hoy Jehovah;'
mg1865::mg_36::1::3:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, hakifako ny olona sy ny biby; Hakifako ny vorona eny amin''ny habakabaka sy ny hazandrano any an-dranomasina. Ary ny zavatra mahatafintohina mbamin''ny ratsy fanahy, Haringako tsy ho amin''ny tany ny olona, hoy Jehovah.'
mg1865::mg_36::1::4:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hahinjitro ny tanako hamely ny Joda sy ny mponina rehetra any Jerosalema; Dia haringako tsy ho eo amin''ity tany ity ny sisa amin''i Bala, Sy ny anaran''ny mpisorona amin''ny andriamani-tsy izy mbamin''ny tena mpisorona,'
mg1865::mg_36::1::5:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sy izay mivavaka any an-tampon-trano amin''izay eny amin''ny lanitra, Ary izay miankohoka sy mianiana ho an''i Jehovah Sady mianiana amin''i Malkama*, [*Na: ny mpanjakany]'
mg1865::mg_36::1::6:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay nihemotra niala tamin''i Jehovah, Sy izay tsy nitady an''i Jehovah na nanontany taminy.'
mg1865::mg_36::1::7:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mangina eo anatrehan''i Jehovah Tompo! Fa efa antomotra ny andron''i Jehovah; Fa Jehovah efa niomana hamono zavatra hatao fanatitra Ka efa nanamasina ny olona nasainy.'
mg1865::mg_36::1::8:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mby amin''ny andro hamonoan''i Jehovah zavatra hatao fanatitra, Dia hovaliako ny lehibe sy ny zanak''andriana Mbamin''izay rehetra mitafy ny fitafin''ny firenena hafa.'
mg1865::mg_36::1::9:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hovaliako izay rehetra miezaka mihoatra ny tokonana, Dia ireo mameno loza sy fitaka ny tranon''ny tompony.'
mg1865::mg_36::1::10:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany, hoy Jehovah, Dia hisy feo re mitaraina any am-bavahadin-kazandrano, Sy fidradradradrana ao amin''ny tanàna ambany, Ary fidarabohana miezinezina any amin''ny havoana.'
mg1865::mg_36::1::11:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Midradradradrà, ianareo mponina ao Maktesy*; Fa ringana avokoa ny mpandranto** rehetra, Eny, lany ringana izay rehetra nivesatra volafotsy. [*Maktesy = Laona] [**Na: vahoakan''i Kanana]'
mg1865::mg_36::1::12:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany andro izany dia hotsiloviko amin''ny jiro Jerosalema, Ka hovaliako ny olona izay efa lefy ao amin''ny faikany, Dia izay manao anakampo hoe: Sady tsy hanao soa Jehovah no tsy hanao ratsy.'
mg1865::mg_36::1::13:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia ho tonga babo ny fananan''ireny, Ary ho lao ny tranony; Dia hanao trano izy, nefa tsy hitoetra ao, Hamboly voaloboka izy, nefa tsy hisotro ny divay avy aminy.'
mg1865::mg_36::1::14:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa antomotra ny andro lehiben''i Jehovah; Eny, efa antomotra sady mihafaingana indrindra, Injay! feon''ny andron''i Jehovah! Ny lehilahy mahery dia mitomany mafy any.'
mg1865::mg_36::1::15:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andro fahatezerana izany andro izany, Andro fahoriana sy fahalahelovana, Andro fandravana sy fanafoanana, Andro maizina sy manjombona, Andro mandrahona sy maizim-pito.'
mg1865::mg_36::1::16:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andro fahaveloman''ny anjomara sy ny akora, Hamelezana ny tanàna mimanda sy ny tilikambo avo eny amin''ny zorony.'
mg1865::mg_36::1::17:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hampahory ny olona Aho, Handehanany toy ny jamba, Satria efa nanota tamin''i Jehovah izy; Ny ràny dia haidina toy ny vovoka, Ary ny nofony ho toy ny zezika.'
mg1865::mg_36::1::18:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na ny volafotsiny na ny volamenany dia samy tsy hahavonjy azy amin''ny andro fahatezeran''i Jehovah, Fa holevonin''ny afon''ny fahasaro-piarony ny tany rehetra; Fa fahafonganana, eny, fahafonganana tampoka* tokoa no hataony amin''ny mponina amin''ny tany. [*Na: mahatsiravina]'
mg1865::mg_36::2::1:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Anatra ho fampibebahana ny olona, dieny mbola tsy mihatra ny loza'
  verse_text: 'Miangona, eny, mivoria ianareo Ry firenena tsy manan-kenatra*, [*Na: tsy manina]'
mg1865::mg_36::2::2:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dieny tsy mbola mihatra ny didy (Mihelina toy ny akofa ny andro!), Dieny tsy mbola tonga aminareo ny fahatezerana mafin''i Jehovah, Eny, dieny tsy mbola tonga aminareo ny andro firehetan''ny fahatezeran''i Jehovah.'
mg1865::mg_36::2::3:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mitadiava an''i Jehovah, ianareo mpandefitra rehetra amin''ny tany, Izay efa nanaraka ny fitsipiny: Tadiavo ny fahamarinana, Tadiavo ny fandeferana; Angamba ho voafina ianareo amin''ny andro fahatezeran''i Jehovah.'
mg1865::mg_36::2::4:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hafoy Gaza, Ary ho lao Askelona; Horoahiny mitataovovonana Asdoda, Ary hofongorana Ekrona.'
mg1865::mg_36::2::5:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ny mponina any amoron-tsiraka, Dia ny firenen''ny Keretita! Mihatra aminareo ny tenin''i Jehovah, Ry Kanana, tanin''ny Filistina! Haringako tsy hisy mponina eo aminao,'
mg1865::mg_36::2::6:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny any amoron-tsiraka dia ho tonga tany fiandrasana ondry, izay misy zohy fialofan*''ny mpiandry ondry, Sy ho valan''ondry aman''osy, [*Na: trano-bongon'']'
mg1865::mg_36::2::7:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho tanin''ny sisa amin''ny taranak''i Joda izany, Ka any no hiandrasany ondry; Ny tranon''i Askelona no handriany amin''ny hariva; Fa Jehovah Andriamaniny no hamangy azy Ka hampody azy avy amin''ny fahababoany.'
mg1865::mg_36::2::8:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa reko ny fandatsan''i Moaba Sy ny fanaratsian''ny taranak''i Amona, Izay nandatsany ny oloko Sy nireharehany teny amin''ny sisin-taniny.'
mg1865::mg_36::2::9:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha velona koa Aho, hoy Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, Dia ho tahaka an''i Sodoma tokoa Moaba, Ary ny taranak''i Amona ho tahaka an''i Gomora, Dia ho alan''amiana sy lava-tsira ary tany lao mandrakizay; Ny sisa amin''ny oloko no hamabo azy, ary ny sisa amin''ny oloko no hahalasa azy.'
mg1865::mg_36::2::10:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no ho valin''ny avonavony, Satria nandatsa ny olon''i Jehovah, Tompon''ny maro, sy nirehareha taminy izy.'
mg1865::mg_36::2::11:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hahatsiravina azy Jehovah, Satria hahamosarena ireo andriamanitra rehetra ambonin''ny tany Izy, Mba hiankohofan''ny any amoron-tsiraky ny jentilisa rehetra eo anatrehan''i Jehovah, Samy any amin''ny fitoerany avy.'
mg1865::mg_36::2::12:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo Etiopiana koa, Ho voatrabaky ny sabatro ianareo*. [*Hebreo: izy]'
mg1865::mg_36::2::13:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary haninjitra ny tanany hamely ny avaratra Izy Ka handringana an''i Asyria; Ary hahalao an''i Ninive ho karankaina tahaka ny efitra Izy.'
mg1865::mg_36::2::14:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hisy andiany handry ao aminy, Dia fivorian''ny karazam-biby samy hafa, Ny sama sy ny sokina hitoetra ao amin''ny kapitaliny; Feo mikiririoka no ho re ao am-baravarankely, Ary fandravana no ho eo an-tokonana, Fa hendahany ny rafitra sedera.'
mg1865::mg_36::2::15:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no tanàna niravoravo sady nandry fahizay, Izay nanao anakampo hoe: Izaho no izy, ary tsy misy hafa; Endrey! efa tonga lao izy, eny, fandrian''ny biby! Izay rehetra mandalo azy dia hisitrisitra sy hanondro tanana.'
mg1865::mg_36::3::1:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ny tanàna miodina sady voaloto, Dia ilay mampahory!'
mg1865::mg_36::3::2:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy nihaino ny feo izy, Na nino anatra; Jehovah tsy nitokiany, Andriamaniny tsy nohatoniny.'
mg1865::mg_36::3::3:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Liona mierona ao aminy ireo lehibeny; Amboadia* hariva ny mpitsarany Ka tsy mamela** ho tra-maraina. [*Lopa] [**Na: tsy mamela taolana]'
mg1865::mg_36::3::4:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vavana sady mpamitaka ny mpaminaniny; Mandoto izay masina ny mpisorony, Eny, mamadika ny lalàna izy.'
mg1865::mg_36::3::5:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah no marina ao afovoany, Tsy manao izay tsy marina Izy; Isa-maraina isa-maraina no amoahany ny fitsarany ho amin''ny mazava, ka tsy diso izany. Fa ny tsy marina tsy mba mahalala henatra.'
mg1865::mg_36::3::6:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Efa nahafongana firenena Aho, Rava ny tilikambo eny amin''ny zorony; Nosimbako ny lalany tsy hisy mpandeha; Rava ny tanànany, ka tsy misy olona, Eny, tsy misy mponina.'
mg1865::mg_36::3::7:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hoy Izaho: Hatahotra Ahy tokoa ianao ka hino anatra, Dia tsy ho rava ny fonenanao*, Araka izay rehetra voatendriko hamelezana anao**; Kanefa nifoha maraina koa izy ka nanao Izay ratsy rehetra. [*Hebreo: fonenany] [*Hebreo: azy]'
mg1865::mg_36::3::8:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa miandrasa Ahy ianareo, hoy Jehovah, Ambara-pihavin''ny andro hitsanganako haka babo; Fa izao no kasaiko hatao: Hamory firenena sy hanangona fanjakana Aho, Hanidinako ny fahatezerako amin''ireo, dia ny firehetan''ny fahatezerako rehetra, Ka ho levon''ny afon''ny fahasaro-piaroko ny tany rehetra.'
mg1865::mg_36::3::9:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: 'Ny amin''ny hibebahan''ny jentilisa, sy ny hanomezam-boninahitra ny Isiraely'
  verse_text: 'Fa amin''izany dia hovako ho madio ny molotry ny firenena, Hiantsoan''izy rehetra ny anaran''i Jehovah, hanompoany Azy amin''ny firaisan-kina*. [*Hebreo: soroka iray]'
mg1865::mg_36::3::10:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy any an-dafin''ny onin''i Etiopia no hitondrana ny mpivavaka amiko, Dia ny zanakavavin''izay naeliko, ho fanatitra ho Ahy*. [*Na: hitondran''ny mpivavaka amiko ... ny fanatitra ho ahy]'
mg1865::mg_36::3::11:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia tsy ho menatra ianao tamin''izay nataonao rehetra, Izay nanotanao tamiko; Ka dia hesoriko aminao ireo mibitaka amim-pireharehana, Ary tsy hiavonavona eo an-tendrombohitro masina intsony ianao.'
mg1865::mg_36::3::12:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hamelako olona ory sy malahelo ihany ao aminao, Ary ny anaran''i Jehovah no hialofany,'
mg1865::mg_36::3::13:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny sisa amin''ny Isiraely dia tsy hanao meloka na handainga, Ary tsy hisy lela mamitaka eo am-bavany; Fa hihinana sy handry izy, ka tsy hisy hanaitaitra azy.'
mg1865::mg_36::3::14:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihobia, ry Ziona zanakavavy; Manaova feo fifaliana, ry Isiraely; Mifalia sy miravoravoa amin''ny fonao rehetra, ry Jerosalema zanakavavy.'
mg1865::mg_36::3::15:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah efa nampitsahatra ny fitsarana anao ka nandroaka ny fahavalonao; Jehovah, Mpanjakan''ny Isiraely, no ao aminao; Tsy hahita loza intsony ianao.'
mg1865::mg_36::3::16:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany dia holazaina amin''i Jerosalema hoe: Aza matahotra Ary aza miraviravy tanana, ry Ziona.'
mg1865::mg_36::3::17:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Jehovah Andriamanitrao no ao aminao, Mahery Izy ka hamonjy; Hiravoravo anao amin''ny fifaliana Izy; Ho sondriana* amin''ny fitiavany Izy; Hifaly anao amin''ny fihobiana Izy. [*Hebreo: hangina]'
mg1865::mg_36::3::18:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Hangoniko izay manina* ny fotoam-pivavahana; Avy aminao ihany ireny, Ary itambesaran''ny latsa izy**. [*Na: efa lavitra] [**Na: Ary mitambesatra aminy ny fandatsana anao (Hebreo: fandatsana azy) na: Avy taminao izay itambesaran''ny latsa ireny]'
mg1865::mg_36::3::19:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hasiako amin''Izany andro izany izay rehetra nampahory anao; Hovonjeko ny mandringa, ary hovoriko ny noroahina, Eny, hataoko ho fiderana sy ho anarana ireny izay efa nitondra henatra tany amin''ny tany rehetra*. [*Na: any amin''ny tany rehetra izay efa nitondrany henatra]'
mg1865::mg_36::3::20:
  verse_version: mg1865
  verse_book: mg_36
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Amin''izany andro izany no hitondrako anareo miditra, Eny, amin''izany andro izany no hanangonako anareo; Fa hataoko ho anarana sy ho fiderana any amin''ny firenena rehetra amin''ny tany ianareo, Raha hampodiko avy amin''ny fahababoana ianareo, ka ho hitan''ny masonareo izany, hoy Jehovah.'
