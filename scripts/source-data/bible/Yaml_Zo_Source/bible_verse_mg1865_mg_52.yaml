mg1865::mg_52::1::1:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana ny Tesaloniana, sy fisaorana an''Andriamanitra noho ny nandraisan''ireo ny filazantsara sy ny nandrosoany tamin''ny finoana sy ny fitiavana'
  verse_text: 'Paoly sy Silasy ary Timoty mamangy ny fiangonan''ny Tesaloniana, izay ao amin''Andriamanitra Ray sy Jesoa Kristy Tompo: ho aminareo anie ny fahasoavana sy ny fiadanana.'
mg1865::mg_52::1::2:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''Andriamanitra mandrakariva izahay ny aminareo rehetra ka manonona anareo amin''ny fivavahanay,'
mg1865::mg_52::1::3:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady tsy mitsahatra mahatsiaro ny asanareo amin''ny finoana sy ny fikelezanareo aina amin''ny fitiavana ary ny faharetanareo amin''ny fanantenana an i Jesoa Kristy Tompontsika eo imason''Andriamanitra Raintsika;'
mg1865::mg_52::1::4:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fantatray, ry rahalahy malalan''Andriamanitra, ny fifidianana anareo,'
mg1865::mg_52::1::5:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ny filazantsaranay tsy tonga teo aminareo tamin''ny teny ihany, fa tamin''ny hery koa sy ny Fanahy Masina ary ny fahatokiana be, araka ny ahafantaranareo izay toetry ny fitondran-tenanay teo aminareo noho ny aminareo.'
mg1865::mg_52::1::6:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo efa nanahaka anay sy ny Tompo, satria nandray ny teny tamin''ny fahoriana be mbamin''ny hafaliana avy amin''ny Fanahy Masina,'
mg1865::mg_52::1::7:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia tonga fianarana ho an''ny mino rehetra any Makedonia sy Akaia ianareo.'
mg1865::mg_52::1::8:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa avy taminareo no nanenoan''ny tenin''ny Tompo, tsy tany Makedonia sy Akaia ihany, fa teny tontolo eny no nielezan''ny lazan''ny finoanareo an''Andriamanitra, ka dia tsy misy holazainay intsony.'
mg1865::mg_52::1::9:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ireny ihany no milaza ny aminay, dia izay fidirana azonay ho aty aminareo sy ny nialanareo tamin''ny sampy hiverenana amin''Andriamanitra mba hanompo an''Andriamanitra velona sy marina,'
mg1865::mg_52::1::10:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hiandry ny Zanany avy any an-danitra, Izay natsangany tamin''ny maty, dia Jesoa, izay Mpanafaka antsika amin''ny fahatezerana ho avy.'
mg1865::mg_52::2::1:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenanareo, ry rahalahy, dia mahalala fa tsy foana ny fidiranay taty aminareo;'
mg1865::mg_52::2::2:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa rehefa nampahorina sy nisetrasetrana tany Filipy izahay teo aloha, tahaka ny fantatrareo ihany, dia sahy tao amin''Andriamanitray izahay hiteny taminareo ny filazantsaran''Andriamanitra, na dia be aza ny fanoherana.'
mg1865::mg_52::2::3:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fananaranay dia tsy avy amin''ny fitaka, na ny fahalotoana, na ny soloky.'
mg1865::mg_52::2::4:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny nankasitrahan''Andriamanitra anay, ka notolorana ny filazantsara ho adidinay izahay, dia araka izany koa no itenenanay, tsy toy ny mila sitraka amin''olona, fa amin''Andriamanitra, Izay mizaha toetra ny fonay.'
mg1865::mg_52::2::5:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nanao teny mandrobo akory izahay na oviana na oviana, tahaka ny fantatrareo ihany, na nihatsaravelatsihy hanafina fieremana (Andriamanitra no vavolombelona)'
mg1865::mg_52::2::6:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsy nitady voninahitra tamin''olona izahay, na taminareo, na tamin''ny sasany, na dia nanam-pahefana hahavaky tratra aza izahay, araka izay mah''Apostolin''i Kristy anay,.'
mg1865::mg_52::2::7:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa nalemy fanahy teo aminareo izahay, tahaka ny reny mitaiza ny zanany naterany,'
mg1865::mg_52::2::8:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia toy izany no nahazoto anay, noho ny fitiavanay anareo indrindra; hanome anareo, tsy ny filazantsaran''Andriamanitra ihany, fa ny ainay koa aza, satria efa malalanay ianareo.'
mg1865::mg_52::2::9:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsaroanareo, ry rahalahy, ny fikelezanay aina sy ny fisasaranay; fa niasa andro aman''alina, mba tsy hahavaky tratra na dia olona iray akory taminareo aza, no nitorianay ny filazantsaran''Andriamanitra taminareo.'
mg1865::mg_52::2::10:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo no vavolombelona ary Andriamanitra koa fa masina sy marina ary tsy nanan-tsiny tokoa ny fitondran-tenanay teo imasonareo izay mino,'
mg1865::mg_52::2::11:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'toy ny fantatrareo fa tahaka ny ray amin''ny zanaka no namporisihanay sy nampiononanay anareo isam-batana sy nananaranay mafy anareo,'
mg1865::mg_52::2::12:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba handehananareo miendrika an''Andriamanitra, Izay miantso anareo ho amin''ny fanjakany sy ny voninahiny.'
mg1865::mg_52::2::13:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany izahay koa dia tsy mitsahatra misaotra an''Andriamanitra, satria rehefa nandray ny tenin''Andriamanitra izay notorinay ianareo, dia tsy noraisinareo ho tenin''olona, fa araka izay marina, dia ny tenin''Andriamanitra, izay miasa anatinareo izay mino koa.'
mg1865::mg_52::2::14:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo, ry rahalahy, dia efa tahaka ny fiangonan''Andriamanitra any Jodia izay amin''i Kristy Jesoa; fa ny nanjo anareo noho ny nataon''ny iray firenena aminareo dia sahala amin''ny nanjo ireo koa noho ny nataon''ny Jiosy taminy,'
mg1865::mg_52::2::15:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay namono an''i Jesoa Tompo sy ny mpaminany koa ary nandroaka anay sady tsy manao ny sitrapon''Andriamanitra ary manohitra ny olona rehetra,'
mg1865::mg_52::2::16:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka mandrara anay tsy hitory amin''ny jentilisa mba tsy hamonjena ireny, mba hameno ny fahotan''ny tenany mandrakariva; kanjo efa niharan''ny fahatezerana hatramin''ny farany izy.'
mg1865::mg_52::2::17:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izahay, ry rahalahy, rehefa tafasaraka taminareo vetivety foana tamin''ny fanatrehana, fa tsy tamin''ny fo, dia vao mainka nitady sy naniry fatratra hahita ny tavanareo.'
mg1865::mg_52::2::18:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa naniry hankany aminareo indray mandeha amana indroa izahay, dia izaho Paoly; nefa nosakanan''i Satana izahay.'
mg1865::mg_52::2::19:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa inona moa no fanantenanay, na fifalianay, na satro-boninahitra reharehanay? Moa tsy ianareo eo anatrehan''i Jesoa Tompontsika amin''ny fihaviany va?'
mg1865::mg_52::2::20:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo no voninahitray sy fifalianay.'
mg1865::mg_52::3::1:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary amin''izany, raha tsy naharitra intsony izahay, dia nataonay fa mety ny hilaozana hitoetra irery tany Atena,'
mg1865::mg_52::3::2:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia nirahinay Timoty, rahalahinay sady mpanompon''Andriamanitra amin''ny filazantsaran''i Kristy, mba hampahery sy hamporisika anareo amin''ny finoanareo,'
mg1865::mg_52::3::3:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hisy ho taitra amin''izao fahoriana izao; fa ny tenanareo mahalala fa ho amin''izao no nanendrena antsika.'
mg1865::mg_52::3::4:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fony teo aminareo aza izahay, dia nilaza taminareo rahateo fa tsy maintsy hampahorina isika, dia toy ny efa nanjo ihany ka fantatrareo.'
mg1865::mg_52::3::5:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany izaho koa, raha tsy naharitra intsony, dia naniraka hahafantatra ny finoanareo, fandrao sendra naka fanahy anareo ny mpaka-fanahy, ka ho foana ny nikelezanay aina.'
mg1865::mg_52::3::6:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha vao tonga aty aminay ankehitriny Timoty avy taty aminareo ka nilaza teny taminay ny amin''ny finoanareo sy ny fitiavanareo ary ny fahatsiarovana anareo tsara anay mandrakariva, ka maniry hahita anay indrindra ianareo, tahaka anay aminareo koa,-'
mg1865::mg_52::3::7:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'noho izany, ry rahalahy, dia nampionona anay teo amin''ny fahaterenay sy ny fahorianay rehetra ny finoanareo;'
mg1865::mg_52::3::8:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ankehitriny velona izahay, raha tomoetra tsara amin''ny Tompo ianareo.'
mg1865::mg_52::3::9:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manao ahoana no saotra azonay havaly an''Andriamanitra ny aminareo noho ny fifaliana rehetra izay ifalianay noho ny aminareo eo anatrehan''Andriamanitray,'
mg1865::mg_52::3::10:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny fangatahanay fatratra andro aman''alina hahita ny tavanareo sy hahatanteraka ny tsy ampy amin''ny finoanareo?'
mg1865::mg_52::3::11:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitra Raintsika anie sy Jesoa Tompontsika hanitsy ny làlanay ho aty'
mg1865::mg_52::3::12:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Tompo anie hampitombo sy hampandroso anareo amin''ny fifankatiavana sy ny fitiavana ny olona rehetra, dia tahaka anay aminareo koa,'
mg1865::mg_52::3::13:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampiorina ny fonareo tsy hanan-tsiny amin''ny fahamasinana eo anatrehan''Andriamanitra Raintsika amin''ny fihavian''i Jesoa Tompontsika mbamin''ny masiny rehetra.'
mg1865::mg_52::4::1:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana ny Tesaloniana hitondra tena miendrika ny filazantsara'
  verse_text: 'Ary farany, ry rahalahy, mangataka aminareo sy mananatra anareo ao amin''i Jesoa Tompo izahay, mba ho araka ny nandraisanareo taminay izay mety handehananareo sy hanaovanareo ny sitrapon''Andriamanitra — dia araka ny andehananareo ihany — no hitomboanareo bebe kokoa.'
mg1865::mg_52::4::2:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatrareo ny didy nomenay anareo avy tamin''i Jesoa Tompo.'
mg1865::mg_52::4::3:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no sitrapon''Andriamanitra, dia ny hanamasinana anareo, hifadianareo ny fijangajangana,'
mg1865::mg_52::4::4:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba samy hahafantatra izay hahazoanareo ny fanaky ny tenanareo avy, amin''ny fahamasinana sy ny voninahitra,'
mg1865::mg_52::4::5:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy amin''ny filàna fotsiny, tahaka ny jentilisa izay tsy mahalala an''Andriamanitra,'
mg1865::mg_52::4::6:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy hisy hanao saina hifetsy ny rahalahiny amin''izany*; fa ny Tompo no mpamaly ny amin''izany zavatra rehetra izany, toy ny nolazainay sy nambaranay taminareo rahateo. [*Na: amin''ny raharaha]'
mg1865::mg_52::4::7:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra tsy niantso antsika ho amin''ny fahalotoana, fa amin''ny fahamasinana.'
mg1865::mg_52::4::8:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izay mandà, dia tsy olona no laviny, fa Andriamanitra, Izay manome anareo ny Fanahiny Masina.'
mg1865::mg_52::4::9:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny fifankatiavan''ny mpirahalahy, dia tsy misy tokony hosoratako aminareo, satria ny tenanareo dia ampianarin''Andriamanitra hifankatia.'
mg1865::mg_52::4::10:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa manao izany ihany ianareo amin''ny rahalahy rehetra eran''i Makedonia; nefa mananatra anareo ihany izahay, ry rahalahy, mba hitombo bebe kokoa,'
mg1865::mg_52::4::11:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hokendrenareo ny ho tafatoetra tsara sy hitandrina ny raharahanareo ary hiasa amin''ny tananareo araka ny nandidianay anareo,'
mg1865::mg_52::4::12:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba handehananareo amin''izay fitondran-tena mahamendrika amin''ny eo ivelany, ary mba tsy hanan-java-mahory ianareo.'
mg1865::mg_52::4::13:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: 'Ny hihavian''i Kristy sy ny toetry ny Kristiana izay modi-mandry'
  verse_text: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin''izay modi-mandry, mba tsy hahalahelovanareo tahaka ny sasany izay tsy manana fanantenana.'
mg1865::mg_52::4::14:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha inoantsika fa efa maty Jesoa sady efa nitsangana indray, dia toy izany koa no hitondran''Andriamanitra izay efa nodi-mandry tao amin''i Jesoa* hiaraka aminy. [*Na: tamin''ny alalan''i Jesoa]'
mg1865::mg_52::4::15:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izao no lazainay aminareo amin''ny tenin''ny Tompo: isika, izay velona ka mbola mitoetra mandra-pihavin''ny Tompo, dia tsy mba hialoha izay efa nodi-mandry tsy akory.'
mg1865::mg_52::4::16:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny tenan''ny Tompo no hidina avy any an-danitra amin''ny fiantsoana sy ny feon''ny arikanjely ary ny trompetran''Andriamanitra, ka izay maty ao amin''i Kristy no hitsangana aloha;'
mg1865::mg_52::4::17:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary rehefa afaka izany, dia isika izay velona ka mbola mitoetra no hakarina hiaraka aminy ho eny amin''ny rahona hitsena ny Tompo any amin''ny habakabaka; dia ho any amin''ny Tompo mandrakariva isika.'
mg1865::mg_52::4::18:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: '2022-05-15T14:11:47+0000'
  verse_title: null
  verse_text: 'Koa dia mifampionòna ianareo amin''izany teny izany.'
mg1865::mg_52::5::1:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny amin''ny andro sy ny fotoana, ry rahalahy, dia tsy misy tokony hosoratako aminareo,'
mg1865::mg_52::5::2:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria ianareo mahalala marimarina fa ho avy toy ny mpangalatra amin''ny alina ny andron''ny Tompo.'
mg1865::mg_52::5::3:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy olona manao hoe: Miadana sy mandry fahizay, dia hanjo azy tampoka ny fandringanana, toy ny fahararian''ny vehivavy raha miteraka, ka tsy ho afa-mandositra mihitsy izy.'
mg1865::mg_52::5::4:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo, ry rahalahy, tsy ao amin''ny maizina, mba hahatratra anareo toy ny mpangalatra izany andro izany.'
mg1865::mg_52::5::5:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo rehetra dia zanaky ny mazava sy zanaky ny andro; tsy an''ny alina na an''ny maizina isika.'
mg1865::mg_52::5::6:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia aza mba matory toy ny sasany isika, fa aoka hiambina* ka hahonon-tena. [*Grika: hiari-tory]'
mg1865::mg_52::5::7:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay matory dia matory amin''ny alina; ary izay mamo dia mamo amin''ny alina.'
mg1865::mg_52::5::8:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa satria an''ny andro isika, dia aoka hahonon-tena ka hitafy ny finoana sy ny fitiavana ho fiarovan-tratra, ary ny fanantenana ny famonjena ho fiarovan-doha.'
mg1865::mg_52::5::9:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra tsy nanendry antsika ho amin''ny fahatezerana, fa mba hahazo famonjena amin''ny alalan''i Jesoa Kristy Tompontsika,'
mg1865::mg_52::5::10:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay maty hamonjy antsika, mba hiara-belona aminy isika, na mahatsiaro na matory.'
mg1865::mg_52::5::11:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa mifananara sy mifampahatanjaha, tahaka ny ataonareo ihany.'
mg1865::mg_52::5::12:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: 'Fananarana sy fanaovam-beloma'
  verse_text: 'Ary mangataka aminareo izahay, ry rahalahy, mba hekenareo izay mikely aina eo aminareo sy mitondra anareo amin''ny Tompo ary mananatra anareo,'
mg1865::mg_52::5::13:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hohajainareo indrindra amin''ny fitiavana izy noho ny asany. Mihavàna tsara.'
mg1865::mg_52::5::14:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary mananatra anareo izahay, ry rahalahy; anaro izay tsy mitoetra tsara; omeo toky ny malemy saina; ampaherezo ny reraka; mandefera amin''ny olona rehetra.'
mg1865::mg_52::5::15:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo mba tsy hisy hamaly ratsy olona; fa miezaha mandrakariva hitady izay tsara, na amin''ny namanareo na amin''ny olona rehetra.'
mg1865::mg_52::5::16:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifalia mandrakariva.'
mg1865::mg_52::5::17:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mivavaha, ka aza mitsahatra.'
mg1865::mg_52::5::18:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaora amin''ny zavatra rehetra; fa izany no sitrapon''Andriamanitra ao amin''i Kristy Jesoa ho anareo.'
mg1865::mg_52::5::19:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mamono ny Fanahy.'
mg1865::mg_52::5::20:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manao tsinontsinona ny faminaniana.'
mg1865::mg_52::5::21:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fantaro ny zavatra rehetra; hazony mafy izay tsara.'
mg1865::mg_52::5::22:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fadio ny fanao ratsy rehetra.'
mg1865::mg_52::5::23:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Andriamanitry ny fiadanana anie hahamasina anareo samy ho tanteraka, ka aoka harovana avokoa ny fanahinareo sy ny ainareo ary ny tenanareo ho tanteraka ka tsy hanan-tsiny amin''ny fihavian''i Jesoa Kristy Tompontsika.'
mg1865::mg_52::5::24:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatoky Izay miantso anareo, sady Izy ihany no hanefa izany.'
mg1865::mg_52::5::25:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry rahalahy, mivavaha ho anay.'
mg1865::mg_52::5::26:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manaova veloma ny rahalahy rehetra amin''ny fanorohana masina.'
mg1865::mg_52::5::27:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mampianiana anareo amin''ny Tompo aho mba hovakina amin''ny rahalahy* rehetra ity epistily ity. [*Na: (rahalahy masina)]'
mg1865::mg_52::5::28:
  verse_version: mg1865
  verse_book: mg_52
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ho aminareo anie ny fahasoavan''i Jesoa Kristy Tompontsika.'
