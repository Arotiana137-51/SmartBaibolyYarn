mg1865::mg_49::1::1:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana nataon''i Paoly, sy fiderany an''Andriamanitra noho ny soa avy amin''ny avotra nataon''i Kristy'
  verse_text: 'Paoly, Apostolin''i Kristy Jesoa noho ny sitrapon''Andriamanitra, mamangy ny olona masina any Efesosy, izay mahatoky* ao amin''i Kristy Jesoa: [*Na: mino an'']'
mg1865::mg_49::1::2:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesoa Kristy Tompo.'
mg1865::mg_49::1::3:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Isaorana anie Andriamanitra, Rain''i Jesoa Kristy Tompontsika, Izay nitahy antsika tao amin''i Kristy amin''ny fitahiam-panahy rehetra any an-danitra,'
mg1865::mg_49::1::4:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny nifidianany antsika tao aminy, fony tsy mbola ary ny fanorenan''izao tontolo izao, mba ho masina sady tsy misy tsiny eo anatrehany isika,'
mg1865::mg_49::1::5:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa notendreny rahateo amin''ny fitiavana isika mba ho Azy* amin''ny fananganan''anaka amin''ny alalan''i Jesoa Kristy, araka izay ankasitrahan''ny fony, [*Na: amin''ny fitiavana, rehefa notendreny rahateo ho Azy isika]'
mg1865::mg_49::1::6:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho fiderana ny voninahitry ny fahasoavany, izay nanasoavany antsika maimaimpoana ao amin''ny Malala.'
mg1865::mg_49::1::7:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no ananantsika fanavotana amin''ny ràny, dia ny famelana ny fahadisoantsika, araka ny haren''ny fahasoavany,'
mg1865::mg_49::1::8:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nataony be ho antsika tamin''ny fahendrena sy ny fisainana rehetra,'
mg1865::mg_49::1::9:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'rehefa nampahafantariny ny zava-miafina ny amin''ny sitrapony isika, araka ny safidiny izay nokasain''ny tenany,'
mg1865::mg_49::1::10:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'hahatanterahany ny fitondrana hatao mandra-pahatapitry ny andro voatendry, hanangonany* ny zavatra rehetra ho iray ao amin''i Kristy, na ny any an-danitra, na ny ety an-tany, dia ho ao aminy; [*Na: hanangonany indray]'
mg1865::mg_49::1::11:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ao aminy koa no nanaovana antsika ho lovany*, rehefa notendrena rahateo isika araka ny fikasan''izay mahefa ny zavatra rehetra araka ny ankasitrahan''ny fony, [*Na: no nandraisantsika ny lova]'
mg1865::mg_49::1::12:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba ho fiderana ny voninahiny izahay, izay nanantena an''i Kristy rahateo.'
mg1865::mg_49::1::13:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ao aminy koa ianareo, rehefa renareo ny tenin''ny fahamarinana, dia ny filazantsara famonjena anareo,- eny, ao aminy koa ianareo, rehefa nino, no nasiana tombo-kase tamin''ny Fanahy Masina araka ny teny fikasana.'
mg1865::mg_49::1::14:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: '2022-05-22T02:56:35+0000'
  verse_title: null
  verse_text: 'Izany Fanahy izany no santatry ny lovantsika ho amin''ny fanavotana ny olona izay nalainy ho an''ny tenany, ho fiderana ny voninahiny.'
mg1865::mg_49::1::15:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: 'Fivavahana ho an''ny Kristiana tao Efesosy mba handrosoany hahalala ny hatsaran''ny famonjena, sy fampahatsiarovana azy ny halehiben''ny fitiavan''Andriamanitra'
  verse_text: 'Ary noho izany izaho koa, rehefa nandre ny finoanareo an''i Jesoa Tompo izay hitan*''ny olona masina rehetra, [*Na: (ny finoanareo an''i Jesoa Tompo sy ny fitiavanareo)]'
mg1865::mg_49::1::16:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tsy mitsahatra misaotra noho ny aminareo ka mahatsiaro anareo amin''ny fivavahako,'
mg1865::mg_49::1::17:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba homen''Andriamanitr''i Jesoa Kristy Tompontsika, Rain''ny voninahitra, ho anareo ny fanahin''ny fahendrena sy ny fanambarana amin''ny fahalalana Azy tsara,'
mg1865::mg_49::1::18:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hampahiratina ny mason''ny sainareo, mba ho fantatrareo izay fanantenana avy amin''ny fiantsoany sy izay haren''ny voninahitry ny lovany eo amin''ny olona masina,'
mg1865::mg_49::1::19:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny fihoaran''ny halehiben''ny heriny ho antsika izay mino, araka ny fiàsan''ny herin''ny faherezany,'
mg1865::mg_49::1::20:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nataony tao amin''i Kristy tamin''ny nananganany Azy tamin''ny maty sy ny nampitoerany Azy eo amin''ny tanany ankavanana any an-danitra,'
mg1865::mg_49::1::21:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ambony lavitra noho ny fanapahana rehetra sy ny fahefana sy ny hery sy ny fanjakana ary ny anarana rehetra izay tononina, tsy amin''izao fiainana izao ihany, fa amin''ny ho avy koa,'
mg1865::mg_49::1::22:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nampanaiky ny zavatra rehetra ho eo ambanin''ny tongony Izy ka nanao Azy ho Lohany manapaka ny zavatra rehetra ho an''ny fiangonana*, [*Grika: eklesia]'
mg1865::mg_49::1::23:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 1
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay tenany, dia ny fahafenoan''izay mameno izao zavatra rehetra izao amin''ny rehetra.'
mg1865::mg_49::2::1:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo dia efa novelominy, fony mbola matin''ny fahadisoanareo sy ny fahotanareo,'
mg1865::mg_49::2::2:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nalehanareo fahiny, araka ny fomban''izao tontolo izao, araka ny mpanapaka ny fanjakana eny amin''ny rivotra, dia ny fanahy izay miasa ankehitriny ao anatin''ny zanaky ny tsy fanarahana;'
mg1865::mg_49::2::3:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'teo amin''ireo no nitondrantsika rehetra tena koa fahiny tamin''ny filan''ny nofontsika, ka nanaovantsika ny danin''ny nofo sy ny saina; ary araka ny toetsika dia zanaky ny fahatezerana toy ny sasany koa isika.'
mg1865::mg_49::2::4:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Andriamanitra, Izay manan-karena amin''ny famindram-po, noho ny halehiben''ny fitiavany izay nitiavany antsika,'
mg1865::mg_49::2::5:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'na dia fony mbola matin''ny fahadisoana aza isika, dia nahavelona antsika niaraka tamin''i Kristy (fahasoavana no namonjena anareo)'
mg1865::mg_49::2::6:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary niara-natsangany isika ka niara-napetrany any an-danitra ao amin''i Kristy Jesoa,'
mg1865::mg_49::2::7:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hasehony amin''ny andro ho avy ny haben''ny haren''ny fahasoavany amin''ny fahamoram-panahiny amintsika ao amin''i Kristy Jesoa.'
mg1865::mg_49::2::8:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fahasoavana no namonjena anareo amin''ny finoana; ary tsy avy aminareo izany, fa fanomezana avy amin''Andriamanitra;'
mg1865::mg_49::2::9:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy avy amin''ny asa, fandrao hisy hirehareha.'
mg1865::mg_49::2::10:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa asany isika, voaforona tao amin''i Kristy Jesoa mba hanao asa tsara, izay namboarin''Andriamanitra rahateo mba handehanantsika eo aminy.'
mg1865::mg_49::2::11:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: 'Ny famindram-pon''Andriamanitra amin''ny jentilisa amin''ny andraisany azy ho ao amin''ny fiangonana'
  verse_text: 'Koa tsarovy fa fahiny ianareo izay jentilisa araka ny nofo, ka nolazain''ny voaforan-tanana teo amin''ny nofo hoe tsy voafora -'
mg1865::mg_49::2::12:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'eny, tsarovy fa tamin''izany andro izany dia tsy nanana an''i Kristy ianareo, fa olon-ko azy tamin''ny fanjakan''ny Isiraely ary vahiny tamin''ireo faneken''ny teny fikasana, dia tsy nanana fanantenana sady tsy nanana an''Andriamanitra teo amin''izao tontolo izao;'
mg1865::mg_49::2::13:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa ankehitriny kosa, ao amin''i Kristy Jesoa, ianareo izay lavitra fahiny dia efa nampanakeken''ny ran''i Kristy.'
mg1865::mg_49::2::14:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no fihavanantsika, Izay nahiray antsika roa tonta ka nandrava ny efitry ny fisarahana,'
mg1865::mg_49::2::15:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa tao amin''ny nofony no nandravany ny fandrafiana, dia ny lalàna nisy didy natao hotandremana, mba hanakambanany antsika roa tonta ao amin''ny tenany ho olom-baovao iray, ka hanaovany fihavanana,'
mg1865::mg_49::2::16:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hampihavana antsika roa tonta ho tena iray amin''Andriamanitra noho ny hazo fijaliana, izay namonoany ny fandrafiana.'
mg1865::mg_49::2::17:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga Izy ka nitory teny soa mahafaly milaza fihavanana* taminareo izay lavitra ary fihavanana* tamin''izay akaiky koa. * [* Na: fiadanana; izahao Isaia 57:19]'
mg1865::mg_49::2::18:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Izy no ananantsika roa tonta fanatonana amin''ny Fanahy iray ho any amin''ny Ray.'
mg1865::mg_49::2::19:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa dia tsy mba vahiny sy mpivahiny intsony ianareo, fa tompon-tany, mpiray fanjakana amin''ny olona masina sady ankohonan''Andriamanitra,'
mg1865::mg_49::2::20:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'natsangana teo ambonin''ny fanorenan''ny Apostoly sy ny mpaminany, ary Kristy Jesoa no fehizoro indrindra;'
mg1865::mg_49::2::21:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ao aminy no irafetan''ny rafitra rehetra, mitombo tsara ho tempoly masina ao amin''ny Tompo.'
mg1865::mg_49::2::22:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ao aminy no miaraka aorina koa ianareo ho fonenan''Andriamanitra amin''ny Fanahy.'
mg1865::mg_49::3::1:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanendrena an''i Paoly ho Apostolin''ny jentilisa, sy ny vavaka aman-tsaotra nataony ho an''ny fiangonana tao Efesosy'
  verse_text: 'Ary noho izany, izaho Paoly, mpifatotra an''i Kristy Jesoa, noho ny aminareo jentilisa, -'
mg1865::mg_49::3::2:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha mba renareo ny fitondrana ny fahasoavan''Andriamanitra izay nomena ahy ho anareo,'
mg1865::mg_49::3::3:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa fanambarana no nampahafantarana ahy ny zava-niafina, araka ny voasoratro tamin''ny teny fohifohy teo.'
mg1865::mg_49::3::4:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary araka izany, raha mamaky ianareo, dia ho hainareo fantarina ny fahafantarako ny zava-niafina ny amin''i Kristy,'
mg1865::mg_49::3::5:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay tsy mbola nampahafantarina ny zanak''olombelona tamin''ny taranaka lasa tahaka ny fanambaran''ny Fanahy ankehitriny amin''ny Apostoly masina sy ny mpaminany,'
mg1865::mg_49::3::6:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia ny ahatongavan''ny jentilisa ho mpiray lova sy ho tena iray ary ho mpiombona ny teny fikasana ao amin''i Kristy Jesoa noho ny filazantsara,'
mg1865::mg_49::3::7:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nanaovana ahy ho mpanompo araka ny fanomezan''ny fahasoavan''Andriamanitra, izay nomena ahy araka ny fiàsan''ny heriny.'
mg1865::mg_49::3::8:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Eny, izaho, izay kely noho ny kely indrindra amin''ny olona masina rehetra, no nomena izao fahasoavana izao, dia ny hitory amin''ny jentilisa ny haren''i Kristy tsy hita lany,'
mg1865::mg_49::3::9:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny hampahazava ny olona rehetra mba hahalalany izay fitondrana ny zava-miafina, dia Ilay voafina hatramin''ny nanaovana izao tontolo izao tao amin''Andriamanitra, Izay nanao ny zavatra rehetra;'
mg1865::mg_49::3::10:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampahafantarina ireo fanapahana sy fahefana any an-danitra amin''izao ankehitriny izao ny mahamaro samy hafa ny fahendren''Andriamanitra amin''ny fitondrany ny fiangonana*, [*Grika: eklesia]'
mg1865::mg_49::3::11:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny fikasana hatrizay hatrizay izay nataony tao amin''i Kristy Jesoa Tompontsika,'
mg1865::mg_49::3::12:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay ananantsika fahasahiana sy fanatonana amin''ny fahatokiana noho ny finoana Azy.'
mg1865::mg_49::3::13:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no angatahako aminareo mba tsy ho ketraka amin''ny fahoriako ho anareo, fa voninahitrareo izany.'
mg1865::mg_49::3::14:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany no andohalehako amin''ny Ray'
mg1865::mg_49::3::15:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay ahazoan''ny fianakaviana rehetra any an-danitra sy ety an-tany anarana,'
mg1865::mg_49::3::16:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba homeny anareo, araka ny haren''ny voninahiny, ny mba hohatanjahina fatratra amin''ny Fanahiny ny toe-panahinareo;'
mg1865::mg_49::3::17:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hitoeran''i Kristy ao am-ponareo amin''ny finoana, ka hamaka sy hiorina mafy amin''ny fitiavana ianareo,'
mg1865::mg_49::3::18:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: '2022-06-02T06:13:51+0000'
  verse_title: null
  verse_text: 'mba hahaizanareo mbamin''ny olona masina rehetra ny hahafantatra tsara izay sakany sy lavany ary hahavony sy halaliny.'
mg1865::mg_49::3::19:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary hahalala ny fitiavan''i Kristy, izay mihoatra noho ny fahalalana, mba hamenoana anareo ho amin''ny fahafenoan''Andriamanitra rehetra.'
mg1865::mg_49::3::20:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''izay mahay manao mihoatra noho ny zavatra rehetra, eny, mihoatra lavitra noho izay rehetra angatahintsika na heverintsika aza, araka ny hery izay miasa ato amintsika,'
mg1865::mg_49::3::21:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 3
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho Azy anie ny voninahitra ao amin''ny fiangonana* sy ao amin''i Kristy Jesoa hatramin''ny taranaka farany indrindra mandrakizay mandrakizay. Amena. [* Grika: eklesia]'
mg1865::mg_49::4::1:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fananarana azy mba hifanara-tsaina sy haharitra ary handroso tsara'
  verse_text: 'Ary noho izany izaho, mpifatotra noho ny amin*''ny Tompo, dia mangataka aminareo mba handeha miendrika ny fiantsoana izay niantsoana anareo, [*Grika: ao amin'']'
mg1865::mg_49::4::2:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny fanetren-tena rehetra sy ny fahalemem-panahy, amin''ny fahari-po mifandefitra amin''ny fitiavana,'
mg1865::mg_49::4::3:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'mazoto mitana ny firaisana avy amin''ny Fanahy amin''ny fehim-pihavanana.'
mg1865::mg_49::4::4:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iray ny tena, ary iray ny Fanahy, dia toy ny niantsoana anareo ho amin''ny fanantenana iray momba ny fiantsoana anareo;'
mg1865::mg_49::4::5:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'iray ny Tompo, iray ny finoana, iray ny batisa,'
mg1865::mg_49::4::6:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'iray Andriamanitra sady Rain''izy rehetra, Izay ambonin''izy rehetra sy manerana azy rehetra ary ao amin''izy rehetra.'
mg1865::mg_49::4::7:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa samy nomena ny fahasoavana araka ny ohatry ny fanomezan''i Kristy avy isika rehetra.'
mg1865::mg_49::4::8:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no ilazany hoe: Raha niakatra ho any amin''ny avo Izy, dia nitondra olona maro ho babo Ka nanome fanomezana ho an''ny olona (Salamo 68:18).'
mg1865::mg_49::4::9:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: '(Ary ny amin''ny hoe niakatra, inona moa izany, afa-tsy ny efa nidina* ho any ambanin''ny tany koa? [*Na: (nidina aloha)]'
mg1865::mg_49::4::10:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay nidina, dia Izy koa no Ilay niakatra any ambonin''ny lanitra rehetra, hamenoany ny zavatra rehetra.)'
mg1865::mg_49::4::11:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Izy no nanome ny sasany ho Apostoly, ary ny sasany ho mpaminany, ary ny sasany ho evanjelista, ary ny sasany ho mpiandry sy mpampianatra,'
mg1865::mg_49::4::12:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho fanatanterahana ny olona masina, ho amin''ny asan''ny fanompoana amin''ny fiangonana*, ho amin''ny fampandrosoana ny tenan''i Kristy, [*Grika: eklesia]'
mg1865::mg_49::4::13:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'mandra-pahatongantsika rehetra ho amin''ny firaisan''ny finoana sy ny fahalalana tsara ny Zanak''Andriamanitra, ka ho lehilahy lehibe, mahatratra ny ohatry ny halehiben''ny fahafenoan''i Kristy;'
mg1865::mg_49::4::14:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba tsy ho zaza intsony isika, ka ahilangilana sy ampitambolimbolenin''ny rivotry ny fampianarana samy hafa rehetra amin''ny saim-petsy ataon''ny olona sy ny fihendreny hahatanteraka ny hevitry ny famitahana;'
mg1865::mg_49::4::15:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mba hanaraka ny marina amin''ny fitiavana ka hitombo amin''ny ny zavatra rehetra ho amin''izay Loha, dia Kristy;'
mg1865::mg_49::4::16:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy no itomboan''ny tena rehetra (izay akambana sy ampiarahina tsara) noho ny fifanompoan''ny isan-tonony, araka ny fiàsan''izay rehetra momba azy amin''izay mety ho anjara-asany avy ka hampandrosoany ny tenany amin''ny fitiavana.'
mg1865::mg_49::4::17:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: 'Fananarana enti-mamporisika azy mba hadio fitondran-tena, ary tsy hanan-tsiny amin''ny toetry ny tokan-tranony'
  verse_text: 'Koa izao no lazaiko sady ambarako ao amin''ny Tompo: ny tsy mba handehananareo intsony tahaka ny fandehan''ny jentilisa amin''ny fahafoanan''ny sainy;'
mg1865::mg_49::4::18:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa efa tonga maizin-tsaina sy olon-ko azy amin''ny fiainan''Andriamanitra ireny noho ny tsy fahalalana ny anatiny, noho ny hamafin''ny fony,'
mg1865::mg_49::4::19:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona tsy mahalala henatra intsony ka nanolo-tena ho amin''ny fijejojejoana hanao izay fahalotoana rehetra amin''ny fieremana.'
mg1865::mg_49::4::20:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ianareo kosa, dia tsy mba toy izany no nianaranareo an''i Kristy,'
mg1865::mg_49::4::21:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'raha Izy tokoa no renareo ka tao aminy no nampianarana anareo, araka ny fahamarinana izay ao amin''i Jesoa,'
mg1865::mg_49::4::22:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hialanareo ny toetrareo* taloha araka ny fitondran-tenanareo fahiny, izay mihasimba araka ny filan''ny fitaka; [*Grika: olonareo]'
mg1865::mg_49::4::23:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa mba hohavaozina kosa ianareo amin''ny fanahin''ny sainareo,'
mg1865::mg_49::4::24:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hotafinareo ny toetra* vaovao, izay noforonina araka an''Andriamanitra amin''ny fahitsiana sy ny fahamasinana momba ny fahamarinana. [*Grika: olona]'
mg1865::mg_49::4::25:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa esory ny lainga, ka samia milaza ny marina amin''ny namany avy ianareo rehetra; fa samy isan''ny momba ny tenan''ny namantsika avokoa isika.'
mg1865::mg_49::4::26:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tezera, fa aza manota; ary aoka tsy ho tratry ny masoandro milentika ny fahatezeranareo.'
mg1865::mg_49::4::27:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza manome fitoerana ho an''ny devoly.'
mg1865::mg_49::4::28:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izay nangalatra tsy hangalatra intsony; fa aleo hikely aina ka hiasa izay tsara amin''ny tanany, mba hisy homeny izay tsy manana.'
mg1865::mg_49::4::29:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy haloaky ny vavanareo izay teny maloto, fa izay tsara ho fampandrosoana, araka izay tokony hanaovana, mba hahazoan''ny mihaino fahasoavana.'
mg1865::mg_49::4::30:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza mampalahelo ny Fanahy Masin''Andriamanitra, Izay nanisiana tombo-kase anareo ho amin''ny andro fanavotana.'
mg1865::mg_49::4::31:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Esory aminareo ny fo-lentika* rehetra sy ny fahavinirana sy ny fahatezerana sy ny fitabatabana sy ny fitenenan-dratsy ary ny lolompo rehetra; [*Grika: fangidiana]'
mg1865::mg_49::4::32:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 4
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary aoka samy halemy fanahy amin''ny namany avy ianareo, ka hifampiantra sy hifamela heloka, tahaka ny namelan''Andriamanitra ny helokareo ao amin''i Kristy.'
mg1865::mg_49::5::1:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa amin''izany dia aoka hanahaka an''Andriamanitra ianareo tahaka ny zanaka malala;'
mg1865::mg_49::5::2:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mandehana amin''ny fitiavana, toy ny nitiavan''i Kristy anareo, dia ny nanolorany ny tenany ho fanatitra sy ho fanavotana* amin''Andriamanitra, ho hanitra ankasitrahana, hamonjy antsika. [*Grika: fanatitra alatsa-drà]'
mg1865::mg_49::5::3:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fijangajangana sy ny fahalotoana rehetra, na ny fieremana, dia aza avela hotononina eo aminareo akory aza, fa tsy mahamendrika ny olona masina izany,'
mg1865::mg_49::5::4:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'na fahavetavetana, na resaka fahadalana, na voso-dratsy, izay tsy tokony hatao, fa aleo misaotra.'
mg1865::mg_49::5::5:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa fantatrareo marimarina fa samy tsy manana lova eo amin''ny fanjakan''i Kristy sy Andriamanitra na ny mpijangajanga rehetra, na ny olom-betaveta, na ny olona mierina (mpanompo sampy izany).'
mg1865::mg_49::5::6:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mety hofitahin''olona amin''ny teny foana ianareo; fa izany zavatra izany no mahatonga ny fahatezeran''Andriamanitra amin''ny zanaky ny tsy fanarahana.'
mg1865::mg_49::5::7:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa aza mety ho mpiombona aminy ianareo.'
mg1865::mg_49::5::8:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa maizina ianareo fahiny, fa efa mazava ao amin''ny Tompo kosa ankehitriny; mandehana tahaka ny zanaky ny mazava'
mg1865::mg_49::5::9:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa ny vokatry ny mazava dia ao amin''ny fahatsarana rehetra sy ny fahamarinana ary ny fahitsiana),'
mg1865::mg_49::5::10:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'mamantatra izay ankasitrahan''ny Tompo.'
mg1865::mg_49::5::11:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza miray amin''ny asan''ny maizina tsy mahavoka-tsoa, fa aleo mananatra izany.'
mg1865::mg_49::5::12:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay ataony ao amin''ny miafina, dia mahamenatra na dia ny milaza izany aza.'
mg1865::mg_49::5::13:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zavatra rehetra, raha anarina, dia asehon''ny mazava; fa na inona na inona aseho dia mazava.'
mg1865::mg_49::5::14:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa izany no ilazany hoe: Mifohaza ianao izay matory, Ary mitsangàna amin''ny maty, Dia hampahazava anao Kristy.'
mg1865::mg_49::5::15:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tandremo tsara izay fandehanareo, mba tsy hitondranareo tena tahaka ny adala, fa tahaka ny hendry,'
mg1865::mg_49::5::16:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hararaoty ny andro azo anaovan-tsoa, fa ratsy izao fiainana izao.'
mg1865::mg_49::5::17:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany dia aza manao adaladala, fa aoka ho fantatrareo izay sitrapon''ny Tompo.'
mg1865::mg_49::5::18:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aza ho mamon-divay ianareo, fa amin''izany dia misy fanaranam-po amin''ny ratsy, fa aoka hofenoina ny Fanahy,'
mg1865::mg_49::5::19:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka mifampilazà amin''ny salamo sy ny fihirana ary ny tonon-kiram-panahy, dia mihira sy mikalo ao am-ponareo ho an''ny Tompo,'
mg1865::mg_49::5::20:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'misaotra an''Andriamanitra Ray mandrakariva noho ny zavatra rehetra, amin''ny anaran''i Jesoa Kristy Tompontsika,'
mg1865::mg_49::5::21:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady mifanaiky amin''ny fahatahorana an''i Kristy,'
mg1865::mg_49::5::22:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo vehivavy, maneke ny vadinareo tahaka ny anekena ny Tompo.'
mg1865::mg_49::5::23:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny lahy no lohan''ny vavy, dia tahaka an''i Kristy koa no Lohan''ny fiangonana*; ary Izy no mpamonjy ny tena. [*Grika: eklesia]'
mg1865::mg_49::5::24:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tahaka ny aneken''ny fiangonana* an''i Kristy no haneken''ny vavy ny lahy koa amin''ny zavatra rehetra. [*Grika: eklesia]'
mg1865::mg_49::5::25:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo lehilahy, tiava ny vadinareo, dia tahaka ny nitiavan''i Kristy ny fiangonana* ka nanolorany ny tenany hamonjy azy, [*Grika: eklesia]'
mg1865::mg_49::5::26:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahamasina azy amin''ny anadiovany azy amin''ny rano fanasana amin''ny teny;'
mg1865::mg_49::5::27:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba horaisiny* ho an''ny tenany izany ho fiangonana** malaza tsy misy pentimpentina, na fiketronana, na izay toy izany, fa mba ho masina sady tsy misy tsiny izy. [*Grika: hatolony] [** Grika: eklesia]'
mg1865::mg_49::5::28:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia tahaka izany koa, ny lehilahy tokony ho tia ny vadiny tahaka ny tenany ihany. Izay tia ny vadiny dia tia ny tenany.'
mg1865::mg_49::5::29:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy mba nisy olona tsy tia ny nofony, fa mamelona sy mitaiza azy, dia tahaka an''i Kristy amin''ny fiangonana*; [* Grika: eklesia]'
mg1865::mg_49::5::30:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa momba ny tenany isika.'
mg1865::mg_49::5::31:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hiray amin''ny vadiny, ary dia ho nofo iray ihany izy roroa (Genesisy 2:24).'
mg1865::mg_49::5::32:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Zava-miafina lehibe izany; fa milaza ny amin''i Kristy sy ny fiangonana* aho. [*Grika: eklesia]'
mg1865::mg_49::5::33:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 5
  verse_number: 33
  verse_date_revised: null
  verse_title: null
  verse_text: 'Na dia izany aza, samia tia ny vadiny tahaka ny tenany ianareo lehilahy rehetra, ary aoka kosa ny vavy hanaja* ny lahy. * [* Grika: hatahotra]'
mg1865::mg_49::6::1:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaka, maneke ny ray sy ny reninareo ao amin''ny Tompo, fa marina izany.'
mg1865::mg_49::6::2:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manajà ny ray sy ny reninao (fa izany no didy voalohany misy teny fikasana),'
mg1865::mg_49::6::3:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hahita soa ianao sy ho maro andro ambonin''ny tany (Deoteronomia 5:16).'
mg1865::mg_49::6::4:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo ray, aza mampahatezitra ny zanakareo, fa tezao amin''ny famaizana sy ny fananaran''ny Tompo izy.'
mg1865::mg_49::6::5:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianareo mpanompo, maneke ny tomponareo araka ny nofo amin''ny fahatahorana sy ny fangovitana, amin''ny fahatsoran''ny fonareo, toy ny fanekena an''i Kristy ihany,'
mg1865::mg_49::6::6:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy amin''ny fanompoana eo imaso, tahaka ny mpila sitraka amin''olona, fa tahaka ny mpanompon''i Kristy manao izay sitrapon''Andriamanitra amin''ny fo,'
mg1865::mg_49::6::7:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny sitrapo manao fanompoana toy ny amin''ny Tompo, fa tsy amin''olona,'
mg1865::mg_49::6::8:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria fantatrareo fa izay soa ataon''ny olona rehetra no horaisiny amin''ny Tompo, na andevo na tsy andevo izy.'
mg1865::mg_49::6::9:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ianareo tompo, manaova toy izany aminy kosa, ka atsaharo ny fandrahonana, satria fantatrareo fa ny Tompony sady Tomponareo koa dia any an-danitra; ary tsy misy fizahan-tavan''olona aminy.'
mg1865::mg_49::6::10:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: 'Ny adim-panahin''ny Kristiana, sy ny fiadiana atolotr''Andriamanitra azy'
  verse_text: 'Farany, mahereza ao amin''ny Tompo sy amin''ny herin''ny faherezany.'
mg1865::mg_49::6::11:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tafio avokoa ny fiadian''Andriamanitra, mba hahazoanareo hifahatra amin''ny fanangolen''ny devoly.'
mg1865::mg_49::6::12:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa isika tsy mitolona amin''ny nofo aman-drà, fa amin''ny fanapahana sy amin''ny fanjakana sy amin''ny mpanjakan''izao fahamaizinana izao, dia amin''ny fanahy ratsy eny amin''ny rivotra*. [*Grika: lanitra]'
mg1865::mg_49::6::13:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary noho izany, dia raiso avokoa ny fiadian''Andriamanitra, mba hahazoanareo hanohitra amin''ny andro mahory; ary rehefa vitanareo avokoa, dia hahafahatra ianareo.'
mg1865::mg_49::6::14:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mifahara ary, ka sikino fahamarinana ny valahanareo, ary mitafia ny rariny ho fiarovan-tratra,'
mg1865::mg_49::6::15:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary kiraroy ny fahavononam-panahy avy amin''ny filazantsaran''ny fihavanana ny tongotrareo;'
mg1865::mg_49::6::16:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho fanampin''izany rehetra izany dia tano ny finoana ho ampinga, izay hahazoanareo hamono ny zana-tsipïka mirehitra rehetra izay alefan''ilay ratsy.'
mg1865::mg_49::6::17:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raiso ny famonjena ho fiarovan-doha sy ny tenin''Andriamanitra ho sabatry ny Fanahy;'
mg1865::mg_49::6::18:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mivavaha mandrakariva ao amin''ny Fanahy amin''ny fivavahana rehetra sy ny fangatahana, ka miambena amin''izany amin''ny faharetana sy ny fangatahana rehetra ho an''ny olona masina rehetra,'
mg1865::mg_49::6::19:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ho ahy koa mba homena ahy ny hiloa-bava amin''ny fahasahiana hampahafantatra ny zava-miafina momba ny filazantsara'
mg1865::mg_49::6::20:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: '(iraka* migadra noho izany aho), mba hiteny izany amin''ny fahasahiana aho, toy izay mety hoteneniko. [*Grika: ambasadôro]'
mg1865::mg_49::6::21:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mba ho fantatrareo koa izay toetro, dia Tykiko, rahalahy malala sady mpanompo mahatoky ao amin''ny Tompo, no hampahalala anareo ny zavatra rehetra;'
mg1865::mg_49::6::22:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'izy no nirahiko hilaza izany zavatra izany indrindra aminareo, mba ho fantatrareo ny toetray, ary mba hamporisihiny ny fonareo.'
mg1865::mg_49::6::23:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fiadanana anie ho an''ny rahalahy ary fitiavana mbamin''ny finoana avy amin''Andriamanitra Ray sy Jesoa Kristy Tompo.'
mg1865::mg_49::6::24:
  verse_version: mg1865
  verse_book: mg_49
  verse_chapter: 6
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahasoavana anie ho amin''izay rehetra tia an''i Jesoa Kristy Tompontsika amin''ny fitiavana tsy mety levona. Amena.'
