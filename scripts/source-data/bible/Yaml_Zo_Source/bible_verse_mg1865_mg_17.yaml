mg1865::mg_17::1::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fanasana lehibe nataon''i Ahasoerosy, ary ny nanesorana an''i Vasty vadiny'
  verse_text: 'Ary tamin''ny andro nanjakan''i Ahasoerosy (ity Ahasoerosy ity ilay nanjaka hatrany India ka hatrany Etiopia, ka nizarazara ho fito amby roa-polo amby zato toko ny fanjakany),'
mg1865::mg_17::1::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia tamin''izany andro izany, raha nipetraka teo ambonin''ny seza fiandrianan''ny fanjakany, izay tany Sosana renivohitra, Ahasoerosy mpanjaka,'
mg1865::mg_17::1::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny taona fahatelo nanjakany, dia nanao fanasana ho an''ny mpanapaka sy ny mpanompony rehetra izy; ary teo anatrehany koa ny lehiben''ny miaramilan''i Persia sy Media sy ny mpanapaka mbamin''ireo komandin''ny isan-tokony amin''ny fanjakany;'
mg1865::mg_17::1::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nasehony andro maro, dia valo-polo amby zato andro, ny harena amam-boninahitry ny fanjakany ary ny tabiha sy rehareha momba ny fahalehibiazany.'
mg1865::mg_17::1::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tapitra izany andro izany, ny olona rehetra izay tany Sosana renivohitra, na lehibe na kely, dia nanaovan''ny mpanjaka fanasana naharitra hafitoana teo amin''ny kianjan''ny tanimbolin''ny tranon''ny mpanjaka;'
mg1865::mg_17::1::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nisy lamba fotsy sy misoratsoratra sy manga nifehy tamin''ny kofehy rongony fotsy sy volomparasy tamin''ny masom-bolafotsy sy tsangantsangany vato marmora fotsy; ary nisy farafara volamena sy volafotsy teo amin''ny lampivato alabastara sy marmora fotsy sy hara ary marmora mainty.'
mg1865::mg_17::1::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny olona dia nampisotroina tamin''ny kapoaka volamena (samy hafa avokoa ny kapoaka,) ary betsaka ny divain''andriana araka ny fanomen''ny mpanjaka.'
mg1865::mg_17::1::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny nisotroan''ny olona dia araka ny tenin''andriana, ka tsy nisy nanery; fa toy izany no nandidian''ny mpanjaka ny mpitandrina ny tranony rehetra mba hanaovan''ny olona araka izay sitrapony avy.'
mg1865::mg_17::1::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Vasty, vadin''ny mpanjaka, dia mba nanao fanasana ho an''ny vehivavy koa tao amin''ny tranom-panjakana, izay an''i Ahasoerosy mpanjaka.'
mg1865::mg_17::1::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny andro fahafito, nony faly ny fon''ny mpanjaka azon''ny divay, dia nomeny teny Mehomana sy Bizta sy Harbona sy Bigta sy Abagta sy Zetara ry Karkasa, tsindranolahy* fito izay nanompo teo anatrehan''i Ahasoerosy mpanjaka, [*Hebreo: ionoka]'
mg1865::mg_17::1::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: '2022-06-20T04:13:02+0000'
  verse_title: null
  verse_text: 'mba hitondra an''i Vasty, vadin''ny mpanjaka, ho eo anatrehan''ny mpanjaka, misatroka ny satro-boninahitry ny fanjakana, mba haseho amin''ny olona sy ny mpanapaka ny hatsaran-tarehiny; fa maha-te-hizaha izy.'
mg1865::mg_17::1::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Vasty, vadin''ny mpanjaka, nandà ny tenin''ny mpanjaka nentin''ny tsindranolahy* ka tsy nety nankany. Dia tezitra loatra ny mpanjaka, ka nirehitra tao am-pony ny fahatezerany. [*Hebreo: ionoka]'
mg1865::mg_17::1::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka tamin''ny olon-kendry izay mpanandro (toy izany no nanaovana ny raharahan''ny mpanjaka teo anatrehan''izay rehetra nahalala lalàna sy fitsarana;'
mg1865::mg_17::1::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ny teo akaikiny dia Rarsena, Setara, Admata, Tarsisy, Maresa, Marsena, Memokana, mpanapaka fito tamin''i Persia sy Media, izay nahita ny tarehin''ny mpanjaka ka nipetraka tamin''ny fitoerana aloha teo amin''ny fanjakana):'
mg1865::mg_17::1::15:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ahoana no hanaovana an''i Vasty, vadin''ny mpanjaka, raha araka ny lalàna, satria tsy nankatò ny didiko, izaho Ahasoerosy mpanjaka, nentin''ny tsindranolahy* izy? [*Hebreo: ionoka]'
mg1865::mg_17::1::16:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Memokana teo anatrehan''ny mpanjaka sy ny mpanapaka ka nanao hoe: Tsy tamin''ny mpanjaka ihany no nanaovan''i Vasty, vadin''ny mpanjaka, izao ratsy izao, fa tamin''ny mpanapaka rehetra koa sy ny vahoaka rehetra isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka;'
mg1865::mg_17::1::17:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hiely any amin''ny vehivavy rehetra izao zavatra nataon''ny vadin''ny mpanjaka izao, ka hanaovany ny vadiny ho tsinontsinona eo imasony, fa samy hanao hoe: Ahasoerosy mpanjaka aza nandidy an''i Vasty vadiny ho entina eo anatrehany, nefa tsy nety izy.'
mg1865::mg_17::1::18:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary na dia amin''izao andro izao aza ny andriambavin''i Persia sy Media, izay mandre ny nataon''ny vadin''ny mpanjaka, dia samy hilaza izany amin''ny mpanapaka rehetra voatendrin''ny mpanjaka; ka dia ho loza loatra ny famingavingana sy ny faniratsirana.'
mg1865::mg_17::1::19:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa raha sitraky ny mpanjaka, dia aoka hisy didim-panjakana hivoaka avy eto amin''ny mpanjaka ka hosoratana ao amin''ny lalàn''i Persia sy Media ka dia tsy hovana, fa tsy hahazo hankeo anatrehan''i Ahasoerosy mpanjaka intsony Vasty; ary ny voninahitr''i Vasty dia aoka homen''ny mpanjaka ho an''izay vehivavy hafa tsara noho izy.'
mg1865::mg_17::1::20:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha torina eran''ny fanjakany rehetra (fa lehibe izany) ny lalàn''ny mpanjaka izay hataony, dia samy hanome voninahitra ny vadiny avy na lehibe na kely, ny vehivavy rehetra.'
mg1865::mg_17::1::21:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia sitraky ny mpanjaka sy ny mpanapaka izany teny izany; ka dia nanao araka ny tenin''i Memokana ny mpanjaka,'
mg1865::mg_17::1::22:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 1
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka nampitondra taratasy izy ho any amin''ny isan-tokony amin''ny fanjakan''ny mpanjaka, dia isan-tokony araka ny sorany avy, ary isam-pirenena araka ny fiteniny avy, mba hahatapaka ny ao an-tranony avy ny lehilahy rehetra, ary samy hiteny araka ny fiteniny avy isam-pirenena.'
mg1865::mg_17::2::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nifidianana an''i Estera ho vadin''i Ahasoerosy'
  verse_text: 'Rehefa afaka izany, nony efa nionona ny fahatezeran''i Ahasoerosy mpanjaka, dia nahatsiaro an''i Vasty sy izay efa nataony izy ary ny efa nitsarana azy.'
mg1865::mg_17::2::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy ireo zatovon''ny mpanjaka izay nanompo azy: Aoka ny mpanjaka hitadiavana zazavavy virijina tsara tarehy;'
mg1865::mg_17::2::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: '2022-06-21T11:27:38+0000'
  verse_title: null
  verse_text: 'ary aoka ny mpanjaka hanendry olona any amin''ny isan-tokony eran''ny fanjakany rehetra, dia aoka hovorin''ireny ny zazavavy virijina tsara tarehy rehetra ho ato Sosana renivohitra ho ao an-tranom-behivavy amin''ny fehin''i Hegay, tsindranolahin*''ny mpanjaka, mpifehy ny vehivavy; ary aoka homena ny zavatra fidiovany izy, [*Heb: ionoka]'
mg1865::mg_17::2::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa izay zazavavy sitraky ny mpanjaka no aoka hanjaka hisolo an''i Vasty. Dia sitraky ny mpanjaka izany teny izany, ka dia nataony.'
mg1865::mg_17::2::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nisy Jiosy anankiray tany Sosana renivohitra. Mordekay no anarany, zanak''i Jaira, zanak''i Simey, zanak''i Kisy, avy tamin''ny taranak''i Benjamina,'
mg1865::mg_17::2::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay efa nentina ho babo avy tany Jerosalema tamin''ny babo izay nentina niaraka tamin''i Jekonia, mpanjakan''ny Joda, izay nobaboin''i Nebokadnezara, mpanjakan''i Babylona.'
mg1865::mg_17::2::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izy nitaiza an''i Hadasa (Estera izany), zanakavavin''ny rahalahin-drainy, izay tsy nanana ray sy reny intsony; ary razazavavy dia soa sady tsara tarehy, ary noraisin''i Mordekay ho zanany izy, rehefa maty rainy sy reniny.'
mg1865::mg_17::2::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: '2022-06-21T11:23:02+0000'
  verse_title: null
  verse_text: 'Koa nony re ny tenin''ny mpanjaka sy ny lalàny, ka voavory tany Sosana renivohitra ny zazavavy maro ho amin''ny fehin''i Hegay, dia mba nentina ho ao an-tranon''ny mpanjaka koa Estera ho amin''ny fehin''i Hegay, mpifehy ny vehivavy.'
mg1865::mg_17::2::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nahafaly azy razazavavy ka nahita fitia teo imasony; dia nomeny faingana an-drazazavavy ny zavatra fidiovany sy ny anjara-haniny ary ny ankizivavy fito izay voafantina homena azy avy tao an-tranon''ny mpanjaka; ary nafindrany ho ao amin''ny fitoerana tsara indrindra ao an-tranom-behivavy izy sy ny ankizivaviny.'
mg1865::mg_17::2::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: '2022-04-18T04:55:20+0000'
  verse_title: null
  verse_text: 'Nefa Estera tsy mbola nilaza ny fireneny na ny fianakaviany, satria nofeperan''i Mordekay mba tsy hilaza izany izy.'
mg1865::mg_17::2::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mordekay nitsangantsangana isanandro teo anoloan''ny kianjan''ny tranom-behivavy, mba hahafantarany izay toetran''i Estera sy izay anaovana azy.'
mg1865::mg_17::2::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony tonga ny andro hidiran''ny zazavavy tsirairay isan''andro tany amin''i Ahasoerosy mpanjaka, rehefa tapitra taminy ny roa ambin''ny folo volana, araka ny fomba fanomanana ny vehivavy (fa tapitra tamin''izay ny andro fidiovany, dia enim-bolana tamin''ny diloilo nisy miora, ary enim-bolana tamin''ny zava-manitra sy ny zavatra sasany koa fidiovan''ny vehivavy),'
mg1865::mg_17::2::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa nony hiditra ao amin''ny mpanjaka ny zazavavy tamin''izany, dia nomena azy izay rehetra nilainy ho entiny avy amin''ny tranom-behivavy ho ao an-tranon''ny mpanjaka.'
mg1865::mg_17::2::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: '2022-06-21T11:27:09+0000'
  verse_title: null
  verse_text: 'Tamin''ny hariva no nandeha izy, ary nony maraina dia niverina izy ho ao an-trano faharoa nitoeran''ny vehivavy, ho amin''ny fehin''i Sasegaza, tsindranolahin*''ny mpanjaka, mpitandrina ny vaditsindrano; ary tsy mba niditra tao amin''ny mpanjaka intsony izy, raha tsy tian''ny mpanjaka, ka voatonona ny anarany. [*Heb: ionoka]'
mg1865::mg_17::2::15:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa tonga ny anjara-andron''i Estera, zanakavavin''i Abihaila, rahalahin-drain''i Mordekay izay efa nandray azy ho zananivavy, hidirany ao an-tranon''ny mpanjaka, dia tsy nila na inona na inona izy mihoatra noho izay notononin''i Hegay, tsindranolahin*'' ny mpanjaka, mpitandrina ny vehivavy. Ary Estera nahita fitia teo imason''ny olona rehetra izay nijery azy.'
mg1865::mg_17::2::16:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nentina ho ao amin''i Ahasoerosy mpanjaka Estera, ho ao an-tranon''ny fanjakana, tamin''ny volana fahafolo (volana Tebeta izany) tamin''ny taona fahafito nanjakany.'
mg1865::mg_17::2::17:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tian''ny mpanjaka mihoatra noho ny vehivavy rehetra Estera, ka nahita fitia sy sitraka teo imasony mihoatra noho ny virijina rehetra izy, ka dia nosatrohany ny satro-boninahitry ny fanjakana izy ka nampanjakainy hisolo an''i Vasty.'
mg1865::mg_17::2::18:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nanao fanasana lehibe ho an''ny mpanapaka rehetra sy ny mpanompony, dia fanasan''i Estera izany; ary nanendry andro fifaliana ho an''ny fanjakana rehetra isan-tokony izy sady nanome zavatra araka ny fanomen''ny mpanjaka.'
mg1865::mg_17::2::19:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha nisy virijina novorina fanindroany, dia nipetraka teo am-bavahadin''ny mpanjaka Mordekay.'
mg1865::mg_17::2::20:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa Estera tsy mbola nilaza izay fianakaviany na izay fireneny, araka ilay nameperan''i Mordekay azy ihany; fa ny tenin''i Mordekay dia nankatoavin''i Estera tahaka ny fony Izy mbola nitaiza azy ihany.'
mg1865::mg_17::2::21:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 21
  verse_date_revised: '2022-06-21T11:27:24+0000'
  verse_title: null
  verse_text: 'Tamin''izany andro izany, raha Mordekay nipetraka teo am-bavahadin''ny mpanjaka, dia tezitra Bigtana sy Taresy, roa lahy isan''ny tsindranolahin*''ny mpanjaka, dia ilay mpiambina teo am-baravarana, ka nitady hamono an''i Ahasoerosy mpanjaka izy. [*Heb: ionoka]'
mg1865::mg_17::2::22:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary fantatr''i Mordekay izany ka nambarany tamin''i Estera, vadin''ny mpanjaka; dia nambaran''i Estera tamin''ny mpanjaka kosa izany araka ny nampilazain''i Mordekay azy.'
mg1865::mg_17::2::23:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 2
  verse_number: 23
  verse_date_revised: '2022-06-21T11:25:11+0000'
  verse_title: null
  verse_text: 'ary rehefa nodinihina izany zavatra izany, dia, indro, marina; ka dia nahantona tamin''ny hazo izy roa lahy; ary nosoratana tao amin''ny bokin''ny tantara teo anatrehan''ny mpanjaka izany.'
mg1865::mg_17::3::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny fahasosoran''i Hamana tamin''i Mordekay, sy ny hevitra nataony handringanana ny Jiosy'
  verse_text: 'Rehefa afaka izany zavatra izany, dia nasandratr''i Ahasoerosy mpanjaka Hamana, zanak''i Hamedota Agagita, ka nomeny voninahitra, ary ny sezany nataony teo alohan''ny an''ny mpanapaka rehetra izay teo aminy.'
mg1865::mg_17::3::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanompon''ny mpanjaka rehetra izay teo am-bavahadin''ny mpanjaka dia nandohalika sy niankohoka teo anatrehan''i Hamana; fa izany no didin''ny mpanjaka. Fa Mordekay kosa tsy mba nety nandohalika na niankohoka.'
mg1865::mg_17::3::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanompon''ny mpanjaka izay teo am-bavahadin''ny mpanjaka tamin''i Mordekay: Nahoana ianao no mandika ny didin''ny mpanjaka?'
mg1865::mg_17::3::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na dia niteny taminy isan''andro aza ireo, dia tsy mba nihaino azy izy, ka nolazain''Ireo tamin''i Hamana, mba hizahany na haharitra amin''ny teniny ihany Mordekay, na tsia; fa efa nilaza tamin''ireo izy fa Jiosy.'
mg1865::mg_17::3::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary rehefa hitan''i Hamana fa Mordekay tsy mba nety nandohalika na niankohoka teo anatrehany, dia tezitra loatra izy.'
mg1865::mg_17::3::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nataon''i Hamana ho zavatra kely loatra ny haninji-tanana hamely an''i Mordekay irery ihany (fa efa nambara azy ny firenen''i Mordekay), ka dia nitady handringana ny Jiosy rehetra eran''ny fanjakan''i Ahasoerosy koa izy, dia ny firenen''i Mordekay.'
mg1865::mg_17::3::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tamin''ny volana voalohany (volana Nisana izany) tamin''ny taona faharoa ambin''ny folo nanjakan''i Ahasoerosy mpanjaka, nisy nanao pora (filokana izany) teo anatrehan''i Hamana ny amin''ny isan''andro isan''andro sy ny isam-bolana isam-bolana hatramin''ny volana faharoa ambin''ny folo (volana Adara izany)'
mg1865::mg_17::3::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: '2022-06-25T06:41:54+0000'
  verse_title: null
  verse_text: 'Ary hoy Hamana tamin''i Ahasoerosy mpanjaka: Misy firenena iray efa miely sy mihahaka eny amin''ny firenena samy hafa isan-tokony eran''ny fanjakanao; ary hafa lalàna noho ny firenena rehetra ireny sady tsy mba mankatò ny lalàn''ny mpanjaka; ary tsy mendrika amin''ny mpanjaka ny hamela azy ho eny;'
mg1865::mg_17::3::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'koa raha sitraky ny mpanjaka, aoka hosoratana mba haringana ireny, dia handoa talenta volafotsy iray alina ho eo an-tanan''ny mpanao raharaha aho ho entina ao an-trano firaketan''ny mpanjaka.'
mg1865::mg_17::3::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nesorin''ny mpanjaka tamin''ny tanany ny peratra fanombohany ka nomeny an''i Hamana, zanak''i Hamedota Agagita, fahavalon''ny Jiosy.'
mg1865::mg_17::3::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Hamana: Homena anao ihany ny volafotsy sy ny olona koa hanaovanao azy araka izay sitrakao.'
mg1865::mg_17::3::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nantsoina ny mpanoratry ny mpanjaka tamin''ny andro fahatelo ambin''ny folo tamin''ny volana voalohany, ka nosoratana izany araka izay rehetra nandidian''i Hamana ho an''ny solo-mpanjaka sy ny governora tamin''ny isan-tokony ary ny mpanapaka ny firenena rehetra, ho any amin''ny isan-tokony araka ny sorany avy, ary ho amin''ny isam-pirenena araka ny fiteniny avy; dia tamin''ny anaran''i Ahasoerosy mpanjaka no nanoratany azy ka notombohiny tamin''ny peratra fanombohan''ny mpanjaka.'
mg1865::mg_17::3::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny taratasy dia nampitondrainy ny tsimandoa ho any amin''ny isan-tokony amin''ny fanjakan''ny mpanjaka mba hampandringana sy hampamono ary hampandripaka ny Jiosy rehetra, na tanora na antitra hatramin''ny zaza amim-behivavy aza, amin''ny indray andro monja, dia tamin''ny andro fahatelo ambin''ny folo tamin''ny volana faharoa ambin''ny folo (volana Adara izany), ary handroba ny fananany.'
mg1865::mg_17::3::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kopen''ny teny izay natao didy ho amin''ny isan-tokony amin''ny fanjakana dia nisokatra mba ho hitan*''ny olona rehetra hampiomana azy ho amin''izany andro izany. [*Na: dia novakina tamin'']'
mg1865::mg_17::3::15:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka ny tsimandoa, ka nododonan''ny tenin''ny mpanjaka; ary nantsoina tany Sosana renivohitra koa ny lalàna. Ary ny mpanjaka sy Hamana nipetraka hisotro; fa ny tao an-tanàna Sosana kosa dia very hevitra.'
mg1865::mg_17::4::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny alahelon''ny Jiosy, ary ny nataon''i Mordekay sy Estera mba tsy hahatanterahan''i Hamana izay nokasainy'
  verse_text: 'Nony fantatr''i Mordekay izay rehetra efa natao, dia nandriatra ny fitafiany izy ka nitafy lamba fisaonana sady nihosin-davenona, dia nankeo afovoan''ny tanàna ka nitaraina sy nidradradradra mafy;'
mg1865::mg_17::4::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tonga teo anoloan''ny vavahadin''ny mpanjaka aza izy; nefa tsy nisy nahazo niditra teo amin''ny vavahadin''ny mpanjaka, raha nitafy lamba fisaonana.'
mg1865::mg_17::4::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany amin''ny isan-tokony tamin''ny fanjakana rehetra nalehan''ny tenin''ny mpanjaka sy ny didiny dia nalahelo mafy ny Jiosy ka nifady hanina sy nitomany ary nidradradradra, sady maro no nandry tamin''ny lamba fisaonana aman-davenona.'
mg1865::mg_17::4::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary niditra ny ankizivavin''i Estera sy ny tsindranolahiny* ka nilaza izany taminy. Dia nalahelo indrindra ny vadin''ny mpanjaka, ka nampanatitra lamba hitafin''i Mordekay izy mba hanesorany ny lamba fisaonana taminy; nefa tsy nety nandray izy. [*Hebreo: ionoka]'
mg1865::mg_17::4::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Estera niantso an''i Hatàka, tsindranolahin*'' ny mpanjaka, izay notendreny hanompo azy, ka nampitondra teny azy ho any amin''i Mordekay, mba hahafantarany izay anton''izany.'
mg1865::mg_17::4::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka Hatàka nankany amin''i Mordekay ho eo an-kalalahana eo an-tanàna, dia ilay eo anoloan''ny vavahadin''ny mpanjaka;'
mg1865::mg_17::4::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nambaran''i Mordekay taminy izay rehetra efa nanjo azy sy ny isan''ny vola izay nokasain''i Hamana haloa ho ao an-trano firaketan''ny mpanjaka noho ny handringanana ny Jiosy.'
mg1865::mg_17::4::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nomeny azy koa ny kopen''ny lalàna, izay nantsoina tany Sosana handringanana azy, mba haseho amin''i Estera hampahafantatra azy izany sy handidy azy hiditra ao amin''ny mpanjaka mba hifona aminy sy hangataka eo anatrehany ho an''ny fireneny.'
mg1865::mg_17::4::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tonga Hatàka ka nanambara ny tenin''i Mordekay tamin''i Estera.'
mg1865::mg_17::4::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Estera naniraka an''i Hatàka indray hanao amin''i Mordekay hoe:'
mg1865::mg_17::4::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny mpanompon''ny mpanjaka rehetra sy ny olona isan-tokony eran''ny fanjakany dia samy mahalala fa na iza na iza mankeo amin''ny mpanjaka ho eo an-kianja anatiny, na lehilahy na vehivavy, nefa tsy nantsoina, dia misy lalàna iray ihany hahafaty azy, afa-tsy izay hotondroin''ny mpanjaka amin''ny tehim-bolamena hahavelona azy; ary izaho anefa dia tsy mbola nantsoina hiditra ao amin''ny mpanjaka intsony telo-polo andro izay.'
mg1865::mg_17::4::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazaina tamin''i Mordekay ny tenin''i Estera.'
mg1865::mg_17::4::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mordekay nampitondra valiny ho amin''i Estera hoe: Aza manao anakampo fa ho afaka mihoatra noho ny Jiosy rehetra ianao, saingy ao an-tranon''ny mpanjaka;'
mg1865::mg_17::4::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha hangina mihitsy ianao amin''izao andro izao, dia hisy fahafahana sy famonjena hiseho avy amin''ny fitoerana hafa ho an''ny Jiosy, fa ianao sy ny mpianakavin-drainao kosa dia haringana; ary iza no mahalala, fa angamba ho amin''izao andro izao mihitsy no nanandratana anao ho amin''ny fanjakana?'
mg1865::mg_17::4::15:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nampitondra valiny ho any amin''i Mordekay indray Estera ka nanao hoe:'
mg1865::mg_17::4::16:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandehana ary, vorio ny Jiosy rehetra izay hita ato Sosana ary mifadia hanina noho ny amiko, ka aza mihinana na misotro hateloana na andro na alina; ary izaho sy ny ankizivaviko hifady toy izany koa, ary amin''izany no hidirako ao amin''ny mpanjaka, na dia tsy araka ny lalàna aza; koa raha tàhiny maty aho, dia maty.'
mg1865::mg_17::4::17:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 4
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa Mordekay ka nanao araka izay rehetra nandidian''i Estera azy.'
mg1865::mg_17::5::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny naneken''ny mpanjaka ny tenin''i Estera, sy ny fahasosoran''i Hamana tamin''i Mordekay'
  verse_text: 'Ary nony tamin''ny andro fahatelo, dia niakanjo akanjo fiandrianana Estera ka nitsangana teo amin''ny kianja anatiny amin''ny tranon''ny mpanjaka, dia teo anoloan''ny tranon''ny mpanjaka, ary ny mpanjaka nipetraka teo ambonin''ny seza fiandrianan''ny fanjakana tao an-dapa, tandrifin''ny vavahadin''ny trano.'
mg1865::mg_17::5::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nony hitan''ny mpanjaka fa, indro, Estera, vadin''ny mpanjaka nitsangana teo an-kianja, dia nahita fitia teo imasony izy; ary ny mpanjaka nanondro an''i Estera tamin''ny tehim-bolamena izay teny an-tanany. Dia nanatona kosa Estera ka nanendry ny loha-tehina.'
mg1865::mg_17::5::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka taminy: Inona no angatahinao, ry Estera, vadin''ny mpanjaka, ary inona no tadiavinao? Fa na dia hatramin''ny antsasaky ny fanjakana aza, dia homena anao izany.'
mg1865::mg_17::5::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Estera ka nanao hoe: Raha sitraky ny mpanjaka aoka, ny mpanjaka sy Hamana hankao anio amin''ny fanasana izay efa namboariko ho azy.'
mg1865::mg_17::5::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka: Asaovy avy faingana Hamana mba hanao araka ny tenin''i Estera. Ary ny mpanjaka sy Hamana dia nankeo amin''ny fanasana izay efa namboarin''i Estera.'
mg1865::mg_17::5::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Estera teo am-pisotroan-divay: Inona no angatahinao? Fa homena anao izany. Ary inona no tadiavinao? Fa na dia hatramin''ny antsasaky ny fanjakana aza, dia homena Izany.'
mg1865::mg_17::5::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Estera ka nanao hoe: Izao no angatahiko sy tadiaviko:'
mg1865::mg_17::5::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha mahita fitia eto imason''ny mpanjaka aho, ka sitraky ny mpanjaka ny hanome izay angatahiko sy hanome izay tadiaviko, dia aoka ny mpanjaka sy Hamana hankao amin''ny fanasana izay hamboariko ho azy indray; ary rahampitso dia hanao araka ny tenin''ny mpanjaka ihany aho.'
mg1865::mg_17::5::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivoaka tamin''izany andro izany Hamana, sady faly sy ravoravo ny fony; fa raha nahita an''i Mordekay teo am-bavahadin''ny mpanjaka izy, fa, indro, tsy mba nitsangana na nihetsika hitsaoka azy akory dia feno fahatezerana taminy izy.'
mg1865::mg_17::5::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa nanindry fo ihany Hamana ka lasa nody tany an-tranony aloha; dia naniraka naka ny sakaizany sy Zaresy vadiny izy.'
mg1865::mg_17::5::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nambaran''i Hamana tamin''ireo ny voninahitry ny hareny sy ny hamaroan''ny zanany mbamin''Izay voninahitra rehetra nomen''ny mpanjaka azy sy ny nanandratany azy ho ambony noho ny mpanapaka sy ny mpanompon''ny mpanjaka.'
mg1865::mg_17::5::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy koa Hamana: He! Estera, vadin''ny mpanjaka, aza tsy naka olona afa-tsy izaho ihany hiaraka amin''ny mpanjaka ho amin''ny fanasana izay efa namboariny; fa nasainy hiaraka amin''ny mpanjaka aho koa rahampitso.'
mg1865::mg_17::5::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na dia izany rehetra izany aza, dia tsy mbola mahafa-po ahy ihany, raha mbola mahita an''i Mordekay Jiosy mipetraka eo am-bavahadin''ny mpanjaka aho.'
mg1865::mg_17::5::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Zaresy vadiny sy ny sakaizany rehetra taminy: Aoka hanaovana hazo, dimam-polo hakiho ny hahavony, ary raha maraina dia lazao amin''ny mpanjaka mba hahantona eo Mordekay; fa mandehana miaraka amin''ny mpanjaka amin''ny hafaliana ho any amin''ny fanasana ianao. Ary sitrak''i Hamana izany zavatra izany, ka dia nampanao ilay hazo izy.'
mg1865::mg_17::6::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanandratana an''i Mordekay, sy ny alahelon''i Hamana noho izany'
  verse_text: 'Ary tamin''iny alina iny tsy nahita torimaso ny mpanjaka ka nampaka ny boky fitadidiana ny tantara; ary novakina teo anatrehan''ny mpanjaka izany.'
mg1865::mg_17::6::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: '2022-06-25T06:41:40+0000'
  verse_title: null
  verse_text: 'Ka, indro, voasoratra fa Mordekay no niampanga an''i Bigtana sy Taresy, roa lahy isan''ny tsindranolahin''ny mpanjaka, dia ireo mpiambina teo am-baravarana izay nitady hamono an''i Ahasoerosy mpanjaka.'
mg1865::mg_17::6::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Inona moa no fisandratana sy voninahitra mba efa nomena an''i Mordekay noho izany? Fa hoy ny zatovon''ny mpanjaka Izay nanompo azy: Tsy mbola nisy nomena azy.'
mg1865::mg_17::6::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka: Iza no ao an-kianja ao? Ary Hamana kosa efa sendra tonga tao an-kianja ivelan''ny tranon''ny mpanjaka tamin''izay hiteny amin''ny mpanjaka ny amin''ny hanantonana an''i Mordekay amin''ilay hazo efa natsangany hanantonana azy.'
mg1865::mg_17::6::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka hoy ny zatovon''ny mpanjaka taminy: Indro, Hamana no mitsangana ao an-kianja. Ary hoy ny mpanjaka: Asaovy miditra izy.'
mg1865::mg_17::6::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niditra Hamana ka hoy ny mpanjaka taminy: Inona no mendrika hatao amin''izay lehilahy tian''ny mpanjaka homem-boninahitra? Ary Hamana nanao anakampo hoe: Koa iza indray moa no ho tian''ny mpanjaka homem-boninahitra afa-tsy izaho?'
mg1865::mg_17::6::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ka dia hoy Hamana tamin''ny mpanjaka: Ny amin''izay lehilahy tian''ny mpanjaka homem-boninahitra,'
mg1865::mg_17::6::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'aoka halaina izay akanjo fiandrianana efa niakanjoan''ny mpanjaka sy soavaly izay efa nitaingenan''ny mpanjaka sady voaisy satro-boninahitra ny lohany;'
mg1865::mg_17::6::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia aoka izany fitafiana sy soavaly izany no hatolotra eo an-tanan''ny anankiray izay malaza indrindra amin''ny mpanapaka voatendrin''ny mpanjaka, ary aoka izay lehilahy tian''ny mpanjaka homem-boninahitra no hampiakanjoina izany ka hampitaingenina amin''ny soavaly, dia ho entina eny an-kalalahana eto an-tanàna, ary aoka hisy hiantso eo alohany hoe: Izao no hatao amin''ny lehilahy izay tian''ny mpanjaka homem-boninahitra.'
mg1865::mg_17::6::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy ny mpanjaka tamin''i Hamana: Faingana ary, alao ny akanjo sy ny soavaly araka ny voalazanao, ka dia ataovy araka izany amin''i Mordekay Jiosy, izay mipetraka eo am-bavahadin''ny mpanjaka; aza asiana latsaka izay rehetra nolazainao.'
mg1865::mg_17::6::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nalain''i Hamana ny akanjo sy ny soavaly, ka nampiakanjo an''i Mordekay izy ary nampitaigina azy tamin''ny soavaly, dia nitondra azy ho eny an-kalalahana teo an-tanàna ka niantso teo alohany hoe: Izao no hatao amin''ny lehilahy izay tian''ny mpanjaka homem-boninahitra.'
mg1865::mg_17::6::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Mordekay niverina nankeo amin''ny vavahadin''ny mpanjaka; fa Hamana kosa nody faingana ho any an-tranony sady nalahelo no nisaron-doha.'
mg1865::mg_17::6::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nolazain''i Hamana tamin''i Zaresy vadiny sy ny sakaizany rehetra izay zavatra nanjo azy. Ary hoy ny olon-kendry rehetra sy Zaresy vadiny taminy: Raha avy amin''ny taranaky ny Jiosy Mordekay, izay efa niantomboka nandavo anao teo anatrehany, dia tsy haharesy azy mihitsy ianao, fa ho lavo eo anatrehany tokoa.'
mg1865::mg_17::6::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary raha mbola niresaka taminy ihany ireo, dia tonga ny tsindranolahin*'' ny mpanjaka ka naka faingana an''i Hamana ho ny amin''ny fanasana izay efa namboarin''i Estera. [*Hebreo: ionoka]'
mg1865::mg_17::7::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanonganana an''i Hamana sy ny namonoana azy'
  verse_text: 'Ary ny mpanjaka sy Hamana dia nankao amin''i Estera, vadin''ny mpanjaka, ho ao amin''ny fanasana'
mg1865::mg_17::7::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy indray ny mpanjaka tamin''i Estera teo am-pisotroan-divay tamin''ny andro faharoa inona no angatahinao, ry Estera, vadin''ny mpanjaka? Fa homena anao izany. Ary inona ange no tadiavinao? Fa na dia hatramin''ny antsasaky ny fanjakana aza dia hotovina izany.'
mg1865::mg_17::7::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Estera, vadin''ny mpanjaka, ka nanao hoe: Raha mahita fitia eto imasonao ary aho, ry mpanjaka, ka sitraky ny mpanjaka, dia aoka homena ahy ny aiko araka ny fifonako ary ny fireneko araka ny fangatahako;'
mg1865::mg_17::7::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa namidy izahay, dia izaho sy ny fireneko, mba haringana sy hovonoina ary haripaka; fa raha tahàny namidy ho andevolahy sy ho andevovavy izahay, dia ho nangina ihany aho; kanefa anie tsy mahonitra ny fatiantoky ny mpanjaka tsinona ilay fahavalo e.'
mg1865::mg_17::7::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia namaly Ahasoerosy mpanjaka ka nanao tamin''i Estera, vadin''ny mpanjaka, hoe: Iza moa izany, ary aiza no hisy hasesiky ny fony hanao izany akory?'
mg1865::mg_17::7::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy Estera: Io Hamana ratsy fanahy io no rafilahy sy fahavalo! Dia raiki-tahotra teo anatrehan''ny mpanjaka sy ny vadin''ny mpanjaka Hamana.'
mg1865::mg_17::7::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tezitra dia tezitra ny mpanjaka, dia nitsangana niala teo am-pisotroan-divay ho eny an-tanimbolin''ny trano; ary Hamana kosa nitsangana hangataka ny ainy tamin''i Estera, vadin''ny mpanjaka, satria hitany fa misy loza hamelin''ny mpanjaka azy.'
mg1865::mg_17::7::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka niverina avy teo an-tanimbolin''ny trano ho ao amin''ilay efa nisotroany divay teo, ary Hamana sendra niapoka tamin''ny farafara nandrian''i Estera. Dia hoy ny mpanjaka: Moa hisavika ny vadin''ny mpanjaka eto anatrehako eto an-trano va io? Raha vantany vao naloaky ny vavan''ny mpanjaka izany teny izany, dia nisy nanarona ny tavan''i Hamana'
mg1865::mg_17::7::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Harbona, tsindranolahy* anankiray, izay teo anatrehan''ny mpanjaka, dia nilaza hoe Indro miorina eo akaikin''ny tranon''i Hamana ny hazo, dimam-polo hakiho ny hahavony, izay nataon''i Hamana hanantonany an''i Mordekay, ilay niteny soa ho an''ny mpanjaka. Dia hoy ny mpanjaka ahantòny amin''io izy. [*Hebreo: ionoka]'
mg1865::mg_17::7::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 7
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Hamana dia nahantony tamin''ilay hazo efa natsangany hanantonana an''i Mordekay. Dia vao izay no nionona ny hatezeran''ny mpanjaka.'
mg1865::mg_17::8::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny nanandratana an''i Mordekay, sy ny nahazoan''i Estera teny avy amin''ny mpanjaka ka hamela ny Jiosy hiaro tena'
  verse_text: 'Tamin''izany andro izany dia nomen''i Ahasoerosy mpanjaka ho an''i Estera, vadin''ny mpanjaka, ny tranon''i Hamana, fahavalon''ny Jiosy. Ary Mordekay nankeo anatrehan''ny mpanjaka, fa efa voalazan''i Estera fa rainy izy'
mg1865::mg_17::8::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nesorin''ny mpanjaka ny peratra fanombohany, izay efa nalainy tamin''i Hamana, ka nomeny an''i Mordekay. Ary Mordekay dia notendren''i Estera hanapaka ny tranon''i Hamana.'
mg1865::mg_17::8::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia niteny teo anatrehan''ny mpanjaka indray Estera sady niankohoka tamin''ny tongony ka nitomany sy nifona taminy mba hahafoana ny ratsy nataon''i Hamana Agagita sy ny hevitra nataony hamelezany ny Jiosy.'
mg1865::mg_17::8::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanjaka nanondro an''i Estera tamin''ny tehim-bolamena. Dia nitsangana Estera ka nijanona teo anatrehan''ny mpanjaka'
mg1865::mg_17::8::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary nanao hoe: Raha sitraky ny mpanjaka, ary mahita fitia eto imasony aho, sady ataon''ny mpanjaka ho mety izany, ka mahita sitraka eto imasony aho, dia aoka hisy soratra hanova ireny taratasy voahevitr''i Hamana, zanak''i Hamedota Agagita, ireny izay nosoratany hampandringana ny Jiosy amin''ny isan-tokony eran''ny fanjakan''ny mpanjaka;'
mg1865::mg_17::8::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa hataoko ahoana no fijery ny loza hanjo ny fireneko? Ary hataoko ahoana no fijery ny fandringanana ny havako?'
mg1865::mg_17::8::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Ahasoerosy mpanjaka tamin''i Estera, vadin''ny mpanjaka sy tamin''i Mordekay Jiosy: Indro, ny tranon''i Hamana efa nomeko an''i Estera, ary izy dia efa nahantona tamin''ny hazo, satria naninjitra ny tanany hamely ny Jiosy;'
mg1865::mg_17::8::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary ianareo kosa dia manorata amin''ny anaran''ny mpanjaka izay sitrakareo hamonjy ny Jiosy, ka tombohy amin''ny peratra fanombohan''ny mpanjaka izany; fa tsy misy mahavadika ny soratra izay efa voasoratra tamin''ny anaran''ny mpanjaka sy efa voatomboka tamin''ny peratra fanombohan''ny mpanjaka'
mg1865::mg_17::8::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nantsoina tamin''izay ny mpanoratry ny mpanjaka, tamin''ny andro fahatelo amby roa-polo tamin''ny volana fahatelo (volana Sivana izany) ary nosoratana araka izay rehetra nandidian''i Mordekay izany ho any amin''ny Jiosy sy ny solo-mpanjaka sy ny governora ary ny mpanapaka amin''ny isan-tokony hatrany India ka hatrany Etiopia, dia fito amby roa-polo amby zato toko, ny isan-tokony araka ny sorany avy, ary ny isam-pireneny araka ny fiteniny avy, ary ny Jiosy araka ny sorany sy araka ny fiteniny.'
mg1865::mg_17::8::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nanoratra taratasy tamin''ny anaran''i Ahasoerosy mpanjaka izy ka notombohiny tamin''ny peratra fanombohan''ny mpanjaka, ary ny taratasy dia nampitondrainy ny tsimandoa mitaingin-tsoavaly sy soavaly haingam-pandeha ary ampondra, zanaky ny soavalivavy;'
mg1865::mg_17::8::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka ny Jiosy izay teny amin''ny isan-tanàna dia navelan''ny mpanjaka hivory hiaro ny ainy ary handringana sy hamono ka handripaka ny herin''ny firenena sy ny tany rehetra izay te-hiady aminy, mbamin''ny vady aman-janak''ireny ary handroba ny fananany'
mg1865::mg_17::8::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny andro iray ihany any amin''ny isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka, dia amin''ny andro fahatelo ambin''ny folo amin''ny volana faharoa ambin''ny folo (volana Adara izany).'
mg1865::mg_17::8::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny kopen''ny teny natao didy ho amin''ny isan-tokony eran''ny fanjakana dia nantsoina tamin''ny olona rehetra mba hampiomana ny Jiosy ho amin''izany andro izany hamaliany ny fahavalony.'
mg1865::mg_17::8::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia lasa ny tsimandoa izay nitaingina soavaly haingam-pandeha sy ampondra, ka nohafainganina sy nododonan''ny tenin''ny mpanjaka izy. Ary nantsoina tany Sosana renivohitra koa ny lalàna.'
mg1865::mg_17::8::15:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tamin''ny nialan''i Mordekay teo anatrehan''ny mpanjaka dia niakanjo akanjo fiandrianana manga sy fotsy izy sady nisatroka satro-boninahitra volamena lehibe sy niakanjo akanjo lava rongony fotsy madinika sy volomparasy; ary faly sy ravo ny tanana Sosana.'
mg1865::mg_17::8::16:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Jiosy dia nahazo fahazavana sy faharavoravoana sy fifaliana ary voninahitra.'
mg1865::mg_17::8::17:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 8
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary teo amin''ny isan-tokony eran''ny fanjakana sy teny an-tanàna rehetra izay nahatongavan''ny didin''ny mpanjaka sy ny teniny dia nahazo hafaliana sy faharavoravoana ny Jiosy sady nanao fanasana sy andro mahafaly. Ary maro ny olona tompon-tany no tonga Jiosy, satria nahazo azy ny fahatahorana ny Jiosy.'
mg1865::mg_17::9::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny naharesen''ny Jiosy ny fahavalony izay nikasa handringana azy'
  verse_text: 'Ary tamin''ny andro fahatelo ambin''ny folo tamin''ny volana faharoa ambin''ny folo (volana Adara izany), rehefa akaiky ny andro hanatanterahana ny tenin''ny mpanjaka sy ny didiny, dia ny andro izay efa nantenain''ny fahavalon''ny Jiosy haharesena azy indrindra (kanjo navadika izany, ka ny Jiosy kosa no naharesy izay nankahala azy),'
mg1865::mg_17::9::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nivory tany an-tanànany avy ny Jiosy, tany amin''ny isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka, mba hamely izay nividy hanisy ratsy azy; ary tsy nisy olona nahajanona teo anoloany, fa efa nahazo ny olona rehetra ny fahatahorana azy.'
mg1865::mg_17::9::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny mpanapaka rehetra isan-tokony tamin''ny fanjakana sy ny solo-mpanjaka sy ny governora mbamin''ny mpanao raharahan''ny mpanjaka dia nanampy ny Jiosy, satria azon''ny fahatahorana an''i Mordekay izy.'
mg1865::mg_17::9::4:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mordekay dia lehibe tao an-tranon''ny mpanjaka, ary ny lazany niely tany amin''ny isan-tokony eran''ny fanjakana; fa nitombo sy nisandratra ihany io lehilahy Mordekay io.'
mg1865::mg_17::9::5:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nasian''ny Jiosy ny fahavalony rehetra ka nokapainy sabatra sy novonoiny ary naringany, fa nahazo nanao araka izay sitraky ny fony tamin''izay nankahala azy izy.'
mg1865::mg_17::9::6:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tany Sosana renivohitra aza ny Jiosy dia nahavono sy naharingana diman-jato lahy;'
mg1865::mg_17::9::7:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary Parsandata sy Dalfona sy Aspata'
mg1865::mg_17::9::8:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Porata sy Adalia sy Aridata'
mg1865::mg_17::9::9:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'sy Parmasta sy Arisay sy Ariday ary Vaizata,'
mg1865::mg_17::9::10:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'izy folo lahy, zanak''i Hamana, zanak''i Hamedota, fahavalon''ny Jiosy, dia novonoiny koa; kanefa ny fananany tsy mba norobainy tsy akory.'
mg1865::mg_17::9::11:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Androtrizay ihany dia nambara tamin''ny mpanjaka ny isan''ny voavono tany Sosana renivohitra.'
mg1865::mg_17::9::12:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary hoy ny mpanjaka tamin''i Estera, vadin''ny mpanjaka: Teto Sosana renivohitra aza ny Jiosy efa nahavono sy naharingana diman-jato lahy mbamin''izy folo lahy, zanak''i Hamana; koa nanao ahoana kosa no nataony tamin''ny isan-tokony eran''ny fanjakan''ny mpanjaka! Dia inona koa no angatahinao? Fa hatao izany. Ary inona no mbola tadiavinao? Fa homena izany.'
mg1865::mg_17::9::13:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hoy Estera: Raha sitraky ny mpanjaka, dia aoka ny Jiosy izay eto Sesana havela hanao toy ny natao androany ihany koa rahampitso, ary aoka hahantona amin''ny hazo koa izy folo lahy, zanak''i Hamana.'
mg1865::mg_17::9::14:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nasain''ny mpanjaka natao izany; ary nantsoina tany Sosana ny teny, ka dia nahantona izy folo lahy, zanak''i Hamana.'
mg1865::mg_17::9::15:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia nivory indray ny Jiosy izay tany Sosana tamin''ny andro fahefatra ambin''ny folo tamin''ny volana Adara ka namono olona telon-jato lahy tany Sosana; kanefa ny fananany tsy mba norobainy tsy akory.'
mg1865::mg_17::9::16:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy sasany isan-tokony tamin''ny fanjakan''ny mpanjaka dia nivory hiaro ny ainy, ka afaka tamin''ny fahavalony izy, ary dimy arivo amby fito alina no matiny (kanefa ny fananany tsy mba norobainy)'
mg1865::mg_17::9::17:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'tamin''ny andro fahatelo ambin''ny folo tamin''ny volana Adara; ary nitsahatra izy tamin''ny andro fahefatra ambin''ny folo, ka nataony ho andro fanasana sy firavoravoana izany.'
mg1865::mg_17::9::18:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny Jiosy izay tany Sosana kosa nivory tamin''ny andro fahatelo ambin''ny folo tamin''io ihany sy tamin''ny andro fahefatra ambin''ny folo koa; ary nitsahatra tamin''ny andro fahadimy ambin''ny folo izy, ka dia io no nataony andro fanasana sy firavoravoana.'
mg1865::mg_17::9::19:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa noho izany ny Jiosy tany ambanivohitra, izay nitoetra tamin''ny vohitra madinika, dia nanao ny andro fahefatra ambin''ny folo amin''ny volana Adara ho firavoravoana sy fanasana sy andro mahafaly ary fifanateran-javatra.'
mg1865::mg_17::9::20:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 20
  verse_date_revised: null
  verse_title: 'Ny nanendrena ny andro firavoravoana Porima, sy ny fahalehibiazan''i Mordekay'
  verse_text: 'Ary Mordekay nanoratra ny amin''izany zavatra izany sady nampitondra taratasy ho any amin''ny Jiosy rehetra izay tany amin''ny isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka, na ny akaiky na ny lavitra,'
mg1865::mg_17::9::21:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampitandrina azy ny andro fahefatra ambin''ny folo sy ny fahadimy ambin''ny folo amin''ny volana Adara isan-taona,'
mg1865::mg_17::9::22:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia araka ny andro nahafahan''ny Jiosy tamin''ny fahavalony, sy ny volana izay nampodiana ny alahelony ho fifaliana ary ny fitomaniany ho andro mahafaly, mba hatao ho andro fanasana sy fifaliana sy fifanateran-javatra ary fanomezan-javatra ho an''ny mahantra izany.'
mg1865::mg_17::9::23:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny Jiosy nanaiky hanao araka izay vao nataony, dia araka izay efa nosoratan''i Mordekay taminy,'
mg1865::mg_17::9::24:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria Hamana, zanak''i Hamedota Agagita, fahavalon''ny Jiosy rehetra, efa nihevitra handringana ny Jiosy ka efa nanao pora (filokana izany) handreseny sy handringanany azy;'
mg1865::mg_17::9::25:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha nankeo anatrehan''ny mpanjaka izany, dia nampanoratra taratasy handidy mba hatsingerina ho eo amin''ny lohany ihany ny hevi-dratsy nokasain''i Hamana hatao amin''ny Jiosy, ary mba hahantona amin''ny hazo izy sy ny zananilahy.'
mg1865::mg_17::9::26:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 26
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no nanaovana ireo andro ireo hoe Porima, dia araka ny anarana hoe Pora*. Ary araka ny teny rehetra tamin''izany taratasy izany sy izay hitany ny amin''izany zavatra efa nanjo azy izany [*Pora = Filokana]'
mg1865::mg_17::9::27:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 27
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia nanao lalàna tsy azo ovana ny Jiosy ka nanaiky fa izy sy ny taranany ary izay rehetra miray aminy dia hitandrina izany andro roa izany araka ny voasoratra sy araka ny fotoany isan-taona;'
mg1865::mg_17::9::28:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 28
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary mba hotsarovana sy hotandremana ireo andro ireo amin''ny taranany rehetra sy ny fokony rehetra sy ny isan-tokony eran''ny fanjakana rehetra sy amin''ny isan-tanàna; ary mba tsy ho tapaka amin''ny Jiosy ireo andro Porima ireo, ka tsy hitsahatra ny fahatsiarovana izany amin''ny taranany.'
mg1865::mg_17::9::29:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 29
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Estera, vadin''ny mpanjaka, sady zanakavavin''i Abihaila sy Mordekay Jiosy, dia nanoratra tamin''ny fahefana rehetra hanamafy izany taratasy faharoa milaza ny Porima izany.'
mg1865::mg_17::9::30:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 30
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary nampitondra taratasy ho any amin''ny Jiosy rehetra izy dia ho any amin''ny toko fito amby roa-polo amby zato amin''ny fanjakan''i Ahasoerosy, manao teny fiadanana sy fahamarinana,'
mg1865::mg_17::9::31:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 31
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hampitandrina azy Ireo andro Porima ireo amin''ny fotoany, araka izay nandidian''i Mordekay Jiosy sy Estera, vadin''ny mpanjaka. azy sy araka izay efa nekeny ho an''ny tenany sy ny taranany koa ny amin''ny fifadian-kaniny sy ny fitarainany.'
mg1865::mg_17::9::32:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 9
  verse_number: 32
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ny tenin''i Estera dia nanamafy izany teny milaza ny Porima izany; ary voasoratra tao amin''ny boky izany.'
mg1865::mg_17::10::1:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 10
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Ahasoerosy mpanjaka nampandoa hetra ny tany sy ny nosin-dranomasina.'
mg1865::mg_17::10::2:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 10
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay rehetra nataony araka ny fahefany sy ny heriny mbamin''ny filazana ny fahalehibiazan''i Mordekay, araka izay nanandratan''ny mpanjaka azy, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''i Media sy Persia va izany?'
mg1865::mg_17::10::3:
  verse_version: mg1865
  verse_book: mg_17
  verse_chapter: 10
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Mordekay Jiosy no nanarakaraka an''i Ahasoerosy mpanjaka sady nalaza tamin''ny Jiosy ka nankasitrahan''ny rahalahiny maro, satria nitady hihasoa ny fireneny izy sady nilaza fiadanana tamin''ny olona rehetra iray firazanana aminy.'
