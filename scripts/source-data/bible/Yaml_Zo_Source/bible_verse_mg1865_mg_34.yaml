mg1865::mg_34::1::1:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny handravana an''i Ninive noho ny fandozany'
  verse_text: 'Faminaniana ny amin''ny loza hanjo an''i Ninive, dia ny bokin''ny fahitan''i Nahoma Elkosita.'
mg1865::mg_34::1::2:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Andriamanitra saro-piaro sy mamaly heloka Jehovah; Jehovah dia Mpamaly heloka sady be fahatezerana; Jehovah dia Mpamaly ny rafilahiny Ary mitahiry fahatezerana hamelezany ny fahavalony.'
mg1865::mg_34::1::3:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahari-po Jehovah sady be hery Ary tsy mety manamarina ny meloka; Amin''ny tadio sy ny tafio-drivotra no lalan''i Jehovah. Ary rahona no vovoky ny tongony.'
mg1865::mg_34::1::4:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miteny mafy ny ranomasina izy ka mahatankina azy Ary mandritra ny ony rehetra; Malazo Basana sy Karmela. Ary malazo koa ny vonin''i Libanona.'
mg1865::mg_34::1::5:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mihorohoro eo anatrehany ny tendrombohitra, Sady miempo ny havoana, Ary mientanentana eo anatrehany ny tany, Dia ny tany onenana sy ny mponina rehetra ao aminy.'
mg1865::mg_34::1::6:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Iza no mahatoetra eo anoloan''ny fahavinirany? Ary iza no mahatanty ny firehitry ny fahatezerany? Aidina toy ny afo ny fahatezerany, Ary mirodana eo anoloany ny vatolampy.'
mg1865::mg_34::1::7:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara Jehovah, fiarovana mafy amin''ny andro fahoriana, Ka mahalala izay mialoka aminy.'
mg1865::mg_34::1::8:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa amin''ny riaka manafotra no anafoanany ny fitoerany, Ary ny fahavalony dia henjehiny ho any amin''ny* maizina. [*Na: henjehin''ny; na henjehiny amin''ny]'
mg1865::mg_34::1::9:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Inona no heverinareo ho enti-manohitra an*''i Jehovah ? Fahafonganana no hataony, Tsy hiverina fanindroany ny fahoriana. [*Na: ahoana no hevitrareo ny amin''i]'
mg1865::mg_34::1::10:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa na dia miforiporitra toy ny tsilo aza ireny Sady vonton''ny divay mahery fibobohany, Dia ho levona tokoa toy ny vodivary maina* izy. [*Na: dia ho levona toy ny vodivary karankaina]'
mg1865::mg_34::1::11:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Avy tao aminao no nivoahan''ny anankiray izay misain-dratsy ho enti-manohitra an''i Jehovah Sady mamoron-kevi-dratsy.'
mg1865::mg_34::1::12:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no lazain''i Jehovah: Na dia tsy latsaka isa ka mbola maro aza ireny, Dia hofongorana ihany izy ka ho levona Fa efa nampahory anao Aho, Ka tsy hampahory anao intsony.'
mg1865::mg_34::1::13:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ankehitriny hotapahiko ny ziogany ho afaka aminao, Ary hotosako ny famatorana anao.'
mg1865::mg_34::1::14:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary Jehovah efa nandidy ny aminao hoe: Tsy ho velo-maso intsony ny anaranao; Hataoko tapaka tsy ho ao an-tranon''ny andriamanitrao ny sarin-javatra voasokitra sy ny sarin-javatra an-idina; Hanao ny fasana ho anjaranao Aho, satria hita fa latsa-danja ianao.'
mg1865::mg_34::2::1:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! any an-tendrombohitra ny tongotry ny mitondra teny soa mahafaly Sady mitory fiadanana! Tandremo ny andro firavoravoanao, ry Joda, Efao ny voadinao; Fa tsy handeha hamaky eo aminao intsony ilay tena ratsy fanahy, Indray ripaka izy rehetra.'
mg1865::mg_34::2::2:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misy mpanorotoro miakatra hamely anao Ambeno ny manda, Tazano ny lalana, Hatanjaho ny valahanao, Hetseho mafy ny herinao!'
mg1865::mg_34::2::3:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Jehovah efa mampody ny voninahitr*''i Jakoba, Toy ny ampodiany ny voninahitr*''Isiraely; Fa ny mpandroba efa nandroba azy Ary nanimba ny sampam-boalobony. [*Na: miverina ho amin''ilay reharehany] [**Na: toy ny amin''ny reharehany]'
mg1865::mg_34::2::4:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nomenaina ny ampingan''ny lehilahy maheriny, Mitafy jaky ny miaramilany, Ny kalesiny dia misy vy mahery, mamirapiratra toy ny afo, amin''ny andro fiomanany, Ary antsodina ny lefona.'
mg1865::mg_34::2::5:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ampiezahina eny an-dalambe ny kalesy Ka mifanaretsadretsaka eny an-kalalahana; Tahaka ny harendrina no fijery azy, Mitsoriaka tahaka ny helatra izy.'
mg1865::mg_34::2::6:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsaroany ny lehilahy malazany, Kanjo tafintohina eny am-pandehanana ireny; Mihazakazaka ho any amin''ny manda ireny, Kanjo efa voatsangana sahady ny hamelezana azy.'
mg1865::mg_34::2::7:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Vohana ny vavahadin-drenirano, Ary reraka* ny lapa. [*Hebreo: miempo]'
mg1865::mg_34::2::8:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao no voatendry: ampitanjahina izy, dia* lasan-ko babo, Ary ny ankizivavy mitoloko azy manao feom-boromailala Sady miteha-tratra. [*Na: Hozaba dia nampitanjahina ka]'
mg1865::mg_34::2::9:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Ninive dia tahaka ny farihy hatrizay nisiany; Nefa handositra ihany ireny, Mijanona, mijanona e! Nefa tsy misy miherika.'
mg1865::mg_34::2::10:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mamaboa volafotsy, Mamaboa volamena! Fa tsy hita lany ny rakitra soa, Dia ny habetsahan''ny fanaka mahafinaritra rehetra.'
mg1865::mg_34::2::11:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indrisy! foana, eny, foana sady lao! Kivy ny fo, miady ny lohalika, Manaintaina ny valahany rehetra, Mivaloarika ny tarehiny rehetra.'
mg1865::mg_34::2::12:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aiza ilay lavaky ny liona sy firemben''ny liona tanora ? Ilay nandehanan''ny liona sy ny liom-bavy mbamin''ny zana-diona, Ka tsy nisy nanaitaitra azy,'
mg1865::mg_34::2::13:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia ilay liona namotipotika izay ampy ho an''ny zanany Ary nanenda ho an''ny liombaviny Sady nameno haza ny lavany Sy toha ny fonenany.'
mg1865::mg_34::2::14:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hamely anao Aho, hoy Jehovah, Tompon''ny maro, Holevoniko ho setroka ny kalesinao* Ary hovonoiko sabatra ny liona tanoranao; Hofonganako amin''ny tany ny hazanao; Ka tsy ho re intsony ny feon''ny irakao. [*Hebreo: kalesiny]'
mg1865::mg_34::3::1:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Lozan''ny tanàna mpandatsa-drà! Feno lainga sy fandozana izy; Tsy ialan-dremby ao aminy.'
mg1865::mg_34::3::2:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Injany! ny fifiopioky ny karavasy! Ny fikorodondrodon''ny kodia! Ny fikatrokatroky ny soavaly! Ary ny fitraitraiky ny kalesy!'
mg1865::mg_34::3::3:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'He! ny fampiriotry ny mpitaingin-tsoavaly! Akory ny fanelatselatry ny sabatra Sy ny famirapiratry ny lefona! Indrisy ny habetsahan''ny voatrabaka sy ny hamaroan''ny voavono! Tsy hita isa ny faty, Eny, voafingampingan''ny faty ny olona,'
mg1865::mg_34::3::4:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Noho ny habiazan''ny fijangajangan''ikala janga tsara tarehy, Tompovavin''ny fankatovana, Izay mivarotra firenena amin''ny fijangajangany Sy fokom-pirenena amin''ny fankatovany.'
mg1865::mg_34::3::5:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, hamely anao Aho, hoy Jehovah, Tompon''ny maro; Ary haingaiko ho amin''ny tavanao ny moron-tongotr''akanjonao, Ka hasehoko amin''ny firenena ny fitanjahanao Sy amin''ny fanjakana ny fahamenaranao.'
mg1865::mg_34::3::6:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Dia hotsipazako loto ianao Ka hataoko tsinontsinona, Eny, hataoko fitalanjonana ianao.'
mg1865::mg_34::3::7:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Arv izay rehetra mijery anao dia handositra anao Ka hanao hoe: Rava Ninive! Iza no hitomany azy? Aiza no hitadiavako izay hampionona anao ?'
mg1865::mg_34::3::8:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsara noho No-amona va ianao? Ilay nitoetra teo anelanelan''ny ony Ka nohodidinin''ny rano; Ny rano be* no rovany, Ary ny rano be koa no mandany; [*Hebreo: ranomasina]'
mg1865::mg_34::3::9:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny Etiopiana sy ny Egyptiana no heriny, Sady tsy hita lany ireny; Ny Lydiana sy ny Libyana no mpanampy azy*. [*Hebreo: anao]'
mg1865::mg_34::3::10:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa na izy aza dia lasa, eny, lasan-ko babo; Ny zanany madinika koa notorotoroina teny an-joron-dalambe rehetra eny; Ny olo-malazany nanaovany filokana, Ary ny lehibeny rehetra nogadrana.'
mg1865::mg_34::3::11:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ianao koa ho mamo ka hiafina, Ianao koa hitady fiarovana mafy hierenao ny fahavalonao.'
mg1865::mg_34::3::12:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny manda mafinao rehetra ho tahaka ny aviavy misy voa mialin-taona: Raha hohozongozonina izy, dia hihintsana ao am-bavan''izay hihinana aza.'
mg1865::mg_34::3::13:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Indro, vehivavy no olonao ao aminao; Hidiran''ny fahavalonao no hidananan''ny vavahadin''ny taninao; Levon''ny afo ny hidinao.'
mg1865::mg_34::3::14:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Manangona rano ho anao ho an''ny fahirano; Hamafio ny mandanao; Mirotsaha amin''ny fotaka, ka hosihoseo ho feta, Amboary ny lafaoro fandoroam-biriky.'
mg1865::mg_34::3::15:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Any no handevonan''ny afo anao Sy handripahan''ny sabatra anao; Hohaniny toy ny fihinan''ny valalavao ianao; Mihamaroa toy ny valalavao, Mihabetsaha toy ny valala.'
mg1865::mg_34::3::16:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nataonao betsaka noho ny kintana eny amin''ny lanitra ny mpandrantonao; Mipariaka* ny valalavao ka lasa manidina. [*Na: mandevona]'
mg1865::mg_34::3::17:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny andriananao dia toy ny valala, Ary ny mpifehinao* dia toy ny valalavao, Izay mitoby eny amin''ny fefy, raha mangatsiaka ny andro; Fa raha miposaka ny masoandro, dia lasa manidina izy, Ka tsy fantatra izay nalehany. [*Na: mpanoratrao]'
mg1865::mg_34::3::18:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Rendrehana ny mpiandrinao, ry mpanjakan''i Asyria; Miampatrampatra ny lehilahy maherinao; Aely eny an-tendrombohitra ny olonao. Ka tsy misy mamory azy.'
mg1865::mg_34::3::19:
  verse_version: mg1865
  verse_book: mg_34
  verse_chapter: 3
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tsy mety mihena ny fangirifirianao, Tsy azo sitranina ny ferinao; Izay rehetra ilazana ny nanjo anao dia hiteha-tanana anao; Fa iza no tsy efa tratry ny fandozanao mandrakariva?'
