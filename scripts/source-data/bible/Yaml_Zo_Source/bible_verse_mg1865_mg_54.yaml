mg1865::mg_54::1::1:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Fiarahabana sy anatra ny amin''ny mpampianatra sandoka, ary filazana ny amin''ny lalàna sy ny filazantsara ary ny fahasoavan''Andriamanitra tamin''i Paoly'
  verse_text: 'Paoly, Apostolin''i Kristy Jesoa araka ny didin''Andriamanitra, Mpamonjy antsika, sy Kristy Jesoa fanantenantsika,'
mg1865::mg_54::1::2:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'mamangy an''i Timoty, tena zanako amin''ny finoana: fahasoavana, famindram-po, fiadanana avy amin''Andriamanitra Ray sy Kristy Jesoa Tompontsika.'
mg1865::mg_54::1::3:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Toy ny nangatahako anao hitoetra any Efesosy, rehefa hankany Makedonia aho, mba handidianao ny sasany tsy hanao fampianarana hafahafa,'
mg1865::mg_54::1::4:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'na hitandrina ny anganongano sy ny tantaram-pirazanana tsy hita lany izay mahatonga ady hevitra, fa tsy mampandroso ny fitondrana araka an''Andriamanitra amin''ny finoana, dia toy izany koa no ataoko ankehitriny.'
mg1865::mg_54::1::5:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny anton''ny didy dia fitiavana avy amin''ny fo madio sy ny fieritreretana tsara ary ny finoana tsy mihatsaravelatsihy,'
mg1865::mg_54::1::6:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay nivilian''ny sasany, ka nania ho amin''ny taria foana izy,'
mg1865::mg_54::1::7:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia olona izay te-ho mpampiana-dalàna, kanefa tsy fantany akory izay lazainy na izay itompoany.'
mg1865::mg_54::1::8:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa fantatsika fa tsara ny lalàna, raha entin''ny olona araka izay antony,'
mg1865::mg_54::1::9:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka fantany fa tsy ny olona marina no nanaovana ny lalàna, fa ny mpandika lalàna sy ny maditra, dia ny tsy matahotra an''Andriamanitra sy ny mpanota, ny olona tsy manaja izay masina sy ny olona vetaveta, ny mpamono ray sy ny mpamono reny, ny mpamono olona,'
mg1865::mg_54::1::10:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny mpijangajanga, ny sodomita, ny mpangalatra olona, ny mpandainga, ny mpianian-tsy to, ary na inona na inona manohitra ny fampianarana tsy misy kilema*, [*Grika: salama]'
mg1865::mg_54::1::11:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'araka ny filazantsaran''ny voninahitr''Andriamanitra finaritra, izay natolotra ho adidiko.'
mg1865::mg_54::1::12:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Misaotra an''i Kristy Jesoa Tompontsika aho, Izay nampahery ahy, fa nataony mahatoky aho ka notendreny ho amin''ny fanompoana,'
mg1865::mg_54::1::13:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia izaho, izay mpiteny ratsy* fahiny sady mpanenjika sy mpampahory; kanefa nahazo famindram-po aho, satria tamin''ny tsy fahalalana no nanaovako izany noho ny tsy finoana. [*Grika: mpanao blasfemia; izahao Matio 9:3]'
mg1865::mg_54::1::14:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa be indrindra ny fahasoavan''ny Tompontsika tamin''ny finoana sy ny fitiavana, izay ao amin''i Kristy Jesoa.'
mg1865::mg_54::1::15:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatoky ka tokony hekena amin''ny fankasitrahana rehetra izao teny izao: tonga tety ambonin''ny tany Kristy Jesoa hamonjy ny mpanota, ary amin''ireny izaho no lohany.'
mg1865::mg_54::1::16:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Kanefa izao no namindrana fo tamiko, dia ny mba hasehon''i Jesoa Kristy eo amiko, izay lohany, ny fahari-po rehetra ho fianarana ho an''izay hino Azy hahazoana fiainana mandrakizay.'
mg1865::mg_54::1::17:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary ho an''ny Mpanjaka tsy manan-taloha, tsy mety maty, tsy hita, dia ho an''Andriamanitra tokana ihany anie ny laza sy ny voninahitra mandrakizay mandrakizay. Amena.'
mg1865::mg_54::1::18:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izao didy izao no omeko anao, ry Timoty zanako, araka ireo faminaniana natao fahiny ny aminao ireo, mba ho entinao miady ny ady tsara ireo,'
mg1865::mg_54::1::19:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny itananao ny finoana sy ny fieritreretana tsara, izay efa narian''ny sasany, ka toy ny olona vaky sambo izy ny amin''ny finoana;'
mg1865::mg_54::1::20:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 1
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'naman''ireny Hymeneo sy Aleksandro, izay natolotro ho an''i Satana mba hofaizana tsy hiteny ratsy. [* Grika: hanao blasfemia, izahao Matio 9:3]'
mg1865::mg_54::2::1:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fivavahana ho an''ny olona rehetra, ary ny fitondran-tena sy ny fitafiana miendrika ny vehivavy Kristiana'
  verse_text: 'Koa mananatra voalohany indrindra aho mba hatao izay fangatahana, fivavahana, fifonana, fisaorana, ho an''ny olona rehetra,'
mg1865::mg_54::2::2:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ho an''ny mpanjaka mbamin''izay rehetra manana fahefana, mba hiainantsika miadana sy mandry fahizay amin''ny toe-panahy araka an''Andriamanitra sy ny fahamaotinana rehetra.'
mg1865::mg_54::2::3:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany no tsara ka ankasitrahana eo imason''Andriamanitra, Mpamonjy antsika,'
mg1865::mg_54::2::4:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay tia ny olona rehetra hovonjena ka ho tonga amin''ny fahalalana ny marina.'
mg1865::mg_54::2::5:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa iray no Andriamanitra, ary iray no Mpanalalana amin''Andriamanitra sy ny olona, dia Kristy Jesoa, Izay olona,'
mg1865::mg_54::2::6:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'sady nanolotra ny tenany ho avotra hisolo ny olona rehetra, dia zavatra ho fitory amin''izao androny izao.'
mg1865::mg_54::2::7:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mba hanao izany no nanendrena ahy ho mpitory sy Apostoly (milaza ny marina aho, fa tsy mandainga), ho mpampianatra ny jentilisa amin''ny finoana sy ny fahamarinana.'
mg1865::mg_54::2::8:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tiako ny lehilahy hivavaka eny tontolo eny manandra-tanana masina, tsy amin''ny fahatezerana na amin''ny fifandirana.'
mg1865::mg_54::2::9:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary toy izany koa ny vehivavy, hiravaka amin''ny fitafiana mahamendrika mbamin''ny fahamaotinana sy ny fahononan-tena, fa tsy amin''ny volo mirandrana sy ny volamena, na vato soa*, na fitafiana saro-bidy, [*Grika: perila]'
mg1865::mg_54::2::10:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa amin''ny asa tsara, araka izay mahamendrika ny vehivavy manaiky ny fivavahana amin''Andriamanitra.'
mg1865::mg_54::2::11:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny vehivavy hianatra mangingina ka hanaiky tsara.'
mg1865::mg_54::2::12:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny vehivavy tsy avelako hampianatra na hanapaka ny lehilahy, fa hangina ihany.'
mg1865::mg_54::2::13:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa Adama no natao voalohany, vao Eva.'
mg1865::mg_54::2::14:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy Adama no voafitaka, fa ny vehivavy no voafitaka, ka dia tonga mpanota.'
mg1865::mg_54::2::15:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 2
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Nefa hovonjena ihany izy amin''ny fiterahan-jaza, raha maharitra amin''ny finoana sy ny fitiavana ary ny fahamasinana mbamin''ny fahononan-tena.'
mg1865::mg_54::3::1:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny olona miendrika hatao mpitandrina sy diakona'
  verse_text: 'Mahatoky izao teny izao: Raha misy olona maniry ny asan''ny mpitandrina, dia maniry asa tsara izy.'
mg1865::mg_54::3::2:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa ny mpitandrina* dia tsy maintsy ho tsy manan-tsiny, manam-bady tokana, mahonon-tena, hendry, tia filaminana, mampiantrano vahiny, mahay mampianatra, [*Grika: episkopo]'
mg1865::mg_54::3::3:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy mpimamo lian''ady, tsy mpikapoka, fa mandefitra, tsy mpila ady, tsy mpitia vola,'
mg1865::mg_54::3::4:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'manapaka tsara ny ankohonany, mampanaiky ny zanany amin''ny fahamaotinana tsara'
mg1865::mg_54::3::5:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: '(fa raha misy olona tsy mahay mitondra ny ankohonany, hataony ahoana no fitandrina ny fiangonan*''Andriamanitra?), [*Grika: eklesia]'
mg1865::mg_54::3::6:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'tsy izay zazavao amin''ny fivavahana, fandrao hieboebo foana izy ka ho latsaka amin''ny fahamelohan''ny devoly.'
mg1865::mg_54::3::7:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary tsy maintsy ho tsara laza koa amin''izay eny ivelany izy, fandrao ho lavo amin''ny fananan-tsiny sy ny fandriky ny devoly.'
mg1865::mg_54::3::8:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny diakona koa toy izany ihany, ho maotona, tsy miroa teny, tsy tia divay be, tsy tia harena maloto,'
mg1865::mg_54::3::9:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'mitandrina tsara ny zava-miafina ny amin''ny finoana amin''ny fieritreretana madio.'
mg1865::mg_54::3::10:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary aoka hizahan-toetra ireo aloha, dia vao hanao ny asan''ny diakona izy, raha tsy manan-tsiny.'
mg1865::mg_54::3::11:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny vehivavy koa ho toy izany ihany: maotona, tsy mpanendrikendrika, mahonon-tena, mahatoky amin''ny zavatra rehetra.'
mg1865::mg_54::3::12:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny diakona samy hanam-bady tokana sady hanapaka tsara ny zanany sy ny ankohonany.'
mg1865::mg_54::3::13:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay efa mahavatra tsara ny asan''ny diakona dia mahazo toerana tsara ho an''ny tenany sy fahasahiana be amin''ny finoana izay ao amin''i Kristy Jesoa.'
mg1865::mg_54::3::14:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany dia soratako aminao, na dia manantena hankaty aminao faingana aza aho;'
mg1865::mg_54::3::15:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'fa raha tratra ela aho, dia ny hahafantaranao izay fitondran-tena mety hatao ao an-tranon''Andriamanitra, dia ny fiangonan*''Andriamanitra velona, sady andry sy fiorenan''ny fahamarinana. [*Grika: eklesia]'
mg1865::mg_54::3::16:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 3
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary iaraha-manaiky mihitsy fa lehibe ny zava-miafina ny amin''ny toe-panahy araka an''Andriamanitra, dia Ilay naseho teo amin''ny nofo, nohamarinina tao amin''ny Fanahy; hitan''ny anjely, notorina tany amin''ny jentilisa, ninoana teny amin''izao tontolo izao, nakarina tamin*''ny voninahitra. [*Na: ho any amin'']'
mg1865::mg_54::4::1:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny hihemoran''ny sasany, sy fananarana an''i Timoty hazoto hanefa ny anjara-fanompoany'
  verse_text: 'Fa ny Fanahy milaza marina fa amin''ny andro aoriana dia hihemotra amin''ny finoana ny sasany, manaiky fanahy mamitaka sy fampianaran''ny demonia,'
mg1865::mg_54::4::2:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'amin''ny fihatsaram-belatsihin''ny mpilaza lainga, ka voapetaky ny vy mahamay ny fieritreretany,'
mg1865::mg_54::4::3:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay mandrara tsy hanam-bady, ary mampifady hanina, izay nataon''Andriamanitra ho an''izay mino sady mahalala ny marina, mba horaisiny amin''ny fisaorana.'
mg1865::mg_54::4::4:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny zavatra rehetra nataon''Andriamanitra dia tsara avokoa, ka tsy misy tokony holavina, raha raisina amin''ny fisaorana,'
mg1865::mg_54::4::5:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'satria hamasinin''ny tenin''Andriamanitra sy ny fivavahana izany.'
mg1865::mg_54::4::6:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha manoro hevitra ny rahalahy ny amin''izany zavatra izany ianao, dia ho mpanompo tsara an''i Kristy Jesoa, tezaina amin''ny tenin''ny finoana sy ny fampianarana tsara izay efa narahinao.'
mg1865::mg_54::4::7:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny anganongano ratsy fanaom-bavy antitra dia lavo, ka mampiasà ny tenanao ho amin''ny toe-panahy araka an''Andriamanitra.'
mg1865::mg_54::4::8:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mahasoa kely ihany ny fampiasana ny tena; fa ny toe-panahy araka an''Andriamanitra no mahasoa amin''ny zavatra rehetra ka manana ny teny fikasana ny amin''ny fiainana ankehitriny sy ny ho avy koa.'
mg1865::mg_54::4::9:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mahatoky izao teny izao ka tokony hekena amin''ny fankasitrahana rehetra.'
mg1865::mg_54::4::10:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izany no ikelezanay aina sy iezahanay, satria izahay manantena an''Andriamanitra velona, Izay Mpamonjy ny olona rehetra, indrindra fa izay mino.'
mg1865::mg_54::4::11:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izany zavatra izany no andidio sy ampianaro.'
mg1865::mg_54::4::12:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka tsy hisy olona hanao tsinontsinona anao noho ny hatanoranao; fa aoka ho tonga fianarana ho an''ny mino ianao amin''ny fiteny, amin''ny fitondran-tena, amin''ny fitiavana, amin''ny finoana, amin''ny fahadiovana.'
mg1865::mg_54::4::13:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mandra-pihaviko tandremo ny famakian-teny, ny fananarana, ny fampianarana.'
mg1865::mg_54::4::14:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza tsy mitandrina ny fanomezam-pahasoavana izay ao anatinao, izay nomena anao tamin''ny faminaniana sy ny fametrahan-tanan''ny loholona*. [*Grika: presbytera]'
mg1865::mg_54::4::15:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mazotoa hihevitra izany zavatra izany, dia mikeleza aina fatratra amin''izany, mba hiseho amin''ny olona rehetra ny fandrosoanao.'
mg1865::mg_54::4::16:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 4
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Tandremo ny tenanao sy ny fampianaranao, ka mahareta amin''izany; fa raha manao izany ianao, dia hamonjy ny tenanao sy izay mihaino anao.'
mg1865::mg_54::5::1:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 1
  verse_date_revised: null
  verse_title: 'Ny amin''ny fitondrana ny loholona sy ny vehivavy mpitondratena mbamin''ny sasany koa, ary anatra ho amin''ny mpanompon''olona'
  verse_text: 'Aza mamely mafy loatra ny anti-panahy, fa anaro toy ny ray izy, ny tanora fanahy toy ny rahalahy,'
mg1865::mg_54::5::2:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny vehivavy anti-panahy toy ny reny, ny tanora fanahy toy ny anabavy, amin''ny fahadiovana rehetra.'
mg1865::mg_54::5::3:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 3
  verse_date_revised: null
  verse_title: null
  verse_text: 'Omeo voninahitra ny mpitondratena izay efa mpitondratena tokoa.'
mg1865::mg_54::5::4:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy mpitondratena manana zanaka na zafy, aoka ireo hianatra aloha haneho izay toe-panahy araka an''Andriamanitra amin''ny ao an-tranony ka hamaly soa ny rainy aman-dreniny; fa izany no ankasitrahana eo anatrehan''Andriamanitra.'
mg1865::mg_54::5::5:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay efa mpitondratena tokoa ka irery tena dia efa manantena an''Andriamanitra ka maharitra amin''ny fangatahana sy ny fivavahana andro aman''alina'
mg1865::mg_54::5::6:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa izay vehivavy manaram-po amin''ny fahafinaretana dia maty fahavelony.'
mg1865::mg_54::5::7:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izany zavatra izany no andidio, mba tsy hananany tsiny.'
mg1865::mg_54::5::8:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha misy tsy mamelona ny azy, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy noho ny tsy mino aza.'
mg1865::mg_54::5::9:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza soratana ho isan''ny mpitondratena izay latsaka noho ny enim-polo taona sady efa nanam-bady indray mandeha ihany'
mg1865::mg_54::5::10:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'ary tsara laza amin''ny asa tsara; raha namelon-jaza izy, raha nampiantrano vahiny, raha nanasa ny tongotry ny olona masina, raha namonjy ny nozoim-pahoriana, raha nazoto nanaraka ny asa tsara rehetra.'
mg1865::mg_54::5::11:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 11
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa mandava ny mpitondra-tena tanora; fa raha tsy maharitra ny fifehezan''i Kristy izy, dia ta-hanam-bady'
mg1865::mg_54::5::12:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka hahazo fanamelohana, satria nandà ny finoany voalohany izy.'
mg1865::mg_54::5::13:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Sady mianatra ho malaina koa izy ka mandehandeha mitety trano; ary tsy malaina ihany, fa mpilazalaza sy mpandehandeha miraharaha ny an''olona ka manao teny tsy mety.'
mg1865::mg_54::5::14:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'Koa tiako ny mpitondratena tanora fanahy hanam-bady sy hanana zanaka sy hanapaka ny tranony ka tsy hanome vava ny fahavalo hiteny ratsy.'
mg1865::mg_54::5::15:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny sasany efa nivily sahady nanaraka an''i Satana.'
mg1865::mg_54::5::16:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Raha misy vehivavy mino manana mpitondratena, aoka izy hamelona azy, ary aza avela hahavaky tratra ny fiangonana*, mba hamelomany izay efa mpitondratena tokoa. [*Grika: eklesia]'
mg1865::mg_54::5::17:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka ny loholona* izay mitondra tsara hatao tokony hahazo fanajana roa heny indrindra fa izay mikely aina amin''ny teny sy ny fampianarana. [*Grika: presbytera]'
mg1865::mg_54::5::18:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa hoy ny Soratra Masina: "Aza manakombona ny vavan''ny omby mively vary ianao" (Deoteronomia 25:4) Ary koa: "Ny mpiasa miendrika hahazo ny karamany" (Lioka 10:7).'
mg1865::mg_54::5::19:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza mandray teny hiampangana loholona*, raha tsy misy vavolombelona roa na telo. [*Grika: presbytera]'
mg1865::mg_54::5::20:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izay manota dia anaro eo anatrehan''ny olona rehetra, mba hatahotra koa ny sasany.'
mg1865::mg_54::5::21:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'Mananatra anao mafy aho eo anatrehan''Andriamanitra sy Kristy Jesoa ary ny anjely voafidy mba hotandremanao izany zavatra izany, tsy manao olon-tiana, na manao na inona na inona amin''ny fiangarana.'
mg1865::mg_54::5::22:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 22
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza malaky mametra-tanana amin''olona na iza na iza, ary aza miombona ota amin''ny sasany; tehirizo madio ny tenanao.'
mg1865::mg_54::5::23:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 23
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aza misotro rano intsony fa misotroa divay kely noho ny vava-fonao sy ny fahosaosanao matetika.'
mg1865::mg_54::5::24:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 24
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ny fahotan''ny olona sasany miharihary ka mialoha ho amin''ny fitsarana, fa ny an''ny sasany kosa manaraka ato aoriana.'
mg1865::mg_54::5::25:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 5
  verse_number: 25
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary miharihary toy izany koa ny asa tsara; ary izay tsy toy izany dia tsy ho azo afenina.'
mg1865::mg_54::6::1:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 1
  verse_date_revised: null
  verse_title: null
  verse_text: 'Aoka izay andevo rehetra eo ambanin''ny zioga hanao ny tompony ho miendrika hohajaina tsara, mba tsy hitenenana ratsy* ny anaran''Andriamanitra sy ny fampianarana. [*Grika: hasiana blasfemia, izahao Matio 9:3]'
mg1865::mg_54::6::2:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 2
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay manana tompo mino dia aoka tsy hanao tsinontsinona azy, satria rahalahy izy; fa vao mainka tokony hotompoiny aza izy, satria mino sy malala ilay mpandray ny soa atao. Izany zavatra izany no ampianaro sy ananaro.'
mg1865::mg_54::6::3:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 3
  verse_date_revised: null
  verse_title: 'Fananarana sy teny farany ho an''i Timoty'
  verse_text: 'Raha misy olona manao fampianarana hafa noho izany ka tsy manaiky ny teny tsy misy kilema*, dia ny an''i Jesoa Kristy Tompontsika, sy ny fampianarana izay mahatonga ny toe-panahy araka an''Andriamanitra, [*Grika: salama]'
mg1865::mg_54::6::4:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 4
  verse_date_revised: null
  verse_title: null
  verse_text: 'dia mieboebo foana izy ka tsy mahalala na inona na inona, fa adala* amin''ny fiadian-kevitra sy ny fiadian-teny izay mahatonga fialonana, fifandirana, fanaratsiana, fiahiahian-dratsy, [*Grika: marary]'
mg1865::mg_54::6::5:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 5
  verse_date_revised: null
  verse_title: null
  verse_text: 'fifandirana lalandava, fanaon''ny olona vetaveta saina sady efa nialan''ny fahamarinana, manao ny toe-panahy araka an''Andriamanitra ho fahazoan-javatra.'
mg1865::mg_54::6::6:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 6
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa misy tombony lehibe tokoa ny toe-panahy araka an''Andriamanitra omban''ny fianinana.'
mg1865::mg_54::6::7:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 7
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa tsy nitondra na inona na inona ho amin''izao tontolo izao isika, sady hita fa* tsy hahatondra na inona na inona hiala. [*Na: satria]'
mg1865::mg_54::6::8:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 8
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa raha manan-kanina sy fitafiana isika, dia aoka hianina amin''izany.'
mg1865::mg_54::6::9:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 9
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ary izay ta-hanan-karena dia latsaka amin''ny fakam-panahy sy ny fandrika ary ny filàna maro tsy misy antony sady mandratra, izay mandentika ny olona ao amin''ny fandringanana sy ny fahaverezana.'
mg1865::mg_54::6::10:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 10
  verse_date_revised: null
  verse_title: null
  verse_text: 'Fa ny fitiavam-bola no fototry ny ratsy rehetra, koa ny sasany izay fatra-pitady izany dia efa voavily niala tamin''ny finoana ka nanindrona ny tenany tamin''ny alahelo be.'
mg1865::mg_54::6::11:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 11
  verse_date_revised: '2022-12-21T14:33:29+0000'
  verse_title: null
  verse_text: 'Fa ianao kosa, ry lehilahin''Andriamanitra, mandosira izany zavatra izany, ka miezaha mitady fahamarinana, toe-panahy araka an''Andriamanitra, finoana, fitiavana, faharetana, fahalemem-panahy.'
mg1865::mg_54::6::12:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 12
  verse_date_revised: null
  verse_title: null
  verse_text: 'Miadia ny ady tsaran''ny finoana, hazony ny fiainana mandrakizay; fa ho amin''izany no niantsoana anao koa sy nanaovanao ilay fanekena tsara teo imason''ny vavolombelona maro.'
mg1865::mg_54::6::13:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 13
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izaho mananatra anao eo anatrehan''Andriamanitra, Izay mamelona ny zavatra rehetra, ary eo anatrehan''i Kristy Jesoa, Izay nanao ilay fanekena tsara teo anatrehan''i Pontio Pilato,'
mg1865::mg_54::6::14:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 14
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hotehirizinao tsy hanan-tsiny amam-pondro hatramin''ny fisehoan''i Jesoa Kristy Tompontsika izany didy izany;'
mg1865::mg_54::6::15:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 15
  verse_date_revised: null
  verse_title: null
  verse_text: 'ny Andriana finaritra sady tokana, Mpanjakan''ny mpanjaka sy Tompon''ny tompo, no haneho izany amin''ny fotoany;'
mg1865::mg_54::6::16:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 16
  verse_date_revised: null
  verse_title: null
  verse_text: 'Izy ihany no manana ny tsy fahafatesana, mitoetra eo amin''ny mazava tsy azo hatonina, Izay tsy hitan''olona sady tsy hainy jerena; ho Azy anie ny voninahitra sy ny fanjakana mandrakizay. Amena.'
mg1865::mg_54::6::17:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 17
  verse_date_revised: null
  verse_title: null
  verse_text: 'Anaro ny mpanankarena amin''izao fiainana ankehitriny izao mba tsy hiavonavona, na hatoky ny harena miovaova*, fa Andriamanitra, Izay manome antsika malalaka ny zavatra rehetra mba hifaliantsika, [*Grika: fiovavovan''ny harena]'
mg1865::mg_54::6::18:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 18
  verse_date_revised: null
  verse_title: null
  verse_text: 'mba hanao soa, mba hanan-karena amin''ny asa tsara, hazoto manome sy miantra,'
mg1865::mg_54::6::19:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 19
  verse_date_revised: null
  verse_title: null
  verse_text: 'ka dia hihary fanorenana tsara ho an''ny tenany ho amin''ny andro ho avy, mba hihazonany ny tena fiainana.'
mg1865::mg_54::6::20:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 20
  verse_date_revised: null
  verse_title: null
  verse_text: 'Ry Timoty, tehirizo ilay natolotra anao, ka mialà amin''ny fibedibedena foana sy ny fanoherana avy amin''izay atao hoe fahalalana, kanjo tsy izy,'
mg1865::mg_54::6::21:
  verse_version: mg1865
  verse_book: mg_54
  verse_chapter: 6
  verse_number: 21
  verse_date_revised: null
  verse_title: null
  verse_text: 'izay neken''ny sasany, ka nania tamin''ny finoana izy. Ho aminareo anie ny fahasoavana.'
